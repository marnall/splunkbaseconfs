# #::HDR:: ;; # App: IA-vmware_app_for_splunk ;; # File: props.conf ;; # Updated: 2024-01-10 14:27:56
# EXTRACT -> REPORT -> KV_MODE -> FIELDALIAS -> EVAL -> LOOKUP

[vmware:cbc:auditlogs]
LINE_BREAKER             = ([\r\n]+)
TRUNCATE                 = 999999
SHOULD_LINEMERGE         = false
TIME_PREFIX              = "create_time":
TIME_FORMAT              = %Y-%m-%dT%H:%M:%S.%3N%Z
MAX_TIMESTAMP_LOOKAHEAD  = 50
EXTRACT-session_id       = \/sessions\/(?<session_id>[^\/]+) in requestUrl
EXTRACT-session_id_queue = \/sessions\/(?<session_id>[^\/]+) in request_url
REPORT-ext-map00         = vmware_cbc_audit_knownbad, vmware_cbc_audit_bad_password
REPORT-ext-map01         = vmware_cbc_audit_connector_logged_in, vmware_cbc_audit_update_report_feed, vmware_cbc_audit_replace_report_feed
REPORT-ext-map02         = vmware_cbc_audit_live_response_created_with_detail, vmware_cbc_audit_live_response_created, vmware_cbc_audit_live_response_terminated
REPORT-ext-map03         = vmware_cbc_audit_live_response_file_download_detail, vmware_cbc_audit_reputation_add_override, vmware_cbc_audit_reputation_delete_override
REPORT-ext-map04         = vmware_cbc_audit_reputation_lookup, vmware_cbc_audit_edit_dismissed_cve, vmware_cbc_audit_edit_dismissed_cve_single
REPORT-ext-map05         = vmare_cbc_audit_dismissed_cve, vmare_cbc_audit_dismissed_cve_single, vmware_cbc_audit_success_login
REPORT-ext-map06         = vmware_cbc_audit_undismiss_cve, vmware_cbc_audit_undismiss_cve_single, vmware_cbc_audit_download_policy
REPORT-ext-map07         = vmware_cbc_audit_find_devices_search, vmware_cbc_audit_set_device_attribute, vmware_cbc_audit_set_device_attribute_single
REPORT-ext-map08         = vmware_cbc_audit_retrieved_secret, vmware_cbc_audit_vuln_export_trigger, vmware_cbc_audit_report_update
REPORT-ext-map09         = vmware_cbc_audit_query_run, vmware_cbc_audit_livequery_run_start, vmware_cbc_audit_dl_job
REPORT-ext-map10         = vmware_cbc_audit_device_ids, vmware_cbc_audit_device_id_vuln, vmware_cbc_audit_device_id_policy
REPORT-ext-map11         = vmware_cbc_audit_device_id_group, vmware_cbc_audit_device_id_lr
REPORT-ext-map12         = vmware_cbc_audit_lr_details, vmware_cbc_audit_lr_url, vmware_cbc_audit_lr_base, vmware_cbc_audit_lr_action
LOOKUP-cimmappings       = vmware_cbc_audit_dm_lookup vmwaudcimlkup OUTPUTNEW action, change_type, status
KV_MODE                  = JSON
FIELDALIAS-backwards     = org_key ASNEW orgName actor ASNEW loginName request_url ASNEW requestUrl actor_ip ASNEW clientIp
FIELDALIAS-dest          = orgName as dest orgName AS vendor_account org_key ASNEW dest org_key ASNEW vendor_account
FIELDALIAS-id            = eventId AS id
FIELDALIAS-object-path   = requestUrl AS object_path request_url ASNEW object_path
FIELDALIAS-src           = clientIp AS src actor_ip ASNEW src
FIELDALIAS-user          = loginName AS user loginName AS user_name actor ASNEW user_name actor ASNEW user
EVAL-change_type         = json_extract(command_result,"name")
EVAL-file_id             = json_extract(command_result, "file_id")
EVAL-object              = case(isnotnull(command_result), json_extract(command_result, "object"), isnotnull(objects_mv) and isnotnull(objects_mv_delim), split(objects_mv, objects_mv_delim), isnotnull(objects_mv) and isnull(objects_mv_delim), objects_mv, true(), object)
EVAL-object_path         = json_extract(command_result, "path")
EVAL-query_params        = if(vmwaudcimlkup=="find_devices_search", split(replace(description,"\t",";;;;;"),";;;;;"), query_params)
EVAL-session_id          = json_extract(command_result, "session_id")
EVAL-vendor              = "VMware"
EVAL-vendor_product      = "Carbon Black Cloud"
# CIM Review: February 2, 2023
# DM: Change.Audit
# Added KV_MODE          = JSON
# CIM LOOKUP KEY FIELD: vmwaudcimlkup (VMWare Audit CIM Lookup)

[vmware:cbc:s3:watchlist:hits]
LINE_BREAKER                   = ([\r\n]+)
TRUNCATE                       = 0
SHOULD_LINEMERGE               = false
TIME_PREFIX                    = "create_time":"
TIME_FORMAT                    = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD        = 50
FIELDALIAS-cbc_event_id        = report_id AS cbc_event_id
FIELDALIAS-create_time         = create_time ASNEW backend_timestamp
FIELDALIAS-dest                = device_external_ip ASNEW dest
FIELDALIAS-org_id              = org_id ASNEW org_key
FIELDALIAS-os                  = device_os ASNEW os device_os ASNEW family
FIELDALIAS-parent_hash         = parent_hash{} ASNEW parent_hash
FIELDALIAS-parent_process      = parent_cmdline ASNEW parent_process
FIELDALIAS-parent_process_exec = parent_path ASNEW parent_process_exec
FIELDALIAS-parent_process_guid = parent_guid ASNEW parent_process_guid
FIELDALIAS-parent_process_id   = parent_pid ASNEW parent_process_id
FIELDALIAS-process             = process_cmdline ASNEW process
FIELDALIAS-process_exec        = process_path ASNEW process_executable
FIELDALIAS-process_hash        = process_hash{} ASNEW process_hash
FIELDALIAS-process_id          = process_pid ASNEW process_id
FIELDALIAS-reputation          = process_reputation AS reputation
FIELDALIAS-severity_id         = severity AS severity_id
FIELDALIAS-src                 = device_name ASNEW src
FIELDALIAS-type                = type AS cbc_type
FIELDALIAS-user                = process_username AS user
FIELDALIAS-watchlist_id        = watchlists{}.id AS watchlist_id
FIELDALIAS-watchlist_name      = watchlists{}.name AS watchlist_name
EVAL-app                       = "Carbon Black Cloud"
EVAL-md5_process_hash          = mvindex(split(mvjoin('process_hash{}',","),","),0)
EVAL-sha256_process_hash       = coalesce(process_sha256, mvindex(split(mvjoin('process_hash{}',","),","),1))
EVAL-vendor                    = "VMWare"
EVAL-vendor_product            = "Carbon Black Cloud"

[vmware:cbc:s3:events]
LINE_BREAKER                   = ([\r\n]+)
TRUNCATE                       = 999999
SHOULD_LINEMERGE               = false
TIME_PREFIX                    = "backend_timestamp":"
TIME_FORMAT                    = %Y-%m-%d %H:%M:%S.%7N %z
MAX_TIMESTAMP_LOOKAHEAD        = 37
FIELDALIAS-childproc_hash      = childproc_hash{} ASNEW childproc_hash
FIELDALIAS-crossproc_hash      = crossproc_hash{} ASNEW crossproc_hash
FIELDALIAS-description         = event_description ASNEW description
FIELDALIAS-dest                = remote_ip ASNEW dest device_external_ip ASNEW dest
FIELDALIAS-dest_port           = remote_port ASNEW dest_port
FIELDALIAS-file_hash           = filemod_hash{} ASNEW file_hash
FIELDALIAS-file_name           = filemod_name ASNEW file_name
FIELDALIAS-org_id              = org_id ASNEW org_key
FIELDALIAS-os                  = device_os ASNEW os device_os ASNEW family
FIELDALIAS-parent_hash         = parent_hash{} ASNEW parent_hash
FIELDALIAS-parent_process      = parent_cmdline ASNEW parent_process
FIELDALIAS-parent_process_exec = parent_path ASNEW parent_process_exec
FIELDALIAS-parent_process_guid = parent_guid ASNEW parent_process_guid
FIELDALIAS-parent_process_id   = parent_pid ASNEW parent_process_id
FIELDALIAS-process             = process_cmdline ASNEW process
FIELDALIAS-process_exec        = process_path ASNEW process_executable
FIELDALIAS-process_hash        = process_hash{} ASNEW process_hash
FIELDALIAS-process_id          = process_pid ASNEW process_id
FIELDALIAS-registry_path       = regmod_name ASNEW registry_path
FIELDALIAS-reputation          = process_reputation ASNEW reputation
FIELDALIAS-service             = modload_name ASNEW service
FIELDALIAS-src                 = device_name ASNEW src
FIELDALIAS-src_port            = local_port ASNEW src_port
FIELDALIAS-transport           = netconn_protocol as transport
FIELDALIAS-type                = type ASNEW cbc_type
FIELDALIAS-user                = process_username ASNEW user process_username ASNEW user_name
EVAL-action                    = if(type=="endpoint.event.filemod" OR type=="endpoint.event.regmod",split(mvjoin(action,"|"), "|"), sensor_action)
EVAL-app                       = "VMware CBC"
EVAL-cbc_event_id              = if(event_origin="NGAV",event_id,process_pid)
EVAL-endpoint_action           = if(type=="endpoint.event.filemod" OR type=="endpoint.event.regmod",null(),action)
EVAL-endpoint_event_id         = if(event_origin="NGAV",event_id,process_pid)
EVAL-md5_file_hash             = mvindex(split(mvjoin('filemod_hash{}',","),","),0)
EVAL-md5_process_hash          = mvindex(split(mvjoin('process_hash{}',","),","),0)
EVAL-sha256_file_hash          = mvindex(split(mvjoin('filemod_hash{}',","),","),1)
EVAL-sha256_process_hash       = coalesce(process_sha256, mvindex(split(mvjoin('process_hash{}',","),","),1))
EVAL-signature                 = if(type=="endpoint.event.filemod" OR type=="endpoint.event.regmod",split(mvjoin(action,"|"), "|"), sensor_action)
EVAL-user                      = if(isnotnull(user),user,"unknown")
EVAL-user_name                 = if(isnotnull(user_name),user_name,"unknown")
EVAL-vendor                    = "VMware"
EVAL-vendor_product            = "Carbon Black Cloud"

