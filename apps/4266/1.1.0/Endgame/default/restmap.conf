[admin:app]
	match=/endgame
	members=endgameconf

[admin_external:endgameconf]
	handlertype = python
	handlerfile = appsettings.py
	handleractions = list, edit

[script:endgame_api_call]
    match=/endgame/result
	script = endgame_proxy_service.py
	scripttype  = persist
	handler = endgame_proxy_service.RESTHandler
	output_modes = json
	passPayload = true
	passHttpHeaders = true
	passHttpCookies = true


[script:endgame_api_put_call]
    match=/endgame/put
	script = endgame_proxy_service.py
	scripttype  = persist
	handler = endgame_proxy_service.RESTHandler
	output_modes = json
    passPayload = true
    passHttpHeaders = true
    passHttpCookies = true

[script:endgame_api_post_call]
    match=/endgame/post
	script = endgame_proxy_service.py
	scripttype  = persist
	handler = endgame_proxy_service.RESTHandler
	output_modes = json
    passPayload = true
    passHttpHeaders = true
    passHttpCookies = true
