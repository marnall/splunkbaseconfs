[APISec-AuditLog]
SHOULD_LINEMERGE = false
EVENT_BREAKER = ([\r\n]+)
EVENT_BREAKER_ENABLE = true

FIELDALIAS-audit-log = operation ASNEW authentication_method username ASNEW src_user username ASNEW user username ASNEW user_name userAgent ASNEW user_agent table ASNEW object table ASNEW object_category detectedAt ASNEW detectedAt_raw actionTs ASNEW actionTs_raw
EXTRACT-extracted_host = host":"(?<extracted_host>[^""]+)
EVAL-src = if(isnotnull(sourceIp), sourceIp ,link)
EVAL-dest = if(isnotnull(link), link, dest)
EVAL-change_type = if(isnotnull(changeType), changeType, table)
EVAL-action = if(like(lower(operation), "%login%") OR like(lower(operation), "%logout%") OR like(lower(operation), "%failure%") OR like(lower(operation), "%failed%"),if(like(lower(operation), "%failure%") OR like(lower(operation), "%failed%"), "failure", "success"),lower(operation))
EVAL-result = if(isnotnull(lower(operation)), lower(operation), changeType)
EVAL-result_id = if(isnotnull(lower(operation)), lower(operation), changeType)
EVAL-command = lower(operation) + " " + table
EVAL-app = "Akamai API Security"
EVAL-dvc = "Akamai API Security"
EVAL-vendor_product = "Akamai API Security"
EVAL-status=if(like(action, "%failure%"), "failure", "success")
EVAL-_time = case(isnotnull(detectedAt_raw), strptime(detectedAt_raw, "%Y-%m-%dT%H:%M:%S.%6N"), isnotnull(actionTs_raw), strptime(actionTs_raw, "%Y-%m-%dT%H:%M:%S.%6N"), 1==1, _time)


[APISec-Incident]
SHOULD_LINEMERGE = false
EVENT_BREAKER = ([\r\n]+)
EVENT_BREAKER_ENABLE = true
TIME_FORMAT=%a %b %d %Y %H:%M:%S
TIME_PREFIX=detectionTime":"
TRUNCATE=100000

FIELDALIAS-incident-attacker = evidence{}.host ASNEW dest detectionTime ASNEW detectionTime_raw "data.lastAttack" ASNEW lastAttack_raw "data.createdAt" ASNEW createdAt_raw
EVAL-dvc = "Akamai API Security"
EVAL-vendor_product = "Akamai API Security"
EVAL-src = case(isnotnull('data.attacker.identifier'), 'data.attacker.identifier', isnotnull('attacker.identifier'), 'attacker.identifier', isnotnull('data.identifier'), 'data.identifier')
EVAL-user = case(isnotnull('data.attacker.identifier'), 'data.attacker.identifier', isnotnull('data.identifier'), 'data.identifier', isnotnull(user), user, true(), "")
EVAL-severity = case(isnotnull('data.severity'), 'data.severity', isnotnull('data.risk'), 'data.risk', isnotnull(severity), severity)
EVAL-signature = case(isnotnull('data.attackType'), 'data.attackType', isnotnull(attackType), attackType)
EVAL-category = case(isnotnull('data.typeName'), 'data.typeName', isnotnull(type), type)
EVAL-transport = "tcp"
EVAL-ids_type = "application"
EVAL-_time = case(isnotnull(lastAttack_raw), strptime(lastAttack_raw, "%Y-%m-%dT%H:%M:%S.%6N"), isnotnull(createdAt_raw), strptime(createdAt_raw, "%Y-%m-%dT%H:%M:%S.%6N"), isnotnull(detectionTime), strptime(detectionTime, "%a %b %d %Y %H:%M:%S"), 1==1, _time)


[APISec-Finding]
SHOULD_LINEMERGE = false
EVENT_BREAKER = ([\r\n]+)
EVENT_BREAKER_ENABLE = true
TIME_FORMAT=%a %b %d %Y %H:%M:%S
TIME_PREFIX=detectionTime":"
TRUNCATE=100000

FIELDALIAS-finding = module ASNEW category type ASNEW signature detectionTime ASNEW detectionTime_raw
EXTRACT-extracted_host = host":"(?<extracted_host>[^""]+)
EVAL-dest = extracted_host
EVAL-dvc = "Akamai API Security"
EVAL-vendor_product = "Akamai API Security"
EVAL-_time = strptime(detectionTime_raw, "%a %b %d %Y %H:%M:%S")
