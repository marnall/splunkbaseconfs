[cmxhttp]
SHOULD_LINEMERGE = false
REPORT-extract_ip_http = cmx-http
FIELDALIAS-floorId_alias =  notifications{}.floorId as FloorID
FIELDALIAS-ssid_alias =  notifications{}.ssid as SSID
FIELDALIAS-deviceid_alias = notifications{}.deviceId as DeviceID

[cmxactive]
EVAL-BAND=case(band=="IEEE_802_11_A","5Ghz Connected Devices",band=="IEEE_802_11_B","2.4Ghz Connected Devices",(band=="UNKNOWN" AND 'statistics.maxDetectedRssi.band'=="IEEE_802_11_A"),"5Ghz Probing Devices",(band=="UNKNOWN" AND 'statistics.maxDetectedRssi.band'=="IEEE_802_11_B"),"2.4Ghz Probing Devices")
REPORT-extract_ip_active = cmx-active
FIELDALIAS-macaddress = macAddress as deviceID
FIELDALIAS-ipaddress = ipAddress{} as ipAddress
FIELDALIAS-firstTime = statistics.firstLocatedTime as firsttime
FIELDALIAS-lastTime = statistics.lastLocatedTime as lasttime
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = "currentServerTime":
MAX_TIMESTAMP_LOOKAHEAD = 30
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TRUNCATE = 0

[cmxmap]
TRUNCATE = 0
KV_MODE = json
FIELDALIAS-campus_name_alias = campuses{}.name as campus_name
FIELDALIAS-building_name_alias = campuses{}.buildingList{}.name as building_name
FIELDALIAS-floor_name_alias = campuses{}.buildingList{}.floorList{}.name as floor_name
FIELDALIAS-floor_id_alias = campuses{}.buildingList{}.floorList{}.accessPoints{}.floorId as floor_id

[cmxfloor]
TRUNCATE = 0
KV_MODE = json
SHOULD_LINEMERGE = false
FIELDALIAS-image_width_alias = image.width as image_width
FIELDALIAS-image_height_alias = image.height as image_height
FIELDALIAS-image_size_alias = image.size as image_size
FIELDALIAS-image_max_resolution_alias = image.maxResolution as image_max_resolution
FIELDALIAS-image_zoom_level_alias = image.zoomLevel as image_zoom_level
FIELDALIAS-floor_id_alias = accessPoints{}.floorId as floor_id


[cmxanalytics]
KV_MODE = json
TRUNCATE = 0
