[default]
# General
default.visualizations.custom.treemap-viz.treemap-viz.showBreadcrumbs = true
default.visualizations.custom.treemap-viz.treemap-viz.breadcrumbsPosition = bottom
default.visualizations.custom.treemap-viz.treemap-viz.allowZoom = true
default.visualizations.custom.treemap-viz.treemap-viz.allowPan = true
default.visualizations.custom.treemap-viz.treemap-viz.grouping = 1
default.visualizations.custom.treemap-viz.treemap-viz.cornerRadius = 5
default.visualizations.custom.treemap-viz.treemap-viz.panelBorder = 4
default.visualizations.custom.treemap-viz.treemap-viz.panelGap = 4
default.visualizations.custom.treemap-viz.treemap-viz.renderAs = svg
# Labels
default.visualizations.custom.treemap-viz.treemap-viz.showParentLabels = false
default.visualizations.custom.treemap-viz.treemap-viz.fontSizeLabel = 20
default.visualizations.custom.treemap-viz.treemap-viz.fontSizeValue = 18
default.visualizations.custom.treemap-viz.treemap-viz.valuePrefix = 
default.visualizations.custom.treemap-viz.treemap-viz.valueSuffix = 
default.visualizations.custom.treemap-viz.treemap-viz.numDecimalPlaces =No Change
default.visualizations.custom.treemap-viz.treemap-viz.thousandsSeparator = true

# Colors
default.visualizations.custom.treemap-viz.treemap-viz.colorBy = category
default.visualizations.custom.treemap-viz.treemap-viz.categoryPalette = bright
default.visualizations.custom.treemap-viz.treemap-viz.customPalette = #1E88E5, #43A047, #F4511E, #FB8C00, #8E24AA, #00ACC1, #FDD835
default.visualizations.custom.treemap-viz.treemap-viz.colorByValueMinColor = #e69138
default.visualizations.custom.treemap-viz.treemap-viz.colorByValueMaxColor = #F4511E
default.visualizations.custom.treemap-viz.treemap-viz.minValue = auto
default.visualizations.custom.treemap-viz.treemap-viz.maxValue = auto
default.visualizations.custom.treemap-viz.treemap-viz.showScale = true
default.visualizations.custom.treemap-viz.treemap-viz.pattern = none
#Tokens
default.visualizations.custom.treemap-viz.treemap-viz.tok_label = "tok_label"
default.visualizations.custom.treemap-viz.treemap-viz.tok_value = "tok_value"
default.visualizations.custom.treemap-viz.treemap-viz.tok_path = "tok_path"
default.visualizations.custom.treemap-viz.treemap-viz.tok_parent = "tok_parent"

