[hostrename]
REGEX = .
DEST_KEY = MetaData:Host
FORMAT = host::medigateids

[eventindexrename]
REGEX = .
DEST_KEY = _MetaData:Index
FORMAT = medigate

[event_fields]
DELIMS = ","
FIELDS = device_uid,event_type,insertion_time,protocol,fqdn,device_ip,other_ip,tls_verified,malicious,manufacturer,antivirus,asn,as_org,org,isp,country_code,geolocation,direction,internet_port,ip_proto,device_port,ip,human_name,text,mac_src,mac_dst,ip_src,ip_dst,sport,dport,proto,category

[network_map_info_fields]
DELIMS = ","
FIELDS = mac_src, ip_src, sport, mac_dst, ip_dst, dport, direction, proto, medical_proto, packet_count, data_size, time

[asset_fields]
DELIMS = ","
FIELDS = uid, device_type, vendor, model, serial_number, hw_version, sw_version, location, mac, ip, dashboard_connection_type, ip_assignment, vlan, first_seen, last_seen, is_online
