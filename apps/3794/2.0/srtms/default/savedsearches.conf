
[SVM - CVE Table]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
dispatchAs = user
display.general.type = statistics
display.visualizations.show = 0
request.ui_dispatch_app = srtms
request.ui_dispatch_view = search
search = | pivot ProductCVE ProductCVE count(ProductCVE) AS "Count of ProductCVE" SPLITROW cve_ID AS cve_ID SPLITROW cvss_Severity AS cvss_Severity SPLITROW cvss_severity_base_score AS cvss_severity_base_score SORT 10 cve_ID ROWSUMMARY 0 COLSUMMARY 0 NUMCOLS 0 SHOWOTHER 1

[SVM - Open Vulnerabilities]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
dispatchAs = user
display.general.type = visualizations
display.statistics.show = 0
display.visualizations.singlevalue.trendInterval = auto
display.visualizations.singlevalue.underLabel = Open Vulnerabilities
display.visualizations.type = singlevalue
request.ui_dispatch_app = srtms
request.ui_dispatch_view = search
search = | pivot ProductCVE ProductCVE count(ProductCVE) AS "Count of ProductCVE" FILTER isPatch = false ROWSUMMARY 0 COLSUMMARY 0 NUMCOLS 0 SHOWOTHER 1

[SVM - ProductCVE]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
dispatchAs = user
display.general.type = statistics
display.visualizations.show = 0
request.ui_dispatch_app = srtms
request.ui_dispatch_view = pivot
search = | pivot ProductCVE ProductCVE count(ProductCVE) AS "Count of ProductCVE" SPLITROW host AS host SPLITROW cpe_URI_2_2 AS cpe_URI_2_2 SPLITROW cpe_Manufacturer AS cpe_Manufacturer SPLITROW cpe_Product AS cpe_Product SPLITROW cpe_Version AS cpe_Version SPLITROW cpe_Update AS cpe_Update SPLITROW cpe_Edition AS cpe_Edition SPLITROW cve_ID AS cve_ID SPLITROW isPatch AS isPatch TRUELABEL "is isPatch" FALSELABEL "is not isPatch" SPLITROW kb AS kb SPLITROW cvss_Severity AS cvss_Severity SPLITROW cvss_severity_base_score AS cvss_severity_base_score SORT 100 host ROWSUMMARY 0 COLSUMMARY 0 NUMCOLS 0 SHOWOTHER 1

[SVM - Severity Chart]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
dispatchAs = user
display.general.type = visualizations
display.statistics.show = 0
display.visualizations.charting.axisTitleY.text = Count of ProductCVE
display.visualizations.charting.chart.stackMode = stacked
request.ui_dispatch_app = srtms
request.ui_dispatch_view = search
search = | pivot ProductCVE ProductCVE count(ProductCVE) AS "Count of ProductCVE" SPLITROW cvss_Severity AS cvss_Severity SPLITCOL isPatch TRUELABEL "is isPatch" FALSELABEL "is not isPatch" SORT 100 cvss_Severity ROWSUMMARY 0 COLSUMMARY 0 NUMCOLS 1000 SHOWOTHER 1

