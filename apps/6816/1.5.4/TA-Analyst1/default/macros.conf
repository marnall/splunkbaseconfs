[analyst1_lastmatch_filter(1)]
args = filter_input
definition = if("$filter_input$"=="0",0,(relative_time(now(), "-" . "$filter_input$")))
iseval = 0

[analyst1_epoch_to_str(1)]
args = epoch_time
description = Covert epoch time to human readable format
definition = if(isnull($epoch_time$), $epoch_time$, strftime($epoch_time$, "%Y-%m-%d %H:%M:%S %Z"))
iseval = 0

[analyst1_get_earlist_time]
definition = [| makeresults | eval earliest=if(strftime(now(),"%H")=="00", "-1d@d", "@d") | return $earliest]
iseval = 0

[analyst1_master_lookup_data_macro]
iseval = 0
definition = inputlookup analyst1_indicators_email \
| inputlookup append=true analyst1_indicators_ip \
| inputlookup append=true analyst1_indicators_mutex \
| inputlookup append=true analyst1_indicators_httpRequest \
| inputlookup append=true analyst1_indicators_string \
| inputlookup append=true analyst1_indicators_domain \
| inputlookup append=true analyst1_indicators_file \
| inputlookup append=true analyst1_indicators_url \
| eval lookup_type = case( \
    type IN ("md5","sha1","sha256","sha512","ssdeep","crc32"), "file", \
    type IN ("ip","ipv6"), "ip", \
    true(), type \
) \
| eval verified = case(IN(verified,"1","true"), "True", IN(verified,"0","false"), "False", 1=1, null()) \
| eval active   = case(IN(active,"1","true"), "True", IN(active,"0","false"), "False", 1=1, null()) \
| eval benign   = case(IN(benign,"1","true"), "True", IN(benign,"0","false"), "False", 1=1, null())

[update_indicator_lookup(2)]
args = indicator_type, sourcetypes
definition = `analyst1_indicator_indices` $sourcetypes$ \
| eventstats values(source_input{}) as source_input values(enrichment_source{}) as enrichment_source values(link_to_Analyst1{}) as link_to_Analyst1 by value \
| dedup value \
| rename "actor_countries{}" as actor_countries, "actors{}" as actors, "malwares{}" as malwares, "source_types{}" as source_types, "sources{}" as sources, "targets{}" as targets, "attack_patterns{}" as attack_patterns, "ports{}" as ports \
| eval ingestTime=_time, _key=md5(value) \
| table ingestTime, _key, id, value, type, benign, active, verified, confidence_level, exploit_stage, actors, actor_countries, malwares, targets, first_active, last_active, first_reported, last_reported, evidence_count, sources, source_types, tlp_color, attack_patterns, link_to_Analyst1, source_input, enrichment_source, ports, indicator_risk_score \
| lookup analyst1_indicators_$indicator_type$ _key OUTPUT source_input as source_input_lookup, enrichment_source as enrichment_source_lookup, link_to_Analyst1 as link_to_Analyst1_lookup \
| eval source_input = mvdedup(mvappend(source_input,source_input_lookup)), enrichment_source = mvdedup(mvappend(enrichment_source,enrichment_source_lookup)), link_to_Analyst1 = mvdedup(mvappend(link_to_Analyst1,link_to_Analyst1_lookup)) \
| fields - source_input_lookup, enrichment_source_lookup, link_to_Analyst1_lookup \
| outputlookup analyst1_indicators_$indicator_type$ key_field=_key append=true
iseval = 0
