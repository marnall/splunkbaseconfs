[splunkd]
EVAL-app = "Splunk"
FIELDALIAS-dest = clientip AS src host AS dest user AS src_user
EVAL-action = if(action="login" AND status="failure", "failure", action)

[splunkd_ui_access]
EVAL-action = if(isnull(uri_query) AND like(file,"login") AND like(status,"200"), "success",action) 
EVAL-app = "Splunk"
FIELDALIAS-dest = clientip AS src host AS dest user AS src_user
FIELDALIAS-duration = spent AS duration
