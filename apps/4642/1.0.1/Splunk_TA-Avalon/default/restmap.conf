[admin:Splunk_TA_Avalon]
match = /
members = Splunk_TA_Avalon_settings, Splunk_TA_Avalon_avalon_nodes

[admin_external:Splunk_TA_Avalon_settings]
handlertype = python
python.version = python3
handlerfile = Splunk_TA_Avalon_rh_settings.py
handleractions = edit, list

[admin_external:Splunk_TA_Avalon_avalon_nodes]
handlertype = python
python.version = python3
handlerfile = Splunk_TA_Avalon_rh_avalon_nodes.py
handleractions = edit, list, remove, create

[admin:configendpoint]
match = /avalon_config
members = avalonconfigendpoint

[admin_external:avalonconfigendpoint]
handlertype = python
python.version = python3
handlerfile = config.py
handleractions = list, edit

