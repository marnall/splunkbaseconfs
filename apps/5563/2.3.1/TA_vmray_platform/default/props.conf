[vmray:analysis]
DATETIME_CONFIG = NONE
LINE_BREAKER = \}([\r\n]+)
pulldown_type = 1
EVAL-action = "allowed"
FIELDALIAS-date = analysis_created as date
FIELDALIAS-file_hash = analysis_sample_sha1 as file_hash
FIELDALIAS-file_name = submission.submission_filename as file_name
FIELDALIAS-vendor_product = "VMRay Platform" as vendor_product
FIELDALIAS-url = analysis_webif_url as url
TRUNCATE = 0
KV_MODE = json
TZ = Etc/UTC

