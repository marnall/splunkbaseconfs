[TEST: SRLA_timeformat_next_scheduled_time]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
description = Run this search at least once to verify whether or not you need to update the 'SRLA_timeformat_next_scheduled_time' macro to match the date format of the string in "next_scheduled_time" in your specific environment.
dispatch.earliest_time = 0
display.events.fields = ["cs_username","cs_uri_scheme","cs_uri_query","cs_uri_port","cs_uri_path","cs_method","cs_host","cs_categories","cs_bytes","cs_auth_group","cs_User_Agent","cs_Referer","c_port","c_ip","sc_status","sc_filter_result","sc_bytes","s_supplier_name","s_ip","s_hierarchy","s_action","rs_Content_Type","r_supplier_ip","x_virus_id","RecordNotes","Outcome","NumEscaped","LaunchCoords","Interceptor","Infiltrators","Enforcer","AttackVessel","ActionTime","ActionDate","sourcetype","Interceptor.RecordNotes","Interceptor.Outcome","Interceptor.NumEscaped","Interceptor.LaunchCoords","Interceptor.Infiltrators","Interceptor.Enforcer","Interceptor.AttackVessel","Interceptor.AttackCoords","Interceptor.ActionTime","Interceptor.ActionDate","source","host","status","data.cpu_pct","data.cpu_idle_pct","b","search_commands{}.duration","data.avg_service_ms","data.avg_total_ms","cpu_seconds","write_cpu_seconds","rtsearch_filter_seconds","service_cpu_seconds"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = Self-Resurrecting_Lookup_Alerts
request.ui_dispatch_view = search
search = | rest splunk_server=local /services/saved/searches search="is_scheduled=1 disabled=0"\
| rename COMMENT AS "We are assuming that there is at least 1 scheduled search (we don't care what it is/does)."\
| head 1\
| table                                                                       next_scheduled_time\
| eval        SRLA_timeformat_next_scheduled_time =  strptime(                next_scheduled_time, `SRLA_timeformat_next_scheduled_time`)\
| fieldformat SRLA_timeformat_next_scheduled_time =  strftime(SRLA_timeformat_next_scheduled_time, `SRLA_timeformat_for_output_display`)\
| eval   SRLA_timeformat_next_scheduled_time_test = if(isnull(SRLA_timeformat_next_scheduled_time), "FAIL", "PASS")\
| rename COMMENT1of4 AS "It is conceivable the date's string format in field 'next_scheduled_time' could vary"\
| rename COMMENT2of4 AS "from server-to-server, user-to-user, version-to-version, or maybe even day-to-day."\
| rename COMMENT3of4 AS "You can use this search to test the 'SRLA_timeformat_next_scheduled_time' macro to see"\
| rename COMMENT4of4 AS "if will work correctly inside of the main 'Self-Resurrecting_Lookup_Alerts(1)' macro."
