[ALERT: Self-Resurrecting_Lookup_Alerts]
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.severity = 5
alert.suppress = 0
alert.track = 1
alert_condition = search SRLA_RESULT!="OK"
counttype = custom
cron_schedule = */5 * * * *
description = This approach to protecting important lookup data is SUPER-efficient and resilient and should work on ANY lookup.  It has NO overhead or maintenance because it leverages the results of previous alert runs to replace the data (if it ever needs to) requiring NO OTHER knowledge objects (besides the 4 shared macros).\
This search is a complete example and even though the magic is mostly in the main macro (which you SHOULD NOT CHANGE IN ANY WAY), there are some VERY important pieces that should be present in each scheduled search configurations as follows:\
*1* The search should exist in the same app as the lookup, ESPEICALLY if you are using a lookup FILE (which you should avoid).\
*2* You SHOULD pass lookup DEFINITIONs to the macro, instead of lookup FILES, (even though it may work for FILEs, too) because using DEFINITIONS guarantees that resurrected lookup data will end up in the correction path/directory/app location. Following the rule above (*1*) means that FILE-based resurrections will work correctly UNLESS the file moves or the alert moves, which will cause resurrections to be incorrect.  Using lookup DEFINITIONS eliminates these liabilities and ensures that resurrections will always land in the correct path/directory/app location.\
*3* The search MUST be scheduled (with periodicity/cron set as big/wide as possible, while still allowing acceptible risk of loss of lookup changes between runs.\
*4* The search results must survive through the next scheduled search run (e.g. "dispatch.ttl" = '2P').\
*5* For extra protection, set "Trigger" to 'Once' with "Custom Trigger Alert When" set to 'search SRLA_RESULT!="OK"' (or possibly, 'search SRLA_RESULT!="OK*") and include the "Add to Triggered Alerts" alert action.  With default settings (easy to modify), this causes the search results from a ressurection ("alert.expires" = '24h') to last 24 hours.\
*6* For even more protection (redundancy of extended TTL), add the "Send email" alert action with a "Message" like 'The alert condition for "$name$" was triggered and the result was $SRLA_RESULT$'.  With default settings (easy to modify), this causes the search results from a resurrection ("action.email.ttl" = '86400') to last 1 day.
disabled = 1
dispatch.earliest_time = 0
display.events.fields = ["cs_username","cs_uri_scheme","cs_uri_query","cs_uri_port","cs_uri_path","cs_method","cs_host","cs_categories","cs_bytes","cs_auth_group","cs_User_Agent","cs_Referer","c_port","c_ip","sc_status","sc_filter_result","sc_bytes","s_supplier_name","s_ip","s_hierarchy","s_action","rs_Content_Type","r_supplier_ip","x_virus_id","RecordNotes","Outcome","NumEscaped","LaunchCoords","Interceptor","Infiltrators","Enforcer","AttackVessel","ActionTime","ActionDate","sourcetype","Interceptor.RecordNotes","Interceptor.Outcome","Interceptor.NumEscaped","Interceptor.LaunchCoords","Interceptor.Infiltrators","Interceptor.Enforcer","Interceptor.AttackVessel","Interceptor.AttackCoords","Interceptor.ActionTime","Interceptor.ActionDate","source","host","status","data.cpu_pct","data.cpu_idle_pct","b","search_commands{}.duration","data.avg_service_ms","data.avg_total_ms","cpu_seconds","write_cpu_seconds","rtsearch_filter_seconds","service_cpu_seconds"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = Self-Resurrecting_Lookup_Alerts
request.ui_dispatch_view = search
search = | `Self-Resurrecting_Lookup_Alerts("Self-Resurrecting_Lookup_Alerts")`

