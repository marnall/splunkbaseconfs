[Self-Resurrecting_Lookup_Alerts(1)]
args = lookupName_INPUT
definition = makeresults\
| rename COMMENT1of2 AS "First, load in this search's context details (owner, app, name) using its SID."\
| rename COMMENT2of2 AS "Yes, this means that ad-hoc searches using this macro cannot resurrect."\
| addinfo\
| map maxsearches=1 search="\
| rest splunk_server=local /services/search/jobs/$info_sid$\
| rename eai:acl.* AS *, eai:* AS *\
| rename label AS name\
| replace \"\" WITH \"Ad-Hoc\" IN name\
| rename ttl AS ttl_seconds\
| eval info_sid=\"$info_sid$\"\
| eval info_sid = coalesce($info_sid$, \"$info_sid$\")\
| table ttl_seconds name app owner info_sid\
"\
\
| rename COMMENT AS "Next, inspect all recent runs of this (presumably-scheduled) search."\
| map maxsearches=1 search="\
| rest splunk_server=local /servicesNS/$owner$/$app$/search/jobs/\
| search label=\"$name$\"\
| rename eai:acl.* AS *, eai:* AS *\
| rename label AS name\
| replace \"\" WITH \"Ad-Hoc\" IN name\
| rename ttl AS ttl_seconds\
| eval info_sid = coalesce($info_sid$, \"$info_sid$\")\
| eventstats count(eval(resultCount > 1)) AS sids_with_lookup_data\
| where isDone == 1 AND isFailed == 0\
AND sid != info_sid\
AND ((sids_with_lookup_data  > 0 AND resultCount  > 1)\
  OR (sids_with_lookup_data == 1 AND resultCount == 1))\
| sort 1 - published\
| rename COMMENT AS \"The following line is so that Ad-Hoc & First-Time Runs don't generate loadjob errors.\"\
| appendpipe [ stats count | where count==0 | fields - count\
| eval          app = \"$app$\"\
| eval         name = \"$name$\"\
| eval        owner = \"$owner$\"\
| eval  ttl_seconds = round($ttl_seconds$)\
| eval [ | makeresults | addinfo | rename info_sid AS sid | fields - _time info_* | eval `SRLA_fieldname_prefix_string`_RESULT=\"DropMe\" | eval search = \"sid=\\\"\" . sid . \"\\\"\"]\
]\
| table ttl_seconds name app owner sid published\
"\
\
| rename COMMENT AS "Now, load saved/scheduled search details to determine viability."\
| map maxsearches=1 search="\
| rest splunk_server=local /servicesNS/$owner$/$app$/saved/searches search=\"is_scheduled=1 disabled=0\"\
| search title=\"$name$\"\
| head 1\
| rename eai:acl.* AS *, eai:* AS *\
| rename dispatch.ttl AS ttl_setting\
| rename title AS name\
| eval             sid = coalesce($sid$, \"$sid$\")\
| eval     ttl_seconds = $ttl_seconds$\
| table name owner app cron_schedule next_scheduled_time ttl_seconds ttl_setting sid\
"\
\
| rename COMMENT AS "The following line is so that Ad-Hoc & First-Time Runs don't generate loadjob errors."\
| appendpipe [ stats count | where count==0 | fields - count\
| fillnull value="Ad-Hoc" cron_schedule next_scheduled_time ttl_seconds ttl_setting\
| eval [ | makeresults | addinfo | rename info_sid AS sid | fields - _time info_* | eval `SRLA_fieldname_prefix_string`_RESULT="DropMe" | eval search = "sid=\"" . sid . "\""] ]\
\
| rename COMMENT AS "Finally, check the status of the lookup file/data"\
| inputlookup append=t $lookupName_INPUT$\
| stats                       count AS initial_event_count\
                         first(sid) AS sid\
                 first(ttl_seconds) AS ttl_seconds\
                 first(ttl_setting) AS ttl_setting\
               first(cron_schedule) AS cron_schedule\
         first(next_scheduled_time) AS next_scheduled_time\
| eval initial_event_count = initial_event_count - 1\
\
| rename COMMENT AS "Last, if possible, do the resurrection (will force 'null' changes if not actually necessary)."\
| eval trueForResurrectionOrFalseForOK= if(initial_event_count==0, "true()", "false()")\
| map maxsearches=1 search="\
| loadjob $sid$\
| rename COMMENT AS \"Do not save the summary event to the resurrected lookup file\"\
| where isnull(`SRLA_fieldname_prefix_string`_RESULT) AND isnull(`SRLA_fieldname_prefix_string`_initial_event_count)\
| fields - `SRLA_fieldname_prefix_string`_*\
| eval `SRLA_fieldname_prefix_string`_which = \"loadjob\"\
| reverse\
| appendpipe [\
| where [ | makeresults | eval return=$trueForResurrectionOrFalseForOK$ | return $return ]\
| fields - `SRLA_fieldname_prefix_string`_which\
| reverse\
| outputlookup override_if_empty=false $lookupName_INPUT$\
| stats count AS final_event_count\
| eval initial_event_count = $initial_event_count$\
| eval         ttl_seconds = $ttl_seconds$\
| eval         ttl_setting = \"$ttl_setting$\"\
| eval       cron_schedule = $cron_schedule$\
| eval next_scheduled_time = $next_scheduled_time$\
| eval next_scheduled_time = coalesce(strptime(next_scheduled_time, `SRLA_timeformat_next_scheduled_time`), next_scheduled_time)\
| eval                time = now()\
| eval cron_span = round(next_scheduled_time - time)\
| rex field=ttl_setting \"^(?<number_of_periods>\d+)[pP]$\"\
| fillnull value=\"Ad-Hoc\" number_of_periods\
| eval RESULT = \"PRELIMINARY\"\
| eval which = \"summary\"\
| rename * AS `SRLA_fieldname_prefix_string`_*\
]\
| reverse\
"\
\
| rename COMMENT AS "The following line is so that Ad-Hoc & First-Time Runs don't fail completely."\
| appendpipe [\
| stats count AS `SRLA_fieldname_prefix_string`_initial_event_count\
| where `SRLA_fieldname_prefix_string`_initial_event_count==0\
| eval `SRLA_fieldname_prefix_string`_RESULT = "PRELIMINARY", `SRLA_fieldname_prefix_string`_which = "summary" ]\
\
| fieldformat           `SRLA_fieldname_prefix_string`_cron_span = tostring(`SRLA_fieldname_prefix_string`_cron_span, "duration")\
| fieldformat         `SRLA_fieldname_prefix_string`_ttl_seconds = if(isnum(`SRLA_fieldname_prefix_string`_ttl_seconds), tostring(`SRLA_fieldname_prefix_string`_ttl_seconds, "duration"), `SRLA_fieldname_prefix_string`_ttl_seconds)\
| fieldformat `SRLA_fieldname_prefix_string`_next_scheduled_time = if(isnum(`SRLA_fieldname_prefix_string`_next_scheduled_time), strftime(`SRLA_fieldname_prefix_string`_next_scheduled_time, `SRLA_timeformat_for_output_display`), `SRLA_fieldname_prefix_string`_next_scheduled_time)\
| fieldformat                `SRLA_fieldname_prefix_string`_time = strftime(`SRLA_fieldname_prefix_string`_time, `SRLA_timeformat_for_output_display`)\
\
| rename COMMENT01of10 AS "At this point, there should be one summary event on top to describe what happened"\
| rename COMMENT02of10 AS "and, if it was found, below this the stored results from the previous alert run, or,"\
| rename COMMENT03of10 AS "more-preferably, the data that is currently inside of the lookup, if we can load it."\
| rename COMMENT04of10 AS "In either case, we must ALWAYS hold on to a full copy of the lookup, so that data is preserved"\
| rename ComMENT05of10 AS "inside this job artifact, so that it is available next time, in case ressurection is required."\
| rename COMMENT06of10 AS "If you are using a lookup DEFINITION (as opposed to a lookup FILENAME),"\
| rename COMMENT07of10 AS "and a resurrection is done, then it is likely that the 'inputlookup' below which"\
| rename COMMENT08of10 AS "reloads the data will fail (only on this run because we just wrote it), which will"\
| rename COMMENT09of10 AS "cause a 'The lookup table requires a .csv or KV store lookup definition.' error."\
| rename COMMENT10of10 AS "However everything will work as usual/expected on future runs."\
| inputlookup append=t $lookupName_INPUT$\
\
| rename COMMENT AS "Keep only the top summary event PLUS the BEST copy (which='inputlookup' preferred) of the lookup data."\
| eval `SRLA_fieldname_prefix_string`_which = nullif(coalesce(`SRLA_fieldname_prefix_string`_which, "inputlookup"), "summary")\
| eventstats dc(`SRLA_fieldname_prefix_string`_which) AS `SRLA_fieldname_prefix_string`_which_count\
| where isnotnull(`SRLA_fieldname_prefix_string`_RESULT) OR `SRLA_fieldname_prefix_string`_which_count==1 OR `SRLA_fieldname_prefix_string`_which="inputlookup"\
| fields - `SRLA_fieldname_prefix_string`_which*\
\
| rename COMMENT AS "Finalize Everything that happened."\
| eventstats count AS `SRLA_fieldname_prefix_string`_final_event_count\
| eval `SRLA_fieldname_prefix_string`_final_event_count = if(isnull(`SRLA_fieldname_prefix_string`_RESULT), null(), `SRLA_fieldname_prefix_string`_final_event_count - 1)\
| eval `SRLA_fieldname_prefix_string`_RESULT = if(isnull(`SRLA_fieldname_prefix_string`_RESULT), null(), case(\
   NOT isnum(`SRLA_fieldname_prefix_string`_initial_event_count) OR NOT isnum(`SRLA_fieldname_prefix_string`_final_event_count), "BUG: '`SRLA_fieldname_prefix_string`_*_event_count' fields not numbers!",\
   NOT isnum(`SRLA_fieldname_prefix_string`_next_scheduled_time) AND isnum(`SRLA_fieldname_prefix_string`_ttl_seconds), "BAD:Macro 'SRLA_timeformat_next_scheduled_time' (" . `SRLA_timeformat_next_scheduled_time` . ") not working; fix it!",\
   (isnum(`SRLA_fieldname_prefix_string`_number_of_periods) AND `SRLA_fieldname_prefix_string`_number_of_periods < 2) OR `SRLA_fieldname_prefix_string`_ttl_seconds < (`SRLA_fieldname_prefix_string`_cron_span * 2),\
   "BAD:Search 'dispatch.ttl' (" . `SRLA_fieldname_prefix_string`_ttl_setting . ") and/or 'cron_schedule' (" . `SRLA_fieldname_prefix_string`_cron_schedule . ") may not allow search artifacts to live long enough for this macro to always function correcly; switch 'dispatch.ttl' to '2P'.",\
   `SRLA_fieldname_prefix_string`_initial_event_count > 0, "OK",\
   `SRLA_fieldname_prefix_string`_final_event_count   > 0, "OK:Resurrected",\
   NOT isnum(`SRLA_fieldname_prefix_string`_ttl_seconds),  "BAD:The data is gone and Ad-Hoc runs cannot resurrect!",\
   true(), "BAD:Disaster has struck, the data is gone, and resurrection failed!"))\
| table `SRLA_fieldname_prefix_string`_* _* *\
```\
| rename COMMENT0of4 AS "Unfortunately, this section DOES NOT WORK and probably cannot be made to work"\
| rename COMMENT1of4 AS "Override the TTL to the optimal value of '2P' seconds.  If TTL"\
| rename COMMENT2of4 AS "is too small and this macro won't work, but if it is too large,"\
| rename COMMENT3of4 AS "we will be overfilling the dispatch directory with too many large search artifacts."\
| rename COMMENT4of4 AS "Yes, this is complicated but no other approach allows us to programatically use '| noop set_ttl='."\
| noop [\
| makeresults\
| addinfo\
| rename COMMENT AS "Convert sub-sid to main/root/outer-sid"\
| rex field=info_sid mode=sed "s/subsearch_//g s/_.*$//"\
| map maxsearches=1 search="\
| rest splunk_server=local /services/search/jobs/$info_sid$\
| rename eai:acl.* AS *, eai:* AS *\
| rename label AS name\
| replace \"\" WITH \"Ad-Hoc\" IN name\
| table name app owner"\
| rename COMMENT AS "Now, load saved/scheduled search details to set TTL."\
| map maxsearches=1 search="\
| rest splunk_server=local /servicesNS/$owner$/$app$/saved/searches search=\"is_scheduled=1 disabled=0\"\
| search title=\"$name$\"\
| rename eai:acl.* AS *, eai:* AS *\
| table next_scheduled_time\
| eval set_ttl = round(strptime(next_scheduled_time, `SRLA_timeformat_next_scheduled_time`) - now())\
"\
| eval set_ttl = "set_ttl=" . set_ttl\
| return $set_ttl ]\
```
errormsg = DESCRIPTION: Author = Gregg Woodcock
iseval = 0

[SRLA_fieldname_prefix_string]
definition = SRLA
errormsg = DESCRIPTION: Author = Gregg Woodcock
iseval = 0

[SRLA_timeformat_next_scheduled_time]
definition = "%F %T %Z"
errormsg = DESCRIPTION: Author = Gregg Woodcock; the initual "Definition" of '%F %T %Z' is for when using "en_US" language/URIs.
iseval = 0

[SRLA_timeformat_for_output_display]
definition = `SRLA_timeformat_next_scheduled_time`
errormsg = DESCRIPTION: Author = Gregg Woodcock; this setting is arbitrary (whatever admin prefers).
iseval = 0
