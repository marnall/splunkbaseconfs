[m365:teams:callRecord]

TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%Q
TIME_PREFIX = "startDateTime": 
#The timestamp lookahead below starts at wherever TIME_PREFIX stops.  
MAX_TIMESTAMP_LOOKAHEAD = 35
KV_MODE = json

FIELDALIAS-call_id = id AS call_id


# NOTE type=peerToPeer is a Teams Call and type=groupCall is a meeting.  
# NOTE: caller vs calling:
#   by our convention,  the participants in a call are "calling" parties. 
#   (and in the teams data itself, the host is included as one of those)
#   and the "called" party fields ONLY hold the host/organizer. 
# NOTE: orig vs dest
#   likewise orig aligns with 'calling'  and dest with 'called' (see above)
# NOTE: callerNetwork and calleeNetwork
#   I'm not sure that we have complete unambiguous information about how this aligns 
#   reliably to the above or for that matter whether it aligns reliably. so... pass.

# the calling Parties are the participants (think of them "calling in" to the meeting). 
FIELDALIAS-callingPartyName = participants{}.user.displayName AS callingPartyName
FIELDALIAS-callingPartyId = participants{}.user.id AS callingPartyId

# calledParty,  just by our convention, only shows the host of meetings
FIELDALIAS-calledPartyName = organizer.user.displayName AS calledPartyName
FIELDALIAS-calledPartyId = organizer.user.id AS calledPartyId





# When this is available, it seems like we should take advantage of it. 
# Appears to be the "best" IP address to use, though I'll be OK if we decide a different one is better.
# NOTE - on crumble, indexing from files, these did not work as FIELDALIAS, with or without mvdedup, and worked fine with EVAL
EVAL-src_ip = mvdedup('sessions{}.segments{}.media{}.callerNetwork.reflexiveIPAddress')
EVAL-dest_ip = mvdedup('sessions{}.segments{}.media{}.calleeNetwork.reflexiveIPAddress')


# Replaced with EVAL because we have several options, and the spec files suggest not
# combining fieldalias with eval to override it, but just using eval.
# The "session" information really does seem better, but may not always be available.
#FIELDALIAS-destDeviceName = participants{}.device.displayName as destDeviceName
#FIELDALIAS-origDeviceName = organizer.device.displayName as origDeviceName
EVAL-destDeviceName = if('organizer.device.displayName'="*" AND 'participants{}.device.displayName'!=null, 'participants{}.device.displayName', 'sessions{}.callee.name')
EVAL-origDeviceName = if('participants{}.device.displayName'="*" AND 'organizer.device.displayName'!=null, 'organizer.device.displayName', 'sessions{}.caller.name')


# I'm not sure this conversion is needed, might have been from before I eval'ed the duration.
# But since we have a duration that works already, we may be able to leave this in its formatted version.
EVAL-endDateTime = strptime(endDateTime,"%Y-%m-%dT%H:%M:%S.%Q")
EVAL-callMediaType = 'modalities{}'
EVAL-duration = round(strptime(endDateTime,"%Y-%m-%dT%H:%M:%S.%Q") - strptime(startDateTime,"%Y-%m-%dT%H:%M:%S.%Q"),2) 
EVAL-data_type = "teams"


##############################################
##NOTE - these are ignored for data that comes in via HEC.  
#but they are here for cases where folks ingest this data via normal data inputs, ie from json files sitting on disk.
SHOULD_LINEMERGE = true
BREAK_ONLY_BEFORE_DATE = false
BREAK_ONLY_BEFORE = ^({|\[)
# this is too small for pretty-printed data. 
# for what our pilot customer is currently indexing (2/13/2024), one event in 30 is 150k lines if the json were pretty-printed
MAX_EVENTS = 55000
##############################################


# this old sourcetype from version 0.2 is no longer fully supported.  
# but we rename it just in case folks still have the data out there.
[teams_json]
rename = m365:teams:callRecord
