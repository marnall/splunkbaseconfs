[sampling(1)]
args = param
definition = lookup sampling_lookup exp_ip flow_smpl_id OUTPUT smpl_int | eval $param$=if(isnull(smpl_int),$param$,$param$*smpl_int)

[get_anomaly_classification(2)]
args = result, rule_id
definition = eval $result$ = case($rule_id$ == 20191, "Protocol: " . upper(protocol) . " - abnormal network traffic", $rule_id$ == 20192, "Elevated new IP addresses arrival rate", $rule_id$ == 20193, "Elevated noise level in the network", $rule_id$ == 20194, "Anomalous number of TCP/IP " . flood_type . " messages", $rule_id$ == 20197, upper(protocol_name) . "/" . upper(dest_service) . " abnormal traffic", $rule_id$ == 20199, "\"Sockstress\" condition")

[commas_formatting(2)]
args = result, amount
definition = eval "$result$" = $amount$ | fieldformat "$result$" = tostring('$result$',"commas")

[commas_formatting(3)]
args = result, amount, decimals
definition = eval "$result$" = round($amount$,$decimals$) | fieldformat "$result$" = tostring('$result$',"commas")

[format_port_column(2)]
args = result, port
definition = lookup port_lookup port AS $port$ OUTPUT service AS service | strcat $port$ "/" transport " (" service ")" $result$

[create_indicator_description]
definition = rex field=indicator "^(?<parta>.*?):?(?<part7>(?:7-.*?)*):?(?<part9>9-SOCK)?$"                                                 \
             | lookup ddos_indicators_lookup indicator AS parta OUTPUT indicator_description                                                \
             | eval part7 = replace(part7, "7-([^-]*)-([^:]*)", "Application level \1 \2 flood attack")                                     \
             | eval part7 = replace(part7, "TSU", "TCP \"Tsunami\"")                                                                        \
             | eval part7 = replace(part7, ":", " and ")                                                                                    \
             | eval indicator_description = if(part7 != "", indicator_description . " and " . part7, indicator_description)                 \
             | eval indicator_description = if(part9 != "", indicator_description . " and \"Sockstress\" condition", indicator_description) \
             | eval indicator_description = replace(indicator_description, "^unknown and ", "")                                             \
             | eval indicator_description = replace(indicator_description, "^NONE and ", "")

[assign_attacker_victim]
definition = lookup my_subnets_lookup subnet AS src_ip OUTPUT description AS src_subnet \
             | lookup my_subnets_lookup subnet AS dest_ip OUTPUT description AS dest_subnet \
             | where NOT (src_subnet=="external" AND dest_subnet=="external") \
             | eval attacker_ip = if(nfc_id=="20067",src_ip,if((src_subnet=="external" AND dest_subnet!="external"),src_ip,if((src_subnet!="external" AND dest_subnet=="external"),dest_ip,src_ip))) \
             | eval victim_ip = if(nfc_id=="20067",dest_ip,if((src_subnet=="external" AND dest_subnet!="external"),dest_ip,if((src_subnet!="external" AND dest_subnet=="external"),src_ip,dest_ip))) \
             | iplocation allfields=false attacker_ip \
             | fillnull value="N/A"  Country \
             | rename Country as attacker_country \
             | rename lon as attacker_lon \
             | rename lat as attacker_lat