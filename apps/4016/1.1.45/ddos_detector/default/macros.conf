[populate_nfo_hostnames]
definition = inputlookup nfo_exp_lookup | dedup nfo_hostname | table nfo_hostname

[populate_exporter_list_by_nfo_hostname(1)]
args = nfo_hostname
definition = inputlookup nfo_exp_lookup | search nfo_hostname="$nfo_hostname$"                       \
            | `get_exporter_name(name)`                                                              \
            | table exp_ip name                                                                      \
            | dedup exp_ip                                                                           \
            | sort name                                                                              \
            | eval name=if((name==exp_ip),exp_ip,if(exp_ip=="*","All",name))

[get_exporter_name(1)]
args = result
definition = lookup interfaces_20003_lookup nfo_hostname exp_ip OUTPUT SNMPDeviceName \
            | eval SNMPDeviceName=mvindex(SNMPDeviceName,0) \
            | fillnull value="unknown" SNMPDeviceName \
            | eval $result$ = if(SNMPDeviceName=="unknown", exp_ip, SNMPDeviceName) \
            | eval $result$ = if(($result$==exp_ip),exp_ip,exp_ip." (".$result$.")")


[ddos_alert_search(1)]
args = confidence_level
definition = `netflow_search_rule_20196`                                                          \
             | rex field=confidence "(?<confidence_value>\d+)\/(?<confidence_threshold>\d+)"      \
             | eval alerting_level = case(lower("$confidence_level$") == "all",                0, \
                                          lower("$confidence_level$") == "medium and above", 110, \
                                          lower("$confidence_level$") == "high and above",   150, \
                                          lower("$confidence_level$") == "very high",        190, \
                                          1 == 1, "$confidence_level$")                           \
             | where confidence_value >= tonumber(alerting_level)                                 \
             | stats latest by exp_ip indicator alerting_level                                    \
             | `create_indicator_description`                                                     \
             | addinfo                                                                            \
             | eval info_max_time=round(info_max_time)                                            \
             | eval info_min_time=round(info_min_time) 

[netflow_index]
definition = sourcetype=flowintegrator

[ddos_detector_si]
definition = index=summary

[netflow_search_expert_ddos_rules]
