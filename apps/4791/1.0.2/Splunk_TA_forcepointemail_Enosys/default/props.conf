[forcepointemail:sec]
category = Email
description = Output syslog produced by Forcepoint Email Security server 
pulldown_type = true
KV_MODE = none
SHOULD_LINEMERGE = false
TIME_PREFIX = rt=
MAX_TIMESTAMP_LOOKAHEAD = 256

REPORT-extract = forcepointemail_extract, forcepointemail_cs1_virus, forcepointemail_stz_recipient, forcepointemail_stz_sender, forcepointemail_stz_orig_recipient, forcepointemail_stz_cc, forcepointemail_stz_return_addr, forcepointemail_fnameandfilehash_split, forcepointemail_url_split
LOOKUP-forcepointemail_actions = forcepointemail_actions_lookup event act OUTPUT action
LOOKUP-forcepointemail_policy_filter_actions = forcepointemail_policy_filter_actions_lookup event act OUTPUT filter_action

##Alias##
FIELDALIAS-message_id = messageId AS message_id
FIELDALIAS-dest = dst AS dest
FIELDALIAS-email_size = in AS size
FIELDALIAS-src_for_message = trueSrc AS src
FIELDALIAS-subject_for_message = msg AS subject
FIELDALIAS-status_code = deliveryCode AS status_code
FIELDALIAS-src_user = suser AS src_user
FIELDALIAS-detectionMethod = cat AS detectionMethod

##Process fields##
EVAL-vendor_product = "Forcepoint:Email Security"
EVAL-process = if(isnotnull('x_mailer'),'x_mailer',unknown) 
EVAL-process = if(isnotnull('x_mailer'),'x_mailer',unknown)
EVAL-user = case(match(deviceDirection,"0"), 'duser', deviceDirection=="1", 'suser')

##Specific for Policy##
FIELDALIAS-rule = viceProcessName AS rule
FIELDALIAS-policy = deviceFacility AS policy
FIELDALIAS-exceptionreason_signature_extra = exceptionReason AS signature_extra
FIELDALIAS-reason_signature_extra = reason AS signature_extra
EVAL-direction = case(match(deviceDirection,"0"), "inbound", deviceDirection=="1", "outbound")
EVAL-signature = if(isnotnull('cs1'),'cs1','deviceProcessName')


