[forcepointemail_extract]
REGEX = \s([a-zA-Z-]+)=(?!\s)\"?(((?!\"?\s[a-zA-Z-0-9]+=).)+)?\"?(?<!=\"\")(?=\s|$)
FORMAT = $1::$2

[forcepointemail_cs1_virus]
SOURCE_KEY = _raw
REGEX = (?<=cs1=)(?<cs1>[^\=]+)?\s

[forcepointemail_fnameandfilehash_split]
SOURCE_KEY = fnameAndfileHash
REGEX = (?<file_name>\w[^.]*+[^\|]+)?\|(?<file_hash>[^\|]+)?\|(?<x_filter>[^;]+)?;?
FORMAT = file_name::$1 file_hash::$1 x_filter::$1
MV_ADD = 1

[forcepointemail_url_split]
SOURCE_KEY = url
REGEX = (?<x_url>\w[^.]*+[^\|]+)?\|(?<x_category>[^\|]+)?\|(?<x_filter>[^;]+)?;?
FORMAT = x_url::$1 x_category::$1 x_filter::$1
MV_ADD = 1

[forcepointemail_stz_recipient]
SOURCE_KEY = to
REGEX = ([.\w]{3,}@[.\w]{5,})
FORMAT = recipient::$1
MV_ADD = 1

[forcepointemail_stz_sender]
SOURCE_KEY = from
REGEX = ([.\w]{3,}@[.\w]{5,})
FORMAT = sender::$1

[forcepointemail_stz_orig_recipient]
SOURCE_KEY = duser
REGEX = ([.\w]{3,}@[.\w]{5,})
FORMAT = orig_recipient::$1
MV_ADD = 1

[forcepointemail_stz_cc]
SOURCE_KEY = cc
REGEX = ([.\w]{3,}@[.\w]{5,})
FORMAT = recipient::$1
MV_ADD = 1

[forcepointemail_stz_return_addr]
SOURCE_KEY = replyTo
REGEX = ([.\w]{3,}@[.\w]{5,})
FORMAT = return_addr::$1
MV_ADD = 1

[forcepointemail_actions_lookup]
filename = forcepointemail_actions.csv
match_type = WILDCARD(act)

[forcepointemail_policy_filter_actions_lookup]
filename = forcepointemail_policy_filter_actions.csv
