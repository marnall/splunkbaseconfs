[default]

[monitor://$SPLUNK_HOME/etc/apps/SOCPrimeSSLFramework/reports]
index = ssl_framework
disabled = false

[script://$SPLUNK_HOME/etc/apps/SOCPrimeSSLFramework/bin/clear-old-reports.py]
sourcetype = framework
disabled = false
interval = 0 11 2 * *
index = ssl_framework

[script://$SPLUNK_HOME/etc/apps/SOCPrimeSSLFramework/bin/ssl-framework-report.py -c '$SPLUNK_HOME/etc/apps/SOCPrimeSSLFramework/default/sslframework.conf']
sourcetype = framework
disabled = 0
interval = 0 4 * * *
index = ssl_framework
passAuth = splunk-system-user

[script://$SPLUNK_HOME/etc/apps/SOCPrimeSSLFramework/bin/ssl_framework_setup_handler.py]
passAuth = splunk-system-user
