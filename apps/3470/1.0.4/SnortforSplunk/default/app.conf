[default]

[install]
build = 2
is_configured = 0

[launcher]
description = This application ingests the Unified2 logs from Barnyard2 on a pfSense firewall using Snort, that is configured to output the information to Splunk via the UDP protocol on port 514. The application is configured to do multiline reads of the incoming data and provides a graphical display on the dashboard along with a map pinpointing the source IP location. The application sets the default dashboard from Splunk to that of the application.
author = Darryl Mackay
version = 1.0.4

[package]
id = SnortforSplunk

[ui]
label = Snort for Splunk
is_visible = 1

