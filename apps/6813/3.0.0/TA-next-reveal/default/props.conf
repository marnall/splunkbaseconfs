[source::...ta-next-reveal*.log*]
SHOULD_LINEMERGE = true
sourcetype = tanextreveal:log

[source::...ta_next_reveal*.log*]
SHOULD_LINEMERGE = true
sourcetype = tanextreveal:log

[Reveal:EventStream:Any:JSON]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[Reveal:EventStream:Detections:JSON]
EVAL-file_name = mvappend('event.metadata.file_name{}','event.metadata.target_file_name{}')
EVAL-file_path = mvappend('event.metadata.file_path{}','event.metadata.target_file_path{}')
EVAL-process_name = mvappend('event.process_info{}.binary_name','event.metadata.application_name{}')
EVAL-user = mvappend('event.user_email','event.process_info{}.username')
EVAL-user_name = mvappend('event.user_name','event.process_info{}.username','event.metadata.account_name{}')
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_1 = event.metadata.wifi_ssid{} AS ssid
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_10 = event.metadata.destination_port AS dest_port
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_13 = event.description AS description
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_2 = event.metadata.sender_mail_address{} AS src_user
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_3 = event.metadata.recipient_mail_address{} AS recipient
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_4 = event.metadata.url{} AS url
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_5 = event.metadata.host{} AS url_domain
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_6 = event.metadata.source_ip{} AS src_ip
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_7 = event.metadata.destination_ip{} AS dest_ip
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_8 = event.agent_hostname AS host
FIELDALIAS-aob_gen_Reveal_EventStream_Detections_JSON_alias_9 = event.metadata.source_port{} AS src_port
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[Reveal:EventStream:Incidents:JSON]
FIELDALIAS-aob_gen_Reveal_EventStream_Incidents_JSON_alias_1 = event.description AS description
FIELDALIAS-aob_gen_Reveal_EventStream_Incidents_JSON_alias_4 = event.new_entity.agent.agent_hostname AS host
FIELDALIAS-aob_gen_Reveal_EventStream_Incidents_JSON_alias_6 = event.type AS type
FIELDALIAS-aob_gen_Reveal_EventStream_Incidents_JSON_alias_7 = event.score AS severity_id
FIELDALIAS-aob_gen_Reveal_EventStream_Incidents_JSON_alias_9 = event.new_entity.user.user_name AS user_name
EVAL-user = mvappend('event.new_entity.user.user_name', 'event.new_entity.user.user_email')
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[Reveal:EventStream:AuditLogs:JSON]
EVAL-user = mvappend('event.fields.auth.operator_login_name','event.fields.auth.operator_display_name','event.fields.username')
FIELDALIAS-aob_gen_Reveal_EventStream_AuditLogs_JSON_alias_1 = event.fields.summary AS description
FIELDALIAS-aob_gen_Reveal_EventStream_AuditLogs_JSON_alias_2 = event.type AS type
FIELDALIAS-aob_gen_Reveal_EventStream_AuditLogs_JSON_alias_6 = event.fields.auth.operator_display_name AS user_name
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
