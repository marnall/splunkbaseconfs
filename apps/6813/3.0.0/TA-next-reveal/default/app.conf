# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = false
state = enabled
build = 19

[launcher]
author = Fortinet
version = 3.0.0
description = This technology add-on provides a simple way to connect to your FortiDLP tenant so that detection, incident, and audit log events can be pulled into Splunk. Leverage detections to gain insight into unauthorized and unusual user activities on endpoints and strengthen your data loss prevention strategy. Use incidents to cut down triage and investigation time by viewing detections that have been grouped together because they have the same root cause. Access audit logs to capture details about operator interactions with the FortiDLP console and FortiDLP API, providing you with important compliance and security information for your organization.

[ui]
is_visible = 1
label = FortiDLP Technology Add-on
docs_section_override = AddOns:released

[package]
id = TA-next-reveal

[triggers]
reload.addon_builder = simple
reload.ta_next_reveal_account = simple
reload.ta_next_reveal_settings = simple
reload.passwords = simple