[cdr_events]
definition = `custom_index` sourcetype=shoretel_call 

[mediastream_events]
definition = `custom_index` sourcetype=shoretel_mediastream 

[cdr_and_mediastream_events]
definition = `custom_index` ( sourcetype=shoretel_call OR sourcetype=shoretel_mediastream )

[custom_index]
definition = index=shoretel

[shutdown_stream_when_both_sourcetypes_present]
definition = | eval sourcetype=case(sourcetype=="shoretel_call","call",sourcetype=="shoretel_mediastream","mediastream",true(),sourcetype) | streamstats dc(sourcetype) as sourcetypeCount count as totalEventCount | streamstats count as thisSourcetypesCount by sourcetype | eval thisSourcetypesCount=if(sourcetypeCount<2,0,min(thisSourcetypesCount,50)) | streamstats dc(thisSourcetypesCount) as extraEventCount | head (sourcetypeCount<3 AND totalEventCount<5000 AND extraEventCount<51) | fields - sourcetypeCount totalEventCount thisSourcetypesCount extraEventCount

[split_apart_mediastream_events]
definition = eval A_combined=A_Extension + ":::" + A_IP_Address + ":::" + A_LineID + ":::" + A_LostPackets + ":::" + A_MaxJitter + ":::" + A_Name + ":::" + A_Overruns + ":::" + A_PartyType + ":::" + A_PartyTypeDescription + ":::" + A_PartyTypeName + ":::" + A_PayloadSecurity + ":::" + A_SiteID + ":::" + A_SiteName + ":::" + A_TotalPackets + ":::" + A_Underruns | eval B_combined=B_Extension + ":::" + B_IP_Address + ":::" + B_LineID + ":::" + B_LostPackets + ":::" + B_MaxJitter + ":::" + B_Name + ":::" + B_Overruns + ":::" + B_PartyType + ":::" + B_PartyTypeDescription + ":::" + B_PartyTypeName + ":::" + B_PayloadSecurity + ":::" + B_SiteID + ":::" + B_SiteName + ":::" + B_TotalPackets + ":::" + B_Underruns | eval combined=mvappend(A_combined,B_combined) | mvexpand combined | eval combined=split(combined,":::") | eval Extension=mvindex(combined,0) | eval IP_Address=mvindex(combined,1) | eval LineID=mvindex(combined,2) | eval LostPackets=mvindex(combined,3) | eval MaxJitter=mvindex(combined,4) | eval Name=mvindex(combined,5) | eval Overruns=mvindex(combined,6) | eval PartyType=mvindex(combined,7) | eval PartyTypeDescription=mvindex(combined,8) | eval PartyTypeName=mvindex(combined,9) | eval PayloadSecurity=mvindex(combined,10) | eval SiteID=mvindex(combined,11) | eval SiteName=mvindex(combined,12) | eval TotalPackets=mvindex(combined,13) | eval Underruns =mvindex(combined,14) | fields - A_combined B_combined combined

#Extension IP_Address LineID LostPackets MaxJitter Name Overruns PartyType PartyTypeDescription PartyTypeName PayloadSecurity SiteID SiteName TotalPackets Underruns 

[911_numbers]
definition = Direction="outbound" DialedNumber="911" OR DialedNumber="9911" OR DialedNumber="8911"

[get_fields]
definition = stats first(*) as * | transpose | rename column as field | table field | sort field

[displayed_date_format]
definition = "%m/%d/%Y %H:%M:%S"

[displayed_time_format]
definition = "%H:%M:%S"

[display_all_times_per_format]
definition =  foreach *Time [eval <<FIELD>> = strftime(strptime('<<FIELD>>', "%Y-%m-%d %H:%M:%S.%N"), `displayed_time_format`)]

[fields_for_call_detail]
definition = fields Extension DialedNumber CallerID Direction CallDuration ConnectName DisconnectName PortName from to CallID

[fields_for_internal_parties]
definition = fields number name group subgroup inbound outbound internal total inbound_duration outbound_duration internal_duration total_duration | eval inbound_duration=if(inbound>0,tostring(inbound_duration,"duration"),null()) | eval outbound_duration=if(outbound>0,tostring(outbound_duration,"duration"),null()) | eval internal_duration=if(internal>0,tostring(internal_duration,"duration"),null()) | eval total_duration=if(total>0,tostring(total_duration,"duration"),null()) | eval inbound=if(inbound==0,null(),inbound) | eval outbound=if(outbound==0,null(),outbound) | eval internal=if(internal==0,null(),internal) | eval name=if(name="",null(),name) | eval group=if(group="",null(),group) | eval subgroup=if(subgroup="",null(),subgroup) | fillnull total | fillnull name group subgroup value="(none)" | sort 0 number

[get_quality_field]
definition = eval quality = "pkts lost/total:" . LostPackets . "/" . TotalPackets . " j:" . MaxJitter . " u:" . Underruns . " o:" . Overruns

[get_us_city_and_state(1)]
args = field
definition = lookup us_area_code_exchange_city_state area_code as $field$AreaCode exchange as $field$Exchange OUTPUT city as $field$City state_abbr as $field$StateAbbr county as $field$County ratecenter_zip as $field$Zip

[get_locations]
definition = `get_parsed_phone_number_fields` | `get_us_city_and_state(Extension)` | `get_us_city_and_state(DialedNumber)` | `get_us_city_and_state(CallerID)` | `get_to_and_from`

[get_to_and_from]
definition = eval to=case(isnotnull(DialedNumberStateAbbr),DialedNumberCity + ", " + DialedNumberStateAbbr,isnotnull(DialedNumberCountry),DialedNumberAreaDescription + " (" + DialedNumberCountry + ")",true(),DialedNumberAreaDescription) | eval from=case(isnotnull(CallerIDStateAbbr),CallerIDCity + ", " + CallerIDStateAbbr,isnotnull(CallerIDCountry),CallerIDAreaDescription + " (" + CallerIDCountry + ")",true(),CallerIDAreaDescription) 

[get_lat_long_for_zip(1)]
args = field
definition = lookup zip_codes zip as $field$Zip OUTPUT lat as $field$LatFromLookup long as $field$LongFromLookup | eval $field$Lat=coalesce($field$LatFromLookup,$field$Lat) | eval $field$Long=coalesce($field$LongFromLookup,$field$Long) | eval _geo=$field$Lat+","+$field$Long

[get_parsed_phone_number_fields]
definition = lookup parse_phone_numbers CallerID DialedNumber

[calculate_all_internal_parties]
definition = eval extensionEqualsDialedNumber  = if(replace(Extension,"\+","++")==replace(DialedNumber,"\+","++"),1,0) \
| eval callerIdEqualsExtension = if(replace(CallerID,"\+","++")==replace(Extension,"\+","++"),1,0) \
| eval callerIdEqualsDialedNumber    = if(replace(CallerID,"\+","++")==replace(DialedNumber,"\+","++"),1,0) \
| eval party=case(\
  Direction=="internal" AND extensionEqualsDialedNumber=0,mvappend(Extension,DialedNumber), \
  Direction=="internal" AND extensionEqualsDialedNumber=1,Extension,\
  Direction=="inbound", Extension, \
  Direction=="outbound" AND callerIdEqualsExtension=0,mvappend(CallerID,Extension),\
  Direction=="outbound" AND callerIdEqualsExtension=1,CallerID) \
| fields - extensionEqualsDialedNumber callerIdEqualsExtension callerIdEqualsDialedNumber

[get_call_concurrency(1)]
args = split_by
definition = eval increment = mvappend("1","-1") | mvexpand increment | sort 0 + _time | fillnull $split_by$ value="NULL" | streamstats sum(increment) as post_concurrency by $split_by$ | eval concurrency = if(increment==-1, post_concurrency+1, post_concurrency)

[get_call_concurrency]
definition = eval foo=1 | `get_call_concurrency(foo)` | fields - foo

[timechart_for_concurrency]
# use of last(post_concurrency) is OK here ASSUMING that we always have "| sort 0 + _time" earlier in the pipeline.
definition = timechart bins=400 max(concurrency) as max_concurrency last(post_concurrency) as last_concurrency | filldown last_concurrency* | eval concurrency=coalesce(max_concurrency,last_concurrency) | fields - last_concurrency max_concurrency

[timechart_for_concurrency(1)]
args = split_by
definition = `timechart_for_concurrency($split_by$,400)`

[timechart_for_concurrency(2)]
args = split_by, bins
definition = `timechart_for_concurrency($split_by$,$bins$,60)`

[timechart_for_concurrency(3)]
args = split_by, bins, split_by_limit
# use of last(post_concurrency) is OK here ASSUMING that we always have "| sort 0 + _time" earlier in the pipeline.
definition = timechart bins=$bins$ max(concurrency) as max_concurrency last(post_concurrency) as last_concurrency by $split_by$ limit=$split_by_limit$ | filldown last_concurrency* | foreach "max_concurrency: *" [eval <<MATCHSTR>>=coalesce('max_concurrency: <<MATCHSTR>>','last_concurrency: <<MATCHSTR>>')] | fields - last_concurrency* max_concurrency* | fillnull




[dbxquery_lookup_populator(2)]
args = connection,table
definition = dbxquery query="SELECT * FROM $table$" connection="$connection$" shortnames=t | fields - _raw,_time

[dbxquery_lookup_populator_legacy_dbx1(2)]
args = connection,table
definition = dbquery $connection$ "SELECT * FROM $table$" limit=1000

