[custom_kv]
REGEX = \s([\w\-]+)=(?|"([^"]*)"|(\S*))
FORMAT = $1::$2

[set_filter]
REGEX = .*\s+rprt\s+.*
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::pps_filter_log

[set_mta]
REGEX = \ssendmail\[[^\]]+\]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::pps_mail_log

[internal_use]
filename = internal_use.csv

[ppsmaillog-mta-syserr]
REGEX = SYSERR\((\w+)\):\s(.*)$
FORMAT = runtime_user::$1 smimta_errstr::$2

[ppsmaillog-mta-stat-reason]
REGEX = stat\=\w+\W(.*)
FORMAT = reason::$1

[ppsmaillog-mta-stat]
REGEX = \sstat=([^\:\(]*)
FORMAT = stat::$1

[ppsmaillog-mta-process-qid]
# Specifically stating that a QID is 14 chars removes the NOQUEUE: type
# # milter debug level logs from consideration, but may also affect the
# # use of the relog script to replay log files.
REGEX = (?:sendmail)\[(\d+)\]: (?:\[ID \d+ \S+\]\s)?(?:(\w{14}):)?
FORMAT = process::sendmail pid::$1 qid::$2
