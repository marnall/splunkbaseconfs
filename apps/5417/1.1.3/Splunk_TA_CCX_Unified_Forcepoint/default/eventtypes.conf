##Local(Server) Email Security##
[forcepoint_local_email_delivery]
search = sourcetype="forcepoint:local:email:security" event=Delivery
#tags = email delivery

[forcepoint_local_email_content]
search = sourcetype="forcepoint:local:email:security" event=Message
#tags = email content

[forcepoint_local_email_policy]
search = sourcetype="forcepoint:local:email:security" event=Policy
#tags = email filter

[forcepoint_local_email_policy_malware]
search = sourcetype="forcepoint:local:email:security" event=Policy cs1="*"
#tags = malware attack

[forcepoint_local_email_policy_antispam]
search = sourcetype="forcepoint:local:email:security" cat="*" file_hash="*"
#tags = malware operations

##Cloud Email Security##
[forcepoint_cloud_email_content]
search = sourcetype="forcepoint:cloud:email:security"
#tags = email delivery content filter

[forcepoint_cloud_email_malware_operations]
search = sourcetype="forcepoint:cloud:email:security" signature="phishing*" OR signature="blocked*" OR signature="spoofed*" OR signature="threat*"
#tags = operations malware

[forcepoint_cloud_email_malware_attack]
search = sourcetype="forcepoint:cloud:email:security" virus_name!="None" NOT (filtering_reason="Clean" OR filtering_reason="http*//*")
#tags = attack malware

##Web Security##
[forcepoint_web_proxy]
search = sourcetype="forcepoint:web:security"
#tags = web proxy

[forcepoint_web_intrusion_detection]
search = sourcetype="forcepoint:web:security" (filter_category="Security" OR filter_category="Extended Protection" OR category_id="200")
#tags = ids attack

##Forcepoint DLP##
[forcepoint_data_loss_prevention]
search = sourcetype="forcepoint:dlp"
#tags = dlp incident