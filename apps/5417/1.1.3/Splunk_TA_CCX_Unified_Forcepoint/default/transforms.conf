##Local(Server) Email Security##
##Lookup Definitions##
[forcepoint_local_email_actions_lookup]
filename = forcepointlocalemail_actions.csv
match_type = WILDCARD(act)

[forcepoint_local_email_policy_filter_actions_lookup]
filename = forcepointlocalemail_policy_filter_actions.csv

##Extractions##
[forcepoint_local_email_extract]
REGEX = \s([a-zA-Z-]+)=(?!\s)\"?(((?!\"?\s[a-zA-Z-0-9]+=).)+)?\"?(?<!=\"\")(?=\s|$)
FORMAT = $1::$2

[forcepoint_local_email_cs1_virus]
SOURCE_KEY = _raw
REGEX = (?<=cs1=)(?<cs1>[^\=]+)?\s

[forcepoint_local_email_fnameandfilehash_split]
SOURCE_KEY = fnameAndfileHash
REGEX = (?<file_name>\w[^.]*+[^\|]+)?\|(?<file_hash>[^\|]+)?\|(?<x_filter>[^;]+)?;?
FORMAT = file_name::$1 file_hash::$1 x_filter::$1
MV_ADD = 1

[forcepoint_local_email_url_split]
SOURCE_KEY = url
REGEX = (?<x_url>\w[^.]*+[^\|]+)?\|(?<x_category>[^\|]+)?\|(?<x_filter>[^;]+)?;?
FORMAT = x_url::$1 x_category::$1 x_filter::$1
MV_ADD = 1

[forcepoint_local_email_stz_recipient]
SOURCE_KEY = to
REGEX = ([.\w]{3,}@[.\w]{5,})
FORMAT = recipient::$1
MV_ADD = 1

[forcepoint_local_email_stz_sender]
SOURCE_KEY = from
REGEX = ([.\w]{3,}@[.\w]{5,})
FORMAT = sender::$1

[forcepoint_local_email_stz_orig_recipient]
SOURCE_KEY = duser
REGEX = ([.\w]{3,}@[.\w]{5,})
FORMAT = orig_recipient::$1
MV_ADD = 1

[forcepoint_local_email_stz_cc]
SOURCE_KEY = cc
REGEX = ([.\w]{3,}@[.\w]{5,})
FORMAT = recipient::$1
MV_ADD = 1

[forcepoint_local_email_stz_return_addr]
SOURCE_KEY = replyTo
REGEX = ([.\w]{3,}@[.\w]{5,})
FORMAT = return_addr::$1
MV_ADD = 1

##Cloud Email Security##
##Lookup Definitions##
[forcepoint_cloud_email_actions_lookup]
filename = forcepointcloudemail_actions.csv
match_type = WILDCARD(vendor_action)

##Parsing##
[remove_forcepoint_header_csv]
SOURCE_KEY = _raw
REGEX = ^"Date & Time"
DEST_KEY = queue
FORMAT = nullQueue

##Extractions##
[extract_forcepoint_cloud_email_csv]
#SIEM Default Forcepoint Cloud fields:#
#"Date & Time","Envelope Sender","From: Address","Recipient Address","Subject","Action","Black/Whitelisted","Sender Name","Message Size","Attachment Size","Spam Score","Sender IP","Direction","Policy Name","Filtering Reason","Filtering Time","Blocked Attachment Ext","Attachment File Type","Attachment Filename","Attachment MIME Type","Content Type","Emb. Full URL","Emb. URL Category","File Sandbox Status","Virus Name"#
DELIMS=","
FIELDS="date","envelope_sender","sender","recipient","subject","vendor_action","black_whitelisted","sender_name","message_size","attachment_size","spam_score","sender_ip","direction","policy_name","filtering_reason","filtering_time","x_blocked_ext","file_type","x_file_name","mime_type","content_type","x_emb_url","x_emb_category","file_sandbox_status","virus_name"

##Web Security##
##Lookup Definitions##
[forcepoint_web_action_lookup]
filename = forcepoint_web_actions.csv

[forcepoint_web_severity_lookup]
filename = forcepoint_web_severities.csv

[forcepoint_web_http_status_lookup]
filename = forcepoint_web_httpstatus.csv
match_type = WILDCARD(status)
max_matches = 1

[forcepoint_web_categories_lookup]
filename = forcepoint_web_categories.csv
match_type = WILDCARD(category_id)
max_matches = 1

##Extractions##
[forcepoint_web_keys]
REGEX = (\w+)=([^\s]+(?))
MV_ADD = true
FORMAT = $1::$2

[sourceServer_for_forcepoint_web]
REGEX  = \s+(\S+)\s+vendor=
FORMAT = sourceServer::$1

[OU_for_forcepoint_web]
REGEX = OU\\=([^,]+),?
FORMAT = OU::$1
MV_ADD = true

[CN_for_forcepoint_web]
REGEX = CN\\=([^,]+),?
FORMAT = CN::$1
MV_ADD = true

[DC_for_forcepoint_web]
REGEX = DC\\=([^,]+),?[^\s]*?login
FORMAT = DC::$1
MV_ADD = true

[policy_for_forcepoint_web]
REGEX  = policy=(?!-\s+)(.*?)(?=\S+=|$)
FORMAT = vendor_policy::$1

[http_content_type_for_forcepoint_web]
REGEX  = http_content_type=(?!-\s+)(.*?)(?=\s\S+=|$)
FORMAT = http_content_type::$1

[url_for_forcepoint_web]
REGEX = url=(\S+)
FORMAT = url::$1

[forcepoint_web_x_file_name]
CLEAN_KEYS = 0
FORMAT = x_file_name::$2
REGEX =  url=\w+:\/\/[^\/\s]+\/(.*\/)?([^\s]+\.[a-zA-Z]+)

## Forcepoint DLP ##
[ccx_forcepoint_dlp_kv]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = (?:_+)?([\w.:\[\]]+)=(.*?(?=(?:\s[\w.:\[\]]+=|$)))

[forcepoint_category_dlp]
CLEAN_KEYS = 0
REGEX = (?<category>\w+((?!;).)*)
SOURCE_KEY = cat

[forcepoint_x_file_name_dlp]
CLEAN_KEYS = 0
REGEX = (?<x_file_name>\w+((?!;).)*)
SOURCE_KEY = fname
