##################################################
#         REST Endpoint for OPSEC Add-on         #
##################################################

[expose:ta_opseclea_indexes]
pattern = ta_opseclea/ta_opseclea_indexes
methods = GET

[expose:ta_opseclea_settings]
pattern = ta_opseclea/ta_opseclea_settings/*
methods = POST,GET,DELETE

[expose:ta_opseclea_cert]
pattern = ta_opseclea/ta_opseclea_cert
methods = POST, GET

[expose:ta_opseclea_cert_specified]
pattern = ta_opseclea/ta_opseclea_cert/*
methods = POST, GET, DELETE

[expose:ta_opseclea_cert_specified_action]
pattern = ta_opseclea/ta_opseclea_cert/*/*
methods = POST, GET, DELETE

[expose:ta_opseclea_input]
pattern = ta_opseclea/ta_opseclea_input
methods = POST, GET

[expose:ta_opseclea_input_specified]
pattern = ta_opseclea/ta_opseclea_input/*
methods = POST, GET, DELETE

[expose:ta_opseclea_input_specified_action]
pattern = ta_opseclea/ta_opseclea_input/*/*
methods = POST, GET, DELETE 