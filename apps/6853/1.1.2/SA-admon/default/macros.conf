[activedirectory]
definition = sourcetype=ActiveDirectory
iseval = 0

[admon_groups_recurse]
definition = | rename nestedMember as OldnestedMember | eval OldnestedMember=mvjoin(OldnestedMember,"|")\
| lookup admon_groups_def dn as member OUTPUT member as nestedMember\
| mvexpand nestedMember\
| where 'nestedMember'!='OldnestedMember'\
| makemv delim="|" nestedMember\
| stats values(cn) as cn, values(member) as member, values(nestedMember) as nestedMember, values(memberOf) as memberOf by objectSid\
| eval member=mvdedup(mvappend(member, nestedMember))
iseval = 0
