[Update AD Identities - KV Store]
alert.track = 0
cron_schedule = */10 * * * *
description = Update the admon_identities_def KV Store with admon data.
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `activedirectory` admonEventType IN (Sync,Update,Deleted) objectCategory IN ("CN=Person*", "CN=Computer*", "CN=ms-DS-Group-Managed-Service-Account*")\
| stats latest(distinguishedName) as distinguishedName, latest(DC) as DC, latest(userAccountPropertyFlag) as userAccountPropertyFlag, latest(personalTitle) as personalTitle, latest(displayName) as displayName, latest(givenName) as givenName, latest(sn) as sn, latest(mail) as mail, latest(manager) as manager, latest(department) as department, latest(whenCreated) as whenCreated, latest(_time) as _time latest(sAMAccountName) as sAMAccountName latest(memberOf) as memberOf latest(description) as description latest(title) as title  latest(suffix) as suffix latest(accountExpires) as accountExpires latest(pwdLastSet) as pwdLastSet latest(lastLogonTimestamp) as lastLogonTimestamp latest(msDS_AllowedToDelegateTo) as msDS_AllowedToDelegateTo latest(endDate) as endDate latest(servicePrincipalName) as servicePrincipalName latest(userPrincipalName) as userPrincipalName latest(userAccountControl) as userAccountControl latest(telephoneNumber) as telephoneNumber latest(mobile) as mobile latest(admonEventType) as admonEventType, latest(adminCount) as adminCount latest(objectCategory) as objectCategory latest(l) as work_city latest(co) as work_country by objectSid\
```Configure Default Categories, to be combined by mvappend later```\
| eval cat_domain_controller=if(userAccountPropertyFlag="SERVER_TRUST_ACCOUNT","domain_controller",null), cat_computer_object=if(objectCategory like "CN=Computer%","computer_account",null), cat_user_object=if(objectCategory like "CN=Person%","user_account",null), cat_gmsa=if(objectCategory like "CN=ms-DS-Group-Managed-Service-Account%","group_managed_service_account",null), cat_account_status=if(userAccountPropertyFlag="ACCOUNTDISABLE","disabled","enabled")\
```Recommended Custom Categories\
| eval cat_service_account=if(distinguishedName like "%Service Account%" OR description like "%service account%" OR sAMAccountName like "%svc%","service_account",null)\
| eval cat_exec=if(match(title,"(?i)Director|Chief|CEO|General\sManager|Vice|President"),"vip_account",null)\
| eval cat_da=if(match(memberOf, "(?i)Domain\sAdmins"),"domain_admin",null)\
| eval cat_ea=if(match(memberOf, "(?i)Enterprise\sAdmins"),"enterprise_admin",null)\
| eval cat_exec_assistant=if(match(title, "(?i)Executive\sAssistant"),"executive_assistant",null)\
| eval cat_legal=if(match(title, "(?i)legal"),"legal",null)\
| eval cat_vendor_account=if(match(distinguishedName, "(?i)Vendor Account"),"vendor_account",null)\
```\
```Update as required```\
| eval cat_privileged=if((adminCount=1 OR userAccountPropertyFlag="SERVER_TRUST_ACCOUNT"),"privileged",null)\
```Combine Category fields```\
| foreach cat_*\
      [eval category = mvappend(category, '<<FIELD>>')]\
| eval priority=case(match(category,"vip_account|executive_assistant|legal|domain_admin|enterprise_admin"),"critical",\
match(category,"privileged|service_account|vendor_account"),"high",\
1=1,"medium")\
```Eval other fields```\
| rex field=distinguishedName max_match=100 "DC=(?P<domain>\w+?)(,|$)"\
| eval domain=mvjoin(domain,".")\
| rex field=domain "(?P<netbiosDomainName>.*)\."\
| eval identity=sAMAccountName, downLevelDomainName = upper(netbiosDomainName) + "\\" + 'sAMAccountName', _key=objectSid, phone=mvappend(telephoneNumber,mobile), watchlist="false"\
```Set _delete to true to remove entries from the kv store - entries set to false will remain```\
| eval _delete=if(admonEventType="Deleted","true","false")\
```Update time format to play nice with the uitime macro in ES```\
| eval startDateEpoch = strptime(whenCreated, "%H:%M.%S %p, %a %m/%d/%Y"), startDate = strftime(startDateEpoch, "%m/%d/%y %H:%M:%S") \
| eval endDateEpoch = strptime(endDate, "%H:%M.%S %p, %a %m/%d/%Y"), endDate = strftime(endDateEpoch, "%m/%d/%y %H:%M:%S") \
| makemv delim="|" servicePrincipalName\
| makemv delim="|" memberOf\
| rename distinguishedName as dn, DC as forest, userAccountPropertyFlag as accountStatus, personalTitle as prefix, displayName as nick, givenName as first, sn as last, mail as email, manager as managedBy, department as bunit, _time as lastUpdated\
| table _key, _delete, category, priority, accountStatus, domain, forest, identity, bunit, watchlist, memberOf, dn, description, title, nick, first, last, prefix, suffix, email, phone, managedBy, accountExpires, pwdLastSet, lastLogonTimestamp, msDS_AllowedToDelegateTo, startDate, endDate, servicePrincipalName, userPrincipalName, userAccountControl, lastUpdated, sAMAccountName, objectSid, downLevelDomainName, work_city, work_country\
| outputlookup admon_identities_def append=true\
| stats count

[Update AD Assets - KV Store]
alert.track = 0
cron_schedule = */10 * * * *
description = Update the admon_assets_def KV Store with admon data.
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `activedirectory` admonEventType IN (Sync,Update,Deleted) objectCategory="CN=Computer*" \
| eval userAccountPropertyFlag=mvjoin(userAccountPropertyFlag,"|")\
| stats latest(distinguishedName) as distinguishedName, latest(DC) as DC, latest(userAccountPropertyFlag) as userAccountPropertyFlag, latest(manager) as manager, latest(memberOf) as memberOf, latest(department) as department, latest(whenCreated) as whenCreated, latest(_time) as _time, latest(sAMAccountName) as sAMAccountName, latest(description) as description, latest(accountExpires) as accountExpires, latest(pwdLastSet) as pwdLastSet, latest(lastLogonTimestamp) as lastLogonTimestamp, latest(endDate) as endDate, latest(servicePrincipalName) as servicePrincipalName, latest(userAccountControl) as userAccountControl, latest(admonEventType) as admonEventType, latest(objectClass) as objectClass, latest(eval(lower(dNSHostName))) as dNSHostName latest(eval(lower(cn))) as cn, latest(operatingSystem) as operatingSystem, latest(operatingSystemVersion) as operatingSystemVersion, latest(isCriticalSystemObject) as isCriticalSystemObject, latest(adminCount) as adminCount, latest(objectCategory) as objectCategory, latest(msDS_AllowedToDelegateTo) as msDS_AllowedToDelegateTo by objectSid\
```Configure Default Categories, to be combined by mvappend later```\
| makemv delim="|" userAccountPropertyFlag\
| makemv delim="|" servicePrincipalName\
| eval cat_os=if(match(operatingSystem, "(?i)Windows"), "windows",if(match(operatingSystem, "(?i)Linux"), "linux", if(match(operatingSystem, "(?i)mac"), "mac", "unknown-os"))), cat_ostype=if(match(operatingSystem, "(?i)Server.*$"), "server", if(match(operatingSystem, "(?i)Windows\s\d+\sEnterprise|Mac\sOS|macos"), "client", "unknown-type")), cat_domain_controller=if(userAccountPropertyFlag="SERVER_TRUST_ACCOUNT","domain_controller",null), cat_rodc=if(userAccountPropertyFlag="PARTIAL_SECRETS_ACCOUNT","read_only_domain_controller",null), cat_unconstrained_delegation=if(userAccountPropertyFlag="TRUSTED_FOR_DELEGATION","unconstrained_delegation",null), cat_constrained_delegation=if(msDS_AllowedToDelegateTo like "%","constrained_delegation",null), cat_computer_object=if(objectCategory like "CN=Computer%","computer_account",null), cat_account_status=if(userAccountPropertyFlag="ACCOUNTDISABLE","disabled","enabled"), cat_ca=if(memberOf like "%CN=Cert Publishers,%","ca_server",null), cat_mssql=if(servicePrincipalName like "MSSQL%","db_mssql",null), cat_postgres=if(servicePrincipalName like "postgres/%","db_postgres",null), cat_mongo=if(servicePrincipalName like "mongo%","db_mongo",null), cat_exchange=if(servicePrincipalName like "exchange%","exchange",null), cat_ftp=if(servicePrincipalName like "ftp/%","ftp",null)\
```Example Extended Categories\
Critical Priority Assets\
| eval cat_adfs=if(logic,"adfs",null)\
| eval cat_wsus=if(logic,"wsus",null)\
| eval cat_sccm=if(logic,"sccm",null)\
| eval cat_splunkdeploymentserver=if(logic,"splunk_deployment_server",null)\
| eval cat_automation=if(SOAR, Ansible, Puppet, Chef,"automation_server",null)\
| eval cat_wintel_jumpbox=if(logic,"wintel_jumpbox",null)\
| eval cat_radius=if(logic,"radius",null)\
| eval cat_av_mgmt=if(logic,"av_server",null)\
\
High Priority Assets\
| eval cat_splunkserver=if(logic,"splunk",null)\
| eval cat_fileserver=if(logic,"file_server",null)\
| eval cat_sensitive_db_server=if(logic,"sensitive_db_server",null)\
\
Medium Priority Assets\
| cat_citrix=if(logic,"citrix",null)\
| cat_vulnerability=if(logic,"vuln_scanner",null)\
```\
```Update as required```\
| eval cat_privileged=if((adminCount=1 OR userAccountPropertyFlag="SERVER_TRUST_ACCOUNT" OR isCriticalSystemObject="TRUE"),"privileged",null)\
| eval location=if(1=1,"internal_facing","public_facing")\
```Combine Category fields```\
| foreach cat_*\
      [eval category = mvappend(category, '<<FIELD>>')]\
```Update priority as required```\
| eval priority=case(category IN ("privileged","ca_server","adfs","wsus","sccm","splunk_deployment_server","automation_server","wintel_jumpbox","radius","av_server"),"critical",\
category IN ("splunk","file_server","sensitive_db_server","exchange"),"high",\
 1=1,"medium")\
 ```Eval other fields```\
| rex field=distinguishedName max_match=100 "DC=(?P<domain>\w+?)(,|$)"\
| eval domain=mvjoin(domain,".")\
| eval _key=objectSid, is_expected=if(type_category="server","true","false"), should_timesync="true", should_update="true", requires_av="true"\
```Set _delete to true to remove entries from the kv store - entries set to false will remain```\
| eval _delete=if(admonEventType="Deleted","true","false")\
| makemv delim="|" servicePrincipalName\
| makemv delim="|" memberOf\
| rename cn as nt_host, dNSHostName as dns, distinguishedName as dn, DC as forest, manager as managedBy, department as bunit, whenCreated as startDate, _time as lastUpdated\
| table _key, _delete, nt_host, msDS_AllowedToDelegateTo, userAccountPropertyFlag, dns, category, priority, bunit, managedBy, domain, forest, dn, description, memberOf, operatingSystem, operatingSystemVersion, accountExpires, pwdLastSet, lastLogonTimestamp, servicePrincipalName, lastUpdated, is_expected, should_timesync, should_update, pci_domain, requires_av\
| outputlookup admon_assets_def append=true\
| stats count

[Update AD Groups - KV Store]
alert.track = 0
cron_schedule = */10 * * * *
description = Update the admon_groups_def KV Store with admon data.
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `activedirectory` admonEventType IN (Sync,Update,Deleted) objectCategory="CN=Group,*" \
| eval description=mvappend(description,info) \
| stats latest(cn) as cn, latest(whenCreated) as whenCreated, latest(admonEventType) as admonEventType, latest(adminCount) as adminCount, latest(description) as description, latest(distinguishedName) as dn, latest(member) as member, latest(memberOf) as memberOf, latest(managedBy) as managedBy latest(groupTypeName) as groupType by objectSid \
| rex field=dn max_match=100 "DC=(?P<domain>\w+?)(,|$)"\
| eval domain=mvjoin(domain,"."), category=if(adminCount=1,"privileged",null())\
```Set _delete to true to remove entries from the kv store - entries set to false will remain```\
| eval _delete=if(admonEventType="Deleted","true","false")\
| eval _key=objectSid\
| rex field=domain "(?P<netbiosDomainName>.*)\."\
| eval downLevelDomainName = case(match(groupType, "^Domain|^Global|^Universal"),upper(netbiosDomainName) + "\\" + 'cn',groupType like "BuiltIn%","BUILTIN\\" + 'cn',1=1,null())\
| outputlookup admon_groups_def append=true\
| stats count
