# #::HDR:: ;; # App: TA-vmware_app_for_splunk ;; # File: macros.conf ;; # Updated: 2023-08-02 11:38:01

[vmware_cbc_rename_alert_history]
definition = `vmware_cbc_ah_type` | `vmware_cbc_ah_ct` | `vmware_cbc_ah_u` | `vmware_cbc_ah_m` 

[vmware_cbc_ah_type]
definition = eval type = coalesce(type, case(isnotnull(parent_id),"NOTE_THREAD",true(), null()))

[vmware_cbc_ah_ct]
definition = eval object_timestamp = coalesce('note.last_update_timestamp','determination.change_timestamp', last_update_timestamp, 'workflow.change_timestamp')

[vmware_cbc_ah_u]
definition = eval user=coalesce('determination.changed_by','workflow.changed_by',author,'note.author',case(like(type,"%MDR_DETERMINATION%") or like(type,"%MDR_WORKFLOW%"), "MDR",true(), null()))

[vmware_cbc_ah_m]
definition = eval message = case(like(type,"%WORKFLOW%"), "Status: " . 'workflow.status',like(type,"%DETERMINATION%"), "Determination: " .'determination.value', like(type,"%NOTE%"), coalesce('note.message', 'note.note', 'note.thread{}.note', note),true(), "")

[vmware_cbc_action_index]
definition = index IN (main)

[vmware_cbc_base_index]
definition = index IN (main)
iseval     = 0

[vmware_cbc_error_indexes]
definition = index=_internal OR eventtype=vmware_cbc_base_index

[ip2int]

[ip2int(1)]
args       = ip
definition = eval temp_$ip$_remove = split($ip$, "."), $ip$_integer = (16777216 * tonumber(mvindex(temp_$ip$_remove,0))) +  (65536 * tonumber(mvindex(temp_$ip$_remove,1))) +  (256 * tonumber(mvindex(temp_$ip$_remove,2))) +  (1 * tonumber(mvindex(temp_$ip$_remove,3))) | fields - temp_$ip$_remove

[int2ip]

[int2ip(1)]
args       = int
definition = eval $int$_ip = floor(tonumber($int$/16777216) % 256).".".floor(tonumber($int$/65536)%256).".".floor(tonumber($int$/256)%256).".".floor(tonumber($int$)%256)

[vmware_cbc_dm_unk_field(1)]
args       = f
iseval     = 1
definition = if(true(),"$f$","unknown")

[vmware_alert_action_tenant_dropdown]
definition = rest splunk_server=local /services/configs/conf-tenants | fields api_key comment org_key guid tenant | eval title = org_key . "/" . api_key." (".tenant.")" | fields guid title | append [|makeresults count=1 |eval guid="", title="Global" | fields - _time]

[vmware_tstats]
definition = tstats prestats=false local=false summariesonly=`VMWare_CBC_summaries_only` allow_old_summaries=true
iseval     = 0

[vmware_tstats_pre]
definition = tstats prestats=true local=false summariesonly=`VMWare_CBC_summaries_only` allow_old_summaries=true
iseval     = 0

[VMWare_CBC_summaries_only]
definition = "false"
iseval     = 1

[vmware_cbc_endpoint_constraint]
definition = eventtype=vmware_cbc_events
iseval     = 0

[vmware_cbc_hc_generic_alert(3)]
definition = makeresults | eval instance="DEFAULT_FAILURE_MODE", message="$message$", severity_level=$severity$, total_failures=$failures$
args       = severity, failures, message

[vmware_cbc_hc_is_recent]
definition = eval is_recent = now() - (3600 * 24 * 5), is_recent = if(_time > is_recent,"true", "false") | search is_recent="true"

[vmware_cbc_hc_stitch]
definition = reverse | fillnull TheRaven value="stitch" | selfjoin TheRaven keepsingle=1 | fields - TheRaven

[vmware_cbc_hc_severity(2)]
definition = eval severity_level = case(total_failures == $compare$, 0, total_failures > $compare$, $level$)
args       = compare, level

[vmware_cbc_hc_message(3)]
args       = compare, failure, success
definition = eval message = replace(case(total_failures == $compare$, "$failure$", total_failures > $compare$, "$success$"), "", total_failures)

[vmware_cbc_hc_has_items(2)]
definition = eval severity_level = case(total_failures == $compare$, $level$, total_failures > $compare$, 0)
args       = compare, level

[vmware_cbc_hc_count]
definition = stats count AS total_failures, latest(error_message) as message values(is_recent) as ir values(_time) as time by host | rename host AS instance | fields instance total_failures message severity_level

[vmware_cbc_hc_alerts_present]
definition = union [ search eventtype=vmware_cbc_alerts| head 1000 | `vmware_cbc_hc_is_recent` | `vmware_cbc_hc_count` | `vmware_cbc_hc_has_items(0,2)` |`vmware_cbc_hc_message(0,"No VMware CBC Alerts Found", "Found  VMware CBC Alerts")` ] [| `vmware_cbc_hc_generic_alert(2,0,"No VMware CBC Alerts Found")` ] | `vmware_cbc_hc_stitch` | eval Health_Check = "CBC Alerts"

[vmware_cbc_hc_events_present]
definition = union [ search eventtype=vmware_cbc_events | head 1000| `vmware_cbc_hc_is_recent` | `vmware_cbc_hc_count` | `vmware_cbc_hc_has_items(0,2)`|`vmware_cbc_hc_message(0,"No VMware CBC Events Found", "Found  VMware CBC Events")`  ] [| `vmware_cbc_hc_generic_alert(2,0,"No VMware CBC Events Found")` ] | `vmware_cbc_hc_stitch`| eval Health_Check = "CBC Events"

[vmware_cbc_hc_auditlogs_present]
definition = union [ search eventtype=vmware_cbc_auditlogs| head 1000 | `vmware_cbc_hc_is_recent` | `vmware_cbc_hc_count` | `vmware_cbc_hc_has_items(0,2)` |`vmware_cbc_hc_message(0,"No VMware CBC Audit Logs Found", "Found  VMware CBC Audit Logs")` ] [| `vmware_cbc_hc_generic_alert(2,0,"No VMware CBC Auditlogs Found")` ] | `vmware_cbc_hc_stitch`| eval Health_Check = "CBC Audit Logs"

[vmware_cbc_hc_vulnerabilities_present]
definition = union [ search eventtype=vmware_cbc_vulnerability_os_list| head 1000 | `vmware_cbc_hc_is_recent` | `vmware_cbc_hc_count` | `vmware_cbc_hc_has_items(0,2)` |`vmware_cbc_hc_message(0,"No VMware CBC Vulnerabilities Found", "Found  VMware Vulnerabilities Alerts")` ] [| `vmware_cbc_hc_generic_alert(2,0,"No VMware CBC Vulnerabilities Found")` ] | `vmware_cbc_hc_stitch`| eval Health_Check = "CBC Vulnerabilities"

[vmware_cbc_hc_api_errors]
definition = union [ search eventtype=vmware_cbc_api_errors | rex field=_raw "error_message=(?<error_message>.*)error_type"| `vmware_cbc_hc_is_recent`| `vmware_cbc_hc_count`| `vmware_cbc_hc_severity(0,3)` ] [| `vmware_cbc_hc_generic_alert(0,0,"No VMware CBC Errors Found")` ] | `vmware_cbc_hc_stitch`

[vmware_cbc_hc_aa_cam_parse_errors]
definition = union [rest splunk_server=local /servicesNS/-/-/configs/conf-alert_actions  | search title=vmware* | fields splunk_server title param._cam | rename param.* as * splunk_server as host| eval _time = now(), cam = _cam, parsed = json_extract(_cam) | where isnull(parsed)| eval error_message = "Failed to Parse Alert Action Configs: ". title| `vmware_cbc_hc_is_recent`| `vmware_cbc_hc_count`| `vmware_cbc_hc_severity(0,3)`] [| `vmware_cbc_hc_generic_alert(0,0,"No VMware CBC Errors Found")` ] | `vmware_cbc_hc_stitch`

[vmware_cbc_troubleshoot_enrich_events]
definition = index=_internal source=*/TA-vmware_app_for_splunk/* sourcetype="vmware:cbc:action:enrich_events" alerts=* OR tracking_key=* OR ERROR | stats values(alerts) values(alerts_filter) dc(result_index) latest(_time) as lt max(total_results)  by tracking_key | sort - lt | convert ctime(lt) as lt timeformat="%H:%M:%S"