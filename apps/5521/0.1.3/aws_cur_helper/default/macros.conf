[aws_billing_index]
definition = index=aws_billing

[aws_summary_index]
definition = index=summary

# gets latest splunk cur for the current month
[get_latest_cur]
definition = `get_latest_cur(*)`

# gets latest cur for the specified month
[get_latest_cur(1)]
args = month
definition = `get_latest_cur($month$, "")`

# gets latest cur for the specified filter (e.g. account=<org account id>) and the month (YYYYMM) passed.
# * is a special value that gets the latest cur for the current month by triggering special behavior in set_earliest_for_cur
[get_latest_cur(2)]
args = month, filter
definition = `aws_billing_index` sourcetype=aws:billing:cur \
  [ | `set_earliest_for_cur($month$)` ] \
  [ | inputlookup aws_cur_assemblies where source=raw date_range=$month$* $filter$ \
    | head 1 \
    | eval source = "s3://*/" . assemblyId . "/*.csv.gz" \
    | fields source txid ]

[get_latest_cur_summaries(1)]
args = source
definition = `get_latest_cur_summaries($source$, *)`

[get_latest_cur_summaries(2)]
args = source, month
definition = `aws_summary_index` source=$source$ \
  [ | `set_earliest_for_cur($month$)` ] \
  [ | inputlookup aws_cur_assemblies where source=$source$ date_range=$month$* \
    | return assemblyId ]

[get_next_cur_to_summarize(1)]
args = source
definition = `aws_billing_index` sourcetype=aws:billing:cur \
  ``` get all the raw CUR without summaries and return source and txid ``` \
  [ | inputlookup aws_cur_assemblies \
    ``` only summarize latest CUR for a given date range ``` \
    [ | inputlookup aws_cur_assemblies where source=raw \
      | dedup date_range \
      | fields assemblyId ] \
    | stats sum(eval(if(source == "$source$", 1, 0))) AS summaries values(txid) AS txid max(assembly_time) AS assembly_time \
      BY assemblyId date_range \
    | eval earliest_date_range = strftime(relative_time(now(), "-3mon@mon"), "%Y%m%d") . "-" . strftime(relative_time(now(), "-2mon@mon"), "%Y%m%d") \
    | where summaries == 0 AND date_range >= earliest_date_range \
    | sort - assembly_time \
    | head 3 \
    | eval source = "s3://*/" . assemblyId . "/*.csv.gz" \
    | fields source txid ] \
  ``` dynamically set earliest to match the CURs being processed ``` \
  [ | inputlookup aws_cur_assemblies \
    ``` only summarize latest CUR for a given date range ``` \
    [ | inputlookup aws_cur_assemblies where source=raw \
      | dedup date_range \
      | fields assemblyId ] \
    | stats sum(eval(if(source == "$source$", 1, 0))) AS summaries max(assembly_time) AS assembly_time \
      BY assemblyId date_range \
    | eval earliest_date_range = strftime(relative_time(now(), "-3mon@mon"), "%Y%m%d") . "-" . strftime(relative_time(now(), "-2mon@mon"), "%Y%m%d") \
    | where summaries == 0 AND date_range >= earliest_date_range \
    | sort - assembly_time \
    | head 3 \
    | rex field=date_range "(?<start_date>\d+)-" \
    | stats min(start_date) AS earliest_start_date \
    | eval earliest=strptime(earliest_start_date, "%Y%m%d") \
    | fields earliest ]

# gets curs indexed in the last 6 hours for summarizing
# use a filter to restrict which assemblies are queried
[get_next_cur_to_summarize(2)]
args = source, filter
definition = `aws_billing_index` sourcetype=aws:billing:cur \
  ``` get all the raw CUR without summaries and return source and txid ``` \
  [ | inputlookup aws_cur_assemblies where $filter$ \
    ``` only summarize latest CUR for a given date range ``` \
    [ | inputlookup aws_cur_assemblies where source=raw $filter$ \
      | dedup date_range \
      | fields assemblyId ] \
    | stats sum(eval(if(source == "$source$", 1, 0))) AS summaries values(txid) AS txid max(assembly_time) AS assembly_time \
      BY assemblyId date_range \
    | eval earliest_date_range = strftime(relative_time(now(), "-3mon@mon"), "%Y%m%d") . "-" . strftime(relative_time(now(), "-2mon@mon"), "%Y%m%d") \
    | where summaries == 0 AND date_range >= earliest_date_range \
    | sort - assembly_time \
    | head 3 \
    | eval source = "s3://*/" . assemblyId . "/*.csv.gz" \
    | fields source txid ] \
  ``` dynamically set earliest to match the CURs being processed ``` \
  [ | inputlookup aws_cur_assemblies where $filter$ \
    ``` only summarize latest CUR for a given date range ``` \
    [ | inputlookup aws_cur_assemblies where source=raw $filter$ \
      | dedup date_range \
      | fields assemblyId ] \
    | stats sum(eval(if(source == "$source$", 1, 0))) AS summaries max(assembly_time) AS assembly_time \
      BY assemblyId date_range \
    | eval earliest_date_range = strftime(relative_time(now(), "-3mon@mon"), "%Y%m%d") . "-" . strftime(relative_time(now(), "-2mon@mon"), "%Y%m%d") \
    | where summaries == 0 AND date_range >= earliest_date_range \
    | sort - assembly_time \
    | head 3 \
    | rex field=date_range "(?<start_date>\d+)-" \
    | stats min(start_date) AS earliest_start_date \
    | eval earliest=strptime(earliest_start_date, "%Y%m%d") \
    | fields earliest ]

# For use in a subsearch. Sets earliest to start of $month$ (YYYYMM)
# If month == "*", then set earliest to -mon@mon
[set_earliest_for_cur(1)]
args = start_month
definition = makeresults \
| eval earliest=if("$start_month$" == "*", "-mon@mon", strptime("$start_month$01", "%Y%m%d")) \
| fields - _time

[summarize_aws_cur]
definition = fillnull value="null" bill_BillingEntity lineItem_LineItemType lineItem_Operation lineItem_ProductCode \
  lineItem_UsageAccountId lineItem_UsageType pricing_unit instance_family instance_type_family product_region \
| stats \
  sum(lineItem_BlendedCost) AS sum_BlendedCost \
  sum(lineItem_NormalizedUsageAmount) AS sum_NormalizedUsageAmount \
  sum(lineItem_UsageAmount) AS sum_UsageAmount \
  sum(lineItem_UnblendedCost) AS sum_UnblendedCost \
  sum(reservation_AmortizedUpfrontFeeForBillingPeriod) AS sum_AmortizedUpfrontFeeForBillingPeriod \
  sum(reservation_EffectiveCost) AS sum_EffectiveCost \
  max(original_time) AS assembly_time_candidate \
  BY _time bill_BillingEntity lineItem_LineItemType lineItem_Operation lineItem_ProductCode lineItem_UsageAccountId \
    lineItem_UsageType pricing_unit instance_family instance_type_family product_region \
    account assemblyId date_range summary_time \
| sort 0 - assembly_time_candidate \
| streamstats first(assembly_time_candidate) AS assembly_time BY assemblyId \
| fields - assembly_time_candidate
