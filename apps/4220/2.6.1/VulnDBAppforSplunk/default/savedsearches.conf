[VulndDB_InstalledProducts_to_VulnDB_ProductID_Mapping]
alert.track = 0
cron_schedule = 45 23 * * *
description = Joins InstalledProducts data and VulnDB_ProductID into InstalledProducts_to_VulnDB_ProductID kvstore
disabled = 1
dispatch.earliest_time = -48h
dispatch.latest_time = now
enableSched = 1
run_on_startup = 1
search = | inputlookup InstalledProducts_to_VulnDB_ProductID \
| eval InstalledProductID=_key \
| table InstalledProductID, Product_Name, Product_Vendor, Product_Version, Collector, VulnDB_ProductID, VulnDB_ProductName, Verified, DateAdded, First_Discovered_Date, Last_Discovered_Date\
| append\
    [| inputlookup InstalledProducts \
    | eval InstalledProductID=_key | rename Version as Product_Version]\
| stats last(First_Discovered_Date) as First_Discovered_Date, last(Last_Discovered_Date) as Last_Discovered_Date, first(*) as *  by InstalledProductID \
| table First_Discovered_Date, Last_Discovered_Date, InstalledProductID, Product_Version, Product_Name, Product_Vendor, Collector, VulnDB_ProductID, VulnDB_ProductName, Verified, DateAdded\
| eval VulnDB_ProductName_temp = VulnDB_ProductName \
| fillnull value="-" VulnDB_ProductID\
| sort InstalledProductID\
| eval key_for_lookup = InstalledProductID\
| join VulnDB_ProductID max=0 type=left \
        [search `vulndb_index` sourcetype=vulndb \
| spath vendors{}.products{}.id output=VulnDB_ProductID \
| spath vendors{}.products{}.name output=VulnDB_ProductName \
| fields VulnDB_ProductID,VulnDB_ProductName \
| table VulnDB_ProductID, VulnDB_ProductName \
| eval combined_field=mvzip(VulnDB_ProductID, VulnDB_ProductName,"|") \
| stats count by combined_field \
| dedup combined_field \
| makemv combined_field delim="|" \
| eval VulnDB_ProductID=mvindex(combined_field,0) \
| eval VulnDB_ProductName=mvindex(combined_field,1) \
| table VulnDB_ProductID VulnDB_ProductName] \
| eval VulnDB_ProductName=case(isnotnull(VulnDB_ProductName) OR VulnDB_ProductName!="", VulnDB_ProductName, isnotnull(VulnDB_ProductName_temp) OR VulnDB_ProductName_temp !="", VulnDB_ProductName_temp, true(), "-") \
| table First_Discovered_Date, Last_Discovered_Date, InstalledProductID, Product_Name, Product_Version, Product_Vendor, Collector, VulnDB_ProductID, VulnDB_ProductName, Verified, DateAdded, key_for_lookup\
| outputlookup InstalledProducts_to_VulnDB_ProductID append=true key_field=key_for_lookup

