[VulndDB_VulnToAsset_Mapping]
alert.track = 0
cron_schedule = 15 0 * * *
description = Joins  Assets data and VulnDB_ProductID into VulnToAsset kvstore
disabled = 1
dispatch.earliest_time = -48h
dispatch.latest_time = now
enableSched = 1
run_on_startup = 1
search = `vulndb_index` sourcetype=vulndb \
| rename vulndb_id as VulnDB_ID \
| spath output=Products path="vendors{}.products{}" \
| stats count by Products, VulnDB_ID \
| spath input=Products \
| rename id as VulnDB_ProductID, name as VulnDB_ProductName \
| eval is_product_affected=mvfind('versions{}.affected', "true") \
| eval VulnDB_Versions=mvzip('versions{}.name', 'versions{}.affected', "|") \
| table VulnDB_ID, VulnDB_ProductID, VulnDB_Versions, is_product_affected \
| search is_product_affected="*" \
| fields VulnDB_ID,VulnDB_ProductID, VulnDB_Versions \
| join max=0 VulnDB_ProductID \
    [| inputlookup InstalledProducts_to_VulnDB_ProductID] \
| join max=0 InstalledProductID \
    [| inputlookup ProductsToAssets] \
| join max=0 AssetID \
    [| inputlookup DiscoveredAssets_Tech \
    | rename First_Discovered_Date as Asset_First_Discovered_Date, Last_Discovered_Date as Asset_Last_Discovered_Date] \
| eval First_Discovered_Date=Asset_First_Discovered_Date \
| eval Last_Discovered_Date=Asset_Last_Discovered_Date \
| table AssetID, VulnDB_ID, DateAdded, DateStateUpdated, VulnState, First_Discovered_Date, Last_Discovered_Date, Product_Version, VulnDB_Versions\
| append \
    [| inputlookup VulnToAsset \
    | fields - ExactVersionMatch] \
| eval ExactVersionMatch=case(isnull(Product_Version) OR isnull(VulnDB_Versions), "unknown", 'Product_Version' . "|true" == VulnDB_Versions, "true", true(), "false") \
| stats values(ExactVersionMatch) as ExactVersionMatch, first(*) as * by AssetID, VulnDB_ID \
| eval ExactVersionMatch=case(isnotnull(mvfind('ExactVersionMatch', "true")), "true", isnotnull(mvfind('ExactVersionMatch', "unknown")), "unknown", true(), "false") \
| fillnull value="Initial Alert" VulnState \
| eval key_for_lookup = AssetID."-".VulnDB_ID \
| outputlookup VulnToAsset append=t key_field=key_for_lookup

