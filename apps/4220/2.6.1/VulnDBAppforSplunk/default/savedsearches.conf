[VulnDB_Historical_Data_Ingestion]
disabled = 1
alert.track = 0
cron_schedule = 40 0 * * *
display.general.timeRangePicker.show = 0
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = | inputlookup InstalledProducts_to_VulnDB_ProductID \
| where VulnDB_ProductID!="-" \
| table InstalledProductID, Product_Version, VulnDB_ProductID, Product_Name \
| join max=0 VulnDB_ProductID \
    [| inputlookup VulnToVulnDB_ProductID \
    | table VulnDB_ProductID, VulnDB_ID] \
| join max=0 VulnDB_ID, VulnDB_ProductID \
    [ search `vulndb_index` sourcetype=vulndb \
        [| inputlookup InstalledProducts_to_VulnDB_ProductID \
        | where VulnDB_ProductID!="-" \
        | table InstalledProductID, VulnDB_ProductID \
        | join max=0 VulnDB_ProductID \
            [| inputlookup VulnToVulnDB_ProductID \
            | table VulnDB_ProductID, VulnDB_ID] \
        | dedup VulnDB_ID \
        | rename VulnDB_ID as vulndb_id \
        | table vulndb_id] \
    | rename vulndb_id as VulnDB_ID \
    | spath output=Products path="vendors{}.products{}" \
    | stats count by Products, VulnDB_ID \
    | spath input=Products \
    | rename id as VulnDB_ProductID, name as VulnDB_ProductName \
    | eval is_product_affected=mvfind('versions{}.affected', "true") \
    | eval VulnDB_Versions=mvzip('versions{}.name', 'versions{}.affected', "|") \
    | eval VulnDB_Versions=mvjoin(VulnDB_Versions, ",") \
    | table VulnDB_ID, VulnDB_ProductID, VulnDB_Versions, is_product_affected \
    | search is_product_affected="*" \
    | fields VulnDB_ID,VulnDB_ProductID, VulnDB_Versions] \
| eval VulnDB_Versions=split(VulnDB_Versions, ",") \
| eval ExactVersionMatch=case(isnull(Product_Version) OR isnull(VulnDB_Versions), "unknown", 'Product_Version' . "|true" == VulnDB_Versions, "true", true(), "false") \
| where (`exact_version_match`=0) OR (ExactVersionMatch="true") \
| join max=0 VulnDB_ID \
    [| inputlookup VulnToAsset \
    | where NOT VulnState IN ("Resolved", "Invalid") \
    | table AssetID ,VulnDB_ID] \
| join max=0 AssetID \
    [| inputlookup DiscoveredAssets_Tech \
    | table AssetID, Hostname] \
| stats count as Vuln_Count, values(VulnDB_ID) as VulnDB_ID by Hostname, AssetID, InstalledProductID,Product_Name \
| eval VulnDB_ID=mvjoin(VulnDB_ID,",") \
| eval Product_Name=replace(Product_Name,"\"","") \
| eval Hostname=replace(Hostname,"\"","") \
| table Hostname, AssetID, InstalledProductID,Product_Name,Vuln_Count,VulnDB_ID \
| collect index=summary sourcetype=vulndb:history
