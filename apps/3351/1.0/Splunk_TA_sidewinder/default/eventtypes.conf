[sidewinder_alert]
search = sourcetype=sidewinder type=t_alert

[sidewinder_threat]
search = sourcetype=sidewinder type=t_attack

[sidewinder_error]
search = sourcetype=sidewinder type=t_error

[sidewinder_traffic]
search = sourcetype=sidewinder (type=t_aclallow OR (type=t_attack event="ACL deny") OR (type=t_error fac=f_kernel) OR (type=t_info fac=f_kernel_ipfilter) OR type=t_nettraffic OR type=t_netprobe)

[sidewinder_system]
search = sourcetype=sidewinder (type=t_geninfo OR type=t_lcm OR type=t_top OR type=t_hotprocess OR (type=t_info fac!=f_kernel_ipfilter) OR (type=t_important fac=f_ent_relay_daemon) OR (type=t_debug fac=f_acld))

[sidewinder_config]
search = sourcetype=sidewinder type=t_cfg_change

[sidewinder_authentication]
search = sourcetype=sidewinder (event="auth allow" OR event="auth deny")
