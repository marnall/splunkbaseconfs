
[expose:TA_Lansweeper_account]
pattern = TA_Lansweeper_account
methods = POST, GET

[expose:TA_Lansweeper_account_specified]
pattern = TA_Lansweeper_account/*
methods = POST, GET, DELETE

[expose:TA_Lansweeper_settings]
pattern = TA_Lansweeper_settings
methods = POST, GET

[expose:TA_Lansweeper_settings_specified]
pattern = TA_Lansweeper_settings/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
