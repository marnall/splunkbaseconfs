# change with your documents folder
[monitor:///opt/sf_riddoc]
disabled = false
# change with your hostname
host = ubuntusplunk
sourcetype = sf_rid

[script://$SPLUNK_HOME/etc/apps/sf_rid_app/bin/sf_rid_mainscript.py]
disabled = 0
# run the script to analyze documents every n seconds (3600=1h, default=66400 1day)
interval = 86400
index = sf_rid
sourcetype = sf_rid
python.version = python3

