#definition = fillnull value="-" dest_host | eval state = if(status = "Up", 1, -1) | stats sparkline(avg(state)) as states, list(status) as statuses, by dest_ip, dest_host | eval statuses = mvjoin(statuses, " ") | eval alert = if(match(statuses, "$regex$"), "True", "False") | where alert == "True"
definition = fillnull value="-" dest_host | stats sparkline(count(eval(status=="Up"))) as states, list(status) as statuses, latest(_time) as _time by dest_ip, dest_host | eval alert = if(match(mvjoin(statuses, " "), "$regex$"), "True", "False") | where alert == "True" | table dest_ip, dest_host, states, _time
