# app.conf

[install]
build = 10 
is_configured = false

[package]
id = asset_discovery

[launcher]
author = mwilson@splunk.com
version = 6.0
description = The asset discovery application provides ping scans, port scans, operating system and port fingerprinting through the use of nmap in order to gain visibility into asset availability, port statistics, and even rogue device detection.  The app can be deployed on a per-subnet basis in order to provide distributed scanning capabilities.

[ui]
is_visible = true
label = Asset Discovery
