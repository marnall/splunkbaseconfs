# inputs.conf

# ping scan (*nix)
[script://./bin/nmap.sh]
interval = 900
source = nmap
sourcetype = ping_scan
index = asset_discovery
disabled = 1

# ping scan (windows)
[script://.\bin\nmap.cmd]
interval = 900
source = nmap
sourcetype = ping_scan
index = asset_discovery
disabled = 1

# basic port scan (*nix)
[script://./bin/nmap.sh -A -O]
interval = 14400
source = nmap
sourcetype = port_scan
index = asset_discovery
disabled = 1

# basic port scan (windows)
[script://.\bin\nmap.cmd -A -O]
interval = 14400
source = nmap
sourcetype = port_scan
index = asset_discovery
