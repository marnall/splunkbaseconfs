[extract_eventhub]
disabled = false
SOURCE_KEY = _raw
REGEX = \|eventhub\=.*
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::azure:eventhub:meta



[namespaces]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = \/(NAMESPACES)\/([^\/\"]+)
SOURCE_KEY = records{}.resourceId

[providers]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = \/(PROVIDERS)\/([^\/\"]+)
SOURCE_KEY = records{}.resourceId

[resource_groups]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = \/(RESOURCEGROUPS)\/([^\/\"]+)
SOURCE_KEY = records{}.resourceId

[subscription]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = \/(SUBSCRIPTIONS)\/([^\/\"]+)
SOURCE_KEY = records{}.resourceId

[record_authrules]
CLEAN_KEYS = 0
FORMAT = record_authrules::$1
MV_ADD = 1
REGEX = \/AUTHORIZATIONRULES\/([^\"\/]+)
SOURCE_KEY = records{}.resourceId


[lookup_eh_metrics]
batch_index_query = 0
case_sensitive_match = 1
filename = lookup_eh_metrics.csv
disabled = 0

