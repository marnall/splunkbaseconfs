# For _internal logs
[source::...ta_dell_powerflex*.log*]
SHOULD_LINEMERGE = true
sourcetype = ta:dellpowerflex:log


# instance ================================================================
[source::powerflex_os_instance:...]
SHOULD_LINEMERGE = false
TRUNCATE = 0
KV_MODE = json
DATETIME_CONFIG = CURRENT
# CIM Mapping
EVAL-enabled = "true"
EVAL-vendor_product = "Dell EMC PowerFlex Products"
FIELDALIAS-dest = systemId as dest
FIELDALIAS-cluster = systemId AS cluster
FIELDALIAS-serial = id AS serial


# for default sourcetype
[powerflex:instance]
SHOULD_LINEMERGE = false
TRUNCATE = 0

[vxflex:instance]
rename = powerflex:instance

# CIM Mapping - Inventory Data model
[powerflex:instance:system]
FIELDALIAS-status = mdmCluster.clusterState AS status
FIELDALIAS-version = systemVersionName AS version
EVAL-storage = (maxCapacityInGb * 1024)

[vxflex:instance:system]
rename = powerflex:instance:system

[powerflex:instance:device]
FIELDALIAS-status = deviceState AS status
EVAL-storage = (tonumber(maxCapacityInKb) / 1024)
FIELDALIAS-parent = sdsId AS parent

[vxflex:instance:device]
rename = powerflex:instance:device

[powerflex:instance:pd]
FIELDALIAS-status = protectionDomainState AS status
FIELDALIAS-parent = systemId AS parent

[vxflex:instance:pd]
rename = powerflex:instance:pd

[powerflex:instance:sp]
FIELDALIAS-parent = protectionDomainId AS parent

[vxflex:instance:sp]
rename = powerflex:instance:sp

[powerflex:instance:sdc]
FIELDALIAS-status = mdmConnectionState AS status
FIELDALIAS-version = versionInfo AS version
FIELDALIAS-parent = systemId AS parent

[vxflex:instance:sdc]
rename = powerflex:instance:sdc

[powerflex:instance:sds]
FIELDALIAS-status = sdsState AS status
FIELDALIAS-version = softwareVersionInfo AS version
FIELDALIAS-parent = faultSetId AS parent

[vxflex:instance:sds]
rename = powerflex:instance:sds

[powerflex:instance:faultset]
FIELDALIAS-parent = protectionDomainId AS parent

[vxflex:instance:faultset]
rename = powerflex:instance:faultset

[powerflex:instance:volume]
FIELDALIAS-parent = storagePoolId AS parent
EVAL-storage = (sizeInKb / 1024)

[vxflex:instance:volume]
rename = powerflex:instance:volume

[powerflex:instance:peermdm]
SHOULD_LINEMERGE = false
TRUNCATE = 9999999999
KV_MODE = json

[powerflex:instance:rcg]
SHOULD_LINEMERGE = false
TRUNCATE = 9999999999
KV_MODE = json

[powerflex:instance:sdr]
SHOULD_LINEMERGE = false
TRUNCATE = 9999999999
KV_MODE = json

[powerflex:instance:rp]
SHOULD_LINEMERGE = false
TRUNCATE = 9999999999
KV_MODE = json

# CIM Mapping - Alerts data model
[powerflex:alerts]
FIELDALIAS-id = uuid AS id
FIELDALIAS-subject = alertType as subject
EVAL-app = "dell:powerflex"
EVAL-severity = case(severity=="ALERT_HIGH", "high", severity=="ALERT_MEDIUM", "medium", severity=="ALERT_LOW", "low")
EVAL-type = "alert"
LOOKUP-alert_type_description = ta_powerflex_lookup_alerts alert_type AS alertType OUTPUT alert_message, alert_code, recommended_action

[vxflex:alerts]
rename = powerflex:alerts

# statistics ================================================================
[source::powerflex_os_statistics:...]
SHOULD_LINEMERGE = false
TRUNCATE = 0
KV_MODE = json
DATETIME_CONFIG = CURRENT
FIELDALIAS-dest = id as dest

# for default sourcetype
[powerflex:statistics]
SHOULD_LINEMERGE = false
TRUNCATE = 0

[vxflex:statistics]
rename = powerflex:statistics

# CIM Mapping - Performance Data model
[powerflex:statistics:sp]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)
FIELDALIAS-read_latency = userDataSdcReadLatency as read_latency
FIELDALIAS-write_latency = userDataSdcWriteLatency as write_latency

[vxflex:statistics:sp]
rename = powerflex:statistics:sp

[powerflex:statistics:pd]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)
FIELDALIAS-read_latency = userDataSdcReadLatency as read_latency
FIELDALIAS-write_latency = userDataSdcWriteLatency as write_latency

[vxflex:statistics:pd]
rename = powerflex:statistics:pd

[powerflex:statistics:sds]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)

[vxflex:statistics:sds]
rename = powerflex:statistics:sds

[powerflex:statistics:sdc]
FIELDALIAS-read_latency = userDataSdcReadLatency as read_latency
FIELDALIAS-write_latency = userDataSdcWriteLatency as write_latency

[vxflex:statistics:sdc]
rename = powerflex:statistics:sdc

[powerflex:statistics:device]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)
EVAL-read_latency = (avgReadLatencyInMicrosec / 1000)
EVAL-write_latency = (avgWriteLatencyInMicrosec / 1000)

[vxflex:statistics:device]
rename = powerflex:statistics:device

[powerflex:statistics:faultset]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)

[vxflex:statistics:faultset]
rename = powerflex:statistics:faultset

[powerflex:statistics:system]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)
FIELDALIAS-read_latency = userDataSdcReadLatency as read_latency
FIELDALIAS-write_latency = userDataSdcWriteLatency as write_latency
FIELDALIAS-cluster = id as cluster

[vxflex:statistics:system]
rename = powerflex:statistics:system

[powerflex:statistics:volume]
FIELDALIAS-read_latency = userDataSdcReadLatency as read_latency
FIELDALIAS-write_latency = userDataSdcWriteLatency as write_latency

[vxflex:statistics:volume]
rename = powerflex:statistics:volume

[powerflex:statistics:peermdm]
SHOULD_LINEMERGE = false
TRUNCATE = 9999999999
KV_MODE = json

[powerflex:statistics:rcg]
SHOULD_LINEMERGE = false
TRUNCATE = 9999999999
KV_MODE = json

[powerflex:statistics:sdr]
SHOULD_LINEMERGE = false
TRUNCATE = 9999999999
KV_MODE = json

[powerflex:statistics:rp]
SHOULD_LINEMERGE = false
TRUNCATE = 9999999999
KV_MODE = json