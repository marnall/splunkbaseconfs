[sslcert(1)]
args = dest
definition = lookup sslcert_lookup dest as $dest$ | eval ssl_subject_alt_name = split(ssl_subject_alt_name,"|")

[sslcert(2)]
args = dest, dest_port
definition = lookup sslcert_lookup dest as $dest$ dest_port as $dest_port$ | eval ssl_subject_alt_name = split(ssl_subject_alt_name,"|")
