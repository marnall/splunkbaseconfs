[script:getdiag] 
match                 = /getdiag
script                = getdiag.py
scripttype            = persist
handler               = application.GetDiag
handlertype           = python
requireAuthentication = false
passPayload           = true


[script:uploaddiag]
match                 = /data/getdiag/uploaddiag
script                = uploaddiag.py
scripttype            = persist
python.version        = python3
handler               = uploaddiag.UploadDiag
requireAuthentication = true
passPayload           = true
output_modes          = json
passHttpHeaders       = true
passHttpCookies       = true