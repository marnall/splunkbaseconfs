[script://$SPLUNK_HOME/etc/apps/search_log_pre_process/bin/preprocess.py 20]
# The number 100 in the above reflects that we will only pull one out of 20 searches. If you have a small environment, you can lower 
# this to get more insight, but if you have hundreds or thousands of indexers, each summary log message can be very large (picture: a 
# typical server name of EastCoast_Splunk_Indexer_1 .. 1000 plus formatting, and 5 searches per second, you could have 25 GB/day of 
# data.. bit of overkill). If you do have 1000 indexers or a really heavy search load, you may want to increase this number even further.
disabled = 0
index = _internal
interval = 300
sourcetype = searchlog:processed
