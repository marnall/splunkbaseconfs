[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 9

[launcher]
author = Intel 471 Inc.
version = 1.0.7
description = Intel 471’s Breach Intelligence Splunk App provides relevant and timely notifications on potential victim compromises and data leaks with a near-real-time feed of reporting on perpetrator claims in the underground.The app automatically will ingest Breach Alert reporting from the Intel 471 Titan platform and make all data available via Splunk search.The app also provides a live dashboard that offers charts and tables depicting a variety of data elements related to Breach Alerts, such as a summary of breach data, pivoting and filtering options for victims, regions, industries and perpetrators.The app requires an active Intel 471 Titan application programming interface (API) key to retrieve intelligence information and reporting. Please contact support@intel471.com for more information.

[ui]
is_visible = 1
label = Intel 471 Breach Intelligence
docs_section_override = AddOns:released

[package]
id = TA_intel_471_breach_alerts

[triggers]
reload.addon_builder = simple
reload.ta_intel_471_breach_alerts_account = simple
reload.ta_intel_471_breach_alerts_settings = simple
reload.passwords = simple

[id]
version = 1.0.7

