[bitwarden_successful_authentication]
search = `bitwarden_index` sourcetype="bitwarden:audit" signature_id="1000"

[bitwarden_failed_authentication]
search = `bitwarden_index` sourcetype="bitwarden:audit" signature_id="1005" OR signature_id="1006"

[bitwarden_user]
search = `bitwarden_index` sourcetype="bitwarden:user"

[bitwarden_group]
search = `bitwarden_index` sourcetype="bitwarden:group"

[bitwarden_priviledged]
search = `bitwarden_index` sourcetype="bitwarden:user" accessAll=true
