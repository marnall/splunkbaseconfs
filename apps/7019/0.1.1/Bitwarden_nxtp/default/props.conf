
[source::...bitwarden_ta_nxtp*.log*]
sourcetype = bitwarden:log

#############################################################
[source::bitwarden]
# INDEXED_EXTRACTIONS = JSON
# JSON_TRIM_BRACES_IN_ARRAY_NAMES = true
pulldown_type = 1
# KV_MODE = none
# AUTO_KV_JSON = false
KV_MODE = json
SHOULD_LINEMERGE = false

TIME_PREFIX=date"\: \"
TIMESTAMP_FIELDS = date
TIME_FORMAT=%Y-%m-%dT%H:%M:%S.%3N
MAX_TIMESTAMP_LOOKAHEAD = 1


EVAL-vendor_product = "Bitwarden: Password Manager"
EVAL-product = "Password Manager"
EVAL-vendor = "Bitwarden"

#############################################################
[bitwarden:audit]
TIME_PREFIX=date"\: \"
TIMESTAMP_FIELDS = date
TIME_FORMAT=%Y-%m-%dT%H:%M:%S.%3N

category = Bitwarden Audit Log

FIELDALIAS-signature_id = type AS signature_id
LOOKUP-signature = bitwarden_signature_lookup signature_id OUTPUT category,signature,severity_id,severity
EVAL-type = null

FIELDALIAS-src_ip = ipAddress AS src_ip

LOOKUP-device = bitwarden_deviceType_lookup device OUTPUT DeviceName AS src_type

FIELDALIAS-user_id = actingUserId AS user_id

# LOOKUP-group_lookup = bitwarden_group_lookup id AS groupId OUTPUT group_name, group_bitwarden_id

FIELDALIAS-dest_user_id = memberId AS dest_user_id

# LOOKUP-dest_user_lookup = bitwarden_user_lookup user_bitwarden_id AS memberId OUTPUT user_name AS dest_user_name, user_email AS dest_user_email

EVAL-dest = case(like(category,"item"), itemId, like(category,"group"), group_name, category=="user", user_email, category=="collection", "collection", category=="organization", dest_user_email, true(), "unknown")

#############################################################
[bitwarden:user]
category = Bitwarden Users

FIELDALIAS-user_bitwarden_id = userId AS user_bitwarden_id
FIELDALIAS-user_id = userId AS user_id
EVAL-userId = null

FIELDALIAS-user_name = name AS user_name
EVAL-name = null

FIELDALIAS-user_email = email AS user_email
EVAL-email = null

FIELDLIAS-groups = groups{} AS groups
EVAL-groups = groups{}

FIELDALIAS-user_status_id = status AS user_status_id
LOOKUP-user_status = bitwarden_userStatus_lookup status AS user_status_id OUTPUT OrganizationUserStatusType AS user_status
EVAL-status = null

LOOKUP-user_type = bitwarden_userType_lookup type OUTPUT OrganizationUserType AS user_type
FIELDALIAS-user_type_id = type AS user_type_id
# EVAL-type = null

EVAL-authentication_method = if(twoFactorEnabled == "false", "Basic Authentication", "Multi Factor Authentication")
EVAL-user_risk = case(twoFactorEnabled == "false" AND accessAll == "true", "critical", \
                    twoFactorEnabled == "false" AND accessAll == "false", "high", \
                    twoFactorEnabled == "true" AND accessAll == "true", "medium", \
                    true(), "low" )
EVAL-timestamp = null

#############################################################
[bitwarden:group]
category = Bitwarden Groups

FIELDALIAS-group_bitwarden_id = externalId AS group_bitwarden_id

FIELDALIAS-group_name = name AS group_name

EVAL-group_risk = case(accessAll == "true", "medium", true(), "low" )

EVAL-timestamp = null

FIELDALIAS-members = 'members{}' AS user_bitwarden_id
LOOKUP-members = bitwarden_users user_bitwarden_id

#############################################################
[bitwarden:collection]
category = Bitwarden
