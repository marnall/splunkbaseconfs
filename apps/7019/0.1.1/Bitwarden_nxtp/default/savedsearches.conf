[bitwarden_users_lookup_creation]
description = Bitwarden Users Report: Gathers unique user data and outputs to the 'bitwarden_users' lookup.
cron_schedule = 0 0 * * *
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
schedule_window = auto
enableSched = 0
dispatchAs = user
search = `bitwarden_index` sourcetype="bitwarden:user" \
| dedup id \
| rename groups{} as groups \
| mvexpand groups \
| join type=left groups \
   [ search `bitwarden_index` sourcetype="bitwarden:group" \
   | table id group_name \
   | rename id as groups ] \
| table _time id user_bitwarden_id user_name user_email user_type user_risk groups group_name \
| stats values(*) as * max(_time) as _time by id \
| rename \
   user_type AS user_bitwarden_type,\
   user_risk AS user_bitwarden_risk,\
   group_name AS user_bitwarden_groups\
| table _time user_bitwarden_id user_email user_name user_bitwarden_* \
| outputlookup bitwarden_users


[bitwarden_groups_lookup_creation]
description = Bitwarden Groups Report: Extracts unique Bitwarden group data, processing key fields, and outputs to the 'bitwarden_groups' lookup.
cron_schedule = 0 0 * * *
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
schedule_window = auto
enableSched = 0
dispatchAs = user
search = `bitwarden_index` sourcetype="bitwarden:group" \
| dedup id \
| rename members{} AS user_bitwarden_id \
| table _time id group_bitwarden_id group_name group_risk user_bitwarden_id \
| outputlookup bitwarden_groups
