| eval $line_text$=if(len($line_text$) < 300, $line_text$, replace($line_text$, "(.{300})(.*)", "\1\\n\2"))\
| eval $line_text$=if(len($line_text$) < 350, $line_text$, replace($line_text$, "(.{350})(.*)", "\1\\n\2"))\
| eval $line_text$=if(len($line_text$) < 400, $line_text$, replace($line_text$, "(.{400})(.*)", "\1\\n... truncated ...")) \
