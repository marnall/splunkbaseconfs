#
# Splunk app configuration file
#

[install]
is_configured = 0
state_change_requires_restart = false
state = enabled

[ui]
is_visible = 1
label = Cisco Cloud Security

[launcher]
author = Cisco
description = Cisco Cloud Security is a CIM-compliant app allows security professionals to manage the cloud security incident lifecycle within Splunk as well as leverage Splunk's data visualization and reporting functionalities.
version = 1.0.48

[triggers]
reload.ssenv = http_get /role_manager

[package]
id = cisco-cloud-security
