[barracuda:log]
TIME_PREFIX = (?:[A-Za-z]{3}\s+\d+\s\d{2}\:\d{2}\:\d{2}\s.+?\s|^)
TIME_FORMAT = %Y-%m-%d %H:%M:%S.%3N %z
MAX_TIMESTAMP_LOOKAHEAD = 29
SHOULD_LINEMERGE = false
TRUNCATE = 99999

TRANSFORMS-force_sourcetype_barracuda = force_sourcetype_barracuda_web,force_sourcetype_barracuda_waf,force_sourcetype_barracuda_system,force_sourcetype_barracuda_firewall,force_sourcetype_barracuda_audit,force_sourcetype_barracuda_system_bis,force_sourcetype_barracuda_system_mongotosqlite,force_sourcetype_barracuda_system_servermon

[barracuda:web]
KV_MODE = none

REPORT-barracuda_web_extractions = barracuda_web_extractions
REPORT-barracuda_web_jsessionid = barracuda_web_jsessionid
REPORT-barracuda_web_http_protocol = barracuda_web_http_protocol
REPORT-barracuda_web_https_protocol = barracuda_web_https_protocol
REPORT-barracuda_web_wss_protocol = barracuda_web_wss_protocol

EVAL-app = "Barracuda ADC"
EVAL-bytes = bytes_in + bytes_out
EVAL-certificate_user = nullif(certificate_user, "-")
EVAL-login = nullif(login, "-")
EVAL-url = protocol. "://" .site.uri_path
EVAL-url_length = len(protocol) + 3 + len(site) + len(uri_path)
EVAL-vendor_product = "Barracuda ADC"

LOOKUP-barracuda_web_action_lookup = barracuda_web_action_lookup status OUTPUT action

[barracuda:waf]
KV_MODE = none

REPORT-barracuda_waf_attack_detail = barracuda_waf_attack_detail
REPORT-barracuda_waf_charset = barracuda_waf_charset
REPORT-barracuda_waf_code = barracuda_waf_code
REPORT-barracuda_waf_content_type = barracuda_waf_content_type
REPORT-barracuda_waf_count = barracuda_waf_count
REPORT-barracuda_waf_extension = barracuda_waf_extension
REPORT-barracuda_waf_extractions_1 = barracuda_waf_extractions_1
REPORT-barracuda_waf_extractions_2 = barracuda_waf_extractions_2
REPORT-barracuda_waf_header = barracuda_waf_header
REPORT-barracuda_waf_jsessionid = barracuda_waf_jsessionid
REPORT-barracuda_waf_length = barracuda_waf_length
REPORT-barracuda_waf_method = barracuda_waf_method
REPORT-barracuda_waf_parameter = barracuda_waf_parameter
REPORT-barracuda_waf_path_info = barracuda_waf_path_info
REPORT-barracuda_waf_size = barracuda_waf_size
REPORT-barracuda_waf_value = barracuda_waf_value

EVAL-app = "Barracuda WAF"
EVAL-attack_detail = nullif(attack_detail, "\"-\"")
EVAL-ids_type = "application"
EVAL-signature = lower(signature)
EVAL-transport = "tcp"
EVAL-vendor_product = "Barracuda WAF"

FIELDALIAS-dest = dest_ip as dest
FIELDALIAS-dvc = host as dvc
FIELDALIAS-src = src_ip as src

LOOKUP-barracuda_action_lookup = barracuda_action_lookup vendor_action OUTPUT action
LOOKUP-barracuda_severity_lookup = barracuda_severity_lookup vendor_severity OUTPUT severity

[barracuda:system]
KV_MODE = none

REPORT-barracuda_system_extractions = barracuda_system_extractions
REPORT-barracuda_system_extractions_bis = barracuda_system_extractions_bis
REPORT-barracuda_system_extractions_lb = barracuda_system_extractions_lb
REPORT-barracuda_system_extractions_lb_bis = barracuda_system_extractions_lb_bis
REPORT-barracuda_system_extractions_mongotosqlite = barracuda_system_extractions_mongotosqlite
REPORT-barracuda_system_extractions_servermon = barracuda_system_extractions_servermon
REPORT-barracuda_system_extractions_severity = barracuda_system_extractions_severity

EVAL-log_category = upper(log_category)

LOOKUP-barracuda_severity_lookup = barracuda_severity_lookup vendor_severity OUTPUT severity

[barracuda:firewall]
KV_MODE = none

REPORT-barracuda_firewall_extractions = barracuda_firewall_extractions

EVAL-app = "Barracuda NF"
EVAL-protocol = lower(protocol)

FIELDALIAS-dest = host as dest
FIELDALIAS-dvc = host as dvc
FIELDALIAS-src = src_ip as src

LOOKUP-barracuda_severity_lookup = barracuda_severity_lookup vendor_severity OUTPUT severity
LOOKUP-barracuda_action_lookup = barracuda_action_lookup vendor_action OUTPUT action

[barracuda:audit]
KV_MODE = none

REPORT-barracuda_audit_extractions = barracuda_audit_extractions
REPORT-barracuda_audit_extractions_bis = barracuda_audit_extractions_bis

EVAL-app = "Barracuda WAF/ADC"
EVAL-interface = lower(interface)
EVAL-status = case(like(change_type, "%"), "success")
EVAL-variable = nullif(variable, "-")
EVAL-vendor_product = "Barracuda WAF/ADC"

FIELDALIAS-dest = host as dest
FIELDALIAS-dvc = host as dvc
FIELDALIAS-src = src_ip as src

LOOKUP-barracuda_audit_auth_action_lookup = barracuda_audit_auth_action_lookup vendor_action OUTPUT action
LOOKUP-barracuda_audit_change_action_lookup = barracuda_audit_change_action_lookup change_type OUTPUT action
