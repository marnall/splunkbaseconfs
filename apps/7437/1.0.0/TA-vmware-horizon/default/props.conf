[vm:hzn:syslog]
EVAL-vendor_product = "vmware horizon"
EVAL-src = case(isNotNull(ForwardedClientIpAddress), ForwardedClientIpAddress, 1=1, ClientIpAddress)
REPORT-userdomain = vmh_syslog_user
EVAL-cim_entity_zone = lower(domain)
EVAL-signature = lower(EventType)
FIELDALIAS-vmhzn = MachineDnsName AS dest Severity AS severity
EVAL-action = case(EventType="REST_AUTH_LOGIN_SUCCESS", "success", EventType="VLSI_USERLOGGEDIN_REST", "success",EventType="BROKER_USERLOGGEDIN", "success", EventType="VLSI_USERLOGGEDIN", "success", EventType="AGENT_CONNECTED", "success", EventType="AGENT_PENDING_EXPIRED", "error", EventType="AGENT_PENDING", "pending" , EventType="AGENT_APPLICATION_LAUNCH_FAILED", "failure", EventType="BROKER_APPLICATION_MISSING", "failure", EventType="BROKER_APPLICATION_REQUEST", "success", EventType="BROKER_DESKTOP_REQUEST", "success", EventType="BROKER_MACHINE_ALLOCATED", "success", EventType="BROKER_USER_AUTHFAILED_ACCOUNT_LOCKED_OUT", "failure", EventType="BROKER_USER_AUTHFAILED_BAD_USER_PASSWORD", "failure", 1=1, action)
EVAL-app = case(isNotNull(ApplicationId), ApplicationId, isNotNull(ApplicationExecutable), ApplicationExecutable, isNotNull(DesktopId), DesktopId, EventType="REST_AUTH_LOGIN_SUCCESS", "horizon", EventType="VLSI_USERLOGGEDIN_REST", "horizon",EventType="BROKER_USERLOGGEDIN", "horizon", EventType="VLSI_USERLOGGEDIN", "horizon-admin", EventType="AGENT_CONNECTED", "horizon", 1=1, app)
EVAL-reason = case(EventType="BROKER_USER_AUTHFAILED_ACCOUNT_LOCKED_OUT", "account locked out", EventType="BROKER_USER_AUTHFAILED_BAD_USER_PASSWORD", "bad password", 1=1, reason)

[vm:hzn:vdm:log]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIME_PREFIX = ^
description = VMWare Horizon Primary Log
disabled = false
pulldown_type = 1
TRANSFORMS-sourcetype = vdm_audit, vdm_desktop_tracker
REPORT-category = vmh_category, vmh_severity
REPORT-user = vmh_user
EVAL-cim_entity_zone = lower(domain)
EVAL-domain = lower(domain)
EVAL-vendor_product = "vmware horizon"

[vm:hzn:vdm:audit]
EXTRACT-status = \s(?<status>\w+\b)\:
EVAL-status = lower(status)
EXTRACT-server = Server:(?<server>.*?);
EXTRACT-pool = Pool:(?<pool>.*?);
EXTRACT-dest = DNS:(?<dest>.*?);
EVAL-dest = lower(dest)
EVAL-ipv4 = IP:(?<ipv4>.*?);
EVAL-ipv6 = IP6:(?<ipv6>.*?);
EVAL-src = case(ipv6="null", 'ipv4', 1=1, 'ipv6')
EVAL-user_dn = USERDN:(?<user_dn>.*?);
EVAL-user_sid = USERSID:(?<user_sid>.*?);
EVAL-session = SESSION:(?<session>.*?)\)
REPORT-category = vmh_category, vmh_severity
REPORT-user = vmh_user
EVAL-cim_entity_zone = lower(domain)
EVAL-domain = lower(domain)
EVAL-vendor_product = "vmware horizon"

