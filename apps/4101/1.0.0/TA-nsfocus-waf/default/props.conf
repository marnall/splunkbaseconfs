[waf]
BREAK_ONLY_BEFORE = waf-g2
DATETIME_CONFIG = None
EVAL-uri_path = mvindex(split(uri, "?"),0)
EVAL-uri_query = mvindex(split(uri, "?"),1)
EVAL-vendor_product = "NSFOCUS WAF"
EXTRACT-waf_tag = tag:\s?(?<waf_tag>[\S]+)
FIELDALIAS-aob_gen_waf_alias_1 = src_ip AS src
FIELDALIAS-aob_gen_waf_alias_10 = event_type AS category
FIELDALIAS-aob_gen_waf_alias_2 = result AS action
FIELDALIAS-aob_gen_waf_alias_3 = cpu AS cpu_load_percent
FIELDALIAS-aob_gen_waf_alias_4 = method AS http_method
FIELDALIAS-aob_gen_waf_alias_5 = agent AS http_user_agent
FIELDALIAS-aob_gen_waf_alias_6 = dst_ip AS dest
FIELDALIAS-aob_gen_waf_alias_7 = dst_port AS dest_port
FIELDALIAS-aob_gen_waf_alias_8 = protocol AS transport
FIELDALIAS-aob_gen_waf_alias_9 = alertlevel AS severity
KV_MODE = none
NO_BINARY_CHECK = 1
REPORT-waf = waf_all
TIME_FORMAT = %Y-%m-%d %H:%M:%S
TIME_PREFIX = stat_time:
category = Custom
pulldown_type = 1
