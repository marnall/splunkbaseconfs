[cve_pattern]
REGEX = (?<CVE_inline>CVE-\d+-\d+)
MV_ADD = true

[fixed_releases]
SOURCE_KEY = knownFixedReleases
REGEX = (?<Fixed_Releases>\S+)
MV_ADD = true

[affected_releases]
SOURCE_KEY = knownAffectedReleases
REGEX = (?<Affected_Releases>\S+)
MV_ADD = true

[remove_csv_header]
REGEX = ^BUG Id;BUG headline;URL;
DEST_KEY=queue
FORMAT=nullQueue

[extract_tags_with_desc]
#REGEX = (?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)([A-Za-z]+[^s])s*?:(?:<|&[ltLT]{2};)/[bB](?:>|&[gtGT]{2};)\s?([^<]+)
#REGEX = (?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)([A-Za-z]+[^:]+):(?:<|&[ltLT]{2};)/[bB](?:>|&[gtGT]{2};)\s?([^<]+)
#REGEX = (?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)([A-Za-z]+[^:<]+):?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)\s?([^<]+)
#REGEX = (?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)([A-Za-z]+[^:<]+):?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)\s?([^<]*)
REGEX = (?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)([A-Za-z]+[^:<]+):?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(\s*[^<]*)
FORMAT = $1::$2
KEEP_EMPTY_VALS = true
LOOKAHEAD = 100000

[remove_path_from_source]
SOURCE_KEY = MetaData:Source
REGEX = ([^\/]+$)
DEST_KEY = MetaData:Source
FORMAT= source::$1
