[cisco:bugs:csv]
ADD_EXTRA_TIME_FIELDS = False
ANNOTATE_PUNCT = False 
CHARSET = UTF-8
DATETIME_CONFIG = CURRENT
DEPTH_LIMIT = 1000
KV_MODE = none
LEARN_MODEL = false
LEARN_SOURCETYPE = false
LINE_BREAKER = ([\r\n]+)CSC\w\w\d{4,6};
LINE_BREAKER_LOOKBEHIND = 100
MATCH_LIMIT = 100000
MAX_DAYS_AGO = 2000
MAX_DAYS_HENCE = 2
MAX_DIFF_SECS_AGO = 3600
MAX_DIFF_SECS_HENCE = 604800
MAX_EVENTS = 256
MAX_TIMESTAMP_LOOKAHEAD = 128
NO_BINARY_CHECK = true
#SHOULD_LINEMERGE = true
SHOULD_LINEMERGE = false
TRUNCATE = 100000
description = Cisco Bugsearch CSV Export"
detect_trailing_nulls = false
disabled = false
maxDist = 100
pulldown_type = true

TRANSFORMS-remove_csv_header = remove_csv_header


# CSCwa11656;CIAM: wget 1.19.5;https://bst.cisco.com/bugsearch/bug/CSCwa11656;Fixed;1;;2021-11-17 06:31:56.616;Cisco Identity Services Engine;003.002(000.116);"<B>Symptom:</B>
#EXTRACT-AAA_csv = (?sm)^(?<bugId>[^;]+);(?<headLine>.+);(?<bugURL>[^;]+);(?<statusGroup>[^;]+);(?<severityCode>[^;]+);(?<knownFixedReleases>[^;]*);(?<bugLastModifiedDate>[^;]*);(?<product>[^;]*);(?<knownAffectedReleases>[^;]*);"(?<releaseNoteText>.*)"$
#EXTRACT-AAA_csv = (?sm)^(?<bugId>[^;]+);(?<headLine>.+);(?<bugURL>http[^;]+);(?<statusGroup>[^;]+);(?<severityCode>[^;]+);(?<knownFixedReleases>[^;]*);(?<bugLastModifiedDate>[^;]*);(?<product>[^;]*);(?<knownAffectedReleases>[^;]*);"(?<releaseNoteText>.*)"$
#EXTRACT-AAA_csv = (?sm)^(?<bugId>[^;]+);(?<headLine>.+);(?<bugURL>http[^;]+);(?<statusGroup>[^;]+);(?<severityCode>[^;]+);(?<knownFixedReleases>[^;]*);(?<bugLastModifiedDate>[^;]*);(?<product>[^;]*);(?<knownAffectedReleases>[^;]*);"?(?<releaseNoteText>.*)"?$
EXTRACT-AAA_csv = (?sm)^(?<bugId>[^;]+);"?(?<headLine>.+)"?;(?<bugURL>http[^;]+);(?<statusGroup>[^;]+);(?<severityCode>[^;]+);(?<knownFixedReleases>[^;]*);(?<bugLastModifiedDate>[^;]*);(?<product>[^;]*);(?<knownAffectedReleases>[^;]*);"?(?<releaseNoteText>.*)"?$


#EXTRACT-cvss = time of evaluation[^\d]+(?<CVSS>[\d\.\/]+)
EXTRACT-cvss = time of evaluation[isare ]+(?<CVSS>[\d\.\/]+)
EXTRACT-z_cvss = ^(?<cvss>[\d\.]+) in CVSS

EXTRACT-cvss_link = (?<cvss_link>http\S+/cvssCalculator.x\S+)

# extract a text before <B>Symptom:</B> e.g. in CSCvz26149: Keeping defect internal until Dev team investigates the panics. Attention: (?s) flag for multiline!
EXTRACT-description = (?s)\"(?<pre_symptom_text>[^"]*?)<[bB]>Symptoms?:<\/[bB]>

EXTRACT-symptom = (?ims)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Symptoms?:?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(?<Symptom1>.*?)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};) in releaseNoteText
EXTRACT-conditions = (?ims)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Conditions?:?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(?<Conditions1>.*?)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};) in releaseNoteText
EXTRACT-workaround = (?ims)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Workaround:?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(?<Workaround1>.*?)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};) in releaseNoteText
EXTRACT-further_problem_description = (?ims)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Further Problem Description:?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(?<Further_Problem_Description1>.*?)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};) in releaseNoteText

EXTRACT-psirt_evaluation = (?ims)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)PSIRT Evaluation:?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(?<PSIRT_Evaluation>.*?)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};) in releaseNoteText

# symtpom/conditions/workaround/further_problem_description without <b> Tags:
EXTRACT-symptom2 = (?m)^Symptom:[\r\n\s]*(?<Symptom2>.+)[\r\n\s]*^([A-Z][a-z]{7,}[a-z ]+:|$) in releaseNoteText
EXTRACT-conditions2 = (?m)^Conditions:[\r\n\s]*(?<Conditions2>.+)[\r\n\s]*^([A-Z][a-z]{7,}[a-z ]+:|$) in releaseNoteText
EXTRACT-workaround2 = (?m)^Workaround:[\r\n\s]*(?<Workaround2>.+)[\r\n\s]*^([A-Z][a-z]{7,}[a-z ]+:|$) in releaseNoteText
EXTRACT-further_problem_description2 = (?m)^Further Problem Description:[\r\n\s]*(?<Further_Problem_Description2>.+)[\r\n\s]*^([A-Z][a-z]{7,}[a-z ]+:|$) in releaseNoteText

# symtpom/conditions/workaround/further_problem_description with label and desc inside of <b> Tags: <B>Conditions: No specific condition</B>
EXTRACT-symptom3 = (?m)^(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Symptoms?:\s+(?<Symptom3>[^<]+)
EXTRACT-conditions3 = (?m)^(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Conditions?:\s+(?<Conditions3>[^<]+)
EXTRACT-workaround3 = (?m)^(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Workarounds?:\s+(?<Workaround3>[^<]+)
EXTRACT-further_problem_description3 = (?m)^(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Further Problem Description:\s+(?<Further_Problem_Description3>[^<]+)


REPORT-cve_pattern = cve_pattern,affected_releases, fixed_releases

FIELDALIAS-Headline          = headLine                    AS Headline 
FIELDALIAS-status            = statusGroup               AS Status
FIELDALIAS-further_description = Further_Problem_Description AS Further_Description
FIELDALIAS-last_modified    = bugLastModifiedDate        AS Last_Modified

EVAL-cve = mvdedup(CVE_inline)

EVAL-Symptom = coalesce ( Symptom1, Symptom2, Symptom3 )
EVAL-Conditions = coalesce ( Conditions1, Conditions2, Conditions3 )
EVAL-Workaround = coalesce ( Workaround1, Workaround2, Workaround3 )
EVAL-Further_Problem_Description = coalesce ( Further_Problem_Description1, Further_Problem_Description2, Further_Problem_Description3 )



EVAL-product = split (product, ",")

EVAL-severity = CASE ( severityCode = "1", "critical"      ,\
                       severityCode = "2", "high"          ,\
                       severityCode = "3", "medium"        ,\
                       severityCode = "4", "informational" ,\
                       severityCode = "5", "low"           ,\
                       severityCode = "6", "low"  )

EVAL-Severity = CASE ( severityCode = "1", "Catastrophic" ,\
                           severityCode = "2", "Severe"       ,\
                           severityCode = "3", "Moderate"     ,\
                           severityCode = "4", "Minor"        ,\
                           severityCode = "5", "Cosmetic"     ,\
                           severityCode = "6", "Enhancement"  )

EVAL-is_vulnerability = CASE ( like     (_raw, "%CiscoSecurityAdvisory%" ) , "Vulnerability",\
                               isnotnull(CVSS)                             , "Vulnerability",\
                               isnotnull(CVE_inline)                       , "Vulnerability",\
                               isnotnull(PSIRT_Evaluation) AND NOT like( _raw, "%not meet the criteria for PSIRT%") , "Vulnerability",\
                               1=1                                         , "Bug")

EVAL-vendor="Cisco"


[cisco:bugs:json]
BREAK_ONLY_BEFORE=^{
CHARSET=UTF-8
MAX_DAYS_AGO=99999
#SHOULD_LINEMERGE=true
SHOULD_LINEMERGE=false
category=Structured
description=Cisco Bug Search JSON
disabled=false
pulldown_type=true
LINE_BREAKER=([\r\n]){
TIME_FORMAT=%Y-%m-%d
TIME_PREFIX="createDate": "
TRUNCATE = 100000
KV_MODE = auto
AUTO_KV_JSON = true

TRANSFORMS-remove_path_from_source = remove_path_from_source

#EXTRACT-cvss = time of evaluation[^\d]+(?<CVSS>[\d\.\/]+)
EXTRACT-cvss = time of evaluation[isare ]+(?<CVSS>[\d\.\/]+)
EXTRACT-z_cvss = ^(?<cvss>[\d\.]+) in CVSS

# some cvss_links contains \n, additionally apply an EVAL below to delete \n in the middle
#EXTRACT-b_cvss_link = (?<cvss_link>http\S+:[a-zA-Z]+)
#EXTRACT-b_cvss_link = (?<cvss_link>http\S+:[a-zA-Z]+)
# TODO: rewrite &amp; CSCuu45000 https://intellishield.cisco.com/security/alertmanager/cvssCalculator.do?dispatch=1&amp;version=2&amp;vector=AV:A/AC:M/Au:S/C:C/I:C/A:C/E:POC/RL:U/RC:C
EXTRACT-b_cvss_link = (?<cvss_link>https?://[\w\.\-]+cisco[\w\.\-]+/\S+/cvssCalculator[\w=\.\?:/&]+)

# extract a text before <B>Symptom:</B> e.g. in CSCvz26149: Keeping defect internal until Dev team investigates the panics. Attention: (?s) flag for multiline!

#EXTRACT-affected_releases = (?m)"knownAffectedReleases":\s+"(?<affected_releases_string>[^"]+)"
#EXTRACT-fixed_releases = (?m)"knownFixedReleases":\s+"(?<fixed_releases_string>[^"]+)"
EXTRACT-affected_releases = (?m)"knownAffectedReleases":\s+"(?<knownAffectedReleases>[^"]+)"
EXTRACT-fixed_releases = (?m)"knownFixedReleases":\s+"(?<knownFixedReleases>[^"]+)"

EXTRACT-description = (?s)\"(?<pre_symptom_text>[^"]*?)<[bB]>Symptoms?:<\/[bB]>
EXTRACT-aa_releaseNoteText2 = (?m)"releaseNoteText":\s*"(?<releaseNoteText2>.*?)",$

EXTRACT-symptom = (?ims)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Symptoms?:?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(?<Symptom>.*?)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};) in releaseNoteText2
EXTRACT-conditions = (?ims)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Conditions?:?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(?<Conditions>.*?)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};) in releaseNoteText2
EXTRACT-workaround = (?ims)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Workaround:?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(?<Workaround>.*?)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};) in releaseNoteText2
EXTRACT-further_problem_description = (?ims)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)Further Problem Description:?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(?<Further_Problem_Description>.*?)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};) in releaseNoteText2
EXTRACT-psirt_evaluation = (?ims)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};)PSIRT Evaluation:?(?:<|&[ltLT]{2};)\/[bB](?:>|&[gtGT]{2};)(?<PSIRT_Evaluation>.*?)(?:<|&[ltLT]{2};)[bB](?:>|&[gtGT]{2};) in releaseNoteText2

REPORT-cve_pattern = cve_pattern, affected_releases, fixed_releases

FIELDALIAS-headline         = headLine                    AS Headline
FIELDALIAS-severity         = severityName                AS Severity
FIELDALIAS-severity_num     = severityCode                AS Severity_num
FIELDALIAS-bug_status       = statusGroup                 AS Status
FIELDALIAS-last_modified    = bugLastModifiedDate         AS Last_Modified
FIELDALIAS-created_date     = createDate                  AS Created_Date

EVAL-behaviorChangedFlag = CASE ( behaviorChangedFlag="false", "false", \
                                  behaviorChangedFlag="true" , "true" , \
                                  behaviorChangedFlag="N"    , "false", \
                                  behaviorChangedFlag="Y"    , "true" , \
                                  1=1                        , "unknown" )

# 2nd step by cleaning cvss_link - replacing \n with "&" - can be still wrong
EVAL-cvss_link = replace ( cvss_link, "\\\n", "&")

EVAL-cve = CASE (isnotnull(psirtCves), split ( psirtCves, " ") ,\
                 isnotnull(CVE_inline), CVE_inline )

EVAL-is_vulnerability = CASE ( isnotnull(psirtCves)         , "Vulnerability",\
                               isnotnull(CVSS)              , "Vulnerability",\
                               isnotnull(CVE_inline)        , "Vulnerability",\
                               isnotnull(PSIRT_Evaluation) AND NOT like( _raw, "%not meet the criteria for PSIRT%") , "Vulnerability",\
                               1=1                          , "Bug")

EVAL-vendor="Cisco"

