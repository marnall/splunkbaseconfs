[cisco_bug_search_index_and_sourcetypes]
definition = ( sourcetype=cisco:bugs:csv OR sourcetype=cisco:bugs:json )

[cisco_bug_search_show_recent_sources]
definition =  metasearch `cisco_bug_search_index_and_sourcetypes` | stats count by source | rex field=source "^(?<product>\D+)_(?<day>\d\d)\.(?<mon>\d\d)\.(?<year>\d+)\.(?<suffix>json|csv)$" | eval timestamp=year.mon.day | stats max(timestamp) AS timestamp by product suffix | rex field=timestamp "^(?<year>\d+)(?<mon>\d\d)(?<day>\d\d)$" | eval source=product."_".day.".".mon.".".year.".".suffix | fields source 
