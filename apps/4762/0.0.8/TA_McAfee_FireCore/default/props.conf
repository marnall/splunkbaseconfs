# 10/24/2019 23:58:02.242 INFO Process terminated PID 2360 SPLUNK-WINPRINTMON.EXE\x00\x00
EXTRACT-info_process_started_terminated = ^\d+/\d+/\d+\s+\d\d:\d\d:\d\d\.\d\d\d\s+(?<fc_log_level>[A-Z]{2,10})\s+(?<fc_process_action>Process [a-z]+)\s+PID\s+(?<fc_pid>\d{1,5})\s+(?<fc_process>[^\\]+)

