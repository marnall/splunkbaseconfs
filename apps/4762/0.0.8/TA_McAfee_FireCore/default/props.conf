EXTRACT-info_connection_closed_opened = ^\d+/\d+/\d+\s+\d\d:\d\d:\d\d\.\d\d\d\s+(?<fc_log_level>[A-Z]{2,10})\s+(?<fc_connection_action>Connection \w+)\s+(?<fc_connection_direction>[A-Z]{2,10})\s+(?<fc_proto>\d{1,10})\s+(?<fc_src>(\d+\.\d+\.\d+\.\d+)|([a-f0-9:]+[a-f0-9])):(?<fc_src_port>\d{1,5})\s+(?<fc_dest>(\d+\.\d+\.\d+\.\d+)|([a-f0-9:]+[a-f0-9])):(?<fc_dest_port>\d{1,5})\s*(?:PID)?\s*(?<fc_pid>\d+)?\s*(?<fc_process>[^\\]+)?


