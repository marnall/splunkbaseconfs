# 10/24/2019 23:53:56.842 INFO Endpoint closed 017 0:0:0:0:0:0:0:0:52249 PID 1412 SVCHOST.EXE\x00\x00 
# 10/24/2019 23:55:35.377 INFO Endpoint opened 017 fe80:0:0:0:e546:631a:b4e3:9a21:546 PID 724 SVCHOST.EXE\x00\x00 
EXTRACT-info_endpoint_opened_closed = ^\d+/\d+/\d+\s+\d\d:\d\d:\d\d\.\d\d\d\s+(?<fc_log_level>[A-Z]{2,10})\s+(?<fc_endpoint_action>Endpoint [a-z]+)\s+(?<fc_proto>\d{1,10})\s+(?<fc_endpoint_addr>[^ ]+):(?<fc_endpoint_port>\d{1,5})\s+PID\s+(?<fc_pid>\d{1,5})\s+(?<fc_process>[^\\]+)

