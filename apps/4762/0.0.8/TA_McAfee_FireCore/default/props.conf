[mcafee:firecore]
TIME_PREFIX=^
MAX_TIMESTAMP_LOOKAHEAD=24
TIME_FORMAT=%m/%d/%Y %H:%M:%S.%3N
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)
TRUNCATE=10000
EVENT_BREAKER_ENABLE=true
EVENT_BREAKER=([\r\n]+)
CHARSET = AUTO

# remove trailing \x00\x00 
SEDCMD-remove_null_ending = s/\\x00\\x00//

