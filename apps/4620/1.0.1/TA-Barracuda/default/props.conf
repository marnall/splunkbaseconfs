# DO NOT EDIT THIS FILE!
# Please make all changes to files in $SPLUNK_HOME/etc/apps/TA-Barracuda/local.
# To make changes, copy the section/stanza you want to change from $SPLUNK_HOME/etc/apps/TA-Barracuda/default
# into ../local and edit there.

[barracuda]
KV_MODE                                = none
ANNOTATE_PUNCT                         = false
TRANSFORMS-barracuda_change_sourcetype = barracuda_sourcetype_recv,barracuda_sourcetype_send,barracuda_sourcetype_scan,barracuda_sourcetype_management

[barracuda::scan]
KV_MODE                           = none
ANNOTATE_PUNCT                    = false
REPORT-barracuda_scan             = barracuda_scan
EVAL-scan_duration                = (end-start)
EVAL-encryption                   = case(encryption == "ENC", "True", encryption == "-", "False")
LOOKUP-barracuda_recv_scan_action = barracuda_recv_scan_action action_id OUTPUTNEW action
LOOKUP-barracuda_recv_scan_reason = barracuda_recv_scan_reason motif_id OUTPUTNEW motif

[barracuda::recv]
KV_MODE                           = none
ANNOTATE_PUNCT                    = false
REPORT-barracuda_recv             = barracuda_recv
EVAL-recv_duration		  = (end-start)
LOOKUP-barracuda_recv_scan_action = barracuda_recv_scan_action action_id OUTPUTNEW action
LOOKUP-barracuda_recv_scan_reason = barracuda_recv_scan_reason motif_id OUTPUTNEW motif

[barracuda::send]
KV_MODE 			  = none
ANNOTATE_PUNCT                    = false
REPORT-barracuda_send             = barracuda_send
EVAL-send_encryption              = case(send_encryption == "ENC", "True", send_encryption == "-", "False")
LOOKUP-barracuda_send_action      = barracuda_send_action send_action_id OUTPUTNEW send_action

[barracuda::management]
KV_MODE 			  = none
ANNOTATE_PUNCT                    = false
