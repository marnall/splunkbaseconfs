[expose:TA-opencti-for-splunk-enterprise_settings]
pattern = TA-opencti-for-splunk-enterprise_settings
methods = POST, GET

[expose:TA-opencti-for-splunk-enterprise_settings_specified]
pattern = TA-opencti-for-splunk-enterprise_settings/*
methods = POST, GET, DELETE

[expose:TA-opencti-for-splunk-enterprise_opencti_stream]
pattern = TA-opencti-for-splunk-enterprise_opencti_stream
methods = POST, GET

[expose:TA-opencti-for-splunk-enterprise_opencti_stream_specified]
pattern = TA-opencti-for-splunk-enterprise_opencti_stream/*
methods = POST, GET, DELETE

[expose:data/indexes]
pattern = data/indexes
methods = GET
