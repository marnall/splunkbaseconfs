#
# server.conf – SHC replication for custom configuration files
#
# Ensures that smime_mailer_settings.conf, smime_recipient_certs.conf and
# smime_sender_certs.conf are replicated across Search Head Cluster members.
#

[shclustering]
conf_replication_include.smime_mailer_settings = true
conf_replication_include.smime_recipient_certs = true
conf_replication_include.smime_sender_certs = true
