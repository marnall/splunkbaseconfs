# Expose conf files for REST management
[admin:smime_mailer_settings]
match = /smime_mailer_settings
members = smtp

[admin:smime_recipient_certs]
match = /smime_recipient_certs

[admin:smime_sender_certs]
match = /smime_sender_certs

# Read-only certificate monitoring endpoint (directly queryable by | rest)
[script:smime_cert_monitor]
match = /smime_cert_monitor
script = smime_cert_monitor_rest.py
scripttype = persist
handler = smime_cert_monitor_rest.SmimeCertMonitorHandler
requireAuthentication = true
output_modes = json
python.version = python3
python.required = 3.13
passPayload = true
passHttpHeaders = true
passHttpCookies = true

# Custom REST endpoint for certificate upload & validation
[script:smime_cert_manager]
match = /smime_mailer/cert_manager
script = smime_cert_manager_rest.py
scripttype = persist
handler = smime_cert_manager_rest.SmimeCertManagerHandler
requireAuthentication = true
output_modes = json
python.version = python3
python.required = 3.13
passPayload = true
passHttpHeaders = true
passHttpCookies = true

# SOAR integration endpoint — receives email requests from Splunk SOAR
[script:smime_soar]
match = /smime_soar/send
script = smime_soar_handler.py
scripttype = persist
handler = smime_soar_handler.SmimeSoarHandler
requireAuthentication = true
output_modes = json
python.version = python3
python.required = 3.13
passPayload = true
passHttpHeaders = true
passHttpCookies = true
