[smimemail]
filename = smime_send_command.py
chunked = true
generating = false
python.version = python3
python.required = 3.13
description = Send S/MIME signed and encrypted email. Validates that all recipients have public certificates configured.
syntax = smimemail to=<email> cc=<email> bcc=<email> subject=<string> body=<string> body_field=<field> content_type=<html|plain> attachment_fields=<fields>
usage = public

[smimeexpirynotify]
filename = smime_expiry_notify.py
chunked = true
generating = true
python.version = python3
python.required = 3.13
description = Check certificate/token/secret expiry and send S/MIME encrypted notification emails. Designed for scheduled execution.
syntax = smimeexpirynotify dryrun=<bool>
usage = public
