[expose:smime_mailer_conf]
pattern = configs/conf-smime_mailer_settings
methods = GET, POST

[expose:smime_mailer_conf_smtp]
pattern = configs/conf-smime_mailer_settings/*
methods = GET, POST

[expose:smime_properties]
pattern = properties/smime_mailer_settings
methods = GET

[expose:smime_properties_smtp]
pattern = properties/smime_mailer_settings/*
methods = GET

[expose:smime_recipient_certs]
pattern = configs/conf-smime_recipient_certs
methods = GET, POST, DELETE

[expose:smime_recipient_certs_entry]
pattern = configs/conf-smime_recipient_certs/*
methods = GET, POST, DELETE

[expose:smime_sender_certs]
pattern = configs/conf-smime_sender_certs
methods = GET, POST, DELETE

[expose:smime_sender_certs_entry]
pattern = configs/conf-smime_sender_certs/*
methods = GET, POST, DELETE

[expose:smime_passwords]
pattern = storage/passwords
methods = GET, POST, DELETE

[expose:smime_passwords_entry]
pattern = storage/passwords/*
methods = GET, POST, DELETE

[expose:smime_cert_manager]
pattern = smime_mailer/cert_manager
methods = GET, POST, DELETE

[expose:smime_admin_settings]
pattern = smime_mailer_settings
methods = GET, POST

[expose:smime_admin_settings_entry]
pattern = smime_mailer_settings/*
methods = GET, POST

[expose:smime_soar]
pattern = smime_soar/send
methods = GET, POST
