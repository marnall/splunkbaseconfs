;; Role for SOAR integration service account.
;; This role grants the minimum capabilities needed for the SOAR REST handler
;; to read certificates and passwords stored by TA-smime-mailer.

[role_mc_soar_proxy]
; Allow reading stored credentials (SMTP password, OAuth2 secret, HF token, sender keys)
list_storage_passwords = enabled

; REST endpoint access -- import 'user' for basic REST API access
importRoles = user
srchJobsQuota = 0
rtSrchJobsQuota = 0
srchDiskQuota = 0
