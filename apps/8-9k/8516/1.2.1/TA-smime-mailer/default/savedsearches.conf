# =========================================================
# savedsearches.conf — S/MIME Mailer
# =========================================================

[S/MIME Certificate Expiry Monitor]
description = Checks all configured certificates, tokens, and secrets for approaching expiry and sends S/MIME encrypted notification emails to administrators (and optionally to individual certificate owners).
search = | smimeexpirynotify
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 1 */12 * * *
is_scheduled = 1
enableSched = 1
disabled = 0
alert.suppress = 0
alert.track = 0
