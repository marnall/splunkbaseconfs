<form class="form-horizontal form-complex">
    <style>
        /* Allow the message body textarea to be resized freely (classic Splunk UI) */
        #smime_body {
            resize: both;
            width: 100%;
            min-width: 200px;
            min-height: 80px;
            box-sizing: border-box;
            overflow: auto;
        }
        /* Ensure the controls container does not clip the resize handle */
        .form-horizontal .control-group .controls {
            overflow: visible;
        }
    </style>
    <div class="control-group">
        <label class="control-label" for="smime_to">To (Recipients)</label>
        <div class="controls">
            <input type="text" name="action.smime_send_email.param.to" id="smime_to"
                   placeholder="user1@example.com, user2@example.com" />
            <span class="help-block">Comma-separated list of recipient email addresses. 
            All recipients must have S/MIME certificates configured.</span>
        </div>
    </div>

    <div class="control-group">
        <label class="control-label" for="smime_cc">CC</label>
        <div class="controls">
            <input type="text" name="action.smime_send_email.param.cc" id="smime_cc"
                   placeholder="cc@example.com" />
        </div>
    </div>

    <div class="control-group">
        <label class="control-label" for="smime_bcc">BCC</label>
        <div class="controls">
            <input type="text" name="action.smime_send_email.param.bcc" id="smime_bcc"
                   placeholder="bcc@example.com" />
        </div>
    </div>

    <div class="control-group">
        <label class="control-label" for="smime_priority">Priority</label>
        <div class="controls">
            <select name="action.smime_send_email.param.priority" id="smime_priority">
                <option value="1">Highest</option>
                <option value="2">High</option>
                <option value="3" selected="selected">Normal</option>
                <option value="4">Low</option>
                <option value="5">Lowest</option>
            </select>
        </div>
    </div>

    <div class="control-group">
        <label class="control-label" for="smime_subject">Subject</label>
        <div class="controls">
            <input type="text" name="action.smime_send_email.param.subject" id="smime_subject"
                   value="Splunk Alert: $name$" />
            <span class="help-block">The email subject, recipients and message can include tokens that insert text based on the results of the search.</span>
        </div>
    </div>

    <div class="control-group">
        <label class="control-label" for="smime_body">Message</label>
        <div class="controls" style="overflow: visible;">
            <textarea name="action.smime_send_email.param.body" id="smime_body" rows="8"
                      style="resize: both; width: 100%; min-height: 120px; min-width: 200px; box-sizing: border-box;"
                      >The alert condition for '$name$' was triggered.</textarea>
        </div>
    </div>

    <div class="control-group">
        <label class="control-label">Include</label>
        <div class="controls">
            <label class="checkbox">
                <input type="checkbox" name="action.smime_send_email.param.include_link_to_alert" value="true" checked="checked" />
                Link to Alert
            </label>
            <label class="checkbox">
                <input type="checkbox" name="action.smime_send_email.param.include_link_to_results" value="true" checked="checked" />
                Link to Results
            </label>
            <label class="checkbox">
                <input type="checkbox" name="action.smime_send_email.param.include_search_string" value="true" />
                Search String
            </label>
            <label class="checkbox">
                <input type="checkbox" name="action.smime_send_email.param.include_inline" value="true" />
                Inline
            </label>
            <label class="checkbox">
                <input type="checkbox" name="action.smime_send_email.param.include_trigger_condition" value="true" />
                Trigger Condition
            </label>
            <label class="checkbox">
                <input type="checkbox" name="action.smime_send_email.param.attach_csv" value="true" />
                Attach CSV
            </label>
            <label class="checkbox">
                <input type="checkbox" name="action.smime_send_email.param.include_trigger_time" value="true" />
                Trigger Time
            </label>
            <label class="checkbox">
                <input type="checkbox" name="action.smime_send_email.param.attach_pdf" value="true" />
                Attach PDF
            </label>
        </div>
    </div>

    <div class="control-group">
        <label class="control-label" for="smime_format">Format</label>
        <div class="controls">
            <select name="action.smime_send_email.param.format" id="smime_format">
                <option value="table" selected="selected">Table</option>
                <option value="raw">Raw</option>
                <option value="csv">CSV</option>
            </select>
        </div>
    </div>

    <div class="control-group">
        <label class="control-label" for="smime_content_type">Type</label>
        <div class="controls">
            <select name="action.smime_send_email.param.content_type" id="smime_content_type">
                <option value="html" selected="selected">HTML &amp; Plain Text</option>
                <option value="plain">Plain Text</option>
            </select>
        </div>
    </div>
</form>
