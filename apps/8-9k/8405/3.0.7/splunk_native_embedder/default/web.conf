# Splunk Native Embedder Web Configuration
# AppInspect-compliant: only expose REST endpoints here.
# Embedding headers are configured at runtime via the Configure Embedding UI.

# Expose REST endpoints
[expose:embedder_data_inputs]
pattern = data/inputs/embedder
methods = GET, POST

[expose:embedder_data_inputs_item]
pattern = data/inputs/embedder/*
methods = GET, POST, DELETE

[expose:embedder_data_inputs_control]
pattern = data/inputs/embedder/*/*
methods = POST

[expose:embedder_conf_inputs]
pattern = configs/conf-inputs
methods = GET, POST

[expose:embedder_conf_inputs_item]
pattern = configs/conf-inputs/*
methods = GET, POST, DELETE
