# Event Builder For Splunk — macros.conf
# Reusable SPL index group macros

[eb_all_indexes]
definition = index=web OR index=network OR index=linux OR index=windows OR index=dns OR index=vpn OR index=aws OR index=gcp OR index=ids OR index=email OR index=o365 OR index=database OR index=proxy OR index=kubernetes OR index=edr OR index=identity OR index=virtualization OR index=saas OR index=monitoring OR index=itsm OR index=pam
iseval = 0

[eb_security_indexes]
definition = index=windows OR index=linux OR index=identity OR index=edr OR index=ids OR index=pam
iseval = 0

[eb_network_indexes]
definition = index=network OR index=dns OR index=proxy OR index=vpn
iseval = 0

[eb_cloud_indexes]
definition = index=aws OR index=gcp OR index=o365 OR index=kubernetes OR index=saas
iseval = 0
