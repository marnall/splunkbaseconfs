# Event Builder For Splunk — savedsearches.conf
# 10 Correlation Rules — all disabled by default (disabled = 1)
# Enable individually via Splunk UI or REST API after review

# ─────────────────────────────────────────────────────────────────────────────
# Rule 1: Brute Force Login Detection
# ─────────────────────────────────────────────────────────────────────────────
[EB - Brute Force Login Detected]
action.email.useNSSubject = 1
alert.severity = 3
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = Detects brute force login attempts: 10 or more authentication failures from a single source IP against the same account within 5 minutes.
disabled = 1
dispatch.earliest_time = -5m@m
dispatch.latest_time = now
quantity = 0
relation = greater than
search = `eb_security_indexes` (sourcetype=linux_secure OR sourcetype=WinEventLog:Security OR sourcetype=OktaIM2:log OR sourcetype=azure:aad:signin) (action=Failed OR action=Failure OR "authentication failure" OR EventCode=4625 OR "AUTHENTICATION_FAILED") \
| eval src_ip=coalesce(src_ip, Source_Network_Address, client) \
| eval user=coalesce(user, Account_Name, actor.alternateId) \
| where isnotnull(src_ip) AND src_ip!="-" AND src_ip!="::1" AND isnotnull(user) \
| bin _time span=5m \
| stats count as failure_count by _time, src_ip, user \
| where failure_count >= 10 \
| eval severity="High", rule="EB - Brute Force Login Detected", message="Source IP ".src_ip." failed ".failure_count." times against account ".user." in 5 minutes"

# ─────────────────────────────────────────────────────────────────────────────
# Rule 2: Impossible Travel Detection
# ─────────────────────────────────────────────────────────────────────────────
[EB - Impossible Travel Detected]
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = Detects same user authenticating from two different geographic locations within 30 minutes — physically impossible travel.
disabled = 1
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
quantity = 0
relation = greater than
search = `eb_security_indexes` (sourcetype=OktaIM2:log OR sourcetype=azure:aad:signin OR sourcetype=o365:management:activity) \
| eval user=coalesce(actor.alternateId, userPrincipalName, UserId) \
| eval country=coalesce(client.geographicalContext.country, location.countryOrRegion, "Unknown") \
| eval src_ip=coalesce(client.ipAddress, ipAddress, ClientIP) \
| where isnotnull(user) AND country!="Unknown" \
| stats dc(country) as distinct_countries, values(country) as countries, values(src_ip) as ips by user \
| where distinct_countries >= 2 \
| eval severity="Critical", rule="EB - Impossible Travel Detected", message="User ".user." authenticated from ".distinct_countries." different countries: ".mvjoin(countries, ", ")

# ─────────────────────────────────────────────────────────────────────────────
# Rule 3: MFA Bypass or Factor Deactivation
# ─────────────────────────────────────────────────────────────────────────────
[EB - MFA Bypass or Factor Deactivation]
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */10 * * * *
description = Detects MFA factor deactivation followed within 60 minutes by a successful login without MFA challenge.
disabled = 1
dispatch.earliest_time = -70m@m
dispatch.latest_time = now
quantity = 0
relation = greater than
search = `eb_security_indexes` sourcetype=OktaIM2:log \
| eval event_type=coalesce(eventType, displayMessage) \
| eval user=coalesce(actor.alternateId, actor.displayName) \
| where event_type="user.mfa.factor.deactivate" OR event_type="system.mfa.factor.deactivate" OR (event_type="user.session.start" AND authenticationContext.authenticationStep="0") \
| eval action_type=if(match(event_type,"deactivate"), "mfa_deactivated", "login_no_mfa") \
| stats values(action_type) as actions, min(_time) as earliest, max(_time) as latest by user \
| where mvfind(actions, "mfa_deactivated")>=0 AND mvfind(actions, "login_no_mfa")>=0 \
| eval time_diff=latest-earliest \
| where time_diff <= 3600 \
| eval severity="Critical", rule="EB - MFA Bypass or Factor Deactivation", message="User ".user." deactivated MFA and logged in without MFA within ".round(time_diff/60)." minutes"

# ─────────────────────────────────────────────────────────────────────────────
# Rule 4: Privileged Container Created in Kubernetes
# ─────────────────────────────────────────────────────────────────────────────
[EB - Privileged Container Created in K8s]
action.email.useNSSubject = 1
alert.severity = 3
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = Detects creation of privileged containers or containers running as root in Kubernetes, which can allow container escape.
disabled = 1
dispatch.earliest_time = -5m@m
dispatch.latest_time = now
quantity = 0
relation = greater than
search = index=kubernetes sourcetype=kube:apiserver:audit \
| eval verb=coalesce(verb, requestVerb) \
| eval resource=coalesce(objectRef.resource, resource) \
| eval request_body=coalesce(requestObject, "") \
| where verb="create" AND resource="pods" \
| where match(request_body, "\"privileged\"\s*:\s*true") OR match(request_body, "\"runAsUser\"\s*:\s*0") OR match(request_body, "\"hostPID\"\s*:\s*true") OR match(request_body, "\"hostNetwork\"\s*:\s*true") \
| eval user=coalesce('user.username', sourceIPs{}) \
| eval namespace=coalesce('objectRef.namespace', "default") \
| eval pod_name=coalesce('objectRef.name', "unknown") \
| eval severity="High", rule="EB - Privileged Container Created in K8s", message="Privileged pod ".pod_name." created in namespace ".namespace." by user ".user

# ─────────────────────────────────────────────────────────────────────────────
# Rule 5: AWS IAM Privilege Escalation
# ─────────────────────────────────────────────────────────────────────────────
[EB - AWS IAM Privilege Escalation]
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */10 * * * *
description = Detects IAM privilege escalation patterns in AWS CloudTrail: attaching admin policies or creating access keys for privileged users.
disabled = 1
dispatch.earliest_time = -10m@m
dispatch.latest_time = now
quantity = 0
relation = greater than
search = index=aws sourcetype=aws:cloudtrail \
| eval event_name=coalesce(eventName, "unknown") \
| where event_name IN ("AttachUserPolicy", "AttachRolePolicy", "AttachGroupPolicy", "PutUserPolicy", "PutRolePolicy", "CreateAccessKey", "AddUserToGroup") \
| eval user=coalesce(userIdentity.arn, userIdentity.userName, "Unknown") \
| eval target=coalesce(requestParameters.userName, requestParameters.roleName, requestParameters.groupName, "Unknown") \
| eval policy=coalesce(requestParameters.policyArn, requestParameters.policyDocument, "") \
| where match(policy, "AdministratorAccess") OR match(policy, "\*") OR event_name="CreateAccessKey" \
| eval severity="Critical", rule="EB - AWS IAM Privilege Escalation", message="IAM escalation event ".event_name." by ".user." targeting ".target

# ─────────────────────────────────────────────────────────────────────────────
# Rule 6: Lateral Movement — Pass-the-Hash
# ─────────────────────────────────────────────────────────────────────────────
[EB - Lateral Movement Pass-the-Hash]
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */10 * * * *
description = Detects Pass-the-Hash lateral movement: EventCode 4624 with LogonType=3 and NTLM authentication accessing 3 or more distinct hosts within 10 minutes.
disabled = 1
dispatch.earliest_time = -10m@m
dispatch.latest_time = now
quantity = 0
relation = greater than
search = index=windows sourcetype=WinEventLog:Security EventCode=4624 \
| where Logon_Type="3" AND match(_raw, "NTLM") \
| eval user=coalesce(Account_Name, "Unknown") \
| eval src_ip=coalesce(Source_Network_Address, "Unknown") \
| where user!="ANONYMOUS LOGON" AND user!="-" AND src_ip!="127.0.0.1" AND src_ip!="::1" \
| bin _time span=10m \
| stats dc(host) as distinct_hosts, values(host) as target_hosts, values(src_ip) as source_ips by _time, user \
| where distinct_hosts >= 3 \
| eval severity="Critical", rule="EB - Lateral Movement Pass-the-Hash", message="User ".user." used NTLM to access ".distinct_hosts." hosts via Pass-the-Hash: ".mvjoin(target_hosts, ", ")

# ─────────────────────────────────────────────────────────────────────────────
# Rule 7: C2 Beaconing Pattern Detection
# ─────────────────────────────────────────────────────────────────────────────
[EB - C2 Beaconing Pattern Detected]
action.email.useNSSubject = 1
alert.severity = 3
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = Detects Command-and-Control beaconing: Suricata C2 category alerts or highly regular outbound network connections suggesting automated beaconing.
disabled = 1
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
quantity = 0
relation = greater than
search = (index=ids sourcetype=suricata category="Command and Control") OR (index=network (sourcetype=pan:traffic OR sourcetype=cisco:asa OR sourcetype=fgt_traffic) action!=deny) \
| eval src_ip=coalesce(src_ip, "Unknown"), dest_ip=coalesce(dest_ip, "Unknown") \
| where isnotnull(src_ip) AND src_ip!="Unknown" AND isnotnull(dest_ip) AND dest_ip!="Unknown" \
| bin _time span=1m \
| stats count as conn_count by _time, src_ip, dest_ip \
| stats avg(conn_count) as avg_per_min, stdev(conn_count) as stdev_per_min, sum(conn_count) as total_conns, dc(_time) as minutes_active by src_ip, dest_ip \
| where minutes_active >= 10 AND avg_per_min >= 1 AND stdev_per_min <= 1 \
| eval severity="High", rule="EB - C2 Beaconing Pattern Detected", message="Possible C2 beaconing from ".src_ip." to ".dest_ip.": avg ".round(avg_per_min, 2)." conn/min with stdev ".round(stdev_per_min, 2)." over ".minutes_active." minutes"

# ─────────────────────────────────────────────────────────────────────────────
# Rule 8: Data Exfiltration via Proxy
# ─────────────────────────────────────────────────────────────────────────────
[EB - Data Exfiltration via Proxy]
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = Detects potential data exfiltration: a single source uploading more than 200MB through proxy to non-business URL categories within one hour.
disabled = 1
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
quantity = 0
relation = greater than
search = index=proxy (sourcetype=squid OR sourcetype=zscalernss-web) \
| eval src_ip=coalesce(src_ip, "Unknown") \
| eval bytes_sent=coalesce(bytes_sent, bytes_out, bytes, 0) \
| eval url_category=coalesce(url_category, urlcategory, "Unknown") \
| where src_ip!="Unknown" AND bytes_sent>0 \
| where NOT url_category IN ("Business and Economy", "Computer and Internet Info", "Financial Services", "Education") \
| stats sum(bytes_sent) as total_bytes_sent, dc(url) as distinct_urls, values(url_category) as categories by src_ip \
| where total_bytes_sent > 209715200 \
| eval total_mb=round(total_bytes_sent/1048576, 1) \
| eval severity="Critical", rule="EB - Data Exfiltration via Proxy", message="Source ".src_ip." uploaded ".total_mb."MB via proxy to non-business categories: ".mvjoin(categories, ", ")

# ─────────────────────────────────────────────────────────────────────────────
# Rule 9: Credential Dumping Tool Detection
# ─────────────────────────────────────────────────────────────────────────────
[EB - Credential Dumping Tool Detected]
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = Detects credential dumping: CrowdStrike Credential Access tactic events correlated with Windows 4656/4663 events accessing lsass.exe process memory.
disabled = 1
dispatch.earliest_time = -10m@m
dispatch.latest_time = now
quantity = 0
relation = greater than
search = (index=edr sourcetype=crowdstrike:falcon:json Technique="Credential Access") OR (index=windows sourcetype=WinEventLog:Security (EventCode=4656 OR EventCode=4663) "lsass") \
| eval device=coalesce(ComputerName, DeviceName, host) \
| eval user=coalesce(Account_Name, UserName, "Unknown") \
| eval technique=coalesce(Technique, "Windows lsass Access") \
| eval process=coalesce(Process_Name, ObjectName, "Unknown") \
| eval severity="Critical", rule="EB - Credential Dumping Tool Detected", message="Credential dumping detected on ".device.": ".technique." by user ".user." accessing ".process

# ─────────────────────────────────────────────────────────────────────────────
# Rule 10: PAM Secret Accessed Outside Business Hours
# ─────────────────────────────────────────────────────────────────────────────
[EB - PAM Secret Accessed Outside Hours]
action.email.useNSSubject = 1
alert.severity = 3
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */10 * * * *
description = Detects privileged account secret retrieval from CyberArk or HashiCorp Vault outside business hours (22:00-06:00 local time or weekends).
disabled = 1
dispatch.earliest_time = -10m@m
dispatch.latest_time = now
quantity = 0
relation = greater than
search = index=pam (sourcetype=cyberark:epv:audit OR sourcetype=hashicorp:vault:audit) \
| eval hour=tonumber(strftime(_time, "%H")) \
| eval dow=tonumber(strftime(_time, "%w")) \
| eval is_outside_hours=if(hour>=22 OR hour<6, 1, 0) \
| eval is_weekend=if(dow=0 OR dow=6, 1, 0) \
| where is_outside_hours=1 OR is_weekend=1 \
| eval user=coalesce(user, 'auth.metadata.entity_id', "Unknown") \
| eval action=coalesce(action, 'type', "secret_access") \
| eval target=coalesce(target, 'request.path', "Unknown") \
| eval time_context=if(is_weekend=1, "weekend", strftime(_time, "%H:%M")." (off-hours)") \
| eval severity="Medium", rule="EB - PAM Secret Accessed Outside Hours", message="PAM secret accessed by ".user." at ".time_context.": action=".action." target=".target
