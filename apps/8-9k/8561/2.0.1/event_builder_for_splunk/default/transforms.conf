# Event Builder For Splunk — transforms.conf
# Lookup table definitions for enrichment

[eb_severity_map]
filename = eb_severity_map.csv
default_match = Unknown
match_type = WILDCARD(severity_id)

[eb_index_domain_map]
filename = eb_index_domain_map.csv
default_match = General

[eb_sourcetype_labels]
filename = eb_sourcetype_labels.csv
default_match = Unknown

# KV pairs for syslog enrichment
[syslog_kv_pairs]
SOURCE_KEY = message
DELIMS = " ", "="
CLEAN_KEYS = true
