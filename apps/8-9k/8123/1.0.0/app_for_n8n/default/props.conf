[n8n:json]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 262144
KV_MODE = json
TIME_PREFIX = \"ts\":\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%Q%:z

# CIM aliases and evals
EVAL-user = coalesce(payload._email, payload.userId)
EVAL-action = if(match(eventName, "\.success$"), "success", "failure")
EVAL-status = if(match(eventName, "\.success$"), "success", "failure")
EVAL-app = "n8n"
FIELDALIAS-authentication_method = payload.authenticationMethod AS authentication_method
FIELDALIAS-vendor_action = eventName AS vendor_action
