[admin:qualtrics_audit_configuration]
match = /
members = qualtrics_audit_account, qualtrics_audit_settings

[admin:qualtrics_audit_inputs]
match = /
members = qualtrics_audit_qualtrics_audit

[admin_external:qualtrics_audit_account]
handlertype = python
python.version = python3
handlerfile = qualtrics_audit_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:qualtrics_audit_settings]
handlertype = python
python.version = python3
handlerfile = qualtrics_audit_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:qualtrics_audit_qualtrics_audit]
handlertype = python
python.version = python3
handlerfile = qualtrics_audit_rh_qualtrics_audit.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
