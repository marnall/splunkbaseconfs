[expose:qualtrics_audit_account]
pattern = qualtrics_audit_account
methods = POST, GET

[expose:qualtrics_audit_account_specified]
pattern = qualtrics_audit_account/*
methods = POST, GET, DELETE

[expose:qualtrics_audit_settings]
pattern = qualtrics_audit_settings
methods = POST, GET

[expose:qualtrics_audit_settings_specified]
pattern = qualtrics_audit_settings/*
methods = POST, GET, DELETE

[expose:qualtrics_audit_qualtrics_audit]
pattern = qualtrics_audit_qualtrics_audit
methods = POST, GET

[expose:qualtrics_audit_qualtrics_audit_specified]
pattern = qualtrics_audit_qualtrics_audit/*
methods = POST, GET, DELETE

[expose:data/indexes]
pattern = data/indexes
methods = GET
