[guardium:online:report]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0

TIME_PREFIX = "Timestamp\"\s*:\s*\""
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 19

TRANSFORMS-db-system = set_db_system_mssql, set_db_system_oracle, set_db_system_db2
TRANSFORMS-db-op = guardium_sql_operation
TRANSFORMS-db-object = guardium_sql_object
TRANSFORMS-app-user = guard_app_user_from_full_sql
TRANSFORMS-blk-prsnat = extract_blk_prsnat

FIELDALIAS-guardium_source = source AS guardium_source
