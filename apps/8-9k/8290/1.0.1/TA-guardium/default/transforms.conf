############################################
# Database system detection 
############################################

[set_db_system_mssql]
REGEX = (?i)Server\s*Type\s*=\s*'?(MS\s*-?\s*SQL|MSSQL)'?
FORMAT = db_system::mssql

[set_db_system_oracle]
REGEX = (?i)Server\s*Type\s*=\s*'?(Oracle|ORACLE|ORA)'?
FORMAT = db_system::oracle

[set_db_system_db2]
REGEX = (?i)Server\s*Type\s*=\s*'?(DB2|DB-2)'?
FORMAT = db_system::db2


############################################
# SQL operation
############################################

[guardium_sql_operation]
REGEX = (?i)\b(select|insert|update|delete)\b
FORMAT = db_operation::$1


############################################
# SQL object
############################################

[guardium_sql_object]
REGEX = (?i)\bfrom\s+([A-Za-z0-9_.\$]+)
FORMAT = db_object::$1


############################################
# Application user extraction
############################################

[guard_app_user_from_full_sql]
SOURCE_KEY = Full SQL
REGEX = (?i)GuardAppUser:(?<app_user>[^\s']+)


############################################
# BLK_PRSNAT extraction
############################################

[extract_blk_prsnat]
REGEX = (?i)\bBLK_PRSNAT\b\s*(?:=\s*'(?<BLK_PRSNAT>[^']*)'|IS NULL)
MV_ADD = true
