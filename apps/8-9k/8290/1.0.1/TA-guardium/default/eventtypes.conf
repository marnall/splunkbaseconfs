############################################
# Base Guardium DB activity
############################################

[guardium_db_activity]
search = sourcetype="guardium:online:report"
priority = 5


############################################
# SELECT operations
############################################

[guardium_db_select]
search = sourcetype="guardium:online:report" db_operation=select
priority = 6


############################################
# Data modification operations
############################################

[guardium_db_modify]
search = sourcetype="guardium:online:report" db_operation IN (insert, update, delete)
priority = 6
