[launcher]
version = 1.0.0
description = Technical Add-on to collect endpoint data from Nexthink using the NQL API with CIM support
author = IntelliPlatforms

[id]
version = 1.0.0
name = TA-Nexthink

[install]
build = 1
is_configured = false
state = enabled

[package]
id = TA-Nexthink
check_for_updates = true

[ui]
label = Nexthink Add-on for Splunk
supported_themes = light, dark
is_visible = true

[triggers]
reload.ta_nexthink_settings = simple
reload.ta_nexthink_account = simple
