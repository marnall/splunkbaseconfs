[expose:ta_nexthink_account]
pattern = ta_nexthink_account
methods = POST, GET

[expose:ta_nexthink_account_specified]
pattern = ta_nexthink_account/*
methods = POST, GET, DELETE

[expose:ta_nexthink_settings]
pattern = ta_nexthink_settings
methods = POST, GET

[expose:ta_nexthink_settings_specified]
pattern = ta_nexthink_settings/*
methods = POST, GET, DELETE

[expose:ta_nexthink_nexthink_nql]
pattern = ta_nexthink_nexthink_nql
methods = POST, GET

[expose:ta_nexthink_nexthink_nql_specified]
pattern = ta_nexthink_nexthink_nql/*
methods = POST, GET, DELETE

[expose:data/indexes]
pattern = data/indexes
methods = GET

# CIM Mapper endpoint
[expose:ta_nexthink_cim_mapper]
pattern = ta_nexthink_cim_mapper
methods = POST, GET, DELETE

[expose:ta_nexthink_cim_mapper_specified]
pattern = ta_nexthink_cim_mapper/*
methods = POST, GET, DELETE
