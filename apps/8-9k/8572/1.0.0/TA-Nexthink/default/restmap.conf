[admin:ta_nexthink_configuration]
match = /
members = ta_nexthink_account, ta_nexthink_settings

[admin:ta_nexthink_inputs]
match = /
members = ta_nexthink_nexthink_nql

[admin_external:ta_nexthink_account]
handlertype = python
python.version = python3
handlerfile = ta_nexthink_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:ta_nexthink_settings]
handlertype = python
python.version = python3
handlerfile = ta_nexthink_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:ta_nexthink_nexthink_nql]
handlertype = python
python.version = python3
handlerfile = ta_nexthink_rh_nexthink_nql.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

# CIM Mapper REST Handler
[admin:ta_nexthink_cim]
match = /
members = ta_nexthink_cim_mapper

[admin_external:ta_nexthink_cim_mapper]
handlertype = python
python.version = python3
handlerfile = cim_rest_handler.py
handleractions = edit, list, create, remove
handlerpersistentmode = true
