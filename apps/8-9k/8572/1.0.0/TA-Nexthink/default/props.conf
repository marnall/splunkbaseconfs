#
# Nexthink NQL Add-on for Splunk v1.0.0
# props.conf - Data parsing configuration
#
# CIM field mappings are added dynamically to local/props.conf
# by the CIM Mapper feature. Do not edit this file for CIM mappings.
#

# Base configuration for all nexthink:* sourcetypes
[source::nexthink:*]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 32
TRUNCATE = 0
KV_MODE = json
CHARSET = UTF-8

# Default sourcetype
[nexthink:nql]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 32
TRUNCATE = 0
KV_MODE = json
CHARSET = UTF-8
category = Custom
description = Nexthink NQL query results
