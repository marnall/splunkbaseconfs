[CrowdStrike Falcon Detections Indexed Events per Minute]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
description = Shows the count of CrowdStrike Falcon Detection events indexed per minute by the indexed timestamp. Timespan needs to be large enough to include the Event Time stamps of the events
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatchAs = user
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA_crowdstrike_falcon_detections
request.ui_dispatch_view = search
search = `cs_falcon_detections_get_index` | bucket "_indextime" span=1m   | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S")  | eval "Detection Event Time" = strftime(_time, "%Y-%m-%d %H:%M:%S")| chart count by "Indexed Time" | sort -"Indexed Time"

