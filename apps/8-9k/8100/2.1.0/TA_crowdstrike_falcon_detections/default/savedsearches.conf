[CrowdStrike Falcon Detections Indexed vs Event Time]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
description = Shows when the CrowdStrike Falcon Detections data was indexed, the event timestamp and the count of events. Timespan needs to be large enough to include the Event Time stamp.
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
dispatchAs = user
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_app = TA_crowdstrike_falcon_detections
request.ui_dispatch_view = search
search = `cs_falcon_detections_get_index`   | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S")  | eventstats count by "Indexed Time"  | rename  count as "Number of CrowdStrike Falcon Detection Events"  | eval "Falcon Detection Time" = strftime(_time, "%Y-%m-%d %H:%M:%S")|table "Indexed Time", "Falcon Detection Time", "Number of CrowdStrike Falcon Detection Events" |sort  -"Indexed Time"