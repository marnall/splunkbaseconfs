#
# CIM tags for TA-Cato-CIM
# Tags connect event types to CIM data models
# Based on PBS repository analysis (events_common.proto)
#

# ============================================================================
# NETWORK TRAFFIC DATA MODEL
# Required tags: network, communicate
# ============================================================================

[eventtype=cato_network_flows]
network = enabled
communicate = enabled

[eventtype=cato_network_firewall]
network = enabled
communicate = enabled

# ============================================================================
# INTRUSION DETECTION DATA MODEL
# Required tags: ids OR ips
# ============================================================================

[eventtype=cato_ids]
ids = enabled
ips = enabled
attack = enabled

# ============================================================================
# NETWORK RESOLUTION (DNS) DATA MODEL
# Required tags: network, resolution
# ============================================================================

[eventtype=cato_dns]
network = enabled
resolution = enabled
dns = enabled

# ============================================================================
# WEB DATA MODEL
# Required tags: web
# ============================================================================

[eventtype=cato_web]
web = enabled

# ============================================================================
# AUTHENTICATION DATA MODEL
# Required tags: authentication
# ============================================================================

[eventtype=cato_authentication]
authentication = enabled

# ============================================================================
# MALWARE DATA MODEL
# Required tags: malware
# ============================================================================

[eventtype=cato_malware]
malware = enabled
attack = enabled

# ============================================================================
# CHANGE DATA MODEL
# Required tags: change, account
# ============================================================================

[eventtype=cato_change_system]
change = enabled
account = enabled

[eventtype=cato_change_connectivity]
change = enabled
account = enabled

