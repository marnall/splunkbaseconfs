#
# Field aliases and extractions for TA-Cato-CIM
# Maps Cato event fields to Splunk CIM-compliant field names
#
# Using source-based stanza for all Cato events and flows
#

#############################################
# EVENTS: source::cato:hec:events
#############################################
[source::cato:hec:events]

# Network fields (common across all models)
# Note: src_ip is used for most events, but "Connected" events use src_isp_ip instead
FIELDALIAS-src = src_ip AS src
FIELDALIAS-dest = dest_ip AS dest
FIELDALIAS-src_translate_ip = public_ip AS src_translate_ip
# dest_port: native field (no alias needed)
# src_port: native field (no alias needed)
FIELDALIAS-transport = ip_protocol AS transport
# Protocol field - CIM expects "IPv4" or "IPv6", not the transport protocol
EVAL-protocol = "IPv4"

# action: native field (no alias needed)

# Intrusion Detection fields
FIELDALIAS-signature = threat_name AS signature
# signature_id: native field (no alias needed)
FIELDALIAS-category = threat_type AS category
# url: native field (no alias needed)

# Geographic fields (IDS)
FIELDALIAS-src_zone = src_site_name AS src_zone
FIELDALIAS-dest_zone = dest_site_name AS dest_zone
# src_country: native field (no alias needed)
# dest_country: native field (no alias needed)

# DNS fields
FIELDALIAS-query = dns_query AS query
FIELDALIAS-record_type = dns_record_type AS record_type
FIELDALIAS-reply_code = dns_reply_code AS reply_code
# Flatten dns_answer array into single string with deduplication
EVAL-answer = mvjoin(mvdedup('dns_answer{}'), ", ")

# Web fields
FIELDALIAS-http_method = http_request_method AS http_method
FIELDALIAS-status = http_response_code AS status
FIELDALIAS-http_user_agent = user_agent AS http_user_agent
FIELDALIAS-http_referrer = referer_url AS http_referrer
# Field alias names have _web to avoid name collision with network bytes_in bytes_out aliases
FIELDALIAS-bytes_in_web = request_size AS bytes_in
FIELDALIAS-bytes_out_web = response_size AS bytes_out
FIELDALIAS-bytes_web = transaction_size AS bytes

# Malware fields
# file_name: native field (no alias needed)
# file_hash: native field (no alias needed)
FIELDALIAS-file_path = full_path_url AS file_path
# file_size: native field (no alias needed)

# Authentication fields
FIELDALIAS-authentication_method = auth_method AS authentication_method
# user_agent: native field (no alias needed)

# User/Application fields
FIELDALIAS-user = user_name AS user
FIELDALIAS-src_user = user_name AS src_user
FIELDALIAS-app = application_name AS app
FIELDALIAS-reason = failure_reason AS reason
# Device fields
FIELDALIAS-dvc = pop_name AS dvc

# Traffic direction
FIELDALIAS-direction = traffic_direction AS direction

# Vendor identification
EVAL-vendor = "Cato Networks"
EVAL-vendor_product = "Cato SASE"

# IDS type
EVAL-ids_type = if(match(event_sub_type, "^(IPS|Suspicious Activity|Dynamic Prevention|DNS Protection)$"), "network", null())

# Change model fields
EVAL-change_type = if(match(event_sub_type, "^(Account Operations|LDAP Provisioning|SCIM Provisioning|Connected|Disconnected)$"), "AAA", null())

EVAL-command = if(match(event_sub_type, "^(Account Operations|LDAP Provisioning|SCIM Provisioning|Connected|Disconnected)$"), event_sub_type, null())

# Object field: Different logic based on event type
# - Account/Provisioning events: user_name
# - Connected/Disconnected events: src_site_name (the site that connected/disconnected)
EVAL-object = case(match(event_sub_type, "^(Account Operations|LDAP Provisioning|SCIM Provisioning)$") AND isnotnull(user_name), user_name, match(event_sub_type, "^(Connected|Disconnected)$") AND isnotnull(src_site_name), src_site_name, 1=1, null())

# Object ID field: Different logic based on event type
# - Account/Provisioning events: user_id
# - Connected/Disconnected events: src_site_id (the site ID)
EVAL-object_id = case(match(event_sub_type, "^(Account Operations|LDAP Provisioning|SCIM Provisioning)$"), user_id, match(event_sub_type, "^(Connected|Disconnected)$"), src_site_id, 1=1, null())

# Object Category field: Different logic based on event type
# - Account/Provisioning events: "user"
# - Connected/Disconnected events: "site" (the site that connected/disconnected)
EVAL-object_category = case(match(event_sub_type, "^(Account Operations|LDAP Provisioning|SCIM Provisioning)$"), "user", match(event_sub_type, "^(Connected|Disconnected)$"), "site", 1=1, null())

# Source user email field: Map from vpn_user_email for Connected/Disconnected events
# Note: Only VPN user connections have vpn_user_email; site connections do not
FIELDALIAS-src_user_email = vpn_user_email as src_user_email

#############################################
# CONDITIONAL FIELD OVERRIDES
# EVAL fields are processed AFTER FIELDALIAS, so they can override field aliases
# This allows us to map the same CIM field to different Cato fields based on event type
#############################################

# Override src field for "Connected" and "Disconnected" events (site/VPN connections)
# For most events: src = src_ip (via FIELDALIAS above)
# For "Connected"/"Disconnected" events: src = src_isp_ip (the ISP's public IP for the site connection)
EVAL-src = case(match(event_sub_type, "^(Connected|Disconnected)$") AND isnotnull(src_isp_ip), src_isp_ip, 1=1, src)

#############################################
# FLOWS: source::cato:hec:flows
#############################################
[source::cato:hec:flows]

# Network fields
FIELDALIAS-src = src_ip AS src
FIELDALIAS-dest = dest_ip AS dest
# src_port: native field (no alias needed)
# dest_port: native field (no alias needed)
FIELDALIAS-transport = ip_protocol AS transport

# Protocol field - CIM expects "IPv4" or "IPv6", not the transport protocol
EVAL-protocol = "IPv4"

# action: will be enriched later in the pipeline

# Traffic direction
FIELDALIAS-direction = traffic_direction AS direction

# Traffic volume fields
# Map flow_bytes_* fields to CIM bytes_* fields
FIELDALIAS-bytes_in = flow_bytes_downstream AS bytes_in
FIELDALIAS-bytes_out = flow_bytes_upstream AS bytes_out
FIELDALIAS-bytes = flow_bytes_total AS bytes

# Map flow_packets_* fields to CIM packets_* fields
FIELDALIAS-packets_in = flow_packets_downstream AS packets_in
FIELDALIAS-packets_out = flow_packets_upstream AS packets_out
FIELDALIAS-packets = flow_packets_total AS packets

# duration: native field (no alias needed)

# User/Application fields
FIELDALIAS-user = user_name AS user
FIELDALIAS-app = application_name AS app

# Device fields
FIELDALIAS-dvc = pop_name AS dvc

# Vendor identification
EVAL-vendor = "Cato Networks"
EVAL-vendor_product = "Cato SASE"
