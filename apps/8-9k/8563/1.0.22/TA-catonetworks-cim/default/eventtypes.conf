#
# Event type definitions for TA-Cato-CIM
# Maps Cato event sub-types to CIM data models using sourcetype + event_sub_type filters
# Based on PBS repository analysis (events_common.proto)
# Pattern: sourcetype="cato:<event_type>" event_sub_type="<Display Name>"
# NOTE: event_sub_type values are DISPLAY NAMES (e.g., "IPS", "Suspicious Activity"), NOT enum values
#

# ============================================================================
# NETWORK TRAFFIC DATA MODEL
# ============================================================================

[cato_network_flows]
search = source="cato:hec:flows"

[cato_network_firewall]
search = sourcetype="cato:security" event_sub_type IN ("Internet Firewall", "WAN Firewall", "LAN Firewall")

# ============================================================================
# INTRUSION DETECTION DATA MODEL
# ============================================================================

[cato_ids]
search = sourcetype="cato:security" event_sub_type IN ("IPS", "Suspicious Activity", "Dynamic Prevention", "DNS Protection")

# ============================================================================
# NETWORK RESOLUTION (DNS) DATA MODEL
# ============================================================================
# NOTE: DNS events can be triggered by various event types
# Filter to only include events where app_stack contains "DNS" to ensure DNS-related traffic
# app_stack is a multi-value field (JSON array), so we use IN operator

[cato_dns]
search = sourcetype="cato:security" app_stack{}="DNS"

# ============================================================================
# WEB DATA MODEL
# ============================================================================
# Apps Security = CASB product-specific events
# Web = Apps Security OR any event with HTTP/HTTP(S) in app_stack (broader Web model category)
# app_stack is a multi-value field (JSON array), so we use IN operator

[cato_web]
search = sourcetype="cato:security" (event_sub_type="Apps Security" OR app_stack{}="HTTP(S)")

# ============================================================================
# AUTHENTICATION DATA MODEL
# ============================================================================

[cato_authentication]
search = sourcetype="cato:security" event_sub_type IN ("MAC Address Authentication", "Application Sign-in", "Identity Alert")

# ============================================================================
# MALWARE DATA MODEL
# ============================================================================

[cato_malware]
search = sourcetype="cato:security" event_sub_type IN ("Anti Malware", "SaaS Security API Anti Malware", "SaaS Security API Data Protection", "EPP Malware", "Endpoint Protection", "Data Security Alert", "Data Discovery", "Email Security Alert")

# ============================================================================
# CHANGE DATA MODEL
# ============================================================================

[cato_change_system]
search = sourcetype="cato:system" event_sub_type IN ("Account Operations", "LDAP Provisioning", "SCIM Provisioning")

[cato_change_connectivity]
search = sourcetype="cato:connectivity" event_sub_type IN ("Connected", "Disconnected")

