[admin:dropzone_add_on_configuration]
match = /
members = dropzone_add_on_settings

[admin:dropzone_add_on_inputs]
match = /
members = dropzone_add_on_dropzone_health_check, dropzone_add_on_dropzone_investigations

[admin_external:dropzone_add_on_settings]
handlertype = python
python.version = python3
python.required = 3.9, 3.13
handlerfile = dropzone_add_on_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:dropzone_add_on_dropzone_health_check]
handlertype = python
python.version = python3
python.required = 3.9, 3.13
handlerfile = dropzone_add_on_rh_dropzone_health_check.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:dropzone_add_on_dropzone_investigations]
handlertype = python
python.version = python3
python.required = 3.9, 3.13
handlerfile = dropzone_add_on_rh_dropzone_investigations.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
