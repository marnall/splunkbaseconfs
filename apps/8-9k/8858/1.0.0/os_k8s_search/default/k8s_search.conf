# k8s_search.conf — runtime settings for the Kubernetes Search app.
# Edit etc/apps/os_k8s_search/local/k8s_search.conf, not this file
# (default/ is replaced on app upgrade). Values below are the package
# defaults. Full schema and guidance: README/k8s_search.conf.spec.

# splunkd REST API connection — TLS verification for credential reads.
[splunk]
request_timeout = 30s
tls_ca_file = $SPLUNK_HOME/etc/auth/cacert.pem
tls_cert_file = $SPLUNK_HOME/etc/auth/server.pem
tls_server_name =
tls_server_name_from_cert = true
tls_insecure = false

# Kubernetes API request timeouts, multi-cluster parallelism, log-line cap.
[kubernetes]
api_request_timeout = 30s
logs_api_request_timeout = 30s
fan_out_concurrency = 8
max_log_line_bytes = 1048576

# Search-command log level and destination.
[logging]
level = info
file = k8s_search.log

# Disk cache for Kubernetes API responses.
[cache]
enabled = true
dir = $SPLUNK_HOME/var/run/os_k8s_search/cache
discovery_ttl = 10m
list_default_ttl = 30s
get_default_ttl = 10s
max_size_bytes = 268435456
max_entries = 4096

# Empty = free tier (one cluster, single search head). Paste your license
# key here or use the setup page, which writes it to local/.
[license]
key =
