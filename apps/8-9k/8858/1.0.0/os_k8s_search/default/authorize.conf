# Roles and capabilities for Kubernetes Search. Two tiers, so the Splunk
# admin running the platform and the Kubernetes admin choosing which
# clusters this app talks to need not be the same person:
#
#   role_k8s_search_user  — run the search commands (| k8s, | k8slogs,
#                           | k8sevents, | k8sdescribe) against configured
#                           clusters and manage your own per-user
#                           credentials. Assign this to grant access.
#   role_k8s_search_admin — additionally manage the system-wide cluster
#                           registry: add, edit, and delete clusters and
#                           import kubeconfigs. Assign to your Kubernetes team.
#
# A full Splunk admin (admin_all_objects) can run and configure the app
# without either role — useful before roles are assigned.

[capability::run_k8s_search]

[capability::edit_k8s_search_clusters]

[role_k8s_search_user]
importRoles = user
run_k8s_search = enabled
# Do not add list_storage_passwords here. The base role resolves cluster
# credentials through the app's REST handler, so it needs no direct access
# to the credential store; granting it would expose every cluster's stored
# credentials to all search users.

[role_k8s_search_admin]
importRoles = k8s_search_user
list_storage_passwords = enabled
edit_k8s_search_clusters = enabled
