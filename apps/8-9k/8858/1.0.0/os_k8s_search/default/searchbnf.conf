# Search-assistant help for the Kubernetes Search commands — the syntax,
# descriptions, and examples shown in Splunk Web's search bar.

[k8s-command]
syntax = k8s kind=<kind-or-kind-slash-name> (api_version=<string>)? (namespace=<namespace-pattern>)? (context=<cluster-pattern>)? (concurrency=<int>)? (view=metadata)? (labels=<selector>)? (fields=<selector>)? (limit=<int>)? (cache=<duration>)?
shortdesc = Retrieve Kubernetes resources and emit them as Splunk events.
description = Live access to the Kubernetes API at search time. `kind` accepts every form `kubectl` does: canonical PascalCase Kind (`Pod`, `Deployment`), lowercase (`pod`, `deployment`), plural URL form (`pods`, `deployments`), and registered short-names (`po`, `deploy`); append `/<name>` to fetch a single object. The matching apiVersion is auto-detected via aggregated discovery (`apidiscovery.k8s.io/v2` on Kubernetes 1.26+; per-group walking of a well-known set on older clusters), so `kind=deploy` resolves to `apps/v1` without `api_version=` set. An explicit `api_version=` still wins. Output is one event per resource with `_raw` set to the resource's JSON. `namespace` accepts an exact name, `*` (every namespace), or a glob (`prod-*`, `*-system`) — globs are resolved by listing namespaces and querying each match server-side, so wire-cost scales with matched namespaces, not the whole cluster. Namespace globs are only valid for list operations; `kind=<resource>/<name>` requires an exact namespace. `context` selects which cluster from the registry to query; globs (`*`, `prod-*`) fan out to every matching cluster in parallel. Each record from a registered cluster carries a `cluster=<name>` field naming its source. `concurrency` (default 8) caps simultaneous clusters during fan-out. `view=metadata` asks the apiserver for the PartialObjectMetadata shape — only `metadata` is populated, `spec`/`status` are dropped — which can be 10× smaller on the wire for large pod lists. `labels` and `fields` are server-side selectors passed through to the Kubernetes `labelSelector` and `fieldSelector` query params; `labels` supports the full `key=value,key in (a,b)` syntax, `fields` is limited to the small fixed set of fields each resource supports (the apiserver returns a clear error when an unsupported field is referenced). `limit=N` caps total emitted records across all pages (and across matched namespaces in the glob path) by short-circuiting after the Nth row; the apiserver's own `?limit=` is page-size, not total, so we enforce client-side. `cache=<duration>` controls the on-disk response cache: `cache=0` forces a live read, and a positive duration (`cache=2m`) overrides the per-search default TTL (roughly 30s for lists, 10s for single-object gets). Secrets are never cached regardless.
example1 = | k8s kind=pods
comment1 = List all pods in the current namespace
example2 = | k8s kind=pods namespace=kube-system
comment2 = List pods in a specific namespace
example3 = | k8s kind=pods namespace=*
comment3 = List pods across every namespace (each record tagged with its actual namespace)
example4 = | k8s kind=pods namespace=prod-*
comment4 = Glob match — list pods in every namespace whose name starts with `prod-`
example5 = | k8s kind=deploy
comment5 = Non-core resources work without `api_version` — discovery auto-detects apps/v1 and accepts kubectl short-names
example6 = | k8s kind=deployments api_version=apps/v1
comment6 = Explicit `api_version` still wins (useful for pinning to a specific version)
example7 = | k8s kind=nodes
comment7 = List cluster-scoped resources (namespace is ignored)
example8 = | k8s kind=pods context=production
comment8 = Pick a specific cluster from the registry
example9 = | k8s kind=pods context=*
comment9 = Fan out across every configured cluster; records gain a `cluster` field
example10 = | k8s kind=pods context=prod-*
comment10 = Glob match — every cluster whose name starts with `prod-`
example11 = | k8s kind=pods namespace=* view=metadata | table _raw
comment11 = Cluster-wide name/labels-only listing; payload-reduced (no spec/status)
example12 = | k8s kind=pods namespace=default labels="app=web,tier=frontend"
comment12 = Server-side label selector — apiserver filters before sending
example13 = | k8s kind=pods namespace=default fields="status.phase=Running"
comment13 = Server-side field selector — limited to fields the resource supports
example14 = | k8s kind=pods namespace=* limit=50
comment14 = Cap total results to the first 50 items across all pages
example15 = | k8s kind=pods cache=0
comment15 = Bypass the response cache for a guaranteed-fresh read
category = generating
usage = public
tags = k8s_search kubernetes

[k8slogs-command]
syntax = k8slogs namespace=<string> pods=<wildcard-pattern> (containers=<wildcard-pattern>)? (tail=<int>)? (since=<duration>)? (previous=<bool>)? (context=<cluster-pattern>)? (concurrency=<int>)? (cache=<duration>)?
shortdesc = Fetch Kubernetes pod logs into Splunk search results.
description = Fetches a bounded snapshot of container logs from one or more pods. `pods` and `containers` accept glob patterns (`*`). `tail=N` and `since=<duration>` mirror `kubectl --tail` and `kubectl --since` — `since` accepts Go duration strings (`5m`, `2h`, `30s`); without either, returns the time-windowed snapshot derived from the search's earliest_time. There is no live `follow` mode — re-run over a later time range to see newer lines. `context` selects which cluster from the registry to query; globs (`*`, `prod-*`) fan out to every matching cluster in parallel. Each record from a registered cluster carries a `cluster=<name>` field naming its source. `concurrency` (default 8) caps simultaneous clusters during fan-out. `cache=<duration>` caches the *pod-list* lookup (which pods/containers match the filter), not the log content — off by default since logs are read live, but a dashboard that re-runs the same `pods=` filter can set `cache=30s` to skip re-listing.
example1 = | k8slogs namespace=default pods=my-app-*
comment1 = Logs from every container in pods matching the prefix
example2 = | k8slogs namespace=kube-system pods=coredns-* tail=100
comment2 = Last 100 lines per container
example3 = | k8slogs namespace=default pods=my-pod previous=true
comment3 = Logs from the previous (crashed) container instance
example4 = | k8slogs namespace=default pods=app-* since=15m
comment4 = Logs from the last 15 minutes (kubectl-style duration)
example5 = | k8slogs namespace=default pods=app-* context=*
comment5 = Fetch logs from matching pods across every configured cluster
category = generating
usage = public
tags = k8s_search kubernetes logs

[k8sevents-command]
syntax = k8sevents (namespace=<namespace-pattern>)? (type=<string>)? (reason=<string>)? (for=<kind-or-kind-slash-name>)? (context=<cluster-pattern>)? (concurrency=<int>)? (cache=<duration>)?
shortdesc = List Kubernetes Events as structured Splunk records.
description = Lists `Event` objects from the Kubernetes API server. Each event becomes one Splunk record with surfaced fields: `type` (Normal/Warning), `reason`, `message`, `involved_kind` / `involved_name` / `involved_namespace` / `involved_uid`, `source_component` / `source_host`, `count`, `first_timestamp` / `last_timestamp`, and `_raw` containing the full event JSON. `_time` is set to the event's last-seen timestamp for display, sorting, and downstream SPL. Kubernetes does not support server-side time filtering for Events, and the command intentionally returns the current retained Event store; pipe to `where` after `k8sevents` if you want client-side narrowing. `namespace=*` (or empty) queries cluster-wide; namespace globs (`prod-*`) resolve via per-namespace queries. Filters (`type`, `reason`, `for`) translate to Kubernetes `fieldSelector` so the apiserver does the work — important on busy clusters where unfiltered event tables can be tens of thousands of items. Empty or `*` values for these filters mean no filter, which lets dashboards expose an explicit All state. The `for=` predicate mirrors `kubectl events --for=Kind/Name` and accepts every alias form kubectl does (canonical Kind, lowercase, plural, short-name) — resolved client-side via aggregated discovery (apidiscovery.k8s.io/v2). `for=Kind` (no `/Name`) is our extension and matches every event of that Kind. `context` fans out to multiple clusters with the same semantics as `| k8s`. `cache=<duration>` controls the on-disk cache of the event-list response (`cache=0` for a live read; a positive duration overrides the default TTL). Note: Kubernetes Events retention defaults to roughly 1 hour (apiserver `--event-ttl`).
example1 = | k8sevents namespace=kube-system type=Warning
comment1 = Recent warning events in a namespace
example2 = | k8sevents namespace=* type=Warning
comment2 = Cluster-wide warnings from the current Kubernetes Event store
example3 = | k8sevents for=Pod/my-pod namespace=default
comment3 = Every event for a specific pod (also works as `for=pod/my-pod`, `for=pods/my-pod`, `for=po/my-pod`)
example4 = | k8sevents for=Node
comment4 = All node-level events (our extension — kubectl requires Kind/Name)
example5 = | k8sevents reason=Failed context=*
comment5 = `Failed` events from every configured cluster
category = generating
usage = public
tags = k8s_search kubernetes events

[k8sdescribe-command]
syntax = k8sdescribe kind=<kind-slash-name> (namespace=<string>)? (api_version=<string>)? (context=<cluster-pattern>)? (concurrency=<int>)? (cache=<duration>)?
shortdesc = Describe one Kubernetes resource: the object plus the events that target it.
description = Fetches a single resource by name and emits one structured record for the object followed by one record per Event that targets it (matched by `involvedObject.uid`). `kind` accepts every kubectl alias (canonical Kind, lowercase, plural, short-name) and the matching apiVersion is auto-detected via aggregated discovery — `kind=deploy/foo` finds `apps/v1` without `api_version=` set. Explicit `api_version=` still wins. Output records carry `_describe_section=object` or `_describe_section=event` so downstream SPL can split them into panels. Object record fields: `_raw` (full JSON), `kind`, `name`, `namespace`, `uid`, `_time` (creationTimestamp). Event records: same shape as `| k8sevents`, plus `target_kind` / `target_name` / `target_namespace` identifying the described resource. `namespace` is required for namespaced kinds; cluster-scoped kinds (Node, Namespace, PV) ignore it. `kind` MUST include the object name as `kind=<kind>/<name>` — use `| k8s kind=<kind>` for list operations. `cache=<duration>` controls the on-disk cache of the fetched object and its events (`cache=0` for a live read). The Pod dashboard (data/ui/views/pod.xml) is the canonical consumer.
example1 = | k8sdescribe kind=pod/my-pod namespace=default
comment1 = Pod object + recent events for that pod (also accepts `Pod/my-pod`, `pods/my-pod`, `po/my-pod`)
example2 = | k8sdescribe kind=deploy/my-app namespace=staging
comment2 = Describe a deployment; apps/v1 auto-detected from `deploy` alias
example3 = | k8sdescribe kind=node/node-1
comment3 = Cluster-scoped resource; namespace is ignored
example4 = | k8sdescribe kind=pod/my-pod namespace=default | where _describe_section="event"
comment4 = Drop the object record, keep only the events
example5 = | k8sdescribe kind=pod/my-pod namespace=default context=*
comment5 = Look for a pod by that name across every configured cluster
category = generating
usage = public
tags = k8s_search kubernetes describe events

[k8syaml-command]
syntax = k8syaml (field=<string>)? (output=<string>)?
shortdesc = Convert a JSON-valued field to YAML for human-readable display.
description = Streaming command that reads `field` (default `_raw`) from each pipeline record, parses it as JSON, and rewrites it as YAML. The YAML form is written to `output` (default: same as `field`, in-place rewrite); output style matches `kubectl get … -o yaml` (block style, insertion-order keys, no Unicode escaping). Rows whose `field` is empty or does not parse as JSON pass through unchanged so the command is safe to drop into mixed-shape pipelines. Intended for dashboard panels that render a Kubernetes resource's manifest (e.g. `| k8sdescribe … | where _describe_section="object" | k8syaml`) and for ad-hoc inspection at the search bar.
example1 = | k8sdescribe kind=pod/my-pod namespace=default | where _describe_section="object" | k8syaml
comment1 = Render the pod object as YAML for use in a dashboard markdown panel
example2 = | k8s kind=pod/my-pod namespace=default | k8syaml
comment2 = In-place rewrite `_raw` from JSON to YAML
example3 = | k8s kind=pods | k8syaml field=_raw output=yml
comment3 = Keep `_raw` intact, write the YAML form to a new `yml` field
category = formatting
usage = public
tags = k8s_search json yaml formatting
