# Method allowlist for the setup page's REST calls. Browser requests reach
# splunkd through Splunk Web's proxy, which honors this file (not
# restmap.conf), so every route and method the setup page uses must be
# listed here. A `*` matches one path segment only, so a subpath such as
# /clusters/<name>/auth needs its own stanza.

[expose:k8s_search_clusters]
pattern = k8s_search/clusters
methods = GET, POST

[expose:k8s_search_clusters_item]
pattern = k8s_search/clusters/*
methods = GET, PUT, DELETE

[expose:k8s_search_clusters_item_auth]
pattern = k8s_search/clusters/*/auth
methods = GET, PUT, DELETE

[expose:k8s_search_auth]
pattern = k8s_search/auth
methods = GET

[expose:k8s_search_auth_item]
pattern = k8s_search/auth/*
methods = GET, PUT, DELETE

[expose:k8s_search_import]
pattern = k8s_search/import
methods = POST

[expose:k8s_search_cache]
pattern = k8s_search/cache
methods = DELETE

[expose:k8s_search_settings]
pattern = k8s_search/settings
methods = GET, PUT
