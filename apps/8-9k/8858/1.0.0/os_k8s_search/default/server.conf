# Search Head Cluster replication. The cluster registry (kubeclusters),
# per-user credentials (kubeauth), and app settings + license (k8s_search)
# are replicated to every SHC member so a search dispatched to any member
# resolves the same clusters and the same entitlement — an SHC counts as
# one licensed installation.

[shclustering]
conf_replication_include.kubeclusters = true
conf_replication_include.kubeauth = true
conf_replication_include.k8s_search = true
