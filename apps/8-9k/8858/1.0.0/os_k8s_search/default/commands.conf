# Custom search commands for Kubernetes Search. Syntax, parameters, and
# examples are in searchbnf.conf (and Splunk Web's search assistant);
# log level and other runtime settings are in k8s_search.conf.
#
# Keep both python.version and python.required — Splunk 9.4 reads the
# former, 10.2 the latter; dropping python.version breaks 9.4.

[k8s]
filename = k8sget.py
python.version = python3
python.required = 3.9, 3.13
chunked = true
is_risky = false

[k8slogs]
filename = k8slogs.py
python.version = python3
python.required = 3.9, 3.13
chunked = true
is_risky = false

[k8sevents]
filename = k8sevents.py
python.version = python3
python.required = 3.9, 3.13
chunked = true
is_risky = false

[k8sdescribe]
filename = k8sdescribe.py
python.version = python3
python.required = 3.9, 3.13
chunked = true
is_risky = false

[k8syaml]
filename = k8syaml.py
python.version = python3
python.required = 3.9, 3.13
chunked = true
is_risky = false
