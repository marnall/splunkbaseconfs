# Scripted inputs for Kubernetes Search.
#
# The cache sweeper runs every `interval` seconds, removing expired entries
# from the Kubernetes API response cache and trimming it to the limits in
# k8s_search.conf [cache]. It indexes nothing; each run logs one summary
# line to splunkd.log (search: index=_internal "k8s_search cache-sweep").
[script://./bin/cache_sweep.py]
disabled = 0
interval = 300
python.version = python3
python.required = 3.9, 3.13
