# REST handlers behind the Kubernetes Search setup page and the runtime
# endpoints the search commands call (credential resolution and, for
# impersonation clusters, server-side exec). All require authentication.
# Cluster-management endpoints require edit_k8s_search_clusters; runtime
# endpoints require run_k8s_search; admin_all_objects is accepted as a
# fallback for both so a Splunk admin can configure the app before roles
# are assigned.

[script:k8s_search_clusters]
match              = /k8s_search/clusters
script             = handler_clusters.py
scripttype         = persist
handler            = handler_clusters.ClustersHandler
python.version     = python3
python.required    = 3.9, 3.13
requireAuthentication = true
output_modes       = json
passPayload        = true
passSystemAuth     = true
capability.post    = edit_k8s_search_clusters OR admin_all_objects
capability.put     = edit_k8s_search_clusters OR admin_all_objects
capability.delete  = edit_k8s_search_clusters OR admin_all_objects
capability.get     = run_k8s_search OR admin_all_objects

