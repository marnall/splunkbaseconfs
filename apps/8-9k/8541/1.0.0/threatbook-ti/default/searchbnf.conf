[tbti-command]
syntax = tbti <tbti-options>*
shortdesc = 使用 ThreatBook TI API 对事件进行威胁情报富化
description = \
    tbti 命令通过 ThreatBook 威胁情报 API 对事件字段进行富化，\
    支持 IP 信誉、IOC（域名/IP 混合）、文件多引擎检测、URL 信誉四类接口。\
    富化结果以 tb_ 前缀字段输出，并自动缓存到 KVStore 以加速后续查询。\
    通用输出字段：_key _entity _cached_at _expire_at _cache_policy。\
    ip_reputation 输出：tb_is_malicious tb_confidence_level tb_severity tb_judgments tb_tags_classes tb_country tb_country_code tb_province tb_city。\
    compromise 输出：tb_is_malicious tb_confidence_level tb_severity tb_judgments tb_tags_classes。\
    file_multiengine 输出：tb_threat_level tb_is_white tb_detected_engines tb_scanned_engines tb_positives tb_scan_date tb_malware_type tb_malware_family。\
    url_reputation 输出：tb_threat_level tb_positives tb_ratio tb_sandbox_threat_level tb_sandbox_submit_time tb_sandbox_file_name tb_sandbox_sample_sha256 tb_sandbox_type_list。
usage = public
tags = threatbook ti enrichment threat-intelligence ioc ip url hash
example1 = ... | tbti api=ip_reputation ip=src_ip
comment1 = 对 src_ip 字段做 IP 信誉富化，结果写入 tb_is_malicious、tb_severity 及地理位置字段（tb_country/tb_province/tb_city）等。
example2 = ... | tbti api=ip_reputation ip=src_ip nocache=true
comment2 = nocache=true 跳过缓存强制调用 API，结果仍会写回 KVStore。
example3 = ... | tbti api=file_multiengine hash=file_hash
comment3 = 对文件哈希（MD5/SHA256）做多引擎检测，输出 tb_threat_level、tb_detected_engines 等。
example4 = ... | tbti api=url_reputation url=request_url
comment4 = 对 URL 做信誉查询，输出多引擎检测比例 tb_ratio 及沙箱分析结果。
example5 = ... | tbti api=compromise ioc=domain_field
comment5 = 对混合 IOC（IP 或域名）做失陷检测，输出 tb_is_malicious、tb_judgments。

[tbti-options]
syntax = api=<string> | ip=<field> | ioc=<field> | url=<field> | hash=<field> | nocache=(true|false)
description = \
    api     : 必填，接口类型。可选值：ip_reputation | compromise | file_multiengine | url_reputation。\
    ip      : IP 字段名（api=ip_reputation 时使用）。\
    ioc     : IOC 字段名，支持 IP 或域名（api=compromise 时使用）。\
    url     : URL 字段名（api=url_reputation 时使用）。\
    hash    : 文件哈希字段名，支持 MD5/SHA256（api=file_multiengine 时使用）。\
    nocache : 可选，默认 false。设为 true 时跳过缓存强制调用 API。

[tbcti-command]
syntax = tbcti <tbcti-options>*
shortdesc = 使用 ThreatBook Global IO API 对事件进行威胁情报富化
description = \
    tbcti 命令通过 ThreatBook Global IO API 对事件字段进行富化，\
    支持 IP Intelligence、Domain Intelligence、File Intelligence、URL Intelligence 四类接口。\
    富化结果以 tb_ 前缀字段输出，并自动缓存到 Global KVStore 集合。
usage = public
tags = threatbook ti enrichment threat-intelligence global io
example1 = ... | tbcti api=ip_intelligence ip=src_ip
comment1 = 对 src_ip 字段做 Global IP Intelligence 富化。
example2 = ... | tbcti api=domain_intelligence domain=query_domain
comment2 = 对域名字段做 Global Domain Intelligence 富化。
example3 = ... | tbcti api=file_intelligence hash=file_hash
comment3 = 对文件哈希做 Global File Intelligence 富化。
example4 = ... | tbcti api=url_intelligence url=request_url
comment4 = 对 URL 做 Global URL Intelligence 富化。

[tbcti-options]
syntax = api=<string> | ip=<field> | domain=<field> | url=<field> | hash=<field> | nocache=(true|false)
description = \
    api     : 必填，接口类型。可选值：ip_intelligence | domain_intelligence | file_intelligence | url_intelligence。\
    ip      : IP 字段名（api=ip_intelligence 时使用）。\
    domain  : 域名字段名（api=domain_intelligence 时使用）。\
    url     : URL 字段名（api=url_intelligence 时使用）。\
    hash    : 文件哈希字段名（api=file_intelligence 时使用）。\
    nocache : 可选，默认 false。设为 true 时跳过缓存强制调用 API。

[tbticachemaint-command]
syntax = tbticachemaint
shortdesc = 清理 ThreatBook TI 过期缓存记录
description = \
    tbticachemaint 扫描所有 tbcache_* KVStore 集合，\
    删除已过期（_expire_at 早于当前时间）的缓存记录，释放存储空间。\
    建议通过 Splunk 定时任务（Saved Search）定期执行。
usage = public
example1 = | tbticachemaint
comment1 = 清理全部过期的威胁情报缓存记录。
