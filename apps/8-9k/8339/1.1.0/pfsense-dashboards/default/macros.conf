# Macro definitions for pfSense Dashboards

[pfsense_filterlog_base]
definition = `pfsense_index` sourcetype=pfsense:filterlog | eval rule_origin_norm=coalesce(rule_origin,"unknown") | eval rule_origin_tok=if("$rule_origin$"="" OR "$rule_origin$"="*" OR match("$rule_origin$","^\\$.*\\$$"), "*", "$rule_origin$") | where rule_origin_tok="*" OR rule_origin_norm=rule_origin_tok | eval action_norm=lower(coalesce(action,vendor_action)),              direction_norm=lower(coalesce(direction,vendor_direction)),              transport_norm=lower(coalesce(transport,vendor_transport)),              src_ip_norm=coalesce(src_ip,src),              dest_ip_norm=coalesce(dest_ip,dest),              dest_port_norm=coalesce(dest_port,dport),              app_norm=lower(coalesce(app,application,app_proto)),              bytes_norm=coalesce(bytes, bytes_in),              src_host_norm=coalesce(src_host,""),              dest_host_norm=coalesce(dest_host,""),              src_display=coalesce(src_host, src_ip_norm),              dest_display=coalesce(dest_host, dest_ip_norm) | `pfsense_ip_labels` | `pfsense_ipv6_filter`
iseval = 0

[pfsense_index]
definition = index=pfsense
iseval = 0

[pfsense_normalize]
definition = eval transport_norm=lower(coalesce(transport,vendor_transport))
iseval = 0

[pfsense_base_filter]
definition = sourcetype=pfsense:* OR sourcetype=pfsense:filterlog OR sourcetype=pfsense:dnsbl OR sourcetype=pfsense:iplog
iseval = 0

[pfsense_token_filter]
definition = action=$action$ vendor_direction=$direction$ transport_norm=$transport$
iseval = 0

[pfsense_ip_labels]
definition = eval src_ip_type=case(match(src_ip_norm, ":") AND cidrmatch("fe80::/10", src_ip_norm), "v6 link-local", match(src_ip_norm, ":") AND cidrmatch("fc00::/7", src_ip_norm), "v6 ula", match(src_ip_norm, ":") AND cidrmatch("::1/128", src_ip_norm), "v6 loopback", match(src_ip_norm, ":") AND cidrmatch("ff00::/8", src_ip_norm), "v6 multicast", match(src_ip_norm, ":") AND cidrmatch("2000::/3", src_ip_norm), "v6 global", match(src_ip_norm, ":"), "v6 other"), dest_ip_type=case(match(dest_ip_norm, ":") AND cidrmatch("fe80::/10", dest_ip_norm), "v6 link-local", match(dest_ip_norm, ":") AND cidrmatch("fc00::/7", dest_ip_norm), "v6 ula", match(dest_ip_norm, ":") AND cidrmatch("::1/128", dest_ip_norm), "v6 loopback", match(dest_ip_norm, ":") AND cidrmatch("ff00::/8", dest_ip_norm), "v6 multicast", match(dest_ip_norm, ":") AND cidrmatch("2000::/3", dest_ip_norm), "v6 global", match(dest_ip_norm, ":"), "v6 other") | eval src_display=if(isnotnull(src_ip_type), src_display." (".src_ip_type.")", src_display), dest_display=if(isnotnull(dest_ip_type), dest_display." (".dest_ip_type.")", dest_display) | `pfsense_enrich_ip_tags` | `pfsense_enrich_dns` | eval src_display=coalesce(src_host_lookup, src_display), dest_display=coalesce(dest_host_lookup, dest_display) | eval src_tags=mvfilter(isnotnull(src_tags)), dest_tags=mvfilter(isnotnull(dest_tags)) | eval src_display=if(mvcount(src_tags)>0, src_display." [".mvjoin(src_tags, ", ")."]", src_display), dest_display=if(mvcount(dest_tags)>0, dest_display." [".mvjoin(dest_tags, ", ")."]", dest_display)
iseval = 0

[pfsense_ipv6_filter]
definition = eval show_ipv6=if("$show_ipv6$"="1", 1, 0) | where show_ipv6=1 OR (NOT match(src_ip_norm, ":") AND NOT match(dest_ip_norm, ":"))
iseval = 0

[pfsense_port_labels]
definition = eval dest_port_label=dest_port_norm
iseval = 0
