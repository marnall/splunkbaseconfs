[pfSense - Baseline Block Rate (7d)]
search = `pfsense_index` sourcetype=pfsense:filterlog | eval action_norm=lower(coalesce(action,vendor_action)) | stats count(eval(action_norm="blocked")) as blocked count as total | eval baseline_pct=if(total>0, round(blocked/total*100,2), 0) | eval updated_time=strftime(now(),"%F %T") | fields baseline_pct updated_time | outputlookup pfsense_baseline_block_rate
cron_schedule = 5 2 * * *
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
enableSched = 0

[pfSense - Baseline Unique Sources Per Hour (7d)]
search = `pfsense_index` sourcetype=pfsense:filterlog | eval src_ip_norm=coalesce(src_ip,src) | timechart span=1h dc(src_ip_norm) as hourly_unique | stats avg(hourly_unique) as baseline_per_hour | eval baseline_per_hour=round(baseline_per_hour,2) | eval updated_time=strftime(now(),"%F %T") | fields baseline_per_hour updated_time | outputlookup pfsense_baseline_unique_sources_hourly
cron_schedule = 10 2 * * *
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
enableSched = 0

[pfSense - IP Seen (First/Last)]
search = `pfsense_index` sourcetype=pfsense:filterlog | eval src_ip_norm=coalesce(src_ip,src) | where isnotnull(src_ip_norm) AND src_ip_norm!="" | stats min(_time) as first_seen max(_time) as last_seen by src_ip_norm | eval first_seen=strftime(first_seen,"%F %T"), last_seen=strftime(last_seen,"%F %T") | fields src_ip_norm first_seen last_seen | outputlookup pfsense_ip_seen
cron_schedule = 15 2 * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 0

[pfSense - Known DNSBL Domains (Prev 7d, Exclude Last 24h)]
search = `pfsense_index` sourcetype=pfsense:dnsbl | stats max(_time) as last_seen by blocked_domain | eval last_seen=strftime(last_seen,"%F %T") | fields blocked_domain last_seen | outputlookup pfsense_known_dnsbl_domains_prev7d
cron_schedule = 20 2 * * *
dispatch.earliest_time = -8d@d
dispatch.latest_time = -1d@d
enableSched = 0

[pfSense - Known IP Block Destinations (Prev 7d, Exclude Last 24h)]
search = `pfsense_index` sourcetype=pfsense:iplog | eval dest_ip_norm=coalesce(dst_ip, dest_ip, dest) | where isnotnull(dest_ip_norm) AND dest_ip_norm!="" | stats max(_time) as last_seen by dest_ip_norm | eval last_seen=strftime(last_seen,"%F %T") | fields dest_ip_norm last_seen | outputlookup pfsense_known_iplog_dests_prev7d
cron_schedule = 25 2 * * *
dispatch.earliest_time = -8d@d
dispatch.latest_time = -1d@d
enableSched = 0
