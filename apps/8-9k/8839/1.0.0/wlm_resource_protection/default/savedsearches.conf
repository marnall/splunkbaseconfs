[heavy_searches_terminator_saved_search]
cron_schedule = */5 * * * *
enableSched = 0
dispatch.earliest_time = -30m
dispatch.latest_time = now
search = index=_introspection component=PerProcess data.process_type=search NOT data.search_props.user IN ("internal_observability","splunk-system-user") NOT data.search_props.app IN ("splunk_instance_monitoring","cloud-monitoring-console-summarizer","wlm_resource_protection") | search [ | rest splunk_server=local /services/authentication/users | where mvfind(roles,"^wlm_terminator_monitored$") >= 0 | fields title | rename title as data.search_props.user | append [ | makeresults | eval data.search_props.user="__wlm_resource_protection_no_matching_user__" | fields data.search_props.user ] | format ] | search [ | rest splunk_server=local /services/search/jobs | search isDone=0 | eval data.search_props.sid="*".sid."*" | fields data.search_props.sid | format ] | table data.search_props.sid, data.pct_cpu, data.mem_used, data.search_props.user | rename data.search_props.sid as sid, data.pct_cpu as pct_cpu, data.mem_used as mem_used, data.search_props.user as user | fillnull value=0 pct_cpu | formatdata | stats values(user) as user, sum(total_vcpu_sec) as total_vcpu_sec, sum(total_mem_gib_sec) as total_mem_gib_sec, sum(shs_vcpu_sec) as shs_vcpu_sec, sum(shs_mem_gib_sec) as shs_mem_gib_sec, sum(idxs_vcpu_sec) as idxs_vcpu_sec, sum(idxs_mem_gib_sec) as idxs_mem_gib_sec, max(max_shs_vcpu_sec) as max_shs_vcpu_sec, max(max_idxs_vcpu_sec) as max_idxs_vcpu_sec, max(max_shs_mem_usage) as max_shs_mem_usage, max(max_idxs_mem_usage) as max_idxs_mem_usage by sid | stopsearch terminate_search=1
