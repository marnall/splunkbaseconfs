[crytica:alert]
KV_MODE = json
AUTO_KV_JSON = true
EVAL-action = case(match(lower(coalesce(signature, 'event.signature', alert_type_name, 'event.alert_type_name', alert_subcategory_name, 'event.alert_subcategory_name', "")), "added|create"), "created", match(lower(coalesce(signature, 'event.signature', alert_type_name, 'event.alert_type_name', alert_subcategory_name, 'event.alert_subcategory_name', "")), "deleted|removed|remove"), "deleted", match(lower(coalesce(signature, 'event.signature', alert_type_name, 'event.alert_type_name', alert_subcategory_name, 'event.alert_subcategory_name', "")), "permission|owner|modif|changed|content"), "modified", true(), "modified")
EVAL-app = coalesce(app, 'event.app', "Crytica Security")
EVAL-alert_category_id = tostring(coalesce(alert_category_id, 'event.alert_category_id'))
EVAL-alert_category_name = coalesce(alert_category_name, 'event.alert_category_name', category, 'event.category')
EVAL-alert_id = coalesce(alert_id, 'event.alert_id', id, 'event.id', source)
EVAL-alert_type_name = coalesce(alert_type_name, 'event.alert_type_name', signature, 'event.signature', subject, 'event.subject')
EVAL-category = coalesce(category, 'event.category', alert_category_name, 'event.alert_category_name')
EVAL-change_type = coalesce(change_type, 'event.change_type', "filesystem")
EVAL-description = coalesce(description, 'event.description', alert_message, 'event.alert_message', body, 'event.body', subject, 'event.subject')
EVAL-dest = coalesce(dest, 'event.dest', device_name, 'event.device_name', host)
EVAL-dvc = coalesce(dvc, 'event.dvc', monitor_id, 'event.monitor_id', host)
EVAL-element_change = case(match(lower(coalesce(alert_type_name, 'event.alert_type_name', signature, 'event.signature', subject, 'event.subject', "")), "permission"), "Permissions Modified", match(lower(coalesce(alert_type_name, 'event.alert_type_name', signature, 'event.signature', subject, 'event.subject', "")), "owner|group"), "Owner Or Group Modified", match(lower(coalesce(alert_type_name, 'event.alert_type_name', signature, 'event.signature', subject, 'event.subject', "")), "mtime|modification time"), "Modification Time Changed", match(lower(coalesce(alert_type_name, 'event.alert_type_name', signature, 'event.signature', subject, 'event.subject', "")), "content|hash|checksum|size|modified"), "Content Modified", match(lower(coalesce(alert_type_name, 'event.alert_type_name', signature, 'event.signature', subject, 'event.subject', "")), "deleted|removed|remove"), "Element Deleted", match(lower(coalesce(alert_type_name, 'event.alert_type_name', signature, 'event.signature', subject, 'event.subject', "")), "added|create|created|new"), "Element Added", true(), coalesce(alert_type_name, 'event.alert_type_name', signature, 'event.signature', "Other/Unclassified"))
EVAL-file_create_time = tonumber(coalesce(file_create_time, 'event.file_create_time', element_create_date, 'event.element_create_date', alert_event_timestamp, 'event.alert_event_timestamp'))
EVAL-file_name = coalesce(file_name, 'event.file_name', element_name, 'event.element_name', replace(coalesce(object_path, 'event.object_path', file_path, 'event.file_path', object, 'event.object', ""), "^.*[\\\\/]", ""))
EVAL-file_path = coalesce(file_path, 'event.file_path', object_path, 'event.object_path', element_name, 'event.element_name')
EVAL-id = coalesce(id, 'event.id', alert_id, 'event.alert_id')
EVAL-ids_type = coalesce(ids_type, 'event.ids_type', "host")
EVAL-object = coalesce(object, 'event.object', object_path, 'event.object_path', file_path, 'event.file_path', element_name, 'event.element_name')
EVAL-object_path = coalesce(object_path, 'event.object_path', file_path, 'event.file_path', element_name, 'event.element_name', object, 'event.object')
EVAL-os = coalesce(os, 'event.os', device_os_type_name, 'event.device_os_type_name', device_os_flavor)
EVAL-severity = lower(coalesce(severity, 'event.severity', priority, 'event.priority', "informational"))
EVAL-signature = coalesce(signature, 'event.signature', alert_type_name, 'event.alert_type_name', subject, 'event.subject')
EVAL-signature_id = tostring(coalesce(signature_id, 'event.signature_id', alert_type_id, 'event.alert_type_id'))
EVAL-src = coalesce(src, 'event.src', src_ip, 'event.src_ip', src_host, 'event.src_host')
EVAL-status = coalesce(status, 'event.status', "success")
EVAL-type = coalesce(type, 'event.type', "alert")
EVAL-vendor_product = coalesce(vendor_product, 'event.vendor_product', "Crytica Security")
LOOKUP-crytica_alert_state_lookup = crytica_alert_state_lookup alert_id OUTPUT state AS crytica_workflow_state acknowledged_by AS crytica_acknowledged_by acknowledged_at AS crytica_acknowledged_at resolved_by AS crytica_resolved_by resolved_at AS crytica_resolved_at updated_by AS crytica_workflow_updated_by updated_at AS crytica_workflow_updated_at
