[crytica_unresolved_threat_alert_summary]
definition = search index=* sourcetype="crytica:alert" earliest=0 latest=now | spath path=crytica_details.alert_core.alert_category_id output=root_category_id | spath path=event.crytica_details.alert_core.alert_category_id output=wrapped_category_id | spath path=alert_category_id output=root_flat_category_id | spath path=event.alert_category_id output=wrapped_flat_category_id | spath path=crytica_details.alert_core.alert_category_name output=root_category_name | spath path=event.crytica_details.alert_core.alert_category_name output=wrapped_category_name | spath path=alert_category_name output=root_flat_category_name | spath path=event.alert_category_name output=wrapped_flat_category_name | spath path=category output=root_category | spath path=event.category output=wrapped_category | rex field=_raw "\"alert_category_id\"\s*:\s*\"?(?<raw_alert_category_id>\d+)" | rex field=_raw "\"alert_category_name\"\s*:\s*\"(?<raw_alert_category_name>[^\"]+)" | eval alert_category_id=tostring(coalesce(alert_category_id,root_flat_category_id,wrapped_flat_category_id,root_category_id,wrapped_category_id,raw_alert_category_id,"")) | eval alert_category_name=coalesce(alert_category_name,root_flat_category_name,wrapped_flat_category_name,root_category_name,wrapped_category_name,category,root_category,wrapped_category,raw_alert_category_name,"") | where alert_category_id="10" OR alert_category_name="Crytica Threat Alerts" OR alert_category_name="Protected Device Integrity" | spath path=alert_id output=root_alert_id | spath path=event.alert_id output=wrapped_alert_id | spath path=id output=root_id | spath path=event.id output=wrapped_id | spath path=source output=root_source | spath path=dest output=root_dest | spath path=event.dest output=wrapped_dest | spath path=device_name output=root_device_name | spath path=event.device_name output=wrapped_device_name | spath path=severity output=root_severity | spath path=event.severity output=wrapped_severity | spath path=signature output=root_signature | spath path=event.signature output=wrapped_signature | spath path=subject output=root_subject | spath path=event.subject output=wrapped_subject | spath path=description output=root_description | spath path=event.description output=wrapped_description | spath path=alert_event_timestamp output=root_flat_alert_time | spath path=event.alert_event_timestamp output=wrapped_flat_alert_time | rex field=_raw "\"alert_event_timestamp\"\s*:\s*\"?(?<raw_alert_event_timestamp>\d+)" | eval raw_event_time=tonumber(coalesce(alert_event_timestamp,root_flat_alert_time,wrapped_flat_alert_time,raw_alert_event_timestamp,_time)) | eval normalized_event_time=case(isnull(raw_event_time),_time,raw_event_time>9999999999,round(raw_event_time/1000,0),true(),raw_event_time) | eval alert_id=tostring(mvindex(coalesce(alert_id,root_alert_id,wrapped_alert_id,id,root_id,wrapped_id,source,root_source,"Unknown"),0)) | where alert_id!="Unknown" AND alert_id!="" | lookup crytica_alert_state_lookup alert_id OUTPUT state AS workflow_state | eval workflow_state=mvindex(coalesce(workflow_state,"open"),0) | where workflow_state!="resolved" | eval device=mvindex(coalesce(dest,root_dest,wrapped_dest,device_name,root_device_name,wrapped_device_name,host,"Unknown"),0), severity=lower(mvindex(coalesce(severity,root_severity,wrapped_severity,"unknown"),0)), subject=mvindex(coalesce(subject,root_subject,wrapped_subject,description,root_description,wrapped_description,"Unknown"),0), element_change=mvindex(coalesce(signature,root_signature,wrapped_signature,"Other/Unclassified"),0) | stats latest(normalized_event_time) AS normalized_event_time latest(device) AS device latest(severity) AS severity latest(element_change) AS element_change latest(subject) AS subject latest(workflow_state) AS workflow_state BY alert_id | sort 0 normalized_event_time | eval is_new_threat=if(workflow_state="open",1,0), new_device=if(is_new_threat=1,device,null()), new_severity=if(is_new_threat=1,severity,null()), new_element_change=if(is_new_threat=1,element_change,null()), new_subject=if(is_new_threat=1,subject,null()) | stats count AS threat_alerts sum(is_new_threat) AS new_threat_alerts latest(new_device) AS threat_device latest(new_severity) AS threat_severity latest(new_element_change) AS threat_element_change latest(new_subject) AS threat_subject | appendpipe [ stats count AS _result_count | where _result_count=0 | eval threat_alerts=0, new_threat_alerts=0, threat_device="--", threat_severity="--", threat_element_change="--", threat_subject="--" | fields - _result_count ] | eval threat_alerts=coalesce(threat_alerts,0), new_threat_alerts=coalesce(new_threat_alerts,0), threat_device=coalesce(threat_device,"--"), threat_severity=coalesce(threat_severity,"--"), threat_element_change=coalesce(threat_element_change,"--"), threat_subject=coalesce(threat_subject,"--")
iseval = 0

