[crytica_alerts]
search = sourcetype="crytica:alert" type=alert
description = Crytica alert events mapped to the CIM Alerts data model.

[crytica_ids_attacks]
search = sourcetype="crytica:alert" ids_type=host (category="Crytica Threat Alerts" OR alert_category_id=10)
description = Crytica host-based integrity threat alerts mapped to the CIM Intrusion Detection IDS_Attacks data set.

[crytica_change]
search = sourcetype="crytica:alert" change_type=filesystem (category="Crytica Threat Alerts" OR alert_category_id=10)
description = Crytica filesystem integrity events mapped to the CIM Change data model.

[crytica_endpoint_filesystem]
search = sourcetype="crytica:alert" change_type=filesystem (category="Crytica Threat Alerts" OR alert_category_id=10)
description = Crytica filesystem integrity events mapped to the CIM Endpoint.Filesystem data set.

[crytica_inventory_os]
search = sourcetype="crytica:alert" dest=* os=*
description = Crytica protected-device OS context mapped to the CIM Inventory OS data set.

[crytica_event_signatures]
search = sourcetype="crytica:alert" signature=* signature_id=*
description = Crytica alert type name and ID fields exposed to the CIM Event Signatures data model.
