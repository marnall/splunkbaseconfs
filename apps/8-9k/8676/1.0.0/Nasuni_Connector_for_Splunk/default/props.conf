[Nasuni_Connector_for_Splunk]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0

# Index-time field extraction
TRANSFORMS-syslog_fields = extract_syslog_header
TRANSFORMS-antivirus_fields = extract_antivirus
TRANSFORMS-antivirus_flagged = extract_antivirus_flagged
TRANSFORMS-ransomware_attack = extract_ransomware_attack
TRANSFORMS-mitigation_policy = extract_mitigation_policy
TRANSFORMS-mitigation_policy_user = extract_mitigation_policy_user
TRANSFORMS-snapshot_fields = extract_snapshot
TRANSFORMS-generic_message = extract_generic_message

# Strip syslog header from audit logs containing JSON
SEDCMD-strip_for_json = s/^(\w+\s+\d+\s+\d+:\d+:\d+\s+[\d\.]+\s+\d+\s+[\d\-T:\.+]+\s+\S+\s+\S+\s+\d+\s+\d+\s+-\s+)(\{.+)$/\2/

# Enable indexed JSON extraction
INDEXED_EXTRACTIONS = json
AUTO_KV_JSON = true

# Time extraction
TIME_PREFIX = \d+\s+
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%f%z
MAX_TIMESTAMP_LOOKAHEAD = 50
