################################################################################

# Splunk Windows Universal Forwarder Upgrade App - Endpoint Inputs

################################################################################

#

# App:

# TA-windows_uf_upgrade_automation

#

# Purpose:

# This inputs.conf controls the Windows Universal Forwarder upgrade workflow,

# local upgrade log collection, MSI log collection, and optional controlled

# retry/reset actions.

#

# Important:

# Review all inputs before enabling in production.

#

# Recommended production behavior:

# - Keep the main upgrade scripted input disabled until ready to execute upgrades.

# - Keep log monitor inputs enabled when collecting upgrade telemetry.

# - Keep force retry and retry reset scripted inputs disabled by default.

# - Enable force retry only for selected failed endpoints that need one retry.

# - Disable force retry after the retry wave is complete.

# - Enable retry reset only when preparing selected endpoints for another retry wave.

# - Do not enable force retry and retry reset at the same time during normal operations.

#

# Default index:

# splunk_upgrade

#

# Primary sourcetype:

# splunk_upgrade

#

# MSI log sourcetype:

# splunk_upgrade_msi

#

################################################################################

# Main Splunk Upgrade Script Execution

################################################################################

#

# This scripted input runs the main upgrade wrapper script.

#

# Workflow:

# 1. splunk_upgrade_wrapper.bat runs from Splunk as a scripted input.

# 2. The wrapper launches the setup PowerShell script.

# 3. The setup script validates the MSI, version, state, and retry controls.

# 4. The setup script creates and starts a Windows Scheduled Task.

# 5. The scheduled task runs the execution script as SYSTEM.

# 6. The execution script performs the upgrade and writes final state.

#

# Recommended production behavior:

# - Disabled by default in packaged releases.

# - Enable only when ready to execute upgrades on targeted Windows UFs.

# - Use Deployment Server server classes to control which endpoints run upgrades.

#

# Recommended testing behavior:

# - Keep disabled.

# - Run splunk_upgrade_wrapper.bat manually from an elevated PowerShell prompt.

#

# Default interval:

# 2592000 seconds = approximately 30 days.

#

[script://.\bin\splunk_upgrade_wrapper.bat]
disabled = true
interval = 2592000
sourcetype = splunk_upgrade
index = splunk_upgrade

################################################################################

# Splunk Upgrade Setup Log Collection

################################################################################

#

# This input monitors setup/precheck activity generated by:

# splunk_windows_upgrade_task_setup.ps1

#

# Captures events such as:

# - MSI missing

# - Splunk binary missing

# - Target version extraction

# - Version validation

# - Retry prevention

# - Force retry flag detection and consumption

# - State file read/write/hash activity

# - Scheduled task creation

# - Scheduled task start failures

#

# Common event codes:

# 9800 = MSI installer not found

# 9801 = Splunk binary not found

# 9802 = Failed to create scheduled task

# 9803 = Scheduled task created successfully

# 9805 = Scheduled task started successfully

# 9806 = Scheduled task failed to start

# 9815 = Failed to extract target version from MSI filename

# 9816 = Target version equal to or lower than current version

# 9817 = Target major version too far ahead

# 9818 = Version validation passed

# 9819 = Retry prevented for same installer

# 9820 = Force retry flag consumed

# 9821 = State file written successfully

# 9822 = State file or retry flag operation failed

#

[monitor://C:\ProgramData\SplunkUpgrade\splunk_upgrade_setup.log]
disabled = true
sourcetype = splunk_upgrade
index = splunk_upgrade

################################################################################

# Splunk Upgrade Execution Log Collection

################################################################################

#

# This input monitors upgrade execution activity generated by:

# splunk_windows_upgrade_exec.ps1

#

# Captures events such as:

# - Splunkd stop/start

# - MSI upgrade execution

# - Upgrade success/failure

# - Installer cleanup success/failure

# - State file write/read/hash activity

# - Scheduled task cleanup failures

#

# Common event codes:

# 9804 = Failed to remove scheduled task

# 9807 = Failed to remove MSI installer

# 9808 = Splunkd started successfully

# 9809 = Failed to start Splunkd

# 9810 = Splunkd stopped successfully

# 9811 = Failed to stop Splunkd

# 9812 = Upgrade completed successfully

# 9813 = Upgrade failed

# 9821 = State file written successfully

# 9822 = State file operation failed

# 9823 = MSI installer removed successfully

#

[monitor://C:\ProgramData\SplunkUpgrade\splunk_upgrade_exec.log]
disabled = true
sourcetype = splunk_upgrade
index = splunk_upgrade

################################################################################

# Splunk MSI Installer Log Collection

################################################################################

#

# This input monitors verbose MSI installation logs generated during upgrades.

#

# MSI logs can be verbose and may consume storage quickly.

#

# Recommended behavior:

# - Enabled when detailed troubleshooting or audit history is required.

# - Consider disabling after rollout if MSI-level detail is no longer needed.

#

# Important:

# The MSI log filename includes a timestamp, so a wildcard is required.

#

# Example file:

# C:\ProgramData\SplunkUpgrade\splunk_upgrade_msi_20260523_120000.log

#

[monitor://C:\ProgramData\SplunkUpgrade\splunk_upgrade_msi_*.log]
disabled = true
sourcetype = splunk_upgrade_msi
index = splunk_upgrade
crcSalt = <SOURCE>
ignoreOlderThan = 30d

################################################################################

# Retry-Control Log Collection

################################################################################

#

# This input monitors retry-control operational activity generated by the force

# retry and retry reset scripts included in this TA.

#

# Log file:

# C:\ProgramData\SplunkUpgrade\splunk_upgrade_force_retry_helper.log

#

# Purpose:

# Collects force retry and retry reset events into the same index and sourcetype

# as the main upgrade workflow so dashboards and troubleshooting searches can

# show retry-control activity.

#

# Event codes:

# 9830 = Force retry flag created successfully

# 9831 = Force retry logic already ran; marker exists; skipped

# 9832 = Force retry logic failed

# 9833 = Force retry marker removed successfully

# 9834 = Force retry marker was not present; skipped

# 9835 = Failed to remove force retry marker

#

[monitor://C:\ProgramData\SplunkUpgrade\splunk_upgrade_force_retry_helper.log]
disabled = true
sourcetype = splunk_upgrade
index = splunk_upgrade

################################################################################

# Force Retry Control Script

################################################################################

#

# IMPORTANT:

# Disabled by default.

#

# Purpose:

# Creates a one-time force_retry.flag on selected Windows Universal Forwarders

# that need to retry a previously failed Splunk UF upgrade.

#

# This input does not perform the upgrade directly.

#

# It creates:

# C:\ProgramData\SplunkUpgrade\state\force_retry.flag

# C:\ProgramData\SplunkUpgrade\state\force_retry_helper_created.marker

#

# The main upgrade setup script consumes:

# C:\ProgramData\SplunkUpgrade\state\force_retry.flag

#

# The main upgrade setup script then logs:

# 9820 = Force retry flag detected and removed; retry allowed

#

# The marker file prevents this input from repeatedly creating new force retry

# flags if it remains enabled.

#

# Force retry event codes:

# 9830 = Force retry flag created successfully

# 9831 = Force retry logic already ran; marker exists; skipped

# 9832 = Force retry logic failed

#

# Recommended workflow:

# 1. Identify failed endpoints.

# 2. Fix the underlying issue.

# 3. Enable this input only for selected failed endpoints.

# 4. Allow the main upgrade workflow to consume force_retry.flag.

# 5. Confirm eventcode=9820 from the main setup workflow.

# 6. Disable this input after the retry wave is complete.

#

# Do not enable this input at the same time as the retry reset input during

# normal operations.

#

[script://.\bin\create_force_retry_flag_wrapper.bat]
disabled = true
interval = 2592000
sourcetype = splunk_upgrade
index = splunk_upgrade

################################################################################

# Force Retry Marker Reset Control Script

################################################################################

#

# IMPORTANT:

# Disabled by default.

#

# Purpose:

# Removes the force retry marker so the force retry control can create a new

# force_retry.flag during a future retry wave.

#

# This input does not perform the upgrade directly.

# This input does not create force_retry.flag.

# This input does not delete the main JSON state file.

#

# It removes:

# C:\ProgramData\SplunkUpgrade\state\force_retry_helper_created.marker

#

# Retry reset event codes:

# 9833 = Force retry marker removed successfully

# 9834 = Force retry marker was not present; skipped

# 9835 = Failed to remove force retry marker

#

# Recommended workflow after a failed retry:

# 1. Disable the force retry input.

# 2. Fix the underlying issue.

# 3. Enable this retry reset input for selected endpoints.

# 4. Confirm eventcode=9833 or eventcode=9834.

# 5. Disable this retry reset input.

# 6. Enable the force retry input again only when another controlled retry is needed.

#

# Do not enable this input at the same time as the force retry input during

# normal operations.

#

[script://.\bin\reset_force_retry_marker_wrapper.bat]
disabled = true
interval = 2592000
sourcetype = splunk_upgrade
index = splunk_upgrade

################################################################################

# JSON State File

################################################################################

#

# IMPORTANT:

# The JSON state file is intentionally NOT monitored by default.

#

# State file path:

# C:\ProgramData\SplunkUpgrade\state\splunk_upgrade_state.json

#

# Reason:

# The state file is a control/state file, not an append-only event log.

# It is overwritten as the upgrade workflow progresses.

#

# State activity is already logged into:

# C:\ProgramData\SplunkUpgrade\splunk_upgrade_setup.log

# C:\ProgramData\SplunkUpgrade\splunk_upgrade_exec.log

#

# Relevant event codes:

# 9819 = Retry prevented

# 9820 = Force retry detected and consumed

# 9821 = State file written successfully

# 9822 = State file read/write/hash failure

# 9823 = Installer cleanup succeeded

#

# If state history is required later, create a separate append-only state history

# log such as:

# C:\ProgramData\SplunkUpgrade\splunk_upgrade_state_history.log

#

# Then monitor that append-only file instead of monitoring the JSON state file.

################################################################################

