

# call_id assignment forks on whether the callStart has a <coSpace> field:
#
# coSpace present  → coSpace call → use server_call_id (per-bridge call GUID).
#   callCorrelator is the same for the LIFETIME of the coSpace, so it can't
#   distinguish sequential meetings in the same room.  server_call_id is unique
#   per call instance per bridge, so sequential meetings are always separate rows.
#   Distributed coSpace calls (same meeting on multiple bridges) will appear as
#   separate rows — one per bridge.  That is the accepted trade-off.
#
# coSpace absent   → ad hoc call → use callCorrelator.
#   For ad hoc calls the docs say callCorrelator is "dynamically generated",
#   meaning it is unique per call instance.  It is therefore safe to use as
#   call_id and it correctly groups distributed ad hoc legs across bridges.
[make_call_correlator]
REGEX = <callCorrelator>([\w-]+)</callCorrelator>
FORMAT = call_correlator::$1
WRITE_META = true

[make_callingPartyNumber]
REGEX = <remoteAddress>([^@]+)@.+</remoteAddress>
FORMAT = callingPartyNumber::$1
WRITE_META = true

[make_session]
REGEX = <records [^\>]*session="([\w-]+)"
FORMAT = session::$1
WRITE_META = true



[make_first_server_call_id]
REGEX = <call>(?<server_call_id_1>[^<]+)</call>
FORMAT = server_call_id_1::$1
WRITE_META = true

[make_second_server_call_id]
REGEX = <call id="(?<server_call_id_2>[^\"]+)">
FORMAT = server_call_id_2::$1
WRITE_META = true

[make_server_call_id]
INGEST_EVAL = server_call_id = coalesce('server_call_id_1', 'server_call_id_2')

[make_co_space]
REGEX = <coSpace>([^<]+)</coSpace>
FORMAT = co_space::$1
WRITE_META = true

[make_call_id]
# SECRET_LORE: if there's a co_space then we can't trust call_correlator -- all calls in a co_space have the same call_correlator
# SECRET_LORE: however if co_space is null... then call_correlator is our best bet.
# SECRET_LORE: if that is also not there then at least grab the server_call_id.
INGEST_EVAL = call_id = case(isnotnull(co_space), server_call_id, isnotnull(call_correlator), call_correlator, isnotnull(server_call_id), server_call_id)
# SECRET_LORE: Then we'll end up with all events having callLegId but only some having call_id.   We smear these across by callLegId and end up with a complete set.
# SECRET_LORE: mvexpand callLegId | eval callLegId=if(callLegId=="", null(), callLegId) | eventstats values(call_id) as call_id by callLegId

