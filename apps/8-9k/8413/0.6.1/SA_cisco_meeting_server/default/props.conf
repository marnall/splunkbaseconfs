[cms_cdr]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = time="
MAX_TIMESTAMP_LOOKAHEAD = 250
BREAK_ONLY_BEFORE_DATE = false
TRUNCATE = 0
NO_BINARY_CHECK = 1
# treat entire multiline chunks of XML as single events.
SHOULD_LINEMERGE = false
LINE_BREAKER = (\<\?xml version="1.0"\?\>)
# timestamp extraction is quite precise here so we deliberately allow people to ingest old CMS CDR data.
MAX_DAYS_AGO=1825
# we have no use for punct so we throw it out.
ANNOTATE_PUNCT = false

#INDEX TIME FIELD EXTRACTIONS
TRANSFORMS-call_ids = make_call_correlator, make_co_space, make_first_server_call_id, make_second_server_call_id, make_server_call_id, make_call_id, make_session
TRANSFORMS-numbers = make_callingPartyNumber

##########################################
# FROM HERE DOWN is search time logic.
# SOON we will pull the above keys out into a separate TA_cisco_meeting_server app.

KV_MODE = xml
pulldown_type = true

#Explicitly separated these because they were easier to debug.
FIELDALIAS-name               = records.record.call.name as name
FIELDALIAS-type               = records.record.callLeg.direction as type

#TODO - remove this once this solution is more mature.  This shadows our INGEST_EVAL
# leaving it in so that early customers can still use older data before we made this
# into an INGEST_EVAL
#FIELDALIAS-session            = records{@session} as session

# it seems this guid will only be present if CMS is clustered.
FIELDALIAS-callBridge         = records{@callBridge} as callBridge
FIELDALIAS-recordType         = records.record{@type} as recordType
FIELDALIAS-groupId            = records.record.callLeg.groupId	as groupId
FIELDALIAS-localAddress       = records.record.callLeg.localAddress as localAddress
FIELDALIAS-remoteAddress      = records.record.callLeg.remoteAddress as remoteAddress

# this is just more scaffolding.  There's an ingest eval that turns this into callId
FIELDALIAS-callCorrelator     = records.record.call.callCorrelator as callCorrelator
FIELDALIAS-correlatorIndex    = records.record{@correlatorIndex} as correlatorIndex

FIELDALIAS-coSpace            = records.record.call.coSpace as coSpace
#Not quite sure what this one is.  docs are unclear.
FIELDALIAS-ipAddress          = records.record.callLeg.ipAddress as ipAddress

FIELDALIAS-meetingName        = records.record.call.name as meetingName

FIELDALIAS-sipCallId          = records.record.callLeg.sipCallId as sipCallId
FIELDALIAS-callLegsCompleted  = records.record.call.callLegsCompleted as legs
FIELDALIAS-reason             = records.record.callLeg.reason as reason
FIELDALIAS-reasonDetails      = records.record.callLeg.reasonDetails as cause_description
FIELDALIAS-confirmationStatus = records.record.callLeg.confirmationStatus as confirmationStatus

FIELDALIAS-callLegId          = records.record.callLeg{@id} as callLegId

FIELDALIAS-encryptedMedia     = records.record.callLeg.encryptedMedia as encryptedMedia
FIELDALIAS-deviceType         = records.record.callLeg.deviceType as deviceType

EVAL-data_type = "cisco_cms"

#TODO - change these to INGEST_EVAL
EVAL-src_ip = if(type=="incoming",'records.record.callLeg.remoteAddress' ,'records.record.callLeg.localAddress')
EVAL-dest_ip = if(type=="outgoing",'records.record.callLeg.remoteAddress' ,'records.record.callLeg.localAddress')

# TODO - compare to our normal "legs" alias. Leaving it like this for now just as a blue wire.
EVAL-legs_alt = if(recordType="participantInfoStart",1,null())

EVAL-duration=coalesce('records.record.call.durationSeconds', 'records.record.callLeg.durationSeconds')
# todo - figure out what this actually means.
EVAL-activatedDuration='records.record.callLeg.activatedDuration'

EVAL-callingPartyName = 'records.record.callLeg.displayName'
EVAL-calledPartyAddress = if(type="outgoing", mvindex(split(remoteAddress,";"),0), mvindex(split(localAddress,";"), 0) )
EVAL-callingPartyAddress = if(type="incoming", mvindex(split(localAddress,";"),0), mvindex(split(remoteAddress,";"), 0))
