[id]
version = 0.6.1
name = SA_cisco_meeting_server
#splunkbase_id = 8413

[ui]
is_visible = 1
label = Supporting App for Cisco Meeting Server
supported_themes = light, dark

[launcher]
author = Sideview, LLC
description = This is a Supporting App designed to be deployed alongside Sideview's commercial "Cisco CDR Reporting and Analytics" app.  It provides the Splunk configuration to ingest the CDR data from Cisco Meeting Server. Additionally it contains various pieces of Splunk configuration and logic that are used by Cisco CDR Reporting and Analytics, to make the CMS CDR work within its user interfaces.
version = 0.6.1

[package]
id = SA_cisco_meeting_server
check_for_updates = 1
show_upgrade_notification = 1

[install]
build = 24

[shclustering]
deployer_lookups_push_mode = always_preserve

[triggers]
reload.sideview_data_types = access_endpoints /admin/conf-sideview_data_types
