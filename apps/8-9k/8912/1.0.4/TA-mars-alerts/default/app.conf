# Mars Platform — alert forwarding add-on (custom alert action "Send to Mars").
# See README.md for the payload schema and build/install instructions.

[id]
name = TA-mars-alerts
version = 1.0.4

[install]
is_configured = 0

# Custom conf reload trigger so editing the webhook URL doesn't prompt a
# full restart.
[triggers]
reload.mars_alerts = simple

[ui]
# Technology add-on: no browsable UI of its own. Non-visible (like
# Splunk's own alert-action TAs) so "open app" can't misroute to a
# globally-shared view from another add-on. The alert action, its icon,
# and the setup page (Manage Apps -> Set up) all work regardless of
# visibility.
is_visible = false
label = Mars Alert Forwarding
# Cloud-vetting-clean setup: a custom configuration view (no setup.xml,
# which Splunk Cloud prohibits). Writes the webhook URL + token to
# storage/passwords / mars_alerts.conf via the Splunk Web JS framework.
setup_view = mars_setup

[package]
id = TA-mars-alerts
# Left enabled: Splunkbase-published apps must allow update checks so
# customers are notified of new versions. (Private-only apps set this
# false; this app is intended for Splunkbase publication.)
check_for_updates = true

[launcher]
author = Mars Security
description = Forward Splunk alerts (full results, SPL, and severity) to Mars Platform in one outbound delivery.
version = 1.0.4
