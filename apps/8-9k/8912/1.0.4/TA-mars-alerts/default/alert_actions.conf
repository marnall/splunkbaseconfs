# Custom alert action: "Send to Mars".
# The handler (bin/mars_alert.py) receives the alert settings as a JSON
# document on stdin (payload_format = json) and pushes a rich payload to
# the Mars webhook. The webhook URL + token are read from the app's
# storage/passwords at run time, so no secrets live in this stanza.

[mars_alert]
is_custom = 1
label = Send to Mars
description = Forward this alert (full results, SPL, and severity) to Mars Platform.
icon_path = mars_alert.png
payload_format = json
# Set both: python.version satisfies AppInspect's exe-exists check on
# current Splunk (a hard failure without it); python.required is the
# forward directive (10.2+). The "python.version deprecated" notice is a
# non-blocking future-failure during the transition.
python.version = python3
python.required = 3.13
# Per-action severity override (Splunk ES 1–5 scale; Mars maps it 1–2 low,
# 3 medium, 4 high, 5 critical). Empty by default = "Auto": the handler
# falls back to the saved search's configured alert.severity, so a search's
# own tier is honored unless the analyst explicitly overrides it here.
param.severity =
