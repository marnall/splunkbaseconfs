[admin:app_version_check_configuration]
match = /
members = app_version_check_account, app_version_check_settings

[admin_external:app_version_check_account]
handlertype = python
python.version = python3
handlerfile = app_version_check_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:app_version_check_settings]
handlertype = python
python.version = python3
handlerfile = app_version_check_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true
