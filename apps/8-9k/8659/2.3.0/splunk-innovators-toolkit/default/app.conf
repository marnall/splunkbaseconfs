#
# Innovators Toolkit
# app.conf - Application configuration
#

[install]
is_configured = 0
build = 197

[ui]
is_visible = 1
label = Innovators Toolkit for Splunk

[launcher]
author = Splunk Innovators Network
description = Community toolkit from the Splunk Innovators Network. Add professional polish to Classic Simple XML dashboards with 79 drop-in CSS/JS components - including 12 premium themes and 13 animated backgrounds - plus a visual Design Studio. Import existing dashboards, add polish, export. No CSS or JS required. Compatible with Splunk Enterprise 9.0+ and Splunk Cloud. Themes, backgrounds, controls and the Design Studio target Classic Simple XML; the Optimizer can also analyze Dashboard Studio JSON.
version = 2.3.0

[package]
id = splunk-innovators-toolkit
check_for_updates = 1

[id]
name = splunk-innovators-toolkit
version = 2.3.0
