[script:authentication]
match                 = /authenticate
script                = validate.py
scripttype            = persist
handler               = validate.validation
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3

[script:data_enrichment]
