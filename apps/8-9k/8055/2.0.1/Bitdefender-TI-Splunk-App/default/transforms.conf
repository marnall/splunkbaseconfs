[bitdefender_ingestion_checkpoint]
collection = bitdefender_ingestion_checkpoint
external_type = kvstore
fields_list = _key, feed_name, last_ingestion_time

[bitdefender_ip_lookup]
collection = bitdefender_ip_lookup
external_type = kvstore
fields_list = _key, ip, type, format, first_seen, timestamp, TTL, severity, confidence, popularity, tags, threat_family, flags, ip_country, geo_region, geo_city, geo_latitude, geo_longitude, asn, as_owner, cidr, ports, protocols

[bitdefender_file_lookup]
collection = bitdefender_file_lookup
external_type = kvstore
fields_list = _key, sha256, md5, sha1, type, first_seen, timestamp, file_size, file_format, severity, confidence, popularity, suspicious_entry, threat_type, threat_family, actor_name, file_names, tags

[bitdefender_web_lookup]
collection = bitdefender_web_lookup
external_type = kvstore
fields_list = _key, url, type, first_seen, timestamp, ttl, severity, confidence, popularity, threat_types, web_content_categories, flags, tags
