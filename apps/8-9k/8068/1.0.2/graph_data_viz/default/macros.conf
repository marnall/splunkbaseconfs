# Version: 0.8.2

[convertGraphCircle(4)]
args = levels,nodeRepulsion,edgeElasticity,gravity
definition = | append \
    [makeresults\
    | eval type="layout"]\
| eval style=if(type="node","\"background-color\": \"".if(match(nodeColor,"."),nodeColor."\"","#006600\"").", \"shape\": \"".if(match(nodeShape,"."),nodeShape."\"","round-rectangle\"").", \"color\": \"".if(match(fontColor,"."),fontColor."\"","white\"").", \"font-size\": \"".if(match(fontSize,"."),fontSize."\"","24\"").", \"width\": \"".if(match(width,"."),width."\"","auto\"").", \"height\": \"".if(match(height,"."),height."\"","auto\"").", \"text-wrap\": \"".if(match(textWrap,"."),textWrap."\"","wrap\"").", \"font-family\": \"".if(match(fontFamily,"."),fontFamily."\"","Helvetica\"").if(match(advanced,"."),", ".advanced,""),null()) \
| eval style=if(type="edge","\"line-color\": \"".if(match(edgeColor,"."),edgeColor."\"","grey\"").", \"text-wrap\": \"".if(match(textWrap,"."),textWrap."\"","wrap\"").", \"width\": \"".if(match(width,"."),width."\"","1\"").", \"line-style\": \"".if(match(edgeStyle,"."),edgeStyle."\"","solid\"").", \"text-background-color\": \"".if(match(edgeFontBackgroundColor,"."),edgeFontBackgroundColor."\"","white\"").", \"text-background-opacity\": \"".if(match(edgeFontBackgroundTransparent,"."),edgeFontBackgroundTransparent."\"","0\"").", \"color\": \"".if(match(fontColor,"."),fontColor."\"","white\"").if(match(advanced,"."),", ".advanced,""),style) \
| eval clickAction=case(match(displayDetails,".") AND match(url,"."),"\"tooltip\": {\"message\": \"".displayDetails."\"}, "."\"url\": {\"link\": \"".url."\"}",match(displayDetails,"."),"\"tooltip\": {\"message\": \"".displayDetails."\"}",match(url,"."),"\"url\": {\"link\": \"".url."\"}",1==1,"") \
| streamstats c as evId \
| untable evId fieldname fieldvalue \
| eval att=if(match(fieldname,"Att\d\d_"),"\"".fieldname."\": \"".fieldvalue."\"","") \
| rex field=att mode=sed "s/Att\d\d_//g" \
| eval fieldname=if(match(fieldname,"Att\d\d_"),"att",fieldname) \
| stats values(att) As att first(fieldvalue) As fieldvalue by evId, fieldname \
| eval fieldvalue=if(match(att,"\"."),att,fieldvalue) \
| fields - att \
| xyseries evId fieldname fieldvalue \
| nomv att \
| rex field=att mode=sed "s/\"\s\"/\", \"/g" \
| eval json=if((type="node"),"{\"elements\": {\"nodes\": [ {\"data\": {\"id\": \"".id."\", \"label\": \"".label."\", \"attributes\": ".if(match(att,"."),"{".att."}","\"\" ").", \"style\": {".style."}}}]}}",null()) \
| eval json=if((type="node" AND match(clickAction,".")),"{\"elements\": {\"nodes\": \
[ {\"data\": {\"id\": \"".id."\", \"label\": \"".label."\", \"attributes\": ".if(match(att,"."),"{".att."}","\"\" ").", \"style\": {".style."}, \"clickAction\": {".clickAction."}}}]}}",json) \
| eval json=if((type="layout"),"{\"layout\": {\"name\": \"circle\", \"maxHighlightLevels\": \"$levels$\",\"nodeRepulsion\": \"$nodeRepulsion$\", \"edgeElasticity\": \"$edgeElasticity$\", \"gravity\": \"$gravity$\"}}",json) \
| eval json=if((type="edge"),"{\"elements\": {\"edges\": \
[ {\"data\": {\"source\": \"".source."\", \"target\": \"".target."\", \"label\": \"".if(match(label,"."),label,"")."\", \"attributes\": ".if(match(att,"."),"{".att."}","\"\" ").", \"style\": {".style."}}}]}}",json) \
| eval json=if((type="edge" AND match(clickAction,".")),"{\"elements\": {\"edges\": \
[ {\"data\": {\"source\": \"".source."\", \"target\": \"".target."\", \"attributes\": ".if(match(att,"."),"{".att."}","\"\" ").", \"style\": {".style."}, \"clickAction\": {".clickAction."}}}]}}",json) \
| fields json
iseval = 0

