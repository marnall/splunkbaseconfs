# splunklib loads this at search-command startup via fileConfig.
# %(SPLUNK_HOME)s is interpolated through the defaults dict splunklib
# passes in. The ``format`` field is read with raw=True so its
# %(asctime)s / %(levelname)s placeholders are preserved verbatim and
# resolved by the Python logging % formatter at emit time.

[loggers]
keys=root

[handlers]
keys=claudechats

[formatters]
keys=splunk

[logger_root]
level=INFO
handlers=claudechats

[handler_claudechats]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=splunk
args=('%(SPLUNK_HOME)s/var/log/splunk/claudechats.log', 'a', 25000000, 5)

[formatter_splunk]
format=%(asctime)s %(levelname)s %(name)s: %(message)s
