# Anthropic Compliance API - CIM eventtypes

# Authentication: activity feed events involving user actions
[anthropic_compliance_authentication]
search = sourcetype="anthropic:compliance:activity" actor.type=user_actor

# Authentication: user identity records from org users
[anthropic_compliance_org_user_identity]
search = sourcetype="anthropic:compliance:org_user"

# Change: all activity feed events (create/update/delete actions are all changes)
[anthropic_compliance_change]
search = sourcetype="anthropic:compliance:activity" (match(type, "created") OR match(type, "updated") OR match(type, "deleted") OR match(type, "removed") OR match(type, "added"))

# Change: project lifecycle events
[anthropic_compliance_project_change]
search = sourcetype="anthropic:compliance:apps:project"

# Change: chat lifecycle events (creation/update visible via updated_at)
[anthropic_compliance_chat_change]
search = sourcetype="anthropic:compliance:apps:chat"

# Change: group and role management
[anthropic_compliance_group_change]
search = sourcetype="anthropic:compliance:group" OR sourcetype="anthropic:compliance:group_member" OR sourcetype="anthropic:compliance:org_role"
