[claudechats-command]
syntax = claudechats userid_field=<field> (account=<string>)? (messages=<bool>)?
shortdesc = Retrieve Claude.ai chat history for upstream user_ids via the Anthropic Compliance API.
description = Calls /v1/compliance/apps/chats with the distinct user_ids found in upstream events \
    (the endpoint requires user_ids[] on every call, so the user-set scoping is mandatory). \
    Emits flat pipeline rows. With messages=true (default) one row per message: chat columns are \
    prefixed chat. (chat.id, chat.user.id, chat.user.email_address, chat.created_at, chat.updated_at, \
    chat.name) and message columns are message_id, message_created_at, role, text, content_types. \
    With messages=false one row per chat (chat.* columns only). The Compliance API content field \
    is normalized into text (concatenated text-block content) and content_types (multi-value list \
    of block types). Account is auto-discovered when exactly one is configured; specify it \
    explicitly when multiple exist. Requires the list_storage_passwords capability on the running user.
usage = public
example1 = sourcetype="anthropic:compliance:apps:project" | stats count by user.id | claudechats userid_field=user.id
comment1 = Pull user_ids from indexed compliance data and retrieve full chat history with messages.
example2 = sourcetype="anthropic:compliance:activity" "actor.user_id"=user_01ATBWH52UNYC2pzqaFvomA1 | claudechats userid_field="actor.user_id"
comment2 = Pivot from a single Activity Feed event to that user's chats. Note the quoted dotted field name.
tags = anthropic claude compliance chats
