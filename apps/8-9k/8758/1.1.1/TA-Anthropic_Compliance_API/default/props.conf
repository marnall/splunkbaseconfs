# Anthropic Compliance API - field extractions and CIM mappings

[anthropic:compliance:activity]
KV_MODE = json
TIME_PREFIX = "created_at"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TRUNCATE = 0

# CIM Authentication / Change: resolve polymorphic actor to a single user field
EVAL-user = coalesce('actor.email_address', 'actor.unauthenticated_email_address', 'actor.user_id', 'actor.api_key_id', 'actor.admin_api_key_id')
EVAL-src_ip = 'actor.ip_address'
EVAL-user_agent = 'actor.user_agent'

# CIM Authentication fields
# Failure branch must run before login/auth so *_failed types (e.g. sso_login_failed,
# magic_link_login_failed, *_access_failed) are classified correctly.
EVAL-action = case(\
    match(type, "(?i)fail|denied|unauthorized"), "failure",\
    match(type, "(?i)login|sign_in|auth|logout|sign_out"), "success",\
    1==1, "success"\
)
EVAL-app = "Anthropic Claude"
EVAL-dest = "api.anthropic.com"

# CIM Change fields
EVAL-object = coalesce('claude_chat_id', 'claude_project_id', organization_id)
EVAL-object_category = case(\
    isnotnull('claude_chat_id'), "chat",\
    isnotnull('claude_project_id'), "project",\
    1==1, "organization"\
)
EVAL-change_type = "AAA"
EVAL-status = "success"
EVAL-command = type

[anthropic:compliance:organization]
KV_MODE = json
TIME_PREFIX = "created_at"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TRUNCATE = 0

# CIM Change: org record upserts
EVAL-object = uuid
EVAL-object_category = "organization"
EVAL-change_type = "AAA"
EVAL-status = "success"

[anthropic:compliance:org_user]
KV_MODE = json
TIME_PREFIX = "created_at"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TRUNCATE = 0

# CIM Authentication: user identity in org
EVAL-user = coalesce(email, id)
EVAL-app = "Anthropic Claude"
EVAL-dest = "api.anthropic.com"
EVAL-action = "success"

# CIM Change: user provisioning events
EVAL-object = coalesce(email, id)
EVAL-object_category = "user"
EVAL-change_type = "AAA"
EVAL-status = "success"

