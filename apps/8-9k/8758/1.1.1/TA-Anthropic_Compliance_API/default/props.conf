# --- Add-on's own operational log files (solnlib formatter) ---
# Solnlib emits a leading "YYYY-MM-DD HH:MM:SS,ms" timestamp on every log
# record and lets Python's logging module continue the traceback on
# following lines without a timestamp. Tell Splunk to merge those
# continuation lines into a single event so tracebacks aren't split.

[ta-anthropic_compliance_api_activity_feed]
SHOULD_LINEMERGE = true
BREAK_ONLY_BEFORE_DATE = true
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S,%3N
MAX_TIMESTAMP_LOOKAHEAD = 25
TRUNCATE = 0

