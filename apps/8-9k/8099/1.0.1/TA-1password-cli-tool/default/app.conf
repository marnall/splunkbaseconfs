[launcher]
version = 1.0.1
description = If you have a use case to regularly list all your users and groups in 1Password, you can pull them using this add-on installed on a linux machine with the 1Password CLI tool installed.
author = Marlin A

[id]
version = 1.0.1
name = TA-1password-cli-tool

[install]
build = 1780207430
is_configured = false
state = enabled

[package]
id = TA-1password-cli-tool
check_for_updates = true

[ui]
label = 1Password-CLI-Tool
is_visible = true

[triggers]
reload.ta_1password_cli_tool_settings = simple
