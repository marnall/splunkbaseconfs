[admin:TA_1password_cli_tool_configuration]
match = /
members = TA_1password_cli_tool_settings

[admin:TA_1password_cli_tool_inputs]
match = /
members = TA_1password_cli_tool_list_1password_groups, TA_1password_cli_tool_list_1password_users

[admin_external:TA_1password_cli_tool_settings]
handlertype = python
python.version = python3
handlerfile = TA_1password_cli_tool_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_1password_cli_tool_list_1password_users]
handlertype = python
python.version = python3
handlerfile = TA_1password_cli_tool_rh_list_1password_users.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_1password_cli_tool_list_1password_groups]
handlertype = python
python.version = python3
handlerfile = TA_1password_cli_tool_rh_list_1password_groups.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
