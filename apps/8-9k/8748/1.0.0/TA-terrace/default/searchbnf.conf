[terraceip-command]
syntax = terraceip ip=<ip_address>
shortdesc = Look up a single IP against Terrace Networks threat intelligence.
description = Returns classification, tags, enrichment (ASN, country, rDNS), actors, exploits, and threat score for the given IP.
usage = public
example1 = | terraceip ip=1.2.3.4
comment1 = Look up IP 1.2.3.4 against Terrace Networks.

[terracequery-command]
syntax = terracequery (cidr=<cidr>) | (asn=<asn_number>) | (actor=<actor_slug>) [limit=<int>]
shortdesc = Search Terrace Networks IP summaries by CIDR, ASN, or actor.
description = Returns IP summaries matching the given CIDR range, ASN number, or threat actor slug with classification and enrichment data.
usage = public
example1 = | terracequery cidr="10.0.0.0/8" limit=50
comment1 = Search for IPs in the 10.0.0.0/8 range.
example2 = | terracequery asn=12345
comment2 = Search for IPs belonging to ASN 12345.
example3 = | terracequery actor=shodan
comment3 = Search for IPs associated with the Shodan actor.

[terracelookup-command]
syntax = terracelookup ip_field=<field_name>
shortdesc = Enrich pipeline events with Terrace Networks threat intelligence.
description = Streaming command that looks up each event's IP address and adds terrace_* prefixed fields including classification, tags, threat score, ASN, and country.
usage = public
example1 = index=firewall | terracelookup ip_field=src_ip | where terrace_classification="malicious"
comment1 = Enrich firewall events and filter to malicious IPs.
