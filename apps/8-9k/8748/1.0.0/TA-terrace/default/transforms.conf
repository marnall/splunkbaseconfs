[terrace_threat_intel_lookup]
collection = terrace_threat_intel
external_type = kvstore
fields_list = ip, classification, tags, threat_score, asn, asn_org, country, first_seen, last_seen, source

[terrace_tags_lookup]
collection = terrace_tags
external_type = kvstore
fields_list = tag_id, name, category, intent, description
