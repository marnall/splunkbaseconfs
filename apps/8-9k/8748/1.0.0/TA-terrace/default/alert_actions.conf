[terrace_enrich]
is_custom = 1
label = Enrich with Terrace Networks
description = Look up IPs in the notable event against Terrace Networks and write enrichment to the terrace_threat_intel KV store.
icon_path = appIcon.png
payload_format = json
command = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$"
python.version = python3
python.required = 3.13

param.ip_field = src_ip
