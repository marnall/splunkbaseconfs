[script:event-receiver]
match = /apex/event-receiver
script = event_receiver.py
scripttype = persist
handler = event_receiver.EventReceiver
requireAuthentication = true
output_modes = json
passPayload = true
python.version = python3
python.required = 3.13

[admin:apex-setup-templates]
match = /apex-setup-templates
members = hec-config, reset

[admin_external:hec-config]
handlertype = python
handlerfile = apex_setup_templates.py
handleractions = list, edit, create, delete
handlerpersistentmode = true
python.version = python3
python.required = 3.13

[admin_external:reset]
handlertype = python
handlerfile = apex_reset_handler.py
handleractions = create
handlerpersistentmode = true
python.version = python3
python.required = 3.13
