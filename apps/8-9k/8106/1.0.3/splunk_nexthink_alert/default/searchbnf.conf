[listremoteactions-command]
syntax = | listremoteactions (account=<string>) (log_level=<string>)?
shortdesc = List Nexthink Remote actions enabled for API execution
usage = public
example1 = | listremoteactions account=Novo

[runremoteaction-command]
syntax = .. | runremoteaction (account=<string>) (remote_action_id=<string>) (device_uid=<field>) (params=<string>)? (reason=<string>)? (reason=<string>)? (external_source=<string>)? (expires_in_minutes=<string>)? (external_reference=<string>)? (log_level=<string>)?
shortdesc = Run the remote action for the devices. "params" is in the format "propety='value';property2='value2'"
usage = public
example1 = | makeresults | eval uid="a44b1eca-2e1c-43cd-8345-624a66513fd9" | runremoteaction account=Novo remote_action_id=#remote_acion device_uid=uid
