[id]
name = TA-ta-zisoft
version = 2.1.0

[launcher]
version = 2.1.0
description = This add-on normalizes Zisoft custom logs to be CIM-compliant. After installation, users simply choose the index and sourcetype where their Zisoft logs are stored, and the add-on automatically maps fields and provides a prebuilt GUI dashboard.

[package]
id = TA-ta-zisoft
check_for_updates = true
# Removed check_for_updates because Splunkbase disallows disabling it.

[ui]
label = TA-ta-zisoft
# App icon will automatically be used if you include appserver/static/appIcon.png

[triggers]
reload.addon_builder = simple

