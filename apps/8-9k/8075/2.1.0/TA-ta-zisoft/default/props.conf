[zisoft:server]
# Extract timestamp from the [YYYY-MM-DD HH:MM:SS] part
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S

# Extract main fields (status removed, src_ip = only first IP)
EXTRACT-zisoft_fields = ^\[(?P<time>[^\]]+)\]\s+\S+\s*:\s+(?P<user_email>[^\s]+)\s+(?P<src_ip>\d{1,3}(?:\.\d{1,3}){3})(?:,\s*(?:\d{1,3}\.){3}\d{1,3})*\s+(?P<system_user>\w+)\s+(?P<category>\w+|-)\s+(?P<session_id>\w+|-)\s+(?P<action>[a-zA-Z0-9_]+)

# Aliases for CIM
FIELDALIAS-src_user = user_email AS src_user
FIELDALIAS-src      = src_ip AS src

