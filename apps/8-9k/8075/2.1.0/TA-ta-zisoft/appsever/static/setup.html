<div>
  <h2>Zisoft Add-on Setup</h2>
  <label>Index:</label>
  <input type="text" id="zisoft_index" placeholder="Enter index name" />
  <label>Sourcetype:</label>
  <input type="text" id="zisoft_sourcetype" placeholder="Enter sourcetype" />
  <button onclick="saveConfig()">Save</button>
</div>

<script>
function saveConfig() {
  var index = document.getElementById('zisoft_index').value;
  var sourcetype = document.getElementById('zisoft_sourcetype').value;
  fetch('/splunkd/__raw/servicesNS/nobody/TA-ta-zisoft/setup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `zisoft_index=${index}&zisoft_sourcetype=${sourcetype}`
  }).then(r => alert("Saved successfully!"));
}
</script>
