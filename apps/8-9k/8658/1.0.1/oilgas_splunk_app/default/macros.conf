[oilgas_update_assets]
definition = index="oil_gas"\
| stats latest(_time) as LAST_SEEN, count by FLOW_KIND, NPD_WELL_BORE_CODE, WELL_TYPE\
| rename NPD_WELL_BORE_CODE as WELL_BORE_CODE\
| eval _key=md5(FLOW_KIND . WELL_BORE_CODE)\
| table _key, WELL_BORE_CODE, WELL_TYPE, FLOW_KIND, LAST_SEEN\
\
| outputlookup oilgas_assets_wells allow_updates=true append=true
iseval = 0

[kpi_macro_Sideproduct_Volume_Increase]
definition = index=oil_gas earliest=-7d\
| bin _time span=1d\
| stats avg(BORE_GAS_VOL) as avg_gas, avg(BORE_WAT_VOL) as avg_water by _time\
| eval gas_water_ratio = if(avg_water > 0, avg_gas / avg_water, null())\
| eventstats latest(gas_water_ratio) as latest_value\
| eval is_latest = if(_time == relative_time(now(), "@d"), "true", "false")\
| rename gas_water_ratio as kpi_value\
| table _time, kpi_value, is_latest
iseval = 0

[kpi_macro_utilisation_percent]
definition = index=oil_gas earliest=-7d\
| bin _time span=1d\
| stats sum(ON_STREAM_HRS) as total_onstream, dc(WELL_BORE_CODE) as well_count by _time\
| eval max_possible = well_count * 24\
| eval utilization_pct = round((total_onstream / max_possible) * 100, 1)\
| rename utilization_pct as kpi_value\
| eval is_latest = if(_time == relative_time(now(), "@d"), "true", "false")\
| table _time, kpi_value, is_latest


[extract_alert_esp_metrics_raw]
definition = mvappend(\
    "INPUT_VOLTAGE_UNBALANCE=" . tostring(INPUT_VOLTAGE_UNBALANCE),\
    "OUTPUT_POWER=" . tostring(OUTPUT_POWER),\
    "MOTOR_LOAD=" . tostring(MOTOR_LOAD),\
    "MOTOR_CURRENT=" . tostring(MOTOR_CURRENT),\
    "CURRENT_UNBALANCE=" . tostring(CURRENT_UNBALANCE),\
    "X_VIBRATION=" . tostring(X_VIBRATION)\
)
iseval = 0


[extract_alert_well_metrics_raw]
definition = mvappend(\
    "AVG_DOWNHOLE_PRESSURE=" . tostring(AVG_DOWNHOLE_PRESSURE),\
    "AVG_DP_TUBING=" . tostring(AVG_DP_TUBING),\
    "AVG_ANNULUS_PRESS=" . tostring(AVG_ANNULUS_PRESS),\
    "AVG_WHP_P=" . tostring(AVG_WHP_P),\
    "AVG_WHT_P=" . tostring(AVG_WHT_P)\
)
iseval = 0

[form_alert_reason(3)]
args = value, min, max
definition = case(\
    isnotnull(min) AND value < min, "Low",\
    isnotnull(max) AND value > max, "High",\
    true(), null()\
)
iseval = 0

[alert_title(3)]
args = alert_reason, well, metric
definition = `direction_emoji($alert_reason$)` . " " . $well$ . " " . $metric$ . " TOO " . upper($alert_reason$)
iseval = 0

[direction_emoji(1)]
args = alert_reason
definition = case(\
    $alert_reason$ == "High", "📈",\
    $alert_reason$ == "Low", "📉",\
    true(), ""\
)
iseval = 0

[alert_description(6)]
args = alert_reason, well, metric, value, min, max
definition = case(\
    isnotnull($min$) AND isnotnull($max$) AND $alert_reason$ == "High",\
        "The value of " . $metric$ . " (" . $value$ . ") on well " . $well$ . " exceeds the maximum threshold of allowed range " . $min$ . "–" . $max$ . ".",\
    isnotnull($min$) AND isnotnull($max$) AND $alert_reason$ == "Low",\
        "The value of " . $metric$ . " (" . $value$ . ") on well " . $well$ . " is below the minimum threshold of allowed range " . $min$ . "–" . $max$ . ".",\
    isnull($min$) AND isnotnull($max$) AND $alert_reason$ == "High",\
        "The value of " . $metric$ . " (" . $value$ . ") on well " . $well$ . " exceeds the maximum threshold of " . $max$ . ".",\
    isnotnull($min$) AND isnull($max$) AND $alert_reason$ == "Low",\
        "The value of " . $metric$ . " (" . $value$ . ") on well " . $well$ . " is below the minimum threshold of " . $min$ . ".",\
    true(), "Value " . $value$ . " of " . $metric$ . " on well " . $well$ . " is outside expected range."\
)
iseval = 0

[oil_gas_indexes]
definition = index=oil_gas
iseval = false

[oil_gas_base_search]
definition = `oil_gas_indexes` tag="oil_gas"
iseval = false
