[script:ai_chat_backend]
match = /ai_chat_backend/chat
script = ai_chat_rest.py
scripttype = persist
handler = ai_chat_rest.AiChatRestHandler
requireAuthentication = true
output_modes = json
passPayload = true
passHttpCookies = true
passSession = true
passSystemAuth = true
python.version = python3
python.required = 3.13
