[esp_alarms]
action.lookup = 1
action.lookup.append = 1
action.lookup.filename = esp_alarms.csv
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = `oil_gas_base_search`\
| eval metrics_raw = `extract_alert_esp_metrics_raw`\
| mvexpand metrics_raw\
| rex field=metrics_raw "(?<metric>[^=]+)=(?<value>.*)"\
| eval value = tonumber(value)\
| lookup esp_thresholds.csv esp_metric as metric OUTPUT min, max\
| eval alert_reason = `form_alert_reason(value, min, max)`\
| where isnotnull(alert_reason)\
| table _time, WELL_BORE_CODE, metric, value, min, max, alert_reason

