[OILGAS AI analysis current vs motor T by well]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = oilgas_splunk_app
request.ui_dispatch_view = search
search = | tstats sum(Main_Data.AVG_DOWNHOLE_PRESSURE) as "Current (Amps)", \
         sum(Main_Data.AVG_DOWNHOLE_TEMPERATURE) as "Motor Temperature (°F)" \
  FROM datamodel=OilGas.Main_Data\
  BY _time Main_Data.WELL_BORE_CODE\
| timechart\
            sum("Current (Amps)") as "Current (Amps)",\
            sum("Motor Temperature (°F)") as "Motor Temperature (°F)" by Main_Data.WELL_BORE_CODE
