##################################
# Traffic
##################################

[parsgate_traffic]
search = sourcetype=syslog:parsgate action IN (ALLOW,DISALLOW,INVALID,SPOOFED,ENCRYPT)

##################################
# URL Filtering
##################################

[parsgate_urlfilter]
search = sourcetype=syslog:parsgate http_method=*

##################################
# IPS
##################################

[parsgate_ips]
search = sourcetype=syslog:parsgate signature_id=*

##################################
# DOS
##################################

[parsgate_dos]
search = sourcetype=syslog:parsgate log_subtype=dos

##################################
# Global Block
##################################

[parsgate_globalblock]
search = sourcetype=syslog:parsgate message="Packet(s) matching global blocking list blocked*"

##################################
# VPN Traffic
##################################

[parsgate_vpn_traffic]
search = sourcetype=syslog:parsgate client_ip=* virtual_ip=*

##################################
# VPN Events
##################################

[parsgate_vpn_event]
search = sourcetype=syslog:parsgate vpn_category=*

##################################
# Authentication
##################################

[parsgate_auth]
search = sourcetype=syslog:parsgate event_type IN (Auth_Info,Auth_Alert,Acc_Info)

##################################
# System Events
##################################

[parsgate_event]
search = sourcetype=syslog:parsgate (message="SUCCESS:*" OR message="LOGOUT:*" OR message="User *")
