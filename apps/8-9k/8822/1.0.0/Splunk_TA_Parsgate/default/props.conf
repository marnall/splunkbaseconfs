[syslog:parsgate]

SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)

TRUNCATE = 0

CHARSET = UTF-8

KV_MODE = none
AUTO_KV_JSON = false

NO_BINARY_CHECK = true

#########################
# Timestamp
#########################

TIME_PREFIX = ^[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+
TIME_FORMAT = %Y %b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 24

#########################
# Common Fields
#########################

REPORT-header = pg_header

#########################
# Parsers
#########################

REPORT-traffic = pg_traffic
REPORT-urlfilter = pg_urlfilter
REPORT-ips = pg_ips
REPORT-dos = pg_dos
REPORT-globalblock = pg_globalblock
REPORT-event = pg_event
REPORT-vpntraffic = pg_vpntraffic
REPORT-vpnevent = pg_vpnevent
REPORT-users = pg_users

#########################
# Aliases
#########################

FIELDALIAS-src = src_ip AS src
FIELDALIAS-dst = dest_ip AS dest
FIELDALIAS-user = username AS user

