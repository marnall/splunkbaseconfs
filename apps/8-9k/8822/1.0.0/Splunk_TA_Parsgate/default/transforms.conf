[pg_header]

REGEX = (?:[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+)

[pg_traffic]

REGEX = ^(?:[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+)(?<year>\d{4})\s+(?<month>\w+)\s+(?<day>\d{1,2})\s+(?<event_time>\d\d:\d\d:\d\d)\s+(?<policy_id>\d+)\s+(?<src_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<src_port>\d+)\s+(?<dest_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<dest_port>\d+)\s+(?<protocol_number>\d+)\s+(?<nat_src_ip>\S+)\s+(?<nat_src_port>\d+)\s+(?<nat_dest_ip>\S+)\s+(?<nat_dest_port>\d+)\s+(?<packets_out>\d+)\s+(?<bytes_out>\d+)\s+(?<packets_in>\d+)\s+(?<bytes_in>\d+)\s+(?<duration>\d+)\s+(?<action>ALLOW|DISALLOW|INVALID|SPOOFED|ENCRYPT)\s+(?<username>\S+)\s+(?<protocol_name>\S+)\s*$
FORMAT = log_type::traffic

[pg_url]

REGEX = ^(?:[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+)(?<year>\d{4})\s+(?<month>\w+)\s+(?<day>\d{1,2})\s+(?<event_time>\d\d:\d\d:\d\d)\s+(?<policy_id>\d+)\s+(?<src_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<dest_ip>\S+)\s+(?<username>\S+)\s+(?<hostname>\S+)\s+(?<url>\S+)\s+(?<action>allowed|denied)\s+(?<http_method>GET|POST|PUT|DELETE|CONNECT|HEAD|OPTIONS)\s*$
FORMAT = log_type::urlfilter

[pg_ips]

REGEX = ^(?:[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+)(?<year>\d{4})\s+(?<month>\w+)\s+(?<day>\d{1,2})\s+(?<event_time>\d\d:\d\d:\d\d)\s+(?<protocol>TCP|UDP|ICMP)\s+(?<src_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<src_port>\S+)\s+(?<dest_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<dest_port>\S+)\s+(?<action>Drop)\s+(?<severity>Low|Medium|High)\s+(?<signature_id>\d+)\s+\-\s+(?<message>.+)$
FORMAT = log_type::ips

[pg_dos]

REGEX = ^(?:[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+)(?<year>\d{4})\s+(?<month>\w+)\s+(?<day>\d{1,2})\s+(?<event_time>\d\d:\d\d:\d\d)\s+(?<protocol>TCP|UDP|ICMP)\s+(?<src_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<src_port>\S+)\s+(?<dest_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<dest_port>\S+)\s+(?<action>Drop)\s+(?<severity>High)\s+\[(?<message>[^\]]+)\]\s*$
FORMAT = log_type::dos

[pg_global]

REGEX = ^(?:[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+)(?<year>\d{4})\s+(?<month>\w+)\s+(?<day>\d{1,2})\s+(?<event_time>\d\d:\d\d:\d\d)\s+(?<protocol>TCP|UDP|ICMP)\s+(?<src_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<src_port>\S+)\s+(?<dest_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<dest_port>\S+)\s+(?<action>Drop)\s+(?<severity>High)\s+(?<message>Packet\(s\)\smatching\sglobal\sblocking\slist\sblocked.+)$
FORMAT = log_type::globalblock

[pg_vpntraffic]

REGEX = ^(?:[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+)(?<year>\d{4})\s+(?<month>\w+)\s+(?<day>\d{1,2})\s+(?<event_time>\d\d:\d\d:\d\d)\s+(?<username>\S+)\s+(?<client_ip>\d{1,3}(?:\.\d{1,3}){3}):(?<client_port>\d+)\s+(?<virtual_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<server_ip>\d{1,3}(?:\.\d{1,3}){3})\s+(?<bytes_in>\d+)\s+(?<bytes_out>\d+)\s+(?<protocol>TCP|UDP)\s+(?<vpn_start>\d{4}-\d{2}-\d{2},\d\d:\d\d:\d\d)\s+(?<vpn_stop>\d{4}-\d{2}-\d{2},\d\d:\d\d:\d\d)$
FORMAT = log_type::vpn_traffic

[pg_vpnevent]

REGEX = ^(?:[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+)(?<year>\d{4})\s+(?<month>\w+)\s+(?<day>\d{1,2})\s+(?<event_time>\d\d:\d\d:\d\d)\s+(?<event_id>\d+)\s+(?<vpn_category>IPsec|VPNSSL|PPTP)\s+(?<message>.+)$
FORMAT = log_type::vpn_event


[pg_users]

REGEX = ^(?:[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+)(?<year>\d{4})\s+(?<month>\w+)\s+(?<day>\d{1,2})\s+(?<event_time>\d\d:\d\d:\d\d)\s+(?<event_type>Auth_Info|Auth_Alert|Acc_Info)\s+(?<message>.+)$
FORMAT = log_type::users


[pg_event]

REGEX = ^(?:[A-Z][a-z]{2}\s+\d+\s+\d\d:\d\d:\d\d\s+\d{1,3}(?:\.\d{1,3}){3}\s+)(?<year>\d{4})\s+(?<month>\w+)\s+(?<day>\d{1,2})\s+(?<event_time>\d\d:\d\d:\d\d)\s+(?<message>(?:SUCCESS:|LOGOUT:|User\s).+)$
FORMAT = log_type::event


