[id]
name = SA_sideview_webex
version = 0.6.1
#splunkbase_id = 8429

[ui]
is_visible = 1
label = Supporting App for Webex
supported_themes = light, dark

[launcher]
author = Sideview, LLC
description = This Supporting App is designed for use in conjunction with Sideview's commercial app for CUCM data -- "Cisco CDR Reporting and Analytics" which is available as a free 60 day trial.
version = 0.6.1

[package]
id = SA_sideview_webex
check_for_updates = 1
show_upgrade_notification = 1

[install]
build = 28

[shclustering]
deployer_lookups_push_mode = always_preserve

[triggers]
reload.sideview_data_types = access_endpoints /admin/conf-sideview_data_types

# it is an open question whether this is still needed.  Although it's not formally deprecated, it does
# seem redundant with other newer keys and I don't think appinspect checks for it.
[author=sideview]
email = info@sideviewapps.com
company = Sideview, LLC
