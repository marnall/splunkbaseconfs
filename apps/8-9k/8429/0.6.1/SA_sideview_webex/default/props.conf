

[cisco:webex:meetings]
TRANSFORMS = webex_qualities_call_id
TRUNCATE = 20000

EVAL-callingPartyName = hostDisplayName
EVAL-meetingDuration = round(round(strptime(end, "%Y-%m-%dT%H:%M:%SZ") - strptime(start, "%Y-%m-%dT%H:%M:%SZ"),2))

#deleteme after a while, as this is an ingest_eval now
#EVAL-call_id=case(isnotnull(id),id,isnotnull(meetingInstanceId),substr(meetingInstanceId,0,32))

EVAL-minute_of_hour = strftime(_time,"%M")
EVAL-hour_of_day = strftime(_time,"%H")
EVAL-day_of_week = strftime(_time,"%a")
EVAL-day_of_month= strftime(_time,"%d")
EVAL-day_of_year = strftime(_time,"%j")
EVAL-month_of_year = strftime(_time,"%B")

EVAL-type = "meeting"
EVAL-data_type = "webex"



[cisco:webex:meeting:qualities]
TRANSFORMS = webex_qualities_call_id
TRUNCATE = 40000

EVAL-duration = strptime(leaveTime, "%Y-%m-%dT%H:%M:%S") - strptime(joinTime, "%Y-%m-%dT%H:%M:%S")
EVAL-callingPartyName =  webexUserName
EVAL-origIpAddr = maskedPublicIP
EVAL-origDeviceName = hardwareType

EVAL-minute_of_hour = strftime(_time,"%M")
EVAL-hour_of_day = strftime(_time,"%H")
EVAL-day_of_week = strftime(_time,"%a")
EVAL-day_of_month= strftime(_time,"%d")
EVAL-day_of_year = strftime(_time,"%j")
EVAL-month_of_year = strftime(_time,"%B")

EVAL-type = "meeting"
EVAL-data_type = "webex"

#deleteme after a while, as this is an ingest_eval now
EVAL-call_id = case(isnotnull(meetingInstanceId),meetingInstanceId,isnotnull(id),id)



[cisco:webex:call:detailed_history]
TRUNCATE=40000
TRANSFORMS = webex_detailed_history_call_id

EVAL-minute_of_hour = strftime(_time,"%M")
EVAL-hour_of_day = strftime(_time,"%H")
EVAL-day_of_week = strftime(_time,"%a")
EVAL-day_of_month= strftime(_time,"%d")
EVAL-day_of_year = strftime(_time,"%j")
EVAL-month_of_year = strftime(_time,"%B")

EVAL-type = "call"
EVAL-data_type = "webex"
#remove after a while, as it shadows the INGEST_EVAL in transforms.
EVAL-call_id = coalesce('Network call ID', 'Local call ID')

