[admin:TA_whisper_security_configuration]
match = /
members = TA_whisper_security_account, TA_whisper_security_settings

[admin:TA_whisper_security_inputs]
match = /
members = TA_whisper_security_whisper_baseline, TA_whisper_security_whisper_health, TA_whisper_security_whisper_multitenant, TA_whisper_security_whisper_threat_intel, TA_whisper_security_whisper_watchlist

[admin_external:TA_whisper_security_account]
handlertype = python
python.version = python3
handlerfile = TA_whisper_security_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_whisper_security_settings]
handlertype = python
python.version = python3
handlerfile = TA_whisper_security_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

