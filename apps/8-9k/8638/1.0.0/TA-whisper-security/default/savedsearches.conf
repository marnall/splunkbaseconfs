[Whisper - Infrastructure Pivot Detection]
description = Detects internal hosts communicating with domains that share IP infrastructure with known threat-listed domains, using the Whisper graph to identify domain-to-IP-to-sibling-domain pivot patterns. Generates risk events with MITRE ATT&CK T1584 annotation.
disabled = 1
cron_schedule = 0 */4 * * *
search = | tstats summariesonly=t count \
    from datamodel=Network_Resolution \
    where DNS.query=* \
    by DNS.query, DNS.src \
    | rename "DNS.*" AS * \
    | dedup query \
    | lookup whisper_enrichment_cache indicator AS query OUTPUT enrichment_data \
    | where isnotnull(enrichment_data) \
    | spath input=enrichment_data output=whisper_ip path=ip \
    | spath input=enrichment_data output=whisper_cohost_count path=cohost_count \
    | spath input=enrichment_data output=whisper_threat_score path=threat_score \
    | spath input=enrichment_data output=whisper_is_threat path=is_threat \
    | where isnotnull(whisper_ip) AND (whisper_is_threat="true" OR whisper_threat_score > 0) \
    | eval risk_score=case( \
        whisper_threat_score >= 80, 55, \
        whisper_threat_score >= 50, 40, \
        whisper_threat_score >= 20, 30, \
        1=1, 25) \
    | eval risk_object=src \
    | eval risk_object_type="system" \
    | eval risk_message="Domain ".query." resolves to ".whisper_ip." which is associated with threat infrastructure (threat_score=".whisper_threat_score.", cohosted_domains=".whisper_cohost_count.")" \
    | eval threat_object=query \
    | eval threat_object_type="domain" \
    | eval search_name="Whisper - Infrastructure Pivot Detection" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1584\",\"technique\":\"Compromise Infrastructure\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -4h
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = src
action.risk.param._risk_object_type = system
action.risk.param._risk_score = 40

