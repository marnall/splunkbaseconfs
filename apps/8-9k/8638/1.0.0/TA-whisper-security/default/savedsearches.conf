        whisper_rp_threat_score >= 80, 70, \
        whisper_rp_threat_score >= 50, 55, \
        1=1, 45) \
    | eval risk_object=domain \
    | eval risk_object_type="other" \
    | eval risk_message="Prefix-level threat for ".domain." (IP: ".whisper_ip."): ".prefix_threat_type." — AP score: ".whisper_ap_threat_score.", RP score: ".whisper_rp_threat_score \
    | eval threat_object=whisper_ip \
    | eval threat_object_type="ip_address" \
    | eval search_name="Whisper - Prefix-Level Threat Detection" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1583\",\"technique\":\"Acquire Infrastructure\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = domain
action.risk.param._risk_object_type = other
action.risk.param._risk_score = 60

[Whisper - HOSTNAME Direct Threat Properties]
description = Uses HOSTNAME-level threat properties directly from the graph (previously only IPV4 threat data was used). Detects domains flagged as spam, proxy, VPN, or with elevated threat scores. Generates risk events with MITRE ATT&CK T1583 annotation.
disabled = 1
cron_schedule = */15 * * * *
search = `whisper_index` sourcetype="whisper:enrichment" (whisper_hostname_threat_level="high" OR whisper_hostname_threat_level="critical" OR whisper_hostname_is_spam="true" OR whisper_hostname_is_proxy="true" OR whisper_hostname_is_vpn="true") \
    | eval threat_categories=mvappend( \
        if(whisper_hostname_is_spam="true", "spam", null()), \
        if(whisper_hostname_is_proxy="true", "proxy", null()), \
        if(whisper_hostname_is_vpn="true", "vpn", null())) \
    | eval risk_score=case( \
        whisper_hostname_threat_level="critical", 80, \
        whisper_hostname_threat_level="high", 60, \
        whisper_hostname_threat_score >= 50, 50, \
        1=1, 40) \
    | eval risk_object=domain \
    | eval risk_object_type="other" \
    | eval risk_message="HOSTNAME threat properties for ".domain.": level=".whisper_hostname_threat_level.", score=".whisper_hostname_threat_score.", categories=".mvjoin(threat_categories, ",") \
    | eval threat_object=domain \
    | eval threat_object_type="domain" \
    | eval search_name="Whisper - HOSTNAME Direct Threat Properties" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1583\",\"technique\":\"Acquire Infrastructure\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = domain
action.risk.param._risk_object_type = other
action.risk.param._risk_score = 60

[Whisper - Suspicious Web Link Profile]
description = Detects domains linked only by suspicious/malicious domains, or with no legitimate inbound web links (isolation indicator). Uses web link graph enrichment from #361 (HOSTNAME->LINKS_TO->HOSTNAME — 10.8B edges). Generates risk events with MITRE ATT&CK T1584 annotation.
disabled = 1
cron_schedule = 0 */6 * * *
search = `whisper_index` sourcetype="whisper:enrichment" whisper_link_count=* \
    | where (whisper_suspicious_link_count > 0 AND whisper_inbound_links=0) OR (whisper_suspicious_link_count > 3) \
    | dedup domain sortby -_time \
    | eval risk_score=case( \
        whisper_suspicious_link_count > 3 AND whisper_inbound_links=0, 65, \
        whisper_suspicious_link_count > 3, 50, \
        whisper_inbound_links=0, 40, \
        1=1, 35) \
    | eval risk_object=domain \
    | eval risk_object_type="other" \
    | eval risk_message="Suspicious web link profile for ".domain.": suspicious_links=".whisper_suspicious_link_count.", inbound=".whisper_inbound_links.", total=".whisper_link_count \
    | eval threat_object=domain \
    | eval threat_object_type="domain" \
    | eval search_name="Whisper - Suspicious Web Link Profile" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1584\",\"technique\":\"Compromise Infrastructure\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -6h
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = domain
action.risk.param._risk_object_type = other
action.risk.param._risk_score = 50

# ─── Event-Based KV Store Population ─────────────────────────────────
# These saved searches populate KV Store collections from events written
# by the modular inputs. This event-based architecture ensures inputs
# work on Splunk Cloud Classic Experience (IDM) where inputs cannot
# access KV Store directly. Enable these searches after enabling the
# corresponding modular inputs.

[Whisper - Populate IP Threat Intel KV Store]
description = Reads threat intel events with record_type=ip_intel and populates the whisper_ip_intel KV Store collection via outputlookup. Enable this after enabling the Whisper ES Threat Intel Feed input.
disabled = 1
cron_schedule = 15 */6 * * *
search = `whisper_index` sourcetype="whisper:threat_intel" record_type="ip_intel" \
    | dedup ip sortby -_time \
    | eval _key=ip."|whisper" \
    | table _key, ip, threat_collection_name, threat_collection_key, description, threat_key, threat_group, weight, whisper_asn, whisper_asn_name, whisper_country, whisper_prefix, whisper_risk_score, whisper_risk_level, whisper_threat_score, whisper_threat_level \
    | outputlookup whisper_ip_intel
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 0
is_visible = true

