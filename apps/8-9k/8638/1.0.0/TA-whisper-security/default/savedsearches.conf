[Whisper - Fast Flux Domain Detection]
description = Detects domains resolving to an unusually high number of distinct IPs within a short time window, indicative of fast-flux DNS techniques used by botnets and C2 infrastructure. Generates risk events with MITRE ATT&CK T1568.001 annotation.
disabled = 1
cron_schedule = */30 * * * *
search = | tstats summariesonly=t dc(DNS.reply) AS distinct_ips count \
    from datamodel=Network_Resolution \
    where DNS.query=* DNS.reply=* \
    by DNS.query, DNS.src \
    | rename "DNS.*" AS * \
    | where distinct_ips >= `whisper_fast_flux_ip_threshold` \
    | lookup whisper_enrichment_cache indicator AS query OUTPUT enrichment_data \
    | where isnotnull(enrichment_data) \
    | spath input=enrichment_data output=whisper_asn path=asn \
    | lookup whisper_cdn_asns asn AS whisper_asn OUTPUT provider AS cdn_provider \
    | where isnull(cdn_provider) \
    | eval risk_score=45 \
    | eval risk_object=src \
    | eval risk_object_type="system" \
    | eval risk_message="Domain ".query." exhibits fast-flux behavior with ".distinct_ips." distinct IPs on non-CDN infrastructure" \
    | eval threat_object=query \
    | eval threat_object_type="domain" \
    | eval search_name="Whisper - Fast Flux Domain Detection" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1568.001\",\"technique\":\"Dynamic Resolution: Fast Flux DNS\",\"tactic\":[\"command-and-control\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -30m
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = src
action.risk.param._risk_object_type = system
action.risk.param._risk_score = 45

[Whisper - Domain Typosquatting Detection]
description = Identifies domains in DNS traffic that closely resemble monitored organizational domains, indicating potential typosquatting or homoglyph attacks. Compares against the whisper_dns_baseline collection for monitored domains. Generates risk events with MITRE ATT&CK T1584.001 annotation.
disabled = 1
cron_schedule = 0 */6 * * *
search = | tstats summariesonly=t count \
    from datamodel=Network_Resolution \
    where DNS.query=* \
    by DNS.query, DNS.src \
    | rename "DNS.*" AS * \
    | dedup query \
    | inputlookup append=t whisper_dns_baseline \
    | eval monitored_domain=domain \
    | fields query, src, monitored_domain \
    | where isnotnull(query) AND isnotnull(monitored_domain) \
    | eval query_len=len(query), monitored_len=len(monitored_domain) \
    | where abs(query_len - monitored_len) <= 2 AND query != monitored_domain \
    | where like(query, "%" . substr(monitored_domain, 1, 3) . "%") \
    | lookup whisper_enrichment_cache indicator AS query OUTPUT enrichment_data \
    | where isnotnull(enrichment_data) \
    | eval risk_score=40 \
    | eval risk_object=src \
    | eval risk_object_type="system" \
    | eval risk_message="Potential typosquatting: domain ".query." closely resembles monitored domain ".monitored_domain \
    | eval threat_object=query \
    | eval threat_object_type="domain" \
    | eval search_name="Whisper - Domain Typosquatting Detection" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1584.001\",\"technique\":\"Compromise Infrastructure: Domains\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -6h
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = src
action.risk.param._risk_object_type = system
action.risk.param._risk_score = 40

