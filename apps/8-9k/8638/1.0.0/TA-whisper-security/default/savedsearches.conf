[Whisper - Domain Parking and Sinkhole Detection]
description = Detects DNS queries for domains identified as parked or sinkholed in Whisper enrichment data. Parked domains resolving to unexpected IPs or flagged as sinkholed may indicate compromised or abandoned infrastructure being repurposed. Generates risk events with MITRE ATT&CK T1584.001 annotation.
disabled = 1
cron_schedule = 0 */6 * * *
search = | tstats summariesonly=t count \
    from datamodel=Network_Resolution \
    where DNS.query=* \
    by DNS.query, DNS.src \
    | rename "DNS.*" AS * \
    | dedup query \
    | lookup whisper_enrichment_cache indicator AS query OUTPUT enrichment_data \
    | where isnotnull(enrichment_data) \
    | spath input=enrichment_data output=whisper_is_parked path=is_parked \
    | spath input=enrichment_data output=whisper_is_sinkholed path=is_sinkholed \
    | spath input=enrichment_data output=whisper_ip path=ip \
    | where whisper_is_parked="true" OR whisper_is_sinkholed="true" \
    | eval detection_type=case( \
        whisper_is_sinkholed="true", "sinkholed", \
        whisper_is_parked="true", "parked", \
        1=1, "unknown") \
    | eval risk_score=case( \
        detection_type="sinkholed", 45, \
        detection_type="parked", 20, \
        1=1, 15) \
    | eval risk_object=src \
    | eval risk_object_type="system" \
    | eval risk_message="Host ".src." queried ".detection_type." domain ".query." (resolves to ".whisper_ip.")" \
    | eval threat_object=query \
    | eval threat_object_type="domain" \
    | eval search_name="Whisper - Domain Parking and Sinkhole Detection" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1584.001\",\"technique\":\"Compromise Infrastructure: Domains\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -6h
dispatch.latest_time = now
