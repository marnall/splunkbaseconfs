[Whisper - Newly Observed Domain Communication]
description = Detects internal hosts communicating with domains first seen in the Whisper enrichment cache within a configurable time window. New domains in network traffic often indicate phishing, C2, or DGA activity. Generates risk events with MITRE ATT&CK T1583.001 annotation.
disabled = 1
cron_schedule = */15 * * * *
search = | tstats summariesonly=t count \
    from datamodel=Network_Resolution \
    where DNS.query=* \
    by DNS.query, DNS.src \
    | rename "DNS.*" AS * \
    | lookup whisper_enrichment_cache indicator AS query OUTPUT enrichment_data, cached_at \
    | where isnotnull(enrichment_data) \
    | eval now_epoch=now() \
    | eval age_hours=(now_epoch - cached_at) / 3600 \
    | where age_hours <= `whisper_newly_observed_domain_age_hours` \
    | eval risk_score=35 \
    | eval risk_object=src \
    | eval risk_object_type="system" \
    | eval risk_message="Host ".src." communicated with newly observed domain ".query." (first seen ".round(age_hours, 1)." hours ago)" \
    | eval threat_object=query \
    | eval threat_object_type="domain" \
    | eval search_name="Whisper - Newly Observed Domain Communication" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1583.001\",\"technique\":\"Acquire Infrastructure: Domains\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = src
action.risk.param._risk_object_type = system
action.risk.param._risk_score = 35

