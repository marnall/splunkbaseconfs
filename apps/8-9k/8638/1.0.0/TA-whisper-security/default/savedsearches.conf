[Whisper - Evict Expired Cache Entries]
description = Remove expired entries from the Whisper enrichment cache KV Store collection using the KV Store REST API. More efficient than inputlookup/outputlookup for large caches. Runs hourly when enabled.
disabled = 1
cron_schedule = 0 * * * *
search = | whisperevict
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 0
is_visible = true

# ─── Correlation Searches ──────────────────────────────────────────────

[Whisper - Bulletproof ASN Communication Detection]
description = Detects internal hosts communicating with IPs on known bulletproof hosting ASNs via Whisper enrichment data. Generates risk events with MITRE ATT&CK T1583 annotation.
disabled = 1
cron_schedule = */15 * * * *
search = | tstats summariesonly=t count values(All_Traffic.dest_ip) AS dest_ip \
    from datamodel=Network_Traffic \
    where All_Traffic.dest_ip=* \
    by All_Traffic.src, All_Traffic.dest_ip, All_Traffic.action \
    | rename "All_Traffic.*" AS * \
    | lookup whisper_enrichment_cache indicator AS dest_ip OUTPUT enrichment_data \
    | where isnotnull(enrichment_data) \
    | spath input=enrichment_data output=whisper_asn path=asn \
    | spath input=enrichment_data output=whisper_asn_name path=asn_name \
    | spath input=enrichment_data output=whisper_country path=country \
    | lookup whisper_high_risk_asns asn AS whisper_asn OUTPUT description AS asn_risk_description \
    | where isnotnull(asn_risk_description) \
    | eval risk_score=`whisper_bulletproof_risk_score` \
    | eval risk_object=src \
    | eval risk_object_type="system" \
    | eval risk_message="Host ".src." communicated with ".dest_ip." on bulletproof ASN ".whisper_asn." (".whisper_asn_name.") [".whisper_country."]" \
    | eval threat_object=dest_ip \
    | eval threat_object_type="ip_address" \
    | eval search_name="Whisper - Bulletproof ASN Communication Detection" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1583\",\"technique\":\"Acquire Infrastructure\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = src
action.risk.param._risk_object_type = system
action.risk.param._risk_score = 60

[Whisper - Shared Nameserver with Threat Infrastructure]
description = Identifies domains accessed by internal hosts that share nameservers with known threat infrastructure. Excludes major DNS providers. Generates risk events with MITRE ATT&CK T1584 annotation.
disabled = 1
cron_schedule = 0 */4 * * *
search = | tstats summariesonly=t count \
    from datamodel=Network_Resolution \
    where DNS.query=* \
    by DNS.query, DNS.src \
    | rename "DNS.*" AS * \
    | dedup query \
    | lookup whisper_enrichment_cache indicator AS query OUTPUT enrichment_data \
    | where isnotnull(enrichment_data) \
    | spath input=enrichment_data output=whisper_nameservers path=nameservers{} \
    | spath input=enrichment_data output=whisper_ns_shared_domains path=ns_shared_domains{} \
    | spath input=enrichment_data output=whisper_ns_threat_feeds path=ns_threat_feeds \
    | where isnotnull(whisper_ns_threat_feeds) \
    | lookup whisper_dns_providers nameserver_pattern AS whisper_nameservers OUTPUT provider AS dns_provider \
    | where isnull(dns_provider) \
    | eval risk_score=case( \
        like(whisper_ns_threat_feeds, "%c2%"), 50, \
        like(whisper_ns_threat_feeds, "%malware%"), 30, \
        like(whisper_ns_threat_feeds, "%phishing%"), 20, \
        1=1, 20) \
    | eval risk_object=src \
    | eval risk_object_type="system" \
    | eval risk_message="Domain ".query." shares nameserver with threat infrastructure (".whisper_ns_threat_feeds.")" \
    | eval threat_object=query \
    | eval threat_object_type="domain" \
    | eval search_name="Whisper - Shared Nameserver with Threat Infrastructure" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1584\",\"technique\":\"Compromise Infrastructure\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -4h
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = src
action.risk.param._risk_object_type = system
action.risk.param._risk_score = 50

[Whisper - DNS Infrastructure Change Detection]
description = Detects unexpected DNS infrastructure changes for monitored domains by comparing current Whisper data against baseline snapshots. Requires attack surface monitoring input (whisper_dns_baseline collection). Generates risk events with MITRE ATT&CK T1584 annotation.
disabled = 1
cron_schedule = 0 */6 * * *
search = | inputlookup whisper_dns_baseline \
    | join type=left domain \
        [| inputlookup whisper_enrichment_cache \
         | where indicator_type="domain" \
         | spath input=enrichment_data output=current_ns path=nameservers{} \
         | spath input=enrichment_data output=current_ip path=ip \
         | spath input=enrichment_data output=current_asn path=asn \
         | rename indicator AS domain \
         | fields domain, current_ns, current_ip, current_asn] \
    | where (baseline_ns!=current_ns) OR (baseline_ip!=current_ip) \
    | eval change_type=case( \
        baseline_ns!=current_ns, "ns_change", \
        baseline_ip!=current_ip, "a_record_change", \
        1=1, "unknown") \
    | eval risk_score=case( \
        change_type="ns_change", 40, \
        change_type="a_record_change", 30, \
        1=1, 20) \
    | eval old_value=case( \
        change_type="ns_change", baseline_ns, \
        change_type="a_record_change", baseline_ip, \
        1=1, "unknown") \
    | eval new_value=case( \
        change_type="ns_change", current_ns, \
        change_type="a_record_change", current_ip, \
        1=1, "unknown") \
    | eval risk_object=domain \
    | eval risk_object_type="other" \
    | eval risk_message="DNS infrastructure change detected for ".domain.": ".change_type." from ".old_value." to ".new_value \
    | eval threat_object=domain \
    | eval threat_object_type="domain" \
    | eval search_name="Whisper - DNS Infrastructure Change Detection" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1584\",\"technique\":\"Compromise Infrastructure\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -6h
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = domain
action.risk.param._risk_object_type = other
action.risk.param._risk_score = 40

[Whisper - Low Co-Hosting Density Anomaly]
description = Flags internal hosts communicating with IPs that have abnormally low co-hosting density (1-3 domains) on non-CDN ASNs, indicating dedicated attacker infrastructure. Generates risk events with MITRE ATT&CK T1583 annotation.
disabled = 1
cron_schedule = */30 * * * *
search = | tstats summariesonly=t count \
    from datamodel=Network_Traffic \
    where All_Traffic.dest_ip=* \
    by All_Traffic.src, All_Traffic.dest_ip \
    | rename "All_Traffic.*" AS * \
    | lookup whisper_enrichment_cache indicator AS dest_ip OUTPUT enrichment_data \
    | where isnotnull(enrichment_data) \
    | spath input=enrichment_data output=whisper_cohost_count path=cohost_count \
    | spath input=enrichment_data output=whisper_asn path=asn \
    | spath input=enrichment_data output=whisper_asn_name path=asn_name \
    | where isnotnull(whisper_cohost_count) AND whisper_cohost_count>=1 AND whisper_cohost_count<=`whisper_low_cohosting_max` \
    | lookup whisper_cdn_asns asn AS whisper_asn OUTPUT provider AS cdn_provider \
    | where isnull(cdn_provider) \
    | eval risk_score=25 \
    | eval risk_object=src \
    | eval risk_object_type="system" \
    | eval risk_message="Host ".src." communicated with ".dest_ip." which has low co-hosting density (".whisper_cohost_count." domains) on non-CDN ASN ".whisper_asn." (".whisper_asn_name.")" \
    | eval threat_object=dest_ip \
    | eval threat_object_type="ip_address" \
    | eval search_name="Whisper - Low Co-Hosting Density Anomaly" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1583\",\"technique\":\"Acquire Infrastructure\",\"tactic\":[\"resource-development\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -30m
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = src
action.risk.param._risk_object_type = system
action.risk.param._risk_score = 25

[Whisper - BGP Prefix Conflict Detection]
description = Detects BGP prefix conflicts where organizational prefixes are also announced by unexpected ASNs, indicating potential BGP hijacking. Requires organizational ASN list in whisper_org_asns.csv lookup. Generates risk events with MITRE ATT&CK T1599 annotation.
disabled = 1
cron_schedule = 0 */4 * * *
# NOTE: The $our_asn$ token is interpolated by Splunk's | map command before
# the Cypher query reaches whisperquery. Parameterized Cypher (via the API
# "parameters" field) is not feasible here because | map performs its own
# string substitution. Risk is mitigated because $our_asn$ values originate
# exclusively from the admin-controlled whisper_org_asns.csv lookup, which
# is not user-editable at search time. ASN values are also constrained to
# the format "AS[0-9]+" by convention. See issue #235.
search = | inputlookup whisper_org_asns \
    | fields asn \
    | rename asn AS our_asn \
    | map maxsearches=100 search="| whisperquery query=\"MATCH (a:ASN {name: '$our_asn$'})-[:ROUTES]->(p:ANNOUNCED_PREFIX)-[:CONFLICTS_WITH]->(conflict:ANNOUNCED_PREFIX)<-[:ROUTES]-(other:ASN) WHERE other.name <> '$our_asn$' OPTIONAL MATCH (other)-[:HAS_NAME]->(n:ASN_NAME) RETURN '$our_asn$' AS our_asn, p.name AS our_prefix, conflict.name AS conflicting_prefix, other.name AS conflicting_asn, n.name AS asn_name LIMIT 50\"" \
    | where isnotnull(our_prefix) \
    | eval risk_score=`whisper_bgp_conflict_risk_score` \
    | eval risk_object=our_prefix \
    | eval risk_object_type="other" \
    | eval risk_message="BGP prefix conflict: prefix ".our_prefix." conflicts with ".conflicting_prefix." announced by ".conflicting_asn." (".asn_name.")" \
    | eval threat_object=conflicting_asn \
    | eval threat_object_type="domain" \
    | eval search_name="Whisper - BGP Prefix Conflict Detection" \
    | eval annotations="{\"mitre_attack\":[{\"technique_id\":\"T1599\",\"technique\":\"Network Boundary Bridging\",\"tactic\":[\"defense-evasion\"]}]}" \
    | collect index=risk source="whisper_security" sourcetype="stash"
dispatch.earliest_time = -4h
dispatch.latest_time = now
enableSched = 0
is_visible = true
action.risk = 1
action.risk.param._risk_object = our_prefix
action.risk.param._risk_object_type = other
action.risk.param._risk_score = 75

