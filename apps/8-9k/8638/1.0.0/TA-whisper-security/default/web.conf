[expose:TA_whisper_security_settings_specified]
pattern = TA_whisper_security_settings/*
methods = POST, GET, DELETE

[expose:TA_whisper_security_whisper_health]
pattern = TA_whisper_security_whisper_health
methods = POST, GET

[expose:TA_whisper_security_whisper_health_specified]
pattern = TA_whisper_security_whisper_health/*
methods = POST, GET, DELETE

[expose:TA_whisper_security_whisper_threat_intel]
pattern = TA_whisper_security_whisper_threat_intel
methods = POST, GET

[expose:TA_whisper_security_whisper_threat_intel_specified]
pattern = TA_whisper_security_whisper_threat_intel/*
methods = POST, GET, DELETE

[expose:TA_whisper_security_whisper_baseline]
pattern = TA_whisper_security_whisper_baseline
methods = POST, GET

[expose:TA_whisper_security_whisper_baseline_specified]
pattern = TA_whisper_security_whisper_baseline/*
methods = POST, GET, DELETE

[expose:TA_whisper_security_whisper_watchlist]
pattern = TA_whisper_security_whisper_watchlist
