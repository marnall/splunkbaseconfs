[expose:TA_whisper_security_account]
pattern = TA_whisper_security_account
methods = POST, GET

[expose:TA_whisper_security_account_specified]
pattern = TA_whisper_security_account/*
methods = POST, GET, DELETE

[expose:TA_whisper_security_settings]
pattern = TA_whisper_security_settings
