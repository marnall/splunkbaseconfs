[Whisper Infrastructure Threat Detection]
category = Abuse
creation_date = 2026-03-01
description = Detects communication with suspicious infrastructure using Whisper Security's Knowledge Graph data. Provides 29 correlation searches across DNS intelligence, infrastructure pivoting, network/BGP intelligence, threat intel correlation, and graph utilization — delivering immediate time-to-value for SOC teams.
last_updated = 2026-04-03
version = 3
narrative = This analytic story leverages Whisper Security's Internet infrastructure graph (3.67B nodes, 30.8B edges) to identify threats that traditional reputation-based detection misses. It includes 29 correlation searches organized in five categories:\n\n**DNS/Infrastructure Intelligence:** Bulletproof ASN Communication, Shared Nameserver with Threat Infrastructure, DNS Infrastructure Change Detection, Newly Observed Domain Communication, Suspicious CNAME Chain Depth, Fast Flux Domain Detection, and Domain Typosquatting Detection.\n\n**Infrastructure Pivot Detection:** Low Co-Hosting Density Anomaly, Infrastructure Pivot Detection, Shared Hosting with Known Threat Infrastructure, Domain Parking and Sinkhole Detection, and Mail Server Infrastructure Change.\n\n**Network/BGP Intelligence:** BGP Prefix Conflict Detection, Shadow IT DNS Provider Detection, Unauthorized Subdomain Detection, ASN Migration Detection, and Nameserver Delegation Change.\n\n**Threat Intel Correlation:** Multi-Feed Threat IP Communication, Newly Registered Domain Resolution, and TOR Exit Node Communication.\n\n**Graph Utilization (#361):** Impossible Travel Detection, WHOIS Contact Correlation, BGP Hijack Detection, Registrar Change Detection, Newly Registered Domain Risk, Privacy-Proxied WHOIS Alert, Prefix-Level Threat Detection, HOSTNAME Direct Threat Properties, and Suspicious Web Link Profile.\n\nAll searches are disabled by default and generate risk events compatible with Splunk ES's Risk-Based Alerting framework with MITRE ATT&CK annotations. Each search has configurable thresholds via macros for environment-specific tuning.
