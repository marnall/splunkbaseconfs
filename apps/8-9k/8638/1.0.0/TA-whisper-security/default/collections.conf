#
# KV Store collection definitions for Whisper Security TA
#

[whisper_enrichment_cache]
enforceTypes = true
field.indicator = string
field.indicator_type = string
field.enrichment_data = string
field.cached_at = number
field.ttl_seconds = number
accelerated_fields.indicator_idx = {"indicator": 1, "indicator_type": 1}

[whisper_precomputed_enrichment]
enforceTypes = true
field.indicator = string
field.indicator_type = string
field.enrichment_data = string
field.enriched_at = number
