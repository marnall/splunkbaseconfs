#
# Splunk app configuration for TA-whisper-security
#

[install]
is_configured = false
state = enabled
build = 1775690744
python.version = python3
python.required = 3.9, 3.13

[ui]
is_visible = true
label = Whisper Security Add-on for Splunk
docs_section_override = AddOns:released
setup_view = configuration
supported_themes = light, dark

[launcher]
author = Whisper Security
version = 1.0.0
description = Technology Add-on for Whisper Security's Knowledge Graph API. Provides IOC enrichment, ad-hoc graph queries, threat intelligence feeds, attack surface monitoring, and compliance dashboards powered by 3.67B+ internet infrastructure nodes.

[package]
id = TA-whisper-security
check_for_updates = 1

[diag]
extension_script = whisper_diag.py

[triggers]
reload.analyticstories = simple
reload.restmap_custom = simple
reload.web_custom = simple
reload.ta_whisper_security_settings = simple
reload.ta_whisper_security_account = simple

[id]
version = 1.0.0
name = TA-whisper-security
