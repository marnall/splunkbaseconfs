#
# Lookup and transform definitions for Whisper Security TA
#

# ─── KV Store Cache Lookups ──────────────────────────────────────────────

[whisper_enrichment_cache]
collection = whisper_enrichment_cache
external_type = kvstore
fields_list = _key, indicator, indicator_type, enrichment_data, cached_at, ttl_seconds

[whisper_precomputed_enrichment]
collection = whisper_precomputed_enrichment
external_type = kvstore
fields_list = _key, indicator, indicator_type, enrichment_data, enriched_at

[whisper_watchlist]
collection = whisper_watchlist
external_type = kvstore
fields_list = _key, indicator, indicator_type, description

# ─── Automatic Lookup Definitions ────────────────────────────────────────
# These provide KV Store-backed lookups for use in props.conf LOOKUP stanzas.
# NOT enabled by default — users must configure per their environment.
# See documentation for example configurations.

[whisper_domain_lookup]
collection = whisper_precomputed_enrichment
external_type = kvstore
fields_list = _key, indicator, indicator_type, enrichment_data, enriched_at
filter = indicator_type="domain"

[whisper_ip_lookup]
collection = whisper_precomputed_enrichment
external_type = kvstore
fields_list = _key, indicator, indicator_type, enrichment_data, enriched_at
filter = indicator_type="ip"

# ─── Correlation Search Lookups ─────────────────────────────────────

[whisper_high_risk_asns]
filename = whisper_high_risk_asns.csv
max_matches = 1

[whisper_dns_providers]
filename = whisper_dns_providers.csv
match_type = WILDCARD(nameserver_pattern)
max_matches = 1

[whisper_cdn_asns]
filename = whisper_cdn_asns.csv
max_matches = 1

[whisper_org_asns]
filename = whisper_org_asns.csv

[whisper_risk_factors]
filename = whisper_risk_factors.csv

[whisper_watchlist_csv]
filename = whisper_watchlist.csv

# ─── Attack Surface Monitoring Lookups ──────────────────────────────────

[whisper_dns_baseline]
collection = whisper_dns_baseline
external_type = kvstore
fields_list = _key, domain, record_type, record_value, collected_at, collection_id, client_id

# ─── ES Threat Intelligence Lookups ──────────────────────────────────────

[whisper_ip_intel]
collection = whisper_ip_intel
external_type = kvstore
fields_list = _key, ip, threat_collection_name, threat_collection_key, description, threat_key, threat_group, weight, whisper_asn, whisper_asn_name, whisper_country, whisper_prefix, whisper_risk_score, whisper_risk_level, whisper_threat_score, whisper_threat_level

[whisper_domain_intel]
collection = whisper_domain_intel
external_type = kvstore
fields_list = _key, domain, threat_collection_name, threat_collection_key, description, threat_key, threat_group, weight, whisper_asn_name, whisper_country, whisper_risk_score, whisper_risk_level, whisper_threat_score, whisper_threat_level
