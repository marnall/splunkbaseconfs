#
# Search assistant syntax definitions for Whisper Security TA
#
# Provides inline help, auto-complete, and syntax validation
# for all custom search commands in the Splunk search bar.
#

[whisperlookup-command]
syntax = whisperlookup field=<field> (type=<type>)? (include_threat_intel=<bool>)? (include_cname=<bool>)? (include_nameserver=<bool>)? (include_feeds=<bool>)? (add_prefix=<string>)? (use_cache=<bool>)?
alias =
shortdesc = Enrich events with Whisper Knowledge Graph data.
description = Streaming search command that enriches events by looking up indicators (domains, IPs) \
    in the Whisper Security Knowledge Graph (3.67B+ nodes, 30.8B+ edges). \
    Returns DNS resolution, hosting infrastructure, threat intelligence, CNAME chains, \
    nameserver details, and threat feed listings. Results are cached in KV Store for performance.
usage = public
example1 = | whisperlookup field=dest_ip type=ip
comment1 = Enrich events by looking up the dest_ip field as an IP address.
example2 = | whisperlookup field=query type=domain include_threat_intel=true include_cname=true
comment2 = Enrich DNS events with full domain context including threat intel and CNAME chains.
tags = enrich lookup whisper graph threat

[whisperlookup-command-type]
syntax = auto | domain | ip

[whisperquery-command]
syntax = whisperquery query=<string> (params=<string>)? (params_b64=<string>)? (max_results=<int>)?
alias =
shortdesc = Execute a Cypher query against the Whisper Knowledge Graph.
description = Generating search command that runs an ad-hoc Cypher query against the Whisper \
    Security Knowledge Graph API. Supports parameterized queries via the params or params_b64 \
    options. Use params_b64 for complex parameter values that contain special characters.
usage = public
example1 = | whisperquery query="MATCH (h:HOSTNAME {name: 'google.com'})-[:RESOLVES_TO]->(ip:IPV4) RETURN ip.name LIMIT 10"
comment1 = Find all IPv4 addresses that google.com resolves to.
example2 = | whisperquery query="MATCH (h:HOSTNAME {name: $domain})-[:CHILD_OF]->(parent) RETURN parent.name" params="domain=example.com"
comment2 = Find the parent domain of example.com using a parameterized query.
tags = query cypher whisper graph

[whisperschema-command]
syntax = whisperschema (mode=<mode>)?
alias =
shortdesc = Retrieve schema information from the Whisper Knowledge Graph.
description = Generating search command that returns schema metadata from the Whisper Knowledge \
    Graph. Modes include: labels (node types), relationships (edge types), properties (property keys), \
    schema (rich schema with descriptions, examples, counts, and best practices), \
    full (combined schema and property keys).
usage = public
example1 = | whisperschema
comment1 = List all node labels in the Whisper Knowledge Graph.
example2 = | whisperschema mode=schema
comment2 = Retrieve the full rich schema with descriptions, examples, and best practices.
tags = schema metadata whisper graph

[whisperschema-command-mode]
syntax = labels | relationships | properties | schema | full

[whisperflush-command]
syntax = whisperflush (collection=<collection>)?
alias =
shortdesc = Flush cached data from Whisper KV Store collections.
description = Generating search command that clears cached enrichment data from Whisper KV Store \
    collections. Use this when you need to force fresh lookups or after configuration changes. \
    Supports flushing the enrichment cache, precomputed enrichment, or all collections.
usage = public
example1 = | whisperflush
comment1 = Flush the default enrichment cache collection.
example2 = | whisperflush collection=all
comment2 = Flush all Whisper KV Store cache collections.
tags = cache flush whisper

[whisperflush-command-collection]
syntax = cache | precomputed | all

[whisperevict-command]
syntax = whisperevict
alias =
shortdesc = Evict expired entries from the Whisper enrichment cache.
description = Generating search command that removes expired entries from the Whisper enrichment \
    cache KV Store collection based on TTL. Uses the KV Store REST API for efficient query-based \
    deletion instead of loading all records through the SPL pipeline. Returns a summary event with \
    eviction statistics including the number of entries removed.
usage = public
example1 = | whisperevict
comment1 = Evict all expired entries from the default enrichment cache collection.
tags = cache evict whisper maintenance
