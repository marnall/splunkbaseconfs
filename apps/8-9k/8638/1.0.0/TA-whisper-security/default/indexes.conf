#
# Index definitions for Whisper Security TA.
#
# The "whisper" index stores all TA event data (attack surface, compliance,
# enrichment, watchlist, health, and threat intel events).
#
# On Splunk Cloud, the admin must create this index via the Cloud console
# before enabling inputs. This file serves as documentation and ensures
# the index exists on Enterprise/on-prem deployments.
#

[whisper]
coldPath = $SPLUNK_DB/whisper/colddb
homePath = $SPLUNK_DB/whisper/db
thawedPath = $SPLUNK_DB/whisper/thaweddb
frozenTimePeriodInSecs = 15552000
repFactor = auto
