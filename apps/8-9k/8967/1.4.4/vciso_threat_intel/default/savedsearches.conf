# Rebuild the KV-store threat-match lookup from the indexed IOCs every 10 minutes.
[vCISO - Rebuild IOC lookup]
search = `vciso_unique` | table value ioc_type threat_type malware verdict source source_name tags created_at | outputlookup vciso_iocs_kv
dispatch.earliest_time = 0
dispatch.latest_time = now
cron_schedule = */10 * * * *
enableSched = 1
is_visible = 0

# Optional alert: a new malware-attributed IOC arrived in the last 15 minutes.
[vCISO - New malware-attributed IOC]
search = `vciso_base` | search malware=* | dedup value | table _time value ioc_type malware threat_type source
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 0
counttype = number of events
relation = greater than
quantity = 0
is_visible = 1
