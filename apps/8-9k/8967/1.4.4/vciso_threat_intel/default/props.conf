# One index (vciso_iocs), one sourcetype per data category so analysts can write
# clean rules per source. All events are JSON.
#
#   vciso:ioc        IOC indicators (public /api/iocs or personal feed)
#   vciso:victim     ransomware leak-site victims
#   vciso:news       security news / threat-intel articles
#   vciso:advisory   advisories + CVEs (category advisory/vulnerability)
#   vciso:darkweb    darkweb-marketplace listings (metadata only)

[vciso:ioc]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 10000
TIME_PREFIX = "created_at"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 30
disabled = false

# The public datasets carry a normalized `event_time`; _time follows it.
[vciso:victim]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 10000
TIME_PREFIX = "event_time"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 30
disabled = false

