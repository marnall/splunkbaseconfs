# KV-store lookup so you can match vCISO IOCs against any data, e.g.
#   ... | lookup vciso_iocs_kv value AS dest_ip OUTPUT ioc_type threat_type malware source
[vciso_iocs_kv]
external_type = kvstore
collection = vciso_iocs
fields_list = value, ioc_type, threat_type, malware, verdict, source, source_name, tags, created_at
