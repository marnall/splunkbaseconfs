# Defaults for the vCISO IOC modular input. feed_key is OPTIONAL:
#   - no key   -> PUBLIC aggregated IOC feed (/api/iocs)
#   - with key -> ONLY your personal feed (/api/feed/<key>)
# Create a named input in Settings -> Data Inputs -> "vCISO Threat Intel Feed",
# or add a stanza like:
#   [vciso_feed://public]            # public IOCs, no key
#   [vciso_feed://mine]              # personal only
#   feed_key = vciso_xxxxxxxx
# Checkpointed so each run only pulls new indicators (first public run backfills).

[vciso_feed]
python.version = python3
interval = 300
index = vciso_iocs
sourcetype = vciso:ioc
feed_url = https://vciso.au
disabled = 0

# PUBLIC community data (no key). One input pulls ransomware victims + news/advisories
# + darkweb-marketplace metadata into the same index. Create a named input, or:
#   [vciso_public://community]
[vciso_public]
python.version = python3
interval = 1800
index = vciso_iocs
sourcetype = vciso:public
base_url = https://vciso.au
window_hours = 72
disabled = 0
