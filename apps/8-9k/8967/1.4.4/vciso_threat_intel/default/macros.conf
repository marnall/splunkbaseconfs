# Base searches per sourcetype. Edit the index here once if you changed it.

# IOC indicators.
[vciso_base]
definition = index=vciso_iocs sourcetype=vciso:ioc

# Deduped one-row-per-indicator view (an IOC can re-appear across pulls).
[vciso_unique]
definition = `vciso_base` | dedup ioc_type, value

# Ransomware leak-site victims.
[vciso_victims]
definition = index=vciso_iocs sourcetype=vciso:victim | dedup victim_name, domain

# Security news / threat-intel.
[vciso_news]
definition = index=vciso_iocs sourcetype=vciso:news | dedup title

# Advisories + CVEs.
[vciso_advisory]
definition = index=vciso_iocs sourcetype=vciso:advisory | dedup title

# Darkweb-marketplace listings (metadata only).
[vciso_markets]
definition = index=vciso_iocs sourcetype=vciso:darkweb | dedup market_name, title
