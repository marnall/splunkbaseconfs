[Suricata - Event Count Anomaly]
action.email = 0
alert.track = 1
cron_schedule = */15 * * * *
description = Detects unusual spikes in Suricata event volume across all indexed Suricata data.
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = `suricata_index` | spath | timechart span=15m count as event_count | anomalydetection event_count

[Suricata - Noisy Source IPs]
action.email = 0
alert.track = 1
cron_schedule = */30 * * * *
description = Finds source IPs with unusually high event counts across all indexed Suricata data.
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = `suricata_index` | spath | eval src=coalesce(src_ip, src, source_ip) | where isnotnull(src) | stats count as event_count by src | eventstats avg(event_count) as avg stdev(event_count) as stdev | where event_count > avg + (2 * stdev) | sort - event_count

[Suricata - Signature Anomalies]
action.email = 0
alert.track = 1
cron_schedule = 0 * * * *
description = Highlights Suricata alert signatures appearing at unusual rates.
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = `suricata_index` | spath | eval signature=coalesce('alert.signature', signature) | where isnotnull(signature) | bucket _time span=1h | stats count as event_count by _time signature | eventstats avg(event_count) as avg stdev(event_count) as stdev by signature | where stdev > 0 AND event_count > avg + (2 * stdev) | sort 0 - _time - event_count