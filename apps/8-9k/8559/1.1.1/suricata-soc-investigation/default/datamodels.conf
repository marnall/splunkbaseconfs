[suricata_alerts]
label = Suricata Alerts
description = Data model for Suricata IDS alerts
acceleration.earliest_time = -1mon
acceleration.max_time = 0

[suricata_alerts.alert]
displayName = Alerts
constraints = index=suricata event_type=alert
fields = src_ip dest_ip src_port dest_port proto alert.signature alert.category alert.severity _time
