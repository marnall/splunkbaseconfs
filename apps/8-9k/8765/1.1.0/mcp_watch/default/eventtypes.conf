#
# MCP-Watch — eventtypes.conf
#
# v1.0: is_mcp_query, is_anti_pattern_query.
# v1.1 P0: is_high_risk_query (HIGH/CRITICAL risk band).
# v1.1 P2+: is_sensitive_access, is_failed_query, is_off_hours_activity, is_wide_time_range.
#

[is_mcp_query]
search = `mcp_audit_searches`

# Any query with at least one anti-pattern flag set. v1.0-compatible (uses
# antipattern_score which mcp_antipattern_check still emits as a flat sum).
[is_anti_pattern_query]
search = eventtype=is_mcp_query | `mcp_antipattern_check` | where antipattern_score > 0

# v1.1 P0 — queries scoring HIGH or CRITICAL on the weighted risk model.
# Use this for governance reporting / dashboards that need a sharper signal
# than "any anti-pattern at all".
[is_high_risk_query]
search = eventtype=is_mcp_query | `mcp_antipattern_check` | `mcp_risk_score` | where risk_band IN ("HIGH", "CRITICAL")
