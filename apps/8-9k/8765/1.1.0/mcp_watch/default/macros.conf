#
# MCP-Watch — macros.conf
#
# All saved searches and dashboards reference the macros below.
# Override these locally if your Cloud or distributed setup uses
# different index names or audit semantics.
#

# --- Cloud-portable index references -----------------------------------------

[audit_index]
definition = index=_audit
iseval = 0

[internal_index]
definition = index=_internal
iseval = 0

# --- MCP user filter ---------------------------------------------------------
# Provided for ad-hoc searches / overrides; the base searches below pull the
# user list from mcp_users.csv directly.

[mcp_user(1)]
args = user
definition = search user=$user$
iseval = 0

# --- Base searches -----------------------------------------------------------
# These are *generating* searches only (no transforming commands), so callers
# may safely append `earliest=`, `latest=`, `user=` etc. Pipe the matching
# extractor (`mcp_spl_extract` / `mcp_rest_path`) afterwards for derived fields.

[mcp_audit_searches]
definition = `audit_index` action=search info=granted [ | inputlookup mcp_users.csv | fields user ]
iseval = 0

[mcp_rest_calls]
definition = `internal_index` sourcetype=splunkd_access [ | inputlookup mcp_users.csv | fields user ]
iseval = 0

# --- Derived-field extractors ------------------------------------------------
# Pipe these immediately after the corresponding base search.

[mcp_spl_extract]
# Robust SPL extraction:
#  1) some Splunk versions wrap the _audit 'search' field in single quotes -> strip them
#  2) drop the leading "search " keyword; also handle generating ("| ...") searches
#  3) strip the MCP server's appended wrapper ("| head N | export add_timestamp=...")
#     so panels show the agent's real SPL.
definition = eval ts=_time | eval _q=trim(search,"'") | rex field=_q "^search\s+(?<spl_body>.*)" | eval spl_body=coalesce(spl_body,_q) | rex field=spl_body mode=sed "s/\s*\|\s*export\b.*$//" | rex field=spl_body mode=sed "s/\s*\|\s*head\s+\d+\s*$//" | eval spl_body=trim(spl_body) | fields - _q
iseval = 0

[mcp_rest_path]
definition = rex field=uri "^(?<uri_path>[^?]+)"
iseval = 0

# --- Anti-pattern annotation -------------------------------------------------
# Adds is_* flags + a flat unweighted `antipattern_score` (kept for v1.0
# backwards compatibility) to the pipeline. Used by alerts, the Quality &
# Hygiene dashboard, and the offenders saved search. Pipe `mcp_risk_score`
# after this macro to get the v1.1 weighted score + risk_band.
#
# v1.1 fixes from v1.0:
#   * is_no_time_bound: previously matched `_time` anywhere in the SPL, so
#     any query that piped `| bin _time` / `| eval x=_time` falsely cleared
#     the flag. Now requires an `earliest=`/`latest=` clause in the SPL
#     itself. Pragmatic for MCP traffic (servers inject earliest/latest);
#     accepts some false positives for picker-driven ad-hoc human searches.
#   * Regexes are case-insensitive ((?i)) so `INDEX=*`, `Earliest=` etc. flag.
# Self-test coverage: `tests`-style fixtures live at lookups/regex_fixtures.csv;
# run the "MCP-Watch - Self-Test - Anti-Pattern Regex" saved search to verify.

[mcp_antipattern_check]
definition = eval is_wildcard_index    = if(match(search, "(?i)index\s*=\s*\*"), 1, 0) \
    | eval is_len_raw           = if(match(search, "(?i)len\(_raw\)"), 1, 0) \
    | eval is_dbinspect_all     = if(match(search, "(?i)dbinspect\s+index\s*=\s*\*"), 1, 0) \
    | eval is_no_time_bound     = if(NOT match(search, "(?i)(earliest\s*=|latest\s*=)"), 1, 0) \
    | eval is_overly_wide_time  = if(match(search, "(?i)earliest\s*=\s*-([3-9][0-9]+d|[1-9][0-9]+w|[1-9]+mon|[1-9]+y)"), 1, 0) \
    | eval is_export_or_delete  = if(match(search, "(?i)\|\s*(outputcsv|outputlookup|collect|sendemail|delete)\b"), 1, 0) \
    | eval antipattern_score = is_wildcard_index + is_len_raw + is_dbinspect_all + is_no_time_bound + is_overly_wide_time + is_export_or_delete
iseval = 0

# --- Risk Score -------------------------------------------------------------
# Consumes the is_* flags from `mcp_antipattern_check` and computes:
#   * risk_weight        — weighted sum of flags
#                          (export_or_delete=15, wildcard=5, dbinspect=4,
#                           wide_time=3, len_raw=1, no_time=0)
#   * is_off_hours       — 1 if _time falls outside 07:00–19:00 (local)
#   * risk_score         — risk_weight + bonuses (off-hours +2, result_count>100k +5);
#                          bonuses only apply when risk_weight > 0 so benign queries
#                          stay at 0.
#   * risk_band          — NONE / LOW / MEDIUM / HIGH / CRITICAL
#                          thresholds:  >=15 CRITICAL, >=8 HIGH, >=3 MEDIUM, >=1 LOW
#   * antipattern_score  — re-aliased to risk_score for callers still on the v1.0 name.
#
# Why `is_export_or_delete` has weight 15 (single fire → CRITICAL):
#   This flag isn't a "sloppy SPL" pattern — it captures *agent intent* to
#   write data out (`| outputcsv`, `| outputlookup`, `| collect`, `| sendemail`)
#   or destroy data (`| delete`). For an MCP agent these commands are almost
#   never legitimate: scheduled exports/backups are owned by humans through
#   saved searches, and `| delete` needs the `delete_by_keyword` capability
#   that an `mcp_agent` role should not have. A single occurrence is worth
#   waking someone up — hence CRITICAL on its own. Pairs with the dedicated
#   alert `MCP-Watch - Alert - Export/Delete Command Used`.
#
# Why `is_no_time_bound` has weight 0:
#   MCP servers pass the search time range as an API parameter (the dispatched
#   `earliest`/`latest` arrive at the search head out-of-band), not inside the
#   SPL text the macro inspects. The flag therefore fires on virtually every
#   MCP query and would saturate the risk score with noise. The flag is still
#   detected and reported in dashboards (transparency), but it does not
#   contribute to risk. If you need to count it in a human-SPL context,
#   override this macro in `local/macros.conf` with weight = 2.
#
# Future: sensitive-index ×2 multiplier (once `sensitive_indexes.csv` ships)
# and a Data Exfiltration signal that consumes result_count separately
# (for the "high-volume raw pull" pattern).

[mcp_risk_score]
definition = eval risk_weight = (is_export_or_delete * 15) + (is_wildcard_index * 5) + (is_dbinspect_all * 4) + (is_overly_wide_time * 3) + (is_no_time_bound * 0) + (is_len_raw * 1) \
    | eval _mcp_hr = tonumber(strftime(_time, "%H")) \
    | eval is_off_hours = if(_mcp_hr < 7 OR _mcp_hr >= 19, 1, 0) \
    | eval _mcp_b_off = if(is_off_hours = 1 AND risk_weight > 0, 2, 0) \
    | eval _mcp_b_res = if(isnotnull(result_count) AND result_count > 100000 AND risk_weight > 0, 5, 0) \
    | eval risk_score = risk_weight + _mcp_b_off + _mcp_b_res \
    | eval risk_band = case(risk_score >= 15, "CRITICAL", risk_score >= 8, "HIGH", risk_score >= 3, "MEDIUM", risk_score >= 1, "LOW", true(), "NONE") \
    | eval antipattern_score = risk_score \
    | fields - _mcp_hr _mcp_b_off _mcp_b_res
iseval = 0

# --- v1.1: broader MCP detection (user-agent based, REST side) ---------------
# v1.0 only saw the official Splunk MCP Server (provenance="MCP:Splunk_MCP_Server")
# attributed to a dedicated user. Custom / community MCP servers and federation
# gateways often (a) carry NO provenance marker, (b) authenticate as a shared
# account (e.g. admin), and (c) appear under a generic client user-agent
# (python-httpx, Go-http-client, ...). This macro catches them on the REST side
# by matching splunkd_access 'useragent' against mcp_user_agents.csv.
#
# Excluded users come from `mcp_excluded_users.csv` (admin, splunk-system-user,
# sidecar_agent-manager, nobody by default). The official MCP Server's own
# credential-unlock / housekeeping REST calls run as `splunk-system-user`
# carrying the same `Splunk_MCP_Server/*` user-agent that real MCP traffic
# uses, so without filtering they would inflate every "detected agent" /
# "active accounts" panel with a phantom user. `admin` is excluded because
# any user with admin role inherits `mcp_tool_execute` and would surface as
# a capability-granted MCP — almost never a real MCP service account. Edit
# the lookup (no code change) to add future Splunk-reserved identities.
#
# Composition note: unlike the v1.0 generating macros above, this one ends in
# transforming commands (`| lookup`, `| where`). Callers MUST pass time bounds
# as dispatch parameters (`earliest_time` / `latest_time` on the search job),
# not by appending `earliest=...` after the macro — that would land after the
# final `| where` and Splunk will reject it as an invalid operator.
[mcp_rest_clients]
definition = `internal_index` sourcetype=splunkd_access NOT [ | inputlookup mcp_excluded_users | fields user ] | lookup mcp_user_agents useragent_pattern AS useragent OUTPUT client_label | where isnotnull(client_label)
iseval = 0

# Infer an MCP "tool" from the REST endpoint when provenance is absent (fallback
# attribution for non-official MCP clients).
#
# Order: most specific first (SAIA sub-actions before generic SAIA catch-all,
# generic SAIA before /storage/collections so SAIA settings reads attribute to
# the SAIA tool rather than generic 'kvstore').
[mcp_rest_tool_infer]
definition = eval inferred_tool = case( \
    match(uri_path,"(?i)Splunk_AI_Assistant_Cloud/generatespl"),"saia_generate_spl", \
    match(uri_path,"(?i)Splunk_AI_Assistant_Cloud/explainspl"),"saia_explain_spl", \
    match(uri_path,"(?i)Splunk_AI_Assistant_Cloud/optimizespl"),"saia_optimize_spl", \
    match(uri_path,"(?i)Splunk_AI_Assistant_Cloud/ask"),"saia_ask_question", \
    match(uri_path,"(?i)Splunk_AI_Assistant_Cloud"),"saia_other", \
    match(uri_path,"(?i)/services/mcp"),"mcp_endpoint", \
    match(uri_path,"(?i)/search/jobs"),"run_query", \
    match(uri_path,"(?i)/search/parser"),"validate_spl", \
    match(uri_path,"(?i)/admin/summarization"),"search_summary", \
    match(uri_path,"(?i)/data/indexes"),"get_indexes/index_info", \
    match(uri_path,"(?i)/server/info"),"get_info", \
    match(uri_path,"(?i)/authentication/current-context"),"auth_check", \
    match(uri_path,"(?i)/authentication/users"),"get_user_list", \
    match(uri_path,"(?i)/saved/searches"),"saved_searches", \
    match(uri_path,"(?i)/storage/collections"),"kvstore", \
    true(),"other")
iseval = 0

# v1.2 — liveness heartbeats. Each MCP (or a sidecar) upserts a fresh last_seen
# into the mcp_heartbeat KV collection. `fresh`=1 means a heartbeat within the
# freshness window (default 120s). Used by the status badge as a TRUE liveness
# signal, decoupled from query activity. Use as a generating macro: `| `mcp_heartbeats``.
[mcp_heartbeats]
definition = inputlookup mcp_heartbeat | eval age_seconds = now() - last_seen | eval fresh = if(age_seconds <= 360, 1, 0)
iseval = 0
