[install]
state = enabled
# is_configured MUST be false in the shipped default/app.conf — Splunkbase
# AppInspect enforces this via `check_that_setup_has_not_been_performed`.
# Splunk flips it to true in local/app.conf after the user completes setup.
# MCP-Watch has no Splunk setup wizard (setup.xml is disabled and config
# happens via the Getting Started dashboard + editing mcp_users.csv), so the
# Apps page will show an "Unconfigured" badge until the user opens the app
# at least once. Trying to suppress that badge by shipping is_configured=true
# is what AppInspect blocks.
is_configured = false
build = 1

[id]
name = mcp_watch
version = 1.1.0

[ui]
is_visible = true
label = MCP-Watch
docs_section_override = Search and Reporting

[launcher]
author = alper keske
description = Zero-dependency visibility and governance for AI agents (MCP servers) operating against Splunk. Surfaces every SPL an MCP user runs, flags anti-patterns, and reports on REST/endpoint usage — using only built-in _audit and _internal data.
version = 1.1.0

[package]
id = mcp_watch
check_for_updates = true

# No restart required: this app ships only search-time knowledge objects
# (macros, transforms, savedsearches, eventtypes, tags, views, nav, lookups)
# which Splunk reloads natively — there is no index-time config, input, or binary.
