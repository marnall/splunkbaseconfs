#
# MCP-Watch — savedsearches.conf  (v1.0 MVP)
#
# Per §13 of the design doc, v1.0 ships:
#   - 4 reports:  Daily Volume, Anti-Pattern Offenders, REST Endpoint Distribution, Top SPLs
#   - 2 alerts:   Wildcard-index, Overly-wide time range
#
# All scheduling is offset (00:05, 00:10, etc.) so the searches don't pile on
# the scheduler at the top of the hour.
#
# Base macros (`mcp_audit_searches`, `mcp_rest_calls`) are generating searches;
# `mcp_spl_extract` / `mcp_rest_path` add the derived fields (spl_body, uri_path).
#

# ============================================================================
# Reports (drive dashboards)
# ============================================================================

[MCP-Watch - Daily Query Volume]
search = `mcp_audit_searches` earliest=-7d@d latest=@d \
    | bin _time span=1d \
    | stats count by _time, user \
    | sort _time user
disabled = 0
enableSched = 1
cron_schedule = 5 0 * * *
dispatch.earliest_time = -7d@d
dispatch.latest_time = @d
description = Daily count of SPL queries each MCP user ran, last 7 days. Powers MCP Overview dashboard.

[MCP-Watch - Anti-Pattern Offenders]
search = `mcp_audit_searches` earliest=-7d \
    | `mcp_spl_extract` \
    | `mcp_antipattern_check` \
    | `mcp_risk_score` \
    | where risk_score > 0 \
    | stats count, \
            sum(risk_score) as score_sum, \
            max(risk_score) as score_max, \
            values(risk_band) as risk_bands, \
            sum(is_wildcard_index) as wildcard_idx_hits, \
            sum(is_dbinspect_all) as dbinspect_all_hits, \
            sum(is_overly_wide_time) as wide_time_hits, \
            sum(is_no_time_bound) as no_time_hits, \
            sum(is_len_raw) as len_raw_hits, \
            sum(is_export_or_delete) as export_or_delete_hits, \
            sum(is_off_hours) as off_hours_hits, \
            values(spl_body) as offending_searches \
      by user \
    | sort - score_sum
disabled = 0
enableSched = 1
cron_schedule = 10 * * * *
dispatch.earliest_time = -7d
dispatch.latest_time = now
description = Per-user weighted risk-score breakdown over 7 days. Includes risk_band values seen, per-pattern hit counts, off-hours hits, and the offending SPL bodies.

[MCP-Watch - REST Endpoint Distribution]
search = `mcp_rest_calls` earliest=-24h \
    | `mcp_rest_path` \
    | stats count by uri_path \
    | sort - count \
    | head 30
disabled = 0
enableSched = 1
cron_schedule = 15 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
description = Top 30 REST endpoints called by MCP users in the last 24h. Maps roughly to MCP tool semantics (search/parser, jobs/export, data/indexes, etc.).

[MCP-Watch - Top SPLs]
search = `mcp_audit_searches` earliest=-24h \
    | `mcp_spl_extract` \
    | stats count, latest(_time) as last_seen by spl_body \
    | eval last_seen = strftime(last_seen, "%Y-%m-%d %H:%M:%S") \
    | sort - count \
    | head 20
disabled = 0
enableSched = 1
cron_schedule = 20 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
description = Top 20 most-frequent MCP SPL bodies in the last 24h.

# ============================================================================
# Alerts
# ============================================================================

[MCP-Watch - Alert - Wildcard Index Used]
search = `mcp_audit_searches` earliest=-15m \
    | `mcp_spl_extract` \
    | `mcp_antipattern_check` \
    | where is_wildcard_index = 1 \
    | table _time, user, spl_body
disabled = 0
enableSched = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert.track = 1
alert.severity = 4
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 30m
description = Fires when an MCP user runs a search containing index=*. High severity — index=* is one of the most expensive query anti-patterns and almost always unintended.
counttype = number of events
quantity = 0
relation = greater than

[MCP-Watch - Alert - Overly Wide Time Range]
search = `mcp_audit_searches` earliest=-15m \
    | `mcp_spl_extract` \
    | `mcp_antipattern_check` \
    | where is_overly_wide_time = 1 \
    | table _time, user, spl_body
disabled = 0
enableSched = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert.track = 1
alert.severity = 3
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 30m
description = Fires when an MCP user runs a search with earliest spanning more than ~30 days. Medium severity — typically unintentional and expensive on indexers.
counttype = number of events
quantity = 0
relation = greater than

[MCP-Watch - Alert - Export or Delete Command Used]
search = `mcp_audit_searches` earliest=-15m \
    | `mcp_spl_extract` \
    | `mcp_antipattern_check` \
    | where is_export_or_delete = 1 \
    | table _time, user, spl_body
disabled = 0
enableSched = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert.track = 1
alert.severity = 5
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 15m
description = CRITICAL. Fires when an MCP user runs a search containing | outputcsv, | outputlookup, | collect, | sendemail, or | delete. These commands represent agent intent to write data out (exfil) or destroy data — almost never legitimate for an MCP service account. Investigate the source agent and the SPL body immediately.
counttype = number of events
quantity = 0
relation = greater than

# ============================================================================
# Self-tests (v1.1 P0) — not scheduled by default; run manually to verify
# anti-pattern regex correctness after editing macros.conf.
# ============================================================================

[MCP-Watch - Self-Test - Anti-Pattern Regex]
search = | inputlookup regex_fixtures.csv \
    | `mcp_antipattern_check` \
    | eval actual = case(anti_pattern=="wildcard_index", is_wildcard_index, \
                         anti_pattern=="len_raw", is_len_raw, \
                         anti_pattern=="dbinspect_all", is_dbinspect_all, \
                         anti_pattern=="no_time_bound", is_no_time_bound, \
                         anti_pattern=="overly_wide_time", is_overly_wide_time, \
                         anti_pattern=="export_or_delete", is_export_or_delete, \
                         true(), -1) \
    | eval status = case(actual == -1, "ERROR_UNKNOWN_PATTERN", actual == expected, "PASS", true(), "FAIL") \
    | stats count as n, values(test_id) as test_ids by status, anti_pattern \
    | sort status anti_pattern
disabled = 0
enableSched = 0
description = Self-test. Runs the mcp_antipattern_check regex against lookups/regex_fixtures.csv and groups outcomes by status (PASS / FAIL / ERROR_UNKNOWN_PATTERN). All-PASS = regex is correct. Any FAIL = inspect the named test_ids in the lookup. Not scheduled.

# ============================================================================
# Liveness (v1.2) — auto-heartbeat for the OFFICIAL Splunk MCP Server.
# If the Splunk_MCP_Server app is installed & enabled on this instance, write a
# fresh heartbeat every minute so it appears UP in the liveness panel without an
# external sender. Custom/external MCPs must send their own heartbeat (see README).
# Writes nothing if the official app isn't present (| rest returns no rows).
# ============================================================================

[MCP-Watch - Heartbeat - Official MCP Server]
# Pulls the full app list and filters in-SPL instead of hitting the
# app-specific REST path directly. The direct path
# (/services/apps/local/Splunk_MCP_Server) returns HTTP 404 when the
# official MCP Server isn't installed — and on a fresh MCP-Watch install
# that 404 is logged as two ERROR + one WARN lines by splunkd EVERY time
# this cron fires (12 times/hour). Listing all apps and filtering by
# `title=` is silent when the row isn't present and costs nothing extra.
search = | rest splunk_server=local /services/apps/local \
    | where title="Splunk_MCP_Server" AND 'disabled'=0 \
    | eval _key="splunk-mcp-server", mcp_id="splunk-mcp-server", last_seen=now(), host=splunk_server, kind="official-server" \
    | table _key mcp_id last_seen host kind \
    | outputlookup mcp_heartbeat append=true key_field=_key
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
disabled = 0
description = Auto-heartbeat: marks the official Splunk MCP Server as UP (every 5 min) when its app is enabled, so it shows in the MCP liveness panel without an external sender.
