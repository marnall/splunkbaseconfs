#
# MCP-Watch — transforms.conf
#
# Registers mcp_users.csv as a Splunk lookup so [ | inputlookup mcp_users.csv ]
# resolves correctly inside macros.
#

[mcp_users]
filename = mcp_users.csv
case_sensitive_match = false

[mcp_tool_catalog]
filename = mcp_tool_catalog.csv

[mcp_tool_denied]
filename = mcp_tool_denied.csv

# v1.1 — user-agent patterns for detecting non-official / custom MCP clients
# (wildcard match against the splunkd_access 'useragent' field).
[mcp_user_agents]
filename = mcp_user_agents.csv
match_type = WILDCARD(useragent_pattern)

# v1.2 — liveness heartbeats (KV store). MCPs/sidecars upsert one row per mcp_id.
[mcp_heartbeat]
external_type = kvstore
collection = mcp_heartbeat
fields_list = _key, mcp_id, last_seen, host, kind

# Splunk-reserved / non-MCP accounts that discovery panels and the REST
# detection macro should never surface as MCP agents. Add rows here when a
# new Splunk version introduces another internal identity (e.g. future
# sidecar/agent accounts) — no code change needed.
[mcp_excluded_users]
filename = mcp_excluded_users.csv
case_sensitive_match = false
