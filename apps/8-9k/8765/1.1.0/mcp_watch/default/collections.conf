# v1.2 — MCP liveness heartbeats.
# Each MCP server (or a sidecar next to it) upserts one row per mcp_id with a
# fresh `last_seen` epoch. The status badge treats an MCP as "up" when its
# heartbeat is fresh — independent of query activity. No index is used.
[mcp_heartbeat]
field._key = string
field.mcp_id = string
field.last_seen = number
field.host = string
field.kind = string
