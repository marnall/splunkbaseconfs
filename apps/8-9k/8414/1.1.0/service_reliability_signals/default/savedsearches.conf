[Service Instability Detected]
alert_type = number of events
search = `svc_instability(service_reliability_test)` | where unstable=1 | stats count AS instability_events BY service
alert_comparator = greater than
alert_threshold = 0
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 30m
cron_schedule = */15 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time = now
description = Detects services experiencing short repeated outages (flapping behavior).


[High SLA Risk Detected]
alert_type = number of events
search = `svc_sla_risk(service_reliability_test)` | where sla_risk="HIGH"
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 1h
cron_schedule = 0 * * * *
dispatch.earliest_time = -6h
dispatch.latest_time = now
description = Identifies services trending toward SLA breach using rolling failure analysis.


[Sustained Service Outage]
alert_type = number of events
search = `svc_failure_detect(service_reliability_test)` | timechart span=15m sum(is_failure) AS failures BY service | untable _time service failures | where failures >= 10 | stats count BY service
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
alert.suppress = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time = now
description = Detects sustained service outages where failures persist without recovery.


[Excessive Recovery Activity]
alert_type = number of events
search = `svc_recovery_patterns(service_reliability_test)` | where recovery_events >= 10
alert_comparator = greater than
alert_threshold = 0
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 1h
cron_schedule = 0 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
description = Detects excessive recovery events indicating flapping or restart loops.
