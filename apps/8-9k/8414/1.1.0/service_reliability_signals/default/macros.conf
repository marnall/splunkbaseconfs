[svc_base_search(1)]
args = index
definition = index=$index$ | eval service=coalesce(service, app, application, sourcetype, host) | where isnotnull(service) | fields _time service _raw
iseval = 0

# PURPOSE:
#   Provides a safe, bounded base search for all reliability analytics.
# SAFETY:
#   - Prevents unbounded historical scans
#   - Normalizes service identity
# OUTPUT:
#   _time, service, _raw

[svc_failure_detect(1)]
args = index
definition = `svc_base_search($index$)` | eval _raw_lc=lower(_raw) | eval is_failure=if(match(_raw_lc,"error|fail|timeout|unavailable|exception|crash|denied"),1,0) | fields _time service is_failure
iseval = 0

# PURPOSE:
#   Detect failure events based on log keywords.
# RESPONSIBILITY:
#   - Classify event as failure or non-failure
# OUTPUT:
#   _time, service, is_failure

[svc_volume_metrics(1)]
args = index
definition = `svc_failure_detect($index$)` | stats count AS total_events BY service
iseval = 0

# PURPOSE:
#   Compute total event volume per service.
# OUTPUT:
#   service, total_events

[svc_failure_metrics(1)]
args = index
definition = `svc_failure_detect($index$)` | stats sum(is_failure) AS failure_events BY service
iseval = 0

# PURPOSE:
#   Compute failure event count per service.
# OUTPUT:
#   service, failure_events

[svc_availability(1)]
args = index
definition = `svc_failure_detect($index$)` | stats count AS total_events sum(is_failure) AS failure_events BY service | eval availability_pct=round((1 - (failure_events / total_events)) * 100, 2) | eval availability_pct=if(total_events=0, 100, availability_pct)
iseval = 0

# PURPOSE:
#   Computes availability percentage per service.
# SAFETY:
#   - Handles empty data
#   - Handles single-event scenarios
# OUTPUT:
#   service, availability_pct, status

[svc_failure_trend(1)]
args = index
definition = `svc_failure_detect($index$)` | timechart span=15m sum(is_failure) AS failures BY service
iseval = 0

# PURPOSE:
#   Shows short-term failure trends.
# DESIGN:
#   - Fixed 15m span ensures consistency across time ranges

[svc_instability(1)]
args = index
definition = `svc_failure_detect($index$)` | timechart span=15m sum(is_failure) AS failures BY service | untable _time service failures | eventstats avg(failures) AS avg_failures stdev(failures) AS sd_failures BY service | eval unstable=if(failures > avg_failures + (2 * sd_failures), 1, 0)
iseval = 0

# PURPOSE:
#   Detects statistically abnormal failure bursts (flapping).
# SAFETY:
#   - No wildcard math
#   - One aggregation layer
# OUTPUT:
#   service, failures, unstable

[svc_sla_risk(1)]
args = index
definition = `svc_failure_detect($index$)` | timechart span=1h sum(is_failure) AS failures | streamstats window=6 avg(failures) AS rolling_failures | eval sla_risk=case(rolling_failures >= 5, "HIGH", rolling_failures >= 2, "MEDIUM", true(), "LOW")
iseval = 0

# PURPOSE:
#   Early SLA breach warning using rolling failure pressure.
# DESIGN:
#   - Rolling average avoids noise
# OUTPUT:
#   service, rolling_failures, sla_risk

[svc_reliability_score(1)]
args = index
definition = `svc_failure_detect($index$)`\
| eval MIN_EVENT_THRESHOLD=20 \
| eval SUSTAINED_FAILURE_THRESHOLD=3 \
| eval SUSTAINED_PENALTY_WEIGHT=5 \
| eval DEGRADATION_PENALTY_WEIGHT=3 \
| stats count AS total_events sum(is_failure) AS failure_events BY service \
| eval insufficient_data = if(total_events < MIN_EVENT_THRESHOLD, 1, 0) \
| eval failure_rate = if(total_events=0, 0, failure_events/total_events) \
| eval base_score = round(100 - (failure_rate * 100), 0) \
| eval sustained_penalty = case(failure_rate >= 0.5, SUSTAINED_PENALTY_WEIGHT * 3, failure_rate >= 0.3, SUSTAINED_PENALTY_WEIGHT, true(), 0) \
| eval degradation_penalty = if(failure_rate >= 0.2, DEGRADATION_PENALTY_WEIGHT, 0) \
| eval raw_score = base_score - sustained_penalty - degradation_penalty \
| eval bounded_score = case(raw_score < 0, 0, raw_score > 100, 100, true(), raw_score) \
| eval reliability_score = if(insufficient_data=1, null(), bounded_score) \
| eval score_state = if(insufficient_data=1, "INSUFFICIENT_DATA", "OK") \
| fields service reliability_score score_state
iseval = 0

# PURPOSE:
#   Produce 0–100 reliability score.
# NOTE:
#   Will be redesigned in Phase 2.
# OUTPUT:
#   service, reliability_score

[svc_stability_score(1)]
args = index
definition = `svc_failure_detect($index$)` | stats count AS total sum(is_failure) AS failures BY service | eval failure_ratio=failures / total | eval stability_score=round(100 - (failure_ratio * 100), 0) | eval stability_score=if(stability_score < 0, 0, stability_score)
iseval = 0

# PURPOSE:
#   Produces a 0–100 stability score per service.
# ASSUMPTION:
#   - Frequency matters more than volume

[svc_recovery_patterns(1)]
args = index
definition = `svc_failure_detect($index$)` | sort service _time | streamstats current=f last(is_failure) AS prev_failure BY service | eval recovered=if(prev_failure=1 AND is_failure=0,1,0) | stats sum(recovered) AS recovery_events BY service
iseval = 0

# PURPOSE:
#   Detects recovery transitions (restart / self-healing behavior).
# OUTPUT:
#   service, recovery_events