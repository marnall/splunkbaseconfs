[install]
is_configured = 0

[ui]
is_visible = 0
label = Request Builder
default_view = home

[launcher]
author = Elifnur Kaplan
description = Request Builder adds a | req custom SPL command that lets you make outbound HTTP and HTTPS requests directly from the Splunk search pipeline. Enrich events with API data, trigger webhooks, and integrate with external systems. Supports all HTTP methods, custom headers, request bodies, stored credentials (Basic, Bearer, API key), and SSL control.
version = 1.0.0

[package]
id = TA_Request_Builder
check_for_updates = true

[python]
version = python3
