##
## InSitzes App for Splunk - Unified Macros
## These macros are configured via the Setup dashboard (insitzes_setup)
## Defaults: Cloud deployment, SVC licensing, DDAS + DDAA enabled
##

## ─── Index Selection ───
## Cloud uses _cmc_summary for Cloud Monitoring Console data
## Enterprise uses summary index only
[insitzes_set_index_cmc_summary]
definition = (index=_cmc_summary OR index=summary)
iseval = 0

## ─── Host / Server Role Filters ───
## These macros filter SPL queries to the correct server roles.
## Override these in local/macros.conf or via the Setup dashboard
## if your host naming convention differs.

[insitzes_indexer_hosts]
definition = host="idx*"
iseval = 0

[insitzes_searchhead_hosts]
definition = host="sh*"
iseval = 0

[insitzes_cloud_hosts]
definition = host="*splunkcloud*"
iseval = 0

[insitzes_idm_hosts]
definition = host="idm*"
iseval = 0

[insitzes_cmc_hosts]
definition = host="c0m*"
iseval = 0

## ─── User Exclusions ───
## Cloud has system users (cmon_user, internal_observability) that
## should be excluded from search performance analysis.
## Enterprise typically excludes splunk-system-user.
[insitzes_exclude_system_users]
definition = NOT user IN ("cmon_user", "internal_observability")
iseval = 0

## ─── Feature Flags ───
## These are read by the dashboard to control tab/panel visibility.
## The Setup dashboard writes these values to insitzes_config.csv,
## which the dashboard reads at load time.
## These macros exist as fallback defaults if the lookup isn't populated.

[insitzes_splunkcloud_domain]
definition = splunkcloud.com
iseval = 0

[insitzes_deployment_type]
definition = cloud
iseval = 0

[insitzes_licensing_model]
definition = svc
iseval = 0

[insitzes_has_ddaa]
definition = 1
iseval = 0

[insitzes_has_ddas]
definition = 1
iseval = 0

[insitzes_has_idm]
definition = 0
iseval = 0

[insitzes_has_smartstore]
definition = 1
iseval = 0


## ─── Cost Rates ───
## Populated from the Setup page and read by the Compute and Storage
## tabs when the user toggles to Cost view. Leave empty to hide the
## cost toggle (Compute) or show "--" placeholders (Storage).
[insitzes_cost_per_svc]
definition =
iseval = 0

[insitzes_cost_per_ddas_500gb]
definition =
iseval = 0

[insitzes_cost_per_ddaa_500gb]
definition =
iseval = 0

## ─── REST Timeout ───
## Client-side timeout (in seconds) applied to Splunk REST API calls
## made by the app's dashboards and setup page (macro reads, alert
## toggles, job status polling, etc.). Does NOT apply to SPL searches —
## those use insitzes_search_timeout below.
[insitzes_rest_timeout]
definition = 30
iseval = 0

## ─── Search Timeout ───
## Client-side timeout (in seconds) for `service.oneshotSearch` calls
## from the dashboard. Longer than the REST timeout because some checks
## (Index Governance, data quality sourcetype scan, cache churn) take
## well over 30 seconds to complete. Default is 300s / 5 minutes.
[insitzes_search_timeout]
definition = 300
iseval = 0

## --- Debug ---
[insitzes_debug_mode]
definition = 0
iseval = 0

## ─── Alert Email ───
## Recipient address (or distribution list) for all health check alerts.
## Populated via the Setup dashboard; alerts are disabled until set.
[insitzes_alert_email]
definition =
iseval = 0
