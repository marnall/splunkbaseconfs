action.email.subject.alert = InSitzes - Real-Time Searches
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 50 real-time searches completed in 24 hours\nHigh  |  > 20 real-time searches in 24 hours\nMedium  |  > 5 real-time searches in 24 hours\nOK  |  ≤ 5 real-time searches in 24 hours\n\nWHAT IS THIS CHECK?\nCounts completed real-time searches (where is_realtime=1) recorded in the audit log over the last 24 hours. Real-time searches maintain a persistent, continuously-updating connection to indexed data rather than running as a discrete job with a fixed time range. This check surfaces environments where real-time searches are being used frequently — each one holding open resources for its entire lifetime.\n\nWHY IT MATTERS\nReal-time searches are among the most resource-intensive search types in Splunk. Unlike scheduled or ad-hoc searches that complete and release resources, real-time searches hold open search slots, consume continuous CPU cycles, and generate persistent I/O on indexers — even during periods of low event activity. A handful of concurrent real-time searches can saturate a search head's available slots, causing scheduled search delays, skipping, and degraded dashboard performance for all users. In most cases, the same monitoring goal can be achieved with a fast-running scheduled search at a 1–5 minute interval.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Search head capacity: Every active real-time search consumes a persistent search slot; those slots are unavailable to scheduled or ad-hoc searches\n- Indexer load: Real-time searches issue continuous tailing queries to indexers, adding sustained read load independent of ingest volume\n- Compute: Continuous execution means compute consumption grows linearly with the number of active real-time searches — they never release resources between "runs"
