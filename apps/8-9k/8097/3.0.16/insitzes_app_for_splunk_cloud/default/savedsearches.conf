search = index=_introspection component=Hostwide data.mem_used=* `insitzes_searchhead_hosts` | fields data.cpu_user_pct,data.cpu_system_pct,data.mem,data.mem_used,host,dns_alt_name | rename "data.cpu_user_pct" as user_pct,"data.cpu_system_pct" as system_pct,"data.mem" as total_mem,"data.mem_used" as used_mem | eval cpu_perc_used=user_pct+system_pct | eval mem_perc_used=(used_mem/total_mem)*100 | stats perc95(cpu_perc_used) as p95_cpu perc95(mem_perc_used) as p95_mem by dns_alt_name | eval sh_severity=case(p95_cpu>90 OR p95_mem>95,"critical",p95_cpu>80 OR p95_mem>90,"high",p95_cpu>70 OR p95_mem>85,"medium",1==1,"ok") | stats count(eval(sh_severity=="critical")) as crit_shs count(eval(sh_severity=="high")) as high_shs count(eval(sh_severity=="medium")) as med_shs count as total_shs max(p95_cpu) as max_cpu max(p95_mem) as max_mem | eval Category="System" | eval Health_Check="Search Head CPU & Memory (p95)" | eval Criteria="Critical: >90% CPU or >95% Memory; High: >80% CPU or >90% Memory; Medium: >70% CPU or >85% Memory" | eval severity=case(crit_shs>0,"critical",high_shs>0,"high",med_shs>0,"medium",1==1,"ok") | eval Result=case(crit_shs>0 OR high_shs>0 OR med_shs>0,crit_shs." critical, ".high_shs." high, ".med_shs." medium (Max CPU: ".round(max_cpu,1)."%, Max Mem: ".round(max_mem,1)."%)",1==1,"All search heads healthy") | eval is_critical=if(severity="critical",1,0), is_high=if(severity="high",1,0), is_medium=if(severity="medium",1,0), is_ok=if(severity="ok",1,0) | eval sev_label=case(severity="critical","● CRITICAL",severity="high","● HIGH",severity="medium","● MEDIUM",1==1,"● OK") | eval description=Criteria | eval bg_color=case(severity="critical","#DC4C5A",severity="high","#E0763E",severity="medium","#CFAF2B",1==1,"#3D9455") | eval Result=if(len(Result)>40, substr(Result,1,38)."..", Result) | table Health_Check, Result, description, severity, sev_label, is_critical, is_high, is_medium, is_ok, bg_color \
| where severity="critical" OR severity="high"

[insitzes_alert_queue_blocking_events]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - Queue Blocking Events
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 5% of samples showing blocked queues\nHigh  |  > 2% of samples showing blocked queues\nMedium  |  Any blocking detected (> 0%)\nOK  |  No blocking detected\n\nWHAT IS THIS CHECK?\nMonitors the indexing queue on indexers for blocking events. When the indexing queue reaches maximum capacity, it blocks upstream data flow — forwarders cannot deliver data until the queue drains. This check measures the percentage of queue samples in a blocked state across all indexers.\n\nWHY IT MATTERS\nQueue blocking is a direct indicator of indexing tier saturation. Blocked queues cause a cascading backpressure chain: indexer queues fill, forwarders cannot deliver data, forwarder output queues fill, and eventually data may be dropped if forwarder buffers overflow. Even brief blocking episodes can cause data delays that affect time-sensitive alerting and monitoring.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: Blocked queues delay data delivery — events arrive late or, in severe cases, are dropped entirely if forwarder buffers overflow; delayed data may also cause timestamp assignment issues that affect search accuracy\n- Compute: Indirect impact — delayed data may trigger catch-up searches or cause scheduled searches to produce incomplete results, leading to reruns
action.webhook.enable_allowlist = 1
alert.suppress = 1
alert.suppress.period = 24h
alert.track = 1
counttype = number of events
cron_schedule = 0 3 * * *
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = insitzes_app_for_splunk_cloud
request.ui_dispatch_view = search
search = index=_internal sourcetype=splunkd source=*metrics.log* group=queue `insitzes_indexer_hosts` name=indexqueue | fields host blocked | eval is_blocked=if(blocked="true",1,0) | stats count as total_samples sum(is_blocked) as blocked_samples by host | eval block_pct=round(100*blocked_samples/total_samples,1) | stats max(block_pct) as max_block_pct | fillnull value=0 max_block_pct | eval Category="Ingestion" | eval Health_Check="Queue Blocking Events" | eval Criteria="Critical: >5% blocked; High: >2% blocked; Medium: >0% blocked" | eval severity=case(max_block_pct>5,"critical",max_block_pct>2,"high",max_block_pct>0,"medium",1==1,"ok") | eval Result=if(max_block_pct>0,"Blocked: ".max_block_pct."% of samples","No blocking detected") | eval is_critical=if(severity="critical",1,0), is_high=if(severity="high",1,0), is_medium=if(severity="medium",1,0), is_ok=if(severity="ok",1,0) | eval sev_label=case(severity="critical","● CRITICAL",severity="high","● HIGH",severity="medium","● MEDIUM",1==1,"● OK") | eval description=Criteria | eval bg_color=case(severity="critical","#DC4C5A",severity="high","#E0763E",severity="medium","#CFAF2B",1==1,"#3D9455") | eval Result=if(len(Result)>40, substr(Result,1,38)."..", Result) | table Health_Check, Result, description, severity, sev_label, is_critical, is_high, is_medium, is_ok, bg_color \
| where severity="critical" OR severity="high"

[insitzes_alert_last_chance_index_events]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - Last Chance Index Events
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 0.1% of events routed to lastchance index\nHigh  |  > 0.01% of events routed to lastchance\nMedium  |  > 0 events (any events in lastchance)\nOK  |  No events in lastchance index\n\nWHAT IS THIS CHECK?\nCounts events that were redirected to the lastchance index because they targeted an index that is unconfigured, disabled, or deleted on the indexing tier. These events were intended for a specific index but could not be routed there, so Splunk redirected them to the lastchance index as a safety net rather than dropping them.\n\nWHY IT MATTERS\nEvents in lastchance represent a data routing failure. The data exists but is in the wrong location — searches targeting the intended index will miss these events, potentially creating gaps in alerting, dashboards, and compliance reporting. This often indicates a configuration drift between forwarder outputs and indexer index definitions.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: Events still consume ingest license — you are paying to ingest data that lands in the wrong place\n- Storage: Events consume DDAS in the lastchance index instead of their intended destination, potentially with different (usually default) retention policies\n- Compute: No additional compute cost, but operational confusion from misrouted data may drive extra investigative searches
action.webhook.enable_allowlist = 1
alert.suppress = 1
alert.suppress.period = 24h
alert.track = 1
counttype = number of events
cron_schedule = 0 3 * * *
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = insitzes_app_for_splunk_cloud
request.ui_dispatch_view = search
search = index=_internal sourcetype=splunkd source="*metrics.log*" group=per_index_thruput | fields ev series | stats sum(ev) as total_events sum(eval(if(series="lastchance",ev,0))) as lastchance_events | eval lastchance_events=coalesce(lastchance_events,0) | eval lastchance_pct=if(total_events>0,round((lastchance_events/total_events)*100,3),0) | eval Category="Forwarding" | eval Health_Check="Last Chance Index Events" | eval Criteria="Critical: >0.1% of events; High: >0.01%; Medium: >0% (any events)" | eval severity=case(lastchance_pct>0.1,"critical",lastchance_pct>0.01,"high",lastchance_events>0,"medium",1==1,"ok") | eval Result=case(lastchance_events>0,tostring(lastchance_events,"commas")." of ".tostring(total_events,"commas")." events (".lastchance_pct."%) redirected to lastchance",1==1,"No events redirected to lastchance index") | eval is_critical=if(severity="critical",1,0), is_high=if(severity="high",1,0), is_medium=if(severity="medium",1,0), is_ok=if(severity="ok",1,0) | eval sev_label=case(severity="critical","● CRITICAL",severity="high","● HIGH",severity="medium","● MEDIUM",1==1,"● OK") | eval description=Criteria | eval bg_color=case(severity="critical","#DC4C5A",severity="high","#E0763E",severity="medium","#CFAF2B",1==1,"#3D9455") | eval Result=if(len(Result)>40, substr(Result,1,38)."..", Result) | table Health_Check, Result, description, severity, sev_label, is_critical, is_high, is_medium, is_ok, bg_color \
| where severity="critical" OR severity="high"

[insitzes_alert_indexing_queue_fill]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - Indexing Queue Fill
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 90% p90 queue fill ratio\nHigh  |  > 75% p90 queue fill ratio\nMedium  |  > 50% average queue fill ratio\nOK  |  ≤ 50% average fill\n\nWHAT IS THIS CHECK?\nMeasures the indexing queue fill percentage across all indexers using both average fill and 90th percentile (p90) fill metrics. The indexing queue sits between the parsing pipeline and the indexing pipeline — when it fills, data processing slows and can eventually block upstream queues. The p90 metric captures sustained high fill levels while filtering out brief transient spikes.\n\nWHY IT MATTERS\nThe indexing queue is the critical bottleneck point in the data pipeline. Sustained high fill percentages indicate that the indexing tier cannot keep up with the rate of incoming data. This is an early warning indicator — queue fill increases before blocking occurs. Addressing high fill percentages proactively prevents the more severe queue blocking events that cause data loss.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: High queue fill is a leading indicator of ingest processing delays; at critical levels, data delivery stalls and forwarders begin buffering\n- Storage: No direct storage impact, but processing delays can cause timestamp assignment issues for delayed events\n- Compute: Indirect impact — indexers spending more time processing queued data have fewer resources for concurrent search operations
