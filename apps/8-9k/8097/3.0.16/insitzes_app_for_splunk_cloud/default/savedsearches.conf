action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  Top SVC consumer uses > 50% of total compute\nHigh  |  Top consumer uses > 35%\nMedium  |  Top consumer uses > 25%\nOK  |  No single consumer exceeds 25%\n\nWHAT IS THIS CHECK?\nIdentifies which search consumer type is consuming the largest share of your compute license capacity. compute consumers include scheduled searches, ad-hoc searches, dashboard panels, data model acceleration, and summary indexing. When one consumer dominates, it creates a single point of optimization.\n\nWHY IT MATTERS\ncompute licenses have a fixed capacity. If one consumer type (e.g., auto-refreshing dashboards) consumes a disproportionate share, it starves other workloads — scheduled alerts may be delayed, ad-hoc searches slow down, and you're paying for compute capacity that isn't distributed effectively. Unlike total utilization (which tells you how much is used), attribution tells you where to focus optimization efforts.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Compute: A dominant consumer directly reduces available compute for all other workloads, creating bottlenecks\n- User Experience: If dashboards consume 50%+ of compute, ad-hoc users experience slow search times\n- Alerts: Scheduled searches for security and operational alerts compete for the remaining compute budget
