search = | rest /servicesNS/-/-/data/ui/views splunk_server=local | search isDashboard=1 | rename eai:data as data eai:acl.app as app eai:acl.owner as owner eai:acl.sharing as sharing title as dashboard | table dashboard app owner sharing data version | search data="*refresh*" NOT(owner="nobody") | rex field=data "\<refresh\>(?P<simplexml_panel_refresh_interval>[^\<]+)\<\/refresh\>" | rex field=data "refresh=\"(?P<simplexml_full_refresh_interval>[^\"]+)\"" | rex field=data "\"refresh\"\:\s\"(?P<dashstudio_refresh_interval>[^\"]+)\"" | rex field=data max_match=0 "\"type\"\:\s\"ds\.(?P<dssearchtype>[^\"]+)\"" | eval dashboardstudio_total_chain_searches=coalesce(mvcount(mvfilter(match(dssearchtype,"chain"))),0) | eval dashboardstudio_total_regular_searches=coalesce(mvcount(dssearchtype)-dashboardstudio_total_chain_searches,0) | rex field=data max_match=0 "(?is)(?<search_tag><search[^>]*>)" | rex field=search_tag max_match=0 "\sbase\=(?P<chain_search>[^\s\>]+)" | eval simplexml_total_searches=coalesce(mvcount(search_tag),0) | eval simplexml_total_chain_searches=coalesce(mvcount(chain_search),0) | eval simplexml_total_regular_searches=simplexml_total_searches-simplexml_total_chain_searches | eval total_regular_searches=if(version=2,dashboardstudio_total_regular_searches,simplexml_total_regular_searches) | eval total_chain_searches=if(version=2,dashboardstudio_total_chain_searches,simplexml_total_chain_searches) | eval has_refresh=if(isnotnull(simplexml_panel_refresh_interval) OR isnotnull(simplexml_full_refresh_interval) OR isnotnull(dashstudio_refresh_interval),1,0) | where has_refresh=1 | table app,dashboard,owner,sharing,total_regular_searches,total_chain_searches,has_refresh | join type=inner dashboard [| search `insitzes_set_index_cmc_summary` source="splunk-svc-search-attribution" svc_consumer=search | stats sum(svc_usage) as svc_usage by search_provenances | search (search_provenances="UI:Dashboard:*" OR search_provenances="UI:dashboard:*") | rex field=search_provenances "UI\:[Dd]ashboard\:(?P<dashboard>.*)" | table dashboard,svc_usage] | eval svc_usage=round(svc_usage,3) | where svc_usage>0 | stats first(*) as * by dashboard | appendcols [| search `insitzes_set_index_cmc_summary` source="splunk-svc" | stats max(stack_license_svc) as svc_license_entitlement] | filldown svc_license_entitlement | eval perc_of_license=if(svc_license_entitlement>0, round((svc_usage/svc_license_entitlement)*100,4), null()) | eval dashboard_severity=case(perc_of_license>1 AND total_chain_searches=0 AND total_regular_searches>3,"critical", perc_of_license>0.5 AND total_chain_searches=0 AND total_regular_searches>2,"high", perc_of_license>0.25 AND total_chain_searches=0 AND total_regular_searches>1,"medium", 1==1,"ok") | stats count(eval(dashboard_severity="critical")) as crit_dashboards count(eval(dashboard_severity="high")) as high_dashboards count(eval(dashboard_severity="medium")) as med_dashboards sum(eval(if(dashboard_severity!="ok",svc_usage,0))) as total_wasted_svc max(svc_usage) as max_svc sum(eval(if(dashboard_severity!="ok",total_regular_searches,0))) as total_searches_needing_chains max(svc_license_entitlement) as svc_license_entitlement | fillnull value=0 crit_dashboards high_dashboards med_dashboards total_wasted_svc max_svc total_searches_needing_chains | eval Category="Dashboards" | eval Health_Check="Inefficient Dashboards" | eval Criteria="Critical: dashboard >1% SVC, no chains, >3 searches; High: >0.5%, >2 searches; Medium: >0.25%, >1 search" | eval severity=case(isnull(svc_license_entitlement) OR svc_license_entitlement=0,"ok", crit_dashboards>0,"critical", high_dashboards>0,"high", med_dashboards>0,"medium", 1==1,"ok") | eval Result=case(isnull(svc_license_entitlement) OR svc_license_entitlement=0,"No SVC license data", crit_dashboards>0, crit_dashboards." crit, ".high_dashboards." high, ".med_dashboards." med", high_dashboards>0, high_dashboards." high, ".med_dashboards." med dashboards", med_dashboards>0, med_dashboards." med dashboards", 1==1,"All dashboards optimized") | eval is_critical=if(severity="critical",1,0), is_high=if(severity="high",1,0), is_medium=if(severity="medium",1,0), is_ok=if(severity="ok",1,0) | eval sev_label=case(severity="critical","● CRITICAL",severity="high","● HIGH",severity="medium","● MEDIUM",1==1,"● OK") | eval description=Criteria | eval bg_color=case(severity="critical","#DC4C5A",severity="high","#E0763E",severity="medium","#CFAF2B",1==1,"#3D9455") | eval Result=if(len(Result)>40, substr(Result,1,38)."..", Result) | table Health_Check, Result, description, severity, sev_label, is_critical, is_high, is_medium, is_ok, bg_color \
