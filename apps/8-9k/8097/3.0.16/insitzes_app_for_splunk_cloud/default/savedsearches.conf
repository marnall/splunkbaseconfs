[insitzes_alert_splunk_restarts]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - Splunk Restarts
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  Any host with >= 5 splunkd restarts in 24h\nHigh  |  Any host with >= 3 restarts in 24h\nMedium  |  Any host with >= 2 restarts in 24h\nOK  |  At most 1 restart per host\n\nWHAT IS THIS CHECK?\nCounts 'Splunkd starting' log entries per host across splunkd.log over the last 24 hours, excluding Universal Forwarders (filtered by source path). Each startup line represents one process restart of full Splunk — indexers, search heads, heavy forwarders, cluster masters, and other full Splunk instances.\n\nWHY IT MATTERS\nPlanned restarts for rolling upgrades, app installs, or config pushes are normal. Multiple unplanned restarts on the same host typically indicate faults — out-of-memory kills, segmentation faults, bundle replication loops, or underlying infrastructure problems (VM reboots, container evictions). Unplanned restarts drop in-flight searches, flush in-memory queues, and can corrupt hot buckets if shutdowns are not clean.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Search: In-flight searches are terminated on restart and must be re-run; scheduled searches running at restart time are reported as failed or skipped\n- Ingest: Forwarder connections are dropped during restart; repeated restarts can exhaust forwarder spool and cause data loss\n- Storage: Hot buckets may be rolled to warm mid-write, producing small fragmented buckets that increase merge pressure\n- Cluster stability: Frequent restarts on cluster peers cause fixup activity (bucket replication, search factor restoration) consuming compute and I/O on remaining peers
action.webhook.enable_allowlist = 1
alert.suppress = 1
alert.suppress.period = 24h
alert.track = 1
counttype = number of events
cron_schedule = 0 3 * * *
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = insitzes_app_for_splunk_cloud
request.ui_dispatch_view = search
search = index=_internal sourcetype=splunkd source="*splunkd.log" "Splunkd starting" NOT (source="*splunkforwarder*") NOT (source="*SplunkUniversalForwarder*") | stats count as restart_count by host | eventstats max(restart_count) as max_restarts count(eval(restart_count>=5)) as crit_hosts count(eval(restart_count>=3 AND restart_count<5)) as high_hosts count(eval(restart_count>=2 AND restart_count<3)) as med_hosts dc(host) as hosts_with_restarts | stats max(max_restarts) as max_restarts max(crit_hosts) as crit_hosts max(high_hosts) as high_hosts max(med_hosts) as med_hosts max(hosts_with_restarts) as hosts_with_restarts | fillnull value=0 max_restarts crit_hosts high_hosts med_hosts hosts_with_restarts | eval Category="System" | eval Health_Check="Splunk Restarts" | eval Criteria="Critical: any host with >=5 restarts in 24h; High: >=3 restarts; Medium: >=2 restarts" | eval severity=case(crit_hosts>0,"critical",high_hosts>0,"high",med_hosts>0,"medium",1==1,"ok") | eval Result=case(crit_hosts>0,crit_hosts." host(s) with >=5 restarts (peak: ".max_restarts.")",high_hosts>0,high_hosts." host(s) with >=3 restarts (peak: ".max_restarts.")",med_hosts>0,med_hosts." host(s) with >=2 restarts",hosts_with_restarts>0,hosts_with_restarts." host(s) with 1 restart",1==1,"No restarts in last 24h") | eval is_critical=if(severity="critical",1,0), is_high=if(severity="high",1,0), is_medium=if(severity="medium",1,0), is_ok=if(severity="ok",1,0) | eval sev_label=case(severity="critical","● CRITICAL",severity="high","● HIGH",severity="medium","● MEDIUM",1==1,"● OK") | eval description=Criteria | eval bg_color=case(severity="critical","#DC4C5A",severity="high","#E0763E",severity="medium","#CFAF2B",1==1,"#3D9455") | eval Result=if(len(Result)>40, substr(Result,1,38)."..", Result) | table Health_Check, Result, description, severity, sev_label, is_critical, is_high, is_medium, is_ok, bg_color \
| where severity="critical" OR severity="high"
