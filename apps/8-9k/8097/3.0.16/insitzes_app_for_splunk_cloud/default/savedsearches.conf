display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = insitzes_app_for_splunk_cloud
request.ui_dispatch_view = search
search = | rest /services/apps/local splunk_server=local | search disabled=0 core=0 update.version=* | rename update.version as update_version | rex field=version "^(?<current_major>\d+)\.(?<current_minor>\d+)\.?(?<current_patch>\d*)" | rex field=update_version "^(?<update_major>\d+)\.(?<update_minor>\d+)\.?(?<update_patch>\d*)" | eval current_major=tonumber(current_major) | eval current_minor=tonumber(current_minor) | eval update_major=tonumber(update_major) | eval update_minor=tonumber(update_minor) | eval version_gap=case(update_major>current_major,"major",update_major==current_major AND update_minor>current_minor,"minor",1==1,"patch") | eval app_severity=case(version_gap=="major","critical",version_gap=="minor","high",version_gap=="patch","medium",1==1,"ok") | eval sev_order=case(app_severity=="critical",3,app_severity=="high",2,app_severity=="medium",1,1==1,0) | stats max(sev_order) as worst_sev by title | eval app_severity=case(worst_sev==3,"critical",worst_sev==2,"high",worst_sev==1,"medium",1==1,"ok") | stats count(eval(app_severity=="critical")) as crit_apps count(eval(app_severity=="high")) as high_apps count(eval(app_severity=="medium")) as med_apps count as total_apps | eval Category="System" | eval Health_Check="Apps Requiring Updates" | eval Criteria="Critical: Major version behind; High: Minor version behind; Medium: Patch version behind" | eval severity=case(crit_apps>0,"critical",high_apps>0,"high",med_apps>0,"medium",1==1,"ok") | eval Result=case(crit_apps>0 OR high_apps>0 OR med_apps>0,crit_apps." crit, ".high_apps." high, ".med_apps." med updates",1==1,"All up to date") | eval is_critical=if(severity="critical",1,0), is_high=if(severity="high",1,0), is_medium=if(severity="medium",1,0), is_ok=if(severity="ok",1,0) | eval sev_label=case(severity="critical","● CRITICAL",severity="high","● HIGH",severity="medium","● MEDIUM",1==1,"● OK") | eval description=Criteria | eval bg_color=case(severity="critical","#DC4C5A",severity="high","#E0763E",severity="medium","#CFAF2B",1==1,"#3D9455") | eval Result=if(len(Result)>40, substr(Result,1,38)."..", Result) | table Health_Check, Result, description, severity, sev_label, is_critical, is_high, is_medium, is_ok, bg_color \
| where severity="critical" OR severity="high"

[insitzes_alert_indexer_cpu_memory]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - Indexer CPU & Memory
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 90% CPU (p95) or > 95% Memory (p95)\nHigh  |  > 80% CPU (p95) or > 90% Memory (p95)\nMedium  |  > 70% CPU (p95) or > 85% Memory (p95)\nOK  |  ≤ 70% CPU and ≤ 85% Memory\n\nWHAT IS THIS CHECK?\nMeasures the 95th percentile of CPU utilization and memory utilization across all indexers in your Splunk environment. The p95 metric means that 95% of the time, resource usage is at or below this value — it captures sustained high usage while filtering out brief spikes.\n\nWHY IT MATTERS\nIndexers are responsible for receiving, parsing, and storing all incoming data, as well as executing the distributed portion of searches. When indexer resources are saturated, both ingestion and search performance degrade simultaneously — data queues fill up (causing blocking), search results return slowly, and the system becomes unresponsive. Unlike search heads which primarily affect search performance, indexer saturation affects everything.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: CPU-saturated indexers process data slower, causing queue blocking and potential data loss; memory pressure causes swap usage which dramatically slows all operations\n- Storage: No direct storage increase, but I/O contention from high resource usage can cause hot bucket rotation issues\n- Compute: Searches take longer on resource-constrained indexers, consuming more compute per search; search results may be incomplete if indexers are too slow to respond within timeout windows
action.webhook.enable_allowlist = 1
alert.suppress = 1
alert.suppress.period = 24h
alert.track = 1
counttype = number of events
