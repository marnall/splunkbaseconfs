action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - WLM Aborted Searches
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 5% of searches aborted\nHigh  |  > 2% of searches aborted\nMedium  |  > 1% of searches aborted\nOK  |  ≤ 1% abort rate\n\nNote (Splunk Cloud): WLM configuration in Splunk Cloud is done through Splunk Web or the REST API — direct workload_pools.conf and workload_rules.conf file edits in remediation steps below apply to Splunk Enterprise only. REST-based steps apply to both platforms.\n\nWHAT IS THIS CHECK?\nMeasures the percentage of searches that were aborted by Workload Management (WLM) rules. WLM abort rules terminate searches that match specific criteria — typically long-running searches, searches from specific roles, or searches consuming excessive resources. This check calculates the average abort percentage over the monitoring period.\n\nWHY IT MATTERS\nAborted searches represent wasted compute. The search consumed compute and search slot time before being terminated, and it produced no results. A high abort rate means WLM rules are catching a significant volume of problematic searches, which indicates either that the rules are too aggressive or that there are systemic search quality issues driving searches to trigger abort conditions repeatedly.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: No direct ingest impact\n- Storage: No direct storage impact\n- Compute: Aborted searches consume compute up until the point of termination — this is pure waste since no results are produced; high abort rates indicate significant compute loss
