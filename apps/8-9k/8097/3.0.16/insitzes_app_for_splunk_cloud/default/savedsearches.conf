## ─── Health Check Alerts ───
## Each alert runs the same query as its corresponding health check
## and triggers when severity is critical or high.
## All disabled by default — enable via the dashboard toggle.

[insitzes_alert_splunkd_log_health]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - Splunkd Log Health
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 10% error ratio in splunkd logs\nHigh  |  > 5% error ratio\nMedium  |  > 2% error ratio OR > 20% warning ratio\nOK  |  ≤ 2% errors and ≤ 20% warnings\n\nNote: Results are limited to the latest 10,000 splunkd log events in the last 24 hours. Percentages reflect that window.\n\nWHAT IS THIS CHECK?\nAnalyzes the ratio of ERROR and WARN level messages in splunkd logs across your Splunk infrastructure. A healthy Splunk environment should have a low error-to-total ratio. Elevated error or warning percentages indicate underlying platform issues that may affect data processing, search performance, or system stability.\n\nWHY IT MATTERS\nSplunkd logs are the internal health telemetry of your Splunk deployment. Elevated error rates often precede visible problems — a rising error percentage today may indicate a forwarder SSL issue, a knowledge bundle replication failure, or a disk pressure condition that will cause outages or data loss if left unaddressed. Warning trends can signal degradation before it becomes critical.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: Errors related to data inputs, HEC, or forwarder connections can cause data loss or ingestion delays\n- Storage: No direct storage impact, but internal log volume itself consumes _internal index storage\n- Compute: Errors related to search processes (dispatch failures, knowledge bundle issues) can cause search failures that lead to retries, consuming additional compute
action.webhook.enable_allowlist = 1
alert.suppress = 1
alert.suppress.period = 24h
alert.track = 1
counttype = number of events
cron_schedule = 0 3 * * *
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = insitzes_app_for_splunk_cloud
request.ui_dispatch_view = search
search = index=_internal sourcetype=splunkd source="*splunkd.log" log_level IN ("ERROR","WARN") component=* (`insitzes_searchhead_hosts` OR `insitzes_indexer_hosts`) | fields log_level | stats count(eval(log_level="ERROR")) as error count(eval(log_level="WARN")) as warn count as total | eval error_perc=round(100*(error/total),2) | eval warn_perc=round(100*(warn/total),2) | eval Category="System" | eval Health_Check="Splunkd Log Health" | eval Criteria="Critical: >10% errors; High: >5% errors; Medium: >2% errors OR >20% warnings" | eval severity=case(error_perc>10,"critical",error_perc>5,"high",error_perc>2 OR warn_perc>20,"medium",1==1,"ok") | eval Result=coalesce(error,0)." errors (".coalesce(error_perc,0)."%), ".coalesce(warn,0)." warn" | eval is_critical=if(severity="critical",1,0), is_high=if(severity="high",1,0), is_medium=if(severity="medium",1,0), is_ok=if(severity="ok",1,0) | eval sev_label=case(severity="critical","● CRITICAL",severity="high","● HIGH",severity="medium","● MEDIUM",1==1,"● OK") | eval description=Criteria | eval bg_color=case(severity="critical","#DC4C5A",severity="high","#E0763E",severity="medium","#CFAF2B",1==1,"#3D9455") | eval Result=if(len(Result)>40, substr(Result,1,38)."..", Result) | table Health_Check, Result, description, severity, sev_label, is_critical, is_high, is_medium, is_ok, bg_color \
| where severity="critical" OR severity="high"

[insitzes_alert_apps_requiring_updates]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - Apps Requiring Updates
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  Any app is a major version behind\nHigh  |  Any app is a minor version behind\nMedium  |  Any app is a patch version behind\nOK  |  All apps up to date\n\nWHAT IS THIS CHECK?\nCompares installed app and add-on versions against the latest available versions on Splunkbase. Apps are categorized by the gap magnitude — major version gaps indicate significant feature or compatibility changes, minor version gaps indicate feature additions, and patch gaps indicate bug fixes or security patches.\n\nWHY IT MATTERS\nOutdated apps can contain known bugs, security vulnerabilities, or compatibility issues with your current Splunk version. Major version gaps are especially concerning as they may indicate missing critical security patches or incompatibility with current Splunk platform features. Splunk platform upgrades may deprecate APIs or change behaviors that older app versions depend on.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: Outdated TAs (Technology Add-ons) may have parsing bugs that cause incorrect data processing or data loss\n- Compute: Outdated apps may use deprecated or inefficient search commands that consume more compute than optimized versions; outdated dashboards may not leverage dashboard optimizations
action.webhook.enable_allowlist = 1
alert.suppress = 1
alert.suppress.period = 24h
alert.track = 1
counttype = number of events
cron_schedule = 0 3 * * *
disabled = 1
