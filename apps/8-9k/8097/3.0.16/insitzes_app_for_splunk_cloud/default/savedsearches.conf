search = index=_internal sourcetype=splunkd component=CacheManager action=download status=succeeded `insitzes_indexer_hosts` | bucket _time span=1d | stats sum(kb) as download_kb by _time host | stats avg(download_kb) as avg_daily_download_kb_per_host | eval avg_daily_download_gb_per_host=round(avg_daily_download_kb_per_host/1024/1024,2) | fillnull value=0 avg_daily_download_gb_per_host | eval Category="Ingestion" | eval Health_Check="Indexer Cache Churn" | eval Criteria="Critical: >=1000 GB/day per indexer; High: >=500; Medium: >=250" | eval severity=case(avg_daily_download_gb_per_host>=1000,"critical",avg_daily_download_gb_per_host>=500,"high",avg_daily_download_gb_per_host>=250,"medium",1==1,"ok") | eval Result=avg_daily_download_gb_per_host." GB/day avg per indexer" | eval is_critical=if(severity="critical",1,0), is_high=if(severity="high",1,0), is_medium=if(severity="medium",1,0), is_ok=if(severity="ok",1,0) | eval sev_label=case(severity="critical","● CRITICAL",severity="high","● HIGH",severity="medium","● MEDIUM",1==1,"● OK") | eval description=Criteria | eval bg_color=case(severity="critical","#DC4C5A",severity="high","#E0763E",severity="medium","#CFAF2B",1==1,"#3D9455") | eval Result=if(len(Result)>40, substr(Result,1,38)."..", Result) | table Health_Check, Result, description, severity, sev_label, is_critical, is_high, is_medium, is_ok, bg_color \
| where severity="critical" OR severity="high"

[insitzes_alert_index_governance]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - Index Governance
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 20% failing indexes OR > 10% license on failing indexes\nHigh  |  > 10% failing indexes OR > 5% license on failing indexes\nMedium  |  > 20% warning indexes OR > 10% license on warning indexes\nOK  |  All indexes compliant with governance policies\n\nNote: Severity is weighted by license consumption — a large number of poorly-governed indexes that collectively consume significant DDAS/DDAA capacity will elevate the severity grade.\n\nWHAT IS THIS CHECK?\nEvaluates every index in your environment against a composite governance score (0-100%) based on four dimensions:\n\nDimension  |  Weight  |  What it measures\n\nValue  |  40%  |  Search-to-GB ratio — are users actually searching this data?\nEfficiency  |  30%  |  Search activity volume — is this index actively used?\nConfiguration  |  15%  |  Sourcetype sprawl — is the index well-organized?\nQuality  |  15%  |  Parsing/timestamp errors — is the data clean?\n\nThe health check then joins each index's governance score with its storage forecast to determine what percentage of your DDAS and DDAA license is consumed by poorly-governed indexes. An unused index consuming 20% of your DDAS is far more urgent than one consuming 0.1%.\n\nWHY IT MATTERS\nPoorly-governed indexes represent wasted storage entitlement. Every GB stored in an index that nobody searches is license capacity that could be used for valuable data or avoided entirely to reduce costs. When multiple low-value indexes collectively consume a significant portion of your DDAS/DDAA license, you are paying for storage that delivers no analytical value.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Storage: Low-value indexes directly consume DDAS/DDAA license capacity without delivering proportional search value\n- Ingest: Indexes with high parsing errors or timestamp issues waste ingestion pipeline resources and may produce unreliable search results\n- Compute: Searches against poorly-organized indexes (high sourcetype sprawl) tend to be less efficient, consuming more compute per query\n- Cost: The combined license cost of storing, indexing, and retaining data that delivers minimal search value represents a direct optimization opportunity
