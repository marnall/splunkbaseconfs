action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 50 concurrency events per hour\nHigh  |  > 20 concurrency events per hour\nMedium  |  > 5 concurrency events per hour\nOK  |  ≤ 5 concurrency events per hour\n\nWHAT IS THIS CHECK?\nMonitors whether the Splunk search scheduler is hitting concurrency limits — the maximum number of simultaneous searches allowed to run. When limits are reached, new searches are skipped or delayed, creating a cascading impact on scheduled reports, alerts, and dashboard performance.\n\nWHY IT MATTERS\nSearch concurrency limits exist to prevent any single user or process from monopolizing search resources. When these limits are consistently hit, it indicates the environment is search-constrained — either too many searches are running, searches are taking too long, or the infrastructure needs scaling. Unlike a single slow search, concurrency saturation affects every user and every scheduled search on the platform.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Alerts: Security and operational alerts may not fire if the triggering search is skipped due to concurrency limits, creating detection blind spots\n- Reports: Scheduled reports and summary index populating searches are skipped, creating data gaps in dashboards and compliance reports\n- User Experience: Ad-hoc searches from the search bar queue behind scheduled searches, leading to slow response times and user frustration\n- Compute: In Splunk, concurrency saturation means compute capacity is fully consumed — additional search demand is simply dropped
