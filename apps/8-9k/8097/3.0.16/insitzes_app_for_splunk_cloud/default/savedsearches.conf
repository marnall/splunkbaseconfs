(severity="critical",1,0), is_high=if(severity="high",1,0), is_medium=if(severity="medium",1,0), is_ok=if(severity="ok",1,0) | eval sev_label=case(severity="critical","● CRITICAL",severity="high","● HIGH",severity="medium","● MEDIUM",1==1,"● OK") | eval description=Criteria | eval bg_color=case(severity="critical","#DC4C5A",severity="high","#E0763E",severity="medium","#CFAF2B",1==1,"#3D9455") | eval Result=if(len(Result)>40, substr(Result,1,38)."..", Result) | table Health_Check, Result, description, severity, sev_label, is_critical, is_high, is_medium, is_ok, bg_color \
| where severity="critical" OR severity="high"

