action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 100% of compute license (over license)\nHigh  |  > 90% of compute license\nMedium  |  > 80% of compute license\nOK  |  ≤ 80% compute utilization\n\nWHAT IS THIS CHECK?\nMeasures Splunk Virtual Compute (SVC) utilization against your licensed compute entitlement. SVCs represent the compute resources consumed by all search operations — ad-hoc searches, scheduled searches, dashboard loads, report generation, summary indexing, and data model acceleration. This check compares both peak and 24-hour SMA (simple moving average) utilization against your license limit, optimal threshold (80%), and degradation threshold (90%).\n\nWHY IT MATTERS\nSVCs are the compute currency of Splunk. Exceeding your compute license triggers overage charges. Even before hitting the limit, high compute utilization causes search performance degradation — searches queue longer, run slower, and may time out. This creates a cascade: slow dashboards lead to user refreshes which consume more compute, scheduled searches overlap and skip, and workload management rules start aborting or reclassifying searches.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: No direct ingest impact, but compute pressure may force you to disable or reduce frequency of data-processing scheduled searches\n- Storage: No direct storage impact\n- Compute: This IS the compute metric — exceeding license triggers overage charges; high utilization degrades search performance for all users, causes search queuing and timeouts, and triggers WLM throttling
