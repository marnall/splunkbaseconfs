action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 5 dashboards with high compute and no chain searches\nHigh  |  > 3 inefficient dashboards\nMedium  |  > 1 inefficient dashboard\nOK  |  All dashboards optimized\n\nWHAT IS THIS CHECK?\nIdentifies dashboards that consume significant compute (>0.25% of license) while using multiple independent searches instead of base and chain search patterns. Dashboards without chain searches run each panel's search independently, even when multiple panels query the same data. This check cross-references dashboard compute attribution with search pattern analysis to find optimization opportunities.\n\nWHY IT MATTERS\nDashboards are often the largest category of compute consumption because they run every time a user loads the page, and on auto-refresh schedules. A dashboard with 10 independent searches that could be consolidated into 2 base searches with 5 chains each would cut its search execution nearly in half. Across multiple users and refresh cycles, this compounds into significant compute waste.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: No direct ingest impact\n- Storage: No direct storage impact\n- Compute: This is a direct compute optimization opportunity — inefficient dashboards consume 2-5x more compute than necessary; the wasted compute from all flagged dashboards are summed in the health check result
