## ─── IDM CPU & Memory Alert ───
[insitzes_alert_idm_cpu_memory]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 6 * * *
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = insitzes_app_for_splunk_cloud
request.ui_dispatch_view = search
search = index=_introspection component=Hostwide data.mem_used=* `insitzes_idm_hosts` `insitzes_cloud_hosts` \
| fields data.cpu_user_pct,data.cpu_system_pct,data.mem,data.mem_used,host \
| rename "data.cpu_user_pct" as user_pct,"data.cpu_system_pct" as system_pct,"data.mem" as total_mem,"data.mem_used" as used_mem \
| eval cpu_perc_used=user_pct+system_pct \
| eval mem_perc_used=(used_mem/total_mem)*100 \
| stats perc95(cpu_perc_used) as p95_cpu perc95(mem_perc_used) as p95_mem \
| where p95_cpu>90 OR p95_mem>95

[insitzes_monitoring_ingestion_alert_by_idx]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 6 * * *
disabled = 1
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = insitzes_app_for_splunk_cloud
request.ui_dispatch_view = search
search = search earliest=-7d@h latest=-0h@h index=_internal sourcetype=splunkd source="*license_usage*" type=usage \
| fields _time idx st b \
| bucket _time span=1h \
| stats sum(b) as bytes by _time idx st \
| bucket _time span=1d \
| eval is_yesterday=if(_time>=relative_time(now(),"-1d@d") AND _time<relative_time(now(),"@d"),1,0) \
| stats sum(eval(if(is_yesterday=1,bytes,0))) as ingested_bytes sum(eval(if(is_yesterday=0,bytes,0))) as historical_bytes by _time idx is_yesterday \
| stats sum(eval(if(is_yesterday=1,ingested_bytes,0))) as ingested_bytes by idx \
| eval ingested_gb = ingested_bytes/1000/1000/1000 \
| join type=outer idx \
    [search earliest=-7d@h latest=-0h@h index=_internal sourcetype=splunkd source="*license_usage*" type=usage \
    | fields _time idx st b \
    | bucket _time span=1h \
    | stats sum(b) as bytes by _time idx st \
    | bucket _time span=1d \
    | where _time<relative_time(now(),"-1d@d") \
    | stats sum(bytes) as hist_bytes by _time idx \
    | eval hist_ingested_gb = hist_bytes/1000/1000/1000 \
    | stats avg(hist_ingested_gb) as hist_avg_ingested_gb perc95(hist_ingested_gb) as hist_perc95_ingested_gb by idx] \
| eval yest_ingested_gb=ingested_gb \
| eventstats sum(hist_avg_ingested_gb) as hist_total_avg_ingested_gb \
| eval volume_pct_of_total = round((yest_ingested_gb/hist_total_avg_ingested_gb)*100,2) \
| eval pct_diff_from_avg = round(((yest_ingested_gb - hist_avg_ingested_gb)/hist_avg_ingested_gb)*100,2) \
| eval exceeds_p95 = if(yest_ingested_gb > hist_perc95_ingested_gb, 1, 0) \
| eval severity = case( \
    yest_ingested_gb<1,"low", \
    volume_pct_of_total < 10, "low", \
    exceeds_p95=1 AND abs(pct_diff_from_avg) > 50, "critical", \
    abs(pct_diff_from_avg) > 50, "high", \
    abs(pct_diff_from_avg) > 25, "medium", \
    true(), "low") \
| stats count(eval(severity="low")) as "low" count(eval(severity="medium")) as "medium" count(eval(severity="high")) as "high" count(eval(severity="critical")) as "critical" \
| where critical >0

