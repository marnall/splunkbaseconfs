[insitzes_alert_wlm_filtered_searches]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - WLM Filtered Searches
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 10% of searches filtered\nHigh  |  > 5% of searches filtered\nMedium  |  > 1% of searches filtered\nOK  |  ≤ 1% filter rate\n\nWHAT IS THIS CHECK?\nMeasures the percentage of searches blocked by Workload Management (WLM) admission rules before they were allowed to run. Filtered searches are denied at the admission gate — they never start, consume no compute, and produce no results. This check calculates the peak filter percentage over the monitoring period using the prefilter_action="filter" field from WLM logs.\n\nWHY IT MATTERS\nA low filter rate is expected and healthy — WLM admission rules exist to protect the platform from resource exhaustion. A high filter rate, however, indicates that a significant portion of your search workload is being systematically blocked. This means users and scheduled searches are not getting results, dashboards are failing to load, and alerts may be silently skipping executions. Unlike aborted searches (which waste compute), filtered searches waste nothing computationally — but they represent a silent failure mode that is easy to miss.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: No direct ingest impact\n- Storage: No direct storage impact\n- Compute: Filtered searches consume zero compute — they are blocked before execution begins; however, a high filter rate may mask underlying compute pressure that is driving the admission rules to trigger
