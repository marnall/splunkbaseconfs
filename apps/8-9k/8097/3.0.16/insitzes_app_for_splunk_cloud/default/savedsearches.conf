action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  Any cluster of > 10 similar searches\nHigh  |  Any cluster of > 5 similar searches\nMedium  |  Any cluster of > 2 similar searches\nOK  |  No redundant search clusters detected\n\nWHAT IS THIS CHECK?\nDetects clusters of scheduled searches that perform substantially similar queries — searching the same indexes, sourcetypes, and time ranges with similar SPL patterns. These redundant searches waste compute resources by repeatedly fetching and processing the same underlying data independently rather than sharing a common base search.\n\nWHY IT MATTERS\nRedundant searches are a common byproduct of organic Splunk growth — different teams or users create similar saved searches independently without knowing duplicates exist. Each redundant search consumes its own search slot, executes its own MapReduce cycle across indexers, and consumes its own compute. Consolidating a cluster of 10 redundant searches into 1 base search can reduce that cluster's compute consumption by up to 90%.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: No direct ingest impact\n- Storage: No direct storage impact\n- Compute: Redundant searches multiply compute consumption proportionally — a cluster of N similar searches consumes roughly Nx the compute that a single consolidated search would
