action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  Any data models with acceleration errors\nHigh  |  Any data models stale (>24 hours behind)\nMedium  |  Any data models behind (>6 hours)\nOK  |  All accelerated data models are current\n\nWHAT IS THIS CHECK?\nMonitors the health of accelerated data models. Data model acceleration pre-computes summaries (tsidx files) so that | tstats and pivot queries run fast. When acceleration falls behind, errors out, or stalls, searches using those data models return stale or incomplete results — often without any visible error to the user.\n\nWHY IT MATTERS\nMany Splunk apps (Enterprise Security, ITSI, CIM-based dashboards) depend on accelerated data models. If acceleration fails silently, dashboards and alerts appear to work but show outdated data. A security dashboard showing "0 notable events" because the Threat Intelligence data model is 12 hours behind is worse than an obvious error — it creates false confidence.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Security: ES notable events, correlation searches, and threat dashboards depend on CIM data model acceleration. Stale models mean missed detections\n- Performance: When acceleration is behind, tstats queries fall back to raw search, causing dramatic slowdowns\n- Storage: Failed acceleration jobs may leave orphaned tsidx files consuming DDAS storage\n- Compute: Acceleration rebuild attempts consume significant compute, especially for large data models
