[insitzes_alert_ddas_utilization]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - DDAS Utilization
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 95% DDAS utilization (actual or forecasted)\nHigh  |  > 90% DDAS utilization\nMedium  |  > 80% DDAS utilization\nOK  |  ≤ 80% DDAS utilization\n\nWHAT IS THIS CHECK?\nMeasures your Dynamic Data Active Searchable (DDAS) storage utilization as a percentage of your licensed entitlement. DDAS represents all data that is immediately searchable in your Splunk environment. This check evaluates both your current actual utilization and a 30-day forecasted utilization based on trend projection, grading on whichever is higher. Storage consumption is calculated as daily uncompressed ingest volume multiplied by each index's retention period in days.\n\nWHY IT MATTERS\nDDAS is your primary storage entitlement in Splunk. When utilization exceeds your entitlement, Exceeding your entitlement triggers overage billing or search restrictions. Sustained overages require purchasing additional DDAS capacity. Running near capacity limits also reduces your ability to absorb unexpected ingestion spikes without financial impact.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: No direct ingest reduction, but overage charges create financial pressure to reduce volume or retention\n- Storage: Directly consumes your licensed DDAS allocation — each GB ingested multiplied by retention days equals DDAS consumed\n- Compute: No direct compute impact, but storage pressure often leads to shorter retention which forces more frequent restore operations from DDAA that consume compute
