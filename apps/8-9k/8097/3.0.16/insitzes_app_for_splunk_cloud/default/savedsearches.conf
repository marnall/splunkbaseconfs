search = index=_internal sourcetype=splunkd source=*metrics.log* group=queue `insitzes_indexer_hosts` name=indexqueue | fields host current_size_kb max_size_kb | eval fill_pct=(current_size_kb/max_size_kb)*100 | stats avg(fill_pct) as host_avg_fill perc90(fill_pct) as host_p90_fill by host | stats avg(host_avg_fill) as avg_fill max(host_p90_fill) as p90_fill | fillnull value=0 avg_fill p90_fill | eval Category="Ingestion" | eval Health_Check="Indexing Queue Fill" | eval Criteria="Critical: >90% p90; High: >75% p90; Medium: >50% avg" | eval severity=case(p90_fill>90,"critical",p90_fill>75,"high",avg_fill>50,"medium",1==1,"ok") | eval Result="Avg: ".round(avg_fill,1)."%, p90: ".round(p90_fill,1)."% fill" | eval is_critical=if(severity="critical",1,0), is_high=if(severity="high",1,0), is_medium=if(severity="medium",1,0), is_ok=if(severity="ok",1,0) | eval sev_label=case(severity="critical","● CRITICAL",severity="high","● HIGH",severity="medium","● MEDIUM",1==1,"● OK") | eval description=Criteria | eval bg_color=case(severity="critical","#DC4C5A",severity="high","#E0763E",severity="medium","#CFAF2B",1==1,"#3D9455") | eval Result=if(len(Result)>40, substr(Result,1,38)."..", Result) | table Health_Check, Result, description, severity, sev_label, is_critical, is_high, is_medium, is_ok, bg_color \
| where severity="critical" OR severity="high"

