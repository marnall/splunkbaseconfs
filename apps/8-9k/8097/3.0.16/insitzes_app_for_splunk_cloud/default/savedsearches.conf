[insitzes_alert_ddaa_utilization]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - DDAA Utilization
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 95% DDAA utilization (actual or forecasted)\nHigh  |  > 90% DDAA utilization\nMedium  |  > 80% DDAA utilization\nOK  |  ≤ 80% DDAA utilization\n\nWHAT IS THIS CHECK?\nMeasures your Dynamic Data Active Archive (DDAA) storage utilization as a percentage of your licensed entitlement. DDAA represents your cold/frozen tier archive storage — data that is retained for compliance or historical purposes but is not immediately searchable without a restoration operation. This check evaluates both actual and 30-day forecasted utilization, grading on whichever is higher.\n\nWHY IT MATTERS\nDDAA is your long-term retention tier. When archive utilization exceeds your entitlement, elastic expansion triggers overage charges. Unlike DDAS where you can adjust retention to reduce usage relatively quickly, DDAA overages require either purchasing more archive capacity or permanently deleting archived data — a decision that may have compliance implications.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: No direct ingest impact, but DDAA growth is driven by data rolling from DDAS to archive as it ages past the searchable retention period\n- Storage: Directly consumes your licensed DDAA allocation; data accumulates over time as more indexes age past their searchable retention window\n- Compute: Restore operations from DDAA to make archived data searchable consume compute — high archive utilization often correlates with more frequent restore requests
