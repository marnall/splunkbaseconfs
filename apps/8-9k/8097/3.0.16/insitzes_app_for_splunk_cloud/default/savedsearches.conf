[insitzes_alert_search_head_cpu_memory]
action.email = 1
action.email.to =
action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - Search Head CPU & Memory
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 90% CPU (p95) or > 95% Memory (p95)\nHigh  |  > 80% CPU (p95) or > 90% Memory (p95)\nMedium  |  > 70% CPU (p95) or > 85% Memory (p95)\nOK  |  ≤ 70% CPU and ≤ 85% Memory\n\nWHAT IS THIS CHECK?\nMeasures the 95th percentile of CPU and memory utilization across all search heads in your Splunk environment. Evaluates each search head individually and reports severity based on the worst-performing member. In a search head cluster (SHC), all members should show similar resource profiles — a single outlier may indicate an issue specific to that node.\n\nWHY IT MATTERS\nSearch heads coordinate all search operations — they parse SPL, dispatch searches to indexers, merge results, and render visualizations. When search head resources are saturated, users experience slow dashboard loads, search timeouts, and scheduler delays. In an SHC, a saturated member can cause uneven load distribution and cascading performance issues across the cluster.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: No direct ingest impact; search heads do not process incoming data\n- Storage: No direct storage impact\n- Compute: Search head CPU/memory saturation directly increases compute consumption — searches take longer to coordinate, results merge more slowly, and search head overhead per search increases; scheduler delays cause search pile-ups that compound the problem
action.webhook.enable_allowlist = 1
alert.suppress = 1
alert.suppress.period = 24h
alert.track = 1
counttype = number of events
cron_schedule = 0 3 * * *
disabled = 1
