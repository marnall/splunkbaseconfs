action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 10 all-time searches completed in 24 hours\nHigh  |  > 5 all-time searches in 24 hours\nMedium  |  > 1 all-time search in 24 hours\nOK  |  0 all-time searches in 24 hours\n\nWHAT IS THIS CHECK?\nCounts completed searches where both search_et and search_lt are "N/A" and searched_buckets > 0 in the audit log over the last 24 hours. These are searches with no time boundaries — they scan every bucket across every index from the beginning of time to now. Even a single all-time search can saturate indexer I/O and hold search head resources for tens of minutes.\n\nWHY IT MATTERS\nAll-time searches are the single most expensive type of Splunk search. Because they have no earliest or latest bound, Splunk must examine every bucket in every index on every indexer — including data that is years old and completely irrelevant to the query. The scan count for an all-time search on a mature environment routinely runs into the billions of events. They hold search slots on the search head for the full duration, block indexers with sustained read operations, and consume compute at a rate that can spike the environment-wide resource utilization for a single search. Even one all-time search per day warrants investigation.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Search head capacity: Holds a search slot for the entire (often very long) run duration\n- Indexer load: Forces every indexer peer to scan all buckets — including cold and frozen-thaw buckets — driving up disk I/O and potentially triggering SmartStore downloads\n- Compute: An all-time search over a 2-year retention environment can consume 100x the SVC credits of an equivalent time-bounded search
