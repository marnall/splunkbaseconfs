action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 10 sources with > 10% debug events\nHigh  |  > 5 sources with > 10% debug events\nMedium  |  > 0 sources with > 10% debug events\nOK  |  No sources with excessive debug events\n\nWHAT IS THIS CHECK?\nIdentifies index/sourcetype combinations where more than 10% of events in the last 24 hours contain the literal term "DEBUG". High debug ratios indicate that applications are sending verbose debug-level logging into Splunk, inflating volume without adding operational value for most use cases.\n\nWHY IT MATTERS\nDebug logging is typically the most verbose logging level — it can generate 2-10x more events than INFO or WARN levels. In production Splunk environments, debug data rarely provides value for operational monitoring or security detection, yet it consumes the same license, storage, and compute resources as high-value data. This is one of the most common sources of unnecessary cost in Splunk deployments.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: Debug logging directly and significantly inflates daily ingest license consumption — often the single largest source of low-value volume\n- Storage: Every debug event consumes DDAS for its full retention period, consuming storage that could be used for higher-value data\n- Compute: Searches against sourcetypes with high debug ratios are slower and consume more compute because they scan through debug noise to find actionable events; stats/aggregation commands process more rows unnecessarily
