action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  Any lookup files exceeding size threshold\nHigh  |  N/A\nMedium  |  N/A\nOK  |  No oversized lookup files\n\nWHAT IS THIS CHECK?\nDetects CSV lookup files that exceed Splunk's knowledge bundle size thresholds. Large lookups are flagged in splunkd logs when they approach or exceed the bundle replication limits. In a search head cluster, oversized lookups must be replicated to all members and distributed to all indexers via the knowledge bundle, creating significant overhead.\n\nWHY IT MATTERS\nLarge lookup files affect multiple aspects of Splunk performance. They slow knowledge bundle replication between search head cluster members, increase bundle distribution time to indexers, consume memory when loaded for search-time lookups, and can cause search failures if the bundle exceeds size limits. Lookups above the maximum threshold are quarantined and not replicated at all.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: No direct ingest impact\n- Storage: Large lookups consume storage on every search head cluster member (replicated) and every indexer (via knowledge bundle)\n- Compute: Searches using large lookups consume more compute — the lookup must be loaded into memory for each search, and larger lookups take longer to scan; knowledge bundle distribution delays can also slow search dispatch
