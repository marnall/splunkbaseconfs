action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  > 50 TLS errors in 24 hours\nHigh  |  > 20 TLS errors in 24 hours\nMedium  |  Any TLS errors detected (> 0)\nOK  |  No TLS errors\n\nWHAT IS THIS CHECK?\nMonitors for TLS/SSL errors across your Splunk infrastructure including certificate validation failures, expired certificates, SSL handshake errors, and rejected forwarder connections. These errors indicate that encrypted communication between Splunk components is failing, which can cause silent data loss when forwarders cannot deliver data.\n\nWHY IT MATTERS\nTLS errors mean data is not flowing securely — or not flowing at all. Expired certificates cause forwarders to be rejected by indexers, resulting in data loss. Handshake failures can indicate protocol mismatches (e.g., TLS 1.0 vs 1.2), misconfigured cipher suites, or certificate authority trust issues. These problems are often silent from the user's perspective — dashboards simply stop updating.\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Ingest: Failed TLS connections directly cause data loss — forwarders cannot deliver events to indexers\n- Storage: No direct impact, but lost data cannot be recovered\n- Compute: No direct compute impact, but missing data causes incomplete search results and missed alerts
