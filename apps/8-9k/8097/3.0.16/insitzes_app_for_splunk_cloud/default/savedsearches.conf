action.email.useNSSubject = 1
action.email.format = plain
action.email.subject.alert = InSitzes - Indexer Cache Churn
action.email.message.alert = HEALTH CHECK CRITERIA\nSeverity  |  Threshold\n\nCritical  |  >= 1000 GB/day downloaded per indexer\nHigh  |  >= 500 GB/day per indexer\nMedium  |  >= 250 GB/day per indexer\nOK  |  < 250 GB/day per indexer\n\nWHAT IS THIS CHECK?\nMeasures the average daily SmartStore cache refill volume per indexer, derived from CacheManager `action=download` events in splunkd.log. Every time an indexer has a cache miss it downloads the required bucket file(s) from remote storage (S3). Summing the `kb` field per download event across the 7-day window and dividing by 7 days and the indexer count yields the average GB/day each indexer is refilling.\n\nWHY IT MATTERS\nSplunk uses SmartStore where each indexer keeps a local cache of hot bucket files. Consistent high download volume means searches are routinely hitting buckets that are no longer cached, forcing S3 round-trips.\n\n- Search latency: Every cache miss adds network round-trip time to S3, directly slowing search results\n- Increased costs: High download volumes from S3 increase data transfer costs\n- Indexer resource contention: Cache management operations compete with indexing and search workloads for CPU, memory, and disk I/O\n\nHOW IT IMPACTS YOUR ENVIRONMENT\n- Search: High churn directly correlates with slower search response times, especially for historical searches that span data beyond the cache window\n- Indexing: During periods of heavy cache eviction and re-download, indexing throughput may be reduced as disk I/O is shared between caching operations and the indexing pipeline\n- User Experience: Users running searches over time ranges larger than the effective cache window will experience inconsistent and degraded performance
action.webhook.enable_allowlist = 1
alert.suppress = 1
alert.suppress.period = 24h
alert.track = 1
