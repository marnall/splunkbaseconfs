[postrecord-command]
syntax = postrecord finding_id_field=<field> response_field=<field>
shortdesc = Posts an LLM response as a note to a specific Splunk ES finding.
description = This command extracts the finding ID and response text from the specified \
              fields in your events, and posts the text as a note to the corresponding \
              Splunk ES finding via the sn/v2/findings/{finding_id}/notes endpoint.
usage = public
example1 = | postrecord finding_id_field=notable_id response_field=gemini_response
comment1 = Takes the value inside 'gemini_response' and posts it to the finding ID located in 'notable_id'.
tags = post api es finding note
maintainer = Your Name/Team