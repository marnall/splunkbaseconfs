
[Post Comments with LLM Response]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */2 * * * *
description = ``` spl\
# ==============================================================================\
# Scheduled Search: Gemini AI - Notable Event Enrichment\
# Description: This search retrieves recent Notable Events and passes their \
# context to the Gemini AI for analysis. The resulting AI insights are then \
# extracted and pushed directly into the Splunk ES Mission Control.\
#\
# Custom Command Usage: \
# The '| postrecord' command takes the 'event_id' and 'gemini_response' fields\
# and makes an API POST request to the /v2/investigations/{rule_id}/notes \
# endpoint, attaching the AI analysis as a note to the corresponding finding.\
# ==============================================================================
dispatch.earliest_time = -10m@m
dispatch.latest_time = -1m@m
enableSched = 1
search = index=notable gemini_response=*\
| head 100\
| eval event_id = if(isnotnull(source_event_id), source_event_id, replace(_bkt,".*~(.+)","\1")."@@".index."@@".md5(_time._raw)),rule_id=event_id\
| fields event_id gemini_response\
| eval gemini_response = gemini_response\
| join type=left event_id [search index="_audit" source=mc_notes\
                            | rex field=_raw "(?<event_id>(?<=notable_id).+?(?=,))"\
                            | eval event_id = replace(event_id,"\\\|\"|\s+|:","")\
                            | eval has_comment = 1\
                            ]\
| where isnull(has_comment)\
| postrecord finding_id_field=event_id response_field=gemini_response
disabled = 1
