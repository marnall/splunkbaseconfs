[eventlab_get_model(1)]
args = name
definition = | inputlookup eventlab_models_lookup where name="$name$"
description = Retrieve a model by name from eventlab_models_lookup

[eventlab_active_jobs]
definition = | inputlookup eventlab_jobs_lookup where status="processing" OR status="pending"
description = Get all active (processing or pending) jobs

[eventlab_synthetic_events(2)]
args = sourcetype, earliest
definition = search index=synthetic_events sourcetype=$sourcetype$ earliest=$earliest$
description = Search synthetic events by sourcetype and time range

[eventlab_quality_latest(1)]
args = model_name
definition = | inputlookup eventlab_quality_lookup where model_name="$model_name$" | sort -created_at | head 1
description = Get the latest quality report for a model

[eventlab_generation_rate]
definition = search index=synthetic_events earliest=-1h | timechart span=1m count
description = Display generation rate over the last hour
