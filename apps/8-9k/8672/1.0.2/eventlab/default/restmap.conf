[script:eventlab_v1_chat]
match = /eventlab/v1/chat
script = handlers/chat_handler.py
scripttype = persist
handler = handlers.chat_handler.EventLabChatHandler
handlertype = python
requireAuthentication = true
python.version = python3
python.required = true
passPayload = true
