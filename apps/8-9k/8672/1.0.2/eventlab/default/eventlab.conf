[hec]
token = <YOUR_HEC_TOKEN>
host = localhost
port = 8088
ssl = true
# HEC on localhost uses Splunk's self-signed certificate by default.
# Set to true only if you have installed a CA-signed certificate on the HEC endpoint.
verify_ssl = true
batch_size = 50
max_workers = 10

[ai]
provider = azure_openai
model = gpt-4o
temperature = 0.3
max_tokens = 16384
max_turns = 8

[generation]
default_count = 1000
default_rate = 100
max_duration = 86400
default_index = synthetic_events

[quality]
excellent_threshold = 90
good_threshold = 75
acceptable_threshold = 60
sample_size = 1000

[logging]
level = INFO
max_file_size_mb = 25

[rate_limiting]
chat_max_requests = 30
chat_window_seconds = 60
health_max_requests = 60
health_window_seconds = 60
