# EventLab RBAC Configuration
# Defines capabilities and roles for EventLab Splunk app

# ============================================================================
# EventLab Capabilities
# ============================================================================

# Read-only access: view dashboards, history, models
[capability::eventlab_read]

# Generate events, run quality assessments, use chat
[capability::eventlab_generate]

# Full system access: configure providers, settings, advanced features
[capability::eventlab_admin]

# Manage data models and model configuration
[capability::eventlab_manage_models]

# Create, edit, delete generation schedules
[capability::eventlab_manage_schedules]

# Access EventLab chat interface
[capability::eventlab_use_chat]

# ============================================================================
# EventLab Roles
# ============================================================================

# EventLab Viewer — read-only access to dashboards, history, and models
[role_eventlab_viewer]
importRoles = user
eventlab_read = enabled

# EventLab Analyst — can generate events, run assessments, use chat
[role_eventlab_analyst]
importRoles = eventlab_viewer
eventlab_generate = enabled
eventlab_use_chat = enabled

# EventLab Power User — can manage models, schedules, scenarios
[role_eventlab_power]
importRoles = eventlab_analyst
eventlab_manage_models = enabled
eventlab_manage_schedules = enabled

# EventLab Admin — full access including provider config and system settings
[role_eventlab_admin]
importRoles = eventlab_power
eventlab_admin = enabled

# ============================================================================
# Grant EventLab capabilities to built-in Splunk roles
# ============================================================================

# Splunk admin gets full EventLab access
[role_admin]
eventlab_read = enabled
eventlab_generate = enabled
eventlab_admin = enabled
eventlab_manage_models = enabled
eventlab_manage_schedules = enabled
eventlab_use_chat = enabled

# Splunk power users get analyst-level access
[role_power]
eventlab_read = enabled
eventlab_generate = enabled
eventlab_use_chat = enabled

# Splunk regular users get read-only access
[role_user]
eventlab_read = enabled
