# ---------------------------------------------------------------------------
# Chat worker — polls KV Store for pending jobs and processes via LLM agent
# ---------------------------------------------------------------------------
[script://$SPLUNK_HOME/etc/apps/eventlab/bin/core/chat_worker.py]
disabled = 0
interval = 1
passAuth = splunk-system-user
sourcetype = eventlab:chat_worker
index = _internal
python.version = python3
python.required = true

# ---------------------------------------------------------------------------
# Stream manager — generates events at target EPS for active streams
# ---------------------------------------------------------------------------
[script://$SPLUNK_HOME/etc/apps/eventlab/bin/core/stream_manager.py]
disabled = 0
interval = 5
passAuth = splunk-system-user
sourcetype = eventlab:stream_manager
index = _internal
python.version = python3
python.required = true

