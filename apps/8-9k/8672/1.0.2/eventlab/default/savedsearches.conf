[EventLab - Active Jobs]
search = index=_internal sourcetype=eventlab:* status=processing
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = false
enableSched = 0

[EventLab - Generation Volume (24h)]
search = index=synthetic_events earliest=-24h | stats count by sourcetype
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = false
enableSched = 0

[EventLab - Quality Trends]
search = | inputlookup eventlab_quality_lookup | sort -created_at | head 50
dispatch.earliest_time = -30d
dispatch.latest_time = now
disabled = false
enableSched = 0

[EventLab - Stale Jobs Cleanup]
search = | inputlookup eventlab_jobs_lookup | where status="processing" AND (now()-started_at)>3600 | fields _key, job_type, model_name, user, created_at
cron_schedule = 0 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = false
enableSched = 1
alert.severity = 1
