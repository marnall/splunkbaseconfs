[admin:TA-elastic-search_configuration]
match = /
members = TA-elastic-search_account, TA-elastic-search_settings

[admin:TA-elastic-search_inputs]
match = /
members = TA-elastic-search_elastic_data_input

[admin_external:TA-elastic-search_account]
handlertype = python
python.version = python3
handlerfile = TA-elastic-search_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA-elastic-search_settings]
handlertype = python
python.version = python3
handlerfile = TA-elastic-search_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA-elastic-search_elastic_data_input]
handlertype = python
python.version = python3
handlerfile = TA-elastic-search_rh_elastic_data_input.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
