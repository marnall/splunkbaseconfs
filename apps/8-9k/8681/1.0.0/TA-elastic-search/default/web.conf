[expose:TA-elastic-search_account]
pattern = TA-elastic-search_account
methods = POST, GET

[expose:TA-elastic-search_account_specified]
pattern = TA-elastic-search_account/*
methods = POST, GET, DELETE

[expose:TA-elastic-search_settings]
pattern = TA-elastic-search_settings
methods = POST, GET

[expose:TA-elastic-search_settings_specified]
pattern = TA-elastic-search_settings/*
methods = POST, GET, DELETE

[expose:TA-elastic-search_elastic_data_input]
pattern = TA-elastic-search_elastic_data_input
methods = POST, GET

[expose:TA-elastic-search_elastic_data_input_specified]
pattern = TA-elastic-search_elastic_data_input/*
methods = POST, GET, DELETE

[expose:data/indexes]
pattern = data/indexes
methods = GET
