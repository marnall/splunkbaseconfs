[pihole_query_types]
filename = pihole_query_types.csv
max_matches = 1
min_matches = 1
default_match = Unknown

[pihole_blocked_domains]
# Transform for extracting blocked domains (gravity, exact, special)
REGEX = (?:gravity\s+blocked|exactly\s+denied|special\s+domain|Apple\s+iCloud\s+Private\s+Relay\s+domain|Designated\s+Resolver\s+domain|is\s+0\.0\.0\.0|is\s+::)\s+(\S+)
FORMAT = blocked_domain::$1
WRITE_META = true

[pihole_forwarded_domains]
# Transform for extracting forwarded domains
REGEX = forwarded\s+(\S+)
FORMAT = forwarded_domain::$1
WRITE_META = true

[pihole_rate_limited_domains]
# Transform for extracting rate-limited domains
REGEX = Rate-limiting\s+(\S+)
FORMAT = rate_limited_domain::$1
WRITE_META = true

[pihole_cached_stale_domains]
# Transform for extracting cached-stale domains
REGEX = cached-stale\s+(\S+)
FORMAT = cached_stale_domain::$1
WRITE_META = true

[pihole_dns_response]
# Transform for extracting DNS response types
REGEX = \s+is\s+(NODATA(?:-IPv6)?|NXDOMAIN|<CNAME>|<HTTPS>|REFUSED)
FORMAT = dns_response_type::$1
WRITE_META = true
