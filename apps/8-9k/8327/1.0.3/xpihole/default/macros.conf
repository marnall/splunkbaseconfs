# =============================================================================
# xPi-Hole Search Macros
# =============================================================================
# These macros allow dashboards to use configurable index and sourcetype values.
# Users can override these in local/macros.conf or via the Configuration page.
# =============================================================================

# Main index macro - defaults to main, can be overridden
[pihole_index]
definition = index=main
iseval = 0

# Sourcetype for DNS query logs
[pihole_sourcetype]
definition = sourcetype="pihole:log"
iseval = 0

# Combined base search for Pi-Hole DNS logs
[pihole_base]
definition = `pihole_index` `pihole_sourcetype`
iseval = 0

# Sourcetype for FTL logs
[pihole_ftl_sourcetype]
definition = sourcetype="pihole:ftl"
iseval = 0

# Combined base search for FTL logs
[pihole_ftl_base]
definition = `pihole_index` `pihole_ftl_sourcetype`
iseval = 0

# Sourcetype for Gravity update logs
[pihole_gravity_sourcetype]
definition = sourcetype="pihole:updateGravity"
iseval = 0

# Combined base search for Gravity logs
[pihole_gravity_base]
definition = `pihole_index` `pihole_gravity_sourcetype`
iseval = 0

# Sourcetype for Web interface logs
[pihole_web_sourcetype]
definition = sourcetype="pihole:web"
iseval = 0

# Combined base search for Web logs
[pihole_web_base]
definition = `pihole_index` `pihole_web_sourcetype`
iseval = 0
