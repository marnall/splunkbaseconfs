# =============================================================================
# xPi-Hole Configuration Settings
# =============================================================================
# This file contains default settings for the xPi-Hole app.
# Users can override these settings via the Configuration page in the UI.
# =============================================================================

[logging]
# Index where Pi-Hole logs are stored
index = main

# Sourcetypes for different Pi-Hole log types
sourcetype_log = pihole:log
sourcetype_ftl = pihole:ftl
sourcetype_gravity = pihole:updateGravity
sourcetype_web = pihole:web
