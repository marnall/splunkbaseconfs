# Pi-Hole log monitoring configuration
# This file defines how Splunk should monitor Pi-Hole log files

# =============================================================================
# Pi-Hole Log Monitoring Configuration
# =============================================================================
# Sourcetypes:
#   pihole:log          - Main DNS query log (dnsmasq)
#   pihole:ftl          - FTL daemon log
#   pihole:updateGravity - Gravity database update log
#   pihole:web          - Web interface/API log
# =============================================================================

# Monitor the main Pi-Hole DNS query log
[monitor:///var/log/pihole.log]
disabled = false
sourcetype = pihole:log
index = main
# Use a dedicated index for better performance:
# index = pihole

# Monitor Pi-Hole FTL daemon log
[monitor:///var/log/pihole-FTL.log]
disabled = false
sourcetype = pihole:ftl
index = main
# Use a dedicated index for better performance:
# index = pihole

# Monitor Gravity update log
[monitor:///var/log/pihole/updateGravity.log]
disabled = true
sourcetype = pihole:updateGravity
index = main

# Monitor Pi-Hole web interface log
[monitor:///var/log/lighttpd/pihole_access.log]
disabled = true
sourcetype = pihole:web
index = main

# Alternative paths for Pi-Hole logs in Docker environments
[monitor:///var/log/pihole/pihole.log]
disabled = true
sourcetype = pihole:log
index = main

[monitor:///var/log/pihole/pihole-FTL.log]
disabled = true
sourcetype = pihole:ftl
index = main

# For custom log locations, create a local/inputs.conf file
# Never modify default configuration files directly
