# =============================================================================
# Pi-Hole DNS Query Log (pihole:log)
# Main DNS query/response log from dnsmasq
# =============================================================================
[pihole:log]
SHOULD_LINEMERGE = false
TRUNCATE = 0
TIME_PREFIX = ^
TIME_FORMAT = %b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 20
LINE_BREAKER = ([\r\n]+)

# Field extractions for dnsmasq query logs
# Format: timestamp dnsmasq[pid]: query[type] domain from client_ip
EXTRACT-pihole_query = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+query\[(?<query_type>[^\]]+)\]\s+(?<domain>\S+)\s+from\s+(?<client_ip>[\d\.]+)

# Extract forwarded queries
# Format: timestamp dnsmasq[pid]: forwarded domain to upstream_ip
EXTRACT-pihole_forwarded = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+forwarded\s+(?<domain>\S+)\s+to\s+(?<upstream_ip>[\d\.]+)

# Extract cached responses
# Format: timestamp dnsmasq[pid]: cached domain is ip_address
EXTRACT-pihole_cached = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+cached\s+(?<domain>\S+)\s+is\s+(?<ip_address>[\S]+)

# Extract cached-stale responses (stale cache entries being served while refreshing)
# Format: timestamp dnsmasq[pid]: cached-stale domain is ip_address
EXTRACT-pihole_cached_stale = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+cached-stale\s+(?<domain>\S+)\s+is\s+(?<ip_address>[\S]+)

# Extract reply responses
# Format: timestamp dnsmasq[pid]: reply domain is ip_address (IPv4/IPv6/NODATA/NXDOMAIN/<CNAME>/<HTTPS>)
EXTRACT-pihole_reply = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+reply\s+(?<domain>\S+)\s+is\s+(?<ip_address>[\S]+)

# Extract gravity blocked domains
# Format: timestamp dnsmasq[pid]: gravity blocked domain is 0.0.0.0
EXTRACT-pihole_gravity = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+(?<block_type>gravity)\s+blocked\s+(?<domain>\S+)

# Extract exactly denied domains (exact match blocklist)
# Format: timestamp dnsmasq[pid]: exactly denied domain is 0.0.0.0
# Format: timestamp dnsmasq[pid]: exactly denied (CNAME) domain is 0.0.0.0
EXTRACT-pihole_exactly_denied = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+(?<block_type>exactly)\s+denied\s+(?:\((?<cname_block>CNAME)\)\s+)?(?<domain>\S+)\s+is\s+(?<ip_address>[\S]+)

# Extract Rate-limiting events
# Format: timestamp dnsmasq[pid]: Rate-limiting domain is REFUSED (EDE: blocked)
EXTRACT-pihole_rate_limit = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+Rate-limiting\s+(?<domain>\S+)\s+is\s+(?<rate_limit_status>REFUSED)\s*(?:\(EDE:\s*(?<ede_code>[^\)]+)\))?

# Extract special domain handling (Apple Private Relay, etc.)
# Format: timestamp dnsmasq[pid]: special domain mask.icloud.com is NXDOMAIN
EXTRACT-pihole_special_domain = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+special\s+domain\s+(?<domain>\S+)\s+is\s+(?<dns_response>\S+)

# Extract Apple iCloud Private Relay blocking
# Format: timestamp dnsmasq[pid]: Apple iCloud Private Relay domain mask.icloud.com is NXDOMAIN
EXTRACT-pihole_apple_private_relay = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+(?<block_type>Apple\s+iCloud\s+Private\s+Relay)\s+domain\s+(?<domain>\S+)\s+is\s+(?<dns_response>\S+)

# Extract Designated Resolver domain handling
# Format: timestamp dnsmasq[pid]: Designated Resolver domain _dns.resolver.arpa is NODATA
EXTRACT-pihole_designated_resolver = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+(?<block_type>Designated\s+Resolver)\s+domain\s+(?<domain>\S+)\s+is\s+(?<dns_response>\S+)

# Extract /etc/hosts file lookups
# Format: timestamp dnsmasq[pid]: /etc/hosts ip_address is hostname
EXTRACT-pihole_etc_hosts = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+(?<source>/etc/hosts)\s+(?<ip_address>[\d\.]+)\s+is\s+(?<domain>\S+)

# Extract blocked domains (general)
# Format: timestamp dnsmasq[pid]: domain is 0.0.0.0
EXTRACT-pihole_blocked = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+(?<domain>\S+)\s+is\s+0\.0\.0\.0

# Extract DNS response type from replies (NODATA, NXDOMAIN, CNAME, HTTPS, IPv6 responses)
EXTRACT-pihole_dns_response_type = \s+is\s+(?<dns_response>NODATA(?:-IPv6)?|NXDOMAIN|<CNAME>|<HTTPS>|REFUSED)

# Extract config lines
EXTRACT-pihole_config = ^(?<log_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+dnsmasq\[(?<pid>\d+)\]:\s+(?<config_action>.+)

# Lookups for query types
LOOKUP-query_type_description = pihole_query_types query_type OUTPUT query_type_description

# Event types categorization - comprehensive action classification
EVAL-action = case( \
    match(_raw, "gravity blocked"), "blocked", \
    match(_raw, "exactly denied"), "blocked", \
    match(_raw, "Apple iCloud Private Relay"), "blocked", \
    match(_raw, "Designated Resolver"), "blocked", \
    match(_raw, "special domain"), "blocked", \
    match(_raw, "Rate-limiting"), "rate_limited", \
    match(_raw, "is 0\.0\.0\.0"), "blocked", \
    match(_raw, "is ::$"), "blocked", \
    match(_raw, "forwarded"), "forwarded", \
    match(_raw, "cached-stale"), "cached_stale", \
    match(_raw, "cached"), "cached", \
    match(_raw, "reply"), "reply", \
    match(_raw, "/etc/hosts"), "local_lookup", \
    match(_raw, "query\["), "query", \
    1=1, "other" \
)

# Block source classification
EVAL-block_source = case( \
    match(_raw, "gravity blocked"), "gravity", \
    match(_raw, "exactly denied"), "exact_match", \
    match(_raw, "Apple iCloud Private Relay"), "apple_private_relay", \
    match(_raw, "Designated Resolver"), "designated_resolver", \
    match(_raw, "special domain"), "special_domain", \
    match(_raw, "Rate-limiting"), "rate_limit", \
    1=1, null() \
)

# =============================================================================
# CIM (Common Information Model) Field Aliasing - Network Resolution (DNS) Data Model
# Reference: https://docs.splunk.com/Documentation/CIM/latest/User/NetworkResolutionDNS
# =============================================================================

# Source fields
FIELDALIAS-src_ip = client_ip AS src
FIELDALIAS-src_for_cim = client_ip AS src_ip
FIELDALIAS-src_host = client_ip AS src_host

# Destination/Query fields
FIELDALIAS-dest = domain AS dest
FIELDALIAS-query = domain AS query
FIELDALIAS-query_name = domain AS name
FIELDALIAS-record_type = query_type AS record_type

# Answer/Response fields
FIELDALIAS-answer = ip_address AS answer
FIELDALIAS-resolved_ip = ip_address AS resolved_ip

# DNS Server fields (upstream resolver)
FIELDALIAS-dest_ip = upstream_ip AS dest_ip
FIELDALIAS-dest_host = upstream_ip AS dest_host

# Message type classification
EVAL-message_type = case( \
    match(_raw, "query\["), "Query", \
    match(_raw, "reply"), "Response", \
    match(_raw, "forwarded"), "Query", \
    match(_raw, "cached-stale"), "Response", \
    match(_raw, "cached"), "Response", \
    match(_raw, "gravity blocked"), "Response", \
    match(_raw, "exactly denied"), "Response", \
    match(_raw, "Rate-limiting"), "Response", \
    match(_raw, "special domain"), "Response", \
    match(_raw, "Apple iCloud Private Relay"), "Response", \
    match(_raw, "Designated Resolver"), "Response", \
    1=1, "Query" \
)

# DNS reply code mapping (CIM reply_code field)
EVAL-reply_code = case( \
    match(_raw, "is NXDOMAIN"), "NXDOMAIN", \
    match(_raw, "is NODATA"), "NODATA", \
    match(_raw, "is NODATA-IPv6"), "NODATA", \
    match(_raw, "is REFUSED"), "REFUSED", \
    match(_raw, "is 0\.0\.0\.0"), "NOERROR", \
    match(_raw, "is ::"), "NOERROR", \
    match(_raw, "reply.*is \d+\.\d+\.\d+\.\d+"), "NOERROR", \
    match(_raw, "reply.*is [0-9a-fA-F:]+"), "NOERROR", \
    match(_raw, "reply.*is <CNAME>"), "NOERROR", \
    match(_raw, "reply.*is <HTTPS>"), "NOERROR", \
    match(_raw, "cached"), "NOERROR", \
    1=1, null() \
)

# Transport protocol (DNS typically uses UDP, port 53)
EVAL-transport = "udp"
EVAL-dest_port = 53
EVAL-src_port = null()
EVAL-app = "dns"

# Vendor/Product identification
EVAL-vendor = "Pi-hole"
EVAL-product = "Pi-hole DNS"
EVAL-vendor_product = "Pi-hole DNS"

# =============================================================================
# OCSF (Open Cybersecurity Schema Framework) Field Mapping
# Reference: https://schema.ocsf.io/1.0.0/classes/dns_activity
# Class: DNS Activity (class_uid: 4003)
# =============================================================================

# OCSF Activity ID mapping (1=Query, 2=Response, 6=Traffic)
EVAL-activity_id = case( \
    match(_raw, "query\["), 1, \
    match(_raw, "forwarded"), 6, \
    match(_raw, "reply"), 2, \
    match(_raw, "cached-stale"), 2, \
    match(_raw, "cached"), 2, \
    match(_raw, "gravity blocked"), 2, \
    match(_raw, "exactly denied"), 2, \
    match(_raw, "Rate-limiting"), 2, \
    match(_raw, "special domain"), 2, \
    match(_raw, "Apple iCloud Private Relay"), 2, \
    match(_raw, "Designated Resolver"), 2, \
    match(_raw, "/etc/hosts"), 2, \
    1=1, 0 \
)

# OCSF Activity Name
EVAL-activity_name = case( \
    match(_raw, "query\["), "Query", \
    match(_raw, "forwarded"), "Traffic", \
    match(_raw, "reply"), "Response", \
    match(_raw, "cached-stale"), "Response", \
    match(_raw, "cached"), "Response", \
    match(_raw, "gravity blocked"), "Response", \
    match(_raw, "exactly denied"), "Response", \
    match(_raw, "Rate-limiting"), "Response", \
    match(_raw, "special domain"), "Response", \
    match(_raw, "Apple iCloud Private Relay"), "Response", \
    match(_raw, "Designated Resolver"), "Response", \
    match(_raw, "/etc/hosts"), "Response", \
    1=1, "Unknown" \
)

# OCSF Status ID (0=Unknown, 1=Success, 2=Failure)
EVAL-status_id = case( \
    match(_raw, "gravity blocked"), 2, \
    match(_raw, "exactly denied"), 2, \
    match(_raw, "Rate-limiting"), 2, \
    match(_raw, "special domain"), 2, \
    match(_raw, "Apple iCloud Private Relay"), 2, \
    match(_raw, "Designated Resolver"), 2, \
    match(_raw, "is NXDOMAIN"), 2, \
    match(_raw, "is REFUSED"), 2, \
    match(_raw, "is 0\.0\.0\.0"), 2, \
    match(_raw, "is ::$"), 2, \
    match(_raw, "reply.*is \d+\.\d+\.\d+\.\d+"), 1, \
    match(_raw, "reply.*is [0-9a-fA-F:]+"), 1, \
    match(_raw, "reply.*is <CNAME>"), 1, \
    match(_raw, "reply.*is <HTTPS>"), 1, \
    match(_raw, "cached-stale"), 1, \
    match(_raw, "cached"), 1, \
    match(_raw, "forwarded"), 1, \
    match(_raw, "query\["), 1, \
    match(_raw, "is NODATA"), 1, \
    match(_raw, "/etc/hosts"), 1, \
    1=1, 0 \
)

# OCSF Status
EVAL-status = case( \
    match(_raw, "gravity blocked"), "Failure", \
    match(_raw, "exactly denied"), "Failure", \
    match(_raw, "Rate-limiting"), "Failure", \
    match(_raw, "special domain"), "Failure", \
    match(_raw, "Apple iCloud Private Relay"), "Failure", \
    match(_raw, "Designated Resolver"), "Failure", \
    match(_raw, "is NXDOMAIN"), "Failure", \
    match(_raw, "is REFUSED"), "Failure", \
    match(_raw, "is 0\.0\.0\.0"), "Failure", \
    match(_raw, "is ::$"), "Failure", \
    match(_raw, "reply.*is \d+\.\d+\.\d+\.\d+"), "Success", \
    match(_raw, "reply.*is [0-9a-fA-F:]+"), "Success", \
    match(_raw, "reply.*is <CNAME>"), "Success", \
    match(_raw, "reply.*is <HTTPS>"), "Success", \
    match(_raw, "cached-stale"), "Success", \
    match(_raw, "cached"), "Success", \
    match(_raw, "forwarded"), "Success", \
    match(_raw, "query\["), "Success", \
    match(_raw, "is NODATA"), "Success", \
    match(_raw, "/etc/hosts"), "Success", \
    1=1, "Unknown" \
)

# OCSF Disposition ID (1=Allowed, 2=Blocked, etc.)
EVAL-disposition_id = case( \
    match(_raw, "gravity blocked"), 2, \
    match(_raw, "exactly denied"), 2, \
    match(_raw, "Rate-limiting"), 2, \
    match(_raw, "special domain"), 2, \
    match(_raw, "Apple iCloud Private Relay"), 2, \
    match(_raw, "Designated Resolver"), 2, \
    match(_raw, "is 0\.0\.0\.0"), 2, \
    match(_raw, "is ::$"), 2, \
    1=1, 1 \
)

# OCSF Disposition
EVAL-disposition = case( \
    match(_raw, "gravity blocked"), "Blocked", \
    match(_raw, "exactly denied"), "Blocked", \
    match(_raw, "Rate-limiting"), "Blocked", \
    match(_raw, "special domain"), "Blocked", \
    match(_raw, "Apple iCloud Private Relay"), "Blocked", \
    match(_raw, "Designated Resolver"), "Blocked", \
    match(_raw, "is 0\.0\.0\.0"), "Blocked", \
    match(_raw, "is ::$"), "Blocked", \
    1=1, "Allowed" \
)

# OCSF Class and Category
EVAL-class_uid = 4003
EVAL-class_name = "DNS Activity"
EVAL-category_uid = 4
EVAL-category_name = "Network Activity"

# OCSF Type UID (class_uid * 100 + activity_id)
EVAL-type_uid = case( \
    match(_raw, "query\["), 400301, \
    match(_raw, "reply"), 400302, \
    match(_raw, "forwarded"), 400306, \
    match(_raw, "cached"), 400302, \
    1=1, 400300 \
)

# OCSF Type Name
EVAL-type_name = case( \
    match(_raw, "query\["), "DNS Activity: Query", \
    match(_raw, "reply"), "DNS Activity: Response", \
    match(_raw, "forwarded"), "DNS Activity: Traffic", \
    match(_raw, "cached"), "DNS Activity: Response", \
    1=1, "DNS Activity: Unknown" \
)

# OCSF Severity (1=Informational, 2=Low, 3=Medium, 4=High, 5=Critical, 6=Fatal)
EVAL-severity_id = case( \
    match(_raw, "Rate-limiting"), 3, \
    match(_raw, "gravity blocked"), 2, \
    match(_raw, "exactly denied"), 2, \
    match(_raw, "special domain"), 2, \
    match(_raw, "Apple iCloud Private Relay"), 2, \
    match(_raw, "Designated Resolver"), 2, \
    match(_raw, "is 0\.0\.0\.0"), 2, \
    match(_raw, "is NXDOMAIN"), 1, \
    match(_raw, "is REFUSED"), 2, \
    1=1, 1 \
)

EVAL-severity = case( \
    match(_raw, "Rate-limiting"), "Medium", \
    match(_raw, "gravity blocked"), "Low", \
    match(_raw, "exactly denied"), "Low", \
    match(_raw, "special domain"), "Low", \
    match(_raw, "Apple iCloud Private Relay"), "Low", \
    match(_raw, "Designated Resolver"), "Low", \
    match(_raw, "is 0\.0\.0\.0"), "Low", \
    match(_raw, "is NXDOMAIN"), "Informational", \
    match(_raw, "is REFUSED"), "Low", \
    1=1, "Informational" \
)

# OCSF Response Code mapping
EVAL-rcode_id = case( \
    match(_raw, "is NXDOMAIN"), 3, \
    match(_raw, "is NODATA"), 0, \
    match(_raw, "is REFUSED"), 5, \
    match(_raw, "gravity blocked"), 2, \
    match(_raw, "exactly denied"), 2, \
    match(_raw, "is 0\.0\.0\.0"), 0, \
    match(_raw, "reply.*is \d+\.\d+\.\d+\.\d+"), 0, \
    match(_raw, "reply.*is [0-9a-fA-F:]+"), 0, \
    match(_raw, "cached"), 0, \
    1=1, null() \
)

EVAL-rcode = case( \
    match(_raw, "is NXDOMAIN"), "NXDOMAIN", \
    match(_raw, "is NODATA"), "NOERROR", \
    match(_raw, "is REFUSED"), "REFUSED", \
    match(_raw, "gravity blocked"), "NOERROR", \
    match(_raw, "exactly denied"), "NOERROR", \
    match(_raw, "is 0\.0\.0\.0"), "NOERROR", \
    match(_raw, "reply.*is \d+\.\d+\.\d+\.\d+"), "NOERROR", \
    match(_raw, "reply.*is [0-9a-fA-F:]+"), "NOERROR", \
    match(_raw, "cached"), "NOERROR", \
    1=1, null() \
)

# OCSF Query Type ID mapping
EVAL-query_type_id = case( \
    query_type="A", 1, \
    query_type="AAAA", 28, \
    query_type="CNAME", 5, \
    query_type="MX", 15, \
    query_type="NS", 2, \
    query_type="PTR", 12, \
    query_type="SOA", 6, \
    query_type="SRV", 33, \
    query_type="TXT", 16, \
    query_type="HTTPS", 65, \
    query_type="SVCB", 64, \
    query_type="NAPTR", 35, \
    query_type="CAA", 257, \
    query_type="ANY", 255, \
    1=1, 0 \
)

# =============================================================================
# Additional CIM Network Traffic Fields
# =============================================================================

# Direction (inbound queries to DNS server)
EVAL-direction = "inbound"

# Bytes (not available in Pi-hole logs, but field defined for CIM compliance)
EVAL-bytes_in = null()
EVAL-bytes_out = null()

# Duration (not available in Pi-hole logs)
EVAL-duration = null()

# Protocol stack
EVAL-protocol = "dns"
EVAL-protocol_version = null()

# User context (not available in Pi-hole logs)
EVAL-user = null()
EVAL-src_user = null()

# =============================================================================
# Additional OCSF Required Fields
# =============================================================================

# OCSF Metadata object
EVAL-metadata_product_name = "Pi-hole"
EVAL-metadata_product_vendor = "Pi-hole"
EVAL-metadata_product_version = null()
EVAL-metadata_version = "1.3.0"
EVAL-metadata_log_name = "dnsmasq"
EVAL-metadata_log_provider = "Pi-hole"

# OCSF Time (use _time which is already extracted)
FIELDALIAS-ocsf_time = _time AS time

# OCSF start_time and end_time (DNS is synchronous, so same as event time)
FIELDALIAS-start_time = _time AS start_time
FIELDALIAS-end_time = _time AS end_time

# OCSF Query object fields
FIELDALIAS-query_hostname = domain AS query_hostname
EVAL-query_class = "IN"
EVAL-query_class_id = 1

# OCSF Answers array (simplified - single answer)
FIELDALIAS-answers_rdata = ip_address AS answers_rdata

# OCSF Connection Info
EVAL-connection_info_protocol_name = "DNS"
EVAL-connection_info_protocol_num = 17
EVAL-connection_info_direction = "Unknown"
EVAL-connection_info_direction_id = 0

# OCSF Device (the Pi-hole server itself)
EVAL-device_type = "DNS Server"
EVAL-device_type_id = 10

# OCSF Source Endpoint
FIELDALIAS-src_endpoint_ip = client_ip AS src_endpoint_ip

# OCSF Destination Endpoint (upstream DNS)
FIELDALIAS-dst_endpoint_ip = upstream_ip AS dst_endpoint_ip
EVAL-dst_endpoint_port = 53

# =============================================================================
# OCSF Unmapped Fields and Observables
# =============================================================================

# OCSF Observables - domain as observable
EVAL-observables_name = domain
EVAL-observables_type = "Hostname"
EVAL-observables_type_id = 1

# OCSF Enrichments (for threat intel integration)
EVAL-enrichments = null()

# OCSF Malware information (for blocked domains that match known malware)
EVAL-malware_name = null()
EVAL-malware_path = null()

# OCSF Unmapped raw data reference
FIELDALIAS-unmapped_raw = _raw AS unmapped_raw

# =============================================================================
# Additional CIM Required Fields for Network Resolution (DNS)
# =============================================================================

# CIM transaction_id (not available in Pi-hole logs)
EVAL-transaction_id = null()

# CIM ttl (not available in Pi-hole logs)
EVAL-ttl = null()

# CIM additional_answer_count, answer_count, authority_answer_count
EVAL-answer_count = if(isnotnull(ip_address) AND ip_address!="NODATA" AND ip_address!="NXDOMAIN" AND ip_address!="REFUSED", 1, 0)
EVAL-additional_answer_count = 0
EVAL-authority_answer_count = 0

# CIM response_time (not available in Pi-hole logs)
EVAL-response_time = null()

# CIM query_count
EVAL-query_count = 1

[source::...pihole.log*]
sourcetype = pihole:log

[source::.../var/log/pihole.log*]
sourcetype = pihole:log

# =============================================================================
# Pi-Hole FTL Daemon Log (pihole:ftl)
# Logs from the Pi-Hole FTL (Faster Than Light) daemon
# =============================================================================
[pihole:ftl]
SHOULD_LINEMERGE = false
TRUNCATE = 0
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 25
LINE_BREAKER = ([\r\n]+)

EXTRACT-pihole_ftl = ^\[(?<log_time>[^\]]+)\]\s+(?<log_level>\w+):\s+(?<message>.+)

# CIM/OCSF Fields for FTL
EVAL-vendor_product = "Pi-hole FTL"
EVAL-app = "pihole-ftl"

[source::...pihole-FTL.log*]
sourcetype = pihole:ftl

# =============================================================================
# Pi-Hole Gravity Update Log (pihole:updateGravity)
# Logs from gravity database updates
# =============================================================================
[pihole:updateGravity]
SHOULD_LINEMERGE = false
TRUNCATE = 0
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 25
LINE_BREAKER = ([\r\n]+)

EXTRACT-gravity_update = ^\[(?<log_time>[^\]]+)\]\s+(?<message>.+)

# CIM/OCSF Fields for Gravity Update
EVAL-vendor_product = "Pi-hole Gravity"
EVAL-app = "pihole-gravity"

[source::...updateGravity.log*]
sourcetype = pihole:updateGravity

# =============================================================================
# Pi-Hole Web Interface Log (pihole:web)
# Access logs from the Pi-Hole web interface
# =============================================================================
[pihole:web]
SHOULD_LINEMERGE = false
TRUNCATE = 0
TIME_PREFIX = ^
TIME_FORMAT = %d/%b/%Y:%H:%M:%S %z
MAX_TIMESTAMP_LOOKAHEAD = 30
LINE_BREAKER = ([\r\n]+)

# Standard combined log format extraction
EXTRACT-web_access = ^(?<client_ip>\S+)\s+\S+\s+(?<user>\S+)\s+\[(?<log_time>[^\]]+)\]\s+"(?<http_method>\w+)\s+(?<uri_path>[^\s]+)\s+(?<http_version>[^"]+)"\s+(?<status_code>\d+)\s+(?<bytes_sent>\d+)\s+"(?<referrer>[^"]*)"\s+"(?<user_agent>[^"]*)"

# CIM/OCSF Fields for Web
EVAL-vendor_product = "Pi-hole Web"
EVAL-app = "pihole-web"
FIELDALIAS-web_src = client_ip AS src
FIELDALIAS-web_http_status = status_code AS http_status
FIELDALIAS-web_uri = uri_path AS uri

[source::...pihole_access.log*]
sourcetype = pihole:web
