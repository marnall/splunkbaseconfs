# =============================================================================
# CIM Data Model Tags for Pi-hole Events
# Enables automatic mapping to Splunk CIM Data Models
# =============================================================================

# -----------------------------------------------------------------------------
# DNS Query Events - Maps to Network Resolution (DNS) data model
# -----------------------------------------------------------------------------
[eventtype=pihole_query]
dns = enabled
network = enabled
resolution = enabled

# -----------------------------------------------------------------------------
# Blocked Events - Maps to Network Resolution (DNS) + Intrusion Detection
# -----------------------------------------------------------------------------
[eventtype=pihole_blocked]
dns = enabled
network = enabled
resolution = enabled
security = enabled
attack = enabled

[eventtype=pihole_gravity_blocked]
dns = enabled
network = enabled
resolution = enabled
security = enabled
attack = enabled

