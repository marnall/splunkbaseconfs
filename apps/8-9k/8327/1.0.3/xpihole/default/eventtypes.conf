[pihole_query]
search = sourcetype="pihole:log" "query["

[pihole_blocked]
search = sourcetype="pihole:log" (action=blocked OR "gravity blocked" OR "exactly denied" OR "special domain" OR "Apple iCloud Private Relay" OR "Designated Resolver" OR "is 0.0.0.0" OR "is ::")

[pihole_gravity_blocked]
search = sourcetype="pihole:log" "gravity blocked"

[pihole_exactly_denied]
search = sourcetype="pihole:log" "exactly denied"

[pihole_rate_limited]
search = sourcetype="pihole:log" action=rate_limited "Rate-limiting"

[pihole_special_domain]
search = sourcetype="pihole:log" "special domain"

[pihole_apple_private_relay]
search = sourcetype="pihole:log" "Apple iCloud Private Relay"

[pihole_designated_resolver]
search = sourcetype="pihole:log" "Designated Resolver"

[pihole_forwarded]
search = sourcetype="pihole:log" action=forwarded "forwarded"

[pihole_cached]
search = sourcetype="pihole:log" action=cached "cached" NOT "cached-stale"

[pihole_cached_stale]
search = sourcetype="pihole:log" action=cached_stale "cached-stale"

[pihole_reply]
search = sourcetype="pihole:log" action=reply "reply"

[pihole_reply_nodata]
search = sourcetype="pihole:log" "reply" "is NODATA"

[pihole_reply_nxdomain]
search = sourcetype="pihole:log" "reply" "is NXDOMAIN"

[pihole_reply_cname]
search = sourcetype="pihole:log" "reply" "is <CNAME>"

[pihole_local_lookup]
search = sourcetype="pihole:log" action=local_lookup "/etc/hosts"

[pihole_ipv4_query]
search = sourcetype="pihole:log" query_type=A

[pihole_ipv6_query]
search = sourcetype="pihole:log" query_type=AAAA

[pihole_https_query]
search = sourcetype="pihole:log" query_type=HTTPS

[pihole_srv_query]
search = sourcetype="pihole:log" query_type=SRV

[pihole_dns_activity]
search = sourcetype="pihole:log" (query OR forwarded OR cached OR reply OR blocked OR "Rate-limiting" OR "special domain")

# FTL Daemon Events
[pihole_ftl]
search = sourcetype="pihole:ftl"

[pihole_ftl_startup]
search = sourcetype="pihole:ftl" "Starting FTL"

[pihole_ftl_database]
search = sourcetype="pihole:ftl" ("database" OR "queries") NOT "Imported"

# Gravity Update Events
[pihole_gravity_update]
search = sourcetype="pihole:updateGravity"

[pihole_gravity_download]
search = sourcetype="pihole:updateGravity" ("Neutrino" OR "download" OR "status")

# Web Interface Events
[pihole_web]
search = sourcetype="pihole:web"

[pihole_web_api]
search = sourcetype="pihole:web" "/admin/api.php"
