# Lookup for status display names
[stig_status_lookup]
filename = stig_status.csv
default_match = Unknown
min_matches = 1

# Lookup for severity to category mapping
[stig_severity_lookup]
filename = stig_severity.csv
default_match = Unknown
min_matches = 1

# KV store lookup for duplicate upload detection
[stig_upload_hashes]
external_type = kvstore
collection = stig_upload_hashes
fields_list = _key, file_hash, upload_batch_id, filename, upload_time, uploaded_by
