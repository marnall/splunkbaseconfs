#
# STIG Compliance App - Macros
# Marcus House
#
# INDEX CONFIGURATION:
# All dashboards and the upload handler reference the index from these macros.
# To change the target index (e.g., from main to stig):
#   1. Go to Settings > Advanced Search > Search Macros
#   2. Set App filter to "STIG Compliance"
#   3. Update stig_base: change index=main to index=stig
#   4. Update stig_latest: change index=main to index=stig
#   5. Update stig_upload_history: change index=main to index=stig
#   6. Ensure the target index exists on your indexers and search heads
# No code changes or CLI access required.

[stig_base]
definition = index=main sourcetype="stig:ckl"
iseval = 0

[stig_latest]
definition = index=main sourcetype="stig:ckl" | dedup asset_host_name, stig_title, vuln_vuln_num sortby -upload_time
iseval = 0

[stig_open]
definition = `stig_latest` | search vuln_status="Open"
iseval = 0

[stig_findings]
definition = `stig_latest` | search vuln_status="NotAFinding"
iseval = 0

[stig_cat1]
definition = `stig_latest` | search category="CAT I"
iseval = 0

[stig_cat1_open]
definition = `stig_latest` | search category="CAT I" vuln_status="Open"
iseval = 0

[stig_upload_history]
definition = index=main sourcetype="stig:ckl" | dedup upload_batch_id | eval upload_date=strftime(strptime(upload_time, "%Y-%m-%dT%H:%M:%S.%6NZ"), "%Y-%m-%d %H:%M:%S") | table upload_date, asset_host_name, stig_title, source_file, source_format, upload_batch_id | sort - upload_date
iseval = 0

[stig_compliance_score(1)]
args = host
definition = `stig_latest` | search asset_host_name="$host$" | stats count(eval(vuln_status="NotAFinding" OR vuln_status="Not_Applicable")) AS compliant, count AS total | eval compliance_pct=round((compliant/total)*100, 2)
iseval = 0

[stig_summary_by_host]
definition = `stig_latest` | stats count(eval(vuln_status="Open")) AS open, count(eval(vuln_status="NotAFinding")) AS not_a_finding, count(eval(vuln_status="Not_Applicable")) AS not_applicable, count(eval(vuln_status="Not_Reviewed")) AS not_reviewed, count AS total by asset_host_name, stig_title | eval compliance_pct=round(((not_a_finding+not_applicable)/total)*100, 2)
iseval = 0
