#
# STIG Compliance App - Web Configuration
#

[expose:stig_upload]
pattern = stig_upload/upload
methods = GET,POST

[expose:stig_upload_element]
pattern = stig_upload/upload/*
methods = GET,POST

[expose:admin_stig_upload]
pattern = admin/stig_upload
methods = GET,POST

[expose:admin_stig_upload_element]
pattern = admin/stig_upload/*
methods = GET,POST
