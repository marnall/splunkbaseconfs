#
# STIG Compliance App - Saved Searches
# Marcus House
#

# ============================================================================
# REPORTS
# ============================================================================

[STIG - Compliance Summary by Host]
search = `stig_summary_by_host` | table asset_host_name, stig_title, open, not_a_finding, not_applicable, not_reviewed, total, compliance_pct | sort - open
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics

[STIG - Open Findings by Category]
search = `stig_open` | stats count by category, asset_host_name | sort category, - count
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search

[STIG - CAT I Open Findings]
search = `stig_cat1_open` | table _time, asset_host_name, vuln_vuln_num, vuln_rule_title, vuln_finding_details | sort asset_host_name, vuln_vuln_num
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_view = search

[STIG - POA&M Report]
search = `stig_open` | table asset_host_name, stig_title, vuln_vuln_num, category, vuln_rule_title, vuln_finding_details, vuln_comments | sort category, asset_host_name
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_view = search

[STIG - Compliance Trend]
search = `stig_base` | timechart span=1d count(eval(vuln_status="Open")) AS Open, count(eval(vuln_status="NotAFinding")) AS "Not a Finding", count(eval(vuln_status="Not_Applicable")) AS "Not Applicable", count(eval(vuln_status="Not_Reviewed")) AS "Not Reviewed"
dispatch.earliest_time = -30d@d
dispatch.latest_time = now

# ============================================================================
# ALERTS
# ============================================================================

[STIG - New CAT I Open Finding Alert]
search = `stig_cat1_open` | dedup vuln_vuln_num, asset_host_name | table _time, asset_host_name, vuln_vuln_num, vuln_rule_title
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
alert.suppress = 1
alert.suppress.period = 24h
alert.suppress.fields = vuln_vuln_num, asset_host_name
cron_schedule = 0 * * * *
enableSched = 0
disabled = 1

[STIG - Compliance Below Threshold Alert]
search = `stig_summary_by_host` | where compliance_pct < 80 | table asset_host_name, stig_title, compliance_pct, open
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 6 * * *
enableSched = 0
disabled = 1
