#
# STIG Compliance App - Props Configuration
# Marcus House
#

[stig:ckl]
# JSON events - one per line
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
TIME_PREFIX = "_time":\s*"
MAX_TIMESTAMP_LOOKAHEAD = 32
TRUNCATE = 50000

# Auto key-value extraction for JSON
KV_MODE = json

# Field aliases for cleaner searching
FIELDALIAS-host = asset_host_name AS host
FIELDALIAS-hostname = asset_host_name AS hostname
FIELDALIAS-ip = asset_host_ip AS ip
FIELDALIAS-fqdn = asset_host_fqdn AS fqdn
FIELDALIAS-vuln_id = vuln_vuln_num AS vuln_id
FIELDALIAS-severity = vuln_severity AS severity
FIELDALIAS-status = vuln_status AS status
FIELDALIAS-rule_id = vuln_rule_id AS rule_id
FIELDALIAS-rule_title = vuln_rule_title AS rule_title
FIELDALIAS-stig_name = stig_title AS stig_name
FIELDALIAS-stig_id = stig_stigid AS stig_id

# Calculated fields
EVAL-is_open = if(vuln_status=="Open", 1, 0)
EVAL-is_compliant = if(vuln_status=="NotAFinding", 1, 0)
EVAL-is_na = if(vuln_status=="Not_Applicable", 1, 0)
EVAL-is_not_reviewed = if(vuln_status=="Not_Reviewed", 1, 0)
EVAL-cat_level = case(category=="CAT I", 1, category=="CAT II", 2, category=="CAT III", 3, true(), 0)
