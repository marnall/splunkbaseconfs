[qox_wavg(1)]
args = histogram_field
definition = `qox_counts($histogram_field$)`\
| eval \
  wavg=\
    (0.245 * count_0_49 + \
     0.545 * count_50_59 + \
     0.645 * count_60_69 + \
     0.745 * count_70_79 + \
     0.845 * count_80_89 + \
     0.915 * count_90_93 + \
     0.95 * count_94_96 + \
     0.98 * count_98 + \
     0.99 * count_99 + \
     1.0 * count_100) \
     / total * 100
iseval = 0

[qox_counts(1)]
args = histogram_field
definition = eval \
  count_0_49=coalesce(tonumber(spath($histogram_field$, "{0}")), 0), \
  count_50_59=coalesce(tonumber(spath($histogram_field$, "{1}")), 0), \
  count_60_69=coalesce(tonumber(spath($histogram_field$, "{2}")), 0), \
  count_70_79=coalesce(tonumber(spath($histogram_field$, "{3}")), 0), \
  count_80_89=coalesce(tonumber(spath($histogram_field$, "{4}")), 0), \
  count_90_93=coalesce(tonumber(spath($histogram_field$, "{5}")), 0), \
  count_94_96=coalesce(tonumber(spath($histogram_field$, "{6}")), 0), \
  count_97=coalesce(tonumber(spath($histogram_field$, "{7}")), 0), \
  count_98=coalesce(tonumber(spath($histogram_field$, "{8}")), 0), \
  count_99=coalesce(tonumber(spath($histogram_field$, "{9}")), 0), \
  count_100=coalesce(tonumber(spath($histogram_field$, "{10}")), 0)\
| eval total=\
  count_0_49 +\
  count_50_59 +\
  count_60_69 +\
  count_70_79 +\
  count_80_89 +\
  count_90_93 +\
  count_94_96 +\
  count_97 +\
  count_98 +\
  count_99 +\
  count_100\
| eval sum_0_49 = count_0_49\
| eval sum_50_59 = sum_0_49 + count_50_59\
| eval sum_60_69 = sum_50_59 + count_60_69\
| eval sum_70_79 = sum_60_69 + count_70_79\
| eval sum_80_89 = sum_70_79 + count_80_89\
| eval sum_90_93 = sum_80_89 + count_90_93\
| eval sum_94_96 = sum_90_93 + count_94_96\
| eval sum_97 = sum_94_96 + count_97\
| eval sum_98 = sum_97 + count_98\
| eval sum_99 = sum_98 + count_99\
| eval sum_100 = sum_99 + count_100
iseval = 0

[qox_class(1)]
args = histogram_field
definition = `qox_counts($histogram_field$)`\
| eval poor=count_0_49 + count_50_59 + count_60_69\
| eval fair=count_70_79\
| eval good=count_80_89\
| eval excellent=count_90_93 + count_94_96 + count_97 + count_98 + count_99 + count_100
iseval = 0

[qox_perc(1)]
args = histogram_field
definition = `qox_class($histogram_field$)`\
| eval sum=poor + fair + good + excellent\
| eval poor=poor * 100 / sum\
| eval fair=fair * 100 / sum\
| eval good=good * 100 / sum\
| eval excellent=excellent * 100 / sum
iseval = 0

[qox_quant(1)]
args = histogram_field
definition = `qox_counts($histogram_field$)`\
| eval p50 = case(\
  sum_0_49  >= (total * 0.5),  0.0  + ((total * 0.5) - 0)         / count_0_49  * 0.5,\
  sum_50_59 >= (total * 0.5),  0.5  + ((total * 0.5) - sum_0_49)  / count_50_59 * 0.1,\
  sum_60_69 >= (total * 0.5),  0.6  + ((total * 0.5) - sum_50_59) / count_60_69 * 0.1,\
  sum_70_79 >= (total * 0.5),  0.7  + ((total * 0.5) - sum_60_69) / count_70_79 * 0.1,\
  sum_80_89 >= (total * 0.5),  0.8  + ((total * 0.5) - sum_70_79) / count_80_89 * 0.1,\
  sum_90_93 >= (total * 0.5),  0.9  + ((total * 0.5) - sum_80_89) / count_90_93 * 0.04,\
  sum_94_96 >= (total * 0.5),  0.94 + ((total * 0.5) - sum_90_93) / count_94_96 * 0.03,\
  sum_97    >= (total * 0.5),  0.97 + ((total * 0.5) - sum_94_96) / count_97    * 0.01,\
  sum_98    >= (total * 0.5),  0.98 + ((total * 0.5) - sum_97)    / count_98    * 0.01,\
  sum_99    >= (total * 0.5),  0.99 + ((total * 0.5) - sum_98)    / count_99    * 0.01,\
  true(), 1.0) * 100\
| eval p95 = case(\
  sum_0_49  >= (total * 0.95),  0.0  + ((total * 0.95) - 0)         / count_0_49  * 0.5,\
  sum_50_59 >= (total * 0.95),  0.5  + ((total * 0.95) - sum_0_49)  / count_50_59 * 0.1,\
  sum_60_69 >= (total * 0.95),  0.6  + ((total * 0.95) - sum_50_59) / count_60_69 * 0.1,\
  sum_70_79 >= (total * 0.95),  0.7  + ((total * 0.95) - sum_60_69) / count_70_79 * 0.1,\
  sum_80_89 >= (total * 0.95),  0.8  + ((total * 0.95) - sum_70_79) / count_80_89 * 0.1,\
  sum_90_93 >= (total * 0.95),  0.9  + ((total * 0.95) - sum_80_89) / count_90_93 * 0.04,\
  sum_94_96 >= (total * 0.95),  0.94 + ((total * 0.95) - sum_90_93) / count_94_96 * 0.03,\
  sum_97    >= (total * 0.95),  0.97 + ((total * 0.95) - sum_94_96) / count_97    * 0.01,\
  sum_98    >= (total * 0.95),  0.98 + ((total * 0.95) - sum_97)    / count_98    * 0.01,\
  sum_99    >= (total * 0.95),  0.99 + ((total * 0.95) - sum_98)    / count_99    * 0.01,\
  true(), 1.0) * 100\
| eval p99 = case(\
  sum_0_49  >= (total * 0.99),  0.0  + ((total * 0.99) - 0)         / count_0_49  * 0.5,\
  sum_50_59 >= (total * 0.99),  0.5  + ((total * 0.99) - sum_0_49)  / count_50_59 * 0.1,\
  sum_60_69 >= (total * 0.99),  0.6  + ((total * 0.99) - sum_50_59) / count_60_69 * 0.1,\
  sum_70_79 >= (total * 0.99),  0.7  + ((total * 0.99) - sum_60_69) / count_70_79 * 0.1,\
  sum_80_89 >= (total * 0.99),  0.8  + ((total * 0.99) - sum_70_79) / count_80_89 * 0.1,\
  sum_90_93 >= (total * 0.99),  0.9  + ((total * 0.99) - sum_80_89) / count_90_93 * 0.04,\
  sum_94_96 >= (total * 0.99),  0.94 + ((total * 0.99) - sum_90_93) / count_94_96 * 0.03,\
  sum_97    >= (total * 0.99),  0.97 + ((total * 0.99) - sum_94_96) / count_97    * 0.01,\
  sum_98    >= (total * 0.99),  0.98 + ((total * 0.99) - sum_97)    / count_98    * 0.01,\
  sum_99    >= (total * 0.99),  0.99 + ((total * 0.99) - sum_98)    / count_99    * 0.01,\
  true(), 1.0) * 100
iseval = 0
