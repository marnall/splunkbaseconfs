#
# Lookup definitions for SA-Data-Heartbeat
#

[monitored_sourcetypes_lookup]
collection = monitored_sourcetypes
external_type = kvstore
# _key is the primary key — set explicitly to sourcetype on every write
# so the KV-store collection enforces per-sourcetype uniqueness (no need for
# `| dedup sourcetype` hacks) and per-row REST PUT/DELETE work directly.
fields_list = _key, sourcetype, threshold_minutes, last_seen, minutes_since_seen, status, freshness_basis, importance, discovery_source, usage_count, usage_searches, usage_dashboards, added_by, added_time, notes, alert_action, alert_action_config

# CSV fallback lookups
[monitored_sourcetypes_csv]
filename = monitored_sourcetypes.csv

[heartbeat_audit_log]
external_type = kvstore
collection = heartbeat_audit_log
fields_list = _key, timestamp, action, sourcetype, performed_by, previous_value, new_value, details

# Cold-start DEFAULTS seed for the audit-log KV collection (shipped, empty header).
# Named *_seed.csv — NOT heartbeat_audit_log.csv — so an upgrade does NOT overwrite
# the user's runtime audit-log CSV before migrateCsvToKvIfNeeded can read it. On
# upgrade the JS reads the surviving runtime `heartbeat_audit_log.csv` directly (by
# filename) FIRST and only falls back to this seed on a fresh install (fixes #1/#7).
[heartbeat_audit_log_csv]
filename = heartbeat_audit_log_seed.csv

# Global per-action alert config (enabled + recipients/webhook) written by the
# Settings page; read by the dispatcher's load_global_defaults() as the fallback
# when a row has no per-row alert_action_config. KV-backed (was a CSV) so writes
# replicate across SHC members. _key = action_type for upsert.
[heartbeat_alert_actions]
external_type = kvstore
collection = heartbeat_alert_actions
fields_list = _key, action_type, enabled, config_json

# Per-sourcetype alert target secret (webhook URL / recipients), split out of the
# world-readable monitored_sourcetypes (#3). The collection is admin-only read in
# metadata/default.meta, so a non-admin `| inputlookup heartbeat_alert_targets`
# returns nothing. _key = sourcetype.
[heartbeat_alert_targets]
external_type = kvstore
collection = heartbeat_alert_targets
fields_list = _key, sourcetype, alert_action_config

# Self-monitoring metrics (detection-run health). Separate from the audit log
# so the two schemas don't collide — the Health Metrics saved search appends
# here, the Audit dashboard reads only heartbeat_audit_log.
[heartbeat_metrics]
external_type = kvstore
collection = heartbeat_metrics
fields_list = _key, timestamp, metric_name, app, rows_processed, flagged_count, pending_count, good_count, detection_duration_ms, deferred_count

# Cold-start DEFAULTS seed for the metrics KV collection (shipped, empty header).
# *_seed.csv name so an upgrade can't overwrite the user's runtime metrics CSV
# before migrateCsvToKvIfNeeded reads it (see #1/#7).
[heartbeat_metrics_csv]
filename = heartbeat_metrics_seed.csv

# App-level settings (detection_frequency, default_threshold). KV-backed (was a
# CSV) so they replicate across SHC members AND survive app upgrades. _key=setting_name.
[heartbeat_settings]
external_type = kvstore
collection = heartbeat_settings
fields_list = _key, setting_name, setting_value, description

# Cold-start DEFAULTS seed for the settings KV (detection_frequency=5,
# default_threshold=60). Named *_seed.csv — NOT heartbeat_settings.csv — so an
# upgrade does NOT overwrite the user's runtime settings CSV. On upgrade the JS
# reads the surviving runtime `heartbeat_settings.csv` by filename FIRST and only
# falls back to these defaults on a fresh install (fixes #1/#7 settings reset).
[heartbeat_settings_csv]
filename = heartbeat_settings_seed.csv

# Nightly snapshot of the monitored_sourcetypes collection; the Restore search
# re-seeds from it. KV-backed (was a CSV) so the snapshot is consistent across SHC
# members — a runtime CSV outputlookup writes member-locally and doesn't replicate.
[monitored_sourcetypes_backup]
external_type = kvstore
collection = monitored_sourcetypes_backup
fields_list = _key, sourcetype, threshold_minutes, last_seen, minutes_since_seen, status, freshness_basis, importance, discovery_source, usage_count, usage_searches, usage_dashboards, added_by, added_time, notes, alert_action, alert_action_config

# Snapshot of the LAST "Clear Never-Seen" bulk delete, written by the UI right
# before the deletes run. Read back by the modal's Restore button
# (`| inputlookup heartbeat_recycle_bin | ... | outputlookup ... append=true`).
[heartbeat_recycle_bin]
external_type = kvstore
collection = heartbeat_recycle_bin
fields_list = _key, sourcetype, threshold_minutes, last_seen, minutes_since_seen, status, freshness_basis, importance, discovery_source, usage_count, usage_searches, usage_dashboards, added_by, added_time, notes, alert_action, alert_action_config, deleted_time, deleted_by

# Deletion tombstones — the detection searches `| lookup heartbeat_deleted_lookup
# sourcetype OUTPUT deleted_time` and drop any row whose added_time predates it,
# so a delete can't be permanently undone by a concurrent detection run's
# read-modify-write. Written on delete, reaped nightly by the Prune search.
[heartbeat_deleted_lookup]
external_type = kvstore
collection = heartbeat_deleted
fields_list = _key, sourcetype, deleted_time

# Sourcetype classification catalog (security/identity/network/cloud/etc.)
# Loaded by appserver/static/js/heartbeat-v28.js on app init.
[heartbeat_catalog]
filename = heartbeat_catalog.csv
