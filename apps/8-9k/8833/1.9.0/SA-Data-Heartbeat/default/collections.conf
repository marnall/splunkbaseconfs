#
# KV Store Collections for SA-Data-Heartbeat
#

[monitored_sourcetypes]
# World-readable (read:[*]) so non-admins get the read-only Monitor view. The
# per-row alert TARGET secret (webhook URL / recipients) is therefore NOT stored
# here — it lives in the admin-only heartbeat_alert_targets collection (#3). The
# alert_action_config field is retained (always "") only for v1.4.0 schema
# back-compat; the live secret is keyed by sourcetype in heartbeat_alert_targets.
# enforceTypes=false on purpose: fields hold arbitrary operator strings.
enforceTypes = false
field.sourcetype = string
field.threshold_minutes = number
field.last_seen = number
field.minutes_since_seen = number
field.status = string
field.freshness_basis = string
field.importance = string
field.discovery_source = string
field.usage_count = number
field.usage_searches = number
field.usage_dashboards = number
field.added_by = string
field.added_time = number
field.notes = string
field.alert_action = string
field.alert_action_config = string
accelerated_fields.idx_sourcetype = {"sourcetype": 1}
accelerated_fields.idx_status = {"status": 1}

[heartbeat_alert_actions]
# Global per-action alert config (enabled flag + recipients/webhook URL).
# Moved from a CSV lookup to KV so it replicates across SHC members — a runtime
# `| outputlookup <csv>` on a Search Head Cluster writes member-locally and does
# NOT replicate, so the Settings save never stuck cluster-wide. _key = action_type.
enforceTypes = false
field.action_type = string
field.enabled = string
field.config_json = string

[heartbeat_alert_targets]
# Per-sourcetype alert TARGET (webhook URL / email recipients) — a bearer secret.
# Split out of the world-readable monitored_sourcetypes collection (#3) so a
# non-admin can't enumerate every org's incoming-webhook URL via the KV REST API
# while still getting the read-only Monitor view. read+write are restricted to
# admin/sc_admin in metadata/default.meta. _key = sourcetype. The admin-context
# "Flagged Sources" alert search looks the config up here; bin/heartbeat_dispatch.py
# consumes it from the alert results (no direct collection read).
enforceTypes = false
field.sourcetype = string
field.alert_action_config = string

[heartbeat_audit_log]
# Audit history of in-app actions. KV-backed (was a CSV) so it replicates across
# SHC members — a runtime `| outputlookup <csv>` on an SHC writes member-locally
# and does not replicate, so the Audit page diverged per member.
enforceTypes = false
field.timestamp = number
field.action = string
field.sourcetype = string
field.performed_by = string
field.previous_value = string
field.new_value = string
field.details = string

[heartbeat_metrics]
# Detection-run health metrics for SLO tracking. KV-backed (was a CSV) so it
# replicates across SHC members.
enforceTypes = false
field.timestamp = number
field.metric_name = string
field.app = string
field.rows_processed = number
field.flagged_count = number
field.pending_count = number
field.good_count = number
field.detection_duration_ms = number
# Count of destinations a single dispatch run deferred under its wall-clock
# budget (heartbeat.dispatch_deferred rows) — surfaces a silently-dropped tail (#14).
field.deferred_count = number

[heartbeat_settings]
# App-level settings (detection_frequency, default_threshold) keyed by setting_name.
# KV-backed (was a CSV) so they replicate across SHC members AND survive app upgrades
# (a shipped CSV lookup is overwritten on every upgrade, resetting saved settings).
enforceTypes = false
field.setting_name = string
field.setting_value = string
field.description = string

[heartbeat_recycle_bin]
# Snapshot of the LAST "Clear Never-Seen" bulk delete (full rows + who/when),
# written by the UI immediately BEFORE the deletes run so the operator gets a
# one-click Restore. Replaced wholesale on each bulk delete. Separate from
# monitored_sourcetypes_backup on purpose — that is the nightly DR snapshot and
# must never be overwritten by an interactive bulk delete. alert_action_config
# is force-blanked on write as defense in depth (per-row alert TARGET secrets
# live only in heartbeat_alert_targets); read is admin-only in default.meta.
enforceTypes = false
field.sourcetype = string
field.threshold_minutes = number
field.last_seen = number
field.minutes_since_seen = number
field.status = string
field.freshness_basis = string
field.importance = string
field.discovery_source = string
field.usage_count = number
field.usage_searches = number
field.usage_dashboards = number
field.added_by = string
field.added_time = number
field.notes = string
field.alert_action = string
field.alert_action_config = string
field.deleted_time = number
field.deleted_by = string

[monitored_sourcetypes_backup]
# Nightly DR snapshot of monitored_sourcetypes (recover from an accidental wipe).
# KV-backed (was a CSV) so the snapshot is consistent across SHC members — a CSV
# backup is written member-locally, so a Restore on another member read stale/empty data.
enforceTypes = false
field.sourcetype = string
field.threshold_minutes = number
field.last_seen = number
field.minutes_since_seen = number
field.status = string
field.freshness_basis = string
field.importance = string
field.discovery_source = string
field.usage_count = number
field.usage_searches = number
field.usage_dashboards = number
field.added_by = string
field.added_time = number
field.notes = string
field.alert_action = string
field.alert_action_config = string

[heartbeat_deleted]
# Deletion tombstones (race guard). When a monitored row is deleted (single or
# Clear Never-Seen bulk), the UI writes {sourcetype, deleted_time=now}. The
# Source Type Monitor + Run Detection searches drop any row whose added_time
# predates its tombstone's deleted_time, so a detection run that snapshotted the
# row via inputlookup BEFORE the delete (client OR the every-5-min scheduled
# search) cannot permanently resurrect it on its outputlookup. A genuine re-add
# sets added_time=now() (> deleted_time) and therefore survives with no tombstone
# bookkeeping; the nightly Prune search reaps old tombstones. _key = sourcetype.
enforceTypes = false
field.sourcetype = string
field.deleted_time = number
