# Custom REST endpoint for in-app admin actions (enable/disable searches,
# fire test alerts). Bypasses the splunkweb proxy filter on disabled-field
# POSTs that we hit when toggling Alert + Auto Discovery from the dashboard.

[script:heartbeat_admin]
match                 = /data_heartbeat/admin
script                = heartbeat_admin.py
scripttype            = persist
handler               = heartbeat_admin.HeartbeatAdminHandler
output_modes          = json
python.version        = python3
# Splunk 10.2+ deprecates python.version in favor of python.required (AppInspect
# cloud check check_script_restmap_conf_python_required) and python.required TAKES
# PRECEDENCE over python.version on 10.2+. python.required is a comma-separated
# list and Splunk runs "the highest version AVAILABLE from the list you provide"
# (restmap.conf.spec). 3.9 is the 10.2 DEFAULT (always present); 3.13 is opt-in.
# We MUST list 3.9 too — with 3.13 alone, a Cloud/10.2 tenant that hasn't enabled
# 3.13 has no satisfiable interpreter and this admin handler (Enable Monitoring /
# Test Alert) silently cannot run. Listing both runs on 3.9 everywhere and prefers
# 3.13 where enabled. (Verified: heartbeat_admin.py parses on 3.9.)
# pre-10.2 ignores python.required and falls back to python.version above.
python.required       = 3.9, 3.13
requireAuthentication = true
# RBAC is enforced inside the handler (heartbeat_admin.py): enable_all/disable_all
# require edit_search_scheduler OR admin_all_objects; test_alert requires
# admin_all_objects. A single restmap `capability.post` can't express that
# per-action split — it would over-restrict one action or the other — and the
# handler's gate fails closed, so we rely on it rather than a coarser key here.
