# Expose the custom REST endpoint to splunkweb's /__raw/ proxy.
# Without this stanza, /en-US/splunkd/__raw/services/data_heartbeat/admin
# returns 404 from splunkweb (even though splunkd-direct on 8089 serves it
# fine). The JS dashboard hits this through splunkweb, so the expose is
# required for the "Enable Monitoring" and "Send Test Alert" buttons.
#
# Splunkweb's expose pattern is the path leaf after /__raw/services/ or
# /__raw/servicesNS/<ns>/<app>/ — the single leaf pattern below matches both
# forms, so no separate services/ or servicesNS/ stanzas are needed.
#
# methods is POST + OPTIONS only: the endpoint mutates scheduled-search state
# and triggers outbound dispatch, so it must not be reachable by GET (a GET-
# reachable mutating endpoint is CSRF-able via <img src=...>). OPTIONS is kept
# for the browser's CORS preflight.

[expose:data_heartbeat_admin]
pattern  = data_heartbeat/admin
methods  = POST, OPTIONS
