#
# Saved Searches for SA-Data-Heartbeat
#

# One-time migration: copy CSV-seeded rows to the KV-store collection on
# first install. JS dispatches this on dashboard load if KV is empty. It
# upserts by _key=sourcetype so re-running is idempotent.
#
# Ships disabled=1 so a Splunk Manager admin can't accidentally click "Run"
# and overwrite live KV data with the stale CSV seed. The JS dispatches it
# directly via REST when (and only when) KV is empty.
[Data Heartbeat - CSV to KV Migration]
description = One-time copy of monitored_sourcetypes.csv into the KV-store collection. Idempotent; safe to re-run.
search = | inputlookup monitored_sourcetypes_csv | eval _key = sourcetype | eval alert_action = coalesce(alert_action, "none") | eval alert_action_config = coalesce(alert_action_config, "") | outputlookup monitored_sourcetypes_lookup append=true
dispatch.earliest_time = -1m
dispatch.latest_time = now
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Detection search - runs on configurable schedule.
#
# Last-received time comes from `| tstats max(_indextime) ... by sourcetype` as
# the OUTER generating command, with the monitored-sourcetypes lookup as the
# small (<=1000 row) `append` subsearch. tstats (NOT `| metadata`) because
# metadata is silently capped at 10,000 sourcetypes — on a very large tenant
# real sourcetypes drop out and mis-flag (#18). tstats over tsidx has no such
# cap, needs no data-model acceleration (summariesonly defaults to false), and
# reads index time so it is robust to bad event timestamps.
# PERFORMANCE — designed to run every few minutes on tenants from 1 GB/day to
# 150+ TB/day, hundreds of PB retained.
#   NOTE (b86): an earlier build (b84/b85) also constrained the tstats scan to the
#   monitored sourcetypes with a `[| inputlookup ... | format]` subsearch in the
#   where clause. That was REMOVED — a bare `NOT ( )` from the empty-lookup case
#   AND the subsearch-in-tstats-where construct itself errored on some Splunk
#   editions/versions (worked on 10.2 Enterprise, broke elsewhere). tstats still
#   computes max(_indextime) for every sourcetype and the existing `where _mon=1`
#   step keeps only the monitored ones — correct, and the query shape every
#   pre-b84 release ran successfully. The subsearch was only a secondary win
#   (it trims aggregation work WITHIN the scanned buckets); the dominant lever is
#   the window below (it controls how many BUCKETS are opened), which is kept.
#   THE WINDOW: a single, configurable lookback — the dispatch event
#      window `dispatch.earliest_time = -24h → now` (below), driven by the
#      `detection_lookback` setting (minutes; default 1440 = 24h). This REPLACES the ±2y
#      window (b83 and earlier), which forced tstats to open up to 2 YEARS of
#      buckets every run — the real performance killer on a long-retention tenant.
#      Splunk prunes buckets by event _time (bucket directory names), so a narrow
#      event window keeps the scan to ~24h of buckets (the default; tighten via
#      the setting) — cheap relative to the old ±2y. 24h TOLERATES the common
#      timezone / DST / forwarder-lag timestamp skew (a source whose _time is up
#      to 24h behind its ingest is still seen); tighten to 15-60 min for max
#      performance when timestamps are known-clean. `max(_indextime)` MEASURES
#      index/receipt time (the true
#      "did it stop sending to Splunk" signal), so the window bounds the scan while
#      the measurement stays index-time. We do NOT use `_index_earliest`: it would
#      have to be rewritten in this SPL every time the cron frequency changed to
#      stay >= the run interval, and the single event window already gives contiguous
#      run-to-run coverage (the lookback just needs to be >= the cron frequency —
#      valid frequencies are 1-60 min, all covered by the 1440 m default) AND absorbs
#      ingest lag. The prev_last_seen carry (below) preserves last_seen for sources
#      silent longer than the window, so the lookback stays small without losing
#      the ability to age long-silent sources.
# ACCEPTED TRADEOFF (deliberate — solve for the majority): a feed whose parsed
# _time is skewed MORE than the lookback window (24h default) from its ingest
# time won't be tracked accurately. At 24h that requires a >1-day timestamp
# error, which is itself a data-quality problem the operator would know about;
# operators who tighten the lookback for performance re-narrow that tolerance.
# `where _mon=1` keeps only sourcetypes that are actually monitored: the lookup
# subsearch tags its rows with _mon=1, a tstats-only sourcetype has none. We tag
# with _mon rather than `isnotnull(threshold_minutes)` so a monitored row with an
# empty/missing threshold isn't silently dropped (#23) — it's kept and the
# threshold coalesces to 60 below. A monitored sourcetype that has never sent
# data has no tstats row, so last_event_time is null -> last_seen 0 -> flagged.
# prev_last_seen carry: tstats is bounded by the short index-time window, so a
# sourcetype silent longer than that drops out of tstats — the coalesce keeps the
# previously-known last_seen instead of regressing the row to 0 ("never"); the
# carry (not a wide window) is what lets a narrow lookback still age long-silent
# sources correctly. Rows genuinely never seen still get 0.
[Data Heartbeat - Source Type Monitor]
description = Detects source types that haven't logged data within their configured threshold
search = | tstats max(_indextime) as last_event_time where index=* OR index=_* by sourcetype \
| rename sourcetype as monitored_sourcetype \
| append \
    [| inputlookup monitored_sourcetypes_lookup | rename sourcetype as monitored_sourcetype | eval _mon=1] \
| stats max(last_event_time) as last_event_time, first(_mon) as _mon, first(threshold_minutes) as threshold_minutes, \
    first(importance) as importance, first(discovery_source) as discovery_source, \
    first(usage_count) as usage_count, first(usage_searches) as usage_searches, first(usage_dashboards) as usage_dashboards, \
    first(added_by) as added_by, first(added_time) as added_time, \
    first(notes) as notes, first(alert_action) as alert_action, \
    first(alert_action_config) as alert_action_config, \
    first(last_seen) as prev_last_seen \
    by monitored_sourcetype \
| where _mon=1 \
| eval now_time = now() \
| eval _prev = coalesce(tonumber(prev_last_seen), 0) \
| eval freshness_basis = case(isnotnull(last_event_time) AND coalesce(last_event_time,0) >= _prev, "index_time", _prev > 0, "carried", 1=1, "never") \
| eval last_seen = max(coalesce(last_event_time, 0), _prev) \
| fields - prev_last_seen, _prev \
| eval last_seen = if(last_seen > now_time AND last_seen > 0, now_time, last_seen) \
| eval minutes_since_seen = max(0, round((now_time - last_seen) / 60, 1)) \
| eval _thr = coalesce(tonumber(threshold_minutes), 60) \
| eval status = if(minutes_since_seen > _thr OR last_seen = 0, "flagged", "good") \
| fields - _thr \
| eval alert_action = coalesce(alert_action, "none") \
| eval alert_action_config = coalesce(alert_action_config, "") \
| table monitored_sourcetype, threshold_minutes, last_seen, minutes_since_seen, status, freshness_basis, importance, discovery_source, usage_count, usage_searches, usage_dashboards, added_by, added_time, notes, alert_action, alert_action_config \
| rename monitored_sourcetype as sourcetype \
| lookup heartbeat_deleted_lookup sourcetype OUTPUT deleted_time as _del_time \
| where isnull(_del_time) OR isnull(tonumber(added_time)) OR tonumber(added_time) >= tonumber(_del_time) \
| fields - _del_time \
| eval _key = sourcetype | outputlookup monitored_sourcetypes_lookup append=true
cron_schedule = 1-59/5 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat
request.ui_dispatch_view = search

# Nightly backup: dump the monitored_sourcetypes KV collection to the
# monitored_sourcetypes_backup KV collection (replicates across SHC members).
# Lets the operator recover from an accidental wipe by running the "Restore from
# Backup" saved search (below) which inversely copies the backup collection → KV.
# (a48 r10) override_if_empty=false + a row-count guard so an EMPTY source (e.g. the
# night after an accidental wipe, before the operator restores) can NOT overwrite the
# good backup with nothing — that would destroy the only recovery point. Mirrors the
# same guard on the Restore search.
[Data Heartbeat - Nightly KV Backup]
description = Dumps the monitored_sourcetypes KV-store collection to a backup KV collection every night. Recovery path for accidental wipe.
search = | inputlookup monitored_sourcetypes_lookup | eventstats count as _n | where _n > 0 | fields - _n | outputlookup override_if_empty=false monitored_sourcetypes_backup
cron_schedule = 0 3 * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Reap deletion tombstones older than 1 day. A tombstone only has to outlive the
# longest in-flight detection snapshot (the every-5-min run, seconds long), so 1
# day is a very safe margin; keeping the recent ones bounds the collection while
# still protecting the resurrection window. The full outputlookup (no append)
# REPLACES the collection with just the still-recent tombstones — which is the
# intended reap (0 rows => cleared). enabled/disabled alongside detection.
[Data Heartbeat - Prune Deletion Tombstones]
description = Removes deletion tombstones (heartbeat_deleted) older than 1 day; they only need to outlive an in-flight detection run.
search = | inputlookup heartbeat_deleted_lookup | where isnotnull(deleted_time) AND deleted_time >= relative_time(now(), "-1d") | eval _key = sourcetype | table _key, sourcetype, deleted_time | outputlookup heartbeat_deleted_lookup
cron_schedule = 20 3 * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Disaster recovery: re-seed KV from the nightly backup CSV.
# Dispatched on demand by the operator (UI button in Settings, or via REST).
#
# Ships disabled=1 so this destructive write-path can't be triggered
# accidentally from Splunk Manager — operator must enable it intentionally
# before restoring (or invoke via REST from the UI which does so transiently).
# Bails out if the backup CSV is empty / malformed so a corrupt or partially-
# written backup file doesn't clobber live KV with garbage.
# Uses a full outputlookup (no append) so the collection is REPLACED with the
# backup contents — append would leave behind corrupt/stale rows that exist in
# the live collection but not the backup, so recovery wouldn't be clean.
# override_if_empty=false is the real safety net: the eventstats row-count
# "bail-out" only filters rows — it cannot stop outputlookup itself, which
# with 0 input rows would REPLACE the live collection with empty (verified on
# 10.2). With the flag, a 0-row input is a warn-level no-op.
# Restore blanks alert_action_config before writing back (a3#1): per-row alert
# TARGET secrets (webhook URLs/recipients) live ONLY in the admin-only
# heartbeat_alert_targets collection post-v1.4.0. A backup snapshot taken on a
# pre-v1.4.0 build still carries the secret in this field; writing it back into the
# world-readable monitored_sourcetypes would re-leak it (CWE-200). The eval forces
# the field empty so restore can NEVER repopulate a secret into the world-readable
# collection. (Per-row targets themselves are not part of this monitored-list DR
# snapshot — see the README "Backup & restore" note — and are re-entered after a restore.)
[Data Heartbeat - Restore from Backup]
description = One-shot search that re-seeds the KV-store collection from the monitored_sourcetypes_backup KV collection. Run after an accidental wipe.
search = | inputlookup monitored_sourcetypes_backup | where isnotnull(sourcetype) AND sourcetype!="" | eventstats count as _backup_row_count | where _backup_row_count > 0 | fields - _backup_row_count | eval alert_action_config = "" | eval _key = sourcetype | outputlookup override_if_empty=false monitored_sourcetypes_lookup
dispatch.earliest_time = -1m
dispatch.latest_time = now
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Self-monitoring metrics: capture rows_processed + flagged/pending/good counts
# each detection run. Appends to the dedicated heartbeat_metrics lookup — NOT
# the audit log: the two have different schemas, and co-mingling them dropped
# the metric columns (outputlookup keeps the target CSV's header) and polluted
# the Audit dashboard with empty "health_metric" rows. Avoids `_internal` /
# `| collect`, which is forbidden for the `nobody` user on Splunk Cloud.
# (#9) Writes the single new health row with `outputlookup append=true` and a
# ring-buffer _key (hb.health.<5min-bucket % 10000>) — it does NOT read+rewrite
# the whole collection. The old full-rewrite trim raced bin/heartbeat_dispatch.py's
# heartbeat.dispatch_deferred KV insert (every-5-min collision window) and could
# silently drop it; an append-only per-_key upsert can't. Retention stays bounded
# at 10000 health rows (~34 days at the 5-min cadence) because the ring-buffer key
# reuses slots, so no separate trim/rewrite (and no new race) is needed.
[Data Heartbeat - Health Metrics]
description = Records detection-run health (rows processed, flagged/pending/good counts) to the heartbeat_metrics lookup for SLO tracking.
search = | inputlookup monitored_sourcetypes_lookup \
| eval flagged = if(status="flagged", 1, 0), pending = if(status="pending", 1, 0), good = if(status="good", 1, 0) \
| stats count as rows_processed, sum(flagged) as flagged_count, sum(pending) as pending_count, sum(good) as good_count \
| eval app = "SA-Data-Heartbeat", metric_name = "heartbeat.health", timestamp = now(), detection_duration_ms = 0 \
| eval _key = "hb.health." . tostring(floor(timestamp/300) % 10000) \
| table _key, timestamp, metric_name, app, rows_processed, flagged_count, pending_count, good_count, detection_duration_ms \
| outputlookup heartbeat_metrics append=true
cron_schedule = 2-59/5 * * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Monitor-the-monitor: pages operator when detection hasn't run in 15 min
# (cron is every 5 min so 3x cron-interval is the grace window). Built-in
# fallback for "the thing meant to alert me stopped alerting me."
#
# last_actual_run_time comes back from `| rest` in different formats across
# Splunk versions:
#   - 9.x: ISO-8601 with offset    "2026-05-18T12:34:56+0000"
#   - 10.x: space-delimited+zone   "2026-05-18 12:34:56 UTC"
#   - some cloud builds: epoch     "1779108296"
# The coalesce tries each shape so the alert actually fires regardless of
# the platform — the prior strict ISO-only parse returned null on most
# real-world installs, silently disabling the monitor.
[Data Heartbeat - Detection Stalled]
description = Fires when the Detection (Source Type Monitor) search has not run in over 15 minutes (3x its 5-minute cron). Catches the meta-failure where the monitor itself stops running.
search = | rest /servicesNS/-/-/saved/searches splunk_server=local \
| search title="Data Heartbeat - Source Type Monitor" \
| eval last_run_epoch = coalesce( \
    tonumber(last_actual_run_time), \
    strptime(last_actual_run_time, "%Y-%m-%dT%H:%M:%S%z"), \
    strptime(last_actual_run_time, "%Y-%m-%dT%H:%M:%S%Z"), \
    strptime(last_actual_run_time, "%Y-%m-%d %H:%M:%S %Z"), \
    strptime(last_actual_run_time, "%Y-%m-%d %H:%M:%S")) \
| eval last_run_age_min = round((now() - last_run_epoch) / 60, 1) \
| where last_run_epoch > 0 AND last_run_age_min > 15 \
| table title, last_actual_run_time, last_run_age_min
cron_schedule = 7-59/15 * * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
disabled = 1
is_visible = 1
alert.track = 1
alert.severity = 3
counttype = number of events
relation = greater than
quantity = 0
request.ui_dispatch_app = SA-Data-Heartbeat

# Alert for flagged source types.
#
# Per-sourcetype suppression: once a sourcetype fires, it's suppressed for
# 1 hour. Without this, a persistently-flagged sourcetype would re-fire every
# 10 minutes forever — Slack/Teams/email floods until the upstream feed is
# fixed. The suppression key is `sourcetype` so different flagged sourcetypes
# still alert independently within the same window.
[Data Heartbeat Alert - Flagged Sources]
description = Alerts when source types are flagged for missing data
search = | inputlookup monitored_sourcetypes_lookup \
| lookup heartbeat_deleted_lookup sourcetype OUTPUT deleted_time as _del_time \
| where isnull(_del_time) OR isnull(tonumber(added_time)) OR tonumber(added_time) >= tonumber(_del_time) \
| fields - _del_time \
| where status="flagged" \
| where alert_action!="none" \
| rename alert_action_config as _row_cfg \
| lookup heartbeat_alert_targets sourcetype OUTPUT alert_action_config \
| eval alert_action_config = coalesce(alert_action_config, _row_cfg, "") \
| fields - _row_cfg \
| eval _imp=case(importance="vip", 0, importance="critical", 1, importance="high", 2, importance="medium", 3, 1=1, 4) \
| sort _imp, -minutes_since_seen \
| head 200 \
| table sourcetype, threshold_minutes, minutes_since_seen, last_seen, status, importance, alert_action, alert_action_config
cron_schedule = */10 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
disabled = 1
is_visible = 1
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = sourcetype
# digest_mode = 1 (the spec default): splunkd invokes the alert action ONCE with
# ALL flagged rows in results_file. This is the contract bin/heartbeat_dispatch.py
# is built for — it reads every row and sends ONE consolidated digest per
# destination (email/Slack/Teams/webhook). With digest_mode = 0 (per-result)
# splunkd invokes the action once PER flagged sourcetype, so each invocation
# sends its own 1-row digest — a notification FLOOD (verified live: 3 flagged
# sources -> 3 separate emails). Suppression keys off the multivalue `sourcetype`
# set, so an unchanged flagged set is throttled for 1h and a changed set re-fires.
alert.digest_mode = 1
counttype = number of events
relation = greater than
quantity = 0
# Consolidated digest notifications via bin/heartbeat_dispatch.py (email / slack / teams / webhook)
action.heartbeat_dispatch = 1
request.ui_dispatch_app = SA-Data-Heartbeat

# Auto-Discovery Search - finds important source types and adds NEW ones to
# the monitored lookup as "pending" rows. Insert-only: the eventstats/where
# guard drops any candidate whose sourcetype already exists in the lookup, so
# operator-tuned thresholds/importance/notes are never overwritten, and the
# KV append=true upsert can only ever create rows. Candidate hygiene: rex over
# search strings captures wildcards (`foo*`) and dashboard tokens (`$tok$`)
# that can never match | metadata and would sit permanently flagged — the
# match() allowlist (same charset the UI bulk-add validates) keeps only real
# sourcetype names.
# (Before v1.2.9 this search ended at `| table` — its results went nowhere.)
[Data Heartbeat - Auto Discovery]
description = Discovers important source types from scheduled searches, correlation searches, dashboards, and audit logs, and adds new ones to the monitored lookup as pending
search = | rest /servicesNS/-/-/saved/searches splunk_server=local \
| search is_scheduled=1 disabled=0 \
| rex field=search max_match=100 "sourcetype\s*=\s*(?<discovered_st>[^\s\"\'\|\)]+)" \
| rex field=search max_match=100 "sourcetype\s*=\s*\"(?<discovered_st_q>[^\"]+)\"" \
| rex field=search max_match=100 "sourcetype\s*=\s*\'(?<discovered_st_sq>[^\']+)\'" \
| eval discovered_sourcetype=coalesce(discovered_st, discovered_st_q, discovered_st_sq) \
| where isnotnull(discovered_sourcetype) \
| stats count as usage_count values(title) as search_names by discovered_sourcetype \
| eval discovery_source="scheduled_searches" \
| rename discovered_sourcetype as sourcetype \
| append \
    [| rest /servicesNS/-/-/saved/searches splunk_server=local \
    | search action.correlationsearch.enabled=1 disabled=0 \
    | rex field=search max_match=100 "sourcetype\s*=\s*(?<discovered_st>[^\s\"\'\|\)]+)" \
    | rex field=search max_match=100 "sourcetype\s*=\s*\"(?<discovered_st_q>[^\"]+)\"" \
    | eval discovered_sourcetype=coalesce(discovered_st, discovered_st_q) \
    | where isnotnull(discovered_sourcetype) \
    | stats count as usage_count values(title) as search_names by discovered_sourcetype \
    | eval discovery_source="correlation_searches" \
    | rename discovered_sourcetype as sourcetype] \
| append \
    [| rest /servicesNS/-/-/data/ui/views splunk_server=local \
    | rex field="eai:data" max_match=100 "sourcetype\s*=\s*(?<discovered_st>[^\s\"\'\|\)\<]+)" \
    | rex field="eai:data" max_match=100 "sourcetype\s*=\s*\"(?<discovered_st_q>[^\"]+)\"" \
    | eval discovered_sourcetype=coalesce(discovered_st, discovered_st_q) \
    | where isnotnull(discovered_sourcetype) \
    | stats count as usage_count values(title) as dashboard_names by discovered_sourcetype \
    | eval discovery_source="dashboards" \
    | rename discovered_sourcetype as sourcetype] \
| append \
    [| search index=_audit action=search info=completed \
    | head 50000 \
    | rex field=search max_match=100 "sourcetype\s*=\s*(?<discovered_st>[^\s\"\'\|\)]+)" \
    | rex field=search max_match=100 "sourcetype\s*=\s*\"(?<discovered_st_q>[^\"]+)\"" \
    | eval discovered_sourcetype=coalesce(discovered_st, discovered_st_q) \
    | where isnotnull(discovered_sourcetype) \
    | stats count as usage_count dc(user) as user_count by discovered_sourcetype \
    | where usage_count > 5 \
    | eval discovery_source="audit_logs" \
    | rename discovered_sourcetype as sourcetype] \
| stats sum(usage_count) as total_usage values(discovery_source) as sources by sourcetype \
| eval discovery_source=mvjoin(sources, ",") \
| eval primary_source=mvindex(sources, 0) \
| eval importance=case( \
    total_usage >= 40, "critical", \
    total_usage >= 20, "high", \
    total_usage >= 10, "medium", \
    1=1, "low") \
| eval threshold_minutes=case( \
    importance="critical", 30, \
    importance="high", 60, \
    importance="medium", 120, \
    1=1, 180) \
| eval status="pending", added_by="discovery", added_time=now(), notes="" \
| sort - total_usage \
| head 100 \
| rename total_usage as usage_count, primary_source as discovery_source \
| table sourcetype, threshold_minutes, status, importance, discovery_source, usage_count, added_by, added_time, notes \
| where match(sourcetype, "^[A-Za-z0-9][A-Za-z0-9:_.-]{0,127}$") \
| eval alert_action = "none", alert_action_config = "" \
| append [| inputlookup monitored_sourcetypes_lookup | eval _existing = 1 | fields sourcetype, _existing] \
| eventstats max(_existing) as _already by sourcetype \
| where isnull(_already) \
| fields - _existing, _already \
| eval _key = sourcetype \
| outputlookup monitored_sourcetypes_lookup append=true
cron_schedule = 0 2 * * *
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat
request.ui_dispatch_view = search

# Nightly refresh of the "use cases" reference counts for EVERY monitored row.
# usage_count was previously stamped only at ADD time and never updated, so a
# row added before any dashboards/alerts referenced it showed "0 uses" forever
# (and counts never dropped when objects were deleted). This recomputes the
# unified metric — DISTINCT saved searches/alerts + dashboards referencing
# `sourcetype=X` — and updates usage_count plus a usage_searches/usage_dashboards
# breakdown (badge tooltip), preserving every operator-tuned field via the same
# append/first() merge the detection search uses. dc(_obj), NOT dedup|count: the
# /-/-/ REST namespace returns the same object once per ACL context (see b80).
# REST-only (no index scan) — cheap at any scale. Runs at 02:30, after Auto
# Discovery (02:00), so newly-discovered rows get a breakdown the same night.
# Tombstone guard mirrors detection so this rewrite can't resurrect a row
# deleted mid-run.
[Data Heartbeat - Usage Refresh]
description = Nightly recount of how many saved searches/alerts and dashboards reference each monitored sourcetype (usage_count + breakdown)
search = | rest /servicesNS/-/-/saved/searches splunk_server=local | eval _obj="s::".title | fields _obj search \
| append [| rest /servicesNS/-/-/data/ui/views splunk_server=local | rename "eai:data" as search | eval _obj="d::".title | fields _obj search] \
| rex field=search max_match=100 "sourcetype\s*=\s*[\"']?(?<_st>[A-Za-z0-9:_.\/\-]+)" \
| mvexpand _st \
| stats dc(eval(if(like(_obj,"s::%"),_obj,null()))) as _n_search, dc(eval(if(like(_obj,"d::%"),_obj,null()))) as _n_dash by _st \
| rename _st as sourcetype \
| eval new_usage = coalesce(_n_search,0) + coalesce(_n_dash,0) \
| append [| inputlookup monitored_sourcetypes_lookup | eval _row=1] \
| stats first(new_usage) as new_usage, first(_n_search) as _n_search, first(_n_dash) as _n_dash, first(_row) as _row, \
    first(threshold_minutes) as threshold_minutes, first(last_seen) as last_seen, \
    first(minutes_since_seen) as minutes_since_seen, first(status) as status, \
    first(freshness_basis) as freshness_basis, first(importance) as importance, \
    first(discovery_source) as discovery_source, first(added_by) as added_by, \
    first(added_time) as added_time, first(notes) as notes, \
    first(alert_action) as alert_action, first(alert_action_config) as alert_action_config \
    by sourcetype \
| where _row=1 \
| eval usage_count = coalesce(new_usage, 0) \
| eval usage_searches = coalesce(_n_search, 0) \
| eval usage_dashboards = coalesce(_n_dash, 0) \
| fields - new_usage, _n_search, _n_dash, _row \
| lookup heartbeat_deleted_lookup sourcetype OUTPUT deleted_time as _del_time \
| where isnull(_del_time) OR isnull(tonumber(added_time)) OR tonumber(added_time) >= tonumber(_del_time) \
| fields - _del_time \
| eval _key = sourcetype | outputlookup monitored_sourcetypes_lookup append=true
cron_schedule = 30 2 * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
disabled = 1
is_visible = 1
request.ui_dispatch_app = SA-Data-Heartbeat
request.ui_dispatch_view = search
