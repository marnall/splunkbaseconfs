# Custom alert action that sends consolidated digest notifications, using the
# heartbeat_alert_actions KV collection for per-action settings. See bin/heartbeat_dispatch.py.

[heartbeat_dispatch]
label = Data Heartbeat - Per-Row Notify
description = Sends a consolidated digest notification per destination (email / Slack / Teams / webhook) for flagged sourcetypes.
icon_path = appIcon.png
is_custom = 1
payload_format = json
# python.version selects the interpreter; Splunk auto-invokes the matching
# bin/heartbeat_dispatch.py for this custom alert action. A `command = python3 ...`
# line is intentionally omitted — a bare `python3` token resolves via the
# subprocess PATH (not Splunk's bundled interpreter), which fails on a
# restricted Cloud PATH.
python.version = python3
# Splunk 10.2+ deprecates python.version in favor of python.required (AppInspect
# cloud check check_alert_actions_conf_python_required) and python.required TAKES
# PRECEDENCE over python.version on 10.2+. python.required is a comma-separated
# list and Splunk runs "the highest version AVAILABLE from the list you provide"
# (restmap/alert_actions .conf.spec). 3.9 is the 10.2 DEFAULT (always present);
# 3.13 is opt-in. We MUST list 3.9 too — with 3.13 alone, a Cloud/10.2 tenant
# that hasn't enabled 3.13 has no satisfiable interpreter and the dispatcher
# (all alerting) silently cannot run. Listing both runs on 3.9 everywhere and
# prefers 3.13 where enabled. (Verified: heartbeat_dispatch.py parses on 3.9.)
# pre-10.2 ignores python.required and falls back to python.version above.
python.required = 3.9, 3.13
