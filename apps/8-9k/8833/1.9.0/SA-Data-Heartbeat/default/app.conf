#
# SA-Data-Heartbeat - Source Type Data Monitoring App
# Detects when source types stop sending data
#

[install]
is_configured = 0
build = 88

[ui]
is_visible = 1
label = Data Heartbeat

[launcher]
author = O11y Innovators Network
description = Monitor source types for data gaps. Detects when source types stop logging and flags them based on configurable thresholds. Your data's pulse - always monitored.
version = 1.9.0

[id]
name = SA-Data-Heartbeat
version = 1.9.0

[package]
id = SA-Data-Heartbeat
# Splunkbase requires check_for_updates to be enabled (it must NOT be disabled).
check_for_updates = 1
