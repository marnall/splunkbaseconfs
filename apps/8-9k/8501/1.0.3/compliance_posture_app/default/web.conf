[expose:ciscat_upload]
pattern = ciscat_upload/upload
methods = POST

[expose:ciscat_upload_element]
pattern = ciscat_upload/upload/*
methods = POST, GET

[expose:admin_ciscat_upload]
pattern = admin/ciscat_upload
methods = POST, GET

[expose:admin_ciscat_upload_element]
pattern = admin/ciscat_upload/*
methods = POST, GET
