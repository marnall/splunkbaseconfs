#
# Compliance Posture for Splunk - Saved Searches
# GIC Engineering Consultants
#

# ============================================================================
# REPORTS
# ============================================================================

[CIS - Compliance Summary by Host]
search = `ciscat_summary_by_host` | table asset_hostname, asset_ip, benchmark_title, profile, compliance_score, pass_count, fail_count, excluded_count, total_rules | rename asset_hostname AS Host, asset_ip AS "IP Address", benchmark_title AS Benchmark, profile AS Profile, compliance_score AS "Compliance Score %", pass_count AS Pass, fail_count AS Fail, excluded_count AS Excluded, total_rules AS Total | sort - "Compliance Score %"
dispatch.earliest_time = 0
dispatch.latest_time   = now
display.general.type   = statistics
display.page.search.tab = statistics
display.visualizations.show = 0

[CIS - Failed Rules by Benchmark Section]
search = `ciscat_failed` | stats count by section_label, asset_hostname, benchmark_title | sort section_label, - count | rename section_label AS Section, asset_hostname AS Host, benchmark_title AS Benchmark, count AS "Failed Rules"
dispatch.earliest_time = 0
dispatch.latest_time   = now
display.general.type   = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_view = search

[CIS - Remediation Report]
search = `ciscat_failed` | table asset_hostname, benchmark_title, profile, rule_section, section_label, rule_id, rule_title, result | rename asset_hostname AS Host, benchmark_title AS Benchmark, profile AS Profile, rule_section AS "Section #", section_label AS Section, rule_id AS "Rule ID", rule_title AS "Rule Title", result AS Result | sort Host, "Section #", "Rule ID"
dispatch.earliest_time = 0
dispatch.latest_time   = now
display.general.type   = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_view = search

[CIS - Compliance Score Trend]
search = `ciscat_base` | dedup upload_batch_id, asset_hostname, benchmark_title, profile | eval assessment_date=strftime(strptime(assessment_time, "%Y-%m-%dT%H:%M:%S"), "%Y-%m-%d") | stats avg(compliance_score) AS avg_score, min(compliance_score) AS min_score, max(compliance_score) AS max_score by assessment_date | sort assessment_date
dispatch.earliest_time = 0
dispatch.latest_time   = now
display.general.type   = statistics
display.page.search.tab = statistics
display.visualizations.show = 0

# ============================================================================
# ALERTS  (disabled by default — enable and configure per environment)
# ============================================================================

# Alert: Compliance Below Threshold
# Fires daily if any host+benchmark combination drops below the threshold.
# Default threshold: 80%. Adjust in the search or via macro.
[CIS - Compliance Below Threshold Alert]
search = `ciscat_summary_by_host` | where compliance_score < 80 | table asset_hostname, benchmark_title, profile, compliance_score, fail_count | rename asset_hostname AS Host, benchmark_title AS Benchmark, profile AS Profile, compliance_score AS "Compliance Score %", fail_count AS "Failed Rules"
dispatch.earliest_time = -24h@h
dispatch.latest_time   = now
cron_schedule          = 0 6 * * *
enableSched            = 0
disabled               = 1

# Alert: New Failed Rules Detected
# Fires when a host that previously had only passing results now has failures.
# Compares upload_batch_id timestamps to detect newly introduced failures.
[CIS - New Failed Rules Detected Alert]
search = `ciscat_failed` | stats count by asset_hostname, benchmark_title, rule_id, rule_title | table asset_hostname, benchmark_title, rule_id, rule_title, count | rename asset_hostname AS Host, benchmark_title AS Benchmark, rule_id AS "Rule ID", rule_title AS "Rule Title"
dispatch.earliest_time = -1h@h
dispatch.latest_time   = now
alert.suppress         = 1
alert.suppress.period  = 24h
alert.suppress.fields  = rule_id, asset_hostname
cron_schedule          = 0 * * * *
enableSched            = 0
disabled               = 1
