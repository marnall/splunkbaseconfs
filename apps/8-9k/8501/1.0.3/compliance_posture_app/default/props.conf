#
# Compliance Posture for Splunk - Props Configuration
# GIC Engineering Consultants
#

[ciscat:arf]
# JSON events — one per line (one rule-result per event)
SHOULD_LINEMERGE = false
LINE_BREAKER     = ([\r\n]+)
NO_BINARY_CHECK  = true
TRUNCATE         = 0

# Timestamp extraction from upload_time field (time of upload, not scan time).
# _time = upload_time keeps indexing grounded in the present.
# assessment_time (actual scan date) is preserved as a separate field for trend charts.
# parse_arf.py explicitly sets _time = upload_time so Splunk never falls back to
# assessment_time extraction. MAX_DAYS_HENCE workaround no longer needed.
# Format: 2026-02-23T20:44:13
TIME_FORMAT              = %Y-%m-%dT%H:%M:%S
TIME_PREFIX              = "upload_time":\s*"
MAX_TIMESTAMP_LOOKAHEAD  = 32

# JSON key-value extraction — handles all fields produced by parse_arf.py
KV_MODE = json

# ── Field aliases for CIM compatibility and convenience ───────────────────────
FIELDALIAS-host       = asset_hostname AS host
FIELDALIAS-hostname   = asset_hostname AS hostname
FIELDALIAS-ip         = asset_ip AS ip
FIELDALIAS-fqdn       = asset_fqdn AS fqdn
FIELDALIAS-benchmark  = benchmark_title AS benchmark
FIELDALIAS-rule       = rule_id AS rule
FIELDALIAS-status     = result AS status
FIELDALIAS-title      = rule_title AS title

# ── Calculated fields ─────────────────────────────────────────────────────────
# Boolean convenience fields for SPL filtering
EVAL-is_pass     = if(result=="pass", 1, 0)
EVAL-is_fail     = if(result=="fail" OR result=="error", 1, 0)
EVAL-is_excluded = if(result=="notapplicable" OR result=="informational" OR rule_weight==0, 1, 0)
