#
# Compliance Posture for Splunk - Macros
# GIC Engineering Consultants
#
# INDEX CONFIGURATION:
# All dashboards and the upload handler reference the index from these macros.
# To change the target index (e.g., from main to ciscat):
#   1. Go to Settings > Advanced Search > Search Macros
#   2. Set App filter to "Compliance Posture for Splunk"
#   3. Update ciscat_base: change index=main to index=ciscat
#   4. Update ciscat_latest: change index=main to index=ciscat
#   5. Update ciscat_upload_history: change index=main to index=ciscat
#   6. Ensure the target index exists on your indexers and search heads
# No code changes or CLI access required.

# ── Base access ───────────────────────────────────────────────────────────────

[ciscat_base]
definition = index=main sourcetype="ciscat:arf"
iseval = 0

# Dedup: latest scan per host + benchmark + profile + rule combination.
# Ensures dashboards always show the most recent result for each rule
# when the same host has been scanned multiple times.
[ciscat_latest]
definition = index=main sourcetype="ciscat:arf" | dedup asset_hostname, benchmark_title, profile, rule_id sortby -upload_time
iseval = 0

# ── Result filters (applied on top of ciscat_latest) ─────────────────────────

[ciscat_failed]
definition = `ciscat_latest` | search (result="fail" OR result="error")
iseval = 0

[ciscat_passing]
definition = `ciscat_latest` | search result="pass"
iseval = 0

[ciscat_excluded]
definition = `ciscat_latest` | search (result="notapplicable" OR result="informational" OR rule_weight=0)
iseval = 0

# ── Aggregation macros ────────────────────────────────────────────────────────

# Per-host, per-benchmark compliance summary using the compliance_score field
# from the ARF result (stored on every event for that scan).
# Uses max() since all rules in a scan share the same compliance_score value.
[ciscat_summary_by_host]
definition = `ciscat_latest` | stats max(compliance_score) AS compliance_score, count(eval(result="pass")) AS pass_count, count(eval(result="fail" OR result="error")) AS fail_count, count(eval(result="notapplicable" OR result="informational")) AS excluded_count, count AS total_rules by asset_hostname, asset_ip, benchmark_title, profile
iseval = 0

# Upload history log: one row per upload batch.
# Deduplicates on upload_batch_id so multi-rule events collapse to one row.
[ciscat_upload_history]
definition = index=main sourcetype="ciscat:arf" | dedup upload_batch_id | eval upload_date=strftime(strptime(upload_time, "%Y-%m-%dT%H:%M:%S"), "%Y-%m-%d %H:%M:%S") | table upload_date, asset_hostname, benchmark_title, profile, upload_batch_id | sort - upload_date
iseval = 0

# Compliance score threshold check — used by alerting saved search.
# Returns hosts where compliance_score is below the threshold.
[ciscat_below_threshold(1)]
args = threshold
definition = `ciscat_summary_by_host` | where compliance_score < $threshold$
iseval = 0
