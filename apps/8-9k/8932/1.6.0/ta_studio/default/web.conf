######################################################
# TA Studio — web.conf
#
# The custom CherryPy endpoint (endpoint:ta_studio) was removed in the
# Splunk 10.4 compliance migration. The app now uses the PSCA REST handler
# exclusively (see default/restmap.conf).
#
# The [expose:...] stanza below is required so splunkweb's proxy controller
# (proxy.py) allows requests through to the PSCA endpoint. The proxy
# compiles a whitelist from these stanzas at startup and returns 404 for
# any path not listed — regardless of whether splunkd has the endpoint.
######################################################

[expose:ta_studio_api]
methods = GET,POST,PUT,DELETE
pattern = ta_studio/**
