######################################################
# TA Studio — splunkd REST endpoint
#
# Exposes the full project/input/alert/build API at:
#   /servicesNS/{user}/ta_studio/ta_studio/{path}
#
# This mirrors the CherryPy endpoint at:
#   /en-US/custom/ta_studio/ta_studio/api/v1/{path}
#
# Both endpoints delegate to the same tas_lib.router.dispatch()
# so behaviour is identical. Use the splunkweb endpoint for
# browser-based file downloads (icons, package archives) — PSCA
# cannot stream binary files and returns 501 for those routes.
#
# Reads (GET) require the `view_ta_studio` capability.
# Writes (POST/PUT/DELETE) require the `edit_ta_studio` capability.
# Both are granted to admin/sc_admin by default; view also to power.
# See authorize.conf for the role grants.
######################################################

[script:ta_studio_api]
match             = /ta_studio
script            = ta_studio_rest.py
scripttype        = persist
handler           = ta_studio_rest.TAStudioApp
output_modes      = json
passPayload       = true
passSession       = true
requireAuthentication = true
# python.version picks the interpreter: `python3` = highest available python3
# (3.9 on Splunk 9.2-10.1, 3.13 on 10.2+). AppInspect's
# check_rest_handler_python_executable_exists REQUIRES python.version to be one
# of {python3, python3.7, python3.9} on the handler stanza — python.required
# alone does NOT satisfy it (it's a hard Splunkbase failure). python.required
# additionally pins the acceptable set. tas_lib runs under both 3.9 and 3.13.
python.version    = python3
python.required   = 3.9, 3.13
capability.get    = view_ta_studio
capability.post   = edit_ta_studio
capability.put    = edit_ta_studio
capability.delete = edit_ta_studio
