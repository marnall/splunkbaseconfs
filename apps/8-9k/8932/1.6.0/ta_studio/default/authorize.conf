######################################################
# TA Studio — capabilities
#
# `view_ta_studio` gates every read (GET) through the API router. Splunkbase
# distributions land in shared splunkd installs where roles like `user` may
# not be add-on authors — without the gate, those roles can browse every
# project's configs, sourcetype regexes, AI key status, etc.
#
# `edit_ta_studio` gates every write (POST/PUT/DELETE). Writes touch the
# workspace on disk and shell out to ucc-gen.
#
# To grant access to additional roles beyond admin/sc_admin/power, create
# a `[role_<name>]` stanza in local/authorize.conf with:
#   view_ta_studio = enabled
#   edit_ta_studio = enabled  (only if the role should also be able to save)
######################################################

[capability::view_ta_studio]

[capability::edit_ta_studio]

[role_admin]
view_ta_studio = enabled
edit_ta_studio = enabled

[role_sc_admin]
view_ta_studio = enabled
edit_ta_studio = enabled

[role_power]
view_ta_studio = enabled
