######################################################
# TA Studio — Splunk add-on authoring UI
######################################################

[install]
is_configured = false
state = enabled
build = 1

# Minimum Splunk version (9.2.0) is NOT declared in conf at all: app.conf has no
# valid key for it (a splunk_version key in [install] trips Splunk's startup conf
# check), and app.manifest's platformRequirements is omitted because SLIM rejects
# a version-range value (">=9.2.0") during Splunkbase cloud validation. The
# requirement is declared in the Splunkbase listing and enforced at runtime by
# tas_lib.services.compat (MIN_SPLUNK).

[ui]
is_visible = true
label = TA Studio

[launcher]
author = Joshua Specht
version = 1.6.0
description = Browser-based GUI for building Splunk add-ons (wraps ucc-gen).

[package]
id = ta_studio
check_for_updates = true

# Splunkbase requires an [id] stanza (name + version) for app installation and
# update tracking. Keep version in lockstep with [launcher] via sync_version.py.
[id]
name = ta_studio
version = 1.6.0
