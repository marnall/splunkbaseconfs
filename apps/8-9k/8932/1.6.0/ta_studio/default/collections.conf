######################################################
# TA Studio — KV Store collections
#
# Replaces the old SQLite `projects` table. KV Store records use
# auto-generated string `_key` values; the rest of the schema mirrors
# the old SQLAlchemy Project model field-for-field.
#
# `field.<name> = <type>` makes a field indexable. Anything not declared
# is still stored, just not indexed — fine for free-form text. We index
# `folder_name` because it's the natural lookup key for uniqueness checks
# and import flows.
######################################################

[ta_studio_projects]
field.name = string
field.folder_name = string
field.author = string
field.version = string
field.visible = bool
field.theme_color = string
field.workspace_path = string
field.created_at = string
field.updated_at = string
accelerated_fields.folder_name = {"folder_name": 1}

######################################################
# ta_studio_settings — singleton global settings record (non-secret)
#
# Single record stored at key "global". Only provider + model are written
# here; the API key goes in storage/passwords (Splunk's encrypted store).
######################################################

[ta_studio_settings]
field.provider = string
field.model = string

######################################################
# ta_studio_jobs — async build/package/validate metadata
#
# Replaces the old in-memory job dict. Records survive splunkweb restart
# so completed-job results don't disappear before the user sees them.
# The actual ThreadPoolExecutor is still per-process; jobs that were
# `running` when splunkweb went down get marked `error` ("orphaned") on
# the first read after restart, detected via the per-process UUID stored
# on each row.
######################################################

[ta_studio_jobs]
field.name = string
field.status = string
field.submitted_at = number
field.started_at = number
field.finished_at = number
field.process_uuid = string
field.pid = number
accelerated_fields.by_submitted = {"submitted_at": -1}
accelerated_fields.by_status = {"status": 1, "submitted_at": -1}
