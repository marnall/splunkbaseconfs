# AppInspect requires python.version under [phishiqplus_enrichment] or [default],
# not only under [phishiqplus_enrichment://<name>].
[phishiqplus_enrichment]
python.version = python3
python.required = 3.13

[phishiqplus_enrichment://default]
python.version = python3
python.required = 3.13
disabled = 1
interval = 600
api_base_url = https://phishiq-api-371323850079.us-central1.run.app
api_key =
api_key_name = customer-license
request_timeout_seconds = 30
ssl_verify = 1
cache_enabled = 1
cache_ttl_seconds = 86400
cache_max_entries = 10000
cache_clear_on_start = 0
index = main
sourcetype = phishiq_enriched
retry_max_attempts = 3
retry_base_delay_ms = 250
retry_max_delay_ms = 5000
circuit_breaker_failures = 5
circuit_breaker_reset_seconds = 60
degraded_mode = emit_error_event
telemetry_enabled = 1
internal_sourcetype = phishiqplus:internal
internal_index = phishiqplus_internal
source_search =
source_url_field = url
source_search_limit = 500
source_search_earliest = -15m
source_search_latest = now
source_search_overlap_seconds = 30
source_search_batch_size = 100
source_search_max_urls = 1000
dynamic_sleep_ms_between_batches = 0
emit_original_event_context = 0
emit_source_event_context = 1
