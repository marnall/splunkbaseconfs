[PhishIQPlus - Correlation Coverage (24h)]
search = `phishiqplus_correlation_filter(main,phishiq_enriched)` | stats count as correlated_events dc(phishiq_source_event_hash) as unique_source_events
cron_schedule = 15 * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 1
description = Tracks how many enrichment events include source correlation context.

[PhishIQPlus - Correlation Top Sources (24h)]
search = `phishiqplus_correlation_filter(main,phishiq_enriched)` | stats count as enriched_events by phishiq_source_event_source phishiq_source_event_sourcetype | sort - enriched_events | head 20
cron_schedule = 20 * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 1
description = Shows top upstream source streams contributing URLs into dynamic enrichment.

[PhishIQPlus - Alert High Failure Rate (15m)]
search = index=phishiqplus_internal sourcetype=phishiqplus:internal event_type=run_summary | stats sum(urls_success) as success sum(urls_failed) as failed | eval total=success+failed, failure_rate=if(total>0, round((failed/total)*100,2), 0) | where total>=50 AND failure_rate>=20
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
alert.suppress = 1
alert.suppress.period = 30m
action.logevent = 1
description = Triggers when failure rate is high over meaningful event volume.

[PhishIQPlus - Alert Rate Limit or Circuit Breaker (15m)]
search = index=phishiqplus_internal sourcetype=phishiqplus:internal event_type=run_summary | eval last_error=coalesce(client_metrics.last_error, ""), circuit_open=coalesce(client_metrics.circuit_open, 0) | where last_error="rate_limited" OR circuit_open>0
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
alert.suppress = 1
alert.suppress.period = 30m
action.logevent = 1
description = Detects API rate limiting or circuit breaker activation signals.
