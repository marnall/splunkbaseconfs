[script:deployment_manager_apps]
match                 = /deployment_manager/apps
script                = handler.py
scripttype            = python
handler               = handler.DeploymentManagerHandler
requireAuthentication = true
output_modes          = json
passSystemAuth        = true
python.version        = python3
python.required       = 3.13

[script:deployment_manager_creds]
match                 = /deployment_manager/credentials
script                = handler.py
scripttype            = python
handler               = handler.CredentialsHandler
requireAuthentication = true
output_modes          = json
passSystemAuth        = true
python.version        = python3
python.required       = 3.13
