# Saved Searches and Alerts for Airia Platform

# ============================================
# SUMMARY INDEXING - For High Performance Dashboards
# ============================================

[Airia - Hourly Summary]
search = `airia_base_with_fields` \
| bin _time span=1h \
| stats count as executions, \
        sum(cost_numeric) as total_cost, \
        avg(cost_numeric) as avg_cost, \
        sum(tokens_numeric) as total_tokens, \
        avg(tokens_numeric) as avg_tokens, \
        sum(eval(if(match(_raw,"\"Success\":true"),1,0))) as successful_executions, \
        sum(eval(if(match(_raw,"\"Success\":false"),1,0))) as failed_executions, \
        sum(eval(if(is_dlp_blocked="true",1,0))) as dlp_blocked, \
        dc(model_name) as unique_models, \
        dc(prompt_name) as unique_prompts, \
        dc(user_input) as unique_users \
        by _time, model_name, provider, prompt_name \
| collect index=airia_summary sourcetype=airia:summary
cron_schedule = 5 * * * *
enableSched = 1
dispatch.earliest_time = -65m@m
dispatch.latest_time = -5m@m
description = Hourly summary of Airia Platform metrics for fast dashboard loading

[Airia - Daily Summary]
search = `airia_base_with_fields` \
| bin _time span=1d \
| stats count as executions, \
        sum(cost_numeric) as total_cost, \
        avg(cost_numeric) as avg_cost, \
        sum(tokens_numeric) as total_tokens, \
        avg(tokens_numeric) as avg_tokens, \
        sum(eval(if(match(_raw,"\"Success\":true"),1,0))) as success_count, \
        sum(eval(if(is_dlp_blocked="true",1,0))) as dlp_count, \
        dc(model_name) as unique_models, \
        dc(prompt_name) as unique_prompts, \
        dc(execution_id) as unique_executions \
        by _time \
| eval success_rate=round((success_count/executions)*100,2), dlp_rate=round((dlp_count/executions)*100,2) \
| fields - success_count dlp_count \
| collect index=airia_summary sourcetype=airia:daily_summary
cron_schedule = 0 1 * * *
enableSched = 1
dispatch.earliest_time = -1d@d
dispatch.latest_time = @d
description = Daily rollup of Airia Platform metrics

# ============================================
# ALERTS - Critical Thresholds
# ============================================

[ALERT - High Daily Cost]
search = `airia_base_with_fields` \
| stats sum(cost_numeric) as daily_cost \
| where daily_cost > 50
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 4h
alert.digest_mode = 1
alert.severity = 3
alert_condition = search daily_cost > 50
action.email = 1
action.email.to = admin@example.com
action.email.subject = Airia Platform - High Daily Cost Alert ($daily_cost$)
action.email.message.alert = Daily AI costs have exceeded $50. Current cost: $result.daily_cost$
description = Alert when daily AI costs exceed $50

[ALERT - DLP Blocking Spike]
search = `airia_dlp_events` \
| stats count as blocked_count \
| where blocked_count > 10
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 1h
alert.digest_mode = 1
alert.severity = 4
alert_condition = search blocked_count > 10
action.email = 1
action.email.to = security@example.com
action.email.subject = Airia Platform - DLP Blocking Spike Detected
action.email.message.alert = DLP has blocked $result.blocked_count$ requests in the past hour. This may indicate a security issue or policy misconfiguration.
description = Alert when DLP blocks more than 10 requests in an hour

[ALERT - Execution Failure Rate]
search = `airia_base_with_fields` \
| stats count as total, sum(eval(if(Success="false",1,0))) as failures \
| eval failure_rate = round((failures/total)*100,2) \
| where failure_rate > 10
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 2h
alert.digest_mode = 1
alert.severity = 3
alert_condition = search failure_rate > 10
action.email = 1
action.email.to = ops@example.com
action.email.subject = Airia Platform - High Failure Rate Alert
action.email.message.alert = Execution failure rate has reached $result.failure_rate$% in the past hour. Total failures: $result.failures$ out of $result.total$ executions.
description = Alert when execution failure rate exceeds 10%

[ALERT - Slow Performance]
search = `airia_base_with_fields` \
| where duration_seconds > 5 \
| stats count as slow_requests, avg(duration_seconds) as avg_duration \
| where slow_requests > 5
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 1h
alert.digest_mode = 1
alert.severity = 2
alert_condition = search slow_requests > 5
action.email = 1
action.email.to = ops@example.com
action.email.subject = Airia Platform - Slow Performance Detected
action.email.message.alert = $result.slow_requests$ executions took longer than 5 seconds in the past 30 minutes. Average duration: $result.avg_duration$ seconds.
description = Alert when more than 5 requests take longer than 5 seconds in 30 minutes

[ALERT - New Model Usage]
search = `airia_ai_ops` \
| stats count by model_name \
| where count > 0 \
| join type=left model_name [search `airia_ai_ops` earliest=-25h@h latest=-1h@h | stats count as prev_count by model_name] \
| where isnull(prev_count)
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
alert.track = 1
alert.severity = 1
alert_condition = search count > 0
action.email = 1
action.email.to = admin@example.com
action.email.subject = Airia Platform - New AI Model Detected
action.email.message.alert = A new AI model has been used: $result.model_name$. This may indicate configuration changes or new features being tested.
description = Alert when a new AI model is used for the first time

[ALERT - Token Usage Spike]
search = `airia_base_with_fields` \
| stats sum(tokens_numeric) as hourly_tokens \
| where hourly_tokens > 1000000
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 2h
alert.digest_mode = 1
alert.severity = 2
alert_condition = search hourly_tokens > 1000000
action.email = 1
action.email.to = admin@example.com
action.email.subject = Airia Platform - High Token Usage Alert
action.email.message.alert = Token usage in the past hour has exceeded 1 million. Total tokens: $result.hourly_tokens$
description = Alert when hourly token usage exceeds 1 million

# ============================================
# SCHEDULED REPORTS - Regular Reporting
# ============================================

[REPORT - Daily Cost Summary]
search = `airia_base_with_fields` \
| stats sum(cost_numeric) as total_cost, \
        count as total_executions, \
        sum(tokens_numeric) as total_tokens, \
        sum(eval(if(match(_raw,"\"Success\":true"),1,0))) as success_count, \
        sum(eval(if(is_dlp_blocked="true",1,0))) as dlp_count \
        by model_name, provider \
| eval total_cost=round(total_cost,2) \
| eval avg_cost_per_execution=round(total_cost/total_executions,4) \
| eval success_rate=round((success_count/total_executions)*100,2) \
| eval dlp_rate=round((dlp_count/total_executions)*100,2) \
| fields - success_count dlp_count \
| sort -total_cost
dispatch.earliest_time = -1d@d
dispatch.latest_time = @d
cron_schedule = 0 6 * * *
enableSched = 1
action.email = 1
action.email.to = finance@example.com
action.email.subject = Airia Platform - Daily Cost Report
action.email.format = csv
action.email.sendcsv = 1
description = Daily cost summary report sent to finance team

[REPORT - Weekly Executive Summary]
search = `airia_base_with_fields` \
| stats sum(cost_numeric) as weekly_cost, \
        count as total_executions, \
        sum(tokens_numeric) as total_tokens, \
        sum(eval(if(match(_raw,"\"Success\":true"),1,0))) as success_count, \
        sum(eval(if(is_dlp_blocked="true",1,0))) as dlp_count, \
        dc(model_name) as unique_models, \
        dc(prompt_name) as unique_prompts, \
        dc(user_input) as unique_users \
| eval weekly_cost=round(weekly_cost,2) \
| eval monthly_projection=round(weekly_cost*4.3,2) \
| eval avg_cost_per_execution=round(weekly_cost/total_executions,4) \
| eval success_rate=round((success_count/total_executions)*100,2) \
| eval dlp_rate=round((dlp_count/total_executions)*100,2) \
| fields - success_count dlp_count
dispatch.earliest_time = -7d@d
dispatch.latest_time = @d
cron_schedule = 0 8 * * 1
enableSched = 1
action.email = 1
action.email.to = executives@example.com
action.email.subject = Airia Platform - Weekly Executive Summary
action.email.format = html
description = Weekly executive summary of platform usage and costs

