# ============================================
# OPTIMIZATION REPORTS
# ============================================

[REPORT - Cost Optimization Opportunities]
search = `airia_ai_ops` \
| stats sum(cost_numeric) as total_cost, \
        sum(tokens_numeric) as total_tokens, \
        avg(tokens_numeric) as avg_tokens, \
        count as request_count \
        by prompt_name, model_name \
| eval total_cost=round(total_cost,2) \
| eval avg_cost=round(total_cost/request_count,4) \
| where total_cost > 1 \
| sort -total_cost \
| head 20
dispatch.earliest_time = -7d@d
dispatch.latest_time = @d
cron_schedule = 0 9 * * 1
enableSched = 1
action.email = 1
action.email.to = ops@example.com
action.email.subject = Airia Platform - Cost Optimization Opportunities
description = Weekly report highlighting highest cost operations for optimization
