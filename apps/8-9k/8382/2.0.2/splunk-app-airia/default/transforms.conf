# Lookup Table Definitions for Airia Platform

[model_pricing_lookup]
filename = model_pricing.csv
case_sensitive_match = false

[completion_status_lookup]
filename = completion_status.csv
case_sensitive_match = false
match_type = WILDCARD(completion_status)

# Automatic lookups - enrich events at search time
[model_pricing_auto]
filename = model_pricing.csv
case_sensitive_match = false

[completion_status_auto]
filename = completion_status.csv
case_sensitive_match = false
