[install]
is_configured = false
state = enabled
build = 3

[ui]
is_visible = 1
label = Airia Platform Analytics
show_in_nav = true

[id]
name = splunk-app-airia
version = 2.0.2

[launcher]
author = Airia Platform Team
description = Enterprise-grade analytics and monitoring solution for Airia Platform AI operations. Features: Real-time cost tracking, DLP monitoring, performance analytics, accelerated data models, automated alerts, and interactive dashboards with drilldowns.
version = 2.0.2

[package]
id = splunk-app-airia
check_for_updates = 1

[triggers]
# Reload triggers removed - Splunk-defined conf files (props, transforms, macros, eventtypes, tags)
# are automatically reloaded and should not be configured in [triggers] stanza
# Only use reload triggers for custom conf files

[credential]
# No credentials stored in app

[default]
# Default settings
