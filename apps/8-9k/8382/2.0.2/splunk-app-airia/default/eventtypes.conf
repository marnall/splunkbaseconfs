# Event Types for Airia Platform
# These categorize events for easier searching and correlation

[airia_execution]
search = index=airia sourcetype=airia:syslog success=*
priority = 1

[airia_successful_execution]
search = index=airia sourcetype=airia:syslog success=true
priority = 2

[airia_failed_execution]
search = index=airia sourcetype=airia:syslog success=false
priority = 2

[airia_ai_operation]
search = index=airia sourcetype=airia:syslog model_name=*
priority = 3

[airia_dlp_blocked]
search = index=airia sourcetype=airia:syslog is_dlp_blocked=true
priority = 4

[airia_high_cost]
search = index=airia sourcetype=airia:syslog cost_numeric>0.10
priority = 3

[airia_high_token_usage]
search = index=airia sourcetype=airia:syslog tokens_numeric>10000
priority = 3

[airia_slow_execution]
search = index=airia sourcetype=airia:syslog duration=* | rex field=duration "(?<duration_sec>\\d+\\.\\d+)" | where duration_sec>5
priority = 3

[airia_input_step]
search = index=airia sourcetype=airia:syslog step_type=InputStep
priority = 2

[airia_output_step]
search = index=airia sourcetype=airia:syslog step_type=OutputStep
priority = 2

[airia_anthropic_model]
search = index=airia sourcetype=airia:syslog provider=Anthropic
priority = 3

[airia_google_model]
search = index=airia sourcetype=airia:syslog provider=Google
priority = 3

[airia_openai_model]
search = index=airia sourcetype=airia:syslog provider=OpenAI
priority = 3

[airia_prompt_execution]
search = index=airia sourcetype=airia:syslog prompt_name=* prompt_name!=null
priority = 2
