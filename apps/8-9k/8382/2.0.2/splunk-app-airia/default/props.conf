# Airia Platform syslog sourcetype
[airia:syslog]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 100000
# Use RFC5424 timestamp from syslog header
TIME_PREFIX = ^[^\s]+\s+<\d+>\d+\s+
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%z
MAX_TIMESTAMP_LOOKAHEAD = 32
CHARSET = UTF-8

# ==========================================
# FIELD EXTRACTION STRATEGY
# ==========================================
# Use MANUAL regex extraction (KV_MODE=none) to handle complex nested JSON
# with dynamic GUID keys that automatic JSON extraction cannot parse

# Disable automatic JSON extraction to avoid conflicts with manual EXTRACT directives
KV_MODE = none

# ==========================================
# MANUAL EXTRACTIONS FOR ALL FIELDS
# ==========================================
# These regex patterns extract fields from deeply nested JSON structures
# regardless of dynamic GUID keys in StepsExecutionContext

# AI Model fields (nested in StepsExecutionContext -> GUID -> DebugInformation)
EXTRACT-model_name = "modelName":"(?<model_name>[^"]+)"
EXTRACT-model_display = "modelDisplayName":"(?<model_display>[^"]+)"
EXTRACT-provider = "modelProviderType":"(?<provider>[^"]+)"
EXTRACT-model_id = "modelId":"(?<model_id>[^"]+)"

# Cost and Token fields (nested in DebugInformation)
EXTRACT-tokens_cost = "tokensCost":"(?<tokens_cost>[^"]+)"
EXTRACT-total_tokens = "totalTokens":"(?<total_tokens>[^"]+)"
EXTRACT-input_tokens = "inputTokens":"(?<input_tokens>[^"]+)"
EXTRACT-output_tokens = "outputTokens":"(?<output_tokens>[^"]+)"

# Prompt fields (nested in DebugInformation)
EXTRACT-prompt_name = "promptName":"(?<prompt_name>[^"]+)"
EXTRACT-prompt_id = "promptId":"(?<prompt_id>[^"]+)"
EXTRACT-prompt_version_id = "promptVersionId":"(?<prompt_version_id>[^"]+)"
EXTRACT-system_prompt_id = "systemPromptId":"(?<system_prompt_id>[^"]+)"

# Execution fields (top-level and DebugInformation)
EXTRACT-success = "Success":(?<success>true|false)
EXTRACT-execution_id = "executionId":"(?<execution_id>[^"]+)"
EXTRACT-duration = "Duration":"(?<duration>[^"]+)"

# Step fields (can appear multiple times per event)
EXTRACT-step_type = "StepType":"(?<step_type>[^"]+)"
EXTRACT-step_title = "StepTitle":"(?<step_title>[^"]+)"
EXTRACT-completion_status = "CompletionStatus":(?<completion_status>\d+)
EXTRACT-step_id = "StepId":"(?<step_id>[^"]+)"

# AI operation completion status (where DLP blocking occurs)
# This extracts CompletionStatus specifically from AIOperation steps
EXTRACT-ai_completion_status = "StepType":"AIOperation"[^}]+?"CompletionStatus":(?<ai_completion_status>\d+)

# User input field (extract user queries from InputStep)
EXTRACT-user_input = "StepType":"InputStep"[^}]*"Value":"(?<user_input>[^"]+)"

# AI output field (extract AI responses from OutputStep)
EXTRACT-ai_output = "StepType":"OutputStep"[^}]*"Value":"(?<ai_output>[^"]+)"

# Performance fields (nested in DebugInformation)
EXTRACT-model_call_duration = "modelCallDuration":"(?<model_call_duration>[^"]+)"
EXTRACT-policy_execution_duration = "policyExecutionDuration":"(?<policy_execution_duration>[^"]+)"
EXTRACT-policies_duration = "policiesExecutionDuration":"(?<policies_duration>[^"]+)"

# Streaming and API fields
EXTRACT-streamed = "streamed":(?<streamed>true|false)
EXTRACT-api_key_name = "apiKeyName":"(?<api_key_name>[^"]+)"
EXTRACT-use_user_input = "useUserInput":(?<use_user_input>true|false)

# TimeTrackingData fields
EXTRACT-started_at = "StartedAt":"(?<started_at>[^"]+)"
EXTRACT-finished_at = "FinishedAt":"(?<finished_at>[^"]+)"

# Exception handling
EXTRACT-exception_message = "ExceptionMessage":"(?<exception_message>[^"]+)"

# User tracking fields (if available)
EXTRACT-user_id = "userId":"(?<user_id>[^"]+)"
EXTRACT-user_email = "userEmail":"(?<user_email>[^"]+)"
EXTRACT-username = "username":"(?<username>[^"]+)"
EXTRACT-account_id = "accountId":"(?<account_id>[^"]+)"
EXTRACT-organization_id = "organizationId":"(?<organization_id>[^"]+)"

# ==========================================
# CALCULATED FIELDS (EVAL)
# ==========================================
# All calculated fields moved to macros.conf to avoid eval syntax conflicts
# Props.conf focuses on field extraction and lookup enrichment only

# ==========================================
# FIELD ALIASES
# ==========================================
# Create user-friendly alternative field names for easier searching

FIELDALIAS-model = model_name AS model modelDisplayName AS model_display_name
FIELDALIAS-tokens = totalTokens AS total_tokens inputTokens AS input_tokens outputTokens AS output_tokens
FIELDALIAS-cost = tokensCost AS tokens_cost
FIELDALIAS-prompt = promptName AS prompt_name promptId AS prompt_id
FIELDALIAS-execution = executionId AS execution_id
FIELDALIAS-user = userId AS user_id userEmail AS user_email
FIELDALIAS-duration_alias = Duration AS duration

# ==========================================
# AUTOMATIC LOOKUPS
# ==========================================
# Enrich events with external data from CSV lookups

# Lookup model pricing and metadata
LOOKUP-model_pricing = model_pricing_lookup model_name OUTPUT model_display AS model_display_enriched, provider AS provider_enriched, input_price_per_million, output_price_per_million, context_window, supports_streaming, tier AS model_tier

# Lookup completion status metadata (only if field exists)
LOOKUP-completion_status = completion_status_lookup completion_status OUTPUT status_name AS status_name_enriched, status_category, is_success AS lookup_is_success, requires_action

# Lookup AI operation completion status metadata (only if field exists)
# Fixed to prevent "Could not load lookup" error by making it conditional
# LOOKUP-ai_completion_status = completion_status_lookup ai_completion_status AS completion_status OUTPUT status_name AS ai_status_name_enriched, status_category AS ai_status_category, is_success AS ai_is_success, requires_action AS ai_requires_action

# ==========================================
# SOURCETYPE ROUTING
# ==========================================
[source::tcp:514]
sourcetype = airia:syslog

[source::udp:514]
sourcetype = airia:syslog
