# Search Macros for Airia Platform
# Reusable search patterns for consistency and performance

[airia_base]
definition = index=airia sourcetype=airia:syslog
iseval = 0

[airia_extract_all_fields]
definition = spath | \
  rex field=_raw max_match=0 "\"modelName\":\"(?<model_name>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"tokensCost\":\"(?<tokens_cost>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"totalTokens\":\"(?<total_tokens>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"inputTokens\":\"(?<input_tokens>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"outputTokens\":\"(?<output_tokens>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"modelDisplayName\":\"(?<model_display>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"modelProviderType\":\"(?<provider>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"executionId\":\"(?<execution_id>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"promptName\":\"(?<prompt_name>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"user_input\":\"(?<user_input>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"ai_output\":\"(?<ai_output>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"ai_completion_status\":\"(?<ai_completion_status>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"ai_completion_status_name\":\"(?<ai_completion_status_name>[^\"]+)\"" | \
  rex field=_raw "^[^}]+\"TimeTrackingData\":\{\"Duration\":\"(?<duration>[^\"]+)\"" | \
  rex field=_raw max_match=0 "\"policies_duration\":\"(?<policies_duration>[^\"]+)\"" | \
  rex field=_raw "\"Success\":(?<Success>true|false)" | \
  rex field=_raw max_match=0 "\"CompletionStatus\":(?<all_completion_statuses>\\d+)" | \
  eval is_dlp_blocked=if(mvfind(all_completion_statuses,"6")>=0,"true","false") | \
  eval cost_numeric=tonumber(tokens_cost) | \
  eval tokens_numeric=tonumber(total_tokens) | \
  eval input_tokens_numeric=tonumber(input_tokens) | \
  eval output_tokens_numeric=tonumber(output_tokens) | \
  rex field=duration "(?<dur_hours>\\d+):(?<dur_minutes>\\d+):(?<dur_seconds>\\d+\\.\\d+)" | \
  eval duration_seconds=(tonumber(dur_hours)*3600)+(tonumber(dur_minutes)*60)+tonumber(dur_seconds) | \
  rex field=policies_duration "(?<pol_hours>\\d+):(?<pol_minutes>\\d+):(?<pol_seconds>\\d+\\.\\d+)" | \
  eval policies_duration_seconds=(tonumber(pol_hours)*3600)+(tonumber(pol_minutes)*60)+tonumber(pol_seconds)
iseval = 0

[airia_base_with_fields]
definition = `airia_base` | `airia_extract_all_fields`
iseval = 0

[airia_ai_ops]
definition = `airia_base_with_fields` | where isnotnull(model_name) AND cost_numeric>0
iseval = 0

[airia_dlp_events]
definition = `airia_base_with_fields` | where is_dlp_blocked="true"
iseval = 0

[airia_failures]
definition = index=airia sourcetype=airia:syslog Success=false
iseval = 0

[airia_high_cost]
definition = index=airia sourcetype=airia:syslog cost_numeric>0.10
iseval = 0

[airia_slow_requests]
definition = index=airia sourcetype=airia:syslog | rex field=duration "(?<duration_sec>\\d+\\.\\d+)" | where duration_sec>5
iseval = 0

# Parameterized macros
[airia_by_model(1)]
args = model
definition = index=airia sourcetype=airia:syslog model_name="$model$"
iseval = 0

[airia_by_provider(1)]
args = provider
definition = index=airia sourcetype=airia:syslog provider="$provider$"
iseval = 0

[airia_by_prompt(1)]
args = prompt
definition = index=airia sourcetype=airia:syslog prompt_name="$prompt$"
iseval = 0

[airia_cost_range(2)]
args = min_cost, max_cost
definition = index=airia sourcetype=airia:syslog cost_numeric>=$min_cost$ cost_numeric<=$max_cost$
iseval = 0

[airia_time_range(1)]
args = hours
definition = index=airia sourcetype=airia:syslog earliest=-$hours$h@h latest=now
iseval = 0

# Calculated field macros
[airia_total_cost]
definition = sum(cost_numeric)
iseval = 0

[airia_avg_tokens]
definition = avg(tokens_numeric)
iseval = 0

[airia_success_rate]
definition = sum(eval(if(match(_raw,"\"Success\":true"),1,0)))
iseval = 0

[airia_dlp_rate]
definition = sum(eval(if(match(_raw,"\"is_dlp_blocked\":true"),1,0)))
iseval = 0

# Time conversion macros
[duration_to_seconds]
definition = tonumber(replace(duration, "^00:00:([0-9]+\\.?[0-9]*).*", "\\1"))
iseval = 0

[duration_to_ms]
definition = tonumber(replace(duration, "^00:00:([0-9]+)\\.([0-9]+).*", "\\1")) * 1000 + tonumber(replace(duration, "^00:00:[0-9]+\\.([0-9]{0,3}).*", "\\1"))
iseval = 0

# Model performance macro
[model_performance_stats]
definition = stats count as requests, sum(cost_numeric) as total_cost, avg(cost_numeric) as avg_cost, avg(tokens_numeric) as avg_tokens, sum(tokens_numeric) as total_tokens, sum(eval(if(match(_raw,"\"Success\":true"),1,0))) as success_count by model_name, provider | eval success_rate=round((success_count/requests)*100,2)
iseval = 0

# Cost analysis macro
[daily_cost_projection]
definition = stats sum(cost_numeric) as daily_cost | eval monthly_projection=round(daily_cost*30,2), yearly_projection=round(daily_cost*365,2)
iseval = 0

# User activity macro
[user_activity_summary]
definition = stats count as executions, sum(cost_numeric) as total_cost, avg(tokens_numeric) as avg_tokens by user_input
iseval = 0

# DLP analysis macro
[dlp_blocking_analysis]
definition = stats count as total_requests, sum(eval(if(is_dlp_blocked="true",1,0))) as blocked_requests, sum(eval(if(is_dlp_blocked="false",1,0))) as allowed_requests | eval block_rate=round((blocked_requests/total_requests)*100,2)."%"
iseval = 0

# Token efficiency macro
[token_efficiency]
definition = eval efficiency=if(cost_numeric>0, tokens_numeric/cost_numeric, 0) | stats avg(efficiency) as avg_efficiency, max(efficiency) as max_efficiency, min(efficiency) as min_efficiency
iseval = 0

# Prompt performance comparison
[prompt_comparison]
definition = stats count as usage_count, sum(cost_numeric) as total_cost, avg(cost_numeric) as avg_cost, avg(tokens_numeric) as avg_tokens, sum(eval(if(match(_raw,"\"Success\":true"),1,0))) as success_count, sum(eval(if(match(_raw,"\"is_dlp_blocked\":true"),1,0))) as dlp_count by prompt_name | eval success_rate=round((success_count/usage_count)*100,2), dlp_rate=round((dlp_count/usage_count)*100,2)
iseval = 0
