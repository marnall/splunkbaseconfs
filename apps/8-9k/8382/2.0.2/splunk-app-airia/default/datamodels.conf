# Airia Platform Data Model Acceleration Configuration
# NOTE: Data model acceleration should NOT be configured in datamodels.conf
# Administrators should enable and configure acceleration manually via Splunk Web GUI:
# Settings > Data models > Edit Acceleration
#
# Recommended acceleration settings (configure via GUI when enabling):
# - Enable acceleration: Yes
# - Keep 7 days of accelerated data: acceleration.earliest_time = -7d
# - Update summaries every 5 minutes: acceleration.cron_schedule = */5 * * * *
# - Allow 2 concurrent summarization jobs: acceleration.max_concurrent = 2
# - Backfill last 7 days of data: acceleration.backfill_time = -7d
# - Maximum time for summarization job (1 hour): acceleration.max_time = 3600

# Empty configuration - acceleration settings must be configured via Splunk Web GUI
[Airia_Platform]
