[admin:maze_security_configuration]
match = /
members = maze_security_account, maze_security_settings

[admin:maze_security_inputs]
match = /
members = maze_security_maze_investigations_search

[admin_external:maze_security_account]
handlertype = python
python.version = python3
handlerfile = maze_security_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:maze_security_settings]
handlertype = python
python.version = python3
handlerfile = maze_security_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:maze_security_maze_investigations_search]
handlertype = python
python.version = python3
handlerfile = maze_security_rh_maze_investigations_search.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
