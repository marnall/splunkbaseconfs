[maze_index]
definition = index=*
iseval = 0
description = The index containing Maze investigation data. Override in local/macros.conf to use a different index.

[maze_investigations]
definition = `maze_index` sourcetype="maze:investigations" | dedup id sortby -_time
iseval = 0
description = Base search for Maze investigation events. Uses the maze_index macro for portability.
