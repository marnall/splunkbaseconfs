[Maze - New Critical Exploitable Findings]
description = Alerts when new critical and exploitable investigation findings are detected.
search = `maze_investigations` | spath path="snapshot.status" output=inv_status | search inv_status="open" exploitability="exploitable" maze_severity="CRITICAL" | stats count as critical_exploitable | where critical_exploitable > 0
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
disabled = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0

[Maze - Stale Data Alert]
description = Alerts when no new Maze investigation events have been ingested in the last 24 hours.
search = `maze_index` sourcetype="maze:investigations" earliest=-24h | stats count as recent_events | where recent_events=0
dispatch.earliest_time = -25h
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1
disabled = 1
alert.suppress = 0
alert.track = 1
counttype = always
relation = greater than
quantity = 0

[Maze - Exploitable Findings Spike]
description = Alerts when the number of new exploitable findings in the last hour exceeds the 7-day hourly average by 3x.
search = `maze_investigations` | search exploitability="exploitable" | bucket _time span=1h | stats count as hourly_count by _time | eventstats avg(hourly_count) as avg_count | where hourly_count > (avg_count * 3) | head 1
dispatch.earliest_time = -7d
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
disabled = 1
alert.suppress = 1
alert.suppress.period = 4h
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
