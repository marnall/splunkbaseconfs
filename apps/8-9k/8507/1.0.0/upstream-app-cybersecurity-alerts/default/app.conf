# Upstream Security App for Cybersecurity Alerts
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = Upstream Security
version = 1.0.0
description = Provides dashboards for monitoring and analyzing vehicle cybersecurity alerts ingested from the Upstream Security platform. Includes an alert severity breakdown, geographic mapping, alert trends over time, and detailed alert tables. Requires the Upstream Security Add-on for Cybersecurity Alerts (TA-upstream).

[ui]
is_visible = 1
label = Upstream Security App for Cybersecurity Alerts

[package]
id = upstream-app-cybersecurity-alerts

