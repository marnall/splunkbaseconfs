#
# KV store lookup definitions. These expose the collections to SPL via
# inputlookup / outputlookup.
#

[dashboard_health_inventory]
external_type = kvstore
collection = dashboard_health_inventory
fields_list = _key, dashboard_id, dashboard_title, app, owner, sharing, source_dashboard_type, panel_count, search_count, extraction_time

[dashboard_health_findings]
external_type = kvstore
collection = dashboard_health_findings
fields_list = _key, dashboard_id, dashboard_title, app, owner, search_id, panel_title, search_type, source_dashboard_type, spl, rule_id, category, severity, message, recommendation, finding_time

[dashboard_health_scores]
external_type = kvstore
collection = dashboard_health_scores
fields_list = _key, dashboard_id, dashboard_title, app, owner, sharing, source_dashboard_type, search_count, issue_count, critical_issue_count, high_issue_count, medium_issue_count, low_issue_count, dashboard_health_score, estimated_risk_level, avg_runtime, daily_runs, user_count, score_time
