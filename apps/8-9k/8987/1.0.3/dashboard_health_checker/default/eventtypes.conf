#
# Convenience eventtypes for the OPTIONAL summary-index snapshots.
# Only meaningful if "Dashboard Health - Snapshot to Summary" is enabled.
#

[dashboard_health_score_snapshot]
search = sourcetype=dashboard_health:score
#tags = dashboard_health report

[dashboard_health_critical_dashboard]
search = sourcetype=dashboard_health:score estimated_risk_level=Critical

[dashboard_health_at_risk_dashboard]
search = sourcetype=dashboard_health:score (estimated_risk_level=Poor OR estimated_risk_level=Critical)
