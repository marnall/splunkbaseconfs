#
# ============================================================================
# Dashboard Health Checker - SPL analysis engine
# ============================================================================
# The entire pipeline is pure SPL: no custom commands, no scripted inputs,
# no external calls. Everything below is transparent and editable.
#
# Pipeline:
#   `dhc_get_dashboards`        -> one row per view (raw definition + metadata)
#   `dhc_extract_searches`      -> one row per search found inside a dashboard
#   `dhc_apply_search_rules`    -> appends per-search findings to _findings (mv)
#   `dhc_apply_dashboard_rules` -> appends dashboard-level findings
#   `dhc_split_finding`         -> turns a single _findings token into columns
# ============================================================================


# ---------------------------------------------------------------------------
# Tunables
# ---------------------------------------------------------------------------

[dhc_max_searches]
definition = 20
iseval = 0

# Apps to skip during discovery (Splunk-shipped system / monitoring apps that
# legitimately use index-less searches like | rest and | tstats, which would
# otherwise generate false positives). Add or remove app names as you like.
# NOTE: "search" (Search & Reporting) is intentionally NOT excluded, because
# user-built dashboards commonly live there.
[dhc_app_exclusions]
definition = NOT app IN ("splunk_monitoring_console","splunk_instrumentation","splunk_secure_gateway","splunk_internal_metrics","splunk_metrics_workspace","splunk_archiver","splunk_rapid_diag","splunk_gdi","python_upgrade_readiness_app","appsbrowser","journald_input","introspection_generator_addon","splunk_httpinput","alert_logevent","alert_webhook","learned","legacy","sample_app","system","splunk_secure_gateway")
iseval = 0

# Summary index for OPTIONAL historical trending. Defaults to the always
# present "summary" index so the app works with no index provisioning.
# Change to "dashboard_health" if you create a dedicated index.
[dhc_summary_index]
definition = summary
iseval = 0


# ---------------------------------------------------------------------------
# Discovery: every dashboard view across every app the running user can see.
# ---------------------------------------------------------------------------
[dhc_get_dashboards]
definition = rest /servicesNS/-/-/data/ui/views splunk_server=local count=0 timeout=180 \
| rename "eai:appName" as app, "eai:acl.owner" as owner, "eai:acl.sharing" as sharing, "eai:data" as xml, title as dashboard_id \
| search `dhc_app_exclusions` \
| eval dashboard_title = coalesce(label, dashboard_id) \
| eval source_dashboard_type = if(match(xml, "version\s*=\s*\"2\"") OR match(xml, "\"visualizations\"") OR match(xml, "\"dataSources\""), "studio", "simple_xml") \
| table dashboard_id, dashboard_title, app, owner, sharing, source_dashboard_type, xml
iseval = 0


# ---------------------------------------------------------------------------
# Extraction: pull every search string out of each dashboard definition and
# emit one event per search.
# ---------------------------------------------------------------------------
[dhc_extract_searches]
definition = `dhc_get_dashboards` \
| eval has_time_input = if(match(xml, "<input[^>]*type=\"time\"") OR match(lower(xml), "\"global_time\"") OR match(xml, "\$\w+\.earliest\$"), 1, 0) \
| eval _q_simple = if(source_dashboard_type=="simple_xml", xml, "") \
| eval _q_studio = if(source_dashboard_type=="studio", xml, "") \
| rex max_match=0 field=_q_simple "<query>(?<spl_inline>(?s).*?)</query>" \
| rex max_match=0 field=_q_simple "<search[^>]*\bref=\"(?<spl_ref>[^\"]+)\"" \
| rex max_match=0 field=_q_studio "\"query\"\s*:\s*\"(?<spl_studio>[^\"\\\\]*(?:\\\\.[^\"\\\\]*)*)\"" \
| eval spl_ref = if(isnotnull(spl_ref), "| savedsearch \"" . spl_ref . "\"", spl_ref) \
| eval spl_mv = mvappend(spl_inline, spl_studio, spl_ref) \
| mvexpand spl_mv \
| rename spl_mv as spl \
| eval spl = replace(spl, "<!\[CDATA\[", "") \
| eval spl = replace(spl, "\]\]>", "") \
| eval spl = replace(spl, "&lt;", "<") \
| eval spl = replace(spl, "&gt;", ">") \
| eval spl = replace(spl, "&quot;", "\"") \
| eval spl = replace(spl, "&#39;", "'") \
| eval spl = replace(spl, "&amp;", "&") \
| eval spl = replace(spl, "\\\\\"", "\"") \
| eval spl = replace(spl, "\\\\n", " ") \
| eval spl = replace(spl, "\\\\t", " ") \
| eval spl = replace(spl, "\s+", " ") \
| eval spl = trim(spl) \
| where spl!="" AND len(spl)>3 \
| eval spl_lc = lower(spl) \
| eval search_type = case(match(spl_lc, "^\s*\|?\s*savedsearch\b") OR match(spl_lc, "\|\s*loadjob\b"), "saved_ref", match(spl, "\$[a-z0-9_:.]+\$"), "chained", match(spl_lc, "^\s*\|"), "generating", true(), "inline") \
| streamstats count as _seq by dashboard_id \
| eval search_id = dashboard_id . "::s" . _seq \
| eval panel_title = "Search " . _seq \
| eval extraction_time = now() \
| table dashboard_id, dashboard_title, app, owner, sharing, source_dashboard_type, has_time_input, search_id, search_type, panel_title, spl, spl_lc, extraction_time
iseval = 0


# ---------------------------------------------------------------------------
# Per-search rule battery. Expects fields spl, spl_lc, has_time_input.
# Appends "RULE||category||severity||message||recommendation" tokens to the
# multivalue field _findings. Delimiter is "||".
# ---------------------------------------------------------------------------
[dhc_apply_search_rules]
definition = eval _findings = null() \
| eval _subs = mvcount(split(spl, "[")) - 1 \
| eval _findings = if(NOT match(spl_lc, "index\s*=") AND NOT match(spl_lc, "^\s*\|") AND NOT match(spl_lc, "(tstats|mstats|metadata|\|\s*rest|inputlookup|makeresults|loadjob|savedsearch|pivot|union|dbinspect|datamodel|from\s+datamodel|from\s+lookup)"), mvappend(_findings, "DHC-C001||data_selection||critical||No index constraint. The search scans all indexes the user can read.||Add an explicit index=<your_index> filter as the first term of the search."), _findings) \
| eval _findings = if(match(spl_lc, "index\s*=\s*\*"), mvappend(_findings, "DHC-C002||data_selection||critical||index=* forces a scan of every index.||Replace index=* with the specific index(es) the panel actually needs."), _findings) \
| eval _findings = if(NOT match(spl_lc, "^\s*\|") AND has_time_input!=1 AND NOT match(spl_lc, "(earliest|latest)\s*=") AND NOT match(spl, "\$[a-z0-9_]*\.?(earliest|latest)\$"), mvappend(_findings, "DHC-C003||time_bounds||critical||No time bounds detected on the search or its dashboard (effectively all-time).||Add a time range input to the dashboard or earliest/latest to the search. All-time searches are extremely expensive."), _findings) \
| eval _findings = if(match(spl_lc, "(earliest|latest)\s*=\s*\"?rt") OR match(spl_lc, "\brt[-_]\d"), mvappend(_findings, "DHC-C004||time_bounds||critical||Real-time search detected. Real-time searches hold resources continuously.||Convert to a scheduled or on-demand historical search unless real-time is a hard requirement."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*map\b"), mvappend(_findings, "DHC-C005||command||critical||Uses map, which runs a search per input row and scales very poorly.||Replace map with a join, lookup, stats, or a single search using OR/IN filters."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*join\b"), mvappend(_findings, "DHC-C006||command||critical||Uses join. Join is memory bound and silently truncates at 50k subsearch rows.||Prefer stats, lookups, or append + stats. Reserve join for small, bounded data sets."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*transaction\b"), mvappend(_findings, "DHC-C007||command||critical||Uses transaction, which is expensive and memory bound.||Use stats by <id> with earliest/latest/range, or streamstats, where possible."), _findings) \
| eval _findings = if(match(spl_lc, "(^|[\s(=])\*[a-z0-9_]") AND NOT match(spl_lc, "index\s*=\s*\*"), mvappend(_findings, "DHC-C008||data_selection||critical||A search term begins with a wildcard, which defeats indexed lookups.||Avoid leading wildcards. Anchor terms or use a more specific field match."), _findings) \
| eval _findings = if(_subs>=2, mvappend(_findings, "DHC-H001||structure||high||Multiple subsearches detected. Subsearches are bounded and run first, often serially.||Reduce subsearch count. Consider lookups, stats, or precomputed results."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*append(cols)?\b"), mvappend(_findings, "DHC-H002||command||high||Uses append or appendcols, which can be slow and row-order fragile.||Prefer a single search with stats by, or a lookup, where the result set allows."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*table\b.*\|\s*(where|search|stats|chart|timechart|dedup|sort|top|rare)\b"), mvappend(_findings, "DHC-H003||pipeline_order||high||table appears early, before filtering or aggregation.||Move table to the very end of the pipeline so intermediate commands keep the fields they need."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*sort\b") AND (NOT match(spl_lc, "\|\s*sort\s+(limit=)?[1-9]") OR match(spl_lc, "\|\s*sort\s+0\b")), mvappend(_findings, "DHC-H004||command||high||sort with no positive limit sorts the entire result set.||Add an explicit limit, e.g. sort 100 -_time, to cap the work."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*dedup\b.*\|\s*(where|search)\b"), mvappend(_findings, "DHC-H005||pipeline_order||high||dedup runs before a later filter, so it dedups rows that are then discarded.||Filter first with where/search, then dedup the smaller result set."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*regex\b"), mvappend(_findings, "DHC-H006||command||high||Uses regex for filtering. regex cannot use the index and is CPU heavy.||Where possible replace regex with field=value, IN(), or a keyword filter that the index can serve."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*(stats|chart|timechart|top|rare)\b.*\|\s*(where|search)\b"), mvappend(_findings, "DHC-H007||pipeline_order||high||A filter (where/search) is applied after aggregation.||Push filters as early as possible, before stats/chart/timechart, to reduce rows processed."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*(join|map|transaction|append)\b.*\|\s*(where|search)\b"), mvappend(_findings, "DHC-H008||pipeline_order||high||An expensive command runs before the data is narrowed.||Narrow with index/time/where filters first, then run the expensive command on fewer rows."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*fields\s+(\+\s*)?\*"), mvappend(_findings, "DHC-M001||command||medium||fields * keeps every field, removing the benefit of field selection.||Select only the fields the panel renders, e.g. fields _time, host, status."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*table\s+\*"), mvappend(_findings, "DHC-M002||command||medium||table * materialises all fields and is rarely intended.||Name the specific columns the table panel displays."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*stats\b") AND match(spl_lc, "index\s*=") AND NOT match(spl_lc, "\btstats\b") AND NOT match(spl_lc, "datamodel"), mvappend(_findings, "DHC-M003||acceleration||medium||Raw stats over indexed events. If a data model covers this data, tstats would be far faster.||Evaluate accelerating a CIM/data model and rewriting with | tstats."), _findings) \
| eval _findings = if(match(spl_lc, "(stats|chart|timechart)\b.*\|\s*fields\b"), mvappend(_findings, "DHC-L001||pipeline_order||low||fields is applied after aggregation rather than before.||Select needed fields before the aggregation to trim data earlier in the pipeline."), _findings) \
| eval _findings = if(match(spl_lc, "\|\s*head\b") AND NOT match(spl_lc, "\|\s*sort\b.*\|\s*head\b"), mvappend(_findings, "DHC-L002||command||low||head without a preceding sort returns non-deterministic rows.||Add a sort before head so the selected rows are predictable."), _findings)
iseval = 0


# ---------------------------------------------------------------------------
# Dashboard-level rules. Run on the search-grain stream, aggregate per
# dashboard, emit dashboard-level finding rows.
# ---------------------------------------------------------------------------
[dhc_apply_dashboard_rules]
definition = eventstats count as _spl_occurrences by dashboard_id, spl_lc \
| stats count as search_count, max(eval(if(_spl_occurrences>1,1,0))) as has_dups, values(app) as app, values(owner) as owner, values(dashboard_title) as dashboard_title, values(source_dashboard_type) as source_dashboard_type by dashboard_id \
| eval _findings = null() \
| eval _findings = if(search_count > `dhc_max_searches`, mvappend(_findings, "DHC-M005||structure||medium||Dashboard runs a large number of searches (" . search_count . "). Each panel search adds search head load.||Consolidate panels, use base searches with post-process, or split into multiple dashboards."), _findings) \
| eval _findings = if(has_dups==1, mvappend(_findings, "DHC-M004||structure||medium||Dashboard contains duplicate or repeated SPL across panels.||Define one base search and derive panels from it with post-process commands."), _findings) \
| where isnotnull(_findings) \
| eval search_id = dashboard_id . "::dashboard", panel_title = "(dashboard-level)", spl = "", search_type = "dashboard", has_time_input = 0 \
| table dashboard_id, dashboard_title, app, owner, source_dashboard_type, search_id, panel_title, search_type, spl, _findings
iseval = 0


# ---------------------------------------------------------------------------
# Expand one _findings token into rule_id / category / severity / message /
# recommendation columns. Run after `mvexpand _findings`.
# ---------------------------------------------------------------------------
[dhc_split_finding]
definition = eval _f = split(_findings, "||") \
| eval rule_id = mvindex(_f, 0), category = mvindex(_f, 1), severity = mvindex(_f, 2), message = mvindex(_f, 3), recommendation = mvindex(_f, 4) \
| fields - _f, _findings, spl_lc
iseval = 0


# ---------------------------------------------------------------------------
# Convenience macro for views: live per-search health score from findings.
# Argument 1 = dashboard_id to scope to.
# ---------------------------------------------------------------------------
[dhc_search_scores(1)]
definition = inputlookup dashboard_health_findings where dashboard_id="$dashboard_id$" \
| stats count(eval(severity=="critical")) as c, count(eval(severity=="high")) as h, count(eval(severity=="medium")) as m, count(eval(severity=="low")) as l, values(search_type) as search_type, values(panel_title) as panel_title, values(spl) as spl by search_id \
| eval search_health_score = max(0, min(100, 100 - (c*25 + h*15 + m*7 + l*3))) \
| eval issue_count = c + h + m + l
args = dashboard_id
iseval = 0
