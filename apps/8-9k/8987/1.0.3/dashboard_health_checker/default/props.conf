#
# Sourcetypes for the OPTIONAL summary-index snapshots written by
# "Dashboard Health - Snapshot to Summary". They are only used if you
# enable historical trending. The KV store path needs none of this.
#

[dashboard_health:finding]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = finding_time=
MAX_TIMESTAMP_LOOKAHEAD = 20
KV_MODE = auto
category = Custom
description = Dashboard Health Checker - individual rule finding snapshot

[dashboard_health:score]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = score_time=
MAX_TIMESTAMP_LOOKAHEAD = 20
KV_MODE = auto
category = Custom
description = Dashboard Health Checker - dashboard health score snapshot
