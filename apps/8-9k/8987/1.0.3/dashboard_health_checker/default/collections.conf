#
# KV store collections used by Dashboard Health Checker.
# These require no custom index, so the app works on Splunk Cloud with
# zero index provisioning.
#

[dashboard_health_inventory]
# One row per discovered dashboard.
field.dashboard_id = string
field.dashboard_title = string
field.app = string
field.owner = string
field.sharing = string
field.source_dashboard_type = string
field.panel_count = number
field.search_count = number
field.extraction_time = number
accelerated_fields.dhc_inv_app = {"app": 1}

[dashboard_health_findings]
# One row per rule finding (per search, plus dashboard-level findings).
field.dashboard_id = string
field.dashboard_title = string
field.app = string
field.owner = string
field.search_id = string
field.panel_title = string
field.search_type = string
field.source_dashboard_type = string
field.spl = string
field.rule_id = string
field.category = string
field.severity = string
field.message = string
field.recommendation = string
field.finding_time = number
accelerated_fields.dhc_find_dash = {"dashboard_id": 1}

[dashboard_health_scores]
# One row per dashboard with the computed health score.
field.dashboard_id = string
field.dashboard_title = string
field.app = string
field.owner = string
field.sharing = string
field.source_dashboard_type = string
field.search_count = number
field.issue_count = number
field.critical_issue_count = number
field.high_issue_count = number
field.medium_issue_count = number
field.low_issue_count = number
field.dashboard_health_score = number
field.estimated_risk_level = string
field.avg_runtime = number
field.daily_runs = number
field.user_count = number
field.score_time = number
accelerated_fields.dhc_score_risk = {"estimated_risk_level": 1}
