#
# Dashboard Health Checker for Splunk
# app.conf
#
# This stanza set is intentionally minimal and Splunk Cloud / AppInspect friendly:
#   * no custom REST endpoints
#   * no scripted inputs
#   * no external network calls
#

[install]
is_configured = false
state = enabled
build = 4

[id]
name = dashboard_health_checker
version = 1.0.3

[package]
id = dashboard_health_checker
check_for_updates = true

[ui]
is_visible = true
label = Dashboard Health Checker
docs_section_override = AddOns:released

[launcher]
author = Simon Langley (simon@simonlangley.co.uk)
description = Automatically monitors dashboards across your Splunk apps, extracts SPL and scores each dashboard's health from 0 - 100 using a transparent rules engine; surfacing risky SPL patterns in an admin dashboard. Runs a lightweight nightly refresh using minimal capacity. Flags inefficient searches and helps utilise SVC capacity more effectively.
version = 1.0.3
