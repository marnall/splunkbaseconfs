# TA-cveicu props.conf
# Field extractions and timestamp settings for CVE V5 records

#
# CVE Record Sourcetype
#
[cveicu:record]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
# Use the timestamp from the modular input event stream
DATETIME_CONFIG = CURRENT
TZ = UTC
TRUNCATE = 0
KV_MODE = json

# Core CVE metadata fields
EVAL-cve_id = spath(_raw, "cveMetadata.cveId")
EVAL-state = spath(_raw, "cveMetadata.state")
EVAL-date_published = spath(_raw, "cveMetadata.datePublished")
EVAL-date_updated = spath(_raw, "cveMetadata.dateUpdated")
EVAL-assigner = spath(_raw, "cveMetadata.assignerShortName")

# CNA container fields
EVAL-title = spath(_raw, "containers.cna.title")
EVAL-description = spath(_raw, "containers.cna.descriptions{0}.value")

# Affected product fields
EVAL-affected_vendor = spath(_raw, "containers.cna.affected{0}.vendor")
EVAL-affected_product = spath(_raw, "containers.cna.affected{0}.product")

# CWE classification
EVAL-cwe_id = spath(_raw, "containers.cna.problemTypes{0}.descriptions{0}.cweId")

# CVSS v4.0
EVAL-cvss_v40_score = spath(_raw, "containers.cna.metrics{0}.cvssV4_0.baseScore")
EVAL-cvss_v40_severity = spath(_raw, "containers.cna.metrics{0}.cvssV4_0.baseSeverity")
EVAL-cvss_v40_vector = spath(_raw, "containers.cna.metrics{0}.cvssV4_0.vectorString")

# CVSS v3.1
EVAL-cvss_v31_score = spath(_raw, "containers.cna.metrics{0}.cvssV3_1.baseScore")
EVAL-cvss_v31_severity = spath(_raw, "containers.cna.metrics{0}.cvssV3_1.baseSeverity")
EVAL-cvss_v31_vector = spath(_raw, "containers.cna.metrics{0}.cvssV3_1.vectorString")

# CVSS v3.0
EVAL-cvss_v30_score = spath(_raw, "containers.cna.metrics{0}.cvssV3_0.baseScore")
EVAL-cvss_v30_severity = spath(_raw, "containers.cna.metrics{0}.cvssV3_0.baseSeverity")
EVAL-cvss_v30_vector = spath(_raw, "containers.cna.metrics{0}.cvssV3_0.vectorString")

# CVSS v2.0
EVAL-cvss_v20_score = spath(_raw, "containers.cna.metrics{0}.cvssV2_0.baseScore")
EVAL-cvss_v20_vector = spath(_raw, "containers.cna.metrics{0}.cvssV2_0.vectorString")

# Computed CVSS score - Use best available version (inlined because EVAL fields can't reference other EVAL fields)
EVAL-cvss_score = coalesce(spath(_raw, "containers.cna.metrics{0}.cvssV4_0.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV3_1.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV3_0.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV2_0.baseScore"))
EVAL-cvss_severity = coalesce(spath(_raw, "containers.cna.metrics{0}.cvssV4_0.baseSeverity"), spath(_raw, "containers.cna.metrics{0}.cvssV3_1.baseSeverity"), spath(_raw, "containers.cna.metrics{0}.cvssV3_0.baseSeverity"))

# Multi-value field extractions via regex transforms
REPORT-cwe_ids = extract_cwe_ids
REPORT-vendors = extract_vendors
REPORT-products = extract_products
REPORT-references = extract_references
REPORT-ssvc_exploitation = extract_ssvc_exploitation
REPORT-ssvc_automatable = extract_ssvc_automatable
REPORT-ssvc_technical_impact = extract_ssvc_technical_impact

# ADP enrichment
EVAL-has_cisa_adp = if(isnotnull(spath(_raw, "containers.adp{0}.title")), "true", "false")

# CIM Vulnerabilities Data Model mappings (EVAL because FIELDALIAS can't reference EVAL fields)
# Reference: https://docs.splunk.com/Documentation/CIM/latest/User/Vulnerabilities
EVAL-vulnerability_id = spath(_raw, "cveMetadata.cveId")
EVAL-cvss = coalesce(spath(_raw, "containers.cna.metrics{0}.cvssV4_0.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV3_1.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV3_0.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV2_0.baseScore"))
EVAL-severity_id = coalesce(spath(_raw, "containers.cna.metrics{0}.cvssV4_0.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV3_1.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV3_0.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV2_0.baseScore"))
EVAL-vendor_product = spath(_raw, "containers.cna.affected{0}.vendor")
EVAL-dest = spath(_raw, "cveMetadata.cveId")
EVAL-signature = spath(_raw, "cveMetadata.cveId")
EVAL-signature_id = spath(_raw, "cveMetadata.cveId")
EVAL-category = spath(_raw, "containers.cna.problemTypes{0}.descriptions{0}.cweId")

#
# Error Sourcetype
#
[cveicu:error]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%Z
TIME_PREFIX = "timestamp"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 64
TZ = UTC
KV_MODE = json

#
# Audit Sourcetype
#
[cveicu:audit]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%Z
TIME_PREFIX = "timestamp"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 64
TZ = UTC
KV_MODE = json
