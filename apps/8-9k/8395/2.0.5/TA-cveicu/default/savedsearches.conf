# Pre-computed lookup refresh searches for dashboard loading
# All searches use the `cveicu_index` macro — override in local/macros.conf

[CVE Total Lookup Refresh]
enableSched = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = 0
dispatch.latest_time = now
dispatch.auto_cancel = 600
max_concurrent = 1
search = `cveicu_index` sourcetype="cveicu:record" \
| stats count as total_cves \
| eval last_updated=now() \
| outputlookup cve_total.csv

[CVE Daily Summary Lookup Refresh]
enableSched = 1
cron_schedule = */10 * * * *
dispatch.earliest_time = 0
dispatch.latest_time = now
dispatch.auto_cancel = 600
max_concurrent = 1
search = `cveicu_index` sourcetype="cveicu:record" \
| spath path=cveMetadata.cveId output=cve_id \
| spath path=cveMetadata.state output=cve_state \
| spath path=cveMetadata.datePublished output=date_published \
| eval date_published=substr(date_published, 1, 10) \
| where cve_state="PUBLISHED" AND isnotnull(date_published) \
| eval severity=coalesce(spath(_raw, "containers.cna.metrics{0}.cvssV4_0.baseSeverity"), spath(_raw, "containers.cna.metrics{0}.cvssV3_1.baseSeverity"), spath(_raw, "containers.cna.metrics{0}.cvssV3_0.baseSeverity"), "NONE") \
| stats dc(cve_id) as cve_count by date_published severity \
| outputlookup cve_daily_summary.csv

[CVE Vendors Lookup Refresh]
enableSched = 1
cron_schedule = */10 * * * *
dispatch.earliest_time = 0
dispatch.latest_time = now
dispatch.auto_cancel = 600
max_concurrent = 1
search = `cveicu_index` sourcetype="cveicu:record" \
| spath path=cveMetadata.cveId output=cve_id \
| spath path=cveMetadata.state output=cve_state \
| spath path=containers.cna.affected{0}.vendor output=vendor \
| where cve_state="PUBLISHED" AND isnotnull(vendor) AND vendor!="n/a" \
| stats dc(cve_id) as cve_count by vendor \
| sort - cve_count \
| head 50 \
| outputlookup cve_vendors.csv

#
# EPSS and KEV Enrichment Lookups
# Run the Python script to fetch fresh data from FIRST and CISA
#

[EPSS Lookup Refresh]
enableSched = 1
run_on_startup = true
cron_schedule = 0 5 * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
dispatch.auto_cancel = 600
max_concurrent = 1
description = Fetches FIRST EPSS scores daily at 5 AM
search = | cveicuepsskev mode=epss \
| outputlookup epss_lookup.csv

[KEV Lookup Refresh]
enableSched = 1
run_on_startup = true
cron_schedule = 0 */6 * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
dispatch.auto_cancel = 600
max_concurrent = 1
description = Fetches CISA KEV catalog every 6 hours
search = | cveicuepsskev mode=kev \
| outputlookup kev_lookup.csv

#
# Risk Priority Lookup - Pre-compute risk scores
# Only includes CVEs with a meaningful risk signal to limit lookup size
#

[Risk Priority Lookup Refresh]
enableSched = 1
cron_schedule = */10 * * * *
dispatch.earliest_time = 0
dispatch.latest_time = now
dispatch.auto_cancel = 600
max_concurrent = 1
description = Joins CVSS, EPSS, and KEV data for CVEs with any risk signal
search = `cveicu_index` sourcetype="cveicu:record" \
| spath path=cveMetadata.cveId output=cve_id \
| spath path=cveMetadata.state output=cve_state \
| where cve_state="PUBLISHED" \
| eval cvss_score=coalesce(spath(_raw, "containers.cna.metrics{0}.cvssV4_0.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV3_1.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV3_0.baseScore"), spath(_raw, "containers.cna.metrics{0}.cvssV2_0.baseScore")) \
| eval cvss_severity=coalesce(spath(_raw, "containers.cna.metrics{0}.cvssV4_0.baseSeverity"), spath(_raw, "containers.cna.metrics{0}.cvssV3_1.baseSeverity"), spath(_raw, "containers.cna.metrics{0}.cvssV3_0.baseSeverity")) \
| rex field=_raw "\"Exploitation\"\s*:\s*\"(?<ssvc_exploitation>[^\"]+)\"" \
| lookup epss_lookup.csv cve_id OUTPUT epss_score \
| lookup kev_lookup.csv cve_id OUTPUT in_kev \
| eval cvss_score=coalesce(tonumber(cvss_score), 0) \
| eval epss_score=coalesce(tonumber(epss_score), 0) \
| where epss_score>0 OR cvss_score>0 OR in_kev="true" \
| dedup cve_id \
| table cve_id cvss_score cvss_severity epss_score in_kev ssvc_exploitation \
| outputlookup risk_priority_lookup.csv
