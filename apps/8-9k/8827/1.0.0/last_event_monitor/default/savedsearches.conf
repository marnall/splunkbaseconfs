[Last Event Monitor - Initial Lookup Bootstrap]
disabled = 0
enableSched = 0
dispatch.earliest_time = 0
dispatch.latest_time = now
search = | tstats count latest(_time) as latest_event earliest(_time) as first_event where index=* NOT index IN (`excluded_indexes`) NOT host IN (`excluded_hosts`) earliest=0 latest=now by host index | where isnotnull(host) AND host!="" AND isnotnull(index) AND index!="" | eval work_time=5 | eval non_work_time=60 | eval enabled=1 | eval first_seen=strftime(first_event,"%Y-%m-%d %H:%M:%S") | eval last_seen_discovery=strftime(now(),"%Y-%m-%d %H:%M:%S") | eval comment="initial auto-discovered" | table host index work_time non_work_time enabled first_seen last_seen_discovery comment | outputlookup host_index_alert.csv

[Last Event Monitor - Discover Host Index Pairs]
disabled = 0
enableSched = 1
cron_schedule = 0 2 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
search = | inputlookup host_index_alert.csv | eval existing=1 | append [ | tstats count latest(_time) as latest_event earliest(_time) as first_event where index=* NOT index IN (`excluded_indexes`) NOT host IN (`excluded_hosts`) earliest=-24h latest=now by host index | where isnotnull(host) AND host!="" AND isnotnull(index) AND index!="" | eval existing=0 | eval work_time=5 | eval non_work_time=60 | eval enabled=1 | eval first_seen=strftime(first_event,"%Y-%m-%d %H:%M:%S") | eval last_seen_discovery=strftime(now(),"%Y-%m-%d %H:%M:%S") | eval comment="auto-discovered" | fields host index work_time non_work_time enabled first_seen last_seen_discovery comment existing ] | sort - existing | dedup host index | eval work_time=coalesce(work_time,5) | eval non_work_time=coalesce(non_work_time,60) | eval enabled=coalesce(enabled,1) | eval first_seen=coalesce(first_seen,strftime(now(),"%Y-%m-%d %H:%M:%S")) | eval last_seen_discovery=coalesce(last_seen_discovery,strftime(now(),"%Y-%m-%d %H:%M:%S")) | eval comment=coalesce(comment,"auto-discovered") | table host index work_time non_work_time enabled first_seen last_seen_discovery comment | outputlookup host_index_alert.csv

[Last Event Monitor - Cleanup Excluded Sources]
disabled = 0
enableSched = 0
dispatch.earliest_time = 0
dispatch.latest_time = now
search = | inputlookup host_index_alert.csv | search NOT index IN (`excluded_indexes`) NOT host IN (`excluded_hosts`) | outputlookup host_index_alert.csv

[Last Event Monitor - Log Source Delay Alert]
disabled = 1
enableSched = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = 0
dispatch.latest_time = now
counttype = number of events
relation = greater than
quantity = 0
alert.suppress = 1
alert.suppress.period = 30m
search = | inputlookup host_index_alert.csv | where enabled=1 | eval in_lookup=1 | append [ | tstats latest(_time) as Latest_Event where index=* NOT index IN (`excluded_indexes`) NOT host IN (`excluded_hosts`) earliest=0 latest=now by host index ] | stats max(in_lookup) as in_lookup values(work_time) as work_time values(non_work_time) as non_work_time max(Latest_Event) as Latest_Event by host index | where in_lookup=1 | eval work_time=tonumber(mvindex(work_time,0)) | eval non_work_time=tonumber(mvindex(non_work_time,0)) | eval current_hour=tonumber(strftime(now(), "%H")) | eval current_wday=tonumber(strftime(now(), "%w")) | eval is_work_hours=if(current_wday>=1 AND current_wday<=5 AND current_hour>=9 AND current_hour<18,1,0) | eval work_window=if(is_work_hours=1,"Work time","Non-work time") | eval threshold_min=if(is_work_hours=1,work_time,non_work_time) | eval time_since_last_event_min=if(isnull(Latest_Event),null(),round((now()-Latest_Event)/60,0)) | eval status=case(isnull(Latest_Event),"No Data", time_since_last_event_min>1440,"No Data", time_since_last_event_min<=threshold_min,"OK", time_since_last_event_min>threshold_min AND time_since_last_event_min<=1440,"Late", true(),"Unknown") | search status!="OK" | eval Latest_Event=if(isnull(Latest_Event),"NO EVENTS",strftime(Latest_Event,"%Y-%m-%d %H:%M:%S")) | table host index status time_since_last_event_min Latest_Event threshold_min work_window work_time non_work_time
