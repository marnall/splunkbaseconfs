methods = GET, POST, DELETE

[expose:itmip_llm_proxy]
pattern = itmip_llm/proxy
methods = POST

# v1.5.0 — Data Foundation config-package builder. POST assembles + stages a
# generated 4-app package; GET ?id= serves it for a client-side Blob download.
[expose:itmip_llm_conf_package]
pattern = itmip_llm/conf_package
methods = GET, POST

# v1.5.0 — Data Foundation onboarding-readiness check. POST surfaces ingestion /
# parsing errors per sourcetype from index=_internal, queried as the system user
# (normal users can't read _internal).
[expose:itmip_llm_ingest_health]
pattern = itmip_llm/ingest_health
methods = POST

# v1.5.0 — Data Foundation. POST validates a props/transforms stanza against the
# authoritative .conf.spec (read server-side from disk).
[expose:itmip_llm_validate_conf]
pattern = itmip_llm/validate_conf
methods = POST

# v1.4.1 — the browser audit client (src/services/audit.ts) POSTs llm_request /
# llm_response / consent_acceptance here. The route + handler exist in
# restmap.conf, but WITHOUT this [expose] the Splunk Web tier refuses to proxy
# /<locale>/splunkd/__raw/services/itmip_llm/audit, so the calls never reach
# splunkd and NO turn-level audit is ever written (the client swallows the
# failure as best-effort). This omission silently disabled all browser-side
# audit logging.
[expose:itmip_llm_audit]
pattern = itmip_llm/audit
methods = POST

# v1.4.1 — these REST handlers existed in restmap.conf but were ALSO never
# exposed to Splunk Web (same class of bug as the audit endpoint above):
#  - itmip_llm/skills: the SPA GETs it so NON-admins can see the skills their
#    templates reference (admins were masked by a direct-KVStore fallback).
#  - itmip_llm/user_templates(/user_create|/user_update): end-user template
#    authoring POSTs here; with no exposure the whole "create/update user
#    template" flow failed from the browser (no fallback — server forces
#    sharing=private + validation).
[expose:itmip_llm_skills]
pattern = itmip_llm/skills
methods = GET

[expose:itmip_llm_user_templates]
pattern = itmip_llm/user_templates
methods = POST

[expose:itmip_llm_user_templates_sub]
pattern = itmip_llm/user_templates/*
methods = POST

