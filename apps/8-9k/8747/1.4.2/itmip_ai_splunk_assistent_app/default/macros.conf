# SPL macros for the EVENT index where LLM usage telemetry is logged.
# v0.2.x writes plain event JSON to `index=main sourcetype=ai_assistant_usage`
# via /services/itmip_llm/usage_log. Override the macro in local/macros.conf
# if you prefer a dedicated event index (recommended for production).

[ai_assistant_metrics_index]
definition = index=main (sourcetype=ai_assistant_usage OR sourcetype=claude_assistant_usage)
iseval = 0

# Index where the license-expiry scripted input
# (bin/itmip_llm_license_monitor.py) writes events. Default matches
# inputs.conf (`index = main`). Customers who route license events into
# a dedicated index should override BOTH this macro AND `index = <name>`
# in local/inputs.conf to keep the alert search and the input in
# lock-step.
[ai_assistant_license_index]
definition = index=main sourcetype=itmip_llm_license
iseval = 0
