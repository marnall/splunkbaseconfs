# referenced by templates' includes_skills field. See
# instructions/SKILLS_REFACTOR_SPEC.md and
# docs/OVERVIEW_TOOLS_AND_TEMPLATES.md §3.5.
# v0.9.7 — Authoring audit log. Every Create / Update / Promote /
# Demote / Delete on a template (and, when admin endpoints land,
