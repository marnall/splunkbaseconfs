# instructions/AUTHORING_AND_PROMOTION_SPEC.md §2.1. Backfilled at
# read time for pre-0.9.7 rows that don't carry these on disk
# (dual-read against legacy org_short / bu_short for one release;
# removed in 0.9.8).
