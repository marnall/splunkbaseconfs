# Operational configuration for the AiWorkbench Splunk app.
#
# Knobs in this file are install-time only — they are not exposed in
# the Web UI and not settable via a REST endpoint. Override defaults
# by editing local/itmip_ai_workbench.conf (self-hosted: drop the file
# on each Search Head or push via the deployer; Splunk Cloud: include
# local/ overrides in the app bundle uploaded for vetting).
#
# We deliberately keep these settings out of default/app.conf — that
# file is reserved by Splunk for app identity / packaging metadata.
# Keeping operational config in its own file also avoids needing
# default/server.conf with conf_replication_include, which complicates
# Splunk Cloud vetting. Bundle replication distributes this file
# identically to every SH member without that shim.
#
# See instructions/kvstore_backup_design.md §3.5 for the full design.

# ─────────────────────────────────────────────────────────────────────
# KVStore backup & restore subsystem
# ─────────────────────────────────────────────────────────────────────
[kvstore_backup]

# Master switch. Toggling 1 → 0 (or vice-versa) requires a Splunk
# restart because it gates the scripted input's disabled flag.
enabled = 1

# Local time of day (HH:MM, 24-hour) when the daily snapshot runs.
# The modular input wakes up every 600 seconds and runs the snapshot
# on the first tick whose local time crosses this value. Resilient to
# Splunk restarts within the day.
daily_time = 02:00

# Change-log emission mode:
#   best_effort — try/except wraps the write; failures log to _internal
#                 and do not fail the user's POST/DELETE.
#   mandatory   — change-log write must succeed; failure rolls back
#                 the user's write. Use only if you genuinely need
#                 zero-loss audit (one bad disk = no admin can edit).
emission_mode = best_effort

# Retention for critical-tier collections (config / catalogue / license
# / MCP / etc.). Three nested windows: short daily, medium weekly,
# long monthly. The retention pruner saved search (Phase 9.7) deletes
# snapshots that don't match any of the three windows.
retention_critical_days = 30
retention_critical_weekly_weeks = 26
retention_critical_monthly_months = 24

# User-personal collection (itmip_user_history) retention. Backed up
# daily but kept only for 14 days — no weekly/monthly archive.
retention_history_days = 14

# Comma-separated list of recipients for the snapshot-verification
# failure alert. If empty, the alert falls back to the recipients
# configured on the License tab (itmip_llm_license.emails).
verify_email_recipients =

# Secrets-backup behaviour. The KVStore snapshot itself never carries
# cleartext from storage/passwords. This knob controls whether the
# scripted input also emits a credential inventory or a cleartext
# blob (Phase 9.6 Option B). See design doc §5.2.
#   inventory_only       — Option A (default). Emit only the names of
#                          credentials referenced by the configs; admin
#                          re-populates secrets after restore.
#   cleartext_restricted — Option B (opt-in, Phase 9.6). Cleartext goes
#                          to the admin-only index
#                          itmip_kvstore_secrets_backups. Not yet
#                          implemented in this version; setting this
#                          before 9.6 ships is a no-op with a warning.
secrets_backup.mode = inventory_only

# When secrets_backup.mode = cleartext_restricted, controls whether
# per-user OAuth tokens (Phase 3 / v0.9.0) are included. Tokens expire
# anyway so the default is off; flip on for MSP-scale environments
# that genuinely need cross-restore continuity.
secrets_backup.include_per_user_tokens = 0

# ─────────────────────────────────────────────────────────────────────
# UI shell (v0.9.4+)
# ─────────────────────────────────────────────────────────────────────
[ui]

# Message shown to a non-admin user who lands on the app but does NOT
# resolve into any configured Org (their calling Splunk app or roles
# don't match any Org's app_patterns + role_patterns). The shell
# greys out every tab and renders this message in the centre. Replace
# this text with your organisation's actual contact instructions in
# local/itmip_ai_workbench.conf.
#
# Admins are NEVER shown this overlay — they always fall through to
# DFLT/DFLT so they can configure Orgs/BUs.
unassigned_message = AI Workbench is installed in this Splunk environment but no AI Workbench Organisation matches the app you are working from AND your assigned Splunk roles. Please contact your Splunk administration team to request access — they will scope an Organisation/Business Unit to cover your app and role so the assistant becomes available.

# ─────────────────────────────────────────────────────────────────────
# Concise Mode (v0.9.3+)
#
# Caveman-inspired response compression. Off by default. When the
# feature flag is on, templates with style_profile = "concise" get a
# style block appended to their prompt that tells the LLM to drop
# filler words while keeping SPL/XML/code blocks normal. Compresses
# tool & template short_descriptions sent on every request too.
#
# See instructions/AI_Workbench_Concise_Mode_Requirements.md for the
# design rationale and the per-template trade-off table.
# ─────────────────────────────────────────────────────────────────────
[concise_mode]

# Master kill switch. While 0, the dispatcher ignores every template's
# style_profile field and never injects the concise style block. Flip
# to 1 to opt in. Shipped default-off so 0.9.3 is a safe upgrade — admins
# enable it after they have read CONCISE_MODE.md.
feature_concise_mode = 0

# When the feature is enabled AND the user is on a follow-up turn in the
# same Ask thread (i.e. not the first turn and not switching templates),
# the dispatcher appends the concise style block regardless of the
# template's own style_profile. Rationale: first turn produces the named
# Splunk artefact (must stay full-quality); follow-ups are pure chat
# about that artefact — the natural place for compression. Set to 0 if
# end users complain that follow-ups read too terse.
followup_concise_mode = 1

# ─────────────────────────────────────────────────────────────────────
# Branding (v1.4.1)
# ─────────────────────────────────────────────────────────────────────
# White-label knobs for the header license badge. The free / PoV / NFR /
# Professional / Enterprise badge texts are fixed in the product; only the
# MSP edition badge is configurable, because MSPs run ONE license across many
# customer environments and frequently present their own brand to end
# customers. Leave at the default for a vendor-neutral label.
[branding]

# Header badge text shown when the effective license tier is MSP. Plain text,
# no markup. Examples: "MSP Enterprise Edition" (default), "Powered by Acme —
# Enterprise", "Acme Managed AI". Falls back to the default if blank/absent.
msp_badge_label = MSP Enterprise Edition
