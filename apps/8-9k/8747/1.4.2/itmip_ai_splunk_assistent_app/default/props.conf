# ─────────────────────────────────────────────────────────────────────
# v1.3.0 — Real audit logging. One JSON event per line, written via
# receivers/simple to each Org's configured audit index. event_type
# discriminates the families (llm_request / llm_response /
# consent_acceptance / governance_change / upload / audit_config).
# KV_MODE=json (search-time) is the portable form for receivers/simple —
# same rationale as ai_assistant_usage above. TRUNCATE=0 because prompt
# bodies can be large (the handler already byte-caps them per
# REAL_AUDIT_LOGGING_SPEC.md §7.3.1, but we never want Splunk to silently
# cut an audit event).
# ─────────────────────────────────────────────────────────────────────
[itmip:ai:audit]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
disabled = false
category = Custom
