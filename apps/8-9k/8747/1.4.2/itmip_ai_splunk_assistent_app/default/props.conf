# Search-time JSON field extraction for the LLM usage telemetry events
# the custom REST handler writes via /services/receivers/simple.
#
# KV_MODE=json is the portable form — works whether the event arrived via
# receivers/simple, a TCP input, or any other path. INDEXED_EXTRACTIONS=json
# would be faster but only applies to specific input paths.
#
# Fields extracted at search time: tokens_in, tokens_out, cache_read,
# cost_usd, ai_app, ai_user, ai_model, ai_provider, ai_org, ai_bu,
# ai_llm_name, ai_style_profile (v0.9.3+, "default" | "concise" |
# "followup_concise" | "verbose"; older events default to "default"
# when grouped by this field).

[ai_assistant_usage]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
disabled = false
category = Custom

# Kept for v0.1 events already indexed under this sourcetype.
[claude_assistant_usage]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
disabled = false
category = Custom

# License-expiry events emitted by bin/itmip_llm_license_monitor.py.
# The License tab's saved alert searches this sourcetype.
[itmip_llm_license]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
disabled = false
category = Custom

