# Expiry-warning scripted input.
#
# Runs every 6 hours on the search head. The script reads the stored
# Cryptolens license blob and emits a single JSON event when the
# license is within 30 days of expiring. The Splunk Enterprise saved
# alert created by the License tab fires on those events to email the
# admin-configured recipients.
#
# `passAuth` causes splunkd to pass the user's session key on stdin
# so the script can read storage/passwords. We use "admin" because the
# input runs server-side and needs the central license blob.

[script://$SPLUNK_HOME/etc/apps/itmip_ai_splunk_assistent_app/bin/itmip_llm_license_monitor.py]
disabled = false
interval = 21600
sourcetype = itmip_llm_license
source = itmip_llm_license_monitor
index = main
passAuth = admin
python.version = python3
# Note: `python.required` is a restmap.conf key, not an inputs.conf one.
# Splunk silently ignores it here AND logs "Invalid key" at startup. Don't
# add it — the minimum Python version contract for scripted inputs lives
# on the handler itself (the script aborts with a clean message on older
# Python). See default/restmap.conf for where `python.required = 3.13`
# legitimately applies (persistent REST handlers).

# KVStore backup scripted input.
#
# Wakes every 600 seconds. On each tick:
#   1. Decides — based on `daily_time` in default/itmip_ai_workbench.conf
#      `[kvstore_backup]` — whether the daily snapshot should fire.
#   2. If it should, walks every critical-tier and user-personal
#      collection, emits one event per row to itmip_snapshots,
#      then emits a manifest + a referenced-credentials inventory.
#   3. Runs a verification pass and emits a verification event.
#   4. Skips entirely on non-captain SHC nodes (captain-only is wired
#      in Phase 9.7; for now the script runs on every node and the
#      SHC duplication is handled by the manifest deduplication on
#      replay).
#
# Routing is determined inside the script: snapshot rows go to
# itmip_snapshots with sourcetype itmip:kvstore:snapshot, the
# manifest goes there too with sourcetype itmip:kvstore:manifest, and
# the credential inventory uses sourcetype itmip:kvstore:secrets_inventory.
# The inputs.conf `index` is the fallback for any event the script
# emits without a `_meta` index override.
#
# See instructions/kvstore_backup_design.md §3.2.
[script://$SPLUNK_HOME/etc/apps/itmip_ai_splunk_assistent_app/bin/itmip_llm_kvstore_backup.py]
disabled = false
interval = 600
sourcetype = itmip:kvstore:tick
source = itmip_llm_kvstore_backup
index = itmip_snapshots
passAuth = admin
python.version = python3
# Note: `python.required` is a restmap.conf key, not an inputs.conf one
# — see the comment on the license-monitor stanza above.
