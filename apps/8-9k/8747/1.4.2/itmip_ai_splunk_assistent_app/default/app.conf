[id]
name = itmip_ai_splunk_assistent_app
version = 1.4.2

[ui]
label = AiWorkbench
is_visible = 1

[launcher]
version = 1.4.2
author = The Dutch Data Difference: Eduard Lekanne gezegd Deprez
description = Browser-based AI assistant for Splunk Enterprise and the AI Toolkit. Generates SPL, Simple XML dashboards, saved searches, alerts, and AI Toolkit ML pipelines from natural language using your own LLM API key (Anthropic, OpenAI, AzureOpenAI, Groq, Gemini, Bedrock, Ollama, OpenRouter).

[package]
id = itmip_ai_splunk_assistent_app
check_for_updates = true

[install]
is_configured = false

# Tell splunkd to reload our custom conf file on `splunk reload app`
# without a full restart. Required for Splunkbase AppInspectOk
# (check_reload_trigger_for_all_custom_confs).
[triggers]
reload.itmip_ai_workbench = simple
