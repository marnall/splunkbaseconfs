# Indexes used by the KVStore backup & restore subsystem.
# See instructions/kvstore_backup_design.md §3.1.
#
# Two independent failure domains keep KVStore-corruption recovery
# possible even when the KVStore itself is unrecoverable.
#
# Note: index names deliberately avoid the substring "kvstore" so the
# app passes Splunk Cloud vetting (check_lower_cased_index_names).
# maxTotalDataSizeMB is also omitted — Splunk Cloud disallows it; the
# operator can tune retention via the Splunk Cloud index settings.

# Daily full snapshots of every critical-tier + user-personal KVStore
# collection. Retention is configured per-tier via the kvstore_backup
# scripted input (sourcetype-aware pruning). The 24-month index-level
# retention is the outermost guard; the scripted input deletes finer-
# grained subsets earlier.
[itmip_snapshots]
homePath   = $SPLUNK_DB/itmip_snapshots/db
coldPath   = $SPLUNK_DB/itmip_snapshots/colddb
thawedPath = $SPLUNK_DB/itmip_snapshots/thaweddb
# 24 months = 24 * 30 * 86400 = 62,208,000 seconds.
frozenTimePeriodInSecs = 62208000
disabled = false

# Continuous change log: one event per successful POST/DELETE on a
# critical-tier or user-personal collection. 60 days; beyond that the
# restore falls back to snapshot-only granularity.
[itmip_changes]
homePath   = $SPLUNK_DB/itmip_changes/db
coldPath   = $SPLUNK_DB/itmip_changes/colddb
thawedPath = $SPLUNK_DB/itmip_changes/thaweddb
# 60 days = 60 * 86400 = 5,184,000 seconds.
frozenTimePeriodInSecs = 5184000
disabled = false
