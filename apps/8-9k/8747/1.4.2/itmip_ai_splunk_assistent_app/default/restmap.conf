# v0.7.0 — MCP server connection management + tool import + invoke.
# See instructions/tool_credentials_and_mcp_design.md §4 and
# bin/itmip_llm_mcp.py for the handler. Supported sub-paths:
#   GET    /servers              list registered MCP servers
#   POST   /servers              create or update a server
#   DELETE /servers?key=<k>      remove a server
#   POST   /servers/<k>/test_connect    connection-test + tools/list
#   POST   /servers/<k>/refresh         drift detection
#   GET    /tools                list imported tools
#   POST   /tools                create or update an imported tool
#   DELETE /tools?key=<k>        un-import a tool
#   POST   /invoke               call an imported MCP tool by exposed_name
