# v0.9.7 — End-user template authoring (Create / Update user template).
# POST-only. Sub-path is passed as part of the URL after the match:
#   /services/itmip_llm/user_templates/user_create  → splunk_create_user_template
#   /services/itmip_llm/user_templates/user_update  → splunk_update_user_template
#
# We intentionally chose `user_templates` (not `use_cases`) for the
# match path so we don't collide with the existing
# /itmip_llm/use_cases listing handler. The spec called for
# `/use_cases/user_create` but the divergence is purely URL — the
# functional contract is identical.
#
# Server-side enforces sharing=private + owner_user=caller + schema
# validity + skill-reference visibility + quota + forbidden-content
# scan. Emits audit rows to itmip_authoring_changes. See
# instructions/AUTHORING_AND_PROMOTION_SPEC.md §4.2.
[script:itmip_llm_user_templates]
match = /itmip_llm/user_templates
script = itmip_llm_user_templates.py
scripttype = persist
handler = itmip_llm_user_templates.Handler
output_modes = json
passPayload = true
passSystemAuth = true
requireAuthentication = true
python.version = python3
python.required = 3.13

