# =============================================================================
# GenAI Observability - Accelerated Data Model
# -----------------------------------------------------------------------------
# Acceleration makes dashboards and tstats queries fast at enterprise volume.
# Summaries are built from the last 30 days; tune to your retention/SLA.
# =============================================================================

[GenAI_Traces]
acceleration = false
acceleration.earliest_time = -30d
acceleration.backfill_time = -7d
acceleration.cron_schedule = */10 * * * *
acceleration.max_concurrent = 2
acceleration.poll_buckets_until_maxtime = 1
acceleration.max_time = 3600

# NOTE (Splunk Cloud compliant): acceleration is shipped OFF.
# To accelerate: Settings > Data Models > GenAI_Traces > Edit > Edit Acceleration >
#   tick Accelerate, set a Summary Range (e.g. 30 Days), Save.
# Dashboards use 'summariesonly=false allow_old_summaries=true' so they return
# correct results before/without acceleration, and use the summaries once enabled.
