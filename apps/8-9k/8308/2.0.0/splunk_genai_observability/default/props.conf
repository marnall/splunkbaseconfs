# =============================================================================
# Field Extractions and Data Parsing for GenAI Observability
# -----------------------------------------------------------------------------
# This is the app's original props.conf PLUS a new [genai:otel] stanza for the
# OpenTelemetry Collector path. Drop it into:
#     $SPLUNK_HOME/etc/apps/splunk_genai_observability/default/props.conf
# (or local/). The [genai:trace] stanza is unchanged, so the direct-HEC
# exporter path keeps working exactly as before.
# =============================================================================

# -----------------------------------------------------------------------------
# GenAI Traces Sourcetype  (direct-to-HEC exporter -> already flat schema)
# -----------------------------------------------------------------------------
[genai:trace]
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%Z
TIME_PREFIX = "timestamp"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 40
KV_MODE = json
TRUNCATE = 1000000

EXTRACT-trace_id = "trace_id"\s*:\s*"(?<trace_id>[a-f0-9]+)"
EXTRACT-span_id = "span_id"\s*:\s*"(?<span_id>[a-f0-9]+)"
EXTRACT-parent_span_id = "parent_span_id"\s*:\s*"(?<parent_span_id>[a-f0-9]+)"
EXTRACT-span_type = "span_type"\s*:\s*"(?<span_type>[^"]+)"
EXTRACT-model_name = "model_name"\s*:\s*"(?<model_name>[^"]+)"
EXTRACT-model_provider = "model_provider"\s*:\s*"(?<model_provider>[^"]+)"

FIELDALIAS-latency = duration_ms AS latency_ms
FIELDALIAS-tokens_in = input_tokens AS prompt_tokens
FIELDALIAS-tokens_out = output_tokens AS completion_tokens

# -----------------------------------------------------------------------------
# OpenTelemetry Collector Sourcetype  (splunk_hec trace export -> nested JSON)
# -----------------------------------------------------------------------------
# The collector's splunk_hec exporter emits each span as JSON with trace_id,
# span_id, parent_span_id and name at the top level, and span attributes nested
# under "attributes". KV_MODE=json flattens nested keys with dot notation, so
# the transform-produced flat fields arrive as attributes.<name>. These aliases
# expose them under the names the dashboards already query.
#
# NOTE: the HEC envelope carries the event time, so no TIME_PREFIX is needed.
# If your collector build nests attributes differently, run
#   index=genai_traces sourcetype=genai:otel | head 1
# and adjust the "attributes." prefix in the aliases below to match.
# -----------------------------------------------------------------------------
[genai:otel]
SHOULD_LINEMERGE = false
KV_MODE = json
TRUNCATE = 1000000

# top-level span fields already match dashboard field names (trace_id, span_id,
# parent_span_id, name) so no alias is needed for those.

# flat fields set by the collector transform, nested under attributes.*
FIELDALIAS-otel_span_type = attributes.span_type AS span_type
FIELDALIAS-otel_model_name = attributes.model_name AS model_name
FIELDALIAS-otel_model_provider = attributes.model_provider AS model_provider
FIELDALIAS-otel_duration = attributes.duration_ms AS duration_ms
FIELDALIAS-otel_input_tokens = attributes.input_tokens AS input_tokens
FIELDALIAS-otel_output_tokens = attributes.output_tokens AS output_tokens
FIELDALIAS-otel_is_error = attributes.is_error AS is_error
FIELDALIAS-otel_status = attributes.status AS status
FIELDALIAS-otel_workflow = attributes.workflow_name AS workflow_name
FIELDALIAS-otel_vector_store = attributes.vector_store AS vector_store
FIELDALIAS-otel_docs = attributes.documents_retrieved AS documents_retrieved
FIELDALIAS-otel_relevance = attributes.relevance_score AS relevance_score
FIELDALIAS-otel_tool = attributes.tool_name AS tool_name
FIELDALIAS-otel_error_message = attributes.error_message AS error_message

# dashboard-compat aliases (same as genai:trace)
FIELDALIAS-otel_latency = attributes.duration_ms AS latency_ms
FIELDALIAS-otel_prompt_tokens = attributes.input_tokens AS prompt_tokens
FIELDALIAS-otel_completion_tokens = attributes.output_tokens AS completion_tokens
