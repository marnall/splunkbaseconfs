# =============================================================================
# GenAI Observability - Out-of-the-box Alerts
# -----------------------------------------------------------------------------
# Each alert is gated by a minimum volume / cost floor, so it stays silent
# until real traffic flows (safe to ship enabled). Numeric thresholds are
# marked "TUNE". To make a threshold tunable, define it in macros.conf and
# reference it as `macro_name`.
# =============================================================================

[GenAI - Cost spike by model and workflow]
search = `genai_llm_spans` \
| `genai_cost_lookup` | `genai_calculate_cost` \
| eval bucket=if(_time>=relative_time(now(),"-1h@h"),"current","baseline") \
| stats sum(eval(if(bucket=="current",estimated_cost,0))) as current_cost \
        sum(eval(if(bucket=="baseline",estimated_cost,0))) as baseline_total \
        by model_name workflow_name \
| eval baseline_avg=round(baseline_total/24,6) \
| where current_cost > 1.0 AND baseline_avg > 0 AND current_cost > (3 * baseline_avg) \
| eval spike_x=round(current_cost/baseline_avg,1), current_cost=round(current_cost,4) \
| sort - current_cost
description = Fires when an hour's spend for a model+workflow exceeds 3x its trailing 24h hourly average (floor $1). TUNE: floor 1.0, factor 3.
dispatch.earliest_time = -25h@h
dispatch.latest_time = @h
cron_schedule = 5 * * * *
enableSched = 1
is_scheduled = 1
disabled = 0
counttype = number of events
relation = greater than
quantity = 0
request.ui_dispatch_app = splunk_genai_observability
alert.track = 1
alert.severity = 4
alert.digest_mode = 1
alert.suppress = 1
alert.suppress.period = 1h

[GenAI - Error rate above threshold by workflow]
search = `genai_traces_index` span_type="LLM" \
| stats count as total, sum(is_error) as errors by workflow_name \
| eval error_rate=round((errors/total)*100,2) \
| where total >= 20 AND error_rate > 5 \
| sort - error_rate
description = Fires when LLM error rate for a workflow exceeds 5% over 15 min (min 20 requests). TUNE: rate 5, min volume 20.
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
is_scheduled = 1
disabled = 0
counttype = number of events
relation = greater than
quantity = 0
request.ui_dispatch_app = splunk_genai_observability
alert.track = 1
alert.severity = 5
alert.digest_mode = 1
alert.suppress = 1
alert.suppress.period = 30m

[GenAI - P95 latency SLO breach]
search = `genai_llm_spans` \
| stats p95(duration_ms) as p95_latency_ms count as requests by model_name workflow_name \
| where requests >= 20 AND p95_latency_ms > 8000 \
| eval p95_latency_ms=round(p95_latency_ms,0) \
| sort - p95_latency_ms
description = Fires when P95 LLM latency for a model+workflow exceeds 8000 ms over 15 min (min 20 requests). TUNE: SLO 8000 ms, min volume 20.
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
is_scheduled = 1
disabled = 0
counttype = number of events
relation = greater than
quantity = 0
request.ui_dispatch_app = splunk_genai_observability
alert.track = 1
alert.severity = 4
alert.digest_mode = 1
alert.suppress = 1
alert.suppress.period = 30m

[GenAI - Token budget burn (projected daily)]
search = `genai_llm_spans` \
| eval total_tokens=coalesce(input_tokens,0)+coalesce(output_tokens,0) \
| stats sum(total_tokens) as tokens_today \
| eval day_fraction=(now()-relative_time(now(),"@d"))/86400 \
| where day_fraction > 0 \
| eval projected_tokens=round(tokens_today/day_fraction,0), daily_budget=10000000 \
| where projected_tokens > daily_budget \
| eval pct_of_budget=round((projected_tokens/daily_budget)*100,1), tokens_today=round(tokens_today,0)
description = Fires when projected end-of-day token usage exceeds the daily budget (default 10,000,000). TUNE: daily_budget.
dispatch.earliest_time = @d
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
is_scheduled = 1
disabled = 0
counttype = number of events
relation = greater than
quantity = 0
request.ui_dispatch_app = splunk_genai_observability
alert.track = 1
alert.severity = 3
alert.digest_mode = 1
alert.suppress = 1
alert.suppress.period = 6h
