[cube_syslog]
# INDEX TIME RULES
SHOULD_LINEMERGE=true
NO_BINARY_CHECK=true
BREAK_ONLY_BEFORE_DATE = true
TRANSFORMS = cube_syslog_extract_call_id, cube_syslog_extract_to, cube_syslog_extract_from

[cube_cdr]
# INDEX TIME RULES
INDEXED_EXTRACTIONS = csv
FIELD_NAMES = unix_time,call_id,cdr_type,cube_leg_type,h323_conf_id,peer_address,peer_sub_address,h323_setup_time,alert_time,h323_connect_time,h323_disconnect_time,h323_disconnect_cause,disconnect_text,h323_call_origin,charged_units,info_type,paks_out,bytes_out,paks_in,bytes_in,username,clid,dnis,gtd_orig_cic,gtd_term_cic,tx_duration,peer_id,peer_if_index,logical_if_index,acom_level,noise_level,voice_tx_duration,account_code,codec_bytes,codec_type_rate,ontime_rv_playout,remote_udp_port,remote_media_udp_port,vad_enable,receive_delay,round_trip_delay,hiwater_playout_delay,lowater_playout_delay,gapfill_with_interpolation,gapfill_with_redundancy,gapfill_with_silence,gapfill_with_prediction,early_packets,late_packets,lost_packets,max_bitrate,faxrelay_start_time,faxrelay_stop_time,faxrelay_max_jit_buf_depth,faxrelay_jit_buf_ovflow,faxrelay_init_hs_mod,faxrelay_mr_hs_mod,faxrelay_num_pages,faxrelay_tx_packets,faxrelay_rx_packets,faxrelay_direction,faxrelay_pkt_conceal,faxrelay_ecm_status,faxrelay_encap_protocol,faxrelay_nsf_country_code,faxrelay_nsf_manuf_code,faxrelay_fax_success,override_session_time,h323_ivr_out,internal_error_code,h323_voice_quality,remote_media_address,remote_media_id,carrier_id,calling_party_category,originating_line_info,charge_number,transmission_medium_req,service_descriptor,outgoing_area,incoming_area,out_trunkgroup_label,out_carrier_id,dsp_id,in_trunkgroup_label,in_carrier_id,cust_biz_grp_id,supp_svc_xfer_by,voice_feature,feature_operation,feature_op_status,feature_op_time,feature_id,gw_rxd_cdn,gw_rxd_cgn,gtd_gw_rxd_ocn,gtd_gw_rxd_cnn,gw_rxd_rdn,gw_final_xlated_cdn,gw_final_xlated_cgn,gw_final_xlated_rdn,gk_xlated_cdn,gk_xlated_cgn,gw_collected_cdn,ip_hop,redirected_station,subscriber,in_intrfc_desc,out_intrfc_desc,session_protocol,local_hostname,backward_call_id,feature_name,feature_time,feature_param1,feature_param2,feature_param3,feature_param4,feature_param5,feature_param6,feature_param7,feature_param8,feature_param9,feature_param10,feature_param11,feature_param12,feature_param13,feature_param14,feature_param15,feature_param16
TIMESTAMP_FIELDS = unix_time
TIME_FORMAT = %s
SHOULD_LINEMERGE = False
TRANSFORMS = remove_lines_without_data, cube_server_name, cube_calling_party_number, cube_called_party_number, cube_duration



