# Alerts

[Brandefense - Critical Incidents]
description = Alert on new CRITICAL severity incidents from Brandefense
search = index=brandefense sourcetype="brandefense:incidents" event_type="incident" severity="CRITICAL" | dedup code | table _time code title severity category organization_name asset_name url
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
request.ui_dispatch_app = SA-brandefense
alert.track = 1
alert.suppress = 1
alert.suppress.fields = code
alert.suppress.period = 24h
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 5

[Brandefense - High Severity IOC Summary]
description = Daily summary report of HIGH and CRITICAL severity IOCs from Brandefense
search = index=brandefense sourcetype="brandefense:iocs" severity IN ("HIGH", "CRITICAL") | dedup data | stats count by type severity category module | sort - count
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1
request.ui_dispatch_app = SA-brandefense
alert.track = 0

# ES Threat Intelligence Lookup Updates
# These saved searches run on the search head and populate CSV lookups from indexed IOC data

[Brandefense - IP Lookup Update]
description = Populate IP address threat intelligence lookup from indexed IOC data
search = index=brandefense sourcetype="brandefense:iocs" type="ip_address" \
| dedup data \
| where isnotnull(last_seen) \
| eval _last_seen_epoch=strptime(last_seen, "%Y-%m-%dT%H:%M:%S") \
| where _last_seen_epoch > relative_time(now(), "-30d") \
| eval ip=data, threat_key="brandefense", weight=case(severity=="CRITICAL","4", severity=="HIGH","3", severity=="MEDIUM","2", severity=="LOW","1", 1==1,"1"), description=module." - ".category \
| table ip threat_key weight description category module first_seen last_seen \
| outputlookup brandefense_ip_intel
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
cron_schedule = 3 */2 * * *
enableSched = 1
request.ui_dispatch_app = SA-brandefense
alert.track = 0

