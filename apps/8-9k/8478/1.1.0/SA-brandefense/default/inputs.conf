# ES Threat Intelligence - Threatlist Inputs
# These register the CSV lookup files with Splunk ES threat intelligence framework
# Lookup CSVs are populated by saved searches in savedsearches.conf using outputlookup

[threatlist://Brandefense_IP]
description = Threat intel IP addresses provided by Brandefense
disabled = false
fields = ip:$1,threat_key:$2,weight:$3,description:$4,category:$5,module:$6,first_seen:$7,last_seen:$8
skip_header_lines = 1
type = ips
url = lookup://brandefense_ip_intel
interval = 86400
max_age = -24h
delim_regex = ,
file_parser = auto
ignore_regex = (^#|^\s*$)
is_threatintel = true
sinkhole = true
timeout = 30
start_by_shell = false

