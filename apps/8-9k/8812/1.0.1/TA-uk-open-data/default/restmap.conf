[admin:TA_uk_open_data_configuration]
match = /
members = TA_uk_open_data_settings

[admin:TA_uk_open_data_inputs]
match = /
members = TA_uk_open_data_carbon_intensity, TA_uk_open_data_nhs_ae

[admin_external:TA_uk_open_data_settings]
handlertype = python
python.version = python3
handlerfile = TA_uk_open_data_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_uk_open_data_carbon_intensity]
handlertype = python
python.version = python3
handlerfile = TA_uk_open_data_rh_carbon_intensity.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_uk_open_data_nhs_ae]
handlertype = python
python.version = python3
handlerfile = TA_uk_open_data_rh_nhs_ae.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
