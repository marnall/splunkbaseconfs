[monitor:///opt/sysdiagnose/cases/*/parsed_data/*.jsonl]
disabled = true
index = digit_sysdiagnose
sourcetype = digit:saf:parseddata:json
host_segment = 3

[monitor:///opt/sysdiagnose/cases/*/logs/*.jsonl]
disabled = true
index = digit_sysdiagnose
sourcetype = digit:saf:logs:json
host_segment = 3
# Rotating logs
crcSalt = <SOURCE>

[script://$SPLUNK_HOME/etc/apps/ec_digit_saf_ta/bin/read_cases.py]
disabled = true
index = digit_sysdiagnose
sourcetype = digit:saf:cases:json
python.version = python3
python.required = "3.9","3.13"
interval = 300