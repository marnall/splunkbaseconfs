###
### Lookup Editor AX — custom capabilities
###
### lookup_ax_admin : Manager page (schema CRUD)
### lookup_ax_edit  : Editor / Editors pages (CSV editing and backup)
###
### Both capabilities are granted by default to the admin role (on-prem) and the sc_admin role (Splunk Cloud).
### For any other role, an administrator must grant them explicitly via Settings -> Roles.
###

[capability::lookup_ax_admin]

[capability::lookup_ax_edit]

[role_admin]
lookup_ax_admin = enabled
lookup_ax_edit  = enabled

[role_sc_admin]
lookup_ax_admin = enabled
lookup_ax_edit  = enabled
