[script:lookup_ax_config]
match = /lookup_ax/config
scripttype = python
python.version = python3
handler = lookup_ax_config_handler.LookupAxConfigHandler
output_modes = json
passSystemAuth = true
# GET (listing) is also allowed for lookup_ax_edit users — shows the schema list in the Editor sidebar.
# POST (create/update/delete) is additionally verified against lookup_ax_admin inside the handler.
capability = lookup_ax_edit

[script:lookup_ax_editor]
match = /lookup_ax/editor
scripttype = python
python.version = python3
handler = lookup_ax_editor_handler.LookupAxEditorHandler
output_modes = json
passSystemAuth = true
capability = lookup_ax_edit

[script:lookup_ax_backup]
match = /lookup_ax/backup
scripttype = python
python.version = python3
handler = lookup_ax_backup_handler.LookupAxBackupHandler
output_modes = json
passSystemAuth = true
capability = lookup_ax_edit
