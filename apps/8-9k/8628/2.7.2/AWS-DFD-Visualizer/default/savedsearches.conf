[Daily Asset Inventory Lookup Builder]
action.email.useNSSubject = 1
alert.track = 0
cron_expression = 0 1 * * *
description = Nightly scheduled search compiling live AWS tag inventory and outputting to my_asset_inventory lookup.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 1
search = index=aws sourcetype="aws:metadata" InstanceId="i-*" \
| eval role_idx = mvfind('Tags{}.Key', "(?i)^Role$"), desc_idx = mvfind('Tags{}.Key', "(?i)^Description$"), env_idx = mvfind('Tags{}.Key', "(?i)^Environment$") \
| eval raw_role = if(isnotnull(role_idx), mvindex('Tags{}.Value', role_idx), null()), raw_desc = if(isnotnull(desc_idx), mvindex('Tags{}.Value', desc_idx), null()), raw_env = if(isnotnull(env_idx), mvindex('Tags{}.Value', env_idx), null()) \
| eval Role = case(isnotnull(raw_role), raw_role, like(raw_desc, "%Policy%"), "Policy Plane", like(raw_desc, "%Data%"), "Data Plane", like(raw_desc, "%Identity%"), "Identity Plane", true(), "Infrastructure Plane") \
| stats count as asset_count by InstanceId, Role \
| rename InstanceId as resourceId, Role as role \
| outputlookup my_asset_inventory_lookup
