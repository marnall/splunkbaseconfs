[aws_dfd_vulnerability_join(1)]
args = join_field
definition = join type=left $join_field$ [ search index=security sourcetype="tenable:nessus" severity=critical | rename dest_uuid as $join_field$ | eval status="Critical", icon="SKULL" | table $join_field$ status icon ]
err_msg = The join_field argument (e.g. resourceId) is required.

[aws_dfd_threat_join(1)]
args = join_field
definition = join type=left $join_field$ [ search index=security sourcetype="aws:guardduty" severity=high | rename resource.resourceDetails.resourceId as $join_field$ | eval status="incident" | table $join_field$ status ]
err_msg = The join_field argument (e.g. resourceId) is required.
