[admin:geoip_configuration]
match = /
members = geoip_databases, geoip_settings

[admin_external:geoip_databases]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = geoip_rh_databases.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:geoip_settings]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = geoip_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true
