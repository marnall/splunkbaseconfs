[expose:geoip_databases]
pattern = geoip_databases
methods = POST, GET

[expose:geoip_databases_specified]
pattern = geoip_databases/*
methods = POST, GET, DELETE

[expose:geoip_settings]
pattern = geoip_settings
methods = POST, GET

[expose:geoip_settings_specified]
pattern = geoip_settings/*
methods = POST, GET, DELETE
