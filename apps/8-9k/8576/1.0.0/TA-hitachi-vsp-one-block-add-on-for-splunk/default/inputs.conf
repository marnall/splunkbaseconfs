[vspblock_config]
start_by_shell = false
python.version = python3
sourcetype = hitachi:vspblock:config
interval = 60
collect_all_resource_types = true
max_attributes_per_request = 25
lookback_minutes = 60
disabled = 0

[vspblock_perf]
start_by_shell = false
python.version = python3
sourcetype = hitachi:vspblock:perf
interval = 60
