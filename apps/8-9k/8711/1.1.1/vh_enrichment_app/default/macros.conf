# Search macros consumed by VH Enrichment saved searches.
#
# The shipped defaults below mirror the fallbacks in
# appserver/static/vh_enrichment_dashboard_init.js — so on a fresh
# install the saved search behaves the same way the dashboards do
# when nothing has been configured yet.
#
# At Setup save time, appserver/static/vh_enrichment_setup.js writes
# the customer's configured values into local/macros.conf for these
# same two macro names (via the splunkd /configs/conf-macros REST
# endpoint), which keeps the saved search aligned with the
# `configured_indexes` / `configured_ip_fields` fields stored in the
# vh_enrichment_app_settings KV doc that drives the dashboards.
#
# Either macro can also be edited directly (Splunk UI: Settings →
# Advanced Search → Search Macros) — overrides land in local/macros.conf
# and take effect on the next search dispatch.

[vh_managed_indexes]
definition = index=main
iseval = 0

[vh_managed_ip_fields]
definition = src_ip, src, client_ip, sourceIPAddress, dest_ip, dest
iseval = 0
