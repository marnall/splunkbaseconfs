[vhip-command]
syntax       = vhip (ip_field=<field>)?
shortdesc    = Enrich events with VisionHeight IP intelligence (KV Store cache).
description  = For each event, reads the IP from the field named by <ip_field> \
               (default: ip) and looks it up against the VH enrichment KV \
               Store. Appends vh_* fields on hit (vh_risk_score, vh_risk_tags, \
               vh_is_scanner, vh_scanner_name, vh_is_anonymizer, \
               vh_is_commercial_vpn, vh_is_residential_proxy, vh_latitude, \
               vh_longitude, vh_source=cache, vh_status=found). Sets \
               vh_status=not_found on KV miss and vh_status=invalid_input on \
               missing/invalid input. Sets vh_error only on real failures \
               (kv_unavailable, auth_error, kv_http_<code>, internal_error). \
               Cache-only — never makes outbound API calls.
example1     = ... | eval ip=coalesce(src_ip, client_ip) | vhip ip_field=ip
comment1     = Enrich events with VH risk fields using the cached KV Store.
example2     = | makeresults | eval ip="8.8.8.8" | vhip
comment2     = Ad-hoc single-IP enrichment via the VH KV Store cache.
usage        = public
related      = lookup, inputlookup

[vhipmetadata-command]
syntax       = vhipmetadata ip=<ip-address>
shortdesc    = VisionHeight direct-API IP investigation (single IOC).
description  = Generating command. Calls the VisionHeight /ip/metadata API \
               directly for the supplied IP and emits one event per result \
               with vh_* fields (vh_ip_country, vh_ip_company, vh_isp, \
               vh_entity_type, vh_risk, vh_is_tor, vh_is_residential_proxy, \
               vh_is_commercial_vpn, vh_ports, vh_total_domains, vh_tags, \
               vh_pulse_origin_countries, vh_pulse_origin_languages, \
               vh_has_linked_ips, vh_source=api, vh_status=found). Returns \
               vh_status=not_found if the API returns an empty list and \
               vh_status=invalid_input if ip is missing or not a valid IP. \
               Sets vh_error only on real failures (auth_error, api_timeout, \
               api_http_<code>, internal_error). Does NOT touch the KV \
               Store, does NOT cache, and does NOT enrich existing events.
example1     = | vhipmetadata ip="82.102.152.161"
comment1     = Single-IP direct-API investigation; one event per API result.
example2     = | vhipmetadata ip="8.8.8.8" | table ip vh_risk vh_isp vh_tags
comment2     = Pull selected metadata fields for a single IP.
usage        = public
related      = vhip
