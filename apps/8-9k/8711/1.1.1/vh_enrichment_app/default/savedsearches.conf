# Default saved search exposed via the app nav.
#
# When the user clicks "Enrichment Search" in the app nav, Splunk
# resolves the <saved> nav entry to this saved search and opens the
# stock Search omnibar with this SPL preloaded, then auto-dispatches
# it because dispatch.earliest_time / dispatch.latest_time are set.
# The user can review, edit, and re-run from there — full Search-app
# UX (omnibar, timeline, job inspector) with the default query
# already in place.
#
# `vh_managed_indexes` / `vh_managed_ip_fields` are defined in
# macros.conf. Their defaults match the dashboards' JS-side
# fallbacks, and Setup writes the customer-configured values into
# local/macros.conf when saved (see vh_enrichment_setup.js), so this
# saved search stays in sync with the same Managed Indexes / Managed
# IP Fields configuration used elsewhere in the app.

[Search]
search = `vh_managed_indexes` earliest=-1h \
| eval ip=coalesce(`vh_managed_ip_fields`) \
| where isnotnull(ip) AND ip!="" \
| vhip ip_field=ip \
| search vh_status=found \
| table _time ip vh_risk_score vh_risk_tags vh_is_scanner vh_scanner_name vh_is_anonymizer vh_is_commercial_vpn vh_is_residential_proxy vh_latitude vh_longitude vh_source vh_status \
| sort - _time
dispatch.earliest_time = -1h
dispatch.latest_time   = now
displayview            = search
request.ui_dispatch_view = search
is_visible             = 1
disabled               = 0
description = Default VisionHeight enrichment search. Pulls events from the indexes configured in Setup ("Managed Indexes"), derives an IP from the "Managed IP Fields" coalesce list, runs the vhip enrichment command, and shows enriched events with risk score, tags, and scanner/anonymizer/proxy flags. The index clause and IP-field list come from the vh_managed_indexes / vh_managed_ip_fields macros, which Setup keeps in sync with the KV-backed app settings.
