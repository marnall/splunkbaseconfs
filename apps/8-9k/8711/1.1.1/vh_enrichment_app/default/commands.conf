[vhip]
filename             = vh_ip.py
chunked              = true
python.version       = python3
python.required      = 3.7
local                = true
is_risky             = false
maxinputs            = 50000

[vhipmetadata]
filename             = vhipmetadata.py
chunked              = true
python.version       = python3
python.required      = 3.7
local                = true
is_risky             = false

# Naming convention for VH commands (no underscores — the SPL parser tokenizes
# underscored names as separate words, so "vh_ip" parses as "vh" + "_ip"):
#   vhip            cache/KV IP enrichment              (implemented)
#   vhipmetadata    direct-API IP investigation         (implemented)
#   vhdomain        cache/KV domain enrichment          (future)
#   vhdomainlookup  direct-API domain investigation     (future)
#
# bin/vh_command.py is retained on disk as a reference copy of the pre-rename
# implementation but is intentionally NOT registered here.
