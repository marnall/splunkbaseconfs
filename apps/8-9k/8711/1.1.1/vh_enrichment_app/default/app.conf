#
# Splunk app configuration file
#

[install]
is_configured = 0
state = enabled
build = 7

# Force a splunkd restart on any inputs.conf state change in this app.
# The system-default reload.inputs handler only covers built-in input types
# (monitor/script/udp/tcp/http); newly-installed modular input schemes are
# not discovered by the live-reload path and never start until splunkd
# restarts and introspects the scheme. "never" promotes the install to a
# restart-required state change, which is what surfaces the standard
# "Restart Now" prompt to the user after a fresh Splunkbase install.
[triggers]
reload.inputs = never

[ui]
is_visible = 1
label = VH Enrichment App
setup_view = setup

[launcher]
author = VisionHeight
description = Enriches Splunk events with IP threat intelligence data (risk score, risk tags, scanner, VPN, proxy, geolocation) via a KV Store lookup populated from the VisionHeight enrichment API. Includes the `vh` SPL command for cache-backed IP enrichment in search.
version = 1.1.1

[package]
id = vh_enrichment_app
check_for_updates = true

[id]
name = vh_enrichment_app
version = 1.1.1
