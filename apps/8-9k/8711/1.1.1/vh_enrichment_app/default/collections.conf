[vh_enrichment_kv_collection_app]
enforceTypes = true
accelerated_fields.ip_accel = {"ip": 1}

field.ip = string
field.risk_score = string
field.risk_tags = string
field.is_scanner = string
field.scanner_name = string
field.is_anonymizer = string
field.is_commercial_vpn = string
field.is_residential_proxy = string
field.longitude = string
field.latitude = string

[vh_enrichment_control_state]
enforceTypes = true

field.last_action = string
field.updated_at = string
field.schedule_enabled = bool
field.scheduled_time_hhmm = string
field.schedule_tz = string
field.last_scheduled_run_date = string

[vh_enrichment_app_settings]
enforceTypes = true

field.configured_indexes = string
field.configured_ip_fields = string
# Canonical API base URL for all outbound traffic.  Stored as a plain
# scheme+host (https://host) with no trailing slash — the caller appends
# the route (/splunk/enrichment/file for ingestion, /ip/metadata for the
# vhipmetadata search command).  Empty triggers the shipped default in
# vh_http.load_api_base.
field.api_base_url = string
# Outbound proxy configuration for the VisionHeight API calls.
# Password lives in storage/passwords (realm=vh_enrichment_app, name=proxy_password),
# not in KV — only the non-secret fields are stored here.
field.proxy_enabled = bool
field.proxy_host = string
field.proxy_port = number
field.proxy_scheme = string
field.proxy_username = string
# Absolute path to an additional PEM bundle of CA certificates used to
# validate outbound TLS (VisionHeight API + presigned S3 download).
# Empty = "use OpenSSL defaults only" (Splunk Cloud / standard public CAs).
# Set this on on-prem hosts that sit behind TLS-inspection appliances or
# trust a private internal CA — the bundle is ADDED to the default trust
# store, not substituted for it.  Verification is never disabled.
field.ca_bundle_path = string
