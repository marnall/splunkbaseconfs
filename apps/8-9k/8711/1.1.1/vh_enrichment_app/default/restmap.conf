[script:vh_enrichment_control]
match                 = /vh_enrichment/control/*
script                = vh_enrichment_control.py
scripttype            = persist
handler               = vh_enrichment_control.VHEnrichmentControlHandler
python.version        = python3
python.required       = 3.7
requireAuthentication = true
output_modes          = json
passPayload           = true
passSession           = true
capability.post       = admin_all_objects

# Backend for the Setup page.  Same restmap shape as the control handler
# above — both expose app-owned REST endpoints under /services/vh_enrichment/...
# that are reachable from the browser through Splunk Web's /en-US/splunkd/__raw/
# proxy.  Setup uses this in preference to direct browser calls against
# /servicesNS/.../data/inputs/... because Splunk Web's setup-mode proxy
# blocks those paths when [install] is_configured=0, while app-owned
# REST endpoints under /services/<app>/... pass through.
[script:vh_enrichment_setup]
match                 = /vh_enrichment/setup/*
script                = vh_enrichment_setup.py
scripttype            = persist
handler               = vh_enrichment_setup.VHEnrichmentSetupHandler
python.version        = python3
python.required       = 3.7
requireAuthentication = true
output_modes          = json
passPayload           = true
passSession           = true
capability.post       = admin_all_objects
