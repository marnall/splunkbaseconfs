[vh_enrichment_lookup]
external_type = kvstore
collection = vh_enrichment_kv_collection_app
fields_list = _key, ip, risk_score, risk_tags, is_scanner, scanner_name, is_anonymizer, is_commercial_vpn, is_residential_proxy, longitude, latitude

[vh_enrichment_control_state]
external_type = kvstore
collection = vh_enrichment_control_state
fields_list = _key, last_action, updated_at, schedule_enabled, scheduled_time_hhmm, schedule_tz, last_scheduled_run_date, run_status, run_requested, stop_requested, run_started_at, run_completed_at, run_error, current_phase, records_inserted_so_far, last_record_count, last_heartbeat_at

[vh_enrichment_app_settings]
external_type = kvstore
collection = vh_enrichment_app_settings
fields_list = _key, configured_indexes, configured_ip_fields, api_base_url, proxy_enabled, proxy_host, proxy_port, proxy_scheme, proxy_username
