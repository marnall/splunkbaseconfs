#
# Lookup definitions for the USOM threat-intelligence CSVs.
# The CSVs themselves are written by the bin/usom_ti.py modular input into
# $SPLUNK_HOME/etc/apps/TA-usom-cti/lookups/.
#

[usom_ip_intel]
filename = usom_ip_intel.csv
case_sensitive_match = false

[usom_ip6_intel]
filename = usom_ip6_intel.csv
case_sensitive_match = false

[usom_ip6net_intel]
filename = usom_ip6net_intel.csv
case_sensitive_match = false

[usom_domain_intel]
filename = usom_domain_intel.csv
case_sensitive_match = false

[usom_url_intel]
filename = usom_url_intel.csv
case_sensitive_match = false
