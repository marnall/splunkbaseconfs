#
# Parsing rules for the two sourcetypes produced by this add-on.
#
# `ta_usom_cti:log` is the operational log written by the modular input
# and the persistent REST handler (see inputs.conf monitor stanza).
# `usom_ti:stats` is the JSON stats event emitted once per fetch cycle
# by bin/usom_ti.py.
#

[ta_usom_cti:log]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S,%3N
MAX_TIMESTAMP_LOOKAHEAD = 28
TRUNCATE = 10000
category = USOM Threat Intelligence

[usom_ti:stats]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
KV_MODE = json
TRUNCATE = 10000
category = USOM Threat Intelligence
