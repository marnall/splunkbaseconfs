#
# REST endpoint for the setup view. Backed by bin/setup_rest.py.
# python.version=python3 keeps the handler compatible with Splunk
# Enterprise 9.0+ (bundled Python 3.7-3.9); avoid python.required=3.13
# until 9.x is end-of-life.
#

[script:usom_ti_setup]
match                 = /usom_ti/setup
script                = setup_rest.py
scripttype            = persist
handler               = setup_rest.SetupHandler
requireAuthentication = true
passPayload           = true
passSession           = true
passSystemAuth        = false
python.version        = python3
