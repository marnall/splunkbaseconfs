#
# Expose the custom REST handler to splunkweb so the setup view's JS can
# reach it as /splunkd/__raw/services/usom_ti/setup. The pattern is matched
# against the URI relative to the /services/ root, so it does NOT include
# the `services/` prefix.
#

[expose:usom_ti_setup]
pattern  = usom_ti/setup
methods  = GET, POST
