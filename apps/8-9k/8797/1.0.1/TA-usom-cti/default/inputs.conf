#
# python.version=python3 is set on both the scheme and the instance so the
# input runs on Splunk Enterprise 9.0+ (bundled Python 3.7-3.9). Avoid
# python.required=3.13 until Splunk 9.x is end-of-life.
#

[usom_ti]
python.version = python3

[usom_ti://default]
python.version = python3
disabled = 1
criticality_threshold = 7
types = ip,ip6,ip6net,domain,url
interval = 14400
api_base_url = https://siberguvenlik.gov.tr/api/address/index
request_delay_seconds = 5
http_proxy =
stats_index = _internal
setup_debug = false

#
# Enterprise Security threat-intelligence framework inputs. Each stanza
# corresponds to one of the lookup CSVs produced by usom_ti above and
# pushes its rows into the matching ES KV-store collection. All ship
# disabled; the setup page toggles them on per-lookup. Stanzas have no
# effect unless Splunk Enterprise Security is installed.
#

[threatlist://usom_ip_intel]
disabled = 1
type = ip
description = USOM TR-CERT - malicious IPv4
url = file://$SPLUNK_HOME/etc/apps/TA-usom-cti/lookups/usom_ip_intel.csv
delim_regex = ,
skip_header_lines = 1
fields = ip:$1,weight:$2,description:$3,category:$4,source:$5,first_seen:$6,last_updated:$7
interval = 14400
sinkhole = false

[threatlist://usom_ip6_intel]
