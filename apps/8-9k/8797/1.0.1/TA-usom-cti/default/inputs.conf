#
# Pin the app's operational log to a stable sourcetype. Without this
# Splunk's default $SPLUNK_HOME/var/log/splunk/* directory monitor
# would auto-assign dynamic sourcetypes like `ta_usom_cti-2`,
# `ta_usom_cti-too_small`, etc., as the file rotates. The wildcarded
# monitor URI also claims the rotated variants (.log.1, .log.2, ...).
#

[monitor://$SPLUNK_HOME/var/log/splunk/ta_usom_cti.log*]
disabled = false
index = _internal
sourcetype = ta_usom_cti:log
