[default]
[hydroquebec:demande]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TRUNCATE = 0
TIME_PREFIX = "date_mesure"\s*:\s*"
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 19
TZ = America/Montreal
KV_MODE = json
AUTO_KV_JSON = true
category = Hydro-Québec
description = Demande d'électricité en temps réel d'Hydro-Québec

[hydroquebec:interruption_planifie]
