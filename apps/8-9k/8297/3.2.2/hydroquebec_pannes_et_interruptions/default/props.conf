category = Hydro-Québec
description = Interruptions planifiées d'Hydro-Québec
LINE_BREAKER = ([\r\n]+)\{
TZ = America/New_York
TRUNCATE = 0

[hydroquebec:pannes]
INDEXED_EXTRACTIONS = none
