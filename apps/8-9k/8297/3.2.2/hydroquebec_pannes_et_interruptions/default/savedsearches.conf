# ========================================
# Alertes Hydro-Québec
# ========================================

[Hydro-Quebec - Nouvelle panne détectée]
search = index=hydroquebec sourcetype=hydroquebec:pannes [search index=hydroquebec sourcetype=hydroquebec:pannes | stats latest(bis_id) as bis_id | return bis_id] | eval debut_epoch = strptime(date_debut, "%Y-%m-%d %H:%M:%S") | where debut_epoch >= (now() - 600) | dedup id_panne | table date_debut, municipalite, region, adresse, nombre_clients, cause_desc, statut | rename date_debut as "Début", municipalite as "Municipalité", region as "Région", adresse as "Adresse", nombre_clients as "Clients affectés", cause_desc as "Cause", statut as "Statut"
description = Détecte les nouvelles pannes dans les 10 dernières minutes
cron_schedule = */5 * * * *
enableSched = 0
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.digest_mode = 1
alert.suppress = 0
alert.severity = 3
action.email = 0

[Hydro-Quebec - Panne importante (>100 clients)]
search = index=hydroquebec sourcetype=hydroquebec:pannes [search index=hydroquebec sourcetype=hydroquebec:pannes | stats latest(bis_id) as bis_id | return bis_id] | dedup id_panne | where nombre_clients > 100 | table date_debut, municipalite, region, adresse, nombre_clients, cause_desc, statut, date_fin_estimee | rename date_debut as "Début", municipalite as "Municipalité", region as "Région", adresse as "Adresse", nombre_clients as "Clients affectés", cause_desc as "Cause", statut as "Statut", date_fin_estimee as "Fin estimée"
description = Alerte pour les pannes affectant plus de 100 clients
cron_schedule = */5 * * * *
enableSched = 0
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.digest_mode = 1
alert.suppress = 0
alert.severity = 4
action.email = 0

[Hydro-Quebec - Interruption planifiée prochainement]
search = index=hydroquebec sourcetype=hydroquebec:interruption_planifie [search index=hydroquebec sourcetype=hydroquebec:interruption_planifie | stats latest(aip_id) as aip_id | return aip_id] | dedup id_interruption | eval debut_timestamp = strptime(date_debut_prevue, "%Y-%m-%d %H:%M:%S") | where debut_timestamp > now() AND debut_timestamp < (now() + 86400) | eval temps_avant_heures = round((debut_timestamp - now()) / 3600, 1) | table date_debut_prevue, date_fin_prevue, municipalite, region, adresse, nombre_clients, temps_avant_heures | rename date_debut_prevue as "Début prévu", date_fin_prevue as "Fin prévue", municipalite as "Municipalité", region as "Région", adresse as "Adresse", nombre_clients as "Clients affectés", temps_avant_heures as "Dans (heures)"
description = Alerte quotidienne pour les interruptions planifiées dans les prochaines 24 heures
cron_schedule = 0 8 * * *
enableSched = 0
disabled = 1
dispatch.earliest_time = -24h
dispatch.latest_time = now
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.digest_mode = 1
alert.suppress = 0
alert.severity = 2
action.email = 0

[Hydro-Quebec - Panne de longue durée (>6h)]
search = index=hydroquebec sourcetype=hydroquebec:pannes [search index=hydroquebec sourcetype=hydroquebec:pannes | stats latest(bis_id) as bis_id | return bis_id] | dedup id_panne | eval debut_epoch = strptime(date_debut, "%Y-%m-%d %H:%M:%S") | eval duree_heures = round((now() - debut_epoch) / 3600, 1) | where duree_heures >= 6 | table date_debut, duree_heures, municipalite, region, adresse, nombre_clients, cause_desc, statut | rename date_debut as "Début", duree_heures as "Durée (h)", municipalite as "Municipalité", region as "Région", adresse as "Adresse", nombre_clients as "Clients affectés", cause_desc as "Cause", statut as "Statut"
description = Détecte les pannes qui durent depuis plus de 6 heures
cron_schedule = 0 */6 * * *
enableSched = 0
disabled = 1
dispatch.earliest_time = -24h
dispatch.latest_time = now
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.digest_mode = 1
alert.suppress = 0
alert.severity = 4
action.email = 0

[Hydro-Quebec - Région fortement affectée (>5 pannes)]
search = index=hydroquebec sourcetype=hydroquebec:pannes [search index=hydroquebec sourcetype=hydroquebec:pannes | stats latest(bis_id) as bis_id | return bis_id] | dedup id_panne | stats count as pannes, sum(nombre_clients) as total_clients by region | where pannes > 5 | sort - pannes | rename region as "Région", pannes as "Nombre de pannes", total_clients as "Total clients affectés"
description = Alerte lorsqu'une région a plus de 5 pannes actives simultanées
cron_schedule = */15 * * * *
enableSched = 0
disabled = 1
dispatch.earliest_time = -20m
dispatch.latest_time = now
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.digest_mode = 1
alert.suppress = 0
alert.severity = 3
action.email = 0

# ========================================
# Alertes Demande d'Électricité
# ========================================

[Hydro-Quebec - Demande électricité élevée (>40000 MW)]
search = index=hydroquebec sourcetype=hydroquebec:demande | stats latest(demande_mw) as demande_mw, latest(date_mesure) as date_mesure | where demande_mw > 40000 | eval demande_mw_format = round(demande_mw, 0) | table date_mesure, demande_mw_format | rename date_mesure as "Date/Heure", demande_mw_format as "Demande (MW)"
description = Alerte déclenchée lorsque la demande d'électricité dépasse 40,000 MW
cron_schedule = */15 * * * *
enableSched = 0
disabled = 1
dispatch.earliest_time = -20m
dispatch.latest_time = now
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.digest_mode = 1
alert.suppress = 1
alert.suppress.period = 1h
alert.severity = 3
action.email = 0
action.email.subject = Alerte Hydro-Québec - Demande élevée: $result.Demande (MW)$ MW
action.email.message = La demande d'électricité a atteint $result.Demande (MW)$ MW, dépassant le seuil critique de 40,000 MW.\n\nDate/Heure: $result.Date/Heure$\n\nCeci peut indiquer une période de pointe. Surveillez le réseau pour d'éventuelles pannes.

[Hydro-Quebec - Demande électricité très élevée (>41000 MW)]
search = index=hydroquebec sourcetype=hydroquebec:demande | stats latest(demande_mw) as demande_mw, latest(date_mesure) as date_mesure | where demande_mw > 41000 | eval demande_mw_format = round(demande_mw, 0) | table date_mesure, demande_mw_format | rename date_mesure as "Date/Heure", demande_mw_format as "Demande (MW)"
description = Alerte critique déclenchée lorsque la demande dépasse 41,000 MW (proche du record)
cron_schedule = */15 * * * *
enableSched = 0
disabled = 1
dispatch.earliest_time = -20m
dispatch.latest_time = now
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.digest_mode = 1
alert.suppress = 0
alert.severity = 5
action.email = 0
action.email.subject = ⚠️ URGENT - Demande CRITIQUE: $result.Demande (MW)$ MW
action.email.message = ⚠️ ALERTE CRITIQUE ⚠️\n\nLa demande d'électricité a atteint un niveau TRÈS ÉLEVÉ de $result.Demande (MW)$ MW.\n\nDate/Heure: $result.Date/Heure$\n\nCe niveau approche ou dépasse le record historique. Des délestages pourraient être nécessaires.

[Hydro-Quebec - Augmentation rapide de la demande]
search = index=hydroquebec sourcetype=hydroquebec:demande | bin _time span=15m | stats latest(demande_mw) as demande by _time | streamstats current=f last(demande) as demande_precedente | eval augmentation = demande - demande_precedente | where augmentation > 2000 | eval demande_actuelle=round(demande, 0), demande_precedente=round(demande_precedente, 0), augmentation=round(augmentation, 0) | table _time, demande_actuelle, demande_precedente, augmentation | rename _time as "Date/Heure", demande_actuelle as "Demande actuelle (MW)", demande_precedente as "Demande précédente (MW)", augmentation as "Augmentation (MW)"
description = Alerte déclenchée lors d'une augmentation rapide de la demande (>2000 MW en 30 min)
cron_schedule = */15 * * * *
enableSched = 0
disabled = 1
dispatch.earliest_time = -35m
dispatch.latest_time = now
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.digest_mode = 1
alert.suppress = 1
alert.suppress.period = 30m
alert.severity = 3
action.email = 0
action.email.subject = Alerte - Augmentation rapide de la demande (+$result.Augmentation (MW)$ MW)
action.email.message = La demande d'électricité a augmenté rapidement de $result.Augmentation (MW)$ MW en 30 minutes.\n\nDemande actuelle: $result.Demande actuelle (MW)$ MW\nDemande précédente: $result.Demande précédente (MW)$ MW\nDate/Heure: $result.Date/Heure$\n\nSurveillez la situation.
