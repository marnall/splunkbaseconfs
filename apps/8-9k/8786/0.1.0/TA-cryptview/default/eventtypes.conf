[cryptview_asset]
search = `cryptview_index` sourcetype=cryptview:cbom:asset

[cryptview_summary]
search = `cryptview_index` sourcetype=cryptview:cbom:summary

[cryptview_change]
search = `cryptview_index` sourcetype=cryptview:cbom:event

[cryptview_cyclonedx]
search = `cryptview_index` sourcetype=cryptview:cbom:cyclonedx

[cryptview_pqc_regression]
search = `cryptview_index` sourcetype=cryptview:cbom:event event_type=pqc_regressed

[cryptview_expiring_certificate]
search = `cryptview_index` sourcetype=cryptview:cbom:asset asset_type=certificate expiry_days<=90

[cryptview_priority_escalation]
search = `cryptview_index` sourcetype=cryptview:cbom:event event_type=priority_changed

[cryptview_pqc_transport_not_tested]
search = `cryptview_index` sourcetype=cryptview:cbom:asset pqc_probe_status=not_tested

[cryptview_pqc_transport_observed]
search = `cryptview_index` sourcetype=cryptview:cbom:asset pqc_probe_status=hybrid_observed

[cryptview_pqc_certificate]
search = `cryptview_index` sourcetype=cryptview:cbom:asset pqc_certificate_in_use=Yes

[cryptview_audit]
search = `cryptview_index` sourcetype=cryptview:audit

[cryptview_audit_failure]
search = `cryptview_index` sourcetype=cryptview:audit status=failed
