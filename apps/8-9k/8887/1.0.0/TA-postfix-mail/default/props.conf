 # KSCONF-NO-SORT

[postfix:syslog]
# Technology Add-on for Postfix mail logs
# Search-time field extractions and CIM Email field mappings

REPORT-subject = postfix_subject
REPORT-angle_brackets = postfix_angle_brackets
REPORT-message_id = postfix_message_id

EXTRACT-process_pid = (?<process>(?:postfix\/[\w\/-]+|amavis))\[(?<pid>\d+)\]:
EXTRACT-queue_id = postfix\/[\w\/-]+\[\d+\]:\s+(?<queue_id>[A-Fa-f0-9]{6,32}):
EXTRACT-bounce = postfix\/bounce\[\d+\]: [A-Fa-f0-9]{6,32}: (?<bounce_reason>[^:]+): (?<bounce_queue_id>[A-Fa-f0-9]{6,32})$
EXTRACT-status_reject = postfix\/(?:submission\/)?smtpd\[\d+\]: (?:NOQUEUE|[A-Fa-f0-9]{6,32}): (?<status>reject):
EXTRACT-reason = status=[^\s]+\s+\((?<reason>.*)\)$
EXTRACT-reject_reason = : (?<reject_reason>[^;:]+);
EXTRACT-dest = relay=(?<dest_host>[^\[ ,]+)\[(?<dest_ip>[^\]]+)\](?::(?<dest_port>\d+))?
EXTRACT-remote_queue = queued as (?<xref>[A-Fa-f0-9]+) in reason
EXTRACT-status_code = status=\w+ \((?:host \S+ said:\s*)?(?<status_code_short>\d+)
EXTRACT-src-connect = (?:dis)?connect(?:ion after (?:HELO|CONNECT))? from (?:(?<src_host>[^\[]+)\[(?<src_ip>[^\]]+)|(?<src>.*))
EXTRACT-delays = ^(?<time_before_queue>[^/]+)/(?<time_in_queue>[^/]+)/(?<time_connecting>[^/]+)/(?<time_transmitting>[^$]+)$ in delays

EXTRACT-amavis_summary = amavis\[\d+\]:\s+\((?<amavis_id>[^\)]+)\)\s+(?<amavis_result>\S+)\s+(?<amavis_verdict>\S+)\s+\{(?<amavis_policy>[^\}]*)\},\s+(?<amavis_origin>[^\[]+?)\s+\[(?<src_ip>[^\]]+)\]:(?<src_port>\d+)(?:\s+\[(?<amavis_client_ip>[^\]]+)\])?\s+<(?<from>[^<>]*)>\s+->\s+<(?<to>[^<>]*)>
EXTRACT-amavis_queue_id = \bQueue-ID:\s*(?<queue_id>[A-Fa-f0-9]{6,32})
EXTRACT-amavis_message_id = \bMessage-ID:\s*<(?<message_id>[^>]+)>
EXTRACT-amavis_mail_id = \bmail_id:\s*(?<mail_id>[^,\s]+)
EXTRACT-amavis_hits = \bHits:\s*(?<hits>[^,\s]+)
EXTRACT-amavis_size = \bsize:\s*(?<size>\d+)
EXTRACT-amavis_queued_as = \bqueued_as:\s*(?<queued_as>[A-Fa-f0-9]{6,32})
EXTRACT-amavis_dkim_new = \bdkim_new=(?<dkim_new>[^,\s]+)
EXTRACT-amavis_scan_time_ms = ,\s*(?<amavis_scan_time_ms>\d+)\s+ms(?:\s|$)

EXTRACT-postfix_tls_connection = postfix\/(?:submission\/)?smtpd\[\d+\]:\s+(?<tls_connection_type>\S+)\s+TLS\s+connection\s+established\s+from\s+(?<src_host>[^\[]+)\[(?<src_ip>[^\]]+)\]:\s+(?<tls_version>\S+)\s+with\s+cipher\s+(?<tls_cipher>\S+)\s+\((?<tls_cipher_bits>\d+)\/(?<tls_cipher_max_bits>\d+)\s+bits\)
EXTRACT-postfix_smtp_connect_to = postfix\/smtp\[\d+\]:\s+(?:[A-Fa-f0-9]{6,32}:\s+.*\(\s*)?connect to (?<dest_host>[^\[]+)\[(?<dest_ip>[^\]]+)\]:(?<dest_port>\d+):\s*(?<smtp_error>[^\)]+)
EXTRACT-postfix_smtp_amavis_queued_as = \bqueued as (?<queued_as>[A-Fa-f0-9]{6,32})

# Postfix anvil statistics
EXTRACT-postfix_anvil_connection_stats = postfix\/anvil\[\d+\]:\s+statistics:\s+max\s+(?<anvil_metric>connection rate|connection count)\s+(?<anvil_value>\d+)(?:\/(?<anvil_window>\d+s))?\s+for\s+\((?<anvil_service>[^:]+):(?<src_ip>[^\)]+)\)\s+at\s+(?<anvil_observed_time>.+)$
EXTRACT-postfix_anvil_cache_stats = postfix\/anvil\[\d+\]:\s+statistics:\s+max\s+(?<anvil_metric>cache size)\s+(?<anvil_value>\d+)\s+at\s+(?<anvil_observed_time>.+)$

# Postfix postscreen connection events
EXTRACT-postfix_postscreen_connect = postfix\/postscreen\[\d+\]:\s+CONNECT\s+from\s+\[(?<src_ip>[^\]]+)\]:(?<src_port>\d+)\s+to\s+\[(?<dest_ip>[^\]]+)\]:(?<dest_port>\d+)
EXTRACT-postfix_postscreen_result = postfix\/postscreen\[\d+\]:\s+(?<postscreen_result>ALLOWLISTED|PASS OLD|PASS NEW|PASS|PREGREET|DNSBL|BLACKLISTED|WHITELISTED|HANGUP)\s+\[(?<src_ip>[^\]]+)\]:(?<src_port>\d+)

FIELDALIAS-status_code = dsn AS status_code
FIELDALIAS-filter_action = reject_reason AS filter_action
FIELDALIAS-internal_message_id = queue_id AS internal_message_id
FIELDALIAS-process_id = pid AS process_id
FIELDALIAS-src_user = from AS src_user
FIELDALIAS-recipient = to AS recipient
FIELDALIAS-orig_recipient = orig_to AS orig_recipient
FIELDALIAS-recipient_count = nrcpt AS recipient_count

EVAL-vendor = "Postfix"
EVAL-product = "Email Server"
EVAL-protocol = coalesce(proto, "SMTP")
EVAL-src = coalesce(src, nullif(src_host, "unknown"), src_ip)
EVAL-dest = coalesce(dest, nullif(dest_host, "unknown"), dest_ip)
EVAL-delay = delay*1000
EVAL-amavis_origin = trim(amavis_origin)
EVAL-status = case(isnotnull(status), status, process=="amavis" AND amavis_result=="Passed", "sent", match(process,"postfix/(submission/)?smtpd") AND like(_raw,"%TLS connection established%"), "success", process=="postfix/smtp" AND isnotnull(smtp_error), "failure", process=="postfix/anvil", "info", process=="postfix/postscreen" AND postscreen_result=="ALLOWLISTED", "success", process=="postfix/postscreen" AND match(postscreen_result,"PASS"), "success", process=="postfix/postscreen" AND like(_raw,"%CONNECT from%"), "started", process=="postfix/postscreen" AND match(postscreen_result,"PREGREET|DNSBL|BLACKLISTED|HANGUP"), "failure", true(), null())
EVAL-action = case(isnotnull(action), action, match(process,"postfix/(submission/)?smtpd") AND like(_raw,"%TLS connection established%"), "tls_established", status=="sent" OR (process=="amavis" AND amavis_result=="Passed"), "delivered", status=="deferred", "deferred", status=="bounced", "bounced", status=="expired", "deleted", status=="reject", "blocked", status=="success", "allowed", status=="failure" OR (process=="postfix/smtp" AND isnotnull(smtp_error)), "failed", process=="postfix/anvil", "statistics", process=="postfix/postscreen" AND like(_raw,"%CONNECT from%"), "connection_attempt", process=="postfix/postscreen" AND postscreen_result=="ALLOWLISTED", "allowed", process=="postfix/postscreen" AND match(postscreen_result,"PASS"), "passed", process=="postfix/postscreen" AND match(postscreen_result,"PREGREET|DNSBL|BLACKLISTED|HANGUP"), "blocked", true(), null())
