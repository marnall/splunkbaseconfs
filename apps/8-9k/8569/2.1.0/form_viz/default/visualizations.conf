# Declare shared visualizations
#

[form_viz]
label = Form Viz
description = Render SPL results as a dynamic form. SPL must return: question, type (freetext|dropdown|radio|checkbox|number|date|spl|description|markdown|spl_display), options (comma-separated choices where applicable; SPL text for spl_display rows), order (optional numeric), description (optional markdown helper text shown above the input)
search_fragment = ... | table question, type, options, order, description
allow_user_selection = true
disabled = 0
supports_trellis = false
supports_drilldown = false
