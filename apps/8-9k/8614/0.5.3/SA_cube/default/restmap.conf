[script:SA_cube_shunt]
match = /SA_cube_shunt
script = shunt/SA_cube_shunt.py
scripttype = persist
handler = SA_cube_shunt.SaCubeShuntHandler
requireAuthentication = true
output_modes = json, xml
passPayload = true
passSession = true
passHttpCookies = true
passHttpHeaders = true
python.version  = python3
python.required = 3.9, 3.13

