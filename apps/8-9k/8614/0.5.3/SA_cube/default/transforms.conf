
[cube_syslog_extract_method_and_status]
REGEX = (?m)ccsipDisplayMsg:\r?\n?(?<direction>Received|Sent):\r?\n?((?<method>PRACK|INVITE|ACK|BYE|CANCEL|UPDATE|INFO|SUBSCRIBE|NOTIFY|REFER|MESSAGE|OPTIONS|REGISTER)\ssip:([^@\>]+)@([^:\r\n]+):?(\d+)?\s)?SIP/2\.0\s?(?<status>\d{3})?

# ton/npi/pi/si  in ios voice gateway fields.
# NOTE: there are more than just these 4.
[cube_final_xlated_cgn]
SOURCE_KEY = gw_final_xlated_cgn
REGEX  = ^(?:(?:ton:(\d+),npi:(\d+),)?(?:pi:(\d+),si:(\d+),)?#:)?(\w+)
FORMAT = gw_final_xlated_cgn_ton::$1 gw_final_xlated_cgn_npi::$2 gw_final_xlated_cgn_pi::$3 gw_final_xlated_cgn_si::$4 gw_final_xlated_cgn_number::$5

[cube_final_xlated_cdn]
SOURCE_KEY = gw_final_xlated_cdn
REGEX  = ^(?:(?:ton:(\d+),npi:(\d+),)?(?:pi:(\d+),si:(\d+),)?#:)?(\w+)
FORMAT = gw_final_xlated_cdn_ton::$1 gw_final_xlated_cdn_npi::$2 gw_final_xlated_cdn_pi::$3 gw_final_xlated_cdn_si::$4 gw_final_xlated_cdn_number::$5

[cube_rxd_cdn]
SOURCE_KEY = gw_rxd_cdn
REGEX  = ^(?:(?:ton:(\d+),npi:(\d+),)?(?:pi:(\d+),si:(\d+),)?#:)?(\w+)
FORMAT = gw_rxd_cdn_ton::$1 gw_rxd_cdn_npi::$2 gw_rxd_cdn_pi::$3 gw_rxd_cdn_si::$4 gw_rxd_cdn_number::$5

[cube_rxd_cgn]
SOURCE_KEY = gw_rxd_cgn
REGEX  = ^(?:(?:ton:(\d+),npi:(\d+),)?(?:pi:(\d+),si:(\d+),)?#:)?(\w+)
FORMAT = gw_rxd_cgn_ton::$1 gw_rxd_cgn_npi::$2 gw_rxd_cgn_pi::$3 gw_rxd_cgn_si::$4 gw_rxd_cgn_number::$5


[cube_call_reference_id]
SOURCE_KEY = h323_conf_id
REGEX = ^(?:[^\s]{8})?([^\s]{8})\s
FORMAT = call_reference_id::$1



