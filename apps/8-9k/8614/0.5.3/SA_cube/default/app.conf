[id]
version = 0.5.3
name = SA_cube
#splunkbase_id = 8614

[ui]
is_visible = 1
label = Supporting App for CUBE
supported_themes = light, dark

[launcher]
author = Sideview, LLC
description = This is a Supporting app designed to be deployed alongside Sideview's commercial "Cisco CDR Reporting and Analytics" app.  It provides the Splunk configuration for search-time extractions on the syslog and CDR data from Cisco Unified Border Element aka "CUBE" Additionally it contains various pieces of Splunk configuration and logic that are used by Cisco CDR Reporting and Analytics, to make the CUBE data work within its user interfaces.
version = 0.5.3

[package]
id = SA_cube

[install]
build = 11

[shclustering]
deployer_lookups_push_mode = always_preserve

[triggers]
reload.sideview_data_types = access_endpoints /admin/conf-sideview_data_types
