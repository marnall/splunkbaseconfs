#LOOKUP-huntgroup = vg_huntgroups vdn as huntgroup_vdn site as site OUTPUT huntgroup
LOOKUP-causeCode = vg_q931_cause_codes decimal as h323_disconnect_cause OUTPUT cause as h323_disconnect_description
LOOKUP-legType = vg_leg_types type as cube_leg_type OUTPUT description as cube_leg_type_description
LOOKUP-callType = vg_call_types h323_call_origin as h323_call_origin OUTPUT direction as direction direction as type
LOOKUP-infoType = vg_info_types type as info_type OUTPUT description as info_type_description
pulldown_type = true
