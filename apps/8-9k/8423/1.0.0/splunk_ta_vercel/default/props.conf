[vercel:drain]
# Optional staging sourcetype for auto-routing to specific Vercel sourcetypes.
TRANSFORMS-vercel_set_sourcetype = vercel_set_sourcetype, vercel_schema_speed_insights, vercel_schema_web_analytics
KV_MODE = json
AUTO_KV_JSON = 1
SHOULD_LINEMERGE = false
TRUNCATE = 0
# CLEAN_KEYS = 1

[vercel:logs]
KV_MODE = json
AUTO_KV_JSON = 1
SHOULD_LINEMERGE = false
TRUNCATE = 0
# CLEAN_KEYS = 1
EVAL-_time = coalesce(if(isnum(time), if(time>1000000000000, time/1000, time), null()), if(isnum(timestamp), if(timestamp>1000000000000, timestamp/1000, timestamp), null()), if(isnum('proxy.timestamp'), if('proxy.timestamp'>1000000000000, 'proxy.timestamp'/1000, 'proxy.timestamp'), null()), if(match(timestamp, "Z$"), strptime(timestamp, "%Y-%m-%dT%H:%M:%S.%3NZ"), null()), if(match(timestamp, "[\\+\\-]\\d{2}:?\\d{2}$"), strptime(timestamp, "%Y-%m-%dT%H:%M:%S.%3N%z"), null()), if(match(eventTime, "Z$"), strptime(eventTime, "%Y-%m-%dT%H:%M:%S.%3NZ"), null()), if(match(eventTime, "[\\+\\-]\\d{2}:?\\d{2}$"), strptime(eventTime, "%Y-%m-%dT%H:%M:%S.%3N%z"), null()), _time)
EVAL-src_ip = coalesce('proxy.clientIp', clientIp, ip, src_ip)
EVAL-status = coalesce('proxy.statusCode', status, statusCode)
EVAL-http_method = coalesce('proxy.method', method, httpMethod)
EVAL-url = coalesce('proxy.path', path, url, 'request.url', 'request.path')
EVAL-uri_path = coalesce('proxy.path', path, 'request.path')
EVAL-response_time = if(isnum('proxy.latency'), 'proxy.latency'/1000, if(isnum(latency), latency/1000, null()))
EVAL-http_user_agent = coalesce('proxy.userAgent', userAgent, 'request.userAgent')
EVAL-bytes = coalesce('proxy.responseByteSize', 'proxy.bytes', bytes, 'response.size')
EVAL-app = coalesce(projectName, project, app, service)
EVAL-change_id = coalesce(deploymentId, deployment_id, version)
EVAL-version = coalesce(deploymentId, deployment_id, version)

[vercel:speed_insights]
KV_MODE = json
AUTO_KV_JSON = 1
SHOULD_LINEMERGE = false
TRUNCATE = 0
# CLEAN_KEYS = 1
EVAL-_time = coalesce(if(isnum(time), if(time>1000000000000, time/1000, time), null()), if(isnum(timestamp), if(timestamp>1000000000000, timestamp/1000, timestamp), null()), if(match(timestamp, "Z$"), strptime(timestamp, "%Y-%m-%dT%H:%M:%S.%3NZ"), null()), if(match(timestamp, "[\\+\\-]\\d{2}:?\\d{2}$"), strptime(timestamp, "%Y-%m-%dT%H:%M:%S.%3N%z"), null()), if(match(eventTime, "Z$"), strptime(eventTime, "%Y-%m-%dT%H:%M:%S.%3NZ"), null()), if(match(eventTime, "[\\+\\-]\\d{2}:?\\d{2}$"), strptime(eventTime, "%Y-%m-%dT%H:%M:%S.%3N%z"), null()), _time)
EVAL-lcp = coalesce(if(match(metricType, "(?i)^LCP$"), value, null()), lcp, 'metrics.lcp', 'webVitals.lcp')
EVAL-cls = coalesce(if(match(metricType, "(?i)^CLS$"), value, null()), cls, 'metrics.cls', 'webVitals.cls')
EVAL-fid = coalesce(if(match(metricType, "(?i)^FID$"), value, null()), fid, 'metrics.fid', 'webVitals.fid')
EVAL-inp = coalesce(if(match(metricType, "(?i)^INP$"), value, null()), inp, 'metrics.inp', 'webVitals.inp')
EVAL-ttfb = coalesce(if(match(metricType, "(?i)^TTFB$"), value, null()), ttfb, 'metrics.ttfb', 'webVitals.ttfb')
EVAL-fcp = coalesce(if(match(metricType, "(?i)^FCP$"), value, null()), fcp, 'metrics.fcp', 'webVitals.fcp')
EVAL-url = coalesce(url, href, origin, 'page.url')
EVAL-uri_path = coalesce(path, 'page.path')
EVAL-site = coalesce(host, hostname, site, 'page.hostname')
EVAL-app = coalesce(projectName, project, app, service)

[vercel:web_analytics]
KV_MODE = json
AUTO_KV_JSON = 1
SHOULD_LINEMERGE = false
TRUNCATE = 0
# CLEAN_KEYS = 1
EVAL-_time = coalesce(if(isnum(time), if(time>1000000000000, time/1000, time), null()), if(isnum(timestamp), if(timestamp>1000000000000, timestamp/1000, timestamp), null()), if(match(timestamp, "Z$"), strptime(timestamp, "%Y-%m-%dT%H:%M:%S.%3NZ"), null()), if(match(timestamp, "[\\+\\-]\\d{2}:?\\d{2}$"), strptime(timestamp, "%Y-%m-%dT%H:%M:%S.%3N%z"), null()), if(match(eventTime, "Z$"), strptime(eventTime, "%Y-%m-%dT%H:%M:%S.%3NZ"), null()), if(match(eventTime, "[\\+\\-]\\d{2}:?\\d{2}$"), strptime(eventTime, "%Y-%m-%dT%H:%M:%S.%3N%z"), null()), _time)
EVAL-src_ip = coalesce(ip, clientIp, 'proxy.clientIp')
EVAL-status = coalesce(status, statusCode)
EVAL-http_method = coalesce(method, httpMethod)
EVAL-url = coalesce(url, href, if(isnotnull(origin) AND isnotnull(path), origin . path, null()), origin, 'page.url')
EVAL-uri_path = coalesce(path, 'page.path')
EVAL-http_user_agent = coalesce(userAgent, user_agent, 'request.userAgent')
EVAL-referrer = coalesce(referrer, 'page.referrer')
EVAL-site = coalesce(host, hostname, site, 'page.hostname')
EVAL-app = coalesce(projectName, project, app, service)
