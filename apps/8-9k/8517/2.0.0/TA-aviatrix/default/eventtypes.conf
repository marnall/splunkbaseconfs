#
# Aviatrix Technology Add-on - Event Types
#

#############################################
# Firewall Traffic Events
#############################################
[aviatrix_firewall_traffic]
search = (sourcetype="aviatrix:firewall:l4" OR sourcetype="aviatrix:firewall:l7" OR sourcetype="aviatrix:firewall:fqdn")

[aviatrix_firewall_l4]
search = sourcetype="aviatrix:firewall:l4"

[aviatrix_firewall_l7]
search = sourcetype="aviatrix:firewall:l7"

[aviatrix_fqdn]
search = sourcetype="aviatrix:firewall:fqdn"

#############################################
# Traffic by Action
#############################################
[aviatrix_traffic_allowed]
search = (sourcetype="aviatrix:firewall:l4" action="PERMIT") OR (sourcetype="aviatrix:firewall:l7" action="Permit") OR (sourcetype="aviatrix:firewall:fqdn" state="MATCHED")

[aviatrix_traffic_blocked]
search = (sourcetype="aviatrix:firewall:l4" action="DENY") OR (sourcetype="aviatrix:firewall:l7" action="Deny") OR (sourcetype="aviatrix:firewall:fqdn" state!="MATCHED")

#############################################
# IDS Events
#############################################
[aviatrix_ids_alert]
search = sourcetype="aviatrix:ids" event_type="alert"

[aviatrix_ids_critical]
search = sourcetype="aviatrix:ids" event_type="alert" severity=1

[aviatrix_ids_high]
search = sourcetype="aviatrix:ids" event_type="alert" severity=2

#############################################
# Gateway Performance Events
#############################################
[aviatrix_gateway_network]
search = sourcetype="aviatrix:gateway:network"

[aviatrix_gateway_system]
search = sourcetype="aviatrix:gateway:system"

[aviatrix_gateway_health]
search = (sourcetype="aviatrix:gateway:network" OR sourcetype="aviatrix:gateway:system")

#############################################
# Audit Events
#############################################
[aviatrix_audit]
search = sourcetype="aviatrix:controller:audit"

[aviatrix_audit_success]
search = sourcetype="aviatrix:controller:audit" result="Success"

[aviatrix_audit_failure]
search = sourcetype="aviatrix:controller:audit" result!="Success"

[aviatrix_audit_policy_change]
search = sourcetype="aviatrix:controller:audit" (action="*microseg*" OR action="*policy*" OR action="*rule*")
