#
# Aviatrix Technology Add-on - Lookup Tables and Transforms
#

#############################################
# Action Normalization Lookup
#############################################
[aviatrix_action_lookup]
filename = aviatrix_action_lookup.csv
case_sensitive_match = false
default_match = unknown
max_matches = 1

#############################################
# Severity Lookup (for IDS)
#############################################
[aviatrix_severity_lookup]
filename = aviatrix_severity_lookup.csv
max_matches = 1

#############################################
# Protocol Name Lookup
#############################################
[aviatrix_protocol_lookup]
filename = aviatrix_protocol_lookup.csv
case_sensitive_match = false
max_matches = 1

#############################################
# Session End Reason Lookup
#############################################
[aviatrix_session_end_reason_lookup]
filename = aviatrix_session_end_reason_lookup.csv
max_matches = 1
