#
# Aviatrix Technology Add-on - Field Extractions and CIM Compliance
#

#############################################
# L4 Firewall - DCF Micro-segmentation Logs
#############################################
[aviatrix:firewall:l4]
TIME_FORMAT = %s
TIME_PREFIX = "timestamp":"?
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
KV_MODE = json
TRUNCATE = 0
category = Network & Security
description = Aviatrix Distributed Cloud Firewall Layer 4 micro-segmentation logs

# CIM Network Traffic Field Aliases
FIELDALIAS-src = src_ip AS src
FIELDALIAS-dest = dst_ip AS dest
FIELDALIAS-transport = proto AS transport
FIELDALIAS-protocol = proto AS protocol
FIELDALIAS-rule = uuid AS rule
FIELDALIAS-dvc_ip = gw_ip AS dvc_ip
FIELDALIAS-packets = session_pkt_cnt AS packets
FIELDALIAS-bytes = session_byte_cnt AS bytes
FIELDALIAS-src_mac_addr = src_mac AS src_mac
FIELDALIAS-dest_mac_addr = dst_mac AS dest_mac

# Calculated Fields
EVAL-duration = if(isnotnull(session_dur), round(tonumber(session_dur)/1000000, 3), null())
EVAL-vendor_product = "Aviatrix Cloud Firewall"
EVAL-vendor = "Aviatrix"
EVAL-product = "Distributed Cloud Firewall"
EVAL-direction = case(match(src_ip, "^10\.|^172\.(1[6-9]|2[0-9]|3[0-1])\.|^192\.168\.") AND match(dst_ip, "^10\.|^172\.(1[6-9]|2[0-9]|3[0-1])\.|^192\.168\."), "internal", match(src_ip, "^10\.|^172\.(1[6-9]|2[0-9]|3[0-1])\.|^192\.168\."), "outbound", 1=1, "inbound")
EVAL-dvc = coalesce(host, gw_ip)

# Action normalization lookup
LOOKUP-action_l4 = aviatrix_action_lookup action OUTPUT action_cim

#############################################
# L7 Firewall - TLS/SNI Inspection Logs
#############################################
[aviatrix:firewall:l7]
TIME_FORMAT = %s
TIME_PREFIX = "timestamp":
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
KV_MODE = json
TRUNCATE = 0
category = Network & Security
description = Aviatrix Distributed Cloud Firewall Layer 7 TLS/SNI inspection logs

# CIM Network Traffic Field Aliases
FIELDALIAS-src_ip = src AS src_ip
FIELDALIAS-dest_ip = dest AS dest_ip
FIELDALIAS-transport = proto AS transport
FIELDALIAS-protocol = proto AS protocol
FIELDALIAS-rule = decided_by AS rule
FIELDALIAS-app = sni_hostname AS app
FIELDALIAS-url_domain = sni_hostname AS url_domain
FIELDALIAS-http_content_type = stage AS http_content_type

# Calculated Fields
EVAL-src = src
EVAL-dest = dest
EVAL-bytes = if(isnotnull(request_bytes) AND isnotnull(response_bytes), tonumber(request_bytes) + tonumber(response_bytes), null())
EVAL-bytes_in = response_bytes
EVAL-bytes_out = request_bytes
EVAL-duration = if(isnotnull(session_time), round(tonumber(session_time)/1000000000, 3), null())
EVAL-vendor_product = "Aviatrix Cloud Firewall"
EVAL-vendor = "Aviatrix"
EVAL-product = "Distributed Cloud Firewall"
EVAL-dvc = host

# Action normalization lookup
LOOKUP-action_l7 = aviatrix_action_lookup action OUTPUT action_cim

#############################################
# IDS - Suricata EVE Format
#############################################
[aviatrix:ids]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%z
TIME_PREFIX = "timestamp":"
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
KV_MODE = json
TRUNCATE = 0
category = Network & Security
description = Aviatrix IDS (Suricata) intrusion detection alerts

# CIM Intrusion Detection Field Aliases
FIELDALIAS-src = src_ip AS src
FIELDALIAS-dest = dest_ip AS dest
FIELDALIAS-transport = proto AS transport
FIELDALIAS-protocol = proto AS protocol
FIELDALIAS-signature_name = signature AS signature
FIELDALIAS-ids_signature = signature AS ids_signature
FIELDALIAS-ids_signature_id = signature_id AS ids_signature_id
FIELDALIAS-ids_category = category AS ids_category

# HTTP-specific aliases for Suricata HTTP fields
FIELDALIAS-http_method = http_method AS http_method
FIELDALIAS-http_uri = http_url AS url
FIELDALIAS-http_host = http_hostname AS url_domain
FIELDALIAS-http_user_agent = http_user_agent AS http_user_agent
FIELDALIAS-http_status = http_status AS status

# Flow fields
FIELDALIAS-flow_id = flow_id AS flow_id
FIELDALIAS-bytes_in = flow_bytes_toclient AS bytes_in
FIELDALIAS-bytes_out = flow_bytes_toserver AS bytes_out

# Calculated Fields
EVAL-vendor_product = "Aviatrix IDS (Suricata)"
EVAL-vendor = "Aviatrix"
EVAL-product = "Suricata IDS"
EVAL-ids_type = "network"
EVAL-dvc = host
EVAL-severity_name = case(severity==1, "critical", severity==2, "high", severity==3, "medium", severity==4, "low", 1=1, "informational")

# Severity lookup
LOOKUP-severity = aviatrix_severity_lookup severity OUTPUT severity_name severity_id

#############################################
# FQDN Filtering Logs
#############################################
[aviatrix:firewall:fqdn]
TIME_FORMAT = %s
TIME_PREFIX = "timestamp":"
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
KV_MODE = json
TRUNCATE = 0
category = Network & Security
description = Aviatrix FQDN egress filtering logs

# CIM Network Traffic Field Aliases
FIELDALIAS-src = sip AS src
FIELDALIAS-src_ip = sip AS src_ip
FIELDALIAS-dest = dip AS dest
FIELDALIAS-dest_ip = dip AS dest_ip
FIELDALIAS-url_domain = hostname AS url_domain
FIELDALIAS-app = hostname AS app
FIELDALIAS-dvc = gateway AS dvc

# Calculated Fields
EVAL-vendor_product = "Aviatrix Cloud Firewall"
EVAL-vendor = "Aviatrix"
EVAL-product = "FQDN Egress Filter"
EVAL-action = if(state=="MATCHED", "allowed", "blocked")

#############################################
# Gateway Network Statistics
#############################################
[aviatrix:gateway:network]
TIME_FORMAT = %s
TIME_PREFIX = "timestamp":"?
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
KV_MODE = json
TRUNCATE = 0
category = Network & Security
description = Aviatrix Gateway network performance statistics

# CIM Field Aliases
FIELDALIAS-dvc = gateway AS dvc
FIELDALIAS-dvc_ip = public_ip AS dvc_ip
FIELDALIAS-dest_ip = private_ip AS dest_ip

# Calculated Fields
EVAL-vendor_product = "Aviatrix Gateway"
EVAL-vendor = "Aviatrix"
EVAL-product = "Gateway"

# Parse rate values (remove units like "Kb")
EVAL-thruput_in = if(match(total_rx_rate, "Kb$"), tonumber(replace(total_rx_rate, "Kb$", "")) * 1024, tonumber(total_rx_rate))
EVAL-thruput_out = if(match(total_tx_rate, "Kb$"), tonumber(replace(total_tx_rate, "Kb$", "")) * 1024, tonumber(total_tx_rate))

#############################################
# Gateway System Statistics
#############################################
[aviatrix:gateway:system]
TIME_FORMAT = %s
TIME_PREFIX = "timestamp":"?
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
KV_MODE = json
TRUNCATE = 0
category = Network & Security
description = Aviatrix Gateway system health statistics (CPU, memory, disk)

# CIM Field Aliases
FIELDALIAS-dvc = gateway AS dvc

# Calculated Fields
EVAL-vendor_product = "Aviatrix Gateway"
EVAL-vendor = "Aviatrix"
EVAL-product = "Gateway"
EVAL-cpu_load_percent = 100 - tonumber(cpu_idle)
EVAL-mem_used = tonumber(memory_total) - tonumber(memory_available)
EVAL-mem_free = memory_available
EVAL-storage_used = tonumber(disk_total) - tonumber(disk_free)
EVAL-storage_free = disk_free
EVAL-storage_used_percent = round((tonumber(disk_total) - tonumber(disk_free)) / tonumber(disk_total) * 100, 2)
EVAL-mem_used_percent = round((tonumber(memory_total) - tonumber(memory_available)) / tonumber(memory_total) * 100, 2)

#############################################
# Controller Audit Logs
#############################################
[aviatrix:controller:audit]
TIME_FORMAT = %s
TIME_PREFIX = "timestamp":"
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
KV_MODE = json
TRUNCATE = 0
category = Network & Security
description = Aviatrix Controller API audit logs

# CIM Change Analysis Field Aliases
FIELDALIAS-user = username AS user
FIELDALIAS-object = action AS object
FIELDALIAS-status = result AS status

# Calculated Fields
EVAL-vendor_product = "Aviatrix Controller"
EVAL-vendor = "Aviatrix"
EVAL-product = "Controller"
EVAL-dvc = host
EVAL-change_type = case(match(action, "(?i)create|add|new"), "create", match(action, "(?i)delete|remove"), "delete", match(action, "(?i)update|modify|edit|put"), "update", 1=1, "other")
EVAL-result_status = if(result=="Success" OR match(result, "^2"), "success", "failure")

#############################################
# HEC Raw Events (fallback parsing)
#############################################
[aviatrix:hec]
TIME_FORMAT = %s
TIME_PREFIX = "timestamp":
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
KV_MODE = json
TRUNCATE = 0
category = Network & Security
description = Aviatrix HEC raw events (pre-routing)
