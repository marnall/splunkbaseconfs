# GreenZone Platform Observability - Macros
# These macros abstract data sources and allow easy configuration

#############################################
# INDEX CONFIGURATION (User Configurable)
#############################################
# Users configure these on first-time setup
# These macros return just the index filter clause

[greenzone_index_infrastructure]
definition = (index=os OR index=infrastructure OR index=metrics)
iseval = 0

[greenzone_index_logs]
definition = (index=main OR index=application OR index=logs)
iseval = 0

[greenzone_index_endpoints]
definition = (index=endpoint OR index=os OR index=windows OR index=linux)
iseval = 0

[greenzone_index_network]
definition = (index=network OR index=firewall OR index=proxy)
iseval = 0

[greenzone_index_splunk_internal]
definition = (index=_internal)
iseval = 0

[greenzone_index_splunk_introspection]
definition = (index=_introspection)
iseval = 0

#############################################
# Main Infrastructure Health Metrics Macro
#############################################

[infrastructure_health_metrics]
definition = `infrastructure_metrics_source` \
| eval cpu_pct=coalesce(cpu_usage_percent, cpu_pct, round((cpu_user+cpu_system),2)) \
| eval mem_pct=coalesce(mem_usage_percent, mem_pct, round((mem_used/mem_total)*100,2)) \
| eval disk_pct=coalesce(disk_usage_percent, disk_pct, round((disk_used/disk_total)*100,2)) \
| eval health=case(\
    cpu_pct>90 OR mem_pct>90 OR disk_pct>90, "critical",\
    cpu_pct>75 OR mem_pct>75 OR disk_pct>75, "warning",\
    1=1, "healthy"\
) \
| fields _time, host, cpu_pct, mem_pct, disk_pct, health
iseval = 0

#############################################
# Data Source Options (User Configurable)
#############################################

# Option 1: Splunk Infrastructure Monitoring (_introspection)
[infrastructure_metrics_source_splunk]
definition = search index=_introspection component=Hostwide \
| eval cpu_pct=round('data.cpu_system_pct'+'data.cpu_user_pct',2) \
| eval mem_pct=round(('data.mem_used'/'data.mem')*100,2) \
| eval disk_pct=0
iseval = 0

# Option 2: Linux/Unix Systems (syslog, collectd, telegraf)
[infrastructure_metrics_source_linux]
definition = search `greenzone_index_infrastructure` \
    (sourcetype=linux_secure OR sourcetype=syslog OR sourcetype=collectd OR sourcetype=telegraf) \
| stats latest(cpu_usage_percent) as cpu_pct, \
        latest(mem_usage_percent) as mem_pct, \
        latest(disk_usage_percent) as disk_pct \
    by _time, host
iseval = 0

# Option 3: Windows Systems
[infrastructure_metrics_source_windows]
definition = search `greenzone_index_infrastructure` \
    (sourcetype=WinEventLog:System OR sourcetype=Perfmon* OR sourcetype=windows:perfmon) \
| stats latest(PercentProcessorTime) as cpu_pct, \
        latest(PercentMemoryUsed) as mem_pct, \
        latest(PercentDiskUsed) as disk_pct \
    by _time, host
iseval = 0

# Option 4: VMware
[infrastructure_metrics_source_vmware]
definition = search `greenzone_index_infrastructure` sourcetype=vmware:perf:* \
| stats avg(cpu.usage.average) as cpu_pct, \
        avg(mem.usage.average) as mem_pct, \
        avg(disk.usage.average) as disk_pct \
    by _time, host
iseval = 0

# Option 5: AWS CloudWatch
[infrastructure_metrics_source_aws]
definition = search `greenzone_index_infrastructure` sourcetype=aws:cloudwatch \
    (metric_name=CPUUtilization OR metric_name=MemoryUtilization OR metric_name=DiskUtilization) \
| stats avg(Average) as value by _time, host, metric_name \
| eval {metric_name}=value \
| stats latest(CPUUtilization) as cpu_pct, \
        latest(MemoryUtilization) as mem_pct, \
        latest(DiskUtilization) as disk_pct \
    by _time, host
iseval = 0

# Option 6: Generic Metrics Format (Universal)
[infrastructure_metrics_source_generic]
definition = search `greenzone_index_infrastructure` \
| stats latest(cpu_usage_percent) as cpu_pct, \
        latest(mem_usage_percent) as mem_pct, \
        latest(disk_usage_percent) as disk_pct \
    by _time, host
iseval = 0

#############################################
# Active Data Source (User Sets This)
#############################################

# DEFAULT: Set this to one of the above options
# Users change this in local/macros.conf after installation
[infrastructure_metrics_source]
definition = `infrastructure_metrics_source_generic`
iseval = 0

#############################################
# Service Status Monitoring
#############################################

[infrastructure_service_status]
definition = `infrastructure_service_source` \
| eval status=case(\
    service_status="running" OR service_status="up" OR service_status=1, "Up",\
    service_status="stopped" OR service_status="down" OR service_status=0, "Down",\
    1=1, "Unknown"\
) \
| fields _time, host, service_name, status
iseval = 0

# Service monitoring sources (configurable)
[infrastructure_service_source_linux]
definition = search (index=os OR index=linux) sourcetype=linux_secure \
    ("systemctl status" OR "service status") \
| rex field=_raw "(?<service_name>\w+)\s+(?<service_status>active|inactive|running|stopped)"
iseval = 0

[infrastructure_service_source_windows]
definition = search index=windows sourcetype=WinEventLog:System EventCode=7036 \
| rex field=Message "The (?<service_name>.*?) service entered the (?<service_status>running|stopped) state"
iseval = 0

[infrastructure_service_source_generic]
definition = search (index=services OR index=infrastructure) \
| stats latest(status) as service_status by _time, host, service_name
iseval = 0

# DEFAULT service source
[infrastructure_service_source]
definition = `infrastructure_service_source_generic`
iseval = 0

#############################################
# Helper Macros
#############################################

[infrastructure_health_color(1)]
args = health_status
definition = case($health_status$="critical","#E74C3C",$health_status$="warning","#F39C12",$health_status$="healthy","#2ECC71",1=1,"#95A5A6")
iseval = 1

[infrastructure_threshold_critical]
definition = 90
iseval = 1

[infrastructure_threshold_warning]
definition = 75
iseval = 1

#############################################
# LOG ANALYTICS MACROS
#############################################

[log_analytics_data]
definition = search `greenzone_index_logs` \
| eval log_level=case(\
    match(_raw, "(?i)fatal|critical|emergency"), "critical",\
    match(_raw, "(?i)error|err"), "error",\
    match(_raw, "(?i)warn|warning"), "warning",\
    match(_raw, "(?i)info|information"), "info",\
    match(_raw, "(?i)debug|trace"), "debug",\
    1=1, "unknown"\
)
iseval = 0

[log_analytics_internal]
definition = search `greenzone_index_splunk_internal` \
| eval log_level=case(\
    log_level="ERROR" OR log_level="FATAL", "error",\
    log_level="WARN", "warning",\
    log_level="INFO", "info",\
    1=1, "debug"\
)
iseval = 0

[log_parsing_errors]
definition = search `greenzone_index_splunk_internal` sourcetype=splunkd component=LineBreakingProcessor OR component=DateParserVerbose OR component=AggregatorMiningProcessor \
| rex field=_raw "(?<parsing_error>Failed to|Unable to|Could not parse)" \
| where isnotnull(parsing_error)
iseval = 0

#############################################
# ENDPOINT MONITOR MACROS
#############################################

[endpoint_health_data]
definition = search `greenzone_index_endpoints` \
| eval endpoint_type=case(\
    match(host, "(?i)laptop|notebook"), "laptop",\
    match(host, "(?i)desktop|workstation"), "desktop",\
    match(host, "(?i)server"), "server",\
    match(sourcetype, "(?i)windows"), "windows",\
    match(sourcetype, "(?i)linux|unix"), "linux",\
    match(sourcetype, "(?i)mac|darwin"), "macos",\
    1=1, "unknown"\
) \
| eval os_type=case(\
    match(sourcetype, "(?i)windows|win"), "Windows",\
    match(sourcetype, "(?i)linux"), "Linux",\
    match(sourcetype, "(?i)darwin|mac"), "macOS",\
    1=1, "Other"\
)
iseval = 0

[endpoint_forwarder_health]
definition = search `greenzone_index_splunk_internal` sourcetype=splunkd group=tcpin_connections \
| eval status=case(\
    connectionType="cooked" OR connectionType="cookedSSL", "connected",\
    1=1, "disconnected"\
)
iseval = 0

[endpoint_agent_health]
definition = search `greenzone_index_endpoints` \
    (sourcetype=*av* OR sourcetype=*edr* OR sourcetype=*antivirus* OR sourcetype=*defender*) \
| eval agent_status=case(\
    match(_raw, "(?i)running|active|enabled|operational"), "healthy",\
    match(_raw, "(?i)stopped|disabled|inactive|failed"), "critical",\
    match(_raw, "(?i)warning|degraded"), "warning",\
    1=1, "unknown"\
)
iseval = 0

#############################################
# TRAFFIC INSIGHTS MACROS
#############################################

[traffic_network_data]
definition = search `greenzone_index_network` \
| eval action=case(\
    match(_raw, "(?i)allow|accept|permit"), "allowed",\
    match(_raw, "(?i)deny|drop|reject|block"), "blocked",\
    1=1, "unknown"\
) \
| eval bytes=coalesce(bytes, bytes_in+bytes_out, sent_bytes+rcvd_bytes, 0) \
| eval src_ip=coalesce(src_ip, src, source_ip, clientip) \
| eval dest_ip=coalesce(dest_ip, dst, dest, destination_ip, serverip) \
| eval src_port=coalesce(src_port, sport, source_port) \
| eval dest_port=coalesce(dest_port, dport, destination_port, port)
iseval = 0

[traffic_firewall_data]
definition = search `greenzone_index_network` \
    (sourcetype=*firewall* OR sourcetype=*fw* OR sourcetype=pan* OR sourcetype=cisco* OR sourcetype=fortinet*) \
| eval action=case(\
    match(_raw, "(?i)allow|accept|permit"), "allowed",\
    match(_raw, "(?i)deny|drop|reject|block"), "blocked",\
    1=1, "unknown"\
)
iseval = 0

[traffic_proxy_data]
definition = search `greenzone_index_network` \
    (sourcetype=*proxy* OR sourcetype=squid OR sourcetype=bluecoat) \
| eval bytes=coalesce(sc_bytes, bytes, cs_bytes+sc_bytes)
iseval = 0

[traffic_protocol_classification]
definition = eval protocol=case(\
    dest_port=80 OR dest_port=8080, "HTTP",\
    dest_port=443 OR dest_port=8443, "HTTPS",\
    dest_port=22, "SSH",\
    dest_port=21, "FTP",\
    dest_port=25 OR dest_port=587, "SMTP",\
    dest_port=53, "DNS",\
    dest_port=3389, "RDP",\
    dest_port=445 OR dest_port=139, "SMB",\
    1=1, "Other-".dest_port\
)
iseval = 1