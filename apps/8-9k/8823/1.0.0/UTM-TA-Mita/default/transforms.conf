[mitautm_sourcetyper]
REGEX = \w{3}\s+\d{1,2}\s\d{2}:\d{2}:\d{2}\s(?:[\w.]+\s)?(\w+)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::mitautm:$1

[mitautm_filter_action]
filename = mitautm_filter_action.csv

[mitautm_filter_tcpflags]
filename = mitautm_filter_tcpflags.csv

[mitautm_filter_transport]
filename = mitautm_filter_transport.csv

[mitautm_vendor_tcp_flag]
CLEAN_KEYS = 0
FORMAT = vendor_tcp_flag::$1
MV_ADD = 1
REGEX = (\w)
SOURCE_KEY = vendor_tcp_flags

[mitautm_openvpn_action]
filename = mitautm_openvpn_action.csv

[mitautm_filterlog_zone]
batch_index_query = 0
case_sensitive_match = 1
filename = mitautm_zones.csv
