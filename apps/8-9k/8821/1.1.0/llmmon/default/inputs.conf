[script://$SPLUNK_HOME/etc/apps/llmmon/bin/llmmon_server.py]
disabled       = false
interval       = -1
sourcetype     = llmmon:server
index          = llmmon_logs
python.version = python3
# Hand the script a splunk-system-user session token on stdin so it can read the
# admin credentials configured in the Settings UI (storage/passwords). This is
# what replaces the previously hardcoded password.
passAuth       = splunk-system-user
