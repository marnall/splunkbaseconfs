# scripttype=python handlers: no 'script' key needed — Splunk imports 'handler' directly
# The app's bin/ dir is automatically added to sys.path
[script:llmmon_gw]
match                 = /proxy_llm
scripttype            = python
python.version        = python3
handler               = llmmon_gateway.GatewayHandler
requireAuthentication = false
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
# Hand the handler a system-level auth token so it can write logs even for
# unauthenticated LLM-client traffic — replaces the old hardcoded admin login.
passSystemAuth        = true
output_modes          = json
