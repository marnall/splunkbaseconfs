# Known program + optional PID before colon
[esxi_program_known]
REGEX = (?i)\b(?<program>Hostd|hostd-probe|Vpxa|vmkernel|vmkwarning|vobd|Rhttpproxy|osfsd|vmauthd|smartd|crond|cimslp|heartbeat|tmpwatch|sfcbd|sfcb-[A-Za-z0-9_-]+|snmpd|sensord|envoy-access|backup-check|auto-backup\.sh|crx-cli)\s*(?:\[(?<pid>[^\]]+)\])?:

# Fallback: extract any program token before colon (wide net)
[esxi_program_any]
REGEX = ^(?:\w{3}\s+\d{1,2}\s\d{2}:\d{2}:\d{2})\s+\S+(?:\s+\S+){0,6}\s+(?<program>[A-Za-z0-9._-]+)(?:\[(?<pid>[^\]]+)\])?\:

# Hostd Authentication
[esxi_hostd_login]
REGEX = (?i)Hostd(?:\[\d+\])?:.*\bUser\s+(?<user>[^@\s]+)@(?<src>\d{1,3}(?:\.\d{1,3}){3})\s+logged in as\s+(?<user_agent>.+)$

[esxi_hostd_logout]
REGEX = (?i)Hostd(?:\[\d+\])?:.*\bUser\s+(?<user>[^@\s]+)@(?<src>\d{1,3}(?:\.\d{1,3}){3})\s+logged out\s*\(\s*login time:\s*(?<login_time>[^)]*?),\s*number of API invocations:\s*(?<api_invocations>\d+),\s*user agent:\s*(?<user_agent>[^)]*)\)

# Hostd NFC transfer stats
[esxi_hostd_nfc_stats]
REGEX = \bNfcFileStats:\s+Path=(?<nfc_path>\S+)\s+Type=(?<nfc_type>\S+)\s+fileSessionDurationUS=(?<nfc_session_us>\d+)\s+timeToOpenFileUs=(?<nfc_open_us>\d+)\s+bytesTransferred=(?<nfc_bytes>\d+)\s+fileTransferDurationUS=(?<nfc_transfer_us>\d+)

# hostd-probe details
[esxi_hostd_probe_section]
REGEX = hostd-probe: .*?Section for VMware ESX,\s*pid=(?<probe_pid>\d+),\s*version=(?<probe_version>[0-9.]+),\s*build=(?<probe_build>\d+),\s*option=(?<probe_option>\S+)

[esxi_hostd_probe_hw]
REGEX = hostd-probe: .*?Successfully acquired hardware:\s+(?<probe_hardware>.+)$

[esxi_hostd_probe_cwd]
REGEX = hostd-probe: .*?Current working directory:\s+(?<probe_cwd>\S+)

# vSAN capacity via osfsd
[esxi_osfsd_vsan]
REGEX = (?i)osfsd.*?\[.*?\bsub=Vsan\b.*?\].*?vsan raw capacity:\s*avail\s*=\s*(?<vsan_avail>\d+),\s*used\s*=\s*(?<vsan_used>\d+),\s*dedup\s*=\s*(?<vsan_dedup>\d+)

# vmkernel/vmkwarning enrichments
[esxi_vmk_opid]
REGEX = vmkernel:.*?VC opID\s+(?<vc_opid>[A-Za-z0-9\-]+)\s+maps to vmkernel opID\s+(?<vmk_opid>[0-9a-f]+)

[esxi_vmk_nmp_device]
REGEX = vmkernel:.*?\bNMP:.*?\bdevice\s+(?<device>naa\.[A-Za-z0-9]+)

[esxi_vmk_sense]
REGEX = vmkernel:.*?\bSense data:\s*error code:\s*(?<sense_error_code>0x[0-9A-Fa-f]+),\s*key:\s*(?<sense_key>0x[0-9A-Fa-f]+).*?Cmd:\s*(?<scsi_cmd>0x[0-9A-Fa-f]+),\s*ASC:\s*(?<asc>0x[0-9A-Fa-f]+),\s*ASCQ:\s*(?<ascq>0x[0-9A-Fa-f]+)

[esxi_vmk_perf_degraded]
REGEX = vmkwarning: .*?Device\s+(?<device>naa\.[^"\s]+).*?latency increased from average value of\s+(?<lat_us_old>\d+)\s+microseconds to\s+(?<lat_us_new>\d+)\s+microseconds

[esxi_vmk_state_in_doubt]
REGEX = (?:vmkernel|vmkwarning): .*?NMP: .*?device\s+\"(?<device>naa\.[^\"]+)\".*?state in doubt

[esxi_vmk_scsidevio_fail]
REGEX = vmkernel: .*?ScsiDeviceIO: .*? to dev\s+\"(?<device>naa\.[^\"]+)\".*? failed\s+H:(?<H>0x[0-9A-Fa-f]+)\s+D:(?<D>0x[0-9A-Fa-f]+)\s+P:(?<P>0x[0-9A-Fa-f]+)

[esxi_vmk_linscsi_status]
REGEX = vmkernel: .*?LinScsi: .*?queuecommand failed with status =\s*(?<queue_status>0x[0-9A-Fa-f]+).*?\s(vmhba(?<hba>\d+):(?<chan>\d+):(?<target>\d+):(?<lun>\d+))

# Rhttpproxy context
[esxi_rhttp_context]
REGEX = Rhttpproxy: .*?\[context\](?<rhttp_context_b64>[^\[]+)\[/context\]

# Envoy access (proxy) parser
[esxi_envoy_access]
REGEX = (?i)envoy-access(?:\[[^\]]+\])?:\s+(?<method>GET|POST|PUT|DELETE|HEAD|OPTIONS|PATCH)\s+(?<uri>\S+)\s+(?<status>\d{3})\s+\S+(?:\s+\S+){0,8}\s+(?<src>\d{1,3}(?:\.\d{1,3}){3}):(?<src_port>\d+)\s+\S+\s+(?<tls>[-A-Za-z0-9\.]+)\s+(?<dest>\d{1,3}(?:\.\d{1,3}){3}):(?<dest_port>\d+)\s+(?<upstream>\d{1,3}(?:\.\d{1,3}){3}):(?<upstream_port>\d+)(?:.*?\"(?<user_agent>[^\"]+)\")?

[esxi_envoy_access_alt]
REGEX = (?i)envoy-access(?:\[[^\]]+\])?:\s+(?<method>GET|POST|PUT|DELETE|HEAD|OPTIONS|PATCH)\s+(?<uri>\S+)\s+(?<status>\d{3}).*?\s+(?<src>\d{1,3}(?:\.\d{1,3}){3}):(?<src_port>\d+).+?\s+(?<dest>\d{1,3}(?:\.\d{1,3}){3}):(?<dest_port>\d+)(?:.*?\"(?<user_agent1>[^\"]+)\"\s*\"(?<user_agent2>[^\"]+)\")?

# Bracket KV (Originator@…, and generic)
[esxi_bracket_kv_originator]
REGEX = \[Originator@\d+[^\]]*(?:\bsub=(?<sub>[^\s\]]+))?[^\]]*(?:\bopID=(?<opID>[^\s\]]+))?[^\]]*\]

[esxi_bracket_kv_generic]
REGEX = \[(?:[^\]]*?\bsub=(?<sub>[^\s\]]+))?(?:[^\]]*?\bopID=(?<opID>[^\s\]]+))?[^\]]*\]

# crond command
[esxi_crond_cmd]
REGEX = crond\[\d+\]:\s*crond:\s*USER\s+(?<cron_user>\S+)\s+pid\s+(?<cron_pid>\d+)\s+cmd\s+(?<cron_cmd>.+)$

# Backup/check and auto-backup parsers
[esxi_backup_check]
REGEX = (?i)backup-check(?:\[[^\]]+\])?:\s*(?:No\s+ConfigSchema:\s*)?xmlfile='(?<backup_xmlfile>[^']+)'(?:\s+schemaId='(?<backup_schemaId>[^']+)')?

[esxi_auto_backup]
REGEX = (?i)auto-backup\.sh(?:\[[^\]]+\])?:\s*(?<backup_message>.+)

# CRX CLI ESXi version/build parser
[esxi_crx_cli]
REGEX = (?i)crx-cli(?:\[[^\]]+\])?:\s*Log\s+for\s+VMware\s+ESXi\s+version=(?<esx_version>\S+)\s+build=(?<esx_build>\S+)\s+option=(?<esx_option>\S+)

[esx_hostd_fields_6x]
REGEX = ^(?:(?:\w{3}\s+\d+\s+[\d\:]{8})|(?:<(\d+)>)?(?:(?:(?:[\d\-]{10}T[\d\:]{8}(?:\.\d+)?(Z|[\+\-][\d\:]{3,5})?))|(?:NoneZ)?)|(?:\w{3}\s+\w{3}\s+\d+\s+[\d\:]{8}\s+\d{4}))\s[^ ]+\s+([^\[\:]+):\s(?:(?:[\d\-:TZ.]+)\s*)?(\w+)\s*(?:\S+\[\S+\])?\s*\[(?:[^\s\]]+)\s*(?:sub=([^\s\]]+))?\s*(?:opID=([^\s\]]+))?(?:[^]]+?)?\]\s*(.*)$
FORMAT = Pri::$1 Offset::$2 Application::$3 Level::$4 Object::$5 opID::$6 Message::$7

[esx_hostd_fields_5x]
REGEX = ^(?:(?:\w{3}\s+\d+\s+[\d\:]{8})|(?:<(\d+)>)?(?:(?:(?:[\d\-]{10}T[\d\:]{8}(?:\.\d+)?(Z|[\+\-][\d\:]{3,5})?))|(?:NoneZ)?)|(?:\w{3}\s+\w{3}\s+\d+\s+[\d\:]{8}\s+\d{4}))\s[^ ]+\s+([^\[\:]+): \[[^\s]+ (\w+) '([^']+)'(?: opID=([^\s\]]+))?(?:[^]]+?)?\]\s*(.*)$
FORMAT = Pri::$1 Offset::$2 Application::$3 Level::$4 Object::$5 opID::$6 Message::$7

[esx_hostd_fields_4x]
REGEX = ^\w+\s+\d+\s+[\d\:]{8}\s+[^ ]+\s+\w+\s+\d+\s+[\d\:]{8}\s+(?:[^\[\:]+)(?:\[\d+\])?:\s*(?:\[(?:'([^']+)'\s+)?(?:[-\d]{10}(?:\s+|T))?(?:[.:\dZ]+\s+)?(\w+)\s+(\w+)(?:\s+'([^']+)'(?:\s+opID=([^\s\x00-\x20]+))?)?\]\s+)?(?:\[([\:\w]+)\]\s+)?(.*)
FORMAT = Application::$1 Offset::$2 Level::$3 Object::$4 opID::$5 SubComp::$6 Message::$7

[esx_vmkernel_fields]
REGEX = ^(?:(?:\w{3}\s+\d+\s+[\d\:]{8})|(?:<(\d+)>)?(?:(?:(?:[\d\-]{10}T[\d\:]{8}(?:\.\d+)?(?:Z|[\+\-][\d\:]{3,5})?))|(?:NoneZ)?)|(?:\w{3}\s+\w{3}\s+\d+\s+[\d\:]{8}\s+\d{4}))\s[^ ]+\s+(vmkernel|vmkwarning):\s+(?:([\d\:\.]+)\s+)?(cpu\d+):(?:(\d+)\s*(?:[^\s]+)?\))?(?:\[([\:\w]+)\]\s+)?(.*)
FORMAT = Pri::$1 Type::$2 HostUpTime::$3 Cpu::$4 WorldId::$5 SubComp::$6 Message::$7

[esx_vmkernel_fields_4x]
REGEX = ^\w+\s+\d+\s+[\d\:]{8}\s+[^ ]+\s+\w+\s+\d+\s+[\d\:]{8}\s+(vmkernel|vmkwarning):\s+(?:([\d\:\.]+)\s+)?(cpu\d+):(?:(\d+)\))?(?:\[([\:\w]+)\]\s+)?(.*)
FORMAT = Type::$1 HostUpTime::$2 Cpu::$3 WorldId::$4 SubComp::$5 Message::$6

[esx_generic_fields]
REGEX = ^(?:(?:\w{3}\s+\d+\s+[\d\:]{8})|(?:<(\d+)>)?(?:(?:(?:[\d\-]{10}T[\d\:]{8}(?:\.\d+)?(?:Z|[\+\-][\d\:]{3,5})?))|(?:NoneZ)?)|(?:\w{3}\s+\w{3}\s+\d+\s+[\d\:]{8}\s+\d{4}))\s[^ ]+\s+([A-Za-z\-]+)(?:[^:]*):?(?:[^()]*\))?\s*(.*)$
FORMAT = Pri::$1 Application::$2 Message::$3

[esx_generic_fields_4x]
REGEX =  ^\w+\s+\d+\s+[\d\:]{8}\s+[^ ]+\s+\w+\s+\d+\s+[\d\:]{8}\s+(?:[^\[\:]+)(?:\[\d+\])?:\s*(.*)
FORMAT = Message::$1

[esx_hostd_fields_syslogserver]
REGEX = (?:^<(\d+)>)?^(?:\w{3}\s+\d+\s+[\d\:]{8}\s+(?:(?:Section for VMware ESX,)\s+)?[^ ]+\s+)?([A-Za-z\-]+)(?:[^:]*): \[(([^\s]+)) (\w+) '([^']+)'(?: opID=([^\]]+))?\] ?(.*)
FORMAT = Pri::$1 Application::$2 Offset::$3 Level::$4 Object::$5 opID::$6 Message::$7

[esx_vmkernel_fields_syslogserver]
REGEX = (?:^<(\d+)>)?^(?:\w{3}\s+\d+\s+[\d\:]{8}\s+(?:(?:Section for VMware ESX,)\s+)?[^ ]+\s+)?(vmkernel|vmkwarning):\s+(?:([\d\:\.]+)\s+)?(cpu\d+):(?:(\d+)\))?(?:\[([\:\w]+)\]\s+)?(.*)
FORMAT = Pri::$1 Type::$2 HostUpTime::$3 Cpu::$4 WorldId::$5 SubComp::$6 Message::$7

[esx_generic_fields_syslogserver]
REGEX = (?:^<(\d+)>)?^(?:\w{3}\s+\d+\s+[\d\:]{8}\s+(?:(?:Section for VMware ESX,)\s+)?[^ ]+\s+)?([A-Za-z\-]+)(?:[^:]*):?\s*(.*)$
FORMAT = Pri::$1 Application::$2 Message::$3
