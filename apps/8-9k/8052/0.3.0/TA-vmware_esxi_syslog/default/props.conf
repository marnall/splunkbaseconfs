[vmw-syslog]
SHOULD_LINEMERGE = false
TRUNCATE = 20000
KV_MODE = auto

# Program/PID extraction
REPORT-program = esxi_program_known
# Fallback generic program extractor to improve coverage
REPORT-program2 = esxi_program_any

# Authentication (hostd) and useful enrichments
REPORT-hostd_auth = esxi_hostd_login, esxi_hostd_logout
REPORT-hostd_nfc = esxi_hostd_nfc_stats
REPORT-hostd_probe = esxi_hostd_probe_section, esxi_hostd_probe_hw, esxi_hostd_probe_cwd

# vSAN telemetry (osfsd) and storage/device signals (vmkernel/vmkwarning)
REPORT-osfsd = esxi_osfsd_vsan
REPORT-vmk = esxi_vmk_opid, esxi_vmk_nmp_device, esxi_vmk_sense, esxi_vmk_perf_degraded, esxi_vmk_state_in_doubt, esxi_vmk_scsidevio_fail, esxi_vmk_linscsi_status

# Rhttpproxy context blobs
REPORT-rhttp = esxi_rhttp_context

# crond launching commands (hostd-probe)
REPORT-crond = esxi_crond_cmd

# Envoy access logs (proxy access)
REPORT-envoy_access = esxi_envoy_access, esxi_envoy_access_alt

# Backup/check and CRX CLI
REPORT-backup = esxi_backup_check, esxi_auto_backup
REPORT-crxcli = esxi_crx_cli

# Bracket KV (sub/opID/etc.)
REPORT-bracket_kv = esxi_bracket_kv_originator, esxi_bracket_kv_generic

# CIM-friendly aliases and fields
FIELDALIAS-dest = host AS dest
FIELDALIAS-dvc = host AS dvc
FIELDALIAS-src_ip = src AS src_ip
# Web CIM helpers for envoy access
FIELDALIAS-web_src_ip = src AS src_ip
FIELDALIAS-web_dest_ip = dest AS dest_ip
FIELDALIAS-web_url = uri AS url
EVAL-dest_ip = if(match(host,"^(?:\d{1,3}\.){3}\d{1,3}$"), host, null())

EVAL-vendor = "VMware"
EVAL-product = "ESXi"
# Prefer explicit program; fall back to generic Application
EVAL-app = lower(coalesce(mvindex(program,0), Application))

# Normalize agent for Web CIM from envoy variants
EVAL-user_agent = coalesce(user_agent, user_agent1, user_agent2)

# Map to Web CIM fields (best-effort)
FIELDALIAS-http_method = method AS http_method
FIELDALIAS-http_user_agent = user_agent AS http_user_agent

# Authentication mapping (CIM)
EVAL-authentication_event = case(match(_raw,"User\s+\S+@[0-9.]+\s+logged in"),"login", match(_raw,"User\s+\S+@[0-9.]+\s+logged out"),"logout")
EVAL-action = if(isnotnull(authentication_event),"success",null())
EVAL-signature = case(authentication_event="login","ESXi hostd login", authentication_event="logout","ESXi hostd logout")

# Base-style generic field extraction (from Splunk TA patterns)
REPORT-base_fields = esx_hostd_fields_5x, esx_hostd_fields_6x, esx_generic_fields, esx_hostd_fields_syslogserver, esx_generic_fields_syslogserver, esx_hostd_fields_4x, esx_generic_fields_4x
REPORT-base_vmk = esx_vmkernel_fields, esx_vmkernel_fields_syslogserver, esx_vmkernel_fields_4x

[source::vmware:esxlog:...]
REPORT-fields = esx_hostd_fields_5x,esx_hostd_fields_6x, esx_generic_fields,esx_hostd_fields_syslogserver,esx_generic_fields_syslogserver,esx_hostd_fields_4x,esx_generic_fields_4x

[vmware:esxlog:vmkernel]
REPORT-vmkernel = esx_vmkernel_fields,esx_vmkernel_fields_syslogserver,esx_vmkernel_fields_4x

[vmware:esxlog:vmkwarning]
REPORT-vmkwarning = esx_vmkernel_fields,esx_vmkernel_fields_syslogserver,esx_vmkernel_fields_4x
