[whiteboards]
external_type = kvstore
collection = whiteboards
fields_list = _key, name, tags, owner, visibility, updated_at, elements_json

[whiteboard_versions]
external_type = kvstore
collection = whiteboard_versions
fields_list = _key, board_id, label, snapshot_json, created_at

[whiteboard_revisions]
external_type = kvstore
collection = whiteboard_revisions
fields_list = _key, board_id, source, label, element_count, created_by, snapshot_json, created_at

[whiteboard_templates]
external_type = kvstore
collection = whiteboard_templates
fields_list = _key, name, description, elements_json, files_json, created_at, created_by, updated_at, updated_by

[whiteboard_template_revisions]
external_type = kvstore
collection = whiteboard_template_revisions
fields_list = _key, template_id, source, label, element_count, created_by, snapshot_json, created_at
