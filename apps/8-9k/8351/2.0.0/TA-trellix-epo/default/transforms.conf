# Trellix ePO CIM Normalization Transforms
# Maps ePO events to Common Information Model (CIM) fields

# Threat Events -> Intrusion_Detection
[trellix_epo_threat_to_ids]
REGEX = (?i)"threatType"\s*:\s*"([^"]+)"|"severity"\s*:\s*"([^"]+)"|"detectionId"\s*:\s*"?([^",}]+)
FORMAT = threat_type::$1 severity::$2 detection_id::$3
DEST_KEY = MetaData:CIM
WRITE_META = true
DEFAULT_VALUE = Intrusion_Detection

[trellix_epo_threat_cim_fields]
REGEX = 
FORMAT = 
DEST_KEY = MetaData:CIM
WRITE_META = true
DEFAULT_VALUE = Intrusion_Detection

# Malware Detections -> Malware
[trellix_epo_malware_to_malware]
REGEX = (?i)"malwareType"\s*:\s*"([^"]+)"|"fileHash"\s*:\s*"([^"]+)"|"filePath"\s*:\s*"([^"]+)
FORMAT = malware_type::$1 file_hash::$2 file_path::$3
DEST_KEY = MetaData:CIM
WRITE_META = true
DEFAULT_VALUE = Malware

[trellix_epo_malware_cim_fields]
REGEX = 
FORMAT = 
DEST_KEY = MetaData:CIM
WRITE_META = true
DEFAULT_VALUE = Malware

# Host Status -> Endpoint
[trellix_epo_host_to_endpoint]
REGEX = 
FORMAT = 
DEST_KEY = MetaData:CIM
WRITE_META = true
DEFAULT_VALUE = Endpoint

# Policy Compliance -> Change
[trellix_epo_policy_to_change]
REGEX = (?i)"policyName"\s*:\s*"([^"]+)"|"complianceStatus"\s*:\s*"([^"]+)"|"violationCount"\s*:\s*"?([^",}]+)
FORMAT = policy_name::$1 compliance_status::$2 violation_count::$3
DEST_KEY = MetaData:CIM
WRITE_META = true
DEFAULT_VALUE = Change

# User Actions -> Audit
[trellix_epo_user_to_audit]
REGEX = (?i)"action"\s*:\s*"([^"]+)"|"result"\s*:\s*"([^"]+)"|"userName"\s*:\s*"([^"]+)
FORMAT = action::$1 result::$2 user::$3
DEST_KEY = MetaData:CIM
WRITE_META = true
DEFAULT_VALUE = Audit

# Field Extractions - Note: JSON is extracted automatically via KV_MODE=json in props.conf
# These are fallback extractions for non-standard JSON formats

[threat_extractions]
# Combined extraction for threat events - extracts multiple fields
REGEX = "detectionId"\s*:\s*"?(?<detection_id>[^",}]+)"?.*?"threatName"\s*:\s*"(?<threat_name>[^"]+)".*?"severity"\s*:\s*"(?<severity>[^"]+)"
FORMAT = detection_id::$1 threat_name::$2 severity::$3

[threat_extractions_detection_id]
REGEX = "detectionId"\s*:\s*"?([^",}]+)"?
FORMAT = detection_id::$1

[threat_extractions_threat_name]
REGEX = "threatName"\s*:\s*"([^"]+)"
FORMAT = threat_name::$1

[threat_extractions_severity]
REGEX = "severity"\s*:\s*"([^"]+)"
FORMAT = severity::$1

[malware_extractions]
# Combined extraction for malware events - extracts multiple fields
REGEX = "malwareName"\s*:\s*"(?<malware_name>[^"]+)".*?"filePath"\s*:\s*"(?<file_path>[^"]+)".*?"fileHash"\s*:\s*"(?<file_hash>[^"]+)"
FORMAT = malware_name::$1 file_path::$2 file_hash::$3

[malware_extractions_malware_name]
REGEX = "malwareName"\s*:\s*"([^"]+)"
FORMAT = malware_name::$1

[malware_extractions_file_hash]
REGEX = "fileHash"\s*:\s*"([^"]+)"
FORMAT = file_hash::$1

[malware_extractions_file_path]
REGEX = "filePath"\s*:\s*"([^"]+)"
FORMAT = file_path::$1

# CIM Field Mappings
# Note: CIM fields are primarily mapped via FIELDALIAS in props.conf
# These transforms provide additional extraction capabilities

[cim_intrusion_detection]
# Extract severity for CIM Intrusion_Detection data model
REGEX = "severity"\s*:\s*"([^"]+)"
FORMAT = severity::$1

[cim_intrusion_detection_signature]
REGEX = "threatName"\s*:\s*"([^"]+)"
FORMAT = signature::$1

[cim_intrusion_detection_signature_id]
REGEX = "detectionId"\s*:\s*"?([^",}]+)"?
FORMAT = signature_id::$1

[cim_intrusion_detection_dest]
REGEX = "computerName"\s*:\s*"([^"]+)"
FORMAT = dest_host::$1

[cim_malware]
# Extract malware name for CIM Malware data model
REGEX = "malwareName"\s*:\s*"([^"]+)"
FORMAT = malware_name::$1

[cim_malware_hash]
REGEX = "fileHash"\s*:\s*"([^"]+)"
FORMAT = file_hash::$1

[cim_malware_path]
REGEX = "filePath"\s*:\s*"([^"]+)"
FORMAT = file_path::$1

[cim_endpoint]
# Extract host info for CIM Endpoint data model
REGEX = "computerName"\s*:\s*"([^"]+)"
FORMAT = dest_host::$1

[cim_endpoint_ip]
REGEX = "ipAddress"\s*:\s*"([^"]+)"
FORMAT = dest_ip::$1

[cim_endpoint_os]
REGEX = "operatingSystem"\s*:\s*"([^"]+)"
FORMAT = dest_os::$1

[cim_audit]
# Extract user for CIM Authentication/Audit data model
REGEX = "userName"\s*:\s*"([^"]+)"
FORMAT = user::$1

[cim_audit_action]
REGEX = "action"\s*:\s*"([^"]+)"
FORMAT = action::$1

[cim_audit_result]
REGEX = "result"\s*:\s*"([^"]+)"
FORMAT = result::$1

[cim_audit_src_ip]
REGEX = "sourceIP"\s*:\s*"([^"]+)"
FORMAT = src_ip::$1

# CIM Normalization for Syslog-based Threat Events
[cim_syslog_intrusion_detection]
REGEX = (?i)(?:threat[_\s]?name|malware)[:=]\s*["']?([^"',\n]+)["']?
FORMAT = signature::$1
DEST_KEY = MetaData:CIM
WRITE_META = true
DEFAULT_VALUE = Intrusion_Detection

[cim_syslog_malware]
REGEX = (?i)(?:threat[_\s]?name|malware)[:=]\s*["']?([^"',\n]+)["']?
FORMAT = malware_name::$1
DEST_KEY = MetaData:CIM
WRITE_META = true
DEFAULT_VALUE = Malware

[cim_syslog_malware_hash]
REGEX = (?i)(?:hash|md5|sha1|sha256)[:=]\s*([a-fA-F0-9]{32,64})
FORMAT = file_hash::$1

[cim_syslog_malware_path]
REGEX = (?i)(?:file|path|filepath)[:=]\s*["']?([^"',\n]+)["']?
FORMAT = file_path::$1

