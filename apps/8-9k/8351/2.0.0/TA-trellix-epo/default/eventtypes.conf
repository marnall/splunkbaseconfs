# Trellix ePO Event Types Configuration
# Maps sourcetypes to Splunk event types for CIM compliance

# ============================================
# Malware Data Model Events
# ============================================
[trellix_epo_malware]
search = sourcetype="trellix_epo:malware_detections"

[trellix_epo_malware_attack]
search = sourcetype="trellix_epo:malware_detections" action="detected" OR action="blocked" OR action="quarantined"

# ============================================
# Intrusion Detection Data Model Events
# ============================================
[trellix_epo_ids]
search = sourcetype="trellix_epo:threat_events"

[trellix_epo_ids_attack]
search = sourcetype="trellix_epo:threat_events" (severity="high" OR severity="critical" OR severity="High" OR severity="Critical")

# ============================================
# Endpoint Data Model Events
# ============================================
[trellix_epo_endpoint]
search = sourcetype="trellix_epo:host_status" OR sourcetype="trellix_epo:agent_status"

[trellix_epo_endpoint_services]
search = sourcetype="trellix_epo:agent_status"

[trellix_epo_endpoint_registry]
search = sourcetype="trellix_epo:host_status" registry_*=*

# ============================================
# Change Data Model Events
# ============================================
[trellix_epo_change]
search = sourcetype="trellix_epo:policy_compliance"

[trellix_epo_change_audit]
search = sourcetype="trellix_epo:policy_compliance" (compliance_status="Non-Compliant" OR compliance_status="Violation")

# ============================================
# Authentication Data Model Events
# ============================================
[trellix_epo_authentication]
search = sourcetype="trellix_epo:user_actions" (action="*login*" OR action="*logon*" OR action="*auth*")

[trellix_epo_authentication_failure]
search = sourcetype="trellix_epo:user_actions" (action="*login*" OR action="*logon*") (result="*fail*" OR result="*denied*" OR result="*error*")

# ============================================
# Update Data Model Events
# ============================================
[trellix_epo_update]
search = sourcetype="trellix_epo:updates"

[trellix_epo_update_status]
search = sourcetype="trellix_epo:updates" update_status=*

# ============================================
# Quarantine Events
# ============================================
[trellix_epo_quarantine]
search = sourcetype="trellix_epo:quarantine_events"

# ============================================
# User Activity/Audit Events
# ============================================
[trellix_epo_audit]
search = sourcetype="trellix_epo:user_actions"

[trellix_epo_audit_admin]
search = sourcetype="trellix_epo:user_actions" (action="*admin*" OR action="*delete*" OR action="*modify*" OR action="*create*" OR action="*policy*")

# ============================================
# NEW v2.0.0 EVENT TYPES
# ============================================

# Threat Summary Events
[trellix_epo_threat_summary]
search = sourcetype="trellix_epo:threat_summary"

[trellix_epo_threat_summary_escalated]
search = sourcetype="trellix_epo:threat_summary" (threat_status="Escalated" OR threatStatus="Escalated")

[trellix_epo_threat_summary_unresolved]
search = sourcetype="trellix_epo:threat_summary" (threat_status="Unresolved" OR threatStatus="Unresolved")

[trellix_epo_threat_summary_resolved]
search = sourcetype="trellix_epo:threat_summary" (threat_status="Resolved" OR threatStatus="Resolved")

# Software Status Events
[trellix_epo_software_status]
search = sourcetype="trellix_epo:software_status"

[trellix_epo_software_status_failed]
search = sourcetype="trellix_epo:software_status" (status="Failed" OR deploymentStatus="Failed")

# Compliance Overview Events
[trellix_epo_compliance_overview]
search = sourcetype="trellix_epo:compliance_overview"

[trellix_epo_compliance_non_compliant]
search = sourcetype="trellix_epo:compliance_overview" (compliance_status="Non-Compliant" OR complianceStatus="Non-Compliant")

# DLP Incidents Events
[trellix_epo_dlp_incidents]
search = sourcetype="trellix_epo:dlp_incidents"

[trellix_epo_dlp_incidents_high]
search = sourcetype="trellix_epo:dlp_incidents" (severity="High" OR severity="Critical" OR severity="high" OR severity="critical")

[trellix_epo_dlp_incidents_blocked]
search = sourcetype="trellix_epo:dlp_incidents" (action_taken="Block*" OR actionTaken="Block*")

# Device Management Events
[trellix_epo_device_management]
search = sourcetype="trellix_epo:device_management"

[trellix_epo_device_unprotected]
search = sourcetype="trellix_epo:device_management" (protection_status="Unprotected" OR protectionStatus="Unprotected")

[trellix_epo_device_checkin_failed]
search = sourcetype="trellix_epo:device_management" days_since_checkin>7

[trellix_epo_device_reboot_pending]
search = sourcetype="trellix_epo:device_management" (reboot_pending="true" OR rebootPending="true" OR reboot_pending=1)

# EDR Events
[trellix_epo_edr_events]
search = sourcetype="trellix_epo:edr_events"

[trellix_epo_edr_detection]
search = sourcetype="trellix_epo:edr_events" (event_type="*detect*" OR eventType="*detect*" OR action="detected" OR action="blocked")

[trellix_epo_edr_malicious]
search = sourcetype="trellix_epo:edr_events" (reputation="Malicious" OR reputation="Known Bad" OR reputation="malicious")

# Web Control Events
[trellix_epo_web_control]
search = sourcetype="trellix_epo:web_control_events"

[trellix_epo_web_blocked]
search = sourcetype="trellix_epo:web_control_events" (action="Block*" OR action="block*" OR action="Blocked")

[trellix_epo_web_allowed]
search = sourcetype="trellix_epo:web_control_events" (action="Allow*" OR action="allow*" OR action="Allowed")

# Firewall Events
[trellix_epo_firewall]
search = sourcetype="trellix_epo:firewall_events"

[trellix_epo_firewall_blocked]
search = sourcetype="trellix_epo:firewall_events" (action="Block*" OR action="block*" OR action="Deny*")

[trellix_epo_firewall_allowed]
search = sourcetype="trellix_epo:firewall_events" (action="Allow*" OR action="allow*" OR action="Permit*")

# Application Control Events
[trellix_epo_app_control]
search = sourcetype="trellix_epo:app_control_events"

[trellix_epo_app_control_blocked]
search = sourcetype="trellix_epo:app_control_events" (action="Block*" OR action="Denied" OR action="denied")

[trellix_epo_app_control_allowed]
search = sourcetype="trellix_epo:app_control_events" (action="Allow*" OR action="Allowed" OR action="allowed")

# ============================================
# END OF NEW v2.0.0 EVENT TYPES
# ============================================

# ============================================
# Syslog-based Events
# ============================================
[trellix_epo_syslog_threat]
search = sourcetype="trellix_epo_syslog:threat_events" OR (sourcetype="syslog" (epo OR trellix OR mcafee) threat)
