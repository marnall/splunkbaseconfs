# Trellix ePO Modular Input Configuration
# Configure your ePO server settings first via the Setup UI or in ta_trellix_epo_settings.conf
# Then enable the inputs you need by setting disabled = 0
#
# To enable an input:
#   1. Copy the desired stanza(s) to local/inputs.conf
#   2. Set disabled = 0
#   3. Adjust interval and index as needed

# ============================================
# Modular Input Type Definition
# Required for Splunk Cloud compatibility
# ============================================
[trellix_epo]
python.version = python3

# ============================================
# Threat Events - Real-time threat detection
# Recommended interval: 300 seconds (5 minutes)
# Priority: HIGH - Enable first for security monitoring
# ============================================
[trellix_epo://threat_events]
python.version = python3
disabled = 1
interval = 300
index = main
sourcetype = trellix_epo:threat_events
input_type = threat_events

# ============================================
# Malware Detections - Malware identification
