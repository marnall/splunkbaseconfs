# Trellix ePO Add-on Settings
# Configure your ePO server connection here
#
# IMPORTANT: After editing, store your password securely by running:
#   $SPLUNK_HOME/bin/splunk cmd python $SPLUNK_HOME/etc/apps/TA-trellix-epo/bin/configure_credentials.py
#
# For custom settings, copy this file to local/ta_trellix_epo_settings.conf

[general]
# ePO Server URL (hostname or IP address, no protocol prefix)
# Example: epo.example.com or 192.168.1.100
epo_server = 

# ePO Server Port (default: 8443 for HTTPS)
epo_port = 8443

# SSL/TLS Settings
use_ssl = true
verify_ssl = true

# Authentication
# Username for ePO authentication
# Password should be stored using configure_credentials.py script
username = 

# Request Settings
timeout = 60
retry_attempts = 3

# Collection Settings
batch_size = 1000
polling_interval = 300
incremental_collection = true

# Logging (DEBUG, INFO, WARNING, ERROR)
log_level = INFO

[proxy]
# Proxy settings (optional)
# Enable if ePO server requires proxy access
use_proxy = false
proxy_server = 
proxy_port = 
proxy_username = 
proxy_password = 
