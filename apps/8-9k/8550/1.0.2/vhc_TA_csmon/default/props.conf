[csmon:hostperf]
category = Structured
description = CSmon Host Performance Data (JSON)
pulldown_type = 1
# for UF
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)

# for SH|HF|IDX
LINE_BREAKER = ([\r\n]+)
KV_MODE = json
TIME_PREFIX = \"TIME\"\s*:\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
SHOULD_LINEMERGE = false
TRUNCATE = 0

