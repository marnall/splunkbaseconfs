[graph]
# Required. The setup page writes these values to local/entra_id_lookup.conf.
tenant_id =
client_id =

# Required secret reference. The setup page stores the secret value in storage/passwords.
secret_realm = TA-entra-id-group-lookup
secret_name = client_secret

# Optional. Use "transitive" to include nested group membership, or "direct" for only direct groups.
membership_type = transitive

# Optional for sovereign clouds.
authority_host = https://login.microsoftonline.com
graph_host = https://graph.microsoft.com

# Optional HTTP settings.
timeout = 30
max_retries = 3
