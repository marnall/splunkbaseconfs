[mac_authentication_success]
search = sourcetype=mac:syslog (("LOGIN" AND "SUCCEEDED") OR "session opened for user")
priority = 5
disabled = 0

[mac_authentication_failure]
search = sourcetype=mac:syslog (("FAILED LOGIN") OR "authentication failed" OR "FAILED TO AUTHENTICATE")
priority = 5
disabled = 0

[mac_software_install]
search = sourcetype=mac:install
priority = 6
disabled = 0

[mac_endpoint]
search = sourcetype=mac:*
priority = 10
disabled = 0
