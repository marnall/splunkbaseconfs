[mac:syslog]
SHOULD_LINEMERGE = true
BREAK_ONLY_BEFORE_DATE = true
TRUNCATE = 10000
TIME_PREFIX = ^
TIME_FORMAT = %b %e %T
MAX_TIMESTAMP_LOOKAHEAD = 32
REPORT-mac-syslog-fields = mac_syslog_fields
FIELDALIAS-mac-syslog-dest = host AS dest
FIELDALIAS-mac-syslog-process = process AS process_name

[mac:install]
SHOULD_LINEMERGE = true
BREAK_ONLY_BEFORE = ^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}
TRUNCATE = 10000
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 40
REPORT-mac-install-fields = mac_install_fields
FIELDALIAS-mac-install-dest = host AS dest
FIELDALIAS-mac-install-process = process AS process_name
