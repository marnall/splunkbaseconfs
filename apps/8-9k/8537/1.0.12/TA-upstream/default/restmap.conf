
[admin:TA_upstream]
match = /
members = TA_upstream_settings, TA_upstream_upstreamdata

[admin_external:TA_upstream_settings]
handlertype = python
python.version = python3
handlerfile = TA_upstream_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_upstream_upstreamdata]
handlertype = python
python.version = python3
handlerfile = TA_upstream_rh_upstreamdata.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
