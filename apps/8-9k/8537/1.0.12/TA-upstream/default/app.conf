# this add-on is powered by splunk Add-on builder
[install]
state = enabled
state_change_requires_restart = false
is_configured = 0
build = 5

[launcher]
author = Upstream Security
version = 1.0.12
description = Ingest vehicle cybersecurity alerts from the Upstream Security platform into Splunk via REST API polling with marker-based checkpointing.

[ui]
is_visible = 1
label = Upstream Security Add-on for Cybersecurity Alerts

[package]
id = TA-upstream

[triggers]
reload.addon_builder = simple
reload.ta_upstream_account = simple
reload.ta_upstream_settings = simple
reload.passwords = simple

