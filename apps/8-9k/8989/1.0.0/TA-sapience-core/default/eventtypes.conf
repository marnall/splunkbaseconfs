# TA-sapience-core/default/eventtypes.conf
#
# Named event types for Sapience Core detections.
# Analysts can search: eventtype=sapience_credential_dump
# Enterprise Security correlation searches use these event types.

[sapience_event]
search = sourcetype="sapience:core"

[sapience_detection]
search = sourcetype="sapience:core" outcome="detected"

[sapience_remediation]
search = sourcetype="sapience:core" outcome="success" OR outcome="failure"

[sapience_credential_dump]
search = sourcetype="sapience:core" signature_id="TR-008"

[sapience_lateral_movement]
search = sourcetype="sapience:core" (signature_id="TR-009" OR signature_id="TR-010" OR signature_id="TR-011")

[sapience_remote_service]
search = sourcetype="sapience:core" signature_id="TR-009"

[sapience_remote_task]
search = sourcetype="sapience:core" signature_id="TR-010"

[sapience_pass_the_hash]
search = sourcetype="sapience:core" signature_id="TR-011"

[sapience_firewall_tamper]
search = sourcetype="sapience:core" signature_id="TR-003"

[sapience_admin_account]
search = sourcetype="sapience:core" signature_id="TR-002"

[sapience_security_service_disabled]
search = sourcetype="sapience:core" signature_id="TR-001"

[sapience_lsa_tamper]
search = sourcetype="sapience:core" signature_id="TR-004"

[sapience_autorun]
search = sourcetype="sapience:core" signature_id="TR-005"

[sapience_critical]
search = sourcetype="sapience:core" severity="critical"

[sapience_high]
search = sourcetype="sapience:core" severity="high"

[sapience_blocked]
search = sourcetype="sapience:core" (signature_id=REMEDIATION*) outcome="success"
