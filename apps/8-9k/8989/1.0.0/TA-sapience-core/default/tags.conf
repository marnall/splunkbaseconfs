# TA-sapience-core/default/tags.conf
#
# Maps Sapience Core event types to Splunk CIM data model tags.
# Required for Enterprise Security (ES) correlation searches to fire
# on Sapience Core events.
#
# Data models covered:
#   Endpoint         — process, service, filesystem events
#   Malware          — credential dump detection (TR-008)
#   Authentication   — pass-the-hash / NTLM logon (TR-011)
#   Network Sessions — lateral movement network events
#   Intrusion Detection — all tamper/drift events

# All Sapience events → Intrusion Detection data model
[eventtype=sapience_event]
ids = enabled
attack = enabled

# Credential dump (TR-008) → Malware + Endpoint data models
[eventtype=sapience_credential_dump]
malware = enabled
attack = enabled
endpoint = enabled

# Lateral movement → Network Sessions + Authentication
[eventtype=sapience_lateral_movement]
network = enabled
session = enabled

# Pass-the-Hash (TR-011) → Authentication data model
[eventtype=sapience_pass_the_hash]
authentication = enabled
default = enabled

# Remote service/task → Endpoint data model
[eventtype=sapience_remote_service]
endpoint = enabled
service = enabled

[eventtype=sapience_remote_task]
endpoint = enabled
service = enabled

# Admin account creation (TR-002) → Authentication + Change data models
[eventtype=sapience_admin_account]
authentication = enabled
privileged = enabled
change = enabled

# Firewall tamper (TR-003) → Network data model
[eventtype=sapience_firewall_tamper]
network = enabled
communicate = enabled

# All remediations → Change data model
[eventtype=sapience_remediation]
change = enabled
endpoint = enabled
