# TA-sapience-core/default/props.conf
#
# Parses Sapience Core RFC-5424/CEF syslog events.
#
# Message format:
#   <PRI>1 TIMESTAMP HOSTNAME SapienceCore - - - CEF:0|Sapience Technologies|Sapience Core|1.0|SIGID|NAME|SEV|extensions
#
# CEF extensions emitted by Sapience Core:
#   agentId        Unique agent UUID (persists across reinstalls)
#   hostname       Machine hostname
#   clientTag      MSP-supplied client label (/TAG= at install time)
#   cat            Event category (Process, Service, Task, LateralMovement, ...)
#   spt            Affected item key (e.g. mimikatz.exe:4660, svc:EvilSvc)
#   src            Source IP address (TR-011 pass-the-hash only)
#   duser          Target user (TR-011 pass-the-hash only)
#   act            Remediation action ID (REM-001 through REM-013)
#   outcome        detected | success | failure
#   msg            Human-readable description of the event
#   cs1/cs1Label   Classification or ActionId
#   cs2/cs2Label   Confidence score, ServiceName, or Classification
#   cs3/cs3Label   Status, RemediationResult, or SubjectUser
#   cs4/cs4Label   ProcessName, ServiceName, TaskName, or AuthPackage
#   cs5/cs5Label   SubjectUser or ImageHash
#   cn1/cn1Label   Severity score (3=Low, 5=Medium, 8=High, 10=Critical)
#   flexString1    Remediation action ID (REM-001 through REM-013)

[sapience:core]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
CHARSET = UTF-8
MAX_TIMESTAMP_LOOKAHEAD = 40
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TIME_PREFIX = >\d+\>\d+\s

# -- RFC-5424 header extraction -----------------------------------------------
EXTRACT-syslog_header = ^<(?P<syslog_pri>\d+)>(?P<syslog_version>\d+)\s+(?P<syslog_timestamp>[^\s]+)\s+(?P<syslog_hostname>[^\s]+)\s+(?P<syslog_appname>[^\s]+)

# -- CEF header fields --------------------------------------------------------
EXTRACT-cef_header = CEF:\d+\|[^|]+\|[^|]+\|[^|]+\|(?P<signature_id>[^|]+)\|(?P<signature>[^|]+)\|(?P<cef_severity>\d+)\|

# -- CEF extension fields - Sapience Core specific ----------------------------
EXTRACT-cef_agentId        = agentId=(?P<agentId>[^\s]+)
EXTRACT-cef_hostname       = hostname=(?P<dest_host>[^\s]+)
EXTRACT-cef_clientTag      = clientTag=(?P<clientTag>[^\s]+)
EXTRACT-cef_cat            = cat=(?P<category>[^\s]+)
EXTRACT-cef_spt            = spt=(?P<affected_item>[^\s]+)
EXTRACT-cef_src            = \bsrc=(?P<src>[^\s]+)
EXTRACT-cef_duser          = duser=(?P<duser>[^\s]+)
EXTRACT-cef_act            = \bact=(?P<act>[^\s]+)
EXTRACT-cef_outcome        = outcome=(?P<outcome>[^\s]+)
EXTRACT-cef_msg            = msg=(?P<msg>.+?)(?=\s+\w+Label=|\s+\w+=|$)

# -- CEF custom string fields -------------------------------------------------
EXTRACT-cef_cs1            = cs1=(?P<cs1>[^\s]+)
EXTRACT-cef_cs1Label       = cs1Label=(?P<cs1Label>[^\s]+)
EXTRACT-cef_cs2            = \bcs2=(?P<cs2>[^\s]+)
EXTRACT-cef_cs2Label       = cs2Label=(?P<cs2Label>[^\s]+)
EXTRACT-cef_cs3            = \bcs3=(?P<cs3>[^\s]+)
EXTRACT-cef_cs3Label       = cs3Label=(?P<cs3Label>[^\s]+)
EXTRACT-cef_cs4            = \bcs4=(?P<cs4>[^\s]+)
EXTRACT-cef_cs4Label       = cs4Label=(?P<cs4Label>[^\s]+)
EXTRACT-cef_cs5            = \bcs5=(?P<cs5>[^\s]+)
EXTRACT-cef_cs5Label       = cs5Label=(?P<cs5Label>[^\s]+)
EXTRACT-cef_cn1            = \bcn1=(?P<cn1>\d+)
EXTRACT-cef_flexString1    = flexString1=(?P<remediation_action>[^\s]+)

# -- CIM field aliases --------------------------------------------------------
FIELDALIAS-dest            = dest_host AS dest
FIELDALIAS-src_ip          = src AS src_ip
FIELDALIAS-user            = duser AS user
FIELDALIAS-action          = outcome AS action
FIELDALIAS-vendor_action   = act AS vendor_action

# -- Calculated fields --------------------------------------------------------
EVAL-severity              = case(cn1>=10,"critical",cn1>=8,"high",cn1>=5,"medium",cn1>=3,"low",true(),"unknown")
EVAL-sapience_classification = if(cs1Label="Classification",cs1,if(cs2Label="Classification",cs2,null()))
EVAL-sapience_confidence   = if(cs2Label="Confidence",cs2,null())
EVAL-sapience_status       = if(cs3Label="Status",cs3,null())
EVAL-sapience_subject_user = if(cs3Label="SubjectUser",cs3,if(cs5Label="SubjectUser",cs5,null()))
EVAL-sapience_process_name = if(cs4Label="ProcessName",cs4,null())
EVAL-sapience_service_name = if(cs2Label="ServiceName",cs2,if(cs4Label="ServiceName",cs4,null()))
EVAL-sapience_task_name    = if(cs2Label="TaskName",cs2,if(cs4Label="TaskName",cs4,null()))
EVAL-sapience_auth_package = if(cs4Label="AuthPackage",cs4,null())
EVAL-sapience_image_hash   = if(cs5Label="ImageHash",cs5,null())
EVAL-sapience_action_id    = if(cs1Label="ActionId",cs1,if(isnotnull(remediation_action),remediation_action,null()))
EVAL-vendor_product        = "Sapience Core"
