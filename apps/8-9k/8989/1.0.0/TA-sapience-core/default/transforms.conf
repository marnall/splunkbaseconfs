# TA-sapience-core/default/transforms.conf

# ── Remediation action lookup ──────────────────────────────────────────────────
# Maps REM-001 through REM-013 action IDs to human-readable descriptions.
# Used in dashboards and notable event displays.
[sapience_remediation_actions]
filename = sapience_actions.csv
default_match = Unknown remediation action

# ── Severity normalisation ─────────────────────────────────────────────────────
# Maps Sapience CEF severity integers to Splunk ES severity strings.
[sapience_severity_lookup]
filename = sapience_severity.csv
