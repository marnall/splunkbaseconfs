# TA-sapience-core/default/inputs.conf
#
# Sapience Core sends RFC-5424 syslog with CEF payload.
#
# NOTE: UDP and TCP syslog inputs are not supported in Splunk Cloud.
# For Splunk Cloud deployments, use the HTTP Event Collector (HEC):
#   1. Create a HEC token in Splunk Cloud Settings > Data Inputs > HTTP Event Collector
#   2. Configure each Sapience Core agent to send to HEC:
#      PUT http://<endpoint>:5001/api/v1/syslog
#      Body: {"host":"<splunk-cloud-hec-url>","port":443,"protocol":"hec","token":"<hec-token>"}
#
# For on-premises Splunk Enterprise deployments, add the following
# inputs locally (do not submit these in the TA package):
#
#   [udp://514]
#   connection_host = ip
#   sourcetype = sapience:core
#   index = main
#   no_appending_timestamp = true
#
#   [tcp://1514]
#   connection_host = ip
#   sourcetype = sapience:core
#   index = main
