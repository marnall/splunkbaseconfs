# Ponypoll — search-time field extraction for all ponypoll sourcetypes
# Events are POSTed as JSON via receivers/simple; KV_MODE=json extracts
# all top-level keys as Splunk fields at search time.

[ponypoll_answer]
KV_MODE = json
TIME_PREFIX = \"_time\":\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S

[ponypoll_attempt]
KV_MODE = json
TIME_PREFIX = \"_time\":\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S

[ponypoll_presence]
KV_MODE = json
TIME_PREFIX = \"_time\":\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
