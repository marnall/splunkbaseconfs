# Pony Poll — custom Splunk roles
#
# ponypoll_admin : full quiz management (edit questions, quizzes, config)
#                  additive role — users keep their existing Splunk base role
# ponypoll_user  : quiz participation only (read questions, submit answers)
#                  inherits user role for basic Splunk access
#
# Assignment:
#   All Splunk admins already satisfy ponypoll_admin via metadata (admin/sc_admin).
#   Assign ponypoll_admin explicitly to give non-admin power users quiz admin rights.
#   Assign ponypoll_user to grant quiz access without any other Splunk permissions.

[role_ponypoll_admin]
srchIndexesAllowed = ponypoll;*
srchIndexesDefault = ponypoll

[role_ponypoll_user]
importRoles = user
srchIndexesAllowed = ponypoll
srchIndexesDefault = ponypoll
edit_kvstore = enabled
edit_tcp = enabled
# Default `user` role allows only 3 concurrent historical searches, which is
# below what the Analytics page (and Splunk dashboards in this app) need
# during normal interactive use. Bumped to 6 so a participant role can open
# Analytics without hitting `role-based concurrency limit` 503s. Still well
# under admin defaults — no risk of runaway search load.
srchJobsQuota = 6
