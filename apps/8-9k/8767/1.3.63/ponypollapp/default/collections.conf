# Questions — one row per question, tagged with quiz_id
[ponypoll_questions]
field.quiz_id      = string
field.sort_order   = number
field.text         = string
field.type         = string
field.timeLimit    = number
field.options_json = string
field.explanation  = string
field.image        = string
accelerated_fields.by_quiz_order = quiz_id,sort_order

# Named quizzes catalogue
[ponypoll_quizzes]
field.name       = string
field.created_at = string

# App config (active quiz, poll title, answer index)
[ponypoll_config]
field.poll_index    = string
field.poll_subject  = string
field.active_quiz_id = string

# Synchronized session state — single "active" document, written by host, read by participants
[ponypoll_session]
field.phase               = string
field.session_id          = string
field.session_name        = string
field.quiz_id             = string
field.quiz_name           = string
field.question_index      = number
field.question_keys       = string
field.time_limit          = number
field.question_started_at = string

# Participant presence — one doc per participant per session (join lobby)
[ponypoll_presence]
field.session_id = string
field.nickname   = string
field.joined_at  = string
field.last_seen  = string
accelerated_fields.by_session = session_id
