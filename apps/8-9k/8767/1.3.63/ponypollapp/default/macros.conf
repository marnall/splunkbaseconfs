# Search-time macro used by every Pony Poll SPL query (Admin, Analytics,
# SystemCheck, the analytics dashboard XML) instead of a hardcoded index name.
#
# Default expands to `index=ponypoll`. To redirect Pony Poll to a different
# index in production, do NOT edit this file (it lives in default/ and will be
# overwritten by upgrades). Instead, change the value via:
#
#   Pony Poll  → Settings → "Splunk index for poll answers"   (recommended)
#   Splunk     → Settings → Advanced Search → Search Macros → ponypoll_index
#
# The UI writes the override to local/macros.conf so it survives upgrades.
#
# Note: changing the index does NOT auto-create it or auto-grant access. You
# may need to:
#   1. Create the destination index (Settings → Data → Indexes).
#   2. Update authorize.conf (srchIndexesAllowed for ponypoll_user /
#      ponypoll_admin) so quiz participants can read events from the new index.
#   3. Update [indexes/...] in default.meta so non-admins can write to it.
#
# The Settings → System Check section verifies all of the above after a change.

[ponypoll_index]
definition = index=ponypoll
iseval = 0
