[Create Device Details Lookup]
run_on_startup=true
action.lookup = 1
action.lookup.filename = cisco_lcs_device_details.csv
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 0 1 * * *
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = lcs_insights
request.ui_dispatch_view = search
search = `cisco_oi_index(0)` sourcetype::cisco:bcs:device\
| dedup deviceId\
| table collectorName, configRegister, configStatus, configTimestamp, cpyKey, createdTimestamp, deviceId, deviceIp, deviceName, deviceStatus, deviceType, extracted_host, featureSetDescription, imageName, inventoryStatus, inventoryTimestamp, ipAddress, isInSeedFile, lastResetTimestamp, productFamily, productId, productType, resetReason, snmpSysContact, snmpSysDescription, snmpSysLocation, snmpSysName, snmpSysObjectId, softwareType, softwareVersion, timestamp, userField1, userField2, userField3, userField4

