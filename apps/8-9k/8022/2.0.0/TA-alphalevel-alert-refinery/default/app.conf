build = 222

[launcher]
author = Alpha Level
version = 2.0.0
description = Customer-side add-on for Alpha Level managed alert scoring. Prepares the Splunk Cloud environment (KV stores, transforms, macros, auto-lookups) and ships a readiness dashboard. Alpha Level pulls notable events over the management port, scores them server-side, and pushes results back via HEC. A scheduled saved search upserts scores into a KV store so the auto-lookup enriches notables in Splunk ES Incident Review. No algorithms run inside Splunk. Major upgrade from v1.0.0: replaces S3-based transport with managed pull over MGMT/HEC.

