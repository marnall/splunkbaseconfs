# Minimal role for the Alpha Level server-side puller.
# Customers grant this role to a dedicated svc account used only for Alpha Level.
# Capabilities are intentionally narrow: read indexed events via search, read
# configuration needed to validate the environment, and write nothing.

[role_alphalevel_svc]
# Search capabilities
rtsearch = disabled
schedule_search = disabled
search = enabled

# REST read-only introspection - required for readiness checks run from our side
rest_properties_get = enabled
list_storage_passwords = disabled
list_inputs = enabled

# No admin, no editing
admin_all_objects = disabled
edit_tcp = disabled
edit_udp = disabled
edit_modinput = disabled
edit_roles = disabled
edit_user = disabled

# Default app context
srchJobsQuota = 10
cumulativeSrchJobsQuota = 100

# Indexes this role can search. The puller only reads from the source indexes
# - it writes to alphalevel_results and alphalevel_internal via HEC, which
# does not require search perms on those indexes.
# Customers should extend this list in local/authorize.conf with any custom
# alert indexes they've added to alphalevel_custom_sources.
srchIndexesAllowed = notable
srchIndexesDefault = notable
