# ============================================================================
# Alpha Level - customer-side saved searches.
#
# This version of the TA runs NO algorithms inside Splunk. Saved searches here
# do two things only:
#   1. Build the alphalevel_scores KV store from HEC-indexed result events, so
#      auto-lookups on notable events are fast (the "transport -> lookup"
#      pattern, which also gives us natural back-pressure: if HEC is down we
#      queue on our side, and the lookup simply doesn't advance until events
#      flow again).
#   2. Run environment readiness checks and publish their state to the
#      alphalevel_readiness KV store, which the Readiness dashboard reads.
# ============================================================================


# ---------------------------------------------------------------------------
# 1. Lookup builder - turn HEC-indexed results into KV store rows.
# ---------------------------------------------------------------------------

[Alpha Level - Lookup Builder]
description = Reads Alpha Level scored events delivered via HEC and upserts them into the alphalevel_scores KV store. The auto-lookup on notables reads this KV store.
search = index=`alphalevel_results_index` sourcetype=alphalevel:result earliest=-15m \
| spath \
| eval al_key = mvindex(al_key, 0) \
| eval _updated = now(), _key = al_key \
| fields _key, al_key, alpha_score, al_determination, is_duplicate, duplicate_of, top_factors, al_scored_at, al_version, al_source_index, al_detector_name, _updated \
| dedup al_key sortby -al_scored_at \
| outputlookup append=true alphalevel_scores
cron_schedule = */5 * * * *
enableSched = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
is_visible = 1
realtime_schedule = 0
max_concurrent = 1
schedule_window = auto


[Alpha Level - Score Store Maintenance]
description = Prunes Alpha Level scores older than 30 days from the KV store to keep lookups fast.
search = | inputlookup alphalevel_scores \
| where _updated > relative_time(now(), "-30d") \
| outputlookup alphalevel_scores
cron_schedule = 0 3 * * *
enableSched = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_visible = 1


# ---------------------------------------------------------------------------
# 2. Readiness checks - each one produces a single row in alphalevel_readiness.
#    Every check writes the same schema:
#      _key (stable), check_name, status (ok|warn|fail|unknown), severity,
#      last_run, last_ok, detail, remediation
#    So the dashboard can just `| inputlookup alphalevel_readiness`.
# ---------------------------------------------------------------------------

[Alpha Level - Readiness - Source Indexes Populated]
description = Checks that the configured alphalevel_sources have events in the last 24 hours.
search = `alphalevel_sources` earliest=-24h latest=now \
| stats count as events_seen \
| eval check_name = "source_indexes_populated" \
| eval _key = check_name \
| eval status = case(events_seen > 0, "ok", events_seen == 0, "fail") \
| eval severity = "high" \
| eval last_run = now() \
| eval last_ok = if(status="ok", now(), null()) \
| eval detail = "events_seen=" . events_seen . " in last 24h" \
| eval remediation = "Update the alphalevel_sources macro (or alphalevel_custom_sources) to point at indexes that contain your alerts." \
| fields _key, check_name, status, severity, last_run, last_ok, detail, remediation \
| outputlookup append=true alphalevel_readiness
cron_schedule = */5 * * * *
enableSched = 1
dispatch.earliest_time = -24h
dispatch.latest_time = now
is_visible = 0
max_concurrent = 1


[Alpha Level - Readiness - Sourcetype Coverage]
description = Summarises which sourcetypes appear in the configured sources (for diagnostic detail on the readiness dashboard).
search = `alphalevel_sources` earliest=-24h latest=now \
| stats count by index, sourcetype \
| stats values(sourcetype) as sourcetypes, sum(count) as total_events \
| eval check_name = "sourcetype_coverage" \
| eval _key = check_name \
| eval status = if(total_events > 0, "ok", "warn") \
| eval severity = "medium" \
| eval last_run = now() \
| eval last_ok = if(status="ok", now(), null()) \
| eval detail = "sourcetypes=" . mvjoin(sourcetypes, ",") \
| eval remediation = "Confirm the listed sourcetypes are the ones Alpha Level should score. Narrow alphalevel_custom_sources if unexpected sourcetypes appear." \
| fields _key, check_name, status, severity, last_run, last_ok, detail, remediation \
| outputlookup append=true alphalevel_readiness
cron_schedule = */5 * * * *
enableSched = 1
dispatch.earliest_time = -24h
dispatch.latest_time = now
is_visible = 0


[Alpha Level - Readiness - Schema Conformance]
description = Runs the alphalevel_normalise macro against recent events and verifies required fields meet minimum non-null thresholds.
search = `alphalevel_sources` earliest=-24h latest=now \
| head 5000 \
| `alphalevel_normalise` \
| fieldsummary maxvals=0 \
| eventstats max(count) as total_events \
| rename field as field_name \
| lookup alphalevel_required_fields field as field_name OUTPUT required, min_non_null_pct \
| where required="true" \
| eval non_null_pct = round(100 * count / total_events, 1) \
| eval field_ok = if(non_null_pct >= tonumber(min_non_null_pct), 1, 0) \
| stats sum(field_ok) as ok_fields, count as total_fields, \
        values(eval(if(field_ok=0, field_name . "(" . tostring(non_null_pct) . "%)", null()))) as failing \
| eval check_name = "schema_conformance" \
| eval _key = check_name \
| eval status = case(ok_fields = total_fields, "ok", ok_fields >= total_fields - 1, "warn", 1=1, "fail") \
| eval severity = "high" \
| eval last_run = now() \
| eval last_ok = if(status="ok", now(), null()) \
| eval detail = "required_fields_passing=" . ok_fields . "/" . total_fields . if(isnotnull(failing), " failing=" . mvjoin(failing, ","), "") \
| eval remediation = "Update alphalevel_normalise in local/macros.conf to map your SIEM fields to the required schema. See lookups/alphalevel_required_fields.csv for the full list." \
| fields _key, check_name, status, severity, last_run, last_ok, detail, remediation \
| outputlookup append=true alphalevel_readiness
cron_schedule = */15 * * * *
enableSched = 1
dispatch.earliest_time = -24h
dispatch.latest_time = now
is_visible = 0


[Alpha Level - Readiness - KV Stores Present]
description = Confirms the Alpha Level KV store collections exist.
search = | rest /servicesNS/-/TA-alphalevel-alert-refinery/storage/collections/config \
| search title IN ("alphalevel_scores", "alphalevel_readiness") \
| stats count as present \
| eval check_name = "kvstores_present" \
| eval _key = check_name \
| eval status = if(present >= 2, "ok", "fail") \
| eval severity = "high" \
| eval last_run = now() \
| eval last_ok = if(status="ok", now(), null()) \
| eval detail = "kvstores_present=" . present . "/2" \
| eval remediation = "Reinstall TA-alphalevel or run `splunk reload` - the shipped collections.conf should create these automatically." \
| fields _key, check_name, status, severity, last_run, last_ok, detail, remediation \
| outputlookup append=true alphalevel_readiness
cron_schedule = */15 * * * *
enableSched = 1
dispatch.earliest_time = -5m
dispatch.latest_time = now
is_visible = 0


[Alpha Level - Readiness - Auto Lookup Wired]
description = Confirms the auto-lookup that decorates events with Alpha Level scores is present on the source::* stanza.
search = | rest /servicesNS/-/TA-alphalevel-alert-refinery/data/props/lookups \
| search stanza="source::*" attribute="LOOKUP-alphalevel_scores" \
| stats count as wired \
| eval check_name = "auto_lookup_wired" \
| eval _key = check_name \
| eval status = if(wired > 0, "ok", "fail") \
| eval severity = "high" \
| eval last_run = now() \
| eval last_ok = if(status="ok", now(), null()) \
| eval detail = "auto_lookups_on_source_wildcard=" . wired \
| eval remediation = "The shipped props.conf defines the auto-lookup on [source::*]. If missing, check for conflicting local/props.conf overrides." \
| fields _key, check_name, status, severity, last_run, last_ok, detail, remediation \
| outputlookup append=true alphalevel_readiness
cron_schedule = */15 * * * *
enableSched = 1
dispatch.earliest_time = -5m
dispatch.latest_time = now
is_visible = 0


[Alpha Level - Readiness - Puller Heartbeat]
description = Proves the external round-trip works. The Alpha Level puller writes a heartbeat via HEC every run. If the newest heartbeat is fresh, MGMT-port-in and HEC-out are both healthy.
search = index=`alphalevel_internal_index` sourcetype=alphalevel:heartbeat earliest=-1h \
| stats max(_time) as last_heartbeat \
| eval heartbeat_age_seconds = now() - last_heartbeat \
| eval check_name = "puller_heartbeat" \
| eval _key = check_name \
| eval status = case(isnull(last_heartbeat), "fail", heartbeat_age_seconds < 900, "ok", heartbeat_age_seconds < 3600, "warn", 1=1, "fail") \
| eval severity = "high" \
| eval last_run = now() \
| eval last_ok = if(status="ok", now(), null()) \
| eval detail = if(isnull(last_heartbeat), "no heartbeat seen in last hour", "age=" . round(heartbeat_age_seconds, 0) . "s") \
| eval remediation = "If no heartbeat: check that (a) the Alpha Level puller is enabled for this tenant, (b) our egress IP can reach MGMT port 8089, (c) the HEC token is valid and the alphalevel_internal index accepts it." \
| fields _key, check_name, status, severity, last_run, last_ok, detail, remediation \
| outputlookup append=true alphalevel_readiness
cron_schedule = */5 * * * *
enableSched = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_visible = 0


[Alpha Level - Readiness - Result Flow]
description = Confirms scored events are actually landing in alphalevel_results.
search = index=`alphalevel_results_index` sourcetype=alphalevel:result earliest=-1h \
| stats count as events, max(_time) as last_event \
| eval last_event_age_seconds = now() - last_event \
| eval check_name = "result_flow" \
| eval _key = check_name \
| eval status = case(events = 0, "warn", last_event_age_seconds < 1800, "ok", last_event_age_seconds < 7200, "warn", 1=1, "fail") \
| eval severity = "medium" \
| eval last_run = now() \
| eval last_ok = if(status="ok", now(), null()) \
| eval detail = "events_last_hour=" . events . if(isnotnull(last_event), ", age=" . round(last_event_age_seconds,0) . "s", "") \
| eval remediation = "If events=0: the puller is either not running or HEC is dropping events. Cross-reference with the puller_heartbeat check - heartbeat green + no results = HEC token or index permissions issue." \
| fields _key, check_name, status, severity, last_run, last_ok, detail, remediation \
| outputlookup append=true alphalevel_readiness
cron_schedule = */5 * * * *
enableSched = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_visible = 0


[Alpha Level - Readiness - Hash Stability]
description = Samples recent in-scope events and verifies sha256(_raw) is stable across two recomputations. al_key is computed independently on both sides (the Alpha Level puller and the customer auto-lookup), so ANY process that mutates _raw between ingest and query time silently breaks the join. This check catches that.
search = `alphalevel_sources` earliest=-1h latest=now \
| head 50 \
| eval hash_direct = sha256(_raw) \
| eval raw_copy = _raw \
| eval hash_roundtrip = sha256(raw_copy) \
| eval match = if(hash_direct == hash_roundtrip, 1, 0) \
| stats count as sampled, sum(match) as matched, \
        values(eval(if(match=0, substr(_raw, 1, 80), null()))) as sample_mismatches \
| eval check_name = "hash_stability" \
| eval _key = check_name \
| eval status = case(sampled = 0, "unknown", matched = sampled, "ok", 1=1, "fail") \
| eval severity = "high" \
| eval last_run = now() \
| eval last_ok = if(status="ok", now(), null()) \
| eval detail = "stable_hashes=" . matched . "/" . sampled . if(isnotnull(sample_mismatches), " mismatched_samples=" . mvjoin(sample_mismatches, " | "), "") \
| eval remediation = "A process is mutating _raw after ingest (SEDCMD in props.conf, a cloned TA's search-time transforms, or KV_MODE rewriting). Inspect props.conf for the source sourcetype and remove _raw-mutating transforms. Without this, the al_key join fails silently and analysts see null scores." \
| fields _key, check_name, status, severity, last_run, last_ok, detail, remediation \
| outputlookup append=true alphalevel_readiness
cron_schedule = */15 * * * *
enableSched = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
is_visible = 0
max_concurrent = 1
