# KV store transforms - the surfaces that auto-lookups read from.

[alphalevel_scores]
collection = alphalevel_scores
external_type = kvstore
fields_list = _key, al_key, alpha_score, al_determination, is_duplicate, duplicate_of, top_factors, al_scored_at, al_version, al_source_index, al_detector_name, _updated

[alphalevel_readiness]
collection = alphalevel_readiness
external_type = kvstore
fields_list = _key, check_name, status, severity, last_run, last_ok, detail, remediation

# Shipped reference lookup - which fields the puller needs from normalised events.
[alphalevel_required_fields]
filename = alphalevel_required_fields.csv
case_sensitive_match = 1
