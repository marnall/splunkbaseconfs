# Alert sources - define which events Alpha Level scores.
# Override alphalevel_custom_sources in local/macros.conf to add your own, e.g.:
#   [alphalevel_custom_sources]
#   definition = index=my_alerts OR index=soc_alerts
[alphalevel_sources]
definition = (index=notable OR `alphalevel_custom_sources`)
iseval = 0

[alphalevel_custom_sources]
definition = index=__alphalevel_no_custom_sources__
iseval = 0

# Target indexes for scored results and puller heartbeats.
# Default to `main` so the TA works out of the box with zero admin-console
# setup on Splunk Cloud. Customers who want dedicated indexes for cleaner
# separation and retention policy should create them in the Admin Console
# and override these macros in local/macros.conf, e.g.:
#   [alphalevel_results_index]
#   definition = alphalevel_results
#   [alphalevel_internal_index]
#   definition = alphalevel_internal
[alphalevel_results_index]
definition = main
iseval = 0

[alphalevel_internal_index]
definition = main
iseval = 0

# Field normalisation - maps various SIEM field names to the common schema the
# Alpha Level puller expects. Must stay in lockstep with the server-side
# normaliser; the `al_key` computation is the contract.
[alphalevel_normalise]
definition = eval al_key=sha256(_raw) \
| eval al_source=case(index="notable", "splunk_es", 1=1, index) \
| eval al_timestamp_reliable=if(isnotnull(orig_time), 1, 0) \
| eval alert_time_epoch=if(al_timestamp_reliable=1, orig_time, _time) \
| eval alert_time=strftime(alert_time_epoch, "%Y-%m-%d %H:%M:%S") \
| eval detector_name=coalesce(rule_name, search_name, title, source) \
| eval severity=lower(coalesce(severity, urgency, priority, "medium")) \
| eval alert_type=coalesce(mitre_tactic, tactics, kill_chain_phase, "unknown") \
| eval username=coalesce(user, src_user, dest_user, account_name, recipient) \
| eval src_ip=coalesce(src_ip, src) \
| eval dst_ip=coalesce(dest_ip, dest) \
| eval src_hostname=coalesce(src_host, src_nt_host, computer_name) \
| eval dst_hostname=coalesce(dest_host, dest_nt_host, host) \
| eval process_name=coalesce(process, process_name, image) \
| eval command_line=coalesce(cmdline, command_line, process_exec) \
| eval file_hash=coalesce(file_hash, sha256, sha1, md5) \
| eval url=coalesce(url, uri) \
| eval domain=coalesce(domain, url_domain, query) \
| eval email_sender=coalesce(sender, if(match(src_user, "@"), src_user, null())) \
| eval email_subject=subject \
| eval signature=coalesce(signature, threat_name, malware_name)
iseval = 0

# Heartbeat age - external-path checks piggyback on the puller's heartbeat.
# If the heartbeat is fresh, we know mgmt-port + HEC round-trip are working.
[alphalevel_heartbeat_age_seconds]
definition = search index=`alphalevel_internal_index` sourcetype=alphalevel:heartbeat earliest=-1h \
| stats max(_time) as last_heartbeat \
| eval heartbeat_age_seconds = now() - last_heartbeat \
| fields heartbeat_age_seconds
iseval = 0
