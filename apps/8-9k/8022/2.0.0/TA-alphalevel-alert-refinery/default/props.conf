# ----------------------------------------------------------------------------
# Sourcetype parsing for HEC-delivered scored results.
# The Alpha Level puller posts JSON events to HEC, sourcetype=alphalevel:result.
# ----------------------------------------------------------------------------

[alphalevel:result]
SHOULD_LINEMERGE = 0
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
KV_MODE = json
TRUNCATE = 0
TIME_PREFIX = \"al_scored_at\"\s*:\s*
TIME_FORMAT = %s
MAX_TIMESTAMP_LOOKAHEAD = 20
category = Custom
description = Alpha Level scored alert result (JSON over HEC)

[alphalevel:heartbeat]
SHOULD_LINEMERGE = 0
LINE_BREAKER = ([\r\n]+)
KV_MODE = json
category = Custom
description = Alpha Level puller heartbeat (JSON over HEC)

# ----------------------------------------------------------------------------
# Auto-enrichment of events with Alpha Level scores.
# Uses [source::*] to apply to all events regardless of sourcetype or source.
# The OUTPUTNEW ensures existing fields are not overwritten.
# ----------------------------------------------------------------------------

[source::*]
EVAL-al_key = sha256(_raw)
LOOKUP-alphalevel_scores = alphalevel_scores al_key OUTPUTNEW alpha_score al_determination is_duplicate duplicate_of top_factors al_scored_at al_version
