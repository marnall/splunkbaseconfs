# Audit Logs - polls every 5 minutes (actual collection frequency controlled by
# collection_interval_audit_logs in brandefense.conf, default 3600s)
[script://$SPLUNK_HOME/etc/apps/TA-brandefense/bin/brandefense_audit_logs.py]
disabled = true
index = brandefense
interval = 300
sourcetype = brandefense:audit:logs
source = brandefense_audit_logs
python.version = python3

