[settings]
# API key for Brandefense API - override in local/brandefense.conf
api_key =
base_url = https://api.brandefense.io/api/v1

# Delay in seconds between API requests (rate limit protection)
api_request_delay = 2

# Collection intervals in seconds (how often each input runs)
collection_interval_audit_logs = 3600
collection_interval_incidents = 3600
collection_interval_iocs = 3600
collection_interval_intelligences = 3600

# Audit Logs settings
audit_logs_page_size = 100
audit_logs_max_pages = 100
# First run backfill: pull last N days. Subsequent runs: incremental from checkpoint.
audit_logs_max_age_days = 7

# Incidents settings
incidents_page_size = 50
incidents_max_pages = 100
incidents_collect_indicators = true
# Only pull incidents from the last N days (0 = no limit)
incidents_max_age_days = 7
# Severity filter: comma-separated list of severities to collect
# Remove values you don't want (e.g. set to MEDIUM,HIGH,CRITICAL to exclude LOW)
incidents_severity_filter = LOW,MEDIUM,HIGH,CRITICAL

# IOC settings
ioc_types = ip_address,domain,hash,url
iocs_page_size = 100
iocs_max_pages = 50
# Only pull IOCs from the last N days via API period parameter (e.g. 7 = 7d)
iocs_pull_period_days = 7
# Severity filter: comma-separated list of severities to collect
# Remove values you don't want (e.g. set to MEDIUM,HIGH,CRITICAL to exclude LOW)
ioc_severity_filter = LOW,MEDIUM,HIGH,CRITICAL

# Intelligences settings
intelligences_page_size = 20
intelligences_max_pages = 50
intelligences_strip_html = true
# First run backfill: pull last N days. Subsequent runs: incremental from checkpoint.
intelligences_max_age_days = 7

# Proxy Configuration
proxy_enabled = false
proxy_host =
proxy_port =
proxy_username =
proxy_password =

# SSL Verification (false = skip certificate verification)
ssl_verify = false
