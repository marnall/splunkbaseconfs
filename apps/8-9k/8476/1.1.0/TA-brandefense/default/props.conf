[brandefense:audit:logs]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%f%Z
TIME_PREFIX = "created_at"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 35
TRUNCATE = 99999
# CIM: Change Analysis
FIELDALIAS-user = actor_email AS user
FIELDALIAS-src = ip_address AS src
FIELDALIAS-action = type AS action
EVAL-vendor = "Brandefense"
EVAL-vendor_product = "Brandefense"
EVAL-app = "TA-brandefense"

