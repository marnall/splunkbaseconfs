[admin:rest_profiler_configuration]
match = /
members = rest_profiler_profile, rest_profiler_settings

[admin_external:rest_profiler_profile]
python.required = 3.13
handlertype = python
python.version = python3
handlerfile = rest_profiler_rh_profile.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:rest_profiler_settings]
python.required = 3.13
handlertype = python
python.version = python3
handlerfile = rest_profiler_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true
