[launcher]
version = 1.0.0
description = Define reusable REST API request profiles (URL, method, headers, body, timeout, retry, proxy, response validation, and HTTP Basic / token / mutual-TLS authentication with encrypted secret storage), preview or test-send them, and execute them as alert actions - per triggering result row in JSON, XML, form, query-parameter, or templated format.
author = majid ershadi

[id]
version = 1.0.0
name = rest_profiler

[install]
build = 1781621869
is_configured = false
state = enabled

[package]
id = rest_profiler
check_for_updates = true

[ui]
label = REST Profiler for Splunk
supported_themes = light, dark
is_visible = true

[triggers]
reload.rest_profiler_settings = simple
reload.rest_profiler_profile = simple
