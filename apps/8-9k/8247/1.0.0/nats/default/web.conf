[expose:nats_account]
pattern = nats_account
methods = POST, GET

[expose:nats_account_specified]
pattern = nats_account/*
methods = POST, GET, DELETE

[expose:nats_settings]
pattern = nats_settings
methods = POST, GET

[expose:nats_settings_specified]
pattern = nats_settings/*
methods = POST, GET, DELETE

[expose:nats_nats_subscribe]
pattern = nats_nats_subscribe
methods = POST, GET

[expose:nats_nats_subscribe_specified]
pattern = nats_nats_subscribe/*
methods = POST, GET, DELETE

[expose:nats_nats_kv]
pattern = nats_nats_kv
methods = POST, GET

[expose:nats_nats_kv_specified]
pattern = nats_nats_kv/*
methods = POST, GET, DELETE

[expose:data/indexes]
pattern = data/indexes
methods = GET
