[admin:nats_configuration]
match = /
members = nats_account, nats_settings

[admin:nats_inputs]
match = /
members = nats_nats_kv, nats_nats_subscribe

[admin_external:nats_account]
handlertype = python
python.version = python3
handlerfile = nats_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:nats_settings]
handlertype = python
python.version = python3
handlerfile = nats_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:nats_nats_subscribe]
handlertype = python
python.version = python3
handlerfile = nats_rh_nats_subscribe.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:nats_nats_kv]
handlertype = python
python.version = python3
handlerfile = nats_rh_nats_kv.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
