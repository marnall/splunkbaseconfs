[natssubscribe-command]
syntax = | natssubscribe subject=<subject> account=<account>
description = Subscribe to NATS subject and stream messages in real-time
usage = public

[natskv-command]
syntax = | natskv bucket=<bucket> key=<key> account=<account>
description = Retrieve history from NATS JetStream Key-Value store
usage = public
