[id]
version = 1.0.1
name = TA_oracle_sbc_cdr
#splunkbase_id = 8467

[ui]
is_visible = 0
label = Supporting Add-on for Oracle SBC CDR

[launcher]
author = Sideview, LLC
description = This Supporting Add-on defines index-time settings to ingest the CDR files from Oracle Session Border Controller (SBC) and Oracle Session Router.  It is to be deployed on your Splunk Indexers (or if you are using a Heavy Forwarder and forwarding cooked data to your indexes, installed on that HF).   It can also be deployed with two other apps on the Splunk Search Head(s) or Search Head Cluster: a) Sideview's Supporting App for Oracle SBC CDR,  and b) Sideview's commercial "Cisco CDR Reporting and Analytics" app.  With all these pieces in place the Sideview apps on the search head implement a general purpose investigation and reporting solution for this data.
version = 1.0.1

[package]
id = TA_oracle_sbc_cdr
check_for_updates = 1
show_upgrade_notification = 1

[install]
build = 6


