[oracle_cdr_match_start]
REGEX  = ^1,
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::oracle_cdr_start

[oracle_cdr_match_end]
REGEX  = ^2,
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::oracle_cdr_end

[oracle_cdr_match_interim]
REGEX  = ^3,
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::oracle_cdr_interim

[oracle_cdr_match_header_row]
REGEX  = ^accounting_status
DEST_KEY = queue
FORMAT = nullQueue

[oracle_cdr_call_id]
REGEX = ^[123],[^,]+,\d+,\"?([^,"]+)?\"?,\"?([^,"]+)?\"?,\"?([^,"]+)?\"?,\"?([^,"]+)?\"?,\"?([^,"]+)?\"?,\"?([^,"]+)?\"?,\"?([^\<,]*<sip:([^@\>]+)@[^,]+|([^,]+))?\"?,\"?([^\<,]*<sip:([^@\>]+)@[^,]+|([^,]+))?\"?
FORMAT = call_id::$1 ingress_call_id::$2 egress_call_id::$3 session_protocol_type::$4 session_forked_call_id::$5 generic_id::$6 calling_station_id::$7 callingPartyNumber::$8 calledPartyNumber::$11
WRITE_META = true

