#
# Event type definitions for CIM data model tagging
#
# meraki_airmarshal_ids: Maps Air Marshal wireless threat detection events
# to the Intrusion_Detection (IDS_Attacks) data model.
#
# meraki_accesspoints_session: Maps Access Point association, disassociation,
# and fast roaming events to the Network_Sessions data model.
#

[meraki_airmarshal_ids]
search = sourcetype="meraki:airmarshal"

[meraki_accesspoints_session]
search = sourcetype="meraki:accesspoints" (meraki_event_type="association" OR meraki_event_type="disassociation" OR meraki_event_type="11r_fast_roam")
