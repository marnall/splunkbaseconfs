#
# CIM field mappings for Cisco Meraki sourcetypes
#
# These EVAL statements map raw Meraki API fields to CIM-compliant field names,
# enabling the data to populate Splunk Enterprise Security data models.
#
# Requires: Cisco Meraki Add-on for Splunk (Splunk_TA_cisco_meraki) v3.x
# Requires: Splunk Common Information Model (Splunk_SA_CIM) v4.x or later
#

# =============================================================================
# meraki:airmarshal -> Intrusion_Detection (IDS_Attacks) data model
# =============================================================================
#
# Air Marshal is Meraki's built-in wireless intrusion detection system.
# It detects rogue APs, SSID spoofing, ad-hoc networks, and other
# wireless threats. The official Meraki TA collects this data but does
# not map it to CIM fields.
#
# Field mapping:
#   ids_type    -> "wireless" (static, all Air Marshal events are wireless IDS)
#   signature   -> Constructed from the detected SSID name
#   category    -> "wireless" (static)
#   severity    -> "medium" (static default; can be customized)
#   action      -> "blocked" if AP is contained, "allowed" otherwise
#   src         -> First detected BSSID (MAC address of the rogue/neighbor AP)
#   dvc         -> First detecting Meraki AP serial number
#
[meraki:airmarshal]
EVAL-ids_type = "wireless"
EVAL-signature = if(isnotnull(ssid) AND ssid!="", "Rogue/Neighbor AP: " . ssid, "Unknown Wireless Device")
EVAL-category = "wireless"
EVAL-severity = "medium"
EVAL-action = if(match('bssids{}.contained', "true"), "blocked", "allowed")
EVAL-src = mvindex('bssids{}.bssid', 0)
EVAL-dvc = mvindex('bssids{}.detectedBy{}.device', 0)

# =============================================================================
# meraki:accesspoints -> Network_Sessions data model
# =============================================================================
#
# Access Point events from the Meraki API use the field "meraki_event_type"
# (not "type") for event classification. The official Meraki TA handles
# Authentication tagging but does not map association/disassociation events
# to the Network_Sessions data model.
#
# Field mapping:
#   dest           -> AP device name (e.g., "AP-TASH-H1-FL1-R10")
#   ssid           -> SSID name the client connected to
#   session_action -> "allowed" for associations, "closed" for disassociations
#   duration       -> Session duration from eventData.duration
#
[meraki:accesspoints]
EVAL-dest = deviceName
EVAL-ssid = ssidName
EVAL-session_action = case(meraki_event_type=="association" OR meraki_event_type=="11r_fast_roam", "allowed", meraki_event_type=="disassociation", "closed")
EVAL-duration = 'eventData.duration'
