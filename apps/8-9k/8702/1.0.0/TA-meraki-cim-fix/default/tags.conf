#
# CIM tags for data model mapping
#
# Air Marshal events are tagged for the Intrusion_Detection data model
# (requires tag=ids AND tag=attack). The "wireless" tag enables the
# wireless IDS sub-category in ES.
#
# Access Point association events are tagged for the Network_Sessions
# data model (requires tag=network AND tag=session).
#

[eventtype=meraki_airmarshal_ids]
ids = enabled
attack = enabled
wireless = enabled

[eventtype=meraki_accesspoints_session]
network = enabled
session = enabled
