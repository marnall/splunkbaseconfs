# BarracudaEGD - Data Inputs Configuration for Splunk ENTERPRISE
#
# This file configures data input for Barracuda Email Gateway Defense
# events in a Splunk ENTERPRISE environment.
#
# For Splunk Cloud deployments, see inputs-cloud.conf or SPLUNK_CLOUD_GUIDE.md

[default]

# Configure Barracuda to send data to this TCP-SSL endpoint
# Example: Configure Barracuda → Syslog/Webhook → Destination:
#   - Hostname: <YOUR_SPLUNK_IP>
#   - Port: 6515
#   - Protocol: TCP-SSL (TLS)
#   - Format: JSON

[tcp-ssl://6515]
sourcetype = BarracudaEGDJSON
connection_host = ip
disabled = false

# Optional: Configure certificate for TLS (if using custom certs)
# clientCert = $SPLUNK_HOME/etc/apps/BarracudaEGD/default/barracuda_cert.pem
# sslPassword = $7$<encrypted_password>
