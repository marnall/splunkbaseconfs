[BarracudaEGDJSON]
DATETIME_CONFIG =
INDEXED_EXTRACTIONS = json
NO_BINARY_CHECK = true
SEDCMD-keepjson = s/^[^{]*{/{/
category = Custom
disabled = false
pulldown_type = 1

# ════════════════════════════════════════════════════════════════════════════
# CIM (Common Information Model) Field Mappings
# Normalizes Barracuda EGD logs to Splunk CIM standards
# ════════════════════════════════════════════════════════════════════════════

# EMAIL DATA MODEL - Field Aliasing
FIELDALIAS-src_ip = src_ip as src
FIELDALIAS-src_user_email = hdr_from as src_user
FIELDALIAS-src_user_domain = env_from as src_user_email
FIELDALIAS-dest_user = recipients{}.email as dest_user
FIELDALIAS-dest_user_email = recipients{}.email as user
FIELDALIAS-dest_domain = dst_domain as dest
FIELDALIAS-message_id = message_id as msg_id
FIELDALIAS-message_subject = subject as signature
FIELDALIAS-action = recipients{}.action as action
FIELDALIAS-msg_size = size as bytes_in
FIELDALIAS-email_size = size as bytes_out

# AUTHENTICATION DATA MODEL
FIELDALIAS-auth_src_ip = ip as src
FIELDALIAS-auth_user = actor as user
FIELDALIAS-auth_action = action as signature

# CHANGE DATA MODEL
FIELDALIAS-change_user = actor as user
FIELDALIAS-change_object = affected as object
FIELDALIAS-change_type = action_type as change_type
FIELDALIAS-change_src = ip as src

# Additional Security Relevant Fields
FIELDALIAS-threat_taxonomy = recipients{}.taxonomy as threat_type
FIELDALIAS-delivery_status = recipients{}.delivered as action

# Calculated Fields for CIM Compliance
EVAL-dvc = "barracuda_egd"
EVAL-dvc_type = "email_gateway"
EVAL-signature_id = coalesce(recipients{}.reason, audit_type)
