# BarracudaEGD - Data Inputs Configuration
#
# This app supports both Splunk ENTERPRISE and Splunk CLOUD.
#
# === SPLUNK ENTERPRISE (On-Premises) ===
# Use: inputs-enterprise.conf or the configuration below
# Barracuda sends TCP-SSL data directly to Splunk
#
# === SPLUNK CLOUD ===
# Use: inputs-cloud.conf as reference
# Barracuda sends data via HTTP Event Collector (HEC)
# For detailed setup, see: SPLUNK_CLOUD_GUIDE.md

[default]

# TCP-SSL Configuration (Splunk Enterprise only)
# For Splunk Cloud, use HTTP Event Collector instead (see inputs-cloud.conf)

[tcp-ssl://6515]
sourcetype = BarracudaEGDJSON
connection_host = ip
disabled = false

