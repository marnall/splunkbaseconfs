# BarracudaEGD - Data Transforms for CIM Compliance
#
# This file contains transforms to normalize Barracuda EGD data to CIM standards

# ════════════════════════════════════════════════════════════════════════════
# LOOKUP TABLE: Barracuda Action → CIM Action
# Maps Barracuda action values to standard CIM action values
# ════════════════════════════════════════════════════════════════════════════

[barracuda_action_lookup]
filename = barracuda_action_lookup.csv
match_type = simple(action_value)

# Usage: | lookup barracuda_action_lookup action_value as recipients{}.action OUTPUT cim_action

# ════════════════════════════════════════════════════════════════════════════
# LOOKUP TABLE: Barracuda Reason → CIM Signature
# Maps Barracuda blocking reasons to CIM signature format
# ════════════════════════════════════════════════════════════════════════════

[barracuda_reason_lookup]
filename = barracuda_reason_lookup.csv
match_type = simple(reason_value)

# ════════════════════════════════════════════════════════════════════════════
# LOOKUP TABLE: Barracuda Actor Type → CIM User Type
# Maps actor types to CIM user_type
# ════════════════════════════════════════════════════════════════════════════

[barracuda_actor_type_lookup]
filename = barracuda_actor_type_lookup.csv
match_type = simple(actor_type_value)

# ════════════════════════════════════════════════════════════════════════════
# LOOKUP TABLE: Barracuda Action (Audit) → CIM Change Type
# Maps audit action types to CIM change_type
# ════════════════════════════════════════════════════════════════════════════

[barracuda_audit_action_lookup]
filename = barracuda_audit_action_lookup.csv
match_type = simple(audit_action)

# ════════════════════════════════════════════════════════════════════════════
# REGEX EXTRACTION: Extract domain from email address
# ════════════════════════════════════════════════════════════════════════════

[extract_email_domain]
REGEX = (?<email_domain>[a-zA-Z0-9.-]+\.[a-zA-Z]{2,})
