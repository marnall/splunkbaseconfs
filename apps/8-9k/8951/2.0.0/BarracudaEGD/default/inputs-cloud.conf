# BarracudaEGD - Data Inputs Configuration for Splunk CLOUD
#
# This file shows configuration for Barracuda Email Gateway Defense
# events in a Splunk CLOUD environment using HTTP Event Collector (HEC).
#
# NOTE: This is a REFERENCE file. Actual HEC configuration is done via:
#   1. Splunk Cloud UI → Settings → Data Inputs → HTTP Event Collector
#   2. OR via Splunk Cloud API
#
# For Splunk Enterprise deployments, see inputs-enterprise.conf

# ════════════════════════════════════════════════════════════════════════════
# SPLUNK CLOUD - HTTP EVENT COLLECTOR (HEC) CONFIGURATION
# ════════════════════════════════════════════════════════════════════════════

# IMPORTANT: In Splunk Cloud, HTTP Event Collector (HEC) is the recommended
# method for ingesting data. You CANNOT use TCP-SSL directly in Cloud.

# STEP 1: Create HEC Token via Splunk Cloud UI
# ───────────────────────────────────────────────────────────────────────────
# 1. Go to: Settings → Data Inputs → HTTP Event Collector
# 2. Click: New Token
# 3. Name: "BarracudaEGD-HEC"
# 4. Sourcetype: "BarracudaEGDJSON"
# 5. Default Index: "main" (or your preferred index)
# 6. Copy the generated token

# STEP 2: Configure Barracuda to send to HEC
# ───────────────────────────────────────────────────────────────────────────
# Destination: https://<YOUR_SPLUNK_CLOUD_INSTANCE>.splunkcloud.com:8088/services/collector
# HTTP Method: POST
# Authorization: Splunk <YOUR_HEC_TOKEN>
# Content-Type: application/json
# Body Format:
# {
#   "event": { ... your barracuda JSON event ... },
#   "sourcetype": "BarracudaEGDJSON",
#   "source": "barracuda-egd"
# }

# OPTIONAL: If you want HEC configuration managed via app
# (requires enterprise or cloud with HEC access)
#
# [http://<token-name>]
# disabled = false
# sourcetype = BarracudaEGDJSON
# index = main
# http_input_log_level = info

# ════════════════════════════════════════════════════════════════════════════
# ALTERNATIVE: Splunk Cloud Data Forwarding
# ════════════════════════════════════════════════════════════════════════════
#
# If Barracuda cannot send directly to HEC, you can:
#
# 1. Configure a Heavy Forwarder (on-premises) to:
#    - Receive TCP from Barracuda
#    - Forward to Splunk Cloud via HEC
#
# 2. Use a Cloud Connect (Splunk Cloud Gateway) for hybrid connectivity
#
# See SPLUNK_CLOUD_GUIDE.md for detailed instructions.

# ════════════════════════════════════════════════════════════════════════════
# HEC ENDPOINT VARIATIONS
# ════════════════════════════════════════════════════════════════════════════

# Standard Cloud (most common):
# https://<instance>.splunkcloud.com:8088/services/collector

# Government Cloud:
# https://<instance>.splunkcloud.gov:8088/services/collector

# EU Cloud:
# https://<instance>.splunkcloud.eu:8088/services/collector

