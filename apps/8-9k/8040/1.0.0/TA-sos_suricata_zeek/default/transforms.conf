[zeek_conn_fields]
REGEX = "id_orig_h":"([^"]+)"."id_resp_h":"([^"]+)"."id_orig_p":(\d+)."id_resp_p":(\d+)."proto":"([^"]+)"
FORMAT = src::$1 dest::$2 src_port::$3 dest_port::$4 transport::$5
SOURCE_KEY = _raw

[zeek_sip_fields]
REGEX = "id_orig_h":"([^"]+)"."id_resp_h":"([^"]+)"."id_orig_p":(\d+)."id_resp_p":(\d+)."method":"([^"]+)"."uri":"([^"]+)"."status_code":(\d+)
FORMAT = src::$1 dest::$2 src_port::$3 dest_port::$4 http_method::$5 url::$6 status_code::$7
SOURCE_KEY = _raw

