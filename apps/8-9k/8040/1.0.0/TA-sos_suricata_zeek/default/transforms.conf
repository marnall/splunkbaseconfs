FORMAT = src::$1 dest::$2 src_port::$3 dest_port::$4 user::$5
SOURCE_KEY = _raw

[zeek_notice_fields]
REGEX = "id_orig_h":"([^"]+)"."id_resp_h":"([^"]+)"."id_orig_p":(\d+)."id_resp_p":(\d+)."note":"([^"]+)"
FORMAT = src::$1 dest::$2 src_port::$3 dest_port::$4 signature::$5
SOURCE_KEY = _raw

[suricata_alert_fields]
REGEX = "src_ip":"([^"]+)"."dest_ip":"([^"]+)"."src_port":(\d+)."dest_port":(\d+)."proto":"([^"]+)"."signature":"([^"]+)"."action":"([^"]+)"."category":"([^"]+)"."severity":(\d+)
FORMAT = src::$1 dest::$2 src_port::$3 dest_port::$4 transport::$5 signature::$6 action::$7 category::$8 severity::$9
SOURCE_KEY = _raw

[zeek_host_override]
REGEX = "id_orig_h":"([^"]+)"
FORMAT = host::$1
DEST_KEY = MetaData:Host
SOURCE_KEY = _raw

[zeek_host_fallback]
REGEX = .*
FORMAT = host::zeek
DEST_KEY = MetaData:Host
SOURCE_KEY = _raw