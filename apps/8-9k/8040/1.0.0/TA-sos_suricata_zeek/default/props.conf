[zeek:json]
#DESCRIPTION = Zeek JSON logs for all log types
SHOULD_LINEMERGE = false
INDEXED_EXTRACTIONS = json
KV_MODE = none
TIMESTAMP_FIELDS = ts
TIME_FORMAT = %s.%3N
LINE_BREAKER = ([\r\n]+)
BREAK_ONLY_BEFORE = ^\{
TRUNCATE = 0
category = Network & Security
pulldown_type = true
EVAL-src = if(isnotnull(id_orig_h), id_orig_h, src_ip)
EVAL-dest = if(isnotnull(id_resp_h), id_resp_h, dest_ip)
EVAL-dvc = if(isnotnull(id_orig_h), id_orig_h, if(isnotnull(host), host, src_ip))
EVAL-user = if(isnotnull(client), client, if(isnotnull(user), user, if(isnotnull(username), username, null())))
FIELDALIAS-zeek_conn = id_orig_h AS src id_resp_h AS dest id_orig_p AS src_port id_resp_p AS dest_port proto AS transport
FIELDALIAS-zeek_sip = id_orig_h AS src id_resp_h AS dest id_orig_p AS src_port id_resp_p AS dest_port method AS http_method uri AS url status_code AS status_code
FIELDALIAS-zeek_http = id_orig_h AS src id_resp_h AS dest id_orig_p AS src_port id_resp_p AS dest_port method AS http_method uri AS url status AS status_code
FIELDALIAS-zeek_dns = id_orig_h AS src id_resp_h AS dest id_orig_p AS src_port id_resp_p AS dest_port query AS dns_query
FIELDALIAS-zeek_kerberos = id_orig_h AS src id_resp_h AS dest id_orig_p AS src_port id_resp_p AS dest_port request_type AS action client AS user service AS service
FIELDALIAS-zeek_ntlm = id_orig_h AS src id_resp_h AS dest id_orig_p AS src_port id_resp_p AS dest_port username AS user
FIELDALIAS-zeek_notice = id_orig_h AS src id_resp_h AS dest id_orig_p AS src_port id_resp_p AS dest_port note AS signature
LOOKUP-zeek_service = zeek_service_lookup service OUTPUT service_name

[source::*known_services.log]
TRANSFORMS-host = zeek_host_override, zeek_host_fallback
EVAL-dvc = if(isnotnull(host), host, null())

[source::*software.log]
TRANSFORMS-host = zeek_host_override, zeek_host_fallback
EVAL-dvc = if(isnotnull(host), host, null())

[source::*http.log]
TRANSFORMS-host = zeek_host_override, zeek_host_fallback
FIELDALIAS-zeek_http = id_orig_h AS src id_resp_h AS dest id_orig_p AS src_port id_resp_p AS dest_port method AS http_method uri AS url status AS status_code
EVAL-dvc = if(isnotnull(host), host, null())

[source::*known_hosts.log]
TRANSFORMS-host = zeek_host_override, zeek_host_fallback
EVAL-dvc = if(isnotnull(host), host, null())

[source::*known_certs.log]
TRANSFORMS-host = zeek_host_override, zeek_host_fallback
EVAL-dvc = if(isnotnull(host), host, null())

[suricata:json]
#DESCRIPTION = Suricata EVE JSON logs for alerts
SHOULD_LINEMERGE = false
INDEXED_EXTRACTIONS = json
KV_MODE = none
TIMESTAMP_FIELDS = timestamp
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%:z
TRUNCATE = 100000
category = Network & Security
pulldown_type = true
EVAL-src = if(isnotnull(src_ip), src_ip, src)
EVAL-dest = if(isnotnull(dest_ip), dest_ip, dest)
EVAL-dvc = if(isnotnull(src_ip), src_ip, dvc)
FIELDALIAS-suricata_alert = src_ip AS src dest_ip AS dest src_port AS src_port dest_port AS dest_port proto AS transport alert.signature AS signature alert.action AS action alert.category AS category alert.severity AS severity
FIELDALIAS-suricata_metadata = alert.metadata.signature_severity AS signature_severity alert.metadata.confidence AS confidence
