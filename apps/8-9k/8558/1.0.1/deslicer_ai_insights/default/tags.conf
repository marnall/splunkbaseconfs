# Deslicer AI Insights - CIM data model tag mappings
#
# Tags map event types to CIM data models so that data populates
# the correct data model accelerations and dashboards.
#
# CIM data models targeted:
#   - Change (change tracking)
#   - Authentication (enrollment, key lifecycle)
#   - Application State

# ── Change Analysis ──────────────────────────────────────────────────────────

[eventtype=deslicer_insights_change_ingestion]
change = enabled

[eventtype=deslicer_insights_change_file_modified]
change = enabled

[eventtype=deslicer_insights_change_file_created]
change = enabled

[eventtype=deslicer_insights_change_file_deleted]
change = enabled

[eventtype=deslicer_insights_all_changes]
change = enabled

# ── Authentication ───────────────────────────────────────────────────────────

[eventtype=deslicer_insights_auth_enrollment_success]
authentication = enabled

[eventtype=deslicer_insights_auth_enrollment_failure]
authentication = enabled

[eventtype=deslicer_insights_auth_enrollment_started]
authentication = enabled

[eventtype=deslicer_insights_auth_key_rotation]
authentication = enabled

[eventtype=deslicer_insights_auth_key_rotation_failure]
authentication = enabled

[eventtype=deslicer_insights_auth_revocation]
authentication = enabled

[eventtype=deslicer_insights_all_auth]
authentication = enabled

# ── Application State ────────────────────────────────────────────────────────

[eventtype=deslicer_insights_node_started]
application = enabled

[eventtype=deslicer_insights_collector_started]
application = enabled

[eventtype=deslicer_insights_collector_stopped]
application = enabled

[eventtype=deslicer_insights_heartbeat]
application = enabled

[eventtype=deslicer_insights_api_error]
application = enabled

[eventtype=deslicer_insights_binary_update]
application = enabled
