# Deslicer AI Insights - app.conf
# UCC may merge additional stanzas at build time.
#
# The app ships with is_visible = false so it is hidden by default on all tiers
# (indexers, heavy forwarders, cluster managers) where no UI is needed.
# On SHC members where the dashboard should be visible, create:
#   local/app.conf
#   [ui]
#   is_visible = true

[ui]
is_visible = false
label = Deslicer AI Insights Add-on
is_manageable = true

[launcher]
author = Deslicer
description = Deslicer AI Insights Add-on - configuration collector and operational monitoring for Splunk Enterprise deployments.
version = 1.0.1

[package]
id = deslicer_ai_insights
check_for_updates = true

[install]
is_configured = false
state = enabled
build = 1780480722

[triggers]
reload.deslicer_ai_insights = simple
reload.enrollment = simple
reload.deslicer_ai_insights_settings = simple
reload.deslicer_ai_insights_account = simple

[id]
version = 1.0.1
name = deslicer_ai_insights
