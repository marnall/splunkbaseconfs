# Deslicer AI Insights - CIM field transformations
#
# Defines regex-based field extractions that supplement the inline EXTRACT-
# rules in props.conf. Used for complex multi-field extractions that benefit
# from named groups with REPORT- directives.

[deslicer_insights_batch_stats]
REGEX = files_processed=(?P<files_processed>\d+)\s+config_items=(?P<config_items>\d+)\s+parsed_items=(?P<parsed_items>\d+)\s+skipped=(?P<skipped>\d+)\s+failed=(?P<failed_count>\d+)
FORMAT = files_processed::$1 config_items::$2 parsed_items::$3 skipped::$4 failed_count::$5

[deslicer_insights_version_info]
REGEX = version=(?P<binary_version>[^\s,]+)\s+node_name=(?P<node_name>\S+)\s+build=(?P<build_number>\S+)\s+git_sha=(?P<git_sha>\S+)
FORMAT = binary_version::$1 node_name::$2 build_number::$3 git_sha::$4

[deslicer_insights_api_response]
REGEX = status=(?P<status_code>\d+)\s+.*?(?:error|body)=(?P<error_message>[^\n]+)
FORMAT = status_code::$1 error_message::$2
