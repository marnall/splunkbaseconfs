# Deslicer AI Insights - CIM-compliant event types
#
# Maps raw events to CIM data model categories for:
#   - Change Analysis (configuration ingestion, file changes)
#   - Authentication (enrollment, key rotation, revocation)
#   - Application State (agent lifecycle)
#
# See tags.conf for the CIM data model tag mappings.

# ── Change Analysis Events ───────────────────────────────────────────────────

[deslicer_insights_change_ingestion]
search = sourcetype="deslicer:insights:node" "Batch ingestion successful"

[deslicer_insights_change_file_modified]
search = sourcetype="deslicer:insights:node" "File modified"

[deslicer_insights_change_file_created]
search = sourcetype="deslicer:insights:node" "File created"

[deslicer_insights_change_file_deleted]
search = sourcetype="deslicer:insights:node" "File deleted"

# ── Authentication Events ────────────────────────────────────────────────────

[deslicer_insights_auth_enrollment_success]
search = source="*deslicer_ai_insights*" ("Enrollment successful" OR "Created enrollment credentials" OR "Using previously enrolled credentials")

[deslicer_insights_auth_enrollment_failure]
search = source="*deslicer_ai_insights*" ("Enrollment timed out" OR "Enrollment.*failed" OR "Cannot enroll")

[deslicer_insights_auth_enrollment_started]
search = source="*deslicer_ai_insights*" "Starting enrollment"

[deslicer_insights_auth_key_rotation]
search = source="*deslicer_ai_insights*" ("Rotation complete" OR "rotation succeeded" OR "Server signaled rotation" OR "Triggering rotation")

[deslicer_insights_auth_key_rotation_failure]
search = source="*deslicer_ai_insights*" ("rotation failed" OR "Server-signaled rotation failed")

[deslicer_insights_auth_revocation]
search = source="*deslicer_ai_insights*" ("revoked" OR "cut off" OR "API key revoked")

# ── Application State / Lifecycle Events ─────────────────────────────────────

[deslicer_insights_node_started]
search = sourcetype="deslicer:insights:node" "Deslicer insights node starting"

[deslicer_insights_collector_started]
search = source="*deslicer_ai_insights*" "Collector PID" "started"

[deslicer_insights_collector_stopped]
search = source="*deslicer_ai_insights*" ("Received signal" OR "Received shutdown signal")

[deslicer_insights_heartbeat]
search = sourcetype="deslicer:insights:node" "Heartbeat"

[deslicer_insights_api_error]
search = sourcetype="deslicer:insights:node" log_level=ERROR

[deslicer_insights_binary_update]
search = source="*deslicer_ai_insights*" "Binary update detected"

# ── Aggregate event types (useful for dashboard base searches) ───────────────

[deslicer_insights_all_changes]
search = sourcetype="deslicer:insights:node" ("Batch ingestion successful" OR "File modified" OR "File created" OR "File deleted")

[deslicer_insights_all_auth]
search = source="*deslicer_ai_insights*" ("enroll" OR "Enrollment" OR "rotation" OR "rotate" OR "revoked" OR "cut off")

[deslicer_insights_all_errors]
search = (sourcetype="deslicer:insights:node" log_level=ERROR) OR (source="*deslicer_ai_insights*" log_level=ERROR)
