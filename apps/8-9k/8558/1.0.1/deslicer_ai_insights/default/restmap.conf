[admin:deslicer_ai_insights_configuration]
match = /
members = deslicer_ai_insights_account, deslicer_ai_insights_settings

[admin:deslicer_ai_insights_inputs]
match = /
members = deslicer_ai_insights_deslicer_ai_insights

[admin_external:deslicer_ai_insights_account]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = deslicer_ai_insights_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:deslicer_ai_insights_settings]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = deslicer_ai_insights_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:deslicer_ai_insights_deslicer_ai_insights]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = deslicer_ai_insights_rh_deslicer_ai_insights.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
