# Deslicer AI Insights - CIM-compliant field extractions
#
# Sourcetypes:
#   deslicer:insights:node    – Rust binary stdout (collection, heartbeat, API)
#   deslicer:insights:supervisor – Python supervisor events (_internal)

# ── Rust collector output ────────────────────────────────────────────────────

[deslicer:insights:node]
# Time format: MM-DD-YYYY HH:MM:SS.mmm +0000
TIME_FORMAT = %m-%d-%Y %H:%M:%S.%3N %z
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 30
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 98765
CHARSET = utf-8

# CIM base fields (constant values via EVAL)
EVAL-vendor = "Deslicer"
EVAL-product = "Deslicer AI Insights"
EVAL-vendor_product = "Deslicer AI Insights"
EVAL-app = "deslicer_ai_insights"
EVAL-dest = host

# Structured field extraction from key=value pairs in the Rust binary output
KV_MODE = auto

# Level extraction: e.g. "INFO " or "ERROR"
EXTRACT-log_level = ^\d{2}-\d{2}-\d{4}\s[\d:.]+\s\+\d{4}\s+(?P<log_level>ERROR|WARN|INFO|DEBUG|TRACE)\s

# Component extraction: module name after level
EXTRACT-component = ^\d{2}-\d{2}-\d{4}\s[\d:.]+\s\+\d{4}\s+\w+\s+(?P<component>\S+)\s

# PID and thread extraction
EXTRACT-process_id = \[(?P<process_id>\d+)\s+(?P<thread_name>[^\]]+)\]

# -- CIM Change fields from "Batch ingestion successful" events --
EXTRACT-files_processed = files_processed=(?P<files_processed>\d+)
EXTRACT-config_items = config_items=(?P<config_items>\d+)
EXTRACT-parsed_items = parsed_items=(?P<parsed_items>\d+)
EXTRACT-skipped = skipped=(?P<skipped>\d+)
EXTRACT-failed_count = failed=(?P<failed_count>\d+)

# -- CIM Change fields from file change events --
EXTRACT-file_path = path=(?P<file_path>\S+)

# -- CIM Authentication fields from enrollment/rotation events --
EXTRACT-api_url = api_url=(?P<api_url>\S+)
EXTRACT-host_id = host_id=(?P<host_id>[0-9a-f-]+)
EXTRACT-scan_id = scan_id=(?P<scan_id>[0-9a-f-]+)
EXTRACT-transaction_id = transaction_id=(?P<transaction_id>[0-9a-f-]+)

# -- Batch/API metrics --
EXTRACT-batch_num = batch=(?P<batch_num>\d+)
EXTRACT-retry_count = retry_count=(?P<retry_count>\d+)
EXTRACT-payload_size_mb = payload_size_mb=(?P<payload_size_mb>[\d.]+)
EXTRACT-status_code = status=(?P<status_code>\d+)
EXTRACT-endpoint = endpoint=(?P<endpoint>\S+)

# CIM Change data model field aliases
EVAL-action = case( \
    match(_raw, "Batch ingestion successful"), "success", \
    match(_raw, "File modified"), "modified", \
    match(_raw, "File created"), "created", \
    match(_raw, "File deleted"), "deleted", \
    match(_raw, "ERROR"), "failure", \
    match(_raw, "Starting collector"), "started", \
    match(_raw, "Heartbeat"), "allowed", \
    1==1, "unknown")
EVAL-status = case( \
    match(_raw, "successful|success|verified"), "success", \
    match(_raw, "ERROR|failed|failure"), "failure", \
    1==1, "success")
EVAL-change_type = case( \
    match(_raw, "Batch ingestion"), "configuration", \
    match(_raw, "File modified|File created|File deleted"), "filesystem", \
    match(_raw, "enrollment|Enrollment"), "AAA", \
    match(_raw, "rotation|rotated|key"), "AAA", \
    1==1, "operational")
EVAL-object_category = "configuration"
EVAL-severity = case( \
    log_level=="ERROR", "critical", \
    log_level=="WARN", "high", \
    log_level=="INFO", "informational", \
    log_level=="DEBUG", "low", \
    1==1, "informational")

# ── Python supervisor log events (in _internal) ─────────────────────────────

[source::...deslicer_ai_insights...]
# These events are already Splunk internal format: log_level=INFO message
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)

# CIM base fields (constant values via EVAL)
EVAL-vendor = "Deslicer"
EVAL-product = "Deslicer AI Insights"
EVAL-vendor_product = "Deslicer AI Insights"
EVAL-app = "deslicer_ai_insights"
EVAL-dest = host

# Extract supervisor log_level (solnlib format: log_level=INFO)
EXTRACT-sv_log_level = log_level=(?P<log_level>\w+)

# CIM Authentication fields for enrollment events
EVAL-action = case( \
    match(_raw, "Enrollment successful|Created enrollment credentials|Using previously enrolled"), "success", \
    match(_raw, "Starting enrollment"), "started", \
    match(_raw, "Enrollment timed out|Enrollment.*failed"), "failure", \
    match(_raw, "revoked|cut off"), "failure", \
    match(_raw, "Rotation complete|rotation succeeded"), "success", \
    match(_raw, "rotation failed"), "failure", \
    match(_raw, "Collector PID.*started"), "started", \
    match(_raw, "Binary update detected"), "modified", \
    1==1, "unknown")
EVAL-authentication_method = case( \
    match(_raw, "enrollment|Enrollment"), "enrollment_token", \
    match(_raw, "rotation|rotate"), "api_key_rotation", \
    1==1, "certificate")
EVAL-status = case( \
    match(_raw, "successful|Enrollment successful|Created|previously enrolled|complete"), "success", \
    match(_raw, "timed out|failed|revoked|error|Error"), "failure", \
    1==1, "success")
EVAL-severity = case( \
    log_level=="ERROR", "critical", \
    log_level=="WARN" OR log_level=="WARNING", "high", \
    log_level=="INFO", "informational", \
    log_level=="DEBUG", "low", \
    1==1, "informational")
