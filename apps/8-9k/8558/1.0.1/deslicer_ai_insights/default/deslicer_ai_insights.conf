# Deslicer AI Insights - configuration template
# Secrets (API key, tenant ID) are stored exclusively in Splunk's encrypted
# credential store (storage/passwords) via the Configuration tab — never here.
# The add-on writes only non-sensitive settings (observer_api_url) to
# local/deslicer_ai_insights.conf during enrollment.

[api]
# observer_api_url is set via the Configuration tab in Splunk Web.
# Get your URL from deslicer.ai > Settings > Integrations > Deslicer Automation Platform (DAP)
# Example: https://your-tenant.dap.deslicer.ai
observer_api_url =

[identifiers]
# tenant_id = (set via Configuration tab or local/deslicer_ai_insights.conf)

[collection]
interval = 300
