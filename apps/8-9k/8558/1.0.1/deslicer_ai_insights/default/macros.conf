# Macros for Deslicer AI Insights Node Monitoring dashboard
# Admins should override these in local/macros.conf if the modular input
# sends data to an index other than "main" (e.g. a dedicated "deslicer" index).
# Example local/macros.conf override:
#   [deslicer_insights_index]
#   definition = index=deslicer sourcetype="deslicer:insights:node"

[deslicer_insights_index]
definition = index=main sourcetype="deslicer:insights:node"
iseval = 0

[deslicer_insights_internal]
definition = index=_internal source=*deslicer_ai_insights*
iseval = 0

[deslicer_insights_all]
definition = (`deslicer_insights_index`) OR (`deslicer_insights_internal`)
iseval = 0

