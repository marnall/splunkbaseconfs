# Deslicer AI Insights - modular input
# The collector binary is launched by the modular input supervisor (deslicer_insights_helper.py).
#
# Recommended credential setup (production / Splunk Cloud):
#   Configure the enrollment token via "Configuration > Connections" in the
#   add-on UI. The token is then stored in Splunk's encrypted credential
#   store (storage/passwords) and is never written to disk in cleartext.
#
# Zero-touch deployment via Splunk Deployment Server (advanced / on-prem only):
#   This path stores the enrollment token in `local/enrollment.conf`, which
#   is plaintext on disk. Treat it like any other unsealed secret:
#     - Use SHORT-LIVED, single-use enrollment tokens (mint a new one per push).
#     - Set restrictive filesystem permissions (file 600, parent dir 700).
#     - Remove `local/enrollment.conf` from the Deployment Server bundle once
#       hosts have enrolled — the token is exchanged for an encrypted-at-rest
#       runtime credential after the first successful enrollment.
#     - Do NOT use this path in Splunk Cloud — credentials must remain in
#       the encrypted credential store there (REQ-SEC-005, REQ-LOG-007).
#
#   1. Add local/enrollment.conf with a short-lived token + observer_api_url
#   2. Add local/inputs.conf enabling both stanzas (see below)
#   3. Push via Deployment Server — each host auto-enrolls and starts the collector
#   4. Remove local/enrollment.conf from the bundle on the next push
#
# To enable via local/inputs.conf, add:
#   [deslicer_ai_insights]
#   disabled = false
#
#   [deslicer_ai_insights://default]
#   disabled = false

# Scheme-level defaults — disabled by default so the input does not run on
# indexers/SHC members where collection is not intended. Override with
# disabled = false in local/inputs.conf on collection tiers (forwarders/HF).
#
# python.required = 3.13: required by AppInspect checks
# check_modular_inputs_python_required and check_admin_external_restmap_conf_python_required
# (future-failure category). Splunk 10.2+ uses this to select the interpreter;
# Splunk 9.x ignores unrecognised settings so this is safe on all versions.
[deslicer_ai_insights]
python.version = python3
python.required = 3.13
disabled = 1

# Default named instance — splunkd requires at least one instance stanza to
# invoke the helper. interval = 0 runs the supervisor continuously (watch mode).
# Credentials are resolved: enrolled key → UCC account → enrollment.conf token.
[deslicer_ai_insights://default]
python.version = python3
python.required = 3.13
interval = 0
index = main
log_level = INFO
disabled = 1
