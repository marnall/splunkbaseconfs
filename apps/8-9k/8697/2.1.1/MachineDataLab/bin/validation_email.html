<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio iPhone - Email Confirmado!</title>
    <style>
        /* Estilos Gerais */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Para manter os confetes no ecrã */
        }

        /* Cartão de Confirmação */
        .confirmation-card {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            z-index: 10;
            position: relative;
        }

        /* Ícone de Sucesso */
        .success-icon {
            color: #43a047;
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
        }

        /* Títulos e Texto */
        h1 {
            color: #1a237e;
            margin-bottom: 10px;
            font-size: 32px;
        }

        p {
            color: #4a148c;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .highlight {
            font-weight: bold;
            color: #e91e63;
        }

        /* Botão de Próximos Passos */
        .btn-confirm {
            display: inline-block;
            background-color: #e91e63;
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s ease;
            cursor: pointer;
        }

        .btn-confirm:hover {
            background-color: #c2185b;
        }

        /* Confetes (Simples animação CSS) */
        .confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #fce4ec;
            opacity: 0.7;
            animation: confetti-drop linear infinite;
        }

        /* Gerar confetes com cores e animações diferentes */
        .confetti:nth-child(1) { left: 10%; background-color: #e91e63; animation-duration: 3s; animation-delay: 0s; }
        .confetti:nth-child(2) { left: 20%; background-color: #c2185b; animation-duration: 4s; animation-delay: 1s; }
        .confetti:nth-child(3) { left: 30%; background-color: #43a047; animation-duration: 3.5s; animation-delay: 0.5s; }
        .confetti:nth-child(4) { left: 40%; background-color: #1a237e; animation-duration: 5s; animation-delay: 1.5s; }
        .confetti:nth-child(5) { left: 50%; background-color: #fce4ec; animation-duration: 3s; animation-delay: 0s; }
        .confetti:nth-child(6) { left: 60%; background-color: #e91e63; animation-duration: 4s; animation-delay: 1s; }
        .confetti:nth-child(7) { left: 70%; background-color: #c2185b; animation-duration: 3.5s; animation-delay: 0.5s; }
        .confetti:nth-child(8) { left: 80%; background-color: #43a047; animation-duration: 5s; animation-delay: 1.5s; }
        .confetti:nth-child(9) { left: 90%; background-color: #1a237e; animation-duration: 3s; animation-delay: 0s; }

        @keyframes confetti-drop {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0.5; }
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .confirmation-card {
                padding: 30px;
            }
            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="confetti-container">
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
    </div>

    <div class="confirmation-card">
        <span class="success-icon">&#x2714;</span> 

        <h1>Parabéns!</h1>
        <p>O teu endereço de email foi validado com sucesso.</p>

        <p>A tua participação no sorteio do novo <span class="highlight">iPhone 13</span> está oficialmente confirmada e já estás <span class="highlight">Elegível p/ Sorteio</span>!</p>

        <p>Entraremos em contacto através deste email se fores o/a grande vencedor/a.</p>

        <a href="https://o-teu-site.com/dashbaoard.html" class="btn-confirm">Voltar ao Sorteio</a>
    </div>

</body>
</html>
