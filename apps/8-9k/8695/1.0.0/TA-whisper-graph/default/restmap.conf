[admin:TA_whisper_graph_configuration]
match = /
members = TA_whisper_graph_account, TA_whisper_graph_settings

[admin:TA_whisper_graph_inputs]
match = /
members = TA_whisper_graph_whisper_baseline, TA_whisper_graph_whisper_threat_intel, TA_whisper_graph_whisper_watchlist

[admin_external:TA_whisper_graph_account]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = TA_whisper_graph_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_whisper_graph_settings]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = TA_whisper_graph_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_whisper_graph_whisper_threat_intel]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = TA_whisper_graph_rh_whisper_threat_intel.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_whisper_graph_whisper_baseline]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = TA_whisper_graph_rh_whisper_baseline.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_whisper_graph_whisper_watchlist]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = TA_whisper_graph_rh_whisper_watchlist.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

