#
# Field aliases and extractions for Whisper Security TA
#
# CIM-compliant field mapping for enriched events.
# Whisper enrichment fields are aliased to CIM equivalents.
#

# ─── JSON Field Extraction ────────────────────────────────────────────
# All Whisper sourcetypes emit JSON events. KV_MODE = json enables
# automatic field extraction so dashboard queries can reference fields
# (e.g., node_count, edge_count) without manual extractions.

[whisper:attack_surface]
KV_MODE = json

[whisper:threat_intel]
KV_MODE = json

[whisper:watchlist]
KV_MODE = json

[whisper:change]
KV_MODE = json

# ─── CIM Field Aliases ───────────────────────────────────────────────

[whisper:enrichment]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
FIELDALIAS-whisper_dest_ip = whisper_ip AS dest_ip
FIELDALIAS-whisper_dest_country = whisper_country AS dest_country
FIELDALIAS-whisper_dest_asn = whisper_asn AS dest_asn
FIELDALIAS-whisper_threat_score = whisper_threat_score AS threat_score
FIELDALIAS-whisper_threat_level = whisper_threat_level AS threat_level
FIELDALIAS-whisper_is_threat = whisper_is_threat AS is_threat
FIELDALIAS-whisper_is_c2 = whisper_is_c2 AS is_c2
FIELDALIAS-whisper_is_tor = whisper_is_tor AS is_tor
FIELDALIAS-whisper_is_malware = whisper_is_malware AS is_malware
FIELDALIAS-whisper_is_phishing = whisper_is_phishing AS is_phishing
FIELDALIAS-whisper_is_anonymizer = whisper_is_anonymizer AS is_anonymizer
FIELDALIAS-whisper_is_spam = whisper_is_spam AS is_spam
FIELDALIAS-whisper_is_bruteforce = whisper_is_bruteforce AS is_bruteforce
FIELDALIAS-whisper_is_scanner = whisper_is_scanner AS is_scanner
FIELDALIAS-whisper_is_blacklist = whisper_is_blacklist AS is_blacklist
FIELDALIAS-whisper_is_proxy = whisper_is_proxy AS is_proxy
FIELDALIAS-whisper_is_vpn = whisper_is_vpn AS is_vpn
FIELDALIAS-whisper_is_whitelist = whisper_is_whitelist AS is_whitelist
FIELDALIAS-whisper_risk_score = whisper_risk_score AS risk_score
FIELDALIAS-whisper_risk_level = whisper_risk_level AS risk_level
EVAL-vendor = "Whisper Security"
EVAL-vendor_product = "Whisper Knowledge Graph"

# ─── TA Internal Log ─────────────────────────────────────────────────
# Fix sourcetype detection for the TA log file.

[source::...ta_whisper_graph.log]
sourcetype = ta_whisper_graph
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)

[ta_whisper_graph]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)

[whisper:spf_compliance]
KV_MODE = json
FIELDALIAS-last_checked = collected_at AS last_checked

