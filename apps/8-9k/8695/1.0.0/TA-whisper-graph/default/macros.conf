#
# Saved graph query macros for common Whisper Knowledge Graph investigations.
#
# Usage: | `whisper_shared_nameservers("phishing-target.com")`
#
# ─── Index Macro ──────────────────────────────────────────────────────
# Override this macro to change the index used by dashboards and searches.
# For example, to use a custom index: definition = index=my_custom_index

[whisper_index]
description = Default index for Whisper Security events. Override to use a custom index name.
definition = index=whisper
iseval = 0


[whisper_shared_nameservers(1)]
description = Find all domains sharing nameservers with the given domain.
args = domain
definition = whisperquery query="MATCH (h:HOSTNAME {name: $domain})<-[:NAMESERVER_FOR]-(ns:HOSTNAME)-[:NAMESERVER_FOR]->(other:HOSTNAME) WHERE other.name <> $domain RETURN ns.name AS nameserver, other.name AS related_domain LIMIT 100" params="domain=$domain$"

[whisper_asn_infrastructure(1)]
description = Enumerate all prefixes routed by an ASN.
args = asn
definition = whisperquery query="MATCH (a:ASN {name: $asn})-[:ROUTES]->(p:PREFIX) RETURN a.name AS asn, p.name AS prefix LIMIT 200" params="asn=$asn$"

[whisper_cname_chain(1)]
description = Resolve the CNAME chain for a domain (up to 5 hops).
args = domain
definition = whisperquery query="MATCH path = (h:HOSTNAME {name: $domain})-[:ALIAS_OF*1..5]->(target:HOSTNAME) RETURN [n IN nodes(path) | n.name] AS cname_chain, last(nodes(path)).name AS cname_target, length(path) AS depth LIMIT 10" params="domain=$domain$"

[whisper_spf_chain(1)]
description = Trace the SPF include chain for a domain.
args = domain
definition = whisperquery query="MATCH path = (h:HOSTNAME {name: $domain})-[:SPF_INCLUDE*1..3]->(included:HOSTNAME) RETURN [n IN nodes(path) | n.name] AS spf_chain, length(path) AS depth LIMIT 50" params="domain=$domain$"

[whisper_bgp_peers(1)]
description = List BGP peers of an ASN.
args = asn
definition = whisperquery query="MATCH (a:ASN {name: $asn})-[:PEERS_WITH]->(peer:ASN)-[:HAS_NAME]->(n:ASN_NAME) MATCH (peer)-[:HAS_COUNTRY]->(co:COUNTRY) RETURN peer.name AS peer_asn, n.name AS peer_name, co.name AS country LIMIT 100" params="asn=$asn$"

[whisper_cohosted_domains(1)]
description = Find domains co-hosted on the same IP as the given domain.
args = domain
definition = whisperquery query="MATCH (h:HOSTNAME {name: $domain})-[:RESOLVES_TO]->(ip:IPV4)<-[:RESOLVES_TO]-(cohost:HOSTNAME) WHERE cohost.name <> $domain RETURN ip.name AS ip, cohost.name AS cohosted_domain LIMIT 100" params="domain=$domain$"

[whisper_full_investigation(1)]
description = Full infrastructure investigation: hostname to IP to ASN with geo and reverse DNS.
args = indicator
definition = whisperquery query="MATCH (h:HOSTNAME {name: $indicator})-[:RESOLVES_TO]->(ip:IPV4) WITH h, ip MATCH (ip)-[:ANNOUNCED_BY]->(ap)-[:ROUTES]->(va:ASN) WITH h, ip, ap, va.name AS asn MATCH (a:ASN {name: asn})-[:HAS_NAME]->(n:ASN_NAME) MATCH (a)-[:HAS_COUNTRY]->(co:COUNTRY) OPTIONAL MATCH (ip)<-[:RESOLVES_TO]-(cohost:HOSTNAME) RETURN h.name AS hostname, ip.name AS ip, ap.name AS prefix, a.name AS asn, n.name AS asn_name, co.name AS country, count(DISTINCT cohost) AS cohost_count LIMIT 50" params="indicator=$indicator$"

[whisper_explain(1)]
description = Get threat assessment for an indicator via the Whisper explain API.
args = indicator
definition = whisperquery query="CALL explain($indicator)" params="indicator=$indicator$"

# The add-on ships only the graph-query macros above. It does not ship
# correlation-search threshold or risk-score macros. Customers who build
# their own detections should define thresholds in their cloned
# savedsearches stanzas.
