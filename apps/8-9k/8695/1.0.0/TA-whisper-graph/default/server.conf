#
# Search Head Cluster (SHC) replication settings for Whisper Security TA.
#
# UCC-managed confs are auto-replicated; custom conf files must be listed
# explicitly so they replicate across SHC cluster members.
#

[shclustering]
conf_replication_include.restmap_custom = true
conf_replication_include.ta_whisper_graph_settings = true
conf_replication_include.ta_whisper_graph_account = true
conf_replication_include.web_custom = true
conf_replication_include.authorize = true
