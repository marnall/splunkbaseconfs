#
# Splunk app configuration for TA-whisper-graph
#

[install]
is_configured = false
state = enabled
build = 1777501773
python.version = python3
python.required = 3.13

[ui]
is_visible = 1
label = Whisper Security Add-on for Splunk
docs_section_override = AddOns:released
setup_view = configuration
supported_themes = light, dark

[launcher]
author = Whisper Security
version = 1.0.0
description = Technology Add-on for Whisper Security's Knowledge Graph API. Enrich Splunk events with infrastructure context, query the knowledge graph directly from SPL, and monitor your attack surface and compliance posture. Powered by 3.67B+ internet infrastructure nodes.

[package]
id = TA-whisper-graph
check_for_updates = 1

[diag]
extension_script = whisper_diag.py
data_limit = 50MB

[triggers]
reload.restmap_custom = simple
reload.web_custom = simple
reload.ta_whisper_graph_settings = simple
reload.ta_whisper_graph_account = simple

[id]
version = 1.0.0
name = TA-whisper-graph
