#
# Saved searches for Whisper Security TA
#
# This file defines:
#   1. Internal utility searches (cache eviction, threat intel populators,
#      precomputed enrichment).
#   2. Disabled example enrichment pipeline templates that customers can
#      clone and adapt to their own data.
#
# The add-on does not ship prebuilt correlation searches. Customers who
# want detections should clone the example templates below and tailor the
# source index, indicator field, and destination index to their environment.
#

# ─── Internal utilities ──────────────────────────────────────────────

[Whisper - Evict Expired Cache Entries]
description = Remove expired entries from the Whisper enrichment cache KV Store collection. Disabled by default; enable and schedule if you use the enrichment cache.
disabled = 1
cron_schedule = 0 * * * *
search = | whisperevict
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 0
is_visible = true

[Whisper - Populate IP Threat Intel KV Store]
description = Populate the whisper_ip_intel collection from the Whisper Graph for ES Threat Intelligence framework integration. Optional — only useful if you have Splunk Enterprise Security.
disabled = 1
cron_schedule = 0 */6 * * *
search = `whisper_index` sourcetype=whisper:threat_intel \
    | whisperquery query="MATCH (ip:IPV4)-[:LISTED_IN]->(f:FEED_SOURCE) WHERE ip.isThreat = true RETURN ip.name AS ip, collect(f.name) AS feeds, ip.threatScore AS threat_score LIMIT 10000" \
    | eval description="Whisper threat intel: " . mvjoin(feeds, ", ") \
    | eval threat_category="whisper" \
    | eval threat_group="whisper_graph" \
    | table ip description threat_category threat_group threat_score \
    | outputlookup whisper_ip_intel
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 0
is_visible = true

[Whisper - Populate Domain Threat Intel KV Store]
description = Populate the whisper_domain_intel collection from the Whisper Graph for ES Threat Intelligence framework integration. Optional — only useful if you have Splunk Enterprise Security.
disabled = 1
cron_schedule = 0 */6 * * *
search = `whisper_index` sourcetype=whisper:threat_intel \
    | whisperquery query="MATCH (h:HOSTNAME)-[:LISTED_IN]->(f:FEED_SOURCE) WHERE h.isThreat = true RETURN h.name AS domain, collect(f.name) AS feeds, h.threatScore AS threat_score LIMIT 10000" \
    | eval description="Whisper threat intel: " . mvjoin(feeds, ", ") \
    | eval threat_category="whisper" \
    | eval threat_group="whisper_graph" \
    | table domain description threat_category threat_group threat_score \
    | outputlookup whisper_domain_intel
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 0
is_visible = true

[Whisper - Populate Precomputed Enrichment KV Store]
description = Populate the whisper_precomputed_enrichment collection from the Whisper Graph. Optional utility search; enable and schedule if you want to pre-warm the enrichment cache for frequently used indicators.
disabled = 1
cron_schedule = 0 */12 * * *
search = `whisper_index` sourcetype=whisper:enrichment \
    | whisperquery query="MATCH (h:HOSTNAME) WHERE h.isThreat = true RETURN h.name AS indicator, 'domain' AS indicator_type LIMIT 5000" \
    | whisperlookup field=indicator \
    | eval cached_at=now() \
    | eval ttl_seconds=86400 \
    | outputlookup whisper_precomputed_enrichment
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 0
is_visible = true

# ─── Example enrichment pipeline templates ──────────────────────────
#
# Each template is DISABLED by default. Customers clone the stanza, rename it,
# change the source index/sourcetype/field to match their own data, pick a
# destination index, and enable the schedule. No template writes to index=risk
# and none depend on Splunk ES.
#
# Common customization parameters:
#   - <source_index>        : index containing your logs
#   - <indicator_field>     : field with the domain or IP to enrich
#   - <destination_index>   : index where enriched events should be written
#   - <destination_stype>   : sourcetype to tag enriched events with
#   - dispatch.earliest_time: dedup window / schedule window
#   - cron_schedule         : how often the template should run

[Example - Whisper - Enrich DNS Domains]
description = Template: enrich DNS query domains with Whisper Graph context and write the enriched events to a destination index. Disabled by default. Clone and edit source_index, indicator field, and destination_index before enabling.
disabled = 1
cron_schedule = */15 * * * *
search = index=<source_index> sourcetype=<source_sourcetype> earliest=-15m query=* \
    | rename query AS indicator \
    | dedup indicator \
    | whisperlookup field=indicator type=domain \
    | collect index=<destination_index> sourcetype="whisper:enriched_dns"
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 0
is_visible = true

[Example - Whisper - Enrich Destination IPs]
description = Template: enrich destination IP addresses from network traffic with Whisper Graph context and write the enriched events to a destination index. Disabled by default. Clone and edit source_index, indicator field, and destination_index before enabling.
