[Example - Whisper - Custom Graph Query Enrichment]
description = Template: run a custom Cypher query against the Whisper Graph and write the results to a destination index. Use this when whisperlookup does not expose the fields you need. Disabled by default. Edit the Cypher query, indicator parameter, and destination_index before enabling.
disabled = 1
cron_schedule = 0 */6 * * *
search = index=<source_index> sourcetype=<source_sourcetype> earliest=-6h <indicator_field>=* \
    | rename <indicator_field> AS indicator \
    | eval indicator=lower(indicator) \
    | where match(indicator, "^[A-Za-z0-9._:\-]+$") \
    | dedup indicator \
    | map search="| whisperquery query=\"MATCH (d:HOSTNAME {name: '$indicator$'})-[:RESOLVES_TO]->(ip:IPV4) RETURN d.name AS indicator, collect(ip.name) AS ips\"" \
    | collect index=<destination_index> sourcetype="whisper:enriched_custom"
dispatch.earliest_time = -6h
dispatch.latest_time = now
enableSched = 0
is_visible = true
