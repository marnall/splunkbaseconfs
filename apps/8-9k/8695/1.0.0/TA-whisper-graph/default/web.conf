[expose:TA_whisper_graph_account]
pattern = TA_whisper_graph_account
methods = POST, GET

[expose:TA_whisper_graph_account_specified]
pattern = TA_whisper_graph_account/*
methods = POST, GET, DELETE

[expose:TA_whisper_graph_settings]
pattern = TA_whisper_graph_settings
methods = POST, GET

[expose:TA_whisper_graph_settings_specified]
pattern = TA_whisper_graph_settings/*
methods = POST, GET, DELETE

[expose:TA_whisper_graph_whisper_threat_intel]
pattern = TA_whisper_graph_whisper_threat_intel
methods = POST, GET

[expose:TA_whisper_graph_whisper_threat_intel_specified]
pattern = TA_whisper_graph_whisper_threat_intel/*
methods = POST, GET, DELETE

[expose:TA_whisper_graph_whisper_baseline]
pattern = TA_whisper_graph_whisper_baseline
methods = POST, GET

[expose:TA_whisper_graph_whisper_baseline_specified]
pattern = TA_whisper_graph_whisper_baseline/*
methods = POST, GET, DELETE

[expose:TA_whisper_graph_whisper_watchlist]
pattern = TA_whisper_graph_whisper_watchlist
methods = POST, GET

[expose:TA_whisper_graph_whisper_watchlist_specified]
pattern = TA_whisper_graph_whisper_watchlist/*
methods = POST, GET, DELETE

[expose:data/indexes]
pattern = data/indexes
methods = GET

#
# Custom web.conf expose stanzas for Whisper Security TA.
# UCC-managed expose stanzas are auto-generated during build.
#

[expose:whisper_test_connectivity]
pattern = whisper_test_connectivity
methods = POST, GET

[expose:whisper_test_connectivity_specified]
pattern = whisper_test_connectivity/*
methods = POST, GET
