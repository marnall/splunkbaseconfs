[expose:cloud_connection]
pattern = /v1alpha1/cloud-connection
methods = GET, DELETE

[expose:cloud_connection_product]
pattern = /v1alpha1/cloud-connection/*
methods = GET

[expose:cloud_connection_product_status]
pattern = /v1alpha1/cloud-connection/*/status
methods = GET

[expose:cloud_connection_activate]
pattern = /v1alpha1/cloud-connection/activate
methods = POST

[expose:cloud_connection_verify]
pattern = /v1alpha1/cloud-connection/verify
methods = POST

[expose:cloud_connection_otp_request]
pattern = /v1alpha1/cloud-connection/otp-request
methods = POST

[expose:cloud_product_activate]
pattern = /v1alpha1/cloud-product-connection
methods = POST, GET

[expose:cloud_product_deactivate]
pattern = /v1alpha1/cloud-product-connection/*
methods = DELETE
