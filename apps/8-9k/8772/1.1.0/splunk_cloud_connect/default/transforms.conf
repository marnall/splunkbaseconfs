## These lists are intentionally shipped as .csv and not .csv.default as
## they are not meant to be customized.

[cloud_connection_audit]
collection = cloud_connection_audit
fields_list = _key, timestamp, operation, event_type, severity
external_type = kvstore
reverse_lookup_honor_case_sensitive_match = false

[splunk_cloud_connect_instrumentation_lookups]
filename = splunk_cloud_connect_instrumentation_lookups.csv
fields_list = transform
reverse_lookup_honor_case_sensitive_match = false

[splunk_cloud_connect_instrumentation_searches]
filename = splunk_cloud_connect_instrumentation_searches.csv
fields_list = search_alias
reverse_lookup_honor_case_sensitive_match = false

[splunk_cloud_connect_instrumentation_views]
filename = splunk_cloud_connect_instrumentation_views.csv
fields_list = view
reverse_lookup_honor_case_sensitive_match = false
