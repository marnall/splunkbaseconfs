# Props configuration for Splunk Cloud Connect App
# Defines sourcetypes for custom loggers

# Logger for cloud_connection_service.py
[source::...cloud_connection_service.log]
sourcetype = splunk_cloud_connect:cloud_connection_service

# Logger for cloud_product_service.py
[source::...cloud_product_service.log]
sourcetype = splunk_cloud_connect:cloud_product_service

# Logger for cloud_connection_event_log.py
[source::...cloud_connection_event_log.log]
sourcetype = splunk_cloud_connect:cloud_connection_event_log
