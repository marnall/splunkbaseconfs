[script://$SPLUNK_HOME/etc/apps/splunk_cloud_connect/bin/key_rotation.py]
# Run daily (86400 seconds = 24 hours)
interval = 86400
# Use splunk-system-user for authentication
passAuth = splunk-system-user
python.required = latest
python.version = python3
start_by_shell = false
disabled = false
sourcetype = key_rotation:status

# Access Token Refresh Script Input Configuration
# This script runs periodically to refresh access tokens before they expire

[script://$SPLUNK_HOME/etc/apps/splunk_cloud_connect/bin/access_token_refresh.py]
# Run every 5 minutes (300 seconds)
# The script checks if tokens expire within 15 minutes and refreshes them
interval = 300
# Use splunk-system-user for authentication
passAuth = splunk-system-user
python.required = latest
python.version = python3
start_by_shell = false
disabled = false
sourcetype = access_token_refresh:status

# SCS Connection Health Check Script Input Configuration
# This script runs every 60 seconds to check SCS endpoint reachability.

[script://$SPLUNK_HOME/etc/apps/splunk_cloud_connect/bin/scs_health_check.py]
interval = 60
passAuth = splunk-system-user
python.required = latest
python.version = python3
start_by_shell = false
disabled = false
sourcetype = scs_health_check:status

# Enterprise Security Extension App Refresh Script Input Configuration
# This script detects ES default/app.conf changes and refreshes Commerce product activation.

[script://$SPLUNK_HOME/etc/apps/splunk_cloud_connect/bin/es_app_conf_refresh.py]
interval = 600
passAuth = splunk-system-user
python.required = latest
python.version = python3
start_by_shell = false
disabled = false
sourcetype = es_app_conf_refresh:status
