# REST API configuration for Splunk Cloud Connect
#
# This file registers REST endpoints with Splunk and configures the ServiceMux handler
# to route requests to the appropriate service implementations.

[script:cloudconnection]
match = /v1alpha1/cloud-connection
script = generated/servicemux_handler.py
scripttype = persist
handler = servicemux_handler.ServiceMuxHandler
requireAuthentication = true
output_modes = json
passPayload = true
passSystemAuth = true
python.version = python3.9
# ServiceMux configuration
driver.env.app_name = splunk_cloud_connect
driver.env.static_module_path = generated
driver.env.service_module = cloud_connection_service
driver.env.service_class = CloudConnectionService
driver.env.mux_module = generated.handlers
driver.env.mux_class = ServiceHandler

[script:cloudproductconnection]
match = /v1alpha1/cloud-product-connection
script = generated/servicemux_handler.py
scripttype = persist
handler = servicemux_handler.ServiceMuxHandler
requireAuthentication = true
output_modes = json
passPayload = true
passSystemAuth = true
python.version = python3.9
# ServiceMux configuration
driver.env.app_name = splunk_cloud_connect
driver.env.static_module_path = generated
driver.env.service_module = cloud_product_service
driver.env.service_class = CloudProductService
driver.env.mux_module = generated.handlers
driver.env.mux_class = ServiceHandler
