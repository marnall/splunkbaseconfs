
[threatmon:incident]
INDEXED_EXTRACTIONS = json
KV_MODE = none
TIMESTAMP_FIELDS = alarmDate
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
SHOULD_LINEMERGE = false
TRUNCATE = 0
category = Application
FIELDALIAS-title = title AS incident_title
FIELDALIAS-description = description AS incident_description
FIELDALIAS-severity = severity AS incident_severity
EVAL-status = case(status=="Open" OR status=="Accept","Open",status=="In Progress" OR status=="InProgress","In Progress",status=="False Positive" OR status=="False_Positive","False Positive",status=="Ignore","Ignore",status=="Resolved" OR status=="Resolve","Resolved",true(),status)
