[sangfor_network]
# Maps to: Network Traffic Data Model
search = sourcetype=nsf:sangfor:traffic OR sourcetype=nsf:sangfor:nat

[sangfor_web]
# Maps to: Web Data Model
search = sourcetype=nsf:sangfor:web

[sangfor_intrusion]
# Maps to: Intrusion Detection (IDS) Data Model
search = sourcetype=nsf:sangfor:threat

[sangfor_authentication]
# Maps to: Authentication Data Model
search = sourcetype=nsf:sangfor:auth

[sangfor_change]
# Maps to: Change Analysis Data Model (for admin activities)
search = sourcetype=nsf:sangfor:admin