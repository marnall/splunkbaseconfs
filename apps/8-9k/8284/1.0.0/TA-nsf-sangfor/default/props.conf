# 1. The Entry Point
# Set your inputs.conf to use sourcetype = nsf:sangfor
[nsf:sangfor]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 20
TZ = UTC
# Apply the renaming logic immediately
TRANSFORMS-force_sourcetype = nsf_st_traffic, nsf_st_web, nsf_st_threat, nsf_st_auth, nsf_st_admin, nsf_st_nat
# 2. The Wildcard Stanza
# This applies field extractions to nsf:sangfor AND nsf:sangfor:traffic, nsf:sangfor:web, etc.

[(?i)nsf:sangfor*]
REPORT-sangfor_cef = sangfor_cef_header, sangfor_cef_extension
# Field Aliases (Mapping to CIM)
FIELDALIAS-src = src AS src_ip
FIELDALIAS-dest = dst AS dest_ip
FIELDALIAS-src_port = spt AS src_port
FIELDALIAS-dest_port = dpt AS dest_port
FIELDALIAS-proto = proto AS transport
FIELDALIAS-user = suser AS user
FIELDALIAS-duser = duser AS dest_user
FIELDALIAS-vendor_action = act AS vendor_action
# Normalization
EVAL-action = case(lower(act)=="allow", "allowed", lower(act)=="denied", "blocked", lower(act)=="drop", "blocked", 1, "unknown")
FIELDALIAS-app = app AS app
EVAL-severity = case(ThreatSeverity=="High", "high", ThreatSeverity=="Medium", "medium", ThreatSeverity=="Low", "low", 1, "unknown")

