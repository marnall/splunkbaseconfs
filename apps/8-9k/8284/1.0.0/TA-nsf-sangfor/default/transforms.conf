# --- Header and Body Extraction ---
[sangfor_cef_header]
REGEX = CEF:\d+\|([^\|]+)\|([^\|]+)\|([^\|]+)\|([^\|]+)\|([^\|]+)\|([^\|]+)\|
FORMAT = vendor::$1 product::$2 product_version::$3 signature_id::$4 signature::$5 vendor_severity::$6

[sangfor_cef_extension]
REGEX = (\w+)=([^=]+)(?=\s\w+=|$)
FORMAT = $1::$2
MV_ADD = true

# --- Sourcetype Renaming Rules ---

[nsf_st_traffic]
REGEX = \|traffic audit\|
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::nsf:sangfor:traffic

[nsf_st_web]
REGEX = \|website browsing\|
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::nsf:sangfor:web

[nsf_st_threat]
REGEX = \|(APT detection|DOS|IPS|Service Control or Application Control)\|
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::nsf:sangfor:threat

[nsf_st_auth]
REGEX = \|(user authentication|SSL VPN user operation)\|
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::nsf:sangfor:auth

[nsf_st_admin]
REGEX = \|(admin operation|System Failure Logs)\|
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::nsf:sangfor:admin

[nsf_st_nat]
REGEX = \|NAT\|
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::nsf:sangfor:nat