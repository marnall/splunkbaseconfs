<form class="form-horizontal form-complex">
    
    <div class="control-group">
        <label class="control-label" for="torq_workflow.credential">Integration</label>
        <div class="controls">
        <splunk-search-dropdown
            name="action.torq_workflow.param.credential"
            id="torq_workflow.credential"
            search='| rest /servicesNS/-/-/storage/passwords | search realm=torq'
            value-field="title"
            label-field="username"
        >
        </splunk-search-dropdown>
        </div>
    </div>
    <div class="control-group">
        <div class="controls">
            <span
                class="help-block"
                style="display: block; position: static; width: auto; margin-left: 0"
            >
                <a
                    href="{{SPLUNKWEB_URL_PREFIX}}/app/TA-torq/integrations"
                    target="_blank"
                    title="New integrations"
                    >Add new integrations here<i class="icon-external"></i
                ></a>
            </span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="body_format">Body Format</label>

        <div class="controls">
            <textarea
                class="input-xlarge"
                rows="8"
                cols="40"
                name="action.torq_workflow.param.body_format"
                id="body_format"
            ></textarea>
        </div>
        <div class="control-group">
            <div class="controls">
                <span
                    class="help-block"
                    style="display: block; position: static; width: auto; margin-left: 0"
                >
                    Format of JSON POST body. For a POST body identical to the stock Splunk Webhook
                    action, leave this at the default value.
                    <br />
                    <a
                        href="https://kb.torq.io/en/articles/9139999-splunk#h_8d4abe4ec4"
                        target="_blank"
                        title="Torq help"
                        >Torq Integration Documentation<i class="icon-external"></i
                    ></a>
                </span>
            </div>
        </div>
    </div>
</form>
