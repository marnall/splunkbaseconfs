[torq_workflow]
python.version = python3
python.required= 3.13,3.9
is_custom = 1
label = Trigger Torq Workflow
description = Trigger a Torq.io workflow
payload_format = json
icon_path = torq.png
param.user_agent = Splunk/$server.guid$
param.body_format = {\
  "sid": $$sid$$,\
  "search_name": $$search_name$$,\
  "app": $$app$$,\
  "owner": $$owner$$,\
  "results_link": $$results_link$$,\
  "result": $$full_result$$\
}
param.credential =
param._cam = {\
    "category":            ["Information Gathering"],\
    "task":                ["create"],\
    "subject":         ["network"],\
    "technology":      [{"vendor": "Torq", "product": "Torq Workflow"}],\
    "supports_adhoc":  true\
}
