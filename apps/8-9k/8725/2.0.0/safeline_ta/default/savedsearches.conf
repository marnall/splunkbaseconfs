#
# SafeLine WAF — saved searches & alerts
# All alerts are DISABLED by default. Enable in Splunk Web → Settings → Searches, reports, and alerts
# and configure your own delivery (email / webhook / Slack / etc).
#

# ===========================================================================
# ALERTS  (cron-driven; enable in UI after configuring a notification channel)
# ===========================================================================

[SafeLine - Critical attack detected]
search = `safeline_waf` severity=critical is_attack=1 \
| stats count, dc(src_ip) AS attackers, values(attack_type) AS attack_types, values(site_name) AS sites, values(rule_id) AS rules
disabled = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
description = Fires when at least one critical-severity attack is observed in the last 5 minutes.
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.severity = 5
alert_type = number of events
alert_threshold = 0
alert_comparator = greater than
is_visible = 1

[SafeLine - High volume attack from single IP]
search = `safeline_waf` is_attack=1 earliest=-15m \
| stats count AS attacks, dc(attack_type) AS types, values(attack_type) AS attack_types, values(site_name) AS sites by src_ip src_country \
| where attacks &gt;= 50 \
| sort - attacks
disabled = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
description = Fires when a single source IP launches 50+ attacks in 15 minutes.
counttype = number of events
quantity = 0
relation = greater than
alert.severity = 4

[SafeLine - Multi-site attacker]
search = `safeline_waf` is_attack=1 earliest=-1h \
| stats dc(site_url) AS sites_targeted, count AS attacks, values(site_name) AS sites, values(attack_type) AS attack_types by src_ip src_country \
| where sites_targeted &gt;= 3
disabled = 1
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
description = Fires hourly when an IP attacks 3+ distinct vhosts.
counttype = number of events
quantity = 0
relation = greater than
alert.severity = 4

[SafeLine - WAF mitigation rate dropped]
search = `safeline_waf` is_attack=1 earliest=-1h \
| stats count AS attacks count(eval(blocked=1)) AS blocked \
| eval rate = if(attacks&gt;0, blocked/attacks*100, 100) \
| where attacks &gt; 20 AND rate &lt; 70
disabled = 1
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
description = Fires hourly if the WAF mitigated less than 70% of detected attacks (with at least 20 attacks).
counttype = number of events
quantity = 0
relation = greater than
alert.severity = 5

[SafeLine - Sudden traffic spike on a site]
search = `safeline_waf` site_url=* earliest=-30m \
| bucket _time span=5m \
| stats count by _time site_name \
| stats avg(count) AS avg, max(count) AS peak by site_name \
| eval ratio = peak/avg \
| where ratio &gt;= 5 AND peak &gt; 100
disabled = 1
cron_schedule = */15 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time = now
description = Fires when traffic to a vhost in any 5-min bucket is 5x its 30-min average (peak ≥100).
counttype = number of events
quantity = 0
relation = greater than
alert.severity = 3

# ===========================================================================
# REPORTS  (on-demand dashboards / scheduled reports — also disabled by default)
# ===========================================================================

[SafeLine - Daily executive summary]
search = `safeline_waf` \
| stats count AS requests, count(eval(is_attack=1)) AS attacks, count(eval(blocked=1)) AS blocked, count(eval(severity=="critical")) AS critical, count(eval(severity=="high")) AS high, dc(src_ip) AS sources, dc(site_url) AS sites \
| eval mitigation = if(attacks&gt;0, round(blocked/attacks*100,1)."%", "n/a")
disabled = 1
cron_schedule = 0 8 * * *
dispatch.earliest_time = -1d@d
dispatch.latest_time = @d
description = Daily 08:00 summary — total requests, attacks, mitigation rate, sites covered.

[SafeLine - Top 10 threat actors (24h)]
search = `safeline_waf` is_attack=1 \
| stats count AS attacks, count(eval(blocked=1)) AS blocked, dc(attack_type) AS types, values(attack_type) AS attack_types, values(site_name) AS sites by src_ip src_country src_city \
| sort - attacks | head 10
disabled = 1
dispatch.earliest_time = -24h
dispatch.latest_time = now
