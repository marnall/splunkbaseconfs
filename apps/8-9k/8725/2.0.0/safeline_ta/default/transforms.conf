#
# SafeLine WAF — field transforms
#

# 1) Syslog header (everything BEFORE the JSON payload).
[safeline_syslog_header]
REGEX  = ^(?<syslog_ts>\w{3}\s+\d+\s+\d{2}:\d{2}:\d{2})\s+(?<relay_host>\S+)\s+\d+\s+(?<event_iso_time>\S+)\s+(?<container_id>\S+)\s+(?<app_path>\S+)\s+(?<procid>\d+)\s+(?<msgid>\S+)\s+-\s+

# 2) Capture the JSON body as a single field so power-users can `spath input=json_payload`.
[safeline_json_payload]
REGEX  = \s-\s+(?<json_payload>\{.*\})\s*$

# 3a) "key":"string"   — possessive quantifiers (*+) prevent catastrophic
#     backtracking on long heavily-escaped values like the `body` field.
[safeline_json_kv_strings]
REGEX        = "([a-zA-Z_][a-zA-Z0-9_]*+)"\s*+:\s*+"([^"\\]*+(?:\\.[^"\\]*+)*+)"
FORMAT       = $1::$2
REPEAT_MATCH = true

# 3b) "key":primitive  — number, true, false, null. Bounded with possessive quantifiers.
[safeline_json_kv_primitives]
REGEX        = "([a-zA-Z_][a-zA-Z0-9_]*+)"\s*+:\s*+(-?\d++(?:\.\d++)?+|true|false|null)(?=[\s,}])
FORMAT       = $1::$2
REPEAT_MATCH = true

# 4) Pull individual headers out of req_header_raw.
#    The blob is one HTTP request like:
#       POST /api/v4/jobs/request HTTP/1.1\r\nHost: ...\r\nUser-Agent: ...\r\n\r\n
#    Each line becomes a multivalue field req_headers + a request_line / request_method / request_uri / request_http_version triplet.
[safeline_req_headers]
SOURCE_KEY   = field:req_header_raw
REGEX        = (?:\\r\\n|\r\n|\n)([A-Za-z][A-Za-z0-9-]*):\s*([^\r\n\\]+)
FORMAT       = req_header_$1::$2 req_headers::"$1: $2"
REPEAT_MATCH = true

[safeline_req_line]
SOURCE_KEY   = field:req_header_raw
REGEX        = ^(?<request_method>[A-Z]+)\s+(?<request_uri>\S+)\s+(?<request_http_version>HTTP/[0-9.]+)

# 5) Pull individual headers out of resp_header_raw.
[safeline_resp_headers]
SOURCE_KEY   = field:resp_header_raw
REGEX        = (?:\\r\\n|\r\n|\n)([A-Za-z][A-Za-z0-9-]*):\s*([^\r\n\\]+)
FORMAT       = rsp_header_$1::$2 resp_headers::"$1: $2"
REPEAT_MATCH = true

[safeline_resp_line]
SOURCE_KEY   = field:resp_header_raw
REGEX        = ^HTTP/(?<response_http_version>[0-9.]+)\s+(?<response_status_code>\d+)(?:\s+(?<response_status_text>[^\r\n\\]+))?

# ----- Lookups -----
[safeline_action_lookup]
filename     = safeline_action.csv
case_sensitive_match = false

[safeline_attack_type_lookup]
filename     = safeline_attack_type.csv
case_sensitive_match = false
