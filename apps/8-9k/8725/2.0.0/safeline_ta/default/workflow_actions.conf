#
# SafeLine WAF — context menu actions on event fields
# Right-click on an IP, attack type, etc. in any search results to use these.
#

[safeline_ip_24h]
type = link
fields = src_ip
display_location = both
label = SafeLine: this IP — last 24h
search_label_eval = "SafeLine: this IP — last 24h"
link.method = get
link.target = blank
link.uri = /app/safeline_ta/safeline_ip_reputation?form.ip_tok=$src_ip$&form.tr.earliest=-24h&form.tr.latest=now

[safeline_site_dive]
type = link
fields = site_name
display_location = both
label = SafeLine: drill-down this site
link.method = get
link.target = blank
link.uri = /app/safeline_ta/safeline_site_detail?form.site_tok=$site_name$&form.tr.earliest=-24h&form.tr.latest=now

[safeline_attacks_for_type]
type = link
fields = attack_type
display_location = both
label = SafeLine: all events of this attack type
link.method = get
link.target = blank
link.uri = /app/safeline_ta/search?q=`safeline_waf`%20attack_type%3D%22$attack_type$%22&earliest=-24h&latest=now

[safeline_rule_drilldown]
type = link
fields = rule_id
display_location = both
label = SafeLine: events for this rule
link.method = get
link.target = blank
link.uri = /app/safeline_ta/search?q=`safeline_waf`%20rule_id%3D%22$rule_id$%22&earliest=-24h&latest=now

# OSINT: open the IP in third-party threat intel sites (NEW WINDOW).
# Disabled by default — enable in local/workflow_actions.conf if you want them.

[osint_virustotal_ip]
type = link
fields = src_ip
display_location = event_menu
label = OSINT: VirusTotal
link.method = get
link.target = blank
link.uri = https://www.virustotal.com/gui/ip-address/$src_ip$
disabled = 1

[osint_abuseipdb]
type = link
fields = src_ip
display_location = event_menu
label = OSINT: AbuseIPDB
link.method = get
link.target = blank
link.uri = https://www.abuseipdb.com/check/$src_ip$
disabled = 1

[osint_shodan]
type = link
fields = src_ip
display_location = event_menu
label = OSINT: Shodan
link.method = get
link.target = blank
link.uri = https://www.shodan.io/host/$src_ip$
disabled = 1
