#
# SafeLine WAF — sourcetype definition
#
# Sample event format:
# <date> <time> <syslog_host> 1 <ISO8601-Z> <node_id> /app/luigi 7 safeline_event - {"scheme":"https","src_ip":"...",...}
#

[safeline:waf]
SHOULD_LINEMERGE        = false
LINE_BREAKER            = ([\r\n]+)
TRUNCATE                = 200000
NO_BINARY_CHECK         = true
category                = Network & Security
description             = Chaitin SafeLine WAF events (RFC5424 syslog + JSON payload)
disabled                = false
pulldown_type           = true

# --- Time extraction ---
TIME_PREFIX             = ^\S+\s+\S+\s+\S+\s+\S+\s+\d+\s+
TIME_FORMAT             = %Y-%m-%dT%H:%M:%SZ
MAX_TIMESTAMP_LOOKAHEAD = 32
TZ                      = UTC

# --- Field extractions ---
KV_MODE                 = none
AUTO_KV_JSON            = false
ANNOTATE_PUNCT          = false

# Order: header → payload → KV (strings + primitives) → header parsing
REPORT-safeline_00_header        = safeline_syslog_header
REPORT-safeline_01_payload       = safeline_json_payload
REPORT-safeline_02_kv_strings    = safeline_json_kv_strings
REPORT-safeline_03_kv_primitives = safeline_json_kv_primitives
REPORT-safeline_04_req_headers   = safeline_req_headers
REPORT-safeline_05_req_line      = safeline_req_line
REPORT-safeline_06_resp_headers  = safeline_resp_headers
REPORT-safeline_07_resp_line     = safeline_resp_line

# ============================================================
# CIM aliases — Web / Network_Traffic / IDS / Alerts / Authentication
# ============================================================
FIELDALIAS-cim_src         = src_ip AS src
FIELDALIAS-cim_dest        = dest_ip AS dest
FIELDALIAS-cim_method      = method AS http_method
FIELDALIAS-cim_status      = status_code AS status
FIELDALIAS-cim_ua          = user_agent AS http_user_agent
FIELDALIAS-cim_host        = host AS http_host
FIELDALIAS-cim_url_path    = urlpath AS url_path
FIELDALIAS-cim_url_path2   = urlpath AS uri_path
FIELDALIAS-cim_query       = query_string AS uri_query
FIELDALIAS-cim_referer     = referer AS http_referrer
FIELDALIAS-cim_transport   = protocol AS transport
FIELDALIAS-cim_sig         = attack_type AS signature
FIELDALIAS-cim_rule        = rule_id AS signature_id
FIELDALIAS-cim_country     = country AS src_country
FIELDALIAS-cim_province    = province AS src_region
FIELDALIAS-cim_city        = city AS src_city
FIELDALIAS-cim_lat         = lat AS src_lat
FIELDALIAS-cim_lng         = lng AS src_long
FIELDALIAS-cim_session     = session AS session_id
FIELDALIAS-cim_event_id    = event_id AS uuid
FIELDALIAS-cim_node        = node AS dvc
FIELDALIAS-cim_site        = site_url AS site

# ============================================================
# Friendly aliases — readable names for the wire fields
# ============================================================
FIELDALIAS-req_truncated   = req_http_body_is_truncate AS req_body_truncated
FIELDALIAS-rsp_truncated   = rsp_http_body_is_truncate AS rsp_body_truncated
FIELDALIAS-body_abandoned  = http_body_is_abandoned    AS body_abandoned
FIELDALIAS-rsp_status      = resp_reason_phrase        AS http_status_reason
FIELDALIAS-policy_rule     = policy_rule_hit_name      AS policy_rule
FIELDALIAS-req_proxy       = req_proxy_name            AS request_proxy
FIELDALIAS-rsp_proxy       = rsp_proxy_name            AS response_proxy
FIELDALIAS-req_detector    = req_detector_name         AS request_detector_node
FIELDALIAS-rsp_detector    = rsp_detector_name         AS response_detector_node
FIELDALIAS-ja4             = ja4_fingerprint           AS tls_ja4

# ============================================================
# Calculated fields
# ============================================================
EVAL-vendor                 = "Chaitin"
EVAL-product                = "SafeLine WAF"
EVAL-vendor_product         = "Chaitin SafeLine WAF"
EVAL-app                    = "safeline"

# Hostname stripped from the SafeLine site URL — handy for charts (no scheme/path noise).
# Also exposed as `site_name` for legibility. Uses split() so we don't depend on regex backrefs.
EVAL-site_host              = if(isnotnull(site_url), mvindex(split(replace(site_url,"^https?://",""),"/"),0), null())
EVAL-site_name              = coalesce(site_host, site_url, http_host)

# Full URL reconstruction
EVAL-url                    = if(isnull(site_url), "", site_url) . if(isnull(urlpath), "", urlpath) . if(isnull(query_string) OR query_string="", "", "?" . query_string)

# CIM action normalisation
EVAL-action_cim             = case( \
                                 like(action,"allow%"),  "allowed", \
                                 like(action,"block%"),  "blocked", \
                                 like(action,"deny%"),   "blocked", \
                                 like(action,"drop%"),   "blocked", \
                                 like(action,"chal%"),   "blocked", \
                                 like(action,"log%"),    "allowed", \
                                 true(),                 action)
EVAL-blocked                = if(match(action,"^(deny|block|drop|challenge)"), 1, 0)

# CIM severity normalisation
EVAL-severity               = case( \
                                 risk_level=="critical", "critical", \
                                 risk_level=="high",     "high", \
                                 risk_level=="medium",   "medium", \
                                 risk_level=="low",      "low", \
                                 risk_level=="none",     "informational", \
                                 isnull(risk_level),     "informational", \
                                 true(),                 "informational")
EVAL-severity_id            = case( \
                                 risk_level=="critical", 5, \
                                 risk_level=="high",     4, \
                                 risk_level=="medium",   3, \
                                 risk_level=="low",      2, \
                                 risk_level=="none",     1, \
                                 true(),                 1)

# Bytes
EVAL-bytes_in               = if(isnotnull(req_payload),  len(req_payload),  null())
EVAL-bytes_out              = if(isnotnull(rsp_payload),  len(rsp_payload),  null())
EVAL-bytes                  = coalesce(bytes_in,0) + coalesce(bytes_out,0)

# Latency / timing (ms → seconds for CIM `duration`)
EVAL-req_duration_ms        = if(isnotnull(req_end_time)  AND isnotnull(req_start_time), req_end_time-req_start_time, null())
EVAL-rsp_duration_ms        = if(isnotnull(rsp_end_time)  AND isnotnull(rsp_start_time), rsp_end_time-rsp_start_time, null())
EVAL-total_duration_ms      = if(isnotnull(rsp_end_time)  AND isnotnull(req_start_time), rsp_end_time-req_start_time, null())
EVAL-duration               = case(isnotnull(total_duration_ms), total_duration_ms/1000.0, true(), null())
EVAL-detect_time_ms         = coalesce(req_detect_time,0) + coalesce(rsp_detect_time,0)

# Booleans
EVAL-is_attack              = if(attack_type!="unknown" AND isnotnull(attack_type), 1, 0)
EVAL-is_https               = if(scheme=="https" OR protocol=="https", 1, 0)
EVAL-is_truncated           = if(req_http_body_is_truncate==1 OR rsp_http_body_is_truncate==1, 1, 0)
EVAL-src_is_private         = if(cidrmatch("10.0.0.0/8",src_ip) OR cidrmatch("172.16.0.0/12",src_ip) OR cidrmatch("192.168.0.0/16",src_ip) OR cidrmatch("127.0.0.0/8",src_ip), 1, 0)

# Geo / coordinates
EVAL-src_lat_num            = if(isnotnull(lat),  tonumber(lat),  null())
EVAL-src_long_num           = if(isnotnull(lng),  tonumber(lng),  null())
EVAL-geo_coords             = if(isnotnull(lat) AND isnotnull(lng), lat . "," . lng, null())

# JA4 family (first 10 chars are a coarse fingerprint family)
EVAL-tls_ja4_family         = if(isnotnull(ja4_fingerprint), substr(ja4_fingerprint,1,10), null())

# Pull a few common HTTP headers out of the raw header blobs.
# (The line-by-line transforms below build req_headers / resp_headers; these EVALs
#  surface specific headers as first-class fields.)
EVAL-req_content_length     = if(isnotnull(req_header_raw),  mvindex(mvfilter(match(split(req_header_raw,"\n"),"(?i)^content-length:")),0), null())
EVAL-req_content_type       = if(isnotnull(req_header_raw),  mvindex(mvfilter(match(split(req_header_raw,"\n"),"(?i)^content-type:")),0), null())
EVAL-req_x_forwarded_for    = if(isnotnull(req_header_raw),  mvindex(mvfilter(match(split(req_header_raw,"\n"),"(?i)^x-forwarded-for:")),0), null())
EVAL-rsp_content_length     = if(isnotnull(resp_header_raw), mvindex(mvfilter(match(split(resp_header_raw,"\n"),"(?i)^content-length:")),0), null())
EVAL-rsp_content_type       = if(isnotnull(resp_header_raw), mvindex(mvfilter(match(split(resp_header_raw,"\n"),"(?i)^content-type:")),0), null())

# ============================================================
# Lookups
# ============================================================
LOOKUP-safeline_action      = safeline_action_lookup action OUTPUT action_label
LOOKUP-safeline_attack_type = safeline_attack_type_lookup attack_type OUTPUT attack_category, attack_description
