#
# SafeLine WAF — event types for CIM tagging
#

[safeline_waf]
search = sourcetype="safeline:waf"
#tags   = web attack ids network

[safeline_waf_attack]
search = sourcetype="safeline:waf" risk_level!="none" attack_type!="unknown"

[safeline_waf_blocked]
search = sourcetype="safeline:waf" (action=deny OR action=block OR action=drop)

[safeline_waf_allowed]
search = sourcetype="safeline:waf" action=allow
