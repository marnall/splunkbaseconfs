#
# SafeLine WAF — search macros
#

[safeline_waf]
definition = sourcetype="safeline:waf"
iseval     = 0
description = Base search for SafeLine WAF events.

[safeline_attacks]
definition = sourcetype="safeline:waf" risk_level!="none" attack_type!="unknown"
iseval     = 0
description = SafeLine events that triggered a WAF detection.

[safeline_blocked]
definition = sourcetype="safeline:waf" (action=deny OR action=block OR action=drop)
iseval     = 0
description = SafeLine requests that were blocked.

# Use when you want to re-extract the JSON payload as fields explicitly (rarely needed —
# the auto-extract already does this — but useful for nested objects).
[safeline_spath]
definition = spath input=json_payload
iseval     = 0
description = Re-parses the captured JSON payload through spath.
