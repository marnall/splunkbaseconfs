# default/transforms.conf

#####################################################################
# 1) Login success: "User Login Success: <user>"
#####################################################################
[nucleus_login_success]
REGEX = User\s+Login\s+Success:\s*(?<nucleus.user>[^\"\\r\\n]+)
FORMAT = nucleus.action::login nucleus.outcome::success
WRITE_META = true


#####################################################################
# 2) Logout success: "User Logout Success: <user>"
#####################################################################
[nucleus_logout_success]
REGEX = User\s+Logout\s+Success:\s*(?<nucleus.user>[^\"\\r\\n]+)
FORMAT = nucleus.action::logout nucleus.outcome::success
WRITE_META = true


#####################################################################
# 3) Username + Browser:
#    "Username: <user> Browser: <ua string>"
#####################################################################
[nucleus_username_browser]
REGEX = Username:\s*(?<nucleus.user>[^\"\\r\\n]+?)\s+Browser:\s*(?<nucleus.browser>[^\"\\r\\n]+)
FORMAT =
WRITE_META = true


#####################################################################
# 4) Username logged out:
#    "Username: <user> Logged out"
#####################################################################
[nucleus_username_logged_out]
REGEX = Username:\s*(?<nucleus.user>[^\"\\r\\n]+?)\s+Logged\s+out
FORMAT = nucleus.action::logout nucleus.outcome::success
WRITE_META = true


#####################################################################
# 5) Role modified:
# "User Role Modified - <target_user> - OrgId: <orgid> -  - Username: <actor> - Changes = <changes>;"
#####################################################################
[nucleus_role_modified]
REGEX = User\s+Role\s+Modified\s*-\s*(?<nucleus.target_user>[^\\s-][^\"\\r\\n]*?)\s*-\s*OrgId:\s*(?<nucleus.org_id>\\d+)\s*-\s*-\s*Username:\s*(?<nucleus.actor>[^\"\\r\\n]+?)\s*-\s*Changes\\s*=\\s*(?<nucleus.changes>[^\"\\r\\n]+)
FORMAT = nucleus.action::role_modified nucleus.outcome::success
WRITE_META = true


#####################################################################
# 6) Generic email capture from details (fallback)
# This helps populate nucleus.user when the message contains an email.
#####################################################################
[nucleus_generic_email]
REGEX = (?i)(?<nucleus.email>[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,})
FORMAT =
WRITE_META = true
