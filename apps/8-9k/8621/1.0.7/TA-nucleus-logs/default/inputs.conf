# Example configuration - disabled by default
# Users should create their own configuration in local/inputs.conf or via Splunk Web UI

[nucleus_logs]
python.version = python3

[nucleus_logs://example_disabled]
disabled = 1
base_url = https://example.nucleussec.com
api_key = YOUR_API_KEY_HERE
interval = 300
limit = 500
initial_since_minutes = 60
verify_ssl = true
index = nucleus
event_sourcetype = nucleus:logs