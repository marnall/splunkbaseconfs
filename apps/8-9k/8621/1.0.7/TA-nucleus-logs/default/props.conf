[nucleus:logs]
SHOULD_LINEMERGE = false
KV_MODE = json
TRUNCATE = 0
EVAL.user = coalesce('nucleus.user','nucleus.actor','nucleus.target_user','nucleus.email')

# Use the JSON field "datetime" as event time
TIMESTAMP_FIELDS = datetime
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 19
TZ = UTC

# Run extractions against the raw event text (JSON string containing "details": "...")
REPORT-nucleus_extract = nucleus_login_success, nucleus_logout_success, nucleus_username_browser, nucleus_username_logged_out, nucleus_role_modified, nucleus_generic_email

# Optional: tag source info consistently if you like
# (Only if your input isn't already setting sourcetype/index)
# sourcetype = nucleus:logs

