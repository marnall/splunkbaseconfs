[method:audit]
SHOULD_LINEMERGE = false
KV_MODE = json
AUTO_KV_JSON = true
TRUNCATE = 0
FIELDALIAS-action_type   = action.type   AS action_type
FIELDALIAS-actor_type    = actor.type    AS actor_type
FIELDALIAS-actor_id      = actor.id      AS actor_id
FIELDALIAS-actor_email   = actor.email   AS actor_email
FIELDALIAS-actor_name    = actor.name    AS actor_name
FIELDALIAS-resource_type = resource.type AS resource_type
FIELDALIAS-source_ip     = context.sourceIp AS source_ip
FIELDALIAS-event_id      = id AS event_id
FIELDALIAS-tenant        = tenantId AS tenant_id
