[launcher]
version = 1.1.1
description = This app collects and indexes operational insights from Cisco Business Critical Services (BCS) APIs into Splunk, automating the collection of device inventory, configuration best practices, security advisories, and lifecycle alerts. It simplifies API authentication and rate limiting, enabling Cisco Advanced Services customers to monitor and analyze their network operations efficiently.
author = Israel Fernandez

[id]
version = 1.1.1
name = TA-lcs-plug-in

[install]
build = 1777074646
is_configured = false
state = enabled

[package]
id = TA-lcs-plug-in
check_for_updates = true

[ui]
label = LCS Plug-In
is_visible = true

[triggers]
reload.lcs_plug_in_settings = simple
reload.lcs_plug_in_account = simple
