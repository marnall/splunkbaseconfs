# Layer7 live parsing
[L7SecLog]
SHOULD_LINEMERGE = false
TRUNCATE = 200000
BREAK_ONLY_BEFORE = ^(?:AlertDetails|VulnDetails|NoteDetails)
TIME_PREFIX = ^(?:AlertDetails|VulnDetails|NoteDetails)\s+
TIME_FORMAT = %Y%m%d::%H%M%S
MAX_TIMESTAMP_LOOKAHEAD = 30
REPORT-l7-alert = l7-alert-fields
REPORT-l7-vuln = l7-vuln-fields
REPORT-l7-note = l7-note-fields
REPORT-l7-kv = l7-kv-tokens
FIELDALIAS-l7-common = Category AS category_raw
LOOKUP-l7-severity = l7-priority-lookup Priority OUTPUTNEW Severity Risk
FIELDALIAS-l7-ecs = Alert_Type AS eventtype, System AS host, Source_IP AS src_ip, Target_IP AS dst_ip
EVAL-category = case(match(_raw,"^AlertDetails"),"alert", match(_raw,"^VulnDetails"),"vulnerability", match(_raw,"^NoteDetails"),"security_note", true(), coalesce(category,"unknown"))
EVAL-SYSTEMENVIRONMENTTEXT = coalesce(SYSTEMENVIRONMENTTEXT, "Production")

[L7Vuln]
SHOULD_LINEMERGE = false
TRUNCATE = 200000
BREAK_ONLY_BEFORE = ^VulnDetails
TIME_PREFIX = ^VulnDetails\s+
TIME_FORMAT = %Y%m%d::%H%M%S
MAX_TIMESTAMP_LOOKAHEAD = 30
REPORT-l7-vuln = l7-vuln-fields
REPORT-l7-kv = l7-kv-tokens
EVAL-category = "vulnerability"
EVAL-SYSTEMENVIRONMENTTEXT = coalesce(SYSTEMENVIRONMENTTEXT, "Production")

[L7Note]
SHOULD_LINEMERGE = false
TRUNCATE = 200000
BREAK_ONLY_BEFORE = ^NoteDetails
TIME_PREFIX = ^NoteDetails\s+
TIME_FORMAT = %Y%m%d::%H%M%S
MAX_TIMESTAMP_LOOKAHEAD = 30
REPORT-l7-note = l7-note-fields
REPORT-l7-kv = l7-kv-tokens
EVAL-category = "security_note"
EVAL-SYSTEMENVIRONMENTTEXT = coalesce(SYSTEMENVIRONMENTTEXT, "Production")
