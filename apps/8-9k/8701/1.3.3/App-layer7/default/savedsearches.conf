[CompanyX - Overview: Events by Category (24h)]
search = index=layer7 (sourcetype=L7SecLog OR sourcetype=L7Vuln OR sourcetype=L7Note) \
 | eval cat=case(sourcetype="L7SecLog","Alerts", sourcetype="L7Vuln","Vulnerabilities", sourcetype="L7Note","Patches", true(),"Other") \
 | timechart span=1h count by cat
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 0

[CompanyX - Alerts by Priority (24h)]
search = index=layer7 sourcetype=L7SecLog \
 | eval pr=coalesce(priority, Priority) \
 | timechart span=1h count by pr
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 0

[CompanyX - Vulnerabilities by Status (7d)]
search = index=layer7 sourcetype=L7Vuln \
 | stats count by System, Category, Name, Status, Priority
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 0

[CompanyX - Patch/Notes by Status (7d)]
search = index=layer7 sourcetype=L7Note \
 | stats count by System, Category, Name, Status, Priority
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 0

[ALERT - Critical Alerts > 0 (last 15m)]
search = index=layer7 sourcetype=L7SecLog (Priority>=9 OR Severity="Critical") \
 | stats count AS critical_events
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.track = 1
actions = email
action.email.to = you@example.com
action.email.subject = Critical L7 Alerts detected ($name$) — $time$

[Layer7 - Daily Summary (Last 24h)]
search = `l7s_base(index="layer7")` \
 | stats count as total by Alert_Type \
 | appendcols [ `l7_base` | stats sum(eval(Priority>=9)) as critical ]
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 1
cron_schedule = 0 5 * * *
alert.track = 0

[Layer7 - Critical Alerts (Priority>=9)]
search = `l7_base` \
 | where Priority>=9 \
 | table _time System Alert_Name Alert_Type Priority src_ip dst_ip
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */15 * * * *
alert.track = 1
actions =
