scription=case(match(coalesce(Name,""),"^0*[0-9]{6,}$"), Description, match(coalesce(Description,""),"^0*[0-9]{6,}$"), Name, match(lower(coalesce(Description,"")),"^undefined(?:::|$)"), "", match(lower(coalesce(Name,"")),"(?i)^(hot news|high|medium|low)$"), "", true(), coalesce(Description, Name, "")), Note_Status=case(match(lower(coalesce(Status,"")),"^open"),"Open", match(lower(coalesce(Status,"")),"^implemented"),"Implemented", match(lower(coalesce(Status,"")),"^new"),"New", match(lower(coalesce(Status,"")),"^postponed"),"Postponed", match(lower(coalesce(Status,"")),"^remediation in progress"),"Remediation In Progress", match(lower(coalesce(Status,"")),"^to be implemented"),"To Be Implemented", match(lower(coalesce(Status,"")),"^resolved"),"Resolved", match(lower(coalesce(Status,"")),"^closed"),"Closed", match(lower(coalesce(Status_Text,"")),"^open"),"Open", match(lower(coalesce(Status_Text,"")),"^implemented"),"Implemented", match(lower(coalesce(Status_Text,"")),"^new"),"New", match(lower(coalesce(Status_Text,"")),"^postponed"),"Postponed", match(lower(coalesce(Status_Text,"")),"^remediation in progress"),"Remediation In Progress", match(lower(coalesce(Status_Text,"")),"^to be implemented"),"To Be Implemented", lower(coalesce(Status,""))=="undefined","Open", lower(coalesce(Status_Text,""))=="undefined","Open", isnull(Status) OR Status=="","Open", true(), coalesce(Vuln_Status,Status_Text,Status,"Open")), STATUS_RAW=trim(coalesce(Status, "")), Vuln_Status_Clean=case(match(lower(coalesce(Vuln_Status,STATUS_RAW,"")),"^open"),"Open", match(lower(coalesce(Vuln_Status,STATUS_RAW,"")),"^new"),"New", match(lower(coalesce(Vuln_Status,STATUS_RAW,"")),"^implemented"),"Implemented", match(lower(coalesce(Vuln_Status,STATUS_RAW,"")),"^postponed"),"Postponed", match(lower(coalesce(Vuln_Status,STATUS_RAW,"")),"^remediation in progress"),"Remediation In Progress", match(lower(coalesce(Vuln_Status,STATUS_RAW,"")),"^to be implemented"),"To Be Implemented", match(lower(coalesce(Vuln_Status,STATUS_RAW,"")),"^resolved"),"Resolved", match(lower(coalesce(Vuln_Status,STATUS_RAW,"")),"^closed"),"Closed", match(lower(coalesce(Vuln_Status,STATUS_RAW,"")),"^irrelevant"),"Irrelevant", true(), coalesce(Vuln_Status,"Open")), Note_Status_Clean=case(match(lower(coalesce(Note_Status,STATUS_RAW,"")),"^open"),"Open", match(lower(coalesce(Note_Status,STATUS_RAW,"")),"^new"),"New", match(lower(coalesce(Note_Status,STATUS_RAW,"")),"^implemented"),"Implemented", match(lower(coalesce(Note_Status,STATUS_RAW,"")),"^postponed"),"Postponed", match(lower(coalesce(Note_Status,STATUS_RAW,"")),"^remediation in progress"),"Remediation In Progress", match(lower(coalesce(Note_Status,STATUS_RAW,"")),"^to be implemented"),"To Be Implemented", match(lower(coalesce(Note_Status,STATUS_RAW,"")),"^resolved"),"Resolved", match(lower(coalesce(Note_Status,STATUS_RAW,"")),"^closed"),"Closed", match(lower(coalesce(Note_Status,STATUS_RAW,"")),"^irrelevant"),"Irrelevant", true(), coalesce(Note_Status,"Open"))
iseval = 0

[l7_env_filter(1)]
args = env
definition = where ("$env$"="*" OR "$env$"="All" OR SYSTEMENVIRONMENTTEXT="$env$" OR Environment="$env$" OR ENVIRONMENT="$env$")
iseval = 0

[l7_system_filter(1)]
args = system
definition = where ("$system$"=".*" OR "$system$"="*" OR "$system$"="All Systems" OR "$system$"="All" OR match(coalesce(System,SYSTEM,""), "^(" . "$system$" . ")$"))
iseval = 0

[l7_status_filter(1)]
args = status
definition = where ("$status$"="*" OR "$status$"=".*" OR "$status$"="All" OR "$status$"="All Statuses" OR match(upper(coalesce(STATUS,"")), "^(" . upper("$status$") . ")$"))
iseval = 0

[l7_vulns_current]
definition = `l7_vulns` | lookup layer7_vulns_with_ids.csv CATEGORY as Vuln_Category NAME as Vuln_Title DESCRIPTION as Description OUTPUTNEW TECHNICAL_NAME, PRIORITY as LOOKUP_PRIORITY | eval _status_raw=trim(coalesce(Status,"")), _status_after_code=case(match(_status_raw,"^[A-Z][0-9]+::"),replace(_status_raw,"^[^:]+::",""), match(_status_raw,"^[A-Z][0-9]+$"),null(), true(),_status_raw), CHECKID=coalesce(TECHNICAL_NAME, Check_ID, if(match(_status_raw,"^[A-Z][0-9]+"),replace(_status_raw,"::.*$",""),null()), Vuln_Code), VULNERABILITY=coalesce(Vuln_Title, Description, Name, Status_Text), CATEGORY=coalesce(Vuln_Category, Category, "-"), PRIORITY_RAW=coalesce(LOOKUP_PRIORITY, Vuln_Severity, Priority_Label, Priority), PRIORITY=case(match(lower(coalesce(PRIORITY_RAW,"")),"^critical$"),"Critical", match(lower(coalesce(PRIORITY_RAW,"")),"^high$"),"High", match(lower(coalesce(PRIORITY_RAW,"")),"^medium$"),"Medium", match(lower(coalesce(PRIORITY_RAW,"")),"^low$"),"Low", true(),null()), STATUS_RAW=coalesce(_status_after_code,Vuln_Status,Status_Text,Status,"Open"), STATUS=case(match(lower(coalesce(STATUS_RAW,"")),"^open$"),"Open", match(lower(coalesce(STATUS_RAW,"")),"^new$"),"New", match(lower(coalesce(STATUS_RAW,"")),"^risk accepted$"),"Risk Accepted", match(lower(coalesce(STATUS_RAW,"")),"^risk mitigated$"),"Risk Mitigated", match(lower(coalesce(STATUS_RAW,"")),"^remediation scheduled$"),"Remediation Scheduled", match(lower(coalesce(STATUS_RAW,"")),"^remediation in progress$"),"Remediation In Progress", match(lower(coalesce(STATUS_RAW,"")),"^implemented$"),"Implemented", match(lower(coalesce(STATUS_RAW,"")),"^postponed$"),"Postponed", match(lower(coalesce(STATUS_RAW,"")),"^to be implemented$"),"To Be Implemented", match(lower(coalesce(STATUS_RAW,"")),"^resolved$"),"Resolved", match(lower(coalesce(STATUS_RAW,"")),"^closed$"),"Closed", match(lower(coalesce(STATUS_RAW,"")),"^irrelevant$"),"Irrelevant", lower(coalesce(STATUS_RAW,""))=="undefined" OR isnull(STATUS_RAW) OR STATUS_RAW=="","Open", match(coalesce(STATUS_RAW,""),"^[A-Z][0-9]+$"),"Open", true(),STATUS_RAW), Vuln_Status=STATUS, Vuln_Status_Clean=STATUS, SYSTEM=coalesce(System, MO_NAME), SYSTEM_TYPE=case(isnotnull(coalesce(System_Type, MO_TYPE)) AND coalesce(System_Type, MO_TYPE)!="", replace(coalesce(System_Type, MO_TYPE),"^([^-~]+)[-~].*$","\1"), true(),coalesce(System_Type, MO_TYPE)), ENVIRONMENT=coalesce(Environment, SYSTEMENVIRONMENTTEXT, "Production") | where isnotnull(CHECKID) AND CHECKID!="" | eval DEDUP_KEY=coalesce(SYSTEM,"") . "||" . coalesce(SYSTEM_TYPE,"") . "||" . coalesce(ENVIRONMENT,"") . "||" . coalesce(CHECKID,"") | sort 0 - _indextime - _time | dedup DEDUP_KEY | fillnull value="Medium" PRIORITY
iseval = 0

[l7_notes_current]
definition = `l7_notes` | eval _n_name=trim(coalesce(Name,"")), _n_desc=trim(coalesce(Description,"")), _n_status=trim(coalesce(Status,"")), _n_pri=trim(coalesce(Priority,"")), SYSTEM=coalesce(System, MO_NAME), SYSTEM_TYPE=case(isnotnull(coalesce(System_Type, MO_TYPE)) AND coalesce(System_Type, MO_TYPE)!="", replace(coalesce(System_Type, MO_TYPE),"^([^-~]+)[-~].*$","\1"), true(),coalesce(System_Type, MO_TYPE)), ENVIRONMENT=coalesce(Environment, SYSTEMENVIRONMENTTEXT, "Production") | eval NOTE_NUMBER=tostring(case(match(_n_name,"^0*[0-9]{6,}$"),_n_name, match(_n_desc,"^0*[0-9]{6,}$"),_n_desc, match(_n_status,"^0*[0-9]{6,}$"),_n_status, match(_n_pri,"^0*[0-9]{6,}$"),_n_pri, true(),coalesce(Note_Number,""))), NOTE_NUMBER_KEY=replace(NOTE_NUMBER,"^0+","") | lookup layer7_notes.csv "NOTE NUMBER" as NOTE_NUMBER_KEY OUTPUTNEW "NOTE DESCRIPTION" as LOOKUP_NOTE_DESCRIPTION, PRIORITY as LOOKUP_PRIORITY | eval _status_re="(?i)(Undefined|Open|New|Risk Accepted|Risk Mitigated|Remediation Scheduled|Remediation In Progress|Implemented|Postponed|To Be Implemented|Resolved|Closed|Irrelevant)" | eval _combo_status_src=coalesce(if(match(_n_status,"(?i)::(Undefined|Open|New|Risk Accepted|Risk Mitigated|Remediation Scheduled|Remediation In Progress|Implemented|Postponed|To Be Implemented|Resolved|Closed|Irrelevant)(::[0-9]{8,})?$"),_n_status,null()), if(match(_n_desc,"(?i)::(Undefined|Open|New|Risk Accepted|Risk Mitigated|Remediation Scheduled|Remediation In Progress|Implemented|Postponed|To Be Implemented|Resolved|Closed|Irrelevant)(::[0-9]{8,})?$"),_n_desc,null()), if(match(_n_name,"(?i)::(Undefined|Open|New|Risk Accepted|Risk Mitigated|Remediation Scheduled|Remediation In Progress|Implemented|Postponed|To Be Implemented|Resolved|Closed|Irrelevant)(::[0-9]{8,})?$"),_n_name,null()), "") | eval _combo_status=if(_combo_status_src!="", replace(_combo_status_src,"(?i)^.*::(Undefined|Open|New|Risk Accepted|Risk Mitigated|Remediation Scheduled|Remediation In Progress|Implemented|Postponed|To Be Implemented|Resolved|Closed|Irrelevant)(::[0-9]{8,})?$","\1"), null()) | eval _combo_desc=if(_combo_status_src!="", replace(_combo_status_src,"(?i)::(Undefined|Open|New|Risk Accepted|Risk Mitigated|Remediation Scheduled|Remediation In Progress|Implemented|Postponed|To Be Implemented|Resolved|Closed|Irrelevant)(::[0-9]{8,})?$",""), null()) | eval PRIORITY=case(LOOKUP_PRIORITY=="1" OR match(lower(_n_name),"^hot ?news$") OR match(lower(_n_desc),"^hot ?news$") OR match(lower(_n_status),"^hot ?news$") OR match(lower(_n_pri),"^hot ?news$"),"Hot News", LOOKUP_PRIORITY=="2" OR lower(_n_name)=="high" OR lower(_n_desc)=="high" OR lower(_n_status)=="high" OR lower(_n_pri)=="high","High", LOOKUP_PRIORITY=="3" OR lower(_n_name)=="medium" OR lower(_n_desc)=="medium" OR lower(_n_status)=="medium" OR lower(_n_pri)=="medium","Medium", LOOKUP_PRIORITY=="4" OR lower(_n_name)=="low" OR lower(_n_desc)=="low" OR lower(_n_status)=="low" OR lower(_n_pri)=="low","Low", true(),"Medium") | eval STATUS_RAW=coalesce(_combo_status, if(match(lower(_n_status),"^(open|new|risk accepted|risk mitigated|remediation scheduled|remediation in progress|implemented|postponed|to be implemented|resolved|closed|irrelevant|undefined)$"),_n_status,null()), if(match(lower(_n_desc),"^(open|new|risk accepted|risk mitigated|remediation scheduled|remediation in progress|implemented|postponed|to be implemented|resolved|closed|irrelevant|undefined)$"),_n_desc,null()), if(match(lower(_n_name),"^(open|new|risk accepted|risk mitigated|remediation scheduled|remediation in progress|implemented|postponed|to be implemented|resolved|closed|irrelevant|undefined)$"),_n_name,null()), "Open") | eval STATUS=case(match(lower(STATUS_RAW),"^open$"),"Open", match(lower(STATUS_RAW),"^new$"),"New", match(lower(STATUS_RAW),"^risk accepted$"),"Risk Accepted", match(lower(STATUS_RAW),"^risk mitigated$"),"Risk Mitigated", match(lower(STATUS_RAW),"^remediation scheduled$"),"Remediation Scheduled", match(lower(STATUS_RAW),"^remediation in progress$"),"Remediation In Progress", match(lower(STATUS_RAW),"^implemented$"),"Implemented", match(lower(STATUS_RAW),"^postponed$"),"Postponed", match(lower(STATUS_RAW),"^to be implemented$"),"To Be Implemented", match(lower(STATUS_RAW),"^resolved$"),"Resolved", match(lower(STATUS_RAW),"^closed$"),"Closed", match(lower(STATUS_RAW),"^irrelevant$"),"Irrelevant", lower(STATUS_RAW)=="undefined" OR STATUS_RAW=="" OR isnull(STATUS_RAW),"Open", true(),"Open"), Note_Status=STATUS, Note_Status_Clean=STATUS | eval _desc_candidate=coalesce(LOOKUP_NOTE_DESCRIPTION, _combo_desc, if(match(_n_name,"(?i)^\[CVE-"),_n_name,null()), if(match(_n_desc,"(?i)^\[CVE-"),_n_desc,null()), if(match(_n_status,"(?i)^\[CVE-"),replace(_n_status,"(?i)::(Undefined|Open|New|Risk Accepted|Risk Mitigated|Remediation Scheduled|Remediation In Progress|Implemented|Postponed|To Be Implemented|Resolved|Closed|Irrelevant)(::[0-9]{8,})?$",""),null()), if(len(_n_desc)>12 AND NOT match(lower(_n_desc),"^(open|new|risk accepted|risk mitigated|remediation scheduled|remediation in progress|implemented|postponed|to be implemented|resolved|closed|irrelevant|hot ?news|high|medium|low)$") AND NOT match(_n_desc,"^0*[0-9]{6,}$"), _n_desc, null()), if(len(_n_name)>12 AND NOT match(lower(_n_name),"^(open|new|risk accepted|risk mitigated|remediation scheduled|remediation in progress|implemented|postponed|to be implemented|resolved|closed|irrelevant|hot ?news|high|medium|low)$") AND NOT match(_n_name,"^0*[0-9]{6,}$"), _n_name, null()), "Unknown note description") | eval NOTE_DESCRIPTION=trim(replace(_desc_candidate,"(?i)::Undefined::[0-9]{8,}$","")) | where isnotnull(NOTE_NUMBER) AND NOTE_NUMBER!="" | eval DEDUP_KEY=coalesce(SYSTEM,"") . "||" . coalesce(SYSTEM_TYPE,"") . "||" . coalesce(ENVIRONMENT,"") . "||" . coalesce(NOTE_NUMBER,"") | sort 0 - _indextime - _time | dedup DEDUP_KEY
iseval = 0

[l7_alerts]
definition = `l7_base` | `l7_normalize` | where category="alert"
iseval = 0

[l7_vulns]
definition = `l7_base` | `l7_normalize` | where category="vulnerability"
iseval = 0

[l7_notes]
definition = `l7_base` | `l7_normalize` | where category="security_note"
iseval = 0
