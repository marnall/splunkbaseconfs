[l7-alert-fields]
REGEX = ^AlertDetails\s+(\d{8})::(\d{6})::(?:([^:]+)::)?([^:~]+)(?:~([^:~-]+)(?:[-~][^:]+)?)?::([^:]+)::([^:]+)::(\d+)::([^:]+)::(.*)$
FORMAT = Date::$1 Time::$2 SYSTEMENVIRONMENTTEXT::$3 System::$4 System_Type::$5 Category::$6 Alert_Type::$7 Priority::$8 Alert_Name::$9 Alert_Details::$10

[l7-vuln-fields]
REGEX = ^VulnDetails\s+(\d{8})::(\d{6})::(?:([^:]+)::)?([^:~]+)(?:~([^:~-]+)(?:[-~][^:]+)?)?::([^:]+)::([^:]+)::([^:]+)::([^:]+)::(.*)$
FORMAT = Date::$1 Time::$2 SYSTEMENVIRONMENTTEXT::$3 System::$4 System_Type::$5 Category::$6 Priority::$7 Name::$8 Description::$9 Status::$10

[l7-note-fields]
REGEX = ^NoteDetails\s+(\d{8})::(\d{6})::(?:([^:]+)::)?([^:~]+)(?:~([^:~-]+)(?:[-~][^:]+)?)?::([^:]+)::([^:]+)::([^:]+)::([^:]+)::(.*)$
FORMAT = Date::$1 Time::$2 SYSTEMENVIRONMENTTEXT::$3 System::$4 System_Type::$5 Category::$6 Priority::$7 Name::$8 Description::$9 Status::$10

[l7-kv-tokens]
REGEX = (?:(?<=^)|/)([A-Z0-9_]+):([^/\r\n]*)
FORMAT = $1::$2
MV_ADD = true

[l7-priority-lookup]
filename = l7-priority-lookup.csv
case_sensitive_match = false

[system_environment]
filename = system_environment.csv
