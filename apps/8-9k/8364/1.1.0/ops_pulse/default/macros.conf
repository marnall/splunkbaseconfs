[ops_base_search(1)]
args = index
definition = index=$index$ | eval is_error=if(severity IN ("error","critical"),1,0)
iseval = 0

# baseline calculation
[ops_pulse_volume_baseline(1)]
args = index
definition = `ops_base_search($index$)` | timechart span=1h count AS events | eventstats avg(events) AS baseline stdev(events) AS sd
iseval = 0

# spike detection
[ops_pulse_volume_spike(1)]
args = index
definition = `ops_pulse_volume_baseline($index$)` | eval spike=if(events > baseline + (2*sd),1,0)
iseval = 0

# error rate calculation
[ops_pulse_error_rate_ts(1)]
args = index
definition = `ops_base_search($index$)` | timechart span=1h sum(is_error) AS errors count AS total | eval error_rate=round((errors/total)*100,2)
iseval = 0

# error spike detection
[ops_pulse_error_spike(1)]
args = index
definition = `ops_pulse_error_rate_ts($index$)` | eventstats avg(error_rate) AS avg_error | eval spike=if(error_rate > avg_error*1.5 AND error_rate > 5,1,0)
iseval = 0

# health score calculation
[ops_pulse_health_score(1)]
args = index
definition = `ops_base_search($index$)` | stats count AS total sum(is_error) AS errors | eval errors=coalesce(errors,0) | eval health_score=round(100-(errors/total)*100,2)
iseval = 0

# stability score calculation
[ops_pulse_stability_score_ts(1)]
args = index
definition = `ops_base_search($index$)` | timechart span=1h count AS events sum(is_error) AS errors | eval error_rate=(errors/events)*100 | streamstats window=6 avg(events) AS avg_events stdev(events) AS sd_events | streamstats window=6 avg(error_rate) AS avg_err stdev(error_rate) AS sd_err | eval vol_cv=if(avg_events>0,sd_events/avg_events,0) | eval err_cv=if(avg_err>0,sd_err/avg_err,0) | eval stability_score=round(100-((vol_cv+err_cv)*50),2) | eval stability_score=case(stability_score>100,100,stability_score<0,0,true(),stability_score)
iseval = 0

[ops_pulse_volume_anomaly(1)]
args = index
definition = `ops_pulse_volume_baseline($index$)` | eval anomaly = if(events > baseline + (2 * sd) OR events < baseline - (2 * sd), 1, 0)
iseval = 0

[ops_pulse_rolling_error_trend(1)]
args = index
definition = `ops_pulse_error_rate_ts($index$)` | streamstats window=6 avg(error_rate) AS rolling_error_rate
iseval = 0

