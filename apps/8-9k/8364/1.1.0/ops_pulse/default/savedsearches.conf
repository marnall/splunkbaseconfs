[OpsPulse_Error_Spike]
search = `ops_base_search($index$)` | timechart span=15m sum(is_error) AS errors count AS total | eval error_rate=(errors/total)*100 | eventstats avg(error_rate) AS avg | where error_rate > avg*1.5 AND error_rate > 5
cron_schedule = */15 * * * *
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
actions = 
disabled = 1


[OpsPulse_Health_Degradation]
search = `ops_base_search($index$)` | stats count AS total sum(is_error) AS errors | eval health=100-(errors/total*100) | where health < 90
cron_schedule = */30 * * * *
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
actions = 
disabled = 1


