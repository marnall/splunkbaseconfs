[admin:cloudflare_status_configuration]
match = /
members = cloudflare_status_settings

[admin:cloudflare_status_inputs]
match = /
members = cloudflare_status_cloudflare_status

[admin_external:cloudflare_status_settings]
handlertype = python
python.version = python3
handlerfile = cloudflare_status_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:cloudflare_status_cloudflare_status]
handlertype = python
python.version = python3
handlerfile = cloudflare_status_rh_cloudflare_status.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
