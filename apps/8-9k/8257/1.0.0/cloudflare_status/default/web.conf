[expose:cloudflare_status_settings]
pattern = cloudflare_status_settings
methods = POST, GET

[expose:cloudflare_status_settings_specified]
pattern = cloudflare_status_settings/*
methods = POST, GET, DELETE

[expose:cloudflare_status_cloudflare_status]
pattern = cloudflare_status_cloudflare_status
methods = POST, GET

[expose:cloudflare_status_cloudflare_status_specified]
pattern = cloudflare_status_cloudflare_status/*
methods = POST, GET, DELETE

[expose:data/indexes]
pattern = data/indexes
methods = GET
