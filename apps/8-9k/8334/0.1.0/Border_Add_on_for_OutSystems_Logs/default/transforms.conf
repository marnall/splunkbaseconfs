# KVStore lookup for deduplication cache inspection via SPL
# Usage: | inputlookup outsystems_dedup_cache_lookup
# Note: keys_json is excluded from fields_list (large, only needed programmatically)

[outsystems_dedup_cache_lookup]
external_type = kvstore
collection = outsystems_dedup_cache
fields_list = _key, endpoint, input_name, count, updated_at
