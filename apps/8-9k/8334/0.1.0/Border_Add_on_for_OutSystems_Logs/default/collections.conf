# KVStore collection for deduplication cache
# Stores one document per input containing all hashed dedup keys as a JSON blob.
# This design minimizes KVStore operations (1 read + 1 write per collection cycle)
# while keeping the document well under the 16MB limit (~790KB at 10K keys).

[outsystems_dedup_cache]
enforceTypes = true
replicate = false
field.endpoint = string
field.input_name = string
field.keys_json = string
field.count = number
field.updated_at = number
