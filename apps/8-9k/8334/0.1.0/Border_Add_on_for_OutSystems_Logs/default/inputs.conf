# This file prevents UCC from auto-generating a default input instance
# with default values that would auto-create unwanted inputs.
#
# The [outsystems_logs] stanza sets python.version (required by AppInspect)
# and disabled = 1 to prevent auto-execution.
#
# Users must create named input instances via Splunk Web UI or inputs.conf.

[outsystems_logs]
python.version = python3
disabled = 1
