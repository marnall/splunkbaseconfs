<form class="form-horizontal form-complex">
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_existing_incident_subject">Incident Subject</label>

        <div class="controls">
            <input type="text" name="action.netbrain_automation_existing.param.incident_subject" id="netbrain_automation_existing_incident_subject" placeholder="" />
            <span class="help-block">The NetBrain Incident subject</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_existing_stub_name">API Stub Name</label>

        <div class="controls">
            <input type="text" name="action.netbrain_automation_existing.param.stub_name" id="netbrain_automation_existing_stub_name" placeholder="" />
            <span class="help-block">The NetBrain API Stub name</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_existing_mapId">Existing Map ID</label>

        <div class="controls">
            <input type="text" name="action.netbrain_automation_existing.param.mapId" id="netbrain_automation_existing_mapId" placeholder="" />
            <span class="help-block">The existing map ID in NetBrain environment.</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_existing_duplicate_map">Duplicate Map?</label>
        
        <div class="controls">
            <splunk-radio-input name="action.netbrain_automation_existing.param.duplicate_map" id="netbrain_automation_existing_duplicate_map" value="true">
                <option value="1">Yes</option>
                <option value="0">No</option>
            </splunk-radio-input>
            <span class="help-block">Do not change the original map, make a copy instead</span>
        </div>
    </div>
</form>
