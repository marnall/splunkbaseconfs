<form class="form-horizontal form-complex">
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_multi_device_neighbor_incident_subject">Incident Subject</label>

        <div class="controls">
            <input type="text" name="action.netbrain_automation_multi_device_neighbor.param.incident_subject" id="netbrain_automation_multi_device_neighbor_incident_subject" placeholder="" />
            <span class="help-block">The NetBrain Incident subject</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_multi_device_neighbor_stub_name">API Stub Name</label>

        <div class="controls">
            <input name="action.netbrain_automation_multi_device_neighbor.param.stub_name" id="netbrain_automation_multi_device_neighbor_stub_name"></input>
            <span class="help-block">The NetBrain API Stub name</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_multi_device_neighbor_devices">Devices Name</label>

        <div class="controls">
            <splunk-text-area type="text" name="action.netbrain_automation_multi_device_neighbor.param.devices" id="netbrain_automation_multi_device_neighbor_devices" placeholder=""></splunk-text-area>
            <span class="help-block">The target devices name for automated troubleshooting, use double semicolon as delimiter, i.e. R1;;R2.</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_multi_device_neighbor_include_neighbor">Include Neighbor?</label>
        
        <div class="controls">
            <splunk-radio-input name="action.netbrain_automation_multi_device_neighbor.param.include_neighbor" id="netbrain_automation_multi_device_neighbor_include_neighbor" value="true">
                <option value="1">Yes</option>
                <option value="0">No</option>
            </splunk-radio-input>
            <span class="help-block">Choose to map the neighbors or not</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_multi_device_neighbor_neighbor_type">Neighbor Type</label>
        
        <div class="controls">
            <splunk-select name="action.netbrain_automation_multi_device_neighbor.param.neighbor_type" id="netbrain_automation_multi_device_neighbor_neighbor_type" value="L3_Topo_Type">
                <option value="L3_Topo_Type">IPv4 L3 Topology</option>
                <option value="Ipv6_L3_Topo_Type">IPv6 L3 Topology</option>
                <option value="L2_Topo_Type">L2 Topology</option>
            </splunk-select>
            <span class="help-block">Select a neighbor type</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_multi_device_neighbor_auto_link">Auto Link All Devices?</label>
        
        <div class="controls">
            <splunk-radio-input name="action.netbrain_automation_multi_device_neighbor.param.auto_link" id="netbrain_automation_multi_device_neighbor_auto_link" value="true">
                <option value="1">Yes</option>
                <option value="0">No</option>
            </splunk-radio-input>
            <span class="help-block">Choose to link all devices or not</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="netbrain_automation_multi_device_neighbor_auto_link_type">Auto Link Type</label>
        
        <div class="controls">
            <splunk-select name="action.netbrain_automation_multi_device_neighbor.param.auto_link_type" id="netbrain_automation_multi_device_neighbor_auto_link_type" value="L3_Topo_Type">
                <option value="L3_Topo_Type">IPv4 L3 Topology</option>
                <option value="Ipv6_L3_Topo_Type">IPv6 L3 Topology</option>
                <option value="L2_Topo_Type">L2 Topology</option>
                <option value="L3_VPN_Topo_Type">L3 VPN Tunnel</option>
                <option value="Logical_Topo_Type">Logical Topology</option>
                <option value="L2_Overlay_Topo_Type">L2 Overlay Topology</option>
            </splunk-select>
            <span class="help-block">Select an auto link type</span>
        </div>
    </div>
</form>
