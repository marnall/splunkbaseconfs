[Spike in 5xx after deployment change]
search = `vercel_index` sourcetype=vercel:logs status>=500 change_id=* | stats count as errors earliest(_time) as first latest(_time) as last by change_id | where last>=relative_time(now(), "-30m") AND errors>=50
cron_schedule = */5 * * * *
alert_type = number of events
alert_condition = > 0
dispatch.earliest_time = -30m
dispatch.latest_time = now
alert.severity = 3
disabled = 1

[High unique src_ip rate + high 4xx/5xx on static assets]
search = `vercel_web` status>=400 (uri_path="*.js" OR uri_path="*.css" OR uri_path="*.png" OR uri_path="*.jpg" OR uri_path="*.svg") | bucket _time span=5m | stats dc(src_ip) as uniq_src_ip count as total by _time | where uniq_src_ip>=200 AND total>=500
cron_schedule = */5 * * * *
alert_type = number of events
alert_condition = > 0
dispatch.earliest_time = -10m
dispatch.latest_time = now
alert.severity = 4
disabled = 1

[LCP p75 regression week-over-week]
search = `vercel_speed_insights` lcp=* | timechart span=1h perc75(lcp) as lcp_p75 | timewrap 1w | eval delta=lcp_p75-lcp_p75_1w | where delta>200
cron_schedule = 0 * * * *
alert_type = number of events
alert_condition = > 0
dispatch.earliest_time = -8d@d
dispatch.latest_time = now
alert.severity = 2
disabled = 1
