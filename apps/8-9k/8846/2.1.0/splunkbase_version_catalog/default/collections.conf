#
# KV Store collection that holds the current Splunkbase catalogue.
# One record per app, keyed by the Splunkbase numeric app id (_key).
#
[splunkbase_catalog]
enforceTypes = false
field.app_uid = number
field.appid = string
field.title = string
field.is_archived = bool
field.archive_status = string
field.latest_version = string
field.release_id = number
field.release_date = string
field.min_splunk_version = string
field.max_splunk_version = string
field.splunk_versions = string
field.cloud_compatible = bool
field.fedramp = string
field.platform = string
field.filename = string
field.app_url = string
field.last_checked = time
accelerated_fields.appid_idx = {"appid": 1}
