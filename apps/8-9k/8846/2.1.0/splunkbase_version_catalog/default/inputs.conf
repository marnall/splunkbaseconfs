#
# python.version is set at the modular-input (kind) level so that every
# instance of this input - including ones created later by users - inherits it
# and runs under Python 3. AppInspect requires the property here (a [<kind>] or
# [default] stanza), not only on an instance stanza.
#
[splunkbase_catalog]
python.version = python3

#
# Default modular input instance. Disabled on install: configure and enable it
# from Settings > Data inputs > Splunkbase Version Catalog, or clone this stanza.
#
[splunkbase_catalog://default]
app_ids =
fetch_all = false
max_apps = 200
verify_ssl = true
run_at = 03:15
index = default
disabled = 1
