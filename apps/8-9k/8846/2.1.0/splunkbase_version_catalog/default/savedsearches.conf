#
# Optional scheduled report. Disabled by default. Enable and add an email or
# other alert action from Splunk Web if you want notifications.
#
[Splunkbase - Updates available for installed apps]
search = | `splunkbase_installed_compare` \
| search update_available="Yes" \
| table appid label installed_version latest_version release_date app_url \
| sort appid
description = Lists installed apps whose installed version differs from the latest catalogued Splunkbase release. Requires the Splunkbase Version Catalog input to have populated the KV Store.
disabled = 1
enableSched = 0
cron_schedule = 30 6 * * *
dispatch.earliest_time = -1m@m
dispatch.latest_time = now
is_visible = 1
request.ui_dispatch_app = splunkbase_version_catalog
