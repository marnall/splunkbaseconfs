#
# Convenience macros.
#
# `splunkbase_catalog`            -> the current catalogue (use with a leading pipe)
# `splunkbase_installed_compare`  -> installed apps joined to catalogue with an
#                                    update_available flag (use with a leading pipe)
#
[splunkbase_catalog]
definition = inputlookup splunkbase_catalog_lookup
iseval = 0

[splunkbase_installed_compare]
definition = rest /services/apps/local splunk_server=local \
| rename title as appid \
| eval installed_version=version \
| fields appid label installed_version \
| lookup splunkbase_catalog_lookup appid OUTPUT title as catalog_title latest_version release_date app_url cloud_compatible is_archived archive_status \
| where isnotnull(latest_version) \
| eval update_available=if(isnotnull(installed_version) AND installed_version!="" AND installed_version!=latest_version,"Yes","No") \
| eval archived=if(in(lower(tostring(is_archived)),"true","1","yes") OR lower(archive_status)="archived","Yes","No")
iseval = 0
