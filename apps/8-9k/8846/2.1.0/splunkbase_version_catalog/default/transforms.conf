#
# KV Store lookup exposing the catalogue collection to SPL.
# Use:  | inputlookup splunkbase_catalog_lookup
#
[splunkbase_catalog_lookup]
external_type = kvstore
collection = splunkbase_catalog
fields_list = _key, app_uid, appid, title, is_archived, archive_status, latest_version, release_id, release_date, min_splunk_version, max_splunk_version, splunk_versions, cloud_compatible, fedramp, platform, filename, app_url, last_checked
