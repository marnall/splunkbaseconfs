[script:keybundle_upload]
match=/upload_cribl_keybundle
handler=keybundle_upload.Upload
script                = keybundle_upload.py
scripttype            = persist
requireAuthentication = true
output_modes          = json
passPayload           = false
passHttpHeaders       = true
passHttpCookies       = true
passSession           = true
python.version        = python3.9

[script:keybundle_delete]
match=/delete_cribl_key
handler=keybundle_delete.Delete
script                = keybundle_delete.py
scripttype            = persist
requireAuthentication = true
output_modes          = json
passHttpHeaders       = true
passHttpCookies       = true
passPayload           = false
passSession           = true
python.version        = python3.9

