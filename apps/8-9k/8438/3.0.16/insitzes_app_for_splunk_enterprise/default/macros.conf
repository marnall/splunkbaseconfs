##
## InSitzes App for Splunk Enterprise - Macros
## Configured via the Setup dashboard
##

## ─── Deployment Type ───
[insitzes_deployment_type]
definition = enterprise
iseval = 0

## ─── Index Selection ───
[insitzes_set_index_cmc_summary]
definition = index=summary
iseval = 0

## ─── Host / Server Role Filters ───
## Dynamic host discovery via the DMC server groups: the app no longer asks
## operators to hand-type indexer/search-head hostnames. Both macros expand
## to a subsearch that queries /services/server/info scoped to the relevant
## dmc_group and returns a `( host="sh1" OR host="sh2" )` expression via
## `| format`. The Monitoring Console must be configured for these to
## populate — if it isn't, set up DMC first (Settings → Monitoring Console
## → General Setup) rather than reverting these macros to static lists.
[insitzes_indexer_hosts]
definition = [| rest /services/server/info splunk_server_group=dmc_group_indexer | search server_roles=indexer OR server_roles=cluster_peer | fields host | format]
iseval = 0

[insitzes_searchhead_hosts]
definition = [| rest /services/server/info splunk_server_group=dmc_group_search_head | search server_roles=search_head OR server_roles=cluster_search_head | fields host | format]
iseval = 0

## `insitzes_cloud_hosts` and `insitzes_cmc_hosts` are required stubs —
## the shared tab JSX queries (src/tabs/*.jsx, src/tabs/healthCheckQueries.js)
## reference these macros so they can also run against the Splunk Cloud
## app, which defines them with real host-pattern filters. In the
## enterprise build they are no-ops (`host IN ("*")` matches everything)
## and are not referenced by anything enterprise-specific. Do not remove.
[insitzes_cloud_hosts]
definition = host IN ("*")
iseval = 0

[insitzes_cmc_hosts]
definition = host IN ("*")
iseval = 0

## ─── User Exclusions ───
[insitzes_exclude_system_users]
definition = NOT user IN ("splunk-system-user")
iseval = 0

## ─── Feature Flags ───
[insitzes_has_wlm]
definition = 0
iseval = 0

[insitzes_has_smartstore]
definition = 0
iseval = 0

[insitzes_has_cluster]
definition = 0
iseval = 0


## ─── Cost Rates ───
## Populated from the Setup page and read by the Compute tab when the
## user toggles to Cost view. Leave empty to hide the cost toggle.
[insitzes_cost_per_svc]
definition =
iseval = 0

## ─── Alerting ───
[insitzes_alert_email]
definition =
iseval = 0

## ─── REST Timeout ───
## Client-side timeout (in seconds) applied to Splunk REST API calls
## made by the app's dashboards and setup page (macro reads, alert
## toggles, job status polling, etc.). Does NOT apply to SPL searches —
## those use insitzes_search_timeout below.
[insitzes_rest_timeout]
definition = 30
iseval = 0

## ─── Search Timeout ───
## Client-side timeout (in seconds) for `service.oneshotSearch` calls
## from the dashboard. Longer than the REST timeout because some checks
## (Index Governance, data quality sourcetype scan, cache churn) take
## well over 30 seconds to complete. Default is 300s / 5 minutes.
[insitzes_search_timeout]
definition = 300
iseval = 0

## ─── Debug ───
[insitzes_debug_mode]
definition = 0
iseval = 0
