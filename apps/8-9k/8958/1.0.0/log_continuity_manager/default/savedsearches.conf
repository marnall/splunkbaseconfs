[LCM - Produce Monitoring Status Lookup]
description = Unified lookup-based MVP search that produces monitoring_status.csv for dashboard consumption.
disabled = 0
enableSched = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -8d@d
dispatch.latest_time = now
search = | inputlookup monitoring_targets.csv | eval enabled=lower(trim(coalesce(enabled,"1"))) | eval host_key=lower(trim(coalesce(host_key,host))) | eval index=lower(trim(index)) | eval source=lower(trim(coalesce(source,""))) | eval sourcetype=lower(trim(coalesce(sourcetype,""))) | eval monitoring_type=lower(trim(coalesce(monitoring_type,""))) | eval period_minutes=tonumber(coalesce(period_minutes,60)) | eval customer=coalesce(customer,"") | eval environment=coalesce(environment,"") | eval owner=coalesce(owner,"") | eval description=coalesce(description,"") | eval redundancy_mode=coalesce(redundancy_mode,"") | eval redundancy_group=trim(coalesce(redundancy_group,"")) | eval min_active_members=tonumber(coalesce(min_active_members,1)) | where enabled IN ("1","true","yes","enabled") AND isnotnull(target_id) AND target_id!="" AND host_key!="" AND index!="" AND period_minutes>=1 AND in( monitoring_type, "host_index", "host_index_source", "host_index_sourcetype" ) AND ( monitoring_type="host_index" OR ( monitoring_type="host_index_source" AND source!="" ) OR ( monitoring_type="host_index_sourcetype" AND sourcetype!="" ) ) | eval host_is_ip=if( match(host_key,"^\d{1,3}(\.\d{1,3}){3}$") OR match(host_key,"^[0-9a-fA-F:]+$"), 1, 0 ) | eval short_host=if( host_is_ip=0 AND like(host_key,"%.%"), mvindex(split(host_key,"."),0), host_key ) | eval host_alias=if( short_host!=host_key, mvappend(host_key,short_host), host_key ) | mvexpand host_alias | eval target_join_key=case( monitoring_type="host_index", "host_index|".host_alias."|".index, monitoring_type="host_index_source", "host_index_source|".host_alias."|".index."|".source, monitoring_type="host_index_sourcetype", "host_index_sourcetype|".host_alias."|".index."|".sourcetype ) | eval target_marker=1 | fields target_marker target_id enabled customer environment monitoring_type host host_key index source sourcetype period_minutes owner description redundancy_mode redundancy_group min_active_members target_join_key | append [| tstats summariesonly=false allow_old_summaries=true latest(_time) as last_event_epoch where earliest=-8d@d [| inputlookup monitoring_targets.csv | eval enabled=lower(trim(coalesce(enabled,"1"))) | eval index=lower(trim(index)) | eval monitoring_type=lower(trim(coalesce(monitoring_type,""))) | where enabled IN ("1","true","yes","enabled") AND in( monitoring_type, "host_index", "host_index_source", "host_index_sourcetype" ) AND index!="" | dedup index | fields index | format ] by host index sourcetype source | eval event_host=lower(trim(host)) | eval index=lower(trim(index)) | eval source=lower(trim(coalesce(source,""))) | eval sourcetype=lower(trim(coalesce(sourcetype,""))) | eval host_is_ip=if( match(event_host,"^\d{1,3}(\.\d{1,3}){3}$") OR match(event_host,"^[0-9a-fA-F:]+$"), 1, 0 ) | eval short_host=if( host_is_ip=0 AND like(event_host,"%.%"), mvindex(split(event_host,"."),0), event_host ) | eval host_alias=if( short_host!=event_host, mvappend(event_host,short_host), event_host ) | mvexpand host_alias | eval observation_keys=mvappend( "host_index|".host_alias."|".index, "host_index_source|".host_alias."|".index."|".source, "host_index_sourcetype|".host_alias."|".index."|".sourcetype ) | mvexpand observation_keys | eval target_join_key=observation_keys | fields target_join_key last_event_epoch ] | stats max(target_marker) as target_marker values(target_id) as target_id values(enabled) as enabled values(customer) as customer values(environment) as environment values(monitoring_type) as monitoring_type values(host) as host values(host_key) as host_key values(index) as index values(source) as source values(sourcetype) as sourcetype values(period_minutes) as period_minutes values(owner) as owner values(description) as description values(redundancy_mode) as redundancy_mode values(redundancy_group) as redundancy_group values(min_active_members) as min_active_members max(last_event_epoch) as last_event_epoch by target_join_key | where target_marker=1 | eval target_id=mvindex(target_id,0) | eval enabled=mvindex(enabled,0) | eval customer=mvindex(customer,0) | eval environment=mvindex(environment,0) | eval monitoring_type=mvindex(monitoring_type,0) | eval host=mvindex(host,0) | eval host_key=mvindex(host_key,0) | eval index=mvindex(index,0) | eval source=mvindex(source,0) | eval sourcetype=mvindex(sourcetype,0) | eval period_minutes=tonumber(mvindex(period_minutes,0)) | eval owner=mvindex(owner,0) | eval description=mvindex(description,0) | eval redundancy_mode=mvindex(redundancy_mode,0) | eval redundancy_group=mvindex(redundancy_group,0) | eval min_active_members=tonumber(mvindex(min_active_members,0)) | stats values(enabled) as enabled values(customer) as customer values(environment) as environment values(monitoring_type) as monitoring_type values(host) as host values(host_key) as host_key values(index) as index values(source) as source values(sourcetype) as sourcetype values(period_minutes) as period_minutes values(owner) as owner values(description) as description values(redundancy_mode) as redundancy_mode values(redundancy_group) as redundancy_group values(min_active_members) as min_active_members max(last_event_epoch) as last_event_epoch by target_id | eval enabled=mvindex(enabled,0) | eval customer=mvindex(customer,0) | eval environment=mvindex(environment,0) | eval monitoring_type=mvindex(monitoring_type,0) | eval host=mvindex(host,0) | eval host_key=mvindex(host_key,0) | eval index=mvindex(index,0) | eval source=mvindex(source,0) | eval sourcetype=mvindex(sourcetype,0) | eval period_minutes=tonumber(mvindex(period_minutes,0)) | eval owner=mvindex(owner,0) | eval description=mvindex(description,0) | eval redundancy_mode=mvindex(redundancy_mode,0) | eval redundancy_group=mvindex(redundancy_group,0) | eval min_active_members=tonumber(mvindex(min_active_members,0)) | eval now_epoch=now() | eval expected_after_epoch=if( isnotnull(last_event_epoch), last_event_epoch+(period_minutes*60), null() ) | eval in_maintenance="0" | eval active_window_ids="" | eval interruption_minutes=case( isnull(last_event_epoch), period_minutes, now_epoch>expected_after_epoch, floor((now_epoch-expected_after_epoch)/60), true(), 0 ) | eval status=if( interruption_minutes>0, "interrupted", "healthy" ) | eval is_interrupted=if(status="interrupted","1","0") | eval target_interrupted=is_interrupted | eval severity=case( is_interrupted!="1","", interruption_minutes>=10080,"7D+", interruption_minutes>=4320,"72H+", interruption_minutes>=2880,"48H+", interruption_minutes>=1440,"24H+", interruption_minutes>=720,"12H+", interruption_minutes>=360,"6H+", interruption_minutes>=60,"1H+", interruption_minutes>=30,"30M+", true(),"" ) | eval group_min_seed=if( redundancy_group!="", min_active_members, null() ) | eval target_active_member=if( redundancy_group!="" AND target_interrupted!="1" AND status="healthy", 1, 0 ) | eventstats sum(target_active_member) as group_active_members max(group_min_seed) as group_min_active_members by redundancy_group | eval group_active_members=if( redundancy_group!="", coalesce(group_active_members,0), null() ) | eval group_min_active_members=if( redundancy_group!="", if( isnull(group_min_active_members) OR group_min_active_members<1, 1, group_min_active_members ), null() ) | eval group_status=case( redundancy_group="","", group_active_members>=group_min_active_members,"healthy", true(),"interrupted" ) | eval suppressed_by_redundancy=if( redundancy_group!="" AND target_interrupted="1" AND group_status="healthy", "1", "0" ) | eval effective_is_interrupted=if( suppressed_by_redundancy="1", "0", target_interrupted ) | eval effective_status=case( suppressed_by_redundancy="1","suppressed", effective_is_interrupted="1","interrupted", status="healthy","healthy", true(),status ) | eval last_event_time=if( isnotnull(last_event_epoch), strftime(last_event_epoch,"%Y-%m-%dT%H:%M:%SZ"), "" ) | eval last_checked_at=strftime( now_epoch, "%Y-%m-%dT%H:%M:%SZ" ) | eval expected_after=if( isnotnull(expected_after_epoch), strftime(expected_after_epoch,"%Y-%m-%dT%H:%M:%SZ"), "" ) | eval gap_min=interruption_minutes | eval violation=effective_is_interrupted | eval last_event_ts=last_event_time | eval updated_at=last_checked_at | eval message=case( suppressed_by_redundancy="1", "Target interruption suppressed because redundancy group is healthy.", isnull(last_event_epoch) AND monitoring_type="host_index_source", "No matching event was found for the configured host, index and source.", isnull(last_event_epoch) AND monitoring_type="host_index_sourcetype", "No matching event was found for the configured host, index and sourcetype.", isnull(last_event_epoch), "No matching event was found for the configured host and index.", status="interrupted", "No matching event has arrived within the expected period.", status="healthy", "Events are arriving within the expected period.", true(), "Status could not be determined." ) | fields target_id enabled customer environment monitoring_type host host_key index sourcetype source period_minutes owner description redundancy_mode redundancy_group min_active_members target_interrupted group_active_members group_min_active_members group_status suppressed_by_redundancy effective_is_interrupted effective_status last_event_time last_checked_at expected_after status is_interrupted in_maintenance interruption_minutes gap_min severity violation last_event_ts updated_at active_window_ids message | outputlookup monitoring_status.csv

[LCM - Track Recovery History Lookup]
description = Lookup-based recovery history tracker. Closes open effective interruption rows when targets recover.
disabled = 0
enableSched = 1
cron_schedule = 1-59/5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
search = | inputlookup monitoring_recovery_history.csv | eval record_type="history", recovered_at=coalesce(recovered_at,""), recovery_minutes=coalesce(recovery_minutes,"") | append [ | inputlookup monitoring_status.csv | eval record_type="current" | eval effective_is_interrupted=coalesce(effective_is_interrupted,is_interrupted) | eval effective_status=coalesce(effective_status,status) | eval current_effective_is_interrupted=if(effective_is_interrupted="1" OR effective_status="interrupted","1","0") | eval current_checked_at=if(isnotnull(last_checked_at) AND last_checked_at!="",last_checked_at,updated_at) | eval current_interruption_started_at=if(isnotnull(expected_after) AND expected_after!="",expected_after,current_checked_at) | eval host=coalesce(host,""), host_key=coalesce(host_key,lower(host)), index=coalesce(index,""), source=coalesce(source,""), sourcetype=coalesce(sourcetype,""), monitoring_type=coalesce(monitoring_type,"") | eval redundancy_group=coalesce(redundancy_group,""), group_status=coalesce(group_status,""), suppressed_by_redundancy=coalesce(suppressed_by_redundancy,"0") | eval interruption_started_at=if(current_effective_is_interrupted="1",current_interruption_started_at,"") | eval recovered_at="", recovery_minutes="", message="Interruption detected; waiting for recovery." | fields record_type target_id host host_key index source sourcetype monitoring_type interruption_started_at recovered_at recovery_minutes redundancy_group group_status suppressed_by_redundancy message current_effective_is_interrupted current_checked_at ] | eventstats max(eval(if(record_type="current",current_effective_is_interrupted,null()))) as current_effective_is_interrupted max(eval(if(record_type="current",current_checked_at,null()))) as current_checked_at count(eval(record_type="history" AND recovered_at="")) as open_history_count by target_id | eval recovered_at=if(record_type="history" AND recovered_at="" AND current_effective_is_interrupted="0" AND current_checked_at!="",current_checked_at,recovered_at) | eval recovery_minutes=if(record_type="history" AND recovered_at!="" AND recovery_minutes!="",recovery_minutes,if(record_type="history" AND recovered_at!="",tostring(round((strptime(recovered_at,"%Y-%m-%dT%H:%M:%SZ")-strptime(interruption_started_at,"%Y-%m-%dT%H:%M:%SZ"))/60,0)),"")) | eval message=case(record_type="history" AND recovered_at!="" AND message="Interruption detected; waiting for recovery.","Target recovered from effective interruption.",true(),message) | eval keep_row=case(record_type="history",1,record_type="current" AND current_effective_is_interrupted="1" AND open_history_count=0,1,true(),0) | where keep_row=1 | fields target_id host host_key index source sourcetype monitoring_type interruption_started_at recovered_at recovery_minutes redundancy_group group_status suppressed_by_redundancy message | sort - interruption_started_at target_id | outputlookup monitoring_recovery_history.csv

