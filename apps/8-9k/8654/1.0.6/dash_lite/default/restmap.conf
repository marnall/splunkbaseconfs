[script:dash_create_app]
match                 = /dash/create_app
script                = create_app_handler.py
scripttype            = persist
handler               = create_app_handler.CreateAppHandler
requireAuthentication = true
passPayload           = true
python.version        = python3
python.required       = 3.9

[script:dash_export_app]
match                 = /dash/export_app
script                = export_handler.py
scripttype            = persist
handler               = export_handler.ExportHandler
requireAuthentication = true
passPayload           = true
python.version        = python3
python.required       = 3.9
