[cccs:alerts]
SHOULD_LINEMERGE = false
TIME_PREFIX = \"updated\"\s*:\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%Z
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 0

# Automatic JSON field extraction
INDEXED_EXTRACTIONS = json

# Disable search-time JSON extraction to prevent duplicates
AUTO_KV_JSON = false

# MITRE ATT&CK Technique Enrichment via Lookup
# This enriches MITRE techniques with severity and detection metadata
LOOKUP-mitre_enrichment = mitre_technique_severity technique_id AS mitre_techniques{}.id OUTPUT technique_name AS mitre_techniques{}.enriched_name, base_severity AS mitre_techniques{}.base_severity, exploitability AS mitre_techniques{}.exploitability, detection_difficulty AS mitre_techniques{}.detection_difficulty
