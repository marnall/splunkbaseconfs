# Scripted input to fetch CCCS alerts feed
# Runs every 15 minutes to check for updates

[script://$SPLUNK_HOME/etc/apps/cccs_alerts_app/bin/cccs_feed_collector.py]
disabled = false
interval = 900
sourcetype = cccs:alerts
source = cccs_feed_collector
index = cyber_gc_ca
python.version = python3
python.required = 3.13
