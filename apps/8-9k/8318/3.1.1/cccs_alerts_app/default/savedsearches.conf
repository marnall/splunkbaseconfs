# MITRE ATT&CK Based Alerting for CCCS Feed
# These searches trigger on critical attack techniques

[CCCS - Critical MITRE Techniques Detected]
search = index=cyber_gc_ca sourcetype=cccs:alerts \
         (mitre_techniques{}.id="T1190" OR \
          mitre_techniques{}.id="T1068" OR \
          mitre_techniques{}.id="T1486" OR \
          mitre_techniques{}.id="T1003" OR \
          mitre_techniques{}.id="T1078") \
         earliest=-15m \
| eval alert_url=coalesce(id, alert_id) \
| table _time, title, mitre_techniques{}.id, mitre_techniques{}.name, mitre_severity, mitre_threat_score, alert_url
description = Alert when critical MITRE techniques appear in CCCS feed (Exploit Public-Facing App, Privilege Escalation, Ransomware, Credential Dumping, Valid Accounts)
disabled = 1
alert.severity = 5
alert.track = 1
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
quantity = 0
relation = greater than
action.email = 1
action.email.subject = 🔴 Critical MITRE Technique in CCCS Alert: $result.title$
action.email.message = A critical MITRE ATT&CK technique has been detected in a new CCCS alert.\n\nAlert: $result.title$\nTechnique: $result.mitre_techniques{}.name$ ($result.mitre_techniques{}.id$)\nSeverity: $result.mitre_severity$\nThreat Score: $result.mitre_threat_score$\n\nView full alert: $result.alert_url$
action.email.format = plain
action.email.sendresults = 1

[CCCS - High Threat Score Alerts]
search = index=cyber_gc_ca sourcetype=cccs:alerts mitre_threat_score>=70 earliest=-1h \
| eval alert_url=coalesce(id, alert_id) \
| table _time, title, mitre_threat_score, mitre_severity, mitre_technique_count, mitre_tactics{}, alert_url
description = Alert on high threat score CCCS alerts (score >= 70)
disabled = 1
alert.severity = 4
alert.track = 1
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
counttype = number of events
quantity = 0
relation = greater than
action.email = 1
action.email.subject = ⚠️ High Threat Score CCCS Alert: $result.title$
action.email.message = A high-severity CCCS alert has been published.\n\nAlert: $result.title$\nThreat Score: $result.mitre_threat_score$/100\nSeverity: $result.mitre_severity$\nTechnique Count: $result.mitre_technique_count$\nTactics: $result.mitre_tactics{}$\n\nView full alert: $result.alert_url$
action.email.format = plain

[CCCS - Active Exploits with MITRE Mapping]
search = index=cyber_gc_ca sourcetype=cccs:alerts exploit_mentioned=true mitre_enriched=true earliest=-1h \
| eval alert_url=coalesce(id, alert_id) \
| table _time, title, exploit_context, mitre_techniques{}.id, mitre_tactics{}, cves{}, alert_url
description = Alert on actively exploited vulnerabilities with MITRE technique mapping
disabled = 1
alert.severity = 5
alert.track = 1
cron_schedule = */30 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
counttype = number of events
quantity = 0
relation = greater than
action.email = 1
action.email.subject = 🚨 Active Exploit Detected in CCCS: $result.title$
action.email.message = An actively exploited vulnerability has been reported by CCCS.\n\nAlert: $result.title$\nExploit Context: $result.exploit_context$\nMITRE Techniques: $result.mitre_techniques{}.id$\nMITRE Tactics: $result.mitre_tactics{}$\nCVEs: $result.cves{}$\n\nView full alert: $result.alert_url$\n\nImmediate action may be required.
action.email.format = plain
action.email.sendresults = 1

[CCCS - Initial Access Techniques Surge]
search = index=cyber_gc_ca sourcetype=cccs:alerts mitre_tactics{}="Initial Access" \
| bin _time span=1d \
| stats count by _time \
| streamstats window=7 avg(count) as avg_count \
| where count > (avg_count * 1.5) \
| eval threshold=round(avg_count * 1.5, 1)
description = Alert when Initial Access techniques spike above 7-day average
disabled = 1
alert.severity = 3
alert.track = 1
cron_schedule = 0 8 * * *
dispatch.earliest_time = -8d
dispatch.latest_time = now
enableSched = 1
counttype = number of events
quantity = 0
relation = greater than
action.email = 1
action.email.subject = 📈 Initial Access Technique Surge Detected
action.email.message = Initial Access techniques in CCCS alerts have spiked above the 7-day average.\n\nCurrent Count: $result.count$\n7-Day Average: $result.avg_count$\nThreshold: $result.threshold$\n\nReview recent alerts for potential threat campaigns.
action.email.format = plain

[CCCS - MITRE Daily Summary Report]
search = index=cyber_gc_ca sourcetype=cccs:alerts mitre_enriched=true earliest=-24h \
| stats count as total_alerts, \
        dc(mitre_techniques{}.id) as unique_techniques, \
        dc(mitre_tactics{}) as unique_tactics, \
        avg(mitre_threat_score) as avg_threat_score, \
        count(eval(mitre_severity="critical")) as critical_count, \
        count(eval(mitre_severity="high")) as high_count, \
        count(eval(exploit_mentioned="true")) as exploit_count, \
        values(mitre_tactics{}) as all_tactics \
| eval avg_threat_score=round(avg_threat_score, 1)
description = Daily summary of MITRE ATT&CK intelligence from CCCS
disabled = 1
alert.severity = 2
cron_schedule = 0 9 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
counttype = always
action.email = 1
action.email.subject = 📊 CCCS MITRE ATT&CK Daily Summary
action.email.message = Daily MITRE ATT&CK intelligence summary from CCCS alerts (last 24 hours):\n\nTotal Alerts: $result.total_alerts$\nUnique Techniques: $result.unique_techniques$\nUnique Tactics: $result.unique_tactics$\nAverage Threat Score: $result.avg_threat_score$/100\n\nSeverity Breakdown:\n- Critical: $result.critical_count$\n- High: $result.high_count$\n\nActive Exploits: $result.exploit_count$\n\nTactics Observed: $result.all_tactics$
action.email.format = plain

