# KV store collection: one document per saved search that has a visual alert
# configured. Keyed by the saved search name (_key).
[alert_viz_configs]
enforceTypes = false
field.search_name = string
field.app = string
field.owner = string
field.viz_type = string
field.width = number
field.height = number
field.theme = string
field.data_strategy = string
field.post_search = string
# options and destinations are stored as JSON-encoded nested data
