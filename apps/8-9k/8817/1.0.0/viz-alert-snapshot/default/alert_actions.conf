[render_viz_email]
is_custom = 1
label = Render Viz & Email PNG
description = Render the alert results as a single Dashboard Studio visualization (PNG, via Splunk's bundled Chromium) and email it.
icon_path = appIcon.png
payload_format = json
python.version = python3

# --- defaults (overridable per alert in the UI) ---
param.viz_type = splunk.line
param.to =
param.subject = Splunk Alert: $name$
param.message = The alert "$name$" fired. Rendered visualization attached.
param.width = 800
param.height = 450
param.theme = dark
param.screenshot_delay = 0
param.options = {}
param.post_search =

[render_and_notify]
is_custom = 1
label = Render Viz & Notify (multi-channel)
description = Render the alert results as a single Splunk visualization (PNG) and deliver it to the destinations configured in the Visual Alerts app (email, Telegram, Slack, webhook).
icon_path = appIcon.png
payload_format = json
python.version = python3

# Fallbacks used only when there is no saved Visual Alerts config for the search.
param.subject = Splunk Alert: $name$
param.message = The alert "$name$" fired.
param.to =
