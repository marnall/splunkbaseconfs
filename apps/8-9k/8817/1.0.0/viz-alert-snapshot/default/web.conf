# Expose the persistent REST endpoints to the UI (session-scoped).
[expose:viz_alert_preview]
pattern = viz_alert/preview
methods = POST

[expose:viz_alert_config]
pattern = viz_alert/config
methods = GET, POST

[expose:viz_alert_config_key]
pattern = viz_alert/config/*
methods = GET, DELETE

[expose:viz_alert_settings]
pattern = viz_alert/settings
methods = GET, POST

[expose:viz_alert_testsend]
pattern = viz_alert/testsend
methods = POST

[expose:viz_alert_execute]
pattern = viz_alert/execute
methods = POST
