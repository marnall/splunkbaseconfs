# Custom capability to run/deliver visual alerts. Gating the execute + test-send
# REST endpoints on this (instead of password-read) lets ordinary users action
# visual alerts without being able to read credentials — the endpoints read
# credentials under system auth (passSystemAuth) on their behalf.
[capability::run_visual_alert]

# Granted to admin + power out of the box. Add `run_visual_alert = enabled` to
# any other role that should be able to fire/test visual alerts.
[role_admin]
run_visual_alert = enabled

[role_power]
run_visual_alert = enabled
