# Persistent REST endpoints for the configuration UI.
# App-prefixed script names + app-scoped match paths (per splunk-react-app skill).

[script:viz_alert_preview]
match          = /viz_alert/preview
script         = preview.py
scripttype     = persist
handler        = preview.PreviewHandler
python.version = python3
passPayload    = true
passSystemAuth = true

[script:viz_alert_config]
match          = /viz_alert/config
script         = config_api.py
scripttype     = persist
handler        = config_api.ConfigHandler
python.version = python3
passPayload    = true
passSystemAuth = true

[script:viz_alert_settings]
match          = /viz_alert/settings
script         = settings_api.py
scripttype     = persist
handler        = settings_api.SettingsHandler
python.version = python3
passPayload    = true
passSystemAuth = true

[script:viz_alert_testsend]
match          = /viz_alert/testsend
script         = testsend_api.py
scripttype     = persist
handler        = testsend_api.TestSendHandler
python.version = python3
passPayload    = true
passSystemAuth = true
capability.post = run_visual_alert

[script:viz_alert_execute]
match          = /viz_alert/execute
script         = execute_api.py
scripttype     = persist
handler        = execute_api.ExecuteHandler
python.version = python3
passPayload    = true
passSystemAuth = true
capability.post = run_visual_alert
