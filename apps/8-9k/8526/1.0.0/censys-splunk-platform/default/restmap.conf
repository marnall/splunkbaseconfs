[admin:censys-splunk-platform_configuration]
match = /
members = censys-splunk-platform_account, censys-splunk-platform_settings

[admin_external:censys-splunk-platform_account]
handlertype = python
python.version = python3
handlerfile = censys-splunk-platform_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:censys-splunk-platform_settings]
handlertype = python
python.version = python3
handlerfile = censys-splunk-platform_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true
