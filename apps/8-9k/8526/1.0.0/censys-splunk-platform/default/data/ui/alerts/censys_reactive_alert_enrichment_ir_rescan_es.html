<form class="form-horizontal form-complex">
    <div class="control-group">
        <label class="control-label" for="censys_reactive_alert_enrichment_ir_rescan_es_global_account">Censys Account
            <span class="required">*</span> </label>
        <div class="controls">
            <splunk-search-dropdown name="action.censys_reactive_alert_enrichment_ir_rescan_es.param.global_account"
                id="censys_reactive_alert_enrichment_ir_rescan_es_global_account"
                search="| rest /servicesNS/nobody/censys-splunk-platform/configs/conf-censys-splunk-platform_account splunk_server=local | table title"
                label-field="title" value-field="title" />
            <span class="help-block">Select the Censys account.</span>
        </div>
    </div>

    <!-- Separator -->
    <div class="control-group">
        <div class="controls">
            <hr style="border-top: 1px solid #ccc; margin: 20px 0;" />
        </div>
    </div>

    <!-- Indicator Type Radio Buttons -->
    <div class="control-group">
        <label class="control-label">Indicator Type <span class="required">*</span></label>
        <div class="controls">
            <label class="radio" style="font-weight: bold;">
                <input type="radio" name="action.censys_reactive_alert_enrichment_ir_rescan_es.param.indicator_type"
                    value="host" checked="checked" id="indicator_type_host" />
                Service
            </label>
        </div>
    </div>

    <!-- Host fields -->
    <div id="host_fields_section">
        <div class="control-group">
            <label class="control-label" for="censys_reactive_alert_enrichment_ir_rescan_es_service_ip_field">Service IP</label>
            <div class="controls">
                <input type="text" name="action.censys_reactive_alert_enrichment_ir_rescan_es.param.service_ip_field"
                    id="censys_reactive_alert_enrichment_ir_rescan_es_service_ip_field" />
                <span class="help-block">
                    Enter the IP address.
                </span>
            </div>
        </div>
        <div class="control-group">
            <label class="control-label" for="censys_reactive_alert_enrichment_ir_rescan_es_service_port_field">Service
                Port</label>
            <div class="controls">
                <input type="text" name="action.censys_reactive_alert_enrichment_ir_rescan_es.param.service_port_field"
                    id="censys_reactive_alert_enrichment_ir_rescan_es_service_port_field" />
                <span class="help-block">
                    Enter comma separated ports.
                </span>
            </div>
        </div>
        <div class="control-group">
            <label class="control-label"
                for="censys_reactive_alert_enrichment_ir_rescan_es_service_protocol_field">Protocol</label>
            <div class="controls">
                <input type="text"
                    name="action.censys_reactive_alert_enrichment_ir_rescan_es.param.service_protocol_field"
                    id="censys_reactive_alert_enrichment_ir_rescan_es_service_protocol_field" />
                <span class="help-block">
                    Enter the protocol.
                </span>
            </div>
        </div>
        <div class="control-group">
            <label class="control-label"
                for="censys_reactive_alert_enrichment_ir_rescan_es_service_transport_protocol_field">Transport
                Protocol</label>
            <div class="controls">
                <select
                    name="action.censys_reactive_alert_enrichment_ir_rescan_es.param.service_transport_protocol_field"
                    id="censys_reactive_alert_enrichment_ir_rescan_es_service_transport_protocol_field">
                    <option value="unknown">unknown</option>
                    <option value="tcp">tcp</option>
                    <option value="udp">udp</option>
                    <option value="icmp">icmp</option>
                    <option value="quic">quic</option>
                </select>
                <span class="help-block">
                    Select a transport protocol.
                </span>
            </div>
        </div>
    </div>

    <!-- Separator -->
    <div class="control-group">
        <div class="controls">
            <hr style="border-top: 1px solid #ccc; margin: 20px 0;" />
        </div>
    </div>

    <!-- Web Property Radio Button -->
    <div class="control-group">
        <div class="controls">
            <label class="radio" style="font-weight: bold;">
                <input type="radio" name="action.censys_reactive_alert_enrichment_ir_rescan_es.param.indicator_type"
                    value="web_property" id="indicator_type_web_property" />
                Web Origin
            </label>
        </div>
    </div>

    <!-- Web Property fields -->
    <div id="web_property_fields_section">
        <div class="control-group">
            <label class="control-label"
                for="censys_reactive_alert_enrichment_ir_rescan_es_web_origin_hostname_field">Hostname</label>
            <div class="controls">
                <input type="text"
                    name="action.censys_reactive_alert_enrichment_ir_rescan_es.param.web_origin_hostname_field"
                    id="censys_reactive_alert_enrichment_ir_rescan_es_web_origin_hostname_field" />
                <span class="help-block">
                    Enter the hostname.
                </span>
            </div>
        </div>
        <div class="control-group">
            <label class="control-label" for="censys_reactive_alert_enrichment_ir_rescan_es_web_origin_port_field">Web
                Origin Port</label>
            <div class="controls">
                <input type="text"
                    name="action.censys_reactive_alert_enrichment_ir_rescan_es.param.web_origin_port_field"
                    id="censys_reactive_alert_enrichment_ir_rescan_es_web_origin_port_field" />
                <span class="help-block">
                    Enter comma separated ports.
                </span>
            </div>
        </div>
    </div>
</form>
