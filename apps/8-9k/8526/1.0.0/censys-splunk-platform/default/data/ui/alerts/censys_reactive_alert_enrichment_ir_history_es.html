<form class="form-horizontal form-complex">
    <div class="control-group">
        <label class="control-label" for="censys_reactive_alert_enrichment_ir_history_es_global_account">Censys Account
            <span class="required">*</span> </label>
        <div class="controls">
            <splunk-search-dropdown name="action.censys_reactive_alert_enrichment_ir_history_es.param.global_account"
                id="censys_reactive_alert_enrichment_ir_history_es_global_account"
                search="| rest /servicesNS/nobody/censys-splunk-platform/configs/conf-censys-splunk-platform_account splunk_server=local | table title"
                label-field="title" value-field="title" />
            <span class="help-block">Select the Censys account.</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="censys_reactive_alert_enrichment_ir_history_es_host_ip_field">Host IP
            <span class="required">*</span> </label>
        <div class="controls">
            <input type="text" name="action.censys_reactive_alert_enrichment_ir_history_es.param.host_ip_field"
                id="censys_reactive_alert_enrichment_ir_history_es_host_ip_field" />
            <span class="help-block">
                Enter the IP address.
            </span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="censys_reactive_alert_enrichment_ir_history_es_start_time">Start Time <span
                class="required">*</span> </label>
        <div class="controls">
            <input type="text" name="action.censys_reactive_alert_enrichment_ir_history_es.param.start_time"
                id="censys_reactive_alert_enrichment_ir_history_es_start_time"/>
            <span class="help-block">
                Start time field must be in YYYY-MM-DDT00:00:00Z format. Example: <b>2026-01-01T00:00:00Z</b>
            </span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="censys_reactive_alert_enrichment_ir_history_es_end_time">End Time <span
                class="required">*</span> </label>
        <div class="controls">
            <input type="text" name="action.censys_reactive_alert_enrichment_ir_history_es.param.end_time"
                id="censys_reactive_alert_enrichment_ir_history_es_end_time" />
            <span class="help-block">
                End time field must be in YYYY-MM-DDT00:00:00Z format. Example: <b>2026-01-02T00:00:00Z</b>
            </span>
        </div>
    </div>
</form>
