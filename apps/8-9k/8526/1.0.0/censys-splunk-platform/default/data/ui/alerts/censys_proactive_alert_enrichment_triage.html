<form class="form-horizontal form-complex">
    <div class="control-group">
        <label class="control-label" for="censys_proactive_alert_enrichment_accont">Censys Account <span
                class="required">*</span> </label>
        <div class="controls">
            <splunk-search-dropdown name="action.censys_proactive_alert_enrichment_triage.param.global_account"
                id="censys_proactive_alert_enrichment_accont"
                search="| rest /servicesNS/nobody/censys-splunk-platform/configs/conf-censys-splunk-platform_account splunk_server=local | table title"
                label-field="title" value-field="title" />
            <span class="help-block">Select the Censys account.</span>
        </div>
    </div>

    <div class="control-group">
        <label class="control-label" for="indicator_type">Indicator Type <span class="required">*</span></label>
        <div class="controls">
            <select name="action.censys_proactive_alert_enrichment_triage.param.indicator_type" id="indicator_type">
                <option value="host">Host</option>
                <option value="web_property">Web Property</option>
                <option value="certificate">Certificate</option>
            </select>
            <span class="help-block">Select the indicator type.</span>
        </div>
    </div>

    <div class="control-group">
        <label class="control-label" for="indicator_field">Indicator field name <span class="required">*</span></label>
        <div class="controls">
            <input type="text" name="action.censys_proactive_alert_enrichment_triage.param.indicator_field"
                id="indicator_field" />
            <span class="help-block" style="display: block; position: static; width: auto; margin-left: 0;">
                Enter the comma separated field name whose value contains the indicator.
            </span>
        </div>
    </div>

    <div class="control-group">
        <label class="control-label" for="indicator_port_field">Port field name</label>
        <div class="controls">
            <input type="text" name="action.censys_proactive_alert_enrichment_triage.param.indicator_port_field"
                id="indicator_port_field" />
            <span class="help-block" style="display: block; position: static; width: auto; margin-left: 0;">
                Required when selected Web Property. Enter the comma separated field name whose value contains the port.
            </span>
        </div>
    </div>
</form>
