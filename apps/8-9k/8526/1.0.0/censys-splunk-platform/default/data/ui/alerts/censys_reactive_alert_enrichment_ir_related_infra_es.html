<form class="form-horizontal form-complex">
    <div class="control-group">
        <label class="control-label" for="censys_reactive_alert_enrichment_ir_related_infra_es_global_account">Censys Account
            <span class="required">*</span> </label>
        <div class="controls">
            <splunk-search-dropdown
                name="action.censys_reactive_alert_enrichment_ir_related_infra_es.param.global_account"
                id="censys_reactive_alert_enrichment_ir_related_infra_es_global_account"
                search="| rest /servicesNS/nobody/censys-splunk-platform/configs/conf-censys-splunk-platform_account splunk_server=local | table title"
                label-field="title" value-field="title" />
            <span class="help-block">Select the Censys account.</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="censys_reactive_alert_enrichment_ir_related_infra_es_indicator_type">Indicator Type
            <span class="required">*</span> </label>
        <div class="controls">
            <select name="action.censys_reactive_alert_enrichment_ir_related_infra_es.param.indicator_type"
                id="censys_reactive_alert_enrichment_ir_related_infra_es_indicator_type">
                <option value="host">Host</option>
                <option value="web_property">Web Property</option>
                <option value="certificate">Certificate</option>
            </select>
            <span class="help-block">
                Select the indicator type.
            </span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="censys_reactive_alert_enrichment_ir_related_infra_es_field">Field
            <span class="required">*</span> </label>
        <div class="controls">
            <input type="text" name="action.censys_reactive_alert_enrichment_ir_related_infra_es.param.field"
                id="censys_reactive_alert_enrichment_ir_related_infra_es_field" />
            <span class="help-block">
                Provide the field name to search upon. Example: <b>host.services.protocol</b>
            </span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="censys_reactive_alert_enrichment_ir_related_infra_es_value">Value
            <span class="required">*</span> </label>
        <div class="controls">
            <input type="text" name="action.censys_reactive_alert_enrichment_ir_related_infra_es.param.value"
                id="censys_reactive_alert_enrichment_ir_related_infra_es_value" />
            <span class="help-block">
                Provide the value to search upon. Example: <b>SSH</b>
            </span>
        </div>
    </div>
</form>
