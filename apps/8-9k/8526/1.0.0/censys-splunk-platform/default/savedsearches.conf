[censys_notable_index_host_enrichment]
disabled = 1
enableSched = 1
description = Periodically enriches hosts from notables with Censys API every 30 minutes.
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
cron_schedule = */30 * * * *
search = `get_notable_index` | rex field=orig_raw max_match=0 "(?<host_ip>\b\d{1,3}(?:\.\d{1,3}){3}\b)" | where isnotnull(host_ip) | eval field_host_value = coalesce(host_ip, "null") | mvexpand field_host_value | table field_host_value, source_event_id | sendalert censys_reactive_alert_enrichment_triage_es `censys_splunk_account_name` param.indicator_type="host" param.field_name=field_host_value param.scan_type="automatic"

[censys_notable_index_web_property_enrichment]
disabled = 1
enableSched = 1
description = Periodically enriches web properties from notables with Censys API every 30 minutes.
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
cron_schedule = */30 * * * *
search = `get_notable_index` | rex field=orig_raw max_match=0 "(?<web_property>((?:[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}|(?:(?:25[0-5]|2[0-4]\d|[01]?\d\d?)\.){3}(?:25[0-5]|2[0-4]\d|[01]?\d\d?)):\d{2,5})" | where isnotnull(web_property) | eval field_web_property_value = coalesce(web_property, "null") | mvexpand field_web_property_value | table field_web_property_value, source_event_id | sendalert censys_reactive_alert_enrichment_triage_es `censys_splunk_account_name` param.indicator_type="web_property" param.field_name=field_web_property_value param.scan_type="automatic"

[censys_notable_index_certificate_enrichment]
disabled = 1
enableSched = 1
description = Periodically enriches certificate from notables with Censys API every 30 minutes.
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
cron_schedule = */30 * * * *
search = `get_notable_index` | rex field=orig_raw max_match=0 "(?<sha256>\b[A-Fa-f0-9]{64}\b)" | where isnotnull(sha256) | eval field_sha256_value = coalesce(sha256, "null") | mvexpand field_sha256_value | table field_sha256_value, source_event_id | sendalert censys_reactive_alert_enrichment_triage_es `censys_splunk_account_name` param.indicator_type="certificate" param.field_name=field_sha256_value param.scan_type="automatic"

[censys_purge_host_enrichment_lookup]
disabled = 0
enableSched = 1
description = Periodically removes entries older than 30 days from censys_host_enrichment_lookup.
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
cron_schedule = 0 0 * * *
search = | inputlookup censys_host_enrichment_lookup | eval nowstring=strftime(relative_time(now(),"-30d@d" ),"%Y-%m-%dT%H:%M:%S.%6N") | where last_enriched > nowstring | table _key, * | outputlookup censys_host_enrichment_lookup

