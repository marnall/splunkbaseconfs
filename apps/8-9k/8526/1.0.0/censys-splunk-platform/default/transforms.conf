[censys_host_enrichment_lookup]
external_type = kvstore
collection = censys_host_enrichment_collection
fields_list = _key, ip, labels, service_count, services_ports, services_protocols, services_transport_protocols, services_labels, services_vulns, services_threats, services_scan_times, dns_names, forward_dns_names, reverse_dns_names, network_name, cidrs, autonomous_system_name, autonomous_system_asn, city, province, postal_code, country, country_code, continent, latitude, longitude, last_enriched, raw_event, index, sourcetype, timestamp, scan_type

[censys_web_property_enrichment_lookup]
external_type = kvstore
collection = censys_web_property_enrichment_collection
fields_list = _key, hostname, port, scan_time, endpoint_types, endpoint_paths, labels, threats_names, vulns_names, vendors, products, versions, fingerprint_sha256, self_signed, subject_dn, issuer_dn, common_names, not_before, not_after, last_enriched, raw_event, index, sourcetype, timestamp, scan_type

[censys_certificate_enrichment_lookup]
external_type = kvstore
collection = censys_certificate_enrichment_collection
fields_list = _key, fingerprint_sha256, self_signed_signature, valid_to, self_signed, subject_dn, issuer_dn, common_names, valid_not_before, valid_not_after, last_enriched, raw_event, index, sourcetype, timestamp, scan_type

[censys_host_event_history_lookup]
external_type = kvstore
collection = censys_host_event_history_collection
fields_list = _key, host_ip, event_time, historical_host_link, resource_type, resource_key_values, last_enriched
