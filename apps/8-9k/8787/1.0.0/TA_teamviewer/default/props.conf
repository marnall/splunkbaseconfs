# ============================================================
# props.conf - TeamViewer Log Addon
# ============================================================
# Sourcetypes:
#   teamviewer         -> TeamViewer15_Logfile.log
#                      -> TeamViewer15_Hooks.log  (same format)
#   teamviewer:network -> TVNetwork.log
#
# CIM Data Models:
#   teamviewer         -> Authentication, Network Sessions, Data Access
#   teamviewer:network -> Network Traffic, Network Sessions
# ============================================================


# ============================================================
# [teamviewer] - TeamViewer15_Logfile.log / Hooks.log
# CIM: Authentication, Network Sessions, Data Access
# ============================================================

[teamviewer]

# ----------------------------------------------------------
# Line breaking
# ----------------------------------------------------------
LINE_BREAKER        = ([\r\n]+)
SHOULD_LINEMERGE    = 0
NO_BINARY_CHECK     = true
CHARSET             = UTF-8

# ----------------------------------------------------------
# Timestamp
# ----------------------------------------------------------
TIME_PREFIX              = ^
TIME_FORMAT              = %Y/%m/%d %H:%M:%S.
MAX_TIMESTAMP_LOOKAHEAD  = 24

# ----------------------------------------------------------
# Base field extraction
# Fields: date, time, pid, tid, code, message
# Multiline message: captures continuation lines that don't start with a timestamp
# ----------------------------------------------------------
EXTRACT-base = (?<date>\d{4}\/\d{2}\/\d{2})\s+(?<time>\d{2}:\d{2}:\d{2}\.\d+)\s+(?<pid>\d+)\s+(?<tid>\d+)\s+(?<code>\S+)\s*(?<message>.*(?:\n(?!\d{4}\/\d{2}\/\d{2}).*)*)

# ----------------------------------------------------------
# Severity - derived from code field suffix
#   !!   = error   (e.g. S0!!, 0!!)
#   !    = warning (e.g. S0!)
#   none = info
# ----------------------------------------------------------
EVAL-severity = case(\
    match(code, "!!"), "error",\
    match(code, "!"),  "warning",\
    1==1,              "info"\
)

# ----------------------------------------------------------
# Process type - derived from code field prefix
#   S = Service (TeamViewer_Service.exe)
#   G = GUI     (TeamViewer.exe)
#   L = Loader  (tv_w32.exe / tv_x64.exe)
#   H = Hook    (hook process)
#   0 = Pre-init / unclassified
# ----------------------------------------------------------
EVAL-proc_type = case(\
    match(code, "^S"), "Service",\
    match(code, "^G"), "GUI",\
    match(code, "^L"), "Loader",\
    match(code, "^H"), "Hook",\
    1==1,              "Unknown"\
)

# ----------------------------------------------------------
# Vendor / Product
# ----------------------------------------------------------
EVAL-vendor  = "TeamViewer"
EVAL-product = "TeamViewer"

# ----------------------------------------------------------
# Network extractions
# ----------------------------------------------------------

# UDP hole punch source IP
EXTRACT-src_ip = punch received a=(?P<src_ip>[^:]+)

# Remote hostname (hyphenated names supported)
EXTRACT-src_host = Participant channel "(?P<src_host>[^"(]+?)\s*\(

# Router IP
EXTRACT-router_ip = IP-address=\"(?P<router_ip>[^"]+)\"

# Router hostname
EXTRACT-router_host = Connecting to (?P<router_host>[\w\-\.]+\.teamviewer\.com)

# ----------------------------------------------------------
# Session extractions
# ----------------------------------------------------------

# Remote/target TV ID
EXTRACT-partner_id = TargetId=(?P<partner_id>\d+)

# Session UUID
EXTRACT-session_uuid = SessionUuid=\{(?P<session_uuid>[^}]+)\}

# Action ID
EXTRACT-action_id = ActionId=(?P<action_id>\d+)

# Local TV ID (this machine)
EXTRACT-local_id = \bID:\s+(?P<local_id>\d{5,})

# Display name of connecting user
EXTRACT-display_name = DisplayName:(?P<display_name>[^\s]+(?:\s[^\s]+)*?)\s+Smart

# Remote machine name
EXTRACT-remote_name = \bname=(?P<remote_name>[\w\-]+)

# Connection mode
EXTRACT-conn_mode = ConnectionMode:\s+(?P<conn_mode>\w+)

# Estimated RTT
EXTRACT-rtt_ms = Estimated RTT[^:]+:\s+(?P<rtt_ms>\d+)\s+ms

# Estimated bandwidth
EXTRACT-bandwidth_kbps = Estimated bandwidth capacity[^:]+:\s+(?P<bandwidth_kbps>\d+)\s+kbit

# Session end reason
EXTRACT-end_reason = CMD_ENDSESSION with reason:\s+(?P<end_reason>\w+)

# Session end latency
EXTRACT-session_latency = Latency=(?P<session_latency>\d+)ms

# ----------------------------------------------------------
# File transfer extractions
# ----------------------------------------------------------

# Download source path
EXTRACT-ft_src = Download from \"(?P<ft_src>[^"]+)\"

# Download destination path
EXTRACT-ft_dst = Download from \"[^"]+\"\s+to\s+\"(?P<ft_dst>[^"]+)\"

# Write file (incoming / received transfer)
EXTRACT-ft_write = Write file\s+(?P<ft_write>.+)

# ----------------------------------------------------------
# Auth extractions
# ----------------------------------------------------------

# Auth result
EXTRACT-auth_result = AccountLogin::[^:]+:\s+(?P<auth_result>Authentication \w+)

# Country code
EXTRACT-country_code = Client country code:\s+(?P<country_code>[A-Z]{2})

# License type
EXTRACT-license_type = (?P<license_type>Non-Commercial use|Commercial use)

# ----------------------------------------------------------
# CIM: Authentication data model
# Ref: https://help.splunk.com/en/data-management/common-information-model/5.3/data-models/authentication
#
# Covers: AccountLogin events (Google SSO / TV account login)
# Required fields: action, app, src, dest, user
# ----------------------------------------------------------

# action: success | failure (Authentication); read | write (Data Access)
# CIM Authentication valid values: success, failure, error
# CIM Data Access valid values:    read, write, delete, create, rename, move
EVAL-action = case(\
    match(message, "Authentication successful"),          "success",\
    match(message, "Authentication fail"),                "failure",\
    isnotnull(ft_src) OR isnotnull(ft_dst),              "read",\
    isnotnull(ft_write),                                 "write",\
    1==1,                                                null()\
)

# app: application performing the auth
EVAL-app = "TeamViewer"

# src: source IP of connecting client (UDP punch IP)
FIELDALIAS-src = src_ip AS src

# dest: the local machine hosting this TV instance
EVAL-dest = host

# user: authenticated display name
FIELDALIAS-user = display_name AS user

# user_type: CIM valid values are user, service, system, admin, computer
EVAL-user_type = "user"

# authentication_method: derived from log context where possible
EVAL-authentication_method = if(match(message, "[Gg]oogle"), "SSO", "password")

# ----------------------------------------------------------
# CIM: Network Sessions data model
# Ref: https://help.splunk.com/en/data-management/common-information-model/5.3/data-models/network-sessions
#
# Covers: Session start (RequestRoute) / end (CmdEndSession) events
# Required fields: action, src, dest, session_id, transport
# ----------------------------------------------------------

# session_id: TV session UUID
FIELDALIAS-session_id = session_uuid AS session_id

# dest_host: remote machine being controlled
FIELDALIAS-dest_host = remote_name AS dest_host

# transport: normalize conn_mode to lowercase for CIM compliance (Tcp -> tcp, Udp -> udp)
EVAL-transport = case(\
    lower(conn_mode)=="tcp", "tcp",\
    lower(conn_mode)=="udp", "udp",\
    1==1,                    null()\
)

# duration: session-end latency metric
FIELDALIAS-duration = session_latency AS duration

# reason: why session ended
FIELDALIAS-reason = end_reason AS reason

# ----------------------------------------------------------
# CIM: Data Access data model
# Ref: https://help.splunk.com/en/data-management/common-information-model/5.3/data-models/data-access
#
# Covers: File transfer events (Download from, Write file)
# Root constraint: tag=data, sub-dataset: tag=access
# Required fields: action, dest, object, object_category
# ----------------------------------------------------------

# object: filename being accessed/transferred
EVAL-object = if(isnull(ft_dst),\
    replace(ft_write, ".*\\\\([^\\\\]+)$", "\\1"),\
    replace(ft_dst,   ".*\\\\([^\\\\]+)$", "\\1")\
)

# object_path: full destination path
EVAL-object_path = coalesce(ft_dst, ft_write)

# object_category: type of object accessed
EVAL-object_category = "file"

# src_user: who performed the transfer (TV display name)
FIELDALIAS-src_user = display_name AS src_user

# src: not reliably available in file-transfer log lines; populated for UDP punch events
# via FIELDALIAS-src = src_ip AS src above (EVAL-src removed to avoid overriding it)

# ----------------------------------------------------------
# Metadata
# ----------------------------------------------------------
category      = Application
description   = TeamViewer main application log (TeamViewer15_Logfile.log)
pulldown_type = 1


# ============================================================
# [teamviewer:network] - TVNetwork.log
# CIM: Network Traffic, Network Sessions
# ============================================================

[teamviewer:network]

# ----------------------------------------------------------
# Line breaking
# ----------------------------------------------------------
LINE_BREAKER        = ([\r\n]+)
SHOULD_LINEMERGE    = 0
NO_BINARY_CHECK     = true
CHARSET             = UTF-8

# ----------------------------------------------------------
# Timestamp
# ----------------------------------------------------------
TIME_PREFIX              = ^
TIME_FORMAT              = %Y/%m/%d %H:%M:%S.
MAX_TIMESTAMP_LOOKAHEAD  = 24

# ----------------------------------------------------------
# Base field extraction
# Fields: date, time, pid, tid, code, message
# ----------------------------------------------------------
EXTRACT-base            = (?<date>\d{4}\/\d{2}\/\d{2})\s+(?<time>\d{2}:\d{2}:\d{2}\.\d+)\s+(?<pid>\d+)\s+(?<tid>\d+)\s+(?<code>\S+)\s+(?<message>.*)$

# ----------------------------------------------------------
# Network protocol
# Format: <proto>(<event>:<dir>):[<total>:<active>]:
#   net_proto = Tcp | UDPv4 | UDPv6
#   net_event = KA (keepalive) | RS (real session)
#   net_dir   = S (sent) | R (received)
# ----------------------------------------------------------
EXTRACT-net_proto       = (?P<net_proto>Tcp|UDPv4|UDPv6)\(
EXTRACT-net_event       = \((?P<net_event>KA|RS):(?P<net_dir>[SR])\)

# Connection counters: [total:active]
EXTRACT-net_conn_total  = \[(?P<net_conn_total>\d+):\d+\]
EXTRACT-net_conn_active = \[\d+:(?P<net_conn_active>\d+)\]

# ----------------------------------------------------------
# Derived EVAL fields (native)
# ----------------------------------------------------------

EVAL-vendor    = "TeamViewer"
EVAL-product   = "TeamViewer"

EVAL-event_type = case(\
    net_event=="KA", "keepalive",\
    net_event=="RS", "session",\
    1==1,            "unknown"\
)

# direction: CIM Network Traffic requires inbound/outbound
EVAL-direction = case(\
    net_dir=="S", "outbound",\
    net_dir=="R", "inbound",\
    1==1,         "unknown"\
)

# ----------------------------------------------------------
# CIM: Network Traffic data model
# Ref: https://help.splunk.com/en/data-management/common-information-model/5.3/data-models/network-traffic
#
# Covers: All TVNetwork.log lines (Tcp/UDP traffic stats)
# Required fields: action, src, dest, transport, direction
# Note: src/dest IP not available in TVNetwork.log (stats log, not packet log)
# ----------------------------------------------------------

# transport: normalized protocol name
EVAL-transport = case(\
    net_proto=="Tcp",   "tcp",\
    net_proto=="UDPv4", "udp",\
    net_proto=="UDPv6", "udp6",\
    1==1,               "unknown"\
)

# action: TV traffic is permitted by definition in this log
EVAL-action = "allowed"

# dvc: device generating the log
EVAL-dvc = host

# ----------------------------------------------------------
# CIM: Network Sessions data model
# Ref: https://help.splunk.com/en/data-management/common-information-model/5.3/data-models/network-sessions
#
# Covers: RS (Real Session) events - active session traffic windows
# Required fields: action, transport, session_state
# ----------------------------------------------------------

# session_state: active during RS, idle during KA
EVAL-session_state = case(\
    net_event=="RS", "active",\
    net_event=="KA", "idle",\
    1==1,            "unknown"\
)

# connection_count_total: cumulative connections since service start
FIELDALIAS-connection_count_total  = net_conn_total  AS connection_count_total

# connection_count_active: connections active at time of this log line
FIELDALIAS-connection_count_active = net_conn_active AS connection_count_active

# ----------------------------------------------------------
# Metadata
# ----------------------------------------------------------
category      = Network
description   = TeamViewer network statistics log (TVNetwork.log)
pulldown_type = 1
