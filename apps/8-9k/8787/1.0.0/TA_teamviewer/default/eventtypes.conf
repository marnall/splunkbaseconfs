# ============================================================
# eventtypes.conf - TeamViewer Log Addon
# ============================================================

# ----------------------------------------------------------
# CIM: Authentication - sourcetype=teamviewer
# ----------------------------------------------------------

[teamviewer_auth_success]
search = sourcetype=teamviewer message="Authentication successful"

[teamviewer_auth_failure]
search = sourcetype=teamviewer message="*Authentication*" NOT message="*successful*"

[teamviewer_auth_attempt]
search = sourcetype=teamviewer message="*AccountLogin*"

# ----------------------------------------------------------
# CIM: Network Sessions - sourcetype=teamviewer
# ----------------------------------------------------------

[teamviewer_session_start]
search = sourcetype=teamviewer message="*RequestRoute*"

[teamviewer_session_end]
search = sourcetype=teamviewer message="*CmdEndSession*"

# ----------------------------------------------------------
# CIM: Data Loss Prevention - sourcetype=teamviewer
# ----------------------------------------------------------

[teamviewer_file_transfer]
search = sourcetype=teamviewer (message="Download from*" OR message="Write file*")

# ----------------------------------------------------------
# CIM: Network Sessions - sourcetype=teamviewer:network
# ----------------------------------------------------------

[teamviewer_session_traffic]
search = sourcetype=teamviewer:network net_event=RS

[teamviewer_keepalive]
search = sourcetype=teamviewer:network net_event=KA

# ----------------------------------------------------------
# CIM: Network Traffic - sourcetype=teamviewer:network
# ----------------------------------------------------------

[teamviewer_tcp_traffic]
search = sourcetype=teamviewer:network net_proto=Tcp

[teamviewer_udp_traffic]
search = sourcetype=teamviewer:network (net_proto=UDPv4 OR net_proto=UDPv6)

# ----------------------------------------------------------
# CIM: Network Traffic - sourcetype=teamviewer (UDP punch)
# ----------------------------------------------------------

[teamviewer_udp_punch]
search = sourcetype=teamviewer src_ip=*

# ----------------------------------------------------------
# Service lifecycle - sourcetype=teamviewer
# ----------------------------------------------------------

[teamviewer_service_start]
search = sourcetype=teamviewer message="Logger started"
