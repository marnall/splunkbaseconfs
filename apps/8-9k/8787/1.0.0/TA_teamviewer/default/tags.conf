# ============================================================
# tags.conf - TeamViewer Log Addon
# Maps eventtypes to CIM data model tags
# Ref: https://help.splunk.com/en/data-management/common-information-model/5.3
#
# Verified constraints from CIM source:
#   Authentication   -> tag=authentication
#   NetworkTraffic   -> tag=network (root), sub: communicate
#   NetworkSessions  -> tag=network (root), sub: session, start, end, dhcp, vpn
#   DataAccess       -> tag=data (root), sub: access
#   DataLossPrevention -> tag=dlp
# ============================================================

# ----------------------------------------------------------
# CIM: Authentication data model
# Root constraint: tag=authentication
# action field value determines Successful/Failed dataset
# ----------------------------------------------------------

[teamviewer_auth_success]
authentication = enabled

[teamviewer_auth_failure]
authentication = enabled

[teamviewer_auth_attempt]
authentication = enabled

# ----------------------------------------------------------
# CIM: Network Sessions data model
# Root constraint: tag=network
# Sub-dataset tags: session, start, end
# ----------------------------------------------------------

[teamviewer_session_start]
network        = enabled
session        = enabled
start          = enabled

[teamviewer_session_end]
network        = enabled
session        = enabled
end            = enabled

[teamviewer_session_traffic]
network        = enabled
session        = enabled

[teamviewer_keepalive]
network        = enabled
session        = enabled

# ----------------------------------------------------------
# CIM: Network Traffic data model
# Root constraint: tag=network
# Sub-dataset tags: communicate
# ----------------------------------------------------------

[teamviewer_tcp_traffic]
network        = enabled
communicate    = enabled

[teamviewer_udp_traffic]
network        = enabled
communicate    = enabled

[teamviewer_udp_punch]
network        = enabled
communicate    = enabled

# ----------------------------------------------------------
# CIM: Data Access data model
# Root constraint: tag=data
# Sub-dataset tag: access
# Covers: file read/write/transfer via remote session
# ----------------------------------------------------------

[teamviewer_file_transfer]
data           = enabled
access         = enabled
