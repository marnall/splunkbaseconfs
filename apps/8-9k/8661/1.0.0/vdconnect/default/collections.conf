#
# VDConnect — KV Store Collections
# Used to persist checkpoints for incremental data collection.
#

[vdconnect_checkpoints]
enforceTypes   = true
field.input_name = string
field.db_type    = string
field.collection = string
field.last_value = string
field.last_type  = string
field.last_run   = time
field.row_count  = number

[vdconnect_connections]
enforceTypes   = true
field.conn_name  = string
field.db_type    = string
field.host       = string
field.port       = number
field.auth_type  = string
field.use_ssl    = bool
field.status     = string
field.last_test  = time

[vdconnect_identities]
enforceTypes   = true
field.identity_name = string
field.auth_type     = string
field.db_type       = string
field.credential    = string
