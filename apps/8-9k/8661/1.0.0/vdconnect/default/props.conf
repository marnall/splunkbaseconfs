#
# VDConnect — Props Configuration
# Defines parsing, field extraction, and timestamp rules for all supported sourcetypes.
#

# ─── BASE SOURCETYPE ─────────────────────────────────────────────────────────
[vdconnect:logs]
SHOULD_LINEMERGE     = false
LINE_BREAKER         = ([\r\n]+)
KV_MODE              = json
TIME_FORMAT          = %Y-%m-%dT%H:%M:%S
TIME_PREFIX           = "timestamp"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 32
TRUNCATE             = 999999
CHARSET              = UTF-8
category             = Structured
description          = VDConnect base log events from vector databases
pulldown_type        = 1

# ─── MILVUS ──────────────────────────────────────────────────────────────────
[vdconnect:milvus]
SHOULD_LINEMERGE     = false
LINE_BREAKER         = ([\r\n]+)
KV_MODE              = json
TIME_FORMAT          = %Y-%m-%dT%H:%M:%S
TIME_PREFIX           = "timestamp"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 32
TRUNCATE             = 999999
FIELDALIAS-db_type   = vdconnect_db_type AS db_type
EVAL-app             = "vdconnect"
category             = Structured
description          = VDConnect events from Milvus vector database
pulldown_type        = 1

REPORT-milvus_fields = vdconnect_milvus_kv

