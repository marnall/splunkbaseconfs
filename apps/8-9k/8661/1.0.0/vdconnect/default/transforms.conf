#
# VDConnect — Transforms Configuration
# Defines field extraction rules for each vector database sourcetype.
#

# ─── COMMON FIELDS ───────────────────────────────────────────────────────────
[vdconnect_common_fields]
REGEX    = "(?:severity|level)"\s*:\s*"([^"]+)"
FORMAT   = severity::$1

# ─── MILVUS ──────────────────────────────────────────────────────────────────
[vdconnect_milvus_kv]
REGEX  = "(\w+)"\s*:\s*"?([^",}\]]+)"?
FORMAT = $1::$2
MV_ADD = true

# ─── PINECONE ────────────────────────────────────────────────────────────────
[vdconnect_pinecone_kv]
REGEX  = "(\w+)"\s*:\s*"?([^",}\]]+)"?
FORMAT = $1::$2
MV_ADD = true

