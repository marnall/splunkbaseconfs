#
# VDConnect — Saved Searches, Reports, and Alerts
#

# ─── REPORTS ─────────────────────────────────────────────────────────────────

[VDConnect - Events by Database Type (24h)]
search = index=vdconnect_logs OR index=vdconnect_audit OR index=vdconnect_metrics sourcetype=vdconnect:* earliest=-24h latest=now \
| eval db_type = case( \
    sourcetype=="vdconnect:milvus", "Milvus", \
    sourcetype=="vdconnect:pinecone", "Pinecone", \
    sourcetype=="vdconnect:weaviate", "Weaviate", \
    sourcetype=="vdconnect:chromadb", "ChromaDB", \
    sourcetype=="vdconnect:qdrant", "Qdrant", \
    sourcetype=="vdconnect:pgvector", "pgvector", \
    true(), "Other") \
| stats count by db_type \
| sort - count
dispatch.earliest_time = -24h@h
dispatch.latest_time   = now
display.visualizations.charting.chart = pie
disabled = false
is_visible = true

[VDConnect - Error Trend (24h)]
search = index=vdconnect_logs OR index=vdconnect_audit OR index=vdconnect_metrics sourcetype=vdconnect:* severity=ERROR earliest=-24h latest=now \
| timechart span=1h count by sourcetype
dispatch.earliest_time = -24h@h
dispatch.latest_time   = now
display.visualizations.charting.chart = line
disabled = false
is_visible = true

[VDConnect - Top Error Messages]
search = index=vdconnect_logs sourcetype=vdconnect:* severity=ERROR earliest=-24h latest=now \
| eval log_msg = coalesce(log_text, message, document, _raw) \
| top limit=25 log_msg \
| rename log_msg AS "Error Message", count AS "Count", percent AS "Percent"
dispatch.earliest_time = -24h@h
dispatch.latest_time   = now
disabled = false
is_visible = true

[VDConnect - Collection Throughput]
search = index=vdconnect_logs OR index=vdconnect_audit OR index=vdconnect_metrics sourcetype=vdconnect:* earliest=-24h latest=now \
| timechart span=15m count AS events \
| eval eps = round(events / 900, 2)
dispatch.earliest_time = -24h@h
dispatch.latest_time   = now
display.visualizations.charting.chart = area
disabled = false
is_visible = true

[VDConnect - Input Health Summary]
search = | rest /services/data/inputs/vdconnect \
| eval input_name = title \
| eval status = if(disabled=="0", "Running", "Disabled") \
| join type=left input_name \
    [ search index=vdconnect_internal sourcetype=vdconnect:internal "collection_complete" earliest=-24h \
    | stats latest(_time) AS last_success, avg(duration_ms) AS avg_duration, sum(row_count) AS total_rows by input_name ] \
| eval last_success = strftime(last_success, "%Y-%m-%d %H:%M:%S") \
| eval avg_duration = round(avg_duration, 0) \
| table input_name db_type collection_name status last_success avg_duration total_rows \
| rename input_name AS "Input", db_type AS "Database", collection_name AS "Collection", \
         status AS "Status", last_success AS "Last Success", avg_duration AS "Avg Duration (ms)", \
         total_rows AS "Total Rows (24h)"
dispatch.earliest_time = -24h@h
dispatch.latest_time   = now
disabled = false
is_visible = true

[VDConnect - Checkpoint Status]
search = | inputlookup vdconnect_checkpoints_lookup \
| eval last_run_fmt = strftime(strptime(last_run, "%Y-%m-%dT%H:%M:%S"), "%Y-%m-%d %H:%M:%S") \
| table input_name db_type collection last_value last_run_fmt row_count \
| rename input_name AS "Input", db_type AS "Database", collection AS "Collection", \
         last_value AS "Last Checkpoint", last_run_fmt AS "Last Run", row_count AS "Rows"
disabled = false
is_visible = true

# ─── ALERTS ──────────────────────────────────────────────────────────────────

[VDConnect - Alert: Collection Failure]
search = index=vdconnect_internal sourcetype=vdconnect:internal level=ERROR "Collection failed" earliest=-15m latest=now \
| stats count by input_name, db_type, message \
| where count > 0
dispatch.earliest_time = -15m
dispatch.latest_time   = now
cron_schedule          = */5 * * * *
is_scheduled           = true
alert.severity         = 4
alert.suppress         = true
alert.suppress.period  = 1h
alert.suppress.fields  = input_name
alert_type             = number of events
alert_comparator       = greater than
alert_threshold        = 0
counttype              = number of events
relation               = greater than
quantity               = 0
disabled               = true

[VDConnect - Alert: No Data Received]
search = | rest /services/data/inputs/vdconnect \
| search disabled=0 \
| eval input_name = title \
| join type=left input_name \
    [ search index=vdconnect_internal "collection_complete" earliest=-2h latest=now \
    | stats latest(_time) AS last_run by input_name ] \
| where isnull(last_run) OR last_run < relative_time(now(), "-2h") \
| table input_name db_type collection_name
cron_schedule          = 0 * * * *
is_scheduled           = true
alert.severity         = 3
alert_type             = number of events
alert_comparator       = greater than
alert_threshold        = 0
disabled               = true

[VDConnect - Alert: High Error Rate]
search = index=vdconnect_internal sourcetype=vdconnect:internal earliest=-1h latest=now \
| stats count(eval(level=="ERROR")) AS errors, count AS total \
| eval error_pct = round((errors / total) * 100, 2) \
| where error_pct > 10
cron_schedule          = */15 * * * *
is_scheduled           = true
alert.severity         = 4
alert_type             = number of events
alert_comparator       = greater than
alert_threshold        = 0
disabled               = true

# ─── MACROS ──────────────────────────────────────────────────────────────────
# Note: Macros are defined in macros.conf but documented here for reference.
# `vdconnect_all_events` = index=vdconnect_logs OR index=vdconnect_audit OR index=vdconnect_metrics sourcetype=vdconnect:*
# `vdconnect_errors`     = index=vdconnect_logs sourcetype=vdconnect:* severity=ERROR
# `vdconnect_internal`   = index=vdconnect_internal sourcetype=vdconnect:internal
