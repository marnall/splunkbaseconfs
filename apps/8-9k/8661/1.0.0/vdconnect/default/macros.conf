#
# VDConnect — Search Macros
# Use these macros in SPL for quick access to VDConnect data.
#
# Usage:
#   `vdconnect_all_events` | stats count by sourcetype
#   `vdconnect_errors` | top 10 log_text
#   `vdconnect_internal` level=ERROR | table _time message
#   `vdconnect_db(milvus)` | timechart count
#

[vdconnect_all_events]
definition = index=vdconnect_logs OR index=vdconnect_audit OR index=vdconnect_metrics sourcetype=vdconnect:*
iseval = 0

[vdconnect_errors]
definition = index=vdconnect_logs OR index=vdconnect_audit OR index=vdconnect_metrics sourcetype=vdconnect:* (severity=ERROR OR severity=CRITICAL OR severity=FATAL)
iseval = 0

[vdconnect_warnings]
definition = index=vdconnect_logs OR index=vdconnect_audit OR index=vdconnect_metrics sourcetype=vdconnect:* (severity=WARN OR severity=WARNING)
iseval = 0

[vdconnect_internal]
definition = index=vdconnect_internal sourcetype=vdconnect:internal
iseval = 0

[vdconnect_db(1)]
args = db_type
definition = index=vdconnect_logs OR index=vdconnect_audit OR index=vdconnect_metrics sourcetype=vdconnect:$db_type$
iseval = 0

[vdconnect_input(1)]
args = input_name
definition = index=vdconnect_logs OR index=vdconnect_audit OR index=vdconnect_metrics sourcetype=vdconnect:* source="vdconnect://*/$input_name$"
iseval = 0

[vdconnect_collection(1)]
args = collection_name
definition = index=vdconnect_logs OR index=vdconnect_audit OR index=vdconnect_metrics sourcetype=vdconnect:* vdconnect_collection="$collection_name$"
iseval = 0

[vdconnect_severity_stats]
definition = eval severity = coalesce(severity, level, "UNKNOWN") | stats count by severity | sort severity_id
iseval = 0
