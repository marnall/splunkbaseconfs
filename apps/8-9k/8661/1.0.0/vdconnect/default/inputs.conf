[vdconnect]
python.version = python3.9


#
# VDConnect — Default Input Configuration
# All inputs are disabled by default. Enable and configure in local/inputs.conf.
#
# ┌──────────────────────────────────────────────────────────────────────────┐
# │  EXAMPLES — Copy to local/inputs.conf and customize for your setup      │
# └──────────────────────────────────────────────────────────────────────────┘



# ─── MILVUS EXAMPLE ──────────────────────────────────────────────────────────
# [vdconnect://milvus_error_logs]
# db_type            = milvus
# host               = milvus-prod.company.com
# port               = 19530
# python.version     = python3.9
# auth_type          = token
# token              = your_milvus_token_here
# use_ssl            = false
# database_name      = default
# collection_name    = error_logs
# output_fields      = log_text, timestamp, severity, source, hostname
# filter_expr        = severity in ["ERROR", "WARN"]
# collection_mode    = rising_column
# rising_column      = timestamp
# rising_column_type = timestamp
# max_rows           = 10000
# interval           = 300
# index              = vdconnect_logs
# sourcetype         = vdconnect:milvus
# disabled           = true

# ─── PINECONE EXAMPLE ───────────────────────────────────────────────────────
# [vdconnect://pinecone_query_audit]
# db_type            = pinecone
# host               = us-east-1-aws
# port               = 443
# python.version     = python3.9
# auth_type          = api_key
# api_key            = your_pinecone_api_key_here
# use_ssl            = true
# collection_name    = query-audit-index
# output_fields      = *
# collection_mode    = batch
# max_rows           = 5000
# interval           = 600
# index              = vdconnect_audit
# sourcetype         = vdconnect:pinecone
# disabled           = true

# ─── WEAVIATE EXAMPLE ───────────────────────────────────────────────────────
# [vdconnect://weaviate_app_logs]
# db_type            = weaviate
# host               = weaviate.company.com
# port               = 8080
# python.version     = python3.9
# auth_type          = api_key
# api_key            = your_weaviate_api_key_here
# use_ssl            = true
# collection_name    = ApplicationLog
# output_fields      = message, timestamp, level, service, traceId
# filter_expr        = {"path": ["level"], "operator": "Equal", "valueText": "ERROR"}
# collection_mode    = rising_column
# rising_column      = timestamp
# max_rows           = 10000
# interval           = 120
# index              = vdconnect_logs
# sourcetype         = vdconnect:weaviate
# disabled           = true

# ─── CHROMADB EXAMPLE ───────────────────────────────────────────────────────
# [vdconnect://chromadb_embeddings]
# db_type            = chromadb
# host               = chroma.internal.net
# port               = 8000
# python.version     = python3.9
# auth_type          = none
# use_ssl            = false
# collection_name    = embed_activity
# output_fields      = *
# collection_mode    = batch
# max_rows           = 5000
# interval           = 900
# index              = vdconnect_metrics
# sourcetype         = vdconnect:chromadb
# disabled           = true

# ─── QDRANT EXAMPLE ─────────────────────────────────────────────────────────
# [vdconnect://qdrant_search_logs]
# db_type            = qdrant
# host               = qdrant.company.com
# port               = 6333
