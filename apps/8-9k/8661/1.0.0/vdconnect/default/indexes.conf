#
# VDConnect — Index Configuration
# These indexes are created to store logs collected from vector databases.
# Adjust retention and sizing based on your environment.
#

[vdconnect_logs]
coldPath   = $SPLUNK_DB/vdconnect_logs/colddb
homePath   = $SPLUNK_DB/vdconnect_logs/db
thawedPath = $SPLUNK_DB/vdconnect_logs/thaweddb
frozenTimePeriodInSecs = 7776000

[vdconnect_audit]
coldPath   = $SPLUNK_DB/vdconnect_audit/colddb
homePath   = $SPLUNK_DB/vdconnect_audit/db
thawedPath = $SPLUNK_DB/vdconnect_audit/thaweddb
frozenTimePeriodInSecs = 15552000

[vdconnect_metrics]
coldPath   = $SPLUNK_DB/vdconnect_metrics/colddb
homePath   = $SPLUNK_DB/vdconnect_metrics/db
thawedPath = $SPLUNK_DB/vdconnect_metrics/thaweddb
frozenTimePeriodInSecs = 7776000

[vdconnect_internal]
coldPath   = $SPLUNK_DB/vdconnect_internal/colddb
homePath   = $SPLUNK_DB/vdconnect_internal/db
thawedPath = $SPLUNK_DB/vdconnect_internal/thaweddb
frozenTimePeriodInSecs = 2592000
