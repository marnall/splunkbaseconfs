[cisco_expressway_syslog]
pulldown_type = true

#These are only present in the non-CDR events.
FIELDALIAS-srcip-1 = Src_ip AS origIpAddr
FIELDALIAS-srcip-2 = Src_ip AS src_ip
FIELDALIAS-dstip-1 = Dst_ip AS destIpAddr
FIELDALIAS-dstip-2 = Dst_ip AS dest_ip
FIELDALIAS-srcport  = Src-port AS src_port
FIELDALIAS-destport = Dst-port AS dest_port
FIELDALIAS-code = Code AS status

#these are only present in the CDR events
EVAL-data_type=if(Detail="Call Detail Record" OR Event="MediaStats","expressway_cdr_syslog","expressway_syslog")
EVAL-duration = spath(details, "Call.Duration")
EVAL-destinationAlias=spath(details, "Call.DestinationAlias")
EVAL-sourceAlias=spath(details, "Call.SourceAlias")
EVAL-state=spath(details, "State")
EVAL-licensed=spath(details, "Licensed")
EVAL-licensedAsTraversal=spath(details, "LicensedAsTraversal")

EVAL-minute_of_hour = strftime(_time,"%M")
EVAL-hour_of_day = strftime(_time,"%H")
EVAL-day_of_week = strftime(_time,"%a")
EVAL-day_of_month= strftime(_time,"%d")
EVAL-day_of_year = strftime(_time,"%j")
EVAL-month_of_year = strftime(_time,"%B")

[cisco_expressway_cdr_csv]
pulldown_type = true

# TBD - once we can confirm that the mystery time is connect time,  this should actually
# be end_time - connect_time.  Also don't forget about the same change on the json side.
EVAL-duration = replace(tostring(strptime(end_time, "%Y-%m-%d %H:%M:%S.%6Q") - strptime(start_time, "%Y-%m-%d %H:%M:%S.%6Q")), "\.000000","")
EVAL-cause_description = disconnect_reason
EVAL-data_type = "expressway_cdr"
EVAL-call_id = uuid

EVAL-minute_of_hour = strftime(_time,"%M")
EVAL-hour_of_day = strftime(_time,"%H")
EVAL-day_of_week = strftime(_time,"%a")
EVAL-day_of_month= strftime(_time,"%d")
EVAL-day_of_year = strftime(_time,"%j")
EVAL-month_of_year = strftime(_time,"%B")

EVAL-duration_in_minutes = round((strptime(end_time, "%Y-%m-%d %H:%M:%S.%6Q") - strptime(start_time, "%Y-%m-%d %H:%M:%S.%6Q"))/60,2)

#spath.  Once we get some minimum actionable feedback, we'll pull many more things out of the details object.
EVAL-Audio = spath(details, "Call.Audio")
EVAL-origIpAddr = spath(details, "Call.Legs{0}.Leg.SIP.Address")
EVAL-destIpAddr = spath(details, "Call.Legs{1}.Leg.SIP.Address")



