[id]
name = SA_expressway_cdr
version = 0.5.3
#splunkbase_id = 8593

[ui]
is_visible = 1
label = Supporting App for Expressway CDR
supported_themes = light, dark

[launcher]
author = Sideview, LLC
description = This is a Supporting app designed to be deployed with Sideview's "Supporting Add-on for Expressway CDR" ALSO present on the Indexing tier. That "Add-on" component contains crucial index-time configuration to index the CDR into Splunk correctly, and that configuration is NOT present in this app here.  These two apps are furthermore designed to work with Sideview's commercial "Cisco CDR Reporting and Analytics" app. When all three components are present and deployed to the right tiers, users can navigate, troubleshoot and build ad-hoc charts and reports around the Expressway data, within the the Cisco CDR app's complex user interfaces.
version = 0.5.3

[package]
id = SA_expressway_cdr
check_for_updates = 1
show_upgrade_notification = 1

[install]
build = 21


[shclustering]
deployer_lookups_push_mode = always_preserve


[triggers]
reload.sideview_data_types = access_endpoints /admin/conf-sideview_data_types
reload.svobjects = access_endpoints /admin/conf-svobjects

# it is an open question whether this is still needed.  Although it's not formally deprecated, it does
# seem redundant with other newer keys and I don't think appinspect checks for it.
[author=sideview]
email = info@sideviewapps.com
company = Sideview, LLC