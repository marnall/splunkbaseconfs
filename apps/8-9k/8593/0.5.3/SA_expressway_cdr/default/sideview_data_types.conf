[expressway_cdr_syslog]
label = Cisco Expressway Syslog CDR
sourcetypes = cisco_expressway_syslog
object_ids = call_id
streaming_extractions = search ( ( Event="CDR" Detail="Call Detail Record" ) OR Event="MediaStats" OR sourcetype!="cisco_expressway_syslog") | spath input=details | foreach Call.Legs{}.* [eval '<<FIELD>>'=if('<<FIELD>>'=="", "x", '<<FIELD>>') | eval <<MATCHSTR>>=mvappend('<<MATCHSTR>>', '<<FIELD>>')] | fields - Call.Legs{}.Leg.*
detail_view = call_detail_expressway_syslog


