[triage-command]
syntax = triage [model=<string>] [context_fields=<field1,field2,...>] [cache=<true|false>] [cache_ttl=<seconds>] [cache_key_fields=<field1,field2,...>] [ollama_url=<url>] [ollama_model=<model>]
shortdesc = AI-assisted alert triage for events.
description = Enriches each event with severity, MITRE ATT&CK guess, rationale, false-positive estimate, kill chain phase, and IOC extraction.
example1 = index=main | triage
example2 = index=edr sourcetype=crowdstrike:*Detection* | triage model=ollama context_fields="UserName,CommandLine,Technique"
comment1 = Adds triage_* fields to each event.
