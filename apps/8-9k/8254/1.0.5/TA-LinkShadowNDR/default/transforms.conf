# ------------------------------------------------------
# CEF Header Extraction
# ------------------------------------------------------
# Extracts the 7 standard CEF header fields based on pipe delimiters.
[linkshadow_cef_headers]
REGEX = CEF:\d+\|([^|]+)\|([^|]+)\|([^|]+)\|([^|]+)\|([^|]+)\|([^|]+)\|(.*)
FORMAT = device_vendor::$1 device_product::$2 device_version::$3 signature_id::$4 signature::$5 severity_id::$6 _raw_extension::$7

# ------------------------------------------------------
# Robust Key-Value Extraction (FIXED)
# ------------------------------------------------------
# FIX: Switched from greedy (.+) to non-greedy (.+?) for value capture. 
# This ensures it stops immediately when the lookahead condition (start of the next key) is met, 
# preventing premature truncation often seen with space delimiters.
[linkshadow_cef_extension_kv]
SOURCE_KEY = _raw_extension
REGEX = (?<key>[a-zA-Z0-9_\-\.]+)=(?<value>.+?)(?=\s+[a-zA-Z0-9_\-\.]+=|$)
FORMAT = $key::$value
MV_ADD = true

# ------------------------------------------------------
# Lookups
# ------------------------------------------------------
[linkshadow_action_lookup]
filename = linkshadow_actions.csv
default_match = allowed
min_matches = 1
