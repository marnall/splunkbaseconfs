[linkshadow_ndr_cef]
# ----------------------------------------
# Index Time Settings (Indexers/HF)
# ----------------------------------------
SHOULD_LINEMERGE = false
#LINE_BREAKER = ^(\w{3}\s+\d+\s+\d+:\d+:\d+)
LINE_BREAKER = ([\r\n]+)(?=(\w{3}\s+\d+\s+\d+:\d+:\d+))
# Explicit timestamp parsing for Syslog format "Nov 25 17:00:37"
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 32
TIME_FORMAT = %b %d %H:%M:%S

# ----------------------------------------
# Search Time Extraction (Search Heads)
# ----------------------------------------

# 1. Parse the main CEF Headers (Pipes)
REPORT-1_linkshadow_headers = linkshadow_cef_headers

# 2. Parse the Extensions (Key=Value pair)
# This handles 'msg' and 'cat' even if they contain spaces
REPORT-2_linkshadow_kv      = linkshadow_cef_extension_kv

# 3. Field Aliasing (CIM)
FIELDALIAS-src        = src AS src_ip
FIELDALIAS-dst        = dst AS dest
FIELDALIAS-dst_ip     = dst AS dest_ip
FIELDALIAS-dvc        = dvc AS dest_nt_host
FIELDALIAS-spt        = spt AS src_port
FIELDALIAS-dpt        = dpt AS dest_port
FIELDALIAS-proto      = cs4 AS transport
FIELDALIAS-file_name  = fileType AS file_name
FIELDALIAS-http_ua    = requestClientApplication AS http_user_agent
FIELDALIAS-http_meth  = requestMethod AS http_method
FIELDALIAS-uri        = request AS url
FIELDALIAS-signature  = signature AS signature_name
FIELDALIAS-cat        = cat AS category

# 4. Severity Mapping
# Mapping CEF Severity (Header Field) to CIM Severity
EVAL-vendor_severity = severity_id
EVAL-severity = case(severity_id <= 3, "low", severity_id <= 6, "medium", severity_id <= 8, "high", severity_id <= 10, "critical", 1=1, "unknown")

# 5. Vendor/Product assignment
EVAL-vendor = "LinkShadow"
EVAL-product = "NDR"
EVAL-app = "LinkShadowNDR"

# 6. CIM Data Models
LOOKUP-linkshadow_action_lookup = linkshadow_action_lookup vendor_action OUTPUT action
