#
# Pre-built saved searches and alerts for SpoofSentry
#

[SpoofSentry - Critical Threats (Last 24h)]
search = sourcetype="spoofsentry:alert" severity="critical" earliest=-24h | stats count by domain, event_type, severity | sort -count
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
is_visible = 1
description = Critical domain security threats detected in the last 24 hours

[SpoofSentry - DMARC Pass Rate by Domain]
search = sourcetype="spoofsentry:alert" event_type="SPOOF_ALERT_GENERATED" earliest=-7d | stats avg(event.data.passRate) as avg_pass_rate by domain | sort avg_pass_rate
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
is_visible = 1
description = Average DMARC pass rate per domain over the last 7 days

[SpoofSentry - Spoofing Campaigns]
search = sourcetype="spoofsentry:alert" event_type IN ("SPOOF_THREAT_DETECTED", "SPOOF_THREAT_CRITICAL", "SPOOF_FORENSIC_SPOOFING") earliest=-30d | timechart count by domain
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
is_visible = 1
description = Spoofing campaign detections over the last 30 days

[SpoofSentry - Lookalike Domain Threats]
search = sourcetype="spoofsentry:alert" event_type="SPOOF_LOOKALIKE_THREAT" earliest=-30d | stats count by event.data.variant, event.data.riskScore | sort -event.data.riskScore
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
is_visible = 1
description = Lookalike domains detected as threats in the last 30 days

[SpoofSentry - Takedown Case Activity]
search = sourcetype="spoofsentry:alert" event_type IN ("TAKEDOWN_CREATED", "TAKEDOWN_DISPATCHED", "TAKEDOWN_ESCALATED", "TAKEDOWN_RESOLVED") earliest=-30d | stats count by event_type | sort event_type
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
is_visible = 1
description = Takedown orchestration activity over the last 30 days

[SpoofSentry - Enforcement Changes]
search = sourcetype="spoofsentry:alert" event_type IN ("SPOOF_DNS_CHANGES_APPLIED", "SPOOF_DNS_VERIFICATION_SUCCEEDED", "SPOOF_DNS_VERIFICATION_FAILED") earliest=-7d | stats count by event_type, domain | sort -count
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
is_visible = 1
description = DNS enforcement changes in the last 7 days

[SpoofSentry - Event Volume by Severity]
search = sourcetype="spoofsentry:alert" earliest=-7d | timechart count by severity
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
is_visible = 1
description = SpoofSentry event volume broken down by severity over 7 days

[Alert - SpoofSentry Critical Threat Detected]
search = sourcetype="spoofsentry:alert" severity="critical"
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 1
alert.suppress.period = 15m
alert.suppress.fields = domain, event_type
cron_schedule = */5 * * * *
is_scheduled = 1
is_visible = 1
description = Fires when a critical domain security threat is detected
disabled = 1
