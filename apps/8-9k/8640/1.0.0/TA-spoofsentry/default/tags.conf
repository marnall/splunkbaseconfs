#
# CIM tags for SpoofSentry events
#

[eventtype=spoofsentry_alert]
alert = enabled
email = enabled
authentication = enabled

[eventtype=spoofsentry_threat]
attack = enabled
ids = enabled

[eventtype=spoofsentry_spoofing]
attack = enabled
email = enabled

[eventtype=spoofsentry_lookalike]
attack = enabled
web = enabled

[eventtype=spoofsentry_takedown]
alert = enabled
change = enabled

[eventtype=spoofsentry_enforcement]
change = enabled
email = enabled
