#
# Event types for Splunk CIM compatibility
#

[spoofsentry_alert]
search = sourcetype="spoofsentry:alert"

[spoofsentry_threat]
search = sourcetype="spoofsentry:alert" severity IN ("critical", "high")

[spoofsentry_enforcement]
search = sourcetype="spoofsentry:alert" event_type="SPOOF_DNS_CHANGES_APPLIED" OR event_type="SPOOF_DNS_VERIFICATION_SUCCEEDED" OR event_type="SPOOF_DNS_VERIFICATION_FAILED"

[spoofsentry_spoofing]
search = sourcetype="spoofsentry:alert" event_type="SPOOF_THREAT_DETECTED" OR event_type="SPOOF_THREAT_CRITICAL" OR event_type="SPOOF_FORENSIC_SPOOFING"

[spoofsentry_lookalike]
search = sourcetype="spoofsentry:alert" event_type="SPOOF_LOOKALIKE_THREAT"

[spoofsentry_takedown]
search = sourcetype="spoofsentry:alert" event_type IN ("TAKEDOWN_CREATED", "TAKEDOWN_DISPATCHED", "TAKEDOWN_ESCALATED", "TAKEDOWN_RESOLVED")

[riskreply_alert]
search = sourcetype="riskreply:event"
