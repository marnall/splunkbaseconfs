#
# Props for SpoofSentry event sourcetypes
#

[spoofsentry:alert]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s
MAX_TIMESTAMP_LOOKAHEAD = 20
TRUNCATE = 999999
KV_MODE = json
FIELDALIAS-severity = event.severity AS severity
FIELDALIAS-eventType = event.eventType AS event_type
FIELDALIAS-domain = event.domain AS domain
FIELDALIAS-tenantId = event.tenantId AS tenant_id
FIELDALIAS-cef = event.cef AS cef_raw
EVAL-vendor_product = "SpoofSentry"
EVAL-app = "spoofsentry"

[spoofsentry:cef]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = rt=
TIME_FORMAT = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 20

[riskreply:event]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s
MAX_TIMESTAMP_LOOKAHEAD = 20
TRUNCATE = 999999
KV_MODE = json
FIELDALIAS-severity = event.severity AS severity
FIELDALIAS-eventType = event.eventType AS event_type
FIELDALIAS-tenantId = event.tenantId AS tenant_id
EVAL-vendor_product = "RiskReply"
EVAL-app = "riskreply"
