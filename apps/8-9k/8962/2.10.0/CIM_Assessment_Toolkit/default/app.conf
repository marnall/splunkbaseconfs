[install]
# Setup page (cat_setup) presents a one-time confirmation with an optional
# SMTP password field for scheduled email delivery. Clicking "Save and
# continue" stores the credential (if provided) and sets is_configured = 1
# in local/app.conf so subsequent launches go straight to the dashboard.
# CAT's dashboard and all CIM assessment features work without setup;
# SMTP credentials are only required for scheduled report email delivery.
is_configured = 0
build = 2026062805

[launcher]
author = Machine Data Insights Inc.
version = 2.10.0
description = Measure and validate CIM compliance across Splunk data models at the data model + dataset level. Includes prescribed value validation, acceleration health monitoring, and CIM field reference. Developed by Machine Data Insights Inc.

[package]
id = CIM_Assessment_Toolkit
check_for_updates = true

[id]
version = 2.10.0

[ui]
is_visible = 1
label = CIM Assessment Toolkit
setup_view = cat_setup
