# Primary base search macro for all v2 dashboard queries
[cim_validator_base_search]
definition = index=`cim_validator_index` ReportType="cim_validator_v2" \
    | rename orig_index AS index, orig_sourcetype AS sourcetype
iseval = 0

# Summary index name
[cim_validator_index]
definition = cim_validator_index
iseval = 0

# Data models to include in CIM validation
# Edit this list to match your environment
[cim_validator_data_model_list]
definition = Alerts, Authentication, Certificates, Change, Compute_Inventory, DLP, Data_Access, Databases, Email, Endpoint, Event_Signatures, Interprocess_Messaging, Intrusion_Detection, JVM, Malware, Network_Resolution, Network_Sessions, Network_Traffic, Performance, Splunk_Audit, Splunk_CIM_Validation, Ticket_Management, Updates, Vulnerabilities, Web
iseval = 0

# Macro to unwrap a string passed through map token substitution
[non_quoted_string(1)]
args = srch_search
definition = $srch_search$
iseval = 0

# CIM compliance status lookup file


[cim_validator_environment]
definition = "Production"
description = Environment name for report generation (e.g., Production, Corp, QA, Dev)
iseval = 0

[cim_report_recipients]
definition = ""
description = Comma-separated email addresses for the weekly CIM Assessment Report (e.g., "security-team@company.com, manager@company.com")
iseval = 0

[cim_report_sender]
definition = ""
description = From address for the CIM Assessment Report email. Leave empty to use Splunk's configured sender.
iseval = 0

[cim_report_trend_days]
definition = 7
description = Number of days back for the Compliance Trends comparison in the CIM Assessment Report. Set to 7 for weekly, 30 for monthly. The report compares current scores against scores from this many days ago.
iseval = 0

[cim_report_scope]
definition = all
description = Report scope filter based on data model categories. Values: "all" (default), "security", "operational", or any custom category defined in the cim_model_categories lookup. Controls which data models appear in the CIM Assessment Report.
iseval = 0

