# CIM data model field definitions
# To refresh the CIM reference between releases, replace the CSV in lookups/
# with an updated version of the same filename -- no conf changes needed.
[splunk_data_model_objects_fields]
batch_index_query = 0
case_sensitive_match = 1
filename = splunk_data_model_objects_fields.csv

# CIM data model categories (security, operational, etc.)
# Edit this lookup to customize model classifications for your environment
[cim_model_categories]
filename = cim_model_categories.csv

# Sourcetype inventory - master reference for all known sourcetypes.
# Enrichment only: supplies scope, security_classification, security_relevance,
# data_models, vendor, description, and expanded_desc context for the dashboard
# and report. CIM-compliance exclusions live in the separate
# cim_sourcetype_exclusions lookup (below), not here.
# Edit via Settings > Lookups > Lookup table files
[cim_sourcetype_inventory]
filename = cim_sourcetype_inventory.csv

# Sourcetype exclusions - the (typically short) list of sourcetypes to omit from
# CIM-compliance calculations and the unmapped/coverage views; ships seeded with
# Splunk/Cribl internal plumbing sourcetypes. Schema:
#   sourcetype, exclude, exclude_reason, reviewed_by, reviewed_date
# The exclude column is case-insensitive and accepts y/yes/t/true/1 (= exclude)
# or n/no/f/false/0 (= keep). A blank exclude - or a bare sourcetype row with no
# other columns - is treated as excluded, so a plain list of sourcetypes is
# sufficient to exclude them. All consumers read this lookup through a
# fault-tolerant subsearch, so if the file is missing or unreadable nothing is
# excluded and the rest of CAT keeps working.
# Edit in place via Settings > Lookups, the Lookup Editor app, or a text editor.
# To preserve custom exclusions across app upgrades, upload your list under a NEW
# filename and repoint this definition to it: the override is written to
# local/transforms.conf and the custom file is not part of the upgrade package,
# so both survive the upgrade (the shipped seed below is refreshed instead).
[cim_sourcetype_exclusions]
filename = sourcetype_exclusions.csv

# Sourcetype inventory provenance sidecar — single-row changelog that records
# when the inventory was last updated, by whom, a short note, and which base
# catalog version a custom inventory was derived from.
# Columns: last_updated, updated_by, note, base_catalog_last_updated.
# Surfaced as an "as of" line in the CIM Assessment Report. Defining it here
# keeps the file paired with a lookup definition (AppInspect) and makes it
# queryable: | inputlookup cim_sourcetype_inventory_version
[cim_sourcetype_inventory_version]
filename = cim_sourcetype_inventory.csv.version.csv
