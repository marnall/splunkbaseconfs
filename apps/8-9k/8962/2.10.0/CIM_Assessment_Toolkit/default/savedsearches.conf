##############################################################################
# CIM Assessment Toolkit v2.1.0f - Saved Searches
# Machine Data Insights Inc.
# Copyright 2025-2026 Machine Data Insights Inc. — Apache License 2.0
#
# v2.1.0f: Complete rewrite of collection architecture.
#   Phase 1: One-tstats-per-field for main metrics (field_count, dc, coverage)
#   Phase 2: tstats BY field_value + SPL filter for prescribed value compliance
#   Phase 3: Merge via stats max()/values() - safe for null handling
#   Phase 4: Timestamp and collect
#   No foreach, no complex eval string building, no quoting issues.
##############################################################################

[cim_validator_collection]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 17 1 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = -1h@h
display.general.timeRangePicker.show = 0
enableSched = 1
schedule_priority = highest
schedule_window = 15
search = | inputlookup splunk_data_model_objects_fields\
| search model IN (`cim_validator_data_model_list`)\
| search NOT field_name IN ("_time", "host", "source", "sourcetype", "tag")\
| where NOT match(field_name, "^_")\
| map maxsearches=5000 maxchars=10000 search="| tstats count count($dataset$.$field_name$) as field_count dc($dataset$.$field_name$) as distinct_count FROM datamodel=\"$model$\" WHERE nodename=\"$dataset$\" BY index, sourcetype | eval modelName=\"$model$\" | eval dataset=\"$dataset$\" | eval field=\"$field_name$\""\
| rename count as total_count\
| lookup splunk_data_model_objects_fields model as modelName dataset field_name as field OUTPUT recommended required\
| where isnotnull(recommended)\
| eval field_class = case(required=="True", "required", recommended=="True", "recommended", 1==1, "optional")\
| eval percent_coverage = if(total_count > 0, round(field_count / total_count * 100, 2), 0)\
| eval percent_coverage = if(percent_coverage > 100, 100, percent_coverage)\
| append [| inputlookup splunk_data_model_objects_fields | search model IN (`cim_validator_data_model_list`) | where isnotnull(prescribed_values) AND prescribed_values != "" | search NOT field_name IN ("_time", "host", "source", "sourcetype", "tag") | where NOT match(field_name, "^_") | map maxsearches=500 maxchars=10000 search="| tstats count FROM datamodel=\"$model$\" WHERE nodename=\"$dataset$\" BY $dataset$.$field_name$, index, sourcetype | rename $dataset$.$field_name$ as field_value | rename count as value_count | eval modelName=\"$model$\" | eval dataset=\"$dataset$\" | eval field=\"$field_name$\" | eval prescribed_values=\"$prescribed_values$\"" | eval pv_list = split(prescribed_values, ",") | eval pv_list = mvmap(pv_list, trim(pv_list)) | eval is_compliant = if(mvfind(pv_list, "^".field_value."$") >= 0, 1, 0) | where is_compliant=1 | stats sum(value_count) as compliant_count by modelName dataset field index sourcetype]\
| stats max(total_count) as total_count max(field_count) as field_count max(distinct_count) as distinct_count max(percent_coverage) as percent_coverage values(field_class) as field_class values(recommended) as recommended values(required) as required max(compliant_count) as compliant_count by modelName dataset index sourcetype field\
| eval value_compliance_pct = if(isnotnull(compliant_count) AND field_count > 0, round(compliant_count / field_count * 100, 2), null())\
| eval _time = now()\
| bin _time span=1h\
| eval ReportType = "cim_validator_v2"\
| table _time modelName dataset index sourcetype field total_count field_count distinct_count percent_coverage field_class recommended required compliant_count value_compliance_pct ReportType\
| collect index=`cim_validator_index`


[cim_validator_coverage_collection]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 17 4 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = -1h@h
display.general.timeRangePicker.show = 0
enableSched = 1
schedule_priority = default
description = Collects daily CIM Coverage snapshots per scope into the summary index. Runs after cim_validator_collection completes. Produces one row per scope (security, operational, etc.) plus an "all" row for global tracking.
search = | tstats count WHERE index=* NOT index=_* NOT index=`cim_validator_index` BY sourcetype\
| join type=left sourcetype\
    [| search `cim_validator_base_search`\
    | lookup cim_model_categories model as modelName OUTPUT category\
    | eval category = if(isnotnull(category) AND category!="", category, "uncategorized")\
    | makemv delim="," category\
    | mvexpand category\
    | eval category = trim(category)\
    | stats values(category) as mapped_categories by sourcetype]\
| lookup cim_sourcetype_inventory sourcetype OUTPUT scope\
| join type=left sourcetype\
    [| inputlookup cim_sourcetype_exclusions\
    | eval exclude = if(match(lower(trim(exclude)), "^(n|no|f|false|0)$"), "N", "Y")\
    | fields sourcetype exclude]\
| eval exclude = if(isnull(exclude), "N", exclude)\
| where NOT (exclude="Y")\
| eval scope = if(isnotnull(scope) AND scope!="", scope, "unknown")\
| makemv delim="," scope\
| mvexpand scope\
| eval scope = trim(scope)\
| eval is_mapped = if(isnotnull(mapped_categories) AND mvfind(mapped_categories, scope) >= 0, 1, 0)\
| stats sum(is_mapped) as mapped count as total by scope\
| eval cim_coverage = round(mapped / total * 100, 1)\
| append\
    [| tstats count WHERE index=* NOT index=_* NOT index=`cim_validator_index` BY sourcetype\
    | join type=left sourcetype\
        [| search `cim_validator_base_search`\
        | stats dc(modelName) as model_count by sourcetype]\
    | eval is_mapped = if(isnotnull(model_count) AND model_count > 0, 1, 0)\
    | join type=left sourcetype\
        [| inputlookup cim_sourcetype_exclusions\
        | eval exclude = if(match(lower(trim(exclude)), "^(n|no|f|false|0)$"), "N", "Y")\
        | fields sourcetype exclude]\
    | eval exclude = if(isnull(exclude), "N", exclude)\
    | where NOT (exclude="Y")\
    | stats sum(is_mapped) as mapped count as total\
    | eval cim_coverage = round(mapped / total * 100, 1)\
    | eval scope = "all"]\
| eval _time = now()\
| eval ReportType = "cim_coverage"\
| collect index=`cim_validator_index`


[cim_validator_collection_search]
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = `cim_validator_base_search`\
| table _time modelName dataset index sourcetype field total_count field_count distinct_count percent_coverage field_class recommended required compliant_count value_compliance_pct ReportType\
| sort modelName dataset index sourcetype field


[splunk_data_model_objects_fields_search]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | inputlookup splunk_data_model_objects_fields\
| table model dataset field_name recommended required prescribed_values description owner parentName *


[cim_validator_acceleration_health]
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | rest /services/admin/summarization by_tstats=t splunk_server=local\
| regex title="tstats:DM_"\
| rex field=title "tstats:DM_(?<app>[^_]+)_(?<modelName>.+)"\
| eval modelName = replace(modelName, "^SA_CIM_", "")\
| eval complete_pct = round(coalesce('summary.complete', complete, 0) * 100, 1)\
| eval is_building = coalesce('summary.is_inprogress', is_inprogress, 0)\
| eval error_msg = coalesce('summary.last_error', last_error, "")\
| eval status = case(error_msg!="" AND error_msg!="None", "Error", complete_pct >= 99.9, "Complete", is_building=1, "Building", 1==1, "Incomplete")\
| eval e_time = 'summary.earliest_time'\
| eval l_time = 'summary.latest_time'\
| eval earliest_time = if(isnotnull(e_time) AND e_time > 0, strftime(e_time, "%Y-%m-%d %H:%M"), "N/A")\
| eval latest_time = if(isnotnull(l_time) AND l_time > 0, strftime(l_time, "%Y-%m-%d %H:%M"), "N/A")\
| eval access_count = coalesce('summary.access_count', access_count, 0)\
| join type=left modelName [| rest /services/data/models splunk_server=local | rename acceleration.earliest_time as accel_earliest | table title accel_earliest | rename title as modelName | eval modelName = replace(modelName, "^SA_CIM_", "")]\
| eval retention_days = case(match(accel_earliest, "-(\\d+)y"), tonumber(replace(accel_earliest, "-(\\d+)y", "\\1")) * 365, match(accel_earliest, "-(\\d+)mon"), tonumber(replace(accel_earliest, "-(\\d+)mon", "\\1")) * 30, match(accel_earliest, "-(\\d+)d"), tonumber(replace(accel_earliest, "-(\\d+)d", "\\1")), match(accel_earliest, "-(\\d+)w"), tonumber(replace(accel_earliest, "-(\\d+)w", "\\1")) * 7, match(accel_earliest, "-(\\d+)h"), round(tonumber(replace(accel_earliest, "-(\\d+)h", "\\1")) / 24, 1), isnotnull(accel_earliest), accel_earliest, 1==1, "N/A")\
| table modelName app status complete_pct earliest_time latest_time retention_days access_count error_msg


[Data Model Field Mapping Quality Alert]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.severity = 3
alert.track = 1
cron_schedule = 0 8 * * 1
dispatch.earliest_time = -7d@d
dispatch.latest_time = @d
enableSched = 0
search = `cim_validator_base_search`\
| eval is_rec = if(field_class IN ("required", "recommended"), 1, 0)\
| eval is_rec_mapped = if(is_rec=1 AND field_count > 0, 1, 0)\
| stats sum(is_rec) as total_rec_fields sum(is_rec_mapped) as mapped_rec_fields by modelName dataset index sourcetype\
| eval rec_field_coverage_pct = round(mapped_rec_fields / total_rec_fields * 100, 2)\
| where rec_field_coverage_pct < 80\
| sort rec_field_coverage_pct\
| rename modelName as "Data Model" dataset as "Dataset" rec_field_coverage_pct as "Mapping %"


##############################################################################
# Report Data Export Searches
# Run these to generate CSV data for the CIM Assessment Report.
# Output goes to app lookups directory for report generator consumption.
##############################################################################

[cim_validator_report_export]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 47 1 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
enableSched = 0
schedule_priority = default
description = Exports all report data CSVs and generates Word document report. Run after cim_validator_collection completes.
search = `cim_validator_base_search`\
| search modelName="$datamodel$" dataset="$dataset$" index="$index$" sourcetype="$sourcetype$"\
| bin _time span=1d\
| eval is_rec = if(field_class IN ("required", "recommended"), 1, 0)\
| eval is_rec_mapped = if(is_rec=1 AND field_count > 0, 1, 0)\
| eval has_pv = if(isnotnull(value_compliance_pct), 1, 0)\
| eval pv_compliant = if(has_pv=1 AND value_compliance_pct >= 80, 1, 0)\
| eventstats sum(is_rec) as total_rec_fields sum(is_rec_mapped) as mapped_rec_fields avg(eval(if(is_rec=1, percent_coverage, null()))) as percent_data_coverage max(total_count) as event_count sum(has_pv) as total_pv_fields sum(pv_compliant) as compliant_pv_fields by modelName dataset index sourcetype\
| eval rec_field_coverage_pct = round(mapped_rec_fields / total_rec_fields * 100, 2)\
| eval percent_data_coverage = round(percent_data_coverage, 2)\
| eval value_quality_pct = if(total_pv_fields > 0, round(compliant_pv_fields / total_pv_fields * 100, 2), null())\
| eval overall_quality_pct = round((rec_field_coverage_pct + percent_data_coverage) / 2, 2)\
| dedup modelName dataset index sourcetype field\
| outputlookup _cim_report_raw.csv\
| stats avg(rec_field_coverage_pct) as mapping_quality avg(percent_data_coverage) as data_quality avg(eval(if(isnotnull(value_quality_pct), value_quality_pct, null()))) as value_compliance avg(overall_quality_pct) as overall_quality\
| eval mapping_quality = round(mapping_quality, 1)\
| eval data_quality = round(data_quality, 1)\
| eval value_compliance = round(value_compliance, 1)\
| eval overall_quality = round(overall_quality, 1)\
| outputlookup _cim_report_kpi.csv



##############################################################################
# Weekly CIM Assessment Report
# Triggers after collection completes. Generates and emails the report.
# Configure recipients via: Settings > Advanced search > Search macros
#   cim_report_recipients = "user@company.com, team@company.com"
#   cim_report_sender = "splunk-reports@company.com"  (optional)
#   cim_validator_environment = "Production"
# Report generator: Python standard library only (no external dependencies)
# SMTP settings: Uses Splunk's configured mail settings (Settings > Server settings > Email settings)
##############################################################################

[cim_validator_scheduled_report]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
action.email_report = 1
alert.track = 0
cron_schedule = 0 8 * * 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
enableSched = 0
description = Generates and emails the CIM Assessment Report. Enable scheduling and configure cim_report_recipients macro before activating. Default: Monday 4:00 AM.
search = | makeresults | eval message="CIM Assessment Report triggered"

