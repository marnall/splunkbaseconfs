[Prism Centrals]
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
search = index=nutanixpc sourcetype=nutanixpc_prismCentrals | stats count by extId, name, pc_ip| table name,  extId, pc_ip | rename name AS "Name"


[Clusters]
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = statistics
display.statistics.drilldown = none
enableSched = 1
search = index="nutanixpc" (sourcetype=nutanixpc_cluster_performance OR sourcetype=nutanixpc_clusters) \
| stats \
    latest(name) AS Name \
    latest(nodes.numberOfNodes) AS Nodes \
    latest(vmCount) AS VMs \
    latest(pc_ip) AS pc_ip \
    latest(storageUsageBytes) AS storageUsageBytes \
    latest(storageCapacityBytes) AS storageCapacityBytes \
    BY extId \
| eval "Usage %" = round((storageUsageBytes / storageCapacityBytes) * 100, 2) \
| fields Name Nodes VMs extId pc_ip "Usage %"

