[Hosts Info Table]
search=index=nutanixpc (sourcetype=nutanixpc_hosts OR sourcetype=nutanixpc_host_performance) \
| spath path=hypervisor.type output=hypervisorType \
| spath path=cluster.uuid output=ClusterUUID \
| spath path=cluster.name output=ClusterName \
| spath path=cpuFrequencyHz output=cpuFrequencyHz \
| spath path=memorySizeBytes output=memorySizeBytes \
| spath path=storageUsageBytes output=storageUsageBytes \
| spath path=storageCapacityBytes output=storageCapacityBytes \
| eval memoryGB = round(tonumber(memorySizeBytes) / 1024 / 1024 / 1024, 2) \
| eval cpuGHz = round(cpuFrequencyHz / 1000000000, 2) \
| stats \
        latest(hostName) AS "Host name" \
        latest(ClusterUUID) AS ClusterUUID \
        latest(nodeSerial) AS "Node serial" \
        latest(hypervisorType) AS "Type" \
        latest(memoryGB) AS "Memory (GB)" \
        latest(cpuGHz) AS "CPU HGz" \
        latest(blockModel) AS "Block Model" \
        latest(blockSerial) AS "Block Serial" \
        latest(storageUsageBytes) AS storageUsageBytes \
        latest(storageCapacityBytes) AS storageCapacityBytes \
        by extId \
| eval storageUsageGB = round(storageUsageBytes / 1024 / 1024 / 1024, 2) \
| eval storageCapacityTB = round(storageCapacityBytes / 1024 / 1024 / 1024 / 1024, 2) \
| eval Usage = storageUsageGB . " GiB of " . storageCapacityTB . " TiB" \
| table extId, ClusterUUID, "Host name", "Node serial", "Type", "Memory (GB)", "CPU HGz", "Block Model", "Block Serial", Usage
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.track = 0


[Disks Info Table]
search = index=nutanixpc (sourcetype=nutanixpc_disks OR sourcetype=nutanixpc_disk_performance) \
| spath  \
| eval clusterUUID = spath(_raw, "clusterExtId"), \
       "Host name" = spath(_raw, "hostName"), \
       "Serial number" = spath(_raw, "serialNumber"), \
       "Tier" = spath(_raw, "storageTier"), \
       disk_status = spath(_raw, "diskAdvanceConfig.isOnline"), \
       total_bytes = tonumber(spath(_raw, "physicalCapacityBytes")), \
       used_bytes = tonumber(spath(_raw, "diskUsageBytes")), \
       hypervisor_ip = spath(_raw, "nodeIpAddress.ipv4.value") \
| eval used_nonzero = if(used_bytes>0, used_bytes, null()) \
| eval total_nonzero = if(total_bytes>0, total_bytes, null()) \
| stats \
       values(clusterUUID) as clusterUUID, \
       values("Host name") as "Host name", \
       values("Serial number") as "Serial number", \
       values("Tier") as "Tier", \
       latest(disk_status) as Status, \
       values(hypervisor_ip) as "Hypervisor IP", \
       latest(used_nonzero)  as used_nonzero, \
       latest(total_nonzero) as total_nonzero, \
       latest(used_bytes)    as used_raw, \
       latest(total_bytes)   as total_raw \
       by extId \
| eval Status = if(Status==true OR tostring(Status)=="true" OR lower(tostring(Status))=="true", "Online", "Offline") \
| eval used_final  = coalesce(used_nonzero, used_raw, 0) \
| eval total_final = coalesce(total_nonzero, total_raw, 0) \
| eval used_GB = round(used_final / 1024 / 1024 / 1024, 2) \
| eval total_TB = round(total_final / 1024 / 1024 / 1024 / 1024, 2) \
| eval Usage = used_GB . " GiB of " . total_TB . " TiB" \
| table extId, clusterUUID, "Host name", "Serial number", "Tier", "Status", "Hypervisor IP", Usage
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.track = 0


[Disks Performance Base]
search = index="nutanixpc" sourcetype=nutanixpc_disk_performance \
        | eval _time = strptime(timestamp, "%Y-%m-%dT%H:%M:%SZ") \
        | eval diskUsagePpm = round(diskUsagePpm / 10000, 2) \
        | eval io_latency = tonumber(spath(_raw, "diskAvgIoLatencyMicrosec")) / 1000 \
        | join type=left extId [ \
                search index="nutanixpc" sourcetype=nutanixpc_disks \
                | stats latest(serialNumber) as name by extId \
        ] \
        | fields _time extId diskUsagePpm diskNumIops diskIoBandwidthkbps io_latency name

dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.track = 0


[VMS Info Table]
search = index=nutanixpc (sourcetype=nutanixpc_vms OR sourcetype=nutanixpc_vm_performance) \
| spath \
| eval ClusterUUID = coalesce(ClusterUUID, spath(_raw, "cluster.extId")) \
| eval ip_address = mvjoin(spath(_raw, "nics{}.networkInfo.ipv4Config.ipAddress.value"), ", ") \
| eval memorySizeBytes = tonumber(spath(_raw, "memorySizeBytes")) \
| eval vCPUs = tonumber(spath(_raw, "numSockets")) \
               * tonumber(spath(_raw, "numCoresPerSocket")) \
               * tonumber(spath(_raw, "numThreadsPerCore")) \
| eval diskCapacityBytes = tonumber(spath(_raw, "diskCapacityBytes")) \
| eval diskUsagePpm = tonumber(spath(_raw, "diskUsagePpm")) \
| eval disk_nonzero = if(diskCapacityBytes > 0, diskCapacityBytes, null()) \
| eval usage_nonzero = if(diskUsagePpm > 0, diskUsagePpm, null()) \
| stats \
    latest(ClusterUUID)        as ClusterUUID \
    latest(name)               as "Name" \
    latest(vCPUs)              as vCPUs \
    latest(memorySizeBytes)    as memorySizeBytes \
    latest(ip_address)         as "IP Address" \
    latest(powerState)         as "Power State" \
    latest(disk_nonzero)       as disk_nonzero \
    latest(diskCapacityBytes)  as disk_raw \
    latest(usage_nonzero)      as usage_nonzero \
    latest(diskUsagePpm)       as usage_raw \
    by extId \
| eval disk_final = coalesce(disk_nonzero, disk_raw, 0) \
| eval diskUsage_final = coalesce(usage_nonzero, usage_raw, 0) \
| eval total_storageGB = round(disk_final / 1024 / 1024 / 1024, 2) \
| eval "Memory (GB)" = round(memorySizeBytes / 1024 / 1024 / 1024, 2) \
| eval used_GB = round(total_storageGB * (diskUsage_final / 1000000), 2) \
| eval Usage = used_GB . " GiB of " . total_storageGB . " GiB" \
| table extId, ClusterUUID, "Name", vCPUs, "Memory (GB)", "IP Address", "Power State", Usage
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.track = 0


[VMs Performance Base]
search = index="nutanixpc" (sourcetype=nutanixpc_vm_performance OR sourcetype=nutanixpc_vms) \
        | spath path=name output=name_vms \
        | eval diskUsage = round(diskUsagePpm / 10000, 2) \
        | eval memoryUsagePerc = if(sourcetype=="nutanixpc_vm_performance", round(memoryUsagePpm / 10000, 2), null()) \
        | eval cpuUsagePerc = if(sourcetype=="nutanixpc_vm_performance", round(hypervisorCpuUsagePpm / 10000, 2), null()) \
        | eval ioLatencyMs = if(sourcetype=="nutanixpc_vm_performance", round(controllerAvgIoLatencyMicros / 1000, 2), null()) \
        | eval iops = if(sourcetype=="nutanixpc_vm_performance", controllerNumIops, null()) \
        | eval ioBandwidthKBps = if(sourcetype=="nutanixpc_vm_performance", controllerIoBandwidthKbps, null()) \
        | stats  \
            latest(name_vms) as Name \
            latest(cluster) as cluster \
            latest(diskUsage) as diskUsage \
            latest(memoryUsagePerc) as "Memory usage %" \
            latest(cpuUsagePerc) as "CPU Usage %" \
            avg(ioLatencyMs) as ioLatencyMs \
            avg(iops) as iops \
            avg(ioBandwidthKBps) as ioBandwidthKBps \
        by extId

dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.track = 0


