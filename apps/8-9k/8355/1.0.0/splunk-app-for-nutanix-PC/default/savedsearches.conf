[Events base]
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
search = index="nutanixpc" (sourcetype=nutanixpc_events OR sourcetype=nutanixpc_clusters) \
| eval clusterUUID = coalesce(clusterUUID, extId) \
| eventstats latest(pc_ip) AS pc_ip BY clusterUUID \
| eval timestamp_epoch = strptime(creationTime, "%Y-%m-%dT%H:%M:%S.%3NZ") \
| stats latest(timestamp_epoch) AS timestamp_epoch, \
        latest(message) AS message, \
        latest(pc_ip) AS pc_ip, \
        latest(clusterUUID) as clusterUUID \
        BY extId \
| where timestamp_epoch !="" \
| sort - timestamp_epoch \
| fields timestamp_epoch extId clusterUUID pc_ip


[Top5 clusters base]
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
search = index="nutanixpc" sourcetype=nutanixpc_cluster_performance \
            | spath output=Name path=name \
            | eval cpuUsagePerc = round(hypervisorCpuUsagePpm / 10000, 2) \
            | eval memoryUsagePerc = round(aggregateHypervisorMemoryUsagePpm / 10000, 2) \
            | stats latest(cpuUsagePerc) as "CPU Usage %", latest(memoryUsagePerc) as "Memory Usage %" by extId \
            | join type=left extId [ \
                search index="nutanixpc" sourcetype=nutanixpc_clusters \
                | stats latest(name) as Name, latest(pc_ip) as pc_ip by extId \
            ] \
            | fields Name, pc_ip, "CPU Usage %", "Memory Usage %"


