[Volume groups table base]
search = index="nutanixpc" (sourcetype=nutanixpc_volume_groups OR sourcetype=nutanixpc_volume_groups_stats OR sourcetype=nutanixpc_clusters) \
| eval extId = coalesce(extId, volumeGroupExtId) \
| eval clusterExtId = if(sourcetype="nutanixpc_clusters", extId, clusterReference) \
| eval controllerUserBytes = if(isnull(controllerUserBytes), null(), controllerUserBytes) \
| spath path=controllerUserBytes{}.value output=controllerUserBytes \
| eval latestUserBytes = mvindex(controllerUserBytes, -1) \
| eval latestUserGB = if(isnull(latestUserBytes), null(), round(latestUserBytes / 1024 / 1024 / 1024, 2)) \
| eval clusterName = if(sourcetype="nutanixpc_clusters", name, null()) \
| eventstats latest(pc_ip) as pc_ip by clusterExtId \
| eventstats latest(clusterName) as clusterName by clusterExtId \
| stats \
    values(name) as "Volume Group Name" \
    values(sharingStatus) as "Sharing Status" \
    values(shouldLoadBalanceVmAttachments) as "Load Balance VM Attachments" \
    values(clusterReference) as clusterReference \
    values(clusterName) as "Cluster Name" \
    values(usageType) as "Usage Type" \
    values(pc_ip) as pc_ip \
    latest(latestUserGB) as "Controller User Bytes (GB)" \
    by extId \
| where isnotnull(clusterReference) AND clusterReference!="" \
| sort "Volume Group Name" \
| fields "Volume Group Name", "Sharing Status", "Load Balance VM Attachments", "Cluster Name", "Usage Type",  "Controller User Bytes (GB)", clusterReference,  extId, pc_ip

dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.track = 0


[Storage Containers Groups table base]
search = index="nutanixpc" (sourcetype=nutanixpc_storage_containers OR sourcetype=nutanixpc_clusters) \
                        | eval clusterExtId=coalesce(clusterExtId, extId) \
                        | eventstats latest(pc_ip) as pc_ip by clusterExtId \
                        | spath path=maxCapacityBytes output=maxCapacityBytes \
                        | eval PhysicalUsageTB = `converttera(maxCapacityBytes)` \
                        | eval ClusterFaultTolerance = case( \
                            replicationFactor == "2", "1-node tolerance (RF2)", \
                            replicationFactor == "3", "2-node tolerance (RF3)", \
                            erasureCode != "OFF", "EC-X (Erasure Coding)", \
                            true(), "" \
                        ) \
                        | stats values(PhysicalUsageTB) as "Total Capacity (TB)", \
                                values(ClusterFaultTolerance) as "Cluster Fault Tolerance", \
                                values(replicationFactor) as "Replication Factor", \
                                values(isCompressionEnabled) as "Compression", \
                                values(cacheDeduplication) as "Capacity Deduplication", \
                                values(erasureCode) as "Erasure Coding", \
                                values(clusterExtId) as clusterExtId, \
                                values(pc_ip) as pc_ip \
                                values(name) as Name \
                                by containerExtId \
                        | sort Name \
                        | fields Name, "Total Capacity (TB)", "Cluster Fault Tolerance", "Replication Factor", "Compression", "Capacity Deduplication", "Erasure Coding", pc_ip, clusterExtId


dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
