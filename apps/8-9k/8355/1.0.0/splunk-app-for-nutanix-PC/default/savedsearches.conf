search = index="nutanixpc" ((sourcetype="nutanixpc_alerts" severity=CRITICAL isResolved=false) OR sourcetype="nutanixpc_clusters") \
| fields _time, sourcetype, severity, isResolved, extId, clusterUUID, name, pc_ip, title, sourceEntity, impactTypes, creationTime, lastUpdatedTime \
