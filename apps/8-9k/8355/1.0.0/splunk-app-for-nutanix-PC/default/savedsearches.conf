[Cluster Performance Base]
search = index="nutanixpc" sourcetype=nutanixpc_cluster_performance \
        | eval _time = strptime(timestamp, "%Y-%m-%dT%H:%M:%SZ") \
        | eval storagePercent = round((storageUsageBytes / storageCapacityBytes) * 100, 2) \
        | eval overallMemoryUsageBytes=`converttera(overallMemoryUsageBytes)` \
        | eval hypervisorCpuUsagePpm = hypervisorCpuUsagePpm / 10000 \
        | eval ioBandwidthMBps = ioBandwidthKbps / 8 / 1024 \
        | eval controllerAvgIoLatencyUsecs = controllerAvgIoLatencyUsecs / 1000 \
        | join type=left extId [ \
                search index="nutanixpc" sourcetype=nutanixpc_clusters \
                | stats latest(name) as name by extId \
                ]\
        | fields _time extId storagePercent overallMemoryUsageBytes hypervisorCpuUsagePpm controllerNumIops ioBandwidthMBps controllerAvgIoLatencyUsecs name

