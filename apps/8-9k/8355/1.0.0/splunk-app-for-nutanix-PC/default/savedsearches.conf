[Alerts tab base all]
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.type = statistics
display.statistics.drilldown = none
enableSched = 1
search = index="nutanixpc" (sourcetype="nutanixpc_alerts" OR sourcetype=nutanixpc_clusters) \
| spath path=name output=Cluster \
| eval clusterUUID=coalesce(clusterUUID, extId) \
| eventstats latest(Cluster) as Cluster by clusterUUID \
| eventstats latest(pc_ip) as pc_ip by clusterUUID \
| where sourcetype="nutanixpc_alerts" \
| spath path=sourceEntity.name output=sourceEntityType \
| spath path=impactTypes{} output=impactTypes \
| stats values(title) as Title \
        values(sourceEntityType) as "Source Entity" \
        values(impactTypes) as "Impact Type" \
        values(severity) as Severity \
        values(creationTime) as "Created Time" \
        max(lastUpdatedTime) as "Last Occurred" \
        values(Cluster) as Cluster \
        values(pc_ip) as pc_ip \
        values(isResolved) as isResolved \
        values(clusterUUID) as clusterUUID \
        by extId \
| join type=left clusterUUID [ \
    search index="nutanixpc" sourcetype="nutanixpc_prismCentrals" \
    | rename name as prism_name \
    | table extId prism_name \
    | eval clusterUUID=extId \
    | fields - extId \
] \
| eval Cluster=coalesce(Cluster, prism_name) \
| eval "Created Time" = strftime(strptime('Created Time', "%Y-%m-%dT%H:%M:%S.%6NZ"), "%m/%d/%y, %I:%M:%S %p") \
| eval "Last Occurred" = strftime(strptime('Last Occurred', "%Y-%m-%dT%H:%M:%S.%6NZ"), "%m/%d/%y, %I:%M:%S %p") \
| sort -"Created Time"

