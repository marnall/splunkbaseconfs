# Issue #15: capability.write gates mutating endpoints behind custom
# capabilities defined in authorize.conf.
#   * edit_mcp_config — required to mutate provider/template/license/setup
#                       configuration. Admin only.
#   * test_mcp_provider — required to call the provider connectivity test;
#                         granted to admins AND end users (role_aiqa_user).
# Read-only endpoints (mcp_history, mcp_health, mcp_license_limits) intentionally
# do NOT set capability.write so any authenticated user can poll them.

[admin:mcp_setup_endpoint]
match = /mcp_setup
members = mcpsetup

[admin_external:mcpsetup]
handlertype = python
handlerfile = mcp_setup_handler.py
handleractions = list, edit
capability.write = edit_mcp_config
python.version = python3

[admin_external:mcp_query]
handlertype = python
handlerfile = mcp_query_handler.py
handleractions = list, create
handlerpersistentmode = true
capability.write = edit_mcp_config
python.version = python3

[admin_external:mcp_history]
handlertype = python
handlerfile = mcp_history_handler.py
handleractions = list
handlerpersistentmode = true
python.version = python3

[admin_external:mcp_templates]
handlertype = python
handlerfile = mcp_templates_handler.py
handleractions = list, create, edit, remove
handlerpersistentmode = true
capability.write = edit_mcp_config
python.version = python3

[admin_external:mcp_config]
handlertype = python
handlerfile = mcp_config_handler.py
handleractions = list, edit
handlerpersistentmode = true
capability.write = edit_mcp_config
python.version = python3

[admin_external:mcp_health]
handlertype = python
handlerfile = mcp_health_handler.py
handleractions = list
handlerpersistentmode = true
python.version = python3

[admin_external:mcp_providers]
handlertype = python
handlerfile = mcp_providers_handler.py
handleractions = list, create, edit, remove
handlerpersistentmode = true
capability.write = edit_mcp_config
python.version = python3

[admin_external:mcp_provider_test]
handlertype = python
handlerfile = mcp_provider_test_handler.py
handleractions = list, edit, create
handlerpersistentmode = true
capability.write = test_mcp_provider
python.version = python3

[admin_external:mcp_license]
handlertype = python
handlerfile = mcp_license_handler.py
handleractions = list, edit
handlerpersistentmode = true
capability.write = edit_mcp_config
python.version = python3

[admin_external:mcp_license_limits]
handlertype = python
handlerfile = mcp_license_limits_handler.py
handleractions = list
handlerpersistentmode = true
python.version = python3

# Issue #18: provider preset metadata served from a KV-backed store so admins
# can extend the list without an app upgrade. Read is unauthenticated (UI
# config bootstrap); mutating actions require edit_mcp_config capability.
[admin_external:mcp_provider_presets]
handlertype = python
handlerfile = mcp_provider_presets_handler.py
handleractions = list, create, edit, remove
handlerpersistentmode = true
capability.write = edit_mcp_config
python.version = python3

# v4: conversation thread listing + per-thread message retrieval + thread
# deletion. Read endpoints are unauthenticated (any logged-in user sees only
# their own threads). Delete requires no capability write because it scopes
# to the calling user's own threads (admin_all_objects bypasses ownership).
[admin_external:mcp_conversations]
handlertype = python
handlerfile = mcp_conversations_handler.py
handleractions = list, remove
handlerpersistentmode = true
python.version = python3
