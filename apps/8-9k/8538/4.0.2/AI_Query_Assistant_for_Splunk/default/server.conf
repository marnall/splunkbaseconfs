# Search Head Cluster replication policy for app-owned custom configs.
#
# Splunk auto-replicates the canonical server stanzas across SHC members,
# but custom .conf files (anything not in $SPLUNK_HOME/etc/system/default
# specs) must be opted in explicitly. mcp.conf is the only custom config
# in this app — it stores the AI provider preset registry and license
# server URL written by the Setup page (admin/mcp_setup REST handler).
# Without this stanza, a Setup change made on one SH would silently fail
# to propagate to the other SH members, leaving providers misconfigured.
[shclustering]
conf_replication_include.mcp = true
