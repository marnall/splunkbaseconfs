[ai]
# Optional UUID of the default AI provider record in mcp_ai_providers.
# Leave blank to fall back to the first provider with is_default=true.
default_provider_id =

# v4: when true, force the legacy v3 pipeline even on Python 3.13+. Useful
# for fall-back during incident response when the agentic deps misbehave.
use_legacy_path = false

# v4: enable the 4-subagent supervisor pipeline (planner / schema_resolver /
# spl_generator / auditor). Adds 2-4 extra LLM calls per query in exchange
# for ambiguity detection, schema-grounded SPL, and an independent safety
# audit. Recommended for environments where SPL correctness matters more
# than latency.
enable_supervisor = false

# v4: when true AND supervisor is enabled AND the SPL executes successfully,
# run a separate Explainer agent to narrate the results in natural language.
# Adds ~5-15s and one extra LLM call. Surfaces as `explanation_postexec` in
# the response payload.
enable_explainer = false

# v4: load remote tools exposed by the Splunk MCP Server App (if installed
# on the same instance). Silent no-op when the MCP Server App isn't there.
enable_remote_tools = false

# DEV-ONLY. When true, the runtime license check is skipped on every REST
# call and a WARNING line is logged. Never set this on a production install
# — it disables one of the layers protecting paid features.
dev_skip_license = false

[security]
# Maximum allowed query time range in hours. Queries that span longer than
# this are flagged as 'caution' by the security guardrail.
max_time_range_hours = 168
# Toggles the sensitive-field detector that warns when a query touches
# password/token/credential-like field names.
enable_sensitive_data_filter = true
# Comma-separated list. EXTENDS (does not replace) the built-in defaults
# (drop, truncate, destroy, purge, wipe, shutdown, reboot, delete).
dangerous_keywords =
# Comma-separated list. EXTENDS (does not replace) the built-in defaults.
sensitive_keywords =

[integration]
# When enabled, queries are forwarded to an upstream MCP platform.
# platform_url MUST be a public host — private/loopback/link-local addresses
# are rejected at runtime to defend against SSRF.
enabled = false
platform_url =
# api_token MUST be supplied via storage/passwords (key 'mcp_integration_token').
# A plain-text fallback was removed in 3.0.1 — DO NOT put a token here.
sync_history = true
fallback_to_standalone = true

[query]
# Maximum number of result rows returned to the caller.
max_results = 10000
# Maximum wall-clock seconds for a single search job.
timeout_seconds = 60

# RST License Server SDK configuration. Consumed by mcp_license_phone_home
# (bin/lib/) for activate + heartbeat. Override in local/mcp.conf to point at
# staging vs prod issuance.
[license_server]
# Stable id assigned to this app on the license server (rstlic new-app --id).
app_id              = ai-query-assistant-for-splunk
# Production license server URL. Customers reach this directly from their
# Splunk instance to perform online activation and daily heartbeat.
# For local development against a self-hosted license server, override in
# local/mcp.conf (do NOT change the default value — it ships to every
# customer install).
url                 = https://license.reallysec.com
# Days of license-server unreachability tolerated before _check_license starts
# blocking. Below this, the app trusts its locally-cached signed token.
offline_grace_days  = 14
