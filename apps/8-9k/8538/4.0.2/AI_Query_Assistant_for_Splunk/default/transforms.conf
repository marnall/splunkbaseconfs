[mcp_query_history]
external_type = kvstore
collection = mcp_query_history
fields_list = query_id,user,natural_language,spl,explanation,risk_level,result_count,execution_time,timestamp,synced

[mcp_query_templates]
external_type = kvstore
collection = mcp_query_templates
fields_list = template_id,name,description,natural_language,category,created_by,created_at

[mcp_ai_providers]
external_type = kvstore
collection = mcp_ai_providers
fields_list = provider_id,name,provider_type,base_url,model,credential_key,is_default,enabled,created_at,updated_at

[mcp_usage]
external_type = kvstore
collection = mcp_usage
fields_list = user,daily_date,daily_count,concurrent,updated_at

# Issue #4: tokens live in storage/passwords; never in KV
[mcp_integration_config]
external_type = kvstore
collection = mcp_integration_config
fields_list = enabled,platform_url,api_token_credential_key,sync_history,last_sync

[mcp_security_config]
external_type = kvstore
collection = mcp_security_config
fields_list = config_id,dangerous_keywords,sensitive_keywords,max_time_range_hours,rate_limit_per_user,updated_at

# Issue #18 caveat: KV-backed provider presets — admins can edit via inputlookup
# in absence of a dedicated UI; mcp_provider_presets_handler reads it on each GET.
[mcp_provider_presets]
external_type = kvstore
collection = mcp_provider_presets
fields_list = preset_id,label,backend,url,model,models_json
