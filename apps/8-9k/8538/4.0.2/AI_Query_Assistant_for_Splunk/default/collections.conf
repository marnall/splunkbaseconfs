# Query History Collection
[mcp_query_history]
enforceTypes = true
field.query_id = string
field.user = string
field.natural_language = string
field.spl = string
field.explanation = string
field.risk_level = string
field.result_count = number
field.execution_time = number
field.timestamp = time
field.synced = bool

# Query Templates Collection
# v3 stored NL-only templates; v4 adds optional spl + tags so the Agent can
# reuse the SPL pattern directly when search_templates surfaces a strong match.
# Existing v3 records remain valid — spl/tags default to empty.
[mcp_query_templates]
enforceTypes = true
field.template_id = string
field.name = string
field.description = string
field.natural_language = string
field.category = string
field.created_by = string
field.created_at = time
field.spl = string
field.tags = string
field.updated_at = time

# Security Configuration Collection
[mcp_security_config]
enforceTypes = true
field.config_id = string
field.dangerous_keywords = string
field.sensitive_keywords = string
field.max_time_range_hours = number
field.rate_limit_per_user = number
field.updated_at = time

# Integration Configuration Collection
# Issue #4: tokens live in storage/passwords; never in KV
[mcp_integration_config]
enforceTypes = true
field.enabled = bool
field.platform_url = string
field.api_token_credential_key = string
field.sync_history = bool
field.last_sync = time

# Provider preset metadata (Issue #18 caveat). Allows admins to add/remove
# models without an app upgrade. mcp_provider_presets_handler reads this
# collection on each request; if empty (fresh install) it falls back to a
# hardcoded built-in list and seeds the collection from it.
[mcp_provider_presets]
enforceTypes = false
field.preset_id = string
field.label = string
field.backend = string
field.url = string
field.model = string
field.models_json = string

# Per-user usage counters (daily query count, concurrent query count, etc.)
# _key is "<user>" so we get cheap upserts; counters are date-stamped to avoid
# stale carry-over.
[mcp_usage]
enforceTypes = true
field.user = string
field.daily_date = string
field.daily_count = number
field.concurrent = number
field.updated_at = time

# AI Provider Configuration Collection
[mcp_ai_providers]
enforceTypes = true
field.provider_id = string
field.name = string
field.provider_type = string
field.base_url = string
field.model = string
field.credential_key = string
field.is_default = bool
field.enabled = bool
field.created_at = time
field.updated_at = time
# v4: optional Google-specific fields (auto-detect Gemini API vs Vertex AI)
field.project = string
field.location = string
field.vertexai = bool

# v4: per-thread message history for the agentic ConversationStore.
# Backs bin/lib/agentic/conversation.py SplunkKVConversationStore.
# A thread typically corresponds to a single user's chat session; threads are
# scoped by (user, thread_id). Messages are JSON-encoded BaseMessage payloads.
[mcp_conversation_messages]
enforceTypes = true
field.thread_id = string
field.user = string
field.seq = number
field.role = string
field.content = string
field.created_at = time

# v4: per-thread metadata (last activity, title, tag, archived?). Lets the UI
# show a "recent conversations" list without scanning all message rows.
[mcp_conversation_threads]
enforceTypes = true
field.thread_id = string
field.user = string
field.title = string
field.last_activity = time
field.message_count = number
field.archived = bool
field.created_at = time
