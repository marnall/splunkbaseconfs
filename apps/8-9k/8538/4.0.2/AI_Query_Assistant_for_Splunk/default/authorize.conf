# Issue #15: capability-gated REST endpoints for AI Query Assistant.
#
# Two custom capabilities split admin-only mutation from end-user actions:
#   * edit_mcp_config   — rewrites configuration: providers, templates,
#                         license, app config, setup. Admins only.
#   * test_mcp_provider — runs a connectivity probe against a configured
#                         provider. Required for end-users to validate
#                         credentials when authoring queries.
#
# Roles:
#   * role_admin     — full access to both capabilities (and inherits the
#                      built-in admin caps from etc/system/default).
#   * role_aiqa_user — query-time role granted to non-admin end users.
#                      Can run queries and test provider connectivity but
#                      cannot mutate configuration.
#
# Mapping to endpoints lives in restmap.conf via capability.write = ...

[capability::edit_mcp_config]

[capability::test_mcp_provider]

[role_admin]
edit_mcp_config = enabled
test_mcp_provider = enabled

[role_aiqa_user]
test_mcp_provider = enabled
