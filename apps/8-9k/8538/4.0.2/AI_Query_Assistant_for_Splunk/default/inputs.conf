# Modular input registrations for AI Query Assistant for Splunk.
#
# mcp_license_heartbeat: phones home to the RST License Server once per day.
# Picked modular input over a plain [script://...] scripted input because
# modular inputs receive a session_key on stdin XML — the heartbeat needs to
# read storage/passwords and configs/conf-mcp, both of which require a
# session token. Scripted inputs would have to authenticate manually, which
# adds failure modes.

# Splunk introspection picks up the scheme from this stanza + the matching
# README/inputs.conf.spec entry. ``python.version = python3`` tells Splunk
# to pick the highest-available 3.x interpreter — 3.13 on Splunk 10.4+
# (where 3.13 is default) or 3.9 on 10.0/10.1 where 3.9 is the only option.
# The handler itself probes ``bootstrap.agentic_available()`` so the legacy
# heartbeat path keeps working on 3.9 even though the agentic stack needs
# 3.13. SLIM (Splunk Cloud validator) does not recognise ``python.required``
# — listing only ``python.version`` here keeps AppInspect Cloud happy.
[mcp_license_heartbeat]
python.version = python3

# Modular input default instance. python.version is inherited from the
# scheme stanza above — don't duplicate it here; SLIM flags duplicate
# python.version on input-instance stanzas as "Undefined setting".
[mcp_license_heartbeat://default]
# 86400 = 24h. The server-side TOKEN_TTL is 7 days, so a single missed
# heartbeat (e.g. splunkd restart) does not lock the customer out — the
# offline_grace_days knob in mcp.conf governs the hard limit.
interval = 86400
# Don't index any output as events; the heartbeat does its work via the
# splunkd management API and exits.
index = _internal
sourcetype = mcp:license:heartbeat
disabled = 0
