[install]
is_configured = 0
state = enabled
build = 402

[ui]
is_visible = 1
label = AI Query Assistant for Splunk

[launcher]
author = Anhui Reallysec Information Technology Co., Ltd.
version = 4.0.2
description = Natural language querying for Splunk powered by an Agentic AI architecture (multi-turn conversations, structured output, sub-agents, MCP tools)

[package]
id = AI_Query_Assistant_for_Splunk
check_for_updates = 1

# AppInspect (cloud tag) requires both [package] id AND a [id] stanza with name+version.
# Splunkbase reads [id] for the package identity at upload time.
[id]
name = AI_Query_Assistant_for_Splunk
version = 4.0.2

# --- Python version control (Splunk 10.x dual-path) ----------------------------
# v4.0.0 ships TWO code paths:
#   - Agentic path (splunklib.ai) — requires Python 3.13. Auto-loaded on
#     Splunk 10.2+ when 3.13 is selected as the interpreter, or on
#     Splunk 10.4+ where 3.13 is the default.
#   - Legacy path (mirrors v3.0.7) — runs on Python 3.9 fallback (Splunk
#     10.0 / 10.1).
#
# Each REST handler / modular input declares ``python.version = python3``
# in restmap.conf / inputs.conf. ``python3`` tells Splunk to pick the
# highest-available 3.x interpreter (3.13 on 10.4+, falls back to 3.9 on
# 10.0/10.1). Splunk Cloud AppInspect forbids a global ``[default]``
# stanza in app.conf (it leaks into the app-wide config), so we keep the
# python.version setting strictly per-handler.

[license]
# 4.0.0+ restores LOCAL RSA-PSS signature verification (the converged
# rstlic SDK verifier) as the primary integrity path: a forged/edited
# license payload is rejected offline. The RST License Server still
# provides activation, heartbeat, and CRL-based revocation on top.
# public_key_pem is the per-app RSA public key (base64-encoded PEM) used
# to verify license signatures. It is NOT secret. Multiple
# public_key_pem* lines are supported for key rotation (the verifier
# accepts a token signed by ANY listed key).
public_key_pem = 
[triggers]
reload.mcp = simple
