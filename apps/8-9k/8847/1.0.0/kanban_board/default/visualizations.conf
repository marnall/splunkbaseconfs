[kanban]
label = Kanban Board
description = Interactive customisable kanban board backed by the KV Store.
framework_type = studio_visualization
allow_user_selection = true
default_height = 600
search_fragment = | makeresults | eval rectype="beat" | append [| inputlookup kanban_boards_lookup | eval rectype="board"] | append [| inputlookup kanban_cards_lookup | eval rectype="card"] | fields - _time
supports_drilldown = true
