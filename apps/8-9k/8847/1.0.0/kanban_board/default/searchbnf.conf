[kanbanwire-command]
syntax = kanbanwire (dashboard=<string>)? (app=<string>)?
shortdesc = Add kanban write wiring to Dashboard Studio dashboards containing the Kanban Board visualization.
description = Scans Dashboard Studio dashboards for kanban_board.kanban panels and adds the \
    writer data source, event handlers, and token default required for interactive writes. \
    Runs with the searching user's permissions. With no arguments, wires all matching \
    dashboards. Use dashboard= to target a specific view by name; use app= to restrict to \
    one app. Emits one row per view: {_time, dashboard, app, changed, detail}. \
    Changes are additive and idempotent — already-wired dashboards are reported as such \
    and not modified.
usage = public
example1 = | kanbanwire dashboard=my_dashboard
comment1 = Wire a specific dashboard named my_dashboard.
example2 = | kanbanwire
comment2 = Wire all dashboards containing the kanban board visualization.

[kanbanwrite-command]
syntax = kanbanwrite payload=<json-envelope-string>
shortdesc = Apply a kanban board write operation to the app's KV Store collections.
description = Executes a single kanban write operation (board.upsert, board.delete, \
    card.upsert, card.delete, card.move) described by the JSON envelope in the \
    payload option. Writes run with the permissions of the searching user. \
    Emits one acknowledgement row.
usage = public
example1 = | makeresults | kanbanwrite payload="{\"op\":\"card.move\",\"key\":\"abc\",\"record\":{\"column_id\":\"done\",\"sort_order\":3},\"nonce\":1}"
comment1 = Move card abc to the done column.
