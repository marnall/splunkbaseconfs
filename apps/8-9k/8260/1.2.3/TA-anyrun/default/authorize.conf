# -------------------------------------------
# ROLE: anyrun_user
# -------------------------------------------
[capability::anyrun_endpoint_write]


[role_anyrun_user]
# Required capabilities for writing to indexes (boolean format - these work)
edit_tcp = enabled
# Required capabilities for KVStore access
edit_kvstore = enabled
# Additional capabilities
list_storage_passwords = enabled
# Capabilities list format - makes role grantable
capabilities = edit_tcp,edit_kvstore,anyrun_endpoint_write,list_storage_passwords
# Make this role grantable (can be assigned to users)
grantableRoles = anyrun_user
# Inherit basic user capabilities
importRoles = user
