[admin:ta_darkstrata_configuration]
match = /
members = ta_darkstrata_account, ta_darkstrata_settings

[admin:ta_darkstrata_inputs]
match = /
members = ta_darkstrata_darkstrata_alerts, ta_darkstrata_darkstrata_indicators

[admin_external:ta_darkstrata_account]
handlertype = python
python.version = python3
python.required = 3.9,3.13
handlerfile = ta_darkstrata_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:ta_darkstrata_settings]
handlertype = python
python.version = python3
python.required = 3.9,3.13
handlerfile = ta_darkstrata_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:ta_darkstrata_darkstrata_indicators]
handlertype = python
python.version = python3
python.required = 3.9,3.13
handlerfile = ta_darkstrata_rh_darkstrata_indicators.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:ta_darkstrata_darkstrata_alerts]
handlertype = python
python.version = python3
python.required = 3.9,3.13
handlerfile = ta_darkstrata_rh_darkstrata_alerts.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
