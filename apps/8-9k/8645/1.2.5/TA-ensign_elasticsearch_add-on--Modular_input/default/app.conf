[launcher]
author = Ensign Infosecurity Indonesia
version = 1.2.5
description = Splunk modular input add-on for ingesting data from Elasticsearch 8.x clusters via the Elasticsearch 8 REST API. Features: multi-node cluster support, node sniffing, automatic retry, cluster health monitoring, KVStore checkpoint storage with smart fallback, custom SPL diagnostic commands (escheck_connection, escheck_config, escheck_indexes), 5W1H audit logging, comprehensive internal log parsing, cert_path hardening, and CheckboxNormalizerMixin for UCC wire contract compliance. Compatible with Elasticsearch 8.x only. Uses elasticsearch-py 8.19.3 and elastic-transport 8.17.1.

