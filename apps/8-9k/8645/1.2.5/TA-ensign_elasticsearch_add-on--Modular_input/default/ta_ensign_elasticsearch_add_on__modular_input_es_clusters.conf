# =========================================================================
# STANDARD CONFIGURATION FILE FOR ENSIGN ELASTICSEARCH ADD-ON CLUSTERS
# =========================================================================
# This file stores the definitions for ElasticSearch Cluster targets.
# Instead of modifying this file directly, it is RECOMMENDED to use the 
# Splunk Web UI (Configuration -> ES Clusters Tab) to add or manage clusters.
# 
# The password (es_pass) will be safely encrypted by Splunk's credential
# manager when saved via the UI.
# 
# ── CLUSTER-AWARE (v1.2.0) ──────────────────────────────────────────────
# This version supports connecting to multi-node Elasticsearch clusters.
# You may specify multiple hosts in es_host separated by commas:
#   es_host = node1.es.local, node2.es.local, node3.es.local
# 
# Example Stanza Format:
# 
# [example_cluster]
# es_host = node1.es.local, node2.es.local, node3.es.local
# es_port = 9200
# es_user = elastic
# es_pass = *********
# verify_cert = 0 
# cert_location = /opt/splunk/etc/auth/my_cert.pem
# enable_sniffing = 0
# max_retries = 3
# retry_on_timeout = 1
# connection_timeout = 30
# 
# =========================================================================
