[ensid_elasticsearch]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRANSFORMS-extract_timestamp = ensid_extract_timestamp
TIME_PREFIX = "@timestamp"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%NZ
MAX_TIMESTAMP_LOOKAHEAD = 60
TZ = UTC
KV_MODE = json
TRUNCATE = 0

[source::...ta-ensign_elasticsearch_add-on*.log*]
sourcetype = taensignelasticsearchaddon:log

[source::...ta_ensign_elasticsearch_add_on*.log*]
sourcetype = taensignelasticsearchaddon:log

# =========================================================================
# INTERNAL ADD-ON LOG PARSING (v1.2.3)
# Index-time parsing — required for HF/UF forwarder deployments so that
# fields are already extracted when events arrive at the indexer and are
# searchable from the Search Head without needing the TA installed on SH.
# =========================================================================
[taensignelasticsearchaddon:log]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%d %H:%M:%S,%3N
MAX_TIMESTAMP_LOOKAHEAD = 30
TZ = UTC
KV_MODE = none
TRUNCATE = 0

# Index-time field extractions (TRANSFORMS- prefix = index-time)
TRANSFORMS-log_level      = ensid_log_level
TRANSFORMS-log_component  = ensid_log_component
TRANSFORMS-log_message    = ensid_log_message
TRANSFORMS-stanza_name    = ensid_log_stanza
TRANSFORMS-event_counts   = ensid_log_ingested, ensid_log_skipped
TRANSFORMS-cluster_health = ensid_log_cluster_status, ensid_log_cluster_name, ensid_log_node_count
TRANSFORMS-es_host        = ensid_log_es_host
TRANSFORMS-tls_verify     = ensid_log_tls_verify

# Index-time AUDIT field extractions (5W1H — for [AUDIT] tagged lines)
TRANSFORMS-audit_flag     = ensid_audit_flag
TRANSFORMS-audit_who      = ensid_audit_who
TRANSFORMS-audit_action   = ensid_audit_action
TRANSFORMS-audit_when     = ensid_audit_when
TRANSFORMS-audit_what     = ensid_audit_what
TRANSFORMS-audit_which    = ensid_audit_which
TRANSFORMS-audit_how      = ensid_audit_how
TRANSFORMS-audit_sid      = ensid_audit_sid
TRANSFORMS-audit_handler  = ensid_audit_handler
TRANSFORMS-audit_command  = ensid_audit_command
