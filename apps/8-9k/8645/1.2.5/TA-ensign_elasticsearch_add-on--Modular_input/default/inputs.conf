[elasticsearch_source]
start_by_shell = false
python.version = python3
python.required = 3.9, 3.13
sourcetype = ensid_elasticsearch
interval = 30
date_field = @timestamp
enable_filter = 0
enable_srctype = 0
disabled = true

# ── ADD-ON LOG MONITORING (v1.2.5) ────────────────────────────────────────
# crcSalt = <SOURCE> prevents fishbucket corruption when Deployment Server
# pushes or log rotation causes the file inode to change.
[monitor://$SPLUNK_HOME/var/log/splunk/ta_ensign_elasticsearch_add_on_modular_input*.log]
index = _internal
sourcetype = taensignelasticsearchaddon:log
disabled = false
crcSalt = <SOURCE>
