# =========================================================================
# KVSTORE COLLECTIONS FOR CHECKPOINT STORAGE (v1.2.3)
# =========================================================================
# These collections provide an alternative to file-based checkpoint storage.
# Enable KVStore mode in Configuration > Checkpoint Settings.
# KVStore checkpoints are automatically replicated in SHC deployments.
# =========================================================================

# Checkpoint storage — one record per modular input stanza
# _key = sanitized stanza name (natural primary key)
[es_checkpoint_store]
field.stanza_name = string
field.last_bookmark = string
field.scroll_state = string
field.updated_at = string

# Seen IDs deduplication guard — one record per stanza
# seen_ids stored as JSON array string (compact)
[es_seen_ids_store]
field.stanza_name = string
field.seen_ids = string
field.count = number
field.updated_at = string
