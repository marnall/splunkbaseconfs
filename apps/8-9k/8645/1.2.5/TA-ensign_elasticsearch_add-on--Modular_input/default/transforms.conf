# =========================================================================
# TIMESTAMP EXTRACTION FOR ensid_elasticsearch SOURCETYPE
# =========================================================================
[ensid_extract_timestamp]
REGEX = "@timestamp"\s*:\s*"(?<event_timestamp>[^"]+)"
FORMAT = event_timestamp::$1
WRITE_META = true

# =========================================================================
# INTERNAL ADD-ON LOG FIELD EXTRACTIONS (v1.2.3)
# Index-time: all transforms use DEST_KEY = _meta so fields are written
# into the index at ingest time, not at search time.
# =========================================================================
# Log marker: [*] info, [+] success, [-] error, [!] warning
[ensid_log_level]
REGEX = \[([\*\+\-\!])\]\s
FORMAT = log_marker::$1
DEST_KEY = _meta

[ensid_log_component]
REGEX = \s+(INFO|WARNING|ERROR|DEBUG)\s+
FORMAT = log_level::$1
DEST_KEY = _meta

[ensid_log_message]
REGEX = \[[\*\+\-\!]\]\s+(.+)$
FORMAT = log_message::$1
DEST_KEY = _meta

[ensid_log_stanza]
REGEX = [Ss]tanza\s+'([^']+)'
FORMAT = stanza_name::$1
DEST_KEY = _meta

[ensid_log_ingested]
REGEX = Ingested:\s+(\d+)\s+events
FORMAT = events_ingested::$1
DEST_KEY = _meta

[ensid_log_skipped]
REGEX = Skipped\s+\(dup\):\s+(\d+)
FORMAT = events_skipped::$1
DEST_KEY = _meta

[ensid_log_cluster_status]
REGEX = status=(\w+)
FORMAT = es_cluster_status::$1
DEST_KEY = _meta

[ensid_log_cluster_name]
REGEX = cluster=([^,\s]+)
FORMAT = es_cluster_name::$1
DEST_KEY = _meta

[ensid_log_node_count]
REGEX = nodes=(\d+|\?)
FORMAT = es_node_count::$1
DEST_KEY = _meta

[ensid_log_es_host]
REGEX = ES\s+Hosts?:\s+([^\|]+)
FORMAT = es_host::$1
DEST_KEY = _meta

[ensid_log_tls_verify]
REGEX = tls_verify='(ON|OFF)'
FORMAT = tls_verify::$1
DEST_KEY = _meta

# =========================================================================
# AUDIT LOG FIELD EXTRACTIONS (5W1H — Index-time)
# Matches lines containing [AUDIT] tag generated by escheck_* commands
# and REST handler audit classes.
#
# Sample line:
# INFO pid=1234 [AUDIT] command=escheck_connection action=INITIATED \
#   who=admin when=2026-04-27T02:00:00Z \
#   where=app=TA-ensign_elasticsearch_add-on--Modular_input,sid=scheduler_xyz \
#   what=es_connectivity_check which=cluster=prod_es how=pending
# =========================================================================

# Presence flag — marks any event as an audit event
[ensid_audit_flag]
REGEX = \[AUDIT\]
FORMAT = audit_event::true
DEST_KEY = _meta

# WHO — operator identity (username)
[ensid_audit_who]
REGEX = \[AUDIT\].*?\bwho=(\S+)
FORMAT = audit_who::$1
DEST_KEY = _meta

# WHAT action was performed
[ensid_audit_action]
REGEX = \[AUDIT\].*?\baction=(\S+)
FORMAT = audit_action::$1
DEST_KEY = _meta

# WHEN — ISO-8601 timestamp from the audit line itself
[ensid_audit_when]
REGEX = \[AUDIT\].*?\bwhen=(\S+)
FORMAT = audit_when::$1
DEST_KEY = _meta

# WHAT context — type of operation
[ensid_audit_what]
REGEX = \[AUDIT\].*?\bwhat=(\S+)
FORMAT = audit_what::$1
DEST_KEY = _meta

# WHICH — target resource (cluster/stanza)
[ensid_audit_which]
REGEX = \[AUDIT\].*?\bwhich=(\S+)
FORMAT = audit_which::$1
DEST_KEY = _meta

# HOW — result / outcome detail
[ensid_audit_how]
REGEX = \[AUDIT\].*?\bhow=(.*?)(?:\s+\w+=|$)
FORMAT = audit_how::$1
DEST_KEY = _meta

# WHERE — Search ID (forensic trail)
[ensid_audit_sid]
REGEX = \[AUDIT\].*?sid=([^,\s]+)
FORMAT = audit_sid::$1
DEST_KEY = _meta

# REST handler name (for handler-originated audit events)
[ensid_audit_handler]
REGEX = \[AUDIT\].*?\bhandler=(\S+)
FORMAT = audit_handler::$1
DEST_KEY = _meta

# SPL command name (for command-originated audit events)
[ensid_audit_command]
REGEX = \[AUDIT\].*?\bcommand=(\S+)
FORMAT = audit_command::$1
DEST_KEY = _meta