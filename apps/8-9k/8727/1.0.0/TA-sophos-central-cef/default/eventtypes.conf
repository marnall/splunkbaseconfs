# ============================================================
# eventtypes.conf - Sophos Central CEF Add-on for Splunk
# ============================================================

# Base event type - all Sophos Central CEF events
[sophos_central_cef]
search = sourcetype=sophos:cef:central*

# Threat detection events (Endpoint, Intercept X)
[sophos_central_threat]
search = sourcetype=sophos:cef:central:threat

# Investigation / case management events
[sophos_central_investigation]
search = sourcetype=sophos:cef:central:investigation

# Firewall gateway events
[sophos_central_firewall]
search = sourcetype=sophos:cef:central:firewall

# Web control / URL filtering events
[sophos_central_web_control]
search = sourcetype=sophos:cef:central cef_event_class_id=Event::Endpoint::WebControlViolation

# High severity threats (severity 7+)
[sophos_central_high_severity]
search = sourcetype=sophos:cef:central:threat cef_severity>=7

# Credential access threats specifically
[sophos_central_credential_access]
search = sourcetype=sophos:cef:central:threat mitre_tactic="Credential Access"

# Suppressed threats
[sophos_central_suppressed]
search = sourcetype=sophos:cef:central:threat suppressed=true

[sophos_central_webcontrol]
search = sourcetype=sophos:cef:central:webcontrol

[sophos_central_device]
search = sourcetype=sophos:cef:central:device

[sophos_central_update]
search = sourcetype=sophos:cef:central:update

[sophos_central_corebehavioral]
search = sourcetype=sophos:cef:central:corebehavioral

[sophos_central_coreclean]
search = sourcetype=sophos:cef:central:coreclean
