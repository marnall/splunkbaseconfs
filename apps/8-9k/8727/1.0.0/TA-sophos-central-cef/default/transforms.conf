# ============================================================
# transforms.conf  –  TA-sophos-central-cef
# ============================================================

# --- Sourcetype routing ---
[sophos-cef-sourcetype-router]
REGEX    = CEF:\d+\|[^|]*\|[^|]*\|[^|]*\|Threat\|
FORMAT   = sourcetype::sophos:cef:central:threat
DEST_KEY = MetaData:Sourcetype

[sophos-cef-sourcetype-router-investigation]
REGEX    = CEF:\d+\|[^|]*\|[^|]*\|[^|]*\|investigation\|
FORMAT   = sourcetype::sophos:cef:central:investigation
DEST_KEY = MetaData:Sourcetype

[sophos-cef-sourcetype-router-firewall]
REGEX    = CEF:\d+\|[^|]*\|[^|]*\|[^|]*\|Event::Firewall::[^|]*\|
FORMAT   = sourcetype::sophos:cef:central:firewall
DEST_KEY = MetaData:Sourcetype

[sophos-cef-sourcetype-router-webcontrol]
REGEX    = CEF:\d+\|[^|]*\|[^|]*\|[^|]*\|Event::Endpoint::WebControl[^|]*\|
FORMAT   = sourcetype::sophos:cef:central:webcontrol
DEST_KEY = MetaData:Sourcetype

[sophos-cef-sourcetype-router-device]
REGEX    = CEF:\d+\|[^|]*\|[^|]*\|[^|]*\|Event::Endpoint::Device::[^|]*\|
FORMAT   = sourcetype::sophos:cef:central:device
DEST_KEY = MetaData:Sourcetype

[sophos-cef-sourcetype-router-update]
REGEX    = CEF:\d+\|[^|]*\|[^|]*\|[^|]*\|Event::Endpoint::Update[^|]*\|
FORMAT   = sourcetype::sophos:cef:central:update
DEST_KEY = MetaData:Sourcetype

[sophos-cef-sourcetype-router-corebehavioral]
REGEX    = CEF:\d+\|[^|]*\|[^|]*\|[^|]*\|Event::Endpoint::CoreBehavioral[^|]*\|
FORMAT   = sourcetype::sophos:cef:central:corebehavioral
DEST_KEY = MetaData:Sourcetype

[sophos-cef-sourcetype-router-coreclean]
REGEX    = CEF:\d+\|[^|]*\|[^|]*\|[^|]*\|Event::Endpoint::CoreClean[^|]*\|
FORMAT   = sourcetype::sophos:cef:central:coreclean
DEST_KEY = MetaData:Sourcetype

# --- cs4 cleanup ---
[sophos-cef-cs4-clean]
REGEX    = (cs4=)((?:,\s*)+)(\s+cs4Label=)
FORMAT   = $1$3
DEST_KEY = _raw
