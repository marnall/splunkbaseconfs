# ============================================================
# props.conf  -  TA-sophos-central-cef/default/props.conf
# ============================================================

[sophos:cef:central]
SHOULD_LINEMERGE        = false
LINE_BREAKER            = ([\r\n]+)(?=\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+\S+\s+CEF:)
BREAK_ONLY_BEFORE_DATE  = false

TIME_PREFIX             = \brt=
TIME_FORMAT             = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 30
TZ                      = UTC

KV_MODE                 = none
TRUNCATE                = 0
CHARSET                 = UTF-8
ANNOTATE_PUNCT          = false

EXTRACT-cef_header        = \d{2}:\d{2}:\d{2}\s+\S+\s+CEF:(?P<cef_version>\d+)\|(?P<cef_vendor>[^|]*)\|(?P<cef_product>[^|]*)\|(?P<cef_product_version>[^|]*)\|(?P<cef_event_class_id>[^|]*)\|(?P<cef_name>[^|]*)\|(?P<cef_severity>[^|]*)
EXTRACT-externalId        = \bexternalId=(?P<externalId>\S+)
EXTRACT-rt                = \brt=(?P<rt>\S+)
EXTRACT-deviceType        = \bdeviceType=(?P<deviceType>\S+)
EXTRACT-deviceExternalId  = \bdeviceExternalId=(?P<deviceExternalId>\S+)
EXTRACT-deviceFacility    = \bdeviceFacility=(?P<deviceFacility>\S+)
EXTRACT-dhost             = \bdhost=(?P<dhost>\S+)
EXTRACT-dvchost           = \bdvchost=(?P<dvchost>\S+)
EXTRACT-suid              = \bsuid=(?P<suid>\S+)
EXTRACT-cs5               = \bcs5=(?P<cs5>\S+)
EXTRACT-cs5Label          = \bcs5Label=(?P<cs5Label>\S+)
EXTRACT-cs1Label          = \bcs1Label=(?P<cs1Label>\S+)
EXTRACT-cs2Label          = \bcs2Label=(?P<cs2Label>\S+)
EXTRACT-cs3Label          = \bcs3Label=(?P<cs3Label>\S+)
EXTRACT-cs4Label          = \bcs4Label=(?P<cs4Label>\S+)
EXTRACT-cs6Label          = \bcs6Label=(?P<cs6Label>\S+)
EXTRACT-cn1Label          = \bcn1Label=(?P<cn1Label>\S+)
EXTRACT-cn1               = \bcn1=(?P<cn1>\d+)
EXTRACT-cnt               = \bcnt=(?P<cnt>\d+)

# cs fields - trim trailing whitespace inline using \s*(?= before boundary
EXTRACT-cs1  = \bcs1=(?P<cs1>(?:(?!cs\dLabel=|cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid|msg=).)+?)\s*(?=cs\dLabel=|cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid|msg=|$)
EXTRACT-cs2  = \bcs2=(?P<cs2>(?:(?!cs\dLabel=|cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid|msg=).)+?)\s*(?=cs\dLabel=|cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid|msg=|$)
EXTRACT-cs3  = \bcs3=(?P<cs3>(?:(?!cs\dLabel=|cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid|msg=).)+?)\s*(?=cs\dLabel=|cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid|msg=|$)
EXTRACT-cs4  = \bcs4=(?P<cs4>(?:(?!cs\dLabel=|cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid|msg=).)+?)\s*(?=cs\dLabel=|cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid|msg=|$)
EXTRACT-cs6  = \bcs6=(?P<cs6>(?:(?!cs\dLabel=|cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid|msg=).)+?)\s*(?=cs\dLabel=|cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid|msg=|$)
EXTRACT-msg  = \bmsg=(?P<msg>(?:(?!cs\d=|cn\d=|device\w|source\w|dhost|dvchost|duser|suid=).)+)
EXTRACT-sourceServiceName = \bsourceServiceName=(?P<sourceServiceName>(?:(?!\s+\w+=).)+)
EXTRACT-duser             = \bduser=(?P<duser>(?:(?!\s+\w+=|$).)+)

TRANSFORMS-sourcetype_route = sophos-cef-sourcetype-router,sophos-cef-sourcetype-router-investigation,sophos-cef-sourcetype-router-firewall,sophos-cef-sourcetype-router-webcontrol,sophos-cef-sourcetype-router-device,sophos-cef-sourcetype-router-update,sophos-cef-sourcetype-router-corebehavioral,sophos-cef-sourcetype-router-coreclean
TRANSFORMS-cs4_clean        = sophos-cef-cs4-clean

# ----------------------------------------------------------
[sophos:cef:central:threat]
FIELDALIAS-sophos_threat = cs1 AS detection_rule, cs1Label AS detection_rule_label, cs2 AS attack_type, cs2Label AS attack_type_label, cs3 AS mitre_tactic, cs3Label AS mitre_tactic_label, cs4 AS mitre_techniques, cs4Label AS mitre_techniques_label, cs5 AS suppressed, cs5Label AS suppressed_label, externalId AS external_id, deviceExternalId AS device_id, deviceFacility AS device_facility

# ----------------------------------------------------------
[sophos:cef:central:investigation]
FIELDALIAS-sophos_investigation = cs1 AS case_status, cs1Label AS case_status_label, cs2 AS verdict, cs2Label AS verdict_label, cs3 AS managed_by, cs3Label AS managed_by_label, cs4 AS escalated, cs4Label AS escalated_label, cs5 AS case_type, cs5Label AS case_type_label, cs6 AS initial_detection_rule, cs6Label AS initial_detection_rule_label, cn1 AS initial_detection_severity, cn1Label AS initial_detection_severity_label, cnt AS alert_count, externalId AS case_id, duser AS assigned_to, dvchost AS tenant_id

# ----------------------------------------------------------
[sophos:cef:central:firewall]
FIELDALIAS-sophos_firewall = externalId AS event_id, dhost AS firewall_hostname, dvchost AS tenant_id, cs1 AS threat_name, cs2 AS origin

# ----------------------------------------------------------
[sophos:cef:central:webcontrol]
FIELDALIAS-sophos_webcontrol = externalId AS event_id, dhost AS endpoint_hostname, dvchost AS tenant_id, deviceExternalId AS device_id, sourceServiceName AS user_name

# ----------------------------------------------------------
[sophos:cef:central:device]
FIELDALIAS-sophos_device = externalId AS event_id, deviceExternalId AS device_id, dvchost AS tenant_id

# ----------------------------------------------------------
[sophos:cef:central:update]
FIELDALIAS-sophos_update = externalId AS event_id, deviceExternalId AS device_id, dvchost AS tenant_id

# ----------------------------------------------------------
[sophos:cef:central:corebehavioral]
FIELDALIAS-sophos_corebehavioral = cs1 AS detection_rule, cs1Label AS detection_rule_label, cs2 AS attack_type, cs2Label AS attack_type_label, externalId AS external_id, deviceExternalId AS device_id

# ----------------------------------------------------------
[sophos:cef:central:coreclean]
FIELDALIAS-sophos_coreclean = externalId AS event_id, deviceExternalId AS device_id, dvchost AS tenant_id
