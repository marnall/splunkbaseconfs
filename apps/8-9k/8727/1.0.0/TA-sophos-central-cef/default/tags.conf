# ============================================================
# tags.conf - Sophos Central CEF Add-on for Splunk
# CIM v5 Data Model tagging
# ============================================================

# --- Threat events → CIM Malware + IDS data models ---
[eventtype=sophos_central_threat]
malware = enabled
attack  = enabled
ids     = enabled

# --- High severity threats → also tag as alert ---
[eventtype=sophos_central_high_severity]
alert   = enabled

# --- Investigation/case events → CIM Incident Management ---
[eventtype=sophos_central_investigation]
incident = enabled

# --- Firewall events → CIM Network Traffic ---
[eventtype=sophos_central_firewall]
network     = enabled
communicate = enabled

# --- Web control events → CIM Web data model ---
[eventtype=sophos_central_web_control]
web     = enabled
proxy   = enabled
