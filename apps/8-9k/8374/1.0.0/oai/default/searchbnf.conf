[oai-command]
syntax = oai (<question>) | oai model=<string> (prompt=<string>)? (debug=<boolean>)? (persist=<boolean>)? (persist_index=<string>)? (investigate=<boolean>)?
shortdesc = Run prompts against a local Ollama model
description = Uses a local Ollama instance to generate responses. Defaults to the configured default_model (qwen2.5:1.5b-instruct if not set).
maintainer = Bob van Bussel
usage = public
tags = ai artificial_intelligence chat ollama
example1 = | oai "What is the weather like?"
comment1 = Simple chat using default settings (new conversation)
example2 = | oai model="qwen2.5:1.5b-instruct" prompt="Give me three facts about Splunk"
comment2 = Use a specific Ollama model (defaults to qwen2.5:1.5b-instruct)
example3 = | oai debug=true model="qwen2.5:1.5b-instruct" prompt="Explain Splunk in one sentence"
comment3 = Return the payload for troubleshooting
example4 = | oai persist=true persist_index=oai "log this answer"
comment4 = Persist the `_raw` text to the `oai` index with `_time` and user in the event
example5 = | oai investigate=true "investigate index=_internal for me and summarize volume, eps, and common logs"
comment5 = Run an index investigation without streaming events; requires index=... in the prompt
example6 = | oai investigate=true "investigate index=_internal and tell me what kind of logs it are"
comment6 = Investigate log types and characteristics of an index
example7 = index=_internal | head 3 | oai "What can you tell me about these events? Classify them by severity."
comment7 = Pipe events into OAI to have the model classify or analyze them
appears-in = 1
category = generating

[oai-models]
syntax = None
description = Models are pulled from your local Ollama installation. Run `ollama list` on the Splunk host to see what is available (the setup UI uses the same list).

[oai-parameters]
syntax = None
description = Command parameters:\
    \n- model: AI model to use (defaults to configured default_model)\
    \n- prompt: Input text/query (falls back to the first positional argument)\
    \n- debug: Show payload/debug information instead of calling Ollama\
    \n- persist: When true, also POST `_raw` to Splunks receivers/simple endpoint (requires search-time session key)\
    \n- persist_index: Target index when persist=true (defaults to `oai` if omitted)\
    \n- investigate: When true, run index investigation and summarize findings (requires index=... in prompt)

[oai-features]
syntax = None
description = The command issues a single generate call to the Ollama API using the provided prompt and model. With `investigate=true` (or a prompt starting with "investigate") and no upstream events, the command runs a quick Splunk investigation against the requested index (using the current search's time range) and summarizes the findings.