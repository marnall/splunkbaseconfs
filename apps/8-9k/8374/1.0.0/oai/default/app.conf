[id]
version = 1.0.0
name = oai

[install]
is_configured = 0
build = 1
state = enabled
allows_disable = true
python.version = python3

[ui]
is_visible = true
setup_view = configuration
label = OAI Ollama AI Integration
appIconPath = appicon.png
largeIconPath = appicon_2x.png

[launcher]
author = Bob van Bussel
description = The OAI (Observalitics.com AI) custom command enables integration with Ollama AI services directly from Splunk searches.
version = 1.0.0

[package]
id = oai
check_for_updates = true
show_upgrade_notification = false

[triggers]
reload.oai = simple

