# INDEX CONFIGURATION
# All searches reference the `atlas_index` macro (defined in macros.conf).
# Update the macro ONCE and all 10 rules point to your AI/LLM log index.
# Edit in: Settings > Advanced Search > Search Macros > atlas_index
# Default: index=main. Change to match your environment (e.g. index=ai_logs).
#
# IMPORTANT: All rules ship DISABLED. Enable them after configuring atlas_index.
# Enable in: Settings > Searches, Reports, and Alerts > [rule name] > Enable
#
# =============================================================================
# MITRE ATLAS AI Threat Detection Rules
# GIC Engineering | mitre_atlas_detections v1.0.1

#
# Technique coverage: AML.T0007, AML.T0012, AML.T0014, AML.T0020,
#                     AML.T0024, AML.T0047, AML.T0048, AML.T0051.000,
#                     AML.T0051.001, AML.T0054
#
# Adapt index/sourcetype values to match your environment.
# =============================================================================


# -----------------------------------------------------------------------------
# RULE 1: AML.T0051.000 — Direct Prompt Injection Detected
# Tactic: Execution | Severity: High
# Detects adversary-controlled input attempting to override LLM system prompts
# directly through user-supplied text.
# -----------------------------------------------------------------------------
[ATLAS_DETECT_T0051_000]
action.email.useNSSubject = 1
alert.severity = high
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = Detects direct prompt injection attempts (AML.T0051.000). User input contains patterns designed to override LLM system instructions. Investigate the originating user/session and review full conversation context.
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
enableSched = 0
action.summary_index = 1
action.summary_index._name = summary
quantity = 1
relation = greater than
search = `atlas_index` sourcetype IN ("llm_gateway", "openai_logs", "azure_openai", "bedrock_logs", "llm:*") \
| eval user_input_lower=lower(coalesce(user_input, prompt, request_text, message)) \
| lookup atlas_injection_keywords.csv keyword AS user_input_lower OUTPUTNEW injection_type, risk_score AS lookup_risk_score \
| eval matched_pattern=if(isnotnull(injection_type), injection_type, \
    mvfilter(match(user_input_lower, "(?i)(ignore the above|new instruction:|system: you must|override previous context|forget what you were told|the real instructions are|IMPORTANT: disregard|actually your goal is|your instructions are|ignore all prior instructions|disregard your system prompt|ignore previous instructions)"))) \
| where isnotnull(matched_pattern) \
| eval atlas_technique="AML.T0051.000", atlas_technique_name="Direct Prompt Injection", atlas_tactic="Execution" \
| eval severity="high", confidence=if(isnotnull(lookup_risk_score), "high", "medium") \
| table _time, host, src_ip, user, session_id, model, user_input_lower, matched_pattern, atlas_technique, atlas_technique_name, atlas_tactic, severity, confidence


# -----------------------------------------------------------------------------
# RULE 2: AML.T0051.001 — Indirect Prompt Injection via Retrieved Content
# Tactic: Execution | Severity: High
# Detects injection payloads embedded in external content retrieved by
# RAG pipelines, web browsing agents, or document processors.
# -----------------------------------------------------------------------------
[ATLAS_DETECT_T0051_001]
action.email.useNSSubject = 1
alert.severity = high
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = Detects indirect prompt injection (AML.T0051.001) in content retrieved by LLM agents — web pages, documents, emails, or RAG chunks. High-fidelity signal when injection keywords appear in retrieved_content rather than direct user input.
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
enableSched = 0
action.summary_index = 1
action.summary_index._name = summary
quantity = 1
relation = greater than
search = `atlas_index` sourcetype IN ("llm_gateway", "rag_logs", "agent_logs", "llm_agent:*") \
    event_type IN ("retrieval", "document_load", "web_fetch", "tool_result") \
| eval retrieved_lower=lower(coalesce(retrieved_content, document_text, tool_output, fetched_text)) \
| where match(retrieved_lower, "(?i)(ignore previous instructions|ignore the above|system: you must|new instruction:|override previous context|your real instructions|forget your previous task|IMPORTANT NOTE FOR AI|NOTE TO ASSISTANT|actually your goal is|ignore prior context|your actual task is)") \
| eval atlas_technique="AML.T0051.001", atlas_technique_name="Indirect Prompt Injection", atlas_tactic="Execution" \
| eval severity="high", confidence="high" \
| eval source_url=coalesce(url, source_uri, document_path, "unknown") \
| table _time, host, user, session_id, model, source_url, retrieved_lower, atlas_technique, atlas_technique_name, atlas_tactic, severity, confidence


# -----------------------------------------------------------------------------
# RULE 3: AML.T0054 — LLM Jailbreak Attempt Detected
# Tactic: Defense Evasion | Severity: High
# Detects prompts designed to bypass LLM safety systems using known
# jailbreak personas (DAN, STAN, etc.) and pattern variations.
# -----------------------------------------------------------------------------
[ATLAS_DETECT_T0054]
action.email.useNSSubject = 1
alert.severity = high
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = Detects LLM jailbreak attempts (AML.T0054) using known bypass patterns. Correlates against atlas_jailbreak_patterns lookup. Review full session history — jailbreaks often involve multi-turn escalation before the harmful request.
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
enableSched = 0
action.summary_index = 1
action.summary_index._name = summary
quantity = 1
relation = greater than
search = `atlas_index` sourcetype IN ("llm_gateway", "openai_logs", "azure_openai", "bedrock_logs", "llm:*") \
| eval user_input_lower=lower(coalesce(user_input, prompt, request_text, message)) \
| lookup atlas_jailbreak_patterns.csv pattern AS user_input_lower OUTPUTNEW risk_score, category \
| where isnotnull(category) OR \
    match(user_input_lower, "(?i)(you are now dan|do anything now|developer mode|jailbreak mode|act as if you have no|pretend you are an ai without|evil mode|stan mode|your true self|simulate an unrestricted|bypass your filter|ignore your (training|guidelines|restrictions)|no restrictions|without limitations)") \
| eval atlas_technique="AML.T0054", atlas_technique_name="LLM Jailbreak", atlas_tactic="Defense Evasion" \
| eval severity="high", confidence="high" \
| table _time, host, src_ip, user, session_id, model, user_input_lower, risk_score, atlas_technique, atlas_technique_name, atlas_tactic, severity, confidence


# -----------------------------------------------------------------------------
# RULE 4: AML.T0024 — Exfiltration via ML Inference API (Volumetric)
# Tactic: Exfiltration | Severity: Critical
# Detects high-volume inference API usage patterns consistent with
# model extraction or sensitive data exfiltration through repeated queries.
# -----------------------------------------------------------------------------
[ATLAS_DETECT_T0024]
action.email.useNSSubject = 1
alert.severity = critical
alert.suppress = 1
alert.suppress.fields = user, src_ip
alert.suppress.period = 1h
alert.track = 1
counttype = number of events
cron_schedule = */30 * * * *
description = Detects potential model extraction or data exfiltration via ML inference API (AML.T0024). Triggers when a single user/IP exceeds 500 API calls in 30 minutes with high token consumption. Tune thresholds for your environment.
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
enableSched = 0
action.summary_index = 1
action.summary_index._name = summary
quantity = 1
relation = greater than
search = `atlas_index` sourcetype IN ("llm_gateway", "openai_logs", "azure_openai", "bedrock_logs", "api_gateway") \
    event_type IN ("api_call", "inference", "completion", "chat") \
| bin _time span=30m \
| stats count AS api_call_count, \
        sum(eval(coalesce(total_tokens, prompt_tokens+completion_tokens, 0))) AS total_tokens_consumed, \
        dc(session_id) AS unique_sessions, \
        values(model) AS models_queried \
        BY user, src_ip, _time \
| where api_call_count > 500 OR total_tokens_consumed > 1000000 \
| eval exfil_risk_score=case( \
    api_call_count > 2000, 95, \
    api_call_count > 1000, 85, \
    api_call_count > 500, 75, \
    total_tokens_consumed > 5000000, 95, \
    true(), 70) \
| eval atlas_technique="AML.T0024", atlas_technique_name="Exfiltration via ML Inference API", atlas_tactic="Exfiltration" \
| eval severity="critical" \
| table _time, user, src_ip, api_call_count, total_tokens_consumed, unique_sessions, models_queried, exfil_risk_score, atlas_technique, atlas_technique_name, atlas_tactic, severity


# -----------------------------------------------------------------------------
# RULE 5: AML.T0020 — Training Data Poisoning via Pipeline Upload
# Tactic: Impact | Severity: Critical
# Detects unauthorized or anomalous uploads to ML training data pipelines,
# S3 buckets, and dataset registries used for model training.
# -----------------------------------------------------------------------------
[ATLAS_DETECT_T0020]
action.email.useNSSubject = 1
alert.severity = critical
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = Detects potential training data poisoning (AML.T0020) via anomalous uploads to ML data pipelines. Triggers on uploads to training buckets from unexpected sources or with unusual file characteristics. Critical: model corruption may not surface for weeks.
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
enableSched = 0
action.summary_index = 1
action.summary_index._name = summary
quantity = 1
relation = greater than
search = `atlas_index` sourcetype IN ("aws:s3:access", "azure:storage:blob", "gcp:storage", "mlflow_logs", "dvc_logs", "dataset_registry") \
    action IN ("PUT", "UPLOAD", "write", "create", "push") \
| rex field=object_key "(?i)(?<path_segment>train(ing)?|dataset|corpus|finetune|fine_tune|rlhf|dpo|sft)" \
| where isnotnull(path_segment) \
| eval is_anomalous=case( \
    NOT cidrmatch("10.0.0.0/8", src_ip) AND NOT cidrmatch("172.16.0.0/12", src_ip) AND NOT cidrmatch("192.168.0.0/16", src_ip), "external_upload", \
    like(lower(coalesce(user, "-")), "%service%") AND (tonumber(strftime(_time, "%H")) < 8 OR tonumber(strftime(_time, "%H")) > 17), "off_hours_service_account", \
    object_size_bytes > 104857600, "large_file_upload", \
    1=1, null()) \
| where isnotnull(is_anomalous) \
| eval atlas_technique="AML.T0020", atlas_technique_name="Poison Training Data", atlas_tactic="Impact" \
| eval severity="critical", confidence="medium" \
| table _time, host, src_ip, user, bucket_name, object_key, object_size_bytes, is_anomalous, atlas_technique, atlas_technique_name, atlas_tactic, severity, confidence


# -----------------------------------------------------------------------------
# RULE 6: AML.T0047 — AI-Enabled Abuse: High-Volume Content Generation
# Tactic: Impact | Severity: Medium
# Detects patterns consistent with weaponizing AI for scaled content
# generation — bulk requests, automated output harvesting, prompt templating.
# -----------------------------------------------------------------------------
[ATLAS_DETECT_T0047]
action.email.useNSSubject = 1
alert.severity = medium
alert.suppress = 1
alert.suppress.fields = user, src_ip
alert.suppress.period = 4h
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = Detects AI platform abuse for scaled content generation (AML.T0047). Triggers on users generating >200 completions/hour with high completion-to-prompt token ratios, consistent with automated content farming or disinformation generation.
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
enableSched = 0
action.summary_index = 1
action.summary_index._name = summary
quantity = 1
relation = greater than
search = `atlas_index` sourcetype IN ("llm_gateway", "openai_logs", "azure_openai", "bedrock_logs") \
    event_type IN ("completion", "chat") \
| stats count AS request_count, \
        avg(completion_tokens) AS avg_completion_tokens, \
        avg(prompt_tokens) AS avg_prompt_tokens, \
        sum(completion_tokens) AS total_output_tokens \
        BY user, src_ip \
| eval completion_ratio=round(avg_completion_tokens/max(avg_prompt_tokens, 1), 2) \
| where request_count > 200 AND (completion_ratio > 5 OR total_output_tokens > 500000) \
| eval abuse_pattern=case( \
    completion_ratio > 10 AND request_count > 500, "bulk_content_farming", \
    completion_ratio > 5 AND request_count > 200, "high_volume_generation", \
    total_output_tokens > 1000000, "token_harvesting", \
    true(), "suspicious_volume") \
| eval atlas_technique="AML.T0047", atlas_technique_name="AI-Enabled Product/Service Abuse", atlas_tactic="Impact" \
| eval severity="medium" \
| table _time, user, src_ip, request_count, avg_completion_tokens, completion_ratio, total_output_tokens, abuse_pattern, atlas_technique, atlas_technique_name, atlas_tactic, severity


# -----------------------------------------------------------------------------
# RULE 7: AML.T0048 — External Harms via AI Output: Policy Violation Response
# Tactic: Impact | Severity: Medium
# Detects LLM safety system flags on output content — model refused or
# flagged output suggesting adversary achieved partial or full policy bypass.
# -----------------------------------------------------------------------------
[ATLAS_DETECT_T0048]
action.email.useNSSubject = 1
alert.severity = medium
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = Detects AI outputs flagged by content safety systems (AML.T0048). Safety flags indicate the model generated or nearly generated policy-violating content. Correlate with AML.T0054 jailbreak alerts for the same session — this may indicate partial bypass success.
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
enableSched = 0
action.summary_index = 1
action.summary_index._name = summary
quantity = 1
relation = greater than
search = `atlas_index` sourcetype IN ("llm_gateway", "openai_logs", "azure_openai", "content_safety", "moderations_api") \
    (event_type="moderation" OR safety_flagged=true OR finish_reason="content_filter" OR flagged=true) \
| eval harm_categories=coalesce(categories, harm_categories, flagged_categories, "unknown") \
| eval severity_score=case( \
    match(lower(harm_categories), "(?i)(violence|self.harm|csam|terrorism)"), 95, \
    match(lower(harm_categories), "(?i)(hate|harassment|sexual)"), 80, \
    match(lower(harm_categories), "(?i)(illicit|deception|manipulation)"), 70, \
    true(), 60) \
| where severity_score >= 60 \
| eval atlas_technique="AML.T0048", atlas_technique_name="External Harms via AI Output", atlas_tactic="Impact" \
| eval severity=case(severity_score>=90, "critical", severity_score>=80, "high", severity_score>=70, "medium", true(), "low") \
| table _time, host, src_ip, user, session_id, model, harm_categories, severity_score, finish_reason, atlas_technique, atlas_technique_name, atlas_tactic, severity


# -----------------------------------------------------------------------------
# RULE 8: AML.T0012 — Valid Account Abuse on AI Platform (Anomalous Access)
# Tactic: Initial Access | Severity: High
# Detects legitimate AI platform credentials being used anomalously —
# new geolocations, off-hours access, sudden model/endpoint changes.
# -----------------------------------------------------------------------------
[ATLAS_DETECT_T0012]
action.email.useNSSubject = 1
alert.severity = high
alert.suppress = 1
alert.suppress.fields = user
alert.suppress.period = 4h
alert.track = 1
counttype = number of events
cron_schedule = */30 * * * *
description = Detects anomalous use of valid credentials on AI platforms (AML.T0012). Baseline deviations: new country/ASN, impossible travel, off-hours access by human accounts, or access to models/endpoints not previously used. Credential compromise is primary hypothesis.
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
enableSched = 0
action.summary_index = 1
action.summary_index._name = summary
quantity = 1
relation = greater than
search = `atlas_index` sourcetype IN ("llm_gateway", "openai_logs", "azure_openai", "bedrock_logs", "okta", "azure:aad") \
    action IN ("api_call", "login", "authenticate", "token_issue") \
| iplocation src_ip \
| eval current_country=Country, current_city=City \
| join type=left user \
    [search `atlas_index` sourcetype IN ("llm_gateway", "openai_logs", "azure_openai") earliest=-30d@d latest=-1d@d \
     | iplocation src_ip \
     | stats mode(Country) AS baseline_country, mode(City) AS baseline_city, \
             min(date_hour) AS earliest_hour, max(date_hour) AS latest_hour \
       BY user] \
| eval anomaly_flag=case( \
    isnotnull(baseline_country) AND current_country!=baseline_country, "new_country_access", \
    date_hour<6 OR date_hour>22, "off_hours_access", \
    isnull(baseline_country), "no_baseline_new_user", \
    true(), null()) \
| where isnotnull(anomaly_flag) \
| eval atlas_technique="AML.T0012", atlas_technique_name="Valid Account Abuse on AI Platforms", atlas_tactic="Initial Access" \
| eval severity="high" \
| table _time, user, src_ip, current_country, baseline_country, anomaly_flag, model, atlas_technique, atlas_technique_name, atlas_tactic, severity


# -----------------------------------------------------------------------------
# RULE 9: AML.T0014 — AI Model Reconnaissance: Systematic Probing Detected
# Tactic: Reconnaissance | Severity: Medium
# Detects adversary probing LLM endpoints to fingerprint model architecture,
# version, capabilities, and knowledge cutoff through systematic queries.
# -----------------------------------------------------------------------------
[ATLAS_DETECT_T0014]
action.email.useNSSubject = 1
alert.severity = medium
alert.suppress = 1
alert.suppress.fields = user, src_ip
alert.suppress.period = 2h
alert.track = 1
counttype = number of events
cron_schedule = */30 * * * *
description = Detects AI model reconnaissance (AML.T0014). Adversaries systematically query LLMs to identify model family, version, training cutoff, and capabilities before launching targeted attacks. Trigger: multiple recon-pattern prompts from same source in 30 minutes.
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
enableSched = 0
action.summary_index = 1
action.summary_index._name = summary
quantity = 3
relation = greater than
search = `atlas_index` sourcetype IN ("llm_gateway", "openai_logs", "azure_openai", "bedrock_logs") \
| eval user_input_lower=lower(coalesce(user_input, prompt, request_text, message)) \
| where match(user_input_lower, "(?i)(what model are you|which version|what is your (model|version|name)|are you gpt|are you claude|are you (llama|mistral|gemini|gpt|palm)|what (llm|ai model) (are you|powers|is this)|tell me your (model|version|architecture)|what is your training (cutoff|data|date)|what year (were you|is your)|how many parameters|your (context window|token limit)|which company (made|trained|built) you|who (made|built|created|trained) you)") \
| stats count AS recon_query_count, \
        values(user_input_lower) AS recon_queries \
        BY user, src_ip \
| where recon_query_count >= 3 \
| eval recon_intensity=case(recon_query_count>=10, "systematic", recon_query_count>=5, "moderate", true(), "low") \
| eval atlas_technique="AML.T0014", atlas_technique_name="Discover AI Model Family", atlas_tactic="Reconnaissance" \
| eval severity="medium" \
| table _time, user, src_ip, recon_query_count, recon_intensity, recon_queries, atlas_technique, atlas_technique_name, atlas_tactic, severity


# -----------------------------------------------------------------------------
# RULE 10: AML.T0007 — AI Artifact Discovery: Exposed ML Assets Detected
# Tactic: Reconnaissance | Severity: Medium
# Detects access to or discovery of exposed ML artifacts — model files,
# config files, dataset paths, MLflow/DVC registries, and inference endpoints.
# -----------------------------------------------------------------------------
[ATLAS_DETECT_T0007]
action.email.useNSSubject = 1
alert.severity = medium
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = Detects discovery of exposed ML artifacts (AML.T0007). Monitors access to model files (.pkl, .pt, .onnx, .bin, .safetensors), MLflow/DVC registries, and Hugging Face-style model cards by unexpected sources. Precursor to model theft or adversarial attack construction.
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
enableSched = 0
action.summary_index = 1
action.summary_index._name = summary
quantity = 1
relation = greater than
search = `atlas_index` sourcetype IN ("aws:s3:access", "azure:storage:blob", "gcp:storage", "web:access", "nginx:access", "apache:access", "cloudflare:access") \
    (action IN ("GET", "read", "download") OR method="GET") \
| eval request_path=lower(coalesce(object_key, uri_path, cs_uri_stem, request, "-")) \
| where match(request_path, "(?i)\.(pkl|pickle|pt|pth|onnx|bin|safetensors|gguf|ggml|h5|pb|tflite|joblib|model)$") \
    OR match(request_path, "(?i)(mlflow|mlruns|mlartifacts|dvc|\.dvc|model.?registry|model.?card|config\.json|tokenizer\.json|vocab\.json|merges\.txt)") \
    OR match(request_path, "(?i)(/models/|/checkpoints/|/weights/|/artifacts/|/experiments/|/runs/)") \
| eval is_external_access=if(NOT cidrmatch("10.0.0.0/8", src_ip) AND NOT cidrmatch("172.16.0.0/12", src_ip) AND NOT cidrmatch("192.168.0.0/16", src_ip), "true", "false") \
| eval artifact_type=case( \
    match(request_path, "(?i)\.(pkl|pickle|joblib)$"), "serialized_model", \
    match(request_path, "(?i)\.(pt|pth|bin|safetensors|gguf|ggml)$"), "model_weights", \
    match(request_path, "(?i)\.(onnx|h5|pb|tflite)$"), "model_export", \
    match(request_path, "(?i)(mlflow|mlruns|dvc)"), "ml_registry", \
    match(request_path, "(?i)(tokenizer|vocab|merges)"), "tokenizer_artifacts", \
    true(), "ml_config") \
| eval atlas_technique="AML.T0007", atlas_technique_name="Discover AI Artifacts", atlas_tactic="Reconnaissance" \
| eval severity=if(is_external_access="true", "high", "medium") \
| table _time, host, src_ip, user, request_path, artifact_type, is_external_access, atlas_technique, atlas_technique_name, atlas_tactic, severity
