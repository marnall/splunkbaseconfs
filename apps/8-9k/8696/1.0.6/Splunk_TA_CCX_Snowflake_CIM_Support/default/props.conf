EVAL-change_type = if(match('stageKind',".*User.*|.*user.*"),"user",if(isnotnull('policyKind'),"policy",if(isnotnull('stageKind'),"filesystem",if('objectDomain'="Table" OR 'objectDomain' IN("Table","View","Schema","Warehouse"),"table",null()))))
EVAL-object = 'objectName'
EVAL-object_attrs = 'objectDomain'
EVAL-object_category = lower(coalesce('stageKind','objectDomain'))
