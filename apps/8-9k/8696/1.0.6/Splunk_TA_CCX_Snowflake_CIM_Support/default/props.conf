##SNOWFLAKE QUERY (HEC)##
[snowflake:json]
KV_MODE = none
LINE_BREAKER = ([\r\n]+)
category = Structured
description = Custom
pulldown_type = true
DATETIME_CONFIG =
INDEXED_EXTRACTIONS = json
NO_BINARY_CHECK = true

EVAL-action = case(match('OBJECT_MODIFIED_BY_DDL.operationType',"CREATE"),"created",match('OBJECT_MODIFIED_BY_DDL.operationType',"ALTER|DROP|UNDROP|REPLACE"),"modified",isnotnull('BASE_OBJECTS_ACCESSED{}.objectDomain'),"modified",('status.is_success'="true" OR IS_SUCCESS="YES"),"success",('status.is_success'="no" OR 'IS_SUCCESS'="NO"),"failure")
EVAL-app = if(isnotnull('REPORTED_CLIENT_TYPE') AND 'REPORTED_CLIENT_TYPE'!="null",lower('REPORTED_CLIENT_TYPE'),"Snowflake")
EVAL-authentication_method = if(isnotnull('data{}.event_context.sso.provider') AND 'data{}.event_context.sso.provider'!="null",'data{}.event_context.sso.provider',if(isnotnull('FIRST_AUTHENTICATION_FACTOR') AND 'FIRST_AUTHENTICATION_FACTOR'!="null",'FIRST_AUTHENTICATION_FACTOR',null()))
EVAL-reason = 'data{}.event_context.user.email'
EVAL-signature = if(ERROR_MESSAGE!="null",'ERROR_MESSAGE','data{}.event_type')
EVAL-signature_id = if(ERROR_CODE!="null",'ERROR_CODE',null())
EVAL-src_user = 'data{}.event_context.user.email'
EVAL-src = coalesce('data{}.actor.ip','CLIENT_IP')
EVAL-user = if(isnotnull('data{}.event_context.user.email') AND 'data{}.event_context.user.email'!="null",'data{}.event_context.user.email', if(isnotnull('USER_NAME') AND USER_NAME!="null",'USER_NAME', null()))
EVAL-change_type = if(match('BASE_OBJECTS_ACCESSED{}.stageKind',".*User.*|.*user.*"),"user",if(isnotnull('POLICIES_REFERENCED{}.columns{}.policies{}.policyKind'),"policy",if(isnotnull('BASE_OBJECTS_ACCESSED{}.stageKind'),"filesystem",if('BASE_OBJECTS_ACCESSED{}.objectDomain'="Table" OR 'OBJECT_MODIFIED_BY_DDL.objectDomain' IN("Table","View","Schema","Warehouse"),"table",null()))))
EVAL-object = coalesce('OBJECTS_MODIFIED{}.objectName','BASE_OBJECTS_ACCESSED{}.objectName','DIRECT_OBJECTS_ACCESSED{}.joinObjects{}.node.objectName','OBJECT_MODIFIED_BY_DDL.objectName','DIRECT_OBJECTS_ACCESSED{}.objectName')
EVAL-object_attrs = coalesce('BASE_OBJECTS_ACCESSED{}.objectDomain','OBJECT_MODIFIED_BY_DDL.objectDomain')
EVAL-object_category = lower(coalesce('BASE_OBJECTS_ACCESSED{}.stageKind','DIRECT_OBJECTS_ACCESSED{}.stageKind','BASE_OBJECTS_ACCESSED{}.objectDomain','OBJECTS_MODIFIED{}.stageKind','OBJECT_MODIFIED_BY_DDL.objectDomain'))
EVAL-object_id = coalesce('OBJECTS_MODIFIED{}.objectId','BASE_OBJECTS_ACCESSED{}.objectId','DIRECT_OBJECTS_ACCESSED{}.joinObjects{}.node.objectId','OBJECT_MODIFIED_BY_DDL.objectId')
EVAL-status = case('EXECUTION_STATUS'=="FAIL","failure",'EXECUTION_STATUS'=="SUCCESS","success",'EXECUTION_STATUS'=="INCIDENT","incident")
EVAL-vendor_product = "Snowflake"


##Splunk Add-on for AWS - Generic S3 input##
[snowflake:s3:csv:loginhistory]
KV_MODE = json

EVAL-action = case(match('OBJECT_MODIFIED_BY_DDL.operationType',"CREATE"),"created",match('OBJECT_MODIFIED_BY_DDL.operationType',"ALTER|DROP|UNDROP|REPLACE"),"modified",isnotnull('BASE_OBJECTS_ACCESSED{}.objectDomain'),"modified",('status.is_success'="true" OR IS_SUCCESS="YES"),"success",('status.is_success'="no" OR 'IS_SUCCESS'="NO"),"failure")
EVAL-app = if(isnotnull('REPORTED_CLIENT_TYPE') AND 'REPORTED_CLIENT_TYPE'!="null",lower('REPORTED_CLIENT_TYPE'),"Snowflake")
EVAL-authentication_method = if(isnotnull('data{}.event_context.sso.provider') AND NOT 'data{}.event_context.sso.provider' IN("null","\\N","\\\\N"),'data{}.event_context.sso.provider',if(isnotnull('FIRST_AUTHENTICATION_FACTOR') AND NOT 'FIRST_AUTHENTICATION_FACTOR' IN("null","\\N","\\\\N"),'FIRST_AUTHENTICATION_FACTOR',null()))
EVAL-reason = 'data{}.event_context.user.email'
EVAL-signature = if(isnotnull(ERROR_MESSAGE) AND NOT ERROR_MESSAGE IN("null","\\N","\\\\N") ,'ERROR_MESSAGE','data{}.event_type')
EVAL-signature_id = if(isnotnull(ERROR_CODE) AND NOT ERROR_CODE IN("null","\\N","\\\\N"),'ERROR_CODE',null())
EVAL-src_user = if(isnotnull('data{}.event_context.user.email') AND 'data{}.event_context.user.email'!="null",'data{}.event_context.user.email', if(isnotnull('USER_NAME') AND USER_NAME!="null",'USER_NAME', null()))
EVAL-src = coalesce('data{}.actor.ip','CLIENT_IP')
EVAL-user = if(isnotnull('data{}.event_context.user.email') AND 'data{}.event_context.user.email'!="null",'data{}.event_context.user.email', if(isnotnull('USER_NAME') AND USER_NAME!="null",'USER_NAME', null()))
EVAL-vendor_product = "Snowflake"

[snowflake:s3:csv:accesshistory]
KV_MODE = json

REPORT-extended_capturing_accesshistory = extended_capturing_nested1_json ,extended_capturing_nested2_json

EVAL-action = case(match('operationType',"CREATE"),"created",match('operationType',"ALTER|DROP|UNDROP|REPLACE"),"modified",isnotnull('objectDomain'),"modified",('status.is_success'="true" OR IS_SUCCESS="YES"),"success",('status.is_success'="no" OR 'IS_SUCCESS'="NO"),"failure")
EVAL-app = if(isnotnull('REPORTED_CLIENT_TYPE') AND 'REPORTED_CLIENT_TYPE'!="null",lower('REPORTED_CLIENT_TYPE'),"Snowflake")
EVAL-reason = 'data{}.event_context.user.email'
EVAL-signature = if(ERROR_MESSAGE!="null",'ERROR_MESSAGE','data{}.event_type')
EVAL-signature_id = if(ERROR_CODE!="null",'ERROR_CODE',null())
EVAL-src_user = 'data{}.event_context.user.email'
EVAL-src = coalesce('data{}.actor.ip','CLIENT_IP')
EVAL-user = if(isnotnull('data{}.event_context.user.email') AND 'data{}.event_context.user.email'!="null",'data{}.event_context.user.email', if(isnotnull('USER_NAME') AND USER_NAME!="null",'USER_NAME', null()))
EVAL-change_type = if(match('stageKind',".*User.*|.*user.*"),"user",if(isnotnull('policyKind'),"policy",if(isnotnull('stageKind'),"filesystem",if('objectDomain'="Table" OR 'objectDomain' IN("Table","View","Schema","Warehouse"),"table",null()))))
EVAL-object = 'objectName'
EVAL-object_attrs = 'objectDomain'
EVAL-object_category = lower(coalesce('stageKind','objectDomain'))
EVAL-object_id = 'objectId'
EVAL-status = case('EXECUTION_STATUS'=="FAIL","failure",'EXECUTION_STATUS'=="SUCCESS","success",'EXECUTION_STATUS'=="INCIDENT","incident")
EVAL-vendor_product = "Snowflake"

[snowflake:s3:csv:sessions]
KV_MODE = json

REPORT-extended_capturing_sessions = extended_capturing_nested3_json

[snowflake:s3:csv:alerthistory]
KV_MODE = json

[snowflake:loginhistory]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
category = Custom
description = Custom DBX Snowflake
pulldown_type = true

FIELDALIAS-authentication_method = FIRST_AUTHENTICATION_FACTOR AS authentication_method
FIELDALIAS-signature = ERROR_MESSAGE AS signature
FIELDALIAS-signature_id = ERROR_CODE AS signature_id
FIELDALIAS-user = USER_NAME AS user
FIELDALIAS-src = CLIENT_IP AS src
FIELDALIAS-src_ip = CLIENT_IP AS src_ip

EVAL-authentication_service = if(isnotnull('REPORTED_CLIENT_TYPE') AND 'REPORTED_CLIENT_TYPE'!="null",lower('REPORTED_CLIENT_TYPE'),null())
EVAL-action = case(IS_SUCCESS="YES","success",'IS_SUCCESS'="NO","failure")
EVAL-vendor_product = "Snowflake"
EVAL-app = "Snowflake"
##https://docs.snowflake.com/en/sql-reference/account-usage/login_history##

[snowflake:grants_to_users]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
category = Custom
description = Custom DBX Snowflake
pulldown_type = true

FIELDALIAS-object = ROLE AS object
FIELDALIAS-src_user_type = GRANTED_BY_ROLE_TYPE AS src_user_type
FIELDALIAS-src_user = GRANTED_BY AS src_user

EVAL-user = if(GRANTED_TO="USER",GRANTEE_NAME,GRANTED_BY)
EVAL-user_type = if(GRANTED_TO="USER",GRANTED_TO,GRANTED_BY_ROLE_TYPE)
EVAL-status = "success"
EVAL-action = "updated"
EVAL-object_category = "ROLE"
EVAL-result = "grant role ".ROLE." to user ".GRANTEE_NAME
EVAL-change_type = "AAA"
EVAL-vendor_product = "Snowflake"
##https://docs.snowflake.com/en/sql-reference/account-usage/grants_to_users##

[snowflake:grants_to_roles]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
category = Custom
description = Custom DBX Snowflake
pulldown_type = true

FIELDALIAS-dest = NAME AS dest 
FIELDALIAS-object = GRANTEE_NAME AS object 
FIELDALIAS-object_category = GRANTED_TO AS object_category
FIELDALIAS-src_user = GRANTED_BY AS src_user
FIELDALIAS-src_user_type = GRANTED_BY_ROLE_TYPE AS user_type 

EVAL-user = if(GRANTED_TO="USER",GRANTEE_NAME,GRANTED_BY)
EVAL-user_type = if(GRANTED_TO="USER",GRANTED_TO,GRANTED_BY_ROLE_TYPE)
EVAL-action = "updated" 
EVAL-status = "success" 
EVAL-change_type = "AAA" 
EVAL-result = "grant privilege ".PRIVILEGE." to ".lower(replace(GRANTED_TO,"_"," "))." ".GRANTEE_NAME 
EVAL-vendor_product = "Snowflake"
##https://docs.snowflake.com/en/sql-reference/account-usage/grants_to_roles##

