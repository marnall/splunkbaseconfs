[ccx_snowflake_audit_changes]
search = (sourcetype="snowflake:json" ("BASE_OBJECTS_ACCESSED{}.objectDomain"="*" OR "OBJECT_MODIFIED_BY_DDL.objectName"="*")) OR (sourcetype="snowflake:s3:csv:accesshistory" change_type="*") OR sourcetype="snowflake:grants_to_roles" OR sourcetype="snowflake:grants_to_users"
# tags = change

[ccx_snowflake_auth]
search = (sourcetype="snowflake:json" (EVENT_TYPE="LOGIN" OR "data{}.event_label"="*" NOT "data{}.event_type"="*.changed")) OR sourcetype="snowflake:s3:csv:loginhistory" OR sourcetype="snowflake:loginhistory" 
# tags = authentication

[ccx_snowflake_log_events]
search = sourcetype="snowflake:json" "extra.order_by"="-logged_at"

[ccx_snowflake_queries]
search = sourcetype="snowflake:json" (QUERY_TYPE="*" NOT QUERY_TYPE="null")

[ccx_snowflake_access_procedure]
search = sourcetype="snowflake:s3:csv:accesshistory" objectDomain="Procedure"

[ccx_snowflake_session_logout]
search = sourcetype= "snowflake:s3:csv:sessions" CLOSED_REASON="LOGOUT"
# tags = logout

[ccx_snowflake_sessions]
search = sourcetype= "snowflake:s3:csv:sessions" NOT CLOSED_REASON="LOGOUT"

[ccx_snowflake_alerthistory]
search = sourcetype= "snowflake:s3:csv:alerthistory"

[ccx_snowflake_credentials]
search = sourcetype="snowflake:credentials"