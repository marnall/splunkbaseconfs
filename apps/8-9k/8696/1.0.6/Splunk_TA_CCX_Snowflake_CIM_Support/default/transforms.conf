MV_ADD = 1
REGEX = (\[\{\"columns\":\[\{)?\"([^=",]+)\":\s?\"?([^=",]*)
SOURCE_KEY = DIRECT_OBJECTS_ACCESSED

[extended_capturing_nested2_json]
FORMAT = $2::$3
MV_ADD = 1
