[extended_dbx_snowflake_unstructured]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = "?(\w+)"\:\s["|]?([^"|\}|\"\]\"]+[^\s\"\,\}])["|\}|\]|\[\{]?