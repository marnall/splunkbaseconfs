# datamodels.conf
#
# Splunk Upgrade App - Data Model Configuration
#
# This file defines data model behavior for the Splunk Upgrade App.
#
# IMPORTANT:
# Data model acceleration is disabled by default.
#
# Enable acceleration only after validating:
# - Expected search volume
# - Available Search Head resources
# - Data retention requirements
# - Dashboard performance needs
#
# Deployment:
# - Search Heads / SHC Deployer only
# - Do NOT deploy to Indexers or Universal Forwarders


################################################################################
# Splunk Upgrade Data Model
################################################################################
#
# Data model file:
# default/data/models/splunk_upgrade.json
#
# Model name:
# splunk_upgrade
#
# To enable acceleration, change:
# acceleration = false
# to:
# acceleration = true

[splunk_upgrade]
acceleration = false

# Optional acceleration settings.
# These are provided as examples only and are not active unless
# acceleration is enabled.

# acceleration.earliest_time = -7d
# acceleration.backfill_time = -7d
# acceleration.max_time = 3600
# acceleration.allow_old_summaries = true