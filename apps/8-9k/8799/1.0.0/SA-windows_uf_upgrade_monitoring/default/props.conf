# props.conf
#
# Splunk Upgrade App - Search-Time Field Extractions
#
# Deployment:
# - Deploy this props.conf to the Search Head / SHC layer for search-time field extraction.
# - If you later define event breaking or timestamp parsing for indexing behavior,
#   that portion belongs on the parsing tier, such as indexers or heavy forwarders.
#

################################################################################
# Splunk Upgrade Operational Logs
################################################################################

[splunk_upgrade]

# Logs are written as one event per line.
# This helps prevent multiline merging if Splunk ever gets confused by quoted text.
SHOULD_LINEMERGE = false

# Timestamp is at the beginning of each event:
# 2026-05-23 17:52:34
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 19

# Extract key=value fields automatically.
# Handles quoted fields like:
# message="Upgrade state file written successfully."
# installer_name="splunkforwarder-10.5.5.msi"
# installer_hash="03BC5FA..."
KV_MODE = auto
