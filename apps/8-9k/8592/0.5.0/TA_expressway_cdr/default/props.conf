
[cisco_expressway_syslog]

SHOULD_LINEMERGE = False
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3Q%z

# by default this sourcetype allows timestamps
# of up to five years in the past.
MAX_DAYS_AGO = 1825
TRANSFORMS-cdr = get_mediastats_details_field_as_json, get_cdr_details_field_as_json, make_syslog_cdr_source_alias, make_syslog_cdr_destination_alias,make_call_id_index_time
TRANSFORMS-non-cdr = make_syslog_party_number_index_time, extract_expressway_device_name_and_call_id, extract_call_serial_number_1, extract_call_serial_number_2,make_call_id_index_time
ANNOTATE_PUNCT = false
pulldown_type = true


[cisco_expressway_cdr_csv]
SHOULD_LINEMERGE = False
TIME_FORMAT = %Y-%m-%d %H:%M:%S.%6Q
# 215 ballpark to the end of the starttime, but we pad.
MAX_TIMESTAMP_LOOKAHEAD = 400
BREAK_ONLY_BEFORE_DATE = False

INDEXED_EXTRACTIONS = csv

# by default this sourcetype allows timestamps
# of up to five years in the past.
MAX_DAYS_AGO=1825

# parses the sip strings to get party numbers and devices.
TRANSFORMS-idxfields = make_callingPartyNumber_index_time,make_calledPartyNumber_index_time,make_origDeviceName_index_time,make_destDeviceName_index_time

ANNOTATE_PUNCT = false
initCrcLength = 500
pulldown_type = true


[cisco_expressway_cdr_json]
SHOULD_LINEMERGE = False
TIME_FORMAT = "%Y-%m-%d %H:%M:%S.%6Q
# 215 ballpark to the end of the starttime, but we pad.
MAX_TIMESTAMP_LOOKAHEAD = 400
BREAK_ONLY_BEFORE_DATE = False

INDEXED_EXTRACTIONS = JSON

# by default this sourcetype allows timestamps
# of up to five years in the past.
MAX_DAYS_AGO=1825
# TBD - how to parse the json in the 'details' field.
#TRANSFORMS-details-extractions = cisco_expressway_cdr_csv_details
ANNOTATE_PUNCT = false


pulldown_type = true

