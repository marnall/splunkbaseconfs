
[extract_expressway_device_name_and_call_id]
REGEX = Call-ID=([\w\-_]+)@([^\s",]+)
FORMAT = call_id::$1 origDeviceName::$2 device_name::$2
WRITE_META = true

[make_syslog_party_number_index_time]
REGEX = To=(?:sip:)?(\d+)@([^\s",]+)
FORMAT = calledPartyNumber::$1 destDeviceName::$2 device_name::$2
WRITE_META = true

[get_cdr_details_field_as_json]
REGEX = "Call Detail Record"\s+Data: {.*?details':\s'(.+}})',
FORMAT = details::$1
WRITE_META = true

[get_mediastats_details_field_as_json]
REGEX = Event="MediaStats" call_serial_number="[^\"]+" Details="({.+})" UTCTime=
FORMAT = details::$1
WRITE_META = true

[make_call_id_index_time]
INGEST_EVAL = call_id = case(isnotnull(call_serial_number), call_serial_number, isnotnull(spath(details, "Call.BoxSerialNumber")), spath(details, "Call.BoxSerialNumber"), isnotnull(Call_ID),  null())

[make_syslog_cdr_source_alias]
INGEST_EVAL = sourceAlias = spath(details, "Call.SourceAlias"), callingPartyNumber = if(match(sourceAlias, "@"),replace(replace(sourceAlias,"^sip:", ""), "@([^,\s]+)$", ""), ""), origDeviceName = if(match(sourceAlias, "@"),replace(sourceAlias,"^sip:(\d+)?@?", ""), ""), device_name=mvappend(origDeviceName,device_name)


[make_syslog_cdr_destination_alias]
INGEST_EVAL = destinationAlias = spath(details, "Call.DestinationAlias"), calledPartyNumber = if(match(destinationAlias, "@"),replace(replace(destinationAlias,"^sip:", ""), "@([^,\s]+)$", ""), ""), destDeviceName = if(match(destinationAlias, "@"),replace(destinationAlias,"^sip:(\d+)?@?", ""), ""),  device_name=mvappend(destDeviceName,device_name)






#just in the normal syslog portion of MediaStats events
[extract_call_serial_number_1]
REGEX = \scall_serial_number="([\w-]+)"
FORMAT = call_id::$1
WRITE_META = true

# from the call detail record
[extract_call_serial_number_2]
REGEX = "BoxSerialNumber": "([\w-]+)"
FORMAT = call_id::$1
WRITE_META = true

# TODO - this one is for the non-CDR syslog events, but it isn't working.
# There is the "Call_ID" autokv'ed but this one never matches.....
[extract_call_serial_number_3]
REGEX = \sCall-ID=([\w\-\@\.\:]+),
FORMAT = call_id::$1
WRITE_META = true






[make_callingPartyNumber_index_time]
INGEST_EVAL = callingPartyNumber = replace(source_alias, "sip:([^@]+)@([^,]+)", "\1")

[make_origDeviceName_index_time]
INGEST_EVAL = origDeviceName = replace(source_alias, "sip:([^@]+)@([^,]+)", "\2"), device_name = mvappend(origDeviceName,device_name)

[make_calledPartyNumber_index_time]
INGEST_EVAL = calledPartyNumber = replace(destination_alias, "sip:([^@]+)@([^,]+)", "\1")

[make_destDeviceName_index_time]
INGEST_EVAL = destDeviceName = replace(destination_alias, "sip:([^@]+)@([^,]+)", "\2"), device_name = mvappend(destDeviceName, device_name)

