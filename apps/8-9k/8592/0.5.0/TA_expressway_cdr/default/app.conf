[id]
name = TA_expressway_cdr
version = 0.5.0


[ui]
is_visible = 0
label = Supporting Add-on for Expressway CDR

[launcher]
author = Sideview, LLC
description =This Supporting Add-on defines index-time settings to ingest the CDR records from Cisco Expressway.  It is to be deployed on your Splunk Indexers (or if you are using a Heavy Forwarder and forwarding cooked data to your indexes, installed on that HF).   It can also be deployed with two other apps on the Splunk Search Head(s) or Search Head Cluster: a) Sideview's Supporting App for Cisco Expressway,  and b) Sideview's commercial "Cisco CDR Reporting and Analytics" app.  With all these pieces in place the Sideview apps on the search head implement a general purpose investigation and reporting solution for this data.  NOTE: if you are trying to use the cisco_expressway_cdr_csv and/or cisco_expressway_cdr_json sourcetypes and not the recommended cisco_expressway_syslog sourcetype, then this app will need to go on the Forwarder Tier. Contact Sideview for any questions here.

version = 0.5.0

[package]
id = TA_expressway_cdr
check_for_updates = 1
show_upgrade_notification = 1

[install]
build = 19



# it is an open question whether this is still needed.  Although it's not formally deprecated, it does
# seem redundant with other newer keys and I don't think appinspect checks for it.
