# EPP Security Events sourcetype
[withsecure:epp:security_event]
SHOULD_LINEMERGE = false
TIME_PREFIX = "persistenceTimestamp"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE = none
INDEXED_EXTRACTIONS = json
category = Security

FIELDALIAS-dest = deviceName AS dest
FIELDALIAS-signature = detectionName AS signature
FIELDALIAS-app = engine AS app
FIELDALIAS-user = userName AS user
FIELDALIAS-src_ip = clientAddress AS src_ip

LOOKUP-epp_vendor_product = withsecure_vendor_product_lookup sourcetype AS sourcetype OUTPUTNEW vendor_product

# BCD Incidents sourcetype
[withsecure:epp:bcd_incident]
SHOULD_LINEMERGE = false
TIME_PREFIX = "updatedTimestamp"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE = none
INDEXED_EXTRACTIONS = json
category = Security

EXTRACT-incidentId = "incidentId"\s*:\s*"(?P<incidentId>[^"]+)"
EXTRACT-incident_id = "incidentId"\s*:\s*"(?P<incident_id>[^"]+)"

FIELDALIAS-dest = affectedDevice AS dest
FIELDALIAS-signature = name AS signature
FIELDALIAS-severity = riskLevel AS severity
FIELDALIAS-ids_type = incidentId AS ids_type
FIELDALIAS-incident_id = incidentId AS incident_id
FIELDALIAS-category = categories{} AS category

# BCD Detections sourcetype
[withsecure:epp:bcd_detection]
SHOULD_LINEMERGE = false
TIME_PREFIX = "(?:detectionTimestamp|createdTimestamp)"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
MAX_TIMESTAMP_LOOKAHEAD = 32
# activityContext can contain large scripts/file contents; default 10 KB truncates
# the JSON before the detectionId field. 1 MB is enough headroom in practice.
TRUNCATE = 1048576
KV_MODE = none
INDEXED_EXTRACTIONS = json
category = Security

EXTRACT-incident_id = "incident_id"\s*:\s*"(?P<incident_id>[^"]+)"

# Endpoint detection CIM mappings
FIELDALIAS-dest = deviceName AS dest
FIELDALIAS-process = processName AS process
FIELDALIAS-process_path = processPath AS process_path
FIELDALIAS-parent_process = parentProcessName AS parent_process

# Cloud detection CIM mappings (from flattened activityContext)
FIELDALIAS-src_ip = ac_caller_ip_address AS src_ip
FIELDALIAS-user = ac_principal_name AS user
FIELDALIAS-mitre_technique_id = ac_mitre_id AS mitre_technique_id
