[msgraph_send_email]
is_custom = 1
label = Send email via Microsoft Graph
description = Sends an email through Microsoft Graph API using app-only auth
payload_format = json
python.version = python3
python.required = 3.9, 3.13

alert.execute.cmd = send_msgraph_email.py
alert.execute.cmd.arg.1 = --execute

ui_renderer = msgraph_send_email

param.tenant_id =
param.tenant_id.label = Entra Tenant ID
param.tenant_id.required = 1

param.client_id =
param.client_id.label = Entra Client ID
param.client_id.required = 1

param.client_secret =
param.client_secret.label = Entra Client Secret
param.client_secret.required = 1

param.sender_user =
param.sender_user.label = Sender mailbox UPN
param.sender_user.required = 1

param.to =
param.to.label = To recipients
param.to.required = 1

param.cc =
param.cc.label = CC recipients
param.cc.required = 0

param.subject = Splunk Alert: $name$
param.subject.label = Subject template
param.subject.required = 1

param.body = The alert condition for '$name$' was triggered.
param.body.label = Body template
param.body.required = 1

param.content_type = HTML
param.content_type.label = Body content type
param.content_type.required = 0
