<form>
  <splunk-control-group label="To" help="Required. Separate multiple recipients with commas.">
    <splunk-text-input name="action.msgraph_send_email.param.to"></splunk-text-input>
  </splunk-control-group>

  <splunk-control-group label="CC" help="Optional. Separate multiple recipients with commas.">
    <splunk-text-input name="action.msgraph_send_email.param.cc"></splunk-text-input>
  </splunk-control-group>

  <splunk-control-group label="Subject" help="Supports Splunk alert tokens.">
    <splunk-text-input name="action.msgraph_send_email.param.subject"></splunk-text-input>
  </splunk-control-group>

  <splunk-control-group label="Message" help="Supports text, HTML, and Splunk alert tokens.">
    <splunk-text-area name="action.msgraph_send_email.param.body"></splunk-text-area>
  </splunk-control-group>


</form>
