# props.conf
#
# Splunk Upgrade App - Index-Time Parsing Configuration
#
# This file defines index-time parsing behavior for Splunk Upgrade App logs.
#
# IMPORTANT:
# These settings should be deployed to the parsing tier:
#
# - Heavy Forwarders: Required if data is parsed there before being sent to indexers
# - Indexers: Required if data is sent directly from Universal Forwarders to indexers
#
# Do NOT deploy these index-time parsing settings only to Search Heads.
# Search Heads should contain search-time knowledge objects such as field
# extractions, aliases, lookups, macros, and dashboards.
#
# Recommended deployment locations:
# - TA-splunk_upgrade_indexer/default/props.conf
# - TA-splunk_upgrade_hf/default/props.conf, if using Heavy Forwarders
#
# Universal Forwarders may receive inputs.conf and scripts, but these parsing
# settings are normally handled by Heavy Forwarders or Indexers.


################################################################################
# Splunk Upgrade App Operational Logs
################################################################################
#
# Sourcetype: splunk_upgrade
#
# Expected format:
# One event per line using UTF-8 encoding.
#
# Expected timestamp format:
# YYYY-MM-DD HH:MM:SS
#
# Example:
# 2026-05-02 14:30:12 host=server01 status=success message="Upgrade complete"

[splunk_upgrade]
CHARSET = UTF-8
NO_BINARY_CHECK = true

# Each line should be treated as a separate event.
SHOULD_LINEMERGE = false

# Break events on newline characters.
LINE_BREAKER = ([\r\n]+)

# Timestamp starts at the beginning of the event.
TIME_PREFIX = ^

# Expected timestamp format: 2026-05-02 14:30:12
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 25


################################################################################
# Splunk Universal Forwarder MSI Installer Logs
################################################################################
#
# Sourcetype: splunk_upgrade_msi
#
# Expected format:
# Windows MSI verbose installer logs.
#
# MSI logs are typically encoded as UTF-16LE.
#
# Events are grouped by MSI logging session, beginning with:
# === Logging started:
#
# Expected timestamp format:
# MM/DD/YYYY  HH:MM:SS
#
# Example:
# === Verbose logging started: 5/2/2026  14:30:12

[splunk_upgrade_msi]
CHARSET = UTF-16LE
NO_BINARY_CHECK = true

# MSI logs are multi-line and should be grouped into larger events.
SHOULD_LINEMERGE = true

# Start a new event when a new MSI logging session begins.
BREAK_ONLY_BEFORE = ^=== Logging started:

# Keep the start/body/stop lines together.
MUST_NOT_BREAK_AFTER = ^=== Logging started:
MUST_NOT_BREAK_BEFORE = ^=== Logging stopped:

# Timestamp is taken from the MSI logging started line.
TIME_PREFIX = ^=== Logging started:\s*
TIME_FORMAT = %m/%d/%Y  %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 25