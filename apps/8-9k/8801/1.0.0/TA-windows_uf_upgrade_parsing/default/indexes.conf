# indexes.conf
#
# Splunk Upgrade App - Example Index Configuration
#
# This app uses a custom index named "splunk_upgrade".
#
# IMPORTANT:
# Review and update the storage paths before enabling this index.
# Many Splunk environments manage index storage through shared volume
# definitions in a separate index management app. If your environment
# already defines Splunk index volumes, use those existing volumes instead
# of creating new ones here.
#
# Deployment guidance:
# - Indexers: Required
# - Heavy Forwarders: Recommended when events are assigned to this index upstream
# - Search Heads: Recommended for index awareness and search-time references
#
# Uncomment and modify one of the examples below as appropriate for your
# environment.

################################################################################
# Example 1: Single volume for hot/warm and cold storage
################################################################################

# [volume:primary]
# path = /opt/splunk/var/lib/splunk
# maxVolumeDataSizeMB = 500000

# [splunk_upgrade]
# homePath   = volume:primary/splunk_upgradedb/db
# coldPath   = volume:primary/splunk_upgradedb/colddb
# thawedPath = $SPLUNK_DB/splunk_upgradedb/thaweddb
# maxTotalDataSizeMB = 50000
# frozenTimePeriodInSecs = 7776000


################################################################################
# Example 2: Tiered storage using separate hot/warm and cold volumes
################################################################################

# [volume:home]
# path = /path/to/fast/storage
# maxVolumeDataSizeMB = 256000
#
# [volume:cold]
# path = /path/to/slower/storage
# maxVolumeDataSizeMB = 4600000

# [splunk_upgrade]
# homePath   = volume:home/splunk_upgradedb/db
# coldPath   = volume:cold/splunk_upgradedb/colddb
# thawedPath = $SPLUNK_DB/splunk_upgradedb/thaweddb
# maxTotalDataSizeMB = 50000
# frozenTimePeriodInSecs = 7776000