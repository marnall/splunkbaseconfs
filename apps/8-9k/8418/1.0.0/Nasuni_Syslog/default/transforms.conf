# Extract common syslog header fields (matches all events)
[extract_syslog_header]
SOURCE_KEY = _raw
REGEX = ^(\w+\s+\d+\s+\d+:\d+:\d+)\s+([\d\.]+)\s+(\d+)\s+([\d\-T:\.+]+)\s+(\S+)\s+(\S+)\s+(\d+)\s+(\d+)
FORMAT = syslog_timestamp::$1 syslog_host::$2 syslog_priority::$3 iso_timestamp::$4 hostname::$5 app_name::$6 pid::$7 message_id::$8
WRITE_META = true

# Extract and parse JSON payload at index time (only when JSON present)
[extract_json_kv]
SOURCE_KEY = _raw
REGEX = -\s+\{(.+)\}$
FORMAT = _json::"{$1}"
WRITE_META = true

# Extract antivirus scan fields (only when pattern matches)
[extract_antivirus]
SOURCE_KEY = _raw
REGEX = Antivirus scan (\w+) for volume ([^:]+):\s+(.+)$
FORMAT = scan_status::$1 volume::$2 scan_reason::$3
WRITE_META = true

# Antivirus flagged file(s)
[extract_antivirus_flagged]
SOURCE_KEY = _raw
REGEX = ^\w+\s+\d+\s+\d+:\d+:\d+\s+[\d\.]+\s+\d+\s+[\d\-T:\.+]+\s+([\w\-\.]+)\s+([\w\.\-]+)\s+\d+\s+\d+\s+-\s+Antivirus has flagged file\(s\) on volume\s+(\S+)
FORMAT = hostname::$1 process::$2 volume::$3
WRITE_META = true

# Ransomware attack detection
[extract_ransomware_attack]
SOURCE_KEY = _raw
REGEX = ^\w+\s+\d+\s+\d+:\d+:\d+\s+[\d\.]+\s+\d+\s+[\d\-T:\.+]+\s+([\w\-\.]+)\s+([\w\.\-]+)\s+\d+\s+\d+\s+-\s+The Filer has detected a new ransomware attack from user\s+([^\s]+)\s+\(([\d\.]+)\)\s+on volume\s+(\S+)\.\s+Detected known signatures:\s+\(([^\)]+)\)\.\s+Confidence level at the time of detection was "[\w\s]+\((\d+)\)"
FORMAT = hostname::$1 process::$2 username::$3 client_ip::$4 volume::$5 signatures::$6 confidence_level::$7
WRITE_META = true

# Mitigation policy enforced / IP blocked
[extract_mitigation_policy]
SOURCE_KEY = _raw
REGEX = ^\w+\s+\d+\s+\d+:\d+:\d+\s+[\d\.]+\s+\d+\s+[\d\-T:\.+]+\s+([\w\-\.]+)\s+([\w\.\-]+)\s+\d+\s+\d+\s+-\s+The Filer has enforced the mitigation policy on volume\s+(\S+)\s+and blocked an IP Address\s+\(([\d\.]+)\).*href="([^"]+)"
FORMAT = hostname::$1 process::$2 volume::$3 client_ip::$4 url::$5
WRITE_META = true

# Mitigation policy enforced / User blocked
[extract_mitigation_policy_user]
SOURCE_KEY = _raw
REGEX = ^\w+\s+\d+\s+\d+:\d+:\d+\s+[\d\.]+\s+\d+\s+[\d\-T:\.+]+\s+([\w\-\.]+)\s+([\w\.\-]+)\s+\d+\s+\d+\s+-\s+The Filer has enforced the mitigation policy on volume\s+(\S+)\s+and blocked a user\s+\(([^\)]+)\).*href="([^"]+)"
FORMAT = hostname::$1 process::$2 volume::$3 username::$4 url::$5
WRITE_META = true

# Extract snapshot fields (only when pattern matches)
[extract_snapshot]
SOURCE_KEY = _raw
REGEX = Snapshot completed for volume ([^,]+), version (\d+):\s+(\d+) objects succeeded,\s+(\d+) objects failed,\s+(\d+) objects skipped
FORMAT = volume::$1 snapshot_version::$2 objects_succeeded::$3 objects_failed::$4 objects_skipped::$5
WRITE_META = true

# Catch-all: extract everything after the dash as "message" for all events
[extract_generic_message]
SOURCE_KEY = _raw
REGEX = -\s+(.+)$
FORMAT = message::$1
WRITE_META = true
