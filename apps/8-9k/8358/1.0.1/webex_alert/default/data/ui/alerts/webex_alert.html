<form class="form-horizontal form-complex">
    <div class="control-group">
        <label class="control-label" for="webex_alert_bot_token">Bot Token</label>
        <div class="controls">
            <input type="password" name="action.webex_alert.param.bot_token" id="webex_alert_bot_token" />
            <span class="help-block">Your Webex Bot Token</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="webex_alert_room_id">Room Name or ID</label>
        <div class="controls">
            <input type="text" name="action.webex_alert.param.room_id" id="webex_alert_room_id" placeholder="My Alert Room" />
            <span class="help-block">The Webex Room/Space name (e.g., "Security Alerts") or Room ID</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="webex_alert_message">Message</label>
        <div class="controls">
            <textarea name="action.webex_alert.param.message" id="webex_alert_message" rows="4"></textarea>
            <span class="help-block">Message to send (use $result.field$ for tokens)</span>
        </div>
    </div>
    <div class="control-group">
        <label class="control-label" for="webex_alert_message_type">Message Type</label>
        <div class="controls">
            <select name="action.webex_alert.param.message_type" id="webex_alert_message_type">
                <option value="text" selected>Plain Text</option>
                <option value="markdown">Markdown</option>
            </select>
        </div>
    </div>
</form>
