#
# Aviatrix Security - Search Macros
#

#############################################
# Base Data Access Macros
#############################################

[aviatrix_index]
definition = index=main
iseval = 0

[aviatrix_firewall]
definition = `aviatrix_index` (sourcetype="aviatrix:firewall:l4" OR sourcetype="aviatrix:firewall:l7" OR sourcetype="aviatrix:firewall:fqdn")
iseval = 0

[aviatrix_l4]
definition = `aviatrix_index` sourcetype="aviatrix:firewall:l4"
iseval = 0

[aviatrix_l7]
definition = `aviatrix_index` sourcetype="aviatrix:firewall:l7"
iseval = 0

[aviatrix_fqdn]
definition = `aviatrix_index` sourcetype="aviatrix:firewall:fqdn"
iseval = 0

[aviatrix_ids]
definition = `aviatrix_index` sourcetype="aviatrix:ids"
iseval = 0

[aviatrix_gateway_network]
definition = `aviatrix_index` sourcetype="aviatrix:gateway:network"
iseval = 0

[aviatrix_gateway_system]
definition = `aviatrix_index` sourcetype="aviatrix:gateway:system"
iseval = 0

[aviatrix_audit]
definition = `aviatrix_index` sourcetype="aviatrix:controller:audit"
iseval = 0

#############################################
# Filtered Macros
#############################################

[aviatrix_blocked]
definition = `aviatrix_firewall` (action="DENY" OR action="Deny" OR action="blocked")
iseval = 0

[aviatrix_allowed]
definition = `aviatrix_firewall` (action="PERMIT" OR action="Permit" OR action="allowed")
iseval = 0

[aviatrix_ids_alerts]
definition = `aviatrix_ids` event_type="alert"
iseval = 0

#############################################
# CIM-Compatible Macros
#############################################

[aviatrix_network_traffic]
definition = `aviatrix_firewall` | eval src=coalesce(src_ip, src, sip), dest=coalesce(dst_ip, dest, dip), action=case(action=="PERMIT" OR action=="Permit" OR state=="MATCHED", "allowed", action=="DENY" OR action=="Deny", "blocked", 1=1, action)
iseval = 0

[aviatrix_intrusion_detection]
definition = `aviatrix_ids` event_type="alert" | eval src=src_ip, dest=dest_ip, vendor_product="Aviatrix IDS (Suricata)", ids_type="network"
iseval = 0

#############################################
# Utility Macros
#############################################

[aviatrix_private_ip(1)]
args = field
definition = match($field$, "^10\.|^172\.(1[6-9]|2[0-9]|3[0-1])\.|^192\.168\.|^100\.64\.")
iseval = 0

[aviatrix_duration_format(1)]
args = duration_seconds
definition = strftime($duration_seconds$, "%H:%M:%S")
iseval = 0

[aviatrix_bytes_format(1)]
args = bytes
definition = case($bytes$ >= 1073741824, round($bytes$/1073741824, 2)." GB", $bytes$ >= 1048576, round($bytes$/1048576, 2)." MB", $bytes$ >= 1024, round($bytes$/1024, 2)." KB", 1=1, $bytes$." B")
iseval = 0
