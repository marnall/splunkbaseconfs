# ================================================================
# ASGER PAM — Transforms (CEF & LEEF header + KV extraction)
# ================================================================

# ── CEF Header ──
[asger_cef_header]
REGEX = CEF:\d+\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|(.*)
FORMAT = cef_vendor::$1 cef_product::$2 cef_version::$3 cef_event_class::$4 cef_event_name::$5 cef_severity::$6 cef_extensions::$7

# ── CEF Key-Value Pairs ──
[asger_cef_kv]
REGEX = (?:^|\s)(\w+)=([^\s=]+(?:\s+[^\s=]+=)?)
FORMAT = $1::$2
REPEAT_MATCH = true
SOURCE_KEY = cef_extensions
CLEAN_KEYS = true

# ── LEEF Header ──
[asger_leef_header]
REGEX = LEEF:[\d.]+\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|
FORMAT = leef_vendor::$1 leef_product::$2 leef_version::$3 leef_event_id::$4

# ── LEEF Key-Value Pairs (tab-separated) ──
[asger_leef_kv]
REGEX = (?:^|\t)(\w+)=([^\t]*)
FORMAT = $1::$2
REPEAT_MATCH = true
CLEAN_KEYS = true

# ── Lookup: Event Severity Mapping ──
[asger_severity_lookup]
filename = asger_event_severity.csv
match_type = WILDCARD(event_type)

# ── Lookup: Protocol to Service ──
[asger_protocol_lookup]
filename = asger_protocol_service.csv
