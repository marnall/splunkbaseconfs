# ================================================================
# ASGER PAM — Splunk Props Configuration
# Handles JSON and CEF sourcetypes from ASGER PAM syslog forwarder
# v4.0.1 — Fixes: SEDCMD regex, CIM alias conflicts, self-ref aliases
# ================================================================

# ── JSON sourcetype (recommended) ──────────────────────────
[asger:pam]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = \"timestamp\"\s*:\s*\"
MAX_TIMESTAMP_LOOKAHEAD = 26
TRUNCATE = 65535
CHARSET = UTF-8
category = Security
description = ASGER PAM Privileged Access Management (JSON)

# JSON auto-extraction
KV_MODE = json

# Syslog header strip — handles both RFC5424 raw and BSD-rewritten formats
# RFC5424 raw:  <134>1 2026-04-29T15:53:42 ASGER public workspace - {...}
# BSD rewrite:  May 12 15:53:42 10.25.10.253 1 2026-04-29T15:53:42 ASGER public workspace - {...}
SEDCMD-strip_syslog_header = s/^.*?\s-\s\{/{/

# Field aliases for Splunk CIM compliance
# NOTE: CIM aliases must NOT overwrite original ASGER fields used by dashboards.
#       Original "action" (connect/disconnect/retrieve/rotate) is used in all dashboard queries.
#       Original "user" is the login user; privileged_account is the target credential.
FIELDALIAS-user_for_cim = user AS src_user
FIELDALIAS-src_ip_for_cim = src_ip AS src
FIELDALIAS-target_for_cim = target_host AS dest
FIELDALIAS-target_name_for_cim = target_hostname AS dest_name
FIELDALIAS-target_port_for_cim = target_port AS dest_port
FIELDALIAS-protocol_for_cim = protocol AS transport
FIELDALIAS-privileged_for_cim = privileged_account AS dest_user
FIELDALIAS-action_cim = action AS vendor_action
FIELDALIAS-outcome_cim = outcome AS result
FIELDALIAS-auth_method_cim = auth_method AS authentication_method
FIELDALIAS-device_action_cim = device_action AS vendor_product_action

# Calculated fields
EVAL-app = "asger_pam"
EVAL-vendor = "SOBE YAZILIM"
EVAL-product = "ASGER PAM"
EVAL-dest_port = if(isnotnull(target_port), tonumber(target_port), null())
EVAL-duration = case(isnotnull(session_duration), round(tonumber(session_duration), 2), isnotnull(duration_ms), round(tonumber(duration_ms)/1000, 2))
EVAL-session_duration_min = if(isnotnull(session_duration), round(tonumber(session_duration)/60, 1), null())
EVAL-bytes_total = if(isnotnull(bytes_in), tonumber(bytes_in)+tonumber(bytes_out), null())
EVAL-signature = event_type
EVAL-signature_id = event_type
EVAL-severity = case(outcome=="success", "informational", outcome=="failure", "high", 1==1, "medium")

# ── CEF sourcetype ─────────────────────────────────────────
[asger:pam:cef]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = ^<\d+>\d?\s*
MAX_TIMESTAMP_LOOKAHEAD = 26
TRUNCATE = 65535
CHARSET = UTF-8
category = Security
description = ASGER PAM Privileged Access Management (CEF)

# CEF key-value extraction
REPORT-cef_header = asger_cef_header
REPORT-cef_extensions = asger_cef_kv

FIELDALIAS-cef_suser = suser AS src_user
FIELDALIAS-cef_src = src AS cef_src_ip
FIELDALIAS-cef_dst = dst AS dest
FIELDALIAS-cef_dhost = dhost AS dest_name
FIELDALIAS-cef_dpt = dpt AS dest_port
FIELDALIAS-cef_proto = proto AS transport
FIELDALIAS-cef_duser = duser AS dest_user
FIELDALIAS-cef_act = act AS vendor_action
FIELDALIAS-cef_externalId = externalId AS session_id
FIELDALIAS-cef_outcome = outcome AS result

EVAL-app = "asger_pam"
EVAL-vendor = "SOBE YAZILIM"
EVAL-product = "ASGER PAM"
EVAL-signature = cef_event_class
EVAL-signature_id = cef_event_class

# ── LEEF sourcetype ─────────────────────────────────────────
[asger:pam:leef]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = devTime=
MAX_TIMESTAMP_LOOKAHEAD = 26
TRUNCATE = 65535
CHARSET = UTF-8
category = Security
description = ASGER PAM Privileged Access Management (LEEF)

REPORT-leef_header = asger_leef_header
REPORT-leef_extensions = asger_leef_kv

FIELDALIAS-leef_user = usrName AS src_user
FIELDALIAS-leef_account = accountName AS dest_user
FIELDALIAS-leef_src = src AS leef_src_ip
FIELDALIAS-leef_dst = dst AS dest
FIELDALIAS-leef_dstname = dstName AS dest_name
FIELDALIAS-leef_dstport = dstPort AS dest_port
FIELDALIAS-leef_proto = proto AS transport
FIELDALIAS-leef_session = externalId AS session_id
FIELDALIAS-leef_action = action AS vendor_action
FIELDALIAS-leef_outcome = outcome AS result

EVAL-app = "asger_pam"
EVAL-vendor = "SOBE YAZILIM"
EVAL-product = "ASGER PAM"
