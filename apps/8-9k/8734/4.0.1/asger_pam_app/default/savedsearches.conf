# ================================================================
# ASGER PAM — Saved Searches, Alerts & Reports
# v4.0.1 — Updated field names, new HSM/SAML/Session alerts
# ================================================================

# ── SECURITY ALERTS ─────────────────────────────────────────

[ASGER - Brute Force Login Detection]
description = Detects more than 5 failed login attempts from the same source IP within 5 minutes.
search = `asger_auth` outcome="failure" | stats count by src_ip, user | where count > 5
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 15m
alert.suppress.fields = src_ip
enableSched = 1
disabled = 1

[ASGER - SAML Authentication Failure]
description = Detects failed SAML SSO callback attempts — possible IdP misconfiguration or attack.
search = `asger_auth` event_type="saml_callback" outcome="failure" | stats count by src_ip, tenant | where count > 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */15 * * * *
alert.severity = 4
enableSched = 1
disabled = 1

[ASGER - Privileged Session to Unusual Target]
description = Alerts when a privileged session connects to a target not seen in the last 30 days.
search = `asger_sessions` event_type="*connected*" outcome="success" | stats earliest(_time) as first_seen by user, privileged_account, target_host, protocol | where first_seen > relative_time(now(), "-1h")
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 * * * *
alert.severity = 5
enableSched = 1
disabled = 1

[ASGER - Password Rotation Failure]
description = Alerts on any failed password rotation operation.
search = `asger_vault` event_type="*rotation*" outcome="failure" | table _time, user, resource_name, reason
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */15 * * * *
alert.severity = 4
enableSched = 1
disabled = 1

[ASGER - Policy Change Detection]
description = Detects any security policy modification (create, update, delete).
search = `asger_admin` audit_type="policy" | table _time, user, event_type, action, outcome
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */15 * * * *
alert.severity = 3
enableSched = 1
disabled = 1

[ASGER - HSM Critical Operation]
description = Alerts on any HSM cryptographic operation (enable, disable, key generation, mode change, config delete).
search = `asger_admin` event_type="hsm_*" event_type!="hsm_test_*" | table _time, user, event_type, outcome, src_ip
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
alert.severity = 5
enableSched = 1
disabled = 1

[ASGER - Vault Mass Access Alert]
description = Alerts when a single user accesses more than 10 vault records within 10 minutes.
search = `asger_vault` (event_type="*unlock*" OR event_type="*copy*" OR event_type="*reveal*") | stats dc(resource_name) as unique_records count by user, src_ip | where unique_records > 10
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */10 * * * *
alert.severity = 5
enableSched = 1
disabled = 1

[ASGER - Vault Export via Connector]
description = Alerts when vault records are exported through the connector (data exfiltration risk).
search = `asger_vault` event_type="vault_record_create" action="export" | table _time, user, src_ip, tenant
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 * * * *
alert.severity = 4
enableSched = 1
disabled = 1

[ASGER - After-Hours Session Activity]
description = Detects session connections outside business hours (before 07:00 or after 20:00).
search = `asger_sessions` event_type="*connected*" outcome="success" | eval hour=strftime(_time, "%H") | where hour < 7 OR hour > 20 | table _time, user, privileged_account, target_host, protocol, session_origin
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 * * * *
alert.severity = 3
enableSched = 1
disabled = 1

[ASGER - JIT Access Request Denied]
description = Detects JIT workflow requests that were denied or expired.
search = `asger_workflow` (device_action="deny" OR device_action="expire") | table _time, user, resource_name, reason, device_action
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 * * * *
alert.severity = 3
enableSched = 1
disabled = 1

[ASGER - Audit Log Integrity Alert]
description = Checks for events with missing or empty integrity hash (potential log tampering).
search = `asger_events` (NOT hash_log=* OR hash_log="") | table _time, user, event_type, audit_type, src_ip
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 6 * * *
alert.severity = 5
enableSched = 1
disabled = 1

[ASGER - Concurrent Multi-Origin Sessions]
description = Detects same user with active sessions from different origins (web + connector) simultaneously.
search = `asger_sessions` event_type="*connected*" outcome="success" | stats dc(session_origin) as origin_count, values(session_origin) as origins by user | where origin_count > 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 * * * *
alert.severity = 3
enableSched = 1
disabled = 1

# ── REPORTS ─────────────────────────────────────────────────

[ASGER - Daily Session Summary]
description = Daily summary of all privileged sessions grouped by user, protocol, and target.
search = `asger_sessions` event_type="*connected*" outcome="success" | stats count as sessions, dc(target_host) as unique_targets, values(protocol) as protocols by user, privileged_account | sort -sessions
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1
disabled = 1

[ASGER - Daily Session Duration Report]
description = Daily report of session durations — longest, average, total per user.
search = `asger_sessions` event_type="*disconnect*" session_duration>0 | eval duration_min=round(session_duration/60,1) | stats avg(duration_min) as avg_min, max(duration_min) as max_min, sum(duration_min) as total_min, count as sessions by user, protocol | eval avg_min=round(avg_min,1), total_hr=round(total_min/60,1) | sort -total_min | table user, protocol, sessions, avg_min, max_min, total_hr
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1
disabled = 1

[ASGER - Weekly Vault Access Report]
description = Weekly report of all vault credential access by user.
search = `asger_vault` (event_type="*unlock*" OR event_type="*copy*" OR event_type="*checkout*") | stats count as access_count, dc(resource_name) as unique_records, values(action) as actions by user | sort -access_count
dispatch.earliest_time = -7d
dispatch.latest_time = now
cron_schedule = 0 9 * * 1
enableSched = 1
disabled = 1

[ASGER - Monthly Compliance Report]
description = Monthly compliance summary: event counts, unique users, protocols, auth methods per audit type.
search = `asger_events` | stats count as total_events, dc(user) as unique_users, dc(target_host) as unique_targets, dc(protocol) as protocols, dc(auth_method) as auth_methods by audit_type | sort audit_type
dispatch.earliest_time = -30d
dispatch.latest_time = now
cron_schedule = 0 9 1 * *
enableSched = 1
disabled = 1
