# ================================================================
# ASGER PAM — Search Macros (v4.0.1)
# Updated to cover ALL backend audit_type values
# ================================================================

[asger_index]
definition = index=asger_pam OR index=main
description = Index containing ASGER PAM events. Override in local/macros.conf.
iseval = 0

[asger_sourcetype]
definition = sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef"
description = All ASGER PAM sourcetypes (JSON + CEF + LEEF)
iseval = 0

[asger_events]
definition = `asger_index` `asger_sourcetype`
description = Base search for all ASGER PAM events
iseval = 0

[asger_sessions]
definition = `asger_events` (audit_type="workspace" OR audit_type="connector")
description = All session-related ASGER PAM events
iseval = 0

[asger_auth]
definition = `asger_events` (audit_type="login" OR audit_type="mobile")
description = All authentication ASGER PAM events (including mobile)
iseval = 0

[asger_vault]
definition = `asger_events` audit_type="vault"
description = All vault access ASGER PAM events
iseval = 0

[asger_admin]
definition = `asger_events` (audit_type="administration" OR audit_type="policy" OR audit_type="system" OR audit_type="inventory")
description = All administrative ASGER PAM events
iseval = 0

[asger_workflow]
definition = `asger_events` audit_type="workflow"
description = All workflow/JIT ASGER PAM events
iseval = 0

[asger_automation]
definition = `asger_events` audit_type="automation"
description = All SafExec/pipeline automation ASGER PAM events
iseval = 0

[asger_hook]
definition = `asger_events` audit_type="hook"
description = All hook policy and quorum ASGER PAM events
iseval = 0

[asger_fabric]
definition = `asger_events` audit_type="fabric"
description = All fabric/ZTNA infrastructure ASGER PAM events
iseval = 0

[asger_connector]
definition = `asger_events` audit_type="connector"
description = All connector lifecycle events (auth, fleet, posture)
iseval = 0

[asger_time(1)]
args = span
definition = `asger_events` earliest=-$span$ latest=now
description = ASGER events within a time span (e.g. 24h, 7d)
iseval = 0
