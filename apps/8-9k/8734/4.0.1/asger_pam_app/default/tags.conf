# ================================================================
# ASGER PAM — CIM Tags (Authentication, Change, Network Sessions)
# ================================================================

# Authentication data model
[eventtype=asger_authentication]
authentication = enabled

[eventtype=asger_authentication_success]
authentication = enabled
default = enabled

[eventtype=asger_authentication_failure]
authentication = enabled

# Network Sessions data model
[eventtype=asger_session_start]
network = enabled
session = enabled
start = enabled

[eventtype=asger_session_end]
network = enabled
session = enabled
end = enabled

[eventtype=asger_session_all]
network = enabled
session = enabled

# Change data model
[eventtype=asger_change]
change = enabled

[eventtype=asger_policy_change]
change = enabled
audit = enabled
