# ================================================================
# ASGER PAM — Event Type Classification (CIM-aligned)
# v4.0.1 — Updated to match actual backend event_type values
# ================================================================

# ── Authentication Events ──
[asger_authentication]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") (audit_type="login" OR audit_type="mobile")

[asger_authentication_success]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") (audit_type="login" OR audit_type="mobile") outcome="success"

[asger_authentication_failure]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") (audit_type="login" OR audit_type="mobile") outcome="failure"

# ── Session Events ──
[asger_session_start]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") (audit_type="workspace" OR audit_type="connector") (action="connect" OR event_type="*connected*" OR event_type="*start*" OR event_type="*init*" OR event_type="*created*")

[asger_session_end]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") (audit_type="workspace" OR audit_type="connector") (action="disconnect" OR event_type="*disconnect*" OR event_type="*end*")

[asger_session_all]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") (audit_type="workspace" OR audit_type="connector")

# ── Vault Events ──
[asger_vault_access]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") audit_type="vault"

[asger_vault_credential_retrieve]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") audit_type="vault" (action="retrieve" OR action="copy" OR event_type="*unlock*" OR event_type="*copy*" OR event_type="*reveal_secret*")

[asger_vault_rotation]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") audit_type="vault" (action="rotate" OR event_type="*rotation*")

# ── Administrative Changes ──
[asger_change]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") (audit_type="administration" OR audit_type="policy" OR audit_type="system" OR audit_type="inventory")

[asger_policy_change]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") audit_type="policy"

# ── Workflow Events ──
[asger_workflow]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") audit_type="workflow"

# ── Connector / ZTNA Events ──
[asger_connector]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") audit_type="connector"

# ── Automation / SafExec Events ──
[asger_automation]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") audit_type="automation"

# ── Hook Policy Events ──
[asger_hook]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") audit_type="hook"

# ── Fabric / ZTNA Infrastructure Events ──
[asger_fabric]
search = (sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef") audit_type="fabric"

# ── All ASGER PAM Events ──
[asger_all]
search = sourcetype="asger:pam" OR sourcetype="asger:pam:cef" OR sourcetype="asger:pam:leef"
