[STEALTHbits]
EXTRACT-FILE_PATHS = DistinguishedName\=(?<file_path>.*)\\(?<file_name>[^\t]*)
EXTRACT-event_id = [STEALTHbits Activity Monitor|StealthINTERCEPT] - (?P<event_id>[^\-]+)\s\-
EVAL-action = case(like(event_id, "%Delete%"), "deleted", like(event_id, "%Create%"), "created", like(event_id, "%Modified"), "modified", like(event_id, "%disabled"), "modified", like(event_id, "%enabled"), "modified", like(event_id, "%Update%"), "modified", like(event_id, "%Read"), "read", like(event_id, "%Rename"), "modified", event_id == "Windows File System Access Rights Change", "acl_modified", event_id == "Windows File System Attribute Change", "modified", event_id == "Windows File System Rename", "modified")
EVAL-change_type = case(like(event_id, "Active Directory%"), "AD", like(event_id, "%File%"), "filesystem")
EVAL-dvc = coalesce(Server,ServerAddress)
EVAL-dest = coalesce(Server, ServerAddress)
EVAL-src = coalesce(Server, ServerAddress)
EVAL-status = case(SuccessfulChange == "True", "success", SuccessfulChange == "False", "failure")
EVAL-vendor_product = "STEALTHbits StealthINTERCEPT"
FIELDALIAS-STEALTHbits_CIM = _time AS file_create_time DistinguishedName AS object DistinguishedName AS object_path Perpetrator AS user Perpetrator AS user_name

