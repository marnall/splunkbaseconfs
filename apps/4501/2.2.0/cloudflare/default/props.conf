[mailstream]

KV_MODE = json
SHOULD_LINEMERGE=false
#DATETIME_CONFIG = NONE
MAX_TIMESTAMP_LOOKAHEAD = 0
TIME_PREFIX="ts"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
description = JavaScript Object Notation format. For more information, visit http://json.org/
disabled = false


FIELDALIAS - alert_id_to_xref = alert_id AS xref 
EVAL-signature_extra = tostring('alert_reasons{}') 
FIELDALIAS - final_disposition_to_src_user_domain = final_disposition AS src_user_domain 
FIELDALIAS - from_to_src = from AS src 
FIELDALIAS - message_id_to_message_id = message_id AS message_id 
FIELDALIAS - smtp_helo_server_name_to_orig_src = smtp_helo_server_name AS orig_src 
FIELDALIAS - subject_to_subject = subject AS subject 
FIELDALIAS - ts_to_message_info = ts AS message_info
EVAL-recipient = tostring('envelope_to{}')










