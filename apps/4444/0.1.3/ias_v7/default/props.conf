[ias]
TRANSFORMS-ias = windows-adiscon-strip-header
REPORT-0-ias = ias-header, ias-header-2, ias-message
REPORT-9-ias = ias-attr-25, ias-attr-5, ias-attr-6, ias-attr-7, ias-attr-8, ias-attr-9, ias-attr-10, ias-attr-11, ias-attr-12, ias-attr-13, ias-attr-14, ias-attr-15, ias-attr-16, ias-attr-18, ias-attr-19, ias-attr-20, ias-attr-26, ias-attr-27, ias-attr-28, ias-attr-29, ias-attr-30, ias-attr-31, ias-attr-32, ias-attr-40, ias-attr-41, ias-attr-42, ias-attr-43, ias-attr-44, ias-attr-45, ias-attr-46, ias-attr-47, ias-attr-48, ias-attr-49, ias-attr-50, ias-attr-51, ias-attr-55, ias-attr-61, ias-attr-62, ias-attr-64, ias-attr-65, ias-attr-66, ias-attr-67, ias-attr-68, ias-attr-75, ias-attr-76, ias-attr-77, ias-attr-78, ias-attr-81, ias-attr-82, ias-attr-83, ias-attr-85, ias-attr-87, ias-attr-4108, ias-attr-4116, ias-attr-4127, ias-attr-4128, ias-attr-4129, ias-attr-4130, ias-attr-4136, ias-attr-4142, ias-attr-4149, ias-attr-4120, ias-attr-4121, ias-attr-4134, ias-attr-4135, ias-attr-4142, ias-attr-4143, ias-attr-4147, ias-attr-4148, ias-attr-4150, ias-attr-4151, ias-attr-4152, ias-attr-4153, ias-attr-5000


LOOKUP-servicetype = ias_servicetype "ias_attr_6" OUTPUT "Service_Type"
LOOKUP-reason = ias_reasoncode "Reason_Code" OUTPUT "reason"
LOOKUP-packettype = ias_packettype "ias_attr_4136" OUTPUT "Packet_Type",action
LOOKUP-vendor = ias_enterprise_numbers vendor_id as nas_manufacturer OUTPUT vendor


# Misc. aAliases for Common Information Model
TRANSFORMS-app = ias_app
FIELDALIAS-srcip = Client_IP_Address as src_ip
FIELDALIAS-src = Client_IP_Address as src
FIELDALIAS-dvchost = nas_identifier as dvc_host
FIELDALIAS-dvcip = NAS_IP_Address as dvc_ip
FIELDALIAS-rule = Policy_Name as rule



