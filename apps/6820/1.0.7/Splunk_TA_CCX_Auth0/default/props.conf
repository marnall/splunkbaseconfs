[auth0]
KV_MODE = none
INDEXED_EXTRACTIONS = json
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
category = Structured
description = CCX Auth0 JSON
disabled = false
pulldown_type = true

EVAL-action = if(isnull('action') OR NOT ('data.type'=="w" AND like('data.description', "%This is not supported%")), case(like('data.description', "Update%"), "updated", like('data.description', "Delete%"), "deleted", like('data.description', "Create%"), "created", like('data.description', "Assign%") OR like('data.description', "Remove%") OR 'data.description'IN ("Configure a new custom domain", "Deploy an action"), "modified", 'data.description'=="Verify a custom domain", "read", ('data.type'=="w" AND like('data.description', "%This is not supported%")) OR like('data.description', "Request to Webtask exceeded allowed execution time"), "blocked"), 'action')
EVAL-app = case('data.type' IN ("ssa", "fs", "fp","f","s","fu","fsa","admin_update_launch","api_limit","cls","cs","depnote","fapi","fc","fco","fcoa","fcph","fcpro","fd","fdeac","fdeaz","feacft","feccft","fede","fens","feoobft","feotpft","fepft","fepotpft","fercft","fertft","ferrt","fi","flo","fn","fui","fv","fvr","gd_send_email","gd_send_pn","gd_send_pn_failure","gd_send_sms","gd_send_sms_failure","gd_send_voice","gd_send_voice_failure","gd_tenant_update","gd_webauthn_challenge_failed","gd_webauthn_enrollment_failed","limit_delegation","mfar","mgmt_api_read","sapi","scoa","seacft","seccft","sede","sens","seoobft","seotpft","sepft","sercft","sertft","si","srrt","sv","svr","sys_update_start","ublkdu","w") OR 'data.description'=="We've just sent you an email to reset your password.", "auth0")
EVAL-authentication_method = case('data.type' IN ("f","fp","fs","fsa","fu","gd_auth_failed","gd_auth_rejected", "gd_auth_succeed","gd_enrollment_complete","gd_otp_rate_limit_exceed","gd_recovery_failed","gd_recovery_rate_limit_exceed","gd_recovery_succeed","gd_start_auth","s","ssa") AND 'data.strategy'=="auth0", 'data.connection', 'data.type' IN ("f","fp","fs","fsa","fu","gd_auth_failed","gd_auth_rejected", "gd_auth_succeed","gd_enrollment_complete","gd_otp_rate_limit_exceed","gd_recovery_failed","gd_recovery_rate_limit_exceed","gd_recovery_succeed","gd_start_auth","s","ssa") AND NOT 'data.strategy'=="auth0", coalesce(mvindex('data.details.prompts{}.name',0),'data.strategy'))
EVAL-authentication_service = case('data.type' IN ("f","fp","fs","fsa","fu","gd_auth_failed","gd_auth_rejected", "gd_auth_succeed","gd_enrollment_complete","gd_otp_rate_limit_exceed","gd_recovery_failed","gd_recovery_rate_limit_exceed","gd_recovery_succeed","gd_start_auth","s","ssa"), "auth0")
EVAL-body = case('data.description'=="We've just sent you an email to reset your password.", if(isnull('body'), 'data.description', null()), 1==1, 'body')
EVAL-category = case('data.type' IN ("limit_mu","limit_wc","limit_sul","pla","pwd_leak","signup_pwd_leak") OR ('data.type'=="w" AND like('data.description', "A user has attempted to access a login page directly%")) OR like('data.description', "Request to Webtask exceeded allowed execution time"), "behaviour")
EVAL-change_type = if(isnull('change_type'), case('data.description' IN ("Update a User", "Assign roles to a user", "Assign users to a role", "Delete a User", "Create a User", "Removes roles from a user", "Delete tenant member"), "AAA", 'data.description'=="Delete a device credential", "credential", 'data.description'=="Verify a custom domain" OR 'data.description'=="Configure a new custom domain" OR 'data.description' IN ("Deploy an action", "Update an action", "Update a client grant", "Update a client", "Update an invitation","Create tenant invitations for a given client", "Create client grant", "Create a client", "Update a resource server", "Create a resource server", "Update a connection", "Update tenant settings", "Delete tenant invitation", "Update a role", "Create a role", "Delete a role", "Update a Multi-factor Authentication Factor", "Create a log stream"), "filesystem"), 'change_type')
EVAL-description = if('data.description'=="", null(), 'data.description')
EVAL-dest = case('data.type' IN ("admin_update_launch","api_limit","cls","cs","depnote","fapi","fc","fco","fcoa","fcph","fcpro","fd","fdeac","fdeaz","feacft","feccft","fede","fens","feoobft","feotpft","fepft","fepotpft","fercft","fertft","ferrt","fi","flo","fn","fui","fv","fvr","gd_send_sms_failure","gd_send_voice_failure","gd_tenant_update","gd_webauthn_challenge_failed","gd_webauthn_enrollment_failed","limit_delegation","mfar","sys_update_start","ublkdu","w","f","fp","fs","fsa","fu","gd_auth_failed","gd_auth_rejected", "gd_auth_succeed","gd_enrollment_complete","gd_otp_rate_limit_exceed","gd_recovery_failed","gd_recovery_rate_limit_exceed","gd_recovery_succeed","gd_start_auth","s","ssa","du","fce","fcp","fcpn","fcpr","fcu","fdecc","fdu","gd_start_enroll","gd_start_enroll_failed","gd_unenroll","gd_update_device_account","resource_cleanup","sce","scp","scph","scpn","scpr","scu","sd","sdu","ss","sui","sys_os_update_end","sys_os_update_start","sys_update_end","sys_update_start"), 'data.hostname', 'data.description'=="Update a User", 'data.details.response.body.identity_api', 'data.description'=="Verify a custom domain" OR 'data.description'=="Configure a new custom domain" OR 'data.description'=="Deploy an action", 'data.details.request.channel')
EVAL-id = 'log_id'
EVAL-ids_type = case('data.type' IN ("limit_mu","limit_wc","limit_sul","pla","pwd_leak","signup_pwd_leak","w") OR like('data.description', "Request to Webtask exceeded allowed execution time"), "application")
EVAL-object = case('data.type' IN ("du","fce","fcp","fcpn","fcpr","fcu","fdecc","fdu","gd_start_enroll","gd_start_enroll_failed","sce","scp","scph","scpn","scpr","scu","sd","sdu","ss","sui"), if('data.user_name'=="", null(), 'data.user_name'), 'data.description' IN ("Delete a User", "Create a User", "Update a User", "Removes roles from a user", "Assign roles to a user", "Assign users to a role"), coalesce('data.hostname', 'data.details.request.auth.user.name', 'data.details.response.body.email'), 'data.description' IN ("Verify a custom domain", "Configure a new custom domain", "Deploy an action"), 'data.details.request.path')
EVAL-reason = case('data.type' IN ("f","fp","fs","fsa","fu","gd_auth_failed","gd_auth_rejected", "gd_auth_succeed","gd_enrollment_complete","gd_otp_rate_limit_exceed","gd_recovery_failed","gd_recovery_rate_limit_exceed","gd_recovery_succeed","gd_start_auth","s","ssa"), 'data.description')
EVAL-result = case('data.type'=="du", "Deleted User", 'data.type'=="fce", "Failed Change Email", 'data.type'=="fcp", "Failed Change Password", 'data.type'=="fcpn", "Failed Change Phone Number", 'data.type'=="fcpr", "Failed Change Password Request", 'data.type'=="fcu", "Failed Change Username", 'data.type'=="fdecc", "User Canceled Device Confirmation", 'data.type'=="fdu", "Failed User Deletion", 'data.type'=="gd_start_enroll", "Enroll started", 'data.type'=="gd_start_enroll_failed", "Enrollment failed", 'data.type'=="gd_unenroll", "Unenroll device account", 'data.type'=="gd_update_device_account", "Update device account", 'data.type'=="resource_cleanup", "Refresh token excess warning", 'data.type'=="sce", "Success Change Email", 'data.type'=="scp", "Success Change Password", 'data.type'=="scph", "Success Post Change Password Hook", 'data.type'=="scpn", "Success Change Phone Number", 'data.type'=="scpr", "Success Change Password Request", 'data.type'=="scu", "Success Change Username", 'data.type'=="sd", "Success Delegation", 'data.type'=="sdu", "Success User Deletion", 'data.type'=="ss", "Success Signup", 'data.type'=="sui", "Success users import", 'data.type'=="sys_os_update_end", "Auth0 OS Update Ended", 'data.type'=="sys_os_update_start", "Auth0 OS Update Started", 'data.type'=="sys_update_end", "Auth0 Update Ended", 'data.type'=="sys_update_start", "Auth0 Update Started", 'data.description' IN ("Update a User", "Delete a device credential"), "Success API Operation")
EVAL-signature = if('data.type' IN ("limit_mu","limit_wc","limit_sul","pla","pwd_leak","signup_pwd_leak"), 'data.type', 'signature')
EVAL-src = case('data.type' IN ("admin_update_launch","api_limit","cls","cs","depnote","fapi","fc","fco","fcoa","fcph","fcpro","fd","fdeac","fdeaz","feacft","feccft","fede","fens","feoobft","feotpft","fepft","fepotpft","fercft","fertft","ferrt","fi","flo","fn","fui","fv","fvr","gd_send_sms_failure","gd_send_voice_failure","gd_tenant_update","gd_webauthn_challenge_failed","gd_webauthn_enrollment_failed","limit_delegation","mfar","sys_update_start","ublkdu","w","du","fce","fcp","fcpn","fcpr","fcu","fdecc","fdu","gd_start_enroll","gd_start_enroll_failed","gd_unenroll","gd_update_device_account","resource_cleanup","sce","scp","scph","scpn","scpr","scu","sd","sdu","ss","sui","sys_os_update_end","sys_os_update_start","sys_update_end","sys_update_start","f","fp","fs","fsa","fu","gd_auth_failed","gd_auth_rejected","gd_auth_succeed","gd_enrollment_complete","gd_otp_rate_limit_exceed","gd_recovery_failed","gd_recovery_rate_limit_exceed","gd_recovery_succeed","gd_start_auth","s","ssa") OR 'data.description' IN ("Update a User", "Delete a device credential"), 'data.ip')
EVAL-src_ip = case(('data.type' IN ("admin_update_launch","api_limit","cls","cs","depnote","fapi","fc","fco","fcoa","fcph","fcpro","fd","fdeac","fdeaz","feacft","feccft","fede","fens","feoobft","feotpft","fepft","fepotpft","fercft","fertft","ferrt","fi","flo","fn","fui","fv","fvr","gd_send_sms_failure","gd_send_voice_failure","gd_tenant_update","gd_webauthn_challenge_failed","gd_webauthn_enrollment_failed","limit_delegation","mfar","sys_update_start","ublkdu","w","du","fce","fcp","fcpn","fcpr","fcu","fdecc","fdu","gd_start_enroll","gd_start_enroll_failed","gd_unenroll","gd_update_device_account","resource_cleanup","sce","scp","scph","scpn","scpr","scu","sd","sdu","ss","sui","sys_os_update_end","sys_os_update_start","sys_update_end","sys_update_start","f","fp","fs","fsa","fu","gd_auth_failed","gd_auth_rejected","gd_auth_succeed","gd_enrollment_complete","gd_otp_rate_limit_exceed","gd_recovery_failed","gd_recovery_rate_limit_exceed","gd_recovery_succeed","gd_start_auth","s","ssa") OR 'data.description' IN ("Update a User", "Delete a device credential")) AND (cidrmatch("0.0.0.0/0",'data.ip') OR cidrmatch("::/0",'data.ip')), 'data.ip')
EVAL-src_user = case('data.type' IN ("f","fp","fs","fsa","fu","gd_auth_failed","gd_auth_rejected", "gd_auth_succeed","gd_enrollment_complete","gd_otp_rate_limit_exceed","gd_recovery_failed","gd_recovery_rate_limit_exceed","gd_recovery_succeed","gd_start_auth","s","ssa"), if('data.user_name'=="", null(), 'data.user_name'))
EVAL-status = if(isnull('status'), case('data.description'=="Update a User", "success"), 'status')
EVAL-user = coalesce(if('data.user_name'=="", null(), 'data.user_name'), if('data.details.request.auth.user.name'=="", null(), 'data.details.request.auth.user.name'), case('data.description' IN ("Delete a User", "Create a User", "Update a User", "Removes roles from a user", "Assign roles to a user", "Assign users to a role"), 'data.details.response.body.email'))
EVAL-user_agent = if('data.user_agent'=="unknown", null(), 'data.user_agent')
EVAL-vendor_product = "Auth0"

LOOKUP-ccx_auth0_lookup = ccx_auth0_lookup "data.type" OUTPUTNEW action change_type dataset_name event_description AS body event_name AS signature status type
