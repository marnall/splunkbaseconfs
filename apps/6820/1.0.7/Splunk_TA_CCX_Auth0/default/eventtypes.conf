
[ccx_auth0_alert]
search = (sourcetype="auth0") dataset_name="alert" AND NOT description="Request to Webtask*"
# tags = alert

[ccx_auth0_authentication]
search = (sourcetype="auth0") dataset_name="authentication"
# tags = authentication

[ccx_auth0_change]
search = (sourcetype="auth0") (dataset_name="change" OR data.description="Update a User") AND NOT data.description="Rotate a client secret"
# tags = change

[ccx_auth0_ids]
search = (sourcetype="auth0") dataset_name="ids" OR data.description="A user has attempted to access a login page directly*" OR description="Request to Webtask*"
# tags = attack ids

[ccx_auth0_rotate_client_secret]
search = (sourcetype="auth0") data.description="Rotate a client secret"

[ccx_auth0_success_events]
search = (sourcetype="auth0") dataset_name="success_event"

[ccx_auth0_successful_logged_out_event]
search = (sourcetype="auth0") data.type="slo"

[ccx_auth0_identity_audit]
search = (sourcetype="auth0") (dataset_name="change" AND change_type="AAA")
