[CVE Generation]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 0 * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = pie
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = lacework
request.ui_dispatch_view = search
search = | lacework target=/api/v1/external/vulnerabilities/host/\
| spath\
| eval cve=mvzip(cve_id, 'packages{}.name',": ")\
| eval target="/api/v1/external/vulnerabilities/host/cveId/"+cve_id\
| stats count by cve target\
| fields - count\
| outputlookup host_cves
