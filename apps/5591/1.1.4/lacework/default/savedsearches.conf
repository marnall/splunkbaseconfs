[GCP Account Generation]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 0 * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = pie
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = lacework
request.ui_dispatch_view = search
search = | lacework target=/api/v2/CloudAccounts/\
| spath\
| search type=GcpAtSes\
| eval account_desc=replace(name,"-"," ")\
| eval project_id=mvindex(split('data.subscriptionName',"/"),1)\
| eval subs_id=mvindex(split('data.subscriptionName',"/"),3)\
| rename data.id as account_id\
| eval account_type="gcp"\
| table account_desc project_id account_type subs_id account_id\
| outputlookup gcp_account

