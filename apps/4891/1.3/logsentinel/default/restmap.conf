[validation:savedsearch]
# Require auth to be set if logsentinel log sending is enabled
action.send_to_ls = case('action.send_to_ls' != "1", null(), 'action.send_to_ls.param.logsentinelurl' == "action.send_to_ls.param.logsentinelurl" OR 'action.send_to_ls.param.logsentinelurl' == "", "No LS Server URL specified",  1==1, null())

action.send_to_ls.param.logsentinelurl = validate( match('action.send_to_ls.param.logsentinelurl', "^https?://[^\s]+$"), "LS Server URL is invalid")
