[ansibleQueue]
external_type = kvstore
case_sensitive_match = false
collection = ansibleQueue
fields_list =  _key, itsiGroupId, time, template, templateType, payload, splunkHost

[ansibleResultsQueue]
external_type = kvstore
case_sensitive_match = false
collection = ansibleResults
fields_list = _key, mapId, jobId, created, runStatus, jobName, templateId, templateType, splunkHost
