[trello_lists]
start_by_shell = false
sourcetype = trello:lists
interval = 30
fields = name,idBoard,closed,pos
filter = all
disabled = 0

[trello_members]
start_by_shell = false
sourcetype = trello:members
interval = 30
disabled = 0

[trello_checklists]
start_by_shell = false
sourcetype = trello:checklists
interval = 30
disabled = 0

[trello_cards]
start_by_shell = false
sourcetype = trello:cards
interval = 30
fields = name,pos,closed,due,dueComplete,idBoard,idList,shortUrl,labels,idMembers,idChecklists
filter = all
disabled = 0

[trello_boards]
start_by_shell = false
sourcetype = trello:boards
interval = 30
fields = name,closed,shortUrl,dateLastActivity
disabled = 0

[trello_movements]
start_by_shell = false
sourcetype = trello:movements
interval = 30
action_limit = 50
disabled = 0

