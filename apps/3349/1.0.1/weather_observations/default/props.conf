[met_office:weather_observations:hourly]
KV_MODE = JSON
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
MAX_TIMESTAMP_LOOKAHEAD = 30
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%Z
TIME_PREFIX = "observation_timestamp"\s*\:\s*"
category = Miscellaneous
pulldown_type = true
LOOKUP-pressure_tendencies = pressure_tendencies lookup_key AS pressure_tendency_pas OUTPUTNEW lookup_value AS pressure_tendency
LOOKUP-weather_types = weather_types lookup_key AS weather_type OUTPUTNEW lookup_value AS weather
EVAL-visibility = case( visibility_m < 1000, "Very poor", visibility_m < 4000, "Poor", visibility_m < 10000, "Moderate", visibility_m < 20000, "Good", visibility_m < 40000, "Very good", visibility_m >= 40000, "Excellent")
EVAL-temperature_f = ( temperature_c * 1.8 ) + 32
EVAL-dew_point_f = ( dew_point_c * 1.8 ) + 32
EVAL-instrumentation_count = if(isnotnull(dew_point_c),1,0) + if(isnotnull(pressure_hpa),1,0) + if(isnotnull(pressure_tendency_pas),1,0) + if(isnotnull(screen_relative_humidity_percent),1,0) + if(isnotnull(temperature_c),1,0) + if(isnotnull(visibility_m),1,0) + if(isnotnull(weather_type),1,0) + if(isnotnull(wind_direction_compass),1,0) + if(isnotnull(wind_speed_mph),1,0) + if(isnotnull(wind_gust_mph),1,0)

