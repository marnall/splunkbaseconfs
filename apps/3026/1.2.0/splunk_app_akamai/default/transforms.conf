[countries_lonlat]
filename = countries_lonlat.csv

[kpi_kvstore_lookup]
external_type = kvstore
collection = kpi_search_collection
fields_list = _key, cachedRequests, cpCode, errorRequests, requests,  sumResponseTime, traffic, ts

[request_kvstore_lookup]
external_type = kvstore
collection = request_search_collection
fields_list = _key, city, country, cpCode, errors, latitude, longitude, requests, state, traffic, ts

[edge_kvstore_lookup]
external_type = kvstore
collection = edge_search_collection
fields_list = cpCode, requests, serverAmount, serverGeoCity, serverGeoCountry, serverGeoLatitude, serverGeoLongitude, serverGeoState, traffic
