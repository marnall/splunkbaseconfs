#   Version 1.2.0
# DO NOT EDIT THIS FILE!
# Changes to default files will be lost on update and are difficult to
# manage and support.
#
# Please make any changes to system defaults by overriding them in
# apps or $SPLUNK_HOME/etc/apps/splunk_app_akamai/local
# (See "Configuration file precedence" in the web documentation).
#
# To override a specific setting, copy the name of the stanza and
# setting to the file where you wish to override it.
#
# commented out capabilities that are registered by their own components.
# leaving here for educational purposes.

# This file configures the real-time monitor dashboard.
# See settings.conf.spec for detailed documentation

[realtime]

# How much delay real time monitor has
REAL_TIME_DELAY = 180

# Real-time window in seconds
REAL_TIME_WINDOW=300

# How long an event will influence the heat map in seconds.
HEAT_MAP_EVENT_TTL = 5

# Number of hits in an event considered as a maximum value
EVENT_MAX_COUNT = 50

# Amount of traffic in an event considered as a maximum value in MB
EVENT_MAX_TRAFFIC = 10

# Period of time in seconds to fetch events data
EVENTS_FETCHING_PERIOD_IN_SECONDS = 15

# Maximum number of rows retrieved for each server call to fetch events
MAX_EVENTS_FETCHED = 50000

# Maximum number of events displayed on the screen using an animation (Live and Recent Traffic layers)
MAX_EVENTS_DISPLAYED = 300

# Period of time in seconds to fetch edge servers data
EDGE_FETCHING_PERIOD_IN_SECONDS = 125

# Period of time in seconds to fetch error request data
ERROR_FETCHING_PERIOD_IN_SECONDS = 15

# Maximum number of rows retrieved for each server call to fetch edge servers data
MAX_EDGE_SERVERS = 50000

# Maximum number of rows retrieved for each error call to fetch error requests data
MAX_ERROR_REQUESTS = 50000

# Color of dots representing requests event in hex rgb
REQUEST_FILL_COLOR = #03A2D6

# Color of edge circles representing edge servers data in hex rgb
EDGE_FILL_COLOR = #AC99D6

# Color of error circles representing error request data in hex rgb
ERROR_FILL_COLOR = #E64B3C

# Gradient used for heat map colors
HEATMAP_COLORS = ["#00f","#0ff","#0f0","#ff0","#f00"]

# Factor used to calculate edge server data representation according to number of requests.
REQUEST_EDGE_CIRCLE_SIZE_FACTOR = 4

# Factor used to calculate edge server data representation according to amount of data.
TRAFFIC_EDGE_CIRCLE_SIZE_FACTOR = 6

# Biggest circle radius to represent edge server data in pixels
MAX_EDGE_CIRCLE_SIZE = 60

# Biggest circle radius to represent error request data in pixels
MAX_ERROR_CIRCLE_SIZE = 30


# Maximum number of events queued on the client
MAX_QUEUE_SIZE = 30000

# Max resolution for which city level details will be used to display edge servers data
CITY_MAX_RESOLUTION = 3000

# Max resolution for which region level details will be used to display edge servers data
REGION_MAX_RESOLUTION = 10000

# Max resolution for which country level details will be used to display edge servers data
COUNTRY_MAX_RESOLUTION = 10000000000

# Default center view coordinates.
DEFAULT_VIEW_CENTER = [0,0]
