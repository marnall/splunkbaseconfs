[logtype_make]
REGEX = (?<logtype>(?:registry|evt|shimcache|jumplists|usb|log|plist|service|journal|browser|analysis|timeline|memory|audit))
SOURCE_KEY = source

[IPAddress_get]
REGEX = (?P<ip>(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))
SOURCE_KEY = _raw
MV_ADD = true

[Filenames_get]
REGEX = (?<Filepath>.*)\/(?<Filename>[^\/]+)\.(?<Fileext>[^\:]+)$
SOURCE_KEY = Filename

[WinCommands_get]
REGEX = (?<ProcessPath>.*)\/(?<ProcessName>[^\/]+)\.(?<ProcessExt>.*)$
SOURCE_KEY = WinCommand

[WinProcesses_get]
REGEX = (?<ProcessPath>.*)\/(?<ProcessName>[^\/]+)\.(?<ProcessExt>.*)$
SOURCE_KEY = WinProcess

[nixCommands_get]
REGEX = (?<ProcessPath>.*)\/(?<ProcessName>[^\/]+)\.(?<ProcessExt>.*)$
SOURCE_KEY = nixCommand

[nixProcesses_get]
REGEX = (?<ProcessPath>.*)\/(?<ProcessName>[^\/]+)\.(?<ProcessExt>.*)$
SOURCE_KEY = nixProcess

[usb_win_hw]
REGEX = [^\-]\ \-\ (?<HardwareType>[^\\\\]+)
SOURCE_KEY = Artefact

[usb_win_dvc]
REGEX = (?<disk>[A-Za-z\d]+)\S(?:D|d)(?:I|i)(?:S|s)(?:K|k)\S(?:V|v)(?:E|e)(?:N|n)_(?<ven>[a-z\d]+)\S+(?:P|p)(?:R|r)(?:O|o)(?:D|d)_(?<prod>\w+)(\S(?:R|r)(?:E|e)(?:V|v)_(?<rev>[a-z\d]+))?\S(?<serial>[^\#]+)
SOURCE_KEY = Artefact

[usb_mac_ven]
REGEX = idVendor\": \"(?P<ven>[^\"]+)
SOURCE_KEY = _raw

[usb_mac_prod]
REGEX = idProduct\": \"(?P<prod>[^\"]+)
SOURCE_KEY = _raw

[usb_lin_ven]
REGEX = Manufacturer: (?<ven>.+)
SOURCE_KEY = Message

[usb_lin_prod]
REGEX = Product: (?<prod>.+)
SOURCE_KEY = Message

[usb_lin_rev]
REGEX = bcdDevice= (?<rev>.+)
SOURCE_KEY = Message

[usb_lin_sn]
REGEX = SerialNumber: (?<sn>.+)
SOURCE_KEY = Message

