[ms_cas_alerts]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::ms:cas:alerts
REGEX = \|ALERT_
SOURCE_KEY = _raw

[ms_cas_activities]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::ms:cas:activities
REGEX = \|EVENT_
SOURCE_KEY = _raw

[ms_cas_cs1]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = cs1Label=(\S+)\scs1=(.+?)(?:\w+=)

[ms_cas_cs2]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = cs2Label=(\S+)\scs2=(.+?)(?:\w+=)

[ms_cas_cs3]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = cs3Label=(\S+)\scs3=(.+?)(?:\w+=)

[ms_cas_cs4]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = cs4Label=(\S+)\scs4=(.+?)(?:\w+=)

[ms_cas_cs5]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = cs5Label=(\S+)\scs5=(.+?)(?:\w+=)

[ms_cas_c6a1]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = c6a1Label="([^"]+)"\sc6a1=(\S+)
