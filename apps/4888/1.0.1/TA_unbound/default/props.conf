[unbound]
pulldown_type = true
TIME_FORMAT = %b %d %T
KV_MODE = none
SHOULD_LINEMERGE = False
category = DNS
description = Unbound DNS logging extractions

EXTRACT-dns_query = \[(?<pid>\d+):(?<thread_id>\d+)\]\s(?<severity>\S+):\s(?<src_ip>(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))(?>\s+)(?<query>\S+)(?>\s+)(?<record_type>\S+)\s(?<class>\S+)$

EXTRACT-dns_answer = \[(?<pid>\d+):(?<thread_id>\d+)\]\s(?<severity>\S+):\s(?<src_ip>(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))(?>\s+)(?<query>\S+)(?>\s+)(?<record_type>\S+)\s(?<class>\S+)\s(?<reply_code>\S+)\s(?<response_time>\d+\.\d+)\s(?<from_cache>\d)\s(?<response_size>\d+)$

# FIELD ALIASES
FIELDALIAS-src_ip = src_ip AS src

EVAL-vendor_product = unbound
EVAL-dest_port = 53
EVAL-query_length = len(query)

# Transforms Configurations
REPORT-fields = query_domain

