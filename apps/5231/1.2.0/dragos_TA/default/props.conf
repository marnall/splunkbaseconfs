[dragos_ioc]
category = Network & Security
description = Indicators of compromise ingest from the Dragos WorldView API
TIME_PREFIX="updated_at": "
TIME_FORMAT = YYYY-MM-DDThh:mm:ssZ
MAX_TIMESTAMP_LOOKAHEAD = 256
NO_BINARY_CHECK = true
KV_MODE = json

[dragos_alert]
category = Network & Security
description = Output produced by exporting Dragos events via the syslog format.
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX=occurred_at="
TIME_FORMAT = YYYY-MM-DD hh:mm:ssZ
MAX_TIMESTAMP_LOOKAHEAD = 256
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
KV_MODE  = auto_escaped
TRANSFORMS-set-host = dragos-syslog-extract-host
SEDCMD-removeNAValues = s/":\s*"N\/A"/": ""/g