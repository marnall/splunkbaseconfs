[dragos_ingest_status]
external_type = kvstore
collection = dragos_ioc_cache_status
fields_list = _key, last_update, successful, message, last_modinput_run_time, last_full_replacement

[dragos_ingest_history]
external_type = kvstore
collection = dragos_ioc_cache_history
fields_list = timestamp, update_number, num_iocs_imported, successful, message

[dragos_lookup_ioc]
external_type = kvstore
collection = dragos_iocs
case_sensitive_match = false
match_type = EXACT(value),WILDCARD(value_wildcard),EXACT(id)
fields_list = category, comment, confidence, uuid, pre_attack_techniques, value, value_wildcard, updated_at, indicator_type, last_seen, products, products{}.serial, primary_product_serial, kill_chain, first_seen, attack_techniques, id, activity_groups, ingested_at

[dragos_ioc_inactive_list]
external_type = kvstore
collection = dragos_ioc_inactive_list
match_type = EXACT(id)
fields_list = category, comment, confidence, uuid, pre_attack_techniques, value, value_wildcard, updated_at, indicator_type, last_seen, products, products{}.serial, primary_product_serial, kill_chain, first_seen, attack_techniques, id, activity_groups, ingested_at

[dragos-syslog-extract-host]
REGEX = <\d+?>[A-Z][a-z][a-z]\s{1,2}\d{1,2}\s\d{2}[:]\d{2}[:]\d{2}\s([\w][\w\d\.@-]*)\s.+?:
DEST_KEY = MetaData:Host
FORMAT = host::$1

[dragos_event_severities]
filename = severity.csv

[dragos_detection_quads]
filename = detection_quads.csv
