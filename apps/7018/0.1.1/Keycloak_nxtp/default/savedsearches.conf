[keycloak_users_lookup_creation]
description = Keycloak Users Report: Gathers unique user data and outputs to the 'keycloak_users' lookup.
cron_schedule = 0 0 * * *
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
schedule_window = auto
enableSched = 0
dispatchAs = user
search = `keycloak_index` sourcetype="keycloak:user" realm="nxtp" \
| dedup user_id \
| eval user_created = createdTimestamp / 1000 \
| rename realm as user_realm \
| table _time user_keycloak_id user_name user_email user_active user_realm user_created \
| outputlookup keycloak_users
