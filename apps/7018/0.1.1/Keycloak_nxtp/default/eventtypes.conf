[keycloak_inventory_users]
search = `keycloak_index` sourcetype=keycloak:user

[keycloak_inventory_realms]
search = `keycloak_index` sourcetype=keycloak:realm

[keycloak_successful_authentication]
search = `keycloak_index` sourcetype=keycloak:event action=success

[keycloak_failed_authentication]
search = `keycloak_index` sourcetype=keycloak:event action=failure

[keycloak_change_acc_management]
search = `keycloak_index` sourcetype IN (keycloak:event,keycloak:audit) NOT action IN (success,failure) AND NOT resourcePath IN ("events/config")

[keycloak_change_audit]
search = `keycloak_index` sourcetype=keycloak:audit AND resourcePath IN ("events/config")
