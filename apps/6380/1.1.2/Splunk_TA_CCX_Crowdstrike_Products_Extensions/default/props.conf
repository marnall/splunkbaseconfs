##CCX Extensions for Crowdstrike (Falcon Event Streams)##
[CrowdStrike:Event:Streams:JSON]
TRANSFORMS-mod_crowdstrike_eventstreams_source = mod_crowdstrike_eventstreams_source

FIELDALIAS-object_category = "event.OperationName" ASNEW object_category
FIELDALIAS-object_attrs = "event.AuditKeyValues{}.Key" ASNEW object_attrs
FIELDALIAS-object = "event.OperationName" ASNEW object
FIELDALIAS-aid = "event.SensorId" ASNEW aid
###
EVAL-action = case('event.PatternDispositionValue'== 0, "allowed",'event.PatternDispositionValue' == 128,"allowed", 'event.PatternDispositionValue' == 272, "allowed",'event.PatternDispositionValue' == 768, "allowed",'event.PatternDispositionValue' == 1280, "allowed",'event.PatternDispositionValue' == 2304, "allowed",'event.PatternDispositionValue' == 4638, "allowed",'event.PatternDispositionValue'==16,"blocked",'event.PatternDispositionValue'==512,"blocked", 'event.PatternDispositionValue'==1024,"blocked", 'event.PatternDispositionValue'==2048, "blocked", 'event.PatternDispositionValue'==2176, "blocked", 'event.PatternDispositionValue'==4096, "blocked", 'event.PatternDispositionValue'==4112, "blocked", 'event.PatternDispositionValue'==32768, "blocked", 'event.Success'=="false", "failure", 'event.Success'=="true", "success",'metadata.eventType'=="IdentityProtectionEvent","allowed",'metadata.eventType'=="IdpDetectionSummaryEvent","allowed",'metadata.eventType'=="ScheduledReportNotificationEvent" AND isnotnull('metadata.eventCreationTime'),"created", 'metadata.eventType'=="UserActivityAuditEvent" AND 'event.OperationName' IN("update_group","update_policy","update_priority","quarantined_file_update","detection_update"),"updated",'metadata.eventType'=="UserActivityAuditEvent" AND 'event.OperationName' IN("remove_group","delete_report_execution","delete_policy","delete_group"),"deleted", 'metadata.eventType'=="UserActivityAuditEvent" AND 'event.OperationName' IN("add_group","create_report","create_policy","create_group"),"created", 'metadata.eventType'=="UserActivityAuditEvent" AND 'event.OperationName' IN("disable_policy","enable_policy"),"modified", 'metadata.eventType'=="UserActivityAuditEvent" AND 'event.OperationName' IN("reveal_token"),"read" , 'metadata.eventType'=="UserActivityAuditEvent" AND 'event.OperationName' IN("hide_host_requested","unhide_host_requested","containment_requested"),"requested",'metadata.eventType' IN("EppDetectionSummaryEvent","XdrDetectionSummaryEvent") AND 'event.PatternDispositionValue' IN (16,26,128,144,512,522,538,1024,1152,2048,2176,4112,5120,8704),"blocked",'metadata.eventType' IN("EppDetectionSummaryEvent","XdrDetectionSummaryEvent") AND 'event.PatternDispositionValue' IN(0,272,282,768,778,794,1280,2304,2432,4368), "allowed", 'metadata.eventType' IN("EppDetectionSummaryEvent","XdrDetectionSummaryEvent") AND 'event.PatternDispositionFlags.PolicyDisabled'=true, "allowed", 'metadata.eventType' IN("EppDetectionSummaryEvent","XdrDetectionSummaryEvent") AND 'event.PatternDispositionDescription' LIKE "%would have been%", "allowed", 'metadata.eventType' IN("EppDetectionSummaryEvent","XdrDetectionSummaryEvent") AND 'event.PatternDispositionDescription' LIKE "%blocked%", "blocked",'metadata.eventType' IN("EppDetectionSummaryEvent","XdrDetectionSummaryEvent") AND 'event.PatternDispositionDescription' LIKE "%Blocked%", "blocked", 'metadata.eventType' IN("EppDetectionSummaryEvent","XdrDetectionSummaryEvent") AND NOT 'event.PatternDispositionDescription'="*" AND NOT 'event.Success'="*","allowed", 'metadata.eventType'=="DataProtectionDetectionSummaryEvent", "allowed")
###
EVAL-app = "CrowdStrike Falcon"
EVAL-file_hash = mvappend('event.SHA256String','event.MD5String',split('event.SHA256Hashes',","))
EVAL-reason = if(isnotnull('event.OperationName'), 'event.OperationName', null())
EVAL-severity = if(isnotnull('event.SeverityName'),case(match('event.SeverityName', "INFO|info"),"informational",1=1,lower('event.SeverityName')),case(('event.Severity'>=0 AND 'event.Severity'<=15),"informational",('event.Severity'>=16 AND 'event.Severity'<=39),"low",('event.Severity'>=40 AND 'event.Severity'<=69),"medium",('event.Severity'>=70 AND 'event.Severity'<=89),"high",('event.Severity'>=90),"critical"))
EVAL-signature = if(isnotnull('event.DetectName') OR isnotnull('event.Name'), coalesce('event.Name','event.DetectName'),if('metadata.eventType'=="CustomerIOCEvent", 'metadata.eventType',if('metadata.eventType'=="ScheduledReportNotificationEvent" OR ('metadata.eventType' IN("RemoteResponseSessionStartEvent","RemoteResponseSessionEndEvent")),'metadata.eventType',if('metadata.eventType'=="EppDetectionSummaryEvent",'event.Name',if('metadata.eventType'=="XdrDetectionSummaryEvent",split('event.Techniques',","),coalesce('event.OperationName','event.IncidentType'))))))
EVAL-category = if('metadata.eventType'=="CustomerIOCEvent",'metadata.eventType',if('metadata.eventType' IN("IdpDetectionSummaryEvent","DetectionSummaryEvent"),'event.Tactic',if('metadata.eventType'=="EppDetectionSummaryEvent",coalesce('mitre_technique_id','event.Technique'),if('metadata.eventType'=="XdrDetectionSummaryEvent",split('event.Tactics',","), if('metadata.eventType'=="DataProtectionDetectionSummaryEvent", mvdedup(coalesce('event.AnodeIndicators{}.Type', 'event.Policy.Name')), 'event.Category')))))
EVAL-ids_type = if(('metadata.eventType' == "IdentityProtectionEvent" AND 'event.Category'!="Incidents") OR ('metadata.eventType'=="CustomerIOCEvent" AND NOT file_name = "") OR 'metadata.eventType'=="IdpDetectionSummaryEvent","application",null())
EVAL-src_ip = if(cidrmatch("0.0.0.0/0",'event.UserIp') OR cidrmatch("::/0",'event.UserIp'),'event.UserIp',if('event.EndpointIp' != "",'event.EndpointIp', if('metadata.eventType'="IdpDetectionSummaryEvent" AND NOT 'event.SourceEndpointIpAddress'="0.0.0.0",'event.SourceEndpointIpAddress',null())))
EVAL-src = if(cidrmatch("0.0.0.0/0",'event.UserIp') OR cidrmatch("::/0",'event.UserIp'),'event.UserIp',if('event.EndpointIp' != "",'event.EndpointIp',if('event.EndpointName' != "",'event.EndpointName',if('metadata.eventType'="CustomerIOCEvent",'event.ComputerName',if('metadata.eventType'="IdpDetectionSummaryEvent" AND NOT 'event.SourceEndpointIpAddress'="0.0.0.0",coalesce('event.SourceEndpointIpAddress','event.SourceEndpointHostName'),null())))))
EVAL-dvc = if(cidrmatch("0.0.0.0/0",'event.UserIp') OR cidrmatch("::/0",'event.UserIp'),'event.UserIp',if('event.EndpointIp' != "",'event.EndpointIp',if('event.EndpointName' != "",'event.EndpointName',null())))
EVAL-description = if(isnotnull('event.Description'),'event.Description',if('metadata.eventType'=="CustomerIOCEvent" AND file_name ="" OR ('metadata.eventType' IN("RemoteResponseSessionStartEvent","RemoteResponseSessionEndEvent")), replace('_raw',".*event\"\:\s(.*)\,\s\"ta_data\".*","\1"),'event.IncidentDescription'))
EVAL-body = if('metadata.eventType'=="CustomerIOCEvent" AND file_name ="" OR ('metadata.eventType' IN("RemoteResponseSessionStartEvent","RemoteResponseSessionEndEvent")), replace('_raw',".*event\"\:\s(.*)\,\s\"ta_data\".*","\1"),'event.IncidentDescription')
EVAL-id = coalesce('event.CompositeId','event.IdentityProtectionIncidentId','event.DetectId','event.SessionId')
EVAL-vendor_region = 'ta_data.Cloud_environment'
EVAL-user = if((isnotnull('event.UserName') AND NOT 'event.UserName'=""), replace('event.UserName', ".*\\\\(.*)$","\1"), if((isnotnull('event.UserId') AND NOT 'event.UserId'="") OR (isnotnull('event.UserID') AND NOT 'event.UserID'="") OR (isnotnull('event.SourceAccountName') AND NOT 'event.SourceAccountName'=""),coalesce('event.UserId','event.SourceAccountName','event.UserID'),if('metadata.eventType'=="XdrDetectionSummaryEvent",split('event.Users',","),null())))
EVAL-type = if(('metadata.eventType'=="IdentityProtectionEvent" AND ('event.Category'="Incidents" OR ('event.Category'=="Detections" AND NOT event.State="NEW"))),"alert",if('metadata.eventType'=="CustomerIOCEvent" AND file_name ="" OR ('metadata.eventType'=="RemoteResponseSessionStartEvent"),"warning",if('metadata.eventType'="RemoteResponseSessionEndEvent","event",null())))
EVAL-dest_ip = if(cidrmatch("0.0.0.0/0",'event.LocalIP') OR cidrmatch("::/0",'event.LocalIP'),'event.LocalIP',if('metadata.eventType'="IdpDetectionSummaryEvent" AND NOT 'event.SourceEndpointIpAddress'="0.0.0.0",'event.SourceEndpointIpAddress',if('metadata.eventType'=="XdrDetectionSummaryEvent",split('event.IPv4Addresses',","),null())))
EVAL-dest = if(isnotnull(dest),'dest',if('metadata.eventType'="IdpDetectionSummaryEvent" AND NOT 'event.SourceEndpointIpAddress'="0.0.0.0",coalesce('event.SourceEndpointIpAddress','event.SourceEndpointHostName'),if('metadata.eventType' IN("RemoteResponseSessionStartEvent","RemoteResponseSessionEndEvent"),'event.HostnameField',if('metadata.eventType' IN("EppDetectionSummaryEvent","XdrDetectionSummaryEvent") AND 'event.LocalIP'!="",'event.LocalIP',if('metadata.eventType' IN("EppDetectionSummaryEvent","XdrDetectionSummaryEvent") AND isnotnull('event.IPv4Addresses'),split('event.IPv4Addresses',","), if('metadata.eventType'=="DataProtectionDetectionSummaryEvent", 'event.Destination.Web.NormalizedURL' ,null()))))))
EVAL-dlp_type = case('metadata.eventType'=="DataProtectionDetectionSummaryEvent", 'event.DetectionType')
EVAL-mitre_technique_id = 'event.Technique'
EVAL-object_attrs = if(isnotnull(object_attrs),'object_attrs','event.ReportName')
EVAL-object_path = if('metadata.eventType'=="ScheduledReportNotificationEvent",'event.ReportFileReference',null())
EVAL-object_category = if(isnotnull(object_category),'object_category', coalesce('event.Destination.Channel', 'event.ReportType'))
EVAL-object = if(isnotnull(object), 'object', if('metadata.eventType'=="DataProtectionDetectionSummaryEvent", coalesce('event.Destination.Web.URL', 'event.Destination.USB.DeviceInstanceID'), 'metadata.eventType'))
EVAL-owner_id = if('metadata.eventType'=="ScheduledReportNotificationEvent",'event.UserUUID',null())
EVAL-email = if('metadata.eventType'=="ScheduledReportNotificationEvent",'event.UserID',null())
EVAL-owner_email = if('metadata.eventType'=="ScheduledReportNotificationEvent",'event.UserID',null())
EVAL-owner = if('metadata.eventType'=="ScheduledReportNotificationEvent",'event.UserID',null())
EVAL-date = strftime('_time',"%F")
EVAL-subject = if(isnotnull('event.Description'),'event.Description','subject')

[crowdstrike:spotlight:vulnerability:json]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 25
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = updated_timestamp
TZ = UTC
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 50000

TRANSFORMS-mod_crowdstrike_spotlight_source = mod_crowdstrike_spotlight_source

FIELDALIAS-aid = "falcon_spotlight.aid" AS aid
FIELDALIAS-severity_cvss3 = "falcon_spotlight.cve.severity" AS severity_cvss3

EVAL-severity_cvss3 = if('severity_cvss3'=="INFO","informational",lower('severity_cvss3'))
EVAL-severity = if('severity_cvss3'=="INFO","informational",lower('severity_cvss3'))
EVAL-severity_exprt = if(isnotnull('falcon_spotlight.cve.exprt_rating'),lower('falcon_spotlight.cve.exprt_rating'),null())
EVAL-cve = 'falcon_spotlight.cve.id'
EVAL-signature = coalesce('falcon_spotlight.cve.name','falcon_spotlight.cve.description')
EVAL-vendor_product = "CrowdStrike Falcon:Spotlight"
EVAL-category = 'falcon_spotlight.apps{}.product_name_version'
EVAL-dest = coalesce('falcon_spotlight.host_info.local_ip','falcon_spotlight.aid')
EVAL-dest_ip = 'falcon_spotlight.host_info.local_ip'
EVAL-status = 'falcon_spotlight.status'
EVAL-mskb = case(match('falcon_spotlight.remediation.entities{}.reference', "^KB.*"),'falcon_spotlight.remediation.entities{}.reference')
EVAL-xref = if(isnotnull('falcon_spotlight.cve.references{}'),'falcon_spotlight.cve.references{}',null())


[crowdstrike:filevantage:json]
EVAL-action = case('action_type' IN ("CREATE", "WRITE"), "created", 'action_type'=="DELETE", "deleted", 'action_type'=="RENAME", "updated", 'action_type'=="ATTRIBUTES", "modified")
EVAL-change_type = 'entity_type'
EVAL-command = 'command_line'
EVAL-object = 'entity_path'
EVAL-object_category = 'entity_type'
EVAL-object_path = 'entity_path'
EVAL-src = 'host.local_ip'
EVAL-src_ip = 'host.local_ip'
EVAL-status = if(match(_raw, "fail"), "failure", "success")
EVAL-user = 'user_name'
EVAL-vendor_product = "CrowdStrike Falcon:FileVantage"