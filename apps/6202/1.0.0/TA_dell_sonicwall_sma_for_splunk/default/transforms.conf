[remove_sma_SingleQuote]
REGEX = (\w+|,\s[^\']+)=(?:\'?)([^\']+)(?:\'?)
FORMAT = $1::$2

[dell_sonicwall_sma_phase1_auth_action_success]
CLEAN_KEYS = 0
FORMAT = vendor_phase::1 vendor_action::success src_user::$1
REGEX = System  AUTH: UNPW-AD : User authentication for otp-attrib = (?<src_user>[^\s]+) successful

[dell_sonicwall_sma_phase1_auth_action_failure]
CLEAN_KEYS = 0
FORMAT = vendor_phase::1 src_user::$1 user_group::$2
REGEX = Session Authentication for user \'\((.*?)\)@\((.*?)\)\' FAILED

[dell_sonicwall_sma_phase2_auth_action_failure]
CLEAN_KEYS = 0
FORMAT = vendor_phase::2 src_user::$1
REGEX = Authentication failed for user \'(.*?)\'

[dell_sonicwall_sma_session_end]
CLEAN_KEYS = 0
FORMAT = vendor_action::session_end ContextID::$1
REGEX = EventMessage: Session End Context=\'(\d{4,5})\' User=\'[^']+\', 

[sma_app_id]
batch_index_query = 0
case_sensitive_match = 1
filename = sma_app_id.csv