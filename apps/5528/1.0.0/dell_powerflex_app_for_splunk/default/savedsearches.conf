[lookupfill_rpl_stats]
cron_schedule = */10 * * * *
description = Saved search to fill lookup for replication overview system stats
dispatch.earliest_time = -20m@m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = dell_powerflex_app_for_splunk
request.ui_dispatch_view = search
search = `powerflex_system_statistics` | dedup id \
| join id [search `powerflex_rp_instance`| dedup id \
| rename id as temp \
| rename systemId as id \
| table id, lifetimeState] \
| join id [search `powerflex_system_statistics` \
| rename "rplReceiveBwc.totalWeightInKb" AS "recweightinkb", "rplReceiveBwc.numSeconds" AS "rectimetaken" \
| eval rectotalWeight = `powerflex_convert_to_mb(recweightinkb)`  \
| eval "rplRbw"= if(timetaken=0,0,ceil(rectotalWeight/rectimetaken))  \
| rename "rplTransmitBwc.totalWeightInKb" AS "transweightinkb", "rplTransmitBwc.numSeconds" AS "transtimetaken"  \
| eval transtotalWeight = `powerflex_convert_to_mb(transweightinkb)`  \
| eval "rplTbw"= if(timetaken=0,0,ceil(transtotalWeight/transtimetaken))  \
| stats max(rplRbw) as "rplRbwc", max(rplTbw) as "rplTbwc" by id] \
| eval journalCapacityInUseGb=round(`powerflex_convert_to_gb(capacityInUseInKb)`,2)  \
| eval protectedCapacityInTb=round(`powerflex_convert_to_tb(protectedCapacityInKb)`,2)  \
| join id [|inputlookup powerflex_lookup_system]  \
| table _time, id,name, journalCapacityInUseGb, protectedCapacityInTb, numOfRplCgs, rplRbwc, rplTbwc, lifetimeState \
| append [| inputlookup powerflex_lookup_rpl_stats] \
| dedup id sortby -_time \
| outputlookup powerflex_lookup_rpl_stats

[lookupfill_systems_in_rpl]
cron_schedule = */10 * * * *
description = Saved search to fill lookup for replication overview system stats
dispatch.earliest_time = -20m@m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = dell_powerflex_app_for_splunk
request.ui_dispatch_view = search
search = `powerflex_data` sourcetype="powerflex:instance:system" OR sourcetype="powerflex:instance:sdc" OR sourcetype="powerflex:instance:pd" OR sourcetype="powerflex:instance:sds" \
| eval to=case(sourcetype="powerflex:instance:system", 'mdmCluster.name'.":"."MDM", sourcetype="powerflex:instance:sdc", if(name="null",sdcIp +": SDC", name +": SDC"), (sourcetype="powerflex:instance:pd" OR sourcetype="powerflex:instance:sds"),name)  \
| eval from=systemId \
| eval type=if(id=systemId, "sitemap", "")  \
| eval color=if(sourcetype="powerflex:instance:system","blue","") \
| eval uniq=to+":"+sourcetype+systemId \
| eval flag="link" \
| table _time,from,to,value,type,color,id,sourcetype,systemId,uniq,flag \
| lookup powerflex_lookup_system id as from output name \
| rename name as from \
| dedup uniq \
| append [search `powerflex_data` sourcetype="powerflex:instance:system" OR sourcetype="powerflex:instance:sdc" OR sourcetype="powerflex:instance:pd" OR sourcetype="powerflex:instance:sds" \
| eval from=case(sourcetype="powerflex:instance:system", 'mdmCluster.name'.":"."MDM", sourcetype="powerflex:instance:sdc", if(name="null", sdcIp +": SDC", name +": SDC"), (sourcetype="powerflex:instance:pd" OR sourcetype="powerflex:instance:sds"),name) \
| eval to="" \
| eval type=case(sourcetype="powerflex:instance:system", "sitemap", (sourcetype="powerflex:instance:sdc" OR sourcetype="powerflex:instance:sds"), "database", sourcetype="powerflex:instance:pd", "server") \
| eval value=case(sourcetype="powerflex:instance:system",name ,sourcetype="powerflex:instance:sdc",'sdcIps{}' ,(sourcetype="powerflex:instance:pd" OR sourcetype="powerflex:instance:sds"),name) \
| rename mdmCluster.clusterState as "MDMClusterState"  \
| eval State=case(sourcetype="powerflex:instance:system",if(match(MDMClusterState,"Normal"),1,0), sourcetype="powerflex:instance:sdc", if(mdmConnectionState="Connected",1,0), sourcetype="powerflex:instance:pd", if(protectionDomainState="Active",1,0),  sourcetype="powerflex:instance:sds", if(sdsState="Normal",1,0)) \
| eval color=if(State=1,"green","red") \
| eval uniq=from+":"+sourcetype+systemId \
| eval flag="icon" \
| table _time,from,to,value,type,color,sourcetype,systemId,uniq,flag \
| eval value=if(sourcetype="powerflex:instance:sdc","Available SDC: "+tostring(mvcount(value))+" ["+mvjoin(value,"║")+"]",value) \
| dedup uniq] \
| eval pkey = flag+":"+uniq \
| dedup pkey \
| append [| inputlookup powerflex_lookup_systems_in_rpl] \
| dedup pkey sortby -_time \
| fields - flag,uniq \
| outputlookup powerflex_lookup_systems_in_rpl

[lookupfill_rcg_overview]
cron_schedule = */10 * * * *
description = Saved search to fill lookup for replication overview system stats
dispatch.earliest_time = -20m@m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = dell_powerflex_app_for_splunk
request.ui_dispatch_view = search
search = `powerflex_rcg_all`  \
| eval state = if(enabled="true", "Active", "Inactive")  \
| eval rpo = if(rpoInSeconds<60, toString(rpoInSeconds)."s", toString(ceil(rpoInSeconds/60))."m")  \
| eval rpoComp = rplCgRpoCompliance+"%"  \
| stats latest(_time) as _time, latest(name) as "Name", latest(abstractState) as "Status", latest(state) as "State", latest(rpo) as "RPO", latest(rpoComp) as RpoComp, latest(currConsistMode) as "Consistency", latest(remoteProtectionDomainName) as remotePDName, latest(remoteProtectionDomainId) as remotePDId by id,systemId \
| join type=left remotePDId  \
    [ search `powerflex_pd_instance`  \
    | dedup id  \
    | join type=left systemId  \
        [ search `powerflex_system_instance`  \
        | dedup systemId  \
        | rename name as targetSys  \
        | table targetSys,id \
        | rename id as systemId]  \
    | rename id as remotePDId \
    |table remotePDId, targetSys]  \
| join type=left systemId  \
    [| inputlookup powerflex_lookup_system  \
    | `powerflex_create_id_name_field`  \
    | rename id as systemId, name as srcSystem  \
    | table systemId, srcSystem]  \
| eval rplGrpId = id  \
| join type=left rplGrpId  \
    [ search `powerflex_data` sourcetype="powerflex:instance:rp"  \
    | dedup remoteVolumeName  \
    | table remoteVolumeName,replicationConsistencyGroupId  \
    | rename replicationConsistencyGroupId as rplGrpId  \
    | stats count(remoteVolumeName) as "Volume" by rplGrpId]  \
| table _time, Name, srcSystem, Status, State, RPO, RpoComp, Consistency, Volume, rplGrpId, systemId, remotePDName, targetSys \
| eval pkey=Name+srcSystem+targetSys \
| fillnull value="No data available"\
| append [| inputlookup powerflex_lookup_rcg_overview | fillnull value="No data available" | eval pkey=Name+srcSystem+targetSys] \
| dedup pkey sortby -_time\
| outputlookup powerflex_lookup_rcg_overview

[lookupfill_volume_details]
cron_schedule = */10 * * * *
description = Saved search to fill lookup for replication overview system stats
dispatch.earliest_time = -20m@m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = dell_powerflex_app_for_splunk
request.ui_dispatch_view = search
search = `powerflex_rp_instance` | dedup id \
| table _time,id, localVolumeId,remoteVolumeId, remoteVolumeName,initialCopyState,replicationConsistencyGroupId \
| join localVolumeId [ search `powerflex_volume_instance`|dedup id \
| eval Size = toString(round(`powerflex_convert_to_gb(sizeInKb)`,2))+" GB" \
| rename id as localVolumeId, name as localVolumeName, storagePoolId as spId \
| table Size, localVolumeName, localVolumeId, spId] \
| rename localVolumeName as srcVolume, remoteVolumeName as peerVolume \
| join spId [search `powerflex_sp_instance` | dedup id | rename id as spId, name as spName| table spId,spName ] \
| join id [search `powerflex_rp_statistics` | dedup id | eval "Progress" = toString(initialCopyProgress*100)+"%"  | table "Progress",id] \
| eval "arrow"=" → " \
| eval peerStorage=spName \
| rename spName as storagePool, initialCopyState as initCopy \
| eval pkey=srcVolume+peerVolume+replicationConsistencyGroupId \
| table _time,srcVolume, Size, storagePool, arrow, peerVolume, peerStorage, initCopy, Progress, replicationConsistencyGroupId, pkey \
| append [| inputlookup powerflex_lookup_volume_details | eval pkey=srcVolume+peerVolume+replicationConsistencyGroupId] \
| dedup pkey sortby -_time \
| fields - pkey \
| outputlookup powerflex_lookup_volume_details

