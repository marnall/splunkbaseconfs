[aws_detect_signin_credential_stuffing]
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = Alert to detect AWS Credential Stuffing attack on the AWS signin console
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","accountId","eventName","eventSource","errorCode","requestParameters.findingIds{}"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.patterns.sensitivity = 0.5
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = splunkawssecuritymon
request.ui_dispatch_view = search
search = `aws_cloudtrail_search`\
`aws_cloudtrail_rename_fields` \
| where eventSource = "signin.amazonaws.com" AND like(eventName,"%ConsoleLogin%") AND  errorCode = "failure"\
| stats count, latest(eventTime) as timestamp, values(errorMessage) as errorMessage, values(userIdentityArn) as userIdentityArn, values(userAgent) as userAgent, values(userIdentityUserName) as userIdentityUserName, values(userIdentityAccountId) as userIdentityAccountId, values(sourceIPAddress) as sourceIPAddress, values(awsRegion) as awsRegion by eventName, errorCode\
```Modify this threshold as appropriate (per hour or as per alert setting) ```\
| eval alertThreshold = 30\
| where count > alertThreshold\
| nomv errorMessage\
| nomv userIdentityArn\
| nomv userAgent\
| nomv userIdentityUserName\
| nomv userIdentityAccountId\
| nomv sourceIPAddress\
| nomv awsRegion\
| eval severity = "HIGH" \
| eval summary = "Excessive AWS Failed Login Attempts indicating credential stuffing"\
| eval body = "username: " . userIdentityUserName . "\
userAgent: " . userAgent . "\
eventName: " . eventName . "\
sourceIPAddress: " . sourceIPAddress . "\
accountID: " . userIdentityAccountId . "\
userName: " .  userIdentityUserName . "\
errorCode: " . errorCode . "\
errorMessage: " . errorMessage . "\
region: " . awsRegion\
| eval mitre_tactic = "TA0006 Credential Access" \
| eval mitre_technique = "T1110 Brute Force" \
| eval mitre_subtechnique = "T1110.004 Credential Stuffing" \
`aws_output_alert`
