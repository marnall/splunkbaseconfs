[aws_detect_cloud_infrastructure_discovery_via_golang_smogcloud]
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = AWS Cloud Infrastructure Discovery via Golang tools such as Bishop Fox's smogcloud
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","accountId","eventName","eventSource"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.patterns.sensitivity = 0.5
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = splunkawssecuritymon
request.ui_dispatch_view = search
search = `aws_cloudtrail_search` \
| transaction maxspan=120s userAgent\
`aws_cloudtrail_rename_fields`\
`aws_exclude_trivial_events`\
| where like(userAgent, "%aws-sdk-go%")\
| where (eventSource = "lightsail.amazonaws.com" AND eventName = "GetInstances") AND\
        (eventSource = "mediastore.amazonaws.com" AND eventName = "ListContainers") AND \
        (eventSource = "redshift.amazonaws.com" AND eventName = "DescribeClusters") AND \
        (eventSource = "elasticbeanstalk.amazonaws.com" AND eventName = "DescribeEnvironments") AND \
        (eventSource = "es.amazonaws.com" AND eventName = "ListDomainNames")\
| eval severity = "MEDIUM"\
| eval summary = "Cloud Infrastructure Discovery via Golang Tools (e.g. BishopFox's smogcloud)"\
| eval body = "username: " . userIdentityUserName . "\
userAgent: " . userAgent . "\
userIdentityArn: " . userIdentityArn . "\
region: " . awsRegion \
| eval mitre_tactic = "TA0007 Discovery" \
| eval mitre_technique = "T1580 Cloud Infrastructure Discovery" \
| eval mitre_subtechnique = "-" \
`aws_output_alert`

