#
# PPS eventtypes
#

# Send message to next hop
[pps-send]
search = cmd=send

# AntiSpam
[pps-spam]
search = module=spam

# Spam Weights
[pps-spamweights]
search = module=spamweights

# Anti Virus
[pps-av]
search = (module=av OR mod=av)

# URL Rewrite
[pps-urldefense]
search = (mod=urldefense OR module=threatprotect)

# Attachments
[pps-attachment]
search = cmd=attachment

# Start of a message
[pps-start]
search = cmd=start

# Message being split
[pps-split]
search = cmd=split

# Quarantine Digest
[ppsmaillog-queueddigest]
search = queued-digest

# Sender
[pps-mail_from]
search = mod=mail cmd=env_from

# Recipient
[pps-mail_to]
search = mod=mail cmd=env_rcpt

# End of Message
[pps-disconnect]
search = cmd=disconnect

# Quarantine Folder
[pps-folder]
search = cmd=store

# AntiSpam Results
[pps-spam-details]
search = mod=spam cmd=run

# DKIM Verification
[pps-dkimv]
search =  mod=dkimv 

# Email Firewall
[pps-access]
search = mod=access

# Digital Assets
[pps-asset]
search = mod=asset

# Bounce Management
[pps-batv]
search = mod=batv

# Connection start
[pps-connect]
search = mod=session cmd=connect

# Encryption
[pps-crypto]
search = mod=crypto

# Conversion Engine
[pps-cvt]
search = mod=cvt

# DKIM
[pps-dkim]
search = mod=dkim

# DMARC
[pps-dmarc]
search = mod=dmarc

# DNS
[pps-dns]
search = mod=dns

# Filter functions such as reloading or refreshing the filter
[pps-filter]
search = mod=filter

# http calls to proofpoint systems
[pps-http]
search = mod=http

# Actual mail commands transmitted from sender to receiver
[pps-mail]
search = (mod=mail OR module=mail)

# communication between filter process and sendmail process
[pps-milter]
search = mod=milter

# Proofpoint Dynamic Reputation
[pps-pdr]
search = (mod=pdr OR module=pdr OR module=PRS)

# perl actions
[pps-perl]
search = mod=perl

# Regulation
[pps-regulation]
search = mod=regulation

# Functions of the Rest API to communicate with proofpoint pdr servers
[pps-rest]
search = mod=rest

# Attachment Defense
[pps-sandbox]
search = (mod=sandbox OR module=sandboxattacheng)

# Sender Policy Framework
[pps-spf]
search = mod=spf


# Actual mail commands transmitted from proofpoint filter to sender
[pps-smtpsrv]
search = (mod=smtpsrv OR module=smtpsrv)

# ZeroHour AV
[pps-zerohour]
search = (mod=zerohour OR module=zerohour)

# CLX
[pps-clx]
search = module=clx

# Content Control
[pps-contentcontrol]
search = module=contentcontrol

# Quarantine Database Backup
[pps-dbbackup]
search = module=dbbackup

# dictionary
[pps-dictionary]
search = module=dictionary

# dlprulesync
[pps-dlprulesync]
search = module=dlprulesync

# fsecurevirusdef
[pps-fsecurevirsdef]
search = module=fsecurevirusdef

# fsecureviruseng
[pps-ffsecureviruseng]
search = module=ffsecureviruseng

# icap
[pps-icap]
search = module=icap

# languagedefs
[pps-languagedefs]
search = module=languagedefs

# navivirusdef
[pps-navivirusdef]
search = module=navivirusdef

# navviruseng
[pps-navviruseng]
search = module=navviruseng

# ncs
[pps-ncs]
search = module=ncs

# patch
[pps-patch]
search = module=patch*

# popin  - Outlook/Lotus Notes FN Posting Plugin
[pps-popin]
search = module=popin

# pps_decrypt - Proofpoint Encryption - Secure Reader
[pps-pp_decrypt]
search = module=pp_decrypt

# pps_encrypt - Proofpoint Encryption - Encrypt
[pps-pp_encrypt]
search = module=pp_encrypt

# pps_encrypt_plugin - Proofpoint Encryption - Plug-in
[pps-pp_encrypt_plugin]
search = module=pp_encrypt_plugin

# ppscloudaccess -  PPS Cloud Access
[pps-ppscloudaccess]
search = module=ppscloudaccess

# pss - Proofpoint Smart Search
[pps-pss]
search = module=pss

# secureshare - Proofpoint Secure Share
[pps-secureshare]
search = module=secureshare

# service - Proofpoint Protection Server
[pps-service]
search = module=service

# usersync - User Sync for Cloud Service
[pps-usersync]
search = module=usersync

# verityeng - Verity Engine
[pps-verityeng]
search = module=verityeng

# voltage - Proofpoint Secure Messaging
[pps-voltage]
search = module=voltage

