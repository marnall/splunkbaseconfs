 [ppsmaillog-mm_sender_id]
# # May 30 15:19:40 09-lmparse.example.com MM: [Jilter Processor 12 \
# #  - Async Jilter Worker 28 - 127.0.0.1:64361-m4UJJU40025784] INFO \
# #   user.log  - mtaqid=m4UJJU40025784, pra=kodakeasyshare@emails.kodak.com, \
# #  relay=kodak-163.kodak.postdirect.com [206.165.246.163], sid-status=PASS
# # May 30 15:19:49 09-lmparse.example.com MM: [Jilter Processor 13 \
# #  - Async Jilter Worker 22 - 127.0.0.1:64401-m4UJJd0N025840] INFO \
# #   user.log  - mtaqid=m4UJJd0N025840, pra=gldlist@yahoogroups.com, \
# #  relay=n40d.bullet.mail.sp1.yahoo.com [66.163.169.146], sid-status=PERMERROR
# # May 30 15:19:50 09-lmparse.example.com MM: [Jilter Processor 14 \
# #  - Async Jilter Worker 12 - 127.0.0.1:64418-m4UJJhuw025862] INFO \
# #   user.log  - mtaqid=m4UJJhuw025862, pra=pentecost@gravegarden.org, \
# #  relay=www.gamerz.net [66.92.144.25], sid-status=NONE
# #
# # Splunk "magically" converts the logged string sid-status to sid_status
