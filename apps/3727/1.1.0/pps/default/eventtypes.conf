[ppsmaillog-mta_from]
# Nov 19 00:33:53 09-lmparse-mx1.example.com sm-mta[18378]: lAJGXq9U018378: \
# #  from=<nobody@example.com>, size=10107, class=0, nrcpts=1, \
# #  msgid=<6E05344E8A933549A9F022026B22A1F46B3D15@platypus.example.com>, \
# #  proto=ESMTP, daemon=Daemon1, tls_verify=OK, auth=PLAIN, \
# #  relay=platypus.example.com [10.210.100.144]
# #
# # This equates is written in every from= line from the MTA regardless
# # of its value.
 search = tls_verify

 [ppsmaillog-mta_to]
# # Nov 19 00:33:54 09-lmparse-mx1.uk.example.com sm-mta[18381]: lAJGXq9U018378: \
# #  to=<nobody@smtp.example.com>, delay=1+14:08:35, xdelay=00:00:00, \
# #  mailer=lmtp, pri=130107, relay=[wombat.sendmail.local] [10.4.1.35], \
# #  dsn=2.0.0, stat=Sent
# # Nov 19 00:36:17 09-lmparse-mx1.example.com sm-mta[19656]: lAJGaETu019645: \
# #  to=<autumnspatlaird@peoplespot.com>, delay=00:00:02, xdelay=00:00:01, \
# #  mailer=esmtp, pri=123301, relay=peoplespot.com. [66.135.56.197], \
# #  dsn=4.0.0, stat=Deferred: Connection refused by peoplespot.com.
# # Aug 16 23:59:12 sentrion-host.example.com sm-mta[26917]: p7H6x9t5026917: \
# #  to=<guenther@example.com>, delay=00:00:01, pri=46326, stat=Spam
# #
# # These equates are written by the MTA for every delivery
# # (as seen in sendmail/deliver.c:logdelivery())
# # delay, pri, stat, to
# #
# # MM's outbound SMTP processor will also write log lines with to,
# # mailer= and stat=, so the old definition won't work anymore.
 search = delay=* pri=* stat=* to=*

[ppsmaillog-mta_ruleset]
# Nov 19 00:33:50 09-lmparse-mx1.uk.example.com sm-mta[18354]: lAJGXoAX018354: \
# #  ruleset=check_rcpt, arg1=<mgoldstein@example.com>, \
# #  relay=host86-142-170-73.range86-142.btcentralplus.com [86.142.170.73], \
# #  reject=553 5.1.8 <mgoldstein@example.com>... \
# #  Domain of sender address paul16arjunasa7@TelCoSelect.com does not exist
# #
# # In order to avoid language that might contain the word 'ruleset',
# # we specify that the search field 'ruleset' can take any value.
search = ruleset=*

