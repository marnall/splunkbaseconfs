[audit_st]
REGEX = IngrianAudit
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::audit-st

[activity_st]
REGEX = IngrianActivity
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::activity-st

[system_st]
REGEX = IngrianSystem
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::system-st

[pfmgr_st]
REGEX = IngrianFSTools
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::pfmgr-st

[kslogfile]
DEST_KEY = MetaData:Host
REGEX = ^.+?((?:\d+\.){3}\d+).+$
FORMAT = host::$1
