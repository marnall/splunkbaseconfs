[conceal_event]
EVAL-app = case(event == "Conceal Scanned URL", Conceal)
EVAL-severity = case(final_decision == “allow”, low, final_decision == “redirect”, medium, final_decision == “isolate”, high, final_decision == “block”, critical)
FIELDALIAS-aob_gen_conceal_event_alias_1 = url AS dest
FIELDALIAS-aob_gen_conceal_event_alias_2 = user_email AS user
FIELDALIAS-aob_gen_conceal_event_alias_3 = url AS dest_url
FIELDALIAS-aob_gen_conceal_event_alias_4 = user_email AS email
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
