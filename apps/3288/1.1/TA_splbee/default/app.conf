[launcher]
remote_tab = true
version = 1.1
description = The splbee app contains a custom python command called sendjobmeta that allows a user to forward search job results to another Splunk instance. It also contains some example data to get started in the spl_bee index.
author = stephen_luedtke

[package]
id = TA_splbee
check_for_updates = false

[install]
state = enabled
state_change_requires_restart = true
is_configured = false
build = 1.1

[ui]
is_visible = true
is_manageable = false
label = Add-on for SPLBee

