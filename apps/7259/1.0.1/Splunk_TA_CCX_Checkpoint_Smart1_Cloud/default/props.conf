EVAL-action = case(subject IN("Administrator Login","Administrator Logout","Management CDM Object Manipulation"), case(audit_status == "Failure", "failure", true(), "success"), operation == "Create Object", "created", (operation == "Modify Object" OR match('action',"^.*Changed")), "modified", operation == "Delete Object", "deleted", (isnotnull(fieldschanges) OR event_name == "Policy installation" OR subject == "Policy Installation"), "modified", product IN("Scheduled system update", "Web-UI") AND action == "Accept", "modified", product IN ("SmartDashboard", "SmartUpdate") AND operation == "File Retrieved", "read", product == "SmartDashboard" AND operation IN("Initialize User Registration Key","Initialize SIC Certificate"), "created", product == "SmartDashboard" AND operation IN("Update User Certificate Description","Disable User Registration Key"), "modified", isnotnull(protection_name) OR isnotnull(smartdefense_profile) OR isnotnull(hll_key), case(match(event_action, "^Accept|Allow"), "allowed", event_action IN("Drop","Detect","Prevent"), "blocked"), true(), action)
EVAL-app = case(subject IN("Administrator Login","Administrator Logout","Management CDM Object Manipulation") OR event_name="Check Point administrator login at irregular hours", product, product IN("SmartEvent Client","Security Gateway/Management") AND isnotnull(failure_impact), product, match(sys_message,"Your network may be at risk"), product, true(), app)
EVAL-body = coalesce(reason,failure_impact,sys_message,fw_message,update_status,status,description,subscription_stat_desc,result,event_name,event_type,body)
EVAL-category = coalesce(protection_type, category)
EVAL-change_type = case(update_status="updated" AND isnotnull('db_ver'), "filesystem", subject IN("Administrator Login","Administrator Logout"), null(), product IN("Scheduled system update"), operation, event_type == "Policy Update" OR event_name == "Policy installation", "filesystem", subject IN("Object Manipulation","Policy Installation","File Operation"), "filesystem", event_type IN("Status Changed"), event_type, true(), coalesce(subject,change_type))
EVAL-command = coalesce(operation, command)
EVAL-dest = coalesce(dst, dest, dest_ip, case(update_status IN("Blade activated", "Blade deactivated", "failed"), host, ifdir == "inbound" OR (update_status="updated" AND isnotnull(db_ver)), origin, ifdir == "outbound", client_ip))
EVAL-dest_port = coalesce(dest_port, service)
EVAL-dest_ip = coalesce(dst, dest, dest_ip, case(update_status IN("Blade activated", "Blade deactivated", "failed"), if(match(host,"(?:\d+\.\d+\.\d+\.\d+)"),host,null), ifdir == "inbound" OR (update_status="updated" AND isnotnull(db_ver)), origin, ifdir == "outbound", client_ip))
EVAL-dvc = coalesce(origin,dvc)
EVAL-id = coalesce(loguid,id)
EVAL-ids_type= case((isnotnull(malware_action) OR isnotnull(protection_name)) AND isnull(file_name), case(isnotnull(ifname) OR isnotnull(proto) OR isnotnull(smartdefense_profile), "network", isnotnull(client_name),"host"))
EVAL-object = coalesce(object_name, objectname, case(match(additional_info,"[Ll]icense"),"license"), session_name, object)
EVAL-object_id = coalesce(object_id, object_name, objectname)
EVAL-object_category = coalesce(objecttype, case(subject == "Object Manipulation", "file", event_name == "Policy installation", "policy"), object_category)
EVAL-reason = case(subject IN("Administrator Login","Administrator Logout"), subject, true(), coalesce(reason,operation_errors))
EVAL-result = coalesce(fieldschanges, description, additional_info, result)
EVAL-rule = coalesce(rule_name, app_rule_name, policy_name, rule)
EVAL-rule_id = coalesce(rule_uid, app_rule_id, rule_id)  
EVAL-session_id = coalesce(hll_key,session_id)
EVAL-signature = coalesce(protection_name, signature,operation_errors)
EVAL-signature_id = coalesce(protection_id, signature_id)
EVAL-src = coalesce(src, src_ip, case(ifdir == "outbound", origin))
EVAL-src_port = coalesce(s_port, src_port)
EVAL-src_ip = coalesce(src, src_ip, case(ifdir == "outbound", origin))
EVAL-src_user = coalesce(src_user, src_user_name, administrator)
EVAL-src_user_name = coalesce(src_user_name, src_user, administrator)
EVAL-status = coalesce(lower(audit_status),case(isnotnull(fieldschanges),"success",isnotnull(operation) AND isnull(failure_impact), "success", update_status == "updated", "success", event_type IN("Policy Update", "Status Changed") AND isnull(failure_impact), "success", event_name IN("Policy installation") AND isnull(failure_impact), "success", match(op_type,"Repair"), "success", true(), lower(status)))
EVAL-transport = coalesce(proto, transport)
EVAL-type = case(isnotnull(alert) OR event_name == "Check Point administrator login at irregular hours", "alert", true(), case(severity IN ("Critical","High","3","4"), "alert", severity IN("Informational","Low","Medium","0","1","2"), "event"))
EVAL-user = mvdedup(coalesce('x_user', 'x_src_user', 'user'))
EVAL-user_name = coalesce(user_name, src_user, src_user_name, administrator, user)
EVAL-vendor_product = "Checkpoint Smart-1 Cloud:"+'product'

EXTRACT-ccx_checkpoint_extract_user = (?:\s+user):\"(?<extract_user>[^\"]+)
EXTRACT-ccx_checkpoint_extract_src_user_name = (?:\s+src_user_name):\"(?<extract_src_user_name>[^\"]+)
REPORT-ccx_checkpoint_extraction_x_src_user = ccx_checkpoint_extraction_x_src_user
REPORT-ccx_checkpoint_extraction_x_user = ccx_checkpoint_extraction_x_user

