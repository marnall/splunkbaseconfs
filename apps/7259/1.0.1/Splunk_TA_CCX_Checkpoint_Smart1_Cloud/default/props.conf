##INGESTION: Smart-1 LogExporter (Syslog)
[cp_cloud:syslog]
SHOULD_LINEMERGE = false
EVENT_BREAKER_ENABLE = true
KV_MODE = NONE

TRANSFORMS-set_source_checkpoint_cloud = checkpoint_cloud_default_source, checkpoint_cloud_firewall_subproduct_source, checkpoint_cloud_audit_source, checkpoint_cloud_email_source, checkpoint_cloud_endpoint_source, checkpoint_cloud_firewall_source, checkpoint_cloud_ids_source, checkpoint_cloud_ids_malware_source, checkpoint_cloud_sessions_source, checkpoint_cloud_web_source, checkpoint_cloud_network_source
REPORT-kv_cp_cloud_syslog_format = kv_cp_cloud_syslog_format
EXTRACT-ccx_encap_json = (?<ccx_encap_json>{([^}]*)})

FIELDALIAS-event_action = action AS event_action

EVAL-dest_interface = coalesce(client_outbound_interface,dest_interface)
EVAL-http_referrer = coalesce(referrer,http_referrer)
EVAL-dest_zone = coalesce(outzone,dest_zone)
EVAL-severity = case(severity IN("0","Informational"), "informational", severity IN("1","Low"), "low", severity IN("2","Medium"), "medium", severity IN("3","High"), "high", severity IN("4","Critical"), "critical")
EVAL-severity_id = case(severity IN("0","Informational"), "0", severity IN("1","Low"), "1", severity IN("2","Medium"), "2", severity IN("3","High"), "3", severity IN("4","Critical"), "4")
EVAL-src_zone = coalesce(inzone,src_zone)
EVAL-recipient = coalesce(to,recipient)
EVAL-sender = coalesce(from,sender)
EVAL-subject = coalesce(email_subject,subject)
EVAL-change_type = case(update_status="updated" AND isnotnull('db_ver'), "filesystem", subject IN("Administrator Login","Administrator Logout"), null(), product IN("Scheduled system update"), operation, event_type == "Policy Update" OR event_name == "Policy installation", "filesystem", subject IN("Object Manipulation","Policy Installation","File Operation"), "filesystem", event_type IN("Status Changed"), event_type, true(), coalesce(subject,change_type))
EVAL-http_user_agent = replace(coalesce(user_agent,web_client_type), "^.+\:\s\s*", "")

LOOKUP-checkpoint_cloud_transport_protocols = checkpoint_cloud_transport_protocols transport_id AS transport OUTPUT protocol, transport
LOOKUP-checkpoint_cloud_service_app = checkpoint_cloud_service_app service OUTPUTNEW app

