[checkpoint_cloud_syslog_ids_attack]
search = (sourcetype=cp_cloud:syslog) AND ((product="IPS" AND protection_type=*) OR (protection_type IN("DNS reputation","URL reputation") AND malware_family IN("Adware","Generic"))) NOT (update_status IN("Blade activated","Blade deactivated")) NOT eventtype="checkpoint_cloud_syslog_malware_attack"
#tags = ids attack

[checkpoint_cloud_syslog_network_traffic]
search = (sourcetype=cp_cloud:syslog) AND (((proto=* OR nat_rulenum=*) OR (product="URL Filtering" AND conn_direction=*)) NOT (product="DLP" OR alert=* OR malware_action=* OR protection_name=* OR file_name=* OR event_name="IP sweep from external network" OR cvpn_category="Session"))
#tags = network communicate

[checkpoint_cloud_syslog_change]
search = (sourcetype=cp_cloud:syslog) AND (product="Mobile App" AND event_status IN("Installed","Removed"))
#tags = change

[checkpoint_cloud_syslog_change_audit]
search = (sourcetype=cp_cloud:syslog) AND (fieldschanges=* OR (product IN("SmartDashboard","license-mgmt","SmartUpdate","Core") OR (product IN("MEPP","Media Encryption & Port Protection") AND event_type="File Operation") OR (product IN("Anti-Bot","Threat Emulation","URL Filtering","Application Control") AND (update_status="updated")) OR (event_name="Policy installation" OR subject="Policy Installation") OR new_status=* OR (product IN("Endpoint Security Console") AND objectname=*) NOT (update_status IN("Blade activated","Blade deactivated","failed") OR subject IN("Administrator Login","Administrator Logout") OR event_name="Check Point administrator login at irregular hours")))
#tags = change audit

[checkpoint_cloud_syslog_alert]
search = (sourcetype=cp_cloud:syslog) AND ((product="Anti-Bot" AND subscription_stat=*) OR (event_name="IP sweep from external network") OR (product="DLP" AND info="*Bypassing DLP*") OR product="RAD" OR (product="iOS Profiles" AND protection_type=*) OR (product="Zero Phishing" NOT protection_name=*) OR (product="SmartEvent Client" AND failure_impact=*) OR product="OS Exploits" OR product="Network Security" OR (product="System Monitor" AND sys_message="*Your network may be at risk*") OR (product IN("Endpoint Compliance") NOT new_status=*) OR (product IN("Anti-Malware") NOT event_type="Infection") OR (product="Device") OR (product IN("Firewall","HTTPS Inspection","Security Gateway/Management") AND (failure_impact=*)) OR (product="Compliance" AND event_type="Compliance Check Not Met") OR (event_name="Check Point administrator login at irregular hours") OR (product="Threat Emulation" AND event_type="TE Info Event") OR (update_status IN("Blade activated","Blade deactivated","failed")) OR (alert=* NOT protection_name=*))
#tags = alert

[checkpoint_cloud_syslog_malware_attack]
search = (sourcetype=cp_cloud:syslog) AND (((malware_action=* OR protection_name=* OR attack=*) AND (file_name=* OR remediated_files=*)) OR (file_name=* AND protection_type=*) OR event_type="Ransomware Detection" OR (product="Threat Emulation" AND description="*Detected malicious file*")) NOT ((protection_type IN("DNS reputation","URL reputation") AND malware_family IN("Adware","Generic")))
#tags = malware attack

[checkpoint_cloud_syslog_general_ids_attack]
search = (sourcetype=cp_cloud:syslog) AND ((malware_action=* OR protection_name=* OR attack=*) NOT (file_name=* OR event_type="Password Reuse" OR remediated_files=*)) NOT eventtype IN("checkpoint_cloud_syslog_malware_attack","checkpoint_cloud_syslog_general_malware_attack","checkpoint_cloud_syslog_ids_attack")
#tags = ids attack

[checkpoint_cloud_syslog_authentication]
search = (sourcetype=cp_cloud:syslog) AND (subject IN("Administrator Login") OR auth_method="*" OR (product IN("Management Blade") AND signature="Connection refused*"))
#tags = authentication

[checkpoint_cloud_syslog_web]
search = (sourcetype=cp_cloud:syslog) AND url="*"
#tags = web

[checkpoint_cloud_syslog_network_session]
search = (sourcetype=cp_cloud:syslog) AND source="checkpoint:network" cvpn_category="Session"
#tags = network session vpn

[checkpoint_cloud_syslog_general_malware_attack]
search = (sourcetype=cp_cloud:syslog) AND (malware_action=* OR attack=* OR (protection_name=* AND content_risk!=0)) file_hash="*" NOT ((protection_type IN("DNS reputation","URL reputation") AND malware_family IN("Adware","Generic"))) NOT eventtype="checkpoint_cloud_syslog_malware_attack"
#tags = attack malware

[checkpoint_cloud_syslog_email_filter]
search = (sourcetype=cp_cloud:syslog) AND sender="*" recipient="*" subject="*"
#tags = email filter
