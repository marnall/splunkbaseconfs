[script:custom_endpoint_recover_alert]
match=/recover_alert
handler=custom_endpoint_recover_alert.Recover
python.version = python3
script                = custom_endpoint_recover_alert.py
scripttype            = persist
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth        = true
