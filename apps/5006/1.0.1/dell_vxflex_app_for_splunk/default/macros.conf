[vxflex_data]
definition = (index=main)


[vxflex_system_instance]
definition = `vxflex_data` sourcetype="vxflex:instance:system"

[vxflex_system_statistics]
definition = `vxflex_data` sourcetype="vxflex:statistics:system"

[vxflex_sds_instance]
definition = `vxflex_data` sourcetype="vxflex:instance:sds"

[vxflex_sds_statistics]
definition = `vxflex_data` sourcetype="vxflex:statistics:sds"

[vxflex_sdc_instance]
definition = `vxflex_data` sourcetype="vxflex:instance:sdc"

[vxflex_sdc_statistics]
definition = `vxflex_data` sourcetype="vxflex:statistics:sdc"

[vxflex_volume_instance]
definition = `vxflex_data` sourcetype="vxflex:instance:volume"

[vxflex_volume_statistics]
definition = `vxflex_data` sourcetype="vxflex:statistics:volume"

[vxflex_device_instance]
definition = `vxflex_data` sourcetype="vxflex:instance:device"

[vxflex_device_statistics]
definition = `vxflex_data` sourcetype="vxflex:statistics:device"

[vxflex_pd_instance]
definition = `vxflex_data` sourcetype="vxflex:instance:pd"

[vxflex_pd_statistics]
definition = `vxflex_data` sourcetype="vxflex:statistics:pd"

[vxflex_sp_instance]
definition = `vxflex_data` sourcetype="vxflex:instance:sp"

[vxflex_sp_statistics]
definition = `vxflex_data` sourcetype="vxflex:statistics:sp"

[vxflex_faultset_instance]
definition = `vxflex_data` sourcetype="vxflex:instance:faultset"

[vxflex_faultset_statistics]
definition = `vxflex_data` sourcetype="vxflex:statistics:faultset"

[vxflex_snapshotpolicy_instance]
definition = `vxflex_data` sourcetype="vxflex:instance:snapshotpolicy"

[vxflex_snapshotpolicy_statistics]
definition = `vxflex_data` sourcetype="vxflex:statistics:snapshotpolicy"

[vxflex_vtree_instance]
definition = `vxflex_data` sourcetype="vxflex:instance:vtree"

[vxflex_vtree_statistics]
definition = `vxflex_data` sourcetype="vxflex:statistics:vtree"

[vxflex_alerts]
definition = `vxflex_data` sourcetype="vxflex:alerts" NOT alertType="MDM_CREDENTIALS_ARE_NOT_CONFIGURED"


[vxflex_create_id_name_field]
definition = eval id_name=if(isnull(name) or name="null", id, name." - ".id)

[vxflex_critical_alerts]
definition = ("MDM_NOT_CLUSTERED", "MDM_FAILS_OVER_FREQUENTLY", "FWD_REBUILD_STUCK", "BKWD_REBUILD_STUCK", "REBALANCE_STUCK", "CLUSTER_DEGRADED", "MDM_NOT_CLUSTERED_VOLUMES_EXIST", "STORAGE_POOL_HAS_FAILED_CAPACITY", "CAPACITY_UTILIZATION_ABOVE_CRITICAL_THRESHOLD", "BACKGROUND_SCANNER_COMPARE_ERROR", "CERTIFICATE_ABOUT_TO_EXPIRE", "MDM_CERTIFICATE_EXPIRED", "NET_CAPACITY_CRITICAL_USAGE", "NET_CAPACITY_FULL_USAGE", "USER_DATA_CRITICAL_USAGE", "USER_DATA_FULL_USAGE",)

[vxflex_convert_to_mb(1)]
args = field
definition = (($field$)/1024)

[vxflex_convert_to_gb(1)]
args = field
definition = (($field$)/(1024*1024))

[vxflex_convert_to_tb(1)]
args = field
definition = (($field$)/(1024*1024*1024))
