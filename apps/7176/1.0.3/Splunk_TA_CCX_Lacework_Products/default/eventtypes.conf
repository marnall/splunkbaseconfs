[ccx_lacework_anomaly_intrusion_detection]
search = (sourcetype="ccx:lacework:alerts") logtype="Anomaly" log_subtype IN("Application","Cloud Activity","Machine","User") ids_type="*"
#tags = ids attack

[ccx_lacework_anomaly_network_traffic]
search = (sourcetype="ccx:lacework:alerts") logtype="Anomaly" log_subtype IN("Application","Machine")
#tags = network communicate

[ccx_lacework_anomaly_alerts]
search = (sourcetype="ccx:lacework:alerts") logtype="Anomaly" log_subtype IN("Cloud Activity","Machine","User") type="*"
#tags = alert

[ccx_lacework_policy_authentication]
search = (sourcetype="ccx:lacework:alerts") logtype="Policy" log_subtype IN("Cloud Activity") EVENT_TYPE IN("FailedConsoleLogin")
#tags = authentication

[ccx_lacework_policy_alerts]
search = (sourcetype="ccx:lacework:alerts") logtype="Policy" log_subtype IN("Cloud Activity") type="*"
#tags = alert

[ccx_lacework_anomaly_intrusion_detection_supplement1]
search = (sourcetype="ccx:lacework:alerts") logtype="Anomaly" log_subtype IN("Threat Intel","Container Vulnerability","Host Vulnerability","File")
#tags = ids attack

[ccx_lacework_anomaly_alerts_supplement1]
search = (sourcetype="ccx:lacework:alerts") logtype="Anomaly" log_subtype IN("Compliance","Platform","Kubernetes Activity","Registry","SystemCall")
#tags = alert

[ccx_lacework_policy_alerts_supplement1]
search = (sourcetype="ccx:lacework:alerts") logtype="Policy" NOT eventtype IN("ccx_lacework_policy_authentication","ccx_lacework_policy_alerts")
#tags = alert

[ccx_lacework_composite_intrusion_detection_supplement1]
search = (sourcetype="ccx:lacework:alerts") logtype="Composite"
#tags = ids attack

[ccx_lacework_file_hash_tracking_malware_operations]
search = (sourcetype="ccx:lacework:alerts") file_hash="*"
#tags = malware operations