#
# Splunk app configuration file
#

[install]
is_configured = 0

[ui]
is_visible = 1
label = VirusTotal Malware Lookup for Splunk
setup_view = setup_page_dashboard

[launcher]
author = ADARMA
description = Technical Addon for obtaining threat intelligence from VirusTotal about known malicious file hashes, URLs, domains, and IP addresses
version = 2.4.0

[package]
id = TA-VirusTotal
check_for_updates = true

[triggers]
reload.virustotal = simple