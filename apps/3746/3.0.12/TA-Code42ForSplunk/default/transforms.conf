#### SEARCH EXTRACTIONS ###
[rewrite_eventgen]
DEST_KEY = MetaData:Source
REGEX = .
FORMAT = source::eventgen
SOURCE_KEY = _raw
### KV STORE LOOKUPS ####

[mi_code42]
external_type = kvstore
collection = mi_code42
fields_list = _key, internal_id, checkpoint_name

[mi_code42_users]
external_type = kvstore
collection = mi_code42_users
fields_list = _key, last_stored, user_uuid, active, last_login, user_email

[mi_code42_cursor]
external_type = kvstore
collection = mi_code42_cursor
fields_list = _key, user_uuid, plan_id, cursor, last_updated

### CSV LOOKUPS ###
[code42_users]
filename = code42_users.csv

[code42_computers]
filename = code42_computers.csv

[code42_alertlog]
filename = code42_alertlog.csv