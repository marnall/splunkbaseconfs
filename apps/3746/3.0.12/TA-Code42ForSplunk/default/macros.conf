[code42_idx]
definition = eventtype=code42_idx

[code42_error]
definition = eventtype=code42_error | table *

[code42_api]
definition = eventtype=code42_api

[code42_user]
definition = eventtype=code42_user

[code42_computer]
definition = eventtype=code42_computer

[code42_org]
definition = eventtype=code42_org

[code42_alertlog]
definition = eventtype=code42_alertlog

[code42_restore]
definition = eventtype=code42_restore

[code42_security]
definition = eventtype=code42_security

[code42_error_panel_base]
definition = `code42_error` | table *

[code42_configured_inputs]
definition = metadata type=hosts sourcetype=code42:* | stats count by host| rename host as hostname

[code42_last_checkpoint]
definition = `code42_api` | stats latest(timestamp) as timestamp by host  |rename timestamp AS "Checkpoint Time" | table host, "Checkpoint Time"

[code42_last_5_checkpoints_by_event_type(1)]
args = selected_host
definition = `code42_api` host="$selected_host$"  | head 5 | rename timestamp AS "Checkpoint Time"  total_events AS "Total Events" | table "Checkpoint Time", host, endpoint, "Total Events"

[code42_mc_health_check_api]
definition = `code42_error_panel_base` | eval is_recent = now() - (3600 * 24 * 5), is_recent = if(_time > is_recent,"true", "false")| search is_recent="true"| stats count AS total_failures, latest(message) as message values(is_recent) as ir values(_time) as time by host | eval severity_level = case(total_failures == 0, 0, total_failures > 0, 3)| rename host AS instance | fields instance total_failures message severity_level

[code42_instance_detail_events(1)]
args = selected_computer
definition = `code42_computer` $selected_computer$ | stats latest(name) AS name latest(status) AS status latest(blocked) AS blocked latest(alertStates{}) AS alertState latest(backupUsage{}.archiveBytes) AS archiveBytes latest(creationDate) AS creationDate latest(backupUsage{}.lastConnected) AS lastConnected latest(backupUsage{}.lastBackup) AS lastBackup latest(backupUsage{}.lastCompletedBackup) AS lastCompletedBackup latest(backupUsage{}.percentComplete) AS percentComplete latest(backupUsage{}.targetComputerName) AS backupTarget latest(user) as User by guid


[code42_ctc_backup_counts]
definition = (eventtype=code42_idx sourcetype="code42:computer" active="true")| stats latest(*) as * by guid  | rename backupUsage{}.* as * | fields lastCompletedBackup guid active | eval time_since_backup=if(isnull(strptime(lastCompletedBackup,"%Y-%m-%dT%H:%M:%S.%3N%:z")), -1,(now() - strptime(lastCompletedBackup,"%Y-%m-%dT%H:%M:%S.%3N%:z"))) | eval tsb=if(isnull(time_since_backup),0,time_since_backup)| rangemap field=tsb default=high low=1-86400 low-mid=86401-259200 mid=432000-2591999 mid-high=2592000-9999999 | rename range as Severity | eval Severity=case((Severity == "low"),"< 24 hours",(Severity == "low-mid"),"24-72 hours",(Severity == "mid"),"5-29 days",(Severity == "mid-high"),"> 29 days",(Severity == "high"),"Never completed") | stats count by Severity | eval idx=1 | append [| makeresults | eval Severity=mvappend("< 24 hours","24-72 hours","5-29 days","> 29 days","Never completed") | mvexpand Severity | fields - _time | eval idx=0, count=0] | sort Severity idx | selfjoin max=1 overwrite=1 keepsingle=1 Severity | fields - idx | sort - count

[code42_last_backup_by_client_by_computer(1)]
args = selected_computer
definition = (eventtype=code42_idx sourcetype="code42:computer" $selected_computer$ active="true")| stats latest(*) as * by guid  | rename backupUsage{}.* as * | fields lastCompletedBackup guid active, name, user | eval time_since_backup=if(isnull(strptime(lastCompletedBackup,"%Y-%m-%dT%H:%M:%S.%3N%:z")),"Never Completed",(now() - strptime(lastCompletedBackup,"%Y-%m-%dT%H:%M:%S.%3N%:z"))) | eval tsbs=if((time_since_backup == "Never Completed"),"Never Completed",tostring(time_since_backup,"duration"))| rex mode=sed field=tsbs "s/\+/ days, /" | rex mode=sed field=tsbs "s/\:/ hours, /" | rex mode=sed field=tsbs "s/\:/ minutes and /" | rex mode=sed field=tsbs "s/$/ seconds/" | rex mode=sed field=tsbs "s/\Q00 hours, \E//" | rex mode=sed field=tsbs "s/\Q00 minutes \E//" | rex mode=sed field=tsbs "s/\Q 0\E/ /g" | rex mode=sed field=tsbs "s/^\Q0\E//" | rex mode=sed field=tsbs "s/^\Qand \E//" | rangemap field=tsb default=Critical OK=1-259200 Warning=259200-2591999 | eval tsbs=if((tsbs == "Never Completed seconds"),rtrim(tsbs,"seconds"),tsbs) | fields - tsb, guid, active, lastCompletedBackup, time_since_backup | rename name as "Computer Name", range as Severity, tsbs as "Duration Since Last Backup", username as User

[code42_restore_details(1)]
args = selected_username
definition = eventtype=code42_security eventType="RESTORE_FILE" user="$selected_username$" | `code42_parse_security("formattedTimestamp user eventUid")` | stats latest(formattedTimestamp) as "Detected At" values(f0) as Event sum(f1) as length values(f2) as fileName values(f32) as fullPath values(user) as User by eventUid md5 | rename fileName AS "File Name" fullPath as "Full Path" | eventstats dc(md5) as "Total Files" sum(length) as "Total Bytes"| sort 0 eventUid md5 | table eventUid "Detected At" "Total Bytes" "Total Files" User md5 "File Name" "Full Path"

[code42_instance_restore_details(1)]
args = selected_username
definition =  eventtype=code42_restore user="$selected_username$" | eval gb_bytes = round(restoreBytes/1024/1024/1024,3) | stats sum(restoreFiles) as "Total Files" sum(gb_bytes) as "Total GigaBytes" latest(*) AS * by restoreId | lookup code42_computers source computerId AS acceptingDeviceId OUTPUT name AS "Computer Name"| fields user startDate completedDate Total* "Computer Name"

[code42_devices_appeared(1)]
args=selected_username
definition = eventtype=code42_security eventType="DEVICE_APPEARED" user="$selected_username$" | rename detectionDevice.* as * | rename busType as "Device Type", capacity as "Capacity", deviceName as "Device Name", serialNumber as "Serial Number", deviceAddress as "IP Address", user as User, vendorName as Vendor formattedTimestamp as "Detected At" | fields "Detected At" User "IP Address" "Device Type" "Vendor" "Device Name" "Serial Number" Capacity | fields - _* | table *

[code42_devices_file_activities_detail(1)]
args = selected_username
definition = eventtype=code42_security eventType="DEVICE_FILE_ACTIVITY" user="$selected_username$" | `code42_parse_security("formattedTimestamp user deviceAddress eventUid")`| search NOT f0="DELETE"| stats last(formattedTimestamp) as "Detected At" values(user) as User last(deviceAddress) as "IP Address" values(f0) as Event sum(f1) as length values(f2) as fileName values(f32) as fullPath  by eventUid md5| rename fileName AS "File Name" fullPath as Path |eventstats dc(md5) as "Total Files" sum(length) as "Total Bytes" by eventUid | table eventUid "Detected At" "Total Files" "Total Bytes" User "IP Address" Event md5 "File Name" Path

[code42_cloud_file_activities_detail(1)]
args=selected_username
definition = eventtype=code42_security eventType="PERSONAL_CLOUD_FILE_ACTIVITY" user="$selected_username$" |`code42_parse_security("formattedTimestamp user productName eventUid csp_path")`| search NOT f0="DELETE"| stats last(formattedTimestamp) as "Detected At" values(user) as User values(productName) as Product values(f0) as Event sum(f1) as length values(f2) as fileName values(f32) as fullPath values(csp_path) as "Location Path" by eventUid md5 | rename fileName AS "File Name" fullPath as Path |eventstats dc(md5) as "Total Files" sum(length) as "Total Bytes" by eventUid | table eventUid "Detected At" "Total Files" "Total Bytes" User Product Event md5 "File Name" "Location Path"

[code42_parse_security(1)]
args = fields
definition =  rename files{}.* as files_* cloudStorageProvider.dataLocation.path AS csp_path cloudStorageProvider.productName as productName| eval f0 = mvzip(files_fileEventType, files_length), f1 = mvzip(f0, files_fileName), f2 = mvzip(f1, files_fullPath), final_product_zipped = mvzip(f2, files_md5)| fields final_product_zipped $fields$| mvexpand final_product_zipped | eval t = split(final_product_zipped,","), f0 = mvindex(t,0), f1 = mvindex(t,1), f2 = mvindex(t,2), f32 = mvindex(t,3), md5 = mvindex(t,4)

[code42_file_open_detail(1)]
args=selected_username
definition = eventtype=code42_security eventType="FILE_OPENED" user="$selected_username$" | `code42_parse_security("formattedTimestamp eventUid user deviceAddress processName")`| search NOT f0="DELETE"| stats last(formattedTimestamp) as "Detected At" values(user) as User values(processName) as ProcessName values(f0) as Event sum(f1) as length values(f2) as fileName values(f32) as fullPath by eventUid md5| rename fileName AS "File Name" fullPath as Path |eventstats dc(md5) as "Total Files" sum(length) as "Total Bytes" by eventUid | table eventUid "Detected At" "Total Files" "Total Bytes" User Event md5 "File Name" ProcessName

[code42_incomplete_backups]
definition = eventtype=code42_idx sourcetype="code42:computer" "backupUsage{}.percentComplete"<100.0| rename backupUsage{}.* as backupUsage_* | rename user AS "User" "name" AS "Computer Name" active AS Active backupUsage_percentComplete AS "Pct Complete" backupUsage_lastBackup AS "Last Backup" backupUsage_lastCompletedBackup AS "Last Completed Backup" | table User,"Computer Name",Active,"Pct Complete","Last Backup","Last Completed Backup"

[code42_zero_kvstore_data(1)]
args = kvstore
definition = inputlookup $kvstore$ | where nuttzin > 1 | outputlookup $kvstore$

[code42_zero_cursors]
definition = `code42_zero_kvstore_data("mi_code42_cursor")`

### Lookup Generators

[code42_generate_user_lookup]
definition = eventtype=code42_user | stats latest(*) as * by source userUid | fields source userId userUid username | outputlookup code42_users
[code42_generate_alert_lookup]
definition = eventtype=code42_alertlog | stats latest(status) AS status by type,description,server,severity | outputlookup code42_alertlog

[code42_generate_computer_lookup]
definition = eventtype=code42_computer | stats latest(*) as * by source computerId |fields source computerId name | outputlookup code42_computers
