[linux-sysmon-network]
search = source="Syslog:Linux-Sysmon/Operational" EventCode="3"

[linux-sysmon-process]
search = source="Syslog:Linux-Sysmon/Operational" (EventCode IN ("1","5","6","7","8","9","10","15","17","18","24","25") )

[linux-sysmon-filemod]
search = source="Syslog:Linux-Sysmon/Operational" (EventCode IN ("2","11","23","26") )

[linux-sysmon-dns]
search = source="Syslog:Linux-Sysmon/Operational" EventCode="22"

[linux-sysmon-service]
search = source="Syslog:Linux-Sysmon/Operational" (EventCode IN ("4","16","255") )
