# Alerts
[Network - Issues with Certificate - Rule]
action.correlationsearch.enabled = 0
action.correlationsearch.label = Issues with Certificate
action.customsearchbuilder.enabled = false
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable = 1
action.notable.param.drilldown_name = Issues for same Subject
action.notable.param.drilldown_search = `get_digitalshadows_index` `get_digitalshadows_alerts` subject=$cert_subject$
action.notable.param.extract_artifacts = {"asset":["src","orig_host"],"identity":[]}
action.notable.param.next_steps = {"version":1,"data":"1) Identify Certificate Owner and notify them of the issue\n\n2) Resolve the identified Certificate Issue\n\n3) Close the alert in SearchLight\n[[action|update_state_in_searchlight]]\n\nFor a fuller playbook, see the associated alert in SearchLight."}
action.notable.param.recommended_actions = update_state_in_searchlight
action.notable.param.rule_description = Digital Shadows has identified issues with a certificate hosted on a company domain or IP.
action.notable.param.rule_title = $title$
action.notable.param.security_domain = network
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk = 1
action.risk.forceCsvResults = 1
action.risk.param._risk = [{"risk_object_field":"cert_subject","risk_object_type":"other","risk_score":40}]
action.risk.param._risk_message = Issues with Certificate
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.suppress = 1
alert.suppress.fields = triage_id
alert.suppress.period = 7776000s
alert.track = 1
counttype = number of events
cron_schedule = */30 * * * *
description = Issues with SSL certificates identified by Digital Shadows
dispatch.earliest_time = -35m
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
realtime_schedule = 0
relation = greater than
request.ui_dispatch_app = TA-digital-shadows-splunk-add-on
schedule_window = auto
search = `get_digitalshadows_index` `get_digitalshadows_alerts` \
| where ('triage_item.risk-type'="expired-certificate" OR 'triage_item.risk-type'="revoked-certificate" OR 'triage_item.risk-type'="weak-certificate") AND isnotnull('incident.id') \
| `ds_exclude_closed` \
| `ds_incident_std_renames` \
| `ds_severity_mapping(risk_level)` \
| `ds_threat_field_maps` \
| rename "triage_item.id" as triage_id \
| rename valid_from as start_time valid_until as end_time \
| rename certificate_sha_256 as signature certificate_subject as cert_subject certificate_common_names as cert_cn certificate_alternative_names as cert_alt_names \
| eval signature_id="SHA-256" \
| eval src=cert_subject \
| eval risk_object=cert_subject \
| eval risk_object_type="other" \
| `ds_risk_score_mapping(severity)`


