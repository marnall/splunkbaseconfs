definition = lookup acti_threatindicator_domain _key as $domain$ OUTPUTNEW type as acti_key_type _key as acti_key confidence as acti_confidence last_modified as acti_last_modified last_published as acti_last_published last_seen as acti_last_seen files.display_text as acti_associated_files last_seen_as as acti_last_seen_as malware_family as acti_malware_family severity as acti_severity uuid as acti_uuid threat_types as acti_threat_types threat_campaigns as acti_threat_campaigns
iseval = 0

