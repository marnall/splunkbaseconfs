[acti_enrich_indicator(1)]
args = indicator
definition = `acti_enrich_ip($indicator$)`|`acti_enrich_domain($indicator$)`|`acti_enrich_url($indicator$)`|`acti_enrich_file_sha256($indicator$)`|`acti_enrich_file_sha1($indicator$)`|`acti_enrich_file_md5($indicator$)`
iseval = 0
