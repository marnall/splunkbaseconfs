definition = lookup acti_threatindicator_file _key as $md5$ OUTPUTNEW type as acti_key_type _key as acti_key confidence as acti_confidence last_published as acti_last_published last_seen as acti_last_seen last_seen_as as acti_last_seen_as malware_family as acti_malware_family severity as acti_severity uuid as acti_uuid threat_types as acti_threat_types threat_campaigns as acti_threat_campaigns parent_key as acti_ioc_related parent_relationship as acti_ioc_relationship
