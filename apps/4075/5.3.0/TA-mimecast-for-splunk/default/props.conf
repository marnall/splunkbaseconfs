pulldown_type = 1

[mimecastsiemst]
TIME_PREFIX = \"timestamp\"=\"
MAX_TIMESTAMP_LOOKAHEAD = 13
TIME_FORMAT = %s%Q
EVAL-protocol = "smtp"
EVAL-action = CASE(mcType == "email_process", act, mcType == "email_delivery" AND delivered == "true", "delivered", mcType =="email_delivery" AND delivered == "false", "blocked", Action =="hold", "quarantined", Action == "rejected", "blocked")
EVAL-src_ip = CASE(mcType =="email_receipt", senderIp, mcType =="email_antivirus", senderIp, mcType=="email_ttp_impersonation", senderIp, mcType=="email_ttp_ap", senderIp)
EVAL-dest = IF(mcType =="email_delivery", destinationIp, dest)
EVAL-orig_recipient = CASE(mcType=="email_receipt", recipients, mcType="email_antivirus", recipients)
EVAL-return_addr = IF(mcType=="email_delivery", senderEnvelope, return_addr)
EVAL-src_usr = CASE(mcType=="email_receipt", senderEnvelope, mcType="email_ttp_impersonation", senderEnvelope, mcType="email_ttp_ap", senderEnvelope, mcType="email_ttp_url",senderEnvelope)
EVAL-sender = CASE(mcType=="email_process", senderEnvelope, mcType=="email_antivirus", senderEnvelope)
EVAL-recipient = CASE(mcType=="email_delivery", recipients, mcType=="email_ttp_ap", recipients, mcType=="email_ttp_impersonation", recipients, mcType=="email_ttp_url", recipients)
EVAL-date = timestamp
EVAL-subject = subject
EVAL-transport = "SMTP"
EVAL-vendor_product = "Mimecast Mail Service"
FIELDALIAS-aob_gen_mimecastsiemst_alias_1 = deliveryAttempts AS retries
FIELDALIAS-aob_gen_mimecastsiemst_alias_2 = fileName AS file_name
FIELDALIAS-aob_gen_mimecastsiemst_alias_3 = Latency AS delay
FIELDALIAS-aob_gen_mimecastsiemst_alias_4 = messageId AS message_id
FIELDALIAS-aob_gen_mimecastsiemst_alias_5 = MsgSize AS size
FIELDALIAS-aob_gen_mimecastsiemst_alias_6 = ReceiptAck AS recipient_status
FIELDALIAS-aob_gen_mimecastsiemst_alias_7 = rejectionCode AS status_code
FIELDALIAS-aob_gen_mimecastsiemst_alias_8 = rejectionInfo AS message_info
FIELDALIAS-aob_gen_mimecastsiemst_alias_9 = SenderDomain AS src_host
FIELDALIAS-aob_gen_mimecastsiemst_alias_10 = Sha256 AS file_hash
FIELDALIAS-aob_gen_mimecastsiemst_alias_11 = Size AS file_size
FIELDALIAS-aob_gen_mimecastsiemst_alias_12 = Snt AS size
FIELDALIAS-aob_gen_mimecastsiemst_alias_13 = sourceIp AS src_ip
FIELDALIAS-aob_gen_mimecastsiemst_alias_14 = spamInfo AS message_info
FIELDALIAS-aob_gen_mimecastsiemst_alias_15 = subject AS subject
FIELDALIAS-aob_gen_mimecastsiemst_alias_16 = tlsVersion AS ssl_version
FIELDALIAS-aob_gen_mimecastsiemst_alias_17 = urlCategory AS category
FIELDALIAS-aob_gen_mimecastsiemst_alias_18 = virusFound AS signature
KV_MODE = none
REPORT-ta_builder_internal_use_kv_format_results_for_mimecastsiemst = ta_builder_internal_use_kv_format_results_for_mimecastsiemst
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1


