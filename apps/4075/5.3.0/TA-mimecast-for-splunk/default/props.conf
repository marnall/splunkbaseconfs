FIELDALIAS-aob_gen_mimecastttpurlst_alias_1 = user_email_address AS user
FIELDALIAS-aob_gen_mimecastttpurlst_alias_2 = ttpDefinition AS signature
KV_MODE = none
REPORT-ta_builder_internal_use_kv_format_results_for_mimecastttpurlst = ta_builder_internal_use_kv_format_results_for_mimecastttpurlst
SHOULD_LINEMERGE = 0
