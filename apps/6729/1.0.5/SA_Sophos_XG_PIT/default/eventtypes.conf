[sophosxg_idx]
search = index=sophos_firewall

[sophosxg_event]
search = eventtype=sophosxg_idx sourcetype="sophos:xg:event"

[sophosxg_firewall]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:firewall

[sophosxg_email_anti_virus]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:anti_virus (log_component="SMTP" OR log_component="SMTPS")

[sophosxg_http_anti_virus]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:anti_virus (log_component="HTTP" OR log_component="HTTPS")

[sophosxg_malware_detected]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:anti_virus

[sophosxg_authentication]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event (log_component="Firewall Authentication" OR log_component="My Account Authentication" OR log_component="Dial-In Authentication" OR log_component="VPN Authentication" OR log_component="SSL VPN Authentication" OR log_component="GUI" OR log_component=CLI OR log_component="Web Application Firewall" OR log_component="CTA" OR log_component="External Authentication")

[sophosxg_definitions_upgraded]
search = eventtype=sophosxg_idx sourcetype="sophos:xg:event" log_component="Anti-Virus" message="*definitions upgraded*"

[sophosxg_system_health]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:system_health

[sophosxg_system_health_cpu]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:system_health log_component="CPU"

[sophosxg_system_health_memory]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:system_health log_component="Memory"

[sophosxg_system_health_disk]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:system_health log_component="Disk"

[sophosxg_system_health_interface]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:system_health log_component="Interface"

[sophosxg_vpn]
search = eventtype=sophosxg_event log_component="L2TP" OR log_component="PPTP" OR log_component="VPN*" OR log_component="Authentication Client" OR log_component="*IPSec*" OR log_component="SSL VPN Authentication" OR log_component="SSL VPN Client" OR log_component="SSL VPN"

[sophosxg_atp]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:atp

[sophosxg_email]
search = eventtype=sophosxg_event log_component="IMAP4" OR log_component="IMAPS" OR log_component="POP3" OR log_component="POPS" OR log_component="SMTP" OR log_component="SMTPS" OR log_component="Mail proxy"

[sophosxg_anti_spam]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:anti_spam

[sophosxg_ssl]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:ssl

[sophosxg_sandbox]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:sandbox

[sophosxg_heartbeat]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:heartbeat

[sophosxg_web]
search = eventtype=sophosxg_event log_component="HTTP" OR log_component="HTTPS"

[sophosxg_waf]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:waf

[sophosxg_content_filtering]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:content_filtering

[sophosxg_web_content_policy]
search = eventtype=sophosxg_content_filtering log_component="Web Content Policy" OR log_component="Web Proxy"

[sophosxg_web_filter]
search = eventtype=sophosxg_content_filtering log_component="HTTP" OR log_component="HTTPS"

[sophosxg_ftp]
search = eventtype=sophosxg_event log_component="FTP"

[sophosxg_ids]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event log_component="Signatures" OR log_component="Anomaly" OR log_component="Appliances Deactivated" OR log_component="Application Filter" OR log_component="IPS" OR log_component="ARP Flood" OR log_component="DoS Attacks" OR log_component="IP Spoof"

[sophosxg_change]
search = eventtype=sophosxg_idx sourcetype="sophos:xg:event" log_component=Appliance OR log_component=GUI NOT (login OR logout OR "logged in" OR "logged out")

[sophosxg_wireless_protection]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:wireless_protection

[sophosxg_protection]
search = eventtype=sophosxg_event log_component="AV" OR log_component="ATP" OR log_component="Enhanced app control" OR log_component="End Point" OR log_component="protected application server" OR log_component="quarantine" OR log_component="Firewall" OR log_component="IPSEC Client" OR log_component="Authentication Client"

[sophosxg_system_mgt]
search = eventtype=sophosxg_event log_component="HA" OR log_component="Device" OR log_component="DHCP Server" OR log_component="Gateway" OR log_component="DDNS" OR log_component="WebCat" OR log_component="WLAN" OR log_component="guest user" OR log_component="CTA" OR log_component="PPPoE" OR log_component="wireless protection" OR log_component="RED" OR log_component="RED firmware" OR log_component="AP firmware" OR log_component="Up2Date" OR log_component="Heartbeat" OR log_component="Missing Heartbeat" OR log_component="CCC" OR log_component="DNS" OR log_component="Dial-In" OR log_component="Dial-In Authentication" OR log_component="External Authentication" OR log_component="IM" OR log_component="LCD" OR log_component="Landing Page"  OR log_component="NTLM" OR log_component="authentication clients" OR log_component="Central Management" OR log_component=API

[sophosxg_network]
search = eventtype=sophosxg_event log_component="Firewall" OR log_component="Foreign Host" OR log_component="Fragmented Traffic" OR log_component="ICMP Redirection" OR log_component="ICMP related packets" OR log_component="Invalid Fragmented Traffic" OR log_component="IPMAC Filter" OR log_component="Source Routed" OR log_component="Virtual Host"
