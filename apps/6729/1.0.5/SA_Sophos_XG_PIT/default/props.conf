[sophos:xg:logs]
CHARSET = UTF-8
SHOULD_LINEMERGE = true
category = Custom
disabled = false
pulldown_type = true
LINE_BREAKER = ([\r\n]+)
TRANSFORMS-force_sourcetype_for_sophos_xg_firewall_data = force_sourcetype_for_sophos_xg_atp, force_sourcetype_for_sophos_xg_anti_spam, force_sourcetype_for_sophos_xg_anti_virus, force_sourcetype_for_sophos_xg_content_filtering, force_sourcetype_for_sophos_xg_event, force_sourcetype_for_sophos_xg_firewall, force_sourcetype_for_sophos_xg_ssl, force_sourcetype_for_sophos_xg_sandbox, force_sourcetype_for_sophos_xg_system_health, force_sourcetype_for_sophos_xg_heartbeat, force_sourcetype_for_sophos_xg_waf, force_sourcetype_for_sophos_xg_wireless_protection, force_sourcetype_for_sophos_xg_idp

[sophos:xg:logs:secure]
CHARSET = UTF-8
SHOULD_LINEMERGE = true
category = Custom
disabled = false
pulldown_type = true
LINE_BREAKER = ([\r\n]+)
TRANSFORMS-force_sourcetype_for_sophos_xg_firewall_data = force_sourcetype_for_sophos_xg_atp, force_sourcetype_for_sophos_xg_anti_spam, force_sourcetype_for_sophos_xg_anti_virus, force_sourcetype_for_sophos_xg_content_filtering, force_sourcetype_for_sophos_xg_event, force_sourcetype_for_sophos_xg_firewall, force_sourcetype_for_sophos_xg_ssl, force_sourcetype_for_sophos_xg_sandbox, force_sourcetype_for_sophos_xg_system_health, force_sourcetype_for_sophos_xg_heartbeat, force_sourcetype_for_sophos_xg_waf, force_sourcetype_for_sophos_xg_wireless_protection, force_sourcetype_for_sophos_xg_idp

[sophos:xg:content_filtering]
EVAL-bytes = if(log_component="HTTP", bytes_received + bytes_sent, null())
EVAL-bytes_in = if(log_component="HTTP", bytes_received, null())
EVAL-bytes_out = if(log_component="HTTP", bytes_sent, null())
FIELDALIAS-sophos_xg_content_filtering_category = http_category as category
EVAL-dest = if(log_component="HTTP" OR log_component="Web Content Policy", dst_ip, null())
EVAL-dest_port = if(log_component="HTTP" OR log_component="Web Content Policy", dst_port, null())
FIELDALIAS-sophos_xg_content_filtering_http_content_type = content_type as http_content_type
EVAL-http_user_agent_length = if(log_component="HTTP", len(http_user_agent), null())
EVAL-src = if(log_component="HTTP" OR log_component="Web Content Policy", src_ip, null())
FIELDALIAS-sophos_xg_content_filtering_status = http_status as status
EXTRACT-sophos_xg_content_filtering_url_extract = .*?\surl=\".*?\/\/.*?(?<uri_path>\/\/?[^?]*?)?(?:\?(?<uri_query>.*?))?\"\s
FIELDALIAS-sophos_xg_content_filtering_url_domain = domain as url_domain
EVAL-url_length = if(log_component="HTTP", len(url), null())
FIELDALIAS-sophos_xg_content_filtering_http_referrer = http_referer as http_referrer
EVAL-user_name = if(log_component="HTTP", if(user_name="", "Unidentified", user_name), user_name)
EVAL-user = if(log_component="HTTP", if(user_name="", "Unidentified", user_name), null())
EVAL-severity = case(priority == "Critical", "critical", priority == "High", "high", priority == "Medium", "medium", priority == "Low", "low", priority == "Information", "information", rule_priority == "Critical", "critical", rule_priority == "Major", "high", rule_priority == "Minor", "minor", rule_priority == "Warning", "informational")

[sophos:xg:anti_virus]
EVAL-bytes_in = if(log_component="HTTP" OR log_component="HTTPS", bytes_received, null())
EVAL-bytes_out = if(log_component="HTTP" OR log_component="HTTPS", bytes_sent, null())
EVAL-bytes = if(log_component="HTTP" OR log_component="HTTPS", bytes_received + bytes_sent, null())
EVAL-dest = if(log_component="HTTP" OR log_component="HTTPS" OR log_component="SMTP" OR log_component="SMTPS", dst_ip, null())
EVAL-dest_port = if(log_component="HTTP" OR log_component="HTTPS", dst_port, null())
EVAL-http_user_agent_length = if(log_component="HTTP" OR log_component="HTTPS", len(http_user_agent), null())
EVAL-src = if(log_component="HTTP" OR log_component="HTTPS" OR log_component="SMTP" OR log_component="SMTPS", src_ip, null())
FIELDALIAS-sophos_xg_anti_virus_status = http_status as status
EVAL-url_domain = if(log_component="HTTP" OR log_component="HTTPS", domain, null())
EVAL-url_length = if(log_component="HTTP" OR log_component="HTTPS", len(url), null())
EXTRACT-sophos_xg_url_extract = .*?\surl=\".*?\/\/.*?(?<uri_path>\/\/?[^?]*?)?(?:\?(?<uri_query>.*?))?\"\s
EVAL-user = if(log_component="HTTP" OR log_component="HTTPS" OR log_component="SMTP" OR log_component="SMTPS", user_name , null())
FIELDALIAS-sophos_xg_anti_virus_orig_src = sender as orig_src
FIELDALIAS-sophos_xg_anti_virus_orig_recipient = recipient as orig_recipient
FIELDALIAS-sophos_xg_anti_virus_size = email_size as size
FIELDALIAS-sophos_xg_anti_virus_src_user_domain = src_host as src_user_domain
FIELDALIAS-sophos_xg_anti_virus_recipient_domain = dst_host as recipient_domain
EVAL-severity = case(priority == "Critical", "critical", priority == "High", "high", priority == "Medium", "medium", priority == "Low", "low", priority == "Information", "information", rule_priority == "Critical", "critical", rule_priority == "Major", "high", rule_priority == "Minor", "minor", rule_priority == "Warning", "informational")
FIELDALIAS-sophos_xg_anti_virus_signature = malware as signature

[sophos:xg:system_health]
FIELDALIAS-sophos_xg_system_health_cpu_user_percent = user as cpu_user_percent
EVAL-mem = if(log_component="Memory", (total_memory/1024)/1024, null())
EVAL-mem_free = if(log_component="Memory", (free/1024)/1024, null())
EVAL-mem_used = if(log_component="Memory", (used/1024)/1024, null())
EVAL-severity = case(priority == "Critical", "critical", priority == "High", "high", priority == "Medium", "medium", priority == "Low", "low", priority == "Information", "information", rule_priority == "Critical", "critical", rule_priority == "Major", "high", rule_priority == "Minor", "minor", rule_priority == "Warning", "informational")

[sophos:xg:anti_spam]
FIELDALIAS-sophos_xg_anti_spam_orig_src = sender as orig_src
FIELDALIAS-sophos_xg_anti_spam_orig_recipient = recipient as orig_recipient
FIELDALIAS-sophos_xg_anti_spam_size = email_size as size
FIELDALIAS-sophos_xg_anti_spam_src = src_ip as src
FIELDALIAS-sophos_xg_anti_spam_dest = dst_ip as dest
FIELDALIAS-sophos_xg_anti_spam_src_user_domain = src_host as src_user_domain
FIELDALIAS-sophos_xg_anti_spam_recipient_domain = dst_host as recipient_domain
EVAL-severity = case(priority == "Critical", "critical", priority == "High", "high", priority == "Medium", "medium", priority == "Low", "low", priority == "Information", "information", rule_priority == "Critical", "critical", rule_priority == "Major", "high", rule_priority == "Minor", "minor", rule_priority == "Warning", "informational")

[sophos:xg:sandbox]
EXTRACT-event_source = .*?\ssource=\"(?<event_source>.*?)\"\s
EVAL-severity = case(priority == "Critical", "critical", priority == "High", "high", priority == "Medium", "medium", priority == "Low", "low", priority == "Information", "information", rule_priority == "Critical", "critical", rule_priority == "Major", "high", rule_priority == "Minor", "minor", rule_priority == "Warning", "informational")

[sophos:xg:firewall]
EVAL-action = case(log_subtype="Allowed", "allowed", log_subtype="Denied", "blocked", true(), null())
EVAL-bytes = sent_bytes+recv_bytes
EVAL-user = if(user_name="", "Unidentified", user_name)
EVAL-user_name = if(user_name="", "Unidentified", user_name)
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_1 = tran_src_ip AS src_translated_ip
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_10 = src_ip AS src
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_12 = dst_country_code AS dest_country_code
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_13 = srczone AS src_zone
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_14 = dst_ip AS dest
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_2 = tran_src_port AS src_translated_port
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_3 = tran_dst_ip AS dest_translated_ip
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_4 = tran_dst_port AS dest_translated_port
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_5 = sent_pkts AS packets_out
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_6 = recv_pkts AS packets_in
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_7 = dstzone AS dest_zone
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_8 = sent_bytes AS bytes_out
FIELDALIAS-aob_gen_sophos_xg_firewall_alias_9 = recv_bytes AS bytes_in
FIELDALIAS-sophos_xg_firewall_dest_interface = out_interface as dest_interface
FIELDALIAS-sophos_xg_firewall_dest_mac = dst_mac as dest_mac
FIELDALIAS-sophos_xg_firewall_dest_port = dst_port as dest_port
FIELDALIAS-sophos_xg_firewall_dvc = device_name as dvc
FIELDALIAS-sophos_xg_firewall_src_interface = in_interface as src_interface
FIELDALIAS-sophos_xg_firewall_transport = protocol as transport
EVAL-severity = case(priority == "Critical", "critical", priority == "High", "high", priority == "Medium", "medium", priority == "Low", "low", priority == "Information", "information", rule_priority == "Critical", "critical", rule_priority == "Major", "high", rule_priority == "Minor", "minor", rule_priority == "Warning", "informational")

[sophos:xg:event]
EVAL-action = case(status="Successful", "success", status="Established", "success", status="Terminated", "success", status="Failed", "failure", true(), null())
EVAL-dest = case(log_component="Firewall Authentication" OR log_component="My Account Authentication" OR log_component="Dial-In Authentication" OR log_component="VPN Authentication" OR log_component="SSL VPN Authentication" OR log_component="GUI" OR log_component="Web Application Firewall" OR log_component="CTA" OR log_component="Appliance" OR log_component="External Authentication" OR log_component="Quarantine", dst_ip, log_component="IPSec", localinterfaceip, true(), null())
EVAL-dest_ip = if(log_component="IPSec" OR log_component="L2TP" OR log_component="PPTP" OR log_component="SSL VPN", dst_ip, null())
EVAL-src = coalesce(src_ip, remoteinterfaceip)
FIELDALIAS-aob_gen_sophos_xg_event_alias_2 = user_name AS user
FIELDALIAS-sophos_xg_event_authentication_method = auth_mechanism as authentication_method
FIELDALIAS-sophos_xg_event_orig_recipient = recipient as orig_recipient
FIELDALIAS-sophos_xg_event_orig_src = sender as orig_src
FIELDALIAS-sophos_xg_event_recipient_domain = dst_host as recipient_domain
FIELDALIAS-sophos_xg_event_size = email_size as size
FIELDALIAS-sophos_xg_event_src_user_domain = src_host AS src_user_domain
EVAL-severity = case(priority == "Critical", "critical", priority == "High", "high", priority == "Medium", "medium", priority == "Low", "low", priority == "Information", "information", rule_priority == "Critical", "critical", rule_priority == "Major", "high", rule_priority == "Minor", "minor", rule_priority == "Warning", "informational")
