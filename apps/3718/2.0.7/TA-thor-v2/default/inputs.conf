# [udp://514]
# connection_host = ip
# sourcetype = thor
# _rcvbuf = 16777216
# queueSize = 16MB
# persistentQueueSize = 128MB
# no_appending_timestamp = true

# Use [script://$SPLUNK_HOME/etc/apps/TA-thor-v2/bin/thor-remote.exe --debug] 
# for debugging purposes
[script://$SPLUNK_HOME/etc/apps/TA-thor-v2/bin/thor-remote.exe]
disabled = True
# The interval does not configure how often THOR runs but how often the 
# script should check the scheduler.csv, which has to be located 
# on a network share and can be set in the thor-remote.conf file. 
interval = 300
sourcetype = thor
# Since v2 we use a sourcetype instead of an index definition. For backward 
# compatibility and if you still want to use an index named 'thor' uncomment
# the index line in ./local/inputs.conf
#index = thor
start_by_shell=false

# [tcp://514]
# connection_host = dns
# sourcetype = thor
# queueSize = defaults to 500K
# queueSize = 16MB
# persistentQueueSize defaults to 0 (no persistent queue)
# persistentQueueSize = 128MB
