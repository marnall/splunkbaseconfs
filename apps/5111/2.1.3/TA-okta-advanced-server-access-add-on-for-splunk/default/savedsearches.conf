[ASA Preauthorizations created over time]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","type","unix_user_name","related_objects.project{}.name","related_objects.server{}.access_address","related_objects.server{}.os","related_objects.user{}.name","related_objects.user{}.user_type","related_objects.server{}.hostname","session_type","eventtype"]
display.general.type = visualizations
display.page.search.mode = verbose
display.page.search.tab = visualizations
display.statistics.show = 0
display.visualizations.charting.chart = line
display.visualizations.charting.legend.placement = none
request.ui_dispatch_app = okta-asa
request.ui_dispatch_view = search
search = index=okta eventtype="ASA Preauthorization Created"| timechart count by nothing limit=10

