# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 14

[launcher]
author = Okta, Inc
version = 2.1.3
description = This addon will collect audit events from the Okta Advanced Server Access (ASA) API and index them into Splunk. This makes tracking events like permission changes, server logins, credential approvals through ASA simple.

[ui]
is_visible = 1
label = Okta Advanced Server Access Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-okta-advanced-server-access-add-on-for-splunk

[triggers]
reload.addon_builder = simple
reload.ta_okta_advanced_server_access_add_on_for_splunk_account = simple
reload.ta_okta_advanced_server_access_add_on_for_splunk_settings = simple
reload.passwords = simple

