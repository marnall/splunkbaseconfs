[expose:TA_google_search_for_splunk_settings]
pattern = TA_google_search_for_splunk_settings
methods = POST, GET

[expose:TA_google_search_for_splunk_settings_specified]
pattern = TA_google_search_for_splunk_settings/*
methods = POST, GET, DELETE

[expose:TA_google_search_for_splunk_google_search_input]
pattern = TA_google_search_for_splunk_google_search_input
methods = POST, GET

[expose:TA_google_search_for_splunk_google_search_input_specified]
pattern = TA_google_search_for_splunk_google_search_input/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET

