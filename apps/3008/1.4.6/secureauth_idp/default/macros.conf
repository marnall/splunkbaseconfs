# modify this macro to include the index and sourcetype used for SecureAuth IdP
[secureauth_base]
#definition = (index=secureauth* sourcetype=secureauth:idp* Category!=DEBUG)
definition = (index=secureauth*)
iseval = 0

[secureauth_debug_included_logs]
definition = (index=secureauth* Category=DEBUG)
iseval = 0

[secureauth_all_logins]
definition = (`secureauth_all_successful_logins`) OR (`secureauth_all_failed_logins`) `secureauth_get_valid_src`
iseval = 0

[secureauth_all_api_logins]
definition = (`secureauth_failed_api_logins`) OR (`secureauth_successful_api_logins`)
#definition = ((ApiResponseHTTPStatusCode != "OK" OR (ApiResponseHTTPStatusCode = "OK" AND (ApiResponseStatus = "not_found" OR ApiResponseStatus = "invalid")))) OR ((ApiResponseHTTPStatusCode = "OK" AND (ApiResponseStatus = "found" OR ApiResponseStatus = "found_with_id_mismatch" OR ApiResponseStatus = "valid")))
iseval = 0

[secureauth_api_types]
definition = EventID=60201
iseval = 0

## Failed Logins
[secureauth_all_failed_logins]
definition = (`secureauth_failed_non_wstrust_user_logins`) OR (`secureauth_failed_api_logins`)  OR (`secureauth_failed_wstrust_user_logins`)
iseval = 0

[secureauth_failed_api_logins]
definition = (`secureauth_failed_api_logins_syslog`) OR (`secureauth_failed_api_logins_logfile`)
iseval = 0

[secureauth_failed_api_logins_syslog]
#definition = (EventID=60202 OR EventID=60602 OR (EventID=60102 AND ApiResponseStatus!="found")) OR (EventID=60203 AND ApiResponseStatus="invalid")
## May need ApiResponseHTTPStatusCode = * AND ApiResponseHTTPStatusCode != "OK" (that is required in ELK, not sure on Splunk)
definition = (ApiResponseHTTPStatusCode != "OK" OR (ApiResponseHTTPStatusCode = "OK" AND (ApiResponseStatus = "not_found" OR ApiResponseStatus = "invalid")))
iseval = 0

[secureauth_failed_api_logins_logfile]
definition = (EventID=60203 invalid)
iseval = 0

[secureauth_failed_user_logins]
definition = (`secureauth_failed_non_wstrust_user_logins`) OR (`secureauth_failed_wstrust_user_logins`)
iseval = 0

[secureauth_failed_non_wstrust_user_logins]
definition = (EventID=20990 Succeed=False AND TrxResult!="Session Aborted" AND DestinationSiteUrl!="Authorized/WSFedProvider.aspx")
iseval = 0

[secureauth_failed_wstrust_user_logins]
definition = (DestinationSiteUrl="Authorized/WSFedProvider.aspx" AND EventID=20990 AND Succeed=False AND TrxResult!="Session Aborted")
iseval = 0

## Successful Logins
[secureauth_all_successful_logins]
definition = (`secureauth_successful_api_logins`) OR (`secureauth_successful_non_wstrust_user_logins`) OR (`secureauth_successful_wstrust_user_logins`)
iseval = 0

[secureauth_successful_api_logins]
definition = (`secureauth_successful_api_logins_syslog`) OR (`secureauth_successful_api_logins_logfile`)
iseval = 0

[secureauth_successful_api_logins_syslog]
#definition = ((EventID=60203 OR EventID=60103) AND ApiResponseStatus="valid" AND AuthRequestType="password")
# New API logging messages in >= 19.07
definition = (ApiResponseHTTPStatusCode = "OK" AND (ApiResponseStatus = "found" OR ApiResponseStatus = "found_with_id_mismatch" OR ApiResponseStatus = "valid"))
iseval = 0

[secureauth_successful_api_logins_logfile]
definition = (EventID=60203 NOT invalid)
iseval = 0

[secureauth_successful_user_logins]
definition = (`secureauth_successful_non_wstrust_user_logins`) OR (`secureauth_successful_wstrust_user_logins`)
iseval = 0

[secureauth_successful_non_wstrust_user_logins]
definition = (EventID=20990 AND Succeed=True AND DestinationSiteUrl!="Authorized/WSFedProvider.aspx")
iseval = 0

[secureauth_successful_wstrust_user_logins]
definition = (DestinationSiteUrl="Authorized/WSFedProvider.aspx" AND EventID=20990 AND (TrxResult="WS-Trust success." OR TrxResult="Success"))
iseval = 0

## Fixes Source IP for WSTrust Logs
[secureauth_get_valid_src]
definition =   | join type=outer max=0 RequestID [search `secureauth_base` EventID=40601 | fields X_MS_Forwarded_Client_IP, RequestID] | eval src_ip=coalesce(X_MS_Forwarded_Client_IP, UserHostAddress)
iseval=0

## Get all RequestIDs based on a username
## Use this as a subsearch to get all events related to the user since the IdP does not
##  include the username in all events
## Example: `secureauth_base` [`secureauth_get_events_by_user(jdoe)`]
[secureauth_get_events_by_user(1)]
args = username
definition = `secureauth_base` [search `secureauth_base` $username$ | fields RequestID]
iseval = 0
