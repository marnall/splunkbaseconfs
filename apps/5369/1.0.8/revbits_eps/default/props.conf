

[syslog]
TRANSFORMS-force_sourcetype_for_revbits_eps = force_sourcetype_for_revbits_eps

[revbits:eps]

EXTRACT-version = ^(?:[^\|\n]*\|){1}Revbits EPS - (?P<version>[^\|]+)\s
EXTRACT-domain = ^(?:[^\|\n]*\|){2}(?P<domain>[^\|]+)
EXTRACT-severity = ^(?:[^\|\n]*\|){4}(?P<severity>[^\|]+)
EXTRACT-event = ^(?:[^\|\n]*\|){5}(?P<event>[^\|]+)
EXTRACT-event_type = ^(?:[^\|\n]*\|){6}(?P<event_type>[^\|]+)
EXTRACT-msg = ^(?:[^\|\n]*\|){7}(?P<msg>[^\|]+)
EXTRACT-user = ^(?:[^\|\n]*\|){8}By\s(?P<user>[^\|]+)

EVAL-app = "EndPoint Security"
EVAL-vendor_product = "RevBits EPS"

