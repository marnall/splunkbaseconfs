[caws:threat]
KV_MODE = json
LINE_BREAKER = ([<BACKSLASH>n<BACKSLASH>r]+){
NO_BINARY_CHECK = 1
TRUNCATE = 0
SHOULD_LINEMERGE = false
LOOKUP-Threat Lookup = threat_lookup Browser AS Browser DetectionDate AS DetectionDate "IndicatorsOfAttack.Files{}.Md5Hash" AS "IndicatorsOfAttack.Files{}.Md5Hash" "IndicatorsOfAttack.Files{}.Name" AS "IndicatorsOfAttack.Files{}.Name" "IndicatorsOfAttack.Files{}.Sha1Hash" AS "IndicatorsOfAttack.Files{}.Sha1Hash" "IndicatorsOfAttack.Files{}.Sha256Hash" AS "IndicatorsOfAttack.Files{}.Sha256Hash" "IndicatorsOfAttack.NetworkConnections{}.IpAddress" AS "IndicatorsOfAttack.NetworkConnections{}.IpAddress" "IndicatorsOfAttack.NetworkConnections{}.Port" AS "IndicatorsOfAttack.NetworkConnections{}.Port" NSSId AS NSSId TargetedApplication AS TargetedApplication OUTPUTNEW Browser AS Browser DetectionDate AS DetectionDate "IndicatorsOfAttack.Files{}.Md5Hash" AS "IndicatorsOfAttack.Files{}.Md5Hash" "IndicatorsOfAttack.Files{}.Name" AS "IndicatorsOfAttack.Files{}.Name" "IndicatorsOfAttack.Files{}.Sha1Hash" AS "IndicatorsOfAttack.Files{}.Sha1Hash" "IndicatorsOfAttack.Files{}.Sha256Hash" AS "IndicatorsOfAttack.Files{}.Sha256Hash" "IndicatorsOfAttack.NetworkConnections{}.IpAddress" AS "IndicatorsOfAttack.NetworkConnections{}.IpAddress" "IndicatorsOfAttack.NetworkConnections{}.Port" AS "IndicatorsOfAttack.NetworkConnections{}.Port" NSSId AS NSSId TargetedApplication AS TargetedApplication
FIELDALIAS-file_name = IndicatorsOfAttack.Files{}.Name as file_name
FIELDALIAS-md5_file_hash = IndicatorsOfAttack.Files{}.Md5Hash as file_hash
FIELDALIAS-sha1_file_hash = IndicatorsOfAttack.Files{}.Sha1Hash as file_hash
FIELDALIAS-sha256_file_hash = IndicatorsOfAttack.Files{}.Sha256Hash as file_hash
FIELDALIAS-src_host = IndicatorsOfAttack.SourceUri as src_host
FIELDALIAS-src_ip = IndicatorsOfAttack.SourceIp as src_ip
FIELDALIAS-src_category = IndicatorsOfAttack.SourceCountry as src_category
FIELDALIAS-dest_ip = IndicatorsOfAttack.NetworkConnections{}.IpAddress as dest_ip
FIELDALIAS-dest_port = IndicatorsOfAttack.NetworkConnections{}.Port as dest_port
FIELDALIAS-vendor_product_installed_app = InstalledApplication as vendor_product
FIELDALIAS-vendor_product_targeted_app = TargetedApplication as vendor_product
FIELDALIAS-vendor_product_platform = Platform as vendor_product

[caws:bypass]
KV_MODE = json
LINE_BREAKER = ([<BACKSLASH>n<BACKSLASH>r]+){
NO_BINARY_CHECK = 1
TRUNCATE = 0
SHOULD_LINEMERGE = false

