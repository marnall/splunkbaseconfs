[Get Infoblox SOC insights details]
action.infoblox_soc_insights_details = 1
action.infoblox_soc_insights_details.param.assets = 1
action.infoblox_soc_insights_details.param.comments = 1
action.infoblox_soc_insights_details.param.events = 1
action.infoblox_soc_insights_details.param.index = main
action.infoblox_soc_insights_details.param.indicators = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 30 * * * *
description = Collect Infoblox SOC Insights details data from the collected SOC insights
disabled = 1
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = `infoblox_index` sourcetype IN ("infoblox:soc_insights", "ib:socinsights:captures") \
| eval insight_id=coalesce(insightId, insight_id) \
| stats count by insight_id
