[Delete Older TIDE data from `infoblox_tide`]
description = TIDE data older than 24 hours will be deleted from `infoblox_tide`.
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
cron_schedule = 0 0 * * *
action.webhook.enable_allowlist = 0
alert.track = 0
enableSched = 1
search = | inputlookup infoblox_tide\
| eval event_time=strptime(timestamp, "%Y-%m-%dT%H:%M:%S.%3f")\
| where event_time > now() - 24*60*60\
| outputlookup infoblox_tide

