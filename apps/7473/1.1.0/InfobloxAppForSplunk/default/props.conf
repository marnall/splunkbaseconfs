[infoblox:soc_insights]
SHOULD_LINEMERGE = 0
pulldown_type = 1
TRUNCATE = 9999999
DATETIME_CONFIG = CURRENT
KV_MODE = json

[infoblox_soc_insights_assets]
# only look for ***SPLUNK*** on the first line
