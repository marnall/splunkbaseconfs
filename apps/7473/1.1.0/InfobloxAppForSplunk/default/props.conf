SHOULD_LINEMERGE = 0
pulldown_type = 1
TRUNCATE = 9999999
DATETIME_CONFIG = CURRENT
KV_MODE = json
BREAK_ONLY_BEFORE_DATE  = false
LINE_BREAKER = (\r?\n==##~~##~~  1E8N3D4E6V5E7N2T9 ~~##~~##==\r?\n)

