
[source::abnormal-security]
FIELDALIAS-attack_type = "abx_body.attack_type" ASNEW attack_type
FIELDALIAS-internet_message_id = "abx_body.internet_message_id" ASNEW internet_message_id
FIELDALIAS-recipient_address = "abx_body.recipient_address" ASNEW recipient_address

EVAL-action = case(match('abx_body.category',"^search.*|view.*"),"read",'abx_body.status'=="SUCCESS" AND 'abx_body.category'=="login","success",match('abx_body.category',"^create.*"),"created",match('abx_body.category',"^update.*"),"updated",('abx_body.status'=="FAIL") AND NOT 'abx_body.category'=="login","blocked",('abx_body.status'=="FAIL" OR 'abx_body.status'=="UNACKNOWLEDGED") AND 'abx_body.category'=="login","failure",match('abx_body.status',"^.*DELETED.*|.*Deleted.*|.*deleted.*"),"deleted",(attack_type IN("Spam","Other") AND remediation_status="Auto-Remediated"),"blocked",isnotnull('attack_type') AND 'attack_type'!="" AND remediation_status="Auto-Remediated" AND NOT (attack_type IN("Spam","Other") AND remediation_status="Auto-Remediated"),"blocked",isnotnull('attack_type') AND 'attack_type'!="" AND remediation_status!="Auto-Remediated" AND post_remediated="true","blocked",isnotnull('attack_type') AND 'attack_type'!="" AND remediation_status!="Auto-Remediated" AND post_remediated="false","allowed", 'abx_body.judgement' IN ("spam", "safe") AND isnull('attack_type'), "delivered",('log_type'==cases AND 'verdict'=="malicious") OR ('log_type'=="threat_log" AND NOT (attack_type IN("Spam","Other") AND 'remediation_status'=="Auto-Remediated")), "allowed", 1=1,"unknown")
EVAL-app = "Abnormal Security"
EVAL-authentication_method = if( 'abx_body.category'="login" AND isnotnull('abx_body.details.request_url'),replace('abx_body.details.request_url',"\/(.*)\/","\1"),null()) 
EVAL-body = if('abx_body.not_analyzed'="true","Event"+" "+tostring('abx_metadata.event_type')+" not analyzed for the following reason: "+tostring('abx_body.reason_for_no_analysis'),if('abx_body.not_analyzed'="false" AND isnotnull('abx_body.email_label_or_location') AND 'abx_body.email_label_or_location'!="","Event"+" "+tostring('abx_metadata.event_type')+" email location "+tostring('abx_body.email_label_or_location')+" - Abnormal Security Email Verdict: "+tostring('abx_body.judgement'),if('abx_body.not_analyzed'="false","Event"+" "+tostring('abx_metadata.event_type')+" - Abnormal Security Email Verdict: "+tostring('abx_body.judgement'),if(isnotnull('abx_body.posture_category{}'),"Event"+" "+tostring('abx_metadata.event_type')+" - user "+tostring('abx_body.actor_display_name')+" modified the resource "+tostring('abx_body.content.after.permissions{}.resource_name')+" "+tostring('abx_body.posture_category{}'),'abx_body.event_timeline{}.insights{}.description'))))
EVAL-category = if(isnotnull('attack_type') AND NOT (attack_type IN("Spam","Other") AND remediation_status="Auto-Remediated"),'attack_type',null())
EVAL-change_type = if(match('abx_body.category',"^.*user.*") AND 'abx_metadata.event_type'="AUDIT_LOG","AAA",if(match('abx_body.category',"^search.*|view.*") AND 'abx_metadata.event_type'="AUDIT_LOG","log",null()))
EVAL-description = if('abx_body.not_analyzed'="true","Event"+" "+tostring('abx_metadata.event_type')+" not analyzed for the following reason: "+tostring('abx_body.reason_for_no_analysis'),if('abx_body.not_analyzed'="false" AND isnotnull('abx_body.email_label_or_location') AND 'abx_body.email_label_or_location'!="","Event"+" "+tostring('abx_metadata.event_type')+" email location "+tostring('abx_body.email_label_or_location')+" - Abnormal Security Email Verdict: "+tostring('abx_body.judgement'),if('abx_body.not_analyzed'="false","Event"+" "+tostring('abx_metadata.event_type')+" - Abnormal Security Email Verdict: "+tostring('abx_body.judgement'),if(isnotnull('abx_body.posture_category{}'),"Event"+" "+tostring('abx_metadata.event_type')+" - user "+tostring('abx_body.actor_display_name')+" modified the resource "+tostring('abx_body.content.after.permissions{}.resource_name')+" "+tostring('abx_body.posture_category{}'),'abx_body.event_timeline{}.insights{}.description'))))
EVAL-dest = if(isnotnull('attack_type') AND 'attack_type'!="Other" AND 'attack_type'!="none" AND NOT (attack_type IN("Spam","Other") AND remediation_status="Auto-Remediated"),'recipient_address',null())
EVAL-dest_type = if(isnotnull('abx_body.judgement'),"mailbox",null())
EVAL-filter_action = if(attack_type IN("Spam","Other") AND remediation_status="Auto-Remediated","rejected",null())
EVAL-file_name = 'attachment_names{}'
EVAL-file_path = 'folder_locations{}'
EVAL-filter_score = 'attack_score'
EVAL-id = if(isnotnull('abx_body.abnormal_message_id'),'abx_body.abnormal_message_id',null())
EVAL-ids_type = if(NOT (attack_type IN("Spam","Other") AND remediation_status="Auto-Remediated"),"application",null())
EVAL-internal_message_id = 'abx_message_id'
EVAL-log_subtype = case('abx_body.category' IN("create_user","update_user"),"change",'abx_body.category' IN("login"),"authentication",match('abx_body.category',"^.*[M|m]essage.*"),"email")
EVAL-log_type = if(isnotnull('attack_type'),"threat_log",if(isnotnull('abx_body.abnormal_message_id') AND 'abx_metadata.event_type'!="AUDIT_LOG" ,"cases",if('abx_metadata.event_type'=="AUDIT_LOG","audit","email")))
EVAL-message_id = 'internet_message_id'
EVAL-object = if('abx_metadata.event_type'="AUDIT_LOG" AND (isnotnull('abx_body.details.affectedUser') OR isnotnull('abx_body.action')),coalesce('abx_body.details.affectedUser','abx_body.action'),null())
EVAL-object_attrs = if('abx_metadata.event_type'="AUDIT_LOG" AND isnotnull('abx_body.category'),'abx_body.category',null()) 
EVAL-object_category = if(match('abx_body.category',"^.*user.*") AND 'abx_metadata.event_type'="AUDIT_LOG","user",if('abx_metadata.event_type'="AUDIT_LOG" AND match('abx_body.category',"^.*group.*"),"group",null())) 
EVAL-orig_recipient = mvdedup(mvappend('recipient_address','abx_body.details.searchLog.recipient',split('to_addresses',","),'cc_emails{}'))
EVAL-recipient = mvdedup(mvappend('recipient_address','abx_body.details.searchLog.recipient',split('to_addresses',","),'cc_emails{}'))
EVAL-recipient_count = mvcount(mvdedup(mvappend('recipient_address','abx_body.details.searchLog.recipient',split('to_addresses',","),'cc_emails{}')))
EVAL-result = 'abx_body.details.reason'
EVAL-return_addr = 'return_path'
EVAL-sender = coalesce('from_address','abx_body.details.searchLog.sender') 
EVAL-severity = "unknown"
EVAL-signature = if(isnotnull('attack_type') AND 'attack_type'!="Other" AND 'attack_type'!="none" AND (attack_type IN("Spam","Other") AND remediation_status="Auto-Remediated"),'attack_type',if(isnotnull('attack_type') AND 'attack_type'="Other" AND isnotnull('attack_strategy') AND 'attack_strategy'!="null",'attack_strategy',if(NOT (attack_type IN("Spam","Other") AND remediation_status="Auto-Remediated") AND isnotnull('summary_insights{}') AND 'summary_insights{}'!="null" AND 'summary_insights{}'!="",'summary_insights{}',if(isnotnull('abx_body.judgement'),coalesce('abx_body.reason_for_no_analysis','abx_metadata.event_type'),if(isnotnull('abx_body.posture_category{}') AND 'abx_body.posture_category{}'!="",'abx_body.content.after.permissions{}.resource_name',coalesce('abx_body.entity.entity_type', 'abx_body.summary_insights{}'))))))
EVAL-signature_extra = 'summary_insights{}'
EVAL-signature_id = 'threat_id'
EVAL-src = if(isnotnull('sender_ip_address') AND 'sender_ip_address'!="",'sender_ip_address',coalesce('abx_body.source_ip','sender_domain')) 
EVAL-src_ip = if(isnotnull('sender_ip_address') AND 'sender_ip_address'!="",'sender_ip_address','abx_body.source_ip') 
EVAL-src_user = if('abx_metadata.event_type'="AUDIT_LOG",'abx_body.user.email','from_address') 
EVAL-status = case('abx_body.status'=="SUCCESS","success",'abx_body.status'=="FAIL","failure") 
EVAL-subject = coalesce('subject','abx_body.details.subject','abx_body.subject','abx_body.posture_category{}', 'abx_body.event_timeline{}.insights{}.description')
EVAL-type = if(isnotnull('abx_body.judgement') AND 'abx_body.judgement'="safe","event",if(isnotnull('abx_body.judgement') AND 'abx_body.judgement'!="safe","alarm",if(isnotnull('abx_body.posture_category{}') AND 'abx_body.posture_category{}'!="","alert", if('log_type'=="email", "alert", null()))))
EVAL-url = 'urls{}'
EVAL-user = coalesce('abx_body.user.email','recipient_address','abx_body.recipient_address','abx_body.actor_display_name')
EVAL-xref = 'impersonated_party'
EVAL-vendor_product = "Abnormal Security" 
EVAL-verdict = 'abx_body.judgement'
