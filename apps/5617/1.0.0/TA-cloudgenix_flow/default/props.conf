[cloudgenix:flow]
BREAK_ONLY_BEFORE_DATE = 
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Network & Security
description = Cloudgenix SD-WAN network flow logs
disabled = false
pulldown_type = true

EXTRACT-csv = cgxFlowLogV1\s+\d+\s+-\s+\-\s+(?<event_csv>.+$)
REPORT-csv_extraction = csv_extractions

FIELDALIAS-host_for_dvc = host as dvc
FIELDALIAS-dest = dest_ip as dest
FIELDALIAS-src = src_ip as src

EVAL-action = case(vendor_action LIKE "Delete flow%","teardown",vendor_action LIKE "New %low%","allowed",vendor_action=="Flow Update","allowed",1==1,null)
EVAL-bytes = bytes_in+bytes_out
