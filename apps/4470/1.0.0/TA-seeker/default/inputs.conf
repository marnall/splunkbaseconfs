# inputs.conf

### Monitor Inputs
[monitor:///opt/seeker/data/server/logs/diagnostic-server.txt]
  index=os
  sourcetype=config_file

[monitor:///opt/seeker/data/server/logs/server.log]
  index=os
  sourcetype=seeker

[monitor:///opt/seeker/data/sensors/sensor-default/logs/sensor.log]
  index=os
  sourcetype=seeker

[monitor:///opt/seeker/data/sensors/sensor-default/logs/diagnostic-sensor-default.txt]
  index=os
  sourcetype=config_file

### Scripted Inputs
[script://./jps.sh]
  index=os
  sourcetype=seeker:jps

[script://.postgres.sh]
  index=os
  sourcetype=seeker:postgres

[script://.sensor.sh]
  index=os
  sourcetype=seeker:sensor