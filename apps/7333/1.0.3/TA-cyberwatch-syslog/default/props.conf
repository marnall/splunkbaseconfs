[cyberwatch:syslog]
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD = 150
TIME_FORMAT = %b %d %H:%M:%S
TIME_PREFIX = ^<\d+>\w{3} \d+ \d+:\d+:\d+
REPORT-cyberwatch = extract_severity, extract_key_value

# Alias mappings
FIELDALIAS-vulnerability_cve = cve_code as cve
FIELDALIAS-vulnerability_signature_id = cve_code as signature_id
FIELDALIAS-vulnerability_signature = cve_code as signature
FIELDALIAS-vulnerability_description = cve_code as description
FIELDALIAS-vulnerability_severity_id = cve_level as severity_id
FIELDALIAS-vulnerability_status = cve_status as status
FIELDALIAS-vulnerability_cvss_score = cve_score as cvss
FIELDALIAS-vulnerability_title = cve_code as name
FIELDALIAS-vulnerability_id = computer_name as dest
FIELDALIAS-vulnerability_ip = ip as dest_ip
FIELDALIAS-vulnerability_dvc = node as dvc

# Calculated fields
EVAL-vendor_product = "Cyberwatch"
EVAL-published_at = strptime(cve_published_at, "%Y-%m-%d %H:%M:%S %Z")
EVAL-cvss_vector = "AV:" + cvss_AV + "/AC:" + cvss_AC + "/Au:" + cvss_Au + "/C:" + cvss_C + "/I:" + cvss_I + "/A:" + cvss_A
