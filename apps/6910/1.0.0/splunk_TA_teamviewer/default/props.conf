
[teamviewer:log]

#regex extract field by field
#usefull to extract log yg same pattern
EXTRACT-teamviewer_log = (?<date>\d{4}\/\d{2}\/\d{2})\s+(?<time>\d{2}:\d{2}:\d{2}\.\d{3})\s+(?<number1>\d+)\s+(?<number2>\d+)\s+(?<code>\S+)\s+(?<message>.*)$

#EXTRACT-src = punch received a=([\d.]+)

#add new field with current extracted field
FIELDALIAS-code = code as code_log


#EVAL-vendor = "TeamViewer"
#EVAL-product = "TeamViewer RDP"

LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Application
description = Application Teamviewer logs
disabled = false
pulldown_type = true

#add new field in the log
EVAL-vendor = "TeamViewer"
EVAL-product = "TeamViewer RDP"
EXTRACT-src_ip = ^[^=\n]*punch received a=(?P<src_ip>[^:]+)
EXTRACT-src_host = ^[^"\n]*"(?<=Participant channel ")(?P<src_host>\w+).*Initialized
