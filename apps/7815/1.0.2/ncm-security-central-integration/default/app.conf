# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 2

[launcher]
author = Nutanix Inc.
version = 1.0.2
description = NCM Security Central helps you keep your hybrid cloud safe across Amazon Web Services, Microsoft Azure and Nutanix Private Cloud. Identify and fix security issues in real-time. Automate compliance checks for cloud operations using 550+ audits. Get compliance checks for regulatory policies such as HIPAA, PCI-DSS, NIST, and more.This add-on helps you integrate your Splunk install with your Security Central account. It will bring all the Security logs related to vulnerabilities detected and issue state changes to your Splunk install.

[ui]
is_visible = 1
label = NCM Security Central Integration
docs_section_override = AddOns:released

[package]
id = ncm-security-central-integration

[triggers]
reload.addon_builder = simple
reload.ncm_security_central_integration_account = simple
reload.ncm_security_central_integration_settings = simple
reload.passwords = simple

[id]
id = ncm-security-central-integration
