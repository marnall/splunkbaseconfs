[armis_asset_list]
filename=armis_asset_list.csv

[armis_application_checkpoint_lookup]
external_type = kvstore
collection = armis_device_collection
fields_list = _key, ipAddress, macAddress

[armis_enrichment_devices_lookup]
external_type = kvstore
collection = armis_device_collection_for_enrichment
fields_list = armis_asset_host, armis_asset_model, armis_asset_type, armis_asset_vendor, armis_asset_version, armis_asset_category, armis_asset_ip, armis_asset_ipv6, armis_asset_mac_address, armis_asset_name, armis_asset_serial_number, armis_asset_OS_name, armis_asset_OS_version, armis_asset_brand, armis_asset_first_seen, armis_asset_last_seen armis_asset_site

[armis_enrichment_devices_lookup_for_es]
external_type = kvstore
collection = armis_device_collection_for_enrichment_for_es
fields_list = armis_asset_es_host, nt_host, category, ip, mac