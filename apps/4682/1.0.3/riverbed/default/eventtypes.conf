[aix_apm]
search = sourcetype="aix_metric" collection=collection_apm category_id=APPLICATION_ID NOT application="N/A" instance="N/A" server="N/A" server_tag="N/A"

[aix_euem]
search = sourcetype="aix_metric" collection=collection_itsi_eum

# Below is an example of Business Process eventtype definition for Aternity data.
# See corresponding Business Process tag for this eventtype in tags.conf (or Web UI -> Settings -> Event types)
[BP-(Business Process Example)]
search = (sourcetype=aternity* (APPLICATION_NAME="Microsoft Outlook" AND (ACTIVITY_NAME="Send Mail To Outbox" OR ACTIVITY_NAME="Open Mail" OR ACTIVITY_NAME="Preview Mail")) OR (APPLICATION_NAME="SAP" AND (ACTIVITY_NAME="Search Account" OR ACTIVITY_NAME="Create Account" OR ACTIVITY_NAME="Save Record")))
