[List of Hosts ordered by Days since last scan]
action.email.reportServerEnabled = 0
alert.track = 0
description = List of Hosts ordered by Days since last scan
dispatch.earliest_time = 1
display.general.type = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = qualys_splunk_app
request.ui_dispatch_view = search
search = eventtype=qualys_host_summary_event | dedup 1 HOST_ID sortby -_time  | search ACTIVE_SEVERITY_5 > 0 | replace "*Z" with "* UTC" in LAST_SCAN_DATETIME |  eval epochevent=strptime(LAST_SCAN_DATETIME, "%Y-%m-%dT%H:%M:%S %Z") | eval epochnow=now() | eval "Time Since Last Scan"=tostring(epochnow-epochevent, "duration") | sort 100 -"Time Since Last Scan" | table HOST_ID, IP, OS, DNS, LAST_SCAN_DATETIME, ACTIVE_SEVERITY_5, "Time Since Last Scan"

[Most Vulnerable Hosts]
action.email.reportServerEnabled = 0
alert.track = 0
description = List of Hosts with most number of Active Severity 5 vulnerabilities
dispatch.earliest_time = 1
display.general.type = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = qualys_splunk_app
request.ui_dispatch_view = search
search = eventtype=qualys_host_summary_event | dedup HOST_ID sortby IP, -_time | stats sum(ACTIVE_SEVERITY_5) as VULNS by HOST_ID | sort -VULNS | join HOST_ID [search eventtype=qualys_host_summary_event ]| table HOST_ID, IP, OS, DNS, NETBIOS, LAST_SCAN_DATETIME, VULNS


[List of Vulnerabilities group by Host]
action.email.reportServerEnabled = 0
alert.track = 0
description = List of Vulnerabilities grouped by Host
dispatch.earliest_time = 1
display.general.type = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = qualys_splunk_app
request.ui_dispatch_view = search
search = eventtype=qualys_vm_detection_event | dedup 1 HOST_ID, QID, PROTOCOL, STATUS sortby -_time | search STATUS != "FIXED" | join HOST_ID [search eventtype=qualys_host_summary_event ] | join QID [search source=qualys QID_INFO: ] | stats list(QID) as QID, list(TITLE) as TITLE by HOST_ID, IP


