[dx_savedsearch_audit]
external_type = kvstore
collection = dx_savedsearch_audit
fields_list = _key, refresh_time, rest_endpoint, app, owner, sharing, title, type, description, is_scheduled, disabled, cron_schedule, earliest_time, latest_time, actions, email_recipients, lookup_filename, search, search_expanded, updated
case_sensitive_match = false

[dx_savedsearch_perf]
external_type = kvstore
collection = dx_savedsearch_perf
fields_list = _key, refresh_time, app, owner, title, success, skipped, continued, alerted, total_run_time, sid, message
case_sensitive_match = false

[dx_dashboard_audit]
external_type = kvstore
collection = dx_dashboard_audit
fields_list = _key, refresh_time, rest_endpoint, app, owner, sharing, title, type, version, rootNode, parent, label, id, query, ref, base_id, base_ref, earliest, latest, search, search_expanded, error, exception, updated
case_sensitive_match = false