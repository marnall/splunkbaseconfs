[sap:abap]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([23])[A-Z][A-Z][A-Z0-9]\d{14}00
TIME_PREFIX=\w{3}
TIME_FORMAT=%Y%m%d%H%M%S
MAX_TIMESTAMP_LOOKAHEAD = 14
TRANSFORMS=add_separators

REPORT-SAP-Delim = REPORT-SAP-Delim
EXTRACT-SAP-A = ^.{128}(?<FA>.*?[^&\|]*)&*
EXTRACT-SAP-B = ^.{128}.*?&(?<FB>.*?[^&\|]*)&*
EXTRACT-SAP-C = ^.{128}.*?&.*?&(?<FC>.*?[^&\|]*)&*
EXTRACT-SAP-D = ^.{128}.*?&.*?&.*?&(?<FD>.*?[^\|]*)

LOOKUP-add_details_sap = sap_messages message_id AS message_id OUTPUTNEW audit_class AS sap_audit_class event_class AS sap_event_class sap_message as message new_in_release AS sap_new_in_release action AS action signature_id AS signature_id

[sap:java]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^\#\d\.\d\#
TIME_FORMAT =  %Y %m %d %H:%M:%S:%3N
MAX_TIMESTAMP_LOOKAHEAD = 23

LINE_BREAKER = ([\r\n]+)\S+\s+\d+\s+\d+\s+\d+\:\d+\:\d+\:\d+
TRUNCATE = 50000
ANNOTATE_PUNCT = false 
EXTRACT-java_msg=(?<log_msg>.+)
REPORT-java-delim-msg_text = sap_java-delim-msg_text
REPORT-java-delim-log_msg = sap_java-delim-log_msg

LOOKUP-sap_java = sap_java_actions event_type AS event_type OUTPUTNEW signature_id, action 

