# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = false
state = enabled
build = 3

[launcher]
author = Spex
version = 1.0.6
description = This add-on enables users to create a persistent connection to Microsoft 365 APIs so that Power Platform logs can be continually streamed to the Splunk environment. This connection enables admins to use the power of the Splunk to effectively monitor Power Automate executions, statuses errors and threshold limits within Microsoft 365.

[ui]
is_visible = 1
label = Microsoft Power Platform Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-microsoft-power-platform-add-on-for-splunk

[triggers]
reload.addon_builder = simple
reload.ta_microsoft_power_platform_add_on_for_splunk_account = simple
reload.ta_microsoft_power_platform_add_on_for_splunk_settings = simple
reload.passwords = simple