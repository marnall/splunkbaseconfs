[obsidian:alerts]
FIELDALIAS-aob_gen_obsidian_alerts_alias_1 = service AS app
FIELDALIAS-aob_gen_obsidian_alerts_alias_2 = title AS subject
FIELDALIAS-aob_gen_obsidian_alerts_alias_3 = origin AS src
FIELDALIAS-aob_gen_obsidian_alerts_alias_4 = description AS body
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
INDEXED_EXTRACTIONS = JSON
KV_MODE = none
TIMESTAMP_FIELDS = generated_datetime
TZ = UTC

[source::...ta-obsidian-security*.log*]
sourcetype = taobsidiansecurity:log

[source::...ta_obsidian_security*.log*]
sourcetype = taobsidiansecurity:log

[obsidian:events]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
CHARSET = UTF-8
TRUNCATE = 0
INDEXED_EXTRACTIONS = JSON
KV_MODE = none
TIMESTAMP_FIELDS = datetime
TZ = UTC
FIELDALIAS-aob_gen_obsidian_events_alias_1 = event_status AS action
FIELDALIAS-aob_gen_obsidian_events_alias_2 = service AS app
FIELDALIAS-aob_gen_obsidian_events_alias_3 = id AS signature_id
FIELDALIAS-aob_gen_obsidian_events_alias_4 = ip_address AS src
FIELDALIAS-aob_gen_obsidian_events_alias_5 = actor.email AS src_user
FIELDALIAS-aob_gen_obsidian_events_alias_6 = actor.name AS user
EVAL-action = case(action="SUCCESS", "success", action="FAIL", "failure", 1=1, action)

[obsidian:audit]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
INDEXED_EXTRACTIONS = JSON
KV_MODE = none
TIMESTAMP_FIELDS = timestamp
TZ = UTC

