[obsidian_events]
start_by_shell = false
python.version = python3
sourcetype = obsidian:events
interval = 900
obsidian_api_url = https://api.obsec.io/v1/gql
event_query = event:obsidian.authenticate status:success
disabled = 0

[obsidian_audit]
start_by_shell = false
python.version = python3
sourcetype = obsidian:audit
interval = 300
obsidian_api_url = https://api.obsec.io/v1/gql
disabled = 0

[obsidian_alerts]
start_by_shell = false
python.version = python3
sourcetype = obsidian:alerts
interval = 120
obsidian_api_url = https://api.obsec.io/v1/gql
fetch_related_events = False
max_retries = 5
initial_alert_id = 0
disabled = 0

