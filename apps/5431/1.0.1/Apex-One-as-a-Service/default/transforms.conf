# Copyright 2018, Trend Micro

[apexcentral-cefheaders]
REGEX = CEF:(?<cef_version>\d+)\|(?<cef_vendor>[^|]*)\|(?<cef_product>[^|]*)\|(?<cef_prodversion>[^|]*)\|(?<cef_signature>[^|]*)\|(?<cef_name>[^|]*)\|(?<cef_severity>[^|]*)

[apexcentral-cefkeys]
REGEX = (?:_+)?(?<_KEY_1>[\w.:\[\]]+)=(?<_VAL_1>.*?(?=(?:\s[\w.:\[\]]+=|$)))
REPEAT_MATCH = True

[apexcentral-cefcustom]
REGEX = (\S+)=([^=]*)\s+(?:\1Label)=([^=]+)(?:(?:\s\w+=)|$)
KEEP_EMPTY_VALS = True

[apexcentral-attack-discovery-detection]
REGEX = CEF:.*\|Trend Micro\|Apex Central\|.*\|.*\|Attack Discovery Detections\|.*\|
FORMAT = sourcetype::apexcentralsyslog:apexcentral-attack-discovery-detection
DEST_KEY = MetaData:Sourcetype

