EVAL-category = case(cs2 == "0", "Compromised Executable File", cs2 == "1", "New startup program", cs2 == "3", "Program Library Injection", cs2 == "4", "New Internet Exprlorer Plugin", cs2 == "5", "Internet Explorer Setting Modification", cs2 == "6", "Shell modification", cs2 == "7", "New Service", cs2 == "8", "Security Policy Modification", cs2 == "9", "Firewall Policy Modification", cs2 == "10", "System File Modification", cs2 == "11", "Duplicated System File", cs2 == "13", "Layered Service Provider", cs2 == "14", "System Process Modification", cs2 == "16", "Suspicious Behavior", cs2 == "100", "Newly Encountered Program", cs2 == "200", "Unauthorized File Encryption", cs2 == "1000", "Threat Behavior Analysis", cs2 == "9999", "User Defined Policy")

