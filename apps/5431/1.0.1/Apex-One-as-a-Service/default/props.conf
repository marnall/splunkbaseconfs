[apexcentralsyslog:apexcentral-antimalware]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-Apex Central Antimalware Field Aliases = cef_product AS vendor deviceFacility AS product dhost AS dest act AS action cef_ruleid AS rule_id cef_name AS signature filePath AS file_path dvchost AS src fname AS file_name rt AS date fileHash as file_hash duser AS user
EVAL-file_name = mvindex(split(filePath,"\\"),-1)
REPORT-cefevents = apexcentral-cefheaders,apexcentral-cefkeys,apexcentral-cefcustom

[source::...apex_one_as_a_service*.log*]
sourcetype = apexoneasaservice:log

[apexcentralsyslog:apexcentral-behavior-monitoring]
