action.notable.param.extract_artifacts = {"asset":["src","dest","dvc","orig_host","_risk_system"],"identity":["user","risk_object"]}
action.notable.param.nes_fields = risk_object,risk_object_type
action.notable.param.rule_description = Risk Threshold Exceeded for an OT asset over a 24 hour period
action.notable.param.rule_title = 24 hour risk threshold exceeded for OT Asset $risk_object$
action.notable.param.security_domain = threat
