search = | tstats summariesonly=true sum(All_Risk.calculated_risk_score) as risk_score, count(All_Risk.calculated_risk_score) as risk_event_count,values(All_Risk.annotations.mitre_attack.mitre_tactic_id) as annotations.mitre_attack.mitre_tactic_id, dc(All_Risk.annotations.mitre_attack.mitre_tactic_id) as mitre_tactic_id_count, values(All_Risk.annotations.mitre_attack.mitre_technique_id) as annotations.mitre_attack.mitre_technique_id, dc(All_Risk.annotations.mitre_attack.mitre_technique_id) as mitre_technique_id_count, values(All_Risk.tag) as tag, values(source) as source, dc(source) as source_count, values(All_Risk.dest) as dest, values(All_Risk.src) as src from datamodel=Risk.All_Risk by All_Risk.risk_object,All_Risk.risk_object_type,All_Risk.src \
| `drop_dm_object_name("All_Risk")` \
| eval "annotations.mitre_attack"='annotations.mitre_attack.mitre_technique_id' \
| `get_risk_severity(risk_score)` \
| `get_asset_by("str", risk_object)` \
| mvexpand dest \
| mvexpand src \
| stats sum(risk_score) as risk_score sum("mitre_technique_id_count") as "mitre_technique_id_count" sum("mitre_tactic_id_count") as "mitre_tactic_id_count" sum(risk_event_count) as risk_event_count values("annotations.mitre_attack.mitre_technique_id") as "annotations.mitre_attack.mitre_technique_id" values("annotations.mitre_attack.mitre_tactic_id") as "annotations.mitre_attack.mitre_tactic_id" values("annotations.mitre_attack") as "annotations.mitre_attack" values(severity) as severity values(tag) as tag values(dest) as dest values(source) as source values(src) as src by risk_object,risk_object_type\
| `get_asset_by("str", risk_object)`\
| search `ot_identifier(risk_object_category)`

