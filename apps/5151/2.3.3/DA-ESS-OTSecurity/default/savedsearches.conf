[Access - OT Access - Suspicious local log on after denied Physical access - Rule]
action.correlationsearch.annotations = {"kill_chain_phases":["Exploitation"],"nist":["PR.BP"]}
action.correlationsearch.enabled = 1
action.correlationsearch.label = OT Access - Suspicious local log on after denied Physical access
action.customsearchbuilder.enabled = false
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable = 1
action.notable.param.extract_artifacts = {"asset":["dest"],"identity":["user"]}
action.notable.param.rule_description = Suspicious local log on after denied Physical access detected by user $user$ at $dest_site_id$
action.notable.param.rule_title = Suspicious local log on after denied Physical access
action.notable.param.security_domain = access
action.notable.param.severity = low
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk = 1
action.risk.forceCsvResults = 1
action.risk.param._risk = [{"risk_object_field":"user","risk_object_type":"user","risk_score":10},{"risk_object_field":"dest_site_id","risk_object_type":"system","risk_score":5}]
action.risk.param._risk_message = Bypassing physical security controls to gain physical access may allow adversaries to bypass cyber security controls.
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.suppress = 1
alert.suppress.fields = user,dest_site_id
alert.suppress.period = 21600s
alert.track = 1
counttype = number of events
cron_schedule = 10 */1 * * *
description = This alert shows when a user logs into a machine after having denied physical access, possibly highlighting someone bypassing physical perimeters
dispatch.earliest_time = -4h
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 0
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = | pivot Authentication Authentication count(Authentication) AS "Count of Authentication" SPLITROW action AS action SPLITROW dest AS dest SPLITROW _time AS _time PERIOD auto SPLITROW user AS user SPLITROW app AS app FILTER user isNot "ANONYMOUS LOGON" FILTER app is "*local*" \
| `get_asset_by("str", dest)` \
| `get_asset_type(dest_asset_type)` \
| `get_identity(user, "identity")` \
| search `ot_identifier(dest_category)`\
| join type=left login_identity \
    [ search `get_physicalaccess_records` \
    | eval zone=site \
    | eventstats latest(result) as last_result by user,location,site \
    | search last_result=failure access_type="ingress" \
    | `get_identity(user, "identity")` \
    | eventstats count as badge_failures by user,location,site \
    | eval badge_time=_time \
    | fields login_identity,badge_time,location,site, badge_failures] \
| search badge_time=* \
| eval asset=if(isnotnull(dest_nt_host), dest_nt_host, if(isnotnull(dest_ip), dest_ip, dest)) \
| eventstats max(badge_time) as lastFailure max(_time) as _time sum(badge_failures) as failures values(location) as location values(asset) as dest by user,dest_site_id


