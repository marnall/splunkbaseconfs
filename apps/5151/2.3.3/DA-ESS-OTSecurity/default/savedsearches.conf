dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 0
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = eventtype=mitre_ics_event technique_id="T849" OR technique_id="T0849 "\
| `get_mitre_host_info_mac` \
| append \
    [ search sourcetype=”XmlWinEventLog:Microsoft-Windows-Sysmon/Operational” \
        (Image=*svchost.exe \
        OR Image=SMSS* \
        OR Image=CSRSS.EXE \
        OR Image=WININIT.EXE \
        OR Image=SERVICES.EXE \
        OR Image=LSASS.EXE \
        OR Image=SVCHOST.EXE \
        OR Image=LSM.EXE \
        OR Image=WINLOGON.EXE \
        OR Image=Explorer.exe ) \
    | eval TIME=strftime(_time,"%Y-%m-%d %H:%M") \
    | eventstats dc(host) as host_cnt_image by Image \
    | stats earliest(TIME) as first_time, values(host) as host, dc(host) as host_cnt, count by Image, Hashes \
    | eval RATIO=(host_cnt/host_cnt_image)*100 \
    | search RATIO<20 \
    | mvexpand host \
    | rename host as dvc \
    | search `ot_identifier(src_category)` OR `ot_identifier(dest_category)`]

