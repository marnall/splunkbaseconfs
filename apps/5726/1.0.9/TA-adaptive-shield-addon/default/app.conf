[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 13

[launcher]
author = Adaptive Shield
version = 1.0.9
description = Adaptive Shield continuously monitors all your SaaS apps, detecting any misconfigurations, incorrect permissions, exposures, wherever they may be.Using Splunk you can now query every connected integration's status,  security checks' remediation plan, and more, allowing you to drill down to the exact insights you’re looking for.Fuse Adaptive Shield’s data with your Splunk will improve your SaaS stack's visibility, automation, and end-to-end security posture.

[ui]
is_visible = 1
label = Adaptive Shield Addon
docs_section_override = AddOns:released

[package]
id = TA-adaptive-shield-addon

[triggers]
reload.addon_builder = simple
reload.ta_adaptive_shield_addon_account = simple
reload.ta_adaptive_shield_addon_settings = simple
reload.passwords = simple

