[CCX Okta Extensions User Record - Lookup Gen]
cron_schedule = */15 * * * *
dispatch.earliest_time = -90d
dispatch.latest_time = now
disabled = 0
enableSched = 1
search = `ccx_okta_extensions_indexes`  sourcetype=oktaim2:user id="*"\
| dedup id\
| table id,profile.login,profile.firstName,profile.lastName,profile.email\
| rename id as user_id\
| rename profile.firstName as firstName\
| rename profile.lastName as lastName\
| makemv delim="," profile.login\
| makemv delim="," profile.email\
| mvexpand profile.login\
| mvexpand profile.email\
| fillnull profile.login,profile.email,user_id,firstName,lastName value="OKTA_PLACEHOLDER_VALUE"\
| stats values(profile.login) as loginName values(profile.email) as email by user_id firstName lastName\
| inputlookup append=t ccx_okta_extensions_user_record1\
| fillnull loginName,email,user_id,firstName,lastName value="OKTA_PLACEHOLDER_VALUE"\
| stats values(loginName) as loginName values(email) as email by user_id firstName lastName\
| foreach *\
    [| eval <<FIELD>>=if(<<FIELD>>="OKTA_PLACEHOLDER_VALUE",null(),<<FIELD>>) ]\
| outputlookup output_format=splunk_mv_csv ccx_okta_extensions_user_record1
