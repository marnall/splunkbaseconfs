#
# Splunk app configuration file
#
[launcher]
author = Splunk Inc.
description = Data collection application enabling the archiving/snapshot of search results from one or multiple remote Splunk Enterprise Security Search Head instances. Note this application is dependent on version 1.0.0 or greater of the Mothership App for Splunk
version = 2.1.0

[install]
is_configured = 0

[ui]
is_visible = 1
label = ES Mothership App for Splunk

[package]
id = es-mothership

[triggers]
reload.environment_search_templates = simple
