[sp6_cmmc_application_installs]
search = `sp6_cmmc_windows_index` source = "WinEventLog:DFS Replication" OR source = "WinEventLog:Directory Service" OR source = "WinEventLog:File Replication Service" OR source = "WinEventLog:Key Management Service" OR source="WinEventLog:DNS Server" OR source="WinEventLog:Exchange Auditing" SourceName=MsiInstaller EventCode=11707

[sp6_cmmc_audit_log_events]
search = `sp6_cmmc_linux_index` sourcetype=auditd OR `sp6_cmmc_windows_index` sourcetype=WinEventLog (EventCode=104 OR EventCode=1102 OR EventCode=4719 OR EventCode=4624 OR EventCode=4625 OR EventCode=4728 OR EventCode=4632 OR EventCode=4656)

[sp6_cmmc_backup_log_events]
search = `sp6_cmmc_backup_index` sourcetype="netbackup_logs"

[sp6_cmmc_firewall_log_events]
search = tag=network tag=session sourcetype="*"

[sp6_cmmc_incident_events]
search = sourcetype="m365:defender:incident"

[sp6_cmmc_kerberos_auth]
search = `sp6_cmmc_windows_index` source="WinEventLog:Security" EventCode=4768

[sp6_cmmc_linux_audit_log_events]
search = `sp6_cmmc_linux_index` sourcetype=auditd

[sp6_cmmc_mfa_events]
search = (sourcetype=aws:cloudtrail eventName=ConsoleLogin) OR sourcetype = azure:aad:signin OR (sourcetype=ms:mfa action=* user=*)

[sp6_cmmc_physical_access_data]
search = sourcetype=hid_data OR sourcetype=honeywell_winpak OR sourcetype=traction_guest

[sp6_cmmc_tls_use]
search = index=* sourcetype=stream:tcp ssl_cert_sha1=* reason=*

[sp6_cmmc_winapplocker_blocked_events]
search = `sp6_cmmc_windows_index` sourcetype=WinEventLog (EventCode=8004 OR EventCode=8007) ComputerName="*"

[sp6_cmmc_windows_audit_log_events]
search = `sp6_cmmc_windows_index` sourcetype=WinEventLog (EventCode=104 OR EventCode=1102 OR EventCode=4719 OR EventCode=4624 OR EventCode=4625 OR EventCode=4728 OR EventCode=4632 OR EventCode=4656)

[sp6_crowdstrike_data]
search = index=main sourcetype="crowdstrike:device:json"

[default_system]
search = index=* host=* sourcetype=*
