fields_list = _delete,_key,_last_updated,_sources,asset,asset_tag,bunit,category,cim_entity_zone,city,country,dns,image_id,image_name,instance_type,ip,is_expected,lat,long,mac,network_interface_id,nt_host,owner,pci_domain,priority,requires_av,should_timesync,should_update,subnet_id,vendor_account,vendor_region,cui_system_name,cui_system_role,cui_system_splunk_id,cui_system_id
