[identity_lookup_expanded]
collection = sp6_identities
external_type = kvstore
filter = NOT _delete="true"
max_matches = 1
case_sensitive_match =
fields_list = _delete,_key,_last_updated,_sources,bunit,category,cim_entity_zone,email,endDate,first,identity,identity_tag,last,managedBy,nick,phone,prefix,priority,startDate,suffix,watchlist,work_city,work_country,work_lat,work_long,cui_system_splunk_id,cui_system_name,cui_system_id,cui_system_role


