| lookup usecase_mapping.csv L6_sourcetype_category OUTPUT use_case\
| fields - child_use_case, parent_use_case\
| mvexpand use_case\
| where isnotnull(use_case)\
| lookup usecase_mapping.csv use_case L6_sourcetype_category OUTPUT lantern_uce lantern_vertical lantern_vertical_category lantern_url percent_of_use_case\
| stats count by L7_sourcetype L6_sourcetype_category lantern_uce lantern_url lantern_vertical lantern_vertical_category percent_of_use_case use_case\
| fields - count\
