[sourcetype_mapping gap analysis search]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = use_case_explorer
request.ui_dispatch_view = search
search = | tstats summariesonly=t distinct_count(sourcetype) WHERE index=* NOT sourcetype IN (*-too_small,dpkg*,stash,unattended*) by sourcetype \
| fields - distinct_count(sourcetype) \
| rename sourcetype as L7_sourcetype \
| lookup sourcetype_mapping L7_sourcetype OUTPUT L6_sourcetype_category\
| where isnull(L6_sourcetype_category)

[usecase_bookmark_init]
search = | makeresults count=1 \
| inputlookup usecase_bookmark append=t \
| inputlookup usecase_bookmark_factory append=t \
| table "use_case","bookmark","completed" \
```| outputlookup usecase_bookmark```

[usecase_interactions_init]
search = | makeresults count=1 \
| eval interaction_time=now() \
| inputlookup usecase_interactions append=t \
| table "interaction_time","use_case","bookmark","completed","Data_Match_Discovered","distinct_UCE_Data_Category","distinct_Discovered_Sourcetypes","distinct_use_case_name" \
```| outputlookup usecase_interactions ```

[usecase_apps_local]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","latest_search","shcluster_label","label","data.search_props.app","data.search_props.label","data.process_type","data.workload_pool_type","data.search_props.type","data.normalized_pct_cpu","data.mem_used","data.elapsed","data.search_props.user","type","auto_refresh_delay","dashboard_reference","datamodel_reference","eventtype_reference","lookup_reference","macro_reference","report_reference","rest_reference","source_reference","status","savedsearch_name","savedsearch_id","sid","search_type","version","data.apps{}.meta.JQueryVersionNumber","data.apps{}.meta.JQueryVersionStatus","data.apps{}.meta.localpythonSDKVersion","data.apps{}.meta.remotepythonSDKVersion","data.apps{}.version","data.appVersion","data.federated_version","data.os_version","data.osVersion","data.scriptPythonVersion","data.serverVersion","data.splappVersion","data.splunk_version","data.splunkVersion","data.version","federated_version","splunkVersion","role","searchtype","user"]
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = usecase_explorer
request.ui_dispatch_view = search
search = | rest splunk_server=* timeout=600 /servicesNS/-/-/apps/local \
| rename eai:acl.* AS * , label as app_label \
| eval Splunk_Instance = lower(splunk_server) , author = if(author="nobody", "system", author) \
| rename perms.read AS acl_perms_read , perms.write AS acl_perms_write update.appurl AS update_appurl update.homepage AS update_homepage , version AS current_version update.version AS latest_version \
| search NOT app_name IN (075-*,100-*,alert_logevent,alert_webhook,appsbrowser,cloud_administration,data_manager,dmc,dynamic-data-self-storage-app,introspection_generator_addon,journald_input,learned,legacy,prometheus,python_upgrade_readiness_app,sample_app,scsaudit,search_artifacts_helper,splunk_app_for_splunk_o11y_cloud,splunk_archiver,splunk_assist,splunk_essentials_8_*,splunk_essentials_9_*,splunk_gdi,splunk_httpinput,splunk_instance_monitoring,splunk_instrumentation,splunk_internal_metrics,splunk_metrics_workspace,Splunk_ML_Toolkit,splunk_monitoring_console,splunk_product_guidance,splunk_rapid_diag,Splunk_SA_CIM,splunk_secure_gateway,splunk-dashboard-studio,splunk-rolling-upgrade,splunk-visual-exporter,splunkclouduf,SplunkDeploymentServerConfig,SplunkForwarder,SplunkLightForwarder,system,tos,_cluster,_cluster_admin,splunk_ta_data_manager, search, launcher, splunk_datasets_addon) \
| rex field=updated mode=sed "s/^19.*//g" \
| eval updated = strptime(updated, "%Y-%m-%dT%H:%M:%S%z") \
| eval acl_perms_read = if(match(acl_perms_read, "\*"), "Everyone", acl_perms_read), acl_perms_write = if(match(acl_perms_write, "\*"), "Everyone", acl_perms_write) \
| rename title as app_name \
| stats VALUES(Splunk_Instance) AS Splunk_Instance VALUES(acl_perms_read) AS acl_perms_read VALUES(acl_perms_write) AS acl_perms_write LAST(app_label) AS app_label LAST(core) AS core LAST(author) AS author LAST(current_version) AS current_version LAST(latest_version) AS latest_version LAST(build) AS build LAST(check_for_updates) AS check_for_updates LAST(visible) AS visible LAST(sharing) AS sharing LAST(disabled) AS disabled LAST(configured) AS configured LAST(show_in_nav) AS show_in_nav LAST(state_change_requires_restart) AS state_change_requires_restart LAST(description) AS description LAST(details) AS details LAST(updated) AS updated LAST(setup_view) AS setup_view LAST(attribution_link) AS attribution_link LAST(update_appurl) AS update_appurl LAST(update_homepage) AS update_homepage LAST(docs_section_override) AS docs_section_override LAST(managed_by_deployment_client) AS managed_by_deployment_client BY app_name \
| eval _time = now() \
| foreach Splunk_Instance "acl_perms_*" \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| table _time, label, Splunk_Instance, app_name, app_label, core, author, current_version, latest_version, build, check_for_updates, visible, sharing, disabled, configured, show_in_nav, state_change_requires_restart, description, details, updated, acl_perms_read, acl_perms_write, setup_view, attribution_link, update_appurl, update_homepage, docs_section_override, managed_by_deployment_client \
| collect index=summary source=usecase_apps_local testmode=false
