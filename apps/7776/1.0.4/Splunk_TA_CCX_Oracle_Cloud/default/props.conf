
[oracle:cloud]
BREAK_ONLY_BEFORE_DATE = 
INDEXED_EXTRACTIONS = json
KV_MODE = NONE
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TRUNCATE = 0
pulldown_type = 1

REPORT-ccx_oracle_cloud_extraction = ccx_oracle_cloud_extraction
REPORT-ccx_oracle_cloud_extraction_2 = ccx_oracle_cloud_extraction_2

LOOKUP-ccx_oracle_cloud_eventname_lookup = ccx_oracle_cloud_eventname_lookup "data.eventName" OUTPUTNEW action change_type dataset_name type

#############
##LB WAF - https://docs.oracle.com/en-us/iaas/Content/Logging/Reference/details_for_lbwaf.htm ##
#############

EVAL-action = if('data.eventName' IN ("AuthenticationUser", "InitiateSSOAuthFactor", "InteractiveLogin", "SuccessAuthentication", "FactorMfa", "FactorMfa") AND match('data.message', "(fail)"), "failure", if('data.eventName' IN ("AuthenticationUser", "InitiateSSOAuthFactor", "InteractiveLogin", "SuccessAuthentication", "FactorMfa", "FactorMfa") AND NOT match('data.message', "(fail)"), "success", if(host="OCI_Functions",'action', null())))
EVAL-app = if(host="OCI_Functions",null(),"Oracle Cloud")
EVAL-body = case('data.eventName' IN ("AttachVnic", "AttachVolume", "AutomaticBackupDatabase", "CopyBootVolumeBackup", "CopyVolumeBackup", "DetachVnic", "DetachVolume", "EmailNotificationDeliveryStatus", "InstanceAction", "InstanceConsoleConnected", "job.failed", "job.succeeded", "JobRunning", "LaunchInstance", "ReceiveSamlSpSsoResonse", "ReleaseCloudShellHost", "RequestSummarizedCostEstimations", "RequestSummarizedProblems", "SentSamlIdpSsoResonse"), 'data.eventName')
EVAL-description = case('data.eventName' IN ("AttachVnic", "AttachVolume", "AutomaticBackupDatabase", "CopyBootVolumeBackup", "CopyVolumeBackup", "DetachVnic", "DetachVolume", "EmailNotificationDeliveryStatus", "InstanceAction", "InstanceConsoleConnected", "job.failed", "job.succeeded", "JobRunning", "LaunchInstance", "ReceiveSamlSpSsoResonse", "ReleaseCloudShellHost", "RequestSummarizedCostEstimations", "RequestSummarizedProblems", "SentSamlIdpSsoResonse"), 'data.eventName')
EVAL-dest = case(host="OCI_Functions",'data.host','data.eventName' IN ("AttachVnic", "AttachVolume", "AutomaticBackupDatabase", "CopyBootVolumeBackup", "CopyVolumeBackup", "DetachVnic", "DetachVolume", "EmailNotificationDeliveryStatus", "InstanceAction", "InstanceConsoleConnected", "job.failed", "job.succeeded", "JobRunning", "LaunchInstance", "ReceiveSamlSpSsoResonse", "ReleaseCloudShellHost", "RequestSummarizedCostEstimations", "RequestSummarizedProblems", "SentSamlIdpSsoResonse"),'data.additionalDetails.actorName')
EVAL-object = case(isnotnull('data.request.path') AND NOT 'data.request.path'=="null" AND NOT host="OCI_Functions", 'data.request.path', match('data.additionalDetails.eventId', "^(sso)") AND NOT host="OCI_Functions", coalesce('ssoApplicationName', 'ssoApplicationId'))
EVAL-object_attrs = if(isnull('data.additionalDetails.volumeId') OR 'data.additionalDetails.volumeId'=="null", null(), 'data.additionalDetails.volumeId')
EVAL-object_category = 'data.additionalDetails.type'
EVAL-reason = case('data.eventName' IN ("AuthenticationUser", "InitiateSSOAuthFactor", "InteractiveLogin", "SuccessAuthentication", "FactorMfa"), if(match('data.message', "(fail)"), replace('data.message', ".+\s+with\s+response\s+(.+)", "\1"), null()))
EVAL-result = 'data.message'
EVAL-signature = case('data.eventName' IN ("AttachVnic", "AttachVolume", "AutomaticBackupDatabase", "CopyBootVolumeBackup", "CopyVolumeBackup", "DetachVnic", "DetachVolume", "EmailNotificationDeliveryStatus", "InstanceAction", "InstanceConsoleConnected", "job.failed", "job.succeeded", "JobRunning", "LaunchInstance", "ReceiveSamlSpSsoResonse", "ReleaseCloudShellHost", "RequestSummarizedCostEstimations", "RequestSummarizedProblems", "SentSamlIdpSsoResonse"), 'data.eventName', 'data.eventName' IN ("AuthenticationUser", "InitiateSSOAuthFactor", "InteractiveLogin", "SuccessAuthentication", "FactorMfa"), if(match('data.message', "(fail)"), 'data.message', 'data.eventName'))
EVAL-src = case('data.eventName' IN ("AttachVnic", "AttachVolume", "AutomaticBackupDatabase", "CopyBootVolumeBackup", "CopyVolumeBackup", "DetachVnic", "DetachVolume", "EmailNotificationDeliveryStatus", "InstanceAction", "InstanceConsoleConnected", "job.failed", "job.succeeded", "JobRunning", "LaunchInstance", "ReceiveSamlSpSsoResonse", "ReleaseCloudShellHost", "RequestSummarizedCostEstimations", "RequestSummarizedProblems", "SentSamlIdpSsoResonse") OR 'data.eventName' IN ("AuthenticationUser", "InitiateSSOAuthFactor", "InteractiveLogin", "SuccessAuthentication", "FactorMfa"),'data.additionalDetails.clientIp', 'data.eventName' IN ("AccessApp", "generateUnifiedAgentConfiguration", "pulldockerlayer", "readdockerrepositorymanifest") OR match('data.eventName', "^(Activate|Add|Assign|Create|Deactivate|Delete|Get|get|List|list|LIST|Modify|Remove|Terminate|Update)"), 'data.identity.ipAddress',host="OCI_Functions",'clientAddr')
EVAL-src_ip = case('data.eventName' IN ("AttachVnic", "AttachVolume", "AutomaticBackupDatabase", "CopyBootVolumeBackup", "CopyVolumeBackup", "DetachVnic", "DetachVolume", "EmailNotificationDeliveryStatus", "InstanceAction", "InstanceConsoleConnected", "job.failed", "job.succeeded", "JobRunning", "LaunchInstance", "ReceiveSamlSpSsoResonse", "ReleaseCloudShellHost", "RequestSummarizedCostEstimations", "RequestSummarizedProblems", "SentSamlIdpSsoResonse") OR 'data.eventName' IN ("AuthenticationUser", "InitiateSSOAuthFactor", "InteractiveLogin", "SuccessAuthentication", "FactorMfa"),'data.additionalDetails.clientIp', 'data.eventName' IN ("AccessApp", "generateUnifiedAgentConfiguration", "pulldockerlayer", "readdockerrepositorymanifest") OR match('data.eventName', "^(Activate|Add|Assign|Create|Deactivate|Delete|Get|get|List|list|LIST|Modify|Remove|Terminate|Update)"), 'data.identity.ipAddress',host="OCI_Functions",'clientAddr')
EVAL-status = if(host="OCI_Functions",'data.response.code',if(match('data.message', "(fail)"), "failure", "success"))
EVAL-subject = case('data.eventName' IN ("AttachVnic", "AttachVolume", "AutomaticBackupDatabase", "CopyBootVolumeBackup", "CopyVolumeBackup", "DetachVnic", "DetachVolume", "EmailNotificationDeliveryStatus", "InstanceAction", "InstanceConsoleConnected", "job.failed", "job.succeeded", "JobRunning", "LaunchInstance", "ReceiveSamlSpSsoResonse", "ReleaseCloudShellHost", "RequestSummarizedCostEstimations", "RequestSummarizedProblems", "SentSamlIdpSsoResonse"), 'data.eventName')
EVAL-user = coalesce('data.additionalDetails.actorName', 'data.additionalDetails.actorDisplayName', 'data.definedTags.Oracle-Tags.CreatedBy')
EVAL-http_user_agent = if(host="OCI_Functions",'agent',null())
EVAL-http_method = if(host="OCI_Functions",'method',null())
EVAL-bytes = if(host="OCI_Functions",'data.response.size',null())
EVAL-bytes_out = if(host="OCI_Functions",'data.response.size',null())
EVAL-uri_path = if(host="OCI_Functions" AND isnotnull('data.request.path') AND 'data.request.path'!="/",'data.request.path',null())
EVAL-url = if(host="OCI_Functions" AND ('data.host'="0.0.0.0" OR 'data.host'="default" OR isnull('data.host')),null(),'data.host')
EVAL-vendor_product = if(host="OCI_Functions","Oracle Cloud LB WAF","Oracle Cloud")
