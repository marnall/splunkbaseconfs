[eset:custom]
EXTRACT-ESETProtectDeviceOsName = ESETProtectDeviceOsName=(?P<deviceOS>\w.*)\s+cat
EXTRACT-deviceProcessName = ^(?:[^\\\n]*\\){2}\d+\w+\s+\w+=(?P<deviceProcName>\w+:\\\\\w+\s+\w+\s+\(\w+\)\\\\\w+\\\\\w+\\\\\w+\\\\\w+\.\w+)
EXTRACT-object = \d{3}\|(?P<object>\w.*)\|\d
EXTRACT-object_attr = cs1=(?P<object_attrs>\w.*)\s+cs1Label
EXTRACT-object_id = ^(?:[^\|\n]*\|){4}(?P<object_id>\d+)
EXTRACT-src = ^(?:[^ \n]* ){3}(?P<src>[^ ]+)
EXTRACT-user = (suser=|Authenticating\s+mapped\s+account\s+\')(?P<user>\w.*)(\s+|\'\.)(cs2=|deviceProcessName|'\.\s+cs2)
REPORT-vendor_product = eset_transforms
EVAL-change_type = if(isnull(change_type), "NA", "NA")
EVAL-dest = if(isnotnull(dest), tostring(dest), '')
EVAL-vendor_product = vendor. " " .product
EVAL-object_path = if(isnotnull(deviceProcessName), tostring(deviceProcessName), '')
EVAL-result = case(cs2=="Success", "success", cs2=="HTTP", lower(action))
EVAL-result_id = case(cs2=="Success", tostring(0),cs2=="HTTP", tostring(0), true(), tostring(1))
EVAL-status = case(in("Success", cs2), "success", in("HTTP", cs2), "success", true(), "failure")
EVAL-user = replace(user, "\'\.","")
EVAL-user_name = if(isnotnull(user), replace(user, "\'\.",""), '')
FIELDALIAS-ESET_FA = act ASNEW action act ASNEW command cs1 ASNEW object_category dst ASNEW dest
LOOKUP-eset_action = eset_action_lookup action AS act OUTPUT action_cim AS action
