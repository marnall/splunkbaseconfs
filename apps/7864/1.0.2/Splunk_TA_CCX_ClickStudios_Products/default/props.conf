
[source::program:Passwordstate]

EXTRACT-ccx_clickstudios_passwordstate_reset_password_user = reset the password for \'(?<reset_user>[^\']+)\'
EXTRACT-ccx_clickstudios_passwordstate_vendor_user = (?:\(|\')(?<vendor_user>\w+\\\w+)(?:\)|\')

REPORT-ccx_clickstudios_passwordstate_kvp = ccx_clickstudios_passwordstate_kvp

EVAL-action = case(match('Passwordstate', "login") AND NOT match('Passwordstate', "(copied|opened|exported|viewed)") AND match('Passwordstate', "Fail"), "failure", match('Passwordstate', "login") AND NOT match('Passwordstate', "(copied|opened|exported|viewed)") AND NOT match('Passwordstate', "Fail"), "success", match('Passwordstate', "logoff"), "logoff", match('Passwordstate', "viewed|checked out|checked in"), "read", match('Passwordstate', "removed"), "deleted", match('Passwordstate', "reset"), "restarted", match('Passwordstate', "modified|edited|moved"), "modified", match('Passwordstate', "updated|enabled|disabled"), "updated", match('Passwordstate', "added"), "created", match('Passwordstate', "granted"), "granted")
EVAL-app = "Click Studios:Passwordstate"
EVAL-body = if(match('Passwordstate', "copied|opened|exported|Heartbeat check|Auditing Archive Complete"), 'Passwordstate', null())
EVAL-change_type = if(match('Passwordstate', "logoff|viewed|removed|checked out|reset|modified|updated|enabled|added|edited|moved|disabled|checked in"), "AAA", null())
EVAL-description = if(match('Passwordstate', "copied|opened|exported|Heartbeat check|Auditing Archive Complete"), 'Passwordstate', null())
EVAL-object = if(match('Passwordstate', "logoff|viewed|removed|checked out|reset|modified|updated|enabled|added|edited|moved|disabled|checked in|granted"), coalesce('vendor_user', replace('UserName', "([^\)\,]+)(?:\)|\,)(?:.+)?", "\1"), 'reset_user'), null())
EVAL-reason = if((match('Passwordstate', "login") AND match('Passwordstate', "Fail")) AND NOT match('Passwordstate', "(copied|opened|exported|viewed)"), replace(_raw, "Passwordstate\:\s+((?:Successful|Failed)\s+(?:\')?Active\s+Directory(?:\')?\s+login\s+(?:attempt)?).+", "\1"), null())
EVAL-signature = if(match('Passwordstate', "copied|opened|exported|Heartbeat check|Auditing Archive Complete"), 'Passwordstate', if(match('Passwordstate', "login") AND NOT match('Passwordstate', "(copied|opened|exported|viewed)"), replace(_raw, "Passwordstate\:\s+((?:Successful|Failed)\s+(?:\')?Active\s+Directory(?:\')?\s+login\s+(?:attempt)?).+", "\1"), null()))
EVAL-src = replace('Client IP Address', "((?:\d{1,3}\.){3}\d{1,3})\.", "\1")
EVAL-src_ip = replace('Client IP Address', "((?:\d{1,3}\.){3}\d{1,3})\.", "\1")
EVAL-type = case(match('Passwordstate', "copied|opened|exported"), "event", match('Passwordstate', "Heartbeat check|Auditing Archive Complete"), "alert")
EVAL-user = coalesce('vendor_user', replace('UserName', "([^\)\,]+)(?:\)|\,)(?:.+)?", "\1"), 'reset_user')
EVAL-vendor_product = "Click Studios:Passwordstate"
