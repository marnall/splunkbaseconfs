# Splunk app configuration file
[install]
is_configured = 0

[package]
id = SA_QRadar_SOAR
check_for_updates = 1

[ui]
is_visible = 0
label = QRadar SOAR Case Creation from Splunk
# Points to a file in:
# $SPLUNK_HOME/etc/apps/<SPLUNK_APP_NAME>/default/data/ui/views/*
# It does not need the extension of the file name provided
setup_view = setup_page_dashboard

[triggers]
reload.sa_qradar_soar = simple

[shclustering]
deployer_push_mode = full

[launcher]
author = IBM Security QRadar SOAR
description = Create cases in QRadar SOAR from Splunk ES notable events.
version = 2.3.0

