[netskope_idx]
definition = eventtype=netskope_idx

[netskope_connection]
definition = eventtype=netskope_connection

[netskope_audit]
definition = eventtype=netskope_audit

[netskope_application]
definition = eventtype=netskope_application

[netskope_alert]
definition = eventtype=netskope_alert

[netskope_infrastructure]
definition = eventtype=netskope_infrastructure

