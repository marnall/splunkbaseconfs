#### SEARCH EXTRACTIONS ###
[netskope_error_extract]
REGEX = (.+)
FORMAT = message::$1

### KV STORE LOOKUPS ####
[mi_netskope]
external_type = kvstore
collection = mi_netskope
fields_list = _key, last_time, internal_id, checkpoint_name

[aa_netskope_file_hash]
external_type = kvstore
collection = aa_netskope_file_hash
fields_list = _key, file_hash

[aa_netskope_url]
external_type = kvstore
collection = aa_netskope_url
fields_list = _key, url

### CSV LOOKUPS ###
[netskope_file_hash]
filename = netskope_file_hash.csv

[netskope_url]
filename = netskope_url.csv