[mcafee:epo]
FIELDALIAS-ccx_mcafee_epo_dbx_eventid = signature_id AS EventID
FIELDALIAS-ccx_mcafee_epo_dbx_vendor_category = category AS vendor_category
FIELDALIAS-ccx_mcafee_epo_dbx_extract_filename = file_name AS x_file_name

EVAL-vendor_product = if(match('product',"^Trellix.*"),"Trellix:EPO:"+'product',"McAfee:EPO:"+'product')
EVAL-user = if(isnotnull(user) AND user!="N/A", split('user',","), coalesce('logon_user','source_logon_user'))
EVAL-src_user = coalesce('logon_user','source_logon_user')
EVAL-signature = if(isnotnull('signature') AND 'signature'!="" AND 'signature'!=" " AND 'signature'!="_" AND 'signature'!="None",'signature', if(match(file_name, ".*") AND NOT (match(file_name, "^.*Unknown filename|McAfee Global.*|.*MACHINEKEYS.*")), replace(file_name, "^.*(\||\/|\\\)", ""), coalesce('event_description','process')))
EVAL-dest = if(isnotnull('dest'),'dest','dest_ip')
EVAL-src = if(isnotnull('src'),'src','src_ip')
EVAL-file_path = if(isnotnull('file_path'),'file_path',if(isnotnull('x_file_name') AND 'x_file_name'!="",'x_file_name',null()))
EVAL-file_name = if(isnotnull('file_name') AND 'file_name'!="",replace(replace('x_file_name',"(([\/|\\\])+$)",""),"^.*(\/|\\\)([^\/|\\\]+$)","\2"),null())
EVAL-ids_type = if(ThreatCategory IN("hip.file","fw.intrusion","wp.detect.url","wp.detect.download") OR vendor_category IN("hip.file","fw.intrusion","wp.detect.url","wp.detect.download"),"application",null())
EVAL-dvc = 'fqdn'
EVAL-body = 'event_description'
EVAL-app = 'product'
EVAL-type = if((match('event_description',"^.*rule violation detected.*|.*update failed.*|.*update was cancelled.*|Scan Timed Out.*|.*corrupt.*") OR match('event_description',"^Booted.*|.*update failed.*")),"alert",null()) 
EVAL-file_hash = mvappend('SourceProcessHash','TargetHash')
EVAL-object_path = if(product="Solidifier",'x_file_name',null())
EVAL-object_category = if(product="Solidifier",'category',null())
EVAL-result = if(product="Solidifier",'event_description',null())
EVAL-object = if(isnotnull('file_name') AND 'file_name'!="",replace(replace('file_name',"(([\/|\\\])+$)",""),"^.*(\/|\\\)([^\/|\\\]+$)","\2"),null())
EVAL-registry_hive = case(match('x_file_name',"^HKEY_CURRENT_CONFIG.*"),"HKEY_CURRENT_CONFIG",match('x_file_name',"^HKEY_CURRENT_USER.*"),"HKEY_CURRENT_USER",match('x_file_name',"^HKEY_LOCAL_MACHINE\\\SAM.*"),"HKEY_LOCAL_MACHINE\\SAM",match('x_file_name',"^HKEY_LOCAL_MACHINE\\\SECURITY.*"),"HKEY_LOCAL_MACHINE\\Security",match('x_file_name',"^HKEY_LOCAL_MACHINE\\\SOFTWARE.*"),"HKEY_LOCAL_MACHINE\\Software",match('x_file_name',"^HKEY_LOCAL_MACHINE\\\SYSTEM.*"),"HKEY_LOCAL_MACHINE\\System",match('x_file_name',"^HKEY_USERS.*"),"HKEY_USERS\\.DEFAULT")
EVAL-registry_path = case(match('x_file_name',"^HKEY_CURRENT_CONFIG.*"),replace('x_file_name',"HKEY_CURRENT_CONFIG(.*)","\1"),match('x_file_name',"^HKEY_CURRENT_USER.*"),replace('x_file_name',"HKEY_CURRENT_USER(.*)","\1"),match('x_file_name',"^HKEY_LOCAL_MACHINE\\\SAM.*"),replace('x_file_name',"HKEY_LOCAL_MACHINE\\\SAM(.*)","\1"),match('x_file_name',"^HKEY_LOCAL_MACHINE\\\SECURITY.*"),replace('x_file_name',"HKEY_LOCAL_MACHINE\\\(SECURITY|Security)(.*)","\2"),match('x_file_name',"^HKEY_LOCAL_MACHINE\\\SOFTWARE.*"),replace('x_file_name',"HKEY_LOCAL_MACHINE\\\(SOFTWARE|Software)(.*)","\2"),match('x_file_name',"^HKEY_LOCAL_MACHINE\\\SYSTEM.*"),replace('x_file_name',"HKEY_LOCAL_MACHINE\\\(SYSTEM|System)(.*)","\2"),match('x_file_name',"^HKEY_USERS.*"),replace('x_file_name',"HKEY_USERS(.*)","\1"))

LOOKUP-ccx_mcafee_epo_dbx_severity = mcafee_epo_severity_lookup severity_id OUTPUT severity
LOOKUP-ccx_mcafee_epo_dbx_description_lookup = ccx_mcafee_epo_dbx_description_lookup EventID AS EventID OUTPUTNEW orig_description AS description
LOOKUP-ccx_mcafee_epo_dbx_signature_lookup = ccx_mcafee_epo_dbx_signature_lookup EventID AS EventID OUTPUTNEW orig_signature AS signature_extra
LOOKUP-ccx_mcafee_epo_dbx_action_support = mcafee_epo_action_lookup vendor_action AS vendor_action OUTPUTNEW action
LOOKUP-ccx_mcafee_epo_dbx_solidifier_event_details_lookup = ccx_mcafee_epo_dbx_solidifier_event_details_lookup EventID AS EventID OUTPUTNEW action change_type dataset_name status type

[mcafee:mvisioncloud:syslog]
REPORT-ccx_mcafee_mvisioncloud_syslog_extraction = ccx_mcafee_mvisioncloud_syslog_extraction
REPORT-ccx_mcafee_mvisioncloud_syslog_info_extraction = ccx_mcafee_mvisioncloud_syslog_info_extraction

FIELDALIAS-severity = riskSeverity AS severity

EVAL-action = if(log_type="Dlp",lower(trim('activityName',"\[|\]")),if(match('response', "^.*(A|a)llow.*|.*(S|s)uccess.*|.*accessed.*|.*used.*"),"allowed",if(match('response',"^.*(R|r)evok.*|.*(B|b)lock.*|.*(F|f)ail.*"),"blocked",lower(trim('response',"\[|\]")))))
EVAL-app = if(log_type!="Dlp",'device_product',trim(split(replace(replace(replace('informationFileTypes', "\((.*?)\)",""), "[\]\[]", ""), "[,]", "@@"),"@@"), " "))
EVAL-category = if(log_type="Dlp", lower('contentItemType'),'threatCategory')
EVAL-dvc = 'host_name'
EVAL-object = if(log_type="Dlp", 'contentItemName', null())
EVAL-object_category = if(log_type="Dlp", lower('contentItemType'), null())
EVAL-object_path = if(log_type="Dlp", 'contentItemId', null())
EVAL-severity_id = if(log_type="Audit",replace('informationScanName',".*\((.*)\)","\1"),if(log_type="Dlp", 'incidentId', null()))
EVAL-signature_id = coalesce(replace('informationScanName',".*\((.*)\)","\1"),'policyId')
EVAL-signature = coalesce(replace('informationScanName',"(\s\(.*\))",""),'policyName')
EVAL-src = if('sourceIps'=="0.0.0.0", null(), replace('sourceIps', "\[([^\]]+)\]", "\1"))
EVAL-src_ip = if('sourceIps'=="0.0.0.0", null(), replace('sourceIps', "\[([^\]]+)\]", "\1"))
EVAL-src_user = if(log_type="Dlp", 'suser', null())
EVAL-user = if(isnotnull('suser') AND 'suser'!="N/A",'suser',if(isnotnull('remediatorName') AND 'remediatorName'!="N/A",'remediatorName',null()))
EVAL-vendor_product = 'device_vendor' + ":" + 'device_product'
EVAL-dlp_type = if(log_type="Dlp",'event_name',null())
EVAL-file_size = 'FileSize'
EVAL-body = coalesce('response'+" - "+'policyName','informationAnomalyCause'+" - "+'informationAnomalyCategory')
EVAL-description = coalesce('response'+" - "+'policyName','informationAnomalyCause'+" - "+'informationAnomalyCategory')
EVAL-dest = 'host_name'
EVAL-id = coalesce('incidentId','informationEventId')
EVAL-type = if(log_type!="Dlp",case(status=="archived","event",status=="opened","alert",status=="new","alarm",1=1,"alert"),null())
EVAL-subject = coalesce('informationConfigType',trim('informationSourceIpOrgs',"\[|\]"))
EVAL-ids_type = case(log_type=="AnomalousAccessLocation","application")

[mcafee:epo:syslog]
FIELDALIAS-ccx_mcafee_epo_syslog_signatureid = SignatureID AS signature_id
FIELDALIAS-dest_ip = IPAddress AS ip
FIELDALIAS-os = OSName AS os
FIELDALIAS-signature = ThreatName AS threat_name
FIELDALIAS-url = URL AS url
FIELDALIAS-vendor_product = ProductName AS product

EVAL-action = case(isnotnull(OSName) AND isnotnull(IPAddress) AND (isnotnull(dest_mac) OR isnotnull(dest_host)) AND isnotnull(ActionsBlocked), "blocked", isnotnull(OSName) AND isnotnull(IPAddress) AND (isnotnull(dest_mac) OR isnotnull(dest_host)) AND isnull(ActionsBlocked), "allowed")
EVAL-app = case('EventID' IN ("1092", "1096", "1119", "1059", "1095", "1094"), "McAfee EPO", 1==1, 'sc4s_vendor_product')
EVAL-category = if(isnotnull(szVirusType),'szVirusType','category')
EVAL-date = strftime(_time,"%Y-%m-%d")
EVAL-description = if(isnotnull(Description) AND Description!="N/A", Description, null())
EVAL-dest = if(ProductName=="SiteAdvisor Enterprise",null(),coalesce(IPAddress,dest_host))
EVAL-dest_ip = if(ProductName=="SiteAdvisor Enterprise",null(),coalesce(IPAddress,dest_host))
EVAL-EventID = 'EventID'
EVAL-file_hash = case(ThreatCategory=="av.detect", TargetHash, true(), coalesce(SourceProcessHash,SourceHash,MD5,SHA256,SHA1))
EVAL-file_name = case(match(FileName, ".*") AND NOT (('FileName'=='MachineName') OR match(FileName, "^.*Unknown filename|McAfee Global.*")) , replace(FileName, "^.*(\||\/|\\\)", ""), ThreatCategory=="av.detect", TargetName, true(), coalesce(source_process_name, SourceProcessName))
EVAL-file_path = case(match(FileName, ".*"), FileName, ThreatCategory=="av.detect", TargetPath, true(), coalesce(source_process_path, SourceFilePath))
EVAL-id = 'sequenceId'
EVAL-ids_type = if(ProductName="McAfee Host Intrusion Prevention","host",null())
EVAL-mac = lower(replace(RawMACAddress, "(\w{2})(\w{2})(\w{2})(\w{2})(\w{2})(\w{2})", "\1:\2:\3:\4:\5:\6"))
EVAL-name = 'MachineName'
EVAL-severity_id = coalesce(severity_id,Severity)
EVAL-signature = if(isnotnull(threat_name) AND NOT threat_name IN("None","none"), 'threat_name', if(isnotnull(VirusName), 'VirusName', coalesce(SignatureName,signature,RuleName,null())))
EVAL-src = case(isnotnull(ProductName) AND ProductName=="SiteAdvisor Enterprise",'IPAddress', isnotnull(Source) AND match(Source, "((?:\d{1,3}\.){1,3}\d{1,3})\:\d+"), replace(Source, "(\:\d+)", ""), isnotnull(SourceIP) AND NOT cidrmatch("0.0.0.0/0",SourceIP),SourceIP, isnotnull(SourceIp) AND match(SourceIp, "((?:\d{1,3}\.){1,3}\d{1,3})"), SourceIp, isnotnull(RemoteIPAddress), 'RemoteIPAddress', isnotnull(sc4s_fromhostip), 'sc4s_fromhostip')
EVAL-src_ip = case(isnotnull(ProductName) AND ProductName=="SiteAdvisor Enterprise",'IPAddress', isnotnull(Source) AND match(Source, "((?:\d{1,3}\.){1,3}\d{1,3})\:\d+"), replace(Source, "(\:\d+)", ""), isnotnull(SourceIP) AND NOT cidrmatch("0.0.0.0/0",SourceIP),SourceIP, isnotnull(SourceIp) AND match(SourceIp, "((?:\d{1,3}\.){1,3}\d{1,3})"), SourceIp, isnotnull(RemoteIPAddress), 'RemoteIPAddress', isnotnull(sc4s_fromhostip), 'sc4s_fromhostip')
EVAL-url_domain = if(URL=="reports.allowedSite" OR URL=="reports.allowedSiteDSSError", null(),replace(URL, "((?:https?\:\/\/)?[^\/\\\]+).+", "\1"))
EVAL-url_length = len(URL)
EVAL-user = case(ThreatCategory=="av.detect", TargetUserName, true(), coalesce(SourceUserName,UserName))
EVAL-vendor_product = "Mcafee:EPO:"+'product'
EVAL-type = "event"

LOOKUP-ccx_mcafee_epo_syslog_description_lookup.csv = ccx_mcafee_epo_syslog_description_lookup EventID AS EventID OUTPUT orig_description AS description
LOOKUP-ccx_mcafee_epo_syslog_signature_lookup2 = ccx_mcafee_epo_syslog_signature_lookup EventID AS EventID OUTPUT orig_signature AS signature_extra
