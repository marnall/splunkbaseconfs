[ccx_mcafee_epo_event_alert]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") AND (signature_extra IN("*rule violation detected*","*update failed*","*update was cancelled*","Scan Timed Out","*corrupt*") OR event_description IN("Booted*","*update failed*")) NOT eventtype IN("ccx_mcafee_epo_fw_intrusion","ccx_mcafee_epo_hip_file","ccx_mcafee_epo_wp_detect")
#tags = alert

[ccx_mcafee_epo_av_detect]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") (ThreatCategory="av.detect" OR vendor_category="av.detect")
#tags = malware attack

[ccx_mcafee_epo_fw_intrusion]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") (ThreatCategory="fw.intrusion" OR vendor_category="fw.intrusion")
#tags = ids attack

[ccx_mcafee_epo_ips_detect]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") detection_method IN("Exploit Prevention")
#tags = ids attack

[ccx_mcafee_epo_hip_file]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") (ThreatCategory="hip.file" OR vendor_category="hip.file")
#tags = ids attack

[ccx_mcafee_epo_wp_detect]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") (ThreatCategory="wp.detect.url" OR ThreatCategory="wp.detect.download" OR vendor_category="wp.detect.url" OR vendor_category="wp.detect.download")
#tags = ids attack

[ccx_mcafee_epo_malware_attack_catch_all]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") AND ("malware" OR "adware" OR "ransomware" OR "trojan") NOT eventtype="ccx_mcafee_epo_av_detect"
#tags = malware operations

[ccx_mcafee_epo_scan]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") event_description="*Scan*" threat_type="None"

[ccx_mcafee_epo_solidifier]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") event_description="Observed File Execution" threat_type="none"

[ccx_mcafee_epo_solidifier_detections]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") dataset_name="ids" NOT eventtype IN("ccx_mcafee_epo_solidifier","ccx_mcafee_epo_scan")
#tags = ids attack

[ccx_mcafee_epo_solidifier_audit_changes]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") dataset_name="change"
#tags = change audit

[ccx_mcafee_epo_solidifier_endpoint_process]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") dataset_name="endpoint"
#tags = process report

[ccx_mcafee_epo_solidifier_endpoint_registry]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") change_type=registry
#tags = endpoint registry

[ccx_mcafee_epo_solidifier_dataset_alerts]
search = (sourcetype="mcafee:epo:syslog" OR sourcetype="mcafee:epo") dataset_name=alert
#tag = alert

[ccx_mcafee_mvisioncloud_dlp]
search = (sourcetype="mcafee:mvisioncloud:syslog") log_type="Dlp"
#tags = dlp incident

[ccx_mcafee_mvisioncloud_config_synced]
search = (sourcetype="mcafee:mvisioncloud:syslog") log_type="2610"

[ccx_mcafee_mvisioncloud_user_logged_in]
search = (sourcetype="mcafee:mvisioncloud:syslog") log_type="1" event_name="User logged in"

[ccx_mcafee_mvisioncloud_alerts]
search = (sourcetype="mcafee:mvisioncloud:syslog") NOT eventtype IN("ccx_mcafee_mvisioncloud_config_synced","ccx_mcafee_mvisioncloud_user_logged_in","ccx_mcafee_mvisioncloud_dlp")
#tags = alert

[ccx_mcafee_mvisioncloud_ids]
search = (sourcetype="mcafee:mvisioncloud:syslog") log_type="AnomalousAccessLocation"
#tags = ids attack

[ccx_mcafee_epo_syslog_inventory]
search = sourcetype="mcafee:epo:syslog" OSName=* OR (OSName=* AND (dest_mac=* OR dest_host=*))
# tags = inventory system version network

[ccx_mcafee_epo_syslog_inventory_network]
search = sourcetype="mcafee:epo:syslog" OSName=* AND dest_mac=* OR dest_host=*
# tags = inventory network

[ccx_mcafee_epo_syslog_web]
search = sourcetype="mcafee:epo:syslog" URL="*" NOT URL="reports.allowedSite"
# tags = web

[ccx_mcafee_epo_syslog_event_alert]
search = (sourcetype="mcafee:epo:syslog") AND signature_extra IN("*rule violation detected*","*update failed*","Scan Timed Out")
# tags = alert

[ccx_mcafee_epo_syslog_hip]
search = (sourcetype="mcafee:epo:syslog") (ProductName="McAfee Host Intrusion Prevention") signature=*
# tags = ids attack

[ccx_mcafee_epo_syslog_malware_attack]
search = sourcetype="mcafee:epo:syslog" VirusName=* AND file_hash=*
# tags = malware attack

[ccx_mcafee_epo_syslog_malware_attack_catch_all]
search = (sourcetype="mcafee:epo:syslog" file_hash=*) AND ("malware" OR "adware" OR "ransomware" OR "trojan") NOT eventtype="ccx_mcafee_epo_syslog_malware_attack"
# tags = malware attack

[ccx_mcafee_epo_syslog_malware_operations]
search = sourcetype="mcafee:epo:syslog" VirusName=* AND NOT file_hash=*
# tags = malware operations

[ccx_mcafee_epo_syslog_malware_operations_catch_all]
search = (sourcetype="mcafee:epo:syslog") AND ("malware" OR "adware" OR "ransomware" OR "trojan") NOT (file_hash="*" OR eventtype="ccx_mcafee_epo_syslog_malware_operations")
# tags = malware operations

[ccx_mcafee_mvisioncloud_syslog_dlp]
search = (sourcetype="mcafee:mvisioncloud:syslog") incidentId="DLP-*"
# tags = dlp incident
