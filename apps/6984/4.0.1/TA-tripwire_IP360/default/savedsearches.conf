[ip360_formfeed]
realtime_schedule = 0
alert.expires = 6h
alert.suppress = 0
cron_schedule = 0 * * * *
auto_summarize = 0
alert.track = 0
enableSched = 1
description = Creates the table to feed the IP360 instrumentation
action.summary_index._name = ip360
alert.digest_mode = True
search = index="ip360" sourcetype=ip360_distinct_audit | fields audit_id risk skill os_group host_network network_group | stats count by risk skill os_group host_network audit_id network_group | outputcsv ip360_formfeed.csv
dispatch.earliest_time = -1d@h
dispatch.latest_time = now

[ip360_scan_status]
realtime_schedule = 0
cron_schedule = 0 * * * *
alert.suppress = 0
action.summary_index = 1
alert.track = 0
#Disable by default-in case dbconnect 2 is used isntead of dbx1
enableSched = 0
action.summary_index._name = ip360
alert.digest_mode = True
search = | dbquery ice "select start_date, audit_id, end_date, end_date - start_date as duration, s.status\r\n , n.network_id\r\n , n.name\r\n , (SELECT string_agg(range, ', ') from nc_network_range where network_id = a.network_id) as networkinc\r\n , (SELECT string_agg(exclude::text, ', ') from nc_network_range where network_id = a.network_id) as networkexc\r\n , '?' as networktotal\r\n , '?' as networkgroups\r\n , n.active as networkactive\r\n , sp.name as scan_profile_name\r\n , a.pool_id\r\n , 'no permissions' as dpname\r\n , 'no permissions' as dphw\r\n , 'no permissions' as dpip\r\n\r\nfrom nc_audit a\r\ninner join nc_network n on n.network_id = a.network_id \r\ninner join nc_audit_status s on s.status_id = a.status_id\r\n\r\nleft join nc_scan_profile sp on sp.scan_profile_id = a.scan_profile_id\r\nwhere (end_date IS NULL) AND (start_date > cast('2013-05-02 00:00:00' as timestamp)) and (status!='In Progress')" | eval _time=start_date | search NOT [search index=ip360 source=*ip360_scan_status NOT end_date=* | stats count by audit_id | table audit_id]
dispatch.earliest_time = -1d@h

