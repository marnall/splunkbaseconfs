[ip360_distinct_audit]
LOOKUP-ip360_vendor_info_auto_lookup = ip360_vendor_info_lookup sourcetype AS sourcetype OUTPUTNEW product AS product vendor AS vendor
FIELDALIAS-Vulnerabilities = cves AS cve cvss_base_score AS cvss host_network AS dest_nt_host ip_address AS dest_ip name AS signature os_name AS os strategy AS category 
FIELDALIAS-Vulnerabilities2 = ip_address AS dest host_score AS serverity_id vuln_id AS signature_id
EVAL-severity = case(host_score<=25,"informational",host_score>25 AND host_score<=100,"low",host_score>100 AND host_score<=2000,"medium",host_score>2000 AND host_score<=10000,"high",host_score>10000,"critical",1=1,"unknown")