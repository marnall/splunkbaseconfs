[DHCP Scope Properties Lookup generator]
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
alert.track = 0
cron_schedule = */5 * * * *
enableSched = 1
search = `dhcp_index` sourcetype=dhcpScope:properties\
| table "_time",host,Name,ScopeId,StartRange,EndRange,LeaseDuration,State\
| sort - _time\
| dedup ScopeId\
| outputlookup dhcp_scope_properties.csv
