[set_tippingpoint_sourcetype]
REGEX = CEF\:\d+\|TippingPoint
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::tippingpoint:cef

[tippingpoint_cefheaders]
REGEX = CEF:(?<cef_version>\d+)\|(?<vendor_product_simple>[^|]*)\|(?<product_name>[^|]*)\|(?<product_version>[^|]*)\|(?<signature_id>[^|]*)\|(?<signature>[^|]*)\|(?<severity_id>[^|]*)

[tippingpoint_cefvaluekeys]
REGEX = (?:_+)?(?<_KEY_1>[\w.:\[\]]+)=(?<_VAL_1>.*?(?=(?:\s[\w.:\[\]]+=|$)))
REPEAT_MATCH = True
CLEAN_KEYS = 1

[tipping_point_trendmicro]
batch_index_query = 0
case_sensitive_match = 0
filename = tipping_point_trendmicro.csv