[Sigar Filesystem Usage Report]
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = index="sigar_perf" filesystem | multikv | timechart span="10m" mean(Used) by Mounted_on
dispatch.earliest_time = -8h@h
dispatch.latest_time = now

[Sigar Filesystem Usage by Mount Point]
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = index="sigar_perf" filesystem | multikv | timechart span="10m" avg(Used) by Mounted_on
dispatch.earliest_time = -8h@h
dispatch.latest_time = now

[Sigar Memory Usage Metrics]
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = index="sigar_perf" totalram | multikv | timechart span="5m" mean(ramused) as "Mem Used" mean(ramfree) as "Free Mem" mean(swapused) as "Swap Used" mean(swapfree) as "Free Swap"
dispatch.earliest_time = -8h@h
dispatch.latest_time = now

[Sigar Memory Usage Report]
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = index="sigar_perf" totalram | multikv | timechart span="5m" mean(ramused) as "Mem Used" mean(ramfree) as "Free Mem" mean(swapused) as "Swap Used" mean(swapfree) as "Free Swap"
dispatch.earliest_time = -8h@h
dispatch.latest_time = now

