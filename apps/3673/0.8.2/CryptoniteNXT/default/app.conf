# Splunk app configuration file

[install]
build = 2

[id]
name = CryptoniteNXT
version = 0.8.2

[ui]
is_visible = 1
label = CryptoniteNXT

[launcher]
author = support@CryptoniteNXT.com
description = CryptoniteNXT and Splunk have partnered to deliver an advanced security protection and reporting tool.  The combined solution enables a Splunk administrator to view the highly reliable security alerts generated by CryptoniteNXT.  After Splunk Enterprise indexes the events, you can consume the data using the pre-built dashboard panels included with the app.  This app provides the inputs and CIM-compatible knowledge to use with other Splunk Enterprise apps.  CryptoniteNXT moving target cyber defense (MTD) contains attackers at the very beginning of the attack and makes their targets invisible. Reconnaissance is completely shut down.  Without visibility into the network, it is impossible for cyber attackers to map the network, access unpatched vulnerabilities, and proceed with an attack. Attacker tools don’t work - they cannot discover what they cannot see, and cannot attack without a target.

version = 0.8.2

[package]
id = CryptoniteNXT

