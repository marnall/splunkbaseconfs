[nxt]
search = sourcetype=Cryptonite:*

[nxt_policy]
search = eventtype=nxt cef_signature >= 30010 cef_signature <= 30014

[nxt_policy_accept]
search = eventtype=nxt_policy cef_signature=30010

[nxt_policy_deny]
search = eventtype=nxt_policy cef_signature=30011

[nxt_node]
search = eventtype=nxt cef_signature >= 30015 cef_signature <= 30019

[nxt_node_reg]
search = eventtype=nxt_node cef_signature = 30015

[nxt_node_dereg]
search = eventtype=nxt_node cef_signature = 30016

[nxt_auth]
search = eventtype=nxt cef_signature >= 30020 cef_signature <= 30059

# The login_apptype and signature_action lookups provide the
# login/logout and success/failure indications.
[nxt_endpoint]
search = eventtype=nxt_auth cef_signature >= 30020 cef_signature <= 30039

[nxt_endpoint_login]
search = eventtype=nxt_endpoint cef_signature = 30020

[nxt_endpoint_logoff]
search = eventtype=nxt_endpoint cef_signature = 30021

[nxt_user]
search = eventtype=nxt_auth cef_signature >= 30040 cef_signature <= 30059

[nxt_user_login]
search = eventtype=nxt_user cef_signature = 30040

[nxt_user_logout]
search = eventtype=nxt_user cef_signature = 30041

[nxt_auth_problem]
search = eventtype=nxt_auth (cef_signature >= 30022 cef_signature <= 30039) OR (cef_signature >= 30042 cef_signature <= 30059)

[nxt_severe_events]
search = eventtype=nxt cef_severity >= 7

[nxt_dropped_packets]
search = eventtype=nxt cef_signature >= 30200 cef_signature <= 30299

[nxt_admin_events]
search = eventtype=nxt cef_signature >= 30300 cef_signature <= 30499
