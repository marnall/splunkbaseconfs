[Cryptonite:CryptoniteNXT]
CHARSET = US-ASCII
DATETIME_CONFIG =
KV_MODE = auto
MAX_TIMESTAMP_LOOKAHEAD = 128
NO_BINARY_CHECK = true
REPORT-cefevents = cefHeaders,cefKeys
SHOULD_LINEMERGE = false
TIME_FORMAT = %s%3N
TIME_PREFIX = \s(end|rt)\=
TZ = UTC
category = Network & Security
description = Output produced by the CryptoniteNXT enclave security products.
disabled = false

FIELDALIAS-vendor = cef_vendor AS vendor
FIELDALIAS-product = cef_product AS product
FIELDALIAS-version = cef_version AS version
FIELDALIAS-name = cef_name AS rule
FIELDALIAS-signature = cef_signature as rule_id
FIELDALIAS-deviceextid = deviceExternalId AS dvc
#FIELDALIAS-dst = dst AS dest_ip dest_ip AS dest
FIELDALIAS-dst = dst AS dest_ip 
FIELDALIAS-src = src AS src_ip
FIELDALIAS-proto = proto AS transport
FIELDALIAS-spt = spt AS src_port
FIELDALIAS-dpt = dpt AS dest_port
FIELDALIAS-shost = shost AS src
FIELDALIAS-dhost = dhost AS dest
FIELDALIAS-suser = suser AS user
FIELDALIAS-ipv4 = ipv4 AS ip
FIELDALIAS-ipv6 = ipv6 AS ip
FIELDALIAS-cs1 = cs1 AS ip_version

LOOKUP-severity = severity cef_severity OUTPUTNEW severity
LOOKUP-ids_type = ids_type cef_signature OUTPUTNEW ids_type
LOOKUP-apptype = login_apptype cef_signature OUTPUTNEW app
LOOKUP-enabled = guest_enabled cef_signature OUTPUTNEW enabled
LOOKUP-signatureaction = signature_action cef_signature OUTPUTNEW action
LOOKUP-policyaction = policy_action cef_signature, act OUTPUTNEW action
LOOKUP-transport = transport proto OUTPUT transport
