[pulse:connectsecure]
TIME_PREFIX = PulseSecure:\s-\s-\s-\s
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 19
SHOULD_LINEMERGE = false
TRUNCATE = 99999
KV_MODE = none

TRANSFORMS-force_sourcetype_pulse_connectsecure_web = force_sourcetype_pulse_connectsecure_web

REPORT-pulse_connectsecure__message = pulse_connectsecure__message
REPORT-pulse_connectsecure_authentication_dest = pulse_connectsecure_authentication_dest
REPORT-pulse_connectsecure_change_action_object = pulse_connectsecure_change_action_object
REPORT-pulse_connectsecure_change_action_object_alt = pulse_connectsecure_change_action_object_alt
REPORT-pulse_connectsecure_change_action_installed = pulse_connectsecure_change_action_installed
REPORT-pulse_connectsecure_change_action_push = pulse_connectsecure_change_action_push
REPORT-pulse_connectsecure_change_action_received = pulse_connectsecure_change_action_received
REPORT-pulse_connectsecure_change_action_update = pulse_connectsecure_change_action_update
REPORT-pulse_connectsecure_change_file = pulse_connectsecure_change_file
REPORT-pulse_connectsecure_close_connection = pulse_connectsecure_close_connection
REPORT-pulse_connectsecure_dest_server = pulse_connectsecure_dest_server
REPORT-pulse_connectsecure_failed_authentication_action = pulse_connectsecure_failed_authentication_action
REPORT-pulse_connectsecure_host_checker_policy = pulse_connectsecure_host_checker_policy
REPORT-pulse_connectsecure_host_checker_reason = pulse_connectsecure_host_checker_reason
REPORT-pulse_connectsecure_host_checker_time_out = pulse_connectsecure_host_checker_time_out
REPORT-pulse_connectsecure_http_user_agent = pulse_connectsecure_http_user_agent
REPORT-pulse_connectsecure_meeting_closed = pulse_connectsecure_meeting_closed
REPORT-pulse_connectsecure_meeting_connected = pulse_connectsecure_meeting_connected
REPORT-pulse_connectsecure_meeting_connecting = pulse_connectsecure_meeting_connecting
REPORT-pulse_connectsecure_meeting_ended = pulse_connectsecure_meeting_ended
REPORT-pulse_connectsecure_meeting_joined_left = pulse_connectsecure_meeting_joined_left
REPORT-pulse_connectsecure_meeting_joining = pulse_connectsecure_meeting_joining
REPORT-pulse_connectsecure_meeting_started = pulse_connectsecure_meeting_started
REPORT-pulse_connectsecure_meeting_updated = pulse_connectsecure_meeting_updated
REPORT-pulse_connectsecure_realm_roles = pulse_connectsecure_realm_roles
REPORT-pulse_connectsecure_reason = pulse_connectsecure_reason
REPORT-pulse_connectsecure_role = pulse_connectsecure_role
REPORT-pulse_connectsecure_src_ip_user_domain = pulse_connectsecure_src_ip_user_domain
REPORT-pulse_connectsecure_src_os_client_version = pulse_connectsecure_src_os_client_version
REPORT-pulse_connectsecure_successful_authentication_action = pulse_connectsecure_successful_authentication_action
REPORT-pulse_connectsecure_users_logged_in = pulse_connectsecure_users_logged_in
REPORT-pulse_connectsecure_vendor_action = pulse_connectsecure_vendor_action
REPORT-pulse_connectsecure_vpn_session_id = pulse_connectsecure_vpn_session_id
REPORT-pulse_connectsecure_vpn_dest_ip = pulse_connectsecure_vpn_dest_ip
REPORT-pulse_connectsecure_vpn_src_nt_host = pulse_connectsecure_vpn_src_nt_host
REPORT-pulse_connectsecure_vpn_vendor_action = pulse_connectsecure_vpn_vendor_action
EXTRACT-priority = ^\d+\s\<(?<priority>\d+)
EXTRACT-header = ^(?P<header>\d+)

FIELDALIAS-dest = host as dest
FIELDALIAS-dvc = src_ip as dvc
FIELDALIAS-src = src_ip as src

EVAL-app = "ssl:vpn"
EVAL-bytes = bytes_in + bytes_out
EVAL-direction = "inbound"
EVAL-protocol = "ip"
EVAL-vendor_product = "Pulse Connect Secure"

LOOKUP-pulse_connectsecure_action_lookup = pulse_connectsecure_action_lookup vendor_action OUTPUT action

[pulse:connectsecure:web]
KV_MODE = none

REPORT-pulse_connectsecure_webrequest__message = pulse_connectsecure__message
REPORT-pulse_connectsecure_webrequest_active_sync_cmd = pulse_connectsecure_webrequest_active_sync_cmd
REPORT-pulse_connectsecure_webrequest_active_sync_device_id = pulse_connectsecure_webrequest_active_sync_device_id
REPORT-pulse_connectsecure_webrequest_active_sync_device_type = pulse_connectsecure_webrequest_active_sync_device_type
REPORT-pulse_connectsecure_webrequest_active_sync_user = pulse_connectsecure_webrequest_active_sync_user
REPORT-pulse_connectsecure_webrequest_blocked_extractions = pulse_connectsecure_webrequest_blocked_extractions
REPORT-pulse_connectsecure_webrequest_completed_extractions = pulse_connectsecure_webrequest_completed_extractions
REPORT-pulse_connectsecure_webrequest_ok_extractions = pulse_connectsecure_webrequest_ok_extractions
REPORT-pulse_connectsecure_webrequest_src_ip_user_domain = pulse_connectsecure_src_ip_user_domain
EXTRACT-priority = ^\d+\s\<(?<priority>\d+)
EXTRACT-header = ^(?P<header>\d+)

FIELDALIAS-src_web = src_ip as src

EVAL-action = if(sub_status like "ok" OR sub_status like "completed","allowed","blocked")
EVAL-app = "Pulse Connect Secure"
EVAL-bytes = bytes_in + bytes_out
EVAL-url_length = len(url)
EVAL-vendor_product = "Pulse Connect Secure"

LOOKUP-pulse_connectsecure_http_status_lookup = pulse_connectsecure_http_status_lookup status OUTPUT status_description,status_type
