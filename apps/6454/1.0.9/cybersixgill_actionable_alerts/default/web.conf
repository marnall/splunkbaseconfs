[expose:cybersixgill_actionable_alerts_account]
pattern = cybersixgill_actionable_alerts_account
methods = POST, GET

[expose:cybersixgill_actionable_alerts_account_specified]
pattern = cybersixgill_actionable_alerts_account/*
methods = POST, GET, DELETE

[expose:cybersixgill_actionable_alerts_settings]
pattern = cybersixgill_actionable_alerts_settings
methods = POST, GET

[expose:cybersixgill_actionable_alerts_settings_specified]
pattern = cybersixgill_actionable_alerts_settings/*
methods = POST, GET, DELETE

[expose:cybersixgill_actionable_alerts_actionable_alerts_input]
pattern = cybersixgill_actionable_alerts_actionable_alerts_input
methods = POST, GET

[expose:cybersixgill_actionable_alerts_actionable_alerts_input_specified]
pattern = cybersixgill_actionable_alerts_actionable_alerts_input/*
methods = POST, GET, DELETE

[expose:alert_content_get]
methods = GET
pattern = actionable-alert-content

[expose:alert_content_delete]
methods = POST
pattern = actionable-alert-delete

