[vmware_cb_actions]
filename = vmware_cb_actions.csv
case_sensitive_match = false

[vmware_carbonblack_is_alert_transform]
SOURCE_KEY = type
REGEX = \.(hit)\.
FORMAT = is_alert::$1

[vmware_carbonblack_is_edr_alert_transform]
SOURCE_KEY = type
REGEX = ^(alert)\.
FORMAT = is_edr_alert::$1

[vmware_carbonblack_is_network_transform]
SOURCE_KEY = type
REGEX = (netconn)
FORMAT = is_network::$1

[vmware_carbonblack_is_file_transform]
SOURCE_KEY = type
REGEX = \.(file)
FORMAT = is_file::$1

[vmware_carbonblack_is_edr_file_transform]
SOURCE_KEY = type
REGEX = \.(file|module(?!load))
FORMAT = is_edr_file::$1

[vmware_carbonblack_is_registry_transform]
SOURCE_KEY = type
REGEX = \.(reg)
FORMAT = is_registry::$1

[vmware_carbonblack_is_process_transform]
SOURCE_KEY = type
REGEX = \.(proc|module|childproc)
FORMAT = is_process::$1

[vmware_carbonblack_is_edr_process_transform]
SOURCE_KEY = type
REGEX = \.(proc|crossproc|childproc|remotethread|moduleload)
FORMAT = is_edr_process::$1

[vmware_carbonblack_is_binary_transform]
SOURCE_KEY = type
REGEX =\.(binary)
FORMAT = is_binary::$1

[vmware_carbonblack_process_name_transform]
SOURCE_KEY = process_path
REGEX = ^(?:.*[\/\\])*([^\/\\]+)$
FORMAT = process_from_path::$1

[vmware_carbonblack_parent_process_name_transform]
SOURCE_KEY = parent_path
REGEX = ^(?:.*[\/\\])*([^\/\\]+)$
FORMAT = parent_process_from_path::$1

[vmware_carbonblack_file_and_path_transform]
SOURCE_KEY = path
REGEX = ^(.*[\/\\])*([^\/\\]+)$
FORMAT = file_path::$1 file_name::$2

# [vmware_carbonblack_file_and_path_transform2]
# REGEX = (?:utf8_on_disk_filename|observed_filename|\"file_path)\"\s*\:\s*\[?\"([^"]+[\/\\])*([^"]+)
# FORMAT = file_path_transformed::$1 file_name_transformed::$2

[vmware_carbonblack_registry_transform]
SOURCE_KEY = path
REGEX = ^(.*\\)*(?:\{([^}]+)\}\\*)(.+)*$
FORMAT = registry_path::$1 registry_key::$2 registry_value::$3

[vmware_carbonblack_endpoint_transform]
SOURCE_KEY = docs{}.endpoint
REGEX = ^([^\|]+?)\s*\|\s*(\d+)$
FORMAT = endpoint::$1 sensor_id::$2

[vmware_carbonblack_endpoint_transform2]
SOURCE_KEY = docs{}.endpoint{}
REGEX = ^([^\|]+?)\s*\|\s*(\d+)$
FORMAT = endpoint::$1 sensor_id::$2

[audit-log-user-activity-kv]
REGEX = (?P<_KEY_1>\w+)\s*=\s*'(?P<_VAL_1>[^']+)'

[audit-log-user-activity-msg-content]
REGEX = \\?"(?P<_KEY_1>[^\\"]+)\\?"\s*:\s*\\?"(?P<_VAL_1>[^\\"]+)\\?"
SOURCE_KEY = content

[audit-log-live-response-kv]
REGEX = \s*(?P<_KEY_1>\w+)\s*:\s*(?P<_VAL_1>[\s\w\/~\*]+(?!\(\d\))(?:\([\w\d\s]+\))?),?
# SOURCE_KEY = message
