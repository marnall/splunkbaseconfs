[vmware_cb_edr_base_index]
search = index=main

[vmware_action_modresult]
search = sourcetype=vmware:action* eventtype=vmware_cb_edr_action_index

[vmware_cb_edr_action_index]
search = index=vmware_edr_action

[vmware_cb_edr_error_messages]
search = index=_internal sourcetype="vmware:cb:edr:*" log_level=ERROR

[vmware_cb_edr_api_errors]
search = (eventtype=vmware_cb_edr_base_index sourcetype=vmware:cb:edr:error) OR eventtype=vmware_cb_edr_error_messages
# Alert Actions

[vmware_cb_edr]
search = eventtype = vmware_cb_edr_base_index sourcetype = vmware:cb:edr:json

[vmware_cb_edr_dm_web]
search = type="audit.log.useractivity" eventtype=vmware_cb_edr

[modvmware-edr-kill-process_results]
search = eventtype=modvmware-edr-kill-process

[modvmware-edr-kill-process]
search = eventtype=vmware_cb_edr_action_index sourcetype=vmware:cb:edr:alert_action:vmware-edr-kill-process orig_sid=* OR orig_sourcetype=*

[modvmware-edr-isolate-device_results]
search = eventtype=modvmware-edr-isolate-device

[modvmware-edr-isolate-device]
search = eventtype=vmware_cb_edr_action_index sourcetype=vmware:cb:edr:alert_action:vmware-edr-isolate-device orig_sid=* OR orig_sourcetype=*

[modvmware-edr-ban-hash_results]
search = eventtype=modvmware-edr-ban-hash

[modvmware-edr-ban-hash]
search = eventtype=vmware_cb_edr_action_index sourcetype=vmware:cb:edr:alert_action:vmware-edr-ban-hash orig_sid=* OR orig_sourcetype=*

[modvmware-edr-unisolate-device_results]
search = eventtype=modvmware-edr-unisolate-device

[modvmware-edr-unisolate-device]
search = eventtype=vmware_cb_edr_action_index sourcetype=vmware:cb:edr:alert_action:vmware-edr-unisolate-device orig_sid=* OR orig_sourcetype=*

[vmware_carbonblack_alert]
search = eventtype=vmware_cb_edr (is_alert=* OR alert_type=*)
#alert
#endpoint
#ids
#attack

[vmware_carbonblack_change_analysis]
search = eventtype=vmware_cb_edr (is_file=* OR is_registry=* OR is_binary=*)
#endpoint
#audit
#change
[vmware_carbonblack_application_state]
search = eventtype=vmware_cb_edr is_process=*
#process
#report

[vmware_carbonblack_network]
search = eventtype=vmware_cb_edr is_network=*
#network
#communicate

[vmware_cb_edr_dm_endpoint]
search = eventtype=vmware_cb_edr type IN ("audit.log.liveresponse")

[vmware_cb_edr_dm_endpoint_processes]
search = eventtype=vmware_cb_edr_dm_endpoint process=*
#process
#report

[vmware_carbonblack_endpoint_filesystem]
search = eventtype=vmware_cb_edr is_file=*
#endpoint
#filesystem

[vmware_carbonblack_endpoint_registry]
search = eventtype=vmware_cb_edr is_registry=*
#endpoint
#registry