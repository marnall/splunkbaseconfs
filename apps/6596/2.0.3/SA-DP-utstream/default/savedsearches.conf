[Backup Gen - backup_utstream_discovery_inventory]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 6 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = utstream
request.ui_dispatch_view = search
search = | inputlookup backup_utstream_discovery_inventory \
| where backup_time >= [| makeresults | eval backup_time = relative_time(now(), "-6d@d") | return $backup_time]\
| inputlookup utstream_discovery_inventory append=true\
| eval backup_time = coalesce(backup_time, now())\
| outputlookup backup_utstream_discovery_inventory

