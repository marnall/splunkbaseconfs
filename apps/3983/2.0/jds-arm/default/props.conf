[jds-arm-watcher]
SHOULD_LINEMERGE=false
TIME_FORMAT=%s%3N
CHARSET=UTF-8
LINE_BREAKER=(\r?\n)\d{13}\s
MAX_TIMESTAMP_LOOKAHEAD=13
category = Custom
description = Active robot monitoring watcher process
disabled = false
EXTRACT-type,message = ^\S+\s+(?P<type>\S+)(?P<message>[\s\S]+)


[jds-arm-runner]
SHOULD_LINEMERGE=false
TIME_FORMAT=%s%3N
CHARSET=UTF-8
LINE_BREAKER=(\r?\n)\d{13}\s
MAX_TIMESTAMP_LOOKAHEAD=13
category = Custom
description = Active robot monitoring runner process
disabled = false
EXTRACT-type,message = ^\S+\s+(?P<type>\S+)(?P<message>[\s\S]+)


[jds-arm]
SHOULD_LINEMERGE=false
TIME_FORMAT=%s%3N
CHARSET=UTF-8
LINE_BREAKER=(\r?\n)\d{13}\s
MAX_TIMESTAMP_LOOKAHEAD=13
category = Custom
description = Active robot monitoring script
disabled = false
TRUNCATE = 0
EXTRACT-id,type,message = ^\S+\s+(?P<id>\S+)\s+(?P<type>\S+)(?P<message>[\s\S]+)
LOOKUP-arm_transactions = arm_transactions transaction_script_name AS name OUTPUTNEW application_name AS application_name transaction_availability_threshold AS transaction_availability_threshold transaction_error_threshold AS transaction_error_threshold transaction_name AS transaction_name transaction_order AS transaction_order transaction_warn_threshold AS transaction_warn_threshold
LOOKUP-arm_locations = arm_locations host AS host OUTPUTNEW lat AS lat location_details AS location_details location_name AS location_name lon AS lon


