| eval body="project_id: ". project_id . " method_name: " . method_name . " key: " . request_name . " private_key_type: " . private_key_type . " caller_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Persistence" \
| eval mitre_technique="Account Manipulation" \
| eval mitre_sub_technique= "Additional Cloud Credentials" \
