[comment(1)]
args = arg1
definition = noop
iseval = 0

[gcp_create_alert]
definition = fields time, severity, summary, body, mitre_tactic, mitre_technique, mitre_sub_technique\
| outputlookup append=true gcp_alerts.csv
iseval = 0

[gcp_detect_allusers_gcs_actions]
definition = `gcp_log_search` `gcp_rename_fields` \
| where method_name="storage.setIamPermissions" AND (member="allUsers" OR member="allAuthenticatedUsers" OR member_change="allUsers" OR member_change="allAuthenticatedUsers")\
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="MEDIUM" \
| eval summary="All users permissions action performed on Google Cloud Storage bucket" \
| eval body="resource: " . resource . " resource_type: " . resource_type . " action: " . action . " member: " . member . " role: " . role . " email: " . principal_email . " caller_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Defence Evasion" \
| eval mitre_technique="Modify Compute Cloud Infrastructure"\
| eval mitre_sub_technique= "-" \
| `gcp_create_alert`
iseval = 0

[gcp_detect_api_activity_unusually_high_last7days]
definition = `gcp_log_search` earliest=-7d `gcp_rename_fields` \
| `comment("Only include email addresses and not special system accounts such as 'system:kube'")` \
| search principal_email="*@*" \
| `comment("Get average count by principal email'")` \
| eventstats count as eventstats_count by principal_email \
| bucket _time span=1d \
| `comment("Calculate time difference to use for average calculation")` \
| addinfo \
| eval search_time_duration = (info_max_time - info_min_time)/(3600*24) \
| stats count by _time, principal_email, eventstats_count, search_time_duration \
| eval eventstats_avg=(eventstats_count/search_time_duration) \
| `comment("Calculate anomaly today compared to last 7 days of data and where there is a baseline large volume'")` \
| eval today = strftime(now(), "%Y-%m-%d") \
| where today = _time AND count > 1000 AND count > 3 * eventstats_avg \
| eval severity="MEDIUM" \
| eval summary="Unusually High API usage by any user identity" \
| eval body="today: " . today . " principal_email: " . principal_email . " average_7days: " . eventstats_avg . " count: " . count \
| eval mitre_tactic="Exfiltration" \
| eval mitre_technique="-" \
| eval mitre_sub_technique= "-" \
| `gcp_create_alert`
iseval = 0

[gcp_detect_api_key_creation]
definition = `gcp_log_search` `gcp_rename_fields` \
| search method_name="*.ApiKeys.CreateKey"\
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="LOW" \
| eval summary="New GCP API Key Creation (Likely Without Restrictions). Can be used for persistent access in environment by threat actor. Refer to Link: https://cloud.google.com/api-keys/docs/overview for more details" \
| eval body="project_id: " . project_id . " email: " . principal_email . " caller_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Persistence" \
| eval mitre_technique="Account Manipulation" \
| eval mitre_sub_technique= "Additional Cloud Credentials" \
| `gcp_create_alert`
iseval = 0

[gcp_detect_api_key_updates]
definition = `gcp_log_search` `gcp_rename_fields` \
| search method_name="*.ApiKeys.PatchApiKey" AND (update_mask="*apiTargetKeyDetails*" OR update_mask="*browserKeyDetails*") \
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="LOW" \
| eval summary="Unusual GCP API Key Updates (Possibly Set to Without Restrictions)" \
| eval body="key_id: " . key_id . " project_id: " . project_id . " update_mask: " . update_mask . " email: " . principal_email . " caller_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Persistence" \
| eval mitre_technique="Account Manipulation" \
| eval mitre_sub_technique= "Additional Cloud Credentials" \
| `gcp_create_alert`
iseval = 0

