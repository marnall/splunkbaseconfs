| search (method_name="*.AccessContextManager.CreateServicePerimeter*" OR method_name="*AccessContextManager.UpdateServicePerimeter*" OR method_name="*.AccessContextManager.DeleteServicePerimeter*") \
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats earliest(time) as time, latest(time) as latest_time by client_ip, method_name, user_agent, request_serviceperimeter_name, principal_email, resource_name \
| eval severity="MEDIUM" \
| eval summary="Changes to GCP VPC Service Controls - VPC Service Perimeter" \
| eval body="method_name: " . method_name . " request_serviceperimeter_name: " . request_serviceperimeter_name . " email: " . principal_email . " caller_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Privilege Escalation" \
| eval mitre_technique="Domain Policy Modification" \
| eval mitre_sub_technique= "Domain Trust Modification" \
| `gcp_create_alert`
iseval = 0

[gcp_detect_vpc_service_controls_violation]
definition = `gcp_log_search` `gcp_rename_fields` \
| search violations_type="*VPC_SERVICE_CONTROLS*"\
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| table time, client_ip, method_name, resource_name, principal_email, status_message, violations_type\
| eval severity="MEDIUM" \
| eval summary="GCP Actions violating VPC Service Controls" \
| eval body="method_name: " . method_name . " violations_type: "  . violations_type . " violations_status_message: " . status_message . " resource_name: " . resource_name . " email: " . principal_email . " caller_ip: " . client_ip\
| eval mitre_tactic="Exfiltration" \
| eval mitre_technique="Transfer Data To Cloud Account" \
| eval mitre_sub_technique="NA" \
| `gcp_create_alert`
iseval = 0

[gcp_excessive_iam_roles_deleted]
definition = `gcp_log_search` `gcp_rename_fields` \
| where method_name="google.iam.admin.v1.DeleteRole" \
| stats dc(resource) as resource_count, values(resource) as resources, values(principal_email) as principal_email, values(client_ip) as client_ip, values(user_agent) as user_agent\
| where resource_count > 3\
| nomv resources\
| nomv principal_email\
| nomv client_ip\
| nomv user_agent\
| eval time=strftime(now(),"%Y-%m-%d %H:%M:%S") \
| eval severity="MEDIUM" \
| eval summary="Excessive number of IAM roles deleted, which could also impact GCP service availability" \
| eval body="resources: " . resources . " email: " . principal_email . " client_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Defence Evasion" \
| eval mitre_technique="Modify Cloud Compute Infrastructure" \
| eval mitre_sub_technique= "-" \
| `gcp_create_alert`
iseval = 0

[gcp_log_search]
definition = index=main sourcetype="gcp:cloudaudit"
iseval = 0

[gcp_rename_fields]
definition = | rename \
"protoPayload.methodName" as method_name,\
"protoPayload.status.details{}.violations{}.type" as violations_type,\
"protoPayload.status.message" as status_message,\
"protoPayload.request.policy.name" as request_policy_name,\
"protoPayload.request.servicePerimeter.name" as request_serviceperimeter_name,\
"protoPayload.request.logConfig.enable" as request_logconfig,\
"protoPayload.request.sink.disabled" as disabled,\
"resource.type" as resource_type,\
"resource.labels.backend_service_id" as backend_service_id\
"resource.labels.service" as resource_service,\
"resource.labels.email_id" as resource_email_id,\
"resource.labels.database_id" as resource_database_id,\
"protoPayload.authenticationInfo.principalEmail" as principal_email, \
"protoPayload.request.body.settings.ipConfiguration.ipv4Enabled" as ipv4_enabled,\
"protoPayload.request.body.settings.ipConfiguration.authorizedNetworks{}.value" as authorized_networks_value,\
"protoPayload.authorizationInfo{}.resource" as resource, \
"resource.labels.project_id" as project_id,\
"resource.labels.zone_name" as zone_name,\
"protoPayload.request.name" as request_name,\
"protoPayload.request.private_key_type" as request_private_key_type,\
"protoPayload.request.updateMask" as update_mask,\
"protoPayload.metadata.instanceMetadataDelta.addedMetadataKeys{}" as metadata_keys,\
"protoPayload.requestMetadata.callerIp" as client_ip,\
"protoPayload.requestMetadata.callerSuppliedUserAgent" as user_agent,\
"protoPayload.resourceName" as resource_name, \
"protoPayload.response.bindings{}.member" as member,\
"protoPayload.response.bindings{}.action" as action,\
"protoPayload.response.bindings{}.role" as role,\
"protoPayload.authorizationInfo{}.granted" as permission_granted,\
"protoPayload.request.policy.bindings{}.role" as request_role,\
"protoPayload.request.policy.bindings{}.members{}" as request_members,\
"protoPayload.serviceData.policyDelta.bindingDeltas{}.member" as member_change,\
"protoPayload.serviceData.policyDelta.bindingDeltas{}.action" as action_change,\
"protoPayload.serviceData.policyDelta.bindingDeltas{}.role" as role_change,\
"protoPayload.serviceData.policyDelta.auditConfigDeltas{}.action" as auditconfig_action,\
"protoPayload.serviceData.policyDelta.auditConfigDeltas{}.logType" as auditconfig_logtype,\
"protoPayload.serviceData.policyDelta.auditConfigDeltas{}.service" as auditconfig_service,\
"protoPayload.serviceData.setIamPolicyRequest.policy.bindings{}.members{}" as setiampolicyrequest_members,\
"protoPayload.serviceData.setIamPolicyRequest.policy.bindings{}.role" as setiampolicyrequest_role,\
"protoPayload.request.key.keyId" as key_id,\
"protoPayload.request.managedZone.cloudLoggingConfig.enableLogging" as managed_zone_enable_logging,\
"protoPayload.request.managedZoneResource.cloudLoggingConfig.enableLogging" as managed_zone_resource_enable_logging,\
"protoPayload.request.managedZone.dnssecConfig.state" as managed_zone_dnssec_config,\
"protoPayload.request.managedZoneResource.dnssecConfig.state" as managed_zone_resource_dnssec_config\
| eval managed_zone_enable_logging=coalesce(managed_zone_enable_logging, managed_zone_resource_enable_logging)\
| eval managed_zone_dnssec_config=coalesce(managed_zone_dnssec_config, managed_zone_resource_dnssec_config)\
| eval request_policy_name=coalesce(request_policy_name, request_name)\
| eval request_serviceperimeter_name=coalesce(request_serviceperimeter_name, request_name)
iseval = 0

[gcp_tabulate]
definition = | table _time, method_name, _raw
iseval = 0
