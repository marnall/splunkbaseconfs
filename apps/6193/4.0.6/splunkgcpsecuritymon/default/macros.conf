| eval body="project_id: ". project_id . " method_name: " . method_name . " auditconfig_action: " . auditconfig_action . " auditconfig_logtype: " . auditconfig_logtype . " auditconfig_service: " . auditconfig_service . " caller_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Defence Evasion" \
| eval mitre_technique="Impair Defenses" \
| eval mitre_sub_technique= "Disable Cloud Logs"\
| `gcp_create_alert`
iseval = 0

[gcp_detect_bigquery_dataset_made_public]
definition = `gcp_log_search` `gcp_rename_fields` \
| search method_name="*.IAMPolicy.SetIamPolicy" AND resource_type="*bigquery*" AND (setiampolicyrequest_members="*allUsers*" OR setiampolicyrequest_members="*allAuthenticatedUsers*") \
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| nomv resource \
| nomv setiampolicyrequest_role\
| nomv setiampolicyrequest_members\
| eval severity="HIGH" \
| eval summary="BigQuery Dataset made public" \
| eval body="project_id: ". project_id . " method_name: " . method_name . " resource: " . resource . " setiampolicyrequest_members: " . setiampolicyrequest_members . " setiampolicyrequest_role: " . setiampolicyrequest_role . " caller_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Initial Access" \
| eval mitre_technique="Exploit Public-Facing Application" \
| eval mitre_sub_technique= ""\
| `gcp_create_alert`

