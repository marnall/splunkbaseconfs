[gcp_detect_org_policy_changes]
definition = `gcp_log_search` `gcp_rename_fields` \
| search (method_name="*.OrgPolicy.CreatePolicy*" OR method_name="*.OrgPolicy.DeletePolicy*" OR method_name="*.OrgPolicy.UpdatePolicy*" )\
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| table, time, client_ip, method_name, user_agent, request_policy_name, principal_email, resource_name\
| eval severity="LOW"\
| eval summary="Changes to GCP Org Policies"\
| eval body="method_name: " . method_name . " request_policy_name: " . request_policy_name . " email: " . principal_email . " caller_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Privilege Escalation" \
| eval mitre_technique="Domain Policy Modification" \
| eval mitre_sub_technique= "Domain Trust Modification" \
| `gcp_create_alert`
iseval = 0

[gcp_detect_public_cloudsql_instance]
definition = `gcp_log_search` `gcp_rename_fields` \
| where !isnull(authorized_networks_value) \
| mvexpand authorized_networks_value \
| eval authorized_networks_value_ip = mvindex(split(authorized_networks_value, "/"), 0) \
| where ipv4_enabled = "true" AND !(cidrmatch("10.0.0.0/8", authorized_networks_value_ip) OR cidrmatch("192.168.0.0/16", authorized_networks_value_ip) OR cidrmatch("172.16.0.0/12", authorized_networks_value_ip)) \
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="HIGH" \
| eval summary="Public CloudSQL Instance" \
| eval body="resource: " . resource_database_id . " resource_type: " . resource_type . " action: " . method_name . " email: " . principal_email . " caller_ip: " . client_ip\
| eval mitre_tactic="Initial Access" \
| eval mitre_technique="Exploit Public Facing Application" \
| eval mitre_sub_technique= "-" \
| `gcp_create_alert`
iseval = 0

