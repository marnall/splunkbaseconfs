[gcp_detect_excessive_deleted_service_accounts]
definition = `gcp_log_search` `gcp_rename_fields` \
| search method_name="*DeleteServiceAccount" \
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats earliest(time) as time, latest(time) as latest_time, dc(resource_email_id) as resource_email_ids_count, values(resource_email_id) as resource_email_ids, values(client_ip) as client_ip, values(user_agent) as user_agent, values(principal_email) as principal_email \
| nomv principal_email \
| nomv user_agent \
| nomv client_ip \
| nomv resource_email_ids \
| search resource_email_ids_count > 2\
| eval severity="MEDIUM" \
| eval summary="Excessive Service Accounts deleted" \
| eval body="resources: " . resource_email_ids . " email: " . principal_email . " caller_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Defence Evasion" \
| eval mitre_technique="Impair Defenses" \
| eval mitre_sub_technique= "Disable or Modify Tools" \
| `gcp_create_alert`
iseval = 0

[gcp_detect_excessive_disabled_service_accounts]
definition = `gcp_log_search` `gcp_rename_fields` \
| search method_name="*DisableServiceAccount" \
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats earliest(time) as time, latest(time) as latest_time, dc(resource_email_id) as resource_email_ids_count, values(resource_email_id) as resource_email_ids, values(client_ip) as client_ip, values(user_agent) as user_agent, values(principal_email) as principal_email \
| nomv principal_email \
| nomv user_agent \
| nomv client_ip \
| nomv resource_email_ids \
| search resource_email_ids_count > 2\
| eval severity="MEDIUM" \
| eval summary="Excessive Service Accounts disabled" \
| eval body="resources: " . resource_email_ids . " email: " . principal_email . " caller_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Defence Evasion" \
| eval mitre_technique="Impair Defenses" \
| eval mitre_sub_technique= "Disable or Modify Tools" \
| `gcp_create_alert`
iseval = 0

[gcp_detect_excessive_service_account_permissions]
definition = `gcp_log_search` `gcp_rename_fields` \
| search method_name="google.iam.admin.v1.SetIAMPolicy" AND role="*owner*" AND resource_type="service_account"\
| eval roles=mvjoin(role, ",")\
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="MEDIUM" \
| eval summary="Excessive IAM Permissions to service account" \
| eval body="resource: " . resource_email_id . " roles: " . roles . " email: " . principal_email . " client_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Persistence" \
| eval mitre_technique="Account Manipulation"\
| eval mitre_sub_technique= "Additional Cloud Credentials" \
| `gcp_create_alert`
iseval = 0

[gcp_detect_excessive_services_enabled]
definition = `gcp_log_search` `gcp_rename_fields` \
| where method_name="google.api.serviceusage.v1.ServiceUsage.EnableService"\
| stats dc(resource_service) as enable_service_count,\
        values(resource_service) as resource_services,\
        values(principal_email) as principal_email,\
        values(client_ip) as client_ip,\
        values(user_agent) as user_agent\
| where enable_service_count > 3\
| eval time=strftime(now(),"%Y-%m-%d %H:%M:%S") \
| eval severity="MEDIUM" \
| eval summary="Excessive number of services enabled" \
| eval body="resource: " . resource_services . " email: " . principal_email . " client_ip: " . client_ip . " user_agent: " . user_agent \
| eval mitre_tactic="Discovery" \
| eval mitre_technique="Cloud Service Discovery"\
| eval mitre_sub_technique= "-" \
| `gcp_create_alert`
iseval = 0

[gcp_detect_iam_service_account_key_user_managed]
