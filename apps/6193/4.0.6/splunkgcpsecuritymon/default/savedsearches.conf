search = `gcp_log_search` `gcp_rename_fields` \
| search (managed_zone_dnssec_config="OFF" AND (method_name="dns.managedZones.patch" OR method_name="dns.managedZones.create")) \
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="LOW" \
| eval summary="Cloud Logging Disabled for Managed DNS Zones. This restricts logging of DNS resolutions for resources using this DNS Zone" \
| eval body="project_id: " . project_id . "\
zone_name: " . zone_name . "\
dnssec_config: " . managed_zone_dnssec_config . "\
email: " . principal_email \
| eval mitre_tactic="Defense Evasion" \
| eval mitre_technique="Impair Defenses" \
| eval mitre_sub_technique= "Disable Cloud Logs" \
| `gcp_create_alert`

