[csd-event]
search = index="clearskydata" AND eventID

[csd-alert]
color = et_red
search = index="clearskydata" AND alertID

[csd-interface]
search = index="clearskydata" AND interfaceID

[csd-session]
search = index="clearskydata" AND sessionID

[csd-dc]
search = index="clearskydata" AND dcID AND targetIQN 
#search = index="clearskydata" | spath | regex objectRef=".+/dcs/dc-\d+"

[csd-group]
search = index="clearskydata" AND groupID AND customerID
#search = index="clearskydata" | spath | regex objectRef="/groups/group-\d+"
