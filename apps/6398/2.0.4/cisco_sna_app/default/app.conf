#
# Splunk app configuration file
#

[install]
is_configured = 0

[package]
id = cisco_sna_app

[ui]
is_visible = 1
label = Cisco SNA App
setup_view = setup_page_dashboard

[launcher]
author = Cisco Systems, Inc.
description = Cisco Secure Network Analytics App
version = 2.0.4

[triggers]
reload.sna_app_settings = simple
reload.passwords = simple
reload.addon_builder = simple

