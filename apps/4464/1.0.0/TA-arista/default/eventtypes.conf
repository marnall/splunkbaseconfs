# eventtypes.conf

[arista_ssh_login]
  search = souretype=arista_switch_log is connecting a SSH session from the switch to
  # tags = authentication, default

[arista_ssh_login_failure]
  search =  souretype=arista_switch_log disconnected the SSH session from the switch to
  # tags = authentication

[arista_ssh_admin]
  search = souretype=arista_switch_log disconnected the SSH session from the switch to admin@*
  #tags = authentication, privledged

[arista_useradd]
  search = souretype=arista_switch_log command="username*privilege"
  # tags = audit, account, change

[arista_userdel]
  search = souretype=arista_switch_log command="no username*"
  # tags = audit, account, change 

[arista_password_change]
  search = souretype=arista_switch_log command="username * secret *"
  # tags = audit, account, change 

[arista_config_t]
  search = souretype=arista_switch_log command="config* t*"
  # tags = audit, change, network

[arista_installed]
  search =  souretype=arista_switch_log Extension * has been installed
  # tags = audit, change, network

[arista_uninstalled]
  search = souretype=arista_switch_log Extension * has been uninstalled
  # tags = audit, change, network

[arsta_portsecurity]
  search = souretype=arista_switch_log Security violation occurred
  # tags = network, change, attack, ids
 
 [arista_excessivelogins]
   search = souretype=arista_switch_log Too many incomplete login attempts
   # tags = network, authentication, attack, ids