[nozomi:captured_urls]
EVAL-dm_type = case(match(protocol,"http|https"),"web",match(protocol,"mdns|dns|llmnr"),"dns",1=1,"network")
EVAL-app = if(isnotnull(protocol) AND NOT match(protocol,"http|https|mdns|dns|llmnr"),'protocol',null())
EVAL-vendor_product = "Nozomi Networks"
EVAL-url_domain = replace(url,"^(?:https?\:\/\/)?(?:www\.)?([^\/\:]+).*$","\1")
EVAL-url_length = len(replace(url,"^(?:https?\:\/\/)?(?:www\.)?([^\/\:]+).*$","\1"))
EVAL-bytes = 'size_bytes'
EVAL-src = 'id_src'
EVAL-src_ip = 'id_src'
EVAL-dest = 'id_dst'
EVAL-dest_ip = 'id_dst'
EVAL-dest_port = if(match('url', "^(?:https?\:\/\/)?(?:www\.)?[^\/\:]+\:(\d+).*$"), replace('url', "^(?:https?\:\/\/)?(?:www\.)?[^\/\:]+\:(\d+).*$", "\1"), null())
EVAL-action = if('size_bytes'!="null","allowed","unknown")
EVAL-http_user_agent = if(isnotnull('properties.user_agent') AND NOT 'properties.user_agent'="",'properties.user_agent',null())
EVAL-uri_path = if(isnotnull('properties.url_path') AND NOT 'properties.url_path'="/",'properties.url_path',null())
EVAL-transaction_id = if(match(protocol,"mdns|dns|llmnr"),'session_id',null())

[nozomi:link]
EVAL-action = if(isnotnull('transferred.bytes') AND ('transferred.bytes' > 0 OR NOT 'transferred.bytes'="null"), "allowed","blocked")
EVAL-app = 'protocol'
EVAL-transport = 'transport_protocols{}'
EVAL-src = 'from'
EVAL-src_ip = if(cidrmatch("0.0.0.0/0",'from'),'from',null())
EVAL-src_zone = 'from_zone'
EVAL-dest = 'to'
EVAL-dest_ip = if(cidrmatch("0.0.0.0/0",'to'),'to',null())
EVAL-dest_zone = 'to_zone'
EVAL-packets = 'transferred.packets'
EVAL-bytes = 'transferred.bytes'
EVAL-duration = if(isnotnull('first_activity_time') AND isnotnull('last_activity_time'),round((strptime('last_activity_tim',"%d/%m/%Y %H:%M:%S") - strptime('first_activity_time',"%d/%m/%Y %H:%M:%S")) / 60),null())
EVAL-dvc = 'appliance_host'
EVAL-vendor_product = "Nozomi Networks"

[nozomi:session]
EVAL-action =  if(isnotnull('transferred.bytes') AND ('transferred.bytes' > 0 OR NOT 'transferred.bytes'="null"), "allowed","blocked")
EVAL-app = 'protocol'
EVAL-packets = 'transferred.packets'
EVAL-bytes = 'transferred.bytes'
EVAL-tcp_flag = 'status'
EVAL-src = 'from'
EVAL-src_ip = if(cidrmatch("0.0.0.0/0",'from'),'from',null())
EVAL-src_zone = 'from_zone'
EVAL-dest = 'to'
EVAL-dest_ip = if(cidrmatch("0.0.0.0/0",'to'),'to',null())
EVAL-dest_zone = 'to_zone'
EVAL-transport = 'transport_protocol'
EVAL-vlan = if(isnotnull('vlan_id') AND NOT 'vlan_id'="null",'vlan_id',null())
EVAL-duration = if(isnotnull('first_activity_time') AND isnotnull('last_activity_time'),round((strptime('last_activity_tim',"%d/%m/%Y %H:%M:%S") - strptime('first_activity_time',"%d/%m/%Y %H:%M:%S")) / 60),null())
EVAL-vendor_product = "Nozomi Networks"

[nozomi:link_events]
EVAL-app = 'protocol'
EVAL-tcp_flag = 'event'
EVAL-src = 'id_src'
EVAL-src_ip = if(cidrmatch("0.0.0.0/0",'id_src'),'id_src',null())
EVAL-src_port = 'port_src'
EVAL-dest = 'id_dst'
EVAL-dest_ip = if(cidrmatch("0.0.0.0/0",'id_dst'),'id_dst',null())
EVAL-dest_port = 'port_dst'
EVAL-transport = 'transport_protocol'
EVAL-vendor_product = "Nozomi Networks"

[nozomi:node]
EVAL-action = case(('received.bytes' > "0" AND 'sent.bytes' > "0") OR ('received.packets' > "0" AND 'sent.packets' > "0"), "allowed", ('received.bytes' = "0" AND 'sent.bytes' = "0") OR ('received.packets' = "0" AND 'sent.packets' = "0"), "blocked", ('received.bytes' = "0" AND 'sent.bytes' > "0") OR ('received.packets' = "0" AND 'sent.packets' > "0"), "allowed", ('received.bytes' > "0" AND 'sent.bytes' = "0") OR ('received.packets' > "0" AND 'sent.packets' = "0"), "allowed") 
EVAL-vendor_product = if(isnotnull(product_name) AND NOT (product_name="null" OR vendor="null"),tostring(vendor)+":"+tostring(product_name),if(isnotnull(vendor) AND NOT vendor="null",'vendor',if(vendor="null" AND NOT mac_vendor="null",'mac_vendor',"Nozomi Networks")))
EVAL-bytes_in = 'received.bytes' 
EVAL-bytes_out = 'sent.bytes' 
EVAL-bytes = ('received.bytes' + 'sent.bytes')
EVAL-packets_in = 'received_packets'
EVAL-packets_out = 'sent.packets'
EVAL-packets = ('received_packets' + 'sent.packets')
EVAL-site = 'appliance_site' 
EVAL-dvc = if(label!="null",'label',null())
EVAL-dest = if(isnotnull(ip) AND NOT (ip="null" OR ip=""),'ip',null())
EVAL-dest_ip = if(isnotnull(ip) AND NOT (ip="null" OR ip=""),'ip',null())
EVAL-src = if(isnotnull('links{}.id') AND NOT ('links{}.id'="null" OR 'links{}.id'=""),'links{}.id',coalesce('appliance_host',null()))
EVAL-src_ip = if(isnotnull('links{}.id') AND NOT ('links{}.id'="null" OR 'links{}.id'=""),'links{}.id',null())
EVAL-app = if(isnotnull('protocols{}'),'protocols{}',if(links_count > 0,'links{}.protos{}.name',"unknown"))

[nozomi:alert]
EVAL-action = if(isnotnull('properties.details_quarantine_path.label') AND NOT ('properties.details_quarantine_path.label'="null" OR 'properties.details_quarantine_path.label'=""),"blocked", if(match('description',"^.*with 0 successful connections.*"), "blocked", if(match('type_id',"^.*denied.*|.*DENIED.*|.*block.*|.*BLOCK.*"),"blocked","allowed")))
EVAL-app = if(isnotnull(protocol) AND NOT (protocol="null" OR protocol=""),'protocol',null())
EVAL-type_id = replace(type_id, "^.*\:", "")
EVAL-ids_type = if(isnotnull(trigger_id) AND NOT (trigger_id="null" OR trigger_id=""),"network",null())
EVAL-severity = if(isnotnull('risk'),case(('risk'>=0.1 AND 'risk'<=3.9),"low",('risk'>=4.0 AND 'risk'<=6.9),"medium",('risk'>=7.0 AND 'risk'<=8.9),"high",('risk'>=9.0),"critical"),null())
EVAL-severity_id = 'risk'
EVAL-protocol = if(isnotnull(protocol) AND NOT (protocol="null" OR protocol=""),'protocol',null())
EVAL-vendor_product = "Nozomi Networks"
EVAL-threat_name = if(isnotnull(threat_name) AND NOT (threat_name="null" OR threat_name=""),'threat_name',null())
EVAL-signature = if(isnotnull(threat_name) AND NOT (threat_name="null" OR threat_name=""),'threat_name',if(isnull(trigger_id) OR trigger_id="null",replace(type_id, "^.*\:", ""),coalesce('properties.mitre_attack_for_ics.software{}','properties.mitre_attack_enterprise.techniques{}.name')))
EVAL-dest_port = if(isnotnull(port_dst) AND NOT (port_dst="null" OR port_dst=""),'port_dst',null())
EVAL-src_port = if(isnotnull(port_src) AND NOT (port_src="null" OR port_src=""),'port_src',null())
EVAL-file_path = 'properties.details_resource.value'
EVAL-file_name = replace('properties.details_resource.value', "^.*\\\([^\\\]+$)", "\1")
EVAL-file_hash = mvappend('properties.details_hash_MD5.value','properties.details_hash_SHA1.value','properties.details_hash_SHA256.value')
EVAL-mitre_attack_tactics = if(isnotnull(mitre_attack_tactics) AND NOT 'mitre_attack_tactics'="null", split('mitre_attack_tactics', ", "),'properties.mitre_attack_enterprise.techniques{}.tactic')
EVAL-mitre_technique_id = if(isnotnull(mitre_attack_techniques) AND NOT 'mitre_attack_techniques'="null", 'mitre_attack_techniques','properties.mitre_attack_enterprise.techniques{}.id')
EVAL-cve = if(match('properties.message', ".+[^\(]+\((CVE\-[^\)]+)\).+"), replace('properties.message', ".+[^\(]+\((CVE\-[^\)]+)\).+", "\1"), null())
EVAL-src_mac = if(isnotnull(mac_src) AND NOT mac_src="null",'mac_src',null())
EVAL-dest_mac = if(isnotnull(mac_dst) AND NOT mac_dst="null",'mac_dst',null())
EVAL-type = if(('risk'>=7.0 AND 'risk'<=8.9),"alert",if(('risk'>=9.0),"alarm",null()))

[nozomi:nn_asset]
EVAL-ip = if(isnotnull('ip{}') AND NOT ('ip{}'="null" OR 'ip{}'=""),'ip{}',null())
EVAL-dest_ip = if(isnotnull('ip{}') AND NOT ('ip{}'="null" OR 'ip{}'=""),'ip{}',null())
EVAL-dest= if(isnotnull('ip{}') AND NOT ('ip{}'="null" OR 'ip{}'=""),'ip{}',null())
EVAL-dest_mac = if(isnotnull('mac_address{}') AND NOT 'mac_address{}'="null",'mac_address{}',null())
EVAL-dvc = 'appliance_hosts{}'
EVAL-mac = 'mac_address{}'
EVAL-node = 'nodes{}'
EVAL-vendor_product = if(isnotnull(vendor) AND NOT (vendor="null" OR vendor=""),'vendor', if(isnotnull('mac_vendor{}') AND NOT ('mac_vendor{}'="null" OR 'mac_vendor{}'=""),'mac_vendor{}',null()))
EVAL-dest_zone = if(isnotnull('zones{}') AND NOT ('zones{}'="null" OR 'zones{}'=""),'zones{}',null())
EVAL-protocol = if(isnotnull('protocols{}') AND NOT ('protocols{}'="null" OR 'protocols{}'=""),'protocols{}',null())
EVAL-os = if(isnotnull(os) AND NOT (os="null" OR os=""),'os',null())
EVAL-serial = if(isnotnull(serial) AND NOT (serial="null" OR serial=""),'serial',null())
EVAL-src = 'appliance_hosts{}'
EVAL-app =  if(isnotnull('protocols{}') AND NOT ('protocols{}'="null" OR 'protocols{}'=""),'protocols{}',null())
EVAL-action = case(match(_raw, ".*Fail.*|.*fail.*|.Block.*|.*block.*"),"blocked",true(),"allowed")
EVAL-description = if(isnotnull(name) AND (isnotnull(type) AND NOT (type="null" OR type="" OR type="-")),tostring('type').":".tostring('name'), if(isnotnull(name) AND (isnull(type) OR (type="null" OR type="" OR type="-")),'name',null()))

[nozomi:health]
EVAL-cpu_load_percent = 'info.cpu'
EVAL-mem_used = 'info.ram'
EVAL-dest = 'appliance_host'
