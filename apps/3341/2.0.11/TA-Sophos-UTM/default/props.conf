#####################################
#####################################
#  Sophos metadata work
#  Conducted on the heavy Forwarder
#####################################
#####################################
[sophos:utm]
#TRANSFORMS-0force_sophos_utm_index = sophos_utm_ips_index, sophos_utm_fw_index, sophos_utm_http_index
TRANSFORMS-1force_sophos_utm_sourcetype = sophos_utm_http_sourcetype, sophos_utm_fw_sourcetype, sophos_utm_ips_sourcetype

#####################################
#####################################
#  legacy rename
#####################################
#####################################
[sophos:utm:afcd]
rename = sophos:utm:ips

[sophos:utm:snort]
rename = sophos:utm:ips

[sophos:utm:ulogd]
rename = sophos:utm:fw



#####################################
#####################################
#  Sophos IPS related events 
#####################################
#####################################
[sophos:utm:ips]
FIELDALIAS-action = action AS z_action
FIELDALIAS-sys = sys as vendor_product
FIELDALIAS-dstip = dstip as dest_ip, dstip as dest
FIELDALIAS-dstmac = dstmac as dest_mac
FIELDALIAS-dstport = dstport as dest_port
FIELDALIAS-srcip = srcip as src_ip, srcip as src
FIELDALIAS-srcmac = srcmac as src_mac
FIELDALIAS-srcport = srcport as src_port
#FIELDALIAS-reason = reason as signature
#FIELDALIAS-class = class as category
FIELDALIAS-priority = priority as severity_id
FIELDALIAS-dvc = host as dvc
#FIELDALIAS-threatname = threatname as signature

LOOKUP-sophos_ips_severity = sophos_utm_ips_severity severity_id OUTPUT severity
LOOKUP-sophos_ips_action = sophos_utm_ips_action z_action OUTPUT action
LOOKUP-sophos_firewall_protocol = sophos_utm_firewall_proto_numbers proto OUTPUT protocol

EVAL-transport = case(proto=="6", "tcp", proto=="17", "udp", 1=1, "unknown")
EVAL-ids_type = "network"
EVAL-signature = coalesce(threatname,reason,name)
EVAL-category = coalesce(class,name)
EVAL-severity_id=if(isnull(severity_id),"4",severity_id)
#EVAL-severity=coalesce(severity,"informational")

#####################################
#####################################
#  Sophos Firewall related events 
#####################################
#####################################

[sophos:utm:fw]
KV_MODE = auto
EXTRACT-app = \s(?<daemon>[A-Za-z][\w-/]+)(\[\d+\])?:\s+
FIELDALIAS-sub = sub as app
FIELDALIAS-dstip = dstip as dest_ip, dstip as dest
FIELDALIAS-dstmac = dstmac as dest_mac
FIELDALIAS-dstport = dstport as dest_port
FIELDALIAS-srcip = srcip as src_ip, srcip as src
FIELDALIAS-srcmac = srcmac as src_mac
FIELDALIAS-srcport = srcport as src_port
FIELDALIAS-action = action AS z_action
FIELDALIAS-sys = sys as vendor_product
FIELDALIAS-tcpflags = tcpflags as tcp_flag
FIELDALIAS-initf = initf as src_interface
FIELDALIAS-outitf = outitf as dest_interface
FIELDALIAS-fwrule = fwrule as signature_id
FIELDALIAS-dvc = host as dvc

LOOKUP-sophos_firewall_action = sophos_utm_fw_action z_action OUTPUT action
LOOKUP-sophos_firewall_protocol = sophos_utm_firewall_proto_numbers proto OUTPUT protocol
EVAL-transport = case(proto=="6", "tcp", proto=="17", "udp", 1=1, "unknown")

#####################################
#####################################
#  Sophos Web Proxy related events 
#####################################
#####################################



[sophos:utm:httpproxy]
KV_MODE = auto

EXTRACT-dest=\/\/(?<dest>[^\/\:]*) IN url
EXTRACT-uripath=\/\/[^\/]*(?<uripath>/[^\?]*) IN url
EXTRACT-uriquery=\?(?<uriquery>.*) IN url

FIELDALIAS-dstip = dstip as dest_ip
FIELDALIAS-srcip = srcip as src_ip, srcip as src
FIELDALIAS-srcmac = srcmac as src_mac
FIELDALIAS-srcport = srcport as src_port
FIELDALIAS-size = size as bytes_in
FIELDALIAS-action = action AS z_action
FIELDALIAS-app = application as app
FIELDALIAS-statuscode = statuscode as status_id
FIELDALIAS-method = method as http_method
FIELDALIAS-content_type = content_type as http_content_type
FIELDALIAS-referer = referer as http_referrer
FIELDALIAS-ua = ua AS http_user_agent
FIELDALIAS-sys = sys as vendor_product
FIELDALIAS-categoryname = categoryname as category
FIELDALIAS-dvc = host as dvc

LOOKUP-status_for_httpproxy = sophos_utm_http_status status_id OUTPUT status
LOOKUP-sophos_httpproxy_action = sophos_utm_httpproxy_action z_action OUTPUT action

EVAL-response_time = (fullreqtime/1000)
EVAL-http_user_agent_length = len(ua)
EVAL-url_length = len(url)
