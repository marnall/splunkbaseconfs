[default]

[id]
name = ipinfo_app
version = 9.2.2

[install]
is_configured = 0
build = 1
state = enabled

[launcher]
description = IPinfo app for IP information via ipinfo.io
version = 9.2.2
author = IPinfo.io

[package]
id = ipinfo_app
check_for_updates = true

[ui]
is_visible = 1
label = IPinfo
setup_view = setup
attribution_link = https://ipinfo.io/account

[triggers]
reload.ip_info_setup = simple
reload.eventgen = simple

[shclustering]
deployer_push_mode = full
deployer_lookups_push_mode = always_preserve
