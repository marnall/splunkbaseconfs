
[netdocuments:repository:admin:logs]
FIELDALIAS-src = orig_hostname AS src

EVAL-status = if(match(desc,"fail"),"failure","success")
EVAL-action = case(match(desc,"(R|r)emoved"),"deleted",match(desc,"(U|u)pdate"),"updated",match(desc," (A|a)dd "),"updated",match(desc,"(A|a)dded"),"updated",match(desc,"(C|c)reate"),"created",match(desc,"(D|d)elete"),"deleted",match(desc,"(C|c)hange"),"updated",match(desc,"(E|e)nable"),"updated",1==1,"updated")
EVAL-change_type = "filesystem"
EVAL-vendor_product = "NetDocuments"
EVAL-object_category = case(match(name,"Group|Groups"),"group",match(name,"Users|User"),"user",match(name,"service account|Service Account"),"service account",match(name,"UserList|userlist"),"list")
EVAL-object = 'name'

[netdocuments:repository:user:logs]
FIELDALIAS-object_id = "storageObject.docId" AS object_id
FIELDALIAS-object_size = "storageObject.size" AS object_size
FIELDALIAS-object_path = "storageObject.cabinet.name" AS object_path
FIELDALIAS-dest = "storageObject.cabinet.id" AS dest
FIELDALIAS-src = orig_hostname AS src
FIELDALIAS-app = "source.name" AS app

EVAL-vendor_product = "NetDocuments"
EVAL-signature = 'name'
EVAL-action=case(name="Purge","deleted",name="create","created",name="delete","deleted",name="save local","downloaded",name="upload","uploaded",name="open","read",name="Document Checked Out","copied",name="check in","modified",name="change access list","updated",name="change profile value","updated")
EVAL-object= if(isnull('storageObject.fileExtension'),'storageObject.name','storageObject.name'.".".'storageObject.fileExtension')
EVAL-object_category = if(isnotnull('storageObject.fileExtension'),"file",null())
EVAL-object_attrs = if(isnotnull('storageObject.UATClient'),'storageObject.UATClient',null())