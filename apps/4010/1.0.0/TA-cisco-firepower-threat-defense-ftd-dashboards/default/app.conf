# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 1

[launcher]
author = Juan Jose Ponce Dominguez
version = 1.0.0
description = This Addon contains various dashboards created for the Cisco Firepower Threat Defense ( FTD ). This addon needs the following sourcetypes to be installed: "Cisco Firepower Threat Defense FTD sourcetype", "Cisco eStreamer eNcore Addon for Splunk" and " Splunk Add-on for Cisco ASA".

[ui]
is_visible = 1
label = Cisco Firepower Threat Defense FTD Dashboards
docs_section_override = AddOns:released

[package]
id = TA-cisco-firepower-threat-defense-ftd-dashboards

[triggers]
reload.addon_builder = simple
reload.ta_cisco_firepower_threat_defense_ftd_dashboards_account = simple
reload.ta_cisco_firepower_threat_defense_ftd_dashboards_settings = simple
reload.passwords = simple
