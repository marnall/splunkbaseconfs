#
# May 2021
#
# Developed by BaboonBones, Ltd. ( www.baboonbones.com ) for Neustar
#

# -----------------------------------------------------------
# Scripted Input used to populate KVstore collections from CSV 
# Geopoint data downloaded from AWS S3.
#
# The settings below are just common system settings.
# User settings (AWS credentials etc..) are configured on the 
# App's setup page.
# -----------------------------------------------------------

[script://$SPLUNK_HOME/etc/apps/neustar_app/bin/neustar_s3.py]
python.version = python3
interval = -1
passAuth = splunk-system-user
start_by_shell = true
disabled = 1