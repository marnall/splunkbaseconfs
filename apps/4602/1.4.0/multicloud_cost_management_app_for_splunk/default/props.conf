
[azure_prices]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[azure:billing]
EXTRACT-billing_period = \"billingPeriodId\":\s+.+billingPeriods/(?P<billing_period_year>\d{4})(?P<billing_period_month>\d+)\"
BREAK_ONLY_BEFORE_DATE =
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false

[source::...multicloud_cost_management_app_for_splunk*.log*]
sourcetype = multicloudcostmanagementappforsplunk:log

[azure:vnet:ip:public]
FIELDALIAS-vm_id = "properties.virtualMachine.id" AS vm_id
FIELDALIAS-publicIP_id = "properties.ipConfigurations{}.properties.publicIPAddress.id" AS publicIP_id
EXTRACT-nic_id = \"ipConfiguration\":\s+\{\"id\":\s+\"(?<nic_id>\/[^\/]*\/[^\/]*\/[^\/]*\/[^\/]*\/[^\/]*\/[^\/]*\/[^\/]*\/[^\/]*)

[azure:vnet:nic]
FIELDALIAS-vm_id = "properties.virtualMachine.id" AS vm_id

[azure:vnet:nsg]
FIELDALIAS-vm_id = "properties.virtualMachine.id" AS vm_id

[mscs:resource:virtualMachine]
FIELDALIAS-launch_time = "properties.instanceView.statuses{}.time" AS launch_time

[aws:billing]
EXTRACT-Currency = ItemDescription=\"?(?<Currency>\W)\d+

[google:gcp:billing:report]
FIELDALIAS-account_id = "Account ID" AS account_id
FIELDALIAS-credit_aliases = Credit1 AS credit1 "Credit1 Amount" AS credit1_amount "Credit1 Currency" AS credit1_currency Credit2 AS credit2 "Credit2 Amount" AS credit2_amount "Credit2 Currency" AS credit2_currency
FIELDALIAS-measurement_aliases = "Line Item" AS line_item Measurement1 AS measurement1 "Measurement1 Total Consumption" AS measurement1_total_consumption "Measurement1 Units" AS measurement1_units
FIELDALIAS-project = "Project ID" AS project_id "Project Labels" AS project_labels "Project Name" AS project_name "Project Number" AS project_number
EXTRACT-billing_period_year,billing_period_month = "Start Time": "(?<billing_period_year>\d+)\-(?<billing_period_month>\d+)

[google:gcp:pubsub:message]
EXTRACT-project_id,region_id = "region": "https://www.googleapis.com/compute/v1/projects/(?P<project_id>[^/]+)/regions/(?P<region_id>[^"]+)\"
EXTRACT-organization_id = "ancestors": \["projects/\d+", "organizations/(?P<organization_id>[^"]+)"\]
FIELDALIAS-externalIp = "data.asset.resource.data.networkInterface{}.accessConfigs{}.externalIp" ASNEW externalIp "data.asset.resource.data.networkInterface{}.accessConfig{}.externalIp" ASNEW externalIp
FIELDALIAS-data_users = "data.resource.data.users{}" ASNEW resource_users
EXTRACT-diskType = "type":\s+"https://www\.googleapis\.com/compute/v1/projects/[^\/]+/zones/[^\/]+/diskTypes/(?P<diskType>[^"]+)
EXTRACT-region = /[^/]+/zones?/(?<region>\w+-\w+)-\w+/
EXTRACT-instance_type = projects/[^/]+/zones/[^/]+/machineTypes/(?<instance_type>[^"]+)\"

[google:gcp:monitoring]
FIELDALIAS-doubleValue = "points{}.value.doubleValue" AS double_value

