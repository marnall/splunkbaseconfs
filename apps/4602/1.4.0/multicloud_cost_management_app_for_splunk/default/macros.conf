[aws_index]
definition = (index="main" OR index="aws")
iseval = 0

[azure_index]
definition = (index="main" OR index="azure")
iseval = 0

[gcp_index]
definition = (index="main" OR index="gcp")
iseval = 0

[azure_ec2_state(1)]
args = host
definition = `azure_index` sourcetype="mscs:vm:metrics" Host=$host$\
| stats count as total\
| eval state=if(total > 0, "Running", "Stopped")
iseval = 0

[comment(1)]
args = text
definition = ""
iseval = 1

