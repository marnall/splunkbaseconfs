[Table of Time Elapsed Between HPUE and ORLM]
action.email.inline = 1
action.email.reportServerEnabled = 0
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
dispatch.earliest_time = 0
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = ATYP="HPUE" OR ATYP="ORLM" | transaction CBID startswith="HPUE" |rename duration as Duration(millionseconds)|eval my_time=_time | convert timeformat="%m/%d/%Y %H:%M:%S %p" ctime(my_time) | rename my_time as "Time(UTC)"|table Time(UTC) CBID UUID Duration(millionseconds)
