search = ATYP="FSTG" |eventstats count as "Count" by FGRP|eventstats sum(FSIZ) as "Size" by FGRP|dedup Share_Name|eventstats sum(Count) as FSG_Sum|eventstats sum(Size) as SizeSum|eval Count_Percentage_Raw=Count*100/FSG_Sum|eval Size_Percentage_Raw=Size*100/SizeSum |eval Count_Percentage(%)=round(Count_Percentage_Raw , 2)|eval Size_Percentage(%)=round(Size_Percentage_Raw , 2)|eval File_Size=`format_bytes(Size)`|rename FGRP as FSG_Group|addtotals row=f col=t labelfield=FSG_Group label=Total Count Size|table FSG_Group Share_Name FSG_Group Count Count_Percentage(%) Size File_Size Size_Percentage(%)

