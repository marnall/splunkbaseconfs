
[Number of Objects Stored by Gateway Node Share Name]
action.email.inline = 1
alert.suppress = 0
alert.track = 1
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
description = Number of Objects Stored by Gateway Node Share Name
search = ATYP="FSTG" |eventstats count as "Count" by FGRP|dedup Share_Name| chart sum(Count) as Number_Of_Objects by Share_Name\


