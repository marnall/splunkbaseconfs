
# Splunk app configuration file

[package]
id = cisco-app-Nexus-9k


[install]
is_configured = 0

[ui]
is_visible = 1
label = Cisco Nexus 9k App for Splunk Enterprise
setup_view = setup

[launcher]
author = Cisco Systems
description = This app provides insight and monitoring for your Cisco  Nexus 9k switches
version = 3.0.0

[triggers]
reload.cisco_nexus_setup = simple
