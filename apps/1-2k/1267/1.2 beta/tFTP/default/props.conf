[FileZilla_FTP]
EXTRACT-ftp_pMsg = (?i)^[^>]*>\s+\w+\s+(?P<ftp_pMsg>.+)
EXTRACT-ftp_msg = (?i)^(?:[^\.]*\.){5}\d+\)(?P<ftp_msg>.+)
EXTRACT-ftp_src_ip = (?i) .*? \((?P<ftp_src_ip>\d+\.\d+\.\d+\.\d+)(?=\))
EXTRACT-ftp_usr = (?i)^[^\-]*\-\s+(?P<ftp_usr>.+?)\s+\(
EXTRACT-ftp_command = (?i)^(?:[^\)]*\)){2}>\s+(?P<ftp_command>[a-z][a-z][a-z]+)
EXTRACT-ftp_code = (?i)^[^>]*>\s+(?P<ftp_code>[\d\d\d]+)

LOOKUP-<locip> = geoip_lcl lip OUTPUT Latitude,Longitude
