#
# Splunk app configuration file
#

[install]
is_configured = 0

[ui]
is_visible = 1
label = Security Onion Sensor Add On

[launcher]
author = Brad Shoop
description = Security Onion Sensor Add On eases the configuration of a multiple Security Onion sensor deployment. Install the Splunk Universal forwarder and untar this app to /opt/splunkforwarder/etc/apps. Edit /opt/splunkforwarder/etc/apps/securityonion_addon/local/inputs.conf to disable specific logs depending on whether you're indexing from a server or sensor that is remote to the Splunk indexer.
version = 0.7

[package]
id = securityonion_addon
