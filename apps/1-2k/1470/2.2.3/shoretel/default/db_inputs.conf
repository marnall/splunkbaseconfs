[shoretel_call]
connection = shoretel_connection
disabled = 1
index = shoretel
index_time_mode = dbColumn
input_timestamp_column_number = 10
interval = 60
max_rows = 50000
mode = rising
source = shorewarecdr
sourcetype = shoretel_call
tail_rising_column_number = 36
fetch_size = 10000

query = SELECT connect.ID AS ConnectID, connect.CallTableID, connect.LineID, connect.SwitchID, connect.PortNumber, connect.PortID, connect.PortName, connect.GroupID, connect.GroupName, CAST(CONCAT(CAST(connect.ConnectTime AS CHAR), '.', LPAD(CAST(connect.ConnectTimeMS AS CHAR),3,'0')) AS DateTime) AS ConnectTime, CAST(CONCAT(CAST(connect.DisconnectTime AS CHAR), '.', LPAD(CAST(connect.DisconnectTimeMS AS CHAR),3,'0')) AS DateTime) AS DisconnectTime, connect.ConnectReason, connect.DisconnectReason, connect.PartyType, connect.PartyIDFlags, connect.PartyID, connect.PartyIDName, connect.PartyIDLastName, connect.CtrlPartyIDFlags, connect.CtrlPartyID, connect.CtrlPartyIDName, connect.CtrlPartyIDLastName, connect.MailboxID, connect.RelatedCallTableID, connect.TalkTimeSeconds AS TalkTime, TIME_TO_SEC(TIMEDIFF(connect.HoldTime,'1899-12-30 00:00:00')) AS HoldTime, TIME_TO_SEC(TIMEDIFF(connect.RingTime,'1899-12-30 00:00:00')) AS RingTime, TIME_TO_SEC(TIMEDIFF(connect.Duration,'1899-12-30 00:00:00')) AS ConnectDuration, connect.LongDistance AS ConnectLongDistance, connect.TrunkDirection, connect.SiteName, connect.ServerName, connect.ConfUserType, CAST(CONCAT(CAST(connect.ConfAdjConnectTime AS CHAR), '.', LPAD(CAST(connect.ConfAdjConnectTimeMS AS CHAR),3,'0')) AS DateTime) AS ConfAdjConnectTime, TIME_TO_SEC(TIMEDIFF(connect.ConfAdjConnectDuration,'1899-12-30 00:00:00')) AS ConfAdjConnectDuration, calls.ID AS ID, calls.CallID, calls.SIPCallId, CAST(CONCAT(CAST(calls.StartTime AS CHAR), '.', LPAD(CAST(calls.StartTimeMS AS CHAR),3,'0')) AS DateTime) AS StartTime, CAST(CONCAT(CAST(calls.EndTime AS CHAR), '.', LPAD(CAST(calls.EndTimeMS AS CHAR),3,'0')) AS DateTime) AS EndTime, TIME_TO_SEC(TIMEDIFF(calls.Duration,'1899-12-30 00:00:00')) AS CallDuration, calls.DialedNumber, calls.CallerID, calls.CallNote, calls.BillingCode, calls.FriendlyBillingCode, calls.Extension, calls.CallType, calls.WorkgroupCall, calls.LongDistance, calls.AOC, calls.User_i32, calls.User_i64, calls.User_char16, calls.User_timestamp, calls.User_string, calls.Archived, calls.ConfName, calls.ConfType, calls.ConfParticipantCode, calls.ConfLeaderCode, CAST(CONCAT(CAST(calls.ConfAdjStartTime AS CHAR), '.', LPAD(CAST(calls.ConfAdjStartTimeMS AS CHAR),3,'0')) AS DateTime) AS ConfAdjStartTime, TIME_TO_SEC(TIMEDIFF(calls.ConfAdjDuration,'1899-12-30 00:00:00')) AS ConfAdjDuration FROM `shorewarecdr`.`call` calls LEFT JOIN `shorewarecdr`.`connect` connect ON calls.ID = connect.CallTableID WHERE calls.ID > ? ORDER BY calls.ID ASC;


