[critical_data_smoke_test]
title = Check that we have shoretel_call data and it looks ok.
category = Data Indexing
tags = configuration, indexing
description = This checks the index that we have some data with sourcetype=shoretel_call in the index specified by custom_index macro.
failure_text=Either data is going into the wrong index, or the custom_index macro is set wrong.  Click for more details.
suggested_action = See the test results for more details.

search = `custom_index` sourcetype=shoretel_call | head 1000 \
| eval Extension=replace(Extension,"\+","") \
| eval extensionPassed=if(isint(Extension),1,0) \
| eval directionPassed=if(match(Direction,"outbound|inbound|internal|tandem"),1,0) \
| stats count sum(extensionPassed) as ext sum(directionPassed) as dir \
| eval severity_level=case(count==0,3,ext<1000 OR dir<1000,2,true(),"0") \
| eval metric=case(severity_level=="0", "You have data indexed with shoretel_call, its in the right place and it looks OK", severity_level=="2", "you have data indexed but there's something very strange about it",severity_level==3, "you dont seem to have any shoretel_call data indexed in the index specified by `custom_index`")



[critical_required_version_of_app_dependency]
title = Check whether any apps require a second app that is either absent, or that has too old a version installed.
category = Splunk Miscellaneous
tags = configuration, installation
description = This looks for apps whose app.conf files follow the Sideview convention of having a stanza called "dependency:app:SOMEAPP" with SOMEAPP being set to some specific app that is required.  Where that stanza also has =a key called "requiredVersion" set to the minimum required version of the second app needed by the main app.
failure_text=This app has the given app as a dependency and the version of that app installed is too old.
suggested_action = Either upgrade the other app to the given version or newer, or disable or uninstall this given app.

search = | rest splunk_server=local /servicesNS/-/-/configs/conf-app  | where match(title,"dependency:app") or isnotnull(version) \
| rename "eai:acl.app" as app \
| eval appWithDependency=if(match(title,"dependency.app:*"),app,null()) \
| eval app=case(match(title,"dependency.app:*"),replace(title,"dependency.app:",""),isnotnull(version),app) \
| eventstats last(version) as hasVersion by app \
| append  [| rest splunk_server=local /services/server/info  | rename serverName as instance_name | fields instance_name  ] \
| eventstats last(instance_name) as instance_name \
| search requiredVersion=* hasVersion=* \
| fields instance_name appWithDependency app requiredVersion hasVersion \
| eval has=split(hasVersion,".")  \
| eval req=split(requiredVersion,".") \
| eval req_weighted = 1000000000 * tonumber(mvindex(req,0)) + if(mvcount(req)>1,1000000 * tonumber(mvindex(req,1)),0) + if(mvcount(req)>2,1000 * tonumber(mvindex(req,2)),0)  + if(mvcount(req)>3,1 * tonumber(mvindex(req,3)),0) \
| eval has_weighted = 1000000000 * tonumber(mvindex(has,0)) + if(mvcount(has)>1,1000000 * tonumber(mvindex(has,1)),0) + if(mvcount(has)>2,1000 * tonumber(mvindex(has,2)),0)  + if(mvcount(has)>3,1 * tonumber(mvindex(has,3)),0) \
| eval metric=if(has_weighted<req_weighted, \
    "ERROR - " . appWithDependency + " app needs at least version " + requiredVersion + " of " + app + " installed.", \
    "OK - You do not need to download and install a newer version of " + app + ".") \
| eval severity_level=if(has_weighted<req_weighted,2,0) \
| fields instance_name metric severity_level appWithDependency app requiredVersion hasVersion


[info_required_splunk_version]
title = Check whether any apps require a newer version of Splunk.
category = Splunk Miscellaneous
tags = configuration, installation
description = This looks for apps whose app.conf files follow the Sideview convention of having a stanza called "dependency:splunk" with a key called "requiredVersion" set to the minimum required version of Splunk needed by that app. 
failure_text=This app requires a newer version of Splunk Enterprise.
suggested_action = Either upgrade Splunk to the given version or newer, or disable or uninstall the app.

search = | rest splunk_server=local /servicesNS/-/-/configs/conf-app | eval requiredSplunkVersion=if(match(title,"dependency:splunk"),requiredVersion,null()) \
| rename eai:acl.app as app \
| fields app title label requiredSplunkVersion version requiredVersion * \
| stats last(requiredSplunkVersion) as requiredSplunkVersion last(label) as label last(version) as version last(build) as build by app \
| append [ \
    |  rest splunk_server=local services/server/info | rename version as hasSplunkVersion serverName as instance_name | table hasSplunkVersion instance_name \
] \
| eventstats last(hasSplunkVersion) as hasSplunkVersion last(instance_name) as instance_name \
| search requiredSplunkVersion=* hasSplunkVersion=* \
| eval has=split(hasSplunkVersion,".") \
| eval req=split(requiredSplunkVersion,".") \
| eval req_weighted = 1000000000 * tonumber(mvindex(req,0)) + if(mvcount(req)>1,1000000 * tonumber(mvindex(req,1)),0) + if(mvcount(req)>2,1000 * tonumber(mvindex(req,2)),0)  + if(mvcount(req)>3,1 * tonumber(mvindex(req,3)),0) \
| eval has_weighted = 1000000000 * tonumber(mvindex(has,0)) + if(mvcount(has)>1,1000000 * tonumber(mvindex(has,1)),0) + if(mvcount(has)>2,1000 * tonumber(mvindex(has,2)),0)  + if(mvcount(has)>3,1 * tonumber(mvindex(has,3)),0) \
| eval metric=if(has_weighted<req_weighted,"WARNING - The " + app + " app requires at least version " + requiredSplunkVersion + " to work correctly.  Currently you are running Splunk " + hasSplunkVersion, \
    "OK - The version of Splunk Enterprise you are running is new enough for the app") \
| eval severity_level=if(has_weighted<req_weighted,2 ,0) \
| fields instance_name metric severity_level *

drilldown = | rest splunk_server=local /servicesNS/-/-/configs/conf-app | eval requiredSplunkVersion=if(match(title,"dependency:splunk"),requiredVersion,null()) \
| rename eai:acl.app as app | fields app title label requiredSplunkVersion version requiredVersion * \
| stats last(requiredSplunkVersion) as requiredSplunkVersion last(label) as label last(version) as version last(build) as build by app \
| append [ \
    |  rest splunk_server=local services/server/info | rename version as hasSplunkVersion serverName as instance_name | table hasSplunkVersion instance_name \
] \
| eventstats last(hasSplunkVersion) as hasSplunkVersion last(instance_name) as instance_name \
| search requiredSplunkVersion=* hasSplunkVersion=* \
| eval has=split(hasSplunkVersion,".") \
| eval req=split(requiredSplunkVersion,".") \
| eval req_weighted = 1000000000 * tonumber(mvindex(req,0)) + if(mvcount(req)>1,1000000 * tonumber(mvindex(req,1)),0) + if(mvcount(req)>2,1000 * tonumber(mvindex(req,2)),0)  + if(mvcount(req)>3,1 * tonumber(mvindex(req,3)),0) \
| eval has_weighted = 1000000000 * tonumber(mvindex(has,0)) + if(mvcount(has)>1,1000000 * tonumber(mvindex(has,1)),0) + if(mvcount(has)>2,1000 * tonumber(mvindex(has,2)),0)  + if(mvcount(has)>3,1 * tonumber(mvindex(has,3)),0) \
| eval metric=if(has_weighted<req_weighted,"WARNING - The " + app + " app requires at least version " + requiredSplunkVersion + " to work correctly.  Currently you are running Splunk " + hasSplunkVersion, \
    "OK - The version of Splunk Enterprise you are running is new enough for the app") \
| eval severity_level=if(has_weighted<req_weighted,2 ,0) \
| eval"App Version and Build" = app . ": " . version . " (build " . build . ")" | rename requiredSplunkVersion AS "Requires Splunk Version" | rename hasSplunkVersion AS "Has Splunk Version" \
| fields instance_name metric severity_level label "App Version and Build", "Requires Splunk Version", "Has Splunk Version"




[info_extensions_lookup_bad_sort_order]
title = Check whether the Extensions lookup lists its numbers/extensions in order of decreasing specificity.
category = Knowledge Objects
tags = configuration, lookups

description = The Extensions lookup is a lookup that supports wildcarded numbers, with the wildcards being a various locations in the number.  It will return only the first number in the csv that matches, meaning that since they might overlap they must be stored in order of decreasing number length.  This checks whether any numbers are in the wrong sort order in the file.
failure_text = The Extensions lookup contains some numbers that are not in decreasing number-length order. This will cause problems where larger catchall numbers will be associated with the number intstead of the more specific number.

search = | inputlookup extensions.csv \
| streamstats count as order \
| eval has_wildcard = if(match(number, "\*"), 1, 0) \
| eval number_len = len(number) \
| eval order = if(has_wildcard=1, (order) + tonumber((99 - 'number_len') . "000000"), order) \
| delta order AS orderdiff \
| search orderdiff < 0 \
| stats count \
| eval severity_level=if(count>0,3,0) \
| eval metric=if(count>0,"WARNING - The Extensions lookup is stored in the wrong sort order. Visit \"Setup > Set up the Extensions lookup\" in the Shoretel app","OK - The Extensions lookup is stored in the correct order") \
| eval instance_name="all"



[info_check_extensions_lookup_for_duplicates]
title = Check the extensions lookup for numbers with more than one row.
category = Knowledge Objects
tags = configuration
description = The extensions lookup has max_matches set to 1,  which means that if any given number has more than one matching row in the extensions.csv file, only the first one will be used.   This health check just makes sure there aren't other rows in the lookup being ignored. 
failure_text = There are numbers that have been entered on two or more rows in the extensions lookup.
suggested_action = Determine which of the rows is correct and delete the others from the lookup.

search = | inputlookup extensions | stats count by number | where count>1 \
| stats count \
| eval severity_level=if (count>0,2,0)  \
| eval metric=if (count>0, \
    "WARNING - There are numbers that have been entered on two or more rows in the extensions lookup", \
    "OK - The extensions lookup has no numbers entered on multiple rows." )  \
| eval instance_name="all"

drilldown= | inputlookup extensions | stats count by number | where count>1 | sort 0 - count | rename count as "number of matching rows in the extensions lookup"



[info_check_extensions_lookup_for_null_entries]
title = Check the extensions lookup for rows where the number field is empty.
category = Knowledge Objects
tags = configuration
description = For the extensions lookup to work each row has to have a number.  If any rows don't have a number they should simply be deleted.
failure_text = There are rows in the extensions lookup that have no number entered at all. 
suggested_action = remove all rows from the extensions lookup that have no number entered.

search = | inputlookup extensions | where isnull(number) OR number="" \
| stats count \
| eval severity_level=if (count>0,2,0)  \
| eval metric=if (count>0, \
    "WARNING - There are rows in the extensions lookup where no number has been entered at all", \
    "OK - All rows in the extensions lookup have numbers entered.")  \
| eval instance_name="all"

drilldown= | inputlookup extensions | where isnull(number) OR number="" 




[info_check_extensions_trimmed]
title = Check if extensions lookup has leading or trailing spaces.
category = Knowledge Objects
tags = configuration
description = This checks for the presence of leading or trailing spaces in the extensions lookup fields, the existence of which will cause all sorts of data anomalies and should be corrected.
failure_text = Leading or trailing spaces exist in some extensions lookup fields.  Launch the link to "run troubleshooting search" to find out which fields caused this.

search = | inputlookup extensions \
| eval namestripped = trim(name) \
| eval groupstripped = trim(group) \
| eval subgroupstripped = trim(subgroup) \
| where 'namestripped'!='name' OR 'groupstripped'!='group' OR 'subgroupstripped'!='subgroup' \
| stats count \
| eval severity_level = if(count>0, 2, 0) \
| eval metric = case(severity_level>0, "WARNING - There are leading or trailing spaces in " . count . " of the extensions lookup fields.", \
                     true(), "OK - There are no leading or trailing spaces in the extensions lookups fields.") \
| eval instance="all" \
| table instance, metric, severity_level

drilldown = | inputlookup extensions \
| eval namestripped = trim(name) \
| eval groupstripped = trim(group) \
| eval subgroupstripped = trim(subgroup) \
| eval metric = case('namestripped'!='name', "Leading or Trailing Space in Name '" . 'name' . "'", \
                     'groupstripped'!='group', "Leading or Trailing Space in Group '" . group . "'", \
                     'subgroupstripped'!='subgroup', "Leading or Trailing Space in Subgroup '" . subgroup . "'") \
| search metric = "Leading or Trailing Space*" | table name, group, subgroup, metric

