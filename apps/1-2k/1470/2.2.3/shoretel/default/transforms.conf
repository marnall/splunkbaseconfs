[shoretel-cdr-log-extractions]
REGEX = ^\s*(?<CallID>[^\s]+)?\s(?<date>[^\s]+)?\s(?<time>[^\s]+)?\s(?<Extension>[^\s]+)?(\s)+(?<Duration>[^\s]+)?\s(?<directionCode>[^\s]+)?\s(?<DialedNumber>[^\s]+)?\s+(?<CallerID>[^\s]+)?\s+(?<trunkMember>[^\s]+)?(\s)+(?<trunkGroup>[^\s]+)?(\s)+(?<BillingCode>[^\s]+)?

## TBD  packet loss and jitter extraction, from within message field
#(s:1, r:378, l:0),(j:0,u:0,o:0)
#
#Packets Sent - Denoted as s:
#Packets Received - Denoted as r:
#Packets lost - Denotes as l:
#Jitter - Denoted as j; or jitter:
#Underruns - Denoted as u: or underruns:
#Overruns - Denoted as o: or overruns:
#The statistics start at 0. Other than Packets Sent and Packets Received, the higher the number the poorer the network stability was during the time of the call. The G-MST stats can be found at the end of every call made, and provide the network statistics for that call. As an example, a completed call with a documented jitter reading of 500 would almost certainly exhibit poor audio quality.

