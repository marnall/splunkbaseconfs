# let's leave it alone? 
#EVAL-MSSIPCallId = SIPCallId

#mediastream and call - they are generally (always or almost always) different timestamp values.
# seems legit.  Let's keep him.  can we name him? 
# Un-re-commented out (in?) RDM after db changes.  Can keep if we approve.
#EVAL-MSStartTime = if(isnull(MSStartTime),StartTime,MSStartTime)

# call and connect. When mediastream exists,   it has LineId values.  They are always a subset of the lineId values in call,  and sometimes a one-for-one match with the values in call.
# seems legit.  Let's keep him.  can we name him? 
