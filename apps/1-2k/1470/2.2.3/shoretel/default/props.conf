# looks funny. We do this so we can then sum() it up in Browse calls to make the call_records field.
# This can ALSO be done on ingestion if we want, not sure which is better.
EVAL-mediastream_records=1

[shoretel_connect]
#EVAL-Duration = DisconnectTime - ConnectTime + (DisconnectTimeMS - ConnectTimeMS)/1000

[shoretel_queuecall]
LOOKUP-queuecallexitreason = queuecallexitreason ExitReason AS ExitReason OUTPUT Name AS ExitName, Description AS ExitDescription
LOOKUP-queuecalltargettype = queuecalltargettype TargetType AS TargetType OUTPUT Name AS TargetTypeName, Description AS TargetTypeDescription

# ### Review if this is still useful.
[shoretel_cdr]
TIME_FORMAT = %m/%d/%Y %H:%M:%S
TIME_PREFIX = ^\s?\d+\s
SHOULD_LINEMERGE = False
MAX_TIMESTAMP_LOOKAHEAD = 32
pulldown_type = true
REPORT-cdr = shoretel-cdr-log-extractions
MAX_DAYS_HENCE=100
MAX_DAYS_AGO=3000

LOOKUP-directionCode = call_directions CallType as CallType OUTPUT Direction

EVAL-DurationInMinutes = 60*tonumber(mvindex(split(CallDuration,":"),0)) + 60*tonumber(mvindex(split(CallDuration,":"),1)) + tonumber(mvindex(split(CallDuration,":"),2))
EVAL-DurationInSeconds = 3600*tonumber(mvindex(split(CallDuration,":"),0)) + 60*tonumber(mvindex(split(CallDuration,":"),1)) + tonumber(mvindex(split(CallDuration,":"),2))

# ### Review if this is still useful.
[shoretel_mobility]
SHOULD_LINEMERGE = False
INDEXED_EXTRACTIONS=csv 
TIME_FORMAT = %m/%d/%Y, %H:%M:%S,
MAX_TIMESTAMP_LOOKAHEAD = 400
BREAK_ONLY_BEFORE_DATE = False
pulldown_type = true

[source::...(/|\\)log(/|\\)splunk(/|\\)shoretel.log]
sourcetype = shoretel_log

[shoretel_log]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 25
NO_BINARY_CHECK = true
#Commented out until bug for "," in spec fixed.  Auto-timestamp does fine for now.
#TIME_FORMAT = %Y-%m-%d %H:%M%:S,%3N
TIME_PREFIX = ^
category = Custom
pulldown_type = true
ANNOTATE_PUNCT = false
ADD_EXTRA_TIME_FIELDS = false
EXTRACT-shoretel_log_format = ^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2},\d{3}\s+(?<loglevel>\w+)\s+(?<filename>[^:]*):\s*(?<linenumber>\d+)\s+-\s+(runid=)?(?<runid>\d+)\s+(?<message>.*)

# Re-extract Canary log's format so we'll have those available here without having to wedge an "export=system" into Canary. 
[canary_log]
EXTRACT-canary_log_format = ^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2},\d{3}\s+(?<loglevel>\w+)\s+(?<filename>[^:]*):\s*(?<linenumber>\d+)\s+-\s+(runid=)?((?<runid>\d+)\s+)?(?<message>.*)