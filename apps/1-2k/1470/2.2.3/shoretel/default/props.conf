[shoretel_call] 
#EVAL-Duration = if(isnull(EndTime) and isnull(EndTimeMS),0,strptime(EndTime,"%Y-%m-%d %H:%M:%S") - _time + (EndTimeMS /1000))
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
SHOULD_LINEMERGE = False
MAX_TIMESTAMP_LOOKAHEAD = 32
pulldown_type = true
MAX_DAYS_HENCE=100
MAX_DAYS_AGO=3000
LOOKUP-directionCode = call_directions CallType as CallType OUTPUT Direction 
LOOKUP-mainpartytype = partytype PartyType OUTPUT Name as PartyTypeName Description as PartyTypeDescription
LOOKUP-connectreason = connectreason ConnectReason OUTPUT Name AS ConnectName, Description AS ConnectDescription
LOOKUP-disconnectreason = disconnectreason DisconnectReason OUTPUT Name AS DisconnectName, Description AS DisconnectDescription
LOOKUP-partyidflags = partyidflag PartyIDFlags OUTPUT Name AS PartyIDFlagsName, Description AS PartyIDFlagsDescription

LOOKUP-groups-extension     = extensions number as Extension OUTPUT name as ExtensionName group as ExtensionGroup subgroup as ExtensionSubgroup 
LOOKUP-groups-dialednumber  = extensions number as DialedNumber OUTPUT name as DialedNumberName group as DialedNumberGroup subgroup as DialedNumberSubgroup 
LOOKUP-groups-callerid      = extensions number as CallerID OUTPUT name as CallerIDName group as CallerIDGroup subgroup as CallerIDSubgroup

EVAL-hour_of_day=strftime(_time,"%H")
EVAL-day_of_week=strftime(_time,"%a")
EVAL-day_of_year=strftime(_time,"%j")

# looks funny. We do this so we can then sum() it up in Browse calls to make the call_records field.
# This can ALSO be done on ingestion if we want, not sure which is better.
EVAL-call_records=1

[shoretel_mediastream]
#EVAL-Duration = null()
#EVAL-TotalPackets = A_TotalPackets + B_TotalPackets
#EVAL-LostPackets  = A_LostPackets  + B_LostPackets
#EVAL-SentPackets  = A_TotalPackets + B_TotalPackets - A_LostPackets - B_LostPackets
#EVAL-Underruns    = A_Underruns    + B_Underruns
#EVAL-Overruns     = A_Overruns     + B_Overruns
#EVAL-MaxJitter    = max(A_MaxJitter, B_MaxJitter)
# RDM These were no longer necessary as they were.  Made into one.
LOOKUP-partytype = partytype PartyType as MSPartyType OUTPUT Name as PartyTypeName Description as PartyTypeDescription
#LOOKUP-Bpartytype = partytype PartyType as B_PartyType OUTPUT Name as B_PartyTypeName Description as B_PartyTypeDescription

EVAL-hour_of_day=strftime(_time,"%H")
EVAL-day_of_week=strftime(_time,"%a")
EVAL-day_of_year=strftime(_time,"%j")

