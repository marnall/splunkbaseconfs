## DO NOT DELETE THIS, EVEN IF YOU ARE DEPLOYING TO A SEARCH HEAD CLUSTER
## this is not a real input in that it will never input any data to any 
## index.  Instead this python scripts performs important first-time-run 
## and migration tasks when the app is first installed, and when it is 
## updated to a newer version.

[script://$SPLUNK_HOME/etc/apps/shoretel/bin/app_setup/shoretel_app_setup.py] 
# this interval tells Splunk to run this once at each restart.
interval = -1
passAuth = splunk-system-user
python.version = python3

# This one on the other hand, does ingest a tiny amount of data for debugging purposes.
# (On the order of a couple of dozen short log lines per restart).
#[monitor://$SPLUNK_HOME/var/log/splunk/shoretel.log]
#index = shoretel
#sourcetype = shoretel_log

