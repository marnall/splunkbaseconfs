

[search]
display.events.fields = ["Extension","DialedNumber","CallerID","Direction","CallDuration","ConnectName","DisconnectName","PortName"]

## NOTE - this is special functionality used by the Sideview App UI ONLY,   whereby a local admin on the deployment can change 
## this stanza in etc/apps/shoretel/local/ui-prefs.conf   so as to override the field list that gets set when all end-users click 
## "reset to default" in the Browse Calls page's Field Picker.
[browse]
display.results.fields = Extension DialedNumber CallerID Direction CallDuration ConnectName DisconnectName PortName


[call_detail]
display.results.fields = Extension DialedNumber CallerID Direction CallDuration ConnectName DisconnectName PortName