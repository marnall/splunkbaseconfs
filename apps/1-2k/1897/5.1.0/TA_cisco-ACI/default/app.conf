[package]
id = TA_cisco-ACI

[install]
is_configured = 0
build = 14

[ui]
is_visible = 0
label = Cisco ACI Add-on for Splunk Enterprise
setup_view = aci_setup

[launcher]
author = Cisco Systems
description = This add-on collects data from APIC (Application Policy Infrastructure Controller) and MSO (Multi-Site Orchestrator) to be used by the Cisco ACI App for Splunk Enterprise
version = 5.1.0

[triggers]
reload.cisco_aci_server_setup = simple
reload.app_setup = simple
reload.eventgen = simple
