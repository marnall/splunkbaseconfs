########################
#
# Summary Indexing
#
########################

[SI - Fortios5 - Traffic - DataCube]
action.summary_index = 1
action.summary_index.DataCube = fortios5_traffic
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m@m
displayview = flashtimeline
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_view = flashtimeline
search = `fortios5_traffic` | fillnull device_name vdom source_interface source_ip user group destination_interface destination_ip session_type destination_port application service action policy_id bytes_sent bytes_received destination_country | fields  device_name vdom source_interface source_ip user group destination_interface destination_ip session_type destination_port application service action policy_id bytes_sent bytes_received destination_country | untable _time field value | stats count by field value

