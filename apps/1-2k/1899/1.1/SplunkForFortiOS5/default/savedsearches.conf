########################
#
# TRAFFIC Reports
#
########################


[Fortios5 - Traffic - Top services]
dispatch.earliest_time = -4h
dispatch.latest_time = +0s
is_visible = true
search = `fortios5_traffic` | stats count by service | sort -count

[Fortios5 - Traffic - Top destnation IP]
dispatch.earliest_time = -4h
dispatch.latest_time = +0s
is_visible = true
search = `fortios5_traffic` | stats count by destination_ip | sort -count

[Fortios5 - Traffic - Top source IP]
dispatch.earliest_time = -4h
dispatch.latest_time = +0s
is_visible = true
search = `fortios5_traffic` | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes_transfered by source_ip | sort -MBytes_transfered 

[Fortios5 - Traffic - Top source user]
dispatch.earliest_time = -4h
dispatch.latest_time = +0s
is_visible = true
search = `fortios5_traffic` | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes_transfered by user | sort -MBytes_transfered 

