#

[fortios5_virus]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=virus )
FORMAT = sourcetype::fortios5_virus

[fortios5_app-ctrl]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=app-ctrl )
FORMAT = sourcetype::fortios5_app-ctrl

[fortios5_webfilter]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=webfilter )
FORMAT = sourcetype::fortios5_webfilter

[fortios5_traffic]
DEST_KEY = MetaData:Sourcetype
REGEX = ( type=traffic )
FORMAT = sourcetype::fortios5_traffic

[fortios5_event_auth_captive_portal]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=user.*action=authentication )
FORMAT = sourcetype::fortios5_event_auth_captive_portal

[fortios5_event_auth_FSSO]
DEST_KEY = MetaData:Sourcetype
REGEX = ( type=event subtype=user.*action=FSSO-* )
FORMAT = sourcetype::fortios5_event_auth_FSSO

[fortios5_event_pattern]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=pattern )
FORMAT = sourcetype::fortios5_event_pattern

[fortios5_event_dhcp]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=router.*dhcp_msg=*.* )
FORMAT = sourcetype::fortios5_event_dhcp

[fortios5_event_his_performance]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=system.*action=\"perf-stats\" )
FORMAT = sourcetype::fortios5_event_his_performance

[fortios5_event_wireless]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=wireless )
FORMAT = sourcetype::fortios5_event_wireless

[fortios5_sslvpn]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=vpn.*tunneltype=*.* )
FORMAT = sourcetype::fortios5_sslvpn

[fortios5_ips]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=ips )
FORMAT = sourcetype::fortios5_ips

[fortios5_netscan]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=netscan )
FORMAT = sourcetype::fortios5_netscan

[fortios5_event_config]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=system.*cfg*.* )
FORMAT = sourcetype::fortios5_event_config

[fortios5_event_ipsec]
DEST_KEY = MetaData:Sourcetype
REGEX = ( subtype=vpn.*vpntunnel=*.* )
FORMAT = sourcetype::fortios5_event_ipsec

