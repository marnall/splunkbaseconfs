########################
#
# DataCube Macros
#
########################

[Fortios5-Virus-DataCube]
definition =`fortios5_virus` | bin _time span=5m | fillnull device_name vdom source_ip user destination_ip priority malware dtype subtype service file profile url policyid |stats count by device_name vdom source_ip user destination_ip priority malware dtype subtype service file profile url policyid _time


[Fortios5-IPS-DataCube]
definition =`fortios5_ips` | bin _time span=5m | fillnull device_name vdom source_ip user group destination_ip severity description action subtype service sensor policyid |stats count by device_name vdom source_ip user group destination_ip severity description action subtype service sensor policyid _time

[Fortios5-App-ctrl-DataCube]
definition = `fortios5_app-ctrl` | bin _time span=5m | fillnull device_name vdom source_ip destination_ip source_interface destination_interface user group app_type application destination_port session_type action application_list policyid category_and_application |stats count by device_name vdom source_ip destination_ip source_interface destination_interface user group app_type application destination_port session_type action application_list policyid category_and_application _time

[Fortios5-Traffic-DataCube]
definition = `fortios5_traffic` | fillnull device_name vdom source_interface source_ip user group destination_interface destination_ip session_type destination_port application service action policy_id bytes_sent bytes_received destination_country | stats count by device_name vdom source_interface source_ip user group destination_interface destination_ip session_type destination_port application service action policy_id bytes_sent bytes_received destination_country _time

[Fortios5-Webfilter-DataCube]
definition =`fortios5_webfilter` | bin _time span=5m | fillnull device_name vdom source_ip destination_ip source_interface destination_interface site service categorization user group status profile policyid bytes_sent bytes_received | stats count by device_name vdom source_ip destination_ip source_interface destination_interface site service categorization user group status profile policyid bytes_sent bytes_received _time

[Fortios5-Event-DHCP-DataCube]
definition =`fortios5_event_dhcp` | bin _time span=5m | fillnull device_name vdom client_hostname mac_address client_ip dhcp_message direction message | stats count by device_name vdom client_hostname mac_address client_ip dhcp_message direction message _time

[Fortios5-Event-Auth-Captive-Portal-DataCube]
definition =`fortios5_event_auth_captive_portal` | bin _time span=5m | fillnull device_name vdom user group source_ip policy_id status message | stats count by  device_name vdom user group source_ip policy_id status message _time

[Fortios5-Event-Pattern-DataCube]
definition =`fortios5_event_pattern` | bin _time span=5m | fillnull device_name date time vdom priority status message | eval split_1=split(message,")") | eval split_avdb=mvindex(split_1,-5) | eval split_ipsdb=mvindex(split_1,-4) | eval split_aven=mvindex(split_1,-3) | eval split_ipsen=mvindex(split_1,-2) | eval avdb=split(split_avdb,"(") | eval antivirus_db=mvindex(avdb,-1) |  eval ipsdb=split(split_ipsdb,"(") | eval ips_db=mvindex(ipsdb,-1) |  eval aven=split(split_aven,"(") | eval antivirus_engine=mvindex(aven,-1) |  eval ipsen=split(split_ipsen,"(") | eval ips_engine=mvindex(ipsen,-1) | stats count by device_name vdom priority status antivirus_db ips_db antivirus_engine ips_engine _time

[Fortios5-Event-His-Performance-DataCube]
definition =`fortios5_event_his_performance` | bin _time span=5m | fillnull device_name vdom cpu memory simultaneous_sessions  message | stats count by  device_name vdom cpu memory simultaneous_sessions  message _time

[Fortios5-Sslvpn-DataCube]
definition =`fortios5_sslvpn` | bin _time span=5m | fillnull device_name vdom tunnel_type tunnel_id source_ip tunnel_ip user group dst_host reason duration bytes_sent bytes_received message ssl_subtype action | stats count by device_name vdom tunnel_type tunnel_id source_ip tunnel_ip user group dst_host reason duration  bytes_sent bytes_received message ssl_subtype _time action

[Fortios5-Sslvpn-Portal-Tunnel-Traffic-DataCube]
definition = `fortios5_traffic` | bin _time span=5m | fillnull device_name vdom source_interface source_ip user group destination_interface destination_ip session_type destination_port service action policy_id bytes_sent bytes_received destination_country vpn_type | stats count by device_name vdom source_interface source_ip user group destination_interface destination_ip session_type destination_port service action policy_id bytes_sent bytes_received destination_country vpn_type _time


########################
#
# PostProcess Macros
#
########################

[Fortios5-Traffic-DataCube-Bytes-Transfered-Over-Time]
definition = search action!=deny | eval total_megabytes_received=(bytes_received/(1024*1024)) | eval total_megabytes_sent=(bytes_sent/(1024*1024)) | timechart span=5m sum(total_megabytes_received) as MB_Received sum(total_megabytes_sent) as MB_Sent by device_name usenull=f

[Fortios5-Traffic-DataCube-App-Bytes]
definition = search application!=0 action!=deny | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes by application

[Fortios5-Traffic-DataCube-App-Request]
definition = search application!=0 action!=deny | stats count by application

[Fortios5-Traffic-DataCube-Top-Src-IP-Bytes]
definition = search source_ip!=0 action!=deny | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes by source_ip

[Fortios5-Traffic-DataCube-Top-Src-IP]
definition = search source_ip!=0 action!=deny | stats count by source_ip

[Fortios5-Traffic-DataCube-Top-Dst-Port]
definition = search destination_port!=0 action!=deny | stats count by destination_port

[Fortios5-Traffic-DataCube-Top-Dst-IP-Bytes]
definition = search destination_ip!=0 action!=deny | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes by destination_ip

[Fortios5-Traffic-DataCube-Top-Dst-IP]
definition = search destination_ip!=0 action!=deny | stats count by destination_ip

[Fortios5-Traffic-DataCube-Top-User-Bytes]
definition = search user!=0 action!=deny | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes by user

[Fortios5-Traffic-DataCube-Top-Src-User]
definition = search user!=0 action!=deny | stats count by user

[Fortios5-Traffic-DataCube-Top-Device]
definition = search source_ip!=0 action!=deny | eval device_vdom=device_name.":".vdom| eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes by device_vdom

[Fortios5-Traffic-DataCube-Top-Device_2]
definition = search source_ip!=0 action!=deny | eval device_vdom=device_name.":".vdom | eval total_megabytes_received=(bytes_received/(1024*1024)) | eval total_megabytes_sent=(bytes_sent/(1024*1024)) | stats  sum(total_megabytes_received) sum(total_megabytes_sent) as MBytes_sent sum(total_megabytes_received) as MBytes_received by device_vdom

[Fortios5-Traffic-DataCube-Top-Country-Bytes]
definition = search destination_country!=0 action!=deny | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes by destination_country

[Fortios5-Traffic-DataCube-Outbound-Bytes]
definition =  search application!=0 action!=deny | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | eval devname_dst_interface=device_name.":".vdom.":".destination_interface | stats sum(mbytes_transfered) as MBytes by devname_dst_interface | sort -MBytes

[Fortios5-Traffic-DataCube-Inbound-Bytes]
definition =  search application!=0 action!=deny | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | eval devname_src_interface=device_name.":".vdom.":".source_interface | stats sum(mbytes_transfered) as MBytes by devname_src_interface | sort -MBytes

[Fortios5-Traffic-DataCube-Liste-Dst-Port-Bytes]
definition =  search destination_port!=0 action!=deny | replace "1" with "ICMP", "6" with "TCP", "17" with "UDP" in session_type | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes by service, session_type,destination_port | sort -MBytes

[Fortios5-Traffic-DataCube-Liste-User-Bytes]
definition = search user!=0 action!=deny | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes by user,source_ip | sort -MBytes

[Fortios5-Traffic-DataCube-Liste-Src-IP-Byte]
definition = search source_ip!=0 action!=deny | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes by source_ip,user | sort -MBytes

[Fortios5-Traffic-DataCube-Liste-Dst-IP-Byte]
definition = search destination_ip!=0 action!=deny | replace "1" with "ICMP", "6" with "TCP", "17" with "UDP" in session_type | eval mbytes_transfered=((bytes_received+bytes_sent)/(1024*1024)) | stats sum(mbytes_transfered) as MBytes by destination_ip, destination_country, session_type, destination_port | sort -MBytes

############################# Traffic denied #####################################

[Fortios5-Traffic-DataCube-Deny-Over-Time]
definition = search action=deny | timechart count by action usenull=f

[Fortios5-Traffic-DataCube-Deny-Top-Src-IP]
definition = search source_ip!=0 action=deny | stats count by source_ip

[Fortios5-Traffic-DataCube-Deny-Top-Src-User]
definition = search user!=0 action=deny | stats count by user

[Fortios5-Traffic-DataCube-Deny-Top-User-Group]
definition = search group!=0 action=deny | stats count by group

[Fortios5-Traffic-DataCube-Deny-Device]
definition = search device_name!=0 action=deny |  eval devname_vdom=device_name.":".vdom | stats count by devname_vdom

[Fortios5-Traffic-DataCube-Deny-Device-Policy]
definition =  search device_name!=0 action=deny | eval devname_vdom_policy_id=device_name.":".vdom.":policy_id ".policy_id | stats count by devname_vdom_policy_id

[Fortios5-Traffic-DataCube-Deny-Top-Dst-IP]
definition = search destination_ip!=0 action=deny | stats count by destination_ip

[Fortios5-Traffic-DataCube-Deny-Top-Country]
definition = search destination_country!=0 action=deny | stats count by destination_country

[Fortios5-Traffic-DataCube-Deny-Top-Dst-Port]
definition = search destination_port!=0 action=deny | replace "1" with "ICMP", "6" with "TCP", "17" with "UDP" in session_type | eval full_dst_port=session_type."_".destination_port | stats count by full_dst_port

[Fortios5-Traffic-DataCube-Deny-Activity]
definition = search destination_ip!=0 action=deny | replace "1" with "ICMP", "6" with "TCP", "17" with "UDP" in session_type | stats count by _time, device_name, vdom, source_ip, user, group, destination_ip, destination_country, session_type, destination_port, application, policy_id, action | sort -_time

