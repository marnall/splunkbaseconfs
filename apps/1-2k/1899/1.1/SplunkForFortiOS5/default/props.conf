[fortios5]
TRANSFORMS-sourcetype_fortios5 = fortios5_virus, fortios5_ips, fortios5_app-ctrl, fortios5_webfilter, fortios5_traffic, fortios5_sslvpn, fortios5_event_wireless, fortios5_netscan, fortios5_event_auth_captive_portal, fortios5_event_auth_FSSO, fortios5_event_dhcp, fortios5_event_pattern, fortios5_event_his_performance, fortios5_event_config, fortios5_event_ipsec, fortios5_event_system, fortios5_event_dns, fortios5_event
SHOULD_LINEMERGE = false


[fortios5_virus]
#REPORT-search = extract_virusv5
SHOULD_LINEMERGE = false
FIELDALIAS-srcip = srcip AS source_ip
FIELDALIAS-dstip = dstip AS destination_ip
FIELDALIAS-devname = devname AS device_name
FIELDALIAS-cluster_id = clusterid AS device_name
FIELDALIAS-pri = level AS priority
FIELDALIAS-status = status AS action
FIELDALIAS-vd = vd AS vdom
FIELDALIAS-dst_port = dstport AS destination_port
FIELDALIAS-src_int = srcintf AS source_interface
FIELDALIAS-dst_int = dstintf AS dst_interface
FIELDALIAS-msg = msg AS description
FIELDALIAS-virus= virus AS malware


[fortios5_ips]
#REPORT-search = extract_ipsv5
SHOULD_LINEMERGE = false
FIELDALIAS-srcip = srcip AS source_ip
FIELDALIAS-dstip = dstip AS destination_ip
FIELDALIAS-devname = devname AS device_name
FIELDALIAS-cluster_id = clusterid AS device_name
FIELDALIAS-pri = level AS priority
FIELDALIAS-status = status AS action
FIELDALIAS-vd = vd AS vdom
FIELDALIAS-dst_port = dstport AS destination_port
FIELDALIAS-src_int = srcint AS source_interface
FIELDALIAS-dst_int = dstint AS destination_interface
FIELDALIAS-msg = msg AS description

