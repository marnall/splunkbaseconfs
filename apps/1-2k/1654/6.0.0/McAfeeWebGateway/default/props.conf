  isnotnull(dest_port) AND isnotnull(uri_path), coalesce(url_protocol,"-") . "://" . coalesce(dest,"-") . ":" . dest_port . uri_path,\
  isnotnull(dest_port),                         coalesce(url_protocol,"-") . "://" . coalesce(dest,"-") . ":" . dest_port,\
  isnotnull(uri_path),                          coalesce(url_protocol,"-") . "://" . coalesce(dest,"-") . uri_path,\
  1=1,                                          coalesce(url_protocol,"-") . "://" . coalesce(dest,"-") )

