EXTRACT-3_url_parts = ^(?<url_protocol>[^:]{1,10})://(?<dest>[^:]+):(?<dest_port>\d+)(?<uri_path>/[^\?]*)(?<uri_query>\??.*) IN url
EXTRACT-4_url_parts = ^(?<url_protocol>[^:]{1,10})://(?<dest>[^/]+)(?<uri_path>/[^\?]*)(?<uri_query>\??.*) IN url
