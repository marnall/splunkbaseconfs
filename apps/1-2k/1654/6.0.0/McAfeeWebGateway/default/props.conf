  (url_protocol="https" AND dest_port=443) OR (url_protocol="http" AND dest_port=80) OR (url_protocol="wss" AND dest_port=443) OR (url_protocol="ws" AND dest_port=80) OR (url_protocol="ftp" AND dest_port=21) OR (url_protocol="icap" AND dest_port=1344),\
