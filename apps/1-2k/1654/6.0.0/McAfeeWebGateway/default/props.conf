# McAfeeWebGateway App Version 6.0.0
[mcafee:webgateway:custom]
TIME_PREFIX=^
MAX_TIMESTAMP_LOOKAHEAD=27
SHOULD_LINEMERGE=false
LINE_BREAKER  =([\r\n]+)
EVENT_BREAKER =([\r\n]+)
EVENT_BREAKER_ENABLE = true
TRUNCATE=999999

# segmenters.conf
# 
# SEGMENTATION = indexing_without_double_dash



# new format v5
# s=200 ac=allowed src=192.168.2.n p=https m=CERTVERIFY d=swp.thedrive.com dp=443 bo=1194 bin=5765 dur=441 rt=0
EXTRACT-status=\ss=(?<status>\d+)
EXTRACT-action=\sac=(?<action>allowed|blocked|auth|error)
EXTRACT-src=\ssrc=(?<src>\S{7,64})
EXTRACT-url_protocol=\sp=(?<url_protocol>[a-z]{2,6})
EXTRACT-http_method=\sm=(?<http_method>[A-Z]{3,15})
EXTRACT-d=\sd=(?<dest>\S+)
EXTRACT-dest_port=\sdp=(?<dest_port>\d+)
EXTRACT-bytes_out=\sbo=(?<bytes_out>\d+)
EXTRACT-bytes_in=\sbi=(?<bytes_in>\d+)
EXTRACT-duration=\sdur=(?<duration>\d+)
EXTRACT-response_time=\srt=(?<response_time>\d+)



# extraction for monitoring
EXTRACT-monitoring_string = reporting\.test \d+ \d+/\d+ \d+/\d+ up="/(?<monitoring_string_properties>[^"]+)___(?<monitoring_string_counters>[^"]+)"
EXTRACT-monitoring_string_new = d=reporting\.test\s([\w=\s]+)?up="/(?<monitoring_string_properties>[^"]+)___(?<monitoring_string_counters>[^"]+)"
REPORT-parse_monitoring = parse_monitoring_string_properties,parse_monitoring_string_counters

# if Header.Request.GetAll / Header.Response.GetAll are enabled:
REPORT-extract_headers = extract_request_headers, extract_response_headers

# TIME_FORMAT
# there are several time formats to choose, don't set it here if not sure
# Setup is in MWG > Policy > Log Handler > Splunk > Set Timestamp
# DateTime.ToISOString (2010-03-22 11:45:12) TIME_FORMAT=%Y-%m-%d %H:%M:%S
# DateTime.ToISOString with Milliseconds (2010-03-22 11:45:12.123) TIME_FORMAT=%Y-%m-%d %H:%M:%S.%3N
# DateTime.ToISOString with Milliseconds and timezone (2010-03-22 11:45:12.123 -0600) TIME_FORMAT=%Y-%m-%d %H:%M:%S.%3N %z
# DateTime.ToISOString and timezone (2010-03-22 11:45:12 -0600) TIME_FORMAT=%Y-%m-%d %H:%M:%S %z
TIME_FORMAT=%Y-%m-%d %H:%M:%S %z
# DateTime.ToGMTString (Mon, 22 March 2010 11:45:36 GMT) TIME_FORMAT=%a, %d %B %Y %H:%M:%S %Z
# DateTime.ToISO8601String (2016-01-26T11:45:36.695Z) - can produce inconsistent results, don't use it
# DateTime.ToNumber (Unix epoch time - 1512915182) TIME_FORMAT=%s
# DateTime.ToWebReporterString ([29/Oct/2010:14:28:15 +0000]) TIME_FORMAT=%d/%b/%Y:%H:%M:%S %z , TIME_PREFIX=\[
# DateTime.Date.ToString ("%hh:%mm:%ss") TIME_FORMAT=%H:%M:%S

KV_MODE = none
ANNOTATE_PUNCT = false
category = Network & Security
description = Output produced by the McAfee Web Gateway (MWG)
pulldown_type = 1
disabled = false

# 15.Dec.2023 added a transform to delete "mwg: " that remains after SC4S
TRANSFORMS-0_delete_syslog_prefix = 0_delete_syslog_prefix, 1_delete_syslog_prefix

TRANSFORMS-rewrite_host_from_host_field = rewrite_host_from_host_field

# Double-dash ("--") problem: Splunk's default segmenter treats "--" as a major breaker,
# so TERM(d=some--website.example.com) fails. This indexed field flags events where
# destination contains "--", enabling fast searches without TERM().
#
# Note: index-time transform - only applies to newly ingested data after enabling.
# Requires Splunk restart (or deployment server reload).
# For a proper long-term fix, consider custom segmenter (see SEGMENTATION comment above).
#
# Usage (after enabling):
#   index=proxy sourcetype=mcafee:webgateway:custom ddash=1
#   index=proxy sourcetype=mcafee:webgateway:custom ddash=1 | search dest="*some--website*"
#
# To enable: remove the '#' from the TRANSFORMS line below
#TRANSFORMS-ddash = flag_double_dash_dest

# MWG sends other system events along with proxy events via deamon.info. Fiter out anything that doesn't look like a timestamp:
# THIS IS A DANGEROUS OPTION THAT CAN LEAD TO THE DATA LOSS
#TRANSFORMS-0_delete_non_mwg_events_sent_via_syslog = delete_non_mwg_events_sent_via_syslog

# 2021-02-18 22:26:22.615 +0100 204 allow 192.168.2.nnn https GET eu-tlp02.kameleoon.com 443 674/142 77/25 
#EXTRACT-a_fixed_format=^\d\d\d\d-\d\d\-\d\d \d\d:\d\d:\d\d[\d\. \+\-]* (?<status>\d+) (?<action>[a-z]+) (?<src>[a-f\d\.:%]+) (?<url_protocol>\w+) (?<http_method>\w+) (?<dest>[\w\-\.]+) (?<dest_port>\d+) (?<bytes_out>\d+)/(?<bytes_in>\d+) (?<duration>\d+)/(?<response_time>\d+)
# modified 15.03.2021 to accept more than 2 spaces in between and allow domain names with not ascii characters (i.e. umlauts): from '(?<dest>[\w\-\.]+)' to '(?<dest>[^\s]+)\s+'
EXTRACT-a_fixed_format=^\d\d\d\d-\d\d\-\d\d\s+\d\d:\d\d:\d\d[\d\. \+\-]*\s+(?<status>\d+)\s+(?<action>[a-z]+)\s+(?<src>[a-f\d\.:%]+)\s+(?<url_protocol>\w+)\s+(?<http_method>\w+)\s+(?<dest>[^\s]+)\s+(?<dest_port>\d+)\s+(?<bytes_out>\d+)/(?<bytes_in>\d+)\s+(?<duration>\d+)/(?<response_time>\d+)


