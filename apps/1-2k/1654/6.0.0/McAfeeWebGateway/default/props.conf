EVAL-url = uri_scheme . "://" . requested_host . requested_path
EVAL-url_length = length( uri_scheme . "://" . requested_host . requested_path )
EVAL-action = CASE ( result = "DENIED", "blocked", result = "OBSERVED", "allowed" )
EVAL-categories = split ( category, ", ")
EVAL-bytes = bytes_in + bytes_out
EVAL-http_user_agent_length = length(user_agent_comment)
EVAL-vendor_product = SkyHigh_WebGateway

[mcafee:webgateway:mwg-errors]
# several types:
# Log name	         Log type	        Comment
# mwg-core	         text, single line	mwg-core logging
# mwg-coordinator	 text, single line	mwg-coordinator logging
# mwg-ui	         text, multi line	mwg-ui Tomcat logging
# mwg-logmanager	 text, single line	mwg-logmanager logging
# mwg-uideserialization	 text, single line	mwg-ui deserialization logging
# mwg-sysconfd	         text, single line	mwg-sysconfd logging
# mwg-monitor	         text, single line	mwg-monitor logging
# mwg-saas-connector	 text, single line	mwg-saas connector logging
# *.bin	binary	cannot be parsed. Can be excluded, but the presence of such logs is also a good hint about potential issues.

# TODO: double check the time format, create several sourcetypes or handle all of them in a single sourcetype?

EXTRACT-log_source = mwg-errors/(?<log_source>[a-z-]+) IN source
EXTRACT-component_function = ^\[[^\]]+\] \[(?<component>[^\]]+)\] \[(?<function>[^\]]+)\]
EXTRACT-trailing_function = \[(?<trailing_function>[^\]]+)\]$
EXTRACT-KB_article = \W(?<KB_article_ID>KB\d\d\d\d\d)\D

# backward compatibility for v5.0.9 underscore variant
[mcafee:webgateway:mwg_errors]
EXTRACT-log_source = mwg-errors/(?<log_source>[a-z-]+) IN source
EXTRACT-component_function = ^\[[^\]]+\] \[(?<component>[^\]]+)\] \[(?<function>[^\]]+)\]
EXTRACT-trailing_function = \[(?<trailing_function>[^\]]+)\]$
EXTRACT-KB_article = \W(?<KB_article_ID>KB\d\d\d\d\d)\D
