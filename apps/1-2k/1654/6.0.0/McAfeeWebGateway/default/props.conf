FIELDALIAS-requested_host = requested_host AS dest
FIELDALIAS-requested_path = requested_path AS uri_path
FIELDALIAS-server_to_client_bytes = server_to_client_bytes AS bytes_in
FIELDALIAS-client_to_server_bytes = client_to_server_bytes AS bytes_out
FIELDALIAS-uri_scheme = uri_scheme AS url_protocol
FIELDALIAS-user_agent_comment = user_agent_comment AS http_user_agent
FIELDALIAS-virus = virus AS malware
FIELDALIAS-destination_port = destination_port AS dest_port
FIELDALIAS-destination_ip = destination_ip AS dest_ip
FIELDALIAS-username = username AS user
FIELDALIAS-application_type = application_type AS app


