# McAfeeWebGateway App Version 6.0.0
[index_and_sourcetype]
definition = sourcetype="mcafee:webgateway:custom" OR sourcetype="mcafee:webgateway:default" OR sourcetype=MWGaccess3 OR sourcetype=mcafee:webgateway:wgcs_v5 OR sourcetype="mcafee:webgateway:minimal" OR sourcetype="skyhigh:webgateway:csv"

[mcafee_webgateway_audit_index_and_sourcetype]
definition = sourcetype="mcafee:webgateway:audit"

[format_bytes(1)]
definition = if($bytes$>1073741824, tostring(round($bytes$/1073741824,2))+" GB", if($bytes$>1048576, tostring(round($bytes$/1048576,2))+" MB", if($bytes$>1024, tostring(round($bytes$/1024))+" KB", tostring($bytes$)+" Bytes")))
args = bytes

[mcafee_webgateway_excluded_headers]
definition = search NOT Header IN ("HeaderToExclude1", "HeaderToExclude2") 

[mcafee_webgateway_headers_view_excluded_connections]
definition = ( )

[skyhigh_index_and_sourcetype_prefix]
definition = sourcetype="mcafee:webgateway:custom"

[index_and_sourcetype_mwg_errors]
definition = sourcetype="mcafee:webgateway:mwg-errors" OR sourcetype="mcafee:webgateway:mwg_errors"

[index_and_sourcetype_linux_messages]
definition = sourcetype="linux_messages_syslog"

[index_and_sourcetype_linux_secure]
definition = sourcetype="linux_secure"
