[tor_consensus]
BREAK_ONLY_BEFORE=^r|^d
SHOULD_LINEMERGE=true
NO_BINARY_CHECK = 1
pulldown_type = 1
EXTRACT-or_name-or_pub-publish_date-publish_time-or_ip-or_port-ds_port = ^r (?P<or_name>[\w]+) (?P<or_pub>[\S]+) (?P<publish_date>[\d-]+) (?P<publish_time>[\d:]+) (?P<or_ip>[\d\.]+) (?P<or_port>[\d]+) (?P<ds_port>[\d]+)
EXTRACT-tor_version = (?i)v Tor (?P<tor_version>.+)
