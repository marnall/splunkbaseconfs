[Dragos WorldView API Connectivity Error]
alert.expires = 3d
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = This alert can be used to monitor for issues connecting to the Dragos WorldView API to download IOCs
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = dragos_threat_intelligence
request.ui_dispatch_view = search
search = | inputlookup dragos_ingest_status | where successful!=1

[Dragos Modular Input Runtime Issue]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = This alert gets fired when the Dragos Modular Input has not been run in several minutes. If you have disabled or deleted the input then you can ignore this alert. However if this is not the case please examine the log to determine what the issue is.
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = dragos_threat_intelligence
request.ui_dispatch_view = search
search = | inputlookup dragos_ingest_status |  eval last_modinput_run_time_unix_timestamp=if(isnull(last_modinput_run_time), 0, if(last_modinput_run_time == "1970-01-01T00:00:00Z", 0, strptime(last_modinput_run_time,"%FT%T%Z"))) | eval seconds_since_modinput_run=(now() - last_modinput_run_time_unix_timestamp) | eval message="Warning! The Dragos IOC Modular Input has not been run in over 2 hours. If the input has not been intentionally disabled or deleted please check the logs to determine why the input stopped" | where seconds_since_modinput_run > 7200

