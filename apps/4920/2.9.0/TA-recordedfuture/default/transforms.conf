[checkpoints]
external_type = kvstore
collection = TA_recordedfuture_checkpointer
case_sensitive_match = true
fields_list = updated, history, _key, name

[incident_state]
# The state of incidents, Sigma and Correlations
external_type = kvstore
collection = TA_recordedfuture_incident_state
case_sensitive_match = true
fields_list = _key, state, note, assignee

[risklist_domain]
external_type = kvstore
collection = TA_recordedfuture_risklist_domain
fields_list = Name,Risk,RuleCount,RuleTotal,EvidenceDetails,risklist,Mitre,_key,_time
time_field = _time

