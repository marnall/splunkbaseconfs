collection = TA_recordedfuture_playbook_alert
fields_list = _key,_time,risk_score,criticality_number,criticality_string,playbook_alert_id,created,updated,status,category,priority,title,owner_id,owner_name,organisation_id,organisation_name,assignee_name,assignee_id,reopen,local_note

