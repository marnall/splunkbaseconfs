# KSCONF-NO-SORT

[command:jmespath]
SHOULD_LINEMERGE = true
TIME_FORMAT = %Y-%m-%d %H:%M:%S,%3N
TIME_PREFIX = ^

[command:jsonformat]
SHOULD_LINEMERGE = true
TIME_FORMAT = %Y-%m-%d %H:%M:%S,%3N
TIME_PREFIX = ^

[source::...[/\\]var[/\\]log[/\\]splunk[/\\]jmespath.log*]
sourcetype = command:jmespath

[source::...[/\\]var[/\\]log[/\\]splunk[/\\]jsonformat.log*]
sourcetype = command:jsonformat
