
[ccx_netsuite_authentication]
search = (sourcetype="aws:s3:netsuite") ("Request URI" IN ("*authenticaterole*", "*enterpriselogin*") AND NOT Detail="EntityOrRoleDisabled")
# tags = authentication

[ccx_netsuite_change]
search = (sourcetype="aws:s3:netsuite") Detail IN ("*Logout", "EntityOrRoleDisabled")
# tags = change

[ccx_netsuite_events]
search = (sourcetype="aws:s3:netsuite") (Detail="" AND NOT "Request URI" IN ("*authenticaterole*", "*enterpriselogin*"))
