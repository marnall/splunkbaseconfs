
[aws:s3:netsuite]
KV_MODE = JSON

EVAL-action = case('Status'=="Success" AND NOT Detail IN ("EntityOrRoleDisabled", "ExplicitLogout", "RoleSwitchLogout"), "success", 'Status'=="Failure" AND NOT Detail IN ("EntityOrRoleDisabled", "ExplicitLogout", "RoleSwitchLogout"), "failure", match('Detail', "(Logout)$"), "logout", 'Detail'=="EntityOrRoleDisabled", "modified")
EVAL-app = "NetSuite"
EVAL-authentication_method = if(match('Request URI', "(authenticaterole|enterpriselogin)"), 'Request URI', null())
EVAL-change_type = case(Detail IN ("EntityOrRoleDisabled", "ExplicitLogout", "RoleSwitchLogout"), "AAA")
EVAL-object = case(Detail IN ("EntityOrRoleDisabled", "ExplicitLogout", "RoleSwitchLogout"), 'Email Address')
EVAL-object_category = case(Detail IN ("EntityOrRoleDisabled", "ExplicitLogout", "RoleSwitchLogout"), "user")
EVAL-object_path = case(Detail IN ("EntityOrRoleDisabled", "ExplicitLogout", "RoleSwitchLogout"), 'Request URI')
EVAL-signature = if('Detail'=="", null(), 'Detail')
EVAL-src = 'IP Address'
EVAL-src_ip = 'IP Address'
EVAL-status = case('Status'=="Success", "success", 'Status'=="Failure", "failure")
EVAL-user = 'Email Address'
EVAL-user_agent = 'User Agent'
EVAL-vendor_product = "NetSuite"
