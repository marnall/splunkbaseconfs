[build_url(1)]
args = url_type
definition = |eval url=case(\
$url_type$=="report","app/".app_name."/report?s=".ko_name,\
$url_type$=="dashboard", "app/".app_name."/".ko_name ,\
$url_type$=="data_model","manager/".app_name."/data_model_manager?appSearch=".app_name."&pwnr=-&app_only=1&nameFilter=".ko_name,\
$url_type$=="lookup-table-files","manager/".app_name."/data/lookup-table-files?ns=".app_name."&pwnr=-&app_only=1&search=".ko_name,\
$url_type$=="lookup-transforms","manager/".app_name."/data/transforms/lookups?ns=".app_name."&pwnr=-&app_only=1&search=".ko_name,\
$url_type$=="lookup-props","manager/".app_name."/data/props/lookups?ns=".app_name."&pwnr=-&app_only=1&search=".ko_name,\
$url_type$=="macro","manager/".app_name."/admin/macros?ns=".app_name."&pwnr=-&app_only=1&search=".ko_name,\
$url_type$=="ntags","tags",\
$url_type$=="eventtype","manager/".app_name."/saved/eventtypes?ns=".app_name."&pwnr=-&app_only=1&search=".ko_name,\
match($url_type$,"(^extractions|^sourcetype-rename|^workflow-actions|field)"),"manager/".app_name."/data/props/".ko_type."?ns=".app_name."&pwnr=-&app_only=1&search=".replace(ko_name,"::"," "),\
$url_type$=="alert_actions","alert_action",\
1=1,"unknown")
iseval = 0

[build_url(2)]
args = url_type,parent_type
definition = case(\
$url_type$=="report","app/".app_name."/report?s=".ko_name,\
$url_type$=="dashboard", "app/".app_name."/".ko_name ,\
$url_type$=="data_model","manager/".app_name."/data_model_manager?appSearch=".app_name."&pwnr=-&app_only=1&nameFilter=".ko_name,\
$url_type$=="lookup-table-files","manager/".app_name."/data/lookup-table-files?ns=".app_name."&pwnr=-&app_only=1&search=".ko_name,\
$url_type$=="lookup-transforms","manager/".app_name."/data/transforms/lookups?ns=".app_name."&pwnr=-&app_only=1&search=".ko_name,\
$url_type$=="lookup-props","manager/".app_name."/data/props/lookups?ns=".app_name."&pwnr=-&app_only=1&search=".ko_name,\
$url_type$=="macro","manager/".app_name."/admin/macros?ns=".app_name."&pwnr=-&app_only=1&search=".ko_name,\
match($url_type$,"tags$"),"manager/launcher/".case($url_type$=="ntags","saved",$url_type$=="tags","admin")."/".$url_type$."?ns=".app_name."&pwnr=-&app_only=1&search=".replace(ko_name,"="," "),\
$url_type$=="eventtype","manager/".app_name."/saved/eventtypes?ns=".app_name."&pwnr=-&app_only=1&search=".ko_name,\
match($url_type$,"(^extractions|^sourcetype-rename|^workflow-actions|field)"),"manager/".app_name."/data/".$parent_type$."/".ko_type."?ns=".app_name."&pwnr=-&app_only=1&search=".replace(ko_name,"::"," "),\
$url_type$=="alert_action","manager/launcher/alert_actions?search=".ko_name,\
1=1,"unknown")
iseval = 0

[set_ko_type(1)]
args = type
definition = case($type$=="searches","report",$type$=="views","dashboard",$type$=="model","data_model",match($type$,"^lookup"),$type$,$type$=="macros","macro",match($type$,"tags$"),$type$,$type$=="eventtypes","eventtype",match($type$,"(^extractions|^sourcetype-rename|^workflow-actions|field)"),$type$,$type$=="alert_actions","alert_action",1=1,"unknown")
iseval = 0

[set_edit_type(1)]
args = type
definition = case($type$ == "no_$type$","-",$type$ == "acl","PERMISSIONS",$type$ == "edit","NEW",$type$ == "move","MOVED",$type$ == "converttohtml","CONVERT TO HTML",$type$ == "embed","EMBED ENABLED",$type$ == "unembed","EMBED DISABLED",$type$ == "disable","DISABLE",$type$ == "enable","ENABLE",1=1,$type$)
iseval = 0

[kom_audit_indexes]
definition = index=_internal
iseval = 0

[kom_audit_summary_indexes]
definition = index=summary source=KOM_Change_Audit_Summary
iseval = 0

[ko_edittype_filter]
definition = |where ko_name!="_new" AND edit_type!="dispatch" AND edit_type!="notify" AND user!="splunk-system-user"

[first_mv(1)]
args = field_var
definition = |eval $field_var$=mvindex($field_var$,0)
iseval = 0

[kom_summary_indexes]
definition = index=summary
iseval = 0

[rest_timeout]
definition = timeout=300
iseval = 0

[kom_all_assets]
definition = maxtime=300 maxout=100000 `rest_timeout` \
[ | rest `rest_timeout` splunk_server=* /services/server/info \
  `ko_single_instance` \
  | fields host server_roles shcluster_label version single_instance \
  | eval server_roles = if(single_instance==1,mvappend(server_roles,"search_head"),server_roles) \
  | mvexpand server_roles \
  | where ((single_instance==1 AND server_roles=="search_head") OR server_roles=="search_head" OR (server_roles=="shc_captain" OR server_roles=="shc_member")) \
  | eval shc_name = if(isnull(shcluster_label) OR len(shcluster_label)==0, "standalone", shcluster_label) \
  | where (server_roles=="shc_captain" OR server_roles=="shc_member") OR shc_name == "standalone" \
| eval append_maxtime = 300, append_timeout = 300, append_maxout=100000 \
| lookup searchheads_lookup _key AS host OUTPUTNEW domain_url shc_label label AS sh_label \
| where isnotnull(domain_url) \
| fields host shc_name append_maxtime append_timeout append_maxout server_roles \
    | join type=left host \
    [| rest timeout=300 splunk_server=local /services/server/info \
    | eval local_instance=1 \
    | fields host local_instance] \
| eval include_sh = case(server_roles=="shc_member" AND local_instance=1,1, server_roles=="shc_captain",1, server_roles=="search_head" AND shc_name == "standalone",1, 1=1,0) \
| where include_sh==1 \
| fields host shc_name append_maxtime append_timeout append_maxout \
| map maxsearches=100 search="\
| rest /servicesNS/-/-/data/props/extractions splunk_server=$host$ `rest_timeout`\
| fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
| eval ko_type=\"extraction\", shc_name=\"$shc_name$\" \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/ui/views splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"dashboard\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/props/calcfields splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"calcfields\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/props/fieldaliases splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"fieldaliases\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/transforms/extractions splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"fieldtransform\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/props/sourcetype-rename splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"sourcetype_renaming\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/ui/workflow-actions splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"workflow_action\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/ui/times splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"time_range\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/saved/searches splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"report\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/models splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"data_model\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/saved/eventtypes splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"eventtype\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/saved/fvtags splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"fvtags\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/saved/ntags splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"ntag\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/admin/tags splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"tag\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/lookup-table-files splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"lookup\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/transforms/lookups splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"lookup_definition\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/props/lookups splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"lookup\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/ui/nav splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"app_ui\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/data/ui/panels splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"prebuilt_panel\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/messages splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server \
    | eval ko_type=\"bulletin_message\", shc_name=\"$shc_name$\"] \
| append maxtime=$append_maxtime$ maxout=$append_maxout$ timeout=$append_timeout$ \
    [| rest /servicesNS/-/-/admin/macros splunk_server=$host$ `rest_timeout`\
    | fields + title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server\
    | eval ko_type=\"macro\", shc_name=\"$shc_name$\"] "]\
| fields + ko_type, title, label, eai:acl.app, eai:acl.sharing, author, eai:acl.perms.read, eai:acl.perms.write, splunk_server shc_name
