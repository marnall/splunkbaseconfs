[kom_all_apps]
definition = `run_map_for_rest("/services/apps/local")`\
| rename "eai:acl.sharing" as sharing \
| fields + title, label, author, core, sharing, splunk_server shc_name
iseval = 0

[kom_all_dashboards]
definition = `run_map_for_rest("/servicesNS/-/-/data/ui/views")`\
| fields - id isDashboard isVisible published disabled updated rootNode \
| eval xmlDataLen = length('eai:data')\
| where xmlDataLen < 1500000\
| xpath field=eai:data outfield=dashboard_refresh "//dashboard/@refresh" \
| xpath field=eai:data outfield=form_refresh "//form/@refresh" \
| xpath field=eai:data outfield=all_the_things "//search" \
| xpath field=eai:data outfield=all_the_refs "//search/@ref"\
| eval all_the_things = mvappend(all_the_things,all_the_refs) \
| eval all_the_things=mvfilter(NOT match(all_the_things, "^\s$")) \
| spath input=eai:data output=inputs path=form.fieldset.input \
| eval inputs=mvfilter(match(inputs, "<search")) \
| fields - all_the_refs, eai:data eai:acl.perms eai:acl.perms.* eai:acl.removable eai:acl.can_write eai:acl.modifiable eai:acl.can_share_* eai:acl.can_list eai:acl.can_change_perms eai:type eai:userName \
| eval app_name=if(match(app_name, "[-\s_]"), rtrim(app_name, "="), app_name) \
| eval app_clear=if(match(app_name, "[-\s_]"), app_name, null()) \
| eval user=owner, "eai:acl.owner"=owner, "eai:acl.app"=app_name \
| eval owner=if(match(user, "[-\s_]"), rtrim(owner, "="), user) \
| eval user_clear=if(match(user, "[-\s_]"), user, null()) \
| spath input=inputs output=input_searches path=search.query \
| fields - inputs \
| makemv tokenizer="(((?ms)<search.*?<\/search>)|((?ms)^(?!Null$|^$|\s+)(.*?(\n|$))))" all_the_things\
| eval all_the_things = if(isnull(all_the_things),"",all_the_things) \
| mvexpand all_the_things \
| eval all_the_things = if(match(all_the_things, "<search(>|\s)"),all_the_things,"<search ref=\"".all_the_things."\"></search>")\
| spath input=all_the_things output=main_search path=search.query \
| spath input=all_the_things output=earliest_time path=search.earliest \
| spath input=all_the_things output=base_name_unhashed path=search{@id} \
| spath input=all_the_things output=ref_base_name path=search{@base}\
| spath input=all_the_things output=ref_report_name path=search{@ref}\
| eval ref_report_name = replace(ref_report_name, "[\n\r]","")\
| fields - all_the_things \
| eval realtime = if(match(earliest_time,"rt"),1,0) \
| eval alltime = if(earliest_time==0,1,0) \
| eval input_flag=if(in(input_searches, main_search), "input", "body") \
| eval len=length(md5(base_name_unhashed)), search_cksum=md5(main_search) \
| eval search_rmd="RMD5" . substr(md5(base_name_unhashed), len-15), is_base_search=if(isnotnull(search_rmd),1,0)\
| streamstats count(eval(if(isnotnull(base_name_unhashed), search_string, 0))) AS search_num by splunk_server, app_name, title \
| eventstats count(eval(if(isnotnull(base_name_unhashed), search_string, null()))) AS named_searches by splunk_server, app_name, title \
| eval base_name=case(match(base_name_unhashed, "[-\s_]"), search_rmd, isnotnull(base_name_unhashed), base_name_unhashed, search_num - named_searches < 1, null(), 1=1, "search" . tostring(search_num - named_searches)) \
| rex field=description mode=sed "s/^\s+//g" \
| eval description_short = if(isnotnull(trim(description," ")),substr(description,0,127),"") \
| eval description_short = if(len(description_short)>126,description_short."...",description_short) \
| fillnull value=0 dashboard_refresh form_refresh \
| eval refresh_interval = dashboard_refresh+form_refresh \
| eval refresh_interval = if(refresh_interval>0,refresh_interval,null()) \
| fields app_name description_short description user owner author eai:acl.sharing label splunk_server title app_clear user_clear base_name base_name_unhashed is_base_search input_flag input_searches main_search named_searches search_cksum search_num ref_base_name ref_report_name search_rmd refresh_interval eai:acl.owner eai:acl.app realtime alltime
iseval = 0

[kom_all_reports]
definition = `run_map_for_rest("/servicesNS/-/-/saved/searches")`\
| search disabled=0 \
| eval search_cksum=md5(search), length=len(md5(title)), search_title=if(match(title,"[-\\s_]"),("RMD5" . substr(md5(title),(length - 15))),title), \
user=owner, eai:acl.owner=owner, owner=if(match(user,"[-\\s_]"),rtrim(owner,"="),user), user_clear=if(match(user,"[-\\s_]"),user,null()), "eai:acl.app"=app_name, app_name=if(match(app_name,"[-\\s_]"),rtrim(app_name,"="),app_name), app_clear=if(match(app_name,"[-\\s_]"),app_name,null()), commands=split(search,"|"), ol_cmd=mvindex(commands,mvfind(commands,"outputlookup")), si_cmd=mvindex(commands,mvfind(commands,"collect")) \
| rex field=ol_cmd "outputlookup (?<ol_tgt_filename>.+)" \
| rex field=si_cmd "index\s?=\s?(?<si_tgt_index>[-_\w]+)" \
| eval si_tgt_index=coalesce(si_tgt_index, 'action.summary_index._name')\
| eval ol_tgt_filename=coalesce(ol_tgt_filename, 'action.lookup.filename') \
| rex field=description mode=sed "s/^\s+//g" \
| eval description_short = if(isnotnull(trim(description," ")),substr(description,0,127),"") \
| eval description_short = if(len(description_short)>126,description_short."...",description_short) \
| eval is_alert = if((isnotnull(alert_comparator) AND len(alert_comparator)>0 AND isnotnull(alert_threshold) AND len(alert_threshold)>0),1,0) \
| eval has_report_action = if(actions!="",1,0)\
| fields + app_name, description_short, description, user, owner, shc_name, splunk_server, title, search_title, "eai:appName", "eai:acl.app", app_clear, "eai:acl.sharing", "eai:acl.owner", user_clear, is_scheduled, cron_schedule, max_concurrent, dispatchAs, "dispatch.earliest_time", "dispatch.latest_time", actions, search, search_cksum, si_tgt_index, ol_tgt_filename, is_alert, has_report_action \
| eval object_type=case((has_report_action == 1),"report_action",(is_alert == 1),"alert",true(),"savedsearch")
iseval = 0

[kom_all_lookups]
definition = `run_map_for_rest(/servicesNS/-/-/data/transforms/lookups)` \
  | rename title AS transform, eai:acl.sharing AS sharing \
  | fillnull filename value="" \
  | fields shc_name splunk_server app_name transform filename type owner sharing \
  | append [ \
    | rest `run_map_for_rest(/servicesNS/-/-/data/lookup-table-files)` \
      | rename title AS filename, eai:acl.sharing AS sharing \
      | fields shc_name splunk_server app_name filename owner sharing \
    | join type=outer splunk_server app_name transform [ \
        | rest `run_map_for_rest(/servicesNS/-/-/data/props/lookups)` \
        | rename eai:acl.sharing AS sharing \
        | fields shc_name splunk_server app_name transform stanza owner sharing \
      | stats values(stanza) AS stanza by shc_name splunk_server app_name transform type owner sharing]] \
  | fillnull transform value="" \
  | fillnull type value="default" \
  | stats values(stanza) AS stanzas by shc_name splunk_server app_name filename transform type owner sharing
iseval = 0

[kom_all_macros]
definition = `run_map_for_rest(/servicesNS/-/-/admin/macros)` \
  | rename title AS macro_name, eai:acl.sharing AS sharing \
  | rex field=macro_name "(?<simple_macro_name>[\w,-]+)(\(|$)" \
  | rex field=definition max_match=0 "`(?<sub_macro_names>[\w,-]+)(\(|`)" \
  | fields shc_name splunk_server app_name macro_name simple_macro_name dc_inuse_type type owner sharing sub_macro_names \
  | mvexpand sub_macro_names \
  | dedup shc_name app_name owner sharing macro_name sub_macro_names 
iseval = 0

[kom_users_all]
definition = `run_map_for_rest("/services/authentication/users")`\
| fields + title, realname, last_successful_login, roles, shc_name, splunk_server, type \
| eval snapshot_time=now() \
| rename title as username
iseval = 0

[ko_single_instance]
definition = | appendcols \
    [| rest splunk_server=* /services/search/distributed/peers \
    | stats count \
    |  where count==0 \
    | eval single_instance = if(isnull(splunk_server),1,0)]
iseval = 0

[kom_searchheads_list]
definition = `rest_timeout` splunk_server=* /services/server/info\
  `ko_single_instance`\
  | fields host server_roles shcluster_label version single_instance\
  | eval server_roles = if(single_instance==1,mvappend(server_roles,"search_head"),server_roles)\
  | mvexpand server_roles\
  | where ((single_instance==1 AND server_roles=="search_head") OR server_roles=="search_head" OR (server_roles=="shc_captain" OR server_roles=="shc_member"))\
  | eval shc_name = if(isnull(shcluster_label) OR len(shcluster_label)==0, "standalone", shcluster_label)\
  | where (server_roles=="shc_captain" OR server_roles=="shc_member") OR shc_name == "standalone"\
  | lookup searchheads_lookup _key AS host OUTPUTNEW domain_url shc_label label AS sh_label\
  | where isnotnull(domain_url)\
  | fields host shc_name server_roles\
      | join type=left host\
      [| rest timeout=300 splunk_server=local /services/server/info\
      | eval local_instance=1\
      | fields host local_instance]\
  | eval include_sh = case(server_roles=="shc_member" AND local_instance=1,1, server_roles=="shc_captain",1, server_roles=="search_head" AND shc_name == "standalone",1, 1=1,0)\
  | where include_sh==1\
  | fields host shc_name
iseval = 0

[run_map_for_rest(1)]
args = rest_uri
definition = `run_map_for_rest($rest_uri$,100)`
iseval = 0

[run_map_for_rest(2)]
args = rest_uri, max_searches
definition = `kom_searchheads_list`\
| map maxsearches=$max_searches$ search="| rest `rest_timeout` $rest_uri$ splunk_server=$host$\
    | rename eai:acl.app AS app_name, eai:acl.owner AS owner\
    | eval shc_name = \"$shc_name$\""
iseval = 0

[run_map_for_savedsearch(5)]
args = max_searches, is_sched, is_disabled, earliest, latest
definition = `kom_searchheads_list`\
| map maxsearches=$max_searches$ search="| rest `rest_timeout` splunk_server=$host$ \"/servicesNS/-/-/admin/savedsearch/\" search=\"is_scheduled=$is_sched$\" search=\"disabled=$is_disabled$\"\
  [ | makeresults | eval earliest_time=relative_time(now(), \"$earliest$\") | return earliest_time ]\
  [ | makeresults | eval latest_time=relative_time(now(), \"$latest$\") | return latest_time ]\
    | rename eai:acl.app AS app_name, eai:acl.owner AS owner\
    | eval shc_name = \"$shc_name$\""
iseval = 0

[exclude_splunk_apps(1)]
args = app_name
definition = | eval app_title = lower($app_name$) \
| eval is_premium_app = if(app_title=="itsi" OR app_title like "%a-itsi%" OR app_title=="sa-indexcreation" OR app_title=="sa-itoa" OR app_title=="sa-useraccess" OR app_title=="splunk_app_infrastructure" OR app_title=="splunk_sa_cim",1,0) \
| eval is_default_app = if(app_title like "splunk_essentials_%", 1,0) \
| where is_premium_app == 0 AND is_default_app == 0 \
| search NOT [| inputlookup kom_splunk_default_apps | fields default_app_name | rename default_app_name AS app_title]
iseval = 0

[score_search_commands(1)]
args = search_query
definition = | rex field=$search_query$ max_match=0 "(\|(\s+)?(?<append>append)\s+(.+|)(\s+)\[(\s+|)(\||)(\s+|)search)+" \
| rex field=$search_query$ max_match=0 "(\|(\s+)?(?<join>join)\s+(.+|)(\s+)\[(\s+|)(\||)(\s+|)search)+" \
| rex field=$search_query$ max_match=0 "(\|(\s+)?(?<dedup>dedup))+" \
| rex field=$search_query$ max_match=0 "(\|(\s+)?(?<map>map\s))+" \
| rex field=$search_query$ max_match=0 "(\|(\s+)?(?<transaction>transaction))+" \
| eval num_append = mvcount(append) \
| eval num_dedup = mvcount(dedup) \
| eval num_join = mvcount(join) \
| eval num_map = mvcount(map) \
| eval num_transaction = mvcount(transaction) \
| fillnull value=0 num_append num_dedup num_join num_map num_transaction \
| eval transaction_score = abs(num_transaction) * -1 \
| eval dedup_score = abs(num_dedup) * -1 \
| eval map_score = abs(num_map) * -1 \
| eval append_score = case(num_append == 0,0, num_append <= 2,-1, num_append <= 5,-3, 1=1,-5) \
| eval join_score = case(num_join == 0,0, num_join <= 2,-1, num_join <= 5,-3, 1=1,-5) \
| eval search_command_score = transaction_score + dedup_score + map_score + append_score + join_score
iseval = 0

[extract_search_filters(1)]
args = search_query
definition = | rex field=$search_query$ max_match=0 "(?<!where|search|if|case)(^|\s|\()(host(=|\s=\s|\s=|=\s|\sIN\s\()(?<host>[a-zA-Z0-9_-]+\S+))" \
| rex field=$search_query$ max_match=0 "(?<!where|search|if|case)(^|\s|\()sourcetype(=|\s=\s|\s=|=\s|\sIN\s)(?<sourcetype>\S+)" \
| rex field=$search_query$ max_match=0 "(?<!where|search|if|case)(^|\s|\()source(=|\s=\s|\s=|=\s|\sIN\s)(?<source>\S+)" \
| rex field=$search_query$ max_match=0 "(?<!where|search|if|case)(^|\s|\()index(=|\s=\s|\s=|=\s|\sIN\s)(?<index>\S+)"
iseval = 0

[ko_lookups_in_spl(1)]
args = field_name
definition = | rex field=$field_name$ max_match=0 "(inputlookup|(\|\s+|\|)lookup|inputlookup\s+(\w+=(\w+|\w+\s+)){0,5})\s+(?<lookupfilename>[\w-]+)(\s|\.csv|$)"
iseval = 0

[get_child_macros_v1(4)]
args = parent, path, depth, max_depth
definition = "| appendpipe\
    [| where depth=".($depth$-1)."\
| lookup kom_asset_map_macro app_name simple_macro_name AS parent OUTPUT app_name owner sharing shc_name sub_macro_names AS child\
    | where !isnull(parent) AND parent!=child\
    | eval parent=mvindex(parent, 0)\
    | mvexpand child            \
    | eval path = if(len(child)>0,path.\",\".child,\"\")\
    | eval path_mv = path\
    | makemv delim=\",\" path_mv\
    | eval depth=$depth$\
]".\
if($depth$<$max_depth$,"`get_child_macros_reverse_v1($parent$, $path$, ".($depth$+1).", $max_depth$)`","")
iseval = 1

[get_child_macros_reverse_v1(4)]
args = parent, path, depth, max_depth
definition = "| appendpipe\
    [| where depth=".($depth$-1)."\
    | lookup kom_asset_map_macro app_name simple_macro_name as child OUTPUT app_name owner sharing shc_name simple_macro_name AS parent sub_macro_names AS child \
    | where !isnull(parent)\
    | mvexpand parent\
    | eval parent=mvindex(parent, 0)\
    | mvexpand child\
    | where parent!=child OR depth==1\
    | eval path = if(len(child)>0,path.\",\".child,\"\")\
    | eval path_mv = path\
    | makemv delim=\",\" path_mv    \
    | eval depth=$depth$\
]".\
if($depth$<$max_depth$,"`get_child_macros_reverse_v1($parent$, $path$, ".($depth$+1).", $max_depth$)`","")
iseval = 1

[get_macros_v1(3)]
args = root_node, depth, max_depth
definition = | eval parent=mvindex(parent, 0)\
| mvexpand child \
| eval depth=0\
| eval path=$root_node$\
`get_child_macros_v1(parent, path, 1, $max_depth$)`\
| table depth parent child path_mv path app_name owner sharing shc_name \
| where len(child) > 0 \
| dedup depth parent child path_mv path app_name owner sharing shc_name
iseval = 0