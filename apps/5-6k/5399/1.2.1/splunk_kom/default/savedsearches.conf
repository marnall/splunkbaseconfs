[kom_macro_indirect_use_by_reference]
action.email.show_password = 1
action.email.useNSSubject = 1
action.trigger.param.verbose = 0
action.webhook.enable_allowlist = 0
action.lookup = 1
action.lookup.filename = kom_macro_all_references
alert.track = 0
cron_schedule = 33 */4 * * *
description = Based on all the macros directly referenced use the macro to macro reference lookup to identify dependency macros that the directly referenced macro relies on.
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.statistics.rowNumbers = 1
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = splunk_kom
request.ui_dispatch_view = search
schedule_window = 15
search = | inputlookup kom_macro_used_directly\
| rename title AS name_directly_referrenced, splunk_server AS origin_splunk_server\
| stats values(used_in_types) AS used_in_types count by origin_splunk_server app_name sharing owner name_directly_referrenced\
| lookup kom_macro_dependencies app_name ```sharing owner``` path_mv AS name_directly_referrenced OUTPUT shc_name parent child path_mv path\
| fields shc_name origin_splunk_server app_name sharing owner name_directly_referrenced child path_mv path used_in_types\
 | mvexpand path\
 | eval expanded_path_mv = path\
 | makemv expanded_path_mv delim=","\
 | eval mv_length=mvcount(expanded_path_mv)\
 | eval i=mvfind(expanded_path_mv, name_directly_referrenced)\
 | eval indexval=mvrange(i+1,mv_length,1)\
 | mvexpand indexval\
 | eval dependency_macro=mvindex(expanded_path_mv,indexval)\
 | sort - mv_length\
 | eval shc_name = if(len(shc_name)>0,shc_name,origin_splunk_server)\
 | eval dependency_macro = if(len(dependency_macro)>0,dependency_macro,"-|kom-no-dependency-macros|-")\
 | fields shc_name app_name sharing owner name_directly_referrenced dependency_macro path used_in_types\
 | mvexpand shc_name\
 | dedup shc_name app_name sharing owner name_directly_referrenced dependency_macro\
 | eval path = if(len(path)>0,path,"-|kom-no-dependency-macros|-")\
 | stats count values(dependency_macro) AS dependency_macros values(used_in_types) AS used_in_types by shc_name app_name sharing owner name_directly_referrenced path\
 | fields shc_name app_name sharing owner name_directly_referrenced dependency_macros used_in_types path


