cron_schedule = 53 * * * *
description = Generate a list of all custom SPL commands
dispatch.earliest_time = -10m@m
dispatch.latest_time = @m
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 0
request.ui_dispatch_app = splunk_kom
request.ui_dispatch_view = search
schedule_window = 5
allow_skew=10%
search = | rest `run_map_for_rest("/servicesNS/nobody/-/data/commands")` \
| fields app_name title streaming filename splunk_server shc_name \
| rename title AS command
