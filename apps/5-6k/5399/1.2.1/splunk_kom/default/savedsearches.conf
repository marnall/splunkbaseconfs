`first_mv(origin_splunk_server_label)` `first_mv(domain_url)`\
| fields time_stamp ko_name ko_label action edit_type ko_type user realname app_name app_label origin_splunk_server url uri_path audit_event_hash search_title origin_splunk_server_label domain_url |fields - _raw


