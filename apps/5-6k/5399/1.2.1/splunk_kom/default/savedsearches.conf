cron_schedule = */30 * * * *
dispatch.earliest_time = -31m@m
dispatch.latest_time = -1m@m
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = splunk_kom
request.ui_dispatch_view = search
schedule_window = auto
allow_skew=15%
search = index=_audit sourcetype=audittrail \
(TERM(info=granted) TERM(search_id=*)) OR (TERM(info=completed) OR TERM(info=canceled))\
| lookup searchheads_lookup _key AS host OUTPUTNEW domain_url shc_label label AS sh_label\
