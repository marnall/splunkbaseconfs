[tags_lookup]
external_type = kvstore
collection = komcollection
fields_list = _key, _user, tagName, owner, private, koIDs

[searchheads_lookup]
external_type = kvstore
collection = komcollection
fields_list = _key,searchhead,label,domain_url,shc_label

[kom_macro_dependencies]
external_type = kvstore
collection = kom_macros_dependencies_col
fields_list = depth,parent,child,path_mv,path,app_name,owner,sharing,shc_name

# Macro's referred directly by other KOs
[kom_macro_used_directly]
external_type = kvstore
collection = kom_macros_used_directly_col
fields_list = shc_name splunk_server app_name title ref_owners ref_sharing used_in_types dc_inuse_type owner sharing

# Macro's referred directly by other KOs, plus indirect macros used by direct ref macros
[kom_macro_all_references]
external_type = kvstore
collection = kom_macros_all_ref_col
fields_list = shc_name app_name owner sharing name_directly_referrenced dependency_macros used_in_types path

[kom_macro_usage_status_all]
external_type = kvstore
collection = kom_macros_all_usage_status_col
fields_list = shc_name splunk_server app_name title ref_owners ref_sharing used_in_types dc_inuse_type owner sharing

###[kom_lookup_all_references]
[kom_lookup_usage_status_all]
external_type = kvstore
#collection = kom_lookups_all_used_col
collection = kom_lookups_all_usage_status_col
fields_list = shc_name splunk_server app_name title ref_owners ref_sharing used_in_types dc_inuse_type owner sharing

