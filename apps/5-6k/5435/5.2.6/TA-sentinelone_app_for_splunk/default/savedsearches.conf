[sentinelone_lookup_generation]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */15 * * * *
description = search for populating the agents lookup
dispatch.earliest_time = -24h@h
dispatch.latest_time = -5m@m
enableSched = 1
disabled = 1
search = eventtype=sentinelone_agents | extract reload=T | stats latest(*) as * by uuid | fields createdAt, updatedAt, modelName, machineType, infected, is*, groupId, agentSiteName, siteId, accountId, accountName, uuid, host | rename agentSiteName as siteName | inputlookup append=T sentinelone_lookup | eval _time=strptime(updatedAt, "%Y-%m-%dT%H:%M:%S.%6NZ")| stats latest(*) as * by uuid | eval _key = uuid | outputlookup sentinelone_lookup

[sentinelone_groups_lookup_generation]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */15 * * * *
description = search for populating the groups lookup with site id and site name
dispatch.earliest_time = -24h@h
dispatch.latest_time = -5m@m
enableSched = 1
disabled = 1
search = eventtype=sentinelone_groups | extract reload=T|stats latest(*) as * by id| fields ad_query, rank, host, createdAt, creator, creatorId, id, group_id, _key, siteId, siteName, name, isDefault, inherits, totalAgents, type, updatedAt, host| inputlookup append=T sentinelone_groups_lookup |eval _time=strptime(updatedAt, "%Y-%m-%dT%H:%M:%S.%6NZ") | stats latest(*) as * by id | outputlookup sentinelone_groups_lookup

[sentinelone_activity_types_lookup_generation]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 1 * * *
description = Populate activity types lookup from the API, Daily.
dispatch.earliest_time = -6m@m
dispatch.latest_time = -5m@m
enableSched = 1
disabled = 1
search = | rest "/servicesNS/-/TA-sentinelone_app_for_splunk/configs/conf-authhosts" splunk_server=local | fields + url | rename url as management | sentineloneapi activity_types | rename action as activity_action, descriptionTemplate as template | eval _time=1000| inputlookup sentinelone_activity_types append=1 | fillnull value=100 _time | stats latest(*) as * by id | eval aa=lower(activity_action), action=case((isnotnull(action) AND (action != "unknown")),action,((like(aa,"%created%") OR like(aa,"%enable%")) OR like(aa,"%configured%")),"created",(((((((((like(aa,"%modified%") OR like(aa,"%quarantine%")) OR like(aa,"%disable%")) OR like(aa,"%modification%")) OR like(aa,"%updated%")) OR like(aa,"%reverted%")) OR like(aa,"%changed%")) OR like(aa,"%restore%")) OR like(aa,"%edited%")) OR like(aa,"%enabled%")),"modified",((like(aa,"%delete%") OR like(aa,"%deletion%")) OR like(aa,"%remove%")),"deleted",like(aa,"%locked%"),"lockout",(((((like(aa,"%opt-in%") OR like(aa,"%opt-out%")) OR like(aa,"%enroll%")) OR like(aa,"%reset%")) OR like(aa,"%scope%")) OR like(aa,"%authorization%")),"acl_modified",((like(aa,"%started%") OR like(aa,"%initiated%")) OR like(aa,"%executed%")),"started",(like(aa,"%completed%") OR like(aa,"%failure%")),"stopped",true(),"unknown"), change_type=case((isnotnull(change_type) AND (change_type != "unknown")),change_type,like(aa,"%user%"),"user",like(aa,"%agent%"),"agent",like(aa,"%2fa%"),"AAA",(like(aa,"%profiler%") OR like(aa,"% scan %")),"scan",like(aa,"%threat%"),"threat",like(aa,"%ranger%"),"ranger",like(aa,"%firewall%"),"firewall",like(aa,"%policy%"),"policy",true(),"unknown") | fields - aa | outputlookup sentinelone_activity_types