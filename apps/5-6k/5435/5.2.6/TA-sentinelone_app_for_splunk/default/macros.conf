# #::HDR:: ;; # App: TA-sentinelone_app_for_splunk ;; # File: macros.conf ;; # Updated: 2023-07-03 15:57:16

[sentinelone_checklist_output]
definition = eval total_failures = count, severity_level = if(total_failures > 0, 3, 0), message =case(isnotnull(message), message, total_failures>0,"No Data Found", true(), "Data Found"),  instance = coalesce(instance, host) | fields - count

[sentinelone_base_index]
definition = eventtype=sentinelone_base_index
iseval     = 0

[sentinelone_agents]
definition = eventtype=sentinelone_base_index sourcetype=sentinelone:channel:agents
iseval     = 0

[sentinelone_threats]
definition = eventtype=sentinelone_base_index sourcetype=sentinelone:channel:threats
iseval     = 0

[sentinelone_management_hosts]
definition = inputlookup sentinelone_lookup | stats count by host | append [makeresults | eval host ="sentinelone"]

[sentinelone_management_sites(1)]
args       = management_host
definition = inputlookup sentinelone_lookup | search $management_host$ | stats count by siteName

[sentinelone_management_sites_management(1)]
args       = management_host
definition = inputlookup sentinelone_lookup | search $management_host$ | stats count by siteName

[sentinelone_management_groups(2)]
args       = mgmt_host, siteName
definition = inputlookup sentinelone_groups_lookup | search (host="$mgmt_host$") (siteName="$siteName$")| eval "Type"=case(ad_query!="null", "AD synchronised", rank=="null", "Static", rank!="null", "Dynamic" )
# CAREFUL  = This will empty a kvstore

[sentinelone_zero_lookup]
definition = inputlookup sentinelone_lookup | eval blank=null() | where isnotnull(blank) | outputlookup sentinelone_lookup
# CAREFUL  = This will empty a kvstore

[sentinelone_zero_groups_lookup]
definition = inputlookup sentinelone_groups_lookup | eval blank=null() | where isnotnull(blank) | outputlookup sentinelone_groups_lookup

[sentinelone_data_present]
definition = search eventtype=sentinelone_base_index sourcetype=sentinelone:* | stats dc(sourcetype) as count by host| `sentinelone_checklist_output`

[pareto(1)]
args = p
definition = sort - count | accum count as accum | eventstats max(accum) as total | eval pareto = accum/total * 100 | where pareto < $p$ | fields - accum total | rename pareto AS "Cumulative %"