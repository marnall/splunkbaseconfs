[SentinelOne_AlertCheck]
category         = Alert Data
description      = Check for Errors in the SentinelOne Alert Actions
failure_text     = Errors found in Alert Actions
search           = eventtype=sentinelone_errors sourcetype="sentinelone:alert_action:*" log_level=ERROR | stats count by message alert_action | `sentinelone_checklist_output`
suggested_action = Review Alert Action settings for proper configuration
tags             = data_alert
title            = SentinelOne Alert Action Check

[SentinelOne_HealthCheck]
category         = Data Ingest
description      = Check to see if there are any SentinelOne Data
failure_text     = No Alerts Found
search           = | `sentinelone_data_present`
suggested_action = Check your API Inputs for proper data flow.
tags             = data_ingest
title            = SentinelOne Health Check

[SentinelOne_InputCheck]
category         = Data Ingest
description      = Check for Errors in the SentinelOne Inputs
failure_text     = Errors found in Inputs
search           = eventtype=sentinelone_errors sourcetype="sentinelone:input:*" log_level=ERROR | stats count by message input_source | `sentinelone_checklist_output`
suggested_action = Review Input settings for proper configuration
tags             = data_ingest
title            = SentinelOne Inputs Check