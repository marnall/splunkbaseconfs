#############################################################################
# Persistent non-EAI handler that processes CLI sshpass commands to hosts.
#
# Some additional arguments are enabled to permit the exposure of HTTP headers,
# payload, and cookies.
#
#############################################################################
[script:cliauto_addon]
match                 = /cliauto_addon
script                = cliauto_addon.py
scripttype            = persist
handler               = cliauto_addon.cliauto_addonHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
capability            = cliauto_addon_custom_endpoint
python.version=python3

[eai:conf-app]
capability.read=cliauto_addon_custom_endpoint
python.version=python3

[eai:conf-cliauto_addon]
capability.read=cliauto_addon_custom_endpoint
python.version=python3

[eai:conf-cliauto_cmds]
capability.read=cliauto_addon_custom_endpoint
python.version=python3


