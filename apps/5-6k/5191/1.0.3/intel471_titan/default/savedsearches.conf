[CVE updates alert]
alert.digest_mode = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = This Search determines whether the CVE in new events are whether updated CVE's are seen for the first time
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = sourcetype="intel471:cvereport:source" \
| spath data.cve_report.name output=name \
| lookup alertdatabase.csv name output name as cve \
| eval status=case(isnull(cve), "new", isnotnull(cve), "updated")\
| table name, status\
| appendpipe [|where status="new" | outputlookup alertdatabase.csv append=true ]\
| table name, status | where status="updated"
