[pandaCefSourcetype]
REGEX = ^CEF:\d+\|[^\|]*\|[^\|]*\|[^\|]*\|([^|]*)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::pandafeedercef:$1

[pandaCefHeaders]
REGEX = CEF:(?<cef_cefVersion>\d+)\|(?<cef_vendor>[^|]*)\|(?<cef_product>[^|]*)\|(?<cef_version>[^|]*)\|(?<cef_signature>[^|]*)\|(?<cef_name>[^|]*)\|(?<cef_severity>[^|]*)

[pandaCefKeys]
REGEX = (?:_+)?(?<_KEY_1>[\w.:\[\]]+)=(?<_VAL_1>.*?(?=(?:\s[\w.:\[\]]+=|$)))
REPEAT_MATCH = True

[pandaCefExtractDate]
REGEX = Date=(?<date>\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})
FORMAT = Date::"$1"a
WRITE_META = true


[pandaCefChangeAlertTime]
INGEST_EVAL = _time:=if((sourcetype="pandafeedercef:alertmalware" OR sourcetype="pandafeedercef:alertpup"), strptime(Date,"%Y-%m-%d %H:%M:%S.%f"), _time)


