[pollinstance-command]
syntax = pollinstance splunk_host=<string> [splunk_port=<int>] account=<string> object={rest|all|info|settings|messages|confs|inputstatus|apps|data|kvstore|cluster|shcluster|deployment|licenser|search|health|status} [uri]
shortdesc = Polls data from remote Splunk instance via REST API.
description = Does not require the remote Splunk instance to be a search peer of this instance. Either query a REST API endpoint directly using the 'rest' object, or query one of many prefab objects for more specific data. To use this command, the Splunk instance's credentials must be saved as an account using the Data Collection Monitor's configuration page.
usage = public
comment1 = Poll data from remote Splunk instance 'splunk.mycorp.com' REST endpoint '/services/server/status', using credentials from account 'Main IDXC'
example1 = | pollinstance splunk_host="splunk.mycorp.com" account="Main IDXC" object="rest" /services/server/status
comment2 = Poll all objects from remote Splunk instance '10.50.1.22' on non-standard port '8091', using credentials from account 'Tampa UFs'
example2 = | pollinstance splunk_host="10.50.1.22" splunk_port=8091 account="Tampa UFs" object="all"
related = rest
tags = rest
