dispatch.earliest_time = -61d@d
dispatch.latest_time = -1d@d
request.ui_dispatch_app = data_collection_monitor_app
request.ui_dispatch_view = search
search = | tstats summariesonly=t count where index=* [ | inputlookup events_by_sourcetype_1h ] by _time sourcetype span=1h\
	| fit DensityFunction count by sourcetype dist=norm into app:events_by_sourcetype_1h

