[source::...ta-crowdstrike-falcon-event-streams*.log*]
sourcetype = tacrowdstrikefalconeventstreams:log
TRUNCATE = 0

[source::...ta_crowdstrike_falcon_event_streams*.log*]
sourcetype = tacrowdstrikefalconeventstreams:log
TRUNCATE = 0

[CrowdStrike:Event:Streams:JSON]
EVAL-action = case('event.PatternDispositionValue'IN (16,26,128,144,512,522,538,1024,1152,2048,2176,4112,5120,2099200),"blocked", 'event.PatternDispositionValue' IN (0,272,282,768,778,794,1280,2304,2432,4368), "allowed",  'event.Success'=="false", "failure", 'event.Success'=="true", "success", 'event.PatternDispositionFlags.PolicyDisabled'=true, "allowed", 'event.PatternDispositionDescription' LIKE "%would have been%", "allowed", 'event.PatternDispositionDescription' LIKE "%blocked%", "blocked", 'event.PatternDispositionDescription' LIKE "%Blocked%", "blocked", 'event.PatternDispositionDescription' LIKE "%Block%", "blocked", 'event.PatternDispositionDescription' LIKE "%Prevention%", "blocked")
EVAL-description = coalesce('event.DetectDescription', 'event.Description', 'event.RuleDescription')
EVAL-ip = coalesce('event.LocalAddress', 'event.EndpointIp')
EVAL-user = coalesce('event.UserID', 'event.UserId', 'event.UserName')
EVAL-id = coalesce('event.CompositeId', 'event.DetectId', 'event.Id', 'event.operationName')
EVAL-vendor_product = coalesce ('event.SourceProducts', 'Falcon')
EVAL-vendor = coalesce ('event.SourceVendors', 'CrowdStrike')
EVAL-dest = coalesce('event.ComputerName', 'event.Hostname', 'event.SourceEndpointHostName')
EVAL-dest_net_domain = coalesce('event.LogonDomain', 'event.MachineDomain', 'event.SourceAccountDomain')
EVAL-vendor_account = 'metadata.customerIDString'
EVAL-src_type = 'event.DataDomains'
EVAL-signature_id = 'event.PatternId'
EVAL-src = coalesce('event.SourceEndpointIpAddress', 'event.UserIp')
EVAL-type = "event"
FIELDALIAS-file_hash = event.SHA256String ASNEW file_hash
FIELDALIAS-file_name = event.FileName ASNEW file_name
FIELDALIAS-file_path = event.FilePath ASNEW file_path
FIELDALIAS-parent_process = event.ParentCommandLine ASNEW parent_process
FIELDALIAS-parent_process_id = event.ParentProcessId ASNEW parent_process_id
FIELDALIAS-parent_process_name = event.ParentImageFileName ASNEW parent_process_name
FIELDALIAS-process_id = event.ProcessId ASNEW process_id
FIELDALIAS-severity = event.SeverityName ASNEW severity
FIELDALIAS-severity_id = event.Severity ASNEW severity_id
FIELDALIAS-subject = event.DetectDescription ASNEW subject
FIELDALIAS-url = event.FalconHostLink ASNEW url

KV_MODE = json
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true
TIME_PREFIX = eventCreationTime
TIME_FORMAT = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 16
TRUNCATE = 0
category = CrowdStrike Event Streams
pulldown_type = 1