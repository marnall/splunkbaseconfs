[splunk_forwarders_list]
definition = (index=_internal sourcetype=splunkd) | stats values(fwdType) as forwarder_type, latest(version) as version, values(arch) as arch, values(os) as os, max(_time) as last_connected by guid, hostname | convert ctime(last_connected)


[splunk_skipped_search]
definition = (index=_internal sourcetype=scheduler) | stats count as total, count(eval(status="skipped")) as skipped | eval pct=round(((skipped/total)* 100),0) | rangemap field=pct low=0-10, elevated=10-20 severe=20-100 | fields + pct, range


