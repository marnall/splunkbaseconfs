
[arch_reqs]
run_on_startup = true
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
enableSched = 1
search = | rest splunk_server=* /services/server/info  | fields host  version os_name cpu_arch numberOfCores numberOfVirtualCores physicalMemoryMB  | lookup assets.csv host OUTPUT search_group  | eval physicalMemoryGB=round(physicalMemoryMB/1024,2)  | eval requirement_status=case(search_group="dmc_group_indexer" AND (numberOfCores<12 OR physicalMemoryGB<12),"severe",search_group="dmc_group_search_head" AND (numberOfCores<12 OR physicalMemoryGB<16),"severe",1=1,"low") | eval search_group=mvjoin(search_group,"; ") | table host version os_name cpu_arch numberOfCores numberOfVirtualCores physicalMemoryGB  requirement_status search_group | outputlookup arch_reqs.csv


[sourcetypes]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 4,19,34,49 * * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = | tstats  summariesonly=true values(sourcetype) AS sourcetype latest(_time) AS last_indexed where index=* by index\
| mvexpand sourcetype\
| inputlookup append=true sta_all_sourcetypes.csv\
| stats max(last_indexed) AS last_indexed by index sourcetype\
| outputlookup sourcetypes.csv
