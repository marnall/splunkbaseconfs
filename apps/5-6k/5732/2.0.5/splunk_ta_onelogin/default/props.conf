[onelogin:event]
KV_MODE = json
SHOULD_LINEMERGE = false
TZ = UTC
TIME_PREFIX = created_at
LOOKUP-event_types = onelogin_event_type_id id AS event_type_id OUTPUT value AS event_type
LOOKUP-event_names = onelogin_event_name_id id AS event_type_id OUTPUT value AS event_name

[onelogin:user]
KV_MODE = json
SHOULD_LINEMERGE = false
DATETIME_CONFIG = NONE
