[cisco:wsa:systemlogs]
LINE_BREAKER = ([\r\n])
SHOULD_LINEMERGE = false
TIME_FORMAT = %b %e %H:%M:%S
# Don't set TIME_PREFIX by default, because events can have syslog headers in different formats
#TIME_PREFIX = ^[A-Z][a-z][a-z]\s+\d+\s+\d\d:\d\d:\d\d\s+\S+\s+
#TIME_PREFIX = ^
# Don't set TRUNCATE by default, because WSA events should not be larger than default 10000 bytes
#TRUNCATE = 0
# Don't set MAX_TIMESTAMP_LOOKAHEAD by default, because events can have syslog headers in different formats
#MAX_TIMESTAMP_LOOKAHEAD = 16
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n])

KV_MODE = none

# SEDCMD before TRANSFORMS
# need to be done for TCP. For UDP make sure no_priority_stripping=false in inputs.conf is set
#SEDCMD-remove_syslog_pri_prefix = s/^<\d+>//
TRANSFORMS-sourcetyping = sourcetyping_shd

EXTRACT-system_logs_fields = [A-Z][a-z]{2}\s+\d+\s+[\d:]+\s+(?<syslog_host>\S+)\s+(?<log_type>\S+):\s+(?<log_level>\S+):

EXTRACT-cli_audit_command = User (?<user>\S+) entered '(?<cli_command>[^']+)'; prompt was
EXTRACT-cli_audit_batch = User (?<user>\S+) executed batch command: '(?<batch_command>[^']+)'
EXTRACT-cli_audit_login = User (?<user>\S+) (?<vendor_action>login) from (?<src_ip>\S+) on (?<dest>\S+)
EXTRACT-cli_audit_logout = User (?<user>\S+) logged out from session because of inactivity (?<vendor_action>timeout)

EXTRACT-audit_process_starting = The process (?<process>\S+) is (?<vendor_action>start)ing at
EXTRACT-audit_number_of_login_falures = Number of login failures for user is (?<failed_login_number>\d+)
EXTRACT-audit_number_of_login_successes = Number of login success for user is (?<success_login_number>\d+)

EXTRACT-gui_session_expired = Session user:(?<user>\S+) (?<vendor_action>expired)
EXTRACT-gui_action = \sreq:(?<src_ip>\S+) user:(?<user>\S+) (?<http_status>\d+) POST (?<vendor_action>\S+) HTTP/1.1 (?<user_agent>.*)

EXTRACT-proxy_init = (?<vendor_status>initialization complete - proxy running)
EXTRACT-proxy_init_2 = (?<vendor_status>proxy initialization underway)
EXTRACT-proxy_ssl_version = SSL version : CiscoSSL (?<ssl_version>\S+)
EXTRACT-logDiskSizeBytes = device\s+:\[(?<device>[^\]]+).*logDiskSizeBytes :(?<logDiskSizeBytes>\d+)
EXTRACT-proxy_number_of_connections = Total No. of active client connections = (?<active_client_connections>\d+), active server connections = (?<active_server_connections>\d+)

REPORT-extractions = user, interaction_mode, source_ip, destination_ip, event, local_ip, location, comment, new_config, old_config, total_lines, cli_input

EVAL-action = CASE ( action_event = "Successful login", "success", \
                     action_event IN ("Changes successfully committed") OR cli_input="commit", "modified", \
                     action_event IN ("Failed login - No such user.", "Permission denied reason - invalid username or password"), "failure")



[cisco:wsa:prox_track]
LINE_BREAKER = ([\r\n])Current Date:\s
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %a, %e %b %Y %H:%M:%S %Z
TIME_PREFIX = Current Date:\s+
TRUNCATE = 0
category = Custom
disabled = false
pulldown_type = true

REPORT-info2 = involuntary_context_switches, page_faults

REPORT-info_traffic_over_time = info_traffic_over_past_minute, info_traffic_over_past_hour, info_traffic_over_past_day, info_traffic_over_past_week, info_traffic_over_all_time

