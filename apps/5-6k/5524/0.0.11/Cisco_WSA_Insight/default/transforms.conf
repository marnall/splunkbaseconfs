[info_connection_states]
REGEX = ^INFO: (\d+) cli errs, retries: (\d+) pconn, (\d+) reg, (\d+) err, (\d+) close
FORMAT = cli_errs::$1 retries_pconn::$2 retries_reg::$3 retries_err::$4 retries_close::$5

[info_cli_connections]
REGEX = ^INFO: (\d+) / (\d+) / (\d+) / (\d+) / (\d+) / (\d+) / (\d+) sending/resuming/idle/tun/flsh/tot/max cli
FORMAT = sending::$1 resuming::$2 cli_idle::$3 tun::$4 flsh::$5 cli_tot::$6 cli_max::$7

[info_srv_connections]
REGEX = ^INFO: (\d+) / (\d+) / (\d+) / (\d+) / (\d+) cliclose/dispose/redir/idle/tot srv
FORMAT = cliclose::$1 dispose::$2 redir::$3 srv_idle::$4 srv_tot::$5

