[sourcetyping_shd]
#REGEX =  ^\S+\s+\d+\s+[\d:]+\s+\S+\s+\S+\s+\d+\s+[\d:]+\s+\S+\sshd_syslog: Info: Status: CPULd \d
#REGEX =  ^\S+\s+\d+\s+[\d:]+\s+\S+\sshd_syslog: Info: Status: CPULd \d
REGEX =  Info: Status: CPULd \S+ DskUtil \S+ RAMUtil \S+ Reqs
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::cisco:wsa:shd

#[remove_trailblazer_starting_exited]
#REGEX = Info: The process trailblazer exited successfully at|Info: The process trailblazer is starting at
#DEST_KEY = queue
#FORMAT = nullQueue

[info_uptime]
REGEX = INFO: proxy running for (\d+) minutes
FORMAT = uptime_minutes::$1

[user]
REGEX=\sUser: (?<user>[^,]+)

[interaction_mode]
REGEX=Interaction Mode: (?<interaction_mode>[^,]+)

[source_ip]
REGEX=Source IP: (?<src_ip>[^,]+)

[destination_ip]
REGEX=Destination IP: (?<dest_ip>[^,]+)

[event]
REGEX=Event: (?<action_event>[^,]+)

[local_ip]
REGEX=Local IP: (?<local_ip>[^,]+)

[location]
REGEX=Location: (?<action_location>[^,]+)

[comment]
REGEX=with user comment:(?<comment>.*)

[new_config]
REGEX=New Configuration File: (?<new_config_file>[^,]+)

[old_config]
REGEX=Old Configuration File: (?<old_configuration_file>[^,]+)

[total_lines]
REGEX=Total Lines: (?<config_changes_total_lines>\d+)

[cli_input]
REGEX=, Input: '(?<cli_input>[^']+)', Prompt:

#########################
[involuntary_context_switches]
REGEX = ^involuntary context switches: (\d+)$
FORMAT = involuntary_context_switches::$1

[page_faults]
REGEX = ^\s+page faults: (\d+)$
FORMAT = page_faults::$1

#########################


[info_traffic_over_past_minute]
# INFO: traffic over past minute - 0.87 reqs/sec
REGEX = ^INFO: traffic over past minute - ([\d\.]+) reqs
FORMAT = info_traffic_past_min::$1

[info_traffic_over_past_hour]
# INFO: traffic over past hour - 42.60 peak / 2.46 avg reqs/sec
REGEX = ^INFO: traffic over past hour - ([\d\.]+) peak / ([\d\.]+) avg
FORMAT = info_traffic_past_hour_peak::$1 info_traffic_past_hour_avg::$2

[info_traffic_over_past_day]
# INFO: traffic over past day - 208.90 peak / 30.12 avg reqs/sec
REGEX = ^INFO: traffic over past day - ([\d\.]+) peak / ([\d\.]+) avg
FORMAT = info_traffic_past_day_peak::$1 info_traffic_past_day_avg::$2

[info_traffic_over_past_week]
# INFO: traffic over past week - 208.90 peak / 30.10 avg reqs/sec
REGEX = ^INFO: traffic over past week - ([\d\.]+) peak / ([\d\.]+) avg
FORMAT = info_traffic_over_past_week_peak::$1 info_traffic_over_past_week_avg::$2

[info_traffic_over_all_time]
# INFO: traffic over all time - 208.90 peak / 29.42 avg reqs/sec
REGEX = ^INFO: traffic over all time - ([\d\.]+) peak / ([\d\.]+) avg
FORMAT = info_traffic_over_all_time_peak::$1 info_traffic_over_all_time_avg::$2


[info_transparent_ntlmssp_auth]
# INFO: Transparent NTLMSSP Auth: Hits 1309255, Insert 10440, Expire 0, Replaced 0, Collisions 0
REGEX = ^INFO: Transparent NTLMSSP Auth: Hits (\d+), Insert (\d+), Expire \d+, Replaced \d+, Collisions \d+
FORMAT = transp_ntlm_auth_hits::$1 transp_ntlm_auth_insert::$2

[info_basic_auth]
#INFO: Basic Auth: Hits 335, Insert 5, Expire 7, Invalid 0, Replaced 0, Collisions 0
REGEX = ^INFO: Basic Auth: Hits (\d+), Insert (\d+)
FORMAT = basic_auth_hits::$1 basic_auth_insert::$2

[info_negotiate_auth]
#INFO: Negotiate Auth: Hits 0, Insert 0, Replaced 0, Collisions 0
REGEX = ^INFO: Negotiate Auth: Hits (\d+), Insert (\d+)
FORMAT = negotiate_auth_hits::$1 negotiate_auth_insert::$2

[info_authcache]
#INFO: AuthCache: Capacity 8192, Used 71
REGEX = ^INFO: AuthCache: Capacity (\d+), Used (\d+)
FORMAT = authcache_capacity::$1 authcache_used::$2

[info_dns_cache_stats]
# INFO: DNS Cache Stats: Entries 11823, Expire 31172, Hits 3761656, Misses 173698, Reclaims 0
REGEX = ^INFO: DNS Cache Stats: Entries (\d+), Expire (\d+), Hits (\d+), Misses (\d+)
FORMAT = dns_cache_entries::$1 dns_cache_expire::$2 dns_cache_hits::$3 dns_cache_misses::$4


# no need, included in shd log
# INFO: traffic over past minute - 17.30 reqs/sec

[info_system]
# INFO: 1.0 rdy avg, 3 max, 3873 slct, 0 rchck, 1.2 weightavg, 157341872 slct
REGEX = ^INFO: ([\d\.]+) rdy avg, ([\d\.]+) max, ([\d\.]+) slct, ([\d\.]+) rchck, ([\d\.]+) weightavg, (\d+) slct
FORMAT = rdy_avg::$1 system_max::$2 slct::$3 rchck::$4 weightavg::$5 slct_total::$6

[info_user_time]
# user time: 0.229 (0.076%)
REGEX = ^\s*user time: ([\d\.]+)\s+\(([\d\.]+)%
FORMAT = info_user_time::$1 info_user_time_prc::$2

[info_system_time]
# system time: 0.284 (0.095%)
REGEX = ^\s*system time: ([\d\.]+)\s+\(([\d\.]+)%
FORMAT = info_system_time::$1 info_system_time_prc::$2

[info_block_input_operations]
#       block input operations: 50432
REGEX = ^\s* block input operations: (\d+)
FORMAT = block_input_operations::$1

[info_block_output_operations]
#       block output operations: 61128
REGEX = ^\s* block output operations: (\d+)
FORMAT = block_output_operations::$1

# INFO:  30761  noint,  19351  rclr,  853    wclr,  1456633  anyint,  28173  rchg,  1416298  wchg

[shd_log]
# Fri Apr 30 12:56:56 2021 Info: Status: CPULd 2.7 DskUtil 9.3 RAMUtil 32.1 Reqs 13 Band 5435 Latency 30 CacheHit 0 CliConn 469 SrvConn 509 MemBuf 0 SwpPgOut 0 ProxLd 6 Wbrs_WucLd 0.0 LogLd 0.0 RptLd 0.0 WebrootLd 0.0 SophosLd 0.0 McafeeLd 0.0 WTTLd 0.0
REGEX = ([A-Z][a-zA-Z]+) ([\d\.]+)
FORMAT = $1::$2


