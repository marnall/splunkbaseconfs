
[source::...ta-code-dx*.log*]
SHOULD_LINEMERGE = true
sourcetype = tacodedx:log

[source::...ta_code_dx*.log*]
SHOULD_LINEMERGE = true
sourcetype = tacodedx:log

[CSV_Report]
DATETIME_CONFIG = CURRENT
EVAL-cvss = mvdedup(ltrim(split(cvssV3, ","), " "))
EVAL-severity = if(vendor_severity == "Info", "informational", lower(vendor_severity))
EVAL-severity_id = case(vendor_severity == "Critical", 5, vendor_severity == "High", 4, vendor_severity == "Medium", 3, vendor_severity == "Low", 2, vendor_severity == "Info", 1, vendor_severity == "Unspecified", 0)
EVAL-tool = mvdedup(trim(split(vendor_tool, "/"), " "))
EVAL-vendor_product = "Code Dx (" + vendor_tool + ")"
EVAL-xref = "Code Dx (" + projectHierarchy + "): Finding " + id
FIELDALIAS-aob_gen_CSV_Report_alias_1 = location AS url
FIELDALIAS-aob_gen_CSV_Report_alias_2 = cwe AS category_id
FIELDALIAS-aob_gen_CSV_Report_alias_4 = type AS category
FIELDALIAS-aob_gen_CSV_Report_alias_6 = host AS dvc
REPORT-ta_builder_internal_use_table_format_results_for_CSV_Report = ta_builder_internal_use_table_format_results_for_CSV_Report
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
