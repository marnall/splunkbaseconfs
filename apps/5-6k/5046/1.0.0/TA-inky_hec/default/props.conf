[inky:email:hec]
KV_MODE = json
AUTO_KV_JSON = false
INDEXED_EXTRACTIONS = 
TIME_PREFIX = internaldate_utc_seconds":\s+
TIME_FORMAT = %s

FIELDALIAS-inky_cim = data.meta_data.rcpt_to_addresses{} ASNEW recipient, data.meta_data.sender_IP ASNEW src, data.meta_data.dashboard_url ASNEW url, data.meta_data.from_email ASNEW src_user, data.meta_data.subject ASNEW subject, data.inky_analysis.suspicious_details.reason_titles{} ASNEW signature, data.inky_analysis.suspicious_details.reason_htmls{} ASNEW signature_extra, data.inky_analysis.suspicious_details.reason_ids{} ASNEW signature_id, data.meta_data.message_id ASNEW message_id, data.user_data.client_ip ASNEW dest_ip, data.user_data.contact_email AS user
FIELDALIAS-inky_cim2 = src ASNEW src_ip
REPORT-filter_score = inky_filter_score
