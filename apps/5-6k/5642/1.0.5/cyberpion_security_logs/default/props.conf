[cp:actionitem]
AUTO_KV_JSON = false
DATETIME_CONFIG = CURRENT
EVAL-severity = case(urgency=0, "informational", urgency>0 AND urgency<4, "low", urgency>=4 AND urgency<7, "medium", urgency>=7 AND urgency<9, "high", urgency>=9 AND urgency<=10, "critical", 1=1, "unknown")
EVAL-type = "alert"
FIELDALIAS-cpactionitem_asset = asset AS dest
FIELDALIAS-cpactionitem_title = title AS signature
FIELDALIAS-cpactionitem_urgency = urgency AS severity_id
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
category = Custom
pulldown_type = 1
description = Action items from IONIX's Portal
disabled = false

[cp:unlinkedshadowit]
AUTO_KV_JSON = false
DATETIME_CONFIG = CURRENT
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
description = Unlinked Shadow IT from IONIX's Portal
disabled = false
pulldown_type = 1
