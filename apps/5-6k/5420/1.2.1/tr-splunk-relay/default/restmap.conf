
[admin:tr_splunk_relay]
match = /
members = tr_splunk_relay_settings

[admin_external:tr_splunk_relay_settings]
handlertype = python
python.version = python3
handlerfile = tr_splunk_relay_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

# `Health` endpoints.
[script:health]
match                 = /health
script                = api/health.py
scripttype            = persist
handler               = api.health.Health
python.version        = python3
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true


