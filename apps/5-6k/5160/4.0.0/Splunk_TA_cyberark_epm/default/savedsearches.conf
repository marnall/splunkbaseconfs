[CyberArk EPM - API Rate Limit Reached]
description = Alerts when the CyberArk EPM API rate limit is reached. The add-on will automatically retry, but persistent rate limiting may indicate that the API call volume needs to be reduced or the polling interval increased.
search = index=_internal source="*splunk_ta_cyberark_epm_*.log*" ("EPM API rate limit reached" OR "EPM API request timed out") | eval reason=case(match(_raw,"EPM API rate limit reached"), "EPM API rate limit reached", match(_raw,"EPM API request timed out"), "EPM API request timed out") | rex field=source "splunk_ta_cyberark_epm_(?:inbox_events|policy_audit_events|admin_audit_logs)_(?<input>[^.]+)\.log" | stats count as rate_limit_hits earliest(_time) as first_occurrence latest(_time) as last_occurrence values(source) as source by input, reason | eval first_occurrence=strftime(first_occurrence, "%Y-%m-%d %H:%M:%S") | eval last_occurrence=strftime(last_occurrence, "%Y-%m-%d %H:%M:%S") | eval message=reason . " for " . input . ". Splunk will continue ingestion when possible." | where rate_limit_hits > 5
disabled = 1
enableSched = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = input, reason
counttype = number of events
relation = greater than
quantity = 0
action.email.show_password = 0
alert.severity = 1
alert.track = 1
is_visible = 1
