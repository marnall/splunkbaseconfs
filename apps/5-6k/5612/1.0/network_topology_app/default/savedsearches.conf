
[network_topology]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 4 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = intersol_app
request.ui_dispatch_view = search
search = index="topology" sourcetype="csv" \
| rename extracted_Host as Host \
| eval sourceRole = case(Host like "192.168.%", "New York", Host like "200.100.%", "London", Host!="192.168.*" AND  Host!="200.100.*", "Nur-Sultan")\
| eval targetRole= case(cdp_hostname like "NEW-YORK%", "New Your", cdp_hostname like "LONDON%", "London", cdp_hostname!="NEW-YORK%" AND cdp_hostname!="LONDON%", "Nur-Sultan")\
| rex field=Host "(?<subnet>.*)[.]" | eval subnet = subnet.".0" \
| dedup  Host cdp_hostname \
| table Host cdp_hostname cdp_ios cdp_port cdp_product_name HostName Product_Name Serial_Num source sourceRole targetRole Version subnet \
| outputlookup network_topology_all.csv
