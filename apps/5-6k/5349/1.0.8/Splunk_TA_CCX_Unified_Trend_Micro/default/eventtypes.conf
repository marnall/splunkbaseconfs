##Trend Micro Unified##

####Custom Trend Micro Cloudone####

[ccx_trendmicro_cloudone_alert]
search = sourcetype="ccx:trendmicro:cloudone" dataset_name="trendmicro_cloudone_alert" OR title="Scheduled Task Started"
# tags = alert

[ccx_trendmicro_cloudone_change]
search = sourcetype="ccx:trendmicro:cloudone" (dataset_name="trendmicro_cloudone_change" NOT title="Scheduled Task Started") OR ChangeString="*"
# tags = change

[ccx_trendmicro_cloudone_intrusion_detection]
search = sourcetype="ccx:trendmicro:cloudone" OSSEC_Description=* OR EventType IN("PayloadLog","LogInspectionEvent") OR extracted_EventType IN("PayloadLog","LogInspectionEvent") OR (EventType=PacketLog AND (EventType=LogInspectionEvent OR EventType=PayloadLog)) OR (extracted_EventType=PacketLog AND (extracted_EventType=LogInspectionEvent OR extracted_EventType=PayloadLog)) OR (EventType=WebReputationEvent AND RiskString=*) OR (extracted_EventType=WebReputationEvent AND RiskString=*) NOT (eventtype="ccx_trendmicro_cloudone_malware" OR signature="An account was successfully logged on.")
# tags = attack ids

[ccx_trendmicro_cloudone_inventory]
search = sourcetype="ccx:trendmicro:cloudone" dataset_name="trendmicro_cloudone_inventory" OR signature_id=582
# tags = inventory network user

[ccx_trendmicro_cloudone_malware]
search = sourcetype="ccx:trendmicro:cloudone" (EventType="AntiMalwareEvent" OR extracted_EventType="AntiMalwareEvent")
# tags = attack malware

[ccx_trendmicro_cloudone_packet_log]
search = sourcetype="ccx:trendmicro:cloudone" (EventType="PacketLog" OR extracted_EventType="PacketLog")

[ccx_trendmicro_cloudone_policy]
search = sourcetype="ccx:trendmicro:cloudone" dataset_name="trendmicro_cloudone_policy"

[ccx_trendmicro_cloudone_system]
search = sourcetype="ccx:trendmicro:cloudone" (dataset_name="trendmicro_cloudone_system" OR EventType="SystemEvent" OR extracted_EventType="SystemEvent")

####END Trend Micro Cloudone custom####
