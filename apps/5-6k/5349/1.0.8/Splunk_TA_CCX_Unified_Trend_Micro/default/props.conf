EVAL-dest_ip = coalesce(dst,c6a3)
EVAL-dest_host = case((isnotnull(shost) AND isnull(dhost)),shost,(isnull(shost) AND isnotnull(dhost)),dhost)
EVAL-user = 'x_useraccount'
EVAL-url = if(isnotnull(request),'request',null())
EVAL-product = 'vendor_mgmt_product'
EVAL-vendor_product = ""+tostring(cef_vendor).":"+tostring(cef_product).":Sandbox Detection:"+tostring(deviceFacility).""
