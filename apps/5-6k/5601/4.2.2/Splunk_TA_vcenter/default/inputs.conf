#Please uncomment below stanza to receive events using Syslog
#[tcp://1517]
#connection_host = dns
#index = vmware-vclog
#sourcetype = vclog
#disabled = 0

#Please set disabled=0 for monitoring below log paths in local folder

[monitor:///var/log/vmware/vpxd]
blacklist = (.*(gz)$)|(\\drmdump\\.*)
disabled = 1
index = vmware-vclog

[monitor:///var/log/vmware/perfcharts]
disabled = 1
index = vmware-vclog
