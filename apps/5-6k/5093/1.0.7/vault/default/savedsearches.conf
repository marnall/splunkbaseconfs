[Token counts details]
description = Number of current tokens grouped by cluster, namespace, and policy
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = bar
display.visualizations.show = 0
request.ui_dispatch_app = vault
request.ui_dispatch_view = search
search = | mstats latest(vault.token.count.by_policy.value) AS count WHERE `vault_telemetry` BY cluster,namespace,policy span=10m\
| stats sum(count) as count by _time,cluster,namespace,policy\
| eventstats latest(_time) as latesttime\
| where _time == latesttime\
| append [makeresults 1 | eval policy="root", count=0]\
| stats max(count) as num_tokens by cluster,namespace,policy\
| sort - num_tokens

[Errors by time]
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = visualizations
display.page.search.tab = visualizations
display.statistics.show = 0
display.visualizations.charting.chart = line
request.ui_dispatch_app = vault
request.ui_dispatch_view = search
search = `vault_audit_log` type="response" error != "" | fields error request.path | rex mode=sed field=error "s/.* error occurred://" | timechart span=30m count BY error

[latency by operation]
description = Time to handle each operation, by mount point
search = | mstats mean(vault.route.*.mean) AS raw_latency.* where `vault_telemetry` AND cluster=* BY metric_name span=1m\
| eval temp=split(metric_name, "."), operation=mvindex(temp,2), mount=mvindex(temp,3)\
| where operation != "rollback" and operation != "revoke"\
| foreach raw_latency* \
    [eval latency=coalesce(latency,'<<FIELD>>')]\
| strcat mount ":" operation path\
| timechart bins=1000 mean(latency) by path

[operation count]
description = Number of operations per mount point.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = visualizations
display.page.search.mode = fast
display.page.search.tab = visualizations
display.statistics.show = 0
display.visualizations.charting.chart = line
request.ui_dispatch_app = vault
request.ui_dispatch_view = search
search = | mstats sum(vault.route.*.count) AS raw_count.* where `vault_telemetry` AND cluster=* BY metric_name span=1m\
| eval temp=split(metric_name, "."), operation=mvindex(temp,2), mount=mvindex(temp,3)\
| where operation != "rollback" and operation != "revoke"\
| foreach raw_count* \
    [eval count=coalesce(count,'<<FIELD>>')]\
| strcat mount ":" operation path\
| timechart bins=1000 sum(count) by path
