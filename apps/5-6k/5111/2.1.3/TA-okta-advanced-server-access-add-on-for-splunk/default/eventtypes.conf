[ASA Human User Login]
search = "details.actor.user_type"=human "details.session_type"=authenticated_client

[ASA Service User Login]
search = "related_objects.user{}.user_type"=service

[ASA SSH Login]
search = "details.type"="server.ssh_login" "details.ssh_algorithm"="RSA-CERT"

[ASA RDP Login]
search = "details.x509_key_fingerprint"="*"

[ASA Client Enrollment]
search = type="client.enroll"

[ASA Client Unenrollment]
search = type="client.remove"

[ASA Preauthorization Created]
search = "details.type"="preauthorization.create"

[ASA Server Project Reassignment]
search = type="server.reassign"

[ASA Server Enrollment]
search = type="server.enroll"

[ASA Project Modifications]
search = "details.type"="project.*"

[Non-ASA SSH Login]
search = "details.type"="server.ssh_login" NOT "details.ssh_algorithm"="RSA-CERT"

[ASA Project Creation]
search = "details.type"="project.create"

[ASA User Deletion]
search = "details.type"="user.update" "details.target_user.status"=DELETED

