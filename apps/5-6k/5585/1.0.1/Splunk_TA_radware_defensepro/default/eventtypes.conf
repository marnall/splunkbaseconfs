[radware_dp]
search = sourcetype=radware:defensepro
#tags = network communicate ids

[radware_dp_authentication]
search = sourcetype=radware:defensepro ("logged in" OR "Login failed")
#tags = authentication

[radware_dp_attack]
search = sourcetype=radware:defensepro signature="*"
#tags = attack

[radware_dp_default_privilege]
search = sourcetype=radware:defensepro radware (src_user=radware OR dest_user=radware)
disabled = 0

[radware_dp_change]
search = sourcetype="radware:defensepro" Configuration OR COMMAND OR Auditing NOT "Configuration Download has been completed"
disabled = 0

[radware_dp_account_locked]
search = sourcetype=radware:defensepro "Login locked"
disabled = 0