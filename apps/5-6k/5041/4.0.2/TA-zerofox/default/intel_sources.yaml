    legacy_modular_input: zfox_cti_ransomware
    legacy_python_module: input_module_zfox_cti_ransomware
    default_interval_seconds: 3600
    epoch_parser: iso_z

  vulnerabilities:
    title: ZeroFox CTI Vulnerabilities
    sourcetype: zerofox:cti:vulnerabilities
    path: /cti/vulnerabilities/
    date_param: updated_after
    date_field: updated_at
    default_lookback:
      hours: 120
    legacy_modular_input: zfox_cti_vulnerabilities
    legacy_python_module: input_module_zfox_cti_vulnerabilities
    default_interval_seconds: 3600
