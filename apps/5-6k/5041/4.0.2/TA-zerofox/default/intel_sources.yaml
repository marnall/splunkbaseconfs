    default_interval_seconds: 3600
    epoch_parser: iso_z

  malware:
    title: ZeroFox CTI Malware
    sourcetype: zerofox:cti:malware
    path: /cti/malware/
    date_param: created_after
    date_field: created_at
    default_lookback:
      hours: 72
    legacy_modular_input: zfox_cti_malware
    legacy_python_module: input_module_zfox_cti_malware
    default_interval_seconds: 30
    epoch_parser: iso_z

  phishing:
    title: ZeroFox CTI Phishing
    sourcetype: zerofox:cti:phishing
    path: /cti/phishing/
