# Canonical CTI feed definitions for the UCC migration.
# Derived from TA-zerofox/bin/input_module_zfox_cti_*.py, default/props.conf, and default/inputs.conf.
# Alerts (input_module_zfox.py) are intentionally out of scope for this file until a later phase.

schema_version: 1

sources:
  botnet:
    title: ZeroFox CTI Botnet
    sourcetype: zerofox:cti:botnet
    path: /cti/botnet/
    date_param: listed_after
    date_field: listed_at
    default_lookback:
      hours: 72
    legacy_modular_input: zfox_cti_botnet
    legacy_python_module: input_module_zfox_cti_botnet
    default_interval_seconds: 3600
    epoch_parser: iso_z

  botnet_credentials:
    title: ZeroFox CTI Botnet Compromised Credentials
    sourcetype: zerofox:cti:botnet:credentials
    path: /cti/botnet-compromised-credentials/
    date_param: created_after
    date_field: created_at
    default_lookback:
      days: 30
    legacy_modular_input: zfox_cti_botnet_credentials
    legacy_python_module: input_module_zfox_cti_botnet_credentials
    default_interval_seconds: 3600
    epoch_parser: strip_subsecond
    filters:
      email_domain: impacted_domain

  c2_domains:
    title: ZeroFox CTI C2 Domains
    sourcetype: zerofox:cti:c2domains
    path: /cti/c2-domains/
    date_param: created_after
    date_field: created_at
    default_lookback:
      hours: 72
    legacy_modular_input: zfox_cti_c2_domains
    legacy_python_module: input_module_zfox_cti_c2_domains
    default_interval_seconds: 3600
    epoch_parser: iso_z

  credentials:
    title: ZeroFox CTI Compromised Credentials
    sourcetype: zerofox:cti:credentials
    path: /cti/compromised-credentials/
    date_param: created_after
    date_field: created_at
    default_lookback:
      days: 30
    legacy_modular_input: zfox_cti_credentials
    legacy_python_module: input_module_zfox_cti_credentials
    default_interval_seconds: 3600
    epoch_parser: strip_subsecond
    filters:
      email_domain: domain

  credit_cards:
    title: ZeroFox CTI Credit Cards
    sourcetype: zerofox:cti:creditcards
    path: /cti/credit-cards/
    date_param: created_after
    date_field: created_at
    default_lookback:
      hours: 72
    legacy_modular_input: zfox_cti_credit_cards
    legacy_python_module: input_module_zfox_cti_credit_cards
    default_interval_seconds: 3600
    epoch_parser: iso_z

  disruption:
    title: ZeroFox CTI Disruption
    sourcetype: zerofox:cti:disruption
    path: /cti/disruption/
    date_param: created_after
    date_field: created_at
    default_lookback:
      hours: 24
    legacy_modular_input: zfox_cti_disruption
    legacy_python_module: input_module_zfox_cti_disruption
    default_interval_seconds: 3600
    epoch_parser: iso_z

  indicators:
    title: ZeroFox CTI Indicators
    sourcetype: zerofox:cti:indicators
    path: /cti/indicators/
    date_param: last_modified_after
    date_field: last_seen
    default_lookback:
      days: 30
    legacy_modular_input: zfox_cti_indicators
    legacy_python_module: input_module_zfox_cti_indicators
    default_interval_seconds: 3600
    epoch_parser: iso_z
    extra_query_params:
      ordering: last_seen

  exploits:
    title: ZeroFox CTI Exploits
    sourcetype: zerofox:cti:exploits
    path: /cti/exploits/
    date_param: created_after
    date_field: created_at
