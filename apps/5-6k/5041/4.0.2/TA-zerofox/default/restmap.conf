[admin:TA_zerofox_configuration]
match = /
members = TA_zerofox_account, TA_zerofox_settings

[admin:TA_zerofox_inputs]
match = /
members = TA_zerofox_zerofox_alerts, TA_zerofox_zerofox_intel

[admin_external:TA_zerofox_account]
handlertype = python
python.version = python3
python.required = 3.9
handlerfile = TA_zerofox_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_zerofox_settings]
handlertype = python
python.version = python3
python.required = 3.9
handlerfile = TA_zerofox_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_zerofox_zerofox_intel]
handlertype = python
python.version = python3
python.required = 3.9
handlerfile = TA_zerofox_rh_zerofox_intel.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_zerofox_zerofox_alerts]
handlertype = python
python.version = python3
python.required = 3.9
handlerfile = TA_zerofox_rh_zerofox_alerts.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
