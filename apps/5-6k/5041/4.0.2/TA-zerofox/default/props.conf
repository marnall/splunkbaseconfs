# Props for ZeroFox sourcetypes.
# TRUNCATE = 0  — no size limit; ZeroFox events can be large (ransomware
#                 records exceed 25 KB). Matches legacy TA-zerofox behavior.
# TIMESTAMP_FIELDS — tells Splunk which JSON field carries the event timestamp
#                    so events are indexed at the right time, not ingest time.

# Route TA internal log files to a dedicated sourcetype, matching legacy behavior.
[source::...ta-zerofox*.log*]
sourcetype = tazerofox:log

[source::...ta_zerofox*.log*]
sourcetype = tazerofox:log

[zfox]
TRUNCATE = 0
KV_MODE = json
SHOULD_LINEMERGE = false
TIMESTAMP_FIELDS = last_modified

[zerofox:cti:botnet]
