# Workflow actions for TA-zerofox.
# Adds a context-menu link on ZeroFox alert events that opens the alert
# directly in the ZeroFox cloud portal.
#
# Note: $@field_value$ is a field_menu-only token and cannot be used here.
# In event_menu context, field values are referenced by $fieldname$ directly.

[ZeroFox Alert]
type           = link
display_location = event_menu
eventtypes     = zerofox_alerts
fields         = id
label          = View in ZeroFox
link.method    = get
link.target    = blank
link.uri       = https://cloud.zerofox.com/alerts/$id$
