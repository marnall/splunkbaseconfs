#
# Splunk app configuration file
#

[install]
is_configured = 0

[package]
id = kaggle_app

[ui]
is_visible = 1
label = Kaggle App
setup_view = setup_page_dashboard

[launcher]
author = Lukas Utz <lutz@splunk.com>
description = The Splunk Kaggle App lets you interact with Kaggles API and use most of the available endpoints - using plain SPL and with almost the same syntax than with the Kaggle CLI. Using the 'kaggle' search command, one can find and check datasets and challenges in Kaggle and directly download the contained data to use it within Splunk.
version = 1.0.3

[triggers]
reload.kaggle = simple
reload.passwords = simple
