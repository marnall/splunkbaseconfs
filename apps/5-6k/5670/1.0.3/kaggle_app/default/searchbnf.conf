[kaggle-command]
syntax = kaggle (<kaggle-options>)*
description = Splunk search command to interact with the Kaggle API, view competitions and/or download datasets or kernels. Syntax is very much comparable to Kaggles' CLI syntax.
shortdesc = Use the kaggle command to get data from kaggle.com
example1 = | kaggle competitions list
usage = public

[kaggle-options]
syntax = competitions | datasets | kernels
description = Use the kaggle command with subcommands like competitions, datasets or kernels to interact with the Kaggle API. Check out the "Documentation" dashboard for examples.
