[getactivuactions-command]
syntax = | getactivuactions <getactivuactions-options>
shortdesc = Pulling actions from Activu REST API
description = Generating command to pull actions from Activu REST API.
usage = public
example1 = | getactivuactions
comment1 = Embedded command for Activu app, optional parameters are set up by Activu engineers

[getactivuactions-options]
syntax = (proxies=(http://proxy, https://proxy))? | (unsetProxy=<bool>)?
