[validation:savedsearch]
action.Activu = case('action.Activu' != "1", null())
action.Activu.param.base_url = validate( match('action.Activu.param.base_url', "^https?://[^\s]+$"), "Activu URL is invalid")
action.Activu.param.alert_name = validate( 'action.Activu.param.alert_name' != "", "Activu Alert is not defined")
