# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = Leonardo Armesto
version = 1.0.0
description = Mambu Audit Trail Collector enables a 360-degree view of all user activities that have been performed in the Mambu system. These activities are of two types: User Interface and API calls and offer a great way to understand what the users are doing and how they are using the Mambu application.

[ui]
is_visible = 1
label = Mambu Audit Trail Collector
docs_section_override = AddOns:released

[package]
id = TA-mambu-audit-trail-collector

[triggers]
reload.addon_builder = simple
reload.ta_mambu_audit_trail_collector_account = simple
reload.ta_mambu_audit_trail_collector_settings = simple
reload.passwords = simple

