[alert_source_aws_billing]
action.email = 0
action.email.inline = 1
action.email.sendcsv = 1
action.email.sendresults = 1
action.email.subject = Alert: $name$ $action.email.hostname$ $result.assemblyId$
alert.digest_mode = false
allow_skew = 1h
counttype = number of events
cron_schedule = 0 14 * * *
description = Send an email when aws_billing assembly event count and digest event count are different.
disabled = 1
dispatch.earliest_time = -mon@mon
dispatch.latest_time = +1d
enableSched = 1
quantity = 0
realtime_schedule = 0
relation = greater than
search = `aws_billing_index` sourcetype=aws:billing:cur \
    [ search `aws_billing_index` sourcetype=aws:billing:cur:digest earliest=-2d latest=-1d \
    | eval source = "s3://*/" . assemblyId . "/*.csv.gz" \
    | fields source ] \
| rex field=source "s3://(?<s3_bucket>[^/]+)/.*/(?<assemblyId>[^/]+)/[^/]+.csv.gz" \
| stats count AS index_eventCount BY s3_bucket assemblyId txid \
| join assemblyId txid \
  [ search `aws_billing_index` sourcetype=aws:billing:cur:digest earliest=-2d latest=-1d \
    | rename eventCount AS digest_eventCount \
    | fields assemblyId digest_eventCount txid ] \
| eval diff_index_to_digest = index_eventCount - digest_eventCount \
| where index_eventCount != digest_eventCount

[alert_summary_aws_billing]
action.email = 0
action.email.inline = 1
action.email.sendcsv = 1
action.email.sendresults = 1
action.email.subject = Alert: $name$ $action.email.hostname$ $result.assemblyId$ $result.source$
alert.digest_mode = false
alert.suppress = 1
alert.suppress.period = 7d
alert.suppress.fields = assemblyId,source
allow_skew = 1h
counttype = number of events
cron_schedule = 0 6 * * *
description = Alert when CUR summaries are missing for a given CUR
disabled = 1
dispatch.earliest_time = -1mon@mon
dispatch.latest_time = now
enableSched = 1
quantity = 0
realtime_schedule = 0
relation = greater than
search = `index=aws_summary_index` source=summary_aws_cur* date_mday=1 \
  [ | inputlookup aws_cur_assemblies where source=raw \
    | eval earliest = now() - (86400 * 2), latest = now() - 86400 \
    | where assembly_time > earliest AND assembly_time < latest \
    | fields assemblyId ] \
| stats latest(_time) BY assemblyId date_range source \
| eval marker=1 \
| append \
  [ | inputlookup aws_cur_assemblies where source=raw \
    | eval earliest = now() - (86400 * 2), latest = now() - 86400 \
    | where assembly_time > earliest AND assembly_time < latest \
    | eval source=split("summary_aws_cur,summary_aws_cur_monthly") \
    | mvexpand source \
    | eval digest_time = formatted_assembly_time \
    | eval marker=2 \
    | fields assemblyId date_range digest_time marker source ] \
| stats sum(marker) AS marker values(digest_time) AS digest_time BY source date_range assemblyId \
| where marker == 2

[alert_summary_aws_billing_comparison]
action.email = 0
action.email.inline = 1
action.email.sendcsv = 1
action.email.sendresults = 1
action.email.subject = Alert: $name$ $action.email.hostname$ $result.assemblyId$ $result.source$
alert.digest_mode = false
alert.suppress = 1
alert.suppress.period = 7d
alert.suppress.fields = assemblyId
allow_skew = 100%
counttype = number of events
cron_schedule = 0 0 * * *
description = Alert when costs for a summary dont match costs in raw CUR
disabled = 1
dispatch.earliest_time = -1mon@mon
dispatch.latest_time = +mon@mon
enableSched = 1
quantity = 0
realtime_schedule = 0
relation = greater than
search = (`aws_summary_index` \
  [ | inputlookup aws_cur_assemblies where source=summary_aws_cur* \
	| where summary_time > now() - 86400 \
	| fields source assemblyId ] ) \
OR (`aws_billing_index` sourcetype=aws:billing:cur \
  [ | inputlookup aws_cur_assemblies where source=raw \
    [ | inputlookup aws_cur_assemblies where source=summary_aws_cur* \
      | where summary_time > now() - 86400 \
      | dedup assemblyId \
      | fields assemblyId ] \
	| eval source = "*/" . assemblyId . "/*" \
	| fields txid source ] ) \
| rex field=source "/(?<date_range>\d+-\d+)/(?<assemblyId>[^/]+)/" \
| eval search_type = case( \
  like(source, "summary_aws_cur%"), source, \
  sourcetype == "aws:billing:cur", "cur") \
| eval total_cost = coalesce(sum_UnblendedCost, lineItem_UnblendedCost) \
| chart sum(total_cost) AS total_cost BY assemblyId search_type \
| where isnotnull('total_cost: cur') AND isnotnull('total_cost: summary_aws_cur') \
| eval diff_cur_to_summary = 'total_cost: cur' - 'total_cost: summary_aws_cur' \
| eval diff_cur_to_summary_monthly = 'total_cost: cur' - 'total_cost: summary_aws_cur_monthly' \
| eval threshold = 100 \
| where abs(diff_cur_to_summary) > threshold \
  OR abs(diff_cur_to_summary_monthly) > threshold

[lookup_aws_cur_assemblies]
action.lookup = 1
action.lookup.filename = aws_cur_assemblies.csv
allow_skew = 30m
cron_schedule = 0 1-23/3 * * *
# earliest time here needs to match the earliest date range we're willing to consider in `get_next_cur_to_summarize`
dispatch.earliest_time = -3mon@mon
dispatch.latest_time = now
search = `aws_summary_index` source=summary_aws_cur* _index_earliest=-24h \
| fillnull value="null" account assembly_time summary_time \
| stats count BY account assembly_time assemblyId date_range source summary_time \
| eval formatted_assembly_time = strftime(assembly_time, "%c") \
| eval formatted_summary_time = strftime(summary_time, "%c") \
| fields account assemblyId assembly_time date_range formatted_assembly_time formatted_summary_time source summary_time \
| inputlookup append=t aws_cur_assemblies \
| sort 0 - date_range assembly_time summary_time \
| dedup assemblyId date_range source

[lookup_aws_cur_assemblies_raw]
action.lookup = 1
action.lookup.filename = aws_cur_assemblies.csv
allow_skew = 30m
cron_schedule = 0 1-23/3 * * *
dispatch.earliest_time = -mon@mon
dispatch.latest_time = now
search = `aws_billing_index` sourcetype=aws:billing:cur:digest _index_earliest=-24h \
| rex field=source "/(?<date_range>\d+-\d+)/" \
| eval assembly_time = strptime(lastModified, "%Y-%m-%dT%H:%M:%S") \
| eval formatted_assembly_time = strftime(assembly_time, "%c") \
| eval summary_time = "none" \
| eval formatted_summary_time = "none" \
| eval source = "raw" \
| table account assemblyId assembly_time date_range formatted_assembly_time formatted_summary_time source summary_time txid \
| inputlookup append=t aws_cur_assemblies \
| sort 0 - date_range assembly_time summary_time \
| dedup assemblyId date_range source

[summary_aws_cur]
action.summary_index = 1
action.summary_index._name = summary
allow_skew = 1h
cron_schedule = 0 5-23/6 * * *
dispatch.earliest_time = -mon@mon
dispatch.latest_time = +mon@mon
realtime_schedule = 0
search = `get_next_cur_to_summarize(summary_aws_cur)` \
| rex field=source "/(?<date_range>\d+-\d+)/(?<assemblyId>[^/]+)/" \
| eval account = bill_PayerAccountId \
| eval original_time = _time \
| eval summary_time = now() \
| bin span=1d _time \
| `summarize_aws_cur`

[summary_aws_cur_monthly]
action.summary_index = 1
action.summary_index._name = summary
allow_skew = 1h
cron_schedule = 0 5-23/6 * * *
dispatch.earliest_time = -mon@mon
dispatch.latest_time = +mon@mon
realtime_schedule = 0
search = `get_next_cur_to_summarize(summary_aws_cur_monthly)` \
| rex field=source "/(?<date_range>(?<start_date>\d+)-\d+)/(?<assemblyId>[^/]+)/" \
| eval account = bill_PayerAccountId \
| eval original_time = _time \
| eval summary_time = now() \
| eval _time = strptime(start_date, "%Y%m%d") \
| `summarize_aws_cur`
