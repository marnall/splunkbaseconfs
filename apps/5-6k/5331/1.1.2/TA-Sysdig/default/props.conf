[SysdigActivityAudit]
SHOULD_LINEMERGE = false
DATETIME_CONFIG = CURRENT
KV_MODE = JSON
EVAL-event_source=case(isnotnull(clientIpv4) AND isnotnull(serverIpv4),"Network",isnotnull(comm) AND isnotnull(cwd),"Command",isnotnull(filename) AND isnotnull(directory),"Filesystem",isnotnull(name) AND isnotnull(resource),"Kubernetes")
# CIM field alias:
# Network connection
EVAL-transport=case(l4protocol==6,"tcp",l4protocol==17,"udp",l4protocol==1,"icmp",isnotnull(l4protocol),"other")
EVAL-direction=case(direction=="out","outbound",direction=="in","inbound")
EVAL-vendor_product=case(isnotnull(clientIpv4) AND isnotnull(serverIpv4),"Sysdig")
EVAL-dvc = if(hostname=="","-",hostname)
EVAL-src_ip = case(isnotnull(clientIpv4) AND isnotnull(serverIpv4),case(clientIpv4=="","-",true(),tostring(floor(clientIpv4/pow(256,3)))+"."+tostring(floor((clientIpv4-((floor(clientIpv4/pow(256,3)))*pow(256,3)))/pow(256,2)))+"."+tostring(floor(((clientIpv4-((floor(clientIpv4/pow(256,3)))*pow(256,3)))-floor((clientIpv4-((floor(clientIpv4/pow(256,3)))*pow(256,3)))/pow(256,2))*pow(256,2))/pow(256,1)))+"."+tostring(clientIpv4-(floor(clientIpv4/pow(256,3))*pow(256,3)+floor((clientIpv4-((floor(clientIpv4/pow(256,3)))*pow(256,3)))/pow(256,2))*pow(256,2)+floor(((clientIpv4-((floor(clientIpv4/pow(256,3)))*pow(256,3)))-floor((clientIpv4-((floor(clientIpv4/pow(256,3)))*pow(256,3)))/pow(256,2))*pow(256,2))/pow(256,1))*256))))
EVAL-dest_ip = case(isnotnull(clientIpv4) AND isnotnull(serverIpv4),case(clientIpv4=="","-",true(),tostring(floor(serverIpv4/pow(256,3)))+"."+tostring(floor((serverIpv4-((floor(serverIpv4/pow(256,3)))*pow(256,3)))/pow(256,2)))+"."+tostring(floor(((serverIpv4-((floor(serverIpv4/pow(256,3)))*pow(256,3)))-floor((serverIpv4-((floor(serverIpv4/pow(256,3)))*pow(256,3)))/pow(256,2))*pow(256,2))/pow(256,1)))+"."+tostring(serverIpv4-(floor(serverIpv4/pow(256,3))*pow(256,3)+floor((serverIpv4-((floor(serverIpv4/pow(256,3)))*pow(256,3)))/pow(256,2))*pow(256,2)+floor(((serverIpv4-((floor(serverIpv4/pow(256,3)))*pow(256,3)))-floor((serverIpv4-((floor(serverIpv4/pow(256,3)))*pow(256,3)))/pow(256,2))*pow(256,2))/pow(256,1))*256))))
FIELDALIAS-clientPort = clientPort AS src_port
FIELDALIAS-serverPort = serverPort AS dest_port
# Command event , FileSystem and Kubernetes
EVAL-process = coalesce(if('args.command'=="","-",'args.command'), if(cmdline=="","-",cmdline))
# Command event and FileSystem
EVAL-process_name = if(comm=="","-",comm)
FIELDALIAS-pid = pid AS process_id  
# Command event
FIELDALIAS-ppid = ppid AS parent_process_id
FIELDALIAS-cwd = cwd AS process_current_directory
FIELDALIAS-uid = uid AS user_id
# FileSystem
EVAL-file_path = directory.filename
FIELDALIAS-filename = filename AS file_name
FIELDALIAS-permissions = permissions AS file_acl
# Kubernetes
FIELDALIAS-username = "user.username" AS user 

[SysdigAuditTap]
SHOULD_LINEMERGE = false
DATETIME_CONFIG = CURRENT
KV_MODE = JSON

EVAL-event_source="Audit Tap"
EVAL-src_port = coalesce(connectionAudit.connections{}.serverPort,connectionEvents{}.serverPort)
EVAL-dest_port = coalesce(connectionAudit.connections{}.clientPort,connectionEvents{}.clientPort)
#CIM field alias (connectionAudit):
FIELDALIAS-bytes_in = connectionAudit.connections{}.byteCounts.in AS bytes_in
FIELDALIAS-bytes_out = connectionAudit.connections{}.byteCounts.out AS bytes_out
FIELDALIAS-bytes_total = connectionAudit.connections{}.byteCounts.total AS bytes
FIELDALIAS-serverpid = connectionAudit.connections{}.serverPid as process_id

#CIM field alias (connectionEvents):
FIELDALIAS-connectionEvents_status=connectionEvents{}.status AS conn_event_status
FIELDALIAS-connectionEvents_clientIpv4=connectionEvents{}.clientIpv4 AS conn_event_client_ipv4
FIELDALIAS-connectionEvents_serverIpv4=connectionEvents{}.serverIpv4 AS conn_event_server_ipv4
FIELDALIAS-newProcessEvents_name=newProcessEvents{}.name AS new_process_name
FIELDALIAS-newProcessEvents_commandLine=newProcessEvents{}.commandLine{} AS new_process_command_line
FIELDALIAS-newProcessEvents_pid=newProcessEvents{}.pid AS new_process_id
FIELDALIAS-newProcessEvents_parentPid=newProcessEvents{}.parentPid AS new_process_parent_pid
FIELDALIAS-newProcessEvents_containerId=newProcessEvents{}.containerId AS new_process_container_id
FIELDALIAS-connectionEvents_clientPort=connectionEvents{}.clientPort AS conn_event_client_port
FIELDALIAS-connectionEvents_serverPort=connectionEvents{}.serverPort AS conn_event_server_port
FIELDALIAS-connectionEvents_errorCode=connectionEvents{}.errorCode AS error_code