[SysdigPolicy]
SHOULD_LINEMERGE = false
DATETIME_CONFIG = CURRENT
KV_MODE = JSON
TRUNCATE = 9999999

#field extractions from legacy policy events for the dashboard 
EXTRACT-extracted_fields = "fields":\[(?<extracted_fields>.+)\]\,"eventLabels":
EVAL-extracted_fields = split(replace(extracted_fields, "},{", "}@|{"),"@|")
EXTRACT-extracted_eventlabels = "eventLabels":\[(?<extracted_eventlabels>.+)\]\,"falsePositive":
EVAL-extracted_eventlabels = split(replace(extracted_eventlabels, "},{", "}@|{"),"@|")

# field extractions from runtime policy events for the dashboard
EXTRACT-extracted_content_fields = "fields":\{(?<extracted_content_fields>.+)\},"falsePositive":
EVAL-extracted_content_fields= split(extracted_content_fields,",") 
EXTRACT-extracted_labels = "labels":\{(?<extracted_labels>.+)\}\}
EVAL-extracted_labels = split(extracted_labels,",")


#Field mapping of runtime and legacy policy events
FIELDALIAS-policyId = "content.policyId" ASNEW policyId

#CIM field alias For runtime and legacy policy events:
FIELDALIAS-body = "content.output" ASNEW body output ASNEW body
EVAL-description = coalesce(output, 'content.output')
FIELDALIAS-severity = severity AS severity_id
FIELDALIAS-name = name AS subject
FIELDALIAS-signature = name AS signature
EVAL-type="event"
EVAL-severity=case(severity_id==0 OR severity_id==1 OR severity_id==2 OR severity_id==3,"High",severity_id==4 OR severity_id==5,"Medium",severity_id==6,"Low",severity_id==7,"Info")
EVAL-event_source="Policy"

