[intelact:app]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[source::...intelact_app*.log*]
SHOULD_LINEMERGE = true
sourcetype = intelact:app:log

[incidents]
TIME_PREFIX="published":\s*
TIME_FORMAT=%Y-%m-%dT%H:%M:%S.%f%Z
FIELDALIAS-comments = title AS comments
FIELDALIAS-status = review.status AS status
FIELDALIAS-ticket_id = id AS ticket_id
EVAL-time_submitted = strptime(occurred, "%Y-%m-%dT%H:%M:%S.%f%Z")
EVAL-user = case((type="DATA_LEAKAGE" AND subType="CREDENTIAL_COMPROMISE"), $review.user.fullName$)
EVAL-dest_host =case(((type="DATA_LEAKAGE" AND subType="CREDENTIAL_COMPROMISE") or (type="INFRASTRUCTURE" AND subType="DOMAIN_CERTIFICATE_ISSUE") or (type="DATA_LEAKAGE" and like(subType, "%MARKED_DOCUMENT"))), $entitySummary.domain$, ((type="BRAND_PROTECTION" AND subType="PHISHING_ATTEMPT")), $entitySummary.source$)
REPORT-tmp_src_port = tmp_src_port
EVAL-src_port = case((type="INFRASTRUCTURE" AND subType="EXPOSED_PORT"), tmp_src_port)
EVAL-risk_score = case(((type="DATA_LEAKAGE" AND like(subType,"%MARKED_DOCUMENT")) or (type="BRAND_PROTECTION" AND subType="PHISHING_ATTEMPT")), case(severity == "VERY_HIGH", 90, severity == "HIGH", 70, severity == "MEDIUM", 50, severity=="LOW",30, severity=="VERY_LOW",10, severity=="NONE", 0))
EVAL-src = case((type="INFRASTRUCTURE" AND subType="EXPOSED_PORT"), $entitySummary.source$)
REPORT-temp_esource = temp_esource
EXTRACT-tmp_cveno = CVE Number:\s*(?<tmp_cveno>\w*-[\d*-]*\d*) in description
REPORT-tmp_exploits = tmp_exploits
EXTRACT-tmp_cvss = CVSS Score:\s*(?<tmp_cvss>\d+\.\d+|\d*) in description
EVAL-dest_ip = case((type="INFRASTRUCTURE" AND subType="CVE"), $entitySummary.source$, (type="DATA_LEAKAGE" AND like(subType, "%MARKED_DOCUMENT")), temp_esource)
EVAL-cve = case((type="INFRASTRUCTURE" AND subType="CVE"), tmp_cveno)
EVAL-signature = case((type="INFRASTRUCTURE" AND subType="CVE"), tmp_exploits)
EVAL-cvss = case((type="INFRASTRUCTURE" AND subType="CVE"), tmp_cvss)
EVAL-url = case(((type="DATA_LEAKAGE" AND subType="CUSTOMER_DETAILS") or (type="DATA_LEAKAGE" AND subType="TECHNICAL_LEAKAGE") or (type="BRAND_PROTECTION" AND subType="BRAND_MISUSE") or (type="BRAND_PROTECTION" AND subType="MOBILE_APPLICATION") or  (type="BRAND_PROTECTION" AND subType="NEGATIVE_PUBLICITY") or (type="DATA_LEAKAGE" AND like(subType,"%MARKED_DOCUMENT")) or (type="BRAND_PROTECTION" AND subType="DEFAMATION") or (type="DATA_LEAKAGE" AND subType="CREDENTIAL_COMPROMISE") or (type="BRAND_PROTECTION" AND subType="SPOOF_PROFILE") or (type="BRAND_PROTECTION" AND subType="PHISHING_ATTEMPT")),$entitySummary.source$)
EXTRACT-tmp_cn = CN=(?<tmp_cn>[\w+\s*]+)\b, in description
EVAL-ssl_subject_common_name = case((type="INFRASTRUCTURE" AND subType="DOMAIN_CERTIFICATE_ISSUE"), tmp_cn)
KV_MODE = json
TRUNCATE = 0

