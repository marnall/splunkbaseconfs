[fintsauthenticaterequest-command]
syntax = [fintsauthenticaterequest]
shortdesc = [fintsauthenticaterequest account=<account-stanza>]
usage = public

[fintsauthenticateresponse-command]
syntax = [fintsauthenticateresponse]
shortdesc = [fintsauthenticateresponse tan_input=<tan_response> account=<account-stanza>]
usage = public

[fintstransaction-command]
syntax = [fintstransaction]
shortdesc = [fintstransaction account=<account-stanza> startdate=YYYY-MM-DD enddate=YYYY-MM-DD]
usage = public
