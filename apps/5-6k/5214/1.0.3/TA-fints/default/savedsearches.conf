[FinTS_SS_GetTransaction]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.visualizations.show = 0
request.ui_dispatch_app = TA-fints
request.ui_dispatch_view = search
search = | fintstransaction account=$account$ startdate=$startdate$ enddate=$enddate$ | collect `fints_index` sourcetype="fints:transaction" source=$account$ addtime=false testmode=false
disabled = 1

