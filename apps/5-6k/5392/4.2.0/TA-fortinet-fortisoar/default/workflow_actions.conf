[fortiosoar_create_alert]
display_location = event_menu 
fields = * 
label = FortiSOAR: Create Alert
search.preserve_timerange = 1 
search.search_string = index="$index$" _index_earliest=$_indextime$ _indextime=$_indextime$ host="$host$" linecount=$linecount$ source="$source$" sourcetype="$sourcetype$" splunk_server="$splunk_server$" | where _bkt="$_bkt$" AND _cd="$_cd$" | fortisoarsend alert
search.target = blank 
search.view = search 
type = search 

