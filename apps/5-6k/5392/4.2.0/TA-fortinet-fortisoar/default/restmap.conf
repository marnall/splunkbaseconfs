[admin:ta_fortinet_fortisoar]
match=/cssetup
members=csconfig

[admin_external:csconfig]
handlertype = python
python.version = python3
handlerfile = fortisoar_setup.py
handleractions = list, edit

[script:playbooks]
match=/playbooks
script=fortisoar_playbooks.py
scripttype=persist
handler = fortisoar_playbooks.PlaybooksHandler
requireAuthentication = true
output_modes=json
python.version = python3
passPayload = true
passHttpHeaders = true
passHttpCookies = true
