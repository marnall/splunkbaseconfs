[has_not_sent_data]
title = has not sent data
identifying_name = has not sent data
data_search = | mstats latest(alert_value) WHERE `get_itsi_summary_metrics_index` \
(entity_key!=service_aggregate AND entity_key != N/A) by entity_key, entity_title | fields entity_key, entity_title \
| rename entity_key AS _key, entity_title AS title
