[retention_settings]
# default retention policy is 180 days
retentionTimeInDays = 180
disabled = 0
# default archival policy is 30 days
archivalTimeInDays = 30
# by default archival is disabled "1"
disableArchival = 1
# Maintenance calendars possibly contain a large number of objects, so limiting the batch-size to 500
batch_size = 500
