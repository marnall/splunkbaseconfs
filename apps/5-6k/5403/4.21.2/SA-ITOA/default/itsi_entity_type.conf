        "unit": "%" \
    }, \
    { \
        "metric_name": "Memory Utilization", \
        "search": "| mstats min(vmstat_metric.memFreePct) as val WHERE `itsi_entity_type_ta_nix_metrics_indexes` by host span=5m | eval val=100-val", \
        "split_by_fields": ["host"], \
        "matching_entity_fields": ["host"], \
        "is_key": 0, \
        "unit": "%" \
    }, \
    { \
        "metric_name": "Disk Utilization", \
        "search": "| mstats max(df_metric.UsePct) as val WHERE `itsi_entity_type_ta_nix_metrics_indexes` AND Filesystem=\"*\" by host span=5m", \
        "split_by_fields": ["host"], \
        "matching_entity_fields": ["host"], \
        "is_key": 0, \
        "unit": "%" \
    }, \
    { \
        "metric_name": "Average Network Traffic",\
        "search": "| mstats rate(interfaces_metric.TXbytes) as tx,rate(interfaces_metric.RXbytes) as rx WHERE `itsi_entity_type_ta_nix_metrics_indexes` by host span=5m | eval val=round((tx+rx)/2/1024,2) ", \
        "split_by_fields": ["host"], \
        "matching_entity_fields": ["host"], \
        "is_key": 0, \
        "unit": "KB/s" \
    } \
]

