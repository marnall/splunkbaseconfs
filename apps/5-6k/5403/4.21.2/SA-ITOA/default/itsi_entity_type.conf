[nix]
title = *nix
description = *nix type
data_drilldowns = [ \
    { \
        "title": "System metrics", \
        "type": "metrics", \
        "static_filter": { \
            "type": "include", \
            "field": "metric_name", \
            "values": ["*"] \
        }, \
        "entity_field_filter": { \
            "type": "entity", \
            "data_field": "host", \
            "entity_field": "host" \
        } \
    }, \
    { \
        "title": "*nix logs", \
        "type": "events", \
        "static_filter": { \
            "type": "include", \
            "field": "sourcetype", \
            "values": ["*"] \
        }, \
        "entity_field_filter": { \
            "type": "entity", \
            "data_field": "host", \
            "entity_field": "host" \
        } \
    } \
]
dashboard_drilldowns = [ \
    { \
        "title": "*nix Overview Dashboard", \
        "id": "nix_overview_dashboard", \
        "base_url": "", \
        "dashboard_type": "udf_dashboard", \
        "params": { \
            "static_params": {}, \
            "alias_param_map": [] \
        } \
    } \
]
vital_metrics = [ \
    { \
        "metric_name": "CPU Utilization", \
        "search": "| mstats min(cpu.idle) as val WHERE `itsi_entity_type_nix_metrics_indexes` by host span=1m | eval val=100-val", \
        "split_by_fields": ["host"], \
        "matching_entity_fields": ["host"], \
        "is_key": 1, \
        "unit": "%" \
    }, \
    { \
        "metric_name": "Memory Utilization", \
        "search": "| mstats max(memory.used) as val WHERE `itsi_entity_type_nix_metrics_indexes` by host span=1m", \
        "split_by_fields": ["host"], \
        "matching_entity_fields": ["host"], \
        "is_key": 0, \
        "unit": "%" \
    }, \
    { \
        "metric_name": "Disk Utilization", \
        "search": "| mstats max(df.used) as val WHERE `itsi_entity_type_nix_metrics_indexes` by host span=1m", \
        "split_by_fields": ["host"], \
        "matching_entity_fields": ["host"], \
        "is_key": 0, \
        "unit": "%" \
    }, \
    { \
        "metric_name": "Average Network Traffic",\
        "search": "| mstats avg(interface.octets.tx) as tx, avg(interface.octets.rx) as rx WHERE `itsi_entity_type_nix_metrics_indexes` by host span=5m | eval val=round((tx+rx)/2/1024,2) ",  \
        "split_by_fields": ["host"], \
        "matching_entity_fields": ["host"], \
        "is_key": 0, \
        "unit": "KB/s" \
    } \
]


