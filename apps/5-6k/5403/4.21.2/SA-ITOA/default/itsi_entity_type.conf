    { \
        "metric_name": "CPU Utilization", \
        "search": "| mstats min(cpu_metric.pctIdle) as val WHERE `itsi_entity_type_ta_nix_metrics_indexes` AND CPU=\"all\" by host span=1m | eval val=100-val", \
