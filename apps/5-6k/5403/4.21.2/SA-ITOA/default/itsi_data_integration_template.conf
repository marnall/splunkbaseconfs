[generic]
title = Generic Default Template
_key = generic
data_source = generic
mapping_fields = [ \
    { \
        "name": "src", \
        "display_name": "Source", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "default_selected_field": "src" \
    }, \
    { \
        "name": "signature", \
        "display_name": "Signature", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "default_selected_field": "signature" \
    }, \
    { \
        "name": "vendor_severity", \
        "display_name": "Vendor Severity", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "default_selected_field": "vendor_severity" \
    }, \
    { \
        "name": "severity_id", \
        "display_name": "Severity ID", \
        "type": "notable_event_field", \
        "input_type": "mapping_rule", \
        "rule_type": "case", \
        "required": true, \
        "default_value": "1", \
        "values": [ \
            { \
                "condition": "IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "critical", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "6" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "high", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "5" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "medium", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "4" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "low", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "3" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "normal", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "2" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "info", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "1" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "warning", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "3" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "ok", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "2" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "down", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "6" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "up", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "2" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE", \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "1" \
                    } \
                ] \
            } \
        ] \
    }, \
    { \
        "name": "title", \
        "display_name": "Title", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "default_selected_field": "title" \
    }, \
    { \
        "name": "owner", \
        "display_name": "Owner", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "conf", \
        "default_selected_key": "unassigned", \
        "default_value": "unassigned" \
    }, \
    { \
        "name": "status", \
        "display_name": "Status", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "default_selected_field": "status" \
    }, \
    { \
        "name": "subcomponent", \
        "display_name": "Subcomponent", \
        "type": "notable_event_field", \
        "input_type": "mapping_rule", \
        "rule_type": "coalesce", \
        "required": true, \
        "values": ["{subcomponent}", ["-"]] \
    }, \
    { \
        "name": "alert_identifier_fields", \
        "display_name": "Alert Identifier Fields", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "values": \
        [ \
            "{signature}", \
            "-", \
            "{src}", \
            "-", \
            "{subcomponent}" \
        ], \
        "default_value": "default_identifier" \
    }, \
    { \
        "name": "description", \
        "display_name": "Description", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "default_selected_field": "description" \
    }, \
    { \
        "name": "app", \
        "display_name": "App", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "default_selected_field": "app" \
    }, \
    { \
        "name": "itsiDrilldownSearchName", \
        "display_name": "ITSI Drilldown Search Name", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "default_selected_field": "itsiDrilldownSearchName" \
    }, \
    { \
        "name": "itsiDrilldownSearch", \
        "display_name": "ITSI Drilldown Search", \
        "type": "notable_event_field", \
        "input_type": "composition", \
        "required": false, \
        "default_selected_field": "itsiDrilldownSearch" \
    }, \
    { \
        "name": "itsiDrilldownEarliestOffset", \
        "display_name": "ITSI Drilldown earliest offset", \
        "type": "notable_event_field", \
        "default_value": "-900", \
        "input_type": "mapping_rule", \
        "rule_type": "coalesce", \
        "required": false, \
        "values": ["{itsiDrilldownEarliestOffset}", ["-900"]] \
    }, \
    { \
        "name": "itsiDrilldownLatestOffset", \
        "display_name": "ITSI Drilldown latest offset", \
        "type": "notable_event_field", \
        "default_value": "900", \
        "input_type": "mapping_rule", \
        "rule_type": "coalesce", \
        "required": false, \
        "values": ["{itsiDrilldownLatestOffset}", ["900"]] \
    }, \
    { \
        "name": "itsiDrilldownWebName", \
        "display_name": "ITSI Drilldown Website Name", \
        "type": "notable_event_field", \
        "input_type": "mapping_rule", \
        "rule_type": "case", \
        "required": false, \
        "values": [ \
            { \
                "condition": "IF", \
                "clauses": [ \
                    { \
                        "field": "itsiDrilldownWebName", \
                        "operator": "is not null" \
                    } \
                ], \
                "outcomes": [ \
                    "{itsiDrilldownWebName}" \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "itsiDrilldownWebURL", \
                        "operator": "is not null" \
                    } \
                ], \
                "outcomes": [ \
                    "{title}" \
                ] \
            }, \
            { \
                "condition": "ELSE", \
                "outcomes": [ \
                    "Sorry, no external drilldown available" \
                ] \
            } \
        ] \
    }, \
    { \
        "name": "itsiDrilldownWebURL", \
        "display_name": "ITSI Drilldown Website URL", \
        "type": "notable_event_field", \
        "input_type": "mapping_rule", \
        "rule_type": "coalesce", \
        "required": false, \
        "values": ["{itsiDrilldownWebURL}", ["https://splunk.com"]] \
    }, \
    { \
        "name": "itsi_instruction", \
        "display_name": "ITSI Instruction", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "default_selected_field": "itsi_instruction" \
    } \
]
throttling_group_by_fields = ["signature", "src", "subcomponent"]
mapping_field_options = []
status_id_mapping =

