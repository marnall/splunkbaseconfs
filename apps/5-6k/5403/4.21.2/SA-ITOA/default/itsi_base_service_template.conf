[SAI-Nix_Service_Template]
title = OS KPIs - *nix (SAI)
description = A service template that contains out-of-box KPIs for *nix based services imported from SAI.
_owner = nobody
_immutable = true
entity_rules = [ \
    { \
        "rule_condition": "AND", \
        "rule_items": [ \
            { \
                "field_type": "info", \
                "rule_type": "matches", \
                "field": "itsi_role", \
                "value": "SAI" \
            }, \
            { \
                "field_type": "info", \
                "rule_type": "not", \
                "field": "os", \
                "value": "Microsoft*" \
            }, \
            { \
                "field_type": "alias", \
                "rule_type": "matches", \
                "field": "host", \
                "value": "CHANGEME" \
            } \
        ] \
    } \
]
