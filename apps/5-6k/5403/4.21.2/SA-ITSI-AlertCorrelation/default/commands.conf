[fieldselector]
filename = java.path
command.arg.1 = -Dlog4j.configurationFile=../default/log4j_fieldselector.xml
command.arg.2 = -Dfile.encoding=UTF-8
command.arg.3 = -Dlog4j2.contextSelector=org.apache.logging.log4j.core.async.AsyncLoggerContextSelector
command.arg.4 = -cp
command.arg.5 = ../lib/alert-correlation-1.0.0.jar
command.arg.6 = com.splunk.alerts.FieldSelector
run_in_preview = false
chunked = true

[alertgrouper]
filename = java.path
command.arg.1 = -Dlog4j.configurationFile=../default/log4j_alertgrouper.xml
command.arg.2 = -Dfile.encoding=UTF-8
command.arg.3 = -Dlog4j2.contextSelector=org.apache.logging.log4j.core.async.AsyncLoggerContextSelector
command.arg.4 = -cp
command.arg.5 = ../lib/alert-correlation-1.0.0.jar
command.arg.6 = com.splunk.alerts.AlertGrouperCommand
run_in_preview = false
chunked = true
