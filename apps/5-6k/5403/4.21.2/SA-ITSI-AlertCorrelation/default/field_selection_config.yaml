 addAiFields: false  # Whether we should add AI fields to the alerts
 maxFields: 10      # Maximum # of fields to return from FieldSelector
# List of field names =>
# We will drop any fields with these names regardless of their values
 namesToDrop:
   - groupingid
   - entity_key
   - search_name
   - search_type
   - owner
   - event_identifier_fields
   - search_type
   - itsi_instruction
   - is_use_event_time
   - event_id
   - mod_time
   - log_level
   - rid
   - _time
   - cpu_time
   - latency
   - ts
# List of prefixes =>
# We will drop any fields whose names begin with these prefixes
 prefixesToDrop:
   - drilldown
   - itsiDrilldown
   - event_identifier_
   - orig_
# List of search terms =>
# We will drop any fields whose names contain these search terms
 searchTermsToDrop:
   - severity
   - status
 # List of postfixes =>
 # We will drop any fields whose names end with these postfixes
 postfixesToDrop:
   - time
   - lastupdated
   - uptimeseconds
   - id
   - url
   - tags
   - description
   - uuid
   - hour
   - second
   - minute
   - href
   - mb
   - gb
   - kb
   - epoch
   - splunk_server
   - punct
   - count
   - search
# List of search terms for AI fields =>
# We will use any fields whose names contain these search terms as input to our AI field extraction logi
 searchTermsForAiFields:
   - title
   - summary
   - description
 # boomFields: List<List<String>> - Prioritized boom field patterns for matching
 #   Structure:
 #     - Outer list: Priority groups ordered by priority (higher priority first)
 #     - Inner lists: Boom field patterns at the same priority/rank
 #     - Each field name matches only the first applicable priority group
 #
 #   Pattern Matching Rules (case-insensitive):
 #     - No wildcard '*': Exact string match
 #       Example: "user" matches "User", "USER"
 #     - With wildcard '*':
 #       • Middle position: Matches zero or more connector chars [-_.]
 #         Example: "user*name" matches "username", "user_Name", "user.name"
 #       • End position: Prefix matching (beginsWith rule)
 #         Example: "user*" matches "user", "username", "user_profile"
 #       • Beginning position: Suffix matching (endsWith rule)
 #         Example: "*name" matches "name", "username", "profile_name"
 #       • Multiple positions: Wildcard chars can be present at multiple positions in a pattern
 #         Example: "*user*name*" combines multiple wildcard rules
 #
 #   Pattern Validation:
 #     - Patterns with no alphabetic characters are ignored
 #     - Invalid examples: "***", "123", "_-.", "" (all discarded)
 boomFields:
    - ["src*", "app_name", "application*name", "application", "service", "service_name", "business_service", "dv_business_service", "business_application", "ci_parent", "dv_parent", "parent", "cmdb_rel_ci", "dv_rel_ci_parent", "alert_group", "ci*name*", "*ci_id", "business_impact", "dv_business_impact", "namespace", "pod_name", "serviceid", "service_ids"]
    - ["*ImpactedEntity*", "*ImpactedEntities*", "entity_name", "entity_id", " entity_title", "affected_entities*", "affected_entity", "affectedEntityName", "affectedEntityID", "affectedEntities", "entity.alias.*", "impacted*name", "Ip_address", "device_ip", "devicename", "node", "nodename", "node_name", "Sid", "ci_identifier", "ci_short_description", "ci_sys*id", "Problem*ID", "*ProblemID", "ID", "PID", "device*name", "device_id", "interface*name*", "ifName", "ifAlias", "node", "ci_identifier", "ci_short_description", "ci_sys*id", "CI_sys_id", "CI_sysid", "system_id", "instance_name", "*instance", "instance*id", "cluster*", "node", "nodename", "node_name", "component", "subcomponent", "hostname", "host_name", "host,database*name", "db*name", "businessTransactionID", "alert*id", "event*id", "object*id", "resource", "resource*name", "resource*id"]
    - ["Region", "realm", "sysLocation", "location", "region", "site", "network", "dv_location", "CI_location", "group*id", "*grouping*id", "dest*", "dest_ip", "dest_name", "dest_host", "device_ip", "Ip_address", "target.name", "targets*.name", "sysLocation", "dv_location", "data*center", "site*name", "network*name", "tier*name", "event*id"]
    - ["Product_name", "product*name", "business_unit", "bunit", "usergroup", "*assignment*group", "kpi_name"]
    - ["Application_code", "problem*impact", "*alert*code"]
# connector chars match to '*' in the middle(, for example: group*id, app*name)
 connectorChars: -_.