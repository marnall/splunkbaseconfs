delta: 0.8                                 # Time-based delta value for grouping alerts (in seconds or relevant units).
similarityThreshold: 0.9999                # Minimum similarity score required to group alerts into the same meta-alert.
minAlertMatchSimilarity: 0.9999            # Minimum similarity for matching individual alerts within a group.
maxValLimit: 1000                          # Maximum number of attribute values to consider during merging alerts.
minKeyOccurrence: 0.1                      # Minimum occurrence threshold for an attribute key to be considered in merging.
minValOccurrence: 0.1                      # Minimum occurrence threshold for an attribute value to be included in merged alerts.
bagLimit: 2000                             # Maximum size of groups for similarity comparison using "bag" strategy.
alignmentWeight: 0.1                       # Weight assigned to alignment during similarity calculation.
partial: false                             # Whether partial matching is allowed when grouping alerts.
maxGroupsPerMetaAlert: 25                  # Maximum groups per meta-alert
monitoringNEsToCorrespondingEpisodes: true # Controls whether monitoring NEs should be grouped with the episodes they're monitoring
metaAlertSlidingWindowLength: 5            # Number of recent alerts to consider when calculating top3 fields for each metaAlert
staleMetaAlertThresholdMs: 86400000        # Time threshold (in ms) for purging inactive metaAlerts to prevent memory leaks (default: 1 day)
mlStateMapListLimit: 5                     # Maximum number of events retained per group in mlStateMap