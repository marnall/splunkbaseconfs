# ============================================
# Global configuration for the modular input
# Script file: bin/itsi_summary_worker.py
# These settings apply to all instances of this modular input
# ============================================
[itsi_summary_worker]
python.version = python3

# Allows multiple instances of this modular input to run at the same time
run_only_one = false

# Run the script directly (not via shell) to avoid environment issues
start_by_shell = false

# ============================================
# Instance-specific configuration
# This defines a specific instance of the modular input
# Format: [modular_input_name://instance_name]
# ============================================
# Instance for processing normal priority items
[itsi_summary_worker://normal_priority_worker]
interval = 5
disabled = 0
priority = 0

# Instance for processing high priority items
[itsi_summary_worker://high_priority_worker]
interval = 5
disabled = 0
priority = 1