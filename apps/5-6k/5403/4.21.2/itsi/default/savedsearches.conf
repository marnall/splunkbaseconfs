[Telemetry: Episode Summarization Avg Time Between Summary and Next Action]
search = index=itsi_notable_audit sourcetype=itsi_notable:audit \
| eval timestamp=_time \
| stats max(timestamp) AS summary_time BY event_id, action_name \
| where action_name="itsi_event_action_episode_summarization" \
| rename summary_time AS base_time \
| join event_id [search index=itsi_notable_audit sourcetype=itsi_notable:audit action_name | where isnotnull(action_name) AND user != "splunk-system-user" \
| eval timestamp=_time | stats values(timestamp) AS action_times BY event_id ] \
| makemv delim=" " action_times \
| mvexpand action_times \
| where action_times > base_time \
| eval difference= action_times-base_time \
| stats min(difference) AS difference BY event_id \
| lookup itsi_summarization target_id AS event_id OUTPUT status, mod_timestamp AS modified_time, _key AS summarization_id \
| rename event_id AS episode_id \
| where isnotnull(status) AND status=3 \
| stats avg(difference) as data.avg_time_between_summary_and_next_action \
| makejson data.* output=event
enableSched                                = 1
