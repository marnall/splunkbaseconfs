[Telemetry: Episode Summarization Stats]
search = index="_internal" sourcetype="itsi_internal_log" summarization_statistics \
| rex field=_raw "target_type=(?<target_type>[^\s]+)\s+target_id=(?<target_id>[^\s]+)\s+summarization_id=(?<summarization_id>[^\s]+)\s+created_time=(?<created_time>\d+)\s+invoked_by=(?<invoked_by>[^\s]+)(\s+in_progress_time=(?<in_progress_time>\d+))?(\s+completed_time=(?<completed_time>\d+))?(\s+failed_time=(?<failed_time>\d+))?(\s+terminated_time=(?<terminated_time>\d+))?\s+in_progress_duration=(?<in_progress_duration>\d+)\s+initialized_duration=(?<initialized_duration>\d+)\s+total_duration=(?<total_duration>\d+)" \
| eval \
    status=case( \
      isnotnull(completed_time), "Success", \
      isnotnull(failed_time), "Failed", \
      isnotnull(terminated_time), "Terminated", \
      true(), "Unknown" \
    ), \
    is_automated=if(match(invoked_by,"splunk-system-user"), 1, 0), \
    is_user_invoked=if(match(invoked_by,"splunk-system-user"), 0, 1), \
    gen_latency=total_duration \
| stats  \
    avg(gen_latency) as avg_duration, \
    avg(initialized_duration) as avg_initialized_duration, \
    avg(in_progress_duration) as avg_in_progress_duration, \
    count as total_jobs, \
    sum(is_automated) as automated_jobs, \
    sum(is_user_invoked) as user_invoked_jobs, \
    sum(eval(status=="Success")) as successful_jobs, \
    sum(eval(status=="Failed")) as failed_jobs, \
    sum(eval(status=="Terminated")) as terminated_jobs, \
    dc(target_id) as unique_episodes, \
| eval \
    data.total_jobs=coalesce(total_jobs, 0), \
    data.unique_episodes=coalesce(unique_episodes, 0), \
    data.avg_duration=coalesce(avg_duration, 0), \
    data.avg_initialized_duration=coalesce(avg_initialized_duration, 0), \
    data.avg_in_progress_duration=coalesce(avg_in_progress_duration, 0), \
    data.successful_jobs=coalesce(successful_jobs, 0), \
    data.failed_jobs=coalesce(failed_jobs, 0), \
    data.terminated_jobs=coalesce(terminated_jobs, 0), \
    data.automated_jobs=coalesce(automated_jobs, 0), \
    data.user_invoked_jobs=coalesce(user_invoked_jobs, 0), \
    data.avg_generated_for_episodes_with_summaries=round(total_jobs/unique_episodes, 2) \
| makejson data.* output=event
enableSched                                = 1
