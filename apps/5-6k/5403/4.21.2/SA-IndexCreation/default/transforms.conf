[set_kpisummary_kpiid]
REGEX = itsi_kpi_id\s*=\s*([^\s,]+)
WRITE_META = true
FORMAT = indexed_itsi_kpi_id::$1

[set_kpisummary_serviceid]
REGEX = itsi_service_id\s*=\s*([^\s,]+)
WRITE_META = true
FORMAT = indexed_itsi_service_id::$1

[set_kpisummary_max_severity_flag]
REGEX = is_service_max_severity_event\s*=\s*([^\s,]+)
WRITE_META = true
FORMAT = indexed_is_service_max_severity_event::$1

[set_kpisummary_service_aggregate]
REGEX = is_service_aggregate\s*=\s*([^\s,]+)
WRITE_META = true
FORMAT = indexed_is_service_aggregate::$1

####### ITSI IM Metric Transforms #######
# This is for backward compatible with previous collectd version
[metrics-hostoverride]
DEST_KEY = MetaData:Host
REGEX = host=(\S+)
FORMAT = host::$1

[udp-metrics-hostoverride]
DEST_KEY = MetaData:Host
REGEX = \"host\":\s\"(\S+)\"
FORMAT = host::$1

[ebs-hostoverride]
DEST_KEY = MetaData:Host
REGEX = VolumeId=(\S+)
FORMAT = host::$1

[elb-hostoverride]
DEST_KEY = MetaData:Host
REGEX = LoadBalancerName=(\S+)
FORMAT = host::$1

[ec2-hostoverride]
DEST_KEY = MetaData:Host
REGEX = InstanceId=(\S+)
FORMAT = host::$1

####### ITSI IM Metric Transforms for Windows #######
[fields_for_perfmon_metrics_store_itsi_im]
REGEX = collection=\"?([^\"\r\n]*[^\"\s]).*?object=\"?([^\"\r\n]*[^\"\s]).*?counter=\"?([^\"\r\n]*[^\"\s]).*?instance=\"?([^\"\r\n]*[^\"\s])
FORMAT = collection::$1 object::$2 metric_name::$2.$3 instance::$4
WRITE_META = true

[value_for_perfmon_metrics_store_itsi_im]
REGEX = Value=\"?([^\"\r\n]*[^\"\s])
FORMAT = _value::$1
WRITE_META = true

[extract_dims]
REGEX =  \"([^{]\S+)\":\s(\"*[\w\d\s.-]+\"*)
FORMAT = $1::$2
WRITE_META = true
REPEAT_MATCH = true
