[stash_new]
TRANSFORMS-set_kpisummary_index_fields = set_kpisummary_kpiid, set_kpisummary_serviceid, set_kpisummary_max_severity_flag, set_kpisummary_service_aggregate

[itsi_summary:metrics]
KV_MODE = none
INDEXED_EXTRACTIONS = csv

[itsi_import_objects:csv]
DATETIME_CONFIG = CURRENT
KV_MODE = none
INDEXED_EXTRACTIONS = csv

[itsi_notable:event]
KV_MODE = none
INDEXED_EXTRACTIONS = JSON

[itsi_notable:group]
KV_MODE = none
INDEXED_EXTRACTIONS = JSON

