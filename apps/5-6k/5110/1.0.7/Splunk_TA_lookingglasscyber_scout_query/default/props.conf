[lookingglasscyber_scout_query]
DATETIME_CONFIG = CURRENT
KV_MODE = json
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = true
category = Custom
pulldown_type = 1
disabled = false
FIELDALIAS-src_ip = src_ip as src
FIELDALIAS-src_domain = src_name as src
FIELDALIAS-classification_list = classification_list as category
FIELDALIAS-classifications = classifications as category
FIELDALIAS-update_time = update_time as date
FIELDALIAS-last_seen = last_seen as date
FIELDALIAS-hostnames_names = hostnames as src_name
FIELDALIAS-hostnames = hostnames as src
FIELDALIAS-host_name_name = host_name as src_name
FIELDALIAS-host_name = host_name as src
FIELDALIAS-protocol = protocol as transport
FIELDALIAS-port = port as dest_port
FIELDALIAS-reference_url = reference_url as file_path
FIELDALIAS-binary_malware_name = binary.malware_name as signature
FIELDALIAS-binary_hash_sha1 = binary.hash_sha1 as signature
FIELDALIAS-binary_file_name = binary.file_name as file_name
FIELDALIAS-ipv4 = ipv4 as src_ip
FIELDALIAS-ipv4_src = ipv4 as src
FIELDALIAS-phish_ipv4 = phish_ipv4 as src_ip
FIELDALIAS-phish_ipv4_src = phish_ipv4 as src
FIELDALIAS-phish_title = phish_title as subject
FIELDALIAS-srcport = srcport as src_port
FIELDALIAS-localport = "Local Port" as dest_port
FIELDALIAS-destination_fqdn_name = destination_fqdn as dest_name
FIELDALIAS-destination_fqdn = destination_fqdn as dest
FIELDALIAS-netblock_fqdn_name = netblock_fqdn as dest_name
FIELDALIAS-netblock_fqdn = netblock_fqdn as dest
FIELDALIAS-destination_ipv4_name = destination_ipv4 as dest
FIELDALIAS-destination_ipv4 = destination_ipv4 as dest_ip