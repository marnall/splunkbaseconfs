[default]
[get_ioc]
definition = inputlookup Filename_lastinfosecioc_kv \
| append[ |inputlookup MD5_lastinfosecioc_kv]\
| append[ |inputlookup SHA1_lastinfosecioc_kv]\
| append[ |inputlookup SHA256_lastinfosecioc_kv]\
| append[ |inputlookup URL_lastinfosecioc_kv]\
| append[ |inputlookup Host_lastinfosecioc_kv] | table `gwlis_format_fields`

[gwlis_get_api_url_api_key]
definition = curl url=`gwlis_setup_api_url`?api_key=`gwlis_setup_api_token` timeout=`gwlis_setup_api_timeout`

[gwlis_setup_api_timeout]
definition = 300
iseval = 0
disabled = 0

[gwlis_setup_data_conservation]
definition = 60
iseval=0
disabled=0

[gwlis_setup_api_url]
definition = https://api.client.lastinfosec.com/v2/lis/getbyminutes/10
iseval = 0
disabled = 0

[gwlis_setup_debug_disable]
definition = 1
iseval = 0
disabled = 0

[gwlis_setup_debug_index]
definition = index=main
iseval = 0
disabled = 0

[gwlis_format_fields]
definition = CaseId,IocId,Type,Value,UsageMode,Risk,TLP,*Date,_time,Tags,Families,Vulnerabilites,Campains,Relations,Categories,ExternalLinks_*,MetaData_*,Vulnerabilities,TargetedOrganizations,TargetedPlatforms,TargetedSectors
iseval = 0
disabled = 0

[gwlis_filename_conservation_size]
definition = 500000000
disabled = 0

[gwlis_md5_conservation_size]
definition = 500000000
disabled = 0

[gwlis_sha1_conservation_size]
definition = 500000000
disabled = 0

[gwlis_sha256_conservation_size]
definition = 500000000
disabled = 0

[gwlis_url_conservation_size]
definition = 500000000
disabled = 0

[gwlis_host_conservation_size]
definition = 500000000
disabled = 0
