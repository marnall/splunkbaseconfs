[edrsensorsearch-command]
syntax = edrsensorsearch <edr-option-query>* <edr-option-sort>*
shortdesc = edrsensorsearch queries CB EDR for sensor information
description = edrsensorsearch queries CB EDR for sensor information. \
  'query' is the CB EDR compatible query to find the sensors in question.
usage = public
example1 = edrsensorsearch
comment1 = Queries for device information
example2 = edrsensorsearch query="ip:172.22.5.141"
comment2 = Queries for device information, using the CB EDR query langauge
category = fields::add

[edrbinarysearch-command]
syntax = edrbinarysearch <edr-option-query>* <edr-option-sort>*
shortdesc = edrbinarysearch queries CB EDR for binary information
description = edrbinarysearch queries CB EDR for binary information. \
  'query' is the CB EDR compatible query to find the binaries in question.
usage = public
example1 = edrbinarysearch
comment1 = Queries for binary information
example2 = edrbinarysearch query="md5:fd3cee0bbc4e55838e65911ff19ef6f5"
comment2 = Queries for binary information, using the CB EDR query langauge
category = fields::add

[edrprocesssearch-command]
syntax = edrprocesssearch <edr-option-query>* <edr-option-sort>*
shortdesc = edrprocesssearch queries CB EDR for process information
description = edrprocesssearch queries CB EDR for process information. \
  'query' is the CB EDR compatible query to find the processes in question.
usage = public
example1 = edrprocesssearch
comment1 = Queries for process information
example2 = edrprocesssearch query="process_name:cmd.exe"
comment2 = Queries for process information, using the CB EDR query langauge
category = fields::add

[edr-option-query]
syntax = query=<string>
description = The CB EDR Query

[edr-option-sort]
syntax = sort=<string>
description = The CB EDR Query
