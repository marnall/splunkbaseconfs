[agari_bp]
index = default
start_by_shell = false
python.version = python3
sourcetype = agari:bp:alerts
interval = 300
alert_types = infrastructure~threat_spike~authentication_spike~spf_record_changed~dmarc_record_changed~brand_spoofing~new_sender~dkim_record_changed~new_dkim_selector~unauthorized_netblock~new_well_known_sender
failure_data_mode = off
alert_mode = alert_details
threat_feeds_mode = on

[agari_pd]
index = default
start_by_shell = false
python.version = python3
sourcetype = agari:pd:events
policy_action = deliver~mark-spam~move~inbox~delete~none
interval = 300
messages = on

[agari_pr]
index = default
start_by_shell = false
python.version = python3
sourcetype = agari:pr:events
interval = 300
data_types = attachments~domains~ips~uris~tags