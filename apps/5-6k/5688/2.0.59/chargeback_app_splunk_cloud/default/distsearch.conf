
# lookup files generated within the context of this app should not be pushed down to 
# indexers as part of the bundle
[replicationBlacklist]
# no-chargeback_app_splunk_cloud-lookups = ...chargeback_app_splunk_cloud/lookups...
no-chargeback_app_splunk_cloud-default-lookups = ...chargeback_app_splunk_cloud/lookups/*.csv.default
no-chargeback_app_splunk_cloud-user-lookups = ...chargeback_app_splunk_cloud/lookups/*_configured.csv
no-chargeback_app_splunk_cloud-help-lookups = ...chargeback_app_splunk_cloud/lookups/*_help_*.csv
no-chargeback_app_splunk_cloud-mltk-lookups = ...chargeback_app_splunk_cloud/lookups/__mlspl_*.mlmodel
no-chargeback_app_splunk_cloud-factory-lookups = ...chargeback_app_splunk_cloud/lookups/chargeback_lookup_factory_defaults_csv.csv
no-chargeback_app_splunk_cloud-bin = ...chargeback_app_splunk_cloud/bin...
