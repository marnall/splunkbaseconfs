################# Identities KV Store Loolups #################
[chargeback_rest_identities_kv_store_lookup]
collection = chargeback_rest_identities_kv_store
external_type = kvstore
max_matches = 1
fields_list = _key, _time, shcluster_label, Splunk_Instance, user_name, biz_unit, biz_division, biz_dep, name, type, status, title, email, manager, manager_id, splunk_role_map, auth_type
case_sensitive_match = false
reverse_lookup_honor_case_sensitive_match = false
match_type = WILDCARD(user_name)

[chargeback_identities_custom_kv_store_lookup]
collection = chargeback_identities_custom_kv_store
external_type = kvstore
max_matches = 1
fields_list = _key, _time, user_name, biz_unit, biz_division, biz_dep, name, type, status, title, email, manager, manager_id
case_sensitive_match = false
reverse_lookup_honor_case_sensitive_match = false

