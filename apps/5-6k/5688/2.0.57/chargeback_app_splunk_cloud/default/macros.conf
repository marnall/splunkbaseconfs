[chargeback_get_sru_data]
description = Retrieves Summary Job Data
definition = stats \
    Sum(eval(SRU_Perc / Total_SRU_Perc * svc_calculation)) as svc_usage\
    Dc(biz_dep) As Num_Departments\
    Dc(biz_division) As Num_Divisions\
    Max(License) As License\
    Max(svc_calculation) As svc_calculation\
    Max(svc_consumer_search_usage) As svc_consumer_search_usage\
    Sum(Scan_Count) As Scan_Count Sum(Event_Count) As Event_Count Sum(Searched_Buckets) As Searched_Buckets Sum(Density) As Density\
    earliest(_time) as earliest_time\
    earliest(Earliest_Time) as Earliest_Time\
    Values(biz_division) As Division\
    Values(biz_dep) As Department\
    Latest(user_type) As user_type\
    Latest(user_status) As user_status\
    Latest(email) As Email\
    Latest(title) As title\
    Values(Indexes) As Indexes \
    Values(Sourcetypes) As Sourcetypes \
    Latest(WLM_Pool) As WLM_Pool\
    Latest(Search_Mode) As Search_Mode\
    Max(svc_unit_cost) As svc_unit_cost\
    Sum(Total_Run_Time) As Total_Run_Time\
    Max(Max_Total_Run_Time) As Max_Total_Run_Time\
    Min(Dispatch_Earliest_Time) As Dispatch_Earliest_Time\
    Max(Dispatch_Latest_Time) As Dispatch_Latest_Time\
    Values(Statuses) As Statuses P99(Mem_Used) As Mem_Used, P99(CPU_Used) As CPU_Used\
    Sum(SRU_Perc) As SRU_Perc\
    Sum(Num_Searches) As Num_Searches\
    Latest(Fully_Completed_Search) As Fully_Completed_Search\
    Latest(name) As name\
    Values(Search_String) As Search_String\
    Latest(app_type) As app_type\
    Values(Splunk_Instance) As Splunk_Instance\
    Values(ITSI_Service) As ITSI_Service\
    Values(ITSI_Tags) As ITSI_Tags\
    Values(ITSI_Team) As ITSI_Team\
    Latest(federated_server_name) As federated_server_name \
    Latest(federated_user) As federated_user \
    Latest(federated_version) As federated_version \
    Values(is_federated_search) As is_federated_search \
    By _time biz_unit shcluster_label App Search_Type Provenances User Job\
| rename biz_unit As B-Unit

