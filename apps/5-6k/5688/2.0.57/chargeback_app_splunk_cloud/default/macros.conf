definition = lookup chargeback_access_control_csv_lookup role_name As $role_name$ OUTPUTNEW biz_unit is_admin notes \
| eval biz_unit = mvdedup(biz_unit)\
| eval chargeback_bunit_access="\"".replace(replace(replace(mvjoin(biz_unit, "|"),"(\")",""),"(\s|)\,(\s|)","|"),"\|","\",\"")."\""

