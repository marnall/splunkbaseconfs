[chargeback_sru_all_workloads(2)]
description = Splunk Cloud Entire SVC Workload
args = span,function
definition = `chargeback_svc_summary`\
| bin span=5m _time \
| stats Max(utilized_svc) as utilized_svc Max(stack_license_svc) as stack_license_svc By _time role indexer_type\
| stats Sum(utilized_svc) as utilized_svc max(stack_license_svc) as stack_license_svc by _time \
| `chargeback_get_entitlement(svc)` \
| eval stack_license_svc = if(stack_license_svc=0, svc_entitlement, stack_license_svc) \
| timechart Span=$span$ $function$(utilized_svc) As Utilization Max(stack_license_svc) As License\
| fields _time Utilization License

[chargeback_sru_search_workload(2)]
description = Splunk Cloud SVC Search Workload
args = span,function
definition = `splunk_cloud_summary` `chargeback_svc_consumer`\
| bin _time span=1h \
| eval svc_consumer = case(svc_consumer="data services", "ingestion" , svc_consumer="shared services", "basic_services", true(), svc_consumer) \
| fillnull value="" search_user, unified_sid, usage_source\
| stats max(svc_usage) AS svc_usage latest(search_head_names) AS search_head_names values(labels) AS labels values(search_modes) AS search_modes values(search_provenances) AS search_provenances values(search_label) AS search_label values(search_type) AS search_type values(search_app) AS search_app BY _time process_type svc_consumer search_user unified_sid usage_source\
| stats Sum(svc_usage) As svc_usage By _time svc_consumer \
| eval svc_consumer_search_usage = if(svc_consumer=="search", svc_usage, 0), svc_consumer_basic_services_usage = if(svc_consumer=="basic_services", svc_usage, 0), svc_consumer_ingestion_usage = if(svc_consumer=="ingestion", svc_usage, 0) \
| timechart Span=$span$ $function$(svc_consumer_search_usage) AS svc_consumer_search_usage , $function$(svc_consumer_basic_services_usage) AS svc_consumer_basic_services_usage , $function$(svc_consumer_ingestion_usage) AS svc_consumer_ingestion_usage \
| fields _time svc_consumer_search_usage svc_consumer_basic_services_usage svc_consumer_ingestion_usage

[chargeback_sru_search_attribution_workload(2)]
description = Splunk Cloud SVC Search Attribution Workload
args = span,function
definition = search `splunk_cloud_summary` source=splunk-svc-search-attribution \
| fields _time  role search_app search_head_names search_label search_modes search_provenances search_type search_user stack_license_svc svc_consumer svc_usage usage_source \
| bin _time span=1h \
| eval svc_consumer = case(svc_consumer="data services", "ingestion" , svc_consumer="shared services", "basic_services", true(), svc_consumer) \
| fillnull value="" svc_consumer search_provenances search_type search_app search_label search_user search_modes role search_head_names usage_source stack_license_svc \
| stats latest(svc_usage) as svc_usage by _time svc_consumer search_provenances search_type search_app search_label search_user search_modes role search_head_names usage_source stack_license_svc \
| stats Sum(svc_usage) As svc_usage By _time svc_consumer \
| eval svc_consumer_search_usage = if(svc_consumer=="search", svc_usage, 0), svc_consumer_basic_services_usage = if(svc_consumer=="basic_services", svc_usage, 0), svc_consumer_ingestion_usage = if(svc_consumer=="ingestion", svc_usage, 0) \
| timechart Span=$span$ $function$(svc_consumer_search_usage) AS svc_consumer_search_usage , $function$(svc_consumer_basic_services_usage) AS svc_consumer_basic_services_usage , $function$(svc_consumer_ingestion_usage) AS svc_consumer_ingestion_usage \
| fields _time svc_consumer_search_usage svc_consumer_basic_services_usage svc_consumer_ingestion_usage

[chargeback_vcpu_usage(2)]
description = Splunk Enterprise vCPU Workload
args = span,function
definition = `chargeback_summary_index` source=chargeback_introspection_vcpu_usage_tracker\
| bin span=5m _time \
| stats Avg(total_PctUsed) As utilized_svc by _time \
| `chargeback_get_entitlement(svc)` \
| timechart Span=$span$ $function$(utilized_svc) As Utilization Max(svc_entitlement) As License \
| fields _time, Utilization, License

[chargeback_sru_all_workloads]
