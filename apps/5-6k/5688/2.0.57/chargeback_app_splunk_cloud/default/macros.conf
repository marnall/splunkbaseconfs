[chargeback_data_2_bunit(3)]
description = Index B-Unit Allocations by Index
args = table,table_field,event_field
definition = lookup local=false chargeback_$table$_2_bunit_csv_lookup $table_field$ as $event_field$ OUTPUTNEW biz_unit, biz_division, biz_dep, perc_ownership, biz_desc, biz_owner, biz_email\
| eval key = mvrange(0, mvcount(biz_unit)), key=mvmap(key,key."|||".mvindex(biz_unit,'key')."|||".mvindex(biz_division,'key')."|||".mvindex(biz_dep,'key')."|||".mvindex(perc_ownership,'key')."|||".mvindex(biz_desc,'key')."|||".mvindex(biz_owner,'key')."|||".mvindex(biz_email,'key')) \
| fields - biz_*, perc_ownership \
| mvexpand key \
| eval biz_unit=mvindex(split(key,"|||"),1), biz_division=mvindex(split(key,"|||"),2), biz_dep=mvindex(split(key,"|||"),3), perc_ownership=mvindex(split(key,"|||"),4), biz_desc=mvindex(split(key,"|||"),5), biz_owner=mvindex(split(key,"|||"),6), biz_email=mvindex(split(key,"|||"),7) \
| fields - key
iseval = 0

