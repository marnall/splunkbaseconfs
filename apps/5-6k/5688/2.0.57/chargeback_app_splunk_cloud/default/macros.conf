[chargeback_normalized_search_id(1)]
description = Normalize Search ID for the Splunk - SH - 04 - Audit Search Activity - Dashboard
args = search_id
definition = rex field=$search_id$ mode=sed "s/^'|'$//g" \
| rex field=$search_id$ "_(?<search_id_normalized1>\d+[._]\d+)_" \
| rex field=$search_id$ "(?<search_id_normalized2>\d+[._]\d+$)" \
| rex field=$search_id$ "(?<search_id_normalized3>^\d+[._]\d+)" \
| eval $search_id$_normalized=if(isnull(search_id_normalized1),search_id_normalized2,search_id_normalized1) \
| eval $search_id$_normalized=if(isnull($search_id$_normalized),search_id_normalized3,$search_id$_normalized) \
| eval $search_id$_normalized=if(isnull($search_id$_normalized),search_id,$search_id$_normalized)\
| rex field=$search_id$_normalized mode=sed "s/\./_/g"\
`chargeback_comment("| rex field=$search_id$_normalized mode=sed "s/^\w+;\w+;//g"")`\
| rex field=$search_id$_normalized mode=sed "s/^\w+;.*;|^_ACCELERATE_DM_|^_ACCELERATE_|_ACCELERATE_$//g"\
| fields - search_id_normalized1,search_id_normalized2,search_id_normalized3

