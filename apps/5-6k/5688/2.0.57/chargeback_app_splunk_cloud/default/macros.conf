[chargeback_audit_data]
description = Chargeback Summary Job Audit Data
definition = fillnull value="Undefined" biz_unit biz_division biz_dep \
| stats Sum(total_run_time) As run_time , Values(savedsearch_name) As Job , Values(service_title) As ITSI_Service, Values(tags) As ITSI_Tags, Values(team_title) As ITSI_Team, Sum(searched_buckets) As searched_buckets , Sum(scan_count) As scan_count , Sum(event_count) As event_count, Sum(decompressed_slices) As decompressed_slices , Sum(total_slices) As total_slices , Sum(eliminated_buckets) As eliminated_buckets , Values(Index_Reference) As Index_Reference , Values(Sourcetype_Reference) As Sourcetype_Reference , Values(info) As info , Latest(biz_dep) As biz_dep , Latest(biz_division) As biz_division, Latest(name) As name , Latest(type) As type , Latest(status) As status, Latest(title) As title , Latest(email) As email , Latest(manager) As manager, Latest(workload_pool) As workload_pool , Values(mode) As mode , Min(search_et) As search_et , Max(search_lt) As search_lt , Values(roles) As roles , Latest(fully_completed_search) As Fully_Completed_Search , Values(provenance) As Provenances , Values(search_type) As Search_Type , Values(search_string) As Search_String , Values(host) As Splunk_Instance , Latest(search_id) As search_id , Latest(federated_server_name) As federated_server_name , Latest(federated_user) As federated_user , Latest(federated_version) As federated_version , Latest(is_federated_search) As is_federated_search By _time, biz_unit, shcluster_label, app, user, search_id_normalized \
| eval Search_Type = If(Search_Type = "scheduled" AND Search_Type="subsearch", "scheduled", Search_Type), Search_Type = If(Search_Type = "adhoc" AND Search_Type="subsearch", "adhoc", Search_Type) , Provenances = If(Provenances = "scheduled" AND Provenances="subsearch", "scheduled", Provenances), Provenances = If(Search_Type = "adhoc" AND Provenances = "subsearch", MvFilter(! Provenances LIKE "subsearch"), Provenances), Provenances = If(Provenances="scheduler" OR Search_Type="scheduled" , "scheduled", Provenances), Provenances = If(Provenances="N/A", Search_Type, Provenances ), Provenances = If(Search_Type="report_acceleration", Search_Type, Provenances), Job = If((Search_Type = "scheduled" OR Search_Type = "adhoc") AND Job ="N/A", MvFilter(! Job LIKE "N/A"), Job) \
| eval density = total_slices - decompressed_slices , sparseness = (event_count / scan_count) * 100 \
| rename app As App, user As User \
| fillnull value="N/A" Job \
| fillnull value=0 searched_buckets scan_count eliminated_buckets total_slices

[chargeback_weight_calculation]
description = Chargeback Summary Job Weight Calculation
definition = lookup chargeback_app_2_bunit_csv_lookup biz_unit As biz_unit app_name As App OUTPUTNEW perc_ownership as app_perc_ownership \
| fillnull value=0 cpu_used mem_used \
| fillnull value=100 app_perc_ownership \
\
| eventstats sum(run_time) As total_bunit_run_time sum(scan_count) As total_bunit_scan_count Sum(density) As total_bunit_density sum(searched_buckets) As total_bunit_searched_buckets sum(cpu_used) As total_bunit_cpu_used sum(mem_used) As total_bunit_mem_used by _time, search_id_normalized \
| foreach run_time, scan_count, density, searched_buckets, cpu_used, mem_used \
    [| eval <<FIELD>> = if( '<<FIELD>>' > 0, 'total_bunit_<<FIELD>>' * app_perc_ownership / 100, 0 ) ] \
\
| eventstats sum(run_time) As total_bunit_run_time sum(scan_count) As total_bunit_scan_count Sum(density) As total_bunit_density sum(searched_buckets) As total_bunit_searched_buckets sum(cpu_used) As total_bunit_cpu_used sum(mem_used) As total_bunit_mem_used by _time \
\
| eval total_bunit_cpu_used=If(total_bunit_cpu_used=0,1,total_bunit_cpu_used), total_bunit_mem_used=If(total_bunit_mem_used=0,1,total_bunit_mem_used), total_bunit_scan_count=If(total_bunit_scan_count=0,1,total_bunit_scan_count), total_bunit_run_time=If(total_bunit_run_time=0,1,total_bunit_run_time), total_bunit_searched_buckets=If(total_bunit_searched_buckets=0,1,total_bunit_searched_buckets), total_bunit_density=If(total_bunit_density=0,1,total_bunit_density)\
\
| eval total_weight = `chargeback_cpu_weight` + `chargeback_mem_weight` + `chargeback_run_time_weight` + `chargeback_searched_buckets_weight` + `chargeback_scan_count_weight` + `chargeback_density_weight` \
\
| eval SRU_Perc = (cpu_used * `chargeback_cpu_weight` / total_bunit_cpu_used + mem_used * `chargeback_mem_weight` / total_bunit_mem_used + run_time * `chargeback_run_time_weight` / total_bunit_run_time + searched_buckets * `chargeback_searched_buckets_weight` / total_bunit_searched_buckets + scan_count * `chargeback_scan_count_weight` / total_bunit_scan_count + density * `chargeback_density_weight` / total_bunit_density) / total_weight * 100\
\
| eventstats sum(SRU_Perc) As total_SRU_Perc by _time\
| eval SRU_Perc = SRU_Perc / total_SRU_Perc * 100

[chargeback_finalize_data]
description = Chargeback Summary Job Finalize Data
definition = stats Sum(run_time) As Total_Run_Time , Values(Index_Reference) As Indexes , Values(Sourcetype_Reference) As Sourcetypes , Values(info) As Statuses , Latest(biz_dep) As biz_dep , Latest(biz_division) As biz_division, Latest(name) As name , Latest(type) As type , Latest(status) As status, Latest(title) As title , Latest(email) As email , Latest(manager) As manager, Latest(workload_pool) As WLM_Pool , Values(mode) As Search_Mode , Min(search_et) As Dispatch_Earliest_Time , Max(search_lt) As Dispatch_Latest_Time , Values(roles) As User_Roles , Sum(SRU_Perc) As SRU_Perc , P99(mem_used) As Mem_Used, P99(cpu_used) As CPU_Used, Sum(scan_count) As Scan_Count, Sum(event_count) As Event_Count, Sum(searched_buckets) As Searched_Buckets Sum(density) As Density count As Num_Searches Latest(Fully_Completed_Search) As Fully_Completed_Search Values(Search_String) As Search_String , Values(Splunk_Instance) As Splunk_Instance , Values(ITSI_Service) As ITSI_Service, Values(ITSI_Tags) As ITSI_Tags, Values(ITSI_Team) As ITSI_Team , Latest(federated_server_name) As federated_server_name , Latest(federated_user) As federated_user , Latest(federated_version) As federated_version , Values(is_federated_search) As is_federated_search By _time, biz_unit, shcluster_label, App, User, Search_Type, Provenances, Job \
