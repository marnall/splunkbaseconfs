[chargeback_provenance_fields(1)]
description = Extracts Introspection Provenance Fields for Audit Search Activity Dashboard
args = provenance
definition = rex field=$provenance$ "(?<Provenance_Type>.*?):(?<Provenance_KO_Type>.*?):(?<Provenance_KO>.*?)$"\
| eval provenance_tmp=if(isnull(Provenance_Type), provenance, null())\
| rex field=provenance_tmp "(?<Provenance_Type>.*?):(?<Provenance_KO_Type>.*?)$"\
| eval provenance_tmp=if(isnull(Provenance_Type), provenance, null())\
| rex field=provenance_tmp "(?<Provenance_Type>.*?)$"\
| eval Dashboard_Name = if(Provenance_KO_Type="Dashboard", Provenance_KO, null() )\
| rex field=acceleration_id "_DM_(?<datamodel>.*)" \
| eval acceleration_id_report=if(type="report_acceleration", acceleration_id, null()) \
| eval datamodel_acceleration=if(provenance="summary_director", acceleration_id, null()) \
| rex field=acceleration_id_report "_(?<accelerated_report>\w+$)"\
| fields - acceleration_id_report datamodel_acceleration provenance_tmp

[chargeback_shcluster_label(1)]
description = Retrieves Splunk Search Head Cluster Label Name and additional Cluster information
args = Splunk_Instance
definition = eval $Splunk_Instance$=lower($Splunk_Instance$)\
| lookup chargeback_cloud_stack_info_csv_lookup fqdn As $Splunk_Instance$ OUTPUTNEW label, label As shcluster_label, role, role AS Splunk_Roles\
| eval shcluster_label = if(isnull(shcluster_label) OR shcluster_label="", lower(host), shcluster_label)

[chargeback_lookup_reference(1)]
description = Extracts Any Reference to Lookups
args = field
definition = rex field=$field$ max_match=10 "\|\s*inputlookup\s+(?<Input_Lookup>.*?)($|\||`)" \
| rex field=$field$ max_match=10 "\|\s*from\s+inputlookup:(?<From_Input_Lookup>[^|]+)" \
| rex field=$field$ max_match=10 "\|\s*from\s+lookup:(?<From_Lookup>[^|]+)" \
| rex field=$field$ max_match=10 "\|\s*outputlookup\s+(?<Output_Lookup>[^|]+)\'" \
| eval lookup_reference=mvsort(mvdedup(lower(mvappend(Input_Lookup,From_Lookup,From_Input_Lookup,Output_Lookup)))) \
| rex field=lookup_reference mode=sed "s/\"|append=\w+|create_empty=\w+|createinapp=\w+|override_if_empty=\w+|event_time_field=\w+|output_format=\w+|local=\w+|update=\w+|key_field=\w+|enabled=\w+|max=\w+|type=\w+|\s+where\s+.*|\$|',.*$|\]//g" \
| rex field=lookup_reference mode=sed "s/\s+//g"\
| eval lookup_reference = mvjoin(lookup_reference, ",")\
| eval lookup_reference = if(isnotnull(lookup_reference) AND lookup_reference!="", "lookup:" . trim(lookup_reference), null() ) \
| fields - Input_Lookup From_Input_Lookup From_Lookup Output_Lookup

[chargeback_macro_reference(1)]
description = Extracts Any Reference to Macros
args = field
definition = rex field=$field$ max_match=10 "`(?<macro_reference>[a-zA-Z0-9-_]+)(`|\()"\
| eval macro_reference = mvdedup(macro_reference)\
| eval macro_reference= mvjoin(macro_reference, ",")\
| eval macro_reference= if(isnotnull(macro_reference) AND macro_reference!="", "macro:" . trim(macro_reference), null() )

[chargeback_datamodel_reference(1)]
description = Extracts Any Reference to Data Models
args = field
definition = rex field=$field$ max_match=10 "(?i:from)\s+(?i:datamodel)=\"?(?<datamodel_reference1>.*?)(\s|\"|$)"\
| rex field=$field$ max_match=10 "(?-i:from)\s+(?-i:datamodel)[\s:]+(?<datamodel_reference2>.*?)(\s|$)"\
| eval datamodel_reference = mvdedup(mvappend(datamodel_reference1,datamodel_reference2))\
| rex field=datamodel_reference mode=sed "s/\"|\\\|'|\s|,|\*//g" \
| eval datamodel_reference = if(isnull(datamodel_reference) OR datamodel_reference="", null(), datamodel_reference)\
| eval datamodel_reference = mvjoin(datamodel_reference, ",")\
| eval datamodel_reference = if(isnotnull(datamodel_reference) AND datamodel_reference !="", "datamodel:" . trim(datamodel_reference), null() ) \
| rex field=datamodel_reference mode=sed "s/\./_/g"\
| fields - datamodel_reference1 datamodel_reference2

[chargeback_index_reference(1)]
description = Extracts Any Reference to Index(es)
args = field
definition = rex field=$field$ max_match=10 "\"?(?<!NOT\s)(?-i:index)\"?\s*=\s*\"?(?<Index_Reference_1>[\wa-zA-Z-_*]+)" \
```| eval Index_Reference_1 = mvfilter(! match(Index_Reference_1, "federated|^if$"))``` \
``` | eval Index_Reference_1 = mvfilter(! len(Index_Reference_1) < 2) ```\
```| eval Index_Reference_1 = mvfilter(! match($field$, "^\|\s*metadata\s+")) ```\
\
| rex field=$field$ max_match=10 "(?<!NOT\s)(?-i:index)\s+IN\s*\((?<Index_Reference_2>.*?)\)" \
| rex field=Index_Reference_2 mode=sed "s/\s+/,/g" \
| rex field=Index_Reference_2 mode=sed "s/,{1,}/,/g" \
| rex field=Index_Reference_2 mode=sed "s/\"//g" \
| eval Index_Reference_2 = split(Index_Reference_2, ",") \
\
\
| rex field=$field$ "^(\(|\||\s)+?`(?<Index_Reference_3>[a-zA-Z0-9-_]+)(`|\()"\
| rex field=$field$ max_match=10 "^\"?(?-i:eventtype)\"?\s*=\s*\"?(?<Index_Reference_4>[\wa-zA-Z-_*]+)" \
\
| rex field=$field$ "`(?<Index_Reference_5>[a-zA-Z0-9-_]+)(`|\()"\
| eval Index_Reference_5 = if(match(Index_Reference_5, "(?i:index)"), Index_Reference_5, null()) \
\
| rex field=$field$ max_match=10 "\"?(?-i:index)\"?\s*=\s*\"?(?<Index_Reference_6>(?-i:federated):[\wa-zA-Z-_*]+)"\
\
| eval Index_Reference = mvdedup(trim(mvappend(Index_Reference_1,Index_Reference_2,Index_Reference_3,Index_Reference_4,Index_Reference_5,Index_Reference_6))) \
| rex field=Index_Reference mode=sed "s/\"|'|\\\//g" \
| eval Index_Reference = mvsort(mvdedup(trim(Index_Reference))) \
| rex field=Index_Reference mode=sed "s/[^[:ascii:]]//g" \
| rex field=Index_Reference mode=sed "s/[^\da-zA-Z-:_*]//g"\
| fields - Index_Reference_*

[chargeback_sourcetype_reference(1)]
description = Extracts Any Reference to Source Type(s)
args = field
definition = rex field=$field$ max_match=10 "\"?(?<!NOT\s)(?-i:sourcetype)\"?\s*=\s*\"?(?<Sourcetype_Reference_1>[\wa-zA-Z-_*:]+)" \
| rex field=$field$ max_match=10 "(?<!NOT\s)(?-i:sourcetype)\s+IN\s*\((?<Sourcetype_Reference_2>.*?)\)" \
| eval Sourcetype_Reference = mvdedup(trim(mvappend(Sourcetype_Reference_1,Sourcetype_Reference_2))) \
| rex field=Sourcetype_Reference mode=sed "s/\"|'|\\\|,//g" \
| eval Sourcetype_Reference = mvsort(mvdedup(trim(Sourcetype_Reference))) \
| rex field=Sourcetype_Reference mode=sed "s/[^[:ascii:]]//g" \
| fields - Sourcetype_Reference_*\
| rex max_match=0 "sourcetype_count__(?<sourcetype_reference>[.\w:-]+)=(?<sourcetype_count>\d+)" \
| fields - sourcetype_count__* \
| eval Sourcetype_Reference = case (\
    match(Sourcetype_Reference, "^\*$"), "*",\
    isnull(sourcetype_reference) AND isnotnull(Sourcetype_Reference), Sourcetype_Reference, \
    isnull(Sourcetype_Reference) AND mvcount(sourcetype_reference) > 5, "*",\
    true(), sourcetype_reference) \
| rex field=Sourcetype_Reference mode=sed "s/\.|^if$//g"\
| rex field=Sourcetype_Reference mode=sed "s/\*{2,}/*/g"\
| eval Sourcetype_Reference=if(isnull(Sourcetype_Reference) OR Sourcetype_Reference="", null(), Sourcetype_Reference)\
| fields - Sourcetype_Reference_*

[chargeback_source_reference(1)]
description = Extracts Any Reference to Source(s)
args = field
definition = rex field=$field$ max_match=10 "(?<!NOT\s)source\\s*=\\s*(?<Source_Reference1>.*?)[\\s\"\\|]" \
| rex field=Source_Reference1 mode=sed "s/^[\\s$?><()\\\\,^=]*//g" \
| rex field=$field$ max_match=10 "(?<!NOT\s)source\\s+IN\\s*\\((?<Source_Reference2>.*?)\\)" \
| eval Source_Reference2 = split(Source_Reference2, ",") \
| rex field=Source_Reference2 mode=sed "s/^[\\s$?><()\\\\,^=]*//g" \
| eval Source_Reference=coalesce(Source_Reference1,Source_Reference2), Source_Reference=mvfilter((! match(Source_Reference,"^source|^\"|^ifisnull"))), Source_Reference=mvdedup(mvsort(Source_Reference)) \
| eval Source_Reference=if(((Source_Reference == "") OR isnull(Source_Reference)),null(),Source_Reference)\
| eval Source_Reference = if(match($field$, "source\s*=\s*\*|source=\"\*\""), "all-sources", Source_Reference) \
| fields - Source_Reference1 Source_Reference2

[chargeback_eventtype_reference(1)]
description = Extracts Any Reference to Event Type(s)
args = field
definition = rex field=$field$ max_match=10 "(?<!NOT\s)eventtype\\s*=\\s*(?<Eventtype_Reference1>.*?)[\\s\"\\|]" \
| rex field=Eventtype_Reference1 mode=sed "s/^[\\s$?><()\\\\,^=\\]\\[+]*//g" \
| rex field=$field$ max_match=10 "(?<!NOT\s)eventtype\\s+IN\\s*\\((?<Eventtype_Reference2>.*?)\\)" \
| eval Eventtype_Reference2 = split(Eventtype_Reference2, ",") \
| rex field=Eventtype_Reference2 mode=sed "s/^[\\s$?><()\\\\,^=]*//g" \
| eval Eventtype_Reference=coalesce(Eventtype_Reference1,Eventtype_Reference2), Eventtype_Reference=mvfilter((! match(Eventtype_Reference,"^eventtype|^trim|ifisnull|^\""))), Eventtype_Reference=mvdedup(mvsort(Eventtype_Reference))\
| eval Eventtype_Reference=if(((Eventtype_Reference == "") OR isnull(Eventtype_Reference)),null(),Eventtype_Reference)\
| fields - Eventtype_Reference1 Eventtype_Reference2

[chargeback_rest_reference(1)]
description = Extracts Any Reference to REST Calls
args = field
definition = rex field=$field$ max_match=10 "\|\s+(?-i:rest)\s+\N+?((?-i:servicesNS)|(?-i:services))(?<rest_reference>.*?)[\s`\"?]"\
| eval rest_reference = rtrim(rest_reference, "/")\
| rex field=rest_reference mode=sed "s/\/-\/-//g"\
| eval rest_reference = if(isnotnull(rest_reference) AND rest_reference!="", "rest:" . mvjoin(trim(rest_reference), ","), null() )

