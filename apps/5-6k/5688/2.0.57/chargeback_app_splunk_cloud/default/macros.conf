[chargeback_unit_conversion(1)]
description = Converts MB units to TB and PB
args = field
definition = eval $field$_TB = $field$ / 1024, $field$_PB = $field$_TB / 1024\
| rename $field$ As $field$_GB

[chargeback_index_info(1)]
description = chargeback_splunk_indexes_csv_lookup
args = index_name
definition = lookup chargeback_splunk_indexes_csv_lookup index_name As $index_name$ OUTPUTNEW type, app_name, default_retention, biz_desc, biz_owner

### Other ###
[chargeback_macro_name(1)]
description = Retrieve Macro referenced inside a Macro
args = field
definition = rex field=$field$ max_match=0 "\|\s*`(?<Macro_Reference>.*?)[(`]"

[chargeback_macro_definition(2)]
description = Retrieve Macro definition (Quick)
args = shcluster_label,title
definition = lookup chargeback_rest_data_macros_kv_store_lookup shcluster_label As $shcluster_label$ title As $title$ OUTPUTNEW definition As Macro_Definition

[chargeback_field_reference(2)]
description = Extracts references provided in the first argument in any string provided in the second argument.
args = field,type
definition = rex field=$field$ max_match=10 "\"?$type$\"?\s*=\s*\"?(?<$type$_reference_1>[\wa-zA-Z-_*]+)" \
| rex field=$field$ max_match=10 "$type$\s+(?-i:IN)\s*\((?<$type$_reference_2>.*?)\)" \
| eval $type$_reference_2 = split($type$_reference_2, ",")\
| eval $type$_reference = mvdedup(trim(mvappend($type$_reference_1,$type$_reference_2)))\
| rex field=$type$_reference mode=sed "s/\"|\\\|,//g"\
| eval $type$_reference = mvjoin($type$_reference, ",")\
| eval $type$_reference = if(isnotnull($type$_reference) AND $type$_reference!="" AND $type$_reference!="N/A" AND ! match($type$_reference, "mvindex"), "$type$:" . $type$_reference, null() ) \
| fields - $type$_reference_*

[chargeback_command_reference(1)]
description = Extracts Splunk commands references from any string.
args = field
definition = rex field=$field$ "^\|\s*(?<splunk_command>\w+)" \
| eval splunk_command = if(isnotnull(splunk_command) AND splunk_command!="", "command:" . splunk_command, null() )

[chargeback_search_string_cleanup]
description = Removed any Data Model or Report Acceleration search strings before summarizing the data
definition = eval search_string = If(Match(search_string, "^\|\s*summarize\s+|^summarize\s+") OR Match(search_type, "_acceleration"), Null(), search_string)

[chargeback_forecast(4)]
description = Used for Forecasting
args = ft, hb, v, ci
definition = eval _ft=$ft$, _hb=$hb$, _vars="$v$", _ci=$ci$

# Misc
[fields]
description = Gather field list using | fieldsummary (Quick)
definition = rename "eai:acl.*" as "*" , "eai:*" AS "*"\
| fields - "perms.*", "can_*", id, published, removable, modifiable, updated \
| fieldsummary \
| rename field AS Fields_List \
| fields Fields_List \
| where Fields_List!="Fields_List" \
| mvcombine Fields_List \
| eval Fields_List=mvjoin(Fields_List," ")

[chargeback_entitlements(1)]
description = Chargeback Entitlements Types generator
args = type
definition = append \
    [| makeresults count=1 \
    | eval type="$type$" \
    | table type ]

[chargeback_entitlements]
description = Chargeback Entitlements Types generator
