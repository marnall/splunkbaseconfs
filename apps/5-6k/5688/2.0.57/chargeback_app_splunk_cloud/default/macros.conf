[chargeback_user_2_bunit_backup]
definition = union \
    [| inputlookup chargeback_user_2_bunit_csv_lookup \
    | eval biz_unit = if(user_name in ("app-installer","internal_automation","internal_monitoring","internal_observability","index-manager","internal_ops_admin"), "Splunk", biz_unit) \
    | foreach biz_unit,biz_division,biz_dep \
        [| eval <<FIELD>> = if(user_name in ("splunk-system-user","admin"), null(), <<FIELD>>) ] \
    | foreach biz_unit,biz_division,biz_dep \
        [| eval <<FIELD>> = if(user_name in ("app-installer","internal_automation","internal_monitoring","internal_observability","index-manager","internal_ops_admin"), "Splunk", <<FIELD>>) ] \
    | foreach biz_division,biz_dep \
        [| eval <<FIELD>> = IF(ISNULL(<<FIELD>>) OR <<FIELD>>="", biz_unit, <<FIELD>>) ] \
    | appendpipe [ stats count | where count=0 | fields - count | eval biz_unit="prevent_empty_table" ] \
    | table user_name, biz_unit, biz_division, biz_dep, name, type, status, title, email, manager, manager_id \
    | outputlookup chargeback_user_2_bunit_csv_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | eval _time = NOW() \
    | collect `chargeback_summary_index` source=chargeback_user_2_bunit_csv_lookup sourcetype=stash testmode=false ]

