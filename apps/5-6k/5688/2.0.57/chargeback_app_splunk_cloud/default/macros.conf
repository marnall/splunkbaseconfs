[chargeback_vcpu_weight]
description = The `chargeback_vcpu_weight` macro is utilized by the `chargeback_introspection_vcpu_usage_tracker` to adjust the vCPU weight for the indexer tier. This adjustment allows for fine-tuning of vCPU usage calculations: \
- A value greater than 1 decreases the vCPU weight. \
- A value of 1 is neutral and makes no adjustment. \
- A value less than 1 increases the vCPU weight. \
The factory default settings are:\
- Indexer Tier: 1.5 \
- Search Head Tier: 2 \
These defaults ensure balanced and optimized resource tracking across different tiers. Adjust the values as needed to better reflect your environment's resource usage.
definition = 1.5

