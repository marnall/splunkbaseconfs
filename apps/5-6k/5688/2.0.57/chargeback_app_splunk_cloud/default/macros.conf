[discovery_rest_info]
description = For Splunk Enterprise customers used by the chargeback_onprem_stack_info_csv_lookup_gen discovery job
definition = rest /servicesNS/-/-/server/info splunk_server=* \
| eval is_connected = "yes" , is_search_head = if(server_roles="search_head", "yes", "no") \
| eval server_roles = if(! match(server_roles, "indexer|search_head"), mvappend(server_roles, "heavy_forwarder"), server_roles)\
| join splunk_server type=left \
    [| rest /servicesNS/-/-/cluster/config splunk_server=* ] \
| join splunk_server type=left \
    [| rest /servicesNS/-/-/shcluster/config splunk_server=* ] \
| join splunk_server type=left \
    [| rest /services/search/distributed/peers splunk_server=local \
    | rename host as splunk_server \
    | rex field=search_groups max_match=100 "dmc_customgroup_(?<Custom_Groups>.*?)$" \
    | fields splunk_server Custom_Groups ]

[discovery_hf_info]
description = For Splunk Enterprise customers used by the chargeback_onprem_stack_info_csv_lookup_gen discovery job
definition = append \
    [ search index=_internal sourcetype=splunkd component=Metrics group=tcpin_connections fwdType=full earliest=-4h \
    | stats count by hostname \
    | eval server_roles = "heavy_forwarder" \
    | rename hostname as splunk_server ]

[discovery_sh_info]
description = For Splunk Enterprise customers used by the chargeback_onprem_stack_info_csv_lookup_gen discovery job
definition = append \
    [| tstats summariesonly=true count Where index=_introspection sourcetype=splunk_resource_usage component::PerProcess data.process_type=search earliest=-24h by data.search_props.search_head \
    | rename data.search_props.search_head as splunk_server \
    | eval is_search_head = "yes" , server_roles="search_head"] \
| append \
    [ search index=_internal sourcetype=scheduler app=* NOT app IN (splunk_archiver,splunk_instrumentation,splunk_monitoring_console,splunk_rapid_diag) earliest=-4h \
    | eval is_search_head = "yes" , server_roles="search_head" \
    | rename host as splunk_server \
    | stats latest(is_search_head) as is_search_head latest(server_roles) as server_roles by splunk_server]

[discover_cloud_stack]
description = For Splunk Cloud customers used by the chargeback_onprem_stack_info_csv_lookup_gen discovery job
definition = append \
    [| tstats summariesonly=true \
        LATEST(_time) AS _time LATEST(dns_alt_name) AS dns_alt_name LATEST(sh_label) AS sh_label count AS num_events \
        Where index=_introspection sourcetype=splunk_resource_usage component::PerProcess data.process_type=search host IN (idx-*,sh-*,idm-*,c0m1-*) earliest=-24h \
        BY host \
    | eval label = Case ( \
        MATCH(dns_alt_name, "^es,"), "es",\
        MATCH(host,"^idm-"), "idm",\
        MATCH(host,"^c0m1-"), "cm",\
        MATCH(host,"^idx-"), "indexer",\
        MATCH(sh_label, "shc"), sh_label,\
        True(), dns_alt_name) \
    | eval role = Case(\
        MATCH(host,"^idm-"), "idm",\
        MATCH(host,"^c0m1-"), "cm",\
        MATCH(host,"^idx-"), "indexer",\
        TRUE(), "search_head")] \
| append \
    [| tstats summariesonly=true LATEST(_time) AS _time Where index=_introspection sourcetype=splunk_resource_usage data.process_type=search NOT data.search_props.search_head IN (sh-*,idm-*,c0m1-*) AND host=idx-* earliest=-24h BY data.search_props.search_head \
    | rename data.search_props.search_head AS host \
    | eval role="search_head" , label="hybrid" \
    | fields _time, host, role, label ] \
| append \
    [| search index=_audit sourcetype=audittrail action=search info=completed total_run_time>0 federated_server_name=* earliest=-24h \
    | fields _time federated_server_name \
    | where ! match(federated_server_name, "\*") \
    | stats LATEST(_time) AS _time by federated_server_name \
    | eval host = lower(federated_server_name) \
    | eval role="search_head" , label="federated" \
    | fields _time, host, role, label ] \
| eval label = IF(ISNULL(label) OR label="", "hybrid", label)
iseval = 0

[discovery_cluster_info]
description = For Splunk Enterprise customers used by the chargeback_onprem_stack_info_csv_lookup_gen discovery job
definition = append \
    [ search (index=_internal sourcetype=splunkd_access method=POST CASE(/services/shcluster/member) ) OR (index=_internal sourcetype=splunkd_access uri_path IN ("*/itsi*", "*/SplunkEnterpriseSecuritySuite*") )\
        OR (index=_internal sourcetype=splunk_web_access) earliest=-24h \
    | rename host as splunk_server \
    | eval is_search_head = "yes" , server_roles="search_head" \
    | stats values(uri_path) as uri_path latest(is_search_head) As is_search_head latest(server_roles) As server_roles by splunk_server ]

[discovery_label_create]
description = For Splunk Enterprise customers used by the chargeback_onprem_stack_info_csv_lookup_gen discovery job
definition = eval label = case (\
    isnotnull(shcluster_label) AND shcluster_label!="", shcluster_label,\
    match(server_roles,"indexer") AND isnotnull(cluster_label) AND cluster_label!="", cluster_label,\
    uri_path LIKE "%/services/shcluster/member/%" AND uri_path LIKE "%/itsi/%", "itsi-shc",\
    uri_path LIKE "%/services/shcluster/member/%" AND uri_path LIKE "%/SplunkEnterpriseSecuritySuite/%", "es-shc", \
    uri_path LIKE "%/itsi/%", "itsi",\
    uri_path LIKE "%/SplunkEnterpriseSecuritySuite/%", "es",\
    uri_path LIKE "%/services/shcluster/member/%", "shc")

[discovery_roles_create]
description = For Splunk Enterprise customers used by the chargeback_onprem_stack_info_csv_lookup_gen discovery job
definition = eval server_roles = case (\
    match(splunk_server, "^idm-"), mvappend(server_roles, "idm"),\
    mode="master" OR match(splunk_server,"^c0m1-") OR match(server_roles,"^cluster_ma"), mvappend(server_roles, "cluster_manager"),\
    uri_path LIKE "%/services/shcluster/member/%" AND uri_path LIKE "%/itsi/%", mvappend(server_roles, "itsi-shc"),\
    uri_path LIKE "%/services/shcluster/member/%" AND uri_path LIKE "%/SplunkEnterpriseSecuritySuite/%", mvappend(server_roles, "es-shc"), \
    uri_path LIKE "%/services/shcluster/member/%", mvappend(server_roles, "adhoc-shc"),\
    premium="itsi" OR uri_path LIKE "%/itsi/%", mvappend(server_roles, "itsi"), \
    premium="es" OR uri_path LIKE "%/SplunkEnterpriseSecuritySuite/%", mvappend(server_roles, "es"), \
    uri_path LIKE "%/services/shcluster/member/%", mvappend(server_roles, "adhoc-shc"), \
    mode="slave", mvappend(server_roles, "indexer"),\
    mode="searchhead", mvappend(server_roles, "search_head"),\
    true(), server_roles) \
| eval is_search_head = if(server_roles="search_head", "yes", is_search_head)\
| fillnull value="no" is_connected is_search_head \
| replace "cluster_master" WITH "cluster_manager" IN server_roles \
| replace "license_master" WITH "license_manager" IN server_roles \
| replace "cluster_slave" WITH "cluster_peer" IN server_roles \
| eval shcluster_label = if(match(server_roles,"shc") AND isnull(shcluster_label), label, shcluster_label) , server_roles = mvsort(mvdedup(mvappend(server_roles, Custom_Groups))) , manager_uri = coalesce(manager_uri, master_uri) \
| rename master_guid as manager_guid

[discovery_summary]
description = For Splunk Enterprise customers used by the chargeback_onprem_stack_info_csv_lookup_gen discovery job
definition = eval server_roles = mvjoin(server_roles, "|")\
| rename splunk_server as asset_splunk_server, host as asset_host\
| collect `chargeback_summary_index` source=chargeback_cloud_stack_info_csv_lookup sourcetype=stash testmode=false

[discovery_stats_table]
description = For Splunk Enterprise customers used by the chargeback_onprem_stack_info_csv_lookup_gen discovery job
definition = eval _time = now()\
| append [| inputlookup chargeback_cloud_stack_info_csv_lookup | rename fqdn as splunk_server , role as server_roles | eval _time = now() - 3600 ]\
`chargeback_comment("| append [ search `setup_summary_index` source=chargeback_cloud_stack_info_csv_lookup earliest=-24h | fields _time, asset_splunk_server, label, cluster_label, shcluster_label, server_roles, asset_host, host_fqdn, host_resolved, serverName, guid, manager_guid, is_connected, is_search_head |  makemv delim="|" server_roles  | stats values(server_roles) AS server_roles latest(label) as label latest(cluster_label) as cluster_label latest(shcluster_label) as shcluster_label latest(host) as host latest(host_fqdn) as host_fqdn latest(host_resolved) as host_resolved latest(serverName) as serverName latest(guid) as guid latest(manager_guid) as manager_guid latest(is_connected) as is_connected latest(is_search_head) as is_search_head latest(_time) as _time by asset_splunk_server | rename asset_host as host, asset_splunk_server as splunk_server]")`\
| eval splunk_server=lower(splunk_server)\
| stats values(server_roles) AS server_roles latest(label) as label latest(cluster_label) as cluster_label latest(shcluster_label) as shcluster_label latest(host) as host latest(host_fqdn) as host_fqdn latest(host_resolved) as host_resolved latest(serverName) as serverName latest(guid) as guid latest(manager_guid) as manager_guid latest(is_connected) as is_connected latest(is_search_head) as is_search_head latest(_time) as _time by splunk_server\
| eval label=if(isnull(label) OR label="", splunk_server, label)\
| streamstats dc(label) as count by label \
| eval label = if(match(label,"^es|^itsi|^shc$"), lower(label) . "-" . printf("%02d", count) , lower(label)) \
| eval role = case( \
    match(server_roles, "indexer"), "indexer", \
    match(server_roles, "cluster_manager"), "cluster_manager", \
    match(server_roles, "search_head"), "search_head", \
    true(), server_roles) \
| rename splunk_server as fqdn

