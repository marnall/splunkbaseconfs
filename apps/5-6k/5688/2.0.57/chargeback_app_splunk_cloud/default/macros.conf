[update_service_2_bunit_table(1)]
description = Updates ITSI Service 2 B-Unit Lookup
args = table
definition = rename service_title as $table$ \
| where isnull(biz_unit) \
| stats count by $table$ \
| rename $table$ as $table$_name \
| lookup chargeback_$table$_2_bunit_csv_lookup $table$_name OUTPUT $table$_name as found \
| where isnull(found)\
| table $table$_name, biz_division, biz_unit, biz_dep\
| outputlookup chargeback_$table$_2_bunit_csv_lookup Append=true CreateInApp=true Create_Empty=true Override_If_Empty=false

