| table _time, biz_unit, biz_division, biz_dep, shcluster_label, App, User, Search_Type, Provenances, Job, Search_Mode, SRU_Perc, Total_Run_Time, CPU_Used, Mem_Used, Scan_Count, Event_Count, Searched_Buckets, Density, Indexes, Sourcetypes, Statuses, WLM_Pool, Dispatch_Earliest_Time, Dispatch_Latest_Time, User_Roles, name, type, status, title, email, manager, Fully_Completed_Search, Num_Searches, Search_String , Splunk_Instance, ITSI_Service, ITSI_Tags, ITSI_Team, federated_server_name, federated_user, federated_version, is_federated_search

