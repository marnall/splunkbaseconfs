[chargeback_svc_usage_bunit_estimation]
description = Estimate SVC Usage for Ingest Customers BY B-Unit - [Splunk Cloud Only]
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
search = `chargeback_summary_index` source=chargeback_app_splunk_cloud_summary_tracker_v2 \
| bin _time Span=1d \
| stats SUM(Total_Run_Time) AS Total_Run_Time BY _time, biz_unit \
| eventstats SUM(Total_Run_Time) AS grand_total_run_time BY _time \
| join _time \
    [| search `splunk_cloud_summary` source=splunk-svc \
    | bin span=5m _time \
    | stats SUM(utilized_svc) AS utilized_svc MAX(stack_license_svc) AS stack_license_svc BY _time \
    | timechart Span=1d MAX(utilized_svc) AS Utilization \
    | fields + _time, Utilization] \
| search biz_unit="Global Information Security" \
| timechart span=1d SUM(eval(Total_Run_Time / grand_total_run_time * Utilization)) AS bunit_svc_usage \
| eval bunit_svc_usage=CEILING(bunit_svc_usage)

[chargeback_svc_usage_estimation]
description = Estimate SVC Usage for Ingest Customers - [Splunk Cloud Only]
dispatch.earliest_time = -1d@d
dispatch.latest_time = now
search = `splunk_cloud_summary` source=splunk-svc \
| bin span=5m _time \
| stats SUM(utilized_svc) AS utilized_svc MAX(stack_license_svc) AS stack_license_svc BY _time \
| timechart span=1d \
    eval(ROUND(MIN(utilized_svc),2)) AS Min_Utilization \
    eval(ROUND(MAX(utilized_svc),2)) AS Max_Utilization \
    eval(ROUND(AVG(utilized_svc),2)) AS Avg_Utilization\
    eval(ROUND(P99(utilized_svc),2)) AS P99_Utilization\
