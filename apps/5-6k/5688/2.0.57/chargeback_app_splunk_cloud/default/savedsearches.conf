[Chargeback Tracker Job Summary Dry Run using the Alternative Enrichment Priority Logic - Example 1]
description = Tracker Job Summary Dry Run: Fine-Tuned - [Splunk Cloud & Enterprise]
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
search = `chargeback_dry_run` `chargeback_comment(" `chargeback_bunit_enrichment_priority_order` Is the actual Macro that runs and consists of the following 8 Macros: ")` \
| `chargeback_job_2_bunit(savedsearch_name)`    `chargeback_comment(" Priority 1 ")` \
| `chargeback_custom_2_bunit(provenance)`       `chargeback_comment(" Priority 2 ")`\
| `chargeback_custom_2_bunit(workload_pool)`    `chargeback_comment(" Priority 3 ")`\
| `chargeback_user_2_bunit(user)`               `chargeback_comment(" Priority 4 ")` \
| `chargeback_manager_2_bunit(manager)`         `chargeback_comment(" Priority 5 ")` \
| `chargeback_role_2_bunit(roles)`              `chargeback_comment(" Priority 6 ")` \
| `chargeback_app_2_bunit(app)`                 `chargeback_comment(" Priority 7 ")` \
| `chargeback_host_2_bunit(shcluster_label)`    `chargeback_comment(" Priority 8 ")`

