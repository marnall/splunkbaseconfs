description = Index 2 B-Unit % Ownership Generator using hosts ingested - [Splunk Cloud & Enterprise]
dispatch.earliest_time = -4h@m
dispatch.latest_time = now
search = index=_internal sourcetype=splunkd component=LicenseUsage source="*license_usage.log" type=Usage b>0 earliest=-6d@w1 latest=-1d@w6 \
| fields _time idx st s h b \
| rename idx as index_name, s as source_name, st as sourcetype_name, h as host_name \
| `chargeback_normalize_storage_info` \
| bin _time span=1h \
| `chargeback_shcluster_label(host_name)` \
| eval host_name=if(isnotnull(shcluster_label), shcluster_label, host_name)\
| stats sum(eval(b/1024/1024/1024)) as ingestion_gb by _time, index_name, host_name \
| bin _time span=1d \
| stats Sum(ingestion_gb) As ingestion_gb By index_name, host_name \
| `chargeback_host_2_bunit(host_name)` \
| eval biz_unit = split(biz_unit, ",") \
| stats Sum(ingestion_gb) As ingestion_gb By biz_unit, index_name \
| eventstats Sum(ingestion_gb) as total_ingestion_index by index_name \
| eval perc_ownership = (ingestion_gb / total_ingestion_index) * 100 \
| eventstats Sum(perc_ownership) as total_ownership by index_name \
| foreach biz_dep,biz_division \
    [| eval <<FIELD>> = IF(ISNULL(<<FIELD>>) OR <<FIELD>>="", biz_unit, <<FIELD>>) ] \
| eval perc_ownership = round(perc_ownership, 2), total_ownership = round(total_ownership, 2) \
`chargeback_comment(" | append [| inputlookup chargeback_index_2_bunit_csv_lookup ] ")` \
| stats last(*) as * by biz_unit index_name biz_dep \
| table index_name, biz_unit, biz_division, biz_dep, biz_desc, biz_owner, biz_email, perc_ownership \
| sort index_name biz_unit biz_dep perc_ownership \
