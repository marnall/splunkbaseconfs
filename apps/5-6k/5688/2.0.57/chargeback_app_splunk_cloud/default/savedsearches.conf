[chargeback_app_splunk_cloud_summary_tracker_v2_custom]
description = Tracker Job - [Hourly] - [Splunk Cloud & Enterprise]
realtime_schedule = 0
schedule_priority = higher
cron_schedule = 5 * * * *
allow_skew = 5m
dispatch.earliest_time = -1h@h
dispatch.latest_time = -0h@h
search = `chargeback_tracker_data_source` earliest=-1h@h latest=-0h@h `chargeback_tracker_hosts` `chargeback_comment("Job Version: 2.0.57")` \
| `chargeback_tracker_fields_cleanup` \
| `chargeback_normalized_search_id(search_id)` \
| `chargeback_shcluster_label(host)` \
| `chargeback_index_sourcetype_reference(search_string)` \
| `chargeback_basic_user_info(user)` \
| `chargeback_bunit_enrichment_priority_order` \
| `chargeback_search_string_cleanup` \
| bin _time Span=1h \
| `chargeback_audit_data` \
| join _time search_id_normalized Type=left \
    [| tstats summariesonly=true FillNull_Value=0 `chargeback_percentile_function`(data.normalized_pct_cpu) AS normalized_pct_cpu `chargeback_percentile_function`(data.mem_used) AS mem_used `chargeback_percentile_function`(data.elapsed) AS total_run_time Where `chargeback_introspection_index` `chargeback_tracker_hosts_all` earliest=-1h@h latest=-0h@h BY _time Span=10s data.search_props.sid \
    | `chargeback_drop_dm_object_name(data.search_props)` \
    | eval normalized_pct_cpu = IF(normalized_pct_cpu=0.00, 0, normalized_pct_cpu) \
    | `chargeback_normalized_search_id(sid)` \
    | rename sid_normalized AS search_id_normalized \
    | bin _time Span=1h \
    | stats `chargeback_percentile_function`(normalized_pct_cpu) AS cpu_used `chargeback_percentile_function`(mem_used) AS mem_used SUM(total_run_time) AS total_run_time VALUES(sid) AS sid BY _time search_id_normalized \
