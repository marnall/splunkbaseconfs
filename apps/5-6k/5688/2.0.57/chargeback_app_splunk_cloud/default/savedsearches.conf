[chargeback_svc_index_estimation_report2]
description = Annual Splunk Cloud SVC Estimations for data ingestion with cost per GB - [Splunk Cloud Only]
dispatch.earliest_time = -15m
dispatch.latest_time = now
schedule_priority = higher
search = `splunk_cloud_summary` source="splunk-svc-consumer" svc_usage > 0 svc_consumer="data services" earliest=@y latest=@mon \
| fillnull value="" svc_consumer process_type search_provenances search_type search_app search_label search_user unified_sid search_modes labels search_head_names usage_source \
| eval unified_sid=if(unified_sid="",usage_source,unified_sid) \
| stats max(svc_usage) as utilized_svc by _time svc_consumer search_type search_app search_label search_user search_head_names unified_sid process_type \
| timechart span=1d sum(utilized_svc) by svc_consumer \
| rename "data services" as "svc_ingestion", "search" as "search" \
| join _time \
    [ search `splunk_cloud_summary` source=splunk-ingestion earliest=@y latest=@mon \
    | fields _time idx st ingestion_gb indexer_count License \
    | rename idx As index_name \
    | bin _time span=1h \
    | stats Latest(ingestion_gb) As ingestion_gb_idx_st Latest(License) As License By _time, index_name, st \
    | bin _time span=1d \
    | stats Sum(ingestion_gb_idx_st) As GB By _time ] \
| stats sum(GB) as total_gb_ingested_ytd sum(svc_ingestion) as svc_ingestion_ytd \
| eval svc_ingestion_ytd=ceiling(svc_ingestion_ytd) , total_gb_ingested_ytd=ceiling(total_gb_ingested_ytd) \
| rename svc_entitlement as License \
| eval PctUsed = PctUtilized * License \
| eval svc_per_gb = (svc_ingestion_ytd / total_gb_ingested_ytd) \
| eval cost_per_gb = (svc_per_gb * (License / 365 / 24)) \
| eval total_cost_billed = ceiling(cost_per_gb * total_gb_ingested_ytd) \
| table total_gb_ingested_ytd svc_ingestion_ytd cost_per_gb total_cost_billed License

[chargeback_introspection_vcpu_usage_tracker_v1]
allow_skew = 5m
cron_schedule = 20 * * * *
description = Splunk Enterprise vCPU Tracker v1 - [Hourly] - [Splunk Enterprise Only]
dispatch.earliest_time = -2h@h
dispatch.latest_time = -1h@h
realtime_schedule = 0
schedule_priority = higher
search = | tstats summariesonly=true fillnull_value=0 `chargeback_comment("Job Version: 2.0.57")`\
    `chargeback_percentile_function`(data.cpu_idle_pct) AS cpu_idle_pct `chargeback_percentile_function`(data.cpu_user_pct) AS cpu_user_pct `chargeback_percentile_function`(data.cpu_system_pct) AS cpu_system_pct `chargeback_percentile_function`(data.virtual_cpu_count) AS virtual_cpu_count \
    Where index=_introspection sourcetype=splunk_resource_usage component::Hostwide\
    `chargeback_tracker_hosts_all` earliest=-2h@h latest=-1h@h\
    BY _time span=10s host \
| `chargeback_drop_dm_object_name(data)` \
| `chargeback_shcluster_label(host)` \
| eval Splunk_Role = CASE (Splunk_Roles="indexer", "indexer", TRUE(), "search_head") \
| eval provisioned_vcpu = virtual_cpu_count / `chargeback_vcpu_weight` \
| eval PctUsed = (100 - cpu_idle_pct) / 100 \
| fields - shcluster_label, role, label, Splunk_Roles \
| bin span=5m _time \
| stats `chargeback_percentile_function`(provisioned_vcpu) AS provisioned_vcpu `chargeback_percentile_function`(PctUsed) AS PctUsed BY _time, host, Splunk_Role \
| eval PctUsed = PctUsed * provisioned_vcpu \
| stats SUM(PctUsed) AS PctUsed BY _time Splunk_Role \
| eventstats SUM(PctUsed) As total_PctUsed BY _time\
| eval total_vCPUs = \
    [| tstats summariesonly=true `chargeback_percentile_function`(data.virtual_cpu_count) AS virtual_cpu_count Where index=_introspection sourcetype=splunk_resource_usage component::Hostwide `chargeback_tracker_hosts_all` earliest=-2h@h latest=-1h@h BY host \
    | `chargeback_drop_dm_object_name(data)` \
    | stats SUM(virtual_cpu_count) AS total_vCPUs \
    | eval total_vCPUs = if(isnull(total_vCPUs) OR total_vCPUs="", 1, total_vCPUs) \
    | return $total_vCPUs ] \
| `chargeback_get_entitlement(svc)` \
| rename svc_entitlement as License \
| table _time, Splunk_Role, PctUsed, total_PctUsed, License, total_vCPUs\
| search NOT [ search `chargeback_summary_index` source=chargeback_introspection_vcpu_usage_tracker sourcetype=stash earliest=-2h@h latest=-1h@h | fields _time, Splunk_Role, PctUsed, total_PctUsed, License, total_vCPUs ]\
| collect `chargeback_summary_index` source=chargeback_introspection_vcpu_usage_tracker sourcetype=stash testmode=false \
| stats count

