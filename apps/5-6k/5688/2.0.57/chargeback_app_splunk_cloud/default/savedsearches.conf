search = `splunk_cloud_summary` source=splunk-entitlements `chargeback_comment("Job Version: 2.0.57")` \
| fields _time active_archive_license, svc_license, ingest_license, purchased_storage_blocks \
| eval purchased_storage_blocks = CASE (\
    ingest_license > 0 AND purchased_storage_blocks = 0, (90 * ingest_license / 500), \
    ingest_license > 0 AND purchased_storage_blocks > 0, purchased_storage_blocks + (90 * ingest_license / 500),\
    TRUE(), purchased_storage_blocks ) \
    ```| `chargeback_get_entitlement(svc)` ```\
| eval svc_license = if ( ISNOTNULL(svc_entitlement) AND svc_license = 0, svc_entitlement, svc_license) \
| stats LATEST(svc_license) AS svc_license LATEST(ingest_license) AS ingest_license LATEST(active_archive_license) AS active_archive_license LATEST(purchased_storage_blocks) AS purchased_storage_blocks \
| eval type = mvappend("SVC","INGEST","DDAS","DDAA","DDSS") \
| mvexpand type \
| eval entitlement = CASE (type="SVC", svc_license, type="INGEST", ingest_license, type="DDAS", purchased_storage_blocks, type="DDAA", active_archive_license, type="DDSS", "0", TRUE(), NULL()) \
    ```| lookup chargeback_entitlements_csv_lookup type AS type OUTPUTNEW yearly_cost AS yearly_cost ```\
| eval _time = NOW() \
| append \
    [| inputlookup chargeback_entitlements_csv_lookup \
    | fields type entitlement yearly_cost \
    | eval _time = NOW() ] \
| stats LATEST(entitlement) AS entitlement LATEST(yearly_cost) AS yearly_cost BY type \
| fillnull value=0 entitlement yearly_cost \
| eval order = case (\
    match(type, "SVC"), 1,\
    match(type, "INGEST"), 2,\
    match(type, "DDAS"), 3,\
    match(type, "DDAA"), 4,\
    match(type, "DDSS"), 5,\
    match(type, "FSS3"), 6,\
