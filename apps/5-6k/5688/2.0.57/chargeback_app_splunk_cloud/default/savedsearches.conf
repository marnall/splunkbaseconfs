[chargeback_job_metadata_report2]
description = Job Metadata using the REST API - [Splunk Cloud & Enterprise]
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
search = | rest /servicesNS/-/-/saved/searches splunk_server=* \
| rename eai:acl.* AS * \
| `chargeback_shcluster_label(splunk_server)` \
| stats LAST(*) AS * BY shcluster_label app title \
| rename title AS savedsearch_name \
| fields shcluster_label app savedsearch_name author action.email.to action.email.cc action.email.bcc description \
| rename action.email.* AS * \
| strcat to "," cc "," bcc job_email_recievers \
| rex field=job_email_recievers mode=sed "s/;/,/g" \
| rex field=job_email_recievers mode=sed "s/\s+//g" \
| eval job_email_recievers=LOWER(trim(job_email_recievers)) \
| eval job_email_recievers = split(job_email_recievers, ",") \
| stats VALUES(job_email_recievers) AS job_email_recievers dc(job_email_recievers) AS num_emails BY shcluster_label app savedsearch_name author \
| `chargeback_get_user_info(author)` \
| eval email=LOWER(email) \
| table shcluster_label app savedsearch_name author name email job_email_recievers num_emails \
| fillnull value="undefined" job_email_recievers email\
| where email != job_email_recievers

[chargeback_job_metadata_report3]
description = Job Metadata with Index information using the REST API - [Splunk Cloud & Enterprise]
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
search = | rest /servicesNS/-/-/saved/searches splunk_server=local \
| rename eai:acl.* AS * \
| rename title AS savedsearch_name \
| where disabled=0 AND is_scheduled=1 \
| fields app savedsearch_name description search \
| rex field=search max_match=10 "\"?(?<!NOT\s)(?-i:index)\"?\s*=\s*\"?(?<Index_Reference_1>[\wa-zA-Z-_*]+)" \
| eval Index_Reference_1 = mvfilter(! match(Index_Reference_1, "federated")) \
| rex field=search max_match=10 "(?<!NOT\s)(?-i:index)\s+IN\s*\((?<Index_Reference_2>.*?)\)" \
| rex field=Index_Reference_2 mode=sed "s/\s+/,/g" \
| rex field=Index_Reference_2 mode=sed "s/,{1,}/,/g" \
| rex field=Index_Reference_2 mode=sed "s/\"//g" \
| eval Index_Reference_2 = split(Index_Reference_2, ",") \
| rex field=search "^(\(|\||\s)+?`(?<Index_Reference_3>[a-zA-Z0-9-_]+)(`|\()" \
| rex field=search max_match=10 "^\"?(?-i:eventtype)\"?\s*=\s*\"?(?<Index_Reference_4>[\wa-zA-Z-_*]+)" \
| rex field=search "`(?<Index_Reference_5>[a-zA-Z0-9-_]+)(`|\()" \
| eval Index_Reference_5 = if(match(Index_Reference_5, "(?i:index)"), Index_Reference_5, null()) \
| rex field=search max_match=10 "\"?(?-i:index)\"?\s*=\s*\"?(?<Index_Reference_6>(?-i:federated):[\wa-zA-Z-_*]+)" \
| eval Index_Reference = mvdedup(trim(mvappend(Index_Reference_1,Index_Reference_2,Index_Reference_3,Index_Reference_4,Index_Reference_5,Index_Reference_6))) \
| rex field=Index_Reference mode=sed "s/\"|'|\\\//g" \
| eval Index_Reference = mvsort(mvdedup(trim(Index_Reference))) \
| rex field=search max_match=10 "(?i:from)\s+(?i:datamodel)=\"?(?<datamodel_reference1>.*?)(\s|\"|$)" \
| rex field=search max_match=10 "(?-i:from)\s+(?-i:datamodel)[\s:]+(?<datamodel_reference2>.*?)(\s|$)" \
| eval datamodel_reference = mvdedup(mvappend(datamodel_reference1,datamodel_reference2)) \
| rex field=datamodel_reference mode=sed "s/\"|\\\|'|\s|,|\*//g" \
| eval datamodel_reference = if(isnull(datamodel_reference) OR datamodel_reference="", null(), datamodel_reference) \
| eval datamodel_reference = mvjoin(datamodel_reference, ",") \
| eval datamodel_reference = if(isnotnull(datamodel_reference ) AND datamodel_reference !="", "datamodel:" . trim(datamodel_reference ), null() ) \
| eval Index_Reference = if(Index_Reference="tstats", datamodel_reference, Index_Reference) \
| stats values(Index_Reference) as Index_Reference values(datamodel_reference) as datamodel_reference values(app) as app values(*) as * by savedsearch_name \
| fields app savedsearch_name description Index_Reference datamodel_reference search \
| search Index_Reference!=_* \
| table app savedsearch_name Index_Reference datamodel_reference

[chargeback_macro_metadata_report1]
description = Retrieves Index References from Macros - [Splunk Cloud & Enterprise]
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = `chargeback_dry_run` \
| search NOT search_string IN ("| inputlookup *", "| makeresults *", "| rest *","mcatalog *","| metasearch *","index=_*") app!=chargeback*\
| dedup search_string \
| rex field=search_string max_match=100 "`(?<Macro_Reference>\p{Any}+?)`" \
| rex field=Macro_Reference mode=sed "s/\"|\s+//g" \
| eval Macro_Reference = if(((Macro_Reference == "") OR isnull(Macro_Reference)), "no-macro-reference", Macro_Reference) \
| mvexpand Macro_Reference \
| rex field=Macro_Reference max_match=100 "(?<Macro_Name>^[a-zA-Z0-9_-]+)" \
| rex field=Macro_Reference max_match=100 "\((?<Macro_Args>.*?)\)" \
| makemv delim="," Macro_Args \
| eval Macro_Args_Count = mvcount(Macro_Args) \
| eval Macro_Title = if (isnull(Macro_Args_Count), Macro_Name, Macro_Name . "(" . Macro_Args_Count . ")") \
| eval Macro_Title = if(((Macro_Title == "") OR isnull(Macro_Title)), "no-macro-title", Macro_Title) \
| fields - Macro_Reference1 Macro_Name Macro_Args Macro_Args_Count\
| `chargeback_macro_definition(shcluster_label,Macro_Title)` \
| eval search_string_short= substr(search_string,0,100) \
| rename Index_Reference as orig_Index_Reference \
| `chargeback_index_reference(Macro_Definition)` \
| rename Index_Reference as Index_Reference_From_Macro\
| search Macro_Reference="*index*"\
| table shcluster_label orig_Index_Reference Macro_Reference Macro_Definition Index_Reference_From_Macro  search_string_short Macro_Title\
| where isnotnull(Index_Reference_From_Macro)

[chargeback_macro_metadata_report4]
