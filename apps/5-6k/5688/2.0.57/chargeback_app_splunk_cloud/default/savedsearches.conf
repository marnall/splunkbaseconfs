[chargeback_bunit_sru_usage_alert1]
description = B-Unit Alert - [Splunk Cloud & Enterprise]
counttype = number of events
cron_schedule = 0 6 * * 1
dispatch.earliest_time = -1w
dispatch.latest_time = now
quantity = 0
relation = greater than
search = `chargeback_summary_index` source=chargeback_app_splunk_cloud_summary_tracker_v2 earliest=-1d@d latest=-0d@d \
| bin _time Span=1d \
| `chargeback_get_summary_data` \
| eventstats SUM(SRU_Perc) AS Total_SRU_Perc BY _time \
| join _time \
    [| `chargeback_sru_workload(chargeback_sru_all_workloads,1d,Max)` ] \
| eval svc_calculation = if ( "chargeback_sru_all_workloads" IN ("chargeback_sru_all_workloads","chargeback_vcpu_usage"), Utilization, svc_consumer_search_usage) \
| search biz_unit="*" \
| stats \
    SUM(eval(SRU_Perc / Total_SRU_Perc * svc_calculation)) AS svc_usage\
    VALUES(biz_unit) AS biz_unit\
    VALUES(biz_dep) AS biz_dep\
    BY _time shcluster_label App Search_Type Provenances User Job \
| stats SUM(svc_usage) AS bunit_svc_usage BY biz_unit \
| where bunit_svc_usage > 1

