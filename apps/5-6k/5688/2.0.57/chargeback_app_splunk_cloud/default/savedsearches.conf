`chargeback_comment("Optional: You can use this as a filter to only include identities configured in Splunk, but do this after you run chargeback_rest_identities_summary_data_gen and chargeback_summary_identities_kv_store_lookup_gen Jobs for the first time: | search [| inputlookup chargeback_rest_identities_kv_store_lookup | stats COUNT BY user_name | fields user_name] ")` \
\
