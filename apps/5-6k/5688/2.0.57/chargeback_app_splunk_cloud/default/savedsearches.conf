[chargeback_onprem_vcp_count_estimation_report]
description = Splunk Enterprise vCPU Estimated Count across the indexer and search head tiers - [Splunk Enterprise Only]
schedule_priority = higher
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | rest /servicesNS/-/-/server/info splunk_server=* \
| search server_roles IN (indexer, search_head) \
| eval splunk_instance = LOWER(splunk_server) , server_roles = CASE(server_roles="search_head", "search_head", server_roles="indexer", "indexer", TRUE(), "other") \
| fields splunk_instance, server_roles \
| append \
    [| tstats summariesonly=true dc("data.search_props.sid") AS num_searches dc("data.search_props.app") AS num_apps dc("data.search_props.label") AS num_labels dc("data.search_props.provenance") AS num_provenances WHERE (index=_introspection sourcetype=splunk_resource_usage "data.process_type"=search AND earliest=-30d) BY "data.search_props.search_head" \
    | eval splunk_instance = LOWER('data.search_props.search_head') , server_roles="search_heads" \
    | fields splunk_instance, server_roles, num_searches, num_apps, num_labels, num_provenances ] \
| join splunk_instance type=left \
    [| tstats summariesonly=true MAX("data.virtual_cpu_count") AS vCPU_Count WHERE (index=_introspection sourcetype=splunk_resource_usage component::Hostwide AND earliest=-1d) BY host \
    | eval splunk_instance = LOWER(host) \
    | fields splunk_instance, vCPU_Count] \
| eventstats SUM(vCPU_Count) As Total_Number_of_vCPUs \
| fillnull value=0 num_searches, num_apps, num_labels, num_provenances \
| eval Message = CASE(\
    ISNULL(vCPU_Count) OR vCPU_Count="", "WARNING, vCPU Count was undetected: The Splunk Instance: " . splunk_instance . " is searching the Splunk Indexer Tier with: " . printf("%'.2d", num_searches) . " Searches spanning ". printf("%'.2d", num_apps) . " Apps with " . printf("%'.2d", num_labels) . " Jobs and " . printf("%'.2d", num_provenances) . " Provenances in the last 30 Days however the vCPU Count was not detected, please report the number of vCPUs on this search head", \
    TRUE(), "Normal, vCPU Count was detected: The Splunk Instance: " . splunk_instance . " is searching the Splunk Indexer Tier with: " . printf("%'.2d", num_searches) . " Searches spanning ". printf("%'.2d", num_apps) . " Apps with " . printf("%'.2d", num_labels) . " Jobs and " . printf("%'.2d", num_provenances) . " Provenances in the last 30 Days") \
| table splunk_instance server_roles vCPU_Count Total_Number_of_vCPUs Message

