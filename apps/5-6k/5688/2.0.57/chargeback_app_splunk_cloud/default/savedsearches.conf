search = (index=_internal) earliest=-24h latest=now sourcetype=splunkd NOT(CASE(MetricSchemaProcessor)) Metrics TERM(group=instance) TERM(name=instance) (deployment_client OR cluster_search_head OR search_head OR indexer OR cluster_slave OR search_peer OR license_master) NOT(universal_forwarder) \
| eval mv_roles=split(instance_roles, ", ") \
