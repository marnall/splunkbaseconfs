[chargeback_svc_index_estimation_report]
description = Splunk Cloud SVC Estimations for searched indexes - [Splunk Cloud Only]
schedule_priority = higher
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = `chargeback_summary_index` source=chargeback_app_splunk_cloud_summary_tracker_v2 earliest=-1d@d latest=-0d@d \
| foreach Indexes, Sourcetypes \
    [ eval <<FIELD>>=split('<<FIELD>>',"|")] \
| bin _time Span=1d \
| `chargeback_get_summary_data` \
| `chargeback_get_entitlement(svc)` \
| eval svc_unit_cost = round(svc_yearly_cost / svc_entitlement / 365, 2) \
| eventstats Sum(SRU_Perc) As Total_SRU_Perc by _time \
| join _time \
    [| search earliest=-1d@d latest=-0d@d `chargeback_sru_workload(chargeback_sru_all_workloads,1d,Max)` ] \
| eval svc_calculation = if ( "chargeback_sru_all_workloads" IN ("chargeback_sru_all_workloads","chargeback_vcpu_usage"), Utilization, svc_consumer_search_usage) \
| `chargeback_get_sru_data` \
| eval svc_perc = svc_usage / svc_calculation * 100 \
| eval Cost = svc_unit_cost * svc_usage \
| search Indexes IN (*,cim_Network_Traffic_indexes) \
| lookup chargeback_rest_identities_kv_store_lookup user_name As User OUTPUT \
| lookup chargeback_rest_identities_kv_store_lookup user_name As manager OUTPUT name as manager_name email as manager_email \
| stats sum(svc_usage) as svc_usage sum(Cost) as Cost sum(Total_Run_Time) as Total_Run_Time latest(name) as Name latest(title) as Title latest(type) as Type latest(status) as Status latest(manager_name) as Manager latest(manager_email) as Manager_email latest(biz_*) as biz_* values(Indexes) as Indexes latest(email) as email by User \
| table User email Name Title Manager Manager_email Type Status biz_dep biz_unit svc_usage Cost Total_Run_Time Indexes

