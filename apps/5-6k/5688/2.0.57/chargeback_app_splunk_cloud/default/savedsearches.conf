description = Microsoft Active Directory Identity Information - [Splunk Cloud & Enterprise]
dispatch.earliest_time = -90d@d
dispatch.latest_time = now
search = index=appmsadmon OR index=msad sourcetype=activedirectory objectCategory="CN=Person,CN=Schema,CN=Configuration,*" \
| fields _time, sAMAccountName, bunit, department, division, employeeType, mail, title, manager, company, name, physicalDeliveryOfficeName, description, l, c, co, st, postalCode, info, OU\
``` Look for custom HCM fields, for example: fields that begins with extensionAttribute ```\
``` Other field name examples: "Business Title" "Company" "Company ID" "Cost Center" "Cost Center ID" "Department ID" "Department Name" "Descr" "Email" "Employee Status" "First Name" "HR Line of Business" "HR Line of Business Code" "HR Line of Business Hierarchy" "Job Code" "Job Title" "Last Day Worked" "Last Name" "Management Level Code" "Manager ID" "Middle Name" "Remote Worker" "Worker Sub Type" "Worker Type" ```\
| rex field=manager "CN=(?<manager>.*?)," \
| eval biz_unit = COALESCE(bunit, division, department, OU) \
| rename \
    sAMAccountName AS user_name\
    department AS biz_dep\
    employeeType AS type\
    division AS biz_division\
    mail AS email \
| foreach user_name email \
    [ eval <<FIELD>>=LOWER(TRIM('<<FIELD>>')) ] \
| stats \
    LATEST(biz_unit) AS biz_unit\
    LATEST(biz_division) AS biz_division\
    LATEST(biz_dep) AS biz_dep\
    LATEST(name) AS name\
    LATEST(type) AS type\
    LATEST(title) AS title\
    LATEST(email) AS email\
    LATEST(manager) AS manager\
    LATEST(manager_id) AS manager_id\
    LATEST(_time) AS _time\
    BY user_name \
| eval _time = IF(ISNULL(_time) OR _time="", NOW(), _time) \
| table _time, user_name, biz_unit, biz_division, biz_dep, name, type, status, title, email, manager, manager_id

