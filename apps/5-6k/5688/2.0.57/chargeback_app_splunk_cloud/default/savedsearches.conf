[Ingestion SVC Usage By B-Unit]
description = Ingestion SVC Usage BY B-Unit - [Splunk Cloud Only]
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = `chargeback_ingestion_summary` earliest=-7d@d latest=-0d@d \
| fields _time idx st ingestion_gb indexer_count \
| eval idx = IF(idx="default", "main", idx) \
| bin _time span=1d \
| stats SUM(ingestion_gb) AS ingestion_gb_idx_st BY _time, idx, st \
| eval ingestion_idx_st_GB = ingestion_gb_idx_st , ingestion_idx_st_TB = ingestion_gb_idx_st / 1024 \
| `chargeback_index_2_bunit(idx)` \
| fillnull value="Undefined" biz_unit, biz_dep \
| stats SUM(ingestion_gb_idx_st) AS ingestion_gb_idx BY _time, idx , biz_unit, biz_dep \
| stats SUM(ingestion_gb_idx) AS ingestion_gb_idx BY _time biz_unit \
| eventstats SUM(ingestion_gb_idx) AS total_ingestion_gb_idx BY _time \
| eval Perc_Usage = ingestion_gb_idx / total_ingestion_gb_idx \
| stats MAX(Perc_Usage) AS Perc_Usage BY _time biz_unit \
| join _time \
    [ search `splunk_cloud_summary` source=splunk-svc-consumer svc_consumer="data services" svc_usage > 0 earliest=-7d@d latest=-0d@d \
    | fields _time svc_usage \
    | bin _time span=1h \
    | stats SUM(svc_usage) AS svc_usage BY _time \
    | timechart span=1d MAX(svc_usage) AS ingestion_svc_usage \
    | fields _time ingestion_svc_usage ] \
| eval bunit_ingestiond_svc_usage = ingestion_svc_usage * Perc_Usage \
| timechart span=1d MAX(eval(ROUND(bunit_ingestiond_svc_usage,2))) AS bunit_ingestiond_svc_usage BY biz_unit \
| addtotals fieldname=ingestion_svc_usage

[SVC Calculations using svc-consumer]
description = SVC Calculations using svc-consumer - [Splunk Cloud Only]
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = `splunk_cloud_summary` source=splunk-svc-consumer process_type=search svc_consumer=search search_app=* svc_usage > 0 earliest=-30d@d latest=-0d@d \
| fields _time, adhoc_sid, process_type, search_app, search_label, search_provenance, search_type, search_user, svc_consumer, svc_usage \
| `chargeback_app_info(search_app)` \
| bin _time span=1h \
| stats SUM(svc_usage) AS svc_usage BY _time app_type search_app \
| timechart eval(ROUND(MAX(svc_usage),0)) BY app_type span=1d \
| append \
    [ search `splunk_cloud_summary` source=splunk-svc-consumer NOT process_type IN (search) svc_usage > 0 earliest=-30d@d latest=-0d@d \
    | fields _time, search_user, svc_consumer, svc_usage \
    | eval svc_consumer = CASE ( svc_consumer="search", "Search Launcher", svc_consumer="data services", "Ingestion", svc_consumer="shared services", "Splunk Cloud", TRUE(), svc_consumer) \
    | bin _time span=1h \
    | stats SUM(svc_usage) AS svc_usage BY _time svc_consumer \
    | timechart eval(ROUND(MAX(svc_usage),0)) BY svc_consumer span=1d]

[chargeback_data_ingestion_by_host_report1]
description = Data Ingestion by Host Name - [Splunk Cloud & Enterprise]
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = index=_internal source="*license_usage*" type=usage earliest=-1d@d latest=-0d@d \
| rename h as host_name , s as source_name, st as sourcetype_name, idx as index_name, s as source_name, i as indexer \
| eval\
    host_name = if(len(host_name)=0 OR isnull(host_name), "(SQUASHED)", host_name),\
    source_name = if(len(source_name)=0 OR isnull(source_name), "(SQUASHED)", source_name), \
    index_name = if(len(index_name)=0 OR isnull(index_name), "(UNKNOWN)", index_name),\
    index_name = if(index_name="default", "main", index_name) \
| stats SUM(eval(b/1024/1024/1024)) AS ingestion_gb values(source_name) as source_name values(sourcetype_name) as sourcetype_name BY _time, index_name, host_name

[chargeback_data_ingestion_by_host_report2]
description = Data Ingestion by Host Name using the Metrics Log - [Splunk Cloud & Enterprise]
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = index=_internal sourcetype=splunkd (source="*/splunk/*/metrics.log" OR source="*\\splunk\\*\\metrics.log") component=Metrics group=per_host_thruput kb>0 \
| fields _time,host,series,kb,ev \
| rename series as host_name \
| stats sum(kb) as kb sum(ev) as ev by host_name \
| eval mb=kb/1024, gb=kb/1024/1024

