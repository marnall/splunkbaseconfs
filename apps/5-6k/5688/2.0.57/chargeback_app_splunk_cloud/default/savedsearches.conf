| search provenance="UI:Dashboard:*" \
| eval updated = strptime(updated, "%Y-%m-%dT%H:%M:%S") \
| eval _time=updated \
| stats LATEST(*) AS * BY provenance base_search \
| eval updated = STRPTIME(updated, "%Y-%m-%dT%H:%M:%S.%3N%z") , diff_days=ROUND((search_lt-search_et)/86400,0) , total_run_time=round(total_run_time,2), search_et=round(search_et),search_lt=round(search_lt) \
