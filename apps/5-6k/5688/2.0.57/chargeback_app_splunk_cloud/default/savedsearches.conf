| eval Index_Reference_1 = mvfilter(! match(Index_Reference_1, "federated")) \
| rex field=definition max_match=10 "(?<!NOT\s)(?-i:index)\s+IN\s*\((?<Index_Reference_2>.*?)\)" \
| rex field=Index_Reference_2 mode=sed "s/\s+/,/g" \
| rex field=Index_Reference_2 mode=sed "s/,{1,}/,/g" \
| rex field=Index_Reference_2 mode=sed "s/\"//g" \
| eval Index_Reference_2 = split(Index_Reference_2, ",") \
| rex field=definition "^(\(|\||\s)+?`(?<Index_Reference_3>[a-zA-Z0-9-_]+)(`|\()" \
| rex field=definition max_match=10 "^\"?(?-i:eventtype)\"?\s*=\s*\"?(?<Index_Reference_4>[\wa-zA-Z-_*]+)" \
| rex field=definition "`(?<Index_Reference_5>[a-zA-Z0-9-_]+)(`|\()" \
| eval Index_Reference_5 = if(match(Index_Reference_5, "(?i:index)"), Index_Reference_5, null()) \
| rex field=definition max_match=10 "\"?(?-i:index)\"?\s*=\s*\"?(?<Index_Reference_6>(?-i:federated):[\wa-zA-Z-_*]+)" \
| eval Index_Reference = mvdedup(trim(mvappend(Index_Reference_1,Index_Reference_2,Index_Reference_3,Index_Reference_4,Index_Reference_5,Index_Reference_6))) \
| rex field=Index_Reference mode=sed "s/\"|'|\\\//g" \
| eval Index_Reference = mvsort(mvdedup(trim(Index_Reference))) \
| table app title Index_Reference definition \
| sort app title Index_Reference

[chargeback_rest_identities_summary_data_local]
description = Chargeback Identities - Summary Index - Gen Job - From REST - Local - [Daily] - [Splunk Cloud & Enterprise]
cron_schedule = 18 3 * * *
allow_skew = 5m
dispatch.earliest_time = -1s
dispatch.latest_time = now
search = | rest /servicesNS/-/-/authentication/users splunk_server=local ```If you are a Splunk Enterprise customer, configure this job on your monitoring console and change splunk_server=local to splunk_server=* ```\
| rename title AS user_name , realname AS name, roles AS splunk_role_map, type AS auth_type \
| eval Splunk_Instance = LOWER(splunk_server), user_name = LOWER(trim(user_name)), email = LOWER(email) \
| stats LAST(name) AS name , LAST(email) AS email , VALUES(splunk_role_map) AS splunk_role_map , VALUES(auth_type) AS auth_type BY Splunk_Instance, user_name \
| eval _time = NOW() \
| foreach splunk_role_map auth_type \
    [ eval <<FIELD>>=mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| table _time, Splunk_Instance, user_name, name, email, splunk_role_map, auth_type \
