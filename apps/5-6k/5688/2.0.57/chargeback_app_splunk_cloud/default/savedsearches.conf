[chargeback_identities_custom_kv_store_lookup_factory_default]
description = Chargeback Custom Identities Gen Job Factory Default - [Step 1] - [Daily] - [Splunk Cloud & Enterprise]
cron_schedule = 27 2 * * *
allow_skew = 5m
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
search = | makeresults `chargeback_comment("Job Version: 2.0.57")` \
`chargeback_comment("Refer to the “User 2 B-Unit” Enrichment Principle in the Configuration chapter of the doc")` \
| fields _time, custom_user_name, custom_biz_unit, custom_biz_division, custom_biz_dep, custom_name, custom_type, custom_status, custom_title, custom_email, custom_manager, custom_manager_id \
| rename \
    custom_user_name AS user_name\
    custom_biz_unit AS biz_unit\
    custom_biz_division AS biz_division\
    custom_biz_dep AS biz_dep\
    custom_name AS name\
    custom_type AS type\
    custom_status AS status\
    custom_title AS title\
    custom_email AS email \
    custom_manager AS manager \
    custom_manager_id AS manager_id\
\
| foreach user_name email \
    [ eval <<FIELD>>=LOWER(TRIM('<<FIELD>>')) ] \
| append \
    [ inputlookup chargeback_identities_custom_kv_store_lookup \
    | fields _time, user_name, biz_unit, biz_division, biz_dep, name, type, status, title, email, manager, manager_id ] \
\
`chargeback_comment("Optional: Normalize the B-Unit using the Division 2 B-Unit table:")` \
| `chargeback_division_2_bunit(biz_division)` \
\
`chargeback_comment("B-Unit Fabrication:")` \
| eval biz_unit = case ( \
    match(biz_unit, "(?i:bunit123)"), "Fabricated B-Unit Name using case Insensitive match", \
    biz_dep = "Department123", "Fabricated B-Unit Name based on department names",\
    biz_dep in ("abc","xyz"), "Fabricated Bunit Name from a list of Department names", \
    true(), biz_unit ) \
\
| foreach biz_dep,biz_division \
    [| eval <<FIELD>> = IF(ISNULL(<<FIELD>>) OR <<FIELD>>="", biz_unit, <<FIELD>>) ]\
\
`chargeback_comment("Optional: You can use this as a filter to only include identities configured in Splunk, but do this after you run chargeback_rest_identities_summary_data_gen and chargeback_summary_identities_kv_store_lookup_gen Jobs for the first time: | search [| inputlookup chargeback_rest_identities_kv_store_lookup | stats COUNT BY user_name | fields user_name] ")` \
\
`chargeback_comment("Optional: Use this to append all cloud users: | append [ | search `splunk_cloud_summary` `chargeback_svc_consumer` NOT search_user IN (admin, splunk-system-user,int_*,internal_*) earliest=-7d | stats COUNT BY search_user | rename search_user AS user_name | fields user_name ] ")`\
\
| stats \
    LATEST(biz_unit) AS biz_unit\
    LATEST(biz_division) AS biz_division\
    LATEST(biz_dep) AS biz_dep\
    LATEST(name) AS name\
    LATEST(type) AS type\
    LATEST(status) AS status\
    LATEST(title) AS title\
    LATEST(email) AS email\
    LATEST(manager) AS manager\
    LATEST(manager_id) AS manager_id\
    LATEST(_time) AS _time\
    BY user_name \
| eval _time = IF(ISNULL(_time) OR _time="", NOW(), _time) \
| table _time, user_name, biz_unit, biz_division, biz_dep, name, type, status, title, email, manager, manager_id \
| outputlookup chargeback_identities_custom_kv_store_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
| stats COUNT

