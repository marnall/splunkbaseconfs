    | eval role="search_head" , label="federated" \
    | fields _time, host, role, label ] \
| eval label = IF(ISNULL(label) OR label="", "hybrid", label) , fqdn = LOWER(host) \
| stats LATEST(label) AS label LATEST(role) AS role BY fqdn \
| table fqdn, label, role \
| outputlookup chargeback_cloud_stack_info_csv_lookup CreateInApp=True Create_Empty=True Override_If_Empty=False

