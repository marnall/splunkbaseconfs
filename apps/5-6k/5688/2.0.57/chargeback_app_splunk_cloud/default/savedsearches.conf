[chargeback_introspection_vcpu_usage_tracker]
allow_skew = 5m
cron_schedule = 20 * * * *
description = Splunk Enterprise vCPU Tracker - [Hourly] - [Splunk Enterprise Only]
dispatch.earliest_time = -2h@h
dispatch.latest_time = -1h@h
realtime_schedule = 0
schedule_priority = higher
search = | tstats summariesonly=true fillnull_value=0 `chargeback_comment("Job Version: 2.0.57")`\
    `chargeback_percentile_function`(data.cpu_idle_pct) AS cpu_idle_pct `chargeback_percentile_function`(data.virtual_cpu_count) AS total_vCPUs \
    Where index=_introspection sourcetype=splunk_resource_usage component::Hostwide\
    `chargeback_tracker_hosts_all` earliest=-2h@h latest=-1h@h\
    BY _time span=10s host \
| `chargeback_drop_dm_object_name(data)` \
| `chargeback_shcluster_label(host)` \
| eval chargeback_vcpu_weight = if(Splunk_Roles="indexer", `chargeback_vcpu_weight`, 2) \
| eval PctUsed = (100 - cpu_idle_pct) / 100 , ```License_vCPUs = round((total_vCPUs / chargeback_vcpu_weight), 2)```  License_vCPUs = total_vCPUs\
| eval Splunk_Role = CASE (Splunk_Roles="indexer", "indexer", TRUE(), "search_head") \
| bin span=5m _time \
| stats max(License_vCPUs) as License_vCPUs p99(PctUsed) as PctUtilized max(total_vCPUs) as total_vCPUs by _time host Splunk_Role \
| eval vCPU_Utilization = round((PctUtilized * License_vCPUs), 2) \
| stats sum(vCPU_Utilization) as vCPU_Utilization sum(License_vCPUs) as License_vCPUs sum(total_vCPUs) as total_vCPUs by _time Splunk_Role \
| eval PctUtilized = vCPU_Utilization / License_vCPUs \
| `chargeback_get_entitlement(svc)` \
| rename svc_entitlement as License \
| eval PctUsed = (PctUtilized * License) * (total_vCPUs / License)\
| eventstats SUM(PctUsed) As total_PctUsed BY _time \
| table _time, Splunk_Role, PctUsed, total_PctUsed, License, total_vCPUs, License_vCPUs, vCPU_Utilization, PctUtilized \
| search NOT \
    [ search `chargeback_summary_index` source=chargeback_introspection_vcpu_usage_tracker sourcetype=stash earliest=-2h@h latest=-1h@h \
    | fields _time, Splunk_Role, PctUsed, total_PctUsed, License, total_vCPUs ] \
| collect `chargeback_summary_index` source=chargeback_introspection_vcpu_usage_tracker sourcetype=stash testmode=false\
| stats count

[chargeback_introspection_index_size_tracker]
allow_skew = 5m
cron_schedule = 15 * * * *
description = Introspection Index Size Summary Tracker - [Hourly] - [Splunk Enterprise Only]
dispatch.earliest_time = -2h@h
dispatch.latest_time = -1h@h
realtime_schedule = 0
schedule_priority = higher
search = | tstats summariesonly=true `chargeback_comment("_introspection index frozenTimePeriodInSecs=1209600 or 14 Days, set the time selector to 14 days ago, remove line 19 and run the job to backfill")` `chargeback_comment("Job Version: 2.0.57")` \
    LATEST(data.total_size) AS total_size \
    LATEST(data.total_raw_size) AS total_raw_size\
    LATEST(data.datamodel_summary_size) AS datamodel_summary_size\
    LATEST(data.bucket_dirs.home.warm_bucket_size) AS warm_bucket_size\
    LATEST(data.bucket_dirs.cold.bucket_size) AS cold_bucket_size\
    Where index=_introspection sourcetype=splunk_disk_objects component::Indexes \
    data.total_size > 0\
    earliest=-2h@h latest=-1h@h\
    `chargeback_tracker_hosts_indexers` \
    BY _time span=1h host data.name \
| rename data.* AS * , name AS index_name \
| `chargeback_shcluster_label(host)` \
| eval label = if(isnull(label) OR label="", "idxc", label) \
| stats SUM(total_size) AS total_size_mb \
    SUM(total_raw_size) AS total_raw_size_mb \
    SUM(datamodel_summary_size) AS datamodel_summary_size_mb\
    SUM(warm_bucket_size) AS warm_bucket_size_mb\
    SUM(cold_bucket_size) AS cold_bucket_size_mb\
    BY _time, label, index_name \
| join label, index_name type=left \
    [| rest /services/data/indexes splunk_server=* \
    | join type=outer splunk_server title \
        [| rest /services/data/indexes-extended splunk_server=* ] \
    | append \
        [| rest /services/data/indexes datatype=metric splunk_server=* \
        | join type=outer splunk_server title \
            [| rest /services/data/indexes-extended datatype=metric] ] \
    | rename title AS index_name \
    | eval retentionDays = frozenTimePeriodInSecs/86400 \
    | `chargeback_shcluster_label(splunk_server)` \
    | eval label = if(isnull(label) OR label="", "idxc", label) \
    | stats MAX(retentionDays) as retentionDays by label, index_name \
    | fields label, index_name, retentionDays] \
| fillnull value=0 total_size_mb, total_raw_size_mb, datamodel_summary_size_mb, warm_bucket_size_mb, cold_bucket_size_mb \
| `chargeback_get_entitlement(ddas)` \
| rename ddas_entitlement as License \
| table _time, label, index_name, total_size_mb, total_raw_size_mb, datamodel_summary_size_mb, warm_bucket_size_mb, cold_bucket_size_mb, retentionDays, License \
| search NOT \
    [ search `chargeback_summary_index` source=chargeback_introspection_index_size_tracker sourcetype=stash earliest=-2h@h latest=-1h@h \
    | fields _time, label, index_name, total_size_mb, total_raw_size_mb, datamodel_summary_size_mb, warm_bucket_size_mb, cold_bucket_size_mb ] \
| collect `chargeback_summary_index` source=chargeback_introspection_index_size_tracker sourcetype=stash testmode=false \
| stats count

[chargeback_onprem_entitlements_csv_lookup_gen]
allow_skew = 5m
cron_schedule = 3 * * * *
description = Splunk Enterprise Storage Estimated Entitlement - [Daily] - [Splunk Enterprise Only]
dispatch.earliest_time = -48h
dispatch.latest_time = now
schedule_priority = higher
search = | inputlookup chargeback_entitlements_csv_lookup `chargeback_comment("Job Version: 2.0.57")` \
| append \
    [ search `chargeback_license_index` source=*license_usage* type=RolloverSummary earliest=-6d@w1 latest=-1d@w6 \
    | fields _time b guid licenseGroup licenseGuids pool poolsz productType slave stack stacksz subgroupId \
    | bin span=1d _time \
    | eval Volume = IF(stack="enterprise", stacksz, NULL()) \
    | stats LATEST(b) AS b VALUES(Volume) AS Volume BY slave, pool, _time \
    | stats SUM(b) AS b VALUES(Volume) AS Volume BY _time \
    | stats `chargeback_percentile_function`(b) AS Max_Daily_Ingest_Bytes VALUES(Volume) AS Volume \
    | mvexpand Volume \
    | stats `chargeback_percentile_function`(Max_Daily_Ingest_Bytes) AS Max_Daily_Ingest_Bytes SUM(Volume) AS Volume_Bytes \
    | `chargeback_get_entitlement(ingest)` \
    | rename ingest_* AS * \
    | eval type="INGEST", new_entitlement = ROUND(Volume_Bytes / 1024 / 1024 / 1024), entitlement = IF(```ISNULL(entitlement) OR entitlement<=10``` new_entitlement >= entitlement, new_entitlement, entitlement) \
    | fields type, entitlement, yearly_cost ] \
| append \
    [| tstats summariesonly=true `chargeback_percentile_function`(data.total_size) AS total_size Where index=_introspection sourcetype=splunk_disk_objects component::Indexes earliest=-4h BY host, data.name \
    | where total_size > 0 \
    | rename data.name AS index_name \
    | `chargeback_shcluster_label(host)` \
    | where role="indexer" \
    | join index_name \
        [| rest /services/data/indexes \
        | where ISNOTNULL(remotePath) \
        | stats COUNT BY title \
        | rename title AS index_name] \
    | stats SUM(total_size) AS total_size_MB \
    | `chargeback_get_entitlement(SmartStore)` \
    | rename SmartStore_* AS * \
    | eval type="SmartStore", new_entitlement = ROUND((total_size_MB / 1024 / 500), 2) , entitlement = IF(```ISNULL(entitlement) OR entitlement<=10``` new_entitlement >= entitlement, new_entitlement, entitlement) \
    | fields type, entitlement, yearly_cost ] \
| append \
    [| tstats summariesonly=true `chargeback_percentile_function`(data.capacity) AS capacity Where index=_introspection sourcetype=splunk_disk_objects component::Partitions earliest=-4h BY host, data.mount_point \
    | stats SUM(capacity) AS capacity BY host \
    | `chargeback_shcluster_label(host)` \
    | where role="indexer" \
    | stats SUM(capacity) AS capacity_MB \
    | `chargeback_get_entitlement(ddas)` \
    | rename ddas_* AS * \
    | eval type="DDAS", new_entitlement = ROUND((capacity_MB / 1024 / 500), 2) , entitlement = IF(```ISNULL(entitlement) OR entitlement<=10``` new_entitlement >= entitlement, new_entitlement, entitlement) \
    | fields type, entitlement, yearly_cost] \
| append \
    [| tstats summariesonly=true `chargeback_percentile_function`(data.virtual_cpu_count) AS virtual_cpu_count Where index=_introspection sourcetype=splunk_resource_usage component::Hostwide `chargeback_tracker_hosts_all` earliest=-2h@h latest=-1h@h BY host \
    | `chargeback_drop_dm_object_name(data)` \
    | stats SUM(virtual_cpu_count) AS total_vCPUs \
    | `chargeback_get_entitlement(svc)` \
    | rename svc_* AS * \
    | eval type="SVC", new_entitlement = CEILING(total_vCPUs), entitlement = IF(```ISNULL(entitlement) OR entitlement<=10```  new_entitlement >= entitlement, new_entitlement, entitlement) \
    | fields type, entitlement, yearly_cost] \
| stats LAST(entitlement) AS entitlement LAST(yearly_cost) AS yearly_cost BY type \
| fillnull value=0 entitlement yearly_cost \
| eval order = case (\
    match(type, "SVC"), 1,\
    match(type, "INGEST"), 2,\
    match(type, "DDAS"), 3,\
    match(type, "DDAA"), 4,\
    match(type, "DDSS"), 5,\
    match(type, "FSS3"), 6,\
    match(type, "SmartStore"), 7,\
    true(), 8) \
| sort order \
| table type, entitlement, yearly_cost \
| outputlookup chargeback_entitlements_csv_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false

