[sailpoint_identitynow_authentication]
search = sourcetype="sailpoint_identitynow" action="success" OR action="failure" NOT (attributes.info="LOGOUT" OR  attributes.info="LOGIN_AUTHN_ASSERTION" OR attributes.info="LOGIN_AUTHN_REQUEST")

[sailpoint_identitynow_change_account_management]
search = sourcetype="sailpoint_identitynow" (objects{}=ACCOUNT OR objects{}=IDENTITY OR objects{}=USER OR objects{}=ACCESS OR objects{}=ENTITLEMENT) NOT (action=failure OR action=success)

[sailpoint_identitynow_change_audit]
search = sourcetype="sailpoint_identitynow" NOT (action=failure OR action=success OR vendor_action="accessrequest*")

[sailpoint_identitynow_saml_authentication]
search = sourcetype="sailpoint_identitynow" technicalName=SAML_ASSERTION_RECEIVE_PASSED

[sailpoint_identitynow_access_request]
search = sourcetype="sailpoint_identitynow" vendor_action="accessrequest*"

[sailpoint_identitynow_user_logout]
search = sourcetype="sailpoint_identitynow" technicalName=USER_LOGOUT_PASSED

[ccx_sailpoint_identitysecuritycloud_change]
search = (sourcetype="sailpoint:production") AND (type IN ("PASSWORD_ACTIVITY", "USER_MANAGEMENT", "PROVISIONING","GOVERNANCE_GROUPS","ACCESS_ITEM","ACCOUNTS_REMOVE","CONFIG_HUB","SYSTEM_CONFIG","WORKFLOW","SYSTEM_CONFIG","CORRELATION_CONFIG_UPDATED","SOURCE_MANAGEMENT","SOURCE_SCHEDULE_UPDATED","IAI_ADMIN_AUDIT") OR operation= "LOGOUT") AND NOT (operation="SEND")
# tags = change

[ccx_sailpoint_identitysecuritycloud_authentication]
search = (sourcetype="sailpoint:production") AND (operation="AUTHENTICATE" OR technicalName IN ("AUTHENTICATION_REQUEST_FAILED","AUTHENTICATION_REQUEST_PASSED"))
# tags = authentication

[ccx_sailpoint_identitysecuritycloud_generic]
search = (sourcetype="sailpoint:production") AND NOT (type IN ("PASSWORD_ACTIVITY", "USER_MANAGEMENT", "PROVISIONING","GOVERNANCE_GROUPS","ACCESS_ITEM","ACCOUNTS_REMOVE","CONFIG_HUB","SYSTEM_CONFIG","WORKFLOW","SYSTEM_CONFIG","CORRELATION_CONFIG_UPDATED","SOURCE_MANAGEMENT","SOURCE_SCHEDULE_UPDATED","IAI_ADMIN_AUDIT") OR operation IN ( "LOGOUT","AUTHENTICATE") OR technicalName IN ("AUTHENTICATION_REQUEST_FAILED","AUTHENTICATION_REQUEST_PASSED") AND NOT (type="USER_MANAGEMENT" AND operation="SEND"))
# tags = generic