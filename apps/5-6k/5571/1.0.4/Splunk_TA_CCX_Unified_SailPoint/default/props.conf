[sailpoint_identitynow]
SHOULD_LINEMERGE = 0
category = Structured
pulldown_type = 1
BREAK_ONLY_BEFORE_DATE = 
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
KV_MODE = NONE
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false

REPORT-sailpoint-vendor_action = sailpoint-vendor_action

LOOKUP-sailpoint_identitynow_cim_action_authentication = sailpoint_identitynow_cim_action_authentication vendor_action operation OUTPUT cim_action AS action
LOOKUP-sailpoint_identitynow_cim_action_change = sailpoint_identitynow_cim_action_change operation OUTPUTNEW cim_action AS action
LOOKUP-sailpoint_identitynow_cim_status_change = sailpoint_identitynow_cim_status_change vendor_status OUTPUT cim_status AS status

##CIM Compliance##
EVAL-app             = if(isnotnull('attributes.sourceName') AND 'attributes.sourceName'!="null",'attributes.sourceName',if(('attributes.sourceName'="null"),"unknown", null()))
EVAL-user            = 'actor.name'
EVAL-signature       = 'attributes.info'
EVAL-reason          = 'name'
EVAL-src_ip          = if(cidrmatch("0.0.0.0/0",'ipAddress') OR cidrmatch("::/0",'ipAddress'),'ipAddress',null())
EVAL-src             = if(cidrmatch("0.0.0.0/0",'ipAddress') OR cidrmatch("::/0",'ipAddress'),'ipAddress',null())
EVAL-event_id        = 'id'
EVAL-vendor          = "SailPoint"
EVAL-vendor_product  = "SailPoint:IdentityNow"
EVAL-change_type     = if(match('attributes.info',"^LOGIN*"),null(),lower('objects{}'))
EVAL-object          = 'target.name'
EVAL-object_attrs    = 'attributes.description_after'
EVAL-src_user        = if(match('objects{}', "^ACCOUNT|IDENTITY|USER|ACCESS"),'actor.name',null())
EVAL-dvc             = if(isnotnull('attributes.hostName') AND 'attributes.hostName'!="",'attributes.hostName',null())
EVAL-object_category = if(match('attributes.info',"^LOGIN*"),null(),lower('objects{}'))
EVAL-vendor_status   = 'status'


[sailpoint:production]
FIELDALIAS-signature = name AS signature 
FIELDALIAS-result = name AS result
FIELDALIAS-object = target.name AS object
FIELDALIAS-authentication_service = attributes.sourceName AS authentication_service
FIELDALIAS-src_user = actor.name AS src_user
FIELDALIAS-vendor_status = status AS vendor_status
FIELDALIAS-vendor_action = action AS vendor_action

EVAL-src_ip = if(type="AUTH" AND 'attributes.hostName'!="Unknown",'attributes.hostName',null())
EVAL-src = if(type="AUTH" AND 'attributes.hostName'!="Unknown",'attributes.hostName',null())
EVAL-action = case((operation="AUTHENTICATE" OR technicalName IN ("AUTHENTICATION_REQUEST_FAILED","AUTHENTICATION_REQUEST_PASSED")) AND vendor_status="PASSED","success",(operation="AUTHENTICATE" OR technicalName IN ("AUTHENTICATION_REQUEST_FAILED","AUTHENTICATION_REQUEST_PASSED")) AND vendor_status="FAILED","failure", operation="MODIFY","modified",operation="REMOVE","deleted",operation="ADD","updated",operation="CHANGE","updated",operation="CREATE","created",operation="DELETE","deleted",operation="DISABLE","updated",operation="ENABLE","updated",operation="LOGOUT","logoff",operation="UPDATE","updated",operation="ACTIVATE","updated",operation="AGGREGATE","updated")
EVAL-app = "SailPoint"
EVAL-status = case(vendor_status="PASSED","success",vendor_status="FAILED","failure")
EVAL-object_category = mvjoin(lower('objects{}')," ")
EVAL-change_type = case(type IN ("PASSWORD_ACTIVITY","ACCESS_REQUEST", "USER_MANAGEMENT", "PROVISIONING","GOVERNANCE_GROUPS","ACCESS_ITEM","ACCOUNTS_REMOVE"), "AAA",operation= "LOGOUT","AAA",type IN ("CONFIG_HUB","SYSTEM_CONFIG","WORKFLOW","SYSTEM_CONFIG","CORRELATION_CONFIG_UPDATED","SOURCE_MANAGEMENT","SOURCE_SCHEDULE_UPDATED","IAI_ADMIN_AUDIT"), "filesystem")
EVAL-vendor = "SailPoint"
EVAL-vendor_product = "SailPoint:IdentitySecurityCloud"
EVAL-user = if('objects{}'="USER",'target.name','actor.name')
