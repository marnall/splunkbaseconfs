[sailpoint_identitynow_authentication]
search = sourcetype="sailpoint_identitynow" action="success" OR action="failure" NOT (attributes.info="LOGOUT" OR  attributes.info="LOGIN_AUTHN_ASSERTION" OR attributes.info="LOGIN_AUTHN_REQUEST")

[sailpoint_identitynow_change_account_management]
search = sourcetype="sailpoint_identitynow" (objects{}=ACCOUNT OR objects{}=IDENTITY OR objects{}=USER OR objects{}=ACCESS OR objects{}=ENTITLEMENT) NOT (action=failure OR action=success)

[sailpoint_identitynow_change_audit]
search = sourcetype="sailpoint_identitynow" NOT (action=failure OR action=success OR vendor_action="accessrequest*")

[sailpoint_identitynow_saml_authentication]
search = sourcetype="sailpoint_identitynow" technicalName=SAML_ASSERTION_RECEIVE_PASSED

[sailpoint_identitynow_access_request]
search = sourcetype="sailpoint_identitynow" vendor_action="accessrequest*"

[sailpoint_identitynow_user_logout]
search = sourcetype="sailpoint_identitynow" technicalName=USER_LOGOUT_PASSED
