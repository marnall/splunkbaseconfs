[sailpoint_identitynow]
SHOULD_LINEMERGE = 0
category = Structured
pulldown_type = 1
BREAK_ONLY_BEFORE_DATE = 
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
KV_MODE = NONE
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false

REPORT-sailpoint-vendor_action = sailpoint-vendor_action

LOOKUP-sailpoint_identitynow_cim_action_authentication = sailpoint_identitynow_cim_action_authentication vendor_action operation OUTPUT cim_action AS action
LOOKUP-sailpoint_identitynow_cim_action_change = sailpoint_identitynow_cim_action_change operation OUTPUTNEW cim_action AS action
LOOKUP-sailpoint_identitynow_cim_status_change = sailpoint_identitynow_cim_status_change vendor_status OUTPUT cim_status AS status

##CIM Compliance##
EVAL-app             = if(isnotnull('attributes.sourceName') AND 'attributes.sourceName'!="null",'attributes.sourceName',if(('attributes.sourceName'="null"),"unknown", null()))
EVAL-user            = 'actor.name'
EVAL-signature       = 'attributes.info'
EVAL-reason          = 'name'
EVAL-src_ip          = if(cidrmatch("0.0.0.0/0",'ipAddress') OR cidrmatch("::/0",'ipAddress'),'ipAddress',null())
EVAL-src             = if(cidrmatch("0.0.0.0/0",'ipAddress') OR cidrmatch("::/0",'ipAddress'),'ipAddress',null())
EVAL-event_id        = 'id'
EVAL-vendor          = "SailPoint"
EVAL-vendor_product  = "SailPoint:IdentityNow"
EVAL-change_type     = if(match('attributes.info',"^LOGIN*"),null(),lower('objects{}'))
EVAL-object          = 'target.name'
EVAL-object_attrs    = 'attributes.description_after'
EVAL-src_user        = if(match('objects{}', "^ACCOUNT|IDENTITY|USER|ACCESS"),'actor.name',null())
EVAL-dvc             = if(isnotnull('attributes.hostName') AND 'attributes.hostName'!="",'attributes.hostName',null())
EVAL-object_category = if(match('attributes.info',"^LOGIN*"),null(),lower('objects{}'))
EVAL-vendor_status   = 'status'