[CIM_Endpoint]
search = sourcetype="bitsight*" End_Point="findings" risk_category="Diligence" risk_vector_label= "Open Ports"

[CIM_IDS_Attacks]
search = sourcetype="bitsight*" End_Point="findings"  risk_vector_label  IN ("botnet infections","spam propagation","malware servers","unsolicited comm","potentially exploited")

[CIM_Vulnerability]
search = sourcetype="bitsight*" End_Point="findings" risk_vector_label="Patching Cadence"

[CIM_WFH_Endpoint]
search = sourcetype=bitsight-wfh-ip risk_type = "open_ports"

[CIM_WFH_ID]
search = sourcetype=bitsight-wfh-ip risk_type IN ("botnet infections","spam propagation","malware servers","unsolicited comm","potentially exploited")

[CIM_WFH_Vulnerability]
search = sourcetype=bitsight-wfh-ip risk_type = "potentially_exploited"

