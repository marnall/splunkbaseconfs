SHOULD_LINEMERGE = 0
category = Structured
description = BitSight Add-on Sourcetype
pulldown_type = 1
TRUNCATE = 9999999
KV_MODE = NONE
FIELDALIAS-CIM_ID_details_cc_ip_To_dest_i = "assets{}.asset" ASNEW dest
FIELDALIAS-CIM_Vul_details_infection = "details.infection" ASNEW signature
FIELDALIAS-CIM_Vul_forensics_host_ip_To_dest = "details.dest_port" ASNEW dest_port
FIELDALIAS-CIM_Vuln_details_vulnerability_To_CVE = "details.vulnerability_name" ASNEW cve
FIELDALIAS-CIM_details_cc_ip_To_dest_ip = "details.cc_ip" ASNEW dest_ip
FIELDALIAS-CIM_details_dest_port_To_dest_port = "details.dest_port" ASNEW dest_port
FIELDALIAS-CIM_details_detection_mechansim_To_ = "details.detection_mechanism" ASNEW ids_type
