FIELDALIAS-CIM_details_server_name_To_dest_host&dvc = "details.server_name" ASNEW dest_host
FIELDALIAS-CIM_details_server_name_To_dvc = "details.server_name" ASNEW dvc
FIELDALIAS-CIM_forensics_host_ip = "assets{}.asset" ASNEW dest_ip
FIELDALIAS-CIM_forensics_host_ip_To_src_ip = "forensics.host_ip" ASNEW src_ip
FIELDALIAS-CIM_riskType = risk_type ASNEW category
FIELDALIAS-FIELDALIAS-CIM_ID_forensics_host_ip_To_dest = "forensics.host_ip" ASNEW src
FIELDALIAS-CIM_riskType_to_RiskType = risk_vector_label ASNEW category
FIELDALIAS-CIM_details_infection_To_signature = "details.infection.family" ASNEW signature
FIELDALIAS-attributed_companies_name = "attributed_companies{}.name" ASNEW attributed_companies
FIELDALIAS-attributed_companies_guid = "attributed_companies{}.guid" ASNEW attributed_companies_guid
DATETIME_CONFIG = NONE
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false

