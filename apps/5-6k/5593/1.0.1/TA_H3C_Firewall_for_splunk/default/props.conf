[h3c:firewall]
EXTRACT-vendor_protocol = protType\(\d+\)=(?<vendor_protocol>.*?)(-|;)
EXTRACT-dest_ip = destIPAddr\(\d+\)=(?<dest_ip>((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))(-|;)
EXTRACT-src_ip = srcIPAddr\(\d+\)=(?<src_ip>((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))(-|;)
EXTRACT-dest_port = destPortNum\(\d+\)=(?<dest_port>((6553[0-5])|(655[0-2][0-9])|(65[0-4][0-9]{2})|(6[0-4][0-9]{3})|([1-5][0-9]{4})|([0-5]{0,5})|([0-9]{1,4})))(-|;)
EXTRACT-src_port = srcPortNum\(\d+\)=(?<src_port>((6553[0-5])|(655[0-2][0-9])|(65[0-4][0-9]{2})|(6[0-4][0-9]{3})|([1-5][0-9]{4})|([0-5]{0,5})|([0-9]{1,4})))(-|;)
EXTRACT-src_zone = srcZoneName\(\d+\)=(?<src_zone>.*?)(-|;)
EXTRACT-dest_zone = destZoneName\(\d+\)=(?<dest_zone>.*?)(-|;)
EXTRACT-vendor_action = policyActType\(\d+\)=(?<vendor_action>.*?)(-|;)
EXTRACT-rule_id = rule_ID\(\d+\)=(?<rule_id>\d+)(-|;)
EXTRACT-icmp_code = icmpCode\(\d+\)=(?<icmp_code>.*?)(-|;)
EXTRACT-icmp_type = icmpType\(\d+\)=\(\d+\)(?<icmp_type_desc>.*?)\((?<icmp_type>.*?)\)(-|;)

EVAL-src = src_ip
EVAL-dest = dest_ip
EVAL-action=case(vendor_action=="permitted", "allowed", vendor_action=="denied", "blocked")
EVAL-rule = rule_id

LOOKUP-vendor_protocol = h3c_protocol_lookup vendor_protocol OUTPUT protocol as protocol
