[han2zen-command]
usage = public
syntax = han2zen (<han2zen-options>)* <hankaku_field>
description = Convert Japanese hankaku characters to zenkaku characters
example1 = | han2zen hankaku_field  exclude=kana outfield=zenkaku_field
related = zen2han

[han2zen-options]
syntax = exclude=[kana|digit|ascii] | outfield=<zenkaku_field>

[zen2han-command]
usage = public
syntax = zen2han(<zen2han-options>)* <zenkaku_field>
description = Convert Japanese zenkaku characters to hankaku characters
example1 = | zen2han zenkaku_field exclude=ascii outfield=hankaku_field
related = han2zen

[zen2han-options]
syntax = exclude=[kana|digit|ascii] | outfield=<hankaku_field>


