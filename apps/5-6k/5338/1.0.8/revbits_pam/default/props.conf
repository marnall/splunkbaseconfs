

[syslog]
TRANSFORMS-force_sourcetype_for_revbits = force_sourcetype_for_revbits_pam

[revbits:pam]
EXTRACT-version = ^(?:[^\|\n]*\|){1}RevBits Privileged Access Management - (?P<version>[^\|]+)
EXTRACT-domain = ^(?:[^\|\n]*\|){2}(?P<domain>[^\|]+)
EXTRACT-severity = ^(?:[^\|\n]*\|){3}(?P<severity>[^\|]+)
EXTRACT-entity_type = ^(?:[^\|\n]*\|){4}(?P<entity_type>[^\|]+)
EXTRACT-entity_name = ^(?:[^\|\n]*\|){5}(?P<entity_name>[^\|]+)
EXTRACT-event = ^(?:[^\|\n]*\|){6}(?P<event>[^\|]+)
EXTRACT-user = ^(?:[^\|\n]*\|){8}(?P<user>[^\|]+)

EVAL-type = if((event=="login-failure" OR event=="login" OR event=="logout"),"authentication","")
EVAL-action = if(event=="login-failure","failure","success")
EVAL-app = "Privileged Access Management"
EVAL-vendor_product = "RevBits Privileged Access Management"

