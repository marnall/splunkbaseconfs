[tm_relative_time(2)]
args = epoch,relative
definition = relative_time($epoch$, "$relative$")
iseval = 1

[tm_strptime(2)]
args = timestr,format
definition = strptime("$timestr$", "$format$")
iseval = 1

[tm_strftime(2)]
args = epoch,format
definition = "\"".strftime($epoch$, "$format$")."\""
iseval = 1

[tm_trp2epoch(1)]
args = trp
# option 1: absolute time selection (e.g. between two dates), trp returns epoch for earliest and latest
# option 2a: relative time selection (e.g. last 24 hours), trp returns "now" for latest
# option 2b: realtime (e.g. last 1 hour (realtime)), trp returns "rt" for latest, half-botched workaround to at least somewhat allow rt selection: treat as static "now"
# option 2c: all time, latest is unset / empty string, treat as "now"
# option 4a: relative time selection (e.g. last 24 hours), trp returns "-24h" for earliest, calculate epoch relative to current time
# option 4b: realtime (e.g. last 1 hour (realtime)), trp returns "rt-1h" for latest, half-botched workaround to at least somewhat allow rt selection: treat as static "-1h"
definition = case(\
match("$trp$", "^\d+(\.\d+)?$$"), "$trp$", match("$trp$", "^\d\d\d\d-\d\d-\d\dT"), strptime("$trp$", "%FT%T.%3N%Z"), \
"$trp$"=="now" OR "$trp$"=="rt" OR "$trp$"=="", tostring(time()), \
true(), tostring(relative_time(time(), replace("$trp$", "^rt", ""))) \
)
iseval = 1

[tm_trp2epoch]
# special case for all time outputting a null value
definition = `tm_trp2epoch("")`

[tm_relative_trp(2)]
args = trp,relative
# seems as if you can't call an eval based macro from an eval based macro...
definition = tostring(relative_time(case(\
match("$trp$", "^\d+(\.\d+)?$$"), "$trp$", match("$trp$", "^\d\d\d\d-\d\d-\d\dT"), strptime("$trp$", "%FT%T.%3N%Z"), \
"$trp$"=="now" OR "$trp$"=="rt" OR "$trp$"=="", tostring(time()), \
true(), tostring(relative_time(time(), replace("$trp$", "^rt", ""))) \
), "$relative$"))
iseval = 1

[tm_business_hour_delta(4)]
args = start, end, output, resolution
definition = eval _tm_business_hour_delta = mvrange('$start$', '$end$', 60 * $resolution$) \
| eval _tm_business_hour_delta = `tm_business_hour_filter` \
| eval $output$ = 60 * $resolution$ * mvcount(_tm_business_hour_delta) \
| fields - _tm_business_hour_delta

[tm_business_hour_delta(3)]
args = start, end, output
definition = `tm_business_hour_delta($start$, $end$, $output$, 10)`

[tm_business_hour_filter]
definition = mvfilter(((tonumber(strftime(_tm_business_hour_delta, "%H")) = 8 AND tonumber(strftime(_tm_business_hour_delta, "%M")) >= 30) OR tonumber(strftime(_tm_business_hour_delta, "%H")) >= 9) \
  AND tonumber(strftime(_tm_business_hour_delta, "%H")) < 18 \
  AND tonumber(strftime(_tm_business_hour_delta, "%u")) <= 5)

[tm_strftime_in_tz(3)]
definition = strftime(2*'$time$'- strptime(strftime('$time$', "%F %T %9N") + " $tz$", "%F %T %9N %Z"), "$format$")
args = time,format,tz
