[jumpcloud:json]
LINE_BREAKER = (?:\s{2}\}(\,\n)\s{2}\{|(\[\n)\s{2}\{|\s{2}\}\n(\]))
SHOULD_LINEMERGE = false
TIME_PREFIX = \"timestamp\":\s\"
TIME_FORMAT = %Y-%m-%d %H:%M:%S
TRUNCATE = 99999
EVAL-action = case(success=="true","success",success=="false","failure")
EVAL-authentication_service = "JumpCloud"
FIELDALIAS-aob_gen_jumpcloud_di_json_alias_1 = username AS user
FIELDALIAS-aob_gen_jumpcloud_di_json_alias_4 = service AS authentication_method
FIELDALIAS-aob_gen_jumpcloud_di_json_alias_5 = error_message AS reason
FIELDALIAS-aob_gen_jumpcloud_di_json_alias_6 = event_type AS signature
FIELDALIAS-aob_gen_jumpcloud_di_json_alias_7 = process_name AS app
FIELDALIAS-aob_gen_jumpcloud_di_json_alias_8 = client_ip AS src
KV_MODE = json
category = JumpCloud Directory Insights JSON
pulldown_type = 1

