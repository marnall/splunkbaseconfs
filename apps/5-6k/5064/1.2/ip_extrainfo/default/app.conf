#
# Splunk app configuration file
#

[install]
is_configured = 0

[ui]
is_visible = 1
label = IP Extrainfo for Splunk

[launcher]
author = Lukas Utz <lutz@splunk.com>
description = Custom Search Commands (1) 'ipextrainfo' to get extra information from IPs, e.g. ISP and (2) 'iprange2cidr' to map a range of two IPs to CIDR format (both for IPv4 and IPv6)
version = 1.2

[package]
id = ip_extrainfo
