[Bussiness Schedule]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 1 * * *
dispatch.earliest_time = -1d@d
dispatch.latest_time = @d
display.events.fields = ["host","source","sourcetype","model_name","Total Amount"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = splunk_pop
request.ui_dispatch_view = search
search = | tstats summariesonly=t count as Total sum(record.AMOUNT) as "Volume" from datamodel=transaction groupby _time record.TYPE record.RESPONSE_CODE span=1d\
|rename record.* as *\
| collect index=fraud_bussiness

