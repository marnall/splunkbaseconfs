search = | tstats summariesonly=t count sum(record.AMOUNT) as amount from datamodel=transaction groupby record.ACQUIRER _time span=1d\
| rename record.* as *\
|eval DETAIL="ACQUIRER"\
| collect index=fraud_bussiness
