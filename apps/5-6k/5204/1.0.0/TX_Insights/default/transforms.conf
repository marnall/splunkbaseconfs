[rule_manager]
batch_index_query = 0
case_sensitive_match = 1
filename = rule_manager

[tranform-test]
REGEX = .
DEST_KEY = MetaData:Sourcetype
FORMAT = test2

[KVsotre Noteable event]
collection = notable_event
external_type = kvstore
fields_list = CARD_NUMBER,LOCAL_DATE,LOCAL_TIME,Risk_model,TERMID,TIME_ACTION,TRANSACTION_CODE,TRACE,Time,USER

[lookup_notable]
collection = notable_event
external_type = kvstore
fields_list = _key,CARD_NUMBER,LOCAL_DATE,LOCAL_TIME,Risk_model,TERMID,TIME_ACTION,TRANSACTION_CODE,TRACE,Time,USER,STATUS,Reason

[TERMID]
batch_index_query = 0
case_sensitive_match = 1
filename = TERMID.csv
