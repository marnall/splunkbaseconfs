FIELDALIAS-aob_gen_orca_alerts_alias_2 = asset_name AS dest
FIELDALIAS-aob_gen_orca_alerts_alias_3 = asset_category AS dest_type
FIELDALIAS-aob_gen_orca_alerts_alias_4 = state.alert_id AS id
