[oracle:sbc:radius]
BREAK_ONLY_BEFORE = \A\w{3}\s+\w{3}\s+\d{1,2}\s+\d{1,2}:\d{1,2}:\d{1,2}\s+\d{4}
BREAK_ONLY_BEFORE_DATE = 
DATETIME_CONFIG = 
LINE_BREAKER = \A\w{3}\s+\w{3}\s+\d{1,2}\s+\d{1,2}:\d{1,2}:\d{1,2}\s+\d{4}
NO_BINARY_CHECK = true
disabled = false
TIME_PREFIX = h323-setup-time =
EXTRACT-Replace Calling_Station_Id = Calling-Station-Id\s\=\s\".*<{0,1}sip:\+{0,1}(?<Calling_Number>[\d"anonymous""Anonymous"]{1,36}).{0,50}@.{1,300}\"[\r\n]+\tCalled
EXTRACT-Replacing Called_Station_Id = Called-Station-Id\s\=\s\".*<{0,1}sip:\+{0,1}(?<Called_Number>[\d]{1,36}).{0,50}@.{1,300}\"[\r\n]+\t(h323){0,1}(Acct){0,1}
LOOKUP-sip_codes_auto = sip_codes Code AS Acme_SIP_Status OUTPUTNEW Response AS Acme_SIP_Response
LOOKUP-q850_codes_auto = q850_codes Code AS Acme_Disconnect_Cause OUTPUTNEW Acme_Disconnect_Definition AS Acme_Disconnect_Definition
LOOKUP-disco_init_party_auto = disco_init_party Code AS Acme_Disconnect_Initiator OUTPUTNEW Acme_Disconnect_Initiator_Party AS Acme_Disconnect_Initiator_Party
LOOKUP-disposition_status_auto = disposition_status Code AS Acme_Session_Disposition OUTPUTNEW Acme_Session_Disposition_Status AS Acme_Session_Disposition_Status

