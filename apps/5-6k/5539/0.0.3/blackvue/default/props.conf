[nmea:gngga]
#TIMESTAMP_FIELDS = time
#TIME_FORMAT = %s%3N

[nmea:gnrmc]
#TIMESTAMP_FIELDS = time,date
#TIME_FORMAT = %H%M%S.%2N%d%m%y

[nmea]
KV_MODE = none
ANNOTATE_PUNCT = false
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 9
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %H%M%S.%2N
TIME_PREFIX = \$\w+,
TZ = GMT
category = Custom
description = NMEA GPS Format
disabled = false
#TRANSFORMS = latitude,longitude
EXTRACT-GNRMC = \$(?<code>GNRMC),(?<time>[\d.]+),(?<result>\w),(?<latitude_degrees>\d+)(?<latitude_minutes>\d\d\.\d+),(?<northsouth>N|S),(?<longitude_degrees>\d+)(?<longitude_minutes>\d\d\.\d+),(?<eastwest>E|W),(?<speed>[\d\.]+),(?<course>[\d\.]+),(?<date>\d+),(?<magnetic_variation>[^,]*),(?<magnetic_direction>[^,]*),(?<checksum>.*)
EXTRACT-GNGGA = \$(?<code>GNGGA),(?<time>[\d.]+),(?<latitude_degrees>\d+)(?<latitude_minutes>\d\d\.\d+),(?<northsouth>N|S),(?<longitude_degrees>\d+)(?<longitude_minutes>\d\d\.\d+),(?<eastwest>E|W),(?<quality>\d),(?<satellites>\d+),(?<hdop>[\d.]+),(?<altitude>[\d.]+),(?<altitude_unit>[^,]*),(?<undulation>[^,]*),(?<undulation_unit>[^,]*),(?<age>[^,]*),(?<checksum>.*)
EVAL-latitude = (latitude_degrees + (latitude_minutes/60)) * if(northsouth=="N",1,-1)
EVAL-longitude = (longitude_degrees + (longitude_minutes/60)) * if(eastwest=="E",1,-1)
EVAL-speed_kph = speed*1.852
EVAL-speed_mph = speed*1.15078