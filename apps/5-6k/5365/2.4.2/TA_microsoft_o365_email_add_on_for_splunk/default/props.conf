[ms:o365:groups]
SHOULD_LINEMERGE = 0
category = Email
pulldown_type = 1

[ms:o365:email]
TRUNCATE = 0
FIELDALIAS-file_hash = attachments{}{}.file_hash AS file_hash
FIELDALIAS-file_name = attachments{}{}.name AS file_name
FIELDALIAS-file_size = attachments{}{}.size AS file_size
FIELDALIAS-from_return_addr = from AS return_addr
FIELDALIAS-message_id = id AS message_id
FIELDALIAS-recipient = to{} AS recipient
FIELDALIAS-src_user = from AS src_user
FIELDALIAS-to = to{} AS to
FIELDALIAS-url = url_iocs{} AS url
INDEXED_EXTRACTIONS = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = \"DateTime\":\s+\"
TZ = UTC
AUTO_KV_JSON = false
category = Email
pulldown_type = 1
SHOULD_LINEMERGE = false
