

[syslog]
TRANSFORMS-force_sourcetype_for_revbits_es = force_sourcetype_for_revbits_es

[revbits:es]

EXTRACT-version = ^(?:[^\|\n]*\|){1}RevBits Email Security - (?P<version>[^\|]+)
EXTRACT-domain = ^(?:[^\|\n]*\|){2}(?P<domain>[^\|]+)
EXTRACT-severity = ^(?:[^\|\n]*\|){3}(?P<severity>[^\|]+)
EXTRACT-event = ^(?:[^\|\n]*\|){4}(?P<event>[^\|]+)
EXTRACT-event_type = ^(?:[^\|\n]*\|){5}(?P<event_type>[^\|]+)
EXTRACT-msg = ^(?:[^\|\n]*\|){6}(?P<msg>[^\|]+)
EXTRACT-user = ^(?:[^\|\n]*\|){7}By\s(?P<user>[^\|]+)

EVAL-app = "Email Security"
EVAL-vendor_product = "RevBits ES"

