[cloudknox:audit_trail:platform]
TIME_PREFIX = "eventTimestamp": 
TIME_FORMAT = %3N
MAX_TIMESTAMP_LOOKAHEAD = 20
MAX_DAYS_AGO = 90
FIELDALIAS-command = actionInfo.id AS command
FIELDALIAS-object = resourceInfo.name AS object
FIELDALIAS-object_category = resourceInfo.resourceType AS object_category
FIELDALIAS-object_id = resourceInfo.id AS object_id
FIELDALIAS-result = errorMessage AS result
FIELDALIAS-user = identityInfo.id AS user
FIELDALIAS-result_id = id AS result_id
EVAL-vendor_product = "CloudKnox"
EVAL-status = case(status="SUCCESS","success",status="ERROR","failure")
FIELDALIAS-src = sessionInfo.ipAddress AS src
FIELDALIAS-user_agent = sessionInfo.userAgent AS user_agent
EVAL-action=case(like('actionInfo.id',"%.Create%"), "created",like('actionInfo.id',"%.Delete%"), "deleted", 1==1, "modified")

[cloudknox:aws:alerts]
TIME_PREFIX = "collectionTs": 
TIME_FORMAT = %3N
MAX_TIMESTAMP_LOOKAHEAD = 20
EVAL-app = "CloudKnox"
FIELDALIAS-subject = alertTriggerName AS subject

