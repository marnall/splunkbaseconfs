
[expose:TA_cloudknox_settings]
pattern = TA_cloudknox_settings
methods = POST, GET

[expose:TA_cloudknox_settings_specified]
pattern = TA_cloudknox_settings/*
methods = POST, GET, DELETE

[expose:TA_cloudknox_cloudknox]
pattern = TA_cloudknox_cloudknox
methods = POST, GET

[expose:TA_cloudknox_cloudknox_specified]
pattern = TA_cloudknox_cloudknox/*
methods = POST, GET, DELETE

[expose:TA_cloudknox_auth_systems]
pattern = TA_cloudknox_auth_systems
methods = GET

[expose:_splunkd_data]
pattern = data/*
methods = GET

[expose:TA_cloudknox_cloudknox_auditlogs]
pattern = TA_cloudknox_cloudknox_auditlogs
methods = POST, GET

[expose:TA_cloudknox_cloudknox_auditlogs_specified]
pattern = TA_cloudknox_cloudknox_auditlogs/*
methods = POST, GET, DELETE

[expose:TA_cloudknox_cloudknox_alerts]
pattern = TA_cloudknox_cloudknox_alerts
methods = POST, GET

[expose:TA_cloudknox_cloudknox_alerts_specified]
pattern = TA_cloudknox_cloudknox_alerts/*
methods = POST, GET, DELETE
