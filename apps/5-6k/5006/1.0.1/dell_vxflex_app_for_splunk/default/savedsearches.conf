| eval lastUpdated = _time, firstSeen = _time \
| append [| inputlookup vxflex_lookup_sdc] \
| stats min(firstSeen) as firstSeen1, max(lastUpdated) as lastUpdated1, max(_time) as _time1, latest(*) as * by systemId, id \
| eval firstSeen=firstSeen1, lastUpdated=lastUpdated1, _time=_time1 \
| eval keep_this_events=1 \
| append [| search `vxflex_sdc_instance` | rename "deletedSdcIdList{}" as deletedSdc | search deletedSdc=* | mvexpand deletedSdc | rename deletedSdc as id] \
| dedup systemId, id sortby -_time \
| search keep_this_events=* \
| fields - keep_this_events \
| outputlookup vxflex_lookup_sdc

[lookupfill_volume]
cron_schedule = */2 * * * *
description = Saved search to fill lookup for Volume
dispatch.earliest_time = -4m@m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = dell_vxflex_app_for_splunk
request.ui_dispatch_view = search
search = `vxflex_volume_instance` id=* | dedup systemId, id \
| eval noOfMappedSDCs = mvcount('mappedSdcInfo{}.sdcId') \
| fillnull value=0 noOfMappedSDCs \
| rename "mappedSdcInfo{}.sdcId" as mappedSdcs \
| eval mappedSdcs=mvjoin(mappedSdcs, ",") \
| table _time, systemId, id, name, creationTime, sizeInKb, storagePoolId, useRmcache, volumeType, vtreeId, noOfMappedSDCs, mappedSdcs, dataLayout, compressionMethod, ancestorVolumeId \
| eval lastUpdated = _time, firstSeen = _time \
| append [| inputlookup vxflex_lookup_volume] \
| stats min(firstSeen) as firstSeen1, max(lastUpdated) as lastUpdated1, max(_time) as _time1, latest(*) as * by systemId, id \
| eval firstSeen=firstSeen1, lastUpdated=lastUpdated1, _time=_time1 \
| eval keep_this_events=1 \
| append [| search `vxflex_volume_instance` | rename "deletedVolumeIdList{}" as deletedVolume | search deletedVolume=* | mvexpand deletedVolume | rename deletedVolume as id] \
| dedup systemId, id sortby -_time \
| search keep_this_events=* \
| fields - keep_this_events \
| outputlookup vxflex_lookup_volume

