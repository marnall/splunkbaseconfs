[lookupfill_system]
cron_schedule = */10 * * * *
description = Saved search to fill lookup for system
dispatch.earliest_time = -20m@m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = dell_vxflex_app_for_splunk
request.ui_dispatch_view = search
search = `vxflex_system_instance` | dedup id \
| rename "mdmCluster.id" as mdmCluster_id, "mdmCluster.name" as mdmCluster_name, "mdmCluster.clusterMode" as mdmCluster_clusterMode, "mdmCluster.clusterState" as mdmCluster_clusterState, "mdmCluster.goodNodesNum" as mdmCluster_goodNodesNum, "mdmCluster.goodReplicasNum" as mdmCluster_goodReplicasNum, "mdmCluster.virtualIps" as mdmCluster_virtualIps, "mdmCluster.master.id" as mdmCluster_master_id, "mdmCluster.master.name" as mdmCluster_master_name, "mdmCluster.master.ips" as mdmCluster_master_ips, "mdmCluster.master/.managementIps" as mdmCluster_master_managementIps, "mdmCluster.master.opensslVersion" as mdmCluster_master_opensslVersion, "mdmCluster.master.port" as mdmCluster_master_port, "mdmCluster.master.role" as mdmCluster_master_role, "mdmCluster.master.versionInfo" as mdmCluster_master_versionInfo, "mdmCluster.master.virtualInterfaces{}" as mdmCluster_master_virtualInterfaces \
| table _time, id, name, capacityTimeLeftInDays, daysInstalled, maxCapacityInGb, mdmManagementPort, perfProfile, showGuid, systemVersionName, tlsVersion, upgradeState, mdmCluster_id, mdmCluster_name, mdmCluster_clusterMode, mdmCluster_clusterState, mdmCluster_goodNodesNum, mdmCluster_goodReplicasNum, mdmCluster_virtualIps, mdmCluster_master_id, mdmCluster_master_name, mdmCluster_master_ips, mdmCluster_master_managementIps, mdmCluster_master_opensslVersion, mdmCluster_master_port, mdmCluster_master_role, mdmCluster_master_versionInfo, mdmCluster_master_virtualInterfaces \
| append  [| inputlookup vxflex_lookup_system ] \
| dedup id sortby -_time \
| outputlookup vxflex_lookup_system

[lookupfill_sds]
cron_schedule = */2 * * * *
description = Saved search to fill lookup for SDS
dispatch.earliest_time = -4m@m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = dell_vxflex_app_for_splunk
request.ui_dispatch_view = search
search = `vxflex_sds_instance` id=* | dedup systemId, id \
| eval ipList=mvjoin('ipList{}.ip', ", ") \
| table _time, systemId, id, name, ipList, mdmConnectionState, membershipState, onVmWare, protectionDomainId, sdsState, softwareVersionInfo \
| eval lastUpdated = _time, firstSeen = _time \
| append [| inputlookup vxflex_lookup_sds] \
| stats min(firstSeen) as firstSeen1, max(lastUpdated) as lastUpdated1, max(_time) as _time1, latest(*) as * by systemId, id \
| eval firstSeen=firstSeen1, lastUpdated=lastUpdated1, _time=_time1 \
| eval keep_this_events=1 \
| append [| search `vxflex_sds_instance` | rename "deletedSdsIdList{}" as deletedSds | search deletedSds=* | mvexpand deletedSds | rename deletedSds as id] \
| dedup systemId, id sortby -_time \
| search keep_this_events=* \
| fields - keep_this_events \
| outputlookup vxflex_lookup_sds

