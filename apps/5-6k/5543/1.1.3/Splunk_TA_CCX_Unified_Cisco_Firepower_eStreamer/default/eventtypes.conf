
[ccx_firepower_estreamer_alert]
search = (sourcetype="cisco:estreamer:data") dataset_name="alert"
# tags = alert

[ccx_firepower_estreamer_timeout]
search = (sourcetype="cisco:estreamer:data") dataset_name="timeout"

[estreamer-file-malware-attack]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT" OR rec_type_category="FILELOG EVENT" OR rec_type_category="FILELOG MALWARE EVENT" OR rec_type_category="MALWARE EVENT" ) NOT (signature="Unknown" OR signature="Clean") NOT sha256=""
# tags = malware attack

[estreamer-file-malware-operations]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT" OR rec_type_category="FILELOG EVENT" OR rec_type_category="FILELOG MALWARE EVENT" OR rec_type_category="MALWARE EVENT") (signature="Unknown" OR signature="Clean") NOT sha256=""
# tags = malware operations

[estreamer-flow]
search = sourcetype=cisco:estreamer:data (rec_type_simple="RNA" OR rec_type_category="RNA") event_type=1003
# tags = network communicate

[estreamer-ids-ips-event]
search = sourcetype=cisco:estreamer:data (rec_type_simple="EVENT" OR rec_type_simple="IPS EVENT" OR rec_type_category="EVENT" OR rec_type_category="IPS EVENT")
# tags = ids attack

[estreamer-packet]
search = sourcetype=cisco:estreamer:data (rec_type_simple=PACKET OR rec_type_category=PACKET)

[estreamer-scan-event]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT" OR rec_type_category="FILELOG EVENT" OR rec_type_category="FILELOG MALWARE EVENT" OR rec_type_category="MALWARE EVENT") sha256="" signature=""
# tags = malware

[estreamer-scan-event-operations]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT" OR rec_type_category="FILELOG EVENT" OR rec_type_category="FILELOG MALWARE EVENT" OR rec_type_category="MALWARE EVENT") sha256="" NOT signature=""
# tags = operations malware

[estreamer-security-event]
search = sourcetype=cisco:estreamer:data (rec_type_simple="RNA" OR rec_type_category="RNA") event_type=1003 sec_intel_event="Yes"
# tags = network communicate

[estreamer-flow-web]
search = sourcetype=cisco:estreamer:data url="*"
# tags = web

[estreamer-flow-dns]
search = sourcetype="cisco:estreamer:data" dns_query="*"
# tags = dns network resolution

[firepower-network_traffic]
search = sourcetype=cisco:firepower:syslog src_ip="*" dest_ip="*"
# tags = network communicate

[firepower-web_traffic]
search = sourcetype="cisco:firepower:syslog" url="*"
# tags = web

[firepower-filtered_alert]
search = sourcetype="cisco:firepower:syslog"  NOT (message_id=430002 OR message_id=430001)
# tags = alert

[firepower-intrusion_detection]
search = sourcetype="cisco:firepower:syslog" intrusion_policy="*"
# tags = ids attack

[firepower-malware_detection]
search = sourcetype="cisco:firepower:syslog" file_hash="*" NOT severity="unknown"
# tags = malware attack

[firepower-malware_operations]
search = sourcetype="cisco:firepower:syslog" file_hash="*"
# tags = malware operations
