[cisco:estreamer:log]
EXTRACT-encore_log_fields = ^(?P<timestamp>\d+\-\d+\-\d+\s+\d+:\d+:\d+,\d+)\s+(?P<class>[^ ]+)\s+(?P<severity>\w+)\s+(?P<message>.+)

[cisco:estreamer:data]
SHOULD_LINEMERGE = false
TRUNCATE = 0
TIME_PREFIX = event_sec=
KV_MODE = none
REPORT-estreamer:data-extraction = estreamer:data-extraction

#### Splunk CIM - Intrusion Detection Fields ####
FIELDALIAS-estreamer_dvc = sensor AS dvc
FIELDALIAS-estreamer_src = src_ip AS src
FIELDALIAS-estreamer_dest = dest_ip AS dest
FIELDALIAS-estreamer_severity = priority AS severity

#### Splunk CIM - Network Traffic Fields ####
FIELDALIAS-estreamer_src_interface = iface_ingress AS src_interface
FIELDALIAS-estreamer_dest_interface = iface_egress AS dest_interface
FIELDALIAS-estreamer_bytes_in = src_bytes AS bytes_in
FIELDALIAS-estreamer_bytes_out = dest_bytes AS bytes_out
FIELDALIAS-estreamer_packets_in = src_pkts AS packets_in
FIELDALIAS-estreamer_packets_out = dest_pkts AS packets_out
FIELDALIAS-estreamer_flow_id = connection_id AS flow_id
FIELDALIAS-estreamer_rule = fw_rule AS rule
FIELDALIAS-estreamer_src_zone = sec_zone_ingress AS src_zone
FIELDALIAS-estreamer_dest_zone = sec_zone_egress AS dest_zone
FIELDALIAS-estreamer_tcp_flag = tcp_flags AS tcp_flag
FIELDALIAS-estreamer_vlan = vlan_id AS vlan

#### Splunk CIM - Malware Fields ####
FIELDALIAS-estreamer_file_hash = sha256 AS file_hash
FIELDALIAS-estreamer_malware_type = malware_event_type AS malware_type
FIELDALIAS-estreamer_date = event_sec AS date

#### Splunk CIM - Netwrok Resolution (DNS) Fields ####
FIELDALIAS-estreamer_reply_code = dns_response_name AS reply_code

#### Lookups ####
LOOKUP-ccx_firepower_estreamer_lookup = ccx_firepower_estreamer_lookup event_desc OUTPUTNEW dataset_name type
LOOKUP-estreamer_fw_action = fw_actions fw_rule_action OUTPUT action
LOOKUP-estreamer_transport = ip_protos ip_proto OUTPUT transport
LOOKUP-estreamer_file_action = file_actions file_action OUTPUT action
LOOKUP-estreamer_severities = severities impact,priority OUTPUT severity
LOOKUP-estreamer_ids_actions = ids_actions blocked OUTPUT action

#### ADDITIONAL MODS ####
EVAL-app = case(('web_app'!="Unknown"),'web_app', isnotnull('app_proto'), 'app_proto', (event_type=="1000" OR event_type=="1001" OR event_type=="1004") AND isnull('app_proto'), "Cisco Firepower")
EVAL-body = case('event_desc' IN ("Additional MAC Detected", "Client Application Update", "Hops Change", "MAC Information Change", "New Client Applicastion", "New Host", "New Network Protocol", "New OS Fingerprint", "New TCP Service", "New Transport Protocol", "New UDP Service", "TCP Service Information Update", "UDP Service Information Update", "User Login Information"), 'event_desc')
EVAL-bytes = 'src_bytes' + 'dest_bytes'
EVAL-category = if(isnotnull('class_desc'),'class_desc',lower('url_category'))
EVAL-description = case('event_desc' IN ("Additional MAC Detected", "Client Application Update", "Hops Change", "MAC Information Change", "New Client Applicastion", "New Host", "New Network Protocol", "New OS Fingerprint", "New TCP Service", "New Transport Protocol", "New UDP Service", "TCP Service Information Update", "UDP Service Information Update", "User Login Information"), 'event_desc')
EVAL-dest_zone = if('sec_zone_egress'=="N/A" OR isnull('sec_zone_egress'), null(), 'sec_zone_egress')
EVAL-file_hash = replace(file_hash,"[^']\'","")
EVAL-http_referrer = if((http_referrer=""), null(), 'http_referrer')
EVAL-http_user_agent = if('user_agent'=="" OR isnull('user_agent'), null(), 'user_agent')
EVAL-http_user_agent_length = if('user_agent'=="" OR isnull('user_agent'), null(), len('user_agent'))
EVAL-ids_type = "network"
EVAL-packets = 'src_pkts' + 'dest_pkts'
EVAL-product = "Sourcefire:eStreamer"
EVAL-query = if((dns_query=""), null(), 'dns_query')
EVAL-record_type = if((dns_record_name=""), null(), 'dns_record_name')
EVAL-reply_code_id = if((dns_resp_id=""), null(), 'dns_resp_id')
EVAL-severity = case('event_desc' IN ("Additional MAC Detected", "Client Application Update", "Hops Change", "MAC Information Change", "New Client Applicastion", "New Host", "New Network Protocol", "New OS Fingerprint", "New TCP Service", "New Transport Protocol", "New UDP Service", "TCP Service Information Update", "UDP Service Information Update", "User Login Information"), "unknown", 1==1, 'priority')
EVAL-signature = case(isnotnull('detection'),'detection', isnull('detection') AND isnotnull('msg'), 'msg', 'event_desc' IN ("Additional MAC Detected", "Client Application Update", "Hops Change", "MAC Information Change", "New Client Applicastion", "New Host", "New Network Protocol", "New OS Fingerprint", "New TCP Service", "New Transport Protocol", "New UDP Service", "TCP Service Information Update", "UDP Service Information Update", "User Login Information"), 'rec_type_desc')
EVAL-src = case('event_desc' IN ("Additional MAC Detected", "Client Application Update", "Hops Change", "MAC Information Change", "New Client Applicastion", "New Host", "New Network Protocol", "New OS Fingerprint", "New TCP Service", "New Transport Protocol", "New UDP Service", "TCP Service Information Update", "UDP Service Information Update", "User Login Information"), 'src_host', 1==1, 'src_ip')
EVAL-src_ip = case('event_desc' IN ("Additional MAC Detected", "Client Application Update", "Hops Change", "MAC Information Change", "New Client Applicastion", "New Host", "New Network Protocol", "New OS Fingerprint", "New TCP Service", "New Transport Protocol", "New UDP Service", "TCP Service Information Update", "UDP Service Information Update", "User Login Information"), 'src_host', 1==1, 'src_ip')
EVAL-src_zone = if('sec_zone_ingress'=="N/A" OR isnull('sec_zone_ingress'), null(), 'sec_zone_ingress')
EVAL-status = if('http_response'=="0", null(), 'http_response')
EVAL-subject = case('event_desc' IN ("Additional MAC Detected", "Client Application Update", "Hops Change", "MAC Information Change", "New Client Applicastion", "New Host", "New Network Protocol", "New OS Fingerprint", "New TCP Service", "New Transport Protocol", "New UDP Service", "TCP Service Information Update", "UDP Service Information Update", "User Login Information"), 'rec_type_desc')
EVAL-ttl = if((dns_ttl=""), null(), 'dns_query')
EVAL-url = if(isnotnull('uri'),'uri', if((url=""), null(), 'url'))
EVAL-url_domain = if(isnotnull('uri'), replace('uri', "^(?:https?\:\/\/)?([^\/\:]+).*$", "\1"), if((url=""), null(), replace('url', "^(?:https?\:\/\/)?([^\/\:]+).*$", "\1")))
EVAL-url_length = if(isnotnull('uri'), len('uri'), if((url=""), null(), len('url')))
EVAL-user = if(match('user', "(\d+)"), 'username', if('user'=="No Authentication Required", null(), 'user'))
EVAL-vendor = "Cisco"
EVAL-vendor_product = "Cisco:Firepower:eStreamer"

