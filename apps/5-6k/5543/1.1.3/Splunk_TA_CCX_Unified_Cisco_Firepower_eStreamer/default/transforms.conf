
[ccx_firepower_estreamer_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_firepower_estreamer_lookup.csv

[estreamer:data-extraction]
REGEX = (?:_+)?([\w.:\[\]]+)=\"?(?!\")(.+?(?=\"?(?:\s[\w.:\[\]]+=|$)))\"?
MV_ADD = true
FORMAT = $1::$2

[firepower_syslog_dvc_name]
REGEX = ^(\w+\s+\d+\s+\d+:\d+:\d+)\s+(?<dvc_name>[^ ]+)

[fw_actions]
filename = fw_actions.csv

[ip_protos]
filename = ip_protos.csv

[file_actions]
filename = file_actions.csv

[severities]
filename = severities.csv

[ids_actions]
filename = ids_actions.csv