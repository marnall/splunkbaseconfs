# Collections

[ite_maturity_stage]
external_type = kvstore
collection = ite_maturity_stage
fields_list = _key, title

[ite_procedure]
external_type = kvstore
collection = ite_procedure
fields_list = _key, title, data_sources.title, use_case_id, maturity_stage_id, favorited_by, deployed

[ite_use_case]
external_type = kvstore
collection = ite_use_case
fields_list = _key, title, use_case_family_id

[ite_use_case_family]
external_type = kvstore
collection = ite_use_case_family
fields_list = _key, title

[ite_procedure_stats]
external_type = kvstore
collection = ite_procedure_stats
fields_list = _key, user_id, procedure_id, stats

