[procedure_stats(5)]
args = user_id, maturity_stage, data_source, favorite_only, deployed_only
definition = inputlookup ite_procedure \
| rename _key as procedure_id, title as procedure_title, data_sources.title as data_sources, deployed.status as is_deployed \
| eval is_deployed=if(is_deployed == "1", "true", "false") \
| lookup ite_use_case _key as use_case_id OUTPUT title as use_case, use_case_family_id \
| lookup ite_use_case_family _key as use_case_family_id OUTPUT title as use_case_family \
| lookup ite_maturity_stage _key as maturity_stage_id OUTPUT title as maturity_stage \
| join type=left procedure_id \
    [| inputlookup ite_procedure_stats WHERE user_id=$user_id$ \
     | stats values(*) as * by procedure_id, user_id \
     | streamstats min(*) as * by procedure_id, user_id] \
| eval stats.viewed.timestamp = if(isnotnull('stats.viewed.timestamp'), 'stats.viewed.timestamp', "dummy") \
| eval action="viewed,searched_live_data,deployed" \
| makemv delim="," action \
| mvexpand action \
| eval triggered="false" \
| foreach stats.*.timestamp \
    [ eval triggered=if(is_deployed == "true", "true", if(action="<<MATCHSTR>>" AND isint('<<FIELD>>'), "true", triggered))] \
| eval is_favorite=if(in("$user_id$", favorited_by), "true", "false") \
| fields procedure_id, procedure_title, data_sources, use_case_id, use_case, use_case_family_id, use_case_family, maturity_stage, maturity_stage, is_favorite, action, triggered, is_deployed\
| search maturity_stage=$maturity_stage$ data_sources=$data_source$ \
| where if("$favorite_only$" == "true", is_favorite="$favorite_only$", true()) AND if("$deployed_only$" == "true", is_deployed="$deployed_only$", true())
iseval = 0

### Macros for demo SPLs ###
[lineartrend(2)]
args = x,y
definition = eventstats count as numevents sum($x$) as sumX sum($y$) as sumY sum(eval($x$*$y$)) as sumXY sum(eval($x$*$x$)) as sumX2 sum(eval($y$*$y$)) as sumY2\
    | eval slope=((numevents*sumXY)-(sumX*sumY))/((numevents*sumX2)-(sumX*sumX))\
    | eval yintercept= (sumY-(slope*sumX))/numevents\
    | eval newY=(yintercept + (slope*$x$))\
    | eval R=((numevents*sumXY) - (sumX*sumY))/sqrt(((numevents*sumX2)-(sumX*sumX))* ((numevents*sumY2)-(sumY*sumY)))\
    | eval R2=R*R
iseval = 0
