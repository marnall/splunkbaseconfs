[Telemetry: ITE Procedure Stats]
search = | inputlookup ite_procedure_stats \
| stats values(*) as * by procedure_id, user_id \
| streamstats min(*) as * by procedure_id, user_id \
| search \
[| makeresults \
| eval stats.searched_demo_data.timestamp=round(relative_time(now(), "-24h")) \
| eval stats.searched_live_data.timestamp='stats.searched_demo_data.timestamp' \
| eval stats.viewed.timestamp='stats.searched_demo_data.timestamp' \
| format \
| rex field=search mode=sed "s/=\"/>=/g" \
| rex field=search mode=sed "s/\" / /g" \
| rex field=search mode=sed "s/AND/OR/g"] \
| eval \
[| rest /servicesNS/nobody/splunk_instrumentation/telemetry splunk_server=local \
| table telemetrySalt \
| format \
| rex field=search mode=sed "s/[()]//g"] \
| eval data.userID=sha256(telemetrySalt + user_id) \
| rename procedure_id as data.procedure, stats.searched_demo_data.timestamp as data.searchedDemoDataTimestamp, \
stats.searched_live_data.timestamp as data.searchedLiveDataTimestamp, \
stats.viewed.timestamp as data.viewedTimestamp \
| fillnull value=0 \
| makejson data.* output=event
enableSched=1
action.outputtelemetry                     = 1
action.outputtelemetry.param.anonymous     = 1
action.outputtelemetry.param.support       = 1
action.outputtelemetry.param.license       = 0
action.outputtelemetry.param.optinrequired = 3
action.outputtelemetry.param.component     = app.ITE.procedureUserInteraction
action.outputtelemetry.param.input         = event
action.outputtelemetry.param.type          = aggregate
cron_schedule = 9 3 * * *
dispatch.earliest_time = -1d

[Telemetry: ITE Procedure Usages]
search = | inputlookup ite_procedure \
| search deployed.status=1 OR favorited_by=* \
| fillnull favorited_by \
| mvexpand favorited_by \
| eval \
[| rest /servicesNS/nobody/splunk_instrumentation/telemetry splunk_server=local \
| table telemetrySalt \
| format \
| rex field=search mode=sed "s/[()]//g"] \
| eval data.favoritedBy=if(favorited_by=0, "", sha256(telemetrySalt + favorited_by)) \
| rename _key as data.procedure, deployed.status as data.isDeployed \
| table data.favoritedBy, data.isDeployed, data.procedure \
| mvcombine data.favoritedBy \
| makejson data.* output=event
enableSched=1
action.outputtelemetry                     = 1
action.outputtelemetry.param.anonymous     = 1
action.outputtelemetry.param.support       = 1
action.outputtelemetry.param.license       = 0
action.outputtelemetry.param.optinrequired = 3
action.outputtelemetry.param.component     = app.ITE.procedureDeploymentInfo
action.outputtelemetry.param.input         = event
action.outputtelemetry.param.type          = aggregate
cron_schedule = 9 3 * * *
dispatch.earliest_time = -1d
