[cybersixgillipenrich-command]
syntax = cybersixgillipenrich <ip_address>
description = Runs a Cybsersixgill query against the given IP and will return the latest results.
shortdesc = Runs query against the given IP.
example1 = | cybersixgillipenrich 8.8.8.8
usage = public


