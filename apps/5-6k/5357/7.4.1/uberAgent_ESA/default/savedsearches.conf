#
# Saved searches to populate lookups used by uberAgent. Do not edit!
#

[populate_esa_score_sci]
dispatch.earliest_time = -60m
dispatch.latest_time = now
search = | pivot `uA_DM_System_SecurityInventory` uberAgentESA_System_SecurityInventory \
   latest(SecurityInventoryScore) as SecurityInventoryScore \
   latest(index) as SourceIndex \
   splitrow _time \
   splitrow SecurityInventoryCategory \
   splitrow SecurityInventoryDisplayName \
   splitrow host \
   splitrow SecurityInventoryRiskScore \
   splitrow SecurityInventoryScopeDisplayName \
| appendcols \
   [| pivot `uA_DM_Score_Security` ESAScore_SCI \
      latest(_time) as LastSavedSearch \
   | eval LastSavedSearch = strptime(LastSavedSearch, "%Y-%m-%dT%H:%M:%S.%3Q%z") \
   | fields LastSavedSearch] \
| filldown LastSavedSearch \
| eval LastSavedSearch = if(isnull(LastSavedSearch),"0",LastSavedSearch) \
| where _time > LastSavedSearch \
| fields - "count(uberAgentESA_System_SecurityInventory)" \
| eval "SecurityScore" = round((10-((10-SecurityInventoryScore)*SecurityInventoryRiskScore)/100),1) \
| collect index=`uberAgentESA_score_index` addtime=true timeformat="%s%3N" source=uberagentESA_score_sci
run_on_startup = true
enableSched  = 1
cron_schedule = */30 * * * *
schedule_window = auto
allow_skew = 100%