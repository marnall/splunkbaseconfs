[uberAgent_index_query]
search = index=uberagent*

[uberAgentESA:Process:ProcessStop]
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:Process:ProcessStop

[uberAgentESA:ActivityMonitoring:ProcessTagging]
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:ActivityMonitoring:ProcessTagging

[uberAgentESA_ActivityMonitoring_Registry]
# Get all Reg.* process tagging event types
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:ActivityMonitoring:ProcessTagging EventTypeName = "Reg.*"

[uberAgentESA_ActivityMonitoring_Process]
# Get all Process.* process tagging event types
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:ActivityMonitoring:ProcessTagging EventTypeName = "Process.*"

[uberAgentESA_ActivityMonitoring_Image]
# Get all Image.* process tagging event types
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:ActivityMonitoring:ProcessTagging EventTypeName = "Image.*"

[uberAgentESA_ActivityMonitoring_Network]
# Get all Net.* process tagging event types
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:ActivityMonitoring:ProcessTagging EventTypeName = "Net.*"

[uberAgentESA:System:ScheduledTasks]
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:System:ScheduledTasks

[uberAgentESA:System:ScheduledTaskActions]
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:System:ScheduledTaskActions

[uberAgentESA:System:ScheduledTaskTriggers]
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:System:ScheduledTaskTriggers

[uberAgentESA:Process:DnsQuery]
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:Process:DnsQuery

[uberAgentESA:CitrixEB:Event]
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:CitrixEB:Event

[uberAgentESA:System:WinEvtLogForwarding]
search = eventtype=uberAgent_index_query sourcetype=uberAgentESA:System:WinEvtLogForwarding