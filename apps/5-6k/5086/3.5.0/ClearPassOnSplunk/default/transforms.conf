[clearpass_sourcetype]
REGEX = CPPM
FORMAT = sourcetype::Aruba:CPPM:Syslog
DEST_KEY = MetaData:Sourcetype

[clearpass_hostoverride]
DEST_KEY = MetaData:Host
REGEX = \s+\d\d:\d\d:\d\d,\d+\s+([\w+\.]+\w+)\s+
FORMAT = host::$1

[error_code_lookup]
filename = aruba_radius_error_codes.csv

[vendor_code_lookup]
filename = aruba_cppm_vendor_product_app_lookup.csv
