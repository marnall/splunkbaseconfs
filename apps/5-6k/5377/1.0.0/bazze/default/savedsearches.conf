
[Summary Page:  Record Count Over Time by Country]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 * * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = visualizations
display.page.search.mode = fast
display.page.search.tab = visualizations
display.statistics.show = 0
display.visualizations.charting.axisTitleX.text = Time
display.visualizations.charting.axisTitleY.text = Record Count
enableSched = 1
request.ui_dispatch_app = bazze
request.ui_dispatch_view = search
schedule_priority = higher
schedule_window = 60
search = | pivot Bazze_Records Bazze_Record count(Bazze_Record) AS "Record Count" SPLITROW _time AS Time SPLITCOL country FILTER country isNotNull SORT 0 _time ROWSUMMARY 0 COLSUMMARY 0 NUMCOLS 15 SHOWOTHER 1
disabled = 0

[Lookup Table: Summary Statistics by Country]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 * * * *
dispatch.earliest_time = 0
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = bazze
request.ui_dispatch_view = search
schedule_priority = higher
schedule_window = 60
search = | tstats summariesonly=true distinct_count(Bazze_Record.bazze_event_id) AS records, distinct_count(Bazze_Record.wifi_ssid) AS wifi_count, distinct_count(Bazze_Record.bazze_device_id) AS device_count from datamodel=Bazze_Records by Bazze_Record.country | outputlookup summaryPageStats.csv append=false
disabled = 0

[Lookup Table: Distinct Buckets by Device]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 15 * * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.custom.type = leaflet_maps_app.maps-plus
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = bazze
request.ui_dispatch_view = search
search = | tstats summariesonly=true distinct_count(Bazze_Record.bucket) AS buckets from datamodel=Bazze_Records by Bazze_Record.bazze_device_id | rename Bazze_Record.bazze_device_id AS id | outputlookup distinctBuckets.csv append=false
disabled = 0

[Clear Cache: Global WiFi]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 30 * * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
