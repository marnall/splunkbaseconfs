[akamai-datastream]
BREAK_ONLY_BEFORE_DATE =
DATETIME_CONFIG =
JSON_TRIM_BRACES_IN_ARRAY_NAMES = true
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 13
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %s%3N
TIME_PREFIX = \"processedTime\"\:\"
category = Custom
description = HEC Akamai DataStream
disabled = false
pulldown_type = true
REPORT-ccx_akamai_datastream_security_parser = ccx_akamai_datastream_security_parser
REPORT-ccx_akamai_datastream_vendor_action = ccx_akamai_datastream_vendor_action

#####Akamai DataStream 2 documentation##########################
#https://techdocs.akamai.com/datastream2/reference/log-format
################################################################

#CIM FIELDS
FIELDALIAS-src = cliIP as src
FIELDALIAS-src_ip = cliIP as src_ip
FIELDALIAS-status = statusCode as status
FIELDALIAS-dest_port = reqPort as dest_port
FIELDALIAS-http_method = reqMethod as http_method
FIELDALIAS-cache = cacheStatus as cache
FIELDALIAS-dest = reqHost as dest
FIELDALIAS-file_path = reqPath as file_path

EVAL-action = if(isnotnull(errorCode) AND errorCode="-", "allowed", if(isnotnull(category) AND category!="",null(),replace(errorCode, ".+\_([^\_]+(?=\|))\|.+","\1")))
EVAL-bytes = coalesce('totalBytes','bytes')
EVAL-ids_type = if(isnotnull('category') AND category!="", "application", null())
EVAL-signature = 'category'
EVAL-file_name = if(match(lower(replace('proto', "([^\/]+).*", "\1")) + "://" + 'reqHost' + ":" + 'reqPort' + urldecode('reqPath'), "\.\w{2,4}$"), replace(lower(replace('proto', "([^\/]+).*", "\1")) + "://" + 'reqHost' + ":" + 'reqPort' + urldecode('reqPath'), ".*(?:(?=\/)\/|(?=\:)\:)(\S+\.\w{2,4})$", "\1"), null())
EVAL-category = if(isnotnull('category') AND category!="", 'category', null())
EVAL-signature_id = split(rules,":")
EVAL-http_content_type = if(isnotnull('rspContentType') AND rspContentType!="-",'rspContentType', null())
EVAL-http_referrer = if(isnotnull(referer) AND referer!="-", 'referer', null())
EVAL-http_user_agent = if(isnotnull('UA') AND 'UA'!="-", urldecode('UA'),null())
EVAL-http_user_agent_length = if(urldecode('UA')=="-", null(), len(urldecode('UA')))
EVAL-uri_path = urldecode('reqPath')
EVAL-uri_query = urldecode('queryStr')
EVAL-url = lower(replace('proto', "([^\/]+).*", "\1")) + "://" + 'reqHost' + ":" + 'reqPort' + "/" + urldecode('reqPath')
EVAL-url_length = len(lower(replace('proto', "([^\/]+).*", "\1")) + "://" + 'reqHost' + ":" + 'reqPort' + "/" + urldecode('reqPath'))
EVAL-app = "Akamai DataStream"
EVAL-product = "DataStream"
EVAL-vendor = "Akamai"
EVAL-vendor_product = "Akamai:DataStream"
EVAL-rule = split(rules,":")
EVAL-cookie = if(isnotnull(cookie) AND cookie!="-", 'cookie', null())
EVAL-dest_ip = if(isnotnull(edgeIP) AND edgeIP!="-", 'edgeIP',null())

LOOKUP-ccx_akamai_datastream_vendor_action = ccx_akamai_datastream_vendor_action vendor_action OUTPUTNEW action

[akamai-datastream-raw]
DATETIME_CONFIG =
EVAL-app = "Data Stream"
EVAL-bytes = bytes_in + bytes_out
EVAL-http_content_type = urldecode('event.message.reqCT')
EVAL-http_user_agent = urldecode('event.message.UA')
EVAL-http_user_agent_length = len(urldecode('event.message.UA'))
EVAL-uri_path = urldecode('event.message.reqPath')
EVAL-uri_query = urldecode('event.message.reqQuery')
EVAL-url = 'message.proto' + "://" + 'event.message.reqHost' + ":" + 'event.message.reqPort' + urldecode('event.message.reqPath')
EVAL-url_length = len('event.message.proto' + "://" + 'event.message.reqHost' + ":" + 'event.message.reqPort' + urldecode('event.message.reqPath'))
EVAL-vendor_product = "Akamai Data Stream"
FIELDALIAS-message.UA = event.message.UA as http_user_agent
FIELDALIAS-message.cliIP = event.message.cliIP as src
FIELDALIAS-message.reqCT = event.message.reqCT as http_content_type
FIELDALIAS-message.reqHost = event.message.reqHost as dest
FIELDALIAS-message.reqLen = event.message.reqLen as bytes_in
FIELDALIAS-message.reqMethod = event.message.reqMethod as http_method
FIELDALIAS-message.respLen = event.message.respLen as bytes_out
FIELDALIAS-message.status = event.message.status as status
FIELDALIAS-reqHdr.cookie = reqHdr.cookie as cookie
FIELDALIAS-reqHdr.referer = reqHdr.referer as http_referrer
FIELDALIAS-reqHdr.referer_w3c = reqHdr.referer as "http_referer"
KV_MODE = json
LINE_BREAKER = ([\r\n,]*(?:{[^[{]+\[)?){"event
MAX_TIMESTAMP_LOOKAHEAD = 13
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %s%3N
TIME_PREFIX = "processedTime":"
category = Custom
disabled = false
pulldown_type = true
BREAK_ONLY_BEFORE_DATE =
SEDCMD-append-colume = s/""/","/
