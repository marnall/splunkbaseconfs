##Text mail field extractions

[dvc_symantec_gw]
REGEX= ^(?<timestamp>[^ ]*\s+[^ ]*\s+[^ ]*)\s+(?<dvc>[^ ]*)\s+(?P<process>[a-z]+|\w+)
FORMAT = timestamp::$1,dvc::$2,process::$3

[process_id_symantec_gw]
REGEX = \[(?P<process_id>\d+)(?=\])
FORMAT = process_id::$1

[session_id_symantec_gw]
REGEX = :\s(?<session_id>\d+)
FORMAT = session_id::$1

[sender_symantec_gw]
REGEX = SENDER\|(?<sender>[a-zA-Z0-9_\-\.]+@[a-zA-Z0-9_\-\.]+\.[a-zA-Z]{2,5})
FORMAT = sender::$1

[subject_symantec_gw]
REGEX = SUBJECT\|(?<subject>.*)
FORMAT = subject::$1

[MSG_SIZE_symantec_gw]
REGEX = MSG_SIZE\|(?<size>.*)
FORMAT = size::$1

[msgid_symantec_gw]
REGEX = MSGID\|(?P<message_id>[^>]+)
FORMAT = message_id::$1

[action_symantec_gw]
REGEX= (?<action>DELIVERY_FAILURE|DELIVER)
FORMAT = action::$1

[filename_symantec_gw]
REGEX = ATTACH\|(?<file_name>.+)
FORMAT = file_name::$1

#[recipient_symantec_gw]
#REGEX = (?:(?<=FIRED|IRCPTACTION|ORCPTS|TRACKERID|UNTESTED|VERDICT|UNSCANNABLE)\|(?P<recipient>[^\s\|]+)
#FORMAT = recipient::$1

#[ircptaction_symantec_gw]
#REGEX = \|IRCPTACTION\|(?<recipient>[^\|]+)\|(?<ircptaction>.+)
#FORMAT = recipient::$1,ircptaction::$2

[src_port_to_symantec_gw]
REGEX = (?:(?<=ACCEPT|DELIVER|LOGICAL_IP)\|(?P<src>[^:\s]+)(?::(?P<src_port>[0-9]+))?(?:\|(?P<recipient>[^\s]+))?)
FORMAT = src::$1,src_port::$2,recipient::$3

[from_symantec_gw]
REGEX = (?:(?<=SENDER)\|(?P<src_usr>[^\s]+))
FORMAT = src_usr::$1

[virus_symantec_gw]
REGEX = (?:(?<=VIRUS)\|(?P<virus_name>.+))
FORMAT = virus::$1

[unscannable_symantec_gw]
REGEX = (?:(?<=UNSCANNABLE)\|(?P<reason>.+))
FORMAT = reason::$1

[DELIVERY_FAILURE_symantec_gw]
REGEX = \|DELIVERY_FAILURE\|(?<dest>[^\|\:]+).*\|(?<recipient>.*)$
#REGEX = \|DELIVERY_FAILURE\|(?P<src_ip>[^:\s]+)(?::(?P<port>[0-9]+))\|(?<status>\d+)\s+(?<reason>(.*)\|)
FORMAT = dest::$1,recipient::$2

#####Authnetication for SMG ##############
[authen_symantec_gw]
REGEX = USER=(?P<user>[^ ]+)\s+\;
FORMAT = user::$1,cmd::$2

[cmd_symantec_gw]
REGEX = COMMAND=(?P<cmd>.+)
FORMAT = cmd::$1






