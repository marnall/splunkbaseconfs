[riskiq:assets]
REPORT-ASNNumber = ASNNumber
EXTRACT-ASX = ^.*ASN=(AS)?(?<ASNNumber>\d+)\s.*
LOOKUP-riskiq_cve = riskiq_cve Name AS webSite_webSiteAssetCVEs_cveSummary_name OUTPUTNEW Description AS CVEDescription Status AS CVEStatus
LOOKUP-riskiq_ddosasns = riskiq_ddosasns ASN AS asn_asnID OUTPUTNEW ASNOwner AS ASNOwner DDOSVendor AS DDOSVendor
TRUNCATE = 0
BREAK_ONLY_BEFORE_DATE = true
MAX_TIMESTAMP_LOOKAHEAD=25
TIME_FORMAT = %m/%d/%Y %H:%M:%S
MAX_EVENTS = 100000

EVAL-organizations = if(isnull('organizations'),"-", split('organizations',";"))
EVAL-tags = if(isnull('tags'),"-", split('tags',";"))
EVAL-webComponent_nameVersion = split(webSite_webSiteAssetWebComponents_webComponent_nameVersion,";")
EVAL-webComponent_type = split(webSite_webSiteAssetWebComponents_webComponent_type,";")
EVAL-webComponent_currentlyAffected = split(webSite_webSiteAssetWebComponents_affected,";")
EVAL-webSite_webSiteAssetWebComponents_webComponent_name = split(webSite_webSiteAssetWebComponents_webComponent_name,";")
EVAL-webSite_securityPolicyRecords_policyName = split(webSite_securityPolicyRecords_policyName,";")
EVAL-webSite_securityPolicyRecords_description = split(webSite_securityPolicyRecords_description,";")
EVAL-webSite_webSiteAssetCVEs_webComponent_name = split(webSite_webSiteAssetCVEs_webComponent_name,";")
EVAL-webSite_webSiteAssetCVEs_webComponent_nameVersion = split(webSite_webSiteAssetCVEs_webComponent_nameVersion,";")
EVAL-webSite_webSiteAssetCVEs_webComponent_type = split(webSite_webSiteAssetCVEs_webComponent_type,";")
EVAL-webSite_webSiteAssetCVEs_webComponent_version = split(webSite_webSiteAssetCVEs_webComponent_version,";")
EVAL-webSite_webSiteAssetWebComponents_webComponent_version = split(webSite_webSiteAssetWebComponents_webComponent_version,";")
EVAL-ssl_end_time = strptime(sslCert_invalidAfter,"%Y-%m-%dT%H:%M:%S.%3N%z")
EVAL-ssl_start_time = strptime(sslCert_invalidBefore,"%Y-%m-%dT%H:%M:%S.%3N%z")

FIELDALIAS-webComponent_lastSeen = webSite_webSiteAssetWebComponents_lastSeen AS webComponent_lastSeen
FIELDALIAS-host = domain_domain AS dns host_host AS host host_ipAddress AS ip
FIELDALIAS-Vulnerabilities = webSite_webSiteAssetCVEs_cveSummary_name AS signature webSite_webSiteAssetCVEs_cveSummary_number AS cvss host_host AS dest
FIELDALIAS-Certificates = name AS ssl_name sslCert_issuer_commonName AS ssl_issuer_common_name sslCert_issuer_locality AS ssl_issuer_locality sslCert_issuer_organiation AS ssl_issuer_organization sslCert_keyAlgorithm AS ssl_publickey_algorithm sslCert_keyExponent AS ssl_publickey sslCert_serialNumber AS ssl_serial sslCert_sigAlgName AS ssl_signature_algorithm sslCert_subject_commonName AS ssl_subject_common_name sslCert_subject_locality AS ssl_subject_locality
FIELDALIAS-Inventory = assetID AS serial webSite_webSiteAssetWebComponents_webComponent_name AS os webSite_webSiteAssetWebComponents_webComponent_type AS family webSite_webSiteAssetWebComponents_webComponent_version AS version
FIELDALIAS-Malware = host_ipAddress AS src status AS action summary_brandInDomainAttributes_domain AS src_nt_domain summary_malwareAttributes_threatHost AS nt_host summary_rogueAppAttributes_mobileApp_url AS url
EVAL-ssl_is_valid = if(strptime(sslCert_invalidAfter,"%Y-%m-%dT%H:%M:%S.%3N%z")>=now(), "True", "False")

EVAL-severity = case(webSite_webSiteAssetCVEs_cveSummary_cvss_score>=8.0, "critical", webSite_webSiteAssetCVEs_cveSummary_cvss_score>6.0,"high", webSite_webSiteAssetCVEs_cveSummary_cvss_score>4.0,"medium",webSite_webSiteAssetCVEs_cveSummary_cvss_score>2.0,"low",webSite_webSiteAssetCVEs_cveSummary_cvss_score>=0,"informational")

[riskiq:events]
TRUNCATE = 0
BREAK_ONLY_BEFORE_DATE = true
MAX_TIMESTAMP_LOOKAHEAD=25
TIME_FORMAT = %m/%d/%Y %H:%M:%S
MAX_EVENTS = 100000
FIELDALIAS-alias1 = name AS eventName
FIELDALIAS-alias2 = status AS eventStatus
FIELDALIAS-alias3 = summary_phishAttributes_domain as domain
FIELDALIAS-alias4 = summary_whois_asn as asn
FIELDALIAS-alias5 = summary_whois_registrant as registrant
FIELDALIAS-alias7 = summary_phishAttributes_browserBlocked as browserBlocked
FIELDALIAS-alias8 = summary_phishAttributes_submittedForBrowserBlocking as submittedForBrowserBlocking
FIELDALIAS-alias9 = summary_phishAttributes_targetBrand as targetBrand
FIELDALIAS-alias10 = summary_rogueAppAttributes_blacklistScore as blacklistScore
FIELDALIAS-alias11 = summary_rogueAppAttributes_mobileApp_appWebStore_type as storeType
FIELDALIAS-alias12 = summary_rogueAppAttributes_mobileApp_appWebStore_displayName as storeDisplayName
FIELDALIAS-alias13 = summary_rogueAppAttributes_appScore as appScore
FIELDALIAS-alias14 = summary_rogueAppAttributes_mobileApp_officialID as officialID
FIELDALIAS-alias15 = summary_rogueAppAttributes_mobileApp_developer as developer
FIELDALIAS-alias16 = summary_rogueAppAttributes_logoScore as logoScore
EVAL-targetCountry = if(isnull(targetCountry),"-", upper(targetCountry))
EVAL-created = strftime(round(strptime(created, "%Y-%m-%dT%H:%M:%S.%N%z"),3),"%Y-%m-%dT%H:%M:%S.%3N%z")
FIELDALIAS-homepage = summary_EventSocialNetwork_homepage as homepage
FIELDALIAS-profile_link = summary_EventSocialNetwork_link as profile_link
FIELDALIAS-profile_name = summary_EventSocialNetwork_name as profile_name
EXTRACT-source = source=("(?<event_source1>[^"]*)|(?<event_source2>[^,]*))
EVAL-event_source = if(isnull(event_source1),if(isnull(event_source2),"-",event_source2),event_source1)
EVAL-eventSource = if(isnull(event_source1),if(isnull(event_source2),"-",event_source2),event_source1)
LOOKUP-targetCountry = geo_attr_countries iso2 as targetCountry OUTPUT country as targetCountry
EVAL-summary_brandInDomainAttributes_emailCapable=if(summary_brandInDomainAttributes_emailCapable=="False", "No", "Yes")
EVAL-submittedForBrowserBlocking=if(submittedForBrowserBlocking=="False", "No", "Yes")
EVAL-browserBlocked=if(browserBlocked=="False", "No", "Yes")

[riskiq:globalinventory:assets]
KV_MODE = auto_escaped
TRUNCATE = 0
BREAK_ONLY_BEFORE_DATE = true
MAX_TIMESTAMP_LOOKAHEAD=25
TIME_FORMAT = %m/%d/%Y %H:%M:%S
MAX_EVENTS = 100000
EXTRACT-assetType = type=(?<assetType>(PAGE|IP_BLOCK|HOST|SSL_CERT|AS|DOMAIN|MAIL_SERVER|NAME_SERVER|CONTACT|IP_ADDRESS))
EXTRACT-inventoryState = state=(?<inventoryState>(CONFIRMED))
EXTRACT-uuid = uuid=(?<uuid>(\w){8}-(\w){4}-(\w+){4}-(\w+){4}-(\w+){12})

EVAL-organizations = if(isnull(organizations_name),"-", split(organizations_name,";;"))
EVAL-tags = if(isnull(tags_name),"-", split(tags_name,";;"))
EVAL-brands = if(isnull(brands_name), brands, brands_name)

EVAL-webComponentName = if(isnull(asset_webComponents_webComponentName),"None", split(asset_webComponents_webComponentName,";;"))
EVAL-webComponentNameVersion = if(isnull(asset_webComponents_webComponentNameVersion),"None", split(asset_webComponents_webComponentNameVersion,";;"))
EVAL-webComponentCategory = if(isnull(asset_webComponents_webComponentCategory),"None", split(asset_webComponents_webComponentCategory,";;"))
EVAL-webComponents_recent = if(isnull(asset_webComponents_recent),"None", split(asset_webComponents_recent,";;"))
EVAL-finalUrls_value = if(isnull(asset_finalUrls_value),"None", asset_finalUrls_value)
EVAL-titles_value = if(isnull(asset_titles_value),"None", asset_titles_value)

EVAL-asset_webserver_recent = if(asset_webserver_recent=="True", "True", "False")
EVAL-asset_webserver_value = if(asset_webserver_value=="True", "True", "False")
EVAL-asset_nsRecord_recent = if(asset_nsRecord_recent=="True", "True", "False")
EVAL-asset_nsRecord_value = if(asset_nsRecord_value=="True", "True", "False")
EVAL-asset_mxRecord_recent = if(asset_mxRecord_recent=="True", "True", "False")
EVAL-asset_mxRecord_value = if(asset_mxRecord_value=="True", "True", "False")

EVAL-assetSecurityPolicies_policyName = split(asset_assetSecurityPolicies_policyName,";;")
EVAL-assetSecurityPolicies_isAffected = split(asset_assetSecurityPolicies_isAffected,";;")
EVAL-assetSecurityPolicies_recent = split(asset_assetSecurityPolicies_recent,";;")

EVAL-assetBanners_banner = split(asset_services_banners_banner,";;")
EVAL-assetBanners_recent = split(asset_services_banners_recent,";;")
EVAL-assetService_port = if(isnull(asset_services_port),"-", split(asset_services_port,";;"))

EVAL-asset_cvssScore = split(asset_webComponents_cves_cvssScore, ";;")

EVAL-assetIssuerCommonName = if(isnull(asset_issuer_commonname),"-", split(asset_issuer_commonname,";;"))
EVAL-cvssScore = if(isnull(asset_webComponents_cves_cvssScore), "0", split(asset_webComponents_cves_cvssScore, ";;"))

