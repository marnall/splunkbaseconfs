[Systems Information]
input_prefix = system_information
instance_endpoint = /api/types/System/instances
index = main
sourcetype = vxflex:instance:system
input_type = instance
method = GET
interval = 600

[Systems Statistics]
input_prefix = system_statistics
instance_endpoint = /api/types/System/instances
statistic_endpoint = /api/instances/System::{id}/relationships/Statistics
index = main
sourcetype = vxflex:statistics:system
input_type = statistics
method = GET

