# For _internal logs
[source::...ta_dell_vxflex*.log*]
SHOULD_LINEMERGE = true
sourcetype = ta:dellvxflex:log


# instance ================================================================
[source::vxflex_os_instance:...]
SHOULD_LINEMERGE = false
TRUNCATE = 0
KV_MODE = json
DATETIME_CONFIG = CURRENT
# CIM Mapping
EVAL-enabled = "true"
EVAL-vendor_product = "Dell EMC VxFlex Integrated Rack"
FIELDALIAS-dest = systemId as dest
FIELDALIAS-cluster = systemId AS cluster
FIELDALIAS-serial = id AS serial


# for default sourcetype
[vxflex:instance]
SHOULD_LINEMERGE = false
TRUNCATE = 0

# CIM Mapping - Inventory Data model
[vxflex:instance:system]
FIELDALIAS-status = mdmCluster.clusterState AS status
FIELDALIAS-version = systemVersionName AS version
EVAL-storage = (maxCapacityInGb * 1024)

[vxflex:instance:device]
FIELDALIAS-status = deviceState AS status
EVAL-storage = (tonumber(maxCapacityInKb) / 1024)
FIELDALIAS-parent = sdsId AS parent

[vxflex:instance:pd]
FIELDALIAS-status = protectionDomainState AS status
FIELDALIAS-parent = systemId AS parent

[vxflex:instance:sp]
FIELDALIAS-parent = protectionDomainId AS parent

[vxflex:instance:sdc]
FIELDALIAS-status = mdmConnectionState AS status
FIELDALIAS-version = versionInfo AS version
FIELDALIAS-parent = systemId AS parent

[vxflex:instance:sds]
FIELDALIAS-status = sdsState AS status
FIELDALIAS-version = softwareVersionInfo AS version
FIELDALIAS-parent = faultSetId AS parent

[vxflex:instance:faultset]
FIELDALIAS-parent = protectionDomainId AS parent

[vxflex:instance:volume]
FIELDALIAS-parent = storagePoolId AS parent
EVAL-storage = (sizeInKb / 1024)

# CIM Mapping - Alerts data model
[vxflex:alerts]
FIELDALIAS-id = uuid AS id
FIELDALIAS-subject = alertType as subject
EVAL-app = "dell:vxflex"
EVAL-severity = case(severity=="ALERT_HIGH", "high", severity=="ALERT_MEDIUM", "medium", severity=="ALERT_LOW", "low")
EVAL-type = "alert"
LOOKUP-alert_type_description = ta_vxflex_lookup_alerts alert_type AS alertType OUTPUT alert_message, alert_code, recommended_action


# statistics ================================================================
[source::vxflex_os_statistics:...]
SHOULD_LINEMERGE = false
TRUNCATE = 0
KV_MODE = json
DATETIME_CONFIG = CURRENT
FIELDALIAS-dest = id as dest

# for default sourcetype
[vxflex:statistics]
SHOULD_LINEMERGE = false
TRUNCATE = 0

# CIM Mapping - Performance Data model
[vxflex:statistics:sp]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)
FIELDALIAS-read_latency = userDataSdcReadLatency as read_latency
FIELDALIAS-write_latency = userDataSdcWriteLatency as write_latency

[vxflex:statistics:pd]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)
FIELDALIAS-read_latency = userDataSdcReadLatency as read_latency
FIELDALIAS-write_latency = userDataSdcWriteLatency as write_latency

[vxflex:statistics:sds]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)

[vxflex:statistics:sdc]
FIELDALIAS-read_latency = userDataSdcReadLatency as read_latency
FIELDALIAS-write_latency = userDataSdcWriteLatency as write_latency

[vxflex:statistics:device]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)
EVAL-read_latency = (avgReadLatencyInMicrosec / 1000)
EVAL-write_latency = (avgWriteLatencyInMicrosec / 1000)

[vxflex:statistics:faultset]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)

[vxflex:statistics:system]
EVAL-storage = (maxCapacityInKb / 1024)
EVAL-storage_free = (unusedCapacityInKb / 1024)
EVAL-storage_used = ((maxCapacityInKb - unusedCapacityInKb) / 1024)
FIELDALIAS-read_latency = userDataSdcReadLatency as read_latency
FIELDALIAS-write_latency = userDataSdcWriteLatency as write_latency
FIELDALIAS-cluster = id as cluster

[vxflex:statistics:volume]
FIELDALIAS-read_latency = userDataSdcReadLatency as read_latency
FIELDALIAS-write_latency = userDataSdcWriteLatency as write_latency
