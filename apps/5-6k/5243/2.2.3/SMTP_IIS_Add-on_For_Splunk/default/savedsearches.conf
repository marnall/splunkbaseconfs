[Daily report to collect Bounced Email list]
action.email.inline = 1
action.email.sendcsv = 1
action.email.sendresults = 1
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 0 * * *
description = This report runs daily on 00:00 AM and collects details of all bounced email sent
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = Avo_SMTP
request.ui_dispatch_view = search
search = `smtp_index` eventtype="Bad_mail" | stats count by Recep_mail  Notification _time \
| rename _time as Time Recep_mail as Recepient count as "No. Of Times"\
| convert ctime(Time)|sort - "No. Of Times" Time
