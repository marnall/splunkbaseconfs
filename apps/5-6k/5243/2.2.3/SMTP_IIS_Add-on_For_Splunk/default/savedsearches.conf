
[Outbound Email sent]
action.email.inline = 1
action.email.sendresults = 1
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 15 * * * *
description = Outbound Email sent  alert generates when outbound emails count triggers boundary condition
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = Avo_SMTP
request.ui_dispatch_view = search
search = `smtp_index` eventtype::smtp eventtype::smtp_ip eventtype::RCPT eventtype::domain\
| stats count by Email_Recepient \
| rename  Email_Recepient as Recepient count as "No. Of Times"

