[Error code generated -Email failed]
action.email.inline = 1
action.email.sendresults = 1
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 15 * * * *
description = Error code generated -Email failed  ,it generates when Error count triggers boundary condition
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = Avo_SMTP
request.ui_dispatch_view = search
search = `smtp_index` eventtype::smtp NOT(eventtype::smtp_ip) eventtype::error_code_range\
| lookup Error_Codes "Error Code" as Error OUTPUT Issue \
| stats count by time date Error Issue | rename time as Time date as Date count as "No. Of Times" Error as "Error Code"

[Daily report to collect Error code generated]
action.email.inline = 1
action.email.sendcsv = 1
action.email.sendresults = 1
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 0 * * *
description = This report runs daily on 00:00 AM and collects all the error code with details
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = @h
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = Avo_SMTP
request.ui_dispatch_view = search
search = `smtp_index` eventtype::smtp NOT(eventtype::smtp_ip) \
eventtype::error_code_range\
| lookup Error_Codes "Error Code" as Error OUTPUT "Generic Error" AS "Generic_Error" Issue \
| stats count by time date Error Issue | rename time as Time date as Date count as "No. Of Times" Error as "Error Code"

