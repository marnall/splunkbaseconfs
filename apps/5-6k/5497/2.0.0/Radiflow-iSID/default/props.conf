[isid_syslog]
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %FT%T.%6N%z
TIME_PREFIX = ^(\S+\s+){5}
category = Custom
EXTRACT-isid_syslog_cef = (?<cef_version>CEF[^\|]+)\|(?<device_vendor>[^\|]+)\|(?<device_product>[^\|]+)\|(?<device_version>[^\|]+)\|(?<signature_id>[^\|]+)\|(?<cef_name>[^\|]+)\|(?<cef_severity>[^\|]+)
FIELDALIAS-isid_syslog-alerts = cat AS type cef_name AS description cef_severity AS severity device_product AS app
EXTRACT-body = \|(?<body>[^\|]+)$
EVAL-dest = coalesce(dvc,dst)

