[sentineloneagentaction-command]
syntax = sentineloneagentaction <sentineloneagentaction-option>*
shortdesc = sentineloneagentaction Performs actions on a SentinelOne Agent \
            'agent_id' is the field name that contains the agent id. Defaults to `id`. \
            'site_id' is the field name that contains the site id for the agent. Defaults to `siteId` \
            'action_type' is the action type to perform. Defaults to `connect`. Valid values: `connect` or `disconnect`. \
            'management' is the field name that contains the management url to apply the command to. Defaults to `management`
description = sentineloneagentaction Performs actions on a SentinelOne Agent \
              'agent_id' is the field name that contains the agent id. Defaults to `id`. \
              'site_id' is the field name that contains the site id for the agent. Defaults to `siteId` \
              'action_type' is the action type to perform. Defaults to `connect`. Valid values: `connect` or `disconnect`. \
              'management' is the field name that contains the management url to apply the command to. Defaults to `management`
usage = public
example1 = sentineloneagentaction action_type="connect"
comment1 = Sets the action to be performed to "connect"
category = fields::add

[sentinelonethreataction-command]
syntax = sentinelonethreataction <sentinelonethreataction-option>*
shortdesc = sentinelonethreataction Performs actions on a SentinelOne threat \
            'threat_id' is the field name that contains the threat id. Defaults to `id`. \
            'site_id' is the field name that contains the site id for the threat. Defaults to `siteId` \
            'verdict' is the verdict to assign to the incidents. Optional (required when status is 'resolved'). Valid values: "true_positive", "undefined", "false_positive", "suspicious". \
            'status' is the status to assign to the incidents. Required. Valid values: 'unresolved', 'in_progress', 'resolved'. \
            'management' is the field name that contains the management url to apply the command to. Defaults to `management`
description = sentinelonethreataction Performs actions on a SentinelOne threat \
              'threat_id' is the field name that contains the threat id. Defaults to `id`. \
              'verdict' is the verdict to assign to the incidents. Optional. Valid values: "true_positive", "undefined", "false_positive", "suspicious". \
              'site_id' is the field name that contains the site id for the threat. Defaults to `siteId` \
              'status' is the status to assign to the incidents. Required. Valid values: 'unresolved', 'in_progress', 'resolved'. \
              'action_type' is the action type to perform. Defaults to `connect`. Valid values:  \
              'management' is the field name that contains the management url to apply the command to. Defaults to `management`
usage = public
example1 = sentinelonethreataction status="resolved" verdict="true_positive"
comment1 = Updates the result set in SentinelOne to a resolved status with true positive verdict.
category = fields::add

[sentineloneagentaction-option]
syntax = <sentineloneagentaction-action_type-option>|<sentinelone-management-option>|<sentinelone-site-id-option>|<sentinelone-agent-id-option>
description = sentineloneagentaction Performs actions on a SentinelOne Agent \
              'agent_id' is the field name that contains the agent id. Defaults to `id`. \
              'site_id' is the field name that contains the site id for the agent. Defaults to `siteId` \
              'action_type' is the action type to perform. Defaults to `connect`. Valid values: `connect` or `disconnect`. \
              'management' is the field name that contains the management url to apply the command to. Defaults to `management`

[sentineloneagentaction-action_type-option]
syntax = action_type=<string>
default = "connect"
description = This is a string that contains either "connect" or "disconnect"

[sentinelone-management-option]
syntax = management=<field_name>
default = "management"
description = This is the field name that contains the management url to apply the command to. Defaults to `management`

[sentinelone-site-id-option]
syntax = site_id=<field_name>
default = "siteId"
description = This is the field name that contains the siteId to apply the command to. Defaults to `siteId`.

[sentinelone-agent-id-option]
syntax = agent_id=<field_name>
default = "id"
description = This is the field name that contains the id to apply the command to. Defaults to `id`.

[sentinelone-threat-id-option]
syntax = threat_id=<field_name>
default = "id"
description = This is the field name that contains the id to apply the command to. Defaults to `id`.

[sentinelonethreataction-status-option]
syntax = status=<string>
default = "unresolved"
description = This is a string that contains the status to set: 'unresolved', 'in_progress', 'resolved'

[sentinelonethreataction-verdict-option]
syntax = verdict=<string>
description = This is a string that contains the verdict to set: "true_positive", "undefined", "false_positive", "suspicious"

[sentinelonethreataction-option]
syntax = <sentinelonethreataction-status-option>|<sentinelonethreataction-verdict-option>|<sentinelone-management-option>|<sentinelone-site-id-option>|<sentinelone-threat-id-option>
description = sentinelonethreataction Performs actions on a SentinelOne threat \
              'threat_id' is the field name that contains the threat id. Defaults to `id`. \
              'verdict' is the verdict to assign to the incidents. Optional. Valid values: "true_positive", "undefined", "false_positive", "suspicious". \
              'site_id' is the field name that contains the site id for the threat. Defaults to `siteId` \
              'status' is the status to assign to the incidents. Required. Valid values: 'unresolved', 'in_progress', 'resolved'. \
              'action_type' is the action type to perform. Defaults to `connect`. Valid values:  \
              'management' is the field name that contains the management url to apply the command to. Defaults to `management`

[sentineloneapi-command]
syntax = sentineloneapi (<sentineloneapi-api-option>) <sentineloneapi-option>*
shortdesc = sentineloneapi Performs actions on the SentinelOne API \
              'management' is the field name that contains the management url to apply the command to. Defaults to `management`
description = sentineloneapi Performs actions on the SentinelOne API \
              'management' is the field name that contains the management url to apply the command to. Defaults to `management`
usage = public
example1 = sentineloneapi activity_types
comment1 = Executes and returns "activity_types"
category = fields::add

[sentineloneapi-api-option]
syntax = activity_types
description = Selects the API Operation to interact with.

[sentineloneapi-option]
syntax = <sentinelone-management-option>
description = sentineloneapi Performs actions on the SentinelOne API \
              'management' is the field name that contains the management url to apply the command to. Defaults to `management`