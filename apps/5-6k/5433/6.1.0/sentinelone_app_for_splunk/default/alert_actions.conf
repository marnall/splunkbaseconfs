[sentinelone-threat-control]
python.version        = python3
python.required       = 3.13
is_custom             = 1
disabled              = 0
label                 = SentinelOne Threat Control Alert
description           = Apply action to threat
icon_path             = appIconAlt.png
payload_format        = json
param.incident_status = 
param.verdict         = 
param.mgmt_host       = 
param.site_id         = 
param.threat_id       = 
param._cam            = {"category":["Device Control","Information Tracking"],"task":["block","allow","update"],"subject":["threat.artifact","endpoint","process.connection-scanner","process.anti-virus-scanner"],"technology":[{"vendor":"SentinelOne","product":"SentinelOne Cloud"}],"supports_adhoc":true,"action_tooltip":"Mark threat as benign, threat, or resolved"}
command               = sendalert $action_name$ results_file="$results.file$" results_link="$results.url" param.action_name=$action_name$ | stats count

[sentinelone-network-control]
python.version       = python3
python.required      = 3.13
is_custom            = 1
disabled             = 0
label                = SentinelOne Network Control Alert
description          = Apply action to endpoint
icon_path            = appIconAlt.png
payload_format       = json
param.site_id        = 
param.mgmt_host      = 
param.network_action = 
param.agent_id       = 
param._cam           = {"category":["Device Control"],"task":["block","allow"],"subject":["endpoint","network","network.firewall"],"technology":[{"vendor":"SentinelOne","product":"SentinelOne Cloud"}],"supports_adhoc":true,"action_tooltip":"Network control to connect or disconnect device from network"}
command              = sendalert $action_name$ results_file="$results.file$" results_link="$results.url" param.action_name=$action_name$ | stats count
