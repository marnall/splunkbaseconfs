[extract_host]
SOURCE_KEY = _raw
REGEX = h=([^\|]*)\|
FORMAT = host::$1
DEST_KEY = MetaData:Host

[extract_source]
SOURCE_KEY = _raw
REGEX = s=([^\|]*)\|
FORMAT = source::$1
DEST_KEY = MetaData:Source

[extract_sourcetype]
SOURCE_KEY = _raw
REGEX = st=([^\|]*)\|
FORMAT = sourcetype::$1
DEST_KEY = MetaData:Sourcetype

[extract_time]
SOURCE_KEY = _raw
REGEX = t=([^\|]*)\|
FORMAT = $1
DEST_KEY = _time

[extract_index]
SOURCE_KEY = _raw
REGEX = i=([^\|]*)\|
FORMAT = $1
DEST_KEY = _MetaData:Index

[rewrite_raw]
SOURCE_KEY = _raw
REGEX = (?s)\|r=(.*)$
FORMAT = $1
DEST_KEY = _raw
#LOOKAHEAD = 50000
#Enable LOOKAHEAD in case large events are expected, this requires additional configuration in the sender add on
