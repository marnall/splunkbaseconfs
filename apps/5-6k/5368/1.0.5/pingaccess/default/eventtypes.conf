# PingAccess EVENTS

[source.engine]
search = source=*pingaccess*engine*splunk*.log*

[source.agent]
search = source=*pingaccess*agent*splunk*.log*

[responder.pa]
search = eventtype="source.engine" responder="PingAccess"

[responder.site]
search = eventtype="source.engine" responder="Site"

[responder.tps]
search = eventtype="source.engine" responder="Third Party Service"

[responder.oidp]
search = eventtype="source.engine" responder="OpenID Provider"

[responder.authServer]
search = eventtype="source.engine" responder="Authorization Server"

[responder.multi.siteAndPaAndNull]
search = eventtype="source.engine" (responder="PingAccess" OR responder="Site" OR NOT responder=*)

[responder.multi.openIdAndAuthServer]
search = eventtype="source.engine" (responder="OpenId Provider" OR responder="Authorization Server")