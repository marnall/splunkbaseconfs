#
# Splunk app configuration file
#

[install]
is_configured = 0

[ui]
is_visible = 1
label = PingAccess App for Splunk

[launcher]
author = Ping Identity
description = Developed by Ping Identity, the PingAccess App for Splunk gathers and presents transaction metrics from PingAccess via a series of customized reports and graphical illustrations. The application enables identity and access management (IAM) administrators, architects, and security managers to easily obtain custom reporting for all PingAccess log data, view each authentication event per app and authentication source, and analyze that event data over time.
version = 1.0.5

[package]
id = pingaccess
