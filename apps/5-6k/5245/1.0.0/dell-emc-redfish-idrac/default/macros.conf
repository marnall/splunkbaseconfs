[Redfish_IDRAC(3)]
args = HOST,SOURCETYPE,METRICORG
definition = index=redfish $HOST$ sourcetype="$SOURCETYPE$" | where NOT isnull(MetricValue) | rename Oem.Dell.ContextID as ContextID,Oem.Dell.Label as Label | eval MetricOrg=ContextID+":"+Label+":"+MetricId | eval HostDataPath=host+":"+MetricOrg |search $METRICORG$
iseval = 0
