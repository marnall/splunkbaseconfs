[ipdetection-command]
syntax = ipdetection
description = Runs a IPQualityScore Proxy Detection & Fraud Prevention API against the given Ioc Value and will return the latest results.
shortdesc = Get IPQS Records. Supported indicator type is IP.
example1 = | ipdetection field=<field_name> [strictness=<int>] [user_agent=<string>] [user_language=<string>] [fast=(true|false)] [mobile=(true|false)] [allow_public_access_points=(true|false)] [lighter_penalties=(true|false)] [transaction_strictness=<int>]
usage = public

