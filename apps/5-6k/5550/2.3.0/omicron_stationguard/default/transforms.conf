[cef_auto_kv]
SOURCE_KEY = cef_message
REGEX = \s(\w+)=([^=]+)(?=\s+\w+=)
FORMAT = $1::$2

[cef_first]
SOURCE_KEY = cef_message
REGEX = ^(\w+)=([^=]+)(?=\s+\w+=)
FORMAT = $1::$2

#Handle custom strings in CEF output
[cef_custom_fields] 
REGEX = c[a-z][0-9]Label=(.*?)\s+c[a-z][0-9]=(.*?)(?:(?=\s+[A-Za-z0-9]+=)|$)
FORMAT = $1::$2

[cef_last]
SOURCE_KEY = cef_message
REGEX = (\w+)=([^=]+)$
FORMAT = $1::$2