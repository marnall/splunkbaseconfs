description = Possible Man-in-the-Middle detected by StationGuard
dispatch.earliest_time = -5m@m
dispatch.latest_time = @m
enableSched = 1
quantity = 0
relation = greater than
search = sourcetype="omicron_stationguard" \
| transaction smac \
| eval src_non_empty=mvfilter(len(src) > 0)\
| eval dst_non_empty=mvfilter(len(dst) > 0)\
| mvexpand src_non_empty\
| mvexpand dst_non_empty\
| eval common_value=if(mvfind(src_non_empty, dst_non_empty) != -1, 1, 0)\
| where common_value > 0 and src != ""\
| dedup event_time, src_mac, src\
| eventstats values(src) as src_values, values(dst) as dst_values by event_time, src_mac, src_port, dest_mac, dest_port, eventtype, customDeviceName, dvc, vendor_product, msg\
| table event_time, src_mac, src, src_port, dest_mac, dst, dest_port, eventtype, customDeviceName, dvc, vendor_product, msg
