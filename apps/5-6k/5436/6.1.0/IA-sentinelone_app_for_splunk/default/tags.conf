# #::HDR:: ;; # App: IA-sentinelone_app_for_splunk ;; # File: tags.conf ;; # Updated: 2023-07-03 15:57:16

[eventtype=modsentinelone-network-control]
modaction_result = enabled

[eventtype=modsentinelone-threat-control]
modaction_result = enabled
# Support for Inventory and Endpoint CIM

[eventtype=sentinelone_inventory_endpoints]
# Reviewed for CIM 5.1 Feb 9, 2023
cpu         = enabled
inventory   = enabled
memory      = enabled
network     = enabled
performance = enabled
system      = enabled
user        = enabled
version     = enabled
# Support for Alerts

[eventtype=sentinelone_alerts]
# Reviewed for CIM 5.1 Feb 9, 2023
alert     = enabled
# Support for Malware

[eventtype=sentinelone_malware]
# Reviewed for CIM 5.1 Feb 9, 2023
attack     = enabled
malware    = enabled
operations = enabled
# Support for Authentication CIM

[eventtype=sentinelone_authentication]
# Reviewed for CIM 5.1 Feb 9, 2023
authentication = enabled
# SUpport for Change CIM

[eventtype=sentinelone_change]
# Reviewed for CIM 5.1 Feb 9, 2023
change    = enabled
audit     = enabled
account   = enabled
# Support for Vulnerabilities CIM

[eventtype=sentinelone_vulns]
# Reviewed for CIM 5.1 Feb 8, 2023
report        = enabled
vulnerability = enabled
