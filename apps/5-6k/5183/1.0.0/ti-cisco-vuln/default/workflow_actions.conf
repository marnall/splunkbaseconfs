#####################################
# Cisco PSIRT openVuln API Advisory #
#####################################

[cisco:vuln:advisories:all_advisory_url]
eventtypes = cisco:vuln:advisories:all
fields = publicationUrl
label = Open Advisory URL
display_location = both
link.method = get
link.target = blank
link.uri = $!publicationUrl$
type = link

[cisco:vuln:advisories:all_cvrf_url]
eventtypes = cisco:vuln:advisories:all
fields = cvrfUrl
label = Download CVRF XML
display_location = both
link.method = get
link.target = blank
link.uri = $!cvrfUrl$
type = link

#
# Note:
#  - If views are not exported Globally, then this will only work inside this app context
#
[cisco:vuln:advisories:dashboard:search_by_advisoryid]
eventtypes = cisco:vuln:advisories:all
fields = advisoryId
label = Splunk - Open CVRF Data Dashboard
link.method = get
link.target = blank
link.uri = advisories_cvrf_search_by_advisoryid?form.workflow_action=$advisoryId$
type = link

