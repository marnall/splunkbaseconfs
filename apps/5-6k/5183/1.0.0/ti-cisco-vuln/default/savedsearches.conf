##############################
# Lookup Populating Searches #
##############################

[Lookup Populating Search - cisco-vuln-products]
alert.track = 0
cron_schedule = 3 1 * * *
dispatch.earliest_time = -7d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = ti-cisco-vuln
request.ui_dispatch_view = search
schedule_window = 15
search = `cisco_advisory_indexes` `cisco_cvrf_sources` `cisco_cvrf_sourcetype_product` \
| fields productId,productName \
| inputlookup cisco-vuln-products append=t \
| stats count by productId,productName \
| eval productNameTrim=rtrim(productName," ") \
| sort limit=0 productId \
| fields productId,productName,productNameTrim \
| outputlookup cisco-vuln-products