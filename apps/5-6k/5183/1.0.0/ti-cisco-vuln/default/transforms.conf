##############################
# Indexed Field Extractions  #
##############################

[source:ti-cisco-vuln:00:ingesttime]
SOURCE_KEY = _raw
REGEX = "inputIngestTime":(*COMMIT)"(\d{10}\.\d{3})
FORMAT = ingesttime::$1
WRITE_META = true

[sourcetype:cisco-vuln:00:advisoryid]
SOURCE_KEY = _raw
REGEX = "advisoryId":(*COMMIT)"([^"]+)
FORMAT = advisoryId::$1
WRITE_META = true

##############################
#          Lookups           #
##############################

[cisco-vuln-products]
filename = cisco-vuln-products.csv
max_matches = 1
case_sensitive_match = false
fields_list = productId,productName,productNameTrim