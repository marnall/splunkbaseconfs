[cisco:cloud_security:investigated]
REPORT-dnslogs-fields = investigated_fields
LINE_BREAKER = ([\r\n])
EVENT_BREAKER = "\r\n"
EVENT_BREAKER_ENABLE = true
KV_MODE = none
SHOULD_LINEMERGE = false
CHARSET=AUTO
disabled=false
TRUNCATE = 100000
MAX_EVENTS = 100000
EVAL-product = "Cisco Secure Access Umbrella"
EVAL-vendor = "Cisco"
EVAL-vendor_product = "Cisco Secure Access/Umbrella"
TIME_PREFIX =\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2}
TIME_FORMAT = %Y-%m-%d %H:%M:%S
TZ = UTC

[cisco:cloud_security:cloudlock]
FIELDALIAS-status = incident_status AS status
FIELDALIAS-actions = ticket_id AS actions
KV_MODE = json
TRUNCATE = 100000
SHOULD_LINEMERGE = false
TIME_PREFIX = \"created_at": \"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%z
TZ = UTC
BREAK_ONLY_BEFORE = ^\{
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true

REPORT-extract_url_domain_incident = extract_url_domain_incident
FIELDALIAS-src = host as src
FIELDALIAS-description = policy_name as description
FIELDALIAS-incident = policy_name as incident
FIELDALIAS-user = entity_owner_name as user
FIELDALIAS-dest = url_domain as dest
EVAL-ticket_id = coalesce(ticket_id, id)

