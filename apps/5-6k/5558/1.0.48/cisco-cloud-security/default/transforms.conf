[cloudlock_v2_tos_kvstore_lookup]
external_type = kvstore
collection = cloudlock-v2-tos
fields_list = _key, CustName, CustDate, CustVersion

[cloudlock_v2_kvstore_lookup]
external_type = kvstore
collection = cloudlock-v2
fields_list = _key, investigateName, investigateURL, investigateToken, cloudlockName, cloudlockURL, cloudlockToken, cloudlockIncidentDetails, cloudlockIncidentUEBA, enforcementName,enforcementURL, enforcementToken, date, pollingInterval

[cloudlock_v2_keystore_lookup]
external_type = kvstore
collection = cloudlock_v2_keystore
fields_list = _key, keyval

[cloudlock_v2_health_check_lookup]
external_type = kvstore
collection = cloudlock-v2-health-check
fields_list = _key, investigateURL, investigateURLStatus, cloudlockURL, cloudlockURLStatus, enforcementURL, enforcementURLStatus, date

[destinations_lookup]
external_type = kvstore
collection = destinations
fields_list = _key, name, id, comment, status, action, source, loggedinuser, modificationtime, destinationListId, destinationListName

[investigate_settings_lookup]
external_type = kvstore
collection = investigate_settings
fields_list = _key, userName, createdDate, configName, index, status

