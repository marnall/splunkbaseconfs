TZ = UTC
FIELDALIAS-ssl_subject_common_name = server_name as ssl_subject_common_name
FIELDALIAS-bytes_in = request_size as bytes_in
FIELDALIAS-bytes_out = response_size as bytes_out
FIELDALIAS-sha_file=sha256 as file_hash
FIELDALIAS-disposition = amp_disposition as disposition
FIELDALIAS-amp_malware=amp_malwarename as malwarename_name
FIELDALIAS-score =amp_score as score
FIELDALIAS-policy = policy_identity_type as policy_type
FIELDALIAS-category = blocked_category as category
FIELDALIAS-identities_user =identities as user
FIELDALIAS-identity_user_type=identity_type as user_type
