EVAL-action = lower(action)
EVAL-app = "Cisco Secure Access App for Splunk"
FIELDALIAS-http_content_type = content_type as http_content_type
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-url_length = len(url)
EVAL-dest = if(isnotnull(dest),dest,url_domain)
EVAL-bytes = request_size + response_size


[cisco:cloud_security:firewall]
REPORT-firewalllogs-fields = firewalllogs_fields
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
CHARSET = AUTO
disabled = false
TRUNCATE = 1000000
MAX_EVENTS = 1000000
EVAL-product = "Cisco Secure Access and Umbrella"
EVAL-vendor = "Cisco"
EVAL-vendor_product = "Cisco Secure Access/Umbrella"
MAX_TIMESTAMP_LOOKAHEAD = 22
NO_BINARY_CHECK = true
TIME_PREFIX = ^
TIME_FORMAT = "%Y-%m-%d %H:%M:%S"
TZ = UTC
EVAL-action = case(verdict=="ALLOW","allowed",verdict=="BLOCK","blocked")
EVAL-direction = lower(direction)
FIELDALIAS-vendor_region = aws_region as vendor_region
FIELDALIAS-bytes_in = bytes_received as bytes_in
FIELDALIAS-bytes_out = bytes_sent as bytes_out
FIELDALIAS-packets_in = packets_received as packets_in
FIELDALIAS-packets_out = packets_sent as packets_out
EVAL-transport = case(ipProtocol=="1","icmp",ipProtocol=="6","tcp",ipProtocol=="17","udp")
EVAL-protocol = case(isnotnull(ipProtocol),"ip")
EVAL-app = "Cisco Secure Access App for Splunk"
EVAL-protocol_version = if(match(coalesce(src_ip,dest_ip,src,dest),":"), "ipv6", if(match(coalesce(src_ip,dest_ip,src,dest), "(?:\d+\.\d+\.\d+\.\d+)"),"ipv4", null))
FIELDALIAS-dvc = host as dvc
FIELDALIAS-packet_start=first_packet_timestamp as start_time
FIELDALIAS-packet_end= last_packet_timestamp as end_time
FIELDALIAS-firewall_src_ip = egress_ip as src_ip
FIELDALIAS-event_correlation_id = event_correlation_id as message_correlation_id
EVAL-packets = packets_received + packets_sent
EVAL-bytes = bytes_received + bytes_sent

