[capability::cs_admin]
[capability::cs_supervisor]
[capability::cs_user]

[role_admin]
cs_admin        = enabled
cs_supervisor   = enabled
cs_user         = enabled

[role_sc_admin]
cs_admin        = enabled
cs_supervisor   = enabled
cs_user         = enabled

[role_cs_admin]
cs_admin        = enabled
cs_supervisor   = enabled
cs_user         = enabled
srchIndexesAllowed = *
importRoles = cs_supervisor;cs_user

[role_cs_supervisor]
cs_supervisor   = enabled
cs_user         = enabled
srchIndexesAllowed = *
importRoles = cs_user
metric_alerts = enabled
search_process_config_refresh = enabled

[role_cs_user]
cs_user         = enabled
srchIndexesAllowed = *
accelerate_search = enabled
change_own_password = enabled
delete_messages = enabled
edit_search_schedule_window = enabled
export_results_is_visible = enabled
get_metadata = enabled
get_typeahead = enabled
input_file = enabled
list_tokens_own = enabled
output_file = enabled
pattern_detect = enabled
request_remote_tok = enabled
rest_apps_view = enabled
rest_properties_get = enabled
rest_properties_set = enabled
rtsearch = enabled
run_collect = enabled
run_mcollect = enabled
schedule_rtsearch = enabled
schedule_search = enabled
search = enabled
upload_lookup_files = enabled
run_msearch = enabled
list_storage_passwords = enabled
