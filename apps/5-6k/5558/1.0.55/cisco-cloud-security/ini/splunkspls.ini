totalsecurityblockcompare = search $index_val sourcetype=cisco:cloud_security:proxy OR sourcetype=cisco:cloud_security:dns earliest=$first_earliest_value latest=$first_latest_value (category="*Cryptomining*" OR category="*Command and Control*" OR category="*DNS Tunneling VPN*" OR category="*Dynamic DNS*" OR category="*Malware*" OR category="*Newly Seen Domains*" OR category="*Phishing*" OR category="*Potentially Harmful*" OR category="*Unauthorized IP Tunnel Access*") action=blocked|stats count(sourcetype) as value_previous | appendcols [search $index_val sourcetype=cisco:cloud_security:proxy OR sourcetype=cisco:cloud_security:dns earliest=$second_earliest_value latest=$second_latest_value (category="*Cryptomining*" OR category="*Command and Control*" OR category="*DNS Tunneling VPN*" OR category="*Dynamic DNS*" OR category="*Malware*" OR category="*Newly Seen Domains*" OR category="*Phishing*" OR category="*Potentially Harmful*" OR category="*Unauthorized IP Tunnel Access*") action=blocked |stats count(sourcetype) as value_recent ] | eval value_diff=value_recent-value_previous |eval added=value_previous+value_recent | eval value_percent=round((value_diff/added)*100,2) |eval value_sign=case(value_percent >0 ,"positive",value_percent <0,"negative",value_percent==0,"nochange") |table value_previous value_recent value_diff value_percent value_sign

;-------CASB----------

cloudlockincidentscount = search $index_val sourcetype=cisco:cloud_security:cloudlock OR sourcetype=incident earliest=$second_earliest_value latest=$second_latest_value policy_name!="" incident_status!="" |dedup id |stats count by incident_status |rename incident_status as "label"|rename count as "value"

cloudlocktoppolicies = search $index_val sourcetype=cisco:cloud_security:cloudlock OR sourcetype=incident earliest=$second_earliest_value latest=$second_latest_value policy_name!="" incident_status!="" |dedup id |stats count by policy_name|rename policy_name as "label"|rename count as "value"|sort -value| head 10

cloudlocktopoffenders = search $index_val sourcetype=cisco:cloud_security:cloudlock OR sourcetype=incident earliest=$second_earliest_value latest=$second_latest_value |stats dc(id) by entity_owner_name|rename entity_owner_name as "label"|rename dc(id) as "value"|sort -value | head 10

