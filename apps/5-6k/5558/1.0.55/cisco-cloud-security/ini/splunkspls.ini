[queries]

;Cloud Security Page
;-------Total Request----------

totalrequestcount = search $index_val sourcetype=cisco:cloud_security:dns OR sourcetype=cisco:cloud_security:proxy OR sourcetype=cisco:cloud_security:firewall earliest=$second_earliest_value latest=$second_latest_value | stats count(sourcetype) | rename count(sourcetype) as value

totalrequesttrend = search $index_val sourcetype=cisco:cloud_security:dns OR sourcetype=cisco:cloud_security:proxy OR sourcetype=cisco:cloud_security:firewall earliest=$second_earliest_value latest=$second_latest_value Timestamp!="" | timechart span=$span count(Timestamp)  | sort +Timestamp | rename count(Timestamp) as "value" |rename _time as label | convert timeformat="%Y-%m-%d %H:%M:%S" ctime(label)

totalrequestcompare = search $index_val sourcetype=cisco:cloud_security:dns OR sourcetype=cisco:cloud_security:proxy OR sourcetype=cisco:cloud_security:firewall earliest=$first_earliest_value latest=$first_latest_value | stats count(sourcetype) as value_previous | appendcols [search $index_val sourcetype=cisco:cloud_security:dns OR sourcetype=cisco:cloud_security:proxy OR sourcetype=cisco:cloud_security:firewall earliest=$second_earliest_value latest=$second_latest_value |stats count(sourcetype) as value_recent ] | eval value_diff=value_recent-value_previous |eval added=value_previous+value_recent | eval value_percent=round((value_diff/added)*100,2) |eval value_sign=case(value_percent >0 ,"positive",value_percent <0,"negative",value_percent==0,"nochange") |table value_previous value_recent value_diff value_percent value_sign

;-------Total Block----------

totalblockcount = search $index_val sourcetype=cisco:cloud_security:proxy OR sourcetype=cisco:cloud_security:dns OR sourcetype=cisco:cloud_security:firewall earliest=$second_earliest_value latest=$second_latest_value action=blocked | stats  count(sourcetype)  | rename  count(sourcetype) as value

totalblocktrend = search $index_val sourcetype=cisco:cloud_security:proxy OR sourcetype=cisco:cloud_security:dns OR sourcetype=cisco:cloud_security:firewall earliest=$second_earliest_value latest=$second_latest_value action=blocked  Timestamp!="" | timechart span=$span count(Timestamp)  | sort +Timestamp | rename count(Timestamp) as "value" |rename _time as label | convert timeformat="%Y-%m-%d %H:%M:%S" ctime(label)

totalblockcompare = search $index_val sourcetype=cisco:cloud_security:proxy OR sourcetype=cisco:cloud_security:dns OR sourcetype=cisco:cloud_security:firewall earliest=$first_earliest_value latest=$first_latest_value action=blocked |stats count(sourcetype) as value_previous | appendcols [search $index_val sourcetype=cisco:cloud_security:proxy OR sourcetype=cisco:cloud_security:dns OR sourcetype=cisco:cloud_security:firewall earliest=$second_earliest_value latest=$second_latest_value (action=blocked OR verdict=Block) |stats count(sourcetype) as value_recent ] | eval value_diff=value_recent-value_previous |eval added=value_previous+value_recent | eval value_percent=round((value_diff/added)*100,2) |eval value_sign=case(value_percent >0 ,"positive",value_percent <0,"negative",value_percent==0,"nochange") |table value_previous value_recent value_diff value_percent value_sign

