[cloudflare:json]

#
# Linebreaking, timestamping and truncation configuration settings.
#
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)\{\"CacheCacheStatus\":\"
disabled=false
TRUNCATE=100000
TIME_PREFIX=\"EdgeStartTimestamp\":\"
TIME_FORMAT=%Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD=19


#
# Search-time JSON key-value extraction.
# Set this to 'none' if INDEXED_EXTRACTIONS=json is in place on the point of collection.
#
KV_MODE=json


#
# Search-time CIM-compliant field aliases and field calculations
# CIM compliance is mapped to the CIM Web Data Model
#
FIELDALIAS-ClientRequestHost_to_clientHostname = ClientRequestHost AS dest_host
FIELDALIAS-ClientRequestMethod_to_httpMethod = ClientRequestMethod AS http_method
FIELDALIAS-ClientSSLProtocol_to_sslProtocol = ClientSSLProtocol AS ssl_protocol
FIELDALIAS-EdgeResponseContentType_to_contentType = EdgeResponseContentType AS http_content_type
FIELDALIAS-ClientIP_to_srcIP = ClientIP AS src_ip
FIELDALIAS-ClientRequestPath_to_uriPath = ClientRequestPath AS uri_path
FIELDALIAS-ClientRequestUserAgent_to_httpUserAgent = ClientRequestUserAgent AS http_user_agent
FIELDALIAS-EdgeReposeStatus_to_status = EdgeResponseStatus AS status
FIELDALIAS-OriginIP_to_destIP = OriginIP AS dest_ip
FIELDALIAS-ClientRequestBytes_to_bytesIn = ClientRequestBytes AS bytes_in
FIELDALIAS-EdgeResponseBytes_to_bytesOut = EdgeResponseBytes AS bytes_out
FIELDALIAS-EdgeRateLimitAction_to_action = EdgeRateLimitAction AS action
FIELDALIAS-ClientRequestURI_to_uri = ClientRequestURI AS uri
FIELDALIAS-ClientSrcPort_to_srcPort = ClientSrcPort AS src_port
FIELDALIAS-OriginResponseTime_to_responseTime = OriginResponseTime AS response_time
FIELDALIAS-ClientRequestReferer_to_httpReferrer = ClientRequestReferer AS http_referrer
FIELDALIAS-ClientRequestReferer_to_httpReferer = ClientRequestReferer AS http_referer
EVAL-url = dest_host . uri
EVAL-bytes = bytes_in + bytes_out
EVAL-dest = coalesce(dest_host,dest_ip)
EVAL-src = coalesce(src_host,src_ip)
