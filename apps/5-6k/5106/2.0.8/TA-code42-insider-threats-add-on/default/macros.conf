[c42_keyword_search(1)]
args = term
definition = (file-path=*$term$* OR file-name=*$term$* OR tab-url=*$term$* OR window-title=*$term$*)
iseval = 0

[c42_file_cat_time_chart]
definition = | fields fileCategory \
`c42_pretty_file_cat`\
| timechart count by prettyFileCat
iseval = 0

[c42_file_cat_bar_chart]
definition = | stats sum(Events) as Events by file-category \
`c42_pretty_file_cat`\
| table prettyFileCat Events\
| sort Events desc | rename prettyFileCat as "File Category"
iseval = 0

[c42_pretty_file_cat]
definition = | eval prettyFileCat = replace(upper(substr('file-category',1,1)).lower(substr('file-category',2)), "_", " ")
iseval = 0

[c42_events_by_severity(1)]
args = index_name
definition = search index=$index_name$ sourcetype="c42-file-exposure" \
| chart count over username by risk-severity \
| eval LOW = if(isnull(LOW), 0, LOW) \
| eval MODERATE = if(isnull(MODERATE), 0, MODERATE) \
| eval HIGH = if(isnull(HIGH), 0, HIGH) \
| eval CRITICAL = if(isnull(CRITICAL), 0, CRITICAL) \
| eval Total = sum(LOW, MODERATE, HIGH, CRITICAL) \
| table username Total LOW MODERATE HIGH CRITICAL

[c42_watchlist_members(1)]
args = index_name
definition = search index="$index_name$" sourcetype="c42-audit-log" eventType=watchlist_membership_user_added \
| stats max(timestamp) as timeAdded by username, listType \
| join type=outer [search index="$index_name$" sourcetype="c42-audit-log" eventType=watchlist_membership_user_removed \
| stats max(timestamp) as timeRemoved by username] \
| fillnull timeAdded timeRemoved \
| where timeAdded > timeRemoved \
| table username, listType \
| stats values(listType) as Watchlists by username
iseval = 0
