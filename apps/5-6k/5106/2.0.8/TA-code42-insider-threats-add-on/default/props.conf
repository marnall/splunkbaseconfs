[source::...ta-code42-insider-threats-add-on*.log*]
sourcetype = tacode42insiderthreatsaddon:log

[source::...ta_code42_insider_threats_add_on*.log*]
sourcetype = tacode42insiderthreatsaddon:log

[c42-file-exposure]
EVAL-username = case(actor!="null", actor, deviceUserName!="null", deviceUserName, emailSender!="null", emailSender, 'user.email'!="null", 'user.email')
EVAL-risk-severity = case(riskSeverity!="null", riskSeverity, 'risk.severity'!="null", 'risk.severity')
EVAL-destination-name = case(destinationName!="null", destinationName, 'destination.name'!="null", 'destination.name')
EVAL-sync-destination = case(syncDestination!="null", syncDestination, 'destination.name'!="null", 'destination.name')
EVAL-file-category = case(fileCategory!="null", fileCategory, 'file.category'!="null", 'file.category')
EVAL-risk-score = case(riskScore!="null", riskScore, 'risk.score'!="null", 'risk.score')
EVAL-event-trusted = case(trusted!="null", trusted, 'risk.trusted'!="null", 'risk.trusted')
EVAL-c42-user-id = case(userUid!="null", userUid, 'user.id'!="null", 'user.id')
EVAL-file-path = case(filePath!="null", filePath, 'file.directory'!="null", 'file.directory')
EVAL-file-name = case(fileName!="null", fileName, 'file.name'!="null", 'file.name')
EVAL-tab-url = case(tabUrl!="null", tabUrl, 'destination.tabs{}.url'!="null", 'destination.tabs{}.url')
EVAL-window-title = case('windowTitle{}'!="null", 'windowTitle{}', 'destination.tabs{}.title'!="null", 'destination.tabs{}.title')
EVAL-removable-media-name = case(removableMediaName!="null", removableMediaName, 'destination.removableMedia.name'!="null", 'destination.removableMedia.name')
EVAL-event-type = case(eventType!="null", eventType, 'event.action'!="null", 'event.action')
EVAL-event-source = case(eventSource!="null", eventSource, 'event.category'!="null", 'event.category')
EVAL-event-id = case(eventId!="null", eventId, 'event.id'!="null", 'event.id')
EVAL-event-timestamp = case(eventTimestamp!="null", eventTimestamp, '@timestamp'!="null", '@timestamp')
EVAL-md5-checksum = case(md5Checksum!="null", md5Checksum, 'file.hash.md5'!="null", 'file.hash.md5')
EVAL-sha256-checksum = case(sha256Checksum!="null", sha256Checksum, 'file.hash.sha256'!="null", 'file.hash.sha256')
EVAL-mime-type = case(mimeTypeByBytes!="null", mimeTypeByBytes, 'file.mimeTypeByBytes'!="null", 'file.mimeTypeByBytes')
EVAL-file-size = case(fileSize!="null", fileSize, 'file.sizeInBytes'!="null", 'file.sizeInBytes')
EVAL-process = case(processName!="null", processName, 'process.executable'!="null", 'process.executable')
EVAL-hostname = case(osHostName!="null", osHostName, 'source.name'!="null", 'source.name')
EVAL-cloud-shared = case(shared!="TRUE", shared, 'event.shareType{}'!="null", 'event.shareType{}')
EVAL-exposure-type = case('exposure{}'!="null", 'exposure{}', 'risk.indicators{}.name'!="null", 'risk.indicators{}.name')
EVAL-exposure-cloudSync = case('exposure{}'="CloudStorage", 'exposure{}', 'risk.indicators{}.name'="*upload")
EVAL-exposure-removableMedia = case('exposure{}'="CloudStorage", 'exposure{}', 'risk.indicators{}.name'="Removable media")
EVAL-exposure-browserAppRead = case('exposure{}'="ApplicationRead", 'exposure{}', 'event.action'="application-read", 'event.action')
EVAL-exposure-sharedLink = case('exposure{}'="SharedViaLink", 'exposure{}', 'risk.indicators{}.name'="Shared from*")
EVAL-exposure-publicLink = case('exposure{}'="IsPublic", 'exposure{}', 'risk.indicators{}.name'="Public link*")
EVAL-exposure-sharedOutsideDomain = case('exposure{}'="OutsideTrustedDomains", 'exposure{}', 'risk.indicators{}.name'="*upload")
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = "eventTimestamp|@timestamp"
TZ = UTC
TRUNCATE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[c42-audit-log]
REPORT-eventType = extract_audit_log_type
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp"
TZ = UTC
TRUNCATE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[c42-device-health]
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp"
TZ = UTC
TRUNCATE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[c42-alerts]
FIELDALIAS-username = actor as username
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = "beginTime"
TZ = UTC
TRUNCATE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
