[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 3

[launcher]
author = Whois API, Inc.
version = 1.0.5
description = Brand Alert API searches across all recently registered & deleted domain names and returns result sets consisting of domain names that contain term(s) that are specified by you.

[ui]
is_visible = 1
label = Whois XML Brand Alert API for Splunk
docs_section_override = AddOns:released
setup_view = setup

[id]
name = TA_whois_xml_brand_alert_api
version = 1.0.5

[package]
id = TA_whois_xml_brand_alert_api

[triggers]
reload.whoisxmlapi_brand_alert = simple
