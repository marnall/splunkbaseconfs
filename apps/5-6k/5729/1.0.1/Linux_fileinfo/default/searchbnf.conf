[fileinfo]
syntax = | fileinfo <fileinfo-options>
shortdesc = Get info on a file
description = Call python os.stat command on the specified file
usage = public
example1 = | fileinfo filepath="/opt/splunk/var/log/splunk/splunkd.log"
comment1 = Returns the informations of the splunkd log file
tags = linux filepath fileinfo filesize filepid filegid fileaccess filemodifications
maintainer = Timoti Prigent

[fileinfo-options]
syntax = (filepath=<filepath>)
