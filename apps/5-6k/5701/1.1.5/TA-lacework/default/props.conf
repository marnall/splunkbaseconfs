[source::...ta-lacework*.log*]
sourcetype = talacework:log

[source::...ta_lacework*.log*]
sourcetype = talacework:log

[lacework:audit]
EVAL-action = if(like(userAction, "%Login%"), "success", if(like(userAction, "%Created%"), "created", if(like(userAction, "%Deleted%"), "deleted",  if(like(userAction, "%Changed%"), "modified",  if(like(userAction, "%Modified%"), "modified", action)))))
EVAL-app = "lacework"
EVAL-authentication_method = if(authentication_method == "OAUTH", "SAML", authentication_mathod")
EVAL-dest = accountName + ".lacework.net"
EXTRACT-EXTRACT = userAction\":\s*"Login with (?<authentication_method>[^\s\"]*)
FIELDALIAS-aob_gen_lacework_audit_alias_1 = userName AS user
FIELDALIAS-aob_gen_lacework_audit_alias_2 = userName AS src_user
category = custom
EXTRACT-object = eventDescription\":\s".*created (a new user |integration )?(?<object>[^\s]+).*"
