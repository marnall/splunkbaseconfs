[Generate CV Asset Lookup for OT Security Add-on]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = This search can generate an asset lookup that is compatible with the OT Security Add-on for ES.  By default it should run for the last 90 days, but this can be changed when scheduled.
dispatch.earliest_time = -90d
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
search = sourcetype="cisco:cybervision:devices"\
| fillnull ip,dns,nt_host,mac value="" \
| eval dns=if(isnotnull('dns{}'), 'dns{}', 'dns'), mac=if(isnotnull('mac{}'), 'mac{}', 'mac'), ip=if(isnotnull('ip{}'), 'ip{}', 'ip'), nt_host=if(isnotnull('nt_host{}'), 'nt_host{}', 'nt_host') \
| eval ip=if(mvcount(ip) > 1, mvsort(ip), ip), dns=if(mvcount(dns) > 1, mvsort(dns), dns), nt_host=if(mvcount(nt_host) > 1, mvsort(nt_host), nt_host), mac=if(mvcount(mac) > 1, mvsort(mac), mac)\
| dedup ip,dns,nt_host,mac,host sortby -_time \
| eventstats count as mac_count by mac \
| eval mac=if(mac_count > 1, "", mac), , ip=mvappend(mvindex(ip, 0, 3), substr(mvjoin(mvindex(ip, 4, -1), ","), 1, 150)), dns=mvappend(mvindex(dns, 0, 3), substr(mvjoin(mvindex(dns, 4, -1), ","), 1, 150)), nt_host=mvappend(mvindex(nt_host, 0, 3), substr(mvjoin(mvindex(nt_host, 4, -1), ","), 1, 150)), mac=mvappend(mvindex(mac, 0, 3), substr(mvjoin(mvindex(mac, 4, -1), ","), 1, 150)), lastActivity=lastActivity/1000, firstActivity=firstActivity/1000, cv_host=host\
| table asset_id, asset_model, asset_status, asset_system, asset_type, asset_vendor, asset_version, asset_criticality, bunit, category, city, classification, country, dns, end_of_support, exposure,ip, is_expected, lat, lon, location, mac, nt_host, owner, parent_asset_id, pci_domain, priority, requires_av, serial, should_timesync, should_update, site_id, vlan, zone, lastActivity, firstActivity, cv_host\
| outputlookup `cv_asset_lookup_table_name`

[Populate CV Vulnerabilities Summary Index]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = This search takes data from the device endpoint and populates a summary index with this vulnerabilities data used in dashboards
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
search = sourcetype="cisco:cybervision:devices" vulnerabilitiesCount > 0 \
| spath input=_raw output=vulns path=vulnerabilities{} \
| table _time, host, asset_id, nt_host, ip, dns, mac, vulns, url, vendor_product, sourcetype, source,vulnerabilities_solution,asset_vendor,asset_type, label \
| mvexpand vulns \
| rex field=vulns ".*\"cve\": \"(?<cve>[^\"]+)\".*\"title\": \"(?<signature>.*)\", \"summary\".*\"CVSS\": (?<cvss>\d+(?:\.\d+)?)," \
| rex field=vulns ".*\"solution\": \"(?<vuln_solution>[^\"]+)" \
| fillnull vuln_solution value="" \
| eval cvss = tonumber(cvss) \
| eval dest=if(isnotnull(nt_host), nt_host, if(isnotnull(ip), ip, if(isnotnull(dns), dns, if(isnotnull(mac), mac, "")))), dvc=host, url=if(mvcount(url) > 1, mvindex(url, 1), url) \
| eval severity=CASE(\
    cvss >= 9, "Critical",\
    cvss >=7, "High",\
    cvss >=4, "Medium",\
    cvss >=0, "Low",\
    1=1, "Unknown") \
| bin span=1s _time \
| dedup host,asset_id,cve sortby -_time \
| eval vulnerabilities_solution=vuln_solution \
| fields _time, asset_id, dest, dvc, cve, signature, cvss, severity, url, vendor_product,host,sourcetype,source,vulnerabilities_solution,asset_vendor,asset_type, label \
| stats count latest(dest) as dest, latest(label) as label by _time, asset_id, dvc, cve, signature, cvss, severity, url, vendor_product,host,sourcetype,source,vulnerabilities_solution,asset_vendor,asset_type \
| collect index=`cv_summary_index_for_vulnerabilities`
