[launcher]
version = 2.2.0
description = This application can be used to pull information from the Cyber Vision server. It is having the support of data collection for Activities, Components, Events, Flows, Vulnerabilities.
author = Cisco Systems

[id]
version = 2.2.0
name = TA-cisco_cybervision

[install]
build = 1768808387
is_configured = false
state = enabled

[package]
id = TA-cisco_cybervision
check_for_updates = true

[ui]
label = Cisco Cyber Vision Add-on for Splunk
is_visible = true

[triggers]
reload.ta_cisco_cybervision_settings = simple
reload.ta_cisco_cybervision_account = simple
