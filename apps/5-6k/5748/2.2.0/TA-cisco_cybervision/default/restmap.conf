[admin:TA_cisco_cybervision_configuration]
match = /
members = TA_cisco_cybervision_account, TA_cisco_cybervision_settings

[admin:TA_cisco_cybervision_inputs]
match = /
members = TA_cisco_cybervision_cybervision_activities, TA_cisco_cybervision_cybervision_components, TA_cisco_cybervision_cybervision_devices, TA_cisco_cybervision_cybervision_events, TA_cisco_cybervision_cybervision_flows, TA_cisco_cybervision_cybervision_sensors, TA_cisco_cybervision_cybervision_vulnerabilities

