[IOC Collection]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
description = History of IOC Collection
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = bar
display.visualizations.show = 0
request.ui_dispatch_app = TA-datalake-connect
request.ui_dispatch_view = search
search = index=_internal sourcetype=tadatalakeconnect:log \
	| transaction IOCType startswith="Start" endswith="End"\
	| eval Parsing= coalesce(Parsing,"ok")\
	| eval Access= coalesce(Access,"ok")\
	| eval IOCNumber=coalesce(IOCNumber,"0")\
	| eval IOC = coalesce(IOC,"none")\
	| table _time IOCType, Runtime, Proxy, Token, User, Access, Parsing, Query, IOC, IOCNumber

[OutputLookup Datalake]
action.keyindicator.invert = 0
action.lookup = 1
action.lookup.append = 1
action.lookup.filename = datalake_connect.csv
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 0 0 * * *
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-datalake-connect
request.ui_dispatch_view = search
search = index=* sourcetype=datalake_*\
	| strcat threat_types " | " threat_scores " | " sources " | " tags description\
	| stats latest(atom_type) as atom_type values(threat_hashkey) as threat_hashkey values(first_seen) as firts_seen latest(last_updated) as last_updated latest(threat_types) as threat_type latest(threat_scores) as threat_score latest(sources) as sources latest(tags) as tags latest(description) as description by atom_value

[Datalake - Build Datalake APK lookup]
action.email.show_password = 1
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
cron_schedule = 12 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = -0m
display.events.fields = ["host","source","sourcetype","src_asset","src_bunit","src_category","src_city","src_country"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = index=`datalake-index` atom_type=apk\
	|  eval threat_types=coalesce(threat_types," ")\
	|  eval threat_scores=coalesce(threat_scores," ")\
	|  eval sources=coalesce(sources," ")\
	|  eval tags=coalesce(tags," ")\
	|  eval description="[" + threat_types + "]" + "[" + threat_scores + "]" + "[" + sources + "]" + "[" + tags + "]"\
	| rename atom_value as apk\
	\
	\
	``` To remove duplicated entries for some IOC``` \
	| stats latest(description) as description, latest(last_updated) as last_updated, latest(first_seen) as first_seen, latest(sources) as sources, latest(tags) as tags, latest(threat_hashkey) as threat_hashkey, latest(threat_scores) as threat_scores, latest(threat_types) as threat_types   by apk\
	\
	| outputlookup  datalake_apk

