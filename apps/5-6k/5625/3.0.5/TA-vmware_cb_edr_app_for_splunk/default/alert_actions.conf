[vmware-edr-kill-process]
python.version = python3
is_custom = 1
maxtime = 15m
disabled = 0
label = VMware CB EDR Kill Process
description = Remotely kill a process on the devices specified in the search
icon_path = appAAKillProcess.png
payload_format = json
param.process_field =
param.device_id_field =
param._cam = {\
             "category": ["Information Conveyance"],\
             "task": ["create"],\
             "subject": ["site"],\
             "technology": [{"vendor": "TA-vmware_cb_edr_app_for_splunk", "product": "TA-vmware_cb_edr_app_for_splunk"}],\
             "supports_adhoc": true,\
             "action_tooltip": "Remotely kill a process on the devices specified in the search"\
}
command = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.action_name=$action_name$ | stats count

