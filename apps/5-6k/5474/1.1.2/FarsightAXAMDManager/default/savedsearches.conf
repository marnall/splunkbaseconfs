[AXAMD RAD Matches - Phantom Escalation]
disabled = 1
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = */15 * * * *
dispatch.earliest_time = -20m@m
dispatch.latest_time = -5m@m
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = FarsightAXAMDManager
search = sourcetype="rad" "ANOMALY HIT"\
| table _time an channel field mname time nmsg.message.*\
| rename nmsg.message.* AS *

