[PureStorage FlashBlade Email Alert]
action.email = 1
action.email.include.search = 1
action.email.include.trigger = 1
action.email.include.trigger_time = 1
action.email.sendcsv = 1
action.email.sendpdf = 1
action.email.sendresults = 1
action.email.inline = 1
action.email.subject.alert = Splunk PureStorage FlashBlade Alert
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
alert.digest_mode = 1
alert.suppress = 0
alert.track = 0
cron_schedule = 0 * * * *
description = This alert will be triggered when the alert with 'Critical' severity occurs in FlashBlade Server.
disabled = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
quantity = 0
counttype = number of events
relation = greater than
search = `get_ps_flashblade_index` sourcetype="purestorage:flashblade:alerts" severity="critical" | rename id AS "Alert ID",code AS Code, state AS State, flagged AS Flagged, array_id AS "Array ID", array_name AS "Array Name", component AS Component, subject AS Subject, _raw AS "Raw Event" |table "Alert ID", Code, State, Flagged, "Array ID", "Array Name", Component, Subject, "Raw Event"

