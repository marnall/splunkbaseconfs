[PureStorage Pure1 Email Alert]
action.email = 1
action.email.include.search = 1
action.email.include.trigger = 1
action.email.include.trigger_time = 1
action.email.sendcsv = 1
action.email.sendpdf = 1
action.email.sendresults = 1
action.email.inline = 1
action.email.subject.alert = Splunk PureStorage Pure1 Alert
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
alert.digest_mode = 1
alert.suppress = 0
alert.track = 0
cron_schedule = 0 * * * *
description = This alert will be triggered when the alert with 'Critical' severity occurs in Pure1.
disabled = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
quantity = 0
counttype = number of events
relation = greater than
search = `get_ps_pure1_index` sourcetype="purestorage:pure1:alerts" severity="critical" | rename id AS "Alert ID",code AS Code, state AS State, category AS Category, array_id AS "Array ID", array_name AS "Array Name", component_name AS "Component Name", component_type AS "Component Type", summary AS Summary, _raw AS "Raw Event" |table "Alert ID", Code, State, Category "Array ID", "Array Name", "Component Name", "Component Type", Summary, "Raw Event"

[PureStorage Pure1 Array Mapping]
cron_schedule = */5 * * * *
description = Provide a seperate list of FA and FB configured in Pure1
dispatch.earliest_time = -6m
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = `get_ps_pure1_index` source="pure1:arrays" | dedup id, name, sourcetype | eval array_type = CASE(sourcetype="purestorage:pure1:flasharray:array","FlashArray", sourcetype="purestorage:pure1:flashblade:array","FlashBlade") | rename id as array_id, name as array_name | table array_type, array_id, array_name | eval key=md5(array_id . array_name)  | outputlookup pure1_array_mapping_lookup key_field=key append=t
disabled = False
