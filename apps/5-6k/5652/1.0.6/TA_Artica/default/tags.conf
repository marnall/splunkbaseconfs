##
## Splunk Add-on for Artica
##
##

[eventtype=artica_squid_access]
web = enabled
proxy = enabled

[eventtype=artica_nginx_access]
web = enabled
inventory = enabled
activity = enabled

[eventtype=artica_nginx_error]
error = enabled

[eventtype=artica_ssh]
ssh =  enabled

[eventtype=artica_auth]
auth =  enabled

[eventtype=artica_suricata_alert]
ids = enabled
attack = enabled

[eventtype=artica_suricata_dns]
network = enabled
resolution = enabled
dns = enabled

[eventtype=artica_suricata_http]
web = enabled

[eventtype=artica_suricata_tls]
certificate = enabled
tls = enabled

[eventtype=artica_suricata_flow]
network = enabled
communicate = enabled

[eventtype=artica_suricata_netflow]
network = enabled
communicate = enabled

[eventtype=artica_suricata_dhcp]
network = enabled
session = enabled
dhcp = enabled

[eventtype=artica_haproxy_splunk_http]
web = enabled
proxy = enabled

[eventtype=artica_haproxy_http]
inventory = enabled
loadbalancer = enabled
performance = enabled
network = enabled
loadbalancer_web = enabled

[eventtype=artica_haproxy_tcp]
inventory = enabled
loadbalancer = enabled
performance = enabled
network = enabled

[eventtype=artica_hacluster_splunk_http]
web = enabled
proxy = enabled

[eventtype=artica_hacluster_http]
inventory = enabled
loadbalancer = enabled
performance = enabled
network = enabled
loadbalancer_web = enabled

[eventtype=artica_hacluster_tcp]
inventory = enabled
loadbalancer = enabled
performance = enabled
network = enabled

[eventtype=artica_firewall]
network     = enabled
communicate = enabled
