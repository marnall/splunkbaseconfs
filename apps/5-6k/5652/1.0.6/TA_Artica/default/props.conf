##
## Splunk Add-on for Artica
##
##

## Artica SQUID Props
[artica:squid:access]
KV_MODE = auto
SHOULD_LINEMERGE = false
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)(?:\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\.\d{3})
pulldown_type = true
category = Network & Security
description = Squid Proxy system events
SEDCMD-empty=s/ [a-zA-z0-9\-]+\=(?:\"\-\"|-)//g
FIELDALIAS-src = src_ip as src
REPORT-squid_access_fields = squid_access_extract_url_domain, squid_access_extract_http_referrer
EVAL-app = "Squid"
EVAL-vendor_product = "Artica Squid Proxy Server"
EVAL-squid_calculated_error_url= if(match(url,"^error:"), url, null)
EVAL-url = if(match(url,"^error:"), null, url)
EVAL-url_length = if(match(url,"^error:"), null, len(url))
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-http_content_type = if(http_content_type=":", null, http_content_type)
EVAL-dest = if(match(url,"^error:"), dest_ip, coalesce(url, dest_ip))
EVAL-vendor_category = "Proxy Server Traffic"
LOOKUP-action = squid_actions_lookup vendor_action OUTPUT action
LOOKUP-description = squid_httpstatus_lookup status OUTPUT status_description

## Artica NGINX Props
[artica:nginx:access]
KV_MODE = auto
SHOULD_LINEMERGE=false
# For Load Balancing on UF
EVENT_BREAKER_ENABLE = true
NO_BINARY_CHECK=true
CHARSET=UTF-8
TIME_PREFIX = time_local
pulldown_type=true
description = NGINX access log in key-value pair format
category = Web

#FIELDALIAS-nginx_src = client_address as src
#FIELDALIAS-nginx_dest-ip = dest as dest_ip
#FIELDALIAS-nginx_port = port as dest_port
#FIELDALIAS-nginx_user = remote_user as user
FIELDALIAS-nginx_http_referrer = http_referer as http_referrer
FIELDALIAS-nginx_version = nginx_version as version
FIELDALIAS-http_content_type = category as http_content_type

LOOKUP-nginx_httpstatus_lookup = nginx_httpstatus_lookup status OUTPUT status_description status_type status_description AS action
EVAL-dest = COALESCE(server,dest_ip)
EVAL-app = "Nginx"
EVAL-bytes = if(isnum(bytes_in),bytes_in,0) + if(isnum(bytes_out),bytes_out,0)
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-web_server = server . ":" . site
EVAL-product = "Web Server"
EVAL-vendor = "Nginx"
EVAL-vendor_product = "Artica Nginx Web Server"
EVAL-url = if(https=="on", "https", "http")."://".server.":".dest_port.uri_path.if(uri_query=="-", "", "?".uri_query)
EVAL-response_time = if(isnum(response_time), response_time*1000, response_time)
EVAL-src = if(http_x_forwarded_for=="-", src, http_x_forwarded_for)

[artica:nginx:error]
NO_BINARY_CHECK = true
category = Web
description = Error logs produced by Nginx Web Server
pulldown_type = true
SHOULD_LINEMERGE = false
# For Load Balancing on UF
EVENT_BREAKER_ENABLE = true

EVAL-product = "Web Server"
EVAL-vendor = "Nginx"
EVAL-vendor_product = "Artica Nginx Web Server"

## Artica Suricata Props
[artica:suricata]
TIME_PREFIX = timestamp":"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6Q%z
MAX_TIMESTAMP_LOOKAHEAD = 31
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
TRUNCATE = 20000
KV_MODE = json
TRANSFORMS-suricata_sourcetyper = sourcetyper

[artica:suricata:*]
EVAL-vendor_product = "Artica Suricata"
FIELDALIAS-src = src_ip AS src
FIELDALIAS-dest = dest_ip AS dest

[artica:suricata:http]
EVAL-app = "suricata"
FIELDALIAS-bytes = http.length AS bytes
FIELDALIAS-cookie = http.set_cookie AS cookie
FIELDALIAS-http_content_type = http.http_content_type AS http_content_type
FIELDALIAS-http_method = http.http_method AS http_method
FIELDALIAS-http_referrer = http.http_refer AS http_referrer
FIELDALIAS-http_user_agent = http.http_user_agent AS http_user_agent
EVAL-http_user_agent_length = len(http_user_agent)
FIELDALIAS-status = http.status AS status 
REPORT-http_uri_info = http_uri_info
EVAL-uri_path = replace(uri_path_pre, "\\\/","/")
EVAL-url = "http://" + 'http.hostname' + 'http.url'
EVAL-url_length = len("http://" + 'http.hostname' + 'http.url')

[artica:suricata:dns]
FIELDALIAS-answer = dns.answers{}.rdata AS answer
EVAL-answer_count = mvcount(answer)
EVAL-message_type = case('dns.type'="query","Query",'dns.type'="answer","Response")
FIELDALIAS-query = dns.rrname AS query
EVAL-query_count = mvcount(query)
FIELDALIAS-record_type = dns.rrtype AS record_type
FIELDALIAS-reply_code = dns.rcode AS reply_code
FIELDALIAS-transaction_id = dns.id AS transaction_id
FIELDALIAS-transport = proto AS transport
FIELDALIAS-ttl = dns.answers{}.ttl AS ttl

[artica:suricata:tls]
FIELDALIAS-transport = proto AS transport
FIELDALIAS-ssl_end_time = tls.notafter AS ssl_end_time
FIELDALIAS-ssl_issuer = tls.issuerdn AS ssl_issuer
EXTRACT-ssl_issuer_common_name = ^{[^{]+{[^:]+:[^:].*?issuerdn":".*?CN=(?<ssl_issuer_common_name>[^",\\]+)
EXTRACT-ssl_issuer_email = ^{[^{]+{[^:]+:[^:].*?issuerdn":".*?emailAddress=(?<ssl_issuer_email>[^",\\]+)
EXTRACT-ssl_issuer_locality = ^{[^{]+{[^:]+:[^:].*?issuerdn":".*?L=(?<ssl_issuer_locality>[^",\\]+)
EXTRACT-ssl_issuer_organization = ^{[^{]+{[^:]+:[^:].*?issuerdn":".*?O=(?<ssl_issuer_organization>[^",\\]+)
EXTRACT-ssl_issuer_state = ^{[^{]+{[^:]+:[^:].*?issuerdn":".*?ST=(?<ssl_issuer_state>[^",\\]+)
EXTRACT-ssl_issuer_unit = ^{[^{]+{[^:]+:[^:].*?issuerdn":".*?OU=(?<ssl_issuer_unit>[^",]+) #######
FIELDALIAS-ssl_publickey = tls.fingerprint AS ssl_publickey
FIELDALIAS-ssl_serial = tls.serial AS ssl_serial
FIELDALIAS-ssl_start_time = tls.notbefore AS ssl_start_time
EXTRACT-ssl_subject_common_name = ^{[^{]+{[^:]+:[^:].*?CN=(?<ssl_subject_common_name>[^",\\]+)
EXTRACT-ssl_subject_email = ^{[^{]+{[^:]+:[^:].*?emailAddress=(?<ssl_subject_email>[^",\\]+)
EXTRACT-ssl_subject_locality = ^{[^{]+{[^:]+:[^:].*?L=(?<ssl_subject_locality>[^",\\]+)
EXTRACT-ssl_subject_organization = ^{[^{]+{[^:]+:[^:].*?O=(?<ssl_subject_organization>[^",\\]+)
EXTRACT-ssl_subject_state = ^{[^{]+{[^:]+:[^:].*?ST=(?<ssl_subject_state>[^",\\]+)
EXTRACT-ssl_subject_unit = ^{[^{]+{[^:]+:[^:].*?OU=(?<ssl_subject_unit>[^",\\]+)
EVAL-ssl_validity_window = floor(strptime('tls.notafter', "%Y-%m-%dT%H:%M:%S") - strptime('tls.notbefore', "%Y-%m-%dT%H:%M:%S"))
FIELDALIAS-ssl_version = tls.version AS ssl_version

[artica:suricata:flow]
#Bidirectional records
FIELDALIAS-app = app_proto AS app
EVAL-app = if(app=="failed","unknown",app)
FIELDALIAS-bytes_in = flow.bytes_toclient AS bytes_in 
FIELDALIAS-bytes_out = flow.bytes_toserver AS bytes_out
EVAL-bytes = bytes_in + bytes_out
FIELDALIAS-duration = flow.age AS duration 
FIELDALIAS-packets_in = flow.pkts_toclient AS packets_in 
FIELDALIAS-packets_out = flow.pkts_toserver AS packets_out 
EVAL-packets = packets_in + packets_out
FIELDALIAS-protocol = proto AS protocol
FIELDALIAS-tcp_flags = tcp.tcp_flags AS tcp_flag_hex
LOOKUP-tcp_flag = tcp_flag tcp_flag_hex OUTPUT tcp_flag
LOOKUP-tcp_flag_tc = tcp_flag tcp_flag_hex AS tcp_flag_hex_to_client OUTPUT tcp_flag AS tcp_flag_to_client
LOOKUP-tcp_flag_ts = tcp_flag tcp_flag_hex AS tcp_flag_hex_to_server OUTPUT tcp_flag AS tcp_flag_to_server

[artica:suricata:netflow]
#Unidirectional records
FIELDALIAS-app = app_proto AS app
EVAL-app = if(app=="failed","unknown",app)
FIELDALIAS-bytes = netflow.bytes AS bytes
FIELDALIAS-packets = netflow.pkts AS packets
FIELDALIAS-duration = netflow.age AS duration
FIELDALIAS-protocol = proto AS protocol
FIELDALIAS-tcp_flags = tcp.tcp_flags AS tcp_flag_hex
LOOKUP-tcp_flag = tcp_flag tcp_flag_hex OUTPUT tcp_flag
LOOKUP-tcp_flag_tc = tcp_flag tcp_flag_hex AS tcp_flag_hex_to_client OUTPUT tcp_flag AS tcp_flag_to_client
LOOKUP-tcp_flag_ts = tcp_flag tcp_flag_hex AS tcp_flag_hex_to_server OUTPUT tcp_flag AS tcp_flag_to_server

[artica:suricata:dhcp]
FIELDALIAS-dest_mac = dhcp.client_mac AS dest_mac
FIELDALIAS-signature = dhcp.dhcp_type AS signature
FIELDALIAS-lease_duration = dhcp.lease_time AS lease_duration

[artica:suricata:alert]
FIELDALIAS-action = alert.action AS action
FIELDALIAS-category =  alert.category AS category
FIELDALIAS_dvc = host AS dvc
EVAL-ids_type = "network"
FIELDALIAS-severity_id = alert.severity AS severity_id
EVAL-severity = case(severity_id=0, "N/A", severity_id=1, "high", severity_id=2, "medium", severity_id=3, "low", 1=1, "N/A")
FIELDALIAS-signature =  alert.signature AS signature
FIELDALIAS-transport = proto AS transport

## Artica HAProxy Props
[artica:haproxy]
KV_MODE = none
SHOULD_LINEMERGE = false
EVENT_BREAKER_ENABLE = true
TRANSFORMS-haproxy_sourcetyper = haproxy_sourcetyper

[artica:haproxy:http]
KV_MODE = none
SHOULD_LINEMERGE = false
# For Load Balancing on UF
EVENT_BREAKER_ENABLE = true
pulldown_type = true
category = Network & Security
description = HAProxy HTTP log
REPORT-haproxy_http_extract = haproxy_http_extract, haproxy_http_request_transform, haproxy_uri_transform
FIELDALIAS-haproxy_src = src_ip as src
FIELDALIAS-haproxy_response_time = Tr as response_time
FIELDALIAS-haproxy_duration = Ta as duration
FIELDALIAS-haproxy_status = status_code as status
FIELDALIAS-haproxy_bytes_in = bytes_read as bytes_in
#There is no field mapped to bytes_out, so bytes_out is always 0
EVAL-bytes_out = 0
#bytes = bytes_in + bytes_out = bytes_in + 0 = bytes_in
EVAL-bytes = bytes_in
EVAL-dest = if(match(server_name,"(<NOSRV>|<STATS>)"), null, server_name)
EVAL-captured_request_cookie = if(match(captured_request_cookie, "-"), null, captured_request_cookie)
EVAL-captured_response_cookie = if(match(captured_response_cookie, "-"), null, captured_response_cookie)
EVAL-cookie = if(match(captured_request_cookie, "-"), null, captured_request_cookie)
EVAL-captured_request_headers = split(trim(replace(captured_request_headers, "\|+" , "|"), "|"), "|")
EVAL-captured_response_headers = split(trim(replace(captured_response_headers, "\|+" , "|"), "|"), "|")
EVAL-url = if(match(uri,"(^http)|(^HTTP)"), uri, null)
EVAL-url_length = if(match(uri,"(^http)|(^HTTP)"), len(uri), null)
EVAL-app = "HAProxy"
EVAL-vendor_product = "Artica HAProxy"
EVAL-action = "pass"
LOOKUP-haproxy_httpstatus_lookup = haproxy_httpstatus_lookup status OUTPUT status_description status_type
#ITSI CIM Module
FIELDALIAS-rtt = Ta as rtt
FIELDALIAS-feconn = feconn as  interface_connections
FIELDALIAS-beconn = beconn as vip_connections
FIELDALIAS-haproxy_http_status = status_code as response_code
EVAL-vendor = "HAProxy"

[artica:haproxy:default]
KV_MODE = none
SHOULD_LINEMERGE = false
# For Load Balancing on UF
EVENT_BREAKER_ENABLE = true
pulldown_type = true
category = Network & Security
description = HAProxy default log
REPORT-haproxy_default_extract = haproxy_default_extract
FIELDALIAS-haproxy_dest = dest_ip as dest
FIELDALIAS-haproxy_src = src_ip as src
EVAL-app = "HAProxy"
EVAL-vendor_product = "Artica HAProxy"
EVAL-vendor = "HAProxy"


[artica:haproxy:tcp]
KV_MODE = none
SHOULD_LINEMERGE = false
# For Load Balancing on UF
EVENT_BREAKER_ENABLE = true
pulldown_type = true
category = Network & Security
description = HAProxy TCP log
REPORT-haproxy_tcp_extract = haproxy_tcp_extract
FIELDALIAS-haproxy_src = src_ip as src
FIELDALIAS-haproxy_duration = Tt as duration
FIELDALIAS-haproxy_bytes_in = bytes_read as bytes_in
#There is no field mapped to bytes_out, so bytes_out is always 0
EVAL-bytes_out = 0
#bytes = bytes_in + bytes_out = bytes_in + 0 = bytes_in
EVAL-bytes = bytes_in
EVAL-app = "HAProxy"
EVAL-vendor_product = "Artica HAProxy"
EVAL-action = "pass"
EVAL-dest = if(match(server_name,"(<NOSRV>|<STATS>)"), null, server_name)
#ITSI CIM Module
FIELDALIAS-rtt = Tt as rtt
FIELDALIAS-feconn = feconn as interface_connections
FIELDALIAS-beconn = beconn as vip_connections
EVAL-vendor = "HAProxy"

[artica:haproxy:clf:http]
KV_MODE = none
SHOULD_LINEMERGE = false
# For Load Balancing on UF
EVENT_BREAKER_ENABLE = true
pulldown_type = true
category = Network & Security
description = HAProxy CLF HTTP log
REPORT-haproxy_http_extract = haproxy_clf_http_extract, haproxy_http_request_transform, haproxy_uri_transform
FIELDALIAS-haproxy_src = src_ip as src
FIELDALIAS-haproxy_response_time = Tr as response_time
FIELDALIAS-haproxy_duration = Ta as duration
FIELDALIAS-haproxy_status = status_code as status
FIELDALIAS-haproxy_bytes_in = bytes_read as bytes_in
#There is no field mapped to bytes_out, so bytes_out is always 0
EVAL-bytes_out = 0
#bytes = bytes_in + bytes_out = bytes_in + 0 = bytes_in
EVAL-bytes = bytes_in
EVAL-dest = if(match(server_name,"(<NOSRV>|<STATS>)"), null, server_name)
EVAL-captured_request_cookie = if(match(captured_request_cookie, "-"), null, captured_request_cookie)
EVAL-captured_response_cookie = if(match(captured_response_cookie, "-"), null, captured_response_cookie)
EVAL-cookie = if(match(captured_response_cookie, "(.)+"), captured_response_cookie, captured_request_cookie)
EVAL-url = if(match(uri,"(^http)|(^HTTP)"), uri, null)
EVAL-url_length = if(match(uri,"(^http)|(^HTTP)"), len(uri), null)
EVAL-http_headers = trim(split(captured_headers,"\" "), "\"")
EVAL-vendor_product = "Artica HAProxy"
LOOKUP-haproxy_httpstatus_lookup = haproxy_httpstatus_lookup status OUTPUT status_description AS action status_type
#ITSI CIM Module
FIELDALIAS-rtt = Ta as rtt
FIELDALIAS-feconn = feconn as  interface_connections
FIELDALIAS-beconn = beconn as vip_connections
FIELDALIAS-haproxy_http_status = status_code as response_code
EVAL-vendor = "HAProxy"


[artica:haproxy:splunk:http]
SHOULD_LINEMERGE = false
pulldown_type = true
category = Network & Security
description = HAProxy Custom HTTP log
# For Load Balancing on UF
EVENT_BREAKER_ENABLE = true
REPORT-haproxy_http_extract = haproxy_process_prefix
REPORT-haproxy_http_splunk_headers_extract = haproxy_http_splunk_request_headers, haproxy_http_splunk_response_headers
KV_MODE = auto
FIELDALIAS-haproxy_bytes_in = bytes_read as bytes_in
FIELDALIAS-haproxy_uri_path = http_request_uri_without_query as uri_path
FIELDALIAS-haproxy_uri_query = http_request_query_string as uri_query
FIELDALIAS-status = status_code as status
FIELDALIAS-duration = active_time_of_request as duration
FIELDALIAS-bytes_out = bytes_uploaded as bytes_out
FIELDALIAS-src_port = client_port as src_port
FIELDALIAS-site = frontend_name as site
FIELDALIAS-dest_ip = server_ip as dest_ip
FIELDALIAS-dest_port = server_port as dest_port
EVAL-dest = if(match(server_name,"(<NOSRV>|<STATS>)"), null, server_name)
FIELDALIAS-feconn = feconn as  interface_connections
FIELDALIAS-beconn = beconn as vip_connections

FIELDALIAS-http_content_type = http_content_type_request as http_content_type
FIELDALIAS-category = http_content_type_request as category
EVAL-cookie = if(match(captured_response_cookie, "(.)+"), captured_response_cookie, captured_request_cookie)
EVAL-url = if(match(http_request_uri, "(^http)|(^HTTP)"),http_request_uri,if(ssl_version == "", "http://", "https://")."".http_host_request."".http_request_uri)
EVAL-url_length = len(if(match(http_request_uri, "(^http)|(^HTTP)"),http_request_uri,if(ssl_version == "", "http://", "https://")."".http_host_request."".http_request_uri))
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-bytes = bytes_in + bytes_out
EVAL-vendor_product = "Artica HAProxy"
EVAL-src_ip = if(match(x_forwarded_for, "(.)+"), x_forwarded_for, client_ip)
EVAL-src = if(match(x_forwarded_for, "(.)+"), x_forwarded_for, client_ip)
LOOKUP-haproxy_httpstatus_lookup = haproxy_httpstatus_lookup status OUTPUT status_description AS action status_type

#%{+Q}o client_ip=%ci client_port=%cp datetime_of_request=[%tr] frontend_name_transport=%ft backend_name=%b server_name=%s time_to_receive_full_request=%TR Tw=%Tw Tc=%Tc response_time=%Tr active_time_of_request=%Ta status_code=%ST bytes_read=%B captured_request_cookie=%CC captured_response_cookie=%CS termination_state_with_cookie_status=%tsc actconn=%ac feconn=%fc beconn=%bc srv_conn=%sc retries=%rc srv_queue=%sq backend_queue=%bq captured_request_headers_default_style=%hr captured_response_headers_default_style=%hs server_ip=%si server_port=%sp frontend_name=%f http_method=%HM http_request_uri_without_query=%HP http_request_query_string=%HQ http_request_uri=%HU bytes_uploaded=%U ssl_ciphers=%sslc ssl_version=%sslv

