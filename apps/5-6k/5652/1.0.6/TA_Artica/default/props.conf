FIELDALIAS-rtt = Ta as rtt
FIELDALIAS-feconn = feconn as  interface_connections
FIELDALIAS-beconn = beconn as vip_connections
FIELDALIAS-hacluster_http_status = status_code as response_code
EVAL-vendor = "HACluster"


[artica:hacluster:splunk:http]
SHOULD_LINEMERGE = false
pulldown_type = true
category = Network & Security
description = HACluster Custom HTTP log
# For Load Balancing on UF
EVENT_BREAKER_ENABLE = true
REPORT-hacluster_http_extract = hacluster_process_prefix
REPORT-hacluster_http_splunk_headers_extract = hacluster_http_splunk_request_headers, hacluster_http_splunk_response_headers
KV_MODE = auto
FIELDALIAS-hacluster_bytes_in = bytes_read as bytes_in
FIELDALIAS-hacluster_uri_path = http_request_uri_without_query as uri_path
FIELDALIAS-hacluster_uri_query = http_request_query_string as uri_query
FIELDALIAS-status = status_code as status
FIELDALIAS-duration = active_time_of_request as duration
FIELDALIAS-bytes_out = bytes_uploaded as bytes_out
FIELDALIAS-src_port = client_port as src_port
FIELDALIAS-site = frontend_name as site
FIELDALIAS-dest_ip = server_ip as dest_ip
FIELDALIAS-dest_port = server_port as dest_port
EVAL-dest = if(match(server_name,"(<NOSRV>|<STATS>)"), null, server_name)
FIELDALIAS-feconn = feconn as  interface_connections
FIELDALIAS-beconn = beconn as vip_connections

FIELDALIAS-http_content_type = http_content_type_request as http_content_type
FIELDALIAS-category = http_content_type_request as category
EVAL-cookie = if(match(captured_response_cookie, "(.)+"), captured_response_cookie, captured_request_cookie)
EVAL-url = if(match(http_request_uri, "(^http)|(^HTTP)"),http_request_uri,if(ssl_version == "", "http://", "https://")."".http_host_request."".http_request_uri)
EVAL-url_length = len(if(match(http_request_uri, "(^http)|(^HTTP)"),http_request_uri,if(ssl_version == "", "http://", "https://")."".http_host_request."".http_request_uri))
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-bytes = bytes_in + bytes_out
EVAL-vendor_product = "Artica HACluster"
EVAL-src_ip = if(match(x_forwarded_for, "(.)+"), x_forwarded_for, client_ip)
EVAL-src = if(match(x_forwarded_for, "(.)+"), x_forwarded_for, client_ip)
LOOKUP-hacluster_httpstatus_lookup = hacluster_httpstatus_lookup status OUTPUT status_description AS action status_type

#%{+Q}o client_ip=%ci client_port=%cp datetime_of_request=[%tr] frontend_name_transport=%ft backend_name=%b server_name=%s time_to_receive_full_request=%TR Tw=%Tw Tc=%Tc response_time=%Tr active_time_of_request=%Ta status_code=%ST bytes_read=%B captured_request_cookie=%CC captured_response_cookie=%CS termination_state_with_cookie_status=%tsc actconn=%ac feconn=%fc beconn=%bc srv_conn=%sc retries=%rc srv_queue=%sq backend_queue=%bq captured_request_headers_default_style=%hr captured_response_headers_default_style=%hs server_ip=%si server_port=%sp frontend_name=%f http_method=%HM http_request_uri_without_query=%HP http_request_query_string=%HQ http_request_uri=%HU bytes_uploaded=%U ssl_ciphers=%sslc ssl_version=%sslv

## Props Artica Firewall
[artica:firewall]
TRANSFORMS-iptables_sourcetyper    = iptables_ufw_sourcetyper, iptables_firewalld_sourcetyper
FIELDALIAS-iptables_dest           = DST AS dest
FIELDALIAS-iptables_dest_port      = DPT AS dest_port
FIELDALIAS-iptables_dest_ip        = DST AS dest_ip
FIELDALIAS-iptables_dvc            = host AS dvc
FIELDALIAS-iptables_dvc_host       = host AS dvc_host
FIELDALIAS-iptables_session_id     = ID AS session_id
FIELDALIAS-iptables_dest_interface = IN AS dest_interface
FIELDALIAS-iptabels_src            = SRC AS src
FIELDALIAS-iptabels_src_interface  = OUT AS src_interface
FIELDALIAS-iptabels_src_ip         = SRC AS src_ip
FIELDALIAS-iptables_src_port       = SPT AS src_port
FIELDALIAS-iptabels_tos            = TOS AS tos
FIELDALIAS-iptabels_ttl            = TTL AS ttl
FIELDALIAS-iptabels_icmp_type      = TYPE as icmp_type
EVAL-direction                     = if(isnotnull(IN),"inbound","outbound")
EVAL-vendor_product                = "Artica Firewall"
EVAL-protocol                      = "ip"
REPORT-iptables_log_prefix         = iptables_log_prefix
REPORT-iptables_mac                = iptables_mac
REPORT-iptables_flags              = iptables_flags
REPORT-iptables_tcp_flag           = iptables_tcp_flag
LOOKUP-iptables_action             = iptables_action_lookup log_prefix OUTPUTNEW action
LOOKUP-iptables_icmp_codes         = iptables_icmp_codes_lookup TYPE OUTPUTNEW icmp_code
LOOKUP-iptables_transport          = iptables_transport_lookup PROTO OUTPUTNEW transport
LOOKUP-iptables_frame_type         = iptables_frame_type_lookup FRAME_TYPE OUTPUTNEW frame_description

