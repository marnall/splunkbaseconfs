[source::...ta-menlo-security-add-on-for-splunk*.log*]
sourcetype = tamenlosecurityaddonforsplunk:log

[source::...ta_menlo_security_add_on_for_splunk*.log*]
sourcetype = tamenlosecurityaddonforsplunk:log

[menlosecurity:json]
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3QZ
TIME_PREFIX = event_time
TZ = UTC
category = Splunk App Add-on Builder
pulldown_type = 1

[menlosecurity:web:json]
EVAL-dest = split(dst,",")
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-url_length = len(url)
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_1 = pe_action AS action
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_10 = response_code AS status
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_11 = userid AS user
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_12 = product AS vendor_product
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_2 = browser_and_version AS app
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_3 = categories AS category
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_4 = content-type AS http_content_type
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_5 = x-client-ip AS src
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_7 = request_type AS http_method
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_8 = referer AS http_referrer
FIELDALIAS-aob_gen_menlosecurity_web_json_alias_9 = user-agent AS http_user_agent
KV_MODE = json
REPORT-uri_path = uri_path
REPORT-uri_query = uri_query
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3QZ
TIME_PREFIX = event_time
TZ = UTC
pulldown_type = 1

[menlosecurity:audit:json]
EVAL-action = "success"
FIELDALIAS-aob_gen_menlosecurity_audit_json_alias_1 = product AS authentication_service
FIELDALIAS-aob_gen_menlosecurity_audit_json_alias_2 = uid AS user
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3QZ
TIME_PREFIX = event_time
TZ = UTC
pulldown_type = 1

