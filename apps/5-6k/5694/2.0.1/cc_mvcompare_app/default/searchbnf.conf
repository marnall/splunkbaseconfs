[mvcompare-command]
syntax = mvcompare (<mvcompare-options>)* <field-list>
shortdesc = The mvcompare command provides all intersection data between 2 fields.\
  The command takes 2 required options, 'mv_left' and 'mv_right'.\
  The fields must be a multivalue field or string that can be delimited.\
  'delim' is an option used to delimit strings. By default the command\
  is not case sensitive, this may be altered by controlling the 'case_sensitive' option.
example1 = ... | mvcompare mv_left=<field1> mv_right=<field2> 
example2 = ... | mvcompare delim="<string>" case_sensitive=<bool> mv_left=<field1> mv_right=<field2>
usage = public

[mvcompare-options]
syntax = mv_left=<field> | mv_right=<field> | case_sensitive=<bool> | delim="<string>"
