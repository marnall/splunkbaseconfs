[analytic_story://OT Asset Compromise]
category = OT Security
description = Data Historians and support workstations may provide access to other resources on the network by often running vulnerable products.
last_updated = 2025-01-16
maintainers = []
narrative = Data historians provide a method to view data from OT systems including values for flows, temperatures, and other sensor data.  At the same time, they often leverage outdated or potentially vulnerable products and are often leveraged to exploit OT systems.\
\
Support teams also leverage support workstations like engineering workstations to support critical system function.  Due to their critical nature they are often not well maintained and may be poorly patched or run vulnerable software components.\
\
These machines may be compromised in many traditional methods such as insecure share access, unpatched systems, and malware.  Compromising these assets can be leveraged to access other critical OT systems as poor internal access controls existing in many OT environment.
references = ["https://attack.mitre.org/techniques/T0862/", "https://attack.mitre.org/techniques/T1059/", "https://attack.mitre.org/techniques/T0810/", "https://attack.mitre.org/techniques/T0818/", "https://attack.mitre.org/techniques/T0873/", "https://attack.mitre.org/techniques/T0859/", "https://attack.mitre.org/techniques/T1078/"]
