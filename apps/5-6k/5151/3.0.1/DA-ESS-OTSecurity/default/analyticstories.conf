[analytic_story://Bypass of Physical Security Controls]
category = OT Security
description = OT environments often utilize physical security controls to protect critical assets, but adversaries can bypass many cyber controls with physical access.
last_updated = 2025-01-16
maintainers = []
narrative = In some OT environments physical access requires an individual to be certified before access can be granted on site.  Access to NERC CIP facilities require that individuals are certified and trained before working onsite.  This requires looking at local physical logins and correlating that with training records and identifies individuals with local access without the proper certifications.\
\
Removable media devices have been used to bypass security control and infect industrial control systems and should only be used when approved.\
\
Lastly, local logins can be monitored against security controls such as badge scans to ensure individuals have not bypassed physical security controls.
references = ["https://www.nerc.com/pa/Stand/Reliability%20Standards/CIP-006-6.pdf", "https://attack.mitre.org/techniques/T1092/", "https://attack.mitre.org/techniques/T0847/"]
searches = ["Access - OT - Access Granted For Uncertified Individual - Rule", "Access - OT - Suspicious Local Login After Denied Physical Access - Rule", "Endpoint - Unapproved Removable Media Usage - Rule"]
version = 1
disabled = 

