[setting:get_installedapps_datasources]
endpoint       = /services/data/macros/get_installedapps_datasources
label          = Applications Installed Filter
description    = This setting determines where the OT Security Add-on should search to find data about installed applications on host
attribute      = definition
attribute_type = string
link           = [/manager/$@namespace$/data/macros/get_installedapps_datasources?action=edit|Edit in manager]

[setting:get_backup_indexes]
endpoint       = /services/data/macros/get_backup_indexes
label          = Backup Data Filter
description    = This setting specifies what search filter should be used to identify backup logs
attribute      = definition
attribute_type = string
link           = [/manager/$@namespace$/data/macros/get_backup_indexes?action=edit|Edit in manager]

[setting:get_nvd_cve_index]
endpoint       = /services/data/macros/get_nvd_cve_index
