search = | tstats `summariesonly` count from datamodel=Authentication.Authentication \
    where Authentication.app="win:*" AND Authentication.src!="localhost" AND Authentication.user!="ANONYMOUS LOGON" \
    by _time,Authentication.dest,Authentication.src,Authentication.action,Authentication.user \
| `drop_dm_object_name("Authentication")` \
| eval app="rdp" \
| `get_asset_by("str", "dest")` \
| search dest_category="*ot*" action=success \
| eval dest=if(isnotnull(dest_nt_host), dest_nt_host, if(isnotnull(dest_ip), dest_ip, dest)) \
| append ```get vpn sessions``` \
    [| tstats `summariesonly` count from datamodel=Network_Sessions.All_Sessions \
        WHERE All_Sessions.tag="vpn"\
        by _time,All_Sessions.dest_ip,All_Sessions.src_ip,All_Sessions.user\
    | `drop_dm_object_name("All_Sessions")` \
    | eval dest=dest_ip\
    | `get_asset_by("str", dest)` \
    | eval dest=if(isnotnull(dest_nt_host), dest_nt_host, if(isnotnull(dest_ip), dest_ip, dest)), app="vpn" \
    | search dest_category="*ot*" \
    | fields _time,dest,user,app,dest_site_id ] \
| append ```get screen sharing sessions``` \
    [| tstats `summariesonly` count min(_time) as firstTime max(_time) as lastTime from datamodel=Endpoint.Processes \
        where (Processes.process=*mstsc.exe* OR Processes.process=*teamviewer* OR Processes.process=*vncclient*)\
        by _time,Processes.dest,Processes.process_name,Processes.user \
    | `drop_dm_object_name(Processes)` \
    | eval app=process_name \
    | `get_asset_by("str", dest)` \
    | eval dest=if(isnotnull(dest_nt_host), dest_nt_host, if(isnotnull(dest_ip), dest_ip, dest)) \
    | search dest_category="*ot*" \
    | sort -_time \
    | table _time,dest,user,app,dest_site_id ]\
    ``` convert to local hours ``` \
| table _time,dest,dest_site_id, user,app \
| eval utctime = strptime(_time, "%s") \
| search dest_site_id=* \
| lookup work_hours_by_site site_id as dest_site_id OUTPUT day_start_hour,day_end_hour,day_start_minute,day_end_minute,gm_offset \
| eval localtime=utctime - (gm_offset * 3600), local_hour=strftime(localtime, "%H"), local_minute=strftime(localtime, "%M") \
| eval is_before_normal_workhours=if(local_hour < day_start_hour OR (local_hour=day_start_hour AND local_minute < day_start_minute), 1, 0), \
    is_after_normal_workhours=if(local_hour > day_end_hour OR (local_hour=day_end_hour AND local_minute > day_end_minute), 1, 0) \
| search is_before_normal_workhours = 1 OR is_after_normal_workhours = 1 \
| eval minute=if(is_before_normal_workhours = 1, if(len(day_start_minute) < 2, "0" + day_start_minute, day_start_minute), \
    if(is_after_normal_workhours=1, if(len(day_end_minute) < 2, "0" + day_end_minute, day_end_minute), local_minute)) \
| eval description=if(is_before_normal_workhours = 1, "Activity before " + day_start_hour + ":" + minute + " (" + gm_offset + " UTC)", \
    if(is_after_normal_workhours = 1, "Active after " + day_end_hour + ":" + minute + " (" + gm_offset + " UTC)", "")) \
| sort -_time \
| table _time,dest,dest_site_id,user,app,description

