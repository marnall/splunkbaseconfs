    | search last_result=failure access_type="ingress" \
    | `get_identity(user, "identity")` \
    | eventstats count as badge_failures by user,location,site \
    | eval badge_time=_time \
    | fields login_identity,badge_time,location,site, badge_failures] \
| search badge_time=* \
| eval asset=if(isnotnull(dest_nt_host), dest_nt_host, if(isnotnull(dest_ip), dest_ip, dest)) \
| eventstats max(badge_time) as lastFailure max(_time) as _time sum(badge_failures) as failures values(location) as location values(asset) as dest by user,dest_site_id

