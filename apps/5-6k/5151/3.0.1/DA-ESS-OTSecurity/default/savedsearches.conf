search = | pivot Authentication Authentication count(Authentication) AS "Count of Authentication" SPLITROW action AS action SPLITROW dest AS dest SPLITROW _time AS _time PERIOD auto SPLITROW user AS user SPLITROW app AS app FILTER user isNot "ANONYMOUS LOGON" FILTER app is "*local*" \
