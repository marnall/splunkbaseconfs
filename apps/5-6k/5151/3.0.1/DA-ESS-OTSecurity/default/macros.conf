[normalize_assets]
definition = mvexpand src\
| mvexpand dest\
| eval src = `get_asset_name("src")`\
| eval dest = `get_asset_name("dest")`\
| eval dvc = `get_asset_name("dvc")`
iseval = 0

[get_normalized_alert_message]
definition = if((isnull(signature) OR signature=="unknown" OR signature=="null") AND isnotnull(short_message), short_message, signature) . if(isnotnull(src) AND src!="", if(src != dest, " from ", " on ") . src, "") . if(isnotnull(dest) AND dest!="" AND src!=dest, " to " . dest, "") . if(isnotnull(user) AND user!="", if(match(description, "(?i)account.*created"), ", account=", " by user=") . user, "")
iseval = 0

[get_normalized_severity]
definition = rex "\"severity\":\s+\"(?<extracted_severity>.*?)\""\
| eval severity = coalesce(severity, extracted_severity)\
| fields - extracted_severity\
| replace "Informational" with "informational", "Low" with "low", "Medium" with "medium", "High" with "high", "Very High" with "critical", "Critical" with "critical" in severity\
| rangemap field=severity informational=0.0-3.9 low=4.0-5.9 medium=6.0-7.9 high=8.0-9.9 critical=10.0-10.0 default=none\
| eval severity = if(range!="none", range, severity)\
| fields - range

