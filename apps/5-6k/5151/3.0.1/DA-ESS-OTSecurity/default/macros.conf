[prohibited_ot_network_traffic_allowed_filter]
definition = eval src=src_ip, dest=dest_ip\
| `get_asset_by("str", src)`\
| `get_asset_by("str", dest)`\
| fillnull src_category,dest_category value="unknown"\
|  `label_internal_ips(src_is_internal, src_ip)`\
|  `label_internal_ips(dest_is_internal, dest_ip)`\
| eval src_category=if(match(src_category, ".*ot.*"), "ot", if(src_is_internal="true", "internal", "external")), dest_category=if(match(dest_category, ".*ot.*"), "ot", if(dest_is_internal="true", "internal", "external"))\
| search `ot_identifier(src_category)` OR `ot_identifier(dest_category)`\
| dedup src,dest,src_category,dest_category,dest_port,action,app\
| lookup prohibited_traffic_lookup_by_category dest_port src_category dest_category OUTPUT is_prohibited, note\
| search is_prohibited=true
iseval = 0

