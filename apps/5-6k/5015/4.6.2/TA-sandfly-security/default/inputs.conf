[sandfly_alarms]
start_by_shell = false
python.version = python3
sourcetype = sandfly:alarms
interval = 600
sandfly_results = ['alert', 'pass', 'error']
enable_ssl_verification = True
test_mode = False
disabled = 0

[sandfly_ssh_keys]
start_by_shell = false
python.version = python3
sourcetype = sandfly:ssh:keys
interval = 3600
enable_ssl_verification = True
disabled = 0

[sandfly_hosts]
start_by_shell = false
python.version = python3
sourcetype = sandfly:hosts
interval = 3600
enable_ssl_verification = True
create_csv_lookup_files = True
disabled = 0

[sandfly_sandflies]
start_by_shell = false
python.version = python3
sourcetype = sandfly:sandflies
interval = 3600
enable_ssl_verification = True
disabled = 0

[sandfly_audit_logs]
start_by_shell = false
python.version = python3
sourcetype = sandfly:logs:audit
interval = 300
enable_ssl_verification = True
disabled = 0

[sandfly_error_logs]
start_by_shell = false
python.version = python3
sourcetype = sandfly:logs:error
interval = 900
enable_ssl_verification = True
disabled = 0

