[source::...ta-sandfly-security*.log*]
sourcetype = tasandflysecurity:log

[source::...ta_sandfly_security*.log*]
sourcetype = tasandflysecurity:log

[sandfly:hosts]
EVAL-vendor_product = Sandfly Security
FIELDALIAS-aob_gen_sandfly_hosts_alias_1 = host_summary.os_info_os_release_pretty_name AS os
FIELDALIAS-aob_gen_sandfly_hosts_alias_2 = host_summary.active AS enabled
FIELDALIAS-aob_gen_sandfly_hosts_alias_3 = host_summary.os_info_arch AS family
FIELDALIAS-aob_gen_sandfly_hosts_alias_4 = host_summary.os_hardware_cpu_cores AS cpu_cores
FIELDALIAS-aob_gen_sandfly_hosts_alias_5 = host_summary.os_hardware_cpu_mhz AS cpu_mhz
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp":
TRUNCATE = 250000
category = Splunk App Add-on Builder
pulldown_type = 1

[sandfly:sandflies]
FIELDALIAS-aob_gen_sandfly_sandflies_alias_1 = sandfly_info.id AS sandfly_id
FIELDALIAS-aob_gen_sandfly_sandflies_alias_2 = sandfly_info.name AS sandfly_name
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp":
TRUNCATE = 250000
category = Splunk App Add-on Builder
pulldown_type = 1

[sandfly:logs:error]
EVAL-vendor_product = "Sandfly Agentless Linux Security"
FIELDALIAS-aob_gen_sandfly_logs_error_alias_1 = error_log.header.ip_addr AS ip_addr
FIELDALIAS-aob_gen_sandfly_logs_error_alias_2 = error_log.header.hostname AS host_name
FIELDALIAS-aob_gen_sandfly_logs_error_alias_3 = error_log.ip_addr AS ip_addr
FIELDALIAS-aob_gen_sandfly_logs_error_alias_4 = error_log.hostname AS host_name
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp":
category = Splunk App Add-on Builder
pulldown_type = 1

[sandfly:logs:audit]
EVAL-vendor_product = "Sandfly Agentless Linux Security"
FIELDALIAS-aob_gen_sandfly_logs_audit_alias_1 = audit_log.username AS user
FIELDALIAS-aob_gen_sandfly_logs_audit_alias_2 = audit_log.ip_addr AS ip_addr
FIELDALIAS-aob_gen_sandfly_logs_audit_alias_3 = audit_log.ip_addr AS src_ip
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp":
category = Splunk App Add-on Builder
pulldown_type = 1

[sandfly:ssh:keys]
FIELDALIAS-aob_gen_sandfly_ssh_keys_alias_1 = ssh_key_details.friendly_name AS ssh_key_friendly_name
FIELDALIAS-aob_gen_sandfly_ssh_keys_alias_10 = ssh_host_details.host_id AS ssh_key_host_id
FIELDALIAS-aob_gen_sandfly_ssh_keys_alias_11 = ssh_host_details.node_name AS ssh_key_node_name
FIELDALIAS-aob_gen_sandfly_ssh_keys_alias_12 = ssh_zone_details.id AS ssh_key_zone_id
FIELDALIAS-aob_gen_sandfly_ssh_keys_alias_13 = ssh_zone_details.name AS ssh_key_zone_name
FIELDALIAS-aob_gen_sandfly_ssh_keys_alias_2 = ssh_key_details.key_type AS ssh_key_type
FIELDALIAS-aob_gen_sandfly_ssh_keys_alias_3 = ssh_key_details.hash.sha512 AS ssh_key_sha512
FIELDALIAS-aob_gen_sandfly_ssh_keys_alias_9 = ssh_user_details.username AS ssh_key_username
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp":
TRUNCATE = 250000
category = Splunk App Add-on Builder
pulldown_type = 1

[sandfly:whitelist]
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp":
category = Splunk App Add-on Builder
pulldown_type = 1

[sandfly:alarms]
EVAL-vendor_product = "Sandfly Agentless Linux Security"
FIELDALIAS-aob_gen_sandfly_alarms_alias_10 = data.results.user.username AS user
FIELDALIAS-aob_gen_sandfly_alarms_alias_11 = data.name AS sandfly_id
FIELDALIAS-aob_gen_sandfly_alarms_alias_12 = data.results.process.ppid AS parent_process_id
FIELDALIAS-aob_gen_sandfly_alarms_alias_13 = data.results.process.name AS process_name
FIELDALIAS-aob_gen_sandfly_alarms_alias_14 = data.results.process.cwd AS process_current_directory
FIELDALIAS-aob_gen_sandfly_alarms_alias_16 = data.results.process.path AS process_path
FIELDALIAS-aob_gen_sandfly_alarms_alias_17 = data.results.process.uid AS user_id
FIELDALIAS-aob_gen_sandfly_alarms_alias_18 = data.results.process.name AS process_exec
FIELDALIAS-aob_gen_sandfly_alarms_alias_19 = header.hostname AS dest
FIELDALIAS-aob_gen_sandfly_alarms_alias_2 = data.results.file.date.accessed AS file_access_time
FIELDALIAS-aob_gen_sandfly_alarms_alias_20 = data.results.process.cmdline AS process
FIELDALIAS-aob_gen_sandfly_alarms_alias_21 = data.engine AS sandfly_engine
FIELDALIAS-aob_gen_sandfly_alarms_alias_22 = data.results.explanation AS sandfly_info
FIELDALIAS-aob_gen_sandfly_alarms_alias_23 = data.pid AS process_id
FIELDALIAS-aob_gen_sandfly_alarms_alias_3 = data.results.file.date.created AS file_create_time
FIELDALIAS-aob_gen_sandfly_alarms_alias_30 = data.status AS sandfly_status
FIELDALIAS-aob_gen_sandfly_alarms_alias_31 = data.results.user.uid AS user_id
FIELDALIAS-aob_gen_sandfly_alarms_alias_32 = data.results.user.shell AS shell
FIELDALIAS-aob_gen_sandfly_alarms_alias_33 = data.status_msg AS sandfly_status_msg
FIELDALIAS-aob_gen_sandfly_alarms_alias_4 = data.results.file.date.modified AS file_modify_time
FIELDALIAS-aob_gen_sandfly_alarms_alias_5 = data.results.process.pid AS process_id
FIELDALIAS-aob_gen_sandfly_alarms_alias_6 = data.results.file.name AS file_name
FIELDALIAS-aob_gen_sandfly_alarms_alias_7 = data.results.file.path AS file_path
FIELDALIAS-aob_gen_sandfly_alarms_alias_8 = data.results.file.hash.sha1 AS file_hash
FIELDALIAS-aob_gen_sandfly_alarms_alias_9 = data.results.file.size AS file_size
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 0
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp":
TRUNCATE = 250000
category = Splunk App Add-on Builder
pulldown_type = 1

