[Report - Not Ready for Next Call]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.statistics.format.0 = number
display.statistics.format.0.field = Duration (s)
display.statistics.format.0.precision = 0
display.statistics.format.0.unit = (s)
display.statistics.format.0.useThousandSeparators = 0
display.statistics.overlay = heatmap
display.visualizations.chartHeight = 1068
display.visualizations.charting.axisTitleX.visibility = collapsed
display.visualizations.charting.axisTitleY.visibility = collapsed
display.visualizations.charting.axisTitleY2.visibility = collapsed
display.visualizations.charting.chart.nullValueMode = connect
display.visualizations.charting.legend.placement = none
display.visualizations.show = 0
display.visualizations.trellis.enabled = 1
display.visualizations.trellis.size = small
request.ui_dispatch_app = contact_center_analytics
request.ui_dispatch_view = search
search = eventtype="Agent Login" NotReadyForNextCall \
| rex field=Current_Status "(?<Status>^\w+)\s\((?<Status_Duration>\d{1,2}:\d{1,2}:\d{1,2})" \
| convert dur2sec(Status_Duration) AS Status_Duration\
| search Status_Duration>=1800\
| stats max(Status_Duration) as "Not Ready Duration (s)" by Object_Name\
| sort - "Not Ready Duration (s)"\
| eval "Not Ready Duration (HH:MM:SS)"=tostring('Not Ready Duration (s)', "duration")
workload_pool = undefined
