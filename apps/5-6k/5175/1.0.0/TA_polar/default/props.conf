[polar:physical]
TRUNCATE = 0
KV_MODE=none
INDEXED_EXTRACTIONS=JSON
SHOULD_LINEMERGE=false
TIMESTAMP_FIELDS = created
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N

[polar:activity]
TRUNCATE = 0
KV_MODE=none
INDEXED_EXTRACTIONS=JSON
SHOULD_LINEMERGE=false
TIMESTAMP_FIELDS = created
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
FIELDALIAS-steps = active-steps AS steps

[polar:exercise]
TRUNCATE = 0
KV_MODE=none
INDEXED_EXTRACTIONS=JSON
SHOULD_LINEMERGE=false
TIMESTAMP_FIELDS = start-time
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N

[polar:exercise:tcx]
KV_MODE = xml
LINE_BREAKER = ()(<Trackpoint)
MAX_DAYS_AGO = 4000
MAX_TIMESTAMP_LOOKAHEAD = 23
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
TIME_PREFIX = <Id>|<Time>
TZ = UTC
SEDCMD-removexlmns = s/(\sxmlns.+?)(?=>)//g

[polar:recharge]
TRUNCATE = 0
KV_MODE=none
INDEXED_EXTRACTIONS=JSON
SHOULD_LINEMERGE=false
TIMESTAMP_FIELDS = date
TIME_FORMAT = %Y-%m-%d
FIELDALIAS-restingHeartRate = heart_rate_avg AS restingHeartRate

[polar:sleep]
TRUNCATE = 0
KV_MODE=none
INDEXED_EXTRACTIONS=JSON
SHOULD_LINEMERGE=false
TIMESTAMP_FIELDS = sleep_end_time
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%:z
EVAL-sleepDuration = deep_sleep + light_sleep + rem_sleep

[source::...ta_polar.log*]
sourcetype = ta_polar:log