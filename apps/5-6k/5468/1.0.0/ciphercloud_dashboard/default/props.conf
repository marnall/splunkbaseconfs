[ciphercloud_dlp]
DATETIME_CONFIG = 
FIELDALIAS-appName = appName AS app
FIELDALIAS-contentName = contentName AS object
FIELDALIAS-contentUrl = contentURL AS object_path
FIELDALIAS-deviceOs = deviceOs AS os
FIELDALIAS-deviceStatus = deviceStatus AS status
FIELDALIAS-sourceEndpointIp = sourceEndpointIpaddress AS src_ip
