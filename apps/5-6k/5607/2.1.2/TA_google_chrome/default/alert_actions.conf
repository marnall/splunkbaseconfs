[move_ou_alert_action]
is_custom = 1
label = Google Chrome - Move to OU
description = When alert is triggered, moves managed browser or user to the specified Organizational Unit.
icon_path = appIcon.png
payload_format = json
python.version = python3
param.directory_device_id = $result.directory_device_id$
param.device_id = $result.device_id$
param.profile_user = $result.profile_user$
param.event = $result.event$

[block_extension_alert_action]
is_custom = 1
label = Google Chrome - Block Extension
description = When alert is triggered, blocks extension in the selected Organizational Unit.
icon_path = appIcon.png
payload_format = json
python.version = python3
param.extension_id = $result.extension_id$
param.extension_name = $result.extension_name$
param.event = $result.event$

[get_extension_alert_action]
is_custom = 1
label = Google Chrome - Get Extension Install Details
description = When alert is triggered, gets additional details about extension.
icon_path = appIcon.png
payload_format = json
python.version = python3
param.device_id = $result.device_id$
param.extension_id = $result.extension_id$
param.extension_name = $result.extension_name$
param.time = $result.time$

