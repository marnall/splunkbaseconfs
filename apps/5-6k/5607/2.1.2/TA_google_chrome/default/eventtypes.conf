# Chrome Browser events

[extension_install]
search = event = "browserExtensionInstallEvent"

[browser_crash]
search = event = "browserCrashEvent"

[unsafe_site_visit]
search = event = "badNavigationEvent"

[malware_transfer]
search = event = "dangerousDownloadEvent"

[password_reuse]
search = event = "passwordReuseEvent"

[password_change]
search = event = "passwordChangedEvent"

[login]
search = event = "loginEvent"

[content_transfer]
search = event = "contentTransferEvent"

[sensitive_data_transfer]
search = event = "sensitiveDataEvent"

[content_unscanned]
search = event = "unscannedFileEvent"

[password_breach]
search = event = "passwordBreachEvent"

# Chrome OS events

[chromeos_login_failure]
search = event = "CHROME_OS_LOGIN_FAILURE_EVENT"

[chromeos_login_success]
search = event = "CHROME_OS_LOGIN_EVENT"

[chromeos_logout]
search = event = "CHROME_OS_LOGOUT_EVENT"

[chromeos_user_added]
search = event = "CHROME_OS_ADD_USER"

[chromeos_user_removed]
search = event = "CHROME_OS_REMOVE_USER"

[chromeos_usb_device_added]
search = event = "CHROMEOS_PERIPHERAL_ADDED"

[chromeos_usb_device_removed]
search = event = "CHROMEOS_PERIPHERAL_REMOVED"

[chromeos_usb_status_change]
search = event = "CHROMEOS_PERIPHERAL_STATUS_UPDATED"

[chromeos_crd_host_started]
search = event = "CHROME_OS_CRD_HOST_STARTED"

[chromeos_crd_client_connected]
search = event = "CHROME_OS_CRD_CLIENT_CONNECTED"

[chromeos_crd_client_disconnected]
search = event = "CHROME_OS_CRD_CLIENT_DISCONNECTED"

[chromeos_crd_host_stopped]
search = event = "CHROME_OS_CRD_HOST_ENDED"

[data_access_control]
search = event = "dataAccessControlEvent"