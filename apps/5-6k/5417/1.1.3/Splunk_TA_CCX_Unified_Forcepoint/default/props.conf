##Local(Server) Email Security##
[forcepoint:local:email:security]
category = Email
description = Output syslog produced by Forcepoint Local Email Security Server 
pulldown_type = true
KV_MODE = none
SHOULD_LINEMERGE = false
TIME_PREFIX = rt=
MAX_TIMESTAMP_LOOKAHEAD = 256

##Extractions##
REPORT-extract_forcepoint_local_email = forcepoint_local_email_extract, forcepoint_local_email_cs1_virus, forcepoint_local_email_stz_recipient, forcepoint_local_email_stz_sender, forcepoint_local_email_stz_orig_recipient, forcepoint_local_email_stz_cc, forcepoint_local_email_stz_return_addr, forcepoint_local_email_fnameandfilehash_split, forcepoint_local_email_url_split

##Automatic Lookups##
LOOKUP-forcepoint_local_email_actions = forcepoint_local_email_actions_lookup event act OUTPUT action
LOOKUP-forcepoint_local_email_policy_filter_actions = forcepoint_local_email_policy_filter_actions_lookup event act OUTPUT filter_action

##Fields##
FIELDALIAS-message_id = messageId AS message_id
FIELDALIAS-dest = dst AS dest
FIELDALIAS-email_size = in AS size
FIELDALIAS-src_for_message = trueSrc AS src
FIELDALIAS-subject_for_message = msg AS subject
FIELDALIAS-status_code = deliveryCode AS status_code
FIELDALIAS-src_user = suser AS src_user
FIELDALIAS-detectionMethod = cat AS detectionMethod
FIELDALIAS-rule = viceProcessName AS rule
FIELDALIAS-policy = deviceFacility AS policy
FIELDALIAS-exceptionreason_signature_extra = exceptionReason AS signature_extra
FIELDALIAS-reason_signature_extra = reason AS signature_extra

EVAL-vendor_product = "Forcepoint:Email Security"
EVAL-process = if(isnotnull('x_mailer'),'x_mailer',unknown) 
EVAL-process = if(isnotnull('x_mailer'),'x_mailer',unknown)
EVAL-user = case(match(deviceDirection,"0"), 'duser', deviceDirection=="1", 'suser')
EVAL-direction = case(match(deviceDirection,"0"), "inbound", deviceDirection=="1", "outbound")
EVAL-signature = if(isnotnull('cs1'),'cs1','deviceProcessName')

##Sourcetype support for backward compatibility##
[forcepointemail:sec]
rename = forcepoint:local:email:security

##Cloud Email Security##
[forcepoint:cloud:email:security]
category = Email
description = Output csv produced by Forcepoint Email Security Cloud
pulldown_type= true
KV_MODE = none
TIME_PREFIX = ^"
TIME_FORMAT = %Y/%m/%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
LINE_BREAKER = (\n)
EVENT_BREAKER = (\n)
TRUNCATE = 99999
TZ = UTC
TRANSFORMS-remove_header = remove_forcepoint_header_csv

##Extractions##
REPORT-extract_forcepoint_cloud_email = extract_forcepoint_cloud_email_csv

##Automatic Lookups##
LOOKUP-forcepoint_cloud_email_actions_lookup = forcepoint_cloud_email_actions_lookup vendor_action OUTPUT action

##Fields##
FIELDALIAS-filter_score = spam_score AS filter_score
FIELDALIAS-size = message_size as size
FIELDALIAS-duration = filtering_time as duration
FIELDALIAS-src = sender_ip as src
FIELDALIAS-src_user = sender as src_user
FIELDALIAS-category = filtering_reason as category

EVAL-attachment_size = split(attachment_size,",")
EVAL-file_hash = split(file_hash,",")
EVAL-file_name = if(mvdedup(split(x_file_name,","))=="None",null(),split(x_file_name,","))
EVAL-file_size = if((split(attachment_size,","))=="0",null(),split(attachment_size,","))
EVAL-file_type = split(file_type,",")
EVAL-duration = if(duration=="None","0",'duration')
EVAL-user = case(direction=="Inbound", 'recipient', direction=="Outbound", 'sender')
EVAL-x_emb_category = split(x_emb_category,",")
EVAL-content_type = split(content_type,",")
EVAL-mime_type = split(mime_type,",")
EVAL-x_emb_url = split(x_emb_url,",")
EVAL-url = if((x_emb_url=="None"),null(),split(x_emb_url,","))
EVAL-signature = if('virus_name'=="None",'filtering_reason','virus_name')
EVAL-file_size = if((split(attachment_size,","))=="0",null(),split(attachment_size,","))
EVAL-vendor_product = "Forcepoint:Cloud:Email:Security"
EVAL-protocol = "smtp"
EVAL-xref = if(match(black_whitelisted,"^Blacklisted|Whitelisted"), lower('black_whitelisted'), null())

##Sourcetype support for backward compatibility##
[forcepointemail:csv]
rename = forcepoint:cloud:email:security

##Web Security##
[forcepoint:web:security]
TIME_FORMAT=%b %d %T %Z
KV_MODE=none
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true

##Extractions##
REPORT-forcepoint_web_extractions = forcepoint_web_keys,forcepoint_web_x_file_name,sourceServer_for_forcepoint_web,OU_for_forcepoint_web,CN_for_forcepoint_web,DC_for_forcepoint_web,policy_for_forcepoint_web,http_content_type_for_forcepoint_web,url_for_forcepoint_web

##Fields##
EVAL-http_content_type = if(http_content_type == "-", null(), split(replace(http_content_type,"\_" , ""),";"))
EVAL-policy            = if(vendor_policy == "-", null(), split(vendor_policy,","))
EVAL-user              = if(match('user',"^LDAP://*") AND loginID !="-",'loginID',if(match('user',"-") AND loginID="-", null(),replace(_raw,".*DC\\\=(\w+\/)?(.*)\sloginID=.*","\2")))
EVAL-action            = if(action == "-", null(), action)
EVAL-src_host          = if(src_host == "-", null(), src_host)
EVAL-dst_host          = if(dst_host == "-", null(), dst_host)
EVAL-bytes_in          = if(bytes_in == "-", null(), bytes_in)
EVAL-bytes_out         = if(bytes_out == "-", null(), bytes_out)
EVAL-http_response     = if(http_response == "-", null(), http_response)
EVAL-http_method       = if(http_method == "-", null(), http_method)
EVAL-http_user_agent   = if(http_user_agent == "-", null(), http_user_agent)
EVAL-http_proxy_status_code = if(http_proxy_status_code == "-", null(), http_proxy_status_code)
EVAL-reason            = if(reason == "-", null(), replace(reason,"\'" , ""))
EVAL-disposition       = if(disposition == "-", null(), disposition)
EVAL-role              = if(role == "-", null(), role)
EVAL-duration          = if(duration == "-", null(), duration)
EVAL-url               = if(url == "-", null(), url)
EVAL-vendor_action     = if(action == "-", null(), action)
EVAL-category_id       = if(category == "-", null(), category)
EVAL-severity_id       = if(severity == "-", null(), severity)
EVAL-disposition_id    = if(disposition == "-", null(), disposition)
EVAL-app               = "Forcepoint:Web"
EVAL-bytes             = bytes_in + bytes_out
EVAL-dest              = if(dst_ip == "-", null(), dst_ip)
EVAL-dest_port         = if(dst_port == "-", null(), dst_port)
EVAL-src               = coalesce(if(src_host == "-", null(), src_host), if(src_ip == "-", null(), src_ip))
EVAL-http_user_agent_length = len(if(http_user_agent == "-", null(), http_user_agent))
EVAL-url_length        = len(if(url == "-", null(), url))
EVAL-vendor_product    = "Forcepoint:Web:".product
EVAL-status            = if(http_response == "-" or http_response == "0", null(), http_response)
EVAL-dest_host         = if(dst_host == "-", null(), dst_host)
EVAL-dest_ip           = if(dst_ip == "-", null(), dst_ip)
EVAL-dest_nt_host      = if(dst_host == "-", null(), dst_host)
EVAL-src_nt_host       = if(src_host == "-", null(), src_host)
EVAL-dvc               = if('sourceServer'=="-", "Cloud:Hybrid", 'sourceServer')
EVAL-ids_type          = ""+tostring('logRecordSource').":"+tostring(vendor).":Web:"+tostring(product)
EVAL-signature         = if(vendor_policy == "-", null(), split(vendor_policy,","))
EVAL-file_name         = 'x_file_name'

##Automatic Lookups##
LOOKUP-severity_for_forcepoint_web = forcepoint_web_severity_lookup severity_id OUTPUT severity
LOOKUP-action_for_forcepoint_web = forcepoint_web_action_lookup vendor_action OUTPUT action
LOOKUP-http_status = forcepoint_web_http_status_lookup status OUTPUT status_description
LOOKUP-forcepoint_web_categories = forcepoint_web_categories_lookup category_id OUTPUT parent_category as filter_category child_category as category

##Sourcetype support for backward compatibility##
[websense:cg:kv]
rename = forcepoint:web:security

## Forcepoint DLP ##
[forcepoint:dlp]
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 25
TIME_PREFIX = timeStamp=
disabled = false
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1
REPORT-forcepoint_category_dlp = forcepoint_category_dlp
REPORT-forcepoint_x_file_name_dlp = forcepoint_x_file_name_dlp
REPORT-ccx_forcepoint_dlp = ccx_forcepoint_dlp_kv

FIELDALIAS-action = act AS action
FIELDALIAS-dest = destinationHosts AS dest
FIELDALIAS-dvc = sourceHost AS dvc
FIELDALIAS-object = msg AS object
FIELDALIAS-object_category = sourceServiceName AS object_category
FIELDALIAS-signature = sourceServiceName AS signature
FIELDALIAS-src = sourceHost AS src

EVAL-app = if(match(analyzedBy, "  "),"Forcepoint: " + replace(analyzedBy, "(.+)\s{2}.+", "\1"), analyzedBy)
EVAL-dlp_type = if(match(analyzedBy, " "),replace(analyzedBy, "(.+)\s{2}.+", "\1"), analyzedBy)
EVAL-file_name = if(x_file_name=="N/A", null(), replace(x_file_name, "(?<file_name>.*).*\s[-].+", "\1"))
EVAL-file_size = case(x_file_name=="N/A", null(), like(x_file_name, "%-%"), replace(x_file_name, ".+\s[-]\s(?<file_size>.+)", "\1"), 1==1, "0")
EVAL-src_ip = if(sourceIp=="N/A", null(), sourceIp)
EVAL-src_user = if(match(loginName, "^.*\\\\*"), replace(loginName, "\\\\(.)","\1"), loginName)
EVAL-object_path = if(x_file_name=="N/A", null(), replace(x_file_name, "(?<file_name>.*).*\s[-].+", "\1"))
EVAL-severity = lower(severityType)
EVAL-user = 'suser'
