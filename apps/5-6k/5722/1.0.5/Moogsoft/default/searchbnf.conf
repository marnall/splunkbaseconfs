[moogsoft-command]
syntax = moogsoft severity=<severity>
usage = public
description = Deprecated Streaming command to push search results to Moogsoft Cloud or Moogsoft Enterprise

[moogsoftevent-command]
syntax = moogsoftevent severity=<severity>
usage = public
description = Streaming command to push search results to Moogsoft Cloud or Moogsoft Enterprise

[addmoogsoftevent-command]
syntax = addmoogsoftevent 
usage = public
description = Command to add Moogsoft alert action to all the saved searches

[removemoogsoftevent-command]
syntax = removemoogsoftevent 
usage = public
description = Command to remove Moogsoft alert action from all the saved searches
