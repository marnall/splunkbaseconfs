#
# Splunk app configuration file
#
[install]
is_configured = 0

[launcher]
author = Moogsoft
version = 1.0.5
description = Splunk App to allow search results to be streamed to Moogsoft Observability Cloud or Moogsoft Enterprise

[ui]
setup_view = setup_page_dashboard
label = Moogsoft
is_visible = 1
show_in_nav = 1
docs_section_override = AddOns:released

[package]
id = Moogsoft

[triggers]
reload.moogsoft = simple
reload.passwords = simple