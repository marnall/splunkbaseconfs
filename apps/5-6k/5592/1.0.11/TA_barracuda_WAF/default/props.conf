[barracuda_waf_syslog]
TRANSFORMS-x = st-access, st-audit, st-firewall, st-system, st-nw_firewall
TRANSFORMS-null = setnull
DATETIME_CONFIG = CURRENT

[access]
REPORT-w = access_logs
KV_MODE = none
SHOULD_LINEMERGE = False
EVAL-bytes = bytes_received+bytes_sent
EVAL-bytes_in = bytes_received
EVAL-bytes_out = bytes_sent
EVAL-dest = host_name
EVAL-dest_port = app_port
EVAL-app = app_ip
EVAL-site = app_ip
EVAL-src = client_ip
EVAL-status = HTTP_Status
EVAL-url_domain = host_name
EVAL-uri_path = URL
EVAL-uri_query = URL
EVAL-url = URL
EVAL-vendor_product = unit_name
EVAL-http_method = method
EVAL-duration = time_taken

[audit]
REPORT-b = audit_logs
KV_MODE = none
SHOULD_LINEMERGE = False

[firewall]
REPORT-y = firewall_logs
KV_MODE = none
SHOULD_LINEMERGE = False
EVAL-action = case(action_taken=="REDIRECT" OR action_taken== "DENY" OR action_taken== "BLOCK","blocked",1=1,"allowed")
EVAL-dest = app_ip
EVAL-dest_port = app_port
EVAL-dvc = host
EVAL-ids_type = "application"
EVAL-severity = case(severity_level=="Emergency" OR severity_level== "Alert" OR severity_level== "Critical","critical",severity_level== "Error","h
igh",severity_level== "Warning","medium",severity_level== "Notice","low",severity_level== "Information","Infromational",severity_level== "Debug","
Debug",1=1,"medium")
EVAL-signature = Attack_Description
EVAL-src = client_ip
EVAL-src_port = client_port
EVAL-vendor_product = unit_name


[nw_firewall]
REPORT-z = nw_firewall_logs
KV_MODE = none
SHOULD_LINEMERGE = False

[system]
REPORT-s = system_logs
KV_MODE = none
SHOULD_LINEMERGE = False

### Commented for system logs
[source::udp*]
TRANSFORMS-null= setnull
disabled=true

[source::tcp*]
TRANSFORMS-null= setnull
DATETIME_CONFIG = CURRENT
disabled=true

