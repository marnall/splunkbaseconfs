[mvstats-command]
syntax      = mvstats <function> <mv-field> as <result-field>
shortdesc   = Performs stats function on the values in a numeric multi-value field
description = Does calculation <function> on the numeric multi-value field <mv-field> \
              and puts the result in the field <result-field> \
              <function> is one of "sum", "min", "max", "avg", "range", "stdev", "median", or "mode"
usage       = public
example1    = | transaction Resource mvlist="Activity" ... | mvstats sum Activity as TotalActivity
comment1    = Calculates the total of the metric field 'Activity' for each transaction event\
              and stores the results in the output field TotalActivity
related     = mvjoin mvcombine eval
