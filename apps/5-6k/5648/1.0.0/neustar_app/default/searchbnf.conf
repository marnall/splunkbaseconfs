[ultrageopoint-command]
syntax = ultrageopoint prefix=<string> allfields=<bool> <ip_address_field>
alias =
shortdesc = Performs an IP Range lookup on IPv4 and IPv6 addresses from the Neustar UltraGeoPoint datasets
description = \
    Performs an IP Range lookup on IPv4 and IPv6 addresses from the Neustar UltraGeoPoint datasets.\
    If the IP address in the event has a matching result , the event will be enriched with additional \
    IP Address fields from the UltraGeoPoint datasets. \
    By default these fields are output :  "latitude","longitude","city","continent","country","region","state"\
    If you specify allfields=true , then the full field set is output. \
    You can also specify a prefix to prepend to the output field names , prefix="neustar" \
comment1 = \
    Performs an IP Range lookup on IPv4 and IPv6 addresses from the Neustar UltraGeoPoint datasets
example1 = \
    | makeresults count=1 | eval clientip="1.0.67.51" | ultrageopoint clientip
example2 = \
    | makeresults count=1 | eval clientip="2001:0005:0002:ffff:ffff:ffff:ffff:ffff" | ultrageopoint clientip
example3 = \
    | makeresults count=1 | eval clientip="1.0.67.51" | ultrageopoint prefix="neustar" allfields=true clientip | table clientip neustar_*
example4 = \
    | makeresults count=1 | eval clientip="1.0.67.51" | ultrageopoint prefix="neustar" allfields=true clientip | lookup orgtypes_lookup naics_code as neustar_naics_code
category = streaming
appears-in = 1.2
maintainer = Neustar
usage = public
tags = neustar_app