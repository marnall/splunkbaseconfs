[s3_download]

#sensitive credentials are not stored here , they get encrypted to local/passwords.conf
#access_key_id,secret_key_id,external_id,aws_assumerole_arn

# in seconds or a cron syntax
# defaults to weekly and will execute on startup before waiting for next execution

polling_interval = 604800

# Python logging level for messages written to $SPLUNK_HOME/var/log/splunk/neustar.log , defaults to 'INFO'

log_level= INFO

#Optional AWS connection settings

aws_proxy_https = 
aws_region = 
aws_connection_timeout = 60
aws_read_timeout = 60 
aws_retry_maxattempts = 10
aws_retry_mode = standard
aws_assumerole_duration = 3600
aws_assumerole_sessionname = NeustarGeopointAssumeRole

#S3 and download/streaming settings , you shouldn't need to change these

geopoint_bucket = geopoint
file_suffix = .csv.gz
ipv4_filename_pattern = v(.*)_(\d*)\.(.*)
ipv6_filename_pattern = IPv6_v(.*)_(\d*)\.(.*)

# You'd only use this option if there are constraints prohibiting the file download option.

stream_content = false

# Settings if downloading CSV file (the recommended option)

local_root_download_directory = s3_downloads
delete_after_processing = true
perform_checksum_on_download = true

#KVStore settings

#ensure this is less than the system limits defined in limits.conf:max_queries_per_batch (default 1000)

kvstore_batch_save_size = 1000

#Read/Write fields for tracking the state of what file is currently loaded into the KVStore

polling_script_current_status = Waiting for first execution
polling_script_last_execution_status = Waiting for first execution

ipv4_current_category = 
ipv4_current_filename = 
ipv4_current_date =  
ipv4_current_version = 
ipv4_current_lastmodified = 
ipv4_current_kvstore_load_date =  
ipv4_current_filesize =  
ipv4_current_source = 

ipv6_current_category = 
ipv6_current_filename = 
ipv6_current_date = 
ipv6_current_version = 
ipv6_current_lastmodified= 
ipv6_current_kvstore_load_date = 
ipv6_current_filesize =  
ipv6_current_source =

#internal field only, not exposed in the setup UI. 
#if set to "true" will throttle the amount of data processed for dev/test scenarios
#for streaming : will only select/add "dev_mode_limit" records
#for file downloading : will download the entire CSV still , but only add "dev_mode_limit" records

dev_mode = false
dev_mode_limit = 100