[censyssearch-command]
syntax = censyssearch <ip_address_field> <summary or verbose>
shortdesc = Adds additional Censys data to events based on IP address.
description = This command can be used to augment Splunk events containing an IP address with additional host data from the Censys Search API.
example1 = ...| censyssearch ipAddress summary
comment1 = Enriches the event with a summary of the host data
example2 = ...| censyssearch ipAddress verbose
comment2 = Enriches the event with all of the host data
usage = public
tags = censys