[Awake Security - Alerts - High Match Counts By Device]
alert.digest_mode = 0
alert.severity = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = Triggers an alert for devices with unexpectedly large number of activity match in the past hour.
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = awake-security
request.ui_dispatch_view = search
search = eventtype="awake_adversarial_model_result"\
| stats values(adversarialModelName) as  Models, values(adversarialModelPath) as ASPMatchURLs, values(srcIp) as SourceIPs, values(matchedDestinations) as DestinationIPs, sum(nActivities) as ModelMatchCount, max(adversarialModelRiskScore) as MaxSeverity by deviceName\
| where ModelMatchCount > 1000 and MaxSeverity > 2\
| eval SeverityName=case(MaxSeverity == 0, "Informational", MaxSeverity < 5, "Low", MaxSeverity < 8, "Medium",MaxSeverity >= 8, "High")

[Awake Security - Alerts - High Severity Matches By Device]
alert.digest_mode = 0
alert.severity = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = Triggers an alert for devices with high severity events in the past hour.
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = awake-security
request.ui_dispatch_view = search
search = eventtype="awake_adversarial_model_result" adversarialModelRiskScore>6\
| stats min(_time) as StartTime,max(_time) as EndTime, values(adversarialModelName) as  Models, values(adversarialModelPath) as ASPMatchURLs, values(srcIp) as SourceIPs, values(matchedDestinations) as DestinationIPs, sum(nActivities) as ModelMatchCount, max(adversarialModelRiskScore) as MaxSeverity by deviceName

[Awake Security - Alerts - Model Matches With Multiple Destinations By Device]
alert.digest_mode = 0
alert.severity = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = Triggers an alert for devices with multiple possible malicious destinations in the past hour.
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = awake-security
request.ui_dispatch_view = search
search = eventtype="awake_adversarial_model_result"\
| spath output=IPs  path=matchedDestinations{}.ip\
| stats values(adversarialModelName) as  Models, values(adversarialModelPath) as ASPMatchURLs, values(srcIp) as SourceIPs, values(IPs) as DestinationIPs, sum(nActivities) as ModelMatchCount, max(adversarialModelRiskScore) as MaxSeverity by deviceName\
| eval lenDestinationIPs=len(mvjoin(DestinationIPs,""))\
| where lenDestinationIPs>13\
| sort - lenDestinationIPs\
|fields deviceName,Models,ASPMatchURLs,SourceIPs,DestinationIPs,ModelMatchCount,MaxSeverity

[Awake Security - Reports - Top 10 High Match Counts By Device]
action.email.useNSSubject = 1
action.logevent = 1
action.logevent.param.event = Awake Security - Report - Top 10 High Match Counts By Device
alert.track = 0
cron_schedule = 0 0 * * *
description = Logs an event with a report for top 10 devices with unexpectedly large number of activity match for the past 24 hours.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = pie
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = awake-security
request.ui_dispatch_view = search
search = eventtype="awake_adversarial_model_result"\
| spath output=IPs  path=matchedDestinations{}.ip\
| stats values(adversarialModelName) as  Models, values(adversarialModelPath) as ASPMatchURLs, values(srcIp) as SourceIPs, values(IPs) as DestinationIPs, sum(nActivities) as ModelMatchCount, max(adversarialModelRiskScore) as MaxSeverity by deviceName\
| eval SeverityName=case(MaxSeverity == 0, "Informational", MaxSeverity < 5, "Low", MaxSeverity < 8, "Medium",MaxSeverity >= 8, "High")\
| sort - ModelMatchCount\
| head 10

