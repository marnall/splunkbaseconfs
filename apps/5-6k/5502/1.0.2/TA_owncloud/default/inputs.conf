# ownCloud Logs
[monitor://var/www/owncloud/data/admin_audit.log]
disabled = true
index = main
sourcetype = owncloud:logfile:json

[monitor://var/www/owncloud/data/owncloud.log]
disabled = true
index = main
sourcetype = owncloud:logfile:json

