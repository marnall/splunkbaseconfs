[owncloud:logfile:json]
CHARSET=UTF-8
INDEXED_EXTRACTIONS=json
KV_MODE=none
SHOULD_LINEMERGE=false
category=Structured
description=JavaScript Object Notation format. For more information, visit http://json.org/
disabled=false
pulldown_type=true
TIME_FORMAT=%Y-%m-%dT%H:%M:%S%Z
TIMESTAMP_FIELDS=time
LINE_BREAKER=([\r\n]+)
TRUNCATE=999999action IN
ANNOTATE_PUNCT=false
EXTRACT-invalidating-tokens=message\":\"(?<message_type>Invalidating tokens)\solder\sthan\s(?<date>.*)
EXTRACT-failed-logins=message\":\"(?<message_type>Login failed):\s*'(?<src_user>\w*)'\s*\(Remote IP:\s*'(?<src_ip>\d*.\d*.\d*.\d*)'\)
EXTRACT-display-name=,\sdisplayName\s\<(?<displayName>[^(\>\")]*)\>\"
EVAL-user = coalesce(src_user,user)
FIELDALIAS-action = action as owncloud_action
EVAL-action = case(success="true","success",success="false","failure", action=="config_set","modified",match(action, ".*_create"),"created",match(action, ".*_create"),"created",match(action, ".*_delete"),"deleted",match(action, ".*_rename"),"modified",match(action, ".*_added"),"modified",match(action, ".*_removed"),"modified",match(action, ".*_changed"),"modified",match(action, ".*_reset"),"modified",match(action, ".*_shared"),"modified",match(action, ".*_shared"),"modified",match(action, ".*_read"),"read",match(action, ".*user.*"),"modified",1==1,action) 
EVAL-reason = message
EVAL-src = src_ip
EVAL-user_agent = userAgent
EVAL-object=coalesce(targetUser,path,group,url) 
EVAL-object_category = case(match(owncloud_action,".*user.*"),"user",match(owncloud_action,".*group.*"),"group",match(owncloud_action,".*file.*"),"file",match(owncloud_action,".*config.*"),"config", 1==1,"unknown")
EVAL-command=owncloud_action
EVAL-src_user=actor
EVAL-dest=host 
EVAL-dvc=host 
EVAL-vendor = "owncloud"


[owncloud:status:json]
CHARSET=UTF-8
DATETIME_CONFIG=CURRENT
INDEXED_EXTRACTIONS=json
KV_MODE=none
#SHOULD_LINEMERGE=true
SHOULD_LINEMERGE=false
TRUNCATE=999999
category=Structured
description=JavaScript Object Notation format. For more information, visit http://json.org/
disabled=false
pulldown_type=true
LINE_BREAKER=([\r\n]+)
EVAL-vendor = "owncloud"

