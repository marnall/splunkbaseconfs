[owncloud_authentication]
search = sourcetype=owncloud:logfile:json owncloud_action=user_login

[owncloud_change]
search = sourcetype=owncloud:logfile:json owncloud_action=* NOT owncloud_action=command_executed NOT owncloud_action=user_login NOT owncloud_action=user_logout

[owncloud_change_audit]
search = sourcetype=owncloud:logfile:json eventtype=owncloud_change owncloud_action="user_*" OR owncloud_action="group_*" 
