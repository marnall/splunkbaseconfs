[nozomi:alert]
EVAL-category = name
EVAL-dest_ip = ip_dst
EVAL-dest_mac = mac_dst
EVAL-dest_zone = zone_dst
EVAL-dvc_ip = appliance_ip
EVAL-protocol = protocol
EVAL-severity = risk
EVAL-signature = trigger_id
EVAL-src_ip = ip_src
EVAL-src_mac = mac_src
EVAL-src_zone = zone_src
EVAL-transport = transport_protocol
FIELDALIAS-ot_alert_mapping = description ASNEW body ip_dst ASNEW dest ip_src ASNEW src type_name ASNEW type
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[nozomi:nn_asset]
EVAL-asset_id = id
EVAL-asset_type = if(type="-",null,type)
EVAL-asset_version = if(firmware_version="null", null,firmware_version)
EVAL-os = if(os="null", null, os)
EVAL-serial = if(serial_number="null",null,serial_number)
EVAL-vendor_product = if(vendor="null",null,vendor)
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
LOOKUP-asset_category_type = asset_category type AS type OUTPUT category AS category
LOOKUP-appliance_host_site_id = appliance_host_site_id appliance_host AS appliance_host OUTPUT site_id AS site_id
FIELDALIAS-ot_nn_asset_mapping = firmware_version ASNEW asset_version id ASNEW asset_id type ASNEW asset_type vendor ASNEW asset_vendor
EXTRACT-appliance_host = ^[^\[\n]*\["(?P<appliance_host>[^"]+)

