[script:entitlement_rule]
match                 = /content_library/entitlement/?
handler               = entitlement_rule_handler_splunkd.EntitlementRuleHandler
script                = entitlement_rule_handler_splunkd.py
scripttype            = persist
python.version        = python3
python.required       = 3.9

[script:discovery]
match                 = /content_library/discovery/?
handler               = content_pack_discovery_handler_splunkd.ContentPackDiscoveryHandler
script                = content_pack_discovery_handler_splunkd.py
scripttype            = persist
python.version        = python3
python.required       = 3.9

[script:service_import]
match                 = /content_library/(service-import|sandbox)/.*
handler               = service_import_rest_interface_splunkd.ServiceImportRestInterface
script                = service_import_rest_interface_splunkd.py
scripttype            = persist
passHttpHeaders       = true
passPayload           = true
output_modes          = json
capability.get        = read_itsi_sandbox_service
capability.post       = write_itsi_sandbox_service
python.version        = python3
python.required       = 3.9
