[ITSI Import Objects - Microsoft 365 Tenants]
action.itsi_import_objects = 1
action.itsi_import_objects.param.backfill_enabled = 0
action.itsi_import_objects.param.entity_informational_fields = values(Workload),values(sourcetype)
action.itsi_import_objects.param.entity_merge_field = OrganizationId
action.itsi_import_objects.param.entity_title_field = OrganizationId
action.itsi_import_objects.param.entity_type_field = entity_type
action.itsi_import_objects.param.service_enabled = 1
action.itsi_import_objects.param.service_team = default_itsi_security_group
action.itsi_import_objects.param.service_templates_config = {}
action.itsi_import_objects.param.update_type = upsert
alert.track = 0
cron_schedule = */30 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
disabled = 1
search = `m365_cp_default_index` sourcetype="o365:management:activity" \
| stats values(Workload) values(sourcetype) by OrganizationId \
| eval entity_type="M365 Tenants" \
| fields - count

