[ITSI Import Objects - Sharepoint Workspaces]
action.itsi_import_objects = 1
action.itsi_import_objects.param.backfill_enabled = 0
action.itsi_import_objects.param.entity_informational_fields = values(OrganizationId),values(sourcetype)
action.itsi_import_objects.param.entity_merge_field = SiteName
action.itsi_import_objects.param.entity_title_field = SiteName
action.itsi_import_objects.param.entity_type_field = entity_type
action.itsi_import_objects.param.service_enabled = 1
action.itsi_import_objects.param.service_team = default_itsi_security_group
action.itsi_import_objects.param.service_templates_config = {}
action.itsi_import_objects.param.update_type = upsert
alert.track = 0
cron_schedule = */30 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
disabled = 1
search = `m365_cp_default_index` sourcetype="o365:management:activity" Workload=Sharepoint \
| eval SiteNameLower = lower(SiteName) \
| stats values(OrganizationId) values(sourcetype) by SiteName,SiteNameLower \
| dedup SiteNameLower \
| eval entity_type="Sharepoint Sites" \
| fields - count, SiteNameLower