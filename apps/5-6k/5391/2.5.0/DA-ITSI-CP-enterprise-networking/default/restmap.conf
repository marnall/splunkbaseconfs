[script:catalyst_center_discovery]
match                 = /cl_discovery/(fetch_tree|fetch_tree_meraki|publish_tree|publish_tree_meraki|itsi_cp_catalyst_center_records|itsi_cp_meraki_records|tree)/?
handler               = catalyst_center_cp_rest_interface_splunkd.ItsiCpCatalystCenterRestInterfaceSplunkd
script                = catalyst_center_cp_rest_interface_splunkd.py
scripttype            = persist
passHttpHeaders       = true
passPayload           = true
output_modes          = json
capability.get        = read_itsi_sandbox_service
capability.post       = write_itsi_sandbox_service
capability.put        = write_itsi_sandbox_service
capability.delete     = delete_itsi_sandbox_service
python.version        = python3
python.required       = 3.9
