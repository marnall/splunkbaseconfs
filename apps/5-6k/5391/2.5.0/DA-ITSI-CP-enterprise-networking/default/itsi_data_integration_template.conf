[catalyst_center]
title = Cisco Catalyst Center Default Template
_key = catalyst_center
data_source = catalyst_center
mapping_fields = [ \
    { \
        "name": "src", \
        "display_name": "Source", \
        "type": "source_field", \
        "required": true, \
        "input_type": "composition", \
        "default_selected_field": "DeviceName", \
        "default_value": "generic" \
    }, \
    { \
        "name": "signature", \
        "display_name": "Signature", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "default_selected_field": "IssueSpecificName", \
        "default_value": "default_generic_signature" \
    }, \
    { \
        "name": "vendor_severity", \
        "display_name": "Vendor Severity", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "default_selected_field": "IssueSpecificPriority", \
        "default_value": "OK" \
    }, \
    { \
        "name": "severity_id", \
        "display_name": "Severity ID", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "mapping_rule", \
        "rule_type": "case", \
        "values": \
        [ \
            { \
                "condition": "IF", \
                "clauses": \
                [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "P1", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "6" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": \
                [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "P2", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "5" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": \
                [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "P3", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "4" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": \
                [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "P4", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "3" \
                    } \
                ] \
            }, \
            { \
                "condition": "ELSE", \
                "outcomes": [ \
                    { \
                        "type": "conf", \
                        "value": "1" \
                    } \
                ] \
            } \
        ], \
        "default_value": "1" \
    }, \
    { \
        "name": "title", \
        "display_name": "Title", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "values": \
        [ \
            "{IssueSpecificName}", \
            "-", \
            "{DeviceName}" \
        ], \
        "default_value": "default_title" \
    }, \
    { \
        "name": "owner", \
        "display_name": "Owner", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "conf", \
        "default_selected_key": "unassigned", \
        "default_value": "unassigned" \
    }, \
    { \
        "name": "status", \
        "display_name": "Status", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "mapping_rule", \
        "rule_type": "case", \
        "values": \
        [ \
            { \
                "condition": "IF", \
                "clauses": \
                [ \
                    { \
                        "field": "IssueStatus", \
                        "operator": "==", \
                        "value": "resolved" \
                    } \
                ], \
                "outcomes": \
                [ \
                    "4" \
                ] \
            }, \
            { \
                "condition": "ELSE", \
                "outcomes": \
                [ \
                    "1" \
                ] \
            } \
        ], \
        "default_value": "1" \
    }, \
    { \
        "name": "subcomponent", \
        "display_name": "Subcomponent", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "mapping_rule", \
        "rule_type": "coalesce", \
        "values": \
        [ \
            "{subcomponent}", \
            [ \
                "-" \
            ] \
        ] \
    }, \
    { \
        "name": "alert_identifier_fields", \
        "display_name": "Alert Identifier Fields", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "values": \
        [ \
            "{signature}", \
            "-", \
            "{src}", \
            "-", \
            "{subcomponent}" \
        ], \
        "default_value": "default_identifier" \
    }, \
    { \
        "name": "description", \
        "display_name": "Description", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "default_selected_field": "IssueSpecificDescription" \
    }, \
    { \
        "name": "app", \
        "display_name": "App", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "default_selected_field": "app", \
        "default_value": "catalyst_center" \
    }, \
    { \
        "name": "itsiDrilldownSearchName", \
        "display_name": "ITSI Drilldown Search Name", \
        "type": "notable_event_field", \
        "required": false \
    }, \
    { \
        "name": "itsiDrilldownSearch", \
        "display_name": "ITSI Drilldown Search", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "default_selected_field": "itsiDrilldownSearch" \
    }, \
    { \
        "name": "itsiDrilldownEarliestOffset", \
        "display_name": "ITSI Drilldown earliest offset", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "mapping_rule", \
        "rule_type": "coalesce", \
        "regex_source": "", \
        "values": \
        [ \
            "{itsiDrilldownEarliestOffset}", \
            [ \
                "-900" \
            ] \
        ], \
        "default_value": "-900" \
    }, \
    { \
        "name": "itsiDrilldownLatestOffset", \
        "display_name": "ITSI Drilldown latest offset", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "mapping_rule", \
        "rule_type": "coalesce", \
        "regex_source": "", \
        "values": \
        [ \
            "{itsiDrilldownLatestOffset}", \
            [ \
                "900" \
            ] \
        ], \
        "default_value": "900" \
    }, \
    { \
        "name": "itsiDrilldownWebName", \
        "display_name": "ITSI Drilldown Website Name", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "default_selected_field": "IssueName", \
        "default_value": "drilldown_url" \
    }, \
    { \
        "name": "itsiDrilldownWebURL", \
        "display_name": "ITSI Drilldown Website URL", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "values": [ \
            "{cisco_catalyst_host}", \
            "/dna/assurance/device/details?id=", \
            "{DeviceID}" \
        ], \
        "default_value": "https://splunk.com" \
    } \
]
throttling_group_by_fields = []
mapping_field_options = []
