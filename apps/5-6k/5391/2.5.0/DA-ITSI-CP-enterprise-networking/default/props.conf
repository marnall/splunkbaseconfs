# props.conf for DA-ITSI-CP-enterprise-networking
#
# Field Aliases for Backward Compatibility with Cisco Catalyst Add-on
# 
# The Cisco Catalyst Add-on for Splunk v3.0.0 renamed the field from 
# cisco_dnac_host to cisco_catalyst_host. To maintain backward compatibility
# with older versions of the add-on (pre-3.0.0), we create field aliases.
#
# This allows the Content Pack to work with both old and new versions of the add-on.

[cisco:dnac:devicehealth]
FIELDALIAS-cisco_catalyst_host_compat = cisco_dnac_host ASNEW cisco_catalyst_host

[cisco:dnac:site:topology]
FIELDALIAS-cisco_catalyst_host_compat = cisco_dnac_host ASNEW cisco_catalyst_host

[cisco:dnac:issue]
FIELDALIAS-cisco_catalyst_host_compat = cisco_dnac_host ASNEW cisco_catalyst_host

[cisco:dnac:securityadvisory]
FIELDALIAS-cisco_catalyst_host_compat = cisco_dnac_host ASNEW cisco_catalyst_host

[cisco:dnac:networkhealth]
FIELDALIAS-cisco_catalyst_host_compat = cisco_dnac_host ASNEW cisco_catalyst_host

[cisco:dnac:clienthealth]
FIELDALIAS-cisco_catalyst_host_compat = cisco_dnac_host ASNEW cisco_catalyst_host

[cisco:dnac:compliance]
FIELDALIAS-cisco_catalyst_host_compat = cisco_dnac_host ASNEW cisco_catalyst_host
