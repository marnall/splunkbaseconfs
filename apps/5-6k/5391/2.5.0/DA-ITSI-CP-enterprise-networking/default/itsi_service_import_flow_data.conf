[catalyst_center]
name = Cisco Catalyst Center
appname = DA-ITSI-CP-enterprise-networking
itsiappname = SA-ITOA
description = Import Services
icon = app/DA-ITSI-CP-enterprise-networking/images/catalyst_center_logo.svg
dependencies_for_service_import = { \
    "service_templates": [ \
        "da-itsi-cp-enterprise-networking-catalyst-center-site" \
    ], \
    "entity_types": [ \
        "da-itsi-cp-cisco-enterprise-networking-sites" \
    ] \
}
conf_file_name=service_import_workflow_catalyst_center
retrieve_record_url = cl_discovery/itsi_cp_catalyst_center_records
retrieve_sandbox_url = itoa_interface/sandbox
dashboard_welcome_text = The Content Pack for Cisco Enterprise Networks aggregates Cisco Catalyst Center and Cisco Meraki data to provide visibility into the health of your networks. Use the content pack to import Cisco Catalyst Center and Cisco Meraki applications as IT Service Intelligence (ITSI) services and monitor them for performance management and service health analysis. Once applications are imported to service sandboxes in ITSI, you can configure and test isolated sandboxes without impacting your production environment.\n\nThis content pack is designed to work with the [Cisco Catalyst Add-On for Splunk](https://splunkbase.splunk.com/app/7538) and the [Cisco Meraki Add-on for Splunk](https://splunkbase.splunk.com/app/5580), which collect data from Cisco network devices.
dashboard_configuration_text = Import Cisco Catalyst Center applications to build, test, and publish them using ITSI service sandboxes. Before you continue, ensure that you have added Cisco Catalyst Center data inputs using the [Cisco Catalyst Add-On for Splunk](https://splunkbase.splunk.com/app/7538)
dashboard_configuration_button_text = Import [CPName] services
filters = { \
    "cisco_catalyst_host": { \
        "name": "cisco_catalyst_host", \
        "label": "Cisco Catalyst Host", \
        "placeholder": "Select Cisco Catalyst Host", \
        "SPL": "search `itsi_cp_catalyst_center_index` sourcetype=\"cisco:dnac:site:topology\" | dedup cisco_catalyst_host | table cisco_catalyst_host" \
    } \
}
fetch_services_spl = search `itsi_cp_catalyst_center_index` sourcetype="cisco:dnac:site:topology" type IN ("building") | rename name as service_title_raw, id as site_id, nameHierarchy as site_hierarchy, type as site_type | eval service_unique_id=substr(site_id, 1, 6) | eval service_title=service_title_raw." (".service_unique_id.")" | eval service_template="Catalyst Center Site", service_dependency="" | table service_title service_dependency service_template cisco_catalyst_host site_hierarchy site_type | append [ search `itsi_cp_catalyst_center_index` sourcetype="cisco:dnac:site:topology" type IN ("building", "area", "global") | eval service_template="", service_dependency="" | join left=l right=r type=left max=0 where l.id = r.parentId [ search `itsi_cp_catalyst_center_index` sourcetype="cisco:dnac:site:topology" type IN ("building", "area") ] | rename l.name as service_title_raw, l.id as site_id, l.type as site_type, r.name as service_dependency_raw, r.id as dep_id, l.service_template as service_template, l.cisco_catalyst_host as cisco_catalyst_host, l.site_hierarchy as site_hierarchy | eval service_unique_id=substr(site_id, 1, 6) | eval service_title=if(lower(site_type)=="global", "Catalyst Center Host (".cisco_catalyst_host.")", service_title_raw." (".service_unique_id.")") | eval dep_unique_id=if(isnotnull(dep_id), substr(dep_id, 1, 6), "") | eval service_dependency=if(isnotnull(service_dependency_raw), service_dependency_raw." (".dep_unique_id.")", "") | table service_title service_dependency service_template cisco_catalyst_host site_hierarchy site_type ] | dedup service_title service_dependency
fetch_services_lookback = -7d

[meraki]
name = Cisco Meraki
appname = DA-ITSI-CP-enterprise-networking
itsiappname = SA-ITOA
description = Import Services
icon = app/DA-ITSI-CP-enterprise-networking/images/cisco-meraki.svg
dependencies_for_service_import = { \
    "service_templates": [ \
        "da-itsi-cp-enterprise-networking-meraki-network" \
    ], \
    "entity_types": [ \
        "da-itsi-cp-enterprise-networking-meraki-network" \
    ] \
}
conf_file_name=service_import_workflow_meraki
retrieve_record_url = cl_discovery/itsi_cp_meraki_records
retrieve_sandbox_url = itoa_interface/sandbox
dashboard_welcome_text = The Content Pack for Cisco Enterprise Networks aggregates Cisco Catalyst Center and Cisco Meraki data to provide visibility into the health of your networks. Use the content pack to import Cisco Catalyst Center and Cisco Meraki applications as IT Service Intelligence (ITSI) services and monitor them for performance management and service health analysis. Once applications are imported to service sandboxes in ITSI, you can configure and test isolated sandboxes without impacting your production environment.\n\nThis content pack is designed to work with the [Cisco Catalyst Add-On for Splunk](https://splunkbase.splunk.com/app/7538) and the [Cisco Meraki Add-on for Splunk](https://splunkbase.splunk.com/app/5580), which collect data from Cisco network devices.
dashboard_configuration_text = Import Cisco Meraki applications to build, test, and publish them using ITSI service sandboxes. Before you continue, ensure that you have added Meraki data inputs using the [Cisco Meraki Add-on for Splunk](https://splunkbase.splunk.com/app/5580)
dashboard_configuration_button_text = Import [CPName] services
filters = { \
    "organization_id": { \
        "name": "organization_id", \
        "label": "Meraki Organization", \
        "placeholder": "Select Meraki Organization", \
        "SPL": "search `meraki_index` sourcetype=\"meraki:organizations\" | dedup id | table id, name" \
    } \
}
fetch_services_spl = search `meraki_index` sourcetype="meraki:organizations" | dedup id | rename cloud.region.name AS service_title, cloud.region.host.name AS service_dependency, id AS Organization_ID | eval service_template="" | table service_title service_dependency Organization_ID Tags service_template | append [| search `meraki_index` sourcetype="meraki:organizations" | dedup id | rename cloud.region.host.name AS service_title, name as service_dependency, id AS Organization_ID | eval service_template="" | table service_title service_dependency Organization_ID service_template ] | append [| search `meraki_index` sourcetype="meraki:organizationsnetworks" | dedup id | rename tags{} AS Tags, organizationId AS Organization_ID | mvexpand Tags | eval Tags = if(Tags = "", "Untagged", Tags), service_dependency = Tags | join Organization_ID [| search `meraki_index` sourcetype="meraki:organizations" | dedup id | rename name as service_title, organizationId AS Organization_ID | table Organization_ID service_title ] | eval service_template="" | table service_title service_dependency Organization_ID service_template | dedup service_title service_dependency Organization_ID ] | append [| search `meraki_index` sourcetype="meraki:organizationsnetworks" | dedup id | rename tags{} AS Tags, organizationId AS Organization_ID | mvexpand Tags | eval Tags = if(Tags = "", "Untagged", Tags), service_title = Tags | eval service_template="Meraki Network" | table service_title Organization_ID Tags service_template | dedup service_title Organization_ID Tags ] | search Organization_ID="{organization_id}"
fetch_services_lookback = -7d
