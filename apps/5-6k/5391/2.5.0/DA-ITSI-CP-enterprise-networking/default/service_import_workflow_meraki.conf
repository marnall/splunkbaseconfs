[panel1]
appname = Splunk_TA_cisco_meraki
conffilename = splunk_ta_cisco_meraki_organization
disabled = false
dropdownjsonpayload = { "nameOfAccountField": "name", "accountURLField": "content.appd_controller_url" },
isfromconf = 1
panelDetails = { "Component" : "Select", "title": "Select account", "tooltipText": "Select an account to import services" }
restapimethod = GET
accountIdentifierField = content.organization_id

[panel2]
url = cl_discovery/fetch_tree_meraki
appname = DA-ITSI-CP-enterprise-networking
params = account={panel1}
restapimethod = POST
panelDetails = { "Component": "MultiSelect", "title": "Select services", "tooltipText": "Select services to import" }

[panel3]
panelDetails = { "Component": "Preview", "title": "Preview service import", "tooltipText": "Meraki networks" }
skip_retrieve = true

[panel4]
url = cl_discovery/publish_tree_meraki
appname = DA-ITSI-CP-enterprise-networking
restapimethod = POST
panelDetails = { "Component": "Import", "title": "Import services to sandbox" }
skip_retrieve = true
