[ITSI Import Objects - Cisco Catalyst Center]
action.itsi_import_objects = 1
action.itsi_import_objects.param.entity_identifier_fields = entity_title,site_name,site_id
action.itsi_import_objects.param.entity_informational_fields = cisco_catalyst_host,cisco_catalyst_hostname,site_hierarchy,site_type,floor_number,latitude,longitude,address,country,length,width,height,units_of_measure,rf_model
action.itsi_import_objects.param.entity_merge_field = entity_title
action.itsi_import_objects.param.entity_title_field = entity_title
action.itsi_import_objects.param.entity_type_field = etype
action.itsi_import_objects.param.update_type = upsert
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
search = `itsi_cp_catalyst_center_index` sourcetype="cisco:dnac:site:topology" type IN ("building", "floor") \
| dedup cisco_catalyst_host id \
| rename nameHierarchy as site_name, id as site_id, type as site_type, floorNumber as floor_number, unitsOfMeasure as units_of_measure, rfModel as rf_model \
| eval iter=mvrange(0, mvcount(split(site_name, "/"))), site_hierarchy=mvmap(iter, mvjoin(mvindex(split(site_name, "/"), 0, iter), "/")), etype="Cisco Catalyst Center Sites", entity_title=site_name \
| rex field=cisco_catalyst_host "https://(?<cisco_catalyst_hostname>.*)" \
| table entity_title, site_name, site_id, cisco_catalyst_host, cisco_catalyst_hostname, site_hierarchy, site_type, floor_number, latitude, longitude, address, country, length, width, height, units_of_measure, rf_model, etype
disabled = 1

[ITSI Import Objects - Meraki_Network_Import]
action.itsi_import_objects = 1
action.itsi_import_objects.param.entity_identifier_fields = Network_ID
action.itsi_import_objects.param.entity_informational_fields = Organization_Name,Organization_ID,Region_Name,Region_Host,Timezone,Tags,URL,Notes
action.itsi_import_objects.param.entity_merge_field = Network
action.itsi_import_objects.param.entity_title_field = Network
action.itsi_import_objects.param.entity_type_field = etype
action.itsi_import_objects.param.update_type = upsert
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
search = `meraki_index` sourcetype="meraki:organizationsnetworks" organizationId="*" \
| dedup id \
| rename id as Network_ID, organizationId as Organization_ID, timeZone as Timezone, tags{} as Tags, url as URL, notes as Notes, name as Network \
| table Organization_ID, Network_ID, Network, Timezone, Tags, URL, Notes \
| join Organization_ID \
    [ \
    | search `meraki_index` sourcetype="meraki:organizations" \
    | dedup id \
    | rename id as Organization_ID, name as Organization_Name, cloud.region.name AS Region_Name, cloud.region.host.name AS Region_Host \
    | table Organization_ID, Organization_Name, Region_Name, Region_Host \
    ] \
| eval etype="Meraki Network" \
| rex field=URL "https:\/\/(?<URL>.*)" \
| eval Tags=coalesce(Tags, "Untagged") \
| table Organization_Name, Organization_ID, Network_ID, Network, Region_Name, Region_Host, Timezone, Tags, URL, Notes, etype
disabled = 1
