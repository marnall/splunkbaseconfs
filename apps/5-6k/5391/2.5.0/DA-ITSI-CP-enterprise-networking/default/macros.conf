# The Cisco Catalyst Add-on for Splunk (https://splunkbase.splunk.com/app/7538)
# will default to using the "main" index for its data. If a different index is
# used, this macro can be modified accordingly.
[itsi_cp_catalyst_center_index]
definition = index IN ("main")
iseval = 0

