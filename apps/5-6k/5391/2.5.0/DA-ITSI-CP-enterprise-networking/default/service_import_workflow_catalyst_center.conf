[panel1]
appname = TA_cisco_catalyst
conffilename = ta_cisco_catalyst_account
disabled = false
dropdownjsonpayload = { "nameOfAccountField": "name", "accountURLField": "content.appd_controller_url" },
isfromconf = 1
panelDetails = { "Component" : "Select", "title": "Select account", "tooltipText": "Select an account to import services" }
restapimethod = GET
accountIdentifierField = name

[panel2]
url = cl_discovery/fetch_tree
appname = DA-ITSI-CP-enterprise-networking
params = account={panel1}
restapimethod = POST
panelDetails = { "Component": "MultiSelect", "title": "Select services", "tooltipText": "Select services to import" }

[panel3]
panelDetails = { "Component": "Number", "title": "Select service tree depth", "tooltipText": "Select the maximum depth of the service tree to determine the level of dependent services that will be imported. For example, you can select a tree depth of 1 to only import the dependent services directly related to the Cisco Catalyst Center controller.", "min": 1, "max": 100}
skip_retrieve = true

[panel4]
panelDetails = { "Component": "Preview", "title": "Preview service import", "tooltipText": "Catalyst center sites" }
skip_retrieve = true

[panel5]
url = cl_discovery/publish_tree
appname = DA-ITSI-CP-enterprise-networking
restapimethod = POST
panelDetails = { "Component": "Import", "title": "Import services to sandbox" }
skip_retrieve = true
