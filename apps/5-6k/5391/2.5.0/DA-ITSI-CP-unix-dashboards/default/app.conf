#
# Splunk app configuration file
#

[install]
is_configured = false
build = 503

[ui]
is_visible = false
label = Content Pack for Unix Dashboards and Reports
attribution_link = app.attributions

[launcher]
author=Splunk, Inc.
description=The Content Pack for Unix Dashboards and Reports offers exciting new ways to alert, report, and investigate on data collected from Unix and Linux operating systems. 
version = 1.3.1

[triggers]
reload.unix_setup = access_endpoints /admin/unix_configured
reload.alert_overlay = simple
reload.headlines = simple
