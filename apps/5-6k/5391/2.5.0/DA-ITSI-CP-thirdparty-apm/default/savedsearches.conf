[ITSI Import Objects - Third Party APM]
action.itsi_import_objects = 1
action.itsi_import_objects.param.backfill_enabled = 0
action.itsi_import_objects.param.entity_informational_fields = app_name,vendor,account,app_language,application_id,type
action.itsi_import_objects.param.entity_merge_field = app_title
action.itsi_import_objects.param.entity_title_field = app_title
action.itsi_import_objects.param.entity_type_field = entity_type
action.itsi_import_objects.param.service_enabled = 1
action.itsi_import_objects.param.service_team = default_itsi_security_group
action.itsi_import_objects.param.service_templates_config = {}
action.itsi_import_objects.param.update_type = upsert
alert.track = 0
cron_schedule = */30 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
disabled = 1
search = tag=application tag=inventory tag=apm app_title=* vendor IN ("Dynatrace", "New Relic") \
| stats latest(app_name) as app_name,latest(vendor) as vendor, latest(account) as account, latest(app_language) as app_language, latest(application_id) as application_id by app_title \
| eval entity_type = "Third Party APM", type="application"
