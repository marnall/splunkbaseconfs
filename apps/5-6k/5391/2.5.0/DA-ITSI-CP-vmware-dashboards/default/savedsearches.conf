        | timechart span=1m avg(avgmemUsage) AS avg_mem_usage_pct   \
        max(maxmemUsage)  AS max_mem_usage_pct   \
        perc95(perc95memUsage)  AS perc95_mem_usage_pct   \
        by host   \
        where (avg_*>=0 AND max_* >=0 AND perc_*>=0)

