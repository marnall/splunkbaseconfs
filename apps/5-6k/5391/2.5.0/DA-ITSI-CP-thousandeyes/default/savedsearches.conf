[ITSI Import Objects - Cisco ThousandEyes Tests]
action.itsi_import_objects = 1
action.itsi_import_objects.param.entity_identifier_fields = entity_title,itsi_entity_id,thousandeyes_test_id
action.itsi_import_objects.param.entity_informational_fields = thousandeyes_account_id,thousandeyes_test_name,server_address,server_port
action.itsi_import_objects.param.entity_merge_field = itsi_entity_id
action.itsi_import_objects.param.entity_title_field = entity_title
action.itsi_import_objects.param.entity_type_field = entity_type
action.itsi_import_objects.param.update_type = upsert
cron_schedule = */15 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time = now
enableSched = 1
disabled = 1
search = `itsi_cp_thousandeyes_index` thousandeyes.test.id=*\
    | eval entity_title='thousandeyes.test.name'.":".'thousandeyes.test.id', itsi_entity_id='thousandeyes.account.id'.":".'thousandeyes.test.id', entity_type="ThousandEyes Test"\
    | rename thousandeyes.account.id AS thousandeyes_account_id, thousandeyes.test.id AS thousandeyes_test_id, thousandeyes.test.name AS thousandeyes_test_name, server.address AS server_address, server.port AS server_port\
    | table entity_title, entity_type, itsi_entity_id, thousandeyes_account_id, thousandeyes_test_id, thousandeyes_test_name, server_address, server_port
