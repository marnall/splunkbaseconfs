[nexus_dashboard]
name = Cisco Nexus Dashboard
appname = DA-ITSI-CP-cisco-data-center
itsiappname = SA-ITOA
description = Import Services
icon = app/DA-ITSI-CP-cisco-data-center/images/nexus_dashboard_logo.png
dependencies_for_service_import = { \
    "service_templates": [ \
        "da-itsi-cp-cisco-data-center-cisco-nexus-fabric" \
    ], \
    "entity_types": [ \
        "da-itsi-cp-cisco-data-center-cisco-nexus-switch" \
    ] \
}
filters = { \
    "owner_cluster": { \
        "name": "owner_cluster", \
        "label": "Nexus Dashboard Cluster", \
        "placeholder": "Select Nexus Dashboard Cluster", \
        "SPL": "search `cisco_dc_nd_index` sourcetype=\"cisco:dc:nd:fabrics\" | dedup ownerCluster | table ownerCluster" \
    } \
}
fetch_services_spl = search `cisco_dc_nd_index` sourcetype="cisco:dc:nd:fabrics" ownerCluster="{owner_cluster}" | dedup ownerCluster name | eval fabric_name=name, service_title=name, service_dependency=null(), service_template="Cisco Nexus Fabric" | appendpipe [ eval service_title=ownerCluster, service_dependency=name, service_template=null() ] | table service_title service_dependency service_template fabric_name
fetch_services_lookback = -7d
