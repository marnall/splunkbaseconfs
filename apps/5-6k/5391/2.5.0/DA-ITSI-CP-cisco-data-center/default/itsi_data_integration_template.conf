[nexus_dashboard]
title = Cisco Nexus Dashboard Default Template
_key = nexus_dashboard
data_source = nexus_dashboard
mapping_fields = [ \
    { \
        "name": "src", \
        "display_name": "Source", \
        "type": "source_field", \
        "required": true, \
        "input_type": "composition", \
        "values": [ \
            "{node_name}" \
        ], \
        "default_value": "nexus_switch" \
    }, \
    { \
        "name": "signature", \
        "display_name": "Signature", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "values": [ \
            "{signature}" \
        ], \
        "default_value": "default_nexus_switch_signature" \
    }, \
    { \
        "name": "vendor_severity", \
        "display_name": "Vendor Severity", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "values": [ \
            "{vendor_severity}" \
        ], \
        "default_value": "warning" \
    }, \
    { \
        "name": "severity_id", \
        "display_name": "Severity ID", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "mapping_rule", \
        "rule_type": "case", \
        "values": [ \
            { \
                "condition": "IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "critical", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    "6" \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "major", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    "5" \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "minor", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    "4" \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "warning", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    "3" \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "normal", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    "2" \
                ] \
            }, \
            { \
                "condition": "ELSE_IF", \
                "clauses": [ \
                    { \
                        "field": "vendor_severity", \
                        "operator": "==", \
                        "value": "info", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    "1" \
                ] \
            }, \
            { \
                "condition": "ELSE", \
                "outcomes": [ \
                    "3" \
                ] \
            } \
        ], \
        "default_value": "1" \
    }, \
    { \
        "name": "title", \
        "display_name": "Title", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "mapping_rule", \
        "rule_type": "case", \
        "values": [ \
            { \
                "condition": "IF", \
                "clauses": [ \
                    { \
                        "field": "alertType", \
                        "operator": "==", \
                        "value": "advisory", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    "{title}" \
                ] \
            }, \
            { \
                "condition": "ELSE", \
                "outcomes": [ \
                    "{fabricName}", \
                    "-", \
                    "{signature}", \
                    "-", \
                    "{src}" \
                ] \
            } \
        ], \
        "default_value": "default_title" \
    }, \
    { \
        "name": "owner", \
        "display_name": "Owner", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "conf", \
        "default_selected_key": "unassigned", \
        "default_value": "unassigned" \
    }, \
    { \
        "name": "status", \
        "display_name": "Status", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "conf", \
        "default_selected_key": "1", \
        "default_value": "1" \
    }, \
    { \
        "name": "subcomponent", \
        "display_name": "Subcomponent", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "values": [ \
            "{entityName}" \
        ], \
        "default_value": "default_nexus_subcomponent" \
    }, \
    { \
        "name": "alert_identifier_fields", \
        "display_name": "Alert Identifier Fields", \
        "type": "notable_event_field", \
        "required": true, \
        "input_type": "composition", \
        "values": [ \
            "{id}" \
        ], \
        "default_value": "default_identifier" \
    }, \
    { \
        "name": "description", \
        "display_name": "Description", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "default_selected_field": "description" \
    }, \
    { \
        "name": "app", \
        "display_name": "App", \
        "type": "notable_event_field", \
        "required": false, \
        "input_type": "composition", \
        "default_selected_field": "app", \
        "default_value": "Cisco DC Networking" \
    }, \
    { \
        "name": "itsiDrilldownSearchName", \
        "display_name": "ITSI Drilldown Search Name", \
        "type": "notable_event_field", \
        "required": false \
    }, \
    { \
        "name": "itsiDrilldownSearch", \
        "display_name": "ITSI Drilldown Search", \
        "type": "notable_event_field", \
        "input_type": "composition", \
        "required": false, \
        "default_selected_field": "itsiDrilldownSearch" \
    }, \
    { \
        "name": "itsiDrilldownEarliestOffset", \
        "display_name": "ITSI Drilldown earliest offset", \
        "type": "notable_event_field", \
        "default_value": "-900", \
        "input_type": "mapping_rule", \
        "rule_type": "coalesce", \
        "required": false, \
        "values": ["{itsiDrilldownEarliestOffset}", ["-900"]] \
    }, \
    { \
        "name": "itsiDrilldownLatestOffset", \
        "display_name": "ITSI Drilldown latest offset", \
        "type": "notable_event_field", \
        "default_value": "900", \
        "input_type": "mapping_rule", \
        "rule_type": "coalesce", \
        "required": false, \
        "values": ["{itsiDrilldownLatestOffset}", ["900"]] \
    }, \
    { \
        "name": "itsiDrilldownWebName", \
        "display_name": "ITSI Drilldown Website Name", \
        "type": "notable_event_field", \
        "input_type": "mapping_rule", \
        "rule_type": "case", \
        "required": false, \
        "values": [ \
            { \
                "condition": "IF", \
                "clauses": [ \
                    { \
                        "field": "alertType", \
                        "operator": "==", \
                        "case_sensitive": false, \
                        "value": "advisory" \
                    } \
                ], \
                "outcomes": [ \
                    "Advisories" \
                ] \
            }, \
            { \
                "condition": "ELSE", \
                "outcomes": [ \
                    "Anomalies" \
                ] \
            } \
        ] \
    }, \
    { \
        "name": "itsiDrilldownWebURL", \
        "display_name": "ITSI Drilldown Website URL", \
        "type": "notable_event_field", \
        "input_type": "mapping_rule", \
        "rule_type": "case", \
        "regex_source": "", \
        "required": false, \
        "values": [ \
            { \
                "condition": "IF", \
                "clauses": [ \
                    { \
                        "field": "alertType", \
                        "operator": "==", \
                        "value": "advisory", \
                        "case_sensitive": false \
                    } \
                ], \
                "outcomes": [ \
                    "https://", \
                    "{nd_host}", \
                    "/advisories" \
                ] \
            }, \
            { \
                "condition": "ELSE", \
                "outcomes": [ \
                    "https://", \
                    "{nd_host}", \
                    "/anomalies" \
                ] \
            } \
        ] \
    }, \
    { \
        "name": "itsi_instruction", \
        "display_name": "ITSI Instruction", \
        "type": "notable_event_field", \
        "required": false \
    } \
]
throttling_group_by_fields = []
mapping_field_options = []
status_id_mapping =