[ITSI Import Objects - Nexus Dashboard]
action.itsi_import_objects = 1
action.itsi_import_objects.param.entity_identifier_fields = serial_number,itsi_entity_id
action.itsi_import_objects.param.entity_informational_fields = nd_host,switch_role,switch_id,host_name,fabric_name,fabric_type,owner_cluster,model
action.itsi_import_objects.param.entity_merge_field = serial_number
action.itsi_import_objects.param.entity_merge_fqdn = false
action.itsi_import_objects.param.entity_status_tracking = true
action.itsi_import_objects.param.entity_title_field = entity_title
action.itsi_import_objects.param.entity_type_field = etype
action.itsi_import_objects.param.field_level_update_type = {"serial_number":"replace","itsi_entity_id":"replace","nd_host":"replace","switch_role":"replace","switch_id":"replace","host_name":"replace","fabric_name":"replace","fabric_type":"replace","owner_cluster":"replace","model":"replace"}
action.itsi_import_objects.param.update_type = upsert
action.webhook.enable_allowlist = 1
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
search = `cisco_dc_nd_index` sourcetype="cisco:dc:nd:switches" \
| join fabricName nd_host [| search `cisco_dc_nd_index` sourcetype="cisco:dc:nd:fabrics" | eval fabricName = name] \
| dedup serialNumber \
| rename serialNumber as serial_number, hostname as host_name, fabricName as fabric_name, switchId as switch_id, switchRole as switch_role, management.type as fabric_type, ownerCluster as owner_cluster \
| eval entity_title = fabric_name. ":" .host_name, itsi_entity_id = fabric_name. ":" .host_name, etype="Cisco Nexus Switch" \
| table entity_title, itsi_entity_id, serial_number, nd_host, switch_role, switch_id, host_name, fabric_name, fabric_type, owner_cluster, model, etype
disabled = 1
