[itsi_cp_appdynamics_convert_healthscore(1)]
args = appd_performance_state
definition = eval healthScore = case(\
   $appd_performance_state$=="NORMAL", 100,\
    $appd_performance_state$=="WARNING", 75,\
    $appd_performance_state$=="CRITICAL", 0,\
    true(), null() \
)
iseval = 0

[itsi_cp_appdynamics_index]
definition = index="appdynamics"
iseval = 0
