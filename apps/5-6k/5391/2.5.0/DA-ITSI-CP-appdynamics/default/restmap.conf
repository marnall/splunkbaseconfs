[script:AppD_discovery]
match                 = /discovery/(fetch_tree|publish_tree|record|tree)/?
handler               = appdynamics_cp_rest_interface_splunkd.AppDynamicsCPRestInterfaceSplunkd
script                = appdynamics_cp_rest_interface_splunkd.py
scripttype            = persist
passHttpHeaders       = true
passPayload           = true
output_modes          = json
capability.get        = read_itsi_sandbox_service
capability.post       = write_itsi_sandbox_service
capability.put        = write_itsi_sandbox_service
capability.delete     = delete_itsi_sandbox_service
python.version        = python3
python.required       = 3.9
