[ITSI Import Objects - Splunk AppDynamics Business Transactions]
action.itsi_import_objects = 1
action.itsi_import_objects.param.entity_identifier_fields = entity_title, appd_business_transaction_id
action.itsi_import_objects.param.entity_informational_fields = appd_application_component_name,appd_component_id,appd_application_name,\
 appd_application_id,appd_business_transaction_name,appd_controller_url,appd_deep_link
action.itsi_import_objects.param.entity_merge_field = appd_business_transaction_id
action.itsi_import_objects.param.entity_title_field = entity_title
action.itsi_import_objects.param.entity_type_field = etype
action.itsi_import_objects.param.update_type = upsert
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 0 * * * *
dispatch.earliest_time = -70m
dispatch.latest_time = now
enableSched = 1
search = `itsi_cp_appdynamics_index` source="business_transaction_status" sourcetype="appdynamics_status" \
 | fields applicationComponentName, componentId, application_name, application_id, business_transaction_name, \
 business_transaction_id, controller_url, deepLink \
 | rename applicationComponentName as application_component_name, componentId as component_id, deepLink as deep_link \
 | rename * as appd_* \
 | eval appd_deep_link=replace (appd_deep_link, "https://", "") \
 | eval etype="Splunk AppDynamics Business Transactions", entity_title=appd_business_transaction_name.":".appd_business_transaction_id
disabled = 1

