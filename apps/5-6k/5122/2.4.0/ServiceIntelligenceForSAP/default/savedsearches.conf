[sapDataEntity]
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | tstats values(source) as source where ((`sap-abap`) OR (`sap-java`)) OR (sourcetype=sap:cloud) by sourcetype \
| mvexpand source \
| eval sidLength=length(source) \
| search sidLength=3 \
| rex field=sourcetype "(?<sourcetype>(sap:abap))" \
| table source, sourcetype \
| rename source as sid \
| rex field=sourcetype ":(?<serviceTree>.*)" \
| fields sid, serviceTree \
| eval sidServiceTree=lower(sid) + ":" + lower(serviceTree) \
| eval dataExists=1 \
| eval entityExists=0 \
| join type=left sidServiceTree \
    [| inputlookup sidData \
    | stats count as entries by serviceTree, prefix, separator, sid \
    | eval sidServiceTree=lower(sid) + ":" + lower(serviceTree) \
    | eval entityExists=1 \
    | eval GTServices=0 ] \
| join type=left sidServiceTree \
    [| inputlookup sidData where identifying_name="*glasstables" \
    | stats count as entries by serviceTree, prefix, separator, sid \
    | eval sidServiceTree=lower(sid) + ":" + lower(serviceTree) \
    | eval GTServices=1 ] \
| eval db="" \
| join type=left sid \
    [ search `sap-abap(SYSTEM_STATUS)` EVENT_SUBTYPE=SYSTEM_STATUS \
    | eval db=substr(DATABASE_SYSTEM,0,3) \
    | eval db=case(db=="SYB","ASE",1==1,db) \
    | rename source as sid \
    | table sid, db ] \
| join type=left sid \
    [ search `sap-abap(*_DB*)` \
    | stats first(EVENT_TYPE) as event_type by source \
    | mvexpand event_type \
    | eval db_type = substr(event_type,1,3) \
    | stats first(db_type) as db_type by source \
    | rename source as sid ] \
| eval db=if(db=="", db_type, db) \
| join type=left sid \
    [ search (`sap-java`) (event_type=agent_startup OR event_type=topology) \
    | spath "database.type" \
    | rename database.type as db_type \
    | rename source as sid \
    | eval db=case(db_type=="Oracle", "ORA", db_type=="Sybase", "ASE", db_type=="Microsoft SQL Server", "MSS", db_type=="Hana", "HDB", 1=1, db_type) \
    | table sid, db_type, db] \
| sort sid asc \
| dedup sid \
| eval db=if(serviceTree=="cloud", "n/a", db)

