[backupsInProgress]
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
search = | rest splunk_server=local report_as=text "/servicesNS/nobody/SA-ITOA/backup_restore_interface/backup_restore" fields="status" \
| rex max_match=0 field=value "{\"status\": \"(?<backupRestoreStatus>[^\"]+)" \
| mvexpand backupRestoreStatus\
| search backupRestoreStatus!="Completed" backupRestoreStatus!="*Scheduled*" backupRestoreStatus!=Failed \
| eval itsiObjectType="backupsRestores" \
| eval templateVersion="n/a" \
| search backupRestoreStatus!=""\
| stats count values(backupRestoreStatus) by itsiObjectType templateVersion

