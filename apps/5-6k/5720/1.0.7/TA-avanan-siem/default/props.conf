[avanan_security_event]
DATETIME_CONFIG = CURRENT
EVAL-action = case(spath(_raw,"entity.entity_payload.is_quarantined")=="true" OR spath(_raw,"entity.entity_payload.is_tombstoned")=="true","blocked",spath(_raw,"entity.entity_payload.is_quarantined")!="true" OR spath(_raw,"entity.entity_payload.is_tombstoned")!="true","delivered")
EVAL-app = spath(_raw,"security_event.entity_payload.matched_security_tool")
EVAL-category = spath(_raw,"security_event.entity_payload.category")
EVAL-date = spath(_raw,"security_event.entity_info.entity_created")
EVAL-dest = spath(_raw,"security_event.entity_payload.saas")
EVAL-file_hash = mvindex(spath(_raw,"entity.entity_payload.attachments{}.MD5"), mvfind(spath(_raw,"entity.entity_payload.attachments{}.entity_id"), 'attachment_id') )
EVAL-file_name = mvindex(spath(_raw,"entity.entity_payload.attachments{}.name"), mvfind(spath(_raw,"entity.entity_payload.attachments{}.entity_id"), 'attachment_id') )
EVAL-file_size = mvindex(spath(_raw,"entity.entity_payload.attachments{}.size"), mvfind(spath(_raw,"entity.entity_payload.attachments{}.entity_id"), 'attachment_id') )
EVAL-filter_action = case(spath(_raw,"entity.entity_payload.is_quarantined")=="true" OR spath(_raw,"entity.entity_payload.is_tombstoned")=="true","blocked",spath(_raw,"entity.entity_payload.is_quarantined")!="true" OR spath(_raw,"entity.entity_payload.is_tombstoned")!="true","delivered")
EVAL-internal_message_id = spath(_raw,"security_event.entity_info.entity_id")
EVAL-message_id = spath(_raw,"entity.entity_payload.internet_message_id")
EVAL-orig_recipient = spath(_raw,"entity.entity_payload.orig_recipient")
EVAL-recipient = spath(_raw,"entity.entity_payload.recipients{}")
EVAL-recipient_domain = accountname=split(spath(_raw, "entity.entity_payload.recipients"),"@"), mvindex(accountname,-1)
EVAL-return_addr = spath(_raw,"security_event.entity_payload.reply_to_email")
EVAL-severity = case(spath(_raw,"security_event.entity_payload.severity")=="1","informational",spath(_raw,"security_event.entity_payload.severity")=="2","low",spath(_raw,"security_event.entity_payload.severity")=="3","medium",spath(_raw,"security_event.entity_payload.severity")=="4","high",spath(_raw,"security_event.entity_payload.severity")=="5","critical")
EVAL-severity_id = spath(_raw,"security_event.entity_payload.severity")
EVAL-signature = spath(_raw,"security_event.entity_payload.matched_security_tool")
EVAL-signature_extra = entity.entity_security_result.ap{}.payload.reasons_by_category_list{}
EVAL-signature_id = spath(_raw,"security_event.entity_payload.matched_security_tool")
EVAL-size = coalesce(spath(_raw,"entity.entity_payload.size"),0)
EVAL-src = "avanan"
EVAL-src_user = spath(_raw,"entity.entity_payload.from_email")
EVAL-src_user_domain = spath(_raw,"security_event.entity_payload.from_domain")
EVAL-status_code = spath(_raw,"security_event.entity_payload.category")
EVAL-subject = spath(_raw,"entity.entity_payload.subject")
EVAL-vendor_product = case(spath(_raw,"security_event.entity_payload.matched_security_tool")=="avanan_ap_scan", "Smart-Phish", spath(_raw,"security_event.entity_payload.matched_security_tool")=="cp_threat_extraction_info", "Checkpoint Threat Extraction",spath(_raw,"security_event.entity_payload.matched_security_tool")=="avanan_dlp","SmartDLP",spath(_raw,"security_event.entity_payload.matched_security_tool")=="shadow_it_emails_scan","Shadow IT Emails",spath(_raw,"security_event.entity_payload.matched_security_tool")=="avanan_url","URL Reputation",spath(_raw,"security_event.entity_payload.matched_security_tool")=="checkpoint2","Check Point Sandblast",spath(_raw,"security_event.entity_payload.matched_security_tool")=="ms_defender_scan","Microsoft 365 Defender",spath(_raw,"security_event.entity_payload.matched_security_tool")=="clicktime_protection_scan","Click-Time Protection")
EXTRACT-attachment_id = #\{\\"entity_id\\":\s+\\"(?P<attachment_id>[^\\]+)
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
TRUNCATE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

