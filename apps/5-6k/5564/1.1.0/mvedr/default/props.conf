[mcafee:edr:pull]
EVAL-severity = if(match(severity,"s[4|5]"),"high",if(match(severity, "s[2|3]"), "medium", "low"))
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_1 = detection.traces.items{}.fileAttributes.name AS file_name
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_10 = detection.host.os.build AS version
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_11 = detection.host.netInterfaces{}.ip AS dvc_ip
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_12 = detection.host.netInterfaces{}.macAddress AS dvc_mac
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_13 = detection.traces.items{}.pid AS process_id
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_14 = detection.traces.items{}.ppid AS parent_process_id
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_2 = detection.traces.items{}.fileAttributes.md5 AS file_hash
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_3 = detection.traces.items{}.fileAttributes.path AS file_path
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_4 = detection.traces.items{}.fileAttributes.creationDate AS file_create_time
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_5 = detection.traces.items{}.fileAttributes.lastModificationDate AS file_modify_time
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_6 = detection.traces.items{}.user.name AS user
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_7 = detection.traces.items{}.fileAttributes.size AS file_size
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_8 = detection.traces.items{}.processName AS process
FIELDALIAS-aob_gen_mcafee_edr_pull_alias_9 = detection.host.os.desc AS os
MAX_TIMESTAMP_LOOKAHEAD = 25
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = "detection"[^*]+"firstDetected"
TRUNCATE = 0
SHOULD_LINEMERGE = false