[default]
# General
display.visualizations.custom.treeview-viz.treeview-viz.skin = lion
display.visualizations.custom.treeview-viz.treeview-viz.showConnectors = true
display.visualizations.custom.treeview-viz.treeview-viz.showCheckbox = false
display.visualizations.custom.treeview-viz.treeview-viz.showIcons = true
display.visualizations.custom.treeview-viz.treeview-viz.selectMode = single
display.visualizations.custom.treeview-viz.treeview-viz.fontSize = 10
display.visualizations.custom.treeview-viz.treeview-viz.initialState = closed

# Accordion
display.visualizations.custom.treeview-viz.treeview-viz.accordionMode = false
display.visualizations.custom.treeview-viz.treeview-viz.accordionModeBgColor = #efefef
display.visualizations.custom.treeview-viz.treeview-viz.accordionModeTextColor = #000000
display.visualizations.custom.treeview-viz.treeview-viz.autoCollapse = false
display.visualizations.custom.treeview-viz.treeview-viz.accordionMinWidth = 200

# Sorting
display.visualizations.custom.treeview-viz.treeview-viz.showFoldersFirst = true
display.visualizations.custom.treeview-viz.treeview-viz.sortBy = label
display.visualizations.custom.treeview-viz.treeview-viz.sortMethod = as-is


# Tokens
display.visualizations.custom.treeview-viz.treeview-viz.tokenLabel = tv_label_token
display.visualizations.custom.treeview-viz.treeview-viz.tokenParentId = tv_parent_id_token
display.visualizations.custom.treeview-viz.treeview-viz.tokenId = tv_id_token
display.visualizations.custom.treeview-viz.treeview-viz.tokenValuePrefix = 
display.visualizations.custom.treeview-viz.treeview-viz.tokenValueSuffix = 
display.visualizations.custom.treeview-viz.treeview-viz.tokenPrefix = 
display.visualizations.custom.treeview-viz.treeview-viz.tokenSuffix = 
display.visualizations.custom.treeview-viz.treeview-viz.tokenDelimiter = 
