[ataportal]
is_custom = 1
disabled = 0
label = Create Critical Start ZTAP Incident 
description = Send security events to Critical Start Managed Security Services Portal
icon_path = appIconAlt.png
payload_format = json
python.version = python3
python.required = 3.9, 3.13
param._cam = {\
    "category": ["Information Conveyance"],\
    "task": ["create"],\
    "subject": ["site"],\
    "technology": [{"vendor": "ztap_app", "product": "ztap_app"}],\
    "supports_adhoc": true,\
    "action_tooltip": "Forward incident to Critical Start Managed Security Services Portal"\
}

param.base_url =
param.auth_token =
param.psa_id =

param.search_query = $job.search$
param.search_earliest = $job.earliestTime$
param.search_latest = $job.latestTime$

command = sendalert $action_name$ results_file="$results.file$" results_link="$results.url" param.action_name=$action_name$ | stats count