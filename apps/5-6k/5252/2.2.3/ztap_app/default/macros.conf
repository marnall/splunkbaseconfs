[critical_start_hc_is_recent]
definition = eval is_recent = now() - (3600 * 24 * 5), is_recent = if(_time > is_recent,"true", "false") | search is_recent="true"

[critical_start_hc_count]
definition = stats count AS total_failures, latest(error_message) as message values(is_recent) as ir values(_time) as time by host | rename host AS instance | fields instance total_failures message severity_level

[critical_start_hc_severity(2)]
args = compare, level
definition = eval severity_level = case(total_failures == $compare$, 0, total_failures > $compare$, $level$)

[critical_start_hc_generic_alert(3)]
args = severity, failures, message
definition = makeresults | eval instance="all", message="$message$", severity_level=$severity$, total_failures=$failures$

[critical_start_hc_stitch]
definition = reverse | fillnull TheRaven value="stitch" | selfjoin TheRaven keepsingle=1 | fields - _time TheRaven

[critical_start_hc_api_errors]
definition = union [ search eventtype=vmware_cbc_api_errors | rex field=_raw "error_message=(?<error_message>.*)error_type"| `critical_start_hc_is_recent`| `critical_start_hc_count`| `critical_start_hc_severity(0,3)` ] [| `critical_start_hc_generic_alert(0,0,"No Critical Start Errors Found")` ] | `critical_start_hc_stitch`


### DATAMODEL DRIFT SECTION
[critical_start_nr_dm_in]
# Combined with `critical_start_nr_dm_gen_diff` this eval contains a comma separated, quoted list of Data models to keep track of changes for.
definition =  "Alerts,Drift_Test_Alerts"
iseval = false

[critical_start_nr_dm_limit]
# Combined with `critical_start_nr_dm_gen_diff` this eval contains the max number of changes to track for each Data Model
definition = 10
iseval = false

[critical_start_nr_dm_ztap]
# Use this string to send to ZTAP each special event.
definition = eval ztap_event_type = "criticalstart_splunk_dm_drift_monitoring"
iseval = false

[critical_start_nr_ms_ztap]
# Use this string to send to ZTAP each special event.
definition = eval ztap_event_type = "criticalstart_splunk_sourcetype_missing_monitoring"
iseval = false

[critical_start_nr_dm_gen_diff]
# This is the generating search for a recurring diff on DataModels
# Reads and writes from the cs_cm_check kvstore
# When used in a scheduled search, over a 1 day period generating interval, it will by default track 14 days of changes to the selected datamodels
definition = rest splunk_server=local /services/data/models | where title IN (split(`critical_start_nr_dm_in`, ",")) | rename eai:data as raw_object | eval check_md5 = md5(raw_object), check_time = now() | stats latest(check_time) as check_time latest(check_md5) as check_md5 latest(raw_object) as raw_object by title | inputlookup cs_dm_check append=t | sort 0 - title check_time | streamstats count as history_count by title | search history_count <= `critical_start_nr_dm_limit` | outputlookup cs_dm_check

[critical_start_nr_dm_detect_changes]
# Run this at least once per generating interval. If the interval to generate the kvstore is 1 day, run at least every 23.75 hrs to make sure latest changes are detected.
definition = inputlookup cs_dm_check | eval _time = check_time | streamstats window=2 current=true earliest(raw_object) as first_raw_object earliest(check_time) as first_check_time earliest(check_md5) as first_check_md5 latest(raw_object) as latest_raw_object latest(check_time) as latest_check_time latest(check_md5) as latest_check_md5 by title | where first_check_md5 != latest_check_md5|streamstats count as scan_count by title| where scan_count =1 | eval has_changed = "true" | fields title first_check_time latest_check_time first_check_md5 latest_check_md5 *_raw_object has_changed | `critical_start_nr_dm_ztap`

[critical_start_nr_dm_show_changes(2)]
args = first, second
definition = inputlookup cs_dm_check | eval _time = check_time | stats latest(*) as * by title check_md5 | where in(check_md5, "$first$", "$second$") | foreach modelName displayName description objects objectSummary objectNameList     [ eval <<FIELD>> = json_extract(raw_object, "<<FIELD>>") ] | sort check_time | convert ctime(check_time) timeformat="%Y-%m-%d %T" | fields - raw_object | transpose | where 'row 1' != 'row 2' | rename column AS data_model_attribute

### MISSING LOGS SECTION
[critical_start_nr_st_in]
# Combined with `critical_start_nr_st_gen_last_indexed` this eval contains a comma separated, quoted list of sourcetypes to keep track of changes for.
definition =  "critical_start:alert_action:ataportal,splunkd"
iseval = false

[critical_start_nr_st_in_eval]
iseval = false
definition = makeresults | eval sourcetype = split(`critical_start_nr_st_in`, ",") | format

[critical_start_nr_st_gen_last_indexed]
# This a generating search for last indexed times for sourcetypes
# Reads and writes to the cs_st_check kavstore
definition = metadata type=sourcetypes | search [`critical_start_nr_st_in_eval`]

[critical_start_nr_st_gen_last_indexed(1)]
args = idx
definition = metadata type=sourcetypes index=$idx$| search [`critical_start_nr_st_in_eval`]

[critical_start_nr_st_check(1)]
args = rel_time
definition = `critical_start_nr_st_gen_last_indexed` | `calc_filter_time($rel_time$)` | `critical_start_nr_ms_ztap`

[critical_start_nr_st_check(2)]
args = rel_time, idx
definition = `critical_start_nr_st_gen_last_indexed($idx$)`| `calc_filter_time($rel_time$)` | `critical_start_nr_ms_ztap`

[calc_filter_time(1)]
args = threshold
definition =  eval time_diff = relative_time(now(), "$threshold$") | convert ctime(recentTime) as str_recentTime ctime(time_diff) as str_time_diff | eval below_threshold = if(recentTime <= time_diff, "true", "false")  | where below_threshold = "true"

[critical_start_nr_st_show_missing_sourcetypes(1)]
# Run this search to display sourcetypes that have a diff between curreent time and last indexed time greater than the threshold passed
# threshold is a relative time string, eg: "-1d@d"
# recentTime is the last "indextime" of the sourcetype. lastTime is the last "time of the last event seen" of the sourcetype
args = threshold
definition = inputlookup cs_st_check | where sourcetype IN (`critical_start_nr_st_in`) | `calc_filter_time($rel_time$)`
