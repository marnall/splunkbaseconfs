[critical_start_base_index]
search = index=main

[critical_start_aa_index]
search = index=main

[critical_start_error_messages]
search = index=_internal sourcetype="critical_start:*" log_level=ERROR

[critical_start_aa_error_messages]
search = eventtype=critical_start_aa_index sourcetype=critical_start:alert_action:* action=failure

[critical_start_api_errors]
search = (eventtype=critical_start_base_index sourcetype=critical_start:error) OR eventtype=critical_start_error_messages

# Required for CIM ARF
[critical_start_action_modresult]
search = sourcetype=critical_start:alert_action:* eventtype=critical_start_aa_index action=success