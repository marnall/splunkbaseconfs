[GetDepartamento]
definition = lookup employee LOGIN as Username OUTPUT DEPARTAMENTO LOGINGESTOR \
\
| eval GESTOR=LOGINGESTOR\
\
| lookup employee LOGIN as LOGINGESTOR OUTPUT DEPARTAMENTO as DEPARTAMENTO2 \
| eval ADD=if((LOGINGESTOR == NEWGESTOR),"false","true") \
| eval DEPARTAMENTO=if((ADD == "true"),DEPARTAMENTO . " / ".DEPARTAMENTO2,DEPARTAMENTO)\
\
\
| lookup employee LOGIN as LOGINGESTOR OUTPUT LOGINGESTOR as NEWGESTOR\
| lookup employee LOGIN as NEWGESTOR OUTPUT DEPARTAMENTO as DEPARTAMENTO2\
| eval ADD=if((LOGINGESTOR == NEWGESTOR),"false","true") \
| eval DEPARTAMENTO=if((ADD == "true"),DEPARTAMENTO." / ".DEPARTAMENTO2,DEPARTAMENTO)\
| rename NEWGESTOR as LOGINGESTOR\
\
| lookup employee LOGIN as LOGINGESTOR OUTPUT LOGINGESTOR as NEWGESTOR\
| lookup employee LOGIN as NEWGESTOR OUTPUT DEPARTAMENTO as DEPARTAMENTO2\
| eval ADD=if((LOGINGESTOR == NEWGESTOR),"false","true") \
| eval DEPARTAMENTO=if((ADD == "true"),DEPARTAMENTO." / ".DEPARTAMENTO2,DEPARTAMENTO)\
| rename NEWGESTOR as LOGINGESTOR\
\
| lookup employee LOGIN as LOGINGESTOR OUTPUT LOGINGESTOR as NEWGESTOR\
| lookup employee LOGIN as NEWGESTOR OUTPUT DEPARTAMENTO as DEPARTAMENTO2\
| eval ADD=if((LOGINGESTOR == NEWGESTOR),"false","true") \
| eval DEPARTAMENTO=if((ADD == "true"),DEPARTAMENTO." / ".DEPARTAMENTO2,DEPARTAMENTO)\
| rename NEWGESTOR as LOGINGESTOR\
\
| lookup employee LOGIN as LOGINGESTOR OUTPUT LOGINGESTOR as NEWGESTOR\
| lookup employee LOGIN as NEWGESTOR OUTPUT DEPARTAMENTO as DEPARTAMENTO2\
| eval ADD=if((LOGINGESTOR == NEWGESTOR),"false","true") \
