[GetUsuariosAuditoria]
definition = metadata `ArcticaIndex` type=hosts\
| where lastTime>=relative_time(now(), "-365d")\
| table  recentTime host totalCount status\
| eval status=if(recentTime<=relative_time(now(), "-7d"), "WARNING", "OK")\
| convert ctime(recentTime) timeformat="%d/%m/%Y %H:%M:%S"\
| rename recentTime as "UltimoEventoRecebido" totalCount as "EventosEnviados"
iseval = 0

[LinkCorporativoAuto]
definition = index=produtividade (Dominio!="--"AND Dominio!="about:blank") earliest=-1d@d latest=@d \
| eval D=len(Dominio) \
| where D>3 \
| stats count by Dominio DEPARTAMENTO \
| rename Dominio as Url DEPARTAMENTO as Departamento \
| eventstats sum(count) as count2 by Departamento \
\
| eval isCorporate=if((count*100/count2)>5,1,0)\
| fields - count2 count\
\
| append [| inputlookup LinkCorporativo \
| eval word=split(Url, ".") | mvexpand word | stats count values(Url) as Url2 by word | sort - count | search word!="com" AND word!="br" AND word!="org" \
| eventstats sum(count) as total | eval percent=round(count*100/total,2) \
| head 1 \
| fields - Url2 count percent total]\
\
| eventstats values(word) as word\
| where isnotnull(Url)\
\
|eval isCorporate=if(match(Url,word),1,isCorporate) \
| fields - word\
\
| append [| inputlookup LinkCorporativo]\
| dedup Url Departamento\
| outputlookup LinkCorporativo
iseval = 0

