                 find=mvfind(hierarquia, "PRESIDENCIA"),\
                 N5=if(mvindex(hierarquia,find-5) == mvindex(hierarquia,-1) OR find-5<0, null(), mvindex(hierarquia,find-5)), \
                 N4=if(mvindex(hierarquia,find-4) == mvindex(hierarquia,-1) OR find-4<0, null(), mvindex(hierarquia,find-4)),\
                 N3=if(mvindex(hierarquia,find-3) == mvindex(hierarquia,-1) OR find-3<0, null(), mvindex(hierarquia,find-3)),\
                 N2=if(mvindex(hierarquia,find-2) == mvindex(hierarquia,-1) OR find-2<0, null(), mvindex(hierarquia,find-2)),\
                 N1=if(mvindex(hierarquia,find-1) == mvindex(hierarquia,-1) OR find-1<0, null(), mvindex(hierarquia,find-1))\
