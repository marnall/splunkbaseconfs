[default]
[ArcticaAdereciaJornanda(1)]
args = time
definition = lookup AderenciaDepartamento DEPARTAMENTO OUTPUT horaInicio horaFim intervalo\
| fillnull value="09:00" horaInicio\
| fillnull value="18:00" horaFim\
| fillnull value="60" intervalo\
\
| eval horaInicio=(tonumber(mvindex(split(horaInicio, ":"),0))*60) + (tonumber(mvindex(split(horaInicio, ":"),-1)))\
| eval horaFim=(tonumber(mvindex(split(horaFim, ":"),0))*60) + (tonumber(mvindex(split(horaFim, ":"),-1)))\
\
| eval ControleJornada=strftime($time$, "%H:%M")\
| eval ControleJornada=tonumber((tonumber(mvindex(split(ControleJornada, ":"),0))*60) + (tonumber(mvindex(split(ControleJornada, ":"),-1))))\
\
| eval foraJornada = if((ControleJornada>=horaInicio AND ControleJornada<=horaFim), "0", "1")\
\
| eval expectedHours=tonumber(abs(horaFim-horaInicio) - tonumber(ltrim(intervalo)))/60\
\
| eval horaInicio=horaInicio*60, horaFim=horaFim*60, intervalo=tonumber(ltrim(intervalo))\
\
\
| fields - ControleJornada
iseval = 0

[ArcticaAderenciaDepartamentoAUTO]
definition = | inputlookup employee\
| stats count by DEPARTAMENTO\
\
| eval ADERENCIA="86",\
       DESCRICAO=DEPARTAMENTO,\
       GESTOR="seabfab",\
       horaFim="18:00",\
       horaInicio="09:00",\
       intervalo="60"\
| fields - count
iseval = 0

[ArcticaAtividadeNegativa(1)]
args = Username
definition = index=produtividade sourcetype=xOne_Produtividade (NOT Programa=Idle) Username="$Username$"(Programa!="LockApp.exe") N1="*" AND N2="*" AND N3="*" AND N4="*" \
| bin span=1m _time \
\
| join Username Hostname _time type=left \
    [ search index=homeoffice sourcetype="Arctica::HomeOffice::UserKeyboardMouseActivity" Domain="*" Username!="sistema" Username="$Username$"\
    | bin span=1m _time \
    | stats sum(KeyboardActivityCount) as KeyboardActivityCount sum(KeyboardActivitySequenceCount) as KeyboardActivitySequenceCount sum(MouseActivityCount) as MouseActivityCount by _time Hostname Username] \
    \
| bin span=5m _time \
\
| lookup Meeting Programa OUTPUT controle as Meeting \
| fillnull value=0 KeyboardActivityCount MouseActivityCount Meeting \
| lookup AderenciaDepartamento DEPARTAMENTO OUTPUT horaInicio horaFim intervalo \
| fillnull value="09:00" horaInicio \
| fillnull value="18:00" horaFim \
| fillnull value="60" intervalo \
\
\
| eval horaInicio=(tonumber(mvindex(split(horaInicio, ":"),0))*60) + (tonumber(mvindex(split(horaInicio, ":"),-1))) \
| eval horaFim=(tonumber(mvindex(split(horaFim, ":"),0))*60) + (tonumber(mvindex(split(horaFim, ":"),-1))) \
| eval ControleJornada=strftime(_time, "%H:%M") \
| eval ControleJornada=tonumber((tonumber(mvindex(split(ControleJornada, ":"),0))*60) + (tonumber(mvindex(split(ControleJornada, ":"),-1)))) \
| eval foraJornada = if((ControleJornada>=horaInicio AND ControleJornada<=horaFim), "0", "1") \
| eval expectedHours=tonumber(abs(horaFim-horaInicio) - tonumber(ltrim(intervalo)))/60 \
| eval horaInicio=horaInicio*60, horaFim=horaFim*60, intervalo=tonumber(ltrim(intervalo)) \
| fields - ControleJornada \
| eval activity=((KeyboardActivityCount + MouseActivityCount) + Meeting), data=strftime(_time,"%d/%m/%Y") \
\
| eval DEPARTAMENTO=upper(DEPARTAMENTO) \
| stats min(_time) as Inicio max(_time) as Termino max(activity) as activity values(Hostname) as Hostname sum(KeyboardActivityCount) as KeyboardActivityCount sum(MouseActivityCount) as MouseActivityCount sum(KeyboardActivitySequenceCount) as KeyboardActivitySequenceCount values(expectedHours) as expectedHours values(dayoff) as dayoff by _time Username DEPARTAMENTO NOME Versao
iseval = 0

[ArcticaCalcProdutividade]
definition = eval ativo = if (activity > 0 , 1, 0)\
| eval MinuteWork = if (ativo = 1, `ArcticaSpan`, 0)\
\
\
| eval data=strftime(Inicio, "%d/%m/%Y")\
| lookup businessHours.csv data OUTPUT expectedHours\
\
| stats sparkline \
        min(Inicio) as Inicio \
        max(Termino) as Termino \
        max(activity) as activity \
        values(Hostname) as Hostname \
        sum(MinuteWork) as MinuteWork\
        dc(Username) as QtdUser\
        dc(data) as data\
        max(expectedHours) as expectedHours\
        by  DEPARTAMENTO\
\
| eval expectedHours=expectedHours*data\
| eval TrabalhoControle=if((MinuteWork*60)>(Termino-Inicio),(Termino-Inicio),MinuteWork*60)\
| eval windows=Termino-Inicio\
| eval expectedHours=((expectedHours*60*60)*QtdUser), Produtividade=round(TrabalhoControle*100/expectedHours,2)\
| fields - MinuteWork Hostname activity
iseval = 0

[ArcticaCalcProdutividadeDepartamento]
definition = eval ativo = if (activity > 0 , 1, 0)\
| eval MinuteWork = if (ativo = 1, `ArcticaSpan`, 0)\
\
\
\
| eval data=strftime(_time, "%d/%m/%Y")\
| lookup businessHours.csv data OUTPUT dayoff\
\
| eval data=relative_time(_time, "@d")\
\
| eval expectedHours=mvindex(split(expectedHours, "-"),-1)\
| eval expectedHours=if(dayoff=1,0,expectedHours)\
\
| stats sparkline \
        min(Inicio) as Inicio \
        max(Termino) as Termino \
        max(activity) as activity \
        values(Hostname) as Hostname \
        sum(MinuteWork) as MinuteWork\
        dc(Username) as QtdUser\
        dc(data) as data\
        max(expectedHours) as expectedHours\
        by  DEPARTAMENTO\
\
| eval expectedHours=expectedHours*data\
| eval TrabalhoControle=MinuteWork*60\
| eval windows=Termino-Inicio\
| eval expectedHours=((expectedHours*60*60)*QtdUser), \
       Produtividade=if(expectedHours=0, 100, round(TrabalhoControle*100/expectedHours,2))\
| fields - MinuteWork Hostname activity data\
\
\
| eval TrabalhoControle=tostring(TrabalhoControle, "duration"),\
       windows=tostring(windows, "duration")
iseval = 0

[ArcticaCalcProdutividadeUser]
definition = eval ativo=if((activity > 0),1,0) \
| eval MinuteWork=if((ativo == 1),`ArcticaSpan`,0)\
\
\
\
| stats min(Inicio) as Inicio max(Termino) as Termino max(activity) as activity values(Hostname) as Hostname sum(MinuteWork) as MinuteWork values(expectedHours) as expectedHoursDetalhes values(ATIVIDADE_NEGATIVA) as ATIVIDADE_NEGATIVA  by Username NOME DEPARTAMENTO\
\
\
\
| appendpipe [stats dc(expectedHoursDetalhes) as mex values(expectedHoursDetalhes) as expectedHours by Username\
              | mvexpand expectedHours \
              | rex field=expectedHours "(?P<expectedHours>\d$") \
              | stats sum(expectedHours) as expectedHours by Username\
              | eval CalculoExpectedHoures="true"\
              ]\
| eventstats values(expectedHours) as expectedHours by Username \
| where isnull(CalculoExpectedHoures) | fields - CalculoExpectedHoures\
\
\
| eval TrabalhoControle=if((MinuteWork*60)>(Termino-Inicio),(Termino-Inicio),MinuteWork*60)\
\
| eval windows=Termino-Inicio\
| eval expectedHours=(expectedHours*60*60), Produtividade=round(TrabalhoControle*100/expectedHours,2),Produtividade=if(isnull(Produtividade), 100, Produtividade)\
| fields - MinuteWork activity\
\
\
\
\
| eval TrabalhoControle=tostring(TrabalhoControle, "duration"),\
       windows=tostring(windows, "duration")
iseval = 0

[ArcticaCompleteTimeSeconds]
definition = eval CAMPO=0 | foreach * [| eval CAMPO = if(<<FIELD>> > CAMPO, "<<FIELD>>", CAMPO)] | addtotals fieldname="Inatividade" | streamstats window=2 values(_time) as ref | eval time1=mvindex(ref,0), time2=mvindex(ref,-1), spanGet=(time2 - time1), Inatividade=if((Inatividade >= spanGet),0,round((spanGet - Inatividade))) |where spanGet!=Inatividade | fields - ref, spanGet, time1, time2 | eval CAMPO2 = "" | foreach * [| eval <<FIELD>> = if( CAMPO="<<FIELD>>", <<FIELD>> + Inatividade, <<FIELD>>)] | fields - CAMPO CAMPO2 Inatividade | foreach ARC_* [| eval ColumnName="<<FIELD>>" | rex mode=sed field=ColumnName "s/ARC_//g" | rex mode=sed field=ColumnName "s/_/ /g" | eval ColumnName=trim(ltrim(ColumnName)) | eval {ColumnName}=<<FIELD>> | fields - ColumnName] | fields - ARC_*
iseval = 0

[ArcticaConvertTime(1)]
args = time
definition = eval time=$time$, dias=0   \
| rex field=time "(?<dias>\d+)\+"\
| rex field=time "(?<horas>\d+)\:(?<minutos>\d+)\:(?<segundos>\d+)"\
| eval horas=(dias*24+horas) | strcat horas + "h " + minutos + "m " + segundos + "s" ConvertTime\
\
| fields - dias horas minutos segundos time
iseval = 0

