[ArcticaNormalizaTime(1)]
args = field
definition = rex field=$field$ "(?<dias>\d+)\+" | fillnull dias\
| rex field=$field$ "(?<horas>\d+)\:(?<minutos>\d+)\:(?<segundos>\d+)$"\
| eval horas=dias*24 + horas\
| strcat horas + "h " + minutos + "m " + segundos + "s" Ativos\
| fields - field horas minutos segundos\
| rename Ativos as "$field$"
iseval = 0

[ArcticaProgramsApplicationRunning]
definition = eval Username=lower(Username), Hostname=upper(Hostname) | rename Applications{}.Title{}.* as Sub* | eval SubTitle=mvzip(SubSeconds,SubTitle) | mvexpand SubTitle | eval SubSeconds=mvindex(split(SubTitle, ","),0),SubTitle=mvindex(split(SubTitle, ","),-1) | rex mode=sed field=SubTitle "s/-/|/g" | eval ProgramaPipe=upper(trim(ltrim(mvindex(split(SubTitle, "|"), -1)))) | eval Programa=upper(coalesce(ProgramaPipe,coalesce(if(ProcessDescription="null",ProcessName,ProcessDescription),ProcessName))) | fields - ProgramaPipe ProcessName ProcessDescription | eval SubTitle=if(isnull(SubTitle) OR SubTitle="", Programa,SubTitle) | eval SubTitle=upper(SubTitle)
iseval = 0

[ArcticaProgramsRunning]
definition = eval Username=upper(Username), Hostname=upper(Hostname)\
 \
 \
| rename Title{}.* as Sub*\
\
| eval SubTitle=mvzip(SubSeconds,SubTitle) \
| mvexpand SubTitle\
| eval SubSeconds=mvindex(split(SubTitle, ","),0),SubTitle=mvindex(split(SubTitle, ","),-1)\
| rex mode=sed field=SubTitle "s/-/|/g" \
| eval ProgramaPipe=upper(trim(ltrim(mvindex(split(SubTitle, "|"), -1))))\
| eval Programa=upper(coalesce(ProgramaPipe,coalesce(if(ProcessDescription="null",ProcessName,ProcessDescription),ProcessName)))\
\
| eval SubTitle=if(isnull(SubTitle) OR SubTitle="", Programa,SubTitle)\
| fields - ProgramaPipe ProcessName ProcessDescription\
| eval SubTitle=upper(SubTitle)
iseval = 0

[ArcticaSoftwareNaoRespondendo]
definition = index=produtividade "(Não está respondendo)" sourcetype="xOne_Produtividade"\
\
 \
| rex field=Title "- (?<Programa>\w+) \(Não está respondendo\)$"\
| rex field=Title "^(?<Programa2>^[A-Za-z]{3,}) -"\
\
| rex mode=sed field=Title "s/\(Não está respondendo\)//g"\
| eval TitleRef=mvindex(split(Title, " - "), -1), Programa=if(len(Programa)<3,null(), Programa)\
\
| eval ProgramaFull=coalesce(coalesce(Programa,Programa2), TitleRef)\
| eval ProgramaFull=ltrim(mvindex(split(ProgramaFull, " | "), -1))\
| eval ProgramaFull=ltrim(trim(ProgramaFull))\
| stats sum(intervalo) as intervalo by NOME Username CARGO DEPARTAMENTO ProgramaFull Title\
| rename ProgramaFull as Programa\
         DEPARTAMENTO as Departamento\
         Username as Colaborador\
         NOME as Nome\
         CARGO as Cargo
iseval = 0

