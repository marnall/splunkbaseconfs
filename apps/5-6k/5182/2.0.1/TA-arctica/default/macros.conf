[CoporateWord(1)]
args = Url
definition = eval Url="$Url$"\
| eval word=split(Url, ".") | mvexpand word\
| stats count  values(Url) as Url2 by word | sort - count\
| search word!="com" AND word!="br" AND word!="org"\
| eventstats sum(count) as total\
| eval percent=round(count*100/total,2)\
| head 1 \
| fields - Url2 count percent total
iseval = 0

