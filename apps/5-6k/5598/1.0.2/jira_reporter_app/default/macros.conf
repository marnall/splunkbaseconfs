[startedtimefilter(2)]
args = desde,hasta
definition = eval started_time=strptime(started,"%Y-%m-%dT%H:%M:%S.%Q")\
| eval desde=if(isnum($desde$), $desde$, relative_time(now(),$desde$)) \
| eval hasta=if(isnum($hasta$), $hasta$, relative_time(now(),$hasta$)) \
| eval hasta=if(isnull(hasta),now(),hasta)\
| where ((isnull(desde) OR started_time >= desde) AND (isnull(hasta) OR started_time <= hasta))
iseval = 0

[baselinedays(2)]
args = desde,hasta
definition = eval dates= mvrange($desde$,$hasta$,86400)\
| convert ctime(dates) timeformat="%A" \
| eval dates=mvfilter(NOT match(dates,"(Saturday|Sunday)")) \
| eval daycount=mvcount(dates)
iseval = 0

[index_jira_issues]
definition = index=jira
iseval = 0

[index_jira_worklogs]
definition = index=jira
iseval = 0

[issue_done_status]
definition = "fields.status.statusCategory.name"=Listo
iseval = 0

[lookup_user_baseline]
definition = |inputlookup "baseline_hours.csv"
iseval = 0

[baseline_overlay]
definition = eval Baseline-FullTime=8, Baseline-PartTime=6
iseval = 0

[filter_deleted_issues]
definition = NOT ProjectId=10031
iseval = 0

[filter_deleted_worklogs]
definition = NOT issueId=10764
iseval = 0
