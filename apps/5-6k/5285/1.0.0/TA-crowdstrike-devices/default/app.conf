# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 1

[launcher]
author = Bright Consulting
version = 1.0.0
description = Falcon Spotlight Devices Technology Add-on for CrowdStrike is used to receive data from Falcon Spotlight API and to indexes it in Splunk.

[ui]
is_visible = 1
label = Crowdstrike Devices
docs_section_override = AddOns:released

[package]
id = TA-crowdstrike-devices

[triggers]
reload.addon_builder = simple
reload.ta_crowdstrike_devices_account = simple
reload.ta_crowdstrike_devices_settings = simple
reload.passwords = simple

