# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 3

[launcher]
author = Summit Technology Group
version = 2.0.2
description = Developed by Summit Technology Group, the Host Pinger add-on for Splunk gathers the availability metrics from your internal and external hosts by issuing pings at regular intervals. The add-on uses lookup file to easily manage the list of hosts you want to get availability status on.

[ui]
is_visible = 1
label = Host Pinger
docs_section_override = AddOns:released

[package]
id = TA_host_pinger

[triggers]
reload.addon_builder = simple
reload.ta_host_pinger_account = simple
reload.ta_host_pinger_settings = simple
reload.passwords = simple

