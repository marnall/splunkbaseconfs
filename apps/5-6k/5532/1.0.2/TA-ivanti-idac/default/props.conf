[ivanti:idac:json]
CHARSET = UTF-8
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 28
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%7NZ
TIME_PREFIX = "(utc|upload)":"
disabled = false
TZ = UTC
TRUNCATE = 5000
EVAL-src_user = replace(ntuser,".*\x5c","")

[ivanti:idac:wel]
DATETIME_CONFIG = 
KV_MODE = xml
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = true
MAX_TIMESTAMP_LOOKAHEAD = 23
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
TIME_PREFIX = TimeCreated SystemTime='
disabled = false
EXTRACT-various_fields = <Data>(?<code>.*?)<\/Data><Data>(?<utc>.*?)<\/Data><Data>(?<local>.*?)<\/Data><Data>(?<transferred>.*?)<\/Data><Data>(?<machine>.*?)<\/Data><Data>(?<user>.*?)<\/Data><Data>(?<devicetype>.*?)<\/Data><Data>(?<devicename>.*?)<\/Data><Data>(?<label>.*?)<\/Data><Data>(?<strongid>.*?)<\/Data><Data>(?<path>.*?)<\/Data><Data>(?<processname>.*?)<\/Data><Data>(?<other>.*?)<\/Data><Data>(?<reason>.*?)<\/Data><Data>(?<uniqueid>.*?)<\/Data><Data>(?<modelid>.*?)<\/Data><Data>(?<message>.*?)<\/Data><Data>(?<filesize>.*?)<\/Data><Data>(?<filenameonly>.*?)<\/Data><Data>(?<auditevent>.*?)<\/Data><Data>(?<targetuser>.*?)<\/Data><Data>(?<targetcomptr>.*?)<\/Data><Data>(?<target>.*?)<\/Data><Data>(?<audittype>.*?)<\/Data><Data>(?<ntuser>.*?)<\/Data><Data>(?<aduser>.*?)<\/Data><Data>(?<policyid>.*?)<\/Data>
EVAL-filesizebytes = tonumber(filesize,16)
EVAL-src_user = replace(ntuser,".*\x5c","")
SEDCMD-binary = s/<Binary>.*<\/Binary>//g