definition = index=$ind$ sourcetype=$srctyp$ earliest=$earl$ latest=$late$ | fields $REQUEST_AMT$ $TERMINAL_ID$ | stats count AS Transactions, sum($REQUEST_AMT$) AS SUM_REQUEST_AMT max($REQUEST_AMT$) AS MAX_REQUEST_AMT BY $TERMINAL_ID$ | sort - count | head 20
iseval = 0

[mac_ATM_Usage_Table(7)]
args = ind, srctyp, earl, late, REQUEST_AMT, customer_name, TERMINAL_ID
definition = index=$ind$ sourcetype=$srctyp$ earliest=$earl$ latest=$late$  |  stats  count as TransactionCount  SUM($REQUEST_AMT$) AS WithdrawnAmount  MAX($REQUEST_AMT$) AS MaxWithdrawal AVG($REQUEST_AMT$) AS AvgWithdrawal DC($customer_name$) AS CustomerCount by $TERMINAL_ID$ |  eval AvgWithdrawal=ROUND(AvgWithdrawal,0) |  rename $TERMINAL_ID$ as ATM |  sort -TransactionCount
iseval = 0

