definition = index=$ind$ sourcetype=$srctyp$ earliest=$earl$ latest=$late$ | eval Retained=if($CARD_RETAIN_FLAG$>1,$CARD_RETAIN_FLAG$,0) | stats count as TransactionCount sum(Retained) as Retained by $TERMINAL_ID$ | sort -TransactionCount
iseval = 0

[mac_ATM_Suspected_Cloned_Cards_MPH(9)]
args = ind, srctyp, earl, late, Latitude, Longitude, customer_name, PostCode, customer_nam
definition = index=$ind$ sourcetype=$srctyp$ earliest=$earl$ latest=$late$  | table $Latitude$ $Longitude$ $customer_name$ _time $PostCode$ | sort $customer_name$ _time | geodistance latfield=$Latitude$ longfield=$Longitude$ miles=false output_field=DIST haversine=true | table $Latitude$ $Longitude$ $customer_name$ _time DIST $PostCode$ | sort -$customer_nam$ _time | streamstats count by $customer_name$ | streamstats last($Latitude$) as LastLatitude last($Longitude$) as LastLongitude by $customer_name$  current=f | delta _time p=1 AS deltaSeconds | eval Hours=deltaSeconds/60/60 | eval Minutes=deltaSeconds/60 | eval KPHTravelled=DIST/Hours | search count>1 | search DIST>0 | search KPHTravelled>50 | stats MAX(KPHTravelled) AS KPHTravelled by $customer_name$ _time | sort -KPHTravelled limit=12 | table $customer_name$ KPHTravelled
iseval = 0

