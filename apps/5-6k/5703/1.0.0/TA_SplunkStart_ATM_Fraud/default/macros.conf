[mac_ATM_Numerous_Withdrawals(8)]
args = ind, srctyp, earl, late, customer_name, Latitude, Longitude, StreetName
definition = index=$ind$ sourcetype=$srctyp$ earliest=$earl$ latest=$late$  | table $customer_name$ $Latitude$ $Longitude$ $StreetName$ _time  | SORT -$customer_name$ _time | streamstats count by $customer_name$ | geodistance latfield=$Latitude$ longfield=$Longitude$ output_field=DIST haversine=true  | delta _time AS delta  | search delta<=600 count!=1  | stats count by $customer_name$  | sort -count | head 10
iseval = 0

