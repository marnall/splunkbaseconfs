#
# Splunk app configuration file
#

[install]
build = 1
is_configured = 0
state_change_requires_restart = 1

[ui]
is_visible = 1
label = Trend Micro Threat Indicator Assessment for Splunk

[launcher]
author = Trend Micro Inc.
description = Trend Micro Threat Indicator Assessment for Splunk helps customers match latest indicators from Trend Micro threat research with 3rd party EDR telemetry such as Sysmon in their Splunk.
version = 1.0.0

[package]
id = trendmicro_cti_app
check_for_updates = 1

[triggers]
reload.tmcfg = http_get /tmcfg_handler
