# Beyond Identity Tags Configuration
# =================================
# This file defines tags for categorizing and filtering Beyond Identity events.
# Tags are used for searching, reporting, and alerting.

# Authentication Events
[eventtype=beyond_identity_user_authentication]
# Authentication related tags
bi_authentication = enabled
bi_action = enabled
bi_user = enabled
bi_status = enabled
# Security related
bi_security = enabled
bi_risk = enabled
# Device and location
bi_device = enabled
bi_location = enabled
# Performance
bi_performance = enabled

# OIDC Complete Events
[eventtype=beyond_identity_oidc_complete]
# OIDC specific tags
bi_oidc = enabled
bi_authentication = enabled
bi_status = enabled
# Security related
bi_security = enabled

# OIDC Inbound Events
[eventtype=beyond_identity_oidc_inbound]
# OIDC specific tags
bi_oidc = enabled
bi_authentication = enabled
bi_status = enabled
# Security related
bi_security = enabled
# Request details
bi_request = enabled

# Email Status Change Events
[eventtype=beyond_identity_email_status_change]
# Email related tags
bi_email = enabled
bi_status = enabled
# User related
bi_user = enabled
# Security related
bi_security = enabled

# Policy Evaluation Events
[eventtype=beyond_identity_policy]
# Policy and auth related
bi_policy = enabled
bi_authentication = enabled
bi_action = enabled
bi_status = enabled
# Security related
bi_security = enabled
bi_risk = enabled
# Decision making
bi_decision = enabled
