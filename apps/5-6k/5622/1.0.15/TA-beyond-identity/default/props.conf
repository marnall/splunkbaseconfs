# Single sourcetype configuration for all Beyond Identity events
[beyond_identity_log]
DATETIME_CONFIG = CURRENT
EVAL-action = case(outcome=="SUCCESS", "success", outcome=="FAILURE", "failure", outcome=="TIMEOUT", "timeout", outcome=="UNAUTHORIZED", "unauthorized", outcome=="Unkown", "unknown" )
FIELDALIAS-event_time_millis = event_occurred_millis AS event_time_millis
FIELDALIAS-app = service AS app
FIELDALIAS-auth_result = data.auth_result.status AS auth_result
FIELDALIAS-certificate_fingerprint = data.certificate.fingerprint AS certificate_fingerprint
FIELDALIAS-device_model = data.device_info.platform_device_info.hardware.model AS device_model
FIELDALIAS-email_address = data.email_address AS email_address
FIELDALIAS-email_status = data.status AS email_status
FIELDALIAS-file_hash = data.certificate.fingerprint AS file_hash
FIELDALIAS-location = data.geography.geo_display AS location
FIELDALIAS-message_id = data.provider_message_id AS message_id
FIELDALIAS-policy_action = data.action AS policy_action
FIELDALIAS-policy_id = data.result.evaluated_policy_id AS policy_id
FIELDALIAS-policy_result = data.result.allow AS policy_result
FIELDALIAS-session = correlation_id AS session_id
FIELDALIAS-signature = event_type AS signature
FIELDALIAS-status = outcome AS status
FIELDALIAS-user = actor.display_name AS user
FIELDALIAS-user_agent = data.client.user_agent AS user_agent
FIELDALIAS-user_id = actor.id AS user_id

# Map geo fields to CIM-compliant fields
FIELDALIAS-geo_city = data.geography.city AS City
FIELDALIAS-geo_country = data.geography.country AS Country
FIELDALIAS-geo_region = data.geography.subdivisions{0} AS Region
FIELDALIAS-geo_latitude = data.geography.latitude AS lat
FIELDALIAS-geo_longitude = data.geography.longitude AS lon
FIELDALIAS-geo_timezone = data.geography.time_zone AS time_zone
FIELDALIAS-geo_accuracy = data.geography.accuracy_radius AS accuracy_radius

# Map IP to CIM src fields
FIELDALIAS-src = data.client.source_ip AS src
FIELDALIAS-src_ip = data.client.source_ip AS src_ip
FIELDALIAS-src_geo = data.geography.geo_display AS src_geo
FIELDALIAS-src_region = data.geography.subdivisions{0} AS src_region
FIELDALIAS-src_country = data.geography.country AS src_country
FIELDALIAS-src_city = data.geography.city AS src_city
FIELDALIAS-src_lat = data.geography.latitude AS src_lat
FIELDALIAS-src_long = data.geography.longitude AS src_lon

# For CIM compatibility
FIELDALIAS-dest = data.client.auth_origin_host AS dest
FIELDALIAS-dest_host = data.client.auth_origin_host AS dest_host

INDEXED_EXTRACTIONS = json
KV_MODE = json
NO_BINARY_CHECK = 1
category = Structured
description = JavaScript Object Notation format. For more information, visit http://json.org/

# Mapping for historical data (indexed as _json)
# This stanza triggers ONLY for events in the beyond_identity_index
[(?::){0}beyond_identity_index:*]
FIELDALIAS-geo_city = data.geography.city AS City
FIELDALIAS-geo_country = data.geography.country AS Country
FIELDALIAS-geo_latitude = data.geography.latitude AS lat
FIELDALIAS-geo_longitude = data.geography.longitude AS lon
FIELDALIAS-outcome = data.outcome AS outcome
FIELDALIAS-user = data.user.display_name AS user