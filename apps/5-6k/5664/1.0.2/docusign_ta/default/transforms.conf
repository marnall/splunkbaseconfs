[docusign_action_extract]
CLEAN_KEYS = 0
FORMAT = ds_action::$1
REGEX = \"action\":\s\"([^/\"]+)

[docusign_cim_lookup]
batch_index_query = 0
case_sensitive_match = 0
filename = docusign_cim_lookup.csv

[docusign_result_extract]
CLEAN_KEYS = 0
FORMAT = ds_result::$1
REGEX = \"result\"\:\s\"([^/\"]+)

[docusign_alert_lookup]
batch_index_query = 0
case_sensitive_match = 0
filename = docusign_alert_lookup.csv

[docusign_user_lookup]
batch_index_query = 0
case_sensitive_match = 0
filename = docusign_user_lookup.csv

[docusign_country_lookup]
batch_index_query = 0
case_sensitive_match = 0
filename = docusign_country_lookup.csv

[docusign_ip_lookup]
batch_index_query = 0
case_sensitive_match = 0
filename = docusign_ip_lookup.csv
match_type = CIDR(ip)
min_matches = 1

[docusign_count_extract]
CLEAN_KEYS = 0
FORMAT = ds_stat_count::$1
REGEX = \"Count\":\s\"([^/"]+)

[docusign_p98_extract]
CLEAN_KEYS = 0
FORMAT = ds_stat_p98::$1
REGEX = \"Percentile98\":\s\"([^/"]+)

[docusign_stdev_extract]
CLEAN_KEYS = 0
FORMAT = ds_stat_stdev::$1
REGEX = \"SD\":\s\"([^/"]+)

[docusign_avg_extract]
CLEAN_KEYS = 0
FORMAT = ds_stat_avg::$1
REGEX = \"Avg\":\s\"([^/"]+)

[docusign_data_ip_extract]
CLEAN_KEYS = 0
FORMAT = docusign_data_ip::$1
MV_ADD = 1
REGEX = \"Ip\"\:\"([^/"]+)
SOURCE_KEY = data.IpLocations

[docusign_data_country_extract]
CLEAN_KEYS = 0
FORMAT = docusign_data_country::$1
MV_ADD = 1
REGEX = \"Country\"\:\"([^/"]+)
SOURCE_KEY = data.IpLocations

[docusign_data_city_extract]
CLEAN_KEYS = 0
FORMAT = docusign_data_city::$1
MV_ADD = 1
REGEX = \"City\"\:\"([^/"]+)
SOURCE_KEY = data.IpLocations

[docusign_data_lat_extract]
CLEAN_KEYS = 0
FORMAT = docusign_data_lat::$1
MV_ADD = 1
REGEX = \"Latitude\"\:\"([^/"]+)

[docusign_data_lon_extract]
CLEAN_KEYS = 0
FORMAT = docusign_data_lon::$1
MV_ADD = 1
REGEX = \"Longitude\"\:\"([^/"]+)
SOURCE_KEY = data.IpLocations

[docusign_data_state_extract]
CLEAN_KEYS = 0
FORMAT = docusign_data_state::$1
MV_ADD = 1
REGEX = \"State\"\:\"([^/"]+)
SOURCE_KEY = data.IpLocations

[docusign_data_eventid_extract]
CLEAN_KEYS = 0
FORMAT = docusign_data_eventid::$1
MV_ADD = 1
REGEX = \"([^/\"]+)\"
SOURCE_KEY = data.EventIds

[docusign_account_lookup]
batch_index_query = 0
case_sensitive_match = 0
filename = docusign_account_lookup.csv
