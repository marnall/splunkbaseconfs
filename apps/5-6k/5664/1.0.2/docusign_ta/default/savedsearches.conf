dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","accountId","action","data.AffectedMembershipId","data.AffectedUserId","data.DownloadType","data.EnvelopeId","data.EnvelopeSignAction","data.GroupId","data.PermissionProfileId","data.RecipientInfo.DeliveryMethod","data.RecipientInfo.IDCheckRequired","data.RecipientInfo.RecipientId","data.RecipientInfo.RecipientType","data.RecipientInfo.UserId","data.RecipientList{}.DeliveryMethod","data.RecipientList{}.IDCheckRequired","data.RecipientList{}.RecipientId","data.RecipientList{}.RecipientType","data.RecipientList{}.UserId","data.SettingsKey","data.SettingsValue","data.TemplateId","date_hour","date_mday","date_minute","date_month","date_second","date_wday","date_year","date_zone","eventId","field","index","integratorKey","ipAddress","ipAddressLocation.city","ipAddressLocation.country","ipAddressLocation.latitude","ipAddressLocation.longitude","ipAddressLocation.state","linecount","object","organizationId","property","punct","result","site","splunk_server","timeendpos","timestamp","timestartpos","userAgent","userAgentClientInfo.browser.family","userAgentClientInfo.browser.version.major","userAgentClientInfo.browser.version.minor","userAgentClientInfo.browser.version.patch","userAgentClientInfo.device.brand","userAgentClientInfo.device.family","userAgentClientInfo.device.model","userAgentClientInfo.os.family","userAgentClientInfo.os.version.major","userAgentClientInfo.os.version.minor","userId"]
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `docusign_user_data`\
| stats count values(company) as company values(email) as email values(firstName) as firstName values(lastName) as lastName values(jobTitle) as jobTitle values(isAdmin) as isAdmin values(permissionProfileName) as permissionProfileName values(userAddedToAccountDateTime) as AddedDate values(userStatus) as userStatus by userId\
| rex field=email "(?<user>\S+)\@"\
| fields - count\
| outputlookup override_if_empty=false docusign_user_lookup.csv

[DocuSign Alert - Blocklisted Events]
action.email.show_password = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 08 */1 * * *
description = Alert is triggered if any event considered blocklisted in DocuSign occurs. Blocklisted events are determined by the docusign_ip_lookup.csv and docusign_country_lookup.csv.
disabled = 1
dispatch.earliest_time = -2h
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = `docusign_monitor_data` (ip_blocked=true OR country_blocked=true)\
| eval user=coalesce(user,userId)\
| eval account_name=coalesce(account_name, accountId)\
| lookup docusign_user_lookup userId as data.AffectedUserId OUTPUTNEW user AS docusign_data_affected_user\
| eval docusign_data_affected_user=coalesce(affected_user, 'data.AffectedUserId')\
| stats count values(ip_blocked) as ip_blocked values(country_blocked) as country_blocked values(docusign_data_affected_user) as docusign_data_affected_user values(data.EnvelopeId) as docusign_data_envelopeid values(isAdmin) as isAdmin values(email) as email values(company) as company values(account_name) as account_name values(result) as result values(userStatus) as userStatus, values(src) as src by user\
| eval match_type=if(ip_blocked="TRUE", "ip_match", "country_match")\
| nomv docusign_data_affected_user\
| nomv docusign_data_envelopeid\
| eval docusign_data_affected_user=replace(docusign_data_affected_user, "\s", " ||| ")\
| eval docusign_data_envelopeid=replace(docusign_data_envelopeid, "\s", " ||| ")\
| table count user src isAdmin userStatus email result account_name company match_type ip_blocked country_blocked docusign_data_affected_user docusign_data_envelopeid\
| sort - count

