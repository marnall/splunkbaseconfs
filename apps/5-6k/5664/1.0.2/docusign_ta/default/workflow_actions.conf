[docusign_user_workflow]
display_location = both
eventtypes = docusign_monitor_event_type
fields = user
label = workflow to DocuSign - User Investigations dashboard
link.method = get
link.target = blank
link.uri = /app/docusign_app/docusign_user_investigator?form.user=$user$
type = link

[docusign_alert_workflow]
display_location = both
eventtypes = docusign_alert_event_type
fields = user, alert
label = workflow to DocuSign - Alert Investigations dashboard
link.method = get
link.target = blank
link.uri = /app/docusign_app/docusign_alert_investigator?form.user=$user$&form.alert=$alert$
type = link

[docusign_envelope_workflow]
display_location = both
eventtypes = docusign_envelope_event_type
fields = data.EnvelopeId,user
label = workflow to DocuSign - Envelope Investigations dashboard
link.method = get
link.target = blank
link.uri = /app/docusign_app/docusign_envelope_investigator?form.envelopeid=$data.EnvelopeId$
type = link
