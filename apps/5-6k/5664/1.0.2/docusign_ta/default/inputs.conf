[docusign_monitor]
start_by_shell = false
python.version = python3
interval = 300
sourcetype = docusign:monitor
index = default
fetchLimit = 500
authServer = https://account-d.docusign.com/oauth/token
lensUrl = https://lens-d.docusign.net/api/v2.0/datasets/monitor/stream

