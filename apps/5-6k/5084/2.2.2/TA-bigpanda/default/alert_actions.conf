
[bigpanda_alert]
python.version = python3
python.required = 3.9, 3.13
description = Send alerts to BigPanda
label = BigPanda Alert
is_custom = 1
payload_format = json
icon_path = alert_bigpanda_alert.png
param.status = Splunk
param.expires = $alert.expires$
param.user_agent = Splunk/$server.guid$
param.cron_schedule = $cron_schedule$
param.description = $description$
param.next_scheduled_time = $next_scheduled_time$
param.search = $search$
param.trigger_date = $trigger_date$
param.trigger_timeHMS = $trigger_timeHMS$
param.trigger_time = $trigger_time$
param.severity = $alert.severity$

