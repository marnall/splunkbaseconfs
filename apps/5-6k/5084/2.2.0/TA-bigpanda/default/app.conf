# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 8

[launcher]
author = BigPanda
version = 2.2.0
description = The BigPanda App for Splunk allows you to trigger BigPanda incidents from Saved-Search Alerts by using the Custom Alert Actions capability in Splunk. This provides a dashboard to manage your Splunk alerts sending to BigPanda all of your Splunk alerts, making it easier than ever to correlate all of your alerts in BigPanda.

[ui]
is_visible = 1
label = BigPanda
docs_section_override = AddOns:released

[package]
id = TA-bigpanda

[triggers]
reload.addon_builder = simple
reload.ta_bigpanda_account = simple
reload.ta_bigpanda_settings = simple
reload.passwords = simple

