# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 1

[launcher]
author = Prewin Thomas
version = 1.0.0
description = This app provides critical health overview status of your Splunk

[ui]
is_visible = 1
label = Splunk Health Status
docs_section_override = AddOns:released

[package]
id = TA-splunk-health-status

[triggers]
reload.addon_builder = simple
reload.ta_splunk_health_overview_account = simple
reload.ta_splunk_health_overview_settings = simple
reload.passwords = simple