[Additional Headroom]
search = index=_introspection host=* sourcetype=splunk_resource_usage component=Hostwide\
| rename data.cpu_idle_pct as idle_pct\
| stats avg(idle_pct) as hroom\
| eval hroom = if (hroom > 1, round(hroom), 1)\
| rename hroom AS "Additional Headroom"

[Search Concurrency]
search = index=_introspection host=* sourcetype=splunk_resource_usage component=PerProcess data.search_props.sid::*\
| eval process='data.process', args='data.args', pid='data.pid', ppid='data.ppid', elapsed='data.elapsed', mem_used='data.mem_used', mem='data.mem', pct_memory='data.pct_memory', pct_cpu='data.pct_cpu', sid='data.search_props.sid', app='data.search_props.app', label='data.search_props.label', type='data.search_props.type', mode='data.search_props.mode', user='data.search_props.user', role='data.search_props.role', label=if(isnotnull('data.search_props.label'),'data.search_props.label',""), provenance=if(isnotnull('data.search_props.provenance'),'data.search_props.provenance',"unknown"), search_head=case((isnotnull('data.search_props.search_head') AND ('data.search_props.role' == "peer")),'data.search_props.search_head',(isnull('data.search_props.search_head') AND ('data.search_props.role' == "head")),"_self",(isnull('data.search_props.search_head') AND ('data.search_props.role' == "peer")),"_unknown")\
| bin _time span=1s\
| stats dc(sid) AS distinct_search_count by _time, type\
| stats avg(distinct_search_count) AS sh_concurrency

[Ad Hoc Searches Count]
search = index=_audit host=* sourcetype=audittrail action=search search_id!="*rsa_*" search_id!="*subsearch*"\
| search NOT (search_id = "SummaryDirector_" OR search_id = *_scheduler_* OR search_id = *_alert_*)\
| eval search_lt = if(search_lt = "N/A", 864000, search_lt)\
| eval search_et = if(search_et = "N/A", 0, search_et)\
| eval tr = search_lt - search_et\
| search tr<=86400\
| stats dc(search_id) as ad_hoc_searches_count\
| appendcols\
    [ search index=_audit host=* action=search sourcetype=audittrail search_id!="*rsa_*" search_id!="*subsearch*"\
    | stats dc(search_id) as daily_search_count]\
| eval ratio = ad_hoc_searches_count*100/daily_search_count\
| chart values(ratio) as "Ad Hoc Searches"

[Historical Data Searches]
search = index=_audit host=* sourcetype=audittrail action=search search_id!="*rsa_*" search_id!="*subsearch*"\
| eval search_lt = if(search_lt = "N/A", 864000, search_lt)\
| eval search_et = if(search_et = "N/A", 0, search_et)\
| eval tr = search_lt - search_et\
| search tr>86400\
| stats dc(search_id) as searches_timerange_more_than_1_day\
| appendcols\
    [ search index=_audit host=* action=search sourcetype=audittrail search_id!="*rsa_*" search_id!="*subsearch*"\
    | stats dc(search_id) as daily_search_count]\
| eval ratio = searches_timerange_more_than_1_day*100/daily_search_count\
| chart values(ratio) as "Historical Data Searches"

[Historical Data Searches - ES]
search = index=_audit host=* sourcetype=audittrail action=search search_id!="*rsa_*" search_id!="*subsearch*"\
| search NOT (search_id = "SummaryDirector_" OR search_id = *_scheduler_* OR search_id = *_alert_*)\
| eval search_lt = if(search_lt = "N/A", 864000, search_lt)\
| eval search_et = if(search_et = "N/A", 0, search_et)\
| eval tr = search_lt - search_et\
| search tr>86400\
| stats dc(search_id) as ad_hoc_searches_count\
| appendcols\
    [ search index=_audit host=* action=search sourcetype=audittrail search_id!="*rsa_*" search_id!="*subsearch*"\
    | stats dc(search_id) as daily_search_count]\
| eval ratio = ad_hoc_searches_count*100/daily_search_count\
| chart values(ratio) as "Historical Data Searches"

[Scheduled/Data Model Acceleration Searches]
search = index=_audit host=* action=search sourcetype=audittrail search_id!="*rsa_*" search_id!="*subsearch*"\
| search search_id = "SummaryDirector_" OR search_id = *_scheduler_* OR search_id = *_alert_*\
| stats dc(search_id) as scheduled_search_count\
| appendcols\
    [ search index=_audit host=* action=search sourcetype=audittrail search_id!="*rsa_*" search_id!="*subsearch*"\
    | stats dc(search_id) as daily_search_count]\
| eval ratio = scheduled_search_count*100/daily_search_count\
| chart avg(ratio) as "Scheduled/Data Model Acceleration Searches"

[Physical CPU Cores, Memory Size (GB)]
search = | rest splunk_server=* /services/server/info \
| fields serverName, numberOfCores, numberOfVirtualCores, physicalMemoryMB\
| rename numberOfCores as numberOfPhysicalCores\
| eval physicalMemoryGB = round(physicalMemoryMB/1024)\
| table serverName, numberOfPhysicalCores, numberOfVirtualCores, physicalMemoryGB

[Daily Search Count]
search = `earliest` latest=@d index=_audit host=* action=search sourcetype=audittrail search_id!="*rsa_*" search_id!="*subsearch*"\
| timechart span=1d dc(search_id) AS "Daily Search Count"\
| stats perc95("Daily Search Count") AS "Daily Search Count"
workload_pool = undefined

[Daily Indexing Volume]
search = `earliest` latest=@day index=_internal source="*/license_usage.log" type=Usage b=*\
 | timechart span=1day sum(b) AS size\
 | stats perc95(size) AS size\
 | eval size = round( size / pow( 1024 , 3 ) , 2 ) . " GB"

[Sourcetypes & Daily Ingestion Volume - ES]
search = `earliest` latest=@day index=_internal source="*/license_usage.log" type=Usage b=* st=*\
| bin span=1day _time\
| stats sum(b) AS size BY _time, st\
| stats perc95(size) AS size BY st\
| eval size = round( size / pow( 1024 , 3 ) , 2 )\
| sort - size
workload_pool = undefined

[Correlation Search - ES]
search = `earliest` latest=@day\
index=_audit host=* sourcetype=audittrail action=search info=completed savedsearch_name="*Rule"\
| stats dc(savedsearch_name) as correlation_search_count

[Built-in Saved Search - ES]
search = `earliest` latest=@day\
index=_audit host=* sourcetype=audittrail action=search info=completed savedsearch_name!=*_ACCELERATE_* savedsearch_name!="" savedsearch_name!="*Rule" savedsearch_id="*SplunkEnterpriseSecuritySuite*"\
| timechart span=1day dc(savedsearch_name) AS built_in_saved_search_count\
| stats perc95(built_in_saved_search_count) AS built_in_saved_search_count

[Daily Search Count - ES]
search = `earliest` latest=@day\
index=_audit action=search sourcetype=audittrail search_id!="*rsa_*" search_id!="*subsearch*"\
| timechart span=1day dc(search_id) AS "Daily Search Count"\
| stats perc95("Daily Search Count") AS "Daily Search Count"

[Ad Hoc Searches Metrics - ES]
search = `earliest` latest=@day\
index=_audit host=* sourcetype=audittrail action=search info=completed savedsearch_name="" search_id!="*_scheduler_*" search_id!="*_summarize_*" search_id!="*SummaryDirector*" search_id!='subsearch_*'\
| timechart span=1day count AS ad_hoc_search\
| stats perc95(ad_hoc_search) AS ad_hoc_search

[Saved Search Metrics - ES]
search = `earliest` latest=@day\
index=_audit host=* sourcetype=audittrail action=search info=completed savedsearch_name!=*_ACCELERATE_* savedsearch_name!="" savedsearch_name!="*Rule" savedsearch_id!="*SplunkEnterpriseSecuritySuite*"\
| stats dc(savedsearch_name) as user_defined_saved_search_count

[Storage Information]
search = | rest splunk_server=* /services/server/status/partitions-space\
| join type=outer splunk_server, mount_point\
    [| rest splunk_server=* /services/server/status/resource-usage/iostats\
    | eval iops = round(reads_ps + writes_ps)\
    | fields splunk_server, mount_point, iops, cpu_pct]\
| eval free = if(isnotnull(available), available, free)\
| eval usage = round((capacity - free) / 1024, 2)\
| eval capacity = round(capacity / 1024, 2)\
| eval compare_usage = usage." / ".capacity\
| eval pct_usage = round(usage / capacity * 100, 2)\
| stats first(fs_type) as fs_type first(compare_usage) as compare_usage first(pct_usage) as pct_usage, first(iops) as iops, first(cpu_pct) as cpu_pct by mount_point\
| rename mount_point as "Mount Point", fs_type as "File System Type", compare_usage as "Disk Usage (GB)", capacity as "Capacity (GB)", pct_usage as "Disk Usage (%)", iops as "I/O operations per second", cpu_pct as "I/O Bandwidth Utilization(%)"
