[snmptrap]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = true
KV_MODE = auto
EXTRACT-local_color = enterprises\.41916\.100\.1\.10?0\.0\s=\sSTRING:\s"(?<local_color>[^"]*)
EXTRACT-remote_color = enterprises\.41916\.100\.1\.10?2\.0\s=\sSTRING:\s"(?<remote_color>[^"]*)
EXTRACT-remote_system_ip = enterprises.41916.100.1.101.0\s=\sSTRING:\s"(?<remote_system_ip>[^"]*)
EXTRACT-mean_loss = enterprises.41916.100.1.103.0\s=\sGauge32:\s(?<mean_loss>\d+)
EXTRACT-mean_latency = enterprises.41916.100.1.104.0\s=\sGauge32:\s(?<mean_latency>\d+)
EXTRACT-sla_classes = enterprises.41916.100.1.105.0\s=\sSTRING:\s"(?<sla_classes>[^"]*)
EXTRACT-mean_jitter = enterprises.41916.100.1.137.0\s=\sGauge32:\s(?<mean_jitter>\d+)
EXTRACT-old_sla_classes = enterprises.41916.100.1.153.0\s=\sSTRING:\s\"(?<old_sla_classes>[^"]*)
EXTRACT-notification_severity = enterprises.41916.100.1.2.0\s=\sINTEGER:\s(?<notification_severity>\d+)
EXTRACT-source_ip = enterprises\.41916\.100\.1\.9?4\.0\s=\sSTRING:\s"(?<source_ip>[^"]*)
EXTRACT-dest_ip = enterprises\.41916\.100\.1\.9?5\.0\s=\sSTRING:\s"(?<dest_ip>[^"]*)
EXTRACT-proto = enterprises\.41916\.100\.1\.9?6\.0\s=\sINTEGER:\s(?<proto>\d+)
EXTRACT-source_port = enterprises.41916.100.1.97.0\s=\sGauge32:\s(?<source_port>\d+)
EXTRACT-dest_port = enterprises\.41916\.100\.1\.9?8\.0\s=\sGauge32:\s(?<dest_port>\d+)
EXTRACT-local_system_ip = enterprises\.41916\.100\.1\.9?9\.0\s=\sSTRING:\s\"(?<local_system_ip>[^"]*)
EXTRACT-event_time = enterprises\.41916\.100\.1\.1\.0\s=\sHex-STRING:\s(?P<event_time>[0-9|A-F|\s]*)\s\s+SNMP
EXTRACT-deleted = enterprises\.41916\.100\.1\.126\.0\s=\sINTEGER:\s(?<deleted>\d+)
EXTRACT-flap_reason = enterprises\.41916\.100\.1\.164\.0\s=\sINTEGER:\s(?<flap_reason>\d+)
EXTRACT-new_state = enterprises\.41916\.100\.1\.13\.0\s=\sINTEGER:\s(?<new_state>\d+)
EXTRACT-severity = enterprises\.41916\.100\.1\.2\.0\s=\sINTEGER:\s(?<severity>\d+)
EXTRACT-system_ip = enterprises\.41916\.100\.1\.11\.0\s=\sSTRING:\s"(?<system_ip>[^"]*)
LOOKUP-snmptrap_snmpTrapOID_0_lookup = snmptrap_snmpTrapOID_0_lookup snmpTrapOID_0 AS snmpTrapOID_0 OUTPUTNEW description2 AS description2 type AS type weight AS weight
LOOKUP-snmptrap_source_ip_dest_ip_lookup = snmptrap_source_ip_dest_ip_lookup dest_ip AS dest_ip source_ip AS source_ip OUTPUTNEW description1 AS description1 rule_group AS rule_group test_group AS test_group


[thousandeyes:alerts]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
description = Thousandeyes JSON TEST
pulldown_type = 1
LOOKUP-thousandeyes_alert.testId_lookup = thousandeyes_alert.testId_lookup "alert.testId" AS "alert.testId" OUTPUTNEW test_group AS test_group
LOOKUP-thousandeyes_ruleId_lookup = thousandeyes_ruleId_lookup "alert.ruleId" AS "alert.ruleId" OUTPUTNEW category AS category description AS description include AS include rule_group AS rule_group score AS score weight AS weight

[thousandeyes:enriched_alerts]
DATETIME_CONFIG = CURRENT
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
description = ThousandEyes enhanced alerts
pulldown_type = true
LOOKUP-thousandeyes_enriched_testId_lookup = thousandeyes_alert.testId_lookup "alert.testId" AS testId OUTPUTNEW test_group AS test_group
LOOKUP-thousandeyes_enriched_ruleId_lookup = thousandeyes_ruleId_lookup "alert.ruleId" AS ruleId OUTPUTNEW category AS category description AS description include AS include rule_group AS rule_group score AS score weight AS weight

[snow:incident]
EXTRACT-correlation_id = ,correlation_id=\"(?<correlation_id>[^\"]*)

