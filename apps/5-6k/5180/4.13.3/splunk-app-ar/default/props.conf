[source::.../var/log/splunk/splunk-app-ar*.log]
sourcetype = splunk_app_ar_internal_log

[splunk_app_ar_internal_log]
DATETIME_CONFIG =
description = Splunk App AR Internal Log
ANNOTATE_PUNCT = false
MAX_TIMESTAMP_LOOKAHEAD = 23
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = true
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S,%3N

[splunk_edgehub]

[edge_hub_ot]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
description = Sensor Data from the Edge Hub
pulldown_type = 1
EVAL-native_protocol = "proprietary"
EVAL-statistic = "average"
EVAL-statistic_period_seconds = 1
FIELDALIAS-value = "edgehub.sensor.eCO2" ASNEW value "edgehub.sensor.gas" ASNEW value "edgehub.sensor.gyro_x" ASNEW value "edgehub.sensor.gyro_y" ASNEW value "edgehub.sensor.gyro_z" ASNEW value "edgehub.sensor.humidity" ASNEW value "edgehub.sensor.iaq" ASNEW value "edgehub.sensor.light" ASNEW value "edgehub.sensor.sound" ASNEW value
EVAL-name = case(isnotnull('edgehub.sensor.light'), "light",      isnotnull('edgehub.sensor.eCO2'), "co2",      isnotnull('edgehub.sensor.sound'), "sound",      isnotnull('edgehub.sensor.pressure'), "pressure",      isnotnull('edgehub.sensor.humidity'), "humidity",      isnotnull('edgehub.sensor.gyro_x'), "angular_velocity_x",      isnotnull('edgehub.sensor.gyro_y'), "angular_velocity_y",      isnotnull('edgehub.sensor.gyro_z'), "angular_velocity_z",      isnotnull('edgehub.sensor.acc_x'), "acceleration_x",      isnotnull('edgehub.sensor.acc_y'), "acceleration_y",      isnotnull('edgehub.sensor.acc_z'), "acceleration_z",      isnotnull('edgehub.sensor.temperature'), "temperature", isnotnull('edgehub.sensor.iaq'), "iaq", isnotnull('edgehub.sensor.gas'), "b-VOC")
FIELDALIAS-host_name = host ASNEW nt_host
EVAL-location = "/Cisco/Splunk/Edge Hubs/" . hub_name
FIELDALIAS-metric_value = "edgehub.sensor.acc_x" ASNEW metric_value "edgehub.sensor.acc_y" ASNEW metric_value "edgehub.sensor.acc_z" ASNEW metric_value "edgehub.sensor.eCO2" ASNEW metric_value "edgehub.sensor.gas" ASNEW metric_value "edgehub.sensor.gyro_x" ASNEW metric_value "edgehub.sensor.gyro_y" ASNEW metric_value "edgehub.sensor.gyro_z" ASNEW metric_value "edgehub.sensor.humidity" ASNEW metric_value "edgehub.sensor.iaq" ASNEW metric_value "edgehub.sensor.light" ASNEW metric_value "edgehub.sensor.pressure" ASNEW metric_value "edgehub.sensor.sound" ASNEW metric_value "edgehub.sensor.temperature" ASNEW metric_value
EVAL-metric_name = case(isnotnull('edgehub.sensor.light'), "light", isnotnull('edgehub.sensor.eCO2'), "co2", isnotnull('edgehub.sensor.sound'), "sound", isnotnull('edgehub.sensor.pressure'), "pressure", isnotnull('edgehub.sensor.humidity'), "humidity", isnotnull('edgehub.sensor.gyro_x'), "angular_velocity_x", isnotnull('edgehub.sensor.gyro_y'), "angular_velocity_y", isnotnull('edgehub.sensor.gyro_z'), "angular_velocity_z", isnotnull('edgehub.sensor.acc_x'), "acceleration_x", isnotnull('edgehub.sensor.acc_y'), "acceleration_y", isnotnull('edgehub.sensor.acc_z'), "acceleration_z", isnotnull('edgehub.sensor.temperature'), "temperature", isnotnull('edgehub.sensor.iaq'), "iaq", isnotnull('edgehub.sensor.gas'), "b-VOC")
EVAL-metric_unit = case(isnotnull('edgehub.sensor.light'), "lux", isnotnull('edgehub.sensor.eCO2'), "parts_per_million", isnotnull('edgehub.sensor.sound'), "decibel", isnotnull('edgehub.sensor.pressure'), "pascal", isnotnull('edgehub.sensor.humidity'), "percent", isnotnull('edgehub.sensor.gyro_x'), "degree/second", isnotnull('edgehub.sensor.gyro_y'), "degree/second", isnotnull('edgehub.sensor.gyro_z'), "degree/second", isnotnull('edgehub.sensor.acc_x'), "meter/second^2", isnotnull('edgehub.sensor.acc_y'), "meter/second^2", isnotnull('edgehub.sensor.acc_z'), "meter/second^2", isnotnull('edgehub.sensor.temperature'), "celsius", isnotnull('edgehub.sensor.iaq'), "iaq", isnotnull('edgehub.sensor.gas'), "parts_per_million")
LOOKUP-edge_hub_device_map = edge_hub_device_map hub_name AS hub_name OUTPUT asset_id AS device_id, asset_name AS asset_name, zone AS zone, asset_name AS site_name, building AS building, device_type AS device_type, floor AS floor, hub_name AS device_name, site AS site, subsystem AS system, vertical AS vertical

[source::edgehub/builtin/light/values]
EVAL-description = "Illuminance measured at " + 'hub_name'
EVAL-type = "illuminance"
EVAL-units = "lux"

[source::edgehub/builtin/temperature/values]
EVAL-value = (5*('edgehub.sensor.temperature'-32))/9
EVAL-description = "Temperature measured at " + 'hub_name'
EVAL-native_units = "fahrenheit"
EVAL-type = "temperature"
EVAL-units = "celsius"

[source::edgehub/builtin/sound/values]
EVAL-description = "Sound level measured at " + 'hub_name'
EVAL-type = "sound_level"
EVAL-units = "decibel"

[source::edgehub/builtin/eCO2/values]
EVAL-description = "CO2 level measured at " + 'hub_name'
EVAL-type = "concentration"
EVAL-units = "parts_per_million"

[source::edgehub/builtin/pressure/values]
EVAL-description = "Atmospheric pressure measured at " + 'hub_name'
EVAL-type = "atmospheric_pressure"
EVAL-units = "pascal"
EVAL-value = 100*'edgehub.sensor.pressure'

[source::edgehub/builtin/humidity/values]
EVAL-description = "Humidity percentage measured at " + 'hub_name'
EVAL-type = "humidity_relative"
EVAL-units = "percent"

[source::edgehub/builtin/gyroscope/values]
EVAL-type = "angular_velocity"
EVAL-units = "degree/second"
EVAL-description = case(isnotnull('edgehub.sensor.gyro_x'), "Angular velocity (X) - pitch - measured at ",      isnotnull('edgehub.sensor.gyro_y'), "Angular velocity (Y) - roll - measured at ",      isnotnull('edgehub.sensor.gyro_z'), "Angular velocity (Z) - yaw - measured at ") + 'hub_name'

[source::edgehub/builtin/accelerometer/values]
EVAL-description = case(isnotnull('edgehub.sensor.acc_x'), "Acceleration (X) measured at ",      isnotnull('edgehub.sensor.acc_y'), "Acceleration (Y) measured at ",      isnotnull('edgehub.sensor.acc_z'), "Acceleration (Z) measured at ") + 'hub_name'
EVAL-type = "acceleration"
EVAL-units = "meter/second^2"
EVAL-value = coalesce('edgehub.sensor.acc_x', 'edgehub.sensor.acc_y', 'edgehub.sensor.acc_z') * 0.0098
EVAL-native_units = "gravitational_acceleration"

[source::edgehub/builtin/iaq/values]
EVAL-description = "Indoor Air Quality measured at " + 'hub_name'
EVAL-type = "iaq"
EVAL-units = "air quality index"

[source::edgehub/builtin/gas/values]
EVAL-description = "Biogenic Volatine Organic Compound gas measured at " + 'hub_name'
EVAL-type = "b-voc"
EVAL-units = "parts_per_million"

[meraki:sensorreadingshistory]
FIELDALIAS-name = metric ASNEW name
FIELDALIAS-value = "battery.percentage" ASNEW value "humidity.relativePercentage" ASNEW value "temperature.celsius" ASNEW value
EVAL-type = case(     metric=="battery", "battery_relative",     metric=="humidity", "humidity_relative",     true(), metric )
EVAL-units = case(     metric=="battery", "percent",     metric=="humidity", "percent",     metric=="temperature", "celsius")
EVAL-description = case(metric=="battery", "Sensor battery level measured at ",      metric=="temperature", "Temperature measured at ",      metric=="humidity", "Humidity level measured at ") + 'serial'
FIELDALIAS-nt_host = serial ASNEW nt_host
EVAL-location = "/Cisco/Meraki/Organization" . organizationId . "/" . serial
