[edgehub_hubs_lookup]
collection = hubs
external_type = kvstore
fields_list = _key,serial,name

[edgehub_datastreamers_lookup]
collection = edge_datastreamer_settings
external_type = kvstore
fields_list = _key,topics,index,source_type

[edge_hub_device_map]
filename = edge_hub_device_map.csv
match_type = WILDCARD(hub_name)
case_sensitive_match = false
max_matches = 1
