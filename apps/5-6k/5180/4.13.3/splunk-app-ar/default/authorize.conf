# refer to https://docs.splunk.com/Documentation/Splunk/9.4.0/Security/Rolesandcapabilities

# OTI App Capabilities
[capability::edge_view_hubs]
[capability::edge_update_hubs]
[capability::edge_view_hec_settings]
[capability::edge_update_hec_settings]
[capability::edge_register_hub]
[capability::edge_request_hub_update]
[capability::edge_view_configurations]
[capability::edge_update_configurations]

[role_admin]
edge_view_hubs = enabled
edge_update_hubs = enabled
edge_view_hec_settings = enabled
edge_update_hec_settings = enabled
edge_register_hub = enabled
edge_request_hub_update = enabled
edge_view_configurations = enabled
edge_update_configurations = enabled

[role_sc_admin]
edge_view_hubs = enabled
edge_update_hubs = enabled
edge_view_hec_settings = enabled
edge_update_hec_settings = enabled
edge_register_hub = enabled
edge_request_hub_update = enabled
edge_view_configurations = enabled
edge_update_configurations = enabled

[role_edge_hub_admin]
importRoles = edge_hub_deployer
edge_update_hec_settings = enabled

[role_edge_hub_deployer]
importRoles = edge_hub_viewer
edge_update_hubs = enabled
edge_register_hub = enabled
edge_request_hub_update = enabled
edge_update_configurations = enabled

[role_edge_hub_viewer]
importRoles = user
edge_view_hubs = enabled
edge_view_hec_settings = enabled
edge_view_configurations = enabled
