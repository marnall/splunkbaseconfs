[spancontrol(1)]
args = d
definition = case($d$<43500, "30s", $d$>43499 AND $d$<86500, "1m", $d$>86499 AND $d$<173000, "5m", $d$>172999 AND $d$<259200, "10m", $d$>259199 AND $d$<432500, "15m", $d$>432500, "30m")
iseval = 0

[lineartrend(2)]
args = x,y
definition = eventstats count as numevents sum($x$) as sumX sum($y$) as sumY sum(eval($x$*$y$)) as sumXY sum(eval($x$*$x$)) as sumX2 sum(eval($y$*$y$)) as sumY2 | eval slope=((numevents*sumXY)-(sumX*sumY))/((numevents*sumX2)-(sumX*sumX)) | eval yintercept= (sumY-(slope*sumX))/numevents | eval newY=(yintercept + (slope*$x$)) | eval R=((numevents*sumXY) - (sumX*sumY))/sqrt(((numevents*sumX2)-(sumX*sumX))* ((numevents*sumY2)-(sumY*sumY))) | eval R2=R*R
iseval = 0

[forecastviz(4)]
args = ft, hb, v, ci
definition = eval _ft=$ft$, _hb=$hb$, _vars="$v$", _ci=$ci$
iseval = 0

[edgehub_name]
definition = | lookup edgehub_hubs_lookup _key as host OUTPUT _key as hub_id, name as hub_name\
| lookup edgehub_hubs_lookup serial as host OUTPUT name as serial_name, serial as serial_number\
| eval hub_label = if(host=hub_id,hub_name,if(host=serial_number,serial_name." (".serial_number.")",host." *"))
iseval = 0 