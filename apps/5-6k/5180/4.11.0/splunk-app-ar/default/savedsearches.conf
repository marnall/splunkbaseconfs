[Splunk Edge Hub - Acc_X Anomaly]
action.ssg_mobile_alert = 1
action.ssg_mobile_alert.param.alert_dashboard_id = https://127.0.0.1:8089/servicesNS/nobody/splunk-app-ar/data/ui/views/splunk_edge_hub_sensor_dashboard
action.ssg_mobile_alert.param.alert_message = Acc_X anomaly from $result.host$
action.ssg_mobile_alert.param.alert_recipients = 
action.ssg_mobile_alert.param.alert_severity = 4
action.ssg_mobile_alert.param.alert_subject = Acc_X Anomaly
action.ssg_mobile_alert.param.dashboard_toggle = 1
alert.suppress = 1
alert.suppress.period = 3m
alert.track = 0
counttype = number of events
cron_schedule = */1 * * * *
dispatch.earliest_time = -30s
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = edgehub
request.ui_dispatch_view = search
search = |mstats avg(acc_x) WHERE index="edge_hub_data" type="anomaly_detector" span=5min by metric_name host
disabled = 1

