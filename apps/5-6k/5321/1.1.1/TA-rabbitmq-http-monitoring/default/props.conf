[source::...ta-rabbitmq-http-monitoring*.log*]
sourcetype = tarabbitmqhttpmonitoring:log

[source::...ta_rabbitmq_http_monitoring*.log*]
sourcetype = tarabbitmqhttpmonitoring:log

[rabbitmq:overview]
FIELDALIAS-aob_gen_rabbitmq_overview_alias_1 = node AS host
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[rabbitmq:channels]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
EXTRACT-src_ip,src_port,dest_ip,dest_port = ^(?:[^"\n]*"){9}(?P<src_ip>[^:]+):(?P<src_port>\d+)\s+\->\s+(?P<dest_ip>[^:]+):(?P<dest_port>\d+)

[rabbitmq:queues]
FIELDALIAS-aob_gen_rabbitmq_queues_alias_2 = node AS host
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[rabbitmq:nodes]
FIELDALIAS-aob_gen_rabbitmq_nodes_alias_1 = {}.name AS host
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

