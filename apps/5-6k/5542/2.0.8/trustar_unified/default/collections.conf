# Note to TruSTAR Developers (users can ignore):
#    This config file is produced entirely by TruSTAR, not by the addonbuilder.
#
#    It does not need to be updated when modifying the addonbuilder project file.


[trustar_ip_intel]
field.ip                        = string
field.domain                    = string
field.description               = string
field.address                   = string
field.city                      = string
field.country                   = string
field.postal_code               = string
field.state_prov                = string
field.organization_name         = string
field.organization_id           = string
field.registration_time         = time
field.threat_key                = string
field.time                      = time
field.weight                    = number
field.disabled                  = bool
field.updated                   = bool

[trustar_http_intel]
field.http_version              = string
field.http_method               = string
field.http_content_type         = string
field.http_referrer             = string
field.http_user_agent           = string
field.http_user_agent_length    = number
field.status                    = number
field.cookie                    = string
field.header                    = string
field.data                      = string
field.url                       = string
field.url_length                = number
field.uri_path                  = string
field.uri_query                 = string
field.ip                        = string
field.domain                    = string
field.description               = string
field.threat_key                = string
field.time                      = time
field.weight                    = number
field.disabled                  = bool
field.updated                   = bool

[trustar_email_intel]
field.alias                 = string
field.received_time         = time
## Email Sender
field.src_user              = string
## Actual Email sender in case of spoofing
field.actual_src_user       = string
field.recipient             = string
field.actual_recipient      = string
field.subject               = string
field.body                  = string
field.embedded_domain       = string
field.embedded_ip           = string
field.file_name             = string
field.file_hash             = string
field.file_size             = string
field.attachment_type       = string
## Received From IP
field.src                   = string
field.description           = string
field.threat_key            = string
field.time                  = time
field.weight                = number
field.disabled              = bool
field.updated               = bool

[trustar_file_intel]
## file_name does include the file extension
field.file_name                 = string
field.file_extension            = string
## file_path should not include file_name
field.file_path                 = string
field.file_hash                 = string
field.file_size                 = number
field.description               = string
field.threat_key                = string
field.time                      = time
field.weight                    = number
field.disabled                  = bool
field.updated                   = bool

[trustar_registry_intel]
field.registry_hive             = string
## registry_path may or may not include the key_name at the end
field.registry_path             = string
field.registry_key_name         = string
field.registry_value_name       = string
field.registry_value_data       = string
## registry_value_text is the ASCII representation of registry_value_data
field.registry_value_text       = string
field.registry_value_type       = string
field.registry_modified_time    = time
field.user                      = string
field.description               = string
field.threat_key                = string
field.time                      = time
field.weight                    = number
field.disabled                  = bool
field.updated                   = bool

[trustar_unified_checkpointer]
field.state = string
