# Note to TruSTAR Developers (users can ignore):
#    This config file is produced entirely by TruSTAR, not by the addonbuilder.
#
#    It does not need to be updated when modifying the addonbuilder project file.


[shclustering]

# Ensures the app's configs can be modified by a user logged into any node
# in a SHC and that node will replicate those configs to all nodes in the
# cluster.

conf_replication_include.trustar_unified_settings = true
conf_replication_include.trustar_unified_account = true
conf_replication_include.inputs = true
