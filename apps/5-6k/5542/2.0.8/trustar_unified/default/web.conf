# This file is created by Splunk's Addonbuilder but TruSTAR modifies it
# Splunk's automated inspector/validator flags something in the last stanza.
# TruSTAR's version makes no changes to that stanza, only puts a comment
# next to it to inform Splunk's human inspectors that that stanza is automatically
# produced by the addonbuilder.
#
# This file needs to be updated in TruSTAR's source code every time TruSTAR
# makes modifications to the Addonbuilder project file.  Developer needs to
# merge differences between the version produced by the AOB and the version in
# TruSTAR's repo's "src/modified_aob_files/default/" dir.


[expose:trustar_unified_account]
pattern = trustar_unified_account
methods = POST, GET

[expose:trustar_unified_account_specified]
pattern = trustar_unified_account/*
methods = POST, GET, DELETE

[expose:trustar_unified_settings]
pattern = trustar_unified_settings
methods = POST, GET

[expose:trustar_unified_settings_specified]
pattern = trustar_unified_settings/*
methods = POST, GET, DELETE

[expose:trustar_unified_trustar_observables_to_kvstores]
pattern = trustar_unified_trustar_observables_to_kvstores
methods = POST, GET

[expose:trustar_unified_trustar_observables_to_kvstores_specified]
pattern = trustar_unified_trustar_observables_to_kvstores/*
methods = POST, GET, DELETE


# Splunk app inspect flags this stanza as a warning, but we at TruSTAR did not add this, it was
# added by the Splunk add on builder.
[expose:_splunkd_data]
pattern = data/*
methods = GET
