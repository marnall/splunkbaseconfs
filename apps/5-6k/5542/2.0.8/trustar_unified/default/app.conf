# this add-on is powered by splunk Add-on builder
# Note to TruSTAR Developers (users can ignore):
#
#    Spec for app.conf:
#
#       https://docs.splunk.com/Documentation/Splunk/latest/Admin/Appconf
#       https://dev.splunk.com/enterprise/docs/developapps/manageknowledge/customconfigfiles/#Changes-to-custom-configuration-files-after-an-app-update
#
#    This file is created by Splunk's Addonbuilder but TruSTAR modifies it
#    because we need to be able to specify state_change_requires_restart = false because
#    Splunk vetting team recommended this change so restract is not required after the
#    app is installed, updated, enabled, or disabled.
#
#    version needs to be updated for every new release
#
#    This file needs to be updated in TruSTAR's source code every time TruSTAR
#    makes modifications to the Addonbuilder project file.  Developer needs to
#    merge differences between the version produced by the AOB and the version in
#    TruSTAR's repo's "src/modified_aob_files/default/" dir.


[install]
state_change_requires_restart = false
is_configured = false
state = enabled
build = 12

[launcher]
author = Splunk - TruSTAR
version = 2.0.8
description = All-in-one app & TA that provides Cyber Threat Intel Management capabilities to search heads with ES or without ES.  Modinput fetches CTI observables from TruSTAR's Station platform, option to store them in either TruSTAR KVStore collections, or Splunk ES Threat Intel KVStores for ES users. Alert Action to submit any Splunk event to TruSTAR as a report.  Adaptive Response Action to enrich ES notables generated by Threat Activity Detected correlation search.  Workflow Action that deeplinks a new browser tab to TruSTAR page for a particular observable.

[ui]
is_visible = 1
label = TruSTAR Unified
docs_section_override = AddOns:released

[package]
id = trustar_unified

[triggers]
reload.addon_builder = simple
reload.trustar_unified_account = simple
reload.trustar_unified_settings = simple
reload.passwords = simple
