# Note to TruSTAR Developers (users can ignore):
#    This config file is produced entirely by TruSTAR, not by the addonbuilder.
#
#    It does not need to be updated when modifying the addonbuilder project file.

[research_in_trustar]
type = link
label = Research in TruSTAR:  $@field_value$
fields = host, hostname, host_name, *_ip*, *_ip, clientip, src, SRC, dest, DEST, source, dest, domain, *_url*, *_url, url, uri, uri_path, sha1, sha256, md5, *_hash_*, *_hash, hash_*, file, filename, file_name, path, file_path, filepath, file_location, registry_key, reg_key, rkey
display_location = field_menu
disabled = False
link.uri = https://station.trustar.co/browse/search?q=$@field_value$
link.target = blank
link.method = get
