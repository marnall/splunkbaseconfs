# Note to TruSTAR Developers (users can ignore):
#    This config file is produced entirely by TruSTAR, not by the addonbuilder.
#
#    It does not need to be updated when modifying the addonbuilder project file.


[trustar_email_intel]
collection = trustar_email_intel
external_type = kvstore
fields_list = _key,description,alias,received_time,src_user,actual_src_user,recipient,actual_recipient,subject,body,embedded_domain,embedded_ip,file_name,file_hash,file_size,attachment_type,src,threat_key,time,weight,disabled,updated
reverse_lookup_honor_case_sensitive_match = false

[trustar_file_intel]
collection  = trustar_file_intel
external_type = kvstore
fields_list = _key,description,file_name,file_extension,file_path,file_hash,file_size,threat_key,time,weight,disabled,updated
reverse_lookup_honor_case_sensitive_match = false

[trustar_http_intel]
collection = trustar_http_intel
external_type = kvstore
fields_list = _key,description,http_version,http_method,http_content_type,http_referrer,http_user_agent,http_user_agent_length,status,cookie,header,data,url,url_length,uri_path,uri_query,ip,domain,threat_key,time,weight,disabled,updated
reverse_lookup_honor_case_sensitive_match = false

[trustar_ip_intel]
collection = trustar_ip_intel
external_type = kvstore
fields_list = _key,ip,description,domain,address,city,country,postal_code,state_prov,organization_name,organization_id,registration_time,threat_key,time,weight,disabled,updated
reverse_lookup_honor_case_sensitive_match = false

[trustar_registry_intel]
collection = trustar_registry_intel
external_type = kvstore
fields_list = _key,description,registry_hive,registry_path,registry_key_name,registry_value_name,registry_value_data,registry_value_text,registry_value_type,registry_modified_time,user,threat_key,time,weight,disabled,updated
reverse_lookup_honor_case_sensitive_match = false
