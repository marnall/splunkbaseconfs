##################
# neo4j commands
##################

[gsearch-command]
syntax      = gsearch (query=<query>)* (account=<account>)? (fields=<comma sepearted list>)?
shortdesc = Connect to and run a query on a Neo4j server based on the output of the previous <spl>.
description = Connect to and run a query on a Neo4j server and return results based on splunk output. This command is a reportingcommand.
example1 = <spl>| gsearch query="<regular cypher query>"
comment1 = Run cypher query ignoring the output of the "<spl>" and run against the default account ("neo4j").
example2 = <spl>| gsearch query="MATCH (a:Server {cpu_count: splunk.cpu_count}) RETURN a.name"  account="test" fields="cpu_count"
comment2 = Run a cypher query that refers to the output of the "<spl>" against the test account. The <fields> parameter specifies the wanted fields from the "<spl>" and they can be refered to from within the cypher query by "splunk.<splunkfield>". For the cypher gurus when using the <fields> parameter the following is done wihtin the code: "tx.run("UNWIND $splunkraw AS splunk "+query, splunkraw=input)"
maintainer = lekanneer
usage = public
related = gsearchgen, gpath
tags = neo4j_commands

[gsearchgen-command]
syntax      = gsearchgen (query=<query>)* (account=<account>)?
shortdesc = Connect to and run a query on a Neo4j server.
description = Connect to and run a query on a Neo4j server and return results. This command is generatingcommand and is ignoring the input from previous results.
example1 =  | gsearchgen query="MATCH (n)-[r]->(m) RETURN n,r,m" account="neo4j"
comment1 = Run cypher query that returns all nodes with relations on the given account.
maintainer = lekanneer
usage = public
related = gsearch, gpath
tags = neo4j_commands

[gpath-command]
syntax      = gpath (query=<query>)* (account=<account>)? (output=<cmdb|services|entities|itsi|delta>)? (entities=<comma seperated list of labels that should be marked as entities>)? (serviceentities=<comma seperated list of labels that should be marked as both entities and services>)? (labelfield=<neo4j label attribute to use>)? (servicedescriptionfield=<field for servicedescription>)? (servicetagfields=<comma seperated list of fields for ServiceTags>)? (servicetemplate=<field for ServiceTemplate>)? (entityaliasses=<comma seperated list of fields for Entity Aliasses>)? (entitydescription=<field for Entity Description>)? (entityinfos=<comma seperated list of fields for Entity Information>)? (entitytype=<field for Entity Type>)?
shortdesc = Connect to and run a path query on a Neo4j server.
description = Connect to and run a query on a Neo4j server and return path results.
example1 =  |gpath query="MATCH pa=(:BusinessService)<--(:Application)-->(:Server)  RETURN pa"
comment1 = Run cypher query that returns all nodes with relations for the given path
maintainer = elekanne
usage = public
related = gsearch, gsearchgen
tags = neo4j_commands
