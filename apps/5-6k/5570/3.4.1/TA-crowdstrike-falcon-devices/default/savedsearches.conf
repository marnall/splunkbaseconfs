[CrowdStrike Falcon Devices Indexed vs Event Time]
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_app = TA-crowdstrike-falcon-devices
request.ui_dispatch_view = search
search = `cs_fd_get_index` | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S")  | eventstats count by "Indexed Time"  | rename  count as "Number of CrowdStrike Devices"  | eval "Devices Event Time" = strftime(_time, "%Y-%m-%d %H:%M:%S")|table "Indexed Time", "Devices Event Time", "Number of CrowdStrike Devices" |sort  -"Indexed Time"
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
description = Shows when the CrowdStrike Falcon Device data was indexed, the event timestamp and the count of events. Timespan needs to be large enough to include the Event Time stamp.
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
dispatchAs = user

[CrowdStrike Falcon Devices Indexed Events per Minute]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
description = Shows the count of CrowdStrike Falcon Device events indexed per minute by the indexed timestamp. Timespan needs to be large enough to include the Event Time stamps of the events
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatchAs = user
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-falcon-devices
request.ui_dispatch_view = search
search = `cs_fd_get_index`| bucket "_indextime" span=1m   | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S")  | eval "Devices Event Time" = strftime(_time, "%Y-%m-%d %H:%M:%S")| chart count by "Indexed Time" | sort -"Indexed Time"

