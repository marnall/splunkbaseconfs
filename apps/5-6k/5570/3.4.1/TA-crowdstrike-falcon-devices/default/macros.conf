
[cs_fd_get_index]
definition = index=*
iseval = 0

[cs_fd_device_hostname(1)]
args = hostname
definition = `cs_fd_get_index` falcon_device.hostname=$hostname$ | dedup falcon_device.device_id
iseval = 0

[cs_fd_device_id(1)]
args = aid
definition = `cs_fd_get_index` falcon_device.device_id=$aid$ | dedup falcon_device.device_id
iseval = 0

[cs_fd_device_ip(1)]
args = ip_address
definition = `cs_fd_get_index` falcon_device.external_ip IN ($ip_address$) OR falcon_device.local_ip IN ($ip_address$) | dedup falcon_device.device_id
iseval = 0

[cs_fd_logs]
definition = index=_internal (sourcetype="tacrowdstrikefalcondevices:log") OR (source=*splunkd.log crowdstrike_falcon_devices (ERROR OR WARN))
iseval = 0
