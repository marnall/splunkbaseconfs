[source::...ta-crowdstrike-falcon-devices*.log*]
sourcetype = tacrowdstrikefalcondevices:log
TRUNCATE = 0

[source::...ta_crowdstrike_falcon_devices*.log*]
sourcetype = tacrowdstrikefalcondevices:log
TRUNCATE = 0

[crowdstrike:device:json]
EVAL-ip = mvfilter(match(mvappend('falcon_device.local_ip', 'falcon_device.external_ip'), ".+"))
EVAL-vendor_product = trim(coalesce('falcon_device.system_manufacturer', "")." ".coalesce('falcon_device.system_product_name', ""))
FIELDALIAS-mac = falcon_device.mac_address ASNEW mac
FIELDALIAS-os = falcon_device.os_version ASNEW os
FIELDALIAS-serial = falcon_device.serial_number ASNEW serial
FIELDALIAS-src_ip = falcon_device.local_ip ASNEW src_ip
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 35
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%Z
TIME_PREFIX = "Timestamp_value"\s*:\s*"
TZ = UTC
TRUNCATE = 0
category = security
pulldown_type = 1

