#Eventtypes for FA

[purestorage:flasharray:*]
DATETIME_CONFIG = NONE
INDEXED_EXTRACTIONS = JSON
detect_trailing_nulls = auto
SHOULD_LINEMERGE = false
KV_MODE = none
AUTO_KV_JSON = false

[purestorage:flasharray:vgroup]
TIME_PREFIX = "time":
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
FIELDALIAS-volume_group_list = volume_names{} AS volume_name_list
EVAL-data_reduction = coalesce(data_reduction, 'space.data_reduction')
EVAL-input_per_sec = coalesce(input_per_sec, read_bytes_per_sec)
EVAL-output_per_sec = coalesce(output_per_sec, write_bytes_per_sec)
EVAL-size = coalesce(size, 'space.total_provisioned')
EVAL-total = coalesce(total, 'space.total_physical')
EVAL-snapshots = coalesce(snapshots, 'space.snapshots')
EVAL-mirrored_input_per_sec = coalesce(mirrored_input_per_sec, mirrored_write_bytes_per_sec)
EVAL-volumes = coalesce(member, 'space.unique')

[purestorage:flasharray:snapshots]
DATETIME_CONFIG = CURRENT
EVAL-snapshots = coalesce(snapshots, 'space.snapshots')
EVAL-volume = coalesce(volume, 'volume_source.name')

[purestorage:flasharray:volumes]
TIME_PREFIX = "time":
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
EVAL-data_reduction = coalesce(data_reduction, 'space.data_reduction')
EVAL-input_per_sec = coalesce(input_per_sec, read_bytes_per_sec)
EVAL-output_per_sec = coalesce(output_per_sec, write_bytes_per_sec)
EVAL-size = coalesce(size, 'space.total_provisioned')
EVAL-total = coalesce(total, 'space.total_physical')
EVAL-volumes = coalesce(volumes, 'space.unique')
EVAL-snapshots = coalesce(snapshots, 'space.snapshots')
EVAL-mirrored_input_per_sec = coalesce(mirrored_input_per_sec, mirrored_write_bytes_per_sec)

[purestorage:flasharray:pod]
TIME_PREFIX = "time":
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
EVAL-data_reduction = coalesce(data_reduction, 'space.data_reduction')
EVAL-input_per_sec = coalesce(input_per_sec, read_bytes_per_sec)
EVAL-output_per_sec = coalesce(output_per_sec, write_bytes_per_sec)
EVAL-size = coalesce(size, 'space.total_provisioned')
EVAL-total = coalesce(total, 'space.total_physical')
EVAL-volumes = coalesce(volumes, 'space.unique')
EVAL-snapshots = coalesce(snapshots, 'space.snapshots')
EVAL-shared_space = coalesce(snapshots, 'space.shared')
EVAL-mirrored_input_per_sec = coalesce(mirrored_input_per_sec, mirrored_write_bytes_per_sec)

[purestorage:flasharray:array]
TIME_PREFIX = "time":
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
EVAL-data_reduction = coalesce(data_reduction, 'space.data_reduction')
EVAL-provisioned = coalesce(provisioned, 'space.total_provisioned')
EVAL-shared_space = coalesce(shared_space, 'space.shared')
EVAL-system = coalesce(system, 'space.system')
EVAL-thin_provisioning = coalesce(thin_provisioning, 'space.thin_provisioning')
EVAL-total_reduction = coalesce(total_reduction, 'space.total_reduction')
EVAL-total = coalesce(total, 'space.total_physical')
EVAL-volumes = coalesce(volumes, 'space.unique')
EVAL-snapshots = coalesce(snapshots, 'space.snapshots')
EVAL-input_per_sec = coalesce(input_per_sec, read_bytes_per_sec)
EVAL-output_per_sec = coalesce(output_per_sec, write_bytes_per_sec)
EVAL-mirrored_input_per_sec = coalesce(mirrored_input_per_sec, mirrored_write_bytes_per_sec)

[purestorage:flasharray:audit]
TIME_PREFIX = "opened":
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
EVAL-component_type = coalesce(component_type, command)
EVAL-event = coalesce(event, subcommand)
EVAL-audit_name = coalesce(name, id)
EVAL-opened = coalesce(opened, time)
FIELDALIAS-origin_name = origin.name as origin_name

[purestorage:flasharray:login]
TIME_PREFIX = "opened":
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
EVAL-component_type = coalesce(component_type, user_interface)
EVAL-expected = coalesce(expected, method)
EVAL-opened = coalesce(opened, start_time)

[purestorage:flasharray:alerts]
TIME_PREFIX = "opened":
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
EVAL-current_severity = coalesce(current_severity, severity)
EVAL-event = coalesce(event, issue)
EVAL-opened = coalesce(opened, created)
EVAL-alert_name = coalesce(name, id)

[purestorage:flasharray:pgroups]
DATETIME_CONFIG = CURRENT
FIELDALIAS-volumes_list = volumes{} AS volumes_list
EVAL-snapshots = coalesce(snapshots, 'space.snapshots')

[purestorage:flasharray:hosts]
DATETIME_CONFIG = CURRENT
# iqn comes in API v1.x and iqns in v2.x
EVAL-host_iqn = coalesce('iqn{}', 'iqns{}')
# wwn comes in API v1.x and wwns in v2.x
EVAL-host_wwn = coalesce('wwn{}', 'wwns{}')
# nqn comes in API v1.x and nqns in v2.x
EVAL-host_nqn = coalesce('nqn{}', 'nqns{}')
EVAL-hgroup = coalesce(hgroup, 'host_group.name')
EVAL-size = coalesce(size, 'space.total_provisioned')
EVAL-snapshots = coalesce(snapshots, 'space.snapshots')
EVAL-thin_provisioning = coalesce(thin_provisioning, 'space.thin_provisioning')
EVAL-total_reduction = coalesce(total_reduction, 'space.total_reduction')
EVAL-data_reduction = coalesce(data_reduction, 'space.data_reduction')
FIELDALIAS-vol = vols{} AS vol
# volumes comes in API v1.x and space.unique in v2.x
EVAL-volumes = coalesce(volumes, 'space.unique')
# Source and Sourcetype for Pure1

[source::pure1:*]
SHOULD_LINEMERGE = 0
TRUNCATE = 0
KV_MODE = json
DATETIME_CONFIG = NONE

[purestorage:pure1:flashblade:inventory]
FIELDALIAS-associated_array_account = account.name as associated_array_account
FIELDALIAS-associated_array_resource_type = account.resource_type as associated_array_resource_type
FIELDALIAS-every_rules_for_array = rules{}.every as every_rules_for_array
FIELDALIAS-at_rules_for_array = rules{}.at as at_rules_for_array
FIELDALIAS-keep_rules_for_array = rules{}.keep_for as keep_rules_for_array

[purestorage:pure1:flasharray:snapshots]
FIELDALIAS-snapshot_group_resource_type = snapshot_group.resource_type as snapshot_group_resource_type
FIELDALIAS-snapshot_group_name = snapshot_group.name as snapshot_group_name

[purestorage:pure1:flasharray:volumes]
FIELDALIAS-pod_name = pod.name as pod_name
FIELDALIAS-pod_id = pod.id as pod_id

