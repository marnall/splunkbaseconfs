# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 6

[launcher]
author = Patricio Martelo
version = 1.0.0
description = This add-on collects and decodes sFlow samples and generates JSON-formatted events for each sample. It has sample dashboards that enrich event data with reverse DNS as well as ethertype, IP protocol and port number lookups. You can choose whether you want to look at underlay stats or VXLAN overlay stats. It supports Q-tagged as well as Q-in-Q tagged underlay encapsulation and VXLAN overlay encapsulation.

[ui]
is_visible = 1
label = sFlow Analyzer for Splunk
docs_section_override = AddOns:released

[package]
id = TA-sflow-analyzer-for-splunk

[triggers]
reload.addon_builder = simple
reload.ta_sflow_analyzer_for_splunk_account = simple
reload.ta_sflow_analyzer_for_splunk_settings = simple
reload.passwords = simple

