[indexed_omni_field_job_id]
REGEX = \"job_id\"\:\ \"([\d]+)\"
FORMAT = job_id::$1
WRITE_META = true

[indexed_omni_field_state]
REGEX = \"state\"\:\ \"([\d]+)\"
FORMAT = state::$1
WRITE_META = true

