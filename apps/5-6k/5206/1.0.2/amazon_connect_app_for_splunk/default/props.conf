[aws:connect:s3:reports]
INDEXED_EXTRACTIONS = csv
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Structured
description = Connect scheduled historic reports (CSV)
pulldown_type = 1

[aws:connect:cloudwatch:metrics]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Metrics
description = Connect cloudwatch metrics
pulldown_type = 1
disabled = false
EXTRACT-queue_name = QueueName=(?P<queue_name>[^"]+)

[aws:connect:cloudwatchlogs]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
description = Connect contact flow logs
pulldown_type = 1
SHOULD_LINEMERGE = false
disabled = false

[aws:contactlens:s3]
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Structured
description = Contact Lens analysis events
pulldown_type = 1

[aws:connect:ccp]
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIME_PREFIX = \"timestamp\":
category = Custom
description = Amazon Connect CCP Call Logs
pulldown_type = 1
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 30

