

[gw_error_broken_pipe]
definition = index=_internal host=splunkHOST sourcetype=google:* NOT "Data for dates later" NOT evt=* BrokenPipeError  | bin _time as BTime span=5m  | stats count values(error_message) as error_message earliest(_time) as time_error_earliest latest(_time) as time_error_latest by host BTime  | convert ctime(time_*) as time_*  | append maxtime=60 maxout=50000 timeout=60  [ search index=_audit action=splunkStarting sourcetype=audittrail host=splunkHOST  | bin _time as BTime span=5m  | stats values(*) as * earliest(_time) as time_starting_earliest latest(_time) as time_starting_latest by host BTime  | convert ctime(time_*) as time_*]  | stats values(*) as * by host BTime  | table host count error_message time_* action 

[google_workspace]
definition = eventtype=google_workspace

[gw_load_domains]
definition = metasearch eventtype=google_workspace | eval domain = mvindex(split(host,":"), -1) | stats count by domain

[gw_possible_user_usage_duplicates]
definition = `google_workspace` sourcetype="google:workspaces:usage:user" | stats count by entity.userEmail date | where count > 1

[gw_possible_customer_usage_duplicates]
definition = `google_workspace` sourcetype="google:workspaces:usage:customer"| stats count by entity.customerId date | where count > 1

[gw_checkpoints(1)]
args       = input_type
definition = rest /servicesNS/-/google_workspace_for_splunk/checkpoints input_type=$input_type$ splunk_server=local| fields input_type filename *| fields - author published title id updated splunk_server | convert ctime(file_mod_time) ctime(last_execution) timeformat="%Y-%m-%d %H:%M:%S"