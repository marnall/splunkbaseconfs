

[source:...ga_api_metadata.log]
sourcetype = google:workspaces:ga_api_metadata

[google:workspaces:alerts]
EVAL-alert_source       = json_extract(_raw, "source")
EVAL-domain             = replace(host, "google:workspaces:","")
TRUNCATE                = 999999
KV_MODE                 = json
MAX_TIMESTAMP_LOOKAHEAD = 75
TIME_PREFIX             = "createTime":
# 2021-02-16T17:21:03.398832Z
TIME_FORMAT             = %Y-%m-%dT%H:%M:%S.%6NZ

[google:workspaces:admin:report:login]
TRUNCATE                         = 999999
#REPORT-gappsjson                = google_workspaces_ext_json
KV_MODE                          = json
## Updated to fix ASA-2
MAX_TIMESTAMP_LOOKAHEAD          = 50
TIME_PREFIX                      = "time":
TIME_FORMAT                      = %Y-%m-%dT%H:%M:%S.%3NZ
TZ                               = UTC
FIELDALIAS-ipAddr                = ipAddress AS src
EVAL-domain                      = replace(host,"google:workspaces:","")
# Should be 2015-11-11T14:56:17.875Z
EVAL-vendor                      = "Google Workspace"
FIELDALIAS-sig                   = events{}.parameters{}.login_type AS signature
FIELDALIAS-user                  = actor.email AS user
EVAL-app                         = "Google Workspace login"
FIELDALIAS-authentication_method = "events{}.parameters{}.multiValue{}" ASNEW authentication_method
FIELDALIAS-source                = ipAddress ASNEW src
FIELDALIAS-user_id               = "actor.email" ASNEW user_id
FIELDALIAS-type                  = "events{}.type" ASNEW signature
EVAL-action                      = case('events{}.name'="login_success","success",'events{}.name'="login_failure","failure",'events{}.name'="login_challenge","challenge",'events{}.name'="logout","logout",'events{}.name'="suspicious_login","suspicious_login")

[google_workspace_for_splunk:error]
rename = google:workspaces:error

[google:workspaces:bigquery:table:data]
TRUNCATE                = 999999
KV_MODE                 = json
MAX_TIMESTAMP_LOOKAHEAD = 50
TIME_PREFIX             = "bigquery_time_field":

