

[googleworkspaces_alerts]
search = eventtype=google_workspace sourcetype=google:workspaces:alerts

[googleworkspaces_token]
search = eventtype=google_workspace  sourcetype=google:workspaces:admin:report:token

[googleworkspaces_drive]
search = eventtype=google_workspace sourcetype=google:workspaces:admin:report:drive

[google_workspace]
search = index IN (main)

[modgoogleworkspace-pubsub_results]
search = eventtype=google_workspace sourcetype=googleworkspace:alert_action:googleworkspace-pubsub

[modgoogleworkspace-vault-matter_results]
search = eventtype=google_workspace sourcetype=googleworkspace:alert_action:googleworkspace-vault-matter

[googleworkspace_error]
search = (eventtype=google_workspace sourcetype="google_workspace_for_splunk:error" ) OR (eventtype=googleworkspace_internal)

[googleworkspace_internal]
search = index=_internal sourcetype=google*

[googleworkspace_known_error_report]
search = index=_internal sourcetype=google:workspaces:modularinput:usage_report log_level=ERROR function=_get_*_usage_report_day

[googleworkspace_known_error]
search = eventtype = googleworkspace_known_error_*

[googleworkspaces_usage]
search = eventtype=google_workspace sourcetype=google:workspaces:usage:*

[googleworkspaces_usage_customer]
search = eventtype=google_workspace sourcetype="google:workspaces:usage:customer" source=google:workspaces:*

[googleworkspaces_usage_user]
search = eventtype=google_workspace sourcetype=google:workspaces:usage:user

[googleworkspaces_usage_chrome]
search = eventtype=google_workspace sourcetype=google:workspaces:usage:chrome

[googleworkspaces_usage_directory]
search = eventtype=google_workspace sourcetype=google:workspaces:usage:directory

[googleworkspaces_report_calendar]
search = eventtype=google_workspace sourcetype="google:workspaces:admin:report:calendar"

[googleworkspaces_report_login]
search = eventtype=google_workspace sourcetype="google:workspaces:admin:report:login"

[googleworkspaces_report_admin]
search = eventtype=google_workspace sourcetype="google:workspaces:admin:report:admin"

[googleworkspaces_report_drive]
search = eventtype=google_workspace sourcetype="google:workspaces:admin:report:drive"

[gw_spreadsheets]
search = eventtype=google_workspace sourcetype=google:workspaces:spreadsheets:*

[modgoogleworkspace-write-big-query_results]
search = eventtype=google_workspace sourcetype=googleworkspace:alert_action:googleworkspace-write-big-query