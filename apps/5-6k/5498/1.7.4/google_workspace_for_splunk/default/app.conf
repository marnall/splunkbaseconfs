

[diag]
extension_script = Diag.py

[id]
name    = google_workspace_for_splunk
version = 1.7.4

[install]
is_configured = 0

[launcher]
author      = alacercogitatus
description = The Google Workspace For Splunk App will connect to your Google Workspace instance and pull configured data for the domain
version     = 1.7.4

[package]
check_for_updates = 1
id                = google_workspace_for_splunk

[triggers]
reload.apl_logging                = simple
reload.application_settings       = simple
reload.google_workspace_settings  = simple
reload.googleworkspacecredentials = simple
reload.proxy                      = simple

[ui]
is_visible = true
label      = Google Workspace For Splunk