# interval: max 86400 seconds (24 hours)
# disabled: change to false to start the input, requires restart
[script://$SPLUNK_HOME/etc/apps/lacework/bin/setupReload.sh]
disabled = false
interval = 86400
passAuth = splunk-system-user
sourcetype = _json
send_index_as_argument_for_path = false
start_by_shell = false
python.version = python3