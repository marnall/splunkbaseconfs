[host_cves]
external_type = kvstore
case_sensitive_match = false
collection = host_cves
fields_list = _key, cve, target

[aws_account]
external_type = kvstore
case_sensitive_match = false
collection = aws_account
fields_list = _key, account_id, account_type, account_desc

[gcp_account]
external_type = kvstore
case_sensitive_match = false
collection = gcp_account
fields_list = _key, account_id, project_id, account_type, subs_id, account_desc

[azure_account]
external_type = kvstore
case_sensitive_match = false
collection = azure_account
fields_list = _key, account_id, subs_id, account_desc, account_type
