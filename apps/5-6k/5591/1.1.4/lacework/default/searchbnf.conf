[lacework-command]
syntax = lacework (<lacework-option>)*
shortdesc = Use the Lacework GET API
description = Use the Lacework GET API.  Must specify API target URI
usage = public
example1 = lacework target="/api/v1/external/vulnerabilities/host"
comment1 = Lists the common vulnerabilities and exposures (CVEs) found in the hosts of your Lacework environment
example2 = lacework target ="/api/v2/ReportRules"
comment2 = Returns the report rules as specified by the Lacework API

[lacework-option]
syntax = target=<string>
description = API target URI