[Key_Metrics_reco0n_summary]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 30 14 * * *
description = Populate Key Metrics data for reco0n Recon Summary
dispatch.earliest_time = -1d@d
dispatch.latest_time = -0d@d
enableSched = 1
search = index=rec0n_summary earliest=-14d@d latest=-0d@d `web_crypt`\
    | where web_crypt="no" \
    | stats count as http_count by client_ip server_ip \
    | sort 1 -http_count \
    | eval http_top_result=client_ip + " to " + server_ip \
    | table http_top_result \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d `web_crypt`\
        | where web_crypt="no" \
        | stats count(_time) as http_lastweek \
        | table http_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d `web_crypt`\
        | where web_crypt="no" \
        | stats count(_time) as http_previousweek \
        | table http_previousweek ] \
    | eval http_change=http_lastweek - http_previousweek \
    | eval http_change_perc = (http_change / http_previousweek) * 100 \
    | eval http_change_perc_complete = printf("%d%%",http_change_perc) \
    | eval http_change_perc_complete = if(http_lastweek>http_previousweek, "+" + http_change_perc_complete, http_change_perc_complete) \
    | table http_top_result http_lastweek http_previousweek http_change_perc_complete \
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d `web_crypt`\
    | where web_crypt="yes" \
    | stats count as https_count by client_ip server_ip \
    | sort 1 -https_count \
    | eval https_top_result=client_ip + " to " + server_ip \
    | table https_top_result \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d `web_crypt`\
        | where web_crypt="yes" \
        | stats count(_time) as https_lastweek \
        | table https_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d `web_crypt`\
        | where web_crypt="yes" \
        | stats count(_time) as https_previousweek \
        | table https_previousweek ] \
    | eval https_change=https_lastweek - https_previousweek \
    | eval https_change_perc = (https_change / https_previousweek) * 100 \
    | eval https_change_perc_complete = printf("%d%%",https_change_perc) \
    | eval https_change_perc_complete = if(https_lastweek>https_previousweek, "+" + https_change_perc_complete, https_change_perc_complete) \
    | table https_top_result https_lastweek https_previousweek https_change_perc_complete ] \
| appendcols\
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
    | where cust_port > 1023 AND direction="Inbound to Customer" \
    | stats count as dynamic_in_count by client_port server_port\
    | sort 1 -dynamic_in_count \
    | eval dynamic_in_top_result="Port " + client_port + " to " + server_port \
    | table dynamic_in_top_result \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | where cust_port > 1023 AND direction="Inbound to Customer"  \
        | stats count(_time) as dynamic_in_lastweek \
        | table dynamic_in_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
        | where cust_port > 1023 AND direction="Inbound to Customer" \
        | stats count(_time) as dynamic_in_previousweek \
        | table dynamic_in_previousweek ] \
    | eval dynamic_in_change=dynamic_in_lastweek - dynamic_in_previousweek \
    | eval dynamic_in_change_perc = (dynamic_in_change / dynamic_in_previousweek) * 100 \
    | eval dynamic_in_change_perc_complete = printf("%d%%",dynamic_in_change_perc) \
    | eval dynamic_in_change_perc_complete = if(dynamic_in_lastweek>dynamic_in_previousweek, "+" + dynamic_in_change_perc_complete, dynamic_in_change_perc_complete)\
    | table dynamic_in_top_result dynamic_in_lastweek dynamic_in_previousweek dynamic_in_change_perc_complete ] \
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
    | where grey_port > 1023 AND direction="Outbound from Customer" \
    | stats count as dynamic_out_count by client_port server_port\
    | sort 1 -dynamic_out_count \
    | eval dynamic_out_top_result="Port " + client_port + " to " + server_port \
    | table dynamic_out_top_result \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | where grey_port > 1023 AND direction="Outbound from Customer"  \
        | stats count(_time) as dynamic_out_lastweek \
        | table dynamic_out_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
        | where grey_port > 1023 AND direction="Outbound from Customer" \
        | stats count(_time) as dynamic_out_previousweek \
        | table dynamic_out_previousweek ] \
    | eval dynamic_out_change=dynamic_out_lastweek - dynamic_out_previousweek \
    | eval dynamic_out_change_perc = (dynamic_out_change / dynamic_out_previousweek) * 100 \
    | eval dynamic_out_change_perc_complete = printf("%d%%",dynamic_out_change_perc) \
    | eval dynamic_out_change_perc_complete = if(dynamic_out_lastweek>dynamic_out_previousweek, "+" + dynamic_out_change_perc_complete, dynamic_out_change_perc_complete)\
    | table dynamic_out_top_result dynamic_out_lastweek dynamic_out_previousweek dynamic_out_change_perc_complete ] \
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
    | lookup vpn_service.csv vpn_port as cust_port OUTPUT vpn_service as cust_vpn \
    | lookup vpn_service.csv vpn_port as grey_port OUTPUT vpn_service as grey_vpn \
    | eval top_vpn_service=if(isnotnull(cust_vpn), cust_vpn, if(isnotnull(grey_vpn), grey_vpn, NULL)) \
    | where isnotnull(top_vpn_service) \
    | stats count as vpn_count by top_vpn_service\
    | sort 1 -vpn_count\
    | table top_vpn_service \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | lookup vpn_service.csv vpn_port as cust_port OUTPUT vpn_port as cust_vpn \
        | lookup vpn_service.csv vpn_port as grey_port OUTPUT vpn_port as grey_vpn \
        | eval vpn_port=if(isnotnull(cust_vpn), cust_vpn, if(isnotnull(grey_vpn), grey_vpn, NULL)) \
        | stats count(vpn_port) as vpn_lastweek \
        | table vpn_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
        | lookup vpn_service.csv vpn_port as cust_port OUTPUT vpn_port as cust_vpn \
        | lookup vpn_service.csv vpn_port as grey_port OUTPUT vpn_port as grey_vpn \
        | eval vpn_port=if(isnotnull(cust_vpn), cust_vpn, if(isnotnull(grey_vpn), grey_vpn, NULL)) \
        | stats count(vpn_port) as vpn_previousweek \
        | table vpn_previousweek ] \
    | eval vpn_change=vpn_lastweek - vpn_previousweek \
    | eval vpn_change_perc = (vpn_change / vpn_previousweek) * 100 \
    | eval vpn_change_perc_complete = printf("%d%%",vpn_change_perc) \
    | eval vpn_change_perc_complete = if(vpn_lastweek>vpn_previousweek, "+" + vpn_change_perc_complete, vpn_change_perc_complete)\
    | sort 1 -top_vpn_service\
    | table top_vpn_service vpn_lastweek vpn_previousweek vpn_change_perc_complete ] \
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d\
    | stats count as tor_count by cust_ip, grey_ip\
    | lookup tor_node_full.csv tor_ip AS grey_ip OUTPUT tor_ip\
    | where isnotnull(tor_ip)\
    | sort 1 -tor_count\
    | eval tor_top_result=tor_ip + " to " + cust_ip \
    | table tor_top_result \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | lookup tor_node_full.csv tor_ip AS grey_ip OUTPUT tor_ip\
        | where isnotnull(tor_ip)\
        | stats count(_time) as tor_lastweek \
        | table tor_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
