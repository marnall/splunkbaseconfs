[Key_Findings_FocusedIP_reco0n_summary]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 45 14 * * *
description = Append daily threat findings for reco0n IP focus escalations
dispatch.earliest_time = -30d@d
dispatch.latest_time = -0d@d
enableSched = 1
search = index=rec0n_summary\
| where direction="Inbound to Customer"\
| bin _time span=1h\
| eventstats sum(num_pkts) as sum_pkts by cust_ip _time\
| eventstats avg(sum_pkts) as sum_avg_ip by cust_ip\
| eventstats avg(sum_pkts) as sum_avg_time by _time\
| eval data_dv_ip=sum_pkts/sum_avg_ip\
| eval data_dv_time=sum_pkts/sum_avg_time\
| table sum_pkts sum_avg_ip sum_avg_time cust_ip _time data_dv_ip data_dv_time\
| dedup sum_pkts sum_avg_ip sum_avg_time cust_ip _time data_dv_ip data_dv_time\
| rename cust_ip as pattern\
| where (data_dv_time > 100 AND data_dv_ip > 3) OR (data_dv_time > 10 AND data_dv_ip > 10) OR (data_dv_time > 5 AND data_dv_ip > 50) OR (data_dv_ip > 250)\
| eval finding="Increased Focus on IP"\
| rename _time as result_time\
| eval query_time=time()\
| table query_time result_time pattern finding\
| outputlookup key_findings_rec0n_summary.csv append=t

[Key_Findings_HTTP_reco0n_summary]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 45 14 * * *
description = Append daily threat findings for reco0n unencrypted web traffic
dispatch.earliest_time = -30d@d
dispatch.latest_time = -0d@d
enableSched = 1
search = index=rec0n_summary `web_crypt`\
| bin _time span=1h\
| where direction="Outbound from Customer" AND web_crypt="no"\
| eventstats sum(num_pkts) as http_out_pkts by grey_ip\
| eventstats sum(http_out_pkts) as total_pkts_hour by _time\
| eventstats avg(total_pkts_hour) as hourly_average\
| eval http_out_dv=http_out_pkts/hourly_average\
| eventstats avg(http_out_dv) as grey_http_dv by _time\
| table _time http_out_pkts total_pkts_hour http_out_dv grey_ip grey_http_dv\
| dedup _time http_out_pkts total_pkts_hour http_out_dv grey_ip grey_http_dv\
| eval spike_dv=round(http_out_dv/grey_http_dv,0)\
| where spike_dv > 50\
| eval finding="Unencrypted Traffic Spike"\
| rename grey_ip as pattern\
| rename _time as result_time\
| eval query_time=time()\
| table query_time result_time pattern finding\
| outputlookup key_findings_rec0n_summary.csv append=t

