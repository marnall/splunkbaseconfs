    | eval vpn_change_perc = (vpn_change / vpn_previousweek) * 100 \
    | eval vpn_change_perc_complete = printf("%d%%",vpn_change_perc) \
    | eval vpn_change_perc_complete = if(vpn_lastweek>vpn_previousweek, "+" + vpn_change_perc_complete, vpn_change_perc_complete)\
    | sort 1 -top_vpn_service\
    | table top_vpn_service vpn_lastweek vpn_previousweek vpn_change_perc_complete ] \
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d\
    | stats count as tor_count by cust_ip, grey_ip\
    | lookup tor_node_full.csv tor_ip AS grey_ip OUTPUT tor_ip\
    | where isnotnull(tor_ip)\
    | sort 1 -tor_count\
    | eval tor_top_result=tor_ip + " to " + cust_ip \
    | table tor_top_result \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | lookup tor_node_full.csv tor_ip AS grey_ip OUTPUT tor_ip\
        | where isnotnull(tor_ip)\
        | stats count(_time) as tor_lastweek \
        | table tor_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
        | lookup tor_node_full.csv tor_ip AS grey_ip OUTPUT tor_ip\
        | where isnotnull(tor_ip)\
        | stats count(_time) as tor_previousweek\
        | table tor_previousweek ] \
    | eval tor_change=tor_lastweek - tor_previousweek \
    | eval tor_change_perc = (tor_change / tor_previousweek) * 100 \
    | eval tor_change_perc_complete = printf("%d%%",tor_change_perc) \
    | eval tor_change_perc_complete = if(tor_lastweek>tor_previousweek, "+" + tor_change_perc_complete, tor_change_perc_complete) \
    | sort 1 -tor_top_result\
    | table tor_top_result tor_lastweek tor_previousweek tor_change_perc_complete ] \
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
    | lookup cryptomining.csv mining_port AS src_port OUTPUT miner as src_miner \
    | lookup cryptomining.csv mining_port AS dst_port OUTPUT miner as dst_miner \
    | eval miner=if(isnotnull(src_miner), src_miner, dst_miner) \
    | eval mining_ip=if(isnotnull(src_miner), grey_ip, if(isnotnull(dst_miner), grey_ip, NULL))\
    | where isnotnull(mining_ip)\
    | stats count as miner_count by mining_ip, miner\
    | sort 1 -miner_count\
    | eval top_miner = miner + " to " + mining_ip \
    | table top_miner\
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
| lookup cryptomining.csv mining_port AS src_port OUTPUT miner as src_miner \
    | lookup cryptomining.csv mining_port AS dst_port OUTPUT miner as dst_miner \
    | eval miner=if(isnotnull(src_miner), src_miner, dst_miner) \
        | stats count(miner) as miner_lastweek \
        | table miner_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
| lookup cryptomining.csv mining_port AS src_port OUTPUT miner as src_miner \
    | lookup cryptomining.csv mining_port AS dst_port OUTPUT miner as dst_miner \
    | eval miner=if(isnotnull(src_miner), src_miner, dst_miner) \
        | stats count(miner) as miner_previousweek \
        | table miner_previousweek ] \
    | eval miner_change=miner_lastweek - miner_previousweek \
    | eval miner_change_perc = (miner_change / miner_previousweek) * 100 \
    | eval miner_change_perc_complete = printf("%d%%",miner_change_perc) \
    | eval miner_change_perc_complete = if(miner_lastweek>miner_previousweek, "+" + miner_change_perc_complete, miner_change_perc_complete) \
    | table top_miner miner_lastweek miner_previousweek miner_change_perc_complete ] \
| appendcols\
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
       | where direction="Inbound to Customer"\
	   | stats count as auth_count by client_ip server_ip server_port\
	   | lookup authentication.csv auth_port AS server_port OUTPUT auth_port_desc\
	   | where isnotnull(auth_port_desc)\
    | sort 1 -auth_count\
    | eval top_auth=auth_port_desc + " to " + client_ip \
    | table top_auth \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | where direction="Inbound to Customer"\
        | lookup authentication.csv auth_port AS server_port OUTPUT auth_port_desc\
	    | where isnotnull(auth_port_desc)\
		| stats count(_time) as auth_lastweek\
        | table auth_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
        | where direction="Inbound to Customer"\
        | lookup authentication.csv auth_port AS server_port OUTPUT auth_port_desc\
	    | where isnotnull(auth_port_desc)\
		| stats count(_time) as auth_previousweek\
        | table auth_previousweek] \
    | eval auth_change=auth_lastweek - auth_previousweek \
    | eval auth_change_perc = (auth_change / auth_previousweek) * 100 \
    | eval auth_change_perc_complete = printf("%d%%",auth_change_perc) \
    | eval auth_change_perc_complete = if(auth_lastweek>auth_previousweek, "+" + auth_change_perc_complete, auth_change_perc_complete)\
    | table top_auth auth_lastweek auth_previousweek auth_change_perc_complete ] \
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
    | where src_port=dst_port\
    | stats count as bilateral_count by src_port\
    | sort 1 -bilateral_count\
    | eval top_bilateral = "Port " + src_port \
    | table top_bilateral \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | where src_port=dst_port\
        | stats count as bilateral_previousweek\
        | table bilateral_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
        | where src_port=dst_port\
        | stats count as bilateral_previousweek\
        | table bilateral_previousweek] \
    | eval bilateral_change=bilateral_lastweek - bilateral_previousweek \
    | eval bilateral_change_perc = (bilateral_change / bilateral_previousweek) * 100 \
    | eval bilateral_change_perc_complete = printf("%d%%",bilateral_change_perc) \
    | eval bilateral_change_perc_complete = if(bilateral_lastweek>bilateral_previousweek, "+" + bilateral_change_perc_complete, bilateral_change_perc_complete)\
    | table top_bilateral bilateral_lastweek bilateral_previousweek bilateral_change_perc_complete ]\
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
    | bin _time span=1h \
    | stats dc(grey_ip) as grey_uniq_hour by _time \
    | sort 1 -grey_uniq_hour \
    | eval hour=strftime(_time,"%Y-%m-%d %H00") \
    | rex field=hour "\W(?<add_hour>\d\d00)" \
    | eval add_hour=add_hour + 100 \
    | eval grey_uniq_top_result=hour + "-" + add_hour + " (" + grey_uniq_hour + " Grey IPs)" \
    | table grey_uniq_top_result \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | stats dc(grey_ip) as grey_uniq_lastweek \
        | table grey_uniq_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
        | stats dc(grey_ip) as grey_uniq_previousweek \
        | table grey_uniq_previousweek ] \
    | eval grey_uniq_change=grey_uniq_lastweek - grey_uniq_previousweek \
    | eval grey_uniq_change_perc = (grey_uniq_change / grey_uniq_previousweek) * 100 \
    | eval grey_uniq_change_perc_complete = printf("%d%%",grey_uniq_change_perc) \
    | eval grey_uniq_change_perc_complete = if(grey_uniq_lastweek>grey_uniq_previousweek, "+" + grey_uniq_change_perc_complete, grey_uniq_change_perc_complete) \
    | table grey_uniq_top_result grey_uniq_lastweek grey_uniq_previousweek grey_uniq_change_perc_complete ]\
| outputlookup key_metrics_rec0n_summary.csv append=f

[rec0n_Summary]
action.email.useNSSubject = 1
action.summary_index = 1
action.summary_index._name = rec0n_summary
alert.track = 0
cron_schedule = 45 11 * * *
description = Summary collection for Recon_Customer
dispatch.earliest_time = -1d@d
dispatch.latest_time = -0d@d
enableSched = 1
realtime_schedule = 0
search = index=rec0n query_type="flows"\
| fields _time, src_ip_addr, dst_ip_addr, src_port, dst_port, src_asn, dst_asn, src_autonomous_system, dst_autonomous_system, src_asn_cidr, dst_asn_cidr, src_cc, dst_cc, src_country, dst_country, BytesPerPacket, num_octets, num_pkts, tcp_flags, protocol_description, index, host\
| lookup rec0n_iplist insubnet as src_ip_addr OUTPUT insubnet as src_insubnet\
| lookup rec0n_iplist insubnet as dst_ip_addr OUTPUT insubnet as dst_insubnet\
| eval both_ip=src_ip_addr + "," + dst_ip_addr\
| eval both_port=src_port + "," + dst_port\
| eval both_asn=src_asn + "," + dst_asn\
| eval both_autonomous_system=src_autonomous_system + "," + dst_autonomous_system\
| eval both_cc=src_cc + "," + dst_cc\
| eval both_country=src_country + "," + dst_country\
| eval both_asn_cidr=src_asn_cidr + "," + dst_asn_cidr\
| eval cust_ip=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), src_ip_addr, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), dst_ip_addr, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), both_ip, "unlisted"))) \
| eval grey_ip=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), dst_ip_addr, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), src_ip_addr, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), "Cust-to-Cust", both_ip)))\
| eval cust_port=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), src_port, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), dst_port, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), both_port, "unlisted"))) \
| eval grey_port=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), dst_port, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), src_port, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), "Cust-to-Cust", both_port))) \
| eval cust_asn=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), src_asn, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), dst_asn, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), both_asn, "unlisted"))) \
| eval grey_asn=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), dst_asn, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), src_asn, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), "Cust-to-Cust", both_asn))) \
| eval cust_autonomous_system=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), src_autonomous_system, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), dst_autonomous_system, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), both_autonomous_system, "unlisted"))) \
| eval grey_autonomous_system=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), dst_autonomous_system, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), src_autonomous_system, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), "Cust-to-Cust", both_autonomous_system))) \
| eval cust_cc=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), src_cc, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), dst_cc, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), both_cc, "unlisted"))) \
| eval grey_cc=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), dst_cc, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), src_cc, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), "Cust-to-Cust", both_cc)))\
| eval cust_country=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), src_country, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), dst_country, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), both_country, "unlisted"))) \
| eval grey_country=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), dst_country, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), src_country, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), "Cust-to-Cust", both_country)))\
| eval cust_asn_cidr=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), src_asn_cidr, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), dst_asn_cidr, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), both_asn_cidr, "unlisted"))) \
| eval grey_asn_cidr=if(cidrmatch(src_insubnet,src_ip_addr) AND isnull(dst_insubnet), dst_asn_cidr, if(cidrmatch(dst_insubnet,dst_ip_addr) AND isnull(src_insubnet), src_asn_cidr, if(cidrmatch(src_insubnet,src_ip_addr) AND isnotnull(dst_insubnet), "Cust-to-Cust", both_asn_cidr))) \
| eval load_bearing=if(BytesPerPacket>59, "TRUE", "FALSE")\
| eval client_ip=if(src_port<dst_port, dst_ip_addr, if(src_port>dst_port , src_ip_addr, dst_ip_addr)) \
| eval server_ip=if(src_port<dst_port, src_ip_addr, if(src_port>dst_port , dst_ip_addr, src_ip_addr)) \
| eval client_port=if(src_port<dst_port, dst_port, if(src_port>dst_port , src_port, dst_port)) \
| eval server_port=if(src_port<dst_port, src_port, if(src_port>dst_port , dst_port, src_port))\
| lookup rec0n_iplist insubnet as client_ip OUTPUT insubnet as client_match \
| lookup rec0n_iplist insubnet as server_ip OUTPUT insubnet as server_match \
| eval direction=if(isnotnull(client_match) AND isnull(server_match), "Outbound from Customer", if(isnotnull(server_match) AND isnull(client_match), "Inbound to Customer", if(isnotnull(server_match) AND isnotnull(client_match), "Cust-to-Cust", "Grey-to-Grey")))\
| append \
    [| tstats count as beacons_collected where (index=rec0n query_type="beacons" NOT results=*) by _time\
    | table beacons_collected, _time ]\
| lookup golddigger_master threat_ip as grey_ip OUTPUT threat_family as threat_family\
| lookup golddigger_threat_ref.csv threat_family as threat_family OUTPUT threat_name as threat\
| table _time, src_ip_addr, dst_ip_addr, src_port, dst_port, src_asn, dst_asn, src_autonomous_system, dst_autonomous_system, src_asn_cidr, dst_asn_cidr, src_cc, dst_cc, src_country, dst_country, BytesPerPacket, num_octets, num_pkts, src_insubnet, dst_insubnet, cust_ip, grey_ip, cust_port, grey_port, cust_asn, grey_asn, cust_autonomous_system, grey_autonomous_system, cust_cc, grey_cc, cust_country, grey_country, cust_asn_cidr, grey_asn_cidr, load_bearing, client_ip, server_ip, client_port, server_port, client_match, server_match, direction, tcp_flags,  protocol_description, beacons_collected, threat, index, host

[Key_Findings_Authentication_rec0n_Summary]
cron_schedule = 45 11 * * *
description = Append daily threat findings for Recon_Customer authentication attempts


