        | where isnotnull(tor_ip)\
        | stats count(_time) as tor_previousweek\
        | table tor_previousweek ] \
    | eval tor_change=tor_lastweek - tor_previousweek \
    | eval tor_change_perc = (tor_change / tor_previousweek) * 100 \
    | eval tor_change_perc_complete = printf("%d%%",tor_change_perc) \
    | eval tor_change_perc_complete = if(tor_lastweek>tor_previousweek, "+" + tor_change_perc_complete, tor_change_perc_complete) \
    | sort 1 -tor_top_result\
    | table tor_top_result tor_lastweek tor_previousweek tor_change_perc_complete ] \
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
    | lookup cryptomining.csv mining_port AS src_port OUTPUT miner as src_miner \
    | lookup cryptomining.csv mining_port AS dst_port OUTPUT miner as dst_miner \
    | eval miner=if(isnotnull(src_miner), src_miner, dst_miner) \
    | eval mining_ip=if(isnotnull(src_miner), grey_ip, if(isnotnull(dst_miner), grey_ip, NULL))\
    | where isnotnull(mining_ip)\
    | stats count as miner_count by mining_ip, miner\
    | sort 1 -miner_count\
    | eval top_miner = miner + " to " + mining_ip \
    | table top_miner\
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
| lookup cryptomining.csv mining_port AS src_port OUTPUT miner as src_miner \
    | lookup cryptomining.csv mining_port AS dst_port OUTPUT miner as dst_miner \
    | eval miner=if(isnotnull(src_miner), src_miner, dst_miner) \
        | stats count(miner) as miner_lastweek \
        | table miner_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
| lookup cryptomining.csv mining_port AS src_port OUTPUT miner as src_miner \
    | lookup cryptomining.csv mining_port AS dst_port OUTPUT miner as dst_miner \
    | eval miner=if(isnotnull(src_miner), src_miner, dst_miner) \
        | stats count(miner) as miner_previousweek \
        | table miner_previousweek ] \
    | eval miner_change=miner_lastweek - miner_previousweek \
    | eval miner_change_perc = (miner_change / miner_previousweek) * 100 \
    | eval miner_change_perc_complete = printf("%d%%",miner_change_perc) \
    | eval miner_change_perc_complete = if(miner_lastweek>miner_previousweek, "+" + miner_change_perc_complete, miner_change_perc_complete) \
    | table top_miner miner_lastweek miner_previousweek miner_change_perc_complete ] \
| appendcols\
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
       | where direction="Inbound to Customer"\
	   | stats count as auth_count by client_ip server_ip server_port\
	   | lookup authentication.csv auth_port AS server_port OUTPUT auth_port_desc\
	   | where isnotnull(auth_port_desc)\
    | sort 1 -auth_count\
    | eval top_auth=auth_port_desc + " to " + client_ip \
    | table top_auth \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | where direction="Inbound to Customer"\
        | lookup authentication.csv auth_port AS server_port OUTPUT auth_port_desc\
	    | where isnotnull(auth_port_desc)\
		| stats count(_time) as auth_lastweek\
        | table auth_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
        | where direction="Inbound to Customer"\
        | lookup authentication.csv auth_port AS server_port OUTPUT auth_port_desc\
	    | where isnotnull(auth_port_desc)\
		| stats count(_time) as auth_previousweek\
        | table auth_previousweek] \
    | eval auth_change=auth_lastweek - auth_previousweek \
    | eval auth_change_perc = (auth_change / auth_previousweek) * 100 \
    | eval auth_change_perc_complete = printf("%d%%",auth_change_perc) \
    | eval auth_change_perc_complete = if(auth_lastweek>auth_previousweek, "+" + auth_change_perc_complete, auth_change_perc_complete)\
    | table top_auth auth_lastweek auth_previousweek auth_change_perc_complete ] \
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
    | where src_port=dst_port\
    | stats count as bilateral_count by src_port\
    | sort 1 -bilateral_count\
    | eval top_bilateral = "Port " + src_port \
    | table top_bilateral \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | where src_port=dst_port\
        | stats count as bilateral_previousweek\
        | table bilateral_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
        | where src_port=dst_port\
        | stats count as bilateral_previousweek\
        | table bilateral_previousweek] \
    | eval bilateral_change=bilateral_lastweek - bilateral_previousweek \
    | eval bilateral_change_perc = (bilateral_change / bilateral_previousweek) * 100 \
    | eval bilateral_change_perc_complete = printf("%d%%",bilateral_change_perc) \
    | eval bilateral_change_perc_complete = if(bilateral_lastweek>bilateral_previousweek, "+" + bilateral_change_perc_complete, bilateral_change_perc_complete)\
    | table top_bilateral bilateral_lastweek bilateral_previousweek bilateral_change_perc_complete ]\
| appendcols \
    [| search index=rec0n_summary earliest=-14d@d latest=-0d@d \
    | bin _time span=1h \
    | stats dc(grey_ip) as grey_uniq_hour by _time \
    | sort 1 -grey_uniq_hour \
    | eval hour=strftime(_time,"%Y-%m-%d %H00") \
    | rex field=hour "\W(?<add_hour>\d\d00)" \
    | eval add_hour=add_hour + 100 \
    | eval grey_uniq_top_result=hour + "-" + add_hour + " (" + grey_uniq_hour + " Grey IPs)" \
    | table grey_uniq_top_result \
    | appendcols \
        [| search index=rec0n_summary earliest=-7d@d latest=-0d@d \
        | stats dc(grey_ip) as grey_uniq_lastweek \
        | table grey_uniq_lastweek ] \
    | appendcols \
        [| search index=rec0n_summary earliest=-14d@d latest=-7d@d \
        | stats dc(grey_ip) as grey_uniq_previousweek \
        | table grey_uniq_previousweek ] \
    | eval grey_uniq_change=grey_uniq_lastweek - grey_uniq_previousweek \
    | eval grey_uniq_change_perc = (grey_uniq_change / grey_uniq_previousweek) * 100 \
    | eval grey_uniq_change_perc_complete = printf("%d%%",grey_uniq_change_perc) \
    | eval grey_uniq_change_perc_complete = if(grey_uniq_lastweek>grey_uniq_previousweek, "+" + grey_uniq_change_perc_complete, grey_uniq_change_perc_complete) \
    | table grey_uniq_top_result grey_uniq_lastweek grey_uniq_previousweek grey_uniq_change_perc_complete ]\
| outputlookup key_metrics_rec0n_summary.csv append=f

