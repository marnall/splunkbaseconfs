[Key_Findings_Authentication_reco0n_summary]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 45 14 * * *
description = Append daily threat findings for reco0n authentication attempts
dispatch.earliest_time = -30d@d
dispatch.latest_time = -0d@d
enableSched = 1
search = index=rec0n_summary\
| bin _time span=1h\
| where direction="Inbound to Customer" AND isnotnull(server_port)\
| lookup authentication.csv auth_port AS server_port OUTPUT auth_port_desc\
| where isnotnull(auth_port_desc)\
| eventstats dc(auth_port_desc) as auth_multi by grey_ip _time\
| where auth_multi > 1\
| eventstats latest(_time) as _latest by grey_ip\
| dedup _latest, grey_ip, auth_multi\
| rename _latest as _time grey_ip as pattern\
| eval finding="Multiple Authentication Ports Identified"\
| rename _time as result_time\
| eval query_time=time()\
| table query_time result_time pattern finding\
| outputlookup key_findings_rec0n_summary.csv append=t

[Key_Findings_BPP_reco0n_summary]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 45 14 * * *
description = Append daily threat findings for reco0n BytesPerPacket
dispatch.earliest_time = -30d@d
dispatch.latest_time = -0d@d
enableSched = 1
search = index=rec0n_summary\
| bin _time span=1h\
| eventstats avg(BytesPerPacket) as bpp_average_hour by _time\
| eventstats avg(BytesPerPacket) as bpp_average_total\
| table bpp_average_hour, bpp_average_total, _time\
| dedup _time\
| eval bpp_dv=bpp_average_hour/bpp_average_total\
| where bpp_dv > 2\
| eval finding="Irregular BytesPerPacket Spike"\
| eval pattern=round(bpp_dv*100,0)\
| eval pattern=pattern + " % of Average"\
| rename _time as result_time\
| eval query_time=time()\
| table query_time result_time pattern finding\
| outputlookup key_findings_rec0n_summary.csv append=t

