[recon_augury_flows]
definition = (sourcetype=recon:augury:json OR sourcetype=recon:augury:csv) query_type=flows
iseval = 0

[BPP_per_day]
definition = | bin _time span=1d\
            | timechart avg(BytesPerPacket) as avg_bytes\
            | eval avg_bytes = round(avg_bytes,0)\
            | rename avg_bytes as "BPP"
iseval = 0

[beacons_collected]
definition = | where isnotnull(beacons_collected) | table beacons_collected, _time
iseval = 0

[flow_direction_timechart]
definition = | where isnotnull(direction)\
| timechart span=1hr count by direction
iseval = 0

[grey_dnslookup_complete]
definition = | dnslookup field=grey_ip | eval top=mvindex(dnslookup,0) | rex field=top "((?<capture>.+)\.)" | rex field=top "(.+\d\.(?<capture2>.+)\.)" | eval domain1=if(isnull(capture2), capture, capture2) | eval domain2=if(isnull(domain1), top, domain1) | rex field=domain2 "(\w+\.(?<capture3>.+))" | eval domain3=if(isnull(capture3), capture, domain1) | eval domain_final=if(isnull(domain3), top, domain3)
iseval = 0

[inbound_non_us_geom]
definition = | where direction="Inbound to Customer" AND grey_cc!="US"\
| lookup geo_attr_countries iso2 as grey_cc OUTPUT country as grey_geo \
| stats count by grey_geo \
| geom geo_countries featureIdField=grey_geo\
| sort - count
iseval = 0

[inbound_scanning]
definition = | where direction="Inbound to Customer"\
          | bin _time span=7d\
          | search (tcp_flags="2" OR tcp_flags="16")\
          | timechart span=7d count
iseval = 0

[inbound_top_asn]
definition = \
    | where direction="Inbound to Customer" AND grey_cc!="" \
    | eventstats count as grey_as_count_in by grey_autonomous_system \
    | eventstats count as grandtotal\
    | dedup grey_autonomous_system \
    | eval percent = round(100 * grey_as_count_in / grandtotal,2) \
    | eval percent_asn_in = percent + " %" \
    | eval grey_country_desc_in = grey_country + " (" + grey_cc + ")" \
    | eval grey_country_desc_in=if(isnull(grey_country) OR grey_country="", "Private IP", grey_country_desc_in) \
    | sort 5 -percent_asn_in\
    | table grey_autonomous_system, grey_country_desc_in, percent_asn_in\
    | rename grey_autonomous_system as "Autonomous System" grey_country_desc_in as "Country" percent_asn_in AS "Percent"
iseval = 0

[inbound_top_countries]
definition = | where direction="Inbound to Customer" \
    | eval country = grey_country + " (" + grey_cc + ")" \
    | top limit=5 country showcount=false \
    | eval percent = round(percent, 2) \
    | eval percent = percent + " %"\
    | table country, percent\
    | rename country as "Country" percent as "Percent"
iseval = 0

[inbound_top_domains]
definition = | where direction="Inbound to Customer" AND load_bearing="TRUE"\
| top limit=5 grey_ip\
`grey_dnslookup_complete`\
| eval percent = round(percent, 2)\
| eval percent = percent + " %" \
| table grey_ip, domain_final, count, percent \
| sort -count\
| rename grey_ip as "Grey Space IP" domain_final as "Domain" count as "Count" percent as "Percent"
iseval = 0

[outbound_non_us_geom]
definition = | where direction="Outbound from Customer" AND grey_cc!="US"\
| lookup geo_attr_countries iso2 as grey_cc OUTPUT country as grey_geo \
| stats count by grey_geo \
| geom geo_countries featureIdField=grey_geo\
| sort - count
iseval = 0

[outbound_top_asn]
definition = \
    | where direction="Outbound from Customer" AND grey_cc!="" \
    | eventstats count as grey_as_count_out by grey_autonomous_system \
    | eventstats count as grandtotal\
    | dedup grey_autonomous_system \
    | eval percent = round(100 * grey_as_count_out / grandtotal,2) \
    | eval percent_asn_out = percent + " %" \
    | eval grey_country_desc_out = grey_country + " (" + grey_cc + ")" \
    | eval grey_country_desc_out=if(isnull(grey_country) OR grey_country="", "Private IP", grey_country_desc_out) \
    | sort 5 -percent_asn_out\
    | table grey_autonomous_system, grey_country_desc_out, percent_asn_out\
    | rename grey_autonomous_system as "Autonomous System" grey_country_desc_out as "Country" percent_asn_out AS "Percent"
iseval = 0

[outbound_top_countries]
definition = \
    | where direction="Outbound from Customer" \
    | eval country = grey_country + " (" + grey_cc + ")" \
    | top limit=5 country showcount=false \
    | eval percent = round(percent, 2) \
    | eval percent = percent + " %"\
    | table country, percent\
    | rename country as "Country" percent as "Percent"
iseval = 0

[outbound_top_domains]
definition = | where direction="Outbound from Customer" AND load_bearing="TRUE"\
| top limit=5 grey_ip\
`grey_dnslookup_complete`\
| eval percent = round(percent, 2)\
| eval percent = percent + " %" \
| table grey_ip, domain_final, count, percent \
| sort -count\
| rename grey_ip as "Grey Space IP" domain_final as "Domain" count as "Count" percent as "Percent"
iseval = 0

[proto_count_other_chart]
definition = | fields _time, protocol_description\
          | where (protocol_description!="TCP" AND protocol_description!="UDP") \
          | timechart span=1h count as proto_count_other by protocol_description \
          | rename proto_count_other AS "Count" protocol_description AS "Protocol"
iseval = 0

[proto_count_tcp_udp_chart]
definition = \
          | fields _time, protocol_description\
          | where (protocol_description="TCP" OR protocol_description="UDP") \
          | timechart span=1h count as proto_count_tcp_udp by protocol_description \
          | rename proto_count_tcp_udp AS "Count" protocol_description AS "Protocol"
iseval = 0

[threat_chart]
definition = | chart count by threat\
| rename threat as "Threat Type" count as "Times Seen"
iseval = 0

[top_ten_grey_domains]
definition = | eventstats count as grey_count by grey_ip \
| eventstats count(_raw) as grandtotal \
| dedup grey_ip \
| sort 10 -grey_count\
| eval percent_grey = round(100 * grey_count / grandtotal,2) \
| eval percent_grey = percent_grey + " %" \
`grey_dnslookup_complete` \
| eval grey_country = grey_country + " (" + grey_cc + ")" \
| table grey_ip domain_final grey_autonomous_system grey_asn grey_asn_cidr grey_country percent_grey \
| rename grey_ip as "Grey Space IP" domain_final as "Domain" grey_autonomous_system as "Autonomous System" grey_asn as "ASN Number" grey_asn_cidr as "ASN Cidr Address" grey_country as "Country" percent_grey as "Percent"
iseval = 0

[total_flows_previousday]
definition = | bin _time span=1d | timechart count span=1d
iseval = 0

[total_flows_previousweek]
definition = | bin _time span=7d | timechart count span=7d
iseval = 0

[uncommon_protocols]
definition = | where (protocol_description!="TCP" AND protocol_description!="UDP")\
                 | stats count as proto_count by protocol_description\
                 | table protocol_description, proto_count\
                 | rename proto_count AS "Count" protocol_description AS "Protocol"
iseval = 0

[web_crypt]
definition = | eval crypt=if(in(src_port, 80, 8000, 8008, 8080, 8800, 8880, 8808, 8088, 8888), "no", NULL) \
    | eval crypt=if(in(dst_port, 80, 8000, 8008, 8080, 8800, 8880, 8808, 8088, 8888), "no", crypt) \
    | eval crypt=if(in(src_port, 443), "yes", crypt) \
    | eval web_crypt=if(in(dst_port, 443), "yes", crypt)
iseval = 0

[key_findings]
definition = | table result_time query_time finding pattern\
| eval avg_true=if(like(pattern, "% of Average"), "TRUE", NULL)\
| eventstats count as finding_pattern_stats by finding pattern \
| eventstats count as finding_time_stats by result_time finding \
| eventstats count as pattern_time_stats by result_time pattern\
| eventstats count as avg_pattern_stats by avg_true finding result_time\
| sort +result_time\
| dedup result_time finding pattern finding_pattern_stats finding_time_stats pattern_time_stats\
| dedup result_time finding finding_pattern_stats finding_time_stats pattern_time_stats\
| dedup finding pattern finding_pattern_stats finding_time_stats pattern_time_stats\
| dedup keepempty=true result_time finding avg_pattern_stats finding_time_stats\
| sort -result_time\
| eval _time=strftime(result_time,"%Y-%m-%d %H00") \
| streamstats count as row_num\
| table row_num finding pattern _time
iseval = 0
