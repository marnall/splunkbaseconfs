[Network - Network SafeBreach Insights - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Network SafeBreach Insights
action.customsearchbuilder.enabled = false
action.customsearchbuilder.spec = {}
action.notable = 1
action.notable.param.rule_description = $actionBasedTitle$
action.notable.param.rule_title = $name$
action.notable.param.security_domain = network
action.notable.param.verbose = 0
alert.suppress = 1
alert.suppress.fields = ruleId,maxExecutionTime,test_id
alert.suppress.period = 2592000s
alert.track = 1
counttype = number of events
cron_schedule = */30 * * * *
dispatch.earliest_time = -35m
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-SafeBreach
schedule_window = 5
search = `safebreach_index` sourcetype="safebreach:insights:api" category IN ("Network Access","Data Leak","Web","Network Inspection","Email","Cloud","Application") | eval urgency=case(severity="Critical","critical",severity="High","high",severity="Medium","medium",severity="Low","low")

