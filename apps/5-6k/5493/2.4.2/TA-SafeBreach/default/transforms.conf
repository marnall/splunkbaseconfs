[safebreach_simulation_syslog]
DEST_KEY = MetaData:Sourcetype
REGEX = \|simulation\|
FORMAT = sourcetype::safebreach:simulation:syslog

[safebreach_audit_syslog]
DEST_KEY = MetaData:Sourcetype
REGEX = \|audit\|
FORMAT = sourcetype::safebreach:audit:syslog

[cef_format_extract_field_1]
REGEX = CEF:(\d+)\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|(.*)
FORMAT = cef_format_version::$1 appliance_vendor::$2 appliance_product::$3 appliance_version::$4 event_class_id::$5 event_name::$6 severity_id::$7 extend_part_1::$8

[cef_format_extract_field_2]
REGEX = (?:_+)?([\w.:\[\]]+)=(.*?(?=(?:\s[\w.:\[\]]+=|$)))
SOURCE_KEY = extend_part_1
FORMAT = $1::$2

[sb_mitre_tt_lookup]
filename = sb_mitre_tt_lookup.csv
