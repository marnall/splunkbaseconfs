FIELDALIAS-dest_port = destination_port AS dest_port
FIELDALIAS-src_port = source_port AS src_port
FIELDALIAS-transport = protocol AS transport
FIELDALIAS-file_hash = hash AS file_hash
EVAL-vendor_product = appliance_vendor + " " + appliance_product
EVAL-action = if(result=="not_blocked","allowed","blocked")
EVAL-dest_ip = coalesce(destination_ip,"N/A")
FIELDALIAS-src_ip = source_ip AS src_ip
FIELDALIAS-file_path = path AS file_path
FIELDALIAS-os = target_platform AS os
FIELDALIAS-os_version = target_os_version AS os_version
FIELDALIAS-app = protocol{} AS app
FIELDALIAS-user = impersonated_user AS user
FIELDALIAS-http_user_agent = client_headers AS http_user_agent
FIELDALIAS-query = fqdn_ip{} AS query
FIELDALIAS-uri_path = uri{} AS uri_path
EVAL-url = coalesce(uri,fqdn_ip)
FIELDALIAS-result_code = result_code
FIELDALIAS-result_details = result_details
EVAL-dest_port = if(isnum(dest_port), dest_port, tonumber(mvindex(split(dest_port, ","), 0)))


