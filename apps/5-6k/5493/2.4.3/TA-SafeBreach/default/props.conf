[safebreach:syslog]
SHOULD_LINEMERGE = false
EVENT_BREAKER_ENABLE = true
TRANSFORMS-safebreach_sourcetype = safebreach_simulation_syslog, safebreach_audit_syslog

[safebreach:simulation:syslog]
KV_MODE = none
TRUNCATE = 9999999
REPORT-cef_field_extraction = cef_format_extract_field_1, cef_format_extract_field_2
#CIM Field alias

FIELDALIAS-dest = destination_host AS dest
FIELDALIAS-src = source_host AS src
FIELDALIAS-dest_port = destination_port AS dest_port
FIELDALIAS-result_code = result_code
FIELDALIAS-result_details = result_details
FIELDALIAS-src_port = source_port AS src_port
FIELDALIAS-transport = protocol AS transport
FIELDALIAS-file_hash = hash AS file_hash
EVAL-vendor_product = appliance_vendor + " " + appliance_product
EVAL-action = if(result=="not_blocked","allowed","blocked")
EVAL-dest_ip = coalesce(destination_ip,"N/A")
FIELDALIAS-src_ip = source_ip AS src_ip
# FIELDALIAS-user = target AS user
FIELDALIAS-file_path = path AS file_path
FIELDALIAS-os = target_platform AS os
FIELDALIAS-os_version = target_os_version AS os_version
FIELDALIAS-app = protocol{} AS app
FIELDALIAS-user = impersonated_user AS user
FIELDALIAS-http_user_agent = client_headers AS http_user_agent
FIELDALIAS-query = fqdn_ip{} AS query
FIELDALIAS-uri_path = uri{} AS uri_path

EVAL-status = case(status=="stopped" , "Stopped" , status=="missed" , "Missed" , status=="inconsistent" , "Inconsistent" , status=="detected" , "Detected", status=="logged" , "Logged" , status=="no-result" , "No-result" , status=="prevented" , "Prevented")
EVAL-result = case(result=="not_blocked","Not Blocked", result=="blocked","Blocked" , result=="assumed_block" , "Assumed blocked" , result=="internal_fail" , "Internal failure")
EVAL-deployment_name = replace(deployments, "," , ", ")
EVAL-deployment_id = replace(deployment_ids, "," , ", ")
EVAL-security_control_category = replace(security_control_category, "," , ", ")
EVAL-mitre_tactic = replace(mitre_tactic, "," , ", ")
EVAL-mitre_technique = replace(mitre_technique, "," , ", ")
EVAL-mitre_sub_technique = replace(mitre_sub_technique, "," , ", ")
EVAL-attack_type = replace(attack_type, ",", ", ")

EVAL-threat_name = replace(threat_name, "," , ", ")
EVAL-threat_groups = replace(threat_groups, "," , ", ")
EVAL-threat_actor = replace(threat_actor, "," , ", ")
EVAL-nist_control = replace(nist_control, "," , ", ")
EVAL-data_asset = replace(data_asset, "," , ", ")
EVAL-category = replace(attack_type, "," , ", ")
EVAL-url = replace(coalesce(uri,fqdn_ip), ",", ", ")
EVAL-dest_port = if(isnum(dest_port), dest_port, tonumber(mvindex(split(dest_port, ","), 0)))

[safebreach:audit:syslog]
KV_MODE = none
TRUNCATE = 9999999
REPORT-cef_field_extraction = cef_format_extract_field_1, cef_format_extract_field_2

[safebreach:insights:api]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
KV_MODE = json
TRUNCATE = 9999999
FIELDALIAS-protocol = protocol{} AS protocol
FIELDALIAS-port = port{} AS port
FIELDALIAS-command = command{} AS command
FIELDALIAS-sha256 = sha256{} AS sha256
FIELDALIAS-fqdn_ip = fqdn_ip{} AS fqdn_ip
FIELDALIAS-uri = uri{} AS uri
FIELDALIAS-targets_targetNodeId = targets{}.targetNodeId AS targets_targetNodeId
FIELDALIAS-dest_port = port{} AS dest_port
FIELDALIAS-app = protocol{} AS app
FIELDALIAS-process = command{} AS process
FIELDALIAS-file_hash = sha256{} AS file_hash
FIELDALIAS-query = fqdn_ip{} AS query
EVAL-url = coalesce(uri,fqdn_ip)
FIELDALIAS-uri_path = uri{} AS uri_path
FIELDALIAS-os = target_platform AS os
FIELDALIAS-os_version = target_os_version AS os_version
FIELDALIAS-file_path = path AS file_path
FIELDALIAS-attack = attacks{} AS attack
TIME_PREFIX = "testEndTime": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TZ = UTC
MAX_TIMESTAMP_LOOKAHEAD = 25


[safebreach:audit:api]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
KV_MODE = json
TRUNCATE = 9999999
TIME_PREFIX = "timestamp": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TZ = UTC
MAX_TIMESTAMP_LOOKAHEAD = 25

