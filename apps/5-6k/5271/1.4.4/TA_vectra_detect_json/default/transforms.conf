[vectra_cognito_audit_json]
REGEX = "role":
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vectra:cognito:audit:json

[vectra_cognito_campaigns_json]
REGEX = "campaign_name":
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vectra:cognito:campaigns:json

[vectra_cognito_detect_json]
LOOKAHEAD = 100000
REGEX = "d_type_vname":
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vectra:cognito:hostdetect:json

[vectra_cognito_accountdetect_json]
REGEX = "account_uid":
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vectra:cognito:accountdetect:json

[vectra_cognito_health_json]
REGEX = "type":.*"vectra_timestamp"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vectra:cognito:health:json

[vectra_cognito_hostscoring_json]
REGEX = "category": "HOST SCORING"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vectra:cognito:hostscoring:json

[vectra_cognito_accountscoring_json]
REGEX = "category": "ACCOUNT SCORING"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vectra:cognito:accountscoring:json

[vectra_cognito_accountlockdown_json]
REGEX = "category": "LOCKDOWN"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vectra:cognito:accountlockdown:json

[vectra_cognito_hostlockdown_json]
REGEX = "category": "HOST_LOCKDOWN"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vectra:cognito:hostlockdown:json

[vectra_cognito_match_json]
REGEX = "event_type":"alert"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::vectra:cognito:match:json
