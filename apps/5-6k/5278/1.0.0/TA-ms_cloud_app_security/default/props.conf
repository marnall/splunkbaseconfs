[ms:cas:syslog]
TIME_FORMAT = %s
TIME_PREFIX = start=
MAX_TIMESTAMP_LOOKAHEAD = 10
TZ = UTC
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRANSFORMS-cas_sourcetyper = ms_cas_alerts,ms_cas_activities

[ms:cas:alerts]
KV_MODE = auto
EXTRACT-msg_fix = msg=(?P<body>.+?)\w+=
EXTRACT-user = suser=(?P<user>\S+)
EXTRACT-category = \|(?P<category>EVENT_[^\|]+|ALERT_[^\|]+)\|
EXTRACT-risk_score = \|(?P<risk_score>\d+)\|external
EXTRACT-signature = \|ALERT_[^\|]+\|(?P<vendor_action>[^\|]+)\|
EXTRACT-id = externalId=(?P<id>\S+)
EXTRACT-app = destinationServiceName=(?P<app>.+?)\w+=
EXTRACT-product_version = SIEM_Agent\|(?P<product_version>[^\|]+)\|

EVAL-action = "allowed"
EVAL-vendor = "Microsoft"
EVAL-product = "Cloud App Security"
EVAL-vendor_product = "Microsoft Cloud App Security"
EVAL-src_ip = coalesce(src,dvc,c6a1)
EVAL-src = coalesce(src,dvc,c6a1)
EVAL-type = "alert"
EVAL-signature = category+": "+vendor_action
EVAL-msg = body
EVAL-destinationServiceName = app
EVAL-severity = case(like(risk_score, "%0%"), "informational", like(risk_score, "%1%"), "low", like(risk_score, "%2%"), "low", like(risk_score, "%3%"), "low", like(risk_score, "%4%"), "medium",like(risk_score, "%5%"), "medium",like(risk_score, "%6%"), "medium",like(risk_score, "%7%"), "high",like(risk_score, "%8%"), "high",like(risk_score, "%9%"), "high",like(risk_score, "%10%"), "critical", 1=1, null)
EVAL-url = portalURL
EVAL-requestClientApplication = user_agent

REPORT-ms_cas_cs_fixer = ms_cas_cs1,ms_cas_cs2,ms_cas_cs3,ms_cas_cs4,ms_cas_cs5,ms_cas_c6a1

[ms:cas:activities]
KV_MODE = auto
EXTRACT-msg_fix = msg=(?P<body>.+?)\w+=
EXTRACT-user = suser=(?P<user>\S+)
EXTRACT-category = \|(?P<category>EVENT_[^\|]+|ALERT_[^\|]+)\|
EXTRACT-vendor_action = \|EVENT_[^\|]+\|(?P<vendor_action>[^\|]+)\|
EXTRACT-risk_score = \|(?P<risk_score>\d+)\|external
EXTRACT-user_agent = requestClientApplication=(?P<user_agent>.+?)\s+cs1Label=
EXTRACT-id = externalId=(?P<id>\S+)
EXTRACT-app = destinationServiceName=(?P<app>.+?)\w+=
EXTRACT-product_version = SIEM_Agent\|(?P<product_version>[^\|]+)\|

EVAL-vendor = "Microsoft"
EVAL-product = "Cloud App Security"
EVAL-vendor_product = "Microsoft Cloud App Security"
EVAL-src_ip = coalesce(src,dvc,c6a1)
EVAL-src = coalesce(src,dvc,c6a1)
EVAL-requestClientApplication = user_agent
EVAL-type = "event"
EVAL-signature = category+": "+vendor_action
EVAL-msg = body
EVAL-destinationServiceName = app
EVAL-severity = case(like(risk_score, "%0%"), "informational", like(risk_score, "%1%"), "low", like(risk_score, "%2%"), "low", like(risk_score, "%3%"), "low", like(risk_score, "%4%"), "medium",like(risk_score, "%5%"), "medium",like(risk_score, "%6%"), "medium",like(risk_score, "%7%"), "high",like(risk_score, "%8%"), "high",like(risk_score, "%9%"), "high",like(risk_score, "%10%"), "critical", 1=1, null)
EVAL-url = portalURL
### This was removed because there are thousands of possibilities and Microsoft does not have a document on how these would map.
#EVAL-action = case(like(vendor_action, "%Create%"), "created",like(vendor_action, "%Delete%"), "deleted",like(vendor_action, "%Purge%"), "deleted",like(vendor_action, "%Modify%"), "modified",like(vendor_action, "%Add%"), "modified",like(vendor_action, "%Remove%"), "modified",like(vendor_action, "%Move%"), "modified",like(vendor_action, "%Update%"), "modified",like(vendor_action, "%Change%"), "modified",like(vendor_action, "%Rename%"), "modified",like(vendor_action, "%View%"), "read",like(vendor_action, "%Access%"), "read", 1=1, null)
###

REPORT-ms_cas_cs_fixer = ms_cas_cs1,ms_cas_cs2,ms_cas_cs3,ms_cas_cs4,ms_cas_cs5,ms_cas_c6a1
