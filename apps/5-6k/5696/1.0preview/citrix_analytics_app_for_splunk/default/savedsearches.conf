[Citrix Analytics - LOOKUP - indicator_details.csv]
alert.track = 0
cron_schedule = 0 3 * * *
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = citrix_analytics_app_for_splunk
request.ui_dispatch_view = citrix_analytics_app_for_splunk
search = `citrix_analytics_index` event_type=indicatorSummary\
| stats latest(_time) as last_observed, latest(indicator_name) as indicator_name, latest(data_source) as data_source, latest(indicator_category) as indicator_category, latest(indicator_type) as indicator_type by indicator_id\
| eval new_data="true"\
| inputlookup indicator_details.csv append=true\
| fillnull value="false" new_data\
| inputlookup default_builtin_indicator.csv append=true\
| fillnull value=0 last_observed last_default_updated\
| eventstats max(last_observed) as max_last_observed by indicator_id\
| where max_last_observed=last_observed\
| dedup indicator_id\
| fields - max_last_observed\
| outputlookup indicator_details.csv override_if_empty=false
