[dt_iris_lookup]
display_location = both
fields = *Domain*, *tld*, *name*, *domain*, *query*, *host*, *dest*, *url*
label = DomainTools Iris: $@field_value$
link.method = get
link.target = blank
link.uri = https://research.domaintools.com/iris/search/?q=$@field_value$
type = link

[dt_domain_profile]
display_location = both
fields = *Domain*, *tld*, *name*, *domain*, *query*, *host*, *dest*, *url*
label = DomainTools Domain Profile: $@field_value$
link.method = get
link.target = blank
link.uri = /app/DomainTools-App-for-Splunk/domain_profile?form.domain=$@field_value$
type = link

[dt_dnsdb]
display_location = both
fields = *Domain*, *domain*
label = DomainTools DNSDB: $@field_value$
link.method = get
link.target = blank
link.uri = /app/DomainTools-App-for-Splunk/dnsdb?form.dashboard_time.earliest=0&form.dashboard_time.latest=now&form.rrtype_tok=ANY&form.dnsdb_tok=$@field_value$
type = link

[dt_related_events]
display_location = both
fields = *Domain*, *tld*, *name*, *domain*, *query*, *host*, *dest*, *url*
label = DomainTools Related Events: $@field_value$
search.earliest = -24h
search.search_string = | `dt_basesearch` | where url="$@field_value$"
search.target = blank
search.view = charting
type = search