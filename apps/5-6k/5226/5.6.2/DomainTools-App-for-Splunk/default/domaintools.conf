[domaintools]
# Proxy Settings
proxy_enabled = 0
proxy_server =
proxy_port =
proxy_authentication = 0

# SSL Settings
custom_certificate_enabled = 0
custom_certificate_path =

# Recommended value is 500. Set a lower value to narrow investigations
guided_pivot_threshold = 500

# Number of Domains batched in an API call. Minimum 1, Maximum 100
bulk_enrichment_batch_size = 100

# This enables quicker correlation of cached data of known domains from Enrichment table. This feature requires additional disk-space, so disabling this will reduce disk space consumption but slow down the searches
optimize_enrichment_searches = 1

# Checks for whether or not to use risk score over lower tiered scores
populate_scores = 0

# Toggle DT logging on or off
logging_on = 0
