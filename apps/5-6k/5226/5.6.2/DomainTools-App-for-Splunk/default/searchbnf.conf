[dtaccountinfo-command]
syntax = [dtaccountinfo] (params=<string>)? (feature=<string>)?
shortdesc = Get DomainTools API account information.
usage = public
comment1 = output the results of the account_information A.P.I. endpoint
example1 = | dtaccountinfo

[dtimportirisdetectmonitors-command]
syntax = [dtimportirisdetectmonitors] (feature=<string>)?
shortdesc = Import Iris Detect monitors.
usage = public
comment1 = output the results of the iris_detect_monitors API endpoint.
example1 = | dtimportirisdetectmonitors
related = dtimportirisdetectresults

[dtimportirisdetectresults-command]
syntax = [dtimportirisdetectresults] (feature=<string>)?
shortdesc = Import current days Iris Detect results for a given list of monitor IDs.
usage = public
comment1 = output Iris Detect results for the monitor IDs listed in lookup table "dt_iris_detect_monitors"
example1 = | from inputlookup:dt_iris_detect_monitors | dtimportirisdetectresults
related = dtimportirisdetectmonitors

[dtirisinvestigate-command]
syntax = [dtirisinvestigate] (domain=<string>)? | (pivot_type=<string>)? (pivot_value=<string>)? (feature=<string>)? (no_cache=<bool>)?
shortdesc = A generating command that queries Iris Investigate against up to 100 comma-separated domains at a time, or pivot on a domain-related attribute to further your investigation.
description = A generating command that queries Iris Investigate with up to 100 comma-separated domains at a time, or pivot on a domain-related attribute to further your investigation. \
The Iris Investigate API is ideally suited for investigation and orchestration use cases at human scale.
usage = public
comment1 = output the results of the iris_investigate API endpoint for the domain "domaintools.com"
example1 = | dtirisinvestigate domain="domaintools.com"
comment2 = output the results of the iris_investigate API endpoint for the ip address "x.x.x.x"
example2 = | dtirisinvestigate pivot_type="ip" pivot_value="x.x.x.x"
comment3 = Retrieve the results of an Iris Investigate search export (from the Advanced Search pane in the Iris UI), bypassing the cache for live results
example3 = | dtirisinvestigate pivot_type="search_hash" pivot_value="<search hash>" no_cache=true
related = dtformatinvestigate, dtirisenrich

[dtirisenrich-command]
syntax = [dtirisenrich] (domain=<string>) (inline_results=<string>)? (feature=<string>)?
shortdesc = An eventing command that queries the DomainTools Iris Enrich API. against up to 100 comma-separated domains at a time, supporting up to 60 queries per minute.
description = An eventing command that queries Iris Enrich against up to 100 comma-separated domains at a time. The Iris \
Enrich API endpoint is optimized for fast volumes and high-volume lookups. Add "inline_results" to keep event \
data inline.
usage = public
comment1 = output the results of the iris_enrich A.P.I. for values in the "domain" column
example1 = ... | dtirisenrich domain=domain
comment2 = output the results of the iris_enrich A.P.I. for values in the "domain" column keeping event data inline
example2 = ... | dtirisenrich domain=domain inline_results=true
related = dtirisinvestigate

[dtwhoishistory-command]
syntax = [dtwhoishistory] (domain=<string>) (mode=<string>)?
shortdesc = Performs a whois history search on a given domain using the Whois History API endpoint.
description = Performs a whois history search on a given domain using the Whois History API endpoint.
usage = public
comment1 = return whois records for the domain
example1 = ... | dtwhoishistory domain=domain
comment2 = return if any records exist.
example2 = ... | dtwhoishistory domain=domain mode="check_existence"

[dtformatinvestigate-command]
syntax = [dtformatinvestigate] (output=<string>) (feature=<string>)?
shortdesc = Format output from "dtirisinvestigate" command.
description = Formats the JSON returned by an Iris Investigate query into a row with component names. Use the output parameter to specify the section of the response to format. \
Valid "output" values include:\i\\
* domain\i\\
* active\i\\
* popularity_rank\i\\
* spf_info\i\\
* tld\i\\
* website_response\i\\
* data_updated_timestamp\i\\
* create_date\i\\
* adsense\i\\
* google_analytics\i\\
* expiration_date\i\\
* first_seen\i\\
* server_type\i\\
* website_title\i\\
* redirect_domain\i\\
* registrant_name\i\\
* registrant_org\i\\
* registrar
usage = public
comment1 = format the risk section of the iris_investigate A.P.I. endpoint into a table
example1 = | dtirisinvestigate domain="domaintools.com" | dtformatinvestigate output=risk
related = dtirisinvestigate

[dtformatenrich-command]
syntax = [dtformatenrich]
shortdesc = Format output from Iris Enrich A.P.I.
usage = public

[dtdomainextract-command]
syntax = [dtdomainextract] (field_in=<string>) (field_out=<string>) (include_subdomains=<bool>)? (debug=<bool>)? (feature=<string>)?
shortdesc = Extracts a domain out of a URL field, based on the tldextract library.
description = Extracts a domain out of a URL field, based on the tldextract library. Note that the DomainTools APIs expect a domain name as an input. Passing subdomains or URLs to the APIs will result in inconsistent data \
enrichment, so we recommend using dtdomainextract command or the dtdomainextract2 macro.
comment1 = extract a domain from the field called "url" and output it to a new field called "domain"
example1 = ... | dtdomainextract field_in=url field_out=domain
comment2 = extract the domain and subdomain from the given url
example2 = | makeresults | eval url="api.domaintools.com/test" | dtdomainextract field_in=url field_out=domain include_subdomain=true
usage = public

[dtsyncirisdetectwatchlist-command]
syntax = [dtsyncirisdetectwatchlist]
shortdesc = Sync Iris Detect watchlist.
usage = public
comment1 = syncs dt_iris_detect_results with the state "watched" with the dt_monitoring_list
example1 = | dtsyncirisdetectwatchlist

[dtexpirecache-command]
syntax = [dtexpirecache] (collection=<string>) (time_field=<string>) (num_days_back=<int>)? (feature=<string>)?
shortdesc = Remove expired cache
usage = public
comment1 = expire all rows in the "dt_iris_enrich_queue" kvstore where "time_field" is older than 1 day
example1 = | dtexpirecache collection="dt_iris_enrich_queue" time_field="queued" num_days_back=1

[dtdnsdb-command]
syntax = dtdnsdb target=<ip/hostname> type=<rdata/rrset/raw> rrtype=<a/aaa/cname/etc> [time_first_before=time] [time_first_after=time] [time_last_before=time] [time_last_after=time] [target_type=auto/ip/name] [bailiwick=bailiwick]
shortdesc = Queries DNSDB for Passive DNS information against a given IP, Domain, Hostname, or Subnet.
description = Queries DNSDB for Passive DNS information against a given IP, Domain, Hostname, or Subnet. See the DNSDB API for documentation and time fencing options: https://www.domaintools.com/resources/user-guides/farsight-dnsdb-api-version-2-documentation/
example1 = | dtdnsdb target=198.51.100.1 target_type=ip type=rdata rrtype=A
example2 = | dtdnsdb target=domaintools.com target_type=domain type=rdata rrtype=CNAME
example3 = | dtdnsdb target=198.51.100.0/24 target_type=cname type=rdata time_first_after=1674093597
example4 = | dtdnsdb target=::ffff:c633:6401 target_type=ip type=rdata
usage = public

[dtdnsdbflex-command]
syntax = dtdnsdbflex query_type=<rdata|rrnames> match_type=<glob|regex> query=<glob or regex pattern> [rrtype=**A/MX/CNAME/etc] [bailiwick=bailiwick] [time_first_before=time] [time_first_after=time] [time_last_before=time] [time_last_after=time]
shortdesc = Performs a DNSDB Passive DNS Flexible Search.
description = Performs a DNSDB Passive DNS Flexible Search. See the API guide for more information: https://www.domaintools.com/resources/user-guides/farsight-flexible-search-technical-reference-guide/
example1 = | dtdnsdbflex query_type=rdata match_type=regex query="^domaintools\.com\.$"
example2 = | dtdnsdbflex query_type=rdata match_type=glob query="*domaintools*"
example3 = | dtdnsdbflex query_type=rdata match_type=regex query="93.184.216.34"
usage = public

[dtdnsdblimit-command]
syntax =  dtdnsdblimit
description = Returns the DNSDB API query limit, number of queries remaining, as well as the time the remaining queries will reset.
shortdesc = Returns the DNSDB API query limit, number of queries remaining, as well as the time the remaining queries will reset.
example1 = | dtdnsdblimit
usage = public

[dtdnsdbenrich-command]
syntax = dtdsdbenrich (field_in=<string>) (field_type=<domain/ip/raw>) (lookup_type=<rrset/rrdata>)? (max_count=<int>)? (time_first_before=<time>)? (time_first_after=<time>)? (time_last_before=<time>)? (time_last_after=<time>)?  (rrtype=<ANY/A/NS/...>)? (bailiwick=<string>)? (include_subdomains=<bool>)?
description = Enrich the Splunk events returned by a given SPL_QUERY with Passive DNS information reported by Farsight DNSDB, part of DomainTools. \
The field_in should be a field name containing IPv4, IPv6, CIDR block, FQDN or a domain name. \
Use field_type specify the input type. \
The search defaults to scanning the past 6 hours or 10k events of passive DNS traffic, returning the 5 most recent results, unless another timestamp or max_count is provided. \
Other available filters include record set type, bailiwick (TLD, usually). For ip or raw lookups, the search defaults to a rdata (response) lookup , most useful for finding subdomains and co-hosted domains, and rrset (query) for a domain, useful for finding hosting IPs. \
See the usage examples and DNSDB API user guide for more information.
shortdesc = Enrich the Splunk events returned by a given SPL_QUERY with Passive DNS information reported by Farsight DNSDB, part of DomainTools.
example1 = | dtdnsdbenrich field_in=dest_ip field_type=ip max_count=5 time_first_after=161800000
comment1 = Show domains associated with an IP
example2 = | dtdomainextract field_in=url field_out=domain | dtdnsdbenrich field_in=domain field_type=domain lookup_type=rrset
comment2 = Extract a domain from a URL and return pDNS
example3 = | dtdnsdbenrich field_in=domain field_type=domain lookup_type=rrset rrtype=A include_subdomains=true time_first_after=1593070040 | eval dnsdb_time_first=strftime(dnsdb_time_first, "%Y-%m-%d %H:%M:%S"), dnsdb_time_last=strftime(dnsdb_time_last, "%Y-%m-%d %H:%M:%S")
comment3 = Find recent subdomains under a domain and format the returned unix date fields to be human-readable
usage = public

[dtidnadecode-command]
syntax = [dtidnadecode] (field_in=<string>) (field_out=<string>) (feature=<string>)?
shortdesc = Convert punycode domain to unicode representation using idna.
comment1 = encode a domain from the field called "domain" and output it to a new field called "encoded"
example1 = ... | dtidnadecode field_in=domain field_out=decoded
usage = public

[dtfeednod-command]
syntax = [dtfeednod] (after=<string>) (sessionID=<string>) (domain=<string>)? (top=<string>)? (feature=<string>)?
shortdesc = Retrieve apex-level domains (e.g. example.com but not www.example.com) observed for the first time by the DomainTools sensor network, and which are not present in our DNSDB historical database
example1 = | dtfeednod after=-60 | table timestamp domain
usage = public

[dtfeednad-command]
syntax = [dtfeednad] (after=<string>) (sessionID=<string>) (domain=<string>)? (top=<string>)? (feature=<string>)?
shortdesc = Retrieve apex-level domains (e.g. example.com but not www.example.com) DomainTools has newly active domains in our DNS sensor network
example1 = | dtfeednad after=-60 | table timestamp domain
