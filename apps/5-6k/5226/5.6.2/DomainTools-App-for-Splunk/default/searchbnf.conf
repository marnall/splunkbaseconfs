[dtfeeddomainrisk-command]
syntax = [dtfeeddomainrisk] (after=<string>) (sessionID=<string>) (domain=<string>)? (top=<string>)? (feature=<string>)?
shortdesc = Realtime domain risk information for apex-level domains, regardless of observed traffic.
