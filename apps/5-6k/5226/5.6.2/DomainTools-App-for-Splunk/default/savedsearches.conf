| where (current_score - previous_score) > `dt_risk_score_increase_alert_threshold` OR use_risk_score_increase_alert_threshold = 0 \
| eval one_hour_ago = relative_time(now(), "-1h@h") \
| where current_score_time > one_hour_ago \
| table en_domain_name current_score previous_score

