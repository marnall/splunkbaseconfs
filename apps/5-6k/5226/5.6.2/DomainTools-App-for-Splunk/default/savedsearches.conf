[DomainTools - Feed - NOD]
disabled = 1
enableSched = 1
max_concurrent = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
description = A search to save data feeds results for newly observed domains.
display.general.timeRangePicker.show = 0
search = | dtfeednod sessionID="dt-integrations"\
| table timestamp domain \
| collect index=dt_feed_nod


