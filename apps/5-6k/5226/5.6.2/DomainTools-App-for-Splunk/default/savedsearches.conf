[DomainTools - Queue Builder for Iris Enrich KV Store]
disabled = 1
enableSched = 1
max_concurrent = 1
cron_schedule = */2 * * * *
dispatch.earliest_time = -10m@m
dispatch.latest_time = @m
description = A search to extract domains from raw events based on your configured base search and stores them in the dt_iris_enrich_queue KV store for enrichment. This setting is required to be enabled as part of the core functionality of the DomainTools app.
display.general.timeRangePicker.show = 0
search = | `dt_basesearch` \
| mvexpand domain \
| dedup domain \
| where len(domain)>0 \
| stats latest(_time) as looyn, earliest(_time) as fooyn by domain \
| lookup dt_stats en_attribute_name as domain \
| eval key=substr(domain, 1, 500), \
    en_attribute_name=substr(domain, 1, 500), \
    dt_looyn_timestamp=looyn, \
    dt_num_of_AdhocLookups=if(isnull(dt_num_of_AdhocLookups), 0, dt_num_of_AdhocLookups), \
    dt_num_of_times_enriched=if(isnull(dt_num_of_times_enriched), 0, dt_num_of_times_enriched), \
    dt_last_enriched_datetime=if(isnull(dt_last_enriched_datetime), null, dt_last_enriched_datetime), \
    dt_fooyn_timestamp=if(isnull(dt_fooyn_timestamp), fooyn, dt_fooyn_timestamp) \
| table key en_attribute_name dt_fooyn_timestamp dt_looyn_timestamp dt_last_enriched_datetime dt_num_of_times_enriched dt_num_of_AdhocLookups \
| outputlookup key_field=key dt_stats \
| lookup dt_iris_enrich_data en_domain_name as en_attribute_name OUTPUT en_domain_name AS domain_enriched, dt_unknown AS dt_unknown, dt_retrieved AS dt_retrieved, dt_event_seen AS dt_event_seen \
| eval enable_cache=`enable_cache`, unknown_domain_retry = `unknown_domain_retry`, unknown_domain_retry_time= `unknown_domain_retry_time`, unknown_wait_expired=if(dt_retrieved < relative_time(now(), "-".unknown_domain_retry_time."m"), 1, 0) \
| search NOT domain_enriched=* OR enable_cache = 0 OR NOT dt_event_seen = 1 OR (dt_unknown = 1 AND unknown_domain_retry = 1 AND unknown_wait_expired = 1)\
| lookup dt_iris_enrich_queue domain as en_attribute_name OUTPUT domain AS domain_in_queue  \
| search NOT domain_in_queue=* OR enable_cache = 0 OR NOT dt_event_seen = 1 OR (dt_unknown = 1 AND unknown_domain_retry = 1 AND unknown_wait_expired = 1)\
| lookup dt_allowlist _key as en_attribute_name OUTPUT _key AS is_allowlisted \
| eval include_allowlisted_domains=`dt_include_allowlisted_domains_in_enrichment` \
| search NOT is_allowlisted=* OR include_allowlisted_domains = 1 \
| eval queued=now(), observed=dt_looyn_timestamp, domain=en_attribute_name \
| table key domain, observed, queued \
| outputlookup key_field=key dt_iris_enrich_queue

