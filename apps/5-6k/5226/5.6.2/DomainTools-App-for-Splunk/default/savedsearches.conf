enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = | `dt_basesearch` \
| stats count, values(url) as url, values(log_source) as log_source by domain \
| lookup dt_stats en_attribute_name as domain \
| lookup dt_allowlist _key as domain OUTPUT _key AS is_allowlisted \
| eval include_allowlisted_domains=`dt_include_allowlisted_domains_in_notable_events` \
| search NOT is_allowlisted=* OR include_allowlisted_domains = 1 \
| lookup dt_monitoring_list _key as domain OUTPUT _key as is_monitored, _dt_source as source \
| eval only_monitored_domains=`dt_only_monitored_domains_in_notable_events` \
| search is_monitored=* OR only_monitored_domains = 0 \
| eval ignore_iris_detect_domains=`dt_ignore_iris_detect_in_notable_events` \
| search ignore_iris_detect_domains = 0 OR NOT source="Iris Detect" \
| lookup dt_iris_enrich_data en_domain_name as domain \
| eval en_tag=lower(en_tag) \
| eval use_risk_threshold=`dt_use_risk_threshold_in_notable_events` \
| where max(en_risk_score)>=`dt_risk_score_threshold` OR use_risk_threshold = 0 \
| eval use_threatprofile_threshold=`dt_use_threatprofile_threshold_in_notable_events` \
| where max(en_threat_profile_malware) > `dt_threat_profile_score_threshold` or max(en_threat_profile_phishing) > `dt_threat_profile_score_threshold` or max(en_threat_profile_spam) > `dt_threat_profile_score_threshold` OR use_threatprofile_threshold = 0 \
| lookup dt_tags_list _key as en_tag OUTPUT _key as is_monitored_by_tag \
| eval monitor_tagged_domains=`dt_monitor_tags_in_notable_events` \
| search NOT monitor_tagged_domains = 1 OR is_monitored_by_tag=* \
| eval dt_is_active=if(en_is_active==1, "Active", "Inactive") \
| eval date=strptime(en_domain_create_date, "%Y-%m-%d") \
| eval dt_looyn_date=strftime(dt_looyn_timestamp, "%Y-%m-%d") \
| eval dt_age=round((now()-date)/86400) \
| table domain count en_risk_score en_threat_profile_type dt_num_of_times_enriched dt_is_active dt_age log_source dt_looyn_date url

