[DomainTools - Iris Enrichment]
disabled = 1
enableSched = 1
max_concurrent = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
description = A search to enrich domains found in dt_iris_enrich_queue, and store results in dt_iris_enrich_data collection. By default, the search is scheduled to run every 5 minutes and pulls data over the past 30 minutes. You can customize this frequency in the app. This setting is required to be enabled as part of the core functionality of the DomainTools app.
display.general.timeRangePicker.show = 0
search = | from inputlookup:dt_iris_enrich_queue \
| addinfo \
| where queued >= info_min_time AND queued <= info_max_time \
| dedup domain \
| lookup dt_iris_enrich_data en_domain_name as domain OUTPUT en_domain_name AS domain_in_store, dt_unknown AS dt_unknown, dt_retrieved as dt_retrieved, dt_event_seen as dt_event_seen \
| eval enable_cache=`enable_cache`, unknown_domain_retry = `unknown_domain_retry`, unknown_domain_retry_time= `unknown_domain_retry_time`, unknown_wait_expired=if(dt_retrieved < relative_time(now(), "-".unknown_domain_retry_time."m"), 1, 0) \
| search NOT domain_in_store=* OR enable_cache = 0 OR NOT dt_event_seen = 1 OR (dt_unknown = 1 AND unknown_domain_retry = 1 AND unknown_wait_expired = 1)\
| dtirisenrich domain=domain feature="Saved Search: DomainTools - Iris Enrichment" \
| outputlookup key_field=key dt_iris_enrich_data \
| `dt_enrich_to_stats_lookup`

