description = A saved search to create events based on the criteria selected in DomainTools App → Settings → Configure → Enrichment & Alerting. Customers wanting to create Notable Events within Enterprise Security must either enable this saved search or enable the correlation search inside Splunk ES
dispatch.earliest_time = -30m@m
