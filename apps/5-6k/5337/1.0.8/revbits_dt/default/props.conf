

[syslog]
TRANSFORMS-force_sourcetype_for_revbits_dt = force_sourcetype_for_revbits_dt

[revbits:dt]

EXTRACT-version = ^(?:[^\|\n]*\|){1}Revbits DT - (?P<version>[^\|]+)
EXTRACT-domain = ^(?:[^\|\n]*\|){2}(?P<domain>[^\|]+)
EXTRACT-severity = ^(?:[^\|\n]*\|){3}(?P<severity>[^\|]+)
EXTRACT-event = ^(?:[^\|\n]*\|){4}(?P<event>[^\|]+)
EXTRACT-event_type = ^(?:[^\|\n]*\|){5}(?P<event_type>[^\|]+)
EXTRACT-msg = ^(?:[^\|\n]*\|){6}(?P<msg>[^\|]+)
EXTRACT-user = ^(?:[^\|\n]*\|){7}By\s(?P<user>[^\|]+)

EVAL-app = "Deception Technology"
EVAL-vendor_product = "RevBits DT"

