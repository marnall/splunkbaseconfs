[bp_session]
batch_upload_size = 1000
connection = db_blueprism
disabled = 0
fetch_size = 1000
host = 
index = blueprism
index_time_mode = dbColumn
input_timestamp_column_number = 10
interval = */10 * * * *
max_rows = 10000
max_single_checkpoint_file_size = 10485760
mode = rising
query = SELECT S.sessionid, S.sessionnumber, R.resourceid AS ResourceId, R.name AS [Resource], P.processid AS ProcessId, P.name AS ProcessName, \
    CASE \
        WHEN U.username IS NULL THEN U.systemusername\
        ELSE U.username\
    END AS [User], U.userid AS UserId,\
    ST.[description] AS [Status],\
    S.startdatetime, S.starttimezoneoffset,\
    S.enddatetime, S.endtimezoneoffset\
FROM BPASession S WITH (NOLOCK)\
JOIN BPAStatus ST WITH (NOLOCK) ON S.statusid = ST.statusid\
LEFT JOIN BPAResource R WITH (NOLOCK) ON S.runningresourceid = R.resourceid\
LEFT JOIN BPAProcess P WITH (NOLOCK) ON S.processid = P.processid\
LEFT JOIN BPAUser U WITH (NOLOCK) ON S.starteruserid = U.userid\
WHERE enddatetime > ?\
ORDER BY enddatetime ASC
query_timeout = 30
source = 
sourcetype = db:blueprism
tail_rising_column_init_ckpt_value = {"value":"2019-01-01 00:00:00.000","columnType":93}
tail_rising_column_name = enddatetime
tail_rising_column_number = 12
checkpoint_key = 63471f19306d0000280060d5

