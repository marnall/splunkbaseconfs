[bp_workqueue]
batch_upload_size = 1000
connection = db_blueprism
disabled = 0
fetch_size = 300
index = blueprism
index_time_mode = current
interval = */10 * * * *
max_rows = 0
max_single_checkpoint_file_size = 10485760
mode = rising
query = SELECT Q.id AS QueueId, Q.ident, Q.name, S.description AS [Status], A.completed AS [Completed], A.pending AS [Pending], A.exceptioned AS [Referred], \
	(A.completed+A.pending+A.exceptioned) AS [Total], A.totalWorkTime AS TotalMinutesWorked, A.dateUpdated\
FROM BPAWorkQueue Q WITH (NOLOCK) \
JOIN BPAWorkQueueItemAggregate A WITH (NOLOCK) ON Q.ident = A.queueIdent \
JOIN BPAStatus S WITH (NOLOCK) ON Q.running = S.statusid\
WHERE dateUpdated > ?\
ORDER BY dateUpdated ASC
query_timeout = 30
sourcetype = db:blueprism
tail_rising_column_init_ckpt_value = {"value":"1970-01-01 00:00:00.000","columnType":93}
tail_rising_column_name = dateUpdated
tail_rising_column_number = 10
checkpoint_key = 63471f18306d0000280060d3
input_type = event

[bp_workqueueitem]
batch_upload_size = 1000
connection = db_blueprism
disabled = 0
fetch_size = 1000
index = blueprism
index_time_mode = dbColumn
input_timestamp_column_number = 8
interval = */10 * * * *
max_rows = 10000
max_single_checkpoint_file_size = 10485760
mode = rising
query = SELECT QI.ident ,\
        QI.id ,\
        QI.queueid ,\
        (SELECT name FROM BPAWorkQueue Q WITH (NOLOCK) WHERE Q.id = QI.queueid) AS name ,\
        QI.keyvalue ,\
        QI.status ,\
        QI.attempt ,\
        QI.loaded ,\
        QI.locked ,\
        QI.completed ,\
        QI.exception ,\
        QI.exceptionreason ,\
        QI.deferred ,\
        QI.worktime ,\
        QI.queueident ,\
        QI.sessionid ,\
        QI.priority ,\
        QI.queuepositiondate ,\
        QI.prevworktime ,\
        QI.attemptworktime ,\
        QI.finished ,\
        QI.state ,\
        QI.lastupdated ,\
        QI.exceptionreasonvarchar ,\
        QI.exceptionreasontag ,\
        QI.encryptid,\
		(SELECT R.name FROM BPASession S WITH (NOLOCK) JOIN BPAResource R WITH (NOLOCK) ON S.runningresourceid = R.resourceid WHERE S.sessionid = QI.sessionid) AS resourcename,  \
		(SELECT P.name FROM BPASession S WITH (NOLOCK) JOIN BPAProcess P WITH (NOLOCK) ON S.processid = P.processid WHERE S.sessionid = QI.sessionid) AS processname,  \
        (SELECT sessionnumber FROM BPASession WITH (NOLOCK) WHERE sessionid = QI.sessionid) AS sessionnumber, \
        (SELECT description FROM BPAStatus WITH (NOLOCK) WHERE statusid = QI.state) AS description \
FROM BPVWorkQueueItem QI WITH (NOLOCK) \
WHERE ident > ?\
ORDER BY ident ASC
query_timeout = 30
sourcetype = db:blueprism
tail_rising_column_init_ckpt_value = {"value":"1970-01-01 00:00:00.000","columnType":93}
tail_rising_column_name = lastupdated
tail_rising_column_number = 1
checkpoint_key = 63471f19306d0000280060d6

