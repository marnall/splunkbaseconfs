[bp_auditevents]
batch_upload_size = 1000
connection = db_blueprism
disabled = 0
fetch_size = 1000
host = 
index = blueprism
index_time_mode = dbColumn
input_timestamp_column_number = 1
interval = */10 * * * *
max_rows = 10000
max_single_checkpoint_file_size = 10485760
mode = rising
query = SELECT\
    A.eventdatetime as EventDatetime, A.eventid as EventID,\
    A.sCode as Code, S.username as ByUser, A.sNarrative as Narrative,\
    A.comments as Comments, T.username as TargetUser, P.name as TargetProcess,\
    A.EditSummary, R.Name as TargetResource\
FROM BPAAuditEvents A WITH (NOLOCK)\
LEFT OUTER JOIN BPAProcess P WITH (NOLOCK) ON A.gTgtProcID= P.processid \
LEFT OUTER JOIN BPAUser S WITH (NOLOCK) ON A.gSrcUserID= S.userid\
LEFT OUTER JOIN BPAUser T WITH (NOLOCK) ON A.gTgtUserID= T.userid\
LEFT OUTER JOIN BPAResource R WITH (NOLOCK) ON A.gTgtResourceID = R.ResourceID\
WHERE EventID > ?\
ORDER BY EventID ASC
query_timeout = 30
