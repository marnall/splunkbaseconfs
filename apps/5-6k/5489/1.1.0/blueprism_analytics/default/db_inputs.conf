        (SELECT name FROM BPAWorkQueue Q WITH (NOLOCK) WHERE Q.id = QI.queueid) AS name ,\
        QI.keyvalue ,\
        QI.status ,\
        QI.attempt ,\
        QI.loaded ,\
        QI.locked ,\
        QI.completed ,\
        QI.exception ,\
        QI.exceptionreason ,\
        QI.deferred ,\
        QI.worktime ,\
        QI.queueident ,\
        QI.sessionid ,\
        QI.priority ,\
        QI.queuepositiondate ,\
        QI.prevworktime ,\
        QI.attemptworktime ,\
        QI.finished ,\
        QI.state ,\
        QI.lastupdated ,\
        QI.exceptionreasonvarchar ,\
        QI.exceptionreasontag ,\
        QI.encryptid,\
		(SELECT R.name FROM BPASession S WITH (NOLOCK) JOIN BPAResource R WITH (NOLOCK) ON S.runningresourceid = R.resourceid WHERE S.sessionid = QI.sessionid) AS resourcename,  \
		(SELECT P.name FROM BPASession S WITH (NOLOCK) JOIN BPAProcess P WITH (NOLOCK) ON S.processid = P.processid WHERE S.sessionid = QI.sessionid) AS processname,  \
