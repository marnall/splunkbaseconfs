enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = blueprism_analytics
request.ui_dispatch_view = search
search = index=blueprism sourcetype=db:blueprism source=bp_session sessionid Status="Terminated"\
| dedup sessionnumber sortby -_time \
| eval SessionNumber=sessionnumber, StartDate=startdatetime, EndDate=enddatetime \
| eval start=strptime(startdatetime, "%Y-%m-%d %H:%M:%S.%3N"), end=strptime(enddatetime, "%Y-%m-%d %H:%M:%S.%3N") \
| eval timespan=(end-start)\
| stats sum(timespan) as totaltime by SessionNumber, ProcessName, Resource, User, Status, StartDate, EndDate\
| eval TimeWorked=tostring(round(totaltime,3),"duration") \
| sort -SessionNumber \
| table SessionNumber, ProcessName, Resource, User, Status, StartDate, EndDate, TimeWorked

[License Expiration Warning]
action.email = 1
action.email.inline = 1
action.email.priority = 1
action.email.sendresults = 1
action.email.show_password = 1
action.email.to = 
action.email.useNSSubject = 1
alert.severity = 5
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 1 * * *
dispatch.earliest_time = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.custom.type = simple_xml_examples.tagcloud
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = blueprism_analytics
request.ui_dispatch_view = search
search = index="blueprism" source="bp_auditevents" Code="S002" \
| dedup Code sortby -_time \
| rex "(?P<Name>(?i)([^\\\]+?\.lic))" \
| rex "(?P<Type>(?i)(?<= - Type: )(?s)([^,]+))" \
| rex "(?P<Owner>(?i)(?<=, Owner: )(?s)([^,]+))" \
| rex "(?P<Start>(?i)(?i)(?<=, Start date: )(?s)([^,]+))" \
| rex "(?P<Expiry>(?i)(?<=, Expiry date: )(?s)([^\"]+))" \
| eval expiry=Expiry, timeNow=strftime(now(), "%m/%d/%Y") \
| eval Status=if(expiry>timeNow, "Active", "Inactive"), expiry_epoch=strptime(expiry, "%m/%d/%Y"), now_epoch=strptime(timeNow, "%m/%d/%Y") \
| eval DaysRemain=if(round((expiry_epoch-now_epoch)/86400) <= 0, 0, round((expiry_epoch-now_epoch)/86400))\
| where Status="Active" and (DaysRemain < 30 and DaysRemain > 0)\
| table Name, Type, Owner, Start, Expiry, Status, DaysRemain
