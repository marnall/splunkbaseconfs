
[default_index]
#put your index name as the value for definition
definition = ""
iseval = 0

[extractfqdn]
definition = rex field=websites "(?:@|(?<scheme>\w+)\:\/\/|^)(?<hostname>([\w\- ]+\.)+[\w\- ]+)(?:\/|\:|$)" | where isnotnull(hostname) | rex field=hostname "(?<ipv4>[[octet]](?:\.[[octet]]){3})" | where isnull(ipv4)
iseval = 0

[queryuserhost]
definition = rex field=Users "(?<ipv4>[[octet]](?:\.[[octet]]){3})" | lookup dnslookup clientip as ipv4 OUTPUT clienthost as "Hostname" | fields - ipv4
iseval = 0
