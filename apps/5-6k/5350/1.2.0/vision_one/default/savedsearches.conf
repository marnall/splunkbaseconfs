[TopRisky]
action.email.useNSSubject = 1
alert.track = 0
auto_summarize = 1
auto_summarize.dispatch.earliest_time = 0
dispatch.earliest_time = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = vision_one
request.ui_dispatch_view = search
search = `default_index` tag=web OR tag=proxy \
| eval indextime=_indextime \
| eval websites=coalesce(site,url,dest) \
| stats count AS count1 max(indextime) as last_index_time by websites,src \
| `extractfqdn`\
| stats sum(count1) AS Visited dc(src) AS "Unique User Count" max(last_index_time) as last_index_time by hostname \
| lookup dstcrs_lookup _key AS hostname OUTPUTNEW RiskLevel AS "Risk Score" ServiceGenre AS Category\
| search "Risk Score" > -1\
| sort - "Risk Score",Visited

