
[crowdstrike:fdr:data:json]
EVAL-action = case('data.PatternDispositionValue'== 0, "allowed",'data.PatternDispositionValue' == 128,"allowed", 'data.PatternDispositionValue' == 272, "allowed",'data.PatternDispositionValue' == 768, "allowed",'data.PatternDispositionValue' == 1280, "allowed",'data.PatternDispositionValue' == 2304, "allowed",'data.PatternDispositionValue' == 4638, "allowed",'data.PatternDispositionValue'==16,"blocked",'data.PatternDispositionValue'==512,"blocked", 'data.PatternDispositionValue'==1024,"blocked", 'data.PatternDispositionValue'==2048, "blocked", 'data.PatternDispositionValue'==2176, "blocked", 'data.PatternDispositionValue'==4096, "blocked", 'data.PatternDispositionValue'==4112, "blocked", 'data.Success'=="false", "failure", 'data.Success'=="true", "success")
EVAL-additional_answer_count = mvcount(split(data.IP4Records,";"))-1
EVAL-direction = case('data.ConnectionDirection' = 0, "outbound", 'data.ConnectionDirection' = 1, "inbound", 'data.ConnectionDirection' = 2, "neither", 'data.ConnectionDirection' = 3, "both")
EVAL-severity = data.SeverityName
EVAL-src_ip = case('data.ConnectionDirection' = 0, 'data.LocalAddressIP4', 'data.ConnectionDirection' = 1, 'data.RemoteAddressIP4' )
EVAL-vendor_product = "CrowdStrike Falcon Data Replicator"
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_10 = data.SHA256HashData AS file_hash
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_11 = data.MD5HashData AS file_hash
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_12 = data.OriginalFilename AS file_name
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_13 = data.FilePath AS file_path
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_14 = data.FileName AS file_name
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_15 = data.ParentImageFileName AS parent_process_path
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_16 = data.ParentCommandLine AS parent_process
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_17 = data.UserName AS user
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_2 = data.RequestType AS record_type
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_3 = data.RequestType AS query_type
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_4 = data.RespondingDnsServer AS src
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_5 = data.IcmpType AS icmp_type
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_6 = data.IcmpCode AS icmp_code
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_8 = data.RemoteAddressIP4 AS dest_ip
FIELDALIAS-aob_gen_crowdstrike_fdr_data_json_alias_9 = data.RemotePort AS dest_port
FIELDALIAS-crowdstrike_data_json_alias_1 = data.ImageFileName AS file_path
FIELDALIAS-crowdstrike_data_json_alias_10 = data.file_path AS process_path
FIELDALIAS-crowdstrike_data_json_alias_2 = data.aip as ip
FIELDALIAS-crowdstrike_data_json_alias_3 = data.event_platform AS os
FIELDALIAS-crowdstrike_data_json_alias_4 = data.ParentBaseFileName AS parent_process_exec
FIELDALIAS-crowdstrike_data_json_alias_5 = data.ParentProcessId AS parent_process_id
FIELDALIAS-crowdstrike_data_json_alias_6 = data.ParentBaseFileName AS parent_process_name
FIELDALIAS-crowdstrike_data_json_alias_7 = data.CommandLine AS process
FIELDALIAS-crowdstrike_data_json_alias_8 = mvappend(data.SHA256HashData, data.MD5HashData) AS process_hash
FIELDALIAS-crowdstrike_data_json_alias_9 = data.RawProcessId AS process_id
KV_MODE = json
LOOKUP-protocol = data.Protocol "data.Protocol" AS "data.Protocol" OUTPUT protocol AS protocol
SHOULD_LINEMERGE = 0
TIME_FORMAT = %s
TIME_PREFIX = timestamp
category = CrowdStrike FDR Data
pulldown_type = 1

