[CrowdStrike FDR S3: Indexing]
dispatchAs = user
action.email.useNSSubject = 1
alert.track = 0
description = Shows the amount of CrowdStrike FDR Data that was indexed within a specific time frame.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-falcon-data-replicator
request.ui_dispatch_view = search
search = `cs_fdr_data_get_index` | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S") | stats count by "Indexed Time" | rename count as "CrowdStrike FDR S3 Events Indexed" | sort -"Indexed Time"

[CrowdStrike FDR:S3 Logs - 30 Days]
dispatchAs = user
action.email.useNSSubject = 1
alert.track = 0
description = Collects the CrowdStrike FDR:SQS Technical Add-on logs for the past 30 days
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-falcon-data-replicator-sqs
request.ui_dispatch_view = search
search = index=_internal  sourcetype="tacrowdstrikefalcondatareplicator:log"

[CrowdStrike Falcon FDR: S3 Data Indexed vs Event Time]
dispatchAs = user
action.email.useNSSubject = 1
alert.track = 0
description = Shows when the CrowdStrike FDR:SQS data was indexed, the event timestamp, the sourcetype and the count of events. Timespan needs to be large enough to include the Event Time stamp.\
	NOTE: This report can also include FDR:SQS events
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-falcon-data-replicator
request.ui_dispatch_view = search
search = index=* sourcetype="crowdstrike:fdr*:json" | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S")  | eventstats count by "Indexed Time" | rename count as "Number of CrowdStrike FDR Events"  | eval "FDR Event Time" = strftime(_time, "%Y-%m-%d %H:%M:%S")| table  "Indexed Time", "FDR Event Time", sourcetype, "Number of CrowdStrike FDR Events"  | sort  -"Indexed Time"

