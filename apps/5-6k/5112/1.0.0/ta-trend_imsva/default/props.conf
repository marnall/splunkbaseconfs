[trend:imsva:syslog]
SHOULD_LINEMERGE = false
TRUNCATE = 99999
MAX_TIMESTAMP_LOOKAHEAD = 80
TIME_FORMAT = %Y/%m/%d %H:%M:%S
TIME_PREFIX = \:\s
KV_MODE = none

EVAL-vendor = "Trend Micro"
EVAL-product = "IMSVA"
EVAL-vendor_product = vendor+" - "+product

[trend:imsva:polevt]
SHOULD_LINEMERGE = false
TRUNCATE = 99999
MAX_TIMESTAMP_LOOKAHEAD = 19
TIME_FORMAT = %Y/%m/%d %H:%M:%S
TIME_PREFIX = ^
KV_MODE = none

EVAL-vendor = "Trend Micro"
EVAL-product = "IMSVA:Policy_Event"

REPORT=tsv_extractions = polevt_tsv_extractions

FIELDALIAS-internal_message_id = Internal_Message_ID AS internal_message_id
FIELDALIAS-src_user = Smtp_sender AS src_user
FIELDALIAS-recipient = Smtp_recipient AS recipient
FIELDALIAS-subject = Message_subject AS subject
FIELDALIAS-signature_id = Filter_type AS signature_id
FIELDALIAS-signature_extra = Filter_Description AS signature_extra
FIELDALIAS-file_name = Attachment_name AS file_name Message_attachment_name AS file_name
FIELDALIAS-file_hash = so_file_value AS file_hash
FIELDALIAS-url = so_url_value AS url
FIELDALIAS-size = Message_size AS size
FIELDALIAS-filter_score = Spam_score AS filter_score

LOOKUP-trend_imsva_action_rule = trend_imsva_action_rule_lookup action_rule_code AS Action OUTPUT filter_action action
LOOKUP-trend_imsva_filter_rule = trend_imsva_filter_rule_lookup filter_rule_code AS Filter_type OUTPUT filter_rule AS signature

[trend:imsva:msgtra]
SHOULD_LINEMERGE = false
TRUNCATE = 99999
MAX_TIMESTAMP_LOOKAHEAD = 27
TIME_FORMAT = %Y %b %e %H:%M:%S %:z
TIME_PREFIX = ^\S+\s(?:(\#null\#\s){2}|)
KV_MODE = none

EVAL-vendor = "Trend Micro"
EVAL-product = "IMSVA:Message Tracing"
EVAL-vendor_product = vendor+" - "+product

REPORT=tsv_extractions = msgtra_tsv_extractions

FIELDALIAS-file_name = original_attach_name AS file_name
FIELDALIAS-message_id = Message_ID AS message_id
FIELDALIAS-internal_message_id = Internal_Message_ID AS internal_message_id
FIELDALIAS-src_user = sender AS src_user
FIELDALIAS-recipient_status = DeliveryStatus AS recipient_status

LOOKUP-trend_imsva_action_rule = trend_imsva_action_rule_lookup action_rule_code AS Action OUTPUT filter_action action
LOOKUP-trend_imsva_filter_rule = trend_imsva_filter_rule_lookup filter_rule_code AS Filter_type OUTPUT filter_rule AS signature

