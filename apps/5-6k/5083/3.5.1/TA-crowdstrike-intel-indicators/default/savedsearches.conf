[default]
[CrowdStrike Intel Indicators Data Indexed vs Event Time]
action.email.useNSSubject = 1
alert.track = 0
description = Shows when the CrowdStrike Intel Indicator events were indexed, the event timestamp, the sourcetype and the count of events. Timespan needs to be large enough to include the Event Time stamp.
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
dispatchAs = user
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-intel-indicators
request.ui_dispatch_view = search
search = `cs_ii_get_index`  | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S")  | eventstats count by "Indexed Time" | rename count as "Number of CrowdStrike Intel Indicator Events"  | eval "Indicator Event Time" = strftime(_time, "%Y-%m-%d %H:%M:%S")| table  "Indexed Time", "Indicator Event Time", sourcetype, "Number of CrowdStrike Intel Indicator Events"  | sort  -"Indexed Time"

[CrowdStrike Intel Indicators Indexing by Hour]
action.email.useNSSubject = 1
alert.track = 0
description = Shows the amount of CrowdStrike Intel Indicator events that were indexed within a specific time frame.\
Timespan needs to be large enough to include the Event Time stamp.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatchAs = user
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-intel-indicators
request.ui_dispatch_view = search
search = `cs_ii_get_index`  | bucket _indextime span=1h | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S") | stats count by "Indexed Time" | rename count as "CrowdStrike Intel Indicators Events Indexed" | sort -"Indexed Time"

[CrowdStrike Intel Indicators Logs - 30 Days]
action.email.useNSSubject = 1
alert.track = 0
description = Collects the CrowdStrike Intel Indicators Technical Add-on logs for the past 30 days
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
dispatchAs = user
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-intel-indicators
request.ui_dispatch_view = search
search = `cs_intel_indicators_logs`