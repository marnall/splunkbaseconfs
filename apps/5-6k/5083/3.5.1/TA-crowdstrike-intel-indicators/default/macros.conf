[default]
[CrowdStrike_Intel_Compare_Indicator(1)]
args = indicator
definition = `cs_ii_get_index` indicator="$indicator$" | eventstats count(last_updated) as inscope by indicator | search inscope > 1 | eval indexed_at=strftime(_indextime,"%Y-%m-%d %H:%M:%S") | stats dc(*) AS DC_* values(*) AS * by indicator | foreach DC_* [eval <<MATCHSTR>> = if(('<<FIELD>>' > 1), '<<MATCHSTR>>', "No Difference")] | fields - DC_*, labels_*, date_*, ta_*, relations_*, splunk_*, *{}*, host, index, eventtype, sourcetype, tag*, time*, inscope
iseval = 0

[CrowdStrike_Intel_Compare_Indicator_Type(1)]
args = type
definition = `cs_ii_get_index` type="$type$" | eventstats count(last_updated) as inscope by indicator | search inscope > 1 | eval indexed_at=strftime(_indextime,"%Y-%m-%d %H:%M:%S") | eval last_updated_time=strftime(last_updated,"%Y-%m-%d %H:%M:%S")| stats dc(*) AS DC_* values(*) AS * by indicator | foreach DC_* [eval <<MATCHSTR>> = if(('<<FIELD>>' > 1), '<<MATCHSTR>>', null())] | fields - DC_*, labels_*, date_*, ta_*, relations_*, splunk_*, *{}*, host, index, eventtype, sourcetype, tag*, time*, null,inscope
iseval = 0

