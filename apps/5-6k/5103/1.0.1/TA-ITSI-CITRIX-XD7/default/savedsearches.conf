[TA-ITSI-CITRIX-XD7-Citrix_Storefront_Entity_Importer]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","LoginSuccess","Failure_reason","LoginFailed"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search
search = (index=storefront s_ip != "127.0.0.1") OR (index=xd* sourcetype="xendesktop:7:session" LaunchedViaIP!="") | eval key_ip = coalesce(LaunchedViaIP, s_ip) | stats values(SiteName) as SiteName, values(s_computername) as host, values(web_server) as web_server by key_ip | eval tmp_entity = host | rename key_ip as IP | eval CitrixRole="Storefront"

