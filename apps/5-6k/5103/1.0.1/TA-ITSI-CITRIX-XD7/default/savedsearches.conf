[TA-ITSI-CITRIX-XD7-Gateway_Entity_Importer]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search
search = (index=netscaler citrix_netscaler_event_name=TCPCONNSTAT) OR (`xd_index` sourcetype=xendesktop:7:session)   | rex "^\w+\s+\d+\s[^\s]+\s(?<ext_ip>[^\s]+)\s+" | eval GWIP = coalesce(Nat_ip, ConnectedViaIP)  | stats  values(ns_name) as netscaler_name, values(SiteName) as SiteName, values(ext_ip) as ext_ip by GWIP | eval tmp_entity = netscaler_name | eval CitrixRole="Gateway" | eval host=temp_entity | where NOT isnull(netscaler_name)


