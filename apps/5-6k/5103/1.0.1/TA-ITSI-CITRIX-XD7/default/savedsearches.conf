[TA-ITSI-CITRIX-XD7-Citrix_Sites_By_Controller_Importer]
action.email.useNSSubject = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search
search = `xd_index` sourcetype="xendesktop:7:controller" | eval MachineName = mvindex(split(MachineName, "\\"),1) | stats values(DNSName) as DNSName, values(ControllerVersion) as ControllerVersion, values(OSType) as OSType, values(OSVersion) as OSVersion, values(UUID) as UUID, values(SiteName) as SiteName by MachineName | eval host=MachineName | eval CitrixRole="DeliveryController" | eval tmp_entity = host


