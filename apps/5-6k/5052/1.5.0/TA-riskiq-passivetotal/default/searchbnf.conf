# Custom commands for fetching Tab data

[rptpullindicators-command]
syntax = <Main search> | rptpullindicators field=<field name> type=<dataset-type>
description = Fetch details of indicators of various datasets from PassiveTotal API. Supported datasets are passivedns, whois, certificates, subdomains, trackers, components, hostpairs, osint, hashes, tags
shortdesc = Fetch details of Indicators.
example1 = | rptpullindicators field="src_ip,dst_ip" type="passivedns,whois"
usage = public

[rptresolutions-command]
syntax = rptresolutions query=<ip/hostname>
description = Execute a Resolutions query against the remote PassiveTotal database. For more details on the call and results, see https://api.passivetotal.org/api/docs/#api-DNS-GetV2DnsPassiveQuery.
shortdesc = Executes a Resolutions DNS query.
example1 = | rptresolutions query="www.passivetotal.org"
usage = public

