
[admin:TA_riskiq_passivetotal]
match = /
members = TA_riskiq_passivetotal_settings, TA_riskiq_passivetotal_indicators

[admin_external:TA_riskiq_passivetotal_settings]
python.version = python3
handlertype = python
handlerfile = TA_riskiq_passivetotal_rh_settings.py
handleractions = edit, list

[admin_external:TA_riskiq_passivetotal_indicators]
python.version = python3
handlertype = python
handlerfile = TA_riskiq_passivetotal_rh_indicators.py
handleractions = edit, list, remove, create

[script:upload_indicators]
python.version = python3
match = /upload_indicators_service
handler = upload_indicators.Indicators