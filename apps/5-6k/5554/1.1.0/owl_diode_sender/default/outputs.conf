# This syslog-statement MUST be called 'diode-syslog-tcp' and is referenced in transforms.conf
# PRO: Can handle larger events
# maxEventSize default value is 1024 (around 1000 characters). 
# If you are expecting events with large number of characters, uncomment and set the desired value.

[syslog:diode-syslog-tcp]
disabled = false
server = 10.10.10.10:10001
type = tcp
priority = <42>
timestampformat = %b %e %H:%M:%S
#maxEventSize=512000

# This syslog-statement MUST be called 'diode-syslog-udp' and is referenced in transforms.conf
# PRO: Always works
# CON: limited to MTU size

[syslog:diode-syslog-udp]
disabled = true
server = 10.10.10.10:7500
type = udp
priority = <42>
timestampformat = %b %e %H:%M:%S
#maxEventSize=512000