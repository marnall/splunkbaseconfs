[generate_cron_schedule(4)]
args = title,current_minute,frequency,end_minute
definition = eval _time = now(), next_minute = $current_minute$, title="$title$" | append [| makeresults count=60 | eval current_minute = $current_minute$, frequency = $frequency$, end_minute = $end_minute$ | accum frequency as next_offset | `generate_cron_schedule_sub($current_minute$, $next_offset$, $end_minute$)` | eval title="$title$" ]
iseval = 0

[generate_cron_schedule_sub(3)]
args = current_minute,next_offset,end_minute
definition = map maxsearches=60 search="| makeresults count=1 | eval next_minute = $current_minute$ + $next_offset$ | where next_minute <= $end_minute$"
iseval = 0

[generate_cron_schedule_day_part(4)]
args = title,current_day,frequency,end_day
definition = eval _time = now(), next_day = $current_day$, title="$title$" | append [| makeresults count=7 | eval current_day = $current_day$, frequency = $frequency$, end_day = $end_day$ | accum frequency as next_offset | `generate_cron_schedule_sub_day_part($current_day$, $next_offset$, $end_day$)` | eval title="$title$" ]
iseval = 0

[generate_cron_schedule_sub_day_part(3)]
args = current_day,next_offset,end_day
definition = map maxsearches=7 search="| makeresults count=1 | eval next_day = $current_day$ + $next_offset$ | where next_day <= $end_day$"
iseval = 0
