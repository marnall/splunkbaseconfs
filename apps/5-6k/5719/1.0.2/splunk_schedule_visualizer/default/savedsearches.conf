[Splunk Cron Visualizer Raw Data Lookup Gen]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 13 0 * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.custom.type = heat-map-viz.heat-map-viz
display.visualizations.show = 0
display.visualizations.type = custom
enableSched = 1
request.ui_dispatch_app = splunk_schedule_visualizer
request.ui_dispatch_view = search
search = | makeresults count=60 \
| streamstats count \
| eval sub_time = strptime(strftime(now(), "%Y-%m-%d %H") + ":"+count+":00", "%Y-%m-%d %H:%M:%S") \
| rename count as minute \
| join type=left minute \
    [| rest splunk_server=local count=0 /services/saved/searches \
    | where is_scheduled=1 \
    | table title cron_schedule \
    | rex field=cron_schedule "^(?<minute_part>.*?)\s" \
    | rex field=cron_schedule "(?<day_part>[^\s]$)" \
    | eval day_part_start = case(match(day_part, "^\*$"), 0, match(day_part, "^\d+\-\d+\/\d+"), tonumber(mvindex(split(day_part, "-"),0)), match(day_part, "^\*\/\d+"), 0, match(day_part, "^\d+$"), tonumber(day_part), 1==1, null()) \
    | eval day_part_end = case(match(day_part, "^\*$"), 6, match(day_part, "^\d+\-\d+\/\d+"), tonumber(mvindex(split(mvindex(split(day_part, "-"),1), "/"), 0)), match(day_part, "^\*\/\d+"), 6, match(day_part, "^\d+$"), tonumber(day_part), 1==1, null()) \
    | eval day_part_frequency = case(match(day_part, "^\*$"), 1, match(day_part, "^\d+\-\d+\/\d+"), tonumber(mvindex(split(mvindex(split(day_part, "-"),1), "/"), 1)), match(day_part, "^\*\/\d+"), tonumber(mvindex(split(day_part, "/"),1)), day_part_start==day_part_end, 1, 1==1, null()) \
    | map maxsearches=100 search="| makeresults 1 | `generate_cron_schedule_day_part($title$, $day_part_start$, $day_part_frequency$ ,$day_part_end$)`" \
    | append \
        [| rest splunk_server=local count=0 /services/saved/searches \
        | where is_scheduled=1 \
        | table title cron_schedule \
        | rex field=cron_schedule "^(?<minute_part>.*?)\s" \
        | eval minute_part_start = case(match(minute_part, "^\*$"), 0, match(minute_part, "^\d+\-\d+\/\d+"), tonumber(mvindex(split(minute_part, "-"),0)), match(minute_part, "^\*\/\d+"), 0, match(minute_part, "^\d+$"), tonumber(minute_part), 1==1, null()) \
        | eval minute_part_end = case(match(minute_part, "^\*$"), 59, match(minute_part, "^\d+\-\d+\/\d+"), tonumber(mvindex(split(mvindex(split(minute_part, "-"),1), "/"), 0)), match(minute_part, "^\*\/\d+"), 59, match(minute_part, "^\d+$"), tonumber(minute_part), 1==1, null()) \
        | eval minute_part_frequency = case(match(minute_part, "^\*$"), 1, match(minute_part, "^\d+\-\d+\/\d+"), tonumber(mvindex(split(mvindex(split(minute_part, "-"),1), "/"), 1)), match(minute_part, "^\*\/\d+"), tonumber(mvindex(split(minute_part, "/"),1)), minute_part_start==minute_part_end, 1, 1==1, null()) \
        | map maxsearches=100 search="| makeresults 1 | `generate_cron_schedule($title$, $minute_part_start$, $minute_part_frequency$ ,$minute_part_end$)`" ] \
    | stats values(next_day) as next_day values(next_minute) as next_minute by title \
    | mvexpand next_day \
    | eval next_day = case(next_day==0, "Sunday", next_day==1, "Monday", next_day==2, "Tuesday", next_day==3, "Wednesday", next_day==4, "Thursday", next_day==5, "Friday", next_day==6, "Saturday", 1==1, "Invalid") \
    | mvexpand next_minute \
    | eval minute = tonumber(next_minute), day = next_day, title =  title+";"\
    | stats dc(title) as scheduled_searches, values(title) as scheduled_searches_list, values(day) as day by minute] \
| table scheduled_searches, day, minute, scheduled_searches_list\
| fillnull value="Monday Tuesday Wednesday Thursday Friday Staurday Sunday" day \
| makemv delim=" " day \
| fillnull value=0 scheduled_searches \
| mvexpand day \
| eval total_theoretical_limit_per_min = \
    [| rest splunk_server=local count=0 /services/server/info \
    | table numberOfCores \
    | eval number_of_cpus = numberOfCores, max_searches_per_cpu = 1, base_max_searches = 6, max_hist_searches_per_sec = ((max_searches_per_cpu * number_of_cpus) + base_max_searches)/2, avg_search_duration_sec = \
        [ search index=_internal source=*scheduler.log run_time=* savedsearch_name=* \
        | stats avg(run_time) as avg_run_time \
        | return $avg_run_time], total_theoretical_limit_per_sec = round(max_hist_searches_per_sec/avg_search_duration_sec), total_theoretical_limit_per_min = round((max_hist_searches_per_sec/avg_search_duration_sec) * 60) \
    | return $total_theoretical_limit_per_min], 95_perc = round(total_theoretical_limit_per_min*0.95, 2), 80_perc = round(total_theoretical_limit_per_min*0.80, 2) \
| outputlookup cron_visualizer_raw_data_lookup.csv
