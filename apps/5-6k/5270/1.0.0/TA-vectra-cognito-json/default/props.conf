[default]
KV_MODE = none

[vectra:cognito:json]
KV_MODE = json
LINE_BREAKER = ([\n\r]+)
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
TIME_FORMAT = %s%3N
TIME_PREFIX = "vectra_timestamp": "
MAX_TIMESTAMP_LOOKAHEAD = 13
SEDCMD-strip_prefix = s/^[^{]+//g
TZ = UTC
TRANSFORMS-vectra_sourcetypes = vectra_cognito_campaigns,vectra_cognito_health,vectra_cognito_audit,vectra_cognito_detect,vectra_cognito_hostscoring,vectra_cognito_accountdetect,vectra_cognito_accountscoring,vectra_cognito_accountlockdown,vectra_cognito_hostlockdown
description = Vectra Cognito Detect JSON Events


[vectra:cognito:detect]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-src = coalesce(host_name, host_ip)
EVAL-dest = coalesce(dd_dst_dns, dd_dst_ip)
EVAL-action = if(triaged=="true","triaged",null)
EVAL-ids_type = "network
EVAL-severity-name = case(severity_id==0,"informational",severity_id>=1 AND severity_id<4,"low",severity_id>=4 AND severity_id<=5,"medium",severity_id>=6 AND severity_id<=7,"high",severity_id>=8,"critical")
FIELDALIAS-alias = d_type ASNEW signature_name d_type_vname ASNEW signature severity ASNEW severity_id dd_proto ASNEW transport href ASNEW vectra_url dd_bytes_rcvd ASNEW bytes_in dd_bytes_sent ASNEW bytes_out dd_dst_dns ASNEW dest_host dd_dst_ip ASNEW dest_ip dd_dst_port ASNEW dest_port host_ip ASNEW src_ip host_name ASNEW src_host detection_id ASNEW external_id



[vectra:cognito:accountdetect]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-src = coalesce(host_name, host_ip)
EVAL-action = if(triaged=="true","triaged",null)
EVAL-severity-name = case(severity_id==0,"informational",severity_id>=1 AND severity_id<4,"low",severity_id>=4 AND severity_id<=5,"medium",severity_id>=6 AND severity_id<=7,"high",severity_id>=8,"critical")
EVAL-ids_type = "network"
FIELDALIAS-alias = d_type ASNEW signature_name d_type_vname ASNEW signature severity ASNEW severity_id href ASNEW vectra_url dd_bytes_rcvd ASNEW bytes_in dd_bytes_sent ASNEW bytes_out dd_dst_dns ASNEW dest_host dd_dst_ip ASNEW desp_ip dd_dst_port ASNEW dest_port account_uid ASNEW account detection_id ASNEW external_id


[vectra:cognito:hostscoring]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-src = coalesce(src_host, src_ip)
EVAL-src = coalesce(host_name, host_ip)
EVAL-signature = "hsc"
FIELDALIAS-alias = href ASNEW vectra_url host_ip ASNEW src_ip host_name ASNEW src_host host_id ASNEW external_id dst_key_asset ASNEW dest_key_asset

[vectra:cognito:accountscoring]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
FIELDALIAS-alias = href ASNEW vectra_url account_id ASNEW externalId account_uid ASNEW saccount

[vectra:cognito:accountlockdown]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
FIELDALIAS-alias = href ASNEW vectra_url account_id ASNEW externalId user ASNEW suser account_uid ASNEW account

[vectra:cognito:hostlockdown]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
FIELDALIAS-alias = href ASNEW vectra_url

[vectra:cognito:campaigns]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-dest = coalesce(dest_name, dest_ip)
EVAL-src = coalesce(src_name, src_ip)
FIELDALIAS-alias = src_hid ASNEW suid det_id ASNEW vectra_detection_id dest_id ASNEW duid dest_name ASNEW dhost dest_ip ASNEW dst src_name ASNEW src_host src_ip ASNEW src campaign_id ASNEW external_id campaign_name ASNEW signature vectra_timestamp ASNEW rt campaign_link ASNEW vectra_url

[vectra:cognito:audit]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-src = coalesce(src_host, src_ip)
EVAL-signature = "audit"
FIELDALIAS-alias = role ASNEW privilege

[vectra:cognito:health]
KV_MODE = json
EVAL-dvc = coalesce(dvchost, headend_addr)
EVAL-signature = "health"



