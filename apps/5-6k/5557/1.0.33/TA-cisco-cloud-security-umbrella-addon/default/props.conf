# [cisco_cloud_security_umbrella_addon]
# SHOULD_LINEMERGE = 0
# category = Splunk App Add-on Builder
# pulldown_type = 1

# [source::...ta-cisco-cloud-security-umbrella-addon*.log*]
# SHOULD_LINEMERGE = true
# sourcetype = taciscocloudsecurityumbrellaaddon:log

# [source::...ta_cisco_cloud_security_umbrella_addon*.log*]
# SHOULD_LINEMERGE = true
# sourcetype = taciscocloudsecurityumbrellaaddon:log


[cisco:umbrella:dns]
REPORT-dnslogs-fields = dnslogs_fields
LINE_BREAKER = ([\r\n]+)
# EVENT_BREAKER = ([\r\n]+)
# EVENT_BREAKER_ENABLE = true
SHOULD_LINEMERGE = false
CHARSET = AUTO
disabled = false
TRUNCATE = 1000000
MAX_EVENTS = 1000000
EVAL-product = "Umbrella"
EVAL-vendor = "Cisco"
EVAL-vendor_product = "Cisco Umbrella"
MAX_TIMESTAMP_LOOKAHEAD = 22
NO_BINARY_CHECK = true
TIME_PREFIX = ^
TIME_FORMAT = "%Y-%m-%d %H:%M:%S"
TZ = UTC
EVAL-record_type = case(RecordType=="1 (A)","A")
EVAL-query_type = case(RecordType=="1 (A)","A")
FIELDALIAS-dns_query = domain as query
EVAL-action = lower(action)
EVAL-reply_code = case(ReplyCode=="NOERROR","No Error",ReplyCode=="FORMERR","Format Error",ReplyCode=="SERVFAIL","Server Failure",ReplyCode=="NXDOMAIN","Non-Existent Domain",ReplyCode=="NOTIMP","NotImp", ReplyCode=="REFUSED","Refused",ReplyCode=="YXDOMAIN","YXDomain",ReplyCode=="XRRSET","YXRRSet",ReplyCode=="NOTAUTH","NotAuth",ReplyCode=="NOTZONE","NotZone")
EVAL-reply_code_id = case(ReplyCode=="NOERROR",0,ReplyCode=="FORMERR",1,ReplyCode=="SERVFAIL",2,ReplyCode=="NXDOMAIN",3,ReplyCode=="NOTIMP",4,ReplyCode=="REFUSED",5,ReplyCode=="YXDOMAIN",6,ReplyCode=="XRRSET",7,ReplyCode=="NOTAUTH",8,ReplyCode=="NOTZONE",9)
EVAL-message_type = case(isnotnull(RecordType),"QUERY")

[cisco:umbrella:proxy]
REPORT-proxylogs-fields = proxylogs_fields,extract_url_domain
LINE_BREAKER = ([\r\n]+)
# EVENT_BREAKER = ([\r\n]+)
# EVENT_BREAKER_ENABLE = true
SHOULD_LINEMERGE = false
CHARSET = AUTO
disabled = false
TRUNCATE = 1000000
MAX_EVENTS = 1000000
EVAL-product = "Umbrella"
EVAL-vendor = "Cisco"
EVAL-vendor_product = "Cisco Umbrella"
MAX_TIMESTAMP_LOOKAHEAD = 22
NO_BINARY_CHECK = true
TIME_PREFIX = ^
TIME_FORMAT = "%Y-%m-%d %H:%M:%S"
TZ = UTC
FIELDALIAS-bytes_in = requestSize as bytes_in
FIELDALIAS-bytes_out = responseSize as bytes_out
EVAL-action = lower(action)
EVAL-app = "Umbrella"
FIELDALIAS-http_content_type = content_type as http_content_type
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-url_length = len(url)
EVAL-dest = if(isnotnull(dest),dest,url_domain)
EVAL-bytes = requestSize + responseSize

[cisco:umbrella:firewall]
REPORT-firewalllogs-fields = firewalllogs_fields
LINE_BREAKER = ([\r\n]+)
# EVENT_BREAKER = ([\r\n]+)
# EVENT_BREAKER_ENABLE = true
SHOULD_LINEMERGE = false
CHARSET = AUTO
disabled = false
TRUNCATE = 1000000
MAX_EVENTS = 1000000
EVAL-product = "Umbrella"
EVAL-vendor = "Cisco"
EVAL-vendor_product = "Cisco Umbrella"
MAX_TIMESTAMP_LOOKAHEAD = 22
NO_BINARY_CHECK = true
TIME_PREFIX = ^
TIME_FORMAT = "%Y-%m-%d %H:%M:%S"
TZ = UTC
EVAL-action = case(verdict=="ALLOW","allowed",verdict=="BLOCK","blocked")
EVAL-direction = lower(direction)
FIELDALIAS-firewall_rule = ruleId as rule
EVAL-transport = case(ipProtocol=="1","icmp",ipProtocol=="6","tcp",ipProtocol=="17","udp")
EVAL-protocol = case(isnotnull(ipProtocol),"ip")
EVAL-app = "Umbrella"
EVAL-protocol_version = if(match(coalesce(src_ip,dest_ip,src,dest),":"), "ipv6", if(match(coalesce(src_ip,dest_ip,src,dest), "(?:\d+\.\d+\.\d+\.\d+)"),"ipv4", null))
FIELDALIAS-dvc = host as dvc

[cisco:umbrella:ip]
REPORT-iplogs-fields = iplogs_fields
LINE_BREAKER = ([\r\n]+)
# EVENT_BREAKER = ([\r\n]+)
# EVENT_BREAKER_ENABLE = true
SHOULD_LINEMERGE = false
CHARSET = AUTO
disabled = false
TRUNCATE = 1000000
MAX_EVENTS = 1000000
EVAL-product = "Umbrella"
EVAL-vendor = "Cisco"
EVAL-vendor_product = "Cisco Umbrella"
MAX_TIMESTAMP_LOOKAHEAD = 22
NO_BINARY_CHECK = true
TIME_PREFIX = ^
TIME_FORMAT = "%Y-%m-%d %H:%M:%S"
TZ = UTC
EVAL-action = case(category=="Unauthorized IP Tunnel Access","blocked")
EVAL-app = "Umbrella"
FIELDALIAS-dest_ip = dest as dest_ip
FIELDALIAS-rule = category as rule
FIELDALIAS-src_ip = src as src_ip
EVAL-transport = "tcp"
EVAL-protocol = "ip"
EVAL-protocol_version = if(match(coalesce(src_ip,dest_ip,src,dest),":"), "ipv6", if(match(coalesce(src_ip,dest_ip,src,dest), "(?:\d+\.\d+\.\d+\.\d+)"),"ipv4", null))
FIELDALIAS-dvc = host as dvc

