disabled = 1
dispatch.earliest_time = -60m
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = | tstats summariesonly=false allow_old_summaries=true \
   count \
   from datamodel=Malware.Malware_Attacks \
   where (source="XmlWinEventLog:Harpoon-Security" OR sourcetype="XmlWinEventLog:Harpoon Security"\
      AND (Malware_Attacks.action=blocked)) \
   by _time,Malware_Attacks.src,Malware_Attacks.action,Malware_Attacks.file_path,Malware_Attacks.file_hash,Malware_Attacks.category,Malware_Attacks.user span=10m\
| rename Malware_Attacks.* as *

