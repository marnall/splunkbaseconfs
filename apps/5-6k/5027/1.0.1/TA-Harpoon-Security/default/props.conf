[default]
[XmlWinEventLog]
EXTRACT-attack_data = <Data>(?P<message>(REMOTE THREAD|NEW THREAD|RPC|CHANGE THREAD CONTEXT|MODIFY PROCESS MEMORY))\(?(?P<src_id>\d+)\)\sfrom\s(?P<parent_process>.*)\((?P<process_id>\d+)\), (?P<user>[^\s]+)\sto\s(?P<child_process>.*)\((?P<target_process_id>\d+)\), (?P<target_process_user>[^\r]+)[\r\s\t\n.]+Attacker Process Path\: (?P<process_path>[^\t]+)\\(?P<process>[^\r]+)[\r\s\t\n.]+Attacked Process Path\: (?P<target_process_path>[^\t]+)\\(?P<target_process_name>[^\r]+)[\r\s\t\n.]+Attack Address Details\:[\r\s\t\n.]+Address\: (?P<src_mod_address>[^\s]+) \- (?P<src_type>[^\n|\r]+)[\r\s\t\n.]+((Path|Module base)=(?P<src_mod_base>[^\r|\n]+)[\r\s\t\n.]+)?((Module name|Func)=(?P<src_mod_name>[^\r|\n]+)[\r\s\t\n.]+)?(?P<mode>[^\r]+)[\r\s\t\n.]+(?P<hash_type>[^\s]+) hash\: (?P<sha256>[^\r]+)[\r\s\t\n.]+Time (?P<created_time>[^\<]+)<\/Data>
EXTRACT-module_data = <Data>(?P<message>.+) in process (?P<process>[^\(]+)\((?P<process_id>[^\)]+)\), (?P<user>[^\r]+)[\r\n\t\s.]+From\:[\r\n\t\s.]+Address\: (?P<src_address>[^\s]+) \- (?P<src_type>[^\r|\n]+)[\r\n\t\s.]+((Path|Module base)=(?P<src_mod_base>[^\r|\n]+)[\r\s\t\n.]+)?((Module name|Func)=(?P<src_mod_name>[^\r|\n]+)[\r\s\t\n.]+)?To\:[\r\n\t\s.]+Address\: (?P<dest_address>[^\s]+) \- (?P<dest_type>[^\r|\n]+)[\r\n\t\s.]+((Path|Module base)=(?P<dest_mod_base>[^\r|\n]+)[\r\s\t\n.]+)?((Module name|Func)=(?P<dest_mod_name>[^\r|\n]+)[\r\s\t\n.]+)?(?P<mode>[^\r|\n]+)[\r\n\t\s.]+Time (?P<created_time>[^\<]+)<\/Data>
FIELDALIAS-xmlwineventlog_change_CIM_mapping = message AS change_type process_id AS object_id process_name AS object_path src_type AS object_category
FIELDALIAS-xmlwineventlog_incident_CIM_mapping = Channel AS vendor_product host AS dest message AS signature process AS file_name process_path AS file_path sha256 AS file_hash
EVAL-action = case(mode="No action mode","allowed",mode="The attack was prevented: access denied","blocked",mode="The attack was prevented: access process is killed","blocked")
EVAL-process_hash = if(isnull(process_hash),sha256,process_hash)
FIELDALIAS-xmlwineventlog_ids_CIM_mapping = host AS src process AS process_name process_parent AS file_name
EVAL-ids_type = "host"
EVAL-severity = "critical"
EVAL-vendor_product = if(isnotnull(Channel),Channel,vendor_product)

[XmlWinEventLog:Harpoon Security]
EXTRACT-headers = ^.*Provider Name='(?P<provider>[^']+)'.+Qualifiers='\d'>(?P<event_id>\d+).*Level>(?P<level>\d+).+Task>(?P<task>\d+).*Keywords>(?P<keywords>[^<]+).*SystemTime='(?P<created_time>[^']+).*EventRecordID>(?P<record_id>\d+).*Channel>(?P<Channel>[^<]+).*Computer>(?P<computer_name>[^<]+).*
EXTRACT-attack_data = <Data>(?P<message>(REMOTE THREAD|NEW THREAD|RPC|CHANGE THREAD CONTEXT|MODIFY PROCESS MEMORY))\(?(?P<src_id>\d+)\)\sfrom\s(?P<process_parent>.*)\((?P<process_id>\d+)\), (?P<user>[^\s]+)\sto\s(?P<process_child>.*)\((?P<target_process_id>\d+)\), (?P<target_process_user>[^\r]+)[\r\s\t\n.]+Attacker Process Path\: (?P<process_path>[^\t]+)\\(?P<process>[^\r]+)[\r\s\t\n.]+Attacked Process Path\: (?P<target_process_path>[^\t]+)\\(?P<target_process_name>[^\r]+)[\r\s\t\n.]+Attack Address Details\:[\r\s\t\n.]+Address\: (?P<src_mod_address>[^\s]+) \- (?P<src_type>[^\n|\r]+)[\r\s\t\n.]+((Path|Module base)=(?P<src_mod_base>[^\r|\n]+)[\r\s\t\n.]+)?((Module name|Func)=(?P<src_mod_name>[^\r|\n]+)[\r\s\t\n.]+)?(?P<mode>[^\r]+)[\r\s\t\n.]+(?P<hash_type>[^\s]+) hash\: (?P<sha256>[^\r]+)[\r\s\t\n.]+Time (?P<created_time>[^\<]+)<\/Data>
EXTRACT-module_data = <Data>(?P<message>.+) in process (?P<process_parent>[^\(]+)\((?P<process_id>[^\)]+)\), (?P<user>[^\r]+)[\r\n\t\s.]+From\:[\r\n\t\s.]+Address\: (?P<src_address>[^\s]+) \- (?P<src_type>[^\r|\n]+)[\r\n\t\s.]+((Path|Module base)=(?P<src_mod_base>[^\r|\n]+)[\r\s\t\n.]+)?((Module name|Func)=(?P<src_mod_name>[^\r|\n]+)[\r\s\t\n.]+)?To\:[\r\n\t\s.]+Address\: (?P<dest_address>[^\s]+) \- (?P<dest_type>[^\r|\n]+)[\r\n\t\s.]+((Path|Module base)=(?P<dest_mod_base>[^\r|\n]+)[\r\s\t\n.]+)?((Module name|Func)=(?P<dest_mod_name>[^\r|\n]+)[\r\s\t\n.]+)?(?P<mode>[^\r|\n]+)[\r\n\t\s.]+Time (?P<created_time>[^\<]+)<\/Data>
FIELDALIAS-original_change_CIM_mapping = dest_mod_base AS object_path message AS change_type process_id AS object_id process_name AS object src_type AS object_category
FIELDALIAS-original_incident_CIM_mapping = Channel AS vendor_product host AS dest message AS signature process_parent AS file_name process_path AS file_path sha256 AS file_hash user AS src_user
FIELDALIAS-original_ids_CIM_mapping = host AS src process AS process_name process_parent AS file_name
EVAL-action = case(mode="No action mode","allowed",mode="The attack was prevented: access denied","blocked",mode="The attack was prevented: access process is killed","blocked")
EVAL-process_hash = if(isnull(process_hash),sha256,process_hash)
EVAL-severity = "critical"
EVAL-vendor_product = if(isnotnull(Channel),Channel,vendor_product)
EVAL-ids_type = "host"
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIME_PREFIX = TimeCreated SystemTime=
description = Harpoon Sourcetype
disabled = false
pulldown_type = true

