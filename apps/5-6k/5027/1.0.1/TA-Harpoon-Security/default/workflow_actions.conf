[build_expanded_process_tree]
display_location = both
fields = process_name,process_id
label = Show Expanded Process Tree
search.preserve_timerange = 1
search.search_string = (`cim_Endpoint_indexes`) host="$host$" process_name="$process_name$"  | eval parent_process_name=if(isnotnull(target_process_name),process_name,parent_process_name)  | eval process_name=if(isnotnull(target_process_name),target_process_name,process_name)  | eval parent_process_id=if(isnotnull(target_process_id),process_id,parent_process_id)  | eval process_id=if(isnotnull(target_process_id),target_process_id,process_id)  | eval procpid=Tostring(process_id+":"+process_name)  | eval pprocpid=Tostring(parent_process_id+":"+parent_process_name)  | stats count by pprocpid,procpid  | where pprocpid!="Null"
search.target = blank
search.view = search
type = search
disabled = 0

[build_process_tree]
display_location = both
fields = process_name
label = Show Process Tree
search.preserve_timerange = 1
search.search_string = (`cim_Endpoint_indexes`) host="$host$" process_name="$process_name$"  | eval parent_process_name=if(isnotnull(target_process_name),process_name,parent_process_name)  | eval process_name=if(isnotnull(target_process_name),target_process_name,process_name) | stats count by parent_process_name,process_name | where parent_process_name!=""
search.target = blank
search.view = search
type = search
