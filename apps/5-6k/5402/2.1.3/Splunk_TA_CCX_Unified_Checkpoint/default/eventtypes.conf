##################################################################################

##################################################################################
############CCX Unified Add-On for Checkpoint - ingestion: Syslog#################
##################################################################################

[checkpoint_syslog_ids_attack]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND ((product="IPS" AND protection_type=*) OR (protection_type IN("DNS reputation","URL reputation") AND malware_family IN("Adware","Generic"))) NOT (update_status IN("Blade activated","Blade deactivated")) NOT eventtype="checkpoint_syslog_malware_attack"
#tags = ids attack

[checkpoint_syslog_network_traffic]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND (((proto=* OR nat_rulenum=*) OR (product="URL Filtering" AND conn_direction=*)) NOT (product="DLP" OR alert=* OR malware_action=* OR protection_name=* OR file_name=* OR event_name="IP sweep from external network" OR cvpn_category="Session"))
#tags = network communicate

[checkpoint_syslog_change]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND (product="Mobile App" AND event_status IN("Installed","Removed"))
#tags = change

[checkpoint_syslog_change_audit]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND (fieldschanges=* OR (product IN("SmartDashboard","license-mgmt","SmartUpdate","Core") OR (product IN("MEPP","Media Encryption & Port Protection") AND event_type="File Operation") OR (product IN("Anti-Bot","Threat Emulation","URL Filtering","Application Control") AND (update_status="updated")) OR (event_name="Policy installation" OR subject="Policy Installation") OR new_status=* OR (product IN("Endpoint Security Console") AND objectname=*) NOT (update_status IN("Blade activated","Blade deactivated","failed") OR subject IN("Administrator Login","Administrator Logout") OR event_name="Check Point administrator login at irregular hours")))
#tags = change audit

[checkpoint_syslog_alert]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND ((product="Anti-Bot" AND subscription_stat=*) OR (event_name="IP sweep from external network") OR (product="DLP" AND info="*Bypassing DLP*") OR product="RAD" OR (product="iOS Profiles" AND protection_type=*) OR (product="Zero Phishing" NOT protection_name=*) OR (product="SmartEvent Client" AND failure_impact=*) OR product="OS Exploits" OR product="Network Security" OR (product="System Monitor" AND sys_message="*Your network may be at risk*") OR (product IN("Endpoint Compliance") NOT new_status=*) OR (product IN("Anti-Malware") NOT event_type="Infection") OR (product="Device") OR (product IN("Firewall","HTTPS Inspection","Security Gateway/Management") AND (failure_impact=*)) OR (product="Compliance" AND event_type="Compliance Check Not Met") OR (event_name="Check Point administrator login at irregular hours") OR (product="Threat Emulation" AND event_type="TE Info Event") OR (update_status IN("Blade activated","Blade deactivated","failed")) OR (alert=* NOT protection_name=*))
#tags = alert

[checkpoint_syslog_malware_attack]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND (((malware_action=* OR protection_name=* OR attack=*) AND (file_name=* OR remediated_files=*)) OR (file_name=* AND protection_type=*) OR event_type="Ransomware Detection" OR (product="Threat Emulation" AND description="*Detected malicious file*")) NOT ((protection_type IN("DNS reputation","URL reputation") AND malware_family IN("Adware","Generic")))
#tags = malware attack

[checkpoint_syslog_general_ids_attack]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND ((malware_action=* OR protection_name=* OR attack=*) NOT (file_name=* OR event_type="Password Reuse" OR remediated_files=*)) NOT eventtype IN("checkpoint_syslog_malware_attack","checkpoint_syslog_general_malware_attack","checkpoint_syslog_ids_attack")
#tags = ids attack

[checkpoint_syslog_authentication]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND (subject IN("Administrator Login") OR auth_method="*" OR (product IN("Management Blade") AND signature="Connection refused*"))
#tags = authentication

[checkpoint_syslog_web]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND url="*"
#tags = web

[checkpoint_syslog_network_session]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND source="checkpoint:network" cvpn_category="Session"
#tags = network session vpn

[checkpoint_syslog_general_malware_attack]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND (malware_action=* OR attack=* OR (protection_name=* AND content_risk!=0)) file_hash="*" NOT ((protection_type IN("DNS reputation","URL reputation") AND malware_family IN("Adware","Generic"))) NOT eventtype="checkpoint_syslog_malware_attack"
#tags = attack malware

[checkpoint_syslog_email_filter]
search = (sourcetype=cp_log OR sourcetype=cp_log:syslog) AND sender="*" recipient="*" subject="*"
#tags = email filter


################################  END  ###########################################
############CCX Unified Add-On for Checkpoint - ingestion: Syslog#################
##################################################################################

##################################################################################
############CCX Unified Add-On for Checkpoint - ingestion: OPSEC LEA##############
##################################################################################

## keeping this for backwards compatability
[checkpoint]
search = sourcetype=checkpoint
#tags = network firewall

###### Opsec Traffic ######
[opsec]
search = sourcetype=opsec
#tags = network

[opsec_communicate]
search = sourcetype=checkpoint OR (sourcetype=opsec opsec_product="*Firewall*") NOT TCP_packet_out_of_state="*"
#tags = firewall communicate 

[opsec_web]
search = sourcetype=opsec opsec_prod_web="YES"
#tags = web

[opsec_prod_communicate]
search = sourcetype=opsec (product="Application Control" OR product="*URL Filtering*") opsec_prod_traffic="YES" dest_ip!=""
#tags = communicate

[opsec_connectra_authentication]
search = sourcetype=opsec product=Connectra (status="Success" OR status="Failure")
#tags = authentication

[opsec_id_awareness_authentication]
search = sourcetype=opsec product="Identity Awareness" (auth_status="Successful Login" OR auth_status="Failed Login")
#tags = authentication

[opsec_vpn]
search = sourcetype=opsec:vpn
#tags = network session communicate vpn

# what constitutes session start
[opsec_vpn_start]
search = sourcetype=opsec:vpn  (opsec_vendor_action=encrypt OR opsec_vendor_action=decrypt OR opsec_reason="connected to gateway")
#tags = start


## Threat Blade
[opsec_malware_attack]
search = sourcetype=opsec:threat_emulation verdict=Malicious
#tags = malware attack

[opsec_malware]
search = sourcetype=opsec:anti_virus OR sourcetype=opsec:anti_malware
#tags = malware

[opsec_smartdefense]
search = sourcetype=opsec:smartdefense
#tags = ids attack 

###### Opsec Audit ######
[opsec_audit]
search = sourcetype=opsec:audit
#tags = audit

## Network Change
[opsec_audit_change]
search = sourcetype=opsec:audit change_type="*" NOT (command="Log In" OR command="Log Out")
#tags = change

## Network Authentication
[opsec_audit_authentication]
search = sourcetype=opsec:audit (opsec_vendor_operation="Log In" OR opsec_vendor_operation="Log Out" OR opsec_vendor_operation="Force Log Out")
#tags = authentication privileged

## Filesystem
[opsec_audit_filesystem]
search = sourcetype=opsec:audit Subject="File Operation"
#tags = endpoint filesystem

################################  END  ###########################################
############CCX Unified Add-On for Checkpoint - ingestion: OPSEC LEA##############
##################################################################################

##################################################################################
###CCX Unified Add-On for Checkpoint - ingestion: Harmony Cloud log-push Syslog###
##################################################################################

[ccx_checkpoint_harmony_threatcloud_web_traffic]
search = (sourcetype="checkpoint:harmony:json") url="*"
#tags = web

[ccx_checkpoint_harmony_threatcloud_malware]
search = (sourcetype="checkpoint:harmony:json") product_family="Threat" signature="*" NOT eventtype IN("ccx_checkpoint_harmony_threatcloud_alert","ccx_checkpoint_harmony_threatcloud_ids") NOT verdict IN("Benign","Error") NOT protection_type="Content Removal" NOT (protection_type="URL Reputation" AND malware_action="*Access to site known to contain malware*")
#tags = attack malware

[ccx_checkpoint_harmony_threatcloud_ids]
search = (sourcetype="checkpoint:harmony:json") product_family="Threat" signature="*" protection_type IN("IPS")
#tags = attack ids

[ccx_checkpoint_harmony_threatcloud_malware_operations]
search = (sourcetype="checkpoint:harmony:json") product_family="Threat" file_hash="*" NOT eventtype IN("ccx_checkpoint_harmony_threatcloud_malware","ccx_checkpoint_harmony_threatcloud_ids")
#tags = operations malware

[ccx_checkpoint_harmony_threatcloud_alert]
search = (sourcetype="checkpoint:harmony:json") product_family="Threat" type="alert"
#tags = alert

[ccx_checkpoint_harmony_identity_awareness_log_out]
search = (sourcetype="checkpoint:harmony:json") product_family="Network" orig_product="Identity Awareness" action="Log Out"

[ccx_checkpoint_harmony_identity_awareness_user_login]
search = (sourcetype="checkpoint:harmony:json") product_family="Network" src_user_name="*" vendor_action IN("Log In")
#tags = authentication

[ccx_checkpoint_harmony_identity_awareness_machine_login]
search = (sourcetype="checkpoint:harmony:json") product_family="Network" vendor_action IN("Log In") NOT src_user_name="*"
#tags = authentication

[ccx_checkpoint_harmony_network_vpn]
search = (sourcetype="checkpoint:harmony:json") product_family="Network" orig_product="VPN" vendor_action IN("Reject")
#tags = network communicate

[ccx_checkpoint_harmony_identity_awareness_update_event]
search = (sourcetype="checkpoint:harmony:json") product_family="Network" orig_product="Identity Awareness" vendor_action IN("Update")

[ccx_checkpoint_harmony_access_traffic]
search = (sourcetype="checkpoint:harmony:json") product_family="Access"
#tags = network communicate

[ccx_checkpoint_harmony_access_ids_events]
search = (sourcetype="checkpoint:harmony:json") product_family="Access" ids_type="*"
#tags = attack ids

[ccx_checkpoint_harmony_network_vpn_event]
search = (sourcetype="checkpoint:harmony:json") product_family="Network" orig_product="VPN" vendor_action IN("Key Install")

[ccx_checkpoint_harmony_threatcloud_network_traffic]
search = (sourcetype="checkpoint:harmony:json") product_family="Threat" NOT eventtype IN("ccx_checkpoint_harmony_threatcloud_malware") verdict IN("Benign","Error")
#tags = network communicate

################################  END  ###########################################
###CCX Unified Add-On for Checkpoint - ingestion: Harmony Cloud log-push Syslog###
##################################################################################


