#############            C y b e r C X       #####################################
#              Splunk_TA_CCX_Unified_Checkpoint                                  #
#                                                                                #
# Configuration available for ingestion:                                         #
#                                                                                #
# - Check Point OPSEC LEA                                                        #
# - Checkpoint Syslog  (HEC | UF/HF)                                             #
#                                                                                #
##################################################################################

##################################################################################
############CCX Unified Add-On for Checkpoint - ingestion: Syslog#################
##################################################################################

## KV format for sourcetype - HEC (Syslog)
[kv_cp_log_format]
FORMAT = $1::$2
REGEX = ([a-zA-Z0-9_-]+):?=([^|]+)
MV_ADD = true
DEPTH_LIMIT = 100000

## KV format for sourcetype - UF/HF (Syslog)
[kv_cp_syslog_log_format]
FORMAT = $1::$2
REGEX = ([a-zA-Z0-9_-]+):?="((?:[^"\\]|\\.)+)"
MV_ADD = true
DEPTH_LIMIT = 100000

## SOURCE PARSING
[checkpoint_audit_source]
DEST_KEY = MetaData:Source
REGEX = (?:\s+|\|)product(=|:)"?(?:(?i)Web-UI|WEB_API|Log\sUpdate|smart_event|SmartUpdate|SmartConsole|license-mgmt|SmartDashboard|System\sMonitor|SmartEvent\sClient|SmartView|Scheduled\ssystem\supdate|Eventia\sAnalyzer\sClient|Security\sGateway\/Management|Smart\sDefense|LogUpdate|Log\s+Update|SmartDefense|Web_API_internal|Eventia\sAnalyzer\sClient|Connectra|Check\sPoint\sSecurity\sManagement\sServer|SmartProvisioning\sConnector|SmartLSM\sEndpoint\sSecurity\sConsole|SmartLSM|ROBO\s+GUI|Management\sBlade)
FORMAT = source::checkpoint:audit
LOOKAHEAD = 10000

[checkpoint_email_source]
DEST_KEY = MetaData:Source
REGEX = (?:\s+|\|)product(=|:)"?(?:(?i)MTA|Anti-Spam|Anti\sSpam)
FORMAT = source::checkpoint:email
LOOKAHEAD = 10000

[checkpoint_endpoint_source]
DEST_KEY = MetaData:Source
REGEX = (?:\s+|\|)product(=|:)"?(?:(?i)Endpoint\sCompliance|Core|Endpoint\sManagement|Media\sEncryption\s&\sPort\sProtection|MEPP|Endpoint\sSecurity\sConsole)
FORMAT = source::checkpoint:endpoint
LOOKAHEAD = 10000

[checkpoint_firewall_source]
DEST_KEY = MetaData:Source
REGEX = (?:\s+|\|)product(=|:)"?(?:(?i)Firewall|DLP|Application\sControl|RAD|HTTPS\sInspection|Compliance\sBlade|Compliance(?:\||\")|VPN-1\s&\sFirewall-1|Network\sSecurity)
FORMAT = source::checkpoint:firewall
LOOKAHEAD = 10000

[checkpoint_firewall_subproduct_source]
DEST_KEY = MetaData:Source
REGEX = fw_subproduct(=|:)"?(?:(?i)VPN)
FORMAT = source::checkpoint:sessions
LOOKAHEAD = 10000

[checkpoint_ids_source]
DEST_KEY = MetaData:Source
REGEX = (?:\s+|\|)product(=|:)"?(?:IPS|WIFI|Cellular)
FORMAT = source::checkpoint:ids
LOOKAHEAD = 10000

[checkpoint_ids_malware_source]
DEST_KEY = MetaData:Source
REGEX = (?:\s+|\|)product(=|:)"?(?:(?i)Threat\sEmulation|Anti\sVirus|New\sAnti\sVirus|Anti-Virus|Anti-Bot|Threat\sExtraction|Anti-Ransomware|Anti-Exploit|Forensics|OS\sExploit|Application(?:\||\")|Text\sMessage|Network\sAccess|Zero\sPhishing|Anti-Malware|Anti\sMalware\sNew\sAnti\sVirus|Anti\sMalware)
FORMAT = source::checkpoint:ids_malware
LOOKAHEAD = 10000

[checkpoint_sessions_source]
DEST_KEY = MetaData:Source
REGEX = (?:\s+|\|)product(=|:)"?(?:(?i)VPN(?:\||\")|Mobile\sApp|Mobile(?:\||\"))
FORMAT = source::checkpoint:sessions
LOOKAHEAD = 10000

[checkpoint_web_source]
DEST_KEY = MetaData:Source
REGEX = (?:\s+|\|)product(=|:)"?(?:(?i)URL\sFiltering)
FORMAT = source::checkpoint:web
LOOKAHEAD = 10000

[checkpoint_network_source]
DEST_KEY = MetaData:Source
REGEX = (?:\s+|\|)product(=|:)"?(?:(?i)IOS\sProfile|Device|Mobile\sAccess|WIFI\sNetwork)
FORMAT = source::checkpoint:network
LOOKAHEAD = 10000

[checkpoint_default_source]
DEST_KEY = MetaData:Source
REGEX = product(=|:)"?\S+
FORMAT = source::checkpoint:cp_default
LOOKAHEAD = 10000

## AUTOMATIC LOOKUPS
[checkpoint_transport_protocols_lookup]
filename = checkpoint_transport_protocols.csv

[checkpoint_service_app]
filename = checkpoint_service_app.csv

## FURTHER EXTRACTION - REPORT
[transforms_file_path]
SOURCE_KEY = file_name
REGEX = (?<file_path>.*(?:\\|\/))

[resource_file_path]
SOURCE_KEY = resource
REGEX = ^(?<resource_file_path>(?:^(?!http).*(?:\\|\/))|.*)

[remediated_files_list]
SOURCE_KEY = remediated_files
REGEX = \s*(.*?)\((?:[^\)]*)\)(?:$|,)
FORMAT = remediated_files_list::$1
MV_ADD = true

[checkpoint_audit_auth_method]
SOURCE_KEY = _raw
REGEX = Authentication\smethod\:\s(?<authentication_method>[^\s|]+)


################################  END  ###########################################
############CCX Unified Add-On for Checkpoint - ingestion: Syslog#################
##################################################################################

##################################################################################
############CCX Unified Add-On for Checkpoint - ingestion: OPSEC LEA##############
##################################################################################

###### global ######
[checkpoint_vendor_info_lookup]
filename = checkpoint_vendor_info.csv

[checkpoint_opsec_action_lookup]
filename = checkpoint_opsec_actions.csv

[checkpoint_audit_action_lookup]
filename = checkpoint_audit_actions.csv

[te_action_lookup]
filename = checkpoint_actions_te.csv

[ids_severity_lookup]
filename = checkpoint_ids_severity.csv


###### checkpoint products ######
[opsec_sourcetype_threat_emulation]
REGEX = product\=Threat\sEmulation
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::opsec:threat_emulation

[opsec_sourcetype_anti_malware]
REGEX = product\=Anti\sMalware
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::opsec:anti_malware

[opsec_sourcetype_anti_virus]
REGEX = product\=New\sAnti\sVirus
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::opsec:anti_virus

[opsec_sourcetype_smartdefense]
REGEX = product\=SmartDefense
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::opsec:smartdefense

[opsec_sourcetype_vpn]
REGEX = fw_subproduct\=VPN-1
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::opsec:vpn

[action_as_checkpoint_action]
REGEX = action\=([^\s]+)
FORMAT = vendor_action::$1

[inbound_interface_for_checkpoint]
REGEX = i\/f_dir\=inbound.*i\/f_name=([^|]+)
FORMAT = inbound_interface::$1

[outbound_interface_for_checkpoint]
REGEX = i\/f_dir\=outbound.*i\/f_name=([^|]+)
FORMAT = outbound_interface::$1


###### opsec ######

##### actions #####
[vendor_action_for_opsec]
REGEX  = action\=([^|]+)
FORMAT = vendor_action::$1

[action_as_threat_emulation_action]
REGEX = action\=([^|]+)
FORMAT = te_action::$1

[auto_kv_for_opsec]
REGEX = ([^|=]*)\b:?=([^|]*)
FORMAT = $1::$2

[policy_id_tag_for_opsec]
REGEX  = __policy_id_tag\=([^|]+)
FORMAT = policy_id_tag::$1 

[inbound_interface_for_opsec]
REGEX  = i\/f_dir\=inbound.*i\/f_name=([^|]+)
FORMAT = inbound_interface::$1

[outbound_interface_for_opsec]
REGEX  = i\/f_dir\=outbound.*i\/f_name=([^|]+)
FORMAT = outbound_interface::$1

[db_tag_for_opsec]
SOURCE_KEY = policy_id_tag
REGEX      = db_tag\=([^;]+)
FORMAT     = db_tag::$1

[mgmt_for_opsec]
SOURCE_KEY = policy_id_tag
REGEX      = mgmt\=([^;]+)
FORMAT     = mgmt::$1

[policy_date_for_opsec]
SOURCE_KEY = policy_id_tag
REGEX      = date\=([^;]+)
FORMAT     = policy_date::$1

[policy_name_for_opsec]
SOURCE_KEY = policy_id_tag
REGEX      = policy_name\=([^]]+)
FORMAT     = policy_name::$1

[opsec_vendor_action_field]
REGEX  = \baction\s*=\s*"([^"|]*)"|\baction\s*=\s*([^|]*)\s*
FORMAT = opsec_vendor_action::$1 opsec_vendor_action::$2

[opsec_product_field]
REGEX  = \bproduct\s*=\s*"([^"|\[]*)"|\bproduct\s*=\s*([^|\[]*)\s*
FORMAT = opsec_product::$1 opsec_product::$2

[opsec_product]
REGEX  = \bproduct\s*=\s*"([^"|\[]*)"|\bproduct\s*=\s*([^|\[]*)\s*
FORMAT = product::$1 product::$2

[opsec_reason]
REGEX = \|reason(?:\:?)=(?<opsec_reason>[^|]*)

[opsec_vender_operation_field]
REGEX  = \bOperation\s*=\s*"([^"|]*)"|\bOperation\s*=\s*([^|]*)\s*
FORMAT = opsec_vendor_operation::$1 opsec_vendor_operation::$2

[dest_field_for_antimalware]
REGEX = src=(?<malware_dest_ip>([0-9]{1,3}\.){3}[0-9]{1,3})

################################  END  ###########################################
############CCX Unified Add-On for Checkpoint - ingestion: OPSEC LEA##############
##################################################################################

# User extractions

[ccx_checkpoint_extraction_session]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = .+(?=user)user\:\"CN\=(?<x_user>[^\,]+)\,.+

[ccx_checkpoint_extraction_x_src_user]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = [^\(]+\((?<x_src_user>[^\)]+)\)
SOURCE_KEY = extract_src_user_name

[ccx_checkpoint_extraction_x_user]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = [^\(]+\((?<x_user>[^\)]+)\)
SOURCE_KEY = extract_user

##################################################################################
###CCX Unified Add-On for Checkpoint - ingestion: Harmony Cloud log-push Syslog###
##################################################################################

[ccx_checkpoint_harmony_kv_capture]
MV_ADD = 1
REGEX = (^|- |,?)\"(?<_KEY_1>[\w\d]+)\"\:(\"|)(?<_VAL_1>(\"|\[\"|)((?:[^"\\|\}]|\\.)+))

[ccx_checkpoint_harmony_industry_ref_cve_capture]
MV_ADD = 1
REGEX = (?<cve>(CVE)(\[\"|)((?:[^"\\|\|\)\"}]|\"\"\]\\.)+))

[ccx_checkpoint_harmony_industry_ref_can_capture]
MV_ADD = 1
REGEX = (?<can>(CAN)(\[\"|)((?:[^"\\|\|\)\"}]|\"\"\]\\.)+))

[ccx_checkpoint_harmony_event_id_capture]
CLEAN_KEYS = 0
REGEX = \"id\"\:\"(?<event_id>[^\"\,]+)\"

[ccx_checkpoint_harmony_elapse_time_capture]
CLEAN_KEYS = 0
REGEX = \"__id\"\:\"(?<elapse_time>[^\"\,]+)\"

################################  END  ###########################################
###CCX Unified Add-On for Checkpoint - ingestion: Harmony Cloud log-push Syslog###
##################################################################################
