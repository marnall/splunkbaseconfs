#https://sc1.checkpoint.com/documents/Harmony_Email_and_Collaboration/Topics-Harmony-Email-Collaboration-Admin-Guide/Managing-Security-Events/SIEM.htm?tocpath=Managing%20Security%20Events%7CSIEM%20Integration%7C_____0#SIEM_Integration
##############################

[checkpoint:harmony:json]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
description = CCX Custom Checkpoint product Harmony
disabled = false
pulldown_type = true
DATETIME_CONFIG =
SHOULD_LINEMERGE = false

REPORT-ccx_checkpoint_harmony_kv_capture = ccx_checkpoint_harmony_kv_capture
REPORT-ccx_checkpoint_harmony_industry_ref_cve_capture = ccx_checkpoint_harmony_industry_ref_cve_capture
REPORT-ccx_checkpoint_harmony_industry_ref_can_capture = ccx_checkpoint_harmony_industry_ref_can_capture
REPORT-ccx_checkpoint_harmony_event_id_capture = ccx_checkpoint_harmony_event_id_capture
REPORT-ccx_checkpoint_harmony_elapse_time_capture = ccx_checkpoint_harmony_elapse_time_capture

FIELDALIAS-orig_product = product AS orig_product
FIELDALIAS-orig_type = type AS orig_type
FIELDALIAS-vendor_action = action AS vendor_action

EVAL-category = if((product_family="Access" AND (orig_type IN("Connection\nAlert","Alert") OR severity="*")),coalesce('protection_name','product_family'),coalesce('app_category',replace('malware_family',".*\"(.*)\\\\\".*","\1"),'product_family'))
EVAL-app = if(isnotnull('appi_name'),'appi_name',if((product_family="Network" AND vendor_action="Log In"),replace('orig',"^(.+?\.)(.*)","\2"),if((product_family="Network" AND vendor_action="Reject") OR (product_family="Access" AND NOT orig_type="Connection\nAlert"),'calc_service',"Checkpoint Harmony")))
EVAL-authentication_method = 'auth_method'
EVAL-protocol = 'calc_service'
EVAL-bytes_in = coalesce(replace('client_inbound_bytes',",",""),replace('received_bytes',",",""))
EVAL-bytes_out = coalesce(replace('client_outbound_bytes',",",""),replace('sent_bytes',",",""))
EVAL-bytes = tonumber(coalesce(replace('client_inbound_bytes',",",""),replace('received_bytes',",",""))) + tonumber(coalesce(replace('client_outbound_bytes',",",""),replace('sent_bytes',",","")))
EVAL-packets_in = replace('client_inbound_packets',",","")
EVAL-packets_out = replace('client_outbound_packets',",","")
EVAL-packets = if(isnotnull('packets'),replace('packets',",",""),tonumber(replace('client_inbound_packets',",","")) + tonumber(replace('client_outbound_packets',",","")))
EVAL-description = if(isnotnull('description'),replace('description',"\\\n"," "),if(orig_product="Threat Emulation" AND match('reason',".*exceeded size limit.*"),tostring('product')." - ".tostring(replace('reason',"\\\n"," "))." on resource ".tostring(replace(urldecode('resource'),".*\"(.*)\\\\\".*","\1")),null()))
EVAL-dest = if(isnull('dst') AND (product_family="Network" AND vendor_action="Log In"),'orig','dst')
EVAL-dest_ip = if(cidrmatch("0.0.0.0/0",'dst'),'dst',null())
EVAL-dest_port = replace('service',",","")
EVAL-file_hash = if(product_family="Threat",mvappend('file_md5',replace(replace('description',"\\\n"," "),".*sha1\: (.*) Extracted\s+files.*|.*","\1")),'file_md5')
EVAL-file_name = replace('file_name',".*\"(.*)\\\\\".*","\1")
EVAL-file_size = replace('file_size',",","")
EVAL-product = if(isnotnull('orig_product'),"Harmony:"+replace('orig_product',"\\\n"," "),"Harmony:ThreatCloud")
EVAL-signature = if(isnotnull('protection_name') AND product_family IN("Threat","Access"),'protection_name',if(isnull('protection_name') AND product_family="Threat" AND isnotnull('protection_type'),'protection_type',if(isnull('protection_name') AND product_family="Threat" AND isnull('protection_type') AND orig_product IN("IPS","Threat Emulation"),'reason',if(product_family="Access" AND (orig_type IN("Connection\nAlert","Alert") OR severity="*"),coalesce('reason','protection_type'),null()))))
EVAL-reason = replace('reason',"\\\n"," ")
EVAL-url = ltrim(replace(urldecode('resource'),"^\[\\\\\"(.*)\\\\\"\]|","\1"),"^[\\\"")
EVAL-rule = split(trim(replace(trim('rule_name___match_table',"[\"|\"]"),"\\\\\",\\\\\"",","),"\\\|\""),",")
EVAL-severity = lower('severity')
EVAL-severity_id = replace('severity_int',",","")
EVAL-src_ip = if(cidrmatch("0.0.0.0/0",'src'),'src',null())
EVAL-user = if(isnotnull('src_user_name'),replace('src_user_name',".*\"(.*)\\\\\".*","\1"),if(isnull('src_user_name') AND vendor_action="Log In" AND isnotnull('src_machine_name'),'src_machine_name',null()))
EVAL-vendor_product = if(isnotnull('orig_product'),"Checkpoint:Harmony:"+replace('orig_product',"\\\n"," "),"Checkpoint:Harmony:ThreatCloud")
EVAL-vendor = "Checkpoint"
EVAL-http_user_agent = replace('web_client_type',".*\"(.*)\\\\\".*","\1")
EVAL-http_user_agent_length = len(replace('web_client_type',".*\"(.*)\\\\\".*","\1"))
EVAL-url_domain = if(isnotnull(resource), replace(ltrim(replace(urldecode('resource'),"^\[\\\\\"(.*)\\\\\"\]|","\1"),"^[\\\""),"^(?:https?:\/\/)?(?:[^@\/\n]+@)?(?:www\.)?([^:\/\n]+).*","\1"),null())
EVAL-url_length = len(ltrim(replace(urldecode('resource'),"^\[\\\\\"(.*)\\\\\"\]|","\1")))
EVAL-action = case(vendor_action=="Allow" OR vendor_action=="Off" OR vendor_action=="Detect" OR vendor_action=="Accept","allowed",vendor_action=="Prevent" OR vendor_action=="Block" OR vendor_action=="Reject" OR vendor_action=="Drop","blocked",confidence_level IN("High","Medium","Low"),"allowed",product_family=="Network" AND vendor_action=="Log In","success",1=1,'vendor_action')
EVAL-ids_type = if(protection_type="IPS","network",if(product_family="Access" AND (orig_type IN("Connection\nAlert","Alert") OR severity="*"),"network",null()))
EVAL-cve = if(isnotnull('cve'),mvdedup('cve'),null())
EVAL-can = if(isnotnull('can'),mvdedup('can'),null())
EVAL-date = 'time'
EVAL-id = 'event_id'
EVAL-type = if((orig_product="Threat Emulation" AND match('reason',".*exceeded size limit.*")) OR (product_family="Access" AND orig_type IN("Connection\nAlert","Alert")),"alert",null())
EVAL-transport = case(match('calc_service',".*icmp.*"),"icmp",match('calc_service',".*tcp.*"),"tcp",match('calc_service',".*udp.*"),"udp")

################################  END  ###########################################
###CCX Unified Add-On for Checkpoint - ingestion: Harmony Cloud log-push Syslog###
