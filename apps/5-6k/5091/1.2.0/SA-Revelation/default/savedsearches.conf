[Z^2: Create Base Comparison]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
cron_schedule = 0 0 * * 6
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
request.ui_dispatch_app = SA-Revelation
request.ui_dispatch_view = SA-Revelation
search = | inputlookup ml_intel \
| table class domain \
| `ut_shannon(domain)` \
| `ut_meaning(domain)` \
| `ut_domain_parse(domain)` \
| eval rnd=random() \
| apply app:base_dga_ngram \
| apply app:base_dga_pca \
| table domain class subclass ut_* PC_* \
| sort 0 rnd \
| apply  app:base_dga_rba_custom \
| rename "predicted(class)" as predicted_class \
| score precision_recall_fscore_support class against predicted_class \
| transpose 0 column_name=class header_field=Metric \
| eval _time=now() \
| join _time \
    [| summary app:base_dga_rba_custom \
    | eval _time=now()] \
| outputlookup base_dga_comparison

