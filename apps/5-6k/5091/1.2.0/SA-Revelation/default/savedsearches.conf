[Z^2: Dedup ML Intel Collection]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.logevent = 1
action.logevent.param.event = $trigger_time$ | Z^2:ThreatIntel | INFO | Scheduled search to de-duplicate the threat intel domains found in the ml_intel collection |  unique domains will be kept in the collection.
action.logevent.param.host = $server.serverName$
action.logevent.param.index = _internal
action.logevent.param.sourcetype = Z^2
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
cron_schedule = 0 0 * * *
dispatch.earliest_time = 0
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
display.visualizations.type = singlevalue
enableSched = 1
request.ui_dispatch_app = SA-Revelation
request.ui_dispatch_view = search
search = | inputlookup ml_intel \
| eval key_domain=_key." ".domain \
| table _time class domain key_domain description threat_key weight user updated confidence \
| sort 0 _time \
| dedup domain class \
| eval list ="*" \
| `ut_parse(domain,list)` \
| `cdn_check(ut_domain)` \
| eval cdn_class = case(isProvider="true" OR ut_tld="in-addr.arpa", "legit", 1=1, "unknown") \
| eval class = case(class==cdn_class, cdn_class, class="dga" and cdn_class="legit", cdn_class, class!=cdn_class, class) \
| fillnull value="z^2" user \
| fillnull value="false" updated \
| outputlookup ml_intel


