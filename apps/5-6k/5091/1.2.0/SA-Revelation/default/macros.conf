[ut_domain_parse(1)]
args = domain
definition = eval ut_digit_ratio = 0.0 \
| eval ut_vowel_ratio = 0.0 \
| eval ut_domain_length = max(1,len($domain$)) \
| rex field=$domain$ max_match=0 "(?<digits>\d)" \
| rex field=$domain$ max_match=0 "(?<vowels>[aeiou])" \
| eval ut_digit_ratio=if(isnull(digits),0.0,mvcount(digits) / ut_domain_length) \
| eval ut_vowel_ratio=if(isnull(vowels),0.0,mvcount(vowels) / ut_domain_length) \
| eval ut_consonant_ratio = max(0.0, 1.000000 - ut_digit_ratio - ut_vowel_ratio) \
| eval ut_vc_ratio = ut_vowel_ratio / ut_consonant_ratio
iseval = 0

[apply_base_local(1)]
args = class 
definition = apply app:base_$class$_rba_custom probabilities=true \
| rename "predicted(class)" as b_class, "probability(class=$class$)" as base_$class$_p, "probability(class=legit)" as base_legit_p \
| apply app:local_$class$_rba_custom probabilities=true \
| rename "predicted(class)" as l_class, "probability(class=$class$)" as local_$class$_p, "probability(class=legit)" as local_legit_p \
| table _time src class b_class base_$class$_p base_legit_p l_class local_$class$_p local_legit_p * \
| eval model_divergence_$class$ = ((base_$class$_p - local_$class$_p)/2), model_divergence_legit = ((base_legit_p - local_legit_p)/2) \
| eval model_divergence = model_divergence_$class$ + model_divergence_legit \
| eval d_class = case(model_divergence>= 0.05, b_class, model_divergence<=-0.05, l_class, 1=1, l_class) \
| eval $class$_probability = ((base_$class$_p + local_$class$_p)/2), legit_probability = ((base_legit_p + local_legit_p)/2) \
| eval probable_class = case( $class$_probability>legit_probability, "$class$", $class$_probability<legit_probability, "legit", 1=1, d_class)


[ml_intel_check]
definition = lookup ml_intel domain output class AS label_class \
| fillnull value=dga label_class \
| search probable_class="dga" label_class="dga"


[cdn_check(1)]
args = domain
definition = lookup cdn_list domain AS $domain$
iseval = 0

[confidence_filter(5)]
args = class, high, medium, low, p
definition =  eval $class$_confidence= case($class$_probability>=$high$, "high_confidence", $class$_probability>=$medium$, "medium_confidence", $class$_probability>=$low$, "low_confidence", 1=1, "no_confidence") \
| where $class$_probability>=$p$
iseval = 0

[pcr(2)]
args = in,out
definition = eval pcr_total=$in$+$out$ \
| eval pcr_ratio= (($out$-$in$)/pcr_total) \
| eval pcr_source_fraction = ((1 + pcr_ratio)/2), pcr_dest_fraction = ((1 - pcr_ratio)/2) \
| eval pcr_range = case(pcr_ratio > 0.4, "Pure Push", pcr_ratio > 0, "70:30 Export", pcr_ratio == 0, "Balanced Exchange", pcr_ratio >= -0.5, "3:1 Import", pcr_ratio > -1, "Pure Pull")
iseval = 0