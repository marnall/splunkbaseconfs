[Z^2]
category = Application
description = Parse log events produced by Z^2 daemon
pulldown_type = true
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD = 16
TRANSFORMS-Z^2_sourcetype = Z^2_training, Z^2_alerting, Z^2_download, Z^2_threatintel

[Z^2_training]
rename = Z^2:training

[Z^2:training]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y.%m.%d-%H.%M.%S
TIME_PREFIX = ^
REPORT-Z^2_training = REPORT-Z^2

[Z^2_alerting]
rename = Z^2:alerting

[Z^2:alerting]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y.%m.%d-%H.%M.%S
TIME_PREFIX = ^
REPORT-Z^2_alerting = REPORT-Z^2

[Z^2_download]
rename = Z^2:download

[Z^2:download]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y.%m.%d-%H.%M.%S
TIME_PREFIX = ^
REPORT-Z^2_download = REPORT-Z^2

[Z^2_threatintel]
rename = Z^2:threatintel

[Z^2:threatintel]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y.%m.%d-%H.%M.%S
TIME_PREFIX = ^
REPORT-Z^2_threatintel = REPORT-Z^2
