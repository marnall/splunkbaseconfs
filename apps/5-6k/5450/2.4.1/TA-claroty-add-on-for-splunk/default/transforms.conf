[claroty_asset_type_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = claroty_asset_type_mappings.csv

[claroty_vendors_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = claroty_vendors.csv

[claroty_ot_assets_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = claroty_assets.csv

[claroty_cef_headers_to_val]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = \bCEF:(?<cef_cefVersion>\d+)\|(?<cef_vendor>[^|]*)\|(?<cef_product>[^|]*)\|(?<cef_version>[^|]*)\|(?<cef_signature>(?<cef_category>\w+)\/?(?<cef_type>.*?))\|(?<cef_name>[^|]*)\|(?<cef_severity>[^|]*)\|

[claroty_cef_custom_key_to_val]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = \b([a-zA-Z]+|c\d+[a-zA-Z]+\d+)=(.*?)(?=$|\s[\w\d]+=)

