definition = inputlookup vendor_lookup | append [| inputlookup claroty_vendors_lookup] | dedup match_string, vendor | outputlookup vendor_lookup
iseval = 0

[ctd_notification_status]
definition = search index=_internal sourcetype="taclarotyaddonforsplunk:log" "notification_status_change"\
| rex "input_name=(?<input_name>[^\s]+) input_type=(?<input_type>\w+) status=(?<notification_status>\w+)"\
| dedup input_name sortby -_time\
| table _time, input_name, input_type, notification_status\
| sort input_name
iseval = 0

[ctd_notification_status(1)]
args = input_name
definition = search index=_* sourcetype="taclarotyaddonforsplunk:log" "notification_status_change" "input_name=$input_name$"\
| rex "input_name=(?<input_name>[^\s]+) input_type=(?<input_type>\w+) status=(?<notification_status>\w+)"\
| dedup input_name sortby -_time\
| table _time, input_name, input_type, notification_status
iseval = 0
