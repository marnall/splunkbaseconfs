[claroty:assets]
EVAL-category = "ot" + if(isnotnull(class_type), "|" + class_type, "") + if(os_build="null" OR isnull(os_build) OR os_build="", "", "|" + os_build) + if(os_service_pack="null" OR isnull(os_service_pack) OR os_service_pack="", "", "|" + os_service_pack) + if(isnull(hostname), "", "|" + hostname)
EVAL-zone = if(isnull(purdue_level), "", "purdue:level" + purdue_level) + if(isnull(virtual_zone_name), "", "|" + virtual_zone_name)
FIELDALIAS-Claroty asset = hostname ASNEW nt_host "mac{}" ASNEW mac name ASNEW asset_name resource_id ASNEW asset_id serial_number ASNEW serial "vlan{}" ASNEW vlan
FIELDALIAS-Claroty asset ip = "address{}" ASNEW ip "ipv4{}" ASNEW ip "ipv6{}" ASNEW ip
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 0
SHOULD_LINEMERGE = 0
TRUNCATE = 999999
category = Splunk App Add-on Builder
pulldown_type = 1
EVAL-asset_system = if(isnull(site_name), "unknown", site_name)
EVAL-asset_status = if(valid == "true", "operational", "inactive")
EVAL-exposure = "private"
EVAL-requires_av = if(isnull(installed_antivirus) OR installed_antivirus == "" OR installed_antivirus == "null", "false", "true")
EVAL-asset_model = if(isnull(model), "unknown", model)
EVAL-asset_version = if(isnull(firmware) OR firmware == "null", "unknown", firmware)
EVAL-bunit = "unknown"
EVAL-asset_vendor = if(isnull(vendor) OR vendor == "null", "unknown", vendor)
EVAL-mac = if(isnull(mac) OR mac == "null", "unknown", mac)
EVAL-priority = case(risk_level == 0, "Low", risk_level == "1", "Medium", risk_level == "2", "High", risk_level == "3", "Critical")
EVAL-asset_type = case(isnotnull(asset_type__), substr(asset_type__, 2))
EVAL-asset_criticality = case(isnotnull(criticality__), substr(criticality__, 2))
TIME_PREFIX = (last_updated|timestamp)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
EVAL-indextime = strftime(_indextime,"%Y-%m-%d %H:%M:%S")

[source::...ta-claroty-add-on-for-splunk*.log*]
sourcetype = taclarotyaddonforsplunk:log

[source::...ta_claroty_add_on_for_splunk*.log*]
sourcetype = taclarotyaddonforsplunk:log

[claroty:cef]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
EVAL-severity = case(isnull(cef_type) OR cef_type != "Test", case(cef_category == "Alert" OR cef_category=="Event" OR cef_category == "Vulnerabilities" ,  case(severity_id == 2 , "Low", severity_id == 5 , "Medium", severity_id == 7 , "High", severity_id == 10 , "Critical"), cef_category == "Insight", CtdInsightsSeverity))
REPORT-claroty_cef_headers_to_val = claroty_cef_headers_to_val
REPORT-claroty_cef_custom_key_to_val = claroty_cef_custom_key_to_val
FIELDALIAS-claroty_cef_alerts = CtdAlertInterfaceSource AS src_nic CtdDestinationAssetType AS dest_type CtdMessage AS description CtdMitreAttackTechniqueIds AS mitre_technique_id CtdSourceAssetType AS src_type CtdSourceIp AS src cef_name AS signature
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TRUNCATE = 999999
disabled = false
EVAL-type = case(isnull(cef_type) OR cef_type != "Test", case(cef_category == "Alert" OR cef_category == "Event", cef_category))
FIELDALIAS-claorty_cef_insights = CtdDeviceExternalId ASNEW dvc CtdFilePath ASNEW url CtdInsightsSeverity ASNEW severity cef_name ASNEW category cef_product ASNEW vendor_product cef_severity ASNEW severity_id
FIELDALIAS-claroty_cef_health_check = CtdCpu ASNEW cpu_load_percent CtdCtrlSite ASNEW parent CtdMem ASNEW mem_used
TIME_PREFIX = CtdTimeGenerated
TIME_FORMAT = %b %d %Y %H:%M:%S
EVAL-storage_used_percent = case(cef_category == "HealthCheck" AND (isnull(cef_type) OR cef_type != "Test"), avg(tonumber(CtdUsedOptIcsranger), tonumber(CtdUsedVar), tonumber(CtdUsedTmp), tonumber(CtdUsedEtc)))
EVAL-mem = case(cef_category == "HealthCheck" AND cef_type != "Test", "")
EVAL-indextime = strftime(_indextime,"%Y-%m-%d %H:%M:%S")
EVAL-dest = case(isnull(cef_type) OR cef_type != "Test", case(cef_category == "Alert" OR cef_category == "Event", CtdDestinationIp,  cef_category == "Insight" OR cef_category == "Vulnerabilities", coalesce (CtdSourceIp, CtdSourceMac, CtdSourceHost), cef_category == "HealthCheck", coalesce(CtdSensorName, CtdSite)))
EVAL-signature_id = case(isnull(cef_type) OR cef_type != "Test", case(cef_category == "Alert", CtdAlertTypeId, cef_category == "Event", CtdEventTypeId, cef_category == "Insight", CtdExternalId))
EVAL-signature = case(isnull(cef_type) OR cef_type != "Test", case(cef_category == "Alert" OR cef_category == "Event" , cef_name, cef_category == "Insight", CtdMessage, cef_category == "ActivityLog", CtdMessage, cef_category == "Vulnerabilities", CtdVulnerabilityDescription))
EVAL-user = case(isnull(cef_type) OR cef_type != "Test", case(cef_category == "Alert", CtdAssignedTo, cef_category == "Insight", CtdInsightUser, cef_category == "ActivityLog", CtdUser, cef_category == "Vulnerabilities", CtdVulnerabilityAssignedTo))
EVAL-severity_id = case(isnull(cef_type) OR cef_type != "Test", case(cef_category == "Alert" OR cef_category == "Event" OR cef_category == "Insight" OR cef_category == "Vulnerabilities", cef_severity))
EVAL-app = case(isnull(cef_type) OR cef_type != "Test", case(cef_category == "Alert" OR cef_category == "Event", CtdDeviceExternalId, cef_category == "ActivityLog", CtdSite))
FIELDALIAS-claroty_cef_activity = CtdAction ASNEW action CtdActionStatus ASNEW status CtdLogType ASNEW user_type CtdMessage ASNEW result cef_name ASNEW change_type
EVAL-id = case(isnull(cef_type) OR cef_type != "Test", case(cef_category == "Alert" OR cef_category == "Event", CtdExternalId))
EVAL-dvc = case(isnull(cef_type) OR cef_type != "Test", case(cef_category == "Insight" OR cef_category == "Vulnerabilities", CtdDeviceExternalId, cef_category == "ActivityLog", CtdSite))
EVAL-cve = case(cef_category == "Vulnerabilities", CtdVulnerabilityName, cef_category == "Insight", CtdCveId)
EVAL-cvss = case(cef_category == "Vulnerabilities", coalesce(CtdVulnerabilityCvssV3Score, CtdVulnerabilityCvssV2Score), cef_category == "Insight", CtdCveScore)
EXTRACT-dest_port = CtdMessage=.*?on the same port:\s+(?<dest_port>\d+)

[claroty:events]
category = Splunk App Add-on Builder
pulldown_type = 1
EVAL-type = "event"
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false
FIELDALIAS-Claroty events = "dest_types{}" ASNEW dest_type "dest{}" ASNEW dest resource_id ASNEW id severity ASNEW severity_id site_name ASNEW app "src_types{}" ASNEW src_type "src{}" ASNEW src type ASNEW signature_id
EVAL-signature = if(substr(type__, 2)=="KnownThreatEvent", signature_name, replace(substr(type__, 2), "([A-Z])", " \1"))
EVAL-severity = substr(severity__, 2)
TRUNCATE = 999999
EVAL-src = mvjoin(src, " ")
EVAL-dest = mvjoin(dest, " ")
EXTRACT-signature_name = "description":\s+"(?<signature_name>.*?)\(.*?->.*?\).*?"
TIME_PREFIX = (last_updated|timestamp)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
EVAL-indextime = strftime(_indextime,"%Y-%m-%d %H:%M:%S")

[claroty:alerts]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-Claroty alerts = "dest_types{}" ASNEW dest_type "dest{}" ASNEW dest "interface_sources{}" ASNEW src_nic "mitre_technique_ids{}" ASNEW mitre_technique_id resource_id ASNEW id severity ASNEW severity_id site_name ASNEW app "src_types{}" ASNEW src_type "src{}" ASNEW src type ASNEW signature_id
EVAL-dest = mvjoin(dest, " ")
EVAL-src = mvjoin(src, " ")
EVAL-type = "alert"
EVAL-severity = substr(severity__, 2)
EVAL-signature = if(substr(type__, 2)=="KnownThreatAlert", signature_name, replace(substr(type__, 2), "([A-Z])", " \1"))
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 999999
TIME_PREFIX = (last_updated|timestamp)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
EVAL-indextime = strftime(_indextime,"%Y-%m-%d %H:%M:%S")
EXTRACT-dest_port = "description":\s+".*?on.*?the.*?same.*?port:\s+(?<dest_port>\d+)"

[claroty:baselines]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-claroty baselines = description ASNEW rule dst_port ASNEW dest_port resource_id ASNEW flow_id site_id ASNEW dvc site_name ASNEW app transmission ASNEW transport
EVAL-action = "allowed"
EVAL-dest = spath(_raw, "destination_entity.asset_name")
EVAL-src = spath(_raw, "source_entity.asset_name")
EVAL-dest_mac = spath(_raw, "destination_entity.mac")
EVAL-dest_zone = spath(_raw, "destination_entity.virtual_zone_name")
EVAL-src_mac = spath(_raw, "source_entity.mac")
EVAL-src_zone = spath(_raw, "source_entity.virtual_zone_name")
EVAL-dest_ip = case(isnotnull(spath(_raw, "destination_entity.ipv4")), spath(_raw, "destination_entity.ipv4"), isnotnull(spath(_raw, "destination_entity.ipv6")), spath(_raw, "destination_entity.ipv6"))
EVAL-src_ip = case(isnotnull(spath(_raw, "source_entity.ipv4")), spath(_raw, "source_entity.ipv4"), isnotnull(spath(_raw, "source_entity.ipv6")), spath(_raw, "source_entity.ipv6"))
EVAL-vendor_product = "Claroty"
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 999999
TIME_PREFIX = (last_updated|timestamp)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
EVAL-indextime = strftime(_indextime,"%Y-%m-%d %H:%M:%S")

[claroty_cef]
FIELDALIAS-claorty_cef_vulnerabilities = cef_name ASNEW category cef_product ASNEW vendor_product

