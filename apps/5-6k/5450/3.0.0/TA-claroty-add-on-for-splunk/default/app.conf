[launcher]
author = Claroty
description = The Claroty Add-on for Splunk allows users to retrieve data from Claroty appliances including Assets, Alerts, Events, Baselines, Insights, Vulnerabilities, Health Monitoring, and Activity Logs either by API or Syslog
version = 3.0.0

[ui]
is_visible = true
label = Claroty Add-on for Splunk

[id]
version = 3.0.0
name = TA-claroty-add-on-for-splunk

[install]
build = 1774278954
is_configured = false
state = enabled

[package]
id = TA-claroty-add-on-for-splunk
check_for_updates = true

[triggers]
reload.ta_claroty_add_on_for_splunk_settings = simple
reload.ta_claroty_add_on_for_splunk_account = simple
