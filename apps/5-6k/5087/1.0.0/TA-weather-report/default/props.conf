
[PythonWeatherReport]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[source::...ta-weather-report*.log*]
SHOULD_LINEMERGE = true
sourcetype = taweatherreport:log

[source::...ta_weather_report*.log*]
