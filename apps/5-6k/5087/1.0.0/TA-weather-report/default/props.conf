[PythonWeatherReport2]
FIELDALIAS-PythonWeatherReport2_Aliases = "main.feels_like" ASNEW effective_temperature "main.temp" ASNEW temperature name ASNEW city
LOOKUP-WeatherLocationLookup = WeatherLocationLookup city AS name OUTPUTNEW zip AS zip
TRANSFORMS-CityName = CityName
TIME_PREFIX = "data_timestamp":\s*"
MAX_TIMESTAMP_LOOKAHEAD = 19
TIME_FORMAT = %Y-%m-%d %H:%M:%S

