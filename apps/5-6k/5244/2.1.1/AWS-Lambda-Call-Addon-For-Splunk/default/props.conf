[source::...awslambda_alert.log*]
sourcetype = aws:lambda:call:addon:for:splunk:log

[aws:lambda:call:addon:for:splunk:log]
EXTRACT-RequestId = Request\sID\s:\s(?<RequestId>[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+)\s
EXTRACT-HTTPStatusCode = 'StatusCode\s':(?<HTTPStatusCode>\s\w+)\s
EXTRACT-ResponseMessage = Response\sMessage\s:\s\{(?P<ResponseMessage>.*)\}
EXTRACT-LambdaFunctionName= Lambda\sFunction\s:\s(?P<LambdaFunctionName>.\w+)"
EXTRACT-Error= \sE\s-\s(?<Error>.*)



