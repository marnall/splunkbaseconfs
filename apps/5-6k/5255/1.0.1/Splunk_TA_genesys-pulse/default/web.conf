
[expose:Splunk_TA_genesys_pulse_settings]
pattern = Splunk_TA_genesys_pulse_settings
methods = POST, GET

[expose:Splunk_TA_genesys_pulse_settings_specified]
pattern = Splunk_TA_genesys_pulse_settings/*
methods = POST, GET, DELETE

[expose:Splunk_TA_genesys_pulse_genesys_pulse_snapshot]
pattern = Splunk_TA_genesys_pulse_genesys_pulse_snapshot
methods = POST, GET

[expose:Splunk_TA_genesys_pulse_genesys_pulse_snapshot_specified]
pattern = Splunk_TA_genesys_pulse_genesys_pulse_snapshot/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
