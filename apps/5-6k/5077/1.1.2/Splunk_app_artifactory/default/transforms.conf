[REPORT-Artifactory-req]
DELIMS = "|"
FIELDS = "Timestamp","Duration","Type","UserIP","User","Method","URI","Protocol","Response","Bytes"

[REPORT-Code_Commits]
DELIMS = ";"
FIELDS = "Name","Project","Repository","Timestamp","SHA"

[REPORT-POWERUSER]
DELIMS = ","
FIELDS = "field1","field2","field3","field4","field5","field6","field7","field8","field9","L2","field11","field12","Email","Enrollment","Certified","L2"

[Teams]
filename = team.csv

[REPORT-LoadTest-Apache]
DELIMS = ","
FIELDS = "Percent_Served","Time_ms","Time_ms"

[REPORT-LoadTest-gplot]
DELIMS = "\t"
FIELDS = "Start_Time","Seconds","Ctime","Dtime","Ttime","Wait","function(arr){for(var i=0;i<arr.length;i++)this.push(arr[i])}"

[countries]
filename = geo_attr_countries.csv

[status]
filename = geo_attr_us_states.csv

[geo_countries]
filename = geo_countries.kmz

[geo_states]
filename = geo_us_states.kmz