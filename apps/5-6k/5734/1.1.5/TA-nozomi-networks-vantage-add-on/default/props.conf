[source::...ta_nozomi_networks_vantage_add_on*.log*]
sourcetype = tanozominetworksvantageaddon:log

[nozomi:vantage_health_log]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[nozomi:vantage_link]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[nozomi:vantage_session]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[nozomi:vantage_alert]
EVAL-category = attributes.name
EVAL-description = attributes.description
EVAL-dest_ip = attributes.ip_dst
EVAL-dest_mac = attributes.mac_dst
EVAL-dest_port = attributes.port_dst
EVAL-dest_zone = attributes.zone_dst
EVAL-id = id
EVAL-protocol = attributes.protocol
EVAL-severity = attributes.risk
EVAL-signature = attributes.trigger_id
EVAL-src_ip = attributes.ip_src
EVAL-src_mac = attributes.mac_src
EVAL-src_port = attributes.port_src
EVAL-src_zone = attributes.zone_src
EVAL-transport = attributes.transport_protocol
EVAL-type = type
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[nozomi:vantage_asset]
EVAL-asset_id = id
EVAL-asset_type = if(attributes.type="-",null,attributes.type)
EVAL-os = if(attributes.os_or_firmware="null",null,attributes.os_or_firmware)
EVAL-serial = if(attributes.serial_number="null",null,attributes.serial_number)
EVAL-vendor_product = if(attributes.vendor="null",null,attributes.vendor)
EVAL-version = if(attributes.firmware_version="null",null,attributes.firmware_version)
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

