# #::HDR:: ;; # App: vmware_app_for_splunk ;; # File: app.conf ;; # Updated: 2023-08-02 11:38:01

[id]
name    = vmware_app_for_splunk
version = 2.2.6

[install]
is_configured = 0
build         = 0

[launcher]
version     = 2.2.6
author      = Aplura, LLC
description = Provides a view into VMware Carbon Black Cloud using events and alerts from the CBC.

[package]
check_for_updates = 1
id                = vmware_app_for_splunk

[triggers]
reload.apl_logging               = simple
reload.application_settings      = simple
reload.command_extension         = simple
reload.eventgen                  = simple
reload.proxy                     = simple
reload.tenants                   = simple
reload.application_configuration = simple

[ui]
label      = VMware Carbon Black Cloud
is_visible = 1
setup_view = App_Config

[diag]
extension_script = Diag.py