[cbcdvcinfo-command]
syntax = cbcdvcinfo <cbcdvcinfo-option>*
shortdesc = cbcdvcinfo enhances data with additional data pulled from the CBC. \
  'device_id' is the field name that contains the device id for the command to enrich, as found in the CBC interface. \
  'org_key' is the field name that contains the org key that is associated with the credential. \
  'fields' is a quoted and comma-separated list of fields to return from the query. Ex: 'fields="last_location,last_name"' will only add the columns last_location and last_name.
description = cbcdvcinfo enhances data with additional data pulled from the CBC. \
  'device_id' is the field name that contains the device id for the command to enrich, as found in the CBC interface. \
  'org_key' is the field name that contains the org key that is associated with the credential. \
  'fields' is a quoted and comma-separated list of fields to return from the query. Ex: 'fields="last_location,last_name"' will only add the columns last_location and last_name.
usage = public
example1 = cbcdvcinfo fields=last_internal_ip
comment1 = Queries for device information, returning only "last_internal_ip" field.
category = fields::add

[cbcdvcinfo-option]
syntax = <cbcdvcinfo-device-id-option>|<cbcdvcinfo-org-key-option>|<cbcdvcinfo-fields-option>
description = cbcdvcinfo enhances data with additional data pulled from the CBC. \
  'device_id' is the field name that contains the device id for the command to enrich, as found in the CBC interface. \
  'org_key' is the field name that contains the org key that is associated with the credential. \
  'fields' is a quoted and comma-separated list of fields to return from the query. Ex: 'fields="last_location,last_name"' will only add the columns last_location and last_name.

[cbcdvcinfo-device-id-option]
syntax = device_id=<string>
default = "device_id=device_id"
description = This is the field name that contains the device id for the command to enrich, as found in the CBC interface

[cbcdvcinfo-org-key-option]
syntax = org_key=<string>
default = "org_key=org_key"
description = This is the field name that contains the org key that is associated with the credential.

[cbcdvcinfo-fields-option]
syntax = fields=<list>
default = ""
description = This is a quoted and comma-separated list of fields to return from the query. Ex: 'fields="last_location,last_name"' will only add the columns last_location and last_name.

