[cbcquery-command]
syntax = cbcquery alert_history|observations <cbcquery-option>*
shortdesc = cbcquery enables additional queries in dashboards to additional data pulled from the CBC. \
  'alert_id' is the field name that contains the alert id for the command to enrich, as found in the CBC interface. \
  'org_key' is the field name that contains the org key that is associated with the credential.
description = cbcquery enables additional queries in dashboards to additional data pulled from the CBC. \
  'alert_id' is the field name that contains the alert id for the command to enrich, as found in the CBC interface. \
  'org_key' is the field name that contains the org key that is associated with the credential.
usage = public
example1 = cbcquery observations alert_id=alert_id
comment1 = Queries for observations information
