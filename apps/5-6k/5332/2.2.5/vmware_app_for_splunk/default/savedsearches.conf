[vmware_example_for_alerting]
disabled = 1
dispatchAs = user
enableSched = 1
cron_schedule = */15 * * * *
counttype = number of events
relation = greater than
quantity = 0
alert.suppress = 0
alert.track = 1
description = This is a sample saved search that can provide the linkable url to the alert in the CBC Environment.
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | datamodel VMWare_CBC Alerts search | rename All_CBC.Alerts.* as alert_* All_CBC.* as * | where alert_create_time = alert_last_update_time | join org_key [rest splunk_server=local /servicesNS/-/-/configs/conf-tenants |stats last(cbc_env) as url by org_key]| eval linkable_url = "https://". url ."/alerts?s[highlight]=true&s[fromRow]=1&s[maxRows]=50&s[searchWindow]=ALL&s[sort][0][field]=first_event_time&s[sort][0][order]=DESC&s[c][group_results]=true&s[c][query_string][0]=" . mvindex(split(cbc_event_id,"-"),-1) | stats count by org_key linkable_url

[CB Analytics - Ingest Enriched Events]
action.vmware-enrich-events = 1
alert.severity = 1
alert.suppress = 1
alert.suppress.period = 60s
counttype = number of events
cron_schedule = */10 * * * *
disabled = 1
dispatch.earliest_time = -30m@m
dispatch.latest_time = -20m@m
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = vmware_app_for_splunk
request.ui_dispatch_view = vmware_app_for_splunk
search = eventtype=vmware_cbc_cb_analytics |eval aid = coalesce(alert_id, legacy_alert_id) |  stats values(aid) as alert_id by org_key sourcetype source host | eval alert_id = mvjoin(alert_id, ";:;:")
