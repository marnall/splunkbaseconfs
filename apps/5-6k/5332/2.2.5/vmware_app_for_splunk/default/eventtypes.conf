# #::HDR:: ;; # App: vmware_app_for_splunk ;; # File: eventtypes.conf ;; # Updated: 2024-01-10 14:27:56

[vmware_cbc_inventory]
search = sourcetype IN (vmware:cbc:inventory:*) eventtype=vmware_cbc_base_index

[vmware_cbc_endpoints]
search = sourcetype IN (vmware:cbc:inventory:device) eventtype=vmware_cbc_base_index deployment_type=ENDPOINT

[vmware_cbc_action_index]
search = index IN (main)

[vmware_cbc_base_index]
search = index IN (main)

[vmware_cbc_watchlist_hits]
search = eventtype=vmware_cbc_base_index sourcetype=vmware:cbc:s3:watchlist:hits

[vmware_cbc_livequery]
search = eventtype=vmware_cbc_base_index sourcetype=vmware:cbc:livequery:result

[vmware_cbc_api_errors]
search = (eventtype=vmware_cbc_base_index sourcetype IN (vmware_app_for_splunk:error, vmware:cbc:error) ) OR eventtype=vmware_cbc_error_messages

[modvmware-ban-hash_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-ban-hash" orig_sid=* OR orig_sourcetype=*

[modvmware-process-guid-details_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-process-guid-details" orig_sid=* OR orig_sourcetype=*

[modvmware-process-guid-details]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-process-guid-details" orig_sid=* OR orig_sourcetype=*

[modvmware-add-ioc-watchlist_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-add-ioc-watchlist" orig_sid=* OR orig_sourcetype=*

[modvmware-close-alert_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-close-alert" orig_sid=* OR orig_sourcetype=*

[modvmware-enrich-events_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-enrich-events" orig_sid=* OR orig_sourcetype=*

[modvmware-get-file-metadata_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-get-file-metadata" orig_sid=* OR orig_sourcetype=*

[modvmware-kill-process_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-kill-process" orig_sid=* OR orig_sourcetype=*

[modvmware-list-process_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-list-process" orig_sid=* OR orig_sourcetype=*

[modvmware-quarantine-device_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-quarantine-device" orig_sid=* OR orig_sourcetype=*

[modvmware-remove-ioc-watchlist_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-remove-ioc-watchlist" orig_sid=* OR orig_sourcetype=*

[modvmware-run-livequery_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-run-livequery" orig_sid=* OR orig_sourcetype=*

[modvmware-unquarantine-device_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-unquarantine-device" orig_sid=* OR orig_sourcetype=*

[modvmware-update-device-policy_results]
search = eventtype=vmware_cbc_action_index sourcetype="vmware:alert_action:vmware-update-device-policy" orig_sid=* OR orig_sourcetype=*

[vmware_action_modresult]
search = sourcetype=vmware:action* eventtype=vmware_cbc_action_index

[vmware_cbc_alerts]
search = eventtype=vmware_cbc_base_index sourcetype="vmware:cbc:s3:alerts" OR sourcetype="vmware:cbc:alerts" OR sourcetype="vmware:cbc:s3:watchlist:hits"

[vmware_cbc_events]
search = eventtype=vmware_cbc_base_index sourcetype="vmware:cbc:s3:events" OR sourcetype="vmware:cbc:events"

[vmware_cbc_auditlogs]
search = eventtype=vmware_cbc_base_index sourcetype="vmware:cbc:auditlogs"

[vmware_cbc_vulnerability_summary]
search = eventtype=vmware_cbc_base_index sourcetype="vmware:cbc:vulnerability:summary"

[vmware_cbc_vulnerability_os_list]
search = eventtype=vmware_cbc_base_index sourcetype="vmware:cbc:vulnerability:os:list"

[vmware_cbc_cb_analytics]
search = eventtype=vmware_cbc_alerts cbc_type="CB_ANALYTICS"

[vmware_cbc_watchlist]
search = eventtype=vmware_cbc_alerts  cbc_type="WATCHLIST"

[vmware_cbc_malware]
search = eventtype=vmware_cbc_alerts threat_cause_threat_category="*MALWARE*" NOT threat_cause_threat_category="*NON_MALWARE*"

[vmware_cbc_endpoint_apicall]
search = eventtype=vmware_cbc_events type="endpoint.event.apicall"

[vmware_cbc_endpoint_crossproc]
search = eventtype=vmware_cbc_events type="endpoint.event.crossproc"

[vmware_cbc_endpoint_filemod]
search = eventtype=vmware_cbc_events type="endpoint.event.filemod"

[vmware_cbc_endpoint_moduleload]
search = eventtype=vmware_cbc_events type="endpoint.event.moduleload"

[vmware_cbc_endpoint_netconn]
search = eventtype=vmware_cbc_events type="endpoint.event.netconn"

[vmware_cbc_endpoint_procend]
search = eventtype=vmware_cbc_events type="endpoint.event.procend"

[vmware_cbc_endpoint_procstart]
search = eventtype=vmware_cbc_events type="endpoint.event.procstart"

[vmware_cbc_endpoint_regmod]
search = eventtype=vmware_cbc_events type="endpoint.event.regmod"

[vmware_cbc_error_messages]
search = index=_internal sourcetype="vmware:cbc:*" log_level=ERROR

[modvmware-enrich-alert-obs_results]
search = eventtype=vmware_cbc_base_index sourcetype="vmware:alert_action:vmware-enrich-events-observation"

[vmware_enrich_alert_obs]
search = eventtype=vmware_cbc_base_index sourcetype=vmware:alert_action:vmware-enrich-alert-obs

[vmware_cbc_authentication_events]
search = eventtype=vmware_cbc_base_index sourcetype=vmware:cbc:authentication_events

[vmware_cbc_auth_evt_cleartext]
search = eventtype=vmware_cbc_authentication_events auth_cleartext_credentials_logon=true

[vmware_cbc_auth_evt_privileged]
search = eventtype=vmware_cbc_authentication_events auth_elevated_token_logon=true OR auth_restricted_admin_logon=true

[modvmware-alert-history_results]
search = eventtype=vmware_alert_action_alert_history

[vmware_alert_action_alert_history]
search = eventtype=vmware_cbc_base_index sourcetype=vmware:alert_action:vmware-alert-history