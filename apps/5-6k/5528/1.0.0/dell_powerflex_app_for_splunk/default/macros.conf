[powerflex_data]
definition = (index=main)


[powerflex_system_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:system"

[powerflex_system_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:system"

[powerflex_sds_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:sds"

[powerflex_sds_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:sds"

[powerflex_sdc_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:sdc"

[powerflex_sdc_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:sdc"

[powerflex_volume_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:volume"

[powerflex_volume_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:volume"

[powerflex_device_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:device"

[powerflex_device_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:device"

[powerflex_pd_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:pd"

[powerflex_pd_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:pd"

[powerflex_pd_all]
definition = `powerflex_data` sourcetype="powerflex:statistics:pd" OR sourcetype="powerflex:instance:pd"

[powerflex_sp_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:sp"

[powerflex_sp_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:sp"

[powerflex_faultset_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:faultset"

[powerflex_faultset_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:faultset"

[powerflex_snapshotpolicy_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:snapshotpolicy"

[powerflex_snapshotpolicy_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:snapshotpolicy"

[powerflex_vtree_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:vtree"

[powerflex_vtree_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:vtree"

[powerflex_rp_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:rp"

[powerflex_rp_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:rp"

[powerflex_rcg_statistics]
definition = `powerflex_data` sourcetype="powerflex:statistics:rcg"

[powerflex_rcg_instance]
definition = `powerflex_data` sourcetype="powerflex:instance:rcg"

[powerflex_rcg_all]
definition = `powerflex_data` sourcetype="powerflex:statistics:rcg" OR sourcetype="powerflex:instance:rcg"

[powerflex_sdr_all]
definition = `powerflex_data` sourcetype="powerflex:instance:sdr"  OR sourcetype="powerflex:statistics:sdr"

[powerflex_peermdm_all]
definition = `powerflex_data` sourcetype="powerflex:instance:peermdm" OR sourcetype="powerflex:statistics:peermdm"

[powerflex_alerts]
definition = `powerflex_data` sourcetype="powerflex:alerts" NOT alertType="MDM_CREDENTIALS_ARE_NOT_CONFIGURED"

[powerflex_rpl_alerts]
definition=`powerflex_data` sourcetype="powerflex:alerts" alertType="RCG_REMOTE_CONSISTENCY_GROUP_IS_INCONSISTENT" OR alertType="RCG_RPO_EXCEEDED" OR alertType="REPLICATION_FAILED"

[powerflex_create_id_name_field]
definition = eval id_name=if(isnull(name) or name="null", id, name." - ".id)

[powerflex_critical_alerts]
definition = ("MDM_NOT_CLUSTERED", "MDM_FAILS_OVER_FREQUENTLY", "FWD_REBUILD_STUCK", "BKWD_REBUILD_STUCK", "REBALANCE_STUCK", "CLUSTER_DEGRADED", "MDM_NOT_CLUSTERED_VOLUMES_EXIST", "STORAGE_POOL_HAS_FAILED_CAPACITY", "CAPACITY_UTILIZATION_ABOVE_CRITICAL_THRESHOLD", "BACKGROUND_SCANNER_COMPARE_ERROR", "CERTIFICATE_ABOUT_TO_EXPIRE", "MDM_CERTIFICATE_EXPIRED", "NET_CAPACITY_CRITICAL_USAGE", "NET_CAPACITY_FULL_USAGE", "USER_DATA_CRITICAL_USAGE", "USER_DATA_FULL_USAGE",)

[powerflex_convert_to_mb(1)]
args = field
definition = (($field$)/1024)

[powerflex_convert_to_gb(1)]
args = field
definition = (($field$)/(1024*1024))

[powerflex_convert_to_tb(1)]
args = field
definition = (($field$)/(1024*1024*1024))
