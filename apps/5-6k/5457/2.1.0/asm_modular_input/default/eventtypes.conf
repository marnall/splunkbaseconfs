[asm_event]
color = et_orange
search = index=* sourcetype=asm:event:syslog (metric_category != Authentication OR (metric_category = Authentication metric_name!="Login fail events" metric_name!="Login valid events"))

[asm_vulnerability]
color = et_red
search = index=* sourcetype=asm:vulnerability:json

[asm_authentication]
color = et_purple
priority = 2
search = index=* sourcetype=asm:event:syslog metric_category=Authentication (metric_name="Login fail events" OR metric_name="Login valid events")

[asm_admin_prop]
color = et_sky
search = index=* sourcetype=asm:adminprop:json

[asm_actual_software]
search = index=* sourcetype=asm:actualsoftware:json
