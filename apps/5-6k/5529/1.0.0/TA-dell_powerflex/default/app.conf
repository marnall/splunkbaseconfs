[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 15

[launcher]
version = 1.0.0
author = Crest Data Systems
description = Provides the functionality to collect data from Dell EMC PowerFlex OS via REST endpoints and store in Splunk indexes. Apart from that it will categorize the data in different sourcetypes and will Parse the data and extract important fields.

[ui]
is_visible = 1
label = Dell EMC PowerFlex Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-dell_powerflex

[triggers]
reload.addon_builder = simple
reload.ta_dell_powerflex_systems = simple
reload.ta_dell_powerflex_settings = simple
reload.passwords = simple