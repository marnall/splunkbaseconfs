# #::HDR:: ;; # App: TA-sentinelone_app_for_splunk ;; # File: eventtypes.conf ;; # Updated: 2023-06-27 20:10:41

[modsentinelone-network-control_results]
search = eventtype = sentinelone_base_index sourcetype = sentinelone:action:network-control orig_sid=* OR orig_sourcetype=*

[modsentinelone-network-control]
search = eventtype = modsentinelone-network-control_results

[modsentinelone-threat-control_results]
search = eventtype = sentinelone_base_index sourcetype = sentinelone:action:threat-control orig_sid=* OR orig_sourcetype=*

[modsentinelone-threat-control]
search = eventtype = modsentinelone-threat-control_results

[sentinelone_base_index]
search = index=main

[sentinelone_legacy_index]
disabled = 1
search   = index=main

[sentinelone_legacy_threats]
disabled = 1
search   = eventtype=sentinelone_legacy_index sourcetype=threats

[sentinelone_legacy_agents]
disabled = 1
search   = eventtype=sentinelone_legacy_index sourcetype=agents

[sentinelone_legacy_groups]
disabled = 1
search   = eventtype=sentinelone_legacy_index sourcetype=groups

[sentinelone_legacy_activities]
disabled = 1
search   = eventtype=sentinelone_legacy_index sourcetype=activities

[sentinelone_updated_threats]
search = eventtype=sentinelone_base_index sourcetype=sentinelone:channel:threats

[sentinelone_threats]
search = eventtype IN (sentinelone_updated_threats)

[sentinelone_threat_events]
search = eventtype=sentinelone_base_index sourcetype=sentinelone:channel:threats:event

[sentinelone_updated_agents]
search = eventtype=sentinelone_base_index sourcetype=sentinelone:channel:agents

[sentinelone_agents]
search = eventtype IN (sentinelone_updated_agents)

[sentinelone_updated_groups]
search = eventtype=sentinelone_base_index sourcetype=sentinelone:channel:groups

[sentinelone_groups]
search = eventtype IN (sentinelone_updated_groups)

[sentinelone_updated_activities]
search = eventtype=sentinelone_base_index sourcetype=sentinelone:channel:activities

[sentinelone_activities]
search = eventtype IN (sentinelone_updated_activities)

[sentinelone_applications]
search = eventtype=sentinelone_base_index sourcetype=sentinelone:channel:applications

[sentinelone_application_cves]
search = eventtype=sentinelone_base_index sourcetype=sentinelone:channel:applications:cve OR (sourcetype="sentinelone:channel:applications" "cves{}.application_id"=*)

[sentinelone_application_risks]
search    = eventtype=sentinelone_base_index sourcetype=sentinelone:channel:application_management:risks
### CIM RELATED EVENT TYPES
# This is a catch-all for the Tags. Update this to add more sourcetypes to the tags.
# INVENTORY AND ENDPOINTS CIM

[sentinelone_inventory_endpoints]
search    = eventtype=sentinelone_agents
# AUTHENTICATION CIM

[sentinelone_authentication]
# Reviewed for CIM 5.1 Feb 9, 2023
search    = eventtype=sentinelone_activities activityType IN (27, 33, 133)
# ALERTS CIM

[sentinelone_alerts]
# Reviewed for CIM 5.1 Feb 9, 2023
search    = eventtype=sentinelone_threats
# MALWARE CIM

[sentinelone_malware]
# Reviewed for CIM 5.1 Feb 9, 2023
search    = eventtype=sentinelone_threats
# Change CIM

[sentinelone_change]
# Reviewed for CIM 5.1 Feb 9, 2023
search    = eventtype=sentinelone_activities NOT eventtype IN (sentinelone_authentication)
# Vuln CIM

[sentinelone_vulns]
search    = eventtype IN (sentinelone_application_risks, sentinelone_application_cves)
# Errors

[sentinelone_errors]
search = index=_internal sourcetype=sentinelone:* log_level=ERROR