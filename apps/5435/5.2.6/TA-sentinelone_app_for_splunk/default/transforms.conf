

[sentinelone_lookup]
collection    = sentinelone_lookup
external_type = kvstore
fields_list   = siteName, siteId, accountId, accountName, uuid, groupId, infected, createdAt, updatedAt, isActive, isDecommissioned, isPendingUninstall, isUninstalled,isUpToDate, machineType, modelName, host, _key

[sentinelone_lookup_max_1]
collection    = sentinelone_lookup
external_type = kvstore
fields_list   = siteName, siteId, host
max_matches   = 1

[sentinelone_groups_lookup]
collection    = sentinelone_groups_lookup
external_type = kvstore
fields_list   = createdAt, creator, ad_query, rank, creatorId, id, host, _key, siteId, name, isDefault, inherits, totalAgents, type, updatedAt, siteName

