[FortiMail - Excessive Messages Sent]
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 15 * * * *
disabled = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = area
display.visualizations.type = mapping
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkforFortiMail
request.ui_dispatch_view = search
search = `fml_logs` direction="out" | table src_user recipient | join src_user [search `fml_logs` direction="out" | stats count by src_user action | where count > 100] | sort - count | stats values(recipient) values(action) values(count) by src_user | rename values(recipient) as recipient values(count) as count values(action) as action

[FortiMail - Excessive Messages Received]
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 30 * * * *
disabled = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = area
display.visualizations.type = mapping
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkforFortiMail
request.ui_dispatch_view = search
search = `fml_logs` direction="in" | table recipient src_user | join recipient [search `fml_logs` direction="in" | stats count by recipient action | where count > 100] | sort - count | stats values(src_user) values(action) values(count) by recipient | rename values(src_user) as sender values(count) as count values(action) as action

[FortiMail - Excessive Messages with the same subject]
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 45 * * * *
disabled = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = area
display.visualizations.type = mapping
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkforFortiMail
request.ui_dispatch_view = search
search = `fml_logs` | table src_user_domain subject_encoded | join subject_encoded [search `fml_logs` | stats count by subject_encoded action | where count > 100] | lookup subjectDecodeLookup subject_encoded | sort - count | stats values(src_user_domain) values(action) values(count) by subject_decoded | rename values(src_user_domain) as "sender domain" values(count) as count values(action) as action subject_decoded as subject

[Search]
alert.track = 0
dispatch.earliest_time = @d
dispatch.latest_time = now
display.page.search.mode = verbose
request.ui_dispatch_app = SplunkforFortiMail
request.ui_dispatch_view = search
search = `fml_logs`