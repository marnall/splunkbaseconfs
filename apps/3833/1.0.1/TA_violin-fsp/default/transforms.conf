[info_fields]
REGEX = InfoItem\sname=\\\"(?<_KEY_1>[\s\S]+?)\\\"\svalue=\\\"(?<_VAL_1>[\s\S]+?)\\\"
REPEAT_MATCH = True
CLEAN_KEYS = 1

[storagepool_fields]
REGEX = StoragePool\sid\=\\\"([^"]*)\\\"\sname\=\\\"([^"]*)\\\"\stag\=\\\"([^"]*)\\\"\sstorageAttribute\=\\\"([^"]*)\\\"
FORMAT = StoragepoolID::$1 StoragepoolName::$2 StoragepoolTag::$3 StorageAttribute::$4
MV_ADD = true

[virtual_info]
REGEX = \<VirtualDev\s(.*?)\<\/VirtualDev\>
FORMAT =  virtual_info::$1
MV_ADD = true

[replication_details]
SOURCE_KEY = virtual_info
REGEX = \sid\=\\\"(\S+)\\\"\sname\=\\\"([^\\]+?)\\\"\sguid\=\\\"(\S+)\\\"[^>]*?\stype\=\\\"(\w+)\\\"[^>]*?\sreplicationEnabled=\\\"true\\\"[^>]*?\ssubType\=\\\"(\w+)\\\".*?\<Geometry.*?\<RemoteDataSet\stype\=\\\"(\w+)\\\"\sid\=\\\"(\S+)\\\"\sserverName\=\\\"(.*?)\\\"\sserverAlias\=\\\"(\S+)\\\".*?remoteGuid\=\\\"([^\\]+?)\\\".*?\<ReplicationPolicy\swatermark\=\\\"(\S+)\\\"[^>]*?useExistingTM\=\\\"(\w+)\\\"[^>]*?interval\=\\\"(\d+)\\\"\sinitialTime\=\\\"(\d+)\\\"\sunit\=\\\"(\w+)\\\"[^>]*?preserveTM\=\\\"(\w+)\\\"[^>]*?priority\=\\\"(\d+)\\\"
FORMAT = Primary_lun_id::$1 primary_lun::$2 primary_lun_guid::$3 primary_lun_type::$4 primary_lun_subtype::$5 replica_type::$6 replica_id::$7 server_name::$8 server_ip::$9 rep_id::$10 watermark::$11  use_existing_tm::$12 interval::$13 initial_time::$14 time_unit::$15 preserv_tm::$16 priority::$17
MV_ADD = true
