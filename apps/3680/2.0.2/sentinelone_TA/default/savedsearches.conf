[Agents List Lookup]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */15 * * * *
description = Updates the contents of agents_list kvstore lookup
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","tag::sourcetype"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = sentinelone_TA
request.ui_dispatch_view = search
schedule_window = auto
search = `s1_index` sourcetype=agent | stats latest(dest_name) as dest_name latest(network_status) as status latest(console) as console  latest(_time) as time  latest(last_active_date) as time_last_active  latest(meta_data.created_at) as time_created  latest(meta_data.updated_at) as time_updated  latest(registered_at) as time_registered  latest(id) as id  latest(group_id) as group_id  latest(enabled) as enabled  latest(version) as version  latest(cpu*) as cpu*  latest(mem) as mem  values(ip) as ip  latest(external_ip) as external_ip  latest(group_ip) as group_ip  values(interface) as interface  values(mac) as mac  latest(threat_count) as threat_count  latest(configuration.auto_mitigation_actions{}) as configuration_auto_mitigation_actions  latest(configuration.learning_mode) as configuration_learning_mode  latest(configuration.mitigation_mode) as configuration_mitigation_mode  latest(configuration.mitigation_mode_suspicious) as configuration_mitigation_mode_suspicious  latest(configuration.research_data) as configuration_research_data  latest(os*) as os*  latest(hardware_information.machine_type) as machine_type  latest(software_information.os_arch) as os_arch  latest(last_logged_in_user_name) as last_logged_in_user  latest(users{}.login_time) as time_last_logged_in_user  values(users{}.name) as user  values(users{}.sid) as user_id  latest(user_actions_needed) as user_actions_needed  latest(network_information.domain) as domain  latest(vendor_product) as vendor_product  latest(configuration*) as configuration* by serial  | foreach time_*  [eval <<FIELD>>=strptime(<<FIELD>>,"%Y-%m-%dT%H:%M:%S")]| eval _key=serial| outputlookup create_empty=t append=true agents_list

