[source::...ta-asana-for-splunk*.log*]
sourcetype = taasanaforsplunk:log

[Asana]
EVAL-action = case(event_type=="user_login_succeeded", "success", event_type=="user_login_failed","failure",event_type=="user_invited","created",event_type=="user_reprovisioned","created",event_type=="user_deprovisioned","deleted",event_category=="user_updates","modified",event_category=="roles","modified",event_category=="creation","created",event_category=="deletion","deleted",event_category=="content_export","read",event_category=="admin_settings","modified",1==1,event_type)
EVAL-user = if(user=="null" or isnull(user),src_user,user)
FIELDALIAS-aob_gen_Asana_alias_11 = context.session_id AS session_id
FIELDALIAS-aob_gen_Asana_alias_12 = context.user_agent AS user_agent
FIELDALIAS-aob_gen_Asana_alias_13 = details.added_resource.email AS user
FIELDALIAS-aob_gen_Asana_alias_14 = actor.gid AS src_user_id
FIELDALIAS-aob_gen_Asana_alias_15 = actor.email AS src_user
FIELDALIAS-aob_gen_Asana_alias_16 = details.added_resource.gid AS user_id
FIELDALIAS-aob_gen_Asana_alias_17 = details.removed_resource.gid AS user_id
FIELDALIAS-aob_gen_Asana_alias_18 = details.added_resource.resource_type AS user_type
FIELDALIAS-aob_gen_Asana_alias_19 = details.new_value AS object_attrs
FIELDALIAS-aob_gen_Asana_alias_20 = details.removed_resource.email AS user
FIELDALIAS-aob_gen_Asana_alias_21 = details.removed_resource.resource_type AS user_type
FIELDALIAS-aob_gen_Asana_alias_22 = event_type AS action
FIELDALIAS-aob_gen_Asana_alias_23 = event_category AS change_type
FIELDALIAS-aob_gen_Asana_alias_24 = resource.gid AS object_id
FIELDALIAS-aob_gen_Asana_alias_25 = resource.name AS object
FIELDALIAS-aob_gen_Asana_alias_26 = resource.resource_type AS object_category
FIELDALIAS-aob_gen_Asana_alias_27 = details.blocked_reason AS reason
FIELDALIAS-aob_gen_Asana_alias_28 = details.method{} AS authentication_method
FIELDALIAS-aob_gen_Asana_alias_29 = resource.email AS user
FIELDALIAS-aob_gen_Asana_alias_30 = sourcetype AS dest
FIELDALIAS-aob_gen_Asana_alias_31 = event_type AS command
FIELDALIAS-aob_gen_Asana_alias_4 = actor.name AS user_name
FIELDALIAS-aob_gen_Asana_alias_6 = context.client_ip_address AS src
FIELDALIAS-aob_gen_Asana_alias_7 = actor.actor_type AS src_user_type
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

