[splunk_tardis_is_tardis_visible]
definition = index="*" OR index="_*" | head 1 | eval is_tardis_visible=(round(_time/120))%2
iseval = 0

[splunk_tardis_is_tardis_visible_real_time]
definition = index="*" OR index="_*" | head 1 | timechart span=1s count | head 1 | eval is_tardis_visible=(round(_time/120))%2
iseval = 0
