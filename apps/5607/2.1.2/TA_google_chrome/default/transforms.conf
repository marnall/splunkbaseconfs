[extract_fields_from_crd_events]
FORMAT = event_detail_hostIp::$1 event_detail_clientIp::$2 event_detail_sessionId::$3
REGEX = \"event_detail\":\"hostIp:\s*(\w*.*)\,\sclientIp:\s*(\w*.*)\,\ssessionId:\s*(\w*.*)\"\,
[extract_fields_from_usb_events]
FORMAT = event_detail_vendor::$1 event_detail_product::$2 event_detail_vendorId::$3 event_detail_productId::$4
REGEX = \"event_detail\":\"vendor:([\w\s\,\.]*),\s*product:([\w\s\,\.]*),\s*vendorId:([\w\s\,\.]*),\s*productId:([\w\s\,\.]*)\"

[gc_OS_OU_list]
filename = gc_OS_OU_list.csv
