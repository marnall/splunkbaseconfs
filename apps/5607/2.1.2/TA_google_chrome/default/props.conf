[google:chrome:json]

KV_MODE=json

FIELDALIAS-client_type-for-chrome-app = client_type ASNEW app
FIELDALIAS-url-for-chrome-dest_url = url ASNEW dest_url
FIELDALIAS-device_id-for-chrome-dvc = device_id ASNEW dvc
FIELDALIAS-device_name-for-chrome-dvc_name = device_name ASNEW dvc_name
FIELDALIAS-content_hash-for-chrome-file_hash = content_hash ASNEW file_hash
FIELDALIAS-content_name-for-chrome-file_name = content_name ASNEW file_name
FIELDALIAS-user_agent-for-chrome-http_user_agent = user_agent ASNEW http_user_agent
FIELDALIAS-content_size-for-chrome-object_size = content_size ASNEW object_size
FIELDALIAS-os_platform-for-chrome-os = os_platform ASNEW os
FIELDALIAS-event-for-chrome-signature = event ASNEW signature
FIELDALIAS-device_name-for-chrome-src_host = device_name ASNEW src_host
FIELDALIAS-device_user-for-chrome-src_user = device_user ASNEW src_user
FIELDALIAS-device_user-for-chrome-src_user_id = device_user ASNEW src_user_id
FIELDALIAS-profile_user-for-chrome-src_user_name = profile_user ASNEW src_user_name
FIELDALIAS-profile_user-for-chrome-user_email = profile_user ASNEW user_email

# eval fields where conflict occurs - blank if no applicable
EVAL-dest = case( event IN ("browserExtensionInstallEvent", "browserCrashEvent", "dangerousDownloadEvent", "CHROME_OS_LOGIN_FAILURE_EVENT", "CHROME_OS_LOGIN_EVENT", "CHROME_OS_LOGOUT_EVENT", "CHROME_OS_ADD_USER", "CHROME_OS_REMOVE_USER", "CHROMEOS_PERIPHERAL_ADDED", "CHROMEOS_PERIPHERAL_REMOVED", "CHROMEOS_PERIPHERAL_STATUS_UPDATED"), device_id, event IN ("passwordReuseEvent", "loginEvent", "contentTransferEvent", "sensitiveDataEvent", "unscannedFileEvent"), url,  event IN ("dataAccessControlEvent"), destination)
EVAL-object = case( event IN ("contentTransferEvent", "sensitiveDataEvent", "unscannedFileEvent", "dataAccessControlEvent"), content_name, event IN ("browserExtensionInstallEvent"), extension_name)
EVAL-object_category = case( event IN ("contentTransferEvent", "sensitiveDataEvent", "unscannedFileEvent",  "dataAccessControlEvent"), content_type, event IN ("browserExtensionInstallEvent"), "extension")
EVAL-object_id = case( event IN ("contentTransferEvent", "sensitiveDataEvent", "unscannedFileEvent"), content_hash, event IN ("browserExtensionInstallEvent"), extension_id)
EVAL-status = case( event IN ("badNavigationEvent"), reason, event IN ("browserExtensionInstallEvent"), result)
EVAL-user = case( event IN ("browserExtensionInstallEvent", "browserCrashEvent", "badNavigationEvent", "dangerousDownloadEvent", "loginEvent", "contentTransferEvent", "sensitiveDataEvent", "unscannedFileEvent"), profile_user, event IN ("passwordReuseEvent", "passwordChangedEvent"), trigger_user, event IN ("CHROME_OS_ADD_USER", "CHROME_OS_REMOVE_USER", "CHROME_OS_CRD_HOST_STARTED", "CHROME_OS_CRD_CLIENT_CONNECTED", "CHROME_OS_CRD_CLIENT_DISCONNECTED", "CHROME_OS_CRD_HOST_ENDED", "dataAccessControlEvent", "CHROMEOS_PERIPHERAL_ADDED", "CHROMEOS_PERIPHERAL_REMOVED", "CHROMEOS_PERIPHERAL_STATUS_UPDATED"), device_user)
EVAL-user_name = case( event IN ("browserExtensionInstallEvent", "contentTransferEvent", "sensitiveDataEvent", "unscannedFileEvent"), profile_user, event IN ("passwordChangedEvent"), trigger_user)
EVAL-action = case( event IN ("browserExtensionInstallEvent", "browserCrashEvent", "badNavigationEvent", "dangerousDownloadEvent", "passwordReuseEvent", "loginEvent"), result, event IN ("contentTransferEvent", "sensitiveDataEvent", "unscannedFileEvent", "CHROME_OS_LOGIN_FAILURE_EVENT", "CHROME_OS_LOGIN_EVENT", "CHROME_OS_LOGOUT_EVENT", "CHROME_OS_ADD_USER", "CHROME_OS_REMOVE_USER", "dataAccessControlEvent"), trigger_type, event IN ("CHROMEOS_PERIPHERAL_ADDED", "CHROMEOS_PERIPHERAL_REMOVED", "CHROMEOS_PERIPHERAL_STATUS_UPDATED", "CHROME_OS_CRD_HOST_STARTED", "CHROME_OS_CRD_CLIENT_CONNECTED", "CHROME_OS_CRD_CLIENT_DISCONNECTED", "CHROME_OS_CRD_HOST_ENDED"), reason, event IN ("passwordChangedEvent"), "updated")
EVAL-category = case( event IN ("badNavigationEvent"), event, event IN ("passwordReuseEvent"), reason, event IN ("dangerousDownloadEvent", "contentTransferEvent", "sensitiveDataEvent", "unscannedFileEvent"), trigger_type)
EVAL-src = case( event IN ("badNavigationEvent", "dangerousDownloadEvent"), device_id, event IN ("passwordReuseEvent", "loginEvent"), device_name, event IN ("browserExtensionInstallEvent"), device_user, event IN ("CHROME_OS_LOGIN_FAILURE_EVENT", "CHROME_OS_LOGIN_EVENT", "CHROME_OS_LOGOUT_EVENT", "CHROME_OS_ADD_USER", "CHROME_OS_REMOVE_USER"), device_name, event IN ("dataAccessControlEvent"), source)
EVAL-user_id = case( event IN ("browserCrashEvent"), device_user, event IN ("loginEvent", "contentTransferEvent", "sensitiveDataEvent", "unscannedFileEvent"), profile_user, event IN ("passwordReuseEvent"), trigger_user)
EVAL-process_name = case( event IN ("CHROMEOS_PERIPHERAL_ADDED", "CHROMEOS_PERIPHERAL_REMOVED", "CHROMEOS_PERIPHERAL_STATUS_UPDATED"),event, event IN ("browserCrashEvent"), "chrome")
EVAL-change_type = case( event IN ("browserExtensionInstallEvent", "passwordChangedEvent", "CHROME_OS_ADD_USER", "CHROME_OS_REMOVE_USER"), event)
EVAL-reason = case( event IN ("CHROME_OS_LOGIN_FAILURE_EVENT", "CHROME_OS_LOGIN_EVENT", "CHROME_OS_LOGOUT_EVENT"), reason)
EVAL-result = case( event IN ("CHROME_OS_ADD_USER", "CHROME_OS_REMOVE_USER"), reason)
EVAL-object_attrs = case( event IN ("dataAccessControlEvent"), result)
EVAL-vendor_product = case( event IN ("CHROMEOS_PERIPHERAL_ADDED", "CHROMEOS_PERIPHERAL_REMOVED", "CHROMEOS_PERIPHERAL_STATUS_UPDATED"),event_detail_product)
EVAL-dest_ip = case( event IN ("CHROME_OS_CRD_HOST_STARTED", "CHROME_OS_CRD_CLIENT_CONNECTED", "CHROME_OS_CRD_CLIENT_DISCONNECTED", "CHROME_OS_CRD_HOST_ENDED"), event_detail_clientIp)
EVAL-dest_nt_host = case( event IN ("CHROME_OS_CRD_HOST_STARTED", "CHROME_OS_CRD_CLIENT_CONNECTED", "CHROME_OS_CRD_CLIENT_DISCONNECTED", "CHROME_OS_CRD_HOST_ENDED"), device_name)
EVAL-src_ip = case( event IN ("CHROME_OS_CRD_HOST_STARTED", "CHROME_OS_CRD_CLIENT_CONNECTED", "CHROME_OS_CRD_CLIENT_DISCONNECTED", "CHROME_OS_CRD_HOST_ENDED"), event_detail_hostIp)
EVAL-src_nt_host = case( event IN ("CHROME_OS_CRD_HOST_STARTED", "CHROME_OS_CRD_CLIENT_CONNECTED", "CHROME_OS_CRD_CLIENT_DISCONNECTED", "CHROME_OS_CRD_HOST_ENDED"), device_id)
EVAL-signature_id = case( event IN ("CHROME_OS_CRD_HOST_STARTED", "CHROME_OS_CRD_CLIENT_CONNECTED", "CHROME_OS_CRD_CLIENT_DISCONNECTED", "CHROME_OS_CRD_HOST_ENDED"), event_detail_sessionId)




REPORT-extract_fields_from_usb_events = extract_fields_from_usb_events
REPORT-extract_fields_from_crd_events = extract_fields_from_crd_events