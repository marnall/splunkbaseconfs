[splongo:collection]
CHARSET = AUTO
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = true
TIME_FORMAT = \d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}.\d{6}
TZ = UTC
category = Custom
description = JSON-formatted collection events from Mongo DB using Splongo TA
pulldown_type = true
