```\
Loop through each of the 4 Sample Data status files, pulling in the contents.\
If the status lookup is empty, add a new entry, with the Batch_Size from the defaults file.\
If the status lookup is not empty, we retain the Batch_Size from the status lookup file, but reset the Saved_Start and Saved_End.\
```\
| eval file="Asset_CO2e_and_kW_Backfill,Asset_CO2e_and_kW_Forward_Fill,Electricity_CO2e_per_kWh_Backfill,Electricity_CO2e_per_kWh_Forward_Fill"\
| makemv delim="," file\
| mvexpand file\
| map search="| inputlookup sample_data_status_$file$.csv\
| append [| inputlookup sample_data_status_Defaults.csv\
| where file=\"$file$\"\
| fields Batch_Size]\
| head 1\
| eval Saved_Start=0, Saved_End=0\
| outputlookup sample_data_status_$file$.csv"

