Loop through each of the 4 Sample Data status files, overwriting the contents with an empty file, thereby disabling sample data generation.\
```\
| eval file="Asset_CO2e_and_kW_Backfill,Asset_CO2e_and_kW_Forward_Fill,Electricity_CO2e_per_kWh_Backfill,Electricity_CO2e_per_kWh_Forward_Fill"\
| makemv delim="," file\
| mvexpand file\
| map search="| makeresults 1\
| where 0=1\
| outputlookup create_empty=true sample_data_status_$file$.csv\
| append [makeresults count=1\
| fields - _time\
| eval Message=\"Emptied status file sample_data_status_$file$.csv\"]\
"

