```\
If the lookup is empty, sample data generation is disabled.\
When sample data generation is initialized, the lookup will have 0 for Saved_Start and Saved_End.\
In this instance, we reset these values to the start of the current hour, and do nothing else on this run of the search.\
On a subsequent run, when 1 to 2 hours have elapsed, an hour of new data will be generated, starting from the timestamp written to the lookup file on the first run.\
```\
