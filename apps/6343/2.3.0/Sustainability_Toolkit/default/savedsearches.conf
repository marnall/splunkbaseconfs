```\
Loop through each of the 4 Sample Data status files, pulling in the contents.\
If the lookup is empty, sample data generation is disabled, so provide a message to this effect.\
\
```\
| eval file="Asset_CO2e_and_kW_Backfill,Asset_CO2e_and_kW_Forward_Fill,Electricity_CO2e_per_kWh_Backfill,Electricity_CO2e_per_kWh_Forward_Fill"\
| makemv delim="," file\
| mvexpand file\
| map search="| inputlookup sample_data_status_$file$.csv\
| append [| makeresults\
| eval Batch_Size=\"File does not exist, so sample data generation is disabled.\"\
| fields - _time]\
| head 1\
| eval File_Name=\"$file$\""\
| convert timeformat="%Y/%m/%d %T" ctime(Saved_Start) AS "Last Range Processed - Start"\
| convert timeformat="%Y/%m/%d %T" ctime(Saved_End) AS "Last Range Processed - End"\
| fields File_Name, "Last Range Processed - Start", "Last Range Processed - End", Batch_Size

