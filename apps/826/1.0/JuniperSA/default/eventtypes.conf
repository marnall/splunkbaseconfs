[juniper_sa]
search = sourcetype=juniper_sa_log
#tags = network vpn

[juniper_sa_authentication]
search = sourcetype=juniper_sa_log ("Login succeeded" OR "Primary authentication" OR "Logout from" or "Login failed")
#tags = authentication

[juniper_sa_authentication_success]
search = sourcetype=juniper_sa_log "Login succeeded"
#tags = authentication success

[juniper_sa_authentication_failure]
search = sourcetype=juniper_sa_log "Login failed"
#tags = authentication failure

[juniper_sa_modify_policy]
search = sourcetype=juniper_sa_log "modified"
#tags = policy modify
