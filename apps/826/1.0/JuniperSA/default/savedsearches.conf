#### Juniper SA Saved Searches
[Juniper - SA - Connections Over Time - Summary]
action.email.sendresults = 0
action.summary_index = 1
cron_schedule = */59 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = +0s
displayview = flashtimeline
enableSched = 1
request.ui_dispatch_view = flashtimeline
search =  sourcetype=juniper_sa_log | rex "Number of concurrent users logged in to the device:\s(?<users_count>\S+)" | sitimechart sum(users_count) | fields + _time, psrsvd_sm_users_count

