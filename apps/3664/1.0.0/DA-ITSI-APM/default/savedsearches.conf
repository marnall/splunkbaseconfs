#----------------#
#   BASESEARCH   #
#----------------#

[DA-ITSI-APM-Application_Base_Search]
search = tag=application tag=performance tag=apm app_title=*
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-EUEM_Base_Search]
search = tag=euem tag=performance tag=apm app_title=*
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

#------------#
#   ENTITY   #
#------------#

[DA-ITSI-APM-Application_Entity_Search]
description = Application entity discovery search
search = tag=application tag=inventory tag=apm app_title=* | stats latest(app_name) as app_name, latest(availability) as availability, latest(health) as health, latest(vendor) as vendor, latest(account) as account, latest(app_language) as app_language, latest(application_id) as application_id by app_title | eval itsi_role = "apm", description="This is an Application", type = "application"
dispatch.earliest_time = -4h
dispatch.latest_time = now
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-APM_Entity_Search]
description = Search for discovering all entities
search = tag=application tag=inventory tag=apm app_title=* | dedup app_title | eval type="application" | rename app_title as entity_title | fields entity_title type | eval itsi_role = "apm" | table entity_title, type, itsi_role
dispatch.earliest_time = -4h
dispatch.latest_time = now
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

#-----------#
# INVENTORY #
#-----------#

[DA-ITSI-APM-Application_Inventory_Search]
description = Inventory for Application
search = tag=application tag=inventory tag=apm app_title="$app_title$" | stats latest(application_id) as "Application Id", latest(app_name) as "Application Name", latest(availability) as "Availability", latest(health) as "Health", latest(vendor) as "Vendor", latest(account) as "Account", latest(app_language) as "Application Language" by app_title | eval Availability=if('Availability'==0,"No","Yes"), Health=case('Health'==3,"CRITICAL",'Health'==2,"WARNING",'Health'==1,"NORMAL",'Health'==0,"UNKNOWN") | fields - app_title
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

#--------------------------#
# MINICHARTS : APPLICATION #
#--------------------------#

[DA-ITSI-APM-Context_Chart_Application_Event_Search]
search = tag=application tag=apm app_title="$app_title$" | timechart count | eventstats sum(count) as _total | eval _total = tostring(_total, "commas")." events"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Context_Chart_Application_Response_Time_Search]
search = tag=application tag=performance tag=apm app_title="$app_title$" response_time=* | timechart avg(response_time) as response_time | eventstats avg(response_time) as average | eventstats min(response_time) as minimum | eventstats max(response_time) as maximum | eval _stats = "Range: ".round(minimum, 1)." - ".round(maximum, 1)." ms, "."Average: ".round(average, 1)." ms" | fields - average, minimum, maximum
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search


#--------------------------#
# DASHBOARD : APPLICATION  #
#--------------------------#

[DA-ITSI-APM-Application_Apdex_Score_Line_Chart_Search]
description = Search for Application Apdex Score Line Chart
search = tag=application tag=performance tag=apm app_title="$app_title$" apdex_score=* | timechart latest(apdex_score) as "Apdex Score"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Apdex_Score_Guage_Chart_Search]
description = Search for Application Apdex Score Guage Chart
search = tag=application tag=performance tag=apm app_title="$app_title$" apdex_score=* | stats latest(apdex_score) as "Apdex Score" by app_title | fields + "Apdex Score"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Availability_Chart_Search]
description = Search for Application Availability Chart
search = tag=application tag=performance tag=apm app_title="$app_title$" availability=* | timechart latest(availability) as Available | eval Unavailable=if(Available==0,1,null)
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Health_Chart_Search]
description = Search for Application Health Chart
search = tag=application tag=inventory tag=apm app_title="$app_title$" health=* | timechart latest(health) as health | eval Unknown = if(health==0,1,0), Normal = if(health==1,1,0), Warning = if(health==2,1,0), Critical = if(health==3,1,0) | fields - health
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Application_Transaction_Table_Search]
description = Search for Application Transaction Table
search = tag=transaction tag=performance tag=apm app_title="$app_title$" response_time=* transaction_name=* | stats latest(response_time) as "Response Time (ms)" by transaction_name | rename transaction_name as "Transaction Name" | sort - "Response Time (ms)" | head $records$
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Application_Error_Table_Search]
description = Search for Application Error Table
search = tag=application tag=performance tag=apm app_title="$app_title$" error_message=* $searchbox$ | eval "Event Time"=strftime(event_time/1000,"%F %T") | fields error_message, "Event Time", error_type, severity | sort - Time | rename error_message as "Error Message", error_type as "Error Type", severity as "Severity"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Response_Time_Chart_Search]
description = Search for Application Response Time Chart
search = tag=application tag=performance tag=apm app_title="$app_title$" response_time=* | timechart latest(response_time) as "Response Time (ms)"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Requests_Per_Minute_Chart_Search]
description = Search for Application Requests per minute Chart
search = tag=application tag=performance tag=apm app_title="$app_title$" thruput=* | timechart latest(thruput) as "Throughput (rpm)"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Error_Rate_Chart_Search]
description = Search for Application Error Rate Chart
search = tag=application tag=performance tag=apm app_title="$app_title$" error_rate=* | timechart latest(error_rate) as "Error Rate (%)"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_CPU_Usage_Search]
description = Search for Application CPU Usage Chart
search = tag=application tag=performance tag=apm app_title="$app_title$" cpu_load_percent=* | timechart latest(cpu_load_percent) as "CPU Usage(%)"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Memory_Usage_Percent_Search]
description = Search for Application Memory Usage Percentage Chart
search = tag=application tag=performance tag=apm app_title="$app_title$" memory_usage_percent=* | timechart latest(memory_usage_percent) as "Memory Usage(%)"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_End_User_Apdex_Score_Line_Chart_Search]
description = Search for End User Apdex Score Line Chart
search = tag=euem tag=performance tag=apm app_title="$app_title$" eum_apdex_score=* | timechart latest(eum_apdex_score) as "Apdex Score"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_End_User_Apdex_Score_Guage_Chart_Search]
description = Search for End User Apdex Score Guage Chart
search = tag=euem tag=performance tag=apm app_title="$app_title$" eum_apdex_score=* | stats latest(eum_apdex_score) as "Apdex Score" by app_title | fields + "Apdex Score"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_End_User_Response_Time_Chart_Search]
description = Search for End User Response Time Chart
search = tag=euem tag=performance tag=apm app_title="$app_title$" eum_response_time=* | timechart latest(eum_response_time) as "Response Time (ms)"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_End_User_Requests_Per_Minute_Chart_Search]
description = Search for End User Requests per minute Chart
search = tag=euem tag=performance tag=apm app_title="$app_title$" eum_thruput=* | timechart latest(eum_thruput) as "Throughput (rpm)"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Response_Time_End_User_Response_Time_Chart_Search]
description = Search for Application and End User Response Time Chart
search = (tag=application OR tag=euem) tag=performance tag=apm app_title="$app_title$" (response_time=* OR eum_response_time=*) | timechart latest(response_time) as "Application Response Time (ms)" latest(eum_response_time) as "End User Response Time (ms)"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Response_Time_And_Requests_Per_Minute_Chart_Search]
description = Search for Application Response Time and Requests per minute Chart
search = tag=application tag=performance tag=apm app_title="$app_title$" response_time=* thruput=* | timechart latest(response_time) as "Response Time (ms)" latest(thruput) as "Throughput (rpm)"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_End_User_Response_Time_And_End_User_Requests_Per_Minute_Chart_Search]
description = Search for Application End User Response Time and End User Requests per minute Chart
search = tag=euem tag=performance tag=apm app_title="$app_title$" eum_response_time=* eum_thruput=* | timechart latest(eum_response_time) as "Response Time (ms)"  latest(eum_thruput) as "Throughput (rpm)"
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Response_Time_Histogram_Search]
description = Search for Application Response Time Histogram Chart
search = tag=application tag=performance tag=apm app_title="$app_title$" response_time=* | eval response_time=round(tonumber(response_time),0) | bucket response_time span=20 | rex field=response_time "(?<lowerlimit>\d+)-(?<upperlimit>\d+)" | eval response_time=if(lowerlimit>=100, ">100", response_time) | sort lowerlimit| timechart useother=f count by response_time
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_End_User_Response_Time_Histogram_Search]
description = Search for Application End User Response Time Histogram Chart
search = tag=euem tag=performance tag=apm app_title="$app_title$" eum_response_time=* | eval eum_response_time=round(tonumber(eum_response_time),0) | bucket eum_response_time span=20 | rex field=eum_response_time "(?<lowerlimit>\d+)-(?<upperlimit>\d+)" | eval eum_response_time=if(lowerlimit>=100, ">100", eum_response_time) | sort lowerlimit| timechart useother=f count by eum_response_time | fields - NULL
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-APM-Application_Events_Search]
description = Search for Application Events
search = tag=apm app_title="$app_title$" $searchbox$
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search