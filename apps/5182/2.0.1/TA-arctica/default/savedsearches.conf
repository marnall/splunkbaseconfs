[Arctica - Software Audit]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 0 4 * * *
dispatch.earliest_time = -1d@d
dispatch.latest_time = @d-1s
display.events.fields = ["host","source","sourcetype","foraJornada","linecount","Username","index","DEPARTAMENTO","devicesMetrics.DEPARTAMENTO","CARGO"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.custom.type = network-diagram-viz.network-diagram-viz
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = TA-arctica
request.ui_dispatch_view = search
search = `ArcticaIndex` sourcetype="Arctica::HomeOffice::InstalledPrograms" earliest=-2d@d\
\
| spath path="Programs{}" output=Programa\
\
| table _time Hostname Programa\
| mvexpand Programa \
| spath input=Programa\
\
| stats count by Hostname DisplayName Publisher InstalledDate\
| eval DataFormat1=strptime(InstalledDate, "%Y%m%d"),\
       DataFormat2=strptime(InstalledDate, "%m/%d/%Y"),\
       DataFormat3=strptime(InstalledDate, "%Y-%m-%d %H:%M:%S"), \
       InstalledDate=round(coalesce(coalesce(DataFormat1,DataFormat2), DataFormat3))\
 \
| fillnull value="--" InstalledDate\
| table Hostname Publisher DisplayName InstalledDate\
| rex field=Publisher "(?<vendorRef>\w+)" | eval vendorRef=ltrim(lower(vendorRef))\
\
| join type=left vendorRef [search `ArcticaIndex` sourcetype="Arctica::HomeOffice::Process" Hostname="*" \
| spath path="Process{}" output=Process\
| table _time Username Hostname Process\
| mvexpand Process\
| spath input=Process | fields - Process\
\
| stats max(_time) as LastUsed values(CommandLine) as CommandLine  by  Username Hostname Name \
| eval CommandLine=lower(CommandLine), executavel=lower(Name).".exe"\
\
| rex mode=sed field=Name "s/#\d+//g"\
| rex mode=sed field=executavel "s/#\d+//g"\
| rex field=CommandLine "(?<Path>^.*?\.exe)"\
| rex mode=sed field=Path "s/\"//g"\
\
| fields - CommandLine Username\
\
| lookup softwareClassification.csv  executavel OUTPUT programa vendor vendorRef\
| eval programa=mvdedup(programa), vendor=mvdedup(vendor), vendorRef=mvdedup(vendorRef)]\
\
| join Hostname type=left [search `ArcticaIndexSummary`\
| bin span=1d _time\
| fillnull\
| stats values(Username) as Username  by Hostname DEPARTAMENTO]\
| eval _time=relative_time(now(), "@d")\
| collect index=arctica_audit_software sourcetype="Arctica_Audit_Software"

[Arctica - Software Audit V2]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 56 8 * * *
dispatch.earliest_time = 0
dispatch.latest_time = @d-1s
display.events.fields = ["host","source","sourcetype","foraJornada","linecount","Username","index","DEPARTAMENTO","devicesMetrics.DEPARTAMENTO","CARGO"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.custom.type = network-diagram-viz.network-diagram-viz
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = TA-arctica
request.ui_dispatch_view = search
search = `ArcticaIndex` sourcetype="Arctica::HomeOffice::Process" Hostname="*" earliest=0 \
| spath path="Process{}" output=Process\
| table _time  Hostname Process \
| mvexpand Process\
| spath input=Process | fields - Process\
| rex mode=sed field=Name "s/#\d+$//g"\
| search Name!="_Total" Name!="cui"\
| stats max(_time) as LastUsed values(SessionName) as SessionName by Hostname Name\
| eval processName=lower(Name)\
| lookup new_process_name.csv processName as Name OUTPUT reference as DisplayName\
| lookup mapeamentoSoftwares displayName as DisplayName OUTPUT price money group licensed\
| search licensed=S\
| eval tipo="Executado"\
\
| append [search `ArcticaIndex` sourcetype="Arctica::HomeOffice::InstalledPrograms" earliest=-2d@d\
\
| spath path="Programs{}" output=Programa\
\
| table _time Hostname Programa\
| mvexpand Programa \
| spath input=Programa\
\
| stats count by Hostname DisplayName Publisher InstalledDate\
| eval DataFormat1=strptime(InstalledDate, "%Y%m%d"),\
       DataFormat2=strptime(InstalledDate, "%m/%d/%Y"),\
       DataFormat3=strptime(InstalledDate, "%Y-%m-%d %H:%M:%S"), \
       InstalledDate=round(coalesce(coalesce(DataFormat1,DataFormat2), DataFormat3))\
 \
| fillnull value="--" InstalledDate\
| table Hostname Publisher DisplayName InstalledDate\
| rex field=Publisher "(?<vendorRef>\w+)" | eval vendorRef=ltrim(lower(vendorRef))\
| table Hostname DisplayName InstalledDate\
| eval tipo="instalado"\
| lookup mapeamentoSoftwares displayName as DisplayName OUTPUT  licensed\
| search licensed=S ]\
\
| stats min(InstalledDate) as InstalledDate \
        max(LastUsed) as LastUsed \
        values(processName) as ProcessName \
        values(tipo) as tipo \
        values(money) as money\
        max(price) as price\
        values(group) as group\
        values(SessionName) as SessionName\
        values(licensed) as licensed \
    by  DisplayName Hostname\
| eval referenceDate=coalesce(LastUsed,InstalledDate)\
| collect index=arctica_audit_software sourcetype="Arctica_Audit_Software_new"

