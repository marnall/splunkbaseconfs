[default]
[Arctica - Produtividade]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h@h
dispatch.latest_time = @h
display.events.fields = ["host","source","sourcetype","st","index","Username"]
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = pie
display.visualizations.custom.type = punchcard_app.punchcard
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = arcticaHomeOffice
request.ui_dispatch_view = search
search = `ArcticaIndex` sourcetype="Arctica::HomeOffice::UserActivity"  earliest=-1h@h latest=@h\
\
| fillnull\
| `ArcticaProgramsApplicationRunning`\
\
| rex mode=sed field=Programa "s/\W+/_/g" \
| eval SubSeconds=if(SubSeconds>60,60,SubSeconds)\
| stats sum(SubSeconds) as Minutos \
        min(_time) as Inicio\
        max(_time) as Termino\
by Programa Username Hostname\
\
\
| lookup employee LOGIN as Username OUTPUT DEPARTAMENTO as DEP NOME\
| fillnull value="--"\
\
| `GetDepartamento` \
| rename DEPARTAMENTO as hierarquia\
| `hierarquia(hierarquia)`\
\
\
| eval N0="PRESIDENCIA"\
| table _time Username Hostname NOME DEPARTAMENTO Programa Minutos Inicio Termino  N0 N1 N2 N3 N4 N5\
\
| eval Segundos=Minutos\
| eval Minutos=tostring(Minutos, "duration"), _time=relative_time(Termino,"@h+1h+2m")\
\
| eval _time=relative_time(Termino,"@h+1h+2m"), controle="method_2"\
| collect index=produtividade sourcetype=xOne_programa
disabled = 1

[Arctica - Produtividade Crypto]
action.email.show_password = 1
action.email.useNSSubject = 1
action.summary_index._name = produtividade
action.summary_index._type = event
action.summary_index.sourcetype = xOne_Produtividade
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = * * * * *
description = Sumarização Cryptografada
dispatch.earliest_time = -2m@m
dispatch.latest_time = -1m@m
display.events.fields = ["host","source","sourcetype","st","index","Username"]
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = pie
display.visualizations.custom.type = punchcard_app.punchcard
display.visualizations.show = 0
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = arcticaHomeOffice
request.ui_dispatch_view = search
schedule_priority = highest
search = index=homeoffice (sourcetype="Arctica::HomeOffice::UserActivity" OR sourcetype="Arctica::HomeOffice::UserKeyboardMouseActivity") \
| bin span=1m _time \
| spath path="Applications{}" output=Applications\
| mvexpand Applications\
| rename DisplayName as NOME\
| table _time  sourcetype Username Hostname Applications SubTitle Versao KeyboardActivityCount MouseActivityCount NOME\
\
| stats dc(sourcetype) as isCorrelation \
        sum(KeyboardActivityCount) as KeyboardActivityCount \
        sum(MouseActivityCount) as MouseActivityCount \
        values(Applications) as Applications\
by _time Username NOME Hostname Versao\
| eval isCorrelation=if(isCorrelation>1, 1,0)\
| where isCorrelation>0\
\
| mvexpand Applications | search Applications!=""\
\
| rex field=Applications "Title\":\[(?<SubTitle>[^\]]+)"\
| spath input=Applications | fields - Applications Title{}*\
| rename Seconds as fullSeconds\
| rex mode=sed field=SubTitle "s/\},\{/}###{/g" \
| eval SubTitle=split(SubTitle,"###") | mvexpand SubTitle\
| spath input=SubTitle\
| fields - SubTitle\
| eval Title=if(Title="", "--", Title),\
       Url=if(Url="" OR Url="undefined" OR Url="null" , "--", Url)\
 \
| rex field=Url "(^http[s]{0,1}\:\/\/|^)(?<Dominio>[^\/]+).*$"\
\
\
| eval ProcessDescription=if(ProcessDescription="null", "", ProcessDescription), \
       ProcessDescription=if(ProcessDescription="", ProcessName, ProcessDescription),\
       Programa=coalesce(ProcessDescription,ProcessName)\
\
| eval Username=lower(Username) \
| lookup employee LOGIN as Username OUTPUT DEPARTAMENTO as DEP\
| fillnull value="--" DEP\
\
| `GetDepartamento` \
| rename DEPARTAMENTO as hierarquia\
| `hierarquia(hierarquia)`\
| table _time Username Hostname NOME DEPARTAMENTO Programa LOGINGESTOR  N0 N1 N2 N3 N4  PID ProcessDescription ProcessName fullSeconds Seconds Title Dominio Url Versao KeyboardActivityCount MouseActivityCount \
\
| lookup Meeting Programa OUTPUT controle as Meeting\
| fillnull Meeting\
\
| eval IHM=if(tonumber(KeyboardActivityCount+MouseActivityCount+Meeting)>1,1,0)\
| `ArcticaAdereciaJornanda("_time")`\
\
| rex mode=sed field=Title "s/=/:/g"\
\
\
| lookup ProgramasCorporativos Programa as Programa Departamento as DEPARTAMENTO OUTPUT isCorporate as isCorporateProgram\
| fillnull value=0 isCorporateProgram\
\
| lookup  LinkCorporativo  Url as Dominio Departamento as  DEPARTAMENTO OUTPUT isCorporate as isCorporateLink\
| fillnull value=0 isCorporateLink\
\
\
| fillnull value="--" Username Hostname NOME DEPARTAMENTO isCorporateProgram Programa LOGINGESTOR  N0 N1 N2 N3 N4  PID ProcessDescription ProcessName  Seconds Title Url Dominio isCorporateLink Versao IHM KeyboardActivityCount MouseActivityCount horaInicio horaFim foraJornada Meeting\
\
| eval Username=lower(Username) \
| lookup cargos.csv LOGIN as Username OUTPUT NOMECRGP as CARGO\
| fillnull "Desconhecido" CARGO\
\
| table _time Username CARGO Hostname NOME DEPARTAMENTO isCorporateProgram Programa LOGINGESTOR  N0 N1 N2 N3 N4  PID ProcessDescription ProcessName  Seconds  Title Url Dominio isCorporateLink Versao IHM KeyboardActivityCount MouseActivityCount horaInicio horaFim foraJornada Meeting intervalo\
\
| rename Username as Username_crypto NOME as NOME_crypto\
| eval Username=md5(Username_crypto), NOME=md5(NOME_crypto)\
\
 \
| crypt mode=e algorithm=rsa key=Itau Username_crypto NOME_crypto\
| collect index=produtividade_crypto sourcetype=xOne_Produtividade

