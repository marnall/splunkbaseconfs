 \
| spath input=Process | fields - Process\
| where IDProcess!=0 \
\
| eval SessionName=if(isnull(SessionName) OR SessionName="", "system", SessionName)\
| eval Process=Name | rex field=Process mode=sed "s/#\d+//g"\
| fields - *{}* _raw Guid\
\
| eval PercentUserTime=round(PercentUserTime/NumberOfLogicalProcessors,3) \
\
| eval Prefix="xOne.Process."\
| table _time Hostname Versao FQDN Domain Name Process SessionName Prefix  HandleCount IDProcess IODataBytesPerSec IODataOperationsPerSec IOOtherBytesPerSec IOOtherOperationsPerSec IOReadOperationsPerSec IOWriteBytesPerSec IOWriteOperationsPerSec NumberOfCores NumberOfLogicalProcessors PageFaultsPerSec PageFileBytes PageFileBytesPeak PercentPrivilegedTime PercentProcessorTime PercentUserTime PoolNonpagedBytes PoolPagedBytes PriorityBase PrivateBytes SessionId ThreadCount VirtualBytes VirtualBytesPeak WorkingSet WorkingSetPeak WorkingSetPrivate\
\
| mcollect index=xOnePerformance split=t prefix_field=Prefix Hostname Versao FQDN Domain Name Process SessionName NumberOfLogicalProcessors IDProcess NumberOfCores
