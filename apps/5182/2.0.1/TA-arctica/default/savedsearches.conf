| eval ActivityFit=if(activity>0, _time,Inicio)   \
| eval Username=upper(Username)  \
| eventstats min(ActivityFit) as Inicio by Username\
| `ArcticaCalcProdutividadeUser`\
| `ArcticaConvertTime(windows)` | rename ConvertTime as windows\
| `ArcticaConvertTime(TrabalhoControle)` | rename ConvertTime as TrabalhoControle\
\
| eval expectedHours=expectedHours/60/60\
| convert ctime(Inicio) ctime(Termino) timeformat="%d/%m/%Y %H:%M:%S" \
\
\
| lookup  AderenciaDepartamento DEPARTAMENTO OUTPUT ADERENCIA\
| fillnull value=86 ADERENCIA\
\
| eval ProdutividadeAferida=if(expectedHours=0, 100, round((Produtividade*100/ADERENCIA),2))\
 \
| appendpipe [stats count | where count=0\
| eval Inicio="--",\
       Hostname="--",\
       expectedHours="--",\
       TrabalhoControle="--",\
       ProdutividadeAferida="--",\
       ADERENCIA="--",\
       _time=now()\
       | fields - count \
]\
\
| fields - sparkline\
\
| where ProdutividadeAferida<100\
\
| eval Title="Alerta de Aderência a Tecnologia para o usuário " . Username,\
      MSG="Alerta de Aderência - O Usuário " . Username . " Aferiu uma produtividade de ". ProdutividadeAferida . "%, Onde o esperado é " .ADERENCIA ."%."\
      \
\
| collect index=arcticaalert sourcetype=xOne_Alert marker="Tipo=xOne - Alarme de produtividade semanal por Usuarios"

