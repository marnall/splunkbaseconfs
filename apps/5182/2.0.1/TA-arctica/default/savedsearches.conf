| eval sessionName = mvdedup(sessionName),\
       time = _time\
| fields _time time Hostname processName sessionName\
| mvexpand processName\
| eval processName = lower(processName)\
| rex mode=sed field=processName "s/\#\d+$//g" \
| bin span=1h _time\
| stats latest(time) as lastUsed by _time Hostname processName sessionName\
| lookup process_software commaSep as processName OUTPUT processName as softwareName\
| eval softwareName = coalesce(mvjoin(mvdedup(softwareName), ", "), "-")

