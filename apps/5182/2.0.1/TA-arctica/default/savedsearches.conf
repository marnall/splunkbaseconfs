[xone hardware Sumarização processo]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */10 * * * *
dispatch.earliest_time = -10m@m
dispatch.latest_time = @m
display.events.fields = ["host","source","sourcetype","foraJornada","linecount","Username","index","DEPARTAMENTO","devicesMetrics.DEPARTAMENTO","CARGO","Username_crypto"]
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.custom.type = network-diagram-viz.network-diagram-viz
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = TA-arctica
request.ui_dispatch_view = search
search = `ArcticaIndex` sourcetype="Arctica::HomeOffice::Process"   Hostname="*"\
| spath path="Process{}" output=Process\
| mvexpand Process\
| table _time Hostname Name IDProcess Process NumberOfLogicalProcessors\
\
| spath input=Process | fields - Process\
| where Name!="_Total" AND Name!="Idle"\
\
| rex field=Name mode=sed "s/#\d+//g"\
| eval UserProcessor=(PercentUserTime/NumberOfLogicalProcessors)\
| eval Name=lower(Name)\
\
\
\
| join type=left Hostname [search index=homeoffice  sourcetype="Arctica::HomeOffice::HardwareInfo" Hostname="*" | dedup Hostname\
| stats sum(PhisicalMemory{}.Capacity) as Memoria by  Hostname Processor.Name]\
\
\
\
| stats values(Hostname) as Total_Users  \
        avg(eval(PrivateBytes/1024/1024)) as MemoryUsada \
        perc99(UserProcessor) as UserProcessor\
        max(Memoria) as Memoria\
         \
\
\
by Name NumberOfLogicalProcessors Processor.Name \
\
\
| search Name="$ProcessName$"\
\
\
| lookup new_process_name.csv processName as Name OUTPUT reference as softwareName\
\
\
\
| eval "TotalMemoriaGB"=round(Memoria/1024/1024/1024)\
\
| rename NumberOfLogicalProcessors as "TotalProcessadores" \
         Processor.Name as "ModeloProcessador" \
         softwareName as "NomePrograma" \
         Name as "NomeProcesso"\
         UserProcessor as "CPU_Utilizado_perc99"\
         MemoryUsada as "MemoriaUtilizada"\
         Total_Users as "QtdUsuários"\
         \
\
| table "NomePrograma" "NomeProcesso" "TotalProcessadores"   "TotalMemoriaGB"  "QtdUsuários"  "ModeloProcessador" "CPU_Utilizado_perc99" "MemoriaUtilizada"\
\
| collect index=xonehardware sourcetype="Consumo hardware por Processo"

