[bvlogs]
TRANSFORMS-changesourcetype = trans_bvhealth, trans_bvperf, trans_bvcontent, trans_bvevents, trans_bvstatus
TRANSFORMS-changehostname = trans_hostname
SHOULD_LINEMERGE = false
DATETIME_CONFIG = 
NO_BINARY_CHECK = true
category = BluVector
pulldown_type = 1

[bvperf]
NO_BINARY_CHECK = true
KV_MODE = json
INDEXED_EXTRACTIONS = json
SHOULD_LINEMERGE = false
LINEBREAKER = ([\r\n]+)
category = BluVector
description = JSON for BluVector performance metrics
disabled = false
pulldown_type = 1
LEARN_MODEL = 1

[bvhealth]
NO_BINARY_CHECK = true
KV_MODE = json
INDEXED_EXTRACTIONS = json
SHOULD_LINEMERGE = false
LINEBREAKER = ([\r\n]+)
category = BluVector
description = JSON for health status of BluVector appliances
disabled = false
pulldown_type = 1
LEARN_MODEL = 1

[bvcontent]
CHECK_FOR_HEADER = false
KV_MODE = auto
NO_BINARY_CHECK = true
category = BluVector
description = Key/value log type for tracking content statistics of BluVector. (/var/log/metrics/content_hourly.log)
disabled = false
pulldown_type = 1
LEARN_MODEL = 1

[bvstatus]
CHECK_FOR_HEADER = false
KV_MODE = auto
MAX_TIMESTAMP_LOOKAHEAD = 220
NO_BINARY_CHECK = true
category = BluVector
description = Key/value log type for tracking status changes of content from BluVector. (/var/log/metrics/status_changes.log)
disabled = false
pulldown_type = true
LEARN_MODEL = 1

[bvevents]
CHECK_FOR_HEADER = false
KV_MODE = auto
NO_BINARY_CHECK = true
category = BluVector
description = Key/value log type for tracking events statistics of BluVector. (/var/log/metrics/events_hourly.log)
disabled = false
pulldown_type = 1
LEARN_MODEL = 1
