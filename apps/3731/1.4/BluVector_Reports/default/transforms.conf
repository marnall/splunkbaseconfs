[trans_bvhealth]
REGEX = bv_health
FORMAT = sourcetype::bvhealth
DEST_KEY = MetaData:Sourcetype

[trans_bvperf]
REGEX = bv_performance
FORMAT = sourcetype::bvperf
DEST_KEY = MetaData:Sourcetype

[trans_bvcontent]
REGEX = content_hourly\.log
FORMAT = sourcetype::bvcontent
DEST_KEY = MetaData:Sourcetype

[trans_bvevents]
REGEX = events_hourly.log
FORMAT = sourcetype::bvevents
DEST_KEY = MetaData:Sourcetype

[trans_bvstatus]
REGEX = status_changes.log
FORMAT = sourcetype::bvstatus
DEST_KEY = MetaData:Sourcetype

[trans_hostname]
REGEX = bvhost\:\:([^\s]*)
DEST_KEY = MetaData:Host
FORMAT = host::$1
