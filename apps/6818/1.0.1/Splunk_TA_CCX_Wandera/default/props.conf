[jamf:wandera:hec]
KV_MODE = none
INDEXED_EXTRACTIONS = json
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
category = Structured
description = CCX Jamf Wandera Custom
disabled = false
pulldown_type = true
TRUNCATE = 50000

###############################################################################################################################
# Jamf Wandera - Threat Events Stream (documentation)                                                                         #
# Event Types  - https://learn.jamf.com/en-US/bundle/jamf-security-documentation/page/Threat_Events_Stream_Event_Types.html   #
# Fields       - https://learn.jamf.com/bundle/jamf-security-documentation/page/Threat_Events_Stream_Data_Dictionary.html     #
# Severity     - https://resources.jamf.com/documents/products/security-disclosure-notice-jamf-pro-10.15.1.pdf                #
###############################################################################################################################
FIELDALIAS-ccx_vendor_severity = severity AS vendor_severity
FIELDALIAS-ccx_vendor_severity_id = severity AS severity_id
FIELDALIAS-ccx_vendor_action = action AS vendor_action

EVAL-action = case(action="Detected","allowed", action="Blocked","blocked", action="Resolved","allowed")
EVAL-severity = if(isnotnull('severity_id'),case(severity_id=2,"low",(severity_id>=4 AND severity_id<=6),"medium",severity_id=8,"high",severity_id=10,"critical"),null())
EVAL-dest = if(isnotnull('destination.ip') AND NOT 'destination.ip'="null",'destination.ip',null())
EVAL-dest_ip = if(isnotnull('destination.ip') AND NOT 'destination.ip'="null",'destination.ip',null())
EVAL-dest_port = if(isnotnull('destination.port') AND NOT 'destination.port'="null",'destination.port',null())
EVAL-src = if(isnotnull('source.ip') AND NOT 'source.ip'="null",'source.ip',null())
EVAL-src_ip = if(isnotnull('source.ip') AND NOT 'source.ip'="null",'source.ip',null())
EVAL-src_port = if(isnotnull('source.port') AND NOT 'source.port'="null",'source.port',null())
EVAL-os = if(isnotnull('device.os') AND NOT 'device.os'="null",replace('device.os',"\s.*",""),null())
EVAL-url = if(((isnotnull('destination.name') AND NOT 'destination.name'="null") AND (isnotnull('destination.port') AND NOT 'destination.port'="null")),case('destination.port'="80","http://".tostring('destination.name'),'destination.port'="443","https://".tostring('destination.name')),if(((isnotnull('destination.name') AND NOT 'destination.name'="null") AND (isnull('destination.port') OR 'destination.port'="null")),'destination.name',null()))
EVAL-url_domain = if(isnotnull('destination.name') AND NOT 'destination.name'="null",'destination.name',null())
EVAL-signature = 'eventType.name'
EVAL-signature_id = 'eventType.id'
EVAL-user = 'user.email'
EVAL-vendor = 'metadata.vendor'
EVAL-vendor_product = "Jamf Wandera"
EVAL-date = 'timestamp'
EVAL-file_name = if(((isnotnull('app.sha1') AND NOT 'app.sha1'="null") OR (isnotnull('app.sha256') AND NOT 'app.sha256'="null") AND (isnotnull('app.name') AND NOT 'app.name'="null")),"App:".tostring(replace('app.name'," ","")),null())
EVAL-file_hash = if(((isnotnull('app.sha1') AND NOT 'app.sha1'="null") OR (isnotnull('app.sha256') AND NOT 'app.sha256'="null")),mvappend('app.sha1','app.sha256'),null())
EVAL-description = tostring('device.deviceName')." - ".tostring('eventType.description')
EVAL-body = tostring('device.deviceName')." - ".tostring('eventType.description')
EVAL-vendor_account = 'account.parentId'
EVAL-version = if(isnotnull('device.os') AND NOT 'device.os'="null",replace('device.os',".*\s",""),null())
EVAL-app = if(isnotnull('eventType.id') AND 'eventType.id' IN("102","103","104","105","203","204","205","206","207","208","209","210","211","212","213","214","215","216","217","304"),"Wandera:".tostring('metadata.product'),if(isnotnull('destination.port') AND NOT 'destination.port'="null",case('destination.port'="80","http",'destination.port'="443","https"),null()))
EVAL-protocol = if(isnotnull('destination.port') AND NOT 'destination.port'="null",case('destination.port'="80","http",'destination.port'="443","https"),null())

LOOKUP-ccx_dataset_name_wandera = ccx_dataset_name_wandera eventId AS signature_id OUTPUTNEW dataset_name category type ids_type