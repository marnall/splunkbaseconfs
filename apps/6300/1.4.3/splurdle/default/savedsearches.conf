[Create word list from json]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
description = The data must be uploaded to a words index that is not configured by the App.  Replace the  number for each word length.
search = index="words" source="10-letter-words.json" \
| sort limit=0 + word\
| eval word_length=len(word) \
| streamstats count by word_length \
| rename count AS position\
| table position word word_length\
| outputlookup words_10.csv
