[mi_cds]
SHOULD_LINEMERGE = false

[(?::){0}mint:*]
DATETIME_CONFIG = NONE
EVAL-appEnvironment = if(isnull(appEnvironment),"Release", appEnvironment)
EVAL-application_id = if(isnull(application_id), if(isnull(platform),"missing", platform).".".if(isnull(packageName),"missing", packageName).".".if(isnull(appEnvironment),"missing", appEnvironment), application_id)
FIELDALIAS-app_version_name = appVersionName AS app_version_name
FIELDALIAS-app_environment = appEnvironment AS app_environment
FIELDALIAS-os_version = osVersion AS os_version
FIELDALIAS-package_name = packageName AS package_name
FIELDALIAS-user_identifier = userIdentifier AS user_identifier
FIELDALIAS-remote_ip = remoteIP AS remote_ip
FIELDALIAS-load_time = loadTime AS load_time
FIELDALIAS-domain_lookup_time = domainLookupTime AS domain_lookup_time
FIELDALIAS-dom_processing_time = domProcessingTime AS dom_processing_time
FIELDALIAS-server_time = serverTime AS server_time
FIELDALIAS-response_length = responseLength AS response_length
FIELDALIAS-status_code = statusCode AS status_code
