[New BHE Finding Observed]
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 8 * * *
description = Scheduled daily to trigger when finding with a first_seen timestamp within the past 1 day is ingested.
disabled = 1
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.events.fields = ["source_ip","status","action","Non Tier Zero Principal","domain_name","Tier Zero Principal","tier_zero_principal","non_tier_zero_principal","DC","OU","data_type","name","timestamp"]
display.page.search.mode = verbose
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `bhe_index` data_type=finding_export |eventstats max(_time) as maxtime | where _time = maxtime | eval firstseen_epoch = strptime('first_seen', "%Y-%m-%d %H:%S")| where firstseen_epoch >= relative_time(now(), "-1d@d")
