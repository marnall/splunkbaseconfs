
[Exposure increase]
alert.digest_mode = 0
alert.expires = 7d
alert.severity = 4
alert.suppress = 0
alert.track = 1
alert_condition = search percent_difference > 5
counttype = custom
cron_schedule = 0 9 * * 4
description = The exposure for a domain has increased by more than 5% over the past 7 days.
disabled = 1
dispatch.earliest_time = -1w
dispatch.latest_time = now
display.events.fields = ["domain_name","path_title","severity","exposure","finding_count","principal_count"]
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = area
enableSched = 1
request.ui_dispatch_app = bhe-splunk-app
request.ui_dispatch_view = search
search = `bhe_index` data_type="posture"\
| stats min(exposure) as min_exposure latest(exposure) as current_exposure by domain_name\
| eval percent_difference=((current_exposure - min_exposure) / min_exposure)*100


