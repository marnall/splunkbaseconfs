[sophos_xg_content_filtering]
search = sourcetype=sophos:xg:syslog log_type="Content Filtering"

[sophos_xg_firewall]
search = sourcetype=sophos:xg:syslog log_type="Firewall"

[sophos_xg_firewall_start]
search = sourcetype=sophos:xg:syslog  log_type="Firewall" connevent="Start"

[sophos_xg_firewall_end]
search = sourcetype=sophos:xg:syslog log_type="Firewall" connevent="Stop"

[sophos_xg_device_authentication_login_success]
search = sourcetype=sophos:xg:syslog log_type=Event log_subtype=Admin message="*logged in*"

[sophos_xg_device_authentication_failed]
search = sourcetype=sophos:xg:syslog log_subtype="Admin" status="Failed" message="*failed to login*"

[sophos_xg_malware_detected]
search = sourcetype=sophos:xg:syslog log_subtype=Virus log_type="Anti-Virus"

[sophos_xg_definitions_upgraded]
search = sourcetype=sophos:xg:syslog log_component="Anti-Virus" log_subtype="System" message"*definitions upgraded*"

[sophos_xg_waf]
search = sourcetype="sophos:xg:syslog" log_component="Web Application Firewall" log_type="WAF"

[sophos_xg_ids]
search = (sourcetype=sophos:xg:syslog) log_type=IDP

[sophos_xg_web_proxy]
search = (sourcetype=sophos:xg:syslog) log_component=HTTP
