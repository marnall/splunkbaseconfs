[sophos:xg:syslog]
SHOULD_LINEMERGE = 0
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = timestamp=\"
MAX_TIMESTAMP_LOOKAHEAD = 100
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
TRUNCATE = 999999
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)
EVAL-action = case(log_subtype == "Allowed", "allowed", log_subtype =="Denied", "blocked", log_subtype == "Virus", "blocked", message like "blocked", "blocked", log_subtype ==  "Drop", "blocked", log_subtype == "Detect", "allowed")
EVAL-dest = coalesce(dst_ip,dest_ip)
EVAL-severity = case(priority == "Critical", "critical", priority == "High", "high", priority == "Medium", "medium", priority == "Low", "low", priority == "Information", "information", rule_priority == "Critical", "critical", rule_priority == "Major", "high", rule_priority == "Minor", "minor", rule_priority == "Warning", "informational")
EVAL-vendor_product = "Sophos XG"
FIELDALIAS-aob_gen_sophos_xg_syslog_alias_1 = user_name AS user
FIELDALIAS-aob_gen_sophos_xg_syslog_alias_10 = dst_zone AS dest_zone
FIELDALIAS-aob_gen_sophos_xg_syslog_alias_11 = srczone AS src_zone
FIELDALIAS-aob_gen_sophos_xg_syslog_alias_12 = out_interface AS dest_interface
