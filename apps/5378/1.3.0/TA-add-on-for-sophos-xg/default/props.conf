FIELDALIAS-aob_gen_sophos_xg_syslog_alias_15 = tran_src_ip AS src_translated_ip
FIELDALIAS-aob_gen_sophos_xg_syslog_alias_16 = tran_src_port AS src_translated_port
FIELDALIAS-aob_gen_sophos_xg_syslog_alias_17 = fw_rule_id AS rule
