[queued_searches]
external_type = kvstore
collection = queued_searches
fields_list = _key, name, parent_sid, sid, order, status, expiration, updated

[assessment_job]
external_type = kvstore
collection = assessment_job
fields_list = _key, sid, timerange, updated, status

[assessment_status]
external_type = kvstore
collection = assessment_status
fields_list = _key, category_key, base_sid, sid, assessment_sid, value, value_type, value_str, updated, label, timerange

[assessment_buffer]
external_type = kvstore
collection = assessment_buffer
fields_list = _key, category_key, base_sid, sid, assessment_sid, value, value_type, value_str, updated, label, timerange
