search = index=_introspection component=kvstorereplicasetstats data.replSetStats.myState=1\
| spath data.replSetStats.members{} output=members\
| fields _time, members\
| mvexpand members\
| where like(members,"%SECONDARY%")\
| rex field=members "optimeDate\":(?<optime>[^,]*)"\
| join _time\
    [ search index=_introspection component=kvstorereplicasetstats data.replSetStats.myState=1\
    | spath data.replSetStats.members{} output=members\
    | fields _time, members\
    | mvexpand members\
    | where like(members,"%PRIMARY%")\
    | rex field=members "optimeDate\":(?<optime>[^,]*)"\
    | stats max(optime) as primary by _time]\
| eval difference=round((primary-optime)/1000,2)\
| stats avg(difference) AS value\
| eval label="KV Store Latency"\
| `record_assessment_status($parent_sid$, $timerange$, "-", "System Performance","1056")`

