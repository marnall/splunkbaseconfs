[0026]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
request.ui_dispatch_app = atlas_assessment
request.ui_dispatch_view = search
search = index=_audit action=search has_error_warn=true NOT ("searchactivityquery" OR savedsearch_name="_ACCELERATE_*" OR app IN (splunk_archiver,splunk_instance_monitoring,splunk_instrumentation,splunk_monitoring_console)) \
| eval \
    is_sub=if(like(search_id, "'subsearch_%"),1,0), \
    sid=trim(search_id,"'"), \
    sid=if(is_sub=1, replace(sid, "^subsearch_|_[^_]+$", ""), sid), \
    type=case(match(sid, "^scheduler_"), "Scheduled", match(sid, "^(?:rt_)?\d+\.\d+"), "Ad Hoc", match(sid, "^_?[^_]+_?_[^_]+_+[^_]+__[^_]+_\d+\.\d+"), "Dashboard") \
| where is_sub=1 OR type="Dashboard" \
| stats first(provenance) as provenance by sid \
| where isnotnull(provenance) \
| stats dc(provenance) as value \
| eval label="Dashboards with Errors" \
| `record_assessment_status($parent_sid$, $timerange$, "-", "Search Performance","0026")`

