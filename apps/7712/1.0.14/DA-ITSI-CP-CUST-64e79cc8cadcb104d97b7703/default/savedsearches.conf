[save_snmp_devices]
is_visible = false
enableSched = 1
run_on_startup = true
cron_schedule = */30 * * * *
dispatch.earliest_time = -32m@m
dispatch.latest_time = -2m@m
search = `nfo_netflow_index` nfc_id=20103 | inputlookup snmp-devices_lookup append=t | dedup exp_ip nfo_hostname mgmt_ip sysName device_group | sort exp_ip | fillnull value="Unassigned" device_group | table nfo_hostname exp_ip mgmt_ip device_group sysName  | outputlookup snmp-devices_lookup

[save_exporters_with_nfo]
is_visible = false
enableSched = 1
run_on_startup = true
cron_schedule = */30 * * * *
dispatch.earliest_time = -32m@m
