         | eval SNMPDeviceName=case(nfc_id=20003,sysName,nfc_id=20062,exp_name,nfc_id=20267,vpc_name,nfc_id=20367,gcp_exp,nfc_id=20467,case(direction=="inbound", dest_vnet_name, direction=="outbound", src_vnet_name)) \
         | eval input_snmp=if(isnull(input_snmp),ifIndex,input_snmp) \
         | eval input_snmp=if(nfc_id==20267,interface_id,input_snmp) \
         | fields exp_ip nfo_hostname input_snmp output_snmp input_if_name output_if_name input_if_alias output_if_alias ifIndex SNMPDeviceName ifSpeed ifName ifAlias \
         | eval ifIndex=mvappend(input_snmp,output_snmp,ifIndex) \
         | mvexpand ifIndex \
         | fillnull value="" ifName ifAlias \
         | eval ifName=if(ifName == "",if(ifIndex==input_snmp,input_if_name,if(ifIndex==output_snmp,output_if_name,ifName)),ifName) \
         | eval ifAlias=if(ifAlias == "",if(ifIndex==input_snmp,input_if_alias,if(ifIndex==output_snmp,output_if_alias,ifAlias)),ifAlias) \
         | dedup exp_ip nfo_hostname ifIndex sortby - ifName \
         | table exp_ip nfo_hostname ifIndex SNMPDeviceName ifSpeed ifName ifAlias \
         | inputlookup interfaces_20003.csv append=t \
         | stats first(SNMPDeviceName) as SNMPDeviceName first(ifSpeed) as ifSpeed first(ifName) as ifName first(ifAlias) as ifAlias by nfo_hostname exp_ip ifIndex \
         | dedup  exp_ip nfo_hostname ifIndex sortby - ifName \
         | outputlookup interfaces_20003_lookup
skip_scheduled_realtime_idxc = 0

