#
# app.conf for Rundeck App
#

[install]
state = enabled
is_configured = false
build = 1

[package]
id = rundeck_app
check_for_updates = 1

[ui]
is_visible = 1
label = Rundeck App Community Version

[launcher]
author=www.baboonbones.com
description=Community edition App for monitoring Rundeck Core Community Edition or Pro Edition(Team/Cluster)
version = 1.0.2
