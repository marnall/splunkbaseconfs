#
# savedsearches.conf for Rundeck App
#

[rundeck_populate_lookup_hosts]
run_on_startup = true
alert.track = 0
cron_schedule = * * * * *
description = Populates the lookup rundeck_hosts_lookup
enableSched = 1
schedule_priority = highest
search = `rundeck_index` sourcetype=rundeck_rest_sysinfo | stats latest(system.rundeck.apiversion) as "api_version" ,latest(system.rundeck.build) as build by host |  eval instance_type=if(match(build,".*\(.*\)"),"pro","community") |  table host api_version instance_type | outputlookup create_empty=True rundeck_hosts_lookup
dispatch.earliest_time = -1d

[rundeck_populate_lookup_projects]
run_on_startup = true
alert.track = 0
cron_schedule = * * * * *
description = Populates the lookup rundeck_projects_lookup
enableSched = 1
schedule_priority = highest
search = `rundeck_index` sourcetype="rundeck_rest_projects" | stats latest(name) as "project_name" by host,name | table host project_name | outputlookup create_empty=True rundeck_projects_lookup
dispatch.earliest_time = -1d

[rundeck_populate_lookup_users]
run_on_startup = true
alert.track = 0
cron_schedule = * * * * *
description = Populates the lookup rundeck_users_lookup
enableSched = 1
schedule_priority = highest
search = `rundeck_index` sourcetype="rundeck_rest_users" earliest=-1d@d latest=now  | stats latest(email) as "user_email" ,latest(lastName) as "user_lastname" ,latest(firstName) as "user_firstname" ,latest(login) as "user_login"  by host,login | eval active="false" | table host user_login user_firstname user_lastname user_email active | join type=left user_login [search `rundeck_index` sourcetype=rundeck_logs_access OR sourcetype=rundeck_logs_executions earliest=-31d@d latest=-1d@d | where isnotnull(user) | dedup user | eval active="true"| rename user as "user_login" | table user_login active] | outputlookup create_empty=True rundeck_users_lookup

[rundeck_populate_lookup_jobs]
run_on_startup = true
alert.track = 0
cron_schedule = * * * * *
description = Populates the lookup rundeck_jobs_lookup
enableSched = 1
schedule_priority = highest
search = `rundeck_index` sourcetype="rundeck_rest_project_jobs" | stats latest(group) as "job_group" ,latest(id) as "job_uuid" ,latest(name) as "job_name" ,latest(project) as "project_name" by host,id |  table host job_uuid job_name job_group project_name | outputlookup create_empty=True rundeck_jobs_lookup
dispatch.earliest_time = -1d

[rundeck_populate_lookup_nodes]
run_on_startup = true
alert.track = 0
cron_schedule = * * * * *
description = Populates the lookup rundeck_nodes_lookup
enableSched = 1
schedule_priority = highest
search = `rundeck_index` sourcetype="rundeck_rest_project_resources" | dedup hostname,nodename,host,project | table host hostname nodename description project tags attr* | outputlookup create_empty=True rundeck_nodes_lookup
dispatch.earliest_time = -1d