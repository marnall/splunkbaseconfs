#
# macros.conf for Rundeck App
#

[rundeck_index]
definition = index=main
iseval = 0

[rundeck_project_names(1)]
args = host
definition = | inputlookup rundeck_projects_lookup where host=$host$
iseval = 0

[rundeck_host_info(1)]
args = host
definition = | inputlookup rundeck_hosts_lookup where host=$host$
iseval = 0

[rundeck_version]
definition = eval version="notset"
iseval = 0

[rundeck_dashboard_msg(1)]
args = host
definition = inputlookup rundeck_hosts_lookup where host=* | `rundeck_version` |  eval dashboard_msg = case(version == "community" AND instance_type == "pro" , "You are using the Community Edition of the Rundeck Splunk App but we see that you are targetting a Pro Version of Rundeck so you are eligible for the Pro Edition of the Rundeck Splunk App",version == "pro" AND instance_type == "community" , "You are using the Pro Edition of the Rundeck Splunk App but we see that you are targetting a Community Version of Rundeck.You must upgrade to a licensed version of Rundeck to continue using this App.") | eval dashboard_color = case(version == "community" AND instance_type == "pro" , "#99ccff",version == "pro" AND instance_type == "community" , "#ff6666")  | table dashboard_msg dashboard_color
iseval = 0