#
# props.conf for Rundeck App
#

#------------
# REST Endpoints
#------------

[rundeck_rest_sysinfo]
pulldown_type = 1

[rundeck_rest_users]
pulldown_type = 1

[rundeck_rest_logstorage]
pulldown_type = 1

[rundeck_rest_logstorage_incomplete]
pulldown_type = 1

[rundeck_rest_projects]
pulldown_type = 1

[rundeck_rest_project_event_history]
pulldown_type = 1
TIME_PREFIX = {"starttime":

[rundeck_rest_project_resources]
pulldown_type = 1

[rundeck_rest_project_jobs]
pulldown_type = 1

[rundeck_rest_project_executions]
pulldown_type = 1
TIME_PREFIX = "date-started": {"date": 

#------------
# App logs
#------------

[rundeck_logs_executions]
pulldown_type = 1
EXTRACT-user,job_action,job_execution_number,job_status,project,job_name,job_uuid = ^[^,\n]*,\d+\]\s+(?P<user>\w+)\s+(?P<job_action>[a-z]+)\s+\[(?P<job_execution_number>[^:]+)[^:\n]*:(?P<job_status>[^\]]+)[^ \n]* (?P<project>[^ ]+)[^"\n]*"(?P<job_name>[^"]+)"\[(?P<job_uuid>[^\]]+)

[rundeck_logs_access]
pulldown_type = 1
EXTRACT-request_method,request_path,src_ip,request_scheme,user,user_agent = ^[^"\n]*"(?P<request_method>\w+)[^ \n]* (?P<request_path>[^"]+)[^ \n]* (?P<src_ip>[^ ]+)[^ \n]* (?P<request_scheme>\w+)\s+(?P<user>\w+)[^\(\n]*\((?P<user_agent>[^\)]+)

[rundeck_logs_api]
pulldown_type = 1
EXTRACT-src_ip,request_scheme,user,request_path,user_agent = ^(?:[^ \n]* ){2}(?P<src_ip>[^ ]+)\s+(?P<request_scheme>[^ ]+)\s+(?P<user>[^ ]+)(?:[^ \n]* ){5}(?P<request_path>[^"]+)[^\(\n]*\((?P<user_agent>[^\)]+)

[rundeck_logs_jobs]
pulldown_type = 1
EXTRACT-user,job_action,job_uuid,project,job_name,job_action_source = ^[^\]\n]*\]\s+(?P<user>[^ ]+)\s+(?P<job_action>\w+)[^ \n]* \[(?P<job_uuid>[^\]]+)[^ \n]* (?P<project>[^ ]+)\s+"(?P<job_name>[^"]+)"\s+\((?P<job_action_source>\w+)

#------------
# System logs
#------------

[rundeck_logs_audit]
pulldown_type = 1

[rundeck_logs_main]
pulldown_type = 1

[rundeck_logs_options]
pulldown_type = 1

[rundeck_logs_storage]
pulldown_type = 1

[rundeck_logs_service]
pulldown_type = 1