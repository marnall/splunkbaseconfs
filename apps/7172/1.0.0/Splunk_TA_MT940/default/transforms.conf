[mt940_transaction_reference]
REGEX = ^:20:(?<trnx_reference>.+?)\n

[mt940_account_id]
REGEX = ^:25:(?<account_id>.+?)\n

[mt940_statement_sequence]
REGEX = ^:28C:(?<statement_number>.+?)\/(?<sequence_number>.+?)\n

[mt940_opening_balance]
REGEX = ^:60F:(?<opening_balance_indicator>.)(?<opening_balance_date>\d{6})(?<currency>...)(?<opening_balance>[\d,.]*)\n

[mt940_mv_transactions]
REGEX = ^:61:(?<trnx_date>\d{6})(?<trnx_value_date>\d{4})(?<trnx_type>\D{1,2})(?<trnx_amount>[\d,.]+)(?<trnx_code>[\s\S]+?)(?=:61:|:62F:|\n|:86:)
MV_ADD = true
REPEAT_MATCH = true

[mt940_mv_statement_narratives]
REGEX = ^:86:(?<statement_narrative>[\s\S]+?)(?=:61:|:62F:|-\n)
MV_ADD = true
REPEAT_MATCH = true

[mt940_final_closing_balance]
REGEX = ^:62F:(?<closing_balance_indicator>.)(?<closing_balance_date>\d{6})(?<closing_currency>...)(?<closing_balance>[\d,.]*)\n

[mt940_available_balance]
REGEX = ^:64:(?<available_balance_indicator>.)(?<available_balance_date>\d{6})(?<available_currency>...)(?<available_closing_balance>[\d,.]*)\n