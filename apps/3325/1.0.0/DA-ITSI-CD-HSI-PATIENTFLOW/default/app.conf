[install]
is_configured = 0
build = 1

[launcher]
author = Converging Data
version = 1.0.0
description = ITSI Module for monitoring Patient Flow

#########################################################################
# Temporary addition of Converging Data's HCIM to the Patient Flow module
# To be removed once HCIM deployed as seperate application
#
# The Healthcare Common Information Model (HCIM)for Splunk. It is based on a fork from Joe Welsh hl7 TA and extends to provide HL7 standards based enrichments and more detailed message 
# breakdown. This application is fully maintained by Converging Data and iterated upon as the HCIM extends for more healthcare use cases. All healthcare Splunk and ITSI applications should use this 
# HCIM to ensure transportability between source systems. The HCIM is based on HL7_v2.8.1 and provides out of the box standards based enrichments and data modelling. Individual HCIM TA are provided  
# for common none HCIM compliant systems. It is recommended to use the Converging Data Health Intelligence Connector (HIX) for HL7 messaging data aquesision as many HL7_v2 systems will automatically 
# work with HCIM and little or no data mapping to HCIM will be required. Please visit http://convergingdata.com for more informtion.
#########################################################################

[ui]
is_visible = 0
label = ITSI Module for Patient Flow

[package]
id = DA-ITSI-CD-HSI-PATIENTFLOW

[triggers]
reload.itsi_service_template = simple
reload.itsi_kpi_template = simple
reload.itsi_kpi_base_search = simple
