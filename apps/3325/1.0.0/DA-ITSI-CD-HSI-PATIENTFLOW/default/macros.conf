######################################################################################
# Start Temporary addition sectionof Converging Data's HCIM to the Patient Flow module
# To be removed once HCIM deployed as seperate application
######################################################################################

[default]

[event-family-name-search]
definition = eventtype="hl7_v2_messages" | stats count by family_name | fields family_name | sort family_name
iseval = 0

[event-patient-id-search]
definition = eventtype="hl7_v2_messages" | stats count by patient_id | fields patient_id | sort patient_id
iseval = 0

[hl7-v2-events-search(2)]
definition = eventtype="hl7_v2_messages" ($patient_id$) AND ($family_name$)
iseval = 0
args = family_name,patient_id

[HCIM-indexes]
definition = index=*
iseval = 0

######################################################################################
# End Temporary addition section of Converging Data's HCIM to the Patient Flow module
# To be removed once HCIM deployed as seperate application
######################################################################################
