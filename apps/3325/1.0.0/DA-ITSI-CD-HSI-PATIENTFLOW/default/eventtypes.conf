[PF_Admission]
search = index=* sourcetype="hl7_v2" MSH_9_2=*A01

[PF_Transfer]
search = index=* sourcetype="hl7_v2" MSH_9_2=*A02

[PF_Discharge]
search = index=* sourcetype="hl7_v2" MSH_9_2=*A03

######################################################################################
# Start Temporary addition sectionof Converging Data's HCIM to the Patient Flow module
# To be removed once HCIM deployed as seperate application
######################################################################################

[default]

[hl7_v2_messages]
search = index="hl7" sourcetype="hl7_v2" NOT MSH_9=ACK

[hl7_v2_acks]
search = index="hl7" sourcetype="hl7_v2" MSH_9=ACK

[hl7_v2_errors]
search = eventtype=hl7_v2_acks MSA=* NOT MSA_1=AA

