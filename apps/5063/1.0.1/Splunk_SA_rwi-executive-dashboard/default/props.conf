# Authentication
######################

# Okta

[OktaIM2:log]
FIELDALIAS-okta_signature = "outcome.reason" ASNEW signature

# PAN Global Protect

[pan:system]
EVAL-action = case(like(event_id,"%succ%"),"success",like(event_id,"%fail%"),"failure",true(),null())
FIELDALIAS-pan_gp_src = src_ip ASNEW src

######################
# Video Conferencing
######################

## Zoom

[zoom:webhook]
KV_MODE = json
EVAL-app = "Zoom"
EVAL-vendor = "Zoom"
EVAL-product = "Zoom"
EVAL-vendor_product = "Zoom"
FIELDALIAS-001_account_id = payload.account_id as account_id
REPORT-001_zoom_event_type = zoom_webhook_event_type
LOOKUP-001_zoom_action = zoom_action_lookup vendor_action OUTPUT action
LOOKUP-002_zoom_meeting_type = zoom_meeting_type_lookup payload.object.type as type OUTPUT meeting_type as type

# Meeting / Webinar
EVAL-meeting_id = if(event_type="meeting" OR event_type="webinar",'payload.object.id',null())
EVAL-meeting_uuid = if(event_type="meeting" OR event_type="webinar",'payload.object.uuid',null())
EVAL-host_id = if(event_type="meeting" OR event_type="webinar",'payload.object.host_id',null())
EVAL-type = if(event_type="meeting" OR event_type="webinar",'payload.object.type',null())
#EVAL-start_time = if(event_type="meeting" OR event_type="webinar",'payload.object.start_time',null())
EVAL-start_time = if(event_type="meeting" OR event_type="webinar",strptime(replace('payload.object.start_time',"(.*)(Z)$","\1-0000"),"%FT%T%z"),null())
EVAL-timezone = if(event_type="meeting" OR event_type="webinar",'payload.object.timezone',null())
EVAL-duration = if(event="meeting.ended" OR event="webinar.ended",strptime(replace('payload.object.end_time',"(.*)(Z)$","\1-0000"),"%FT%T%z")-strptime(replace('payload.object.start_time',"(.*)(Z)$","\1-0000"),"%FT%T%z"),null())
#EVAL-duration = coalesce(if(like(event,"%.ended"),strptime(replace('payload.object.end_time',"(.*)(Z)$","\1-0000"),"%FT%T%z"),null())-if(event_type="meeting" OR event_type="webinar",strptime(replace('payload.object.start_time',"(.*)(Z)$","\1-0000"),"%FT%T%z"),null()),if(event_type="meeting" OR event_type="webinar",'payload.object.duration',null()))
EVAL-topic = if(event_type="meeting" OR event_type="webinar",'payload.object.topic',null())
EVAL-end_time = if(like(event,"%.ended"),strptime(replace('payload.object.end_time',"(.*)(Z)$","\1-0000"),"%FT%T%z"),null())
EVAL-update_time = if(like(event,"%.updated"),strptime('payload.time_stamp',"%s%3Q"),null())

# Participant
#EVAL-participant_id = if(like(event,"%participant%"),'payload.object.participant.user_id',null())
EVAL-participant_id = if(like(event,"%participant%"),md5('payload.object.uuid'.'payload.object.participant.id'.'payload.object.participant.user_id'),null())
EVAL-user = if(like(event,"%participant%"),'payload.object.participant.user_name',null())
EVAL-user_uuid = if(like(event,"%participant%"),'payload.object.participant.id',null())
#EVAL-unique_participant = if(like(event,"%participant%"),md5('payload.object.uuid'.'payload.object.participant.id'.'payload.object.participant.user_id'),null())
EVAL-join_time = if(like(event,"%participant_joined"),strptime(replace('payload.object.participant.join_time',"(.*)(Z)$","\1-0000"),"%FT%T%z"),null())
EVAL-leave_time = if(like(event,"%participant_left"),strptime(replace('payload.object.participant.leave_time',"(.*)(Z)$","\1-0000"),"%FT%T%z"),null())

## Webex

[cisco:webex:meetings:history:meetingusagehistory]
KV_MODE = json
EVAL-app = "Webex Meetings"
EVAL-vendor = "Cisco"
EVAL-product = "Webex Meetings"
EVAL-vendor_product = "Cisco Webex Meetings"

# Meeting
EVAL-event_type = "meeting"
EVAL-serviceType = "MeetingCenter"
FIELDALIAS-001_meeting_id = confID as meeting_id
FIELDALIAS-002_topic = confName as topic
FIELDALIAS-003_host_id = hostWebExID as host_id
FIELDALIAS-004_meeting_uuid = confID as meeting_uuid
EVAL-timezone = replace(timezone,"([^,]+),.*","\1")
EVAL-tz_offset = replace(timezone,"\w{3}([^,]+),.*","\1")
EVAL-end_time = strptime(meetingEndTime." -0000","%m/%d/%Y %T %z")
EVAL-start_time = strptime(meetingStartTime." -0000","%m/%d/%Y %T %z")
EVAL-duration = strptime(meetingEndTime." -0000","%m/%d/%Y %T %z") - strptime(meetingStartTime." -0000","%m/%d/%Y %T %z")
EVAL-action = "ended"

[cisco:webex:meetings:history:meetingattendeehistory]
KV_MODE = json
EVAL-app = "Webex Meetings"
EVAL-vendor = "Cisco"
EVAL-product = "Webex Meetings"
EVAL-vendor_product = "Cisco Webex Meetings"
EVAL-event_type = "meeting"
EVAL-serviceType = "MeetingCenter"
FIELDALIAS-001_meeting_id = confID as meeting_id
FIELDALIAS-002_topic = confName as topic
FIELDALIAS-003_meeting_uuid = confID as meeting_uuid
EVAL-action = "left"

# Participant
FIELDALIAS-003_participant_id = email as participant_id
FIELDALIAS-004_user = name as user
FIELDALIAS-005_user_uuid = email as user_uuid
FIELDALIAS-006_src_ip = ipAddress as src_ip
EVAL-unique_participant = md5(confID.email)
EVAL-join_time = strptime(joinTime."-0000","%m/%d/%Y %T%z")
EVAL-leave_time = strptime(leaveTime."-0000","%m/%d/%Y %T%z")
EVAL-duration = strptime(leaveTime."-0000","%m/%d/%Y %T%z") - strptime(joinTime."-0000","%m/%d/%Y %T%z")

[cisco:webex:meetings:general:summarysession]
KV_MODE = json
EVAL-app = "Webex Meetings"
EVAL-vendor = "Cisco"
EVAL-product = "Webex Meetings"
EVAL-vendor_product = "Cisco Webex Meetings"

# All Service Type: Meeting Center, Training Center, Event Center, Sales Center and Support Center
EVAL-event_type = if(serviceType="MeetingCenter","meeting","webinar")
#FIELDALIAS-001_event_type = serviceType
FIELDALIAS-002_meeting_id = confID as meeting_id
FIELDALIAS-003_topic = confName as topic
FIELDALIAS-004_host_id = hostWebExID as host_id
FIELDALIAS-005_timezone = timeZone as timezone
FIELDALIAS-006_meeting_uuid = confID as meeting_uuid
EVAL-action = "started"
EVAL-timezone = replace(timezone,"([^,]+),.*","\1")
EVAL-tz_offset = replace(timezone,"\w{3}([^,]+),.*","\1")
EVAL-start_time = strptime(actualStartTime." -0000","%m/%d/%Y %T %:z")

## Microsoft Teams
[m365:teams:callRecord]
KV_MODE = json
EVAL-app = "Microsoft Teams"
EVAL-vendor = "Microsoft"
EVAL-product = "Teams"
EVAL-vendor_product = "Microsoft Teams"

# Meeting
FIELDALIAS-001_meeting_id = id as meeting_id
FIELDALIAS-002_host_id = organizer{}.user.id as host_id
FIELDALIAS-003_meeting_uuid = id as meeting_uuid
EVAL-event_type = "meeting"
EVAL-start_time = strptime(replace(startDateTime,"(.*)(Z)$","\1-0000"),"%FT%T%z")
EVAL-end_time = strptime(replace(endDateTime,"(.*)(Z)$","\1-0000"),"%FT%T%z")
EVAL-duration = strptime(replace(endDateTime,"(.*)(Z)$","\1-0000"),"%FT%T.%9Q%z") - strptime(replace(startDateTime,"(.*)(Z)$","\1-0000"),"%FT%T.%9Q%z")
EVAL-action = if(mvcount('participants{}.user.id')>0,mvappend("ended","left"),"ended")

# Participants
EVAL-participant_id = mvappend('participants{}.user.id','participants{}.guest.id')
#FIELDALIAS-001_participant_id = participants{}.user.id as participant_id
FIELDALIAS-002_user = participants{}.user.displayName
FIELDALIAS-003_user_uuid = participants{}.user.id as user_uuid
