######################
# VPN
######################

# PAN Global Protect

[pan_gp_traffic]
search = (sourcetype=pan_traffic OR sourcetype=pan:traffic) src_zone=gp*

[pan_gp_auth]
search = (sourcetype=pan_system OR sourcetype=pan:system) (event_id="globalprotectgateway-auth-succ" OR event_id="globalprotectgateway-auth-fail") log_subtype="globalprotect"

######################
# Video Conferencing
######################

# Zoom

[zoom_meeting]
search = sourcetype=zoom:* event=meeting.*

[zoom_webinar]
search = sourcetype=zoom:* event=webinar.*

[zoom_participant]
search = sourcetype=zoom:* (event=meeting.participant_joined OR event=meeting.participant_left OR event=meeting.participant_jbh_waiting OR event=meeting.participant_jbh_joined OR event=webinar.participant_joined OR event=webinar.participant_left OR event=webinar.participant_jbh_waiting OR event=webinar.participant_jbh_joined)

[zoom_recording]
search = sourcetype=zoom:* event=recording.*

[zoom_room]
search = sourcetype=zoom:* event=zoomroom.*

# Cisco Webex Meetings

[webex_meeting_center]
search = (sourcetype=cisco:webex:meetings:general:summarysession serviceType=MeetingCenter) OR sourcetype=cisco:webex:meetings:history:meeting*

[webex_training_center]
search = (sourcetype=cisco:webex:meetings:general:summarysession serviceType=TrainingCenter) OR sourcetype=cisco:webex:meetings:history:training*

[webex_event_center]
search = (sourcetype=cisco:webex:meetings:general:summarysession serviceType=EventCenter) OR sourcetype=cisco:webex:meetings:history:event*

[webex_sales_center]
search = (sourcetype=cisco:webex:meetings:general:summarysession serviceType=SalesCenter) OR sourcetype=cisco:webex:meetings:history:sales*

[webex_support_center]
search = (sourcetype=cisco:webex:meetings:general:summarysession serviceType=SupportCenter) OR sourcetype=cisco:webex:meetings:history:support*

[webex_participant]
search = sourcetype=cisco:webex:meetings:history:meetingattendeehistory	OR sourcetype=cisco:webex:meetings:history:eventattendeehistory OR sourcetype=cisco:webex:meetings:history:supportattendeehistory OR sourcetype=cisco:webex:meetings:history:trainingattendeehistory

# Microsoft Teams
[teams_meeting]
search = sourcetype=m365:teams:callRecord
