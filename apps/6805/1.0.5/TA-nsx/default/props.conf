[vmware:vsphere:syslog]
EXTRACT-vmw_nsxt_audit_operation_status = status(:'|=")(?<vmw_nsxt_audit_operation_status>\w+)('|")
EXTRACT-vmw_nsxt_display_name = "display_name":"(?<vmw_nsxt_display_name>[\w \\']+)"
EXTRACT-vmw_nsxt_firewall_action = (?:match|TERM|L7 Rule pending|tcp strict)\s(?<vmw_nsxt_firewall_action>\w+)\s(?:\d+)
EXTRACT-vmw_nsxt_firewall_reason = (?:INET|INET6)\s(?<vmw_nsxt_firewall_reason>.*)\s(?:PASS|DROP|REJECT|GOTO_FILTER)
EXTRACT-vmw_nsxt_firewall_dst = \d+->(?<vmw_nsxt_firewall_dst>[A-Fa-f\d\.:]+)( |/|$)
EXTRACT-vmw_nsxt_firewall_dst_ip_port = \d+->(?<vmw_nsxt_firewall_dst_ip_port>[A-Fa-f\d\.:]+/\d+)( |$)
EXTRACT-vmw_nsxt_firewall_dst_port = \d+->[A-Fa-f\d\.:]+/(?<vmw_nsxt_firewall_dst_port>-?\d+)( |$)
EXTRACT-vmw_nsxt_firewall_src = \S+\s+(?<vmw_nsxt_firewall_src>[A-Fa-f\d\.:]+)(/|->)
EXTRACT-vmw_nsxt_firewall_src_ip_port = \s(?<vmw_nsxt_firewall_src_ip_port>[A-Fa-f\d\.:]+/\d+)\-\>
EXTRACT-vmw_nsxt_firewall_protocol = (IN|OUT) (\d+ )?(?<vmw_nsxt_firewall_protocol>(TCP6?|UDP6?|ICMP|PROTO6? \d+))\s
EXTRACT-vmw_nsxt_firewall_tcp_flag = TCP\s((\d+\.\d+\.\d+\.\d+\/\d+\-\>\d+\.\d+\.\d+\.\d+\/\d+)|(\w+\:\w+\:\w+\:\w+\:\w+\:\w+\:\w+\:\w+\/\d+\-\>\w+\:\w+\:\w+\:\w+\:\w+\:\w+\:\w+\:\w+\/\d+))\s(?<vmw_nsxt_firewall_tcp_flag>[A-Z]{1,3})\s
EXTRACT-vmw_nsxt_firewall_packets_and_size_in_out = \s(?<vmw_nsxt_fw_packets_in>\d+)/(?<vmw_nsxt_fw_packets_out>\d+)\s(?<vmw_nsxt_fw_packets_size_in>\d+)/(?<vmw_nsxt_fw_packets_size_out>\d+)\s

EXTRACT-vmw_nsxt_operation = Operation(:'|=")(?<vmw_nsxt_operation>\w+)('|")
EXTRACT-vmw_nsxt_user = UserName(:'|=")(?<vmw_nsxt_user>.+?)('|")
EXTRACT-vmw_nsxt_ulog_event_type = event_type":\s*"(?<vmw_nsxt_ulog_event_type>\w+)",
EXTRACT-vmw_nsxt_ulog_origin_fw_type = fw_type":\s*"(?<vmw_nsxt_ulog_origin_fw_type>\w+)",
EXTRACT-vmw_nsxt_ulog_origin_fw_uuid = fw_uuid":\s*"(?<vmw_nsxt_ulog_origin_fw_uuid>[A-Fa-f\d\-]+)",
EXTRACT-vmw_nsxt_ulog_flow_start = start":\s*"(?<vmw_nsxt_ulog_flow_start>[-\d\:\.TZ]+)",
EXTRACT-vmw_nsxt_ulog_flow_end = end":\s*"(?<vmw_nsxt_ulog_flow_end>[-\d\:\.TZ]+)",
EXTRACT-vmw_nsxt_ulog_flow_ip_ver = ip_ver":\s*"(?<vmw_nsxt_ulog_flow_ip_ver>ipv\d)",
EXTRACT-vmw_nsxt_ulog_flow_src_ip = src_ip":\s*"(?<vmw_nsxt_ulog_flow_src_ip>[A-Fa-f\d\.:]+)",
EXTRACT-vmw_nsxt_ulog_flow_src_port = src_port":\s*(?<vmw_nsxt_ulog_flow_src_port>-?\d+),
EXTRACT-vmw_nsxt_ulog_flow_dest_ip = dest_ip":\s*"(?<vmw_nsxt_ulog_flow_dest_ip>[A-Fa-f\d\.:]+)",
EXTRACT-vmw_nsxt_ulog_flow_dest_port = dest_port":\s*(?<vmw_nsxt_ulog_flow_dest_port>-?\d+),
EXTRACT-vmw_nsxt_ulog_flow_proto = proto":\s*"(?<vmw_nsxt_ulog_flow_proto>\w+)",
EXTRACT-vmw_nsxt_ulog_bytes_toserver = bytes_toserver":\s*(?<vmw_nsxt_ulog_bytes_toserver>-?\d+),
EXTRACT-vmw_nsxt_ulog_bytes_toclient = bytes_toclient":\s*(?<vmw_nsxt_ulog_bytes_toclient>-?\d+),
EXTRACT-vmw_nsxt_ulog_flow_final_action = final_action":\s*"(?<vmw_nsxt_ulog_flow_final_action>\w+)"
EXTRACT-vmw_nsxt_ulog_fw_rule_tag = rule_tag":\s*"(?<vmw_nsxt_ulog_fw_rule_tag>\w+)"
EXTRACT-vmw_nsxt_ulog_l7profile_entry_id = entry_id":\s*(?<vmw_nsxt_ulog_l7profile_entry_id>\+d),
EXTRACT-vmw_nsxt_ulog_http_method = http_method":\s*"(?<vmw_nsxt_ulog_http_method>\w+)",
EXTRACT-vmw_nsxt_ulog_http_hostname = hostname":\s*"(?<vmw_nsxt_ulog_http_hostname>\w+)",
EXTRACT-vmw_nsxt_ulog_http_url = url":\s*"(?<vmw_nsxt_ulog_http_url>\w+)",
EXTRACT-vmw_nsxt_ulog_http_scheme = scheme":\s*"(?<vmw_nsxt_ulog_http_scheme>\w+)",
EXTRACT-vmw_nsxt_ulog_http_user_agent = http_user_agent":\s*"(?<vmw_nsxt_ulog_http_user_agent>\w+)",
EXTRACT-vmw_nsxt_ulog_http_status = status":\s*"(?<vmw_nsxt_ulog_http_status>\w+)",
EXTRACT-vmw_nsxt_ulog_tls_domain = domain":\s*"(?<vmw_nsxt_ulog_tls_domain>\w+)",
EXTRACT-vmw_nsxt_ulog_app_id_app = app":\s*"(?<vmw_nsxt_ulog_app_id_app>\w+)"
EXTRACT-vmw_nsxt_ulog_antimalware_sha256 = filehash_sha256":\s*"(?<vmw_nsxt_ulog_antimalware_sha256>\w+)",
EXTRACT-vmw_nsxt_ulog_antimalware_file = file_name":\s*"(?<vmw_nsxt_ulog_antimalware_file>\w+)",
EXTRACT-vmw_nsxt_ulog_antimalware_verdic = verdict":\s*"(?<vmw_nsxt_ulog_antimalware_verdic>\w+)",

EXTRACT-vmw_nsxt_ulog_idps_action = action":\s*"(?<vmw_nsxt_ulog_idps_action>\w+)",\s+"rule_id
EXTRACT-vmw_nsxt_ulog_idps_rule_id = rule_id":\s*(?<vmw_nsxt_ulog_idps_rule_id>-?\d+),\s+"ids_profile_id

EXTRACT-vmw_nsxt_ulog_flow_id = \"flow_id\":\s*(?<vmw_nsxt_ulog_flow_id>\d+)
EXTRACT-vmw_nsxt_ulog_rule_id = \"rule_id\":\s*(?<vmw_nsxt_ulog_rule_id>-?\d+)
EXTRACT-vmw_nsxt_ulog_action = \"action\":\s*\"(?<vmw_nsxt_ulog_action>\w+)\"
EXTRACT-vmw_nsxt_ulog_direction = \"direction\":\s*\"(?<vmw_nsxt_ulog_direction>\w+)\"
EXTRACT-vmw_nsxt_ulog_signature = \"signature\":\s*\"(?<vmw_nsxt_ulog_signature>[^\"]+)\"
EXTRACT-vmw_nsxt_ulog_signature_id = \"signature_id\":\s*(?<vmw_nsxt_ulog_signature_id>\d+)
EXTRACT-vmw_nsxt_ulog_category = \"category\":\s*\"(?<vmw_nsxt_ulog_category>[^\"]+)\"
EXTRACT-vmw_nsxt_ulog_vm_uuid = \"vm_uuid\":\s*\"(?<vmw_nsxt_ulog_vm_uuid>[^\"]+)\"
EXTRACT-vmw_nsxt_ulog_user_id = \"user_id\":\s*(?<vmw_nsxt_ulog_user_id>\d+)
EXTRACT-vmw_nsxt_ulog_severity = \"severity\":\s*(?<vmw_nsxt_ulog_severity>\d+)

EXTRACT-vmw_nsxt_firewall_tag = (?<vmw_nsxt_firewall_tag>(NSX-T-|DFW-)[\w\-]+)
EXTRACT-vmw_nsxt_firewall_direction = (?<vmw_nsxt_firewall_direction>IN|OUT)
EXTRACT-vmw_nsxt_firewall_rule_id = (?:match|TERM|L7 Rule pending)\s\w+\s(?<vmw_nsxt_firewall_rule_id>\d+)
EXTRACT-vmw_nsxt_firewall_src_port = \S+\s+[A-Fa-f\d\.:]+/(?<vmw_nsxt_firewall_src_port>\d+)

FIELDALIAS-signature = vmw_nsxt_ulog_signature AS signature
FIELDALIAS-signature_id = vmw_nsxt_ulog_signature_id AS signature_id
FIELDALIAS-category = vmw_nsxt_ulog_category AS category
FIELDALIAS-user = vmw_nsxt_user AS user
FIELDALIAS-severity = vmw_nsxt_ulog_severity AS severity

EVAL-tcp_flag = coalesce(vmw_nsxt_firewall_tcp_flag,"N/A")
EVAL-app = if(match(vmw_nsxt_firewall_tag,"^(NSX-T-|DFW-)"),"NSX",app)
EVAL-action = case(vmw_nsxt_firewall_action="PASS","allowed",vmw_nsxt_firewall_action IN("REJECT", "DROP"),"blocked",isnotnull(vmw_nsxt_firewall_action),vmw_nsxt_firewall_action,true(),vmw_nsxt_ulog_action)
EVAL-direction = case(vmw_nsxt_firewall_direction="IN","inbound",vmw_nsxt_firewall_direction="OUT","outbound",isnotnull(vmw_nsxt_firewall_direction),vmw_nsxt_firewall_direction,true(),vmw_nsxt_ulog_direction)
EVAL-rule_id = coalesce(vmw_nsxt_firewall_rule_id,vmw_nsxt_ulog_rule_id)
EVAL-rule = coalesce(vmw_nsxt_firewall_tag,vmw_nsxt_firewall_rule_id,vmw_nsxt_ulog_rule_id)
EVAL-src = coalesce(vmw_nsxt_firewall_src,vmw_nsxt_ulog_flow_src_ip)
EVAL-src_ip = coalesce(vmw_nsxt_firewall_src,vmw_nsxt_ulog_flow_src_ip)
EVAL-src_port = coalesce(vmw_nsxt_firewall_src_port,vmw_nsxt_ulog_flow_src_port)
EVAL-dest = coalesce(vmw_nsxt_firewall_dst,vmw_nsxt_ulog_flow_dest_ip)
EVAL-dest_ip = coalesce(vmw_nsxt_firewall_dst,vmw_nsxt_ulog_flow_dest_ip)
EVAL-dest_port = coalesce(vmw_nsxt_firewall_dst_port,vmw_nsxt_ulog_flow_dest_port)
EVAL-protocol = coalesce(vmw_nsxt_firewall_protocol,vmw_nsxt_ulog_flow_proto)
