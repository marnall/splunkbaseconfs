# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 3

[launcher]
author = RedLock
version = 1.0.2
description = This technology add-on pulls JSON messages from SQS queues and writes them as Splunk events.Here are the steps to use this add-on:1. Create an IAM user with programmatic access in AWS which has permissions to read and delete the queue data.2. Generate an Access Key ID and Secret Access Key for the IAM user created.3. Launch the application and provide the Input. Enter the details asked for. Details include splunk index name, SQS queue name, SQS queue region, AWS Access Key ID and AWS Secret Key.4. Enable this data input.5. Search the events using the index you provided.

[ui]
is_visible = 1
label = RL-SQS-Poller
docs_section_override = AddOns:released

[package]
id = TA-RL-SQS-Poller

[triggers]
reload.addon_builder = simple
reload.ta_rl_sqs_poller_account = simple
reload.ta_rl_sqs_poller_settings = simple
reload.passwords = simple

