[sourcetype_address]
REGEX = IP4Address|IP6Address
FORMAT = sourcetype::bluecat:ipam:address
DEST_KEY = MetaData:Sourcetype

[sourcetype_network]
REGEX = IP4Network|IP6Network
FORMAT = sourcetype::bluecat:ipam:network
DEST_KEY = MetaData:Sourcetype

[sourcetype_block]
REGEX = IP4Block|IP6Network
FORMAT = sourcetype::bluecat:ipam:block
DEST_KEY = MetaData:Sourcetype

[sourcetype_host]
REGEX = HostRecord
FORMAT = sourcetype::bluecat:ipam:host
DEST_KEY = MetaData:Sourcetype

