[bluecat:ipam]
category = Splunk App Add-on Builder
pulldown_type = 1
TRANSFORMS-address = sourcetype_address
TRANSFORMS-network = sourcetype_network
TRANSFORMS-block = sourcetype_block
TRANSFORMS-host = sourcetype_host
DATETIME_CONFIG = CURRENT
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false

[bluecat:ipam:address]
DATETIME_CONFIG = CURRENT
KV_MODE = json
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
TRUNCATE = 0
category = Structured
pulldown_type = 1
EXTRACT-ip = address=(?<ip>[^\|]+)\|
EXTRACT-state = state=(?<state>[^\|]+)\|
EXTRACT-leaseTime = leaseTime=(?<lease_time>[^\|]+)?
EXTRACT-expiryTime = expiryTime=(?<expiry_time>[^\|]+)\|)?
EXTRACT-parameterRequestList = parameterRequestList=(?<parameter_list>[^\|]+)?
EXTRACT-vendorClassIdentifier = vendorClassIdentifier=(?<vendor_class>[^\|]+)?
EXTRACT-locationInherited = locationInherited=(?<location_inherited>[^\|]+)?
EXTRACT-locationCode = locationCode=(?<location_code>[^\|]+)?
EXTRACT-macAddress = macAddress=(?<mac>[^\|]+)?

[bluecat:ipam:host]
DATETIME_CONFIG = CURRENT
KV_MODE = json
NO_BINARY_CHECK = 1
TRUNCATE = 0
category = Structured
pulldown_type = 1
EXTRACT-host_properties = ((?:comments=)(?<comments>[^\|]+)\|)?absoluteName=(?<fqdn>[^\|]+)\|addresses=(?<ip>[^\|]+)\|reverseRecord=(?<reverse>[^\|]+)

[bluecat:ipam:network]
DATETIME_CONFIG = CURRENT
EXTRACT-network_properties = CIDR=(?<cidr>[^\|]+)?\|allowDuplicateHost=(?<allow_duplicate>[^\|]+)\|((?:inheritAllowDuplicateHost=)(?<inherit_allow>[^\|]+)\|)?((?:pingBeforeAssign=)(?<ping_before>[^\|]+)\|)?((?:inheritPingBeforeAssign=)(?<inherit_ping_before>[^\|]+)\|)?((?:locationInherited=)(?<inherit_location>[^\|]+)\|)?((?:gateway=)(?<gateway>[^\|]+)\|)?((?:inheritDefaultDomains=)(?<inherit_domains>[^\|]+)\|)?((?:defaultView=)(?<default_view>[^\|]+)\|)?((?:inheritDefaultView=)(?<inherit_default_view>[^\|]+)\|)?((?:inheritDNSRestrictions=)(?<inherit_dns>[^\|]+)\|)?
EXTRACT-network_prefix = prefix=(?<prefix>[^\|]+)\|
KV_MODE = json
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
TRUNCATE = 0
category = Structured
pulldown_type = 1

[bluecat:ipam:block]
DATETIME_CONFIG = CURRENT
EXTRACT-block_properties = ((?:CIDR=(?<cidr>[^\|]+))|(?:start=(?<start>[^\|]+)\|end=(?<end>[^\|]+)))\|allowDuplicateHost=(?<allow_duplicate>[^\|]+)\|(?:inheritAllowDuplicateHost=)(?<inherit_allow>[^\|]+)\|(?:pingBeforeAssign=)(?<ping_before>[^\|]+)\|(?:inheritPingBeforeAssign=)(?<inherit_ping_before>[^\|]+)\|(?:locationInherited=)(?<inherit_location>[^\|]+)\|(?:inheritDefaultDomains=)(?<inherit_domains>[^\|]+)\|((?:defaultView=)(?<default_view>[^\|]+)\|)?(?:inheritDefaultView=)(?<inherit_default_view>[^\|]+)\|(?:inheritDNSRestrictions=)(?<inherit_dns>[^\|]+)\|
EXTRACT-block_prefix = prefix=(?<prefix>[^\|]+)\|
KV_MODE = json
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
TRUNCATE = 0
category = Structured
pulldown_type = 1
