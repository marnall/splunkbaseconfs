##
## DO NOT EDIT THIS FILE!
## Please make all changes to files in $SPLUNK_HOME/etc/apps/TA-saltsecurity/local.
## To make changes, copy the section/stanza you want to change from $SPLUNK_HOME/etc/apps/TA-saltsecurity/default
## into ../local and edit there.
##

[salt_sourcetype_attacker_data]
REGEX =  CEF:\d+\|([^|]*\|){4}Attempt
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::salt:syslog:attacker_data

[salt_sourcetype_attacker_action]
REGEX =  CEF:\d+\|([^|]*\|){4}Attacker\sAction
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::salt:syslog:attacker_action

[salt_sourcetype_attacker]
REGEX =  CEF:\d+\|([^|]*\|){4}Attacker
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::salt:syslog:attacker


[cefHeaders]
REGEX = CEF:(?<cef_version>\d+)\|(?<cef_vendor>[^|]*)\|(?<cef_product>[^|]*)\|(?<cef_productVersion>[^|]*)\|(?<cef_signature>[^|]*)\|(?<cef_name>[^|]*)\|(?<cef_severity>[^|]*)

[cefKeys]
REGEX = (?:_+)?(?<_KEY_1>\w+)=(?<_VAL_1>.*?(?=(?:\s\w+=|$)))
REPEAT_MATCH = True
CLEAN_KEYS = 1

[salt_json_parse]
REGEX = {"([^"]+)":"([^}]*)"}
FORMAT = $1::$2
