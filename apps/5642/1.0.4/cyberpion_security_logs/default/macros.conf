[cp_indexes]
definition = index=*ionix*
iseval = 0

[cp_latest_data(1)]
args = cp_sourcetype
definition = `cp_indexes` sourcetype="$cp_sourcetype$" | eventstats max(_time) as latest_event_time | where _time > relative_time(latest_event_time,"-1m")
iseval = 0

[cp_latest_actionitems]
definition = `cp_latest_data("cp:actionitem")`
iseval = 0

[cp_latest_unlinked_shadowit]
definition = `cp_latest_data("cp:unlinkedshadowit")`
iseval = 0
