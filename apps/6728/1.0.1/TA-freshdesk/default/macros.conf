[freshdesk]
definition = | rex field=signature "priority\'\:\s(?P<priority>\d).*requester_id\'\:\s(?P<requester_id>\d+).*status\'\:\s(?P<status>\d).*subject\'\:\s\'(?P<subject>.*?)\'"\
| rex field=signature "'id\'\:\s(?P<id>\d+).*description_text\'\:\s\'(?P<description_text>.*?)\'"\
| rex field=signature "search_name\=\"(?P<id>.*?)\".*user\=\"(?P<user>.*?)\""
iseval = 0
