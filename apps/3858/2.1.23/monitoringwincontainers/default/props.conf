[wincontainers_logs]
EVAL-docker_container_unique_name = docker_container_name+" ("+substr(docker_container_id, 0, 12)+")"

[wincontainers_stats]
EVAL-docker_container_unique_name = docker_container_name+" ("+substr(docker_container_id, 0, 12)+")"

[collector_license_check]
EXTRACT-license-check = ^(?<product>[^\s]+)\s(?<license_id>[^\s]+)?\s(?<limit>[^\s]+)\s(?<expiration>[^\s]+)\s(?<instance_id>[^\s]+)\s(?<created_at>[^\s]+)\s(?<started_at>[^\s]+)\s(?<version>[^\s]+)\s(?<build_date>[^\s]+)\s(?<valid>[^\s]+)\s(?<check_success>[^\s]+)\s(?<err_points>[^\s]+)\s(?<message>.*)$
