##################################
# These are here to fix a side effect of our indexing strategy.
# The headers change based on the value of the first field in the CSV.
# So we do an index-time transform to fork sourcetype rename between three different sourcetypes.
# then we use a search time extraction with delims to set three different headers.
# except we also want the first 12 fields to be index-time extraction.
# we have to pull the party numbers out of calling_station_id and called_station_id
# so this is a problem.
# it turns out you can ALSO use FIELD_NAMES on the initial sourcetype while we're still
# in the earlier phase.  And those indexed time fields will be usable at the end.
# only the first 11 fields are shared across the three headers, so we set 12 names there.
# but there is a terrible side effect that all the other fields NOT in those first 12
# spawn zombie fields with names of EXTRA_FIELD_<int>
# so this awful block deletes them. NOTE: they still show up as ghosts in fieldsummary
##################################
