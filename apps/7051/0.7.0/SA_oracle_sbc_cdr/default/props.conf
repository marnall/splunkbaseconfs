EVAL-duration = accounting_session_time
LOOKUP-termination_cause = accounting_termination_causes cause AS accounting_termination_cause OUTPUT description as accounting_termination_cause_description description as cause_description
# NOTE everyone else in the entire world calls these sip_response_codes, not sip_status_codes.  O_o
LOOKUP-sip_response_codes = sip_response_codes code AS sip_status_code OUTPUT name AS sip_status_name description AS sip_status_description

# Implemented as lookups and also as evals to compare speed, left 'em here in case someone else wants to run some tests.
