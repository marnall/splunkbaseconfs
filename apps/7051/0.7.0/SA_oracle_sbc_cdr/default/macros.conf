
# used only in the detail view.
[oracle_sbc_sourcetypes]
definition = ( sourcetype="oracle_cdr_start" OR sourcetype="oracle_cdr_end" OR sourcetype="oracle_cdr_interim")


# Oracle SBC CDR,   will have one or more "start" records,  and zero or more "end" records (the call may still be in progress).
# THEN, they will also have zero or more "interim" records, that are sort of random snapshots during the call.
# if there's an end record,  the interim records aren't necessarily useful.   We display all interim events on detail views
# but in Investigate calls,  we will only display the latest interim record,  AND only if the call has no end record
# Stating that another way, calls with 1 start, 17 interim and 1 end, will show in Investigate Calls with 1 start and 1 end
# and calls with 1 start, 17 interim and 0 end records, will show in Investigate Calls with 1 start and 1 interim that will
# be the last interim record recorded for that call.
[customizable_oracle_sbc_cdr_streaming_extractions]
definition = eval has_end_record=if(accounting_status==2,1,0) \
| streamstats max(has_end_record) as has_end_record count(eval(accounting_status==3)) as interim_count by call_id \
``` if there's an end record, just throw away all the interim records for that call ``` \
| where data_type!="oracle_sbc" OR accounting_status!=if(has_end_record==1,3,42) \
``` and if there are 2 or more interim records, keep only the most recent one ``` \
| search data_type!="oracle_sbc" OR (NOT accounting_status=3 OR interim_count=1) 

