[ccx_pan_addon_for_splunk_state]
collection = ccx_pan_addon_for_splunk_state
external_type = kvstore
min_matches = 0
max_matches = 1
fields_list = _key,state,input
case_sensitive_match = 0
match_type = 
filter = 
batch_index_query = 0

##Mod sourcetypes CCX Palo Alto Networks Products##

[set_pan_iot_alert]
REGEX = .
FORMAT = sourcetype::ccx:pan:iot_alert
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_pan_iot_vulnerability]
REGEX = .
FORMAT = sourcetype::ccx:pan:iot_vulnerability
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_pan_iot_device]
REGEX = .
FORMAT = sourcetype::ccx:pan:iot_device
DEST_KEY = MetaData:Sourcetype
WRITE_META = true


##Palo Alto Networks IoT Security##

[ccx_paloalto_iot_extended_kv_capture]
FORMAT = $1::$3
REGEX = \"label\"\: ?"((?:[^"\\]|\\.)+)"\, \"value\"\: (\"|\[\"|)((?:[^"\\|\}]|\\.)+)