[sfdc:loginhistory]
EVAL-app = if('Application'=="N/A", "salesforce", 'Application')
EVAL-authentication_method = 'LoginType'
EVAL-signature = if(Status=="Success", null(), 'Status')
EVAL-src_ip = 'SourceIp'
EVAL-user_agent = if(user_agent="Unknown",null(), 'user_agent')
EVAL-vendor = "Salesforce"
EVAL-vendor_product = "Salesforce"

[sfdc:setupaudittrail]
REPORT-ccx_salesforce_login_user = ccx_salesforce_login_user

EVAL-action = case((match('Action', "Set|Change|change|registered|revoke|frozeuser|unfrozeuser") OR match('Display', "Change|change|disconnected")), "modified", match('Action', "Create|create|Added|added") OR match('Display', "Create|create|Added|added|New|Generated"), "created", match('Action', "Delete|delete") OR match('Display', "Delete|delete|Removed"), "deleted", match('Action', "activate|reset") OR match('Display', "activate|reset|Update|Disable|Enable"), "updated", match('Action', "Logout"), "logoff", match('Display', "on"), "started", match('Display', "off"), "stopped", ('attributes.type'=="SetupAuditTrail" AND ((match('Action', "Login|login")) AND NOT match('Action', "revoke|granted") AND NOT match('Display', "changed"))) AND match('Action', "Fail|fail"), "failure",  ('attributes.type'=="SetupAuditTrail" AND ((match('Action', "Login|login")) AND NOT match('Action', "revoke|granted") AND NOT match('Display', "changed"))) AND NOT match('Action', "Fail|fail"), "success")
EVAL-app = case('attributes.type'=="SetupAuditTrail" AND (Action IN("nonSecurityReviewedManagedPackageInstalled","insertConnectedApplication","value_MAX_STREAMING_TOPICS_PROV") OR match('Display', "Initiated|Completed|completed|requested")) AND NOT (match('Display', "WorkOrder|Work Order") AND Action IN("PermSetFlsChanged","changedLightningWebComponent","changedAuraComponent")) OR ('attributes.type'=="SetupAuditTrail" AND ((match('Action', "Login|login")) AND NOT match('Action', "revoke") AND NOT match('Action', "granted") AND NOT match('Display', "changed"))), "salesforce")
EVAL-body = case('attributes.type'=="SetupAuditTrail" AND (Action IN("nonSecurityReviewedManagedPackageInstalled","insertConnectedApplication","value_MAX_STREAMING_TOPICS_PROV") OR match('Display', "Initiated|Completed|completed|requested")) AND NOT (match('Display', "WorkOrder|Work Order") AND Action IN("PermSetFlsChanged","changedLightningWebComponent","changedAuraComponent")), ' Display')
EVAL-description = case('attributes.type'=="SetupAuditTrail" AND (Action IN("nonSecurityReviewedManagedPackageInstalled","insertConnectedApplication","value_MAX_STREAMING_TOPICS_PROV") OR match('Display', "Initiated|Completed|completed|requested")) AND NOT (match('Display', "WorkOrder|Work Order") AND Action IN("PermSetFlsChanged","changedLightningWebComponent","changedAuraComponent")), ' Display')
EVAL-id = case('attributes.type'=="SetupAuditTrail" AND (Action IN("nonSecurityReviewedManagedPackageInstalled","insertConnectedApplication","value_MAX_STREAMING_TOPICS_PROV") OR match('Display', "Initiated|Completed|completed|requested")) AND NOT (match('Display', "WorkOrder|Work Order") AND Action IN("PermSetFlsChanged","changedLightningWebComponent","changedAuraComponent")), 'Id')
EVAL-reason = case('attributes.type'=="SetupAuditTrail" AND match('Action', "Login|login") AND (match('Action', "Fail|fail") OR match('Display', "Fail|fail")), 'Display')
EVAL-severity = case('attributes.type'=="SetupAuditTrail" AND (Action IN("nonSecurityReviewedManagedPackageInstalled","insertConnectedApplication","value_MAX_STREAMING_TOPICS_PROV") OR match('Display', "Initiated|Completed|completed|requested")) AND NOT (match('Display', "WorkOrder|Work Order") AND Action IN("PermSetFlsChanged","changedLightningWebComponent","changedAuraComponent")), "unknown")
EVAL-signature = case('attributes.type'=="SetupAuditTrail" AND (Action IN("nonSecurityReviewedManagedPackageInstalled","insertConnectedApplication","value_MAX_STREAMING_TOPICS_PROV") OR match('Display', "Initiated|Completed|completed|requested")) AND NOT (match('Display', "WorkOrder|Work Order") AND Action IN("PermSetFlsChanged","changedLightningWebComponent","changedAuraComponent")) OR (('attributes.type'=="SetupAuditTrail" AND ((match('Action', "Login|login")) AND NOT match('Action', "revoke") AND NOT match('Action', "granted") AND NOT match('Display', "changed")))), 'Action')
EVAL-subject = case('attributes.type'=="SetupAuditTrail" AND (Action IN("nonSecurityReviewedManagedPackageInstalled","insertConnectedApplication","value_MAX_STREAMING_TOPICS_PROV") OR match('Display', "Initiated|Completed|completed|requested")) AND NOT (match('Display', "WorkOrder|Work Order") AND Action IN("PermSetFlsChanged","changedLightningWebComponent","changedAuraComponent")), 'Action')
EVAL-type = case('attributes.type'=="SetupAuditTrail" AND match('Display', "(I|i)nstalled|(I|i)nitiated|calculat") AND NOT (match('Action', "Login|login") OR match('Display', "WorkOrder|Work Order") OR Action IN("PermSetFlsChanged","changedLightningWebComponent","changedAuraComponent","value_MAX_STREAMING_TOPICS_PROV","PermissionSetGroupCalculationStarted")), "event", 'attributes.type'=="SetupAuditTrail" AND (match('Display', "requested") OR 'Action'=="value_MAX_STREAMING_TOPICS_PROV") AND NOT match('Action', "Login|login"), "alert")
EVAL-user =  if(isnotnull('login_user'),'login_user',null())
EVAL-authentocation_method = if(isnotnull('Action') AND match('Display',"^Logged in.*"),'Action',null())
EVAL-change_type = if(isnotnull('Section') AND Section!="null",lower('Section'),null())
EVAL-object_path = 'attributes.url'
EVAL-object_attrs = 'attributes.type'
EVAL-vendor = "Salesforce"
EVAL-vendor_product = "Salesforce"

LOOKUP-ccx_salesforce_audittrail_change_details = ccx_salesforce_audittrail_change_details Display OUTPUTNEW change_type dataset_name object type
LOOKUP-ccx_lookup_sfdc_user_output = ccx_lookup_sfdc_usernames UserId AS CreatedById OUTPUT Email AS user FirstName LastName Name Username UserType USER_ID

[sfdc-streaming-api-events:login]
EVAL-app = if('Application'=="N/A", "salesforce", 'Application')
EVAL-action = if(isnotnull('Status') AND match('Status', ".*(f|F)ail.*|.*(l|L)ock.*|.*(I|i)nvalid.*|.*(R|r)estrict.*|.*(I|i)nactive.*"), "failure", if(isnotnull('Status') AND match('Status', ".*(S|s)uccess.*"), "success", if(LoginAsCategory="OrgAdmin" AND isnull('Status') ,"success",null())))
EVAL-user_agent = if(user_agent="Unknown",null(), 'user_agent')
EVAL-authentication_method = if(isnotnull('authentication_method') AND NOT authentication_method="null",'authentication_method','LoginType')
EVAL-authentication_service = if(isnotnull('authentication_service') AND NOT authentication_service="null",'authentication_service',null())
EVAL-src_ip = 'SourceIp'
EVAL-user_agent = if(user_agent="Unknown",null(), 'user_agent')
EVAL-signature = if(Status=="Success", null(), 'Status')
EVAL-vendor = "Salesforce"
EVAL-vendor_product = "Salesforce"
EVAL-status = if(isnotnull('Status') AND match('Status', ".*(f|F)ail.*|.*(l|L)ock.*|.*(I|i)nvalid.*|.*(R|r)estrict.*|.*(I|i)nactive.*"), "failure", if(isnotnull('Status') AND match('Status', ".*(S|s)uccess.*"), "success", if(LoginAsCategory="OrgAdmin" AND isnull('Status') ,"success",null())))
EVAL-Status = if(isnotnull(Status), Status, "Success")

[sfdc-streaming-api-events:report]
EVAL-action = case(Operation=="ReportRunFromLightning","created",Operation=="DashboardComponentUpdated","updated",Operation=="ReportPreviewed","read",Operation=="ChartRenderedInEmbeddedAnalyticsApp","modified",Operation=="ReportExported","copied",Operation=="ReportRunUsingSynchronousApi","created",Operation=="ReportRunAndNotificationSent","created",Operation=="DashboardComponentPreviewed","read",Operation=="ProbeQuery","read",Operation=="ReportRunFromClassic","created",Operation=="Unknown","read",Operation=="ReportAddedToCampaign","modified",1=1,"read")
EVAL-app = "Salesforce"
EVAL-vendor_product = "Salesforce"
EVAL-email = if(match('Username',".*@.*"),'Username',null())
EVAL-object_attrs = 'Operation'
EVAL-signature = 'Operation'
EVAL-description = if(isnotnull('Description') AND Description!="null",'Description',null())
EVAL-src = if(isnotnull('SourceIp') AND SourceIp!="null",'SourceIp',null())
EVAL-src_ip = if(isnotnull('SourceIp') AND SourceIp!="null",'SourceIp',null())
EVAL-user = if(isnotnull('user'),'user',replace(_raw,".*\"Username\"\:\s+\"([^\"]*)\"\,\s+.*","\1"))
EVAL-ReportId = if(isnotnull('ReportId'),'ReportId',replace(_raw,".*\"ReportId\"\:\s+\"([^\"]*)\"\,\s+.*","\1"))
EVAL-object_id = if(isnotnull('object_id'),'object_id',replace(_raw,".*\"ReportId\"\:\s+\"([^\"]*)\"\,\s+.*","\1"))

[sfdc-streaming-api-events:security]
REPORT-ccx_sfdc_support_kv_parser = ccx_sfdc_support_kv_parser

EVAL-app =  if(isnull('Application') OR 'Application'=="N/A", "Salesforce", 'Application')
EVAL-body = 'Summary'
EVAL-description = 'Summary'
EVAL-id = 'EventIdentifier'
EVAL-severity = if(isnotnull('Severity') OR isnotnull('severity'),coalesce('Severity','severity'),"unknown")
EVAL-vendor_product = "Salesforce"
EVAL-src = if(isnotnull('src'),'src','SourceIp')
EVAL-src_ip = coalesce('src','SourceIp')
EVAL-signature = if(isnotnull('Signature') OR isnotnull('signature'),coalesce('Signature','signature'),replace('Summary',"^((?:(?!\,).)*)\,.*","\1"))
EVAL-subject = if(isnotnull('Signature') OR isnotnull('signature'),coalesce('Signature','signature'),replace('Summary',"^((?:(?!\,).)*)\,.*","\1"))
EVAL-type = if(isnull('securityEventType'),"alert",null())

[sfdc:logfile]
LOOKUP-ccx_salesforce_sfdc_logfile = ccx_salesforce_sfdc_logfile EVENT_TYPE OUTPUTNEW action change_type dataset_name type

EVAL-action = case('EVENT_TYPE' IN ("Login", "LoginAs") AND LOGIN_STATUS="LOGIN_NO_ERROR", "success",'EVENT_TYPE' IN ("Login", "LoginAs") AND LOGIN_STATUS!="LOGIN_NO_ERROR", "failure", 'DML_TYPE'=="UPDATE", "updated", 'DML_TYPE'=="INSERT", "created", 'DML_TYPE'=="DELETE", "deleted", 'EVENT_TYPE'=="Logout", "logoff", 'EVENT_TYPE'=="PermissionUpdate", "updated", 'ACTION'=="query", "read", 'ACTION'=="insert", "created", 'ACTION'=="delete", "deleted", 'ACTION' IN ("update", "upsert"), "updated", 'SHARING_OPERATION'=="INSERT", "created", 'SHARING_OPERATION'=="UPDATE", "updated", 'SHARING_OPERATION'=="DELETE", "deleted", 'TRANSACTION_TYPE'=="saveVersion", "uploaded", 'TRANSACTION_TYPE' IN ("VersionDownloadAction", "VersionDownloadApi") OR 'EVENT_TYPE'=="DocumentAttachmentDownloads", "downloaded", 'OPERATION'=="AddedGroupMember", "granted", 'OPERATION'=="DeletedGroupMember", "revoked", 'TRANSACTION_TYPE'=="VersionRenditionDownload", "read", (EVENT_TYPE="URI" OR EVENT_TYPE="RestApi" OR EVENT_TYPE="VisualforceRequest") AND REQUEST_STATUS=="S", "OK", (EVENT_TYPE="URI" OR EVENT_TYPE="RestApi" OR EVENT_TYPE="VisualforceRequest") AND REQUEST_STATUS=="A", "Unauthorized", (EVENT_TYPE="URI" OR EVENT_TYPE="RestApi" OR EVENT_TYPE="VisualforceRequest") AND REQUEST_STATUS=="R", "Found", (EVENT_TYPE="URI" OR EVENT_TYPE="RestApi" OR EVENT_TYPE="VisualforceRequest") AND REQUEST_STATUS=="N", "Not Found", (EVENT_TYPE="URI" OR EVENT_TYPE="RestApi" OR EVENT_TYPE="VisualforceRequest") AND REQUEST_STATUS=="F", "Bad Request", (EVENT_TYPE="URI" OR EVENT_TYPE="RestApi" OR EVENT_TYPE="VisualforceRequest") AND REQUEST_STATUS=="U", "Undefined", (EVENT_TYPE="URI" OR EVENT_TYPE="RestApi" OR EVENT_TYPE="VisualforceRequest"), "unknown", EVENT_TYPE="Login" AND LOGIN_STATUS="LOGIN_NO_ERROR", "success", EVENT_TYPE="Logout", "logoff", HTTP_METHOD="GET" or HTTP_METHOD="HEAD", "read", HTTP_METHOD="POST", "created", HTTP_METHOD="PUT" or HTTP_METHOD="PATCH", "modified", HTTP_METHOD="DELETE", "deleted", METHOD="GET" or METHOD="HEAD", "read", METHOD="POST", "created", METHOD="PUT" or METHOD="PATCH", "modified", METHOD="DELETE", "deleted", match(METHOD_NAME, "insert"), "created", match(METHOD_NAME, "update"), "modified", match(METHOD_NAME, "delete"), "deleted", match(METHOD_NAME, "query"), "read", match(METHOD_NAME, "retrieve"), "read", match(METHOD_NAME, "get"), "read", true(), "unknown")
EVAL-app = "Salesforce"
EVAL-body = case(('EVENT_TYPE' IN ("ApexUnexpectedException", "InsecureExternalAssets", "InsufficientAccess", "InsufficientAccess", "LightningError", "PackageInstall", "QueuedExecution", "Report", "ReportExport", "Search", "SearchClick", "TransactionSecurity", "UiTelemetryNavigationTiming", "WaveChange", "WaveInteraction")), 'EVENT_TYPE' + if(isnotnull('ENTRY_POINT'), " - ".'ENTRY_POINT', ""))
EVAL-description = case(('EVENT_TYPE' IN ("ApexUnexpectedException", "InsecureExternalAssets", "InsufficientAccess", "InsufficientAccess", "LightningError", "PackageInstall", "QueuedExecution", "Report", "ReportExport", "Search", "SearchClick", "TransactionSecurity", "UiTelemetryNavigationTiming", "WaveChange", "WaveInteraction")), 'EVENT_TYPE' + if(isnotnull('ENTRY_POINT'), " - ".'ENTRY_POINT', ""))
EVAL-object = case('EVENT_TYPE'=="PermissionUpdate", replace('DESCRIPTION', "Field\s+permission\s+for\s+(\S+)\s+.+", "\1"), 'EVENT_TYPE'=="ExternalODataCallout", 'ENTITY', 'EVENT_TYPE'=="ContentDocumentLink" OR 'EVENT_TYPE'=="ContentTransfer", 'DOCUMENT_ID', 'EVENT_TYPE'=="DocumentAttachmentDownloads", 'ENTITY_ID', 'EVENT_TYPE'=="GroupMembership", 'USER_ID', 'EVENT_TYPE'=="Logout", 'USER_ID', 1==1, 'ENTITY_NAME')
EVAL-signature = case(('EVENT_TYPE' IN ("ApexUnexpectedException", "InsecureExternalAssets", "InsufficientAccess", "InsufficientAccess", "LightningError", "PackageInstall", "QueuedExecution", "Report", "ReportExport", "Search", "SearchClick", "TransactionSecurity", "UiTelemetryNavigationTiming", "WaveChange", "WaveInteraction")), 'EVENT_TYPE', ('EVENT_TYPE' IN ("Login", "LoginAs")), 'LOGIN_STATUS')
EVAL-subject = case(('EVENT_TYPE' IN ("ApexUnexpectedException", "InsecureExternalAssets", "InsufficientAccess", "InsufficientAccess", "LightningError", "PackageInstall", "QueuedExecution", "Report", "ReportExport", "Search", "SearchClick", "TransactionSecurity", "UiTelemetryNavigationTiming", "WaveChange", "WaveInteraction")), 'EVENT_TYPE' + if(isnotnull('ENTRY_POINT'), " - ".'ENTRY_POINT', ""))
EVAL-vendor_product = "Salesforce"