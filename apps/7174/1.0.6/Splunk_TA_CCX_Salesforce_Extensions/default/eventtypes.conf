[ccx_salesforce_authentication]
search = ((sourcetype="sfdc:loginhistory") OR ((sourcetype="sfdc:setupaudittrail") attributes.type="SetupAuditTrail" (Action="*login*" AND NOT Action="*revoke*" AND NOT Action="*granted*" AND NOT Display="*changed*"))) OR ((sourcetype="sfdc-streaming-api-events:login") AND LoginType="*")
# tags = authentication

[ccx_salesforce_account_attributes]
search = (sourcetype="sfdc:user") attributes.type="User"

[ccx_salesforce_reports]
search = (sourcetype="sfdc:report") attributes.type="Report"

[ccx_salesforce_setup_audit_trail]
search = (sourcetype="sfdc:setupaudittrail") attributes.type="SetupAuditTrail" NOT Display IN ("suloginaccessused", "suOrgAdminLogin", "suNetworkAdminLogin") NOT Action="nonSecurityReviewedManagedPackageInstalled" NOT Action="insertConnectedApplication"\
NOT Action="value_MAX_STREAMING_TOPICS_PROV" NOT Action="remoteproxy" OR (Display="WorkOrder*" AND NOT Display IN ("*Initiated*", "*Completed*", "*requested*")) NOT eventtype IN ("ccx_salesforce_authentication", "ccx_salesforce_setup_audit_trail_alerts")
# tags = audit change

[ccx_salesforce_dashboard]
search = (sourcetype="sfdc:dashboard") attributes.type="Dashboard"

[ccx_salesforce_setup_audit_trail_alerts]
search = (sourcetype="sfdc:setupaudittrail") attributes.type="SetupAuditTrail" Action="nonSecurityReviewedManagedPackageInstalled" OR Action="insertConnectedApplication" OR (Display IN ("*Initiated*", "*Completed*", "*requested*") NOT Display="*WorkOrder*" AND NOT Display="*Work Order*" AND NOT Action="PermSetFlsChanged") OR Action="value_MAX_STREAMING_TOPICS_PROV" AND NOT Action="changedLightningWebComponent" AND NOT Action="changedAuraComponent"
# tags = alert

[ccx_salesforce_setup_audit_trail_alerts_extended]
search = (sourcetype="sfdc:setupaudittrail") dataset_name="alert" NOT eventtype="ccx_salesforce_setup_audit_trail_alerts"
# tags = alert

[ccx_salesforce_setup_audit_trail_remote_proxy]
search = (sourcetype="sfdc:setupaudittrail") attributes.type="SetupAuditTrail" Action="remoteproxy"

[ccx_salesforce_streaming_api_events]
search = (sourcetype="sfdc-streaming-api-*") NOT eventtype IN("ccx_salesforce_authentication","ccx_salesforce_streaming_api_login_reports")

[ccx_salesforce_streaming_api_login_reports]
search = (sourcetype="sfdc-streaming-api-events:report") LoginType="*"

[ccx_salesforce_streaming_api_events_security_alerts]
search = (sourcetype=sfdc-streaming-api-events:security) SecurityEventData="*"
# tags = alert

[ccx_salesforce_sfdc_logfile_alert]
search = (sourcetype="sfdc:logfile") dataset_name="alert"
# tags = alert

[ccx_salesforce_sfdc_logfile_authentication]
search = (sourcetype="sfdc:logfile") dataset_name="auth"
# tags = authentication

[ccx_salesforce_sfdc_logfile_change]
search = (sourcetype="sfdc:logfile") dataset_name="change"
# tags = change

[ccx_salesforce_sfdc_logfile_dashboard]
search = (sourcetype="sfdc:logfile") dataset_name="dashboard"

[ccx_salesforce_sfdc_logfile_data_access]
search = (sourcetype="sfdc:logfile") dataset_name="data_access"
# tags = data access

[ccx_salesforce_sfdc_logfile_flow]
search = (sourcetype="sfdc:logfile") dataset_name="flow"

[ccx_salesforce_sfdc_logfile_knowledge_article]
search = (sourcetype="sfdc:logfile") dataset_name="knowledge_article"

[ccx_salesforce_sfdc_logfile_lightning_events]
search = (sourcetype="sfdc:logfile") dataset_name="lightning"

[ccx_salesforce_sfdc_logfile_report]
search = (sourcetype="sfdc:logfile") dataset_name="report"

[ccx_salesforce_sfdc_logfile_sandbox]
search = (sourcetype="sfdc:logfile") dataset_name="sandbox"

[ccx_salesforce_sfdc_logfile_usage]
search = (sourcetype="sfdc:logfile") dataset_name="usage"

