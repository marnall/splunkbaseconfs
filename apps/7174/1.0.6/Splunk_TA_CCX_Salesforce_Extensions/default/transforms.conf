[ccx_salesforce_login_user]
CLEAN_KEYS = 0
REGEX = .+Display\"\:\s\"(?:Logged\s+in\s+using(.*)\s+Login-As\s+access\s+for\s+)(?<login_user>[^\"]+)\".+

[ccx_salesforce_audittrail_change_details]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_salesforce_audittrail_change_details.csv
match_type = WILDCARD(Display)
max_matches = 1

[ccx_lookup_sfdc_usernames]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_lookup_sfdc_usernames.csv

[ccx_sfdc_support_kv_parser]
FORMAT = $1::$2
MV_ADD = 1
REGEX = \\\"featureName\\\":\\\"((?:(?!\\\"\,\\\"featureValue).)*)\\\"\,\\\"featureValue\\\":\\\"((?:(?!\\\"\,\\\"featureContribution).)*)\\\"\,\\\"featureContribution

[ccx_salesforce_sfdc_logfile]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_salesforce_sfdc_logfile.csv
