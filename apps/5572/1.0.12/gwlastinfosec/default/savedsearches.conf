[GW LastinfoSec - Collect Savedsearch (Scheduled)]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */8 * * * *
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = gtwlis3
request.ui_dispatch_view = search
schedule_priority = higher
schedule_window = 15
workload_pool = undefined
enableSched = 1
run_on_startup = true
allow_skew = 25%
search = | `gwlis_get_api_url_api_key`\
| collect `gwlis_setup_debug_index` testmode=`gwlis_setup_debug_disable`  marker=debug=lis-get-api-json\
| eval _time=now()\
| table _time message\
| eval total=mvcount(message)\
| mvexpand message\
| spath input=message  path=CaseId output=CaseId\
| spath input=message  path=UpdatedDate output=UpdatedDate\
| spath input=message path="IOCs{}" output=IOCs\
| fields - message\
| mvexpand IOCs\
| spath input=IOCs\
| rename *{} as *, ExternalLinks{}.* as ExternalLinks.*\
| eval EpochUpdatedDate=strptime(UpdatedDate,"%Y-%m-%dT%H:%M:%S.%3N%z")\
| eval EpochCreationDate=strptime(CreationDate,"%Y-%m-%dT%H:%M:%S.%3N%z")\
| fields - IOCs\
| rename ExternalLinks.source_name as ExternalLinks_source_name, ExternalLinks.url as ExternalLinks_url, MetaData.filetype as MetaData_filetype, MetaData.lang as MetaData_lang, MetaData.ssdeep as MetaData_ssdeep, MetaData.tslh as MetaData_tslh, MetaData.imphash as MetaData_imphash\
| collect `gwlis_setup_debug_index` testmode=`gwlis_setup_debug_disable`  marker=debug=lis-build-individual-ioc\
| table _time CaseId IocId CreationDate EpochCreationDate UpdatedDate EpochUpdatedDate Type Value Categories ExternalLinks_source_name ExternalLinks_url Families ThreatActor MetaData_filetype MetaData_imphash MetaData_lang MetaData_ssdeep MetaData_tslh MetaData_usageMode Relations Risk TLP TTP Tags UsageMode Vulnerabilities TargetedOrganizations TargetedPlatforms TargetedSectors throw\
| append[ |inputlookup Filename_lastinfosecioc_kv]\
| append[ |inputlookup MD5_lastinfosecioc_kv]\
| append[ |inputlookup SHA1_lastinfosecioc_kv]\
| append[ |inputlookup SHA256_lastinfosecioc_kv]\
| append[ |inputlookup URL_lastinfosecioc_kv]\
| append[ |inputlookup Host_lastinfosecioc_kv]\
| eval epoch_time_now = strftime(now(),"%s")\
| eval time_delta = (epoch_time_now-EpochUpdatedDate)\
| eval throw = if(time_delta>=(`gwlis_setup_data_conservation`*3600*24),"True","False")\
| search throw="False"\
| fields - epoch_time_now, time_delta,throw\
| dedup CaseId IocId  sortby -EpochUpdatedDate \
|appendpipe[| search Type=Filename | sort [makeresults | eval filename_conservation=round(`gwlis_filename_conservation_size`/127) | return $filename_conservation] -EpochUpdatedDate| outputlookup Filename_lastinfosecioc_kv]\
|appendpipe[| search Type=MD5 | sort [makeresults | eval md5_conservation=round(`gwlis_md5_conservation_size`/127) | return $md5_conservation] -EpochUpdatedDate| outputlookup MD5_lastinfosecioc_kv]\
|appendpipe[| search Type=Host | sort [makeresults | eval host_conservation=round(`gwlis_host_conservation_size`/127) | return $host_conservation] -EpochUpdatedDate| outputlookup Host_lastinfosecioc_kv]\
|appendpipe[| search Type=URL | sort [makeresults | eval url_conservation=round(`gwlis_url_conservation_size`/127) | return $url_conservation] -EpochUpdatedDate| outputlookup URL_lastinfosecioc_kv]\
|appendpipe[| search Type=SHA1 | sort [makeresults | eval sha1_conservation=round(`gwlis_sha1_conservation_size`/127) | return $sha1_conservation] -EpochUpdatedDate| outputlookup SHA1_lastinfosecioc_kv]\
|appendpipe[| search Type=SHA256 | sort [makeresults | eval sha256_conservation=round(`gwlis_sha256_conservation_size`/127) | return $sha256_conservation] -EpochUpdatedDate| outputlookup SHA256_lastinfosecioc_kv]
