# IP Mapping
[ciso_autocomplete]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -7d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = ciso_dashboard
request.ui_dispatch_view = search
search = | inputlookup activity_geolocation \
| eval full_location=replace(city.", ".region.", ".country, "-, ", "") \
| where like(lower(full_location), lower("%"."$query_string$"."%")) \
| head 10 \
| replace "-" with "" in city region country \
| table id city region country

[ciso_list_ip_mapping]
search = | inputlookup accellion_ciso_ip_geolocation_mapping \
| eval key=_key \
| lookup activity_geolocation id AS geolocation_id OUTPUT city region country \
| replace "-" with "" in city region country \
| table key ip_range city region country geolocation_id

[ciso_add_ip_mapping]
search = | makeresults \
| eval ip_range="$ip_range$" \
| eval geolocation_id="$pos_id$" \
| makemv delim="," ip_range \
| makemv delim="," geolocation_id \
| eval zip=mvzip(ip_range, geolocation_id) \
| mvexpand zip \
| makemv delim="," zip \
| eval ip_range=mvindex(zip, 0) \
| eval geolocation_id=mvindex(zip, 1) \
| regex ip_range=`regex_ip_range` \
| lookup accellion_ciso_ip_geolocation_mapping ip_range OUTPUT ip_range AS ip_range_exist \
| lookup activity_geolocation id AS geolocation_id OUTPUT id AS geolocation_id_exist \
| where isnull(ip_range_exist) \
| search geolocation_id_exist!=null \
| dedup ip_range \
| table ip_range geolocation_id \
| outputlookup accellion_ciso_ip_geolocation_mapping append=t \
| eval zip=mvzip(ip_range, geolocation_id) \
| stats values(zip) AS success_zip \
| appendcols \
    [| makeresults \
    | eval ip_range="$ip_range$" \
    | eval geolocation_id="$pos_id$" \
    | makemv delim="," ip_range \
    | makemv delim="," geolocation_id \
    | eval zip=mvzip(ip_range, geolocation_id) \
    | mvexpand zip \
    | table zip] \
| filldown success_zip \
| eval find=mvfind(success_zip, zip) \
| where isnull(find) \
| mvexpand zip \
| makemv delim="," zip \
| eval ip_range=mvindex(zip, 0) \
| eval geolocation_id=mvindex(zip, 1) \
| table ip_range geolocation_id

[ciso_update_ip_mapping]
search = | makeresults \
| eval key="$id$" \
| eval ip_range="$ip_range$" \
| eval geolocation_id="$pos_id$" \
| makemv delim="," key \
| mvexpand key \
| dedup key \
| lookup accellion_ciso_ip_geolocation_mapping _key AS key OUTPUT ip_range AS old_ip_range geolocation_id AS old_geolocation_id \
| search old_ip_range!=null old_geolocation_id!=null \
| lookup accellion_ciso_ip_geolocation_mapping ip_range OUTPUT _key AS key_ip_exist \
| lookup activity_geolocation id AS geolocation_id OUTPUT id AS key_location_exist \
| eval ip_range=if(match(ip_range, `regex_ip_range`) AND isnull(key_ip_exist), ip_range, old_ip_range) \
| eval geolocation_id=if(!isnull(key_location_exist), geolocation_id, old_geolocation_id) \
| rename key AS _key \
| table _key ip_range geolocation_id \
| outputlookup accellion_ciso_ip_geolocation_mapping append=t \
| rename _key AS key \
| stats values(key) AS success_key \
| appendcols \
    [| makeresults \
    | eval key="$id$" \
    | eval ip_range="$ip_range$" \
    | eval geolocation_id="$pos_id$" \
    | makemv delim="," key \
    | mvexpand key \
    | table key ip_range geolocation_id] \
| filldown success_key \
| eval find=mvfind(success_key, key) \
| where isnull(find) \
| table key ip_range geolocation_id

[ciso_delete_ip_mapping]
search = | inputlookup accellion_ciso_ip_geolocation_mapping \
| eval key="$id$" \
| makemv delim="," key \
| eval key=mvdedup(key) \
| eval find=mvfind(key, _key) \
| where isnull(find) \
| table _key ip_range geolocation_id \
| outputlookup accellion_ciso_ip_geolocation_mapping \
| table _ \
| append \
    [| makeresults \
    | eval key="$id$" \
    | makemv delim="," key \
    | mvexpand key \
    | lookup accellion_ciso_ip_geolocation_mapping _key AS key OUTPUT _key AS key_exist \
    | where isnull(key_exist) \
    | table key]

[ciso_import_csv]
search = | makeresults \
| eval csv_string="$csv_string$" \
| rex field=csv_string max_match=0 "(?<enters>\\\n)" \
| where isnull(enters) OR mvcount(enters)+1<=`limit_csv_rows` \
| fields - enters \
| eval csv_string=replace(csv_string, ",\s+", ", ") \
| makemv delim="\n" csv_string \
| eval csv_string=mvdedup(csv_string) \
| mvexpand csv_string \
| rex max_match=0 field=csv_string `regex_ip_mapping_csv` \
| eval ip_range=mvindex(ip_range, 0) \
| where ip_range!="" \
| dedup ip_range \
| eval invalid=if(match(ip_range, `regex_ip_range`), null, ip_range) \
| eventstats list(invalid) AS invalid \
| where isnull(invalid) \
| fields - invalid \
| eval loc_country=mvindex(loc,-1) \
| eval loc_region=mvindex(loc,-2) \
| eval loc_city=mvindex(loc,-3) \
| fields - csv_string loc \
| eval temp_region=loc_region \
| eval temp_country=loc_country \
| eval loc_country=coalesce(loc_country, loc_region, loc_city) \
| eval loc_region=if(isnull(temp_country), null, loc_region) \
| eval loc_city=if(isnull(temp_region), null, loc_city) \
| eval loc_region=coalesce(loc_region, loc_city) \
| eval loc_city=if(isnull(temp_country), null, loc_city) \
| fields - temp_region temp_country \
| lookup activity_geolocation country AS loc_country OUTPUT id AS country_level_id \
| eval country_level_id=mvindex(country_level_id, 0) \
| lookup activity_geolocation region AS loc_region country AS loc_country OUTPUT id AS region_level_id \
| eval region_level_id=mvindex(region_level_id, 0) \
| lookup activity_geolocation city AS loc_city region AS loc_region country AS loc_country OUTPUT id AS city_level_id \
| eval city_level_id=mvindex(city_level_id, 0) \
| eval geolocation_id=coalesce(city_level_id, region_level_id, country_level_id, 0) \
| lookup accellion_ciso_ip_geolocation_mapping ip_range OUTPUT _key \
| table _key ip_range geolocation_id \
| outputlookup accellion_ciso_ip_geolocation_mapping append=true \
| fillnull value="-" _key \
| eval zip=mvzip(_key, ip_range) \
| eval geolocation_id=if(geolocation_id=0, 1, 0) \
| stats values(ip_range) AS success_ip sum(geolocation_id) AS count_location values(zip) AS success_zip \
| appendcols \
    [| makeresults \
    | eval csv_string="$csv_string$" \
    | eval csv_string=replace(csv_string, ",\s+", ", ") \
    | makemv delim="\n" csv_string \
    | mvexpand csv_string \
    | rex field=csv_string `regex_ip_mapping_csv` \
    | eval ip_range=mvindex(ip_range, 0) \
    | where ip_range!="" \
    | table ip_range] \
| append \
    [| makeresults \
    | eval ip_range=null] \
| filldown success_ip count_location success_zip \
| eval csv_string="$csv_string$" \
| rex field=csv_string max_match=0 "(?<enters>\\\n)" \
| eval invalid=case(mvcount(enters)+1>`limit_csv_rows`, `response_csv_limit_exceeded`, !match(ip_range, `regex_ip_range`), ip_range, 1=1, null) \
| eventstats count(eval(!isnull(mvfind(success_zip, "^-,".ip_range."$")))) AS added \
| eventstats count(eval(isnull(mvfind(success_zip, "^-,".ip_range."$")) AND !isnull(mvfind(success_ip, "^".ip_range."$")))) AS updated \
| eval total=if(invalid=`response_csv_limit_exceeded`, -1, added+updated) \
| eval unrecognized=coalesce(count_location, 0) \
| table invalid total added updated unrecognized

# Splunk Info
[ciso_version]
search = index="accellion_syslog" app_host!=null \
| head 1 \
| eval label="hostname" \
| table label app_host \
| rename app_host AS version \
| append \
    [| rest /services/apps/local \
    | search disabled=0 core=0 label="Accellion Ciso*" \
    | dedup label \
    | table label version] \
| eval sort_number=case(label="hostname", 3, like(label, "%Addon"), 2, 1=1, 1) \
| sort sort_number \
| fields - sort_number

[ciso_splunk_info]
search = | rest /services/apps/local/AccellionCiso \
| eval label="accellion_ciso_version" \
| rename version as value \
| table label value \
| append \
    [| rest /services/apps/local/AccellionCisoAddon \
    | eval label="accellion_ciso_addon_version" \
    | rename version as value \
    | table label value] \
| append \
    [| rest /services/server/info \
    | eval label="splunk_version" \
    | rename version as value \
    | table label value] \
| append \
    [| rest /services/server/info \
    | eval label="server_name" \
    | rename serverName as value \
    | table label value] \
| append \
    [| search index="accellion_syslog" event="forward_splunk_token" \
    | head 1 \
    | eval label="token" \
    | rename data.token as value \
    | table label value] \
| append \
    [| search index="accellion_syslog" app_host!=null \
    | head 1 \
    | eval label="hostname" \
    | rename app_host as value \
    | table label value]

# Alerts
[ciso_alert_list]
search = | pivot Kiteworks_CISO Suspicious_Download count(Suspicious_Download) AS count SPLITROW _time AS _time PERIOD second SPLITROW src AS src SPLITROW feature_name AS feature_name SPLITROW message AS message SPLITROW score AS score SPLITROW file_name AS file_name SPLITROW last_accessed AS last_accessed SPLITROW file_path AS file_path SPLITROW user AS user SORT 0 _time \
| iplocation src \
| appendcols \
    [| inputlookup accellion_ciso_ip_geolocation_mapping where geolocation_id!=0 \
    | append \
        [| makeresults \
        | eval ip_range="%" \
    | eval geolocation_id=""] \
| eval zip=ip_range.",".geolocation_id \
| stats values(zip) as zip] \
| filldown zip \
| eval zip=if(!isnull(lon) AND lon!="", "%,", zip) \
| mvexpand zip \
| makemv delim="," zip \
| eval ip_range=mvindex(zip, 0) \
| eval geolocation_id=mvindex(zip, 1) \
| makemv delim="-" ip_range \
| eval ip_test=src \
| eval low_ip_number=replace(mvindex(ip_range, 0), "\*", "%") \
| eval high_ip_number=mvindex(ip_range, 1) \
| `query_ip_leading_zero(ip=ip_test)` \
| `query_ip_leading_zero(ip=low_ip_number)` \
| `query_ip_leading_zero(ip=high_ip_number)` \
| where like(ip_test, low_ip_number) OR cidrmatch(low_ip_number, ip_test) OR (ip_test>=low_ip_number AND ip_test<=high_ip_number) \
| sort 0 - low_ip_number \
| dedup _time src feature_name message score file_name last_accessed file_path  \
| lookup activity_geolocation id AS geolocation_id OUTPUT city AS alt_City country AS alt_Country region AS alt_Region latitude AS alt_lat longitude AS alt_lon \
| eval City=if(isnull(lon) OR lon="", alt_City, City) \
| eval Country=if(isnull(lon) OR lon="", alt_Country, Country) \
| eval Region=if(isnull(lon) OR lon="", alt_Region, Region) \
| eval lat=if(isnull(lon) OR lon="", alt_lat, lat) \
| eval lon=if(isnull(lon) OR lon="", alt_lon, lon) \
| fields - ip_range low_ip_number high_ip_number geolocation_id alt_City alt_Country alt_Region alt_lat alt_lon zip ip_test \
| fillnull value="Unknown" City Country Region \
| replace "" with "Unknown", "-" with "Unknown" in City Country Region \
| fillnull value="-44" lat \
| fillnull value="-10" lon \
| table _time feature_name message score file_name last_accessed file_path City Country Region lat lon user src count

[ciso_events]
dispatch.earliest_time = -7d
dispatch.latest_time = now
action.email.useNSSubject = 1
alert.track = 0
search = | pivot Kiteworks_CISO Event_Syslog count(Event_Syslog) AS count SPLITROW _time AS _time PERIOD second SPLITROW user AS user SPLITROW client_device AS client_device SPLITROW activity AS activity SPLITROW user_agent AS user_agent SPLITROW src AS src SPLITROW hostname AS hostname SPLITROW message_subject AS message_subject SPLITROW file_name AS file_name SPLITROW file_path AS file_path SPLITROW file_size AS file_size SPLITROW sender AS sender SPLITROW recipient AS recipient SPLITROW flag AS flag FILTER flag in (1) FILTER user in ("*$user$*") SORT 0 _time ROWSUMMARY 0 COLSUMMARY 0 SHOWOTHER 1
