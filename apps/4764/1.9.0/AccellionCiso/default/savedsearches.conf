| dedup src \
| lookup activity_geolocation id AS geolocation_id OUTPUT city AS alt_City country AS alt_Country region AS alt_Region latitude AS alt_lat longitude AS alt_lon \
| eval City=if(isnull(lon) OR lon="", alt_City, City) \
| eval Country=if(isnull(lon) OR lon="", alt_Country, Country) \
| eval Region=if(isnull(lon) OR lon="", alt_Region, Region) \
| eval lat=if(isnull(lon) OR lon="", alt_lat, lat) \
