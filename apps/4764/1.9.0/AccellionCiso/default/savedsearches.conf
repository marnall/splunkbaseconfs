[ciso_map_filter_numbers]
dispatch.earliest_time = -7d
dispatch.latest_time = now
action.email.useNSSubject = 1
alert.track = 0
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | tstats count from datamodel=Kiteworks_CISO where nodename=CISO_Syslog AND CISO_Syslog.client_name IN ("$client_device$") AND CISO_Syslog.domain IN ("$domain$") AND CISO_Syslog.file_id IN ($file_id$) AND CISO_Syslog.user IN ("$username$") by nodename CISO_Syslog.src CISO_Syslog.file_count \
| search nodename IN (CISO_Syslog.Authentication.Successful, CISO_Syslog.Authentication.Failed, CISO_Syslog.File_Transfer.Uploads, CISO_Syslog.File_Transfer.Downloads, CISO_Syslog.Views, CISO_Syslog.Activities.Send, CISO_Syslog.Activities.Receive) \
| iplocation CISO_Syslog.src \
| fields - City lat \
| appendcols \
    [| inputlookup accellion_ciso_ip_geolocation_mapping where geolocation_id!=0 \
    | append \
        [| makeresults \
        | eval ip_range="%" \
        | eval geolocation_id=""] \
    | eval zip=ip_range.",".geolocation_id \
    | stats values(zip) as zip] \
| filldown zip \
| eval zip=if(!isnull(lon) AND lon!="", "%,", zip) \
| mvexpand zip \
| makemv delim="," zip \
| eval ip_range=mvindex(zip, 0) \
| eval geolocation_id=mvindex(zip, 1) \
| makemv delim="-" ip_range \
| eval ip_test='CISO_Syslog.src' \
| eval low_ip_number=replace(mvindex(ip_range, 0), "\*", "%") \
| eval high_ip_number=mvindex(ip_range, 1) \
| `query_ip_leading_zero(ip=ip_test)` \
| `query_ip_leading_zero(ip=low_ip_number)` \
| `query_ip_leading_zero(ip=high_ip_number)` \
| where like(ip_test, low_ip_number) OR cidrmatch(low_ip_number, ip_test) OR (ip_test>=low_ip_number AND ip_test<=high_ip_number) \
| sort 0 - low_ip_number \
| dedup nodename CISO_Syslog.src CISO_Syslog.file_count \
| lookup activity_geolocation id AS geolocation_id OUTPUT country AS alt_Country region AS alt_Region \
| eval Country=if(isnull(lon) OR lon="", alt_Country, Country) \
| eval Region=if(isnull(lon) OR lon="", alt_Region, Region) \
| fields - ip_range low_ip_number high_ip_number geolocation_id alt_Country alt_Region zip ip_test \
| fillnull value="Unknown" Country Region \
| replace "" with "Unknown", "-" with "Unknown" in Country Region \
| eval location=Country."/".Region \
| search location IN ("$region$") \
| eval CISO_Syslog.file_count=if(nodename="CISO_Syslog.Activities.Receive" OR nodename="CISO_Syslog.Activities.Send", 1, 'CISO_Syslog.file_count') \
| eval count=if('CISO_Syslog.file_count'>0, count*'CISO_Syslog.file_count', count) \
| stats sum(count) as count by nodename \
| rename nodename as filter_name \
| append \
    [| makeresults \
    | eval filter_name="CISO_Syslog.Authentication.Successful, CISO_Syslog.Authentication.Failed, CISO_Syslog.File_Transfer.Uploads, CISO_Syslog.File_Transfer.Downloads, CISO_Syslog.Views, CISO_Syslog.Activities.Send, CISO_Syslog.Activities.Receive" \
    | eval count = 0 \
    | makemv filter_name delim=", " \
    | mvexpand filter_name] \
| stats max(count) as count by filter_name

