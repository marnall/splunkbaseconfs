# Events
[ciso_successful_authentication]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -7d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = ciso_dashboard
request.ui_dispatch_view = search
search = | pivot Kiteworks_CISO Successful count(Successful) AS duplicates_count SPLITROW _time AS _time PERIOD second SPLITROW user AS user SPLITROW client_device AS client_device SPLITROW src AS src SPLITROW user_agent AS user_agent FILTER client_name in ("$client_device$") FILTER domain in ("$domain$") FILTER user in ("$username$") SORT 0 _time ROWSUMMARY 0 COLSUMMARY 0 SHOWOTHER 1 \
| iplocation src \
| fields - City \
| appendcols \
    [| inputlookup accellion_ciso_ip_geolocation_mapping where geolocation_id!=0 \
    | append \
        [| makeresults \
        | eval ip_range="%" \
        | eval geolocation_id=""] \
    | eval zip=ip_range.",".geolocation_id \
    | stats values(zip) as zip] \
| filldown zip \
| eval zip=if(!isnull(lon) AND lon!="", "%,", zip) \
| mvexpand zip \
| makemv delim="," zip \
| eval ip_range=mvindex(zip, 0) \
| eval geolocation_id=mvindex(zip, 1) \
| makemv delim="-" ip_range \
| eval ip_test=src \
| eval low_ip_number=replace(mvindex(ip_range, 0), "\*", "%") \
| eval high_ip_number=mvindex(ip_range, 1) \
| `query_ip_leading_zero(ip=ip_test)` \
| `query_ip_leading_zero(ip=low_ip_number)` \
| `query_ip_leading_zero(ip=high_ip_number)` \
| where like(ip_test, low_ip_number) OR cidrmatch(low_ip_number, ip_test) OR (ip_test>=low_ip_number AND ip_test<=high_ip_number) \
| sort 0 - low_ip_number \
| dedup _time user client_device src user_agent \
| lookup activity_geolocation id AS geolocation_id OUTPUT country AS alt_Country region AS alt_Region latitude AS alt_lat longitude AS alt_lon \
| eval Country=if(isnull(lon) OR lon="", alt_Country, Country) \
| eval Region=if(isnull(lon) OR lon="", alt_Region, Region) \
| eval lat=if(isnull(lon) OR lon="", alt_lat, lat) \
| eval lon=if(isnull(lon) OR lon="", alt_lon, lon) \
| fields - ip_range low_ip_number high_ip_number geolocation_id alt_Country alt_Region alt_lat alt_lon zip ip_test \
| fillnull value="Unknown" Country Region \
| replace "" with "Unknown", "-" with "Unknown" in Country Region \
| eval location=Country."/".Region \
| search location IN ("$region$") \
| eval position_id=lat.",".lon \
| fillnull value="0" position_id \
| search position_id = "$src_position_id$" \
| table _time user client_device src user_agent duplicates_count

