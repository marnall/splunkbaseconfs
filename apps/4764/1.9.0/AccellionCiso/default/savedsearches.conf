[ciso_downloads_count]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -7d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = ciso_dashboard
request.ui_dispatch_view = search
search = | pivot Kiteworks_CISO Downloads count(Downloads) AS count SPLITROW file_count AS file_count SPLITROW src AS src SPLITROW server_ip AS dest FILTER domain in ("$domain$") FILTER client_name in ("$client_device$") FILTER file_id in ($file_id$) FILTER user in ("$username$") ROWSUMMARY 0 COLSUMMARY 0 SHOWOTHER 1 \
| iplocation prefix=src_ src \
| fields - src_City \
| appendcols \
    [| inputlookup accellion_ciso_ip_geolocation_mapping where geolocation_id!=0 \
    | append \
        [| makeresults \
        | eval ip_range="%" \
        | eval geolocation_id=""] \
    | eval zip=ip_range.",".geolocation_id \
    | stats values(zip) as zip] \
| filldown zip \
| eval zip=if(!isnull(src_lon) AND src_lon!="", "%,", zip) \
| mvexpand zip \
| makemv delim="," zip \
| eval ip_range=mvindex(zip, 0) \
| eval geolocation_id=mvindex(zip, 1) \
| makemv delim="-" ip_range \
| eval ip_test=src \
| eval low_ip_number=replace(mvindex(ip_range, 0), "\*", "%") \
| eval high_ip_number=mvindex(ip_range, 1) \
| `query_ip_leading_zero(ip=ip_test)` \
| `query_ip_leading_zero(ip=low_ip_number)` \
| `query_ip_leading_zero(ip=high_ip_number)` \
| where like(ip_test, low_ip_number) OR cidrmatch(low_ip_number, ip_test) OR (ip_test>=low_ip_number AND ip_test<=high_ip_number) \
| sort 0 - low_ip_number \
| dedup file_count src dest \
| lookup activity_geolocation id AS geolocation_id OUTPUT country AS alt_Country region AS alt_Region latitude AS alt_lat longitude AS alt_lon \
| eval src_Country=if(isnull(src_lon) OR src_lon="", alt_Country, src_Country) \
| eval src_Region=if(isnull(src_lon) OR src_lon="", alt_Region, src_Region) \
| eval src_lat=if(isnull(src_lon) OR src_lon="", alt_lat, src_lat) \
| eval src_lon=if(isnull(src_lon) OR src_lon="", alt_lon, src_lon) \
| fields - ip_range low_ip_number high_ip_number geolocation_id alt_Country alt_Region alt_lat alt_lon zip ip_test \
| fillnull value="Unknown" src_Country src_Region \
| replace "" with "Unknown", "-" with "Unknown" in src_Country src_Region \
| eval location=src_Country."/".src_Region \
| search location IN ("$region$") \
| iplocation prefix=dest_ dest \
| fields - dest_City \
| appendcols \
    [| inputlookup accellion_ciso_ip_geolocation_mapping where geolocation_id!=0 \
    | append \
        [| makeresults \
        | eval ip_range="%" \
        | eval geolocation_id=""] \
    | eval zip=ip_range.",".geolocation_id \
    | stats values(zip) as zip] \
| filldown zip \
| eval zip=if(!isnull(dest_lon) AND dest_lon!="", "%,", zip) \
| mvexpand zip \
| makemv delim="," zip \
| eval ip_range=mvindex(zip, 0) \
| eval geolocation_id=mvindex(zip, 1) \
| makemv delim="-" ip_range \
| eval ip_test=dest \
| eval low_ip_number=replace(mvindex(ip_range, 0), "\*", "%") \
| eval high_ip_number=mvindex(ip_range, 1) \
| `query_ip_leading_zero(ip=ip_test)` \
| `query_ip_leading_zero(ip=low_ip_number)` \
| `query_ip_leading_zero(ip=high_ip_number)` \
| where like(ip_test, low_ip_number) OR cidrmatch(low_ip_number, ip_test) OR (ip_test>=low_ip_number AND ip_test<=high_ip_number) \
| sort 0 - low_ip_number \
| dedup file_count src dest \
| lookup activity_geolocation id AS geolocation_id OUTPUT country AS alt_Country region AS alt_Region latitude AS alt_lat longitude AS alt_lon \
| eval dest_Country=if(isnull(dest_lon) OR dest_lon="", alt_Country, dest_Country) \
| eval dest_Region=if(isnull(dest_lon) OR dest_lon="", alt_Region, dest_Region) \
| eval dest_lat=if(isnull(dest_lon) OR dest_lon="", alt_lat, dest_lat) \
| eval dest_lon=if(isnull(dest_lon) OR dest_lon="", alt_lon, dest_lon) \
| fields - ip_range low_ip_number high_ip_number geolocation_id alt_Country alt_Region alt_lat alt_lon zip ip_test \
| eval src_position_id=src_lat.",".src_lon \
| eval dest_position_id=dest_lat.",".dest_lon \
| fillnull value="0" src_position_id dest_position_id \
| search src_position_id="$src_position_id$" AND dest_position_id="$dest_position_id$" \
| eventstats sum(count) as event_count \
| eval count=if(file_count>0, count*file_count, count) \
| eventstats sum(count) as file_count \
| table event_count file_count \
| head 1

