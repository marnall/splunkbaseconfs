[scom-alert-host]
REGEX = (?m)ComputerName=(.+)
DEST_KEY = MetaData:Host
FORMAT = host::$1

[scom-event-host]
REGEX = (?m)ComputerName=(.+)
DEST_KEY = MetaData:Host
FORMAT = host::$1


[scom-alert-source]
REGEX = (?m)Severity=([^\r\n]+)
DEST_KEY = MetaData:Source
FORMAT = source::SCOM:Alerts

[scom-event-source]
REGEX = (?m)LogName=([^\r\n]+)
DEST_KEY = MetaData:Source
FORMAT = source::SCOM:Events:$1


[scom-alert-sourcetype]
REGEX = (?m)Severity=([^\r\n]+)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::SCOM:Alerts

[scom-event-sourcetype]
REGEX = (?m)LogName=([^\r\n]+)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::SCOM:Events:$1


[wel-message]
REGEX = (?sm)(?<_pre_msg>.+)\nMessage=(?<Message>.+)

[wel-eq-kv]
SOURCE_KEY = _pre_msg
DELIMS     = "\n","="
MV_ADD     = true

[wel-col-kv]
SOURCE_KEY = Message
REGEX      = \n([^:\n\r]+):[ \t]++([^\n]*)
FORMAT     = $1::$2
MV_ADD     = true
