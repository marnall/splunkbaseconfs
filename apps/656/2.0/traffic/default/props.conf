[source::rss_traffic]
EXTRACT-incident=Incidents:\s(?<Incidents>\d+)
EXTRACT-type=Incidents:\s\d+\s\((?<type>\w+)
EXTRACT-location=description=\"(?<location>[^:].*?)\:
EXTRACT-jamfactor=Jam\sFactor\s(?<jam_factor>\d+)
EXTRACT-highwayr=description\=\"(?<highway>.*?)\sfrom

LOOKUP-traffic_city_lookup = cityLocation city OUTPUTNEW latitude longitude
#Eval-Description = case(Incidents<=1, "Small-Accident", Incidents>1 AND Incidents<=4, "Mid-Accident", Incidents>4, "Large-Accident")

