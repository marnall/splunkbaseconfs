[Traffic - Top Cities with Incidents]
action.email.reportServerEnabled = 0
alert.track = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = source="rss_traffic"|dedup link|where jam_factor>5|top city
vsid = *:gnxo5z4p

[Traffic - Jam Factor by City over time]
action.email.reportServerEnabled = 0
alert.track = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
displayview = report_builder_display
request.ui_dispatch_view = report_builder_display
search = source="rss_traffic"|dedup link|timechart count(jam_factor) as "Count Jam Factor" by city
vsid = *:gnxoa3rx


[Traffic - Locations with more jam factor greater than 7]
action.email.reportServerEnabled = 0
alert.track = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
displayview = search
request.ui_dispatch_view = search
search = source=rss_traffic|dedup link|convert ctime(_time) as time|table time, jam_factor, city, location|sort - jam_factor|where jam_factor>7|rename jam_factor as "Jam Factor"
vsid = gnxpce0r

[Traffic - total jam factors by city and type]
action.email.reportServerEnabled = 0
alert.track = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
displayview = search
request.ui_dispatch_view = search
search = source="rss_traffic"|dedup link| rangemap field=jam_factor Minor=0-1 Moderate=2-4 Severe=5-10 default=Severe|rename range as type |stats sum(jam_factor) as total_jam_factor by city, type|xyseries city type total_jam_factor| eval t=1 | addcoltotals | sort t desc | eval city = if(t>1,"Totals",city) | fields - t | fillnull value=0 Minor Moderate Severe| table city *|rename city as City
vsid = go1mnye0

[Traffic - Categorize Severity Count by City]
action.email.reportServerEnabled = 0
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
displayview = search
request.ui_dispatch_view = search
search = source="rss_traffic"|dedup link|stats count AS values by city type | sort - values | stats list(type) AS categories list(values) AS data BY city | eval categories=mvindex(categories, 0, 10) | eval data=mvindex(data, 0, 10) | rename city AS name
vsid = hekqq3gn

