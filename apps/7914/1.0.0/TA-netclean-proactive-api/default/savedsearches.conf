search = | makeresults count=1 \
	| eval hash="fd2db383b0e96476e1a32581fe92d9dfe12225a6"\
	| sendalert netclean_proactive_api param.hash_field="hash"

[Netclean Proactive | Sample Generation Search]
cron_schedule = 0 3 * * *
disabled = 1
dispatch.earliest_time = -1d
search = | makeresults count=6\
	| streamstats count AS event_num\
	| eval hash=case(\
	event_num==1, "fd2db383b0e96476e1a32581fe92d9dfe12225a6",\
	event_num==2, "bfe289358e550f70cae3ae1ff7e662ce917dc139",\
	event_num==3, "cc67b84439107e1343b885baf5a1c11826dcac89",\
	event_num==4, "this_is_a_test",\
	true(), sha1("". random())\
	)\
	| fields - event_num
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.netclean_proactive_api = 1
action.netclean_proactive_api.param.hash = hash
action.netclean_proactive_api.param.hash_field = hash
action.netclean_proactive_api.param.input_type = hash_field
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-netclean-proactive-api
request.ui_dispatch_view = search

