[Netclean Proactive | Hash Found]
action.email = 1
action.email.message.alert = The alert condition for '$name$' was triggered.\
	\
	Search results: <a href="$_full_alert_link$">Results</a>\
	Dashboard link: <a href="$_dashboard_link$">Dashboard</a>
action.email.to = email@yourdomain.com
alert.digest_mode = 0
cron_schedule = 0 4 * * *
disabled = 1
search = index=netclean_proactive hit=true\
	| addinfo\
	| eval _full_alert_link = `netclean_link_host`+alert_link\
	| eval _dashboard_link = `netclean_link_host`+"/app/TA-netclean-proactive-api/netclean_proactive__hash_details?form.hash_token="+hash+"&form.global_time.earliest="+info_min_time+"&form.global_time.latest="+info_max_time\
	| table _time, hash, hit, alert_name, app_name, alert_link\
	| rename alert_name as trigger_alert, app_name as trigger_app
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-netclean-proactive-api
request.ui_dispatch_view = search

