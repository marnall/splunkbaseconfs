[launcher]
version = 2.0.1
description = This add-on delivers an alert action that uploads search results to an Amazon S3 bucket.
author = aserpi

[id]
version = 2.0.1
name = TA_amazon_s3_uploader

[install]
build = 1733867780
is_configured = false
state = enabled

[package]
id = TA_amazon_s3_uploader
check_for_updates = true

[ui]
label = Amazon S3 Uploader for Splunk
is_visible = true

[triggers]
reload.ta_amazon_s3_uploader_settings = simple
reload.ta_amazon_s3_uploader_account = simple
reload.ta_amazon_s3_uploader_role = simple
