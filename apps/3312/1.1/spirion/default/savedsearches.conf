[owner_input]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
search = `spirion_index` sourcetype=spirion_locations owner=* | stats dc(owner) by owner | table owner | sort owner

[hostName_input]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
search = `spirion_index` sourcetype=spirion_endpoints hostName=* | stats dc(hostName) by hostName | table hostName | sort hostName

[lastAction_input]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
search = `spirion_index` sourcetype=spirion_locations lastAction=* | stats dc(lastAction) by lastAction | table lastAction | sort lastAction

[classifications_input]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
search = `spirion_index` sourcetype=spirion_endpoints OR sourcetype=spirion_locations classifications{}.name=* | stats values(classifications{}.name) as classifications{}.name | mvexpand classifications{}.name | sort classifications{}.name

[dataTypes_input]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
search = `spirion_index` sourcetype=spirion_endpoints OR sourcetype=spirion_locations dataTypes{}.name=* | stats values(dataTypes{}.name) as dataTypes{}.name | mvexpand dataTypes{}.name | sort dataTypes{}.name
