[shibboleth:access-fields]
DELIMS    = "|"
FIELDS    = requestTime,remoteHost,serverHost,serverPort,requestPath

[shibboleth:audit-fields]
DELIMS    = "|"
FIELDS    = auditEventTime,requestBinding,requestId,relyingPartyId,messageProfileId,assertingPartyId,responseBinding,responseId,principalName,authNMethod,releasedAttributeId1,releasedAttributeId2,nameIdentifier,assertion1ID,assertion2ID

[shibboleth:audit-set-sourcetype]
REGEX     = ^(?:\d+\-\d+\-\d+\s+\d+:\d+:\d+,\d+\s+\-\s+\w+\s+\[\w+\-\w+\.\w+:\d+\]\s+\-\s+\d+\w+\d+\w+\|.*)
DEST_KEY  = MetaData:Sourcetype
FORMAT    = sourcetype::shibboleth:audit

[shibboleth:access-set-sourcetype]
REGEX     = ^(?:\d+\:\d+\:\d+\.\d+\s+\-\s\w+\s+\[+\bShibboleth-Access\b\:\d+\]+\s+\-\s+.*)
DEST_KEY  = MetaData:Sourcetype
FORMAT    = sourcetype::shibboleth:access

