[Threat - Digital Shadows Get Incidents - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Digital Shadows Get Incidents
action.customsearchbuilder.enabled = false
action.customsearchbuilder.spec = {}
action.notable = 1
action.notable.param.rule_description = This notable is created on digital shadows private incident.
action.notable.param.rule_title = Digital Shadows Incident
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.verbose = 0
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.threat_add.param.verbose = 0
alert.suppress = 0
alert.track = 1
disabled = 1
counttype = number of events
cron_schedule = */15 * * * *
description = This will create a notable event of incidents in every 15 minutes.
dispatch.earliest_time = -15m
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = index="main" (sourcetype="incidents" OR sourcetype="ds:searchlight:alerts") | eval severity=case(severity == "VERY_HIGH","critical", severity == "HIGH", "high", severity == "MEDIUM", "medium", (severity=="LOW" or severity=="VERY_LOW"),"low", severity=="NONE", "unknown")

[digital_shadows_ip_threat_lookup_search]
disabled = 1
cron_schedule = 0 * * * *
description = Updates the local lookup of the Threatlist for incidents
enableSched = 1
dispatch.earliest_time = -24h
dispatch.latest_time = now
search = `get_digitalshadows_index` `get_digitalshadows_alerts` source=digital_shadows subType=PHISHING_ATTEMPT | rename "entitySummary.domain" AS domain | eval description="This observable is sourced from Digital Shadows" | table description domain | outputlookup local_domain_intel append=t | append [search `get_digitalshadows_index` `get_digitalshadows_intel_ioc_incidents` source=digital_shadows type=URL | rename value AS url | eval description="This observable is sourced from Digital Shadows" | table description url | outputlookup local_http_intel append=t] | append [search `get_digitalshadows_index` `get_digitalshadows_intel_ioc_incidents` source=digital_shadows type=FILENAME | rename value AS file_name | eval description="This observable is sourced from Digital Shadows" | table description file_name | outputlookup local_file_intel append=t] | append [search `get_digitalshadows_index` `get_digitalshadows_intel_ioc_incidents` source=digital_shadows type IN ("IP","IPV4","IPV6") | rename value AS ip | eval description="This observable is sourced from Digital Shadows" | table description ip | outputlookup local_ip_intel append=t] | append [search `get_digitalshadows_index` `get_digitalshadows_intel_ioc_incidents` source=digital_shadows type IN ("MD5","SHA1","SHA256") | rename value AS file_hash | eval description="This observable is sourced from Digital Shadows" | table description file_hash | outputlookup local_file_intel append=t]