[script://./bin/updatecities.sh]
# 15 day interval
interval = 1296000
# Send stdout to the internal index
index = _internal
# Sourcetype of log messages
sourcetype = geolocate:cities_update
# Disable by default
disabled = 1

[script://./bin/updatecountry.sh]
# 15 day interval
interval = 1296000
# Send stdout to the internal index
index = _internal
# Sourcetype of log messages
sourcetype = geolocate:country_update
# Disable by default
disabled = 1
