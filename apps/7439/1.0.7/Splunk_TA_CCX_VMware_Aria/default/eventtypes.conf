
[ccx_vmware_aria_authentication]
search = sourcetype="ccx:vmware:aria" header_common_header_publisher="CSP Authentication" OR "*USER_LOGIN*" OR "*UserLoginSessionEvent*" OR "*BadUsernameSessionEvent*"
# tags = authentication

[ccx_vmware_aria_change]
search = sourcetype="ccx:vmware:aria" Operation IN ("*Read*", "List*", "Get*")
# tags = audit change

[ccx_vmware_aria_ids]
search = sourcetype="ccx:vmware:aria" category="A Network Trojan was Detected"
# tags = attack ids

[ccx_vmware_aria_logout]
search = sourcetype="ccx:vmware:aria" "*UserLogoutSessionEvent*"

[ccx_vmware_aria_network_traffic]
search = sourcetype="ccx:vmware:aria" msgid="FIREWALL" OR appname="FIREWALL-PKTLOG"
# tags = communicate network

[ccx_vmware_aria_script_event]
search = sourcetype="ccx:vmware:aria" process="CROND"
# tags = alert
