
[ccx_vmware_aria_kvp_extraction]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = \"([^\"]+)\"\:\[?\"?([^\"]+)\"?\]?(?:\,|\})

[ccx_vmware_aria_script_extraction]
CLEAN_KEYS = 0
REGEX = (.+)\s+(?<vendor_description>(?<vendor_device>\S+)\s+(?:CROND)\[(?<vendor_log_id>[^\]]+)\]\:\s+\((?<vendor_user>root)\).+)

[ccx_vmware_aria_user_login]
CLEAN_KEYS = 0
REGEX = .+(?:Avi-Controller)\s+(?<vendor_severity>\S+)\s+\[user\-(?<vendor_user>[^\:]+)\:\s+(?:reason)\:\s+(?<vendor_description>.+\((?<vendor_action>[^\)]+)\).+)

[ccx_vmware_aria_usersessionevent]
CLEAN_KEYS = 0
REGEX = .+(?<vendor_log_type>UserLoginSessionEvent|BadUsernameSessionEvent)\]\s+\[(?<vendor_severity>[^\]]+)\]\s+\[(?<vendor_user>[^\]]+)\].+\[(?<vendor_description>[^\]]+)\]$


[nsx_hostname]
DEST_KEY = MetaData:Host
REGEX = ^(?:\<)?\d+(?:\>)?.+?T\S+?\s(\S+?)\s.+
FORMAT = host::$1

[syslog_fields]
DELIMS = " "
FIELDS = "", "", "", "", "", "msgid"

[syslog-extractions]
CLEAN_KEYS = 1
FORMAT = process::$1 pid::$2
MV_ADD = 0
REGEX = \s([^\s\[]+)(?:\[(\d+)\])?:\s
