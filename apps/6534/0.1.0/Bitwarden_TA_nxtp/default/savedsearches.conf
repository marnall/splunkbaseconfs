[bitwarden_users_lookup_creation]
cron_schedule = 0 0 * * *
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
schedule_window = auto
enableSched = 0
dispatchAs = user
search = `bitwarden_index` sourcetype="bitwarden:users"\
| dedup id\
| mvexpand groups\
| join type=left groups [\
   search `bitwarden_index` sourcetype="bitwarden:groups"\
   | table id group_name\
   | rename id as groups\
] \
| stats values(*) as * by id\
| eval groups = mvjoin(group_name,", ")\
| table id user_bitwarden_id user_name user_email user_type user_risk groups\
| outputlookup bitwarden_users.csv



[bitwarden_groups_lookup_creation]
cron_schedule = 0 0 * * *
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
schedule_window = auto
enableSched = 0
dispatchAs = user
search = `bitwarden_index` sourcetype="bitwarden:groups"\
| dedup id\
| mvexpand members\
| join type=left members [\
   search `bitwarden_index` sourcetype="bitwarden:users"\
   | table id user_email\
   | rename id as members\
] \
| stats values(*) as * by id\
| eval members = mvjoin(user_email,", ")\
| table id group_bitwarden_id group_name group_risk members\
| outputlookup bitwarden_groups.csv
