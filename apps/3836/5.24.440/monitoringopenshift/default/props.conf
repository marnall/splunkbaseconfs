[(?::){0}openshift_*]
EVAL-openshift_cluster_eval  = coalesce(openshift_cluster, substr(mvfilter(match(openshift_node_labels, "^cluster=")), 9), "-")

[openshift_logs]
EVAL-openshift_container_unique_name = openshift_container_name+" ("+coalesce(openshift_pod_name, substr(openshift_container_id, 0, 12) + "...")+")"
EVAL-openshift_container_id_short = substr(openshift_container_id, 0, 12)

[source::/openshift/logs/...]
EVAL-openshift_container_unique_name = openshift_container_name+" ("+coalesce(openshift_pod_name, substr(openshift_container_id, 0, 12) + "...")+")"
EVAL-openshift_container_id_short = substr(openshift_container_id, 0, 12)
EVAL-openshift_cluster_eval  = coalesce(openshift_cluster, substr(mvfilter(match(openshift_node_labels, "^cluster=")), 9), "-")

[openshift_stats]
SEGMENTATION = none
REPORT-extract_openshift_stats = openshift_stats_fields

EVAL-openshift_container_unique_name = openshift_container_name+" ("+coalesce(openshift_pod_name, substr(openshift_container_id, 0, 12) + "...")+")"
EVAL-openshift_container_id_short = substr(openshift_container_id, 0, 12)

EVAL-openshift_stats_memory_mb = (cgroup__memory__stat__total_rss+cgroup__memory__stat__total_mapped_file)/1024/1024
EVAL-openshift_stats_memory_percent_of_host = 100*(cgroup__memory__stat__total_rss+cgroup__memory__stat__total_mapped_file)/proc__meminfo__memtotal
EVAL-openshift_stats_memory_percent_of_limit = 100*(cgroup__memory__stat__total_rss+cgroup__memory__stat__total_mapped_file)/openshift_container_resources_limits_memory
EVAL-openshift_stats_memory_rss_mb = cgroup__memory__stat__total_rss/1024/1024
EVAL-openshift_stats_memory_mapped_files_mb = cgroup__memory__stat__total_mapped_file/1024/1024
EVAL-openshift_stats_memory_swap_mb = nullif(cgroup__memory__stat__swap/1024/1024, 0)
EVAL-openshift_stats_memory_swap_total_mb = cgroup__memory__stat__total_swap/1024/1024
EVAL-openshift_stats_memory_limit_mb = openshift_container_resources_limits_memory/1024/1024
EVAL-openshift_stats_memory_request_mb = openshift_container_resources_requests_memory/1024/1024
EVAL-openshift_stats_memory_total_mb = proc__meminfo__memtotal/1024/1024
EVAL-openshift_stats_cpu_limit_percent = 100*openshift_container_resources_limits_cpu
EVAL-openshift_stats_cpu_limit_percent_of_host = openshift_stats_cpu_limit_percent/proc__stat__cpu_total
EVAL-openshift_stats_cpu_request_percent = 100*openshift_container_resources_requests_cpu
EVAL-openshift_stats_cpu_request_percent_of_host = openshift_stats_cpu_request_percent/proc__stat__cpu_total
EVAL-openshift_stats_cpu_throttled_percent = 100*cgroup__cpu__stat__throttled_time/period
EVAL-openshift_stats_cpu_throttled_cores = round(cgroup__cpu__stat__throttled_time/period, 3)
EVAL-openshift_stats_cpu_throttled_percent_of_host = openshift_stats_cpu_throttled_percent/proc__stat__cpu_count
EVAL-openshift_stats_cpu_user_percent = proc__stat__cpu_count*100*cgroup__cpuact__stat__user/proc__stat__cpu_total
EVAL-openshift_stats_cpu_user_cores = round(proc__stat__cpu_count*cgroup__cpuact__stat__user/proc__stat__cpu_total, 3)
EVAL-openshift_stats_cpu_user_percent_of_host = 100*cgroup__cpuact__stat__user/proc__stat__cpu_total
EVAL-openshift_stats_cpu_system_percent = proc__stat__cpu_count*100*cgroup__cpuact__stat__system/proc__stat__cpu_total
EVAL-openshift_stats_cpu_system_cores = round(proc__stat__cpu_count*cgroup__cpuact__stat__system/proc__stat__cpu_total, 3)
EVAL-openshift_stats_cpu_system_percent_of_host = 100*cgroup__cpuact__stat__system/proc__stat__cpu_total
EVAL-openshift_stats_cpu_percent = proc__stat__cpu_count*100*(cgroup__cpuact__stat__user+cgroup__cpuact__stat__system)/proc__stat__cpu_total
EVAL-openshift_stats_cpu_percent_of_host = 100*(cgroup__cpuact__stat__user+cgroup__cpuact__stat__system)/proc__stat__cpu_total
EVAL-openshift_stats_cpu_percent_of_limit = proc__stat__cpu_count*100*(cgroup__cpuact__stat__user+cgroup__cpuact__stat__system)/proc__stat__cpu_total/openshift_container_resources_limits_cpu
EVAL-openshift_stats_io_read_mb = nullif(cgroup__blkio__io_service_bytes_recursive__read_total/1024/1024, 0)
EVAL-openshift_stats_io_write_mb = nullif(cgroup__blkio__io_service_bytes_recursive__write_total/1024/1024, 0)
EVAL-openshift_stats_io_wait_read_percent = nullif(cgroup__blkio__io_wait_time_recursive__read_total/period, 0)
EVAL-openshift_stats_io_wait_write_percent = nullif(cgroup__blkio__io_wait_time_recursive__write_total/period, 0)
EVAL-openshift_stats_last_seen = max(floor((now()-_time)/60), 0)

[openshift_stats_v2_host]
SEGMENTATION = none
REPORT-extract_openshift_stats_v2_host = openshift_stats_fields_v2_host

EVAL-proc__stat__cpu_count = cpu_count
EVAL-proc__meminfo__memtotal = memory_total_bytes
EVAL-openshift_stats_cpu_percent = (cpu_system_percent+cpu_user_percent)
EVAL-openshift_stats_cpu_percent_of_host = (cpu_system_percent+cpu_user_percent)/cpu_count
EVAL-openshift_stats_cpu_user_percent_of_host = (cpu_user_percent)/cpu_count
EVAL-openshift_stats_cpu_system_percent_of_host = (cpu_system_percent)/cpu_count
EVAL-openshift_stats_cpu_user_percent = (cpu_user_percent)
EVAL-openshift_stats_cpu_system_percent = (cpu_system_percent)
EVAL-openshift_stats_cpu_user_cores = round(cpu_user_percent/100, 3)
EVAL-openshift_stats_cpu_system_cores = round(cpu_system_percent/100, 3)
EVAL-openshift_stats_memory_percent_of_host = 100*(memory_rss_bytes+coalesce(memory_mapped_files_bytes,0))/memory_total_bytes
EVAL-openshift_stats_memory_rss_mb = memory_rss_bytes/1024/1024
EVAL-openshift_stats_memory_mapped_files_mb = memory_mapped_files_bytes/1024/1024
EVAL-openshift_stats_memory_total_mb = memory_total_bytes/1024/1024
EVAL-proc__meminfo__swaptotal = memory_swap_total_bytes
EVAL-proc__meminfo__swapfree = (memory_swap_total_bytes-memory_swap_bytes)
EVAL-openshift_stats_last_seen = max(floor((now()-_time)/60), 0)
EVAL-proc__sys__kernel__ostype = ostype
EVAL-proc__sys__kernel__osrelease = osrelease
EVAL-proc__stat__uptime_seconds = uptime_sec
EVAL-openshift_stats_io_wait_read_percent = io_wait_read_percent
EVAL-openshift_stats_io_wait_write_percent = io_wait_write_percent
EVAL-openshift_stats_io_read_mb = io_read_bytes/1024/1024
EVAL-openshift_stats_io_write_mb = io_write_bytes/1024/1024

[openshift_stats_v2_cgroup]
SEGMENTATION = none
REPORT-extract_openshift_stats_v2_cgroup = openshift_stats_fields_v2_cgroup

EVAL-openshift_container_id_short = substr(openshift_container_id, 0, 12)
EVAL-openshift_container_unique_name = openshift_container_name+" ("+substr(openshift_container_id, 0, 12)+")"
FIELDALIAS-openshift_container_image_id = openshift_container_image_id AS openshift_container_imageid
EVAL-openshift_stats_last_seen = max(floor((now()-_time)/60), 0)
EVAL-openshift_stats_cpu_user_percent = (cpu_user_percent)
EVAL-openshift_stats_cpu_system_percent = (cpu_system_percent)
EVAL-openshift_stats_cpu_percent = (cpu_system_percent+cpu_user_percent)
EVAL-openshift_stats_cpu_user_cores =  round(cpu_user_percent/100, 3)
EVAL-openshift_stats_cpu_system_cores = round(cpu_system_percent/100, 3)
EVAL-openshift_stats_cpu_cores = round((cpu_user_percent+cpu_system_percent)/100, 3)
EVAL-openshift_stats_cpu_percent_of_limit = 100*(cpu_system_percent+cpu_user_percent)/cpu_limit_percent
EVAL-openshift_stats_memory_mb = (memory_rss_bytes+coalesce(memory_mapped_files_bytes,0))/1024/1024
EVAL-openshift_stats_memory_percent_of_limit = 100*(memory_rss_bytes+coalesce(memory_mapped_files_bytes,0))/memory_limit_bytes
EVAL-openshift_stats_memory_limit_mb = memory_limit_bytes/1024/1024
EVAL-openshift_stats_memory_request_mb = memory_request_bytes/1024/1024
EVAL-openshift_stats_cpu_limit_percent = cpu_limit_percent
EVAL-openshift_stats_cpu_request_percent = cpu_request_percent
EVAL-openshift_stats_cpu_limit_cores = round(cpu_limit_percent/100, 3)
EVAL-openshift_stats_cpu_request_cores = round(cpu_request_percent/100, 3)
EVAL-openshift_stats_memory_rss_mb = memory_rss_bytes/1024/1024
EVAL-openshift_stats_memory_mapped_files_mb = memory_mapped_files_bytes/1024/1024
EVAL-openshift_stats_cpu_throttled_percent = cpu_throttled_percent
EVAL-openshift_stats_cpu_throttled_cores = round(cpu_throttled_percent/100, 3)
EVAL-openshift_stats_io_wait_read_percent = io_wait_read_percent
EVAL-openshift_stats_io_wait_write_percent = io_wait_write_percent
EVAL-openshift_stats_io_read_mb = io_read_bytes/1024/1024
EVAL-openshift_stats_io_write_mb = io_write_bytes/1024/1024
EVAL-openshift_container_resources_limits_cpu = cpu_limit_percent/100
EVAL-openshift_container_resources_requests_cpu = cpu_request_percent/100
EVAL-openshift_container_resources_limits_memory = memory_limit_bytes
EVAL-openshift_container_resources_requests_memory = memory_request_bytes

