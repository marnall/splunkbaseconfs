
[docusign:monitor]

REPORT-ccx_docusign_monitor_vendor_action = ccx_docusign_monitor_vendor_action

EVAL-action = case('vendor_action'=="Login", lower('ds_result'))
EVAL-app = case(('vendor_action' IN ("Downloaded", "SameSenderAndSigner", "Sent","Signed")) OR ('vendor_action'=="Login"), "DocuSign")
EVAL-body = case('vendor_action' IN ("Downloaded", "SameSenderAndSigner", "Sent","Signed"), 'vendor_action')
EVAL-change_type = case('vendor_action' IN ("Activated", "Added", "AdminAdded", "Created", "Deactivated", "Deleted", "Updated", "UserDeleted", "Voided"), case('vendor_action' IN ("Created", "Voided", "Deleted", "Updated"), "filesystem", 'vendor_action' IN ("Activated", "Deactivated") OR like('vendor_action', "%User%") OR like('vendor_action', "%Added%"), "AAA"))
EVAL-description = case('vendor_action' IN ("Downloaded", "SameSenderAndSigner", "Sent","Signed"), 'vendor_action')
EVAL-reason = case('vendor_action'=="Login", 'ds_result')
# severity taken from https://support.docusign.com/s/document-item?language=en_US&bundleId=gso1581445176035&topicId=ndg1611704350867.html&_LANG=enus
EVAL-severity = case('vendor_action' IN ("Downloaded", "SameSenderAndSigner", "Sent","Signed"), case('data.Severity'=="low", "low", 'data.Severity'=="medium", "medium", 'data.Severity'=="high", "high", 'data.Severity'=="critical", "critical", isnull('data.Severity'), "unknown"))
EVAL-severity_id = case('vendor_action' IN ("Downloaded", "SameSenderAndSigner", "Sent","Signed"), case('data.Severity'=="low", "1", 'data.Severity'=="medium", "2", 'data.Severity'=="high", "3", 'data.Severity'=="critical", "4"))
EVAL-signature = case('vendor_action' IN ("Downloaded", "SameSenderAndSigner", "Sent","Signed") OR ('vendor_action'=="Login"), 'vendor_action', 1==1, 'signature')

LOOKUP-ccx_docusign_monitor_cim = ccx_docusign_monitor_cim object vendor_action OUTPUTNEW action dataset_name object_category result type
