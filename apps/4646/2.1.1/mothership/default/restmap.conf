[admin:environment_search_manager]
match = /
members = environment_searches
capability = mothership_rest

[admin_external:environment_searches]
handlertype = python
handlerfile = environment_searches_eai_handler.py
handleractions = list,edit,create,remove,_reload
handlerpersistentmode = true
capability = mothership_rest
python.version = python3

[admin:environments_manager]
match = /
members = environments
capability = mothership_rest

[admin_external:environments]
handlertype = python
handlerfile = environments_eai_handler.py
handleractions = list,edit,create,remove,_reload
handlerpersistentmode = true
capability = mothership_rest
python.version = python3
