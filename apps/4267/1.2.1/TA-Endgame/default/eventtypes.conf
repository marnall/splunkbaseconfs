[process_events]
search = source="endgame_api" data.triggering_fact_array{}.data_buffer.event_type_full="process_event"

[network_events]
search = source="endgame_api" data.triggering_fact_array{}.data_buffer.event_type_full="network_event"

[registry_events]
search = source="endgame_api" data.triggering_fact_array{}.data_buffer.event_type_full="registry_event"

[malware_events]
search = source="endgame_api" data.malware_classification.identifier!=""

[dns_events]
search = source="endgame_api" data.triggering_fact_array{}.data_buffer.event_type_full="dns_event"

[alert_events]
search = source="endgame_api"