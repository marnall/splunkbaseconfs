
[ccx_velocloud_detail]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \\\"([^\\]+)\\\"\:(?:\s+)?(?:\[)?(?:\\\")?((?!null)[^\\\}\]]+)(?:\\\")?(?:\]|\})?(?:\,|\})

[ccx_velocloud_source]
CLEAN_KEYS = 0
REGEX = .+from\s+(?:(?:\d{1,3}\.){1,3}\d{1,3})\s+port\s+(?<source_port>\d+)\s+(?<auth_app>ssh2).+\"detail\".+source\\\"\:\s+\\\"(?<source_ip>(?:\d{1,3}\.){3}\d{1,3})\\\"\,\s+.+

[ccx_velocloud_test_parameters]
CLEAN_KEYS = 0
REGEX = \\\"tests\\\"[^\"]+\"(?:[^\\]+)\\\"\:\\\"(?<test_name>[^\\]+)\\\"\,\\\"parameters\\\"\:\[\\\"[^\"]+(?:[^\\]+)(?:\\)*\"\:(?:\\)*\"(?<parameters_name>[^\\]+)(?:\\)*\"\}

[ccx_velocloud_source_app]
CLEAN_KEYS = 0
REGEX = .+from\s(?:(?:\d{1,3}\.){3}\d{1,3})\s+port\s+(?<source_port>\d+)\s+(?<auth_app>ssh2)

[ccx_velocloud_sdwan_dns_cache]
CLEAN_KEYS = 0
REGEX = .+(?<vendor_category>DNS_CACHE_LIMIT_REACHED)\:\s+(?<vendor_message>.+)

[ccx_velocloud_sdwan_host]
CLEAN_KEYS = 0
REGEX = (?:\w+\s+\d+\s+\S+\s)(?<vendor_host>\S+)\svelocloud\.sdwan\:\s+ACTION.+

[ccx_velocloud_sdwan_syslog]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \s+(\w+)=\"?(.*?(?=\"?\s\w+=|$))
