# Windows Events
[win_process_creation]
search = ((source IN ("XmlWinEventLog:Security", "WinEventLog:Security") EventCode=4688) OR (source IN ("WinEventLog:Microsoft-Windows-Sysmon/Operational", "XmlWinEventLog:Microsoft-Windows-Sysmon/Operational") EventCode=1))

[endpoint_sysmon]
search = source IN ("WinEventLog:Microsoft-Windows-Sysmon/Operational", "XmlWinEventLog:Microsoft-Windows-Sysmon/Operational")

[win_logs_all]
search = sourcetype IN ("WinEventlog", "XmlWinEventLog")

[win_logs_application]
search = source IN ("WinEventLog:Application", "XmlWinEventLog:Application")

[win_logs_security]
search = source IN ("WinEventLog:Security", "XmlWinEventLog:Security")

[win_logs_system]
search = source IN ("WinEventLog:System", "XmlWinEventLog:System")

[win_registry]
search = sourcetype=winregistry

[sysmon]
search = source IN ("WinEventLog:Microsoft-Windows-Sysmon/Operational", "XmlWinEventLog:Microsoft-Windows-Sysmon/Operational")

# Nix Events
[nix_bash_history]
search = sourcetype=bash_history

# IDS Events
[snort]
search = sourcetype IN ("alerts:snort", "snort")

[suricata]
search = sourcetype IN ("suricata", "alerts:suricata", "corelight_suricata_corelight", "corelight_suricata_corelight_hec")

[suricata_eve_dns]
search = sourcetype=alerts:suricata event_type=dns

[suricata_eve_flow]
search = sourcetype=alerts:suricata event_type=flow

[suricata_eve_http]
search = sourcetype=alerts:suricata event_type=http

[suricata_eve_ids_attack]
search = sourcetype=alerts:suricata event_type=alert NOT classification="Not Suspicious Traffic"

[suricata_eve_tls]
search = sourcetype=alerts:suricata event_type=tls



