# DO NOT EDIT THIS FILE!
# Please make all changes to files in $SPLUNK_HOME/etc/apps/TA_Nut-UPS/local.
# To make changes, copy the section/stanza you want to change from $SPLUNK_HOME/etc/apps/TA_Nut-UPS/default
# into ../local and edit there.
#
# TA_Nut-UPS
# Simon Richardson
# props.conf

[(::){0}nut_monitor]
TRANSFORMS-zzz-nut_raw_length = nut_raw_length
EVAL-vendor_product = "Network UPS Tools (NUT)"

[nut_monitor]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
DATETIME_CONFIG = CURRENT
SHOULD_LINEMERGE=true
BREAK_ONLY_BEFORE = battery.charge 
LINE_BREAKER=([\r\n]+)
REPORT-nut_extract_fields = nut_extract_fields
