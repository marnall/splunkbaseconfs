[admin:ta_cybersponse] 
match=/cssetup 
members=csconfig 

[admin_external:csconfig] 
handlertype = python 
handlerfile = cybersponse_setup.py 
handleractions = list, edit

[script:playbooks]
match=/playbooks
script=cybersponse_playbooks.py
scripttype=persist
handler = cybersponse_playbooks.PlaybooksHandler
requireAuthentication = true
output_modes=json
passPayload = true
passHttpHeaders = true
passHttpCookies = true