#
# Trend Micro Deep Discovery Inspector Technology Add-on
# Custom Splunk App Configuration
# Developed by Ayed Abu-Khass, Version 1.0.0
#

# Transform to extract CEF header fields
[extract_cef_header]
REGEX = CEF:(?<logVer>\d+)\|(?<vendor>[^|]*)\|(?<pname>[^|]*)\|(?<pver>[^|]*)\|(?<eventid>[^|]*)\|(?<eventName>[^|]*)\|(?<severity>[^|]*)

# Transform to extract key-value pairs from the CEF extension
[extract_cef_kv]
REGEX = (?:_+)?(?<_KEY_1>[\w.:\[\]]+)=(?<_VAL_1>.*?(?=(?:\s[\w.:\[\]]+=|$)))
REPEAT_MATCH = True
CLEAN_KEYS = 1

# Sourcetype renaming transforms based on event characteristics

# Threat Logs
[set_trendmicro_ddi_threat_sourcetype]
REGEX = CEF:\d+\|[^\|]*\|[^\|]*\|[^\|]*\|(?!200120|200127|200119|300102|300999|100101|100120)\d+\| 
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::trendmicro:ddi:threat

# Disruptive Application Logs
[set_trendmicro_ddi_disruptive_application_sourcetype]
REGEX = CEF:\d+\|[^\|]*\|[^\|]*\|[^\|]*\|100120\|[^\|]*\|[^\|]*\|.*\bcn3=6\b
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::trendmicro:ddi:disruptive_application

# Web Reputation Logs
[set_trendmicro_ddi_web_reputation_sourcetype]
REGEX = CEF:\d+\|[^\|]*\|[^\|]*\|[^\|]*\|100101\|.*?(?=.*\bcn2Label=WRSScore\b)(?=.*\bcs2Label=URLCategory\b)(?=.*\bcs4=(Intelligence Gathering|Point of Entry|Command and Control Communication|Lateral Movement|Asset and Data Discovery|Data Exfiltration|Nil)\b)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::trendmicro:ddi:web_reputation

# System Logs
[set_trendmicro_ddi_system_sourcetype]
REGEX = CEF:\d+\|[^\|]*\|[^\|]*\|[^\|]*\|(300102|300999)\|.*?(?:(?=.*\boutcome=(Success|Failure)\b))?
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::trendmicro:ddi:system

# Virtual Analyzer - File Analysis
[set_va_file_analysis_sourcetype]
REGEX = CEF:\d+\|[^\|]*\|[^\|]*\|[^\|]*\|200119\|[^\|]*\|3\|
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::trendmicro:ddi:virtual_analyzer:file_analysis

# Virtual Analyzer - Notable Characteristics
[set_va_notable_characteristics_sourcetype]
REGEX = CEF:\d+\|[^\|]*\|[^\|]*\|[^\|]*\|200127\|[^\|]*\|6\|
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::trendmicro:ddi:virtual_analyzer:notable_characteristics

# Virtual Analyzer - Deny List Transaction
[set_va_deny_list_transaction_sourcetype]
REGEX = CEF:\d+\|[^\|]*\|[^\|]*\|[^\|]*\|200120\|[^\|]*\|3\|
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::trendmicro:ddi:virtual_analyzer:deny_list_transaction
