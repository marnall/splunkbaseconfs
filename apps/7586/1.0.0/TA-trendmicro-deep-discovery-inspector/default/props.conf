# Base sourcetype configuration for Trend Micro Deep Discovery Inspector logs
[trendmicro:ddi]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
pulldown_type = 1
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
KV_MODE = none
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
MAX_TIMESTAMP_LOOKAHEAD = 25

# Apply field extractions using "CEF Extraction Add-on for Splunk" transforms
REPORT-extract_cef_header = extract_cef_header
REPORT-extract_cef_kv = extract_cef_kv

# Apply sourcetype renaming based on event characteristics
TRANSFORMS-set_sourcetype = set_trendmicro_ddi_threat_sourcetype, set_trendmicro_ddi_disruptive_application_sourcetype, set_trendmicro_ddi_web_reputation_sourcetype, set_trendmicro_ddi_system_sourcetype, set_va_file_analysis_sourcetype, set_va_notable_characteristics_sourcetype, set_va_deny_list_transaction_sourcetype

#### Field aliases for consistency and compatibility with Splunk's Common Information Model (CIM) ####

# Field aliases for header fields (applies to all log categories)
FIELDALIAS-product = pname AS product
FIELDALIAS-product_version = pver AS product_version
FIELDALIAS-signature_id = eventid AS signature_id
FIELDALIAS-signature = eventName AS signature

# Combine vendor and product into vendor_product
EVAL-vendor_product = vendor . ":" . product

# Enrichment of severity field
EVAL-severity = tonumber(severity)
EVAL-severity_label = case(severity=="2","Informational",severity=="3","Medium",severity=="4","Low",severity=="6","Medium",severity=="8","High",1==1,"Unknown")

#
#############################
# Threat logs configuration #
#############################
#

[trendmicro:ddi:threat]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
pulldown_type = 1
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
KV_MODE = none
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
MAX_TIMESTAMP_LOOKAHEAD = 25

# Apply field extractions using "CEF Extraction Add-on for Splunk" transforms
REPORT-extract_cef_header = extract_cef_header
REPORT-extract_cef_kv = extract_cef_kv

# Field aliases for header fields (applies to all log categories)
FIELDALIAS-product = pname AS product
FIELDALIAS-product_version = pver AS product_version
FIELDALIAS-signature_id = eventid AS signature_id
FIELDALIAS-signature = eventName AS signature

# Combine vendor and product into vendor_product
EVAL-vendor_product = vendor . ":" . product

# Map existing fields to CIM-compliant fields
FIELDALIAS-event_time = rt AS event_time
FIELDALIAS-action = act AS action
FIELDALIAS-app = app AS app
FIELDALIAS-src_ipv6 = c6a2 AS src_ipv6
FIELDALIAS-dest_ipv6 = c6a3 AS dest_ipv6
FIELDALIAS-category = cat AS category
FIELDALIAS-count = cnt AS count
FIELDALIAS-malware_name = cs2 AS malware_name
FIELDALIAS-src_host = cs3 AS src_host
FIELDALIAS-file_name = cs4 AS file_name
FIELDALIAS-dest_host = dhost AS dest_host
FIELDALIAS-dest_mac = dmac AS dest_mac
FIELDALIAS-dest_port = dpt AS dest_port
FIELDALIAS-dest_ip = dst AS dest_ip
FIELDALIAS-dvc_host = dvchost AS dvc_host
FIELDALIAS-dvc_mac = dvcmac AS dvc_mac
FIELDALIAS-src_ip = src AS src_ip
FIELDALIAS-src_port = spt AS src_port
FIELDALIAS-src_mac = smac AS src_mac
FIELDALIAS-subject = cs1 AS subject
FIELDALIAS-peer_ip = destinationTranslatedAddress AS peer_ip
FIELDALIAS-direction_code = deviceDirection AS direction_code
FIELDALIAS-threat_type_code = cn3 AS threat_type_code

# Map threat type codes to descriptive text
EVAL-threat_type = case(threat_type_code=="0","Malicious content",threat_type_code=="1","Malicious behavior",threat_type_code=="2","Suspicious behavior",threat_type_code=="3","Exploit",threat_type_code=="4","Grayware",1==1,"Unknown")

# Map packet direction codes to text
EVAL-direction = case(direction_code=="0","inbound",direction_code=="1","outbound",direction_code=="2","unknown",1==1,"unknown")

# Attack phase is already descriptive in cs6
EVAL-attack_phase = cs6

# Map CCCA detection
EVAL-ccca_detection = if(cn1=="1","Detected","Not Detected")

# Map CCCA detection source
EVAL-ccca_detection_source = cs5

# Map device ID
EVAL-device_id = deviceExternalId

# Map payload ID
EVAL-payload_id = devicePayloadId

# Enrichment of severity field
EVAL-severity = tonumber(severity)
EVAL-severity_label = case(severity=="2","Informational",severity=="4","Low",severity=="6","Medium",severity=="8","High",1==1,"Unknown")

