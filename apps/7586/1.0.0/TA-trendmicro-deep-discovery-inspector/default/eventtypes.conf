# Event Type for Base Sourceype
[trendmicro_ddi]
search = sourcetype="trendmicro:ddi:*" OR sourcetype="cef:trendmicro:ddi"

# Event Type for Threat Logs
[trendmicro_ddi_threat]
search = sourcetype="trendmicro:ddi:threat"

# Event Type for Disruptive Application Logs
[trendmicro_ddi_disruptive_application]
search = sourcetype="trendmicro:ddi:disruptive_application"

# Event Type for Web Reputation Logs
[trendmicro_ddi_web_reputation]
search = sourcetype="trendmicro:ddi:web_reputation"

# Event Type for System Logs
[trendmicro_ddi_system]
search = sourcetype="trendmicro:ddi:system"

# Event Type for Virtual Analyzer File Analysis Logs
[trendmicro_ddi_va_file_analysis]
search = sourcetype="trendmicro:ddi:virtual_analyzer:file_analysis"

# Event Type for Virtual Analyzer Notable Characteristics Logs
[trendmicro_ddi_va_notable_characteristics]
search = sourcetype="trendmicro:ddi:virtual_analyzer:notable_characteristics"

# Event Type for Virtual Analyzer Deny List Transaction Logs
[trendmicro_ddi_va_deny_list_transaction]
search = sourcetype="trendmicro:ddi:virtual_analyzer:deny_list_transaction"
