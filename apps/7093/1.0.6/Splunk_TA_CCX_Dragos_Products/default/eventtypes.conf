[ccx_dragos_sitestore_configuration_ids]
search = (sourcetype="ccx:dragos:sitestore") log_type="Configuration" NOT eventtype="ccx_dragos_sitestore_configuration_general_alert"
#tags = ids attack

[ccx_dragos_sitestore_configuration_general_alert]
search = (sourcetype="ccx:dragos:sitestore") log_type="Configuration" category IN("Impair Process Control","Communication")
#tags = alert

[ccx_dragos_sitestore_system_events]
search = (sourcetype="ccx:dragos:sitestore") orig_type="System"
#tags = alert

[ccx_dragos_sitestore_threatbehavior_ids]
search = (sourcetype="ccx:dragos:sitestore") log_type="Threat Behavior"
#tags = ids attack

[ccx_dragos_sitestore_indicator_general_detection]
search = (sourcetype="ccx:dragos:sitestore") log_type="Indicator"
#tags = ids attack

[ccx_dragos_asset_data]
search = sourcetype="dragos:assetdata"

[ccx_dragos_asset_zones]
search = sourcetype="dragos:assetzones"

[ccx_dragos_addresses]
search = sourcetype="dragos:addresses"

[ccx_dragos_vulnerabilities]
search = sourcetype="dragos:vulnerabilities"
# tags = vulnerability report

[ccx_dragos_notification_ids]
search = sourcetype="dragos:notification"
# tags = ids attack