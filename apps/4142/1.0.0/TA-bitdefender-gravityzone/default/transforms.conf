## Bitdefender GZVA data transformation
[extract_json_from_syslog]
# group 1: syslog pri, if tcp
# group 2: [module], if any
# group 3: event json data
REGEX		= ^(?:<\d+>)?[A-Z][a-z]+\s+\d+\s\d+:\d+:\d+\s.*?:\s(?:\[.*?\])?\s?(.*)$
FORMAT        	= $1
DEST_KEY      	= _raw

## Bitdefender VENDOR extractions
[bitdefender_gz-module]
REGEX = "module":"([^"]+)
FORMAT = module::$1

[bitdefender_gz-date]
REGEX = "timestamp":"([^"]+)
FORMAT = date::$1

[bitdefender_gz-computer_id]
REGEX = "computer_id":"([^"]+)
FORMAT = computer_id::$1

[bitdefender_gz-computer_ip]
REGEX = "computer_ip":"([^"]+)
FORMAT = computer_ip::$1

[bitdefender_gz-hostname]
REGEX = "computer_name":"([^"]+)
FORMAT = computer_name::$1

[bitdefender_gz-host_fqdn]
REGEX = "computer_fqdn":"([^"]+)
FORMAT = computer_fqdn::$1

[bitdefender_gz-malware_type]
REGEX = "malware_type":"([^"]+)
FORMAT = malware_type::$1

[bitdefender_gz-malware_name]
REGEX = "malware_name":"([^"]+)
FORMAT = malware_name::$1

[bitdefender_gz-file_path]
REGEX = "file_path":"([^"]+)
FORMAT = file_path::$1

[bitdefender_gz-file_hash]
REGEX = "hash":"([^"]+)
FORMAT = file_hash::$1

