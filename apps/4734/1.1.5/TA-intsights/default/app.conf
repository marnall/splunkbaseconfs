[launcher]
description = IntSights' all-in-one External Threat Intelligence & Protection Suite equips enterprise security teams with unparalleled capabilities to detect, investigate, and neutralize external threats across the clear, deep, and dark web.  When fused with Splunk, IntSights' contextualized, external threat data acts as a powerful enrichment and correlation source for faster, more comprehensive security operations. SOC analysts minimize time wasted on false-positives while simultaneously unlocking deeper threat correlation and analysis-all from the ease and familiarity of the Splunk tools and workflows they already rely on day-in and day-out.
author = IntSights Cyber Intelligence
version = 1.1.5

[package]
id = TA-intsights

[install]
is_configured = 0
state = enabled
state_change_requires_restart = true

[ui]
is_visible = true
label = IntSights App for Splunk
setup_view = intsights_setup

