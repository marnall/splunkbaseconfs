[default]
[CMDi]
definition = | rename CMDi as "Command Injection"
iseval = 0

[CRLFi]
definition = | rename CRLFi as "CRLF Injection"
iseval = 0

[CSRF]
definition = | rename CSRF as "Cross-site Request Forgery"
iseval = 0

[ReflectiveXSS]
definition = | rename ReflectiveXSS as "Reflective Cross-site Scripting"
iseval = 0

[StoredXSS]
definition = | rename StoredXSS as "Stored Cross-site Scripting"
iseval = 0

[XSS]
definition = | rename XSS as "Cross-site Scripting"
iseval = 0

[attack]
definition = type = VS-ATTACK
iseval = 0

[attackalias]
definition = | rename DLLi as "DLL Injection" | rename CMDi as "Command Injection" | rename CRLFi as "CRLF Injection" | rename CSRF as "Cross-site Request Forgery" | rename ReflectiveXSS as "Reflective Cross-site Scripting" | rename StoredXSS as "Stored Cross-site Scripting" | rename XSS as "Cross-site Scripting" | rename InsiderProtect as "Authentication Failure" | rename SQLi as "SQL Injection"
iseval = 0

[attackaliasrev]
definition = | rename "DLL Injection" as DLLi  | rename "Command Injection" as CMDi  | rename "CRLF Injection" as CRLFi  | rename  "Cross-site Request Forgery" as CSRF  | rename "Reflective Cross-site Scripting" as ReflectiveXSS  | rename "Stored Cross-site Scripting" as StoredXSS | rename "Cross-site Scripting" as XSS  | rename "Authentication Failure" as  InsiderProtect  | rename  "SQL Injection" as SQLi

[attackreplace]
definition = | replace DLLi with "DLL Injection" | replace CMDi with "Command Injection" | replace CRLFi with "CRLF Injection" | replace CSRF with "Cross-site Request Forgery" | replace ReflectiveXSS with "Reflective Cross-site Scripting" | replace StoredXSS with "Stored Cross-site Scripting" | replace XSS with "Cross-site Scripting" | replace InsiderProtect with "Authentication Failure" | replace SQLi with "SQL Injection"

[authenticationFailure]
definition = category=AUTH_FAILURE
iseval = 0

[binary]
definition = details.category="Binary Attack"\

iseval = 0

[dllinjection]
definition = | rename DLLi as "DLL Injection"

[eventID]
definition = if(type="VS-ATTACK",("VS-"+eventID), ("VS-"+eventID))
iseval = 0

[eventID_rev(1)]
args = val
definition = | eval eventid=substr($val$,4)
iseval = 1

[eventTypes]
definition = | replace "VS-ATTACK" with "ATTACK", "VS-THREAT" with "THREAT", "VS-REGISTERED" with "REGISTERED", "VS-PROVISIONED" with "PROVISIONED"
iseval = 0

[fileless]
definition = category=FILE_LESS
iseval = 0

[filesScan]
definition = type=VS-FILE-EVENT
iseval = 0

[hostincidents]
definition = category="FILE_INTEGRITY"
iseval = 0

[inMemory]
definition = details.category = "In memory Attack"
iseval = 0

[incidents]
definition = type=VS-ATTACK OR VS-THREAT
iseval = 0

[threat]
definition = type = VS-THREAT
iseval = 0

[timespan]
definition = search index=virsec_idx | head 1 | addinfo | eval timerange= info_max_time-info_min_time | eval span=case(timerange<3600,"10m",timerange<46740,"2h",timerange<89940,"4h",timerange<608340,"1d",timerange<2595540,"5d",1=1,"5d") | return span\


[web]
definition = category=WEB_ATTACK
iseval = 0

