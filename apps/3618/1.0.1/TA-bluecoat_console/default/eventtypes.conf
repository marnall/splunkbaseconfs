[bluecoat_configuration_event]
search = sourcetype="bluecoat:proxysg:console:syslog" log_type="CONFIGURATION_EVENT" action=*
#tags = change audit

[bluecoat_authentication_event]
search = sourcetype="bluecoat:proxysg:console:syslog" log_type="NORMAL_EVENT" (signature_id="250017" OR signature_id="45000C")
#tags = authentication
