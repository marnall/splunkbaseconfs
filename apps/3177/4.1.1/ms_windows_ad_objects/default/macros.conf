| eval whenCreated=strftime(strptime(whenCreated,"%I:%M.%S %P, %a %m/%d/%Y"),"%m/%d/%y %a %I:%M %P")\
| lookup $group_lookup$ member AS dn OUTPUT sAMAccountName AS memberOf\
