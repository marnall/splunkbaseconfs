| search member!=""\
| lookup $tgt_obj_lookup$ dn AS member OUTPUT sAMAccountName AS user, cn AS user_cn\
| search user!=""\
| stats values(user) AS users\
| eval search="$evt_field$=\"".mvjoin(users,"\" OR $evt_field$=\"")."\""\
| table search]
iseval = 0

