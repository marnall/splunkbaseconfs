# sourcetype identifier
[force_sourcetype_maltrail_cef]
DEST_KEY = MetaData:Sourcetype
REGEX = \|(Maltrail|maltrail)\|
FORMAT = sourcetype::maltrail:cef

[force_sourcetype_maltrail_cef]
DEST_KEY = MetaData:Sourcetype
REGEX = ^".[^\"]+"
FORMAT = sourcetype::maltrail:rawlog

[force_sourcetype_maltrail_cef]
DEST_KEY = MetaData:Sourcetype
REGEX = ^\{.+}
FORMAT = sourcetype::maltrail:json

# sourcetype maltrail cef
[maltrail_cef]
REGEX = CEF:\d+\|([^\|]+)\|([^\|]+)\|([^\|]+)\|([^\|]+)\|([^\|]+)\|([^\|]+)\|
FORMAT = cef_vendor::$1 cef_product::$2 cef_version::$3 cef_date::$4 cef_name::$5 cef_severity::$6

[maltrail_cef_host]
REGEX = :\d\d\s+(?:\d+\s+|(?:user|daemon|local.?)\.\w+\s+)*\[?(\w[\w\.\-]{2,})\]?\s
FORMAT = sensor_host::$1

[maltrail_cef_cefKeys]
REGEX = (?:_+)?(?<_KEY_1>[\w.:\[\]]+)=(?<_VAL_1>.*?(?=(?:\s[\w.:\[\]]+=|$)))
REPEAT_MATCH = True
CLEAN_KEYS = 1

[maltrail_severity_lookup]
filename = maltrail_severity_lookup.csv

# sourcetype maltrail rawlog
[maltrail_rawlog_eventtime]
REGEX = ^"(\d{2,4}\-\d{1,2}\-\d{1,2}\s\d{2}\:\d{2}\:\d{2}\.\d{6})"
FORMAT = eventtime::$1

[maltrail_rawlog_host]
REGEX = ^".[^\"]+"\s(.[^\s]+)\s
FORMAT = sensor_host::$1

[maltrail_rawlog_src]
REGEX = ^".[^\"]+"\s.[^\s]+\s(.[^\s]+)\s
FORMAT = src::$1

[maltrail_rawlog_src_port]
REGEX = ^".[^\"]+"\s.[^\s]+\s.[^\s]+\s(.[^\s]+)\s
FORMAT = s_port::$1

[maltrail_rawlog_dest]
REGEX = ^".[^\"]+"\s.[^\s]+\s.[^\s]+\s.[^\s]+\s(.[^\s]+)\s
FORMAT = dst::$1

[maltrail_rawlog_dest_port]
REGEX = ^".[^\"]+"\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s(.[^\s]+)\s
FORMAT = dst_port::$1

[maltrail_rawlog_transport]
REGEX = ^".[^\"]+"\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s(.[^\s]+)\s
FORMAT = transport::$1

[maltrail_rawlog_type]
REGEX = ^".[^\"]+"\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s(.[^\s]+)\s
FORMAT = type::$1

[maltrail_rawlog_trail]
REGEX = ^".[^\"]+"\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s(.+)\s\".+\"\s.+\n
FORMAT = trail:$1

[maltrail_rawlog_info]
REGEX = ^".[^\"]+"\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.+\s\"(.+)\"\s.+\n
FORMAT = info:$1

[maltrail_rawlog_reference]
REGEX = ^".[^\"]+"\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.[^\s]+\s.+\s\".+\"\s(.+)\n
FORMAT = reference:$1