# old sourcetype will be remove on version 2
# please change the default old sourcetype to new sourcetype `maltrail:log`
[syslog]
SHOULD_LINEMERGE = false
TRANSFORMS-force_sourcetype_maltrail = force_sourcetype_maltrail_cef,force_sourcetype_maltrail_raw,force_sourcetype_maltrail_json

[maltrail]
SHOULD_LINEMERGE = false
KV_MODE = none
REPORT-cefevents = maltrail_cef_cefKeys

# CEF Header
REPORT-maltrail_cef = maltrail_cef
REPORT-maltrail_host = maltrail_cef_host

# Alias
FIELDALIAS-maltrail_application = cef_vendor as application
FIELDALIAS-maltrail_vendor = cef_vendor as vendor
FIELDALIAS-maltrail_type = cef_product as type
FIELDALIAS-maltrail_version = cef_version as product_version
FIELDALIAS-maltrail_category = cef_name as category
FIELDALIAS-maltrail_severity_id = cef_severity as severity_id

FIELDALIAS-maltrail_src_ip = src as src_ip
FIELDALIAS-maltrail_src_port = spt as src_port
FIELDALIAS-maltrail_dest_ip = dst as dest_ip
FIELDALIAS-maltrail_dest = dest as dest_ip
FIELDALIAS-maltrail_dest_port = dpt as dest_port
FIELDALIAS-maltrail_reference = ref as reference
FIELDALIAS-maltrail_sensor_host = sensor_host as host

EVAL-vendor_product = "Maltrail"
EVAL-app = "Maltrail"

# severity lookup
LOOKUP-maltrail_severity_lookup = maltrail_severity_lookup severity_id OUTPUT severity

# new sourcetype will be fully used on version 2
# latest sourcetype
[maltrail:log]
SHOULD_LINEMERGE = false
TRANSFORMS-force_sourcetype_maltrail = force_sourcetype_maltrail_cef,force_sourcetype_maltrail_raw,force_sourcetype_maltrail_json

[maltrail:cef]
SHOULD_LINEMERGE = false
KV_MODE = none
REPORT-cefevents = maltrail_cef_cefKeys

# CEF Header
REPORT-maltrail_cef = maltrail_cef
REPORT-maltrail_host = maltrail_cef_host

# Alias
FIELDALIAS-maltrail_application = cef_vendor as application
FIELDALIAS-maltrail_vendor = cef_vendor as vendor
FIELDALIAS-maltrail_type = cef_product as type
FIELDALIAS-maltrail_version = cef_version as product_version
FIELDALIAS-maltrail_category = cef_name as category
FIELDALIAS-maltrail_severity_id = cef_severity as severity_id

FIELDALIAS-maltrail_src_ip = src as src_ip
FIELDALIAS-maltrail_src_port = spt as src_port
FIELDALIAS-maltrail_dest_ip = dst as dest_ip
FIELDALIAS-maltrail_dest = dest as dest_ip
FIELDALIAS-maltrail_dest_port = dpt as dest_port
FIELDALIAS-maltrail_reference = ref as reference
FIELDALIAS-maltrail_sensor_host = sensor_host as host

EVAL-vendor_product = "Maltrail"
EVAL-app = "Maltrail"

# severity lookup
LOOKUP-maltrail_severity_lookup = maltrail_severity_lookup severity_id OUTPUT severity

[maltrail:rawlog]
MAX_TIMESTAMP_LOOKAHEAD = 32
SHOULD_LINEMERGE = false
KV_MODE = none

# extract
REPORT-maltrail_eventtime = maltrail_rawlog_eventtime
REPORT-maltrail_host = maltrail_rawlog_host
REPORT-maltrail_types = maltrail_rawlog_type,maltrail_rawlog_trail,maltrail_rawlog_info,maltrail_rawlog_reference
REPORT-maltrail_network = maltrail_rawlog_transport
REPORT-maltrail_network_src = maltrail_rawlog_src,maltrail_rawlog_src_port
REPORT-maltrail_network_dest = maltrail_rawlog_dest,maltrail_rawlog_dest_port

# alias
FIELDALIAS-maltrail_sensor_host = sensor_host as host

EVAL-vendor_product = "Maltrail"
EVAL-app = "Maltrail"

