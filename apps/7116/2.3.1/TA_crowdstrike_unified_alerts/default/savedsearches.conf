[CrowdStrike Unified Alerts Logs - 30 Days]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
description = Collects the CrowdStrike Unified Alerts Technical Add-on logs for the past 30 days
dispatch.earliest_time = -30d@d
dispatchAs = user
search = `cs_unified_alerts_logs`

[CrowdStrike Unified Alerts Indexed vs Event Time]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
description = Shows when the CrowdStrike Unified Alerts data was indexed, the event timestamp and the count of events. Timespan needs to be large enough to include the Event Time stamp.
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
dispatchAs = user
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = `cs_unified_alerts_get_index`   | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S")  | eventstats count by "Indexed Time"  | rename  count as "Number of CrowdStrike Unified Alert Events"  | eval "Unified Alert Event Time" = strftime(_time, "%Y-%m-%d %H:%M:%S")|table "Indexed Time", "Unified Alert Event Time", "Number of CrowdStrike Unified Alert Events" |sort  -"Indexed Time"

[CrowdStrike Unified Alerts Indexed Events per Minute]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
description = Shows the count of CrowdStrike Unified Alerts events indexed per minute by the indexed timestamp. Timespan needs to be large enough to include the Event Time stamps of the events
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatchAs = user
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA_crowdstrike_unified_alerts
request.ui_dispatch_view = search
search = `cs_unified_alerts_get_index` | bucket "_indextime" span=1m   | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S")  | eval "Unified Alert Event Time" = strftime(_time, "%Y-%m-%d %H:%M:%S")| chart count by "Indexed Time" | sort -"Indexed Time"
