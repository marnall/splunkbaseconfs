[pensando:dsc]
REPORT-field_extraction_for_pensando = extract_mac, extract_values_with_quotes, extract_values_without_quotes
TIME_PREFIX = \"time\":\"
MAX_TIMESTAMP_LOOKAHEAD = 25
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ

# Handling empty value for action field
EVAL-action = if(isnull(action),"none",action)

# Fieldaliasing for CIM mapping
FIELDALIAS-dest_ip = destaddr as dest_ip
FIELDALIAS-dest_port = destport as dest_port
FIELDALIAS-src_ip = srcaddr as src_ip
FIELDALIAS-src_port = srcport as src_port