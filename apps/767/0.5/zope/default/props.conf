#pulldown_type = true
#SHOULD_LINEMERGE = False
#REPORT-tracelog = requestprofiler-extractions


# ZEO LOG FILE

[zope_zeo]
pulldown_type = true
REPORT-zope = loglevel

[source::.../zeo.log]
sourcetype = zope_zeo

# Look for ZEO specific keywords
[delayedrule::zope_zeo]
sourcetype = zeo_event
MORE_THAN_1 = zeo|StorageServer


