# Adding support for Zope related log files. 

# http://docs.splunk.com/Documentation/Splunk/4.2.3/Admin/Propsconf


# ZOPE EVENT LOG

[zope_event]
pulldown_type = true
REPORT-zope = loglevel

[source::.../(event|instance)(\d+)?.log]
sourcetype = zope_event

# Look for Zope specific keywords
[delayedrule::zope_event]
sourcetype = zope_event
MORE_THAN_1 = Zope|ZODB|Z2|ZServer|GenericSetup|PluggableAuthService|Plone


# ZOPE ACCESS LOG

# the Z2.log matches access_combined so we are using the same config.
[zope_access]
pulldown_type = true 
maxDist = 28
MAX_TIMESTAMP_LOOKAHEAD = 128
REPORT-access = access-extractions
SHOULD_LINEMERGE = False
TIME_PREFIX = \[

[source::.../(instance\d?-)?(Z|z)+2.log]
sourcetype = zope_access


# ZOPE TRACE LOG

[zope_trace]
MAX_TIMESTAMP_LOOKAHEAD = 128
pulldown_type = true
SHOULD_LINEMERGE = False
REPORT-tracelog = tracelog-extractions

[source::.../(instance\d?-)?trace.log]
sourcetype = zope_trace

# Look for trace log specifc entries
[delayedrule::zope_trace]
sourcetype = zope_trace
MORE_THAN_10 = ^B 
MORE_THAN_10 = ^E  


#[zope_requestprofiler]
