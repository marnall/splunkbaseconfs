         latest(host) as host, \
         latest(docker_cluster_eval) as docker_cluster_eval, \
         values(docker_labels) as docker_labels by docker_container_unique_name |\
    table host, docker_cluster_eval, docker_labels, docker_container_unique_name, docker_stats_memory_percent_of_limit

[Monitoring Docker: Warning: container cpu is throttled]
alert.severity = 2
alert.suppress = 1
alert.suppress.period = 1h
alert.track = 1
counttype = number of events
cron_schedule = 4-59/5 * * * *
description = A container is getting throttled for more than 20% of CPU Usage
dispatch.earliest_time = -7m@m
dispatch.latest_time = -2m@m
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = monitoringdocker
request.ui_dispatch_view = search
search = `macro_docker_stats_cgroup` `macro_docker_alerts_base` docker_container_id=*  |\
    stats avg(docker_stats_cpu_throttled_percent) as docker_stats_cpu_throttled_percent \
         avg(docker_stats_cpu_percent) as docker_stats_cpu_percent, \
         latest(host) as host, \
         latest(docker_cluster_eval) as docker_cluster_eval, \
         values(docker_labels) as docker_labels by docker_container_unique_name |\
    search docker_stats_cpu_percent>10 |\
     eval percent_throttled_of_cpu=docker_stats_cpu_throttled_percent/docker_stats_cpu_percent |\
     search docker_throttled_of_cpu>0.2 |\
    eval docker_stats_cpu_throttled_percent=round(docker_stats_cpu_throttled_percent, 2) |\
    table host, docker_cluster_eval, docker_labels, docker_container_unique_name, docker_stats_cpu_throttled_percent

