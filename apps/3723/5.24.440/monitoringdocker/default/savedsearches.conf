[Monitoring Docker: Warning: Increasing lag between event time and indexing time in container logs]
alert.severity = 2
alert.suppress = 1
alert.suppress.period = 1h
alert.track = 1
counttype = number of events
cron_schedule = 0-59/10 * * * *
description = Increasing lag between event time and indexing time in container logs
dispatch.earliest_time = -12m@m
dispatch.latest_time = -2m@m
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = monitoringdocker
request.ui_dispatch_view = search
search = `macro_docker_logs` `macro_docker_alerts_base`  | \
    fields _time, _indextime, source, host, docker_cluster_eval | \
    eval eventTime=_time | \
    bin _time span=1m | \
    stats avg(eval(_indextime-eventTime)) as lag, latest(eventTime) as eventTime by _time, source, host, docker_cluster_eval | \
    streamstats time_window=2m earliest(lag) as lag_2m_ago, latest(lag) as lag_now by source, host, docker_cluster_eval | \
    where (lag_now-lag_2m_ago)>0 and lag_now>60 | \
    stats count, latest(lag) as lag, latest(eventTime) as _time by source, host, docker_cluster_eval

