[Monitoring Docker: Collector License Expiration (less than 14 days)]
alert.severity = 2
alert.suppress = 1
alert.suppress.period = 3d
alert.track = 1
counttype = number of events
cron_schedule = 13 0 * * *
description = One or more collectord use license with expiration in less than 14 days. Contact sales@outcoldsolutions.com
dispatch.earliest_time = -24h@h
dispatch.latest_time = @h
display.page.search.mode = fast
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = monitoringdocker
request.ui_dispatch_view = search
search = `macro_docker_logs_collectord_license_check` `macro_docker_alerts_base` expiration>0 | \
    eval ExpirationDays=floor((expiration-now())/60/60/24)  | \
    search ExpirationDays<14 | \
    stats values(docker_labels) as docker_labels, latest(_time) as _time, latest(ExpirationDays) as ExpirationDays by host, docker_cluster_eval | \
    table _time, host, docker_cluster_eval, docker_labels, ExpirationDays

