#------------------
# Kafka sourcetypes
#------------------

[mantisnet_dns]
pulldown_type = 1
TIME_PREFIX = },"timestamp":"
TRANSFORMS-dns_host = dns_host
FIELDALIAS-mantisnet_dns_aliases = "dns.dns_answer{}.a" AS answer "dns.dns_answer{}.rrtype" AS record_type "dns.dns_header.rcode" AS reply_code_id "dns.dns_question{}.qclass" AS query_class "dns.dns_question{}.qtype" AS query_type "ipv4.dstAddr" AS dest "ipv4.identification" AS transaction_id "ipv4.srcAddr" AS src "ipv4.ttl" AS ttl "udp.dstPort" AS dest_port "udp.srcPort" AS src_port
EVAL-query = rtrim('dns.dns_question{}.name',".")
EVAL-answer_count = mvcount("dns.dns_answer{}")
EVAL-additional_answer_count = mvcount("dns.dns_additional{}")
EVAL-authority_answer_count = mvcount("dns.dns_header{}")
EVAL-query_count = mvcount("dns.dns_question{}")
