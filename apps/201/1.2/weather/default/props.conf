[source::weather_xml]
TRANSFORMS-set = setnull
REPORT-attributes = get_temp, get_dewpoint, get_relativehumidity, get_pressure, get_city

[weather_entry]
BREAK_ONLY_BEFORE = <\?xml\sversion
EXTRACT-location=<Location>(?<location>.*?)<\/Location>
EXTRACT-skyconditions=<SkyConditions>(?<skyconditions>.*?)<\/SkyConditions>
EXTRACT-wind=<Wind>(?<wind>.*?)<\/Wind>








