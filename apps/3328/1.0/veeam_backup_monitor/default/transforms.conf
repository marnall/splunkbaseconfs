[removeheaderrow]
REGEX = ^\"#.*
DEST_KEY = queue
FORMAT = nullQueue


[REPORT-JobSizes]
DELIMS = ","
FIELDS = "DateTime","JobName","SizeInGB","DataSizeInGB","JobID","VmCount"

[REPORT-JobDET]
DELIMS = ","
FIELDS = "JobKickOffTime","JobName","TransferedGB","Duration","JobID","TotalSizeGB","TotalUsedSizeGB","TransferSpeedMB","BackupStatus","JobType","JobEndTime"

[REPORT-vbrsize]
DELIMS = ","
FIELDS = "DateTime", "Name","Path","FreeSpace","TotalSpace","Id"

[REPORT-JobTsk]
DELIMS = ","
FIELDS = "DateTime", "Id","Name","JobName","JobSessId","Status","Reason"

[REPORT-BkpSvr]
DELIMS = ","
FIELDS = "DateTime","Name","Info","Type","APIVersion"


[REPORT-BkpPxy]
DELIMS = ","
FIELDS = "DateTime","Name","Host","Type","IsDisabled","Description"
