[uba_index]
definition = (index=_internal)

[uba_logs]
definition = (`uba_index` sourcetype=uba:log)

[uba_indicators]
definition = (`uba_index` sourcetype=uba:indicator)

[uba_final_uuid]
definition = (uuid != *Static*)

[uba_status_encode]
definition = | eval statusCode = case(status == "BAD", 10000, status == "WARN", 1, status == "OK", 0, status == 2, 10000)

[uba_status_decode]
definition = | append [|makeresults | eval  res=0 | table res]\
| head 1\
| eval res = case(res >= 10000, "BAD", res < 10000 AND res > 0, "WARN", res == 0, "OK") \
| eval range=case(res=="BAD", "severe", res=="WARN","elevated",res=="OK","low",true(),"low")
