[qintel_generate_cve_intel]
cron_schedule = */5 * * * *
allow_skew = 50%
dispatch.earliest_time = -5m@m
dispatch.latest_time = now
enableSched = 1
search = | datamodel Vulnerabilities search | pmi cve_field=Vulnerabilities.cve \
| where isnotnull(qintel_cve_actors) \
| `qintel_shrink_cve_fields` \
| table _time,sourcetype,Vulnerabilities.*,qintel_cve_* \
| collect `qintel_index` marker="type=\"qintel_cve_intel\", search_name=\"qintel_generate_cve_intel\""


[qintel_pmi_clean_cache]
description = "Clears old entries from the local Qintel PMI cache"
action.summary_index = 1
action.summary_index.type = qintel_pmi_cache_clear
cron_schedule = */5 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
search = | rest /services/qintel_pmi/clean_cache
