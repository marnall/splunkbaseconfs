################ extract from source_key #############
[filename_from_filepath]
SOURCE_KEY = Application_Name
REGEX = ([^\\/]+)$
FORMAT = file_name::$1

[category_from_description]
SOURCE_KEY = Event_Description
REGEX = ^[\"\']*(?:\[.*\]\s)?(?<category>[a-zA-Z\s^:]+):(?::.*)?
FORMAT = category::$1

[process_from_caller_process_name]
SOURCE_KEY = Caller_Process_Name
REGEX = (?:Caller\sProcess\sName)?(.*)
FORMAT = process::$1

[caller_md5_from_description]
SOURCE_KEY = Description
REGEX = Caller\sMD5=\s*(\w+)
FORMAT = Caller_MD5::$1

[filename_from_caller_process_name]
SOURCE_KEY = Caller_Process_Name
REGEX = \s*(?<caller_process_file_name>[^\\/]+$)
FORMAT = caller_process_file_name::$1

[filename_from_parameter]
SOURCE_KEY = Parameter
REGEX = [\\\/](?<parameter_file_name>[^\\\/]+\.[^\\\/]+)$
FORMAT = parameter_file_name::$1

[field_extraction_action]
SOURCE_KEY = Event_Description
REGEX = (?i)(?<event_action>\b(Added Symantec license|Deleted Symantec license|Backup succeeded and finished|server started|downloaded and applied|switched|created|changed|deleted|edited|added|removed|update|applied|disabled|enabled|disconnected|started|stopped|loaded|updated|file submitted|submitting file|logout|connected|received|shut down|finished|downloaded|initiated|renamed|imported|exported|startup|is Moved from|Remote Pushing Install Finished)\b)

[field_extraction_action_for_event_content]
SOURCE_KEY = Event_Content
REGEX = (?i)(?<event_action>\b(New|Created|New Firewall policy|New Intrusion Prevention policy)\b)

[field_extraction_change_type]
SOURCE_KEY = Event_Content
REGEX = (?i)(?<vendor_action>\b(New Intrusion Prevention policy|New Firewall policy|New Virus and Spyware Protection policy|Default Intensive Protection Policy)\b)

[field_extraction_status_2]
SOURCE_KEY = Event_Description
REGEX = (?i)(?<event_status>(failed|failure|incorrect|successfully)).*

[field_extract_event_description]
SOURCE_KEY = Event_Description
REGEX = (?i)["']?(?:Event\s*Description\s*:\s*)?["']?(.*[^"'])["']?$
FORMAT = description::$1

[field_extract_event_user]
SOURCE_KEY = Event_Description
REGEX = (?i)(?<user>([a|A]dministrator)).*

[field_exctraction_file_name_file_path]
SOURCE_KEY = Event_Description
REGEX = File\s*:\s*['"](.*[\\\/]([^\\\/'"]*))
FORMAT = file_path::$1 file_name::$2

[field_exctraction_file_size]
SOURCE_KEY = Event_Description
REGEX = (?i)Size\s*.*:\s*(?<file_size>\d+)

[field_extraction_interface]
SOURCE_KEY = Event_Description
REGEX = (?i)Network\s+info:\s*(?P<interface>.+?)"?\s*$

[field_exctraction_ip_and_mac]
SOURCE_KEY = Event_Description
REGEX = 'vmxnet3 Ethernet Adapter'\s+(?<mac>(?:[0-9A-Fa-f]{2}(?::|-)){5}[0-9A-Fa-f]{2}|(?:[0-9A-Fa-f]{4}\.){2}[0-9A-Fa-f]{4}|\d{1,3}(?:\.\d{1,3}){3}|(?:(?:(?:[0-9A-Fa-f]{1,4}:){7}(?:[0-9A-Fa-f]{1,4}|:))|(?:(?:[0-9A-Fa-f]{1,4}:){6}(?::[0-9A-Fa-f]{1,4}|(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3})|:))|(?:(?:[0-9A-Fa-f]{1,4}:){5}(?:(?::[0-9A-Fa-f]{1,4}){1,2}|:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3})|:))|(?:(?:[0-9A-Fa-f]{1,4}:){4}(?:(?::[0-9A-Fa-f]{1,4}){1,3}|(?::[0-9A-Fa-f]{1,4})?:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3})|:))|(?:(?:[0-9A-Fa-f]{1,4}:){3}(?:(?::[0-9A-Fa-f]{1,4}){1,4}|(?::[0-9A-Fa-f]{1,4}){0,2}:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3})|:))|(?:(?:[0-9A-Fa-f]{1,4}:){2}(?:(?::[0-9A-Fa-f]{1,4}){1,5}|(?::[0-9A-Fa-f]{1,4}){0,3}:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3})|:))|(?:(?:[0-9A-Fa-f]{1,4}:){1}(?:(?::[0-9A-Fa-f]{1,4}){1,6}|(?::[0-9A-Fa-f]{1,4}){0,4}:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3})|:))|(?::(?:(?::[0-9A-Fa-f]{1,4}){1,7}|(?::[0-9A-Fa-f]{1,4}){0,5}:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3})|:)))(?:%.+)?).*'vmxnet3 Ethernet Adapter'\s(?<ip>((?:(?:(?:[0-9A-Fa-f]{1,4}:){7}(?:[0-9A-Fa-f]{1,4}|:))|((?:[0-9a-fA-F]{1,4}:){6}|(?:[0-9a-fA-F]{1,4}:){0,5}:|::(?:[0-9a-fA-F]{1,4}:){0,4})((25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\.){3}(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})|(?:(?:[0-9A-Fa-f]{1,4}:){6}(?::[0-9A-Fa-f]{1,4}|(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3})|:))|(?:(?:[0-9A-Fa-f]{1,4}:){5}(?:(?:(?::[0-9A-Fa-f]{1,4}){1,2})|:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3})|:))|(?:(?:[0-9A-Fa-f]{1,4}:){4}(?:(?:(?::[0-9A-Fa-f]{1,4}){1,3})|(?:(?::[0-9A-Fa-f]{1,4})?:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}))|:))|(?:(?:[0-9A-Fa-f]{1,4}:){3}(?:(?:(?::[0-9A-Fa-f]{1,4}){1,4})|(?:(?::[0-9A-Fa-f]{1,4}){0,2}:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}))|:))|(?:(?:[0-9A-Fa-f]{1,4}:){2}(?:(?:(?::[0-9A-Fa-f]{1,4}){1,5})|(?:(?::[0-9A-Fa-f]{1,4}){0,3}:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}))|:))|(?:(?:[0-9A-Fa-f]{1,4}:){1}(?:(?:(?::[0-9A-Fa-f]{1,4}){1,6})|(?:(?::[0-9A-Fa-f]{1,4}){0,4}:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}))|:))|(?::(?:(?:(?::[0-9A-Fa-f]{1,4}){1,7})|(?:(?::[0-9A-Fa-f]{1,4}){0,5}:(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}))|:)))(?:%.+)?)|(\d+.\d+.\d+.\d+))

[field_extract_event_time]
REGEX = ^(?<event_time>[^,]*)

[field_extract_body_message]
