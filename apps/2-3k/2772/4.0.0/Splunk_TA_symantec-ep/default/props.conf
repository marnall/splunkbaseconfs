[symantec:ep:syslog]
TRANSFORMS-sub_sourcetype_sep = force_sourcetype_sep_scm_system, force_sourcetype_sep_agent, force_sourcetype_sep_admin, force_sourcetype_sep_policy, force_sourcetype_sep_behavior, force_sourcetype_sep_scan, force_sourcetype_sep_security, force_sourcetype_sep_traffic, force_sourcetype_sep_packet, force_sourcetype_sep_agt_system, force_sourcetype_sep_risk, force_sourcetype_sep_proactive
pulldown_type = true
category = Network & Security
description = Symantec Endpoint Protection via syslog
MAX_TIMESTAMP_LOOKAHEAD = 32
SHOULD_LINEMERGE = false
EVENT_BREAKER_ENABLE = true

[symantec:ep:agt_system:file]
TRANSFORMS-nullqueueheader = sep_file_header
KV_MODE = none
pulldown_type = true
category = Network & Security
description = Symantec Endpoint Protection client agent system events
MAX_TIMESTAMP_LOOKAHEAD = 32
SHOULD_LINEMERGE = false
EVENT_BREAKER_ENABLE = true

REPORT-field_extraction_for_agt_system = field_extraction_for_agt_system,field_extraction_action,field_extraction_status_2,field_extract_event_description,field_extraction_interface,field_extract_event_time,field_exctraction_file_name_file_path,field_exctraction_file_size,field_exctraction_ip_and_mac
REPORT-oject_field_extraction_agt_system = symantec_ep_object_extractions,symantec_ep_firefox_browser_protection,symantec_ep_firewall_enabled,symantec_ep_url_reputation_enabled,symantec_ep_tamper_protection,symantec_ep_services_start,symantec_ep_liveupdate_success,symantec_ep_policy_applied,symantec_ep_services_stop,symantec_ep_host_integrity_disabled,symantec_ep_compliance_checking,symantec_ep_update_browser_extension,symantec_ep_update_intrusion_signatures,symantec_ep_update_definitions,symantec_ep_license_applied,symantec_ep_content_update_failed,symantec_ep_connected,symantec_ep_disconnected,symantec_ep_policy_received,symantec_ep_update_allow_list,symantec_ep_download_success,symantec_ep_memory_exploit,symantec_ep_xml_import,symantec_ep_virus_definition,symantec_ep_services_startup,symantec_ep_symelam_enabled,symantec_ep_update_revocation_data
EVAL-object = if(isnull(object) OR object="", Host_Name, object)
FIELDALIAS-dest = Host_Name as dest
FIELDALIAS-dvc = Host_Name as dvc
FIELDALIAS-body = description as body
FIELDALIAS-signature = description as signature
FIELDALIAS-command = description as command
FIELDALIAS-service = Event_Source as service
FIELDALIAS-service_name = Event_Source as service_name
FIELDALIAS-file_access_time = event_time as file_access_time
EVAL-user = coalesce(user, Group_Name)
FIELDALIAS-signature_id = description as signature_id
FIELDALIAS-result_id = description as result_id
FIELDALIAS-src = Host_Name as src
EVAL-dest_type = "endpoint"
EVAL-src_type = "endpoint"
FIELDALIAS-vendor_account = Group_Name as vendor_account

# Purpose for below "EVAL": trim ' or " or key from field value.
EVAL-Event_Description = nullif(replace(if(match(Event_Description, "^\".*"), trim(Event_Description, "\""), if(match(Event_Description, "^\'.*"), trim(Event_Description, "\'"), Event_Description)), "Event Description:\s*", ""), "")
EVAL-event_action = lower(event_action)
EVAL-result = if(lower(event_status) == "failed", "failure", description)
EVAL-status = if(lower(event_status) == "failed", "failure", "success")
EVAL-app = "Symantec Endpoint Protection"
EVAL-vendor_product = "Symantec Endpoint Protection"

LOOKUP-cim_data_model = symantec_ep_data_model_lookup_400 event_description as Event_Description OUTPUT cim_data_model, dataset
LOOKUP-admin_action = symantec_ep_change_action_lookup event_action OUTPUTNEW action
LOOKUP-change_fields = symantec_ep_change_data_model_fields_lookup vendor_action as Event_Description OUTPUTNEW change_type, object_category
LOOKUP-object_category = symantec_ep_change_data_model_fields_lookup vendor_action as Event_Description OUTPUTNEW change_type, object_category
LOOKUP-alert_type = symantec_ep_alert_type_lookup_400 description as Event_Description OUTPUTNEW type
LOOKUP-vendor_severity_to_severity = symantec_ep_severity_lookup vendor_severity OUTPUT severity

