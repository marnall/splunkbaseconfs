REPORT-field_extraction_for_signature = field_extract_signature_id, field_extract_signature
EVAL-signature = if(signature != "-", signature, null())
EVAL-file_name = coalesce(parameter_file_name, caller_process_file_name)
EVAL-file_path = if(isnull(parameter_file_name) OR parameter_file_name="", Caller_Process_Name, Parameter)

