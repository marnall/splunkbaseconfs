[java]
queryServerSocketTimeout = 300
queryServerStdinTimeout = 60

[loglevel]
dbxquery = INFO
dbxoutput = INFO
dbxlookup = INFO
input = INFO
output = INFO
connector = INFO
processor = INFO
other = INFO

[hec]
maxRetryWhenHecUnavailable = 3
# 10 MB
maxHecContentLength = 10485760
hecFieldNameLowerCase = false

[security]
denylist = 169.254.169.254

[synchronizer]
enabled = true

[telemetry]
enabled = true

[cluster]

[splunkbase_api]
url = https://splunkbase.splunk.com/api/v1/app/
