port: 9999
driversFolder: ${SPLUNK_HOME}/etc/apps/splunk_app_db_connect/drivers/
logbackConfigurationFile: ${SPLUNK_HOME}/etc/apps/splunk_app_db_connect/config/command_logback.xml
maxParallelQuery: 200

# Comma-separated list of TLS protocols, default: TLSv1.2,TLSv1.3
enabledTlsProtocols: TLSv1.2,TLSv1.3
fipsEnabled: false
