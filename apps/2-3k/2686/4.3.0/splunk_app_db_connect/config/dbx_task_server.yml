server:
  rootPath: /api/
  applicationConnectors:
    - type: http
      port: 9998
      # We bind to ipv4 IP address only, if modified to use ipv6 dbxproxy.py needs
      # to be updated
      bindHost: 127.0.0.1
  # Task server can't start if the admin port is occupied. And it's not easy to explain it to user.
  # The only usage of admin port is to update log level at runtime, and we can implement it in another way.
  # So we disable admin port now, it may be reopened in the future if needed. More details, see DBX-3587
  adminConnectors: []
  requestLog:
    appenders:
      - type: file
        currentLogFilename: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server_access.log
        archivedLogFilenamePattern: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server_access.log.%i
        archivedFileCount: 5
        maxFileSize: 20MB
        timeZone: UTC
  minThreads: 128
  maxThreads: 1512

logging:
    level: ${DBX_LOG_LEVEL:-INFO}
    appenders:
      - type: file
        logFormat: "%d{yyyy-MM-dd HH:mm:ss.SSS Z} Trace-Id=%X{trace.id} [%thread] %-5level %logger{50} - %msg%n"
        currentLogFilename: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server.log
        archivedLogFilenamePattern: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server.log.%i
        archivedFileCount: 5
        maxFileSize: 20MB
        timeZone: UTC

    loggers:
      "com.splunk.dbx.server.dbinput": ${DBX_INPUT_LOG_LEVEL:-INFO}
      "com.splunk.dbx.server.dbinput.task.processors": ${DBX_PROCESSOR_LOG_LEVEL:-INFO}
      "com.splunk.dbx.server.dboutput": ${DBX_OUTPUT_LOG_LEVEL:-INFO}
      "com.splunk.dbx.service.output": ${DBX_OUTPUT_LOG_LEVEL:-INFO}
      "com.splunk.dbx.connector": ${DBX_CONNECTOR_LOG_LEVEL:-INFO}

      "com.splunk.dbx.server.task.listeners.JobMetricsListener":
        level: INFO
        additive: false
        appenders:
          - type: file
            logFormat: "%d{yyyy-MM-dd HH:mm:ss.SSS Z} Trace-Id=%X{trace.id} %-5level %logger{50} - %msg%n"
            currentLogFilename: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server_job_metrics.log
            archivedLogFilenamePattern: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server_job_metrics.log.%i
            archivedFileCount: 5
            maxFileSize: 20MB
            timeZone: UTC

      "com.splunk.dbx.connector.logger.AuditLogger":
        level: INFO
        additive: false
        appenders:
          - type: file
            logFormat: "%d{yyyy-MM-dd HH:mm:ss.SSS Z} Trace-Id=%X{trace.id} [%thread] %-5level %logger{50} - operation=%X{operation} connection_name=%X{connection} title=%X{title} %msg%n"
            currentLogFilename: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server_audit.log
            archivedLogFilenamePattern: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server_audit.log.%i
            archivedFileCount: 5
            maxFileSize: 20MB
            timeZone: UTC

      "com.splunk.dbx.server.health.impl.HealthMetricsLogReporter":
        level: INFO
        additive: false
        appenders:
           - type: file
             logFormat: "%d{yyyy-MM-dd HH:mm:ss.SSS Z} Trace-Id=%X{trace.id} %msg%n"
             currentLogFilename: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server_health_metrics.log
             archivedLogFilenamePattern: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server_health_metrics.log.%i
             archivedFileCount: 5
             maxFileSize: 20MB
             timeZone: UTC

      "com.splunk.dbx.connector.health.impl.ConnectionPoolMetricsLogReporter":
          level: INFO
          additive: false
          appenders:
             - type: file
               logFormat: "%d{yyyy-MM-dd HH:mm:ss.SSS Z} Trace-Id=%X{trace.id} %msg%n"
               currentLogFilename: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server_connection_pool_metrics.log
               archivedLogFilenamePattern: ${SPLUNK_HOME}/var/log/splunk/splunk_app_db_connect_server_connection_pool_metrics.log.%i
               archivedFileCount: 5
               maxFileSize: 20MB
               timeZone: UTC

httpClient:
  timeout: 15000ms
  connectionTimeout: 15000ms
  timeToLive: 1h
  cookiesEnabled: false
  maxConnections: 32
  maxConnectionsPerRoute: 32
  keepAlive: 60s
  retries: 3

driversFolder: ${SPLUNK_HOME}/etc/apps/splunk_app_db_connect/drivers/

scheduledJobExecutorMinIdlePoolSize: 128
scheduledJobExecutorMaxPoolSize: 128
scheduledJobExecutorJobQueueSize: 1512

# Comma-separated list of TLS protocols, default: TLSv1.2,TLSv1.3
enabledTlsProtocols: TLSv1.2,TLSv1.3
fipsEnabled: false

metricsCollectIntervalInSeconds: 60
