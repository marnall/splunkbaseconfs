[confspec]
BREAK_ONLY_BEFORE = ^\[\S+\]
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true
EXTRACT-stanza = \[(?P<stanza>\w+)\]
EXTRACT-paramdescription = ^\[\w+\]\s+(?P<description>.*)
EXTRACT-conf = (?<conf>[^.^/^\\]+).conf.spec.new in source
EXTRACT-paramName = ^\[\w+\]\s+(?P<paramName>\w+)

[confexample]
BREAK_ONLY_BEFORE = ^\[\S+\]
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true
EXTRACT-stanza = \[(?P<stanza>\w+)\]
EXTRACT-paramexample = ^\[\w+\]\s+(?P<example>[\s\S]*)
EXTRACT-conf = (?<conf>[^.^/^\\]+).conf.example.new in source
EXTRACT-paramName = ^\[\w+\]\s+(?P<paramName>\w+)

