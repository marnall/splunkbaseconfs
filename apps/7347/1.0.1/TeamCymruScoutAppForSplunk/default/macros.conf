[team_cymru_indicator_indices]
description = Definition for all indices where Indicators are stored
definition = index IN (main)
iseval = 0

[team_cymru_domains_target_query]
description = Splunk query to match against Indicators for correlation
definition = index=main sourcetype!=*team_cymru_*
iseval = 0

[team_cymru_ips_target_query]
description = Splunk query to match against Indicators for correlation
definition = index=main sourcetype!=*team_cymru_*
iseval = 0

[team_cymru_domains_target_indicator_fields]
description = Comma separated list of all fields in Splunk event on which correlation will be performed for Indicator type Domains.
definition = domain, src, dest
iseval = 0

[team_cymru_ips_target_indicator_fields]
description = Comma separated list of all fields in Splunk event on which correlation will be performed for Indicator type IPs.
definition = ip, src, dest
iseval = 0

[team_cymru_start_time]
description = Timeline start time for live investigation dashboard.
definition = 30
iseval = 0