# Configure tcpdump to read pflog data: tcpdump -pqUnner /var/log/pflog

# Mar 29 16:00:01 sys1 pflogd[75008]: [priv]: msg PRIV_OPEN_LOG received
[ev_pflog_msg_priv_open_log]
search = sourcetype=firewall:pflog "msg PRIV_OPEN_LOG received"

# Mar 29 16:04:00 sys1 pflogd: 16:03:00.139722 rule 145..16777216/0(match): pass out on em0: X.Y.210.101.49270 > X.Y.210.251.6159: UDP, length 62
[ev_pflog_pass_out_udp]
search = sourcetype=firewall:pflog "pass out on " "UDP, "

# Mar 29 16:05:01 sys1 pflogd: 16:03:49.871319 rule 121..16777216/0(match): pass in on em0: X.Y.173.78.57336 > 192.168.0.101.80: tcp 0
[ev_pflog_pass_in_tcp]
search = sourcetype=firewall:pflog "pass in on " "tcp 0"

# Mar 29 16:52:00 sys1 pflogd: 16:50:42.792950 rule 130..16777216/0(match): pass in on em0: X.Y.18.16.55667 > 192.168.0.118.53: UDP, length 50
[ev_pflog_pass_in_udp]
search = sourcetype=firewall:pflog "pass in on " "UDP, "

# Mar 29 16:05:01 sys1 pflogd: 16:04:00.246976 rule 118..16777216/0(match): block in on em0: X.Y.185.1 > X.Y.210.101: ICMP echo request, id 6891, seq 1, length 12
[ev_pflog_block_in_icmp]
search = sourcetype=firewall:pflog "block in on " ": ICMP"

# Mar 29 16:49:00 sys1 pflogd: 16:48:01.249633 rule 118..16777216/0(match): block in on em0: fe80::2ff:ffff:feff:fffd.2029 > ff02::66.2029: UDP, length 52
[ev_pflog_block_in_udp]
search = sourcetype=firewall:pflog "block in on " "UDP, "

# Mar 29 17:09:01 sys1 pflogd: 17:07:28.908398 rule 118..16777216/0(match): block in on em0: X.Y.247.10.7049 > X.Y.210.101.42070: tcp 0
[ev_pflog_block_in_tcp]
search = sourcetype=firewall:pflog "block in on " "tcp 0"

# Mar 29 17:09:01 sys1 pflogd: 17:07:28.803473 rule 144..16777216/0(match): pass out on em0: X.Y.210.101.58013 > X.Y.29.76.80: tcp 0
[ev_pflog_pass_out_tcp]
search = sourcetype=firewall:pflog "pass out on " "tcp 0"

[ev_pflog_unknown]
search = sourcetype=firewall:pflog eventtype!=ev_pflog_msg_priv_open_log eventtype!=ev_pflog_pass_out_udp eventtype!=ev_pflog_pass_in_tcp eventtype!=ev_pflog_block_in_icmp eventtype!=ev_pflog_block_in_udp eventtype!=ev_pflog_pass_in_udp eventtype!=ev_pflog_block_in_tcp eventtype!=ev_pflog_pass_out_tcp
