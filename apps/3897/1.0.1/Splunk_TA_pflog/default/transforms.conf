FORMAT = vendor_action::$1 vendor_direction::$2 dvc::$3 src_ip::$4 src_port::$5 dest_ip::$6 dest_port::$7 vendor_transport::$8 bytes_in::$9

# Mar 29 16:04:00 sys1 pflogd: 16:03:00.139722 rule 145..16777216/0(match): pass out on em0: X.Y.210.101.49270 > X.Y.210.251.6159: UDP, length 62
