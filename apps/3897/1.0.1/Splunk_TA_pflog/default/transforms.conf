# CIM: http://docs.splunk.com/Documentation/CIM/latest/User/NetworkTraffic

[lookup_action]
filename = pflog_actions.csv

[lookup_transport]
filename = pflog_transports.csv

[lookup_direction]
filename = pflog_directions.csv

# Mar 29 16:10:01 sys1 pflogd: 16:08:59.981875 rule 118..16777216/0(match): block in on em0: X.Y.185.1 > X.Y.210.101: ICMP echo request, id 58421, seq 1, length 12
[action_block_in_icmp]
REGEX = rule \S+ (block) (in) on (\w+): (\S+) > (\S+): (ICMP) ([^,]+), id (\d+), seq (\d+), length (\d+)
FORMAT = vendor_action::$1 vendor_direction::$2 interface::$3 src_ip::$4 dest_ip::$5 vendor_transport::$6 vendor_message::$7 icmp_id::$8 icmp_seq::$9 bytes_in::$10

# 06:27:25.871193 rule 3..16777216/0(match): pass in on lo1: 192.168.0.132.52562 > 192.168.0.134.80: tcp 0
[action_pass_in_tcp]
REGEX = rule \S+ (pass) (in) on (\w+): (\S+)\.(\d+) > (\S+)\.(\d+): (tcp) (\d+)
FORMAT = vendor_action::$1 vendor_direction::$2 interface::$3 src_ip::$4 src_port::$5 dest_ip::$6 dest_port::$7 vendor_transport::$8 bytes_in::$9

# 00:01:56.504700 rule 49..16777216/0(match): block in on re0: X.Y.120.10.55808 > X.Y.25.71.3389: tcp 0
[action_block_in_tcp]
REGEX = rule \S+ (block) (in) on (\w+): (\S+)\.(\d+) > (\S+)\.(\d+): (tcp) (\d+)
FORMAT = vendor_action::$1 vendor_direction::$2 interface::$3 src_ip::$4 src_port::$5 dest_ip::$6 dest_port::$7 vendor_transport::$8 bytes_in::$9

# Mar 29 16:25:01 sys1 pflogd: 16:23:18.403517 rule 130..16777216/0(match): pass in on em0: X.Y.92.20.44966 > 192.168.0.118.53: UDP, length 61
# Feb 28 23:59:00 sys2 23:57:42.134219 rule 126..16777216/0(match): pass in on re0: 137.74.213.135.13974 > 192.168.0.143.53: UDP, length 38
[action_pass_in_udp]
REGEX = rule [^ ]+ (pass) (in) on (\w+): (.+)\.(\d+) > (.+)\.(\d+): (UDP), length (\d+)
FORMAT = vendor_action::$1 vendor_direction::$2 dvc::$3 src_ip::$4 src_port::$5 dest_ip::$6 dest_port::$7 vendor_transport::$8 bytes_in::$9

