# DO NOT EDIT THIS FILE!
# Please make all changes to files in $SPLUNK_HOME/etc/apps/TA_Zimbra/local.
# To make changes, copy the section/stanza you want to change from $SPLUNK_HOME/etc/apps/TA_Zimbra/default
# into ../local and edit there.
#
# TA_Zimbra
# Simon Richardson
# props.conf

[(::){0}zimbra:*]
TRANSFORMS-zzz-zimbra_raw_length = zimbra_raw_length
EVAL-vendor_product = "Zimbra Collaboration Server OSS"

[zimbra:mailbox]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
#TIME_FORMAT = %Y-%m-%d %H:%M:%S,%Q
#TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 40
REPORT-mailbox_main = mailbox_main
REPORT-mailbox_account_name = mailbox_account_name
REPORT-mailbox_mailbox_mid = mailbox_mailbox_mid
REPORT-mailbox_mailbox_id = mailbox_mailbox_id
REPORT-mailbox_mailbox_aid = mailbox_mailbox_aid
REPORT-mailbox_account_aname = mailbox_account_aname
REPORT-mailbox_via = mailbox_via
REPORT-mailbox_msgid = mailbox_msgid
REPORT-mailbox_data_source = mailbox_data_source
REPORT-mailbox_client_ip = mailbox_client_ip
REPORT-mailbox_client_port = mailbox_client_port
REPORT-mailbox_client_oport = mailbox_client_oport
REPORT-mailbox_client_proto = mailbox_client_proto
REPORT-mailbox_client_id = mailbox_client_id
REPORT-mailbox_user_agent = mailbox_user_agent
REPORT-mailbox_src_ip = mailbox_src_ip
REPORT-mailbox_oip_ip = mailbox_oip_ip
REPORT-mailbox_soap_id = mailbox_soap_id
REPORT-mailbox_component = mailbox_component
REPORT-mailbox_message = mailbox_message

[zimbra:mailbox:access]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
#TIME_FORMAT = %Y-%m-%d %H:%M:%S,%Q
#TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 40
REPORT-mailbox_access_main = mailbox_access_main

[zimbra:postfix]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
#TIME_FORMAT = %Y-%m-%d %H:%M:%S,%Q
#TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 40
REPORT-postfix_main = postfix_main
REPORT-postfix_queue_id = postfix_queue_id
REPORT-postfix_from = postfix_from
REPORT-postfix_to = postfix_to
REPORT-postfix_proto = postfix_proto
REPORT-postfix_helo = postfix_helo
REPORT-postfix_nrcpt = postfix_nrcpt
REPORT-postfix_size = postfix_size
REPORT-postfix_source_mta = postfix_source_mta
REPORT-postfix_delays = postfix_delays
REPORT-postfix_status = postfix_status
REPORT-postfix_status_full = postfix_status_full
REPORT-postfix_zqueue_id = postfix_zqueue_id
REPORT-postfix_connect_type = postfix_connect_type
REPORT-postfix_client = postfix_client
REPORT-postfix_smtpd_tls = postfix_smtpd_tls
REPORT-postfix_msg_id = postfix_msg_id
REPORT-postfix_script_msg = postfix_script_msg
REPORT-postfix_deferred = postfix_deferred
REPORT-postfix_commands = postfix_commands
REPORT-postfix_postscreen = postfix_postscreen
REPORT-postfix_delivery_status = postfix_delivery_status
REPORT-postfix_relay = postfix_relay
EVAL-delay = delay*1000
EVAL-dest = coalesce(dest, nullif(dest_host, "unknown"), dest_ip)
EVAL-src = coalesce(src, nullif(src_host, "unknown"), src_ip)
FIELDALIAS-action = status as action
FIELDALIAS-internal_message_id = queue_id AS internal_message_id
FIELDALIAS-message_id = zqueue_id as message_id
FIELDALIAS-process = postfix_process as process
FIELDALIAS-process_id = pid AS process_id
FIELDALIAS-protocol = proto as protocol
FIELDALIAS-recipient = to as recipient
FIELDALIAS-recipient_count = nrcpt as recipient_count
FIELDALIAS-src_user = from as src_user

[zimbra:zsyslog]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
#TIME_FORMAT = %Y-%m-%d %H:%M:%S,%Q
#TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 40
TRANSFORMS-zimbra_change_sourcetype = zimbra_sourcetype_postfix
REPORT-zimbra_zsyslog_main = zimbra_zsyslog_main
REPORT-zimbra_zsyslog_amavis_main = zimbra_zsyslog_amavis_main

[zimbra:clamd]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
#TIME_FORMAT = %Y-%m-%d %H:%M:%S,%Q
#TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 40
REPORT-zimbra_clamd_main = zimbra_clamd_main
REPORT-zimbra_clamd_problem = zimbra_clamd_problem

[zimbra:clamd:updates]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
#TIME_FORMAT = %Y-%m-%d %H:%M:%S,%Q
#TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 40

[zimbra:auditlog]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
#TIME_FORMAT = %Y-%m-%d %H:%M:%S,%Q
#TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 40
REPORT-zimbra_auditlog_main = zimbra_auditlog_main
REPORT-zimbra_auditlog_user = zimbra_auditlog_user
REPORT-zimbra_auditlog_user_id = zimbra_auditlog_user_id
REPORT-zimbra_auditlog_user_ip = zimbra_auditlog_user_ip
REPORT-zimbra_auditlog_user_port = zimbra_auditlog_user_port
REPORT-zimbra_auditlog_user_ua = zimbra_auditlog_user_ua
REPORT-zimbra_auditlog_user_soapid = zimbra_auditlog_user_soapid
REPORT-zimbra_auditlog_action = zimbra_auditlog_action
REPORT-zimbra_auditlog_target = zimbra_auditlog_target
REPORT-zimbra_auditlog_change = zimbra_auditlog_change
REPORT-zimbra_auditlog_delegate_view = zimbra_auditlog_delegate_view

[zimbra:proxy]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
MAX_TIMESTAMP_LOOKAHEAD = 60
TIME_PREFIX=\-\s+\[
EVAL-app = "Zimbra Web Service"
EVAL-url_length = len(url)
EVAL-http_user_agent_length = len(http_user_agent)
FIELDALIAS-bytes = bytes_out AS bytes
FIELDALIAS-dest = proxy_server_ip AS dest
FIELDALIAS-dest_port = proxy_server_port AS dest_port
FIELDALIAS-src = src_ip as src
REPORT-zimbra_proxy_main = zimbra_proxy_main
REPORT-zimbra_proxy_uri = zimbra_proxy_uri
REPORT-zimbra_proxy_url_domain = zimbra_proxy_url_domain
REPORT-zimbra_proxy_referrer_domain = zimbra_proxy_referrer_domain
LOOKUP-nginx_httpstatus_lookup = nginx_httpstatus_lookup status OUTPUT status_description status_type status_description AS action
#LOOKUP-nginx_httpstatus_lookup = nginx_httpstatus_lookup status AS target_mbx_server_status OUTPUT status_description AS target_mbx_server_status_description,status_type AS target_mbx_server_status_type
