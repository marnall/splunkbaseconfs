[provider-family:pi_family]
vix.mode = stream
vix.command = java
vix.command.arg.1 = -jar
vix.command.arg.2 = $SPLUNK_HOME/etc/apps/PI_Integrator/bin/PI_ERP.jar

[provider:pi_provider]
vix.family = pi_family
vix.splunk.search.debug = 1

[pi]
vix.provider = pi_provider

[pi_logs]
coldPath = $SPLUNK_DB/pi_logs/colddb
homePath = $SPLUNK_DB/pi_logs/db
thawedPath = $SPLUNK_DB/pi_logs/thaweddb
maxTotalDataSizeMB = 500