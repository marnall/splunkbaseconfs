[source::udp:514]
TRANSFORMS-force_sourcetype_websense = force_sourcetype_websense_ss
TRANSFORMS-force_index_websense = force_to_index_websense

[websense_ss]
EXTRACT-user = user=.*/(?<user>.+)\ssrc_host
LOOKUP-lookup_category = category-lookup category OUTPUT category_name,category_child_name
LOOKUP-lookup_disposition = disposition-lookup disposition OUTPUT disposition_description,disposition_blocking
LOOKUP-lookup_httpstatus = httpstatus-lookup status AS http_response OUTPUT status_description AS httpstatus_description ,status_type AS http_status_type 
LOOKUP-lookup_proxystatus = httpstatus-lookup status AS http_proxy_status_code OUTPUT  status_description AS proxystatus_description ,status_type AS proxy_status_type

