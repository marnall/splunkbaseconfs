[admin:splunk_beacon]
match = /
members = splunk_beacon_api_token, splunk_beacon_beacon_input, splunk_beacon_settings

[admin_external:splunk_beacon_api_token]
handlertype = python
python.version = python3
handlerfile = splunk_beacon_rh_api_token.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:splunk_beacon_beacon_input]
handlertype = python
python.version = python3
handlerfile = splunk_beacon_rh_beacon_input.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:splunk_beacon_settings]
handlertype = python
python.version = python3
handlerfile = splunk_beacon_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true
