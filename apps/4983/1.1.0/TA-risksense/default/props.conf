[risksense:hosts]
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 0
SHOULD_LINEMERGE = False
KV_MODE = json
DATETIME_CONFIG = NONE
FIELDALIAS-src = sources{}.name as src
FIELDALIAS-dest_port = ports{}.number as dest_port
FIELDALIAS-dest = ipAddress as dest
FIELDALIAS-service_name = services{} as service_name
FIELDALIAS-cvss = rs3 as cvss
FIELDALIAS-severity_id = criticality as severity_id
EVAL-vendor_product = "RiskSense Inc."

[risksense:apps]
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 0
SHOULD_LINEMERGE = False
KV_MODE = json
DATETIME_CONFIG = NONE

[risksense:clients]
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 0
SHOULD_LINEMERGE = False
KV_MODE = json
DATETIME_CONFIG = NONE

[source::...ta-risksense*.log*]
sourcetype = tarisksense:log

