[CBA Credentials Lookup]
disabled = true
action.email.useNSSubject = 1
action.lookup = 1
action.lookup.filename = cba_credentials_lookup.csv
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 5 * * * *
description = This reports schedules a search that outputs credentials watchlist to the lookup.
dispatch.earliest_time = 0
enableSched = 1
schedule_window = 5
search = index=* sourcetype="cbacredentials" | stats values(status) as status, values(last_detection_date) as date by email | outputlookup cba_credentials_lookup.csv

[CBA Domains lookup]
disabled = true
action.email.useNSSubject = 1
action.lookup = 1
action.lookup.filename = cba_domains_lookup.csv
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 5 * * * *
description = This lookup will populate the domain watchlist with the most up to date data
dispatch.earliest_time = 0
enableSched = 1
schedule_window = 5
search = index=* sourcetype="cbadomains" | stats values(status) as status, values(ip) as ip, values(mx) as mx,values(ns) as ns,  values(detection_detection_date) as date by domain | outputlookup cba_domains_lookup.csv
