[Threat - Threat_Notable - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Threat_Notable
action.customsearchbuilder.enabled = false
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable = 1
action.notable.param.rule_description = $title$
action.notable.param.rule_title = $description$
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param._risk_score = 0
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"src_asset_id","risk_object_type":"network_artifacts","risk_score":4},{"threat_object_field":"dest_ip","threat_object_type":"ip_address"}]
action.risk.param._risk_message = Risk of Cyber Attack
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = A correlational search for the Radiflow alerts which creates Threat notables
dispatch.earliest_time = -5m
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = (`radiflow_alert_macro`) eventtype=CYBER_ATTACK | eval severity=case(severity=="Critical","critical",severity=="High","high",severity=="Medium","medium",serverity=="Low","low")


