[Radiflow Populate ot_asset_pri_matrix]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 0 * * * *
description = This search runs daily and generates a list of assets in the last 30 days.  This list can then be exported and used in Enterprise Security and the OT Security Add-on for Splunk.
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 1
search = index="radiflow" sourcetype="Radiflow:Assets" \
| eval ip=if(ip="255.255.255.255", "", ip)\
| dedup asset_id\
| eval asset_criticality=case(asset_criticality == 1 OR asset_criticality == 2 OR asset_criticality == 3,"low",asset_criticality == 4 OR asset_criticality == 5 OR asset_criticality == 6 OR asset_criticality == 7,"medium",asset_criticality == 8 OR asset_criticality == 9 OR asset_criticality == 10,"high",asset_criticality == "","unknown")\
| eval priority_join= if(isnull(asset_type),"",lower(asset_type))+":"+if(isnull(exposure),"",lower(exposure))+":"+if(isnull(location),"",lower(location))\
| table  asset_type,exposure,location,asset_count,asset_criticality,priority_join\
| outputlookup ot_asset_pri_matrix.csv

