
[ccx_infoblox_audit_alert]
search = (sourcetype="infoblox:audit") infoblox_action="Called"
# tags = alert

[ccx_infoblox_audit_change]
search = (sourcetype="infoblox:audit") infoblox_action IN ("Modified", "Created")
# tags = change

[ccx_infoblox_dns_alert]
search = (sourcetype="infoblox:dns") NOT eventtype IN ("infoblox_dns", "infoblox_dns_query_denied", "infoblox_dns_query_error", "infoblox_dns_query_failed", "infoblox_dns_rpz")
# tags = alert
