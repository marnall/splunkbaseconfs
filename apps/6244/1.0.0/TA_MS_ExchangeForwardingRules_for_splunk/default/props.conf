[msexchange:mailforward:csv]
# Splunk magic 8 props
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
# TIME_PREFIX = ^
# MAX_TIMESTAMP_LOOKAHEAD = 28
# TIME_FORMAT=%Y-%m-%d %H:%M:%S.%Q %Z
# TRUNCATE = 700
# For_Load_Balancing_On_UF
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)
DATETIME_CONFIG=CURRENT
NO_BINARY_CHECK=true
CHARSET=UTF-8
KV_MODE=none
category=Mail
description=Comma-separated value format. Set header and other settings in "Delimited Settings"
pulldown_type=true
FIELD_NAMES=SamAccountName,UserPrincipalName,PrimarySmtpAddress,RuleId,RuleEnabled,RuleName,ExternalRecipients,RedirectTo,ForwardTo,ForwardAsAttachmentTo,RuleDescription
REPORT-auto_kv_for_msexchange_mailforward = auto_kv_for_msexchange_mailforward
EVAL-ForwardTo=replace(ForwardTo, "\"\"", "\"")
EVAL-RedirectTo=replace(RedirectTo, "\"\"", "\"")

[msexchange:mailforward]
# Splunk magic 8 props
SHOULD_LINEMERGE = false
LINE_BREAKER = \s{24}([\r\n]+)
# TIME_PREFIX = ^
# MAX_TIMESTAMP_LOOKAHEAD = 28
# TIME_FORMAT=%Y-%m-%d %H:%M:%S.%Q %Z
# TRUNCATE = 700
# For_Load_Balancing_On_UF
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)
DATETIME_CONFIG=CURRENT
NO_BINARY_CHECK=true
CHARSET=UTF-8
KV_MODE=none
category=Mail
description=Comma-separated value format. Set header and other settings in "Delimited Settings"
pulldown_type=true
EVAL-ForwardTo=replace(ForwardTo, "\"\"", "\"")
EVAL-RedirectTo=replace(RedirectTo, "\"\"", "\"")
EXTRACT-msexchange_mailforward = (?ms)SamAccountName\s+:\s(?<SamAccountName>.*?)\nUserPrincipalName\s+:\s(?<UserPrincipalName>.*?)\nPrimarySmtpAddress\s+:\s(?<PrimarySmtpAddress>.*?)\nRuleId\s+:\s(?<RuleId>.*?)\nRuleEnabled\s+:\s(?<RuleEnabled>.*?)\nRuleName\s+:\s(?<RuleName>.*?)\nExternalRecipients\s+:\s(?<ExternalRecipients>.*?)\nRedirectTo\s+:\s(?<RedirectTo>.*?)\nForwardTo\s+:\s(?<ForwardTo>.*?)\nForwardAsAttachmentTo\s+:\s(?<ForwardAsAttachmentTo>.*?)\nRuleDescription\s+:\s(?<RuleDescription>.*?)\s{24}$