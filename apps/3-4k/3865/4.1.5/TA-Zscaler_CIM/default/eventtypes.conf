[Zscaler_CFW]
search = (sourcetype=zscalernss-fw)


[Zscaler_DNS]
search = (sourcetype=zscalernss-dns)


[Zscaler_Proxy_General]
search = (sourcetype=zscalernss-web)


[Zscaler_Proxy_DLP]
search = (sourcetype=zscalernss-web ruletype="DLP")


# [Zscaler_ZPA]
# search = (sourcetype=zscalerlss-zpa-app) OR (sourcetype=zscalerlss-zpa-auth) OR (sourcetype=zscalerlss-zpa-connector)


[Zscaler_Proxy_Malware]
search = (sourcetype="zscalernss-web" threatname!="None")


[Zscaler_Sandbox]
search = (sourcetype=zscalerapi-zia-sandbox)


[Zscaler_Audit]
search = (sourcetype=zscalerapi-zia-audit)


[Zscaler_ZPA_BBA]
search = (sourcetype=zscalerlss-zpa-bba StatusCode!=0 Method!=PROPFIND)


[Zscaler_ZPA_Web_Inspection]
search = (sourcetype="zscalerlss-zpa-web-inspection" StatusCode!=0)


[Zscaler_ZPA_App]
search = (sourcetype=zscalerlss-zpa-app)


[Zscaler_ZPA_Audit]
search = (sourcetype="zscalerlss-zpa-audit")


[Zscaler_ZPA_Auth]
search = (sourcetype="zscalerlss-zpa-auth")


[zscaler-workload-dns]
search = `z-index` sourcetype=zscalernss-workload-dns
# This eventtype is tagged in tags.conf for the DNS data model.

[zscaler-workload-control-plane-change]
search = `z-index` sourcetype=zscalernss-workload-events event.event_name="Control Plane"
# This eventtype is tagged in tags.conf for the Change data model.

[zscaler-workload-dhcp-session]
search = `z-index` sourcetype=zscalernss-workload-events event.event_name="DHCP Lease Commit"
# This eventtype is tagged in tags.conf for the Network Sessions data model.

[zscaler-workload-session]
search = `z-index` sourcetype=zscalernss-workload-session
# This eventtype is tagged in tags.conf for the Network Sessions data model.

[zscaler-workload-metrics]
search = `z-index` sourcetype=zscalernss-workload-metrics
# This eventtype is tagged in tags.conf for the Performance and Inventory data models.
#
