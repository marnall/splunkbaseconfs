[sandbox_pending_lookup]
filename = zscaler-md5-lookup.csv


[zscaler_zia_fw_syslog]
REGEX = (sourcetype=zscalernss-fw)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::zscalernss-fw


[zscaler_zia_web_syslog]
REGEX = (sourcetype=zscalernss-web)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::zscalernss-web


[zscaler_zia_dns_syslog]
REGEX = (sourcetype=zscalernss-dns)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::zscalernss-dns


[zscaler_zia_audit_syslog]
REGEX = (sourcetype=zscalernss-audit)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::zscalernss-audit


[zscaler_zpa_connector_syslog]
REGEX = (\"sourcetype\"\:\s+?\"zscalerlss-zpa-connector\")
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::zscalerlss-zpa-connector


[zscaler_zpa_audit_syslog]
REGEX = (\"sourcetype\"\:\s+?\"zscalerlss-zpa-audit\")
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::zscalerlss-zpa-audit


[zscaler_zpa_bba_syslog]
REGEX = (\"sourcetype\"\:\s+?\"zscalerlss-zpa-bba\")
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::zscalerlss-zpa-bba


[zscaler_zpa_app_syslog]
REGEX = ((\"sourcetype\"\:\s+?\"zscalerlss-zpa-app\"))
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::zscalerlss-zpa-app


[zscaler_zpa_auth_syslog]
REGEX = ((\"sourcetype\"\:\s+?\"zscalerlss-zpa-auth\"))
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::zscalerlss-zpa-auth

[zscalernss_web_and_tunnel_json1]
REGEX = ^(\{.*?)"url"\s*:\s*"
FORMAT = json1::$1

[zscalernss_web_and_tunnel_url]
REGEX = ^\{.*"url"\s*:\s*"((?:\\.|[^"\\]++)*)"
FORMAT = url::$1

[zscalernss_web_and_tunnel_json2]
REGEX = ^\{.*"url"\s*:\s*"(?:\\.|[^"\\]++)*",\s*(.*)$
FORMAT = json2::$1

[zscalernss_web_and_tunnel_json1_strings]
SOURCE_KEY = json1
REGEX = \"([^\"]+)\"\s*:\s*\"((?:\\\\.|[^\"\\\\])*)\"
FORMAT = $1::$2
KEEP_EMPTY_VALS = true
DEPTH_LIMIT = 5000
MATCH_LIMIT = 250000

[zscalernss_web_and_tunnel_json1_scalars]
SOURCE_KEY = json1
REGEX = \"([^\"]+)\"\s*:\s*(true|false|null|-?(?:0|[1-9]\d*)(?:\.\d+)?)
FORMAT = $1::$2
KEEP_EMPTY_VALS = true
DEPTH_LIMIT = 5000
MATCH_LIMIT = 250000

[zscalernss_web_and_tunnel_json2_strings]
SOURCE_KEY = json2
REGEX = \"([^\"]+)\"\s*:\s*\"((?:\\\\.|[^\"\\\\])*)\"
FORMAT = $1::$2
KEEP_EMPTY_VALS = true
DEPTH_LIMIT = 5000
MATCH_LIMIT = 250000

[zscalernss_web_and_tunnel_json2_scalars]
SOURCE_KEY = json2
REGEX = \"([^\"]+)\"\s*:\s*(true|false|null|-?(?:0|[1-9]\d*)(?:\.\d+)?)
FORMAT = $1::$2
KEEP_EMPTY_VALS = true
DEPTH_LIMIT = 5000
MATCH_LIMIT = 250000

[zscalernss_web_and_tunnel_tsv]
REGEX = ^(?!\s*\{)(?:.*?[ \t]+)?((?:[^=\t ]+)=.*)$
FORMAT = tsv::$1

[zscalernss_web_and_tunnel_tsv_fields]
SOURCE_KEY = tsv
REGEX = (?:^|\t)([^=\t]+)=([^\t]*)
FORMAT = $1::$2
KEEP_EMPTY_VALS = true
