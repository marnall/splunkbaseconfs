#####################################
#####################################
#  Sophos XG Firewall SourceTypes (SFOS)
#####################################
#####################################

[xg_http_sourcetype]
REGEX = log_type\=\"Content Filtering\"\slog_component\=\"HTTP\"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:sfos:httpproxy

[xg_fw_sourcetype]
REGEX = log_type\=\"Security\sPolicy\"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:sfos:fw

[xg_fw_sourcetype2]
REGEX = log_type\=\"Firewall\"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:sfos:fw

[xg_auth_sourcetype]
REGEX = log_type\=\"Event\"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:sfos:auth

[xg_config_sourcetype]
REGEX = log_type\=\"(System\sHealth|Heartbeat)\"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:sfos:health

[xg_ips_sourcetype]
REGEX = log_type\=\"IDP\"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:sfos:ips

[xg_ips_sourcetype2]
REGEX = log_type\=\"ATP\"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:sfos:ips

[xg_wifi_sourcetype]
REGEX = log_type\=\"Wireless\sProtection\"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:sfos:wifi

[xg_av_sourcetype]
REGEX = log_type\=\"Anti-Virus\"
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sophos:sfos:av

#####################################
#####################################
#  Sophos SG UTM SourceTypes
#####################################
#####################################

[sophos_http_sourcetype]
REGEX = sub\=\"http\"
FORMAT = sourcetype::sophos:utm:httpproxy
DEST_KEY = MetaData:Sourcetype

[sophos_fw_sourcetype]
REGEX = sub\=\"packetfilter\"
FORMAT = sourcetype::sophos:utm:fw
DEST_KEY = MetaData:Sourcetype

[sophos_ips_sourcetype]
REGEX = ((sub\=\"ips\")|(name\=\".[^\"]*\(ATP\)))
FORMAT = sourcetype::sophos:utm:ips
DEST_KEY = MetaData:Sourcetype


#####################################
#####################################
#  Sophos UTM Indexes
#####################################
#####################################

#This is where indexes are set for the different sourcetypes generated by the UTMs these indexes should be created before installing the app

#SG UTM Indexes
[sophos_utm9_ips_index]
REGEX = ((sub\=\"ips\")|(name\=\".*\(ATP\)))
DEST_KEY = _MetaData:Index
FORMAT = netids

[sophos_utm9_fw_index]
REGEX = sub\=\"packetfilter\"
DEST_KEY = _MetaData:Index
FORMAT = netfw

[sophos_utm9_http_index]
REGEX = sub\=\"http\"
DEST_KEY = _MetaData:Index
FORMAT = netproxy

#XG Firewall Indexes
[sophos_xg_ips_index]
REGEX = log_type\=\"IDP\"
DEST_KEY = _MetaData:Index
FORMAT = netids

[sophos_xg_ips_index2]
REGEX = log_type\=\"ATP\"
DEST_KEY = _MetaData:Index
FORMAT = netids

[sophos_xg_fw_index]
REGEX = log_type\=\"Security\sPolicy\"
DEST_KEY = _MetaData:Index
FORMAT = netfw

[sophos_xg_fw_index2]
REGEX = log_type\=\"Firewall\"
DEST_KEY = _MetaData:Index
FORMAT = netfw

[sophos_xg_ops_index]
REGEX = log_type\=\"(System\sHealth|Heartbeat)\"
DEST_KEY = _MetaData:Index
FORMAT = netops

[sophos_xg_http_index]
REGEX = log_type\=\"Content\sFiltering\"\slog_component\=\"HTTP\"
DEST_KEY = _MetaData:Index
FORMAT = netproxy
LOOKAHEAD = 8000

[sophos_xg_vpn_index]
REGEX = log_type\=\"Event\"?
DEST_KEY = _MetaData:Index
FORMAT = netvpn

[sophos_xg_wifi_index]
REGEX = log_type\=\"Wireless\sProtection\"
DEST_KEY = _MetaData:Index
FORMAT = netwifi
LOOKAHEAD = 8000

[sophos_xg_av_index]
REGEX = log_type\=\"Anti-Virus\"
DEST_KEY = _MetaData:Index
FORMAT = netav
LOOKAHEAD = 8000
