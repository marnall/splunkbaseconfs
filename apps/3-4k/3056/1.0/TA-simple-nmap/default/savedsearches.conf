[NMAP Summary Open Port Count]
action.email.useNSSubject = 1
action.summary_index = 1
action.summary_index.openportcount = openportcount
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = */10 * * * *
dispatch.earliest_time = -10m@m
dispatch.latest_time = now
dispatchAs = user
display.events.fields = ["host","source","sourcetype","duration"]
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = TA-simple-nmap
request.ui_dispatch_view = search
search = tag=nmap | stats dc(port) as "openportcount" by host

[Summary Port Description]
action.email.useNSSubject = 1
action.summary_index = 1
action.summary_index.portprofile = portprofile
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = */2 * * * *
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","duration"]
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = TA-simple-nmap
request.ui_dispatch_view = search
search = tag=nmap | stats sum(port) as "portprofile" by host
