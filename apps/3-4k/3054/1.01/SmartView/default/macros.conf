[default]

[access_filter]
iseval = 0
definition = ( calc_product="Firewall" OR \
  calc_product="Application Control" OR  \
  calc_product="URL Filtering" OR \
  calc_product="DLP"\
) \
( calc_action=Block OR  \
  calc_action=Accept OR  \
  calc_action=Drop OR  \
  calc_action=Reject OR  \
  calc_action=Allow OR  \
  calc_action="Ask User" OR \
  calc_action="Inform User" \
)

[bytes_format(1)]
iseval = 0
definition = case($bytes$>1073741824, tostring(round($bytes$/1073741824,2))+" GB",$bytes$>1048576, tostring(round($bytes$/1048576,2))+" MB",$bytes$>1024, tostring(round($bytes$/1024))+" KB",1==1,tostring($bytes$)+" Bytes")\

validation = $bytes$>0
errormsg = error
args = bytes

[calc_risk(1)]
iseval = 0
definition = case( $app_risk$=0,"Unknown", $app_risk$=1,"Very Low", $app_risk$=2,"Low", $app_risk$=3,"Medium", $app_risk$=4,"High", $app_risk$=5,"Critical" ,1=1,"Undefined")
args = app_risk

[calc_severity(1)]
iseval = 0
definition = case( $v$=0,"Informational", $v$=1,"Low", $v$=2,"Medium", $v$=3,"High", $v$=4,"Critical",1=1,"Undefined")
args = v

[severe_attacks]
iseval = 0
definition = severity>1 severity<5  (Confidence_Level=0 OR Confidence_Level=3 OR Confidence_Level=4 OR Confidence_Level=5)

[sv_values]
iseval = 0
definition = sourcetype=opsec* | eval te_action =if(isnotnull(te_action),te_action,action)|\
eval sv_product = case (  \
match(product,"Application Control"),"Application Control",  \
match(product,"URL Filtering"),"URL Filtering",  \
match(product,"Malware"),"Anti-Bot",  \
match(product,"Anti Virus"),"Anti-Virus",  \
product=="DefensePro","DDoS Protector",  \
product=="SmartDefense","IPS",  \
1==1,product) \
| eval sv_action = case( 	\
\
te_action=="monitor","Detect",   \
te_action=="prevent","Prevent", \
te_action=="prevented","Prevent", \
te_action=="block","Block", \
te_action=="blocked","Block", \
te_action=="accept","Accept", \
te_action=="drop","Drop", \
te_action=="reject","Reject", \
te_action=="allow","Allow", \
te_action=="ask","Ask User", \
te_action=="inform","Inform User", \
1==1,"Undefined" \
)\
\
| \
eval sv_severity = \
case( \
Severity=0,"Info", \
Severity=1,"Low", \
Severity=2,"Medium", \
Severity=3,"High", \
Severity=4,"Critical",\
severity=0,"Info", \
severity=1,"Low", \
severity=2,"Medium", \
severity=3,"High", \
severity=4,"Critical" \
,1=1,"Undefined")

[threat_prevention_overview_filter]
iseval = 0
definition = severity>1 severity<5  (calc_product="Anti-Virus" OR calc_product="Anti-Bot" OR calc_product="Threat Emulation" OR calc_product="DDoS Protector" OR calc_product="IPS") (Confidence_Level=0 OR  Confidence_Level=3 OR Confidence_Level=4 OR Confidence_Level=5)   (calc_action="Prevent" OR calc_action="Detect")

[toearliest(2)]
iseval = 1
definition = "-"+"$value$"+"$period$"
args = value,period

[toearliest(3)]
iseval = 1
definition = "-"+tostring($factor$*$value$)+"$period$"
args = value,period,factor

[tospan(2)]
iseval = 1
definition = "$value$"+"$period$"
args = value,period

