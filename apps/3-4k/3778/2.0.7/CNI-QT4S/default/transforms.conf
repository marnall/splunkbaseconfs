[cni-transform_cnilog_fields]
FORMAT = $1::$2
MV_ADD = 1
REGEX = ([^= ]+)=([^ ]+)

[cni-ip_protos]
filename = cni-ip_protos.csv

[cni-cti_providers]
filename = cni-cti_providers.csv
batch_index_query = 0
case_sensitive_match = 0
default_match = Unknown
min_matches = 1

[cni-transform_http_request_uri_host]
FORMAT = app_request_host::$1
MV_ADD = 1
REGEX = (.*)
SOURCE_KEY = http_request_uri_host

[cni-transform_tls_server_name_indication]
FORMAT = app_request_host::$1
MV_ADD = 1
REGEX = (.*)
SOURCE_KEY = tls_server_name_indication
