[intersafe_http]

EVAL-bytes = bytes_in + bytes_out
EVAL-product = "InterSafe WebFilter"
EVAL-vendor = " Alps System Integration Co., Ltd."
EVAL-vendor_product = "ALSI InterSafe"
EXTRACT-intersafe-http=(?<=ISWF\s)(?P<date>.*?)\t(?P<time>.*?)\t(?P<protocol>.*?)\t(?P<client_ip>.*?)\t(?P<group_name>.*?)\t(?P<account_name>.*?)\t(?P<browser_version>.*?)\t(?P<request_status>.*?)\t(?P<www_server_ip>.*?)\t(?P<response_code>.*?)\t(?P<www_server_name>.*?)\t(?P<transfer_time>.*?)\t(?P<send_data_size>.*?)\t(?P<receive_data_size>.*?)\t(?P<file_type>.*?)\t(?P<content_type>.*?)\t(?P<reason>.*?)\t(?P<judgement_category>.*?)\t(?P<category_1>.*?)\t(?P<category_2>.*?)\t(?P<security_category>.*?)\t(?P<request_url>.*?)\t(?P<http_version>.*?)\t(?P<request_method>.*?)\t(?P<linq_url>.*)

FIELDALIAS-action           = request_status as action
#FIELDALIAS-app	         	= 
#FIELDALIAS-bytes           = 
FIELDALIAS-bytes_in         = receive_data_size as bytes_in
FIELDALIAS-bytes_out        = send_data_size as bytes_out
#FIELDALIAS-cached           = 
FIELDALIAS-category = judgement_category as category
#FIELDALIAS-cookie = 
FIELDALIAS-dest = www_server_name as dest
FIELDALIAS-dest_ip = www_server_ip as dest_ip
FIELDALIAS-duration = transfer_time as duration
FIELDALIAS-http_content_type = content_type as http_content_type
FIELDALIAS-http_method = request_method as http_method
FIELDALIAS-http_referrer = link_url as http_referrer
FIELDALIAS-user_agent = browser_version as http_user_agent
#FIELDALIAS-user_agent_length = 
FIELDALIAS-src = client_ip as src
FIELDALIAS-status = response_code as status
FIELDALIAS-user = account_name as user
FIELDALIAS-url = request_url as url

NO_BINARY_CHECK = true
category = Network & Security
description = InterSafe WebFilter http Access Logs
DATETIME_CONFIG = 
pulldown_type = true
