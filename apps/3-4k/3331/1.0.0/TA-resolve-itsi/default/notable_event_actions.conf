[resolve_incident_resolution]
disabled = 0
execute_in_sync = 1
execute_once_per_group = 1
type = external_ticket
###### for `type=external_ticket`, we will set the following key/values
ticket_system_name = Resolve Systems
relative_refresh_uri = /services/resolve_rest/resolve_incident_resolution
correlation_key = notable_event_id
correlation_value = $result.event_id$
correlation_value_for_group = $result.itsi_group_id$
refresh_response_json_path = entry.{0}.content
refresh_response_ticket_id_key = worksheet_id
refresh_response_ticket_url_key = worksheet_url
