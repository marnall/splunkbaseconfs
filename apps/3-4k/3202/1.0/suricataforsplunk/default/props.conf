[suricata]
NO_BINARY_CHECK = true
category = Custom
description = suricata fast log parser
disabled = false
pulldown_type = true
EXTRACT-id,name,category,src_ip,src_port,dest_ip,dest_port = ^(?:[^\*\n]*\*){2}\]\s+\[\d+:(?P<id>\d+):\d+\](?P<name>[^\[]+)(?:[^ \n]* ){2}(?P<category>[^\]]+)[^\}\n]*\}\s+(?P<src_ip>[^:]+):(?P<src_port>\d+)\s+\->\s+(?P<dest_ip>[^:]+)[^:\n]*:(?P<dest_port>.+)

[suricata_json_ssh]
DATETIME_CONFIG =
INDEXED_EXTRACTIONS = json
KV_MODE = none
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true
