[bem_alert_xevts_sample]
sourcetype = bromium:bem
interval = 120
earliest = -120s
latest = now
source = eventgen
maxIntervalsBeforeFlush = 1
breaker = \r\n\r\n\r\n\r\n
## Replace timestamp 
token.0.token = ##TIME_STAMP##
token.0.replacementType = timestamp
token.0.replacement = %s

## Replace uuid
token.1.token = ##UUID##
token.1.replacementType = file 
token.1.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/uuid.sample

## Replace IP address
token.2.token = ##IPADDRESS##
token.2.replacementType = random 
token.2.replacement = ipv4

## Replace file path
token.3.token = ##FILEPATH##
token.3.replacementType = file 
token.3.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/file_path.sample

##Replace USERNAME
token.4.token = ##USERNAME##
token.4.replacementType = file
token.4.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/username.sample

##Replace HOSTNAME
token.5.token = ##HOSTNAME##
token.5.replacementType = file
token.5.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/hostname.sample

##Replace apptype
token.6.token = ##APPTYPE##
token.6.replacementType = file
token.6.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/apptype.sample

##Replace SEVERITY
token.7.token = ##SEVERITY##
token.7.replacementType = file
token.7.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/severity.sample

##Replace filesize
token.8.token = ##FILESIZE1##
token.8.replacementType = random
token.8.replacement = integer[100000:1000000]

token.9.token = ##FILESIZE2##
token.9.replacementType = random
token.9.replacement = integer[100000:1000000]

token.10.token = ##FILESIZE3##
token.10.replacementType = random
token.10.replacement = integer[100000:1000000]

##Replace pathstr 
token.11.token = ##PATHSTR1##
token.11.replacementType = file
token.11.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/pathstr.sample

token.12.token = ##PATHSTR2##
token.12.replacementType = file
token.12.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/pathstr.sample

token.13.token = ##PATHSTR3##
token.13.replacementType = file
token.13.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/pathstr.sample

token.14.token = ##PATHSTR4##
token.14.replacementType = file
token.14.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/pathstr.sample

token.15.token = ##PATHSTR5##
token.15.replacementType = file
token.15.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_bromium/samples/pathstr.sample