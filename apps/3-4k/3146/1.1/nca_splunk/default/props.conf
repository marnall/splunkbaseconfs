[csv]
REPORT-client_netid = client_netid
REPORT-server_netid = server_netid

[novetta-csv-results]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = csv
KV_MODE = none
MAX_DAYS_AGO = 99999
NO_BINARY_CHECK = true
REPORT-client_netid = client_netid
REPORT-server_netid = server_netid
SHOULD_LINEMERGE = false
TIMESTAMP_FIELDS = timestamp
category = Network & Security
description = Comma-separated value format. Set header and other settings in "Delimited Settings"
disabled = false
pulldown_type = true
FIELDALIAS-transport = layer_4_protocol AS transport
FIELDALIAS-src_ip = clientip AS src_ip
FIELDALIAS-src = src_ip AS src
FIELDALIAS-src_port = client_port AS src_port
FIELDALIAS-src_dns = client_domain AS src_dns
FIELDALIAS-dest_ip = serverip AS dest_ip
FIELDALIAS-dest = dest_ip AS dest
FIELDALIAS-dest_port = server_port AS dest_port
FIELDALIAS-dest_dns = server_domain AS dest_dns
FIELDALIAS-tcp_flag = server_tcpflags AS tcp_flag
FIELDALIAS-bytes_in = bytes_from_server AS bytes_in
FIELDALIAS-bytes_out = bytes_to_server AS bytes_out
FIELDALIAS-bytes = total_bytes AS bytes
FIELDALIAS-vlan = vlan_inner AS vlan

[source::.../splunk/..._splunk.csv]
sourcetype=novetta-csv-results
