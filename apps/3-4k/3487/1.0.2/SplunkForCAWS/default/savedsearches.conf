[caws:daily]
description = Queries the CAWS API for Daily Organization statistics
search = | dailyorgmetrics

[caws:daily:urls:ttl]
description = Queries the CAWS API for the daily average URL time-to-live
search = | savedsearch caws:daily | fields _time, AverageUrlTtl

[caws:daily:exploits]
description = Queries the CAWS API for the daily exploit count
search = | savedsearch caws:daily | fields _time, Exploits

[caws:daily:urls:malicious]
description = Queries the CAWS API for the daily malicious URL count.
search = | savedsearch caws:daily | fields _time, MaliciousUrls

[caws:global]
description = Queries the CAWS API for global organization statistics
search = | overallorgmetrics

[caws:global:exploits]
description = Queries the CAWS API for the total count of exploits
search = | savedsearch caws:global | fields exploits

[caws:global:urls]
description = Queries the CAWS API for the count of URLs scanned
search = | savedsearch caws:global | fields urlsScanned

[caws:global:urls:malicious]
description = Queries the CAWS API for the count of malicious URLs scanned
search = | savedsearch caws:global | fields maliciousUrls

[caws:global:urls:ttl]
description = Queries the CAWS API for the average malicious URL time-to-live
search = | savedsearch caws:global | fields averageUrlTtl

[caws:global:apps]
description = Queries the CAWS API for the number of applications that have been tested
search = | savedsearch caws:global | fields applicationsTested

[caws:global:apps:compromised]
description = Queries the CAWS API for the number of the organization's' applications that are known to be compromised
search = | savedsearch caws:global | fields applicationsCompromised

