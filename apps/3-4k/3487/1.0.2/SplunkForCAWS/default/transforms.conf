[threat_lookup]
external_type = kvstore
collection = caws-threats
fields_list =  DetectionDate,NSSId,Browser,TargetedApplication,IndicatorsOfAttack.Files{}.Name,IndicatorsOfAttack.Files{}.Md5Hash,IndicatorsOfAttack.Files{}.Sha1Hash,IndicatorsOfAttack.Files{}.Sha256Hash,IndicatorsOfAttack.NetworkConnections{}.IpAddress,IndicatorsOfAttack.NetworkConnections{}.Port