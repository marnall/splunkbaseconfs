[cyphort_incident.sample]
disabled = false
mode = sample
count = 0
earliest = -60s
latest = now
outputMode = splunkstream
index = main
sourcetype = cyphort:incident
interval = 600

#Replace the Timestamp Mon, 09 Nov 2015 19:21:52
token.0.token = \w+,\s\d{2}\s\w+\s\d{4}\s\d{2}:\d{2}:\d{2}
token.0.replacementType = timestamp
token.0.replacement = %a, %d %b %Y %H:%M:%S

token.1.token = _ipv4__endpoint_ip_
token.1.replacementType = random
token.1.replacement = ipv4

token.2.token = _ipv4__src_name_
token.2.replacementType = random
token.2.replacement = ipv4

token.3.token = _ipv4__src_ip_
token.3.replacementType = random
token.3.replacement = ipv4

token.4.token = _threat_severity_
token.4.replacementType = random
token.4.replacement = float[0.01:1.00]

token.5.token = _os_type_
token.5.replacementType = random
token.5.replacement = list["centos","centos.0.75","windows","osx"]

token.6.token = _bool_data_theft_
token.6.replacementType = random
token.6.replacement = list[ "0","0", "1" ]
token.7.token = _bool_valid_av_
token.7.replacementType = random
token.7.replacement = list[ "0","0", "1" ]
token.8.token = _bool_download_
token.8.replacementType = random
token.8.replacement = list[ "0","0", "1" ]
token.9.token = _bool_execution_
token.9.replacementType = random
token.9.replacement = list[ "0","0", "1" ]
token.10.token = _bool_exploit_
token.10.replacementType = random
token.10.replacement = list[ "0","0", "1" ]
token.11.token = _bool_file_submission_
token.11.replacementType = random
token.11.replacement = list[ "0","0", "1" ]
token.12.token = _bool_infection_
token.12.replacementType = random
token.12.replacement = list[ "0","0", "1" ]
token.13.token = _bool_os_match_
token.13.replacementType = random
token.13.replacement = list[ "0","0", "1" ]

token.14.token = _incident_id_
token.14.replacementType = random
token.14.replacement = integer[2000:100000]

[cyphort_event.sample]
disabled = false
mode = sample
count = 0
earliest = -60s
latest = now
outputMode = splunkstream
index = main
sourcetype = cyphort:event

#Replace the Timestamp 2015-11-09 19:21:52
token.0.token = \d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}
token.0.replacementType = timestamp
token.0.replacement = %Y-%m-%d %H:%M:%S


##### DEFAUlTS - DONT CHANGE
[default]

[global]
disabled = false
debug = false
spoolDir = $SPLUNK_HOME/var/spool/splunk
spoolFile = <SAMPLE>
breaker = [^\r\n\s]+
mode = sample
sampletype = raw
interval = 60
delay = 0
timeMultiple = 1
## 0 means all lines in sample
count = 0
## earliest/latest = now means timestamp replacements default to current time
earliest = now
latest = now
#hourOfDayRate = { "0": 0.30, "1": 0.10, "2": 0.05, "3": 0.10, "4": 0.15, "5": 0.25, "6": 0.35, "7": 0.50, "8": 0.60, "9": 0.65, "10": 0.70, "11": 0.75, "12": 0.77, "13": 0.80, "14": 0.82, "15": 0.85, "16": 0.87, "17": 0.90, "18": 0.95, "19": 1.0, "20": 0.85, "21": 0.70, "22": 0.60, "23": 0.45 }
#dayOfWeekRate = { "0": 0.97, "1": 0.95, "2": 0.90, "3": 0.97, "4": 1.0, "5": 0.99, "6": 0.55 }
#randomizeCount = 0.2
randomizeEvents = false
outputMode = spool
fileMaxBytes = 10485760
fileBackupFiles = 5
splunkPort = 8089
splunkMethod = https
index = main
source = eventgen
sourcetype = eventgen
host = 127.0.0.1
timeField = _raw


