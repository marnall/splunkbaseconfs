[cyphort_idx]
search = index=main

[cyphort_incident]
search = eventtype=cyphort_idx sourcetype=cyphort:incident

[cyphort_event]
search = eventtype=cyphort_idx sourcetype=cyphort:event

[cyphort_error]
search = eventtype=cyphort_idx sourcetype=CyphortForSplunk:error

[cyphort_internal_error]
search = index=_internal source=*Cyphort*