[imperva_ses_json]
INDEXED_EXTRACTIONS = json
NO_BINARY_CHECK = true
SEDCMD-StripHeader = s/^[^{]+//
SHOULD_LINEMERGE = false
category = Network & Security
description = Imperva SecureSphere Gateway Security events in JSON format
disabled = false
pulldown_type = 1
AUTO_KV_JSON = 
KV_MODE = 
FIELDALIAS-SecureSphere = header.product AS product policy-name AS event_type source-ip as source_ip violation-id AS event_id http.request.user-agent AS user_agent http.request.url-full-path AS request_url application-name AS application additional-info.client-type AS client_type http.request.host as Site_name http.request.method as requestMethod
LOOKUP-thr_auto_lookup = imperva_lookup_thr "policy-name" OUTPUTNEW thr_service
MAX_TIMESTAMP_LOOKAHEAD = 800
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%Z
TIME_PREFIX = create-time\"\:\ \"

[imperva_incapsula_cef]
BREAK_ONLY_BEFORE = CEF:
EXTRACT-requestClientApplication = requestClientApplication\=(?P<requestClientApplication>(.*))\scs2\=
MAX_TIMESTAMP_LOOKAHEAD = 800
FIELDALIAS-Incapsula_Fields = CEF_Name AS Event_name act AS Action app AS Application_protocol ccode AS Country_code cs1 AS Cap cs2 AS Javascript cs3 AS CO cs4 AS VID cs5 AS clappsig cs6 AS clapp cs7 AS latitude cs8 AS longitude dproc AS Client_app_type dst AS Destination_Address sourceServiceName AS Site_name src AS Source_address requestClientApplication AS UserAgent qstr AS Query_string CEF_Vendor AS product sourceServiceName AS application src AS source_ip requestClientApplication AS user_agent CEF_Name as event_type dproc AS client_type request AS request_url fileId AS event_id requestmethod as requestMethod
LOOKUP-action_auto_lookup = imperva_lookup_action "act" OUTPUTNEW action
sourcetype = imperva_incapsula_cef
category = Network & Security
description = Imperva Incapsula events in CEF format
EXTRACT-UserAgent = ^(?:[^=\n]*=){4}(?P<UserAgent>\w+/\d+\.\d+\s+\(\w+\s+\w+\s+\d+\.\d+;\s+\w+;\s+\w+:\d+\.\d+\)\s+\w+/\d+\s+\w+/\d+\.\d+)
pulldown_type = true
TIME_FORMAT = %10S%3n
TIME_PREFIX = start\=
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = True
EXTRACT-CEF0 = ^(?P<CEF_Version>[^\|]+)\|(?P<CEF_Vendor>[^\|]+)\|(?P<CEF_Product>[^\|]+)\|(?P<CEF_DeviceVersion>[^\|]+)\|(?P<CEF_SignatureID>[^\|]+)\|(?<CEF_Name>[^\|]+)\|(?P<CEF_Severity>\d+)
EXTRACT-CEF_Version,CEF_Vendor,CEF_Product,CEF_DeviceVersion,CEF_SignatureID,CEF_Name,CEF_Severity = ^(?P<CEF_Version>[^\|]+)\s+\|\s+(?P<CEF_Vendor>[^\|]+)\s+\|\s+(?P<CEF_Product>[^\|]+)\s+\|\s+(?P<CEF_DeviceVersion>[^\|]+)\s+\|\s+(?P<CEF_SignatureID>[^\|]+)\s+\|\s+(?<CEF_Name>[^\|]+)\s+\|\s+(?P<CEF_Severity>\d+)

