[Moog_Integration]
is_custom = 1
label = Moogsoft Alert Integration
description = Create Moogsoft Alert based on the search result
payload_format = json
icon_path = alert_moog_alert.png
track_alert = 1
python.version = python3
log_level = INFO
param.enable_name = 1
param.enable_description = 1
param.enable_alert_link = 1
param.enable_search = 1
param.enable_trigger_time = 1
param.name = $name$
param.description = $description$
param.alert_link = $view_link$
param.search = $search$
param.trigger_time = $trigger_time$
