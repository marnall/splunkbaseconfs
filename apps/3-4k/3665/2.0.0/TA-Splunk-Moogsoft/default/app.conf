[install]
is_configured = false
state = enabled
build = 9

[launcher]
author = Moogsoft
version = 2.0.0
description = Moogsoft Add-on for Splunk

[ui]
is_visible = 1
label = Moogsoft Add-on for Splunk
show_in_nav = 1
docs_section_override=AddOns:released
# Points to a file in:
# $SPLUNK_HOME/etc/apps/<SPLUNK_APP_NAME>/default/data/ui/views/*
# It does not need the extension of the file name provided
setup_view = setup_view_dashboard

[package]
id = TA-Splunk-Moogsoft
