[validation:savedsearch]
# Require url to be set if action is enabled
action.Moog_Integration = case('action.Moog_Integration' != "1", null(), 'action.Moog_Integration.param.url' == "action.Moog_Integration.param.url" OR 'action.Moog_Integration.param.url' == "", "No Moogsoft Integration URL specified",  1==1, null())
action.Moog_Integration.param.url = validate( match('action.Moog_Integration.param.url', "^https?://[^\s]+$"), "Moogsoft Integration URL is invalid")