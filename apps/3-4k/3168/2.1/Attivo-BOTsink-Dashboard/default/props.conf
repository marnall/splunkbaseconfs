[WinUserCreateLogs]
DATETIME_CONFIG = 
NO_BINARY_CHECK = true
category = Operating System
pulldown_type = true

[msp]
DATETIME_CONFIG = CURRENT
NO_BINARY_CHECK = true
category = Custom
pulldown_type = true

[syslog]
EXTRACT-target_vm_list = (?:\bTarget OS\b\:\[)+(?<target_vm_list>[^\]]+)
EXTRACT-target_vm_list_cim = ^(?:[^:\n]*:){6}"(?P<target_vm_list_cim>[^"]+)
EXTRACT-top_events_list = (?:\Description\b\:\[)+(?<top_events_list>[^\]]+)
EXTRACT-top_events_list_cim = ^(.*?subject)(\\"|"):("|\\")(?P<top_events_list_cim>[^"\\"]+)
EXTRACT-unique_phase = (?:\bPhase\b\:\[)+(?<unique_phase>[^\]]+)
EXTRACT-unique_phase_cim = ^(.*?src_category)(\\"|"):("|\\")(?P<unique_phase_cim>[^"\\"]+)
EXTRACT-unique_service_list = (?:\Service\b\:\[)+(?<unique_service_list>[^\]]+)
EXTRACT-unique_service_list_cim = ^(?:[^,\n]*,){9}"\w+":"(?P<unique_service_list_cim>\w+)
EXTRACT-unique_src_ip = ^(?:[^\[\n]*\[){1}(?:[^\[\n]*IP:\[){1}(?<unique_src_ip>[^\]]+)
EXTRACT-unique_src_ip_cim = ^(?:[^,\n]*,){7}"\w+_\w+":"(?P<unique_src_ip_cim>[^"]+)
