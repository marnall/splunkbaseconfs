[stealthwatch:fc:flow]

## Event handling
TIME_FORMAT = %Y-%m-%d %H:%M:%S
TIME_PREFIX = last_active_usec
MAX_TIMESTAMP_LOOKAHEAD = 24
TRUNCATE = 2000
LINE_BREAKER = ([\n\r]+)\>\>\>\sflow_id\=\d+
SHOULD_LINEMERGE = false

## Replace host value
TRANSFORMS-0_force_host_for_stealthwatch = 0_force_host_for_stealthwatch

## Field processing
REPORT-stealthwatch_exporter_fields = 0_stealthwatch_exporter_fields
FIELDALIAS-client_ip_as_src_ip = client_ip AS src_ip
FIELDALIAS-client_port_as_src_port = client_port AS src_port
FIELDALIAS-exporters_ip_0_as_exporter_ip = exporters_ip_0 AS exporter_ip
FIELDALIAS-exporters_ip_0_as_dvc = exporters_ip_0 AS dvc
FIELDALIAS-fc_ip_as_flowcollector_ip = fc_ip AS flowcollector_ip
FIELDALIAS-server_ip_as_dest_ip = server_ip AS dest_ip
FIELDALIAS-server_port_as_dest_prot = server_port AS dest_port

LOOKUP-stealthwatch_protocol_to_transport = csv_iana_protocol_numbers protocol_number AS protocol
