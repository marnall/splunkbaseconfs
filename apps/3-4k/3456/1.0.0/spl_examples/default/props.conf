[earthquake-csv]
INDEXED_EXTRACTIONS = csv
KV_MODE = none
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
REPORT-all = earthquake-fields
category = Structured
description = Earthquake Comma-separated value format.
disabled = false
pulldown_type = true

[email]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = csv
KV_MODE = none
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
REPORT-all = email-fields
category = Structured
description = Email data from MS Exchange app
disabled = false
pulldown_type = true

[source::...earthquake.log]
sourcetype = earthquake-csv

[source::...email.log]
sourcetype = email

[secure]
EXTRACT-userID = Failed password for(.+?)(?P<userID>[a-z]+)\sfrom
EXTRACT-clientip,port = ^\w+\s+\w+\s+\d+\s+\d+\s+\d+:\d+:\d+\s+\w+\d+\s+\w+\[\d+\]:\s+\w+\s+\w+\s+\w+\s+\w+\s+\w+\s+(?P<clientip>[^ ]+) port (?P<port>\d+)

[access_combined_wcookie]
LOOKUP-autolookup_prices = prices_lookup productId AS productId OUTPUTNEW price AS price product_name AS productName

[vmstat2]
EXTRACT-memTotalMB,memFreeMB,memUsedMB,memFreePct,memUsedPct,pgPageOut,swapUsedPct,pgSwapOut,cSwitches,interrupts,forks,processes,threads,loadAvg1mi = ^\d+\-\d+\-(\d+\s+)+\d+:\d+:(\d+\s+)+(?P<memTotalMB>[^ ]+)\s+(?P<memFreeMB>\d+)\s+(?P<memUsedMB>[^ ]+)(?:[^ \n]* ){2}(?P<memFreePct>\d+\.\d+)\s+(?P<memUsedPct>[^ ]+)\s+(?P<pgPageOut>\d+)\s+(?P<swapUsedPct>[^ ]+)\s+(?P<pgSwapOut>[^ ]+)\s+(?P<cSwitches>[^ ]+)\s+(?P<interrupts>[^ ]+)\s+(?P<forks>\d+)\s+(?P<processes>\d+)\s+(?P<threads>[^ ]+)\s+(?P<loadAvg1mi>\d+\.\d+)

[cpu2]
EXTRACT-CPU,pctUser,pctNice,pctSystem,pctIowait,pctIdle = ^(?P<CPU>\w+)\s+(?P<pctUser>[^ ]+)\s+(?P<pctNice>\d+)\s+(?P<pctSystem>[^ ]+)\s+(?P<pctIowait>[^ ]+)\s+(?P<pctIdle>[^ ]+)

[df2]
EXTRACT-df2 = ^(?:[^ \n]* ){2}(?P<filesystem>[^ ]+)[^ \n]* (?P<fsType>\w+)\s+(?P<size>\d+)G  (?P<used>\d+\.\d+)G  (?P<avail>\d+\.\d+)G (?P<usedPCT>[^%]+)

[iostat2]
EXTRACT-iostat = ^(?P<device>\w+)\s+(?P<rReq_PS>[^ ]+)\s+(?P<wReq_PS>\d+\.\d+)\s+(?P<rKB_PS>[^ ]+)\s+(?P<wKB_PS>\d+\.\d+)\s+(?P<avgWaitMillis>\d+\.\d+)\s+(?P<avgSvcMillis>[^ ]+)\s+(?P<bandwUtilPct>[^ ]+)
