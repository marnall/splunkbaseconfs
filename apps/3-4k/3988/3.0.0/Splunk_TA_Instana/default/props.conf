[instana:metrics]
MAX_TIMESTAMP_LOOKAHEAD = 500
SHOULD_LINEMERGE = 0
TIME_FORMAT = %s%3N
TIME_PREFIX = "timestamp":\s
category = Splunk App Add-on Builder
pulldown_type = 1

EVAL-vendor = "Instana"
EVAL-thruput = 'data.calls_per_second' * 60
FIELDALIAS-_application_events_eventTime__as_event_time = "timestamp" AS event_time
FIELDALIAS-_application_response_time = "data.avg_response_time_ms" AS response_time
FIELDALIAS-_application_error_rate = "data.avg_error_rate" AS error_rate

EVAL-eum_response_time = case('type'="browserLogicalService",'data.avg_response_time_ms')
EVAL-eum_thruput = case('type'="browserLogicalService",'data.calls_per_second' * 60)
EVAL-app_title = case('type'="logicalWebApp",'name','type'="browserLogicalService",'name')

[TypeName]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1



