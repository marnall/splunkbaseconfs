
[expose:Splunk_TA_Instana_settings]
pattern = Splunk_TA_Instana_settings
methods = POST, GET

[expose:Splunk_TA_Instana_settings_specified]
pattern = Splunk_TA_Instana_settings/*
methods = POST, GET, DELETE

[expose:Splunk_TA_Instana_instana_metrics]
pattern = Splunk_TA_Instana_instana_metrics
methods = POST, GET

[expose:Splunk_TA_Instana_instana_metrics_specified]
pattern = Splunk_TA_Instana_instana_metrics/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET

