[Instana Metric Report]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.general.type = visualizations
display.page.search.mode = verbose
display.page.search.tab = visualizations
display.visualizations.charting.axisTitleX.visibility = collapsed
display.visualizations.charting.axisTitleY.visibility = collapsed
display.visualizations.charting.axisTitleY2.visibility = collapsed
display.visualizations.charting.chart = line
display.visualizations.charting.chart.nullValueMode = zero
display.visualizations.charting.legend.placement = none
display.visualizations.trellis.enabled = 1
display.visualizations.trellis.scales.shared = 0
display.visualizations.trellis.size = small
request.ui_dispatch_app = Splunk_TA_Instana
request.ui_dispatch_view = search
search = sourcetype="instana:metrics" | timechart avg(data.avg_response_time_ms) as "Avg Response Time (ms)", avg(data.calls_per_second) as "Calls per Second", avg(data.avg_error_rate) as "Error Rate", avg(data.avg_num_instances) as "Avg Instances" by name
