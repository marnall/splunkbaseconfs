[check_log_permissions]
EXTRACT-RESOURCE_PERMISSIONS = RESOURCE_DETAIL=\"(?<RESOURCE_PERMISSIONS>[^\s]+)
EXTRACT-RESOURCE_OWNER = RESOURCE_DETAIL=\"([^\s]+\s){2}(?<RESOURCE_OWNER>[^\s]+)
EXTRACT-RESOURCE_GROUP = RESOURCE_DETAIL=\"([^\s]+\s){3}(?<RESOURCE_GROUP>[^\s]+)
EXTRACT-RESOURCE_BYTES = RESOURCE_DETAIL=\"([^\s]+\s){4}(?<RESOURCE_BYTES>[^\s]+)
EXTRACT-RESOURCE_MODTIME = RESOURCE_DETAIL=\"([^\s]+\s){5}(?<RESOURCE_MODTIME>[^\s]+\s+[^\s]+\s+[^\s]+)
