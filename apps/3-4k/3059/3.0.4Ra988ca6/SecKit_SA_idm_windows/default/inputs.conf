#seckit_idm_windows_assets_lookup
[identity_manager://seckit_idm_windows_assets]
category = seckit_idm_windows_assets
description = List containing assets built from searches of ADMON data.
disabled = false
target = asset
url = lookup://seckit_idm_windows_assets_lookup

[identity_manager://seckit_idm_windows_assets_identities]
category = seckit_idm_windows_assets_identities
description = List containing identities build from searches of ADMON data for machine accounts.
disabled = false
target = identity
url = lookup://seckit_idm_windows_assets_identities_lookup

#seckit_idm_windows_identities_lookup

[identity_manager://seckit_idm_windows_identities]
category = seckit_idm_windows_identities
description = List containing identities build from searches of ADMON data for machine accounts.
disabled = false
target = identity
url = lookup://seckit_idm_windows_identities_lookup
