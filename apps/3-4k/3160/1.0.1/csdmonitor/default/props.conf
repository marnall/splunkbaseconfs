# Version 6.4.0
# Creates a sample index for sample data.

# Sourcetype for the ClearSky Data, based on the standard _json type
[csd_rest]
INDEXED_EXTRACTIONS = json
KV_MODE = none
NO_BINARY_CHECK = true
category = Structured
description = JSON formatted data from ClearSky Data monitoring
disabled = false
pulldown_type = true

# Older format parsing timestamps itself from JSON body
[csd_json]
category = Structured
detect_trailing_nulls = auto
description = JSON formatted data from ClearSky Data monitoring
disabled = true
pulldown_type = true
INDEXED_EXTRACTIONS = json
KV_MODE = none
KV_TRIM_SPACES = true
AUTO_KV_JSON = true
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
# special processing for CSD event timestamp fields
DATETIME_CONFIG = 
TIMESTAMP_FIELDS = timestamp
TIME_FORMAT = %s%3N

