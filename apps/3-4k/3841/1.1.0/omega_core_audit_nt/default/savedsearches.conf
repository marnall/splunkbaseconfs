[Privilege Management]
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.fields = ["ACTION_CMD","ACTION_ID","ACTION_NAME","ADMIN_PRIV","AUDIT_TYPE","CURRENT_USER","DB_HOST","DB_NAME","DBID","ENTRYID","NT_EVENT_ID","NT_MESSAGE","NT_RECORD_NO","NT_TYPE","OBJECT_NAME","OBJECT_OWNER","OS_USER","RETURNCODE","SESSIONID","STATEMENTID","TERMINAL","TIMESTAMP_STS","USERHOST","USERNAME","AUDIT_OPTION","CLIENT_ADDRESS","COMMENT_TEXT","GRANTEE","IP_ADDRESS","LOGOFF_DEAD","LOGOFF_LREAD","LOGOFF_LWRITE","LOGOFF_PREAD","NET_PORT","NET_PROTOCOL","OBJ_PRIVILEGE","PRIVILEGE_ID","SYSTEM_PRIVILEGE","SYS_PRIVILEGE","SESSION_CPU","SYS_OPTIONS"]
display.events.type = table
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = omega_core_audit_nt
request.ui_dispatch_view = search
search = index="omega_ca_nt" | search (ACTION_ID=17 OR ACTION_ID=18 OR ACTION_ID=108 OR ACTION_ID=109 OR ACTION_ID=114 OR ACTION_ID=115)\
| table _time, DB_HOST, NT_RECORD_NO, DB_NAME, USERNAME, AUDIT_TYPE, ACTION_NAME, GRANTEE, SYS_PRIVILEGE, OBJECT_NAME, OBJECT_OWNER, OBJ_PRIVILEGE,\
OS_USER, RETURNCODE, ACTION_CMD \
| rename DB_HOST as "DBHost", NT_RECORD_NO as "NTRecordNo", DB_NAME as Database, USERNAME as Username, AUDIT_TYPE as "AuditType", ACTION_NAME as "ActionName", \
GRANTEE as Grantee, SYS_PRIVILEGE as "SystemPriv.", OBJECT_OWNER as "ObjectOwner",  OBJECT_NAME as "ObjectName", OBJ_PRIVILEGE  as "ObjectPriv.",\
OS_USER as "OSUser", RETURNCODE as ReturnCode, ACTION_CMD as "ActionCommand"

