[cisco:ftd]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
TIME_FORMAT = %b %d %H:%M:%S
category = Network & Security
description = Output produced by the Cisco Firepower Thereat Defense (FTD) Firewall
pulldown_type = 1
EXTRACT-Protocol = Protocol:\s(?<Protocol>(.*?))(,|\z)
EXTRACT-SrcIP = SrcIP:\s(?<SrcIP>(.*?))(,|\z)
EXTRACT-DE = DE:\s(?<DE>(.*?))(,|\z)
EXTRACT-DNSResponseType = DNSResponseType:\s(?<DNSResponseType>(.*?))(,|\z)
EXTRACT-DstIP = DstIP:\s(?<DstIP>(.*?))(,|\z)
EXTRACT-DstPort = DstPort:\s(?<DstPort>(.*?))(,|\z)
EXTRACT-EgressZone = EgressZone:\s(?<EgressZone>(.*?))(,|\z)
EXTRACT-IngressZone = IngressZone:\s(?<IngressZone>(.*?))(,|\z)
EXTRACT-InitiatorBytes = InitiatorBytes:\s(?<InitiatorBytes>(.*?))(,|\z)
EXTRACT-InitiatorPackets = InitiatorPackets:\s(?<InitiatorPackets>(.*?))(,|\z)
EXTRACT-NAPPolicy = NAPPolicy:\s(?<NAPPolicy>(.*?))(,|\z)
EXTRACT-ConnectType = ConnectType:\s(?<ConnectType>(.*?))(,|\z)
EXTRACT-ResponderBytes = ResponderBytes:\s(?<ResponderBytes>(.*?))(,|\z)
EXTRACT-ResponderPackets = ResponderPackets:\s(?<ResponderPackets>(.*?))(,|\z)
EXTRACT-OriginalClientIP = OriginalClientIP:\s(?<OriginalClientIP>(.*?))(,|\z)
EXTRACT-Policy = Policy:\s(?<Policy>(.*?))(,|\z)
EXTRACT-Sinkhole = Sinkhole:\s(?<Sinkhole>(.*?))(,|\z)
EXTRACT-SrcPort = SrcPort:\s(?<SrcPort>(.*?))(,|\z)
EXTRACT-TCPFlags = TCPFlags:\s(?<TCPFlags>(.*?))(,|\z)
EXTRACT-URLCategory = URLCategory:\s(?<URLCategory>(.*?))(,|\z)
EXTRACT-URLReputation = URLReputation:\s(?<URLReputation>(.*?))(,|\z)
EXTRACT-Prefilter_Policy = Prefilter Policy:\s(?<Prefilter_Policy>(.*?))(,|\z)
EXTRACT-UserName = UserName:\s(?<UserName>(.*?))(,|\z)
EXTRACT-ApplicationProtocol = ApplicationProtocol:\s(?<ApplicationProtocol>(.*?))(,|\z)
EXTRACT-WebApplication = WebApplication:\s(?<WebApplication>(.*?))(,|\z)
EXTRACT-Client = Client:\s(?<Client>(.*?))(,|\z)
EXTRACT-URL = URL:\s(?<URL>(.*?))(,|\z)
EXTRACT-ftd_hostname = ^(?:[^ \n]* ){7}(?P<ftd_hostname>\w+)
EXTRACT-tag = ^(?:[^ \n]* ){8}(?P<tag>\w+)

