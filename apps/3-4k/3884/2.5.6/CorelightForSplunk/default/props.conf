# ORDER OF OPERATIONS: EXTRACT -> REPORT -> KV_MODE -> FIELDALIAS -> EVAL -> LOOKUP
# This will need removed.

[corelight_investigator_alerts]
TRUNCATE              = 9999999
SHOULD_LINEMERGE      = FALSE
KV_MODE               = JSON
FIELDALIAS-action     = notice.actions AS action
FIELDALIAS-alert_name = alert_info.alert_name AS signature
FIELDALIAS-alert_type = alert_info.alert_type AS signature_id
FIELDALIAS-category   = mitre_tactics AS category
FIELDALIAS-end_time   = alert_timestamp.end AS end_time
FIELDALIAS-message    = notice.msg AS description
FIELDALIAS-severity   = severity_info.level AS severity
FIELDALIAS-start_time = alert_timestamp.start AS start_time
FIELDALIAS-technique  = mitre_techniques AS technique
EVAL-dest_ip          = coalesce(mvindex('related_alert_entities{}.entity_name', mvfind(mvzip('related_alert_entities{}.entity_category', 'related_alert_entities{}.entity_name', ";"), "^destination")), null())
EVAL-src_ip           = coalesce(mvindex('related_alert_entities{}.entity_name', mvfind(mvzip('related_alert_entities{}.entity_category', 'related_alert_entities{}.entity_name', ";"), "^source")), null())
EVAL-dest             = coalesce(dest_ip, null())
EVAL-src              = coalesce(src_ip, null())
EVAL-vendor_product   = "Corelight"
EVAL-vendor           = "Corelight"
EVAL-sensor_name      = coalesce(system_name, host, "unknown")

[corelight_vpn]
LINE_BREAKER            = ([\r\n]+)
TRUNCATE                = 9999999
SHOULD_LINEMERGE        = FALSE
TIME_PREFIX             = _write_ts(?:"\s*:\s*")?
TIME_FORMAT             = %Y-%m-%dT%H:%M:%S.%6QZ
MAX_TIMESTAMP_LOOKAHEAD = 40
TRANSFORMS-CltAutoType  = CltAutoType, TrashComments
LOOKUP-inferences       = corelight_inferences_description Code AS inferences OUTPUT Name as inference_name Description AS inference_description
KV_MODE                 = JSON
FIELDALIAS-dest         = id.resp_h ASNEW dest id.resp_h ASNEW id_resp_h
FIELDALIAS-dest_ip      = id.resp_h ASNEW dest_ip
FIELDALIAS-dest_port    = id.resp_p ASNEW dest_port id.resp_p ASNEW id_resp_p
FIELDALIAS-inferences   = inferences{} ASNEW inferences
FIELDALIAS-signature    = vpn_type AS signature
FIELDALIAS-src          = id.orig_h ASNEW src id.orig_h ASNEW id_orig_h
FIELDALIAS-src_ip       = id.orig_h ASNEW src_ip
FIELDALIAS-src_port     = id.orig_p ASNEW src_port id.orig_p ASNEW id_orig_p
FIELDALIAS-transport    = proto AS transport
EVAL-bytes              = bytes_in + bytes_out
EVAL-service            = split(service,",")
EVAL-id_orig_h          = src
EVAL-id_orig_p          = src_port
EVAL-id_resp_h          = dest
EVAL-id_resp_p          = dest_port
EVAL-vendor_product     = "Corelight"
EVAL-vendor             = "Corelight"
EVAL-sensor_name        = coalesce(system_name, host, "unknown")

[corelight_software]
TRUNCATE                = 9999999
SHOULD_LINEMERGE        = FALSE
TIME_PREFIX             = _write_ts(?:"\s*:\s*")?
TIME_FORMAT             = %Y-%m-%dT%H:%M:%S.%6QZ
MAX_TIMESTAMP_LOOKAHEAD = 40
KV_MODE                 = JSON
FIELDALIAS-host         = host_header AS src_host host_header AS tx_host
FIELDALIAS-src_port     = host_p AS src_port
SEDCMD-host-fix         = s/"host"/"host_header"/
FIELDALIAS-version      = version.major AS version_major
FIELDALIAS-version1     = version.minor AS version_minor
FIELDALIAS-version2     = version.minor2 AS version_patch
EVAL-version            = if(isnotnull(version_major),version_major,"").if(isnotnull(version_minor),".".version_minor,"").if(isnotnull(version_minor2),".".version_minor2,"")
EVAL-vendor_product     = "Corelight"
EVAL-vendor             = "Corelight"
EVAL-sensor_name        = coalesce(system_name, host, "unknown")

[corelight_suricata_corelight]
TRUNCATE                = 9999999
SHOULD_LINEMERGE        = FALSE
TIME_PREFIX             = _write_ts(?:"\s*:\s*")?
TIME_FORMAT             = %Y-%m-%dT%H:%M:%S.%6QZ
MAX_TIMESTAMP_LOOKAHEAD = 40
KV_MODE                 = JSON
FIELDALIAS-action       = alert.action AS action
FIELDALIAS-category     = alert.category AS category
FIELDALIAS-dest         = id.resp_h ASNEW dest_host id.resp_h ASNEW dest_ip id.resp_h ASNEW dest id.resp_h ASNEW id_resp_h
FIELDALIAS-dest_port    = id.resp_p ASNEW dest_port id.resp_p ASNEW id_resp_p
FIELDALIAS-dvc          = system_name AS dvc
FIELDALIAS-id           = suri_id AS id
FIELDALIAS-session_id   = uid AS session_id
FIELDALIAS-severity_id  = alert.severity AS severity_id
FIELDALIAS-signature    = alert.signature AS signature
FIELDALIAS-signature_id = alert.signature_id AS signature_id
FIELDALIAS-src          = id.orig_h ASNEW src_ip id.orig_h ASNEW src_host id.orig_h ASNEW src id.orig_h ASNEW id_orig_h
FIELDALIAS-src_port     = id.orig_p ASNEW src_port id.orig_p ASNEW id_orig_p
EVAL-action             = case(service=="failed","failure",1==1,"unknown")
EVAL-ids_type           = "network"
EVAL-severity           = case('alert.severity'=0,"informational",'alert.severity'=1,"critical",'alert.severity'=2,"medium",'alert.severity'=3, "low")
EVAL-vendor_product     = "Corelight"
EVAL-vendor             = "Corelight"
EVAL-sensor_name        = coalesce(system_name, host, "unknown")
disabled                = false
# CIM Review: January 30, 2023
# Updated "ids_type" to "network" for all values.
# Added "dvc" from "system_name"
LOOKUP-severity         = corelight_severity severity_id
# FUTURE: "metadata" can be parsed if needed.
# | rename alert.metadata{} as metadata
# | stats count by  metadata
# | eval key            = mvindex(split(metadata,":"), 0)
# | stats count by key
#Additional CIM mapping - April 2023

[corelight_conn]
TRUNCATE                                = 9999999
SHOULD_LINEMERGE                        = FALSE
TIME_PREFIX                             = _write_ts(?:"\s*:\s*")?
TIME_FORMAT                             = %Y-%m-%dT%H:%M:%S.%6QZ
MAX_TIMESTAMP_LOOKAHEAD                 = 40
KV_MODE                                 = JSON
FIELDALIAS-dest                         = id.resp_h ASNEW dest id.resp_h ASNEW id_resp_h
FIELDALIAS-dest_ip                      = id.resp_h ASNEW dest_ip
FIELDALIAS-dest_port                    = id.resp_p ASNEW dest_port id.resp_p ASNEW id_resp_p
FIELDALIAS-src                          = id.orig_h ASNEW src id.orig_h ASNEW id_orig_h
FIELDALIAS-src_ip                       = id.orig_h ASNEW src_ip
FIELDALIAS-src_port                     = id.orig_p ASNEW src_port id.orig_p ASNEW id_orig_p
FIELDALIAS-suri_ids                     = suri_ids{} AS suri_id
# Review Notes: Jan 30, 2023
# Updated "app" field: It is multi-value in some data results, instead of field alias.
# Added "bytes" field: Summed the raw data fields
# Added "dvc" field: Data has a layer two source for the traffic.
# Recommended field "rule" not used: no corresponding data found.
# Recommended field "user" not used: no corresponding data found.
# Updated "transport" field to differ between icmp and icmp6
FIELDALIAS-bytes_in                     = resp_ip_bytes AS bytes_in
FIELDALIAS-bytes_out                    = orig_ip_bytes AS bytes_out
FIELDALIAS-packets_in                   = resp_pkts AS packets_in
FIELDALIAS-packets_out                  = orig_pkts AS packets_out
FIELDALIAS-dest_mac                     = resp_l2_addr AS dest_mac
FIELDALIAS-dst_mac                      = resp_l2_addr AS dst_mac
FIELDALIAS-src_mac                      = orig_l2_addr AS src_mac
EVAL-packets                            = if(isnum(packets),packets,packets_in+packets_out)
LOOKUP-corelight_conn_state_description = corelight_conn_state_description conn_state OUTPUT conn_state_desc, action
EVAL-app                                = split(service, ",")
EVAL-bytes                              = resp_ip_bytes + orig_ip_bytes
FIELDALIAS-dvc                          = orig_l2_addr AS dvc
EVAL-transport                          = if(proto=="icmp" and match('id.orig_h',".*:.*"),"icmp6", proto)
#Recommended Addition CIM mappings April 2023
FIELDALIAS-session_id                   = uid AS session_id
FIELDALIAS-src_country                  = orig_cc AS src_country
FIELDALIAS-dest_country                 = resp_cc AS dest_country
#Adding from removed wildcard stanza
EVAL-direction                          = case(isnotnull(direction),direction,local_orig="true" AND local_resp="true", "internal", local_orig="true" and local_resp="false", "outbound", local_orig="false" and local_resp="false", "external", local_orig="false" and local_resp="true", "inbound", 1=1, "unknown")
EVAL-is_broadcast                       = if(src in("0.0.0.0", "255.255.255.255") OR dest in("255.255.255.255", "0.0.0.0"),"true","false")
EVAL-is_src_internal_ip                 = if(cidrmatch("10.0.0.0/8",src) OR cidrmatch("172.16.0.0/12",src) OR cidrmatch("192.168.0.0/16", src), "true", "false")
EVAL-is_dest_internal_ip                = if(cidrmatch("10.0.0.0/8",dest) OR cidrmatch("172.16.0.0/12",dest) OR cidrmatch("192.168.0.0/16", dest), "true", "false")
EVAL-vendor_product                     = "Corelight"
EVAL-vendor                             = "Corelight"
EVAL-sensor_name                        = coalesce(system_name, host, "unknown")

[corelight_dns_agg]
TRUNCATE                                  = 9999999
SHOULD_LINEMERGE                          = FALSE
TIME_PREFIX                               = _write_ts(?:"\s*:\s*")?
TIME_FORMAT                               = %Y-%m-%dT%H:%M:%S.%6QZ
MAX_TIMESTAMP_LOOKAHEAD                   = 40
LOOKUP-reply_code                         = corelight_dns_reply_code rcode OUTPUT cim_reply_code AS reply_code
KV_MODE                                   = JSON
FIELDALIAS-answer                         = answers{} AS answer
FIELDALIAS-answer2                        = answers ASNEW answer
FIELDALIAS-dest                           = id.resp_h ASNEW dest id.resp_h ASNEW id_resp_h
FIELDALIAS-dest_ip                        = id.resp_h ASNEW dest_ip
FIELDALIAS-dest_port                      = id.resp_p ASNEW dest_port id.resp_p ASNEW id_resp_p
FIELDALIAS-dns_flags_authoritative_answer = AA AS dns_flags_authoritative_answer
FIELDALIAS-dns_flags_recursion_available  = RA AS dns_flags_recursion_available
FIELDALIAS-dns_flags_rejected             = rejected AS dns_flags_rejected
FIELDALIAS-dns_flags_truncated_response   = TC AS dns_flags_truncated_response
FIELDALIAS-duration                       = rtt AS duration
FIELDALIAS-qclass_name                    = qclass_name AS record_class
FIELDALIAS-record_type                    = qtype_name AS record_type
FIELDALIAS-reply_code_id                  = rcode AS reply_code_id
FIELDALIAS-response_time                  = rtt AS response_time
FIELDALIAS-session_id                     = uid AS session_id
FIELDALIAS-src                            = id.orig_h ASNEW src id.orig_h ASNEW id_orig_h
FIELDALIAS-src_ip                         = id.orig_h ASNEW src_ip
FIELDALIAS-src_port                       = id.orig_p ASNEW src_port id.orig_p ASNEW id_orig_p
FIELDALIAS-transaction_id                 = trans_id AS transaction_id
FIELDALIAS-ttl                            = TTLs{} AS ttl
EVAL-answer_count                         = mvcount(answer)
EVAL-answer_length                        = len(answer)
EVAL-message_type                         = if(isnotnull(rcode),"Response","Query")
EVAL-query_count                          = mvcount(query)
EVAL-query_length                         = len(query)
EVAL-transport                            = if(proto=="icmp" and match(id_orig_h,".*:.*"),"icmp6", proto)
EVAL-vendor_product                       = "Corelight"
EVAL-vendor                               = "Corelight"
EVAL-sensor_name                          = coalesce(system_name, host, "unknown")

[corelight_files_agg]
TRUNCATE                = 9999999
SHOULD_LINEMERGE        = FALSE
TIME_PREFIX             = _write_ts(?:"\s*:\s*")?
TIME_FORMAT             = %Y-%m-%dT%H:%M:%S.%6QZ
MAX_TIMESTAMP_LOOKAHEAD = 40
EXTRACT-source          = \"source\":\"(?<app>\w+)\",
KV_MODE                 = JSON
FIELDALIAS-bytes        = seen_bytes AS bytes
FIELDALIAS-conn_uid     = conn_uids{} AS uid
FIELDALIAS-conn_uid2    = conn_uids ASNEW uid
FIELDALIAS-dest         = id.resp_h ASNEW dest id.resp_h ASNEW id_resp_h
FIELDALIAS-dest_host    = rx_hosts{} AS dest_host
FIELDALIAS-dest_host2   = rx_hosts ASNEW dest_host
FIELDALIAS-dest_ip      = id.resp_h ASNEW dest_ip
FIELDALIAS-dest_port    = id.resp_p ASNEW dest_port id.resp_p ASNEW id_resp_p
FIELDALIAS-file_hash    = sha256 AS file_hash
FIELDALIAS-file_hash2   = sha1 ASNEW file_hash
FIELDALIAS-file_name    = filename AS file_name
