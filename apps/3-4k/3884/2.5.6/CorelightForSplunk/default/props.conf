# CIM Review: January 30, 2023
# Added "http_referrer_domain" for both IP and Domain referrers
# Added "url_domain"
# Added "action": based on lookup of status_code of the request. 2XX and 3XX are "success". 4XX and 5XX are "failure"
SEDCMD-host-fix                = s/"host"/"dest_host"/
EXTRACT-host_header            = \"dest_host\":\"(?<host_header>[^\"]*)
# Change for bytes_out, bytes_in Reversed order of fields according documentation - 09/12/24
FIELDALIAS-site                = host_header AS site
FIELDALIAS-object              = resp_filenames{} AS object
FIELDALIAS-object2             = resp_filenames ASNEW object
FIELDALIAS-http_user_agent     = user_agent AS http_user_agent
FIELDALIAS-status              = status_code AS status
FIELDALIAS-uri_path            = uri AS uri_path
FIELDALIAS-http_method         = method AS http_method
FIELDALIAS-http_referrer       = referrer AS http_referrer
FIELDALIAS-mime_type_http      = orig_mime_types{} AS http_content_type
FIELDALIAS-mim_type_http2      = orig_mime_types ASNEW http_content_type
EVAL-http_user_agent_length    = len(http_user_agent)
EVAL-resp_filenames            = object
EVAL-url                       = "http://" + host_header + uri
EVAL-bytes                     = if(isnum(bytes),bytes,bytes_in+bytes_out)
EXTRACT-referrer_domain_ip     = https?://(?<http_referrer_domain>(?:\d+\.?){4}) in referrer
EXTRACT-referrer_domain_domain = https?://(?:[a-zA-Z\-_\d]+\.)*(?<http_referrer_domain>[a-zA-Z\-_\d]+\.[a-zA-Z\-_]+) in referrer
EVAL-url_domain                = host_header
LOOKUP-status_action           = corelight_status_action status AS status_code OUTPUTNEW action
#Additional CIM Mappings - April 2023
FIELDALIAS-http_content_type   = resp_mime_types{} AS http_content_type
FIELDALIAS-vendor_action       = status_msg AS vendor_action
EVAL-vendor_product            = "Corelight"
EVAL-vendor                    = "Corelight"
EVAL-sensor_name               = coalesce(system_name, host, "unknown")

