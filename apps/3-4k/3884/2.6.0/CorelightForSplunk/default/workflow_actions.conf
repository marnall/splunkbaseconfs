[show_connection]
type=link
fields = uid
display_location = event_menu
label = Show Connection Information
link.uri = /app/$@namespace$/corelight_connections?form.conn_uid=$uid$&form.time_restriction.latest=now&form.time_restriction.earliest=-1mon@mon

[pcap_link]
type=link
fields=spcap.url
display_location = event_menu
label = Get Smart PCAP
link.uri = https://$!pcap_rel_url$