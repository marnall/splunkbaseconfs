[isolatesensor]
is_custom = 1
python.version=python3
label = Isolate VMware Carbon Black EDR Sensor
description = Quarantine / Isolate an Endpoint using VMware Carbon Black EDR
icon_path = appIcon.png
payload_format = json
disabled = 0
ttl = 240
command           = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.action_name=$action_name$ | stats count
track_alert       = 1
param.ipaddress   = $result.dest_ip$
param.inputtype   = cbevent
param.dryrun      = 0
param._cam = {\
"supports_adhoc" : true,\
"category" : ["Information Conveyance"],\
"task" : ["create"],\
"subject" : ["endpoint.isolate"],\
"technology" : [ {"vendor":"VMware Carbon Black EDR","product":"VMware Carbon Black EDR","version": "1.0"} ]\
}

