# Avoid hardcoding of index names in knowledge object's search strings
[techinventory_indexes]
definition = ( `unix_indexes` OR `windows_indexes` )

[unix_indexes]
definition = ( index=os )
iseval = 0

[windows_indexes]
definition = ( index=windows )
iseval = 0

# Alias for CIM naming convention
[cim_Techinventory_indexes]
definition = ( `techinventory_indexes` )

[tinv_get_data(1)]
args = collection
definition = `techinventory_indexes` tag=inventory tag=$collection$\
| fields tinv_$collection$_*, host\
| stats latest(*) AS * by host
iseval = 0
