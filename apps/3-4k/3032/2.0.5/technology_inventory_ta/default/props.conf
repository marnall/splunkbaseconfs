[Script:InstalledApps]
FIELDALIAS-tinv_software = DisplayVersion AS tinv_software_version Publisher AS tinv_software_vendor
EVAL-tinv_software_name = trim( DisplayName , "\"" )

[package]
KV_MODE = multi
EVAL-tinv_software_vendor = if( VENDOR == "?" , "" , VENDOR )
FIELDALIAS-tinv_software = NAME AS tinv_software_name, VERSION AS tinv_software_version

[hardware]
EXTRACT-tinv_cpu_speed_ghz = \@\s*(?<tinv_cpu_speed_ghz>[\d\.]+)G in cpu_type
EXTRACT-tinv_cpu_cache = (?i)CPU_CACHE\s+(?P<tinv_cpu_cache>[^\n]*)?
FIELDALIAS-tinv_cpu = cpu_cores AS tinv_cpu_cores
EXTRACT-tinv_cpu = ^(?<tinv_cpu_brand>\S+)\s+(?<tinv_cpu_model>[^\@\^]+) in cpu_type
EVAL-tinv_mem_swap_total_gb = SwapMemory / 1024
EVAL-tinv_mem_total_gb = case(match(lower(Unit), "kb"), RealMemory/pow(1024,2), match(lower(Unit), "mb"), RealMemory/pow(1024,1), match(lower(Unit), "gb"), RealMemory, match(lower(Unit), "tb"), RealMemory*pow(1024,1), match(lower(Unit), "pb"), RealMemory*pow(1024,2), 1==1, "unknown")

[source::processor]
EVAL-tinv_cpu_speed_ghz = ClockSpeedMHz / 1000
EXTRACT-tinv_cpu = Name\W+(?<tinv_cpu_brand>\S+)\s+(?<tinv_cpu_model>[^\@]+)
FIELDALIAS-tinv_cpu = Architecture AS tinv_cpu_architecture, NumberOfCores AS tinv_cpu_cores

[source::networkadapter]
FIELDALIAS-tinv_nic = ProductName AS tinv_nic_name, MACAddress AS tinv_nic_macaddress

[source::disk]
EVAL-tinv_storage_total_gb = case( DriveType=="fixed" , ( TotalSpaceKB / pow( 1024 , 2 ) ) )
FIELDALIAS-tinv_storage = DriveType AS tinv_storage_drivetype FileSystem AS tinv_storage_format Name AS tinv_storage_mount
EVAL-tinv_storage_disk = Name

[df]
FIELDALIAS-tinv_storage = Filesystem AS tinv_storage_disk MountedOn AS tinv_storage_mount Type AS tinv_storage_format
EVAL-tinv_storage_drivetype = coalesce( tinv_storage_drivetype , "fixed" )
#Copied from Splunk_TA_nix
EVAL-tinv_storage_total_gb = case(match(Size, "P[i]*$"), tonumber(rtrim(Size, "Pi"),10)*pow(1024,2), match(Size, "T[i]*$"), tonumber(rtrim(Size, "Ti"),10)*pow(1024,1), match(Size, "G[i]*$"), tonumber(rtrim(Size,"Gi"),10)*pow(1024,0), match(Size, "M[i]*$"), tonumber(rtrim(Size,"Mi"), 10)/pow(1024,1), match(Size, "K[i]*$"), tonumber(rtrim(Size,"Ki"), 10)/pow(1024,2), match(Size, "B[i]*$"), tonumber(rtrim(Size,"Bi"), 10)/pow(1024,3), 1==1, "unknown")

[source::operatingsystem]
FIELDALIAS-tinv_os = OS AS tinv_os_name, Architecture AS tinv_os_architecture, Version AS tinv_os_version
EVAL-tinv_mem_total_gb = TotalPhysicalMemoryKB / pow( 1024 , 2 )
EVAL-tinv_mem_virtual_gb = TotalVirtualMemoryKB / pow( 1024 , 2 )

[source::driver]
FIELDALIAS-tinv_software = FriendlyName AS tinv_software_name, Manufacturer AS tinv_software_vendor, DriverVersion AS tinv_software_version

[Unix:Version]
FIELDALIAS-tinv_os = machine_hardware_name AS tinv_os_architecture, os_release AS tinv_os_version, os_name AS tinv_os_name
FIELDALIAS-tinv_cpu = machine_architecture_name AS tinv_cpu_architecture

[interfaces]
FIELDALIAS-tinv_nic = Name AS tinv_nic_name, inetAddr AS tinv_nic_ipv4, inet6Addr AS tinv_nic_ipv6, MAC as tinv_nic_macaddress

[win:systeminfo]
EXTRACT-tinv_nic = \d+\]\:\s+(?<tinv_nic_name>[^\,]+)\,\s+Connection\s+Name\:.+IP address\(es\)\,\s+\[01]\:\s+(?<tinv_nic_ipv4>[^\,\s\"$]+)\,\s+\[02\]\:\s+(?<tinv_nic_ipv6>[^\,\s\"$]+)
