# This inputs is for nix systems.  For windows systems, replace this with inputs.conf.win
# Conf monitoring
[monitor://$SPLUNK_HOME/etc/....conf]
index = conf
sourcetype = conf
crcSalt = <SOURCE>
initCrcLength = 1048576

# Dashboard files monitoring
[monitor://$SPLUNK_HOME/etc/....xml]
index = views
sourcetype = views
crcSalt = <SOURCE>
initCrcLength = 1048576

[monitor://$SPLUNK_HOME/etc/....htm]
index = views
sourcetype = html
crcSalt = <SOURCE>
initCrcLength = 1048576

[monitor://$SPLUNK_HOME/etc/....css]
index = views
sourcetype = css
crcSalt = <SOURCE>
initCrcLength = 1048576

# User Search history monitoring
[monitor://$SPLUNK_HOME/etc/users/*/*/history/*.csv]
index = views
sourcetype = csv
crcSalt = <SOURCE>
initCrcLength = 1048576