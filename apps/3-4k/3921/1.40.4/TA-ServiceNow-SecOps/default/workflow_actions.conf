[createsnsecevent]
display_location = event_menu
fields = *
label = Create ServiceNow Security Event
search.preserve_timerange = 0
search.search_string = | snsecevent node "$host$" type "$sourcetype$" resource "$source$" description "$mode$" time_of_event "$_time$"
search.target = blank
type = search

[createsnsecincident]
display_location = event_menu
fields = *
label = Create ServiceNow Security Incident
search.preserve_timerange = 0
search.search_string = | snsecincident short_description "$sourcetype$ on $host$, $source$" category "Splunk" subcategory "$sourcetype$" cmdb_ci "$host$"
search.target = blank
type = search
