[app_defense_alarms]
INDEXED_EXTRACTIONS = JSON
KV_MODE = none

# Non CIM
FIELDALIAS-created_at = createdAt as created_at
FIELDALIAS-remediation_status = remediation.status as remediation_status
FIELDALIAS-src_vm_ip = violatingVirtualMachine.ipAddress as src_vm_ip
FIELDALIAS-src_vm_mac = violatingVirtualMachine.macAddress as src_vm_mac
FIELDALIAS-src_vm_name = violatingVirtualMachine.name as src_vm_name
FIELDALIAS-src_vm_os = violatingVirtualMachine.guestName as src_vm_os
FIELDALIAS-usr_service = violatingVirtualMachine.service.name as usr_service
FIELDALIAS-usr_app = violatingVirtualMachine.service.scope.name as usr_app
FIELDALIAS-protection_status = violatingVirtualMachine.service.scope.state as protection_status
FIELDALIAS-usr_service_type = violatingVirtualMachine.service.type as usr_service_type
FIELDALIAS-vcenter_uuid = violatingVirtualMachine.vcenterUuid as vcenter_uuid
FIELDALIAS-cli = violationDetails.cli as cli
FIELDALIAS-process_md5 = violationDetails.processHash as process_md5


# Network Traffic
FIELDALIAS-action = remediation.remediationAction as action
FIELDALIAS-rule = ruleViolated as rule
FIELDALIAS-transport = violationDetails.ipProtocol as transport
FIELDALIAS-dvc = violatingVirtualMachine.vmUuid as dvc
EVAL-direction = if(ruleViolated == "OUTBOUND_CONNECTION", "outbound", "inbound")
EVAL-src_ip = if(ruleViolated == "OUTBOUND_CONNECTION", 'violationDetails.localAddress', null())
EVAL-src_mac = if(ruleViolated == "OUTBOUND_CONNECTION", 'violatingVirtualMachine.macAddress', null())
EVAL-dest_ip = if(ruleViolated == "OUTBOUND_CONNECTION", 'violationDetails.remoteAddress', 'violationDetails.localAddress')
EVAL-dest_port = if(ruleViolated == "OUTBOUND_CONNECTION", 'violationDetails.remotePort', 'violationDetails.localPort')

# Alert
FIELDALIAS-body = violationDetails.alert as body
EVAL-app = "AppDefense"
FIELDALIAS-type = ruleViolated as type

#Malware
FIELDALIAS-date = lastReceivedAt as date
FIELDALIAS-file_name = violationDetails.processPath as file_name
FIELDALIAS-file_hash = violationDetails.processHashSHA256 as file_hash

