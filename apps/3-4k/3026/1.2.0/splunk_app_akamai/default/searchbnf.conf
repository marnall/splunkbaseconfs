# [searchbnf.conf](http://docs.splunk.com/Documentation/Splunk/latest/Admin/Searchbnfconf)

[useragent-command]
syntax = useragent (prefix=<string>)? (device=<bool>)? (os=<bool>)? (ua=<bool>)? <field>
alias =
shortdesc = Give details about device, os, browser based on a given user agent string.
description = \
    The user agent field in user-agent-fieldname is parsed to extract device, os, user agent information. \i\\
    According to options selected, respective fields will be added: \i\\
     - ua option enabled: ua_family, ua_major, ua_minor, ua_patch \i\\
     - os option enabled: os_family, os_major, os_minor, os_patch, os_patch_minor \i\\
     - device option enabled: device, brand, model \i\\
    By default, all fileds are added. \i\\
    Not all of the information is available for all user agents, and hence it is normal to have some of the fields empty. \i\\
    prefix=string will add a certain prefix to all fieldnames if you desire to uniquely qualify added field names and avoid name collisions with existing fields (default is null/empty string).
comment1 = \
    This example extracts all information from http_user_agent field.
example1 = \
    ... | useragent http_user_agent
comment2 = \
    This example extracts only user agent's information from field ua_from_js. It will also prefix added fields with my_ua_.
example2 = \
    ... | useragent prefix=my_ua_ device=f os=f ua_from_js
category = streaming, fields::add
appears-in = 1.1.0
maintainer = dvergnes
usage = public
tags = browser