[Performance Alert: Download speed is slower than 50% of average speed (in 1 day)]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 1
alert_condition = search pect < 0.5
counttype = custom
cron_schedule = 58 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = splunk_app_akamai
request.ui_dispatch_view = search
search = | pivot akamai CloudMonitorEvent count(CloudMonitorEvent) AS requests avg(bandwidth_Mbps) as avg_bw_hour splitrow _time period hour | sort 1 -_time | appendcols [| pivot akamai CloudMonitorEvent avg(bandwidth_Mbps) as avg_bw_daily] | eval pect=avg_bw_hour/avg_bw_daily
disabled = 1


