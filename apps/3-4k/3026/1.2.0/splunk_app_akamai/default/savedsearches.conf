[Akamai: Clean up KV store]
cron_schedule = */30 * * * *
description = Clean up data stored in KV store
enableSched = 1
search = | cleankvstore 3600

[Akamai: prefetch real-time monitor edge server layers data]
cron_schedule = */5 * * * *
description = Prefetch real-time monitor edge server data
dispatch.earliest_time = -6m
dispatch.latest_time = -1m
enableSched = 1
schedule_window = 5
search = | pivot akamai CloudMonitorEvent count(CloudMonitorEvent) AS "requests" latest(geo.long) AS serverGeoLongitude \
latest(geo.lat) AS serverGeoLatitude dc(netPerf.edgeIP) AS serverAmount sum(message.bytes) AS traffic \
latest(geo.region) AS serverGeoState \
SPLITROW geo.city AS serverGeoCity \
SPLITROW server_geo_country as serverGeoCountry \
SPLITROW cp as cpCode \
| outputlookup edge_kvstore_lookup

[Akamai: prefetch real-time monitor requests layers data]
cron_schedule = */1 * * * *
description = Prefetch real-time monitor requests data used for heat maps and live source layers
dispatch.max_time = 60
dispatch.earliest_time = -2m@m
dispatch.latest_time = -1m@m
enableSched = 1
search = `akamai_indexes` tag=cloud_monitor \
| iplocation prefix=client src \
| rename clientCity as city, clientRegion as state, clientCountry as country \
| eval latitude=round(clientlat,1), longitude=round(clientlon,1), ts=strftime(_time, "%s"), failed=if('message.status' >= 400, 1, 0), _key=ts.cp.latitude.longitude \
| stats sum(failed) as errors, count as requests, sum(message.bytes) as traffic by _key,latitude,longitude,city,state,country,cp,ts  \
| rename cp as cpCode \
| sort 0 cpCode -errors -requests -traffic \
| eval counter=1 \
| streamstats current=true global=f sum(counter) as index by cpCode \
| where index <= 3000 \
| head 500000 \
| fields - _time counter index \
| outputlookup request_kvstore_lookup append=True


[Akamai: prefetch real-time monitor KPI panel data]
cron_schedule = */1 * * * *
description = Prefetch real-time monitor KPI panel
dispatch.max_time = 60
dispatch.earliest_time = -2m@m
dispatch.latest_time = -1m@m
enableSched = 1
search =  `akamai_indexes` tag=cloud_monitor \
| eval failed=if('message.status' >= 400, 1, 0), ts=strftime(_time, "%s"), cached_value=if(cached=="false", 0, 1), response_time='netPerf.lastMileRTT' + 'netPerf.downloadTime'\
| stats count as requests, sum(message.bytes) as traffic,\
sum(cached_value) as cachedRequests, sum(response_time) as sumResponseTime\
sum(failed) as errorRequests\
 by ts, cp\
| rename cp as cpCode\
| eval _key=ts.cpCode\
| outputlookup kpi_kvstore_lookup append=True


[Performance Alert: Cached hit ratios is lower than 20% ( in 1 hour)]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 1
alert_condition = search cache_request_hit_ratio < 20
counttype = custom
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = splunk_app_akamai
request.ui_dispatch_view = search
search = | pivot akamai CloudMonitorEvent count(CloudMonitorEvent) AS request sum(message.bytes) AS bytes SPLITROW cached AS cached SORT 0 cached |  stats sum(request) as "total_requests", sum(eval(request * if(cached=="true", 1, 0))) as "cached", sum(bytes) as "total_bytes", sum(eval(bytes * if(cached=="true", 1, 0))) as "cached_bytes" | eval cache_request_hit_ratio = cached/total_requests * 100
disabled = 1

[Operation Alert: Percentage of status code of 4xx is bigger than 2% (in 1 hour)]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 1
alert_condition = search pect > 0.02
counttype = custom
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = splunk_app_akamai
request.ui_dispatch_view = search
search = | pivot akamai CloudMonitorEvent count(CloudMonitorEvent) AS request_count splitrow message.status as status | stats sum(request_count) as total_requests, sum(eval(if((status >= 400 and status < 500), request_count, 0))) as client_error_requests, sum(eval(if((status >= 500), request_count, 0))) as server_error_requests | eval pect=client_error_requests/total_requests
disabled = 1

