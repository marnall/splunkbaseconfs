[sidewinder]
KV_MODE=none
TRANSFORMS-host = sidewinder_host_override
SHOULD_LINEMERGE = FALSE

EXTRACT-alert_actions 				= alert_actions="?(?P<alert_actions>[^"?,]+)
EXTRACT-alert_name 				= alert_name="?(?P<alert_name>[^"?,]+)
EXTRACT-alert_type 				= alert_type=(?P<alert_type>[^,]+)
EXTRACT-app_categories 				= app_categories=(?P<app_categories>[^,]+)
EXTRACT-app_risk 				= app_risk=(?P<app_risk>[^,]+)
EXTRACT-application		 		= application="?<?\[?(?P<application>[^\]?>?"?,]+)
EXTRACT-area 					= area=(?P<area>[^,]+)
EXTRACT-attackip 				= attackip=(?P<attackip>[^,]+)
EXTRACT-attackzone 				= attackzone=(?P<attackzone>[^,]+)
EXTRACT-auth_method 				= auth_method="?(?P<auth_method>[^"?,]+)
EXTRACT-bytes_written_to_client 		= bytes_written_to_client=(?P<bytes_written_to_client>[^,]+)
EXTRACT-bytes_written_to_server 		= bytes_written_to_server=(?P<bytes_written_to_server>[^,]+)
EXTRACT-cache_hit 				= cache_hit=(?P<cache_hit>[^,]+)
EXTRACT-category 				= category=(?P<category>[^,]+) 
EXTRACT-cmd 					= cmd=(?P<cmd>[^,]+)
EXTRACT-config_area 				= config_area="?(?P<config_area>[^"?,]+)
EXTRACT-config_item 				= config_item="?(?P<config_item>[^"?,]+)
EXTRACT-cpu_data 				= cpu_data=(?P<cpu_data>[^,]+)
EXTRACT-date 					= date="(?P<date>[^"]+)
EXTRACT-dropped_count 				= dropped_count=(?P<dropped_count>[^,]+)
EXTRACT-dst_geo 				= dst_geo=(?P<dst_geo>[^,]+)
EXTRACT-dst_local_port 				= dst_local_port=(?P<dst_local_port>[^,]+)
EXTRACT-dstip 					= dstip=(?P<dstip>[^,]+)
EXTRACT-dstport 				= dstport=(?P<dstport>[^,]+)
EXTRACT-dstzone 				= dstzone=(?P<dstzone>[^,]+)
EXTRACT-end_time 				= end_time="(?P<end_time>[^"]+)
EXTRACT-event 					= event="(?P<event>[^"]+)
EXTRACT-fac 					= fac=(?P<fac>[^,]+)
EXTRACT-file 					= file=(?P<file>[^,]+)
EXTRACT-hostname 				= hostname=(?P<hostname>[^,]+)
EXTRACT-ibytes 					= ibytes=(?P<ibytes>[^,]+)
EXTRACT-ICMP_subtype                            = ICMP_subtype=(?P<ICMP_subtype>[^,]+)
EXTRACT-ICMP_type                               = ICMP_type=(?P<ICMP_type>[^,]+)
EXTRACT-information 				= information="(?P<information>[^"]+)
EXTRACT-interface 				= interface=(?P<interface>[^,]+)
EXTRACT-ipkt 					= ipkt=(?P<ipkt>[^,]+)
EXTRACT-load_data 				= load_data=(?P<load_data>[^,]+)
EXTRACT-logid 					= logid=(?P<logid>[^,]+)
EXTRACT-mbuf_data 				= mbuf_data=(?P<mbuf_data>[^,]+)
EXTRACT-netsessid 				= netsessid=(?P<netsessid>[^,]+)
EXTRACT-num_events 				= num_events=(?P<num_events>[^,]+)
EXTRACT-obytes 					= obytes=(?P<obytes>[^,]+)
EXTRACT-opkt 					= opkt=(?P<opkt>[^,]+)
EXTRACT-pid 					= pid=(?P<pid>[^,]+)
EXTRACT-pri 					= pri=(?P<pri>[^,]+)
EXTRACT-real_data 				= real_data=(?P<real_data>[^,]+)
EXTRACT-reason 					= reason="(?P<reason>[^"]+)
EXTRACT-remote_logname 				= remote_logname=(?P<remote_logname>[^,]+)
EXTRACT-request_command				= request_command="?(?P<request_command>[^"?,]+)
EXTRACT-rule_name 				= rule_name="(?P<rule_name>[^"]+)
EXTRACT-sacap_filter 				= sacap_filter="?(?P<sacap_filter>[^"?,]+)
EXTRACT-src_geo 				= src_geo=(?P<src_geo>[^,]+)
EXTRACT-src_local_port 				= src_local_port=(?P<src_local_port>[^,]+)
EXTRACT-srcip 					= srcip=(?P<srcip>[^,]+)
EXTRACT-srcport 				= srcport=(?P<srcport>[^,]+)
EXTRACT-srczone 				= srczone=(?P<srczone>[^,]+)
EXTRACT-ssl_name 				= ssl_name="(?P<ssl_name>[^"]+)
EXTRACT-start_time 				= start_time="(?P<start_time>[^"]+)
EXTRACT-total_events 				= total_events=(?P<total_events>[^,]+)
EXTRACT-type 					= type=(?P<type>[^,]+)
EXTRACT-udb_action 				= udb_action="?(?P<udb_action>[^"?,]+)
EXTRACT-udb_class 				= udb_class="?(?P<udb_class>[^"?,]+)
EXTRACT-udb_user 				= udb_user="?(?P<udb_user>[^"?,]+)
EXTRACT-user_name 				= user_name=(?P<user_name>[^,]+)
EXTRACT-vendor_protocol				= protocol=(?P<vendor_protocol>[^,]+)
EXTRACT-virt_data 				= virt_data=(?P<virt_data>[^,]+)

FIELDALIAS-app 					= application AS app
FIELDALIAS-bytes_in 				= ibytes AS bytes_in
FIELDALIAS-bytes_out 				= obytes AS bytes_out
FIELDALIAS-dest 				= destip AS dest
FIELDALIAS-dest_geo 				= dst_geo AS dest_geo
FIELDALIAS-dest_ip 				= dstip AS dest_ip
FIELDALIAS-dest_mac 				= dest_etheraddr AS dest_mac
FIELDALIAS-dest_port 				= dstport AS dest_port
FIELDALIAS-dest_zone 				= dstzone AS dest_zone
FIELDALIAS-dvc 					= hostname AS dvc
FIELDALIAS-rule 				= rule_name AS rule
FIELDALIAS-session_id 				= netsessid AS session_id
FIELDALIAS-src 					= srcip AS src
FIELDALIAS-icmp_type 				= ICMP_type AS icmp_type
FIELDALIAS-src_ip 				= srcip AS src_ip
FIELDALIAS-src_mac 				= src_etheraddr AS src_mac
FIELDALIAS-src_port 				= srcport AS src_port
FIELDALIAS-src_zone 				= srczone AS src_zone
FIELDALIAS-user 				= user_name AS user
FIELDALIAS-packets_in 				= ipkt AS packets_in
FIELDALIAS-packets_out 				= opkt AS packets_out

EVAL-bytes 					= (bytes_in + bytes_out)
EVAL-packets 					= (packets_in + packets_out)
EVAL-direction 					= case(src_zone == "external", "inbound", dest_zone == "external", "outbound", 1 == 1, "unknown"
EVAL-vendor_product 				= "Forcepoint Sidewinder"

LOOKUP-sidewinder_transport_lookup 		= sidewinder_transport_lookup vendor_protocol OUTPUT transport
LOOKUP-sidewinder_action_lookup 		= sidewinder_action_lookup event OUTPUT action
LOOKUP-sidewinder_icmp_code_lookup 		= sidewinder_icmp_code_lookup protocol AS vendor_protocol, type AS icmp_type OUTPUT code as icmp_code
