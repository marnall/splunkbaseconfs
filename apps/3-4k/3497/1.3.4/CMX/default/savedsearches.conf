[Get_Campus_Details]
alert.digest_mode = 0
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -4h@h
counttype = number of events
cron_schedule = 0 * * * *
dispatch.earliest_time = -4h@h
dispatch.latest_time = now
enableSched = 1
quantity = 0
search = `cmx_index` sourcetype=cmxmap | table _raw | cmxfloorinfo | table CampusName BuildingName FloorName FloorID image_name image_height image_width image_size image_max_resolution image_zoom_level  | inputlookup  append=true CampusImageLookup | dedup FloorID | outputlookup CampusImageLookup

[Get_CMX_Device_Details]
alert.digest_mode = 0
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1h@h
counttype = number of events
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
run_on_startup = 1
search = `cmx_index` sourcetype=cmxhttp | dedup notifications{}.subscriptionName |rename notifications{}.subscriptionName as cmxdevice | table cmxdevice | inputlookup  append=true CMXHttpDeviceLookup  | dedup cmxdevice  |outputlookup CMXHttpDeviceLookup
