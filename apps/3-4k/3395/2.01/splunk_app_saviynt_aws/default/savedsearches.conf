[Scheduling Data Import from AWS for Saviynt Security Analyzer]
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
description = This search will re-import data from active AWS account into Splunk. This search can be scheduled to run in a timely manner. Make sure "Save & Test Connection" in Import data returns "Connection Successful" before scheduling this search. 
disabled = 0
enableSched = 1
search = |script importdata