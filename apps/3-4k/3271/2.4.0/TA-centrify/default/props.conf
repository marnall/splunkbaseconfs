[WinEventLog:Application]
TRANSFORMS-sourcetype_for_centrifyauditlog = centrify_css_winlog_regex

[centrify_css_winlog]
REPORT-extract_centrify_fields = centrify_headers,centrify_fields
#session_uri is created only when valid, and will be used to replay a session
EVAL-session_uri = case((NOT match(DAInst,"N/A")) AND (NOT match(DASessID,"N/A")),"rep://".DAInst."/".DASessID)

# activity field is captured only in windows event log and this will be used in sample dashboards.
EXTRACT-Activity = Message: (?<activity>[\S\s]+)\s\s

# eventstatus field will be used in sample dashboards.This field can take either of two values - DENIED or GRANTED
EVAL-eventstatus = if(match(lower('eventname'),".*(failure|denied|failed|unsuccessful)"),"DENIED","GRANTED")

# action,app,src and dest firlds are extracted for CIM authentication model.
EVAL-action = if(match(lower('eventname'),".*(failure|denied|failed|unsuccessful)"),"failure","success")
EVAL-app = "Centrify"
EVAL-vendor_product = "Centrify_Suite"
FIELDALIAS-dest_for_auth_cim = system AS dest
FIELDALIAS-src_for_auth_cim = client AS src

#If windows Application logs are collected through Splunk_TA_Windows, the severity field value will be decided based on the 'EventType' field from the event and it may not be consistent with the severity field extracted here, In that case centrify_severity field will contain the actual severity value for Centrify AUDIT_TRAIL log.

FIELDALIAS-severity_for_centrifyseverity = severity AS centrify_severity

[syslog]
TRANSFORMS-sourcetype_for_centrifyauditlog = centrify_css_syslog_regex

[centrify_css_syslog]
REPORT-extract_centrify_fields = centrify_headers,centrify_fields
SHOULD_LINEMERGE = false

# session_uri is created only when valid, and will be used to replay a session
EVAL-session_uri = case((NOT match(DAInst,"N/A")) AND (NOT match(DASessID,"N/A")),"rep://".DAInst."/".DASessID)

# eventstatus field will be used in sample dashboards.This field can take either of two values - DENIED or GRANTED
EVAL-eventstatus = if(match(lower(status),"failure|denied|failed|unsuccessful"),"DENIED","GRANTED")

# action,app,src and dest firlds are extracted for CIM authentication model.
EVAL-action = if(match(lower(status),"failure|denied|failed|unsuccessful"),"failure","success")
EVAL-app = "Centrify"
EVAL-vendor_product = "Centrify_Suite"
FIELDALIAS-dest_for_auth_cim = system AS dest
FIELDALIAS-src_for_auth_cim = client AS src
FIELDALIAS-severity_for_centrifyseverity = severity AS centrify_severity
