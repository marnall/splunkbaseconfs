#If windows Application logs are collected through Splunk_TA_Windows, the secerity field value will be decided based on the 'EventType' field from the event and it may not be consistent with the severity field extracted here, In that case centrify_severity field will contain the actual severity value for Centrify AUDIT_TRAIL log.
[centrify_headers]
REGEX = .*\d{1,2}\:\d{1,2}\:\d{1,2}\.*?\s(?<system>[^\s]*)\s.*AUDIT_TRAIL\|(?<product>(?:[^|\\]|(?:\\{2})|\\\|)+)\|(?<category>(?:[^|\\]|(?:\\{2})|\\\|)+)\|(?<version>(?:[^|\\]|(?:\\{2})|\\\|)+)\|(?<signatureid>(?:[^|\\]|(?:\\{2})|\\\|)+)\|(?<eventname>(?:[^|\\]|(?:\\{2})|\\\|)+)\|(?<severity>(?:[^|\\]|(?:\\{2})|\\\|)+)

[centrify_fields]
REGEX = [\s|\|](?<_KEY_1>[\w.:\[\]\/]+)=(?<_VAL_1>.*?(?=(?:\s[\w.:\[\]\/\|]+=|$))) 
REPEAT_MATCH = True
CLEAN_KEYS = 1

[centrify_css_winlog_regex]
REGEX = .*AUDIT_TRAIL.*
FORMAT = sourcetype::centrify_css_winlog
DEST_KEY = MetaData:Sourcetype

[centrify_css_syslog_regex]
REGEX = .*AUDIT_TRAIL.*
FORMAT = sourcetype::centrify_css_syslog
DEST_KEY = MetaData:Sourcetype