[centrify_unix_audit_trail_logs]
search = sourcetype="centrify_css_syslog" "AUDIT_TRAIL"

[centrify_windows_audit_trail_logs]
search = sourcetype="centrify_css_winlog" "AUDIT_TRAIL"

[centrify_authentication]
search = (eventtype=centrify_unix_audit_trail_logs OR eventtype=centrify_windows_audit_trail_logs) (centrifyEventID=6002 OR centrifyEventID=6004 OR centrifyEventID=6010 OR centrifyEventID=6011 OR centrifyEventID=27101 OR centrifyEventID=24101 OR centrifyEventID=6001 OR centrifyEventID=6003 OR centrifyEventID=18200 OR centrifyEventID=27000 OR centrifyEventID=24100 OR centrifyEventID=54100 OR centrifyEventID=54101 OR centrifyEventID=54200 OR centrifyEventID=54201 OR centrifyEventID=9001 OR centrifyEventID=24500 OR centrifyEventID=24501)
# tags = authentication

[centrify_authentication_success]
search = eventtype=centrify_authentication action=success

[centrify_authentication_failure]
search = eventtype=centrify_authentication action=failure

