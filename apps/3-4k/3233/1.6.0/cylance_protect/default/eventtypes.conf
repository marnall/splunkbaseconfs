[cylance_index]
search = index=protect OR index=cylance_protect

[protect_alert]
priority = 5
search = eventtype=cylance_index sourcetype=syslog_audit_log

[protect_malware]
priority = 5
search = eventtype=cylance_index sourcetype=syslog_threat OR sourcetype=syslog_exploit OR sourcetype=threat OR sourcetype=exploit

[protect_inventory]
priority = 5
search = eventtype=cylance_index sourcetype=syslog_device OR sourcetype=device
