[script://$SPLUNK_HOME/etc/apps/cylance_protect/bin/threats.py]
disabled = true
interval = 86400
sourcetype = threat
index = cylance_protect
passAuth = splunk-system-user
python.version = python3

[script://$SPLUNK_HOME/etc/apps/cylance_protect/bin/indicators.py]
disabled = true
interval = 86400
sourcetype = threat_indicator
index = cylance_protect
passAuth = splunk-system-user
python.version = python3

[script://$SPLUNK_HOME/etc/apps/cylance_protect/bin/devices.py]
disabled = true
interval = 86400
sourcetype = device
index = cylance_protect
passAuth = splunk-system-user
python.version = python3

[script://$SPLUNK_HOME/etc/apps/cylance_protect/bin/events.py]
disabled = true
interval = 86400
sourcetype = event
index = cylance_protect
passAuth = splunk-system-user
python.version = python3

[tcp-ssl://6514]
disabled = true
sourcetype = syslog_protect
# For multi-tenant support, clone input, set a different port, and set source to be the tenant name. A field alias for source is set to Tenant.
index = cylance_protect

