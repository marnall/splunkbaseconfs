# Image Tour
[cylance]
type = image
imageName1 = 1LocateIndexesinSettings.png
imageCaption1 = (1) Start by configuring an index for the app. Locate Indexes in Settings.
imageName2 = 2CreateIndexcalledprotect.png
imageCaption2 = (2) Create an index called cylance_protect.
imageName3 = 3Protectindexcreated.png
imageCaption3 = (3) Notice the cylance_protect index is created.
imageName4 = 4LocateEventtypesinSettings.png
imageCaption4 = (4) Next, configure an event type for the app. Locate Event types in Settings.
imageName5 = 5Locatethecylance_indexinEventtypes.png
imageCaption5 = (5) Locate and click on the cylance_index event type.
imageName6 = 6EdittheSearchstringtomatchyourindexname.png
imageCaption6 = (6) Edit the Search String to match your index name. If you have legacy indexes, such as "protect", you can also include them here.
imageName7 = 7menuConfigureTenants.png
imageCaption7 = (7) Next, configure tenant Threat Data Report connections. From the app menu, choose Help > Configure TDR. 
imageName8 = 8screenConfigureTenants.png
imageCaption8 = (8) Enter your tenant(s) here. Configure your app to match your BlackBerry Console settings, such as the Threat Data Report download URL and the current Threat Data Report token.
imageName9 = 9TenantConfigured.png
imageCaption9 = (9) Here is a completed example tenant.
imageName10 = 10LocateDataInputsinSettings.png
imageCaption10 = (10) Next, enable the TDR scripts. Locate the Data inputs in Settings.
imageName11 = 11LocateScriptsinDataInputs.png
imageCaption11 = (11) Locate and click Scripts.
imageName12 = 12Enabletheinputscripts.png
imageCaption12 = (12) Enable the input scripts (in this example all 4 included scripts are enabled).
imageName13 = 13ModifyInputscriptIndex.png
imageCaption13 = (13) Click on a script name to check that the input script has the correct index selected.
imageName14 = 14ViewThreatSummaryDashboard.png
imageCaption14 = (14) The Threat Summary Dashboard should display data if the app is correctly configured.
imgPath = /tour
context = cylance_protect
