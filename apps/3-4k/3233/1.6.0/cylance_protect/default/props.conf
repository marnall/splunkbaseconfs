##############################################################################
# THREAT DATA REPORT (TDR) PARSING
##############################################################################

[threat]
category = Custom
TRANSFORMS-devicehostname_ns = protecthostname_ns
INDEXED_EXTRACTIONS = json
KV_MODE = none
AUTO_KV_JSON = false
NO_BINARY_CHECK = 1
TIMESTAMP_FIELDS = "Last Found"
pulldown_type = 1
# CIM Tagging
LOOKUP-action = protect_cim_status_to_action_lookup "File Status" OUTPUT action
FIELDALIAS-classification = Classification AS category
FIELDALIAS-lastFound = "Last Found" AS date
FIELDALIAS-deviceName = "DeviceName" AS dest
FIELDALIAS-fileHash = "SHA256" AS file_hash
FIELDALIAS-fileName = "File Name" AS file_name
FIELDALIAS-filePath = "File Path" AS file_path
FIELDALIAS-classification2 = Classification AS signature
FIELDALIAS-detectedBy = "Detected By" AS src
FIELDALIAS-fileOwner = "File Owner" AS user
EVAL-vendor_product = "CylancePROTECT"

[device]
category = Custom
TRANSFORMS-devicehostname = protecthostname
INDEXED_EXTRACTIONS = json
KV_MODE = none
AUTO_KV_JSON = false
NO_BINARY_CHECK = 1
TIMESTAMP_FIELDS = "Last Communicated"
pulldown_type = 1
# CIM Tagging
FIELDALIAS-dest = "Device Name" AS dest
FIELDALIAS-dest_bunit = "Zones" AS dest_bunit
FIELDALIAS-dest_category = "Policy" AS dest_category
FIELDALIAS-ip = "IP Addresses" AS ip
FIELDALIAS-mac = "Mac Addresses" AS mac
FIELDALIAS-os = "OS Version" AS os
FIELDALIAS-user = "Last Reported User" AS user

[threat_indicator]
category = Custom
INDEXED_EXTRACTIONS = json
KV_MODE = none
AUTO_KV_JSON = false
NO_BINARY_CHECK = 1
TIMESTAMP_FIELDS = time
pulldown_type = 1

[event]
category = Custom
TRANSFORMS-eventhostname = protecthostname
INDEXED_EXTRACTIONS = json
KV_MODE = none
AUTO_KV_JSON = false
NO_BINARY_CHECK = 1
TIMESTAMP_FIELDS = "Date"
pulldown_type = 1


##############################################################################
# SYSLOG PARSING
##############################################################################

[syslog_protect]
TRANSFORMS-changesourcetype = set_auditlog_sourcetype
TRANSFORMS-changesourcetype2 = set_threatclassification_sourcetype
TRANSFORMS-changesourcetype3 = set_exploit_sourcetype
TRANSFORMS-changesourcetype4 = set_appcontrol_sourcetype
TRANSFORMS-changesourcetype5 = set_threat_sourcetype
TRANSFORMS-changesourcetype6 = set_device_sourcetype
TRANSFORMS-changesourcetype7 = set_devicecontrol_sourcetype
TRANSFORMS-changesourcetype8 = set_scriptcontrol_sourcetype
TRANSFORMS-changesourcetype9 = set_optics_sourcetype
TRANSFORMS-console_syslog_hostname = protecthostname_syslog
NO_BINARY_CHECK = true
category = Custom
description = CylancePROTECT Syslog Data
disabled = false
pulldown_type = true
# Common
EXTRACT-EventType = Event\sType:\s+(?P<EventType>\w+)
EXTRACT-EventName = Event\sName:\s+(?P<EventName>\w+)
EXTRACT-SHA256 = \sSHA256:\s(?<SHA256>[^,]*+)
EXTRACT-FilePath = Path:\s+(?P<FilePath>[^,]+)
FIELDALIAS-source = "source" AS Tenant


[syslog_device_control]
# Device Control
NO_BINARY_CHECK = true
category = Custom
description = CylancePROTECT Syslog Device Control
disabled = false
pulldown_type = true
TRANSFORMS-console_syslog_hostname = protecthostname_syslog
EXTRACT-EventName = Event\sName:\s(?P<EventName>.*?),
EXTRACT-DeviceName = Device\sName:\s(?P<DeviceName>.*?),
EXTRACT-ExternalDeviceType = External\sDevice\sType:\s(?P<ExternalDeviceType>.*?),
EXTRACT-ExternalDeviceVendorID = External\sDevice\sVendor\sID:\s(?P<ExternalDeviceVendorID>.*?),
EXTRACT-ExternalDeviceName = External\sDevice\sName:\s(?P<ExternalDeviceName>.*?),
EXTRACT-ExternalDeviceProductID = External\sDevice\sProduct\sID:\s(?P<ExternalDeviceProductID>.*?),
EXTRACT-ExternalDeviceSN = External\sDevice\sSerial\sNumber:\s(?P<ExternalDeviceSN>.*?),
EXTRACT-ZoneNames = \sZone\sNames:\s\((?P<ZoneNames>.*?)\)
EXTRACT-DeviceID = Device\sId:\s(?<DeviceID>(\w){8}-(\w){4}-(\w){4}-(\w){4}-(\w){12})
EXTRACT-PolicyName = Policy\sName:\s(?<PolicyName>.*)
# CIM Tagging
FIELDALIAS-category = "Action" AS category
FIELDALIAS-action = "EventName" AS action
FIELDALIAS-dest = "host" AS dest
FIELDALIAS-source = "source" AS Tenant


[syslog_app_control]
# Application Control
NO_BINARY_CHECK = true
category = Custom
description = CylancePROTECT Syslog App Control
disabled = false
pulldown_type = true
TRANSFORMS-console_syslog_hostname = protecthostname_syslog
EXTRACT-DeviceName = Device\sName:\s+(?P<DeviceName>.*?),
EXTRACT-EventType = Event\sType:\s+(?P<EventType>.*?),
EXTRACT-EventName = Event\sName:\s+(?P<EventName>.*?),
