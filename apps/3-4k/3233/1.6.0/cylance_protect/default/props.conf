EXTRACT-ZoneNames = \sZone\sNames:\s\((?P<ZoneNames>.*?)\)
EXTRACT-Action = (?=[^A]*(?:Action:|A.*Action:))^[^\)\n]*\),\s+\w+:\s+(?P<Action>\w+)
EXTRACT-ActionType = \sAction\sType:\s((?P<ActionType>[^)]+))
FIELDALIAS-source = "source" AS Tenant
EXTRACT-DeviceID = Device\sId:\s(?<DeviceID>(\w){8}-(\w){4}-(\w){4}-(\w){4}-(\w){12})
EXTRACT-PolicyName = Policy\sName:\s(?<PolicyName>.*)
# Malware CIM Tagging
LOOKUP-appcontrol_action = protect_cim_actiontype_to_action_lookup "Action Type" OUTPUT action
FIELDALIAS-category = "Action" AS category
FIELDALIAS-category_action = "Action" AS action
FIELDALIAS-dest = "host" AS dest
FIELDALIAS-file_hash = "SHA256" AS file_hash
FIELDALIAS-file_path = "FilePath" AS file_path

