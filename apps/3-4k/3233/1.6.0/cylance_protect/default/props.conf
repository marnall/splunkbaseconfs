disabled = false
pulldown_type = true
EXTRACT-EventType = Event\sType:\s+(?P<EventType>\w+)
EXTRACT-EventName = Event\sName:\s+(?P<EventName>\w+)
EXTRACT-DeviceName = \sDevice\sName:\s(?<DeviceName>.*?),\s
EXTRACT-EventId = \sEvent\sId:\s(?<EventId>.*?),\s
EXTRACT-Severity = \sSeverity:\s(?<Severity>.*?),\s
EXTRACT-Description = \sDescription:\s(?<Description>.*?),\s
EXTRACT-InstigatingProcessName = \sInstigating\sProcess\sName:\s(?<InstigatingProcessName>.*?),\s
EXTRACT-InstigatingProcessOwner = \sInstigating\sProcess\sOwner:\s(?<InstigatingProcessOwner>.*?),\s
EXTRACT-InstigatingProcessHash = \sInstigating\sProcess\sImageFileSha256:\s(?<InstigatingProcessHash>.*?)(,\s|$)
EXTRACT-TargetProcessName = \sTarget\sProcess\sName:\s(?<TargetProcessName>.*?),\s
EXTRACT-TargetProcessOwner = \sTarget\sProcess\sOwner:\s(?<TargetProcessOwner>.*?),\s
EXTRACT-TargetProcessHash = \sTarget\sProcess\sImageFileSha256:\s(?<TargetProcessHash>.*?)(,\s|$)
EXTRACT-TargetRegistryKeyPath = \sTarget\sRegistry\sKeyPath:\s(?<TargetRegistryKeyPath>.*?)(,\s|$)
EXTRACT-TargetRegistryValueName = \sTarget\sRegistry\sValueName:\s(?<TargetRegistryValueName>.*?),\s
EXTRACT-TargetFilePath = \sTarget\sFile\sPath:\s(?<TargetFilePath>.*?),\s
EXTRACT-TargetFileOwner = \sTarget\sFile\sOwner:\s(?<TargetFileOwner>.*?),\s
EXTRACT-TargetFileHash = \sTarget\sFile\sSha256:\s(?<TargetFileHash>.*?),\s
EXTRACT-DestinationIP = \sDestination\sIP:\s(?<DestinationIP>.*?),\s
EXTRACT-DestinationPort = \sDestination\sPort:\s(?<DestinationPort>.*?)(,\s|$)
EXTRACT-ZoneNames = \sZone\sNames:\s\((?P<ZoneNames>.*?)\)
EXTRACT-DeviceID = Device\sId:\s(?<DeviceID>(\w){8}-(\w){4}-(\w){4}-(\w){4}-(\w){12})
EXTRACT-PolicyName = Policy\sName:\s(?<PolicyName>.*)
# OpticsCaeWmiEvent specific
EXTRACT-ConsumerText = Consumer\sText:\s(?<ConsumerText>.*?),\sConsumer\sText\sLength:
EXTRACT-ConsumerTextLength = Consumer\sText\sLength:\s(?<ConsumerTextLength>.*?),\s
EXTRACT-Operation = Operation:\s(?<Operation>.*?),\sOperation\sLength:
EXTRACT-OperationLength = Operation\sLength:\s(?<OperationLength>.*?),\s

# OpticsCaeDnsEvent specific
EXTRACT-TargetDomainName = Target\sDomain\sName:\s(?<TargetDomainName>.*?),\s
EXTRACT-ResolvedAddress = Resolved\sAddress:\s(?<ResolvedAddress>.*?),\sResolved\sAddress\sCount:
EXTRACT-ResolvedAddressCount = Resolved\sAddress\sCount:\s(?<ResolvedAddressCount>.*?),\s

# OpticsPowershellTraceEvent specific
EXTRACT-ScriptBlockText = Script\sBlock\sText:\s(?<ScriptBlockText>.*?),\sScript\sBlock\sLength:
EXTRACT-ScriptBlockLength = Script\sBlock\sLength:\s(?<ScriptBlockLength>.*?),
EXTRACT-Payload = Payload:\s(?<Payload>.*?),\s
EXTRACT-PayloadLength = Payload\sLength:\s(?<PayloadLength>.*?),\s

# OpticsCaeLogEvent specific
EXTRACT-WindowsEventId = Windows\sEvent\sId:\s(?<WindowsEventId>.*?),\s
EXTRACT-SecurityProvider = Security\sProvider:\s(?<SecurityProvider>.*?),\s


# Malware CIM Tagging
FIELDALIAS-source = "source" AS Tenant
FIELDALIAS-devicename = DeviceName as dest_name
FIELDALIAS-DestIP = DestinationIP as dest_ip
FIELDALIAS-DestPort = DestinationPort as dest_port
FIELDALIAS-file_path = FilePath as file_path


