
[syslog]
TIME_PREFIX = (?:^.*Centrify.*whenoccurreddate=|^.*?)
TRANSFORMS-centrify_cisp_syslog_transforms = centrify_cisp_syslog_regex

[centrify_cisp_syslog]
REPORT-centrify_cisp_syslog_report = centrify_cisp_headers

# action,app and src fields are extracted for CIM authentication model.
EVAL-app = "Centrify"
EVAL-vendor_product = "Centrify_Cloud"
EVAL-centrify_vendor_product =  "Centrify_Cloud"

FIELDALIAS-src_for_auth_cim = FromIPAddress AS src
EVAL-action = if(match(lower(MfaResult),"failure|denied|failed|unsuccessful"),"failure","success")
