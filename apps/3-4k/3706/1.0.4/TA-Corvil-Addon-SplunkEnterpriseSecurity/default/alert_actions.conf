
[targetedpacketcapture]
is_custom                    = 1
label                        = Track as Suspicious Host
description                  = Track the event source as a suspicious host.
icon_path                    = img/appIcon.png
payload_format               = json

param._cam                   = {\
    "category":   ["Information Tracking"],\
    "task":       ["create"],\
    "subject":    ["network.capture"],\
    "technology": [{"vendor": "Corvil", "product": "Corvil"}],\
    "supports_adhoc": true,\
    "drilldown_uri":   "search?q=search tag=modaction (sid=$sid$ rid=$rid$) OR (orig_sid=$sid$ orig_rid=$rid$)&earliest=-24h@h&latest=now"\
}
param.inspect_data_dashboard = Investigate Host
param.cne_host               = $result.CNEHost$
param.src_ip                 = $result.src$
param.session_prepend_text   = Suspicious:
param.orig_raw               = $result.orig_raw$
ttl                          = 240
command                      = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.action_name=$action_name$ | stats count

