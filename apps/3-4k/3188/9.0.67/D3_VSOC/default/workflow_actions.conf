
[D3_View_Notable_Event_Details]
display_location = both
fields = EventID
label = (D3)View Notable Event Details
search.app = D3_VSOC
search.latest = now
search.preserve_timerange = 0
search.search_string = index=notable orig_splunk_server="$SplunkServer$"|search _cd="$EventID$"
search.target = blank
type = search

[D3_View_IRCase_List_in_D3]
display_location = both
fields = EventID
label = (D3)View IR/Case List in D3
link.method = get
link.target = blank
link.uri = https://{ADDRESS_TO_D3_VSOC}/VSOC/d3_ir/radar.aspx?Radar=_Splunk-NE_=1-orig_event_hash=$EventID$|orig_splunk_server=$SplunkServer$|index=notable
type = link

[D3_View_IRCase_Details_in_D3]
display_location = both
fields = ID
label = (D3)View IR/Case Details in D3
link.method = get
link.target = blank
link.uri = https://{ADDRESS_TO_D3_VSOC}/VSOC/d3_ir/radar.aspx?Radar=_Splunk-NE_=1-vsoc_cat=$CAT$|vsoc_icid=$ID$
type = link
