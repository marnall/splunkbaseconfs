#
# adds
#

[tc000_src_add]
display_location = event_menu
fields = src
label = TC Add IP: $src$
link.method = get
link.target = blank
link.uri = /app/$@namespace$/tc_workflow_add_indicator?indicator=$src$&indicatorType=Address&source=$source$&sourcetype=$sourcetype$&raw=$_raw$
type = link

