[ta_threatconnect_settings]

# app name
app_name = TA-threatconnect

#
# Custom Settings
#

# Set the max chunk size to use while running custom and datamodel searches.
# default: 250
max_chunk_size = 250

# search sleep - seconds to wait between status checks
search_sleep = 5

# search timeout - 45 minutes to finish each search
search_timeout = 2700

# Disable SSL Verification for ThreatConnect Connection
# 1 => Enabled - Verify SSL Cert
# 0 => Disabled - Do NOT Verify SSL Cert
tc_verify_ssl = 1

# The current App migration version
tc_migration_version = 0.0.3

# Set the max number of indicators to include in a single batch save during indicator import.
# default: 950
tc_max_batch_size = 950

# timezone - this timezone should match the timezone of the ThreatConnect instance.
timezone = UTC
