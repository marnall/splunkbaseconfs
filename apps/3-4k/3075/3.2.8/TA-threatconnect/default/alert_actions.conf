[tc_ar_send_to_playbook]
command = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.action_name=$action_name$ | stats count
description = Send this event to a ThreatConnect Playbook.
label = Send Event to ThreatConnect Playbook
icon_path = threatconnect.png
is_custom = 1
param._cam        = {\
    "category":      ["Orchestration", "Information Tracking", "Information Gathering", "Information Conveyance"],\
    "task":          ["automation"],\
    "subject":       ["ThreatConnect Playbook Remote Execution"],\
    "technology":    [{"vendor": "ThreatConnect", "product": "ThreatConnect", "version": ["1.0.0"]}],\
    "supports_adhoc": true\
}
# param values map to field ids in html file
param.fields =
param.playbook_key =
payload_format = json
python.version = python3
