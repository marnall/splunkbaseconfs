#
# Automated Data Collection
#

[TC-DataModel-Data]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 30 * * * *
description = Retrieve Datamodel Data and Store in KV Store for fast access
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = bar
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = TA-threatconnect
request.ui_dispatch_view = search
search = | tcdmu
dispatch.earliest_time = -30d
dispatch.latest_time = now

[TC-Label-Data]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */5 * * * *
description = Retrieve Label Data and Store in KV Store for fast access
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = bar
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = TA-threatconnect
request.ui_dispatch_view = search
search = | tclabelmanager action="refresh_labels"
dispatch.earliest_time = -30d
dispatch.latest_time = now

[TC-DB-Stats]
alert.suppress = 0
alert.track = 1
cron_schedule = 30 */2 * * *
description = Stats Generator
enableSched = 1
realtime_schedule = 0
search = | tcdbstats
dispatch.earliest_time = -30d
dispatch.latest_time = now

[TC-Observations]
alert.suppress = 0
alert.track = 1
cron_schedule = 45 * * * *
description = Post Indicator Observations to ThreatConnect
enableSched = 1
realtime_schedule = 0
search = | tcobservations
dispatch.earliest_time = -30d
dispatch.latest_time = now
#
# CSV Generators for ES
#

[TC-CSV-Address-Indicator]
alert.suppress = 0
alert.track = 1
cron_schedule = 43 1 * * *
description = Generate CSV of indicators from KV Store (ES - Local Ip Intel)
enableSched = 1
realtime_schedule = 0
search = | inputlookup tci_iott | search type=Address | eval description=("ThreatConnect indicator from owner " + ownerName) | rename indicator as ip | table description, ip, rating | outputlookup threatconnect_ip_indicators.csv
dispatch.earliest_time = -30d
dispatch.latest_time = now

[TC-CSV-EmailAddress-Indicator]
alert.suppress = 0
alert.track = 1
cron_schedule = 33 1 * * *
description = Generate CSV of indicators from KV Store (ES - Local Email Intel)
enableSched = 1
realtime_schedule = 0
search = | inputlookup tci_iott | search type=EmailAddress | eval description=("ThreatConnect indicator from owner " + ownerName) | eval subject="N/A" | rename indicator as src_user | table description, src_user, subject, rating | outputlookup threatconnect_email_indicators.csv
dispatch.earliest_time = -30d
dispatch.latest_time = now

[TC-CSV-File-Indicator]
alert.suppress = 0
alert.track = 1
cron_schedule = 23 1 * * *
description = Generate CSV of indicators from KV Store (ES - Local File Intel)
enableSched = 1
realtime_schedule = 0
search = | inputlookup tci_iott | search type=File | eval description=("ThreatConnect indicator from owner " + ownerName) | eval file_name="N/A" | eval indicator=split(indicator," : ") | mvexpand indicator | rename indicator as file_hash | table description, file_hash, file_name, rating | outputlookup threatconnect_file_indicators.csv
dispatch.earliest_time = -30d
dispatch.latest_time = now

[TC-CSV-Host-Indicator]
alert.suppress = 0
alert.track = 1
cron_schedule = 13 1 * * *
description = Generate CSV of indicators from KV Store (ES - Local Domain Intel)
enableSched = 1
realtime_schedule = 0
search = | inputlookup tci_iott | search type=Host | eval description=("ThreatConnect indicator from owner " + ownerName) | rename indicator as domain | table description, domain, rating | outputlookup threatconnect_domain_indicators.csv
dispatch.earliest_time = -30d
dispatch.latest_time = now

[TC-CSV-URL-Indicator]
alert.suppress = 0
alert.track = 1
cron_schedule = 03 1 * * *
description = Generate CSV of indicators from KV Store (ES - Local HTTP Intel)
enableSched = 1
realtime_schedule = 0
search = | inputlookup tci_iott | search type=URL | eval description=("ThreatConnect indicator from owner " + ownerName) | eval http_referrer="N/A" | eval http_user_agent="N/A" | rename indicator as url | table description, http_referrer, http_user_agent, url, rating | outputlookup threatconnect_http_indicators.csv
dispatch.earliest_time = -30d
dispatch.latest_time = now
