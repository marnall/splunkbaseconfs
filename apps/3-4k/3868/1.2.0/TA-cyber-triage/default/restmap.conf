[script:hello-world]
match                 = /TA-cyber-triage-test
script                = test_connection.py
scripttype            = persist
handler               = application.TestConnection
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3

[admin:TA_cyber_triage]
match = /
members = TA_cyber_triage_settings

[admin_external:TA_cyber_triage_settings]
handlertype = python
python.version = python3
handlerfile = TA_cyber_triage_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true