#
# Splunk app configuration file
#

[install]
is_configured = 0

[ui]
is_visible = 1
label = Absolute Data and Device Security (DDS) App for Splunk

[launcher]
author = Absolute Software Corporation
description = The Absolute Data & Device Security (DDS) App enables Splunk users to view the alert events logged in Absolute DDS in a format that enhances readability and analysis. After Splunk indexes the alert events, you can work with the event data using the set of predefined Splunk dashboards included with the app. You can also access the Absolute DDS Device Freeze feature directly from Splunk to freeze at-risk devices.
version = 1.0.4

[package]
id = absolute_data_and_device_security_app
check_for_updates = 1

