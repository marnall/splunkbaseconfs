[vmray_index]
search = index=main

[vmray_event_analysis]
search = eventtype=vmray_index sourcetype=vmray:analysis

[vmray_event_malware_attack]
search = eventtype=vmray_event_analysis analysis_vti_score >= 75

[vmray_event_error]
search = eventtype=vmray_event_analysis analysis_result_code != 1

[vmray_event_success]
search = eventtype=vmray_event_analysis analysis_result_code = 1

[vmray_event_stix]
