[openshift_proc_stat_state]
filename=openshift_proc_stat_state.csv

[openshift_proc_capabilities_lookup]
filename=openshift_proc_capabilities.csv
match_type = WILDCARD(capabilities_flags)

[openshift_stats_fields]
DELIMS = ","
FIELDS = period, proc__stat__cpu_total, proc__stat__cpu_count, proc__stat__uptime_seconds, proc__meminfo__memtotal, proc__meminfo__memfree, proc__meminfo__memavailable, proc__meminfo__swaptotal, proc__meminfo__swapfree, cgroup__blkio__io_service_bytes_recursive__read_total, cgroup__blkio__io_service_bytes_recursive__write_total, cgroup__blkio__io_wait_time_recursive__read_total, cgroup__blkio__io_wait_time_recursive__write_total, cgroup__cpu__shares, cgroup__cpu__cfs_period_us, cgroup__cpu__cfs_quota_us, cgroup__cpu__stat__throttled_time, cgroup__memory__limit_in_bytes, cgroup__memory__stat__rss, cgroup__memory__stat__mapped_file, cgroup__memory__stat__total_rss, cgroup__memory__stat__total_mapped_file, cgroup__cpuact__stat__user, cgroup__cpuact__stat__system

[openshift_stats_fields_v2_host]
DELIMS = ","
FIELDS = cpu_user_percent, cpu_system_percent, cpu_throttled_percent, memory_rss_bytes, memory_mapped_files_bytes, io_read_bytes, io_write_bytes, io_wait_read_percent, io_wait_write_percent, memory_swap_total_bytes, memory_swap_bytes, cpu_count, memory_total_bytes, uptime_sec, cpu_iowait_percent, cpu_idle_percent, cpu_steal_percent

[openshift_stats_fields_v2_cgroup]
DELIMS = ","
FIELDS = cpu_user_percent, cpu_system_percent, cpu_throttled_percent, memory_rss_bytes, memory_mapped_files_bytes, io_read_bytes, io_write_bytes, io_wait_read_percent, io_wait_write_percent, cpu_limit_percent, cpu_request_percent, memory_limit_bytes, memory_request_bytes

[openshift_proc_stats_fields]
DELIMS = ","
FIELDS = period, proc__stat__cpu_total, proc__stat__cpu_count, proc__stat__uptime_seconds, proc__p__uptime_seconds, proc__p__io__rchar, proc__p__io__wchar, proc__p__io__syscr, proc__p__io__syscw, proc__p__io__read_bytes, proc__p__io__write_bytes, proc__p__io__cancelled_write_by, proc__p__oom_score, proc__p__stat__session, proc__p__stat__tty_nr, proc__p__stat__tpgid, proc__p__stat__flags, proc__p__stat__minflt, proc__p__stat__cminflt, proc__p__stat__majflt, proc__p__stat__cmajflt, proc__p__stat__utime, proc__p__stat__stime, proc__p__stat__cutime, proc__p__stat__cstime, proc__p__stat__priority, proc__p__stat__nice, proc__p__stat__num_threads, proc__p__stat__starttime, proc__p__stat__guest_time, proc__p__stat__cguest_time, proc__p__status__uid_effective, proc__p__status__gid_effective, proc__p__status__fdsize, proc__p__status__vmsize, proc__p__status__vmlck, proc__p__status__vmpin, proc__p__status__vmrss, proc__p__status__rssanon, proc__p__status__rssfile, proc__p__status__rssshmem, proc__p__status__vmdata, proc__p__status__vmstk, proc__p__status__vmexe, proc__p__status__vmlib, proc__p__status__vmpte, proc__p__status__vmpmd, proc__p__status__vmswap, proc__p__status__voluntary_ctxt_switches, proc__p__status__nonvoluntary_ctxt_switches

[openshift_proc_stats_fields_v2]
DELIMS = ","
FIELDS = cpu_user_percent, cpu_system_percent, cpu_children_wait_user_percent, cpu_children_wait_system_percent, cpu_guest_percent, cpu_children_guest_percent, uptime_sec, io_rchar, io_wchar, io_syscr, io_syscw, io_read_bytes, io_write_bytes, io_cancelled_write_bytes, oom_score, session, tty_nr, tpgid, flags, minflt, cminflt, majflt, cmajflt, priority, nice, num_threads, uid_effective, gid_effective, fdsize, vmsize, vmlck, vmpin, vmrss, rssanon, rssfile, rssshmem, vmdata, vmstk, vmexe, vmlib, vmpte, vmpmd, vmswap, voluntary_ctxt_switches, nonvoluntary_ctxt_switches

[openshift_net_stats_fields]
DELIMS = ","
FIELDS = period receive_bytes, receive_packets, receive_errs, receive_drop, transmit_bytes, transmit_packets, transmit_errs, transmit_drop

[openshift_net_stats_fields_v2]
DELIMS = ","
FIELDS = receive_bytes, receive_packets, receive_errs, receive_drop, transmit_bytes, transmit_packets, transmit_errs, transmit_drop

[openshift_net_socket_table_fields]
DELIMS = ","
FIELDS = local_address, local_port, remote_address, remote_port, remote_resolved, connections

[openshift_mount_stats_table_fields]
DELIMS = ","
FIELDS = total, free, avail, inodes, inodesFree

[openshift_disk_stats_table_fields]
DELIMS = ","
FIELDS = readsCompletedSuccessfully, readsMerged, sectorsRead, timeSpentReadingMS, writesCompleted, writesMerged, sectorsWritten, timeSpentWritingMS, iosCurrentlyInProgress, timeSpentDoingIOsMS, weightedTimeSpentDoingIOsMS, discardsCompletedSuccessfully, discardsMerged, sectorsDiscarded, timeSpentDiscarding, flushRequestsCompletedSuccessfully, timeSpentFlushing

[openshift_gpu_nvidia_dmon_fields]
DELIMS = ","
FIELDS = gpu_idx, pwr_w, gtemp_c, mtemp_c, sm_percent, mem_percent, enc_percent, dec_percent, jpg_percent, ofa_percent, mclk_mhz, pclk_mhz, pviol_percent, tviol_bool, fb_mb, bar1_mb, ccpm_mb, sbecc_errs, dbecc_errs, pci_errs, rxpci_mbps, txpci_mbps

[openshift_gpu_nvidia_pmon_fields]
DELIMS = ","
FIELDS = gpu_idx, pid, type_c_g, sm_percent, mem_percent, enc_percent, dec_percent, jpg_percent, ofa_percent, fb_mb, ccpm_mb, command_name