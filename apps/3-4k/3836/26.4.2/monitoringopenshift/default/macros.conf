[macro_openshift_base]
definition = ()

[macro_openshift_logs]
definition = (`macro_openshift_base` (sourcetype=openshift_logs OR source=/openshift/logs/*))

# obsolete (use macro_openshift_stats_host and macro_openshift_stats_cgroup instead)
[macro_openshift_stats]
definition = (`macro_openshift_base` sourcetype=openshift_stats*)

[macro_openshift_stats_host]
definition = (`macro_openshift_base` (sourcetype=openshift_stats_v2_host OR (sourcetype=openshift_stats AND source="/")))

[macro_openshift_stats_cgroup]
definition = (`macro_openshift_base` (sourcetype=openshift_stats_v2_cgroup OR (sourcetype=openshift_stats AND NOT source="/")))

[macro_openshift_proc_stats]
definition = (`macro_openshift_base` (sourcetype=openshift_proc_stats OR sourcetype=openshift_proc_stats_v2))

[macro_openshift_net_stats]
definition = (`macro_openshift_base` sourcetype=openshift_net_stats*)

[macro_openshift_net_socket_table]
definition = (`macro_openshift_base` sourcetype=openshift_net_socket_table)

[macro_openshift_host_logs]
definition = (`macro_openshift_base` sourcetype=openshift_host_logs)

[macro_openshift_mount_stats]
definition = (`macro_openshift_base` sourcetype=openshift_mount_stats)

[macro_openshift_disk_stats]
definition = (`macro_openshift_base` sourcetype=openshift_disk_stats)

[macro_openshift_events]
definition = (`macro_openshift_base` sourcetype=openshift_events)

[macro_openshift_objects]
definition = (`macro_openshift_base` sourcetype=openshift_objects)

[macro_openshift_logs_collectord]
definition = (`macro_openshift_logs` source=/openshift/*/collectorforopenshift:*)

[macro_openshift_logs_collectord_license_check]
definition = (`macro_openshift_logs_collectord` license-check)

[macro_openshift_prometheus_metrics]
definition = (`macro_openshift_base` (sourcetype=prometheus OR sourcetype=openshift_prometheus))

[macro_openshift_prometheus_metrics_etcd]
definition = (`macro_openshift_prometheus_metrics` source=etcd)

[macro_openshift_prometheus_metrics_kubelet]
definition = (`macro_openshift_prometheus_metrics` source=kubelet)

[macro_openshift_prometheus_metrics_openshift_api]
definition = (`macro_openshift_prometheus_metrics` source=kubernetes-api)

[macro_openshift_prometheus_metrics_controller]
definition = (`macro_openshift_prometheus_metrics` source=controller)

[macro_openshift_prometheus_metrics_scheduler]
definition = (`macro_openshift_prometheus_metrics` source=scheduler)

[macro_openshift_prometheus_metrics_collectord]
definition = (`macro_openshift_prometheus_metrics` source=collectord:*)

[macro_openshift_audit_logs]
definition = (`macro_openshift_host_logs` source="*/kube-apiserver/audit*.log")

[macro_openshift_proc_capabilities_hex_to_binary(2)]
args = output, input
definition = eval $output$=replace(replace(replace(replace(replace(replace(replace(replace(\
                           replace(replace(replace(replace(replace(replace(replace(replace(\
                           replace(replace(upper($input$),"0","0000"),"1","0001"),"2","0010")\
                           ,"3","0011"),"4","0100"),"5","0101"),"6","0110"),"7","0111"),"8","1000"),\
                           "9","1001"),"A","1010"),"B","1011"),"C","1100"),"D","1101"),"E","1110"),"F"\
                           ,"1111"), "0", "/0"), "1", "/1")
iseval = 0

[macro_openshift_alerts_base]
definition = ()

[macro_openshift_events__dedup]
definition = spath output=event_uid path=object.metadata.uid | stats latest(_raw) as _raw, latest(_time) as _time, latest(host) as host, latest(openshift_cluster_eval) as openshift_cluster_eval by event_uid

[macro_openshift_events__exclude_deleted]
definition = spath output=watch_type path=type | search watch_type!=DELETED

[macro_openshift_events__extract_common]
definition = spath output=event_type path=object.type | spath output=reason path=object.reason | spath output=message path=object.message | spath output=kind path=object.involvedObject.kind | spath output=obj_name path=object.involvedObject.name | spath output=namespace path=object.involvedObject.namespace | spath output=source_component path=object.source.component | spath output=source_host path=object.source.host | spath output=first_seen path=object.firstTimestamp | spath output=last_seen path=object.lastTimestamp | spath output=event_count path=object.count | spath output=event_time path=object.eventTime | spath output=creation_time path=object.metadata.creationTimestamp | spath output=reporting_component path=object.reportingComponent | eval source_component=coalesce(source_component, reporting_component) | eval event_count=coalesce(event_count, "1") | eval first_seen=if(first_seen="null", null(), first_seen) | eval last_seen=if(last_seen="null", null(), last_seen) | eval event_time=if(event_time="null", null(), event_time) | eval first_seen=coalesce(first_seen, event_time, creation_time) | eval last_seen=coalesce(last_seen, event_time, creation_time) | fillnull value="" namespace

[macro_openshift_events__classify]
definition = eval severity=case(reason IN ("OOMKilling","NodeNotReady","NodeHasInsufficientMemory","NodeHasDiskPressure","NodeHasInsufficientPID") OR match(message,"(?i)OOM"), "critical", reason IN ("Evicted","BackOff","CrashLoopBackOff") OR (event_type="Warning" AND match(reason,"^Failed")), "high", event_type="Warning", "warning", 1=1, "info") | eval event_class=case(reason IN ("OOMKilling","Evicted","NodeHasInsufficientMemory","NodeHasDiskPressure","NodeHasInsufficientPID") OR match(message,"(?i)OOM"), "resource", reason IN ("BackOff","CrashLoopBackOff","Unhealthy") OR match(reason,"Image") OR reason="ErrImagePull", "workload", reason IN ("FailedScheduling","Preempting","Unschedulable"), "scheduling", match(reason,"^Node") OR reason IN ("Rebooted","NodeAllocatableEnforced","Starting"), "node", reason IN ("Scheduled","Pulled","Created","Started","Killing","SuccessfulCreate","SuccessfulDelete","ScalingReplicaSet"), "lifecycle", 1=1, "other")