[bamboo]
TRUNCATE = 0
KV_MODE = json
#### Default fields ####
EVAL-id = 'buildResultKey'
EVAL-test_suite_id = 'planResultKey.entityKey.key'
EVAL-build_plan = 'planResultKey.entityKey.key'
EVAL-pass_count = 'successfulTestCount'
EVAL-fail_count = 'failedTestCount'
EVAL-skip_count = 'skippedTestCount'
EVAL-duration = 'buildDuration'
EVAL-quarantined_count = 'quarantinedTestCount'
EVAL-status='buildState'
EVAL-success_rate=if((successfulTestCount+skippedTestCount+failedTestCount+quarantinedTestCount)==0,0,successfulTestCount/(successfulTestCount+skippedTestCount+failedTestCount+quarantinedTestCount))

########################################################################################################################
#
# Potential Custom Extraction
#
# ITSI Continous Delivery Module requires your data has a lifecycle_id field:
#
#  ** lifecycle_id:
#  * An identifier that describes the lifecycle this item is attached to.
#  * This field is depends on your data and your scenario.
#  * Multivalue fields
#  * Could be extracted from release, sprint, branch, feature, build_plan, timerange etc depending on the scenario.
#  * Example:
#       a. EVAL-lifecyle_id = branch                            # i.e "Buttercup/develop"
#       b. REPORT-lifecycle_id = lifecycle_id_from_release      # i.e "Buttercup 6.6"
#       c. REPORT-lifecycle_id = lifecycle_id_from_timerange    # i.e "Plan A from 10-01-2016 to 12-31-2016"
#
########################################################################################################################