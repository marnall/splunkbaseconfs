[macro_kubernetes_base]
definition = ()

[macro_kubernetes_logs]
definition = (`macro_kubernetes_base` (sourcetype=kubernetes_logs OR source=/kubernetes/logs/*))

# obsolete (use macro_kubernetes_stats_host and macro_kubernetes_stats_cgroup instead)
[macro_kubernetes_stats]
definition = (`macro_kubernetes_base` sourcetype=kubernetes_stats*)

[macro_kubernetes_stats_host]
definition = (`macro_kubernetes_base` (sourcetype=kubernetes_stats_v2_host OR (sourcetype=kubernetes_stats AND source="/")))

[macro_kubernetes_stats_cgroup]
definition = (`macro_kubernetes_base` (sourcetype=kubernetes_stats_v2_cgroup OR (sourcetype=kubernetes_stats AND NOT source="/")))

[macro_kubernetes_proc_stats]
definition = (`macro_kubernetes_base` (sourcetype=kubernetes_proc_stats OR sourcetype=kubernetes_proc_stats_v2))

[macro_kubernetes_net_stats]
definition = (`macro_kubernetes_base` sourcetype=kubernetes_net_stats*)

[macro_kubernetes_net_socket_table]
definition = (`macro_kubernetes_base` sourcetype=kubernetes_net_socket_table)

[macro_kubernetes_mount_stats]
definition = (`macro_kubernetes_base` sourcetype=kubernetes_mount_stats)

[macro_kubernetes_disk_stats]
definition = (`macro_kubernetes_base` sourcetype=kubernetes_disk_stats)

[macro_kubernetes_host_logs]
definition = (`macro_kubernetes_base` sourcetype=kubernetes_host_logs)

[macro_kubernetes_events]
definition = (`macro_kubernetes_base` sourcetype=kubernetes_events)

[macro_kubernetes_objects]
definition = (`macro_kubernetes_base` sourcetype=kubernetes_objects)

[macro_kubernetes_host_logs_kubelet]
definition = (`macro_kubernetes_host_logs` AND (syslog_component::kubelet* OR source="*/kubelet.log*"))

[macro_kubernetes_logs_collectord]
definition = (`macro_kubernetes_logs` source=/kubernetes/*/collectorforkubernetes:*)

[macro_kubernetes_logs_collectord_license_check]
definition = (`macro_kubernetes_logs_collectord` license-check)

[macro_kubernetes_prometheus_metrics]
definition = (`macro_kubernetes_base` (sourcetype=prometheus OR sourcetype=kubernetes_prometheus))

[macro_kubernetes_prometheus_metrics_etcd]
definition = (`macro_kubernetes_prometheus_metrics` source=etcd)

[macro_kubernetes_prometheus_metrics_scheduler]
definition = (`macro_kubernetes_prometheus_metrics` source=scheduler)

[macro_kubernetes_prometheus_metrics_controller_manager]
definition = (`macro_kubernetes_prometheus_metrics` source=controller-manager)

[macro_kubernetes_prometheus_metrics_kubelet]
definition = (`macro_kubernetes_prometheus_metrics` source=kubelet)

[macro_kubernetes_prometheus_metrics_kubernetes_api]
definition = (`macro_kubernetes_prometheus_metrics` source=kubernetes-api)

[macro_kubernetes_prometheus_metrics_coredns]
definition = (`macro_kubernetes_prometheus_metrics` source=coredns)

[macro_kubernetes_prometheus_metrics_collectord]
definition = (`macro_kubernetes_prometheus_metrics` source=collectord:*)

[macro_kubernetes_audit_logs]
definition = (`macro_kubernetes_logs` OR `macro_kubernetes_host_logs`) "audit.k8s.io"

[macro_kubernetes_proc_capabilities_hex_to_binary(2)]
args = output, input
definition = eval $output$=replace(replace(replace(replace(replace(replace(replace(replace(\
                           replace(replace(replace(replace(replace(replace(replace(replace(\
                           replace(replace(upper($input$),"0","0000"),"1","0001"),"2","0010")\
                           ,"3","0011"),"4","0100"),"5","0101"),"6","0110"),"7","0111"),"8","1000"),\
                           "9","1001"),"A","1010"),"B","1011"),"C","1100"),"D","1101"),"E","1110"),"F"\
                           ,"1111"), "0", "/0"), "1", "/1")
iseval = 0

[macro_kubernetes_alerts_base]
definition = ()