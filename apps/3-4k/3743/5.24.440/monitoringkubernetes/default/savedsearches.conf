[Monitoring Kubernetes: Cluster Warning: Node Condition]
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 1h
alert.track = 1
counttype = number of events
cron_schedule = 3-59/5 * * * *
description = API Server reports node conditions
dispatch.earliest_time = -7m@m
dispatch.latest_time = -2m@m
display.page.search.mode = fast
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = monitoringkubernetes
request.ui_dispatch_view = search
search =  `macro_kubernetes_objects` source="/kubernetes//v1/node" \
    | spath output=uid path=object.metadata.uid \
    | stats latest(_raw) as _raw, latest(_time) as _time by uid, kubernetes_cluster \
    | spath path=object.metadata.name output=Node \
    | spath path=object.status.conditions{} output=Conditions \
    | mvexpand Conditions \
    | spath input=Conditions path=type output=ConditionType \
    | spath input=Conditions path=status output=ConditionStatus \
    | spath input=Conditions path=message output=ConditionMessage \
    | spath input=Conditions path=lastHeartbeatTime output=_time \
    | eval Cluster=kubernetes_cluster \
    | search (ConditionType=*Pressure AND ConditionStatus=True) OR (ConditionType=Ready AND ConditionStatus=False) \
    | table _time Cluster Node ConditionType ConditionStatus ConditionMessage