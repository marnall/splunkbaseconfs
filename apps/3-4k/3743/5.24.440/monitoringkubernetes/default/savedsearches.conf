[Monitoring Kubernetes: Events: Constant Warning]
alert.severity = 3
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 4-59/5 * * * *
description = Cluster reports the same warnings more than 3 times
dispatch.earliest_time = -7m@m
dispatch.latest_time = -2m@m
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = bar
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = monitoringkubernetes
request.ui_dispatch_view = search
search = `macro_kubernetes_events` `macro_kubernetes_alerts_base` |\
    spath path=object.type output=Type | search Type=Warning |\
    spath output=uid path=object.metadata.uid |\
    stats latest(_raw) as _raw, latest(_time) as _time, latest(kubernetes_cluster_eval) as kubernetes_cluster_eval by uid |\
    spath path=type output=Type |\
    search Type=ADDED |\
    spath path=object.count output=Count |\
    eval Count=coalesce(Count, "1") |\
    search Count>3 |\
    spath path=object.lastTimestamp output=LastSeen |\
    spath path=object.message output=Message |\
    spath path=object.reportingComponent output=ReportingComponent |\
    spath path=object.eventTime output=EventTime |\
    eval Source=coalesce(Source, ReportingComponent) |\
    eval LastSeen=if(LastSeen=="null", EventTime, LastSeen) |\
    eval FirstSeen=if(FirstSeen=="null", EventTime, FirstSeen) |\
    table kubernetes_cluster_eval, LastSeen, Count, Message | sort -LastSeen

