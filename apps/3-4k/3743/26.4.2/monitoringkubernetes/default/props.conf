# nginx ingress controller (before 0.9.0)
[source::/kubernetes/*/*/gcr.io/google_containers/nginx-ingress-controller:*/*/*]
EXTRACT-nginx-ingress-controller-http = ^(?P<remote_addr>[^ ]+)\s+\-\s+\[(?P<proxy_add_x_forwarded_for>[^\]]+)\]\s+\-\s+(?P<remote_user>[^ ]+)\s+\[(?P<time_local>[^\]]+)[^"\n]*"(?P<request>[^"]+)"\s+(?P<status>\d+)\s+(?P<body_bytes_sent>\d+)\s+"(?P<http_referer>[^"]+)"\s+"(?P<http_user_agent>[^"]+)"\s+(?P<request_length>\d+)\s+(?P<request_time>[^ ]+)\s+\[(?P<proxy_upstream_name>[^\]]+)]\s+(?P<upstream_addr>[^\s]+)\s+(?P<upstream_response_length>\d+)\s+(?P<upstream_response_time>[^\s]+)\s+(?P<upstream_status>\d+)$

# default images of nginx controller since 0.9.0
[source::/kubernetes/*/*/quay.io/kubernetes-ingress-controller/nginx-ingress-controller:*/*/*.stdout]
EXTRACT-nginx-ingress-controller-http = ^(?P<remote_addr>[^ ]+)\s+\-\s+\[(?P<proxy_add_x_forwarded_for>[^\]]+)\]\s+\-\s+(?P<remote_user>[^ ]+)\s+\[(?P<time_local>[^\]]+)[^"\n]*"(?P<request>[^"]+)"\s+(?P<status>\d+)\s+(?P<body_bytes_sent>\d+)\s+"(?P<http_referer>[^"]+)"\s+"(?P<http_user_agent>[^"]+)"\s+(?P<request_length>\d+)\s+(?P<request_time>[^ ]+)\s+\[(?P<proxy_upstream_name>[^\]]+)]\s+(?P<upstream_addr>[^\s]+)\s+(?P<upstream_response_length>\d+)\s+(?P<upstream_response_time>[^\s]+)\s+(?P<upstream_status>\d+)$

# etcd
[source::/kubernetes/*/*/gcr.io/google_containers/etcd-*/*/*]
EXTRACT-etcd-1 = ^(?P<time>\d{4}\-\d{2}\-\d{2}\s\d{2}:\d{2}:\d{2}\.\d{6})\s+(?P<log_level>\w+)\s+\|\s+(?P<component>\w+):\s+(?P<message>.+)$

# kube-proxy
[source::/kubernetes/*/*/gcr.io/google_containers/kube-proxy-*/*/*]
EXTRACT-kube-proxy-1 = ^(?P<log_level>[IWEF])(?P<time>\d{4} \d{2}:\d{2}:\d{2}\.\d{6})\s+\d+\s+(?P<component>[\w_\.]+:\d+)\]\s+(?P<message>.+)$

# kube-scheduler
[source::/kubernetes/*/*/gcr.io/google_containers/kube-scheduler-*/*/*]
EXTRACT-kube-scheduler-1 = ^(?P<log_level>[IWEF])(?P<time>\d{4} \d{2}:\d{2}:\d{2}\.\d{6})\s+\d+\s+(?P<component>[\w_\.]+:\d+)\]\s+(?P<message>.+)$
EXTRACT-kube-scheduler-event = ^(?P<log_level>[IWEF])(?P<time>\d+ \d+:\d+:\d+\.\d+)\s+\d+\s+(?P<component>[\w_\.]+:\d+)\] Event\(v1.ObjectReference{Kind:"(?P<event_obj_ref_kind>[^"]*)", Namespace:"(?P<event_obj_ref_namespace>[^"]*)", Name:"(?P<event_obj_ref_name>[^"]*)", UID:"(?P<event_obj_ref_uid>[^"]*)", APIVersion:"(?P<event_obj_ref_apiversion>[^"]*)", ResourceVersion:"(?P<event_obj_ref_resourceversion>[^"]*)", FieldPath:"(?P<event_obj_ref_fieldpath>[^"]*)"}\): type: '(?P<event_type>[^']+)' reason: '(?P<event_reason>[^']+)'\s+(?P<event_message>.+)$

# kube-controller-manager
[source::/kubernetes/*/*/gcr.io/google_containers/kube-controller-manager-*/*/*]
EXTRACT-kube-controller-manager-1 = ^(?P<log_level>[IWEF])(?P<time>\d{4} \d{2}:\d{2}:\d{2}\.\d{6})\s+\d+\s+(?P<component>[\w_\.]+:\d+)\]\s+(?P<message>.+)$
EXTRACT-kube-controller-manager-event = ^(?P<log_level>[IWEF])(?P<time>\d+ \d+:\d+:\d+\.\d+)\s+\d+\s+(?P<component>[\w_\.]+:\d+)\] Event\(v1.ObjectReference{Kind:"(?P<event_obj_ref_kind>[^"]*)", Namespace:"(?P<event_obj_ref_namespace>[^"]*)", Name:"(?P<event_obj_ref_name>[^"]*)", UID:"(?P<event_obj_ref_uid>[^"]*)", APIVersion:"(?P<event_obj_ref_apiversion>[^"]*)", ResourceVersion:"(?P<event_obj_ref_resourceversion>[^"]*)", FieldPath:"(?P<event_obj_ref_fieldpath>[^"]*)"}\): type: '(?P<event_type>[^']+)' reason: '(?P<event_reason>[^']+)'\s+(?P<event_message>.+)$

# k8s-dns-dnsmasq
[source::/kubernetes/*/*/gcr.io/google_containers/k8s-dns-dnsmasq-nanny-*/*/*]
EXTRACT-k8s-dns-dnsmasq-1 = ^(?P<log_level>[IWEF])(?P<time>\d{4} \d{2}:\d{2}:\d{2}\.\d{6})\s+\d+\s+(?P<component>[\w_\.]+:\d+)\]\s+(?P<message>.+)$

# k8s-dns-kube-dns
[source::/kubernetes/*/*/gcr.io/google_containers/k8s-dns-kube-dns-*/*/*]
EXTRACT-k8s-dns-kube-dns-1 = ^(?P<log_level>[IWEF])(?P<time>\d{4} \d{2}:\d{2}:\d{2}\.\d{6})\s+\d+\s+(?P<component>[\w_\.]+:\d+)\]\s+(?P<message>.+)$

# k8s-dns-sidecar
[source::/kubernetes/*/*/gcr.io/google_containers/k8s-dns-sidecar-*/*/*]
EXTRACT-k8s-dns-sidecar-1 = ^(?P<log_level>[IWEF])(?P<time>\d{4} \d{2}:\d{2}:\d{2}\.\d{6})\s+\d+\s+(?P<component>[\w_\.]+:\d+)\]\s+(?P<message>.+)$

# kube-apiserver
[source::/kubernetes/*/*/gcr.io/google_containers/kube-apiserver-*/*/*]
EXTRACT-kube-apiserver-1 = ^(?P<log_level>[IWEF])(?P<time>\d{4} \d{2}:\d{2}:\d{2}\.\d{6})\s+\d+\s+(?P<component>[\w_\.]+:\d+)\]\s+(?P<message>.+)$

# collector
[source::/kubernetes/.../collectorforkubernetes:*/*/*.stdout]
EXTRACT-license-check = ^INFO .*license_check_pipe.go:\d+:\slicense-check\s(?<product>[^\s]+)\s(?<license_id>[^\s]+)?\s(?<limit>[^\s]+)\s(?<expiration>[^\s]+)\s(?<instance_id>[^\s]+)\s(?<created_at>[^\s]+)\s(?<started_at>[^\s]+)\s(?<version>[^\s]+)\s(?<build_date>[^\s]+)\s(?<valid>[^\s]+)\s(?<check_success>[^\s]+)\s(?<err_points>[^\s]+)(\sc(?<lUnits>\d+)\st(?<lType>\d+))?\s(?<message>.*)$
EVAL-version_major = mvindex(split(version, "."), 0, 0)
EVAL-version_minor = mvindex(split(version, "."), 1, 1)

# nvidia gpu
[kubernetes_gpu_nvidia_pmon]
SEGMENTATION = none
REPORT-extract_kubernetes_gpu_nvidia_pmon = kubernetes_gpu_nvidia_pmon_fields

[kubernetes_gpu_nvidia_dmon]
SEGMENTATION = none
REPORT-extract_kubernetes_gpu_nvidia_dmon = kubernetes_gpu_nvidia_dmon_fields
