[default]

[event-family-name-search]
definition = eventtype="hl7_v2_messages" | fields * | stats count by family_name | fields family_name | sort family_name
iseval = 0

[event-patient-id-search]
definition = eventtype="hl7_v2_messages" | fields * | stats count by patient_id | fields patient_id | sort patient_id
iseval = 0

[hl7-v2-events-search(2)]
definition = eventtype="hl7_v2_messages" ($patient_id$) AND ($family_name$) | fields * 
iseval = 0
args = family_name,patient_id
