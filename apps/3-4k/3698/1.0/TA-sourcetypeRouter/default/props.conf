[mySourcetype]
SHOULD_LINEMERGE=false
NO_BINARY_CHECK=true
TIME_PREFIX =\"timestamp\":\"
TRANSFORMS-sourcetye_routing = mySourcetype_basic_sourcetype, mySourcetype_json_sourcetype
  
[mySourcetype:basic]
TIME_FORMAT = %s
TIME_PREFIX = ^
LINE_BREAKER = ([\r\n]+)
   
[mySourcetype:json]
TIME_FORMAT = %s
TIME_PREFIX = \"timestamp\":\"
INDEXED_EXTRACTIONS = JSON