[ui]
is_visible=false
label="Sourcetype Router Add-on for Splunk"

[install]
state = enabled

[launcher]
author="Todd Waller todwaller@gmail.com"
description="Monitors the logs file in /var/log/thislog.log which is a placeholder for any file you want, change as needed. The routing comes from the transforms, simply just update the REGEX's as needed. I set this up originally to handle many types of data, it specificaclly sets sourcetype for json data to :json and all other data to :basic. Feel free to adjust it to suit your needs."
version=1.0

[package]
id=TA-sourcetypeRouter
