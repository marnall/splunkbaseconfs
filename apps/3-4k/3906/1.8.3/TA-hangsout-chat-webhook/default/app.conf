# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 9

[launcher]
author = Allan Edwards
version = 1.8.3
description = This app allows you to easily configure adaptive response alert actions in Splunk ES that trigger webhook alerts for Google  Chat channels. You configure the webhook in the channel and then use that URL in Splunk when configuring the alert.

[ui]
is_visible = 0
label = Webhook Alerts for Google Chat
docs_section_override = AddOns:released

[package]
id = TA-hangsout-chat-webhook

[triggers]
reload.addon_builder = simple
reload.ta_hangsout_chat_webhook_account = simple
reload.ta_hangsout_chat_webhook_settings = simple
reload.passwords = simple

