[dnsdb_ar_action]
python.version=python3
is_custom = 1
label = DNSDB Lookup
description = Query the DNSDB API. 
icon_path = appIcon.png
payload_format = json
command = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.action_name=$action_name$ | stats count

# Default values
param._cam = {\
    "category": ["Information Gathering"],\
    "task": ["scan"],\
    "subject": ["splunk.event"],\
    "technology": [{"vendor": "Farsight", "product": "DNSDB", "version": "2"}],\
    "supports_adhoc": true,\
    "field_name_params": ["param.ip_field"],\
    "required_params":   ["param.ip_field"]\
}
param.target_field =
param.target_type =
param.query_type = 
param.rrtype = 
param.bailiwick = 
param.time_first_before = 
param.time_first_after = 
param.time_last_before = 
param.time_last_after = 
