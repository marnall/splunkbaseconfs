[Alert - DNSDB Query Quota Low]
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
alert_condition = search percent < .20
auto_summarize.dispatch.earliest_time = -1d@h
counttype = custom
cron_schedule = */15 * * * *
description = You've used over 80% of your allotted DNSDB queries for today.
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = |dnsdblimit | eval percent=(remaining/limit)
disabled = 1

[DNSDB Cache Cleanup]
counttype = custom
cron_schedule = 0 0 * * *
description = Clears all cached responses that are over a day old
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = | flushcache
disabled = 0
