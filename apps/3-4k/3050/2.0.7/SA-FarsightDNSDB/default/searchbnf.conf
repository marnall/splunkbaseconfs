[dnsdb-command]
syntax = dnsdb target=<ip/hostname> type=<rdata/rrset/raw> rrtype=<a/aaa/cname/etc> [time_first_before=time] [time_first_after=time] [time_last_before=time] [time_last_after=time] [target_type=auto/ip/name] [bailiwick=bailiwick]
description = Runs a DNSDB query against the given IP or hostname. RRType, earliest, and latest can be included optionally to filter results.
shortdesc = Runs a DNSDB query against the given IP or hostname.
example1 = | dnsdb target=198.51.100.1 type="rdata"
example2 = | dnsdb target="example.com" type="rrset" latest=1446000216
example3 = | dnsdb target="google.com" type="rdata" rrtpe="cname" earliest=1446000216 
usage = public

[dnsdblimit-command]
syntax =  dnsdblimit
description = Returns the DNSDB API query limit, number of queries remaining, as well as the time the remaining queries will reset.
shortdesc = Returns the DNSDB API query limit, number of queries remaining, as well as the time the remaining queries will reset.
example1 = | dnsdblimit
usage = public

[dnsdbflex-command]
syntax = dnsdbflex query_type=<rdata|rrnames> match_type=<glob|regex> query=<glob or regex pattern> [rrtype=**A/MX/CNAME/etc] [bailiwick=bailiwick] [time_first_before=time] [time_first_after=time] [time_last_before=time] [time_last_after=time]
shortdesc = Runs a search against the Farsight Flex API.
example1 = | dnsdbflex match_type="regex" type="rdata" query="farsight" 
usage = public
