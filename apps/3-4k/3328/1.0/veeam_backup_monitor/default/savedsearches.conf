request.ui_dispatch_app = veeam_backup_monitor
request.ui_dispatch_view = search
search = index=veeammon sourcetype=JOBDETST BackupStatus = "Failed"|dedup JobID | join type=left JobID [search sourcetype=JOBTSKST Status="Failed" | rename JobSessId as JobID | dedup JobID ] |fields JobName, BackupStatus,JobType, JobKickOffTime, Reason| stats list by JobName| rename list(BackupStatus) as "Backup Status", list(JobType) as "Job Type", list(JobKickOffTime) as "Job Start" list(Reason) as "Reason"

