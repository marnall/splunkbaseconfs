[BackupTxfr_24HOV]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
alert.track = 0
description = Data transferred past 24 hours. Overview
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatchAs = user
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = veeam_backup_monitor
request.ui_dispatch_view = search
search = index=veeammon  sourcetype=JOBDETST | dedup JobID | fields JobName, TransferedGB | sort -TransferedGB  | stats Avg(TransferedGB) AS "Transfered GB"

[BackupDuration_24H_OV]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
alert.track = 0
description = Backup Duration past 24 hours, overview dashboard
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatchAs = user
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = veeam_backup_monitor
request.ui_dispatch_view = search
search = index=veeammon sourcetype=JOBDETST | dedup JobID | fields JobName, Duration |  rex field=Duration "(?<durationHours>\d+):(?<durationMinutes>\d+):(?<durationSeconds>.*)" | eval Duration=durationSeconds + 60 * (durationMinutes + 60 * (durationHours)) | stats avg(Duration) AS AVERAGE_DURATION | eval AVERAGE_DURATION=replace(AVERAGE_DURATION,"(\..+$)","") |fieldformat AVERAGE_DURATION = tostring(AVERAGE_DURATION, "Duration")

[BackupRepo_24H_OV]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
alert.track = 0
description = Backup Repo Space 24 hours
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatchAs = user
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = veeam_backup_monitor
request.ui_dispatch_view = search
search = index=veeammon sourcetype=BKPRPST | dedup Id | fields Name, Path, FreeSpace, TotalSpace | eval UsedSpace = (TotalSpace - FreeSpace) | eval PercentUsed = ((UsedSpace / TotalSpace) * 100) |stats list by Name| rename list(Name) as "Name", list(Path) as "File Path", list(PercentUsed) as "Percent Used" | fields- list(FreeSpace), list(Space),list(TotalSpace),list(UsedSpace) | sort-  "Percent Used"

[BackupStatus_24H_OV]
