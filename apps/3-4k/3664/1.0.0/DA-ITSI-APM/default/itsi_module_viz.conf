[DA-ITSI-APM-Application_Entity_View]
tabs = overview,application,end_user_experience,errors,events

overview.control_token = control_overview
overview.title = Overview
overview.row.0 = DA-ITSI-APM:application_apdex_score_gauge_chart,DA-ITSI-APM:end_user_apdex_score_gauge_chart
overview.row.1 = DA-ITSI-APM:application_availability_column_chart,DA-ITSI-APM:application_health_column_chart
overview.row.2 = DA-ITSI-APM:application_response_time_and_end_user_response_time_chart
overview.extendable_tab = false

application.control_token = control_application
application.title = Application
application.row.0 = DA-ITSI-APM:application_response_time_and_requests_per_minute_chart
application.row.1 = DA-ITSI-APM:application_apdex_score_line_chart,DA-ITSI-APM:application_error_rate_chart
application.row.2 = DA-ITSI-APM:application_memory_usage_chart
application.row.3 = DA-ITSI-APM:application_response_time_histogram
application.extendable_tab = false

end_user_experience.control_token = control_end_user_experience
end_user_experience.title = End User Experience
end_user_experience.row.0 = DA-ITSI-APM:end_user_response_time_and_requests_per_minute_chart
end_user_experience.row.1 = DA-ITSI-APM:end_user_apdex_score_line_chart
end_user_experience.row.2 = DA-ITSI-APM:end_user_response_time_histogram
end_user_experience.extendable_tab = false


events.control_token = control_events
events.title = Application Events
events.row.0 = DA-ITSI-APM:all_events
events.extendable_tab = false

errors.control_token = control_errors
errors.title = Application Errors
errors.row.0 = DA-ITSI-APM:application_error_table
errors.extendable_tab = false

entity_search_filter = [\
    {\
        "rule_condition": "AND", \
        "rule_items": [\
            {\
                "field": "app_title", \
                "field_type": "alias", \
                "rule_type": "not", \
                "value": ""\
            }, \
            {\
                "field": "itsi_role", \
                "field_type": "info", \
                "rule_type": "matches", \
                "value": "apm"\
            }, \
            {\
                "field": "type", \
                "field_type": "info", \
                "rule_type": "matches", \
                "value": "application"\
            }\
        ]\
    }\
]

requested_entity_tokens = app_title
