[reposify-command]
syntax = reposify filters=KEY1:VALUE1[+KEY2:VALUE2+...] banner=BANNER_STRING [page=<int> token=TOKEN]
shortdesc = Query https://api.reposify.com.
description =  Query https://api.reposify.com. This is a "generating" command.
example1 = | reposify filters=os:linux+port:80 banner=welcome
comment1 = Queries https://api.reposify.com for devices with a Linux OS.\
    and a banner with the string "welcome" in them.
usage = public
tags = reposify
