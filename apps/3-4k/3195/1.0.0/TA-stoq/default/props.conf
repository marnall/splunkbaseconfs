#   Version 6.4.0
# exif  peinfo  smtp  trid  yara


[stoq:exif]
TIME_PREFIX = \"date\"\s*:\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
MAX_TIMESTAMP_LOOKAHEAD = 30
LINE_BREAKER = ((*FAIL))
KV_MODE = json
TRUNCATE = 99999999
SHOULD_LINEMERGE = false

[stoq:peinfo]
TIME_PREFIX = \"date\"\s*:\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
MAX_TIMESTAMP_LOOKAHEAD = 30
LINE_BREAKER = ((*FAIL))
KV_MODE = json
TRUNCATE = 99999999
SHOULD_LINEMERGE = false
FIELDALIAS-size = "results{}.size" AS file_size
FIELDALIAS-peinfo = 'results{}.md5' AS file_hash

[stoq:smtp]
TIME_PREFIX = \"date\"\s*:\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
MAX_TIMESTAMP_LOOKAHEAD = 30
LINE_BREAKER = ((*FAIL))
KV_MODE = json
TRUNCATE = 99999999
SHOULD_LINEMERGE = false 

[stoq:clamav]
TIME_PREFIX = \"date\"\s*:\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
MAX_TIMESTAMP_LOOKAHEAD = 30
LINE_BREAKER = ((*FAIL))
KV_MODE = json
TRUNCATE = 99999999
SHOULD_LINEMERGE = false 

[stoq:trid]
TIME_PREFIX = \"date\"\s*:\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
MAX_TIMESTAMP_LOOKAHEAD = 30
LINE_BREAKER = ((*FAIL))
KV_MODE = json
TRUNCATE = 99999999
SHOULD_LINEMERGE = false

[stoq:vtmis]
TIME_PREFIX = \"date\"\s*:\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
MAX_TIMESTAMP_LOOKAHEAD = 30
LINE_BREAKER = ((*FAIL))
KV_MODE = json
TRUNCATE = 99999999
SHOULD_LINEMERGE = false
FIELDALIAS-MD5vtmisfilehash = "results{}.scan.md5" AS file_hash
FIELDALIAS-MD5vtmis = "results{}.scan.md5" AS md5
FIELDALIAS-sha1vtmis = "results{}.scan.sha1" AS sha1
FIELDALIAS-sha256vtmis = "results{}.scan.sha256" AS sha256
FIELDALIAS-sha512vtmis = "results{}.scan.sha512" AS sha512

[stoq:totalhash]
TIME_PREFIX = \"date\"\s*:\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
MAX_TIMESTAMP_LOOKAHEAD = 30
LINE_BREAKER = ((*FAIL))
KV_MODE = json
TRUNCATE = 99999999
SHOULD_LINEMERGE = false

[stoq:signatures:yara]
DATETIME_CONFIG = current
LINE_BREAKER = ((}))
EXTRACT-rule = ^rule (?P<rule>[^\{]+)
TRUNCATE = 99999999
SHOULD_LINEMERGE = false

[stoq:yara]
TIME_PREFIX = \"date\"\s*:\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
MAX_TIMESTAMP_LOOKAHEAD = 30
LINE_BREAKER = ((*FAIL))
KV_MODE = json
TRUNCATE = 99999999
SHOULD_LINEMERGE = false
FIELDALIAS-yararule = "results{}.scan{}.rule" AS rule
FIELDALIAS-yarastrings = "results{}.scan{}.strings{}{}" AS strings
FIELDALIAS-yaratags = "results{}.scan{}.tags{}{}" AS yara_tags
FIELDALIAS-yaradescription = "results{}.scan{}.meta.description" AS yara_description
FIELDALIAS-yaraauthor = "results{}.scan{}.meta.author" AS yara_author


[source::/usr/local/stoq/results/*]
FIELDALIAS-MD5filehash = "results{}.md5" AS file_hash
FIELDALIAS-MD5 = "results{}.md5" AS md5
FIELDALIAS-sha1 = "results{}.sha1" AS sha1
FIELDALIAS-sha256 = "results{}.sha256" AS sha256
FIELDALIAS-sha512 = "results{}.sha512" AS sha512
FIELDALIAS-filename = "results{}.filename" AS file_name
FIELDALIAS-uuid = "results{}.uuid" AS uuid
FIELDALIAS-puuid = "results{}.puuid" AS puuid
FIELDALIAS-plugin = "results{}.plugin" AS plugin
