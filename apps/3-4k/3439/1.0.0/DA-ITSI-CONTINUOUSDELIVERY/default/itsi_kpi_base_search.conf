[DA-ITSI-CONTINUOUSDELIVERY-Project_Management]
alert_lag = 30
alert_period = 1
base_search = | inputlookup kv_project_management\
| mvexpand lifecycle_id \
| eventstats sum(planned_effort) AS total_effort BY lifecycle_id \
| eval is_critical=if(priority="Critical" AND status!="Closed", 1, 0) \
| eval planned_effort=if(isnull(planned_effort) OR planned_effort="null", 0, planned_effort) \
| eval scoped_effort=if(planned_effort=0, 0, 100) \
| eval inprogress_effort=if(status!="Closed", planned_effort, 0) \
| eval percent_inprogress_effort=round((inprogress_effort/total_effort)*100, 2) \
| eval time_started_work= if(isnotnull(time_started_work), round(strptime(time_started_work,"%Y-%m-%dT%H:%M:%S")), null()) \
| eval time_closed= if(isnotnull(time_closed), round(strptime(time_closed,"%Y-%m-%dT%H:%M:%S")), null()) \
| eval time_resolved = if(isnotnull(time_resolved), round(strptime(time_resolved,"%Y-%m-%dT%H:%M:%S")), null()) \
| eval resolved_duration = if(isnotnull(time_resolved) AND isnotnull(time_started_work), round((time_resolved - time_started_work)/3600, 2), null()) \
| eval tested_duration = if(isnotnull(time_resolved) AND isnotnull(time_closed), round((time_closed - time_resolved)/3600, 2), null())\
| eval completion_duration = if(isnotnull(time_started_work) AND isnotnull(time_closed), round((time_closed - time_started_work)/3600, 2), null()) \
| eventstats count(eval(status="New" OR status="Untriaged" OR status="To Do")) AS income_dev_count, count(eval(status="Closed" OR status="Resolved" OR status="Done")) AS outcome_dev_count  BY lifecycle_id \
| eval io_dev_ratio=round(income_dev_count/outcome_dev_count, 2)\
| eventstats count(eval(status="Resolved")) AS income_qa_count, count(eval(status="Closed" OR status="Done")) AS outcome_qa_count BY lifecycle_id \
| eval io_qa_ratio=round(income_qa_count/outcome_qa_count, 2)
entity_alias_filtering_fields = pm_lifecycle_id
entity_id_fields = lifecycle_id
is_entity_breakdown = True
is_service_entity_filter = True
metrics = [\
    {\
        "_key": "critical_issues", \
        "aggregate_statop": "sum", \
        "entity_statop": "sum", \
        "threshold_field": "is_critical", \
        "title": "Critical Issues", \
        "unit": ""\
    }, \
    {\
        "_key": "inprogress_effort", \
        "aggregate_statop": "sum", \
        "entity_statop": "sum", \
        "threshold_field": "inprogress_effort", \
        "title": "Effort In Progress", \
        "unit": ""\
    }, \
    {\
        "_key": "io_dev_ratio", \
        "aggregate_statop": "max", \
        "entity_statop": "max", \
        "threshold_field": "io_dev_ratio", \
        "title": "Incoming/Outgoing Resolution Ratio", \
        "unit": ""\
    }, \
    {\
        "_key": "io_qa_ratio", \
        "aggregate_statop": "max", \
        "entity_statop": "max", \
        "threshold_field": "io_qa_ratio", \
        "title": "Incoming/Outgoing Closing Ratio", \
        "unit": ""\
    }, \
    {\
        "_key": "mean_time_completion", \
        "aggregate_statop": "avg", \
        "entity_statop": "avg", \
        "threshold_field": "completion_duration", \
        "title": "Mean Time To Completion", \
        "unit": "hrs"\
    }, \
    {\
        "_key": "mean_time_to_closed", \
        "aggregate_statop": "avg", \
        "entity_statop": "avg", \
        "threshold_field": "tested_duration", \
        "title": "Mean Time To Closed", \
        "unit": "hrs"\
    }, \
    {\
        "_key": "mean_time_to_resolve", \
        "aggregate_statop": "avg", \
        "entity_statop": "avg", \
        "threshold_field": "resolved_duration", \
        "title": "Mean Time To Resolved", \
        "unit": "hrs"\
    }, \
    {\
        "_key": "percent_inprogress_effort", \
        "aggregate_statop": "sum", \
        "entity_statop": "sum", \
        "threshold_field": "percent_inprogress_effort", \
        "title": "In Progress Effort Percentage", \
        "unit": "%"\
    }, \
    {\
        "_key": "scoped_effort", \
        "aggregate_statop": "avg", \
        "entity_statop": "avg", \
        "threshold_field": "scoped_effort", \
        "title": "Efforts Scoped", \
        "unit": "%"\
    }, \
    {\
        "_key": "total_effort", \
        "aggregate_statop": "avg", \
        "entity_statop": "avg", \
        "threshold_field": "total_effort", \
        "title": "Total Efforts", \
        "unit": ""\
    }\
]
search_alert_earliest = 5
source_itsi_da = DA-ITSI-CONTINUOUSDELIVERY
title = DA-ITSI-CONTINUOUSDELIVERY:Project_Management

[DA-ITSI-CONTINUOUSDELIVERY-Build_System]
alert_lag = 30
alert_period = 1
base_search = | inputlookup kv_build_system\
| mvexpand lifecycle_id\
| eval success_rate=if(status=="Successful" OR status="SUCCESS", 100, 0), avg_duration=duration/(1000 * 60)
entity_alias_filtering_fields = build_lifecycle_id
entity_id_fields = lifecycle_id
is_entity_breakdown = True
is_service_entity_filter = True
metrics = [\
    {\
        "_key": "avg_duration", \
        "aggregate_statop": "avg", \
        "entity_statop": "avg", \
        "threshold_field": "avg_duration", \
        "title": "Average Build Duration", \
        "unit": "mins"\
    }, \
    {\
        "_key": "success_rate", \
        "aggregate_statop": "avg", \
        "entity_statop": "avg", \
        "threshold_field": "success_rate", \
        "title": "Average Build Sucess Rate", \
        "unit": "%"\
    }\
]
search_alert_earliest = 5
source_itsi_da = DA-ITSI-CONTINUOUSDELIVERY
title = DA-ITSI-CONTINUOUSDELIVERY:Build_System

