[ui]
is_visible = 1
label = Kaspersky Threat Intelligence Portal for Splunk

[launcher]
version = 1.1
author = KasperskyLab
description = Kaspersky Threat Intelligence Portal for Splunk provides the fastest and easiest way to get threat intelligence from Kaspersky Threat Intelligence Portal about indicators in events stored in Splunk. Kaspersky Threat Portal delivers all the knowledge acquired by Kaspersky Lab about cyber-threats, legitimate objects and their relationships, brought together into a single, powerful web service. The goal is to provide your security teams with as much data as possible, preventing cyber-attacks before they impact your organization. The platform retrieves the latest detailed threat intelligence and actionable context about URLs, domains, IP addresses, file hashes, threat names, statistical/behavior data, WHOIS/DNS data, etc. The result is global visibility of new and emerging threats, helping you secure your organization and boosting incident response.

[package]
id = Kaspersky-Threat-Intelligence-Portal-for-Splunk
check_for_updates = 1

