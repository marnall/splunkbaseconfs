
[reports]
display.prefs.aclFilter = owner

[search]
display.events.fields = ["BulkOpsAction","Failed","LogTime","RowsSuccessful","RunTimeSeconds","RowsFailed","RowsRead","Table","SPName","APICall","ResponseTime","combined","TimeSeconds","QueryLocator","LinkedServer","RowsCopied","Type"]
display.page.search.mode = verbose
display.page.search.patterns.sensitivity = 0.9
display.prefs.events.count = 50
display.prefs.statistics.count = 100
display.prefs.timeline.minimalMode = 0
display.visualizations.charting.chart = bar
