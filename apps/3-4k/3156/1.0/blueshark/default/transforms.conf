# Overview
# ========
# Blue Shark supports CSV lookups for HTTP status codes:

[httpstatus]
filename = http_status.csv

# The Basic edition supports ELFF field associations are as follows:
#
# main='date time time-taken c-ip sc-status s-action sc-bytes cs-bytes cs-method cs-uri-scheme cs-host cs-uri-port cs-uri-path cs-uri-query cs-username cs-auth-group s-hierarchy s-supplier-name rs(Content-Type) cs(User-Agent) sc-filter-result cs-category x-virus-id s-ip s-sitename'
#
# As well as:
#
# bcreportermain_v1='date time time-taken c-ip cs-username cs-auth-group x-exception-id sc-filter-result cs-categories cs(Referer) sc-status s-action cs-method rs(Content-Type) cs-uri-scheme cs-host cs-uri-port cs-uri-path cs-uri-query cs-uri-extension cs(User-Agent) s-ip sc-bytes cs-bytes x-virus-id x-bluecoat-application-name x-bluecoat-application-operation'
#
# The corresponding Splunk transforms are as follows:
[wbs_main]
DEST_KEY = MetaData:Sourcetype
REGEX = ^(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(\d+|-)\s+(\d+|-)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(\d+|-)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)$
FORMAT = sourcetype::wbs_main

[wbs_bcreportermain_v1]
DEST_KEY = MetaData:Sourcetype
REGEX = ^(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(\d+|-)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(\d+|-)\s+(\d+|-)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)$
FORMAT = sourcetype::wbs_bcreportermain_v1

# Field Extractions:
[extract_wbs_main]
FORMAT = date::$1 time::$2 time_taken::$3 c_ip::$4 sc_status::$5 s_action::$6 sc_bytes::$7 cs_bytes::$8 cs_method::$9 cs_uri_scheme::$10 cs_host::$11 cs_uri_port::$12 cs_uri_path::$13 cs_uri_query::$14 cs_username::$15 cs_auth_group::$16 s_hierarchy::$17 s_supplier_name::$18 rs_Content_Type::$19 cs_User_Agent::$20 sc_filter_result::$21 cs_category::$22 x_virus_id::$23 s_ip::$24 s_sitename::$25
REGEX = ^(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(\d+|-)\s+(\d+|-)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(\d+|-)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)$

[extract_wbs_bcreportermain_v1]
FORMAT = date::$1 time::$2 time_taken::$3 c_ip::$4 cs_username::$5 cs_auth_group::$6 x_exception_id::$7 sc_filter_result::$8 cs_categories::$9 cs_Referer::$10 sc_status::$11 s_action::$12 cs_method::$13 rs_Content_Type::$14 cs_uri_scheme::$15 cs_host::$16 cs_uri_port::$17 cs_uri_path::$18 cs_uri_query::$19 cs_uri_extension::$20 cs_User_Agent::$21 s_ip::$22 sc_bytes::$23 cs_bytes::$24 x_virus_id::$25 x_bluecoat_application_name::$26 x_bluecoat_application_operation::$27
REGEX = ^(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(\d+|-)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(\d+|-)\s+(\d+|-)\s+(".+?"|\S+)\s+(".+?"|\S+)\s+(".+?"|\S+)$
