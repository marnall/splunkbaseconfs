[expandurl-command]
syntax		= expandurl field=<string> [redirect_limit=(<# of times to expand a daisy redirect of shortened links>)]
shortdesc	= Expand a shortened URL.
description	= Find the real location of a shortened URL.\i\\
		"field"	- specify the field containing the URL to expand.\i\\
		"redirect_limit"		- If the URL leads to a daisy redirect of shortened URLs, what is the limit on the # of times to follow? defaults to 0.\i\\

example1 = | expandurl field=url | table url, expanded_url
example2 = | expandurl field=url redirect_limit=5 | table url, expanded_url 
tags = expandurl expand url
