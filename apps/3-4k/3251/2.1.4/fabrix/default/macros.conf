[get_l1_splunk_es]
definition = inputlookup fabrix_maps.csv | search templateId="splunk_es" \
\
| append [ | inputlookup splunk_es.csv | search lv_cnt=0 \
  | stats count by title, tag_name, tag_pname, tag_label, url \
  | join type=outer title \
    [ | rest /services/apps/local count=0 | table title, label, version ] \
  | eval objType="App_ES" | eval objId="App_".title | eval objPid=tag_pname \
  | eval objName=label." ".version | eval objUrl=url \
  | eval seq=1 ] \
\
| append [ | inputlookup splunk_es.csv | search lv_cnt=1 \
  | table title, tag_name, tag_pname, tag_label, url \
\
  | search [ | inputlookup splunk_es.csv | search lv_cnt=2 \
    | table title, tag_name, tag_pname, tag_label, url \
    | eval tag_name=tag_pname | table tag_name ] \
\
  | eval objType="lv1_".tag_name | eval objId=objType | eval objPid="App_".title \
  | eval objName=tag_label | eval objUrl=url \
  | eval seq=2 ] \
\
| append [ | inputlookup splunk_es.csv | search lv_cnt=1 \
  | table title, tag_name, tag_pname, tag_label, url \
\
  | search NOT [ | inputlookup splunk_es.csv | search lv_cnt=2 \
    | table title, tag_name, tag_pname, tag_label, url \
    | eval tag_name=tag_pname | table tag_name ] \
  | search title="SplunkEnterpriseSecuritySuite" AND tag_label!="Home" \
\
  | eval objType="lv1_".tag_name | eval objId=objType | eval objPid="App_".title \
  | eval objName=tag_label | eval objUrl=url \
  | eval seq=2 ] \
\
| append [ | inputlookup splunk_es.csv | search lv_cnt=2 \
  | table title, tag_name, tag_pname, tag_label, url  \
  | eval objType="lv2_".tag_name | eval objId=objType | eval objPid="lv1_".tag_pname \
  | eval objName=tag_label | eval objUrl=url \
  | eval seq=3 ] \
\
| append [ | inputlookup splunk_es.csv \
  | search lv_cnt=1 AND title="SplunkEnterpriseSecuritySuite" AND tag_label!="Home" \
  | table title, tag_name, tag_pname, tag_label, url  \
\
  | search NOT [ | inputlookup splunk_es.csv | search lv_cnt=2 \
  | stats count by tag_pname \
  | eval tag_name=tag_pname | table tag_name ] \
\
  | eval objType="lv2_".tag_name | eval objId=objType | eval objPid="lv1_".tag_name \
  | eval objName=tag_label | eval objUrl=url \
  | eval seq=3 ] \
\
| search objId!=search\
| sort seq \
| eval lv=1 \
| fillnull value="-" slv, slv_fit, mo \
| fillnull value="" objUrl, templateId \
| table lv, slv, slv_fit, mo, objType, objId, objPid, objName, objUrl, templateId
