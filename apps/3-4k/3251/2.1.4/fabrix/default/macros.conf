[get_l1_bcoat_overview]
definition = sourcetype=bcoat_cacheflow OR (sourcetype=bcoat_proxysg filter_result!="DENIED") \
| bin _time span=5m \
| makemv delim=";" allowempty=t category \
| fillnull src_ip cs_bytes category dest_host rs_bytes sc_bytes sc_status sr_bytes \
| eval client_bytes=sc_bytes+cs_bytes \
| eval server_bytes=rs_bytes+sr_bytes \
| eval savings_bytes=client_bytes-server_bytes \
| eval savings_bytes=if(server_bytes==0,0,savings_bytes) \
| eval savings_perc = (1/client_bytes) * savings_bytes * 100 \
| stats count sum(client_bytes) as client_bytes sum(server_bytes) as server_bytes  avg(savings_perc) as saving by category \
| sort -count \
\
| eval line_color=case(count>5, 4, count>4, 3, count>3, 2, count>2, 1, 1=1, 1)\
| eval line_color=if(like(category, "Shopping"), 4, 1)\
| eval metric="Category=".category \
| eval metric=metric.",Requests=".count \
| eval metric=metric.",Client Bytes=".client_bytes \
| eval metric=metric.",Server Bytes=".server_bytes \
| eval metric=metric.",Bandwidth Savings %=".saving \
| eval metric=metric.",_COLOR=".`get_color(line_color)`\
\
| stats list(metric) as metric, max(line_color) as line_color \
\
| eval objHealth=`get_color(line_color)` \
| eval objBlink=if(objHealth=="GREEN" OR objHealth=="GRAY", "no", "yes") \
\
| eval objTableAttr="table" \
| eval objTableMetric=mvjoin(metric, ";") \
\
| eval lv=1 \
| eval cKey="Fabrix" \
| eval objId="bcoat_overview" \
| eval objName="" \
| eval objAlarmType="box" \
| eval objTime=now() \
| eval objUrl="" \
| table lv, cKey, objId, objName, objHealth, objBlink, objAlarmType, objTime, objUrl, objTableAttr, objTableMetric
iseval = 0

