[get_all_map]
definition = `get_l1_common()` \
| append maxout=0 maxtime=0 [ | `get_l2_common()` ] \
| append maxout=0 maxtime=0 [ | `get_user_defined()` ] \
\

iseval = 0

[get_l1_common]
definition = inputlookup fabrix_maps.csv | search templateId="common" \
\
| append [ | inputlookup splunk_apps.csv | search lv_cnt=0 \
  | stats count by title, tag_name, tag_pname, tag_label, url \
  | join type=outer title \
    [ | rest /services/apps/local count=0 | table title, label, version ] \
  | eval objType="App" | eval objId=title | eval objPid=tag_pname \
  | eval objName=if(len(label)!=0, label." ".version, objId) \
  | eval objUrl=url \
  | eval seq=1 ] \
\
| append [ | inputlookup splunk_apps.csv | search lv_cnt=1 \
  | stats count by title, tag_name, tag_pname, tag_label \
\
  | search [ | inputlookup splunk_apps.csv | search lv_cnt=2 \
    | table title, tag_name, tag_pname, tag_label, url \
    | eval tag_name=tag_pname | table tag_name ] \
\
  | eval objType="lv1" | eval objId=tag_name | eval objPid=title \
  | eval objName=tag_label | eval objUrl="" \
  | eval seq=2 ] \
\
| append [ | inputlookup splunk_apps.csv | search lv_cnt=1 \
  | stats count by title, tag_name, tag_pname, tag_label \
\
  | search NOT [ | inputlookup splunk_apps.csv | search lv_cnt=2 \
    | table title, tag_name, tag_pname, tag_label, url \
    | eval tag_name=tag_pname | table tag_name ] \
  | search title="SplunkEnterpriseSecuritySuite" AND tag_label!="Home" \
\
  | eval objType="lv1" | eval objId=tag_name | eval objPid=title \
  | eval objName=tag_label | eval objUrl="" \
  | eval seq=2 ] \
\
| append [ | inputlookup splunk_apps.csv | search lv_cnt=2 \
  | table title, tag_name, tag_pname, tag_label, url  \
  | eval objType="lv2" | eval objId=tag_name | eval objPid=tag_pname \
  | eval objName=tag_label | eval objUrl=url \
  | eval slv=2\
  | eval seq=3 ] \
\
| append [ | inputlookup splunk_apps.csv \
  | search lv_cnt=1 AND title="SplunkEnterpriseSecuritySuite" AND tag_label!="Home" \
  | table title, tag_name, tag_pname, tag_label, url  \
\
  | search NOT [ | inputlookup splunk_apps.csv | search lv_cnt=2 \
  | stats count by tag_pname \
  | eval tag_name=tag_pname | table tag_name ] \
\
  | eval objType="lv2" | eval objId=tag_name."_lv2" | eval objPid=tag_name \
  | eval objName=tag_label | eval objUrl=url \
  | eval slv=2 | eval slv_fit="m:SplunkEnterpriseSecuritySuite" \
  | eval seq=3 ] \
\
| search objId!=search\
| sort seq \
| eval lv=1 \
| fillnull value="-" slv, slv_fit, mo \
| fillnull value="" objUrl, templateId \
| table lv, slv, slv_fit, mo, objType, objId, objPid, objName, objUrl, templateId
iseval = 0

[get_l2_common]
definition = inputlookup splunk_apps.csv | search lv_cnt=0 \
  | stats count by title, tag_name, tag_pname, tag_label, url \
  | join type=outer title \
    [ | rest /services/apps/local count=0 | table title, label, version ] \
  | eval objType="App" | eval objId=title | eval objPid=tag_pname \
  | eval objName=label." ".version | eval objUrl=url \
  | eval mo="m" | eval templateId="app" \
  | eval seq=1 \
\
| append [ | inputlookup splunk_apps.csv | search lv_cnt=1 \
  | table title, tag_name, tag_pname, tag_label, url \
\
  | search [ | inputlookup splunk_apps.csv | search lv_cnt=2 \
    | stats count by tag_name, tag_pname \
    | eval tag_name=tag_pname | table tag_name ] \
\
  | eval objType="lv1" | eval objId=tag_name | eval objPid=title \
  | eval objName=tag_label | eval objUrl=url \
  | eval seq=2 ] \
\
| append [ | inputlookup splunk_apps.csv | search lv_cnt=2 \
  | table title, tag_name, tag_pname, tag_label, url  \
  | eval objType="lv2" | eval objId=tag_name | eval objPid=tag_pname \
  | eval objName=tag_label | eval objUrl=url \
  | eval seq=3 ] \
\
| append [ | inputlookup splunk_apps.csv | search lv_cnt=3 \
  | table title, tag_name, tag_pname, tag_label, coll_name, url  \
  | eval objType="lv3" | eval objId=tag_name | eval objPid=tag_pname \
  | eval objName=case(tag_label=="all", coll_name, tag_label=="unclassified", coll_name, 1=1, tag_label) \
  | eval objUrl=url \
  | eval seq=4 ] \
\
| append [ | inputlookup splunk_apps.csv | search lv_cnt=2 \
  | table title, tag_name, tag_pname, tag_label, url  \
\
  | search NOT [ | inputlookup splunk_apps.csv | search lv_cnt=3 \
    | stats count by tag_pname  \
    | eval tag_name=tag_pname | table tag_name ] \
\
  | eval objType="lv3" | eval objId=tag_name."_".objType | eval objPid=tag_name \
  | eval objName=tag_label | eval objUrl=url \
  | eval seq=4 ] \
\
| sort seq \
| eval lv=2 \
| fillnull value="-" slv, slv_fit, mo \
| fillnull value="" objUrl, templateId \
| table lv, slv, slv_fit, mo, objType, objId, objPid, objName, objUrl, templateId
iseval = 0

[get_l1_paloalto_overview]
definition = index=pan (sourcetype=pan_* OR sourcetype=pan:*) | fillnull value="" \
| stats count by host sourcetype log_subtype action category \
| appendpipe [ stats dc(host) as dc_host \
  | eval host_color="GREEN" \
  | eval metric="Metric=PAN Reporting,Value=".dc_host.",_COLOR=".host_color ] \
\
| appendpipe [ stats sum(count) as sum, count(count) | eval sum=if(isnull(sum),0,sum) \
  | eval sum_color="RED" \
  | eval metric="Metric=Total Events,Value=".sum.",_COLOR=".sum_color ] \
\
| appendpipe [ search action=block* OR action=deny \
  | stats sum(count) as sum, count(count) \
  | eval sum=if(isnull(sum),0,sum) \
  | eval blk_color="YELLOW" \
  | eval metric="Metric=Total Blocks,Value=".sum.",_COLOR=".blk_color ] \
\
| append [ search index=pan sourcetype="pan:traffic" category!="any" category!="private-ip-addresses" category!="not-resolved" \
  | stats count by host sourcetype log_subtype action category \
  | sort -count | head 1 \
  | stats values(category) as category count(category) \
  | eval category=if(isnull(category),"---",category) \
  | eval url_color="GREEN" \
  | eval metric="Metric=Top URL Category,Value=".category.",_COLOR=".url_color ] \
\
| stats list(metric) as metric, max(host_color) as host_color, max(sum_color) as sum_color, max(blk_color) as blk_color, max(url_color) as url_color \
\
| eval host_color=`get_num(host_color)` \
| eval sum_color=`get_num(sum_color)` \
| eval blk_color=`get_num(blk_color)` \
| eval url_color=`get_num(url_color)` \
\
| eval objHealth=`get_color(max(host_color, sum_color, blk_color, url_color))` \
| eval objBlink=if(objHealth=="GREEN" OR objHealth=="GRAY", "no", "yes") \
\
| eval objTableAttr="table" \
| eval objTableMetric=mvjoin(metric, ";") \
\
| eval lv=1 \
| eval cKey="Fabrix" \
| eval objId="overview" \
| eval objName="" \
| eval objAlarmType="box" \
| eval objTime=now() \
| eval objUrl="" \
| table lv, cKey, objId, objName, objHealth, objBlink, objAlarmType, objTime, objUrl, objTableAttr, objTableMetric
iseval = 0

[get_l1_status]
definition = `get_paloalto_overview(1, "Fabrix", "overview")` \
| append maxout=0 maxtime=0 [ search `get_cisco_security_overview(1, "Fabrix", "cisco_security_overview")` ] \
| append maxout=0 maxtime=0 [ search `get_l1_cisco_firewall_event()` ] \
| append maxout=0 maxtime=0 [ search `get_l1_cisco_wsa_overview()` ] \
| append maxout=0 maxtime=0 [ search `get_l1_bcoat_overview()` ] \
| append maxout=0 maxtime=0 [ search `get_l1_fe_analytics()` ] \
| append maxout=0 maxtime=0 [ search `get_l1_fe_nx_analysis()` ] \
| append maxout=0 maxtime=0 [ search `get_l1_fe_ax_visualization()` ] \
| append maxout=0 maxtime=0 [ | `get_l1_windows_overview()` ] \
| append maxout=0 maxtime=0 [ search `get_l1_windows_event()` ] \
\
| append maxout=0 maxtime=0 [ | `get_l1_user_metrics()` ]

iseval = 0

[get_color(1)]
args = alt
definition = case($alt$=4,"RED", $alt$=3,"ORANGE", $alt$=2,"YELLOW", $alt$=1,"GREEN", 1=1, "GRAY")
iseval = 0

[get_num(1)]
args = num
definition = case($num$="RED",4, $num$="ORANGE",3, $num$="YELLOW",2, $num$="GREEN",1)
iseval = 0

[get_l1_cisco_firewall_event]
definition = index=cisco (sourcetype="cisco:asa" OR sourcetype="cisco:pix" OR sourcetype="cisco:fwsm") \
host="*" action="*" src_ip="*" dest_ip="*" src_port="*" dest_port="*" transport="*" service="*" \
| head 10 \
| table _time, host, transport, src_ip, src_port, dest_ip, dest_port, action \
\
| join type=outer [ | inputlookup splunk_info.csv | table splunk_web, splunk_host, splunk_port ] \
\
| eval line_color=case(dest_port==443, 4, dest_port==80, 3, 1=1, 1)\
| eval metric="Time=".strftime(_time, "%Y/%m/%d %T") \
| eval metric=metric.",Hostname=".host \
| eval metric=metric.",Transport=".transport \
| eval metric=metric.",Source IP=".src_ip \
| eval metric=metric.",Source IP_href=\"".splunk_web."://".splunk_host.":".splunk_port \
| eval metric=metric."/en-US/app/Splunk_CiscoSecuritySuite/asa_search?form.src_ip=".src_ip \
| eval metric=metric."&earliest=0&form.src_port=*&form.dest_ip=*&form.dest_port=*&form.transport=*&form.service=*&form.action=*&form.host=*&latest=\"" \
\
| eval metric=metric.",Source Port=".src_port \
| eval metric=metric.",Destination IP=".dest_ip \
| eval metric=metric.",Destination Port=".dest_port \
| eval metric=metric.",Action=".action \
| eval metric=metric.",_COLOR=".`get_color(line_color)`\
\
| stats list(metric) as metric, max(line_color) as line_color \
\
| eval objHealth=`get_color(line_color)` \
| eval objBlink=if(objHealth=="GREEN" OR objHealth=="GRAY", "no", "yes") \
\
| eval objTableAttr="table" \
| eval objTableMetric=mvjoin(metric, ";") \
\
| eval lv=1 \
| eval cKey="Fabrix" \
| eval objId="asa_search" \
| eval objName="" \
| eval objAlarmType="wave" \
| eval objTime=now() \
| eval objUrl="" \
| table lv, cKey, objId, objName, objHealth, objBlink, objAlarmType, objTime, objUrl, objTableAttr, objTableMetric

iseval = 0

