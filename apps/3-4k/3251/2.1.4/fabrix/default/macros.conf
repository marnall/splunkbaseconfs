[get_l1_fe_analytics]
definition = index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" fireproduct!="HX" OR (index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" fireproduct="HX" severity="IOC Hit") \
| stats count as tt_cnt \
| eval tt_color=case(tt_cnt>50, "RED", tt_cnt>30, "ORANGE", tt_cnt>20, "YELLOW", tt_cnt>1, "GREEN", 1=1, "GREEN") \
| eval metric="Metric=Total,Value=".tt_cnt.",_COLOR=".tt_color \
\
| append [ search index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" fireproduct="CMS" \
  | stats count as cm_cnt \
  | eval cm_color=case(cm_cnt>15, "RED", cm_cnt>10, "ORANGE", cm_cnt>5, "YELLOW", cm_cnt>1, "GREEN", 1=1, "GREEN") \
  | eval metric="Metric=CM,Value=".cm_cnt.",_COLOR=".cm_color ]  \
\
| append [ search index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" fireproduct="Web MPS" \
  | stats count as nx_cnt \
  | eval nx_color=case(nx_cnt>15, "RED", nx_cnt>10, "ORANGE", nx_cnt>5, "YELLOW", nx_cnt>1, "GREEN", 1=1, "GREEN") \
  | eval metric="Metric=NX,Value=".nx_cnt.",_COLOR=".nx_color ] \
\
| append [ search index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" fireproduct="Email MPS" \
  | stats count as ex_cnt \
  | eval ex_color=case(ex_cnt>5, "RED", ex_cnt>3, "ORANGE", ex_cnt>2, "YELLOW", ex_cnt>1, "GREEN", 1=1, "GREEN") \
  | eval metric="Metric=EX,Value=".ex_cnt.",_COLOR=".ex_color ] \
\
| append [ search index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" fireproduct="MAS" \
  | stats count as ax_cnt \
  | eval ax_color=case(ax_cnt>5, "RED", ax_cnt>3, "ORANGE", ax_cnt>2, "YELLOW", ax_cnt>1, "GREEN", 1=1, "GREEN") \
  | eval metric="Metric=AX,Value=".ax_cnt.",_COLOR=".ax_color ] \
\
| append [ search index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" fireproduct="File MPS" \
  | stats count as fx_cnt \
  | eval fx_color=case(fx_cnt>5, "RED", fx_cnt>3, "ORANGE", fx_cnt>2, "YELLOW", fx_cnt>1, "GREEN", 1=1, "GREEN") \
  | eval metric="Metric=FX,Value=".fx_cnt.",_COLOR=".fx_color ] \
\
| append [ search index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" fireproduct="HX" severity="IOC Hit" \
  | stats count as hx_cnt \
  | eval hx_color=case(hx_cnt>5, "RED", hx_cnt>3, "ORANGE", hx_cnt>2, "YELLOW", hx_cnt>1, "GREEN", 1=1, "GREEN") \
  | eval metric="Metric=HX,Value=".hx_cnt.",_COLOR=".hx_color ] \
\
| stats list(metric) as metric, max(tt_color) as tt_color, max(cm_color) as cm_color, max(nx_color) as nx_color, max(ex_color) as ex_color, max(ax_color) as ax_color, max(fx_color) as fx_color, max(hx_color) as hx_color \
\
| eval tt_color=`get_num(tt_color)` \
| eval cm_color=`get_num(cm_color)` \
| eval nx_color=`get_num(nx_color)` \
| eval ex_color=`get_num(ex_color)` \
| eval ax_color=`get_num(ax_color)` \
| eval fx_color=`get_num(fx_color)` \
| eval hx_color=`get_num(hx_color)` \
\
| eval objHealth=`get_color(max(tt_color, cm_color, nx_color, ex_color, ax_color, fx_color, hx_color))` \
| eval objBlink=if(objHealth=="GREEN" OR objHealth=="GRAY", "no", "yes") \
\
| eval objTableAttr="table" \
| eval objTableMetric=mvjoin(metric, ";") \
\
| eval lv=1 \
| eval cKey="Fabrix" \
| eval objId="analytics" \
| eval objName="" \
| eval objAlarmType="box" \
| eval objTime=now() \
| eval objUrl="" \
| table lv, cKey, objId, objName, objHealth, objBlink, objAlarmType, objTime, objUrl, objTableAttr, objTableMetric
iseval = 0

[get_l1_fe_nx_analysis]
definition = index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" product="Web MPS" \
| head 10 \
| eval UrlHash=case(category=="malware-object",file_hash, category=="web-infection", objURL, category=="malware-callback" OR category=="domain-match",infURL) \
| sort -occurred \
| table source, sourcetype, category, id, signature, severity, occurred, transport, src_ip, src_port, dest_ip, dest_port, UrlHash \
| fillnull value="" source, sourcetype, category, id, signature, severity, occurred, transport, src_ip, src_port, dest_ip, dest_port, UrlHash \
\
| join type=outer [ | inputlookup splunk_info.csv | table splunk_web, splunk_host, splunk_port ] \
\
| eval line_color=case(severity=="critical", 4, severity=="majr", 3, severity=="minr", 2, 1=1, 1) \
| eval metric="Source=".source \
| eval metric=metric.",Source Type=".sourcetype \
| eval metric=metric.",Type=".category \
| eval metric=metric.",ID=".id \
| eval metric=metric.",ID_href=\"".splunk_web."://".splunk_host.":".splunk_port \
| eval metric=metric."/en-US/app/fireeye/nx_analysis?earliest=0&latest&form.wild=*&form.ID=".id."\"" \
\
| eval metric=metric.",Malware=".signature \
| eval metric=metric.",Severity=".severity \
| eval metric=metric.",Occurred=".occurred \
| eval metric=metric.",Protocol=".transport \
| eval metric=metric.",Source IP=".src_ip \
| eval metric=metric.",Source Port=".src_port \
| eval metric=metric.",Target IP=".dest_ip \
| eval metric=metric.",Target Port=".dest_port \
| eval metric=metric.",URL/Md5sum=".UrlHash \
| eval metric=metric.",_COLOR=".`get_color(line_color)`\
\
| stats list(metric) as metric, max(line_color) as line_color \
\
| eval objHealth=`get_color(line_color)` \
| eval objBlink=if(objHealth=="GREEN" OR objHealth=="GRAY", "no", "yes") \
\
| eval objTableAttr="table" \
| eval objTableMetric=mvjoin(metric, ";") \
\
| eval lv=1 \
| eval cKey="Fabrix" \
| eval objId="nx_analysis" \
| eval objName="" \
| eval objAlarmType="box" \
| eval objTime=now() \
| eval objUrl="" \
| table lv, cKey, objId, objName, objHealth, objBlink, objAlarmType, objTime, objUrl, objTableAttr, objTableMetric
iseval = 0

[get_l1_fe_ax_visualization]
definition = index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" product="MAS" | top limit=10 severity showperc=f showcount=f \
| appendcols [ search index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" product="MAS" | top limit=10 signature showperc=f showcount=f ] \
| appendcols [ search index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" product="MAS" | top limit=10 dvc_host showperc=f showcount=f ] \
| appendcols [ search index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" product="MAS" | top limit=10 file_type showperc=f showcount=f ] \
| appendcols [ search index=fe3 sourcetype="fe_*" OR sourcetype="hx_*" product="MAS" | top limit=10 file_hash showperc=f showcount=f ] \
\
| fillnull value="" signature, dvc_host, file_type, file_hash \
| fillnull value="norm" severity \
\
| eval line_color=case(severity=="critical", 4, severity=="majr", 3, severity=="minr", 2, 1=1, 1) \
| eval metric="Top Severity=".severity \
| eval metric=metric.",Top Malwares=".signature \
| eval metric=metric.",Top Sensors=".dvc_host \
