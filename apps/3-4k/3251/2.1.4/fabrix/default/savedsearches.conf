[Generate_lookup_for_apps]
alert.digest_mode = True
alert.expires = 6h
alert.suppress = 0
alert.track = 0
dispatch.earliest_time = -24h
dispatch.latest_time = now
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = */5 * * * *
enableSched = 1
search = | inputlookup splunk_enabled_apps.csv \
| append [ | rest /services/apps/local count=0 | table title, label, version | eval viz=1 \
  | search NOT [ | inputlookup splunk_disabled_apps.csv | table title ] \
  | search NOT [ | inputlookup splunk_enabled_apps.csv | table title ] ] \
| eval viz=case(like(label, "%Add-on%"), 0, like(label, "SA-%"), 0, like(label, "%sample%"), 0, like(label, "%overview%"), 0, 1=1, viz) \
| eval viz=case(like(title, "%SA-%"), 0, like(label, "%sample%"), 0, like(label, "%verview%"), 0, 1=1, viz) \
| table title, label, version, viz \
| outputlookup splunk_enabled_apps.csv

[Menu L1 of Apps]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
alert.track = 0
dispatch.earliest_time = -7d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = fabrix
request.ui_dispatch_view = search
search = | inputlookup splunk_apps.csv | search lv_cnt=1 \
| table title, tag_name, tag_pname, tag_label, url \
| search [ | inputlookup splunk_apps.csv | search lv_cnt=2 \
  | table title, tag_name, tag_pname, tag_label, url \
  | eval tag_name=tag_pname | table tag_name ] \
\
| eval objType="lv1" | eval objId=tag_name | eval objPid=title \
| eval objName=tag_label | eval objUrl=url \
| table objId, objPid, objName, objUrl

[Menu L2 of Apps]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
alert.track = 0
dispatch.earliest_time = -7d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = fabrix
request.ui_dispatch_view = search
search = | inputlookup splunk_apps.csv | search lv_cnt=2 \
| table title, tag_name, tag_pname, tag_label, url \
| eval objType="lv2" | eval objId=tag_name | eval objPid=tag_pname \
| eval objName=tag_label | eval objUrl=url \
| search objId!=search \
| table objId, objPid, objName, objUrl

[Menu L3 of Apps]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
alert.track = 0
dispatch.earliest_time = -7d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = fabrix
request.ui_dispatch_view = search
search = | inputlookup splunk_apps.csv | search lv_cnt=3 \
| table title, tag_name, tag_pname, tag_label, coll_name, url \
| eval objType="lv3" | eval objId=tag_name | eval objPid=tag_pname \
| eval objName=case(tag_label=="all", coll_name, tag_label=="unclassified", coll_name, 1=1, tag_label) \
| eval objUrl=url \
| fillnull value="" objUrl, templateId \
| table objId, objPid, objName, objUrl

[List of Splunk Apps]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
alert.track = 0
dispatch.earliest_time = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = fabrix
request.ui_dispatch_view = search
search = | inputlookup splunk_apps.csv | search lv_cnt=0 \
  | stats count by title, tag_name, tag_pname, tag_label, url \
  | join type=outer title \
    [ | rest /services/apps/local count=0 | table title, label, update.version, updated, version, eai:acl.app, eai:acl.sharing ] \
| search title!=search\
| eval objType="App" | eval objId=title | eval objPid=tag_pname \
| eval objName=if(len(label)!=0, label." ".version, objId) \
| eval objUrl=url \
| sort seq \
| eval lv=1 \
| fillnull value="-" slv, slv_fit, mo \
| fillnull value="" objUrl, templateId \
| table objId, objName, objUrl, eai:acl.app, eai:acl.sharing, update.version, updated
