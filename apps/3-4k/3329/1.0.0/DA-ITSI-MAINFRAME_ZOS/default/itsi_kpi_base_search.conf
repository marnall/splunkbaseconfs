| rex "QWACAWTL_0002\":\"(?<hour>\d{2}):(?<min>\d{2}):(?<sec>\d{2})\.(?<msec>\d{6})" | eval secs = hour * 60 * 60 | eval secs = secs + (min * 60) | eval secs = secs + sec | eval secs = secs + (msec/1000000)\
