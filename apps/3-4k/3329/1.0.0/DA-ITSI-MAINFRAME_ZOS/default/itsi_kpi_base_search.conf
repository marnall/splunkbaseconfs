[DA-ITSI-MAINFRAME_ZOS-Mainframe_CPC]
alert_lag = 30
alert_period = 1
base_search = tag=cpc tag=process\
| eval cpc_cpu_load_percent = M8D2550_R0001_percent\
| eval cpc_delay_percent = M8D0160_R0001_percent\
| eval cpc_io_activity_rate_percent = M8D0E90_R0001_percent\
| eval cpc_service_rate_percent = M8D1FB0_R0001_percent\
| eval cpc_workflow_percent = M8D0550_R0001_percent
entity_alias_filtering_fields = RMFSystem
entity_id_fields = RMFSystem
is_entity_breakdown = True
is_service_entity_filter = True
metrics = [\
    {\
        "_key": "CPU_Utilization_", \
        "aggregate_statop": "max", \
        "entity_statop": "max", \
        "threshold_field": "cpc_cpu_load_percent", \
        "title": "CPU Utilization %", \
        "unit": "%"\
    }, \
    {\
        "_key": "Delay_", \
        "aggregate_statop": "max", \
        "entity_statop": "max", \
        "threshold_field": "cpc_delay_percent", \
        "title": "Delay %", \
        "unit": "%"\
    }, \
    {\
        "_key": "I_O_Rate_", \
        "aggregate_statop": "max", \
        "entity_statop": "max", \
        "threshold_field": "cpc_io_activity_rate_percent", \
        "title": "I/O Rate %", \
        "unit": "%"\
    }, \
    {\
        "_key": "Service_Rate_", \
        "aggregate_statop": "max", \
        "entity_statop": "max", \
        "threshold_field": "cpc_service_rate_percent", \
        "title": "Service Rate %", \
        "unit": "%"\
    }, \
    {\
        "_key": "Workflow_", \
        "aggregate_statop": "max", \
        "entity_statop": "max", \
        "threshold_field": "cpc_workflow_percent", \
        "title": "Workflow %", \
        "unit": "%"\
    }\
]
search_alert_earliest = 5
source_itsi_da = DA-ITSI-MAINFRAME_ZOS
title = DA-ITSI-MAINFRAME_ZOS:Mainframe CPC

[DA-ITSI-MAINFRAME_ZOS-CICS_System]
alert_lag = 30
alert_period = 1
base_search = tag=cics tag=transaction | eval transaction_response_time = (SUSPTIME_MICROSEC + USRCPUT_MICROSEC)/1000000 | eval abendcount = if((ABCODEO!=""),1,0) | eventstats sum(abendcount) as transaction_abend_count
entity_alias_filtering_fields = CICS System ID
entity_id_fields = NETUOWPX
is_entity_breakdown = True
is_service_entity_filter = True
metrics = [\
    {\
        "_key": "Abend_Count", \
        "aggregate_statop": "max", \
        "entity_statop": "max", \
        "threshold_field": "transaction_abend_count", \
        "title": "Abend Count", \
        "unit": ""\
    }, \
    {\
        "_key": "Response_Time", \
        "aggregate_statop": "avg", \
        "entity_statop": "avg", \
        "threshold_field": "transaction_response_time", \
        "title": "Response Time", \
        "unit": "sec"\
    }\
]
search_alert_earliest = 5
source_itsi_da = DA-ITSI-MAINFRAME_ZOS
title = DA-ITSI-MAINFRAME_ZOS:CICS System

