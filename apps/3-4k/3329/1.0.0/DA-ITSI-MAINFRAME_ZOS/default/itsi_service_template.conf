[DA-ITSI-MAINFRAME_ZOS-Mainframe_Service]
description = Track overall mainframe health.
entity_rules = [\
    {\
        "rule_condition": "AND", \
        "rule_items": [\
            {\
                "field": "mainframe_role", \
                "field_type": "info", \
                "rule_type": "matches", \
                "value": "cpc"\
            }\
        ]\
    }\
]
recommended_kpis = DA-ITSI-MAINFRAME_ZOS-CPC_CPU_Load_,DA-ITSI-MAINFRAME_ZOS-CPC_Delay_,DA-ITSI-MAINFRAME_ZOS-CPC_I_O_Rate_,DA-ITSI-MAINFRAME_ZOS-CPC_Service_Rate_,DA-ITSI-MAINFRAME_ZOS-CPC_Workflow_
title = Mainframe Service

[DA-ITSI-MAINFRAME_ZOS-CICS_Service]
description = Track overall CICS System health.
entity_rules = [\
    {\
        "rule_condition": "AND", \
        "rule_items": [\
            {\
                "field": "mainframe_role", \
                "field_type": "info", \
                "rule_type": "matches", \
                "value": "cics"\
            }\
        ]\
    }\
]
recommended_kpis = DA-ITSI-MAINFRAME_ZOS-Abends,DA-ITSI-MAINFRAME_ZOS-Response_Times
title = CICS Service

[DA-ITSI-MAINFRAME_ZOS-CICS_Transaction_Service]
description = Track the health of an individual CICS transaction.
entity_rules = [\
    {\
        "rule_condition": "AND", \
        "rule_items": [\
            {\
                "field": "CICS Transaction", \
                "field_type": "alias", \
                "rule_type": "matches", \
                "value": "ZOS1.CICSTS51.ABAL"\
            }\
        ]\
    }\
]
recommended_kpis = DA-ITSI-MAINFRAME_ZOS-OLB_Balance_Abends,DA-ITSI-MAINFRAME_ZOS-OLB_Balance_Response
title = CICS Transaction Service

