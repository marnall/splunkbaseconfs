[threat_activity_source_events]
display_location = both
eventtypes = threat_activity_events
fields = *
label = Show Raw Events Underlying Threat Hits
search.preserve_timerange = 0
search.search_string = index=* (sourcetype="$orig_sourcetype$" OR sourcetype="$Threat_Activity.orig_sourcetype$") earliest="$info_min_time$" latest="$info_max_time$" ((dest="$dest$" OR dest="$Threat_Activity.dest$") (src="$src$" OR src="$Threat_Activity.src$")) OR ((dest="$dest$" OR dest="$Threat_Activity.dest$") (file_name="$file_name$" OR file_name="$Threat_Activity.file_name$")) OR ("$threat_match_value$" OR "$Threat_Activity.threat_match_value$")
search.view = search
search.target = blank
type = search

[threat_activity_notable_source_events]
display_location = both
eventtypes = threat_activity_notables
#fields = orig_orig_sourcetype,orig_info_min_time,orig_info_max_time
fields = *
label = Show Raw Events Underlying Threat Hits
search.preserve_timerange = 0
search.search_string = index=* sourcetype="$orig_orig_sourcetype$" earliest="$threat_info_min_time$" latest="$threat_info_max_time$" (dest="$dest$" src="$src$") OR (dest="$dest$" file_name="$file_name$") OR "$threat_match_value$"
search.view = search
search.target = blank
type = search
