[default]
[script://$SPLUNK_HOME/etc/apps/TA-nextcloud/bin/nextcloud-info.sh]
start_by_shell = false
sourcetype = nextcloud-serverinfo
disabled = 1
#host = NextcloudHostName.example.com
interval = */5 * * * *

[script://$SPLUNK_HOME/etc/apps/TA-nextcloud/bin/nextcloud-status.sh]
start_by_shell = false
sourcetype = nextcloud-serverstatus
disabled = 1
#host = NextcloudHostName.example.com
interval = */5 * * * *

