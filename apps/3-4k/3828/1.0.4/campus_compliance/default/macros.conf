[cc_tstats_summaries]
definition = summariesonly=true allow_old_summaries=true
iseval = 0

[cc_priv_lookup]
definition = inputlookup cc_priv_users where is_privileged="true" | fields user\

iseval = 0

[cc_tstats]
definition = tstats summariesonly=true allow_old_summaries=true
iseval = 0

[cc_prestats]
definition = tstats summariesonly=true allow_old_summaries=true prestats=true
iseval = 0

[cc_vuln_make_identifier_values]
definition = eval identifiers=mvjoin(mvappend(cve,bugtraq,cert,msft,mskb,xref), ", ") | fillnull cve,bugtraq,cert,msft,mskb,xref,identifiers value="unknown"
iseval = 0

[cc_vuln_identifier_values]
definition = values(Vulnerabilities.cve) AS cve values(Vulnerabilities.bugtraq) AS bugtraq values(Vulnerabilities.cert) AS cert values(Vulnerabilities.msft) AS msft values(Vulnerabilities.mskb) AS mskb values(Vulnerabilities.xref) AS xref
iseval = 0

[cc_vuln_long_lived_cve]
definition = tag=campus_compliance tag=vulnerability is_mitigated="false" | eval duration = last_seen - first_seen | stats latest(cve) as cve latest(description) as description latest(duration) as duration latest(severity) as severity latest(severity_id) as severity_id by dest | sort - duration severity_id |eval duration = tostring(duration,"duration")

[cc_uitime(1)]
args = field
definition = fieldformat "$field$"=strftime('$field$', "%m/%d/%Y %H:%M:%S")
iseval = 0

[cc_timeDiff(1)]
args = field
definition = eval timeDiff=(time()-'$field$')
iseval = 0

[cc_timeSync_allowance]
definition = 86400
iseval = 0

[cc_internal_ranges(1)]
args = fieldname
definition = ($fieldname$="10.*" OR $fieldname$="192.168.*" OR $fieldname$="172.16.*" OR $fieldname$="172.17.*" OR $fieldname$="172.18.*" OR $fieldname$="172.19.*" OR $fieldname$="172.20.*" OR $fieldname$="172.21.*" OR $fieldname$="172.22.*" OR $fieldname$="172.23.*" OR $fieldname$="172.24.*" OR $fieldname$="172.25.*" OR $fieldname$="172.26.*" OR $fieldname$="172.27.*" OR $fieldname$="172.28.*" OR $fieldname$="172.29.*" OR $fieldname$="172.30.*" OR $fieldname$="172.31.*")
iseval = 0

###### Vulnerabiity Tracker ######
[cc_vulnerability_tracker]
definition = inputlookup append=T cc_vulnerability_tracker
#| `get_asset(dest)`

[cc_vulnerability_tracker(1)]
args       = timefield
definition = inputlookup append=T cc_vulnerability_tracker where `tracker_trp($timefield$,$timefield$)`
#| `get_asset(dest)`

## format epoch time
[uitime(1)]
args       = field
definition = `uitime($field$,"%m/%d/%Y %H:%M:%S")`

## format epoch time w/ format
[uitime(2)]
args       = field,format
definition = fieldformat "$field$"=strftime('$field$', "$format$")

## Macro for converting TimeRangePicker values to a filter suitable for inputlookup's where clause
[tracker_trp]
definition = `tracker_trp(firstTime,lastTime)`

[tracker_trp(2)]
args       = begin, end
definition = [| makeresults | addinfo | eval search="$begin$>=".if(isnotnull(info_min_time),info_min_time,0).if(isnull(info_max_time) OR info_max_time="+Infinity",""," AND $end$<=".info_max_time) | return $search]

[mvappend_field_meval(2)]
args       = field1, field2
definition = "$field1$"=mvdedup(mvappend('$field1$',NULL,'$field2$'))

[cc_inactive_time]
definition = (365 * 86400)
# CC-34
iseval = true

[cc_get_indexers]
definition = splunk_server=*
iseval = 0

[cc_get_searchheads]
definition = splunk_server=*
iseval = 0

[cc_prettymv(1)]
args = field
definition = eval $field$=mvjoin($field$, ", ")
iseval = 0

[cc_compute_user_to_indexes]
definition = rest splunk_server=local /services/authentication/users | `cc_prettymv(roles)` | fields title, roles | rename title AS username | makemv delim=", " roles | mvexpand roles | rename roles AS role | join role [| rest splunk_server=local /services/authorization/roles | rename title AS role | fillnull value="" | fields role, srchIndexesAllowed] | fields username, srchIndexesAllowed | rex field=srchIndexesAllowed mode=sed "s/\s/,/g" | makemv delim="," srchIndexesAllowed | mvcombine srchIndexesAllowed | mvcombine srchIndexesAllowed | rex field=srchIndexesAllowed mode=sed "s/\s/,/g" | makemv delim="," srchIndexesAllowed | eventstats values(srchIndexesAllowed) AS didx by username | fields username, didx | mvcombine didx | rex field=didx mode=sed "s/\s/, /g" | rename didx AS accessible_indexes
iseval = 0

[cc_indexes_to_counts(1)]
args = indexes
definition = join [| rest splunk_server=local /services/data/indexes | fields title | eval type=if(match(title,"^_\w+$"),"c_internal","c_non-internal") | eval x="woot" | stats count by type, x | xyseries x type count | fields - x] | makemv delim=", " $indexes$ | rename $indexes$ AS srchIndexesAllowed | eval totalAccess = `cc_compute_accessible_index_count` | fillnull value="noidea" totalAccess | fields - c_* | rename srchIndexesAllowed AS accessible_indexes | mvcombine accessible_indexes
iseval = 0

[cc_prettyIndexNotation(1)]
args = field
definition = rex field=$field$ mode=sed "s/_\*/All internal indexes/g"  | rex field=$field$ mode=sed "s/\*/All non-internal indexes/g"
iseval = 0

[cc_allowed_ports]
definition = cc_allowed_ports
iseval = 0

[cc_compute_accessible_index_count]
definition = case( isnotnull(mvfind(srchIndexesAllowed,"^_\*$")) AND isnotnull(mvfind(srchIndexesAllowed,"^\*$")), 'c_non-internal'+'c_internal', isnotnull(mvfind(srchIndexesAllowed,"^\*$")), 'c_non-internal' + `cc_mvcount_zero(srchIndexesAllowed, \"^_[^\*]+$\")`, isnotnull(mvfind(srchIndexesAllowed,"^_\*$")), 'c_internal' + `cc_mvcount_zero(srchIndexesAllowed, \"^[^_]+$\")`, srchIndexesAllowed == "", 0, isnull(mvfind(srchIndexesAllowed,"^_\*$")) AND isnull(mvfind(srchIndexesAllowed,"^\*$")), mvcount(srchIndexesAllowed) )
iseval = 0

[cc_max_review_age]
definition = 172800
iseval = 0

[cc_mvcount_zero(2)]
args = field, pattern
definition = if(isnull(mvcount(mvfilter(match($field$,$pattern$)))),0,mvcount(mvfilter(match($field$,$pattern$))))
iseval = 0

# CC-34
[cc_drop_dm_object_name(1)]
args       = object
definition = rename "$object$.*" as *