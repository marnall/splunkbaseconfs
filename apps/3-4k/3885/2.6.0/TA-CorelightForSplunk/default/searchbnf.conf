[cid-command]
syntax = cid output_field=<fieldname> <cid-transport> <cid-src> <cid-dest> <cid-src-port> <cid-dest-port>
shortdesc = Calculate the Community ID of a transport/src_ip/dest_ip/src_port/dest_port tuple
description = Calculate the Community ID of a transport/src_ip/dest_ip/src_port/dest_port tuple.
usage = public
example1 = cid output_field=community_id tcp src dest 443 80
comment1 = Calculate the community id of the tuple based in fields
category = fields::add

[cid-transport]
syntax = [tcp|udp|icmp|icmp6|sctp]
description = The transport function to utilize. One of: tcp, udp, icmp, icmp6, sctp

[cid-src]
syntax = <fieldname>|<value>
description = Either a field name with the source IP address, or an IP address.

[cid-dest]
syntax = <fieldname>|<value>
description = Either a field name with the destination IP address, or an IP address.

[cid-src-port]
syntax = <fieldname>|<value>
description = Either a field name with the source port, or a port number.

[cid-dest-port]
syntax = <fieldname>|<value>
description = Either a field name with the destination port, or a port number.

[cid-output-field]
syntax = <fieldname>
description = (Optional) A field name to output the data into. Default: cid
