[corelight_x509]
# CIM Review: January 30, 2023
# Added "ssl_issuer_common_name"
# Added "ssl_issuer_email_domain"
# Added "ssl_subject_common_name"
# Added "ssl_subject_email_domain"
KV_MODE                            = JSON
SHOULD_LINEMERGE                   = false
TRUNCATE                           = 9999999
TIME_PREFIX                        = _write_ts(?:"\s*:\s*")?
TIME_FORMAT                        = %Y-%m-%dT%H:%M:%S.%6QZ
MAX_TIMESTAMP_LOOKAHEAD            = 40
EXTRACT-ssl_extracts               = emailAddress=(?<ssl_issuer_email>\w+\@\w+\.\w+),
FIELDALIAS-valid_after             = certificate.not_valid_after AS not_valid_after
FIELDALIAS-ssl_issuer              = certificate.issuer AS ssl_issuer
FIELDALIAS-ssl_start_time          = certificate.not_valid_before AS ssl_start_time
FIELDALIAS-ssl_end_time            = certificate.not_valid_after AS ssl_end_time
FIELDALIAS-ssl_serial              = certificate.serial AS ssl_serial
FIELDALIAS-ssl_subject             = certificate.subject AS ssl_subject
FIELDALIAS-ssl_version             = certificate.version AS ssl_version
FIELDALIAS-ssl_publickey_algorithm = certificate.key_alg AS ssl_publickey_algorithm
FIELDALIAS-dvc                     = system_name ASNEW dvc
FIELDALIAS-dvc_name                = system_name ASNEW dvc_name
EVAL-days_to_expiry                = round(((strptime(not_valid_after, "%Y-%m-%dT%H:%M:%S.%6NZ") - now() )/ 86400),0)
EVAL-ssl_validity_window           = round(strptime(ssl_end_time,"%Y-%m-%dT%H:%M:%S.%6NZ") - strptime(ssl_start_time,"%Y-%m-%dT%H:%M:%S.%6NZ"),0)
EXTRACT-ssl_issuer_common_name     = "certificate.issuer":"CN=(?<ssl_issuer_common_name>[^,"]+)
EXTRACT-ssl_issuer_email_domain    = "certificate.issuer":"emailAddress=\w+\@(?<ssl_issuer_email_domain>\w+\.\w+)
EXTRACT-ssl_subject_common_name    = "certificate.subject":"CN=(?<ssl_subject_common_name>[^,"]+)
EXTRACT-ssl_subject_email_domain   = "certificate.subject":"emailAddress=\w+\@(?<ssl_subject_email_domain>\w+\.\w+)
#Additional CIM Mapping - April 2023
######### CONTINUE REVIEW
FIELDALIAS-ssl_hash                = fingerprint AS ssl_hash
FIELDALIAS-ssl_signature_algorithm = certificate.sig_alg AS ssl_signature_algorithm
EVAL-ts                            = strptime(ts,"%FT%H:%M:%S.%6NZ")
EVAL-ssl_start_time                = strptime(ssl_start_time,"%FT%H:%M:%S.%6NZ")
EVAL-ssl_end_time                  = strptime(ssl_end_time,"%FT%H:%M:%S.%6NZ")
EVAL-ssl_is_valid                  = if(ts > ssl_start_time AND ts < ssl_end_time,"true","false")
EXTRACT-ssl_issuer                 = ,\"issuer_subject\":\"(?<ssl_issuer>[^\"]+)\",
EXTRACT-ssl_issuer_organization    = O=(?<ssl_issuer_organization>[^,]+) in ssl_issuer
EXTRACT-ssl_issuer_unit            = OU=(?<ssl_issuer_unit>[^,]+) in ssl_issuer
EXTRACT-ssl_issuer_domain          = DC=(?<ssl_issuer_domain>[^,]+) in ssl_issuer
EXTRACT-ssl_issuer_email           = emailAddress=(?<ssl_subject_email>[a-zA-Z0-9\.!#$%&'*+=?^`{|}~;_-]+@(?<ssl_subject_email_domain>[^,]+)) in ssl_issuer
EXTRACT-ssl_issuer_locality        = L=(?<ssl_issuer_locality>[^,]+) in ssl_issuer
EXTRACT-ssl_issuer_state           = ST=(?<ssl_issuer_state>[^,]+) in ssl_issuer
EXTRACT-ssl_issuer_country         = ,C=(?<ssl_issuer_country>[^,]+) in ssl_issuer
EXTRACT-ssl_name                   = title=(?<ssl_name>[^,]+) in ssl_issuer
EXTRACT-ssl_subject                = ,\"subject\":\"(?<ssl_subject>[^\"]+)\",
EXTRACT-ssl_subject_organization   = O=(?<ssl_subject_organization>[^,]+) in ssl_subject
EXTRACT-ssl_subject_unit           = OU=(?<ssl_subject_unit>[^,]+) in ssl_subject
EXTRACT-ssl_subject_domain         = DC=(?<ssl_subject_domain>[^,]+) in ssl_subject
EXTRACT-ssl_subject_email          = emailAddress=(?<ssl_subject_email>[a-zA-Z0-9\.!#$%&'*+=?^`{|}~;_-]+@(?<ssl_subject_email_domain>[^,]+)) in ssl_subject
EXTRACT-ssl_subject_locality       = L=(?<ssl_subject_locality>[^,]+) in ssl_subject
EXTRACT-ssl_subject_state          = ST=(?<ssl_subject_state>[^,]+) in ssl_subject
EXTRACT-ssl_subject_country        = ,C=(?<ssl_subject_country>[^,]+) in ssl_subject
