# #::HDR:: ;; # App: TA-CorelightForSplunk ;; # File: macros.conf ;; # Updated: 2023-09-05 17:27:37

[corelight_evt_weird]
definition = eventtype IN (corelight_weird)

[corelight_evt_perf]
definition = eventtype IN (corelight_perf)

[eventtype_weird]
definition = `corelight_evt_weird`

[corelight_fe_map_use_cases]
definition = eval use_case = case(use_case=="server_ns_services", "ns_servers_services",use_case=="server_ns_http", "http_user_agents",true(),use_case)

[corelight_fe_use_case_fields]
definition = description significance anomalous_behavior baseline_behavior

[corelight_fe_use_case_repls]
definition = entity original_entity entity_training_items_combined item item_assoc_entities_combined

[corelight_fe_use_case_cleanup_repl]
definition = rename "entity_training_items{}" as entity_training_items, "item_assoc_entities{}" as item_assoc_entities | eval entity_training_items_combined = mvjoin(entity_training_items, ", "), original_entity = replace(original_entity, "\/\d{1,2}$", ""), item_service=replace(item, "^[^_]+_[^_]+_", ""), item_assoc_entities_combined=mvjoin(item_assoc_entities, ", "), item=if(use_case="admin_shares", replace(item, "\\\\", "\\\\\\\\"), item)

[corelight_fe_use_cases]
definition = `corelight_fe_map_use_cases`|lookup corelight_use_cases use_case | `corelight_fe_use_case_cleanup_repl`|foreach `corelight_fe_use_case_fields` fieldstr=<<FIELD>> [ foreach `corelight_fe_use_case_repls` fieldstr=<<REPL>> [ eval <<FIELD>> = replace(<<FIELD>>, ":<<REPL>>:", if(mvcount('<<REPL>>')>1,mvjoin('<<REPL>>', ", " ), '<<REPL>>') )] ]

[corelight_evt_anomaly]
definition = eventtype IN (corelight_anomaly)

[no_results(2)]
args       = df,sf
iseval     = 0
definition = appendpipe [stats count | where count=0 | eval $df$ = "No Results Found"]|table $df$, $sf$

[format_bytes(1)]
args       = bf
iseval     = 0
definition = eval formatted_$bf$=case($bf$ >= (1099511627776), round($bf$ / (1099511627776), 2) . " TB", $bf$ >= (1073741824), round($bf$ / (1073741824), 2) . " GB", $bf$ >= (1048576), round($bf$ / (1048576), 2) . " MB", $bf$ >= 1024, round($bf$ / 1024, 2) . " KB", true(), $bf$ . " B")

[format_zero_count(2)]
args       = cf,of
definition = appendpipe [stats count as $cf$]|eval $cf$ = if(isnull($of$),0,$cf$)|stats sum($cf$) as $cf$ | `format_count($cf$)` | table formatted_$cf$
iseval     = 0

[format_zero_count_rows(2)]
args       = cf,of
definition = stats count as $cf$ | `format_count($cf$)` | table formatted_$cf$
iseval     = 0

[format_count(1)]
args       = f
definition = eval formatted_$f$ = case($f$ < 1000, tostring($f$), round($f$/1000)*1000 == $f$, tostring(round($f$/1000)) . "K",$f$ % 1000 <= 100, tostring(floor($f$/1000)) . "K", $f$ > 999,tostring(round($f$/1000, 1)) . "K",true(), tostring($f$))
iseval     = 0

[format_high_counts(1)]
args       = f
iseval     = 0
definition = eval $f$ = case($f$ >= 1000000, round($f$ / 1000000, 2) . "M", $f$ >= 1000, round($f$ / 1000, 1) . "K", true(), round($f$, 0))

[dynamic_format_high_counts]
iseval     = 0
definition = foreach * [ `format_high_counts(<<FIELD>>)` ]

[classify_ip(1)]
args       = ip
definition = `corelight_network_blocks` | eval match_result = mvmap(cidrs, if(cidrmatch(cidrs, $ip$), "Internal", "External")), ip_class = if(isnotnull(mvfind(match_result, "Internal")), "Internal", "External")
iseval     = 0

[corelight_errors]
definition =  eval errors = split('', ';') | `corelight_error_num_ext` | return '' 

[corelight_error_num_ext]
definition = eval errors = mvappend(errors, if(num_exts>0, "num_ext_error", null()))

[corelight_idx]
definition  = index IN ( main )
description = a=renamed orig_macro="macro_index"

[corelight_evt_known]
definition = sourcetype  IN (corelight_known_devices, corelight_known_names, corelight_known_services)

[corelight_evt_smb]
definition = sourcetype IN (corelight_smb, corelight_smb_mapping, corelight_smb_files)

[corelight_evt_ftp]
definition = sourcetype IN (corelight_ftp)

[corelight_evt_vpn]
definition = sourcetype IN (corelight_vpn)

[corelight_evt_etc_viz]
definition = sourcetype IN (corelight_etc_viz)

[corelight_evt_asset_classification]
