[corelight_rest_network_blocks]
definition = rest splunk_server=local /servicesNS/-/-/configs/conf-corelightforsplunk_settings/app_settings |eval cidrs = tostring(local_network_blocks) |fields cidrs | stats values(cidrs) as query | eval query = mvjoin(query, ",")

[corelight_network_blocks]
definition = eval cidrs=split([`corelight_rest_network_blocks`], ",")

[calculate_direction(2)]
args       = ip_local, ip_resp
definition = `corelight_network_blocks`| eval local_dir = mvmap(cidrs, if(cidrmatch(cidrs, '$ip_local$'),"tr","fl")) | eval local_orig = if(isnotnull(mvfind(local_dir,"tr")),"true","false") | eval resp_dir = mvmap(cidrs, if(cidrmatch(cidrs, '$ip_resp$'),"tr","fl")) | eval local_resp = if(isnotnull(mvfind(resp_dir,"tr")),"true","false") |  eval direction = case(local_orig="true" AND local_resp="true", "internal", local_orig="true" and local_resp="false", "outbound", local_orig="false" and local_resp="false", "external", local_orig="false" and local_resp="true", "inbound", 1=1, "unknown")

[string_duration(1)]
args       = ds
definition = eval duration = tostring($ds$,"duration"), days = mvindex(split(duration,"+"),0),hrs = split(mvindex(split(duration,"+"),-1),":"), years = floor(if(days>= 365, days / 365, 0)), days = days - (years * 365), year_days = years * 365, duration_window = years."y ".days."d ".mvindex(hrs,0)."h ".mvindex(hrs,1)."m ".mvindex(hrs,2)."s" |  fields - duration days hrs year_days years

[direction]
definition = eval direction =  case(local_orig="true" AND local_resp="true", "internal", local_orig="true" and local_resp="false", "outbound", local_orig="false" and local_resp="false", "external", local_orig="false" and local_resp="true", "inbound", 1=1, "unknown")

[corelight_build_orig_macro_stanzas]
description = Build a list of macros based on descriptions
definition  = rest /servicesNS/-/-/data/macros | search eai:acl.app = "TA-CorelightForSplunk" AND description="a=renamed*" | fields title description | rex field=description "orig_macro=\"(?<orig_macro>[^\"]+)\"" | eval orig_macro = split(orig_macro,",") | mvexpand orig_macro | eval stanza = "|||[".orig_macro."]|||description = a=original_macro reason=renamed|||definition = ::".title."::" | eval complete_stanza = replace(replace(stanza, "::", "`"), "\|\|\|", "") | stats values(complete_stanza) as stanza

[corelight_severity_display]
description = Combine severity name and id for display purposes
definition  = eval severity_display = severity_name ." (".severity_id.")"
