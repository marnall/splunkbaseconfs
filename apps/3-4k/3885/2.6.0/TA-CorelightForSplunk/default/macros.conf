[corelight_overview_timechart_iface]
definition = `corelight_evt_metric_iface` |timechart avg(mgmt.*.bytes.mbps) as *_mbps avg(mgmt.*.packets.kpps) as  *_kpps  max(monitor.total.kpps) as mtpr avg(monitor.total.drops.kpps) as "Monitor Traffic Drop Rate" avg(monitor.total.mbps) as mtps| eval t = _time

[corelight_overview_timechart_bro]
definition = `corelight_evt_metric_bro` | rename logs.*_export.lag AS export_* | timechart avg(cpu) as cpu avg(export_*) as export_* avg(logs.*.entries.per-second) as "logs_*" avg(files.*) as files_*

[corelight_overview_timechart_system]
definition = `corelight_evt_metric_system`  | timechart avg(cpu.*.temperature) as "CPU* Temperature" avg(usage.*) AS "* Disk Usage" avg(usage) AS  "Memory Usage"

[corelight_mc_health_check]
definition = index=_internal corelight | eval is_recent = now() - (3600 * 24 * 5), is_recent = if(_time > is_recent,"true", "false")| search is_recent="true"| stats count AS total_failures, latest(message) as message values(is_recent) as ir values(_time) as time by host | eval severity_level = case(total_failures == 0, 0, total_failures > 0, 3)| rename host AS instance | fields instance total_failures message severity_level

[corelight_x509_validity_windows]
definition = eventtype = corelight_x509 | stats dc(ssl_subject) as distinct_subjects by ssl_validity_window | `string_duration(ssl_validity_window)`

[corelight_sensor_lookup_gen]
definition = `corelight_evt_conn` | stats latest(_time) as latest_time values(sourcetype) as sourcetypes by sensor_name | eval sourcetypes=mvjoin(sourcetypes, ",")  | fields - count | inputlookup append=t corelight_systems | eval _time = latest_time, sourcetypes=split(sourcetypes,",") | stats latest(latest_time) as latest_time values(sourcetypes) as sourcetypes by sensor_name | convert ctime(latest_time) as human_latest_time timeformat="%Y-%m-%dT%H:%M:%S%z" | eval sourcetypes = mvjoin(sourcetypes,",")| outputlookup corelight_systems

[corelight_sensor_lookup_single]
definition = inputlookup corelight_systems | stats count by sensor_name | fields - count

[corelight_sensor_lookup_with_default]
definition = `corelight_sensor_lookup_single` | eval sensor_value = sensor_name | append [makeresults | fields - _time | eval sensor_name="All", sensor_value="*"]

[corelight_service_lookup_gen]
definition = `corelight_evt_conn` | stats count by service | fields - count | inputlookup append=t corelight_services | dedup service | outputlookup corelight_services

[corelight_dns_port_lookup_gen]
definition = `corelight_evt_dns` | stats count by id_resp_p | fields - count | inputlookup append=t corelight_dns_ports | dedup id_resp_p | outputlookup corelight_dns_ports

[corelight_dns_record_type_lookup_gen]
definition = `corelight_evt_dns` | stats count by record_type | fields - count | inputlookup append=t corelight_dns_record_types | dedup record_type | outputlookup corelight_dns_record_types

[corelight_files_mime_type_lookup_gen]
definition = `corelight_evt_files` | stats count by mime_type | fields - count | inputlookup append=t corelight_files_mime_types | dedup mime_type | outputlookup corelight_files_mime_types

[corelight_software_types_lookup_gen]
definition = `corelight_evt_software` | stats count by software_type | fields - count | inputlookup append=t corelight_software_types | dedup software_type | outputlookup corelight_software_types

