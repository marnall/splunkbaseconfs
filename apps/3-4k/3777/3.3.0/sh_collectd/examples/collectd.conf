FQDNLookup   false
LoadPlugin logfile
LoadPlugin apache
LoadPlugin cpu
LoadPlugin df
LoadPlugin disk
LoadPlugin interface
LoadPlugin load
LoadPlugin memory
LoadPlugin nginx
LoadPlugin ping
LoadPlugin processes
LoadPlugin protocols
LoadPlugin swap
LoadPlugin tcpconns
LoadPlugin thermal
LoadPlugin uptime
LoadPlugin write_http
<Plugin write_http>
    <Node "node1">
        URL "https://<splunk>:8088/services/collector/raw"
        Header "Authorization: Splunk <hec token>"
        Format "JSON"
        VerifyPeer false
        VerifyHost false
        Metrics true
        StoreRates true
    </Node>
</Plugin>
<Plugin memory>
    ValuesAbsolute true
    ValuesPercentage true
</Plugin>
<Plugin swap>
	ReportByDevice true
	ValuesPercentage true
</Plugin>
<Plugin df>
	ReportByDevice true
        ValuesPercentage true
</Plugin>
<Plugin logfile>
    LogLevel info
    File STDOUT
    Timestamp true
    PrintSeverity false
</Plugin>
<Plugin load>
    ReportRelative true
</Plugin>
<Plugin processes>
	 ProcessMatch "all" "(.*)"
</Plugin>
<Plugin cpu>
  ValuesPercentage true
</Plugin>
<Plugin interface>
	Interface "eth0"
	IgnoreSelected false
	ReportInactive true
	UniqueName false
</Plugin>
<Plugin protocols>
	Value "/^Tcp:/"
	IgnoreSelected false
</Plugin>
<Plugin tcpconns>
	ListeningPorts false
	AllPortsSummary false
	LocalPort "25"
	RemotePort "25"
</Plugin>
<Plugin thermal>
	ForceUseProcfs false
	Device "THRM"
	IgnoreSelected false
</Plugin>
<Plugin apache>
    <Instance "local">
        URL "http://localhost/server-status?auto"
        Server "apache"
    </Instance>
</Plugin>
<Plugin "nginx">
  URL "http://localhost:8080/nginx_status"
</Plugin>
<Plugin "ping">
  Host "splunk.com"
</Plugin>
Include "/etc/collectd.d"

