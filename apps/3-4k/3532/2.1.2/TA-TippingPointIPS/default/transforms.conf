[tpips_action_lookup]
filename = tpips_actions.csv

[tpips_severity_lookup]
filename = tpips_severities.csv

[tpips_vendor_info_lookup]
filename = tpips_vendor_info.csv

[set_sourcetype_event]
REGEX = CEF(?:[^\|\n]*\|)?TippingPoint(?:[^\|\n]*\|){6}
FORMAT = sourcetype::tippingpoint_ips_event
DEST_KEY = MetaData:Sourcetype

[set_sourcetype_audit]
REGEX = ^(?:[^\|\n]*\|){6}[^\|^\n]*$
FORMAT = sourcetype::tippingpoint_sms_audit
DEST_KEY = MetaData:Sourcetype

[set_sourcetype_nsva_event]
REGEX = CEF(?:[^\|\n]*\|)?TippingPoint(?:[^\|\n]*\|){6}
FORMAT = sourcetype::tippingpoint_nsva_event
DEST_KEY = MetaData:Sourcetype

[set_sourcetype_nsva_audit]
REGEX = ^[^\|^\n]*AUDIT[^\|^\n]*$
FORMAT = sourcetype::tippingpoint_nsva_audit
DEST_KEY = MetaData:Sourcetype

[set_sourcetype_error_log]
REGEX = ^[^\|^\n]*(ERROR|error|Error)[^\|^\n]*$
FORMAT = sourcetype::tippingpoint_error_log
DEST_KEY = MetaData:Sourcetype