[Demo WebGL Globe Search]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = visualizations
display.page.search.tab = visualizations
display.visualizations.custom.type = webgl_globe.globe
display.visualizations.custom.webgl_globe.globe.globeAnimate = 0
display.visualizations.custom.webgl_globe.globe.globeBackground = 1
display.visualizations.custom.webgl_globe.globe.globeColor = dark
display.visualizations.custom.webgl_globe.globe.globeControls = 0
display.visualizations.custom.webgl_globe.globe.globeLegend = 1
display.visualizations.type = custom
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = | makeresults count=10000\
| `random_ip_address`\
| eval\
    a=random() % 10, action=case(a<5,"Browse",a<8,"Purchase",a<9,"Wishlist",1=1,"Error")\
| iplocation ip_address\
| search lat=* lon=*\
| geostats count by action

[default]
display.visualizations.custom.webgl_globe.globe.backgroundColor = "#000000"
display.visualizations.custom.webgl_globe.globe.globeAnimate = "false"
display.visualizations.custom.webgl_globe.globe.globeAnimateSpeed = 0
display.visualizations.custom.webgl_globe.globe.globeBackground = "true"
display.visualizations.custom.webgl_globe.globe.globeColor = "dark"
display.visualizations.custom.webgl_globe.globe.globeControls = "true"
display.visualizations.custom.webgl_globe.globe.globeLegend = "true"
display.visualizations.custom.webgl_globe.globe.globeZoom = 0
