[pulse_connectsecure_authentication]
search = sourcetype=pulse:connectsecure (vendor_action="succeeded" OR vendor_action="failed" OR vendor_action="successful")
#tags = authentication

[pulse_connectsecure_start]
search = sourcetype=pulse:connectsecure vendor_action="started"
#tags = network start session vpn

[pulse_connectsecure_end]
search = sourcetype=pulse:connectsecure vendor_action="ended"
#tags = network end session vpn

[pulse_connectsecure_connected]
search = sourcetype=pulse:connectsecure vendor_action="connected"
#tags = network session vpn

[pulse_connectsecure_network_traffic]
search = sourcetype=pulse:connectsecure (vendor_action="Connected" OR vendor_action="Closed")
#tags = network communicate

[pulse_connectsecure_web]
search = sourcetype=pulse:connectsecure:web 
#tags = proxy web

[pulse_connectsecure_change]
search = sourcetype=pulse:connectsecure object="*"
#tags = modify change
