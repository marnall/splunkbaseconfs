definition = tstats sum(all.server_latency) sum(all.hits_count) from datamodel="bigip-avrstats-AVR_STAT_VIP" where (all.tenant="$tenant$") (all.app="$app$") by all.app all.tenant host _time span=`timechart_span` \
| rename sum(all.*) as * all.* as * \
| `data_unit("total_request_size total_response_size", 1)` \
| eval avg_server_latency=server_latency/hits_count
iseval = 0

[kpi_app_tcp_errors_health_search(2)]
args = tenant, app
definition = tstats first(all.abandons) first(all.acceptfails) first(all.connfails) first(all.rxbadcookie) first(all.rxbadseg) first(all.rxbadsum) first(all.rxcookie) first(all.rxrst) first(all.rxsummismatch) first(all.txrexmits) from datamodel="bigip-tmstats-profile_tcp_stat" where all.tenant="$tenant$" all.app="$app$" by host all.app all.tenant _time span=`timechart_span` \
| rename first(all.*) as * max(all.*) as * all.* as * \
| `abs_to_rate("host app tenant", "abandons acceptfails connfails rxbadcookie rxbadseg rxbadsum rxrst rxsummismatch txrexmits")` \
| eval errors_rate=abandons_rate + acceptfails_rate + connfails_rate + rxbadcookie_rate + rxbadseg_rate + rxbadsum_rate + rxrst_rate + rxsummismatch_rate + txrexmits_rate
iseval = 0

[kpi_app_response_codes_health_search(2)]
args = tenant, app
definition = tstats count sum(all.response_code_error) from datamodel="bigip-avrstats-AVR_STAT_WEB_CONSOLIDATED" where all.tenant="$tenant$" all.app="$app$" \
source=bigip.avrstats.AVR_STAT_RESPONSE_CODE by  _time all.tenant all.app span=`timechart_span` \
| rename sum(all.*) as * all.* as *\
| eval response_code_error_pct=(response_code_error/count) * 100
iseval = 0

[kpi_app_uptime_health_search(2)]
args = tenant,app
definition = makeresults | eval down_pct="100" | append [\
| tstats \
    count avg(all.aggr_period)\
    from datamodel="bigip-tmstats-virtual_server_stat" \
    where \
      all.tenant="$tenant$" \
      all.app="$app$"\
    by host all.devicegroup _time span=300s\
| rename avg(all.*) as * all.* as *\
| streamstats current=f window=1 last(_time) as prev_time avg(aggr_period) as aggr_period\
| eval is_down=if(_time - prev_time > (count*aggr_period*1.25), 1, 0)\
| timechart sum(count) as total sum(is_down) as is_down span=300s \
| eval down_pct=round((is_down/total)*100,1) | fillnull value=100 down_pct | fillnull value=1 is_down total]
iseval = 0



