[kpi_app_pool_member_health_search(2)]
args = tenant, app
definition = tstats count from datamodel=bigip-tmsh-pool_member_status where (\
    [| tstats count from datamodel=bigip-tmsh-pool_member_status where ( \
        [| tstats count from datamodel=bigip-objectmodel-virtual-pools where all.tenant="$tenant$" all.app="$app$" by all.pool_name,all.facility,all.devicegroup \
        | fields all.pool_name all.devicegroup])\
        AND all.availability_state!="unknown" AND all.enabled_state="enabled" by all.devicegroup all.pool_name all.pool_member_name all.availability_state _time span=`timechart_span` \
    | rename all.* as * \
    | stats sum(count) as total sum(eval(if(availability_state="offline",count,0))) as offline_state by devicegroup pool_name pool_member_name\
    | eval offline_pct=round((offline_state/total)*100,1) \
    | where offline_pct<90 \
    | fields devicegroup pool_name pool_member_name\
    | rename * as all.*] ) AND all.availability_state!="unknown" AND all.enabled_state="enabled" by all.devicegroup all.pool_name all.pool_member_name all.availability_state _time span=`timechart_span`\
| rename all.* as *  \
| eval unavailable=if(availability_state!="available",count,0) \
| timechart sum(count) as total sum(unavailable) as unavailable span=`timechart_span` \
| eval unavail_pct=round((unavailable/total)*100,1)
iseval = 0

