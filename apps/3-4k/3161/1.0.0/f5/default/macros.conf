[timechart_span]
definition = "600s"
iseval = 1

[calc_host_health_fast(1)]
args = host
definition = `f5_index` source=f5_host_kpi where1=* where2="$host$"\
| stats latest(host_cpu_health) as host_cpu_health,\
latest(host_uptime_health) as host_uptime_health,\
latest(host_mem_health) as host_mem_health,\
latest(host_disk_queue_health) as host_disk_queue_health,\
latest(host_disk_space_health) as host_disk_space_health,\
latest(host_interface_health) as host_interface_health,\
latest(host_failover_health) as host_failover_health,\
latest(host_event_health) as host_event_health,\
latest(_time) as last_calculated by where1, where2\
| appendcols [| makeresults | eval host_uptime_health=0 | eval where2="$host$"]\
| convert ctime(last_calculated) \
| eval device_health=1\
| eval device_health=if(host_cpu_health < 1, device_health - ((1 - host_cpu_health) * .5), device_health)\
| eval device_health=if(host_uptime_health < 1, device_health - ((1 - host_uptime_health) * 1), device_health)\
| eval device_health=if(host_mem_health < 1, device_health - ((1 - host_mem_health) * .2), device_health)\
| eval device_health=if(host_disk_queue_health < 1, device_health - ((1 - host_disk_queue_health) * .3), device_health)\
| eval device_health=if(host_disk_space_health < 1, device_health - ((1 - host_disk_space_health) * .2), device_health)\
| eval device_health=if(host_interface_health < 1, device_health - ((1 - host_interface_health) * .8), device_health)\
| eval device_health=if(host_failover_health < 1, device_health - ((1 - host_failover_health) * .4), device_health)\
| eval device_health=if(host_event_health < 1, device_health - ((1 - host_event_health) * .2), device_health)\
| eval device_health=if(device_health < 0, 0, device_health * 100)\
| rename where1 as devicegroup where2 as host
iseval = 0

