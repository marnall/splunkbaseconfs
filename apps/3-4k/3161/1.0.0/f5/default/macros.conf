[f5_index]
iseval = 0
definition = index=*

# Assign categories to log events
[f5_category]
definition = eval category = source.".".case(isnotnull(category),category,like(_raw,"%ASM%"),"asm",like(_raw,"%AUDIT%"),"audit",like(_raw,"%TCL%"),"irule.error.tcl",like(_raw,"%SECEV%"),"asm",like(_raw,"%]: Rule%"),"irule",like(_raw, "%gtmd%"),"gtm",like(_raw,"%01070727%"),"pool.statechange",like(_raw,"%01070638%"),"pool.statechange", 1=1,"unclassified")
iseval = 0


###########################################################
#
# Macros for converting an absolute and ascending value 
# into a rate
#
###########################################################

[abs_to_rate(2)]
args = key_list, field_list
iseval = 0
definition = eval key=`create_key("$key_list$")`\
| streamstats current=f window=1 \
  `field_expand_streamstats("$field_list$")`\
  last(_time) as prev_time\
  by key\
| eval timeperiod=_time-prev_time\
`field_expand_eval("$field_list$")`\


[create_key(1)]
args = key_list
iseval = 1
disabled = 0
definition = replace("$key_list$", "\s+", "+")

[data_unit(2)]
args = field_list, power
iseval = 0
definition = foreach $field_list$ [| eval <<FIELD>>=round(<<FIELD>>/pow(1024, $power$), 2)]

[field_expand_eval(1)]
args = field_list
iseval = 1
definition = replace("$field_list$", "(\S+)", "| eval \1_rate=if(\1<\1_prev, \1, \1-\1_prev) | eval \1_rate_sec=\1_rate/timeperiod")

[field_expand_streamstats(1)]
args = field_list
iseval = 1
definition = replace("$field_list$", "(\S+)", "last(\1) as \1_prev ")\


[sessionvarsearch(2)]
args = sessionvarfilter, sessionvarfiltervalue
iseval = 1
definition = case(\
"$sessionvarfilter$"="","",\
"$sessionvarfilter$"="raw","$sessionvarfiltervalue$",\
match("$sessionvarfilter$", "^\|"),replace("$sessionvarfilter$", "(.*)(\|)(.*)", "all.\3=\"$sessionvarfiltervalue$\""),\
match("$sessionvarfilter$", "^C1\|"),replace("$sessionvarfilter$", "(.*)(\|)(.*)", "all.customvar1_name=\"\3\" all.customvar1=\"$sessionvarfiltervalue$\""),\
match("$sessionvarfilter$", "^C2\|"),replace("$sessionvarfilter$", "(.*)(\|)(.*)", "all.customvar2_name=\"\3\" all.customvar2=\"$sessionvarfiltervalue$\""),\
match("$sessionvarfilter$", "^C3\|"),replace("$sessionvarfilter$", "(.*)(\|)(.*)", "all.customvar3_name=\"\3\" all.customvar3=\"$sessionvarfiltervalue$\""),\
match("$sessionvarfilter$", "^C4\|"),replace("$sessionvarfilter$", "(.*)(\|)(.*)", "all.customvar4_name=\"\3\" all.customvar4=\"$sessionvarfiltervalue$\""),\
match("$sessionvarfilter$", "^C5\|"),replace("$sessionvarfilter$", "(.*)(\|)(.*)", "all.customvar5_name=\"\3\" all.customvar5=\"$sessionvarfiltervalue$\""),\
0=0,""\
)

