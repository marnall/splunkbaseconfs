###########################################################
#
# Host KPI Searches
#
###########################################################

[kpi_host_uptime_health_search(2)]
args = devicegroup,host
definition = makeresults | eval down_pct="100" | append [\
\
tstats \
    count avg(all.aggr_period)\
    from datamodel="bigip-tmsh-system_status" \
    where \
      all.devicegroup="$devicegroup$" \
      host="$host$"\
    by host all.devicegroup _time span=300s\
| rename avg(all.*) as * all.* as *\
| streamstats current=f window=1 last(_time) as prev_time avg(aggr_period) as aggr_period\
| eval is_down=if(_time - prev_time > (count*aggr_period*1.25), 1, 0)\
| timechart sum(count) as total sum(is_down) as is_down span=300s \
| eval down_pct=round((is_down/total)*100,1) | fillnull value=100 down_pct | fillnull value=1 is_down total]
iseval = 0

[kpi_host_cpu_health_search(2)]
args = devicegroup,host
definition = tstats first(all.idle) first(all.iowait) first(all.irq) first(all.nice) first(all.softirq) first(all.system) first(all.user) from datamodel="bigip-tmstats-cpu_info_stat" where host="$host$" all.devicegroup="$devicegroup$" by host all.devicegroup _time span=`timechart_span` \
| rename first(all.*) as * all.* as * \
| rename cpu_id AS cpu slot_id AS slot \
| `abs_to_rate("host", "idle iowait irq nice softirq system user")` \
| eval total=idle_rate+iowait_rate+irq_rate+nice_rate+softirq_rate+system_rate+user_rate, all_percent=(1-(idle_rate/total))*100
iseval = 0

[kpi_host_mem_health_search(2)]
args = devicegroup,host
definition = tstats avg(all.total_ram) avg(all.used_ram) from datamodel="bigip-tmstats-host_info_stat" where host="$host$" all.devicegroup="$devicegroup$" by host all.devicegroup _time span=`timechart_span` \
| rename  avg(all.*) as * all.* as * \
| eval total_percent=(used_ram/total_ram)*100
iseval = 0

[kpi_host_disk_queue_health_search(2)]
args = devicegroup,host
definition = tstats max(all.avgqu-sz) from datamodel="bigip-tmsh-disk_latency" where host="$host$" all.devicegroup="$devicegroup$" by host all.devicegroup  _time span=`timechart_span` \
| rename max(all.*) as * all.* as * \
| rename avgqu-sz as avgqu_sz
iseval = 0

[kpi_host_failover_health_search(2)]
args = devicegroup,host
definition = search `f5_index` (host="$host$" AND devicegroup="$devicegroup$") (source=bigip.syslog OR source=bigip.log OR source=bigip.snmptrap)  ("targeted failover" OR 010c0044 OR 010c0052 OR 010c0018 OR 01140029 OR 010c006d OR 010c0054 OR 010c003e)\
| stats count
iseval = 0

[kpi_host_disk_space_health_search(2)]
args = devicegroup,host
definition = tstats max(all.perc_used) from datamodel="bigip-tmsh-disk_usage" where host="$host$" all.devicegroup="$devicegroup$" by host all.devicegroup  _time span=`timechart_span` \
| rename max(all.*) as * all.* as *
iseval = 0

[kpi_host_interface_health_search(2)]
args = devicegroup,host
definition = tstats count from datamodel="bigip-tmsh-interface_status" where ( \
    [| tstats count from datamodel="bigip-tmsh-interface_status" where all.interface_name!="mgmt" host="$host$" all.devicegroup="$devicegroup$" by host all.devicegroup all.interface_name all.interface_status _time span=`timechart_span` \
    | rename all.* as * \
    | stats sum(count) as total sum(eval(if(interface_status="up",count,0))) as availability_status by devicegroup host interface_name \
    | eval avail_pct=round((availability_status/total)*100,1) \
    | where avail_pct>10 \
    | fields devicegroup host interface_name \
    | rename * as all.* | rename all.host as host]) AND all.interface_name!="mgmt" host="$host$" all.devicegroup="$devicegroup$" by host all.devicegroup all.interface_name all.interface_status _time span=`timechart_span` \
| rename all.* as * \
| eval unavailable=if(interface_status="down" AND interface_status!="miss",count,0) \
| timechart sum(count) as total sum(unavailable) as unavailable span=`timechart_span` \
| eval unavail_pct=round((unavailable/total)*100,1)
iseval = 0

[kpi_host_event_health_search(2)]
args = devicegroup, host
definition = search `f5_index` (host="$host$" AND devicegroup="$devicegroup$") (source=bigip.syslog OR source=bigip.log OR source=bigip.snmptrap)  ( "Idel enforcer" OR 010d0017 OR 010d0010 OR boot_marker OR 011e0003 OR 01010029 OR 012c0015)\
| stats count
iseval = 0


