###########################################################
#
# KPI Utility calculations
#
###########################################################

###########################################################
# For example: if CPU exceeds 75% in a given aggregation period, call it a violation.

[calc_violations(2)]
args = violation_field,threshold
definition = eval violation=if($violation_field$ > tonumber($threshold$), 1, 0)\
| stats count avg($violation_field$) as $violation_field$ sum(violation) as violations\
| eval violation_perc=round((violations/count)*100,1)\
| table $violation_field$ violation_perc
iseval = 0

# This version allows a "by" clause
[calc_violations(3)]
args = violation_field,threshold,by_clause
definition = eval violation=if($violation_field$ > tonumber($threshold$), 1, 0)\
| stats count avg($violation_field$) as avg_$violation_field$ sum(violation) as violations by $by_clause$\
| eval violation_perc=round((violations/count)*100,1)\
iseval = 0

###########################################################
# For example: if CPU exceeds the pedicted value in a given interval 
# with the supplied precision, call it an outlier.

[calc_prediction(2)]
args = predict_field,upper_pct
definition = timechart span=`timechart_span` avg($predict_field$) as $predict_field$\
| predict upper$upper_pct$=upper $predict_field$ as predicted \
| eval isOutlier=if($predict_field$ > 'upper(predicted)', 1, 0)\
| stats count count(eval(isOutlier=1)) as outliers \
| eval outliers_pct=(outliers/count)*100
iseval = 0


###########################################################
# sub_kpi_threshold: what is the overall value for which we will always call the KPI "bad". 
#           For example, 90% Average CPU would always be considered unhealthy. 
# violation_threshold: The percentage of violations that are considered unhealthy.
# prediction_threshold: The percentage of outliers that are considered unhealthy.

[calc_subkpi(5)]
args = kpi_name,sub_kpi,sub_kpi_threshold, violation_threshold, prediction_threshold
definition = eval $kpi_name$_base=case ($sub_kpi$ > tonumber($sub_kpi_threshold$), 0, \
          violation_perc > tonumber($violation_threshold$) AND outliers_pct > tonumber($prediction_threshold$), 0, \
          violation_perc > tonumber($violation_threshold$), 0.5, outliers_pct > tonumber($prediction_threshold$), 0.5, 1=1, 1)\
| stats count sum($kpi_name$_base) as $kpi_name$_base\
| eval $kpi_name$=round(($kpi_name$_base/count),1)\
| table $kpi_name$
iseval = 0

###########################################################
# These macros just make the Device and Application Health dashboards simpler. 

[calc_violations_graph(2)]
args = violation_field,threshold
definition = eval violation=if($violation_field$ > tonumber($threshold$), 1, 0) \
| timechart span=`timechart_span` max($violation_field$) as $violation_field$ sum(violation) as violation
iseval = 0

[calc_prediction_graph(2)]
args = predict_field,upper_pct
definition = timechart span=`timechart_span` avg($predict_field$) as $predict_field$ \
| predict upper$upper_pct$=upper $predict_field$ as predicted \
| eval isOutlier=if($predict_field$ > 'upper(predicted)', 1, 0)
iseval = 0


###########################################################
# These two macros rely on the pre-calculated KPIs from the
# modular input

[calc_agg_kpi_fast(6)]
args = kpi_type, kpi_name, where1, where2, where1_name, where2_name
definition = `f5_index` source=$kpi_type$ where1="$where1$" where2="$where2$"\
| stats latest($kpi_name$) as $kpi_name$ latest(_time) as last_calculated by where1, where2\
| convert ctime(last_calculated) \
| rename where1 as $where1_name$, where2 as $where2_name$
iseval = 0

[calc_kpi_fast(6)]
args = kpi_type, kpi_name, where1, where2, where1_name, where2_name
definition = `f5_index` source=$kpi_type$ where1="$where1$" where2="$where2$"\
| stats latest($kpi_name$) as $kpi_name$ latest(_time) as last_calculated by where1, where2\
| convert ctime(last_calculated) \
| rename where1 as $where1_name$, where2 as $where2_name$
iseval = 0

[reduce_kpi(2)]
args = kpi_name, by_clause
definition = stats avg($kpi_name$) as $kpi_name$ by $by_clause$\
| eval $kpi_name$=round($kpi_name$,1)\
| table $kpi_name$
iseval = 0

