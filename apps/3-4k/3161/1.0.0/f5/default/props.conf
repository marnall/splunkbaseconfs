[source::bigip.istats.ssli]
LOOKUP-ip_proto = f5_ip_protocol_lookup IPprotocol OUTPUT IPprotocol_name

[source::bigip.tmstats.host_info_stat]
EVAL-used_ram = coalesce(used_ram,total_ram-free_ram)
EVAL-used_swap = coalesce(used_swap,total_swap-free_swap)

[source::bigip.snmptrap]
FIELDALIAS-snmp = 1.3.6.1.6.3.1.1.4.1.0 AS oid
LOOKUP-oid = f5_snmp_trap_oid_lookup oid OUTPUT oid_description, category
