[sn_sec_event_alert]
is_custom = 1
label = Create ServiceNow Security Event
description = Create ServiceNow security event when this alert is triggered
payload_format = json
icon_path = appIcon.png

[sn_sec_incident_alert]
is_custom = 1
label = Create ServiceNow Security Incident
description = Create ServiceNow security incident when this alert is triggered
payload_format = json
icon_path = appIcon.png

[sn_sec_multi_event_alert]
is_custom = 1
label = Create Multiple ServiceNow Security Events
description = Create one ServiceNow security event for each result when this alert is triggered
payload_format = json
icon_path = appIcon.png

[sn_sec_multi_incident_alert]
is_custom = 1
label = Create Multiple ServiceNow Security Incidents
description = Create one ServiceNow security incident for each result when this alert is triggered
payload_format = json
icon_path = appIcon.png
