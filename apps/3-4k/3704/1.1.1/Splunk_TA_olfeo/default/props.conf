[olfeo]
TIME_PREFIX = ^
TIME_FORMAT = %b %e %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 15
SHOULD_LINEMERGE = false
TRUNCATE = 99999
KV_MODE = none

TRANSFORMS-force_sourcetype_olfeo = force_sourcetype_olfeo_filtering,force_sourcetype_olfeo_system

REPORT-olfeo_extractions = olfeo_extractions

EVAL-url_length = len(url)
EVAL-app = "Olfeo"
EVAL-vendor_product = "Olfeo Advanced Proxy"
EVAL-http_method = nullif(http_method, "-")
EVAL-user = nullif(user, "-")

FIELDALIAS-dest = host as dest

LOOKUP-olfeo_status_action_lookup = olfeo_status_action_lookup status OUTPUT status_description, action

[olfeo:filtering]
KV_MODE = none

REPORT-olfeo_extractions_filtering = olfeo_extractions_filtering

[olfeo:system]
KV_MODE = none

REPORT-olfeo_extractions_filtering = olfeo_extractions_system