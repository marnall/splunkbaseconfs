[trustar_all_indicators_cumulative_lookup]
external_type = kvstore
collection = cumulative_indicators
fields_list = _key, _time, type, value, indicator, Enclaves, weight

[trustar_matching_indicators_cumulative_lookup]
external_type = kvstore
collection = cumulative_matched_indicators
fields_list = _key, _time, type, value, indicator, Enclaves

[trustar_false_positive_indicators_cumulative_lookup]
external_type = kvstore
collection = cumulative_false_positive_indicators
fields_list = _key, _time, type, value, indicator

[trustar_indicators_match_result_lookup]
external_type = kvstore
collection = indicators_result_count
fields_list = _key, _time, value, result, index, Enclaves

[trustar_all_reports_cumulative_lookup]
external_type = kvstore
collection = cumulative_reports
fields_list = id, _time, value
