# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 2

[launcher]
version = 4.3.1
author = Netskope, Inc.
description = This Add-on typically imports and enriches data from Netskope API, creating a rich data set ready for direct analysis or use in an App.

[ui]
is_visible = 1
label = NetSkope Add-on For Splunk
docs_section_override = AddOns:released

[package]
id = TA-NetSkopeAppForSplunk

[triggers]
reload.addon_builder = simple
reload.ta_netskopeappforsplunk_account = simple
reload.ta_netskopeappforsplunk_storage_account = simple
reload.ta_netskopeappforsplunk_settings = simple
reload.eventgen = simple

[diag]
extension_script = diag.py
data_limit = 1GB