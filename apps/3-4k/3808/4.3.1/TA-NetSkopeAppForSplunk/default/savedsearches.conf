[Sample Netskope File Hash Alert Action]
action.netskope_file_hash = 1
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 2 * * * *
disabled = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = NetSkopeAppForSplunk
request.ui_dispatch_view = search
search = | makeresults | eval hashes=split("s,a,a",",") | mvexpand hashes | eval file_hash=md5(hashes)

[Sample Netskope URL Alert Action]
action.netskope_url = 1
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 1 * * * *
disabled = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = NetSkopeAppForSplunk
request.ui_dispatch_view = search
search = | makeresults | eval urls=split("something.example.com,erewhon.example.com",",") | mvexpand urls | eval url=urls