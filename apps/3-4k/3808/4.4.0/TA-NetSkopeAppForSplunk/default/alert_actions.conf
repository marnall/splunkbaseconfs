[netskope_file_hash]
python.version = python3
is_custom = 1
disabled = 0
label = Netskope File Hash Alert Action
description = Netskope File Hash Alert Action
icon_path = appIcon_2x.png
payload_format = json
param.global_account =
param.index =
param.action = add
param.file_hash_list_name = splunk_file_hash_list
param.column_name = file_hash
param._cam = {\
    "category": ["Device Control"],\
    "task": ["update"],\
    "subject": ["process.file-scanner"],\
    "technology": [{"vendor": "Netskope", "product": "Netskope"}],\
    "supports_adhoc": true\
}
command = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.global_account=$action.netskope_file_hash.param.global_account$ param.action=$action.netskope_file_hash.param.action$ param.file_hash_list_name=$action.netskope_file_hash.param.file_hash_list_name$ param.column_name=$action.netskope_file_hash.param.column_name$

