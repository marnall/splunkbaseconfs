[imperva:dam:syslog]
SEDCMD-StripHeader=s/^[^{]+//
KV_MODE=json
pulldown_type=1
SHOULD_LINEMERGE = false
TIME_PREFIX = \"real-time\"\:
TIME_FORMAT=%s
TRUNCATE=0
FIELDALIAS-policy-id=policy-id{} as policy-id
FIELDALIAS-policy-name=audit-policy{} as audit-policy
FIELDALIAS-objects-list=objects-list{} as objects-list
FIELDALIAS-db-schema-pair-schema-name=db-schema-pair{}.schema-name as db-schema-pair.schema-name
FIELDALIAS-db-schema-pair-db-name=db-schema-pair{}.db-name as db-schema-pair.db-name
