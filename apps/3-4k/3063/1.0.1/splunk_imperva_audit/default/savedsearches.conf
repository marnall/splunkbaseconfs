[Failed Logins]
action.email.reportServerEnabled = 0
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.fields = ["Audit_Record.db-user","Audit_Record.event-type","Audit_Record.real-time","Audit_Record.source-application","Audit_Record.os-user","o","Source IP","Database Name","Audit_Record.db-schema-pair.db-name","out","source_ip_db_name"]
display.events.type = raw
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = splunk_imperva_audit
request.ui_dispatch_view = search
search = | pivot Imperva_DB_Audit Audit_Record count(Audit_Record) AS "Count of Audit Record" SPLITROW real-time AS "Real Time" SPLITROW db-user AS "Database User" SPLITROW source-application AS "Source Application" SPLITROW os-user AS "OS User" FILTER event-type is Login FILTER sql-error isNotNull SORT 100 real-time ROWSUMMARY 0 COLSUMMARY 0 NUMCOLS 0 SHOWOTHER 1

