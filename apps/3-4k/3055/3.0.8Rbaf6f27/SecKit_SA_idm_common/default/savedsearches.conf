cron_schedule = 0 0 * * *
dispatch.earliest_time = -2h
dispatch.latest_time = now
dispatch.ttl = 10
enableSched = true
request.ui_dispatch_app = SecKit_SA_idm_common
request.ui_dispatch_view = search
schedule_window = auto
allow_skew = 100%
search = |  inputlookup seckit_idm_common_assets_host_expected_tracker_tlookup\
|  where last>now()-(86400*30) \
|  outputlookup create_empty=true createinapp=true seckit_idm_common_assets_host_expected_tracker_tlookup

[seckit_idm_pre_cidr_category_by_str_lookup_ftr]
cron_schedule = */1 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time = now
dispatch.ttl = 10
enableSched = true
request.ui_dispatch_app = SecKit_SA_idm_common
request.ui_dispatch_view = search
schedule_window = auto
allow_skew = 100%
realtime_schedule = 1
run_on_startup = true
run_n_times = 1
is_visible = false
search = | inputlookup seckit_idm_pre_cidr_category_by_str_lookup \
| inputlookup append=t seckit_idm_pre_cidr_category_default_lookup\
| fields + cidr,cidr_pci_domain,cidr_category,cidr_priority,cidr_bunit,cidr_owner\
| stats latest(cidr_pci_domain) as cidr_pci_domain values(cidr_category) as cidr_category, values(cidr_priority) as cidr_priority latest(cidr_bunit) as cidr_bunit latest(cidr_owner) as cidr_owner by cidr\
| eval cidr_priority=case(cidr_priority="critical","critical",cidr_priority="high","high",cidr_priority="medium","medium",0=0,"")\
| eval cidr_category=mvjoin(cidr_category,"|") \
| outputlookup create_empty=true createinapp=true seckit_idm_pre_cidr_category_by_str_lookup\
| stats count

