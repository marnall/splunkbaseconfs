[mac_timechart_count(6)]
args = ind, srctype, field, spantime, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|timechart span=$spantime$ count($field$)

[mac_timechart_count2(6)]
args = ind, srctype, field, spantime, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|timechart span=$spantime$ count($field$)

[mac_timechart_count3(6)]
args = ind, srctype, field, spantime, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|timechart span=$spantime$ count($field$)

[mac_timechart_avg(6)]
args = ind, srctype, field, spantime, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|timechart span=$spantime$ avg($field$)

[mac_timechart_avg2(7)]
args = ind, srctype, field1, field2, spantime, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|timechart span=$spantime$ avg($field1$) avg($field2$)

[mac_bubblechart(7)]
args = ind, srctype, field1, field2, field3, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|stats count by $field1$ $field2$ $field3$

[mac_treemap(7)]
args = ind, srctype, field, parent, child,  early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|stats sum($field$) as sum by $parent$, $child$|fillnull sum

[mac_horizonchart_count(6)]
args = ind, srctype, field, spantime, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|timechart span=$spantime$ count by $field$

[mac_timeline(5)]
args = ind, srctype, field, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|stats last(_time) as _time count range(_time) as duration by $field$|where duration>0|eval duration=(duration*1000)|table _time $field$ duration

[mac_sankey(7)]
args = ind, srctype, field, source, target, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|stats sum($field$) as sum count by $source$ $target$|fillnull sum|where sum>0|head 10

[mac_statusindicator_count(5)]
args = ind, srctype, field, early, late
definition = index=$ind$ sourcetype=$srctype$ $field$!="" earliest=$early$ latest=$late$|stats count| eval range_icon="exclamation-circle" | eval range_color="#F58F39" | table count range_icon range_color

[mac_outlier(5)]
args = ind, srctype, field, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|stats count by $field$|eventstats avg(count) as avg stdev(count) as stdev|where count>(avg+stdev)|sort - count

[mac_kpi_warning(4)]
args = ind, srctype, early, spantime
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$|bucket span=$spantime$ _time|stats count by _time|eventstats min(count) as min max(count) as max|eval KPI=min*count/max | fields - count min max | predict KPI | where 'prediction(KPI)' > .10 AND _time > now()|head 1| eval minutes_until_big_problem = (_time - now())/60| eval dangerzone = case(minutes_until_big_problem <= 1.5, "YES, ESCALATE!", minutes_until_big_problem > 1.5 AND minutes_until_big_problem <= 5, "Maybe, watch it", 1=1, "No")|fields - KPI

[mac_lookup_table_static(7)]
args = ind, srctype, early, lookupname, infield, rename-infield, outfield
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$|lookup $lookupname$ $rename-infield$ as $infield$ OUTPUT $outfield$|stats count($infield$) as count by $outfield$|sort - count

[mac_lookup_table_dynamic(7)]
args = ind, srctype, early, lookupname, infield, rename-infield, outfield
definition = index=$ind$ sourcetype=$srctype$ $infield$!=10.* $infield$!=192.* earliest=$early$|dedup $infield$|head 10|lookup $lookupname$ $rename-infield$ as $infield$ OUTPUT $outfield$|table $infield$ $outfield$

[mac_lookup_chart_static(7)]
args = ind, srctype, early, lookupname, infield, rename-infield, outfield
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$|lookup $lookupname$ $rename-infield$ as $infield$ OUTPUT $outfield$|chart count($infield$) as count by $outfield$

[mac_geostats(6)]
args = ind, srctype, ipfield, field, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|iplocation $ipfield$|geostats count by $field$

[mac_choropleth(6)]
args = ind, srctype, ipfield, field, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|iplocation $ipfield$|stats count by $field$|geom geo_countries featureIdField=Country

[mac_stats_all_by(6)]
args = ind, srctype, field1, field2, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|stats count min($field1$) as min max($field1$) as max first($field1$) as first last($field1$) as last stdev($field1$) as stdev avg($field1$) as avg by $field2$|sort - count

[mac_stats_avg_by(6)]
args = ind, srctype, field1, field2, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|stats avg($field1$) as avg by $field2$|sort - avg

[mac_stats_sparkline(5)]
args = ind, srctype, field, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|stats sparkline count by $field$|sort - count

[mac_stats_by(6)]
args = ind, srctype, field1, field2, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|stats count($field1$) as count by $field2$|sort - count

[mac_top(6)]
args = ind, srctype, field, lim, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|top limit=$lim$ $field$

[mac_top2(6)]
args = ind, srctype, field, lim, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|top limit=$lim$ $field$

[mac_top3(6)]
args = ind, srctype, field, lim, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|top limit=$lim$ $field$

[mac_rare(6)]
args = ind, srctype, field, lim, early, late
definition = index=$ind$ sourcetype=$srctype$ earliest=$early$ latest=$late$|rare limit=$lim$ $field$

[mac_5_stdev_outlier(5)]
args = ind, srctype, early, associated_field, num_field
definition = index=$ind$ sourcetype=$srctype$ $num_field$=* earliest=$early$| eventstats avg($num_field$) as avg stdev($num_field$) as stdev |eval lowerBound=(avg-stdev*exact(5)), upperBound=(avg+stdev*exact(5)) | eval isOutlier=if($num_field$ < lowerBound OR $num_field$ > upperBound, 1, 0)|table $associated_field$ $num_field$  avg stdev lowerBound upperBound isOutlier|where isOutlier=1
