#
# Splunk app configuration file
#

[install]
build = 1
is_configured = 1

[package]
check_for_updates = 0
id = disable_splunk_web

[ui]
is_visible = false
label = Disable Splunk Web

[launcher]
author = Mason Morales
description = This TA disables Splunk Web on any host that it is deployed to. A Splunk restart is required for the change to take effect.
version = 1.0

