[smart_event_details]
display_location = both
fields = hash_key
label = Go to Smart Event Details
link.method = get
link.target = blank
link.uri = /app/cisco-app-candid/smart_event_details_dashboard?eventtimeline=$hash_key$&epochnumber=$epochnum$&form.timetoken.earliest=$timeearliest$&form.timetoken.latest=$timelatest$ 
type = link

[cnae_event_details_viewer]
display_location = both
fields = fab_id,cnae_host,event_uuid,category.name
label = CNAE Event Details Viewer
link.method = get
link.target = blank
link.uri = https://$cnae_host$/#/ui-event-details-viewer?fabric_id=$fab_id$&event_uuid=$event_uuid$&category=$category.name$
type = link

