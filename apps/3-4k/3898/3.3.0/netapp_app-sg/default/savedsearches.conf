[SG-hierarchyLookup]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0-59/15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = `get_sg_index` `get_sg_rest` endpoint=Health_topology_depth_component [ | search `get_sg_index` `get_sg_rest` endpoint=Health_topology_depth_component | head 1 | table executionID ] | table oid name child.name child.oid child.child.name child.child.oid child.child.child.code child.child.child.oid StorageGRID_system | rename oid as grid_oid child.name as site_node_name child.oid as site_oid name as grid_name child.child.name as node_name child.child.oid as node_oid child.child.child.code as component_code, child.child.child.oid as component_oid | eval site_fields = mvzip('site_node_name','site_oid')  | eval site_name = mvindex(split(site_fields,","),0) | eval site_id = mvindex(split(site_fields,","),1) | eval node_fields = mvzip('node_name','node_oid') | eval node_name = mvindex(split(node_fields,","),0) | eval node_oid = mvindex(split(node_fields,","),1) | eval component_fields = mvzip('component_code','component_oid') | eval component_code = mvindex(split(component_fields,","),0) | eval component_oid = mvindex(split(component_fields,","),1) | where (like(node_oid,site_id."%") AND like(component_oid,node_oid."%")) | rex field=component_oid ".*\.(?<component_id>\d+)" | table grid_oid grid_name site_name site_id node_name node_oid component_code component_oid component_id StorageGRID_system | sort component_oid | outputlookup sg_hierarchy.csv

[SG-accountMappingLookup]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0-59/15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = `get_sg_index` `get_sg_rest` endpoint="Account_Usage" | dedup id name | rename id as account_id,name as account_name | table account_id account_name StorageGRID_system  | outputlookup sg_account_mapping.csv

[SG-storagenodeMappingLookup]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0-59/15 * * * *
dispatch.earliest_time = -2h
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = `get_sg_index` `get_sg_rest`  endpoint="Installed_Storage_Capacity"| spath output=installed path=result.value{1} | stats latest(installed) as available by result.metric.instance, StorageGRID_system | eval Installed_Storage_Capacity=round(available/(1000*1000*1000),2) |  table result.metric.instance Installed_Storage_Capacity, StorageGRID_system | join type=left result.metric.instance [ search `get_sg_index` `get_sg_rest`  endpoint="Used_Storage_Capacity_DataBytes"  | spath output=databyte_capacity path=result.value{1} | stats latest(databyte_capacity) as databyte_capacity by result.metric.instance | eval Used_Storage_Capacity_for_Data=round(databyte_capacity/(1000*1000*1000),2) | table result.metric.instance Used_Storage_Capacity_for_Data ] | join type=left result.metric.instance [ search `get_sg_index` `get_sg_rest`  endpoint="Used_Storage_Capacity_MetaBytes"  | spath output=metabyte_capacity path=result.value{1} | stats latest(metabyte_capacity) as metabyte_capacity by result.metric.instance | eval Used_Storage_Capacity_for_Metadata=round(metabyte_capacity/(1000*1000*1000),2) | table result.metric.instance Used_Storage_Capacity_for_Metadata ] | join type=left result.metric.instance [ search `get_sg_index` `get_sg_rest`  endpoint="Usable_Storage_Capacity"  | spath output=usable path=result.value{1} | stats latest(usable) as usable by result.metric.instance | eval Usable_Storage_Capacity=round(usable/(1000*1000*1000),2)  | table result.metric.instance Usable_Storage_Capacity ] |lookup sg_hierarchy node_name as result.metric.instance OUTPUT site_name |eval site_name = mvindex(site_name,0) | outputlookup sg_storagenode_mapping.csv