[Sensor - Lookup Gen]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
run_on_startup = true
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
description = Lookup generation for Sensor
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
search = `fidelis_get_xps_event`  Sensor="*" | dedup Sensor | table Sensor |  inputlookup append=true sensor_lookup | dedup Sensor | outputlookup sensor_lookup

[Malware - Lookup Gen]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
run_on_startup = true
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = */30 * * * *
description = Lookup generation for Malware 
dispatch.earliest_time = -40m
dispatch.latest_time = -10m
enableSched = 1
search=`fidelis_get_xps_event` Malware_name!="<n/a>" Malware_type!="<n/a>"  | dedup Malware_name Malware_type | eval Key=Malware_name | table Key Malware_name Malware_type  | outputlookup malware_name_lookup append=T key_field=Key

[Rule and Policy - Lookup Gen]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
run_on_startup = true
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = */30 * * * *
description = Lookup generation for Rules and Policy 
dispatch.earliest_time = -40m
dispatch.latest_time = -10m
enableSched = 1
search = `fidelis_get_xps_event` Rule="*" Policy="*" | dedup Policy Rule | table Policy Rule |  inputlookup append=true rules_policy_lookup | dedup Policy Rule | outputlookup rules_policy_lookup

[Severity - Lookup Gen]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
run_on_startup = true
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 5 * * * *
description = Lookup generation for Severity
dispatch.earliest_time = -2h
dispatch.latest_time = now
enableSched = 1
search = `fidelis_get_alert_events` | dedup SEVERITY{} | spath path=SEVERITY{} output=Severity | eval Severity=lower(Severity) | mvexpand Severity | table Severity |  inputlookup append=true severity_lookup | dedup Severity | outputlookup severity_lookup 

[Rules - Lookup Gen]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
run_on_startup = true
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 5 * * * *
description = Lookup generation for Rules
dispatch.earliest_time = -2h
dispatch.latest_time = now
enableSched = 1
search = `fidelis_get_alert_events` | dedup RULE_NAME{} | mvexpand RULE_NAME{} | rename RULE_NAME{} as Rule | eval Key=Rule | table Key Rule | outputlookup rules_lookup append=T key_field=Key 

