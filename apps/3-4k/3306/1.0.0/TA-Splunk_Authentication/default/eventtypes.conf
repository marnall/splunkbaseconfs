[splunk_access]
search = (eventtype=splunk_access_failure) OR (eventtype=splunk_access_success)

[splunk_access_failure]
search = index=_internal sourcetype=splunkd status=failure user=*

[splunk_access_success]
search = index=_internal (sourcetype=splunkd_ui_access status=200 user=* file="login" NOT uri_query=*) 