[sourcelog]
definition = ""
iseval = 0

[MACRO_AEROHIVE_QLT]
definition = | eval AEROHIVE_QLT=if(AEROHIVE_RSSI>-100 AND AEROHIVE_RSSI<-50, 2*(AEROHIVE_RSSI+100), NULL)\
| eval AEROHIVE_QLT=if(AEROHIVE_RSSI<-100, 0, AEROHIVE_QLT)\
| eval AEROHIVE_QLT=if(AEROHIVE_RSSI>-51, 100, AEROHIVE_QLT)
iseval = 0

[MACRO_AEROHIVE_DATE]
definition = | eval date = toString(date_wday)+ ", "+toString(date_month)+" "+toString(date_mday)+"th "+toString(date_year)+" - "+ toString(date_hour)+":"+toString(date_minute)+":"+toString(date_second)
iseval = 0

[MACRO_TABLE_FLOW]
definition = | table \
Date\
Raw\
Process\
"Session ID"\
"AP IP"\
"Source IP"\
"Source Port"\
"Destination IP"\
"Destination Port"\
Protocol\
Hostname\
Continent\
Country\
City\
"Session Life Time"
iseval = 0

[MACRO_AEROHIVE_RENAME]
definition = | rename host AS "AP IP"\
| rename AeroHive_Date AS Date\
| rename process AS Process\
| rename AeroHive_Kernel AS Kernel\
| rename AeroHive_Data_All AS Raw\
| rename AeroHive_Session_Src AS "Source IP"\
| rename AeroHive_Src_Port AS "Source Port"\
| rename AeroHive_Session_Dst AS "Destination IP"\
| rename AeroHive_Dst_Port AS "Destination Port"\
| rename AeroHive_Protocole AS Protocol\
| rename AeroHive_Hostname AS Hostname\
| rename AeroHive_LifeTime AS "Session Life Time"\
| rename AeroHive_Mac_Station AS "MAC Station"\
| rename AeroHive_IP AS "IP Station"\
| rename AeroHive_OS AS "OS Station"\
| rename AeroHive_Username AS Username\
| rename AeroHive_Flag AS Flag\
| rename AeroHive_Mac_Attack AS "Mac Attacker"\
| rename AeroHive_IP_Attack AS "IP Attacker"\
| rename AeroHive_Attack_Type AS "IP Attack Type"\
| rename AeroHive_Probe_Resp AS "Probe Response"\
| rename AeroHive_Probe_Req AS "Probe Request"\
| rename AeroHive_Probe_PPM AS "PPM"\
| rename AeroHive_Mac_Attack_SSID  AS "SSID AP"\
| rename AeroHive_Session_ID AS "Session ID"\
| eval AeroHive_Mac_Attack_Type="receiving ".AeroHive_Mac_Attack_Type\
| rename AeroHive_Mac_Attack_Type AS "Mac Attack Type"\
| rename AeroHive_Mac_Attacked AS "Mac Attacked"\
| rename AeroHive_Radlogin_Admin AS "Name of Administrator with Telnet or Serial authentication failed"\
| rename AeroHive_HTTP_Login_Admin AS "Name of Administrator with HTTP or HTTPS authentication failed"\
| rename AeroHive_SSH_Login_Admin AS "Name of Administrator with SSH authentication failed"\
| rename AeroHive_Login_Name AS "Login Name"\
| rename AeroHive_Access_Type AS "Access Type"\
| rename AeroHive_Detector_AP_Reason AS "Reason"\
| rename AEROHIVE_QLT AS "Signal Quality by %" \
| rename AEROHIVE_TYPE AS "AP Type"\
| rename AEROHIVE_RSSI AS "RSSI"\
| rename AEROHIVE_ENC AS "Encryption"\
| rename AEROHIVE_Detector_AP AS "Detector AP"\
| rename AEROHIVE_SSID AS SSID\
| rename AEROHIVE_AP AS "AP MAC"\
| rename AEROHIVE_CH AS "Channel"\
| rename MAC_Company AS "MAC Vendor"
iseval = 0

[MACRO_TABLE_AUTHENTICATION]
definition = | table\
Date\
Raw\
"AP IP"\
"MAC Station"\
"MAC Vendor"\
"IP Station"\
"OS Station"\
Hostname\
Username\
Flag
iseval = 0

[MACRO_AEROHIVE_ACCESS_TYPE]
definition = | eval AeroHive_Access_SSH=if(match(AeroHive_SSH_Login_Admin, " "), " ", "SSH")\
| eval AeroHive_Access_Rad=if(match(AeroHive_Radlogin_Admin, " "), " ", "SERIAL/TELNET")\
| eval AeroHive_Access_HTTP=if(match(AeroHive_HTTP_Login_Admin, " "), " ", "WEB")\
| eval AeroHive_Access_Type=AeroHive_Access_SSH.AeroHive_Access_Rad.AeroHive_Access_HTTP
iseval = 0

[MACRO_TABLE_WIPS]
definition = | table\
 Date\
 Raw\
 "Detector AP"\
 SSID\
 "AP MAC"\
 "MAC Vendor"\
 "Channel"\
 "Encryption"\
 "RSSI"\
 "Signal Quality by %"\
 "AP Type"\
 "Reason"\
 "Spoofing SSID"\
 "Alert Email Address"
iseval = 0
