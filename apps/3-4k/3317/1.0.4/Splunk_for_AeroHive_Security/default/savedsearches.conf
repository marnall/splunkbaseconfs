action.email.bcc = 
action.email.include.results_link = 0
action.email.include.view_link = 0
action.email.message.alert = Hello,\
\
Your WIFI Aerohive equipment $result.AEROHIVE_Detector_AP$ whose IP address is $result.host$ is under attack of type $result.AeroHive_Mac_Attack_Type$.\
\

action.email.priority = 1
action.email.subject.alert = MAC's Denial of Service attack on your wireless access point $result.AEROHIVE_Detector_AP$
action.email.to = $result.AEROHIVE_mail$
action.email.useNSSubject = 1
alert.digest_mode = 0
alert.expires = 12h
alert.severity = 4
alert.suppress = 1
alert.suppress.fields = AEROHIVE_ID
alert.suppress.period = 5m
alert.track = 1
auto_summarize.dispatch.earliest_time = -1d@h
counttype = number of events
cron_schedule = */1 * * * *
display.events.fields = ["host","source","sourcetype","AeroHive_Mac_Attack_Type","AeroHive_Mac_Attack","AEROHIVE_Detector_AP"]
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = Splunk_for_AeroHive_Security
request.ui_dispatch_view = search
search = `sourcelog` L2 DoS NOT station\
earliest=-1m \
"receiving auth frames exceed" OR "receiving deauth frames exceed" OR "receiving probe req frames exceed" OR "receiving probe resp frames exceed" OR "receiving assoc req frames exceed" OR "receiving disassoc frames exceed" OR "receiving EAPoL frames exceed". \
 | lookup Hostname_Mail.csv host OUTPUT AEROHIVE_Detector_AP AEROHIVE_mail \
 | eval AEROHIVE_ID=AeroHive_Mac_Attack_Type.AEROHIVE_Detector_AP

