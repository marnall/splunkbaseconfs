[Authentication Failed]
action.email = 1
action.email.bcc = 
action.email.include.results_link = 0
action.email.include.view_link = 0
action.email.message.alert = Hello,\
\
A person has failed to authenticate with the user name $result.AeroHive_Login_Name$ through a connection $result.AeroHive_Access_Type$ on your WIFI Aerohive equipment $result.AEROHIVE_Detector_AP$ whose IP address is $result.host$.\
\

action.email.priority = 1
action.email.subject.alert = Authentication failure on your wireless access point $result.AEROHIVE_Detector_AP$
action.email.to = $result.AEROHIVE_mail$
action.email.useNSSubject = 1
alert.digest_mode = 0
alert.expires = 12h
alert.severity = 4
alert.suppress = 1
alert.suppress.fields = AEROHIVE_ID
alert.suppress.period = 5m
alert.track = 1
auto_summarize.dispatch.earliest_time = -1d@h
counttype = number of events
cron_schedule = */1 * * * *
display.events.fields = ["host","source","sourcetype","AeroHive_Access_Type","AeroHive_Login_Name","AEROHIVE_Detector_AP"]
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = Splunk_for_AeroHive_Security
request.ui_dispatch_view = search
search = `sourcelog` radlogin OR sshd OR ah_webui \
earliest=-1m \
 | where AeroHive_SSH_Login_Admin!=" " OR AeroHive_Radlogin_Admin!=" " OR AeroHive_HTTP_Login_Admin!=" " \
 | eval AeroHive_Login_Name=AeroHive_SSH_Login_Admin.AeroHive_Radlogin_Admin.AeroHive_HTTP_Login_Admin \
 | lookup Hostname_Mail.csv host OUTPUT  AEROHIVE_Detector_AP AEROHIVE_mail \
 `MACRO_AEROHIVE_ACCESS_TYPE` \
 | eval AEROHIVE_ID=AeroHive_Login_Name.AEROHIVE_Detector_AP
 


