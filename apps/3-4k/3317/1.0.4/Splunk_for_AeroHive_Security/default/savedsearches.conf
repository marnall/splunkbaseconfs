[SSID Spoofing Attack]
action.email = 1
action.email.bcc =
action.email.include.results_link = 0
action.email.include.view_link = 0
action.email.message.alert = Hello,\
\
Your WIFI Aerohive equipment $result.AEROHIVE_Detector_AP$ has detected a spoofing of the SSID WIFI $result.AEROHIVE_Alert$ by equipment transmitting on the channel $result.AEROHIVE_CH$ at a power of $result.AEROHIVE_RSSI$ dB.\
\

action.email.priority = 1
action.email.subject.alert = SSID's spoofing attack on your wireless access point $result.AEROHIVE_Detector_AP$
action.email.to = $result.AEROHIVE_mail$
action.email.useNSSubject = 1
alert.digest_mode = 0
alert.expires = 12h
alert.severity = 4
alert.suppress = 1
alert.suppress.fields = AEROHIVE_ID
alert.suppress.period = 5m
alert.track = 1
auto_summarize.dispatch.earliest_time = -1d@h
counttype = number of events
cron_schedule = */1 * * * *
display.events.fields = ["host","source","sourcetype","AEROHIVE_Detector_AP","AEROHIVE_AP","AEROHIVE_SSID","AEROHIVE_CH","AEROHIVE_ENC","AEROHIVE_RSSI","AEROHIVE_TYPE"]
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = Splunk_for_AeroHive_Security
request.ui_dispatch_view = search
search = `sourcelog`\
earliest=-1m \
AEROHIVE_TYPE=rogue \
AEROHIVE_AP=* \
AEROHIVE_CH=* \
AEROHIVE_RSSI=* \
| lookup Hostname_Mail.csv AEROHIVE_Detector_AP OUTPUTNEW AEROHIVE_mail SSID1 SSID2 SSID3 SSID4 SSID5 \
| eval AEROHIVE_Alert=case(AEROHIVE_SSID=SSID1, SSID1, AEROHIVE_SSID=SSID2, SSID2, AEROHIVE_SSID=SSID3, SSID3, AEROHIVE_SSID=SSID4, SSID4, AEROHIVE_SSID=SSID5, SSID5) \
| where AEROHIVE_Alert=SSID1 OR AEROHIVE_Alert=SSID2 OR AEROHIVE_Alert=SSID3 OR AEROHIVE_Alert=SSID4 OR AEROHIVE_Alert=SSID5 \
| eval AEROHIVE_ID=AEROHIVE_Alert.AEROHIVE_Detector_AP \
| rename AEROHIVE_AP_7Digit AS MAC_OUI \
| lookup MAC_OUI.csv  MAC_OUI  OUTPUTNEW "MAC_Company"

[IP DoS Attack]
action.email = 1
action.email.bcc = 
action.email.include.results_link = 0
action.email.include.view_link = 0
action.email.message.alert = Hello,\
\
Your WIFI Aerohive equipment $result.AEROHIVE_Detector_AP$ whose IP address is $result.host$ is under attack of type $result.AeroHive_Attack_Type$ by equipment whose physical address is $result.AeroHive_Mac_Attack$ / $result.MAC_Company$.\
\

action.email.priority = 1
action.email.subject.alert = IP attack on your wireless access point $result.AEROHIVE_Detector_AP$
action.email.to = $result.AEROHIVE_mail$
action.email.useNSSubject = 1
alert.digest_mode = 0
alert.expires = 12h
alert.severity = 4
alert.suppress = 1
alert.suppress.fields = AEROHIVE_ID
alert.suppress.period = 5m
alert.track = 1
auto_summarize.dispatch.earliest_time = -1d@h
counttype = number of events
cron_schedule = */1 * * * *
display.events.fields = ["host","source","sourcetype","AeroHive_Attack_Type","AeroHive_Mac_Attack","AEROHIVE_Detector_AP"]
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = Splunk_for_AeroHive_Security
request.ui_dispatch_view = search
search = `sourcelog`\
earliest=-1m \
AeroHive_Mac_Attack=* \
(AeroHive_Attack_Type="port scan attack" OR AeroHive_Attack_Type="ICMP flood attack" OR AeroHive_Attack_Type="UDP flood attack" OR AeroHive_Attack_Type= "SYN flood attack" OR AeroHive_Attack_Type= "ARP flood attack" OR AeroHive_Attack_Type="IP Spoof attack" OR AeroHive_Attack_Type="Address sweep attack" OR AeroHive_Attack_Type="RADIUS Attack") \
 | lookup Hostname_Mail.csv host OUTPUT AEROHIVE_Detector_AP AEROHIVE_mail \
 | eval AEROHIVE_ID=AeroHive_Attack_Type.AEROHIVE_Detector_AP \
 | rename AeroHive_Mac_Attack_7Digit AS MAC_OUI \
 | lookup MAC_OUI.csv  MAC_OUI  OUTPUTNEW "MAC_Company" 
 
