[manual]
SHOULD_LINEMERGE = false
LINE_BREAKER = true

[syslog]
EXTRACT-AEROHIVE_Detector_AP = (?i)AP\((?P<AEROHIVE_Detector_AP>[^)]+)
EXTRACT-AEROHIVE_SSID = (?i)SSID\s(?P<AEROHIVE_SSID>[^,]+)
EXTRACT-AEROHIVE_AP = (?i)AP\s(?P<AEROHIVE_AP>[^ ]*)
EXTRACT-AEROHIVE_CH = (?i)CH\s(?P<AEROHIVE_CH>[^,]+)
EXTRACT-AEROHIVE_ENC = (?i)ENC\s(?P<AEROHIVE_ENC>[^,]+)
EXTRACT-AEROHIVE_RSSI = (?i)RSSI\s(?P<AEROHIVE_RSSI>[^,]+)
EXTRACT-AEROHIVE_TYPE = (?i)Type\s(?P<AEROHIVE_TYPE>[^,]+)
EXTRACT-AeroHive_OS = (?i) OS (?P<AeroHive_OS>[^,]+)
EXTRACT-AeroHive_Username = (?i) username\s(?P<AeroHive_Username>.+)hostname
EXTRACT-AeroHive_IP = (?i) ip (?P<AeroHive_IP>[^ ]+)
EXTRACT-AeroHive_Mac_Station = (?i) Station (?P<AeroHive_Mac_Station>[^ ]+)
EXTRACT-AeroHive_Hostname = (?i) hostname (?P<AeroHive_Hostname>[^ ]+)
EXTRACT-AeroHive_Mac = (?i) Station (?P<AeroHive_Mac>[^ ]+)
EXTRACT-AeroHive_Dst_Port = (?i)^(?:[^\.]*\.){9}\d+/(?P<AeroHive_Dst_Port>[^,]+)
EXTRACT-AeroHive_Flag = (?i), flag = (?P<AeroHive_Flag>[^ ]+)
EXTRACT-AeroHive_Kernel = (?i) kernel: (?P<AeroHive_Kernel>[^\.]+)
EXTRACT-AeroHive_Protocole = (?i)^[^,]*,\s+(?P<AeroHive_Protocole>\w+\s+\d+)
EXTRACT-AeroHive_Src_Port = (?i)^(?:[^\.]*\.){6}\d+/(?P<AeroHive_Src_Port>[^ ]+)
EXTRACT-AeroHive_LifeTime = (?i) lifetime (?P<AeroHive_LifeTime>[^,]+)
EXTRACT-AeroHive_Session_Dst = (?i) ->(?P<AeroHive_Session_Dst>[^/]+)
EXTRACT-AeroHive_Session_Src = (?i)^[^\)]*\)\s+(?P<AeroHive_Session_Src>[^/]+)
EXTRACT-AeroHive_Date = (?i)^(?P<AeroHive_Date>.+?)\s+\d+\.
EXTRACT-AeroHive_Data_All = (?i)^(?:[^ ]* ){5}(?P<AeroHive_Data_All>.+)
EXTRACT-AeroHive_Ah_Auth = (?i) ah_auth: (?P<AeroHive_Ah_Auth>[^ \.]+)
EXTRACT-AeroHive_IP_Attack = (?i)\((?P<AeroHive_IP_Attack>[^)]+)
EXTRACT-AeroHive_Attack_Type = wifi...\s(?P<AeroHive_Attack_Type>\w+\s+\w+\s+\w+\s+)
EXTRACT-AeroHive_Mac_Attack = from\s(?P<AeroHive_Mac_Attack>.{14})
EXTRACT-AeroHive_Probe_Resp = \)\: (?P<AeroHive_Probe_Resp>(receiving probe resp frames exceed )+)
EXTRACT-AeroHive_Probe_Req = \)\: (?P<AeroHive_Probe_Req>(receiving probe req frames exceed )+)
EXTRACT-AeroHive_Probe_PPM = exceed (?P<AeroHive_Probe_PPM>[^ ]+)
EXTRACT-AeroHive_Mac_Attack_SSID = (?i)\((?P<AeroHive_Mac_Attack_SSID>[^)]+)
EXTRACT-AeroHive_MAC_Deauth_Frames = \)\: (?P<AeroHive_MAC_Deauth_Frames>(receiving deauth frames exceed )+)
EXTRACT-AeroHive_Session_ID = (?i)IP session \(id (?P<AeroHive_Session_ID>[^)]+)
EXTRACT-AeroHive_Mac_Attack_Type = (receiving)(?P<AeroHive_Mac_Attack_Type>.+(exceed)+)
EXTRACT-AeroHive_Mac_Attacked = station\s(?P<AeroHive_Mac_Attacked>.{14})
EXTRACT-AeroHive_Radlogin_Type = type\s(?P<AeroHive_Radlogin_Type>[^,]+)
EXTRACT-AeroHive_Radlogin_Admin = , username\s(?P<AeroHive_Radlogin_Admin>[^.]+)
EXTRACT-AeroHive_SSH_Login_Admin = Failed password for\s(?P<AeroHive_SSH_Login_Admin>[^\s]+)
EXTRACT-AeroHive_HTTP_Login_Admin = ah_webui: Admin "<(?P<AeroHive_HTTP_Login_Admin>[^>"]+)
EXTRACT-AeroHive_Detector_AP_Reason = (?i)Reason\s\(\s(?P<AeroHive_Detector_AP_Reason>[^\s]+)
EXTRACT-AEROHIVE_MAC_Station_7Digit = (?i)Station\s(?P<AEROHIVE_MAC_Station_7Digit>[^.]{7})
EXTRACT-AeroHive_Mac_Attack_7Digit = (?i)from\s(?P<AeroHive_Mac_Attack_7Digit>[^.]{7})
EXTRACT-AeroHive_Mac_Attacked_7Digit = (?i)station\s(?P<AeroHive_Mac_Attacked_7Digit>[^.]{7})
EXTRACT-AEROHIVE_AP_7Digit = (?i)AP\s(?P<AEROHIVE_AP_7Digit>[^.]{7})
EVAL-AeroHive_SSH_Login_Admin = coalesce(AeroHive_SSH_Login_Admin," ")
EVAL-AeroHive_Radlogin_Admin = coalesce(AeroHive_Radlogin_Admin," ")
EVAL-AeroHive_HTTP_Login_Admin = coalesce(AeroHive_HTTP_Login_Admin," ")
EVAL-AeroHive_IP = coalesce(AeroHive_IP," ")
EVAL-AeroHive_OS = coalesce(AeroHive_OS," ")
EVAL-AeroHive_Hostname = coalesce(AeroHive_Hostname," ")
EVAL-AeroHive_Username = coalesce(AeroHive_Username," ")
EVAL-AeroHive_Flag = coalesce(AeroHive_Flag," ")
EVAL-AEROHIVE_Alert = coalesce(AEROHIVE_Alert," ")


