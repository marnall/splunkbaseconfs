[testcases]
pulldown_type = true
KV_MODE = json
DATETIME_CONFIG =
NO_BINARY_CHECK = true
TRUNCATE = 0
disabled = false
SHOULD_LINEMERGE = false
FIELDALIAS-aggregate_report_name = aggregate_report_name AS report_name
FIELDALIAS-browser = browser AS env.browser
FIELDALIAS-feature = feature AS category
FIELDALIAS-os = os AS env.os
FIELDALIAS-product = product AS product_name
FIELDALIAS-qa_git_branch = qa_git_branch AS qa_branch
FIELDALIAS-qa_git_commit = qa_git_commit AS qa_commit
FIELDALIAS-splunk_build_branch = splunk_build_branch AS product_branch
FIELDALIAS-splunk_build_commit = splunk_build_commit AS commit
FIELDALIAS-failure_message = failure.message AS failure_message
FIELDALIAS-failure_content = failure.content AS failure_content
FIELDALIAS-error_message = error.message AS error_message
FIELDALIAS-error_content = error.content AS error_content
FIELDALIAS-skipped_message = skipped.message AS skipped_message
FIELDALIAS-skipped_content = skipped.content AS skipped_content
FIELDALIAS-time = time AS duration
FIELDALIAS-trigger_job_name = root_trigger as trigger_job_name
FIELDALIAS-trigger_build_no =  root_trigger_build_no as trigger_build_no
EVAL-status = case(isnotnull(failure_message), "FAILED", isnotnull(error_message), "ERROR", isnotnull(skipped_message), "SKIPPED", (isnull(failure_message) AND isnull(error_message) AND isnull(skipped_message)), "PASSED")

