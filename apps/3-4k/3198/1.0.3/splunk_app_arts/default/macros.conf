[extract_exception]
definition = eval failure_content=coalesce(failure_content, error_content) | rex field=failure_content "(?m)^E\s+((?<exception>.+?)(?<=assert) (?<exception_message>.+)|(?<assert>[^\"^]+?): (?<assert_message>.+)|(?<exception2>[^\"^]+))$" | eval exception= coalesce(exception, assert, exception2) | eval exception_message= coalesce(exception_message, assert_message) | eval exception=if(isnull(exception), "unknown exception", exception) | eval exception_message=if(isnull(exception_message), "unknown exception message", exception_message) | eval exception_message=replace(exception_message, "^(.{300}).*","\1...")
iseval = 0

[get_deltaS(2)]
args = last_value, current_value
definition = eval deltaS=$current_value$-$last_value$|eval syn=if(deltaS>0, "(+", "(")|eval deltaS =toString($current_value$)+syn+toString(deltaS)+")"
iseval = 0

[filter_tag]
definition = tags category, classname, name, method, full_name, full_method, trigger_job_name_category, trigger_job_name_classname, trigger_job_name_name, trigger_job_name_method, trigger_job_name_full_name, trigger_job_name_full_method
iseval = 0

[expand_fields]
definition = eval method=mvindex(split(name, "["),0) | eval full_name=classname.".".name | eval full_method=classname.".".method | eval trigger_job_name_full_method=trigger_job_name.".".full_method | eval trigger_job_name_full_name=trigger_job_name.".".full_name | eval trigger_job_name_method=trigger_job_name.".".method | eval trigger_job_name_name=trigger_job_name.".".name | eval trigger_job_name_classname=trigger_job_name.".".classname | eval trigger_job_name_category=trigger_job_name.".".category| eval html_report_url=build_url."HTML_Report/" | eval s3_url=build_url."s3/"
iseval = 0

[generate_full_name_with_tag]
definition = eval notes=mvjoin(tag,",") | eval duration=round(duration,2) | eval full_name_with_tag=if(isnotnull(tag),"[notes:"+notes+"]====>"+full_name+"........"+duration +"s",full_name+"........"+if(isnull(duration), "0", duration)+"s")
iseval = 0

[fields_for_testcase_viewer]
definition = `extract_exception` | eval event_content = coalesce(failure_content, error_content, skipped_content) | eval _raw = full_name | rex mode=sed field=_raw "s/$/\n \n/g"| eval _raw = _raw + exception + ": " + exception_message | rex mode=sed field=_raw "s/$/\n \n \n/g" | eval _raw = _raw + event_content | fields build_url classname duration category full_method full_name html_report_url s3_url status name method trigger_job_name_category trigger_job_name_classname trigger_job_name_name trigger_job_name_method trigger_job_name_full_name trigger_job_name_full_method
iseval = 0

[filter_fields]
definition = fields product, trigger_job_name, trigger_build_no, os.env, failure_content, error_content, skipped_content, category, classname, name, method, full_name, full_method, trigger_job_name_category, trigger_job_name_classname, trigger_job_name_name, trigger_job_name_method, trigger_job_name_full_name, trigger_job_name_full_method, status, duration, exception, exception_message
iseval = 0

[generate_cluster]
definition = cluster field=exception_message showcount=t labelonly=t match=ngramset
iseval = 0

