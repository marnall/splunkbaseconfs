[base10convert-command]
syntax = base10convert <decimal number> <base>
shortdesc = base10convert converts decimal number to any base number
description = Pass any decimal field(e.g. "jobid") available in your events with desired base(e.g. 8) and a new field(e.g. "jobid_base_8") will be returned in the events
example1 = ... | base10convert <decimal number> <base>
usage = public

[base10convert-options]
syntax = number number
