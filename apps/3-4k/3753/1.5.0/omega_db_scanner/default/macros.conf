[mc_vln]
definition = index=omega_ds \
| table\
_time,\
SCAN_ID,\
DB_NAME,\
DB_HOST,\
VLN_ID,\
VLN_NAME,   \
SEVERITY_ID,\
SEVERITY_NAME,\
CATEGORY_ID, \
CATEGORY_NAME,\
SCAN_CODE_ID,\
SCAN_CODE_NAME,\
SCAN_MESSAGE,\
CTRL_FIND_ID,\
CTRL_FIND_NAME,\
CTRL_SUMMARY,\
CTRL_OUTPUT
iseval = 0

[mc_comp(2)]
args = Scan_Id_Run,Scan_Id_Baseline
definition = index=omega_ds SCAN_ID= $Scan_Id_Run$ \
| join VLN_ID type=outer \
[ \
SEARCH index=omega_ds SCAN_ID=$Scan_Id_Baseline$\
| rename SCAN_ID as SCAN_ID_BS, CTRL_FIND_ID as CTRL_FIND_ID_BS, CTRL_FIND_NAME as CTRL_FIND_NAME_BS,\
CTRL_SUMMARY as CTRL_SUMMARY_BS \
]\
| rename SCAN_ID as SCAN_ID_RUN, CTRL_FIND_ID as CTRL_FIND_ID_RUN, CTRL_FIND_NAME as CTRL_FIND_NAME_RUN,\
CTRL_SUMMARY as CTRL_SUMMARY_RUN \
| eval CNT_SMR_RUN = Coalesce(mvcount(split(CTRL_SUMMARY_RUN,","))-1, 0)\
| eval CNT_SMR_BS = Coalesce(mvcount(split(CTRL_SUMMARY_BS,","))-1, 0)\
\
| eval CMP_CODE = If(IsNull(CTRL_FIND_ID_BS), \
"Aborted", \
If(CTRL_FIND_ID_RUN=-1, "Aborted",  \
If(CTRL_FIND_ID_BS=-1, "Aborted", "NOERR")\
)\
)\
\
| eval CMP_CODE = If(CMP_CODE="NOERR", \
If(CTRL_FIND_ID_RUN==CTRL_FIND_ID_BS, \
"Unchanged", \
If(CTRL_FIND_ID_RUN==0, "Control Improve", "Control Decline")\
), \
CMP_CODE\
) \
\
| eval CMP_CODE = If((CTRL_FIND_ID_RUN==1 AND CTRL_FIND_ID_BS==1 AND CNT_SMR_RUN!=CNT_SMR_BS), \
If(CNT_SMR_RUN<CNT_SMR_BS, "Minor Improve", "Minor Decline"),\
CMP_CODE\
)\
\
| eval CMP_CODE = If(CMP_CODE="Unchanged", \
if( CTRL_FIND_ID_RUN==1 AND CTRL_FIND_ID_BS==1 AND CTRL_SUMMARY_RUN!=CTRL_SUMMARY_BS,\
"Change",\
CMP_CODE\
), \
CMP_CODE\
)\
\
| table _time, \
VLN_ID, VLN_NAME, CATEGORY_NAME, SEVERITY_NAME, \
SCAN_ID_RUN, SCAN_ID_BS, \
CTRL_FIND_ID_RUN, CTRL_FIND_NAME_RUN, CNT_SMR_RUN, \
CTRL_FIND_ID_BS, CTRL_FIND_NAME_BS, CNT_SMR_BS,\
CMP_CODE,\
CTRL_SUMMARY_RUN, CTRL_SUMMARY_BS\
| SORT VLN_ID
iseval = 0
