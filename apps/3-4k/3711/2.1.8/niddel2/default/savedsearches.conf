[niddel2_firewall]
description = Scheduled search to send aggregated firewall data to a Niddel Magnet for analysis. Automatically generated by the Collection setup page JavaScript code ($SPLUNK_HOME/etc/apps/niddel2/appserver/static/js/views/NiddelCollectionView.js).
cron_schedule = 0 * * * *
enableSched = false
schedule_window = 15
disabled = true
dispatch.earliest_time = @h-2h
dispatch.latest_time = @h-1h
max_concurrent = 1
search = placeholder

