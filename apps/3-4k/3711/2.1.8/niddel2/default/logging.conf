[loggers]
keys = root, splunklib, magnetsdk2, NiddelOrganizationsCommand, NiddelParseUrlCommand, NiddelSend, NiddelOrganizationTopology, NiddelREST

[logger_root]
level = WARNING
handlers = stderr

[logger_splunklib]
qualname = splunklib
level = WARNING
handlers = app, stderr
propagate = 0

[logger_magnetsdk2]
qualname = magnetsdk2
level = DEBUG
handlers = app, stderr
propagate = 0

[logger_NiddelOrganizationsCommand]
qualname = NiddelOrganizationsCommand
level = DEBUG
handlers = app, stderr
propagate = 0

[logger_NiddelParseUrlCommand]
qualname = NiddelParseUrlCommand
level = DEBUG
handlers = app, stderr
propagate = 0

[logger_NiddelSend]
qualname = NiddelSend
level = DEBUG
handlers = app, stderr
propagate = 0

[logger_NiddelOrganizationTopology]
qualname = NiddelOrganizationTopologyCommand
level = DEBUG
handlers = app, stderr
propagate = 0

[logger_NiddelREST]
qualname = NiddelREST
level = DEBUG
handlers = app
propagate = 0

[handlers]
keys = app, stderr

[handler_app]
class = logging.handlers.RotatingFileHandler
level = DEBUG
args = ('%(SPLUNK_HOME)s/var/log/splunk/niddel2.log', 'a', 524288000, 9, 'utf-8', True)
formatter = app

[handler_stderr]
# Select this handler to log events to stderr which splunkd redirects to the associated job's search.log file
class = logging.StreamHandler
level = NOTSET
args = (sys.stderr,)
formatter = app

[formatters]
keys = app

[formatter_app]
format = %(asctime)s Level=%(levelname)s, Pid=%(process)s, Logger=%(name)s, File=%(filename)s, Line=%(lineno)s, %(message)s
datefmt = %Y-%m-%d %H:%M:%S %z
