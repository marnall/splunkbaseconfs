[piTemp]
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -3mon@d
cron_schedule = 0 0 * * *
description = returns the temperature of the raspberrypi
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
search = index=pi-health source=temp | rex field=_raw "temp=(?<piTemp>\d*.\d*)"
disabled = 0

[piVolts]
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -3mon@d
cron_schedule = 0 0 * * *
description = returns the voltage of the raspberrypi cpu
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
search = index=pi-health source=volts | rex field=_raw "volt=(?<piVolts>\d*.\d*)"
disabled = 0

[piClock]
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -3mon@d
cron_schedule = 0 0 * * *
description = returns the clock speed of the raspberrypi in MHz
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
search = index=pi-health source=clock | rex field=_raw "=(?<piClock_Hz>\d*)" | eval piClock_MHz=round((piClock_Hz/1000/1000),2)
disabled = 0

[piLoad]
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -3mon@d
cron_schedule = 0 0 * * *
description = returns CPU load averages from 1, 5 and 10min intervals from top
search = index=pi-health source=top | rex field="_raw" "load average: (?<load_1>\d*.\d*),\s(?<load_5>\d*.\d*),\s(?<load_10>\d*.\d*)\s"
disabled = 0

[piMem]
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -3mon@d
cron_schedule = 0 0 * * *
description = pi memory usage
search = index=pi-health source=top | rex field="_raw" "KiB Mem:\s*(?<memTotal>\d*) total,\s*(?<memUsed>\d*) used,\s*(?<memFree>\d*) free,\s*(?<memBuffers>\d*)"
disabled = 0

[piDisk]
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -3mon@d
cron_schedule = 0 0 * * *
description = return disk space info
search = index=pi-health source=df | rex field="_raw" "total\s*(?<dskTotal>\d*)\s(?<dskUsed>\d*)\s*(?<dskAvail>\d*)\s*(?<dskPercent>\d*)"
disabled = 0

[piTop]
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -3mon@d
cron_schedule = 0 0 * * *
description = returns top
search = index=pi-health source=top | rex field="_raw" "Tasks:\s*(?<tasksTotal>\d*) total,\s*(?<tasksRunning>\d*) running,\s*(?<tasksSleeping>\d*) sleeping,\s*(?<tasksStopped>\d*) stopped,\s*(?<tasksZombie>\d*)"
disabled = 0
