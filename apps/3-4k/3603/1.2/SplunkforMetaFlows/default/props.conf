[metaflows-syslog]
DATETIME_CONFIG = CURRENT
#TRANSFORMS-strip-syslog = syslog-header-stripper-pri-ts-host-proc, setnull
TRANSFORMS-strip-syslog = syslog-header-stripper-pri-ts-host-proc
EXTRACT-syslog =  ^\<(?P<syslogpriority>\d+)\> 
EXTRACT-evtype =  ^(\<\d+\>)?[^\{\n]*\{(?P<type>\d+),\d+} 
EXTRACT-sensor =  ^(\<\d+\>)?(?P<sensor>[^ ]+):(\s+\{\d+,\d+\})
EXTRACT-domain =  ^(\<\d+\>)?[^.]+(?P<domain>[^ ]+):(\s+\{\d+,\d+\})
EXTRACT-priority =^(\<\d+\>)?([^,\n]*{\d+,(?P<priority>\d+)})
EXTRACT-srca =    ^(\<\d+\>)?[^\n]*\{\w+\}\s+(?P<srca>[^ :]+)
EXTRACT-srcp =    ^(\<\d+\>)?(?:[^\}\n]*\}){2}\s+\d+\.\d+\.\d+\.\d+:(?P<srcp>[^0]\d+)
EXTRACT-dsta =    ^(\<\d+\>)?[^<>\n]*[><-]+\s+(?P<dsta>\d+\.\d+\.\d+\.\d+)
EXTRACT-dstp =    ^(\<\d+\>)?[^<\n]*[><-]+\s+\d+\.\d+\.\d+\.\d+:(?P<dstp>[^0]\d+)
#EXTRACT-message = ^(\<\d+\>)?[^\n]*\{\d+,\d+\}\s+\[[^\]]+\]\s+(?P<message>.*)\s{[^}]+}
#EXTRACT-message = ^(\<\d+\>)?[^\n]*\{\d+,\d+\}\s+\[[^\]]+\]\s+(?P<message>.*?)\s((smac|dmac)=)?(?P<smac>[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2})?((dmac)=)?(?P<dmac>[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2})?\s?{[^}]+}
EXTRACT-message = ^(\<\d+\>)?[^\n]*\{\d+,\d+\}\s+\[[^\]]+\]\s+(?P<message>.*?)\s*((smac|dmac)=)?(?P<smac>([a-f0-9]{2}[ :][a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2})(,([a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}))*)?\s?((dmac)=)?(?P<dmac>([a-f0-9]{2}[: ][a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2})(,([a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}))*)?\s?{[^}]+}
EXTRACT-bothunter = ^(\<\d+\>)?[^\n]+(?P<bothunter>Bothunter\/[\S]+)\s(?P<report>[\S]+)\s
EXTRACT-urllinkin = ^(\<\d+\>)?[^\n]+(?P<urllink>URL-inbound)\/url\s_:(?P<urllinkin>[\S]+)\s(?P<hashin>[\S]+)\s
EXTRACT-urlloutkin = ^(\<\d+\>)?[^\n]+(?P<urllink>URL-outbound)\/url\s_:(?P<urllinkout>[\S]+)\s(?P<hashout>[\S]+)\s
EXTRACT-filein=   ^(\<\d+\>)?[^\n]+(?P<file>File-inbound)\/(?P<filetype>[\S]+)\s(?P<urlin>[\S]+)?\s(?P<hashin>[\S]+)\s
EXTRACT-fileout=  ^(\<\d+\>)?[^\n]+(?P<file>File-outbound)\/(?P<filetype>[\S]+)\s(?P<urlout>[\S]+)?\s(?P<hashout>[\S]+)\s
EXTRACT-modsecin=  ^(\<\d+\>)?[^\n]+(?P<modsec>modsec_in)\/(?P<modsecsev>[\S]+)\/(?P<modsecsid>[\S]+)\s(?P<modsecmessage>.+)\s\{IP\}
EXTRACT-modsecout=  ^(\<\d+\>)?[^\n]+(?P<modsec>modsec_out)\/(?P<modsecsev>[\S]+)\/(?P<modsecsid>[\S]+)\s(?P<modsecmessage>.+)\s\{IP\}
EXTRACT-macwatch= ^(\<\d+\>)?[^\n]+(?P<macwatch>MACwatch)\/[\S]+:\s(?P<newmac>[a-f0-9]{2}:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2}\:[a-f0-9]{2})\s
#Rank/Priority_Threat2/13_107_4_50
EXTRACT-rank = ^(\<\d+\>)?[^\n]+(?P<rank>Rank)\/(?P<classname>[\S]+)\/(?P<classip>[\S]+)\s
EXTRACT-track = ^(\<\d+\>)?[^\n]+(?P<track>Tracker)\/(?P<classname>[\S]+)\/(?P<classip>[\S]+):\s(?P<report>[\S]+)
#[service:0] /user/dhcp/livioxps8900
EXTRACT-user = ^(\<\d+\>)?[^\n]+\[service:0] \/(?P<user>user)\/(?P<proto>\S+)\/(?P<username>[\S]+)\s
EXTRACT-appid = ^(\<\d+\>)?[^\n]*\{\d+,\d+\}\s+\[[^\]]+\]\s+.*APPID\[(?P<application>.*?)\]
EXTRACT-appid2= ^(\<\d+\>)?[^\n]*\{\d+,\d+\}\s+\[\d+\:\d+\:(?P<application>[^\]]+)\]\s+
EXTRACT-idssid= ^(\<\d+\>)?[^\n]*\{1,\d+\}\s+\[1\:(?P<idssid>\d+)\:?[^\]]*\]\s+
EXTRACT-logssid = ^(\<\d+\>)?[^\n]*\{5,\d+\}\s+\[[^\]]+]\s(?P<idssid>[^ :]+):?\s
EXTRACT-servicessid = ^(\<\d+\>)?[^\n]*\{2,\d+\}\s+\[(?P<idssid>service:[^0]\d+)\]\s
EXTRACT-userssid = ^(\<\d+\>)?[^\n]*\{2,\d+\}\s+\[service:0\]\s\/(?P<user>user)\/(?P<proto>[^/]+)\/(?P<idssid>[\S]+):?\s
EXTRACT-hostsid = ^(\<\d+\>)?[^\n]*\{3,\d+\}\s+\[ostype:0.00\].*[><-]+\s+(?P<idssid>\d+\.\d+\.\d+\.\d+)

