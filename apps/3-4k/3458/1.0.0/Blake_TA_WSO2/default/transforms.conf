#//////////////////////////////////////////////////////////
# Audit.log Parsing

[WSO2_AUDIT_PARSE]
REGEX = \x5b[^\x5d]+\x5d\s+(\w+)\s+(?:\x7b([^\x7d]+)\x7d){0,1}\x2d\s+(.*)
FORMAT = level::$1 log_source::$2 message::$3

[WSO2_AUDIT_MESSAGE_PARSE]
REGEX = \s*(\S+)\s*\x3a\s*((?:[^\x7c\x5d])+?)\s*(?:\x7c|$)
SOURCE_KEY = message
FORMAT = $1::$2

[WSO2_INITIATOR_PARSE]
SOURCE_KEY = Initiator
REGEX = ^(.*?)\x2f([^\x40]+)(?:\x40(.+)){0,1}$
FORMAT = SSO_Organization::$1 SSO_User::$2 SSO_Domain::$3

# Format is inconsistant it seems
[WSO2_INITIATOR_PARSE2]
SOURCE_KEY = Initiator
REGEX = ^(.*?)\x40([\x2e\w\x2d]+)(?:\x40([\x2e\w\x2d]+)){0,1}$
FORMAT = SSO_User::$1 SSO_Organization::$2 SSO_Domain::$3

[WSO2_AUDIT_TARGET_APP]
SOURCE_KEY = message
REGEX = \x7c\s*Target\s*\x3a\s*((?=\d)\w+)\s*\x7c\s*Data\s*\x3a\s*\x7b\s*([\w\x2d\x2e]+)(?:\x40([\w\x2d\x2e]+)){0,1}\s*\x7d\s*\x7c
FORMAT = Target_TID::$1 Target_App::$2

[WSO2_AUDIT_TARGET_USER]
SOURCE_KEY = message
REGEX = \x7c\s*Target\s*\x3a\s*((?!\d)\w+)\s*\x7c\s*Data\s*\x3a\s*\x7b\s*([\w\x2d\x2e]+)(?:\x40([\w\x2d\x2e]+)){0,1}\s*\x7d\s*\x7c
FORMAT = Target_User_Name::$1 Target_User::$2

[WSO2_LOGIN_PARSE]
SOURCE_KEY = message
REGEX = \x27(.*?)\x2f([^\x40]+)(?:\x40(.+?)){0,1}\s*\x5b([^\x5d]+)\x5d\x27\s+logged\s(\w+)\sat\s
FORMAT = SSO_Organization::$1 SSO_User::$2 SSO_Domain::$3 TID::$4 Logged::$5

[WSO2_AUDIT_FAILED_LOGINS]
SOURCE_KEY = message
REGEX = ^Failed\s+\w+\s+login\s+attempt\s+\x27([^\x5b]+)\x5b([^\x5d]+)\x5d\x27
FORMAT = SSO_User::$1 TID::$2

[BLAKE_SIMPLE_JSON_PARSE]
SOURCE_KEY = Data
REGEX = \s*\x22([^\x22]+)\x22\s*\x3a\s*\x22([^\x22]+)\x22\s*(\x2c|\x7d$)
FORMAT = $1::$2

[WSO2_AUDIT_BROKEN_SINGLE_JSON]
SOURCE_KEY = Data
REGEX = ^\s*\x7b\s*(\w+)\s*\x3a\s*(\w+)\x2c\s*\x7d$
FORMAT = $1::$2

[WSO2_AUDIT_DATA_SIMPLE]
SOURCE_KEY = Data
REGEX = ^\x7b\s*([\w\x2d\x5c\x5f\x40]+)\s*\x7d$
FORMAT = Attribute::$1


#####################
# Carbon log parsing
[WSO2_CARBON_PARSE]
REGEX = (?s)^TID\x3a\s+\x5b([^\x5d]+)\x5d\s+\x5b[^\x5d]*\x5d\s+\x5b[^\x5d]*\x5d(?:\s+(\x40\S+)\s+\x5b\d+\x5d\s\x5b([^\x5d]+)\x5d){0,1}\s+(\w+)\s+\x7b([^\x7d]+)\x7d\s+\x2d\s+(.*?)([\r\n]|$)(.*)
FORMAT = TID::$1 site::$2 component::$3 level::$4 function::$5 message::$6 java_barf::$7

