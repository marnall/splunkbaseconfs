#https://docs.splunk.com/Documentation/Splunk/9.4.1/Admin/Commandsconf
# Public SPL command name (user runs: | appdanalytics ...)
[appdanalytics]
filename = spl_analytics_search.py
enableheader = true
outputheader = true
requires_srinfo = true
supports_getinfo = true
supports_multivalues = true
supports_rawargs = true
generating = true
streaming = true
passauth = true
chunked = true
python.version = python3

# Required by splunklib.searchcommands: lookup by class name (AnalSearch -> analsearch)
[analsearch]
filename = spl_analytics_search.py
enableheader = true
outputheader = true
requires_srinfo = true
supports_getinfo = true
supports_multivalues = true
supports_rawargs = true
generating = true
streaming = true
passauth = true
chunked = true
python.version = python3

[appdmetrics]
filename = spl_controller_metric.py
