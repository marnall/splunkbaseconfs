# Search Assistant (searchbnf.conf) - AppDynamics custom SPL commands
# Enables command hints when typing "| " in the search bar; use tags so "appd" shows these commands.
# https://docs.splunk.com/Documentation/Splunk/latest/Admin/Searchbnfconf

[appdanalytics-command]
syntax = appdanalytics account= query= (pagesize=)? (limit=)?
shortdesc = Run an AppDynamics Analytics (ADQL) query.
description = Execute an ADQL query against the AppDynamics Analytics API. Use an Analytics Account name from Setup → AppDynamics → Analytics Accounts. To see results sooner (Splunk often shows only after 50k rows), add limit=10000.
usage = public
example1 = appdanalytics account=my_analytics_account query="SELECT * FROM events"
comment1 = Run analytics query for the given account.
example2 = appdanalytics account=my_analytics_account query="SELECT * FROM events" limit=10000
comment2 = Return up to 10k rows so results appear when the search completes.
tags = appd appdynamics analytics adql events

[appdmetrics-command]
syntax = appdmetrics account= metrics= (application=)? (rollup=)?
shortdesc = Retrieve metrics from the AppDynamics Controller.
description = Fetch metric data from the AppDynamics Controller for one or all applications. Requires a Controller Account.
usage = public
example1 = appdmetrics account=demo metrics="Application Server|*" application=MyApp
comment1 = Get Application Server metrics for MyApp.
tags = appd appdynamics metrics controller

[appdstatus-command]
syntax = appdstatus account= (type=)? (application=)?
shortdesc = Retrieve status (applications, tiers, BTs, databases, etc.) from AppDynamics.
description = Fetch status data from the AppDynamics Controller: application summary, tier/node status, business transactions, databases, servers, DEM. Requires a Controller Account.
usage = public
example1 = appdstatus account=demo type=application
comment1 = Get application status for all apps.
tags = appd appdynamics status controller applications tiers

[appdlinks-command]
syntax = appdlinks ()
shortdesc = Add AppDynamics deep links to events (BT and node).
description = Streaming command that adds appd_deepLink to events when appd_app_name, and appd_bt_id or appd_node_id are present. Use after searches that have those fields.
usage = public
example1 = ... | appdlinks
comment1 = Add deep links to AppDynamics controller from event fields.
tags = appd appdynamics links deeplink
