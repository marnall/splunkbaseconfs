[source::application_security_vulnerabilities]
TRUNCATE = 0
MAX_EVENTS = 1024
DATETIME_CONFIG = NONE
KV_MODE = json
FIELDALIAS-cve-name = "cveName" ASNEW cve
EVAL-vendor_product = "Splunk AppDynamics SecureApp"
FIELDALIAS-vuln-application = "applicationName" ASNEW dest
FIELDALIAS-vulnCVEPublishDate = "publishDate" ASNEW vulnCVEPublishDate
FIELDALIAS-vulnCvssScore = "riskScore" ASNEW cvss
#FIELDALIAS-vulnCvssSeverity = "severity" ASNEW severity
FIELDALIAS-vulnDetailsUrl = "deepLink" ASNEW url
FIELDALIAS-vulnFirstDetected = "firstSeenAt" ASNEW vulnFirstDetected
FIELDALIAS-vulnKennaActiveInternetBreach = "activeInternetBreach" ASNEW vulnKennaActiveInternetBreach
FIELDALIAS-vulnKennaEasilyExploitable = "easilyExploitable" ASNEW vulnKennaEasilyExploitable
FIELDALIAS-vulnKennaMalwareExploitable = "malwareExploitable" ASNEW vulnKennaMalwareExploitable
FIELDALIAS-vulnKennaPopularTarget = "popularTarget" ASNEW vulnKennaPopularTarget
FIELDALIAS-vulnKennaPredictedExploitable = "predictedExploitable" ASNEW vulnKennaPredictedExploitable
FIELDALIAS-vulnKennaScore = "kennaScore" ASNEW vulnKennaScore
FIELDALIAS-vulnLibrary = "packageCanonicalName" ASNEW vulnLibrary
FIELDALIAS-vulnReached = "hasObservations" ASNEW vulnReached
FIELDALIAS-vulnStatus = "status" ASNEW vulnStatus
FIELDALIAS-vulnTier = "tierName" ASNEW vulnTier
FIELDALIAS-vulnTitle = "cveTitle" ASNEW signature
FIELDALIAS-vulnType = "packageLanguage" ASNEW category
EVAL-vendor = "AppDynamics"
FIELDALIAS-app_title = "applicationName" ASNEW app_title

