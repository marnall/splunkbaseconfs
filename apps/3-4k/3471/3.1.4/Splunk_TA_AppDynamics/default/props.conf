TRUNCATE = 0
MAX_EVENTS = 1024
DATETIME_CONFIG = NONE
EVAL-vendor = "AppDynamics"
FIELDALIAS-app_title = "application_name" ASNEW app_title

[source::application_status]
EVAL-application_status_id = case('severitySummary.performanceState'="CRITICAL",6,'severitySummary.performanceState'="WARNING",4,'severitySummary.performanceState'="NORMAL",2)
FIELDALIAS-application_status = "severitySummary.performanceState" ASNEW application_status

