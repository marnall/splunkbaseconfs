EVAL-vendor = "AppDynamics"

[appdynamics_events]
TRUNCATE = 0
MAX_EVENTS = 1024
DATETIME_CONFIG = NONE
EVAL-app = "AppDynamics"
EVAL-itsiDrilldownWeb = "Drilldown in AppDynamics"
EVAL-itsiDrilldownSearch = "`itsi_cp_appdynamics_index` sourcetype=appdynamics_events application_name=\"".'application_name'."\" tier_name=\"".'tier_name'."\" node_name=\"".'node_name'."\""
FIELDALIAS-default-itsiDrilldownURI = "deepLink" ASNEW itsiDrilldownURI
FIELDALIAS-events-description = "summary" ASNEW description
FIELDALIAS-events-signature = "healthRuleName" ASNEW signature
FIELDALIAS-events-vendor_severity = "severity" ASNEW vendor_severity
EVAL-src = 'application_name' .":". 'applicationId'
EVAL-severity_id = case('severity'="CRITICAL",6,'severity'="WARNING",4,'severity'="INFO",2)
EVAL-vendor = "AppDynamics"
FIELDALIAS-app_title = "application_name" ASNEW app_title

