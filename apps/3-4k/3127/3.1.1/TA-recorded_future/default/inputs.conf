###############################
# Splunk inputs configuration file
###############################

# You need to enable _one_ of theses two stanzas.

# *nix platform
[script://./bin/get-rf-threatlists.py]
passAuth = splunk-system-user
interval = 300
start_by_shell = false
disabled = true

# Windows platform
[script://$SPLUNK_HOME\etc\apps\TA-recorded_future\bin\get-rf-threatlists.py]
passAuth = splunk-system-user
interval = 300
start_by_shell = false
disabled = true

# This is where the trimmed down risk lists go in order to be
# ingested by Splunk's Threat Intelligence framework.
[threat_intelligence_manager://RF Threat Lists]
default_weight = 1
directory = $SPLUNK_HOME/etc/apps/TA-recorded_future/local/data/threat_intel
remove_unusable = false
sinkhole = true
maxsize = 52428800
