[Threat - Recorded Future IP Intelligence Retention - Lookup Gen]
cron_schedule    = 25 * * * *
enableSched  	 = true
schedule_window	 = 20
search 		 = | inputlookup ip_intel \
  | where NOT (time<relative_time(now(), "-120m") \
    AND threat_key="rf_ip_threatlist") \
  | outputlookup ip_intel | stats count

