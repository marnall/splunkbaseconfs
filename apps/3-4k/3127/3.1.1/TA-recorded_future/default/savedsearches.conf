[Threat - RF IP Threatlist Search - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = RF IP Threatlist Search
action.customsearchbuilder.enabled = false
action.notable = 1
action.notable.param.drilldown_name = View all threat activity involving $threat_match_field$="$threat_match_value$"
action.notable.param.drilldown_search = | datamodel Threat_Intelligence Threat_Activity search | search Threat_Activity.threat_match_field="$threat_match_field$" Threat_Activity.threat_match_value="$threat_match_value$"
action.notable.param.rule_description = Threat activity ($threat_match_value$) was discovered in the "$threat_match_field$" field based on threat intelligence available in the IP Risk List of Recorded Future.
action.notable.param.rule_title = RF Threat Activity Detected ($threat_match_value$)
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 20 * * * *
description = Enriches notable events detected with data from the IP threat list of Recorded Future with additional information
dispatch.earliest_time = -65m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
realtime_schedule = 0
relation = greater than
search = index=notable threat_category="threatlist_direct_csv" \
    threat_collection=ip_intel threat_match_value=* \
  | lookup recordedFutureIpThreatList ip as threat_match_value \
  | where isnotnull(rf_a_risk_score) OR isnotnull(rf_b_risk_string) \
  | eval severity=case(rf_a_risk_score<=64, "medium", \
    	 	       rf_a_risk_score<=89, "high", \
		       rf_a_risk_score>89, "critical") \
  | eval src_priority=severity \
  | eval threat_category="threatlist" \
  | eval threat_collection_key="ip:" . threat_match_value \
  | eval threat_description="Recorded Future IP Risk List" \
  | eval threat_group="rf_threatlist" \
  | eval threat_key="rf_ip_threatlist" \
  | eval threat_source_id="rf_ip_threatlist" \
  | table _time, severity, src_priority, rf_*, threat*, orig_*, _raw \
  | fields _time, severity, src_priority, rf_*, threat*, orig_*, _raw \
  | `map_notable_fields` \
  | addinfo

[Threat - RF Domain Threatlist Search - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = RF Domain Threatlist Search
action.customsearchbuilder.enabled = false
action.notable = 1
action.notable.param.drilldown_name = View all threat activity involving \   $threat_match_field$="$threat_match_value$"
action.notable.param.drilldown_search = | datamodel Threat_Intelligence Threat_Activity search | search Threat_Activity.threat_match_field="$threat_match_field$" Threat_Activity.threat_match_value="$threat_match_value$"
action.notable.param.rule_description = Threat activity ($threat_match_value$) was discovered in the "$threat_match_field$" field based on threat intelligence available in the Domain Risk List of Recorded Future.
action.notable.param.rule_title = RF Threat Activity Detected ($threat_match_value$)
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 20 * * * *
description = Enriches notable events detected from the Domain threat list of Recorded Future with additional information
dispatch.earliest_time = -65m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
realtime_schedule = 0
relation = greater than
search = index=notable threat_category="threatlist_direct_csv" \
    threat_collection=ip_intel threat_match_value=* \
  | rex field=threat_match_value "(?<method>https?://(www\.)?)?(?<domain>[^:/\s]+)(?<path>.*)?"  \
  | lookup recordedFutureDomainThreatList domain as domain \
  | where isnotnull(rf_a_risk_score) OR isnotnull(rf_b_risk_string) \
  | eval severity=case(rf_a_risk_score<=64, "medium", \
                       rf_a_risk_score<=89, "high", \
		       rf_a_risk_score>89, "critical") \
  | eval src_priority=severity \
  | eval threat_category="threatlist" \
  | eval threat_collection_key="idn:" . domain \
  | eval threat_description="Recorded Future Domain Risk List" \
  | eval threat_group="rf_threatlist" \
  | eval threat_key="rf_domain_threatlist" \
  | eval threat_source_id="rf_domain_threatlist" \
  | table _time, severity, src_priority, rf_*, threat*, orig_*, _raw \
  | fields _time, severity, src_priority, rf_*, threat*, orig_*, _raw \
  | `map_notable_fields` \
  | addinfo

