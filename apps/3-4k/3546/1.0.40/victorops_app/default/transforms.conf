[kvstore_lookup]
external_type = kvstore
collection = mycollection
fields_list = _key, org_name, api_key, routing_key, is_default,test_result

[data_lookup]
external_type = kvstore
collection = dataconfig
fields_list = _key, name, api_id, api_key, is_default

[proxy_lookup]
external_type = kvstore
collection = proxyconfig
fields_list = _key, protocol, host, port, user

[alert_recovery_lookup]
external_type = kvstore
collection = alertrecovery
fields_list = _key, enabled, pollingInterval, numPeriods

[active_alert_lookup]
external_type = kvstore
collection = activealerts
fields_list = _key, entityId, messageType, monitoringTool, apiKeyId, routingKey, lastGeneratedTime, apiEndpoint, api_key, poll_interval, inactive_polls

[deployment_details_lookup]
external_type = kvstore
collection = deployment
fields_list = _key, is_hybridaction, manager_host_url
