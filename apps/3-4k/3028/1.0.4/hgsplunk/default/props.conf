[syslog]
EXTRACT-hg_action_request = ^(?:[^\|\n]*\|){5}(?P<hg_action_request>\w+\s+\w+)
EXTRACT-hg_event_description = ^(?:[^\|\n]*\|){5}(?P<hg_event_description>[^\|]+)
EXTRACT-hg_event_detail = ^(?:[^\|\n]*\|){6}(?P<hg_event_detail>\d+)
EXTRACT-hg_event_type = ^(?:[^\|\n]*\|){4}(?P<hg_event_type>\w+)
EXTRACT-hg_message_subtype = ^(?:[^\|\n]*\|){5}(?P<hg_message_subtype>\w+)
EXTRACT-hg_threat_score = ^(?:[^\|\n]*\|){6}(?P<hg_threat_score>\d+)
EXTRACT-hg_device_product = ^(?:[^\|\n]*\|){2}(?P<hg_device_product>\w+)
EXTRACT-hg_device_vendor = ^[^\|\n]*\|(?P<hg_device_vendor>\w+)
EXTRACT-hg_device_version = ^(?:[^\|\n]*\|){3}(?P<hg_device_version>[^\|]+)

[host::analyzer.esm-dev.net ]

[source::tcp:7514]
TZ = UTC
LOOKUP-threat-score-to-threat-level = threat-score-to-threat-level hg_threat_score AS hg_threat_score OUTPUTNEW hg_threat_level AS hg_threat_level
