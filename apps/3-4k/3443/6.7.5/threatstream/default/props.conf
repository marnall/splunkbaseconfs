[anomali_test]
INDEXED_EXTRACTIONS = CSV

[anomali_matches]
EXTRACT-anomali_results = anomali_results="(?<anomali_results>\{.*?\})",\s+
EVAL-anomali_results= replace(anomali_results,"\\\\","")
EXTRACT-whitelist_rule = whitelist_rule=\"(?<whitelist_rule>.*?)\"
KV_MODE=none
REPORT-event_field_extraction = event_field_extraction
REPORT-ts_fields_extraction = anomali_results_extraction
# Rename fields for lookup match style compatibility, known conflict between source event field and ts_source
FIELDALIAS-metadata_csc_to_lookup = orig_host AS event.host, orig_sourcetype AS event.sourcetype, orig_source AS event.source
FIELDALIAS-ts_metadata_csc_to_lookup = id AS event.ts_id, itype AS event.ts_itype, confidence AS event.ts_confidence, severity AS event.ts_severity, resource_uri AS event.ts_resource_uri, classification AS event.ts_classification, type AS event.ts_type
FIELDALIAS-ts_metadata_tag_org_loc = org AS event.ts_org, country AS event.ts_country, state AS event.ts_state, asn AS event.ts_asn, detail AS event.ts_detail, detail2 AS event.ts_detail2, lat AS event.ts_lat, lon AS event.ts_lon,
FIELDALIAS-ts_metadata_timestamp = date_first AS event.ts_date_first, date_last AS event.ts_date_last
FIELDALIAS-ts_threatmodels = actor AS event.ts_actor, tipreport AS event.ts_tipreport
EVAL-event\.src = src
EVAL-event\.dest = dest
EVAL-event\.user = src_user
EVAL-event\.recipient = recipient
EVAL-event\.action = action

[source::...ts_ioc_ingest.log]
EXTRACT-log_details = ^\d+-\d+-\d+\s+\d+:\d+:\d+,\d+\s+(?<pid>\d+)\s+(?<log_level>\S+)\s+(?<input_name>.*?)\s-\s