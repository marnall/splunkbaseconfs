[analyzeioc]
is_custom         = 1
label             = Analyze with ThreatStream
description       = Analyze with Anomali's ThreatStream platform
icon_path         = anomali.png
disabled		  = 0
payload_format    = json
param._cam        = {\
    "category":   ["Information Gathering"],\
    "task":       ["create"],\
    "subject":    ["Threat Intelligence Analysis"],\
    "technology": [{"vendor": "Anomali", "product": "Anomali ThreatStream App"}],\
    "supports_adhoc": true\
}
param.field = dest
param.tags =
param.verbose     = false
ttl               = 300
command           = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.action_name=$action_name$ | stats count
python.version = python3


[ts_my_attacks]
is_custom = 1
label = Send to Threatstream MyAttacks
disabled = 0
payload_format = json
icon_path = anomali.png
python.version = python3