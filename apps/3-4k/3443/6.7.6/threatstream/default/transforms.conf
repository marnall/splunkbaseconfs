[ts_investigation]
external_type = kvstore
collection = ts_investigation
fields_list = id, name

[ts_whitelist]
external_type = kvstore
collection = ts_whitelist
case_sensitive_match = false
match_type = WILDCARD(src),WILDCARD(dest),WILDCARD(host),WILDCARD(source),WILDCARD(indicator)
fields_list = source, host, dest, src, indicator, _key, disabled
max_matches = 1

[event_field_extraction]
SOURCE_KEY = _raw
REGEX = (\S+)=\"*(.*?)\"*(?:,|$)
FORMAT = $1::$2
CLEAN_KEYS=false

[anomali_results_extraction]
SOURCE_KEY = _raw
REGEX = (?!:\{+)\\\"([a-zA-Z0-9_]*?)\\\":\s+(?:\\\")*(.*?)(?:\\\")*(?:,|\})
FORMAT = $1::$2
MV_ADD=true
CLEAN_KEYS=false