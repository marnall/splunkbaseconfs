[ThreatStream - Whitelist Sourcetype: $@field_value$ from IOC matches]
type = search
display_location = field_menu
fields = *sourcetype
label = ThreatStream whitelist source: $@field_value$
search.search_string = |makeresults | eval src="*",source="*",sourcetype="$@field_value$",dest="*",indicator="*",host="*", disabled="no" | fields - _time| outputlookup append=t ts_whitelist
search.preserve_timerange = true
search.app = threatstream

