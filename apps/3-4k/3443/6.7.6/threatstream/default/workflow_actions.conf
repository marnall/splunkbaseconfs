[ThreatStream Portal Indicator Lookup]
display_location = field_menu
fields = *ts_lookup_key_value, *indicator, *Indicator
label = ThreatStream Intel Lookup: $@field_value$
link.method = get
link.target = blank
link.uri = https://ui.threatstream.com/detail/$@field_value$
type = link
disabled=0

