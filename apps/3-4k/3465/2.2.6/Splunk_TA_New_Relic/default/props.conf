[newrelic:multiple_inputs]
pulldown_type = 1
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder

[newrelic:insights]
category = Splunk App Add-on Builder
pulldown_type = 1
SHOULD_LINEMERGE = 0

[newrelic:applications:mobile]
category = Splunk App Add-on Builder
pulldown_type = 1

[newrelic:applications:browser]
TRUNCATE = 100000
category = Splunk App Add-on Builder
pulldown_type = 1

[newrelic:alerts:violations]
TIME_PREFIX = opened_at
category = Splunk App Add-on Builder
pulldown_type = 1

[newrelic:alerts:events]
TIME_PREFIX = timestamp
category = Splunk App Add-on Builder
pulldown_type = 1

[newrelic:servers]
TIME_PREFIX = last_reported_at
category = Splunk App Add-on Builder
pulldown_type = 1

[newrelic:transactions]
FIELDALIAS-application_summary_response_time_as_response_time = application_summary.response_time AS response_time
KV_MODE = json
TIME_PREFIX = last_reported_at
category = Splunk App Add-on Builder
disabled = 0
pulldown_type = 1

[newrelic:applications]
EVAL-app_title = replace(name," ","_") + ":" + id
EVAL-availability = if('reporting'=="false",0,1)
EVAL-eum_response_time = 'end_user_summary.response_time' * 1000
EVAL-health = case('health_status'="green",1,'health_status'="yellow",2,'health_status'="orange",2,'health_status'="red",3,'health_status'="gray",0)
EVAL-vendor = "New Relic"
FIELDALIAS-aob_gen_newrelic_applications_alias_1 = account_id AS account
FIELDALIAS-application_summary_apdex_score_as_apdex_score = application_summary.apdex_score AS apdex_score
FIELDALIAS-application_summary_error_rate_as_error_rate = application_summary.error_rate AS error_rate
FIELDALIAS-application_summary_response_time_as_response_time = application_summary.response_time AS response_time
FIELDALIAS-application_summary_throughput_as_thruput = application_summary.throughput AS thruput
FIELDALIAS-end_user_summary_apdex_score_as_eum_apdex_score = end_user_summary.apdex_score AS eum_apdex_score
FIELDALIAS-end_user_summary_throughput_as_eum_thruput = end_user_summary.throughput AS eum_thruput
FIELDALIAS-id_as_application_id = id AS application_id
FIELDALIAS-language_as_app_language = language AS app_language
FIELDALIAS-name_as_app_name = name AS app_name
KV_MODE = json
TIME_PREFIX = last_reported_at
category = Splunk App Add-on Builder
pulldown_type = 1

[source::...alerts_to_newrelic_modalert.log*]
sourcetype = splunktanewrelic:log

