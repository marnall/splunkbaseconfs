[es_trigger_dot1x_action_failure_notification]
action.notable = 1
alert.digest_mode = 1
alert.track = 1
counttype = number of events
cron_schedule = 0,30 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","_raw","_time"]
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `get_index`  `get_sourcetypes` `ct_hostinfo` dot1x_update_authentication_props "Logon Failure"| join type=inner max=0 username\
 [search index=fsctcenter (sourcetype=fsctcenter_avp OR sourcetype=fsctcenter_json) dot1x_set_fr_properties\
| stats latest(NASIpAddress) as ip, latest(NASIP6Address) as ipv6 by username tenant_id]\
| fillnull value="" username ip ipv6\
| eventstats count as eventcount by username,ip,ipv6,tenant_id\
| dedup username,ip,ipv6,tenant_id\
| WHERE eventcount>10
description = ES-Search for CounterACT Authentication Failure Exceeding Threshold

