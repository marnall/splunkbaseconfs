[es_trigger_ioc_scanner_notification]
action.notable = 1
alert.digest_mode = 1
alert.track = 1
counttype = number of events
cron_schedule = 10,40 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","_raw","_time"]
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `get_index` `get_sourcetypes` `ct_hostinfo`  atc_detected_ioc\
| rename host_properties.atc_detected_ioc{}.value as atc_detected_ioc\
| mvexpand atc_detected_ioc\
| rex field=atc_detected_ioc "IOC Type:\s*(?<IOCType>[^;^$]*).*Raw IOC Data:\s*(?<RawIOCData>[^;^$]*).*"\
| search IOCType="DNS Query" OR IOCType="CnC Address"\
| where isNotNull(RawIOCData)\
| fillnull value="" ip ipv6 RawIOCData\
| eventstats count as eventcount by ip ipv6 tenant_id RawIOCData\
| dedup ip, ipv6, tenant_id, RawIOCData\
| where eventcount>5 AND eventcount<=10
description = ES-Search for CounterACT IOC Scanner Activity

