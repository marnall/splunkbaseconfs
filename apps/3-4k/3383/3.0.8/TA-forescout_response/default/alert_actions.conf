[http_localhost_login_action]
python.version    = python3
python.required    = 3.13
is_custom         = 0
label             = eyeSight HTTP Localhost Login Action
description       = This action presents a login page to users via their web browsers. eyeSight checks the user-provided credentials against user's local machine and updates the 'Host-Manageable (Local)' property if authentication succeeds.
payload_format    = json
ttl               = 600
maxtime           = 10m
command           = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.action_name=$action_name$ | stats count
icon_path         = appicon.png
param._cam        = {"supports_adhoc" : true,"category" : ["Permissions Control"],"task":["allow"],"subject":["endpoint.sensor"],"technology" : [ {"vendor":"Forescout","product":"CounterACT","version": "7.0.0"} ]}

