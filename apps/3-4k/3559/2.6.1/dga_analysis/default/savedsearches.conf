[default]
[dga_eventgen]
dispatch.earliest_time = -1m@m
dispatch.latest_time = now
request.ui_dispatch_app = dga_analysis
alert.track = 1
alert.suppress = 0
relation = greater than
request.ui_dispatch_view = search
quantity = 0
search = | inputlookup dga_domains_features \
| search partition_number=1\
| sample 0.001 \
| eval _time=now()-(60.000*random()/2147483647)\
| table _time domain class subclass\
| `ut_shannon(domain)` \
| `ut_meaning(domain)` \
| eval ut_digit_ratio = 0.0 \
| eval ut_vowel_ratio = 0.0 \
| eval ut_domain_length = max(1,len(domain)) \
| rex field=domain max_match=0 "(?<digits>\d)" \
| rex field=domain max_match=0 "(?<vowels>[aeiou])" \
| eval ut_digit_ratio=if(isnull(digits),0.0,mvcount(digits) / ut_domain_length) \
| eval ut_vowel_ratio=if(isnull(vowels),0.0,mvcount(vowels) / ut_domain_length) \
| eval ut_consonant_ratio = max(0.0, 1.000000 - ut_digit_ratio - ut_vowel_ratio) \
| eval ut_vc_ratio = ut_vowel_ratio / ut_consonant_ratio \
| apply "dga_ngram" \
| apply "dga_pca"\
| fields - digits - vowels - domain_tfidf*\
| collect index=dga_proxy
enableSched = 1
counttype = number of events
display.page.search.tab = statistics
disabled = 1
cron_schedule = * * * * *
action.email.useNSSubject = 1
display.general.type = statistics

[dga_feedback_kvstore]
request.ui_dispatch_app = dga_analysis
cron_schedule = * * * * *
alert.track = 1
alert.suppress = 0
relation = greater than
request.ui_dispatch_view = search
quantity = 0
search = index="dga_proxy" \
| table _time domain ut* PC* \
| apply "dga_randomforest" \
| rename "predicted(class)" as class \
| table _time domain class \
| where class="dga" \
| lookup dga_known_domains domain as domain OUTPUT class as known_class time as last_time \
| search NOT known_class=* \
| rename _time as time \
| table time domain class\
| outputlookup dga_known_domains append=true
enableSched = 1
counttype = number of events
display.page.search.tab = statistics
disabled = 1
dispatch.earliest_time = -5m@m
dispatch.latest_time = now
action.email.useNSSubject = 1
display.general.type = statistics

[dga_generate_model_results]
alert.track = 0
dispatch.latest_time = now
request.ui_dispatch_app = dga_analysis
display.visualizations.charting.chart = bar
search = | inputlookup dga_domains_features \
| search partition_number=1 \
| apply "dga_logisticregression" \
| `confusionmatrix(class,"predicted(class)")` \
| eval Algorithm="dga_logisticregression" \
| appendpipe \
    [| inputlookup dga_domains_features \
    | search partition_number=1 \
    | apply "dga_randomforest" \
    | `confusionmatrix(class,"predicted(class)")` \
    | eval Algorithm="dga_randomforest"\
        ] \
| appendpipe \
    [| inputlookup dga_domains_features \
    | search partition_number=1 \
    | apply "dga_svm" \
    | `confusionmatrix(class,"predicted(class)")` \
    | eval Algorithm="dga_svm"\
        ] \
| appendpipe \
    [| inputlookup dga_domains_features \
    | search partition_number=1 \
    | apply "dga_decisiontree" \
    | `confusionmatrix(class,"predicted(class)")` \
    | eval Algorithm="dga_decisiontree"\
        ] \
| table Algorithm "Predicted actual" "Predicted dga" "Predicted legit" \
| outputlookup dga_model_results
display.visualizations.custom.type = scatterplot3d_app.scatter3d
action.email.useNSSubject = 1
request.ui_dispatch_view = search
display.visualizations.show = 0
display.page.search.tab = statistics
display.general.type = statistics
dispatch.earliest_time = -60m@m
display.visualizations.type = singlevalue
display.visualizations.chartHeight = 459

[dga_validate]
alert.track = 0
request.ui_dispatch_view = search
request.ui_dispatch_app = dga_analysis
display.visualizations.charting.chart = bar
display.visualizations.charting.chart.stackMode = stacked
display.visualizations.custom.type = treemap_app.treemap
dispatch.latest_time = now
search = | inputlookup dga_big.csv | apply "dga_randomforest" | chart count over subclass by "predicted(class)" | eval ratio=dga/(legit+1) | outputlookup dga_validation.csv
display.page.search.tab = visualizations
dispatch.earliest_time = -60m@m
action.email.useNSSubject = 1
display.general.type = visualizations
display.statistics.show = 0

[dga_cache_training_results]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.custom.type = Splunk_ML_Toolkit.LinesViz
display.visualizations.show = 0
request.ui_dispatch_app = dga_analysis
request.ui_dispatch_view = search
search = | inputlookup dga_algos \
| map search="| inputlookup dga_domains_features \
| search partition_number=1 \
| apply \"$algo$\" \
| `confusionmatrix(class,\"predicted(class)\")` \
| eval Algorithm=\"$algo$\"" \
| outputlookup dga_model_results

[dga_create_full_features]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = bubble
display.visualizations.custom.type = scatterplot3d_app.scatter3d
display.visualizations.show = 0
display.visualizations.type = custom
request.ui_dispatch_app = dga_analysis
request.ui_dispatch_view = search
search = | `dga_create_full_features(dga_domains,dga_domains_features)`

[dga_create_ngram_model]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = bubble
display.visualizations.custom.type = scatterplot3d_app.scatter3d
display.visualizations.show = 0
display.visualizations.type = custom
request.ui_dispatch_app = dga_analysis
request.ui_dispatch_view = search
search = | `dga_create_ngram_model(dga_domains,dga_domains_features)`
