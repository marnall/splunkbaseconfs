[seckit_idm_aws_pre_account_id_vpc_gen]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
alert.track = 0
cron_schedule = 0 */2 * * *
description = Generate the seckit_idm_aws_pre_account_vpc_lookup allowing prioritization and categorization by account_id,vpc_id
dispatch.earliest_time = -4h@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
schedule_window = 120
search = `seckit_idm_aws_index` sourcetype="aws:description" (source="*:ec2_instances" OR source="*:ec2_reserved_instances") \
| stats count by account_id \
| search NOT account_id=000000000000 \
| fillnull value="" vpc_id priority_vpc pci_domain category_vpc \
| eval vpc_id = "*" \
| lookup seckit_idm_aws_pre_account_vpc_exact_lookup account_id vpc_id OUTPUT account_name vpc_name priority_vpc pci_domain_vpc category_vpc \
| inputlookup append=t seckit_idm_aws_pre_account_vpc_lookup \
| table account_id vpc_id account_name vpc_name priority_vpc pci_domain_vpc category_vpc \
| dedup account_id vpc_id \
| sort account_id vpc_id \
| outputlookup seckit_idm_aws_pre_account_vpc_lookup \
| stats count

[seckit_idm_aws_assets_ec2_gen]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
alert.track = 0
cron_schedule = */5 * * * *
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
schedule_window = auto
search = `seckit_idm_aws_index` sourcetype="aws:description" (source="*:ec2_instances" OR source="*:ec2_reserved_instances") \
    account_id=* id=* NOT state=terminated \
| eval vpc_id=if(vpc_id=="null",null(),vpc_id) \
| lookup seckit_idm_aws_pre_account_vpc_lookup account_id vpc_id OUTPUT account_name vpc_name priority_vpc pci_domain_vpc category_vpc \
| eval private_ip_address=nullif(private_ip_address,"null") \
| eval ip_address=nullif(ip_address,"null") \
| `seckt_idm_aws_ec2_ip_custom` \
| fillnull value="" account_id dns_name id image_id ip_address key_name placement placement_group private_dns_name private_ip_address public_dns_name region state subnet_id vpc_id ip_custom dns_custom \
| `seckt_idm_aws_ec2_dns_custom` \
| eval ip=mvdedup(mvsort(mvappend(private_ip_address,ip_address,ip_custom))) \
| eval dns=mvdedup(mvsort(mvappend(public_dns_name,private_dns_name,dns_name,dns_custom))) \
| eval ip=mvfilter(match(ip,"^..") ) \
| eval dns=mvfilter(match(dns,"^..")) \
| eval owner=coalesce(owner_custom,tag.owner,tag.Owner,owner) \
| `seckt_idm_aws_ec2_category_custom` \
| eval category=mvdedup(mvsort(mvappend("net_allocation:aws","aws_account_id:".account_id,"aws_image_id:".image_id,"aws_instance_type:".instante_type,"aws_state:".state,"virtual","aws_placement:".placement,"aws_placement_group:".placement_group,"aws_region:".region,"aws_subnet:".subnet_id,category_custom,category_vpc))) \
| eval category=mvfilter(match(category,"^[^\:]+\:.+|[^\:]+$")) \
| lookup aws_ec2_region_location region \
| rename id as nt_host \
| eval requires_av=if(platform=="windows",true,"") \
| `seckt_idm_aws_ec2_priority_custom` \
| eval priority=mvdedup(mvsort(mvappend("medium",priority_custom))) \
| eval priority=mvfilter(match(priority,"^..") ) \
| eval bunit_auto=coalesce(mvindex(account_name,-1,-1),account_id)."/".coalesce(mvindex(vpc_name,-1,-1),vpc_id ) \
| `seckt_idm_aws_ec2_bunit_custom` \
| eval bunit = coalesce(bunit_custom,bunit_auto) \
| `seckt_idm_aws_ec2_owner_custom` \
| eval owner_auto=owner_id\
| eval owner=coalesce(owner_custom,owner_auto)\
| stats values(ip) as ip,values(mac) as mac,values(dns) as dns,values(owner) as owner,values(priority) as priority,latest(lat) as lat,latest(long) as long,latest(city) as city,latest(country) as country,latest(bunit) as bunit,values(category) as category,latest(pci_domain) as pci_domain,latest(is_expected) as is_expected,latest(should_timesync) as should_timesync,latest(should_update) as should_update,latest(requires_av) as requires_av by nt_host \
| `seckit_idm_common_get_asset_net_category`\
| `seckit_idm_common_get_asset_net_id_category`\
| inputlookup append=t seckit_idm_assets_aws_ec2_lookup\
| dedup nt_host\
| `seckit_idm_common_output_assets("seckit_idm_assets_aws_ec2_lookup",nt_host,"seckit_common_aws")`
