[DA-ITSI-CD-HSI-PATIENTFLOW-PF_KPIB_LOS_Thresholds_Current]
alert_lag = 30
alert_period = 5
base_search = | inputlookup PF-L-PatientMovement \
| search dischargeTime = 0\
| lookup PF-L-Location Location as Location Specialty_Match as Hospital_Service OUTPUT Total_Beds LOS_T1 LOS_T2 LOS_T3 LOS_T4 LOS_T5 TimeUnit\
| eval TimeDiv=case(TimeUnit="m", 60, TimeUnit="h", 3600)\
| eval StayDuration=round((now()-admitTime)/TimeDiv,0)\
| eval admitTime=strftime(admitTime,"%F - %T") \
| eval dischargeTime=strftime(dischargeTime, "%F - %T")\
| eval ThresholdStatus = case(StayDuration<LOS_T1, "LOS_T1", StayDuration<LOS_T2, "LOS_T2", StayDuration<LOS_T3, "LOS_T3", StayDuration<LOS_T4, "LOS_T4", StayDuration>LOS_T4, "LOS_T5")\
| stats count(eval(ThresholdStatus="LOS_T1")) as LOS_T1_Count count(eval(ThresholdStatus="LOS_T2")) as LOS_T2_Count count(eval(ThresholdStatus="LOS_T3")) as LOS_T3_Count count(eval(ThresholdStatus="LOS_T4")) as LOS_T4_Count count(eval(ThresholdStatus="LOS_T5")) as LOS_T5_Count by Location
description = Outputs 5 LOS metrics based on lookup thresholds
entity_alias_filtering_fields = Location
entity_id_fields = Location
is_entity_breakdown = True
is_service_entity_filter = True
metrics = [\
    {\
        "_key": "LOS_Threshold_1", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "LOS_T1_Count", \
        "title": "LOS_Threshold_1", \
        "unit": "PPL"\
    }, \
    {\
        "_key": "LOS_Threshold_2", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "LOS_T2_Count", \
        "title": "LOS_Threshold_2", \
        "unit": "PPL"\
    }, \
    {\
        "_key": "LOS_Threshold_3", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "LOS_T3_Count", \
        "title": "LOS_Threshold_3", \
        "unit": "PPL"\
    }, \
    {\
        "_key": "LOS_Threshold_4", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "LOS_T4_Count", \
        "title": "LOS_Threshold_4", \
        "unit": "PPL"\
    }, \
    {\
        "_key": "LOS_Threshold_5", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "LOS_T5_Count", \
        "title": "LOS_Threshold_5", \
        "unit": "PPL"\
    }\
]
search_alert_earliest = 5
source_itsi_da = DA-ITSI-CD-HSI-PATIENTFLOW
title = DA-ITSI-CD-HSI-PATIENTFLOW:PF_KPIB_LOS_Thresholds_Current

[DA-ITSI-CD-HSI-PATIENTFLOW-PF_KPIB_Loc_Occupancy]
alert_lag = 30
alert_period = 5
base_search = | inputlookup PF-L-PatientMovement \
| search dischargeTime = 0\
| lookup PF-L-Location Location as Location OUTPUT Total_Beds\
| eval StayDuration=round((now()-admitTime)/3600,0)\
| eval admitTime=strftime(admitTime,"%F - %T") \
| eval dischargeTime=strftime(dischargeTime, "%F - %T")\
| stats count AS Beds_In_Use max(Total_Beds) AS Total_Beds by Location\
| eval Available_Beds = Total_Beds - Beds_In_Use\
| eval Percentage_Full = Beds_In_Use / Total_Beds\
| eval Percentage_Full= round(Percentage_Full * 100, 1)\
| eval Percentage_Available= 100-Percentage_Full\
| eval _time=now()\
| table _time Location Beds_In_Use Available_Beds Total_Beds Percentage_Full Percentage_Available
description = Patient Flow KPI Base Search returning metric related to Location Occupancy
entity_alias_filtering_fields = Location
entity_id_fields = Location
is_entity_breakdown = True
is_service_entity_filter = True
metrics = [\
    {\
        "_key": "Available_Beds", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "Available_Beds", \
        "title": "Available_Beds", \
        "unit": "BEDS"\
    }, \
    {\
        "_key": "Beds_In_Use", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "Beds_In_Use", \
        "title": "Beds_In_Use", \
        "unit": "BEDS"\
    }, \
    {\
        "_key": "Percentage_of_Beds_Available", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "Percentage_Available", \
        "title": "Percentage_of_Beds_Available", \
        "unit": "BEDS"\
    }, \
    {\
        "_key": "Percentage_of_Beds_Full", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "Percentage_Full", \
        "title": "Percentage_of_Beds_Full", \
        "unit": "BEDS"\
    }, \
    {\
        "_key": "Total_beds", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "Total_Beds", \
        "title": "Total_beds", \
        "unit": "BEDS"\
    }\
]
search_alert_earliest = 5
source_itsi_da = DA-ITSI-CD-HSI-PATIENTFLOW
title = DA-ITSI-CD-HSI-PATIENTFLOW:PF_KPIB_Loc_Occupancy

[DA-ITSI-CD-HSI-PATIENTFLOW-PF_KPIB_Loc_AverageLOS]
alert_lag = 30
alert_period = 5
base_search = | inputlookup PF-L-PatientMovement \
| lookup PF-L-Location Location as Location OUTPUT TimeUnit\
| eval TimeDiv=case(TimeUnit="m", 60, TimeUnit="h", 3600)\
| eval StayDuration=if(dischargeTime>0,round((dischargeTime-admitTime)/TimeDiv,0),round((now()-admitTime)/TimeDiv,0)) \
| stats avg(StayDuration) AS AvgLOS by Location\
| eval AvgLOS=round(AvgLOS)\
| fields Location AvgLOS
description = Calculates the average length of stay based on discharged and currently admitted patients
entity_alias_filtering_fields = Location
entity_id_fields = Location
is_entity_breakdown = True
is_service_entity_filter = True
metrics = [\
    {\
        "_key": "Average_LOS", \
        "aggregate_statop": "max", \
        "entity_statop": "avg", \
        "threshold_field": "AvgLOS", \
        "title": "Average_LOS", \
        "unit": "Time"\
    }\
]
search_alert_earliest = 5
source_itsi_da = DA-ITSI-CD-HSI-PATIENTFLOW
title = DA-ITSI-CD-HSI-PATIENTFLOW:PF_KPIB_Loc_AverageLOS
