#-----------------------------------------------------------
# HL7 Subfield Extraction Examples
# TRANSFORMS MSH_3, MSH_4, MSH_9, PID_3, PID_5, OBR_4 in REPORT-HL7 are meant to
# illustrate on how to accomplish this.
# Does not account for every possible Sub_field extraction.
