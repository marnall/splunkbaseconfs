#---------------------------------------
# Use following line breaker for HL7 messages that
# each line begins with The \xe2 (zero width space character)
# before the MSH|.
#---------------------------------------
SHOULD_LINEMERGE = false
LINE_BREAKER = (\xe2)?MSH\|
NO_BINARY_CHECK = true
TIME_PREFIX = MSH\|\^~\\\&\|(.*?\|){4}
MAX_TIMESTAMP_LOOKAHEAD = 15
SEDCMD-CR = s/\r/\n/g
category = Custom
pulldown_type = true
disabled = false
