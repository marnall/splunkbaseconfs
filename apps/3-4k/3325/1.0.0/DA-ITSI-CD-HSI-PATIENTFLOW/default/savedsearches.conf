[DA-ITSI-CD-HSI-PATIENTFLOW-Location_Entity_Search]
description = Search for all unique location instances
search = index=* sourcetype=HL7_v2 | dedup Location | table Location
dispatch.earliest_time = -24h
dispatch.latest_time = now
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-CD-HSI-PATIENTFLOW-Patient_Entity_Search]
description = Search for all unique patient instances
search = index=* sourcetype=HL7_v2 Patient_ID=* | dedup Patient_ID | table Patient_ID
dispatch.earliest_time = -24h
dispatch.latest_time = now
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-CD-HSI-PATIENTFLOW-Patient_Visit_Entity_Search]
description = Search for all unique patient visit instances
search = index=* sourcetype=HL7_v2 Visit_Number=* | dedup Visit_Number | table Visit_Number
dispatch.earliest_time = -24h
dispatch.latest_time = now
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-CD-HSI-PATIENTFLOW-Patient_Movement_Init]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
dispatch.earliest_time = -3y@y
dispatch.latest_time = now 
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search
search = tag=PF_T_Admission | eval admitTime=_time | eval dischargeTime=0 | eval key=host+Visit_Number+Patient_ID+Location+Hospital_Service | fields key host Visit_Number Patient_ID Location Hospital_Service admitTime dischargeTime | outputlookup PF-L-PatientMovement key_field=key

[DA-ITSI-CD-HSI-PATIENTFLOW-Patient_Movement_Upd_Admit]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = * * * * *
dispatch.earliest_time = -2m@m
dispatch.latest_time = -1m@m
enableSched = 1
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search
search = | inputlookup PF-L-PatientMovement | append [ search tag=PF_T_Admission | eval admitTime=_time | eval dischargeTime=0 |  eval key=host+Visit_Number+Patient_ID+Location+Hospital_Service | fields key host Visit_Number Patient_ID Location Hospital_Service admitTime dischargeTime ] | dedup key | outputlookup PF-L-PatientMovement append=True key_field=key

[DA-ITSI-CD-HSI-PATIENTFLOW-Patient_Movement_Upd_Discharge]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = * * * * *
dispatch.earliest_time = -3m@m
dispatch.latest_time = -1m@m
enableSched = 1
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search
search = tag=PF_T_Discharge | eval dcTime=_time | fields dcTime host Visit_Number Patient_ID Location Hospital_Service | lookup PF-L-PatientMovement host AS host Visit_Number AS Visit_Number Patient_ID AS Patient_ID Location AS Location Hospital_Service AS Hospital_Service | eval dischargeTime=dcTime | outputlookup PF-L-PatientMovement append=True key_field=_key

[DA-ITSI-CD-HSI-PATIENTFLOW-Location_Service_Search]
description = Search for all unique location instances for which services should be created
search = index=* sourcetype=HL7_v2  | rename Organisation as ServiceTitle | where ServiceTitle !="*" | strcat ServiceTitle " - " "Ogranisation" ServiceDescription | stats count by ServiceTitle ServiceDescription | append [search index=* sourcetype=HL7_v2 | rename Organisation as DependentService | rename CareLocation as ServiceTitle | where ServiceTitle !="*" | strcat ServiceTitle " - " "Care Location" ServiceDescription | stats count by DependentService ServiceTitle ServiceDescription] | append [search index=* sourcetype=HL7_v2 | rename CareLocation as DependentService | rename Clinical_Directorate as ServiceTitle | where ServiceTitle !="*" | strcat ServiceTitle " - " "Clinical Directorate" ServiceDescription | stats count by DependentService ServiceTitle ServiceDescription] | append [search index=* sourcetype=HL7_v2 | rename Clinical_Directorate as DependentService | rename Location as ServiceTitle | where DependentService !="*" | strcat ServiceTitle " - " "Location" ServiceDescription | stats count by DependentService ServiceTitle ServiceDescription] | eval Location=ServiceTitle | table DependentService ServiceTitle Location ServiceDescription
dispatch.earliest_time = -24h
dispatch.latest_time = now
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

[DA-ITSI-CD-HSI-PATIENTFLOW-Average_LOS_Search]
description = Average LOS search for drilldown purpose
search = | inputlookup PF-L-PatientMovement | search Location="$Location$" | lookup PF-L-Location Location as Location OUTPUT TimeUnit | eval TimeDiv=case(TimeUnit="m", 60, TimeUnit="h", 3600) | eval StayDuration=if(dischargeTime>0,round((dischargeTime-admitTime)/TimeDiv,0),round((now()-admitTime)/TimeDiv,0)) | stats avg(StayDuration) AS AvgLOS by Patient_ID Location | eval AvgLOS=round(AvgLOS) | fields Patient_ID Location AvgLOS
dispatch.earliest_time = -24h
dispatch.latest_time = now
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search


[DA-ITSI-CD-HSI-PATIENTFLOW-Location_Entity_Inventory_Search]
description = Search for all unique location instances for entity page population
search = index=* sourcetype=HL7_v2 Location="$Location$" | dedup Location | table Location
dispatch.earliest_time = -24h
dispatch.latest_time = now
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search
