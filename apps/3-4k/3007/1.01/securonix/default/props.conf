[source::securonix.log]
sourcetype = securonix
SHOULD_LINEMERGE = true
BREAK_ONLY_BEFORE = \d{2}\:\d{2}\:\d{2}\,\d+
NO_BINARY_CHECK = true

[source::catalina.out]
sourcetype = securonix
SHOULD_LINEMERGE = true
BREAK_ONLY_BEFORE = \w{3}\s\d{2}\,\s\d{4}\s\d{2}\:\d{2}\:\d{2}\s\w{2}
NO_BINARY_CHECK = true

[securonix]
EXTRACT-log_level,threadname,jobid,signature,action,Jobname = \s(?P<log_level>[^\s]+)\s\[(?P<threadname>[^\]]+)\]\s\[JobId:(?P<jobid>\d+)\]\s((?P<signature>[^\for]\Execution\scompleted)|(?P<action>[^\-]\Error\sin\sjob\sexecution))\s(\-*|\w+)\s(?P<jobname>.+)
EXTRACT-datasource,eventcount = for\s(?P<datasource>[^and].+)\sand\ssize\s(?P<eventcount>[^\s]+)
BREAK_ONLY_BEFORE = \d+\:\d+\:\d+\,\d+
DATETIME_CONFIG = 
NO_BINARY_CHECK = true
disabled = false
pulldown_type = true


