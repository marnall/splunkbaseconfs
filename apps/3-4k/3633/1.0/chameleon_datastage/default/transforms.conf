# report xml start
[set_sourcetype]
REGEX = \<ParamSet>\s*
FORMAT = sourcetype::paramset
DEST_KEY = MetaData:Sourcetype

# report xml end

# job info start
[jobinfo-extractions-1]
REGEX = ([\w\s]*)?[\s*]\:(.*?(?:\n+|$))
FORMAT = $1::$2
MV_ADD = true

[jobinfo-extractions-2]
SOURCE_KEY=Job_Status
REGEX=^(?<Formatted_Job_Status>.*)?\(

# lookup start

[application_splunk_lookup]
external_type = kvstore
collection = application_splunk_collection
fields_list = _key, index, sourcetype, source,macro

[application_alert_threshold_lookup]
external_type = kvstore
collection = application_alert_threshold_collection
fields_list = _key, jobname, runtime


# lookup end