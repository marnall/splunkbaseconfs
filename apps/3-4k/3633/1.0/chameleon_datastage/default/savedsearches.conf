[Jobs with Errors]
action.email = 1
# TODO change the email
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 45 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = area
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `jobinfo_index` sourcetype="jobinfo" | where isnotnull(Job_Name) | where isnotnull(Job_Status) | table Job_Name Job_Status _time | stats latest(Job_Status) as Job_Status_latest by Job_Name |  where Job_Status_latest != "RUN with WARNINGS (2)" AND Job_Status_latest != "NOT RUNNING (99)" AND Job_Status_latest != "RUN OK (1)"  AND  Job_Status_latest != "RESET (21)" AND  Job_Status_latest != "VALIDATED OK (11)" AND  Job_Status_latest != "RUNNING*" AND Job_Status_latest != "VALIDATE WITH*"
schedule_window = 60


[Job running greater than threshold time]
action.email = 1
action.email.include.results_link = 0
action.email.inline = 1
action.email.sendpdf = 1
action.email.sendresults = 1
#TODO change the email
action.email.useNSSubject = 1
alert.digest_mode = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 45 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = area
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `jobinfo_index` sourcetype="jobinfo" | where isnotnull(Job_Name) | where isnotnull(Job_Status) | rename Job_Name as jobname | lookup application_alert_threshold_lookup jobname OUTPUT runtime | eval Time_In_Min = Time_Taken_Seconds/60 | where Time_In_Min > runtime | table jobname, Time_In_Min
schedule_window = 60


[Job Run Time greater than 7 day average of previous run times  (for successful jobs)]
action.email = 1
action.email.inline = 1
action.email.sendpdf = 1
action.email.sendresults = 1
action.email.useNSSubject = 1
alert.digest_mode = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 15 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `jobinfo_index` sourcetype=jobinfo Job_Status = "RUN OK (1)" earliest = -1h | join Job_Name [search `jobinfo_index` sourcetype = jobinfo Job_Status = "RUN OK (1)" earliest=-7d latest = -1h  | stats avg(Time_Taken_Seconds) as Avg_Time_Taken by Job_Name  | fields Job_Name, Avg_Time_Taken] | table Job_Name, Time_Taken_Seconds, Avg_Time_Taken | where Time_Taken_Seconds > Avg_Time_Taken
schedule_window = 60

