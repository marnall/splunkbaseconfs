search = `logsum_index`  log_type=WARNING earliest = -1h | stats count as current_warning_count by Job_Name, source  | join Job_Name [search `logsum_index` latest = -1h earliest = -10d log_type=WARNING | streamstats latest(source) as latest_source by Job_Name | where source = latest_source | stats count as previous_warning_count by Job_Name] | table Job_Name, source, current_warning_count, previous_warning_count | where current_warning_count  > previous_warning_count

