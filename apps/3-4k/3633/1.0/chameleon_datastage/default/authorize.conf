[role_chameleon_datastage_developer]
srchIndexesAllowed = *
srchFilter= sourcetype="dstagexml"
rest_apps_view      = enabled
rest_properties_get = enabled
rest_properties_set = enabled
search              = enabled

[role_chameleon_datastage_administrator]
srchIndexesAllowed = *
srchFilter= sourcetype="logsum"
rest_apps_view      = enabled
rest_properties_get = enabled
rest_properties_set = enabled
search              = enabled

[role_chameleon_datastage_executive]
srchIndexesAllowed = *
srchFilter= sourcetype="jobinfo" OR sourcetype="logsum" OR sourcetype="dstagexml" OR sourcetype="paramset"
rest_apps_view      = enabled
rest_properties_get = enabled
rest_properties_set = enabled
search              = enabled
schedule_rtsearch   = enabled
rtsearch            = enabled