[fml:log]
TIME_PREFIX = ^
TIME_FORMAT = date=%Y-%m-%d time=%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 29
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\n\r]+)date=\d{4}\-\d{2}\-\d{2}
TRUNCATE = 99999

TRANSFORMS-force_sourcetype_fml = force_sourcetype_fml_statistics,force_sourcetype_fml_event,force_sourcetype_fml_spam,force_sourcetype_fml_virus,force_sourcetype_fml_encrypt

#### Statistics ####

[fml:statistics]

REPORT-fml_statistics_src_ip = fml_src_ip
REPORT-fml_statistics_src_user_domain = fml_src_user_domain

EVAL-classifier = lower(classifier)
EVAL-recipient = nullif(to, "")
EVAL-recipient_domain = nullif(domain, "")
EVAL-return_addr = if(from like "%return%" OR from like "%reply%",from,null)
EVAL-src_user = nullif(from, "")
EVAL-vendor_product = "FortiMail"
EVAL-virus = nullif(virus, "")

FIELDALIAS-fml_statistics_action = disposition as vendor_action
FIELDALIAS-fml_statistics_dest = dst_ip as dest
FIELDALIAS-fml_statistics_filter_action = disposition as filter_action
FIELDALIAS-fml_statistics_message_id = session_id as message_id
FIELDALIAS-fml_statistics_recipient = to as recipient
FIELDALIAS-fml_statistics_signature = classifier as signature
FIELDALIAS-fml_statistics_signature_id = polid as signature_id
FIELDALIAS-fml_statistics_size = message_length as size
FIELDALIAS-fml_statistics_src = src_ip as src
FIELDALIAS-fml_statistics_src_user = from as src_user

LOOKUP-action_for_fortimail_email = fortimail_email_action_lookup vendor_action OUTPUT action

#### Event ####

[fml:event]

REPORT-fml_event_app_and_src_ip = fml_app_and_src_ip
REPORT-fml_event_delay = fml_delay
REPORT-fml_event_from = fml_from
REPORT-fml_event_msgid = fml_msgid
REPORT-fml_event_recipient_stat = fml_stat
REPORT-fml_event_src_priority = fml_src_priority
REPORT-fml_event_to = fml_to
REPORT-fml_event_user_and_src_ip = fml_user_and_src_ip
REPORT-fml_event_xdelay = fml_xdelay

EVAL-action = nullif(action, "N/A")
EVAL-app = lower(app)
EVAL-delay = (coalesce(delay_day,0) * 86400 + delay_hour * 3600 + delay_minute * 60 + delay_second) * 1000
EVAL-delay_day = null
EVAL-delay_hour = null
EVAL-delay_minute = null
EVAL-delay_second = null
EVAL-protocol = lower(proto)
EVAL-recipient = lower(to)
EVAL-src_user = lower(if(from == "<>", null, from))
EVAL-status = nullif(status, "N/A")
EVAL-xdelay = (coalesce(xdelay_day,0) * 86400 + xdelay_hour * 3600 + xdelay_minute * 60 + xdelay_second) * 1000
EVAL-xdelay_day = null
EVAL-xdelay_hour = null
EVAL-xdelay_minute = null
EVAL-xdelay_second = null

FIELDALIAS-fml_event_action = status as action
FIELDALIAS-fml_event_dest = host as dest
FIELDALIAS-fml_event_internal_message_id = InternalId as internal_message_id
FIELDALIAS-fml_event_message_id = session_id as message_id
FIELDALIAS-fml_event_recipientstatus = stat as recipient_status
FIELDALIAS-fml_event_recipient_count = nrcpts as recipient_count
FIELDALIAS-fml_event_src = src_ip as src

#### Spam ####

[fml:spam]

REPORT-fml_spam_filter_score = fml_filter_score
REPORT-fml_spam_src_ip = fml_src_ip
REPORT-fml_spam_sender_domain_recipient_domain = fml_sender_and_recipient_domain
REPORT-fml_spam_url = fml_url

FIELDALIAS-fml_spam_dest = dst_ip as dest
FIELDALIAS-fml_spam_message_id = session_id as message_id
FIELDALIAS-fml_spam_recipient = to as recipient
FIELDALIAS-fml_spam_src = src_ip as src
FIELDALIAS-fml_spam_src_user = from as src_user

#### Virus ####

[fml:virus]

REPORT-fml_virus_sender_domain_recipient_domain = fml_sender_and_recipient_domain
REPORT-fml_virus_src = fml_src
REPORT-fml_virus_src_orig = fml_src_orig

FIELDALIAS-fml_virus_message_id = session_id as message_id
FIELDALIAS-fml_virus_recipient = to as recipient
FIELDALIAS-fml_virus_src_ip = src as src_ip
FIELDALIAS-fml_virus_src_user = from as src_user

#### Encrypt ####

[fml:encrypt]

FIELDALIAS-fml_encrypt_message_id = session_id as message_id
