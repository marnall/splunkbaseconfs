[macro_docker_base]
definition = ()

[macro_docker_logs]
definition = (`macro_docker_base` (sourcetype=docker_logs OR source=/docker/logs/*))

# obsolete (use macro_docker_stats_host and macro_docker_stats_cgroup instead)
[macro_docker_stats]
definition = (`macro_docker_base` sourcetype=docker_stats*)

[macro_docker_stats_host]
definition = (`macro_docker_base` (sourcetype=docker_stats_v2_host OR (sourcetype=docker_stats AND source="/")))

[macro_docker_stats_cgroup]
definition = (`macro_docker_base` (sourcetype=docker_stats_v2_cgroup OR (sourcetype=docker_stats AND NOT source="/")))

[macro_docker_events]
definition = (`macro_docker_base` sourcetype=docker_events)

[macro_docker_proc_stats]
definition = (`macro_docker_base` (sourcetype=docker_proc_stats OR sourcetype=docker_proc_stats_v2))

[macro_docker_host_logs]
definition = (`macro_docker_base` sourcetype=docker_host_logs)

[macro_docker_net_stats]
definition = (`macro_docker_base` sourcetype=docker_net_stats*)

[macro_docker_net_socket_table]
definition = (`macro_docker_base` sourcetype=docker_net_socket_table)

[macro_docker_host_logs_docker]
definition = (`macro_docker_host_logs` AND (syslog_component::docker OR syslog_component::dockerd OR syslog_component::podman OR source="*/docker.log*" OR source="*/docker-*.log*" OR source="*/docker"))

[macro_docker_logs_collectord]
definition = (`macro_docker_logs` source=/docker/*/collectorfordocker:*)

[macro_docker_logs_collectord_license_check]
definition = (`macro_docker_logs_collectord` license-check)

[macro_docker_mount_stats]
definition = (`macro_docker_base` sourcetype=docker_mount_stats)

[macro_docker_disk_stats]
definition = (`macro_docker_base` sourcetype=docker_disk_stats)

[macro_docker_prometheus_metrics_collectord]
definition = (`macro_docker_base` sourcetype=docker_prometheus source=collectord:*)

[macro_docker_proc_capabilities_hex_to_binary(2)]
args = output, input
definition = eval $output$=replace(replace(replace(replace(replace(replace(replace(replace(\
                           replace(replace(replace(replace(replace(replace(replace(replace(\
                           replace(replace(upper($input$),"0","0000"),"1","0001"),"2","0010")\
                           ,"3","0011"),"4","0100"),"5","0101"),"6","0110"),"7","0111"),"8","1000"),\
                           "9","1001"),"A","1010"),"B","1011"),"C","1100"),"D","1101"),"E","1110"),"F"\
                           ,"1111"), "0", "/0"), "1", "/1")
iseval = 0

[macro_docker_alerts_base]
definition = ()