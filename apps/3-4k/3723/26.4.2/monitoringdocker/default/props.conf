EVAL-docker_stats_cpu_system_cores = round(cpu_system_percent/100, 3)
EVAL-docker_stats_memory_percent_of_host = 100*(memory_rss_bytes+coalesce(memory_mapped_files_bytes,0))/memory_total_bytes
EVAL-docker_stats_memory_rss_mb = memory_rss_bytes/1024/1024
EVAL-docker_stats_memory_mapped_files_mb = memory_mapped_files_bytes/1024/1024
EVAL-docker_stats_memory_total_mb = memory_total_bytes/1024/1024
EVAL-proc__meminfo__swaptotal = memory_swap_total_bytes
EVAL-proc__meminfo__swapfree = (memory_swap_total_bytes-memory_swap_bytes)
EVAL-docker_stats_last_seen = max(floor((now()-_time)/60), 0)
EVAL-proc__sys__kernel__ostype = ostype
EVAL-proc__sys__kernel__osrelease = osrelease
EVAL-proc__stat__uptime_seconds = uptime_sec
EVAL-docker_stats_io_wait_read_percent = io_wait_read_percent
EVAL-docker_stats_io_wait_write_percent = io_wait_write_percent
EVAL-docker_stats_io_read_mb = io_read_bytes/1024/1024
EVAL-docker_stats_io_write_mb = io_write_bytes/1024/1024

