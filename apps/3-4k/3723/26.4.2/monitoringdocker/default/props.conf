[docker_stats]
SEGMENTATION = none
EVAL-docker_container_id_short = substr(docker_container_id, 0, 12)
EVAL-docker_container_unique_name = docker_container_name+" ("+substr(docker_container_id, 0, 12)+")"
FIELDALIAS-docker_container_image_id = docker_container_image_id AS docker_container_imageid
REPORT-extract_docker_stats = docker_stats_fields

EVAL-docker_stats_memory_mb = (cgroup__memory__stat__total_rss+cgroup__memory__stat__total_mapped_file)/1024/1024
EVAL-docker_stats_memory_percent_of_host = 100*(cgroup__memory__stat__total_rss+cgroup__memory__stat__total_mapped_file)/proc__meminfo__memtotal
EVAL-docker_stats_memory_percent_of_limit = 100*(cgroup__memory__stat__total_rss+cgroup__memory__stat__total_mapped_file)/(coalesce(if(cgroup__memory__limit_in_bytes>7999999999999, null(), cgroup__memory__limit_in_bytes), proc__meminfo__memtotal))
EVAL-docker_stats_memory_rss_mb = cgroup__memory__stat__total_rss/1024/1024
EVAL-docker_stats_memory_mapped_files_mb = cgroup__memory__stat__total_mapped_file/1024/1024
EVAL-docker_stats_memory_swap_mb = nullif(cgroup__memory__stat__swap/1024/1024, 0)
EVAL-docker_stats_memory_swap_total_mb = cgroup__memory__stat__total_swap/1024/1024
EVAL-docker_stats_memory_limit_mb = coalesce(if(cgroup__memory__limit_in_bytes>7999999999999, null(), cgroup__memory__limit_in_bytes), proc__meminfo__memtotal)/1024/1024
EVAL-docker_stats_memory_total_mb = proc__meminfo__memtotal/1024/1024
EVAL-docker_stats_cpu_quota_percent = coalesce(100*nullif(nullif(cgroup__cpu__cfs_quota_us, -1)/cgroup__cpu__cfs_period_us, 0), proc__stat__cpu_count*100)
EVAL-docker_stats_cpu_shares_percent = 100*(cgroup__cpu__shares/1024)
EVAL-docker_stats_cpu_throttled_percent = 100*cgroup__cpu__stat__throttled_time/period
EVAL-docker_stats_cpu_throttled_cores = round(cgroup__cpu__stat__throttled_time/period, 3)
EVAL-docker_stats_cpu_throttled_percent_of_host = docker_stats_cpu_throttled_percent/proc__stat__cpu_count
EVAL-docker_stats_cpu_user_percent = proc__stat__cpu_count*100*cgroup__cpuact__stat__user/proc__stat__cpu_total
EVAL-docker_stats_cpu_user_cores = round(proc__stat__cpu_count*cgroup__cpuact__stat__user/proc__stat__cpu_total, 3)
EVAL-docker_stats_cpu_user_percent_of_host = 100*cgroup__cpuact__stat__user/proc__stat__cpu_total
EVAL-docker_stats_cpu_system_percent = proc__stat__cpu_count*100*cgroup__cpuact__stat__system/proc__stat__cpu_total
EVAL-docker_stats_cpu_system_cores = round(proc__stat__cpu_count*cgroup__cpuact__stat__system/proc__stat__cpu_total, 3)
EVAL-docker_stats_cpu_system_percent_of_host = 100*cgroup__cpuact__stat__system/proc__stat__cpu_total
EVAL-docker_stats_cpu_percent = proc__stat__cpu_count*100*(cgroup__cpuact__stat__user+cgroup__cpuact__stat__system)/proc__stat__cpu_total
EVAL-docker_stats_cpu_percent_of_host = 100*(cgroup__cpuact__stat__user+cgroup__cpuact__stat__system)/proc__stat__cpu_total
EVAL-docker_stats_cpu_percent_of_quota = 100*(100*(cgroup__cpuact__stat__user+cgroup__cpuact__stat__system)/proc__stat__cpu_total)/coalesce(100*nullif((1/proc__stat__cpu_count)*nullif(cgroup__cpu__cfs_quota_us, -1)/cgroup__cpu__cfs_period_us, 0), 100)
EVAL-docker_stats_io_read_mb = nullif(cgroup__blkio__io_service_bytes_recursive__read_total/1024/1024, 0)
EVAL-docker_stats_io_write_mb = nullif(cgroup__blkio__io_service_bytes_recursive__write_total/1024/1024, 0)
EVAL-docker_stats_io_wait_read_percent = nullif(cgroup__blkio__io_wait_time_recursive__read_total/period, 0)
EVAL-docker_stats_io_wait_write_percent = nullif(cgroup__blkio__io_wait_time_recursive__write_total/period, 0)
EVAL-docker_stats_last_seen = max(floor((now()-_time)/60), 0)

EVAL-docker_swarm_stack_namespace = substr(mvfilter(match(docker_container_labels, "^com\.docker\.stack\.namespace=")), 28)
EVAL-docker_swarm_service_name = substr(mvfilter(match(docker_container_labels, "^com\.docker\.swarm\.service\.name=")), 31)
EVAL-docker_swarm_service_id = substr(mvfilter(match(docker_container_labels, "^com\.docker\.swarm\.service\.id=")), 29)

EVAL-ecs_cluster = substr(mvfilter(match(docker_container_labels, "^com\.amazonaws\.ecs\.cluster=")), 27)
EVAL-ecs_task_definition = substr(mvfilter(match(docker_container_labels, "^com\.amazonaws\.ecs\.task-definition-family=")), 42)
EVAL-ecs_task_definition_version = substr(mvfilter(match(docker_container_labels, "^com\.amazonaws\.ecs\.task-definition-version=")), 43)

