EVAL-docker_container_unique_name = docker_container_name+" ("+substr(docker_container_id, 0, 12)+")"
EVAL-docker_net_socket_table_last_seen = max(floor((now()-_time)/60), 0)

EVAL-docker_swarm_stack_namespace = substr(mvfilter(match(docker_container_labels, "^com\.docker\.stack\.namespace=")), 28)
EVAL-docker_swarm_service_name = substr(mvfilter(match(docker_container_labels, "^com\.docker\.swarm\.service\.name=")), 31)
EVAL-docker_swarm_service_id = substr(mvfilter(match(docker_container_labels, "^com\.docker\.swarm\.service\.id=")), 29)

EVAL-ecs_cluster = substr(mvfilter(match(docker_container_labels, "^com\.amazonaws\.ecs\.cluster=")), 27)
EVAL-ecs_task_definition = substr(mvfilter(match(docker_container_labels, "^com\.amazonaws\.ecs\.task-definition-family=")), 42)
EVAL-ecs_task_definition_version = substr(mvfilter(match(docker_container_labels, "^com\.amazonaws\.ecs\.task-definition-version=")), 43)

[docker_mount_stats]
SEGMENTATION = none
REPORT-extract_docker_mount_stats_table = docker_mount_stats_table_fields

[docker_disk_stats]
SEGMENTATION = none
REPORT-extract_docker_disk_stats_table = docker_disk_stats_table_fields

# collector
[source::/docker/.../collectorfordocker:*.stdout]
EXTRACT-license-check = ^INFO .*license_check_pipe.go:\d+:\slicense-check\s(?<product>[^\s]+)\s(?<license_id>[^\s]+)?\s(?<limit>[^\s]+)\s(?<expiration>[^\s]+)\s(?<instance_id>[^\s]+)\s(?<created_at>[^\s]+)\s(?<started_at>[^\s]+)\s(?<version>[^\s]+)\s(?<build_date>[^\s]+)\s(?<valid>[^\s]+)\s(?<check_success>[^\s]+)\s(?<err_points>[^\s]+)(\sc(?<lUnits>\d+)\st(?<lType>\d+))?\s(?<message>.*)$
EVAL-version_major = mvindex(split(version, "."), 0, 0)
EVAL-version_minor = mvindex(split(version, "."), 1, 1)