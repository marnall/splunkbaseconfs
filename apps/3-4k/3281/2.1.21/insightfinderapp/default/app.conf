# Splunk app configuration file

[package]
id = insightfinderapp
check_for_updates = 1

[install]
state = enabled
is_configured = 0
build = 2

[ui]
is_visible = 1
label = InsightFinder App for Splunk
# Points to a file in:
# $SPLUNK_HOME/etc/apps/<SPLUNK_APP_NAME>/default/data/ui/views/*
# It does not need the extension of the file name provided
setup_view = setup_page_dashboard

[launcher]
author = InsightFinder
description = Send data from Splunk to InsightFinder.
version = 2.1.21

[triggers]
reload.appsetup = simple
