[syslog]
EXTRACT-K2_event_message = ^(?:[^ \n]* ){8}\w+(?P<K2_message>.+)
EXTRACT-K2_event_name = ^[^\]\n]*\]\s+\[(?P<K2_event_name>[^\]]+)
EXTRACT-K2_event_type = ^(?:[^\-\n]*\-){2}(?P<K2_event_type>\w+)
EXTRACT-K2_label = ^[^ \n]* (?P<K2_label>\w+\d+\-\w+)
EXTRACT-K2_message_label = ^(?:[^ \n]* ){6}\[(?P<K2_message_label>[^\]]+)
EXTRACT-K2_message_header = ^(?:[^ \n]* ){7}(?P<K2_message_header>[^:]+)
EXTRACT-K2_src_IP = ^<\d+>(?P<K2_src_IP>[^ ]+)
EXTRACT-Severity = ^[^\[\n]*\[(?P<Severity>\w+)
EXTRACT-date = ^[^:\n]*:\s+(?P<date>\d+\-\d+\-\d+\s+\d+:\d+:\d+)
REPORT-K2-message44 = REPORT-K2-message44
REPORT-K2_message1 = REPORT-K2_message1
REPORT-K2_message4 = REPORT-K2_message4
