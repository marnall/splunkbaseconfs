
[Generate Lookup Homepage Indexes Sourcetypes]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
dispatch.earliest_time = -4h@h
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
schedule_window = 5
search = | tstats count where index=* by index, sourcetype\
| fields - count\
| outputlookup homepage_indexes_sourcetypes
