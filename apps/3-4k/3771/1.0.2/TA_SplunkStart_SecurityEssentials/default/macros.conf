[mac_first_time_seen(6)]
args = ind, src, earl, late, outlierValueTracked1Token, outlierValueTracked2Token
definition = index=$ind$ sourcetype=$src$ earliest=$earl$ latest=$late$ |eval comment="<-- outlierValueTracked1Token and outlierValueTracked2Token are what we are tracking, e.g. user and dest for first logon to server"| stats earliest(_time) as earliest latest(_time) as latest by $outlierValueTracked1Token$, $outlierValueTracked2Token$ |eventstats max(latest) as maxlatest | where earliest >= relative_time(maxlatest, "-1d@d")|fields - comment |eval earliest=strftime(earliest,"%m/%d/%y %H:%M:%S")|eval latest=strftime(latest,"%m/%d/%y %H:%M:%S")|eval maxlatest=strftime(maxlatest,"%m/%d/%y %H:%M:%S")|table $outlierValueTracked1Token$, $outlierValueTracked2Token$, earliest, latest, maxlatest

[mac_time_series_outlier(6)]
args = ind, src, earl, late, outlierVariableToken, outlierVariableSubjectToken
definition = index=$ind$ sourcetype=$src$ earliest=$earl$ latest=$late$ |eval comment="outlierVariabletoken is our data points (e.g. # of logins), outlierVariableSubjectToken is our subject (e.g., user)" | eventstats max(_time) as maxtime | stats count as num_data_samples max(eval(if(_time >= relative_time(maxtime, "-1d@d"), $outlierVariableToken$,null))) as $outlierVariableToken$ avg(eval(if(_time<relative_time(maxtime,"-1d@d"),$outlierVariableToken$,null))) as avg stdev(eval(if(_time<relative_time(maxtime,"-1d@d"),$outlierVariableToken$,null))) as stdev by $outlierVariableSubjectToken$ |eval lowerBound=(avg-stdev*2), upperBound=(avg+stdev*2)|where ($outlierVariableToken$ < lowerBound OR $outlierVariableToken$ > upperBound) AND num_data_samples >=7|fields - comment
iseval = 0


