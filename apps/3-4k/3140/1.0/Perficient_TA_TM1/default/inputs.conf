#Grab all TM1 server logs
[monitor:///SETUP_INPUTS/.../tm1server.log]
sourcetype=tm1:serverlog
index=SETUP_INDEX
disabled=1

#Grab all TM1 Process Error Logs
[monitor:///SETUP_INPUTS/.../TM1ProcessError*.log]
sourcetype=tm1:processerror
index=SETUP_INDEX
disabled=1
crcSalt = <SOURCE>

#Grab all TM1 cfg files
[monitor:///SETUP_INPUTS/.../tm1s.cfg]
sourcetype=tm1:cfg
index=SETUP_INDEX
disabled=1
crcSalt = <SOURCE>
