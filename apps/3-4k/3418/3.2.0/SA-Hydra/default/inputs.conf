#Enables the Hydra Gateway WSGI Service
[script://$SPLUNK_HOME/etc/apps/SA-Hydra/bin/bootstrap_hydra_gateway.py]
python.version = python3
python.required = 3.13
disabled = true
interval = 10
source = hydra_gateway
sourcetype = hydra_gateway
passAuth = admin

