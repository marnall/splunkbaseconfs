
[StealthINTERCEPT_Authentication]
priority = 5
search = `stealthData` event_id="Authentication Auth *"

[StealthINTERCEPT_Active_Directory_Accounts]
priority = 5
search = `stealthData` event_id="Active Directory*" ObjectClass="user"

[StealthINTERCEPT_Active_Directory_Changes]
priority = 5
search = `stealthData` event_id = "Active Directory*" ObjectClass!="user"

[StealthINTERCEPT_File_System_Activity]
priority = 5
search = (`stealthData` AND (event_id != "Active Directory*" AND event_id != "GPO*" AND event_id != "Exchange*") AND (event_id = "*Attribute Change" OR event_id = "*Read" OR event_id = "*Access Rights Change" OR event_id = "*Update" OR event_id = "*Delete" OR event_id = "*Create" OR event_id = "*Rename")) OR sourcetype="SFAM" OR sourcetype = "SFAM-Syslog"
