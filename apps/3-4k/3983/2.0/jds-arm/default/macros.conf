[jds-arm]
definition = index=jds-arm

[jds-arm-application-overview]
definition = eval avail = if(status="1",100,0) \
| eval duration = duration / 1000 \
| timechart limit=0 sum(duration) as duration_sum avg(duration) as sparkPerf count(duration) as duration_count sum(avail) as avail_sum avg(avail) as sparkAvail count(avail) as avail_count by application_name \
| filldown sparkPerf* sparkAvail* \
| fillnull \
| stats list(sparkPerf*) as sparkPerf* sum(duration_sum*) as duration_sum* sum(duration_count*) as duration_count* list(sparkAvail*) as sparkAvail* sum(avail_sum*) as avail_sum* sum(avail_count*) as avail_count* \
| foreach sparkPerf* sparkAvail* \
    [ eval <<FIELD>>=split("##__SPARKLINE__##," + mvjoin('<<FIELD>>',","),",") ] \
| transpose \
| rex field=column "(?<type>[^\:]*):\s(?<application_name>.*)" \
| xyseries application_name type "row 1" \
| eval avgAvail = avail_sum/avail_count \
| eval avgPerf = duration_sum/duration_count \
| eval COMMENT = "Pretty much everything above here is just to replicate the sparkline() function but using filldown instead of the default behavior of zeroing out" \
| lookup arm_applications.csv application_name OUTPUTNEW application_warning_threshold application_error_threshold application_availability_threshold \
| eval statusPerf = CASE(ISNULL(application_warning_threshold) OR ISNULL(application_error_threshold) OR ISNULL(avgPerf), "unknown", avgPerf < application_warning_threshold, "good", avgPerf < application_error_threshold, "warn", 1==1, "error") \
| eval statusAvail = CASE(ISNULL(application_availability_threshold) OR ISNULL(avgAvail), "unknown", avgAvail > application_availability_threshold, "good", 1==1, "error") \
| eval application_name_lower = lower(application_name) \
| sort application_name_lower \
| table application_name avgPerf statusPerf sparkPerf avgAvail statusAvail sparkAvail \

