[Nutanix Health]
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.statistics.drilldown = none
enableSched = 1
search = `nutanix_index` sourcetype = "nutanix_health" | stats count by entityType, healthSummary.Warning, healthSummary.Critical | convert num(healthSummary.Warning) AS Warning  num(healthSummary.Critical) AS Critical | stats sum(Warning) as Warning, sum(Critical) as Critical by entityType | table entityType Total Warning Critical | rename entityType AS Entity

[Latest Event]
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.singlevalue.rangeColors = ["0x65a637","0x6db7c6","0xf7bc38","0xf58f39","0xd93f3c"]
display.visualizations.singlevalue.rangeValues = [0,30,70,100]
display.visualizations.singlevalue.trendInterval = auto
display.visualizations.singlevalue.underLabel = minutes ago
display.visualizations.singlevalueHeight = 20
display.visualizations.type = singlevalue
enableSched = 1
search = `nutanix_index` sourcetype="nutanix_events" | spath created_time_stamp | eval timestamp_epoch = strptime(created_time_stamp, "%Y-%m-%dT%H:%M:%S.%3N%z") | eval last_event = round((now() - timestamp_epoch)/60) | stats first(last_event) AS "Last Event"

[Cluster Events]
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = visualizations
display.visualizations.singlevalue.rangeColors = ["0x65a637","0x6db7c6","0xf7bc38","0xf58f39","0xd93f3c"]
display.visualizations.singlevalue.rangeValues = [0,30,70,100]
display.visualizations.singlevalue.trendInterval = auto
display.visualizations.singlevalue.underLabel = Total Events Last 24 Hours
display.visualizations.singlevalueHeight = 20
display.visualizations.type = singlevalue
enableSched = 1
search = `nutanix_index` sourcetype="nutanix_events" | stats dc(id) AS "Total Number of Events"


[Hosts]
alert.track = 0
cron_schedule = 5 * * * *
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
enableSched = 1
search = `nutanix_index` sourcetype="nutanix_arch" source="nutanix:hosts" | stats count by hypervisorType nutanix_name hypervisorFullName uuid blockModelName blockSerial memoryCapacityInBytes cpuCapacityInHz

[Alerts]
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
search = `nutanix_index` sourcetype="nutanix_alerts" | stats count by severity id | dedup id

[Disks]
alert.track = 0
cron_schedule = 5 * * * *
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
enableSched = 1
search = `nutanix_index` sourcetype="nutanix_cluster" source="nutanix:cluster_details" | stats count by id usageStats.storage.usage_bytes usageStats.storage.free_bytes usageStats.storage.capacity_bytes | dedup id

