[Cluster]
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -150m@m
dispatch.latest_time = now
enableSched = 1
search = `nutanix_index` sourcetype="nutanix_cluster" | stats count by cluster_time controller_num_iops bandwidth controller_latency

[Resiliency]
alert.track = 0
cron_schedule = 5 * * * *
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
enableSched = 1
search = `nutanix_index` sourcetype="nutanix_arch" source="nutanix:resiliency" domainType=NODE | eval status = if(oplog_status=="1" AND metadata_status=="1" AND zookeeper_status=="1" AND static_config_status=="1" AND stargate_status=="1" AND erasure_code_status=="1" AND extent_group_status=="1" AND freespace_status =="1" ,"OK","Not OK") | fields status | head 1 | table status


[Rebuild]
alert.track = 0
cron_schedule = 5 * * * *
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
enableSched = 1
search = `nutanix_index` sourcetype="nutanix_arch" source="nutanix:resiliency" domainType = RACKABLE_UNIT | eval status = if(static_config_status=="0","Yes","No") | fields status |  head 1 | table status

[Cassandra]
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
search = `nutanix_syslog_index` sourcetype=nutanix_syslog process=*cassandra*

