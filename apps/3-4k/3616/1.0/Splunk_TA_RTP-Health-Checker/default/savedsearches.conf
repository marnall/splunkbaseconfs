[Capacity - Compression Ratio]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = Splunk_TA_RTP-Health-Checker
request.ui_dispatch_view = search
search = | dbinspect index=* \
| fields state,id,rawSize,sizeOnDiskMB,index \
| stats sum(rawSize) AS rawTotal, sum(sizeOnDiskMB) AS diskTotalinMB by index \
| eval rawTotalinMB=(rawTotal / 1024 / 1024) \
| fields - rawTotal \
| addcoltotals diskTotalinMB rawTotalinMB labelfield=index \
| eval compression=tostring(round(100 - diskTotalinMB / rawTotalinMB * 100, 2)) + "%" \
| where diskTotalinMB > 10 \
| outputlookup capacity_compression_ratio.csv

