[gemini_dataquality_field_coverage]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0,15,30,45 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = gemini_dataquality
request.ui_dispatch_view = search
schedule_window = 5
search = (`dataquality_indexes`)\
| fields *\
| fieldstats\
| eval has_field=case(fieldcount>1,"yes")\
| eval eventlength=len(_raw)\
| eval field_coverage=(fieldlength*100)/eventlength\
| stats count AS total_events, count(eval(has_field)) AS events_with_fields, avg(eventlength) AS avg_eventlength, avg(fieldlength) AS avg_fieldlength, avg(field_coverage) AS rate_of_field_coverage by sourcetype \
| eval rate_of_events_with_fields=(events_with_fields*100)/total_events\
| rename sourcetype AS series\
| addinfo\
| eval _time=info_max_time\
| setfields version="1.3", metric="gemini_dataquality_field_coverage" \
| table _time, metric, series, total_events, events_with_fields, avg_eventlength, avg_fieldlength, rate_of_field_coverage, rate_of_events_with_fields, version\
| collect index=`dataquality_summary_index` testmode=false

[gemini_dataquality_rate_of_fields]
disabled = 0
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0,15,30,45 * * * *
enableSched = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_app = gemini_dataquality
request.ui_dispatch_view = search
schedule_window = 5
search = (`dataquality_indexes`) \
| fieldsummary \
| stats sum(count) as total_fields max(count) as total_events \
| eval avg_fields=total_fields/total_events \
| rename avg_fields AS value\
| addinfo\
| eval _time=info_max_time\
| setfields version="1.1", metric="gemini_dataquality_rate_of_fields" \
| table _time, metric, value, version\
| collect index=`dataquality_summary_index` testmode=false


