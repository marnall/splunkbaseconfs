search = | tstats count AS Alerts from datamodel=Gemini_Alerts by _time\
| append [ | tstats count AS Gemini_Application_State from datamodel=Gemini_Application_State by _time ]\
| append [ | tstats count AS Gemini_Authentication from datamodel=Gemini_Authentication by _time ]\
| append [ | tstats count AS Gemini_Certificates from datamodel=Gemini_Certificates by _time ]\
| append [ | tstats count AS Gemini_Change_Analysis from datamodel=Gemini_Change_Analysis by _time ]\
| append [ | tstats count AS Gemini_Compute_Inventory from datamodel=Gemini_Compute_Inventory by _time ]\
| append [ | tstats count AS Gemini_Databases from datamodel=Gemini_Databases by _time ]\
| append [ | tstats count AS Gemini_DLP from datamodel=Gemini_DLP by _time ]\
| append [ | tstats count AS Gemini_Email from datamodel=Gemini_Email by _time ]\
| append [ | tstats count AS Gemini_Interprocess_Messaging from datamodel=Gemini_Interprocess_Messaging by _time ]\
| append [ | tstats count AS Gemini_Intrusion_Detection from datamodel=Gemini_Intrusion_Detection by _time ]\
| append [ | tstats count AS Gemini_Malware from datamodel=Gemini_Malware by _time ]\
| append [ | tstats count AS Gemini_Network_Resolution from datamodel=Gemini_Network_Resolution by _time ]\
| append [ | tstats count AS Gemini_Network_Sessions from datamodel=Gemini_Network_Sessions by _time ]\
| append [ | tstats count AS Gemini_Network_Traffic from datamodel=Gemini_Network_Traffic by _time ]\
| append [ | tstats count AS Gemini_Performance from datamodel=Gemini_Performance by _time ]\
| append [ | tstats count AS Gemini_Ticket_Management from datamodel=Gemini_Ticket_Management by _time ]\
| append [ | tstats count AS Gemini_Updates from datamodel=Gemini_Updates by _time ]\
| append [ | tstats count AS Gemini_Vulnerabilities from datamodel=Gemini_Vulnerabilities by _time ]\
| append [ | tstats count AS Gemini_Web from datamodel=Gemini_Web by _time ]\
| stats sum(*) AS *\
| transpose\
| rename column AS datamodel, "row 1" as nr_events\
| addinfo\
| eval _time=info_min_time\
| setfields version="1.1" metric="gemini_dataquality_events_by_datamodel"\
| table _time metric datamodel nr_events version\
| collect testmode=false index=`dataquality_summary_index`

