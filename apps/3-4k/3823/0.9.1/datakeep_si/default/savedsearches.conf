[DataKeep Events]
description = DataKeep events in reverse chronological order
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = datakeep_si
request.ui_dispatch_view = search
search = sourcetype=syslog source="tcp:9998" \
| table devTime, EventId, identSrc, msg, spxfpath, spxpid, spxuid, spxgid\
| rename devTime as "Date/Time", EventId as "Event ID", identSrc as "Source", msg as "Message", spxfpath as "Resource", spxpid as "Process"
