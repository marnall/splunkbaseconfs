[darktrace]
pulldown_type = true
description = Darktrace JSON syslog format.
category = Structured
SEDCMD-remove_header = s/^[^\{]+//
FIELDALIAS-darktrace-CIM = "device.credentials" ASNEW src_user "device.credentials" ASNEW user "model.actions.antigena.action" ASNEW action  "triggeredComponents{}.metric.label" ASNEW reason host ASNEW dvc id ASNEW pbid aiaScore ASNEW score
KV_MODE = json
EXTRACT-desthost1 = (?="filterType":"Connection hostname")(?:[^}]+|[^}]+"arguments":{[^}]*}[^}]+)(?:"trigger":{"value":")(?<dest_host>[^"]+)(?:")
EXTRACT-desthost2 = (?:"trigger":{"value":")(?<dest_host>[^"]+)(?:")(?:[^{]+"arguments":{[^{]+|[^{]+)(?="filterType":"Connection hostname")
EXTRACT-destip1 = (?="filterType":"Destination IP")(?:[^}]+|[^}]+"arguments":{[^}]*}[^}]+)(?:"trigger":{"value":")(?<dest_ip>[^"]+)(?:")
EXTRACT-destip2 = (?:"trigger":{"value":")(?<dest_ip>[^"]+)(?:")(?:[^{]+"arguments":{[^{]+|[^{]+)(?="filterType":"Destination IP")
EXTRACT-destport1 = (?="filterType":"Destination port")(?:[^}]+|[^}]+"arguments":{[^}]*}[^}]+)(?:"trigger":{"value":")(?<dest_port>[^"]+)(?:")
EXTRACT-destport2 = (?:"trigger":{"value":")(?<dest_port>[^"]+)(?:")(?:[^{]+"arguments":{[^{]+|[^{]+)(?="filterType":"Destination port")
EXTRACT-dest1 = ^(?:(?!"dest":"[a-zA-Z0-9-\.:]+").)*(?="filterType":"(?:Connection hostname|Internal destination device name)")(?:[^}]+|[^}]+"arguments":{[^}]*}[^}]+)(?:"trigger":{"value":")(?<dest>[^"]+)(?:")(?:(?!"dest":"[a-zA-Z0-9-\.:]+").)*$
EXTRACT-dest2 = ^(?:(?!"dest":"[a-zA-Z0-9-\.:]+").)*(?:"trigger":{"value":")(?<dest>[^"]+)(?:")(?:[^{]+"arguments":{[^{]+|[^{]+)(?="filterType":"(?:Connection hostname|Internal destination device name)")(?:(?!"dest":"[a-zA-Z0-9-\.:]+").)*$
EXTRACT-filehash1 = (?="filterType":"(?:MD5 file hash|SHA1 file hash|SHA256 file hash)")(?:[^}]+|[^}]+"arguments":{[^}]*}[^}]+)(?:"trigger":{"value":")(?<file_hash>[^"]+)(?:")
EXTRACT-filehash2 = (?:"trigger":{"value":")(?<file_hash>[^"]+)(?:")(?:[^{]+"arguments":{[^{]+|[^{]+)(?="filterType":"(?:MD5 file hash|SHA1 file hash|SHA256 file hash)")
EXTRACT-sectime = "creationTime":(?<_time>[0-9]{10})[0-9]{3}
EXTRACT-modelbreachid = "pbid":(?<id>[^,]+),
LOOKUP-darktrace-vendor = darktrace-vendor sourcetype OUTPUT vendor_product,app,type
EVAL-id = case (isnotnull(modelbreachid), modelbreachid, isnotnull(uuid), uuid, isnotnull(id), id)
EVAL-vendor_severity = if (isnotnull(aiaScore), case(groupCategory=="compliance", "Informational", groupScore > 30 AND groupCategory=="critical", "Critical", groupCategory=="critical" AND groupScore < 30, "High", groupScore > 20, "Medium", groupScore <= 20, "Low"), if (isnotnull(priority_level) AND isnotnull(alert_name) AND isnotnull(priority), case (priority >=80, "Critical", priority >=60, "High", priority >=40, "Medium", priority >=20, "Low", priority < 20, "Informational"), if ('model.compliance'==true, "Compliance", 'model.category')))
EVAL-severity = if (isnotnull(aiaScore), case(groupCategory=="compliance", "informational", groupScore > 30 AND groupCategory=="critical", "critical", groupCategory=="critical" AND groupScore < 30, "high", groupScore > 20, "medium", groupScore <= 20, "low"), if (isnotnull(priority_level) AND isnotnull(alert_name) AND isnotnull(priority), case (priority >=80, "critical", priority >=60, "high", priority >=40, "medium", priority >=20, "low", priority < 20, "informational"), case(score * 100 > 75, "critical", score * 100 > 50, "high", score * 100 > 25, "medium", score * 100 >= 0, "low")))
EVAL-severity_id =  case (isnotnull('model.priority'), 'model.priority', isnotnull(aiaScore), ceil(aiaScore/10), isnotnull(priority), ceil(priority/10))
EVAL-src = case (isnotnull('device.hostname'), 'device.hostname', isnotnull('breachDevices{}.hostname') AND 'breachDevices{}.hostname'!="null", 'breachDevices{}.hostname', isnotnull(hostname), hostname)
EVAL-src_host = case (isnotnull('device.hostname'), 'device.hostname', isnotnull('breachDevices{}.hostname') AND 'breachDevices{}.hostname'!="null", 'breachDevices{}.hostname', isnotnull(hostname), hostname)
EVAL-src_ip = case (isnotnull('device.ip'), 'device.ip', isnotnull('breachDevices{}.ip') AND 'breachDevices{}.ip'!="null", 'breachDevices{}.ip', isnotnull(ip_address), ip_address)
EVAL-signature = case (isnotnull('model.name'), 'model.name', isnotnull(title), title, isnotnull(alert_name), alert_name)
EVAL-subject = case (isnotnull('model.name'), 'model.name', isnotnull(title), title, isnotnull(alert_name), alert_name)
EVAL-category = case (isnotnull('model.name'), 'model.name', isnotnull(title), isnotnull(alert_name), alert_name)
EVAL-signature_id = case (isnotnull(pbid), pbid, isnotnull(summariser), summarise, isnotnull(name), name)
EVAL-body = case (isnotnull('model.description'), 'model.description', isnotnull(summary), summary, isnotnull(message), message)
EVAL-description = case (isnotnull('model.description'), 'model.description', isnotnull(summary), summary, isnotnull(message), message)
EVAL-url = if(isnotnull(breachUrl), breachUrl, url)
EVAL-model_category = if ('model.compliance'=="true", "Compliance", 'model.category')
TRUNCATE=25000
