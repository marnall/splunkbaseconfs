#
# Iguana Web Analytics App for Splunk® | Visualizations
#

[wordcloud]
label = Wordcloud
description = Visualize text frequency as a wordcloud
default_height = 400
search_fragment = | stats count by word

[scatter3d]
label = 3D Scatterplot
description = Rotate and zoom on a 3D scatterplot.
default_height = 500
search_fragment = | table category x y z

[treemap]
label = Treemap
default_height = 500
description = Visualize data patterns and hierarchy.
search_fragment = | stats stats_function(size_field) [stats_function(color_field)] by category, name
supports_drilldown = True
supports_trellis = True

[donut]
label = Donut
description = Variation of the normal pie chart
search_fragment = stats count by sourcetype
default_height = 300

[globe]
label = WebGL Globe
description = Visualize data by geographic location on a 3D WebGL Globe.
default_height = 600
search_fragment = | geostats count [by category] latfield=lat longfield=lon

[clustermap]
label = Custom Cluster Map
default_height = 450
description = Show simple aggregated values on a map
search_fragment = ... | geostats count
allow_user_selection = 1


