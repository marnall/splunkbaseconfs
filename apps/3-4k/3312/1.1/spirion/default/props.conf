[spirion_endpoints]
TIME_PREFIX = changedTimestamp": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%7N
MAX_TIMESTAMP_LOOKAHEAD = 0
INDEXED_EXTRACTIONS = json
FIELDALIAS-dlp_src = hostName AS src
FIELDALIAS-spirion_src_ip = ipAddresses{} AS src_ip
FIELDALIAS-spirion_signature = dataTypes{}.name AS signature
FIELDALIAS-spirion_category = classifications{}.name AS category
FIELDALIAS-spirion_object_category = classifications{}.name AS object_category
EVAL-vendor_product = "spirion"

[spirion_locations]
TIME_PREFIX = changedTimestamp": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%7N
MAX_TIMESTAMP_LOOKAHEAD = 0
INDEXED_EXTRACTIONS = json
FIELDALIAS-spirion_user = owner AS src_user
FIELDALIAS-spirion_object = location AS object
FIELDALIAS-spirion_dvc = endpointId AS dvc
FIELDALIAS-spirion_signature = dataTypes{}.name AS signature
FIELDALIAS-spirion_category = classifications{}.name AS category
FIELDALIAS-spirion_object_category = classifications{}.name AS object_category
EVAL-vendor_product = "spirion"
