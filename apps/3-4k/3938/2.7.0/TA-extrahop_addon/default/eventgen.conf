[extrahop.sample]
interval = 30
earliest = -30s
latest = now
count = 20
randomizeCount = 0.1
randomizeEvents = true

outputMode = splunkstream
index = main
host = splunk
source = extrahop
sourcetype = extrahop
splunkHost = localhost
splunkUser = admin
splunkPass = changeme

token.0.token = ###FILENAME###
token.0.replacementType = file
token.0.replacement = $SPLUNK_HOME/etc/apps/TA-extrahop_addon/samples/filename.sample

token.1.token = ###HOSTNAME###
token.1.replacementType = file
token.1.replacement = $SPLUNK_HOME/etc/apps/TA-extrahop_addon/samples/hostname.sample
