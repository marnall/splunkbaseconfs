[extrahop]
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = <time>
LOOKUP-device = extrahop_deviceoid_lookup oid, hostname as host, otype as object_type OUTPUTNEW discovery_id, display_name, macaddr, ipaddr4, ipaddr6
category = Metrics
pulldown_type = 1

[extrahop-detection]
TIME_PREFIX = update_time=
TIME_FORMAT = %b %d %Y %H:%M:%S %z
NO_BINARY_CHECK = false
KV_MODE = none
category = Network & Security
description = ExtraHop Detection
pulldown_type = 1
disabled = false
REPORT-leef = LEEF_KVP

[extrahop:detection]
TIME_PREFIX = "update_time"\s*:
KV_MODE = json

[source::...ta-extrahop*.log*]
SHOULD_LINEMERGE = true
sourcetype = taextrahop:log

[source::...ta_extrahop*.log*]
SHOULD_LINEMERGE = true
sourcetype = taextrahop:log
