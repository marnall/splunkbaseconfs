[secondlook]
description = Syslog message from secondlook
TIME_FORMAT = %b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 32
TRANSFORMS = syslog-host
REPORT-syslog = syslog-extractions
category = Network & Security
pulldown_type = 1
SHOULD_LINEMERGE = False
FIELDALIAS-slmsg = alert_text AS body
FIELDALIAS-slid = alert_id AS id
FIELDALIAS-slinode = alert_inode_path AS file_path
FIELDALIAS-sltask = alert_task_executable AS file_path
FIELDALIAS-slmap = alert_map_file_name AS file_path
FIELDALIAS-slsrc = target AS src
EVAL-app = "secondlook"
EVAL-type = "alert"
