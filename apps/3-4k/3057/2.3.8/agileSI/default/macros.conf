[agilesi_sum_idx]
definition = index="summary_agilesi"

[agilesi_all]
definition = sourcetype="agileSI"

[latest_events_by_type(1)]
args = eventtype
definition = search sourcetype=agileSI [| inputcsv agilesi_last_batch_job_id_by_eventtype WHERE eventtype="$eventtype$"]
iseval = 0

[find_events_by_type(1)]
args = eventtype
definition = search sourcetype=agileSI eventtype="$eventtype$" | sort SI_BATCH_JOB_ID, _time
iseval = 0

