[SAP_work_process]
SHOULD_LINEMERGE = false

# [source::...SPLUNK*.TXT]
# sourcetype = agileSI

[agilesi]
rename=agileSI

[agileSI]
#TIME_PREFIX = ^[^\s]{1,}"
#MAX_TIMESTAMP_LOOKAHEAD = 35
SHOULD_LINEMERGE = false
TIME_PREFIX = ^(?:[^|]*\|){4}SI_EXTRTIME=["\s]*
TIME_FORMAT = %b %d %Y %H:%M:%S.%3N %z

LOOKUP-agileSI-Blacklist_of_Reports = agileSI-Blacklist_of_Reports SI_REPORT AS SI_REPORT OUTPUTNEW "agileSI-Blacklist_of_Reports" AS "agileSI-Blacklist_of_Reports"
LOOKUP-agileSI-Blacklist_of_TCodes = agileSI-Blacklist_of_TCodes SI_TCODE AS SI_TCODE OUTPUTNEW "agileSI-Blacklist_of_TCodes" AS "agileSI-Blacklist_of_TCodes"
LOOKUP-agileSI-Blacklist_of_TCodes_Authorization_checks_maintenance = agileSI-Blacklist_of_TCodes_Authorization_checks_maintenance SI_TCODE AS SI_TCODE OUTPUTNEW "agileSI-Blacklist_of_TCodes_Authorization_checks_maintenance" AS "agileSI-Blacklist_of_TCodes_Authorization_checks_maintenance"
LOOKUP-agileSI-List_of_administrator_accounts = agileSI-List_of_administrator_accounts SI_SYSTEMID AS SI_SYSTEMID SI_USER AS SI_USER OUTPUTNEW "agileSI-List_of_administrator_accounts" AS "agileSI-List_of_administrator_accounts"
LOOKUP-agileSI-List_of_administrator_accountsAO = agileSI-List_of_administrator_accounts SI_SYSTEMID AS SI_SYSTEMID SI_USER AS SI_AFFECTED_OBJECT OUTPUTNEW "agileSI-List_of_administrator_accounts" AS "agileSI-List_of_administrator_accountsAO"
LOOKUP-agileSI-List_of_firefighter_accounts = agileSI-List_of_firefighter_accounts SI_SYSTEMID AS SI_SYSTEMID SI_USER AS SI_USER OUTPUTNEW "agileSI-List_of_firefighter_accounts" AS "agileSI-List_of_firefighter_accounts"
LOOKUP-agileSI-List_of_firefighter_accountsAO = agileSI-List_of_firefighter_accounts SI_SYSTEMID AS SI_SYSTEMID SI_USER AS SI_AFFECTED_OBJECT OUTPUTNEW "agileSI-List_of_firefighter_accounts" AS "agileSI-List_of_firefighter_accountsAO"
LOOKUP-agileSI-List_of_user_accounts_to_be_watched = agileSI-List_of_user_accounts_to_be_watched SI_SYSTEMID AS SI_SYSTEMID SI_USER AS SI_USER OUTPUTNEW "agileSI-List_of_user_accounts_to_be_watched" AS "agileSI-List_of_user_accounts_to_be_watched"
LOOKUP-agileSI-List_of_user_accounts_to_be_watchedAO = agileSI-List_of_user_accounts_to_be_watched SI_SYSTEMID AS SI_SYSTEMID SI_USER AS SI_AFFECTED_OBJECT OUTPUTNEW "agileSI-List_of_user_accounts_to_be_watched" AS "agileSI-List_of_user_accounts_to_be_watchedAO"
#LOOKUP-agileSI-Changes_on_authorization_objects = agileSI-Changes_on_authorization_objects SI_STRING2 AS SI_STRING2 OUTPUTNEW "agileSI-Changes_on_authorization_objects" AS "agileSI-Changes_on_authorization_objects" "action" AS "action" "change_type" AS "change_type" "object_category" as "object_category" "status" AS "status"
LOOKUP-agileSI-Changes_on_authorization_objects = agileSI-Changes_on_authorization_objects SI_STRING2 AS SI_STRING2 OUTPUTNEW "agileSI-Changes_on_authorization_objects" AS "agileSI-Changes_on_authorization_objects"
LOOKUP-agileSI-Standard_users = agileSI-Standard_users User AS SI_USER OUTPUTNEW "agileSI-Standard_users" AS "agileSI-Standard_users"
LOOKUP-agileSI-Standard_usersAO = agileSI-Standard_users User AS SI_AFFECTED_OBJECT OUTPUTNEW "agileSI-Standard_users" AS "agileSI-Standard_usersAO"
LOOKUP-agileSI-Transport_of_Workbench_objects = agileSI-Transport_of_Workbench_objects SI_STRING2 AS SI_STRING2 OUTPUTNEW "agileSI-Transport_of_Workbench_objects" AS "agileSI-Transport_of_Workbench_objects"
LOOKUP-agileSI-Transport_of_customizing_settings = agileSI-Transport_of_customizing_settings SI_STRING2 AS SI_STRING2 OUTPUTNEW "agileSI-Transport_of_customizing_settings" AS "agileSI-Transport_of_customizing_settings"
LOOKUP-agileSI-Known_locations = agileSI-Known_locations SI_TERMINAL AS SI_TERMINAL OUTPUTNEW "agileSI-Known_locations" AS "agileSI-Known_locations"
LOOKUP-agileSI-List_of_firefighter_accountsBNAME = agileSI-List_of_firefighter_accounts SI_SYSTEMID AS SI_SYSTEMID SI_USER AS BNAME OUTPUTNEW "agileSI-List_of_firefighter_accounts" AS "agileSI-List_of_firefighter_accountsBNAME"
LOOKUP-agileSI_DO_NOT_EDIT_THIS_FILE_Access_Control_Violations = agileSI_DO_NOT_EDIT_THIS_FILE_Access_Control_Violations SI_EXTR AS SI_EXTR SI_NAME AS SI_NAME OUTPUTNEW Compliance AS Compliance
LOOKUP-agileSI_DO_NOT_EDIT_THIS_FILE_Gateway_Settings_Violations = agileSI_DO_NOT_EDIT_THIS_FILE_Gateway_Settings_Violations SI_EXTR AS SI_EXTR SI_SIGID AS SI_SIGID OUTPUTNEW Compliance AS Compliance
LOOKUP-agileSI_DO_NOT_EDIT_THIS_FILE_RSECNOTE_Security_Note_missing = agileSI_DO_NOT_EDIT_THIS_FILE_RSECNOTE_Security_Note_missing SI_EXTR AS SI_EXTR SI_NAME AS SI_NAME OUTPUTNEW Compliance AS Compliance
LOOKUP-agileSI_DO_NOT_EDIT_THIS_FILE_Table_Data = agileSI_DO_NOT_EDIT_THIS_FILE_Table_Data SI_EXTR AS SI_EXTR SI_NAME AS SI_NAME SI_USECASE AS SI_USECASE OUTPUTNEW Compliance AS Compliance Compliance_Table_Data AS Compliance_Table_Data
LOOKUP-agileSI-Forbidden_passwords = agileSI-Forbidden_passwords password AS BCODE OUTPUTNEW "password_forbidden" AS "password_forbidden"
LOOKUP-agileSI-Standard_usersBNAME = agileSI-Standard_users User AS BNAME OUTPUTNEW "agileSI-Standard_users" AS "agileSI-Standard_usersBNAME"
LOOKUP-agileSI-Users_in_Corporate_Directory = agileSI-Users_in_Corporate_Directory BNAME AS BNAME OUTPUTNEW "agileSI-Users_in_Corporate_Directory" AS "agileSI-Users_in_Corporate_Directory"
LOOKUP-agileSI-Watchlist_Profile_Assignment_SI_STRING1 = agileSI-Watchlist_Profile_Assignment SI_STRING AS SI_STRING1 OUTPUTNEW "agileSI-Watchlist_Profile_Assignment" AS "agileSI-Watchlist_Profile_Assignment_SI_STRING1"
LOOKUP-agileSI-Watchlist_Role_Assignment_SI_STRING3 = agileSI-Watchlist_Role_Assignment SI_STRING AS SI_STRING3 OUTPUTNEW "agileSI-Watchlist_Role_Assignment" AS "agileSI-Watchlist_Role_Assignment_SI_STRING3"
LOOKUP-agileSI-Watchlist_Profile_Assignment_SI_STRING3 = agileSI-Watchlist_Profile_Assignment SI_STRING AS SI_STRING3 OUTPUTNEW "agileSI-Watchlist_Profile_Assignment" AS "agileSI-Watchlist_Profile_Assignment_SI_STRING3"
LOOKUP-agileSI-Watchlist_Role_Assignment_SI_STRING1 = agileSI-Watchlist_Role_Assignment SI_STRING AS SI_STRING1 OUTPUTNEW "agileSI-Watchlist_Role_Assignment" AS "agileSI-Watchlist_Role_Assignment_SI_STRING1"
LOOKUP-agileSI-Profile_Parameter_Violations = agileSI-Profile_Parameter_Violations SI_SIGID AS SI_SIGID OUTPUTNEW "agileSI-Profile_Parameter_Violation" AS "agileSI-Profile_Parameter_Violation"
LOOKUP-agileSI_DO_NOT_EDIT_THIS_FILE_System_Recommendations = agileSI_DO_NOT_EDIT_THIS_FILE_System_Recommendations SI_EXTR AS SI_EXTR OUTPUTNEW Compliance AS Compliance
#DATETIME_CONFIG = CURRENT

LOOKUP-agileSI-CIM_action = agileSI-CIM_action SI_SIGID OUTPUTNEW action dest_category change_type object_category status
LOOKUP-agileSI-CIM_RSAUPROF = agileSI-CIM_RSAUPROF RSAUPROF OUTPUTNEW action dest_category change_type object object_category status
LOOKUP-agileSI-CIM_Changes_on_authorization_objects = agileSI-CIM_Changes_on_authorization_objects SI_EXTR SI_STRING5 SI_STRING2 OUTPUTNEW action change_type object_category status
LOOKUP-agileSI-CIM_action_ral = agileSI-CIM_action_ral action_ral OUTPUTNEW action
EVAL-SI_TERMINAL = if(SI_TERMINAL=="", "SAP_INTERNAL", SI_TERMINAL)
EVAL-src = if(SI_TERMINAL=="", "SAP_INTERNAL", SI_TERMINAL)
EVAL-src_category = if(SI_TERMINAL=="", "batch_job", "dialog")
EVAL-user_category = if(match(SI_USER,"DDIC|TMSADM|SAP\*|EARLYWATCH|SAPCPIC"), "sap_standard_user", "user")
EVAL-logon_insecure = match(logon_method,"[PTtRAEU]{1}")
EVAL-object = if(match(SI_STRING5,"^[O]{1}$") AND match(SI_EXTR,"SI_TRANSPORT") AND match(SI_STRING2,"AUTH|ACGR|ACGT|SUCK|SUCO|SUCU|SUKR|SUSC|SUSG|SUSH|SUSI|SUSK|SUSO|SUSP|SUST"), SI_STRING2, if(match(SI_SIGID,"AUJ|AUE|AUF|AUI"),"SAL", if(match(SI_EXTR,"SI_SAL") AND match(SI_SIGID,"BU0"), "RAL", object)))
EVAL-RSAUPROF = if(match(SI_EXTR,"SI_TABLOG") AND match(SI_SIGID,"RSAUPROF") AND SI_NAME != "NO_DATA" AND match(SI_USECASE,"ITCUBE 1511-4"), 1, NULL)
EVAL-app = case(SI_CLIENT < 0,SI_SYSTEMID."_INTERNAL", SI_CLIENT > 0, SI_SYSTEMID."_".SI_CLIENT)
EVAL-severity = case(SI_SEVERITY=="", "unknown", SI_SEVERITY < 3, "informational", SI_SEVERITY < 5, "low", SI_SEVERITY < 7, "medium", SI_SEVERITY < 9, "high", SI_SEVERITY <= 10, "critical")
EVAL-severity_id = if(SI_SEVERITY > 0, SI_SEVERITY, NULL)
EVAL-body = if(match(SI_NAME,"Access Control Violation"), SI_STRING6, if(match(SI_EXTR,"SI_CODE_CHECK"), SI_NAME, if(match(SI_EXTR,"SI_TRANSPORT") AND match(SI_STRING5,"^O$"), SI_MESSAGE, NULL)))
EVAL-subject = if(match(SI_NAME,"Access Control Violation"), SI_MESSAGE, if(match(SI_EXTR,"SI_CODE_CHECK"), SI_SIGID, if(match(SI_EXTR,"SI_TRANSPORT") AND match(SI_STRING5,"^O$"), SI_NAME, NULL)))
EVAL-type = if(match(SI_NAME,"Access Control Violation"), "alert", if(match(SI_EXTR,"SI_CODE_CHECK"), "alarm", NULL))
FIELDALIAS-user = SI_USER AS user
FIELDALIAS-dest = SI_SYSTEMID AS dest
FIELDALIAS-dvc = LogSource AS dvc
EXTRACT-obj_for_CIM_AU7 = SI_MESSAGE="User[\s]{1,}(?<object>[^\s]{1,})[\s]{1,}Created
EXTRACT-obj_for_CIM_AU8 = SI_MESSAGE="User[\s]{1,}(?<object>[^\s]{1,})[\s]{1,}Deleted
EXTRACT-obj_for_CIM_AUA = SI_MESSAGE="User[\s]{1,}(?<object>[^\s]{1,})[\s]{1,}Unlocked
EXTRACT-obj_for_CIM_AUB = SI_MESSAGE="Authorizations for User[\s]{1,}(?P<object>[^\s]{1,})[\s]{1,}Changed
EXTRACT-obj_for_CIM_AUD = SI_MESSAGE="User Master Record[\s]{1,}(?<object>[^\s]{1,})[\s]{1,}Changed
EXTRACT-obj_for_CIM_P0 = "\s[^\s]{1,}"P0".{1,}AFFECTED_OBJECT="(?P<object>[^"]{1,})"
EXTRACT-obj_for_CIM_R0 = "\s[^\s]{1,}"R0".{1,}AFFECTED_OBJECT="(?P<object>[^"]{1,})"
EXTRACT-obj_for_CIM_U0 = "\s[^\s]{1,}"U0".{1,}AFFECTED_OBJECT="(?P<object>[^"]{1,})"
EXTRACT-obj_for_CIM_PFCG = "\s[^\s]{1,}"PFCG".{1,}AFFECTED_OBJECT="(?P<object>[^"]{1,})"
EXTRACT-obj_for_CIM_IDENTITY = \sSI_NAME="(?!NO_DATA)[^"]{1,}".*SI_EXTR="SI_CHGDOC".*SI_AFFECTED_OBJECT="(?P<object>[^"]{1,})".*SI_STRING1="(?P<object_attrs>[^"]{1,})"
EXTRACT-logon_for_CIM = SI_MESSAGE=".*[l,L]ogon.*\s[(]{0,1}type=(?<logon_type>[a-zA-Z]{1}),\smethod=(?<logon_method>[PTtXSRAEUs21oN]{1})[)]{0,1}"
EXTRACT-action_ral_for_CIM = (?i)SI_MESSAGE="RAL Configuration Access:\s{1,}Action:\s{1,}(?<action_ral>[^\s]{1}),\s{1,}

