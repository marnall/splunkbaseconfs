search = | makeresults count=1 | fields - _time | eval password="$password$" | lookup agileSI-Forbidden_passwords_wildcard password OUTPUTNEW password_forbidden, password AS password_matches, case_sensitive | eval password_matches=mvzip(password_forbidden, mvzip(case_sensitive,password_matches)) | fields - password_forbidden, case_sensitive | mvexpand password_matches | where like(password_matches, "true,false,%") | eval matches_case_sensitive="false" | eval password_matches=substr(password_matches, 12) | stats list(password_matches) as password_matches, list(matches_case_sensitive) as matches_case_sensitive by password

