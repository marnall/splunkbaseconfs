[list_password_policy_map]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = area
display.visualizations.charting.legend.labelStyle.overflowMode = ellipsisEnd
display.visualizations.show = 0
request.ui_dispatch_app = agileSI
request.ui_dispatch_view = search
search = | inputlookup agileSI-Forbidden_passwords WHERE password_forbidden="true", case_sensitive="false" | fields password | dedup password sortby password | map _list_password_policy_map_ci_sub maxsearches=500000\
| append [\
  | inputlookup agileSI-Forbidden_passwords WHERE password_forbidden="true", case_sensitive="true" | fields password | dedup password sortby password | map _list_password_policy_map_cs_to_ci_sub maxsearches=500000\
  | append [| inputlookup agileSI-Forbidden_passwords WHERE password_forbidden="true", case_sensitive="true" | fields password | dedup password sortby password | map _list_password_policy_map_cs_sub maxsearches=500000]\
  | stats list(password_matches) as password_matches, list(matches_case_sensitive) as matches_case_sensitive by password\
]\
| sort password\
| join type=left max=1 password [| inputlookup agileSI-Forbidden_passwords WHERE password_forbidden="true" | fields password, case_sensitive]\
| eval redundancy=mvcount(password_matches) | eval redundant=if(redundancy > 1, "true", "false")

