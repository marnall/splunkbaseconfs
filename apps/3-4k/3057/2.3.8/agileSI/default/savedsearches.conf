[_missing_forbidden_passwords_map]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | set diff [search sourcetype=agileSI [| inputcsv agilesi_last_batch_job_id_by_eventtype WHERE eventtype="agileSI - Password", SI_SYSTEMID="$SI_SYSTEMID$"] SI_KEY_VALUE_02="CASESENSITIVE=" password_forbidden=true | fields SI_SYSTEMID, SI_BATCH_JOB_ID, BCODE | dedup SI_SYSTEMID BCODE sortby -SI_BATCH_JOB_ID | table BCODE | rename BCODE as password_matches | eval password=upper(password_matches) | stats values(password_matches) as password_matches, count(password_matches) as redundancy by password | eval redundant=if(redundancy > 1, "true", "false") | dedup password sortby password, -redundancy | eval case_sensitive="false" | fields password, case_sensitive, password_matches, redundancy, redundant] [| savedsearch list_password_policy_map | where case_sensitive="false" | eval redundancy=mvcount(password_matches) | fields password, case_sensitive, password_matches, redundancy, redundant] | eval password_reference=upper(password)\
\
| append [| set diff [search sourcetype=agileSI [| inputcsv agilesi_last_batch_job_id_by_eventtype WHERE eventtype="agileSI - Password", SI_SYSTEMID="$SI_SYSTEMID$"] SI_KEY_VALUE_02="CASESENSITIVE=X" password_forbidden=true | fields SI_SYSTEMID, SI_BATCH_JOB_ID, BCODE | dedup SI_SYSTEMID BCODE sortby -SI_BATCH_JOB_ID | table BCODE | rename BCODE as password_matches | eval password=password_matches | stats values(password_matches) as password_matches, count(password_matches) as redundancy by password | eval redundant=if(redundancy > 1, "true", "false") | dedup password sortby password, -redundancy | eval case_sensitive="true" | fields password, case_sensitive, password_matches, redundancy, redundant] [| savedsearch list_password_policy_map_clone | where case_sensitive="true" | fields password, case_sensitive, password_matches, redundancy, redundant] | eval password_reference=password]\
\
| eventstats count(password_reference) as duplicity by password_reference | streamstats count(password_reference) as duplicity_order by password_reference\
\
| rex field=password "(?<order>.)" max_match=0 | eval order=mvjoin(mvzip(upper(order), order, ""), "") | sort order | fields - order\
\
| eval SI_SYSTEMID="$SI_SYSTEMID$"
