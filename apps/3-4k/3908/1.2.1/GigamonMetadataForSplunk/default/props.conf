[stream:netflow]
SEDCMD-remove_nulls_gigamon = s/\\u0000//g
FIELDALIAS-src = src_ip AS src
FIELDALIAS-src_port = src_port{} AS src_port
FIELDALIAS-dest = dest_ip AS dest
FIELDALIAS-dest_port = dest_port{} AS dest_port
FIELDALIAS-dvc = exporter_ip AS dvc
LOOKUP-protocol = protocol_numbers protocolIdentifier AS protoid OUTPUT protocol_name AS protocol
LOOKUP-cipher = ssl_ciphers ssl_cipher OUTPUT ssl_cipher_name
LOOKUP-dns_response_message = dns_responses reply_code_id OUTPUT response_message
LOOKUP-status = http_status status OUTPUT status_description
EVAL-ttl = coalesce(response_ttl,authority_ttl,additional_ttl)
EVAL-url_length = len(url)
EVAL-status_length = len(status)
EVAL-ssl_issuer_common_name_length = len(ssl_issuer_common_name)
EVAL-ssl_subject_common_name_length = len(ssl_subject_common_name)
EVAL-ssl_issuer_length = len(ssl_issuer)
EVAL-ssl_subject_length = len(ssl_subject)
EVAL-ssl_start_time_length = len(ssl_start_time)
EVAL-ssl_end_time_length = len(ssl_end_time)
EVAL-ssl_serial_length = len(ssl_serial)
EVAL-ssl_signature_algorithm_length = len(ssl_signature_algorithm)
EVAL-ssl_publickey_algorithm_length = len(ssl_publickey_algorithm)
EVAL-ssl_publickey_size_length = len(ssl_publickey_size)
EVAL-ssl_subject_alt_name_length = len(ssl_subject_alt_name)
EVAL-ssl_server_name_indication_length = len(ssl_server_name_indication)
EVAL-ssl_version_length = len(ssl_version)
EVAL-ssl_cipher_length = len(ssl_cipher)
EVAL-ssl_server_compression_method_length = len(ssl_server_compression_method)
EVAL-ssl_session_id_length = len(ssl_session_id)
EVAL-identifier_length = len(identifier)
EVAL-op_code_length = len(op_code)
EVAL-reply_code_id_length = len(reply_code_id)
EVAL-query_name_length = len(query_name)
EVAL-response_name_length = len(response_name)
EVAL-response_ttl_length = len(response_ttl)
EVAL-response_src_ip_length = len(response_src_ip)
EVAL-response_src_ipv6_length = len(response_src_ipv6)
EVAL-dns_bits_length = len(dns_bits)
EVAL-dns_qd_count_length = len(dns_qd_count)
EVAL-answer_count_length = len(answer_count)
EVAL-authority_answer_count_length = len(authority_answer_count)
EVAL-additional_answer_count_length = len(additional_answer_count)
EVAL-query_type_length = len(query_type)
EVAL-query_class_length = len(query_class)
EVAL-response_type_length = len(response_type)
EVAL-response_class_length = len(response_class)
EVAL-response_rdata_length_length = len(response_rdata_length)
EVAL-response_rdata_length = len(response_rdata)
EVAL-authority_name_length = len(authority_name)
EVAL-authority_type_length = len(authority_type)
EVAL-authority_class_length = len(authority_class)
EVAL-authority_ttl_length = len(authority_ttl)
EVAL-authority_rdata_length_length = len(authority_rdata_length)
EVAL-authority_rdata_length = len(authority_rdata)
EVAL-additional_name_length = len(additional_name)
EVAL-additional_type_length = len(additional_type)
EVAL-additional_class_length = len(additional_class)
EVAL-additional_ttl_length = len(additional_ttl)
EVAL-additional_rdata_length_length = len(additional_rdata_length)
EVAL-additional_rdata_length = len(additional_rdata)


[cefevents]
TIME_PREFIX = \s(end|rt)\=
TIME_FORMAT = %10s%3N
MAX_TIMESTAMP_LOOKAHEAD = 350
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
pulldown_type = 1
REPORT-cefevents = cefHeaders,cefKeys
KV_MODE = none

FIELDALIAS-f1 = src AS src_ip
FIELDALIAS-f2 = dst AS dest_ip
FIELDALIAS-f3 = spt AS src_port
FIELDALIAS-f4 = dpt AS dest_port
FIELDALIAS-f5 = request AS url
FIELDALIAS-f6 = GigamonHttpRspStatus AS status
FIELDALIAS-f7 = GigamonMdataSslIssuer AS ssl_issuer
FIELDALIAS-f8 = GigamonMdataSslIssuerName AS ssl_issuer_common_name
