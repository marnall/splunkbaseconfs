FIELDALIAS-f11 = GigamonMdataSslSerialNo AS ssl_serial
FIELDALIAS-f12 = GigamonMdataSslValidNotBefore AS ssl_start_time_cef
FIELDALIAS-f14 = GigamonMdataSslServerCipher AS ssl_cipher
FIELDALIAS-f16 = GigamonMdataSslValidNotAfter AS ssl_end_time_cef
