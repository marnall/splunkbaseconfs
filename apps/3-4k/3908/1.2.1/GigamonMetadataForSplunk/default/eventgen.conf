[gigamon_ipfix_http.sample]
disabled = true
mode = sample
count = 500
earliest = -60s
latest = now
outputMode = splunkstream
source = stream
index = main
sourcetype = stream:netflow

token.0.token = time_token
token.0.replacementType = timestamp
token.0.replacement = %s

token.1.token = src_ip_token
token.1.replacementType = file
token.1.replacement = $SPLUNK_HOME/etc/apps/GigamonIPFIXForSplunk/samples/src_ips.csv

token.2.token = dest_ip_token
token.2.replacementType = file
token.2.replacement = $SPLUNK_HOME/etc/apps/GigamonIPFIXForSplunk/samples/dest_ips.csv

token.3.token = dest_port_token
token.3.replacementType = random
token.3.replacement = integer[22:443]

token.4.token = src_port_token
token.4.replacementType = random
token.4.replacement = integer[11000:25000]

token.5.token = url_token
token.5.replacementType = file
token.5.replacement = $SPLUNK_HOME/etc/apps/GigamonIPFIXForSplunk/samples/urls.csv

token.6.token = seqnumber_token
token.6.replacementType = integerid
token.6.replacement = 500

token.7.token = protoid_token
token.7.replacementType = random
token.7.replacement = list["0","1","17","50","6"]

token.8.token = status_token
token.8.replacementType = random
token.8.replacement = list["200","301","302","404","403","500"]


