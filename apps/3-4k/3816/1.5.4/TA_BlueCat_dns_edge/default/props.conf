[bluecat:dns:edge]
FIELDALIAS-cim_mapping = "answers{}.domainName" AS dest "answers{}.recordType" AS record_type extracted_source AS src queryProtocol AS transport queryType AS query_type "answers{}.rData" AS answer response AS reply_code recordId AS transaction_id
EVAL-answer_count = mvcount('answers{}.rData')
EVAL-authority_answer_count = mvcount('authority{}.rData')
EVAL-message_type = mvappend("Query","Response")
EVAL-query_count = 1
EVAL-vendor = "BlueCat"
EVAL-product = "DNS Edge Server"
EVAL-vendor_product = "BlueCat DNS Edge Server"
TIME_PREFIX = .*\s"time.*":\s
TIME_FORMAT = %s%3N
