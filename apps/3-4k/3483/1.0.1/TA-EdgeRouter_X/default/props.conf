[syslog]
EXTRACT-syslog_stanza_01 = ^[^\[\n]*\[(?P<src_zone>\w+)_TO_(?P<dest_zone>\w+)\-(?P<rule>\w+)\-(?P<Action>\w+)
FIELDALIAS-TTL = TTL as ttl
FIELDALIAS-ID = ID as id
FIELDALIAS-PROTO = PROTO as protocol
FIELDALIAS-SPT = SPT as src_port
FIELDALIAS-DPT = DPT as dest_port
FIELDALIAS-WINDOW = WINDOW as window
FIELDALIAS-URGP = URGP as urgp
FIELDALIAS-CODE = CODE as icmp_code
FIELDALIAS-RES = RES as res
FIELDALIAS-IN = IN as src_interface
FIELDALIAS-OUT = OUT as dest_interface
FIELDALIAS-MAC = MAC as mac
FIELDALIAS-SRC = SRC as src_ip
FIELDALIAS-DST = DST as dest_ip
FIELDALIAS-LEN = LEN as len
FIELDALIAS-TOS = TOS as tos
FIELDALIAS-PREC = PREC as prec
#EVAL-direction = case(dest_zone="WAN" AND dest_interface="eth0", "outbound", src_zone="WAN" AND src_interface="eth0", "inbound", src_zone="LOCAL" AND (dest_interface="eth1.172" OR dest_interface="eth1.192" OR dest_interface="eth1.10" ), "local", dest_interface != "eth0", "local" )
EVAL-direction = case(dest_interface="eth0", "outbound", src_zone="WAN" AND src_interface="eth0", "inbound", src_zone="LOCAL" AND (dest_interface="switch0.172" OR dest_interface="switch0.192" OR dest_interface="switch0.10" ), "local", dest_interface != "eth0", "local" )
LEARN_MODEL = 1
SHOULD_LINEMERGE = 0
pulldown_type = 1
LOOKUP-auto-lookup-erx-action = erx_action_lookup Action OUTPUTNEW action
maxDist = 3
TRANSFORMS = syslog-host
description = Output produced by many syslog daemons, as described in RFC3164 by the IETF
TIME_FORMAT = %b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 32
category = Operating System
MATCH_LIMIT = 100000
