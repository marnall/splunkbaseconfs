
[StealthINTERCEPT: Authentication]
priority = 5
search = sourcetype = StealthINTERCEPT event_id="Authentication Auth *"

[StealthINTERCEPT: Active Directory Accounts]
priority = 5
search = sourcetype = StealthINTERCEPT event_id="Active Directory*" ObjectClass="user"

[StealthINTERCEPT: Active Directory Changes]
priority = 5
search = sourcetype = StealthINTERCEPT event_id = "Active Directory*" ObjectClass!="user"

[StealthINTERCEPT File System Activity]
priority = 5
search = (sourcetype = "StealthINTERCEPT" AND (event_id != "Active Directory*" AND event_id != "GPO*" AND event_id != "Exchange*") AND (event_id = "*Attribute Change" OR event_id = "*Read" OR event_id = "*Access Rights Change" OR event_id = "*Update" OR event_id = "*Delete" OR event_id = "*Create" OR event_id = "*Rename")) OR sourcetype="SFAM" OR sourcetype = "SFAM-Syslog"
