[orig_action_name_for_stash_cam]
REGEX    = \*{3}Common\sAction\sModel\*{3}.*orig_action_name=\"([^"]+)
FORMAT   = $0 orig_action_name::$1
DEST_KEY = _meta

[orig_sid_for_stash_cam]
REGEX    = \*{3}Common\sAction\sModel\*{3}.*orig_sid=\"([^"]+)
FORMAT   = $0 orig_sid::$1
DEST_KEY = _meta

[orig_rid_for_stash_cam]
REGEX    = \*{3}Common\sAction\sModel\*{3}.*orig_rid=\"([^"]+)
FORMAT   = $0 orig_rid::$1
DEST_KEY = _meta

[sourcetype_for_stash_cam]
REGEX    = \*{3}Common\sAction\sModel\*{3}.*sourcetype=\"([^"]+)
FORMAT   = sourcetype::$1
DEST_KEY = MetaData:Sourcetype

[sinkhole_cam_header]
REGEX     = (?s)^\*{3}Common\sAction\sModel\*{3}[^\n]+\n(.*)
FORMAT    = $1
DEST_KEY  = _raw
## Do not truncate _raw to 4096!
LOOKAHEAD = -1

[dtex_action_field_lookup]
filename = ta_dtexubi_action_field_lookup.csv

[domain_and_devicename_ext]
SOURCE_KEY = Device_Name
REGEX = (?:(?<device_domain>.+)\\(?<device>.+))|(?<device_only>.+)

[domain_and_username_ext]
SOURCE_KEY = User_Name
REGEX = (?:(?<username_domain>.+)\\(?<username>.+))|(?<username_only>.+)

[domain_and_username_alert_ext]
SOURCE_KEY = user_name
REGEX = (?:(?<alert_domain>.+)\\(?<alert_username>.+))|(?<alert_username_only>.+)

[ext_website_query]
SOURCE_KEY = Website_Query
REGEX = (\/\/[^\/]+(?<uri_path>[^?]+)((?<uri_query>\?.*))?)