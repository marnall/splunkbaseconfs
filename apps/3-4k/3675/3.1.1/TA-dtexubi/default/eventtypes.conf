## EventCodes 4634,4798,4800,4726,4724,4738,4720,1102,4719,4781,4625,4732,4733,104,12
[Dtex_WindowsEventLogActivity_Change]
search = (eventtype=WindowsEventLogActivity) (EventLog_Event_ID=4634 OR EventLog_Event_ID=4798 OR EventLog_Event_ID=4800 OR EventLog_Event_ID=4726 OR EventLog_Event_ID=4724 OR EventLog_Event_ID=4738 OR EventLog_Event_ID=4720 OR EventLog_Event_ID=1102 OR EventLog_Event_ID=4719 OR EventLog_Event_ID=4781 OR EventLog_Event_ID=4625 OR EventLog_Event_ID=4732 OR EventLog_Event_ID=4733 OR EventLog_Event_ID=104 OR EventLog_Event_ID=12)

## Eventcodes 4634,4798,4800,4801,4726,4724,4698,1102,5140,4781,4689,4688,4657,4732,4733,104,12
[Dtex_WindowsEventLogActivity_Endpoint_Process]
search = (eventtype=WindowsEventLogActivity) (EventLog_Event_ID=4634 OR EventLog_Event_ID=4798 OR EventLog_Event_ID=4800 OR EventLog_Event_ID=4801 OR EventLog_Event_ID=4726 OR EventLog_Event_ID=4724 OR EventLog_Event_ID=4698 OR EventLog_Event_ID=1102 OR EventLog_Event_ID=5140 OR EventLog_Event_ID=4781 OR EventLog_Event_ID=4689 OR EventLog_Event_ID=4688 OR EventLog_Event_ID=4657 OR EventLog_Event_ID=4732 OR EventLog_Event_ID=4733 OR EventLog_Event_ID=104 OR EventLog_Event_ID=12)

## Eventcodes 4738
[Dtex_WindowsEventLogActivity_Endpoint_FileSystem]
