[default]
[Alert_Events]
search = sourcetype=dtex_st_alerts risk_score=*

[Activity_Events]
search = sourcetype=dtex_st_activities Activity_Group=*

[Application_Usage]
search = sourcetype=dtex_st_activities Activity_Group = "WindowActivity" OR Activity_Group = "NetworkActivity" OR Activity_Group = "ProcessActivity"

