[IR Flow Splunk Example]
action.CreateIRFlowAlert = 1
action.CreateIRFlowAlert.param.realm = irflow-prod
alert.suppress = 0
alert.track = 0
description = A sample alert designed to showcase the Syncurity Adaptive Response.
counttype = number of events
cron_schedule = 1 */2 * * *
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = irflow-splunk-app
request.ui_dispatch_view = search
search = index=_internal sourcetype=splunk_web_access | addinfo | eval duration = tostring(info_max_time - info_min_time, "duration")\
| stats avg(bytes) as bytes latest(duration) as duration by clientip user \
| rename clientip AS src_ip \
| eval irflow_description = user." from ".src_ip." averaged " . round(bytes,2) ." bytes over ".duration
disabled = 1