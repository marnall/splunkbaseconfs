# In order to override the hostname in the link from Splunk you can set the hostname field here; for example:
# hostname = https://splunk-cname.domain.com:8000

[CreateIRFlowAlert]
is_custom = 1
disabled = 0 
label = IR-Flow
description = Create an alert in IR-Flow
icon_path = irflow-action.png
payload_format = json
param._cam = {\
    "category": ["Information Conveyance"],\
    "task": ["create"],\
    "subject": ["site"],\
    "technology": [{"vendor": "Syncurity", "product": "IR-Flow"}],\
    "supports_adhoc": true\
}
command = sendalert $action_name$ results_file="$results.file$" results_link="$results.url" param.action_name=$action_name$ | stats count
