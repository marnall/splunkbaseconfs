[ip2cidr-command]
syntax = ip2cidr <IpAddrFieldName> <MaskFieldName>
shortdesc = ip2cidr returns IP CIDR for given IP address & IP Mask address.
description = ip2cidr returns IP CIDR for given IP address & IP Mask address field names. The new field 'ipcidr' is added to the splunk query result.
comment1 = generates cidr for 'ipaddress' and 'ipmask' field name values
example1 = ... | ip2cidr ipaddress ipmask
comment2 = generates cidr for 'ipaddress' and 'ipmask' field name values in the lookup file test_ip2cidr_lookup.csv shipped with this app
example2 = |inputlookup test_ip2cidr_lookup.csv | ip2cidr ipaddress, ipmask | table ipaddress, ipmask, ipcidr
comment3 = generates cidr for 'ipaddress' and 'ipmask' field name values
example3 = |stats count | fields - count | eval ipaddress="10.42.82.3", ipmask="255.255.255.0" | ip2cidr ipaddress ipmask
usage = public
tags = ip, ip2cidr, cidr, mask, ipaddress,netmask
category = ip address
appears-in = 5


[ip2cidr-options]
syntax = string string


[iprange-command]
syntax = iprange <Ip CIDR field name>
shortdesc = iprange returns IP Range & Netmask for given CIDR
description = iprange returns IP Range (first IP & Last IP) and Netmask for given CIDR value. The new fieldnames added to the splunk result are firstIP, lastIP, netMask.
comment1 = generates ip range & netmask for cidr
example1 = ... | iprange ipcidr
comment2 = generates iprange & netmask for 'ipcidr' field name values in the lookup file test_iprange_lookup.csv shipped with this app
example2 = |inputlookup test_iprange_lookup.csv | iprange ipcidr | table ipcidr, firstIP, lastIP, netMask
comment3 = generates ip range & netmask for cidr
example3 = |stats count | fields - count | eval cidr="10.42.82.3/24" | iprange cidr
usage = public
tags = ip, ip2cidr, cidr, mask, ipaddress, iprange, firstip, lastip, netmask, ipcidr
category = ip address
appears-in = 5


[iprange-options]
syntax = string

