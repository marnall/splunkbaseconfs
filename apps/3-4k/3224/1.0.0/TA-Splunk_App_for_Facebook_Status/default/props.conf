cebook:curl:status]
# Index time extractions, most of these don't do anything. They are just here to get the data curation app to score this a 100%
KV_MODE=json
DATETIME_CONFIG=CURRENT
BREAK_ONLY_BEFORE=^\{
LINE_BREAKER=ADDEDFORDATACURATORHAPPINESS
MAX_DAYS_AGO=1
MAX_TIMESTAMP_LOOKAHEAD=1
SHOULD_LINEMERGE=True
TIME_FORMAT=ADDEDFORDATACURATORHAPPINESS
TIME_PREFIX=ADDEDFORDATACURATORHAPPINESS
TRUNCATE=500
TZ=UTC

#Search Time Extractions, various CIM fields
FIELDALIAS-health = current.health as response_code
FIELDALIAS-subject = current.subject as message
FIELDALIAS-status = push.status as status
EVAL-vendor = "Facebook"
EVAL-vendor_product = "Facebook"
EVAl-app = "Facebook API"
EVAL-site = "https://www.facebook.com/platform/api-status/"
EVAL-COMMAND = "CURL"
EVAL-dest_port = "443"
EVAL-protocol = "ip"
EVAl-transport = "tcp"
