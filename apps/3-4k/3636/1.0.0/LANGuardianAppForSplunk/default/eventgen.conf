##### DEFAUlTS - DONT CHANGE
[default]

[global]
disabled = false
debug = true
spoolDir = $SPLUNK_HOME/var/spool/splunk
spoolFile = <SAMPLE>
breaker = [^\r\n\s]+
mode = sample
sampletype = raw
interval = 60
delay = 0
timeMultiple = 1
## 0 means all lines in sample
count = 0
## earliest/latest = now means timestamp replacements default to current time
earliest = now
latest = now
hourOfDayRate = { "0": 0.30, "1": 0.10, "2": 0.05, "3": 0.10, "4": 0.15, "5": 0.25, "6": 0.35, "7": 0.50, "8": 0.60, "9": 0.65, "10": 0.70, "11": 0.75, "12": 0.77, "13": 0.80, "14": 0.82, "15": 0.85, "16": 0.87, "17": 0.90, "18": 0.95, "19": 1.0, "20": 0.85, "21": 0.70, "22": 0.60, "23": 0.45 }
dayOfWeekRate = { "0": 0.97, "1": 0.95, "2": 0.90, "3": 0.97, "4": 1.0, "5": 0.99, "6": 0.55 }
randomizeCount = 0.2
randomizeEvents = false
outputMode = spool
fileMaxBytes = 10485760
fileBackupFiles = 5
splunkPort = 8089
splunkMethod = https
index = main
source = eventgen
sourcetype = eventgen
host = 127.0.0.1
timeField = _raw

[report_1000.sample]
disabled = false
sourcetype = netfort:languardian:1000
source = eventgen:report_1000.sample
count = 0
interval = 300
earliest = -60s
latest = now
outputMode = splunkstream

token.0.token = "timestamp":\s+"(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})"
token.0.replacementType = timestamp
token.0.replacement = %Y-%m-%d %H:%M:%S

token.1.token = "modular_input_consumption_time": "(\w+,\s+\d{2}\s+\w+\s+\d{4}\s+\d{2}:\d{2}:\d{2}\s+\+0000)"
token.1.replacementType = timestamp
token.1.replacement = %a, %d %b %Y %H:%M:%S +0000

token.2.token = X{3}\.X{3}\.X{3}\.X{3}
token.2.replacementType = random
token.2.replacement = ipv4

token.3.token = "Start":\s+"(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})"
token.3.replacementType = timestamp
token.3.replacement = %Y-%m-%d %H:%M:%S

token.4.token = "End":\s+"(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})"
token.4.replacementType = timestamp
token.4.replacement = %Y-%m-%d %H:%M:%S


