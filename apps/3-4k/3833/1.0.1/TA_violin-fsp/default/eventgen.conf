[vm_logs.csv]
mode = sample
sampletype = csv
outputMode = splunkstream
splunkHost = localhost
interval = 14400
randomizeCount = 0.1
earliest = now
latest = now

# Jul 11 11:28:43
token.0.token = \w{3}\s{1,2}\d{1,2} \d{2}:\d{2}:\d{2}
token.0.replacementType = timestamp
token.0.replacement = %b  %d %H:%M:%S

# 2014-01-13 00:02:43
token.1.token = \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}
token.1.replacementType = timestamp
token.1.replacement = %d-%m-%Y %H:%M:%S

# 19-10-2016 15:30:08
token.2.token = \d{2}-\d{2}-\d{4} \d{2}:\d{2}:\d{2}
token.2.replacementType = timestamp
token.2.replacement =  %d-%m-%Y %H:%M:%S

# 19-10-2016 15:30:08
token.3.token = \d{2}-\d{2}-\d{4} \d{2}:\d{2}:\d{2}
token.3.replacementType = timestamp
token.3.replacement = %Y-%m-%d %H:%M:%S


