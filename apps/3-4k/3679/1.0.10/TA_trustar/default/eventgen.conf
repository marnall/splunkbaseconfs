[enclaves.samples]
disabled = true
index = main
source = eventgen
sourcetype = trustar:enclaves
interval = 600
randomizeCount = 0.2

# 2018-12-19 09:39:21
token.0.token = \d+\-\d+\-\d+\s\d+\:\d+\:\d+
token.0.replacementType = timestamp
token.0.replacement = %Y-%m-%d %H:%M:%S

## Replace Enclave ID
token.1.token = (#ID#)
token.1.replacementType = file
token.1.replacement = $SPLUNK_HOME/etc/apps/TA_trustar/samples/enclave_id.txt

## Replace Enclave Name
token.2.token = (#NAME#)
token.2.replacementType = file
token.2.replacement = $SPLUNK_HOME/etc/apps/TA_trustar/samples/enclave_name.txt

## Replace Enclave Create access
token.3.token = (#CREATE#)
token.3.replacementType = file
token.3.replacement = $SPLUNK_HOME/etc/apps/TA_trustar/samples/enclave_create.txt

