[get_index]
definition = index="fsctcenter"
iseval = 0

[get_sourcetypes]
definition = (sourcetype="fsctcenter_json" OR sourcetype="fsctcenter_avp")
iseval = 0

[ct_hostinfo]
definition = ctupdate=hostinfo
iseval = 0

[ct_policyinfo]
definition = ctupdate=policyinfo
iseval = 0

[ct_notifications]
definition = ctupdate=notif
iseval = 0

[normalize_classification]
definition = eval va_netfunc=case(va_netfunc=="Windows","Windows Machine",va_netfunc=="Linux","Linux Desktop/Server",va_netfunc=="Unix","Unix Server/Workstation",va_netfunc=="CounterACT Device","CounterACT",1==1,va_netfunc)
iseval = 0
