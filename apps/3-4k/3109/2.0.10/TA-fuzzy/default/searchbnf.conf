[fuzzy-command]
syntax = fuzzy (<selfjoin-options>)*
simplesyntax = fuzzy wordlist="comma separated wordlists"
shortdesc = Fuzzy searching against a wordlist
description = Perform a Levenshtein Distance calculation against your dataset with a comma separated wordlist
usage = public
example1 = fuzzy wordlist="svchost.exe" type="simple" compare_field="process" output_prefix="fuzz" delims="(\\\\)"
comment1 = Calculates the levenshtein distance from svchost.exe to your data and appends the minimum and maximum scores.

[fuzzy-options]
syntax = wordlist=<str> | type=<str> | compare_field=<str> | delims=<str>
description = 'wordlist' (required) is a comma separated list of strings for calculation (required field).\
    'type' (optional, default: simple) determines the type of calculation. Valid options: 'simple', 'partial', 'token_sort', 'token_set'\
    'compare_field' (optional, default: _raw) sets the field in your data for calculation.\
    'delims' (optional, default: (\\\\|/|\s+|;|-)) sets the regular expression splitting of your data field.
