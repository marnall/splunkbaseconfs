[ct_hostinfo]
search =  `get_index`  sourcetype="fsctcenter_json" OR sourcetype="fsctcenter_avp"  ctupdate=hostinfo
#tags = performance inventory

[ct_hostinfo_cpu]
search = eventtype=ct_hostinfo hwi_processor=*
#tags = cpu

[ct_hostinfo_memory]
search = eventtype=ct_hostinfo hwi_physical_memory=*
#tags = memory

[ct_hostinfo_storage]
search = eventtype=ct_hostinfo hwi_disk=*
#tags = storage

[ct_hostinfo_network]
search = eventtype=ct_hostinfo hwi_network_adapters=*
#tags = network

[ct_hostinfo_system]
search = eventtype=ct_hostinfo hwi_computer=*
#tags = system

[ct_policyinfo]
search = `get_index`  sourcetype="fsctcenter_json" OR sourcetype="fsctcenter_avp" ctupdate=policyinfo
#tags = 

[ct_notifications]
search = `get_index`  sourcetype="fsctcenter_json" OR sourcetype="fsctcenter_avp" ctupdate=notif
#tags = 

[ct_ids]
search =  eventtype=ct_hostinfo malic
#tags = ids attack

[ct_malware]
search = `get_index`  sourcetype="fsctcenter_json" OR sourcetype="fsctcenter_avp" (pan_apt_detected_ioc OR atc_detected_ioc OR fireeye_detected_ioc OR apt_cp_antivirus_ioc)
#tags = malware attack

[ct_appstate]
search = `get_index`  sourcetype="fsctcenter_json" OR sourcetype="fsctcenter_avp" (process_no_ext OR linux_process_running OR mac_process_running )
#tags = application

[ct_certificate]
search = eventtype=ct_hostinfo hwi_certificate=*
#tags = certificate

[ct_endpoint_port]
search = `get_index`  sourcetype="fsctcenter_json" OR sourcetype="fsctcenter_avp"  ctupdate=hostinfo sw*
#tags = listening,port

[ct_endpoint_services_registry]
search = `get_index`  sourcetype="fsctcenter_json" OR sourcetype="fsctcenter_avp"  ctupdate=hostinfo (registry OR service_installed)
#tags = service,registry,endpoint

[ct_endpoint_filesystem]
search = `get_index`  sourcetype="fsctcenter_json" OR sourcetype="fsctcenter_avp"  ctupdate=hostinfo (linux_file* OR mac_file* OR file_attr*)
#tags = endpoint , filesystem

[ct_authentication]
search =  `get_index`  sourcetype="fsctcenter_json" OR sourcetype="fsctcenter_avp"  ctupdate=hostinfo  dot1x*
#tags = authentication privileged

