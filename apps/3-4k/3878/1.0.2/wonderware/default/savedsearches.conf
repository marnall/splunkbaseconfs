[Wonderware Hosts - Lookup Gen]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 1 * * *
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = wonderware
request.ui_dispatch_view = search
schedule_window = 30
search = sourcetype=ww:log Timestamp=* \
| stats count by host \
| sort host\
| outputlookup ww_hosts_lookup.csv

