[author=kintyre]
company = Kintyre
email = splunkbase@kintyre.co

[install]
build = 0
is_configured = 0

[launcher]
author = kintyre
description = Kintyre's JMESPath for Splunk
version = 1.9.8

[package]
check_for_updates = true
id = jmespath

[triggers]
# Note that 'logging.conf' is not a real conf file, but without this a Splunk restart is requested
# Avoid restarts, where possible
reload.app = simple
reload.logging = simple

[ui]
is_visible = false
label = JMESPath for Splunk
show_in_nav = false
