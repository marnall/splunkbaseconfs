[cylance_index]
search = index=protect OR index=cylance_protect

[protect_alert]
priority = 5
search = eventtype=cylance_index sourcetype=syslog_audit_log OR sourcetype=syslog_mobile

[protect_malware]
priority = 5
search = eventtype=cylance_index sourcetype=threat OR sourcetype=syslog_device_control OR sourcetype=syslog_app_control OR sourcetype=syslog_exploit OR sourcetype=syslog_script_control OR sourcetype=threat OR sourcetype=syslog_threat_classification OR sourcetype=syslog_optics 

[protect_inventory]
priority = 5
search = eventtype=cylance_index sourcetype=syslog_device OR sourcetype=device
