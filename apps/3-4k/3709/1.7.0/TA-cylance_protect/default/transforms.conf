[protecthostname]
REGEX = \"Device\sName\":\s+\"([^"]+)
FORMAT = host::$1
DEST_KEY = MetaData:Host

[protecthostname_ns]
REGEX = \"DeviceName\":\s+\"([^"]+)
FORMAT = host::$1
DEST_KEY = MetaData:Host

[protecthostname_syslog]
REGEX = Device\sName:\s+([^,]+)
FORMAT = host::$1
DEST_KEY = MetaData:Host

[set_auditlog_sourcetype]
REGEX = Event\sType:\s+AuditLog
FORMAT = sourcetype::syslog_audit_log
DEST_KEY = MetaData:Sourcetype

[set_threatclassification_sourcetype]
REGEX = Event\sType:\s+ThreatClassification
FORMAT = sourcetype::syslog_threat_classification
DEST_KEY = MetaData:Sourcetype

[set_exploit_sourcetype]
