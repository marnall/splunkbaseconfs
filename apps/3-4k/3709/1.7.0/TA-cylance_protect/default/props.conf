EXTRACT-Class = (?=[^T]*(?:Threat Class:|T.*Threat Class:))^(?:[^:\n]*:){9}\s+(?P<Class>\w+)
EXTRACT-Subclass = (?=[^T]*(?:Threat Subclass:|T.*Threat Subclass:))^(?:[^:\n]*:){10}\s+(?P<Subclass>\w+)
EXTRACT-SHA256 = \sSHA256:\s(?<SHA256>[^,]*+)
thFIELDALIAS-source = "source" AS Tenant

