[syslog_mobile]
# Protect Mobile Alerts
NO_BINARY_CHECK = true
category = Custom
description = CylancePROTECT Syslog Protect Mobile Events
disabled = false
pulldown_type = true
# Alert ID - Unique ID associated with the mobile alert (TODO: is this a SHA256?)
EXTRACT-AlertID = \sAlert\sID:\s(?<AlertID>.*?),\s
# Alert Name - One of 11 static or dynamic strings based on the Alert Type and platform (iOS/Android)
EXTRACT-AlertName = \sAlert\sName:\s(?<AlertName>.*?),\s
# Alert Status - either "New" or "Resolved"
EXTRACT-AlertStatus = \sAlert\sStatus:\s(?<AlertStatus>.*?),\s
# Alert Type - One of 9 strings defining the type of alert
EXTRACT-AlertType = \sAlert\sType:\s(?<AlertType>.*?),\s
# Description - One of 10 formats of comma-sep values, not terminated with any specific string
#   (TODO: Figure out how this is terminated; maybe there's no spaces between CSV value commas?)
#   For now only extract the first parameter, following precendent in this file
EXTRACT-Description = \sDescription:\s(?<Description>.*?),\s
# Detected - Date and time alert was detected
#   following "Found" example in threats, above
EXTRACT-Detected = Detected:\s+(?P<Detected>[^,]+)
# Device Id - Unique ID of user's device (TODO: does this follow hyphenated UUID format with Mobile events?)
EXTRACT-DeviceID = Device\sId:\s(?<DeviceID>(\w){8}-(\w){4}-(\w){4}-(\w){4}-(\w){12})
# Device Name - Name of the user's mobile device
EXTRACT-DeviceName = \sDevice\sName:\s(?<DeviceName>.*?),\s
# Event Type - Always "MobileAlert"
EXTRACT-EventType = Event\sType:\s(?P<EventType>.*?),
# Event Name - Always "MobileAlert"
EXTRACT-EventName = Event\sName:\s(?P<EventName>.*?),
# First Name - first name of device user
EXTRACT-FirstName = \sFirst\sName:\s(?<FirstName>.*?),\s
# Last Name - last name of device user
EXTRACT-LastName = \sLast\sName:\s(?<LastName>[^,]+)
#Required for Tenant field on dashboards
FIELDALIAS-source = "source" AS Tenant

# Alert CIM Tagging
EVAL-app = "CylancePROTECT"
FIELDALIAS-description = Description as description
FIELDALIAS-id = AlertID as id
FIELDALIAS-signature = AlertName as signature
EVAL-user = coalesce(LastName + ", " + FirstName, LastName, FirstName) 
FIELDALIAS-dest = DeviceName as dest
FIELDALIAS-username = DeviceID as username
EVAL-severity = "informational"