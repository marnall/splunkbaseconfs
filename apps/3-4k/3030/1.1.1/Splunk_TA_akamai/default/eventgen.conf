[akamai_cloud_monitor.sample]
count = 100
interval = 15
earliest = -15s
latest = now
# outputMode = modinput
maxIntervalsBeforeFlush = 1

source = eventgen
sourcetype = akamai:cm:json

token.0.token = "(#START_TS#)"
token.0.replacementType = timestamp
token.0.replacement = %s

token.1.token = "(#CP#)"
token.1.replacementType = file
token.1.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/edge_server.csv:7

token.2.token = "(#COUNTRY_CODE#)"
token.2.replacementType = file
token.2.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/edge_server.csv:1

token.3.token = "(#REGION#)"
token.3.replacementType = file
token.3.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/edge_server.csv:2

token.4.token = "(#CITY#)"
token.4.replacementType = file
token.4.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/edge_server.csv:3

token.5.token = "(#LONGITUDE#)"
token.5.replacementType = file
token.5.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/edge_server.csv:5

token.6.token = "(#ID#)"
token.6.replacementType = file
token.6.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/id.csv

token.7.token = "(#BYTES_SERVED#)"
token.7.replacementType = random
token.7.replacement = integer[40:1500000]

token.8.token = "(#CLIENT_IP#)"
token.8.replacementType = file
token.8.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/edge_server.csv:6

token.9.token = "cliIP":"\d+.\d+.\d+.(\d+)
token.9.replacementType = random
token.9.replacement = integer[2:254]

token.10.token = "(#REQUESTED_HOST#)"
token.10.replacementType = file
token.10.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/req_host.csv

token.11.token = "(#FORWARD_ORIGIN_SERVER#)"
token.11.replacementType = file
token.11.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/fwd_host.csv

token.12.token = "(#REQUESTED_METHOD#)"
token.12.replacementType = file
token.12.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/req_method.csv

token.13.token = "(#RESPONSE_CONTENT_LENGTH_HEADER#)"
token.13.replacementType = random
token.13.replacement = integer[300:6000]

token.14.token = (#REQUEST_LENGTH#)
token.14.replacementType = random
token.14.replacement = integer[40:200]

token.15.token = "(#HTTP_STATUS_CODE#)"
token.15.replacementType = file
token.15.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/status.csv

token.16.token = "(#CLIENT_ASN#)"
token.16.replacementType = random
token.16.replacement = integer[1:64511]

token.17.token = "(#CACHE_STATUS#)"
token.17.replacementType = random
token.17.replacement = integer[0:3]

token.18.token = "(#DL_TIME_IN_MS#)"
token.18.replacementType = random
token.18.replacement = integer[1:5000]

token.19.token = "(#EDGE_SERVER_IP#)"
token.19.replacementType = file
token.19.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/edge_server.csv:6

token.20.token = "(#FIRST_BYTE_SERVED#)"
token.20.replacementType = random
token.20.replacement = integer[0:1]

token.21.token = "(#LAST_BYTE_SERVED#)"
token.21.replacementType = random
token.21.replacement = integer[0:1]

token.22.token = "(#LAST_MILE_RTT_IN_MS#)"
token.22.replacementType = random
token.22.replacement = integer[0:200]

token.23.token = "(#MIDDLE_MILE_LATENCY_IN_MS#)"
token.23.replacementType = random
token.23.replacement = integer[100:1000]

token.24.token = "(#MIDDLE_MILE_RTT_IN_MS#)"
token.24.replacementType = random
token.24.replacement = integer[100:1000]

token.25.token = "(#NETWORK_ORIGIN_SERVER_LATENCY_IN_MS#)"
token.25.replacementType = random
token.25.replacement = integer[100:1000]

token.26.token = "(#NETWORK_NAME#)"
token.26.replacementType = file
token.26.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/network.csv

token.27.token = "(#NETWORK_TYPE#)"
token.27.replacementType = file
token.27.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/network_type.csv

token.28.token = "(#USER_AGENT#)"
token.28.replacementType = file
token.28.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/ua.csv

token.29.token = "(#LATITUDE#)"
token.29.replacementType = file
token.29.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/edge_server.csv:4

token.30.token = "(#REQUESTED_PATH#)"
token.30.replacementType = file
token.30.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/req_path.csv

token.31.token = "(#RESPONSE_CONTENT_TYPE#)"
token.31.replacementType = file
token.31.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/resp_ct.csv

token.32.token = (#QUERY_PARAMETER#)
token.32.replacementType = random
token.32.replacement = integer[1:99999]

token.33.token = (#COOKIE#)
token.33.replacementType = file
token.33.replacement = $SPLUNK_HOME/etc/apps/Splunk_TA_akamai/samples/req_cookie.csv

# We use this random value to decide if we remove the cookie
token.34.token = (#DELETE_COOKIE#)
token.34.replacementType = random
token.34.replacement = integer[100:999]
token.35.token = "cookie":"([^,"]+0")
token.35.replacementType = static
token.35.replacement = "

token.36.token = "(#REFERRER#)"
token.36.replacementType = static
token.36.replacement = https://www.google.com

token.37.token = (#RANDOM#)
token.37.replacementType = random
token.37.replacement = integer[1000:999999]