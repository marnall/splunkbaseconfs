[airlockexecution] 
DEST_KEY = MetaData:Sourcetype
REGEX = (FileActivityMessage)
FORMAT = sourcetype::airlock:execlog

[airlockserver]
DEST_KEY = MetaData:Sourcetype 
REGEX = (ServerActivityMessage)
FORMAT = sourcetype::airlock:sahlog

[airlock_exec_transform]
DELIMS = "|"
FIELDS = "Header","EventTime","Hostname","Username","FolderPath","FileName","SHA256","MD5","SHA1","Publisher","ParentPolicy","SubPolicy","ExecutionType"

[airlock_sah_transform]
DELIMS = "|"
FIELDS = "Header","EventTime","Task","Username","Description"