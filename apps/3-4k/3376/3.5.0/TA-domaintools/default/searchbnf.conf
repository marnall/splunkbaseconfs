##################
# domaintools
##################
[domaintools-command]
syntax = | domaintools <query> mode=domain_profile|whois|whois_parsed|whois_history|hosting_history|reverse_ip|reverse_ns|reverse_whois|registrant_alert|ip_monitor|ns_monitor|reputation
shortdesc = Connects to the DomainTools API
description = Necessary for connectioning to the DomainTools API. You can use this as either the first command in your search or use it further downstream.
usage = public app
example1 = | domaintools domaintools.com mode=whois
comment1 = Get Whois information for domaintools.com.
example2 = | domaintools google.com,domaintools.com mode=whois
comment2 = You can manually pass multiple values to any of the commands.
tags = domaintools
