[dtools_watchlist]
is_custom = 1
label = Domaintools Whois Watchlist
description = Watchlist Whois attributes and alert on future domains that match
icon_path = appIcon.png
payload_format = json
command = sendalert $action_name$ | stats count

# Default values
param.domainfield = dest
param.email = 0
param.org = 0
param.registrar = 0
param.ns = 0

param._cam        = {\
    "supports_adhoc": true,\
    "category":   ["Information Gathering"],\
    "task":       ["create"],\
    "subject":    ["splunk.event"],\
    "technology": [{"vendor": "DomainTools", "product": "Enterprise"}]\
}
