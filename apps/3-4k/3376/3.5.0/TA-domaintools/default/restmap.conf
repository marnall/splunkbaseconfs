[admin:dtools_config]
match=/domaintools
members=dtools_config, dtools_searchbuilder, dtools_credentials

[admin_external:dtools_config]
handlertype = python
handlerfile = dtools_config.py
handleractions = list, edit

[admin_external:dtools_credentials]
handlertype = python
handlerfile = dtools_credentials.py
handleractions = list, edit

[script:phisheye_monitors]
match=/phisheye_monitors
handler=phisheye_monitors.PhishEye

[script:domain_profile]
match                 = /domain_profile
handler               = domain_profile.DomainProfile
output_modes          = json

[script:domaintools_credentials]
match                 = /domaintools_credentials
script                = domaintools_credentials.py
scripttype            = persist
handler               = domaintools_credentials.CredentialRestHandler
requireAuthentication = true
output_modes          = json
passSystemAuth        = true