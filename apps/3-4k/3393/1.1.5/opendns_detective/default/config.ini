# ----------------------------------------------------------------------
# API Settings
# ----------------------------------------------------------------------

[opendns] # :: OpenDNS Investigate API
address = https://investigate.api.opendns.com
apikey  = 
labels  = 1
verify  = 0

[splunk] # :: Splunk API for KV Store
address  = https://localhost:8089/servicesNS/nobody/opendns_detective/
username = opendnskv
password = 
verify   = 0

# ----------------------------------------------------------------------


# ----------------------------------------------------------------------
# Script Settings
# ----------------------------------------------------------------------

[regex] # :: Regular expressions
domain = ^([a-z0-9]+(-[a-z0-9]+)*\.)+[a-z]{2,}$
ipv4n6 = ^[a-fA-F0-9\.\:]+$

[proxy] # :: Proxy settings
address = 
bypass  = localhost,127.0.0.1

[kvclean]
field    = collect_time
operator = lt

# ----------------------------------------------------------------------
