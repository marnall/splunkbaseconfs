[opendns_quick_example]
search = | inputlookup malwaredomains.csv\
| head 10\
| opendns field=domain method=quick\
| table domain,opendns_api_collect_time,opendns_api_collect_type,opendns_api_collect_cached,\
        opendns_status,opendns_content_categories,opendns_security_categories\
| convert timeformat="%F %T" ctime(opendns_api_collect_time)

[opendns_smart_example]
search = | inputlookup malwaredomains.csv\
| head 10\
| opendns field=domain method=smart\
| table domain,opendns_api_collect_time,opendns_api_collect_type,opendns_api_collect_cached,\
  opendns_status,opendns_content_categories,opendns_security_categories,\
  opendns_dga_score,opendns_perplexity,opendns_entropy,opendns_securerank2,opendns_pagerank,opendns_asn_score,opendns_prefix_score,opendns_rip_score,opendns_fastflux,opendns_popularity,\
   opendns_geodiversity,opendns_geodiversity_normalized,opendns_tld_geodiversity,opendns_geoscore,ks_test,attack,threat_type,threat_found\
| convert timeformat="%F %T" ctime(opendns_api_collect_time)

[opendns_extended_example]
search = | inputlookup malwaredomains.csv\
| head 2\
| opendns field=domain method=extended\
| table domain,opendns_api_collect_time,opendns_api_collect_type,opendns_api_collect_cached,\
  opendns_status,opendns_content_categories,opendns_security_categories,\
  opendns_dga_score,opendns_perplexity,opendns_entropy,opendns_securerank2,opendns_pagerank,opendns_asn_score,opendns_prefix_score,opendns_rip_score,opendns_fastflux,opendns_popularity,\
   opendns_geodiversity,opendns_geodiversity_normalized,opendns_tld_geodiversity,opendns_geoscore,ks_test,attack,threat_type,threat_found\
  whois_addresses,whois_created,whois_emails,whois_expires,whois_nameServers,whois_status,whois_timestamp,whois_updated,whois_whoisServers

[opendns_ipmaldoms_example]
search = | inputlookup ipaddresses.csv\
| head 2\
| opendns field=ip method=maldomains\
| table\
  ip,opendns_api_collect_time,opendns_api_collect_type,opendns_api_collect_cached,opendns_maldomains\
| convert timeformat="%F %T" ctime(opendns_api_collect_time)

[opendns_whois_example]
search = | inputlookup whoisdomains.csv\
| opendns method=whois field=domain\
| table domain,opendns_api_collect_time,opendns_api_collect_type,opendns_api_collect_cached,\
        opendns_whois_addresses,opendns_whois_created,opendns_whois_emails,opendns_whois_expires,opendns_whois_nameServers,opendns_whois_status,opendns_whois_timestamp,opendns_whois_updated,opendns_whois_whoisServers\
| convert timeformat="%F %T" ctime(opendns_api_collect_time)

[opendns_cache_clean]
alert.expires = 1h
alert.severity = 1
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 * * * *
description = Clean the OpenDNS cache of previous requests.
enableSched = 1
schedule_window = 10
search = | kvclean opendns_cache 86400\
| eval c=" ----- Delete entries that are older than 1 day ABOVE. ----- "\
\
| eval c=" ----- Create the final output. ----- "\
| eval elapsed=(finish-start)."s"\
| convert timeformat="%F %T" ctime(start)\
| convert timeformat="%F %T" ctime(finish)\
| table kvstore,status,start,finish,elapsed\
| rename kvstore AS "KV Store",status AS Status,start AS Start,finish AS Finish,elapsed AS "Run Time"
