[Foresight_Error]
BREAK_ONLY_BEFORE = ^Instream Stop Error Report
TIME_PREFIX = Instream Stop Error Report on:
TIME_FORMAT = %m/%d/%Y
MAX_EVENTS = 100000
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true
REPORT-reporting = edi_filename, forescout_claim, forescout_total, forescout_error

[Forescout_DTL]
BREAK_ONLY_BEFORE = ^VER\s*2\.0
MAX_EVENTS = 1000000
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true
REPORT-reporting = edi_filename, forescout_code, forescout_emessage, forescout_dtl_claim, Extract_Keys_From_ISAs, dtl_analysis_stop_time, dtl_analysis_start_time
EVAL-Key = KeyOne . "_" . KeyTwo . "_" . KeyThree

[itp_ftp]
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true
EXTRACT-DeletedOrUploaded = INFO: (?<Action>(Delet|Upload|Put))\w* (?<location>(local|remote)) file
EXTRACT-FilePath = '(?<FilePath>/apps/EDI/[^']*)
EXTRACT-LocalFileName = '/apps/EDI/[^']*/(?<LocalFilename>[^']*)
EXTRACT-RemoteFileName = remote file ''(?<RemoteFilename>[^']*)
EXTRACT-LogLevel = \n(?<LogLevel>[A-Z]*):
EXTRACT-LocalFilename2 = (?<LocalFilename2>[^/\s]*.zip)
EXTRACT-UploadStatus = INFO:\s*/apps/EDI/[^'\s]*/(?<LocalFilename>[^\s/']*)\s*(?<BytesSent>\d*)\s*(?<Status>[\w\s]*)
EVAL-Filename = coalesce(LocalFilename, LocalFilename2)
EVAL-NumUploadCompletes = if(Status="Ready" OR Action="Put",1,0)

[Ironstream]
NO_BINARY_CHECK = true
category = Custom
description = Mainframe Log Source
disabled = false
pulldown_type = true
REPORT-reporting = edi_record_info, edi_patient_names, edi_claim_info, Extract_Keys_From_ISAs
EVAL-Key = KeyOne . "_" . KeyTwo . "_" . KeyThree

[access_combined]
EXTRACT-src = ^(?P<src>\d*\.\d*\.\d*\.\d*)
EXTRACT-time_taken = ^(?:[^"\n]*"){2}\s+\d+\s+(?P<time_taken>\d+)

