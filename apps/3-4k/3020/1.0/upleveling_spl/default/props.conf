#######
## ASA Use Case
#######

[asa_syslog]
EXTRACT-User = User .(?<user>.*?)\>
EXTRACT-Src = IP .(?<src>.*?)\>
EXTRACT-Address = Address .0{1,}(?<assigned_ip>.*?)\>
EXTRACT-Disconnect = (?<user>\S*), IP = 0{1,}(?<src>\S*?),{0,}



#######
## Kaiser EDI Use Case
#######
[EDI]
BREAK_ONLY_BEFORE = ^ISA\*\d\d\*
MAX_EVENTS = 1000000
NO_BINARY_CHECK = true
TIME_FORMAT = %Y%m%d*%H%M%S
TIME_PREFIX = (BHT\*\d*|GS\*HC)\*\d*\*[\dA-Z]*\*
TRUNCATE = 99999
category = Custom
disabled = false
pulldown_type = true
REPORT-reporting = edi_filename, edi_record_info, edi_patient_names, edi_claim_info, Extract_Keys_From_ISAs, edi_claim_payment, edi_check_amount, edi_patient_name
EXTRACT-plancode = (?m)NM1\*IL\*(?:[^\*]*\*){7}(?<bex_plan_id>\w+)~$
EXTRACT-sender_receiver = ISA\*(?:[^\*]+\*){5}(?<bex_sender_code>\d+)[^\*]*\*[^\*]*\*(?<bex_receiver_code>\S+)
EVAL-Key = KeyOne . "_" . KeyTwo . "_" . KeyThree
EVAL-patient_name = patient_last_name . ", " . patient_first_name

[CFF]
