## KV Store Definitions
[inventory_views]
collection = inventory_views
external_type = kvstore
fields_list = app, author, id, inputs, malformed, name, panels, searches, label


[inventory_apps]
collection = inventory_apps
external_type = kvstore
fields_list = name, label, version, is_visible


[inventory_view_searches]
collection = inventory_view_searches
external_type = kvstore
fields_list = app, earliest, latest, parent, parent_tag, query, savedsearch_name, type, view


[inventory_saved_searches]
collection = inventory_saved_searches
external_type = kvstore
fields_list = app, disabled, earliest, is_scheduled, latest, name, owner, query, schedule, summary_index, summary_index_name


[inventory_saved_search_summaries]
collection = inventory_saved_search_summaries
external_type = kvstore
fields_list = command, fields, index, search_name, source, sourcetype, summary_index

[inventory_jobs]
collection = inventory_jobs
external_type = kvstore
fields_list = time, sid, diskUsage, dispatchState, label, ui_dispatch_app, eventCount, runDuration, scanCount, search, ttl, app, owner

[bh_appname]
REGEX = /app/(\w+)/\w+
FORMAT = AppName::$1
WRITE_META = true

[bh_viewname]
REGEX = \/app\/\w+\/(\w+)
FORMAT = ViewName::$1
WRITE_META = true

[bh_app]
REGEX = GET\s/[^/]+/app/([^/]+)/[^\s?]+
FORMAT = app::$1
WRITE_META = true

[bh_view]
REGEX = GET\s/[^/]+/app/[^/]+/([^\s?]+)
FORMAT = view::$1
WRITE_META = true
