[Key Transaction Overview]
action.email.useNSSubject = 1
alert.track = 0
display.general.type = statistics
display.page.search.tab = statistics
display.statistics.format.0 = color
display.statistics.format.0.colorPalette = map
display.statistics.format.0.colorPalette.colors = {"red":#D93F3C,"gray":#D3D3D3,"green":#65A637,"unknown":#555555,"orange":#ED8440}
display.statistics.format.0.field = health_status
display.statistics.format.1 = color
display.statistics.format.1.colorPalette = map
display.statistics.format.1.colorPalette.colors = {"true":#65A637,"false":#D3D3D3}
display.statistics.format.1.field = reporting
display.statistics.format.2 = color
display.statistics.format.2.colorPalette = list
display.statistics.format.2.colorPalette.colors = [#D93F3C,#F7BC38,#65A637]
display.statistics.format.2.field = app.apdex_score
display.statistics.format.2.scale = threshold
display.statistics.format.2.scale.thresholds = [0.75,0.9]
display.statistics.format.3 = color
display.statistics.format.3.colorPalette = list
display.statistics.format.3.colorPalette.colors = [#D93F3C,#F7BC38,#65A637]
display.statistics.format.3.field = eum.apdex_score
display.statistics.format.3.scale = threshold
display.statistics.format.3.scale.thresholds = [0.75,0.9]
display.statistics.format.4 = number
display.statistics.format.4.field = app.apdex_score
display.statistics.format.5 = number
display.statistics.format.5.field = eum.apdex_score
display.visualizations.show = 0
request.ui_dispatch_app = splunk_app_New_Relic
request.ui_dispatch_view = search
search = `get_sources( "newrelic:transactions","*", "key_transactions.json","*")` \
| search new_source="*"  id="*" \
\
| dedup name \
| eval account_id = mvindex(split(new_source,":"),1)\
\
| rename id as application_id application_summary.* as app.* end_user_summary.* as eum.* \
\
| table account_id application_id name language reporting health_status app.apdex_score app.response_time app.throughput app.error_rate eum.apdex_score eum.response_time eum.throughput app.host_count app.instance_count last_reported_at \
\
| sort reporting desc, health_status desc

