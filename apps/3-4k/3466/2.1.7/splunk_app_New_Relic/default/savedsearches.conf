[Mobile Applications Overview]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","new_source"]
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.statistics.format.0 = color
display.statistics.format.0.colorPalette = map
display.statistics.format.0.colorPalette.colors = {"true":#65A637,"false":#555555}
display.statistics.format.0.field = reporting
display.statistics.format.1 = color
display.statistics.format.1.colorPalette = map
display.statistics.format.1.colorPalette.colors = {"red":#D93F3C,"green":#65A637,"gray":#D3D3D3,"orange":#ED8440,"unknown":#555555}
display.statistics.format.1.field = health_status
display.visualizations.show = 0
request.ui_dispatch_app = splunk_app_New_Relic
request.ui_dispatch_view = search
search = `get_sources( "newrelic:applications:mobile","*", "mobile_applications.json","*")`  \
\
| search new_source=* \
name="*" \
\
| dedup name\
\
| eval account_id = mvindex(split(new_source,":"),1)\
\
| rename id as application_id mobile_summary.* as * crash_summary.* as * \
| table account_id application_id name reporting health_status  active_users launch_count  throughput  response_time  calls_per_session interaction_time  failed_call_rate remote_error_rate crash_rate crash_count  unresolved_crash_count supports_crash_data


[Open Alert Violations]
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.statistics.format.0 = color
display.statistics.format.0.colorPalette = map
display.statistics.format.0.colorPalette.colors = {"Critical":#D93F3C,"Warning":#F7BC38,"Info":#D3D3D3}
display.statistics.format.0.field = priority
action.email.useNSSubject = 1
alert.track = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = splunk_app_New_Relic
request.ui_dispatch_view = search
search = `get_sources( "newrelic:alerts:violations","*", "alerts_violations.json","*")` \
|search new_source="*" NOT closed_at=* \
\
| eval account_id = mvindex(split(new_source,":"),1)\
| rename id as violation_id\
| spath priority         \
\
| streamstats max(_indextime) as last_time\
| eval idxtime = toString(_indextime), lsttime = toString(last_time), "Open As Of" = strftime(_indextime,"%+"), opened_at = strftime(opened_at/1000,"%+"),  duration = tostring(duration,"duration") \
| where lsttime = idxtime\
| rename entity.* as *  | table  violation_id "Open As Of" opened_at duration priority name  policy_name condition_name  product type account_id
