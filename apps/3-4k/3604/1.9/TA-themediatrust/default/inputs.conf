########### The following three stanzas are for Linux #########################

[script:\\$SPLUNK_HOME\etc\apps\TA-themediatrust\bin\download_threatfeed.py]
disabled = 0
interval = 3600
sourcetype = themediatrust:download
source = threatfeed_download

[script:\\$SPLUNK_HOME\etc\apps\TA-themediatrust\bin\report_metrics.py]
disabled = 0
#interval defaults to once per week
interval = 604800
source = threatfeed_metrics
sourcetype = themediatrust:report

########### Below this line is for EventGen #########################

########### The following two stanzas are for Linux #########################

[script:\\$SPLUNK_HOME\etc\apps\TA-themediatrust\bin\themediatrust_eventgen.py]
disabled = 0
#interval defaults to once per hour
interval = 600
source = threatfeed_test
sourcetype = themediatrust:testdata
#passAuth = splunk-system-user

[monitor:\\$SPLUNK_HOME\etc\apps\TA-themediatrust\samples\mediaTrustEvents.log]
disabled = 0
sourcetype = pan:traffic
