[openam_logs_parsing]
REGEX=^"([^\t]+)"\t"?(?<Data_values>[^\t"]+)"?\t"?(?<ContextID>[^\t"]+)"?\t"?(?<LoginID>[^\t"]+)"?\t"?(?<IPAddr>[^\t"]+)"?\t"?(?<LogLevel>[^\t"]+)"?\t"?(?<Domain>[^\t"]+)"?\t"?(?<MessageID>[^\t"]+)"?\t"?(?<LoggedBy>[^\t"]+)"?\t"?(?<NameID>[^\t"]+)"?\t"?(?<ModuleName>[^\t"]+)"?\t"?(?<HostName>[^\t"]+)"?

[openam_logs_parsing2]
REGEX=^"([^\t]+)"\s"(?<Data_values>[^\t]+)"\t"?(?<ContextID>[^\t"]+)"?\t"?(?<LoginID>[^\t"]+)"?\t"?(?<IPAddr>[^\t"]+)"?\t"?(?<LogLevel>[^\t"]+)"?\t"?(?<Domain>[^\t"]+)"?\t"?(?<MessageID>[^\t"]+)"?\t"?(?<LoggedBy>[^\t"]+)"?\t"?(?<NameID>[^\t"]+)"?\t"?(?<ModuleName>[^\t"]+)"?\t"?(?<HostName>[^\t"]+)"?

[fieldsplit_MessageID]
SOURCE_KEY=MessageID
REGEX=^(?<Message_Type>[^-]+)-(?<Message_Code>\d+)

[openam_logs_message_lookup]
filename = openam_logs_message_lookup.csv
case_sensitive_match = false

[username_for_openam]
SOURCE_KEY = LoginID
REGEX = ^\w{2,3}=(?<Username>[^,]+),

[parse_xml1]
SOURCE_KEY = Data_values
REGEX = \<(?!\w+:AttributeValue)([^\s\>]+)[^\>]*\>([^\<]+)(?:\\\n)?\<\/\1\> 
FORMAT = $1::$2

[parse_xml2]
SOURCE_KEY = Data_values
REGEX = Attribute\sName=""([^""]+)""\>[^\>]+\>([^\<]+)\<\/
FORMAT = $1::$2

[parse_sid]
SOURCE_KEY = Data_values
REGEX = (?:"")?([^"]+)"":(?:"")?([^}"]+)(?:"")?(?:,|}) 
FORMAT = $1::$2

[parse_destination_protocole_URL]
SOURCE_KEY = Data_values
REGEX = Destination=""(?<destination>[^"]+)""\sProtocolBinding=""(?<protocol>[^"]+)""\sAssertionConsumerServiceURL=""(?<AssertionConsumerServiceURL>[^"]+)""\>

[parse_recipient_sp]
SOURCE_KEY = Data_values
REGEX = Recipient=""(?<recipient>[^"]+)""
