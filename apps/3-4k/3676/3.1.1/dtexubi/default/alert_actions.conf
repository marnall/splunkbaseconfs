[dtex_custom_alerts]
is_custom         = 1
label             = Dtex Create Custom Alerts
description       = This page will helps to create custom alert action with risk category. 
icon_path         = dtex.png
payload_format    = json
param.category = Data Loss Risk (File Sharing Website)
param.risk_score = 10
param.severity = Low
param.time = _time
param.username = user_name
param.triggered_at = $trigger_time$
ttl               = 240
track_alert = 1
python.version = python3