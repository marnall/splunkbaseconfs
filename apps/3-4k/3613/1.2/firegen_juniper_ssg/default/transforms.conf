[protocol_lookup]
default_match = N/A
filename = firegen_protocols.csv
max_matches = 1

[fgdnslookup]
external_cmd = fg_lookup.py clienthost clientip
fields_list = clienthost,clientip

[fgprocessprotocol]
external_cmd = fg_protocol_proc.py rawprotocol finalprotocol
fields_list = rawprotocol,finalprotocol

