[ssdeep_hash_buf(1)]
args = buffer
definition = lookup ssdeep_hash_buf_lookup buffer as $buffer$

[ssdeep_hash_filename(1)]
args = filename
definition = lookup ssdeep_hash_filename_lookup filename as $filename$

[ssdeep_compare(2)]
args = sig1, sig2
definition = lookup ssdeep_compare_lookup sig1 as $sig1$ sig2 as $sig2$

