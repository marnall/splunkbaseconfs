[replay-command]
syntax = replay (<replay-options>)*
shortdesc = Re-Execute Splunk Searches
description = Re-execute Splunk Searches based on a provided list.
usage = public
example1 = replay
comment1 = replays the passed search results
example2 = replay search=full_search_field
comment2 = Uses the `full_search_field` field as the location of the search to execute.
tags = replays the passed search results, where full_search_field has the search contained within.

[replay-options]
syntax = search=<string> | earliest=<string> | latest=<string> | schedule=<bool> | schedule_time=<string> | time_diff=<int> | timer=<int> | shc_lb=<bool> | shc_lb_user=<string>
description = The replay command re-excutes (using /search/jobs)\
  the searches that are passed to it. At a minimum, the passed events\
  should have 3 fields. \
  earliest: in unix seconds.\
  latest: in unix seconds.\
  search: the full search to execute. Must have "search" as first command \
  or the | to indicate another generating command. If using scheduling, the time to be scheduled\
  must also be in unix seconds.