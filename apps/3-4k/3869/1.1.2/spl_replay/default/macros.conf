[audit_searches]
definition = index=_audit action=search search=* NOT ("replay" OR "summarize" OR "copybuckets" OR "history" OR "typeahead" OR "noop" OR "archivebuckets" OR "metasearch" OR "summaryindex" )

[process_audit_search]
definition = rex field=_raw "search='(?<full_search>.*?)'," | rex field=full_search "\|?\s*(?<primary_command>[^\s\|]+)"| `audit_last_command` | `audit_has_risky`| `audit_latest_time` | `audit_earliest_time`| eval search_id = replace(search_id,"'","") | `audit_command_type`| `audit_search_type`

[audit_last_command]
definition = eval lc=mvindex(split(full_search,"|"),-1)|rex field=lc "\|?\s*(?<last_command>[^\s\|]+)" | fields - lc

[generate_search_list]
definition = `audit_searches` | `process_audit_search` | table earliest_time full_search has_risky last_command latest_time primary_command search_id search_type timestamp user | where isnotnull(full_search)  |search NOT search_type IN ("realtime")

[audit_filter_internal_commands]
definition = search NOT search_type IN ("realtime")  NOT command_type IN ("internal") full_search = *| convert auto(timestamp) as schedule_time timeformat="%m-%d-%Y %H:%M:%S.%3N"

[audit_latest_time]
definition = eval latest_time=if(like(apiEndTime,"%ZERO_TIME%"),strptime(timestamp,"%m-%d-%Y %H:%M:%S.%3N"),strptime(apiEndTime,"'%a %b %e %H:%M:%S %Y'"))

[audit_earliest_time]
definition = eval earliest_time=if(like(apiStartTime,"%ZERO_TIME%"),0,strptime(apiStartTime,"'%a %b %e %H:%M:%S %Y'"))

[audit_command_type]
definition = eval command_type = case(in(primary_command, "typeahead", "history", "summarize", "archivebuckets", "copybuckets", "noop", "upgrade"),"internal", true(), "normal")

[audit_search_type]
definition = eval search_type = case(match(search_id, "^scheduler_"),"scheduled",match(search_id,"^rt_"),"realtime", true(),"adhoc")

[audit_has_risky]
definition = eval has_risky = case(match(full_search,"outputlookup"),"true",match(full_search,"collect"),"true",match(full_search,"summaryindex"),"true",true(),"false")

[replay_sample]
definition = makeresults | eval search = "search _internal | stats count by host", earliest_time = "-1h@h", latest_time = "now"