[admin:TA_GigamonARForSplunk]
match = /
members = TA_GigamonARForSplunk_settings

[admin_external:TA_GigamonARForSplunk_settings]
handlertype = python
handlerfile = TA_GigamonARForSplunk_rh_settings.py
handleractions = edit, list

[script:giga]
match = /giga_persistent
script = appSetup.py
scripttype = persist
handler = appSetup.GigaHandler
requireAuthentication = false
output_modes = json
passPayload = true
passHttpHeaders = true
passHttpCookies = true

