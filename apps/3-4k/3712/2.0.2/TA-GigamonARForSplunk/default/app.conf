# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 1

[launcher]
author = Gigamon Inc
version = 2.0.2
description = Gigamon Adaptive Response Application for Splunk is an add-on to the Gigamon IPFIX Metadata Application for Splunk. It provides Splunk administrators with Adaptive Response Actions to be taken on Gigamon Visibility nodes via GigaVUE® Fabric Manager (GigaVUE-FM). These actions can be bound to correlation searches on Splunk Enterprise Security for automated response or executed on an ad-hoc basis with Notable events. It leverages Splunk's Adaptive Response Framework and uses RESTful API to integrate with GigaVUE-FM® to perform response actions.

[ui]
is_visible = 1
label = Gigamon Adaptive Response Application for Splunk
docs_section_override = AddOns:released

[package]
id = TA-GigamonARForSplunk

[triggers]
reload.addon_builder = simple
reload.ta_gigamonarforsplunk_account = simple
reload.ta_gigamonarforsplunk_settings = simple
reload.passwords = simple

