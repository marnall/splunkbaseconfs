[protection:Computer, not deleted]
display.general.type = statistics
display.page.search.mode = smart
display.page.search.tab = statistics
display.visualizations.show = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
request.ui_dispatch_app = SA-cbquery
request.ui_dispatch_view = search
search = | cbquery product=protection model=Computer query="where('deleted:False')"

[protection:Computer, no filter]
display.general.type = statistics
display.page.search.mode = smart
display.page.search.tab = statistics
display.visualizations.show = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
request.ui_dispatch_app = SA-cbquery
request.ui_dispatch_view = search
search = | cbquery product=protection model=Computer query="all()"

[protection:Computer, not deleted, limit 10 results]
display.general.type = statistics
display.page.search.mode = smart
display.page.search.tab = statistics
display.visualizations.show = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
request.ui_dispatch_app = SA-cbquery
request.ui_dispatch_view = search
search = | cbquery product=protection model=Computer query="where('deleted:False')[:10]"

[protection:Computer, not deleted, low or no enforcement]
display.general.type = statistics
display.page.search.mode = smart
display.page.search.tab = statistics
display.visualizations.show = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
request.ui_dispatch_app = SA-cbquery
request.ui_dispatch_view = search
search = | cbquery product=protection model=Computer query="where('deleted:False').and_('enforcementLevel>39')" fields="name,machineModel,ipAddress,isActive,policyName"

[protection:FileCatalog, unapproved Applications or Packages, limit fields]
display.general.type = statistics
display.page.search.mode = smart
display.page.search.tab = statistics
display.visualizations.show = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
request.ui_dispatch_app = SA-cbquery
request.ui_dispatch_view = search
search = | cbquery product=protection model=FileCatalog query="where('fileType:Application|Package').and_('prevalence>0').and_('effectiveState:Unapproved').and_('certificateState:1')" fields="fileName,fileSize,md5,pathName,prevalence" | sort -prevalence

