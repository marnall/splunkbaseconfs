[cbquery-command]
syntax = cbquery (product=<string>) (model=<string>) (query=<string>) (fields=<fields>)?
shortdesc = Queries Cb (cbapi), generates Splunk events from the results returned.
description = Query Carbon Black's api (cbapi) for data from products - Defense, Protection, or \
    Response. Specify the product to query (defense, protection, or response), a model to query (i.e.\
    Computer) and a Cb formated query (i.e. query="where('deleted:False')"). A generating command.\
    Optionally provide a list of fields to return with "fields=" argument. See Models and Queries for \
    appropriate product at https://cbapi.readthedocs.io/en/latest/index.html#api-documentation
usage = public
example1 = | cbquery product=protection model=Computer query="all()"
example2 = | cbquery product=protection model=Computer query="where('deleted:False')"
example3 = | cbquery product=protection model=Computer query="where('deleted:False')[:10]"
example4 = | cbquery product=protection model=FileCatalog query="where('fileType:Application|Package').and_('prevalence>0').and_('effectiveState:Unapproved').and_('certificateState:1')" fields="fileName,fileSize,md5,pathName"

[cbedit-command]
syntax = cbedit (product=<string>) (model=<string>) (query=<string>) (target=<field>) (value=<string>) (ticket=<string>)?
shortdesc = Queries Cb (cbapi), edits value of target, then returns result.
description = Query Carbon Black's api (cbapi) for data from products - Defense, Protection, or \
    Response. Specify the product to query (defense, protection, or response), a model to query (i.e.\
    Computer) and a Cb formated query (i.e. query="where('deleted:False')") and then a target (i.e. \
    policyID) to change with a value. A generating command that only generates the output of the change. \
    See Models and Queries for appropriate product at \
    https://cbapi.readthedocs.io/en/latest/index.html#api-documentation
usage = public
example1 = | cbedit product=protection model=Computer query="where('name:computer1')" target="policyId" value=3
