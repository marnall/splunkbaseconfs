##################################################
#         REST Endpoint for OPSEC Add-on         #
##################################################

[admin:splunk_ta_opseclea]
match = /ta_opseclea
members = ta_opseclea_indexes,ta_opseclea_settings,ta_opseclea_cert,ta_opseclea_input

[admin_external:ta_opseclea_indexes]
handlertype = python
handlerfile = ta_opseclea_rh_indexes.py
handleractions = list

[admin_external:ta_opseclea_settings]
handlertype=python
handlerfile=ta_opseclea_rh_settings.py
handleractions=edit,list,remove

[admin_external:ta_opseclea_cert]
handlertype = python
handlerfile = ta_opseclea_rh_cert.py
handleractions = create,edit,list,remove

[admin_external:ta_opseclea_input]
handlertype = python
handlerfile = ta_opseclea_rh_input.py
handleractions = create,edit,list,remove
