#Looks for all processes which are started by a user
[manual_process_parent]
search = sourcetype=tm1:serverlog process_status_msg="*xecuted by user*"
priority = 5
#Tags parent, process, executed

#Looks for all children process executions 
[manual_process_child]
search = sourcetype=tm1:serverlog process_status_msg="*un from process*"
priority = 5
#Tags child, process, executed

#Looks for any process which has failed 
[process_failed]
priority = 5
search = sourcetype=tm1:serverlog process_status_msg="*ompleted with errors" OR process_status_msg="*inished executing with errors" OR process_status_msg="*xecution was aborted*" OR process_status_msg="*inished with ProcessBreak" OR process_status_msg="*ould not init*"
#Not in use?

#Looks for any process which has completed successfully
[process_success]
priority = 5
search = sourcetype=tm1:serverlog process_status_msg="*inished executing normally*"
# Tags process, success

#Looks for any executed chore 
[scheduled_process]
priority = 5
search = sourcetype=tm1:serverlog chore_status_msg="Executed by scheduler" OR chore_status_msg="executed by scheduler"
# Tags chore, executed

#Looks for successful chores
[scheduled_process_success]
priority = 5
search = sourcetype=tm1:serverlog chore_status_msg="finished executing" OR chore_status_msg="Finished executing"
# Tags chore, success

#Looks for any unsuccessful manual processes 
[process_ended]
search = sourcetype=tm1:serverlog process_status_msg="*ompleted with errors" OR process_status_msg="*ompleted with errors*" OR process_status_msg="*inished executing with errors*" OR process_status_msg="*xecution was aborted*" OR process_status_msg="*inished with ProcessBreak" OR process_status_msg="*ould not init*"
#Tags error, process 

#Looks for any TM1 memory events 
[health_memory]
search = sourcetype=tm1:serverlog event_type=TM1.Server.Memory log_level=WARN

#Looks for any TM1 application process restarts
[tm1_server_start]
priority = 5
search = sourcetype=tm1:serverlog event_type=TM1.Server "TM1 Server is ready"
# Tags started, action, tm1server 

#Looks for any TM1 application process shutdown calls
[tm1_server_stop]
priority = 5
search = sourcetype=tm1:serverlog event_type=TM1.Server "Closing"
#Tags start_shutdown, action, tm1server 

#Looks for TM1 server shutdown completed events 
[tm1_server_stopped]
priority = 5
search = sourcetype=tm1:serverlog event_type=TM1.Server "Server shutdown"
#Tags shutdown, action, tm1server 

#Auth CIM normalization
[tm1_auth]
search = sourcetype=tm1:serverlog "TM1.Login"
#Tags authentication, default

#DB CIM normalization 
[tm1_db]
search = sourcetype=tm1:serverlog ("TM1.Process" OR "TM1.Chore")
# tags database, instance