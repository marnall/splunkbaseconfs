[tm1:processerror]
EXTRACT-data_source = ^(?<data_source>.*?),Data\sSource
EXTRACT-data_source_line = \sline\s\((?<data_source_line>\d+)\)
EXTRACT-error_message = Error:\s(?<error_message>.+$)
EXTRACT-error_tab = Error:\s(?<error_tab>\w+)
EXTRACT-error_reason = \d+\):\s(?<error_reason>.+$)
EXTRACT-processerror_process = process\s+\"(?<error_process_name>.+?)\"
REPORT-log_dir = log_dir
LOOKUP-instance_lookup = instance_lookup log_dir OUTPUTNEW tm1_instance 

[tm1:serverlog]
EXTRACT-tm1_server_process = TM1\.Process\s+Process\s+\"(?<process_name>.+?)\"
EXTRACT-tm1_child_process = TM1\.Process\s+Process\s+\"(?<child_process_name>[^"]+)\"\srun\sfrom\sprocess\s\"(?<parent_process_name>[^"]+)\"
EXTRACT-tm1_server_sqlapi = TM1\.SQLAPI\s+(?<sql_api_message>.+)
EXTRACT-user = by\suser\s\"(?<user>[^\"]+)\"
EXTRACT-elapsed_time = lapsed\stime\s(?P<elapsed_time>.+?)\s
EXTRACT-chore_time = ime\s\=\s(?P<chore_time>.+?)\s
EXTRACT-eventheader = ^(?P<pid>\d+)\s+\[.*?\]\s+(?P<log_level>\w+)\s+(?:[^ \n]* ){4}(?P<event_type>\S+)\s+|
EXTRACT-sessionid = \d{1,6}\s+\[(?<session_id>\S+?)\]
EXTRACT-tm1_server_chore = TM1\.Chore\s+Chore\s+\"(?<chore_name>.+?)\"
EXTRACT-dimension_name = Dimension\sName:\s"(?<dimension_name>\w+)"
EXTRACT-process_status_msg = TM1\.Process\s+Process\s+\"[^"]+\"\W+(?P<process_status_msg>.*)
EXTRACT-chore_status_msg = TM1\.Chore\s+Chore\s+\"[^"]+\"\W+(?P<chore_status_msg>.*)
EXTRACT-error_details = file:.*?\<(?<error_file>.+?)\>
EXTRACT-tm1_server_restart = TM1\sServer\sload\stime.+?\((?P<tm1_restart_unit>\w+)\)\s\=\s(?P<tm1_restart_duration>\d+)
EXTRACT-tm1_server_action = TM1\.Server\s+(?P<tm1_server_action>.+[^.])
EXTRACT-parent_process_name = TM1\.Process\s+Process\s+\"\w+\".*process\s\"(?<parent_process_name>\w+)\"
EVAL-elapsed_time = coalesce(chore_time,elapsed_time)
EVAL-tm1_instance = host. ":" .tm1_instance
EVAL-status = case(match(process_status_msg,"ompleted with errors"),"completed with errors",match(process_status_msg,"inished executing with errors"),"completed with errors",match(process_status_msg,"xecution was aborted"),"aborted",match(process_status_msg,"inished executing normally"),"completed",match(process_status_msg,"ould not initialize"),"init failed",match(process_status_msg,"xecuted by user"),"manual start",match(process_status_msg,"xecuted by chore"),"scheduled start",match(process_status_msg,"inished with ProcessBreak"),"completed with process break",match(process_status_msg,"un from process"),"started from process", match(chore_status_msg,"xecuted by scheduler"),"scheduled start",match(chore_status_msg,"inished executing"),"completed",1=1,NULL)
LOOKUP-process_lookup = process_type process_name OUTPUTNEW business_process_name process_type
LOOKUP-instance_lookup = instance_lookup log_dir OUTPUTNEW tm1_instance 
REPORT-log_dir = log_dir

############CIM#################
#Authentication is dependant on proper logging settings
#Example log output
#11111   [1abc]   DEBUG   2016-01-09 01:20:52.113500   TM1.Login   Login Success: User CAMID("PRFT:u:cn=bbuilder,ou=users")
EXTRACT-action = TM1\.Login\s+Login\s+(?<action>\w+)\:
EVAL-action-1 = case(match(action,"Logout"),"success",match(action,"Login"),"success",match(action,"Fail"),"failure",1=1,"unknown")
EVAL-action-2 = lower(action)
EVAL-app = "TM1"
FIELDALIAS-dest = tm1_instance AS dest
FIELDALIAS-user = cn AS user
FIELDALIAS-object-1 = process_name AS object
FIELDALIAS-object-2 = chore_name AS object
FIELDALIAS-instance_name = tm1_instance AS instance_name
FIELDALIAS-duration = elapsed_time AS duration 
EVAL-vendor = "IBM"
EVAL-product = "TM1"

[tm1:cfg]
EXTRACT-tm1_instance_name = ServerName=(?<tm1_instance_name>[^\r\n]+)
EXTRACT-DataBaseDirectory = DataBaseDirectory=(?<DataBaseDirectory>[^\r\n]+)
EXTRACT-LoggingDirectory = LoggingDirectory=(?<LoggingDirectory>[^\r\n]+)
EVAL-log_dir = coalesce(LoggingDirectory,DataBaseDirectory)
EVAL-cfg_source = host. ":" .source

