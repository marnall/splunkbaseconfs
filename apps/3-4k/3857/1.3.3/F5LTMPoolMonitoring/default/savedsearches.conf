[LTM - Pool Down]
action.logevent = 1
action.logevent.param.event = alert="$name$" | pool=$result.pool$"
alert.digest_mode = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.fields = pool
alert.suppress.period = 3h
alert.track = 1
counttype = number of events
cron_schedule = */3 * * * *
dispatch.earliest_time = -4m@m
dispatch.latest_time = -1m@m
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = F5LTMPoolMonitoring
request.ui_dispatch_view = search
search = sourcetype="f5:bigip:ltm:snmp:monitor:status" [search sourcetype="f5:bigip:ltm:snmp:failover:status" failover_id="4" | fields host] NOT [| inputlookup f5_ltm_pool_members_maintenance.csv\
| eval current_date_time_epoch=now()\
| eval maintenance_start_date_time=date_start." ".hour_start.":".minute_start.":"."00"\
| eval maintenance_start_date_time_epoch=round(strptime(maintenance_start_date_time, "%d/%m/%Y %H:%M:%S"),0)\
| eval maintenance_end_date_time=date_end." ".hour_end.":".minute_end.":"."00"\
| eval maintenance_end_date_time_epoch=round(strptime(maintenance_end_date_time, "%d/%m/%Y %H:%M:%S"),0)\
| eval recurring_maintenance_start_time=if(isnull(date_start),hour_start*3600+minute_start*60,null)\
| eval recurring_maintenance_end_time=if(isnull(date_end),hour_end*3600+minute_end*60,null)\
| eval c_time=strftime(current_date_time_epoch,"%H:%M")\
| rex field=c_time "(?<current_hour>\d{2})\:(?<current_minute>\d{2})"\
| eval current_time_seconds=current_hour*3600+current_minute*60\
| where (maintenance_start_date_time_epoch < current_date_time_epoch AND current_date_time_epoch < maintenance_end_date_time_epoch) OR (recurring_maintenance_start_time < current_time_seconds AND current_time_seconds < recurring_maintenance_end_time) OR (isnull(hour_start) AND isnull(hour_end) AND isnull(minute_start) AND isnull(minute_end) AND maintenance="true")\
| fields pool_member]\
| dedup pool_member status host\
| stats count(eval(status="up")) as pool_memberupcount count(eval(status="down" OR status="up")) as pool_membertotalcount by pool\
| where pool_membertotalcount>0\
| eval ratio = pool_memberupcount/pool_membertotalcount*100\
| eval ratio=if(isnull(ratio), "0", ratio)\
| where ratio="0"\
| table pool

