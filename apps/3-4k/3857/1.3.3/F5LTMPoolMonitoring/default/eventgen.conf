[f5bigip1_pool_member_monitor_status.sample]
sourcetype = f5:bigip:ltm:snmp:monitor:status
source = eventgen:pool_member_monitor_status.sample
interval = 120
host = f5bigip1

token.1.token = (##STATUS##)
token.1.replacementType = file
token.1.replacement = $SPLUNK_HOME/etc/apps/F5LTMPoolMonitoring/samples/statuses.sample

[f5bigip1_failover_status.sample]
sourcetype = f5:bigip:ltm:snmp:failover:status
source = eventgen:failover_status.sample
interval = 120
host = f5bigip1

[f5bigip1_pool_member_stat_server_cur_conns.sample]
sourcetype = f5:bigip:ltm:snmp:stat:server:cur:conns
source = eventgen:pool_member_stat_server_cur_conns
interval = 120
host = f5bigip1

token.1.token = (##CONNS##)
token.1.replacementType = random
token.1.replacement = integer[0:3000]

[f5bigip1_sync_status.sample]
sourcetype = f5:bigip:ltm:snmp:sync:status
source = eventgen:sync_status.sample
interval = 120
host = f5bigip1

