######################################################
#
# Balabit Shell Control Box Add-On for Splunk
#
######################################################

[BalaBit:ShellControlBox:Audit]
priority = 5
search = vendor_class=*-audit

[BalaBit:ShellControlBox:ProxyAuthentication]
priority = 5
search = vendor_class=proxy-authentication

[BalaBit:ShellControlBox:System]
priority = 5
search = vendor_class=system-*

[BalaBit:ShellControlBox:ProxyConnection]
priority = 5
search = vendor_class=proxy-connection-*

[BalaBit:ShellControlBox:ProxyInstance]
priority = 5
search = vendor_class=proxy-instance-*

[BalaBit:ShellControlBox:Error]
priority = 5
search = vendor_class=*-error

[BalaBit:ShellControlBox:Policy]
priority = 5
search = vendor_class=policy-*

[BalaBit:ShellControlBox:Indexer]
priority = 5
search = vendor_class=indexer
