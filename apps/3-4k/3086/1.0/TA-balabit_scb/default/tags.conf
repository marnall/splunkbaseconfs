######################################################

[eventtype=BalaBit%3AShellControlBox%3AAudit]
audit = enabled
change = enabled

[eventtype=BalaBit%3AShellControlBox%3AProxyAuthentication]
authentication = enabled
default = enabled

[vendor_class=proxy-connection-end]
end = enabled
session = enabled

[vendor_class=proxy-connection-start]
start = enabled
session = enabled

[vendor_class=proxy-instance-start]
start = enabled
network = enabled

[vendor_class=proxy-instance-ready]
start = enabled
network = enabled

[vendor_class=proxy-instance-end]
end = enabled
network = enabled

[vendor_class=proxy-connection-error]
error = enabled

[vendor_class=proxy-connection-violation]
violation = enabled

[vendor_class=system-change-management]
change = enabled

[vendor_class=policy-alert]
alert = enabled
