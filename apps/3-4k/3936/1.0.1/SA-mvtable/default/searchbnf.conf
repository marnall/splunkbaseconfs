###############
# mvtable
###############

[mvtable-command]
syntax = mvtable (<mvtable-options>)*
shortdesc = make a table with each value of each mv field for a row
description = make a table with each value of each mv field for a row. Assumes cardinality of the specified mv fields are the same and assumes that the first mv field's cardinality is the number of rows it needs to generate. Tell which singlevalue fields to keep.
example = | mvtable mvfields="x,y" keepfields="host,source"

[mvtable-options]
syntax = mvfields=<string> | keepfields=<string>
description = Specify the mv fields to expand as a comma separated list of field names. Specify the single value fields to keep as a comma separated list of field names. Takes the first mv field number of values as the number of rows to generate. Assumes the same cardinality for all fields.
