[get_vm_index]
definition = index="main"
iseval = 0

[kb_to_mb(1)]
args = data_kb
definition = round($data_kb$/1024,2)
iseval = 0

[mb_to_gb_tb_pb(1)]
args = data_mb
definition = eval bytes_gb = round(($data_mb$/1024),2) | eval bytes_tb = round(bytes_gb/1024,2) | eval bytes_pb = round(bytes_tb/1024,2) | eval bytes = case($data_mb$ < 1024,$data_mb$,$data_mb$ >= 1024 AND bytes_gb < 1024, bytes_gb, bytes_gb >= 1024 AND bytes_tb < 1024, bytes_tb, bytes_tb >= 1024, bytes_pb) | eval bytes_unit = case($data_mb$ < 1024,"MiB",$data_mb$ >= 1024 AND bytes_gb < 1024, "GiB", bytes_gb >= 1024 AND bytes_tb < 1024, "TiB", bytes_tb >= 1024, "PiB")
iseval = 0

[get_type]
definition = eval Type =  case((lower('virtual_devices.type')=="san" AND lower('virtual_devices.subType')=="thick"),"Thick", (lower('virtual_devices.type')=="san" AND lower('virtual_devices.subType')=="sir"),"Dedup", (lower('virtual_devices.type')=="san" AND lower('virtual_devices.subType')=="gsm"),"Dedup", (lower('virtual_devices.type')=="san" AND lower('virtual_devices.subType')=="dedup"),"Dedup", (lower('virtual_devices.type')=="san" AND lower('virtual_devices.subType')=="thin"),"Thin",(lower('virtual_devices.type')=="sanreplica" AND lower('virtual_devices.subType')=="thick"),"Replica - Thick", (lower('virtual_devices.type')=="sanreplica" AND lower('virtual_devices.subType')=="sir"),"Replica - Dedup", (lower('virtual_devices.type')=="sanreplica" AND lower('virtual_devices.subType')=="gsm"),"Replica - Dedup", (lower('virtual_devices.type')=="sanreplica" AND lower('virtual_devices.subType')=="dedup"),"Replica - Dedup", (lower('virtual_devices.type')=="sanreplica" AND lower('virtual_devices.subType')=="thin"),"Replica - Thin", lower('virtual_devices.type')=="SANTimeView","Thin Clone", lower('virtual_devices.type')=="Cache","CDP Resource", lower('virtual_devices.type')=="Adaptive","CDR Resource", lower('virtual_devices.type')=="timemark","Snapshot Resources")
iseval = 0