[VMEM_FSP_Mapping]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -2h@h
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = `get_vm_index`  sourcetype="violin:fsp:rest"  source="violin://*/concerto/server/config/xml" | dedup System_Serial_Number | table node Server | rename Server as fsp_name | sort fsp_name | outputlookup FSP_MappingLookup

[VMEM_LUN_Mapping]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
cron_schedule = */15 * * * *
dispatch.earliest_time = -2h@h
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/logicalresource/sanresource" virtual_devices.type!="TimeMark" virtual_devices.subType!="SIR" virtual_devices.subType!="GSM" | dedup virtual_devices.guid | table virtual_devices.name virtual_devices.virtual_device_id virtual_devices.guid node | rename virtual_devices.name as "LUN Name" virtual_devices.virtual_device_id as VID virtual_devices.guid as GUID | join type=left node [search `get_vm_index`  sourcetype="violin:fsp:rest"  source="violin://*/concerto/server/config/xml" | dedup System_Serial_Number | table node Server | rename Server as "FSP Name"] | fields - node | outputlookup LUN_MappingLookup

[VMEM_Client_LUN_Mapping]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = */15 * * * *
dispatch.earliest_time = -2h@h
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/logicalresource/sanresource" virtual_devices.type!=TimeMark | dedup virtual_devices.clients{}.name,virtual_devices.name | rename virtual_devices.clients{}.name as "SAN Client" virtual_devices.name as LUNs | table "SAN Client" LUNs node | mvexpand "SAN Client" | join type=left node [search `get_vm_index`  sourcetype="violin:fsp:rest"  source="violin://*/concerto/server/config/xml" | dedup System_Serial_Number | table node Server | rename Server as "FSP Name"] | fields - node | outputlookup LUN_Client_mapping

[VMEM_TimeMark_Mapping]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = */15 * * * *
dispatch.earliest_time = -2h@h
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = `get_vm_index` sourcetype="violin:fsp:rest"  source="violin://*/concerto/logicalresource/snapshotresource/*" data.timemarkEnabled=true | dedup data.guid | eval Type = if('data.snapshotGroup' == "null","LUN","Group") | table data.name,Type,node | rename data.name as "Name" | join type=left Name [search `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/logicalresource/sanresource" "virtual_devices.timemarkEnabled"=true | dedup "virtual_devices.object_id" "virtual_devices.name" | table "virtual_devices.object_id" "virtual_devices.name" | rename "virtual_devices.object_id" as ID, "virtual_devices.name" as Name] | append [search `get_vm_index` sourcetype="violin:fsp:rest"  source="violin://*/concerto/logicalresource/snapshotgroup" "snapshot_groups.timemarkEnabled"=true | dedup snapshot_groups.object_id | table snapshot_groups.name,snapshot_groups.object_id,node | eval Type = "Group" | rename snapshot_groups.name as Name snapshot_groups.object_id as ID] | join type=left node [search `get_vm_index`  sourcetype="violin:fsp:rest"  source="violin://*/concerto/server/config/xml" | dedup System_Serial_Number | table node Server | rename Server as "FSP Name"] | fields - node | sort ID | outputlookup TimeMarkLookup

[VMEM_client_summary]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
dispatch.earliest_time = -2h@m
dispatch.latest_time = now
search = `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/logicalresource/sanresource" virtual_devices.type!=TimeMark "FSP Name"="$fspname$" | dedup virtual_devices.clients{}.name,virtual_devices.object_id | eval "lun_access"= case('virtual_devices.clients{}.access'="ReadOnly","Read Only",'virtual_devices.clients{}.access'="ReadWrite","Read/Write (Exclusive)",'virtual_devices.clients{}.access'="ReadWriteNonExclusive","Read/Write (Shared)") | rename virtual_devices.clients{}.name as "SAN Client" virtual_devices.name as LUNs | stats values(FSP Name) as Controller values(virtual_devices.clients{}.type) as "Client Type" values(lun_access) as "LUN Access" values(virtual_devices.clients{}.isFibreChannelEnabled) as "FC Enabled" values(virtual_devices.clients{}.isiSCSIEnabled) as "iSCSI Enabled" by "SAN Client" | stats values(*) as * by "SAN Client" | sort "SAN Client" | appendcols [search `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/client/sanclient/*" data.type != "Undefined" "FSP Name"="$fspname$" | dedup data.sanclient_id | eval "lun_num" = case(isnotnull('data.ISCSIDevices{}.lun'),'data.ISCSIDevices{}.lun',isnotnull('data.FibreChannelDevices{}.lun'),'data.FibreChannelDevices{}.lun'), "lun_name" = case(isnotnull('data.ISCSIDevices{}.name'),'data.ISCSIDevices{}.name',isnotnull('data.FibreChannelDevices{}.name'),'data.FibreChannelDevices{}.name') | stats values(data.FCPolicy.initiatorWWPNList{}) as "Initiator WWPNs" values(data.ISCSIDevices{}.ISCSITarget.name) as "iSCSI Targets" values(data.ISCSIDevices{}.ISCSITarget.ipAddr) as "iSCSI IP Address" values(data.ipAddress) as "IP Address" values(data.iSCSIPolicy.initiators{}) as "iSCSI Initiator" values(data.persistent_reservation) as "Persistent Reservation" values(data.isclustered) as "Clustered" list(lun_num) as "LUN #" list(lun_name) as "LUNs" by data.name | rename data.name as "SAN Client" | sort "SAN Client"] | appendcols [search `get_vm_index` sourcetype="violin:fsp:rest"  source="violin://*/concerto/monitor/performance/virtualdevice" "FSP Name"="$fspname$"| mvexpand "SAN Client" | dedup "SAN Client" VDevStatistic.VID | eval IOPS = round(('VDevStatistic.riops' + 'VDevStatistic.wiops')/1000,2) | eval Bandwidth_kb = 'VDevStatistic.rkbps' + 'VDevStatistic.wkbps' | eval Bandwidth = `kb_to_mb(Bandwidth_kb)` | eval Latency = 'VDevStatistic.rlat' + 'VDevStatistic.wlat' | bucket _time span=1m | stats sum(IOPS) as "IOPS (k)" sum(Bandwidth) as "Bandwidth (MiB/s)" avg(Latency) as "Latency" by "SAN Client" | sort "SAN Client"]

[VMEM_lun_summary]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
dispatch.earliest_time = -2h@m
dispatch.latest_time = now
search = `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/logicalresource/sanresource" virtual_devices.type!="TimeMark" "FSP Name"="$fspname$" | dedup virtual_devices.guid | rename virtual_devices.name as "LUN Name" | `get_type` | search Type!="Dedup" | stats values(Type) as "LUN Type" values(virtual_devices.sizeMB) as "totalSize" values(virtual_devices.allocatedsizeMB) as "allocatedSize" values(virtual_devices.clients{}.name) as "Clients" values(virtual_devices.virtual_device_id) as "Resource ID" values(virtual_devices.guid) as "GUID" values("FSP Name") as "FSP Name" values(virtual_devices.timemarkEnabled) as "Snapshot Enabled" by "LUN Name" | `mb_to_gb_tb_pb('totalSize')` | rename bytes as "total_size" bytes_unit as "total_size_unit" | `mb_to_gb_tb_pb('allocatedSize')` | rename bytes as "allocated_size" bytes_unit as "allocated_size_unit" | eval "Allocated Size" = allocated_size." ".allocated_size_unit, "Total Size" = total_size." ".total_size_unit  | sort "LUN Name" | appendcols [search `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/monitor/status/virtualdevice" "FSP Name"="$fspname$" | lookup LUN_MappingLookup VID as "VDevStatus.VID" "FSP Name" output "LUN Name" | stats latest(VDevStatus.status) as Status latest(VDevStatus.snapshotEnabled) as "Snapshot Resource Enabled" latest(VDevStatus.cdpEnabled) as "CDP Enabled" latest(VDevStatus.replicationEnabled) as "Replication Enabled" by "LUN Name" | sort "LUN Name"] | appendcols [search `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/logicalresource/snapshotresource/*" "FSP Name"="$fspname$" data.type!=TimeMark data.subType!="SIR" data.subType!="GSM" | stats  latest(data.serial_number) as "Serial" latest(data.snapshot_resource_policy.snapshot_total_size_mb) as "snapshot_total_size_mb" latest(data.snapshot_resource_policy.threshold) as "Snapshot Resource Threshold (%)" latest(data.snapshot_resource_policy.snapshot_usage_percentage) as "Snapshot Resource Used %" latest(data.snapshot_resource_policy.snapshot_used_size) as "snapshot_used_size" latest(data.thin_provisioning.usagePercentage) as "Used %" latest(data.thin_provisioning.usageSize_mb) as "usageSize_mb" latest(data.snapshotGroup.name) as "Snapshot Group" by data.name  | eval "Used %" = round('Used %',2) | `mb_to_gb_tb_pb('snapshot_total_size_mb')` | rename bytes as "snapshot_total_size" bytes_unit as "snapshot_total_size_unit" data.name as "LUN Name" | eval "Snapshot Resource Alloc. Size" = snapshot_total_size." ".snapshot_total_size_unit | `mb_to_gb_tb_pb('usageSize_mb')` | rename bytes as "usageSize" bytes_unit as "usageSize_unit" | eval "Used Size" = usageSize." ".usageSize_unit | `mb_to_gb_tb_pb('snapshot_used_size')` | rename bytes as "snapshotused_size" bytes_unit as "snapshot_used_unit" | eval "Snapshot Resource Used Size" = snapshotused_size." ".snapshot_used_unit | sort "LUN Name"] | join type=left "LUN Name" [search `get_vm_index` sourcetype="violin:fsp:rest"  source="violin://*/concerto/monitor/performance/virtualdevice" "FSP Name"="$fspname$" | lookup LUN_MappingLookup VID as "VDevStatistic.VID" "FSP Name" output "LUN Name" | eval IOPS = round(('VDevStatistic.riops' + 'VDevStatistic.wiops')/1000,2) | eval Bandwidth_kb = 'VDevStatistic.rkbps' + 'VDevStatistic.wkbps' | eval Bandwidth = `kb_to_mb(Bandwidth_kb)` | eval Latency = 'VDevStatistic.rlat' + 'VDevStatistic.wlat' | stats latest(IOPS) as "IOPS (k)" latest(Bandwidth) as "Bandwidth (MiB/s)" latest(Latency) as "Latency" by "LUN Name" | sort "LUN Name" ] | join type=left "LUN Name" [search `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/physicalresource/storagepool/*" "FSP Name"="$fspname$" | dedup "data.physicaldevices{}.ipstor_partition.dynamic_disk_segment{}.device_name" | stats values(data.name) as "Storage Pool" by "data.physicaldevices{}.ipstor_partition.dynamic_disk_segment{}.device_name" | rename "data.physicaldevices{}.ipstor_partition.dynamic_disk_segment{}.device_name" as "LUN Name" ] | join type=left "LUN Name" [ search `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/client/sanclient/*" "FSP Name"="$fspname$" data.type!="Undefined" | dedup data.sanclient_id | eval "lun_num" = case(isnotnull('data.ISCSIDevices{}.lun'),'data.ISCSIDevices{}.lun',isnotnull('data.FibreChannelDevices{}.lun'),'data.FibreChannelDevices{}.lun'), "lun_name" = case(isnotnull('data.ISCSIDevices{}.name'),'data.ISCSIDevices{}.name',isnotnull('data.FibreChannelDevices{}.name'),'data.FibreChannelDevices{}.name') | stats list(lun_num) as "LUN #"  list(lun_name) as "LUN Name" by data.name | eval lun_fields_num = mvzip('LUN #','LUN Name') | mvexpand lun_fields_num | eval "LUN Name" = mvindex(split(lun_fields_num,","),1), "LUN #" = mvindex(split(lun_fields_num,","),0) | stats list(LUN #) as "LUN #" list(data.name) as "Clients" by "LUN Name" | sort "LUN Name"] | join type=left "LUN Name"  [search `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/client/sanclient/*" "FSP Name"="$fspname$" data.type!="Undefined" | dedup data.sanclient_id | eval "lun_access" = case(isnotnull('data.ISCSIDevices{}.access'),'data.ISCSIDevices{}.access',isnotnull('data.FibreChannelDevices{}.access'),'data.FibreChannelDevices{}.access'), "lun_name" = case(isnotnull('data.ISCSIDevices{}.name'),'data.ISCSIDevices{}.name',isnotnull('data.FibreChannelDevices{}.name'),'data.FibreChannelDevices{}.name') | stats list(lun_name) as "LUN Name" list(lun_access) as "LUN Access" by data.name | eval lun_fields_access =  mvzip('LUN Name','LUN Access') | mvexpand lun_fields_access | eval "LUN Name" = mvindex(split(lun_fields_access,","),0), "LUN Access" = mvindex(split(lun_fields_access,","),1) | stats list(LUN Access) as "LUN Access" list(data.name) as "Clients" by "LUN Name" | sort "LUN Name"]

[VMEM_storagepool_summary]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
dispatch.earliest_time = -2h@m
dispatch.latest_time = now
search = `get_vm_index` sourcetype="violin:fsp:rest"  source="violin://*/concerto/physicalresource/storagepool/*" "FSP Name"="$fspname$" | dedup data.object_id  | eval freeSizeMB = 'data.size_mb' - 'data.usedsize_mb', "Allocated %" = if('data.size_mb'==0,0,round(('data.usedsize_mb'/'data.size_mb')*100,1)) | stats latest(data.name) as "Name" latest(FSP Name) as Controller latest(data.total_physicaldevices) as "Physical Devices" latest(data.size_mb) as "Total Size (MB)" latest(data.usedsize_mb) as "Allocated Size (MB)" latest(freeSizeMB) as "Free Size (MB)" latest("Allocated %") as "Allocated %" by data.storage_pool_id | rename data.storage_pool_id as "Pool ID" | `mb_to_gb_tb_pb('Total Size (MB)')` | rename bytes as "total_size" bytes_unit as "total_size_unit" | eval "Total Size" = total_size." ".total_size_unit | `mb_to_gb_tb_pb('Allocated Size (MB)')` | rename bytes as "allocated_size" bytes_unit as "allocated_size_unit" | eval "Allocated Size" = allocated_size." ".allocated_size_unit | `mb_to_gb_tb_pb('Free Size (MB)')` | rename bytes as "free_size" bytes_unit as "free_size_unit"  | eval  "Free Size" = free_size." ".free_size_unit | appendcols [search `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/server/config/xml" "FSP Name"="$fspname$" | eval storage_attribute= case('StorageAttribute'="PrimaryStorage","Primary Storage",'StorageAttribute'="RemoteStorage","Remote Storage") | stats latest(storage_attribute) as "Storage Attribute" by StoragepoolID | rename StoragepoolID as "Pool ID"] | fields Name Controller "Total Size" "Allocated Size" "Free Size" "Allocated %" "Physical Devices" "Pool ID" "Storage Attribute"

[VMEM_snapshot_summary]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = 0 0 * * *
dispatch.earliest_time = -2h@m
dispatch.latest_time = now
search = `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/logicalresource/timemark/*" "FSP Name"="$fspname$" timemark_type=LUN | dedup timemark_id timemarks.timestamp | rename timemarks.timestamp as "Date / Time" timemarks.totalUsedBlocks as "Used Size" timemarks.priority as "Priority" timemarks.quiescent as "Quiescent"  timemarks.comment as "Comment" timemarks.timeViewData as "Time View Data" timemarks.status as "status" | append [search `get_vm_index` sourcetype="violin:fsp:rest" source="violin://*/concerto/logicalresource/timemark/*" "FSP Name"="$fspname$" timemark_type = Group | dedup timemark_id data.timemarks.timemarks{}.timestamp | rename data.timemarks.timemarks{}.timestamp as "Date / Time" timemarks.totalUsedBlocks as "Used Size" data.timemarks.timemarks{}.priority as "Priority" data.timemarks.timemarks{}.quiescent as "Quiescent" data.timemarks.timemarks{}.comment as "Comment" timemarks.timeViewData as "Time View Data" timemarks.status as "status"] | eval Valid = if('status' == "valid","true","false") | search timemark_id="$tmid$" | head 5 | table "Date / Time" "Used Size" "Comment" "Priority" "Time View Data" Quiescent Valid | sort "Date / Time"