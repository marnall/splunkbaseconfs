[activity_types_collection_lookup]
external_type = kvstore
collection = activity_types_collection
fields_list = _key, activity_type, activity_action

[agents_list]
collection = agents
external_type = kvstore
fields_list = _key,configuration_auto_mitigation_actions,configuration_learning_mode,configuration_mitigation_mode,configuration_mitigation_mode_suspicious,configuration_research_data,console,cpu_cores,cpu_count,cpu_id,cpu_mhz,dest_name,domain,enabled,external_ip,group_id,group_ip,id,interface,ip,last_logged_in_user,mac,machine_type,mem,os,os_arch,serial,threat_count,time,time_created,time_last_active,time_last_logged_in_user,time_registered,time_updated,user,user_actions_needed,user_id,vendor_product,version,status

[activities_list]
batch_index_query = 0
case_sensitive_match = 1
filename = activities_list.csv

[mitigation_status]
batch_index_query = 0
case_sensitive_match = 1
filename = mitigation_status.csv

[console_as_host]
DEST_KEY = MetaData:Host
FORMAT = host::$1
REGEX = \"console\":\s*\"([^\"]+)\"
WRITE_META = 1

