
[expose:sentinelone_TA_settings]
pattern = sentinelone_TA_settings
methods = POST, GET

[expose:sentinelone_TA_settings_specified]
pattern = sentinelone_TA_settings/*
methods = POST, GET, DELETE

[expose:sentinelone_TA_sentinelone_api]
pattern = sentinelone_TA_sentinelone_api
methods = POST, GET

[expose:sentinelone_TA_sentinelone_api_specified]
pattern = sentinelone_TA_sentinelone_api/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
