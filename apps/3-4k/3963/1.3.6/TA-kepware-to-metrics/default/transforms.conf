[metric_value]
FORMAT = _value::$1
REGEX = Value="(\S+?)"
WRITE_META = 1

[kepware_path]
FORMAT = kepware_path::"$1"
REGEX = Tag="(.+?)"
WRITE_META = 1

[quality]
FORMAT = quality::"$1"
REGEX = Quality="(.+?)"
WRITE_META = 1

[metric_name]
FORMAT = metric_name::"$1"
REGEX = [A-z0-9_()]+\.([A-z0-9_()\s]*?)\"\sValue
WRITE_META = 1

[asset]
FORMAT = asset::"$1"
REGEX = Tag\=\"([A-z0-9.\s*()_]*)\.
WRITE_META = 1

[metadata] 
FORMAT = metadata::“$1” 
REGEX = Quality=".*"\s*(.*)
WRITE_META = 1
