[pci:wireless]
DATETIME_CONFIG=CURRENT
TRUNCATE=55
SHOULD_LINEMERGE = false

# Some PCI misc
EVAL-message = if(action="blocked", "This host does not have wireless enabled.", "Wireless has been enabled on the server. This maybe a violation of PCI compliance. ")
EVAL-pci_dss_version = "3.2.1"
EVAL-pci_dss_requirement = "11.1.a,11.1.b,11.1.c,11.1.d,11.1.1,11.1.2.a,11.1.2.b"
EVAL-pci_testing_procedure ="Verify that the methodology is adequate to detect and identify any unauthorized wireless access points, including at least the following: 1) WLAN cards inserted into system components 2) Portable wireless devices connected to system components (for example, by USB, etc.)"

# cim misc
EVAL-direction = if(action="allowed", "outbound","unknown")
EVAL-status = if(action="allowed", "started", "stopped")
EVAL-vendor_severity= if(action="allowed", "warning", "informational")
EVAL-vendor = "Splunk"
EVAL-product = "HIDS Wireless PCI Check"
EVAL-vendor_product = "Splunk HIDS Wireless PCI Check"
EVAL-signature = "1.02"
EVAL-protocol = "wifi"
EVAL-wifi = "802.11"
EVAL-ids_type= "host"
EVAL-type= "hids"

# cim dvc, dest etc. 
FIELDALIAS-host_to_dvc = host AS dvc
FIELDALIAS-host_to_dest_dvc = host AS dest_dvc
FIELDALIAS-host_to_src_dvc = host AS src_dvc
FIELDALIAS-host_to_dest = host AS dest
FIELDALIAS-host_to_src = host AS src
FIELDALIAS-host_to_dest_dns = host as dest_dns
FIELDALIAS-host_to_src_dns = host as src_dns

