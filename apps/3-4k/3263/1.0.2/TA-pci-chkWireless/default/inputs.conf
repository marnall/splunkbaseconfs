# inputs.conf
# Please make sure to adjust interval and index to your needs.

[script://$SPLUNK_HOME/etc/apps/TA-pci-chkWireless/bin/chkWireless.sh]
interval=60
index=main
sourcetype=pci:wireless
description=HIDS detection of wireless enabled on Linux hosts 
source=wireless
start_by_shell=false

[script://$SPLUNK_HOME\etc\apps\TA-pci-chkWireless\bin\chkWireless.bat]
index=main
interval=60
sourcetype=pci:wireless
source=wireless
disabled=false

