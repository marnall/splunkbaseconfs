[requests_prefix]
description = Unified prefix to simplify differentiating request related fields from standard splunk fields
definition = requests
iseval = 0

[requests_indexes]
description = In case end users want to change the index. This should change it everywhere its referenced.
definition = index=`requests_prefix`
iseval = 0

[requests_sources]
description = In case end users want to change the source. This should change it everywhere its referenced.
definition = source=`requests_prefix`
iseval = 0

[requests_sourcetypes_datasources]
description = In case end users want to change the sourcetype. This should change it everywhere its referenced.
definition = sourcetype=`requests_prefix`_datasources
iseval = 0

[requests_sourcetypes_users]
description = In case end users want to change the sourcetype. This should change it everywhere its referenced.
definition = sourcetype=`requests_prefix`_users
iseval = 0

[requests_events(1)]
description = Fetches raw request events
args = type
definition = `requests_indexes` `requests_sources` `requests_sourcetypes_$type$`
iseval = 0

[requests_events_display(1)]
description = Pretty prints consolidated requests by unique id
args = type
definition = `requests_events($type$)`\
 `requests_consolidate_results`\
 `requests_resolve_updatetime`\
 `requests_prettyprint_time`
iseval = 0

[requests_getuser(1)]
description = Fetches current user id info and assigns to role
args = role
definition = rest /services/authentication/current-context\
 | eval `requests_prefix`_$role$ = realname . " (" . username . " - " . email . ")"\
 | fields + `requests_prefix`_$role$
iseval = 0

[requests_consolidate_results]
description = Collapses request activities to show current status by unique id
definition = | stats earliest(_time) AS `requests_prefix`_created_time, latest(_time) AS `requests_prefix`_updated_time, latest(`requests_prefix`_*) AS `requests_prefix`_* by `requests_prefix`_id\
 | sort - `requests_prefix`_id
iseval = 0

[requests_resolve_updatetime]
description = Logic to determine if a request has been updated or not
definition = | eval `requests_prefix`_updated_time = if( `requests_prefix`_updated_time == `requests_prefix`_created_time , '' , `requests_prefix`_updated_time )
iseval = 0

[requests_prettyprint_time]
description = Make epoch times pretty
definition = | convert ctime(`requests_prefix`_*_time)
iseval = 0

[requests_prettyprint_fields]
description = Chop prefix off fields
definition = | rename `requests_prefix`_* AS *
iseval = 0

[requests_assign(2)]
description = Foreach doesn't work in a form so this is another way to eliminate redundant code
args = name, value
definition = | eval `requests_prefix`_$name$ = "$value$"
iseval = 0