[WinEventremoveRepeatedMessage1]
# This transform removes the text blob that is not needed for CIM for the following windows event codes:
# 4624
# 4625
# 4626
# 4634
# 4688
# 4769
#REGEX = (?m)^((.*+[\v])+)(?=(?=This event is generated)|(?=The subject fields indicate)|(?=Token Elevation Type indicates))
REGEX = (?m)^((.*+[\v])+)This event is generated
DEST_KEY = _raw
FORMAT = $1

