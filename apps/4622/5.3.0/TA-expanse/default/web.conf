
[expose:TA_expanse_expanse]
pattern = TA_expanse_expanse
methods = POST, GET

[expose:TA_expanse_expanse_specified]
pattern = TA_expanse_expanse/*
methods = POST, GET, DELETE

[expose:TA_expanse_settings]
pattern = TA_expanse_settings
methods = POST, GET

[expose:TA_expanse_settings_specified]
pattern = TA_expanse_settings/*
methods = POST, GET, DELETE

[expose:TA_expanse_account]
pattern = TA_expanse_account
methods = POST, GET

[expose:TA_expanse_account_specified]
pattern = TA_expanse_account/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
