[Expanse]
TRUNCATE = 25000
DATETIME_CONFIG = NONE
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
LOOKUP-cidr_match_fun = xpanse_iprange_lookup cidr AS dest_ip OUTPUTNEW tags AS ip_range_tags cidr AS cidr last_ip AS endAddress range_id AS range_id first_ip AS startAddress

[source::...ta-expanse*.log*]
sourcetype = ta:expanse:log

