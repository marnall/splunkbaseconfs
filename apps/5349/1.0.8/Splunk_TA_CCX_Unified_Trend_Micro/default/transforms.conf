##Trend Micro Unified##

####Custom Trend Micro Cloudone####

[ccx_trendmicro_cloudone_extraction]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = (?<=\")(?:(?!(?: ))([^\"\\]+))(?:\\){0,4}(?!\\?\"\s?:\s?\\?\"?(?:\[|\{))\"?\s?\:\s?(?:\\){0,4}\"?([^\"]+)(?<=[^\\,])
SOURCE_KEY = json_message_extract

[ccx_trendmicro_cloudone_ossec_extraction]
CLEAN_KEYS = 0
REGEX = \sfrom\s(?<src>(?:\d{1,3}\.){3}\d{1,3})(?:\s\w+\s(?<src_port>\d+))?
SOURCE_KEY = OSSEC_FullLog

[ccx_trendmicro_cloudone_target_name_extraction]
CLEAN_KEYS = 0
REGEX = (?:(?<dest>(?:\d{1,3}\.){1,3}\d{1,3})\s\((?<dvc>[^\)]+)\)\s)|.+user\/(?<user>.+)
SOURCE_KEY = TargetName

####END Trend Micro Cloudone custom####
#######################################

[trendmicro:unified-cefHeaders]
REGEX = CEF:(\s)?(?<cef_version>\d+)\|(?<cef_vendor>[^|]*)\|(?<cef_product>[^|]*)\|(?<cef_prodversion>[^|]*)\|(?<cef_ruleid>[^|]*)\|(?<cef_rulename>[^|]*)\|(?<cef_severity>[^|]*)

[trendmicro:unified-cefKeys]
REGEX = (?:_+)?([\w.:\[\]]+)=(.*?(?=(?:\s[\w.:\[\]]+=|$)))
MV_ADD = true
FORMAT = $1::$2

[trendmicro:apexone-tmcefKeys]
REGEX = c\w\d+Label=([\s\w\d\.]+)\sc\w\d+=([\w\d\s\.\/\-]+)(?=\s[\w\d]+=)
MV_ADD = true
FORMAT = $1::$2

[trendmicro:apexone-cef]
DELIMS = "|"
FIELDS = "cef_header","vendor","vendor_mgmt_product","vendor_mgmt_product_version","eventid","category_detail","field7","vendor_msg"

[trendmicro:apexone:attack_discovery_detections_extended]
REGEX = \"(\w+)\"\s:\s\"?((?:(?!\"?,\\n|\"\\n).)*)
MV_ADD = 1
FORMAT = $1::$2

[trendmicro:deepsecurity-icmp]
REGEX = cs4=(?<icmp_type>\d+)\s(?<icmp_code>\d+)

[trendmicro:deepsecurity-cefcustom]
REGEX = \S+=([^=]*)\s+(?:\S+Label)=([^=]+)(?=(?:(?:\s\w+=)|$))
FORMAT = $2::$1
KEEP_EMPTY_VALS=True

[trendmicro:cloud:control_manager:content_security_xuser_xrecipient]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = "(.*?),?\,\"\"|(?<x_username>[^"]*)"<(?:[^\"<]+\<)?(?<x_recipient>((?!>?\>|>?\",).)*)
SOURCE_KEY = dhost

[trendmicro:apexone:spyware_extended_file_name]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = fname=[^=]+\\\\(?<file_name>[^\s\)]+)(?=(.?\s\w+=)|$)

[trendmicro:cloud:control_manager:sandbox_detection_xusername_xuseraccount]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = "(.*?),?\,\"\"|(?<x_username>[^"]*)"<(?:[^\"<]+\<)?(?<x_useraccount>((?!>?\>|>?\",).)*)
SOURCE_KEY = destinationServiceName

