[Necromancer: Splunkd Found Dead]
action.email = 1
action.email.include.results_link = 0
action.email.include.view_link = 0
action.email.inline = 1
action.email.message.alert = $name$ - Necromancer has completed resurrection ritual. Please review and verify.
action.email.sendresults = 1
action.email.subject.alert = $name$
action.email.to = YOUR.EMAIL.HERE@EMAIL.COM
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */30 * * * *
description = Necromancer has found that Splunkd was found dead.
dispatch.earliest_time = -31m@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = splunk_ta_necromancer
request.ui_dispatch_view = search
search = index=necro status="'Splunkd was found dead.'" host=* result=* action=* summon=*\
| rename summon as "Time Summoned", status as Status,host as Host, action as Action, result as Result\
| table Host,"Time Summoned",Status,Action,Result
