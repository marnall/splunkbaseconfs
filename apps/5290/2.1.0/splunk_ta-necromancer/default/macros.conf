[ritual_performed]
definition = index=necro result!="'Heartbeat continues for Splunkd.'" host=*\
| stats count by host, result\
| dedup host\
| table host, result
iseval = 0

[top10_ritual_performed]
definition = index=necro status="'Splunkd was found dead.'" host=*\
| top host limit=10\
| stats count by host
iseval = 0

[ritual_events]
definition = index=necro summon=* status="'Splunkd was found dead.'" action=* result=*\
| table host,summon,status,action,result
iseval = 0

[ritual_count]
definition = index=necro status="'Splunkd was found dead.'"\
| stats count(status)
iseval = 0

[ritual_events_info]
definition = index=necro summon=* status="'Splunkd was found dead.'" action=* result=*\
| table host,summon,status,action,result
iseval = 0

[ritual_performed_info]
definition = index=necro summon=* result!="'Heartbeat continues for Splunkd.'" host=* status=* action=*\
| stats count by host,summon,status,action,result
iseval = 0

[top10_ritual_performed_info]
definition = index=necro summon=* result!="'Heartbeat continues for Splunkd.'" host=* status=* action=*\
| stats count by host,summon,status,action,result\
| top host limit=10
iseval = 0
