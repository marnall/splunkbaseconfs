[stormshield]
NO_BINARY_CHECK=true
CHARSET=UTF-8
MAX_TIMESTAMP_LOOKAHEAD=57
TIME_PREFIX=(?:.*?=){2}
disabled=false
FIELDALIAS-storm = fw AS dvc dst AS dest dstif AS dest_interface dstport AS dest_port ipproto AS transport ruleid AS rule srcif AS src_interface srcport as src_port dstportname AS app action AS vendor_action result AS status op AS http_method sent AS bytes_out rcvd AS bytes_in arg AS uri_query cat_site AS category address AS dest
# This will ovveride the action field (it is aliassed to vendor_action). Take care if you have reports based on the vendor values
LOOKUP-actions = stormshield_actions vendor_action OUTPUT action
LOOKUP-vendor = stormshield_product sourcetype OUTPUT vendor_product
LOOKUP-auth = stormshield_authentication msg OUTPUT action
EVAL-url = proto + "://" + dstname + arg
# Note: port not added 
#ipv AS protocol
category = Network & Security
