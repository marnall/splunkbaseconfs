[storms_network]
search = sourcetype=stormshield logtype=connection 

[storms_web]
search = sourcetype=stormshield logtype=web

[storms_virus]
search = sourcetype=stormshield virus=*

[storms_ids]
search = sourcetype=stormshield class=protocol
#Previously was: logtype=alarm
# Note: some other class value might match IDS alarms. If you have examples, feel free to send them to me.

[storms_auth]
search = sourcetype=stormshield  (logtype=server msg="logged in") OR msg="User*" 

[storms_mail]
search = sourcetype=stormshield logtype=smtp

