[predict_health_score(4)]
args = kpiid,model_kpiid,kpi_list,model_type
definition = index="itsi_summary" indexed_itsi_service_id::$kpiid$ OR\
    [| getservice service=$kpiid$\
    | rex field=services_depends_on "kpis=(?<kpiid>.*)"\
    | fields kpiid\
    | mvexpand kpiid\
    | eval kpiid=if(like(kpiid, "%,%"), split(kpiid, ","), kpiid)\
    | mvexpand kpiid]\
| search kpiid IN ($kpi_list$)\
| timechart limit=0 span=5m avg(alert_value) as value_avg min(alert_value) as value_min max(alert_value) as value_max stdev(alert_value) as value_std avg(alert_level) as level_avg max(alert_level) as level_max avg(eval(if(is_service_max_severity_event=1, alert_value, null))) as value_ms_avg min(eval(if(is_service_max_severity_event=1, alert_value, null))) as value_ms_min max(eval(if(is_service_max_severity_event=1, alert_value, null))) as value_ms_max by kpiid\
| rename "value_avg: SHKPI-$kpiid$" as now_avg_hs, "value_min: SHKPI-kpiid" as now_worst_hs, "level_avg: SHKPI-$kpiid$" as now_avg_hsl, "level_max: SHKPI-$kpiid$" as now_worst_hsl\
| search now_avg_hs=*\
| eval now_avg_hsl=case(now_avg_hsl>=5, "Critical", now_avg_hsl>=3, "Medium", true(), "Normal"), now_worst_hsl=case(now_worst_hsl>=5, "Critical", now_worst_hsl>=3, "Medium", true(), "Normal")\
| eval this_date_day = strftime(_time, "%w")."_", this_date_hour = strftime(_time, "%H")."_"\
| filldown\
| streamstats window=6 current=f first("value_avg: *") as last30mkpi_*, first("now_avg_hs") as last30m_avg_hs, first("now_worst_hs") as last30m_worst_hs, first("now_avg_hsl") as last30m_avg_hsl, first("now_worst_hsl") as last30m_worst_hsl\
| apply "ss_$model_kpiid$"\
| apply $model_type$_$model_kpiid$\
| eval "predicted(next30m_avg_hs)"=case('predicted(next30m_avg_hs)'>100,100,'predicted(next30m_avg_hs)'<0,0,true(),'predicted(next30m_avg_hs)')\
| rename "predicted(next30m_avg_hs)" as predicted_hs
iseval = 0
