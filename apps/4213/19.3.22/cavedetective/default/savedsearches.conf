#------------------------------------------------------------------------------#
# Dependencies                                                                 #
#------------------------------------------------------------------------------#
#
#-- Collection Pruning -------------------------------------------------------
[cave_dt_kvstore_prune]
 # General commonly changed and high-level properties
 disabled = false
 description = See the cave_dt_core CSV lookup file for details
 # Search scheduling and properties related to timing
 enableSched = true
 cron_schedule = 44 * * * *
 realtime_schedule = false
 schedule_priority = default
 schedule_window = 5
#dispatch.index_earliest =
#dispatch.index_latest =
 dispatch.earliest_time = 0
 dispatch.latest_time = now
 # Which actions to execute with the remaining results
 action.summary_index = false
 action.summary_index._name = cave_io
 # Performance tuning and other search result limitations
#dispatch.max_count = 500000
 dispatch.ttl = 1p
 # Search query in Splunk Processing Language (SPL)
 search = | makeresults | eval cave_makeresults_tmp=0 | where isnull(cave_makeresults_tmp)\
| `c("--A-- Simple hack to initiate record set to append other generating statements --A--")`\
\
| `c("--V-- Execute retention queries for specific collections from specific applications\
            Normalize relevant fields as part of constructing the final events --V--")`\
| append [ makeresults | eval cave_app="cavedetective", cave_kvstore="cave_dt_opendns_cache",    retention_policy="enrichrest_opendns/enrichrest_opendns_retain_bad",           retention_field="fetched", extra_field="stance", extra_value="bad"     | fields - _time ]\
| append [ makeresults | eval cave_app="cavedetective", cave_kvstore="cave_dt_opendns_cache",    retention_policy="enrichrest_opendns/enrichrest_opendns_retain_neutral",       retention_field="fetched", extra_field="stance", extra_value="neutral" | fields - _time ]\
| append [ makeresults | eval cave_app="cavedetective", cave_kvstore="cave_dt_opendns_cache",    retention_policy="enrichrest_opendns/enrichrest_opendns_retain_good",          retention_field="fetched", extra_field="stance", extra_value="good"    | fields - _time ]\
| append [ makeresults | eval cave_app="cavedetective", cave_kvstore="cave_dt_virustotal_cache", retention_policy="enrichrest_virustotal/enrichrest_virustotal_retain_bad",     retention_field="fetched", extra_field="stance", extra_value="bad"     | fields - _time ]\
| append [ makeresults | eval cave_app="cavedetective", cave_kvstore="cave_dt_virustotal_cache", retention_policy="enrichrest_virustotal/enrichrest_virustotal_retain_neutral", retention_field="fetched", extra_field="stance", extra_value="neutral" | fields - _time ]\
| append [ makeresults | eval cave_app="cavedetective", cave_kvstore="cave_dt_virustotal_cache", retention_policy="enrichrest_virustotal/enrichrest_virustotal_retain_good",    retention_field="fetched", extra_field="stance", extra_value="good"    | fields - _time ]\
| cavestores method="prune" appname="cave_app" kvstore="cave_kvstore" retention_policy="retention_policy" retention_field="retention_field" extra_field="extra_field" extra_value="extra_value"\
| rename output AS execution_output,runtime AS execution_duration,extra_value AS stance\
| eval execution_status=if(match("ERROR\:\s",execution_output),"failure","success")\
| eval count_pruned=if(!isnull(count_before) AND !isnull(count_after),count_before-count_after,null())\
\
| `c("--V-- Finalize the output defining essential fields and forcing order with table --V--")`\
| eval _time=relative_time(now(),"-0h@h"), cave_time=floor(time())\
| table _time,cave_time,cave_kvstore,cave_app,count_before,count_after,count_pruned,execution_status,execution_duration,retention_maxage,stance
