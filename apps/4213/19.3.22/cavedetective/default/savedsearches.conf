#------------------------------------------------------------------------------#
# OpenDNS Detective                                                            #
#------------------------------------------------------------------------------#
#
#-- Quick/Smart Method -------------------------------------------------------
[opendns_quick_example]
 # General commonly changed and high-level properties
 description = See the cave_dt_core CSV lookup file for details
 # Search query in Splunk Processing Language (SPL)
 search = | inputlookup cave_dt_examples WHERE type="domain"\
| enrichrest source="opendns" method="quick" target="value"\
| table value,opendns_output,fetched,method,target,stance,opendns_dsc_*\
| eval fetched=tostring(now()-fetched,"duration")
[opendns_smart_example]
 # General commonly changed and high-level properties
 description = See the cave_dt_core CSV lookup file for details
 # Search query in Splunk Processing Language (SPL)
