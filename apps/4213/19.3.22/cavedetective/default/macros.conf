#------------------------------------------------------------------------------#
# Utilities                                                                    #
#------------------------------------------------------------------------------#
#
#-- Comments -----------------------------------------------------------------
[c(1)]
 description = Used for making comments in the Splunk Processing Language
 args = comment
 definition = "eval cave_tmp_comment=0 | fields - cave_tmp_comment"
 iseval = true
[r(1)]
 description = Used for return the value that was passed in arguments
 args = return
 definition = $return$
 iseval = false
#-----------------------------------------------------------------------------
#
#-- Dashboard Filters --------------------------------------------------------
[cave_filter_timeshow(3)]
 description = Dashboard filters based on specified time values
 args = timefield,earliest,latest
 definition = eval cave_tmp_timeshow_earliest="$earliest$", cave_tmp_timeshow_latest="$latest$"\
| foreach cave_tmp_timeshow_earliest,cave_tmp_timeshow_latest\
    [ eval <<FIELD>>=case(isnum(<<FIELD>>),round(<<FIELD>>,0),<<FIELD>>=="now",round(now(),0),true(),relative_time(now(),<<FIELD>>)) ]\
| where $timefield$>=cave_tmp_timeshow_earliest AND $timefield$<cave_tmp_timeshow_latest\
| fields - cave_tmp_timeshow_earliest,cave_tmp_timeshow_latest
#-----------------------------------------------------------------------------
#
#------------------------------------------------------------------------------#


#------------------------------------------------------------------------------#
# VirusTotal Detective                                                         #
#------------------------------------------------------------------------------#
#
#-- Extract Scans ------------------------------------------------------------
[virustotal_scans(2)]
 description = Extracts various VirusTotal scans into multi-value fields
 args = field,prefix
 definition = rex max_match=10000 field=$field$ "\"(?P<$prefix$_engine>.+?)\"\:\s+\{(?P<temp_extract_engine>[^\}]+)\}"\
| rex max_match=10000 field=temp_extract_engine "\"version\"\:\s+\"?(?P<$prefix$_version>.+?)\"?(\,|\}|$)"\
| rex max_match=10000 field=temp_extract_engine "\"detected\"\:\s+\"?(?P<$prefix$_detected>.+?)\"?(\,|\}|$)"\
| rex max_match=10000 field=temp_extract_engine "\"result\"\:\s+\"?(?P<$prefix$_result>.+?)\"?(\,|\}|$)"\
| rex max_match=10000 field=temp_extract_engine "\"update\"\:\s+\"?(?P<$prefix$_update>.+?)\"?(\,|\}|$)"\
| fields - temp_extract_engine
 iseval = false
