# Splunk app configuration file

[install]
is_configured = 0

[package]
id = SA-Resilient
check_for_updates = 1

[ui]
is_visible = 0
label = Resilient Incident Creation from Splunk ES
# Points to a file in:
# $SPLUNK_HOME/etc/apps/<SPLUNK_APP_NAME>/default/data/ui/views/*
# It does not need the extension of the file name provided
setup_view = setup_page_dashboard

[triggers]
reload.sa_resilient = simple

[shclustering]
deployer_push_mode = full

[launcher]
author = Resilient, an IBM Company
description = Create incidents in Resilient from Splunk ES notable events.
version = 1.3.2
