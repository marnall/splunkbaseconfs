[Error_Codes]
batch_index_query = 0
case_sensitive_match = 1
filename = errorcode.csv

 

[Sample_Data]
batch_index_query = 0
case_sensitive_match = 1
filename = sample.csv

 

[domain_trans]
FORMAT = Domain::$1
REGEX = ^\+TO\:.*@(.*)\>
SOURCE_KEY = cs_uri_query

 

[Recipent_trans]
FORMAT = Email_Recepient::$1
REGEX = ^\+TO\:.*<(.*)\@
SOURCE_KEY = cs_uri_query

 

[ERROR_trans]
FORMAT = Error::$1
REGEX = ^(\d{3}?)(?=\+|\-\d\.\d\.\d\+)
SOURCE_KEY = cs_uri_query

 

[Notification_bounced]
REGEX = Subject: Delivery Status Notification \((?<Notification>.*?)(?=\))

 

[Recep_bounced]
REGEX = Delivery to the following recipients failed.\s+(?<Recep_mail>[^\s]+)