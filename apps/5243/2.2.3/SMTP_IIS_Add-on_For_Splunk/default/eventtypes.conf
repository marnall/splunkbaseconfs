[smtp_ip]
search = (c_ip=192.* OR c_ip=172.* OR c_ip=10.*)

[smtp]
search = sourcetype= smtp:iis:w3c

[error_code_range]
search = Error > 399 AND Error < 600

[domain]
search = Domain!="scanlytics.in" AND Domain!="avotrix.com"

[type]
search = cs_method=MAIL OR cs_method=RCPT

[RCPT]
search = cs_method=RCPT

[Bad_mail]
search = sourcetype="ms:iis:Badmail" report_type="delivery-status" Notification="Failure"
