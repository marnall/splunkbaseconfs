[loki_index]
definition = index=*
iseval = 0

[scan_date]
definition = rex field=source  "loki_\S*_(?<scan_date>\d{4}-\d{2}-\d{2})"
iseval = 0

[file_time-transformation]
definition = eval file_access_time_epoc=strptime(file_access_time,"%a %b %d %H:%M:%S %Y" ) | eval file_creation_time_epoc=strptime(file_creation_time,"%a %b %d %H:%M:%S %Y" ) | eval file_modify_time_epoc=strptime(file_modify_time,"%a %b %d %H:%M:%S %Y" )|eval file_access_time=strftime(file_access_time_epoc, "%d/%m/%y %H:%M:%S")|eval file_creation_time=strftime(file_creation_time_epoc, "%d/%m/%y %H:%M:%S")|eval file_modify_time=strftime(file_modify_time_epoc, "%d/%m/%y %H:%M:%S")
iseval = 0
