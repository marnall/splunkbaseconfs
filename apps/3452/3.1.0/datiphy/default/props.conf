[ddna]
BREAK_ONLY_BEFORE = ^{
DATETIME_CONFIG = 
FIELDALIAS-DDNA{} = "ARUL{}" AS "ARUL.." "CMDS{}" AS "CMDS.." "COLS{}" AS "COLS.." "CRUL{}.NAME" AS CRUL_NAME "CRUL{}.SIGN{}" AS CRUL_SIGN "DBLS{}" AS "DBLS.." "OBJS{}.TABS{}" AS "OBJS_TABS"
