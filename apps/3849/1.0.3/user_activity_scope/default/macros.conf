
[dashboards]
definition = index=_internal sourcetype=splunk_web_access [| rest /services/authentication/current-context | where NOT username="splunk-system-user" | fields username|rename username as user|format]\
 | rex field=uri_path ".*/(?<pageid>[^/]*)$"|search pageid!="home" pageid!="alerts"\
 | join pageid [|rest /servicesNS/-/-/data/ui/views \
 | search isDashboard=1 isVisible=1 eai:appName!="user_activity_scope"|rename "eai:appName" as appName|table title description label appName|rename title as pageid]\
 |stats count as timesViewed latest(_time) as lastViewed values(description) as description values(label) as title by user pageid appName
iseval = 0

[mostrecentdashboards]
definition = | sort - lastViewed\
| head 5\
| eval lastViewed=strftime(lastViewed,"%m/%d/%Y %H:%M:%S") \
| fields appName title description pageid lastViewed timesViewed
iseval = 0

[searchhistory]
definition = index=_audit action="search" savedsearch_name="" [| rest /services/authentication/current-context | where NOT username="splunk-system-user" | fields username|rename username as user|format]  |where isnotnull(search) | rex field=_raw "search='(?<full_search>.*?)'," | rex field=full_search "\|?\s*(?<primary_command>[^\s\|]+)"|search primary_command=search | table timestamp search_id full_search primary_command apiStartTime apiEndTime|eval apistart=if(apiStartTime="'ZERO_TIME'" OR apiStartTime="'MIN_TIME'" OR apiStartTime="'Wed Dec 31 18:00:00 1969'",0,strptime(apiStartTime,"'%c'"))|eval apiend=if(apiEndTime="'ZERO_TIME'" OR apiEndTime="'Wed Dec 31 18:00:00 1969'",strptime(timestamp,"%m-%d-%Y %H:%M:%S.%3N"),strptime(apiEndTime,"'%c'"))
iseval = 0

[topdashboards]
definition = |sort - user timesViewed |streamstats count as rank by user|search rank<21|eval lastViewed=strftime(lastViewed,"%m/%d/%Y %H:%M:%S")|fields appName title description pageid lastViewed timesViewed
iseval = 0
