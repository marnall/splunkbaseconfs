[pf_eip_log]
BREAK_ONLY_BEFORE = [DEBUG|WARN|INFO|ERROR|FATAL]
EXTRACT-aob_gen_pf_eip_log_stanza_1 = (?P<level>.*)   (?P<time>.*)   \[issueStatusMessage\]  \[OID:(?P<oid>1631|1629|1630)\]\[TxID:(?P<txn_id>.*)\] (?P<stage_action>.*) stage: \[(?P<route_name>.*)\]\[(?P<stage_name>[\s\S]*)\]\[(?P<stage_type>\w*)\][\s\r\n\t]*$
EXTRACT-aob_gen_pf_eip_log_stanza_2 = 14:11:(?P<field_1>31|01|16)\.(?P<field_2>\d*)   \[afterExecute\]  ThreadPool "\[\]\[Route 1\]\[Any\]\[\]\[\]_pool" - \[Threads: (?P<number_1>\d+|\d+\.\d+|0[xX][a-zA-Z0-9]+) \/ 4\]\[Queue: (?P<number_2>\d+|\d+\.\d+|0[xX][a-zA-Z0-9]+) \/ unbounded\][\s\r\n\t]*$
EXTRACT-aob_gen_pf_eip_log_stanza_3 = 14:11:(?P<field_1>16|31|01)\.(?P<field_2>812|814|815|813)   \[issueStatusMessage\]  \[OID:(?P<field_3>1630|1631|1629)\]\[TxID:(?P<field_4>1630_1630|1631_1631|1629_1629)\] (?P<field_5>Entered|Exited) stage: \[Route 1\]\[(?P<field_6>[\s\S]*)\]\[(?P<field_7>\w*)\][\s\r\n\t]*$
EXTRACT-aob_gen_pf_eip_log_stanza_4 = 14:11:(?P<field_1>16|31)\.(?P<field_2>811|814|816|813)   \[issueStatusMessage\]  \[OID:(?P<field_3>1630|1631)\]\[TxID:(?P<field_4>1630_1630|1631_1631)\] (?P<field_5>Entered|Exited) stage: \[Route 1\]\[(?P<field_6>Route 1\.Null \(Empty\/Trigger\)|Source-Route 1\.Null \(Empty\/Trigger\)|Target-Route 1\.NULL Transport|No) (?P<field_7>Listener|Listener-Checkpoint|Transport-Checkpoint|Transformation)\]\[(?P<field_8>Listener|Infrastructure|Transformation)\][\s\r\n\t]*$
