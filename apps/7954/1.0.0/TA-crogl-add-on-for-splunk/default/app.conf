# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = Anthony Tellez, Crogl
version = 1.0.0
description = The Crogl Add-on for Splunk enables basic integration with Crogl’s security automation platform. It verifies that a Crogl instance is operational (online and reachable) and provides reference documentation for integrating Crogl with Splunk searches, alerts, and workflows.Use this add-on as a starting point for validating connectivity and understanding how Crogl fits into your detection and response pipeline.

[ui]
is_visible = 1
label = Crogl Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-crogl-add-on-for-splunk

[triggers]
reload.addon_builder = simple
reload.ta_crogl_add_on_for_splunk_account = simple
reload.ta_crogl_add_on_for_splunk_settings = simple
reload.passwords = simple

