

[user_search_strengths]
enableSched = 1
cron_schedule = 0 */4 * * * 
action.summary_index = 1
dispatch.earliest_time = -1w
search = index=_internal source=*web_access*  | rex mode=sed field=q "s/[^a-z]+/ /g"   | rename q as _raw | typer | mvexpand eventtype | eval user=lower(user) | top eventtype by user


[manager_search_strengths]
enableSched = 1
cron_schedule = 5 */4 * * * 
dispatch.earliest_time = -1w
action.summary_index = 1
search = index=_internal source=*splunkd_access* method=POST (status=200 OR status=201)| typer | mvexpand eventtype | eval user=lower(user) | top eventtype by user
