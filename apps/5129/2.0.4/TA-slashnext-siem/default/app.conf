# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 1

[launcher]
author = SlashNext,Inc
version = 2.0.4
description = SlashNext CMS Add-on for Splunk enables Splunk users to ingest Endpoints' incidents data as events which can later be used for dash-boarding and assessing the overall security posture of their endpoints secured by SlashNext.

[ui]
is_visible = 1
label = SlashNext SIEM
docs_section_override = AddOns:released

[package]
id = TA-slashnext-siem

[triggers]
reload.addon_builder = simple
reload.ta_slashnext_siem_account = simple
reload.ta_slashnext_siem_settings = simple
reload.passwords = simple

