[detectify:findings]
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-severity = case(cvss==0, "informational", cvss<4, "low", cvss<7, "medium", cvss<9, "high", 1==1, "critical")
EVAL-vendor_product = "detectify"
EVAL-category = "web"
FIELDALIAS-detectify_cim_aliases = domain AS dest "score{}.score" AS cvss "target.url" AS url title AS signature
