[REM(1)]
args = message
definition = noop
iseval = 0

[format_time(1)]
args = time
definition = eval "$time$"=strftime($time$,"%Y-%m-%d %H:%M:%S")
iseval = 0

[remove_empty_or_null_fields]
definition = foreach * \
    [ eval "TEMP_maybe_<<FIELD>>"=if('<<FIELD>>'=="", null(), '<<FIELD>>' )\
    | fields - "<<FIELD>>" \
    | rename "TEMP_maybe_<<FIELD>>" as "<<FIELD>>" ]
iseval = 0

[ESC_CS_BP_scores_evaluate_change]
definition = table title compliance_score mitre_score rba_score threat_score schedule_score frequency_score latest_score throttle_score tstats_score prefix_score morning_check_score redteam_score fields_score format_score identities_score drilldown_score workflow_score risk_score guide_score dashboard_score queue_score suppression_score\
| lookup ESC_correlation_searches_bp_compliance_scores.csv title OUTPUT compliance_score as previous_compliance_score, mitre_score as previous_mitre_score, rba_score as previous_rba_score, threat_score as previous_threat_score, schedule_score as previous_schedule_score, frequency_score as previous_frequency_score, latest_score as previous_latest_score, throttle_score as previous_throttle_score, tstats_score as previous_tstats_score, prefix_score as previous_prefix_score, morning_check_score as previous_morning_check_score, redteam_score as previous_redteam_score, fields_score as previous_fields_score, format_score as previous_format_score, identities_score as previous_identities_score, drilldown_score as previous_drilldown_score, workflow_score as previous_workflow_score, risk_score as previous_risk_score, guide_score as previous_guide_score, dashboard_score as previous_dashboard_score, queue_score as previous_queue_score, suppression_score as previous_suppression_score\
| eval deteriorating_count=0\
| eval improving_count=0\
| foreach mitre_score rba_score threat_score schedule_score frequency_score latest_score throttle_score tstats_score prefix_score morning_check_score redteam_score fields_score format_score identities_score drilldown_score workflow_score risk_score guide_score dashboard_score queue_score suppression_score\
    [ eval deteriorating_count    = deteriorating_count              + if( '<<FIELD>>' < 'previous_<<FIELD>>', 1, 0 ) \
    | eval deteriorating_practices= mvappend( deteriorating_practices, if( '<<FIELD>>' < 'previous_<<FIELD>>', replace( "<<FIELD>>", "_score", ""), null() )  )\
    | eval improving_count        = improving_count                  + if( '<<FIELD>>' > 'previous_<<FIELD>>', 1, 0 )\
    | eval improving_practices    = mvappend( improving_practices,     if( '<<FIELD>>' > 'previous_<<FIELD>>', replace( "<<FIELD>>", "_score", ""), null() )  )\
    ]\
| where deteriorating_count>0 OR improving_count>0\
| table title deteriorating_count deteriorating_practices improving_count improving_practices *compliance_score *mitre_score *rba_score *threat_score *schedule_score *frequency_score *latest_score *throttle_score *tstats_score *prefix_score *morning_check_score *redteam_score *fields_score *format_score *identities_score *drilldown_score *workflow_score *risk_score *guide_score *dashboard_score *queue_score *suppression_score\
| rename *_score as _*_score\
| appendpipe \
    [| stats count as search_count  \
    | fillnull value=0 deteriorating_count  improving_count\
    | eval title="Total" ]\
| eventstats values(search_count) as _search_count\
| eval line_to_remove=if( _search_count==0, "none", "Total" )\
| where NOT title==line_to_remove\
| fields - line_to_remove search_count
iseval = 0

[ESC_CS_BP_scores_update]
definition = table title compliance_score mitre_score rba_score threat_score schedule_score frequency_score latest_score throttle_score tstats_score prefix_score morning_check_score redteam_score fields_score format_score identities_score drilldown_score suppression_score workflow_score risk_score guide_score dashboard_score queue_score\
| outputlookup ESC_correlation_searches_bp_compliance_scores.csv
iseval = 0

[ESC_CS_notable_prefix_field]
definition = "customer"
iseval = 0

[ESC_CS_is_redteam_fieldname]
definition = "is_redteam"
iseval = 0

[ESC_CS_is_redteam_field]
definition = 'is_redteam'
iseval = 0

[ESC_CS_identity_macro]
definition = "ESC_get_identity4events"
iseval = 0

[ESC_CS_asset_macro]
definition = "ESC_get_asset"
iseval = 0

[ESC_CS_morning_checks_checks_endpoint]
definition = /servicesNS/-/SA-ES-Choreographer/data/ui/views/morning_checks_checks
iseval = 0

[ESC_CS_evaluate_best_practices]
definition = eval risk_type=split( risk_type, "\
" )\
```\
###\
### Real Time search VS Real Time schedule VS Continuous\
###\
```\
| lookup ESC_correlation_searches_schedule_business.csv title OUTPUT busy as _busy_search\
| eval schedule=case(\
    match(search_latest, "^(?i)rt") OR match(search_earliest, "^(?i)rt"), "RT!",\
    _busy_search=="yes", "Busy",\
    realtime_schedule==1, "RT",\
    1==1,"Cont." )\
```\
###\
### tstats VS other types of searches\
###\
```\
| eval _search_mentions_tstats_summariesonly = if( match(search, "\\btstats\s+(summariesonly=(?i)t(?:rue)?|`security_content_summariesonly`|`summariesonly`)\s"), "yes", "NO" ),\
       _search_mentions_tstats_but_no_data_model = if( match(search, "\\btstats\\b") AND NOT match(search, "\\b(?i:from)\s+datamodel\\b"), "yes", "NO" ),\
       _search_mentions_tstats_and_data_model    = if( match(search, "\\btstats\\b") AND match(search, "\\b(?i:from)\s+datamodel\\b"), "yes", "NO" ),\
       _search_starts_with_inputlookup = if( match(search,"^\\s*\\|\\s*inputlookup\\s"), "yes", "NO" ),\
       _search_is_ironport = if( match(search,"^\\s*`EMAIL_SEARCH"), "yes", "NO" ),\
       _search_is_powershell = if( match(search, "source=\"?XmlWinEventLog:Microsoft-Windows-PowerShell/Operational"), "yes", "NO" ),\
       _search_use_heavy_commands = if( match(search, "\\|\\s*union\\s|\\|\\s*join\\s|\\|\\s*append\\s|\\|\\s*transaction\\s"), "yes", "no" ),\
       _search_is_splunkadmin = if( match(search,"^.{0,100}(index=_internal\s|index=_audit\s|index=summary\s|index=main .{0,100}sourcetype=ESC:splunkadmin:)"), "yes", "NO" ),\
       _search_is_azure = if( match( search, "^.{0,100}(index *= *microsoft_cloud|`azuread`)" ), "yes", "NO" )\
| eval tstats = case(\
    isnotnull(tstats_override), tstats_override,\
    _search_use_heavy_commands=="yes", "heavy",\
    _search_mentions_tstats_summariesonly=="yes", "tstats DM",\
    _search_mentions_tstats_but_no_data_model=="yes", "tstats",\
    _search_mentions_tstats_and_data_model=="yes", "bad tstats",\
    _search_starts_with_inputlookup=="yes", "lookup",\
    _search_is_ironport=="yes", "ironport",\
    _search_is_powershell=="yes", "powershell",\
    _search_is_splunkadmin=="yes", "admin",\
    _search_is_azure=="yes","azure",\
    1==1, "raw" )\
```\
