[ESC_get_identity4events(2)]
args = username,clean_original_field
definition = eval tempclean_$username$_original = $username$ ,\
       tempclean_existing_user_field=user\
| rename user_* as tempclean2_user_* \
| eval user=lower($username$)\
| eval user=if( match( tempclean_$username$_original, "," ), "multiple users", user )\
| `get_identity4events(user)`\
| rename user_* as $username$_*\
| foreach tempclean2_user_* \
    [ eval user_<<MATCHSTR>>=coalesce(<<FIELD>>, user_<<MATCHSTR>>) ] \
| fields - tempclean2_user_* \
| rename tempclean_$username$_original as $username$_original\
| eval $username$name=$username$_first . " " . $username$_last,\
       $username$=case(\
    match( $username$_original, "@"), lower( $username$_original ),\
    isnull($username$_identity), $username$_original, \
    "$clean_original_field$"=="true" AND NOT match( tempclean_$username$_original, "," ), user,\
    1==1, $username$_original)\
| eval $username$_original=if("$clean_original_field$"=="true", $username$_original, null())\
| eval user=case(isnotnull(tempclean_existing_user_field) AND "$username$"!="user", tempclean_existing_user_field, isnull(tempclean_existing_user_field) AND "$username$"!="user", null(), 1==1, user)\
| fields - tempclean_existing_user_field\
| eval $username$_endDate_human = strftime( $username$_endDate, "%Y-%m-%d" ) ,\
       $username$_startDate_human = strftime( $username$_startDate, "%Y-%m-%d" ) ,\
       $username$_days_to_endDate =`days_to_endDate($username$_endDate)`
iseval = 0

[days_to_endDate(1)]
args = endDate
definition = round( ('$endDate$' + 24*3600 - now() )/(24*3600), 1 )
iseval = 0

