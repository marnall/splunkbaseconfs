[ESC_CS_get_seen_stats]
definition = join type=outer title \
    [| tstats summariesonly=t count \
        from datamodel=Risk \
        by source \
    | rename source as title, count as risk_count ] \
| join type=outer title \
    [ | inputlookup ESC_notables \
| addinfo \
| where _time>=info_min_time AND _time<=info_max_time \
| fields - info_min_time info_max_time info_search_time info_sid \
| stats count(eval(is_suppressed=="no")) as notable_count, count(eval(is_morning_check=="yes")) as morncheck_count, count(eval(`ESC_CS_is_redteam_field`=="yes")) as redteam_count, count(eval(is_known_va_scanner=="yes")) as va_scanner_count, count(eval(is_suppressed=="yes")) as suppressed_count by search_name \
| rename search_name as title]\
| fillnull value=0 risk_count notable_count morncheck_count redteam_count va_scanner_count suppressed_count\
| eval seen=mvappend( \
    if(notable_count>0, notable_count . "*notable", null()),\
    if(morncheck_count>0, morncheck_count . "*morncheck", null()),\
    if(redteam_count>0, redteam_count . "*redteam", null()),\
    if(va_scanner_count>0, va_scanner_count . "*VAscanner", null()),\
    if(suppressed_count>0, suppressed_count . "*suppressed", null()),\
    if(risk_count>0, risk_count . "*risk", null()))
iseval = 0

