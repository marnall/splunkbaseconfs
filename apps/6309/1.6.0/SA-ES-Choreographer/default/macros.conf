###\
### Frequency\
###\
```\
| rex field=cron_schedule "^(\*|\d+-\d+)/(?<_TEMP_every_few_minutes>\d+) \* \* \* \*$" \
| rex field=cron_schedule "^\d+ (?<_TEMP_every_hour>\*) \* \* \*$" \
| rex field=cron_schedule "^\d+ (\*|\d+-\d+)/(?<_TEMP_every_few_hours>\d+) \* \* \*$" \
| rex field=cron_schedule "^\d+ \d+ (?<_TEMP_every_day>\*) \* \*$" \
| rex field=cron_schedule "^\d+ \d+ (?<_TEMP_every_week>\*) \* \d+$" \
| eval _search_frequency= case( \
    isnotnull(_TEMP_every_few_minutes), _TEMP_every_few_minutes *60,\
    isnotnull(_TEMP_every_hour), 60*60,\
    isnotnull(_TEMP_every_few_hours), _TEMP_every_few_hours *60*60,\
    isnotnull(_TEMP_every_day), 24*60*60,\
    isnotnull(_TEMP_every_week), 7*24*60*60,\
    1==1, "?" ) \
| fields -  _TEMP_every_few_minutes _TEMP_every_hour _TEMP_every_few_hours _TEMP_every_day _TEMP_every_week\
| eval _search_duration= round( if( search_latest=="now", now(), relative_time( now(),replace(search_latest, "^(?i)rt", "") ) ) - relative_time(now(),replace(search_earliest, "^(?i)rt", "")), 0)\
| eval _search_overlap = round( _search_duration - _search_frequency, 0 )\
| eval frequency=case(\
    isnotnull(frequency_override), frequency_override,\
    _search_frequency=="?", "BAD",\
    _search_frequency>_search_duration, "BlindSpots",\
    _search_frequency>=15*60, "good",\
    _search_frequency>=5*60, "Frequent",\
    1==1, "TooFrequent" )\
```\
###\
### Latest\
###\
```\
| eval _search_mentions_threshold=if(match(search,"(?i)threshold"),"yes", "NO" ),\
       _search_filters_on_thresold=if(match(search,"\|\s*(search|where)([^|]+)?\s+'?\w*(count|number|num_|size|bytes)\w*'?\s*[<>]"), "yes", "NO" )\
| eval _detection_based_on_threshold=if( _search_mentions_threshold=="yes" OR _search_filters_on_thresold=="yes", "yes", "NO") ,\
       _search_latest_is_now =if( search_latest=="now", "yes", "NO" ),\
       _search_latest_is_not_too_recent =if( match(search_latest,"^-1[05]m") OR match(search_latest,"@[hw]$")  , "yes", "NO" )\
| eval latest=case(\
    isnotnull(latest_override), latest_override,\
    _detection_based_on_threshold=="yes" AND _search_overlap > 15*60, "good",\
    _detection_based_on_threshold=="yes" AND _search_latest_is_not_too_recent=="yes", "good",\
    _detection_based_on_threshold=="NO" AND _search_overlap < 60 AND ( _search_latest_is_now=="yes" OR _search_latest_is_not_too_recent=="NO" ), "blind?",\
    _detection_based_on_threshold=="NO" AND _search_overlap < 60 AND _search_latest_is_not_too_recent=="yes", "good",\
    _detection_based_on_threshold=="NO" AND _search_latest_is_now=="yes", "good",\
    _detection_based_on_threshold=="NO" AND _search_latest_is_now=="NO", "delay",\
    1==1, "BAD" )\
```\
