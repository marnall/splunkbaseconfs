### ESC Prefix\
###\
```\
| eval _search_mentions_prefix = if( match(search, `ESC_CS_notable_prefix_field`), "yes", "NO" )\
| eval _notable_title_mentions_prefix = if( match( notable_title, `ESC_CS_notable_prefix_field`), "yes", "NO" )\
| eval prefix = case( \
    isnotnull(prefix_override), prefix_override,\
    NOT 'action.notable'>0, "N/A",\
    _search_mentions_prefix=="NO", "SPL",\
    _notable_title_mentions_prefix=="NO", "notable",\
    _search_mentions_prefix=="yes" AND _notable_title_mentions_prefix=="yes", "yes",\
    1==1, "NO" )\
```\
###\
### Morning checks & redteam\
###\
```\
| lookup ESC_correlation_searches_with_morning_check_check search_name as title OUTPUT search_name as _morning_check_check\
| eval _has_morning_check_check = if( match( _morning_check_check, "." ), "yes", "NO" ),\
       _uses_tweak_risk_score_macro = if ( match ( search, "`tweak_risk_score_based_on_priority\("), "yes", "NO" ),\
       _search_mentions_morning_check         =if( match(search,"(?i)morning.check"), "yes", "NO" ),\
       _search_mentions_redteam              =if( match(search, `ESC_CS_is_redteam_related_regex`), "yes", "NO"),\
       _search_mentions_user                  =if( match(search,"(?<!\")\\buser\\b(?!\")"), "yes", "NO"),\
       _search_mentions_is_morning_check      =if( match(search,"\\bis_morning_check\\b"), "yes", "NO" ),\
       _search_mentions_is_redteam           =if( match(search,"\\b" . `ESC_CS_is_redteam_fieldname` . "\\b"), "yes", "NO" ),\
       _search_mentions_is_leaver             =if( match(search,"\\bis_leaver\\b"), "yes", "NO" ),\
       _search_mentions_title_tag                 =if( match(search,"title_tag"), "yes", "NO" ),\
       _search_tweaks_title_based_on_morning_check=if( match(search,"\\btitle_tag\\s*=[^|]*\\bis_morning_check\\b"), "yes", "NO" ),\
       _search_tweaks_title_based_on_redteam     =if( match(search,"\\btitle_tag\\s*=[^|]*\\b" . `ESC_CS_is_redteam_fieldname` . "\\b"), "yes", "NO" ),\
       _search_tweaks_title_based_on_leaver       =if( match(search,"\\btitle_tag\\s*=[^|]*\\bis_leaver\\b"), "yes", "NO" ),\
       _notable_title_mentions_title_tag=if( match( notable_title, "title_tag"), "yes", "NO" ) ,\
       _search_tweaks_risk_for_morning_check=if(match(search,"\|\s*eval\s+risk_score\s*=[^\|]+is_morning_check"), "yes", "NO" ),\
       _search_tweaks_risk_for_redteam     =if(match(search,"\|\s*eval\s+risk_score\s*=[^\|]+" . `ESC_CS_is_redteam_fieldname`), "yes", "NO" )\
| eval morning_check = case(\
    isnotnull(morning_check_override), morning_check_override,\
    'action.notable'>0 AND 'action.risk'>0, \
        if( _search_mentions_morning_check=="yes"\
            AND _search_mentions_is_morning_check=="yes",\
            case( NOT _has_morning_check_check=="yes", "Unmonitored",\
                NOT (   (  ( _search_mentions_title_tag=="yes"  \
	            AND _search_tweaks_title_based_on_morning_check=="yes" )               \
                OR _uses_tweak_risk_score_macro=="yes" )\
            AND _notable_title_mentions_title_tag=="yes"\
            AND _search_tweaks_risk_for_morning_check=="yes" ), "NoTweak",\
                 1==1, "good" ),\
            "NO"\
        ),\
    'action.notable'>0,\
        if( _search_mentions_morning_check=="yes"\
            AND _search_mentions_is_morning_check=="yes",\
            case( NOT _has_morning_check_check=="yes", "Unmonitored",\
                NOT (   (  ( _search_mentions_title_tag=="yes"  \
	            AND _search_tweaks_title_based_on_morning_check=="yes" )               \
                OR _uses_tweak_risk_score_macro=="yes" )\
            AND _notable_title_mentions_title_tag=="yes" ), "NoTweak",\
                 1==1, "good" ),\
            "NO"\
        ),\
    'action.risk'>0,\
        if( _search_mentions_morning_check=="yes"\
            AND _search_mentions_is_morning_check=="yes",\
            case( NOT _has_morning_check_check=="yes", "Unmonitored",\
                  NOT _search_tweaks_risk_for_morning_check=="yes", "NoTweak",\
                  1==1, "good" ),\
            "NO"\
            ),\
    1==1, "N/A" )\
| eval redteam = case( \
    isnotnull(redteam_override), redteam_override,\
    'action.notable'>0 AND 'action.risk'>0,\
        if( _search_mentions_redteam=="yes"\
            AND _search_mentions_is_redteam=="yes",\
            if (   (  ( _search_mentions_title_tag=="yes"\
 	            AND _search_tweaks_title_based_on_redteam=="yes" )\
                OR _uses_tweak_risk_score_macro=="yes" )\
            AND _notable_title_mentions_title_tag=="yes"\
                AND _search_tweaks_risk_for_redteam=="yes",\
                "good","NoTweak" ),\
            "NO"\
            ),\
    'action.notable'>0,\
        if( _search_mentions_redteam=="yes"\
            AND _search_mentions_is_redteam=="yes",\
            if (   (  ( _search_mentions_title_tag=="yes"\
                       AND _search_tweaks_title_based_on_redteam=="yes" )\
                   OR _uses_tweak_risk_score_macro=="yes" )\
               AND _notable_title_mentions_title_tag=="yes",\
               "good","NoTweak" ),\
            "NO"\
            ),\
    'action.risk'>0,\
        if( _search_mentions_redteam=="yes"\
            AND _search_mentions_is_redteam=="yes",\
            if( _search_tweaks_risk_for_redteam=="yes","good", "NoTweak" ),\
            "NO"\
            ),\
    1==1, "N/A" )\
```\
###\
### Fields\
###\
\
### First task is to extract a list of relevant fields\
First we look at the fields listed in the last table command```\
| rex field=search "^(?<_last_table_preamble>[\\w\\W]*)\\|\\s*table\\s(?<_last_table_field_list>[^|]+)"\
| eval _last_table_preamble_size=len(_last_table_preamble)\
```we can check if there is an * at the end```\
| eval _last_table_has_star=if( match( _last_table_field_list, " \\*\\s*$"), "yes", "no" )\
```We then extract any sort of token listed```\
| rex field=_last_table_field_list max_match=0 "(?<_last_table_fields>\"[^\"]+\"|[^\"\s,][^,\s]*)"\
```We tidy up: remove DM object name, span, quotes...```\
| rex field=_last_table_fields mode=sed "s/\\b\\w+\.\\b//g"\
| rex field=_last_table_fields mode=sed "s/span=\\S+//g"\
| rex field=_last_table_fields mode=sed "s/\"([^\"]+)\"/\1/g"\
```And we filter out any empties or wildcards```\
| eval _last_table_field_list=mvfilter( NOT match(_last_table_fields, "^\\*?$") )\
```That's it for table commands, now we look at the last stats or tstats command```\
| rex field=search "^(?<_last_stats_preamble>[\\w\\W]*)\\|\\s*t?stats\\s(?<_last_stats_before_by>[^|]*?)\\bby\\s(?<_last_stats_after_by>[^|]+)"\
| eval _last_stats_preamble_size=len(_last_stats_preamble)\
```We can check if there is a something(*) as *```\
| eval _last_stats_has_star = if( match( _last_stats_before_by, "\\sas\\s+\\*\\s*$"), "yes", "no")\
```In the section before the by keyword, we extract anything that is after a 'as' keyword, and in the section after by we extract any sort of token```\
| rex field=_last_stats_before_by max_match=0 "\\s(?i)as\\s+(?<_last_stats_before_by_fields>\"[^\"]+\"|[^\"\s][\w\-\.]*)"\
| rex field=_last_stats_after_by max_match=0 "(?<_last_stats_after_by_fields>\"[^\"]+\"|[^\"\s,][^,\s]*)"\
```Then we combine the two lists and tidy them up```\
| eval _last_stats_field_list=mvappend( _last_stats_before_by_fields, _last_stats_after_by_fields ) \
| rex field=_last_stats_field_list mode=sed "s/\\b\\w+\.\\b//g"\
| rex field=_last_stats_field_list mode=sed "s/span=\\S+//g"\
| rex field=_last_stats_field_list mode=sed "s/\"([^\"]+)\"/\1/g"\
```last filtering for stats```\
| eval _last_stats_field_list=mvfilter( NOT match(_last_stats_field_list, "^\\*?$") )\
```Finally we have to make a choice between the last table and the last stats: we want the last one, so we use the size of the preamble to decide```\
| eval field_list=case( isnull(_last_table_preamble_size), _last_stats_field_list,\
                        isnull(_last_stats_preamble_size), _last_table_field_list,\
                        _last_table_preamble_size>=_last_stats_preamble_size, _last_table_field_list,\
                        1==1, _last_stats_field_list )\
| eval _field_count=mvcount( mvfilter( NOT match( field_list, "^(_time|" . `ESC_CS_notable_prefix_field` . ")$" ) ) )\
| eval _field_list_has_star=case( isnull(_last_table_preamble_size), _last_stats_has_star,\
                                  isnull(_last_stats_preamble_size), _last_table_has_star,\
                                  _last_table_preamble_size>=_last_stats_preamble_size, _last_table_has_star,\
                                  1==1, _last_stats_has_star )\
```\
### Second task is to figure out which field is 'bad' (Only for notables though)\
```\
| eval _bad_fields=mvfilter(NOT match(field_list,"^(_time|index|source|sourcetype|host|severity|is_techie|\*)$") AND NOT ( \
    [| rest splunk_server=local /servicesNS/-/-/configs/conf-log_review/incident_review f=event_attributes\
    | fields event_attributes \
    | eval d=split(event_attributes, "},") \
    | rex field=d max_match=0 "field\"\s*:\s*\"(?<field>[^\"]+)" \
    | rex field=d max_match=0 "label\"\s*:\s*\"(?<label>[^\"]+)" \
    | eval mv=mvzip(field,label) \
    | fields mv \
    | mvexpand mv \
    | eval field=mvindex(split(mv,","), 0), label=mvindex(split(mv,","), 1) \
    | table field, label \
    | stats values(field) as field_list \
    | format ]) ) \
|rename field_list as _field_list\
| eval _has_fields     =if(mvcount(_field_list)>0, "yes", "NO"),\
       _has_bad_fields =if(mvcount(_bad_fields)>0, "yes", "NO")\
| eval fields=case(\
    isnotnull(fields_override), fields_override,\
    NOT 'action.notable' > 0 AND NOT 'action.risk' > 0,"N/A",\
    NOT 'action.notable' > 0, if( _has_fields=="yes" AND ( _field_count <= 6 OR _field_list_has_star=="yes" ), "good", "BAD" ),\
    _has_fields=="yes" AND _has_bad_fields=="NO", "good",\
    1==1, "BAD" )\
```\
###\
### Format \
###\
```\
| rex max_match=0 field=search "\| *(?<_keywords>(addinfo|append|base64|bin|bucket|convert|dedup|eval|eventstats|extract|fields|fillnull|foreach|format|from|inputlookup|iplocation|join|lookup|makemv|mvexpand|regex|rename|rest|rex|search|sort|stats|table|transaction|tstats|union|where))"\
| eval search_without_comments=search\
| rex mode=sed field=search_without_comments "s/```.*?```//g"\
| rex max_match=0 field=search_without_comments "[^\s\[][ \t]*\| *(?<_keywords_without_linebreak>(addinfo|append|base64|bin|bucket|convert|dedup|eval|eventstats|extract|fields|fillnull|foreach|format|from|inputlookup|iplocation|join|lookup|makemv|mvexpand|regex|rename|rest|rex|search|sort|stats|table|transaction|tstats|union|where))"\
| eval _keywords=mvdedup(_keywords),\
       sane_search=replace( replace( replace( search_without_comments, "\\\\\\\\", "__DOUBLE_BACKSLASH__" ), "\\\\\"", "__ESCAPED_QUOTE__" ),  "\"[^\"]+\"", "\"__SOME_STRING__\"" )\
| eval _has_keywords=if( mvcount(_keywords)>0, "yes", "NO"),\
       _has_keywords_without_linebreak=if( mvcount(_keywords_without_linebreak)>0, "yes", "NO") ,\
       _tstats_has_no_linebreak_by    =if(match(sane_search,"\|\s*tstats\s+[^|]{50,}?[^\s|][ \t]+by\s"), "yes", "NO"),\
       _tstats_has_no_linebreak_where =if(match(sane_search,"\|\s*tstats\s+[^|]{40,}?[^\s|][ \t]+where\s"), "yes", "NO"),\
       _tstats_has_no_linebreak_from  =if(match(sane_search,"\|\s*tstats\s+[^|]{40,}?[^\s|][ \t]+from\s"), "yes", "NO")\
| eval format=case(\
    isnotnull(format_override), format_override,\
    _has_keywords=="yes" AND _has_keywords_without_linebreak=="NO" AND _tstats_has_no_linebreak_by=="NO" AND _tstats_has_no_linebreak_where=="NO" AND _tstats_has_no_linebreak_from=="NO", "good",\
    1==1, "BAD")\
```\
###\
### identities\
###\
```\
| eval _dest_is_lookedup=case(\
    match(search,"\\bWeb\.dest\\b") OR NOT match(search,"\\bdest\\b"), "N/A",\
    match(search, `ESC_CS_asset_macro` . "(?:_summary)?\\(dest\\)"), "yes",\
    1==1, "NO"),\
       _src_is_lookedup=case(\
    NOT match(search,"\\bsrc\\b"), "N/A",\
    match(search, `ESC_CS_asset_macro` . "(?:_summary)?\\(src\\)"), "yes",\
    1==1, "NO"),\
       _dvc_is_lookedup=case(\
    NOT match(search,"\\bdvc\\b"), "N/A",\
    match(search, `ESC_CS_asset_macro` . "(?:_summary)?\\(dvc\\)"), "yes",\
    1==1, "NO"),\
       _user_is_lookedup=case(\
    NOT match(search,"[^\"]\\buser\\b[^\"]"), "N/A",\
    match(search, `ESC_CS_identity_macro` . "(?:_summary)?\\(user\\)"), "yes",\
    1==1, "NO"),\
       _src_user_is_lookedup=case(\
    NOT match(search,"\\bsrc_user\\b"), "N/A",\
    match(search, `ESC_CS_identity_macro` . "(?:_summary)?\\(src_user\\)"), "yes",\
    1==1, "NO"),\
       _recipient_is_lookedup=case(\
    NOT match(search,"\\brecipient\\b"), "N/A",\
    match(search, `ESC_CS_identity_macro` . "(?:_summary)?\\(recipient\\)"), "yes",\
    1==1, "NO"),\
       _sender_is_lookedup=case(\
    NOT match(search,"\\bsender\\b"), "N/A",\
    match(search, `ESC_CS_identity_macro` . "(?:_summary)?\\(sender\\)"), "yes",\
    1==1, "NO")\
| rex field=search max_match=0 "get_identity4events(?:_summary)?\\(\\s*(?<_lookedup_identity_fields>[\\w\\-]+)"\
| rex field=search max_match=0 "get_asset(?:_summary)?\\(\\s*(?<_lookedup_asset_fields>[\\w\\-]+)"\
| eval _weird_identity_fields=mvfilter(NOT match( _lookedup_identity_fields, "^(user|src_user|recipient|sender)$" ) ),\
       _weird_asset_fields   =mvfilter(NOT match( _lookedup_asset_fields, "^(dest|src|dvc|host)$" ) )\
| eval _has_weird_fields=if( isnotnull(_weird_identity_fields) OR isnotnull(_weird_asset_fields), "yes", "NO" ),\
       _has_some_identity=if( match(search, "\\b(?:dest|src|user|src_user|sender|recipient)\\b"), "yes", "NO" ),\
       _has_remove_empty_or_null_fields=if( match( search, "remove_empty_or_null_fields"), "yes", "NO" )\
| eval identities=case(\
    isnotnull(identities_override), identities_override,\
    _dest_is_lookedup=="NO" OR _src_is_lookedup=="NO"  OR _dvc_is_lookedup=="NO"  OR _user_is_lookedup=="NO"  OR _src_user_is_lookedup=="NO", "BAD",\
    _has_remove_empty_or_null_fields=="NO", "Verbose",\
    _has_weird_fields=="yes", "Odd",\
    _has_some_identity=="NO", "NONE",\
    1==1, "good" )\
```\
###\
### Risk1: risk\
###\
```\
| eval _bad_risk_types=mvfilter( match(risk_type, "^(?!user|system|other).*$") ),\
       _bad_risk_type_tweak=if( match(search, "risk_object_type\s*=\s*\w+\s*(\||$)" ), "yes", "NO" )\
| eval _risk_type_ok=if( ( isnull(_bad_risk_types) OR mvcount(_bad_risk_types)==0 ) AND _bad_risk_type_tweak=="NO", "yes", "NO" ),\
       _search_tweaks_risk=if(match(search,"\|\s*eval\s+[^|]*\\brisk_score\s*="), "yes", "NO" ),\
       _search_tweaks_description=if(match(search,"\|\s*eval\s+[^|]*\\bdescription\s*="), "yes", "NO" ),\
       _search_description_concat_asset=if(match(search,"\|\s*eval\s+[^|]*\\bdescription\s*=[^|]*(?:\.\s*(?:dest|src|dvc)\b|\b(?:dest|src|dvc)\s*\.)"), "yes", "NO" ),\
       _config_sets_risk_message=if(isnotnull(risk_message) AND risk_message!="", "yes", "NO" ),\
       _search_tweaks_risk_message=if(match(search,"\|\s*eval\s+[^|]*\\brisk_message\s*="), "yes", "NO" ),\
       _search_risk_message_concat_asset=if(match(search,"\|\s*eval\s+[^|]*\\brisk_message\s*=[^|]*(?:\.\s*(?:dest|src|dvc)\b|\b(?:dest|src|dvc)\s*\.)"), "yes", "NO" ),\
       _search_tweaks_risk_object=if(match(search,"\|\s*eval\s+[^|]*\\brisk_object\s*="), "yes", "NO" ),\
       _search_tweaks_risk_object1=if(match(search,"\|\s*eval\s+[^|]*\\brisk_object1\s*="), "yes", "NO" ),\
       _search_tweaks_risk_object2=if(match(search,"\|\s*eval\s+[^|]*\\brisk_object2\s*="), "yes", "NO" ),\
       _multi_risk=if( mvcount(split(risk_object, "\
" ) )>1, "yes", "NO" )\
| eval risk=case(\
    isnotnull(risk_override), risk_override,\
    NOT 'action.risk' > 0, "NONE",\
    NOT _risk_type_ok=="yes", "BadType",\
    'action.notable'>0 AND _multi_risk=="yes" AND _search_tweaks_risk_object=="yes", "BAD",\
    'action.notable'>0 AND _multi_risk=="yes" AND NOT ( _search_tweaks_risk_object1=="yes" AND _search_tweaks_risk_object2=="yes" ), "Workflow+",\
    'action.notable'>0 AND NOT _multi_risk=="yes" AND NOT _search_tweaks_risk_object=="yes", "Workflow",\
    _search_tweaks_risk=="yes" AND _uses_tweak_risk_score_macro=="yes", "good",\
    1==1, "NoTweak" )\
