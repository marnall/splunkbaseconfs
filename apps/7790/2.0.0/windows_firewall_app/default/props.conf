[windows:pfirewall]
EVAL-action = case(action="ALLOW", "allowed", action="DROP", "blocked")
EVAL-app = if(isnull(app), "", app)
EVAL-bytes = case(info="-", 0, true(), bytes)
EVAL-bytes_in = case(info="RECEIVE", bytes, info="-", 0, info="SEND", 0)
EVAL-bytes_out = case(info="SEND", bytes, info="-", 0, info="RECEIVE", 0)
EVAL-channel = if(isnull(channel), "", channel)
EVAL-dest_interface = if(isnull(dest_interface), "unknown", dest_interface)
EVAL-dest_mac = if(isnull(dest_mac), "", dest_mac)
EVAL-dest_translated_ip = if(isnull(dest_translated_ip), "unknown", dest_translated_ip)
EVAL-dest_translated_port = if(isnull(dest_translated_port), "unknown", dest_translated_port)
EVAL-dest_zone = if(isnull(dest_zone), "unknown", dest_zone)
EVAL-direction = case(isnull(direction) AND info="-", "unknown", isnull(direction) AND info="RECEIVE", "inbound", isnull(direction) AND info="SEND", "outbound", true(), direction)
EVAL-duration = if(isnull(duration), "", duration)
EVAL-dvc_mac = if(isnull(dvc_mac), "unknown", dvc_mac)
EVAL-dvc_zone = if(isnull(dvc_zone), "unknown", dvc_zone)
EVAL-flow_id = if(isnull(flow_id), "unknown", flow_id)
EVAL-product = "Windows Defender Firewal"
EVAL-protocol = case(transport != "-",  lower(transport), protocol= "-", "unknown", true(), protocol)
EVAL-rule = if(isnull(rule), "unknown", rule)
EVAL-transport = if(transport="-", "unknown", lower(transport))
EVAL-user = if(isnull(user), "unknown", user)
EVAL-vendor = "Microsoft"
EVAL-vendor_account = if(isnull(vendor_account), "unknown", vendor_account)
EVAL-vendor_product = "Microsoft Windows Defender Firewal"
EVAL-vlan = if(isnull(vlan), "unknown", vlan)
FIELDALIAS-dest = dest_ip ASNEW dest
FIELDALIAS-dvc = host ASNEW dvc host ASNEW dvc_ip host ASNEW dvc_host host ASNEW dvc_name
FIELDALIAS-src = src_ip ASNEW src
REPORT-Network_Traffic = REPORT-Network_Traffic

[source::*WinEventLog:Microsoft-Windows-Windows Firewall With Advanced Security/Firewall]
EVAL-NewProfile = case(NewProfile="4", "Public", NewProfile="2147483649", "None", true(), NewProfile)
EVAL-OldProfile = case(OldProfile="4", "Public", OldProfile="2147483649", "None", true(), OldProfile)
EVAL-Protocol = case(Protocol="17", "UDP",  Protocol="0", "HOPOPT (IPv6 Hop-by-Hop Option)", Protocol="1", "ICMP", Protocol="2", "IGMP", Protocol="6", "TCP", Protocol="17", "UDP", Protocol="41", "IPv6 Header", Protocol="58", "ICMPv6", Protocol="132", "SCTP", Protocol="253", "Reserved", Protocol="254", "Reserved", Protocol="255", "Reserved", Protocol="256", "Any", true(), Protocol)
EVAL-Profiles = case(Profiles="4", "Public", Profiles="2", "Private", Profiles="2147483649", "None", true(), Profiles)
EVAL-action = case(EventID="2097", "added", EventID="2004", "added", EventID="2099", "modified", EventID="2006", "deleted", SettingType="17" AND SettingValue="01000000", "Block", SettingType="16" AND SettingValue="00000000", "Allow", true(), "N/A")
EVAL-change_type = case((EventID="2003" OR EventID="2082" OR EventID="2083" OR EventID="2013" OR EventID="2010"), "firewall-setting", (EventID="2097" OR EventID="2052" OR EventID="2099" OR EventID="2084" OR EventID="2004" OR EventID="2006" OR EventID="2005"), "firewall-policy", (EventID="5031" OR EventID="2012" OR EventID="2011"), "firewall-action", true(), change_type)
FIELDALIAS-command = ModifyingApplication ASNEW command
FIELDALIAS-dest = Computer ASNEW dest
FIELDALIAS-user = ModifyingUser ASNEW user ModifyingUser ASNEW src_user
EVAL-direction = case(Direction="0", "outbound", Direction="1", "inbound", Direction="2", "outbound", true(), "N/A")
EVAL-rule_action = case(Action="2", "deny", Action="3", "allow", true(), "N/A")
EVAL-src_port_range = case(Direction="0" OR Direction="2", LocalPorts, Direction="1", RemotePorts, true(), "N/A")
EVAL-dest_ip_range = case(Direction="0" OR Direction="2", RemoteAddresses, Direction="1", LocalAddresses, true(), "N/A")
EVAL-src_ip_range = case(Direction="0" OR Direction="2", LocalAddresses, Direction="1", RemoteAddresses, true(), "N/A")
EVAL-status = case(Active="0", "inactive", Active="1", "active", SettingType="1" AND SettingValue="01000000", "active", SettingType="1" AND SettingValue="00000000", "inactive ", true(), "N/A")
EVAL-result = case(EventID="2097" AND Action="2", "added:block", EventID="2004" AND Action="2", "added:block", EventID="2097" AND Action="3", "added:allow", EventID="2099" AND Action="3", "modified:allow", EventID="2099" AND Action="2", "modified:block", EventID="2006", "deleted", EventID="2052", "deleted", SettingType="17" AND SettingValue="01000000", "Block", SettingType="16" AND SettingValue="00000000", "Allow", true(), "N/A")