[fail2ban]
EVAL-action = coalesce(vendor_action,vendor_action2)
EVAL-ids_type = "application"
EVAL-severity = case(vendor_level=="INFO","low", vendor_level=="NOTICE", "medium", 1=1, null())
EVAL-vendor_action = coalesce(vendor_action,vendor_action2)
EVAL-vendor_action2 = null()
EXTRACT-vendor_product,vendor_module,pid,vendor_levev,jail,vendor_message = ^[^f]+ (?<vendor_product>[^\.]+).(?<vendor_module>[^\s]+)\s+\[(?<pid>[\d]+)]:\s(?<vendor_level>[\w]+)\s+(\[(?<jail>[^\]]+)]\s)?(?<vendor_message>(?<vendor_action>Found|Ban|Unban|Restore Ban)?\s?(?<src>(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))\s?(?<vendor_action2>already banned|is not banned| - ((?<initial_date>.*))?)?|.*)$
FIELDALIAS-aob_gen_fail2ban_alias_1 = vendor_product AS category
FIELDALIAS-aob_gen_fail2ban_alias_2 = host AS dest
FIELDALIAS-aob_gen_fail2ban_alias_3 = host AS dvc
FIELDALIAS-aob_gen_fail2ban_alias_4 = jail AS signature
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%d %H:%M:%S.%Q
category = Network & Security
pulldown_type = 1
