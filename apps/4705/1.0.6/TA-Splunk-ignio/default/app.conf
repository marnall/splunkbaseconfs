# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 7

[launcher]
author = Digitate
version = 1.0.6
description = The TA-Splunk-ignio Splunk Add-on is used to fetch alerts/events from Splunk and publish it to ignio AIOps.

[ui]
is_visible = 1
label = ignio Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-Splunk-ignio

[triggers]
reload.addon_builder = simple
reload.ta_splunk_ignio_account = simple
reload.ta_splunk_ignio_settings = simple
reload.passwords = simple

