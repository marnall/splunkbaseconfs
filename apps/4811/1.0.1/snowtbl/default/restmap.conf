#############################################################################
# Persistent non-EAI handler that processes SNOW Table REST API calls.
#
# Some additional arguments are enabled to permit the exposure of HTTP headers,
# payload, and cookies.
#
#############################################################################
[script:snowtbl_rest_create_ticket]
match                 = /snowtbl_rest_create_ticket
script                = snowtbl_rest_create_ticket.py
scripttype            = persist
handler               = snowtbl_rest.create_ticket_Handler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
capability            = snowtbl_write_endpoint

[script:snowtbl_rest_run_query]
match                 = /snowtbl_rest_run_query
script                = snowtbl_rest_run_query.py
scripttype            = persist
handler               = snowtbl_rest.run_query_Handler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
capability            = snowtbl_read_endpoint
