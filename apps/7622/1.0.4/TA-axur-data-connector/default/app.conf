# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 10

[launcher]
author = Axur
version = 1.0.4
description = The Axur Data Connector Add-on for Splunk takes events from Axur platform data sources and maps them to the Splunk Common Information Model.

[ui]
is_visible = 1
label = Axur Data Connector
docs_section_override = AddOns:released

[package]
id = TA-axur-data-connector

[triggers]
reload.addon_builder = simple
reload.ta_axur_data_connector_account = simple
reload.ta_axur_data_connector_settings = simple
reload.passwords = simple

