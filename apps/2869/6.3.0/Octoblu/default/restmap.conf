[validation:savedsearch]
# Require url to be set if Octoblu action is enabled
action.octoblu = case('action.octoblu' != "1", null(), 'action.octoblu.param.url' == "action.octoblu.param.url" OR 'action.octoblu.param.url' == "", "No Octoblu URL specified",  1==1, null())
action.octoblu.param.url = validate( match('action.octoblu.param.url', "^https?://[^\s]+$"), "Octoblu trigger URL is invalid")