#access
[download_traffic_geolocation]
description = Download Traffic by Geolocation 
search = `artifactory_sources_macro`  | rex "(?<year>\w+)-(?<month>\w+)-(?<day>\w+) (?<hour>\w+):(?<minutes>\w+):(?<seconds>\w+),(?<size>\w+) \[(?<status_type>\w+) (?<status>\w+)] (?<repo>[^:]*):(?<fullfilepath>[^|]*) (?<user>[^:]*)/(?<ip>[^:]*)" | where status="DOWNLOAD" | stats count by ip | iplocation ip | geostats latfield=lat longfield=lon count

#access
[upload_traffic_geolocation]
description = Upload Traffic by Geolocation
search = `artifactory_sources_macro`  | rex "(?<year>\w+)-(?<month>\w+)-(?<day>\w+) (?<hour>\w+):(?<minutes>\w+):(?<seconds>\w+),(?<size>\w+) \[(?<status_type>\w+) (?<status>\w+)] (?<repo>[^:]*):(?<fullfilepath>[^|]*) (?<user>[^:]*)/(?<ip>[^:]*)" | where status="UPLOAD" | stats count by ip | iplocation ip | geostats latfield=lat longfield=lon count

#access
[data_transfer_over_time_GB]
description = Data Transfer (GBs) over time 
