[mobileiron:sentry]
# Index Time
# There are different timestamp locations/formats for "mi" vs "SENTRY_AUDIT" log_type, so we have to let Splunk guess.
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRANSFORM-mis_sourcetyper = mis_mi_st, mis_audit_st
TIME_PREFIX = publishTime":"|mi: PRODUCT=\S+,
MAX_TIMESTAMP_LOOKAHEAD = 20

[mobileiron:sentry:mi]
EXTRACT-mis_mi_ll = PRODUCT=\S+\s+\S+\s+\S+\s+\S+\s+(?P<log_level>ERROR|WARN|INFO)
EXTRACT-mis_mi_src = DeviceIPPort=(?<src_ip>[^:]+):(?<src_port>\d+),
EXTRACT-mis_mi_dest = to\s+server\s+(?P<dest>\S+)
EXTRACT-mis_mi_status = AlertId=HTTP(?P<status>\d+)
EXTRACT-mis_mi_msg = (?:Service=|AlertId=).+\)\s(?P<message>.+)
EXTRACT-mis_mi_dest2 = connection\s+timed\s+out:\s+(?P<dest>[^/]+)/(?P<dest_ip>[^:]+):(?P<dest_port>\d+)

EVAL-vendor_product = "MobileIron Sentry"

FIELDALIAS-mis_mi_cim = User ASNEW user, Server ASNEW dest, Device ASNEW dvc

[mobileiron:sentry:audit]
# Search Time
## SENTRY_AUDIT
EXTRACT-mis_log_type = (?P<log_type>\w+):\s+PRODUCT
EXTRACT-mis_src_fix = clientHost":"/?(?P<src>[^"]+)"
EXTRACT-mis_dest_fix = serverHost":"/?(?P<dest>[^"]+)"

EVAL-action=case(action=="NONE","allowed",action=="ALLOW","allowed",action=="BLOCK","blocked")
EVAL-direction = "outbound"
EVAL-transport = lower(type)
EVAL-vendor_product = "MobileIron Sentry"
EVAL-dest_ip=if(match(dest,"^\d+"),dest,NULL)
EVAL-src_ip=if(match(src,"^\d+"),src,NULL)


FIELDALIAS-mis_network_cim = userId ASNEW user, clientPort ASNEW src_port, serverPort ASNEW dest_port, sentryHost ASNEW dvc, sentryAddress ASNEW dvc_ip, sentryPort ASNEW dvc_port, entryType ASNEW category, entryId ASNEW session_id, applicationId ASNEW app, httpStatus ASNEW status

REPORT-mis_network_cim = mis_network_cim
