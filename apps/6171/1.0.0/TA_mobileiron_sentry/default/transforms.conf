[mis_network_cim]
FORMAT = $1::$2
REGEX = "([^"]+)":"?([^",]+)"?(?:,?|})

[mis_mi_st]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::mobileiron:sentry:mi
REGEX = mi:\s+PRODUCT

[mis_audit_st]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::mobileiron:sentry:audit
REGEX = SENTRY_AUDIT:\s+PRODUCT
