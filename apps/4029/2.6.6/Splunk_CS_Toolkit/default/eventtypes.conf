[edu_reports]
search = index="*" (sourcetype="edu_reports" OR sourcetype="splunk:edu:transcript:json")

[bucket_chill]
search = eventtype=bucket_chill_4 OR eventtype=bucket_chill_5

[bucket_chill_4]
search = index=_internal source=*splunkd.log* component=BucketMover move src=* dst=*

[bucket_chill_5]
search = index=_internal source=*splunkd.log* component=BucketMover warm_to_cold

[bucket_cool]
search = eventtype=bucket_cool_pre_63 OR eventtype=bucket_cool_63

[bucket_cool_63]
search = index=_internal source=*splunkd.log* component=HotBucketRoller finished

[bucket_cool_pre_63]
search = index=_internal source=*splunkd.log* component=HotBucketRoller finished

[bucket_cool_pre63]
search = index=_internal source=*splunkd.log* component=databasePartitionPolicy Moving

[bucket_freeze]
search = index=_internal source=*splunkd.log* component=BucketMover "will attempt to freeze"

[bucket_kindle]
search = eventtype=bucket_kindle_4 OR eventtype=bucket_kindle_5plus

[bucket_kindle_4]
search = index=_internal source=*splunkd.log* component=databasePartitionPolicy creating

[bucket_kindle_5plus]
search = index=_internal source=*splunkd.log* (component=databasePartitionPolicy OR component=IndexWriter) Creating bucket=*

[bucket_movement]
search = eventtype=bucket_kindle OR eventtype=bucket_quarantine_kindle OR eventtype=bucket_cool OR eventtype=bucket_chill OR eventtype=bucket_freeze

[bucket_quarantine_kindle]
search = qbucket=* (eventtype=bucket_kindle_4 OR eventtype=bucket_kindle_5plus)


