[edu_reports]
TIMESTAMP_FIELDS = registrationTimeStamp
TIME_FORMAT = %m/%d/%Y
KV_MODE = auto
SHOULD_LINEMERGE = false
INDEXED_EXTRACTIONS = csv
NO_BINARY_CHECK = true
DATETIME_CONFIG =
pulldown_type = true
category = Structured
MAX_DAYS_AGO = 900
description = Comma-separated value format. Set header and other settings in "Delimited Settings"
disabled = false

LOOKUP-OPDIV = Splunk_Staff_EDU email OUTPUTNEW OPDIV
LOOKUP-Staff_Role = Splunk_Staff_EDU email OUTPUTNEW roles
#LOOKUP-Customer = Splunk_Staff_EDU EMAIL OUTPUTNEW CUSTOMER
LOOKUP-Full_Name = Splunk_Staff_EDU email OUTPUTNEW Name
LOOKUP-EDUROLES = Splunk_Staff_EDU email OUTPUTNEW edu_track OPDIV

LOOKUP-Training_Path_ITSI = SplunkCourses COURSENAME OUTPUTNEW Training_Path_ITSI AS ITSI_Course
LOOKUP-Training_Path_Dev = SplunkCourses COURSENAME OUTPUTNEW Training_Path_Developer AS Dev_Course
LOOKUP-Class_Level = SplunkCourses COURSENAME OUTPUTNEW Class_Level
LOOKUP-Training_Path_Architect = SplunkCourses COURSENAME OUTPUTNEW Training_Path_Architect AS Architect_Course
LOOKUP-Training_Path_Security = SplunkCourses COURSENAME OUTPUTNEW Training_Path_Security AS Security_Course
LOOKUP-Training_Path_Admin = SplunkCourses COURSENAME OUTPUTNEW Training_Path_Admin AS Admin_Course
LOOKUP-Class_Name = SplunkCourses COURSENAME OUTPUTNEW Class_Name
LOOKUP-Training_Path_Cloud = SplunkCourses COURSENAME OUTPUTNEW Training_Path_Cloud AS Cloud_Course
LOOKUP-Training_Path_User = SplunkCourses COURSENAME OUTPUTNEW Training_Path_User AS User_Course

TRANSFORMS-COURSENAME = Class_Version,Class_Delivery,Class_Name,Classname_Scrubber