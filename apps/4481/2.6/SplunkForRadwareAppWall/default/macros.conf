[Request_Status_over_time_by_webappname(1)]
args = ServerName
definition = timechart count by dhost

[Violations_distribution_over_time_by_webappname(1)]
args = ServerName
definition = timechart count by attackname 

[Attack_type_distribution_over_time_by_webappname(1)]
args = ServerName
definition = timechart count by attackname

[Top_HTTP_methods(1)]
args = ServerName
definition = top method limit=20

[Top_HTTP_Host(1)]
args = ServerName
definition = top dhost limit=20

[Top_Object_count_ip_to_country(1)]
args = ServerName
definition = iplocation extip | rename extip as SourceIP | stats count by SourceIP Country | sort -count

[Top_Object_by_webapp_and_device(1)]
args = ServerName
definition = top http_security_violation limit=20

[Top_attack_types(1)]
args = ServerName
definition = top attackname limit=20

[Top_severities(1)]
args = ServerName
definition = top sev limit=20

[Top_attacking_countries(1)]
args = ServerName
definition = iplocation extip | top Country limit=10

[Top_attacking_IPs(1)]
args = ServerName
definition = rename extip as SourceIP | top SourceIP limit=20

[Top_signatures(1)]
args = ServerName
definition = top attackname limit=20

[Violations_count_by_URIs(1)]
args = ServerName
definition = stats count(attackname) as violation_count by uri | sort -violation_count

[Events_distribution_by_web_app(1)]
args = ServerName
definition = timechart count by webappname limit=20

[Top_attacked_web_apps(1)]
args = ServerName
definition = top webappname limit=20

[Attacked_IPs(1)]
args = ServerName
definition = stats max(host)

[Anomalies_ip_to_country(1)]
args = ServerName
definition = iplocation extip | stats max(attackname) as Vulnerability by Country

[Blocked_IP_count_by_time(1)]
args = ServerName
definition = module="IPBlocking_SubSys" | chart max(extip) as "# of dropped" over _time

[Blocked_country_count(1)]
args = ServerName
definition = module="IPBlocking_SubSys" | iplocation extip | chart count by Country

[Blocked_Sources(1)]
args = ServerName
definition = module="IPBlocking_SubSys" | chart count by extip

