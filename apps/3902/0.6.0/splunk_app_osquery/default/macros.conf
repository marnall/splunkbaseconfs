# timesince
# -----------------------------
# makes a human readable description of the amount of time since a device was observed
#
[timesince(2)]
args = sourceField,destField
definition = eval now=time() | eval $destField$ = case( $sourceField$ > now, "0 minutes ago", now-$sourceField$ > (2*86400), round((now-$sourceField$) / (86400)) . " days ago", now-$sourceField$ > (2*3600), round((now-$sourceField$) / (3600)) . " hours ago", now-$sourceField$ > (2*60), round((now-$sourceField$) / (60)) . " minutes ago", now-$sourceField$ > 60, "1 minute ago", now-$sourceField$ <= 60, "just now" ) | fields - now
iseval = 0

# getosqueryid
# -----------------------------
# parse the osquery query hash from the job identifier. This hash will match the string that used to launch the query.
#
[getosqueryid(2)]
args = sourceField,destField
definition = eval $destField$=substr($sourceField$,0,32)
iseval = 0

# getqueryforhash
# -----------------------------
# do a lookup to get the query for a given hash
#
[getosqueryforhash(2)]
args = sourceField,destField
definition = lookup osquery_job_hashes hash as $sourceField$ OUTPUTNEW query as $destField$ 
iseval = 0

# getosqueryforid
# -----------------------------
# do a lookup to get the query for a given query ID
#
[getosqueryforid(2)]
args = sourceField,destField
definition = `getosqueryid($sourceField$,$sourceField$_hash)` | `getosqueryforhash($sourceField$_hash,$destField$)` 
iseval = 0

# osqueryofflinethreshold
# -----------------------------
# the amount of time before a client is considered offline if it has not checked in within the
# given number of seconds
#
[osqueryofflinethreshold]
definition = 900

# removesqlcomments
# -----------------------------
# strip SQL comments from the given field
#
[removesqlcomments(2)]
args = sourceField,destField
definition = eval $destField$=replace($sourceField$, "--.*[\n]", "")

[removesqlcomments(1)]
args = sourceField
definition = `removesqlcomments($sourceField$,$sourceField$)`
