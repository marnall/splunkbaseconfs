[osquery - Populate Saved Queries]

# People don't need to see this
is_visible = false

# Run the search command to populate the list of queries
search = | populateosquery

# Run at midnight; this should be a noop since this runs on startup
# It also appears that Splunk runs the searches with run_on_startup upon app install even though Splunk itself wasn't restarted
cron_schedule = 0 * * * *
enableSched = 1

# Only run once per run-time. This resets once Splunk is restarted but the search command is idempotent so that is ok.
run_n_times = 1

# Run on startup so that the data gets pulled in before the user opens the app
run_on_startup = true

# Dispatch times are ignored since this is a search command but are being provided to avoid a warning in app certification warnings
dispatch.earliest_time = -24h
dispatch.latest_time = now

[osquery - Populate Query Status Lookup]

# People don't need to see this
is_visible = false

# Populate the lookup containing the query statuses
search = index=_internal sourcetype=osquery_rest_handler "Query status updated" | fields client query_id _time status | append[| inputlookup append=t osquery_job_statuses] | stats max(_time) as _time, latest(status) as status by client, query_id | outputlookup osquery_job_statuses
cron_schedule = */5 * * * *
enableSched = 1

dispatch.earliest_time = -5m@m
dispatch.latest_time = now
