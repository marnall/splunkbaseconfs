[saved_osqueries_lookup]
collection = saved_osqueries
external_type = kvstore
fields_list = _key,name,query

[osquery_enrollment_lookup]
collection = osquery_enrollment
external_type = kvstore
fields_list = _key,_time,client_data,client
#time_field = _time

[osquery_checkin]
collection = osquery_checkin
external_type = kvstore
fields_list = _key,_time,client
#time_field = _time

[osquery_jobs]
collection = osquery_jobs
external_type = kvstore
fields_list = _key,_time,client,status,job
#time_field = _time

[osquery_job_hashes]
collection = osquery_job_hashes
external_type = kvstore
fields_list = _key,query,hash

[osquery_job_statuses]
collection = osquery_job_statuses
external_type = kvstore
fields_list = _key,_time,client,query_id,status

[sourcetype_for_osquery_stash]
REGEX    = sourcetype=\"([^"]+)
FORMAT   = sourcetype::$1
DEST_KEY = MetaData:Sourcetype

[sinkhole_osquery_stash_header]
REGEX    = (?s)sourcetype=\"(?:[^"]+)\"(.*)
FORMAT   = $1
DEST_KEY = _raw
## Do not truncate _raw to 4096 bytes
LOOKAHEAD = -1
