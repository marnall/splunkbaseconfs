[saved_osqueries]
field.name = string
field.query = string
field.enabled = bool
replicate = true

[osquery_checkin]
field.client = string
field._time = time
accelerated_fields._time = { "_time": -1 }

# _key == the instance_id from the osquery client upon enrollment
[osquery_enrollment]
field.client = string # A description of the client (like the hostname or IP)
field.client_data = string # This will store the data that the client provides upon enrollment
field._time = time

# _key could be the job ID
[osquery_jobs]
field.client = string
field._time = time
field.job = string
field.status = string
accelerated_fields._time = { "_time": -1 }

[osquery_job_hashes]
field.query = string
field.hash = string

[osquery_job_statuses]
field._time = time
field.client = string
field.query_id = string
field.status = string
accelerated_fields._time = { "_time": -1 }

[osquery_input_configuration]
field.input_name = string
field.namespace = string
field.configuration = time