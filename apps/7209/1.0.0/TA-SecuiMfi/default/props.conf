[secui:log]
SHOULD_LINEMERGE = false
TRANSFORMS-force_sourcetype_secui = force_sourcetype_secui

[secui:raw]
TIME_PREFIX = ^
SHOULD_LINEMERGE = false
KV_MODE = none
EVAL-vendor                                     = "Secui"
EVAL-product                                    = "MFI"
EVAL-vendor_product								= "Secui MFI"
REPORT-secui_raw_extract                     	= secui_raw_extract

FIELDALIAS-src = src_ip as src
FIELDALIAS-dest = dest_ip as dest
FIELDALIAS-signature = eventName as signature

EVAL-protocol = lower(protocol)
EVAL-transport = lower(protocol)
EVAL-action = case(action=="Detect","allowed", action=="Block","blocked")

# lookup
LOOKUP-secui_severity_lookup = secui_severity_lookup severity_id OUTPUT severity

[secui:packet]
TIME_PREFIX = ^
SHOULD_LINEMERGE = false
KV_MODE = none
EVAL-vendor                                     = "Secui"
EVAL-product                                    = "MFI"
EVAL-vendor_product								= "Secui MFI"
REPORT-secui_packet_extract                     = secui_packet_extract

