
[Saviynt]
REPORT-ccx_saviynt_vendor_message = ccx_saviynt_vendor_message
REPORT-ccx_saviyntevents_message = ccx_saviyntevents_message
REPORT-ccx_saviyntevents_transform = ccx_saviyntevents_transform

EVAL-action = case((('Object_Type' IN ("APPLICATION", "ARCHIVAL", "HANARULE") OR ('Object_Type'=="ANALYTICS" AND like('Message', "%RUN%"))) AND NOT ('Object_Type'=="ARCHIVAL" AND like('Message', "%requested to see%"))), case(like('Message', "%restart%"), "restarted", like('Message', "%create%") OR like('Message', "%Create%"), "created", like('Message', "%RUN%"), "started"), (('Object_Type' IN ("ACCOUNTS", "ANALYTICS", "CONNECTIONS", "DATA_ANALYZER", "ECM_EMAIL_TEMPLATE", "ENDPOINT", "ENTITLEMENTS", "ENTITLEMENT_TYPE", "GLOBAL_CONFIGURATION", "JOB_CONTROL", "New", "ORGANIZATION", "PASSWORD_POLICY", "ROLE", "SAVROLE", "SECURITY_SYSTEM", "USERS", "User_Groups", "uration") OR (isnull('Object_Type') AND isnotnull('Message')) OR ('Object_Type'=="ARCHIVAL" AND like('Message', "%requested to see%")))), case(like('Message', "%create%") OR like('Message', "%Create%"), "created", like('Message', "%delete%") OR like('Message', "%Delete%"), "deleted", like('Message', "%modif%") OR like('Message', "%Modif%") , "modified", like('Message', "%update%") OR like('Message', "%Update%") OR 'Action_Taken'=="Update", "updated", like('Message', "%upload%") OR like('Message', "%Upload%"), "uploaded", like('Message', "%download%") OR like('Message', "%Download%"), "downloaded", like('Message', "%request%") OR like('Message', "%Request%") OR like('Message', "%cliked%") OR like('Message', "%Cliked%") OR 'Action_Taken'=="Show" OR like('Message', "%open%") OR like('Message', "%Open%"), "read", like('Message', "%Revoke%") OR like('Message', "%Remove%") OR like('Message', "%remove%"), "revoked", like('Message', "%Disable%"), "disabled"))
EVAL-app = case((('Object_Type' IN ("ACCOUNTS", "ANALYTICS", "CONNECTIONS", "DATA_ANALYZER", "ECM_EMAIL_TEMPLATE", "ENDPOINT", "ENTITLEMENTS", "ENTITLEMENT_TYPE", "GLOBAL_CONFIGURATION", "JOB_CONTROL", "New", "ORGANIZATION", "PASSWORD_POLICY", "ROLE", "SAVROLE", "SECURITY_SYSTEM", "USERS", "User_Groups", "uration") OR (isnull('Object_Type') AND isnotnull('Message')) OR ('Object_Type'=="ARCHIVAL" AND like('Message', "%requested to see%")))), "Saviynt")
EVAL-change_type = case((('Object_Type' IN ("APPLICATION", "ARCHIVAL", "HANARULE") OR ('Object_Type'=="ANALYTICS" AND like('Message', "%RUN%"))) AND NOT ('Object_Type'=="ARCHIVAL" AND like('Message', "%requested to see%"))), case(like('Message', "%application%"), "filesystem", like('Message', "%User%") OR like('Message', "%user%"), "AAA", like('Message', "%RUN%"), "Analytics Control", like('Message', "%Rule Created%"), "Rule"))
EVAL-object_category = case((('Object_Type' IN ("APPLICATION", "ARCHIVAL", "HANARULE") OR ('Object_Type'=="ANALYTICS" AND like('Message', "%RUN%"))) AND NOT ('Object_Type'=="ARCHIVAL" AND like('Message', "%requested to see%"))) OR (('Object_Type' IN ("ACCOUNTS", "ANALYTICS", "CONNECTIONS", "DATA_ANALYZER", "ECM_EMAIL_TEMPLATE", "ENDPOINT", "ENTITLEMENTS", "ENTITLEMENT_TYPE", "GLOBAL_CONFIGURATION", "JOB_CONTROL", "New", "ORGANIZATION", "PASSWORD_POLICY", "ROLE", "SAVROLE", "SECURITY_SYSTEM", "USERS", "User_Groups", "uration") OR (isnull('Object_Type') AND isnotnull('Message')) OR ('Object_Type'=="ARCHIVAL" AND like('Message', "%requested to see%")))), 'Object_Type')
EVAL-src = 'IP_Address'
EVAL-status = case((('Object_Type' IN ("APPLICATION", "ARCHIVAL", "HANARULE") OR ('Object_Type'=="ANALYTICS" AND like('Message', "%RUN%"))) AND NOT ('Object_Type'=="ARCHIVAL" AND like('Message', "%requested to see%"))), if(like('Message', "%fail%") OR like('Message', "%Fail%"), "failure", "success"))
EVAL-user = 'Accessed_By'
EVAL-vendor_product = "Saviynt"

LOOKUP-ccx_saviyntevents_lookup = ccx_saviyntevents_lookup Object_Type OUTPUT dataset_name
