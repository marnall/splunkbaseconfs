
[ccx_saviyntevents_certificates]
search = (sourcetype="Saviynt") (dataset_name="certificates")
# tags = certificate

[ccx_saviyntevents_change]
search = (sourcetype="Saviynt") (dataset_name="change" OR (Object_Type="ANALYTICS" AND Message="*RUN*") AND NOT (Object_Type="ARCHIVAL" AND Message="*requested to see*"))
# tags = change

[ccx_saviyntevents_data_access]
search = (sourcetype="Saviynt") (dataset_name="data" OR ("Object Type"="" AND Message="*") OR (Object_Type="ARCHIVAL" AND Message="*requested to see*")) AND NOT Message="*Failed*" AND NOT (Object_Type="ANALYTICS" AND Message="*RUN*")
# tags = data access

[ccx_saviyntevent_failed_system_processing]
search = (sourcetype="Saviynt") (Message="*Failed System Processing*")
