
[ccx_saviynt_vendor_message]
CLEAN_KEYS = 0
REGEX = .+\\\"message\\\"\:\\\"(?<vendor_message>[^\\]+)\\\".+

[ccx_saviyntevents_message]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = ([^\:\"\,\s\{\[]+)\:([^\:\"\,\}]+)\,
SOURCE_KEY = 

[ccx_saviyntevents_transform]
FORMAT = $1::$2
REGEX = \"([^\"]+)\"\:\s+\"([^\"\{]+)\"

[ccx_saviyntevents_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_saviyntevents_lookup.csv
