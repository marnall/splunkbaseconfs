[source::...ta-fints*.log*]
NO_BINARY_CHECK = true
sourcetype = tafints:log

[source::...ta_fints*.log*]
NO_BINARY_CHECK = true
sourcetype = tafints:log

[tafints:log]
pulldown_type = 1
EXTRACT-status,account,blz,user,endpoint,iban,message = FinTS\sLogging\s\-\s(Status\:(?<status>[^\,]+)\,\s)?(Account\:(?<account>[^\,]+)\,\s)?(BLZ\:(?<blz>[^\,]+)\,\s)?(User\:(?<user>[^\,]+)\,\s)?(Endpoint\:(?<endpoint>[^\,]+)\,\s)?(IBAN\:(?<iban>[^\,]+))?(\,\sMessage\:(?<message>.+))?$

[fints:transaction]
KV_MODE = JSON
LINE_BREAKER = \}([^\{]+)\{
MAX_TIMESTAMP_LOOKAHEAD = 512
TIME_FORMAT = %Y-%m-%d
TIME_PREFIX = \"date\":\"
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 0

[fints:balance]
INDEXED_EXTRACTIONS = JSON
MAX_TIMESTAMP_LOOKAHEAD = 512
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%d
TIME_PREFIX = \@\s
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 0

[fints:bankinformation]
DATETIME_CONFIG = CURRENT
INDEXED_EXTRACTIONS = JSON
KV_MODE = JSON
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 0

[fints:holding]
DATETIME_CONFIG = CURRENT
INDEXED_EXTRACTIONS = JSON
KV_MODE = JSON
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 0
