#
# ------------------------------------------
# STAGE B - extract from fields
# ------------------------------------------
#
# zorp/* processes log a session id; the following examples demonstrate the possible formats:
#   svc/ssh0:0 -> connection policy name = ssh0, connection counter = 0
#   svc/ssh0:0/ssh -> connection policy name = ssh0, connection counter = 0, proxy module = ssh
#   svc/ssh0:0/ssh/channel:0 -> connection policy name = ssh0, connection counter = 0, proxy module = ssh, proxy module subcomponent = channel, module subcomponent counter = 0
# the session id is a hierarchical concept. modules and subcomponents all create their own session id by appending something to the parents session id.
# we do only process the first three parts of the session id, as the following parts stem from internal structures of the proxies
# the session is mostly interesting as it logs the connection policy name as configured by the administrator
# there might also be session_ids that do not begin with svc/, they are not processed here:
#   szig/conn:372/stream -> internal use, is used for statistics gathering, usually the web interface connecting to the proxy to gather stats
#   dsp/dispatch:0 -> internal use, the dispatcher waits for incoming sessions and decides which proxy to start
EXTRACT-scb_b_session_policyonly = ^svc\/(?<connection_policy>[\w\d]+):(?<connection_counter>[\d:]+)$ IN session_id
EXTRACT-scb_b_session_module = ^svc\/(?<connection_policy>[\w\d]+):(?<connection_counter>[\d:]+)\/(?<connection_module>[^\/]+)$ IN session_id
EXTRACT-scb_b_session_subcomponent = ^svc\/(?<connection_policy>[\w+\d]+):(?<connection_counter>[\d:]+)\/(?<connection_module>[^\/]+)\/(?<connection_module_subcomponent>.+)$ IN session_id
#
# as outlined above, the session id is nested, so the same session might be visible under different session ids,
# e.g. when different proxy modules are logging. to simplify session handling, let's build a parent session id
# the parent session id is needed for transaction parsing, as not all messages of a particular connection log a
# connection_id
EXTRACT-scb_b_session_parent = (?<parent_session_id>svc\/([\w]+\/)?[^\/]+) IN session_id
#
# parse server address in message_kv
EXTRACT-scb_b_server_address = server_address='AF_INET\((?<dest_ip>[^:]+):\d+\)' IN vendor_message_kv
EXTRACT-scb_b_server_local = server_local='AF_INET\((?<src_ip>[^:]*):\d+\)' IN vendor_message_kv
#
# parse job id in message_kv:
# - indexerservice[16097]: LogID:82 scheduler(3): Delete jobs; jobs='(14969358437119426810)'
# - job_id='15107163845791056124', audit_trail='/var/lib/zorp/audit/19618063395655832358446/fa/audit-scb_http-1450280112-250.zat'
EXTRACT-scb_b_jobs_job_id = (jobs|job_id)='\(?(?<audit_trail_job_id>\d+)\)?' IN vendor_message_kv
#
# parse file name
# - zorp/scb_http[17730]: core.audit(4): (svc/KCYJXAiX5uUuQU3GCEX52/protect_and_http:1206/http): Starting audit trail file; fname='/var/lib/zorp/audit/19618063395655832358446/fb/audit-scb_http-1450280112-251.zat', compress='1', encrypt='0', sign='0', timestamping='0'
# - indexer.jobgenerator: INFO Adding index job to waiting completed jobs; job_id='15107163845791056124', audit_trail='/var/lib/zorp/audit/19618063395655832358446/fa/audit-scb_http-1450280112-250.zat'
EXTRACT-scb_b_parse_fname = (fname|audit_trail)='(?<audit_trail_file>[^']+)' IN vendor_message_kv
#
# parse username
# - zorp/scb_ssh[40249]: scb.audit(4): (svc/ognR3Y7WRYdApK99CAHSRx/test:102/ssh): Starting connection; connection='test', protocol='ssh', connection_id='471886145565584574c331', src_ip='192.168.1.252', src_port='59191', server_ip='10.0.0.1', server_port='22', gateway_username='', remote_username='mylogin'
