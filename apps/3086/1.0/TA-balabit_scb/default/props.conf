# - var7: zorp/scb_http[4086]: core.error(0): (nosession): 7f26f4000000-7f26f4022000 rw-p 00000000 00:00 0 
# - var8: zorp/scb_vnc[4075]: core.dump(9): (szig/conn:372/stream): data line 0x0000: 4F 4B 20 39 0A OK 9.
# - var9a: zorp/scb_vnc[9204]: core.stderr(3): (stderr): TelnetAuthenticationConfigurator(name="local_gw_auth", client_backend="local", local_user_database="local_gw_auth_ludb")<0A>
