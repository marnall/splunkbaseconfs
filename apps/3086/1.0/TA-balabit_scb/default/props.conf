# - var4: zorp/scb_ssh[45069]: scb.info(4): (svc/ssh_conn_with_external_plugin:0/ssh): Plugin: Received notification about session end; call_count='1'
# - var5: zorp/scb_telnet[29726]: telnet.error(1): (svc/telnet_test_connection:0/telnet): Error writing audit trail, exiting;
