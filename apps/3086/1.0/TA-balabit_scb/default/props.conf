EXTRACT-scb_a_backup_var2 = (?<process>scb\/backup(-[\w+\-]+)?)\[(?<process_id>[0-9]+)\]:?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>Starting\s*backup\s*of\s*connection)\s*'(?<connection_policy>[^'\n]+)'$
EXTRACT-scb_a_backup_var3 = (?<process>scb\/backup(-[\w+\-]+)?)\[(?<process_id>[0-9]+)\]:?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n;]*);\s*(?<vendor_submessage>[^;\n=]+)(;|\.|\s)*$
EXTRACT-scb_a_backup_var4 = (?<process>scb\/backup(-[\w+\-]+)?)\[(?<process_id>[0-9]+)\]:?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n:]*):\s*(?<vendor_submessage>[^\n=]+\w)(:|\.|\s)*$
EXTRACT-scb_a_backup_var5 = (?<process>scb\/backup(-[\w+\-]+)?)\[(?<process_id>[0-9]+)\]:?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n:]*):\s*('(?<vendor_submessage>[^\n=]+)')(:|\.|\s)*$
