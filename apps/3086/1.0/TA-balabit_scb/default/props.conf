######################################################
#
# Balabit Shell Control Box Add-On for Splunk
#
######################################################

[BalaBit:ShellControlBox]
# do extract key/value pairs
KV_MODE = auto
# custom settings for import
SHOULD_LINEMERGE = false
#
# ==========================================
# field extractions
# ==========================================
#
# concept of the field extractions:
# there are some generic extractions, that match all messages of certain processes
# these generic extractions end up providing fields with non-normalized data (like vendor_message_kv)
# additional extractions are applied later to these non-normalized fields, some non-normalized fields are
# feed into a lookup
#
# ------------------------------------------
# STAGE A - extract from _raw
# ------------------------------------------
#
# rather large list of regexp, that also looks quite redundant. this is due to the log format; some processes output
# their log messages in slightly different formats. as the goal is to match as restrictive as possible, regular expressions
# are tied to and applied per process
#
# this does extract all messages by scb/web. messages might have the following variants:
# - var1: scb/web: INFO (admin@192.168.2.40) Configuration is changed by admin@192.168.2.40 on backend BasicNetwork
# - var2: scb/web: INFO (admin@192.168.2.40) Element at /config/xcb/networking/interfaces/interface[@type = 'internal']/enabled changed from yes to no
#         scb/web: INFO (admin@10.110.30.52) Element at  changed from (none) to system_health_load_average     ## (object is empty)
# - var3: scb/web: INFO (admin@10.110.30.47) Element removed: /config/scb/pol_connections/connections[@proto = 'telnet']/connection[@name = 'telnet_pattern_test']
#         scb/web: INFO (admin@192.168.2.40) New element added: /config/scb/pol_audit/audit/encryption/upstream_encryption/certificate_groups
# ----> note: vendor_message extracted by var2/3 are overwritten again later
# - var4: has only one message, no kv and no submessage
# - var5: has one message, one kv
# - var6: has one message, one submessage
# - var7: has one message, one submessage, one kv
# - var8: has one message, one special kv -> begins with cmd, contains semicolons
# - var9: contains no user@host part, only for debug messages -> matched if 15 first characters are not (
EXTRACT-scb_a_web_var1 = (?<process>scb\/web):?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n;]+)\s+by\s+[^\s]+\s+on\s+(?<change_type>backend)\s+(?<object>[^\s]+)\s*(;|\.|\s)*$
EXTRACT-scb_a_web_var2 = (?<process>scb\/web):?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*Element\s+at\s+(?<object>.+)?\s+(changed)\s+from\s+(?<vendor_oldvalue>[^\s]+)\s+to\s+(?<vendor_newvalue>[^\s]+)(;|\.|\s)*$
EXTRACT-scb_a_web_var3 = (?<process>scb\/web):?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(New\s+)?(E|e)lement\s+(added|removed):\s+(?<object>[^\n]+)(;|\.|\s)*$
EXTRACT-scb_a_web_var4 = (?<process>scb\/web):?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n;]+)(;|\.|\s)*$
EXTRACT-scb_a_web_var5 = (?<process>scb\/web):?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n;]*);\s*(?<vendor_message_kv>[^;\n]+=[^;\n]+)(;|\.|\s)*$
EXTRACT-scb_a_web_var6 = (?<process>scb\/web):?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n;]*);\s*(?<vendor_submessage>[^;\n=]+)(;|\.|\s)*$
EXTRACT-scb_a_web_var7 = (?<process>scb\/web):?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n;]*);\s*(?<vendor_submessage>[^;\n=]+);\s*(?<vendor_message_kv>[^;\n]+)(;|\.|\s)*$
EXTRACT-scb_a_web_var8 = (?<process>scb\/web):?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n;]*);\s*(?<vendor_message_kv>cmd=.+)$
EXTRACT-scb_a_web_var9 = (?<process>scb\/web):?\s*(?<vendor_message>[^\(]{15}.+)$
#
# the scb/archive logs, which might have the following variants:
# - var1: scb/archive[2820]: INFO (root@localhost) Archive (rdp0): No files/directories to be archived -> refers to an archive name
# - var2: scb/archive[2801]: INFO (root@localhost) Archive (ssh0): Starting archive Connection 'ssh0' archive
# - var3: scb/archive[2820]: Sending mail; to='admin@demo.local' -> is a generic log message
# - var4: scb/archive[26758]: ERROR (root@localhost) Failed to create archive directory; directory='/opt/scb/mnt/203654272354b0a3ca58911/ssh/archiveTestConnection/2015-01-12/'; details='mkdir(): Read-only file system' -> is a generic log message
EXTRACT-scb_a_archive_var1 = (?<process>scb\/archive)\[(?<process_id>[0-9]+)\]:?\s*(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*Archive\s*\((?<archive>[^\(]+)\):\s*(?<vendor_message>[^\n']+)$
EXTRACT-scb_a_archive_var2 = (?<process>scb\/archive)\[(?<process_id>[0-9]+)\]:?\s*(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*Archive\s*\((?<archive>[^\(]+)\):\s*(?<vendor_message>Starting archive)\s*(?<vendor_submessage>[^\n]+)$
EXTRACT-scb_a_archive_var3 = (?<process>scb\/archive)\[(?<process_id>[0-9]+)\]:?\s*(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n;]*);\s*(?<vendor_message_kv>[^;\n]+=[^;\n]+)(;|\.|\s)*$
EXTRACT-scb_a_archive_var4 = (?<process>scb\/archive)\[(?<process_id>[0-9]+)\]:?\s(?<vendor_severity>[^\(]*)\((?<src_user>[^@]*)@(?<src_host>[^\)]+)\)\s*(?<vendor_message>[^\n;]*);\s*(?<vendor_message_kv>[^;\n]+);\s*details='(?<vendor_submessage>[^;\n]+)'(;|\.|\s)*$
