######################################################
#
# Balabit Shell Control Box Add-On for Splunk
#
######################################################

[scb_classification]
filename = scb_classification.csv
max_matches = 5
min_matches = 0
match_type = WILDCARD(process), WILDCARD(vendor_message)

[scb_service_names]
default_match = unknown
filename = scb_service_names.csv
max_matches = 1
min_matches = 1

[scb_vendor_severity]
default_match = unknown
filename = scb_vendor_severity.csv
max_matches = 1
min_matches = 1

[scb_snmp]
REGEX = ([^:]+)::([^\.]+)\.("?)([^"]*)\3 = \"*([^\"]*)\"*(?= |\n|$)
FORMAT = $2::$5

[scb_parse_snmp_data]
REGEX = ([^:]+)::([^\.]+)\.("?)([^"]*)\3 = \"*([^\"]*)\"*(?= |\n|$)
FORMAT = snmp_mib::$1 snmp_index::$4 snmp_object::$2 $2::$5 snmp_value::$5
