EXTRACT-Query = (?=[^q]*(?:,query,))^(?P<LogTime>[^,]+),(?P<APICall>\w+),(?P<ResponseTime>\d+),(?P<LinkedServer>[^,]+),(?P<Table>[^,]+),(?P<QueryLocator>\d+\w+)
EXTRACT-QueryMore = (?=[^q]*(?:,queryMore,))^(?P<LogTime>[^,]+),(?P<APICall>\w+),(?P<ResponseTime>\d+),(?P<LinkedServer>[^,]+),(?P<Table>[^,]+),(?P<QueryLocator>\d+\w+)
EXTRACT-Login = (?=[^l]*(?:,login,))^(?P<LogTime>[^,]+),(?P<APICall>\w+),(?P<ResponseTime>\d+),(?P<LinkedServer>.+)
EXTRACT-getDeleted = (?=[^g]*(?:,getDeleted,))^(?P<LogTime>[^,]+),(?P<APICall>\w+),(?P<ResponseTIme>\d+),(?P<LinkedServer>\w+)
EXTRACT-Delete = (?=[^d]*(?:,delete,))^(?P<LogTime>[^,]+),(?P<APICall>\w+),(?P<ResponseTime>\d+),(?P<LinkedServer>.+)
EXTRACT-Update = (?=[^u]*(?:,update,))^(?P<LogTime>[^,]+),(?P<APICall>\w+),(?P<ResponseTime>\d+),(?P<LinkedServer>\w+),(?P<Table>.+)
EXTRACT-Create = (?=[^c]*(?:,create,))^(?P<LogTime>[^,]+),(?P<APICall>\w+),(?P<ResponseTime>\d+),(?P<LinkedServer>\w+),(?P<Table>.+)
EXTRACT-Refresh = (?=[^S]*(?:SF_Refresh,|S.*SF_Refresh,))^(?P<Type>\w+),(?P<SPName>[^,]+),(?P<LogTime>[^,]+),(?P<LinkedServer>[^,]+),(?P<Table>[^,]+),(?P<RunTimeSeconds>\d+),(?P<Failed>[^,]+),(?P<RowsUpdatedOrInserted>[^,]+),(?P<RowsDeleted>\d+)
