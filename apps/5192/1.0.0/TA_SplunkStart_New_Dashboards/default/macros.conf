[mac_compare_day_and_month_rank(5)]
args = ind, src, function, field, splitby
definition = index=$ind$ sourcetype=$src$ earliest=-30d@d  | stats $function$($field$) as month_$field$ by $splitby$ | sort 10 - month_$field$ | streamstats count as MonthRank | append [search index=$ind$ sourcetype=$src$ earliest=-1d@d | stats $function$($field$) as day_$field$ by $splitby$ | sort 10 - day_$field$ | streamstats count as DayRank] | stats first(MonthRank) as MonthRank first(DayRank) as DayRank by $splitby$ | eval Difference=DayRank-MonthRank | sort DayRank | table DayRank, $splitby$, Difference, MonthRank
iseval = 0

