[Lookup gen - populate user identities - macos_identities.csv]
action.email.show_password = 1
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 56 * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","eventtype","user","user_id","action","reason"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = TA-add-on-for-apple-unified-logging
request.ui_dispatch_view = search
schedule_window = 5
search = eventtype=macos_event SM_GetSessionRoleAccount UserID UserName \
| dedup host, UserID \
| rename UserID as user_id, UserName as user, UserGUID as user_guid, HomeDirectoryPath as user_homedir, GroupID as user_group_id\
| eval is_recent = "1"\
| table host user_id user user_guid user_homedir user_group_id is_recent\
| append [| inputlookup  macos_identities.csv | eval is_recent = "0"]\
| dedup host user_id sortby -is_recent\
| outputlookup macos_identities.csv override_if_empty=false
