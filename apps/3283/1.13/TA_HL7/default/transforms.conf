#-------------------------
# Remove non-HL7 Events
#-------------------------
[non_events]
REGEX = ^(?!MSH\|)
DEST_KEY = queue
FORMAT = nullQueue

#-------------------------
# HL7 Segment Extractions
#-------------------------
[HL7_Segment_Template]
REGEX = ^([A-Z]{2}[A-Z0-9]{1})\|([^\n]+)(\n|$)
FORMAT = $1::$2
#------------
# MV_ADD is used to place repeating HL7 segments into their own
# multi-value field.
#------------
MV_ADD = true

#-----------------------
# HL7 Field Extractions
