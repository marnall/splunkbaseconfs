[script://$SPLUNK_HOME/etc/apps/splunk_ta_onelogin/bin/onelogin_users.py]
interval = 60
sourcetype = onelogin:user
index = onelogin_roll
passAuth = splunk-system-user
python.version = python3

[script://$SPLUNK_HOME/etc/apps/splunk_ta_onelogin/bin/onelogin_events.py]
interval = 600
sourcetype = onelogin:event
index = onelogin
passAuth = splunk-system-user
python.version = python3

[script://$SPLUNK_HOME/etc/apps/splunk_ta_onelogin/bin/onelogin_lookups.py]
interval = 86400
passAuth = splunk-system-user
python.version = python3

[onelogin_modinput_cred]
python.version = python3