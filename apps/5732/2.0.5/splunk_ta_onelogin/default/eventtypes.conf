[onelogin_event_user_changed_password]
search = sourcetype = onelogin:event \
  event_type = onelogin_event_user_changed_password

[onelogin_event_user_logged_into_app]
search = sourcetype = onelogin:event \
  event_type = onelogin_event_user_logged_into_app \
  app_name != null

[onelogin_event_user_created_in_app]
search = sourcetype = onelogin:event \
  event_type = onelogin_event_user_created_in_app \
  app_name != null

[onelogin_event_user_assumed_user]
search = sourcetype = onelogin:event \
  event_type = onelogin_event_user_assumed_user

[onelogin_event_user_failed_onelogin_login]
search = sourcetype = onelogin:event \
  event_type = onelogin_event_user_failed_onelogin_login

[onelogin_event_user_logged_into_onelogin]
search = sourcetype = onelogin:event \
  event_type = onelogin_event_user_logged_into_onelogin

[onelogin_event_app_user_prov]
search = sourcetype = onelogin:event \
  (event_type = onelogin_event_user_created_in_app \
  OR event_type = onelogin_event_user_updated_in_app \
  OR event_type = onelogin_event_user_suspended_in_app \
  OR event_type = onelogin_event_user_reactivated_in_app \
  OR event_type = onelogin_event_user_deleted_in_app) \
  app_name != null

[onelogin_event_app_user_failed_prov]
search = sourcetype = onelogin:event \
  (event_type = onelogin_event_user_failed_suspending_in_app \
  OR event_type = onelogin_event_user_failed_reactivating_in_app \
  OR event_type = onelogin_event_user_failed_deleting_in_app \
  OR event_type = onelogin_event_user_failed_creating_in_app \
  OR event_type = onelogin_event_user_failed_updating_in_app \
  OR event_type = onelogin_event_app_reached_user_limit \
  OR event_type = onelogin_event_app_could_not_authenticate \
  OR event_type = onelogin_event_provisioning_exception) \
  app_name != null
