[bromium:bem]
KV_MODE = xml
BREAK_ONLY_BEFORE = <ucVM\s+
DATETIME_CONFIG = CURRENT
category = Network & Security
pulldown_type = 1
description = Malware event files produced by Bromium Endpoint Protection in XML format
TRUNCATE = 0
MAX_EVENTS = 100000

FIELDALIAS-category = ucVM.ucVMInfo.ucVMAlert{@str} as category
FIELDALIAS-dest = ucVM.ucVMInfo.ucVMHostName{@str} as dest
FIELDALIAS-dvc = ucVM.ucVMInfo.ucVMHostName{@str} as dvc
FIELDALIAS-file_name = ucVM.ucVMInfo.ucVMAppType{@str} as file_name
FIELDALIAS-file_path = ucVM.ucVMInfo.ucVMDocFilePath{@str} as file_path
FIELDALIAS-src = ucVM.ucVMInfo.ucVMDocFilePath{@str} as src
FIELDALIAS-user = ucVM.ucVMInfo.ucVMUserName{@str} as user
FIELDALIAS-signature = ucVM.ucVMInfo.ucvmAlertDesc as signature

EVAL-vendor = "Bromium"
EVAL-product = "Endpoint Protection"
EVAL-vendor_product = "Bromium Endpoint Protection"
EVAL-action = "blocked"
EVAL-file_hash = coalesce('ucVM.ucVMEventsGraph.graph.node.Properties{@MD5Hash}', 'ucVM.ucVMEventsGraph.graph.node.Properties{@SHA1Hash}')
EVAL-ids_type = "host"
EVAL-vendor_signature = coalesce('ucVM.ucVMEventsGraph.graph.node.Properties{@MD5Hash}', 'ucVM.ucVMEventsGraph.graph.node.Properties{@SHA1Hash}')
EVAL-signature_id = coalesce(mvindex('ucVM.ucVMEventsGraph.graph.node.Properties{@MD5Hash}',0), mvindex('ucVM.ucVMEventsGraph.graph.node.Properties{@SHA1Hash}',0))
EVAL-severity = lower('ucVM.ucVMInfo.ucVMSeverity{@str}')


