[xm_cluster_get_asset_type_name(1)]
args = f
definition = if(f=="*","xm_cluster_anomalies_asset_type_global", "xm_cluster_anomalies_asset_type_" + f)
iseval = 1

[xm_cluster_get_extracted_source_name(1)]
args = f
definition = if(f=="*","xm_cluster_anomalies_extracted_source_global", "xm_cluster_anomalies_extracted_source_" + f)
iseval = 1

[xm_cluster_get_signal_name(1)]
args = f
definition = if(f=="*","xm_cluster_anomalies_signal_global", "xm_cluster_anomalies_signal_" + f)
iseval = 1

[xm_modvizpredict(5)]
args= v, a, f, h, ci
definition = predict "$v$" as prediction algorithm=$a$ future_timespan=$f$ holdback=$h$ lower$ci$=lower$ci$ upper$ci$=upper$ci$ | eval _algor="$a$", _ft=$f$, _hb=$h$, _var="$v$", _ci=$ci$

[xm_predict_get_extracted_source_name(1)]
args = f
definition = if(f=="*","xm_predict_anomalies_extracted_source_global", "xm_predict_anomalies_extracted_source_" + f)
iseval = 1
