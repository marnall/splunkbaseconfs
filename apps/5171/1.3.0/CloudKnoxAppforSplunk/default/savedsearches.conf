[cloudknox_super_identities_snapshot]
cron_schedule = */30 * * * *
description = This savedsearch updates cloudknox_si_snapshot KV store lookup to contain the latest super identities.
disabled = 1
run_on_startup = true
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = CloudKnoxAppforSplunk
request.ui_dispatch_view = search
search = `cloudknoxindex` sourcetype="cloudknox:*:identities_super" source=cloudknox id != "" | dedup id | fields asId, asName, name, type, id, tasksGranted | eval reported_identity="T", dup_id=id | append [| inputlookup cloudknox_si_snapshot] | stats values(dup_id) as dup_id, values(name) as name, values(type) as type, values(asId) as asId, values(asName) as asName, values(tasksGranted) as tasksGranted, values(reported_identity) as reported_identity, values(previous_identity) as previous_identity by id | outputlookup append=true cloudknox_si_alert | table dup_id, asId, asName, id, name, type, tasksGranted, reported_identity | rename reported_identity as previous_identity | outputlookup key_field=dup_id append=true cloudknox_si_snapshot

[cloudknox_super_identities_alert]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = This alert is generated when any new super identity is added.
disabled = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = CloudKnoxAppforSplunk
request.ui_dispatch_view = search
search = | inputlookup cloudknox_si_alert | where isnull(previous_identity) | eval magic_flag=if(isnull(magic_flag),"N", "Y") | where magic_flag=="N"  | fields - dup_id | outputlookup cloudknox_si_alert | table asId, asName, id, name, tasksGranted, type
