[syslog]
TRANSFORMS-utmsource = utmsource

[UTM:SecureWeb]
EXTRACT-domain = (?i)://(?P<domain>[^/]+)
FIELDALIAS-SecureWeb = action AS vendor_action chgs AS object_attrs content_type AS http_content_type dest_ip AS dest dstip AS dest fullreqtime AS duration hash AS file_hash host AS src instance AS mount key_path AS path mode AS file_acl object AS file_name object_path AS file_path pid AS process_id registry_type AS vendor_action signature AS package_title signature_id AS package signature_message AS body size AS bytes sourcetype AS object srcip AS src statuscode AS status uid AS user

[SecureWeb]
FIELDALIAS-CIM Web Aliases = content_type AS http_content_type dstip AS dest fullreqtime AS duration size AS bytes srcip AS src statuscode AS status

[SecureNet]

[UTM:SecureNet]
FIELDALIAS-SecureNet CIM fields = action AS vendor_action chgs AS object_attrs content_type AS http_content_type dest_ip AS dest dstip AS dest dstmac AS dest_mac dstport AS dest_port fullreqtime AS duration fwrule AS rule hash AS file_hash host AS dvc initf AS src_interface instance AS mount key_path AS path length AS bytes mode AS file_acl modtime AS file_modify_time object AS file_name object_path AS file_path outitf AS dest_interface pid AS process_id proto AS protocol registry_type AS vendor_action signature AS package_title signature_id AS package signature_message AS body size AS file_size sourcetype AS object srcip AS src srcmac AS src_mac srcport AS src_port statuscode AS status uid AS user

[UTM:dhcpd]
EXTRACT-hostname,request,ipaddr,macaddr,iface = ^(?:[^ \n]* ){6}(?P<hostname>[^ ]+) dhcpd: (?P<request>\w+) on (?P<ipaddr>[^ ]+) to (?P<macaddr>[^ ]+) via (?P<interface>\w+)
EXTRACT-hostname,request,macaddr,interface = ^(?:[^ \n]* ){6}(?P<hostname>[^ ]+) dhcpd: (?P<request>\w+)\s+\w+\s+(?P<macaddr>[^ ]+) via (?P<interface>.+)
