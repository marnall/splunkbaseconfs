
[top5(2)]
args = field,fieldAlias
definition = sort 0 - count \
| eval t=1 \
| streamstats sum(t) AS t \
| eventstats sum(eval(if(t>5,count,0))) AS OTHER \
| head 6 \
| eval $field$=if(t==6,"OTHER",'$field$'), count=if(t==6,OTHER,count) \
| fields - t,OTHER \
| rename count AS Count, "$field$" AS "$fieldAlias$"
iseval = 0

[user_session_details_Windows(1)]
args = sessionId
definition = tstats count from datamodel=OIT.useractivity where (nodename=useractivity useractivity.os=Windows useractivity.sessionId=$sessionId$ ) by useractivity.applicationName,useractivity.windowTitle \
| rename useractivity.* AS *\
| eval Activity=windowTitle." (".count.")" \
| stats values(Activity) AS Activity by applicationName \
| rename applicationName AS "Application Name"
iseval = 0

[user_session_details_MacOS(1)]
args = sessionId
definition = tstats count from datamodel=OIT.useractivity where (nodename=useractivity useractivity.os=MacOS useractivity.sessionId=$sessionId$ ) by useractivity.applicationName,useractivity.windowTitle \
| rename useractivity.* AS *\
| eval Activity=windowTitle." (".count.")" \
| stats values(Activity) AS Activity by applicationName \
| rename applicationName AS "Application Name"
iseval = 0

[user_session_details_Unix(1)]
args = sessionId
definition = tstats count AS "Activity Count"  from datamodel=OIT.useractivity where (nodename=useractivity useractivity.os=Unix useractivity.sessionId=$sessionId$) by useractivity.command,useractivity.CommandParams \
| rename useractivity.* AS *\
| eval Command=command." (".CommandParams.")" \
| table Command,"Activity Count"
iseval = 0

