##Keepit forwarded sourcetypes##
[jobs-monitor]
TRANSFORMS-ccx_keepit_jobs_monitor = set_keepit_jobs_monitor

[audit-logs]
TRANSFORMS-ccx_keepit_audit_logs = set_keepit_audit_logs


[ccx:keepit:audit-logs]
KV_MODE = json
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
category = CCX Keepit HEC JSON
disabled = false
pulldown_type = 1

##################Support documentation####################################################
#https://help.keepit.com/support/solutions/articles/6000262832-using-the-keepit-audit-log##
###########################################################################################

EVAL-dataset_name = case(match('event',".*SSO.*|.*MFA.*|.*SIEM.*"),"security_alert",match('event',".*RTBF.*"),"compliance_alert",match('event',".*authentication.*"),"authentication",match('event',".*(D|d)ownload.*|.*(P|p)review.*file.*|.*(B|b)rowse.*data.*"),"data_access")
EVAL-object = 'metadata.device' 
EVAL-object_attrs = 'acl' 
EVAL-change_type = case(match('metadata.device',"^Change.*user.*"),"AAA",match('metadata.device',"^Change.*company.*|^Change.*account.*|^Agrees to update.*"),"account",1=1,"filesystem") 
EVAL-result = 'event'
EVAL-dvc = replace('metadata.device',"(.*)\s+\-.*","\1")
EVAL-vendor_account = 'account' 
EVAL-object_path = if(isnotnull('metadata.path') AND 'metadata.path'!="/",'metadata.path',coalesce('metadata.pstfolder','metadata.zipfolder'))
EVAL-app = replace('metadata.device',"(.*)\s+\-.*","\1")
EVAL-description = if(isnotnull('description'),'description','event')
EVAL-body = if(isnotnull('description'),'description','event')
EVAL-signature = if(match('metadata.device',".*SSO.*|.*MFA.*|.*SIEM.*"),'metadata.device',null())
EVAL-email = if(isnotnull('user') AND user!="" AND user!="null" AND match('user',".*@.*"),'user',null())
EVAL-vendor = "Keepit"
EVAL-vendor_product = "Keepit"
EVAL-http_method = 'method'
EVAL-user = if(isnotnull('user') AND user!="" AND user!="null",'user',null())
EVAL-action = case(match(event,".*(F|f)ail.*authentication.*"),"failure",match(event,"^View.*|^Open.*|^Preview.*file.*|^Browse.*data.*"),"read",match(event,"^Create.*"),"created",match(event,"^Delete.*"),"deleted",match(event,"^Download.*|Attempted to download.*"),"downloaded",match(event,"^Change.*user.*|^Assign.*|.*(R|r)emove.*"),"modified",match(event,".*(S|s)igns out.*"),"logoff")
EVAL-src_ip = 'ipaddress'
EVAL-src = 'ipaddress'
EVAL-type = case(match('event',".*SSO.*|.*MFA.*|.*SIEM.*"),"alert",match('event',".*RTBF.*"),"event")

[ccx:keepit:jobs-monitor]
KV_MODE = json
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
category = CCX Keepit HEC JSON
disabled = false
pulldown_type = 1

##################Support documentation####################################################
#https://help.keepit.com/support/solutions/articles/6000221427-using-the-job-monitor#######
###########################################################################################

FIELDALIAS-vendor_type = type AS vendor_type
FIELDALIAS-action = status AS action
FIELDALIAS-body = description AS body

EVAL-vendor = "Keepit"
EVAL-vendor_product = "Keepit"
EVAL-user = if(isnotnull('user') AND user!="" AND user!="null",'user',null())
EVAL-type = case(action IN("unsuccessful","incomplete","cancelled"),"alert",action IN("inprogress","scheduled"),"event")
EVAL-app = trim(replace('body',"(?:.+\[){2}(.*)\]\{.*","\1"),"\[|\]")
EVAL-description = if(vendor_type="*download.*",'body',null())
EVAL-signature = tostring('status').":".tostring(replace('body',".*\{(.*)\}","\1"))
EVAL-severity = "unknown"

LOOKUP-ccx_keepit_jobmonitor_status = ccx_keepit_jobmonitor_status status vendor_type OUTPUTNEW description

