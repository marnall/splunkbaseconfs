####PARSE SOURCETYPES KEEPIT (HEC)####

[set_keepit_jobs_monitor]
REGEX = .
FORMAT = sourcetype::ccx:keepit:jobs-monitor
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_keepit_audit_logs]
REGEX = .
FORMAT = sourcetype::ccx:keepit:audit-logs
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

##Lookups##

[ccx_keepit_jobmonitor_status]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_keepit_jobmonitor_status.csv
match_type = WILDCARD(vendor_type)
max_matches = 1