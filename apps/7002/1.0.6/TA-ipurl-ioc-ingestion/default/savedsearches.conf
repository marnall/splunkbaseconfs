[ioc-opensourceIP]
action.webhook.enable_allowlist = 0
alert.severity = 1
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 1 * * *
description = This search combines all the IPs together into a single CSV file and removes duplicates. It runs once a day.
disabled = 1
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-ipurl-ioc-ingestion
request.ui_dispatch_view = search
search = | inputlookup ioc-opensourceIP.csv \
| inputlookup append=t compromised-ips.csv \
| inputlookup append=t ipblocklist.csv \
| dedup ip_address "Date Added" \
| rename ip_address AS ioc_ipaddress\
| outputlookup ioc-opensourceIP.csv override_if_empty=false

