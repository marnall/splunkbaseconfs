methods = POST, GET

[expose:TA_openweathermap_settings_specified]
pattern = TA_openweathermap_settings/*
methods = POST, GET, DELETE

[expose:TA_openweathermap_openweathermap_api]
pattern = TA_openweathermap_openweathermap_api
methods = POST, GET

[expose:TA_openweathermap_openweathermap_api_specified]
pattern = TA_openweathermap_openweathermap_api/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
