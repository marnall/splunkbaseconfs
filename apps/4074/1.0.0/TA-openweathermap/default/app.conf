# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 2

[launcher]
author = John Barnett
version = 1.0.0
description = The TA will allow the collection of data from openweathermap.org You will need an API key from here https://openweathermap.org/appid#get Select your location from here https://openweathermap.org/find and use the format London,uk or Auckland,nz as examples

[ui]
is_visible = 1
label = openweathermap
docs_section_override = AddOns:released

[package]
id = TA-openweathermap

[triggers]
reload.addon_builder = simple
reload.ta_openweathermap_account = simple
reload.ta_openweathermap_settings = simple
reload.passwords = simple

