[ezproxy:messages]
EXTRACT-ezproxy:messages_concurrent_transfers = ^.*Peak concurrent transfers (?<peak_concurrent_transfers>.[0-9]{0,5})
EXTRACT-ezproxy:messages_intrustion_attempts = ^.*Evading intrusion attempt from '(?<src>[0-9,a-z,A-Z].*)' for user '(?<user>[a-z,A-Z,0-9]*)'
EXTRACT-ezproxy:messages_peak_sessions = ^.*Peak sessions (?<peak_sessions>.[0-9]{0,6})
EXTRACT-ezproxy:messages_peak_virtual_hosts = ^.*Peak virtual hosts (?<peak_virtual_hosts>.[0-9]{0,8})
EXTRACT-ezproxy:messages_uuconnect_site = .* UUConnect host \'(?<site>.*)\'
EXTRACT-ezproxy:messages_uuconnect_getaddrinfo = .* getaddrinfo error (?<site>.*)\s
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%d %T
TIME_PREFIX = ^
pulldown_type = 1
FIELDALIAS-ezproxy:messages = src AS src_ip

[ezproxy:audit]
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%d %T
TIME_PREFIX = ^
pulldown_type = 1
FIELDALIAS-ezproxy:audit = src AS src_ip
REPORT-ezproxy:audit = REPORT-ezproxy:audit
LOOKUP-ezproxy:audit : LOOKUP-EZProxy_audit_actionstatus = actionstatus action_orig AS action_orig OUTPUTNEW action AS action

[ezproxy:spu]
MAX_TIMESTAMP_LOOKAHEAD = 30
SHOULD_LINEMERGE = 0
pulldown_type = 1
FIELDALIAS-ezproxy:spu = http_referrer AS http_referer src AS src_ip site AS spu_site url AS spu_url
LOOKUP-ezproxy_SPU_httpcode = httpstatus status AS status OUTPUTNEW status_description AS status_description status_type AS status_type
REPORT-ezproxy:spu = REPORT-ezproxy:spu

[ezproxy:urls]
MAX_TIMESTAMP_LOOKAHEAD = 30
SHOULD_LINEMERGE = 0
pulldown_type = 1
FIELDALIAS-ezproxy:urls = http_referrer AS http_referer src AS src_ip
LOOKUP-ezproxy_URL_httpcode = httpstatus status AS status OUTPUTNEW status_description AS status_description status_type AS status_type
REPORT-ezproxy:urls = REPORT-ezproxy:urls

[ezproxy:*]
LOOKUP-ezproxy:* = app sourcetype AS sourcetype OUTPUTNEW app AS app
