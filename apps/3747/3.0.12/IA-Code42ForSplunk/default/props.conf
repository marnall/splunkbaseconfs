[code42:alertlog]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TIME_PREFIX = timestamp
MAX_TIMESTAMP_LOOKAHEAD = 33
EVAL-vendor = "code42"
LOOKUP-users = code42_users userUid OUTPUTNEW username AS user
KV_MODE = json

[code42:computer]
FIELDALIAS-src_ip = address AS src_ip
FIELDALIAS-src = address AS src
FIELDALIAS-src_translated_ip = remoteAddress AS src_translated_ip
FIELDALIAS-dest = backupUsage{}.targetComputerName
TIME_PREFIX = "timestamp"
MAX_TIMESTAMP_LOOKAHEAD = 33
EVAL-vendor = "code42"
LOOKUP-users = code42_users userUid AS userUid OUTPUTNEW username AS user
KV_MODE = json

[code42:user]
EVAL-vendor = "code42"
TIME_PREFIX = "timestamp"
MAX_TIMESTAMP_LOOKAHEAD = 33
KV_MODE = json

[code42:org]
EVAL-vendor = "code42"
KV_MODE = json
LOOKUP-users = code42_users userUid AS userUid OUTPUTNEW username AS user

[code42:restore]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TIME_PREFIX = startDate
MAX_TIMESTAMP_LOOKAHEAD = 33
EVAL-vendor = "code42"
LOOKUP-users = code42_users userId AS acceptingUserId OUTPUTNEW username AS user
KV_MODE = json

[code42:security]
TIME_FORMAT = %s%3N
TIME_PREFIX = "timestamp"
MAX_TIMESTAMP_LOOKAHEAD = 50
FIELDALIAS-src_ip = deviceAddress AS src_ip
FIELDALIAS-src = deviceAddress AS src
EVAL-app_session_key = eventUid . "::" . host
EVAL-vendor = "code42"
KV_MODE = json
LOOKUP-users = code42_users userUid AS userUid OUTPUTNEW username AS user

[source::eventgen]
LINE_BREAKER = [\r\n]+
TRUNCATE = 20000
SHOULD_LINEMERGE = false

[source::...modularinput.log]
sourcetype = modularinput

[source::...restclient.log]
sourcetype = restclient

[source::...utilities.log]
sourcetype = utilities

[source::...processed_users.log]
sourcetype = processed_users

[restclient]
EVAL-func = coalesce(function, func)

[modularinput]
EVAL-func = coalesce(function, func)
