[t_extractSyslogPriority]
REGEX = ^\<(\d+)\>
FORMAT = syslogPriority::$1
WRITE_META = true
LOOKAHEAD = 6

[t_extractSyslogFacility]
INGEST_EVAL = syslogFacilityNumber=floor(syslogPriority/8)

[t_extractSyslogSeverity]
INGEST_EVAL = syslogSeverityNumber=(syslogPriority/8-floor(syslogPriority/8))*8

[syslogFacility]
filename = syslogFacility.csv

[syslogSeverity]
filename = syslogSeverity.csv

## Enable transform below if you want to strip syslog priority from the raw event
#[t_stripSyslogPriority]
#REGEX = ^\<\d+\>(.*)
#FORMAT = $1
#DEST_KEY = _raw

