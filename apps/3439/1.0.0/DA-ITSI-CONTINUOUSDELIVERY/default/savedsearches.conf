#*******
# - This saved search runs only run once when Splunk starts.
# - Populate all project management data to kvstore.
#*******
[DA-ITSI-CONTINUOUSDELIVERY_pm_sync]
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
cron_schedule = 0 0 1 * *
run_on_startup = true
run_n_times = 1
disabled = 0
search = (tag=continuous_delivery AND tag=project_management)| dedup id | sort 0 _time \
| eval _key = id \
| fields _key, id, summary, description, issue_type, priority, status, substatus, creator_display_name, creator_email_address, owner_display_name, owner_email_address, time_created, time_started_work, time_resolved, time_closed, time_modified, planned_duration, time_spent, project_id, project_name, planned_effort, lifecycle_id \
| outputlookup kv_project_management append=true key_field=_key

#*******
# - Scheduled saved search, run to update new data comes from REST API.
# - Populate new updated project manangement data to kvstore.
# - Find record by key then replace old fields with new values.
# NOTE: We should set earliest_time greater than cron interval at least 1 minute 
# to avoid event has _time outside of time overlap.
#*******
[DA-ITSI-CONTINUOUSDELIVERY_pm_update]
dispatch.earliest_time = -3m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */1 * * * *
disabled = 0
search = (tag=continuous_delivery AND tag=project_management)| dedup id | sort 0 _time \
| eval _key = id \
| fields _key, id, summary, description, issue_type, priority, status, substatus, creator_display_name, creator_email_address, owner_display_name, owner_email_address, time_created, time_started_work, time_resolved, time_closed, time_modified, planned_duration, time_spent, project_id, project_name, planned_effort, lifecycle_id \
| outputlookup kv_project_management append=true key_field=_key

