#*******
# Saved search to return release object and lifecycle_id
#*******
[DA-ITSI-CONTINUOUSDELIVERY_Inventory]
description = Inventory of Continuous Delivery
search = | `get-release(kv_name="kv_project_management", lifecycle_id=$lifecycle_id$)` \
| append [| `get-release(kv_name="kv_build_system", lifecycle_id=$lifecycle_id$)`] \
| append [| `get-release(kv_name="kv_test_system", lifecycle_id=$lifecycle_id$)`] \
| dedup Release \
| table Release
request.ui_dispatch_app = itsi
request.ui_dispatch_view = search

#*******
# Panels savedsearches
#*******
[DA-ITSI-CONTINUOUSDELIVERY_Unscoped_Efforts]
search = | inputlookup kv_project_management where lifecycle_id="$lifecycle_id$" planned_effort=null \
| table project_id, project_name, id, issue_type, priority, status, substatus, lifecycle_id, owner_display_name, owner_email_address, time_modified, summary, description
dispatch.earliest_time = earliest_time

[DA-ITSI-CONTINUOUSDELIVERY_Open_Efforts_by_Lifecycle]
search = | inputlookup kv_project_management where lifecycle_id="$lifecycle_id$" \
| search (status=New OR status=Open OR status=Reopened OR status=Untriaged OR status="To Do" OR status="In Progress" OR status="In Review") \
| mvexpand lifecycle_id \
| eval planned_effort = if(planned_effort="null" OR isnull(planned_effort), 0, planned_effort) \
| search planned_effort > 0 \
| stats count by lifecycle_id, planned_effort \
| eval total_effort= planned_effort * count \
| table lifecycle_id, total_effort \
| stats sum(total_effort) as total_effort_by_lifecycle_id by lifecycle_id \
| search lifecycle_id!=null AND lifecycle_id!="$lifecycle_id$" \
| sort -total_effort_by_lifecycle_id | rename total_effort_by_lifecycle_id as "Total Effort"
dispatch.earliest_time = earliest_time

[DA-ITSI-CONTINUOUSDELIVERY_Efforts_by_Lifecycle]
search = | inputlookup kv_project_management where lifecycle_id="$lifecycle_id$" \
| mvexpand lifecycle_id \
| eval planned_effort = if(planned_effort="null" OR isnull(planned_effort), 0, planned_effort) \
| search planned_effort > 0 \
| stats count by lifecycle_id, planned_effort \
| eval total_effort= planned_effort * count \
| table lifecycle_id, total_effort \
| stats sum(total_effort) as total_effort_by_lifecycle_id by lifecycle_id \
| search lifecycle_id!=null AND lifecycle_id!="$lifecycle_id$" \
| sort -total_effort_by_lifecycle_id \
| rename total_effort_by_lifecycle_id as "Total Effort"
dispatch.earliest_time = earliest_time

[DA-ITSI-CONTINUOUSDELIVERY_Percentage_Completed_Efforts_by_Lifecycle]
search = | inputlookup kv_project_management where lifecycle_id="$lifecycle_id$" \
| mvexpand lifecycle_id \
| eval planned_effort = if(planned_effort="null" OR isnull(planned_effort), 0, planned_effort) \
| search planned_effort > 0 \
| stats  \
sum(eval(if(status="Resolved" OR status="Closed", planned_effort, 0))) as total_complete_effort  \
sum(planned_effort) as total_effort \
by lifecycle_id \
| search lifecycle_id!="$lifecycle_id$" \
| eval percent_complete = round((total_complete_effort/total_effort)*100, 2) \
| rename percent_complete as "Percentage completed" \
| table lifecycle_id, "Percentage completed"
dispatch.earliest_time = earliest_time

[DA-ITSI-CONTINUOUSDELIVERY_Failed_Tests]
search = | inputlookup kv_test_system where lifecycle_id="$lifecycle_id$" AND status = "Failed" \
| mvexpand lifecycle_id  \
| table test_suite_id, id, pass_count, fail_count, skip_count \
| rename test_suite_id as "Test Plan", pass_count as "Pass Count", fail_count as "Fail Count", skip_count as "Skip Count"
dispatch.earliest_time = earliest_time


[DA-ITSI-CONTINUOUSDELIVERY_Failed_Builds]
search = | inputlookup kv_build_system where lifecycle_id="$lifecycle_id$" AND status = "Failed" \
| mvexpand lifecycle_id \
| table build_plan, id, status \
| rename build_plan as "Build Plan", status as "Status"
dispatch.earliest_time = earliest_time
