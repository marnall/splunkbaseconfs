[kv_project_management]
external_type = kvstore
collection = project_management
fields_list = _key, id, summary, description, issue_type, priority, status, substatus, creator_display_name, creator_email_address, owner_display_name, owner_email_address, time_created, time_started_work, time_resolved, time_closed, time_modified, planned_duration, time_spent, project_id, project_name, planned_effort, lifecycle_id

[kv_build_system]
external_type = kvstore
collection = build_system
fields_list = _key, id, lifecycle_id, build_plan, status, duration

[kv_test_system]
external_type = kvstore
collection = test_system
fields_list = _key, id, lifecycle_id, test_suite_id, status, duration, pass_count, fail_count, skip_count