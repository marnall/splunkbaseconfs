[set_forescout_nac]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::forescout:counteract:nac
SOURCE_KEY = _raw
REGEX = (?:NAC\sPolicy\sLog)

[set_forescout_threat]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::forescout:counteract:threat
SOURCE_KEY = _raw
REGEX = (?:Port\sbite)|(?:Scan\sevent)|(?:Manual\sevent)|(?:Block\sEvent)|(?:Mail\sAnomaly)|(?:Mail\sInfection)

[set_forescout_system]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::forescout:counteract:system
SOURCE_KEY = _raw
REGEX = (?:Uptime\s+\d+\s+seconds)|(?:(?<!NAC\sPolicy\s)Log:)|(?:System\sstatistics)|(?:Application\sstatus)
