#
# tcpdump examples
#

# searches for tcpdump data and decorates each event with the manufacturer
# associated with the MAC OUI
[Tcpdump - general visualization]
search = source=tcpdump | eval src_oui_prefix = upper(replace(substr(src_mac,1,8), ":", "")) | lookup oui_lookup base16 AS src_oui_prefix OUTPUT organization AS src_oui | eval src_oui_nick = case ( like(lower(src_oui),"%dell%"), "dell", like(lower(src_oui),"%apple%"), "apple", like(lower(src_oui),"%hewlett%"), "hp", like(lower(src_oui),"%wistron%"), "wistron", like(lower(src_oui),"%cisco%"), "cisco", like(lower(src_oui),"%vmware%"), "vmware", like(lower(src_oui),"%d-link%"), "dlink", true(), "generic") 
dispatch.earliest_time = rt-30s
dispatch.latest_time = rt
displayview = particles_beta
request.ui_dispatch_view = particles_beta
vsid = gkapgh77


#
# Twitter examples
#

[Twitter - tweets with hastags]
search = source=twitter-sample
dispatch.earliest_time = rt-30s
dispatch.latest_time = rt
displayview = particles_beta
request.ui_dispatch_view = particles_beta
vsid = gm45c62m

[Twitter - client types]
dispatch.earliest_time = rt-30s
dispatch.latest_time = rt
displayview = particles_beta
request.ui_dispatch_view = particles_beta
search = sourcetype=twitter | fields client_type | eval known_clients = lower(client_type) | eval known_clients = case(like(known_clients,"%android%"), "android", like(known_clients,"%blackberry%"), "blackberry", like(known_clients,"%echofon%"), "echofon", like(known_clients,"%iphone%"), "iphone", like(known_clients,"%tweetdeck%"), "tweetdeck", like(known_clients,"%bersocial%"), "ubersocial", known_clients = "web", "twitter") | eval unknown_clients = client_type
vsid = gm5jxcd9


#
# Splunk examples
#

[Splunk - indexing lag, event type assignment]
search = index=* OR index=_* | eval indexing_lag_secs = round(_time - _indextime, 0)
dispatch.earliest_time = rt-30s
dispatch.latest_time = rt
displayview = particles_beta
request.ui_dispatch_view = particles_beta
