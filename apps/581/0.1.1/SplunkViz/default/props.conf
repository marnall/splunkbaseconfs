#
# define base sourcetype for the tcpdump collector
#
[tcpdump-simple]

# make ingest time as timestamp
DATETIME_CONFIG = CURRENT

# everything is single line output
SHOULD_LINEMERGE = false

# set formatter for 'tcpdump -eq'
REPORT-tcpdump_eq = tcpdump_eq


#
# define base sourcetype for Twitter streaming collector
#
[twitter]
TZ = GMT

