[threats]
start_by_shell = false
python.version = python3
sourcetype = brandefense:threats
interval = 3600
initial_data_collection = 14d

[threatlist://Brandefense_Domain]
description = Threat intel domains provided by Brandefense
disabled = false
fields = date:$1,description:$2,domain:$3
skip_header_lines = 1
type = domains
url = lookup://brandefense_threat_domain
interval = 86400
max_age = -24h
debug = false
delim_regex = ,
file_parser = auto
ignore_regex = (^#|^\s*$)
is_threatintel = true
sinkhole = true
timeout = 30
start_by_shell = false

[threatlist://Brandefense_IP]
description = Threat intel ips provided by Brandefense
disabled = false
fields = date:$1,description:$2,ip:$3
skip_header_lines = 1
type = ips
url = lookup://brandefense_threat_ip
interval = 86400
max_age = -24h
debug = false
delim_regex = ,
file_parser = auto
ignore_regex = (^#|^\s*$)
is_threatintel = true
sinkhole = true
timeout = 30
start_by_shell = false

[threatlist://Brandefense_HASH]
description = Threat intel hashes provided by Brandefense
