# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 1

[launcher]
version = 1.0.1
description = We are a Cyber Security and Cyber Risk Management platform named Brandefense (https://brandefense.io) We want to distribute this app to our customers to enable them getting data from our API with their API key. Data includes threat intelligence, botnet intelligence, malicious IP addresses

[ui]
is_visible = 1
label = Brandefense
docs_section_override = AddOns:released

[package]
id = brandefenseti

[triggers]
reload.addon_builder = simple
reload.brandefenseti_account = simple
reload.brandefenseti_settings = simple
reload.passwords = simple

