
[ccx_broadcom_symantec_pam_check_in]
search = (sourcetype="ca:pam:syslog") sj.commandName="checkInAccountPassword" OR vendor_type IN ("checkInAccountPassword", "forceCheckInAccountPassword")

[ccx_broadcom_symantec_pam_change]
search = (sourcetype="ca:pam:syslog") sj.commandName IN ("update*", "delete*") OR Details IN ("*PAM-CMN-2192*", "*PAM-CMN-2193*", "*PAM-CMN-2010*", "*PAM-CMN-2238*", "*PAM-CMN-2372*", "*PAM-CMN-2254*", "*PAM-CMN-1484*", "*Closing processing of session*", "*Connection terminated*", "*Starting processing of session*") OR vendor_type IN ("update*", "run*", "view*", "verify*") OR de IN ("Password Viewed", "Upload Cert")
# tags = change

[ccx_broadcom_symantec_pam_alert]
search = (sourcetype="ca:pam:syslog") Details IN ("*Idle time out*", "*PAM-LDAP-0009*", "*PAM-CMN-1583*", "*PAM-CMN-0614*", "*PAM-LDAP-0007*", "*PAM-UPD-0004*", "*PAM-CMN-2261*") OR ("*The user entered an incorrect password*" AND NOT "*authentication fail*") OR vendor_type="expire*" OR de="Need to update the config File"
# tags = alert

[ccx_broadcom_symantec_pam_session_end]
search = (sourcetype="ca:pam:syslog") Details IN ("*Closing processing of session*", "*Connection terminated*")

[ccx_broadcom_symantec_pam_session_start]
search = (sourcetype="ca:pam:syslog") Details IN ("*Starting processing of session*")

[ccx_broadcom_symantec_pam_md]
search = (sourcetype="ca:pam:syslog") Details IN ("*memory dumps*")

[ccx_broadcom_symantec_pam_exceptions]
search = (sourcetype="ca:pam:syslog") Details IN ("*PAM-LDAP-0004*")

[ccx_broadcom_symantec_pam_auth_success]
search = (sourcetype="ca:pam:syslog") Details IN ("*PAM-CMN-0917*", "*PAM-CMN-0998*")
# tags = authentication

[ccx_broadcom_symantec_pam_auth_failed]
search = (sourcetype="ca:pam:syslog") Details IN ("*PAM-CMN-0971*", "*PAM-CMN-0979*", "*PAM-CMN-097*") OR ("*The user entered an incorrect password*" AND "*authentication fail*")
# tags = authentication

[ccx_broadcom_symantec_pam_user_session]
search = (sourcetype="ca:pam:syslog") de="Not required"

[ccx_broadcom_symantec_pam_test]
search = (sourcetype="ca:pam:syslog") de="test"

[ccx_broadcom_symantec_pam_patch]
search = (sourcetype="ca:pam:syslog") de="patch"
