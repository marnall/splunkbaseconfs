[Network Indexes Lookup Gen]
action.email.show_password = 1
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 27 03 * * *
description = Generates a list of all network indexes.
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = network_monitoring_app
request.ui_dispatch_view = search
search = | rest /services/configs/conf-macros/cim_Network_Traffic_indexes\
| eval cim_Network_Traffic_indexes_formated=trim(definition,"()")\
| map search="| eventcount summarize=false $cim_Network_Traffic_indexes_formated$ | dedup index | fields index"\
| outputlookup network_indexes.csv
