[ta_threatconnect_threat_intel_logs]
definition = index="_internal" source="*/log/splunk/splunkd.log" app="TA_threatconnect_threat_intel"

[ta_threatconnect_threat_intel_logs(1)]
args = collection_name
definition = `ta_threatconnect_threat_intel_logs` tc_collection_name="$collection_name$"

[ta_threatconnect_threat_intel_logs(2)]
args = collection_name,job_id
definition = `ta_threatconnect_threat_intel_logs` tc_collection_name="$collection_name$" tc_job_id="$job_id$"

[ta_threatconnect_threat_intel_logs(3)]
args = collection_name,job_id,event
definition = `ta_threatconnect_threat_intel_logs` tc_collection_name="$collection_name$" tc_job_id="$job_id$" event="$event$"

[ta_threatconnect_threat_intel_logs_table(1)]
args = event
definition = `ta_threatconnect_threat_intel_logs` event="$event$" \
| table tc* \
| streamstats count as temp_count\
| stats values(*) as * by temp_count\
| fields - temp_count
iseval = 0

[ta_threatconnect_threat_intel_logs_table(2)]
args = event,collection_name
definition = `ta_threatconnect_threat_intel_logs` event="$event$" tc_collection_name="$collection_name$" \
| table tc* \
| streamstats count as temp_count\
| stats values(*) as * by temp_count\
| fields - temp_count
iseval = 0

[ta_threatconnect_threat_intel_logs_table(3)]
args = event,collection_name,job_id
definition = `ta_threatconnect_threat_intel_logs` event="$event$" tc_collection_name="$collection_name$" tc_job_id="$job_id$" \
| table tc* \
| streamstats count as temp_count\
| stats values(*) as * by temp_count\
| fields - temp_count
iseval = 0

