
[centrify_authentication]
search = (eventtype=centrify_unix_audit_trail_logs OR eventtype=centrify_windows_audit_trail_logs) (centrifyEventID=6002 OR centrifyEventID=6004 OR centrifyEventID=6010 OR centrifyEventID=6011 OR centrifyEventID=27101 OR centrifyEventID=24101 OR centrifyEventID=6001 OR centrifyEventID=6003 OR centrifyEventID=18200 OR centrifyEventID=27000 OR centrifyEventID=24100 OR centrifyEventID=54100 OR centrifyEventID=54101 OR centrifyEventID=54200 OR centrifyEventID=54201 OR centrifyEventID=9001 OR centrifyEventID=24501)

[ccx_centrify_css_syslog_alert]
search = sourcetype="centrify_css_syslog" eventname IN ("Trusted path denied", "PAM account management denied", "Iterating KCM credential caches failed", "Centrify agent (adclient) stopped", "Query as root was successful", "Query request failed", "Query was successful", "Cache flush failed", "DirectAudit agent (dad) stopped")
# tags = alert

[ccx_centrify_css_syslog_authentication]
search = sourcetype="centrify_css_syslog" eventname IN ("PAM authentication granted", "PAM authentication denied")
# tags = authentication

[ccx_centrify_css_syslog_authentication_privileged]
search = sourcetype="centrify_css_syslog" eventname IN ("Join failed", "Joined domain")
# tags = authentication privileged

[ccx_centrify_css_syslog_change]
search = sourcetype="centrify_css_syslog" eventname IN ("PAM account management granted", "PAM set credentials granted", "Centrify agent (adclient) started", "Centrify agent (adclient) stopped", "PAM change password granted", "Configuration settings (centrifydc.conf) reloaded", "PAM change password denied", "Local cache flushed", "License modes changed", "DirectAudit agent (dad) stopped")
# tags = change

[ccx_centrify_css_syslog_left_domain]
search = sourcetype="centrify_css_syslog" eventname="Left domain"

[ccx_centrify_css_syslog_pam_close_session_granted]
search = sourcetype="centrify_css_syslog" eventname="PAM close session granted"

[ccx_centrify_css_syslog_pam_open_session_granted]
search = sourcetype="centrify_css_syslog" eventname="PAM open session granted"

[ccx_centrify_css_syslog_trusted_path_granted]
search = sourcetype="centrify_css_syslog" eventname="Trusted path granted"
