
[centrify_css_syslog]
FIELDALIAS-severity_for_centrifyseverity = id_severity AS centrify_severity
EVAL-action = if(eventname IN ("PAM account management granted", "PAM set credentials granted", "Centrify agent (adclient) started", "Centrify agent (adclient) stopped", "PAM change password granted", "Configuration settings (centrifydc.conf) reloaded", "PAM change password denied", "Local cache flushed", "License modes changed", "DirectAudit agent (dad) stopped"), case(eventname=="Centrify agent (adclient) started", "started", eventname IN ("Centrify agent (adclient) stopped", "DirectAudit agent (dad) stopped"), "stopped", eventname IN ("PAM account management granted", "PAM set credentials granted", "PAM change password granted", "PAM change password denied", "License modes changed"), "modified", 'eventname'=="Configuration settings (centrifydc.conf) reloaded", "restarted", 'eventname'=="Local cache flushed", "deleted"), if(match(lower(status),"failure|denied|failed|unsuccessful"),"failure","success"))
EVAL-vendor_product = case(eventname IN ("PAM account management granted", "PAM set credentials granted", "Centrify agent (adclient) started", "Centrify agent (adclient) stopped", "PAM change password granted", "Configuration settings (centrifydc.conf) reloaded", "PAM change password denied", "Local cache flushed", "License modes changed", "DirectAudit agent (dad) stopped"), "Delinea:Centrify Platform")
EVAL-body = case(eventname IN ("Trusted path denied", "PAM account management denied", "Iterating KCM credential caches failed", "Centrify agent (adclient) stopped", "Query as root was successful", "Query request failed", "Query was successful", "Cache flush failed", "DirectAudit agent (dad) stopped"), coalesce(replace('reason', "\:\s+(.+)", "\1"), 'eventname'))
EVAL-change_type = case(eventname IN ("PAM account management granted", "PAM set credentials granted", "Centrify agent (adclient) started", "Centrify agent (adclient) stopped", "PAM change password granted", "Configuration settings (centrifydc.conf) reloaded", "PAM change password denied", "Local cache flushed", "License modes changed", "DirectAudit agent (dad) stopped"), if('eventname' IN ("PAM account management granted", "PAM set credentials granted", "PAM change password granted", "PAM change password denied"), "AAA", "filesystem"))
EVAL-description = case(eventname IN ("Trusted path denied", "PAM account management denied", "Iterating KCM credential caches failed", "Centrify agent (adclient) stopped", "Query as root was successful", "Query request failed", "Query was successful", "Cache flush failed", "DirectAudit agent (dad) stopped"), coalesce(replace('reason', "\:\s+(.+)", "\1"), 'eventname'))
EVAL-object = case(eventname IN ("PAM account management granted", "PAM set credentials granted", "Centrify agent (adclient) started", "Centrify agent (adclient) stopped", "PAM change password granted", "Configuration settings (centrifydc.conf) reloaded", "PAM change password denied", "Local cache flushed", "License modes changed", "DirectAudit agent (dad) stopped"), case('eventname' IN ("PAM account management granted", "PAM set credentials granted", "PAM change password granted", "PAM change password denied"), replace('user', "[^\(]+\(type\:ad\,([^\)]+)\)", "\1"), 'eventname' IN ("Centrify agent (adclient) started", "Centrify agent (adclient) stopped", "Local cache flushed", "License modes changed", "Configuration settings (centrifydc.conf) reloaded", "DirectAudit agent (dad) stopped"), 'service'))
EVAL-reason = coalesce('reason', 'eventname')
EVAL-signature = case(eventname IN ("Trusted path denied", "PAM account management denied", "Iterating KCM credential caches failed", "Centrify agent (adclient) stopped", "Query as root was successful", "Query request failed", "Query was successful", "Cache flush failed", "DirectAudit agent (dad) stopped"), 'eventname', eventname IN ("PAM authentication granted", "PAM authentication denied", "Join failed", "Joined domain"), coalesce('reason', 'eventname'))
EVAL-src = if('client'=="(none)", null(), 'client')
EVAL-src_ip = if(match('client', "((?:\d{1,3}\.){3}\d{1,3})"), if('client'=="(none)", null(), 'client'), null())
EVAL-subject = 'eventname'
EVAL-type = case(eventname IN ("Trusted path denied", "PAM account management denied", "Iterating KCM credential caches failed", "Query as root was successful", "Query request failed", "Query was successful", "Cache flush failed"), "alert", eventname IN ("Centrify agent (adclient) stopped", "DirectAudit agent (dad) stopped"), "alarm")
EVAL-user = replace('user', "[^\(]+\(type\:ad\,([^\)]+)\)", "\1")
EVAL-status = if(match(lower(status),"fail*|denied|unsuccessful"),"failure","success")