[formatTime(1)]
args = epochTime
definition = strftime($epochTime$,"%Y.%m.%d %H:%M:%S")
iseval = 0

[owncloud-indexes]
definition = index=owncloud
iseval = 0

[toGB(1)]
args = bytes
definition = round(toNumber($bytes$)/1024/1024/1024, 2)
errormsg = 
iseval = 0
validation = 

[userMetrics(1)]
args = userName
definition = `owncloud-indexes` sourcetype="owncloud:metrics:json" source="*/etc/apps/TA_owncloud/bin/metrics_all.sh" ocs.meta.statuscode="100"\
| head 1\
| fields ocs.data.userData.$userName$.* \
| rename ocs.data.userData.* as * \
| untable name Column Value\
| eval user=mvindex(split(Column,"."),0)\
| rex field=Column mode=sed "s/^[^.]*.//g"\
| eval {Column}=Value\
| stats values(backend) as Backend values(displayName) as "Display name" values(lastLogin) as "Last login" values(quota.free) as "Quota free" values(quota.relative) as "Quota relative" values(quota.used) as "Quota used" values(shares.federatedShareCount) as "Federated shares" values(shares.groupShareCount) as "Group shares" values(shares.guestShareCount) as "Guest shares" values(shares.linkShareCount) as "Link shares" values(shares.userShareCount) as "User shares" by user
iseval = 0
