
######################################
###     Anomalous DNS KV Store     ###
######################################

[anomalous_dns_lookup]
external_type = kvstore
collection = anomalous_dns_data
fields_list = _key, _user, last_update, domain, anomalous_type
# _key = domain#anomalous_type

######################################
###      Cluster SRC KV Store      ###
######################################

[cluster_src_lookup]
external_type = kvstore
collection = cluster_src_data
fields_list = _key, _user, last_update, src, cluster, cluster_distance, avg_distinct_subdomains, avg_query_freq_hourly, avg_len, beacon_stdev, max_len, txt_ratio, any_ratio, hinfo_ratio, axfr_ratio

######################################
###     Whitelist Domain CSV       ###
######################################

[whitelist_domain_lookup]
filename = whitelist_domain.csv
external_type = csv
fields_list = domain