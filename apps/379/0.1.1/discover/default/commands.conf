# DO NOT EDIT THIS FILE!
# Please make all changes to files in $SPLUNK_HOME/etc/system/local.
# To make changes, copy the section/stanza you want to change from $SPLUNK_HOME/etc/system/default
# into ../local and edit there.
#
# Configuration for external search commands
#
##############

[tune]
filename = tune.py
passauth = true
supports_getinfo = false
streaming = false
retainsevents = true
run_in_preview = false

[discover]
filename = discover.py
passauth = true
supports_getinfo = false
streaming = false
retainsevents = true
run_in_preview = false

[entity]
filename = entity.py
passauth = true
generating = true
retainsevents = true
streaming = false

[searchstats]
filename = searchstats.py
supports_getinfo = false
streaming = true
retainsevents = true

[serverinfo]
filename = serverinfo.py
streaming = false
retainsevents = false
run_in_preview = false


# Because the 'reltime' command is going to ship in 4.2
# and because it may change its implementation before launch
# we are packaging our own snapshotted version of it here
# to maintain compatibility
[customreltime]
filename = reltime_discover.py
streaming = true
retainsevents = true
overrides_timeorder = false