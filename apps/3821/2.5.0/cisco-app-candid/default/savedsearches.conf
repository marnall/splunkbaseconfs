[NAEFabricLookup]
disabled = 0
enableSched = 1
cron_schedule = */5 * * * *
action.lookup = 1
action.lookup.filename = fabrics.csv
run_on_startup = true
dispatch.earliest_time = -24h@m
dispatch.latest_time = now
search = sourcetype="cisco:candid:events" component=smart_event_details cnae_host=* fab_id=* | dedup fab_id | table cnae_host, fab_id, fabric_settings_dto.unique_name | rename cnae_host AS "NAE Host" fab_id AS "Fabric ID" fabric_settings_dto.unique_name AS "Unique Name" | inputlookup append=T FabricIdMapping | dedup "Fabric ID"
