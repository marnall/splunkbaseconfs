# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 1

[launcher]
author = Leonardo Armesto
version = 2.0.0
description = This modular input is designed to grab weather details and forecast of specific city/cities using the Yahoo! Weather API.If you like this Add-On you're welcome to leave a rating.

[ui]
is_visible = 1
label = Yahoo Weather API Modular Input
docs_section_override = AddOns:released

[package]
id = TA-yahoo-weather-api-modular-input

[triggers]
reload.addon_builder = simple
reload.ta_yahoo_weather_api_modular_input_account = simple
reload.ta_yahoo_weather_api_modular_input_settings = simple
reload.passwords = simple

