[c42_cloudshare]
search = (sourcetype=c42-file-exposure) shared="TRUE"

[c42_cloudsync]
search = (sourcetype=c42-file-exposure) sync-destination IN ("GoogleBackupAndSync", "GoogleDrive", "OneDrive", "Box", "BoxDrive", "Dropbox", "ICloud")

[c42_removablemedia]
search = (sourcetype=c42-file-exposure) removable-media-name!=null

[c42_applicationread]
search = (sourcetype=c42-file-exposure) event-type IN ("READ_BY_APP", "application-read")

[c42_audit_log]
search = (sourcetype=c42-audit-log)

[c42_alerts]
search = (sourcetype=c42-alerts)
