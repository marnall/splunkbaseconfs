
[expose:andariel_api_settings]
pattern = andariel_api_settings
methods = POST, GET

[expose:andariel_api_settings_specified]
pattern = andariel_api_settings/*
methods = POST, GET, DELETE

[expose:andariel_api_andariel_input]
pattern = andariel_api_andariel_input
methods = POST, GET

[expose:andariel_api_andariel_input_specified]
pattern = andariel_api_andariel_input/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
