#
# Splunk app configuration file
#

[install]
is_configured = 1
build = 1

[ui]
is_visible = false
label = Disable Splunk Update Checking

[launcher]
author = Mason Morales
description = This TA disables the check for new versions of Splunk when logging in on any Splunk host it is installed on.
version = 1.0

[package]
check_for_updates = 1
id = disable_splunk_update_checking
