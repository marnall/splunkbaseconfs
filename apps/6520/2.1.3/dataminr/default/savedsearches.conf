[dataminr_alert_vulnerable_ips]
cron_schedule = 5-59/15 * * * *
description = Finds vulnerable IP found in last 60 minutes and merge the list with 30day master list.
disabled = 0
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = dataminr_web_views
request.ui_dispatch_view = search
search = | tstats `dataminr_dm_summariesonly` max(_time) as _time dc(Dataminr.alertId) as count values(Dataminr.companies.name) AS company values(Dataminr.caption) as caption FROM datamodel="Dataminr.Dataminr" by Dataminr.metadata.cyber.addresses.ip | eval ip=replace('Dataminr.metadata.cyber.addresses.ip', "[\[\]]", "" ) | table _time ip company caption | inputlookup append=true dataminr_vulnerable_ips_30d.csv | where _time>=relative_time(now(),"-30d@d")  | stats max(_time) as _time latest(*) as * by ip | fillnull value=NULL | outputlookup create_empty=true dataminr_vulnerable_ips_30d.csv

