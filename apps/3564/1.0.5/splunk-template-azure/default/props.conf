[ms:o365:management]
LOOKUP-useragentstrings = useragentstrings UserAgent AS UserAgent OUTPUTNEW browser_name AS browser_name os_name AS os_name os_version AS os_version ua_type AS ua_type

[source::/subscriptions/...]
REPORT-source = azure_extract_subscription_id, azure_extract_resource_fields, azure_vm_power_state
LOOKUP-power_state = azure_vm_power_state_lookup azure_vm_power_state_tmp OUTPUT power_state
LOOKUP-azure_locations = azure_location_lookup name AS location OUTPUT displayName AS location_name latitude AS location_lat longitude AS location_lon

#/subscriptions/<subscription_id>/default/events
#/subscriptions/<subscription_id>/events/<eventDataId>/ticks/<time> - portal message
#/subscriptions/<subscription_id>/resourceGroups/<resource_group_name>/providers/<resource_category>/<resource_type>/<resource_name>

[source::WADMetrics...]
EXTRACT-name = .*\/(?<name>[^\/]+) in PartitionKey
EVAL-vm_cpu_load_percent = round(case(CounterName == "\\Processor(_Total)\\% Processor Time", Average, CounterName == "\\Processor\\PercentProcessorTime", Average), 2)
EVAL-vm_mem_usage_percent = round(case(CounterName == "\\Memory\\% Committed Bytes In Use", Average, CounterName == "\\Memory\\PercentUsedMemory", Average), 2)
EVAL-vm_mem_provisioned = round(case(CounterName == "\\Memory\\Committed Bytes" , Average, CounterName == "\\Memory\\UsedMemory", Average), 0)

[source::azure_monitor_metrics...]
TIME_PREFIX = \"timeStamp\":\s\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%Z
MAX_TIMESTAMP_LOOKAHEAD = 28