[useragentstrings]
filename = useragentstrings.csv

[azure_vm_power_state]
REGEX = "code"\s*:\s*"PowerState\/(\w*)"
FORMAT = azure_vm_power_state_tmp::$1

[azure_vm_power_state_lookup]
filename = azure_vm_power_state.csv

[azure_location_lookup]
# Use the following to create a lookup of locations: https://github.com/Azure/azure-xplat-cli
filename = azure_locations.csv

[azure_extract_subscription_id]
SOURCE_KEY = source
REGEX = \/subscriptions\/(.*?)\/
FORMAT = subscription_id::$1

[azure_extract_resource_fields]
#/subscriptions/<subscription_id>/resourceGroups/<resource_group_name>/providers/<resource_category>/<resource_type>/<resource_name>
SOURCE_KEY = source
REGEX = (?i)\/subscriptions\/.*?\/resourceGroups\/(.*?)\/providers\/(.*?)\/(.*?)\/(.*?)(?:\/|$)
FORMAT = resource_group_name::$1 resource_category::$2 resource_type::$3 resource_name::$4