# Index
[azure-index]
definition = index=main

# Audit
[azure-audit]
definition = `azure-index` sourcetype="mscs:azure:audit"

[azure-security-recommendation]
definition = resourceProviderName.value="Microsoft.Security" operationName.value="*Recommendation*"

# Virtual Machines
[azure-vm]
definition = `azure-index` sourcetype="mscs:resource:virtualmachine"

# Virtual Networks
[azure-vnetwork]
definition = `azure-index` sourcetype="mscs:resource:virtualNetwork"

[azure-nic]
definition = `azure-index` sourcetype="mscs:resource:networkInterfaceCard"

[id-vnetwork]
definition = id="/subscriptions/*/resourcegroups/*/providers/Microsoft.Network/virtualNetworks/*"

# Public IP Address
[azure-publicIP]
definition = `azure-index` sourcetype="mscs:resource:publicIPAddress"

[azure-metrics-storage]
definition = sourcetype="amm:metrics" amm_resourceType="MICROSOFT.STORAGE/STORAGEACCOUNTS"
iseval = 0

[formatBytes(1)]
args = bytes
definition = if($bytes$>1099511627776, tostring(round($bytes$/1099511627776,2))+" TB", if($bytes$>1073741824, tostring(round($bytes$/1073741824,2))+" GB", if($bytes$>1048576, tostring(round($bytes$/1048576,2))+" MB", if($bytes$>1024, tostring(round($bytes$/1024))+" KB", tostring($bytes$)+" Bytes"))))
iseval = 0