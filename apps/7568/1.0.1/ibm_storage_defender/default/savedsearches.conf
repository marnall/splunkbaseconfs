[IBM Storage Defender Sensor Detected Potential Threat]
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable = 1
action.notable.param.rule_description = "Potential threat detected"
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.severity = 5
alert.suppress = 0
alert.track = 1
cron_schedule = * * * * *
description = Possible threat detected on VM.
dispatch.earliest_time = rt
dispatch.latest_time = rt
display.page.search.mode = verbose
enableSched = 1
request.ui_dispatch_app = ibm_storage_defender
request.ui_dispatch_view = search
search = index="ibm_defender" source=ibmdefender message="Potential threat detected" | eval rule_title="High severity alert for Potential threat events",  urgency="High"
