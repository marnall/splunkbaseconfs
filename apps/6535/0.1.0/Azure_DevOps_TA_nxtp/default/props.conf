
[source::...azure_devops_ta_nxtp*.log*]
sourcetype = azure:devops:log


[azure:devops:build]
SHOULD_LINEMERGE = false
category = Splunk App Add-on Builder
pulldown_type = 1
TIME_PREFIX=startTime"\: \"
TIME_FORMAT=%Y-%m-%d %H:%M:%S.%6N%:z
MAX_TIMESTAMP_LOOKAHEAD=32

[azure:devops:commit]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TIME_PREFIX=creation_date\":
TIME_FORMAT=%s.0
MAX_TIMESTAMP_LOOKAHEAD=12


[azure:devops:pr_activity]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
