[vj_sgs]
definition = eventtype="vj_data_sgs"
iseval = 0

[vj_ex]
definition = eventtype="vj_data_ex"
iseval = 0

[vj_walk]
definition = eventtype="vj_data_walk"
iseval = 0

[vj_cfg_hist_usage_ins(11)]
args = session_id,user,user_realname,page,page_type,view_label,total_parts,part_title,part_num,object_def,object_label_def
definition = makeresults \
| eval time=now() \
| eval session_id="$session_id$" \
| eval user="$user$" \
| join user \
    [| inputlookup vj_cfg_contact_user \
    | rename name AS user_name\
    | table user,user_name] \
| eval user_name=if(isnull(user_name),"$user_realname$",user_name)\
| eval item_id="$page$" \
| eval part_title=if("$part_title$"="single","$view_label$","$part_title$") \
| eval part_num=if("$total_parts$"="0","0","$part_num$") \
| eval total_parts="$total_parts$" \
| eval item_type="$page_type$" \
| eval object="$page$" \
| eval object=if("$object_def$"="single","$page$","$object_def$") \
| eval object_label=if("$object_label_def$"="single","$view_label$","$object_label_def$") \
| table time,session_id,user,user_name,item_type,item_id,part_title,part_num,total_parts,object,object_label\
| outputlookup vj_cfg_hist_usage append=true\
| eval item_completed=if("$total_parts$"="0","1",if("$total_parts$"="$part_num$","1","0")) \
| eval item_status=if("$total_parts$"="0","Completed",if("$total_parts$"="$part_num$","Completed","Not Completed")) \
| eval key="$user$_$page$",item_name="$view_label$",last_time=time\
| table key,user,user_name,item_id,item_name,item_type,item_completed,item_status,last_time \
| outputlookup vj_my_journey_activity append=true key_field=key
iseval = 0

[vj_cfg_hist_usage_rpt_ins]
definition = appendpipe \
    [ WHERE isnotnull(time_field) \
    | eval time=time_field, part_title=item_id,part_num="0",total_parts="0",item_type="report",object=item_id,object=item_id,object_label=item_id\
    | table time,session_id,user,user_name,item_type,item_id,part_title,part_num,total_parts,object,object_label \
    | outputlookup vj_cfg_hist_usage append=true] \
| appendpipe \
    [ WHERE isnotnull(time_field) \
    | eval last_time=time_field,key=user."_".item_id, item_completed="1", item_status="Completed",item_type="report",item_name=item_id \
    | table key,user,user_name,item_id,item_name,item_type,item_completed,item_status,last_time \
    | outputlookup vj_my_journey_activity append=true key_field=key]
iseval = 0

[vj_journey_progress(1)]
args = user
definition = inputlookup vj_my_journey WHERE enabled="1"\
| join root_id\
[| inputlookup vj_cfg_uc_main WHERE level="main" AND state="active"\
| append [|makeresults | eval root_id="default",rank=0 | table root_id,rank]\
| rename state AS item_state\
| table root_id, rank]\
| join type=left item_id\
[| inputlookup vj_my_journey_activity WHERE user="$user$"\
| eval splk_core_ov_state=if(item_id="vj_overview_splk_core",1,0)\
| rex field=item_id "vj_overview_(?<uc_ov_compl>uc_mn_\w+)"\
| eventstats max(splk_core_ov_state) AS splk_core_ov_state, values(uc_ov_compl) AS uc_ov_compl\
| eval uc_ov_compl=mvjoin(uc_ov_compl,"|")\
| table item_id, item_completed,splk_core_ov_state,uc_ov_compl]\
| join type=left item_id [search index=_internal sourcetype=splunkd_ui_access "GET /en-US/splunkd/__raw/servicesNS/*/saved/searches/*" NOT "_new" earliest=-30m latest=now user="$user$"\
| eval Execution_Time=strftime(_time, "%m/%d %I:%M:%S %p") \
| rename file AS item_id\
| rex mode=sed field=item_id "s/%3//g"\
| rex mode=sed field=item_id "s/%20/ /g"\
| stats count by item_id\
| eval item_completed=1\
| table item_id, item_completed]\
| eventstats values(uc_ov_compl) AS uc_ov_compl, max(splk_core_ov_state) AS splk_core_ov_state\
| eval uc_ov_state=if(isnull(uc_ov_compl),0,if(match(root_id,uc_ov_compl),1,0))\
| eval item_completed=if(isnull(item_completed),0,item_completed)\
| fillnull value=0 item_completed,splk_core_ov_state,uc_ov_state,rank, item_rank\
| eventstats max(splk_core_ov_state) AS splk_core_ov_state, values(uc_ov_compl) AS uc_ov_compl\
| eval uc_ov_compl = mvjoin(uc_ov_compl,"|")\
| eventstats values(uc_ov_compl) AS uc_ov_compl, max(splk_core_ov_state) AS splk_core_ov_state\
| eval uc_ov_state=if(isnull(uc_ov_compl),0,if(match(root_id,uc_ov_compl),1,0))
iseval = 0

