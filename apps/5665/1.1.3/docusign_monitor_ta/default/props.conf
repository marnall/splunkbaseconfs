[docusign:monitor]
REPORT-docusign_action_extract = docusign_action_extract
FIELDALIAS-ipAddress_alias_to_dest = ipAddress ASNEW src
FIELDALIAS-userAgent_alias_to_user_agent = userAgent ASNEW user_agent
EVAL-vendor_product = "DocuSign Monitor"
LOOKUP-docusign_cim_lookup = docusign_cim_lookup ds_action AS ds_action object AS object OUTPUT action AS action data_model AS data_model object_category AS object_category result AS result
FIELDALIAS-property_alias_to_object_attrs = Property ASNEW object_attrs
FIELDALIAS-id_alias_to_object_id = "data.AffectedMembershipId" ASNEW object_id "data.AffectedUserId" ASNEW object_id "data.ConfigurationId" ASNEW object_id "data.EnvelopeId" ASNEW object_id "data.GroupId" ASNEW object_id "data.UserIds" ASNEW object_id
REPORT-docusign_result_extract = docusign_result_extract
EVAL-status = case(object="user" AND action="login" AND result="success", "success", object="user" AND action="login" AND result="failed", "failure",  object="connect" AND action="sent" AND result="sucess", "success", object="connect" AND action="sent" AND result="failed", "failure")
FIELDALIAS-userId_alias_to_user = userId ASNEW src_user
LOOKUP-docusign_alert_lookup = docusign_alert_lookup ds_action AS ds_action object AS object OUTPUTNEW alert AS alert description AS description severity AS severity severity_id AS severity_id

##### LINE BREAKING CONFIGURATIONS #####
pulldown_type = true
INDEXED_EXTRACTIONS = json
KV_MODE = none
category = Structured
LOOKUP-docusign_user_lookup = docusign_user_lookup userId AS userId OUTPUTNEW AddedDate AS AddedDate company AS company email AS email firstName AS firstName isAdmin AS isAdmin jobTitle AS jobTitle lastName AS lastName permissionProfileName AS permissionProfileName user AS user userStatus AS userStatus
LOOKUP-docusign_account_lookup = docusign_account_lookup accountId AS accountId OUTPUT account_name AS account_name site_id AS site_id
LOOKUP-docusign_location_lookup = docusign_location_lookup location AS "ipAddressLocation.country" OUTPUTNEW location_blocked AS location_blocked
LOOKUP-docusign_ip_lookup = docusign_ip_lookup ip AS ipAddress OUTPUTNEW ip_blocked AS ip_blocked
REPORT-docusign_stdev_extract = docusign_stdev_extract
REPORT-docusign_p98_extract = docusign_p98_extract
REPORT-docusign_count_extract = docusign_count_extract
REPORT-docusign_avg_extract = docusign_avg_extract
REPORT-docusign_data_ip_extract = docusign_data_ip_extract
REPORT-docusign_data_city_extract = docusign_data_city_extract
REPORT-docusign_data_location_extract = docusign_data_location_extract
REPORT-docusign_data_lat_extract = docusign_data_lat_extract
REPORT-docusign_data_lon_extract = docusign_data_lon_extract
REPORT-docusign_data_state_extract = docusign_data_state_extract
REPORT-docusign_data_eventid_extract = docusign_data_eventid_extract
