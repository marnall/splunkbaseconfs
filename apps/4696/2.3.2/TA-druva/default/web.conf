# [settings]
# splunkdConnectionTimeout = 300

[expose:TA_druva_druva]
pattern = TA_druva_druva
methods = POST, GET

[expose:TA_druva_druva_specified]
pattern = TA_druva_druva/*
methods = POST, GET, DELETE

[expose:TA_druva_settings]
pattern = TA_druva_settings
methods = POST, GET

[expose:TA_druva_settings_specified]
pattern = TA_druva_settings/*
methods = POST, GET, DELETE

[expose:TA_druva_account]
pattern = TA_druva_account
methods = POST, GET

[expose:TA_druva_account_specified]
pattern = TA_druva_account/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
