[source::...ta-trellix-edr-detections*.log*]
sourcetype = tatrellixedrdetections:log

[source::...ta_trellix_edr_detections*.log*]
sourcetype = tatrellixedrdetections:log

[trellix:edr:detections]
EVAL-severity = if(match(severity,"s[4|5]"),"high",if(match(severity, "s[2|3]"), "medium", "low"))
FIELDALIAS-aob_gen_trellix_edr_detections_alias_1 = detection.host.netInterfaces{}.ip AS ip
FIELDALIAS-aob_gen_trellix_edr_detections_alias_2 = detection.host.netInterfaces{}.macAddress AS mac
FIELDALIAS-aob_gen_trellix_edr_detections_alias_3 = detection.host.os.build AS version
FIELDALIAS-aob_gen_trellix_edr_detections_alias_4 = detection.host.os.desc AS os
FIELDALIAS-aob_gen_trellix_edr_detections_alias_5 = hashes.md5 AS file_hash
FIELDALIAS-aob_gen_trellix_edr_detections_alias_6 = hashes.sha1 AS file_hash
FIELDALIAS-aob_gen_trellix_edr_detections_alias_7 = detection.sha256 AS file_hash
FIELDALIAS-aob_gen_trellix_edr_detections_alias_8 = detection.tags{} AS mitre_technique_id
MAX_TIMESTAMP_LOOKAHEAD = 25
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = "detection"[^*]+"firstDetected"
TRUNCATE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

