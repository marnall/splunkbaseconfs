[pinger_populate_sites]
action.email.inline = 1
action.email.reportServerEnabled = 0
alert.expires = 1h
alert.severity = 1
alert.suppress = 0
alert.track = 0
cron_schedule = 0 * * * *
description = Populates the Pinger site list for quick drop-down population.
dispatch.earliest_time = -24h@h
enableSched = 1
search = eventtype=pinger:heartbeat | stats count by site | fields site | outputlookup pinger_sites createinapp=true
disabled = 0
