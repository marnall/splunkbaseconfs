[Splunk Nexus Insights Advisory Alert]
action.email = 1
action.email.subject.alert = Splunk Nexus Insights Advisory Alert
action.email.priority = 1
action.email.allow_empty_attachment = 0
action.email.include.results_link = 0
action.email.include.view_link = 0
action.email.sendresults = 1
action.email.inline = 1
action.email.useNSSubject = 1
action.email.message.alert = Hello,\
\
Events with critical severity are detected for Nexus Insights > Advisory endpoint. The details about the events are mentioned in below table.
alert.digest_mode = 0
alert.suppress = 0
alert.severity = 4
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = Users will be alerted if, at any point, severity is critical for advisories data.
disabled = 1
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = cisco-app-NI
request.ui_dispatch_view = search
search =`get_nexus_insights_index` sourcetype="cisco:ni:advisories"source="advisories"severity="critical" | dedup advisoryId, ni_host, fabricName | eval nodes=mvjoin(node_names, ",") |table ni_host, title, advisoryStr, advisoryScore, category, fabricName, vendor,entityName, resourceType, nodes | rename ni_host as "Nexus Insights Instance", advisoryStr as "Description" ,advisoryScore as "Score",category as "Category", title as "Title", fabricName as "Site",vendor as "Vendor", entityName as "Affected Object", resourceType as "Resource Type", nodes as "Affected Nodes"


