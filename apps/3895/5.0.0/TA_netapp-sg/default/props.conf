[grid:rest:api]
SHOULD_LINEMERGE = 0
category = StorageGRID
pulldown_type = 1
DATETIME_CONFIG = CURRENT
TRUNCATE = 0
KV_MODE = JSON

EVAL-mem = mvindex('result.value{}',1)
EVAL-latency = mvindex('result.value{}',1)
EVAL-cpu_load_percent = mvindex('result.value{}',1)
EVAL-storage_used = mvindex('result.value{}',1) / (1024 * 1024)
EVAL-storage = mvindex('result.value{}',1) / (1024 * 1024)
EVAL-storage_free = mvindex('result.value{}',1) / (1024 * 1024)
#EVAL-storage_used = mvindex('result.value{}',1)

[source::...ta_netapp-sg*.log*]
SHOULD_LINEMERGE = true
sourcetype = tanetapp:sg:log

[source::...ta_netapp_sg*.log*]
SHOULD_LINEMERGE = true
sourcetype = tanetapp:sg:log

[grid:auditlog]
pulldown_type = 1
category = StorageGRID
REPORT-extract_audit_fields = audit_fields
EVAL-time_ms = round((TIME/1000),2)
EVAL-type = case(ATYP=="SDEL","DELETE",ATYP=="SGET","GET",ATYP=="SPUT","PUT",ATYP=="SHEA","HEAD",ATYP=="WDEL","DELETE",ATYP=="WGET","GET",ATYP=="WPUT","PUT",ATYP=="WHEA","HEAD")
EVAL-Reason = case(RSLT == "LOST","Connection Lost",RSLT == "TOUT","Connection Timed-out",RSLT == "UNEX","Connection closed Unexpectedly", RSLT == "SUCS","Success", RSLT == "ABRT","Aborted without rollback error", RSLT == "ROLF","Aborted,  Incomplete rollback", RSLT == "CANC","User cancelled before start", RSLT == "EXPR","Expired before start", RSLT == "IVLD","Invalid", RSLT == "AUTH","Unauthorized", RSLT == "DUPL","Rejected as duplicate")
EVAL-sizegb = (CSIZ/(1000*1000*1000))
