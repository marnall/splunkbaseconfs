# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = false
state = enabled
build = 3

[launcher]
author = Beyond Identity
version = 1.0.6
description = Beyond Identity Add-On for Splunk. Fetches data from the events export API. To get an API token (scoped to your data only) please contact support.

[ui]
is_visible = 1
label = Beyond Identity
docs_section_override = AddOns:released

[package]
id = TA-beyond-identity

[triggers]
reload.addon_builder = simple
reload.ta_beyond_identity_account = simple
reload.ta_beyond_identity_settings = simple
reload.passwords = simple
reload.collector = simple