[Kaminario K2 - Multiple Failed Logins]
action.email = 1
action.email.include.view_link = 0
action.email.priority = 2
action.email.sendpdf = 1
action.email.sendresults = 1
action.email.to = user@example.com
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 1h
alert.track = 1
auto_summarize.dispatch.earliest_time = -1d@h
counttype = number of events
cron_schedule = * * * * *
description = This alert will be triggered once there are more than 10 failed login attempts in the last minute. Search is set to present last 30 minutes.
dispatch.earliest_time = rt-30m
dispatch.latest_time = rt-0m
enableSched = 1
quantity = 9
relation = greater than
request.ui_dispatch_app = KaminarioK2
request.ui_dispatch_view = search
search = sourcetype=syslog K2_label="k2-*" K2_event_type=audit field3!="[replication:mgmt-app" field4="login*" field4="*FAILED"

[Kaminario K2 - System Capacity Threshold Crossed]
action.email = 1
action.email.include.view_link = 0
action.email.priority = 2
action.email.sendpdf = 1
action.email.sendresults = 1
action.email.to = user@example.com
action.email.useNSSubject = 1
alert.expires = 2d
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 1h
alert.track = 1
auto_summarize.dispatch.earliest_time = -1d@h
counttype = number of events
cron_schedule = * * * * *
description = This alert will be triggered once there is at least one system capacity event. Search is set to present last 30 minutes.
dispatch.earliest_time = rt-30m
dispatch.latest_time = rt-0m
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = KaminarioK2
request.ui_dispatch_view = search
search = sourcetype=syslog K2_event_type=event K2_label="k2-*" K2_event_name="SYSTEM_CAPACITY_*" K2_event_name!="*OK" K2_event_name!="*POLICY_CHANGED"

[Kaminario K2 - All Audit Events]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
dispatch.earliest_time = 0
request.ui_dispatch_app = KaminarioK2
request.ui_dispatch_view = search
search = sourcetype=syslog K2_event_type=audit | table date,K2_label,Severity,field4 | head 100

