| rename COMMENT1of4 AS "This indicates *EXACTLY* which entries are causing Health Status warning messages like this:"\
| rename COMMENT2of4 AS "Identity: ## identities are currently exceeding the field limits"\
| rename COMMENT3of4 AS "set in the Asset and Identity Management page."\
| rename COMMENT4of4 AS "Data truncation will occur unless the field limits are increased."\
\
| table field_spec\
| eval field_spec = split(field_spec, "],")\
| mvexpand field_spec\
| rename field_spec AS _raw\
| rex max_match=1 "(?ms)\W+(?<which>\w+)"\
| rex max_match=0 "(?ms)[\r\n\s]*(?<raw>[^\r\n]*?\"is_mv\":[^\r\n]*$)"\
| mvexpand raw\
| rename raw AS _raw\
| kv\
| search is_mv="true" AND is_key="true"\
| table which name mv_limit\
| eval mv_limit_{name} = mv_limit\
| fields - name mv_limit\
| stats first(*) AS * BY which\
| fields - which\
| stats first(*) AS *\
| eval DROPME="1"\
| rename COMMENT1of2 AS "The SPL above should be acquiring the currently configured limit values from here:"\
| rename COMMENT2of2 AS "ES: Configure -> Data Enrichment -> Asset and Identity Management -> Identity Fields"\
\
| inputlookup append=t asset_lookup_by_str\
| eval es_lookup_type="asset_lookup_by_str"\
| inputlookup append=t asset_lookup_by_cidr\
| eval es_lookup_type=coalesce(es_lookup_type, "asset_lookup_by_cidr")\
| eval which=coalesce(which, "asset")\
| inputlookup append=t identity_lookup_expanded\
| eval es_lookup_type=coalesce(es_lookup_type, "identity_lookup_expanded")\
| eval which=coalesce(which, "identity")\
| rename _* AS es_lookup_*\
| eval es_lookup_mv_limit_BACKUP="25"\
| rename COMMENT AS "The above limit is only used as a backup"\
\
| eventstats first(mv_limit_*) AS mv_limit_*\
| search NOT DROPME="1"\
| fields - DROPME\
\
| foreach asset ip mac nt_host dns identity\
[ eval count_<<FIELD>>=coalesce(mvcount(<<FIELD>>), 0)\
| eval es_lookup_is_problem=mvappend(\
   es_lookup_is_problem,\
   if(count_<<FIELD>> >= coalesce(mv_limit_<<FIELD>>, es_lookup_mv_limit_BACKUP),\
      "YES - field '<<FIELD>>' has over ". coalesce(mv_limit_<<FIELD>>, es_lookup_mv_limit_BACKUP) . " entries",\
      null()))]\
| where isnotnull(es_lookup_is_problem)\
| eval TO_DELETE_THIS_KEY_RUN_THIS="|inputlookup " . es_lookup_type . " WHERE NOT _key=\"" . es_lookup_key . "\" | outputlookup " . es_lookup_type\
| table TO_DELETE_THIS_KEY_RUN_THIS es_lookup_* count_* mv_limit_* *
