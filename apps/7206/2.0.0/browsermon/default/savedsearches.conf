[Malicious` Browser Activity discovered through ETI Feeds]
action.webhook.enable_allowlist = 0
alert.severity = 5
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 0 * * *
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.custom.mitre_attck_heatmap.mitre_attck_heatmap.animate = 1
display.visualizations.custom.mitre_attck_heatmap.mitre_attck_heatmap.hideNull = 0
display.visualizations.custom.mitre_attck_heatmap.mitre_attck_heatmap.showSubTechniques = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = browsermon
request.ui_dispatch_view = search
search = index=browsermon sourcetype=csv\
| eval list="mozilla"\
| `ut_parse_extended(Url,list)`\
| lookup autosiem-ti-domains.csv domain AS ut_domain OUTPUT intel\
| table _time host os_username browser intel ut_domain referrer Url\
| search intel=*\
