#FOR BROWSING HISTORY DATA
[browsermon]
coldPath = $SPLUNK_DB/browsermon/colddb
homePath = $SPLUNK_DB/browsermon/db
maxTotalDataSizeMB = 512000
thawedPath = $SPLUNK_DB/browsermon/thaweddb

#FOR BROWSERMON INTERNAL LOGS
[browsermon_system]
coldPath = $SPLUNK_DB/browsermon_system/colddb
homePath = $SPLUNK_DB/browsermon_system/db
maxTotalDataSizeMB = 512000
thawedPath = $SPLUNK_DB/browsermon_system/thaweddb
