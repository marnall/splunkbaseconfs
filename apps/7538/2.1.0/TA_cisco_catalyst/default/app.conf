[launcher]
version = 2.1.0
description = Cisco Catalyst Add-on for Splunk collects data for different Cisco Products - Cisco Identity Services Engine, Cisco SD-WAN, and Cisco DNA Center. The add-on parses the data from these sources and stores them into the Splunk indexes.
author = Cisco Systems

[id]
version = 2.1.0
name = TA_cisco_catalyst

[install]
build = 7
is_configured = false
state = enabled

[package]
id = TA_cisco_catalyst
check_for_updates = true

[ui]
label = Cisco Catalyst Add-on for Splunk
is_visible = true

[triggers]
reload.ta_cisco_catalyst_settings = simple
reload.ta_cisco_catalyst_account = simple
reload.ta_cisco_catalyst_cyber_vision_account = simple
reload.ta_cisco_catalyst_ise_account = simple
reload.ta_cisco_catalyst_sdwan_account = simple
