
[ccx_cisco_ise_alerts]
search = sourcetype="cisco:ise:syslog" MESSAGE_TEXT IN("*Endpoint aband*","*succeed*","*failed*","*passed*") OR (MESSAGE_CODE IN("52002", "60086", "58022", "58023", "58024", "60131", "60132", "60198", "5232", "5233", "60085", "60190", "60197", "60214", "51100", "60461", "5238", "5205", "5239","60093","60095","60125","61026","89003","3000","3001") OR dataset_name="alert")
# tags = alert

[ccx_cisco_ise_authentication]
search = sourcetype="cisco:ise:syslog" eventtype IN("ccx_cisco_ise_authentication_failure" "ccx_cisco_ise_authentication_success") NOT MESSAGE_CODE IN("5232","5240","5238","5205","5239")
# tags = authentication

[ccx_cisco_ise_authentication_failure]
search = sourcetype="cisco:ise:syslog" ((log_type="Failed_Attempts" OR log_type="Failed_Attempts:" OR MESSAGE_CODE IN ("60081","60188") OR dataset_name="auth_fail") AND NOT DetailedInfo="Authentication succeed*") AND NOT MESSAGE_CODE IN("5232","5240","5238","5205","5239")
# tags = failure

[ccx_cisco_ise_authentication_success]
search = sourcetype="cisco:ise:syslog" ((log_type="Passed_Authentications" OR log_type="Passed_Authentications:") OR DetailedInfo="Authentication succeed*" OR MESSAGE_CODE IN ("60115") OR dataset_name="auth") AND NOT MESSAGE_CODE IN("5232","5240","5238","5205","5239")
# tags = success

[ccx_cisco_ise_change]
search = sourcetype="cisco:ise:syslog" AND (MESSAGE_CODE IN("52002", "60086", "58022", "58023", "58024", "60131", "60132", "60198", "5232", "5233", "60085", "60190", "60197", "60214", "51100", "60461") OR dataset_name="change")
# tags = account change

[ccx_cisco_ise_certificate]
search = sourcetype="cisco:ise:syslog" AND (dataset_name="cert")
# tags = certificate

[ccx_cisco_ise_endpoint_service]
search = sourcetype="cisco:ise:syslog" AND (MESSAGE_CODE IN("11010", "34127", "34126", "58001", "58002", "58005", "11009", "25004", "34050", "32000", "60234", "60235", "87751", "87604", "13002", "87608", "87609", "91004", "91018"))
# tags = report service

[ccx_cisco_ise_ids]
search = sourcetype="cisco:ise:syslog" AND (dataset_name="ids")
# tags = ids attack

[ccx_cisco_ise_general_events]
search = sourcetype="cisco:ise:syslog" AND (dataset_name="general")

[ccx_cisco_ise_log_out]
search = sourcetype="cisco:ise:syslog" MESSAGE_CODE IN("60115")

[ccx_cisco_network_session]
search = sourcetype="cisco:ise:syslog" MESSAGE_CODE="12514"	
# tags = network session

[ccx_cisco_ise_radius_update]
search = sourcetype="cisco:ise:syslog" MESSAGE_CODE IN("3002")

[ccx_cisco_ise_requests]
search = sourcetype="cisco:ise:syslog" MESSAGE_TEXT IN("*request*")

[ccx_cisco_ise_system_log]
search = sourcetype="cisco:ise:syslog" MESSAGE_CODE IN("5240")

[ccx_cisco_ise_traffic]
search = sourcetype=cisco:ise:syslog MESSAGE_CODE="61025"
# tags = network communicate

[ccx_cisco_ise_profiler]
search = sourcetype=cisco:ise:syslog MESSAGE_CODE=80002 MESSAGE_TEXT="Profiler EndPoint profiling event occurred"

[ccx_cisco_ise_system_statistics]
search = sourcetype=cisco:ise:syslog (CISE_System_Statistics OR CSCOacs_System_Statistics)

[ccx_cisco_ise_provision_succeeded]
search = sourcetype=cisco:ise:syslog "client provisioning succeeded"

[ccx_cisco_ise_provision_failed]
search = sourcetype=cisco:ise:syslog CISE_Posture_and_Client provisioning_Audit

[ccx_cisco_ise_vulnerabilities]
search = sourcetype="cisco:ise:syslog" AND (dataset_name="vuln")
# tags = vulnerability
