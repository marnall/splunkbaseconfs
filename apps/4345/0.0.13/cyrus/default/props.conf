[cyrus_syslog]
CHARSET = ISO-8859-1
MAX_TIMESTAMP_LOOKAHEAD = 32
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%T.%6N%:z
REPORT-syslog = syslog-extractions, rewritembox, removedelim, rewriteindex, actionlogin, actionaudit
TRANSFORMS-host = syslog-host
REPORT-oldmailbox = rewriteoldmbox
REPORT-newmailbox = rewritenewmbox
category = Email
description = Output produced by the Cyrus-IMAPD email server
disabled = false
pulldown_type = 1

# Following regex does not accept "\^"!!!
EVAL-name = if ( match(name, "^"), replace(name, "\^", "."), name)
EVAL-oldname = if ( match(oldname, "^"), replace(oldname, "\^", "."), oldname)
EVAL-newname = if ( match(newname, "^"), replace(newname, "\^", "."), newname)
EVAL-folder = if ( isnull(folder) AND !isnull(name), "INBOX", replace(replace(folder,"\.","/"),"\^",".") )
EVAL-oldfolder = if ( isnull(oldfolder) AND !isnull(oldmailbox), "INBOX", replace(replace(oldfolder,"\.","/"),"\^",".") )
EVAL-newfolder = if ( isnull(newfolder) AND !isnull(newmailbox), "INBOX", replace(replace(newfolder,"\.","/"),"\^",".") )

EVAL-oldmailbox = case(!(isnull(oldname) OR isnull(olddomain)), if ( match(oldname, "^"), replace(oldname, "\^", "."), oldname) . "@" . olddomain, match(oldmailbox,"^"), replace(oldmailbox, "\^", "."))
EVAL-newmailbox = case(!(isnull(newname) OR isnull(newdomain)), if ( match(newname, "^"), replace(newname, "\^", "."), newname) . "@" . newdomain, match(newmailbox,"^"), replace(newmailbox, "\^", "."))
EVAL-mailbox = case(!(isnull(name) OR isnull(domain)), if ( match(name, "^"), replace(name, "\^", "."), name) . "@" . domain, match(mailbox,"^"), replace(mailbox, "\^", "."))

EXTRACT-ioerror = (?P<error>IOERROR)\: opening (?P<type>quota file)\s+(?P<value>[^\:]+)\:\s(?P<detail>[^$\r\n]+)
EXTRACT-client,client_ip,user,login_type,sessionid = [^\s]\slogin\:(?:\s(?P<client>[\w\-\.]+)|)\s\[(?P<client_ip>[^\]]+)\]\s(?P<user>[^\s]+)\s(?P<login_type>\w+)\D+SESSIONID=<(?P<sessionid>[\w+\-]+)>
EXTRACT-orig_client_ip,mua,mua_version,orig_sessionid = [^\s]\sclient\sid(?:|\s+sessionid=<(?P<sessionid>[^>]+)>)\:(?:\s"x-originating-ip"\s"(?P<orig_client_ip>[^\"]+)"|)(?:\s"name"\s"(?P<mua>[^\"]+)"|)(?:\s"(?:x|)version"\s"(?P<mua_version>[^\"]+)"|)(?:\s"x-session-ext-id"\s"(?P<orig_sessionid>[^\"]+)"|)
EXTRACT-LOAD = USAGE\s+(?P<mailbox>[^\s]+)\s+user:\s+(?P<load_user>[\d\.]+)\s+sys:\s+(?P<load_sys>[\d\.]+)
