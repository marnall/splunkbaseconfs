[removedelim]
SOURCE_KEY = _raw
REGEX = ([\w\-]+[^=])=<([^>]+)>
FORMAT = $1::$2

[rewritembox]
SOURCE_KEY = _raw
REGEX = mailbox=<(?<domain>[^!]+)!(?:(?<delaydelete>DELETED)\.|)user\.(?<name>[^\.>]+)(?:\.(?<folder>[^>]+)|)>

[rewriteoldmbox]
SOURCE_KEY = _raw
REGEX = oldmailbox=<(?<olddomain>[^!]+)!(?:(?<delaydelete>DELETED)\.|)user\.(?<oldname>[^\.>]+)(?:\.(?<oldfolder>[^>]+)|)>

[rewritenewmbox]
SOURCE_KEY = _raw
REGEX = newmailbox=<(?<newdomain>[^!]+)!(?:(?<delaydelete>DELETED)\.|)user\.(?<newname>[^\.>]+)(?:\.(?<newfolder>[^>]+)|)>

[rewriteindex]
# This is separate from [rewritembox] because here Cyrus uses \: as separator.
# But \: is a legit char for folder name. So we keep [rewritembox] safe
# and here we accept the risk of wrong extraction.
SOURCE_KEY = _raw
REGEX = (?<error>IOERROR)\: opening (?<type>index)\s+(?<domain>[^!]+)!(?:(?<delaydelete>DELETED)\.|)user\.(?<name>[^\.:]+)(?:\.(?<folder>[^:]+)|):\s(?<detail>[^$\r\n]+)

[actionlogin]
SOURCE_KEY = _raw
REGEX = \]:\s(?<action>login):\s+

[actionaudit]
SOURCE_KEY = _raw
REGEX = \]:\sauditlog:\s(?<action>\w+)\s
