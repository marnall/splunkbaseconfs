[script:splunk_app_tv_registered_devices]
match                 = /registered_devices
script                = splunk_tv/rest/registered_devices_handler.py
scripttype            = persist
handler               = splunk_tv/rest/registered_devices_handler.RegisteredDevicesHandler
python.version        = python3

[script:splunk_app_tv_request_forwarder]
match                 = /splunk_app_tv/process_request
script                = splunk_tv/rest/request_forwarder.py
scripttype            = persist
handler               = splunk_tv/rest/request_forwarder.RequestForwarder
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth        = true
python.version        = python3

[script:splunk_app_tv_subscription_request_forwarder]
match                 = /splunk_app_tv/process_subscription
script                = splunk_tv/rest/request_forwarder.py
scripttype            = persist
handler               = splunk_tv/rest/request_forwarder.RequestForwarder
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth        = true
python.version        = python3
