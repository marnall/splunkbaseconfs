[Badges Monitoring - Backup Wallets]
disabled = 1
cron_schedule = 0 13 * * *
dispatch.earliest_time = -1d
dispatch.latest_time = now
enableSched = 1
search = | inputlookup wallets\
| outputlookup wallets_bkp.csv

[Badges Monitoring - Restore Wallets]
disabled = 1
enableSched = 1
search = | inputlookup wallets_bkp.csv\
| outputlookup wallets
