[idaptive_headers]
REGEX = .*\d{1,2}\:\d{1,2}\:\d{1,2}\.*?\s(?<system>[^\s]*)\s+.*INFO\s+(?<product>(?:[^|\\]|(?:\\{2})|\\\|)+)\|(?<category>(?:[^|\\]|(?:\\{2})|\\\|)+)\|(?<eventname>(?:[^|\\]|(?:\\{2})|\\\|)+)

# Above regex extracts the following 4 fields from sample IIS event syslog
# system = localhost
# product = Idaptive
# category = Cloud.Core
# eventname = Cloud.Core.OAuthToken.Create

# Sample IIS event syslog:
# Oct 10 19:04:04 localhost idaptive-syslog-writer[254]: INFO Idaptive|Cloud.Core|Cloud.Core.OAuthToken.Create| Level="Error" EndTime="/Date(1570732440748)/" AppId="oauthsiem" EventType="Cloud.Core.OAuthToken.Create" AzDeploymentId="89d6f336de064560b6c783985e1497fb" WhenOccurred="/Date(1570714440844)/" RequestHostName="116.74.212.40" Scopes="siem" StartTime="/Date(1570714440844)/" WhenLogged="/Date(1570714440844)/" AzRoleName="WebRole" RequestUserAgent="python-requests/2.12.3" AzRoleId="WR_i-0bfef58ad56f7fb62" ClientIPAddress="116.74.212.40" AuthMethod="None" EventMessage="<Missing format string - selector: EventType(Cloud.Core.OAuthToken.Create)>" DirectoryServiceNameLocalized="Idaptive Directory" InternalTrackingID="fac53abaea8c43e8951552a94964f01f" ThreadType="RestCall" FromIPAddress="116.74.212.40" RequestDeviceOS="Unknown" Tenant="AAA4104" ID="7728b2797d63e199.W01.5a60.ff2ff03e95ef107c" UserGuid="bfe03724-579e-40c6-b746-0ce6626063a3" DirectoryServiceUuid="09B9A9B0-6CE8-465F-AB03-65766D33B05E" NormalizedUser="siemuser@aaa4104" whenoccurreddate="2019-10-10T13:34:00.844000Z" DirectoryServiceName="CDS" RequestIsMobileDevice="False" TokenType="Access"

[idaptive_syslog_regex]
REGEX = .*Idaptive.*whenoccurreddate=.*
FORMAT = sourcetype::iis:events
DEST_KEY = MetaData:Sourcetype
