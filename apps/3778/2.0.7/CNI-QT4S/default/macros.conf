[cnilog]
definition = (subtype="apf-flow")
disabled = 1

[default_provider]
definition = eval CTI Provider Name=if('CTI Provider Name'=="Unknown",cti_provider,'CTI Provider Name')
iseval = 0

[all_feeds]
definition = fillnull cti_feed, geo_srcip, geo_dstip value=Unknown \
| eval all_feeds=if(cti_feed=="Unknown",geo_srcip, cti_feed) \
| eval all_feeds=if(all_feeds=="Unknown",geo_dstip, all_feeds)
iseval = 0

[RuleGate]
definition = sourcetype="CNI:RuleGate" type="traffic" subtype="apf-flow"
iseval = 0

[RuleGate-AI]
definition = sourcetype="CNI:RuleGate" type="ai" subtype="apf-flow-ai"
iseval = 0
disabled = 
