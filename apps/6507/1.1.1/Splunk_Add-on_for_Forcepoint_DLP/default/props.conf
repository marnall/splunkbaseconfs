[FP_DLP]
KV_MODE = none
SHOULD_LINEMERGE = false
DATETIME_CONFIG = CURRENT
#LINE_BREAKER = ([\r\n]+)
BREAK_ONLY_BEFORE_DATE = 
disabled = false
NO_BINARY_CHECK = true
category = Application
description = Forcepoint DLP
pulldown_type = 1

#####Extractions for Forcepoint DLP#####
EXTRACT-Product = ^\w+:\d+\|\w+\|(?P<Product>[^\|]+)
EXTRACT-Product_Version = (?<=\|)(?<Product_Version>\d+\.\d+\.\d+)(?=\|)
EXTRACT-DLP_Incident_ID = (?<=\|)(?<DLP_Incident_ID>\d{6})(?=\|)
EXTRACT-action = (?<=act=)(?<Action>.+)(?=\sduser)
EXTRACT-IncidentDest = (?<=duser=)(?<IncidentDest>.+)(?=\sfname=)
EXTRACT-Attachment = (?<=fname=)(?<Attachment>.+)(?=\s\-)
EXTRACT-AttachmentSize = (?<=\s\-\s)(?<AttachmentSize>.+)(?=\smsg=)
EXTRACT-MessageDetails = (?<=msg=)(?<MessageDetails>.+)(?=\ssuser=)
EXTRACT-Source = (?<=suser=)(?<Source>.+)(?=\scat=)
EXTRACT-PolicyCategory = (?<=cat=)(?<PolicyCategory>.+)(?=\ssourceS)
EXTRACT-Channel = (?<=sourceServiceName=)(?<Channel>.+)(?=\sanalyzedBy=)
EXTRACT-AnalyzedBy = (?<=Policy\sEngine\s)(?<AnalyzedBy>.+)(?=\sloginName)
EXTRACT-Username = (?<=\\\\)(?<Username>.+)(?=\ssourceIp=)
EXTRACT-SourceIP = (?<=sourceIp=)(?<SourceIP>.+)(?=\sseverityType=)
EXTRACT-Severity = (?<=severityType=)(?<Severity>.+)(?=\ssourceHost=)
EXTRACT-TotalMatches = (?<=maxMatches=)(?<Total_Matches>.+)(?=\stime)
EXTRACT-Destination = (?<=\sdestinationHosts=)(?<Destination>.+)(?=\seventId=)
EXTRACT-EventID = (?<=eventId=)(?<EventID>.+)(?=\s)

