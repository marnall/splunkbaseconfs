#
# props.conf for Splunk_HuaweiCsoftX3000
#
# Do not edit this file. Copy to ../local/props.conf, make changes there
#

#
# Use a stanza like this one if...
# the Huawei logs are raw binary, uncompressed.  
# Example: /var/log/huawei/*.log
#
#[source::/var/log/huawei/*\.log$]
#invalid_cause = archive
#unarchive_cmd = $SPLUNK_HOME/etc/apps/Splunk_HuaweiCsoftX3000/bin/huawei2text.pl

#
# Use a stanza like this one if...
# the Huawei logs are compressed (gzip'd in this example).  
# Example: /var/log/huawei/*.log.gz
#
#[source::/var/log/huawei/*.gz]
#invalid_cause = archive
#unarchive_cmd = gzip -cd - | $SPLUNK_HOME/etc/apps/Splunk_HuaweiCsoftX3000/bin/huawei2text.pl
