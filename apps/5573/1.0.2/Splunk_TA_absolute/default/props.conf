[absolute:device]
LINE_BREAKER = ([\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 28
SHOULD_LINEMERGE = false
TIME_PREFIX = ^
TIME_FORMAT = %FT%T %z
TRUNCATE = 999999
KV_MODE = json
EXTRACT-userdata = (?<userDomain>[^\\\]+)\\\(?<owner>.+)$ in username
FIELDALIAS-os = os.name AS osName
EVAL-ip = coalesce(mvindex(networkAdapters{}.ipV4Address, 0, 0), localIp)
EVAL-mac = if(match(mvindex(networkAdapters{}.macAddress, 0, 0), "^0x[A-Fa-f0-9]+$"), replace(replace(mvindex(networkAdapters{}.macAddress, 0, 0), "^0x", ""), "([A-Fa-z0-9]{2})\B", "\1:"), mvindex(networkAdapters{}.macAddress, 0, 0))
EVAL-av_required = if(match(osName, "(W|w)indows"), "true", "false")
EVAL-nt_host = coalesce(networkAdapters{}.dnsHostName, systemName)
EVAL-dns = coalesce(networkAdapters{}.dnsHostName, systemName . "." . coalesce(domain, "unknown"))

[absolute:syslog]
LINE_BREAKER = ([\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 25
SHOULD_LINEMERGE = false
TIME_PREFIX = date="
TIME_FORMAT = %F %T %Z
TRUNCATE = 5000
TRANSFORMS-absolute = abs_set_sourcetype
EXTRACT-abs_dvc = \s(?<dvc>[^\s]+)\sAbsoluteSIEMConnector\s
EXTRACT-abs_bare_fields = AbsoluteSIEMConnector\s+\d+\s+Absolute\.[^\s]+\s\-\sCEF:\s\d\s\"(?<vendor_product>[^\"]+)\"\s+[^\s]+\s+(?<vendor_product_version>\d+\.\d+)\s+
REPORT-abs_named_fields = absolute_named_fields
FIELDALIAS-act = verb AS action
FIELDALIAS-evt = eventType AS change_type
FIELDALIAS-obj = objectName AS object
FIELDALIAS-obj_attr = objectProperties AS object_attrs
FIELDALIAS-obj_cat = objectType AS object_category
FIELDALIAS-obj_id = objectID AS object_id
