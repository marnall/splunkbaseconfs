[default]
[WinEventLog]
FIELDALIAS-command_line_new_ta = New_Process_Name AS command_line
EVAL-process_id = tonumber(New_Process_ID,16)
EVAL-parent_process = tonumber(Creator_Process_ID,16)

[WinEventLog:Security]
FIELDALIAS-process_name_pre_new_ta = New_Process_Name AS process_name
EVAL-process_id = tonumber(New_Process_ID,16)
FIELDALIAS-commandline = New_Process_Name AS command_line
EVAL-parent_process = tonumber(Creator_Process_ID,16)

[XmlWinEventLog:Microsoft-Windows-Sysmon/Operational]
FIELDALIAS-process = CommandLine AS command_line Image AS process_name

[bro_dhcp]
EXTRACT-dest_mac = ^(?:[^\t\n]*\t){6}(?P<dest_mac>[^\t]+)

[fgt_traffic]
FIELDALIAS-dest_ip = dstip AS dest_ip

[source::WinEventLog:Security]
FIELDALIAS-process_execution_aliases = New_Process_Name AS process_name

[stream:dns]
FIELDALIAS-query = "query_type{}" AS query_type "query{}" AS query

[stream:http]
EVAL-url = site . uri

[alert_metadata]
EXTRACT-result_id = result_id":\s"(?P<result_id>\d+)
