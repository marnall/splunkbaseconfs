[mac_Auth_Cancel]
definition = inputlookup authorizations.csv| eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")|sort _time|stats values(amount) as amount first(action) as first_action last(action) as last_action by customer, subcontractor,sessionID |where first_action="cancelled" AND last_action="authorized"|eval amount=tostring(round(amount, 2),"commas")
iseval = 0

[mac_reciev_cancel]
definition = inputlookup authorizations.csv| eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")|sort _time|where action="cancelled"|table _time, customer, action, amount, subcontractor|eval amount=tostring(round(amount, 2),"commas")
iseval = 0

[mac_reciev_error]
definition = inputlookup authorizations.csv| eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")|sort _time|where action="error"|table _time, customer, action, amount, subcontractor|eval amount=tostring(round(amount, 2),"commas")
iseval = 0

[mac_6mon_inact]
definition = inputlookup customer_txn.csv | eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")|sort - _time|lookup CCData customer|stats sum(amount) as total_spent first(_time) as _time  first(previous_tx_date) as previous_date by customer|where total_spent>3000 and _time>relative_time(strptime(previous_date, "%m/%d/%Y %H:%M:%S"), "+6mon")|eval total_spent=tostring(round(total_spent, 2),"commas")
iseval = 0

[mac_6mon_inact_num]
definition = inputlookup customer_txn.csv | eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")\
|sort - _time|lookup CCData customer|stats sum(amount) as total_spent first(_time) as _time  first(previous_tx_date) as previous_date by customer\
|where total_spent>3000 and _time>relative_time(strptime(previous_date, "%m/%d/%Y %H:%M:%S"), "+6mon")|eval total_spent=tostring(round(total_spent, 2),"commas") | eval isOutlier = 1  | where isOutlier=1 | stats count
iseval = 0

[mac_Auth_over_time]
definition = inputlookup authorizations.csv| eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")|sort - _time|timechart span=10m fixedrange=F count(action) as action by subcontractor
iseval = 0

[mac_GreaterAvg_2SD]
definition = inputlookup authorizations.csv| where action="authorized"|eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")|eval amount=tostring(round(amount, 2),"commas")|stats count values(amount) as amounts values(subcontractor) as subcontractors by customer|eventstats avg(count) as avg stdev(count) as stdev|where count>(avg+2*stdev)| sort - count
iseval = 0

[mac_GreaterAvg_respTime]
definition = inputlookup authorizations.csv| eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")|sort - _time|stats avg(ResponseTime) as averageResp by customer,subcontractor|eventstats avg(averageResp) as avg stdev(averageResp) as stdev |where averageResp>(avg+4*stdev)
iseval = 0

[mac_large_spending]
definition = inputlookup customer_txn.csv | eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")|sort - _time|streamstats earliest(amount) as first_amount latest(amount) as last_amount earliest(_time) as _time latest(_time) as latest_time time_window=1m count(action) as num_transactions   by customer|where num_transactions>=2 and first_amount<20 and last_amount>3000|eval first_amount=tostring(round(first_amount, 2),"commas"), last_amount=tostring(round(last_amount, 2),"commas")| eval latest_time=strftime(latest_time,"%Y/%m/%d %H:%M:%S")|table customer, _time, latest_time, num_transactions, first_amount last_amount
iseval = 0

[mac_large_spending_num]
definition = inputlookup customer_txn.csv | eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")\
|sort - _time|streamstats earliest(amount) as first_amount latest(amount) as last_amount earliest(_time) as _time latest(_time) as latest_time time_window=1m count(action) as num_transactions by customer|where num_transactions>=2 and first_amount<20 and last_amount>3000|eval first_amount=tostring(round(first_amount, 2),"commas"), last_amount=tostring(round(last_amount, 2),"commas")| eval latest_time=strftime(latest_time,"%Y/%m/%d %H:%M:%S")|table customer, _time, latest_time, num_transactions, first_amount last_amount | eval isOutlier = 1  | where isOutlier=1 | stats count
iseval = 0

[mac_new_cats]
definition = inputlookup customer_txn.csv | eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S")|sort - _time|lookup CCData customer|streamstats window=1 list(category) as category by customer |makemv delim="|" categories|eval match=if(match(categories,category),1,0)|where match=0 and amount>1000|eval amount=tostring(round(amount, 2),"commas")|table customer _time, amount, categories category, action
iseval = 0

