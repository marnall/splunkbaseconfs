[fortimail_email]
search = sourcetype="fml:statistics"
#tags = email

[fortimail_encrypt]
search = sourcetype="fml:encrypt"

[fortimail_spam]
search = sourcetype="fml:spam"

[fortimail_system]
search = sourcetype="fml:event"

[fortimail_virus]
search = sourcetype="fml:virus" subtype="infected"

[fortimail_authentication]
search = eventtype="fortimail_system" subtype="webmail" ("Login for" OR "logged in")
#tags = authentication

[fortimail_authentication_default]
search = eventtype="fortimail_system" subtype="admin" (action="success" OR action="failure")
#tags = authentication default