[bitwarden:events]

FIELDALIAS-signature_id = type AS signature_id

EVAL-type=if( type IN (1510,1513,1514,1516,2002,2003),"alert",'type')
EVAL-app=case( type IN (1510,1513,1514,1516,2002,2003),"Bitwarden",device==0,"Android", device==1,"iOS", device==2,"Chrome Extension", device==3,"Firefox Extension", device==4,"Opera Extension", device==5,"Edge Extension", device==6,"Windows Desktop", device==7,"macOS Desktop", device==8,"Linux Desktop", device==9,"Chrome Browser", device==10,"Firefox Browser", device==11,"Opera Browser", device==12,"Edge Browser", device==13,"IEBrowser", device==14,"Unknown Browser", device==15,"Android Amazon", device==16,"UWP", device==17,"Safari Browser", device==18,"Vivaldi Browser", device==19,"Vivaldi Extension", device==20,"Safari Extension", device==21,"SDK", device==22,"Server", device==23,"Windows CLI", device==24,"MacOs CLI", device==25,"Linux CLI" )
EVAL-change_type=if(type IN (1001,1002,1003,1004,1007,1008,1009,1010),"AAA","Filesystem")
EVAL-user = case('actingUserEmail'!="null", 'actingUserEmail','memberEmail'!="null", 'memberEmail')
EVAL-src_user = if('actingUserEmail'="null", null(), 'actingUserEmail')
EVAL-user_id= case('actingUserId'!="null", 'actingUserId','memberId'!="null", 'memberId')
EVAL-user_name = case('memberEmail'!="null", 'memberEmail','actingUserEmail'!="null", 'actingUserEmail')
EVAL-status = if('type' IN ("1005","1006"), "failure", "success")
EVAL-object_id = case('memberId'!="null", 'memberId', 'groupId'!="null", 'groupId', 'itemId'!="null", 'itemId')
EVAL-vendor_product = "Bitwarden"
EVAL-object = case(type==1001,"User",\
    type==1002,"User",\
    type==1003,"User",\
    type==1004,"User",\
    type==1007,"User",\
    type==1008,"User",\
    type==1009,"User",\
