\
```Because a user can input anything into the search string, it can sometimes confuse the loadjob and savedsearch extractions. The logic below looks only for search names which are <=100 characters long, which is the max length that a search name can be. Anything else that is longer than 100 characters long is clearly not a real search name and is a confused extraction, and thus disgarded```\
| eval len_search_name=len(all_search_ref_search_names)\
| search len_search_name<=100\
| stats values(time_range) as time_range by all_search_ref_search_names

