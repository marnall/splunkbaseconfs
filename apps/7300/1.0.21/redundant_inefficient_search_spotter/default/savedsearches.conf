| search app!=redundant_inefficient_search_spotter\
| fields - search eventSearch\
| where alert_action_trigger_perc>=50\
| sort - perc_of_scheduled_runtime\
| eval perc_of_scheduled_runtime=round(perc_of_scheduled_runtime,2)\
\
| eval total_run_time=round(total_run_time,2)\
| eval alert_action_trigger_perc=alert_action_trigger_perc."%"\
| rename actions as configured_actions, perc_of_scheduled_runtime as sched_run_time_%, alert_name as savedsearch_name\
| fields - configured_actions\
    | rename cron_schedule as cron_sch, permimssions as perms, total_runs as total_search_runs, total_run_time as total_search_run_time\
    | appendpipe \
[| eval hash_ko_app_owner_combo=md5(savedsearch_name.app.owner), hash_ko_app_combo=md5(savedsearch_name.app), hash_ko_name=md5(savedsearch_name), hash_app_name=md5(app), ko_type="search", reason="POSSIBLE REDUNDANT SEARCH: Alert action is triggered >50% of the time" \
| fields - savedsearch_name app open_action exclude_action \
| collect index=riss_summary \
| where false()]

