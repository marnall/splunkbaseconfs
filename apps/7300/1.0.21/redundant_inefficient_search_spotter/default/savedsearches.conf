[RISS UTILITY - Search Head Tracker - Lookup Gen]
action.email.show_password = 1
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 54 04 * * *
description = This search tracks the names of the search heads available, either in a SHC or if the SH is a standalone SH. It keeps the record of all SH names in a lookup file for 60 days to ensure that we do not lose context if a SH host is re-provisioned.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = redundant_inefficient_search_spotter
request.ui_dispatch_view = search
run_on_startup = 1
search = | rest splunk_server=local /services/server/roles timeout=0\
| table splunk_server \
| rename splunk_server as single_sh_name \
| append \
    [| loadjob savedsearch="nobody:redundant_inefficient_search_spotter:RISS UTILITY - SHC Member Name Retrieval"] \
| eval foo="bar" \
| stats values(single_sh_name) as single_sh_name values(shc_member_name) as shc_member_names by foo \
| eval sh_names=if(isnull(shc_member_names),single_sh_name, shc_member_names) \
| fields sh_names \
| rename sh_names as host \
| mvexpand host\
| eval last_seen=now()\
| append [| inputlookup sh_names_tracker.csv | table host last_seen]\
| stats max(last_seen) as last_seen by host\
| eval secs_in_61_days=5270400\
| eval sh_age=now()-last_seen\
| where sh_age<secs_in_61_days\
| table host last_seen\
| outputlookup sh_names_tracker.csv

