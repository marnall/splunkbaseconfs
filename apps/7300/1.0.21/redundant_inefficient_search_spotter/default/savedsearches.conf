[RISS CAPABILITY - ID by Best Practice Score - Last 60 Days]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 10 18 * * *
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = redundant_inefficient_search_spotter
request.ui_dispatch_view = search
run_on_startup = 1
search = | loadjob savedsearch="nobody:redundant_inefficient_search_spotter:RISS UTILITY - Preload Endpoint Results - Dashboard Views" \
| dedup eai:acl.app author title \
| table splunk_server eai:acl.app author label title eai:data eai:acl.sharing \
| rename splunk_server as host, eai:acl.sharing as permissions \
| eval permissions=if(permissions=="user","private",permissions) \
| search NOT eai:acl.app="splunk_instance_monitoring" NOT eai:acl.app="splunk_instrumentation" \
| rex field=eai:data max_match=0 "\<query\>(?<searches>.*)\s" \
| rex field=eai:data max_match=0 "\<refresh\>(?<refresh>.*)\</refresh\>" \
| rex field=eai:data max_match=0 "loadjob\s+savedsearch=\".*?:.*?:(?<loadjob>.*)\"" \
| rex field=eai:data max_match=0 "\<search ref=\"(?<ref>.*)\"" \
| rex field=eai:data max_match=0 "\<panel\>(?<panel>.*)\s" \
| stats values(label) as label count(refresh) as refreshing_panels values(refresh) as refreshes count(searches) as searches count(loadjob) as count_loadjobs values(loadjob) as loadjobs values(ref) as referenced_jobs count(ref) as count_referenced_jobs count(panel) as panels by eai:acl.app author title permissions \
| rename eai:acl.app as app, title as dashboard \
| search NOT app="splunk_instance_monitoring" \
| table app author permissions label dashboard panels refreshing_panels refreshes count_loadjobs loadjobs count_referenced_jobs referenced_jobs \
| join type=outer app dashboard \
    ``` SCHD SEARCH: DASHBOARD LOAD COUNT``` \
    [| loadjob savedsearch="nobody:redundant_inefficient_search_spotter:RISS UTILITY - Dashboard Load Counts - Last 60 Days" \
| search time_range="*" \
| stats sum(users_count) as user_count sum(dashboard_load_count) as dashboard_load_count by dashboard_app dashboard \
| fields - time_range \
| rename dashboard_app as app] \
| join type=inner app dashboard \
[| loadjob savedsearch="nobody:redundant_inefficient_search_spotter:RISS UTILITY - Dashboard Runtimes - Last 60 Days" \
    ``` SCHD SEARCH: DASHBOARD RUNTIME``` \
    | search time_range="*" \
| stats avg(best_practice_avg) as best_practice_avg sum(dashboard_search_executions) as dashboard_search_executions sum(total_dashboard_run_time) as total_dashboard_run_time sum(dasboard_search_execution_count) as dasboard_search_execution_count sum(no_result_executions) as no_result_executions sum(no_result_panels_run_time) as no_result_panels_run_time max(panels_with_no_results) as panels_with_no_results by app dashboard \
| eventstats sum(total_dashboard_run_time) as all_dashboards_run_time \
| eval dashboard_run_time_%=round(total_dashboard_run_time/all_dashboards_run_time*100,2) \
| eval best_practice_avg=round(best_practice_avg,2) \
| eval inverse_bp_score=5-best_practice_avg \
| eval sorting_score=inverse_bp_score*total_dashboard_run_time \
| fields - inverse_bp_score all_dashboard_runtime ] \
| eval open_action="Open Dashboard", exclude_action="Exclude Dashboard" \
| table app dashboard label author permissions open_action exclude_action dashboard_load_count user_count refreshing_panels refreshes best_practice_avg dashboard_search_executions total_dashboard_run_time sorting_score dashboard_run_time_% \
| search NOT ( \
[| inputlookup riss_ko_exclusion_list \
| search ko_type=dashboard exclusion_category=inefficient_dashboards \
| fields ko_name app owner \
| rename ko_name as dashboard, owner as author]) ```This is excluding any reports that are part of the exclusion list CSV file``` \
    | search app!=redundant_inefficient_search_spotter\
| where best_practice_avg<=3 \
| sort - sorting_score \
| fields - sorting_score \
| rename permissions as perms, dashboard_load_count as dash_load#, refreshing_panels as refresh_pnls, dashboard_search_executions as dash_search#, total_dashboard_run_time as total_dash_run_time, dashboard_run_time_% as dash_run_time_%, author as owner \
| appendpipe \
[| eval hash_ko_app_owner_combo=md5(dashboard.app.owner), hash_ko_app_combo=md5(dashboard.app), hash_ko_name=md5(dashboard), hash_app_name=md5(app), ko_type="dashboard", reason="INEFFICIENCY FOUND: Dashboard has a 'search best practice score' average <=3 (out of 5)"\
| fields - dashboard label app open_action exclude_action \
| collect index=riss_summary \
| where false()]

