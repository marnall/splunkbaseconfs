| rex field=search max_match=0 "[\||\[]\s*savedsearch[^\"]*?(?<search_name_called_no_quotes>\s[^\s=]+?)(?:[\s]|(?:\s*?')|(?:\s*?$)|(?:\s*?\])|(?:\s*?\|))" \
| eval search_name_called_no_quotes=ltrim(search_name_called_no_quotes," ") \
| fillnull value="" search_name_called_quotes, search_name_called_no_quotes \
| mvexpand search_name_called_quotes \
| mvexpand search_name_called_no_quotes \
| eval search_name_called_quotes=ltrim(search_name_called_quotes,"\"") \
| eval search_name_called_quotes=rtrim(search_name_called_quotes,"\"") \
| eval search_name_called_no_quotes=if(like(search_name_called_no_quotes,"\"%"),null(),search_name_called_no_quotes) \
| eval search_name_called=mvappend(search_name_called_no_quotes,search_name_called_quotes)\
    ```NEW LOADJOB LOGIC``` \
| rex max_match=0 field=search "[\||\[|search]\s*loadjob.+?(?:savedsearch=)\S+?\:\S+?\:(?<loadjob_search_name_called>.+?)(?:(?:\s*\|)|(?:\s*$)|(?:\s*')|(?:\s*\])|(?:\s+(?:[A-Z]|[a-z]|[_])*=))"  \
| fillnull value="" loadjob_search_name_called \
| mvexpand loadjob_search_name_called\
| eval loadjob_search_name_called=ltrim(loadjob_search_name_called,"\""), loadjob_search_name_called=rtrim(loadjob_search_name_called,"\""), loadjob_search_name_called=rtrim(loadjob_search_name_called,"\"]"), loadjob_search_name_called=rtrim(loadjob_search_name_called,"\"]'"), loadjob_search_name_called=rtrim(loadjob_search_name_called,"]"), loadjob_search_name_called=rtrim(loadjob_search_name_called,"]'") \
| eval all_search_ref_search_names=mvappend(loadjob_search_name_called,search_name_called) \
| rename all_search_ref_search_names as referenced_search_names, title as referrer_search_names\
| mvexpand referenced_search_names \
| stats count by referrer_search_names referenced_search_names \
| search referenced_search_names!=""\
