| eval referenced_search_names=replace(referenced_search_names,"&gt;",">"), referenced_search_names=replace(referenced_search_names,"&lt;","<"), referenced_search_names=replace(referenced_search_names,"&amp;","&"), referenced_search_names=replace(referenced_search_names,"&quot;","\""), referenced_search_names=replace(referenced_search_names,"&apos;","'")\
\
| join referrer_search_names type=outer \
[| loadjob savedsearch="nobody:redundant_inefficient_search_spotter:RISS UTILITY - Saved Searches Run Adhoc - Last 60 Days"\
| rename all_search_ref_search_names as referrer_search_names\
| eval referrer_search_is_used="true"]\
