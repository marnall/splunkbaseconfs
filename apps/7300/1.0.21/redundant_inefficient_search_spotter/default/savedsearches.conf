| rex field=eai:data max_match=0 "[\||\[]\s*savedsearch[^\"]*?(?<search_name_called_no_quotes>\s[^\s=]+?)(?:[\s]|(?:\s*?')|(?:\s*?$)|(?:\s*?\])|(?:\s*?\|))" \
| eval search_name_called_no_quotes=ltrim(search_name_called_no_quotes," ") \
| fillnull value="" search_name_called_quotes, search_name_called_no_quotes \
| mvexpand search_name_called_quotes \
| mvexpand search_name_called_no_quotes \
| eval search_name_called_quotes=ltrim(search_name_called_quotes,"\"") \
| eval search_name_called_quotes=rtrim(search_name_called_quotes,"\"") \
| eval search_name_called_no_quotes=if(like(search_name_called_no_quotes,"\"%"),null(),search_name_called_no_quotes) \
| eval search_name_called=mvappend(search_name_called_no_quotes,search_name_called_quotes)\
    ```NEW LOADJOB LOGIC``` \
| rex max_match=0 field=eai:data "[\||\[|search]\s*loadjob.+?(?:savedsearch=)\S+?\:\S+?\:(?<loadjob_search_name_called>.+?)(?:(?:\s*\|)|(?:\s*$)|(?:\s*')|(?:\s*\")|(?:\s*\])|(?:\s+(?:[A-Z]|[a-z]|[_])*=))"  \
| fillnull value="" loadjob_search_name_called \
| mvexpand loadjob_search_name_called \
| eval loadjob_search_name_called=ltrim(loadjob_search_name_called,"\""), loadjob_search_name_called=rtrim(loadjob_search_name_called,"\""), loadjob_search_name_called=rtrim(loadjob_search_name_called,"\"]"), loadjob_search_name_called=rtrim(loadjob_search_name_called,"\"]'"), loadjob_search_name_called=rtrim(loadjob_search_name_called,"]"), loadjob_search_name_called=rtrim(loadjob_search_name_called,"]'") \
| eval all_search_ref_search_names=mvappend(loadjob_search_name_called,search_name_called) \
| mvexpand all_search_ref_search_names \
| stats count(refresh) as count_refreshes values(refresh) as refreshes count(searches) as searches count(all_search_ref_search_names) as count_all_search_ref_search_names values(all_search_ref_search_names) as all_search_ref_search_names values(ref) as referenced_jobs count(ref) as count_referenced_jobs by eai:acl.app author title dashboard_permissions \
| rename eai:acl.app as app \
| fields app author dashboard_permissions title count_refreshes refreshes count_all_search_ref_search_names all_search_ref_search_names count_referenced_jobs referenced_jobs \
| fillnull all_search_ref_search_names referenced_jobs value="" \
| mvexpand referenced_jobs \
| mvexpand all_search_ref_search_names \
| eval search_names=all_search_ref_search_names.":splunkcmcseperator:".referenced_jobs \
| makemv search_names delim=":splunkcmcseperator:" \
| mvexpand search_names \
| eval app_dash_perm=app.+":".title.+":".+dashboard_permissions \
| stats values(app_dash_perm) as app_dash_perm by search_names \
| rename search_names as title \
| eval title=replace(title,"&gt;",">"), title=replace(title,"&lt;","<"), title=replace(title,"&amp;","&"), title=replace(title,"&quot;","\""), title=replace(title,"&apos;","'") \
| eval has_dashboard_ref="true"

