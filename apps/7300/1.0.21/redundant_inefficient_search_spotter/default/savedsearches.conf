     [| loadjob savedsearch="nobody:redundant_inefficient_search_spotter:RISS UTILITY - Scheduled Search Runs and Metadata - Last 60 Days"\
| search time_range="*"\
| eventstats sum(total_run_time) as all_scheduled_search_runtime\
    | eval perc_of_scheduled_runtime=round(total_run_time/all_scheduled_search_runtime*100,10)\
    | table total_runs total_result_count triggered_actions_count triggered_actions total_run_time savedsearch_name app user perc_of_scheduled_runtime\
    | rename user as owner\
    | rename savedsearch_name as alert_name\
    | stats sum(total_runs) as total_runs sum(total_result_count) as total_result_count sum(triggered_actions_count) as triggered_actions_count values(triggered_actions) as triggered_actions sum(total_run_time) as total_run_time sum(perc_of_scheduled_runtime) as perc_of_scheduled_runtime by alert_name app owner]\
    | rex field=host "(?<host>[\w|-]*)\." \
| eval alert_action_trigger_perc=round((triggered_actions_count/total_runs*100),2)\
| eval open_action="Open Alert", exclude_action="Exclude Alert"\
| table alert_name app owner permissions open_action exclude_action cron_schedule actions triggered_actions alert_action_trigger_perc total_runs  total_run_time search perc_of_scheduled_runtime\
