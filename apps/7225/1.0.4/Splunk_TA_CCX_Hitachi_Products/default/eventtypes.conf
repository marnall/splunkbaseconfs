
[ccx_hitachi_products_alert]
search = (sourcetype="ccx:hitachi:nas:cef") log_category IN ("Queuing email for sending", "Linux audit event", "Gathering*", "Printing*", "Saving*", "Sending*", "Masking in Security Descriptor values", "Masking out Security Descriptor values")
# tags = alert

[ccx_hitachi_products_authentication]
search = (sourcetype="ccx:hitachi:nas:cef") log_category IN ("Login*", "A management user failed to authenticate", "A management user has successfully authenticated")
# tags = authentication

[ccx_hitachi_products_change]
search = (sourcetype="ccx:hitachi:nas:cef") log_category IN ("Adding*", "Changing*", "Creat*", "Deleting*", "Removing*", "Displaying CIFS keytab list", "Reading a Kerberos keytab for NFS", "Starting*", "Modifying an NFS export", "An NDMP operation has started", "*changes", "Clearing*", "Listing directory entries", "Setting*", "Disabling cluster-node routing", "Enabling cluster-node routing", "Enabling EVS", "Disabling EVS")
# tags = change

[ccx_hitachi_products_command_executed]
search = (sourcetype="ccx:hitachi:nas:cef") log_category IN ("Developer level command executed")

[ccx_hitachi_products_filesystem]
search = (sourcetype="ccx:hitachi:nas:cef") log_category IN ("*file system*", "*filesystem*")

[ccx_hitachi_products_reassessing_credentials]
search = (sourcetype="ccx:hitachi:nas:cef") log_category IN ("Reassessing credentials")

[ccx_hitachi_products_user_logout]
search = (sourcetype="ccx:hitachi:nas:cef") log_category IN ("*logging out", "Logout*")

[ccx_hitachi_products_system_variable]
search = (sourcetype="ccx:hitachi:nas:cef") log_category IN ("Writing system variable")

[ccx_hitachi_products_cifs_file]
search = (sourcetype="ccx:hitachi:nas:cef") log_category IN ("Closing opened CIFS file")
