# SSE Controller tab
[admin:relay_module]
match   = /
members = relay_module_settings

[admin_external:relay_module_settings]
handlertype     = python
python.version  = python3
handlerfile     = relay_module_rh_settings.py
handleractions  = edit, list


# `Health` endpoints.
[script:health]
match                 = /health
script                = api/health.py
scripttype            = persist
handler               = api.health.Health
python.version        = python3
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true

# `Enrich` endpoints.
[script:observe-observables]
match                 = /observe/observables
script                = api/enrich/observe.py
scripttype            = persist
handler               = api.enrich.observe.Observe
python.version        = python3
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true

[script:deliberate-observables]
match                 = /deliberate/observables
script                = api/enrich/deliberate.py
scripttype            = persist
handler               = api.enrich.deliberate.Deliberate
python.version        = python3
