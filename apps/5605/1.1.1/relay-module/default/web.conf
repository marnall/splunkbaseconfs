# Settings tab
[expose:relay_module_settings]
pattern = relay_module_settings
methods = POST, GET

[expose:relay_module_settings_specified]
pattern = relay_module_settings/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET

# `Health` endpoints.
[expose:health]
methods = POST
pattern = health

# `Enrich` endpoints.
[expose:observe-observables]
methods = POST
pattern = observe/observables

[expose:deliberate-observables]
methods = POST
pattern = deliberate/observables

[expose:refer-observables]
methods = POST
pattern = refer/observables