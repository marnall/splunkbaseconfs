#
# Splunk app configuration file
#

[ui]
is_visible = 0
label = traceroute


[launcher]
author = Nimish Doshi
version=1.0.2
description = traceroute command takes an internet address field (ip or external) and tries to trace the route from where it is installed to a the address. It returns a traceroute field with the results of the trace. By default it times out 2 seconds per route, if 20 hops have been made, or if at least 5 hops refuse to tell you address information.

[package]
id=traceroute_command


