[mac_suspicious_dest_by_customer(9)]
args = ind, srctype, earl, late, destIP, amountTransferred, customerName, originAccount, destAccount
definition = index=$ind$ sourcetype=$srctype$ earliest=$earl$ latest=$late$\
|eval _time=strptime(_time, "%Y/%m/%d %H:%M:%S") |sort - _time\
|eval is_suspicious="no"\
|lookup susplcious_ip.csv ip as $destIP$ OUTPUT is_suspicious\
|where is_suspicious="yes" AND $amountTransferred$>10000|iplocation $destIP$|rename Country as destCountry|table _time, $customerName$, $originAccount$, $destAccount$, action, $amountTransferred$, destCountry, $destIP$\
| stats values(destCountry) as "Destination" by $customerName$, $amountTransferred$\
| rename $customerName$ as Customer, $amountTransferred$ as Amount
iseval = 0

