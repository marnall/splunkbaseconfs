[mac_multiple_failed_logins(9)]
args = ind, srctype, earl, late, span, customerName, originAccount, destAccount, amountTransferred
definition = index=$ind$ sourcetype=$srctype$ earliest=$earl$ latest=$late$\
|convert timeformat="%Y/%m/%d %H:%M:%S" ctime(epoch) AS c_time\
|sort - _time\
|streamstats time_window=$span$ count(eval(action="denied")) as denied_count count(eval(action="authorized")) as "authorized_count" latest(action) as latest_action by $customerName$,$originAccount$,$destAccount$\
|where denied_count>=5 and authorized_count>=1 and latest_action="authorized" \
|table _time, $customerName$, $originAccount$, $destAccount$, $amountTransferred$, denied_count, authorized_count\
|eval $amountTransferred$=tostring(round($amountTransferred$, 2),"commas")
iseval = 0

[mac_multiple_ip_within_timeframe(10)]
args = ind, srctype, earl, late, span, originAccount, destAccount, amountTransferred, originIP, customerName
definition = index=$ind$ sourcetype=$srctype$ earliest=$earl$ latest=$late$\
| convert timeformat="%Y/%m/%d %H:%M:%S" ctime(epoch) AS c_time|sort - _time\
| streamstats time_window=$span$ count(eval(action="authorized")) as authorized_count list($originAccount$) as FromAccount list($destAccount$) as ToAccount list($amountTransferred$) as amount list(action) as action list(c_time) as time values($originIP$) as clientIP dc(clientIP) as clientIP_count by $customerName$\
|where clientIP_count>=2\
|chart count(clientIP) as "Number of IP Addresses" values(clientIP) as "IP Addresses" by $customerName$
iseval = 0

[mac_new_acct_large_transfer(10)]
args = ind, srctype, earl, late, OpenDate, amountTransferred, destIP, customerName, originAccount, destAccount
definition = index=$ind$ sourcetype=$srctype$ earliest=$earl$ latest=$late$\
|sort - _time\
|where _time<relative_time($OpenDate$, "+1d")  and $amountTransferred$>1000|eval AccountOpenDate=strftime($OpenDate$,"%Y-%m-%d %H:%M:%S") |iplocation $destIP$|rename Country as DestCountry City as DestCity |table _time,AccountOpenDate, $customerName$, $amountTransferred$, $originAccount$, $destAccount$, DestCountry, DestCity
iseval = 0

