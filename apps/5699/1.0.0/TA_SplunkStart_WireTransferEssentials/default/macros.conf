[mac_errors_by_origin_country(10)]
args = ind, srctype, earl, late, destIP, originIP, customerName, amountTransferred, originAccount, destAccount
definition = index=$ind$ sourcetype=$srctype$ earliest=$earl$ latest=$late$ action="error"\
| iplocation $destIP$\
| rename Country as "Destination Country", City as "DestCity"\
| iplocation $originIP$\
| rename Country as "Origin Country", $customerName$ as Customer, $amountTransferred$ as Amount, action as Status\
| fields "Origin Country", "Destination Country", Customer, $originAccount$, $destAccount$, Amount, Status\
| stats count(Status) as Errors by "Origin Country"
