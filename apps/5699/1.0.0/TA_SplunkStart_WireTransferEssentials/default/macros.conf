[mac_authorized_transfers_within_hour(11)]
args = ind, srctype, earl, late, transferAmount, originAccount, destAccount, customerName, OpenDate, originIP, destIP
definition = index=$ind$ sourcetype=$srctype$ earliest=$earl$ latest=$late$\
|sort - _time|eval $transferAmount$=tostring(round($transferAmount$, 2),"commas")\
|streamstats time_window=1h count(eval(action="authorized")) as authorized_count list($originAccount$) as FromAccount list($destAccount$) as ToAccount list($transferAmount$) as amount list(action) as action list(_time) as time by $customerName$|where authorized_count>=7|fields - $OpenDate$ epoch $originIP$ $destIP$ _time\
| eval isOutlier = 1\
| table authorized_count, $customerName$, FromAccount, ToAccount, amount
iseval = 0

[mac_dest_ips_for_each_origin(6)]
args = ind, srctype, earl, late, destIP, originIP
definition = index=$ind$ sourcetype=$srctype$ earliest=$earl$ latest=$late$ action="authorized"\
| stats values($destIP$) as destIPs, dc($destIP$) as numDestIPs by $originIP$\
| rename $originIP$ as "Client IP", destIPs as "Destination IPs", numDestIPs as "Number of Destination IPs"\
| sort- "Number of Destination IPs"
iseval = 0
