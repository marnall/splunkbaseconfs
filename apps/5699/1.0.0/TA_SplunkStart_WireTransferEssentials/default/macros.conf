args = ind, srctype, earl, late, amountTransferred, customerName
definition = index=$ind$ sourcetype=$srctype$ earliest=$earl$ latest=$late$ action="authorized"|stats max($amountTransferred$) as max_amount by $customerName$|sort - max_amount|head 10
