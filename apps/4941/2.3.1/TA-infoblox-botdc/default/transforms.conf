fields_list = calculated_status,client_id,connected_time,created_time,device_info,group_id,group_name,name,net_info_fqdn,net_info_ipv4_addr_list_0,net_info_mac_addr_0, net_info_state_protection, net_info_state_upgrade, os_platform, updated_time, user_id, version

