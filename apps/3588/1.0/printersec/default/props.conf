[hp_printer_syslog]
DATETIME_CONFIG = 
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true
SHOULD_LINEMERGE = false
EXTRACT-severity,device = ^(?:[^ \n]* ){2}(?P<severity>[^:]+):\s+(?P<device>\w+)
EXTRACT-msg = ^(?:[^ \n]* ){4}(?P<msg>[^;]+)
LOOKUP-printersec = printmsglooup.csv msg AS msg OUTPUTNEW msg_action AS msg_action msg_description AS msg_description
