[default_index]
definition = index="aishield_index"
iseval = 0

[GuardianPolicyViolationReport]
definition = `default_index` sourcetype=Guardian\
| eval EventVendor="AIShield", EventProduct="Guardian"\
| spath path=fields.PolicyViolatedTheme output=PolicyViolatedTheme\
| spath path=fields.PolicyViolatedControlFeature output=PolicyViolatedControlFeature\
| spath path=fields.PolicyViolatedDescription output=PolicyViolatedDescription\
| spath path=fields.Severity output=Severity\
| spath path=fields.PolicyViolatedThresholdSetting output=PolicyViolatedThresholdSetting\
| spath path=fields.Query output=Query\
| spath path=fields.Input_Output output=Input_Output\
| spath path=fields.AppName output=App\
| spath path=fields.TargetLLM output=TargetLLM\
| spath path=fields.ActionTaken output=ActionTaken\
| spath path=fields.Mode output=Mode\
| spath path=fields.SourceIP output=SourceIP\
| spath path=fields.timestamp_s output=TimeStamp\
| makemv delim="," PolicyViolatedTheme\
| makemv delim="," PolicyViolatedControlFeature\
| makemv delim="," PolicyViolatedDescription\
| makemv delim="," Severity\
| makemv delim="," PolicyViolatedThresholdSetting\
| eval CombinedFields = mvzip(PolicyViolatedTheme, PolicyViolatedControlFeature, "||")\
| eval CombinedFields = mvzip(CombinedFields, PolicyViolatedDescription, "||")\
| eval CombinedFields = mvzip(CombinedFields, Severity, "||")\
| eval CombinedFields = mvzip(CombinedFields, PolicyViolatedThresholdSetting, "||")\
| mvexpand CombinedFields\
| eval splitFields = split(CombinedFields, "||")\
| eval PolicyViolatedTheme=mvindex(splitFields,0)\
| eval PolicyViolatedControlFeature=mvindex(splitFields,1)\
| eval PolicyViolatedDescription=mvindex(splitFields,2)\
| eval Severity=mvindex(splitFields,3)\
| eval PolicyViolatedThresholdSetting=mvindex(splitFields,4)\
| table PolicyViolatedTheme, PolicyViolatedControlFeature, PolicyViolatedDescription, Severity, PolicyViolatedThresholdSetting, Query, Input_Output, App, TargetLLM, ActionTaken, Mode, TimeStamp, EventProduct, EventVendor, SourceIP,_time
iseval = 0
