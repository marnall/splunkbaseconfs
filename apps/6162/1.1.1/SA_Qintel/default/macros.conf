[qintel_index]
definition = index="main"
description = "This macro is used to configure where Qintel Dashboards App for Splunk stores enriched data."

[qintel_ip_search]
definition = qsentry
description = "Select 'qsentry' or 'qsentryfeed' depending on the desired product. *qsentry* by default"


[qintel_source_indexes]
definition = ()

[qintel_fields]
definition = intel_description, intel_first_seen, intel_last_seen, \
             intel_method, intel_ns_name, intel_score, intel_source_id, \
             intel_source_name, intel_tags, intel_url
iseval = 0

[qintel_shrink_threat_fields]
definition = eval qintel_tags=mvjoin(qintel_tags, ",") \
| eval qintel_sources=mvjoin(qintel_sources, ",") \
| eval qintel_descriptions=mvjoin(qintel_descriptions, ",")

iseval = 0

[qintel_expand_threat_fields]
definition = eval qintel_tags=split(qintel_tags, ",") \
| eval qintel_sources=split(qintel_sources, ",") \
| eval qintel_descriptions=split(qintel_descriptions, ",")

iseval = 0

[qintel_intel_friendly_fields]
definition = \
rename src_ip as "Selector", qintel_tags as "Tags", \
qintel_sources as "Sources", qintel_first_seen as "First Observed", \
qintel_last_seen as "Last Observed", qintel_sources as "Sources" \
qintel_score as "Score"


[qintel_shrink_cve_fields]
definition = eval qintel_cve_actor_types=mvjoin(qintel_cve_actor_types, ",") \
| eval qintel_cve_actors=mvjoin(qintel_cve_actors, ",") \
| eval qintel_cve_affected_version=mvjoin(qintel_cve_affected_version, ",") \
| eval qintel_cve_exploit_types=mvjoin(qintel_cve_exploit_types, ",") \
| eval qintel_cve_patches=mvjoin(qintel_cve_patches, ",")

iseval = 0

[qintel_expand_cve_fields]
definition = eval qintel_cve_actor_types=split(qintel_cve_actor_types, ",") \
| eval qintel_cve_actors=split(qintel_cve_actors, ",") \
| eval qintel_cve_affected_version=split(qintel_cve_affected_version, ",") \
| eval qintel_cve_exploit_types=split(qintel_cve_exploit_types, ",") \
| eval qintel_cve_patches=split(qintel_cve_patches, ",")

iseval = 0

[qintel_cve_friendly_fields]
definition = \
rename qintel_cve_actor_types as "Actor Type", qintel_cve_actors as "Actor", \
qintel_cve_affected_system as "Affected System", qintel_cve_affected_version as "Affected Versions", \
qintel_cve_exploit_types as "Exploit Type", qintel_cve_first_observed as "First Observed", \
qintel_cve_last_observed as "Last Observed" qintel_cve_patches as "Patch", \
qintel_cve_recently_observed as "Recently Observed", Vulnerabilities.cve as "CVE", Vulnerabilities.cvss as "CVSS", \
Vulnerabilities.category as "Category", Vulnerabilities.signature as "Signature", \
Vulnerabilities.severity as "Severity", Vulnerabilities.dest as "Dest"

[qintel_threat_table]
definition = spath input=qintel_raw \
| rename qintel_data{}.confidence as qintel_confidence, qintel_data{}.provider as qintel_provider, qintel_data{}.first_at as qintel_first_at, qintel_data{}.last_at as qintel_last_at , qintel_data{}.tags as qintel_tags \
| eval qintel_data=mvzip(qintel_confidence, mvzip(qintel_provider, mvzip(qintel_first_at, mvzip(qintel_last_at, qintel_tags, "|"), "|"), "|"), "|") \
| mvexpand qintel_data \
| eval qintel_data=split(qintel_data,"|") \
| eval qintel_confidence=mvindex(qintel_data,0), qintel_provider=mvindex(qintel_data,1), qintel_first_at=mvindex(qintel_data,2), qintel_last_at=mvindex(qintel_data,3), qintel_tags=mvindex(qintel_data,4) \
| fields - qintel_data \
| table _time, sourcetype, indicator, qintel_first_at, qintel_last_at, qintel_confidence, qintel_provider, qintel_tags

iseval = 0
