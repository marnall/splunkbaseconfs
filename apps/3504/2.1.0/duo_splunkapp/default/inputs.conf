# This section defines defaults for duo_input modular inputs
[duo_input]
ikey =
skey =
api_host =
account_log = 1
activity_log = 0
administrator_log = 1
authentication_log = 1
authentication_v2_log = 0
telephony_log = 1
telephony_v2_log = 0
trust_monitor_log = 0
