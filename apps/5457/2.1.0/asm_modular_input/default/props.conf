[(?:::){0}asm:*:json]
pulldown_type = true
INDEXED_EXTRACTIONS = json
KV_MODE = none
category = Structured
description = asm's jsons
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0

[asm:event:syslog]
pulldown_type = true
maxDist = 3
TIME_FORMAT = %b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 32
TRANSFORMS = syslog-host
REPORT-syslog = syslog-extractions
SHOULD_LINEMERGE = False
category = Operating System
description = ASM syslog

EVAL-metric_category = coalesce(metric_category, occurrence_metric_category)
EVAL-metric_name = coalesce(metric_name, occurrence_metric_name)
EVAL-metric_asset_name = coalesce(metric_asset_name, occurrence_metric_asset_name)
EVAL-metric_asset_id = coalesce(metric_asset_id, occurrence_metric_asset_id)
EVAL-target_targetName = coalesce(targetName, occurrence_target_targetName)
EVAL-signatureID = coalesce(signatureID, occurrence_signatureID)
EVAL-user = coalesce(user, occurrence_user)
EVAL-masterUser = coalesce(masterUser, occurrence_masterUser)
EVAL-app = if((coalesce(metric_category, occurrence_metric_category)="Authentication" AND (coalesce(metric_name, occurrence_metric_name)="Login fail events" OR coalesce(metric_name, occurrence_metric_name)="Login valid events")), coalesce(description, occurrence_description), "asm")
EVAL-type = "event"
EVAL-signature=if(isnull(coalesce(signatureID, occurrence_signatureID)),"",coalesce(description, occurrence_description))
EVAL-id = coalesce(sequenceNumber, occurrence_sequenceNumber)."_".coalesce(agentName, occurrence_agentName)."_".coalesce(agentAssetName, occurrence_agentAsset_name)."_".coalesce(metric_asset_name, occurrence_metric_asset_name)
EVAL-severity_id = if(priority > 6, 6, priority)
EVAL-action = case(coalesce(metric_name, occurrence_metric_name)="Login valid events","success",coalesce(metric_name, occurrence_metric_name)="Login fail events","failure") 
EVAL-description = if(isnull(Mitre), coalesce(description, occurrence_description), coalesce(description, occurrence_description)." Mitre: ".Mitre)
EVAL-src = coalesce(metric_asset_name, occurrence_metric_asset_name)
EVAL-dest = coalesce(targetName, occurrence_target_targetName)
EVAL-signature_id = coalesce(signatureID, occurrence_signatureID)
EVAL-src_user = coalesce(masterUser, occurrence_masterUser)
LOOKUP-severity_lookup = severity_lookup severity_id OUTPUTNEW severity

[asm:vulnerability:json]
FIELDALIAS-asm_vulnerability = "data.cveId" AS cve "data.vulnerabilityCvssscore" AS cvss "assetName" AS dest "data.vulnerabilitySeverity" AS severity "data.vulnerabilitySummary" AS signature asmName AS dvc "data.vulnerabilitySourceUrl" AS url
EVAL-vendor_product = "ID ASM"
EVAL-category="vulnerability"

[asm:actualsoftware:json]
FIELDALIAS-asm_actual_software = assetUuid AS asset_id "data.name" AS asset_name "data.installedDate" AS install_date "data.vendor" as vendor "data.version" as version 

[asm:adminprop:json]
FIELDALIAS-asm_admin_prop = assetName AS asset_system assetUuid AS asset_id
EXTRACT-asset_criticality=\"name\":\s\"Criticality\",\s+\"value\":\s+\"(?<asset_criticality>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-asset_model=\"name\":\s\"Asset Model\",\s+\"value\":\s+\"(?<asset_model>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-asset_type=\"name\":\s\"Asset Model Type\",\s+\"value\":\s+\"(?<asset_type>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-asset_vendor=\"name\":\s\"Vendor\",\s+\"value\":\s+\"(?<asset_vendor>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-bunit=\"name\":\s\"Division\",\s+\"value\":\s+\"(?<bunit>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-adminprop_city=\"name\":\s\"City\",\s+\"value\":\s+\"(?<adminprop_city>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-adminprop_state=\"name\":\s\"State/Province\",\s+\"value\":\s+\"(?<adminprop_state>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-country=\"name\":\s\"Country\",\s+\"value\":\s+\"(?<country>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-description=\"name\":\s\"Asset Description\",\s+\"value\":\s+\"(?<description>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-ip=\"name\":\s\"IP Address\",\s+\"value\":\s+\"(?<ip>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-site_id=\"name\":\s\"Location\",\s+\"value\":\s+\"(?<site_id>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-owner=\"name\":\s\"Owner Organization\",\s+\"value\":\s+\"(?<owner>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-serial=\"name\":\s\"Serial Number\",\s+\"value\":\s+\"(?<serial>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-adminprop_ostype=\"name\":\s\"OS Type\",\s+\"value\":\s+\"(?<adminprop_ostype>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-adminprop_assettype=\"name\":\s\"Asset Type\",\s+\"value\":\s+\"(?<adminprop_assettype>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-adminprop_room=\"name\":\s\"Room\",\s+\"value\":\s+\"(?<adminprop_room>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-adminprop_rack=\"name\":\s\"Rack\",\s+\"value\":\s+\"(?<adminprop_rack>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-adminprop_rackposition=\"name\":\s\"Rack Position\",\s+\"value\":\s+\"(?<adminprop_rackposition>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-adminprop_esp=\"name\":\s\"ESP\",\s+\"value\":\s+\"(?<adminprop_esp>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-adminprop_isa99=\"name\":\s\"ISA99 Level\",\s+\"value\":\s+\"(?<adminprop_isa99>\b(?!unclassified\b)[[:ascii:]]+?)\"
EXTRACT-adminprop_asssetname=\"name\":\s\"Asset Name\",\s+\"value\":\s+\"(?<adminprop_assetname>\b(?!unclassified\b)[[:ascii:]]+?)\"

EVAL-category = "ot".if(isnull(adminprop_ostype),"","|".adminprop_ostype).if(isnull(adminprop_assettype),"","|".adminprop_assettype)
EVAL-city = if(isnull(adminprop_city),"",adminprop_city.", ").if(isnull(adminprop_state),"",adminprop_state)
EVAL-location = if(isnull(adminprop_room),"",adminprop_room.", ").if(isnull(adminprop_rack),"","Rack ".adminprop_rack.", ").if(isnull(adminprop_rackposition),"",adminprop_rackposition)
EVAL-zone = if(isnull(adminprop_esp),"",adminprop_esp).if(NOT isnull(adminprop_isa99) AND NOT isnull(adminprop_esp)," | ","").if(isnull(adminprop_isa99),"","purdue: ".adminprop_isa99)

