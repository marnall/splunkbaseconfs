[AIOPS Splunk License Expired]
action.email = 1
action.email.inline = 1
action.email.message.alert = Dear customer,\
\
We are reaching out to inform you that your AIOPS Splunk License has expired.\
\
Please reach out to your AIOPSGROUP representative to get this resolved!\
\
Monitoring Server :: $result.host$
action.email.priority = 1
action.email.sendresults = 1
action.email.subject.alert = Your AIOPS Splunk License has expired!
action.email.to = aiopsmonitoring@aiopsgroup.com
action.email.useNSSubject = 1
alert.expires = 24d
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 7d
alert.track = 1
counttype = number of events
cron_schedule = 0 0 * * *
description = This alert is triggered when the license supporting the "Salesforce Commerce Cloud Connector for AIOPSGROUP Monitoring" add-on expires.
disabled = false
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = aiops_group_monitoring
request.ui_dispatch_view = search
search = index="_internal" source="/opt/splunk/var/log/splunk/ta_aiops_sfcc_logs_salesforce_commerce_cloud_*.log" "event=*license*expired"\
| rex field=_raw "(?<_raw>\{.*\})"\
| spath time | spath path=data.message output=message\
| table time, message, host

[Splunk License Search Capacity Exceeds 80%]
action.email = 1
action.email.inline = 1
action.email.message.alert = Hi!\
\
We are reaching out to inform you that a Splunk client license search capacity exceeds 80%.\
\
Monitoring Server :: $result.host$
action.email.priority = 1
action.email.sendresults = 1
action.email.subject.alert = Splunk client instance exceeds 80% of search capacity!
action.email.to = aiopsmonitoring@aiopsgroup.com
action.email.useNSSubject = 1
alert.expires = 24d
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 2d
alert.track = 1
counttype = number of events
cron_schedule = 39 12 * * *
description = This alert is triggered when the Splunk instance search capacity exceeds 80%.
disabled = false
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = aiops_group_monitoring
request.ui_dispatch_view = search
search = index=summary source="splunk-storage-summary"\
| rex field=host "^[^.]+[.](?<stack>[^.]+)"\
| search\
    [| rest /services/server/info splunk_server=local\
    | fields splunk_server\
    | rex field=splunk_server "^[^.]+[.](?<stack>[^.]+)"\
    | fields stack]\
| stats latest(activeStorageLicenseGB) AS storage_license latest(rawSizeGBCustomer) AS storage_usage\
| eval capactiy = (storage_usage / storage_license)\
| where capactiy > .8

[Splunk License Ingestion Capacity Exceeds 80%]
action.email = 1
action.email.inline = 1
action.email.message.alert = Hi!\
\
We are reaching out to inform you that a Splunk client license ingestion capacity exceeds 80%.\
\
Monitoring Server :: $result.host$
action.email.priority = 1
action.email.sendresults = 1
action.email.subject.alert = Splunk client instance exceeds 80% of ingestion capacity!
action.email.to = aiopsmonitoring@aiopsgroup.com
action.email.useNSSubject = 1
alert.expires = 24d
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 2d
alert.track = 1
counttype = number of events
cron_schedule = 33 12 * * *
description = This alert is triggered when the Splunk instance license ingestion capacity exceeds 80%.
disabled = false
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = aiops_group_monitoring
request.ui_dispatch_view = search
search = index=_telemetry (host=*.*splunk*.* NOT host=sh*.*splunk*.*) source=*license_usage_summary.log* TERM("type=RolloverSummary")\
| rex field=_raw "^(?<timestring>\d\d-\d\d-\d{4}\s\d\d:\d\d:\d\d.\d{3}\s\+\d{4})"\
| eval _time=strptime(timestring,"%m-%d-%Y %H:%M:%S.%N%z")\
| eval z=strftime(now(),"%z")\
| eval m=substr(z,-2)\
| eval h=substr(z,2,2)\
| eval mzone=if(z != 0, ((h*60)+m)*(z/abs(z)), 0)\
| eval min_to_utc=-1440-mzone\
| eval rel_time=min_to_utc."m"\
| eval _time=relative_time(_time, rel_time)\
| bin _time span=1d\
| stats latest(b) AS b by slave, pool, _time\
| timechart span=1d sum(b) AS "volume" fixedrange=false\
| eval GB=round(volume/pow(2,30),3)\
| append\
    [| search index=summary source="splunk-entitlements"\
    | rex field=host "^[^.]+[.](?<stack>[^.]+)"\
    | search\
        [| rest /services/server/info splunk_server=local\
        | fields splunk_server\
        | rex field=splunk_server "^[^.]+[.](?<stack>[^.]+)"\
        | fields stack]\
    | rex field=_raw "^(?<timestring>\d\d/\d\d/\d{4}\s\d\d:\d\d:\d\d\s\+\d{4})"\
    | eval _time=strptime(timestring,"%m/%d/%Y %H:%M:%S %z")\
    | eval z=strftime(now(),"%z")\
    | eval m=substr(z,-2)\
    | eval h=substr(z,2,2)\
    | eval mzone=if(z != 0, ((h*60)+m)*(z/abs(z)), 0)\
    | eval min_to_utc=-1440-mzone\
    | eval rel_time=min_to_utc."m"\
    | eval _time=relative_time(_time, rel_time)\
    | bin _time span=1d\
    | stats max(ingest_license) as "license limit" by _time]\
| stats latest(GB) as usage latest("license limit") as limit\
| eval ratio = usage/limit\
| where ratio > .8

[Ingestion Input Failed Loading Checkpoint Storage]
action.email = 1
action.email.inline = 0
action.email.message.alert = The alert condition for '$name$' was triggered.\
\
Host: $server.serverName$\
\
App: $app$\
\
Results: $result.report$
action.email.priority = 1
action.email.sendresults = 1
action.email.subject = CRITICAL: $name$ :: $server.serverName$
action.email.to = aiopsmonitoring_dev_team@aiopsgroup.com
alert.expires = 2h
alert.severity = 5
alert.suppress = 1
alert.suppress.fields = data_input, source
alert.suppress.period = 2h
alert.track = 1
counttype = number of events
cron_schedule = 37 * * * *
description = This alert is triggered when the ingestion data input failed to load state file.
disabled = false
dispatch.earliest_time = -39m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = ta_aiops_sfcc_logs
request.ui_dispatch_view = search
search = index=_internal source="/opt/splunk/var/log/splunk/ta_aiops_sfcc_logs_salesforce_commerce_cloud_*.log"\
| search *File Checkpoint Failed to load file*\
| dedup data_input, source\
| table data_input, source, _raw

[SFCC Add-on Installation]
action.email = 1
action.email.inline = 0
action.email.message.alert = The alert condition for '$name$' was triggered.\
\
Alert description ::\
'$description$'.\
\
Host: $server.serverName$\
\
Alert report ::\
$result.report$

action.email.priority = 1
action.email.include.results_link = 0
action.email.include.view_link = 1
action.email.subject = $name$ :: $server.serverName$
action.email.to = aiopsmonitoring_dev_team@aiopsgroup.com
alert.expires = 1h
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 24h
alert.suppress.fields = user, app_name, time_bucket
alert.track = 1
counttype = number of events
cron_schedule = 7 0 * * *
description = This alert is triggered when the Salesforce Commerce Cloud Connector for CX Monitoring add-on is successfully installed
disabled = false
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = ta_aiops_sfcc_logs
request.ui_dispatch_view = search
search = index=_internal action=install_app info=succeeded app_name="TA-aiops-sfcc-logs" \
| bin _time as time_bucket span=3m \
| table time_bucket user host app_name \
| join type=left time_bucket \
    [ search index=_internal sourcetype=splunkd_ui_access POST uri_path IN (*splunkd/__raw/services/apps/local*) \
    | bin _time as time_bucket span=3m \
    | table time_bucket host user] \
| convert ctime(time_bucket) \
| eval report=printf("[%s] User [%s] has installed or upgraded the [%s] app on host [%s].", time_bucket, user, app_name, host)

