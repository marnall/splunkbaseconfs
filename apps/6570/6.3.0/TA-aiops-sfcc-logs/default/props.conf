[source::...ta_aiops_sfcc_logs*.log*]
sourcetype = taaiopssfcclogs:log

[aiopsgroup:monitoring:sfcc:log4j]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
TIME_FORMAT = %Y-%m-%d %H:%M:%S.%f %Z
TIME_PREFIX = ^\[
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 0
MAX_EVENTS = 326

[taaiopssfcclogs:log]
EXTRACT-log_level = ^[^,\n]*,\d+\s+(?P<log_level>\w+)
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

