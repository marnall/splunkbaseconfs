[salesforce_commerce_cloud_logs_v2]
start_by_shell = false
python.version = python3
sourcetype = aiopsgroup:monitoring:sfcc:log4j
interval = 60
days_threshold = 1
system_log_files_pattern = ^(error|warn|info)-.*
custom_log_files_pattern = ^custom(error|warn|info)-.*
jobs_log_files_pattern = ^jobs-.*
services_log_files_pattern = ^service-.*
disabled = 0

