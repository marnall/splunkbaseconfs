[gogs_index]
definition = (index=gogs OR index=infra OR index=main) source=webhook*
iseval = 0

[home_commit]
definition = | eval commits=coalesce(commits_0_id,commits_1_id,commits_2_id,commits_3_id,commits_4_id,commits_5_id) \
| timechart dc(commits) as "commits" span=1d
iseval = 0

[file_add]
definition = | stats latest(commits_0_timestamp) as commits_0_timestamp latest(_time) as event_time count by commits_0_added commits_0_message commits_0_author_username \
| fields - count \
| convert ctime(event_time) \
| fillnull value=NULL commits_0_timestamp \
| eval commits_0_timestamp=if(commits_0_timestamp="NULL", event_time, commits_0_timestamp) \
\
| eval epoch = strptime(commits_0_timestamp, "%Y-%m-%dT%H:%M:%S")\
| eval human_read=strftime(epoch,"%Y-%m-%d %H:%M:%S")
iseval = 0

[file_ba]
definition = | table before after\
| stats count by before after
iseval = 0

[file_branches]
definition = | fields ref | dedup ref | table ref | rename ref as Branch
iseval = 0

[file_cURL]
definition = | eval "CommitURL"= coalesce(commits_0_url,commits_1_url,commits_2_url,commits_3_url,commits_4_url) | dedup CommitURL
iseval = 0

[file_deleted]
definition = | stats values(commits_0_message) as commits_0_message latest(_time) as Time count by "commits_0_removed" _time commits_0_author_username |convert ctime(Time)\
| fillnull value=NULL commits_0_message \
| fields - count \
| table Time commits_0_removed commits_0_message commits_0_author_username
iseval = 0

[file_modified]
definition = | stats latest(_time) as Time values(commits_0_message) as commits_0_message count by commits_0_timestamp "commits_0_modified"  commits_0_author_username \
| convert ctime(Time) \
| fillnull value=NULL commits_0_message \
| fields - count \
| eval commits_0_timestamp=if(commits_0_timestamp="NULL", Time, commits_0_timestamp) \
| eval epoch = strptime(commits_0_timestamp, "%Y-%m-%dT%H:%M:%S")\
| eval human_read=strftime(epoch,"%Y-%m-%d %H:%M:%S")
iseval = 0

[home_age]
definition = | eval age=ceiling((now()-strptime(repository_created_at,"%Y-%m-%d"))/86400)\
| eval Vulnerability_Age=case(\
    age<30,"Less than 30 Days",\
    age>=365,"Older than 1 Year",\
    age>=180,"Older than 180 Days",\
    age>=120,"Older than 120 Days",\
    age>=90,"Older than 90 Days",\
    age>=60,"Older than 60 Days",\
    0==0,"No Age Data") \
| stats count by Vulnerability_Age \
| fields - count
iseval = 0

[file_ocommits]
definition = | eval epoch = strptime(commits_0_timestamp, "%Y-%m-%dT%H:%M:%S")\
| eval human_read=strftime(epoch,"%Y-%m-%d %H:%M:%S")\
| stats count by human_read  pusher_login commits_0_message \
| fields - count
iseval = 0

[forkd]
definition = | stats latest(_time) as Time count by forkee_id forkee_name forkee_description forkee_owner_username \
\
| eval human_read=strftime(Time,"%Y-%m-%d %H:%M:%S")\
\
| table human_read forkee_id forkee_name forkee_owner_username forkee_description\
| rename human_read as "Time" forkee_id as "ID" forkee_name as "Forkee Name" forkee_description as "Description" forkee_owner_username as "User"
iseval = 0

[home_branch]
definition = | timechart dc(ref) as branch span=1d
iseval = 0

[home_fork]
definition = | fields forkee_id\
| timechart count(forkee_id) as ID span=1d
iseval = 0

[home_issues]
definition = | search action=opened issue_state=open | timechart count span=1d
iseval = 0

[home_lastupdated]
definition = | eval epoch = strptime(repository_updated_at, "%Y-%m-%d")\
| eval human_read=strftime(epoch,"%Y-%m-%d")\
| stats latest(human_read) as "Last Updated"
iseval = 0

[home_pull]
definition = | timechart count(pull_request_id) as pull_request_id span=1d
iseval = 0

[home_push]
definition = | timechart count(pusher_id) span=1d
iseval = 0

[home_release]
definition = | timechart count(release_id) as total_release span=1d
iseval = 0

[issues_closed]
definition = | stats latest(_time) as Time count by issue_title sender_username \
| eval human_read=strftime(Time,"%Y-%m-%d %H:%M:%S") \
| table human_read issue_title sender_username \
| rename human_read as "Closed Time" "issue_title" as "Issue Title" sender_username as User
iseval = 0

[issues_comments]
definition = | eval epoch = strptime(issue_updated_at, "%Y-%m-%dT%H:%M:%S")\
| eval human_read=strftime(epoch,"%Y-%m-%d %H:%M:%S")\
| stats count by human_read comment_id comment_body sender_username \
| fields - count
iseval = 0

[home_size]
definition = | eval megabytes=((repository_size/1024)/1024) | stats max(megabytes) as Size
iseval = 0

[issues_open]
definition = | stats latest(_time) as Time count by issue_id issue_title issue_body \
| eval human_read=strftime(Time,"%Y-%m-%d %H:%M:%S") \
| fields - count \
| table human_read issue_id issue_title issue_body
iseval = 0

[pull_closed]
definition = | eval epoch = strptime(pull_request_merged_at, "%Y-%m-%dT%H:%M:%S") \
| eval human_read=strftime(epoch,"%Y-%m-%d %H:%M:%S") \
| stats count by human_read pull_request_number pull_request_title pull_request_user_username \
| rename human_read as "Merged Time" pull_request_number as "Request No." pull_request_title as "Title" pull_request_user_username as "User"
iseval = 0

[pull_open]
definition = | eval epoch = strptime(pull_request_base_repo_updated_at, "%Y-%m-%dT%H:%M:%S")\
| eval human_read=strftime(epoch,"%Y-%m-%d %H:%M:%S")\
| stats count by human_read pull_request_number pull_request_title pull_request_user_username \
| rename human_read as "Time" pull_request_number as "Request No." pull_request_title as "Title" pull_request_user_username as "User"
iseval = 0

[released]
definition = | eval epoch = strptime(release_created_at, "%Y-%m-%dT%H:%M:%S")\
| eval human_read=strftime(epoch,"%Y-%m-%d %H:%M:%S")\
| stats count by human_read release_id release_name release_author_username release_body \
| rename human_read as "Created At" release_id as ID release_author_username as "User" release_body as "Description" release_name as "Release Name"
iseval = 0
