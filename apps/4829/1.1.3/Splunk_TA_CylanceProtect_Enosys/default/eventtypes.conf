[cylance_index]
search = index=protect OR index=cylance_protect

[protect_alert]
search = eventtype=cylance_index sourcetype=cylanceprotect_syslog:audit_log

[protect_malware]
search = eventtype=cylance_index sourcetype=cylanceprotect:threat OR sourcetype=cylanceprotect_syslog:exploit OR sourcetype=cylanceprotect_syslog:threat NOT EventName=threat_cleared

[protect_inventory]
search = eventtype=cylance_index sourcetype=cylanceprotect:device OR sourcetype=cylanceprotect_syslog:device

[protect_malware_operations]
search = eventtype=cylance_index sourcetype=cylanceprotect:threat OR sourcetype=cylanceprotect_syslog:exploit OR sourcetype=cylanceprotect_syslog:threat EventName=threat_cleared