[blueshark_defaults]
KV_MODE=none
TZ = UTC
TRANSFORMS-sourcetype = wbs_main, wbs_bcreportermain_v1
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD = 44
pulldown_type = true
category = Network & Security
description = Wereshark normalized default output produced by the Blue Coat ProxySG Appliance


[wbs_main]
REPORT-search = extract_wbs_main
SHOULD_LINEMERGE = false
KV_MODE=none
FIELDALIAS-c_iptosrc = c_ip as src
FIELDALIAS-c_iptosrc_ip = c_ip as src_ip
FIELDALIAS-cs_User_Agenttohttp_user_agent = cs_User_Agent as http_user_agent
FIELDALIAS-cs_auth_grouptogroup = cs_auth_group as group
FIELDALIAS-cs_bytestobytes_out = cs_bytes as bytes_out
FIELDALIAS-cs_categorytocategory = cs_category as category
FIELDALIAS-cs_hosttodest = cs_host as dest
FIELDALIAS-cs_hosttodest_host = cs_host as dest_host
FIELDALIAS-cs_methodtohttp_method = cs_method as http_method
FIELDALIAS-cs_uri_pathtouri_path = cs_uri_path as uri_path
FIELDALIAS-cs_uri_querytouri_query = cs_uri_query as uri_query
FIELDALIAS-cs_usernametouser = cs_username as user
FIELDALIAS-rs_Content_Typetohttp_content_type = rs_Content_Type as http_content_type
FIELDALIAS-s_actiontoaction = s_action as action
FIELDALIAS-cs_iptodest = cs_ip as dest
FIELDALIAS-cs_iptodest_ip = cs_ip as dest_ip
FIELDALIAS-s_iptodest = s_ip as proxy
FIELDALIAS-s_iptodest_ip = s_ip as proxy_ip
FIELDALIAS-sc_bytestobytes_in = sc_bytes as bytes_in
FIELDALIAS-sc_filter_resulttoblock_action = sc_filter_result as block_action
FIELDALIAS-sc_statustostatus = sc_status as status
FIELDALIAS-time_takentoduration = time_taken as duration
FIELDALIAS-x_virus_idtosignature_id = x_virus_id as signature_id
LOOKUP-httpstatus = httpstatus sc_status OUTPUT http_status_message


[wbs_bcreportermain_v1]
REPORT-search = extract_wbs_bcreportermain_v1
SHOULD_LINEMERGE = false
KV_MODE=none
FIELDALIAS-c_iptosrc = c_ip as src
FIELDALIAS-c_iptosrc_ip = c_ip as src_ip
FIELDALIAS-cs_Referertohttp_referer = cs_Referer as http_referer
FIELDALIAS-cs_Referertohttp_referrer = cs_Referer as http_referrer
FIELDALIAS-cs_User_Agenttohttp_user_agent = cs_User_Agent as http_user_agent
FIELDALIAS-cs_auth_grouptogroup = cs_auth_group as group
FIELDALIAS-cs_bytestobytes_out = cs_bytes as bytes_out
FIELDALIAS-cs_categoriestocategories = cs_categories as categories
FIELDALIAS-cs_hosttodest = cs_host as dest
FIELDALIAS-cs_hosttodest_host = cs_host as dest_host
FIELDALIAS-cs_methodtohttp_method = cs_method as http_method
FIELDALIAS-cs_uri_pathtouri_path = cs_uri_path as uri_path
FIELDALIAS-cs_uri_querytouri_query = cs_uri_query as uri_query
FIELDALIAS-cs_usernametouser = cs_username as user
FIELDALIAS-rs_Content_Typetohttp_content_type = rs_Content_Type as http_content_type
FIELDALIAS-s_actiontoaction = s_action as action
FIELDALIAS-cs_iptodest = cs_ip as dest
FIELDALIAS-cs_iptodest_ip = cs_ip as dest_ip
FIELDALIAS-s_iptodest = s_ip as proxy
FIELDALIAS-s_iptodest_ip = s_ip as proxy_ip
FIELDALIAS-sc_bytestobytes_in = sc_bytes as bytes_in
FIELDALIAS-sc_filter_resulttoblock_action = sc_filter_result as block_action
FIELDALIAS-sc_statustostatus = sc_status as status
FIELDALIAS-time_takentoduration = time_taken as duration
FIELDALIAS-x_bluecoat_application_nametoapp = x_bluecoat_application_name as app
FIELDALIAS-x_bluecoat_application_operationtooperation = x_bluecoat_application_operation as operation
FIELDALIAS-x_virus_idtosignature_id = x_virus_id as signature_id
LOOKUP-httpstatus = httpstatus sc_status OUTPUT http_status_message


