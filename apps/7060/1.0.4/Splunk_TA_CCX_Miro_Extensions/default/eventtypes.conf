
[ccx_miro_alert]
search = (sourcetype="miro-audit-logs") dataset_name="alert"
# tags = alert cloud

[ccx_miro_alert_catch_all]
search = (sourcetype="miro-audit-logs") NOT dataset_name IN ("auth", "alert", "change", "sign_out") event IN ("*setup_succeeded", "*setup_unsuccessful", "user_joined*", "user_invited*", "project_shared*", "board_shared_for*")
# tags = alert cloud

[ccx_miro_authentication]
search = (sourcetype="miro-audit-logs") dataset_name="auth"
# tags = authentication cloud

[ccx_miro_change]
search = (sourcetype="miro-audit-logs") dataset_name="change"
# tags = change cloud

[ccx_miro_change_catch_all]
search = (sourcetype="miro-audit-logs") NOT dataset_name IN ("auth", "alert", "change", "sign_out") event IN ("*changed", "*enabled", "*disabled*", "*removed*", "*deleted*", "*restored", "*modified", "*moved*", "*opened", "*install", "*uninstall", "*installed", "*uninstalled", "user_license_convert*")
# tags = change cloud

[ccx_miro_sign_out]
search = (sourcetype="miro-audit-logs") dataset_name="sign_out"
