[application]
definition = eval application=ZFlowImagePath

[destination]
definition = eval destination = if(flowDirection=0 OR ZFlowInbound="00",coalesce(sourceIPv4Address,sourceIPv6Address),coalesce(destinationIPv4Address,destinationIPv6Address))

[device]
definition = eval device=ZFlowAgentGuid

[isIPv4]
definition = where !isnull(sourceIPv4Address)

[isIPv6]
definition = where !isnull(sourceIPv6Address)

[location]
definition = eval location = if(flowDirection=1,coalesce(sourceIPv4Address,sourceIPv6Address),coalesce(destinationIPv4Address,destinationIPv6Address))

[source]
definition = eval source      = if(flowDirection=1 OR ZFlowInbound="01",coalesce(sourceIPv4Address,sourceIPv6Address),coalesce(destinationIPv4Address,destinationIPv6Address))

[user]
definition = eval user=userName
