[get_top10_by_search_type(1)]
args = search_type
definition = search search_type = "$search_type$"\
| stats count as "Run(s)" \
    avg(total_run_time) as avg_run_time\
    max(total_run_time) as max_run_time \
    sum(total_run_time) as cumulative_run_time\
    by search_name \
| sort - cumulative_run_time \
| eval "Cumulative Minutes" = round(cumulative_run_time/60, 1)\
| addtotals row=f col=t "Cumulative Run" labelfield=search_name label="Total"\
| streamstats count as rank\
| eventstats count as total_count\
| search rank<=10 OR search_name=Total\
| eval search_name = if(search_name == "Total", "Total for " . (total_count - 1) . " searches", search_name)\
| eval "Cumulative Run" = tostring(cumulative_run_time, "duration"), \
    "Avg Run Time" = tostring(round(avg_run_time), "duration"), \
    "Max Run Time" = tostring(max_run_time, "duration")\
| fields - rank total_count cumulative_run_time avg_run_time max_run_time\
| rename search_name as "Search Name"\
| table "Search Name", "Run(s)", "Avg Run Time", "Max Run Time", "Cumulative Run", "Cumulative Minutes"
errormsg = Please provide a search type argument, e.g.: "Data Model Acceleration"
iseval = 0
validation = isnotnull(search_type)

