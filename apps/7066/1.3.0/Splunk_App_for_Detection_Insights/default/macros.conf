[get_default_values_details(3)]
args = disabledFilter,domainFilter,flagFilter
definition = | where isnotnull('action.correlationsearch.enabled') \
| fillnull value="NONE ⚠️" action.notable.param.security_domain\
| search disabled=$disabledFilter$ $domainFilter$ \
| eval "Provided By" = `get_provided_by('eai:acl.app')` \
| eval isEnabled = if(disabled==0, "True", "False") \
| eval hasDefaultDisposition = if(isnull('action.notable.param.default_disposition') OR 'action.notable.param.default_disposition' IN ("", "[]"), "No", "Yes") \
| eval hasDefaultOwner = if(isnull('action.notable.param.default_owner') OR 'action.notable.param.default_owner' IN ("", "[]"), "No", "Yes") \
| eval hasDefaultStatus = if(isnull('action.notable.param.default_status') OR 'action.notable.param.default_status' IN ("", "[]"), "No", "Yes") \
| eval hasAnyDefaults = if(hasDefaultDisposition = "Yes" OR hasDefaultOwner = "Yes" OR hasDefaultStatus = "Yes", "Yes", "No") \
| eval disposition = if(isnull('action.notable.param.default_disposition') OR 'action.notable.param.default_disposition' IN ("", "[]"), "", "disposition:" . 'action.notable.param.default_disposition') \
| lookup disposition_lookup status as disposition OUTPUT label as disposition_label \
| eval disposition_label = coalesce(disposition_label, 'action.notable.param.default_disposition') \
| eval status = if(isnull('action.notable.param.default_status') OR 'action.notable.param.default_status' IN ("", "[]"), "", 'action.notable.param.default_status') \
| lookup reviewstatuses_lookup status as status OUTPUT label as status_label \
| eval status_label = coalesce(status_label, 'action.notable.param.default_status') \
| eval owner = if(isnull('action.notable.param.default_owner') OR 'action.notable.param.default_owner' IN ("", "[]"), "", 'action.notable.param.default_owner') \
| join type=outer owner \
    [| rest /services/authentication/users count=0 splunk_server=local f=title f=realname \
    | table title, realname \
    | rename title as owner, realname as owner_label\
        ] \
| eval owner_label = coalesce(owner_label, 'action.notable.param.default_owner')\
| eval defaultDetails = mvappend(defaultDetails, if(hasDefaultOwner = "Yes", "Owner: " . owner_label, null())) \
| eval defaultDetails = mvappend(defaultDetails, if(hasDefaultDisposition = "Yes", "Disposition: " . disposition_label, null())) \
| eval defaultDetails = mvappend(defaultDetails, if(hasDefaultStatus = "Yes", "Status: " . status_label, null())) \
| search hasAnyDefaults = "$flagFilter$" \
| rename eai:acl.app as Application, title as Name, action.notable.param.security_domain as Domain, isEnabled as "Enabled?", hasAnyDefaults as "Has Notable Defaults Set?", defaultDetails as "Default Value Details" \
| table Name, "Enabled?", "Provided By", Application, Domain, "Has Notable Defaults Set?", "Default Value Details"
iseval = 0

