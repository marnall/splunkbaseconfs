[check_for_issues]
definition = | eval "CHKDET0001" = if(isnotnull(datamodel) AND last_error!="", "Uses a data model with recent acceleration errors (" + datamodel + ")", "") | eval "CHKDET0002" = if(isnotnull(datamodel) AND (datamodel == "Application_State" OR datamodel == "Change_Analysis"), "Uses a deprecated data model (" + datamodel + ")", "") | eval "CHKDET0003" = if(description=="", "Detection should have a description", "") | eval "CHKDET0004" = if(isnotnull(datamodel) AND size==0, "Uses an empty data model (" + datamodel + ")", "") | eval "CHKDET0005" = if(match(actions, "risk") AND risk_score == 0, "Should generate non-zero risk", "") | eval "CHKDET0006" = if(isnotnull(model_name) AND model_exists == 0, "Uses missing machine-learning model (" + model_name + ")", "") | eval "CHKDET0007" = if(actions=="<none>", "Has no actions defined", "") | eval "CHKDET0008" = if(Domain == "<none>", "Not mapped to a Security Domain", "") | eval "CHKDET0009" = if(isnotnull(datamodel) AND accelerated=="false", "Uses a non-accelerated data model (" + datamodel + ")", "") | eval "CHKDET0010" = if(not match('action.correlationsearch.label', "^ESCU\s-\s.*"), "Not as per Naming Convention", "") | eval "CHKDET0011" = if(isnull(Technique) OR Technique == "", "Not mapped to MITRE ATT&CK", "") | eval "CHKDET0012" = if(orphan == 1, "Correlation Search Owner no longer a Splunk user", "") | eval "CHKDET0013" = if(risk_score > 0 AND (risk_score_dev >= 10 OR risk_score_dev <= 0.1), "Significant Risk Score deviation from average", "") | eval "CHKDET0014" = if('Provided By'=="Other", "App context should be ES/ESCU", "") | eval "CHKDET0015" = if(not (alert_type=="number of events" AND triggered_alert_count>=0), "Trigger alert when should be set to: Number of Results", "") | eval "CHKDET0016" = if(not (isnotnull('alert.digest_mode') AND 'alert.digest_mode'=0), "Trigger is not set to: For Each Result", "") | eval "CHKDET0017" = if(tonumber(mvindex(split('alert.suppress.period', "s"), 0))<14400, "Throttling Window should be 4h or more", "") | eval "CHKDET0018" = if(isnull('alert.suppress.fields'), "Fields to group by should be set", "")  | eval "CHKDET0019" = if(match('actions',"risk") AND (isnull('action.risk.param._risk_message') OR match('action.risk.param._risk_message', "tbd")), "Risk Analysis AR - Risk Message should be set", "")  | eval "CHKDET0020" = if(isnull(risk_score) OR risk_score == 0, "Risk Analysis AR - Risk Score should be set", "")  | eval "CHKDET0021" = if(match(search, "[^\x00-\x7F]"), "Search has non-ASCII characters", "") | eval "CHKDET0022" = if(not match(search, "\n") AND not match(search, "^\s*\|(?!.*\|)"), "Search is not properly formatted", "")

[check_for_scheduling_issues]
definition = | eval "CHKSCH0001" = if(allow_skew = "0", "Consider setting an allow_skew value", "") | eval "CHKSCH0002" = if(disabled=0 AND is_scheduled = 0, "Enabled but not scheduled", "") | eval "CHKSCH0003" = if(percent > `max_search_grouping_percentage`, "Part of a CRON schedule that has a high percentage of total searches (" + percent + "%)", "") | eval "CHKSCH0004" = if(search_type = "real-time", "Performance intensive scheduling mode", "") | eval "CHKSCH0005" = if(schedule_window = "0", "Consider using \"auto\" Schedule Windows", "")

[group_all_issues]
definition = | foreach `check_id_prefix` [eval issues=mvappend(issues, if('<<FIELD>>'=="",null(),'<<FIELD>>'))] | eval issues = coalesce(issues, "None")
iseval = 0

[get_overview_counts]
definition = count(eval('alert.suppress'==1)) as "Detection is Throttled" count(eval(isnotnull('action.notable.param.drilldown_search') OR isnotnull('action.notable.param.drilldown_searches'))) as "Detection has a Drilldown Search" count(eval(isnotnull('action.notable.param.next_steps'))) as "Detection has Next Steps Defined" count(eval(isnotnull(mvcount(json_array_to_mv(json_extract('action.notable.param.drilldown_searches',"{}.search")))))) as "Detection has multiple Drilldown Searches" count(eval(match('action.correlationsearch.annotations',"atomic_red_team"))) as "Detection is mapped to Atomic Red Team Tests" count(eval(match('action.correlationsearch.annotations',"kill_chain_phases"))) as "Detection is mapped to KillChain" count(eval(match('action.correlationsearch.annotations',"mitre_attack"))) as "Detection is mapped to MITRE Att&ck" count(eval(match('action.risk.param._risk',"threat_object_field"))) as "Risk Rule with Threat Object Defined" count(eval(match('actions',"notable"))) as "Detection generates Findings" count(eval(match('actions',"risk") AND (match('action.risk.param._risk',"risk_object_field") OR isnotnull('action.risk.param._risk_object')))) as "Risk Rule with Risk Object Defined" count(eval(match('actions',"risk"))) as "Detection generates Risk observations" count(eval(match('actions',"trustar_submit_event"))) as "Detection uses Threat Intelligence Management Action" count(eval(replace(replace(actions, "notable|risk|trustar_submit_event", ""), "(^,\s+|\s*,$)", "")!="")) as "Detection uses Other Actions"
iseval = 0

