[get_detection_additional_data_formatting_no_trending]
definition = where isnotnull('action.correlationsearch.enabled')\
| rex field=search "^\s*(\||\(|)\s*\`(?<macro_name>.*?)\`" \
| eval arg_count = if(match(macro_name, "^.*\(.+\)$"), mvcount(split(macro_name, ",")), null())\
| eval macro_name_normalized = if(isnotnull(arg_count), mvindex(split(macro_name, "("), 0) + "(" + arg_count + ")", macro_name)\
| join type=left macro_name_normalized \
    [| rest splunk_server=local /services/data/macros f=title f=definition\
    | rename title AS macro_name_normalized] \
| eval expanded_search = if(isnotnull(definition), replace(search, "\`" + macro_name + "\`", definition), search)\
| eval command_type = case(match(expanded_search, "(?i)^\s*\|\s*from datamodel"), "from", match(expanded_search, "(?i)^\s*\|\s*datamodel"), "datamodel", match(expanded_search, "(?i)^\s*\|\s*tstats"), "tstats", match(expanded_search, "(?i)^\s*\|\s*(from |)inputlookup"), "lookup", isnotnull(definition) AND match(expanded_search, "(?i)(eventtype\s*=\s*|source\s*=\s*|sourcetype\s*=\s*|index\s*=\s*).*?\s*\|"), "macro (raw data search)", match(expanded_search, "^\s*(\||)\s*\`"), "macro", match(expanded_search, "(?i)^\s*\|\s*rest"), "rest", match(expanded_search, "(?i)(eventtype\s*=\s*|source\s*=\s*|sourcetype\s*=\s*|index\s*=\s*|tag\s*=\s*|tag\s+in\s+).*?\s*\|"), "raw data search", match(expanded_search, "(?i)^\s*\|\s*mstats\s+"), "mstats", true(), "other")\
| rex field="expanded_search" "(?i)from datamodel[:=]+\"*(?<datamodel>.*?)[\"\.]+"\
| eval datamodel = replace(datamodel, "(?i)^(.*?)\s+(where|by).*$", "\1")\
| lookup di_all_datamodels_lookup datamodel OUTPUT accelerated, size, average_time, last_error\
| eval "Provided By" = `get_provided_by('eai:acl.app')`\
| spath input=action.risk.param._risk\
| eval risk_score = mvindex(coalesce('{}.risk_score', 'action.risk.param._risk_score'), 0)\
| eval risk_score = if(isnull(risk_score) OR risk_score=="", 0, risk_score)\
| eval Domain = lower(if(isnull('action.notable.param.security_domain') OR 'action.notable.param.security_domain' == "", "<none>", 'action.notable.param.security_domain'))\
| eval isEnabled=if(disabled == 0, "True", "False") \
| eval actions = if(isnull(actions) OR actions == "", "<none>", actions)\
| spath input=action.correlationsearch.annotations \
| rename mitre_attack{} as Technique\
| fillnull value="" Technique\
| eval start = if('dispatch.earliest_time' == "0", now(), relative_time(now(), 'dispatch.earliest_time'))\
| eval end = if('dispatch.latest_time' == "now", now(), relative_time(now(), 'dispatch.latest_time'))\
| eval search_time_window = end-start\
| fields - end, start\
| eventstats avg(risk_score) as avg_risk_score\
| eval risk_score_dev = risk_score / avg_risk_score\
| rex field=expanded_search "(?i)(mltk_apply_upper[\(\"]+app:|\|\s*apply\s(app:|))(?<model_name>.*?)[\"\s]"\
| eval usesML = if(isnotnull(model_name) AND model_name != "", "True", "False")\
| eval model_exists = 0\
| join type=outer model_name \
[\
    | rest splunk_server=local /services/admin/lookup-table-files f=title\
    | search title = "__mlspl_*" \
    | eval title = replace(replace(title, "\.mlmodel$", ""), "^__mlspl_", "") \
    | eval model_exists = 1 \
    | rename title as model_name\
]\
| rex max_match=0 field=expanded_search "(?<!span|index|sourcetype|host)(\=|\!\=)\"(?<term_candidates1>.*?)\""\
| rex max_match=0 field=expanded_search "(?<!span|index|sourcetype|host)(\=|\!\=)\s*(?<term_candidates2>[^\"]+?)\s"\
| eval term_candidates = mvappend(term_candidates1, term_candidates2)\
| fields - term_candidates1 term_candidates2\
| eval term_candidates=mvdedup(mvfilter(match(term_candidates, "[\*\/:=@\.\-\$#%\\_]+") AND match(term_candidates, "^[^\[\]<>(){}\|\!;,'\"\n\r\s\t&?+]+$") AND NOT match(term_candidates, "^[\*\/:=@\.\-\$#%\\_]")))\
| eval has_lookups = if(match(expanded_search, "(?i)\|\s*(from\s+inputlookup|lookup)(\s|\:)"), 1, 0)\
| rex field=expanded_search max_match=0 "(?i)[\s\|]+(?<!\`\`\` )(inputlookup|lookup)(\s|\:).*?(\w+=\w+.*?\s|)\"*(?<lookups>[^\s\"]+)"\
| eval lookups = if(has_lookups==1, mvdedup(lookups), null())\
| fields - has_lookups\
| lookup di_all_rules_dispositions_lookup rule_name as title OUTPUT dispositions, fp_ratio
iseval = 0

