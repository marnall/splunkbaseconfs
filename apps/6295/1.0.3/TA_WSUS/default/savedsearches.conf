[Generate WSUS OT Lookup]
action.email.useNSSubject = 1
alert.track = 0
description = This search will generate a lookup that can be used in ES and OT Security Add-on
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","category"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = SA_WSUS
request.ui_dispatch_view = search
search = sourcetype="wsus:computertargets" ``` add tag=ot_asset for OT lookups ```\
| eval category="ot|" + category ```this line can be removed if these assets are not explicity OT assets```\
| table  asset_id,asset_model,asset_status,asset_system,asset_type,asset_vendor,asset_version,asset_criticality,bunit,category,city,classification,country,dns,end_of_support,exposure,ip,is_expected,lat,lon,location,mac,nt_host,owner,parent_asset_id,pci_domain,priority,product_details,requires_av,serial,should_timesync,should_update,site_id,vlan,zone\
| outputlookup wsus_assets.csv ```this lookup file may be updates if you wish to change it```
