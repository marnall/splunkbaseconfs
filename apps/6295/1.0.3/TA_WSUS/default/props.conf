[wsus:computertargets]
EVAL-category = "os:" + os_family + "|processor:" + processor
EVAL-asset_type = asset_type=case( isnull(os), "Unknown", match(os, ".*(S|s)erver.*"), "Server", 1=1, "Workstation")
EVAL-last_sync_description = CASE(sync_result=0, "Never Executed", sync_result=1, "Succeeded", sync_result=2, "Failed", sync_result=3, "Canceled", sync_result=4, "Unknown", 1=1, sync_result)
EXTRACT-nt_host = dns="(?<nt_host>[^\.]*).*", sync="

[wsus:events]
EVAL-message = replace(message, "%1", details)
EXTRACT-details = replacement_string=.*\<string\>(?<details>.*)\</string\>

[wsus:updatestates]
EVAL-dvc = host
EVAL-severity = CASE(ms_severity="Critical", "critical", ms_severity="Unspecified", "informational", ms_severity="Moderate", "medium", ms_severity="Important", "high", ms_severity="Low", "low", 1=1, ms_severity)
EVAL-signature = if(isnull(signature), if(isnull(kb), title, kb), signature)
EVAL-status = CASE(install_state=2, "installed", install_state=3, "restart required", install_state=1 OR install_state=5, "available", 1=1, "invalid")
EVAL-update_state_description = CASE(install_state=0, "Downloaded", install_state=1, "Failed", install_state=2, "Installed", install_state=3, "Installed Pending Reboot", install_state=4, "Not Applicable", install_state=5, "Not Installed", install_state=6, "Unknown")
EXTRACT-kb = title=*.*(?<kb>KB\d+)+
EXTRACT-vendor_product = title=.*(?<vendor_product>((Windows.*)|(SQL.*)|(MS.*)|(Microsoft.*))[^"]+)", install
