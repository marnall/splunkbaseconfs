[zOS-SYSLOG-Console]
EXTRACT-MessageID,CommandPrefix = (?=[^\"]*\".*(?:CSQ))^[^\"]*\"\s?([^A-Z])(\d{2,4})?\s*[^\d\s\w]?(?P<MessageID>\w+) (?:[^\d\s\w](?P<CommandPrefix>\w+))?
EXTRACT-MessageID,ApplID = (?=[^\"]*\".*(?:EYU|DFH))^[^\"]*\"\s?([^A-Z])(\d{2,4})?\s*[^\d\s\w]?(?P<MessageID>\w+)\s+(?P<ApplID>\w+)?
DATETIME_CONFIG =
MAX_TIMESTAMP_LOOKAHEAD = 27
NO_BINARY_CHECK = true
disabled = false
pulldown_type = true
EXTRACT-MessageID-DSN = ^[^"\n]*"\s+(?P<MessageID>\w+)