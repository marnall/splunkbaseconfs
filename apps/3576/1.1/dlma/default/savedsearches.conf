[dlma_data_owner_usage_sched_output]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 3 * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = dlma_splunk
request.ui_dispatch_view = search
schedule_window = 30
search = index=_internal source=*license_usage.log type="Usage" earliest=-30d@d latest=@d \
| eval indexname = if(len(idx)=0 OR isnull(idx),"(UNKNOWN)",idx) \
| eval sourcetypename = st \
| bin _time span=1d \
| stats values(poolsz) as poolsz sum(b) as b by _time, pool, indexname, sourcetypename \
| eval GB=(b/1024/1024/1024) \
| eval pool=(poolsz/1024/1024/1024)\
| fields _time, indexname, sourcetypename, GB, pool\
| eval day=strftime(_time,"%a") \
| eval yesterday=tostring(strftime(relative_time(now(),"-d@d"),"%Y-%m-%d")) \
| eval time=tostring(strftime(_time,"%Y-%m-%d")) \
| eval isyesterday=if(yesterday==time,"true","is_average")\
| eval Yesterday=if(isyesterday="true",GB,0)\
| stats values(pool) as pool sum(Yesterday) as Yesterday avg(GB) as Average by indexname, sourcetypename\
| stats values(pool) as pool list(sourcetypename) sum(Yesterday) sum(Average) by indexname\
| rename indexname as Indexname sum(Average) as Average list(sourcetypename) as Sourcetypename sum(Yesterday) as Yesterday\
| join type=outer Indexname [| inputlookup license_owners.csv | makemv Indexname delim="," | mvexpand Indexname | fields Group, Email, Quota, Indexname]\
| fillnull value="Unassigned" Group\
| fillnull value="N/A" Email\
| fillnull value="Unlimited" Quota\
| stats values(Quota) as Quota values(pool) as pool list(Indexname) list(Sourcetypename) list(Email) sum(Yesterday) sum(Average) by Group\
| rename list(Indexname) as Indexname list(Sourcetypename) as Sourcetypename sum(Average) as Average list(Email) as Email sum(Yesterday) as Yesterday\
| mvexpand Email\
| dedup Email,Group\
| eval Indexname=mvjoin(Indexname,",")\
| eval Sourcetypename=mvjoin(Sourcetypename,",")\
| addcoltotals labelfield=Group label=TOTAL Yesterday Average, pool\
| eval Quota=if(Group=="TOTAL",pool,Quota)\
| fields Group, Email, Indexname, Sourcetypename, Quota, Yesterday, Average\
| outputlookup license_owners.csv

[dlma_alert_group_exceeded_quota]
action.email.useNSSubject = 1
alert.track = 0
description = Monitors overall license pool and group assigned quotas to alert when the license pool or an assigned quota has been exceeded.
dispatch.earliest_time = -1h
dispatch.latest_time = now
dispatchAs = user
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = dlma_splunk
request.ui_dispatch_view = search
search = | inputlookup license_owners.csv \
| where Quota!="Unlimited" \
| eval quota_limit=Yesterday-Quota\
| where quota_limit>0\
| rename quota_limit as "Quota Exceeded (GB)" Quota as "Quota (GB)" Yesterday as "Yesterday (GB)" \
| fields Group, Email, Indexname, "Quota (GB)", "Yesterday (GB)", "Quota Exceeded (GB)"

[dlma_alert_fullweek_sourcetype_datachange]
action.email.useNSSubject = 1
alert.track = 0
description = Looks at license consumption by sourcetype the past month and compares the average to yesterday's ingestion to check if there are any spikes or drops in ingestion rate.
dispatchAs = user
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = dlma_splunk
request.ui_dispatch_view = search
search = index=_internal source=*license_usage.log type="Usage" earliest=-30d@d latest=@d \
| eval indexname = if(len(idx)=0 OR isnull(idx),"(UNKNOWN)",idx) \
| eval sourcetypename = st \
| bin _time span=1d \
| stats sum(b) as b by _time, pool, indexname, sourcetypename \
| eval GB=(b/1024/1024/1024) \
| fields _time, indexname, sourcetypename, GB \
| eval day=strftime(_time,"%a") \
| eval yesterday=tostring(strftime(relative_time(now(),"-d@d"),"%Y-%m-%d")) \
| eval time=tostring(strftime(_time,"%Y-%m-%d")) \
| eval isyesterday=if(yesterday==time,"true","is_average") \
| stats avg(GB) as Average by isyesterday, indexname, sourcetypename \
| streamstats range(Average) as diff by indexname, sourcetypename \
| where isyesterday=="true" \
| eval percentage=round((diff/(Average+diff)*100),2) \
| fields indexname, sourcetypename, Average, diff, percentage\
| where diff>0.5 AND percentage>10\
| rename Average as "Yesterday's Ingestion (GB)", diff as "Difference from Average (GB)", percentage as "Percent Difference (%)"

