[cs_schedsearch_get_index]
definition = index=*
iseval = 0

[cs_schedsearch_get_report(1)]
args = Report_ID
definition = `cs_schedsearch_get_index`| spath "ta_data.Report_Data.id" | search "ta_data.Report_Data.id"=$Report_ID$
iseval = 0

[cs_schedsearch_get_execution(1)]
args = Execution_ID
definition = `cs_schedsearch_get_index`| spath "ta_data.Execution_Data.id" | search "ta_data.Execution_Data.id"=$Execution_ID$
iseval = 0
