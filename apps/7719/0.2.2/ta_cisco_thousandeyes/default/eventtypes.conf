[cisco_thousandeyes_events]
search = `event_index` sourcetype=cisco:thousandeyes:event

[cisco_thousandeyes_activities]
search = `activity_index` sourcetype=cisco:thousandeyes:activity

[cisco_thousandeyes_path_visualization]
search = `path_viz_index` sourcetype=cisco:thousandeyes:path-vis

[cisco_thousandeyes_test_metrics_web]
search = `stream_index` sourcetype=cisco:thousandeyes:metric  thousandeyes.test.type IN ("http-server", "page-load", "api", "web-transaction", "ftp-server", "sip", "rtp")

[cisco_thousandeyes_test_metrics_network]
search = `stream_index` sourcetype=cisco:thousandeyes:metric  thousandeyes.test.type IN ("agent-to-server", "agent-to-agent", "bgp", "dns-server", "dns-trace", "dns-dnessec", "dns-sec")

[cisco_thousandeyes_test_trace]
search = `trace_index` sourcetype=cisco:thousandeyes:trace
