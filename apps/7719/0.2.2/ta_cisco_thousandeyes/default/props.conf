[cisco:thousandeyes:metric]
SHOULD_LINEMERGE = 0
pulldown_type = 1
DATETIME_CONFIG = CURRENT
KV_MODE = json
TRUNCATE = 999999999
FIELDALIAS-dest = server.address ASNEW dest
FIELDALIAS-target = server.address ASNEW target
FIELDALIAS-dest_port = server.port ASNEW dest_port
FIELDALIAS-error_code = error.type ASNEW error_code
FIELDALIAS-http_method = http.request.method ASNEW http_method
FIELDALIAS-http_status = http.response.status_code ASNEW status
FIELDALIAS-http_thruput = metric_name:http.server.throughput ASNEW thruput
FIELDALIAS-transport = network.transport ASNEW transport
FIELDALIAS-direction = network.io.direction ASNEW direction
FIELDALIAS-query = dns.question.name ASNEW query
FIELDALIAS-duration = metric_name:dns.lookup.duration ASNEW duration
FIELDALIAS-ftp_status = ftp.response.status_code ASNEW status
FIELDALIAS-ftp_thruput = metric_name:ftp.server.throughput ASNEW thruput
FIELDALIAS-sip_status = sip.response.status_code ASNEW status
FIELDALIAS-dvc = thousandeyes.target.agent.id ASNEW dvc
EVAL-response_time = coalesce('metric_name:http.client.request.duration' * 1000, 'metric_name:ftp.client.request.duration' * 1000, 'metric_name:sip.client.request.duration' * 1000, 'metric_name:rtp.client.request.duration' * 1000)

[cisco:thousandeyes:trace]
SHOULD_LINEMERGE = 0
pulldown_type = 1
DATETIME_CONFIG = CURRENT
KV_MODE = json
TRUNCATE = 999999999
FIELDALIAS-dest = server.address ASNEW dest
FIELDALIAS-dest_port = server.port ASNEW dest_port
FIELDALIAS-http_method = http.request.method ASNEW http_method
FIELDALIAS-http_status = http.response.code ASNEW status
FIELDALIAS-url = url.full ASNEW url
FIELDALIAS-dvc = thousandeyes.source.agent.id ASNEW dvc
FIELDALIAS-agent_name = thousandeyes.source.agent.name ASNEW agent_name
FIELDALIAS-agent_location = thousandeyes.source.agent.location ASNEW agent_location
FIELDALIAS-test_name = thousandeyes.test.name ASNEW test_name
FIELDALIAS-test_type = thousandeyes.test.type ASNEW test_type
FIELDALIAS-account_id = thousandeyes.account.id ASNEW account_id
FIELDALIAS-stream_id = thousandeyes.stream.id ASNEW stream_id
FIELDALIAS-permalink = thousandeyes.permalink ASNEW permalink
EVAL-duration = round((end_time_unix_nano - start_time_unix_nano) / 1000000, 3)
EVAL-response_time = round((end_time_unix_nano - start_time_unix_nano) / 1000000, 3

[cisco:thousandeyes:path-vis]
SHOULD_LINEMERGE = 0
pulldown_type = 1
DATETIME_CONFIG = CURRENT
KV_MODE = json
TRUNCATE = 999999999
FIELDALIAS-src_ip = sourceIp ASNEW src_ip
FIELDALIAS-dest_ip = serverIp ASNEW dest_ip
FIELDALIAS-dest = server ASNEW dest
FIELDALIAS-response_time = pathTraces{}.responseTime ASNEW response_time
FIELDALIAS-hops = pathTraces{}.numberOfHops ASNEW hops
FIELDALIAS-cea_dvc = agent.agentId ASNEW dvc
FIELDALIAS-endpoint_channel = networkProfile.wirelessProfile.channel ASNEW channel
FIELDALIAS-endpoint_ssid = networkProfile.wirelessProfile.ssid ASNEW ssid
FIELDALIAS-endpoint_wifi = networkProfile.wirelessProfile.phyMode ASNEW wifi
FIELDALIAS-endpoint_transport = originalTargetProfile.protocol ASNEW transport
FIELDALIAS-endpoint_dvc = agentId ASNEW dvc
EVAL-duration = endTime-startTime

[cisco:thousandeyes:event]
SHOULD_LINEMERGE = 0
pulldown_type = 1
DATETIME_CONFIG = CURRENT
KV_MODE = json
TRUNCATE = 999999999
FIELDALIAS-description = title ASNEW description

[cisco:thousandeyes:activity]
SHOULD_LINEMERGE = 0
pulldown_type = 1
DATETIME_CONFIG = CURRENT
KV_MODE = json
TRUNCATE = 999999999
FIELDALIAS-vendor_account = aid ASNEW vendor_account
FIELDALIAS-vendor_account_stream = thousandeyes.account.id ASNEW vendor_account
FIELDALIAS-action = event ASNEW action
FIELDALIAS-src = thousandeyes.user.address ASNEW src
FIELDALIAS-dvc = thousandeyes.user.address ASNEW dvc
FIELDALIAS-user_name = user ASNEW user_name
FIELDALIAS-user_name_stream = thousandeyes.user.name ASNEW user_name
FIELDALIAS-aid_stream = thousandeyes.account.id ASNEW aid
FIELDALIAS-uid_stream = thousandeyes.user.id ASNEW uid
FIELDALIAS-accountGroupName_stream = thousandeyes.account.name ASNEW accountGroupName
EVAL-user = coalesce(user, 'thousandeyes.user.name' + " (" + 'thousandeyes.user.email' + ")")
EVAL-event = coalesce(event, _raw)
EVAL-date = coalesce(date, strftime(_time, "%Y-%m-%dT%H:%M:%SZ"))

[source::...*thousandeyes*.log*]
sourcetype = ciscoThousandEyes:log
