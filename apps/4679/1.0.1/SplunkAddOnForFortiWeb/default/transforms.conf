##sourcetype
[force_sourcetype_fwb_traffic]
DEST_KEY = MetaData:Sourcetype
REGEX = device_id=\"?FV.+type=\"?traffic
FORMAT = sourcetype::fwb_traffic

[force_sourcetype_fwb_attack]
DEST_KEY = MetaData:Sourcetype
REGEX = device_id=\"?FV.+type=\"?attack
FORMAT = sourcetype::fwb_attack

[force_sourcetype_fwb_event]
DEST_KEY = MetaData:Sourcetype
REGEX = device_id=\"?FV.+type=\"?event
FORMAT = sourcetype::fwb_event

[field_extract]                                                                                                                      
DELIMS = "\ ,", "="
