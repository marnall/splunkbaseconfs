[tines:reporting]
SHOULD_LINEMERGE = 0
EVAL-vendor_product = vendor_product="tines"
KV_MODE = json
LINE_BREAKER = ^\{\"date
TZ = UTC
EVENT_BREAKER_ENABLE = 1
EVENT_BREAKER = ^\{\"date

[tines:audit]
EVAL-vendor_product = "Tines Automation"
EVENT_BREAKER_ENABLE = 1
EVENT_BREAKER = ^\{\"created_at
FIELDALIAS-src = request_ip AS src
FIELDALIAS-src_ip = request_ip AS src_ip
FIELDALIAS-user_name = user_email AS user_name
FIELDALIAS-user_agent = request_user_agent AS user_agent
FIELDALIAS-object = inputs.inputs.agents{}.name as object
FIELDALIAS-object_id = inputs.inputs.actions{}.actionId as object_id
FIELDALIAS-user = user_email AS user
FIELDALIAS-change_type = operation_name AS change_type
FIELDALIAS-dest = tenant_id as dest
FIELDALIAS-dvc = tenant_id as dvc
EVAL-status = "success"
LOOKUP-tines_actions_auto_lookup = tines_action operation_name AS operation_name OUTPUTNEW action AS action
KV_MODE = json
LINE_BREAKER = ^\{\"created_at
SHOULD_LINEMERGE = 0
TZ = UTC

[tines:cases]
SHOULD_LINEMERGE = 0
EVAL-vendor_product = vendor_product="tines"
KV_MODE = json
LINE_BREAKER = ^\{\"case_id
TZ = UTC
EVENT_BREAKER_ENABLE = 1
EVENT_BREAKER = ^\{\"case_id
FIELDALIAS-user = assignees{}.email as user
EVAL-status = lower(status)
EVAL-priority = lower(priority)
FIELDALIAS-src_user = author.email as src_user
FIELDALIAS-time_submitted = created_at as time_submitted
FIELDALIAS-ticket_id = case_id as ticket_id





