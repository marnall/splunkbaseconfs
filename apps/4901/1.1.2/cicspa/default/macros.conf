[cicspa_sum_as_self(1)]
args = field
definition = sum("$field$") as "$field$"
iseval = 0

[cicspa_sum_time_total_as_self(1)]
args = field
definition = sum("$field$ Time Total") as "$field$"
iseval = 0

[cicspa_test_source_type_perf_summ]
definition = sourcetype=="cicspa_TRANSUM"
iseval = 0

