[default]
[cicspa_avg_from_perf_summ(1)]
args = field_name
definition = eval(round(sum('$field_name$ Total')/sum('#Tasks'),6)) as "Average $field_name$"
iseval = 0

[cicspa_exclude_trans]
definition = NOT [|inputlookup cics_trans.csv]
iseval = 0

[cicspa_search_source_type_perf_summ]
definition = sourcetype="cicspa_TRANSUM"
iseval = 0

[cicspa_search_source_type_stat_alert]
definition = sourcetype="cicspa_SYSALERT"
iseval = 0

[cicspa_search_start_default]
definition = index=cicspa

[cicspa_search_start_perf_list]
definition = `cicspa_search_start_default` sourcetype=cicspa_TRANLIST
iseval = 0

[cicspa_search_start_perf_summ]
definition = `cicspa_search_start_default` sourcetype=cicspa_TRANSUM
iseval = 0

[cicspa_search_start_perf_summ_wait]
definition = `cicspa_search_start_default` sourcetype=cicspa_TRANWAIT
iseval = 0

[cicspa_search_start_perf_summ_zcon]
