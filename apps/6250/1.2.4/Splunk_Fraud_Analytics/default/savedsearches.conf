| eval AF__qs="(fraud_web.username_tried=\"" . username . "\" OR fraud_web.src_ip IN (\"" . mvjoin(src_ips, "\", \"") . "\"))"\
| eval AF__title = "Investigate Risk Rule: Brute Force Attack on user"\
| eval DM="fraud_web"\
| fields login_attempts_failed_total AF_* username DM

