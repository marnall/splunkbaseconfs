search = | tstats count as logins from datamodel=fraud_web.fraud_web by fraud_web.username | rename fraud_web.username as username |where username!= "---" |sort logins\
|  join logins type=left\
[\
| makeresults count=40\
| streamstats count as logins\
| eventstats count as max_ExcessiveLogins\
| eventstats max(max_ExcessiveLogins) as max_RiskScore_ExcessiveLogins\
| eval RiskScore_ExcessiveLogins=pow(logins,2)\
| eventstats max(RiskScore_ExcessiveLogins) as max_RiskScore_ExcessiveLogins\
]\
| filldown max_ExcessiveLogins RiskScore_ExcessiveLogins max_RiskScore_ExcessiveLogins\
| reverse\
| eval RiskScore_ExcessiveLogins = if(logins>max_ExcessiveLogins,max_RiskScore_ExcessiveLogins,RiskScore_ExcessiveLogins)\
| eval RiskScore_ExcessiveLogins=RiskScore_ExcessiveLogins/max_RiskScore_ExcessiveLogins*100\
| fields - max_ExcessiveLogins max_RiskScore_ExcessiveLogins\
| sort - RiskScore_ExcessiveLogins |rename RiskScore_ExcessiveLogins as risk_score\
| eval DM="fraud_web"\
| eval AF__app=`AF__app`\
| eval AF__dash=`AF__dash__web_traffic`\
| eventstats values(username) as usernames\
| eval AF__qs="(fraud_web.username_tried IN (\"" . mvjoin(usernames, "\", \"") . "\") OR fraud_web.username IN (\"" . mvjoin(usernames, "\", \"") . "\"))"\
| fields - usernames

