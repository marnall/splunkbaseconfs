dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = | from datamodel:fraud_account |search \
| eval lat1=src_ip_lat, lon1=src_ip_lon, lat2=zip_lat, lon2=zip_lon\
| where isnotnull(lat2)\
| search src_ip_Country="United States"\
| eval rlat1 = pi()*lat1/180, rlat2=pi()*lat2/180, rlat = pi()*(lat2-lat1)/180, rlon= pi()*(lon2-lon1)/180\
| eval a = sin(rlat/2) * sin(rlat/2) + cos(rlat1) * cos(rlat2) * sin(rlon/2) * sin(rlon/2) \
| eval c = 2 * atan2(sqrt(a), sqrt(1-a)) \
| eval distance = 6371 * c \
|where distance > 1000\
| eval DM="fraud_account"\
| eval AF__app=`AF__app`\
| eval AF__dash=`AF__dash__customer_accounts`\
| eval AF__qs="(fraud_account.username=\"" . username . "\")"

