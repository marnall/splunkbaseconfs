disabled = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = | from datamodel:fraud_web\
| search\
  action IN ("edit_password","edit_profile","edit_username", "add_payee","money_movement","bill_payment","trade_securities")\
| streamstats c by session_id action\
| where c<=5\
| reverse\
| eval action_short = case(action IN ("edit_password","edit_profile","edit_username"), "E", action IN ("add_payee","money_movement","bill_payment","trade_securities"), "M", true(), "X")\
| stats first(usernames) as usernames, list(action_short) as actions_short by session_id\
| eval actions_short=mvjoin(actions_short, "")\
| eval risky=if(match(actions_short, "(E.*?){3,}(M.*?){3,}"), 1, 0)\
| where risky=1\
| eval username=split(usernames, "|")\
| mvexpand username\
| where username!="---"\
| eventstats values(session_id) as session_ids by username\
| eval AF__app=`AF__app`\
| eval AF__dash=`AF__dash__risk_exposure`\
| eval AF__qs="(fraud_web.usernames=\"*" . username . "*\" OR fraud_web.session_id IN (\"" . mvjoin(session_ids, "\", \"") . "\"))"\
| eval AF__title = "Investigate Risk Rule: Edit user profile followed by money movement"\
| eval DM="fraud_web"\
| fields actions_short session_id username AF__* DM

