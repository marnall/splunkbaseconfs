#
# Splunk app configuration file
#

# NOTE: Unknown why splunk-appinspect requires duplicated information in this config
#
# The `app.conf` [package] stanza has an `id` property that does not match the
# `name` property of the [id] stanza. `app.conf` [package] id: None [id] name:
# lookout_mobile_edr_for_splunk. Fix app.conf [package] `id` to match
# [id] `name` File: default/app.conf Line Number: 7
#
# No version specified in launcher section of app.conf. File: default/app.conf Line Number: 19
[id]
name = lookout_mobile_edr_for_splunk
version = 3.0.2

[package]
id = lookout_mobile_edr_for_splunk
check_for_updates = true
show_upgrade_notification = true

[launcher]
author = Lookout
description = Integrate Lookout Mobile EDR telemetry into Splunk SIEM.
version = 3.0.2

[ui]
is_visible = 1
label = Lookout Mobile EDR for Splunk

[triggers]
reload.lookout_mobile_edr_for_splunk = simple
