[sc_check_latest_breach_update]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = spycloudinvestigationapp
request.ui_dispatch_view = search
search = |inputlookup sc_breach_catalog |stats latest(_time) as _time

[SpyCloud_Catalog_Update]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 0 2 * * 1
description = This search updates the breach catalog lookup. The update interval is set by the search schedule.
dispatch.earliest_time = 0
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = spycloudinvestigationapp
request.ui_dispatch_view = search
search = | scinvget endpoint=breach field="breach_catalog" fuzzy=False \
| spath \
| eval title=if((match(title,"\(TLP:RED\)")), "Sensitive Source", title) \
| eval _time=now() \
| table _time, id, acquisition_date, uuid, type, title, spycloud_publish_date, site, site_description, public_date, num_records, description, confidence, breach_date \
| inputlookup sc_breach_catalog append=true \
| stats latest(_time) as _time latest(*) as * by id \
| outputlookup sc_breach_catalog

