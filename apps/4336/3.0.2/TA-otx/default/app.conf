# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 5

[launcher]
author = Luke Monahan <luke.monahan@tesserent.com>
version = 3.0.2
description = This is a modular input which collects data from Open Threat Exchange for indexing in Splunk

[ui]
is_visible = 1
label = Add-on for Open Threat Exchange
docs_section_override = AddOns:released

[package]
id = TA-otx

[triggers]
reload.addon_builder = simple
reload.ta_otx_account = simple
reload.ta_otx_settings = simple
reload.passwords = simple

