[omniscient_collector]
action.logevent.param.event = uid="OM00001" search_name="$name$" search_version="1.0" category="internal_use" mitre_tactic="" mitre_technique="" priority="$alert.severity$" run_duration="$job.runDuration$" earliest_time="$job.earliestTime$" latest_time="$job.latestTime$" result_count="$job.resultCount$" managed_alert_owner="$owner$" job_id="$results_link$" search_string=||||$search$||||
action.logevent.param.host = omniarch
action.logevent.param.index = `omni_index_filter`
action.logevent.param.source = omnifarious
action.logevent.param.sourcetype = omni:metadata
action.logevent = 1
alert.severity = 5
alert.suppress = 0
alert.track = 1
disabled = 0
display.events.fields = ["host","source","sourcetype","job_id","category","earliest_time","last_event_detected","latest_time","managed_alert_owner","mitre_tactic","mitre_technique","priority","result_count","run_duration","search_name","search_string","search_version","sid","uid"]
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
counttype = number of events
cron_schedule = 25,55 * * * *
description = Tracks and adds newly fired managed searches to omni_saved_search_enrichment KV Store
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
quantity = 10000000
relation = less than
request.ui_dispatch_app = omnivision
request.ui_dispatch_view = omnivision
search = index=`omni_index_filter` sourcetype="omni:metadata" uid=*\
| fields _time search_name uid category priority managed_alert_owner search_version search_string mitre_tactic mitre_technique run_duration result_count\
| sort -_time \
| eventstats avg(run_duration) as avg_duration by search_name \
| dedup uid \
| eval command_list = split(search_string, "|") \
| eval format = "| ".trim(mvindex(mvfilter(match(command_list,"^\s+?table\s")),-1)) \
| fields - run_duration command_list \
| eval last_event_detected = case(result_count>0, _time) \
| eval disabled = "False" \
| rename _time as last_ran, managed_alert_owner as owner, search_string as search_query \
| lookup omni_saved_search_enrichment uid OUTPUTNEW \
| eval avg_duration = round(avg_duration, 2)." seconds" \
| eval date_added = if(isnull(date_added), strftime(now(), "%m/%d/%Y"), date_added) \
| eval last_updated = if(isnull(last_updated), strftime(now(), "%m/%d/%Y"), last_updated) \
| eval last_updated_by = if(isnull(last_updated_by), creator, last_updated_by) \
| table last_ran last_event_detected search_name uid category priority owner search_version search_query mitre_tactic mitre_technique date_added last_updated last_updated_by * \
| outputlookup omni_saved_search_enrichment append=true


[omniscient_logger]
action.logevent = 1
action.logevent.param.event = uid="OM00002" search_name="$name$" search_version="1.0" category="internal_use" mitre_tactic="" mitre_technique="" priority="$alert.severity$" run_duration="$job.runDuration$" earliest_time="$job.earliestTime$" latest_time="$job.latestTime$" result_count="$job.resultCount$" managed_alert_owner="$owner$" job_id="$results_link$" search_string=||||$search$||||
action.logevent.param.host = omniarch
action.logevent.param.index = `omni_index_filter`
action.logevent.param.source = omnifarious
action.logevent.param.sourcetype = omni:metadata
alert.severity = 1
alert.track = 1
counttype = number of events
cron_schedule = 25,55 * * * *
description = Tracks and adds the returned events of newly fired managed searches and saves the results cache to omni:results:cache for long term searching
disabled = 1
dispatch.earliest_time = -35m
dispatch.latest_time = now
display.events.fields = []
enableSched = 1
quantity = 10000000
relation = less than
request.ui_dispatch_app = omnivision
request.ui_dispatch_view = omnivision
search = ```index=`omni_index_filter` sourcetype=omni:metadata result_count>0 uid=* \
| eval job_id=mvindex(split(job_id,"sid="),1) \
| foreach *t_time \
    [ eval <<FIELD>>=round(<<FIELD>>,0)] \
| eval state="New" \
| rename _time as time_fired, earliest_time as earliest, latest_time as latest \
| sort - time_fired \
| table time_fired uid earliest latest job_id result_count ```\
| makeresults\
| search job_id="*"\
    [| search index=`omni_index_filter` sourcetype=omni:metadata result_count>0 job_id=* uid=* NOT ( \
        [| search index=`omni_index_filter` sourcetype="omni:results:cache" \
        | fields orc_job_id \
        | dedup orc_job_id \
        | eval orc_job_id="*" + orc_job_id + "*" \
        | format "" "(" "AND" ")" "OR" "" \
        | fields search]) \
    | eval job_id="scheduler_" + mvindex(split(mvindex(split(job_id, "scheduler_"), 1), "%20"), 0) \
    | foreach *t_time \
        [ eval <<FIELD>>=round(<<FIELD>>, 0)] \
    | rename _time as time_fired, earliest_time as earliest, latest_time as latest \
    | table job_id time_fired uid earliest latest result_count \
    | eval query="| append [| loadjob " + job_id \
    | foreach job_id uid time_fired earliest latest result_count \
        [| eval query=query + " | eval orc_<<FIELD>>" + "=:" + <<FIELD>> + ":"] \
    | eval query=query + "]" \
    | fields query \
    | format "" "" "" "" "" "" \
    | eval search = replace(replace(search, "\"", ""), ":", "\"") \
    | fields search] \
| eval row="..." \
| foreach row orc_time_fired orc_* * \
    [ eval row=row + if(isnull('<<FIELD>>') OR len('<<FIELD>>')<1 OR mvcount('<<FIELD>>')<1, "", "\"<<FIELD>>\": \"" + replace(replace(replace(mvjoin('<<FIELD>>', "||"), "\\\\", "\\\\\\"), "\"", "\\\""), "\n", "\\n") + "\", ")] \
| eval event="{" + rtrim(substr(row, 18), ", ") + "}" \
| fields event

