[omni:results:cache]
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
TIMESTAMP_FIELDS = omni_time_fired
category = Structured
description = Results from ran saved searches are stored in json format for long term storage/cache.
TRUNCATE = 0

[omni:resolutions]
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
category = Structured
description = Information about why a managed search is being resolved are stored in json format for archiving.
TRUNCATE = 0
TRANSFORMS-indexed_fields = indexed_omni_field_job_id,indexed_omni_field_state

[omni:debug]
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
category = Structured
description = Debug logs generated by errors throughout the app.

[omni:metadata]
EXTRACT-search_string = search_string\=\|{4}(?P<search_string>.*)\|{4}$
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
category = Structured
description = Metadata from saved searches that have run are stored here in json format.
