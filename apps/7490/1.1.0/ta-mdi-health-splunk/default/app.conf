[install]
is_configured = 0

[ui]
is_visible = 1
label = Microsoft Defender for Identity Add-on for Splunk

[launcher]
author = Adriaan Vermaak
description = Add-on to Ingest Microsoft Defender for Identity Health API alerts into Splunk via Microsoft graph.
version = 1.1.0

[package]
