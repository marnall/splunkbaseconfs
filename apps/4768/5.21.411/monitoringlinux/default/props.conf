[linux_stats_v2_host]
SEGMENTATION = none
REPORT-extract_linux_stats_v2_host = linux_stats_fields_v2_host

EVAL-proc__stat__cpu_count = cpu_count
EVAL-proc__meminfo__memtotal = memory_total_bytes
EVAL-linux_stats_cpu_percent = (cpu_system_percent+cpu_user_percent)
EVAL-linux_stats_cpu_percent_of_host = (cpu_system_percent+cpu_user_percent)/cpu_count
EVAL-linux_stats_cpu_user_percent_of_host = (cpu_user_percent)/cpu_count
EVAL-linux_stats_cpu_system_percent_of_host = (cpu_system_percent)/cpu_count
EVAL-linux_stats_cpu_user_percent = (cpu_user_percent)
EVAL-linux_stats_cpu_system_percent = (cpu_system_percent)
EVAL-linux_stats_memory_percent_of_host = 100*(memory_rss_bytes+coalesce(memory_mapped_files_bytes,0))/memory_total_bytes
EVAL-linux_stats_memory_rss_mb = memory_rss_bytes/1024/1024
EVAL-linux_stats_memory_mapped_files_mb = memory_mapped_files_bytes/1024/1024
EVAL-linux_stats_memory_total_mb = memory_total_bytes/1024/1024
EVAL-proc__meminfo__swaptotal = memory_swap_total_bytes
EVAL-proc__meminfo__swapfree = (memory_swap_total_bytes-memory_swap_bytes)
EVAL-linux_stats_last_seen = max(floor((now()-_time)/60), 0)
EVAL-proc__sys__kernel__ostype = ostype
EVAL-proc__sys__kernel__osrelease = osrelease
EVAL-proc__stat__uptime_seconds = uptime_sec
EVAL-linux_stats_io_wait_read_percent = io_wait_read_percent
EVAL-linux_stats_io_wait_write_percent = io_wait_write_percent
EVAL-linux_stats_io_read_mb = io_read_bytes/1024/1024
EVAL-linux_stats_io_write_mb = io_write_bytes/1024/1024

[linux_proc_stats_v2]
SEGMENTATION = none
REPORT-extract_linux_proc_stats = linux_proc_stats_fields_v2

EVAL-linux_proc_stats_unique_id = host+"@"+tostring(pid)+"@"+tostring(starttime)
EVAL-linux_proc_stats_io_read_mb = io_read_bytes/1024/1024
EVAL-linux_proc_stats_io_write_mb = io_write_bytes/1024/1024
EVAL-linux_proc_stats_rss_mb = vmrss/1024/1024
EVAL-linux_proc_stats_swap_mb = vmswap/1024/1024
EVAL-linux_proc_stats_uptime_string = tostring(uptime_sec, "duration")
EVAL-linux_proc_stats_cpu_percent = cpu_system_percent+cpu_user_percent
EVAL-linux_proc_stats_cpu_user_percent = cpu_user_percent
EVAL-linux_proc_stats_cpu_system_percent = cpu_system_percent
EVAL-linux_proc_stats_cpu_guest_percent = cpu_guest_percent
EVAL-linux_proc_stats_cpu_children_guest_percent = cpu_children_guest_percent
EVAL-linux_proc_stats_cpu_children_wait_user_percent = cpu_children_wait_user_percent
EVAL-linux_proc_stats_cpu_children_wait_system_percent = cpu_children_wait_system_percent
EVAL-linux_proc_stats_last_seen = max(floor((now()-_time)/60), 0)
EVAL-proc__p__cmdline = cmdline
EVAL-proc__p__uptime_seconds = uptime_sec
EVAL-proc__p__stat__state = state
EVAL-proc__p__stat__num_threads = num_threads
EVAL-proc__p__stat__comm = comm
EVAL-proc__p__stat__pid = pid
EVAL-proc__p__stat__minflt = minflt
EVAL-proc__p__stat__cminflt = cminflt
EVAL-proc__p__stat__majflt = majflt
EVAL-proc__p__stat__cmajflt = cmajflt
EVAL-proc__p__stat__ppid = ppid
EVAL-proc__p__stat__pgrp = pgrp
EVAL-proc__p__stat__session = session
EVAL-proc__p__stat__tty_nr = tty_nr
EVAL-proc__p__stat__tpgid  =tpgid
EVAL-proc__p__stat__nice = nice
EVAL-proc__p__stat__flags = flags
EVAL-proc__p__oom_score = oom_score
EVAL-proc__p__task__status__taskmax__capeff = task_status_taskmax__capeff
EVAL-proc__p__task__status__taskmax__capprm = task_status_taskmax__capprm
EVAL-proc__p__task__status__taskmax__capamb = task_status_taskmax__capamb
EVAL-proc__p__status__uid_effective = uid_effective
EVAL-proc__p__status__gid_effective = gid_effective
EVAL-proc__p__status__voluntary_ctxt_switches = voluntary_ctxt_switches
EVAL-proc__p__status__nonvoluntary_ctxt_switches = nonvoluntary_ctxt_switches
EVAL-proc__p__status__vmsize = vmsize
EVAL-proc__p__status__vmrss = vmrss
EVAL-proc__p__status__rssanon = rssanon
EVAL-proc__p__status__rssfile = rssfile
EVAL-proc__p__status__rssshmem = rssshmem
EVAL-proc__p__status__vmswap = vmswap
EVAL-proc__p__status__vmdata = vmdata
EVAL-proc__p__status__vmstk = vmstk
EVAL-proc__p__status__vmexe = vmexe
EVAL-proc__p__status__vmlib = vmlib
EVAL-proc__p__status__vmpte = vmpte
EVAL-proc__p__status__vmpmd = vmpmd
EVAL-proc__p__status__vmlck = vmlck
EVAL-proc__p__status__vmpin = vmpin
EVAL-proc__p__status__fdsize = fdsize
EVAL-proc__p__io__rchar = io_rchar
EVAL-proc__p__io__read_bytes = io_read_bytes
EVAL-proc__p__io__wchar = io_wchar
EVAL-proc__p__io__write_bytes = io_write_bytes
EVAL-proc__p__io__cancelled_write_bytes = io_cancelled_write_bytes
EVAL-proc__p__io__syscr = io_syscr
EVAL-proc__p__io__syscw = io_syscw

[linux_net_stats_v2]
SEGMENTATION = none
REPORT-extract_linux_net_stats = linux_net_stats_fields_v2

EVAL-receive_bytes_mb = round(receive_bytes/1000/1000, 3)
EVAL-transmit_bytes_mb = round(transmit_bytes/1000/1000, 3)
EVAL-device_local = if(match(device, "^lo") OR match(device, "^veth") OR match(device, "^linux"), "true", "false")

[linux_net_socket_table]
SEGMENTATION = none
REPORT-extract_linux_net_socket_table = linux_net_socket_table_fields
EVAL-linux_net_socket_table_last_seen = max(floor((now()-_time)/60), 0)

[linux_mount_stats]
SEGMENTATION = none
REPORT-extract_linux_mount_stats_table = linux_mount_stats_table_fields
