[Monitoring Linux: Collector license overuse]
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 3d
alert.track = 1
counttype = number of events
cron_schedule = 46 0 * * *
description = You are exceeding the number of running collectord allowed by the license. Contact sales@outcoldsolutions.com.
dispatch.earliest_time = -24h@h
dispatch.latest_time = @h
display.page.search.mode = fast
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = monitoringlinux
request.ui_dispatch_view = search
search = `macro_linux_logs_collectord_license_check` | search `macro_linux_alerts_base` limit>0 | \
    bin _time span=1h | \
    eval license_id=coalesce(license_id, "trial - " + instance_id) | \
    stats latest(limit) as limit, dc(instance_id) as collectors by _time, license_id | \
    where limit<collectors

[Monitoring Linux: Warning: linux runtime disk space is low]
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 1h
alert.track = 1
counttype = number of events
cron_schedule = 0-59/5 * * * *
description = The host has less than 20% of available space for linux runtime
dispatch.earliest_time = -7m@m
dispatch.latest_time = -2m@m
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = monitoringlinux
request.ui_dispatch_view = search
search = `macro_linux_mount_stats` `macro_linux_alerts_base` | stats latest(eval(round(100*avail/total, 2))) as avail_percent by host, linux_cluster | \
    search avail_percent<20 | table host, linux_cluster, avail_percent

