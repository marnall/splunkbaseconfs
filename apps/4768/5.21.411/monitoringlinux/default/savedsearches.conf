dispatch.earliest_time = -1h@h
dispatch.latest_time = @h
display.page.search.mode = fast
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = monitoringlinux
request.ui_dispatch_view = search
search = `macro_linux_logs_collectord_license_check` | search `macro_linux_alerts_base` (version_major<5 OR (version_major=5 AND version_minor<21)) | \
