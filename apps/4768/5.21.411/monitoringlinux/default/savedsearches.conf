alert.suppress = 1
alert.suppress.period = 3d
alert.track = 1
counttype = number of events
cron_schedule = 24 0 * * *
description = One or more collectord are continually failing to check the license. Contact sales@outcoldsolutions.com
dispatch.earliest_time = -24h@h
dispatch.latest_time = @h
display.page.search.mode = fast
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = monitoringlinux
request.ui_dispatch_view = search
search = `macro_linux_logs_collectord_license_check` | search `macro_linux_alerts_base` (check_success=false OR valid=false) err_points>24  | \
    stats latest(_time) as _time, latest(err_points) as err_points, latest(message) as message by host, linux_cluster | \
    table _time, host, linux_cluster, err_points, message

