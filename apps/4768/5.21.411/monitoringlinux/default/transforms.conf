[linux_proc_stat_state]
filename=linux_proc_stat_state.csv

[linux_proc_capabilities_lookup]
filename=linux_proc_capabilities.csv
match_type = WILDCARD(capabilities_flags)

[linux_stats_fields_v2_host]
DELIMS = ","
FIELDS = cpu_user_percent, cpu_system_percent, cpu_throttled_percent, memory_rss_bytes, memory_mapped_files_bytes, io_read_bytes, io_write_bytes, io_wait_read_percent, io_wait_write_percent, memory_swap_total_bytes, memory_swap_bytes, cpu_count, memory_total_bytes, uptime_sec

[linux_proc_stats_fields_v2]
DELIMS = ","
FIELDS = cpu_user_percent, cpu_system_percent, cpu_children_wait_user_percent, cpu_children_wait_system_percent, cpu_guest_percent, cpu_children_guest_percent, uptime_sec, io_rchar, io_wchar, io_syscr, io_syscw, io_read_bytes, io_write_bytes, io_cancelled_write_bytes, oom_score, session, tty_nr, tpgid, flags, minflt, cminflt, majflt, cmajflt, priority, nice, num_threads, uid_effective, gid_effective, fdsize, vmsize, vmlck, vmpin, vmrss, rssanon, rssfile, rssshmem, vmdata, vmstk, vmexe, vmlib, vmpte, vmpmd, vmswap, voluntary_ctxt_switches, nonvoluntary_ctxt_switches

[linux_net_stats_fields_v2]
DELIMS = ","
FIELDS = receive_bytes, receive_packets, receive_errs, receive_drop, transmit_bytes, transmit_packets, transmit_errs, transmit_drop

[linux_net_socket_table_fields]
DELIMS = ","
FIELDS = local_address, local_port, remote_address, remote_port, remote_resolved, connections

[linux_mount_stats_table_fields]
DELIMS = ","
FIELDS = total, free, avail, inodes, inodesFree