####
## sourcetype identification
####

###### ProTx log in JSON format over SYSLOG ######
[botrx:protx:syslog]
category = Network & Security
description = Output produced by the by the BotRx ProTx over syslog, the message body is in JSON format
TIME_PREFIX = (timestamp|ts_end)\":
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
KV_MODE=json
TRUNCATE = 0
LINE_BREAKER = ([\r\n]+)
# Strip the SYSLOG header off to make it JSON
TRANSFORMS-stripSyslog = PROTX-syslog-header-strip
FIELDALIAS-attack_type = attack_type{} AS attack_type
EVAL-is_attack = case(attack_type=="OK",0,isnull(attack_type),null,1==1,1)
EVAL-website = if(isnull(msg_type),mvindex(host,mvcount(host)-1),null)
EVAL-bot_human = case(bot_bypass=="true", "Good Bot", attack_type=="OK" AND bot_bypass=="false","Human", isnull(attack_type),null, 1==1, "Bad Bot")
EVAL-uniformed_bot_name = if(in(attack_type,"Cookie","Bot"), coalesce(bot_type,bot_name,"Script-based Bot"),null)
EVAL-uniformed_bot_category = if(in(attack_type,"Cookie","Bot"), coalesce(bot_type,bot_category,"Script-based Tool"),null)

