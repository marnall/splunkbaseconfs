[Generate Asset Zone Lookup]
action.email.useNSSubject = 1
action.lookup = 0
action.lookup.filename = dragos_asset_zone_info.csv
alert.track = 0
description = This will generate a lookup file that can be used to enrich asset zone information
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = TA_dragos_ot_add_on
request.ui_dispatch_view = search
search = sourcetype="dragos:assetzones"\
| dedup id sortby -_time\
| table zone_id,zone_name,zone_description,zone_group,zone_group_address,zone\
| outputlookup dragos_asset_zone_info.csv

[Generate Asset Data Lookup]
action.email.useNSSubject = 1
alert.track = 0
description = This searched can be scheduled to regularly update the dragos_asset_info.csv which can be used in ES and the OT Security Add-on
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA_dragos_ot_add_on
request.ui_dispatch_view = search
search = sourcetype="dragos:assetdata" \
| fillnull ip,dns,nt_host,mac value="" \
| eval dns=if(isnotnull('dns{}'), 'dns{}', 'dns'), mac=if(isnotnull('mac{}'), 'mac{}', 'mac'), ip=if(isnotnull('ip{}'), 'ip{}', 'ip'), nt_host=if(isnotnull('nt_host{}'), 'nt_host{}', 'nt_host') \
| eval ip=if(mvcount(ip) > 1, mvsort(ip), ip), dns=if(mvcount(dns) > 1, mvsort(dns), dns), nt_host=if(mvcount(nt_host) > 1, mvsort(nt_host), nt_host), mac=if(mvcount(mac) > 1, mvsort(mac), mac) \
| dedup ip,dns,nt_host,mac sortby _time \
| eventstats count as mac_count by mac \
| eval mac=if(mac_count > 1, "", mac), , ip=mvappend(mvindex(ip, 0, 3), substr(mvjoin(mvindex(ip, 4, -1), ","), 1, 150)), dns=mvappend(mvindex(dns, 0, 3), substr(mvjoin(mvindex(dns, 4, -1), ","), 1, 150)), nt_host=mvappend(mvindex(nt_host, 0, 3), substr(mvjoin(mvindex(nt_host, 4, -1), ","), 1, 150)), mac=mvappend(mvindex(mac, 0, 3), substr(mvjoin(mvindex(mac, 4, -1), ","), 1, 150)) \
| table asset_id, asset_model, asset_status, asset_system, asset_type, asset_vendor, asset_version, asset_criticality, bunit, category, city, classification, country, dns, end_of_support, exposure,ip, is_expected, lat, lon, location, mac, nt_host, owner, parent_asset_id, pci_domain, priority, requires_av, serial, should_timesync, should_update, site_id, vlan, zone\
| outputlookup dragos_asset_info.csv

[Generate Threat Intel Lookup]
action.email.useNSSubject = 1
alert.track = 0
description = This searched can be scheduled to regularly update the dragos_threat_indicators.csv which can be used in ES
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA_dragos_ot_add_on
request.ui_dispatch_view = search
search = sourcetype="dragos:iocs" \
| dedup uuid sortby -_time \
| eval domain=if(indicator_type=="domain", value, ""), ip=if(indicator_type=="ip", value, ""), file_hash=if(indicator_type in ("md5", "sha1", "sha256"), value, ""), file_name=if(indicator_type=="filename", value, "") \
| eval description=mvjoin(mvappend("Threat Groups: ".mvjoin('threat_groups{}', ","), if(isnotnull(kill_chain) and kill_chain!="null", "Kill Chain: ".kill_chain, ""), "Products: ".mvjoin('products{}.serial', ",")), "; ") \
| eval description=substr(description, 0, 250) \
| table "description","weight","domain","ip","file_hash","file_name" \
| outputlookup dragos_threat_indicators.csv


[Dragos Errors]
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = This alert can be used to monitor asynchronous errors encountered when running Dragos Inputs
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = | rest /services/messages | search title="dragos*" | table id, title, timeCreated_iso, message