[random_ip_address]
definition = eval\
    bitA=random(),\
    ip=if(bitA>1,bitA+2147483648,bitA),\
    aaa=floor(ip/16777216),\
    bbb=floor((ip-aaa*16777216)/65536),\
    ccc=floor((ip-(aaa*16777216+bbb*65536))/256),\
    ddd=ip-(aaa*16777216+bbb*65536+ccc*256),\
    ip_address=tostring(ddd)+"."+tostring(ccc)+"."+tostring(bbb)+"."+tostring(aaa)\
| fields - bitA ip aaa bbb ccc ddd
iseval = 0
