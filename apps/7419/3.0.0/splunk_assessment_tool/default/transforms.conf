[exec_states]
collection = exec_states
external_type = kvstore
fields_list = created,modified,dispatched_time,job_name,assessment_id,assessment_name,assessment_type,saved_search_id,variables,summary_index,search_query,search_version,dashboard_id,schedule_type,schedule_value,search_sid,job_state,disabled,archived,selected_area,selected_vrp,encrypt_export,password

[assessment_input_cache]
batch_index_query = 0
case_sensitive_match = 1
filename = assessment_input_cache.csv

[sat_internal]
collection = sat_internal
external_type = kvstore
fields_list = assessment_id,dashboard_id,event_type,event_id,event_time,event_label,event_value,link_app

[efs_meta]
collection = efs_meta
external_type = kvstore
fields_list = downloadTime,customer,accountDesc,splunkVersion,deployEnv,deployDomain,evaluator,efsDomain,efsSource,efsVersion,efsProvenance

[efs_snapshot]
collection = efs_snapshot
external_type = kvstore
fields_list = _key,downloadFlag,snapUid,assessmentDate,efsDate,AdKpi01,AdKpi02,AdKpi03,AdKpi04,AdKpi05,AdKpi06,AdKpi07,AdKpi08,AdKpi09,AdKpi10,AdKpi11,AdKpi12,AdKpi13,RuKpi01,RuKpi02,RuKpi03,RuKpi04,RuKpi05,RuKpi06,RuKpi07,RuKpi08,RuKpi09,RuKpi10,RuKpi11,RuKpi12,RuKpi13,RuKpi14,RuKpi15,RuKpi16,RuKpi17,RuKpi18,RuKpi19,RuKpi20,RuKpi21,RuKpi22,RuKpi23,RuKpi24

[kpi_mapping]
filename = kpi_mapping.csv 
case_sensitive_match = false
fields_list = number,id,kpi_name,description,category,subcategory,quotient_type,feasibility,impact
