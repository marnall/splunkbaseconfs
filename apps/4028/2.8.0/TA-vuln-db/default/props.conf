[vulndb]
TIME_PREFIX = "vulndb_last_modified": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TZ = UTC
TRUNCATE = 10000000
MAX_TIMESTAMP_LOOKAHEAD = 25
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)\{
category = Network & Security
description = Risk Based Security VulnDB vulnerability information.
pulldown_type = 1
FIELDALIAS-CIM_fields = title AS signature
FIELDALIAS-cpe = vendors{}.products{}.versions{}.cpe{}.cpe AS cpe
FIELDALIAS-cvss_score = cvss_metrics{}.score AS cvss_score
FIELDALIAS-cvss = cvss_metrics{}.score AS cvss
FIELDALIAS-signature_id = vulndb_id as signature_id
EXTRACT-exploit_data = "name":\s?"exploit(?:[^"]*)",\s?"longname":\s?"(?<Exploit>[^"]+)",\s?"description":\s?"(?<Exploit_Description>[^"]+)
EVAL-severity = case( max(cvss_score) >= 0 AND max(cvss_score) < 4, "low", max(cvss_score) < 7, "medium", max(cvss_score) < 9, "high", max(cvss_score) <= 10, "critical" )
EVAL-epss_score = if(epss_score="null","Unavailable",epss_score)
EVAL-epss_plus_score = case(epss_plus_score="null" AND strptime('vulndb_published_date',"%Y-%m-%dT%H:%M:%SZ") < 946684800, "Unavailable", epss_plus_score="null", "Calculating", 1==1, epss_plus_score)
EVAL-epss_range = case( epss_score >= 0 AND epss_score < 0.3, "low", epss_score < 0.6, "medium", epss_score < 0.9, "high", epss_score >= 0.9, "critical", 1==1,"Unavailable" )
EVAL-epss_plus_range = case( epss_plus_score >= 0 AND epss_plus_score < 0.3, "low", epss_plus_score < 0.6, "medium", epss_plus_score < 0.9, "high", epss_plus_score >= 0.9, "critical", epss_plus_score="null" AND strptime('vulndb_published_date',"%Y-%m-%dT%H:%M:%SZ") < 946684800,"Unavailable", 1==1,"Calculating")
EVAL-ransomware_likelihood = case(ransomware_likelihood="null" AND strptime('vulndb_published_date',"%Y-%m-%dT%H:%M:%SZ") < 946684800,"Unavailable", ransomware_likelihood="null", "Calculating", 1==1, ransomware_likelihood)
EVAL-social_risk_score = if(social_risk_score="null","Unavailable",social_risk_score)
EVAL-cve = split(replace(mvjoin(mvfilter(match('ext_references{}.value', "http:\/\/cve\.mitre\.org\/cgi-bin\/cvename\.cgi")), "|"), "http:\/\/cve\.mitre\.org\/cgi-bin\/cvename\.cgi\?name\=", ""), "|")
EVAL-cert = split(replace(mvjoin(mvfilter(match('ext_references{}.value', "http:\/\/www\.kb\.cert\.org\/vuls\/id\/")), "|"), "http:\/\/www\.kb\.cert\.org\/vuls\/id\/", ""), "|")
EVAL-vendor_product = "Flashpoint VulnDB"
EVAL-xref = "VulnDB" . vulndb_id
REPORT-extract_location_data = location_extraction

[source::...ta-vuln-db*.log*]
SHOULD_LINEMERGE = true
sourcetype = tavulndb:log

