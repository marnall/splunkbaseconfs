#############################################################################################################
#https://docs.fortinet.com/document/fortigate/7.4.2/fortios-log-message-reference/357866/log-message-fields #
#############################################################################################################

[fortigate_utm]

FIELDALIAS-vendor_type = type AS vendor_type

EVAL-signature = coalesce(attack, attackname, virus,case(subtype=="virus",msg),case(subtype=="webfilter" AND crlevel IN("high","critical"),'urlfilterlist'))
EVAL-category = coalesce(attack, attackname, virus, catdesc, dtype,case(subtype=="app-ctrl", appcat, subtype=="webfilter", urlsource),case(subtype=="virus", vendor_action))
EVAL-http_method = if(isnotnull('http_method'),'http_method','httpmethod')
EVAL-url_length = len(if(match(vendor_url,"^\/"),hostname+vendor_url,vendor_url))
EVAL-http_referrer_domain = trim(replace(http_referrer,"^(http:\/\/|https:\/\/|www.|)?(.*)$","\2"),"\/")
EVAL-verdict = 'fsaverdict'
EVAL-app = lower(coalesce(app,service))
EVAL-description = tostring('msg').+" - ".tostring(coalesce('urlfilterlist','subtype'))
EVAL-body = tostring('msg').+" - ".tostring(coalesce('urlfilterlist','subtype'))
EVAL-subject = if(isnotnull('subject'),'subject',coalesce('urlfilterlist','subtype'))
EVAL-type = if(subtype=="webfilter" AND crlevel IN("high","critical"),"alert",null())
EVAL-severity_id = if(isnotnull('severity_id'),'severity_id','crscore')
EVAL-id = 'sessionid'

[fortigate_event]

EVAL-description = coalesce('logdesc','msg')
EVAL-subject = coalesce('trigger','logdesc','msg')