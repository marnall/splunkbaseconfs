#
# Splunk app KV Store collection file
#
[lookout_mra_routing]
enforceTypes = true
field.endpoint = string
field.proxyEndpoint = string
field.proxyUsername = string

[lookout_mra_connection]
enforceTypes = true
field.entName = string
field.streamPosition = string
field.threatEnabled = bool
field.deviceEnabled = bool
field.auditEnabled = bool
field.isActive = bool

[lookout_mra_history]
enforceTypes = true
field.connectionKey = string
field.eventCount = number
field.lastFetch = string
field.currentStreamPosition = string
field.exception = string
