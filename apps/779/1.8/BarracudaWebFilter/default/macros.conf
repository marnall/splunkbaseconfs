[bandwidth_MB]
definition = eval bandwidth=round((request_size/1024)/1024,2)

[bandwidth_KB]
definition = eval bandwidth=round(request_size/1024,2)

[calc_bandwidth_MB(2)]
args = arg1, arg2
definition = eval bandwidth=round((request_size/1024)/1024,2) | $arg1$ sum(bandwidth) by $arg2$

[rename_bandwidth]
definition = rename sum(bandwidth) AS data | eval data=data." MB" | rename data AS "Bandwidth Consumed"

[spyware]
definition = where matched_category="SPYSITE" AND spy_id!="-"
