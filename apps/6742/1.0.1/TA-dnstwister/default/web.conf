
[expose:TA_dnstwister_settings]
pattern = TA_dnstwister_settings
methods = POST, GET

[expose:TA_dnstwister_settings_specified]
pattern = TA_dnstwister_settings/*
methods = POST, GET, DELETE

[expose:TA_dnstwister_dnstwister]
pattern = TA_dnstwister_dnstwister
methods = POST, GET

[expose:TA_dnstwister_dnstwister_specified]
pattern = TA_dnstwister_dnstwister/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
