[cb_edr_ports]
search = sourcetype=cb:edr:endpoint type=endpoint.event.netconn state=listening
#tags = listening, port

[cb_edr_alert]
search = sourcetype=cb:edr:analytics OR sourcetype=cb:edr:watchlist OR (sourcetype=cb:edr:endpoint vendor_type=endpoint.event.apicall)
#tags = alert

[cb_edr_processes]
search = sourcetype=cb:edr:endpoint type=endpoint*proc*
#tags = process, report

[cb_edr_crossproc]
search = sourcetype=cb:edr:endpoint type=endpoint.event.crossproc
#tags = crossproc

[cb_edr_startproc]
search = sourcetype=cb:edr:endpoint type=endpoint.event.procstart
#tags = start

[cb_edr_endproc]
search = sourcetype=cb:edr:endpoint type=endpoint.event.procend
#tags = end

[cb_edr_filesystem]
search = sourcetype=cb:edr:endpoint type=endpoint.event.filemod OR type=endpoint.event.moduleload
#tags = endpoint, filesystem

[cb_edr_registry]
search = sourcetype=cb:edr:endpoint type=endpoint.event.regmod
#tags = endpoint, registry

