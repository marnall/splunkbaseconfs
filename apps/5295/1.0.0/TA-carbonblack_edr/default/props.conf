[cb:edr:s3]
AUTO_KV_JSON = false
KV_MODE = json
TRUNCATE = 100000
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+){"type"
TRANSFORMS-cb_edr_sourcetyper = cb_edr_analytics, cb_edr_watchlist, cb_edr_endpoint
TIME_PREFIX = device_timestamp":"|create_time":"

[cb:edr:analytics]
AUTO_KV_JSON = false
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%T
MAX_TIMESTAMP_LOOKAHEAD = 19
TZ = UTC

EXTRACT-device_name_trim = device_name":"[^\\]+\\\\(?P<device_name_trim>[^"]+)"
EXTRACT-vendor_action = "action":"(?P<vendor_action>[^"]+)"
EXTRACT-severity_id = "severity":(?P<severity_id>\d+)
EXTRACT-dest = alert_url":"https://(?P<dest>[^/]+)
EXTRACT-vendor_type = type":"(?P<vendor_type>[^"]+)

EVAL-src = coalesce(device_name_trim,device_name)
EVAL-vendor = "VMware Carbon Black"
EVAL-product = "Endpoint Detection and Response"
EVAL-vendor_product = "VMware Carbon Black Endpoint Detection and Response"
EVAL-app = "VMware Carbon Black Endpoint Detection and Response"
EVAL-severity=lower(target_value)
EVAL-type = "alert"

FIELDALIAS-cim = device_os_version ASNEW os, device_external_ip ASNEW src_ip, action AS vendor_action, reason ASNEW subject, device_username ASNEW user

[cb:edr:watchlist]
AUTO_KV_JSON = false
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%T
MAX_TIMESTAMP_LOOKAHEAD = 19
TZ = UTC

EXTRACT-device_name_trim = device_name":"[^\\]+\\\\(?P<device_name_trim>[^"]+)"
EXTRACT-vendor_action = "action":"(?P<vendor_action>[^"]+)"
EXTRACT-severity_id = "severity":(?P<severity_id>\d+)
EXTRACT-dest = alert_url":"https://(?P<dest>[^/]+)
EXTRACT-vendor_type = type":"(?P<vendor_type>[^"]+)

EVAL-src = coalesce(device_name_trim,device_name)
EVAL-vendor = "VMware Carbon Black"
EVAL-product = "Endpoint Detection and Response"
EVAL-vendor_product = "VMware Carbon Black Endpoint Detection and Response"
EVAL-app = "VMware Carbon Black Endpoint Detection and Response"
EVAL-severity=lower(target_value)
EVAL-type = "alert"

FIELDALIAS-cim = device_os_version ASNEW os, device_external_ip ASNEW src_ip, action AS vendor_action, reason_code ASNEW subject, device_username ASNEW user

[cb:edr:endpoint]
AUTO_KV_JSON = false
KV_MODE = json
TIME_FORMAT = %Y-%m-%d %T.%7Q %z
MAX_TIMESTAMP_LOOKAHEAD = 33

#ALL
EVAL-vendor = "VMware Carbon Black"
EVAL-product = "Endpoint Detection and Response"
EVAL-vendor_product = "VMware Carbon Black Endpoint Detection and Response"
EVAL-parent_process_exec = mvindex(split(replace(parent_cmdline,"\\\\", "/") , "/"),-1)
EVAL-parent_process_name = mvindex(split(replace(parent_path,"\\\\", "/") , "/"),-1)
EVAL-process_exec = mvindex(split(replace(process_cmdline,"\\\\", "/") , "/"),-1)
EVAL-process_name = mvindex(split(replace(process_path,"\\\\", "/") , "/"),-1)
EVAL-dest = coalesce(dest_http,device_name_trim,device_name)
EVAL-dest_ip = coalesce(local_ip,device_external_ip)
EVAL-src = coalesce(api_src,remote_ip)
EVAL-src_ip = coalesce(api_srcip,remote_ip)
#NOTE: It's imperative that more specific vendor_actions are added to the beginning or this will fail to work as expected.
EVAL-action = case(like(vendor_action, "%ACTION_LOAD%"), "read",vendor_action=="ACTION_CREATE_KEY", "created",vendor_action=="ACTION_DELETE_KEY", "deleted",vendor_action=="ACTION_DELETE_VALUE", "deleted",vendor_action=="ACTION_LOAD_KEY", "read",vendor_action=="ACTION_RESTORE_KEY", "created",vendor_action=="ACTION_WRITE_VALUE", "modified",sensor_action=="ACTION_ALLOW", "allowed",sensor_action=="ACTION_BLOCK", "blocked",sensor_action=="ACTION_BREAK", "break",sensor_action=="ACTION_SUSPEND", "suspend",sensor_action=="ACTION_TERMINATE", "terminate",1=1,sensor_action)

EXTRACT-device_name_trim = device_name":"[^\\]+\\\\(?P<device_name_trim>[^"]+)"
EXTRACT-vendor_action = "action":"(?P<vendor_action>[^"]+)"
EXTRACT-vendor_type = type":"(?P<vendor_type>[^"]+)

FIELDALIAS-cim_all = device_os ASNEW os, process_username ASNEW user, action AS vendor_action
FIELDALIAS-cim_parent = parent_cmdline ASNEW parent_process, parent_pid ASNEW parent_process_id, parent_guid ASNEW parent_process_guid, parent_path ASNEW parent_process_path
FIELDALIAS-cim_process = process_cmdline ASNEW process, process_pid ASNEW process_id, process_hash{} ASNEW process_hash, parent_hash{} ASNEW parent_hash


#FILEMOD
EVAL-file_name = mvindex(split( replace(coalesce(modload_name, filemod_name),"\\\\", "/") , "/"),-1)

EXTRACT-file_hash = filemod_hash":\["(?P<file_hash>[^"]+)"

FIELDALIAS-cim_filemod = filemod_name ASNEW file_path, regmod_name ASNEW registry_path

#REGISTRY
EXTRACT-registry = regmod_name":"(?P<registry_hive>\w+\\\\[^\\]+).+\\(?P<registry_key_name>[^"]+)

#MODULELOAD
FIELDALIAS-cim_modload = modload_name ASNEW file_path

#NETCONN
EVAL-transport = case(netconn_protocol=="PROTO_TCP", "tcp", netconn_protocol=="PROTO_UDP", "udp", 1=1, netconn_protocol)
EVAL-transport_dest_port = case(netconn_protocol=="PROTO_TCP", "tcp", netconn_protocol=="PROTO_UDP", "udp", 1=1, netconn_protocol) + "/" + local_port
EVAL-state = case(vendor_action=="ACTION_CONNECTION_CREATE", "create", vendor_action=="ACTION_CONNECTION_CREATE_FAILED", "failed",vendor_action=="ACTION_CONNECTION_ESTABLISHED","established",vendor_action=="ACTION_CONNECTION_LISTEN","listening", 1=1, vendor_action)
EVAL-direction = case(netconn_inbound=="false","outbound",1=1,"inbound")

FIELDALIAS-cim_netcon = device_timestamp ASNEW creation_time, local_port ASNEW dest_port, remote_port ASNEW src_port

#API
EVAL-app = "VMware Carbon Black Endpoint Detection and Response"

EXTRACT-dest_http = alert_url":"https://(?P<dest_http>[^/]+)
EXTRACT-alert_src = endpoint.event.apicall.+device_name":"(?P<api_src>[^"]+)
EXTRACT-alert_srcip = endpoint.event.apicall.+device_external_ip":"(?P<api_srcip>[^"]+)
EXTRACT-type = endpoint.event.apicall.+(?P<type>alert)

FIELDALIAS-cim_api = event_id ASNEW id, event_description ASNEW subject
