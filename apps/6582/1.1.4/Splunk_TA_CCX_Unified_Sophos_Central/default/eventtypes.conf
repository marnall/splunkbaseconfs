############CCX Sophos Central##########################################################

##CCX Unified Add-On for Sophos Central##

##Custom - sourcetype for custom ingestion (HEC|S3)##

[ccx_sophos_central_application_control]
search = sourcetype="sophos:central:events" group="APPLICATION_CONTROL"
# tags = alert

[ccx_sophos_central_malware]
search = sourcetype="sophos:central:events" (group="MALWARE" OR type IN("Event::Endpoint::Threat::*","Event::Endpoint::HmpaApplicationHijacking","Event::Endpoint::HmpaBehaviourPrevented","Event::Endpoint::HmpaCryptoGuard*","Event::Endpoint::HmpaMalware*","Event::Endpoint::HmpaPua*","Event::Endpoint::Core*")) NOT type IN("*::Threat::*Dismissed*","Event::Endpoint::*CleanNothingFound")
# tags = attack malware

[ccx_sophos_central_peripherals]
search = sourcetype="sophos:central:events" group="PERIPHERALS"
# tags = alert

[ccx_sophos_central_policy_alert]
search = sourcetype="sophos:central:events" group="POLICY" name="Policy*"
# tags = alert

[ccx_sophos_central_policy_change]
search = sourcetype="sophos:central:events" group="POLICY" NOT name="Policy*"
# tags = change

[ccx_sophos_central_runtime_detections]
search = sourcetype="sophos:central:events" (group="RUNTIME_DETECTIONS" OR type IN("*Threat::CommandAndControlDetected*","*Threat::IpsInboundDetection*","Event::Endpoint::HmpaThreat")) NOT type IN("*Threat::CommandAndControlDismissed*","*Event::Endpoint::CoreIpsClean*")
# tags = attack ids

[ccx_sophos_central_threat_clean_up]
search = sourcetype="sophos:central:events" type="Event::Endpoint::Threat::CleanedUp"

[ccx_sophos_central_web]
search = sourcetype="sophos:central:events" group="WEB"
# tags = web

[ccx_sophos_central_system_status]
search = sourcetype="sophos:central:events" group="PROTECTION"

[ccx_sophos_central_system_update]
search = sourcetype="sophos:central:events" group="UPDATING"

[ccx_sophos_central_review_alerts]
search = sourcetype="sophos:central:events" NOT group IN("APPLICATION_CONTROL","MALWARE","PERIPHERALS","POLICY","RUNTIME_DETECTIONS","PROTECTION","UPDATING","WEB")
# tags = alert review

[ccx_sophos_central_change_performed]
search = sourcetype="sophos:central:events" type IN("*Endpoint::Threat::*Dismissed*","Event::Endpoint::HomeCookiesDeleted ","Event::Endpoint::HomePuaRemnantsDeleted","Event::Endpoint::HomeThreatRemnantsDeleted","Event::Endpoint::HmpaCookiesDeleted")
# tags = change endpoint

##Custom - with sourcetype mod for API ingestion##

[ccx_sophos_central_endpoint_allowed]
search = sourcetype="ccx:sophos:central:events" eventType = "Event::Endpoint::Application::Allowed"

[ccx_sophos_central_endpoint_blocked]
search = sourcetype="ccx:sophos:central:events" eventType = "Event::Endpoint::Application::Blocked"
#tags = alert

[ccx_sophos_central_failed_to_protect_computer_or_server]
search = sourcetype="ccx:sophos:central:events" eventType IN ("Event::Endpoint::NotProtected", "Event::Endpoint::SavDisabled", "Event::Endpoint::UnsupportedOperatingSystem", "Event::Endpoint::ServiceNotRunning")
#tags = alert

[ccx_sophos_malicious_traffic_detected]
search = sourcetype="ccx:sophos:central:events" eventType IN ("Event::Endpoint::Threat::CommandAndControlDetected::1", "Event::Endpoint::Threat::CommandAndControlDetected::2", "Event::Endpoint::Threat::CommandAndControlDetected::3")
#tags = ids attack

[ccx_sophos_outbreak_detected]
search = sourcetype="ccx:sophos:central:events" eventType = "Event::Endpoint::CoreOutbreak"
#tags = ids attack

[ccx_sophos_safe_browsing_detected]
search = sourcetype="ccx:sophos:central:events" eventType IN ("Event::Endpoint::HmpaSafeBrowsing", "Event::Endpoint::HmpaThreat")
#tags = web

[ccx_sophos_central_general_events_ids]
search = sourcetype="ccx:sophos:central:events" eventType IN ("Event::Endpoint::HmpaCameraMic", "Event::Endpoint::HmpaCookiesDeleted", "Event::Endpoint::HmpaCookiesDetected", "Event::Endpoint::HmpaPrivGuard", "Event::Endpoint::HmpaCredGuard","Event::Endpoint::DownloadReputationAutoBlocked","Event::SpamOrVirus::Alert","Event::SpamOrVirus::Alert::Title","Event::SpamOrVirus::Alert::Group")
#tags = ids attack

[ccx_sophos_central_web_filtering_violation]
search = sourcetype="ccx:sophos:central:events" eventType IN ("Event::Endpoint::WebControlViolation::UNKNOWN", "Event::Endpoint::WebControlViolation::BLOCKED", "Event::Endpoint::WebControlViolation::WARNED", "Event::Endpoint::WebControlViolation::PROCEEDED", "Event::Endpoint::WebFilteringBlocked")
#tags = web

[ccx_sophos_central_dlp_events]
search = sourcetype="ccx:sophos:central:events" eventType IN ("Event::Endpoint::DataLossPrevention*","Event::Endpoint::FileIntegrityMonitoring*","Event::Endpoint::Enc::Recovery::KeyCreationFailed::1","Event::Endpoint::Enc::Recovery::KeyCreationFailed::2","Event::Endpoint::Enc::DiskEncryptionFailed::1","Event::Endpoint::Enc::DiskEncryptionFailed::2","Event::Endpoint::Enc::DiskNotEncryptedEvent","Event::Endpoint::Enc::DiskEncryptionStatusChanged::2","Event::Endpoint::Denc::EncryptionSuspendedEvent","Event::Endpoint::Enc::RecoveryKeyMissingEvent","Event::Endpoint::Enc::RecoveryKeyMissingEvent::1","Event::Endpoint::Fenc::UserKeyringSyncedEvent::1","Event::Endpoint::Enc::Recovery::KeyReceived","Event::Endpoint::Enc::Recovery::KeyRevoked")
#tags = dlp incident

[ccx_sophos_central_windowsfirewall_blocked]
search = sourcetype="ccx:sophos:central:events" eventType IN ("Event::Endpoint::WindowsFirewall::Blocked", "Event::Endpoint::WindowsFirewall::Blocked::Title", "Event::Endpoint::WindowsFirewall::Blocked::Group")
#tags = alert

[ccx_sophos_central_alerts]
search = sourcetype="ccx:sophos:central:alerts"
#tags = alert

[ccx_sophos_central_endpoints]
search = sourcetype="ccx:sophos:central:endpoints" service="*"
# tags = endpoint report service

[ccx_sophos_central_endpoint_alerts]
search = sourcetype="ccx:sophos:central:endpoints" "health.threats.status"="*" NOT ("health.threats.status"="good")
# tags = alert

[ccx_sophos_central_general_events_alert]
search = sourcetype="ccx:sophos:central:events" NOT (eventtype IN("ccx_sophos_central_events_malware", "ccx_sophos_central_events_malware_operations", "ccx_sophos_malicious_traffic_detected", "ccx_sophos_central_endpoint_allowed", "ccx_sophos_central_endpoint_blocked", "ccx_sophos_central_failed_to_protect_computer_or_server", "ccx_sophos_central_general_events_ids") OR eventType IN("Event::Endpoint::Management::Resumed","Event::Endpoint::Compliant","Event::Endpoint::Mobile::NowCompliant","Event::Endpoint::UpdateFailure::UPDATED_SUCCESSFULLY","Event::Endpoint::Application::Detected","Event::Endpoint::SavEnabled::Title","Event::Endpoint::SavEnabled::Group","Event::Endpoint::Device::ReadOnly","Event::Endpoint::Device::ReadOnly::Title","Event::Endpoint::Device::ReadOnly::Group","Event::Endpoint::CloneDetected","Event::Endpoint::DownloadReputationUserAuthorised", "Event::Endpoint::DownloadReputationUserAuthorised::Title", "Event::Endpoint::DownloadReputationUserAuthorised::Group","Event::Endpoint::DownloadReputationAutoAuthorised", "Event::Endpoint::DownloadReputationAutoAuthorised::Title", "Event::Endpoint::DownloadReputationAutoAuthorised::Group","Event::Iaas::IaasError::DEFAULT", "Event::IaasAzure::AzureError::UNKNOWN_ERROR", "Event::Smc::AfwClientConnectionError::2","Event::Smc::MigrationActionsCancelled", "Event::Smc::MigrationActionsCancelled::Title", "Event::Smc::MigrationActionsCancelled::Group", "Event::Smc::MigrationCancelled", "Event::Smc::MigrationCancelled::Group", "Event::Smc::MigrationCancelled::Title", "Event::Smc::MigrationFailed", "Event::Smc::MigrationFailed::Group", "Event::Smc::MigrationFailed::Title", "Event::Smc::MigrationPreventedByAdminEmail", "Event::Smc::MigrationPreventedByAdminEmail::Title", "Event::Smc::MigrationPreventedByAdminEmail::Group", "Event::Smc::MigrationStarted", "Event::Smc::MigrationStarted::Title", "Event::Smc::MigrationStarted::Group", "Event::Smc::MigrationSucceeded", "Event::Smc::MigrationSucceeded::Title", "Event::Smc::Mig