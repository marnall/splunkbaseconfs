[ccx_sophos_central_events_inventory]
search = sourcetype="ccx:sophos:central:endpoints"
# tags = inventory system version

[ccx_sophos_central_events_malware]
search = sourcetype="ccx:sophos:central:events" (group="MALWARE" OR group="PUA" OR eventType IN("Event::Endpoint::Threat::*","Event::Endpoint::HmpaApplicationHijacking","Event::Endpoint::HmpaBehaviourPrevented","Event::Endpoint::HmpaCryptoGuard*","Event::Endpoint::HmpaMalware*","Event::Endpoint::HmpaPua*","Event::Endpoint::Core*")) NOT (eventType IN("*::Threat::*Dismissed*","*::Endpoint::Hmpa*Resolved","Event::Endpoint::*CleanNothingFound","Event::Endpoint::CoreClean","Event::Endpoint::Core*Clean","Event::Endpoint::Threat::*CleanedUp","Event::Endpoint::*CleanedUp") OR eventtype IN("ccx_sophos_malicious_traffic_detected", "ccx_sophos_outbreak_detected", "ccx_sophos_safe_browsing_detected"))
# tags = attack malware

[ccx_sophos_central_events_malware_operations]
search = sourcetype="ccx:sophos:central:events" (eventType IN("*::Threat::*Dismissed*","*::Endpoint::Hmpa*Resolved","Event::Endpoint::HmpaExploitPrevented","Event::Endpoint::CoreClean","Event::Endpoint::CoreHmpaClean","Event::Endpoint::Threat::*CleanedUp","Event::Endpoint::HmpaPuaCleanup","Event::Endpoint::*PuaClean") NOT eventtype IN("ccx_sophos_malicious_traffic_detected", "ccx_sophos_outbreak_detected", "ccx_sophos_safe_browsing_detected", "ccx_sophos_central_events_malware"))
# tags = operations malware
