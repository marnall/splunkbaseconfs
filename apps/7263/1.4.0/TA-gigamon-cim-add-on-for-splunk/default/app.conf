# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 7

[launcher]
version = 1.4.0
description = The Gigamon CIM  Add-On is a specialized extension for Splunk designed to streamline the integration and normalization of Gigamon data within the Common Information Model (CIM). This add-on facilitates the mapping of Gigamon-specific fields to the corresponding CIM data model, enhancing the overall visibility and comprehension of Gigamon-generated data within the Splunk platform.

[ui]
is_visible = 1
label = Gigamon CIM Add-on for splunk
docs_section_override = AddOns:released

[package]
id = TA-gigamon-cim-add-on-for-splunk

[triggers]
reload.addon_builder = simple
reload.ta_gigamon_cim_add_on_for_splunk_account = simple
reload.ta_gigamon_cim_add_on_for_splunk_settings = simple
reload.passwords = simple

