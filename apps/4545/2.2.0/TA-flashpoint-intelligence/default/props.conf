[flashpoint_intelligence]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
KV_MODE = json
TRUNCATE = 0
DATETIME_CONFIG = NONE
FIELDALIAS-signature = signature{} as signature
FIELDALIAS-dvc = dvc{} as dvc
FIELDALIAS-dest = dest_ip as dest

REPORT-extract_fields = extract_dest_ip_dest_port_fields
EVAL-date = strftime(timestamp,"%Y-%m-%d %H:%M:%S.%Q")

