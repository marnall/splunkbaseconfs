# `Health` endpoints.
[expose:health]
methods = POST
pattern = health

# `Enrich` endpoints.
[expose:observe-observables]
methods = POST
pattern = observe/observables

[expose:deliberate-observables]
methods = POST
pattern = deliberate/observables

[expose:refer-observables]
methods = POST
pattern = refer/observables

# `Respond` endpoints.
[expose:respond-observables]
methods = POST
pattern = respond/observables

[expose:respond-trigger]
methods = POST
pattern = respond/trigger

# Settings tab
[expose:tr_splunk_relay_settings]
pattern = tr_splunk_relay_settings
methods = POST, GET

[expose:tr_splunk_relay_settings_specified]
pattern = tr_splunk_relay_settings/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET