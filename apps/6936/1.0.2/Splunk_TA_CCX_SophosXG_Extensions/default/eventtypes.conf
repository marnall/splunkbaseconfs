[ccx_sophosxg_sandbox_alert]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:sandbox
#tags = alert

[ccx_sophosxg_event_dhcp]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event log_component="DHCP Server"

[ccx_sophosxg_event_change_alert]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event NOT eventtype IN("ccx_sophosxg_event_dhcp","ccx_sophosxg_successful_events","sophosxg_authentication","ccx_sophosxg_alert_events","ccx_sophosxg_account_logout") message IN("*added by*","*changed by*","*was updated*","*scheduled by*","*deleted by*")
#tags = alert

[ccx_sophosxg_successful_events]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event log_type="Event" AND status="Successful" AND log_component IN("Anti-Virus","IPS","Interface","ATP")

[ccx_sophosxg_alert_events]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event log_type="Event" AND log_component IN("Anti-Virus","IPS","Interface","ATP") NOT status="Successful"
#tags = alert

[ccx_sophosxg_events_appliance_alert]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event NOT eventtype IN("ccx_sophosxg_event_dhcp","ccx_sophosxg_successful_events","sophosxg_authentication","ccx_sophosxg_alert_events") NOT message IN("*added by*","*changed by*","*was updated*","*scheduled by*","*deleted by*","*logged out*") type="alert"
#tags = alert

[ccx_sophosxg_appliance_events]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event NOT eventtype IN("ccx_sophosxg_event_dhcp","ccx_sophosxg_successful_events","sophosxg_authentication","ccx_sophosxg_alert_events") NOT message IN("*added by*","*changed by*","*was updated*","*scheduled by*","*deleted by*","*logged out*") type="event"

[ccx_sophosxg_email_action_alert]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:anti_spam NOT action IN("DELIVERED","QUEUED")
#tags = alert

[ccx_sophosxg_web_traffic]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:content_filtering NOT dest="1.1.1.1"
#tags = network communicate

[ccx_sophosxg_account_logout]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event NOT eventtype IN("ccx_sophosxg_event_dhcp","ccx_sophosxg_successful_events","sophosxg_authentication","ccx_sophosxg_alert_events") message IN("*logged out*")

[sophosxg_authentication]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event log_type="Event" (log_component="Firewall Authentication" OR log_component="My Account Authentication" OR log_component="Dial-In Authentication" OR log_component="VPN Authentication" OR log_component="SSL VPN Authentication" OR log_component="GUI" OR log_component="Web Application Firewall" OR log_component="CTA" OR log_component="Appliance" OR log_component="External Authentication" OR log_component="CLI") (user="*" OR user_name="*") (reason="*" OR message IN("*logged in*","*couldn't sign in*","*failed to login*"))
#tags = authentication
