#
# Splunk app configuration file
#

[id]
name = hdxsearch
version = 1.0.6

[install]
is_configured = 0
# increment this every time there's a change to files in appserver/static/
# browser will use cached files if build number isn't incremented
build = 9

[ui]
is_visible = 1
label = Hydrolix Search
setup_view = setup_page_dashboard

[launcher]
description = Hydrolix Search
version = 1.0.6
author = splunk@hydrolix.io

[package]
id = hdxsearch
check_for_updates = true

[triggers]
reload.hdxsearch = simple
