[sample_alert]
definition = index=_internal | head 2| stats count by _raw | sendalert CreateIRFlowAlert param.realm="irflow-prod"

[show_lookups]
definition = rest /services/data/lookup-table-files | search title="irflow_*" | fields title | map search="inputlookup $title$ append=t | eval lookup_source = \"$title$\""| sort - field_splunk lookup_source | fields id field_splunk field_name lookup_source *