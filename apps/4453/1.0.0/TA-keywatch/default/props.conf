# props.conf
[key:pub]
  EVAL-app = "App for Key Watching"
  EXTRACT-src_user = /home/(?<src_user>[a-zA-Z0-9]+)\/ in source
  EXTRACT-src_user = /(?<src_user>root)/ in source
  EVAL-ids_type="host"
  EVAL-signature = "N/A Splunk Monitor Input"
  EVAL-pci_dss_Requirement = "4.1,8.2.1"
  DATETIME_CONFIG=CURRENT

[key:priv]
  EVAL-app = "App for Key Watching"
  EXTRACT-src_user = /home/(?<src_user>[a-zA-Z0-9]+)\/ in source
  EXTRACT-src_user = /(?<src_user>root)/ in source
  EVAL-ids_type="host"
  EVAL-signature = "N/A Splunk Monitor Input"
  EVAL-pci_dss_Requirement = "4.1,8.2.1"
  DATETIME_CONFIG=CURRENT
  TRANSFORMS-route_privkey = key_priv_cut