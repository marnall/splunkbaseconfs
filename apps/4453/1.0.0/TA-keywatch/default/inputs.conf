# inputs.conf 
[monitor:///home/*/*/id_rsa.pub]
  index = os
  sourcetype = key:pub
  initCrcLength = 1024

[monitor:///home/*/*/id_rsa]
  index = os
  sourcetype = key:priv
  initCrcLength = 1024

# Users often hide keys in their .tmp folders
[monitor:///home/*/.*/id_rsa.pub]
  index = os
  sourcetype = key:pub
  initCrcLength = 1024

[monitor:///home/*/.*/id_rsa]
  index= os
  sourcetype = key:priv
  initCrcLength = 1024

[monitor:///home/*/*/*_rsa]
  index = os
  sourcetype = key:priv
  initCrcLength = 1024

# Look here if you're getting FSCHANGE issues
[fschange:/home/*/.ssh/id_rsa.pub]
  index = os
  recurse = false
  interval = 1800

[fschange:/root/*/.ssh/id_rsa.pub]
  index = os
  recurse = false
  interval = 1800