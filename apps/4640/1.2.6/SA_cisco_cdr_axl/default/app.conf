# Splunk app configuration file

[ui]
is_visible = 1
label = Supporting App for AXL

[launcher]
author = Sideview, LLC
description = This is a Supporting Add-on that allows Splunk to connect with Cisco's AXL API within Cisco Unified Communications.  It is designed to be used alongside Sideview's "Cisco CDR Reporting and Analytics" App.  This Supporting Add-on provides 2 custom search commands,  "ciscoaxl" and "ciscoaxlquery".  With ciscoaxl you pass the method that you wish to call, and with cisxoaxlquery you are passing SQL directly to executeSQLQuery.

version = 1.2.6

[id]
version = 1.2.6
name = SA_cisco_cdr_axl

[install]
build = 43

[package]
id = SA_cisco_cdr_axl


[dependency:app:cisco_cdr]
requiredVersion = 7.2

[dependency:app:canary]
requiredVersion = 2.0.8

[dependency:splunk]
requiredVersion = 8.2

[triggers]
reload.sideview_license.cisco_cdr = access_endpoints /admin/conf-sideview_license

reload.ciscoaxl = simple
