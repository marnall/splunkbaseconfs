#
# Splunk app configuration file
#

[install]
is_configured = 0
state = enabled
build = 7

[ui]
is_visible = 1
label = Cisco SD-WAN App for Splunk

[launcher]
author = Cisco Systems, Inc
description = The Cisco SD-WAN App will present dashboards for different types of Cisco Logs and NetFlow Data. The app is used for visualization, analysis, and representation. The dashboard will use the data collected by the Add-on.
version = 3.1.1

[package]
id = cisco-sdwan-app
