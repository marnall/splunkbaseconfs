[setnull]
REGEX = echo\soff
DEST_KEY = queue
FORMAT = nullQueue

[get_absolute_change]
REGEX = <PercentageChange>[\+\-]?(\d+.\d+)
FORMAT = absoluteChange::$1

[get_change]
REGEX = <Change>[\+\-]?(\d+.\d+)
FORMAT = numericalChange::$1

[get_earns]
REGEX = <Earns>[\+\-]?(\d+.\d+)
FORMAT = earns::$1

[get_market_cap]
REGEX = <MktCap>(\d+.\d+)
FORMAT = marketCap::$1


