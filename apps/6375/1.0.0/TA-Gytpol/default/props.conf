[gytpol]
TIME_PREFIX = \s(end|rt)\=
TIME_FORMAT = %10s%3N
MAX_TIMESTAMP_LOOKAHEAD = 350
NO_BINARY_CHECK = 1
KV_MODE = none
SHOULD_LINEMERGE = false
REPORT-cefHeaders = cefHeaders
REPORT-cefKeys = cefKeys

EVAL-signature = cef_name
EVAL-severity = lower(cef_severity)
EVAL-user = suser
EVAL-url = request
EVAL-dvc = shost
EVAL-category = cef_signature
EVAL-dest = shost
EVAL-vendor_product = "Gytpol"
