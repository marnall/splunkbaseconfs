[expose:TA_gti_app_ioc_stream_specified]
pattern = TA_gti_app_ioc_stream/*
methods = POST, GET, DELETE

[expose:TA_gti_app_cve]
pattern = TA_gti_app_cve
methods = POST, GET

[expose:TA_gti_app_cve_specified]
pattern = TA_gti_app_cve/*
methods = POST, GET, DELETE
