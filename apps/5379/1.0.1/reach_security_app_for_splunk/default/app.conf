# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 32

[launcher]
version = 1.0.1
author = Reach Security, Inc.
description = Reach Security App for Splunk is used for search, anonymize and export specific identity and security event logs from Splunk.

[ui]
is_visible = 1
label = Reach Security App For Splunk
docs_section_override = AddOns:released

[package]
id = reach_security_app_for_splunk

[triggers]
reload.addon_builder = simple
reload.reach_security_app_for_splunk_account = simple
reload.reach_security_app_for_splunk_settings = simple
reload.passwords = simple