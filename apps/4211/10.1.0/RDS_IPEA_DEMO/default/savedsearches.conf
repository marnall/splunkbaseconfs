[eee_history_summary]
action.email.useNSSubject = 1
action.summary_index = 1
action.summary_index._name = eee_summary
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = 0
cron_schedule = 30 */1 * * *
dispatch.earliest_time = -1h@h
dispatch.latest_time = @h
display.events.fields = ["host","source","sourcetype","indextime"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
display.visualizations.type = singlevalue
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = RDS_Analysis
request.ui_dispatch_view = search
schedule_window = 2
search = tag="time_series" OR tag="process_state"\
| eval value=if(tag="time_series" AND isnotnull(raw_value),value,null())\
| bin _time span=1s\
| makecontinuous _time span=1s\
| sort limit=0 _time\
| filldown new_state new_state_prod value equipment_id\
| stats latest(new_state) as state latest(new_state_prod) as prod avg(value) as energy by _time enterprise_id facility_id shop_id cell_id station_id equipment_id unit measure\
| streamstats latest(prod) as prod latest(state) as state by enterprise_id facility_id shop_id cell_id station_id equipment_id unit measure\
\
| eval begin_state_and_prod=[search tag=process_state [stats count | fields - count | addinfo | eval latest=info_min_time | fields latest | eval earliest=latest-24*60*60 | format  "(" "(" "" ")" "OR" ")"] new_state_prod=* | stats latest(new_state_prod) as latest_new_state_prod,  latest(new_state) as latest_new_state by equipment_id station_id cell_id shop_id facility_id enterprise_id | eval search=replace(enterprise_id,"\"","\\\"")+","+replace(facility_id,"\"","\\\"")+","+replace(shop_id,"\"","\\\"")+","+replace(cell_id,"\"","\\\"")+","+replace(station_id,"\"","\\\"")+","+replace(equipment_id,"\"","\\\"")+","+latest_new_state_prod+","+replace(latest_new_state,"\"","\\\"") | table search | mvcombine delim=";" search | nomv search | eval search="\""+search+"\"" | append [makeresults | eval search=""] | head 1 | format]\
\
| eval begin_state_and_prod=replace(begin_state_and_prod, "\""," ;Dummy,Dummy;")\
\
| eval prod=coalesce(prod, replace(begin_state_and_prod,"(?:(?:.*;|^)"+replace(enterprise_id,"\"","\\\"")+","+replace(facility_id,"\"","\\\"")+","+replace(shop_id,"\"","\\\"")+","+replace(cell_id,"\"","\\\"")+","+replace(station_id,"\"","\\\"")+","+replace(equipment_id,"\"","\\\"")+",([^,]*),([^;]*)(?:;.*|$)|.*)" ,"\1") ) \
| eval state=coalesce(state, replace(begin_state_and_prod,"(?:(?:.*;|^)"+replace(enterprise_id,"\"","\\\"")+","+replace(facility_id,"\"","\\\"")+","+replace(shop_id,"\"","\\\"")+","+replace(cell_id,"\"","\\\"")+","+replace(station_id,"\"","\\\"")+","+replace(equipment_id,"\"","\\\"")+",([^,]*),([^;]*)(?:;.*|$)|.*)" ,"\2") )\
\
| eval prod_energy=prod*energy \
| fields _time energy prod_energy prod state equipment_id enterprise_id facility_id shop_id cell_id station_id unit measure

[energy_base_search]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
description = Base Search für Control-Dashboard
dispatch.earliest_time = 0
dispatchAs = user
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.chartHeight = 364
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = RDS_Analysis
request.ui_dispatch_view = search
search = (tag="time_series" AND measure="$measure$") OR tag="process_state" equipment_id="$equipment_id$" station_id="$station_id$" cell_id="$cell_id$" shop_id="$shop_id$" facility_id="$facility_id$" enterprise_id="$enterprise_id$"\
| eval value=if(tag="time_series" AND isnotnull(raw_value),value,null())\
| bin _time span=1s\
| makecontinuous _time span=1s\
| sort limit=0 _time\
| filldown new_state new_state_prod value equipment_id\
| stats latest(new_state) as state latest(new_state_prod) as prod avg(value) as energy by _time equipment_id\
\
\
| streamstats latest(prod) as prod latest(state) as state by equipment_id\
| eval prod_energy=prod*energy \
| table _time energy prod_energy prod state equipment_id\
\
| eval begin_state_and_prod=[search tag=process_state equipment_id="$equipment_id$" station_id="$station_id$" cell_id="$cell_id$" shop_id="$shop_id$" facility_id="$facility_id$" enterprise_id="$enterprise_id$" earliest=0 latest=$start_time$ new_state_prod=* | sort limit=0 - _time | append [makeresults] | head 1 | eval search=coalesce("\""+new_state_prod+","+replace(new_state,"\"","\\\"")+"\"","\"0,unknown\"") | table search]\
| eval prod=coalesce(prod,replace(begin_state_and_prod,"^(\d+),.*$","\1"))\
| eval state=coalesce(state,replace(begin_state_and_prod,"^\d+,(.*$)","\1"))\
| eval prod_energy=prod*energy \
| table _time energy prod_energy prod state equipment_id

[Alerts_Prototype]
action.email.useNSSubject = 1
alert.track = 0
display.general.enablePreview = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = RDS_Analysis
request.ui_dispatch_view = search
search = | inputlookup limits\
`comment("Only get those limits where an alert and mail-adress is defined")`\
| search alert_on=* AND mail_to=* AND kpi_id!=EC\
`comment("Combine Limits with main data definitions of kpis")`\
| lookup kpis kpi_id as kpi_id\
\
`comment("Create filter statement based on limit_type")`\
| eval filter=if(limit_is_upper_or_lower=="lower", "| where ".kpi_id." <", " | where ".kpi_id." >")\
| eval filter=if(alert_on=="severe_limit", filter." ".severe_limit, filter." ".warning_limit)\
`comment("Define Search Interval for KPIs")`\
| eval earliest=if(minimal_aggregation_window=="1d", "-1d@d", \
if(minimal_aggregation_window=="1h","-1h@h", null()))\
| eval latest=if(minimal_aggregation_window=="1d", "@d", \
if(minimal_aggregation_window=="1h","@h", null()))\
\
`comment("Combine Alert Search and Replace Tokens")`\
| eval search=search." earliest=".earliest." latest=".latest." | stats ".aggregation." by equipment_id station_id cell_id shop_id facility_id enterprise_id measure | eval \"".kpi_id."\"=".kpi_evaluation." ".filter." | rename ".kpi_id." as \"".kpi_name."\""\
| eval search=replace(search,"\$equipment_id\$", equipment_id)\
| eval search=replace(search,"\$station_id\$", station_id)\
| eval search=replace(search,"\$cell_id\$", cell_id)\
| eval search=replace(search,"\$shop_id\$", shop_id)\
| eval search=replace(search,"\$facility_id\$", facility_id)\
| eval search=replace(search,"\$enterprise_id\$", enterprise_id)\
| eval search=replace(search,"\$measure\$", measure)\
| table search earliest latest mail_to equipment_id station_id cell_id shop_id facility_id enterprise_id measure\
`comment("Create on subsearch foreach alert-relevant search from the created table")`\
`comment("| map search="search [| makeresults | eval search=\"$search$\" | table search]"  ")`

