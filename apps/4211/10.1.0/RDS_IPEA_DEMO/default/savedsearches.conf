[energy_process_states]
action.email.useNSSubject = 1
alert.track = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
display.visualizations.type = singlevalue
request.ui_dispatch_app = RDS_Analysis
request.ui_dispatch_view = search
search = (tag="time_series" AND measure="$measure$") OR (tag="process_step" AND process_id="$process_id$" AND activity_id="$activity_id$" AND task_id="$task_id$") equipment_id="$equipment_id$" station_id="$station_id$" cell_id="$cell_id$" shop_id="$shop_id$" facility_id="$facility_id$" enterprise_id="$enterprise_id$"\
| eval value=if(tag="time_series" AND isnotnull(raw_value),value,null())\
| bin _time span=1s \
| table _time equipment_id product_instance_id batch_id process_id activity_id task_id task_instance_id task_instance_start task_instance_duration task_instance_end value unit station_id cell_id shop_id facility_id enterprise_id\
| sort _time value limit=0\
| streamstats max(task_instance_end) as time_prod last(unit) as unit  by equipment_id \
| eval prod_value=time_prod\
| eval prod_task_id=if(_time<=prod_value, task_id, null())\
| eval prod_activity_id=if(_time<=prod_value,activity_id,null())\
| eval prod_process_id=if(_time<=prod_value,process_id,null())\
| eval prod_task_id_active=if(_time<=prod_value, 1, null())\
| eval prod_value=if(_time<=prod_value,value,null())\
| streamstats last(prod_task_id) as prod_task_id last(prod_activity_id) as prod_activity_id last(prod_process_id) as prod_process_id by equipment_id\
| eval prod_task_id=if(isnotnull(prod_value), prod_task_id, null())\
| eval prod_activity_id=if(isnotnull(prod_value), prod_activity_id, null())\
| eval prod_process_id=if(isnotnull(prod_value), prod_process_id, null())\
| eval prod_task_id_active=if(isnotnull(prod_value), prod_task_id_active, null())\
| streamstats count(prod_task_id_active) as process_second by time_prod\
| where prod_task_id_active=1\
| rename prod_task_id as task_id, prod_activity_id as activity_id, prod_process_id as process_id\
| lookup process_step_class_definitions class_id as task_id OUTPUT class_name \
| stats avg(value) as avg_value last(unit) as unit by equipment_id station_id cell_id shop_id facility_id enterprise_id process_second task_id class_name activity_id process_id\
| sort limit=0 process_second\
| table process_second equipment_id avg_value unit  task_id class_name activity_id process_id station_id cell_id shop_id facility_id enterprise_id

