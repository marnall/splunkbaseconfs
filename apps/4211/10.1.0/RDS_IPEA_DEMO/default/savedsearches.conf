[comparison_energy_base_search]
action.email.useNSSubject = 1
alert.track = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = RDS_Analysis
request.ui_dispatch_view = search
search = (tag="time_series" AND measure="$measure$") OR (tag="process_state" AND $comparison_statement$)\
| search [search tag="time_series" measure="$measure$" AND $comparison_statement$ | dedup equipment_id | table equipment_id  | return 100 equipment_id]\
| eval value=if(tag="time_series" AND isnotnull(raw_value),value,null())\
| bin _time span=1s\
| makecontinuous _time span=1s\
| sort limit=0 _time\
| filldown new_state new_state_prod value equipment_id station_id cell_id shop_id facility_id enterprise_id \
| stats latest(new_state) as state latest(new_state_prod) as prod avg(value) as energy by _time equipment_id station_id cell_id shop_id facility_id enterprise_id \
\
\
| streamstats latest(prod) as prod latest(state) as state by equipment_id station_id cell_id shop_id facility_id enterprise_id \
| eval prod_energy=prod*energy \
| table _time energy prod_energy prod state equipment_id station_id cell_id shop_id facility_id enterprise_id measure unit aggregation\
| append [search tag=process_state $comparison_statement$ earliest=0 latest=$start_time$ new_state_prod=* | table _time equipment_id new_state new_state_prod station_id cell_id shop_id facility_id enterprise_id \
| stats latest(_time) as _time latest(new_state) as new_state latest(new_state_prod) as new_state_prod by equipment_id station_id cell_id shop_id facility_id enterprise_id\
| rename new_state_prod as prod, new_state as state]\
| sort limit=0 _time \
| streamstats last(prod) as prod last(state) as state by equipment_id station_id cell_id shop_id facility_id enterprise_id \
| search energy=*\
| eval prod_energy=prod*energy \
| table _time energy prod_energy prod state equipment_id station_id cell_id shop_id facility_id enterprise_id

[eee_kpi_energy_consumption_template]
action.email.useNSSubject = 1
alert.track = 0
description = Template writing this KPI into the eee_kpi_monitoring index
dispatch.earliest_time = -1d@d
dispatch.latest_time = @d
dispatchAs = user
display.general.enablePreview = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = RDS_Analysis
request.ui_dispatch_view = search
search = `comment("Consider all time series and process step events that match the corresponding data model")`\
(tag="time_series" raw_value=*) OR (tag="process_step" equipment_id=* task_id=* task_instance_id=* ) \
\
| eval value=if(tag="time_series" AND isnotnull(raw_value),value,null())\
| eval task_instance_start=coalesce(task_instance_start,task_instance_end-task_instance_duration), task_instance_end=coalesce(task_instance_end,task_instance_start+task_instance_duration)\
| bin _time span=1s \
| table _time equipment_id station_id cell_id shop_id facility_id enterprise_id product_instance_id batch_id process_id activity_id task_instance_end measure value unit aggregation\
\
`comment("Assign the time series to the current task at the equipment")`\
| reverse\
| sort _time value limit=0 \
| streamstats \
    max(task_instance_end) as prod_value \
    last(unit) as unit \
    last(product_instance_id) as product_instance_id \
    last(activity_id) as activity_id \
  by equipment_id station_id cell_id shop_id facility_id enterprise_id\
| eval prod_value=if(_time<=prod_value,value,null()) \
\
`comment("build the statistics for the searched time period")`\
| stats \
    sum(prod_value) as sum_productive_energy\
    count(prod_value) as productive_seconds\
    last(unit) as unit\
    last(aggregation) as aggregation\
  by equipment_id station_id cell_id shop_id facility_id enterprise_id measure

