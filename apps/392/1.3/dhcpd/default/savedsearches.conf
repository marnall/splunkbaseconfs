description = Shows the top 10 mac address vendors in realtime
dispatch.earliest_time = rt-5m
dispatch.latest_time = rt
displayview = charting
search = eventtype=dhcpd_event src_mac_prefix=* | top limit=10 src_mac_vendor showperc=f

