[dhcpd_report_leases_issued_1d]
description = Shows dhcp leases issued per hour in the past one day
dispatch.earliest_time = -1d
displayview = charting
request.ui_dispatch_view = charting
search = eventtype="dhcpd_event" eventtype="dhcpd_lease_commit"| timechart span=1h sum(lease_count) as count
vsid = ga8ugaqj

[dhcpd_search_events_without_dhcp_message_1h]
description = Shows events without dhcp messages (e.g. DHCPACK, DHCPOFFER, etc) in the past hour
dispatch.earliest_time = -1h
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = eventtype=dhcpd_event NOT dhcp_message=*
vsid = ga8u804b

[dhcpd_search_dynamic-static_lease_collisions_1h]
description = Shows multiline dynamic-static lease collisions in the past one hour
dispatch.earliest_time = -1h
displayview = flashtimeline
request.ui_dispatch_view = flashtimeline
search = eventtype=dhcpd_dynamic_and_static_exist* | transaction startswith="eventtype=dhcpd_dynamic_and_static_exist_line1" endswith="eventtype=dhcpd_dynamic_and_static_exist_line3"
vsid = ga8v5e6d

[dhcpd_rtsearch_src_ip_transactions_5m]
description = Shows a real-time search of dhcp transactions grouped by src_ip in the past 5 minutes
dispatch.earliest_time = rt-5m
dispatch.latest_time = rt
displayview = flashtimeline
is_visible = 1
search = eventtype=dhcpd_event | transaction src_ip
vsid = *:oigumg85

[dhcpd_alert_new_mac_address_15m]
action.email = 1
action.email.sendresults = 1
action.email.to = example@example.com 
counttype = number of events
cron_schedule = */15 * * * *
description = Alerts on mac addresses seen in the last 15 minutes that were not in the dhcpd_mac-hostname lookup table
dispatch.earliest_time = -15m
displayview = charting
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_view = charting
search = eventtype=dhcpd_event src_mac=* src_host=* dhcp_message=* earliest=-15m | stats count by src_mac,src_host | fields src_mac,src_host | append [inputlookup dhcpd_mac-hostname | eval src_mac_seen="true"] | stats count, values(src_mac_seen) as src_mac_seen by src_host,src_mac | search NOT src_mac_seen=* | rex field=src_mac "(?<src_mac_prefix>[^\:]+\:[^\:]+:[^\:]+)" | lookup dhcpd_mac-vendorname src_mac_prefix OUTPUT src_mac_vendor | fields src_host, src_mac, src_mac_vendor
vsid = gabb1mcp

[dhcpd_report_top_dhcp_messages_4h]
cron_schedule = */5 * * * *
description = Show the top dhcp messages (e.g. DHCPACK, DHCPOFFER, etc) in the past four hours
dispatch.earliest_time = -4h
displayview = charting
enableSched = 1
search = eventtype=dhcpd_event | top dhcp_message

[_dhcpd_generate_mac-host_lookup]
cron_schedule = 0/15 * * * *
description = Search that builds the dhcpd_mac-hostname lookup
dispatch.earliest_time = -15m
dispatch.latest_time = now
displayview = flashtimeline
enableSched = 1
request.ui_dispatch_view = flashtimeline
search = src_mac=* src_host=* dhcp_message=* earliest=-1h | stats count by src_mac,src_host | fields src_mac,src_host | append [inputlookup dhcpd_mac-hostname] | stats count by src_mac,src_host | fields src_mac,src_host | outputlookup dhcpd_mac-hostname
vsid = ga8wit0u

[dhcpd_report_top_10_mac_vendors_1h]
cron_schedule = */5 * * * *
description = Shows the top 10 mac address vendors in the past hour
dispatch.earliest_time = -1h
displayview = charting
enableSched = 1
request.ui_dispatch_view = charting
search = eventtype=dhcpd_event src_mac_prefix=* | top limit=10 src_mac_vendor showperc=f
vsid = gab9ta08

[dhcpd_report_rare_mac_vendors_1h]
cron_schedule = */5 * * * *
description = Shows the 10 rarest mac address vendors in the past hour
dispatch.earliest_time = -1h
displayview = charting
enableSched = 1
search = eventtype=dhcpd_event src_mac_prefix=* | rare limit=10 src_mac_vendor showperc=f

[dhcpd_report_eventtypes_4h]
cron_schedule = */5 * * * *
description = Shows dhcpd eventtypes in the past 4 hours
dispatch.earliest_time = -4h
displayview = charting
enableSched = 1
request.ui_dispatch_view = charting
search = eventtype=dhcpd_event | mvexpand eventtype | search eventtype=dhcpd_* eventtype!=dhcpd_event | timechart count by eventtype useother=f usenull=f
vsid = gabbs1xb

[dhcpd_report_eventtypes_rt]
cron_schedule = */5 * * * *
description = Shows dhcpd eventtypes in real time
dispatch.earliest_time = rt-5m
dispatch.latest_time = rt
displayview = charting
search = eventtype=dhcpd_event | mvexpand eventtype | search eventtype=dhcpd_* eventtype!=dhcpd_event | timechart count by eventtype useother=f usenull=f

