[PlaybookExecution]
display_location = field_menu
fields = SonarAction:*
label = $@field_name$
type = link
link.method = post
link.target = blank
link.uri = https://$!lmrm__sonar_host$/explore/app/kibana#/discover?_a=(index:'$lmrm__index_id$')&actionInvoke=$@field_value$
link.postargs.1.key = lmrm__proxy_method
link.postargs.1.value = GET
link.postargs.2.key = lmrm__transaction_id
link.postargs.2.value = $lmrm__transaction_id$