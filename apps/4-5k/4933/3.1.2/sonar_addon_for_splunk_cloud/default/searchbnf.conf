[sonar-command]
syntax = sonar 
shortdesc = This command queries sonar database data.
description = This command queries sonar database data. You can put index-pattern, index-alias or the string concatenation of db, dash and collection.
example1 = | sonar index="sonargd-session" timestamp="Session Start"
example2 = | sonar index="sonargd-session" limit=2
example3 = | sonar index="<database>-<collection>"
usage = public
