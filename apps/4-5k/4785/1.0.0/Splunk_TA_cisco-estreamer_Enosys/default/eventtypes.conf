[estreamer-ids-ips-event]
search = sourcetype=cisco:estreamer:data (rec_type_simple=EVENT OR rec_type_simple="IPS EVENT")

[estreamer-packet]
search = sourcetype=cisco:estreamer:data rec_type_simple=PACKET

[estreamer-file-malware-attack]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT") NOT signature="Unknown" NOT signature="Clean" NOT sha256=""

[estreamer-file-malware-operations]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT") (signature="Unknown" OR signature="Clean") NOT sha256=""

[estreamer-scan-event-operations]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT") sha256="" NOT signature=""

[estreamer-scan-event]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT") sha256="" signature=""

[estreamer-flow]
search = sourcetype=cisco:estreamer:data rec_type_simple=RNA event_type=1003

[estreamer-si-event]
search = sourcetype=cisco:estreamer:data rec_type_simple=RNA event_type=1003 sec_intel_event=Yes
