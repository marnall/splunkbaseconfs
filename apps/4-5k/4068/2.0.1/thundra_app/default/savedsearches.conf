[Error Alert]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = Triggers an alert when an error occurs with Lambda functions. Doesn't create another alert for 10 minutes.
dispatch.earliest_time = -5m
dispatch.latest_time = now
display.visualizations.charting.chart = bar
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = thundra
request.ui_dispatch_view = search
search = sourcetype="invocation" erroneous="true"

[Cold Start Alert]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */10 * * * *
description = Triggers an alert when 5 cold start occurs in 10 minutes with Lambda functions. Doesn't create another alert for 10 minutes.
dispatch.earliest_time = -5m
dispatch.latest_time = now
display.visualizations.charting.chart = bar
enableSched = 1
quantity = 4
relation = greater than
request.ui_dispatch_app = thundra
request.ui_dispatch_view = search
search = sourcetype="invocation" coldStart="true"

[Estimated Bill Alert]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = Triggers an alert when the estimated bill reaches to $1 in last 1 hours
dispatch.earliest_time = -5m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = bar
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = thundra
request.ui_dispatch_view = search
search = sourcetype="invocation" | stats sum(billedCost) as "Billed Cost"| search "Billed Cost" > 0.07

