[armis:device]
TIME_PREFIX=\"_time\":
TIME_FORMAT=%s%3N
TRUNCATE = 9999999
FIELDALIAS-serial = serialNumber{}.value as serial
FIELDALIAS-version = operatingSystemVersion as version
# OT mapping
EVAL-ip = coalesce(ipAddress,ipv6)
FIELDALIAS-id = id as asset_id
EVAL-mac = coalesce(macAddress,ipv6)
FIELDALIAS-os = operatingSystem as os
EVAL-asset_version = coalesce(firmwareVersion,operatingSystemVersion,operatingSystem)
FIELDALIAS-type = type as asset_type
#FIELDALIAS-category = category as classification
FIELDALIAS-model = model as asset_model
FIELDALIAS-manufacturer = manufacturer as asset_vendor
FIELDALIAS-site.name = site.name as location
FIELDALIAS-name = name as nt_host
EVAL-priority = unknown

[armis:alert]
EVAL-app = "Armis Splunk App"
FIELDALIAS-vendor_type = type as vendor_type
FIELDALIAS-id = id as alert_id
FIELDALIAS-title = title as alert_title
FIELDALIAS-severity_id = riskLevel as severity_id
FIELDALIAS-signature = policy.title as signature
FIELDALIAS-signature_id = policy.id as signature_id 
EVAL-severity = lower(mvindex(split('policy.actionType',"_"),1))
EVAL-description = description." ".content
EVAL-type = "alert"
EVAL-src = coalesce(src_name, src_ip)
EVAL-dest = coalesce(dest_name, dest_ip)
FIELDALIAS-relatedDevices{}.category = relatedDevices{}.category as dvc_category
FIELDALIAS-relatedDevices{}.name = relatedDevices{}.name as dvc
FIELDALIAS-relatedDevices{}.type = relatedDevices{}.type as device_type
FIELDALIAS-relatedDevices{}.site.location = relatedDevices{}.site.location as device_location
FIELDALIAS-relatedDevices{}.id = relatedDevices{}.id as device_id
FIELDALIAS-src_category = sourceEndpoints{}.category as src_category
FIELDALIAS-src_type = sourceEndpoints{}.type as src_type
FIELDALIAS-src_name = sourceEndpoints{}.name as src_name
FIELDALIAS-src_ip = sourceEndpoints{}.ip as src_ip
FIELDALIAS-dest_category = destinationEndpoints{}.category as dest_category
FIELDALIAS-dest_type = destinationEndpoints{}.type as dest_type
FIELDALIAS-dest_name = destinationEndpoints{}.name as dest_name
FIELDALIAS-dest_ip = destinationEndpoints{}.ip as dest_ip

[armis:vuln:match]
DATETIME_CONFIG = NONE
TRUNCATE = 9999999
KV_MODE = json

[armis:api:alerts]
MAX_TIMESTAMP_LOOKAHEAD = 32
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%f+%z
TIME_PREFIX = "time":\s"
TRUNCATE = 9999999
TZ = UTC
FIELDALIAS-alert_id = alertId as alert_id
EVAL-severity = lower(severity)
EVAL-app = "Armis Splunk App"
FIELDALIAS-id = alertId as id
FIELDALIAS-signature = policyTitle as signature
FIELDALIAS-signature_id = policyId as signature_id
FIELDALIAS-alert_title = title as alert_title
FIELDALIAS-vendor_type = type as vendor_type
FIELDALIAS-src = sourceEndpoints{}.name as src
FIELDALIAS-dest = destinationEndpoints{}.name as dest
EVAL-type = "alert"
FIELDALIAS-src_ip = sourceEndpoints{}.ip{} as src_ip
FIELDALIAS-dest_ip = destinationEndpoints{}.ip{} as dest_ip
FIELDALIAS-src_mac = sourceEndpoints{}.macAddress{} as src_mac
FIELDALIAS-dest_mac = destinationEndpoints{}.macAddress{} as dest_mac