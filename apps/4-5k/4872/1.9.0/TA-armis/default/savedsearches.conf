[ARMIS - Device data for Enrichment]
cron_schedule = 0 * * * *
description = To populate the lookup table with armis device data for Enrichment purpose.
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
run_on_startup = 1
disabled = true
search = `armis_index` sourcetype=armis:device \
| dedup macAddress \
| table host asset_model asset_type asset_vendor asset_version category ip ipv6 mac name serial site.name operatingSystem operatingSystemVersion manufacturer firstSeen lastSeen macAddress \
| rename host as armis_asset_host asset_model as armis_asset_model asset_type as armis_asset_type asset_vendor as armis_asset_vendor asset_version as armis_asset_version category as armis_asset_category ip as armis_asset_ip ipv6 as armis_asset_ipv6 mac as armis_asset_mac_address name as armis_asset_name serial as armis_asset_serial_number operatingSystem as armis_asset_OS_name operatingSystemVersion as armis_asset_OS_version manufacturer as armis_asset_brand firstSeen as armis_asset_first_seen lastSeen as armis_asset_last_seen site.name as armis_asset_site\
| outputlookup "armis_enrichment_devices_lookup" key_field=macAddress

[ARMIS - Device data for Enrichment for ES users]
cron_schedule = 0 * * * *
description = To populate the lookup table with armis device data for Enrichment purpose for ES Users.
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
run_on_startup = 1
disabled = true
search = `armis_index` sourcetype=armis:device \
| dedup macAddress \
| eval mac = lower(mac) \
| table host nt_host category ip mac macAddress \
| rename host as armis_asset_es_host \
| outputlookup "armis_enrichment_devices_lookup_for_es" key_field=macAddress

[ARMIS - Asset Lookup Gen]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 0 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
enableSched = 1
search = `armis_index` sourcetype=armis:device \
| fillnull priority value=unknown \
| fillnull value=NULL \
| dedup asset_id \
| table asset_id,asset_model,asset_status,asset_system,asset_tag,asset_type,asset_vendor,bunit,category,city,classification,country,description,dns,exposure,ip,is_expected,lat,location,long,mac,nt_host,owner,pci_domain,priority,requires_av,should_timesync,should_update,site_id,vlan,zone \
| outputlookup armis_asset_list.csv

[Armis - Armis Notable Events for Alerts - Rule]
action.correlationsearch.annotations = {}
action.correlationsearch.enabled = 1
action.correlationsearch.label = Armis Notable Events for Alerts
action.customsearchbuilder.enabled = false
action.customsearchbuilder.spec = {}
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable = 1
action.notable.param.rule_description = Generate Notable Events for alerts from Armis syslog alerts data in Splunk
action.notable.param.rule_title = Armis Notable Events - Alert ID : $alert_id$
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param._risk = [{"risk_object_field":"","risk_object_type":"","risk_score":1}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.suppress = 0
alert.track = 1
description = Search to Generate Notable Events for alerts from Armis syslog alerts data in Splunk
counttype = number of events
cron_schedule = */30 * * * *
dispatch.earliest_time = -30m
dispatch.latest_time = now
dispatch.rt_backfill = 1
quantity = 0
relation = greater than
enableSched = 1
request.ui_dispatch_app = TA-armis
realtime_schedule = 0
search = index="main" sourcetype="armis:alert" | eval description=title | table alert_id ,severity, description, dvc_category, dvc_ip, dvc, risk_score