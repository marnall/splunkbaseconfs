[armis_alerts]
index = default
start_by_shell = false
python.version = python3
sourcetype = armis_alert_enrichment
interval = 3600
armis_index = main

[armis_api_alerts]
index = default
start_by_shell = false
python.version = python3
sourcetype = armis_api_alert
interval = 3600
lookback_days = 90

[armis_device]
index = default
start_by_shell = false
python.version = python3
sourcetype = armis_devices
interval = 3600
aql_query = in:devices visibility:Full timeFrame:"30 days"
device_fields = tags,biosType,biosVendor,biosVersion,boundaries,category,firmwareVersion,firstSeen,id,imei,ipAddress,ipv6,lastSeen,macAddress,manufacturer,meid,model,name,operatingSystem,operatingSystemVersion,osBuildNumber,osEdition,osKernelType,osKernelVersion,osLastLoginTime,osServicePack,osTcpIpStack,phoneNumber,publicIp,riskLevel,serialNumber,site,type,udid,customProperties
visibility_device = True
inventory = False

[armis_vulnerability]
index = default
interval = 86400
index_vuln_match_data = False
vulnerabilities_chunk = 10
start_by_shell = false
python.version = python3
sourcetype = armis_cve