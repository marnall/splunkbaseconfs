[jwt-command]
syntax      = jwt field=<string> (secret=<secret>)? (wrap=(True|False))? (debug=(True|False))?
shortdesc   = Decode JSON Web Tokens (JWT) from HTTP Payloads
description = Quickly and easily decode and parse encoded JWT tokens found in Splunk events. Token metadata is decoded and made available as standard JSON in a `jwt` added to each event, and can easily be passed through to spath for additional query needs.\i\\
              "field"   - Specify the field containing the Base64 encoded JWT token. Will automatically detect standard HTTP Authorization header containing JWT bearer token if present.\i\\
              "secret"  - If specified, will validate the JWT signature against the provided secret (HMAC SHA-256 only). \i\\
              "filter"  - Optionally filter results to only include events which contain the specified field (default: False). \i\\
              "wrap"    - Returned JSON structure will be wrapped with a "jwt" object to automatically export fully-qualified properties (e.g. jwt.header.alg) when passed through spath with no options (default: True).\i\\
              "debug"   - Set to True to enable errors when decoding events (default: False).\i\\

comment1 = By default, providing a field containing the JWT token and passing through to spath will result in fields being created for each property in the JWT token.
example1 = | jwt field="request_headers" | spath input=jwt

comment2 = Advanced use cases can be easily accomplished with the additional options provided. 
example2 = | jwt field="request_headers" secret="myTokenSecret" wrap=false | spath input=jwt path=signature | search signature="Invalid"

