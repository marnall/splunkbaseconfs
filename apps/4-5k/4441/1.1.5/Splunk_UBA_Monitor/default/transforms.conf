[uba_setnull]
REGEX = .
DEST_KEY = queue
FORMAT = nullQueue

[uba_setparsing]
REGEX = ^[^,\n]*(?:,|.)\d\d\d(?: |;)(?:WARN|ERROR|- error)
DEST_KEY = queue
FORMAT = indexQueue

[module_name]
filename = module_name.csv

[indicator_desc]
filename = indicator_desc.csv

#replace host only for external instances
[uba_telemetry_hostoverride]
DEST_KEY = MetaData:Host
REGEX = (?:\"internal\":\s?false).*\"deploymentID\":\s?\"([a-zA-Z0-9-_]+)\"|\"deploymentID\":\s?\"([a-zA-Z0-9-_]+)\".*(?:\"internal\":\s?false)
FORMAT = host::$1$2

[uba_telemetry_datascience]
REGEX = \"internal\":\s?true
DEST_KEY=_TCP_ROUTING
FORMAT=datascience-group

[uba_telemetry_pt]
REGEX = \"internal\":\s?false
DEST_KEY=_TCP_ROUTING
FORMAT=pt-group