[monitor:///var/vcap/sys/log/caspida/]
whitelist=\.log$
disabled = true
sourcetype = uba:log
blacklist = /CaspidaResourcesMonitor\.log$|splunk_app
ignoreOlderThan = 14d
index = _internal

[monitor:///var/vcap/sys/log/caspida/monitor/splunk_app/]
disabled = true
sourcetype = uba:indicator
index = _internal

[script://./bin/uba_version.sh]
disabled = true
interval = 3600
source = uba:version
sourcetype = uba:version
index = _internal

[script://./bin/uba_eps.sh]
disabled = true
interval = 300
source = uba:eps
sourcetype = uba:eps
index = _internal

[script://./bin/uba_count.sh]
disabled = true
interval = 3600
source = uba:count
sourcetype = uba:count
index = _internal

[script://./bin/uba_lsb.sh]
disabled = true
interval = 3600
source = uba:lsb
sourcetype = uba:lsb
index = _internal

[script://./bin/uba_db.sh]
disabled = true
interval = 86400
sourcetype = uba:db
index = _internal

# UBA telemetry
[monitor:///var/log/caspida/telemetry/events/telemetry.data.out]
disabled = true
source = uba:telemetry
sourcetype = uba:telemetry
index = uba_telemetry


