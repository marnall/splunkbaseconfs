[uba:log]
BREAK_ONLY_BEFORE = \d\d\d\d-\d\d-\d\d \d\d:\d\d:\d\d(.|,)\d\d\d
DATETIME_CONFIG =
NO_BINARY_CHECK = true
TRANSFORMS-set= uba_setnull,uba_setparsing
EXTRACT-level = ^[^,\n]*(,|.)\d\d\d( |;| - )(?P<level>\w+)

[uba:indicator]
KV_MODE = json
TIMESTAMP_FIELDS = pollTime,time
TIME_FORMAT = %s
SHOULD_LINEMERGE = false

[uba:db]
KV_MODE = json
SHOULD_LINEMERGE = false
TIMESTAMP_FIELDS = lastmodified,time
TIME_FORMAT = %Y-%m-%dT%H:%M:%S

[uba:version]
KV_MODE = json
BREAK_ONLY_BEFORE = dummyVal
DATETIME_CONFIG = CURRENT

[uba:eps]
DATETIME_CONFIG = CURRENT
SHOULD_LINEMERGE=false
EXTRACT-eps=(?P<eps>.+)

[uba:count]
DATETIME_CONFIG = CURRENT
SHOULD_LINEMERGE=false

[uba:lsb]
DATETIME_CONFIG = CURRENT
SHOULD_LINEMERGE=false
EXTRACT-key=^(?P<key>.+):\t(?P<value>.+)

[interfaces]
KV_MODE=multi

[vmstat]
KV_MODE=multi

[df]
KV_MODE = multi

[cpu]
KV_MODE = multi

[uba:cpu]
SHOULD_LINEMERGE=false
LINE_BREAKER=(^$|[\r\n]+[\r\n]+)
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT
KV_MODE = multi

[uba:interfaces]
SHOULD_LINEMERGE=false
LINE_BREAKER=^((?!))$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT
KV_MODE=multi

[uba:vmstat]
LINE_BREAKER=(^$|[\r\n]+[\r\n]+)
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT
KV_MODE=multi

[uba:df]
SHOULD_LINEMERGE=false
LINE_BREAKER=(^$|[\r\n]+[\r\n]+)
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT
KV_MODE = multi

[uba:iostat]
LINE_BREAKER = (^$|[\r\n]+[\r\n]+)
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT
KV_MODE = multi

[uba:bandwidth]
SHOULD_LINEMERGE=false
LINE_BREAKER=^((?!))$
TRUNCATE=1000000
DATETIME_CONFIG = CURRENT
KV_MODE = multi

[uba:telemetry]
SHOULD_LINEMERGE=false
TIME_PREFIX=\"timestamp\":
BREAK_ONLY_BEFORE=\{
TRUNCATE=1000000
TRANSFORMS-datascience= uba_telemetry_datascience,uba_telemetry_pt
TRANSFORMS-hostoverride = uba_telemetry_hostoverride
