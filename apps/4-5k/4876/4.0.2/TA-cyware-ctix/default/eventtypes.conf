
[Test_saved_result]
search = (sourcetype=ctix)

# ========================================
# CIM Data Model Eventtypes by Indicator Type
# ========================================

# File indicators - Malware Data Model
[ctix-malware-file]
search = (sourcetype=ctix) AND (indicator_type="file" OR indicator_type="MD5" OR indicator_type="SHA-1" OR indicator_type="SHA-224" OR indicator_type="SHA-256" OR indicator_type="SHA-384" OR indicator_type="SHA-512" OR indicator_type="SHA3-224" OR indicator_type="SHA3-256" OR indicator_type="SHA3-384" OR indicator_type="SHA3-512" OR indicator_type="SSDEEP")

# Artifact and YARA - Malware Data Model
[ctix-malware-artifact]
search = (sourcetype=ctix) AND (indicator_type="artifact" OR indicator_type="yara")

# IPv4 indicators - Network Traffic & IDS Data Models
[ctix-network-ipv4]
search = (sourcetype=ctix) AND (indicator_type="ipv4-addr")

# IPv6 indicators - Network Traffic & IDS Data Models
[ctix-network-ipv6]
search = (sourcetype=ctix) AND (indicator_type="ipv6-addr")

# Domain indicators - DNS, Web, IDS Data Models
[ctix-network-domain]
search = (sourcetype=ctix) AND (indicator_type="domain-name")

# URL indicators - Web & IDS Data Models
[ctix-web-url]
search = (sourcetype=ctix) AND (indicator_type="url")

# Email address indicators - Email Data Model
[ctix-email-address]
search = (sourcetype=ctix) AND (indicator_type="email-addr")

# Email message indicators - Email Data Model
[ctix-email-message]
search = (sourcetype=ctix) AND (indicator_type="email-message")

# Network traffic indicators - Network Traffic Data Model
[ctix-network-traffic]
search = (sourcetype=ctix) AND (indicator_type="network-traffic")

# Autonomous system indicators - Network Traffic Data Model
[ctix-network-as]
search = (sourcetype=ctix) AND (indicator_type="autonomous-system")

# MAC address indicators - Network Traffic Data Model
[ctix-network-mac]
search = (sourcetype=ctix) AND (indicator_type="mac-addr")

# Windows registry key indicators - Endpoint Data Model
[ctix-endpoint-registry]
search = (sourcetype=ctix) AND (indicator_type="windows-registry-key")

# Process indicators - Endpoint Data Model
[ctix-endpoint-process]
search = (sourcetype=ctix) AND (indicator_type="process")

# Mutex indicators - Endpoint Data Model
[ctix-endpoint-mutex]
search = (sourcetype=ctix) AND (indicator_type="mutex")

# Directory indicators - Endpoint Data Model
[ctix-endpoint-directory]
search = (sourcetype=ctix) AND (indicator_type="directory")

# User account indicators - Authentication & Endpoint Data Models
[ctix-authentication-user]
search = (sourcetype=ctix) AND (indicator_type="user-account")

# X509 certificate indicators - Certificates Data Model
[ctix-certificate-x509]
search = (sourcetype=ctix) AND (indicator_type="x509-certificate")

# Software indicators - Compute Inventory & Updates Data Models
[ctix-inventory-software]
search = (sourcetype=ctix) AND (indicator_type="software") 