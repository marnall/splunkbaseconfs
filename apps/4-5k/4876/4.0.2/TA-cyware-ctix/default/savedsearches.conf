[cyware_index_to_kvstore_migration]
disabled = 1
enableSched = 1
request.ui_dispatch_app = TA-cyware-ctix
request.ui_dispatch_view = search
description = Migrate Cyware indicator data from indexes to KVStore collections. This saved search will automatically disable itself after successful migration. (Note: Do not modify or manually execute this search.)
search = `cyware_index` sourcetype="ctix" | sort 0 -_time | dedup indicator | fields _raw | cywareindextokvstoremigration saved_search_name="cyware_index_to_kvstore_migration"
cron_schedule = */10 * * * *
dispatch.earliest_time = 0
dispatch.latest_time = now

[Threat - CTIX - Generating hourly indicator matches by IP - Rule]
action.analyzeioc.param.verbose = 0
action.correlationsearch.enabled = 1
action.correlationsearch.label = CTIX - Generating hourly indicator matches by IP
action.customsearchbuilder.enabled = false
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = []
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param._risk = [{"risk_object_field":"","risk_object_type":"","risk_score":1}]
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.suppress = 1
alert.suppress.fields = threat_match_field,threat_match_value
alert.suppress.period = 86300s
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-cyware-ctix
schedule_window = 60
search = | from datamodel:"Threat_Intelligence"."Threat_Activity"\
	| dedup threat_match_field,threat_match_value\
	| `get_event_id`\
	| eval \
	risk_score=case(isnum(weight), weight, 1=1, 50),\
	risk_object=threat_match_value,\
	risk_object_type=threat_match_field,\
	matched_indicator=threat_key,\
	matched_collection=threat_collection\
	| table _time, event_id, src, dest, user, matched_indicator, matched_collection, threat_match_field, threat_match_value, weight, risk_score\
	| sort -_time

