[source::...ta-cyware*.log*]
sourcetype = tacyware:log

[source::...ta_cyware*.log*]
sourcetype = tacyware:log

[ctix]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 9999999
KV_MODE = json
TIME_PREFIX = "splunk_ingest_time\":\s*
# CIM Data Model Compliance
# Tag for all applicable data models since single sourcetype handles multiple indicator types
# Malware: file, MD5, SHA*, SSDEEP, artifact, yara
# Network Traffic: ipv4-addr, ipv6-addr, network-traffic, autonomous-system, mac-addr
# Intrusion Detection: ipv4-addr, ipv6-addr, domain-name, url
# Network Resolution (DNS): domain-name
# Web: domain-name, url
# Email: email-addr, email-message
# Endpoint: windows-registry-key, process, mutex, directory
# Authentication: user-account
# Certificates: x509-certificate
# Compute Inventory: software
# Updates: software
EVAL-vendor_product = "Cyware Intel Exchange"
# ========================================
# CIM Field Mappings by Indicator Type
# ========================================
# Common CIM fields for all indicator types
EVAL-severity = case(severity=="low", "low", severity=="medium", "medium", severity=="high", "high", severity=="critical", "critical", 1=1, "unknown")
EVAL-threat_score = score
# File indicators (file, MD5, SHA*, SSDEEP) - Malware Data Model
EVAL-file_hash = if(indicator_type="file" OR match(indicator_type, "^(MD5|SHA|SSDEEP)"), indicator, null())
EVAL-file_name = if(indicator_type="file", name, null())
# IPv4 - Network Traffic & IDS Data Models
EVAL-src = if(indicator_type="ipv4-addr", indicator, null())
EVAL-dest = if(indicator_type="ipv4-addr", indicator, null())
EVAL-src_ip = if(indicator_type="ipv4-addr", indicator, null())
EVAL-dest_ip = if(indicator_type="ipv4-addr", indicator, null())
EVAL-ip = if(indicator_type="ipv4-addr", indicator, null())
# IPv6 - Network Traffic & IDS Data Models
EVAL-src_ipv6 = if(indicator_type="ipv6-addr", indicator, null())
EVAL-dest_ipv6 = if(indicator_type="ipv6-addr", indicator, null())
# Domain - DNS, Web, IDS Data Models
EVAL-query = if(indicator_type="domain-name", indicator, null())
EVAL-domain = if(indicator_type="domain-name", indicator, null())
EVAL-dest_domain = if(indicator_type="domain-name", indicator, null())
# URL - Web & IDS Data Models
EVAL-url = if(indicator_type="url", indicator, null())
EVAL-http_referrer = if(indicator_type="url", indicator, null())
# Email Address - Email Data Model
EVAL-src_user = if(indicator_type="email-addr", indicator, null())
EVAL-recipient = if(indicator_type="email-addr", indicator, null())
EVAL-sender = if(indicator_type="email-addr", indicator, null())
# Email Message - Email Data Model
EVAL-message_id = if(indicator_type="email-message", indicator, null())
EVAL-subject = if(indicator_type="email-message", name, null())
# Network Traffic - Network Traffic Data Model
EVAL-transport = if(indicator_type="network-traffic", indicator, null())
# Autonomous System - Network Traffic Data Model
EVAL-src_as = if(indicator_type="autonomous-system", indicator, null())
EVAL-dest_as = if(indicator_type="autonomous-system", indicator, null())
# Windows Registry Key - Endpoint Data Model
EVAL-registry_path = if(indicator_type="windows-registry-key", indicator, null())
EVAL-registry_key_name = if(indicator_type="windows-registry-key", name, null())
# Process - Endpoint Data Model
EVAL-process = if(indicator_type="process", indicator, null())
EVAL-process_name = if(indicator_type="process", name, null())
# MAC Address - Network Traffic Data Model
EVAL-src_mac = if(indicator_type="mac-addr", indicator, null())
EVAL-dest_mac = if(indicator_type="mac-addr", indicator, null())
# User Account - Authentication & Endpoint Data Models
EVAL-user = if(indicator_type="user-account", indicator, null())
EVAL-src_user_name = if(indicator_type="user-account", indicator, null())
# X509 Certificate - Certificates Data Model
EVAL-ssl_subject = if(indicator_type="x509-certificate", indicator, null())
EVAL-ssl_issuer = if(indicator_type="x509-certificate", name, null())
# Software - Compute Inventory & Updates Data Models
EVAL-software = if(indicator_type="software", indicator, null())
EVAL-software_name = if(indicator_type="software", name, null())
# Mutex - Endpoint Data Model
EVAL-mutex = if(indicator_type="mutex", indicator, null())
# Directory - Endpoint Data Model
EVAL-file_path = if(indicator_type="directory", indicator, null())
# Artifact - Malware Data Model
EVAL-artifact = if(indicator_type="artifact", indicator, null())
# YARA - Malware Data Model
EVAL-yara_rule = if(indicator_type="yara", indicator, null())
# Additional threat intelligence fields
EVAL-threat_category = case(indicator_type="file" OR match(indicator_type, "^(MD5|SHA|SSDEEP)"), "malware", indicator_type="ipv4-addr" OR indicator_type="ipv6-addr", "network", indicator_type="domain-name" OR indicator_type="url", "web", indicator_type="email-addr" OR indicator_type="email-message", "email", 1=1, "other")
EVAL-is_threat = if(isnotnull(indicator), "true", "false")
EVAL-threat_description = description
EVAL-first_seen_time = strptime(first_seen, "%Y-%m-%dT%H:%M:%S.%f")
EVAL-last_seen_time = strptime(last_seen, "%Y-%m-%dT%H:%M:%S.%f")

[ctix:debuglog]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
KV_MODE = json
DATETIME_CONFIG = CURRENT

