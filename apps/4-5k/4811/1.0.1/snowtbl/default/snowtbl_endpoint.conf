#
# SNOW Table for Splunk app endpoint configuration file
#
# create_ticket endpoint - ['table', 'short_description', 'description', 'fields', 'sysparm_fields', 'sysparm_display_value']
# run_query endpoint - ['table', 'sysparm_fields', 'sysparm_query', 'sysparm_display_value', 'sysparm_limit']
#

[ct_rest]
eptype=create_ticket
snowtbl_max_table=100
pfields=short_description:1000:;description:4000:;snowtbl_fields:2000:;sysparm_fields:1000:;sysparm_display_value:10:

[ct_general]
eptype=create_ticket
snowtbl_max_table=100
pfields=short_description:1000:;description:4000:;snowtbl_fields:2000:;sysparm_fields:1000:number;sysparm_display_value:10:
alert_result_field=number

[rq_default]
eptype=run_query
snowtbl_max_table=100
pfields=sysparm_query:1000:;sysparm_limit:10:;sysparm_fields:1000:;sysparm_display_value:10:

[ct_incident]
eptype=create_ticket
snowtbl_table=incident
snowtbl_max_table=100
pfields=caller_id:32:;state:40:;cmdb_ci:32:;contact_type:40:;assignment_group:32:;category:40:;subcategory:40:;short_description:160:;description:4000:;correlation_id:100:;sysparm_fields:1000:number;sysparm_display_value:10:
alert_result_field=number
