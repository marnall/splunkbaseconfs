[trapx:syslog]
TIME_PREFIX=rt\=
MAX_TIMESTAMP_LOOKAHEAD = 160
TIME_FORMAT = %b %d %Y %H:%M:%S
SHOULD_LINEMERGE = False
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 8888
EXTRACT-transport = proto=(?P<transport>UDP|TCP)
EVAL-transport = lower(transport)
EXTRACT-signature = \|ID:\d+\|(?<signature>[A-Za-z\-\s]+)\|\d+\|
FIELDALIAS-alias_dest_port = dpt AS dest_port
FIELDALIAS-alias_src_ip = src AS src_ip
FIELDALIAS-alias_dest_ip = dst AS dest_ip
FIELDALIAS-alias_dest = dst AS dest
FIELDALIAS-alias_src_ip = src_ip AS dest_ip
FIELDALIAS-alias_src_port = spt AS src_port
FIELDALIAS-alias_category = cat AS category
FIELDALIAS-alias_dvc = host AS dvc
EVAL-action="allowed"
EVAL-ids_type="network"
EVAL-severity="medium"
EVAL-user="unknown"
EVAL-vendor_product="TrapX DeceptionGrid"
LOOKUP_trapx_transport = trapx_port_lookup dest_port OUTPUT transport
