# Source renaming
[rename_cef_source]
DEST_KEY = MetaData:Source
REGEX = CEF\:+[0-9]{1,}+\|
FORMAT = source::ArcSight Data Platform

# Field Extractions

#
# The following section is designed to extract the fields from the headers for CEF data streams
#
[cef_header_fields]
REGEX = CEF\:(?<version>\d{0,1})[\|](?<deviceVendor>[^\|]{0,}+)[\|](?<deviceProduct>[^\|]{0,}+)[\|](?<deviceVersion>[^\|]{0,}+)[\|](?<deviceEventClassId>[^\|]{0,}+)[\|](?<name>[^\|]{0,}+)[\|](?<severity>[^\|]{0,}+)[\|].*

#
# The following sections are designed to extract the fields from the CEF extension, which represent the CEF Key Names for Event Producers
#
[cef_extended_fields_producers_1]
REGEX = (?m)(act|agentDescriptorId|agentReceiptTime|agentTranslatedZoneReferenceID|agentZoneReferenceID|app|assetCriticality|baseEventIds|c6a[1-4]{1}Label|categoryBehavior|categoryCustomFormatField|categoryDescriptorId|categoryDeviceGroup|categoryDeviceType|categoryObject|categoryOutcome|categorySignificance|categoryTechnique|categoryTupleDescription|cfp[1-4]{1}Label|cn[1-4]{1}Label|cs[1-6]{1}|cs[1-6]{1}Label|customerReferenceID|destinationDnsDomain|destinationGeoCountryCode|destinationGeoDescriptorId|destinationGeoLocationInfo|destinationServiceName|destinationGeoPostalCode|destinationGeoRegionCode|destinationTranslatedAddress|destinationServiceName|destinationTranslatedZoneReferenceID|destinationZoneReferenceID|deviceCustomDescriptorId|deviceCustomDate[1-2]{1}|deviceCustomDate[1-2]{1}Label|deviceDescriptorId|deviceDirection|deviceDomain|deviceDnsDomain|deviceFacility|deviceInboundInterface|deviceNtDomain|deviceOutboundInterface|devicePayloadId|deviceProcessName|deviceTranslatedAddress|deviceTranslatedZoneReferenceID|deviceZoneReferenceID|dhost|dmac|dntdom|domeid|domid|domrid|domuri|dpriv|dproc|dtz|duid|duser|end|eventAnnotationStageUpdateTime|eventAnnotationModificationTime|eventAnnotationAuditTrail|eventAnnotationVersion|eventAnnotationFlags|eventAnnotationEndTime|eventAnnotationManagerReceiptTime|_cefVer|locality|fileCreateTime|fileHash|fileId|fileModificationTime|filePath|filePermission|fileType|flexDate[1-2]{1}|flexDate[1-2]{1}Label|flexNumber[1-4]{1}|flexNumber[1-4]{1}Label|flexString[1-4]{1}|flexString[1-4]{1}Label|fname|fsize|generatorExternalID|generatorReferenceID|generatorURI|locality|modelConfidence|mrt|msg|oldFileCreateTime|oldFileHash|oldFileModificationTime|oldFileName|oldFilePath|oldFilePermission|oldFileType|persistence|priority|proto|reason|relevance|request|requestClientApplication|requestContext|requestCookies|requestMethod|rt|ruleThreadId|sessionId|sntdom|sourceDnsDomain|sourceGeoCountryCode|sourceGeoDescriptorId|sourceGeoLocationInfo|sourceGeoPostalCode|sourceGeoRegionCode|sourceServiceName|sourceTranslatedAddress|sourceTranslatedZoneReferenceID|sourceZoneReferenceID|spriv|sproc|start|suid|suser|vulnerabilityExternalID|vulnerabilityReferenceID|vulnerabilityURI|ad.[^=]+)[\=]([^\=\r\n]{1,})[\s\r\n]
FORMAT = $1::$2
MV_ADD = false

[cef_extended_fields_producers_2]
REGEX = (?m)(c6a[1-4]{1}|cfp[1-4]{1}|cn[1-4]{1}|cnt|destinationTranslatedPort|deviceDirection|deviceExternalId|deviceSeverity|dpid|dpt|dst|dvc|dvchost|dvcmac|dvcpid|externalId|fsize|in|oldFileId|oldFileSize|originalAgentAddress|originalAgentAssetId|originalAgentDnsDomain|originalAgentHostName|originalAgentId|originalAgentNtDomain|originalAgentType|originalAgentVersion|originalAgentZoneURI|originator|out|outcome|shost|smac|sourceTranslatedPort|spid|spt|src|type)[\=]([^\s\r\n]{1,})[\s\r\n]
FORMAT = $1::$2
MV_ADD = false

#
# The following sections are designed to extract the fields from the CEF extension, which represent the CEF Key Names for Event Consumers
#
[cef_extended_fields_consumers_1]
REGEX = (?m)(agentDnsDomain|agentNtDomain|agentTranslatedAddress|agentZoneURI|agentTranslatedZoneURI|agt|ahost|amac|art|at|atz|cat|destinationTranslatedZoneURI|destinationZoneURI|deviceTranslatedZoneURI|dlat|dlong|deviceZoneURI|eventAnnotationAuditTrail|eventAnnotationComment|eventAnnotationEventId|eventAnnotationFlags|eventAnnotationModifiedByExternalID|eventAnnotationModifiedByReferenceID|eventAnnotationModifiedByURI|eventAnnotationStageEventId|eventAnnotationStageExternalID|eventAnnotationStageReferenceID|eventAnnotationStageUpdateTime|eventAnnotationStageURI|eventAnnotationStageUserExternalID|eventAnnotationStageUserReferenceID|eventAnnotationStageUserURI|eventAnnotationVersion|rawEvent|sourceTranslatedZoneURI|sourceZoneURI|slat|slong)[\=]([^\=\r\n]{1,})[\s\r\n]
FORMAT = $1::$2
MV_ADD = false

[cef_extended_fields_consumers_2]
REGEX = (?m)(agentTranslatedZoneExternalID|agentZoneExternalID|aid|av|customerExternalID|customerURI|destinationTranslatedZoneExternalID|destinationZoneExternalID|deviceTranslatedZoneExternalID|deviceZoneExternalID|eventId|sourceTranslatedZoneExternalID|sourceZoneExternalID)[\=]([^\s\r\n]{1,})[\s\r\n]
FORMAT = $1::$2
MV_ADD = false
