[threatq_match_indices]
definition = ()
iseval = 0

[threatq_match_sourcetypes]
definition = ()
iseval = 0

[threatq_match_process_count]
definition = process_count="default"
iseval = 0

[threatq_match_fields]
description = Enter field names separated by OR on which user wants to perform the correlation. (e.g. field1 OR field2).
definition = ()
iseval = 0

[threatq_summariesonly]
definition = summariesonly=false
iseval = 0

[threatq_match_base_query]
description = Update the macro, to provide more customized filters to the correlation for raw matching.
definition = `threatq_match_indices` `threatq_match_sourcetypes` `threatq_match_fields` 
iseval = 0

[threatq_parse_updated_at(1)]
args = updated_at
definition = strptime($updated_at$, "%Y-%m-%d %H:%M:%S %Z")
iseval = 0

[threatq_format_epoch_time(1)]
args = timestamp
definition = strftime($timestamp$, "%Y-%m-%d %H:%M:%S")
iseval = 0

[enable_url_partial_match_datamodel]
description = When user is using the datamodel and receiving the URL indicators with scheme from Threatq server side then set this macro parameter trigger_partial_url_match to true. Setting this parameter true will strip out the scheme from URL indicator at the correlation time.
definition = "trigger_partial_url_match"=false
iseval = 0

[workflow_action_using_conf]
description = This macro is responsible to run the workflow action using credentials from the conf files instead of the rest APIs.
definition = False

[splunk_custom_fields_macro]
definition = .
iseval = 0

[splunk_custom_fields_macro2]
definition = .
iseval = 0