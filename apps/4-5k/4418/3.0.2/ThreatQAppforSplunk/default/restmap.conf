
[admin:threatquotient_app]
match = /
members = threatquotient_app_settings, fields_list_tree

[admin_external:threatquotient_app_settings]
handlertype = python
python.version = python3
handlerfile = threatquotient_app_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[script:trigger_forwarder_input]
match = /trigger_forwarder_input
script = trigger_forwarder_input.py
scripttype = persist
python.version = python3
handler = trigger_forwarder_input.InvokeForwarderInput
passSystemAuth = true

[admin_external:fields_list_tree]
handleractions = list, edit
handlerfile = fields_list_tree.py
python.version = python3
handlertype = python