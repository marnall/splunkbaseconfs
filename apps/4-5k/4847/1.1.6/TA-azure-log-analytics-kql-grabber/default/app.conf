# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 10

[launcher]
author = Leonardo Armesto
version = 1.1.6
description = With Azure Log Analytics, you can gather log data from all of your resources.  Why not inject all this data into Splunk?

[ui]
is_visible = 1
label = Azure Log Analytics KQL Grabber
docs_section_override = AddOns:released

[package]
id = TA-azure-log-analytics-kql-grabber

[triggers]
reload.addon_builder = simple
reload.ta_azure_log_analytics_kql_grabber_account = simple
reload.ta_azure_log_analytics_kql_grabber_settings = simple
reload.passwords = simple

