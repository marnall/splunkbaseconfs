[safenetat:keysecure]
TRANSFORMS-001_syslog_rewrite = audit_st, system_st, activity_st, pfmgr_st

[audit-st]
EXTRACT-UserName,Action,Stage = \[(?<UserName>.*?)\] +\[(?<Action>.*?)\] +\[(?<Stage>.*?)\]:

[activity-st]
EXTRACT-HostName = ^(\S+\s+){3}(?<HostName>\S+)
EXTRACT-dateTime,Priority,ClientIP,CommonName,User,ClientReqID,ClientReqType,KeyName,ClientReqDetail,ErrorCode,ClientMessage,ClientEnd = \[(?<dateTime>.*?)\] +(?<Priority>\S+) +(?<ClientIP>\S+) +\[(?<CommonName>.*?)\] +(?<User>\S+) +(?<ClientReqID>\S+) +(?<ClientReqType>\S+) +(?<KeyName>[^\[]+) +\[(?<ClientReqDetail>.*?)\] +(?<ErrorCode>\S+) +\[(?<ClientMessage>.*?)\] +\[(?<ClientEnd>.*?)\]


[system-st]
EXTRACT-Category = ^(\S+\s+){3}(?<HostName>\S+)[a-zA-Z :-]+(\S+\s+){3}(?<Category>[^:]+): (?<Msg>.+)

[safenetat:pfclient]
EXTRACT-ClientIP,Priority,dateTime,hostName,Connector,Process,Code = ^(\S+\s+){3}(?<ClientIP>\S+) +(?<Priority>\S+) +(?<dateTime>\S+) +(?<hostName>\S+) +(?<Connector>\S+) +(?<Process>\S+) +(?<Code>\S+)
EXTRACT-OperationType = OperationType="(?<OperationType>[^"]*)
EXTRACT-UserGroup = User="(?<UserGroup>[^"]*)
EXTRACT-Path = Path="(?<Path>[^"]*)

[source::C:\Temp\keysecure.log]
TRANSFORMS-keysecurelogfile = kslogfile
