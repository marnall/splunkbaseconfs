[tshark:port53]
REPORT-1_standard_query = 1_standard_query
REPORT-2_standard_response = 1_standard_response, 2_standard_response
REPORT-3_parse_response = 1_parse_response, 2_parse_response

FIELDALIAS-query_type = record_type AS query_type


EVAL-answer = coalesce (A, AAAA)
EVAL-dest   = CASE (m_type="Standard query"          , d_ip ,\
                    m_type="Standard query response" , s_ip )
EVAL-src    = CASE (m_type="Standard query"          , s_ip ,\
                    m_type="Standard query response" , d_ip )
EVAL-dest_ip   = CASE (m_type="Standard query"          , d_ip ,\
                       m_type="Standard query response" , s_ip )
EVAL-src_ip    = CASE (m_type="Standard query"          , s_ip ,\
                       m_type="Standard query response" , d_ip )


EVAL-message_type = CASE (m_type="Standard query"          , "QUERY"    ,\
                          m_type="Standard query response" , "RESPONSE" )

EVAL-reply_code = CASE (r_code = "No such name"    , "NXDomain" ,\
                        r_code = "Not implemented" , "NotImp"   ,\
                        r_code = "Format error"    , "FormErr"  ,\
                        r_code = "Server failure"  , "ServFail" ,\
                        r_code = "Refused"         , "Refused"  ,\
                        r_code = "Name exists"     , "YXDomain" ,\
                        r_code = "RRset exists"    , "YXRRset"  ,\
                        r_code = "RRset does not exists" , "NXRRset" ,\
                        r_code = "Not authoritative" , "NotAuth",\
                        r_coee = "Name out of zone", "NotZone"  ,\
                        m_type = "Standard query response" AND isnull(r_code) , "NoError" )

EVAL-transaction_id = tonumber(t_id, 16)


