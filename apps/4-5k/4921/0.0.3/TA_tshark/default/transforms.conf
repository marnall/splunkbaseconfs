[1_standard_query]
REGEX =^\s*(?<packet_num>\d+)\s+(?<timestamp>\d\d\d\d-\d\d-\d\d\s+\d\d:\d\d:\d\d\.\d+)\s+(?<s_ip>[\d\.abcdef:]+)\s+.{1,2}\s+(?<d_ip>[\d\.abcdef:]+)\s+DNS\s+(?<frame_len>\d+)\s+(?<m_type>Standard query)\s+(?<t_id>0x[a-f0-9]{1,4})\s+(?<record_type>[A-Z]{1,10})\s+(?<query>.*)

[1_standard_response]
REGEX =^\s*(?<packet_num>\d+)\s+(?<timestamp>\d\d\d\d-\d\d-\d\d\s+\d\d:\d\d:\d\d\.\d+)\s+(?<s_ip>[\d\.abcdef:]+)\s+.{1,2}\s+(?<d_ip>[\d\.abcdef:]+)\s+DNS\s+(?<frame_len>\d+)\s+(?<m_type>Standard query response)\s+(?<t_id>0x[a-f0-9]{1,4})\s+(?<response>.*)

# 14729 2020-03-06 17:37:42.616574840 193.204.16.xx -> 192.168.233.xx DNS 536 Standard query response 0x9e92 
[2_standard_response]
REGEX =^\s*(?<packet_num>\d+)\s+(?<timestamp>\d\d\d\d-\d\d-\d\d\s+\d\d:\d\d:\d\d\.\d+)\s+(?<s_ip>[\d\.abcdef:]+)\s+.{1,2}\s+(?<d_ip>[\d\.abcdef:]+)\s+DNS\s+(?<frame_len>\d+)\s+(?<m_type>Standard query response)\s+(?<t_id>0x[a-f0-9]{1,4})

[1_parse_response]
SOURCE_KEY=response
REGEX=([A-Z]+)\s+([^ ]+)
FORMAT = $1::$2
MV_ADD = true

[2_parse_response]
SOURCE_KEY = response
REGEX = (No such name|Not implemented|Refused|Server failure)
FORMAT = r_code::$1
