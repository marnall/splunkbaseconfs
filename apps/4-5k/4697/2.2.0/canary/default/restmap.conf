# Simple endpoint that proxies requests to elastic search
# As of this writing Canary has limited support for dispatching searches
# "against Elastic" instead of against Splunk.
# in our releases this gets commented out to keep appinspect happy.
[script:es_proxy]
match                 = /es_proxy
script                = es_proxy.py
scripttype            = persist
handler               = es_proxy.ElasticSearchProxyHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSession           = false
python.version        = python3
python.required       = 3.9, 3.13


# see comments on the handler class in the python file in the shunt subdirectory.
[script:canary_shunt]
match                 = /canary_shunt
script                = shunt/canary_shunt.py
scripttype            = persist
handler               = canary_shunt.CanaryShuntHandler
requireAuthentication = true
# see comments on this same key elsewhere in this file.
output_modes          = json, xml
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSession           = true
python.version        = python3
python.required       = 3.9, 3.13



