[script:sv_view]
match                 = /sv_view
script                = view.py
#script                = viewf.py
scripttype            = persist
handler               = view.CanaryViewHandler
#handler               = viewf.CanaryViewHandler
requireAuthentication = true
output_modes          = html
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = false
passSession           = true
python.version        = python3
python.required       = 3.9, 3.13

