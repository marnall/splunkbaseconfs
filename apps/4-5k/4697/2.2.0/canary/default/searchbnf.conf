[checkxml-command]
syntax = | checkxml
shortdesc = Inspects view XML to determine compatibility with the Canary UI
description = This will inspect Splunk view XML passed to it and make determinations of whether the view can be rendered in the Canary UI and if not, what steps might be required to migrate it to such a state. It expects three fields coming in - "app", "view", and "eai:data"
usage = public
example1 = | rest /servicesNS/-/-/data/ui/views splunk_server=local | fields eai:acl.app title eai:acl.owner eai:data | rename eai:acl.app as app, title as view | checkxml | search type="Advanced XML" OR type="Sideview XML" | stats dc(warnings) as warnings dc(errors) as errors by type app view
comment1 = look at all views in all apps and return a list of all the Sideview XML (aka views made with Canary) and old Sideview Utils UI and older outright Advanced XML from the days of yore,  along with a list of errors/warnings and infos about their ability to be run in the Canary UI
