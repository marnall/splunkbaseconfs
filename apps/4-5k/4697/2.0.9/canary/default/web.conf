

#this is to match /sv_view/<appname>  so canary can do the appropriate redirect to the default view
[expose:canary_view]
# POST here is needed, because there's a feature where you can post view config
# from scratch and it will evaluate and render in the given app context.
methods = GET, POST
pattern = /sv_view/*

# this is the main /sv_view/<appname>/<viewname>  URL.
[expose:canary_view_2]
# POST here is needed because the Editor can submit to the given app and view, new
# param values for a particular moduleId and things like that.
methods = GET, POST
pattern = /sv_view/*/*

# this is the /sv_view/<appname>/<viewname>/<action>    endpoint that we need for some things like
# the spacetree schematic view and one or two other modes like that.
[expose:canary_view_3]
methods = GET, POST
pattern = /sv_view/*/*/*

[expose:canary_module]
methods = GET
pattern = /sv_module/*


[expose:canary_editor]
methods = GET
pattern = /sv_editor/*/*/*

[expose:canary_freshmaker]
methods = GET
pattern = /freshmaker


[expose:es_proxy]
methods = GET, POST
pattern = es_proxy/*

[expose:es_proxy_2]
methods = GET, POST
pattern = es_proxy/*/*

[expose:es_proxy_3]
methods = GET, POST
pattern = es_proxy/*/*/*



#see restmap.conf
[expose:canary_shunt]
methods = GET
pattern = canary_shunt

#see restmap.conf
[expose:canary_nav_scaffolding]
methods = POST
pattern = canary_nav_scaffolding

#see restmap.conf
[expose:canary_jobstatus]
