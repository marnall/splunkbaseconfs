[threatq_indicators_events.csv]
disabled = true
mode = sample
sampletype = csv
outputMode = splunkstream
splunkHost = localhost
interval = 300
count = 100

## Replace timestamp
token.0.token = time_value
token.0.replacementType = timestamp
token.0.replacement = %Y-%m-%d %H:%M:%S

## Replace IP
token.1.token = ip_value
token.1.replacementType = random
token.1.replacement = ipv4

## Replace status
token.2.token = status_value
token.2.replacementType = random
token.2.replacement = list["Active", "Expired", "Indirect", "Review"]

## Replace hash
token.3.token = hash_value
token.3.replacementType = random
token.3.replacement = hex(32)

## Replace MD5
token.4.token = md5_value
token.4.replacementType = random
token.4.replacement = hex(32)

## Replace score
token.5.token = score_value
token.5.replacementType = random
token.5.replacement = integer[0:10]

## Replace ID
token.6.token = id_value
token.6.replacementType = integerid
token.6.replacement = 0

## Replace source
token.7.token = source_value
token.7.replacementType = random
token.7.replacement = string(8)

## Replace adversary
token.8.token = adversary_value
token.8.replacementType = random
token.8.replacement = string(8)
