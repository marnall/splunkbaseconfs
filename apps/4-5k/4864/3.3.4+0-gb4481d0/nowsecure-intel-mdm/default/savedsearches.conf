
[Create AppList.csv]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 2 * * *
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = nowsecure_mdm_dashboard 
request.ui_dispatch_view = search
search = `nowsecure-index` eventType=APP_SCORES   \
| where runID = [search eventType="RUN_END" | eventstats max(runID) as MaxRunID | append [makeresults | eval MaxRunID=0] | return $MaxRunID] \
| dedup platform bundle appPublishedVersion title group \
| rex mode=sed field=countryCodes "s/ /,/g s/\[//g s/\]//g"\
| makemv countryCodes delim=","\
| lookup geo_attr_countries iso2 as countryCodes OUTPUT country as Country\
| eval countryCodes = mvjoin(countryCodes,",")\
| eval Country = if(mvcount(Country)>0,mvjoin(Country,","),"None")  \
| eval score=case(score=0,"No score",true(),score)\
  \
| rename platform as "Platform", \
    bundle as "Bundle", \
    title as "Title", \
    group as "Group",\
    appPublishedVersion  as "App Published Version",\
    appBuildVersion  as "App Build Version",\
    score  as "App Final Score",\
    countryCodes   as "Country Code",\
    errorCode  as "Error Code",\
    hasBaselineConfig  as "Has Baseline Config",\
    devices as "Installs",\
    scoreMatchedBy  as "Score Matched By"\
\
\
  | eval   "App Source" = case(true(),"App Store")\
  | eval    "AsOf Time" = strftime(_time,"%Y-%m-%d %H:%M:%S %Z")     \
  \
  | rename COMMENT as "    analysisBuildVersion    analysisCreatedAt    analysisPublishedVersion    androidApps        appstoreDownload      completed    component     devices    elapsedTime       eventType    eventtype    grade         host    index    iosApps    knownVersions    level    linecount    minimumConfiguredScore    msg               totalAppVersions    totalApps    totalAppsScore    totalAppsScorePrevalance    totalInstalls"\
  \
| table "Platform" "Bundle" "Title" "App Published Version" "App Final Score" "App Source" \
    "AsOf Time" "Country" "Country Code" "Error Code" "Has Baseline Config" "Installs" "Score Matched By" "Group"\
    | outputlookup AppList.csv\
    \
    | mvcombine Group\
    | eval Group ="Any"\
    | sort 0 - AsOfTime\
    | dedup Platform Bundle Title "App Published Version" \
    | outputlookup AppListAny.csv

[Create DeviceAppCrosswalk.csv]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 2 * * *
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = nowsecure_mdm_dashboard
request.ui_dispatch_view = search
search = `nowsecure-index` eventType=MDM_DEVICE_APPS group!="ALL"\
| where runID = [search eventType="RUN_END" | eventstats max(runID) as MaxRunID | append [makeresults | eval MaxRunID=0] | return $MaxRunID] \
| eval AsOfTime = strftime(_time,"%Y-%m-%d %H:%M:%S") \
| table  AsOfTime runID bundle deviceID group level operatingSystem platform publishedVersion  title username time\
| dedup deviceID bundle title publishedVersion \
| eval Platform = case(platform="Apple","ios", platform="Android","android",true(),platform)\
| rename AsOfTime as  AsOfTime \
    bundle as "Bundle",\
    deviceID as "Device ID",\
    group as Group,\
    operatingSystem as "OS Version" \
    publishedVersion as "Dev Published Version",  \
    title as "Title",\
    username as "User"\
| table   AsOfTime  Bundle  "Device ID" Group "OS Version"  Platform "Dev Published Version" "Title" "User"\
| outputlookup DeviceAppCrosswalk.csv

[Create DeviceList.csv]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 2 * * *
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = nowsecure_mdm_dashboard
request.ui_dispatch_view = search
search = `nowsecure-index` eventType="ACTIVE_DEVICE" group!="ALL"\
| dedup id \
| where runID = [search eventType="RUN_END" | eventstats max(runID) as MaxRunID | append [makeresults | eval MaxRunID=0] | return $MaxRunID] \
| eval AsOfTime = strftime(_time,"%Y-%m-%d %H:%M:%S") \
| table AsOfTime runID countryCodes cveCount deviceAppsAvgScore deviceScore eventtype group highestCVSS highestCVSSID id installedApps msg platform deviceAppAndCVEScore time user version \
| foreach *core [ | eval <<FIELD>> = if( <<FIELD>>=round(<<FIELD>>,2), <<FIELD>>, round(<<FIELD>>,2)) ]\
| eval country = countryCodes\
\
| rex mode=sed field=countryCodes "s/ /,/g s/\[//g s/\]//g"\
| makemv countryCodes delim=","\
| lookup geo_attr_countries iso2 as countryCodes OUTPUT country as Country\
| eval countryCodes = mvjoin(countryCodes,",")\
| eval Country = if(mvcount(Country)>0,mvjoin(Country,","),"None")  \
\
| rename \
    time as "AsOftime",\
    deviceAppsAvgScore  as "Avg App Score For This Device", \
    deviceScore  as "CVE Device SubScore", \
    cveCount as "CVEs for Device", \
    countryCodes as "Country Code", \
    deviceAppAndCVEScore  as "Device Final Score", \
    id  as "Device ID", \
    group  as "Group", \
    highestCVSSID  as "Highest CVE ID", \
    highestCVSS  as "Highest CVE Score",\
    installedApps as "Installed Apps"\
    version as "OS Version",\
    platform as "Platform",\
    user as "User Email" \
      \
| table "AsOftime" "Avg App Score For This Device" "CVE Device SubScore" "CVEs for Device" "Country" "Country Code" "Device Final Score" "Device ID" "Group" "Highest CVE ID" "Highest CVE Score" "Installed Apps" "OS Version" "Platform"  "User Email"\
| outputlookup DeviceList.csv

[Create EnterpriseScores.csv]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 2 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = nowsecure_mdm_dashboard
request.ui_dispatch_view = search
search = `nowsecure-index`  eventType=ENTERPRISE_S*  enterpriseScore (androidDeviceCount>0 OR iosDeviceCount>0)\
\
| rename group as Group | table _time Group enterpriseScore enterpriseAppScore  enterpriseDeviceScore\
| foreach enterprise* [| eval <<FIELD>> = round(<<FIELD>>,2)]\
\
| outputlookup EnterpriseScores.csv
