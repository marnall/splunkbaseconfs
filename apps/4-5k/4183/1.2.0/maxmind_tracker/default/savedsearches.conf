[MaxMind DB Change Alert]
action.email = 1
action.email.include.results_link = 0
action.email.include.trigger = 1
action.email.include.trigger_time = 1
action.email.include.view_link = 0
action.email.inline = 1
action.email.sendresults = 1
action.email.subject.alert = Splunk Alert: $name$
action.email.to = mark.hill@intalock.com.au
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.threat_add.param.verbose = 0
alert.suppress = 1
alert.suppress.period = 12h
alert.track = 0
counttype = number of events
cron_schedule = */15 * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.page.search.mode = fast
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = maxmind_tracker
request.ui_dispatch_view = search
search = index=maxmind_tracker sourcetype=wget_md5 \
| streamstats current=t window=2 earliest(md5) as prev_md5 latest(md5) as current_md5 \
| where NOT prev_md5=current_md5
