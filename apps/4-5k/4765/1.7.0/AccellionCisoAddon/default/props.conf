[Accellion:ACF:app]
SHOULD_LINEMERGE = false
TRUNCATE = 0
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false
pulldown_type = true
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 15
TIME_FORMAT = %b %d %H:%M:%S
TZ = UTC

TRANSFORMS-timestamp = add_timestamp
EXTRACT-hostname = \"url_host\"\:\s\"(?<hostname>[^\"]+)\"

EVAL-action = case(event IN ("admin_logged_in", "user_logged_in"), "success", event IN ("user_login_failed", "tfa_login_failed"), "failure")
FIELDALIAS-src = user_ip as src
FIELDALIAS-user = user_name as user

### Uploads
FIELDALIAS-server_ip = data.node_ip as server_ip
EVAL-server_ip = coalesce(server_ip, "")

### Downloads
# download
FIELDALIAS-file_name_download = data.file.name as download_file_name
FIELDALIAS-file_path_download = data.file.path as download_file_path
FIELDALIAS-file_size_download = data.file.size as download_file_size

# download_email
FIELDALIAS-file_name_download_email = data.attachment.name as download_email_file_name
FIELDALIAS-file_path_download_email = data.attachment.path as download_email_file_path
FIELDALIAS-file_size_download_email = data.attachment.size as download_email_file_size

# download_email_zip
FIELDALIAS-file_name_download_email_zip = data.attachments{}.name as download_email_zip_file_name
FIELDALIAS-file_path_download_email_zip = data.attachments{}.path as download_email_zip_file_path
FIELDALIAS-file_size_download_email_zip = data.attachments{}.size as download_email_zip_file_size

# download_zip
FIELDALIAS-zip_name_download_zip = data.name as download_zip_zip_name
FIELDALIAS-zip_size_download_zip = data.size as download_zip_zip_size
FIELDALIAS-zip_folder_name_download_zip = data.folders{}.name as download_zip_folder_name
FIELDALIAS-zip_folder_path_download_zip = data.folders{}.path as download_zip_folder_path
FIELDALIAS-zip_folder_size_download_zip = data.folders{}.size as download_zip_folder_size
FIELDALIAS-zip_file_name_download_zip = data.files{}.name as download_zip_file_name
FIELDALIAS-zip_file_path_download_zip = data.files{}.path as download_zip_file_path
FIELDALIAS-zip_file_size_download_zip = data.files{}.size as download_zip_file_size

### Views
# view_attachment
FIELDALIAS-file_name_view_attachment = data.attachment.name as view_attachments_file_name
FIELDALIAS-file_path_view_attachment = data.attachment.path as view_attachments_file_path
FIELDALIAS-file_size_view_attachment = data.attachment.size as view_attachments_file_size

### Send
EVAL-sender = if(event IN ("send_mail", "send_message", "send_preview", "view_message", "view_mail", "download_email_zip", "view_attachment"), user_name, "")

# send_mail
FIELDALIAS-message_subject_send_mail = data.mail.subject as message_subject
FIELDALIAS-attachment_name_send_mail = data.attachments{}.name as send_mail_attachment_name
FIELDALIAS-attachment_size_send_mail = data.attachments{}.size as attachment_size
FIELDALIAS-recipients_name_send_mail = data.recipients{}.name as recipients_name

FIELDALIAS-mail_id_send_mail = data.mail.id as mail_id
EVAL-mail_id = coalesce(mail_id, -1)

# send_message
FIELDALIAS-attachment_name_send_message = data.folder.name as send_message_attachment_name
FIELDALIAS-attachment_path_send_message = data.folder.path as attachment_path
EVAL-attachment_name = mvjoin(coalesce(send_message_attachment_name, send_mail_attachment_name), ", ")
EVAL-attachment_size = mvjoin(attachment_size, ", ")
EVAL-recipients_name = mvjoin(recipients_name, ", ")

### Receive
FIELDALIAS-activity = description as activity

# view_message
FIELDALIAS-recipient_view_message = data.recipients{}.name as recipient
EVAL-recipient= mvjoin(recipient, ", ")

### new_users
FIELDALIAS-new_user_name = data.user.name as new_user_name
FIELDALIAS-new_user_profile = data.profile.name as new_user_profile
FIELDALIAS-new_user_created_by = user_name as new_user_created_by

### scan
FIELDALIAS-dlp_scan_file_name = data.file_object.name as scan_file_name
FIELDALIAS-dlp_scan_user_name = data.file_owner.name as scan_user_name
FIELDALIAS-dlp_scan_file_path = data.file_object.path as scan_file_path

### EC Source
FIELDALIAS-ec_source_id = data.ec_source.id as ec_source_id
FIELDALIAS-ec_source_name = data.ec_source.name as ec_source_name

### Alerts Event
FIELDALIAS-uuid_alert_event = data.alert.uuid as alert_uuid
FIELDALIAS-message_alert_event = data.alert.message as alert_event_message
FIELDALIAS-user_alert_event = data.alert_username as alert_event_user

### Alerts
FIELDALIAS-message_alert = feature_json.message as message
FIELDALIAS-user_alert = feature_json.username as user_alert

# files
FIELDALIAS-file_name_alert = feature_json.files{}.name as alert_file_name
FIELDALIAS-file_path_alert = feature_json.files{}.path as alert_file_path
FIELDALIAS-file_size_alert = feature_json.files{}.size as alert_file_size
FIELDALIAS-last_accessed_alert = feature_json.files{}.last_accessed as alert_last_accessed
EVAL-last_accessed = mvjoin(alert_last_accessed, ", ")

EVAL-zip_name = coalesce(download_zip_zip_name, "")
EVAL-zip_size = coalesce(download_zip_zip_size, "")
EVAL-file_name = mvjoin(coalesce(download_file_name, download_email_file_name, download_zip_zip_name, alert_file_name), ", ")
EVAL-file_path = mvjoin(coalesce(download_file_path, download_email_file_path, alert_file_path), ", ")
EVAL-file_size = mvjoin(coalesce(download_file_size, download_email_file_size, download_zip_zip_size, alert_file_size), ", ")
EVAL-file_detail_name = mvjoin(coalesce(download_email_zip_file_name, download_zip_file_name), ", ")
EVAL-file_detail_path = mvjoin(coalesce(download_email_zip_file_path, download_zip_file_path), ", ")
EVAL-file_detail_size = mvjoin(coalesce(download_email_zip_file_size, download_zip_file_size), ", ")
EVAL-file_count = mvcount(coalesce(download_email_zip_file_name, download_zip_file_name))
