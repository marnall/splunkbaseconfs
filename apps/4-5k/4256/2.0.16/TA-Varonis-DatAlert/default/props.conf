[varonis:ta]
#####################
# General props needed for the Varonis App for Splunk
#####################
CHARSET = UTF-8
NO_BINARY_CHECK = 1
REPORT-cefevents = cefHeaders-TA,cefKeys-TA
SHOULD_LINEMERGE = 0
TIME_FORMAT = %b %d %Y %k:%M:%S
TIME_PREFIX = end=
MAX_TIMESTAMP_LOOKAHEAD = 25
TRUNCATE=9999

category = Varonis
pulldown_type = 1

EXTRACT-samAcc = ^(?:[^\\\n]*\\){2}(?P<samAcc>\w+\s?\w+)\s
EXTRACT-uniDate = ^(?:[^=\n]*=){7}(?P<uniDate>\w+\s+\d+\s+\d+)

#####################
# Calculated Fields: Used to remove double backslash from certain CEF fields for the App
#####################
EVAL-duser = replace(duser, "[\\\]{2}", "\\")
EVAL-filePath = replace(filePath, "[\\\]{2}", "\\")

#####################
# Global Mapping: Incoming Varonis CEF fields to Splunk Common Information Model
#####################
FIELDALIAS-file_name = fname AS file_name
FIELDALIAS-object = fname AS object
FIELDALIAS-query = fname AS query
FIELDALIAS-url = fname AS url
FIELDALIAS-url2 = msg AS url
FIELDALIAS-url3 = cs4 AS url
FIELDALIAS-id = externalId AS id
FIELDALIAS-id2 = cn1 AS id
FIELDALIAS-timestamp = start AS _timestamp
FIELDALIAS-file_acl = cs6 AS file_acl
FIELDALIAS-src = dvc AS src
FIELDALIAS-src2 = dvchost AS src
#FIELDALIAS-action = outcome AS action
FIELDALIAS-action2 = outcome AS status
FIELDALIAS-action3 = cef_name AS action
FIELDALIAS-file_path = filePath AS file_path
FIELDALIAS-uri_path = filePath AS uri_path
FIELDALIAS-user = dpriv AS user
FIELDALIAS-user2 = duser AS user
FIELDALIAS-object_path = filePath AS object_path
#FIELDALIAS-type = cef_name AS type
FIELDALIAS-src_user = duser AS src_user
FIELDALIAS-src_nt_domain = dhost AS src_nt_domain
FIELDALIAS-body = msg AS body

FIELDALIAS-object_attrs = cs6 AS object_attrs
FIELDALIAS-recipient = cs1 AS recipient
FIELDALIAS-result = outcome AS result
FIELDALIAS-signature = cs2 AS signature
FIELDALIAS-subject = cs2 AS subject

#####################
# Mapping: Lookups
#####################
LOOKUP-severity = varonis_severity_lookup cef_severity OUTPUT severity
LOOKUP-category = varonis_rules_lookup ThreatModelName AS cs2 OUTPUT DLP_Incident.category
LOOKUP-change_type = varonis_rules_lookup ThreatModelName AS cs2 OUTPUT All_Changes.Change_Type
#LOOKUP-ids_type = varonis_rules_lookup ThreatModelName AS cs2 OUTPUT IDS_Alert.ids_type
LOOKUP-object_category = varonis_rules_lookup ThreatModelName AS cs2 OUTPUT DLP_Incident.Object_category
LOOKUP-src_user_category = varonis_rules_lookup ThreatModelName AS cs2 OUTPUT src_user_category
LOOKUP-user_category = varonis_rules_lookup ThreatModelName AS cs2 OUTPUT src_user_category
LOOKUP-user_priority = varonis_rules_lookup ThreatModelName AS cs2 OUTPUT user_priority

LOOKUP-action = varonis_outcome_action_lookup varonis_eventtype AS outcome OUTPUT action
LOOKUP-type = varonis_outcome_type_lookup varonis_eventtype AS cef_name OUTPUT type

#####################
# Mapping: Statics
#####################
EVAL-vendor_product = "Varonis DatAlert Suite"
EVAL-dvc = "Varonis DatAlert Suite"
EVAL-dlp_type = "Behavioral"