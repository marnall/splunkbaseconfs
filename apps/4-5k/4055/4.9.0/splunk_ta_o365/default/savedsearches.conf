[o365 sensitivity labels]
disabled = 1
run_on_startup = true
enableSched = 1
cron_schedule = 0 0 1 * *
dispatch.earliest_time = -1mon@mon
dispatch.latest_time = @mon
request.ui_dispatch_app = splunk_ta_o365
request.ui_dispatch_view = search
description = Populate lookup file with O365 sensitivity labels applying to a tenant
search = | getsensitivitylabels tenant_name="$add_a_tenant$" | fields - _raw, _time | outputlookup splunk_ta_o365_sensitivitylabels_lookup
