[getsensitivitylabels-command]
syntax = getsensitivitylabels (sensitivitylabels-option=<string>)
shortdesc = Enrich your searches with O365 sensitivity labels
description = \
    This command fetch O365 sensitivity labels applying to a tenant
comment1 = This is an example of usage
example1 = \
    | getsensitivitylabels tenant_name="my-tenant"
usage = public

[sensitivitylabels-option]
syntax = tenant_name=<string>
description = The O365 tenant defined in the add-on configuration
