[azure:eventhub:eh:metrics]
BREAK_ONLY_BEFORE_DATE = 
DATETIME_CONFIG = 
LINE_BREAKER = (?=\,\{)(\,)|\]\}
MAX_EVENTS = 100000
MAX_TIMESTAMP_LOOKAHEAD = 30
NO_BINARY_CHECK = true
SEDCMD-01-remove_header = s/^\d{4}\-\d{2}\-\d{2}\s\d{2}\:\d{2}\:\d{2}\.\d{6}[\+\-]\d{4}\|message\=\{\"records\"\:\s\[//g
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = \s\"time\"\:\s\"
TRUNCATE = 300000
category = Custom
disabled = false
pulldown_type = 1

TRANSFORMS-01-extract_eventhub = extract_eventhub

EXTRACT-namespace = NAMESPACES\/(?P<namespace>[\w|\-]+)
EXTRACT-resourcegroup = RESOURCEGROUPS\/(?P<resource_group>[\w|-]+)
FIELDALIAS-Activity Log = average AS resource_average count AS resource_count maximum AS resource_max metricName AS resource_metricName minimum AS resource_minimum resourceId AS resource_resourceID time AS resource_time timeGrain AS resource_timeGrain total AS resource_total

[azure:eventhub:activity:log]
BREAK_ONLY_BEFORE = \{\s
BREAK_ONLY_BEFORE_DATE = 
DATETIME_CONFIG = 
LINE_BREAKER = (?=\,\{)(\,)|(?:[\r\n]+|\}\]\})()(?:\||20\d{2}\-)
MAX_TIMESTAMP_LOOKAHEAD = 30
MUST_BREAK_AFTER = \]\}
NO_BINARY_CHECK = true
SEDCMD-01-remove_header = s/^\d{4}\-\d{2}\-\d{2}\s\d{2}\:\d{2}\:\d{2}\.\d{6}[\+\-]\d{4}\|message\=\{\"records\"\:\s\[//g
SEDCMD-02-remove_footer = s/\]\}//g
SEDCMD-03-format = s/\}\{\"correlationId\"/,"correlationId"/g
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = \s\"time\"\:\s\"
category = Custom
disabled = false
pulldown_type = 1

TRANSFORMS-01-extract_eventhub = extract_eventhub

EXTRACT-namespace = NAMESPACES\/(?P<namespace>\w+)
EXTRACT-resourcegroup = RESOURCEGROUPS\/(?P<resource_group>\w+)
FIELDALIAS-Activity Log = "average" AS resource_average "count" AS resource_count "maximum" AS resource_max "metricName" AS resource_metricName "minimum" AS resource_minimum "resourceId" AS resource_resourceID "time" AS resource_time "timeGrain" AS resource_timeGrain "total" AS resource_total


EXTRACT-resourceGroups = resourceGroups\/(?P<resource_group>[^\/\"]+)
EXTRACT-virtualNetworks = virtualNetworks\/(?P<virtual_networks>[^\/\"]+)
EXTRACT-subscription = subscriptions\/(?P<subscription>[^\/\"]+)
EXTRACT-public_dns = publicIPAddresses\/(?P<public_dns>[^\s\"]+)
EXTRACT-resourceUri_extraction = \"resourceId\"\:\s\"\/SUBSCRIPTIONS\/(?P<subscription_id>[^\/]+)\/\w+\/(?P<resource_group>[^\/]+)\/\w+\/(?P<resource_provider>[^\/]+)\/(?P<provider_type>[^\/]+)\/(?P<provider_account>[^\"\s]+)


REPORT-subscription = subscription
REPORT-providers = providers
REPORT-resource_groups = resource_groups
REPORT-namespaces = namespaces
FIELDALIAS-identity = "callerIpAddress" AS record_caller_ip "identity.authorization.evidence.role" AS identity_role "identity.claims.http://schemas.xmlsoap.org/ws/2005/05/identity/claims/givenname" AS identity_givenname "identity.claims.http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name" AS identity_name "identity.claims.http://schemas.xmlsoap.org/ws/2005/05/identity/claims/surname" AS identity_surname "identity.claims.ipaddr" AS identity_ip
FIELDALIAS-record_operation_aliases = "category" AS record_category "correlationId" AS operation_correlationId "durationMs" AS operation_durationMs "identity.authorization.action" AS operation_action "operationName" AS operation_name "properties.resourceLocation" AS resource_location "properties.statusCode" AS property_statusCode "properties.statusMessage" AS property_statusMsg "resultSignature" AS result_signature "resultType" AS result_type
EXTRACT-eventhub_operation_actions = \"operationName\"\:\s+\"(?P<provider_name>M\w+\.\w+)\/(?P<provider_display>[^\/]+)\/(?P<provider_action_cat>[^\/]+)\/(?P<provider_action>[^\"]+)

