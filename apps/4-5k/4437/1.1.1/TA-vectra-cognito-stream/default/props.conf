[vectra:cognito:stream]
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
TIME_FORMAT = %s%3N
TIME_PREFIX = \sts="
MAX_TIMESTAMP_LOOKAHEAD = 13

FIELDALIAS-site = host AS site
FIELDALIAS-http_method = method AS http_method
FIELDALIAS-bytes_out = orig_ip_bytes AS bytes_out
FIELDALIAS-http_referrer = referrer AS http_referrer
FIELDALIAS-bytes_in = resp_ip_bytes AS bytes_in
FIELDALIAS-http_content_type = resp_mime_types AS http_content_type
FIELDALIAS-status = status_code AS status
FIELDALIAS-url = uri AS url
FIELDALIAS-http_user_agent = user_agent AS http_user_agent
FIELDALIAS-lease_duration = lease_time AS lease_duration
FIELDALIAS-dest_mac = mac AS dest_mac
FIELDALIAS-src_ip = id_orig_h AS src_ip
FIELDALIAS-src = id_orig_h AS src
FIELDALIAS-src_port = id_orig_p AS src_port
FIELDALIAS-dest_ip = id_resp_h AS dest_ip
FIELDALIAS-dest = id_resp_h AS dest
FIELDALIAS-dest_port = id_resp_p AS dest_port
FIELDALIAS-session_id = uid AS session_id
FIELDALIAS-ssl_subject_common_name = certificate_cn AS ssl_subject_common_name
FIELDALIAS-ssl_issuer = certificate_issuer AS ssl_issuer
FIELDALIAS-ssl_publickey_algorithm = certificate_key_alg AS ssl_publickey_algorithm
FIELDALIAS-ssl_end_time = certificate_not_valid_after AS ssl_end_time
FIELDALIAS-ssl_start_time = certificate_not_valid_before AS ssl_start_time
FIELDALIAS-ssl_serial = certificate_serial AS ssl_serial
FIELDALIAS-ssl_signature_algorithm = certificate_sig_alg AS ssl_signature_algorithm
FIELDALIAS-ssl_subject = certificate_subject AS ssl_subject
FIELDALIAS-ssl_version = certificate_version AS ssl_version
FIELDALIAS-ssl_session_id = uid AS ssl_session_id
FIELDALIAS-message_id = msgid AS message_id
FIELDALIAS-orig_src = mail_from AS orig_src
FIELDALIAS-src_user = from AS src_user
FIELDALIAS-orig_recipient = rcpt_to AS orig_recipient
FIELDALIAS-recipient = to AS recipient
EVAL-authority_answer_count = total_replies - total_answers
EVAL-message_type = if (saw_query == "true" AND saw_reply == "true", "Query and Response",  if(saw_query == "true", "Query", "Response"))
EVAL-query_type = qtype_name
EVAL-bytes = orig_ip_bytes + resp_ip_bytes
EVAL-http_user_agent_length = len(user_agent)
EVAL-url_length = len(uri)
EVAL-packets = orig_pkts + resp_pkts
EVAL-vendor_product = "vectra_stream"
EXTRACT-host_header_http = host="(?P<host_header>[^ (]+)"
TRANSFORMS-changesourcetype = set_sourcetype_stream_isession, set_sourcetype_stream_dns
REPORT-email = smtp_to, smtp_rcpt_to, smtp_cc, smtp_from, smtp_mail_from
REPORT-x509 = x509_san

[bro_conn]
SHOULD_LINEMERGE = false
TIME_FORMAT = %s%3N
TIME_PREFIX = \sts="
MAX_TIMESTAMP_LOOKAHEAD = 13
FIELDALIAS-tcp_flag = conn_state AS tcp_flag
FIELDALIAS-src_ip = id_orig_h AS src_ip
FIELDALIAS-src = id_orig_h AS src
FIELDALIAS-src_port = id_orig_p AS src_port
FIELDALIAS-dest_ip = id_resp_h AS dest_ip
FIELDALIAS-dest = id_resp_h AS dest
FIELDALIAS-dest_port = id_resp_p AS dest_port
FIELDALIAS-bytes_out = orig_ip_bytes AS bytes_out
FIELDALIAS-packets_out = orig_pkts AS packets_out
FIELDALIAS-vlan = orig_vlan_id AS vlan
FIELDALIAS-transport = protoName AS transport
FIELDALIAS-bytes_in = resp_ip_bytes AS bytes_in
FIELDALIAS-packets_in = resp_pkts AS packets_in
FIELDALIAS-app = service AS app
FIELDALIAS-session_id = uid AS session_id
EVAL-bytes = orig_ip_bytes + resp_ip_bytes
EVAL-packets = orig_pkts + resp_pkts
EVAL-vendor_product = "vectra_stream"

[bro_dns]
SHOULD_LINEMERGE = false
TIME_FORMAT = %s%3N
TIME_PREFIX = \sts="
MAX_TIMESTAMP_LOOKAHEAD = 13
FIELDALIAS-ttl = TTLs AS ttl
FIELDALIAS-answer = answers AS answer
FIELDALIAS-src_ip = id_orig_h AS src_ip
FIELDALIAS-src = id_orig_h AS src
FIELDALIAS-src_port = id_orig_p AS src_port
FIELDALIAS-dest = id_resp_h AS dest
FIELDALIAS-dest_ip = id_resp_h AS dest_ip
FIELDALIAS-dest_port = id_resp_p AS dest_port
FIELDALIAS-transport = proto AS transport
FIELDALIAS-record_class = qclass_name AS record_class
FIELDALIAS-record_type = qtype_name AS record_type
FIELDALIAS-reply_code_id = rcode AS reply_code_id
FIELDALIAS-reply_code = rcode_name AS reply_code
FIELDALIAS-answer_count = total_replies AS answer_count
FIELDALIAS-transaction_id = trans_id AS transaction_id
EVAL-authority_answer_count = total_replies - total_answers
EVAL-message_type = if (saw_query == "true" AND saw_reply == "true", "Query and Response",  if(saw_query == "true", "Query", "Response"))
EVAL-query_type = qtype_name
EVAL-bytes = orig_ip_bytes + resp_ip_bytes
EVAL-packets = orig_pkts + resp_pkts
EVAL-vendor_product = "vectra_stream"
