[set_sourcetype_stream_dns]
REGEX = .*\ METADATA_DNS\ .*
FORMAT = sourcetype::bro_dns
DEST_KEY = MetaData:Sourcetype

[set_sourcetype_stream_isession]
REGEX = .*\ METADATA_ISESSION\ .*
FORMAT = sourcetype::bro_conn
DEST_KEY = MetaData:Sourcetype

[smtp_to]
REGEX = .*\ METADATA_SMTP\ .* to=([^\s]+)
FORMAT = to::$1

[smtp_rcpt_to]
REGEX = .*\ METADATA_SMTP\ .* rcpt_to=([^\s]+)
FORMAT = rcpt_to::$1

[smtp_from]
REGEX = .*\ METADATA_SMTP\ .* from=([^\s]+)
FORMAT = from::$1

[smtp_cc]
REGEX = .*\ METADATA_SMTP\ .* cc=([^\s]+)
FORMAT = cc::$1

[smtp_mail_from]
REGEX = .*\ METADATA_SMTP\ .* mail_from=([^\s]+)
FORMAT = mail_from::$1

[x509_san]
REGEX = .*\ METADATA_X509\ .* san.dns=([^\s]+)
FORMAT = san.dns::$1


