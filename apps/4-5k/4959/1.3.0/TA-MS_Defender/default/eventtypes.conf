[ms_defender_incident]
search = `defender_index` (sourcetype=m365:defender:incident)

[ms_defender_atp_alert]
search = `defender_atp_index` (sourcetype=ms:defender:atp:alerts)

[ms_defender_advanced_hunting_sourcetypes]
search = sourcetype="m365:defender:incident:advanced_hunting"

[ms_defender_advanced_hunting_process]
search = eventtype="ms_defender_advanced_hunting_sourcetypes" $table="DeviceProcessEvents"
#tags process report

[ms_defender_advanced_hunting_network]
search = eventtype="ms_defender_advanced_hunting_sourcetypes" $table="DeviceNetworkEvents"
#tags network communicate port listening

[ms_defender_advanced_hunting_filesystem]
search = eventtype="ms_defender_advanced_hunting_sourcetypes" $table="DeviceFileEvents"
#tags change endpoint filesystem

[ms_defender_advanced_hunting_registry]
search = eventtype="ms_defender_advanced_hunting_sourcetypes" $table="DeviceRegistryEvents"
#tags change endpoint registry

