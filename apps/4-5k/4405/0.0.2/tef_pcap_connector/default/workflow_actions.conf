[tef_src]
display_location = event_menu
fields = src_ip
label = Search Pandion with SRC IP $src_ip$
link.method = get
link.target = blank
link.uri = https://threateyeforensics/#/search/<Your Pandion UUID>?nsbpf_query=src host $src_ip$&from_time=$timestamp$&to_time=%2B300
type = link

