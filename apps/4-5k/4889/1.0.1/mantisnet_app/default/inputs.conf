# ---------------------------------------------------------------------
# Common Properties (inherited by or can be overidden by child stanzas)
# ---------------------------------------------------------------------

[mantisnet_kafka]

# if you want to change the default index, ensure you also change the gobal index used for searches in default/macros.conf in the 'mantisnet_index' stanza
index = main

# custom message handler for processing raw messages received off topics
message_handler_impl = com.mantisnet.modinput.kafka.BodyOnlyMessageHandler

# default logging level
log_level=INFO

# described here : https://docs.splunk.com/Documentation/Splunk/8.0.1/Admin/Inputsconf
start_by_shell = false

# the password for this username is encrypted via the app's setup page
username = 

bootstrap_server = **KAFKA SERVER LIST**

host = mantisnet_kafka

output_type = stdout

# ---------------------------------
# Properties for each Kafka topic
# ---------------------------------

[mantisnet_kafka://syzygy]
topic_name = mantis-ppe-wf
group_id = mantisnet_dns
disabled = 1
sourcetype = mantisnet_dns


# -----------------------------------------------------------
# Scripted Inputs used to populate local CSV lookup files
# Better performance than using external lookup scripts
# -----------------------------------------------------------

[script://./bin/public_dns_lookup.py]
interval = 300
passAuth = splunk-system-user
disabled = 1



