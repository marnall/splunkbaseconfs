[script:mltk_container_configure]
match = /mltk-container-ja/configure
scripttype = python
python.version = python3
handler = configure_handler.ConfigureHandler
output_modes = json
passSystemAuth = true
capability = configure_mltk_container or admin_all_objects

[script:mltk_container_images]
match = /mltk-container-ja/images
scripttype = python
python.version = python3
handler = images_handler.ImagesHandler
output_modes = json
passSystemAuth = true
capability = list_mltk_container or admin_all_objects

[script:mltk_container_status]
match = /mltk-container-ja/status
scripttype = python
python.version = python3
handler = status_handler.StatusHandler
output_modes = json
passSystemAuth = true
capability = list_mltk_container or admin_all_objects

