[expose:mltk_container_configure]
pattern = mltk-container-ja/configure
methods = POST,GET

[expose:mltk_container_status]
pattern = mltk-container-ja/status
methods = GET

[expose:mltk_container_start]
pattern = mltk-container-ja/start
methods = POST

[expose:mltk_container_stop]
pattern = mltk-container-ja/stop
methods = POST

[expose:mltk_container_logs]
pattern = mltk-container-ja/logs/*
methods = GET
