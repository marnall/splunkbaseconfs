# Provides most recent incidents state and renames columns for readbility 
[Incidents]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
display.events.fields = ["host","source","sourcetype","signatureId","extension","fields","externalId","incidentSeverity"]
display.events.type = table
display.visualizations.charting.chart = pie
display.visualizations.show = 0
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = sourcetype="preempt_cef"\
| dedup externalId\
| where eventCategory="incidents"\
| rename incidentSeverity AS Severity\
| rename incidentStatus as Status\
| rename cs1 as Link\
| rename eventName AS "Incident Type"\
| rename suser AS "User Involved"\
| rename shost AS "Endpoint Involved"\
| rename externalId as "Id"
