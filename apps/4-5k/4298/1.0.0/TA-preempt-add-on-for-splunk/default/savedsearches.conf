# Provides all incidents' severities in a table
[Incidents Severities]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
display.events.fields = ["host","source","sourcetype","signatureId","extension","fields","externalId","incidentSeverity","Last Update Time","Last Updated Time"]
display.events.type = table
display.general.type = visualizations
display.page.search.tab = visualizations
display.statistics.show = 0
display.visualizations.charting.chart.showDataLabels = all
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = | savedsearch Incidents | chart count by Severity

