# Preempt data source
[preempt_cef]
SHOULD_LINEMERGE = 0
TIME_FORMAT = %b %d %Y %H:%M:%S %Z
TIME_PREFIX = end=
category = Network & Security
description = Output produced by Preempt Platform
pulldown_type = 1
REPORT-preempt-cef-basic-extraction = preempt-cef-transform
LOOKUP-signatureId_to_event_category = preempt_event_category_vs_signature_id signatureId AS signatureId OUTPUT eventCategory AS eventCategory eventName AS eventName
LOOKUP-status_to_incident_status = preempt_Status_vs_incidentStatus Status AS cs2 OUTPUT incidentStatus AS incidentStatus
LOOKUP-severity_to_incident_severity = preempt_severity_vs_incident_severity severity AS severity OUTPUT incidentSeverity AS incidentSeverity
