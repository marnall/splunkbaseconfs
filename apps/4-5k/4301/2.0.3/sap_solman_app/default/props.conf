[sap_metrics_json]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
NO_BINARY_CHECK = true
TIMESTAMP_FIELDS = _time
TIME_FORMAT = %s
TZ = GMT
category = Metrics
pulldown_type = 1
disabled = false

[sap_solman_internal]
TRUNCATE = 15000
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = true
TZ = UTC
TIME_FORMAT = %Y-%m-%dT%H:%M:%S:%3N
BREAK_ONLY_BEFORE = (\d{0,5}-\d*-\d*\w\d{1,3}:\d{1,3}:\d{1,4}\.\d{1,4}\w)
NO_BINARY_CHECK = true
category = Custom
disabled = false
EXTRACT-loglevel = ^[^ \n]* (?P<log_level>\w+\s+)
EXTRACT-logger_name = ^(?:[^ \n]* ){2}(?P<logger_name>[^ ]+)
EXTRACT-filename = ^[^\[\n]*\[(?P<filename>[^:]+)
EXTRACT-lineno = ^(?:[^:\n]*:){3}(?P<lineno>\d+)
KV_MODE = auto
SEDCMD-anon = s/(Authorization:\s+[^\s]+\s+).+/\1XXXXXXXXXXXXXXXXXXX/g