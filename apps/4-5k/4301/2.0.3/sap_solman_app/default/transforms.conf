[odata_metrics]
external_type = kvstore
collection = odata_metrics
fields_list = _key, SystemId, SystemName, MetricName, Enabled, EventName, CalcTimeFrame, Category, Direction, Greentored, Greentoyellow, MetricDatatype, MoType, ObjectType, Period, PeriodUnit, Rating, Redtoyellow, RuleClass, RuleType, Threshold, Unit, Watermark, Yellowtogreen, Yellowtored

[odata_systems]
external_type = kvstore
collection = odata_systems
fields_list = _key, SystemId, SystemName

[odata_checkpoint]
external_type = kvstore
collection = odata_checkpoint
fields_list = _key, system_name, unix_timestamp
