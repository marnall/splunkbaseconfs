#
# Splunk app KV Store transforms file
#

[PerseusConfiguration]
external_type = kvstore
collection = PerseusConfiguration
#strConfigSettingName is the _key
fields_list = _key, strConfigSettingValue, dtConfigTime

#User Writeable
[PerseusManagementLog]
external_type = kvstore
collection = PerseusManagementLog
fields_list = _key, strOperation, nReturnCode, strMessage, dtExecutionTime

[PerseusHealth]
external_type = kvstore
collection = PerseusHealth
fields_list = _key, strOperation, dtOperationTime, nOperationStatus

[PerseusIntegrationCredentials]
external_type = kvstore
collection = PerseusIntegrationCredentials
#We don't key off IntegrationName so we can support multiple keys per integration
fields_list = _key, strIntegrationName, strIntegrationApiKey, strIntegrationApiKeyFunction, strIntegrationApiKeyInfo, dtCreationTime, dtLastUseTime

[PerseusIntegrationAuthInfo]
external_type = kvstore
collection = PerseusIntegrationAuthInfo
fields_list = _key, strIntegrationName, strIntegrationApiKey, dtCreationTime

[PerseusLocationLookup]
filename = PerseusLocationLookup.csv
collection = PerseusLocationLookup
#strLocGuid is the _key
fields_list = _key, nLocType, nLocAutoExecType, strLocDisplayName, strLocFullPath

[PerseusHostInfo]
external_type = kvstore
collection = PerseusHostInfo
#host is the _key
fields_list = _key, LastReportTime, ComputerName, DomainName, HardwareIdentifier, ContactEmailAddress, OSArchitecture, MajorVersion, MinorVersion, SPMajorVersion, SPMinorVersion, PerseusAgentVersion, PerseusReporterVersion, IPV4IpAddress, PublicIpAddress

[PerseusHostInfoFirstContact]
external_type = kvstore
collection = PerseusHostInfoFirstContact
#host is the _key
fields_list = _key, FirstReportTime

#User Writeable
[UnauthorizedModsEventExceptions]
external_type = kvstore
collection = UnauthorizedModsEventExceptions
#strEventID cannot be the key because often times these entries don't even use it
#IMPORTANT NOTE: If you modify the fields_list, update UnauthorizedModsEventMasterExceptions1/2 below and Process_UM_Install.py to reflect the changes
fields_list = _key, strEventID, strHostGuid, strLocGuid, strLocUser, nLocEntryType, strLocEntryName, strLocEntryData, strLocEntryOriginalData, strLocAEFRawString, strLocAEFMD5, strInstallKey, nVisibility, dtCreationDate, strSplunkUser

#We split this into multiple to deal with the 50000 append limit
[UnauthorizedModsEventMasterExceptions1]
filename = UnauthorizedModsEventMasterExceptions1.csv
collection = UnauthorizedModsEventMasterExceptions1
index_fields_list = strEventID, strHostGuid, strLocGuid, strLocUser, nLocEntryType, strLocEntryName, strLocEntryData, strLocEntryOriginalData, strLocAEFRawString, strLocAEFMD5, strInstallKey, nVisibility, dtCreationDate, strSplunkUser

#We split this into multiple to deal with the 50000 append limit
[UnauthorizedModsEventMasterExceptions2]
filename = UnauthorizedModsEventMasterExceptions2.csv
collection = UnauthorizedModsEventMasterExceptions2
index_fields_list = strEventID, strHostGuid, strLocGuid, strLocUser, nLocEntryType, strLocEntryName, strLocEntryData, strLocEntryOriginalData, strLocAEFRawString, strLocAEFMD5, strInstallKey, nVisibility, dtCreationDate, strSplunkUser

#User Writeable
[UnauthorizedModsEventVisibility]
external_type = kvstore
#strEventID is the _key
fields_list = _key, nVisibility

#User Writeable
[UnauthorizedModsPreviouslyViewed]
external_type = kvstore
collection = UnauthorizedModsPreviouslyViewed
#strEventID is the _key
fields_list = _key, dtTimeViewed
 
#User Writeable
[UnauthorizedModsCleanInfo]
external_type = kvstore
collection = UnauthorizedModsCleanInfo
#No Unique field(s), so we do not explicitly set a _key (Event can appear multiple times in different cleans)
fields_list = _key, strHostGuid, strEventGuid, strCleanInstallKey, strCategoryTags, dtCreationDate, dtPendingDate, dtCompletionDate, strSplunkUser

#User Writeable
[InstallWhitelistLookup]
external_type = kvstore
collection = InstallWhitelistLookup
#No Unique field(s), so we do not explicitly set a _key
fields_list = _key, strHostGuid, strInstallName, strInstallNotes, strCategoryTags, dtCreationDate, strSplunkUser

#User Writeable
[InstallWhitelistEventLookup]
external_type = kvstore
collection = InstallWhitelistEventLookup
#No Unique field(s), so we do not explicitly set a _key
fields_list = _key, strInstallKey, strEventID

#User Writeable
[InstallCleanLookup]
external_type = kvstore
collection = InstallCleanLookup
#No Unique field(s), so we do not explicitly set a _key
fields_list = _key, strHostGuid, strInstallName, strInstallNotes, strCategoryTags, dtCreationDate, strSplunkUser

#User Writeable
[InstallCleanEventLookup]
external_type = kvstore
collection = InstallCleanEventLookup
#No Unique field(s), so we do not explicitly set a _key
fields_list = _key, strInstallKey, strEventID

#User Writeable
[VirusTotalMD5HashInfo]
external_type = kvstore
collection = VirusTotalMD5HashInfo
#strMD5Hash is the _key
fields_list = _key, nMaliciousScanCount, nTotalScanCount, nReputationScore, nGoodwareIndex, strPermaLink, dtReportLookupTime

#Standard Lookups

[WindowsVersionInfo]
filename = WindowsVersionInfo.csv
collection = WindowsVersionInfo
index_fields_list = MajorVersion, MinorVersion, SPMajorVersion, SPMinorVersion, OSArchitecture, VersionString

#Agentless Scripting

[PerseusHostExecutionGuidLookup]
external_type = kvstore
collection = PerseusHostExecutionGuidLookup
#strExecutionGuid is the _key
fields_list = _key, strHostGuid, dtExecutionGuidExpirationDate, strSplunkUser

[PerseusHostScriptLookup]
external_type = kvstore
collection = PerseusHostScriptLookup
#strScriptGuid is the _key
fields_list = _key, strHostGuid, strScriptText, dtCreationDate, dtPendingDate, dtCompletionDate, strSplunkUser

[PerseusFileRepo]
external_type = kvstore
collection = PerseusFileRepo
#strUploadGuid is the _key
#For acquisition uploads, the dtFileAssociatedDate is the acquisition stop time
fields_list = _key, strUploadType, strHostGuid, strFileName, strBase64FileContent, strFileMD5, dtFileAssociatedDate, dtUploadDate, strSplunkUser

[PerseusUtilityFileRepo]
external_type = kvstore
collection = PerseusUtilityFileRepo
#strUploadGuid is the _key
fields_list = _key, strUploadType, strFileName, strBase64FileContent, strFileMD5, dtUploadDate, strSplunkUser

#Agentless Data Source Processing

[PerseusHostDataSourceProcessingHistory]
external_type = kvstore
collection = PerseusHostDataSourceProcessingHistory
#Multiple entries can appear per host so there is no unique key, so we use the generated _key 
fields_list = _key, strHostGuid, strDataSource, dtProcessedTime

#Universal Registry Viewing

#User Writeable
[PerseusUniversalRegistrySnapshotInfo]
external_type = kvstore
collection = PerseusUniversalRegistrySnapshotInfo
#_key is a monotonically increasing Snapshot ID
fields_list = _key, nTotalHostsInSnapshot, dtSnapshotStartTime, dtSnapshotEndTime, strSplunkUser

#User Writeable
[PerseusUniversalRegistrySnapshotRawData]
external_type = kvstore
collection = PerseusUniversalRegistrySnapshotRawData
#Events can appear in multiple snapshots, so we use the generated _key
fields_list = _key, nSnapshotID, strHostGuid, strEventGuid, strPath, strObjectType, strObjectName, strObjectData, nRep, dtObjectEventTime

#User Writeable
[PerseusUniversalRegistrySnapshotPresentationData]
external_type = kvstore
collection = PerseusUniversalRegistrySnapshotPresentationData
#!TODO (OPTIONAL) - Add a strHostSpecificInteractionGuid?
#!TODO (OPTIONAL) - Add nHostsThatPathExistsOnWithObjectName, nHostsThatPathExistsOnWithObjectNameAndData, dtEarliestObjectCreation, dtLatestObjectCreation?
#!TODO (OPTIONAL) - Use _key as a reference to this specific object for later interactions like adding notes and such
#Path can appear in multiple snapshots, so we use the generated _key. Using a combined key (like Snapshot ID + strPath + strObjectName + strObjectType) but likely unideal
fields_list = _key, nSnapshotID, strPath, strObjectType, strObjectName, strObjectData, nRep, nHostsWithObjectName, nHostsWithObjectNameAndData

#User Writeable
[PerseusUniversalRegistrySnapshotPresentationKeyToEventsPrep]
external_type = kvstore
collection = PerseusUniversalRegistrySnapshotPresentationKeyToEventsPrep
#The key is a concatenation of the Path, Object Name and Type (appended on the end as |>$#)
fields_list = _key, strPresentationKey

#User Writeable
[PerseusUniversalRegistrySnapshotPresentationKeyToEventsLookup]
external_type = kvstore
collection = PerseusUniversalRegistrySnapshotPresentationKeyToEventsLookup
#No Unique Fields (1 to many mapping of the Presentation Key), so we use the generated _key
fields_list = _key, strPresentationKey, strEventGuid

#User Writeable
[PerseusUniversalRegistrySnapshotPresentationJson]
external_type = kvstore
collection = PerseusUniversalRegistrySnapshotPresentationJson
#!TODO (OPTIONAL) - We likely want the concept of views later and will need to concatenate SnapshotID with ViewID as the _key
#nSnapshotID is the _key
fields_list = _key, strJson

#Universal Drive Viewing

#User Writeable
[PerseusUniversalDriveSnapshotInfo]
external_type = kvstore
collection = PerseusUniversalDriveSnapshotInfo
#_key is a monotonically increasing Snapshot ID
fields_list = _key, nTotalHostsInSnapshot, dtSnapshotStartTime, dtSnapshotEndTime, strSplunkUser

#User Writeable
[PerseusUniversalDriveSnapshotRawData]
external_type = kvstore
collection = PerseusUniversalDriveSnapshotRawData
#Events can appear in multiple snapshots, so we use the generated _key
#This is not truly "raw" as we do replace the usernames in strAEFFile in order to aggregate those AEF Files and make event matching easier later
fields_list = _key, nSnapshotID, strHostGuid, strEventGuid, strAEFFile, nRep, dtObjectEventTime

#User Writeable
[PerseusUniversalDriveSnapshotPresentationData]
external_type = kvstore
collection = PerseusUniversalDriveSnapshotPresentationData
#!TODO (OPTIONAL) - Add a strHostSpecificInteractionGuid?
#!TODO (OPTIONAL) - Use _key as a reference to this specific object for later interactions like adding notes and such
#Path can appear in multiple snapshots, so we use the generated _key. Should we do a combined key like Snapshot ID + strAEFFile
fields_list = _key, nSnapshotID, strAEFFile, nRep, nHostsWithAEFFile

#User Writeable
[PerseusUniversalDriveSnapshotPresentationKeyToEventsPrep]
external_type = kvstore
collection = PerseusUniversalDriveSnapshotPresentationKeyToEventsPrep
#The key is the AEFFile
fields_list = _key, strPresentationKey

#User Writeable
[PerseusUniversalDriveSnapshotPresentationKeyToEventsLookup]
external_type = kvstore
collection = PerseusUniversalDriveSnapshotPresentationKeyToEventsLookup
#No Unique Fields (1 to many mapping of the Presentation Key), so we use the generated _key
fields_list = _key, strPresentationKey, strEventGuid

#User Writeable
[PerseusUniversalDriveSnapshotPresentationJson]
external_type = kvstore
collection = PerseusUniversalDriveSnapshotPresentationJson
#!TODO (OPTIONAL) - We likely want the concept of views later and will need to concatenate SnapshotID with ViewID as the _key
#nSnapshotID is the _key
fields_list = _key, strJson

#Recollection

#User Writeable
[PerseusCacheInfo]
external_type = kvstore
collection = PerseusCacheInfo
fields_list = _key, strCacheType, strSplunkUser, strHostGuid, dtLatestIndexTime, dtCreationTime, dtUpdatedTime, dtLatestAccessTime 

#User Writeable
[PerseusRecollectionEventsCache]
external_type = kvstore
collection = PerseusRecollectionEventsCache
fields_list = _key, host, time, Event_ID, Event_LocMod_LocModType, Event_LocMod_Location_LocGuid, Event_LocMod_Location_LocUser, Event_LocMod_LocEntry_EntryType, Event_LocMod_LocEntry_EntryName, Event_LocMod_LocEntry_EntryData, Event_LocMod_LocEntry_AutoExecFiles_AutoExecFile_AEFRawString, Event_LocMod_LocEntry_AutoExecFiles_AutoExecFile_AEFAttributes_AEFAttribute_AEFAttrMD5, Event_LocMod_ForensicMod_ForensicSource, Event_LocMod_ForensicMod_ForensicModType, Event_LocMod_ForensicMod_ExactFMTime, Event_LocMod_ForensicMod_EarliestFMTime, Event_LocMod_ForensicMod_LatestFMTime, Event_LocMod_ForensicMod_FirstEvent, Event_LocMod_ForensicMod_ForensicDescription

