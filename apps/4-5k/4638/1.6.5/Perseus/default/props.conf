[PerseusEventXml]
CHARSET = UNICODELITTLE
TIME_PREFIX = <DateTime>
MAX_TIMESTAMP_LOOKAHEAD = 128
MAX_DAYS_AGO = 10000
# A performance tweak is to disable SHOULD_LINEMERGE and then set the 
# LINE_BREAKER to "line ending characters coming before a new time stamp"
# (note the direct link of the TIME_FORMAT to the regex of LINE_BREAKER).
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
TZ = UTC
LINE_BREAKER = ([\r\n]+)<Event>
SHOULD_LINEMERGE = False
#While TRUNCATE can be set to unlimited size, it is not recommended. We will try 50000 Characters since we have some very long lines and monitor to make sure we aren't getting events this large
TRUNCATE = 50000
KV_MODE = xml
