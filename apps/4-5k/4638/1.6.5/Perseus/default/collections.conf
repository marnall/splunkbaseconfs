#
# Splunk app KV Store collection file
#

[PerseusConfiguration]
enforceTypes=true
field._key=string
field.strConfigSettingValue=string
field.dtConfigTime=time

[PerseusManagementLog]
enforceTypes=true
field.strOperation=string
field.nReturnCode=number
field.strMessage=string
field.dtExecutionTime=time

[PerseusHealth]
enforceTypes=true
field.strOperation=string
field.dtOperationTime=time
field.nOperationStatus=int

[PerseusIntegrationCredentials]
enforceTypes=true
field.strIntegrationName=string
field.strIntegrationApiKey=string
field.strIntegrationApiKeyFunction=string
field.strIntegrationApiKeyInfo=string
field.dtCreationTime=time
field.dtLastUseTime=time

[PerseusIntegrationAuthInfo]
enforceTypes=true
field.strIntegrationName=string
field.strIntegrationApiKey=string
field.dtCreationTime=time

[PerseusHostInfo]
enforceTypes=true
field._key=string
field.LastReportTime=time
field.ComputerName=string
field.DomainName=string
field.HardwareIdentifier=string
field.ContactEmailAddress=string
field.OSArchitecture=string
field.MajorVersion=number
field.MinorVersion=number
field.SPMajorVersion=number
field.SPMinorVersion=number
field.PerseusAgentVersion=number
field.PerseusReporterVersion=number
field.IPV4IpAddress=string
field.PublicIpAddress=string
#!TODO (OPTIONAL) - PERFORMANCE - Might want to add accelerations for LastReportTime, Computer+Domain, IP Addresses

[PerseusHostInfoFirstContact]
enforceTypes=true
field._key=string
field.FirstReportTime=time
#!TODO (OPTIONAL) - PERFORMANCE - May want to add an acceleration for FirstReportTime accelerated_fields.my_accel = {"FirstReportTime": 1}

#User Writeable
[UnauthorizedModsEventExceptions]
enforceTypes=true
field.strEventID=string
field.strHostGuid=string
field.strLocGuid=string
field.strLocUser=string
field.nLocEntryType=number
field.strLocEntryName=string
field.strLocEntryData=string
field.strLocEntryOriginalData=string
field.strLocAEFRawString=string
field.strLocAEFMD5=string
field.strInstallKey=string
field.strLocDisplayName=string
field.strLocFullPath=string
field.nVisibility=number
field.dtCreationDate=time
field.strSplunkUser=string
#!TODO (OPTIONAL) - Accelerations on the common search fields?

#Standard Lookups that allow us to provide preconfigured whitelists in the Perseus install
[UnauthorizedModsEventMasterExceptions1]
[UnauthorizedModsEventMasterExceptions2]

#User Writeable
[UnauthorizedModsEventVisibility]
enforceTypes=true
field._key=string
field.nVisibility=number

#User Writeable
[UnauthorizedModsPreviouslyViewed]
enforceTypes=true
field._key=string
field.dtTimeViewed=time

#This stores a list of all Unauthorized Mods that have been scheduled for cleaning
#User Writeable
[UnauthorizedModsCleanInfo]
enforceTypes=true
field.strHostGuid=string
field.strEventGuid=string
field.strCleanInstallKey=string
field.strCategoryTags=string
field.dtCreationDate=time
field.dtPendingDate=time
field.dtCompletionDate=time
field.strSplunkUser=string

#User Writeable
[InstallWhitelistLookup]
enforceTypes=true
field.strHostGuid=string
field.strInstallName=string
field.strInstallNotes=string
field.strCategoryTags=string
field.dtCreationDate=time
field.strSplunkUser=string

#User Writeable
[InstallWhitelistEventLookup]
enforceTypes=true
field.strInstallKey=string
field.strEventID=string

#User Writeable
[InstallCleanLookup]
enforceTypes=true
field.strHostGuid=string
field.strInstallName=string
field.strInstallNotes=string
field.strCategoryTags=string
field.dtCreationDate=time
field.strSplunkUser=string

#User Writeable
[InstallCleanEventLookup]
enforceTypes=true
field.strInstallKey=string
field.strEventID=string

[VirusTotalMD5HashInfo]
enforceTypes=true
field._key=string
field.nMaliciousScanCount=number
field.nTotalScanCount=number
field.nReputationScore=number
field.nGoodwareIndex=number
field.strPermaLink=string
field.dtReportLookupTime=time

#Standard Lookups

[WindowsVersionInfo]
enforceTypes=true
field.MajorVersion=number
field.MinorVersion=number
field.SPMajorVersion=number
field.SPMinorVersion,=number
field.OSArchitecture=number
field.OSVersionString=string

[PerseusLocationLookup]
enforceTypes=true
field.nLocType=number
field.nLocAutoExecType=number
field.strLocDisplayName=string
field.strLocFullPath=string

#Agentless Scripting

[PerseusHostExecutionGuidLookup]
enforceTypes=true
field._key=string
field.strHostGuid=string
field.dtExecutionGuidExpirationDate=time
field.strSplunkUser=string

[PerseusHostScriptLookup]
enforceTypes=true
field._key=string
field.strHostGuid=string
field.strScriptText=string
field.dtCreationDate=time
field.dtPendingDate=time
field.dtCompletionDate=time
field.strSplunkUser=string

[PerseusFileRepo]
enforceTypes=true
field._key=string
field.strUploadType=string
field.strHostGuid=string
field.strFileName=string
field.strBase64FileContent=string
field.strFileMD5=string
field.dtFileAssociatedDate=time
field.dtUploadDate=time
field.strSplunkUser=string

[PerseusUtilityFileRepo]
enforceTypes=true
field._key=string
field.strUploadType=string
field.strFileName=string
field.strBase64FileContent=string
field.strFileMD5=string
field.dtUploadDate=time
field.strSplunkUser=string

#Agentless Data Source Processing

[PerseusHostDataSourceProcessingHistory]
enforceTypes=true
field.strHostGuid=string
field.strDataSource=string
field.dtProcessedTime=time

#Universal Registry Viewing

[PerseusUniversalRegistrySnapshotInfo]
enforceTypes=true
field.nTotalHostsInSnapshot=number
field.dtSnapshotStartTime=time
field.dtSnapshotEndTime=time
field.strSplunkUser=string

[PerseusUniversalRegistrySnapshotRawData]
enforceTypes=true
field.nSnapshotID=number
field.strHostGuid=string
field.strEventGuid=string
field.strPath=string
field.strObjectType=string
field.strObjectName=string
field.strObjectData=string
field.nRep=number
field.dtObjectEventTime=time
accelerated_fields.my_accel = {"nSnapshotID": 1}

[PerseusUniversalRegistrySnapshotPresentationData]
enforceTypes=true
field.nSnapshotID=number
field.strPath=string
field.strObjectType=string
field.strObjectName=string
field.strObjectData=string
field.nRep=number
field.nHostsWithObjectName=number
field.nHostsWithObjectNameAndData=number

[PerseusUniversalRegistrySnapshotPresentationKeyToEventsPrep]
enforceTypes=true
field.strPresentationKey=string

[PerseusUniversalRegistrySnapshotPresentationKeyToEventsLookup]
enforceTypes=true
field.strPresentationKey=string
field.strEventGuid=string
accelerated_fields.my_accel = {"strPresentationKey": 1}

[PerseusUniversalRegistrySnapshotPresentationJson]
enforceTypes=true
#nSnapshotID is the _key but _key cannot be a number, so we use string
field._key=string
field.strJson=string

#Universal Drive Viewing

[PerseusUniversalDriveSnapshotInfo]
enforceTypes=true
field.nTotalHostsInSnapshot=number
field.dtSnapshotStartTime=time
field.dtSnapshotEndTime=time
field.strSplunkUser=string

[PerseusUniversalDriveSnapshotRawData]
enforceTypes=true
field.nSnapshotID=number
field.strHostGuid=string
field.strEventGuid=string
field.strAEFFile=string
field.nRep=number
field.dtObjectEventTime=time
accelerated_fields.my_accel = {"nSnapshotID": 1}

[PerseusUniversalDriveSnapshotPresentationData]
enforceTypes=true
field.nSnapshotID=number
field.strAEFFile=string
field.nRep=number
field.nHostsWithAEFFile=number

[PerseusUniversalDriveSnapshotPresentationKeyToEventsPrep]
enforceTypes=true
field.strPresentationKey=string

[PerseusUniversalDriveSnapshotPresentationKeyToEventsLookup]
enforceTypes=true
field.strPresentationKey=string
field.strEventGuid=string
accelerated_fields.my_accel = {"strPresentationKey": 1}

[PerseusUniversalDriveSnapshotPresentationJson]
enforceTypes=true
#nSnapshotID is the _key but _key cannot be a number, so we use string
field._key=string
field.strJson=string

[PerseusCacheInfo]
enforceTypes=true,
field._key=string,
field.strCacheType=string
field.strSplunkUser=string
field.strHostGuid=string
field.dtLatestIndexTime=time,
field.dtCreationTime=time,
field.dtUpdatedTime=time,
field.dtLatestAccessTime=time

[PerseusRecollectionEventsCache]
enforceTypes=true,
field._key=string,
field.host=string,
field.time=time,
field.Event_ID=string,
field.Event_LocMod_LocModType=string,
field.Event_LocMod_Location_LocGuid=string,
field.Event_LocMod_Location_LocUser=string,
field.Event_LocMod_LocEntry_EntryType=string,
field.Event_LocMod_LocEntry_EntryName=string,
field.Event_LocMod_LocEntry_EntryData=string,
field.Event_LocMod_LocEntry_AutoExecFiles_AutoExecFile_AEFRawString=string,
field.Event_LocMod_LocEntry_AutoExecFiles_AutoExecFile_AEFAttributes_AEFAttribute_AEFAttrMD5=string,
field.Event_LocMod_ForensicMod_ForensicSource=string,
field.Event_LocMod_ForensicMod_ForensicModType=string,
field.Event_LocMod_ForensicMod_ExactFMTime=string,
field.Event_LocMod_ForensicMod_EarliestFMTime=time,
field.Event_LocMod_ForensicMod_LatestFMTime=time,
field.Event_LocMod_ForensicMod_FirstEvent=string,
field.Event_LocMod_ForensicMod_ForensicDescription=string

