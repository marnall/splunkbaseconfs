#The Perseus Health Check Scheduled Search will start this after a restart of the Splunk Server
[Scheduled_Script_PerseusMD5]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
cron_schedule = 0 8 * * *
description = This processes Unauthorized Modification Events MD5
dispatch.earliest_time = -1d@h
dispatch.latest_time = now
enableSched = 1
#We try to force this to run precisely at the same time every day to prevent potential overlap with a previous run
schedule_window = 0
search = head 0 | script PerseusMD5 -Scheduled -UseSession

