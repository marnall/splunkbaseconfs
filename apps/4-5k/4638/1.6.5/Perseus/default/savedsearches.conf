[Scheduled_Script_PerseusHealthCheck]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
cron_schedule = 0 * * * *
description = This conducts a health check of Perseus to ensure Perseus routines are working properly
dispatch.earliest_time = -1d@h
dispatch.latest_time = now
enableSched = 1
schedule_window = auto
search = head 0 | script PerseusHealth -UseSession

[Scheduled_Script_PerseusUMProcess]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
cron_schedule = */5 * * * *
description = This processes Unauthorized Modification Events
dispatch.earliest_time = -1d@h
dispatch.latest_time = now
enableSched = 1
schedule_window = auto
search = head 0 | script PerseusUMProcess -UseSession -index_earliest -60m

[Scheduled_Script_PerseusUMProcess_All_Time]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
cron_schedule = 0 8 * * *
description = This processes Unauthorized Modification Events for every event. This ensures if previous events were missed, they will be processed daily by this routine
dispatch.earliest_time = -1d@h
dispatch.latest_time = now
enableSched = 1
schedule_window = auto
search = head 0 | script PerseusUMProcess -UseSession

#NOTE: If this is changed, Update ModificationWhitelist.js
#This needs to be a scheduled search but remains disabled until Unauthorized Modification Exceptions are removed by a user. It then runs once and sets itself to disabled
[Scheduled_Script_PerseusUMProcess_Recreate]
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
#Run This Before Scheduled_Script_PerseusUMProcess_All_Time
cron_schedule = 0 6 * * *
description = This clears all existing Unauthorized Modification Exception data and re-processes Unauthorized Modification Events for every event. This should be used after removing Unauthorized Modification Exceptions
disabled = 1
dispatch.earliest_time = -1d@h
dispatch.latest_time = now
enableSched = 1
schedule_window = auto
search = head 0 | script PerseusUMProcess -UseSession -Recreate

