args = macroBaseSearchIn, hostGuidIn, searchTermIn
#We do a .default replacement of blank Event.LocMod.Location.LocUser because the baseline entries in user-specific locations do not specify a user in the event
definition = `PerseusGetRecollectionRegistryModsBase($macroBaseSearchIn$, $hostGuidIn$, $searchTermIn$)` | rename Event.ID as strEventGuid, strLocFullPath AS strPath, Event.LocMod.LocEntry.EntryType AS strObjectType, Event.LocMod.LocEntry.EntryName AS strObjectName, Event.LocMod.LocEntry.EntryData AS strObjectData, Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFRawString AS strEntryLaunches, Reputation AS nRep, _time AS dtObjectEventTime | eval strPath = case(isnotnull('Event.LocMod.Location.LocFullPath'), case(nLocType == 0, "HKEY_LOCAL_MACHINE\\" . lower(substr('Event.LocMod.Location.LocFullPath', 20)), 1==1, "HKEY_CURRENT_USER\\" . lower(substr('Event.LocMod.Location.LocFullPath', 19))), nLocType == 0, strPath, 1==1, "HKEY_CURRENT_USER\\" . COALESCE(lower('Event.LocMod.Location.LocUser'), ".default") . "\\" . substr(strPath, 19)) | eval strPathAndObject = strPath . "\\" . lower(strObjectName) | sort 0 strPathAndObject | table dtObjectEventTime, strEventGuid, strObjectType, strObjectName, nRep, strPath, strObjectData, strEntryLaunches, nVisibility, nLocAutoExecType
iseval = 0

[PerseusGetRecollectionFileModsBase(3)]
args = macroBaseSearchIn, hostGuidIn, searchTermIn
#We do search instead of a WHERE clause so that the subsearch is handled properly
definition = `PerseusGetRecollectionModsBase($macroBaseSearchIn$, $hostGuidIn$, $searchTermIn$)` | search (Event.LocMod.LocEntry.EntryType = 4 OR Event.LocMod.LocEntry.EntryType = 5) AND (nLocAutoExecType != 4)
iseval = 0

[PerseusGetRecollectionFileMods(3)]
args = macroBaseSearchIn, hostGuidIn, searchTermIn
#TODO (OPTIONAL) - Add replacement of environment variables (or have Perseus Engine pre-replace them). Also handle files that trigger others like links/tasks files (this results in multiple Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFRawString in the case of tasks files)
definition = `PerseusGetRecollectionFileModsBase($macroBaseSearchIn$, $hostGuidIn$, $searchTermIn$)` | eval strPath = coalesce('Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFRawString', 'Event.LocMod.LocEntry.EntryName') | eval strPath=case( ((substr(strPath, 1, 1) == "\"") AND (substr(strPath, 3, 1) == ":")), substr(strPath, 2, len(strPath) - 2), substr(strPath, 2, 1) == ":", strPath, nLocType == 2, strLocFullPath . "\\" . strPath, 1==1, substr(strLocFullPath, 0, nLocType) . 'Event.LocMod.Location.LocUser' . substr(strLocFullPath, nLocType + 5) . "\\" . strPath) | rename Event.ID as strEventGuid, Event.LocMod.LocEntry.EntryType AS strObjectType, Reputation AS nRep, _time AS dtObjectEventTime | eval strPath = lower(strPath) | sort 0 strPath | table dtObjectEventTime, strEventGuid, strObjectType, nRep, strPath, nVisibility, nLocAutoExecType
iseval = 0

[PerseusGetRecollectionForensicModsBase(3)]
args = macroBaseSearchIn, hostGuidIn, searchTermIn
#We do search instead of a WHERE clause so that the subsearch is handled properly
definition = `PerseusGetRecollectionModsBase($macroBaseSearchIn$, $hostGuidIn$, $searchTermIn$)` | search Event.LocMod.ForensicMod.ForensicSource=* 
iseval = 0

[PerseusGetRecollectionForensicMods(3)]
args = macroBaseSearchIn, hostGuidIn, searchTermIn
#We do search instead of a WHERE clause so that the subsearch is handled properly
#TODO (OPTIONAL) - Add replacement of environment variables (or have Perseus Engine pre-replace them). Also handle files that trigger others like links/tasks files
#------------------------------------#
#!NOTE: If we add new fields that are returned by this table, add them to Perseus_Cache.py RecollectionModsCache.createCacheForHost
definition = `PerseusGetRecollectionForensicModsBase($macroBaseSearchIn$, $hostGuidIn$, $searchTermIn$)` | sort 0 strLocDisplayName, Event.LocMod.Location.LocUser, -_time | table strLocDisplayName, Event.LocMod.Location.LocUser, Event.LocMod.ForensicMod.ForensicModType, Event.LocMod.ForensicMod.ForensicSource, Event.LocMod.LocEntry.EntryName, Event.LocMod.ForensicMod.EarliestFMTime, Event.LocMod.ForensicMod.LatestFMTime, Event.LocMod.ForensicMod.FirstEvent, Reputation
#------------------------------------#
iseval = 0

[GetSplunkRelativeTimeLengthInSeconds(1)]
args = splunkRelativeTimeStringIn
definition = makeresults | eval strRelativeTime = case(substr("$splunkRelativeTimeStringIn$", 1, 1) == "+", "$splunkRelativeTimeStringIn$", substr("$splunkRelativeTimeStringIn$", 1, 1) == "-", "$splunkRelativeTimeStringIn$", 1==1, "+" . "$splunkRelativeTimeStringIn$") | eval intervalInSeconds = floor(abs(relative_time(now(), "+0s") - relative_time(now(), strRelativeTime))) | table intervalInSeconds
iseval = 0

