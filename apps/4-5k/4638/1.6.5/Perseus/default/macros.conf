[PerseusIndex]
#!STANDARD: definition = index=perseus_event
#!DEMO: 
definition = inputlookup PerseusDemoEvents.csv | addinfo | eval info_max_time=if(info_max_time="+Infinity", 2147483647, info_max_time) | WHERE ((_time >= COALESCE(info_min_time, 0)) AND (_time <= COALESCE(info_max_time, 2147483647)) ) | sort 0 -_time | search
iseval = 0

[GetUserTimeZoneOffsetInSeconds]
definition = makeresults | eval timeZoneOffsetInSeconds = tonumber(strftime(time(),"%Ez")) * 60 | table timeZoneOffsetInSeconds
iseval = 0

[CreateSplunkTimeFieldForDisplay(2)]
args = timeFieldNameIn, destFieldNameIn
definition = eval "$destFieldNameIn$" = '$timeFieldNameIn$' | fieldformat "$destFieldNameIn$" = case(coalesce('Event.LocMod.ForensicMod.ExactFMTime', 1) = 1, strftime('$destFieldNameIn$',"%m/%d/%y %H:%M:%S"), 1=1, "~" . strftime('$destFieldNameIn$',"%m/%d/%y %H:%M:%S"))
iseval = 0

[RenameSplunkTimeFieldForDisplay(2)]
args = timeFieldNameIn, destFieldNameIn
definition = rename "$timeFieldNameIn$" AS "$destFieldNameIn$" | `CreateSplunkTimeFieldForDisplay($destFieldNameIn$, $destFieldNameIn$)`
iseval = 0

[GetUnauthorizedMods(4)]
args = hostGuidIn, reputationIn, showAllAutoExecTypesIn, showHiddenEventsIn
definition = `GetUnauthorizedMods($hostGuidIn$, $reputationIn$, $showAllAutoExecTypesIn$, $showHiddenEventsIn$, , 1, 1, 1, 1, 1)`
iseval = 0

[GetUnauthorizedModsFilterSearchTerm(6)]
args = searchTermIn, searchHostIn, searchLocIn, searchEntryNameIn, searchEntryDataIn, searchEntryLaunchesIn
definition = eval searchTerm=if("$searchTermIn$"="", null, "$searchTermIn$") | eval searchHost=$searchHostIn$ | eval searchLoc=$searchLocIn$ | eval searchEntryName=$searchEntryNameIn$ | eval searchEntryData=$searchEntryDataIn$ | eval searchEntryLaunches=$searchEntryLaunchesIn$ | search (NOT searchTerm=*) OR (searchHost=1 AND (ComputerName="*$searchTermIn$*" OR DomainName="*$searchTermIn$*" OR IPV4IpAddress="*$searchTermIn$*" OR PublicIpAddress="*$searchTermIn$*")) OR (searchLoc=1 AND strLocFullPath="*$searchTermIn$*") OR (searchLoc=1 AND strLocDisplayName="*$searchTermIn$*") OR (searchLoc=1 AND Event.LocMod.Location.LocUser="*$searchTermIn$*") OR (searchEntryName=1 AND Event.LocMod.LocEntry.EntryName="*$searchTermIn$*") OR (searchEntryData=1 AND Event.LocMod.LocEntry.EntryData="*$searchTermIn$*") OR (searchEntryLaunches=1 AND (Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFRawString="*$searchTermIn$*" OR Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFAttributes.AEFAttribute.AEFAttrMD5="*$searchTermIn$*") )
iseval = 0

[GetUnauthorizedMods(10)]
args = hostGuidIn, reputationIn, showAllAutoExecTypesIn, showHiddenEventsIn, searchTermIn, searchHost, searchLoc, searchEntryName, searchEntryData, searchEntryLaunches
definition = `GetUnauthorizedModsBase($hostGuidIn$)` | `GetUnauthorizedModsFilterAutoExecType($showAllAutoExecTypesIn$)` | `GetUnauthorizedModsFilterReputation($reputationIn$)` | `GetUnauthorizedModsFilterSearchTerm($searchTermIn$, $searchHost$, $searchLoc$, $searchEntryName$, $searchEntryData$, $searchEntryLaunches$)` | `GetIndexTimeLatestSnapshotComparison` | `GetUnauthorizedModsTableFields`
iseval = 0

[GetUnauthorizedModsToCleanForHost(1)]
args = hostGuidIn
definition = `PerseusIndex` host="$hostGuidIn$" | dedup Event.ID | lookup UnauthorizedModsCleanInfo strEventGuid as Event.ID OUTPUT strEventGuid | search strEventGuid=* 
iseval = 0

[GetUnauthorizedModsToCleanLocAndEntryInfoForHost(1)]
args = hostGuidIn
definition = `GetUnauthorizedModsToCleanForHost("$hostGuidIn$")` | `GetUnauthorizedModsFilterAutoExecType(1)` | `GetUnauthorizedModsTableFields` | table strLocFullPath, Event.LocMod.Location.LocUser, Event.LocMod.LocEntry.EntryName, Event.LocMod.LocEntry.EntryData, Event.LocMod.LocEntry.OriginalData, Event.LocMod.LocEntry.EntryType
iseval = 0

[GetUnauthorizedModsTableFields]
#We truncate both EntryData and RawAEFString to 100 characters
#We do a .default replacement of blank Event.LocMod.Location.LocUser because the baseline entries in user-specific locations do not specify a user in the event
#It's also worth noting that this behavior can make it appear that there are multiple identical entries in the baseline
definition = eval Event.LocMod.LocEntry.EntryData = case(len('Event.LocMod.LocEntry.EntryData') < 100, 'Event.LocMod.LocEntry.EntryData', 1==1, substr('Event.LocMod.LocEntry.EntryData', 0, 97)."...") | eval Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFRawString = case(len('Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFRawString') < 100, 'Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFRawString', 1==1, substr('Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFRawString', 0, 97)."...") | rename strLocDisplayName AS "Location" | eval Location = case(nLocType == 1, coalesce('Event.LocMod.Location.LocUser', ".default") . substr(Location, 13), (nLocType==0 or nLocType==2), Location, 1==1, substr(Location, 0, nLocType) . coalesce('Event.LocMod.Location.LocUser', ".default") . substr(Location, nLocType + 5)) | eval strLocFullPath = case(nLocType == 0, strLocFullPath, nLocType==1, strLocFullPath . " (" . coalesce('Event.LocMod.Location.LocUser', ".default") . ")", 1==1, Location) | fields+ _time, host, ComputerName, IPV4IpAddress, Event.ID, Event.LocMod.LocModType, Event.LocMod.Location.LocGuid, Location, strLocFullPath, nLocAutoExecType, Event.LocMod.Location.LocUser, Event.LocMod.LocEntry.EntryType, Event.LocMod.LocEntry.EntryName, Event.LocMod.ForensicMod.ForensicDescription, Event.LocMod.LocEntry.EntryData, Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFRawString, Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFFile, Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFAttributes.AEFAttribute.AEFAttrMD5, nMaliciousScanCount, nTotalScanCount, Reputation, strPermaLink, bNewerThanLatestURegSnapshot, bNewerThanLatestUDriveSnapshot, Event.LocMod.ForensicMod.ExactFMTime, Event.LocMod.ForensicMod.LatestFMTime, Event.LocMod.ForensicMod.ForensicSource
iseval = 0

[GetPerseusScriptByGuidForHost(3)]
args = hostGuidIn, executionGuidIn, scriptGuidIn
definition = `GetPerseusHostExecutionGuidLookupDataForHost($hostGuidIn$, $executionGuidIn$)` | lookup PerseusHostScriptLookup strHostGuid OUTPUT _key AS strScriptGuid, strScriptText | search strScriptGuid = "$scriptGuidIn$" | table strScriptText
iseval = 0

[GetPerseusScriptGuidsForHost(2)]
args = hostGuidIn, executionGuidIn
definition = `GetPerseusHostExecutionGuidLookupDataForHost($hostGuidIn$, $executionGuidIn$)` | lookup PerseusHostScriptLookup strHostGuid OUTPUT _key AS strScriptGuid | table strScriptGuid
iseval = 0

[GetPerseusHostExecutionGuidLookupDataForHost(2)]
args = hostGuidIn, executionGuidIn
definition = inputlookup PerseusHostExecutionGuidLookup WHERE (_key = "$executionGuidIn$") AND (strHostGuid = "$hostGuidIn$")
iseval = 0

[GetRecentPerseusAcquisitionUploadFileNames(1)]
args = EarliestUploadUnixTimestampIn
#We sort first by dtAcquisitionStopTime (stored as dtFileAssociatedDate) when possible so that we download them in order they should be processed by the engine
definition = inputlookup PerseusFileRepo WHERE (strUploadType = "Acquisition" OR strUploadType = "RedlineAcquisition") | rename _key AS strUploadGuid | convert num(dtUploadDate) | search dtUploadDate >= $EarliestUploadUnixTimestampIn$ | eval dtAcquisitionStopTime = coalesce(dtFileAssociatedDate, dtUploadDate)  | sort 0 +dtAcquisitionStopTime +dtUploadDate | table strFileName, strUploadGuid, dtUploadDate, dtAcquisitionStopTime
iseval = 0

[GetPerseusFileByUploadGuid(1)]
args = UploadGuidIn
definition = inputlookup PerseusFileRepo WHERE (_key = $UploadGuidIn$) | rename _key AS strUploadGuid | table strUploadGuid, strUploadType, strHostGuid, strFileName, strBase64FileContent, strFileMD5, dtUploadDate, strSplunkUser
iseval = 0

#We convert Reg Value Data modifications (strObjectType = 3) to Reg Value modifications (strObjectType = 1) because they are the same type of event (modification of a registry value's data) and will be double-counted otherwise
[PerseusCreateObjectPathNameAndTypeField]
definition = eval strObjectType = IF (strObjectType == "3", "1", strObjectType) | eval strObjectPathNameAndType = strPath."\\".strObjectName."|>$".strObjectType
iseval = 0

[GetProcessInstall(2)]
args = hostGuidIn, seedEventGuidIn
#!TODO (OPTIONAL) - This technically could run into the subsearch limit if an install had 10k+ entries. Handle that edge case?
#!TODO (OPTIONAL) - maxevents=-1 was not working because of a bug. If this bug is fixed, restore it
#!STANDARD: definition = `GetProcessInstallModsBase($hostGuidIn$)` | join Event.ID [ search `GetProcessInstallModsBaseWithPermit($hostGuidIn$)` | transaction Event host maxpause=300s maxevents=5000 mvraw=true | search Event.ID=$seedEventGuidIn$ | table Event.ID | mvexpand Event.ID] | `GetUnauthorizedModsFilterAutoExecType(2)` | `GetUnauthorizedModsFilterReputation(*)` | `GetIndexTimeLatestSnapshotComparison` | `GetUnauthorizedModsTableFields`
#!DEMO: 
definition = `GetProcessInstallModsBase($hostGuidIn$)` | join Event.ID [ | `GetProcessInstallModsBaseWithPermit($hostGuidIn$)` | transaction Event host maxpause=300s maxevents=5000 mvraw=true | search Event.ID=$seedEventGuidIn$ | table Event.ID | mvexpand Event.ID] | `GetUnauthorizedModsFilterAutoExecType(2)` | `GetUnauthorizedModsFilterReputation(*)` | `GetIndexTimeLatestSnapshotComparison` | `GetUnauthorizedModsTableFields`
iseval = 0

[GetEventContext(2)]
args = hostGuidIn, seedEventGuidIn
#!TODO (OPTIONAL) - We could use a customized routine that differs from the process install event list (beyond just including Permitted entries)
#!TODO (OPTIONAL) - maxevents=-1 was not working because of a bug. If this bug is fixed, we can optionally use it
#!TODO (OPTIONAL) - For now we limit maxevents to 1000 to handle the case where the Permit events come from the initial run of Perseus on a host. Long-term we should change the Permit event to differ if it happens during an intial install so we can sort these out. If we change this, change the logic in the ModificationsTableView to match (search for strNoContextEventsText to find the relevant area)
#!STANDARD: definition = `GetEventContextModsBase($hostGuidIn$)` | join Event.ID [ search `GetEventContextModsBase($hostGuidIn$)` | transaction Event host maxpause=300s maxevents=1000 mvraw=true | search Event.ID=$seedEventGuidIn$ | table Event.ID | mvexpand Event.ID] | `GetUnauthorizedModsFilterAutoExecType(1)` | `GetUnauthorizedModsFilterReputation(*)` | eventstats min(_time) AS EarliestEvent, max(_time) AS LatestEvent | `GetIndexTimeLatestSnapshotComparison` | `GetUnauthorizedModsTableFields`, EarliestEvent, LatestEvent
#!DEMO: 
definition = `GetEventContextModsBase($hostGuidIn$)` | join Event.ID [ | `GetEventContextModsBase($hostGuidIn$)` | transaction Event host maxpause=300s maxevents=1000 mvraw=true | search Event.ID=$seedEventGuidIn$ | table Event.ID | mvexpand Event.ID] | `GetUnauthorizedModsFilterAutoExecType(1)` | `GetUnauthorizedModsFilterReputation(*)` | eventstats min(_time) AS EarliestEvent, max(_time) AS LatestEvent | `GetIndexTimeLatestSnapshotComparison` | `GetUnauthorizedModsTableFields`, EarliestEvent, LatestEvent
iseval = 0

[GetPerseusAgentVersionString]
definition = eval AgentVersionString = case(PerseusAgentVersion == 24070, "2.40.70", PerseusAgentVersion == 24100, "2.41.00", PerseusAgentVersion == -24100, "Agentless 2.41.00", 1 == 1, "Unknown")
iseval = 0

[GetHostInfoFirstReportTimeString]
definition = lookup PerseusHostInfoFirstContact _key as host OUTPUT FirstReportTime | `RenameSplunkTimeFieldForDisplay(FirstReportTime, FirstReportTime)`
iseval = 0

[GetUnauthorizedModsBase(1)]
args = hostGuidIn
#!TODO (OPTIONAL) - SPLUNK BUG - The results from this query can be truncated by Splunk only returning a few thousand results when there are tens of thousands. Find a solution to this and fix it for all instances (including ModificationTableViews in Universal Reg/Drive, Modification Context Tables, Process Install Tables, and KV Store Tables like Modification Whitelist)
definition = `PerseusIndex` host=$hostGuidIn$ (Event.LocMod.LocModType=Block OR Event.LocMod.LocModType=Audit) | dedup Event.ID | lookup UnauthorizedModsEventVisibility _key AS Event.ID OUTPUT nVisibility | where isnull(nVisibility) | lookup PerseusHostInfo _key AS host OUTPUT ComputerName, DomainName, IPV4IpAddress, PublicIpAddress
iseval = 0

#showAllAutoExecTypesIn of 0 indicates types 0-1, 1 indicates all types, 2 indicates 0-3, -1 indicates 2-3
[GetUnauthorizedModsFilterAutoExecType(2)]
args = locGuidFieldNameIn, showAllAutoExecTypesIn
definition = lookup PerseusLocationLookup _key AS $locGuidFieldNameIn$ | WHERE ( ($showAllAutoExecTypesIn$ = 0 AND (nLocAutoExecType = 0 OR nLocAutoExecType = 1)) OR ($showAllAutoExecTypesIn$ = 1) OR ($showAllAutoExecTypesIn$ = 2 AND (nLocAutoExecType = 0 OR nLocAutoExecType = 1 OR nLocAutoExecType = 2 OR nLocAutoExecType = 3)) OR ($showAllAutoExecTypesIn$ = -1 AND (nLocAutoExecType = 2 OR nLocAutoExecType = 3)) ) | eval strLocFullPath = if(isnull('Event.LocMod.Location.LocFullPath'), strLocFullPath, 'Event.LocMod.Location.LocFullPath')
iseval = 0

[GetUnauthorizedModsFilterAutoExecType(1)]
args = showAllAutoExecTypesIn
definition = `GetUnauthorizedModsFilterAutoExecType(Event.LocMod.Location.LocGuid, $showAllAutoExecTypesIn$)`
iseval = 0

[GetUnauthorizedModsFilterReputation(1)]
args = reputationIn
#!STANDARD: definition = lookup VirusTotalMD5HashInfo _key AS "Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFAttributes.AEFAttribute.AEFAttrMD5" OUTPUT nMaliciousScanCount, nTotalScanCount, strPermaLink | eval Reputation = min(coalesce(nMaliciousScanCount, -1), 1) | search Reputation=$reputationIn$
#!DEMO: 
definition = lookup VirusTotalMD5HashInfo _key AS "Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFAttributes.AEFAttribute.AEFAttrMD5" OUTPUT nMaliciousScanCount, nTotalScanCount, strPermaLink | lookup PerseusDemoVirusTotalMD5HashInfo.csv _key AS "Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFAttributes.AEFAttribute.AEFAttrMD5" OUTPUTNEW nMaliciousScanCount, nTotalScanCount, strPermaLink | eval Reputation = min(coalesce(nMaliciousScanCount, -1), 1) | search Reputation=$reputationIn$
iseval = 0

[GetIndexTimeLatestSnapshotComparison]
#!STANDARD: definition = eval bNewerThanLatestURegSnapshot = if (_indextime > [ gentimes start=-1 | eval dtSnapshotStartTime=0 | inputlookup PerseusUniversalRegistrySnapshotInfo append=true | sort -dtSnapshotStartTime | head 1 | return $dtSnapshotStartTime ], 1, 0) |  eval  bNewerThanLatestUDriveSnapshot = if (_indextime > [ gentimes start=-1 | eval dtSnapshotStartTime=0 | inputlookup PerseusUniversalDriveSnapshotInfo append=true | sort -dtSnapshotStartTime | head 1 | return $dtSnapshotStartTime ], 1, 0)
#!DEMO: 
definition = eval bNewerThanLatestURegSnapshot = if (_indextime > [ gentimes start=-1 | eval dtSnapshotStartTime=0 | inputlookup PerseusDemoURegSnapshotInfo.csv append=true | sort 0 -dtSnapshotStartTime | head 1 | return $dtSnapshotStartTime ], 1, 0) |  eval  bNewerThanLatestUDriveSnapshot = if (_indextime > [ gentimes start=-1 | eval dtSnapshotStartTime=0 | inputlookup PerseusUniversalDriveSnapshotInfo append=true | sort 0 -dtSnapshotStartTime | head 1 | return $dtSnapshotStartTime ], 1, 0)
iseval = 0

#NOTE: If you change this, change populateInputs in HostInfo.js
[GetHostInfo(1)]
args=hostGuidIn
definition = inputlookup PerseusHostInfo WHERE _key="$hostGuidIn$" | rename _key AS host | `GetWindowsVersionString` | `GetPerseusAgentVersionString` | `GetHostInfoFirstReportTimeString` | `RenameSplunkTimeFieldForDisplay(LastReportTime, LastReportTime)` | table DomainName, ComputerName, IPV4IpAddress, PublicIpAddress, OSVersionString, AgentVersionString, FirstReportTime, LastReportTime, ContactEmailAddress
iseval = 0

[GetHostInfoFilterSearchTerm(4)]
args = searchTermIn, searchHostIn, searchOSIn, searchAgentVersionIn
definition = eval searchTerm=if("$searchTermIn$"="", null, "$searchTermIn$") | eval searchHost=$searchHostIn$ | eval searchOS=$searchOSIn$ | eval searchAgentVersion=$searchAgentVersionIn$ | search (NOT searchTerm=*) OR (searchHost=1 AND (ComputerName="*$searchTermIn$*" OR DomainName="*$searchTermIn$*" OR IPV4IpAddress="*$searchTermIn$*" OR PublicIpAddress="*$searchTermIn$*")) OR (searchOS=1 AND OSVersionString="*$searchTermIn$*") OR (searchAgentVersion=1 AND AgentVersionString="*$searchTermIn$*")
iseval = 0

[GetHostInfo(4)]
args=searchTermIn, searchHostIn, searchOSIn, searchAgentVersionIn
definition = inputlookup PerseusHostInfo | rename _key AS host | `GetWindowsVersionString` | `GetPerseusAgentVersionString` | `GetHostInfoFirstReportTimeString` |  `GetHostInfoFilterSearchTerm($searchTermIn$, $searchHostIn$, $searchOSIn$, $searchAgentVersionIn$)` | `RenameSplunkTimeFieldForDisplay(LastReportTime, LastReportTime)` | table host, DomainName, ComputerName, IPV4IpAddress, PublicIpAddress, OSVersionString, AgentVersionString, FirstReportTime, LastReportTime, ContactEmailAddress
iseval = 0

[GetHostGuidByName(3)]
args=computerNameIn, domainNameIn, hardwareIdentifierIn
#We replace ':' with '-' in MAC Addresses for more consistent lookups
definition = inputlookup PerseusHostInfo | eval searchComputerName=if("$computerNameIn$"="", null, "$computerNameIn$") | eval searchDomainName=if("$domainNameIn$"="", null, "$domainNameIn$") | eval searchHardwareIdentifier=if("$hardwareIdentifierIn$"="", null, "$hardwareIdentifierIn$") | eval HardwareIdentifier=replace(HardwareIdentifier, ":", "-") | search ((NOT searchComputerName=*) OR (ComputerName="$computerNameIn$")) AND ((NOT searchDomainName=*) OR (DomainName="$domainNameIn$")) AND ((NOT searchHardwareIdentifier=*) OR (HardwareIdentifier="$hardwareIdentifierIn$")) | rename _key as strHostGuid | table strHostGuid
iseval = 0

[GetFilesByMD5(1)]
args = MD5In
definition = `PerseusIndex` Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFAttributes.AEFAttribute.AEFAttrMD5=$MD5In$ | eval File=lower('Event.LocMod.LocEntry.AutoExecFiles.AutoExecFile.AEFFile') | dedup File | table File
iseval = 0

[GetWindowsVersionString]
#We don't use WindowsVersionInfo because that requires explicitly defining a "Lookup Definition" which I was unsuccessful in doing only through config files without making an assumption about what user would own the csv. Instead we just reference the csv directly which requires no additional definition
definition = lookup WindowsVersionInfo.csv MajorVersion, MinorVersion, SPMajorVersion, SPMinorVersion, OSArchitecture output OSVersionString | fillnull OSVersionString value="Unknown OS"
iseval = 0

[UpdateUMForException]
definition = head 0 | script PerseusUMProcess -UseSession
iseval = 0

[UpdateUMForException(1)]
args = strExceptionKVStoreKey
definition = head 0 | script PerseusUMProcess -UseSession -exceptionkey $strExceptionKVStoreKey$
iseval = 0

[UpdateUMForInstallExceptions(1)]
args = strInstallKVStoreKey
definition = head 0 | script PerseusUMProcess -UseSession -installkey $strInstallKVStoreKey$
iseval = 0

#NOTE: Change GetProcessInstallModsBaseWithPermit if you change this
[GetProcessInstallModsBase(1)]
args = hostGuidIn
definition = `PerseusIndex` host=$hostGuidIn$ (Event.LocMod.LocModType=Block OR Event.LocMod.LocModType=Audit) | dedup Event.ID | lookup PerseusHostInfo _key AS host OUTPUT ComputerName
iseval = 0

#NOTE: Change GetProcessInstallModsBase if you change this
[GetProcessInstallModsBaseWithPermit(1)]
args = hostGuidIn
definition = `PerseusIndex` host=$hostGuidIn$ (Event.LocMod.LocModType=Block OR Event.LocMod.LocModType=Audit OR Event.LocMod.LocModType=Permit ) | dedup Event.ID | lookup PerseusHostInfo _key AS host OUTPUT ComputerName
iseval = 0

[GetEventContextModsBase(1)]
args = hostGuidIn
definition = `PerseusIndex` host=$hostGuidIn$ (Event.LocMod.LocModType=Block OR Event.LocMod.LocModType=Audit OR Event.LocMod.LocModType=Permit) | dedup Event.ID | lookup PerseusHostInfo _key AS host OUTPUT ComputerName
iseval = 0

[PerseusGetSplunkEventContextForHost(5)]
args = hostGuidIn, hostNameIn, ipv4AddressIn, earliestTimeStringIn, latestTimeStringIn
definition = index=* (host="$hostGuidIn$" OR $hostNameIn$ OR $ipv4AddressIn$) earliest="$earliestTimeStringIn$" latest="$latestTimeStringIn$"
iseval = 0

