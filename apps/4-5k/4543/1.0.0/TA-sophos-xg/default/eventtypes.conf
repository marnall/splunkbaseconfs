[sophos-xg]
search = index=sophosfw sourcetype=sophos:xg:*

[sophos-xg-fw]
search = eventtype=sophos-xg log_type="Firewall"

[sophos-xg-idp]
search = eventtype=sophos-xg log_type="IDP"

[sophos-xg-contentfilter]
search = eventtype=sophos-xg log_type="Content Filtering"

[sophos-xg-auth]
search = eventtype=sophos-xg log_type="Event" message="*logged*" user_name=*

[sophos-xg-session]
search = eventtype=sophos-xg log_type="Event" log_subtype=System localinterfaceip=* connectionname=* connectiontype=* status=*

[sophos-xg-session-start]
search = eventtype=sophos-xg-session status="Established"

[sophos-xg-session-end]
search = eventtype=sophos-xg-session status="Terminated"

[sophos-xg-changes]
search = eventtype=sophos-xg log_type="Event" log_component="Anti-Virus"
