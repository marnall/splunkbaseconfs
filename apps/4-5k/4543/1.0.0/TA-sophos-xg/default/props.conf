[sophos:xg:syslog]
BREAK_ONLY_BEFORE_DATE =
DATETIME_CONFIG =
LINE_BREAKER = ([\n\r]+)date\=\d{4}
MAX_TIMESTAMP_LOOKAHEAD = 64
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%d time=%T timezone="%Z"
TIME_PREFIX = date\=
category = Custom
disabled = false
pulldown_type = true

TRANSFORMS-fix_sophos_sourcetype = rewrite_sophos_sourcetype, rewrite_sophos_sourcetype2

[(?::){0}sophos:xg:*]
EVAL-bytes = recv_bytes+sent_bytes
EVAL-log_level = case(priority=="Warning","warn",priority=="Information" OR priority=="Notice","info")
EVAL-packets = recv_pkts+sent_pkts
EVAL-protocol = lower(protocol)
EVAL-transport = lower(protocol)
EVAL-vendor = "Sophos"
EVAL-product = "XG Firewall"
EVAL-vendor_product = "Sophos XG Firewall"

FIELDALIAS-app = application AS app
FIELDALIAS-bytes_in = recv_bytes AS bytes_in
FIELDALIAS-bytes_out = sent_bytes AS bytes_out
FIELDALIAS-dest = dst_ip AS dest
FIELDALIAS-dest_ip = dst_ip AS dest_ip
FIELDALIAS-dest_zone = dstzone AS dest_zone
FIELDALIAS-dest_port = dst_port AS dest_port
FIELDALIAS-dest_translated_ip = tran_dst_ip AS dest_translated_ip
FIELDALIAS-dest_translated_port = dest_translated_port AS dest_translated_port
FIELDALIAS-dvc = host AS dvc
FIELDALIAS-dvc_ip = host AS dvc_ip
FIELDALIAS-packets_in = recv_pkts AS packets_in
FIELDALIAS-packets_out = sent_pkts AS packets_out
FIELDALIAS-signature = message AS signature
FIELDALIAS-src = src_ip AS src
FIELDALIAS-src_translated_port = tran_src_port AS src_translated_port
FIELDALIAS-src_zone = srczone AS src_zone
FIELDALIAS-user = user_name AS user


[sophos:xg:ContentFiltering]
EXTRACT-url_fields = url=\"(?P<url>(?:(?P<http_protocol>\w+)\:\/\/)?(?P<site>\w+[^\/\s]+)?(?P<uri>(?P<uri_path>(?:\.|\/|%|(?:\* |.*? \S*)|.)?[^\?\s]*)?(?P<uri_query>\?[^\s]*)?)?)\"

EVAL-action = case(status_code<300,"success", status_code>300 AND status_code<400,"redirected", status_code>=400,"failure")
EVAL-http_user_agent_length = len(user_agent)
EVAL-status = case(isnull(status) OR status=="",status_code)
EVAL-url_length = len(url)

FIELDALIAS-site = domain AS site
FIELDALIAS-http_content_type = contenttype AS http_content_type
FIELDALIAS-http_referrer = referer AS http_referrer
FIELDALIAS-http_user_agent = user_agent AS http_user_agent

[sophos:xg:Event]
EVAL-action = case(vendor_action=="logged in" AND status=="Successful","success", message LIKE "%upgraded%" AND status=="Successful","updated", status=="Established","added")
EVAL-dest = coalesce(dest,dest_ip,device_name,host)
EVAL-object_category = case(message LIKE "%AV definitions%","AV Definitions")
EVAL-status = case(status=="Successful","success", "Failure","failure")

EXTRACT-login-out = message\=\"(?P<user_type>\S+) \'\S+\' (?P<vendor_action>logged \S+ )(?:of|.*from \'[^\']+\')(?: using )*(?P<app>[^\.]+)\.\"

FIELDALIAS-dest_ip = remoteinterfaceip AS dest_ip
FIELDALIAS-src_ip = localinterfaceip AS src_ip

[sophos:xg:Firewall]
EVAL-action = case(status=="Allow","allowed", status=="Deny", "blocked")
EVAL-direction = if((isnotnull(in_interface) AND in_interface!="") AND (isnull(out_interface) OR out_interface==""),"inbound","outbound")

[sophos:xg:IDP]
EVAL-ids_type = "network"

EVAL-action = case(log_subtype=="Drop","blocked")
FIELDALIAS-signature = signature_msg AS signature

[sophos:xg:SystemHealth]
EVAL-bytes_in = receivedkbits*1000
EVAL-bytes_out = transmittedkbits*1000

#cpu perf
EVAL-cpu_load_percent = case(log_component=="CPU" AND log_subtype=="Usage",tonumber(rtrim(system,"%"))+tonumber(rtrim(user,"%")))
EVAL-cpu_user_percent = case(log_component=="CPU" AND log_subtype=="Usage",tonumber(rtrim(user,"%")))

EVAL-mem = case(log_component=="Memory" AND unit=="byte",total_memory/100000)
EVAL-mem_free = case(log_component=="Memory" AND unit=="byte",free/100000)
EVAL-mem_used = case(log_component=="Memory" AND unit=="byte",used/100000)
