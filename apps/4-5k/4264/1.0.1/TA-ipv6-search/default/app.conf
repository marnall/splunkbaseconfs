# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 3

[launcher]
author = Domenico Perre
version = 1.0.1
description = This custom search add-on allows a Splunk user to search for data against an IPv6 range.

[ui]
is_visible = 0
label = IPv6 Search
docs_section_override = AddOns:released

[package]
id = TA-ipv6-search
check_for_updates = true

[triggers]
reload.addon_builder = simple
reload.ta_ipv6_search_account = simple
reload.ta_ipv6_search_settings = simple
reload.passwords = simple

