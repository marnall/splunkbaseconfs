[greynoise_overview]
search = | gnoverview \
	| table classification stats_field stats_value stats_count \
	| outputlookup gn_overview_lookup override_if_empty=false
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 1
cron_schedule = 0 */6 * * *
enableSched = 1

[greynoise_overview_once]
search = | gnoverview \
	| table classification stats_field stats_value stats_count \
	| outputlookup gn_overview_lookup override_if_empty=false
dispatch.earliest_time = -24h
dispatch.latest_time = now

[greynoise_cache_maintenance]
search = | maintaincache
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1

[greynoise_feed_once]
search = | gnquery query=[inputlookup gn_feed_lookup | sort -created | head 1 | eval query="".query | return query] exclude_raw=True result_size=2000000 page_size=1000 \
	exclude_fields="destination_asns,destination_cities,destination_countries,destination_country_codes,tags.details" `greynoise_feed_partial_search` \
    | spath output=tag_names path="tags{}.name" input=internet_scanner_intelligence \
	| stats \
		values(actor) AS actor \
		values(first_seen) as first_seen \
		values(last_seen) as last_seen \
		values(classification) as classification \
		values(cves) as cve \
		values(source_country) as source_country \
		values(asn) as asn \
		values(tags) AS tags \
		by ip \
	| rename ip as _key \
	| table _key, actor, first_seen, last_seen, classification, tags, cve, source_country, asn \
	| outputlookup greynoise_indicators key_field=_key
alert.track = 0

[greynoise_feed]
search = | gnquery query=[inputlookup gn_feed_lookup | sort -created | head 1 | eval query="".query | return query] exclude_raw=True result_size=2000000 page_size=1000 \
	exclude_fields="destination_asns,destination_cities,destination_countries,destination_country_codes,tags.details" `greynoise_feed_partial_search` \
    | spath output=tag_names path="tags{}.name" input=internet_scanner_intelligence \
	| stats \
		values(actor) AS actor \
		values(first_seen) as first_seen \
		values(last_seen) as last_seen \
		values(classification) as classification \
		values(cves) as cve \
		values(source_country) as source_country \
		values(asn) as asn \
		values(tags) AS tags \
		by ip \
	| rename ip as _key \
	| table _key, actor, first_seen, last_seen, classification, tags, cve, source_country, asn \
	| outputlookup greynoise_indicators key_field=_key
disabled = 1
cron_schedule = 0 3 * * *
enableSched = 1

[greynoise_feed_purge]
search = | inputlookup greynoise_indicators \
	| eval nowstring=strftime(relative_time(now(),"-7d@d" ),"%Y-%m-%d") \
	| where last_seen > nowstring \
	| table _key, actor, first_seen, last_seen, classification, tags, cve, source_country, asn\
	| outputlookup greynoise_indicators
disabled = 1
cron_schedule = 0 0 * * *
enableSched = 1

[greynoise_migrate_greynoise_indicators_lookup]
search = | inputlookup greynoise_indicators.csv | rename ip as _key | fields _key, actor, first_seen, last_seen, classification, tags, cve, source_country | outputlookup greynoise_indicators
description = Migrates the contents of the greynoise_indicators.csv lookup to greynoise_indicators KV lookup (only run ONCE after upgrade to version 3.x.x. Not needed if installing version 3.0.0 or later.)
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now

[greynoise_migrate_gn_scan_deployment_ip_lookup]
search = | inputlookup gn_scan_deployment_ip_lookup | rename RIOT as business_service_intelligence, noise as internet_scanner_intelligence | fields _key, business_service_intelligence, internet_scanner_intelligence, last_checked | outputlookup gn_scan_deployment_ip_lookup
description = Migrates the contents of the gn_scan_deployment_ip_lookup lookup from previous schema to new schema (only run ONCE after upgrade to version 3.x.x. Not needed if installing version 3.0.0 or later.)
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now

[greynoise_migrate_gn_overview_lookup]
