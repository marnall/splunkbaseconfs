description = Migrates the contents of the gn_overview_lookup.csv lookup to gn_overview_lookup KV lookup (only run ONCE after upgrade to version 3.x.x. Not needed if installing version 3.0.0 or later.)
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now

[greynoise_populate_ip_intel_malicious]
alert.track = 0
cron_schedule = 0,30 * * * *
description = This savedsearch retrieves ip from greynoise_indicators lookup and populate data in greynoise_ip_intel_malicious lookup
disabled = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
run_on_startup = true
enableSched = 1
search = | inputlookup greynoise_indicators where classification="malicious" | eval ip = _key, threat_actor=actor, threat_category=classification | dedup ip | table ip, threat_actor, threat_category | outputlookup greynoise_ip_intel_malicious

