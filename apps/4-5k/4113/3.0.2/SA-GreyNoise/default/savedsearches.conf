[greynoise_scan_deployment_once]
search = index IN (`greynoise_indexes`) \
	| dedup _raw \
	| fields `greynoise_fields` \
	| eval mvfield=null() \
	| eval gn_ip = mvappend(mvfield, mvfield,`greynoise_other_fields`) \
	| table gn_ip \
	| stats count by gn_ip \
	| table gn_ip \
	| regex gn_ip = "^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$" \
	| gnmulti ip_field=gn_ip \
	| eval _key = greynoise_ip \
	| eval internet_scanner_intelligence = greynoise_internet_scanner_intelligence_found \
	| eval business_service_intelligence = greynoise_business_service_intelligence_found \
	| eval classification = greynoise_internet_scanner_intelligence_classification \
	| eval trust_level = greynoise_business_service_intelligence_trust_level \
	| eval last_checked = strftime(now(),"%Y-%m-%d %T") \
	| table _key, internet_scanner_intelligence, business_service_intelligence, classification, trust_level, last_checked \
	| outputlookup gn_scan_deployment_ip_lookup key_field=_key
dispatch.earliest_time = -24h
dispatch.latest_time = now

