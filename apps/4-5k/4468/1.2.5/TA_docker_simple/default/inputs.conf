[script://./bin/docker_simple_ps.sh]
interval = 300
disabled = true
sourcetype = docker:ps
source = docker_simple_ps
start_by_shell = false
#index = main

[script://./bin/docker_simple_stats.sh]
interval = 30
disabled = true
sourcetype = docker:stats
source = docker_simple_stats
start_by_shell = false
#index = main

[script://./bin/docker_simple_top.sh]
interval = 300
disabled = true
sourcetype = docker:top
source = docker_simple_top
start_by_shell = false
#index = main

[script://./bin/docker_simple_events.sh]
# special value 0 to keep this running and listening for events
interval = 0
disabled = true
sourcetype = docker:events
source = docker_simple_events
start_by_shell = false
#index = main

[script://./bin/docker_simple_inventory.sh]
# only enable this if you care about full inventory of containers
interval = 86400
disabled = true
sourcetype = docker:inventory
source = docker_simple_inventory
start_by_shell = false
#index = main

[monitor:///var/lib/docker/containers/*/*json.log]
disabled = true
sourcetype = docker:logs_json
#index = main


[script://./bin/podman_simple_ps.sh]
interval = 300
disabled = true
sourcetype = podman:ps
source = podman_simple_ps
start_by_shell = false
index = podman

[script://./bin/podman_simple_stats.sh]
interval = 30
disabled = true
sourcetype = podman:stats
source = podman_simple_stats
start_by_shell = false
index = podman

[script://./bin/podman_simple_top.sh]
interval = 300
disabled = true
sourcetype = podman:top
source = podman_simple_top
start_by_shell = false
index = podman

[script://./bin/podman_simple_events.sh]
# special value 0 to keep this running and listening for events
interval = 0
disabled = true
sourcetype = podman:events
source = podman_simple_events
start_by_shell = false
index = podman

[script://./bin/podman_simple_inventory.sh]
# only enable this if you care about full inventory of containers
interval = 300
disabled = true
sourcetype = podman:inventory
source = podman_simple_inventory
start_by_shell = false
index = podman

[monitor:///var/lib/containers/storage/overlay-containers/*/userdata/ctr.log]
disabled = true
sourcetype = podman:logs_json
index = podman
crcSalt = <SOURCE>


