[Errors in the Last 24 Hours]
action.email.useNSSubject = 1
alert.track = 0
description = Returns events of type error in the last 24 hours
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
dispatchAs = user
display.events.fields = ["host","source","sourcetype","dl_access_direction","dl_accessed_drive","dl_accessed_drive_letter","dl_accessed_file","dl_client","dl_eventid","dl_message_file","dl_message_mlfile","dl_user","eventtype"]
display.visualizations.show = 0
request.ui_dispatch_app = DriveLockApp
request.ui_dispatch_view = search
search = eventtype=Error

