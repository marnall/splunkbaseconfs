[DriveLock]
BREAK_ONLY_BEFORE = (\w\w\w..\d+.\d\d:\d\d:\d\d.\d+.\d+.\d+.\d+.DriveLock:)
CHARSET = UTF-8
DATETIME_CONFIG = 
NO_BINARY_CHECK = true
TIME_PREFIX = Timestamp:
category = Custom
disabled = false
pulldown_type = 1
EXTRACT-dl_access_direction = Access.direction:.(?<dl_access_direction>\w+)
EXTRACT-dl_client = Computer:.(?<dl_client>\S*)
EXTRACT-dl_eventid = EventID:.(?<dl_eventid>\d*)
EXTRACT-dl_message_file = Message:[\s\S]*"(?<dl_message_file>.*)"
EXTRACT-dl_message_mlfile = Message:+\s+Machine+\s+learning+\s+of+\s+executable+\s+file+\s+"(?<dl_message_mlfile>.*)"+\s+completed
EXTRACT-dl_user = User:.(?<dl_user>\S*)
EXTRACT-dl_file_name_hash = File.name.hash:.(?P<dl_file_name_hash>(\w*))
EXTRACT-dl_file_name = File.name:.(?P<dl_file_name>(\w*\s*[-]*)*(\.\w*)*)
EXTRACT-dl_file_path = File.path:.(?P<dl_file_path>(\w:\\|\\\w*\\\w*)(\w*\s*[\\]*[-]*)*(\w*\s*[-]*)*(\.\w*)*)
EXTRACT-dl_process = Process:.(?P<dl_process>(\S+:[\\])(\w*\s*[\\]*[-]*)*(\w*\s*[-]*)*(\.\w*)*)
EXTRACT-dl_drive = (Drive|Drive letter):.(?<dl_drive>\S*:*[\\]*)
EXTRACT-dl_device_id = (Device Id|Device identification):.(?P<dl_device_id>(\w*\W*\s*)*?(Serial number \w*\W*))
EXTRACT-dl_device_type = The drive\s(\w:\\|\\\w*\\\w*)\s\((?P<dl_device_type>(\w*\W*[-]*\s*\w*\W*?(?=\))))
EXTRACT-dl_volume_container = Volume.container:.(?P<dl_volume_container>(\S+:[\\])(\w*\s*[\\]*[-]*)*(\w*\s*[-]*)*(\.\w*)*)
EXTRACT-dl_message = Message:\R(?P<dl_message>(\w*\W*\s*\R*)*)
EXTRACT-dl_new_file_name = New.file.name:.(?P<dl_new_file_name>(\w*\s*[-]*)*(\.\w*)*)
EXTRACT-dl_old_file_name = Old.file.name:.(?P<dl_old_file_name>(\w*\s*[-]*)*(\.\w*)*)
EXTRACT-dl_old_file_path = Old.file.path:.(?P<dl_old_file_path>(\w:\\|\\\w*\\\w*)(\w*\s*[\\]*[-]*)*(\w*\s*[-]*)*(\.\w*)*)