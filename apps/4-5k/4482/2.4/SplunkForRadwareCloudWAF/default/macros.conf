[Request_Status_over_time_by_webapp(1)]
args = ServerName
definition = timechart count by fqdn

[Violations_distribution_over_time_by_webapp(1)]
args = ServerName
definition = timechart count by violationcategory 

[Attack_type_distribution_over_time_by_webapp(1)]
args = ServerName
definition = timechart count by module

[Top_HTTP_methods(1)]
args = ServerName
definition = top method limit=20

[Top_HTTP_Host(1)]
args = ServerName
definition = top fqdn limit=20

[Top_Object_count_ip_to_country(1)]
args = ServerName
definition = iplocation srcIP | eval srcIP=if(isnotnull(x_rdwr_ip),x_rdwr_ip,srcIP) | stats count by SourceIP Country | sort -count

[Top_Object_by_webapp_and_device(1)]
args = ServerName
definition = top http_security_violation limit=20

[Top_attack_types(1)]
args = ServerName
definition = top module limit=20

[Top_severities(1)]
args = ServerName
definition = top severity limit=20

[Top_attacking_countries(1)]
args = ServerName
definition = iplocation srcIP | top Country limit=10

[Top_attacking_IPs(1)]
args = ServerName
definition = eval srcIP=if(isnotnull(x_rdwr_ip),x_rdwr_ip,srcIP) | top SourceIP limit=20

[Top_signatures(1)]
args = ServerName
definition = top violationtype limit=20

[Violations_count_by_URIs(1)]
args = ServerName
definition = stats count(violationtype) as #_Violations by uri | sort -#_Violations

[Events_distribution_by_web_app(1)]
args = ServerName
definition = timechart count by fqdn limit=20

[Top_attacked_web_apps(1)]
args = ServerName
definition = top fqdn limit=20

[Attacked_IPs(1)]
args = ServerName
definition = stats max(fqdn)

[Anomalies_ip_to_country(1)]
args = ServerName
definition = eval srcIP=if(isnotnull(x_rdwr_ip),x_rdwr_ip,srcIP) | iplocation srcIP | stats max(violationtype) as Vulnerability by Country

[Blocked_IP_count_by_time(1)]
args = ServerName
definition = module="IPBlocking_SubSys"| eval srcIP=if(isnotnull(x_rdwr_ip),x_rdwr_ip,srcIP) | chart max(srcIP) as "# of dropped" over _time

[Blocked_country_count(1)]
args = ServerName
definition = module="IPBlocking_SubSys" | eval srcIP=if(isnotnull(x_rdwr_ip),x_rdwr_ip,srcIP) | iplocation srcIP | chart count by Country

[Blocked_Sources(1)]
args = ServerName
definition = module="IPBlocking_SubSys" | eval srcIP=if(isnotnull(x_rdwr_ip),x_rdwr_ip,srcIP) | chart count by srcIP

