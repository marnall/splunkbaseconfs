[array.samples]
disabled = true
index = main
source = eventgen
sourcetype = purestorage:flashblade:array
interval = 600
randomizeCount = 0.2

## Replace Created Time
token.0.token = #_as_of#
token.0.replacementType = timestamp
token.0.replacement = %s000

## Replace Array ID
token.1.token = #array_id#
token.1.replacementType = file
token.1.replacement = $SPLUNK_HOME/etc/apps/TA-ps_flashblade/samples/array_id.txt

## Replace Array Name
token.2.token = #array_name#
token.2.replacementType = file
token.2.replacement = $SPLUNK_HOME/etc/apps/TA-ps_flashblade/samples/array_name.txt

