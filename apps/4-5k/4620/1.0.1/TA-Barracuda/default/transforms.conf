# DO NOT EDIT THIS FILE!
# Please make all changes to files in $SPLUNK_HOME/etc/apps/TA-Barracuda/local.
# To make changes, copy the section/stanza you want to change from $SPLUNK_HOME/etc/apps/TA-Barracuda/default
# into ../local and edit there.

#======================================
# Sourcetypes
#======================================
[barracuda_sourcetype_recv]
DEST_KEY = MetaData:Sourcetype
REGEX    = \d{10}\s\d{10}\sRECV
FORMAT   = sourcetype::barracuda::recv

[barracuda_sourcetype_send]
DEST_KEY = MetaData:Sourcetype
REGEX    = 0\s0\sSEND
FORMAT   = sourcetype::barracuda::send

[barracuda_sourcetype_scan]
DEST_KEY = MetaData:Sourcetype
REGEX    = \d{10}\s\d{10}\sSCAN
FORMAT   = sourcetype::barracuda::scan

[barracuda_sourcetype_management]
DEST_KEY = MetaData:Sourcetype
REGEX    = web\:\s+\[\S+\]
FORMAT   = sourcetype::barracuda::management

#==================================
# Search Time Field Extractions
#=================================
[barracuda_scan]
REGEX	 = (\S+)\:\s(\S+)\[(\S+)\]\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(.*?)SZ\:(.*)
FORMAT	 = process::$1 smtp_hostname::$2 smtp_ip::$3 mail_id::$4 start::$5 end::$6 service::$7 encryption::$8 from::$9 to::$10 score::$11 action_id::$12 motif_id::$13 extra_motif::$14 subject::$15

[barracuda_recv]
REGEX    = (inbound\/pass[12])\:\s(\S+)\[(\S+)]\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)\s(\S+)
FORMAT   = process::$1 smtp_hostname::$2 smtp_ip::$3 mail_id::$4 start::$5 end::$6 service::$7 from::$8 to::$9 action_id::$10 motif_id::$11 extra_motif::$12

[barracuda_send]
REGEX    = (\S+)\:\s(?:\S+)\s(\S+)\s(?:\S+)\s(?:\S+)\s(?:\S+)\s(\S+)\s(\S+)\s(\S+)(.*)
FORMAT   = send_process::$1 mail_id::$2 send_encryption::$3 send_action_id::$4 queue_id::$5 response::$6

#==============
# Lookups
#==============
[barracuda_recv_scan_action]
filename = barracuda_recv_scan_action.csv

[barracuda_recv_scan_reason]
filename = barracuda_recv_scan_reason.csv

[barracuda_send_action]
filename = barracuda_send_action.csv
