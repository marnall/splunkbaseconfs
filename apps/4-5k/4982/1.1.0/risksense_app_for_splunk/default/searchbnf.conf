[rsgetfindings-command]
syntax = | rsgetfindings client_id="<client id>" asset_type="<finding type>" severity="<severity>" asset_id="<asset id>" host_name="<host>" application_name="app" operator="EXACT | WILDCARD" filters="field1=value1:OPEATOR1"
description = This command fetches Findings information from RiskSense API. Asset type can have hostFindings | applicationFindings value. Severity can have CRITICAL | HIGH | MEDIUM | LOW | INFO | TOTAL values. Operator can have EXACT | WILDCARD value.
shortdesc = Collects Findings data
example1 = | rsGetFindings client_id="747" asset_type="applicationFindings " severity="total" asset_id="19391" filters="id=1410927:EXACT"
usage = public
appears-in = 1.0.0
category = generating
maintainer = RiskSense Inc.