[aix_metric]
FIELDALIAS-application = application AS app_name application AS app_title
FIELDALIAS-apdex_score = apdex_avg AS apdex_score
FIELDALIAS-response_time = server_response_time_ms_avg AS response_time
EVAL-availability = 1
EVAL-health = 0
EVAL-error_rate = 0

