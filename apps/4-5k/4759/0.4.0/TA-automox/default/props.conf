[automox:devices]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[automox:software]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
EVAL-status = if(installed="false", "available", status)
EVAL-vendor_product = "Automox"
EVAL-severity = "medium"
FIELDALIAS-automox_cim_renames = display_name ASNEW signature server_name ASNEW dest

[automox:events]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
EXTRACT-automox_signature = Installed patches: \\\"(?<signature>[^\\]+)
FIELDALIAS-automox_cim_renames = server_name ASNEW dest
EVAL-status = case(name="system.policy.action" AND 'data.status'="0", "installed", name="system.policy.action" AND 'data.status'="1", "invalid", 1==1, status)
EVAL-vendor_product = "Automox"
EVAL-severity = "medium"

[source::...ta-automox*.log*]
SHOULD_LINEMERGE = true
sourcetype = ta:automox:log

[source::...ta_automox*.log*]
SHOULD_LINEMERGE = true
sourcetype = ta:automox:log
