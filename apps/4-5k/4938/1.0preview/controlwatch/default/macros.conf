[determine_criticality_score(4)]
args = asset_id_field, alert_id_field, multiplier_field, output_field
iseval = 0
definition = streamstats count as test_row_id\
| eval test_key_storage = _key\
| eval test_asset_id = $asset_id_field$\
| `bah_get_alert_importance_severity($alert_id_field$)`\
| rename alert_importance_severity AS test_alert_severity\
| mvexpand test_asset_id\
| lookup bah_assets _key as test_asset_id OUTPUT asset_criticality as test_real_asset_criticality, site as test_real_site_name\
| eval test_asset_crit = coalesce(test_real_asset_criticality, "Medium")\
| eval test_site_name = coalesce(test_real_site_name, "Unknown")\
| lookup bah_sites site_name as test_site_name OUTPUT site_criticality as test_site_crit\
| `severity_name_to_value(test_asset_crit)`\
| `severity_name_to_value(test_site_crit)`\
| `get_alert_importance_multiplier(test_alert_severity)`\
| eval test_total_crit = test_asset_crit * test_site_crit * test_alert_severity * multiplier\
| eventstats max(test_total_crit) as $output_field$ by test_row_id\
| where test_total_crit == $output_field$\
| dedup test_row_id\
| fields - test_row_id, test_total_crit, test_asset_crit, test_site_crit,\
test_site_name, test_real_site_name,\
test_asset_id, test_real_asset_criticality\
test_alert_severity

