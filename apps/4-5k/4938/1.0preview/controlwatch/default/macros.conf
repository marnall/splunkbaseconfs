| sort 0 -change_time \
| convert timeformat="%m/%d/%Y %H:%M:%S" ctime(change_time) AS "Change Time" \
| eval change_type=case(change_type == "business_unit", "Business Unit",change_type == "comment","Comment", change_type =="creation", "Creation", change_type=="responder", "Responder",change_type == "response_status", "Response Status", true(), change_type)\
| eval asset_id = mvindex(split(previous_value,":"),0)\
| eval asset_status = mvindex(split(previous_value,":"),5)\
| eval new_previous_value = if(change_type=="Asset Status", asset_id.":".asset_status, previous_value)\
| eval asset_id = mvindex(split(current_value,":"),0)\
| eval asset_status = mvindex(split(current_value,":"),5)\
| eval new_current_value = if(change_type=="Asset Status", asset_id.":".asset_status, current_value)\
| rename changed_by AS src_user_name\
| table "Change Time", response_status, change_type, new_previous_value, new_current_value, src_user_name, comment\
| fillnull value="*" new_previous_value, new_current_value\
| rename response_status AS "Ticket Status", change_type AS "Change Type", new_previous_value AS "Previous Value", new_current_value AS "Current Value", src_user_name AS "Changed By", comment AS Comment
