[alerts_ticket_profile_ticket_details_search(2)]
args = filter, app
definition = index=bah_tickets $filter$ \
| lookup bah_open_tickets ticket_id\
| rex field=triggering_event "^(?<cve>CVE\\-\\d+\\-\\d+)\\s+"\
| eval app="$app$"\
| eval triggering_event=if(isnotnull(cve),replace(triggering_event,cve,"<a href='/app/".app."/global_cve_details?form.cve_id=".cve."' target='_blank'>".cve."</a>"), triggering_event)\
| join type=left ticket_id [search index=bah_ticket_history $filter$ | head 1]\
| lookup bah_ticket_relationships ticket_id OUTPUT asset_id \
| eval asset_id=mvindex(split(mvindex(asset_id,0),":"),0)\
| lookup bah_assets _key AS asset_id OUTPUT host_ip, host_name\
| `bah_find_site(src_ip, site)`\
| eval host_name=mvdedup(host_name), host_ip=mvdedup(host_ip)\
| eval site=mvdedup(site), host_name=mvdedup(host_name), host_ip=mvdedup(host_ip)\
| eval host_ip=if(isnull(host_ip), src_ip, host_ip)\
| `determine_criticality_score(asset_id, alert_id, null, severity)`\
| eval dest_user_name=coalesce(dest_user_name, src_user_name, "None")\
| eval dest_user_id=coalesce(dest_user_id, src_user_id, "None")\
| lookup bah_open_tickets ticket_id AS ticket_id OUTPUT _key \
| eval _key = if(mvcount(_key) != 0, mvindex(_key, 0), _key) \
| eval ticket_status = if(isnull(_key), "Closed", ticket_status)\
| eval response_status = if(isnull(_key), "Complete", response_status)\
| eval _key=if(isnull(_key), "NOKEY_TICKETCLOSED", _key) \
| eval comment=if(isnull(comment), "None", comment) \
| eval business_unit=if(isnull(business_unit), "None", business_unit) \
|  `convert_alert_severity`\
| lookup bah_sites site_name AS site OUTPUT country\
| fillnull value="Unknown" host_ip, host_name, site, country\
| table _time, _key, ticket_id, orig_severity, severity, triggering_event, site, country, host_name, host_ip, ticket_status, response_status, dest_user_id, dest_user_name, business_unit, comment, description
iseval = 0

