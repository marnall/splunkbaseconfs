[settings]
minify_js = False
minify_css = False
js_no_cache = True
cacheEntriesLimit = 0
cacheBytesLimit = 0
loginCustomLogo =  controlwatch:logincustombg/controlwatch_logo.png
enableWebDebug = True
login_content = <style> .wrapper-container { margin-top: 0vh !important; } .account-login {margin:0 auto; display: table !important;} .custom-logo {max-height: 400px; margin-bottom:-5%; margin-top: 5vh;} </style>
loginBackgroundImageOption = custom
loginCustomBackgroundImage = controlwatch:logincustombg/controlwatchsplunkbaseloginbackground.png

[expose:custom_external_service_externalkv]
pattern=external_call
methods=GET,POST
