[[RN-1012] MicroLogix Logic Changed (V0R1)]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */5 * * * *
description = This saved search populated the bah_device_changes with online edits that are made in the MicroLogix PLCs.
