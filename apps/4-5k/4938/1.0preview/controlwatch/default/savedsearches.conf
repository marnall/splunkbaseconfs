[[AL-9013] Device Made Connection using New Protocol (V0R7)]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 30 * * * *
description = ControlWatch has detected that a device has connected using a protocol for the first time.
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.events.fields = ["description","src_ip","dest_ip","action","key","protocol"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.statistics.rowNumbers = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = index=bah_networking\
| where src_ip != " " AND src_port != " "\
| dedup src_ip, src_port\
| eval time_now = now()\
| lookup bah_assets host_ip AS src_ip OUTPUT _key AS asset_id, site, host_name, device_type\
| where isnotnull(asset_id) AND asset_id!="000000-000000-00000000-0000"\
| lookup bah_assets_connections _key AS asset_id OUTPUT protocol_used, ip_visited\
| eval usedNewProtocol=if(isnotnull(mvfind(protocol_used, src_port)), "Already used protocol", "New protocol")\
| search usedNewProtocol="New protocol"\
| table asset_id, time_now, src_ip, src_port, site, protocol_used, device_type, host_name, ip_visited, _raw\
| eval triggering_event= _raw\
| mvcombine src_port\
| eval protocol_used=mvappend(protocol_used, src_port)\
| eval protocol_used=mvdedup(protocol_used)\
| outputlookup bah_assets_connections append=t key_field=asset_id\
| mvexpand protocol\
| eval description = "The ".device_type." ".host_name." (".src_ip.") has communicated using a new protocol: ".src_port." (".protocol_description.")"\
| eval description = if(isnull(description), "The device has communicated using a new protocol", description)\
| lookup bah_ticket_relationships asset_id OUTPUT ticket_id\
| lookup bah_open_tickets ticket_id OUTPUT alert_id as open_alert_id\
| where open_alert_id != alert_id\
| eval alert_id="[AL-9013]"\
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)`\
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")`\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

[[RC-1009] Identify CPE(s) affected by CVE]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 6 * * *
description = Searches the ControlWatch NVD index and runs `cpefind` to find the CPE's affected by the CVE. This populates the bah_cve_correlations KV Store for later use.
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.events.fields = ["description","dest_ip","action","host_name","ticket_id"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.statistics.rowNumbers = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = index=bah_nvd\
| spath output=affects path=cve.affects\
| spath output=affected_vendor path=cve.affects.vendor.vendor_data{}.vendor_name\
| cpefind\
| rename "lastModifiedDate" as last_modified_date, "cve.CVE_data_meta.ID" as cve,\
"cve.description.description_data{}.value" as message,\
"impact.baseMetricV3.cvssV3.baseSeverity" as severity, "cve.references.reference_data{}.tags{}" as\
vulnerability_type, "impact.baseMetricV3.cvssV3.baseScore" as cvss_v3,\
"impact.baseMetricV3.cvssV3.attackVector" as attack_vector,\
"impact.baseMetricV3.cvssV3.attackComplexity" as attack_complexity\
| table cve, message, severity, affected_vendor, affected_cpes, last_modified_date,\
vulnerability_type, cvss_v3, attack_vector, attack_complexity\
| rename message AS cve_description, severity AS cve_severity, affected_cpes AS affected_cpe_uri\
| outputlookup bah_cve_correlations append=true

[[AL-9019] A vulnerability has been added to the NVD that potentially affects site(s) (V1R2)]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 0 * * *
description = New vunlerability in the NVD database that potentially affects asset(s)\
[AL-9019-CRITICAL]: New CVE has a CVSS Severity of CRITICAL\
[AL-9019-HIGH]: New CVE has a CVSS Severity of HIGH\
[AL-9019-MEDIUM]: New CVE has a CVSS Severity of MEDIUM\
[AL-9019-LOW]: New CVE has a CVSS Severity of LOW\
[AL-9019-UNKNOWN_SEVERITY]: No CVSS Severity found in CVE
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.events.fields = ["description","dest_ip","action","host_name","ticket_id"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.statistics.rowNumbers = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = | inputlookup bah_cve_correlations\
| eval time_now = now()\
| lookup bah_assets cpe_uri AS affected_cpe_uri OUTPUT _key AS asset_id, site\
| where isnotnull(asset_id)\
| fields - asset_id\
| eval site=mvdedup(site)\
| mvexpand site\
| lookup bah_assets cpe_uri AS affected_cpe_uri, site OUTPUT _key AS asset_id, host_ip AS src_ip\
| eval cve_severity=if(isnull(cve_severity),"UNKNOWN_SEVERITY",cve_severity)\
| eval site=if(isnull(site), "Unknown", site)\
\
| eval description = "A \"".cve_severity."\" vulnerability has been added to the National Vulnerability Database (NVD) that potentially affects ".toString(mvcount(asset_id))." asset(s) at the ".site." site"\
| eval description = if(isnull(description), "A vulnerability has been added to the National Vulnerability Database (NVD) that potentially affects asset(s) at the ".site." site", description)\
| eval triggering_event = cve." : ".cve_description\
\
| eval alert_id="[AL-9019-".cve_severity."]"\
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)`\
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")`\
| eval severity = alert_criticality\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

[[AL-9016] Detected an Internal network IP scanning an Internal network IP (V1R1)]
alert.digest_mode = 0
alert.severity = 5
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = ControlWatch has detected an internal network IP scanning an internal network IP.
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = index=bah_networking sourcetype=eagle:one "IP fw match"\
| eval earliest=relative_time(now(), "-60m")\
| eval latest=now()\
| rex field=_raw "iface src (?P<src_ip>[\d\.]+) dst (?P<dest_ip>[\d\.]+) proto (tcp|udp) port src (?P<src_port>\d+) dst (?P<dst_port>\d+) "\
| bin _time span=1m\
| stats dc(dst_port) as ports_per_minute by src_ip, _time, dest_ip\
| stats max(ports_per_minute) as max_port_scan_rate by src_ip, dest_ip\
| sort + max_port_scan_rate\
| streamstats  stdev(max_port_scan_rate) as standard_deviation, avg(max_port_scan_rate) as average_connections\
| eval standard_deviation = max(average_connections, standard_deviation)\
| eval distance_from_baseline = abs((max_port_scan_rate - average_connections)/standard_deviation)\
| where distance_from_baseline >= 2\
| lookup bah_assets host_ip as src_ip OUTPUT site as src_site, device_type as src_device_type\
| lookup bah_assets host_ip as dest_ip OUTPUT site as dest_site, device_type as dest_device_type\
| lookup bah_subnet_definitions subnet_name as src_ip OUTPUT zone as src_zone\
| eval src_is_external = if(isnull(src_zone), 1, 0)\
| lookup bah_subnet_definitions subnet_name as dest_ip OUTPUT zone as dest_zone\
| eval dest_is_external = if(isnull(dest_zone), 1, 0)\
| eval how_bad = case(src_is_external = 1 and dest_is_external = 1, "Medium", src_is_external = 1 AND dest_is_external = 0, "High", src_is_external = 0 AND dest_is_external = 0, "Critical", true(), "Unknown")\
| where how_bad == "Critical"\
| eval time_now = now()\
| eval alert_criticality = `enum_severity("critical")`\
| eval alert_id="[AL-9016]"\
| `find_asset_id(host_ip, dest_ip, asset_id)`\
| eval site = coalesce(dest_site, "Unknown")\
| eval src_device_type=if(isnull(src_device_type), " ", src_device_type)\
| eval host_ip=if(isnull(host_ip), " ", host_ip)\
| eval dest_ip=if(isnull(dest_ip), " ", dest_ip)\
| eval description = "Detected network scanning from Internal host ".src_ip." to Internal IP ".dest_ip\
| eval description = if(isnull(description), "Detected network scanning from Internal host to Internal IP", description)\
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)`\
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")`\
| eval severity = alert_criticality\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

