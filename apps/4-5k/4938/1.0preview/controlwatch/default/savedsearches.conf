dispatch.latest_time = -1m@m
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = `cim_OT_kepware_indexes` sourcetype=kepware Tag=*Online* Quality="good"\
| lookup bah_historian_device_correlations device_match as Tag OUTPUT device_name, device_id\
| lookup bah_assets host_ip as device_id OUTPUT manufacturer\
| search manufacturer="Allen-Bradley"\
| eval started = if(searchmatch("Tag=*Started"), Value, NULL)\
| eval testing = if(searchmatch("Tag=*Testing"), Value, NULL)\
| sort _time\
| streamstats latest(started) as started, latest(testing) as testing by device_id, device_name\
| sort - _time\
| eval state = case(\
    started = 0 and testing = 0, "no_edits",\
    started = 1 and testing = 0, "editing",\
    started = 1 and testing = 1, "testing",\
    true(), "invalid"\
)\
| where state="testing"\
| eval change_type= 2\
| eval src_ip = device_id, src_host = device_name, event_type = "logic_changed", value = Value, tag=Tag, historian="kepware"\
| table _time, src_ip, src_host, event_type, value, historian, device_id, device_name, tag, change_type\
| `collect(bah_historian_events)`

