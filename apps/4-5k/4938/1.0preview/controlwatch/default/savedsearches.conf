| eval     host_ip=if(src_site!="Unknown",          src_ip, dest_ip)\
| eval   host_name=if(src_site!="Unknown",       host_name, dest_host_name)\
| eval        site=if(src_site!="Unknown",        src_site, dest_site)\
| `bah_use_this_asset_for_alert(asset_id=asset_id, ip_address=host_ip, host_name=host_name, site=site)`\
\
| `determine_criticality_score(asset_id, alert_id, null, severity)`\
| `set_site_risk_status(src_site, severity, "open")`\
