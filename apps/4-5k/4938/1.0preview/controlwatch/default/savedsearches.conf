[[AL-9020] External Device Attempted Inbound TCP Connection to ICS Port and/or Device]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 15 * * * *
description = External device attempted to establish an Inbound TCP connection ICS device and/or port
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = index=bah_networking sourcetype="cisco:asa" earliest=-60m latest=now (message_id=106001 OR message_id=302013)\
\
| `bah_find_site(src_ip, src_site)`\
| lookup bah_assets _key AS asset_id OUTPUT host_name AS src_host_name\
\
| `bah_find_site(dest_ip, dest_site)`\
| lookup bah_assets _key AS asset_id OUTPUT host_name AS dest_host_name, device_type AS dest_device_type\
\
| where src_site="Unknown" AND dest_site!="Unknown"\
\
| lookup common_ports.csv port OUTPUT description AS common_protocol, category\
| fillnull value="Unknown" host_name, device_type, dest_device_type, dest_host_name, common_protocol, category\
| eval common_protocol=mvjoin(common_protocol,", ")\
\
| eval isICSDevice = if(`device_filter_ics(dest_device_type)`,1,0)\
| eval isICSPort = if(category="ICS",1,0)\
| where isICSDevice=1 OR isICSPort=1\
\
| eval icsMatch = if(isICSDevice=1 AND isICSPort=1, "IP&Port", "IP/or/Port")\
| eval icsMatch = if(isICSDevice=1 AND isICSPort=0, "IP", icsMatch)\
| eval icsMatch = if(isICSDevice=0 AND isICSPort=1, "Port", icsMatch)\
\
| eval action=case(message_id=106001, "Denied", message_id=302013, "Built")\
\
| eval port_text = if(isICSPort=1,"ICS Port ".port, "Port ".port)\
| eval action_text = if(action="Denied", " and was denied", "")\
\
| eval alert_id="[AL-9020-".action."-".icsMatch."]"\
| eval description="External device (".src_host_name.", ".src_ip.") attempted to establish an inbound TCP connection through the firewall to ".dest_device_type." (".dest_host_name.", ".dest_ip.") over ".port_text." (commonly used for ".common_protocol.")".action_text\
| eval description = if(isnull(description), "An external device attemptied to establish an inbound TCP connection through the firewall", description)\
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(_time) AS readable_time\
| eval triggering_event = _raw\
\
| `bah_use_this_asset_for_alert(asset_id=asset_id, ip_address=dest_ip, host_name=dest_host_name, site=dest_site)`\
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)`\
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")`\
| eval severity = alert_criticality\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

