| eval device_name=case(tag_device=="AB-ML.ML1100","MicroLogix_Channel.MicroLogix_1100", tag_device=="AB-ML.ML1400","MicroLogix_Channel.MicroLogix_1400") \
| eval device_id=case(tag_device=="AB-ML.ML1100","10.128.70.144", tag_device=="AB-ML.ML1400","192.168.100.224") \
| eval src_ip = device_id, src_host = device_name, event_type = "access_denied", value = Value, tag=Tag, historian="kepware" \
| lookup bah_historian_device_correlations device_id historian OUTPUT asset_id \
| table _time, src_ip, src_host, event_type, value, historian, device_id, device_name, tag, asset_id  \
| lookup bah_assets host_ip as src_ip OUTPUT device_type, host_name, host_ip, site \
| eval description = "A failed login attempt has occurred on ".device_type." (".host_name.", ".host_ip.") at the ".site." site" \
| eval description = if(isnull(description), "A failed attempt to log into the PLC occurred on an Allen-Bradley PLC", description)  \
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(change_time) AS change_time  \
| eval triggering_event = _raw  \
| eval triggering_event = if(isnull(triggering_event), "The source event for this alert triggered a ".create_time, triggering_event)  \
| stats count(asset_id) as device_count by src_ip, src_host, event_type, historian, device_id, device_name, tag, asset_id \
| eval alert_id_message=case(device_count==1,"1",device_count>=5,"5+") \
| eval alert_id="[AL-9042-failed(".alert_id_message.")]" \
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)` \
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")` \
| eval severity = alert_criticality \
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

