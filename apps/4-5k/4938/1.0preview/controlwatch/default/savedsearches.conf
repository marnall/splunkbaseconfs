| outputlookup bah_dash_overview.csv\
\
| table site, site_risk_status, severity\
| rename site AS site_name, site_risk_status AS risk_status\
| lookup bah_sites site_name OUTPUTNEW\
| eval key=_key\
| outputlookup bah_sites key_field=key

[[DA-0102] Open Ticket Counts, Update bah_ticket_response_stats.csv]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = * * * 1 *
dispatch.earliest_time = -1w
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.statistics.rowNumbers = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = | inputlookup bah_tickets_splunkbase.csv\
| where ticket_status != "Closed"\
| rename site_name AS site\
| stats count by site, severity\
| eval severity=lower(severity)\
| xyseries site, severity, count\
| table site, critical, high, medium, low, info\
| addtotals fieldname=total\
| fillnull value=0\
| addcoltotals labelfield=site label=Global\
\
| join type=left site [| inputlookup bah_tickets_splunkbase.csv\
| where ticket_status != "Closed"\
| rename site_name AS site\
| stats count by site, response_status\
| eval response_status=case(response_status="In Progress", "in_progress", response_status="New", "new")\
| xyseries site, response_status, count\
| addtotals fieldname=total\
| fillnull value=0\
| addcoltotals labelfield=site label=Global\
| eval by_response_status="In Progress:".in_progress.",New:".new\
| table site, by_response_status]\
\
| join type=left site [| inputlookup bah_tickets_splunkbase.csv\
| where ticket_status != "Closed" AND responder != "System"\
| rename site_name AS site\
| stats count by site, responder\
| eval responder="responder_".replace(responder," ","_")\
| xyseries site, responder, count\
| fillnull value=0\
| addcoltotals labelfield=site label=Global\
| foreach responder* [eval <<FIELD>>=replace(replace("<<FIELD>>","responder_",""),"_"," ").":".<<FIELD>>]\
| foreach responder* [eval by_responder=mvappend(by_responder,<<FIELD>>)]\
| eval by_responder=mvjoin(by_responder,",")\
| table site, by_responder]\
\
| lookup bah_ticket_response_stats.csv site OUTPUTNEW\
| append [|inputlookup bah_ticket_response_stats.csv]\
| dedup site\
| outputlookup bah_ticket_response_stats.csv

