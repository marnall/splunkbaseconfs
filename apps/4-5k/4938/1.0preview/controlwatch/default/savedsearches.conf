quantity = 0
relation = greater than
search = index=bah_networking sourcetype="cisco:asa" earliest=-60m latest=now message_id=106002\
\
| `find_asset_id(host_ip, src_ip, asset_id)`\
| eval asset_id=mvdedup(asset_id)\
| lookup bah_assets _key AS asset_id OUTPUT host_name, device_type AS src_device_type\
| `bah_find_site(src_ip, src_site)`\
| eval host_name=mvdedup(host_name), src_site=mvdedup(src_site)\
| rename asset_id AS src_asset_id\
\
| `find_asset_id(host_ip, dest_ip, dest_asset_id)`\
| eval dest_asset_id=mvdedup(dest_asset_id)\
| lookup bah_assets _key AS dest_asset_id OUTPUT host_name AS dest_host_name, device_type AS dest_device_type\
| `bah_find_site(dest_ip, dest_site)`\
