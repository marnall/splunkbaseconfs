[[AL-9010] Detected cross zone communication violation (V0R7)]
alert.digest_mode = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = Detected cross zone communication violation based on configurations in Zone Communications.
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = index = bah_networking earliest=-60m latest=now\
| table src_ip, dest_ip, _time\
\
`comment(Get the src_site for the src_ip)`\
| `find_asset_id(host_ip, host_ip, asset_id)`\
| lookup bah_assets _key as asset_id OUTPUT site, host_name\
\
`comment(Lookup the zones for the src_ip and the dest_ip)`\
| lookup bah_subnet_definitions subnet_name as src_ip OUTPUT zone as src_zone\
| lookup bah_subnet_definitions subnet_name as dest_ip OUTPUT zone as dest_zone\
\
`comment(Only look at entries where there is data in both the src and dest zone)`\
| where (src_zone != "" and dest_zone != "")\
\
`comment(Only get instances that match BOTH the TO and FROM)`\
| lookup bah_zone_communications from as src_zone, to as dest_zone OUTPUT communication, name AS zone_rule_name, _key AS zone_rule_key\
\
`comment(Show only zone violations.)`\
| where communication = "Not Allowed"\
\
| eval time_now = now()\
`comment(TODO: verify src_ip or dest_ip is correct for host_ip)`\
| eval host_ip = src_ip\
| eval description = "Zone communication violation from: ".src_zone." - ".src_ip." to: " .dest_zone." - ".dest_ip\
| eval description = if(isnull(description), "Zone communication violation", description) \
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(_time) AS readable_time\
| eval triggering_event = "Cross zone communications violation between ".src_zone." and ".dest_zone.". Communications between ".src_ip." and ".dest_ip." at ".readable_time." are contrary to ".zone_rule_name." (".zone_rule_key.") as configured."\
| eval triggering_event = if(isnull(triggering_event), "Cross zone communications violation detected at ".readable_change_time, triggering_event)\
\
| eval alert_id="[AL-9010]"\
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)`\
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")`\
| eval severity = alert_criticality\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

[[PL-8003] Ticket Duration]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */5 * * * *
description = A table to store ticket status and response duration that will power searches for the ticket history panel.
dispatch.earliest_time = -10m
dispatch.latest_time = -5m
display.general.timeRangePicker.show = 0
enableSched = 1
search = index=bah_ticket_history \
| lookup bah_ticket_relationships ticket_id OUTPUT asset_id\
| eval asset_id=split(asset_id,":"), asset_id=mvindex(asset_id,0)\
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=severity)`\
| stats latest(_time) by ticket_status, ticket_id, severity\
| dedup ticket_id\
| join ticket_id type=left [search index=bah_ticket_history response_status="In Progress" \
    | lookup bah_ticket_relationships ticket_id OUTPUT asset_id\
    | eval asset_id=split(asset_id,":"), asset_id=mvindex(asset_id,0)\
    | `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=severity)`\
    |  stats earliest(time_now) as earliest_inprogress latest(time_now) as latest_inprogress by ticket_id, creation_time, severity]\
|join ticket_id type=left [search index=bah_ticket_history |  search ticket_status="Closed" \
    | lookup bah_ticket_relationships ticket_id OUTPUT asset_id\
    | eval asset_id=split(asset_id,":"), asset_id=mvindex(asset_id,0)\
    | `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=severity)`\
    |  stats latest(last_modified_time) as latest_closed by ticket_id, creation_time, severity]\
| `convert_alert_severity`\
| eval key=ticket_id\
| eval duration_to_inprogress = earliest_inprogress - creation_time \
| eval duration_to_closed = latest_closed - creation_time\
| where earliest_inprogress > 0 OR latest_closed > 0 \
| table ticket_id creation_time earliest_inprogress latest_inprogress latest_closed duration_to_inprogress duration_to_closed, severity, ticket_status\
| outputlookup bah_ticket_duration key_field=key append=True

[[AL-9011] OT Device successfully communicated with external IP address (V0R7)]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = OT Device successfully communicates with external IP address.\
[AL-9011-Inbound]: External IP address connected to an OT device\
[AL-9011-Outbound]: OT device communicated out to an External IP address
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = index=bah_networking action=allowed\
| where isnotnull(src_ip) AND isnotnull(dest_ip)\
\
| `find_asset_id(host_ip, src_ip, src_asset_id)`\
| eval src_asset_id=mvdedup(src_asset_id)\
| lookup bah_assets _key AS src_asset_id OUTPUT host_name, device_type AS src_device_type\
| `bah_find_site(src_ip, src_site)`\
| eval host_name=mvdedup(host_name), src_site=mvdedup(src_site)\
\
| `find_asset_id(host_ip, dest_ip, dest_asset_id)`\
| eval dest_asset_id=mvdedup(dest_asset_id)\
| lookup bah_assets _key AS dest_asset_id OUTPUT host_name AS dest_host_name, device_type AS dest_device_type\
| `bah_find_site(dest_ip, dest_site)`\
\
| where (src_site="Unknown" AND dest_site!="Unknown") OR (src_site!="Unknown" OR dest_site="Unknown")\
\
| fillnull value="Unknown" src_device_type dest_device_type, dest_site, src_site\
\
| table src_site, src_device_type, dest_site, dest_device_type, src_ip, dest_ip, _raw, src_asset_id, dest_asset_id, host_name, dest_host_name\
\
| where (`device_filter_ics(src_device_type)` and dest_site = "Unknown") or (`device_filter_ics(dest_device_type)` and src_site = "Unknown")\
| eval communication_direction=case(src_site = "Unknown", "Inbound", dest_site = "Unknown", "Outbound")\
\
| eval alert_id="[AL-9011-".communication_direction."]"\
\
| eval    asset_id=if(src_site!="Unknown",    src_asset_id, dest_asset_id)\
| eval     host_ip=if(src_site!="Unknown",          src_ip, dest_ip)\
| eval   host_name=if(src_site!="Unknown",       host_name, dest_host_name)\
| eval device_type=if(src_site!="Unknown", src_device_type, dest_device_type)\
| eval        site=if(src_site!="Unknown",        src_site, dest_site)\
| eval internal_ip=if(src_site!="Unknown",          src_ip, dest_ip)\
| eval external_ip=if(src_site ="Unknown",          src_ip, dest_ip)\
\
| fillnull value="Unknown" host_ip, host_name, device_type, site, internal_ip, communication_direction, external_ip\
\
| eval description = "The OT device ".device_type." (".host_name.", ".internal_ip.") at the ".site." site successfully made an ".lower(communication_direction)." communication with an external device at ".external_ip\
| eval description = if(isnull(description), "OT device successfully communicated with an external device", description)\
| eval triggering_event = _raw\
\
| `bah_use_this_asset_for_alert(asset_id=asset_id, ip_address=host_ip, host_name=host_name, site=site)`\
| `determine_criticality_score(asset_id, alert_id, null, severity)`\
| `set_site_risk_status(site, severity, "open")`\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

[[AL-9015] OT Device failed to communicate with external address (V0R7)]
alert.digest_mode = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
