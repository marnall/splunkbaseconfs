[[DA-0104] Ticket Asset Fix Status, Update Asset Fix Status]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = * * * 1 *
dispatch.earliest_time = -1w
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.statistics.rowNumbers = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = | inputlookup bah_tickets_splunkbase.csv\
| search alert_id="[AL-9019*"\
| table ticket_id, asset_fix_status, site_name, ticket_id\
| eval asset_fix_status=split(asset_fix_status,"|")\
| mvexpand asset_fix_status\
| eval asset_fix_status=split(asset_fix_status,":")\
| eval asset_id=mvindex(asset_fix_status,2)\
| eval asset_fix_status=mvindex(asset_fix_status,5)\
| table ticket_id, site_name, asset_id, asset_fix_status\
| lookup bah_assets_splunkbase.csv _key AS asset_id OUTPUT applicable_cves\
| eval site_name=site_name.":".ticket_id\
| stats count by applicable_cves, site_name, asset_fix_status\
| eval cve=applicable_cves.":".site_name\
| xyseries cve, asset_fix_status, count\
| fillnull value="0" "Unable to Fix", Fixed, New, "Risk Accepted"\
| eval cve=split(cve,":")\
| eval ticket_id=mvindex(cve,2)\
| eval site=mvindex(cve,1)\
| eval cve_id=mvindex(cve,0)\
| eval cve_details=site.":".New.":".Fixed.":".'Unable to Fix'.":".'Risk Accepted'.":".ticket_id\
| table cve_id, cve_details\
| mvcombine delim="," cve_details\
| nomv cve_details\
| lookup bah_cve_details_splunkbase.csv cve_id OUTPUTNEW\
| append [|inputlookup bah_cve_details_splunkbase.csv]\
| dedup cve_id\
| outputlookup bah_cve_details_splunkbase.csv

