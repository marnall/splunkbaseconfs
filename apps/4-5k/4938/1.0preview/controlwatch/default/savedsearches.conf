[[ST-0001] Update Site Risk Status]
description = This search updates the site risk status of the given site with the new alert severity. Use the searchtrigger command to run this search with the necessary arguments\
arg 1: site         - The site that you wish to update the severity of \
arg 2: severity     - The # value of severity of the alert\
arg 3: ticket_state - The new state of the ticket (open or close); If you are reopening a ticket, use 'open'; If you are updating the site risk status after calculating all open tickets, use 'overwrite'
search = | makeresults 1 \
| eval site_name = "$args.site$" \
| eval arg_severity = "$args.severity$" \
| eval ticket_state = "$args.ticket_state$" \
| eval site_name=split(site_name,"|") \
| eval ticket_state=mvdedup(split(ticket_state,"|")) \
| eval arg_severity=split(arg_severity,"|") \
| eval updates=mvzip(site_name, arg_severity, "|") \
| mvexpand updates \
| table ticket_state, updates \
| eval updates=split(updates,"|") \
| eval site_name=mvindex(updates,0) \
| eval arg_severity=tonumber(mvindex(updates,1)) \
| table ticket_state, site_name, arg_severity \
| stats sum(arg_severity) AS arg_severity by ticket_state, site_name \
| lookup bah_sites site_name OUTPUTNEW \
| eval key = _key \
| eval severity = case(ticket_state == lower("open"),      severity + arg_severity, \
                       ticket_state == lower("close"),     severity - arg_severity, \
                       ticket_state == lower("overwrite"),            arg_severity) \
| `convert_site_severity(severity, risk_status)`\
| table key, * \
| outputlookup bah_sites key_field=key \
| rename site_name AS site, risk_status AS site_risk_status \
| eval time = now() \
| fields site site_risk_status severity time \
|`collect(bah_site_risk_history)`

[[ST-0002] Run Saved Search]
description = This search runs a saved search (meant to be run with search trigger). Use the searchtrigger command to run this search with the necessary arguments\
arg 1: saved_search - The savedsearch you want to run
search = | savedsearch "$args.saved_search$"

[[AL-9045] Firmware Revision]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = This alert triggers when an Allen-Bradley MicroLogix PLC firmware changes.
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = `cim_OT_indexes` Tag="*Compiler*"\
| lookup bah_historian_device_correlations device_match as Tag, historian as sourcetype OUTPUT device_name, device_id, asset_id\
| eval mask = tonumber("FF",16)\
| binaryop operation=bit-shift-right numToShift=8 field=Value inBinary=True output_field=release\
| binaryop operation=AND field=Value secondField=mask inBinary=True output_field=build_number\
| strcat release "-" build_number compiler_revision\
`_(this could possibly be pushed to be its own RN search with streamstats)`\
| streamstats global=f window=2 dc(compiler_revision) as Testing, first(compiler_revision) as current_value, last(compiler_revision) as previous_value by asset_id\
| where Testing = 2\
| table Tag, Value, compiler_revision, release, build_number, asset_id, device_name, device_id\
| eval description = "The compiler revision on asset ".device_name." has changed from ".previous_value." to ".current_value."."\
| eval alert_id="[AL-9045]"\
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)`\
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")`\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

