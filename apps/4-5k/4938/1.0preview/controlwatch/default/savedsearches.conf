| eval device_name = host_name, device_id = host_ip, historian = "kepware"\
| eval event_type = "plc_mode"\
| rename host_name as src_host, host_ip as src_ip, Tag as tag\
| table _time, src_ip, src_host, event_type, value, historian, device_id, device_name, tag\
