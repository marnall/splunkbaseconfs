[[AL-9030] High Volume of Denied Connections From One Asset (V1R4)]
disabled = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = High Volume of Denied Connections From One Asset
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = | pivot Networking firewalls count(firewalls) AS "Count of firewalls" \
SPLITROW message_id AS message_id \
SPLITROW src_ip AS src_ip \
SPLITROW dest_ip AS dest_ip \
SPLITROW action AS action \
SHOWOTHER 1 \
SPLITROW _time PERIOD hour \
| eval time_now = now() \
| lookup bah_subnet_definitions ip_cidr AS src_ip OUTPUT site AS src_site \
| lookup bah_subnet_definitions ip_cidr AS dest_ip OUTPUT site AS dest_site \
| eval src_locality = if(isnull(src_site), "External", "Internal") \
| eval dest_locality = if(isnull(dest_site), "External", "Internal") \
| where (src_locality="Internal" OR dest_locality="Internal") \
| stats count by src_ip, src_locality dest_locality, src_site \
| appendcols maxout=20 [ \
| inputlookup bah_network_baseline_firewall where message_id="106012" action="blocked" \
| eval tm=strftime(strptime(_time, "%Y-%m-%d"), "%Y-%m-%d") \
| eval yesterday=strftime(relative_time(now(),"-1d"), "%Y-%m-%d") \
| eval today=strftime(if(isint(now()),now(),0), "%Y-%m-%d") \
| eval tm=case(tm=="2019-02-15",today, tm=="2019-02-14",yesterday) \
| eval rel_day=case(tm==today,"today", tm==yesterday,"yesterday") \
| stats avg(avg) AS avg by src_ip, dest_ip, rel_day \
| eval ip_pair=src_ip." to ".dest_ip \
| xyseries ip_pair rel_day avg \
| eval src_ip=mvindex(split(ip_pair," to "), 0), dest_ip=mvindex(split(ip_pair," to "), 1) \
| fields - ip_pair \
| eval change = (today-yesterday)/yesterday \
| fields src_ip, dest_ip, change \
| where change > 1.2 ] \
| lookup bah_assets host_ip as src_ip OUTPUT _key as asset_id device_type host_name site \
| eval device_type=mvdedup(device_type) \
| eval host_name=mvdedup(host_name) \
| eval site=mvdedup(site) \
| eval host_ip=src_ip \
| eval description="A significant increase of denied internal network connections has been detected coming from ".src_locality." ".device_type."  (".host_name.",".host_ip.") while attempting to communicate with ".dest_locality." ".device_type." (".host_name.", ".host_ip.") at the  ".site." site." \
| eval description = if(isnull(description), "A significant increase of denied internal network connections has been detected", description) \
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(change_time) AS change_time \
| eval triggering_event = _raw \
| eval triggering_event = if(isnull(triggering_event), "The source event for this alert triggered a ".create_time, triggering_event) \
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(change_time) AS change_time \
| eval triggering_event = _raw \
| eval triggering_event = if(isnull(triggering_event), "The source event for this alert triggered a ".create_time, triggering_event) \
| eval alert_id="[AL-9030-".src_locality.">".dest_locality."]" \
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)` \
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")`\
| eval severity = alert_criticality \
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

