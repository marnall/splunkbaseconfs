[[ND-2002] PLC Forces (V0R1)]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */5 * * * *
description = This search finds when forces were installed or removed. It adds the information to bah_device_changes.
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = index=bah_historian_events event_type="forces_installed"\
| streamstats global=f window=2 dc(value) as Testing, first(value) as current_value, last(value) as previous_value by device_id\
| where Testing = 2\
| eval change_type = case(\
    current_value = 1 and previous_value = 0, 3,\
    current_value = 0 and previous_value = 1, 4,\
    true(), "invalid"\
)\
| lookup bah_historian_device_correlations device_id, historian OUTPUTNEW asset_id as asset_id\
| `save_to_device_changes(current=current_value, previous=previous_value, type=change_type, time=_time, asset_id=asset_id)`

