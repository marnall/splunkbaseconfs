[[AL-9004-Installed] A Force Installed (V0R2)]
alert.digest_mode = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = This alert creates a ticket when a Force is installed on a PLC.\
[AL-9004-Installed]: force has been installed\
[AL-9004-Removed]: force has been removed\
[AL-9004-Unknown]: unknown change type (shouldn't happen)
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = | inputlookup bah_device_changes\
| where change_type=3\
| where isnull(change_used)\
| eval change_used = 1\
| outputlookup append=true bah_device_changes\
| eval change_description = "Installed"\
| fillnull value="Unknown" change_description\
| eval alert_id="[AL-9004-".change_description."]"\
| lookup bah_assets _key as asset_id OUTPUT host_name, host_ip, device_type, site\
| fillnull value="" host_name, host_ip, device_type, site, asset_id\
| eval description = "A force was ".change_description." on a PLC: ".coalesce("Device ".host_name." (".asset_id.")", "Asset ".asset_id)\
| eval description = if(isnull(description), "A force was placed on the device", description) \
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(change_time) AS readable_change_time\
| eval triggering_event = coalesce("Device ".host_name." (".asset_id.")", "Asset ".asset_id)." has reported a force installed at ".readable_change_time\
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)`\
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")`\
| eval severity = alert_criticality\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

