[[RN-1014] Collect PLC Firmware Version (V0R1)]
alert.track = 0
cron_schedule = */5 * * * *
description = Identifies the current version of firmware that controllers are running.
dispatch.earliest_time = -6m@m
dispatch.latest_time = -1m@m
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = `cim_OT_kepware_indexes` Quality=good (Tag=*Firmware_Revision OR Tag=*Firmware_Version OR Tag="*Firmware Revision")\
| lookup bah_historian_device_correlations device_match as Tag OUTPUT device_id as host_ip, device_name as host_name\
| lookup bah_assets host_ip OUTPUT manufacturer\
| stats latest(Value) as firmware_version values(Tag) as Tag latest(_time) as _time by host_name, host_ip, manufacturer\
| eval mask = tonumber("FF",16)\
| binaryop operation=bit-shift-right numToShift=8 field=firmware_version inBinary=True output_field=minor_version\
| binaryop operation=AND field=firmware_version secondField=mask inBinary=True output_field=major_version\
| eval firmware_version = if(manufacturer="Allen-Bradley", major_version.".".minor_version, firmware_version)\
| fields - mask, minor_version, major_version\
| eval historian="kepware", event_type = "firmware_version", src_ip = host_ip, src_host = host_name, device_id = host_ip, device_name = host_name, tag=Tag, value=firmware_version\
| table _time, src_ip, src_host, event_type, value, historian, device_id, device_name, tag\
| `collect(bah_historian_events)`

