search =`cim_OT_kepware_indexes` sourcetype=kepware Tag="*Major*Err*" Value="2" Quality="good" \
| binaryop operation=toBinary field=Value inBinary=True output_field=binary_value\
| eval binary_value = substr("0000000000000000", 0, max(16-len(binary_value), 0)) . binary_value\
| lookup bah_controllerfaults.csv Bin as binary_value OUTPUT AdvisoryMessage, Description, RecommendedAction, ErrorCode(HEX) \
| rename AdvisoryMessage as advisory_message, Description as description, RecommendedAction as recommended_action, ErrorCode(HEX) as error_code_hex \
| lookup bah_historian_device_correlations device_match as Tag OUTPUT device_name, device_id \
| lookup kepware-tag-addresses.csv tag_name as Tag OUTPUT register_address as error_hex \
| eval src_ip = device_id, src_host = device_name, event_type = AdvisoryMessage, value = Value, tag=Tag, historian="kepware" \
| lookup bah_historian_device_correlations device_id historian OUTPUT asset_id\
| table _time, src_ip, src_host, event_type, value, historian, device_id, device_name, tag, asset_id, error_hex, advisory_message, description, recommended_action, error_code_hex \
| lookup bah_assets host_ip as src_ip OUTPUT device_type, host_name, host_ip, site, conflict_keys \
| eval error_title = advisory_message\
| eval error_description=description\
| eval error_description_tag=split(tag,"."), error_description_tag=mvindex(error_description_tag,2) \
| eval error_description=if(isnull(error_description),error_description_tag,error_description)\
| eval device_type=if(isnotnull(conflict_keys), mvindex(device_type,0), device_type) \
| eval device_type=if(device_type="unknown", "Unknown", device_type) \
| eval host_ip=if(isnotnull(conflict_keys), mvindex(host_ip,0), host_ip) \
| eval device_name=if(isnotnull(conflict_keys), mvindex(device_name,0), device_name) \
| eval host_name=if(isnotnull(conflict_keys), mvindex(host_name,0), host_name) \
| eval device_type=if(isnull(device_type), "Unknown", device_type), device_type_slug=if(device_type=="Unknown", "device_type unknown", device_type), \
host_name=if(isnull(host_name), "Unknown", host_name), host_name_slug=if(host_name=="Unknown", "host_name unknown", host_name),  \
host_ip=if(isnull(host_ip), "Unknown", host_ip), host_ip_slug=if(host_ip=="Unknown", "host_ip unknown", host_ip), \
site=if(isnull(site), "Unknown", site), site_slug=if(isnull(site), "site unknown", site) \
| fillnull value="Unknown" device_type, host_name, host_ip, error_hex, error_title, error_description \
| eval description = "The ".device_type_slug."(".host_name_slug.",".host_ip_slug.") has a major error ".error_hex.": ".error_title." - ".error_description \
| eval description = if(isnull(description), "Indicates that a major error has occurred on an Allen-Bradley PLC", description) \
| fields - host_name_slug, host_ip_slug, device_type_slug, site_slug \
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(change_time) AS change_time \
| eval triggering_event = _raw \
| eval triggering_event = if(isnull(triggering_event), "The source event for this alert triggered a ".create_time, triggering_event) \
