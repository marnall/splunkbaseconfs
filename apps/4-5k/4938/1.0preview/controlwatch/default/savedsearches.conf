| xyseries ip_pair rel_day avg  \
| eval src_ip=mvindex(split(ip_pair," to "), 0), dest_ip=mvindex(split(ip_pair," to "), 1)  \
| fields - ip_pair  \
| eval change = (today-yesterday)/yesterday  \
| fields src_ip, dest_ip, change  \
| where change > 1.2 ]  \
| lookup bah_assets host_ip as src_ip OUTPUT _key as asset_id device_type host_name site  \
| eval device_type=mvdedup(device_type)  \
| eval host_name=mvdedup(host_name)  \
| eval site=mvdedup(site)  \
| eval host_ip=src_ip  \
| eval description="An ".src_locality." ".device_type."  (".host_name.",".host_ip.") attempted a teardrop attack denial of service (DOS) at the  ".site." site. Device attempted to send and receive data to itself through the network to cause an infinite loop . Recommend reviewing the asset's recent activities to identify the cause of issue." \
| eval description = if(isnull(description), "A significant increase of denied internal network connections has been detected", description)  \
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(change_time) AS change_time  \
| eval triggering_event = _raw  \
| eval triggering_event = if(isnull(triggering_event), "The source event for this alert triggered at ".create_time, triggering_event)  \
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(change_time) AS change_time  \
| eval triggering_event = _raw  \
| eval triggering_event = if(isnull(triggering_event), "The source event for this alert triggered at ".create_time, triggering_event)  \
| eval alert_id="[AL-9031]"  \
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)`  \
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")` \
| eval severity = alert_criticality \
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

