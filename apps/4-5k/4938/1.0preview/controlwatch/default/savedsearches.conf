[[AL-9012] Device Made Connection to New Destination IP (V0R7)]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 30 * * * *
description = ControlWatch has detected that a device has connected to a destination IP for the first time.
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.events.fields = ["description","src_ip","dest_ip","action","key"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.statistics.rowNumbers = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = index=bah_networking\
| where src_ip != " " AND dest_ip != " "\
| dedup src_ip, dest_ip\
| eval time_now = now()\
`comment(Get the key from bah_assets to use in bah_assets_connections)`\
| `find_asset_id(host_ip, src_ip, asset_id)`\
| eval asset_id=mvdedup(asset_id)\
| where isnotnull(asset_id) AND asset_id!="000000-000000-00000000-0000"\
| mvexpand asset_id\
| mvcombine dest_ip\
\
`comment(Get current historical dest_ip for the asset)`\
| lookup bah_assets_connections _key as asset_id OUTPUT ip_visited, protocol_used\
\
`comment(search for the current dest_ip in the historical ip_visited to see if it is a new connection or not)`\
| eval x = replace(dest_ip,"\.","\.")\
| eval visitNewIP=if(isnotnull(mvfind(ip_visited, x)), "Already visited dest_ip", "New dest_ip")\
| search visitNewIP="New dest_ip"\
\
| table asset_id, communication_direction, time_now, src_ip, dest_ip, dest_host_name, site, ip_visited, device_type, host_name, protocol_used, _raw, asset_id\
\
`comment(Join dest_ip into a multivalue field)`\
| eval ip_visited=mvjoin(ip_visited,"|")\
| mvcombine dest_ip\
| makemv ip_visited delim="|"\
`comment(Add dest_ip to historical ip_visited)`\
| eval ip_visited=mvappend(ip_visited, dest_ip)\
| eval ip_visited=mvdedup(ip_visited)\
`comment(Add new connections to bah_assets_connections)`\
| outputlookup bah_assets_connections append=t key_field=asset_id\
\
| lookup bah_assets _key as asset_id OUTPUT site, host_name, device_type\
| eval site=mvdedup(site), host_name=mvdedup(host_name), device_type=mvdedup(device_type)\
| fillnull value="Unknown" host_name, site, device_type\
\
`comment(Create a src_site from site. Dont want to rename site because it gets used later in the search)`\
| eval src_site = site\
\
`comment(Get the dest_ip host_name dest_site if known)`\
| `find_asset_id(host_ip, dest_ip, dest_asset_id)`\
| lookup bah_assets _key as dest_asset_id OUTPUT host_name AS dest_host_name\
| eval dest_host_name=mvdedup(dest_host_name)\
| fillnull value="Unknown" dest_host_name, dest_site\
\
`comment(Get the direction of the communication taking place)`\
| eval communication_direction=case(src_site = "Unknown", "Inbound", dest_site = "Unknown", "Outbound", 1=1, "Internal" )\
\
`comment(Get current historical dest_ip for the asset)`\
| lookup bah_assets_connections _key as asset_id OUTPUT ip_visited, protocol_used\
\
`comment(Expand the dest_ip back out so we get an alert for each one)`\
| mvexpand dest_ip\
`comment(Alerting logic below)`\
| eval description = "The ".device_type.", ".host_name." (".src_ip."), has communicated to a new device: ".dest_host_name." (".dest_ip.")"\
| eval description = if(isnull(description), "The device has communicated to a new device", description) \
\
| eval alert_id="[AL-9012]"\
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)`\
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")`\
| eval severity = alert_criticality\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

[[AL-9014] Asset shows unusual increase/decrease in volume of network connections (V0R7)]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = ControlWatch has detected an unusual increase or decrease in the volume of network connections for an asset.
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = | pivot Networking Network count(Network) as "count"\
SPLITROW src_ip\
SPLITROW dest_ip\
SPLITROW _time PERIOD hour\
| eval time_now = now()\
| eval host_ip = mvdedup(mvappend(src_ip, dest_ip))\
| mvexpand host_ip\
| lookup bah_assets host_ip OUTPUT _key as asset_id, site as site_name\
\
| lookup bah_assets host_ip OUTPUT site as src_site\
| lookup bah_assets host_ip as dest_ip OUTPUT site as dest_site\
| fillnull value="Unknown" dest_site, src_site\
| eval communication_direction=case(src_site = "Unknown", "Inbound", dest_site = "Unknown", "Outbound")\
\
| fillnull value="Unknown" site_name\
| where isnotnull(asset_id)\
| eval hour = tonumber(strftime(now(), "%H"))\
| eval weekday = strftime(now(), "%w")\
| lookup bah_network_baseline host_ip, weekday, hour\
| where isnotnull(avg)\
| eval is_high = if(count > upper_bound, 1, 0)\
| eval is_low = if(count < lower_bound, 1, 0)\
| where is_high = 1 OR is_low = 1\
| eval traffic_direction = if(is_high = 1, "increase", "decrease")\
| eval traffic_direction=if(isnull(traffic_direction), " ", traffic_direction)\
| eval description = coalesce("The ".device_type." ", "").coalesce(host_name." (".host_ip.")", host_ip).", has an unusual ".traffic_direction." in connections."\
| eval description = if(isnull(description), "The device has unusual traffic increase/decrease in connections", description)\
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(_time) AS readable_time\
| eval triggering_event = "Asset ".asset_id." ".coalesce(host_name." (".host_ip.")", host_ip)." shows an unusual volume of connections at ".readable_time.".  Average number of expected connections is ".avg." and current volume is ".stdev." standard deviation away from the expected volume"\
| eval src_ip=host_ip\
| eval alert_id="[AL-9014]"\
| `determine_criticality_score(asset_id, alert_id, null, severity)`\
| `set_site_risk_status(site_name, severity, "open")`\
| eval site=site_name\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

