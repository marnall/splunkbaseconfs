[[RD-1006] Siemens Logic Changed (V0R1)]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */5 * * * *
description = Identifies when the program running on a Siemens controller changes.
disabled = 1
dispatch.earliest_time = -6m@m
dispatch.latest_time = -1m@m
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = index=bah_siemens\
| lookup bah_assets host_ip as host\
| sort _time\
| eval short_description = replace(trim(short_description, " "), "\s+", " ")\
| eval message_type = case(\
    short_description = "Follow-on operating mode change - CPU changes from STARTUP to RUN mode", "follow_on_startup_to_run",\
    short_description = "Follow-on operating mode change - CPU changes from STOP (initialization) to STOP mode", "follow_on_initstop_to_stop",\
    short_description = "Follow-on operating mode change - CPU changes from STOP to STARTUP mode", "follow_on_stop_to_startup",\
    short_description = "Follow-on operating mode change - CPU changes from STOP to STOP mode", "follow_on_stop_to_stop",\
    short_description = "Communication initiated request: STOP - CPU changes from RUN to STOP mode" , "communication_initiated_stop",\
    short_description = "Communication initiated request: WARM RESTART - CPU changes from STOP to STARTUP mode", "communication_initiated_restart",\
    short_description = "Force job active: - Current CPU operating mode: RUN", "force",\
    short_description = "New startup information - Current CPU operating mode: STOP", "startup_info",\
    short_description = "Power off - CPU changes from RUN to NO POWER mode", "power_off",\
    short_description = "Power on - CPU changes from NO POWER to STOP (initialization) mode", "power_on",\
    true(), "unknown"\
    )\
| eval event_type = case(\
    searchmatch("long_description=\"*Incoming event\""), "incoming",\
    searchmatch("long_description=\"*Outgoing event\""), "outgoing"\
    )\
| eval force_type = case(message_type = "force" AND event_type = "incoming", "on", message_type = "force" AND event_type = "outgoing", "off")\
| where isnull(force_type)\
| streamstats window=6 list(message_type) as messages, list(long_description) as descriptions, latest(_time) as change_time\
| eval event = case(\
    mvindex(messages, 5) = "power_on" and messages = "power_on", "power_cycle",\
    mvindex(messages, 5) = "communication_initiated_restart" and messages = "communication_initiated_stop", "download_completed",\
    mvindex(messages, 5) = "force" and force_type = "on", "force_installed",\
    mvindex(messages, 5) = "force" and force_type = "off", "force_uninstalled"\
    )\
| search event = "download_completed"\
| eval is_hw_unchanged = if(searchmatch("descriptions = \"*HW configuration not loaded*\""), 1, 0)\
| eval is_program_unchanged = if(searchmatch("descriptions = \"*PLC program*\""), 1, 0)\
| search is_program_unchanged = 0 OR is_hw_unchanged = 0\
| eval change_type = 2\
| rename host as host_ip\
| `find_asset_id(host_ip, host_ip, asset_id)`\
| `save_to_device_changes(current=null, previous=null, type=change_type, time=change_time, asset_id=asset_id)`

