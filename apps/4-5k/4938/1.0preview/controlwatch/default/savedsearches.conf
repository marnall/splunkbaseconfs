[[AL-9001] Device Has Not Communicated in Over 7 Days (V0R1)]
alert.digest_mode = 0
alert.suppress = 1
alert.suppress.fields = device_id
alert.suppress.period = 7d
alert.track = 1
alert_condition = search not_talking = 1
counttype = custom
cron_schedule = 0 12 * * *
description = The device has not communicated in over 7 days.
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_view = search
search = |inputlookup bah_assets \
| eval asset_id=_key\
| fillnull value=0 last_communication\
| eval time_now = now()\
| eval not_talking = if(relative_time(time_now,"-7d@d")>last_communication,1,0)\
| where not_talking = 1\
| fillnull value="Unknown" device_type, host_name, host_ip\
| eval description = "The ".device_type." ".host_name." (".host_ip.") has not communicated in over 7 days"\
| eval description = if(isnull(description), "The device has not communicated in over 7 days", description)\
| convert timeformat="%Y-%m-%d %H:%M:%S" ctime(last_communication) AS readable_last_communication\
| eval readable_last_communication = if(last_communication == 0, " has never been seen", " last communicated at ".readable_last_communication)\
| eval triggering_event = coalesce("Device ".host_name." (".asset_id.")", "Asset ".asset_id).readable_last_communication\
| lookup bah_ticket_relationships asset_id OUTPUT ticket_id\
| lookup bah_open_tickets ticket_id OUTPUT alert_id as open_alert_id\
| where open_alert_id != alert_id\
\
| eval src_ip=host_ip\
| eval alert_id="[AL-9001]"\
| `determine_criticality_score(asset_id_field=asset_id, alert_id_field=alert_id, multiplier_field=null, output_field=alert_criticality)`\
| `set_site_risk_status(site_field=site, risk_delta=alert_criticality, ticket_state="open")`\
| `write_alert(id_field=alert_id, description_field=description, triggering_event_field=triggering_event)`

