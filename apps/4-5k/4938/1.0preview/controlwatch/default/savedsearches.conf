[[CA-3001] Identify new assets in Historians]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */15 * * * *
description = ControlWatch search that finds new assets in Historians, outputs to bah_assets.
dispatch.earliest_time = -60m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = | inputlookup bah_historian_device_correlations\
| eval host_ip = if(historian="kepware", device_id, null())\
| search host_ip=*\
| lookup bah_assets host_ip OUTPUT _key as ip_conflict_keys\
| eval conflict_keys = mvdedup(ip_conflict_keys)\
| mvremove asset_id conflict_keys\
| eval originating_source = "bah_historian_device_correlations"\
| fields - _key \
| lookup bah_assets _key as asset_id OUTPUTNEW\
| eval _key = asset_id \
| eval device_type = if(isnull(device_type), "unknown", device_type) \
| outputlookup append=true bah_assets

[[CA-3002] Identify new assets in CMDB]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */15 * * * *
description = ControlWatch search that finds new assets in CMDB, outputs to bah_assets.
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = | inputlookup bah_cmdb_correlations\
| lookup bah_assets _key as asset_id OUTPUT _key as found_key\
| eval found_key = if(isnull(found_key), 0, 1)\
| lookup bah_assets host_ip OUTPUT _key as ip_conflict_keys\
| eval ip_conflict_keys = if(isnull(host_ip) or host_ip = "NULL", null(), ip_conflict_keys)\
| lookup bah_assets physical_addr OUTPUT _key as phys_conflict_keys\
| eval phys_conflict_keys = if(isnull(physical_addr) or physical_addr = "NULL", null(), phys_conflict_keys)\
| lookup bah_assets host_name OUTPUT _key as name_conflict_keys\
| eval name_conflict_keys = if(isnull(host_name) or host_name = "NULL", null(), name_conflict_keys)\
| eval conflict_keys = mvdedup(mvappend(ip_conflict_keys, phys_conflict_keys, name_conflict_keys))\
| mvremove asset_id conflict_keys\
| eval originating_source = "bah_cmdb_correlations"\
| fields - _key \
| lookup bah_assets _key as asset_id OUTPUTNEW\
| eval _key = asset_id \
| eval device_type = if(isnull(device_type), "unknown", device_type) \
| outputlookup append=true bah_assets

[[ND-2006] PLC Programmable Change (V0R2)]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */15 * * * *
description = This detect searches the bah_historian_events to find a change from Programmable to Not Programmable states.
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_app = controlwatch
request.ui_dispatch_view = search
search = index=bah_historian_events event_type="plc_mode" is_programmable=*\
| streamstats global=f window=2 dc(is_programmable) as Testing, first(is_programmable) as current_value, last(is_programmable) as previous_value by device_id\
| eval change_type=5\
| eval host_ip=device_id\
| where Testing=2\
| lookup bah_historian_device_correlations device_id OUTPUT _key as asset_id \
| where isnotnull(asset_id) \
| eval current_value= case( NOT current_value=0 AND NOT current_value=1, "Unknown", current_value=1, "Programmable", current_value=0, "Not Programmable")\
| eval previous_value= case( NOT previous_value=0 AND NOT previous_value=1, "Unknown", previous_value=1, "Programmable", previous_value=0, "Not Programmable")\
| table _time, current_value, previous_value, change_type, device_id, asset_id\
| `save_to_device_changes(current=current_value, previous=previous_value, type=change_type, time=_time, asset_id=asset_id)`

