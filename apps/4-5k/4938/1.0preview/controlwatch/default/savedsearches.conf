search = | pivot Networking Network count(Network) as "count"\
SPLITROW src_ip\
SPLITROW dest_ip\
SPLITROW _time PERIOD hour\
| lookup bah_assets host_ip as src_ip OUTPUT site as src_site\
| lookup bah_assets host_ip as dest_ip OUTPUT site as dest_site\
| where isnotnull(src_site) OR isnotnull(dest_site)\
| fillnull value="External" src_site, dest_site\
| stats sum(count) as num_connections by src_ip, src_site, dest_ip, dest_site, _time\
| eval combined_ip = mvdedup(mvappend(mvzip(src_ip, src_site, ":"), mvzip(dest_ip, dest_site, ":")))\
| mvexpand combined_ip\
| eval combined_ip = split(combined_ip, ":")\
| eval combined_site = mvindex(combined_ip, 1)\
| eval combined_ip = mvindex(combined_ip, 0)\
| where combined_site != "External"\
| stats sum(num_connections) as num_connections by combined_ip, combined_site, _time\
| eval weekday = strftime(_time, "%w"), hour = strftime(_time, "%H")\
| rename combined_ip as host_ip, combined_site as site\
| `collect(bah_summary)` source=hourly_network_summary

