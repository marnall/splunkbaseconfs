[kepware]
LOOKUP-asset_list_attributes_auto = asset_list_attributes_lkup host_ip AS host_ip OUTPUTNEW Make AS Make "Device Type" AS "Device Type" Model AS Model Subnet AS Subnet VLAN AS VLAN Vendor AS Vendor

[*]
LOOKUP-dest_ip Zone Lookup = bah_subnet_definitions subnet_name AS dest_ip OUTPUTNEW zone AS dest_cw_zone
LOOKUP-src_ip Zone Lookup = bah_subnet_definitions subnet_name AS src_ip OUTPUTNEW zone AS src_cw_zone

[eagle:one]
EXTRACT-srcip = source\s+(?P<src_ip>\d+.\d+.\d+.\d+)\s+dest\s+(?P<dest_ip>\d+.\d+.\d+.\d+),\s+
EXTRACT-srcmac = source\s+(?P<src_mac>\w+:\w+:\w+:\w+:\w+:\w+)\s+dest\s+(?P<dest_mac>\w+:\w+:\w+:\w+:\w+:\w+),\s+
EXTRACT-rule = \:\s+(?P<rule>[\w\s]+rule\s+no.\s+\d[\w\s]+'[\w\s]+\');
EXTRACT-protocol = protocol\s+(?P<protocol>\w+)
EXTRACT-port = port\s+src\s+(?P<src_port>\d+)\s+dst\s+(?P<dest_port>\d+)\s+
EXTRACT-action = \d+\s+(?P<action>\w+)$
EXTRACT-Message = \]:(?P<message>.*)
EXTRACT-vpn_connection = \[\w+\]:\s+(?P<vpn_connection>\w+\s+\w+\s+\d+)
EXTRACT-eaglemsgid = \[(?P<eaglemsgid>\w+)\]
FIELDALIAS-eaglemsgid = "eaglemsgid" AS "message_id"

[json-3]
EXTRACT-published_date = \"publishedDate\"\s+:\s+\"(?P<published_date>\d+-\d+-\d+\w+\d+:\d+\w+)\",
EXTRACT-last_modified_date = \"lastModifiedDate\"\s+:\s+\"(?P<last_modified_date>\d+-\d+-\d+\w+\d+:\d+\w+)\"
EXTRACT-attack_vector = \"attackVector\"\s+:\s+\"(?P<attack_vector>\w+)\"
EXTRACT-attack_complexity = \"attackComplexity\"\s+:\s+\"(?P<attack_complexity>\w+)\"
EXTRACT-severity = \"baseSeverity\"\s+:\s+\"(?P<severity>\w+)\"
EXTRACT-cert = http[s]:\/\/[\w.\-\/]+advisories\/(?P<cert>[\w-]+)\"
EXTRACT-cvss_v3 = cvssV3[\{:\s\"\w\n.,\/]+baseScore\"\s+:\s+(?P<cvss_v3>[\d\.]+),
EXTRACT-cvss_v2 = cvssV2[\{:\s\"\w\n.,\/]+baseScore\"\s+:\s+(?P<cvss_v2>[\d\.]+)
EXTRACT-cpe_name = cpe23Uri\"\s+:\s+\"(?P<cpe_name>[\w:\.\*\-\_]+)\",\n\s+\"version
EXTRACT-privileges_required = cvssV3[\{:\s\"\w\n.,\/]+privilegesRequired\"\s+:\s+\"(?P<privileges_required>[\d\.\w]+)\",
EXTRACT-user_interaction = cvssV3[\{:\s\"\w\n.,\/]+userInteraction\"\s+:\s+\"(?P<user_interaction>[\d\.\w]+)\",
EXTRACT-scope = cvssV3[\{:\s\"\w\n.,\/]+scope\"\s+:\s+\"(?P<scope>[\d\.\w]+)\",
EXTRACT-confidentiality_impact = cvssV3[\{:\s\"\w\n.,\/]+confidentialityImpact\"\s+:\s+\"(?P<confidentiality_impact>[\d\.\w]+)\",
EXTRACT-integrity_impact = cvssV3[\{:\s\"\w\n.,\/]+integrityImpact\"\s+:\s+\"(?P<integrity_impact>[\d\.\w]+)\",
EXTRACT-availability_impact = cvssV3[\{:\s\"\w\n.,\/]+availabilityImpact\"\s+:\s+\"(?P<availability_impact>[\d\.\w]+)\",
EXTRACT-exploitability_score = cvssV3[\{:\s\"\w\n.,\/]+},\n\s+\"exploitabilityScore\"\s+:\s+(?P<exploitability_score>[\d\.\w]+),
EXTRACT-impact_score = cvssV3[\{:\s\"\w\n.,\/]+},\n\s+\"\w+\"\s+\:\s+\d+\.\d+\,\n\s+\"impactScore\"\s+\:\s+(?P<impact_score>[\d\.]+)\n+
EXTRACT-message = description\"\s+\:\s+\{\n\s+\"description_data\"\s+\:\s+\[\s+\{\n\s+\"lang\"\s+\:\s+\"\w+\"\,\n\s+\"value\"\s+:\s+\"(?P<message>.*)\"\n\s+\}\s+\]\n\s+\}\n\s+\}\,\n\s+\"configurations
FIELDALIAS-NVD- affects.vendor.vendor_data{}.vendor_name to vendor_name = "affects.vendor.vendor_data{}.vendor_name" AS vendor
FIELDALIAS-NVD-affects.vendor.vendor_data{}.product.product_data{}.product_name to product_name = "affects.vendor.vendor_data{}.product.product_data{}.product_name" AS product
FIELDALIAS-NVD-affects.vendor.vendor_data{}.product.product_data{}.version.version_data{}.version_value to version_value = "affects.vendor.vendor_data{}.product.product_data{}.version.version_data{}.version_value" AS version_value
FIELDALIAS-NVD-affects.vendor.vendor_data{}.product.product_data{}.version.version_data{}.version_affected to version_affected = "affects.vendor.vendor_data{}.product.product_data{}.version.version_data{}.version_affected" AS version_affected
FIELDALIAS-NVD-CVE_data_meta.ID to cve_id = "CVE_data_meta.ID" AS cve
FIELDALIAS-NVD-CVE_data_meta.ASSIGNER to data_assigner = "CVE_data_meta.ASSIGNER" AS data_assigner
FIELDALIAS-NVD-references.reference_data{}.url to url = "references.reference_data{}.url" AS url
FIELDALIAS-NVD-references.reference_data{}.refsource = "references.reference_data{}.refsource" AS reference
FIELDALIAS-NVD-references.reference_data{}.name to reference_url = "references.reference_data{}.name" AS xref
FIELDALIAS-NVD-references.reference_data{}.tags{} to vulnerability_type = "references.reference_data{}.tags{}" AS vulnerability_type
FIELDALIAS-NVD-problemtype.problemtype_data{}.description{}.value to cwe_name = "problemtype.problemtype_data{}.description{}.value" AS cwe_name

