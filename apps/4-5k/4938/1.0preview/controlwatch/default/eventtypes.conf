
[kepware]
search = `cim_OT_kepware_indexes` sourcetype=kepware Quality=good

description = When searching for Kepware data, it is important to note that all Kepware data should be contained within this eventtype. Search for Kepware indexes under sourcetype=kepware. You have the option to define the Quality value, as well.

[kepware_firmware_version]
search = tag=kepware (Tag=*.Firmware_Revision OR Tag=*Firmware_Version OR Tag="*.Firmware Revision")
description = In this field, you  will be able to search for the firmware version of the device. For example, you can search for Kepware tags based on version or revision.

[kepware_device_id]
search = tag=kepware (Tag=*_System._DeviceId)
description = Next, you can search for the DeviceID in this field under the Kepware tag.

[kepware_force]
search = tag=kepware (Tag=*Forces_Installed)
description = After you have identified the DeviceID, you can search using the Boolean feature to see if Forces have been enabled in this device.

[kepware_status_mode]
search = tag=kepware (Tag=*Mode_Bit* Value=1)
description = You can search for the human readable format of the Status Mode of the Device by looking up the status_mode field.

