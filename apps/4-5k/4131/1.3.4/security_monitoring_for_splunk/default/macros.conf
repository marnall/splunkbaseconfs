[default]
[comms_dhcp_traffic]
definition = eventtype="dhcp_events" | fields + _time, host, dest_mac, dest_nt_host, dest_ip | fillnull value="unknown" dest_mac dest_nt_host dest_ip

[comms_dns_traffic]
definition = eventtype="dns_events" | fields + _time, host, src_ip, query_type, query | fillnull value="unknown" src_ip query_type query

[comms_email_traffic]
definition = eventtype="email_events" | fields + _time, host, src_user, recipient, subject, file_name, file_size | fillnull value="unknown" src_user recipient subject file_name file_size

[comms_firewall_traffic]
definition = eventtype=firewall_events | lookup serviceName dest_port OUTPUTNEW service | fields + _time, host, dest_ip, src_ip, dest_port, src_port, action bytes service  | fillnull value="unknown" dest_ip src_ip dest_port src_port action bytes service
iseval = 0

[comms_ids_traffic]
definition = eventtype="network_ids_events" | lookup serviceName dest_port OUTPUTNEW service | fields + _time, host, action, dest, dest_port, src_ip, signature, severity, service tag | fillnull value="unknown" action, dest, dest_port,src_ip, signature, severity | eval ids_type="network"
iseval = 0

[convert_volume(1)]
definition = case($volume$>=(1024*1024*1024*1024),round($volume$/(1024*1024*1024*1024),0)." TB",$volume$>=(1024*1024*1024),round($volume$/(1024*1024*1024),0)." GB",$volume$>=(1024*1024),round($volume$/(1024*1024),0)." MB",$volume$>=1024,round($volume$/1024,0)." KB",1=1,$volume$." B")
args = volume
iseval = 0

[endpoint_ids]
definition = eventtype="endpoint_ids_events" | lookup serviceName dest_port OUTPUTNEW service | fields + _time, host, action, dest, dest_port, src_ip, signature, severity, service tag | fillnull value="unknown" action, dest, dest_port,src_ip, signature, severity | eval ids_type="host"
iseval = 0

[endpoint_malware]
definition = eventtype="malware_events" | fields + _time, host, dest, signature, action | fillnull value="unknown" dest signature action

[endpoint_pnp]
definition = eventtype="pnp_events" | fields + _time, host, dest, device_id, device_uuid, user, action | fillnull value="unknown" dest, device_id, device_uuid, user, action
iseval = 0

[endpoint_processes]
definition = eventtype="processes_events" (EventCode=4688 OR EventCode=4689 OR EventCode=1) | fields + _time, host, dest, command_line, process_id, parent_process, process_name | fillnull value="unknown" dest command_line process_id parent_process process_name
iseval = 0

[endpoint_vulnerabilities]
definition = eventtype="host_vulnerability_events" | fields + _time, host, dest, signature, cve, cvss, severity, mskb | fillnull value="unknown" dest signature cve cvss severity mskb

[search_win_authorisation_changes]
definition = (EventCode=4720 OR EventCode=624 OR EventCode=4722 OR EventCode=626 OR EventCode=4725 OR EventCode=629 OR EventCode=4726 OR EventCode=630 OR EventCode=4738 OR EventCode=642 OR EventCode=4740 OR EventCode=644 OR EventCode=4767 OR EventCode=671 )
iseval = 0

[search_win_group_changes]
definition = (EventCode=4731 OR EventCode=635 OR EventCode=4727 OR EventCode=631 OR EventCode=4754 OR EventCode=658 OR EventCode=4735 OR EventCode=639 OR  EventCode=4737 OR EventCode=641 OR EventCode=4755 OR EventCode=659 OR EventCode=4734 OR EventCode=638 OR EventCode=4730 OR EventCode=634 OR EventCode=4758 OR EventCode=662 OR EventCode=4732 OR EventCode=636 OR EventCode=4728 OR EventCode=632 OR EventCode=4756 OR EventCode=660 OR EventCode=4733 OR EventCode=637 OR EventCode=4729 OR EventCode=633 OR EventCode=4757 OR EventCode=661 OR EventCode=4723 OR EventCode=627 OR EventCode=4724 OR EventCode=628)
iseval = 0


[user_vpn_access]
definition = eventtype=remote_vpn_events | fields + _time, host, dest, src_ip, dest_ip, user, action, logon_type | fillnull value="unknown" dest src_ip dest_ip user action logon_type

[comms_web_traffic]
definition = eventtype="web_traffic_events" | fields + _time, host, user, status, url, http_method,src_ip, http_user_agent,uri_path, category, http_response | fillnull value="unknown" user status url, http_method, src_ip, http_user_agent, uri_path,category, http_response | eval user=if(user="unknown", src_ip, user)
iseval = 0

[user_authorisation]
definition = eventtype="windows_security_authorisation_events" `search_win_authorisation_changes` | fields + _time, host, EventCode, user, src_ip, action, dest, src_user | lookup sec_windows_signature EventCode OUTPUT signature | fillnull value="unknown" signature user src_ip action logon_type dest src_user
iseval = 0

[user_group_changes]
definition = eventtype="windows_security_group_change_events" `search_win_group_changes` | fields + _time, host, EventCode, src_user, user, action | lookup sec_windows_signature EventCode OUTPUT signature  | fillnull value="unknown" src_user user signature action

[endpoint_processes_exc_known]
definition = eventtype="processes_events" (EventCode=4688 OR EventCode=4689 OR EventCode=1) NOT splunkd.exe NOT [|inputlookup known_process_names] | fields + _time, host, dest, command_line, process_id, parent_process, process_name | fillnull value="unknown" dest command_line process_id parent_process process_name
iseval = 0

[windows_security_events]
definition = eventtype="windows_security_events" NOT user="*$" | fields + _time, host, src_ip, user, action, dest, Logon_Type, signature | fillnull value="unknown" user src_ip action Logon_Type dest, signature | lookup logon_types logon_type AS Logon_Type OUTPUT logon_description
iseval = 0

[notable_windows_event_codes]
definition = (EventCode=4624 OR EventCode=4625 OR EventCode=528 OR EventCode=529 Logon_Type=2 action="success") OR (EventCode=7045 OR EventCode=7030) OR (EventCode=4720 OR EventCode=4722 OR EventCode=4724 OR EventCode=4738) OR (EventCode=4732 OR EventCode=4728) OR (EventCode=1102) OR (EventCode=1056) OR (EventCode=7045 AND (EventCode=10000 OR EventCode=10001 OR EventCode=10100 OR EventCode=20003 OR EventCode=24576 OR EventCode=24577 OR EventCode=24579 OR EventCode=20001))
iseval = 0

[make_events]
definition = eval Event=case(EventCode=4624 OR EventCode=4625 OR EventCode=528 OR EventCode=529 AND Logon_Type=2 AND action="success","Lateral Movement",EventCode=7045 OR EventCode=7030, "Service Creation", EventCode=4720 OR EventCode=4722 OR EventCode=4724 OR EventCode=4738, "User Creation", EventCode=4732 OR EventCode=4728,"User Added to Privileged Group", EventCode=1102, "Event Log Cleared", EventCode=1056, "RDP Access Configured", EventCode=7045 AND (EventCode=10000 OR EventCode=10001 OR EventCode=10100 OR EventCode=20003 OR EventCode=24576 OR EventCode=24577 OR EventCode=24579 OR EventCode=20001), "First External Media Access" )
iseval = 0

[user_system_access]
definition = eventtype="windows_system_access" (EventCode=4624 OR EventCode=4625 OR EventCode=528 OR EventCode=529) NOT user="*$" | fields + _time, host, src_ip, user, action, dest, Logon_Type | fillnull value="unknown" user src_ip action Logon_Type dest | lookup logon_types logon_type AS Logon_Type OUTPUT logon_description
iseval = 0

[user_privilege_escalations]
definition = eventtype="windows_privileged_access" (EventCode=4672 OR EventCode=576) NOT user="*$" | fillnull value="unknown" dest src_ip user Logon_Type action src_user
iseval = 0

[direction]
definition = eval direction=case(cidrmatch("10.0.0.0/8",src_ip),"inside-to-out",cidrmatch("172.16.0.0/16",src_ip),"inside-to-out",cidrmatch("192.168.0.0/17",src_ip),"inside-to-out",true(),"outside-to-in")
iseval = 0
