[default]
[dhcp_events]
search = index=main sourcetype=bro_dhcp

[dns_events]
search = index=main sourcetype="bro_dns"

[email_events]
search = index=main sourcetype="bro_smtp"

[endpoint_ids_events]
search = index=main sourcetype=ossec

[firewall_events]
search = index=* sourcetype="juniper:junos:firewall"

[host_vulnerability_events]
search = index=main sourcetype="nessus"

[malware_events]
search = index=main sourcetype=sophos:threats

[network_ids_events]
search = index=main sourcetype=juniper:idp

[pnp_events]
search = index=main sourcetype="sophos:devicecontrol"

[processes_events]
search = index="botsv1" sourcetype="xmlwineventlog:microsoft-windows-sysmon/operational"

[remote_vpn_events]
search = index=main sourcetype=juniper:sslvpn

[web_traffic_events]
search = index=main sourcetype=bluecoat:proxysg:access:syslog

[windows_privileged_access]
search = eventtype="windows_security_events"

[windows_security_authorisation_events]
search = eventtype="windows_security_events"

[windows_security_events]
search = (index=wineventlog sourcetype=WinEventLog:Security) OR (index=main sourcetype=WinEventLog source=WinEventLog:Security) OR (index=main sourcetype=WinEventLog:Security)

[windows_security_group_change_events]
search = eventtype="windows_security_events"

[windows_system_access]
search = eventtype="windows_security_events"

[windows_system_log_events]
search = (index=main source=WinEventLog:system) OR (index=win* source=WinEventLog:System) OR (index=winevents sourcetype=WinEventLog:System)

