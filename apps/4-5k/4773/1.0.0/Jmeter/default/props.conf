[tsv]
EXTRACT-TestType,AppVersion,TestId,TransactionName = ^(?P<TestType>[^ ]+)\s+(?P<AppVersion>[^ ]+)\s+(?P<TestId>[^ ]+)\s+(?P<TransactionName>.*?)\.
EXTRACT-TransactionCount = .*?\.a\.count\s(?P<TransactionCount>[0-9]+)\s
EXTRACT-SuccessfulTransactionCount = .*?\.ok\.count\s(?P<SuccessfulTransactionCount>[0-9]+)\s
EXTRACT-FailedTransactionCount = .*?\.ko\.count\s(?P<FailedTransactionCount>[0-9]+)\s
EXTRACT-90ResponseTime = .*?\.a\.pct90\s(?P<Percentile90RT>.*?)\s
EXTRACT-95PercentileResponseTime = .*?\.a\.pct95\s(?P<Percentile95RT>.*?)\s
EXTRACT-99PercentileResponseTime = .*?\.a\.pct95\s(?P<Percentile99RT>.*?)\s
EXTRACT-MaxRT = .*?\.a\.max\s(?P<MaxRT>.*?)\s
EXTRACT-MinumumResponseTime = .*?\.a\.min\s(?P<MinRT>.*?)\s
EXTRACT-ActiveThreads = .*?test\.meanAT\s(?P<TreadCount>.*?)\s
EXTRACT-AverageRT = .*?\.a\.avg\s(?P<AvgRT>.*?)\s
