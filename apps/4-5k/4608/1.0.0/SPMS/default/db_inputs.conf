[SCCM_Update_Status]
batch_upload_size = 1000
connection = SCCM
description = Update status for each package per computer. Relationship with update package is done by using the CI_ID. Relationship with the computer is done by the ResourceID. The following status values are available:\
0 = Detection state unknown \
1 = Update is not required \
2 = Update is required \
3 = Update is installed
disabled = 0
fetch_size = 300
host = SCCM
index = sccm
index_time_mode = dbColumn
input_timestamp_column_number = 3
interval = 3600
max_rows = 0
max_single_checkpoint_file_size = 10485760
mode = rising
query = SELECT CI_ID,\
         LastLocalChangeTime,\
         LastStatusChangeTime,\
         LastStatusCheckTime,\
         ResourceID,\
         Status\
FROM "SCCM"."dbo"."v_Update_ComplianceStatus"\
WHERE LastStatusChangeTime > ?\
ORDER BY  LastStatusChangeTime ASC
query_timeout = 30
source = sccm
sourcetype = sccm:update_status
tail_rising_column_number = 3

[SCCM_UpdateGroups]
batch_upload_size = 1000
connection = SCCM
description = Daily snapshot of Update group contents
disabled = 0
fetch_size = 300
host = SCCM
index = sccm
index_time_mode = current
interval = 35 7 * * *
max_rows = 1000
max_single_checkpoint_file_size = 10485760
mode = batch
query = SELECT cag.AssignedUpdateGroup AS UpdateGroupID,\
         ali.Title AS UpdateGroupTitle,\
         ali.Description AS UpdateGroupDescription,\
         ali.DateCreated AS UpdateGroupCreatedDate,\
         ali.DateLastModified AS UpdateGroupModifiedDate,\
         ali.CreatedBy AS UpdateGroupCreatedBy,\
         ali.LastModifiedBy AS UpdateGroupModifiedBy,\
         cir.ToCIID AS UpdateID,\
         ui.Title AS UpdateTitle,\
         ui.Description AS UpdateDescription,\
         ui.InfoURL AS UpdateInfoURL,\
         ui.DatePosted AS UpdatePostedDate,\
         ui.DateRevised AS UpdateRevisedDate\
FROM v_CIAssignmentToGroup cag\
INNER JOIN v_AuthListInfo ali\
    ON cag.AssignedUpdateGroup=ali.CI_ID\
        AND ali.LocaleID=1033\
INNER JOIN v_CIRelation cir\
    ON cag.AssignedUpdateGroup=cir.FromCIID\
INNER JOIN v_UpdateInfo ui\
    ON cir.ToCIID=ui.CI_ID
query_timeout = 30
source = sccm
sourcetype = sccm:updategroup
template_name = SCCM_UpdateGroups

[SCCM_UpdatesQFE]
batch_upload_size = 1000
connection = SCCM
description = List of updates from the Quick Fix Engineering WMI class, including joins with system, site & collection information.
disabled = 0
fetch_size = 500
host = SCCM
index = sccm
index_time_mode = dbColumn
input_timestamp_column_number = 2
interval = 120
max_rows = 2000
max_single_checkpoint_file_size = 10485760
mode = rising
query = SELECT qfe.ResourceID,\
qfe.[TimeStamp],\
qfe.Caption0,\
qfe.Description0,\
qfe.HotFixID0,\
qfe.InstalledBy0,\
qfe.InstalledOn0,\
rs.Name0,\
rs.AD_Site_Name0 AS SiteName,\
rs.Operating_System_Name_and0 AS OSName,\
rs.Build01 AS OSVersion,\
rs.Last_Logon_Timestamp0 AS LastLogonTime,\
rs.Creation_Date0 AS CreationTime,\
rs.Distinguished_Name0 AS DN,\
gcs.Roles0,\
gcs.SystemType0,\
gcs.Manufacturer0,\
gcs.Model0,\
gs.SystemRole0,\
col.CollectionID,\
col.Name AS CollectionName,\
col.Comment AS CollectionComment\
FROM "SCCM"."dbo"."v_GS_QUICK_FIX_ENGINEERING" as qfe\
INNER JOIN "SCCM"."dbo"."v_R_System" as rs\
ON qfe.ResourceID=rs.ResourceID\
INNER JOIN "SCCM"."dbo"."v_GS_COMPUTER_SYSTEM" as gcs\
    ON qfe.ResourceID=gcs.ResourceID\
INNER JOIN "SCCM"."dbo"."v_GS_SYSTEM" as gs\
    ON qfe.ResourceID=gs.ResourceID\
INNER JOIN "SCCM"."dbo"."v_ClientCollectionMembers" as ccm\
    ON qfe.ResourceID=ccm.ResourceID\
INNER JOIN "SCCM"."dbo"."v_Collection" as col\
    ON ccm.CollectionID=col.CollectionID\
WHERE qfe.[TimeStamp] > ?\
ORDER BY  qfe.[TimeStamp] ASC
query_timeout = 60
source = sccm
sourcetype = sccm:qfe
tail_rising_column_number = 2

