
[SCCM_Collections]
batch_upload_size = 1000
connection = SCCM
description = Daily batch of collections and their content.
disabled = 0
fetch_size = 500
host = SCCM
index = sccm
index_time_mode = current
interval = 50 3 * * *
max_rows = 0
max_single_checkpoint_file_size = 10485760
mode = batch
query = SELECT col.CollectionID ,\
         col.Name AS CollectionName ,\
         col.Comment AS CollectionComment ,\
         ccm.ResourceID ,\
         ccm.Name AS ResourceName\
FROM v_Collection col\
INNER JOIN v_ClientCollectionMembers ccm\
    ON col.CollectionID=ccm.CollectionID
query_timeout = 30
source = sccm
sourcetype = sccm:collections
template_name = SCCM_Collections

[SCCM_Compliance]
batch_upload_size = 1000
connection = SCCM
description = Daily snapshot of Update status of each computer per update group. Information about Site and Collection is included.\
\
LocaleID=1033 is "english"\
\
TopicType=300 is "compliance"\

disabled = 0
fetch_size = 300
host = SCCM
index = sccm
index_time_mode = current
interval = 30 7 * * *
max_rows = 5000
max_single_checkpoint_file_size = 10485760
mode = batch
query = SELECT aspt.AssignmentID,\
         cia.AssignmentName,\
         cia.collectionid,\
         cia.collectionname,\
         aspt.ResourceID,\
         aspt.TopicType,\
         aspt.StateID AS AssignmentState,\
         sn.StateName AS AssignmentStateName,\
         aspt.StateTime AS AssignmentStateTime,\
         rs.Name0,\
         rs.AD_Site_Name0 AS SiteName,\
         rs.Operating_System_Name_and0 AS OSName,\
         rs.Build01 AS OSVersion,\
         rs.Last_Logon_Timestamp0 AS LastLogonTime,\
         rs.Creation_Date0 AS CreationTime,\
         rs.Distinguished_Name0 AS DN,\
         gcs.Roles0,\
         gcs.SystemType0,\
         gcs.Manufacturer0,\
         gcs.Model0,\
         gs.SystemRole0,\
         cag.AssignedUpdateGroup,\
         lcip.DisplayName AS AssignedUpdateGroupTitle,\
         lcip.Description AS AssignedUpdateGroupDescription\
FROM v_AssignmentStatePerTopic aspt\
INNER JOIN dbo.v_StateNames sn\
    ON aspt.TopicType = sn.TopicType\
        AND aspt.StateID = sn.StateID\
INNER JOIN v_R_System rs\
    ON aspt.ResourceID=rs.ResourceID\
INNER JOIN v_GS_COMPUTER_SYSTEM gcs\
    ON aspt.ResourceID=gcs.ResourceID\
INNER JOIN v_GS_SYSTEM gs\
    ON aspt.ResourceID=gs.ResourceID\
INNER JOIN v_CIAssignment cia\
    ON aspt.AssignmentID=cia.AssignmentID\
INNER JOIN v_CIAssignmentToGroup cag\
    ON aspt.AssignmentID=cag.AssignmentID\
INNER JOIN v_LocalizedCIProperties lcip\
    ON cag.AssignedUpdateGroup=lcip.CI_ID\
        AND lcip.LocaleID=1033\
WHERE aspt.topictype IN (300)
query_timeout = 30
source = sccm
sourcetype = sccm:compliance
template_name = SCCM_Compliance

