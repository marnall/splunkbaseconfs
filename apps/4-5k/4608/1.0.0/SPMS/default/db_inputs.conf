[SCCM_Add_Remove]
batch_upload_size = 1000
connection = SCCM
disabled = 0
fetch_size = 300
host = SCCM
index = sccm
index_time_mode = dbColumn
input_timestamp_column_number = 4
interval = 86400
max_rows = 0
max_single_checkpoint_file_size = 10485760
mode = rising
query = SELECT adr.ResourceID,\
         adr.DisplayName0,\
         adr.InstallDate0,\
         adr.TimeStamp,\
         col.CollectionID,\
         col.Name AS CollectionName,\
         gcs.Manufacturer0,\
         gcs.Model0,\
         gcs.Name0,\
         gcs.Domain0\
FROM "SCCM"."dbo"."v_add_remove_programs" AS adr\
INNER JOIN "SCCM"."dbo"."v_ClientCollectionMembers" AS ccm\
    ON adr.ResourceID=ccm.ResourceID\
INNER JOIN "SCCM"."dbo"."v_Collection" AS col\
    ON ccm.CollectionID=col.CollectionID\
INNER JOIN "SCCM"."dbo"."v_GS_COMPUTER_SYSTEM" AS gcs\
    ON adr.ResourceID=gcs.ResourceID\
WHERE adr.TimeStamp > ?\
ORDER BY  adr.TimeStamp ASC
query_timeout = 30
source = sccm
sourcetype = sccm:add_remove_software
tail_rising_column_number = 4
