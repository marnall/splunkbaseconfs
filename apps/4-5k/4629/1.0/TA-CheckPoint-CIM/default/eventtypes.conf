###### CheckPoint Traffic ######
[checkpoint]
search = sourcetype=cp_log
#tags = network

[checkpoint_communicate]
search = sourcetype=cp_log product="*Firewall*"
#tags = firewall communicate

[checkpoint_vpn]
search = sourcetype=cp_log vpn
#tags = network session communicate vpn

# what constitutes session start
[checkpoint_vpn_start]
search = sourcetype=cp_log  (vendor_action=encrypt OR vendor_action=decrypt)
# OR opsec_reason="connected to gateway")
#tags = start


## Threat Blade
[checkpoint_malware_attack]
search = sourcetype=cp_log verdict=Malicious
#tags = malware attack

[checkpoint_smartdefense]
search = sourcetype=cp_log product=SmartDefense
#tags = ids attack 

###### CheckPoint Audit ######
[checkpoint_audit]
search = sourcetype=cp_log product=SmartConsole
#tags = change

## Network Change
[checkpoint_audit_change]
search = sourcetype=cp_log product=SmartConsole (operation="Create Object" OR operation="Modify Object" OR operation="Delete Object")
#tags = audit

## Network Authentication
[checkpoint_audit_authentication]
search = sourcetype=cp_log product=SmartConsole (operation="Log In" OR operation="Log Out" OR operation="Force Log Out")
#tags = authentication privileged

## Filesystem
[checkpoint_audit_filesystem]
search = sourcetype=cp_log product=SmartConsole Subject="File Operation"
#tags = endpoint
