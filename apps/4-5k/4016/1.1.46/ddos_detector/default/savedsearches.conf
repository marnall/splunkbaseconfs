[set_default_sampling_lookup]
is_visible = false
enableSched = 1
cron_schedule = 1 1 1 1 1
run_on_startup = true
search = | makeresults \
         | eval nfo_hostname="*" \
         | eval exp_ip="*" \
         | eval flow_smpl_id="*" \
         | eval smpl_int="*" \
         | eval _time="*" \
         | inputlookup sampling_lookup  append=t \
         | dedup nfo_hostname,exp_ip,flow_smpl_id,smpl_int,_time \
         | table nfo_hostname,exp_ip,flow_smpl_id,smpl_int,_time \
         | outputlookup sampling_lookup

[set_default_my_subnets_lookup]
is_visible = false
enableSched = 1
cron_schedule = 1 1 1 1 1
run_on_startup = true
search = | makeresults \
         | eval raw="subnet=\"10.0.0.0/8\",description=\"ClassA\"### \
                     subnet=\"172.16.0.0/12\",description=\"ClassB\" ### \
                     subnet=\"192.168.0.0/16\",description=\"ClassC\" " \
        | makemv delim="###" raw \
        | mvexpand raw \
        | rename raw  as  _raw \
        | extract \
        | table subnet description \
        | inputlookup my_subnets_lookup  append=t \
        | dedup subnet description \
        | outputlookup my_subnets_lookup

[save_interfaces_20003]
is_visible = false
enableSched = 1
run_on_startup = true
cron_schedule = */30 * * * *
dispatch.earliest_time = -32m@m
dispatch.latest_time = -2m@m
search = `netflow_index` (nfc_id=20003 OR nfc_id=20067 OR nfc_id=20267 OR nfc_id=20367 OR nfc_id=20467) \
         | eval SNMPDeviceName=case(nfc_id=20003,sysName,nfc_id=20267,vpc_name,nfc_id=20367,gcp_exp,nfc_id=20467,case(direction=="inbound", dest_vnet_name, direction=="outbound", src_vnet_name)) \
         | eval input_snmp=if(isnull(input_snmp),ifIndex,input_snmp) \
         | eval input_snmp=if(nfc_id==20267,interface_id,input_snmp) \
         | fields exp_ip nfo_hostname input_snmp output_snmp ifIndex SNMPDeviceName ifSpeed ifName ifAlias  \
         | eval ifIndex=mvappend(input_snmp,output_snmp,ifIndex) \
         | mvexpand ifIndex \
         | dedup exp_ip nfo_hostname ifIndex \
         | table exp_ip nfo_hostname ifIndex SNMPDeviceName ifSpeed ifName ifAlias\
         | inputlookup interfaces_20003.csv append=t \
         | stats first(SNMPDeviceName) as SNMPDeviceName first(ifSpeed) as ifSpeed first(ifName) as ifName first(ifAlias) as ifAlias by nfo_hostname exp_ip ifIndex \
         | dedup  exp_ip nfo_hostname ifIndex sortby ifName \
         | outputlookup interfaces_20003_lookup
