[save_exporters_with_nfo]
is_visible = false
enableSched = 1
run_on_startup = true
cron_schedule = */30 * * * *
dispatch.earliest_time = -32m@m
dispatch.latest_time = -2m@m
search = `netflow_search_all_ddos_rules` | inputlookup nfo_exp_lookup append=t | dedup exp_ip nfo_hostname | sort exp_ip | table nfo_hostname exp_ip | outputlookup nfo_exp_lookup

[ddos_alert]
disabled = 1
action.email = 1
action.email.include.view_link = 0
action.email.message.alert = NetFlow Optimizer detected a possible $result.indicator_description$ attack. $action.email.hostname$/en-US/app/ddos_detector/ddos_details?earliest=$result.info_min_time$&latest=$result.info_max_time$&form.confidence=$result.alerting_level$&form.exp_ip=*
action.email.subject.alert = Possible DDoS attack detected
action.email.useNSSubject = 1
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = */1 * * * *
dispatch.earliest_time = -2m@m
dispatch.latest_time = -1m@m
enableSched = 1
quantity = 0
relation = greater than
search = `ddos_alert_search(High and above)`


[ddos_20196_20064]
disabled = 1
is_visible = false
enableSched = 1
cron_schedule = * * * * *
realtime_schedule = 0
dispatch.earliest_time = -10m@m
dispatch.latest_time = now
action.summary_index = 1
action.summary_index._name = summary
action.summary_index.report = ddos_20196_20064
action.summary_index.version = 2
search = `netflow_search_rule_20196` \
    | rex field=confidence "(?<confidence_value>\d+)\/(?<confidence_threshold>\d+)" \
    | eval exporter = exp_ip \
    | eval nfo = nfo_hostname \
    | eval timestamp_20196 = _time \
    | append [ | stats count \
        | eval nfc_id = 20196 \
        | eval t_first = 0 \
        | eval t_last = 0 \
        | eval confidence_value = 0 \
        | eval exporter = 0 \
        | eval nfo = 0 \
        | eval timestamp_20196 = 0 ] \
    | map maxsearches=50000 search="search `netflow_search_rule_20064` \
        | where (_time >= $t_first$) AND (_time - round(t_int/1000) <= $t_last$) AND (exp_ip == $exporter$) AND (nfo_hostname == $nfo$) \
        | eval conf = $confidence_value$ \
        | eval report_time = $timestamp_20196$" \
    | dedup _time nfo_hostname exp_ip protocol dest_ip src_ip packets_in bytes_in packets_out bytes_out bytes flow_count percent_of_total t_int report_time conf \
    | eval left_host = if(src_ip < dest_ip, src_ip, dest_ip) \
    | eval right_host = if(src_ip < dest_ip, dest_ip, src_ip) \
    | eval bytes_sent_by_left = if(left_host == src_ip, bytes_in, bytes_out) \
    | eval bytes_sent_by_right = if(right_host == src_ip, bytes_in, bytes_out) \
    | stats sum(bytes_sent_by_left) as TrafficLR sum(bytes_sent_by_right) as TrafficRL by left_host right_host nfo_hostname exp_ip conf report_time src_ip dest_ip  flow_smpl_id \
    | eval _time = report_time \
    | eval priority = 0 \
    | rename conf as confidence \
    | table _time src_ip dest_ip left_host right_host confidence nfo_hostname exp_ip TrafficLR  TrafficRL priority flow_smpl_id report_time 


