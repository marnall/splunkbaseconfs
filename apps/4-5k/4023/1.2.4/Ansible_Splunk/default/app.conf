#
# Splunk app configuration file
#

[install]
is_configured = 0

[ui]
is_visible = 1
label = Ansible Monitoring & Diagnostics

[launcher]
author = Converging Data
description = This Splunk App takes events produced by the Ansible Splunk Callback and provides monitoring and analytics
version = 1.2.4

[package]
id = Ansible_Splunk
check_for_updates = 1

[triggers]
reload.addon_builder = simple
