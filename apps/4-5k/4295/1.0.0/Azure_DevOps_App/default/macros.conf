
[CalcDaysFromNow(1)]
args = CALCDATE
definition = eval timeLastUpdated = tostring((now() - strptime($CALCDATE$,"%Y-%m-%dT%H:%M:%S")),"duration") \
| rex field=timeLastUpdated "((?<DaysLastUpdated>\d+)\+)"\
| eval DaysLastUpdated=if(isNull(DaysLastUpdated),0,DaysLastUpdated)
iseval = 0

[CalcWorkDaysDifference(4)]
args = STARTDATE,ENDDATE,WORKDAYS,DATESTOEXCLUDE
definition = search $STARTDATE$!=null \
| search $ENDDATE$!=null \
\
| eval StartDate = strptime($STARTDATE$,"%Y-%m-%d")\
| eval EndDate = strptime($ENDDATE$,"%Y-%m-%d") + 1 \
| eval day = mvrange(0, (EndDate - StartDate) , 86400)\
| eval day = if(isnull(day),0,day)\
| fields - EndDate\
\
| mvexpand day\
| eval CalcTime = StartDate + day\
| fields - StartDate day\
\
| eval myDay = strftime(CalcTime,"%A")\
| where (lower(myDay) == lower($WORKDAYS$))\
| fields - myDay\
\
| eval CalcTime = strftime(CalcTime,"%Y-%m-%d")\
| where (CalcTime != $DATESTOEXCLUDE$)
iseval = 0

[GenerateBurndown(2)]
args = PROJECT,ITERATION
definition = sourcetype="azuredevops:iteration" path="$PROJECT$\\$ITERATION$" \
| dedup id sortby -_time \
| eval DayOff="" \
| rename path as CardIteration \
| `CalcWorkDaysDifference(IterationStartDate,IterationEndDate,IterationWorkDays,DayOff)` \
| eval _time = strptime(CalcTime,"%F") \
| join CardIteration CalcTime max=0 type=outer \
    [ search sourcetype="azureDevOps:workitem" \
    | where in(CardType,"Task","Bug")\
    | eval CalcTime = strftime(_time,"%F") \
    | dedup id CalcTime sortby -_time] \
| nomv IterationWorkDays\
| stats sum(CardEstimate) as TotalEstimate by CalcTime CardIteration IterationWorkDays IterationEndDate\
| makemv tokenizer="(\S+)" IterationWorkDays\
| rename CardIteration as iterationPath \
| join iterationPath max=0 type=outer \
    [ search sourcetype="azuredevops:capacity"\
    | dedup iterationId memberName sortby -_time\
    | rex field=memberName "^(?<MemberName>.+)\s<" \
    | eval DaysOffStart = if(isNull(DaysOffStart),"2000-01-01",DaysOffStart) \
    | eval DaysOffEnd = if(isNull(DaysOffEnd),"2000-01-01",DaysOffEnd) \
    | eval LeavePeriod=mvzip(DaysOffStart,DaysOffEnd," - ") \
    | mvexpand LeavePeriod \
    | rex field=LeavePeriod "(?<LeaveStartDate>.+)\s\-\s(?<LeaveEndDate>.+)" \
    | eval DayOff="" \
    | eval WorkDays=mvappend("Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday") \
    | `CalcWorkDaysDifference(LeaveStartDate,LeaveEndDate,WorkDays,DayOff)` \
    | stats values(CalcTime) as DaysOff by memberName IterationActivityCapacityPerDay IterationActivityNames iterationPath\
    ] \
| makemv tokenizer="(\S+)" DaysOff\
| rename CalcTime as SearchStartDate\
| `CalcWorkDaysDifference(SearchStartDate,IterationEndDate,IterationWorkDays,DaysOff)`\
| stats sum(IterationActivityCapacityPerDay) as "Available Capacity" values(TotalEstimate) as "Work Remaining" by SearchStartDate\
| eval SearchStartDate = strftime(strptime(SearchStartDate,"%F"),"%a, %e %b")\
| rename SearchStartDate as "Date"
iseval = 0

[GenerateCapacityOverview(2)]
args = PROJECT,ITERATION
definition = `GetAllWorkItemsForBoard("\"$PROJECT$\"")` \
| Search CardIteration = "$PROJECT$\\$ITERATION$" \
| fields CardState CardLastUpdated MemberName CardId CardEstimate BoardName CardIteration CardType CardName CardTags \
|  where in(CardType,"Task","Bug") \
| stats sum(CardEstimate) as Estimate by CardType CardIteration MemberName \
| rename CardIteration as path, MemberName as memberName \
| join path \
    [| search sourcetype="AzureDevOps:Iteration" \
    | dedup id sortby -_time] \
| makemv tokenizer="(\S+)" IterationWorkDays \
| eval DaysOff = "" \
| join memberName \
    [| search (sourcetype="AzureDevOps:Capacity" iterationPath="$PROJECT$\\$ITERATION$") \
    | dedup memberId sortby -_time \
    | rex field=memberName "^(?<MemberName>.+)\s<" \
    | eval DaysOffStart = if(isNull(DaysOffStart),"2000-01-01",DaysOffStart) \
    | eval DaysOffEnd = if(isNull(DaysOffEnd),"2000-01-01",DaysOffEnd) \
    | eval LeavePeriod=mvzip(DaysOffStart,DaysOffEnd," - ") \
    | mvexpand LeavePeriod \
    | rex field=LeavePeriod "(?<LeaveStartDate>.+)\s\-\s(?<LeaveEndDate>.+)" \
    | eval DayOff="" \
    | eval WorkDays=mvappend("Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday") \
    | `CalcWorkDaysDifference(LeaveStartDate,LeaveEndDate,WorkDays,DayOff)` \
    | stats values(CalcTime) as DaysOff by memberName IterationActivityCapacityPerDay IterationActivityNames] \
| makemv tokenizer="(\S+)" DaysOff \
| join MemberName \
    [ search sourcetype="azuredevops:workitem" BoardName="$PROJECT$" CardIteration = "$PROJECT$\\$ITERATION$" \
    | where in(CardType,"Bug","Epic","Feature","Product Backlog Item","Task") \
    | sort -_time\
    | head 1\
    | eval collectTime = _time\
    | fields collectTime] \
| rex field=memberName "^(?<MemberName>.+)\s<" \
| eval MemberName=if(isnull(MemberName),"Unassigned",MemberName) \
| eval CalcStartDate=if((collectTime > strptime(IterationStartDate,"%Y-%m-%d")),strftime(collectTime,"%Y-%m-%d"),IterationStartDate) \
| eval DayOff=DaysOff \
| `CalcWorkDaysDifference(CalcStartDate,IterationEndDate,IterationWorkDays,DayOff)` \
| eval AvailCapacity=mvzip(IterationActivityNames,IterationActivityCapacityPerDay," - ") \
| mvexpand AvailCapacity \
| rex field=AvailCapacity "^(?<ActivityName>.+)\s\-\s(?<CapacityPerDay>(\d+|\d+\.\d+))" \
| stats sum(IterationActivityCapacityPerDay) as AvailCapacity by MemberName Estimate
iseval = 0

[GetAllWorkItemsForBoard(1)]
args = BOARD
definition = sourcetype="azuredevops:workitem" \
| dedup id sortby -_time \
| search BoardName=$BOARD$
iseval = 0

[GetUniqueOpenWorkItem]
definition = sourcetype="azuredevops:workitem" \
| dedup id sortby -_time \
| where NOT in(CardState,"Done","Removed")
iseval = 0
