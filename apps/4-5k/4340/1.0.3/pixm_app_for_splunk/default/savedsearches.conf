[User Lookup]
run_on_startup = true
cron_schedule = */5 * * * *
enableSched = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
search = `pixm_events` status=1 NOT agentId="*" | dedup uId | table deviceId uId userId username computerName domain, lastUpdated, registrationDate | eval Key=uId | outputlookup user_lookup append=true key_field=Key