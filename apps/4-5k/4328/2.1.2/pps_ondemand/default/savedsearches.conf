[TAP Dashboard Information]
action.email.useNSSubject = 1
alert.track = 0
description = Report from TAP Dashboard of incoming Threats.
dispatch.earliest_time = @d
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","to","from","qid","duration"]
display.general.type = statistics
display.page.search.tab = statistics
display.statistics.rowNumbers = 1
display.visualizations.chartHeight = 394
display.visualizations.show = 0
request.ui_dispatch_app = pps_ondemand
request.ui_dispatch_view = search
search = `pps_get_index` sourcetype="proofpoint_tap_siem" | rename eventType as ACTION, messageTime as "Message Time", messageID as "Message ID", sender as Sender, recipient{} as Recipient, senderIP as "Sender IP", spamScore as "Spam Score", malwareScore as "Malware Score", phishScore as "Phish Score" | table "Message Time", "Message ID", Sender, Recipient, QID, GUID, "Sender IP", "Spam Score", "Malware Score", "Phish Score", ACTION

