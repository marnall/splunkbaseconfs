[TAP Dashboard Threats & Recipients]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = @d
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","to","from","qid","duration","rule"]
