[Email Volume by Recipient Domain Name]
action.email.useNSSubject = 1
alert.track = 0
description = Distinct count of received messages by Recipient domain name.
dispatch.earliest_time = @d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = pps_ondemand
request.ui_dispatch_view = search
search = | tstats `summariesonly` dc(Message_Log.msg_normalized_header_message_id) as Count from datamodel=pps_ondemand where Message_Log.filter.routeDirection="inbound" by Message_Log.msg_normalized_header_to | rex field=Message_Log.msg_normalized_header_to "(?<=@)(?<domain>([a-zA-z0-9.-]*))" | stats sum(Count) as "Messages Received" by domain | rename domain as "Domain Name" | sort 0 - "Messages Received"

