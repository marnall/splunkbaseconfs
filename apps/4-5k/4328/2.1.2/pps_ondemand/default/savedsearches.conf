[Inbound message summary]
action.email.useNSSubject = 1
alert.track = 0
description = Message summary of inbound traffic.
dispatch.earliest_time = @d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = pps_ondemand
request.ui_dispatch_view = search
search = | tstats `summariesonly` latest(_time) as _time, values(Message_Log.msg_normalized_header_from) as Sender, values(Message_Log.msg_normalized_header_to) as Recipient, values(Message_Log.msg_normalized_header_subject) as Subject, values(Message_Log.filter.disposition) as "Filter Action" from datamodel=pps_ondemand where Message_Log.filter.routeDirection="inbound" by Message_Log.msg_normalized_header_message_id | sort 0 -_time | eval Date/Time = strftime(_time, "%m-%d-%Y %l:%M %p") | rename Message_Log.msg_normalized_header_message_id as "Message ID" | table "Message ID", Date/Time, Sender, Recipient, Subject, "Filter Action"

