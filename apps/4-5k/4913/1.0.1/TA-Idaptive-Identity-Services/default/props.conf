[syslog]
TIME_PREFIX = (?:^.*-syslog-writer.*whenoccurreddate=|^.*?)
TRANSFORMS-idaptive_syslog_transforms = idaptive_syslog_regex

[iis:events]
REPORT-idaptive_syslog_report = idaptive_headers

# action,app and src fields are extracted for CIM authentication model.
EVAL-app = "Idaptive"
EVAL-vendor_product = "Idaptive_Identity_Services"

FIELDALIAS-src_for_auth_cim = FromIPAddress AS src
EVAL-action = if(match(eventname,"Fail"), "failure" , if(match(lower(MfaResult),"failure|denied|failed|unsuccessful"),"failure","success"))
