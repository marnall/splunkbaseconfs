[dpod:json]
SHOULD_LINEMERGE = false
BREAK_ONLY_BEFORE = "^{"
CHARSET = UTF-8
MAX_TIMESTAMP_LOOKAHEAD = 40
TRUNCATE = 10000
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%:z
TIME_PREFIX = microSecTimestamp"\s*:\s*"
INDEXED_EXTRACTIONS = json
SEDCMD-index = s/"_index"/"dpod_index"/
SEDCMD-source = s/"_source"/"dpod_source"/
SEDCMD-type = s/"_type"/"dpod_type"/
SEDCMD-id = s/"_id"/"dpod_id"/
SEDCMD-timestamp = s/"_timestamp"/"dpod_timestamp"/
SEDCMD-version = s/"_version"/"dpod_version"/
SEDCMD-operation = s/"_operation"/"dpod_operation"/
LOOKUP-dpod_deviceData = dpod_deviceData deviceName AS "dpod_source.deviceName" domainName AS "dpod_source.domainName" serviceName AS "dpod_source.serviceName" OUTPUTNEW clientIp AS "clientIp.1"

[dpod:alert:syslog]
SHOULD_LINEMERGE = false
BREAK_ONLY_BEFORE = 
MAX_TIMESTAMP_LOOKAHEAD = 40
TRUNCATE = 10000
TIME_FORMAT = %b %d %H:%M:%S
TIME_PREFIX = ^<\d+>
EXTRACT-dpod_alert_host = ^(?:[^ \n]* ){3}(?P<dpod_alert_host>[^ ]+)
EXTRACT-dpod_alert_level = ^(?:[^\[\n]*\[){3}(?P<dpod_alert_level>\w+)
EXTRACT-dpod_alert_name = ^[^\(\n]*\((?P<dpod_alert_name>[^\)]+)
EXTRACT-dpod_alert_desc = ^(?:[^:\n]*:){4}\((?P<dpod_alert_desc>[^\)]+)
EXTRACT-dpod_alert_on = ^(?:[^\(\n]*\(){3}(?P<dpod_alert_on>[^)]+)
EXTRACT-dpod_alert_details = \s(?<dpod_alert_details>Value:[^\n]+)$

