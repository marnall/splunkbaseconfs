# Splunk app configuration file

[install]
state = enabled
allows_disable = true
state_change_requires_restart = true
build = 1

[ui]
is_visible = 1
label = DataPower Operations Dashboard (DPOD)

[launcher]
author = MonTier Software (2015)
description = IBM(R) DataPower(R) Operations Dashboard (DPOD) is a powerful tool providing central self-service, profiling, troubleshooting and management capabilities across all your IBM DataPower Gateways. Using DPOD, you can investigate DataPower services transactions and API-Connect API invocations processed by your DataPower Gateway cluster in near real time, down to the level of a single message. This Splunk App is an Implementation Reference for demonstrating the value of the integration between DPOD and Splunk. The detailed and unique information from DPOD about the IBM DataPower gateways and API Connect platform can now be displayed in Splunk, without any investment in development of such an application.
version = 1.2.0

[package]
id = dpod
