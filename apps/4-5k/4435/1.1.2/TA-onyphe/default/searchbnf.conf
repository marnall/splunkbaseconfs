[onyphe-command]
syntax      = onyphe ip=<src_ip> (api=(ip|threatlist|reverse|datascan|inetnum|geoloc|pastries|synscan|forward|onionscan|datascan|sniffer|ctl|onionshot|datashot))? (mode=(simple|search))? (search=<search_filter>)? (autoscroll=(0|1))? (maxpage=<integer>)? (output=(json|splunk))?
shortdesc   = Enrich your data or create powerful dashboards and alerts by querying ONYPHE API
description = Enrich your data or create powerful dashboards and alerts by querying ONYPHE API. \i\\
              "ip"      - specify the field containing the IP address used for searching within ONYPHE data (default: src_ip).\i\\
              "api"     - the ONYPHE API to use for enrichment (default: ip).\i\\
              "mode"    - API mode to use (default: simple, can also use the search API with search).\i\\
              "search"  - search filter to use when using mode=search (default: empty).\i\\
              "autoscroll" - wether to scroll through pages or not (default: no).\i\\
              "maxpage" - limit to this maximum number of pages when autoscrolling (default: no limit).\i\\
              "output" - output results to JSON or Splunk format (default: json).\i\\

comment1 = enrich IP address information with known threatlists
example1 = | onyphe ip=src_ip api=threatlist | spath input=onyphe_threatlist

comment2 = enrich IP address information with known online scanning activities
example2 = | onyphe ip=src_ip api=sniffer | spath input=onyphe_sniffer
