[cbthreathunter_idx]
search = index=main

[cbthreathunter_notifications]
search = eventtype=cbthreathunter_idx sourcetype=carbonblack:psc:notification

[cbthreathunter_api_errors]
search = eventtype=cbthreathunter_idx sourcetype=cb_psc_for_splunk:error

[cbthreathunter_internal_errors]
search = index=_internal sourcetype IN (modularinput, restclient, utilities) log_level=ERROR

[cbthreathunter_api_info]
search = eventtype=cbthreathunter_idx sourcetype=carbonblack:psc:api

[cbthreathunter_policy_notifications]
search = eventtype=cbthreathunter_notifications type=POLICY_*

[cbthreathunter_threat_notifications]
search = eventtype=cbthreathunter_notifications type=THREAT* NOT type="THREAT_HUNTER"

[cbthreathunter_threat_hunter_notifications]
search = eventtype=cbthreathunter_notifications type="THREAT_HUNTER" OR threatInfo.score="*"

[cbthreathunter_threat_hunter_process]
search = eventtype=cbthreathunter_threat_hunter_notifications threatHunterInfo.processPath="*"
