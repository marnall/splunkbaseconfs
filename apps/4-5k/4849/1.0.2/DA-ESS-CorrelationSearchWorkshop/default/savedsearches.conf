[Threat - Network Traffic Communications over Port 4444 (Metasploit Default) - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Network Traffic Communications over Port 4444 (Metasploit Default)
action.customsearchbuilder.enabled = false
action.customsearchbuilder.spec = {}
action.notable = 1
action.notable.param.drilldown_name = Drill down on all destination port 4444 traffic between $src$ and $dest$
action.notable.param.drilldown_search = src=$src$ dest=$dest$ dest_port=4444
action.notable.param.rule_description = Port 4444 is being used between $src$ and $dest$
action.notable.param.rule_title = Suspicious Activity Seen - Port 4444 Usage between $src$ and $dest$
action.notable.param.security_domain = network
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.suppress = 1
alert.suppress.fields = src,dest
alert.suppress.period = 86400s
alert.track = 1
counttype = number of events
cron_schedule = */10 * * * *
description = Detect port 4444 as destination. 4444 is the default port for Metasploit modules. krb524 was assigned by default to run on that port but that service is very infrequently seen now.
dispatch.earliest_time = -15m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = | tstats summariesonly=true count sum(All_Traffic.bytes_in) AS bytes_in sum(All_Traffic.bytes_out) AS bytes_out from datamodel=Network_Traffic where All_Traffic.dest_port=4444 by All_Traffic.src All_Traffic.dest All_Traffic.dest_port All_Traffic.app All_Traffic.user\
| `drop_dm_object_name("All_Traffic")`\
| eval techID="T1065" | lookup mitreattack ID as techID OUTPUT Tactic Technique Description

