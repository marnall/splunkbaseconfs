[Endpoint - Malicious PowerShell Encoded Commands - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Malicious PowerShell Encoded Commands
action.customsearchbuilder.enabled = false
action.customsearchbuilder.spec = {}
action.notable = 1
action.notable.param.drilldown_name = Show All Processes on $dest$
action.notable.param.drilldown_search = | from datamodel Endpoint.Processes | search dest=$dest$
action.notable.param.rule_description = The system $dest$ executed a PowerShell process that has an encoded command on the command-line
action.notable.param.rule_title = PowerShell process with an encoded command detected on $dest$
action.notable.param.security_domain = endpoint
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.suppress = 1
alert.suppress.fields = dest,process
alert.suppress.period = 86400s
alert.track = 1
counttype = number of events
cron_schedule = */60 * * * *
description = This search looks for PowerShell processes that have encoded the script within the command-line. Malware has been seen using this parameter, as it obfuscates the code and makes it relatively easy to pass a script on the command-line. This search uses the Malicious PowerShell Process - Encoded Command from ESCU PowerShell Analytic Story as a starting point and adapts it to provide further detection and visibility.  It requires the Decrypt app https://splunkbase.splunk.com/app/2655/ to view base64 encoded outputs.
dispatch.earliest_time = -65m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = | tstats summariesonly=true count min(_time) AS firstTime max(_time) AS lastTime values(Processes.parent_process) AS parent_process values(Processes.parent_process_exec) AS parent_process_exec values(Processes.process_current_directory) AS process_current_directory values(Processes.process_exec) AS process_exec values(Processes.process_path) AS process_path values(Processes.vendor_product) AS vendor_product from datamodel=Endpoint.Processes where Processes.process_exec=*powershell* Processes.process IN (*-EC*,*-EncodedCommand*,*-EncodedComman*,*-EncodedComma*,*-EncodedComm*,*-EncodedCom*,*-EncodedCo*,*-EncodedC*,*-Encoded*,*-Encode*,*-Encod*,*-Enco*,*-Enc*,*-En*,*-E*) by Processes.dest Processes.user Processes.process_name Processes.process  \
| `ctime(firstTime)` | `ctime(lastTime)`\
| `drop_dm_object_name(Processes)`\
| rex field=process "\-(?i)e(!p|c|ncodedcommand|ncodedcomman|ncodedcomma|ncodedcomm|ncodedcom|ncodedco|ncodedc|ncoded|ncode|ncod|nco|nc|n|\s)\s*(?<process_encoded>\S*)" \
| rex field=parent_process "\-(?i)e(!p|c|ncodedcommand|ncodedcomman|ncodedcomma|ncodedcomm|ncodedcom|ncodedco|ncodedc|ncoded|ncode|ncod|nco|nc|n|\s)\s*(?<parent_encoded>\S*)"\
| decrypt f=process_encoded atob emit('process_decoded') | decrypt f=parent_encoded atob emit('parent_decoded')\
| rename process_decoded AS process | rename parent_decoded AS parent_process | fields - process_encoded parent_encoded | eval techID="T1086" | lookup mitreattack ID as techID OUTPUT Tactic Technique Description

[Endpoint - Execution of a renamed psexec.exe to avoid detection - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Execution of a renamed psexec.exe to avoid detection
action.customsearchbuilder.enabled = false
action.customsearchbuilder.spec = {}
action.notable = 1
action.notable.param.drilldown_name = View process creation events in Microsoft Sysmon on $dest$
action.notable.param.drilldown_search = sourcetype=xmlwineventlog:microsoft-windows-sysmon/operational EventCode=1 dest=$dest$
action.notable.param.rule_description = A renamed version of psexec.exe, called $process_name$, was executed by $user$ on $dest$. This technique is often used by attackers or malware.
action.notable.param.rule_title = A renamed version of psexec.exe was executed on $dest$ by $user$
action.notable.param.security_domain = endpoint
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.suppress = 1
alert.suppress.fields = dest
alert.suppress.period = 86400s
alert.track = 1
counttype = number of events
cron_schedule = */60 * * * *
description = psexe.exe may be renamed to hide use of the executable in a malicious manner. Based on Sigma detection: https://github.com/Neo23x0/sigma/blob/master/rules/windows/sysmon/sysmon_renamed_psexec.yml\

dispatch.earliest_time = -65m@m
dispatch.latest_time = -5m@m
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = sourcetype=xmlwineventlog:microsoft-windows-sysmon/operational Product="Sysinternals PsExec" Description="Execute processes remotely" NOT (Image="*\PsExec.exe" OR Image="*\PsExec64.exe")\
| table dest parent_process parent_process_exec parent_process_id parent_process_guid parent_process_name parent_process_path process process_current_directory process_exec process_hash process_guid process_id process_integrity_level process_name process_path user vendor_product | eval techID="T1036" | lookup mitreattack ID as techID OUTPUT Tactic Technique Description

