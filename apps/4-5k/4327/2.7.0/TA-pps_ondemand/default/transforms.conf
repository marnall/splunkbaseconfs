[field-protocol]
SOURCE_KEY = connection.protocol
REGEX = ([a-z]+):(?:[a-z]+)
FORMAT = protocol::$1

[field-recipient_domain]
SOURCE_KEY = msg.header.to{}
REGEX = <.*?@([\w.-]+)>|(?:<[^>]*\s)?[\w.-]+@([^\s>]+(?![^<]*>))$
MV_ADD = true
FORMAT = angular_email_recipient_domain::$1 direct_email_recipient_domain::$2

[field-src_user_domain]
SOURCE_KEY = envelope.from
REGEX = @([^>]+)
FORMAT = src_user_domain::$1
