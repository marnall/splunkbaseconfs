[onapsis]
TIME_PREFIX = erp_time\":\s\"
MAX_TIMESTAMP_LOOKAHEAD = 25
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%:z
SHOULD_LINEMERGE = false
TRUNCATE = 90000
TRANSFORMS-force_sourcetype_for_op_dr = force_sourcetype_for_op_dr
TRANSFORMS-force_sourcetype_for_op_ul = force_sourcetype_for_op_ul
TRANSFORMS-force_sourcetype_for_op_sraw = force_sourcetype_for_op_sap_raw
TRANSFORMS-force_sourcetype_for_op_health = force_sourcetype_for_op_health

[onapsis_dr]
SEDCMD-trim-to-json = s#^.*?{#{#
KV_MODE = json
LOOKUP-nulltozero = nulltozero_lookup original AS dest_port OUTPUT new AS dest_port
LOOKUP-rootcause_solution = rootcause_solution_lookup incident_name AS incident_name OUTPUTNEW root_cause AS "Root Cause" solution AS Solution
LOOKUP-severity_to_txt = severity_lookup severity_num AS severity OUTPUT severity_txt AS severity
EVAL-action="detection"
EVAL-ids_type="application"
EVAL-vendor_product="Onapsis"
FIELDALIAS-dvc = host AS dvc
FIELDALIAS-dest_port_for_op_dr = destination_port ASNEW dest_port
FIELDALIAS-dest_for_op_dr = erp_host ASNEW dest
FIELDALIAS-signature_for_op_dr = incident_name ASNEW signature
FIELDALIAS-category_for_op_dr = incident_type ASNEW category
FIELDALIAS-transport_for_op_dr = protocol ASNEW transport
FIELDALIAS-user_for_op_dr = username ASNEW user

[onapsis_ul]
SEDCMD-trim-to-json = s#^.*?{#{#
KV_MODE = json
LOOKUP-action_for_op_ul = op_auth_action_lookup op_action AS success OUTPUTNEW cim_action AS action
FIELDALIAS-app_for_op_ul = asset_name AS app
FIELDALIAS-dest_for_op_ul = erp_host AS dest
FIELDALIAS-signature_for_op_ul = incident_name AS signature
FIELDALIAS-user_for_op_ul = username ASNEW user

[onapsis_sap_raw]
SEDCMD-trim-to-json = s#^.*?{#{#
KV_MODE = json

[onapsis_health]
SEDCMD-trim-to-json = s#^.*?{#{#
KV_MODE = json
