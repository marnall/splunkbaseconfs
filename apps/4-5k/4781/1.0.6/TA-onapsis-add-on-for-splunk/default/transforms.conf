
##### onapsis #####

[force_sourcetype_for_op_dr]
DEST_KEY = MetaData:Sourcetype
REGEX = incident_type
FORMAT = sourcetype::onapsis_dr

[force_sourcetype_for_op_ul]
DEST_KEY = MetaData:Sourcetype
REGEX = incident_type\":\s\"UserActivity.+event_type":\s\"UserLogin
FORMAT = sourcetype::onapsis_ul

[force_sourcetype_for_op_sap_raw]
DEST_KEY = MetaData:Sourcetype
REGEX = type_\":\s\"raw_event
FORMAT = sourcetype::onapsis_sap_raw

[force_sourcetype_for_op_health]
DEST_KEY = MetaData:Sourcetype
REGEX = \s\"appliances_states\":\s\"OSP
FORMAT = sourcetype::onapsis_health

[nulltozero_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = nulltozero.csv

[op_to_ids_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = ids_fields.csv

[rootcause_solution_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = onapsis_incident_explanation_solution.csv

[severity_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = onapsis_severity_scale.csv

[op_auth_action_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = onapsis_auth_action_lookup.csv

