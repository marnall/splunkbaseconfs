[default]

[install]
state = enabled
build = 3
state_change_requires_restart = true
is_configured = 0

[launcher]
description = Discover and investigate threats using threat and traffic data from Firepower Management Center (FMC). For full documentation please visit https://cisco.com/go/firepower-for-splunk
author = Cisco Security
version = 1.9.1

[package]
check_for_updates = 1
id = firepower_dashboard

[ui]
is_visible = 1
label = Cisco Firepower App for Splunk

[triggers]
reload.umbrella = simple
reload.firepower = simple
reload.appsetup = simple

