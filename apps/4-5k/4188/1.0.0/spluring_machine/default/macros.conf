
[spluring_step]
definition = `spluring_microstep_parse_state` \
| `spluring_microstep_set_instruction_pointer`\
| `spluring_microstep_set_data_pointer`\
| `spluring_microstep_set_data`\
| `spluring_microstep_io`\
| `spluring_microstep_write_state`
iseval = 0

[spluring_steps_1]
definition = `spluring_step`
iseval = 0

[spluring_steps_10]
definition = `spluring_step` | `spluring_step` | `spluring_step` | `spluring_step` | `spluring_step` | `spluring_step` | `spluring_step` | `spluring_step` | `spluring_step` | `spluring_step`
iseval = 0

[spluring_steps_50]
definition = `spluring_steps_10` | `spluring_steps_10` | `spluring_steps_10` | `spluring_steps_10` | `spluring_steps_10`
iseval = 0

[spluring_steps_0]
definition = noop
iseval = 0

[spluring_microstep_parse_state]
definition = eval data = split(data, "\
")\
| eval code_length = len(code) \
| eval input = split(input, " "), output = split(output, " ") \
| eval current_data = mvindex(data, data_pointer) \
| eval command = substr(code, instruction_pointer+1, 1) \
| eval code_step = split(code, "")
iseval = 0

[spluring_microstep_set_instruction_pointer]
definition = mvexpand code_step \
| streamstats current=f count \
| where NOT command="[" OR count >= instruction_pointer \
| eval pm = case(code_step="[", 1, code_step="]", -1, true(), 0) \
| streamstats sum(pm) as sum \
| streamstats current=f count as marker by sum \
| reverse \
| streamstats count as r_count \
| where NOT command="]" OR r_count >= code_length-instruction_pointer \
| streamstats sum(pm) as r_sum \
| streamstats current=f count as r_marker by r_sum \
| reverse \
| where (command="[" AND sum=0 AND marker=0) OR (command="]" AND r_sum=0 AND r_marker=0) OR NOT (command="[" OR command="]") \
| head 1\
| eval instruction_pointer = case(\
    command="[", if(current_data > 0, instruction_pointer+1, count+1),\
    command="]", if(current_data = 0, instruction_pointer+1, count+1),\
    true(), instruction_pointer+1)
iseval = 0

[spluring_microstep_set_data_pointer]
definition = eval data_pointer = case(command="<", data_pointer-1, command=">", data_pointer+1, true(), data_pointer)
iseval = 0

[spluring_microstep_set_data]
definition = eval current_data = case(\
    command="+", if(current_data=255, 0, current_data+1), \
    command="-", if(current_data=0, 255, current_data-1), \
    command=",", coalesce(mvindex(input, 0), 0),\
    true(), current_data) \
| eval data = case(\
    data_pointer >= mvcount(data), mvappend(data, "0"),\
    command="+" OR command="-" OR command=",", mvappend(case(data_pointer > 0, mvindex(data, 0, data_pointer-1)), current_data, mvindex(data, data_pointer+1, -1)),\
    true(), data)
iseval = 0

[spluring_microstep_io]
definition = eval input = mvjoin(case(\
    command=",", mvindex(input, 1, -1),\
    true(), input), " ") \
| eval output = mvjoin(case(\
    command=".", mvappend(output, current_data),\
    true(), output), " ")
iseval = 0

[spluring_microstep_write_state]
definition = eval finished = if(instruction_pointer > code_length, 1, 0) \
| nomv data \
| table code instruction_pointer data_pointer data input output finished
iseval = 0
