# inputs.conf

[monitor:///var/log/auditbeat/logs/auditbeat]
  index=os
  sourcetype=auditbeat

# self monitoring, see README.txt
[fschange:/etc/auditbeat/auditbeat.yml]
  index=os
  pollPeriod = 60
  hashMaxSize= 100000
  disabled = 0
  recurse = false

[monitor:///etc/auditbeat/auditbeat.yml]
  index=os
  sourcetype=config_file