[script://$SPLUNK_HOME/etc/apps/SA-HLThreatIntelligenceFeed/bin/threatlist_handler.py]
interval = 3600
passAuth = admin
disabled = 1
python.version = python3

[threatlist://misp_Domains]
description = Threat intel domains provided by SA-HLThreatIntelligenceFeed
disabled = true
fields = weight:$4,domain:$3,date:$2,description:$1
skip_header_lines = 1
type = threatlist
url = lookup://misp_Domains
interval = 3600
max_age = -24h

[threatlist://misp_IPDST]
description = Threat intel ips provided by SA-HLThreatIntelligenceFeed
disabled = true
fields = weight:$4,date:$3,ip:$2,description:$1
skip_header_lines = 1
type = threatlist
url = lookup://misp_IPDST
interval = 3600
max_age = -24h

[threatlist://misp_MD5SUMs]
description = Threat intel MD5s provided by SA-HLThreatIntelligenceFeed
disabled = true
