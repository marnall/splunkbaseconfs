[threatlist://hl_current_threats]
description = Indicators of high profile breaches/vulnerabilities provided by SA-HLThreatIntelligenceFeed
disabled = true
fields = description:$4,ip:$8,file_name:$7,url:$10,http_user_agent:$12,file_hash:$6,weight:$5,domain:$9,http_referrer:$11
