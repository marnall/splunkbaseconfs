
[admin:TA_bitbucket]
match = /
members = TA_bitbucket_bitbucket_repositories, TA_bitbucket_settings

[admin_external:TA_bitbucket_bitbucket_repositories]
handlertype = python
handlerfile = TA_bitbucket_rh_bitbucket_repositories.py
handleractions = edit, list, remove, create

[admin_external:TA_bitbucket_settings]
handlertype = python
handlerfile = TA_bitbucket_rh_settings.py
handleractions = edit, list
