[BitBucket:Repo]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
BREAK_ONLY_BEFORE_DATE =
DATETIME_CONFIG =
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false

[source::...ta-bitbucket*.log*]
sourcetype = ta:bitbucket:log

[source::...ta_bitbucket*.log*]
sourcetype = ta:bitbucket:log

[BitBucket:Repo:pullrequest]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 1280
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%:z
TIME_PREFIX = "updated_on": "
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-BitbucketPullRequestCIM = date_created AS pullrequest_date_created date_updated AS pullrequest_date_updated link_html AS pullrequest_link_html reviewer_nickname AS pullrequest_reviewer_nickname reviewer_type AS pullrequest_reviewer_type reviewer_uuid AS pullrequest_reviewer_id state AS pullrequest_state title AS pullrequest_title uuid AS pullrequest_id

[BitBucket:Repo:commit]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 512
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%:z
TIME_PREFIX = "date": "
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-BitbucketCommitCIM = auth_user_nickname AS commit_author_name auth_user_uuid AS commit_author_id date AS commit_authored_date hash AS commit_id link_html AS commit_link message AS commit_title repo_uuid AS "repository _id" type AS event_type
FIELDALIAS-BitBucketCommitProjectId = repo_uuid AS project_id

[BitBucket:Repo:diffstat]
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%:z
TIME_PREFIX = "date": "
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-BitbucketChangeCIM = date AS commit_authored_date hash AS commit_id lines_added AS change_lines_added lines_removed AS change_lines_removed new_path AS change_new_path new_type AS change_new_type old_path AS change_old_path old_type AS change_old_type status AS change_status type AS event_type

[BitBucket:Repo:repository]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 1280
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%:z
TIME_PREFIX = "updated_on": "
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-BitbucketProjectCIM = created_on AS repository_created_at description AS repository_description has_issues AS repository_has_issues link_html AS repository_web_url mainbr_name AS repository_main_branch_name mainbr_type AS repository_main_branch_type name AS repository_title owner_name AS repository_owner_name owner_uuid AS repository_owner_id size AS repository_size slug AS repository_namespace_id type AS repository_type updated_on AS repository_last_activity uuid AS repository_id
FIELDALIAS-BitBucketProjectID = uuid AS project_id
