# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 3

[launcher]
author = Leonardo Armesto
version = 1.0.7
description = Azure Event Hubs Log Integrator enables you to automatically capture the streaming data within your Event Hubs Azure Blob storage.Capture is a feature of Azure Event Hubs. You can use it to automatically deliver the streaming data in your event hub to an Azure Blob storage account of your choice. This capability makes it easy to perform batch processing on real-time streaming data.

[ui]
is_visible = 1
label = Azure Event Hubs Log Integrator
docs_section_override = AddOns:released

[package]
id = TA-azure-event-hubs-log-integrator

[triggers]
reload.addon_builder = simple
reload.ta_azure_event_hubs_log_integrator_account = simple
reload.ta_azure_event_hubs_log_integrator_settings = simple
reload.passwords = simple

