[queryai-command]
syntax = queryai (<queryai_searchquery>)? (<queryai_connectors>)? (<queryai_exclude_connectors>)? (<queryai_events>)? (<queryai_exclude_events>)? (<queryai_help>)? (<hide_nulls>)? (<limit>)?
shortdesc = Perform federated search on external security data via Splunk.
description = Use queryai search command to perform federated search on external security data via Splunk. \
    Results are returned in the Splunk interface and can be included in SPL searches, \
    reporting, and dashboards without having to ingest and store that data in Splunk. \
    If no connector is specified, all configured connectors will be queried.
example1 = | queryai search="ip = 8.8.8.8" connectors="S3, elastic_us, sentinel_au"
comment1 = This example queries the IP address 8.8.8.8 on the S3, Elastic, and Sentinel connectors.
example2 = | queryai search="email = sample@example.com"
comment2 = This example queries the email address sample@example.com on all configured connectors.
example3 = | queryai search="email = sample@example.com" exclude_connectors="S3, elastic_us, sentinel_au"
comment3 = This example queries the email address on all the connectors except the S3, elastic_us, and sentinel_au connectors 
usage = public

[queryai_searchquery]
syntax = search=<query>
description = Mandatory parameter that has the federated search condition payload, should be enclosed in double quotes.
example = | queryai search="ip = 8.8.8.8"
comment = This example searches for the IP address 8.8.8.8.

[queryai_help]
syntax = help=<help_command>
description = Understand all the help sub-options, syntax, searchable entities and events.
example1 = | queryai help=all
comment1 = Provides a basic description about all the query sub-options. 
example2 = | queryai help=search
comment2 = Provides help on search syntax.
example3 = | queryai help=<event_name>
comment3 = Lists the detailed structure of the specified event.  
example4 = | queryai help=connectors
comment4 = Get names of connectors configured in your environment. 

[queryai_connectors]
syntax = connectors=<connectors_list>
description = An optional parameter that lets you pass the connector names you want to query from. Without this parameter, all connectors will be queried.
example = | queryai search="ip = 8.8.8.8" connectors="S3, elastic_us, sentinel_au"
comment = This example queries the S3, Elastic, and Sentinel connectors.

[queryai_exclude_connectors]
syntax = exclude_connectors=<connectors_list>
description = An optional parameter that allows you to specify the connector names from which you want to exclude queries. Without this parameter, queries will be sent to all connectors.
example = | queryai search="ip = 8.8.8.8" exclude_connectors="S3, elastic_us, sentinel_au"
comment = This example queries the S3, Elastic, and Sentinel connectors.

[queryai_events]
syntax = events=<events_list>
description = events sub-option lets you filter out all other event classes, except the ones you list.
example = | queryai search="hostname = abc.xyz" events="inventory_info, http_activity"
comment = This query fetches all the inventory_info and http_activity related to hostname abc.xyz.

[queryai_exclude_events]
syntax = exclude_events=<events_list>
description = exclude_events sub-option lets you filter out your provided list of event classes from search results.
example = | queryai search="hostname = abc.xyz" exclude_events="inventory_info, http_activity"
comment = This query fetches all the events related to hostname abc.xyz except inventory_info and http_activity.

[hide_nulls]
syntax = hide_nulls=<value>
description = hide_nulls sub-option lets you remove the fields containing null or empty list values from the results. It takes either True or False.
example = | queryai search="hostname = abc.xyz" hide_nulls=True 
comment = This query fetches all the events related to hostname abc.xyz at the same time, it removes the fields from the results that have null or empty list values. 

[limit]
syntax = limit=<value>
description = limit sub-option lets you specify the maximum number of records to fetch 
example = | queryai search="hostname = abc.xyz" limit=100
comment = This query fetches maximum of 100 events related to hostname abc.xyz 

[queryagent-command]
syntax = queryagent ask=<english_question>
shortdesc = Use Query FSQL Agents to answer questions on the data in the search pipeline.
description = Use Query FSQL Agents to answer questions on the data in the search pipeline.
usage = public
example1 = | queryagent ask="explain results"
comment1 = The agent will try to explain the contents of the pipeline in plain english.
example2 = | queryagent ask="summarize results"
comment2 = The agent will try to summarize results in the pipeline in plain english.


[fsql-command]
syntax = fsql <fsql_query>
shortdesc = Use Query FSQL to query your federated data.
description = Use Query FSQL to query your federated data.
usage = public
example1 = | fsql "QUERY user_inventory.**"
comment1 = This FSQL query will return all the user_inventory events across connectors for your account. Note the quotes. 
example2 = | fsql QUERY user_inventory.**
comment2 = This FSQL query will return all the user_inventory events across connectors for your account. Without quotes. 