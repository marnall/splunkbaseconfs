[Query - Windows AdFind Exe]
action.email = 1
action.email.to = cs@query.ai
action.email.subject = "Query FS: $name$"
alert.digest_mode = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
alert_type = always
cron_schedule = 0 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
disabled = 1
description = https://research.splunk.com/endpoint/bd3b0187-189b-46c0-be45-f52da2bae67f/
counttype = number of events
quantity = 0
relation = greater than
search = | queryai search="((process_activity.process.cmd_line='* -f *' OR process_activity.process.cmd_line='* -b *' ) AND (process_activity.process.cmd_line=*objectcategory* OR process_activity.process.cmd_line='*-gcb *' OR process_activity.process.cmd_line='* -sc *' )) OR ((process_activity.process.cmd_line='*trustdmp*' OR process_activity.process.cmd_line='*dclist*'))"

