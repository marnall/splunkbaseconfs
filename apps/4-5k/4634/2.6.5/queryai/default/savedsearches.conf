action.email.to = cs@query.ai
action.email.subject = "Query FS: $name$"
alert.digest_mode = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
alert_type = always
cron_schedule = 0 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
disabled = 1
description = https://research.splunk.com/network/5790a766-53b8-40d3-a696-3547b978fcf0/
counttype = number of events
quantity = 0
relation = greater than
search = | queryai search="dns_activity.query.hostname='*.ngrok.com' OR dns_activity.query.hostname='*.ngrok.io' OR dns_activity.query.hostname='ngrok.*.tunnel.com' OR dns_activity.query.hostname='korgn.*.lennut.com'"

