# Example detections using Query Federated Search.
# These are disabled by default. User should change connector names, alerting email addresses, etc.

[Query - Critical Detection Finding]
action.email = 1
action.email.to = cs@query.ai
action.email.subject = "Query FS: $name$"
alert.digest_mode = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
alert_type = always
cron_schedule = 0 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
disabled = 1
description = Alert on critical detection findings queried via federated search
counttype = number of events
quantity = 0
relation = greater than
search = | queryai search="detection_finding.severity_id IN ('FATAL', 'CRITICAL')"

