[Query - Cloud Security Groups Modifications by User]
action.email = 1
action.email.to = cs@query.ai
action.email.subject = "Query FS: $name$"
alert.digest_mode = 1
alert.severity = 4
alert.suppress = 0
alert.track = 1
alert_type = always
cron_schedule = 0 * * * *
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
disabled = 1
description = https://research.splunk.com/cloud/cfe7cca7-2746-4bdf-b712-b01ed819b9de/
counttype = number of events
quantity = 0
relation = greater than
search = | queryai search="web_resources_activity.web_resources.type=security_group AND (web_resources_activity.activity_id=UPDATE OR web_resources_activity.activity_id=DELETE OR web_resources_activity.activity_id=CREATE)" connectors="aws_cloudtrail"

