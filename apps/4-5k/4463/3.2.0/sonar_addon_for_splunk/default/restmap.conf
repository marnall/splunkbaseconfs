[admin:sonar_configuration]
match=/
members=sonar_configuration

[admin_external:sonar_configuration]
handlertype = python
handlerfile = sonar_configuration_handler.py
handleractions = list, edit, remove
python.version = python3
handlerpersistentmode = true

[script:sonar_health]
match = /health
script = sonar_health_handler.py
scripttype = persist
python.version = python3
handler = application.SonarHealthHandler
