
[expose:Splunk_TA_Avalon_settings]
pattern = Splunk_TA_Avalon_settings
methods = POST, GET

[expose:Splunk_TA_Avalon_settings_specified]
pattern = Splunk_TA_Avalon_settings/*
methods = POST, GET, DELETE

[expose:Splunk_TA_Avalon_avalon_nodes]
pattern = Splunk_TA_Avalon_avalon_nodes
methods = POST, GET

[expose:Splunk_TA_Avalon_avalon_nodes_specified]
pattern = Splunk_TA_Avalon_avalon_nodes/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
