[avalon-command]
syntax = avalon (<avalon-options>)* <field-list>
shortdesc = Avalon-Splunk connector search command.
description = Allows workspaces to be created or updated with event data from Splunk that is imported into Avalon and represented as nodes and edges.
usage = public
example1 = avalon create_workspace="Important Workspace"
comment1 = Creates an Avalon workspace "Important Workspace", and imports events from your search to that workspace.
example2 = avalon update_workspace=123
comment2 = Will update the existing workspace of ID 123 with events imported from your search.
tags = avalon
related = pullnodes pullworkspaces

[avalon-options]
syntax = create_workspace="<string>" | update_workspace="<string>"
description = One command creates a workspace, another updates an existing workspace. Both commands will import events from your Splunk search into the specified Avalon workspace to be displayed as nodes and edges.

[pullnodes-command]
syntax = pullnodes (<pullnodes-options>)* <field-list>
shortdesc = Pull nodes from an Avalon workspace and update the "avalon" index.
usage = public
example1 = pullnodes id=123
comment1 = Pulls down nodes from the specified workspace ID and updates the "avalon" index with that information.
tags = avalon
related = avalon pullworkspaces

[pullnodes-options]
syntax = id="<integer>"
description = The ID is used to specify the workspace for which you wish to pull down nodes.

[pullworkspaces-command]
syntax = pullworkspaces <field-list>
shortdesc = Pull all workspace metadata from Avalon and update the "avalon" index.
usage = public
tags = avalon
related = avalon pullnodes
