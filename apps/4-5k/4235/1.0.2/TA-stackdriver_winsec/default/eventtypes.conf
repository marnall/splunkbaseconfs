# Windows Security Eventtypes Modified for Stackdriver Logs
# Originally sourced from Splunk Add-On for Windows version 5.0.1

###### Global Windows Eventtype ######

[wineventlog_windows_stackdriver]
search = winlogtype=Microsoft-Windows-Security-Auditing
#tags = os windows 

[wineventlog_security_stackdriver]
search = winlogtype=Microsoft-Windows-Security-Auditing
#tags = os windows

[winsec_gcp]
search = eventtype=wineventlog_security_stackdriver
#tags = security

###### Security: Account Logon ######

## Authentication Ticket Granted/Failed
## EventCodes 4768, 4772, 672, 676
[windows_auth_ticket_granted_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4768 OR EventCode=672 OR EventCode=676)
#tags = authentication

## Service Ticket Granted/Failed
## EventCodes 4769, 4773, 673, 677
[windows_service_ticket_granted_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4769 OR EventCode=4773 OR EventCode=673 OR EventCode=677)
#tags = authentication

## Ticket Granted Renewed
## EventCodes 4770, 674
[windows_ticket_renewed_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4770 OR EventCode=674)
## tags intentionally left blank
#tags =

## Pre-authentication failed
## EventCodes 4771, 675
[windows_pre_auth_failed_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4771 OR EventCode=675)
#tags = authentication

## Account Mapped for Logon by
## EventCodes 4774, 678
[windows_account_mapped_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4774 OR EventCode=678)
## tags intentionally left blank
#tags = authentication

## The name: %2 could not be mapped for logon by: %1
## EventCodes 4775, 679
[windows_account_notmapped_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4775 OR EventCode=679)
#tags = authentication

## Account Used for Logon by
## The domain controller attempted/failed to validate the credentials for an account
## The logon to account: %2 by: %1 from workstation: %3 failed.
## EventCodes 4776, 4777, 680, 681
[windows_account_used4logon_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4776 OR EventCode=4777 OR EventCode=680 OR EventCode=681)
#tags = authentication

## Session reconnected to winstation
## EventCodes 4778, 682
[windows_session_reconnected_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4778 OR EventCode=682)
## tags intentionally left blank
#tags =

## Session disconnected from winstation
## EventCodes 4779, 683
[windows_session_disconnected_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4779 OR EventCode=683)
#tags = access stop logoff


###### Security: Account Management ######
[windows_account_management_stackdriver]
search = eventtype=wineventlog_security_stackdriver (ta_windows_security_CategoryString="Account Management" OR TaskCategory="User Account Management")
#tags = account change management

