###### Security: Audit (Event Log) ######

## The event logging service has shut down
## EventCode 1100
[windows_audit_log_stopped_stackdriver]
search = eventtype=wineventlog_security_stackdriver EventCode=1100
#tags = audit change endpoint stop stopped watchlist

## Audit events have been dropped by the transport.
## The security Log is now full
## The event logging service encountered an error 
## EventCodes 1101, 1104, 1108
[windows_audit_errors_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=1101 OR EventCode=1104 OR EventCode=1108)
#tags = audit error

## The audit log was cleared
## EventCodes 1102, 517
[windows_audit_log_cleared_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=1102 OR EventCode=517)
#tags = audit change delete endpoint cleared watchlist

## Event log automatic backup
## EventCode 1105
[windows_audit_backup_stackdriver]
search = eventtype=wineventlog_security_stackdriver EventCode=1105
#tags = audit backup change

## Logon/Logoff audit logs
## EventCode 4625
[windows_audit_log_logon_stackdriver]
search = eventtype=wineventlog_security_stackdriver EventCode=4625 (ta_windows_status=0xC0000064 OR ta_windows_status=0xC000006A OR ta_windows_status=0xC000006F OR ta_windows_status=0xC0000070 OR ta_windows_status=0xC0000071 OR ta_windows_status=0xC0000072 OR ta_windows_status=0XC000018C OR ta_windows_status=0XC0000192 OR ta_windows_status=0xC0000193 OR ta_windows_status=0xC0000234 OR ta_windows_status=0XC00002EE OR ta_windows_status=0XC0000413)
#tags = audit change


###### Security: Logon/Logoff ######

## User Logoff/User initiated logoff
## EventCodes 4634, 4647, 538, 551
[windows_logoff_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4634 OR EventCode=4647 OR EventCode=538 OR EventCode=551)
#tags = access stop logoff

## A logon was attempted using explicit credentials
## EventCodes 4648, 552
[windows_logon_explicit_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4648 OR EventCode=552)
#tags = authentication privileged

## An account failed to log on
## EventCodes 4625, 529, 530, 531, 532, 533, 534, 535, 536, 537, 539
[windows_logon_failure_stackdriver]
search = eventtype=wineventlog_security_stackdriver ((EventCode=4625 AND ta_windows_action!=error) OR EventCode=529 OR EventCode=530 OR EventCode=531 OR EventCode=532 OR EventCode=533 OR EventCode=534 OR EventCode=535 OR EventCode=536 OR EventCode=537 OR EventCode=539)
#tags = authentication

## An account was successfully logged on
## EventCodes 4624, 528, 540
[windows_logon_success_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4624 OR EventCode=528 OR EventCode=540)
#tags = authentication


###### Security: Object Access ######

## Object Open
## EventCodes 4656, 560
[windows_object_open_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4656 OR EventCode=560)
#tags = resource file access start

## Handle Closed
## EventCodes 4658, 562
[windows_handle_closed_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4658 OR EventCode=562)
#tags = resource file access stop


###### Security: Policy Change ######

## Audit Policy Change/The audit policy (SACL) on an object was changed
## EventCodes 4715, 4719, 612
[windows_audit_policy_change_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4715 OR EventCode=4719 OR EventCode=612)
#tags = policy configuration modify audit change

## System security access was granted to an account
## EventCodes 4717, 621
[windows_security_access_granted_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4717 OR EventCode=621)
#tags = access authorization add change account

## System security access was removed from an account
## EventCodes 4718, 622
[windows_security_access_removed_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4718 OR EventCode=622)
#tags = access authorization delete change account

## Per User Audit Policy was changed
## EventCodes 4912, 807
[windows_audit_policy_changed_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4912 OR EventCode=807)
#tags = policy configuration modify audit change

## The following policy was active when the Windows Firewall started
## EventCodes 848, 849, 850
[windows_firewall_policy_active_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=848 OR EventCode=849 OR EventCode=850)
#tags = application firewall configuration report

## A change has been made to Windows Firewall
## EventCodes 4946, 4947, 4948, 851, 852
[windows_firewall_policy_change_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4946 OR EventCode=4947 OR EventCode=4948 OR EventCode=851 OR EventCode=852)
#tags = application firewall configuration modify

## The Windows Firewall has detected an application listening for incoming traffic
## EventCodes 4957, 861
[windows_firewall_port_listening_stackdriver]
search = eventtype=wineventlog_security_stackdriver (EventCode=4957 OR EventCode=861)
#tags = application firewall port listening report


