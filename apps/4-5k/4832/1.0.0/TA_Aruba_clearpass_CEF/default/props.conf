[aruba:clearpass:CEF]
BREAK_ONLY_BEFORE_DATE = true
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = true
TIME_PREFIX = \<\d*\>
category = Custom
description = Aruba clearpass
disabled = false
pulldown_type = true
EXTRACT-vendor,vendor_product,version,External_EventID,category,severity = CEF\:.\|(?<vendor>[^\|]*)\|(?<vendor_product>[^\|]*)\|(?<version>[^\|]*)\|(?<External_EventID>[^\|]*)\|(?<category>[^\|]*)\|(?<severity>[^\|]*)\|
EXTRACT-vendor_action = (?:act\=|outcome\=|ArubaClearpassAuthAuthStatus\=)\s*(?<vendor_action>.*?)\s*\w*\=
EXTRACT-app = (?:deviceProcessName\=|destinationServiceName\=)\s*(?<app>.*?)\s*\w*\=
EXTRACT-dest_privileges = dpriv\=\s*(?<dest_privileges>.*?)\s*\w*\=
EXTRACT-error_code = c.\d\=(?<error_code>\d*)\s*cn.Label\=Error\s*Code
EXTRACT-log_category = cat\=\s*(?<log_category>\w*)
EXTRACT-authentication_protocol = c.\d\=(?<authentication_protocol>\w*)\s*c.\dLabel\=Authentication\s*Protocol
EXTRACT-login_status = c.\d\=(?<login_status>\w*)\s*c.\dLabel\=Login\s*Status
EXTRACT-user = (?:duser\=|ArubaClearpassAuthAuthUsername\=|User:)\s*(?<user>.*?)(?:\s*\w*\=|\\)
LOOKUP-error_code_radi = radius_error_code error_code OUTPUT error_group_id error_code_str action
REPORT-cn_aruba = cn_tra
EVAL-error_code = coalesce(ArubaClearpassCppmErrorCodeErrorCode,error_code)
EVAL-action = case((isnull(action) AND category="Logged in"), "success", (isnull(action) AND category="Login Failed"), "failed", isnotnull(action), action)
EXTRACT-message = (?:reason\=|msg\=|ArubaClearpassCppmAlertAlerts\=)\s*(?<message>.*?)\s*(?:rt\=|$|ArubaC)
EXTRACT-dest_aruba = dst\=(?<dest>[^\s]*)
EVAL-signature_id = External_EventID
EVAL-signature = category
REPORT-colon_value = aruba_colon
EVAL-src = coalesce(src, 'Client IP Address')
EVAL-duration = coalesce(duration, 'Session Inactive Expiry Time')
EVAL-dest = coalesce(dest, dvc)
EXTRACT-src_user = User:\s(?<src_user>[^\\]*)
EVAL-src_ip = coalesce(src, 'Client IP Address')
EVAL-dest_ip = coalesce(dest, dvc)
EVAL-app = coalesce(app, "ClearPass")
EVAL-dest_mac = dmac
EVAL-bytes_in = in
EVAL-bytes_out = in
EVAL-protocol = coalesce(protocol, 'Port Type', authentication_protocol)
EVAL-session_id = coalesce(session_id, 'Session Id')
