## DO NOT CHANGE SETTINGS HERE - copy file to local/ first ##
[settings]
index = main
incident_list_length = 10
default_owner = unassigned
default_severity = high
default_urgency = high
default_priority = high
user_directories = both
collect_data_results = true
index_data_results = true
auto_close_info = false
auto_close_info_status = auto_info_resolved

[logging]
rootLevel = INFO
logger.skylight_security_for_splunk = INFO
logger.skylight_security_for_splunk_controllers = INFO
logger.skylight_security_for_splunk_eventhandler = INFO
logger.skylight_security_for_splunk_notifications = INFO
logger.skylight_security_for_splunk_suppression_helper = INFO
logger.skylight_security_for_splunk_rest_handler = INFO
