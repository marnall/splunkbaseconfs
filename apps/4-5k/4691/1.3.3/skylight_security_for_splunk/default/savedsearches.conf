[DNS beaconing detection by time]
action.skylight_security_for_splunk = 1
action.skylight_security_for_splunk.param.severity = high
action.skylight_security_for_splunk.param.title = DNS beaconing detection by time
alert.digest_mode = 0
alert.severity = 4
alert.suppress = 1
alert.suppress.fields = Source, Destiantion
alert.suppress.period = 24h
alert.track = 1
counttype = number of events
cron_schedule = 55 */2 * * *
description = Beaconing to Rare Destination could point that compromised host initiates regular interval beaconing calls out to the C2 infrastructure to await further installation or to begin data exfiltration.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.type = mapping
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = skylight_security_for_splunk
request.ui_dispatch_view = search
disabled = 1
search = index=pvx source=skylight_dns query!="*.local" query="*.*"\
| sort 0 _time\
| streamstats current=f last(_time) as prevtime by src_ip, query, query_type\
| eval timedelta = _time - prevtime\
| search timedelta > 0\
| eventstats count as total by src_ip, query, query_type\
| stats count as ModeCount, min(_time) as _time, values(app) as app by src_ip, dest_ip, query, query_type, timedelta, total, host\
| eval prcnt = (ModeCount/total)*100\
| where prcnt > 80 AND ModeCount > 100\
| rename prcnt AS Percentage, total AS Total, timedelta as TimeDelta\
| table _time, src_ip, dest_ip, query, query_type, Percentage, TimeDelta, Total, host\
| eval ruleName="DNS beaconing detection by time" \
| eval alert_type="Network" \
| eval pvx_alert=1 \
| eval severity="High" \
| eval ruleDescription="Beaconing to Rare Destination could point that compromised host initiates regular interval beaconing calls out to the C2 infrastructure to await further installation or to begin data exfiltration."\
| rename src_ip AS Source, dest_ip AS Destination\
| eval source_all = "*"\
| eval dest_all = "*"\
| join type=left Source [| inputlookup white_list_ip.csv | search "Rule name"="DNS beaconing detection by time" OR "Rule name"="All alerts" | eval wl_source="true" | fields Source, wl_source]\
| join type=left Destination [| inputlookup white_list_ip.csv | search "Rule name"="DNS beaconing detection by time" OR "Rule name"="All alerts" | eval wl_dest="true" | fields Destination, wl_dest]\
| join type=left source_all [| inputlookup white_list_ip.csv | search "Rule name"="DNS beaconing detection by time" OR "Rule name"="All alerts" | eval wla_source="true" | rename Source as source_all | fields source_all, wla_source]\
| join type=left dest_all [| inputlookup white_list_ip.csv | search "Rule name"="DNS beaconing detection by time" OR "Rule name"="All alerts" | eval wla_dest="true" | rename Destination as dest_all | fields dest_all, wla_dest]\
`whitelist`\
| eval killchain="CommandAndControl" \
| join type=left Source \
    [ search index="pvx_win" user!="ANONYMOUS LOGON" \
    | rex field=user "(?<user_name>^((?!\$)[\w\-\ \d])+$)" \
    | where isnotnull(user_name) AND _time>=relative_time(now(), "-1d@d") \
    | stats latest(user_name) as UserName by src_ip, Workstation_Name \
    | rename src_ip AS "Source"]

