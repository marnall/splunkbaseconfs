| join type=left dest_all [| inputlookup white_list_ip.csv | search "Rule name"="Possible Data Exfiltration" OR "Rule name"="All alerts" | eval wla_dest="true" | rename Destination as dest_all | fields dest_all, wla_dest]\
`whitelist`\
| eval alert_type="Network"  \
| eval severity="High"  \
| eval pvx_alert=1\
| eval ruleName="Possible Data Exfiltration"\
| eval ruleDescription="Outbound traffic amount to specific external host takes more than 90% of total outbound traffic by source." \
| eval killchain="ActionsAndObjectives" \
| join type=left Source \
 [ search index="pvx_win" Logon_Type=3 user!="ANONYMOUS LOGON"  \
 | rex field=user "(?<user_name>^((?!\$)[\w\-\ \d])+$)"\
 | where isnotnull(user_name) AND _time>=relative_time(now(), "-1d@d")  \
 | stats latest(user_name) as user_name by src_ip \
 | rename src_ip AS "Source"] \
| eval user_name=if(isnotnull(user_name), user_name, "User not identified")

