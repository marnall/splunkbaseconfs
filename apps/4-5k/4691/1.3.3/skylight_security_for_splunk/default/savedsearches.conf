[Rare User Agent strings]
action.skylight_security_for_splunk = 1
action.skylight_security_for_splunk.param.severity = low
action.skylight_security_for_splunk.param.title = Rare User Agent Strings
alert.digest_mode = 0
alert.severity = 2
alert.suppress = 1
alert.suppress.fields = _time, Source, Destination
alert.suppress.period = 24h
alert.track = 1
counttype = number of events
cron_schedule = */60 * * * *
description = Rare user agents in all network traffic.
dispatch.earliest_time = -65m@m
dispatch.latest_time = -5m@m
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = skylight_security_for_splunk
request.ui_dispatch_view = search
disabled = 1
search = | tstats summariesonly=t count from datamodel=Skylight_Network_Traffic.all where nodename=all.http by all.time, all.src_ip, all.dest_ip, all.url, all.http_user_agent, all.dest_port, all.app, host\
| `drop_dm_object_name("all")`\
| search http_user_agent!=null\
| rare http_user_agent\
| where percent < 0.1\
| fields http_user_agent, count, percent, time, src_ip, dest_ip, host\
| join type=left http_user_agent [ tstats summariesonly=t count from datamodel=Skylight_Network_Traffic.all where nodename=all.http NOT (all.src_ip=127.0.0.1) by all.time, all.src_ip, all.dest_ip, all.url, all.http_user_agent, host\
 | `drop_dm_object_name("all")` | rename time as  _time | stats latest(_time) as time, first(url) as URI, first(src_ip) as src_ip, first(dest_ip) as dest_ip by http_user_agent, host]\
| rename src_ip AS Source, dest_ip AS Destination, time as _time\
| eval source_all = "*"\
| eval dest_all = "*"\
| join type=left Source [| inputlookup white_list_ip.csv | search "Rule name"="Rare User Agent strings" OR "Rule name"="All alerts" | eval wl_source="true" | fields Source, wl_source]\
| join type=left Destination [| inputlookup white_list_ip.csv | search "Rule name"="Rare User Agent strings" OR "Rule name"="All alerts" | eval wl_dest="true" | fields Destination, wl_dest]\
| join type=left source_all [| inputlookup white_list_ip.csv | search "Rule name"="Rare User Agent strings" OR "Rule name"="All alerts" | eval wla_source="true" | rename Source as source_all | fields source_all, wla_source]\
| join type=left dest_all [| inputlookup white_list_ip.csv | search "Rule name"="Rare User Agent strings" OR "Rule name"="All alerts" | eval wla_dest="true" | rename Destination as dest_all | fields dest_all, wla_dest]\
`whitelist`\
| eval alert_type="Web" \
| eval pvx_alert=1 \
| eval severity="Low" \
| eval ruleName="Rare User Agent strings" \
| eval ruleDescription="Rare user agents in all network traffic."\
| eval killchain="CommandAndControl"\
| join type=left Source \
 [ search index="pvx_win" user!="ANONYMOUS LOGON" \
 | rex field=user "(?<user_name>^((?!\$)[\w\-\ \d])+$)" \
 | where isnotnull(user_name) AND _time>=relative_time(now(), "-1d@d") \
 | stats latest(user_name) as UserName by src_ip, Workstation_Name \
 | rename src_ip AS "Source"]\
| eval user_name=if(isnotnull(user_name), user_name, "User not identified")

