dispatch.earliest_time = -17m@m
dispatch.latest_time = -1m@m
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = skylight_security_for_splunk
request.ui_dispatch_view = search
display.general.type = statistics
display.page.search.tab = statistics
disabled = 1
search = | tstats summariesonly=t count, values(all.query) as "Destination", latest(all.time) as _time  from datamodel=Skylight_Network_Traffic.all where nodename=all.dns all.reply_code!="No Error" all.reply_code!="NoError" all.reply_code!="unknown"  all.query="*.*" NOT (all.query="*.arpa" OR `query_local`) by all.src_ip, host\
| rename all.src_ip as "Source"\
| eval source_all = "*"\
| eval dest_all = "*"\
| join type=left Source [| inputlookup white_list_ip.csv | search "Rule name"="Excessive failed DNS Requests" OR "Rule name"="All alerts" | eval wl_source="true" | fields Source, wl_source]\
| join type=left Destination [| inputlookup white_list_ip.csv | search "Rule name"="Excessive failed DNS Requests" OR "Rule name"="All alerts" | eval wl_dest="true" | fields Destination, wl_dest]\
| join type=left source_all [| inputlookup white_list_ip.csv | search "Rule name"="Excessive failed DNS Requests" OR "Rule name"="All alerts" | eval wla_source="true" | rename Source as source_all | fields source_all, wla_source]\
| join type=left dest_all [| inputlookup white_list_ip.csv | search "Rule name"="Excessive failed DNS Requests" OR "Rule name"="All alerts" | eval wla_dest="true" | rename Destination as dest_all | fields dest_all, wla_dest]\
`whitelist`\
| lookup update=true top-1m Domain as query OUTPUT Rank \
| where isnull(rank)\
| where count>50\
| eval dest_port = 53\
| eval app="dns"\
| eval alert_type="Network" \
| eval pvx_alert=1 \
| eval ruleName="Excessive failed DNS Requests" \
| eval ruleDescription="This rule identifies DNS query failures by counting the number of DNS responses that do not indicate success, and trigger on more than 50 occurrences." \
| eval severity="Low"\
