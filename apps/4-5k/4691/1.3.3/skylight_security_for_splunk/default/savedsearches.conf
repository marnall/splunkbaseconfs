| `drop_dm_object_name(all)` \
| join type=left dcerpc [ | inputlookup suspicious_dcerpc.csv | rename DCERPC as dcerpc] \
| search Operation=* AND Operation!="Microsoft Local Security Authority Remote Protocol - lsarpc Interface" \
| rename time as _time, src_ip as Source, dest_ip as Destination\
| table _time, Source, Destination, dest_port, Operation, host\
| eval ruleName="Suspicious DCE/RPC calls" \
| eval alert_type="Network" \
| eval pvx_alert=1 \
| eval severity="Medium" \
| eval ruleDescription="Detect Lateral Movement techniques which communicate over DCE/RPC."\
| eval source_all = "*"\
| eval dest_all = "*"\
| join type=left Source [| inputlookup white_list_ip.csv | search "Rule name"="Suspicious DCE/RPC calls" OR "Rule name"="All alerts" | eval wl_source="true" | fields Source, wl_source]\
| join type=left Destination [| inputlookup white_list_ip.csv | search "Rule name"="Suspicious DCE/RPC calls" OR "Rule name"="All alerts" | eval wl_dest="true" | fields Destination, wl_dest]\
| join type=left source_all [| inputlookup white_list_ip.csv | search "Rule name"="Suspicious DCE/RPC calls" OR "Rule name"="All alerts" | eval wla_source="true" | rename Source as source_all | fields source_all, wla_source]\
| join type=left dest_all [| inputlookup white_list_ip.csv | search "Rule name"="Suspicious DCE/RPC calls" OR "Rule name"="All alerts" | eval wla_dest="true" | rename Destination as dest_all | fields dest_all, wla_dest]\
`whitelist`\
| eval killchain="ActionsAndObjectives" \
| join type=left Source \
    [ search index="pvx_win" user!="ANONYMOUS LOGON" \
    | rex field=user "(?<user_name>^((?!\$)[\w\-\ \d])+$)" \
    | where isnotnull(user_name) AND _time>=relative_time(now(), "-1d@d") \
    | stats latest(user_name) as UserName by src_ip, Workstation_Name \
    | rename src_ip AS "Source"] \
| eval user_name=if(isnotnull(user_name), user_name, "User not identified")

