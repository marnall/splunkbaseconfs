dispatch.earliest_time = -65m@m
dispatch.latest_time = -5m@m
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = skylight_security_for_splunk
request.ui_dispatch_view = search
disabled = 1
search = | tstats summariesonly=true count, values(all.dest_port) as dest_port from datamodel=Skylight_Network_Traffic.all where NOT  (`multicast_ip_range_src` OR `multicast_ip_range_dest` OR `internal_dest` OR all.dest_ip=127.0.0.1) by all.src_ip, all.dest_ip, all.time, all.bytes_out, all.bytes_in, all.app, host\
| `drop_dm_object_name("all")`\
| rename time as _time\
| eventstats sum(bytes_out) AS total_bytes_out by src_ip  \
| eval percent_bytes_out = bytes_out/total_bytes_out * 100 \
| table src_ip dest_ip bytes_in bytes_out total_bytes_out percent_bytes_out _time, app, dest_port, host\
| where percent_bytes_out > 80  \
| sort - percent_bytes_out dest  \
| rename src_ip AS Source, dest_ip AS Destination, total_bytes_out AS "Total Bytes out", percent_bytes_out AS "Percent Bytes out"\
| eval source_all = "*"\
| eval dest_all = "*"\
| join type=left Source [| inputlookup white_list_ip.csv | search "Rule name"="Possible Data Exfiltration" OR "Rule name"="All alerts" | eval wl_source="true" | fields Source, wl_source]\
| join type=left Destination [| inputlookup white_list_ip.csv | search "Rule name"="Possible Data Exfiltration" OR "Rule name"="All alerts" | eval wl_dest="true" | fields Destination, wl_dest]\
