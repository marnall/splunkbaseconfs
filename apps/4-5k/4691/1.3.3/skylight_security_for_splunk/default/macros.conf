[alert_severity]
definition = | lookup alerts_severity rulename AS ruleName OUTPUT probability \
| lookup assets IP AS Source OUTPUT Priority as priority_src\
| lookup assets IP AS Destination OUTPUT Priority as priority_dest\
| eval asset_severity_src = if(priority_src="Low", 2, if(priority_src="Medium", 3, if(priority_src="High", 4, if(priority_src="Critical", 5, 3))))\
| eval asset_severity_dest = if(priority_dest="Low", 2, if(priority_dest="Medium", 3, if(priority_dest="High", 4, if(priority_dest="Critical", 5, 3))))\
| eval asset_severity = if(asset_severity_src>=asset_severity_dest, asset_severity_src, asset_severity_dest)\
| eval severity_score=(probability*asset_severity)/5*5 \
| eval severity = if(severity_score<=10, "Low", if(severity_score>=11 AND severity_score<=15, "Medium", if(severity_score>=16 AND severity_score<=20, "High", if(severity_score>=21, "Critical", "Medium")))) \
| fields - severity_score, asset_severity, priority, probability, asset_severity_dest, asset_severity_src, priority_src, priority_dest
iseval = 0

