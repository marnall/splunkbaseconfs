[sqlinjection_pattern(2)]
args = sourcetype, uri_query_field
definition = | rex field=$uri_query_field$ "(?<injection>(?i)select.*?from|union.*?select|\\'$|delete.*?from|update\\W.*?set|alter.*?table|(\'|\"|\`|\%27|\%22)(\s|\+)*or(\s|\+)*(\'|\"|\`|\%27|\%22|\d)|group.*by|(?i):sleep\\(\\s*?\\d*?\\s*?\\)|benchmark\\(.*?\\,.*?\\)|(?i):[\\s()]case\\s*?\\(|\\)\\s*?like\\s*?\\(|having\\s*?[^\\s]+\\s*?[^\\w\\s]|if\\s?\\([\\d\\w]\\s*?[=<>~]\\)|\\\\.\\\\.sysdatabases|(?:\\[\\$(?:ne|eq|lte?|gte?|n?in|mod|all|size|exists|type|slice|x?or|div|like|between|and)\\]))|(?:create\\s+(?:procedure|function)\\s*?\\w+\\s*?\\(\\s*?\\)\\s*?-|;\\s*?(?:declare|open)\\s+[\\w-]+|procedure\\s+analyse\\s*?\\(|declare[^\\w]+[@#]\\s*?\\w+|exec\\s*?\\(\\s*?\\@\\)\\))"\
|search injection=*
iseval = 0

[sqlinjection_stats(2)]
args = sourcetype, uri_query_field
definition = sourcetype="$sourcetype$"|eval len=len($uri_query_field$)\
|eventstats avg(len) as avg stdev(len) as stdev\
|where len>(3*stdev+avg)\
|rex field=$uri_query_field$ "(?<injection>(?i)select.*?from|union.*?select|\'$|delete.*?from|update\W.*?set|alter.*?table|((\'|\')*(\ )*=(\ )*(\'|\'|\`).*?)|=(\'|\').*?or|group.by)" |search injection=*
iseval = 0
