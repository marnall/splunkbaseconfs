[crestron:am:syslog]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\n\r]+)\d{2}-\d{2} \d{2}:\d{2}:\d{2}
TRUNCATE = 9999
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 25
TIME_FORMAT = %m-%d %H:%M:%S.%3N

EXTRACT-crestron_am_syslog_1 = \d+-\d+ \d+:\d+:\d+\.\d+ (?<process>[^\(]+)\([\s\d]+\):\s+(?<message>.*)

[crestron:dmps:syslog]
SHOULD_LINEMERGE = false
LINE_BREAKER = (<\d+>)\w{3}\s+\d{2} \d{2}:\d{2}:\d{2}
TRUNCATE = 9999
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 35
TIME_FORMAT = %b %e %H:%M:%S %Y

EXTRACT-crestron_dmps_syslog_1 = .*(?<device_type>DMPS[^ ]+) (?<component>\w+) - - (?<priority>\w+): (?<message>.*)
EXTRACT-crestron_dmps_syslog_2 = .*(?<device_type>DMPS[^ ]+) - - - .* EVENT: (?<event_type>[\w]+)\s+(?<message>.*)

[crestron:tp:syslog]
SHOULD_LINEMERGE = false
LINE_BREAKER = \w{3}\s{1,2}[0-9]{1,2}\s\d{2}:\d{2}:\d{2}
TRUNCATE = 9999
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 50
#2019-03-07T10:18:00.123043
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%5N

EXTRACT-crestron_tp_syslog_1 = \d+-\d+ \d+:\d+:\d+\.\d+ (?<process>[^\(]+)\([\s\d]+\):\s+(?<message>.*)

[dsp:weblog]
BREAK_ONLY_BEFORE_DATE = true
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 1024
SHOULD_LINEMERGE = true

FIELDALIAS-IP_LAN_B = host as IP_LAN_B
LOOKUP-dsp_location_info = dsp_location_info_lookup IP_LAN_B OUTPUT Room, Building, IP_LAN_A
EXTRACT-dsp_message_type = runtime_engine: (?<message_type>\w+)[^a-z]+(?<messsage_details>.*)

