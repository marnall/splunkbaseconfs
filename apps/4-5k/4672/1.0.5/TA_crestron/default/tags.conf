## CIM tag mappings for Crestron telemetry events
##
## Bind eventtypes to the Splunk Common Information Model Performance data
## model. Tag combinations follow the CIM 5.x Performance schema:
##   - cpu     events:    tag=performance tag=cpu
##   - memory  events:    tag=performance tag=memory
##   - ping    events:    tag=performance tag=network tag=ping
##
## CIM reference: Splunk_SA_CIM Performance data model (Apache 2.0).

[eventtype=crestron_performance]
performance = enabled

[eventtype=crestron_performance_cpu]
performance = enabled
cpu = enabled

[eventtype=crestron_performance_memory]
performance = enabled
memory = enabled

[eventtype=crestron_performance_network_ping]
performance = enabled
network = enabled
ping = enabled
