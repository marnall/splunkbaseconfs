## Crestron sourcetype parsing + CIM Performance field aliases.
##
## CIM Performance reference fields (from Splunk_SA_CIM 5.x):
##   dest                - device name / hostname
##   mem_used, mem_total - memory in MB (CIM uses MB consistently)
##   mem_used_percent    - calculated: mem_used*100/mem_total
##   cpu_load_percent    - CPU load 0-100
##
## Crestron Fusion public-API attribute names referenced below are taken from
## the Crestron Fusion API field documentation (DeviceName, RoomName,
## ProcessorLoad, MemoryUsage, MemoryTotal, MemoryFree, OnlineStatus,
## PingStatus). EXTRACT lines for those native-name fields are intentionally
## left to the existing line-level EXTRACT-* rules and to props.conf changes
## that downstream operators will tune to their syslog format.

[crestron:am:syslog]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\n\r]+)\d{2}-\d{2} \d{2}:\d{2}:\d{2}
TRUNCATE = 9999
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 25
TIME_FORMAT = %m-%d %H:%M:%S.%3N

EXTRACT-crestron_am_syslog_1 = \d+-\d+ \d+:\d+:\d+\.\d+ (?<process>[^\(]+)\([\s\d]+\):\s+(?<message>.*)

# CIM Performance field aliases (Crestron Fusion -> CIM)
FIELDALIAS-crestron_am_dest = DeviceName AS dest
FIELDALIAS-crestron_am_dest_room = RoomName AS dest_room
FIELDALIAS-crestron_am_cpu = ProcessorLoad AS cpu_load_percent
FIELDALIAS-crestron_am_mem_used = MemoryUsage AS mem_used
FIELDALIAS-crestron_am_mem_total = MemoryTotal AS mem_total
FIELDALIAS-crestron_am_mem_free = MemoryFree AS mem_free
EVAL-mem_used_percent = if(isnum(mem_used) AND isnum(mem_total) AND mem_total>0, round(mem_used*100/mem_total, 2), null())

[crestron:dmps:syslog]
SHOULD_LINEMERGE = false
LINE_BREAKER = (<\d+>)\w{3}\s+\d{2} \d{2}:\d{2}:\d{2}
TRUNCATE = 9999
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 35
TIME_FORMAT = %b %e %H:%M:%S %Y

EXTRACT-crestron_dmps_syslog_1 = .*(?<device_type>DMPS[^ ]+) (?<component>\w+) - - (?<priority>\w+): (?<message>.*)
EXTRACT-crestron_dmps_syslog_2 = .*(?<device_type>DMPS[^ ]+) - - - .* EVENT: (?<event_type>[\w]+)\s+(?<message>.*)

# CIM Performance field aliases (Crestron Fusion -> CIM)
FIELDALIAS-crestron_dmps_dest = DeviceName AS dest
FIELDALIAS-crestron_dmps_dest_room = RoomName AS dest_room
FIELDALIAS-crestron_dmps_cpu = ProcessorLoad AS cpu_load_percent
FIELDALIAS-crestron_dmps_mem_used = MemoryUsage AS mem_used
FIELDALIAS-crestron_dmps_mem_total = MemoryTotal AS mem_total
FIELDALIAS-crestron_dmps_mem_free = MemoryFree AS mem_free
EVAL-mem_used_percent = if(isnum(mem_used) AND isnum(mem_total) AND mem_total>0, round(mem_used*100/mem_total, 2), null())

[crestron:tp:syslog]
SHOULD_LINEMERGE = false
LINE_BREAKER = \w{3}\s{1,2}[0-9]{1,2}\s\d{2}:\d{2}:\d{2}
TRUNCATE = 9999
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 50
#2019-03-07T10:18:00.123043
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%5N

EXTRACT-crestron_tp_syslog_1 = \d+-\d+ \d+:\d+:\d+\.\d+ (?<process>[^\(]+)\([\s\d]+\):\s+(?<message>.*)

# CIM Performance field aliases (Crestron Fusion -> CIM)
FIELDALIAS-crestron_tp_dest = DeviceName AS dest
FIELDALIAS-crestron_tp_dest_room = RoomName AS dest_room
FIELDALIAS-crestron_tp_cpu = ProcessorLoad AS cpu_load_percent
FIELDALIAS-crestron_tp_mem_used = MemoryUsage AS mem_used
FIELDALIAS-crestron_tp_mem_total = MemoryTotal AS mem_total
FIELDALIAS-crestron_tp_mem_free = MemoryFree AS mem_free
EVAL-mem_used_percent = if(isnum(mem_used) AND isnum(mem_total) AND mem_total>0, round(mem_used*100/mem_total, 2), null())

[crestron:scheduler:syslog]
# CIM Performance field aliases (Crestron Fusion -> CIM)
FIELDALIAS-crestron_sched_dest = DeviceName AS dest
FIELDALIAS-crestron_sched_dest_room = RoomName AS dest_room

[crestron:scheduler:exchangeapi:syslog]
# CIM Performance field aliases (Crestron Fusion -> CIM)
FIELDALIAS-crestron_sched_exchange_dest = DeviceName AS dest
FIELDALIAS-crestron_sched_exchange_dest_room = RoomName AS dest_room

[crestron:scheduler:webview:syslog]
# CIM Performance field aliases (Crestron Fusion -> CIM)
FIELDALIAS-crestron_sched_webview_dest = DeviceName AS dest
FIELDALIAS-crestron_sched_webview_dest_room = RoomName AS dest_room

[dsp:weblog]
BREAK_ONLY_BEFORE_DATE = true
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 1024
SHOULD_LINEMERGE = true

FIELDALIAS-IP_LAN_B = host as IP_LAN_B
LOOKUP-dsp_location_info = dsp_location_info_lookup IP_LAN_B OUTPUT Room, Building, IP_LAN_A
EXTRACT-dsp_message_type = runtime_engine: (?<message_type>\w+)[^a-z]+(?<messsage_details>.*)

# CIM Performance field aliases (DSP -> CIM)
FIELDALIAS-dsp_dest = host AS dest
FIELDALIAS-dsp_dest_room = Room AS dest_room
