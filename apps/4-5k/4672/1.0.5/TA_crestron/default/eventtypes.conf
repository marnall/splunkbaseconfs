## Eventtypes for CIM Performance data model
##
## These eventtypes are search-filters over the Crestron sourcetypes defined in
## inputs.conf / props.conf. They are used by tags.conf to attach the CIM tags
## that bind events into the Performance data model:
##   - cpu        -> All_Performance.CPU
##   - memory     -> All_Performance.Memory
##   - network    -> All_Performance.Network (ping response branch)
##
## Event filters use case-insensitive raw-text matches that align with the
## telemetry keywords Crestron devices emit in syslog (CPU/processor load,
## memory usage/free/total, ping/online status). Adjust to match site-specific
## syslog patterns as needed.

[crestron_performance]
search = (sourcetype=crestron:am:syslog OR sourcetype=crestron:dmps:syslog OR sourcetype=crestron:tp:syslog OR sourcetype=crestron:scheduler:syslog OR sourcetype=crestron:scheduler:exchangeapi:syslog OR sourcetype=crestron:scheduler:webview:syslog OR sourcetype=dsp:weblog)
#tags = performance

[crestron_performance_cpu]
search = (sourcetype=crestron:am:syslog OR sourcetype=crestron:dmps:syslog OR sourcetype=crestron:tp:syslog) ("CPU" OR "cpu_load" OR "Processor" OR "ProcessorLoad")
#tags = performance cpu

[crestron_performance_memory]
search = (sourcetype=crestron:am:syslog OR sourcetype=crestron:dmps:syslog OR sourcetype=crestron:tp:syslog) ("Memory" OR "MemUsed" OR "MemoryUsage" OR "MemoryFree" OR "MemoryTotal" OR "RAM")
#tags = performance memory

[crestron_performance_network_ping]
search = (sourcetype=crestron:am:syslog OR sourcetype=crestron:dmps:syslog OR sourcetype=crestron:tp:syslog OR sourcetype=crestron:scheduler:syslog) ("Ping" OR "PingStatus" OR "OnlineStatus" OR "ICMP" OR "ping_response" OR "reachable")
#tags = performance network ping
