#------------------------------------------------------------------------------#
# Relevant Searches                                                            #
#------------------------------------------------------------------------------#
#
#-- General Information ------------------------------------------------------
[cave_dt_core]
 filename    = cave_dt_core.csv
 fields_list = cave_search,label,about,icon,smith
 max_matches = 1
 min_matches = 0
 replicate   = true
#-----------------------------------------------------------------------------
#
#-- Example Data -------------------------------------------------------------
[cave_dt_examples]
 filename    = cave_dt_examples.csv
 fields_list = type,value
 max_matches = 1
 min_matches = 0
 replicate   = true
#-----------------------------------------------------------------------------
#
#------------------------------------------------------------------------------#


