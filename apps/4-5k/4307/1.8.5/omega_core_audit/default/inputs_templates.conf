##
## Omega Core Audit Ap for Splunk - Input Templates for TCP and Splunk DB Connect
##

## Input Template for Splunk TCP Data Input
## Set the TCP port the same as set in Omega Core Audit LMS module

[tcp://50001]
connection_host = none
sourcetype = omega_ca_st
index = omega_ca

## Input Template for Splunk DB Connect
## Replace default values of LMS_DB_NAME and LMS_DB_FULL_NAME fields with values of your DB common short and full names

[omega_dbx_input]
description = Collect Omega Core Audit security events
interval = 60
mode = rising

query = SELECT * FROM ( \
SELECT \
TIMESTAMP_UTC, \
TIMESTAMP_STS, \
TIMESTAMP_INS, \
'OraDB' as LMS_DB_NAME, \
'Oracle DB' as LMS_DB_FULL_NAME, \
SYS_CONTEXT('USERENV', 'SERVER_HOST') as LMS_DB_HOST, \
POLICY_TYPE_ID, \
POLICY_TYPE_CODE, \
POLICY_TYPE_NAME, \
USERNAME, \
SESSIONID, \
OS_USER, \
USERHOST, \
ACTION_ID, \
ACTION_NAME, \
OBJECT_OWNER, \
OBJECT_NAME, \
OBJECT_TYPE, \
PRIVILEGE_ID, \
SYSTEM_PRIVILEGE, \
NEW_OWNER, \
NEW_NAME, \
AUTH_PRIVILEGES, \
OBJ_PRIVILEGE, \
LOGOFF_DEAD, \
SYS_PRIVILEGE, \
ADMIN_OPTION, \
GRANTEE, \
AUDIT_OPTION, \
SES_ACTIONS, \
LOGOFF_TIME, \
LOGOFF_LREAD, \
LOGOFF_PREAD, \
LOGOFF_LWRITE, \
LOGOFF_DLOCK, \
CLIENT_ID, \
TERMINAL, \
IP_ADDRESS, \
NETWORK_PROTOCOL, \
NETWORK_PORT, \
DBID, \
DB_NAME, \
INSTANCE_NUMBER, \
STATEMENTID, \
ENTRYID, \
TRANSACTIONID, \
SCN, \
PROXY_SESSIONID, \
GLOBAL_UID, \
ECONTEXT_ID, \
COMMENT_TEXT, \
OS_PROCESS, \
SESSIONCPU, \
AUTHENTICATION_METHOD, \
IDENTIFICATION_TYPE, \
ISDBA, \
MODULE, \
BG_JOB_ID, \
FG_JOB_ID, \
RETURNCODE, \
RETURN_MESSAGE, \
FGA_POLICY_NAME, \
EXT_NAME, \
OBJ_EDITION, \
CURRENT_USER, \
SEO_SEC, \
SEO_ACC, \
SEO_ORA, \
SEO_DDL, \
SEO_DML, \
SEO_SE, \
SEO_ERR, \
SEO_APP, \
SEO_CURR_USER, \
SQL_BIND, \
SQL_TEXT, \
DDL_BODY, \
TRAIL_EVAL \
FROM OMEGACA.V_SYS_UNF_TRAIL_LMS ) \
WHERE TIMESTAMP_INS > ? \
ORDER BY TIMESTAMP_INS ASC
rising_column_index = 3
index_time_mode = dbColumn
input_timestamp_column_index = 1
sourcetype = omega_ca_dbx
index = omega_ca
