NETWORK_PROTOCOL as "Net. Prot.", NETWORK_PORT  as "Net. Port", SYSTEM_PRIVILEGE as "System Privilege", ISDBA as IsDBA, MODULE as Module, \
BG_JOB_ID as "Bg. Job Id.", RETURNCODE as ReturnCode, RETURN_MESSAGE as "Return Message", CURRENT_USER as "Current User"
