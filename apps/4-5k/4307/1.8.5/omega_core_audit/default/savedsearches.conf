[Access]
dispatch.latest_time = now
description = Access
display.events.type = table
dispatch.earliest_time = -24h@h
search = `mc_unf_md_rep` | search SEO_ACC=1\
| table _time, LMS_DB_NAME, LMS_DB_HOST, USERNAME, SESSIONID, POLICY_TYPE_CODE, ACTION_NAME, USERHOST, OS_USER, TERMINAL, \
IP_ADDRESS, NETWORK_PROTOCOL, NETWORK_PORT, SYSTEM_PRIVILEGE, ISDBA, MODULE, BG_JOB_ID, RETURNCODE, RETURN_MESSAGE, CURRENT_USER\
| rename LMS_DB_NAME as Database, LMS_DB_HOST as "DB Host", USERNAME as Username, SESSIONID as "Session Id", POLICY_TYPE_CODE as "Pol. Type", \
