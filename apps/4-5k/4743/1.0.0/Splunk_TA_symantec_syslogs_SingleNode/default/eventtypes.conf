
[SEP_Agent_Behavior_blocked]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Behavior_logs) "Device ID:" vendor_action=blocked

[SEP_Agent_risk_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Risk_logs) Confidence: NOT "COH Engine Version:"

[SEP_Agent_risk_logs_alert_virus]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Risk_logs) Confidence: NOT "COH Engine Version:" Risk_Action = "Virus found"

[SEP_Agent_Security_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Security_logs)Ā "Intrusion URL:"

[SEP_Agent_Behavior_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Behavior_logs) "Device ID:"

[SEP_Agent_Scan_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Scan_logs) "Scan ID:"

[SEP_Agent_Scan_started]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Scan_logs) "Scan ID:" Status=Started

[SEP_Agent_Scan_completed]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Scan_logs) "Scan ID:" Status=Completed

[SEP_Agent_Scan_cancelled]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Scan_logs) "Scan ID:" Status=Cancelled

[SEP_Agent_Scan_infections_found]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Scan_logs) "Scan ID:" Infected_Files!=0

[SEP_Agent_Activity_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Activity_logs)  site: server: Domain: NOT (Occurrences: OR Admin:)

[SEP_proactive_risk_found]
search = index=* (sourcetype=symantec:ep:syslog sourcetype=symantec_ep_Agnt_Proactive_Detection_logs) Confidence: "COH Engine Version:" "Potential risk found"

[SEP_Agent_proactive_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agnt_Proactive_Detection_logs) Confidence: "COH Engine Version:"

[SEP_Agent_Packet_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Packet_logs) Traffic_Direction=* application: NOT MD-5

[SEP_Agent_traffic_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Traffic_logs) Traffic_Direction=* rule:
#network communicate

[SEP_traffic_ids]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_Traffic_logs) rule: Traffic_Direction=Inbound vendor_action=blocked
#ids attack

[SEP_Agent_System_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Agent_System_logs) Category:

[SEP_System_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_System_logs)  site: server: NOT Domain:

[SEP_Policy_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_Policy_logs) admin: policy

[SEP_server_admin_logs]
search = index=* (sourcetype=symantec:ep:syslog OR sourcetype=symantec_ep_server_admin_logs) admin: NOT policy
