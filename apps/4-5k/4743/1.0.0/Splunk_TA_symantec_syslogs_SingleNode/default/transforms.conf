[set_Agent_Behavior_logs]
REGEX = .*Device\s*ID:.*
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_Agent_Behavior_logs

[set_Agent_Scan_logs]
REGEX = .*Scan\sID:\s+.*
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_Agent_Scan_logs


[set_Agent_Activity_logs]
REGEX = [Ss]ite:[^,]*,[Ss]erver:[^,]*,Domain:\s[^,]*,[^,]*,[^,]*,[^,]*,[^,]*$
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_Agent_Activity_logs

[set_Agent_System_logs]
REGEX = [Cc]ategory:\s*([^,]*,){2}
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_Agent_System_logs


[set_System_logs]
REGEX = [Ss]ite:\s*[^,]*,[Ss]erver:\s*[^,]*,[^,]*$
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_System_logs

[set_Agent_Security_logs]
REGEX = CIDS\s*[Ss]ignature\s*[sS]ubID:\s*[^,]*,[iI]ntrusion\s*URL:[^,]*,
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_Agent_Security_logs

[set_Policy_logs]
REGEX = Domain:\s*[^,]*,Admin:\s*([^,]*,){2}[^,]*.$
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_Policy_logs

[set_Agent_Proactive_Detection_logs_SONAR]
REGEX = COH\s*Engine\s*Version:\s*[^,]*,.*Confidence:\s*[^,]*,
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_Agnt_Proactive_Detection_logs

[set_server_admin_logs]
REGEX = Domain:\s*[^,]*,Admin:\s*[^,]*,[^,]*.$
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_server_admin_logs

[set_Agent_Packet_logs]
REGEX = Local\s*Host(:\s*|\s*IP:)[^,]*,Local\s*Port:\s*[^,]*,Remote\s*Host\s*IP:\s*[^,]*,Remote\sHost\sName:\s*[^,]*,Remote\s*Port:\s*[^,]*,[^,]*,Application:\s*[^,]*,Action:\s*.*$
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_Agent_Packet_logs

[set_Agent_Traffic_logs]
REGEX = Rule:\s*.*,Location:\s*[^,]*,User:\s*.*,Domain:\s*[^,]*,Action:\s*[^,]*,SHA-256:\s*[^,]*,MD-5:\s*[^,]*.$
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_Agent_Traffic_logs

[set_Agent_Risk_logs]
REGEX = IP\sAddress:.*Confidence:\s*[^,]*,URL\sTracking\sStatus:\s*[^,]*,First\sSeen:\s*[^,]*,Sensitivity:\s*[^,]*,[^,]*,Application\shash:\s*[^,]*.*
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::symantec_ep_Agent_Risk_logs


############Parsing of each type of logs under seperate sourcetype##########
[field_extraction_for_agent_Behavior]
REGEX = (?i)(?:([^,]*))?,(?<IP_Address>\d*\.\d*\.\d*\.\d*)?,(?<vendor_action>[^,]*),(?<Description>[^,]*)?,(?<API>[^,]*),(?:Begin:\s*(?<Begin_Time>[^,]*)),(?:End:\s*(?<End_Time>[^,]*)),(?:Rule:\s*(?<rule>[^,]*)),*(?<Caller_Process_ID>\d*),(?<Caller_Process_Name>[^,]*),(?<Return_Address>[^,]*),(?<Return_Module>[^,]*),(?<Parameter>[^,]*),(?:User:\s*(?<user>[^,]*)),(?:Domain:\s*(?<Domain_Name>[^,]*)),(?:Action\sType:\s*(?<Action_Type>[^,]*)),(?:File\ssize\s\(bytes\):\s*(?<File_Size>[^,]*)),(?:Device\sID:\s*(?<Device_ID>[^,]*))

[field_extraction_for_agent_scan]
REGEX = (?i)(?:Scan\sID:\s*(?<Scan_ID>[^,]*)),(?:Begin:\s*(?<Begin_Time>[^,]*)),(?:End:\s*(?<End_Time>[^,]*)),(?<Status>[^,]*),(?:Duration\s\(seconds\):\s*(?<Duration>[^,]*)),(?:User1:\s*(?<Client_User_1>.*)),(?:User2:\s*(?<Client_User_2>.*)),(?<Start_Message>[^,]*),(?<Stop_Message>[^,]*),(?:Command:\s*(?<Command>[^,]*)),(?:Threats:\s*(?<Threats>[^,]*)),(?:Infected:\s*(?<Infected_Files>[^,]*)),(?:Total\sFiles:\s*(?<Total_Files>[^,]*)),(?:Omitted:\s*(?<Omitted_Files>[^,]*)),(?:Computer:\s*(?<Computer_Name>[^,]*)),(?:IP\sAddress:\s*(?<IP_Address>[^,]*)),(?:Domain:\s*(?<Domain_Name>[^,]*)),(?:Group:\s*(?<Group_Name>[^,]*)),(?:Server:\s*(?<Server_Name>.*))$

[field_extraction_for_agent_Activity]

REGEX = (?i)(?:Site:\s*(?P<Site_Name>\s*'[^']*'|\s*"[^"]*"|\s*[^,]*)),(?:Server:\s*(?P<Server_Name>\s*'[^']*'|\s*"[^"]*"|\s*[^,]*)),(?:Domain:\s*(?P<Domain>\s*'[^']*'|\s*"[^"]*"|\s*[^,]*)),(?P<Event_Description>\s*'[^']*'|\s*"[^"]*"|\s*[^,]*),(?P<Host_Name>\s*'[^']*'|\s*"[^"]*"|\s*[^,]*),(?P<user>\s*'[^']*'|\s*"[^"]*"|\s*[^,]*),(?P<Domain_Name>\s*'[^']*'|\s*"[^"]*"|\s*[^,]*)


[field_extraction_for_agent_System]
REGEX = (?i)(?:Server:\s*(?<dvc>[^,]*)),(?:Category:\s*(?<Category>[^,]*)),(?<Event_Source>[^,]*),(?<Event_Description>.*),Event\s*time:(?<Event_time>.*)$

[field_extraction_for_System]
REGEX = (?i)(?:Site:\s*(?P<Site_Name>\s*'[^']*'|\s*"[^"]*"|\s*[^,]*))?,(?:Server:\s*(?P<Server_Name>\s*[^,]*)),(?<Event_Description>[^,]*).$

[field_extraction_for_agent_security]
REGEX = (?i)(?:Server:\s*(?<dvc>[^,]*)),(?:Event\sDescription:\s*(?<Event_Description>[^,]*)),(?:Local:\s*(?<Local_Host_IP>[^,]*)),(?:Local\sHost\sMAC:\s*(?<Local_Host_MAC>[^,]*)),(?:Remote\sHost\sName:\s*(?<Remote_Host_Name>[^,]*)),(?:Remote\sHost\sIP:\s*(?<Remote_Host_IP>[^,]*)),(?:Remote\sHost\sMAC:\s*(?<Remote_Host_MAC>[^,]*)),(?<Traffic_Direction>[^,]*),(?<Network_Protocol>[^,]*),(?<Hack_Type>[^,]*),(?:Begin:\s*\s*(?<Begin_Time>[^,]*)),(?:End:\s*(?<End_Time>[^,]*)),(?:Occurrences:\s*(?<Occurrences>[^,]*)),(?:Application:\s*(?<Application_Name>[^,]*)),(?:Location:\s*(?<Location>[^,]*)),(?:(User:|"User:)\s*(?<user>.*)),(?:Domain:\s*(?<Domain_Name>[^,]*)),(?:Local\sPort:\s*(?<Local_Port>[^,]*)),(?:Remote\sPort:\s*(?<Remote_Port>[^,]*)),(?:CIDS\sSignature\sID:\s*(?<CIDS_Signature_ID>[^,]*)),(?:CIDS\sSignature\sstring:\s*(?<CIDS_Signature_String>[^,]*)),(?:CIDS\sSignature\sSubID:\s*(?<CIDS_Signature_SubID>[^,]*)),(?:Intrusion\sURL:\s*(?<Intrusion_URL>[^,]*)),(?:Intrusion\sPayload\sURL:\s*(?<Intrusion_Payload_URL>[^,]*)),(?<Other_details>[^,]*),MD-5:(?<MD5>.*)$

[field_extraction_for_policy]
REGEX = (?i)(Site:\s*(?<Site_Name>[^,]*)),(Server:\s(?<Server_Name>[^,]*)),(Domain:\s*(?<Domain_Name>[^,]*)),(Admin:\s*(?<Admin_Name>[^,]*)),(?<Event_Description>[^,]*),(?<Policy_Name>[^,]*)$

[field_extraction_for_agent_proactive]
REGEX = (?i)(:\s(?P<Risk_Action>[^,]*)),(?:Computer\sname:\s*(?<Computer_Name>[^,]*)),(?:IP\sAddress:\s*(?<IP_Address>[^,]*)),(?:Detection\s*type:\s*(?<Detection_type>[^,]*)),(?:First\sSeen:\s*(?<First_Seen>[^,]*)),(?:Application\sname:\s*(?<Application_Name>[^,]*)),(?:Application\stype:\s*(?<Application_Type>[^,]*)),(?:Application\sversion:\s*(?<Application_Version>[^,]*)),(?:Hash\stype:\s*(?<Hash_Type>[^,]*)),(?:Application\shash:\s*(?<Application_Hash>[^,]*)),(?:Company\sname:\s*(?<Company_Name>.*)),(?:File\ssize\s\(bytes\):\s*(?<File_Size>[^,]*)),(?:Sensitivity:\s*(?<Sensitivity>[^,]*)),(?:Detection\s*score:\s*(?<Detecetion_Score>[^,]*)),(?:COH\s*Engine\s*Version:\s*(?<COH_Engine_Version>)[^,]*),(?<Submission_Recommendation>[^,]*),(?:Permitted\s*application\s*reason:\s*(?<Permitted_Application_Reason>.*)),(?:Disposition:\s*(?<Disposition>[^,]*)),(?:Download\ssite:\s*(?<Download_Site>.*)),(?:Web\sdomain:\s*(?<Web_Domain>.*)),(?:Downloaded\sby:\s*(?<Downloaded_By>[^,]*)),(?:Prevalence:\s*(?<Prevalence>.*)),(?:Confidence:\s*(?<Confidence>)[^,]*),(?:URL\sTracking\sStatus:\s*(?<URL_Tracking_Status>[^,]*)),(?:Risk\sLevel:\s*(?<Risk_Level>[^,]*)),(?:Risk\stype:\s*(?<Risk_Type>[^,]*)),(?:Source:\s*(?<Source>[^,]*)),(?:Risk\sname:\s*(?<Risk_Name>[^,]*)),(?:Occurrences:\s*(?<Occurrences>[^,]*)),(?<file_path>[^,]*),(?<Description>[^,]*),(?:Actual\saction:\s*(?<vendor_action>[^,]*)),(?:Requested\saction:\s*(?<Requested_Action>[^,]*)),(?:Secondary\saction:\s*(?<Secondary_Action>[^,]*)),(?:Event\stime:\s*(?<Event_Time>[^,]*)),(?:Inserted:\s*(?<Event_Insert_Time>[^,]*)),(?:End:\s*(?<End_Time>[^,]*)),(?:Domain:\s*(?<Domain_Name>[^,]*)),(?:Group:\s*(?<Group_Name>[^,]*)),(?:Server:\s*(?<Server_Name>[^,]*)),(?:User:\s*(?<user>.*)),(?:Source\scomputer:\s*(?<Source_Computer_Name>[^,]*)),(?:Source\sIP:\s*(?<Source_Computer_IP>[^,]*)),(?:Intensive\sProtection\sLevel:\s*(?<Intensive_Protection_Level>[^,]*)),(?:Certificate\sissuer:\s*(?<Certificate_Issuer>[^,]*)),(?:Certificate\ssigner:\s*(?<Certificate_Signer>[^,]*)),(?:Certificate\sthumbprint:\s*(?<Certificate_Thumbprint>[^,]*)),(?:Signing\stimestamp:\s*(?<Signing_Timestamp>[^,]*)),(?:Certificate\sserial\snumber:\s*(?<Certificate_Serial_Number>.*))$

[field_extraction_for_admin]
REGEX = (?i)(Site:\s*(?<Site_Name>[^,]*)),(Server:\s(?<Server_Name>[^,]*)),(Domain:\s*(?<Domain_Name>[^,]*)),(Admin:\s*(?<Admin_Name>[^,]*)),(?<Event_Description>[^,]*)$

[field_extraction_for_agent_packet]
REGEX = (?i)(:\s(?P<Host_Name>[^,]*)),(?:Local\s*Host(:\s*|\s*IP:)(?<Local_Host_IP>[^,]*)),(?:Local\s*port:\s*(?<Local_Port>[^,]*)),(?:Remote\s*Host\s*IP:\s*(?<Remote_Host_IP>[^,]*)),(?:Remote\sHost\sName:\s*(?<Remote_Host_Name>[^,]*)),(Remote\s*port:\s*(?<Remote_Port>[^,]*)),(?<Traffic_Direction>[^,]*),(?:Application:\s*(?<Application_Name>[^,]*)),(?:Action:\s*(?<vendor_action>.*))$

[field_extraction_for_Agent_traffic]
REGEX = (?i)(:\s(?P<Host_Name>[^,]*)),(?:Local\s*Host(:\s*|\s*IP:)(?<Local_Host_IP>[^,]*)),(?:Local\s*port:\s*(?<Local_Port>[^,]*)),(?:Local\sHost\sMAC:\s*(?<Local_Host_MAC>[^,]*)),(?:Remote\s*Host\s*IP:\s*(?<Remote_Host_IP>[^,]*)),(?:Remote\sHost\sName:\s*(?<Remote_Host_Name>[^,]*)),(Remote\s*port:\s*(?<Remote_Port>[^,]*)),(?:Remote\sHost\sMAC:\s*(?<Remote_Host_MAC>[^,]*)),(?<Network_Protocol>[^,]*),(?<Traffic_Direction>[^,]*),(?:Begin:\s*\s*(?<Begin_Time>[^,]*)),(?:End:\s*(?<End_Time>[^,]*)),(?:Occurrences:\s*(?<Occurrences>[^,]*)),(?:Application:\s*(?<Application_Name>[^,]*)),(?:Rule:\s*(?<rule>.*)),(?:Location:\s*(?<Location>[^,]*)),(?:User:\s*(?<user>.*)),(?:Domain:\s*(?<Domain_Name>[^,]*)),(?:Action:\s*(?<vendor_action>[^,]*)),(?:SHA-256:\s*(?<SHA_256>[^,]*)),(?:MD-5:\s*(?<MD_5>[^,]*))$

[field_extraction_for_Agent_risk]
REGEX = (?i)(:\s(?P<Risk_Action>[^,]*)),(?:IP\sAddress:\s*(?<IP_Address>\d*\.\d*\.\d*\.\d*)),(?:Computer\sname:\s*(?<Computer_Name>[^,]*)),(?:Source:\s*(?<Scan_source>[^,]*)),(?:Risk\sname:\s*(?<Risk_Name>[^,]*)),(?:Occurrences:\s*(?<Occurrences>[^,]*)),(?<file_path>[^,]*),(?<Description>[^,]*),(?:Actual\saction:\s*(?<vendor_action>[^,]*)),(?:Requested\saction:\s*(?<Requested_Action>[^,]*)),(?:Secondary\saction:\s*(?<Secondary_Action>[^,]*)),(?:Event\stime:\s*(?<Event_Time>[^,]*)),(?:Inserted:\s*(?<Event_Insert_Time>[^,]*)),(?:End:\s*(?<End_Time>[^,]*)),(?:Last\supdate\stime:\s*(?<Last_update_time>[^,]*)),(?:Domain:\s*(?<Domain_Name>[^,]*)),(?:Group:\s*(?<Group_Name>[^,]*)),(?:Server:\s*(?<Server_Name>[^,]*)),(?:User:\s*(?<user>.*)),(?:Source\scomputer:\s*(?<Source_Computer_Name>[^,]*)),(?:Source\sIP:\s*(?<Source_Computer_IP>[^,]*)),(?:Disposition:\s*(?<Disposition>[^,]*)),(?:Download\ssite:\s*(?<Download_Site>[^,]*)),(?:Web\sdomain:\s*(?<Web_Domain>.*)),(?:Downloaded\sby:\s*(?<Downloaded_By>[^,]*)),(?:Prevalence:\s*(?<Prevalence>[^,]*)),(?:Confidence:\s*(?<Confidence>[^,]*)),(?:URL\sTracking\sStatus:\s*(?<URL_Tracking_Status>[^,]*)),(?:First\sseen:\s*(?<First_Seen>[^,]*)),(?:Sensitivity:\s*(?<Sensitivity>[^,]*)),(?<Permitted_Application_Reason>[^,]*),(?:Application\shash:\s*(?<Application_Hash>[^,]*)),(?:Hash\stype:\s*(?<Hash_Type>[^,]*)),(?:Company\sname:\s*(?<Company_Name>.*)),(?:Application\sname:\s*(?<Application_Name>[^,]*)),(?:Application\sversion:\s*(?<Application_Version>[^,]*)),(?:Application\stype:\s*(?<Application_Type>[^,]*)),(?:File\ssize\s\(bytes\):\s*(?<File_Size>[^,]*)),(?:Category\sset:\s*(?<Category_set>[^,]*)),(?:Category\stype:\s*(?<Detection_type>[^,]*)),(?:Location:\s*(?<Location>[^,]*)),(?:Intensive\sProtection\sLevel:\s*(?<Intensive_Protection_Level>[^,]*)),(?:Certificate\sissuer:\s*(?<Certificate_Issuer>[^,]*)),(?:Certificate\ssigner:\s*(?<Certificate_Signer>[^,]*)),(?:Certificate\sthumbprint:\s*(?<Certificate_Thumbprint>[^,]*)),(?:Signing\stimestamp:\s*(?<Signing_Timestamp>[^,]*)),(?:Certificate\sserial\snumber:\s*(?<Certificate_Serial_Number>.*))$

