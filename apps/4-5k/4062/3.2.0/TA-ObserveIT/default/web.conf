
[expose:TA_ObserveIT_settings]
pattern = TA_ObserveIT_settings
methods = POST, GET

[expose:TA_ObserveIT_settings_specified]
pattern = TA_ObserveIT_settings/*
methods = POST, GET, DELETE

[expose:TA_ObserveIT_observeit_api]
pattern = TA_ObserveIT_observeit_api
methods = POST, GET

[expose:TA_ObserveIT_observeit_api_specified]
pattern = TA_ObserveIT_observeit_api/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
