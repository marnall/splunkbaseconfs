[ipv6compress-command]
syntax = ipv6compress (output=<field>)? (action=(compress|expand))? <field> 
shortdesc = \
    Generates a compressed or expanded text representation of a provided IPv6 address.
description = \
    This command takes in an IPv6 address and outputs a compressed or expanded text \
    representation. 
comment1 = This example compresses the value of an IPv6 address from the field `src_ip` \
    and outputs the result into the field `src_ip_compressed`.
example1 = \
    | ipv6compress output=src_ipv6_compressed src_ip
comment2 = This example produces the fully expanded representation of an IPv6 address \
    from the field `src_ip` and overwrites the existing `src_ip` value with this output. 
example2 = \
    | ipv6compress action=expand src_ip
category = streaming
usage = public
tags = 
