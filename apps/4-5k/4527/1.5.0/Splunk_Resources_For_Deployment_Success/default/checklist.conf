[unconfigured_mc_instances]
category = System and Environment
search = | rest splunk_server=local /services/search/distributed/peers\
| search status=Up disabled=0 \
| eval os = os_name \
| fields guid title peerName host host_fqdn server_roles search_groups cpu_arch os numberOfCores physicalMemoryMB version \
| rename title AS peerURI peerName AS serverName host_fqdn AS machine numberOfCores AS cpu_count physicalMemoryMB AS mem version AS splunk_version server_roles AS inherited_server_roles host AS instance\
| where isnull(mvfind(search_groups,"dmc_group_"))\
| eval severity_level=2
tags = splunkps, best_practices
title = Unconfigured MC instances
description = This checks the status of distributed peers to ensure all of them are properly configured to desired role within the Monitoring Console.
disabled = 0
failure_text = One or more hosts has returned that is presently not configured within the Monitoring Console.
suggested_action = Check the Monitoring Console General Setup view for more information. Configure instances that are marked as “New” to appropriate role.

[can_delete_capability_assignment]
applicable_to_groups = dmc_group_search_head
category = Splunk Miscellaneous
description = This checks for users with assigned “can_delete” capability across search heads.
failure_text = One or more hosts has users with “can_delete” capability assigned.
search = | rest splunk_server_group=dmc_group_search_head /services/authentication/users | where capabilities="delete_by_keyword" | stats dc(title) AS user_can_delete_count by splunk_server | rename splunk_server as instance | eval severity_level=2
suggested_action = It is recommended that this capability is not assigned to any one user. This capability allows users to mark data as non-searchable, hiding the data from search results. While at times it may be appropriate to hide the data, this capability can also be used in a malicious way. If the data needs to be “deleted” it is recommended to assign the appropriate capability to admin level user, perform the operation, and remove the capability. Review Splunk roles to determine the role that assigns “can_delete” capability.
tags = splunkps, best_practices, configuration, search
title = User "can_delete" capability assignment
disabled = 0

[data_separation_opportunity_sourcetypes]
category = Data Indexing
description = This check looks for indexes with excessive number of sourcetypes.
failure_text = One or more indexes has returned excessive number of sourcetypes within it.
search = | tstats summariesonly=t count AS event_count dc(sourcetype) AS sourcetype_count WHERE index=* AND earliest=-24h BY index | where sourcetype_count > 30 | eval severity_level=2, instance=index
suggested_action = It is recommended that these indexes be reviewed for an opportunity to split relevant sourcetypes into own index. Alternatively, sourcetypes should be reviewed to ensure they are not composite in nature, for example contain a hostname within it. The reason behind creating a new index falls within three categories:\
1.	Retention\
2.	Access control\
3.	Performance
tags = splunkps, best_practices, search, performance
title = Data separation opportunity - sourcetypes
disabled = 0

[data_separation_opportunity_index_main]
category = Data Indexing
description = This check looks for data being sent to index “main”.
failure_text = Index main has returned containing event data.
search = | tstats summariesonly=t count AS event_count dc(sourcetype) AS sourcetype_count dc(host) AS host_count WHERE index=main AND earliest=-24h BY index | where event_count > 0 | eval severity_level=2, instance=index
suggested_action = It is recommended to avoid sending data to the main index. This out-of-the-box index has the potential in becoming a catch-all sink, making it difficult to control retention, assess, and performance of data within it. Recommended to review data within this index and make appropriate configuration changes to route the data into separate index locations.
tags = splunkps, best_practices, search, performance
title = Data separation opportunity - main index
disabled = 0

[forwarder_output_connection_issues]
category = System and Environment
description = This check looks for forwarders that are unable to send data to defined output locations within past 24 hours.
failure_text = Found one or more instances where a forwarder was unable to send data to defined output destination.
search = earliest=-24h index=_internal sourcetype=splunkd TERM(ERROR) component=TcpOutput* (resolve OR connection) | rex "host=\"?(?<instance>[^\s\"]+)\"?" | eval message=if(match(_raw, "resolve"), "Cannot resolve host", "Cannot establish connection"), severity_level=3  | stats count AS error_count_24h dc(host) AS impacted_forwarders sparkline(count) values(message) AS message by instance | sort -impacted_forwarders
suggested_action = It is recommended to review identified output instances to ensure they are correctly defined and are still valid. Generals reasons of why communication might fail include misconfigurations, firewall issues, indexer or intermediate forwarder decommission, or maintenance windows.
tags = splunkps, configuration, communication
title = Forwarder output connection issues
disabled = 0

[search_bundle_size]
applicable_to_groups = dmc_group_search_head
category = System and Environment
description = This check looks at the search bundle size within the environment for past 12 hours.
failure_text = One or more instances has returned bundle size that needs to be reviewed.
search = earliest=-12h index=_internal sourcetype=splunkd WARN log_level=WARN component=DistributedBundleReplicationManager "Asynchronous bundle replication"\
| eval bundle_size_mb=tonumber(trim(coalesce(bundle_file_size, bundle_size), "KB")) / 1024\
\
| stats avg(bundle_size_mb) max(bundle_size_mb) by host\
| rename host AS instance \
| eval severity_level=2\
| foreach *bundle_size_mb* [eval <<FIELD>>=round('<<FIELD>>', 2)]\
| where 'avg(bundle_size_mb)' > 600 OR 'max(bundle_size_mb)' > 800
suggested_action = It is recommended to inspect the identified instances for search bundle content. Uncontrolled bundle size growth can result in search functionality and performance issues. Generally, lookups are responsible for significant growth of bundle. Review configuration and remove, modify, compress, or blacklist the lookups as appropriate.
tags = splunkps, best_practices, configuration, search
title = Search bundle size
disabled = 0

[search_bundle_frequency]
applicable_to_groups = dmc_group_search_head
category = System and Environment
description = This check looks at the search bundle frequency within the environment for past 6 hours.
failure_text = One or more instances has excessive replication frequency.
search = earliest=-6h@h latest=@h index=_internal sourcetype=splunkd WARN log_level=WARN component=DistributedBundleReplicationManager "Asynchronous bundle replication"\
\
| bin span=1h _time\
| stats count AS replication_count by host, _time | stats avg(replication_count) AS avg_replication_count_1h by host\
| rename host AS instance \
| eval severity_level=2, avg_replication_count_1h=round(avg_replication_count_1h)\
| where avg_replication_count_1h > 30
suggested_action = It is recommended to inspect instance bundle to identify what is causing it to update frequently. Generally this is caused by a frequent update to lookup files, consider performing file “diff” on the current and past bundle to identify item changing. If its related to lookups, consider changing update frequency, converting to utilizing kvstore, or blacklisting.
tags = splunkps, best_practices, configuration, search
title = Search bundle frequency
disabled = 0

[data_hygiene_events_future]
category = Data Hygiene
description = This check looks for events that are with a future timestamp.
failure_text = One or more sourcetypes has been found to present events in the future.
search = | tstats summariesonly=t count AS event_count dc(source) AS source_count dc(host) AS host_count latest(_time) AS latest_event_time where index=* AND (earliest=+5m latest=+10y) by index, sourcetype | eval severity_level=3, message="Event is in future by ".tostring(latest_event_time-now(), "duration") | convert ctime(latest_event_time) \
\
| eval instance=sourcetype\
| sort -event_count
suggested_action = It is recommended to review identified sourcetypes for data onboarding issues (incorrectly parsing time, not considering timezone, etc) or source configuration issues (such as NTP settings, invalid timezone, etc). Events that are in the future are generally not considered part of search process due to fact they are outside search window, resulting in misleading or inaccurate reporting.
tags = splunkps, data_hygiene, indexing, timestamp_extraction
title = Data hygiene - events in the future
disabled = 0

[data_hygiene_event_indexing]
category = Data Hygiene
description = This checks for warnings emitted when the index-time settings in place do not allow for the proper processing of recently ingested data (in past 24 hours).
failure_text = Some recently ingested events are triggering event-processing warnings and indicate the presence of one or more of these scenarios:   1. Lines in the event are too long, exceeding props.conf / TRUNCATE   2. There are too many lines per event, exceeding props.conf / MAX_EVENTS   3. The extraction of event time stamps was partially or completely unsuccessful  These event-processing issues can have a negative impact on the performance of data ingestion.
search = earliest=-24h index=_internal sourcetype=splunkd component=LineBreakingProcessor OR (component=DateParserVerbose NOT FileClassifier) OR component=AggregatorMiningProcessor\
| rex "Context:\s+source[:=]{1,2}(?<data_source>[^\|]+)\|host[:=]{1,2}(?<data_host>[^\|]+)\|(?<data_sourcetype>[^\|]+)"\
\
\
\
| stats count AS warn_count count(eval(component=="AggregatorMiningProcessor")) AS aggregation_issues count(eval(component=="LineBreakingProcessor")) AS line_breaking_issues count(eval(component=="DateParserVerbose")) AS date_parsing_issues dc(data_host) dc(data_source) by data_sourcetype \
| rename data_sourcetype AS sourcetype dc(data_*) AS dc(*)\
| eval severity_level = 3, instance=sourcetype\
| sort -warn_count
suggested_action = Check the events that are triggering these warnings. Adjust event-processing settings as needed to ensure their proper ingestion.
tags = splunkps, data_hygiene, indexing, timestamp_extraction
title = Data hygiene - event indexing
disabled = 0

[data_hygiene_learned_sourcetypes]
category = Data Hygiene
description = This check looks for sourcetypes that have been auto-assigned by Splunk within 24 hour period.
failure_text = One or more sourcetypes has been found to utilize “learned” or auto-assigned sourcetype.
search = | tstats summariesonly=t count AS event_count WHERE index=* AND earliest=-24h BY sourcetype index | where match(sourcetype, "\-\d+$|too_small$") | eval severity_level=2, instance=sourcetype | sort -event_count
suggested_action = It is recommended to review sourcetype data onboarding configuration. Auto-generated or “learned” sourcetypes are introduced by Splunk when no explicit data configuration settings exist as an optimization technique. Based on method behind data ingest, each Splunk node that indexes the event will generate its own rule-set, this results in different sourcetype names that cause reporting issues.
tags = splunkps, data_hygiene, indexing
title = Data hygiene - learned sourcetypes
disabled = 0

[splunk_crash]
category = System and Environment
description = This check looks for Splunk crash logs within the environment for past 24 hours.
failure_text = One or more instances has been found to have crash log.
search = earliest=-24h index=_internal sourcetype=splunkd_crash_log \
| rex "^\[build\s+(?<splunk_build>\w+)\]\s+(?<splunk_build_date>[^\n\r]+)" \
| rex "Crashing\sthread:\s+(?<crash_thread>\S+)" \
| rex "Cause:\s+(?<crash_cause>[^\n\r]+)" \
| search crash_thread=* \
| stats count AS crash_count_24h latest(_time) AS last_crash_time values(splunk_build) values(crash_thread) values(crash_cause) by host\
\
| rename host AS instance values(*) AS *\
| convert ctime(last_crash_time)\
| eval severity_level = 3
suggested_action = It is recommended to review the crash event and its frequency. If your running older version of Splunk software, refer to Splunk documentation for known issues; consider code upgrade. If the crash began occurring after a maintenance window, review configuration settings. If you are running current version of Splunk, refer to known issue documentation; if not listed as known issue consider opening a Support case for your entitlement.
tags = splunkps, best_practices
title = Splunk crashes
disabled = 0

[forwarder_output_throughput_limits]
category = System and Environment
description = This check looks for instances of Splunk forwarder are throughput throttled based on limits.conf settings within past 24 hours.
failure_text = One or more Splunk forwarders has been found to hit throttle throughput limit 10 times or more within past 24 hours.
search = earliest=-24h index=_internal sourcetype=splunkd ThruputProcessor data maxKBps | rex "throughput\s\((?<maxKBps>\d+)" | stats count AS throttle_event_count sparkline(count) avg(maxKBps) by host | eval avg(maxKBps)=round('avg(maxKBps)', 2), severity_level=2\
| rename host AS instance\
| where throttle_event_count >= 10\
| sort - throttle_event_count
suggested_action = It is recommended to review identified forwarder instances to ensure they have appropriate limits.conf throughput settings configured. Consistent throttling could result in data loss and inaccurate/misleading reporting.
tags = splunkps, communication, configuration
title = Forwarder output throughput limits

[searches_returning_no_results]
category = Search Load
description = This check looks for searches that continuously run, however, have not returned any results in the past 14 days.
failure_text = One or more searches identified that have not returned results in past 14 days.
search = earliest=-14d index=_internal sourcetype=scheduler result_count \
| extract pairdelim=",", kvdelim="=", auto=f \
| stats  max(result_count), sparkline avg(run_time) min(run_time) max(run_time) sum(run_time) AS total_run_time_sec values(host) AS instance count AS execution_count by savedsearch_name, app \
| where 'max(result_count)' = 0\
| join savedsearch_name type=outer \
    [| rest /servicesNS/-/-/saved/searches \
    | fields title eai:acl.owner cron_schedule dispatch.earliest_time dispatch.latest_time search \
    | rename title AS savedsearch_name eai:acl.app AS App eai:acl.owner AS owner cron_schedule AS cron_schedule dispatch.earliest_time AS dispatch_earliest_time dispatch.latest_time AS dispatch_latest_time] \
\
| makemv delim="," values(instance) \
| sort - total_run_time_sec\
| table instance, savedsearch_name, app, owner, execution_count, sparkline, *(result_count), total_run_time_sec *(run_time), dispatch_earliest_time dispatch_latest_time, cron_schedule, search\
| eval severity_level=2
suggested_action = It is recommended to review identified searches to ensure they are still relevant, needed, and expected to return no results. Content that is designed to only return results under “unique” circumstances should be whitelisted from this check, however, should still be periodically reviewed.
tags = splunkps, search_load, performance, best_practices
title = Searches returning no results

[excessive_cpu_load_average]
category = Splunk Miscellaneous
description = This check assesses system-wide CPU load average and raises a warning for those servers where load consecutively at or above .85, relative to CPU count, within past 4 hours.
failure_text = One or more instances has consecutively observed high CPU load average. Load average is a normalized value between 0 and 1. Once load average passes 1, this generally means that the CPU needs to context switch between tasks, meaning impact to Splunk tasks such as search can degrade.
search = earliest=-4h@h latest=@h index=_introspection sourcetype=splunk_resource_usage component=Hostwide $hist_scope$ | bin span=5m _time | stats avg(data.normalized_load_avg_1min) AS load by host, _time | where load > .85 | stats count AS high_load_5m_slice avg(load) by host | where high_load_5m_slice > 30 | eval severity_level=2 | rename host AS instance
suggested_action = It is recommended to review system configuration to determine what causes CPU load to be high. Generally, search load is what drives CPU utilization; reviewing searches for relevance, search optimization, and scheduler adjustments result in CPU load reduction. If the CPU load cannot be reduced by previously mentioned techniques, additional hardware / scaling of environment might be required.
tags = splunkps, resource_usage, performance
title = High CPU load average
disabled = 0

[filesystem_supportability]
category = Splunk Miscellaneous
description = This check looks for unsupported filesystems utilized for Splunk core instances.
failure_text = One or more instances has been found to run on an unsupported filesystem.
search = | rest splunk_server=* /services/server/status/partitions-space\
\
| eval free = if(isnotnull(available), available, free), usage = round((capacity - free) / 1024, 2), capacity = round(capacity / 1024, 2), disk_usage_gb = usage." / ".capacity, fs_supported = if(match(fs_type, "(?i)^(?:xfs|nfs|ext[234]|btrfs|NTFS|FAT32)$"), "true", "false"), severity_level=if(fs_supported="true", 0, 2)\
\
| stats max(severity_level), list(fs_type), list(fs_supported), list(mount_point), list(disk_usage_gb) by splunk_server\
| rename splunk_server AS instance, max(*) AS *, list(*) AS *\
\
| where severity_level > 0
suggested_action = It is recommended to remediate the instance to ensure it uses a Splunk supported filesystem.
tags = splunkps, best_practices
title = Filesystem supportability

[excessive_private_object_use]
category = Splunk Miscellaneous
description = This check looks for instances where number of private objects exceeds 20%.
failure_text = One or more instances has been found to have an excessive amount of private objects.
search = | union [| rest splunk_server_group=dmc_group_search_head /servicesNS/-/-/saved/searches | where disabled=0 | fields title, eai:acl.sharing, splunk_server | eval ko_type="searches"] [| rest splunk_server_group=dmc_group_search_head /servicesNS/-/-/data/ui/views | where disabled=0 | fields title, eai:acl.sharing, splunk_server | eval ko_type="dashboards"]  \
\
| stats count AS total_ko count(eval('eai:acl.sharing'="user")) AS count_private_ko count(eval('eai:acl.sharing'="app")) AS count_app_ko count(eval('eai:acl.sharing'="global")) AS count_global_ko by splunk_server, ko_type | eval private_ratio=round((count_private_ko/total_ko)*100,2), severity_level=if(private_ratio >= 20, 2, 0) \
\
| rename splunk_server AS instance\
| sort - severity_level
suggested_action = It is recommended to review identified instances and reduce number of private objects. If objects are not shared, others cannot benefit from the work, resulting in duplication of effort and at times misleading reporting.
tags = splunkps, best_practices
title = Excessive private object use
applicable_to_groups = dmc_group_search_head
disabled = 0

[search_internal_indexes_by_default]
applicable_to_groups = dmc_group_search_head
category = Splunk Miscellaneous
description = This checks looks for instances where a role allows searching Splunk internal indexes by default.
failure_text = One or more instances has been found to allow searching internal indexes by default.
search = | rest splunk_server_group=dmc_group_search_head /services/authorization/roles | where match(srchIndexesDefault, "^(?:_\*|_internal|_audit|_introspection|_telemetry)$") | fields splunk_server, instance, title, imported_roles, srchIndexesAllowed, srchIndexesDefault\
\
| rename splunk_server as instance, title AS role\
| eval imported_roles=mvjoin(imported_roles,", "), srchIndexesAllowed=mvjoin(srchIndexesAllowed,", "), srchIndexesDefault=mvjoin(srchIndexesDefault,", "), severity_level=2
suggested_action = It is recommended to avoid giving users broad capability to search across indexes by default without explicit index definition. Searching internal indexes as part of default search behavior can result in misleading reporting results and search performance degradation.
tags = splunkps, best_practices, configuration, search
title = Searching internal indexes by default
disabled = 0

[possible_search_consolidation]
category = Splunk Miscellaneous
description = *EXPERIMENTAL* This check looks for scheduled and enabled searches that are similar in nature using string matching algorithms. This search may produce false positives.
failure_text = One or more instances of similar search string has been found.
search = | rest splunk_server=* /servicesNS/-/-/saved/searches | where is_scheduled=1 AND disabled=0 AND NOT match(title, "^(?:_ScheduledView_|Bucket Copy Trigger|DB inspection|Notable - Total Events By \w+ Domain)") AND NOT match('eai:acl.app', "^(?:splunk_\w+_console|TA-fire_brigade|DA-ESS-|SA-\w+Protection|SA-ThreatIntelligence|itsi|SA-ITOA|SA-Utils|SA-ITSI-)")\
\
\
| fields splunk_server, title, disabled, is_scheduled, eai:acl.owner cron_schedule, eai:acl.app, search, actions\
| eval actions=ltrim(case(match(search, "outputlookup\s"), actions.", outputlookup", match(search, "outputcsv\s"), actions.", outputcsv", match(search, "collect\s"), actions.", collect", match(search, "sendemail\s"), actions.", sendemail", match(search, "script\s"), actions.", script", match(search, "sendalert\s"), actions.", sendalert", True(), actions), ", ")\
\
| cluster labelonly=true match=ngramset field=search\
| stats count list(search) dc(search) AS count_dc_search list(title) values(eai:acl.app) AS app, dc(eai:acl.app) AS app_count values(eai:acl.owner) AS owner values(cron_schedule) values(splunk_server) AS instance dc(splunk_server) values(actions) AS actions by cluster_label \
| where count > 1 \
\
| eval severity_level=1\
| sort -count\
| fields - cluster_label\
\
| table instance, severity_level, *, actions, count, "list(search)"
suggested_action = It is recommended to review the searches to determine if opportunities for consolidation exist. If the searches are duplicates, review to ensure they are not running across multiple locations (apps or splunk_server); this can suggest a configuration issue.
tags = splunkps, experimental, search, performance
title = Possible opportunity for search consolidation
disabled = 0

[high_number_apps_management_nodes]
