search = earliest=-1d@d latest=@d index=_introspection sourcetype=splunk_resource_usage component=PerProcess data.search_props.sid=* | rename data.search_props.type as searchType | bin _time span=1d | stats estdc(data.search_props.sid) AS search_count by searchType _time | eval data="\""+searchType+"\":"+tostring(search_count) | stats delim="," values(data) as data by _time | rename _time as date | mvcombine data | eval data="{"+data+"}" | rename date as _time | eval date=strftime(_time, "%Y-%m-%d") | fields _time date data | eval severity_level=1
tags = splunkcsm, adoption, search, searchtype
title = Search Type Review
description = Determine the search types being performed on the system
disabled = 0
failure_text = Unable to complete search, possible timeout
suggested_action = Work with your CSM to determine root cause
applicable_to_groups = dmc_group_cluster_master,dmc_group_deployment_server,dmc_group_license_master,dmc_group_shc_deployer

[instrumentation.usage.users.active]
category = Adoption
search = earliest=-30d@d latest=@d index=_audit sourcetype=audittrail TERM(action=search) user!="splunk-system-user" user!="n/a" | bin _time span=1d | stats estdc(user) as active by _time | eval data="{\"active\":"+tostring(active)+"}" | eval date=strftime(_time, "%Y-%m-%d") | fields _time date data | eval severity_level=1
tags = splunkcsm, adoption
title = Daily User Count
description = Determines the number of total users accessing the system
disabled = 0
failure_text = Unable to complete search, possible timeout
suggested_action = Work with your CSM to determine root cause
