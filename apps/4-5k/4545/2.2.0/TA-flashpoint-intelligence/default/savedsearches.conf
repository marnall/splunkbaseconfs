[Identity - Flashpoint Compromised Credentials - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Flashpoint Compromised Credentials
action.customsearchbuilder.enabled = false
action.customsearchbuilder.spec = {}
action.notable = 1
action.notable.param.extract_artifacts = {"asset":["src","dest","dvc","orig_host","source.domain"],"identity":["src_user","user","source.email"]}
action.notable.param.rule_description = Flashpoint Compromised Credentials
action.notable.param.rule_title = Compromised Credentials - $source.email$
action.notable.param.security_domain = identity
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.suppress = 1
alert.suppress.fields = source.fpid
alert.suppress.period = 31536000s
alert.track = 1
counttype = number of events
cron_schedule = */30 * * * *
description = Flashpoint Compromised Credentials
dispatch.earliest_time = -24h
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-flashpoint-intelligence
schedule_priority = higher
schedule_window = auto
search = `flashpoint_index` sourcetype="flashpoint_intelligence:compromised_credentials" | eval event_timestamp=strftime(_time, "%Y-%m-%d %H:%M:%S %Z") | table event_timestamp, source.*
disabled = 1

[Threat - Flashpoint Alerts - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Flashpoint Alerts
action.customsearchbuilder.enabled = false
action.customsearchbuilder.spec = {}
action.notable = 1
action.notable.param.extract_artifacts = {"asset":["src","dest","dvc","orig_host","resource.owner","resource.source","resource.repo","highlight_text","resource.container.title"],"identity":["src_user","user","id"],"url":["resource.url"],"file":["resource.file"]}
action.notable.param.rule_description = Generate Notable Events for new sightings from Flashpoint Alerts data in Splunk
action.notable.param.rule_title = $title$
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.suppress = 1
alert.suppress.fields = alert_id
alert.suppress.period = 604800s
alert.track = 1
counttype = number of events
cron_schedule = */30 * * * *
description = Search to generate Notable Events for new sightings from Flashpoint Alerts in Splunk
dispatch.earliest_time = -24h
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-flashpoint-intelligence
schedule_priority = higher
schedule_window = auto
search = `flashpoint_index` sourcetype="flashpoint_intelligence:alerts" | eval title= "Alert: " . substr('reason.text', 0, 20) . " - " . mvjoin('resource.basetypes{}', ",") | eval event_timestamp=strftime(_time, "%Y-%m-%d %H:%M:%S %Z") | table event_timestamp, title, id, resource.id , reason.*, resource.*
disabled = 1