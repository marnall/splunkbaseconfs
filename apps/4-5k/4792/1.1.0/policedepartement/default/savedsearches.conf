[Train Model (up to 2018)]
dispatch.latest_time = 1514761200
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | inputlookup square_features.csv \
| addinfo \
| where _time>=info_min_time AND _time<=info_max_time \
| fields - info_* \
| eval square = "square_".square `comment("Force square to be categorial, s.t. fit does one hot encoding automatically")` \
| table _time lag1 lag2 lag3 mavg7 mavg14 mavg31 square crime_nb \
| fit LinearRegression crime_nb from lag1 lag2 lag3 mavg7 mavg14 mavg31 square into lin_model_before2018

[Feature Computation]
search = index=crime_raw location!=null \
| table _time location \
| lookup squarelookup location \
| timechart span=1d count by square limit=300 \
| fields - NULL\
| untable _time square crime_nb \
| sort 0 square, _time \
| streamstats window=1 current=f earliest(crime_nb) as lag1 by square \
| streamstats window=2 current=f earliest(crime_nb) as lag2 by square \
| streamstats window=3 current=f earliest(crime_nb) as lag3 by square \
| streamstats avg(crime_nb) as mavg7 by square window=7 current=f \
| streamstats avg(crime_nb) as mavg14 by square window=14 current=f \
| streamstats avg(crime_nb) as mavg31 by square window=31 current=f\
| table _time square lag1 lag2 lag3 mavg7 mavg14 mavg31 crime_nb
