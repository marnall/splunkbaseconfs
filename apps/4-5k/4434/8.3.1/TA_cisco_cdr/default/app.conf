[ui]
is_visible = 0
label = TA for Cisco CDR Reporting and Analytics

[launcher]
author = Sideview, LLC
description = This TA is intended to be installed only on Splunk forwarders (HF or UF).  It is designed for use in conjunction with Sideview's commercial app for Splunk -- "Cisco CDR Reporting and Analytics" which is available as a free 90 day trial.  Note that almost all of the complexity in onboarding Cisco CallManager CDR data is on the Search-head side and thus inside the larger Cisco CDR app - however this simple TA provides all the index-time settings you need to index and timestamp the raw CallManager CDR data properly.
version = 8.3.1

[id]
version = 8.3.1
name = TA_cisco_cdr

[install]
build = 19

[package]
id = TA_cisco_cdr
