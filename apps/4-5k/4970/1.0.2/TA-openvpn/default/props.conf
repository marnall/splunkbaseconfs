[openvpn]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
EXTRACT-vendor_date,AF,src_ip,src_port = (?<vendor_date>\w{3}\s\w{3}\s\d{1,2}\s\d{1,2}:\d{1,2}:\d{1,2}\s\d{1,4})\s(?<vendor_message>TCP connection established with\s\[(?<AF>[^\]]+)\])(?<src_ip>(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)):(?<src_port>\d+)
EXTRACT-vendor_date,user,src_ip,src_port,vendor_message = (?<vendor_date>\w{3}\s\w{3}\s\d{1,2}\s\d{1,2}:\d{1,2}:\d{1,2}\s\d{1,4})\s((?<user>[^\/]+)\/)*?(?<src_ip>(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)):(?<src_port>[^\s]+)\s(?<vendor_message>[^\n\r]+)
