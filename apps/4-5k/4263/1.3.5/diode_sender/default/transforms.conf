[add_host]
SOURCE_KEY = MetaData:Host
REGEX = ^host::(.*)$
FORMAT = h=$1|r=$0
DEST_KEY = _raw

[add_source]
SOURCE_KEY = MetaData:Source
REGEX = ^source::(.*)$
FORMAT = s=$1|$0
DEST_KEY = _raw

[add_sourcetype]
SOURCE_KEY = MetaData:Sourcetype
REGEX = ^sourcetype::(.*)$
FORMAT = st=$1|$0
DEST_KEY = _raw

[add_index]
SOURCE_KEY = _MetaData:Index
REGEX = ^index::(.*)$
FORMAT = i=$1|$0
DEST_KEY = _raw

[add_time]
SOURCE_KEY = _time
REGEX = ^(.*)$
FORMAT = t=$1|$0
DEST_KEY = _raw

[send-to-syslog-udp]
REGEX = .
DEST_KEY = _SYSLOG_ROUTING
FORMAT = diode-syslog-udp

[send-to-syslog-tcp]
REGEX= .
DEST_KEY = _SYSLOG_ROUTING
FORMAT = diode-syslog-tcp
