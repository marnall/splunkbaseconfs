# props.conf

[distil]
  EVAL-vendor_product   = "Distil Networks: Bot Mitigation & API Security"
  EVAL-product = "Bot Mitigation & API Security"
  EVAL-vendor_doc       = "https://help.distilnetworks.com/hc/en-us/articles/115001381667-Distil-Action-Values"
  EVAL-vendor 		= "Distil"
  FIELDALIAS-bytes_in   = bytes_returned_origin AS bytes_in
  FIELDALIAS-bytes_out  = bytes_sent AS bytes_out
  FIELDALIAS-vendoract  = distil_action AS vendor_action
  FIELDALIAS-status     = http_status_code AS status
  FIELDALIAS-referer    = referer AS http_referrer
  FIELDALIAS-protocol   = request_protocol AS protocol
  FIELDLIAS-useragent   = user_agent AS http_user_agent
  FIELDALIAS-clientip   = visitor_ip AS clientip
  FIELDALIAS-src_ip     = visitor_ip AS src_ip
  FIELDALIAS-site       = http_host AS site
  EVAL-bytes = bytes_in + bytes_out
  LOOKUP-vendoraction = vendoraction distil_action OUTPUTNEW definition
