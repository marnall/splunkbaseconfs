[Download Intsights IOCs]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 */4 * * *
description = Downloads IOCs from Intsights, and adds them to the KV Store
dispatch.earliest_time = -15m
dispatch.latest_time = -0m
enableSched = 0
search = | script download_intsights_iocs

