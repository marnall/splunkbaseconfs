[aws:waf]
### Parsing ###
SHOULD_LINEMERGE = false
TIME_FORMAT = %s%Q
TIME_PREFIX = "timestamp":\s?
KV_MODE = json
AUTO_KV_JSON = false
LINE_BREAKER = ([\r\n]+)\{"timestamp":

### Fields ###
FIELDALIAS-aws_waf_cim_aliases = src ASNEW src_ip bytes_in ASNEW bytes site ASNEW dest vendor_rule ASNEW rule

EXTRACT-aws_waf_bytes_in = [Cc]ontent-[Ll]ength".\s?"[Vv]alue":\s?"(?P<bytes_in>\d+)"
EXTRACT-aws_waf_cookie = [Cc]ookie".\s?"[Vv]alue":\s?"(?P<cookie>[^"]+)
EXTRACT-aws_waf_http_content_type = [Cc]ontent-[Tt]ype",\s?"[Vv]alue":\s?"(?P<http_content_type>[^"]+)
EXTRACT-aws_waf_http_referrer = [Rr]eferer",\s?"[Vv]alue":\s?"(?P<http_referrer>[^"]+)
EXTRACT-aws_waf_http_user_agent = [Uu]ser-[Aa]gent",\s?"[Vv]alue":\s?"(?P<http_user_agent>[^"]+)
EXTRACT-aws_waf_method = [Hh]ttp[Mm]ethod":\s?"(?P<http_method>[^"]+)
EXTRACT-aws_waf_site = [Hh]ost",\s?"[Vv]alue":\s?"(?P<site>[^"]+)"
EXTRACT-aws_waf_src = [Cc]lient[Ii]p":\s?"(?P<src>[^"]+)
EXTRACT-aws_waf_uriquery = [Uu]ri":\s?"(?P<uri_query>[^"]+)
EXTRACT-aws_waf_vendor_rule = [Rr]ule[Gg]roup[Ii]d":\s?"(?P<vendor_rule>[^"]+)
EXTRACT-aws_waf_vendor_signature = [Rr]ules?":\s?(?!\s?None|\s?\[\]|\s?null)\[?\{"ruleId":"(?P<vendor_signature>[^",]+)

EVAL-action = case(action == "BLOCK", "blocked", 1=1, "allowed")
EVAL-default_signature = "AWS WAF " + action
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-ids_type = "application"
EVAL-signature = coalesce(vendor_signature,"AWS WAF " + action)
EVAL-transport = "tcp"
EVAL-url = site+uri_query
EVAL-url_length = len(site)+len(uri_query)
EVAL-vendor_product = "AWS Web Application Firewall"
