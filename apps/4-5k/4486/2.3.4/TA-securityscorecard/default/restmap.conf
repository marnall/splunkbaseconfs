[admin:TA_securityscorecard_configuration]
match = /
members = TA_securityscorecard_account, TA_securityscorecard_settings

[admin:TA_securityscorecard_inputs]
match = /
members = TA_securityscorecard_securityscorecard

[admin_external:TA_securityscorecard_account]
handlertype = python
python.version = python3
handlerfile = TA_securityscorecard_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_securityscorecard_settings]
handlertype = python
python.version = python3
handlerfile = TA_securityscorecard_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_securityscorecard_securityscorecard]
handlertype = python
python.version = python3
handlerfile = TA_securityscorecard_rh_securityscorecard.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
