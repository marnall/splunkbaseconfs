[croniter-command]
syntax = croniter (<selfjoin-options>)*
simplesyntax = croniter input=cron_schedule_field
shortdesc = Generate a multivalue field of upcoming schedule iterations
description = Generate a multivalue field of upcoming schedule iterations
usage = public
example1 = croniter iterations=25 input=cron_schedule 
comment1 = List the next 25 times a scheduled search is supposed to run.
example2 = croniter iterations=5 input=cron_schedule start_epoch=start_time
comment2 = List the following 5 iterations starting at the given time in field start_time
example3 = croniter input=cron_schedule start_epoch=start_time end_epoch=end_time


[croniter-options]
syntax = iterations=<int> | input=<str> | start_epoch=<str> | end_epoch=<str>
description = 'iterations' (optional, default: 25): The number of future timestamps to generate from the cron schedule.\
	'input' (optional, default: cron_schedule): The event field containing your cron schedule for parsing.\
	'start_epoch' (optional, default: current time): Timestamp expressed in epoch standard of where to begin creating iterations.\
	'end_epoch' (optional, default: None): Timestamp expressed in epoch standard of where to stop iterating. Takes precedence over iterations field.

