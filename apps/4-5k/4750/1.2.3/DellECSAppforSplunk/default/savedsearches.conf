[dell_vdc_list]
alert.track = 0
cron_schedule = 0 */6 * * *
dispatch.earliest_time = -6h
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = `Dell_ECS_index` sourcetype="dell:localzone" | dedup name vdcIp | eval vdc=name." : ".vdcIp | inputlookup dell_vdc_list_lookup append=T | dedup vdc | table name vdcIp vdc | outputlookup dell_vdc_list_lookup
