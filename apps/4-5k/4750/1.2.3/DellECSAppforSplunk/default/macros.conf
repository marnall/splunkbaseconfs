[Dell_ECS_index]
definition = ()
iseval = 0

[base_transform(2)]
args = value, base
definition = case(($value$ >= pow($base$,3)),round(($value$ / pow($base$,3)),2).if($base$=1000," GB"," GiB"),($value$ >= pow($base$,2)),round(($value$ / pow($base$,2)),2).if($base$=1000," MB"," MiB"),($value$ >= $base$),round(($value$ / $base$),2).if($base$=1000," KB"," KiB"), 1==1, round($value$,2)." Bytes")
iseval = 0

[base_transform_with_max(3)]
args = value, base, max
definition = case(($max$ >= pow($base$,3)),round(($value$ / pow($base$,3)),2).if($base$=1000," GB"," GiB"),($max$ >= pow($base$,2)),round(($value$ / pow($base$,2)),2).if($base$=1000," MB"," MiB"),($max$ >= $base$),round(($value$ / $base$),2).if($base$=1000," KB"," KiB"), 1==1, round($value$,2)." Bytes")
iseval = 0

[RPO_transform(1)]
args = replicationRpoTimestamp
definition = eval RPO=if(isnull($replicationRpoTimestamp$), 0,now()-$replicationRpoTimestamp$), RPO = (case(RPO<=0,"Up To Date",RPO<60,(RPO)." Seconds",RPO<(60*60),(round(RPO/60,0))." Minutes",RPO<(60*60*24),(round(RPO/(60*60),0))." Hours",1=1,(round(RPO/(60*60*24),0))." Days")).if(isnotnull($replicationRpoTimestamp$)," (".strftime($replicationRpoTimestamp$,"%b %d %Y %H:%M %Z").")","")
iseval = 0

[transform_to_K(1)]
args = value
definition = case($value$<1000, round($value$, 2), 1=1, round($value$/1000, 2)." K")
iseval = 0

[transform_to_K_with_max(2)]
args = value,max_value
definition = case($max_value$<1000, round($value$, 2), 1=1, round($value$/1000, 2)." K")
iseval = 0

[transform_to_second(2)]
args = value,max_value
definition = case($max_value$<1000, round($value$, 2)." ms", 1=1, round($value$/1000, 2)." s")
iseval = 0
