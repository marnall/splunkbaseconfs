[proxy:ifilter:v10]
SHOULD_LINEMERGE = 0
TIME_PREFIX = \s\[
category = Splunk App Add-on Builder
pulldown_type = 1
EXTRACT-ifilter_v10 = ^(?P<log_output_time>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<process_number>\d+)\s+(?P<ifilter_version>[\S]+)\s+(?P<upper_proxy_ip>[\S]+)\s+(?P<dest>[\S]+)\s+(?P<src>[\S]+)\s+(?P<client_ip>[\S]+)\s+(?P<pc_name>[\S]+)\s+(?P<user>[\S]+)\s\[(?P<access_start_time>[^\]]+)\]\s(?P<http_response_code>[\S]+)\s+(?P<bytes_in>[\S]+)\s+(?P<bytes_out>[\S]+)\s+(?P<action>[\S]+)\s+(?P<rule_object_id>[\S]+)\s+(?P<filter_reason_number>[\S]+)\s+(?P<url_category_number>[\S]+)\s+(?P<lookup_status>[\S]+)\s+(?P<lookup_processing_time>[\S]+)\s+(?P<web_service_id>[\S]+)\s+(?P<web_service_sub_id>[\S]+)\s+(?P<group_name>[\S]+)\s+(?P<virus_name>[\S]+)\s+(?P<ssl_parameter>[\S]+)\s+(?P<file_info_at_post>[\S]+)\s\"+(?P<http_method>[\S]+)\s+(?P<url>[\S]+)\s+(?P<http_version>[\S]+)\"\s+(?P<http_referrer>[\S]+)\s+(?P<http_user_agent>[\S]+)\s+(?P<http_content_type>[\S]+)\s+(?P<checksum>[\S]+)
EVAL-app = "i-filter"
EVAL-bytes = bytes_in+bytes_out
EVAL-dest_ip = mvindex(split(dest,":"),0)
EVAL-dest_port = mvindex(split(dest,":"),1)
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-url_category_number = split(url_category_number,"/")
EVAL-vendor_product = "Digital Arts"
LOOKUP-url_category_number = ifilter_url_category_list url_category_number AS url_category_number OUTPUTNEW category AS category
EVAL-url_length = len(url)
