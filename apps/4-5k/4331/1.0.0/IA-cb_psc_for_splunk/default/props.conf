[source::eventgen]
LINE_BREAKER = [\r\n]+
TRUNCATE = 20000
SHOULD_LINEMERGE = false

[source::...modularinput.log]
sourcetype = modularinput

[source::...restclient.log]
sourcetype = restclient

[source::...utilities.log]
sourcetype = utilities

[restclient]
EVAL-func = coalesce(function, func)

[modularinput]
EVAL-func = coalesce(function, func)

[utilities]
EVAL-func = coalesce(function, func)

[carbonblack:psc:api]
EVAL-app = "ThreatHunter"
EVAL-vendor = "CarbonBlack"
KV_MODE = json

[carbonblack:psc:notification]
EVAL-app = "ThreatHunter"
EVAL-vendor = "CarbonBlack"
TIME_FORMAT = %s%3N
TIME_PREFIX = eventTime
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD = 25
TRUNCATE = 99999
KV_MODE = json
FIELDALIAS-threat_incidentid = threatInfo.incidentId AS incident_id
FIELDALIAS-threat_app_name = threatInfo.indicators{}.applicationName AS threat{}.app_name
FIELDALIAS-threat_indicator_name = threatInfo.indicators{}.indicatorName AS threat{}.indicator_name
FIELDALIAS-threat_sha256hash = threatInfo.indicators{}.sha256Hash AS threat{}.sha256hash
FIELDALIAS-threat_score = threatInfo.score AS score
FIELDALIAS-threat_summary = threatInfo.score AS threat{}.summary
FIELDALIAS-threathunter_incidentid = threatHunterInfo.incidentId AS incident_id
FIELDALIAS-threathunter_app_name = threatHunterInfo.indicators{}.applicationName AS threat{}.app_name
FIELDALIAS-threathunter_indicator_name = threatHunterInfo.indicators{}.indicatorName AS threat{}.indicator_name
FIELDALIAS-threathunter_threat_sha256hash = threatHunterInfo.indicators{}.sha256Hash AS threat{}.sha256hash
FIELDALIAS-threathunter_score = threatHunterInfo.score AS score
FIELDALIAS-threathunter_summary = threatHunterInfo.score AS threat{}.summary
FIELDALIAS-watchlist = threatHunterInfo.watchLists{}.name AS watchlist
FIELDALIAS-severityid = threatHunterInfo.score AS severity_id
FIELDALIAS-destpriority = deviceInfo.targetPriorityType AS dest_priority
FIELDALIAS-dest = deviceInfo.deviceName AS dest
FIELDALIAS-signature = ruleName AS signature
FIELDALIAS-dvc = host AS dvc
FIELDALIAS-category = threatHunterInfo.threatCause.threatCategory AS category
FIELDALIAS-os = deviceInfo.deviceType AS os
FIELDALIAS-processexec = threatHunterInfo.indicators{}.applicationName AS process_exec
FIELDALIAS-processhash = threatHunterInfo.indicators{}.sha256hash AS process_hash
FIELDALIAS-processguid = threatHunterInfo.processGuid AS process_guid
FIELDALIAS-processpath = threatHunterInfo.processPath AS process_path
FIELDALIAS-id = threatHunterInfo.iocId AS id
EVAL-watchlist = replace(watchlist, "&amp;", "&")
EVAL-external_url = "https://".mvindex(split(replace(url,"https://",""),"/"),0)."/alerts?s[searchWindow]=ALL&s[c][QUERY_STRING_TYPE][0]=".incident_id
EXTRACT-description1 = \[(?<policy_name>[^\]]+)\]\s+\[(?<description_text>[^\]]+)\]\s+\[(?<description_url>[^\]]+)\]\s+\[(?<description>[^\]]+)\]\s+\[Group:\s(?<group_name>[^\]]+)\]\s+\[Device Email:\s(?<device_email>[^\]]+)\]\s+\[Device Name:(?<device_name>[^\]]+)\]\s+\[Device Type:\s(?<device_type>[^\]]+)\]\s+\[IOC:\s+(?<ioc>[^\]]+)\]\s+\[Severity:\s+(?<severity>\d+)\]
EXTRACT-description2 = \[(?<policy_name>[^\]]+)\]\s+\[(?<description_text>[^\]]+)\]\s+\[(?<description_url>[^\]]+)\]\s+\[(?<description>[^\]]+)\]\s+\[Incident id:\s(?<incident_id>[^\]]+)\]\s+\[Threat score:\s(?<threat_score>[^\]]+)\]\s+\[Group:(?<group_name>[^\]]+)\]\s+\[Email:\s(?<device_email>[^\]]+)\]\s+\[Name:\s+(?<name>[^\]]+)\]\s+\[Type and OS:\s+(?<device_type>\w+)\s+(?<device_os>[^\]]+)\]\s+\[Severity:\s+(?<severity>\w+)\]

[carbonblack:psc:notification:new_threat]
EVAL-app = "ThreatHunter"
EVAL-vendor = "CarbonBlack"
TIME_FORMAT = %s%3N
TIME_PREFIX = eventTime
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD = 25
TRUNCATE = 99999
KV_MODE = json