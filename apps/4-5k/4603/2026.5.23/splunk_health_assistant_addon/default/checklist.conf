        OR uri="*/results/export?search=*" \
        OR uri="*/results/export?%&search=*" \
        OR uri="*/events?search=*" \
        OR uri="*/events?%&search=*" \
        OR uri="*/events/export?search=*" \
        OR uri="*/events/export?%&search=*" \
        OR uri="*/jobs/export*" \
        OR uri="*/parser*") AND NOT uri="*/v2/*" \
    | eval metric="user=".user." uri=".uri \
    | rename host AS instance \
    | table instance metric \
    ```remove SPL below to get complete list of deprecated API calls and the user``` \
    | stats count AS deprecated_api_calls by instance \
    | append \
        [| makeresults count=1 splunk_server=* annotate=true \
