[splunk_web_custom_rest_endpoints]
title = Splunk Web Custom REST Endpoints
category = Security
tags = apps, splunk 10.2
description = Evaluates for the presence of Splunk Web custom representational state transfer (REST) endpoints in Splunk apps and marks as Information if present.
failure_text = Found at least one Splunk app that uses Splunk Web custom REST endpoints.
suggested_action = Review the apps on this instance that use Splunk Web custom REST endpoints and confirm that they are compatible with version 3.13 of the Python interpreter before attempting an upgrade to Splunk Enterprise version 10.2.
doc_link =
doc_title =
applicable_to_groups =
search = | rest /services/apps/local splunk_server=* \
    | search core=0 \
    | rename title AS app_name \
    | dedup splunk_server app_name \
    | lookup splunk-upgrade-readiness-checks-installed-apps title AS app_name OUTPUT check_eol_apps \
    | where isnull(check_eol_apps) OR check_eol_apps="" \
    | lookup splunkbase-lookup app_id AS app_name OUTPUT splunkbase_status \
    | where NOT splunkbase_status="found" \
    | join type=inner splunk_server app_name \
        [ | rest splunk_server=* /servicesNS/-/-/configs/conf-web search="eai:acl.app=*" \
        | search title="endpoint:*" \
        | rename "eai:acl.app" AS app_name \
        | dedup splunk_server app_name title \
        | table splunk_server app_name title ] \
    | eval metric="This private app defines a Splunk Web custom endpoint stanza in web.conf: " . app_name \
    | eval severity_level=1 \
    | rename splunk_server AS instance \
    | table instance metric severity_level

[deprecated_tls_version_check]
title = Deprecated TLS Protocol Versions in Splunk Configuration
category = Security
tags = ssl, configuration, splunk_10_0
description = Evaluates whether or not any transport layer security (TLS) protocol version other than TLS 1.2 or TLS 1.3 is present in the Splunk configuration under either the 'sslVersions' or 'sslVersionsForClient' key. Marks as Critical if any such version is present.
failure_text = The configuration on this Splunk platform instance contains a deprecated TLS protocol version that is lower than 1.2 in either the 'sslVersions' or 'sslVersionsforClient' settings.
suggested_action = In any configuration (.conf) file, replace values for the 'sslVersions' and 'sslVersionsforClient' settings that are not "tls1.2", "tls1.3", or "tls1.2,tls1.3" with "tls1.2", "tls1.3", or "tls1.2,tls1.3". The highest precedence configuration for any .conf file should never contain a TLS protocol version that is lower than 1.2.
doc_link =
doc_title =
applicable_to_groups =
search = | rest splunk_server=* "/services/configs/conf-server" | eval conf = "server" \
    | append [ | rest splunk_server=* "/servicesNS/-/-/configs/conf-inputs" | eval conf = "inputs" ] \
    | append [ | rest splunk_server=* "/servicesNS/-/-/configs/conf-outputs" | eval conf = "outputs" ] \
    | append [ | rest splunk_server=* "/servicesNS/-/-/configs/conf-web" | eval conf = "web" ] \
    | append [ | rest splunk_server=* "/servicesNS/-/-/configs/conf-indexes" | eval conf = "indexes" ] \
    | append [ | rest splunk_server=* "/servicesNS/-/-/configs/conf-authentication" | eval conf = "authentication" ] \
    | append [ | rest splunk_server=* "/servicesNS/-/-/configs/conf-alert_actions" | eval conf = "alert_actions" ] \
    | append [ | rest splunk_server=* "/servicesNS/-/-/configs/conf-deploymentclient" | eval conf = "deploymentclient" ] \
    | stats values(sslVersions) AS sslVersions values(sslVersionsForClient) AS sslVersionsForClient by splunk_server conf title eai:appName \
    | search sslVersions=* OR sslVersionsForClient=* \
    | rex mode=sed s/\s//g field=sslVersions | rex mode=sed s/\s//g field=sslVersionsForClient \
    | where (isnotnull(sslVersions) AND NOT (sslVersions="tls1.2" OR sslVersions="tls1.3")) \
    OR (isnotnull(sslVersionsForClient) AND NOT (sslVersionsForClient="tls1.2" OR sslVersionsForClient="tls1.3")) \
    | stats values(sslVersions) AS sslVersions values(sslVersionsForClient) AS sslVersionsForClient BY splunk_server  conf title eai:appName \
    | makemv sslVersions delim="," \
    | makemv sslVersionsForClient delim="," \
    | eval  sslVersions=mvfilter(sslVersions != "tls1.2") \
    | eval  sslVersions=mvfilter(sslVersions != "tls1.3") \
    | eval  sslVersions=mvfilter(sslVersions != "-ssl2") \
    | eval  sslVersions=mvfilter(sslVersions != "-ssl3") \
    | eval  sslVersions=mvfilter(sslVersions != "-tls1.0") \
    | eval  sslVersions=mvfilter(sslVersions != "-tls1.1") \
    | eval  sslVersionsForClient=mvfilter(sslVersionsForClient != "tls1.2") \
    | eval  sslVersionsForClient=mvfilter(sslVersionsForClient != "tls1.3") \
    | eval  sslVersionsForClient=mvfilter(sslVersionsForClient != "-ssl2") \
    | eval  sslVersionsForClient=mvfilter(sslVersionsForClient != "-ssl3") \
    | eval  sslVersionsForClient=mvfilter(sslVersionsForClient != "-tls1.0") \
    | eval  sslVersionsForClient=mvfilter(sslVersionsForClient != "-tls1.1") \
    | search sslVersions=* OR sslVersionsForClient=* \
    | eval app_conf_stanza_tls_version_too_low = 'eai:appName' . ": " . conf . ".conf" . " [" . title . "]" \
    | stats values(app_conf_stanza_tls_version_too_low) AS app_conf_stanzas_tls_version_too_low BY splunk_server \
    | eval app_conf_stanzas_tls_version_too_low = mvjoin(app_conf_stanzas_tls_version_too_low, ", ") \
    | eval severity_level = 3 \
    | rename splunk_server as instance \
    | table instance app_conf_stanzas_tls_version_too_low severity_level \
    | append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="" app_conf_stanzas_tls_version_too_low \
    | fillnull value="0" severity_level \
    | table instance app_conf_stanzas_tls_version_too_low severity_level] \
    | stats values(app_conf_stanzas_tls_version_too_low) as app_conf_stanzas_tls_version_too_low sum(severity_level) as severity_level by instance

[ssl_alert_check]
title = TLS Errors
category = Security
tags = ssl, splunk_10_0
description = Evaluates for the presence of any TLS or SSL alerts in the last hour, and marks as Critical if any are present.
failure_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake.
suggested_action = Confirm that secure communication with TLS is on for both the client and the server. Verify that the TLS settings on the client and server have common attributes such as TLS protocol versions, cipher suites, and any other configurable TLS values.
doc_link =
doc_title =
applicable_to_groups =
search = index=_internal source=*splunkd.log* "Received fatal SSL3 alert" earliest=-60m \
    | rex "ssl_state='(?<ssl_state>[^']+)'.*alert_description='(?<alert>[^']+)'" \
    | stats values(alert) AS alerts, count AS sixty_min_event_count BY host \
    | eval alerts = mvjoin(alerts, ", ") \
    | eval severity_level = 3 \
    | table host, alerts, sixty_min_event_count, severity_level \
    | rename host as instance \
    | table instance, alerts, sixty_min_event_count, severity_level \
    | append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="" alerts \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance alerts sixty_min_event_count severity_level] \
    | stats values(alerts) as alerts sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance

[invalid_certificate_check]
title = Invalid TLS Certificates
category = Security
tags = ssl, splunk_10_0
description = Evaluates for the presence of any TLS or SSL alerts which indicate an invalid certificate in the last hour, and marks as Critical if any are present.
failure_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because a server or client certificate was not valid.
suggested_action = Confirm that the peer certificate is readable and valid. If the peer is a Splunk platform node, you can use the 'splunk cmd openssl' CLI command to perform this check. Confirm that the certificate is not expired and verify that the system clocks on both the server and client nodes are in sync.
doc_link =
doc_title =
applicable_to_groups =
search = index=_internal source=*splunkd.log* "Received fatal SSL3 alert" earliest=-60m \
    | rex "ssl_state='(?<ssl_state>[^']+)'.*alert_description='(?<alert>[^']+)'" \
    | where alert in ("certificate unknown", "certificate expired", "bad certificate") \
    | stats values(alert) AS alerts, count AS sixty_min_event_count BY host \
    | eval alerts = mvjoin(alerts, ", ") \
    | eval severity_level = 3 \
    | table host, alerts, sixty_min_event_count, severity_level \
    | rename host as instance \
    | table instance, alerts, sixty_min_event_count, severity_level \
    | append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="" alerts \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance alerts sixty_min_event_count severity_level] \
    | stats values(alerts) as alerts sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance

[unknown_ca_check]
title = Unknown Certificate Authority Certificates
category = Security
tags = ssl, configuration, splunk_10_0
description = Evaluates for the presence of any TLS or SSL alerts which indicate that an unknown certificate authority (CA) certificate was encountered in the last hour, and marks as Critical if any are present.
failure_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because it could not find one or more valid certificate authority (CA) certificate(s) in the trust store to verify the certificate it was presented.
suggested_action = Confirm that the Splunk platform instance has the 'sslRootCAPath' setting configured in the appropriate configuration file stanza. If no valid certificate authority (CA) certificate file exists in the certificate trust store, add one. If a CA certificate already exists in the trust store, verify that it is readable, using the 'splunk cmd openssl' CLI command where available. Confirm that all CA certificates contain the X.509 v3 basicConstraint field with a value of "CA:TRUE".
doc_link =
doc_title =
applicable_to_groups =
search = index=_internal source=*splunkd.log* "Received fatal SSL3 alert" "alert_description='unknown CA'" earliest=-60m \
    | stats count AS sixty_min_event_count BY host \
    | eval alerts = mvjoin(alerts, ", ") \
    | eval severity_level = 3 \
    | table host, sixty_min_event_count, severity_level \
    | rename host as instance \
    | table instance, sixty_min_event_count, severity_level \
    | append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance sixty_min_event_count severity_level] \
    | stats sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance

[common_name_mismatch_check]
title = Certificate Common Name Mismatches
category = Security
tags = ssl, splunk_10_0
description = Evaluates for the presence of any events which indicate a certificate common name mismatch during certificate name validation in the last hour, and marks as Critical if any are present.
failure_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because it received a certificate with a common name (CN) that did not match the value it expected.
suggested_action = Review the value for the 'sslCommonNameToCheck' setting in the configuration stanza that corresponds to the channel that produces this error. Next, verify the CN of the certificate that is presented in the TLS handshake. These values must match. If they do not, then configure the 'sslCommonNameToCheck' value to match the certificate CN or replace the certificate with one that has a CN that matches the value for 'sslCommonNameToCheck'.
doc_link =
doc_title =
applicable_to_groups =
search = index=_internal source=*splunkd.log* "X509 certificate" "did not match any allowed names" earliest=-60m \
    | rex "CN=(?<common_name>[^)]+).*allowed names \((?<allowed_names>[^)]+)\)"\
    | eval observed_cn_vs_allowed = "{CN: " . common_name . "; Allowed CNs: " . allowed_names . "}" \
    | stats values(observed_cn_vs_allowed) AS observed_cns_vs_allowed BY host \
    | eval observed_cns_vs_allowed = mvjoin(observed_cns_vs_allowed, ", ") \
    | eval severity_level = 3 \
    | table host, observed_cns_vs_allowed, severity_level \
    | rename host as instance \
    | append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level \
    | fillnull value="" observed_cns_vs_allowed \
    | table instance observed_cns_vs_allowed severity_level] \
    | stats values(observed_cns_vs_allowed) as observed_cns_vs_allowed sum(severity_level) as severity_level by instance

[incorrect_tls_protocol_version_check]
title = Incorrect TLS Protocol Versions
category = Security
tags = ssl, configuration, splunk_10_0
description = Evaluates for the presence of any events which indicate that a TLS handshake was attempted where the server and client do not share a common TLS version in the last hour, and marks as Critical if any are present.
failure_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because it and a peer did not share a common TLS version during the protocol message exchange.
suggested_action = Verify that the client initiates TLS connections using TLS version 1.2. If it does not, update the client configuration. On the Splunk platform instance, verify that the 'sslVersions' in the respective configuration file stanza has a value of "tls1.2".
doc_link =
doc_title =
applicable_to_groups =
search = index=_internal source=*splunkd.log* ("Received fatal SSL3 alert" AND "alert_description='protocol version'") OR "SSL23_GET_CLIENT_HELLO:unknown protocol" earliest=-60m \
    | stats count AS sixty_min_event_count BY host \
    | eval alerts = mvjoin(alerts, ", ") \
    | eval severity_level = 3 \
    | table host, sixty_min_event_count, severity_level \
    | rename host as instance \
    | table instance, sixty_min_event_count, severity_level \
    | append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance sixty_min_event_count severity_level] \
    | stats sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance

[cipher_suite_mismatch_check]
title = TLS Cipher Suite Mismatches
category = Security
tags = ssl, configuration, splunk_10_0
description = Evaluates for the presence of any events which indicate a mismatch in the supported ciphers between the server and client in the last hour, and marks as Critical if any are present.
failure_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because its configuration and the configuration of the connecting client did not contain any mutually shared ciphers for the TLS version that was used during the connection attempt.
suggested_action = Inspect the 'sslVersions' and 'cipherSuite' setting values in the server configuration stanza which corresponds to the channel that produces this error. Additionally, review the supported TLS protocol versions and ciphers for this channel as well as the TLS configuration on the client. Determine the highest mutually-shared TLS protocol version between the server and the client. Next, check that there is at least one mutually-shared cipher between the server and the client that is compatible with this version of TLS. If there is not, add at least one such cipher to the configurations of both the server and the client for the version of TLS that both mutually share.
doc_link =
doc_title =
applicable_to_groups =
search = index=_internal source=*splunkd.log* "ssl3_get_client_hello:no shared cipher" earliest=-60m \
    | stats count AS sixty_min_event_count BY host \
    | eval alerts = mvjoin(alerts, ", ") \
    | eval severity_level = 3 \
    | table host, sixty_min_event_count, severity_level \
    | rename host as instance \
    | table instance, sixty_min_event_count, severity_level \
    | append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance sixty_min_event_count severity_level] \
    | stats sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance

[mtls_certificate_verification_failure_check]
title = Mutual TLS (mTLS) Certificate Verification Failures
category = Security
tags = ssl, splunk_10_0
description = Evaluates for the presence of any events which indicate a failed client certificate verification for mutual transport layer security (mTLS) in the last hour, and marks as Critical if any are present.
failure_text = Within the last 60 minutes, this Splunk platform instance could not complete a mutual TLS handshake because it failed to verify the certificate that a connecting client presented.
suggested_action = Confirm that the client certificate is readable and valid. If the client is a Splunk platform node, use the 'splunk cmd openssl' CLI command. Confirm that the certificate is not expired and verify that the system clocks on both the server and client nodes are in sync. Verify that the client certificate common name (CN) matches the value for the 'sslCommonNameToCheck' setting in the server.conf configuration file stanza on the server. Verify that the client presents a certificate authority (CA) certificate chain with at least one CA certificate that is present in the server CA trust store.
doc_link =
doc_title =
applicable_to_groups =
search = index=_internal source=*splunkd.log* "ssl3_get_client_certificate:certificate verify failed" earliest=-60m \
    | stats count AS sixty_min_event_count BY host \
    | eval alerts = mvjoin(alerts, ", ") \
    | eval severity_level = 3 \
    | table host, sixty_min_event_count, severity_level \
    | rename host as instance \
    | table instance, sixty_min_event_count, severity_level \
    | append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance sixty_min_event_count severity_level] \
    | stats sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance

[mtls_missing_client_certificate_check]
title = Mutual TLS (mTLS) Missing Client Certificates
category = Security
