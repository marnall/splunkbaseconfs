[missing_cipher_check]
title = Missing TLS Ciphers
category = Security
tags = ssl, configuration, splunk_10_0
description = This checks for the presence of any events which indicate that no ciphers compatible with the TLS version attempting to be used are present in the configuration in the last hour, and marks as Critical if any are present.
failure_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because its configuration did not contain any ciphers that were compatible with the TLS version that was used during the connection attempt.
suggested_action = Inspect the 'sslVersions', 'sslVersionsforClient', and 'cipherSuite' setting values in the client configuration stanza which corresponds to the channel that produces this error. Then, determine the highest version of TLS that the client is configured to use. Next, confirm that there is at least one cipher that is compatible with this version of TLS in the 'cipherSuites' setting. If there is not, add at least one such cipher to the client configuration. Finally, confirm that the server TLS configuration also includes these ciphers.
doc_link =
doc_title =
applicable_to_groups =
search = index=_internal source=*splunkd.log* "SSL23_CLIENT_HELLO:no ciphers available" earliest=-60m \
    | stats count AS sixty_min_event_count BY host \
    | eval alerts = mvjoin(alerts, ", ") \
    | eval severity_level = 3 \
    | table host, sixty_min_event_count, severity_level \
    | rename host as instance \
    | table instance, sixty_min_event_count, severity_level \
    | append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance sixty_min_event_count severity_level] \
    | stats sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance

[missing_x509_ca_basic_constraint_check]
title = Certificate Authority Certificates with Missing CA:TRUE basicConstraint X.509 v3 Extensions
category = Security
tags = ssl, splunk_10_0
description = Evaluates for the presence of any events which indicate that a certificate authority (CA) certificate file is missing the "CA:TRUE" basicConstraint X.509 v3 extension in the last hour, and marks as Critical if any are present.
failure_text = Within the last 60 minutes, this Splunk platform instance did not load a certificate authority certificate file because the certificate did not contain the "CA:TRUE" basicConstraint X.509 v3 extension.
suggested_action = Inspect the certificate in the Splunk platform instance certificate authority (CA) trust store. Confirm if that certificate contains an X.509 v3 basicConstraint field with a value of "CA:TRUE". If it does not, replace the certificate with one that does.
doc_link =
doc_title =
applicable_to_groups =
search = index=_internal source=*splunkd.log* "not a valid Certificate Authority (CA)" "required=X509_CA_V3_basicConstraints" earliest=-60m \
    | stats count AS sixty_min_event_count BY host \
    | eval alerts = mvjoin(alerts, ", ") \
    | eval severity_level = 3 \
    | table host, sixty_min_event_count, severity_level \
    | rename host as instance \
    | table instance, sixty_min_event_count, severity_level \
    | append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance sixty_min_event_count severity_level] \
    | stats sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance

[end_of_life_splunk_built_apps]
title = Splunk-built Apps at End of Life
category = Security
tags = app_compatibility, splunk_10_0
description = Evaluates for the presence of Splunk-built apps that have reached end of life and marks as Warning if any are present.
failure_text = Found one or more apps that have reached end of life.
suggested_action = Uninstall these apps.
doc_link =
doc_title =
search = | rest /services/apps/local splunk_server=* \
    | table title, label, author, version, splunk_server \
    | join splunk_server type=outer \
    [| rest /services/server/info splunk_server=* \
    | fields splunk_server fips_mode \
    | stats count by splunk_server fips_mode \
    | fields splunk_server fips_mode] \
    | eval split_version = split(version, ".") \
    | eval installed_major = mvindex(split_version, 0) \
    | eval installed_minor = mvindex(split_version, 1) \
    | eval installed_patch = mvindex(split_version, 2) \
    | fields - split_version \
    | fields title, label, author, version, splunk_server installed_major installed_minor installed_patch \
    | eval splunk_server=if(like(splunk_server,"idx%"),"all indexers", splunk_server) \
    | lookup splunk-upgrade-readiness-checks-installed-apps title \
    | search check_eol_apps=* OR check_compatible_app_version=* OR check_fips_compatible_app_version=* OR check_fips_incompatible_app=* \
    | eval status=if(check_eol_apps="TRUE","non-conforming","conforming") \
    | rename splunk_server AS instance \
    | eval metric = "appid=" + title + ", app_version=" + version \
    | eval severity_level = if(status="conforming","0", "2") \
    | rename title as app_id \
    | table app_id instance, metric, severity_level \
    | stats values(instance) as instances max(severity_level) as severity_level by app_id metric

[known_outdated_splunk_built_app_versions]
title = Known Outdated Splunk-built App Versions
category = Security
tags = app_compatibility, splunk_10_0
description = Evaluates for the presence of compatibility issues between certain Splunk-built apps and upcoming Splunk platform versions and marks as Warning if any are present.
failure_text = Found one or more apps that are incompatible with an upcoming version of the Splunk platform.
suggested_action = Update these apps to at least the indicated version, and ideally to the latest version.
doc_link =
doc_title =
search = | rest /services/apps/local splunk_server=* \
    | table title, label, author, version, splunk_server \
    | eval split_version = split(version, ".") \
    | eval installed_major = mvindex(split_version, 0) \
    | eval installed_minor = mvindex(split_version, 1) \
    | eval installed_patch = mvindex(split_version, 2) \
    | fields - split_version \
    | fields title, label, author, version, splunk_server installed_major installed_minor installed_patch \
    | lookup splunk-upgrade-readiness-checks-installed-apps title \
    | search check_eol_apps=* OR check_compatible_app_version=* OR check_fips_compatible_app_version=* OR check_fips_incompatible_app=* \
    | eval splunk_check_compatible_app_version = split(check_compatible_app_version, ".") \
    | eval check_major = mvindex(splunk_check_compatible_app_version, 0) \
    | eval check_minor = mvindex(splunk_check_compatible_app_version, 1) \
    | eval check_patch = mvindex(splunk_check_compatible_app_version, 2) \
    | fields - split_version \
    | eval status=if((installed_major<check_major) OR (installed_major=check_major AND installed_minor<check_minor) OR (installed_major=check_major AND installed_minor=check_minor AND installed_patch<check_patch),"non-conforming", "conforming") \
    | eval outdated_apps=if(status=="non-conforming",label." needs to update to version ".check_compatible_app_version." or higher. Currently version ".version, label." is at a conforming version.") \
    | rename splunk_server AS instance \
    | rename outdated_apps as metric, title as app_id \
    | eval severity_level = if(status=="conforming", "0", "2") \
    | table app_id, instance, metric, severity_level \
    | stats values(instance) as instances max(severity_level) as severity_level by app_id metric

[fips_incompatible_apps]
title = FIPS-incompatible Splunk-built Apps
category = Security
