doc_link =
doc_title =
search = | rest /services/apps/local splunk_server=* \
    | table title, label, author, version, splunk_server \
    | join splunk_server type=outer \
    [| rest /services/server/info splunk_server=* \
    | fields splunk_server fips_mode \
    | stats count by splunk_server fips_mode \
    | fields splunk_server fips_mode] \
    | eval split_version = split(version, ".") \
    | eval installed_major = mvindex(split_version, 0) \
    | eval installed_minor = mvindex(split_version, 1) \
    | eval installed_patch = mvindex(split_version, 2) \
    | fields - split_version \
    | fields title, label, fips_mode, author, version, splunk_server \
    | lookup splunk-upgrade-readiness-checks-installed-apps title \
    | search check_eol_apps=* OR check_compatible_app_version=* OR check_fips_compatible_app_version=* OR check_fips_incompatible_app=* \
    | eval status=if(check_fips_incompatible_app=="TRUE", "non-conforming", "conforming") \
    | rename splunk_server AS instance \
    | rename title AS metric \
    | eval app_id=metric \
    | eval severity_level = if(status=="conforming", "0","2") \
    | stats values(instance) as instances max(severity_level) as severity_level by app_id metric

[known_outdated_splunk_built_app_versions_for_fips]
title = Known Outdated Splunk-built App Versions for FIPS
category = Security
tags = app_compatibility, splunk_10_0, fips_140_3
description = Evaluates for the presence of Splunk-built apps that are compatible with the Splunk platform when it runs in FIPS mode and marks as warning if any present.
failure_text = Found one or more apps whose installed versions are incompatible with the Splunk platform when it runs in FIPS mode.
suggested_action = Update detected apps to at least the indicated version, and ideally to the latest version.
doc_link =
doc_title =
search = | rest /services/apps/local splunk_server=* \
    | table title, label, author, version, splunk_server \
    | join splunk_server type=outer \
    [| rest /services/server/info splunk_server=* \
    | fields splunk_server fips_mode \
    | stats count by splunk_server fips_mode \
    | fields splunk_server fips_mode] \
    | eval split_version = split(version, ".") \
    | eval installed_major = mvindex(split_version, 0) \
    | eval installed_minor = mvindex(split_version, 1) \
    | eval installed_patch = mvindex(split_version, 2) \
    | fields title, label, fips_mode, author, version, splunk_server installed_major installed_minor installed_patch \
    | lookup upgrade_readiness_app_checks.csv title \
