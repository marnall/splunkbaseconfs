[incomplete_app_kv_store_settings_check]
title = Incomplete App Key Value Store (KV Store) TLS Settings
category = Security
tags = splunk_10_4, kvstore
description = Evaluates whether or not TLS configurations for KV Store that appear under the `[kvstore]` stanza of the server.conf configuration file are configured in a way that can change network connectivity behavior for KV Store over TLS after an upgrade to Splunk Enterprise version 10.4, and marks as Critical if any such configuration is present. In Splunk Enterprise versions 10.0 and 10.2, KV Store applied TLS settings in the `[kvstore]` stanza only when all required settings were present there: otherwise, it used settings that were defined in the `[SSLConfig]` stanza. In Splunk Enterprise 10.4, KV Store evaluates each TLS-related setting independently regardless of stanza location, which means that it now applies partially-defined settings that it previously ignored.
failure_text = Found a partially-defined configuration for network connections for KV Store over TLS under the [kvstore] stanza of the server.conf configuration file. This incomplete configuration could cause KV Store to fail after an upgrade to Splunk Enterprise version 10.4. In the current configuration, KV Store ignores some TLS-related settings under the [kvstore] stanza if they exist, such as ‘serverCert’, ‘sslPassword’, ‘sslVerifyServerCert’, ‘caCertPath’, and ‘caCertFile’, and uses the same settings as defined under the [sslConfig] stanza instead. Beginning with Splunk Enterprise version 10.4, KV Store uses any related settings it finds in the [kvstore] stanza if they exist, which could cause changes in TLS-related network connectivity behavior for KV Store after an upgrade.
suggested_action = Review the TLS-related settings in the [kvstore] stanza before starting an upgrade to Splunk Enterprise 10.4. If you want KV Store to continue to fall back to using TLS-related settings from the [sslConfig] stanza, then remove any such settings under the [kvstore] stanza first. Otherwise, verify that the settings you define in the [kvstore] stanza are complete and correct.
doc_link =
doc_title =
applicable_to_groups =
search = | rest splunk_server=* /services/configs/conf-server/kvstore \
    | appendcols [ \
        | rest splunk_server=* /services/server/info \
        | eval fipsEnabled=if(fips_mode=1 OR lower(tostring(fips_mode))="true",1,0) \
        | fields fipsEnabled \
    ] \
    | eval hasServerCert=if(isnotnull(serverCert),1,0) \
    | eval hasSslPassword=if(isnotnull(sslPassword),1,0) \
    | eval verifyValue=lower(trim(coalesce(sslVerifyServerCert,""))) \
    | eval hasVerifyTrue=if(verifyValue="true" OR verifyValue="1",1,0) \
    | eval hasCaPath=if(isnotnull(caCertPath),1,0) \
    | eval hasCaFile=if(isnotnull(caCertFile),1,0) \
    | eval hasCa=if(hasCaPath=1 OR hasCaFile=1,1,0) \
    | eval hasAny=if(hasServerCert=1 OR hasSslPassword=1 OR hasVerifyTrue=1 OR hasCa=1,1,0) \
    | eval readiness=case( \
        hasAny=0, "OK", \
        fipsEnabled=1 AND hasServerCert=1 AND hasSslPassword=1 AND hasCa=1, "OK", \
        fipsEnabled=0 AND hasServerCert=1 AND hasSslPassword=1 AND hasVerifyTrue=1 AND hasCa=1, "OK", \
        true(), "NOT_OK" \
    ) \
    | eval presentProps= \
        if(hasServerCert=1,"serverCert,","") . \
        if(hasSslPassword=1,"sslPassword,","") . \
        if(len(verifyValue)>0,"sslVerifyServerCert=" . verifyValue . ",","") . \
        if(hasCaPath=1,"caCertPath,","") . \
        if(hasCaFile=1,"caCertFile,","") \
    | eval presentProps=replace(presentProps,",$","") \
    | eval severity_level=case( \
        readiness="OK", 0, \
        readiness="NOT_OK", 3, \
        true(), 3 \
        ) \
    | table severity_level fipsEnabled readiness presentProps \

[system_python_version_in_acceptable_range_check]
title = Python Version Usage
category = Security
tags = configuration, splunk_10_0
description = Evaluates the current Python runtime environment used by each Splunk platform instance by determining the Splunk platform version and global Python runtime configuration for the usage of the Python version 3.9 environment. Marks as Critical if any instance is not configured to force usage of Python v3.9.
failure_text = One or more Spunk Instance is not using the Python 3.9 runtime environment.
suggested_action = If your Splunk platform instance runs version 9.3.x or 9.4.x, you can force usage of Python v3.9 by setting "python.version=force_python3" in the server.conf configuration file. This lets you verify app and add-on functionality before an upgrade. Splunk Enterprise version 9.2.x or lower does not include Python v3.9. Splunk Enterprise versions 9.3.x and 9.4.x do, but have the option to run lower versions of Python. If you do not know whether your app or add-on is compatible with Python v3.9, use a Splunk 10.0 lab environment to test your apps and add-ons before you upgrade production systems.
doc_link =
doc_title =
search = | rest splunk_server=* services/configs/conf-server \
    | fields splunk_server, python.version \
    | search python.version = * \
    | join type=left splunk_server \
        [| rest splunk_server=* /services/server/info \
        | fields splunk_server version ] \
    | rename splunk_server AS instance \
    | rename python.version AS python_version \
    | eval version = split(version, ".") \
    | eval major = mvindex(version, 0) \
    | eval minor = mvindex(version, 1) \
    | eval metric = case( \
        (major >= 10 OR (major = 9 AND minor >= 3)) AND python_version="force_python3", "Your Splunk platform deployment is configured to use Python 3.9.", \
        major < 8, "Your Splunk platform deployment is configured to use Python 2.7.", \
        python_version="force_python3", "Your Splunk platform deployment is configured to use Python 3.7.", \
        true(), "Your Splunk platform deployment is configured to use " . python_version . ".") \
    | eval severity_level = case( \
        metric="Your Splunk platform deployment is configured to use Python 3.9.", 0, \
        metric="Your Splunk platform deployment is configured to use Python 3.7.", 3, \
        metric="Your Splunk platform deployment is configured to use Python 2.7.", 3, \
        true(), 3) \
    | table instance python_version metric severity_level \

[python_313_incompatible]
title = Apps not configured as compatible with Python version 3.13
category = Security
tags = apps, splunk_enterprise_10_4
description = Evaluates for the presence of private and third-party apps on this instance that have not been configured as compatible with version 3.13 of the Python interpreter. Marks as Critical if any such apps exist. Excludes apps that Splunk manages, either default or Splunk-built.
failure_text = Found one or more private or third-party apps that are not configured as compatible with version 3.13 of the Python interpreter.
suggested_action = Contact the app developer for an updated version of the app that is compatible with Python version 3.13.
doc_link =
doc_title =
applicable_to_groups =
search = | rest /servicesNS/-/-/configs/conf-alert_actions splunk_server=* count=0 \
 | append [| rest /servicesNS/-/-/configs/conf-app splunk_server=* count=0] \
 | append [| rest /servicesNS/-/-/configs/conf-authentication splunk_server=* count=0] \
 | append [| rest /servicesNS/-/-/configs/conf-commands splunk_server=* count=0] \
 | append [| rest /servicesNS/-/-/configs/conf-indexes splunk_server=* count=0] \
 | append [| rest /servicesNS/-/-/configs/conf-inputs splunk_server=* count=0] \
 | append [| rest /servicesNS/-/-/configs/conf-restmap splunk_server=* count=0] \
 | append [| rest /servicesNS/-/-/configs/conf-transforms splunk_server=* count=0] \
 | rename "eai:acl.app" as appid \
 | search (python.required=* OR python.version=*) NOT python.required=*3.13* NOT python.required=*latest* NOT appid=system \
 | where isnotnull(appid) AND appid!="" \
 | dedup appid splunk_server \
 | join appid splunk_server type=inner [ \
     | rest /services/apps/local splunk_server=* \
     | rename title as appid \
     | table appid splunk_server author \
   ] \
 | lookup splunkbase-lookup app_id AS appid OUTPUT splunkbase_status \
 | eval app_category=case( \
     match(author, "(?i)^splunk"), "splunk_managed_excluded", \
     splunkbase_status="found", "third_party", \
     true(), "private" \
   ) \
 | eval severity_level = case( \
     app_category="splunk_managed_excluded", 0, \
     app_category="private" OR app_category="third_party", 2, \
     true(), 0 \
   ) \
 | where severity_level > 0 \
 | eval metric=case( \
     app_category="private", "Found that private app " . appid . " is not configured as compatible with Python version 3.13. Update the app or contact the app owner or developer.", \
     app_category="third_party", "Found that Splunkbase app " . appid . " is not configured as compatible with Python version 3.13. Update the app to a version that is Python 3.13-compatible or contact the app developer." \
   ) \
| rename splunk_server AS instance \
| append [ \
    | makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="All private and Splunkbase apps on this instance are configured as compatible with Python version 3.13." metric \
    | fillnull value="0" severity_level \
  ] \
| eventstats max(severity_level) as max_sev \
| where severity_level>0 OR max_sev=0 \
| table instance severity_level metric

[deprecated_sha1_saml_check]
title = Removed support for SHA-1 signed certificates
category = Upgrade Readiness
tags = authentication, security, splunk_10_4
description = Evaluates the SAML authentication settings for presence of a configuration that uses only Secure Hash Algorithm 1 (SHA1) signature or digest algorithms. Flags instances where SHA1 is configured without any SHA alternatives (SHA-256/384/512).
failure_text = Found a configuration in the SAML settings that uses an unsupported SHA1 signature/digest algorithm with no alternative SHA algorithms present.
suggested_action = Update the signatureAlgorithm, inboundSignatureAlgorithm, and inboundDigestMethod settings in the authentication.conf configuration file to use SHA-256 or stronger signatures or digest algorithms. Then, reissue and migrate to certificates that certificate authorities have signed with SHA-256 or stronger signatures or digest algorithms.
doc_link =
doc_title =
applicable_to_groups =
search = | rest splunk_server=* /services/configs/conf-authentication \
    | eval sig = lower(coalesce(signatureAlgorithm,"")) \
    | eval in_sig = lower(coalesce(inboundSignatureAlgorithm,"")) \
    | eval in_dig = lower(coalesce(inboundDigestMethod,"")) \
    | eval affected = case( \
        (like(sig,"%sha1%") OR like(sig,"%rsa-sha1%")) \
            AND NOT like(sig,"%sha256%") AND NOT like(sig,"%sha384%") AND NOT like(sig,"%sha512%"), 1, \
        (like(in_sig,"%sha1%") OR like(in_sig,"%rsa-sha1%")) \
            AND NOT like(in_sig,"%sha256%") AND NOT like(in_sig,"%sha384%") AND NOT like(in_sig,"%sha512%"), 1, \
        (like(in_dig,"%sha1%") OR like(in_dig,"%rsa-sha1%")) \
            AND NOT like(in_dig,"%sha256%") AND NOT like(in_dig,"%sha384%") AND NOT like(in_dig,"%sha512%"), 1, \
        1=1, 0) \
    | stats max(affected) as affected \
        values(signatureAlgorithm) as signatureAlgorithm \
        values(inboundSignatureAlgorithm) as inboundSignatureAlgorithm \
        values(inboundDigestMethod) as inboundDigestMethod \
    by splunk_server \
    | eval severity_level=case( \
        affected=1, 3, \
        true(), 0 \
    ) \
    | where affected=1 \
    | eval check="saml_sha1_only" \
    | rename splunk_server as instance \
    | table instance check affected signatureAlgorithm inboundSignatureAlgorithm inboundDigestMethod severity_level

[deprecated_duo_traditional_prompt_check]
title = Removed support for Duo Traditional Prompt
category = Upgrade Readiness
tags = authentication, security, splunk_10_4
description = Evaluates for the presence of a multifactor authentication configuration that uses Duo Traditional Prompt, which relies on the deprecated Secure Hash Algorithm 1 (SHA1). Marks as Warning if such a configuration exists.
failure_text = Found that this instance uses Duo Traditional Prompt for multifactor authentication.
suggested_action = Reconfigure the instance to use Duo Universal Prompt for multifactor authentication.
doc_link =
doc_title =
applicable_to_groups =
search = | rest splunk_server=* /services/admin/Duo-MFA \
 | eval affected = case(isnull(universalPrompt) OR lower(universalPrompt) IN ("false","0"), 1, 1==1, 0) \
 | where affected=1 \
 | eval check="duo_traditional_prompt" \
 | eval splunk_server=coalesce(splunk_server, serverName, host) \
 | eval severity_level=2 \
 | rename splunk_server as instance \
 | table instance check affected title apiHostname universalPrompt severity_level