[check_point_block]
is_custom = 1
label = Block an IP address.
description = Blocks an IPv4 address from configured Check Point firewall. Leave time_to_block blank to use default.
icon_path = appIcon.png
payload_format = json
command = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.action_name=$action_name$ | stats count
python.version = python3

# Default value for time_to_block
param.time_to_block =
param.ip =
param.ip_field = src
param._cam = {\
    "category": ["Information Gathering"],\
    "task": ["block"],\
    "subject": ["splunk.event"],\
    "technology": [{"vendor": "Check Point", "product": "Firewall", "version": "1"}],\
    "drilldown_uri": "../my_app/my_view?form.orig_sid=$sid$&form.orig_rid=$rid$",\
    "supports_adhoc": true\
}


