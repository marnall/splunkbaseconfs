[execute_check_point_block]
display_location = both
fields = *
label = (Non-IR) Issue a block command of IP: $@field_value$ to configured Check Point system
search.earliest = -24h
search.preserve_timerange = 0
search.search_string = | sendalert check_point_block  param.ip="$@field_value$" param.time_to_block="" param.action_name=check_point_block
search.target = blank
type = search
