[syslog]
EXTRACT-vmw_nsxt_audit_operation_status = status(:'|=")(?<vmw_nsxt_audit_operation_status>\w+)('|")
EXTRACT-vmw_nsxt_display_name = "display_name":"(?<vmw_nsxt_display_name>[\w \\']+)"
EXTRACT-vmw_nsxt_firewall_reason = (?:INET|INET6)\s(?<vmw_nsxt_firewall_reason>.*)\s(?:PASS|DROP|REJECT|GOTO_FILTER)
EXTRACT-vmw_nsxt_firewall_action = (?:match|TERM|L7 Rule pending)\s(?<vmw_nsxt_firewall_action>\w+)\s(?:\d+)
EXTRACT-vmw_nsxt_firewall_dst = [A-Fa-f\d]+->(?<vmw_nsxt_firewall_dst>[A-Fa-f\d\.:]+)( |/|$)
EXTRACT-vmw_nsxt_firewall_dst_ip_port = [A-Fa-f\d]+->(?<vmw_nsxt_firewall_dst_ip_port>[A-Fa-f\d\.:]+/\d+)( |$)
EXTRACT-vmw_nsxt_firewall_dst_port = [A-Fa-f\d]+->[A-Fa-f\d\.:]+/(?<vmw_nsxt_firewall_dst_port>-?\d+)( |$)
EXTRACT-vmw_nsxt_firewall_src = \S+\s+(?<vmw_nsxt_firewall_src>[A-Fa-f\d\.:]+)(/|->)
EXTRACT-vmw_nsxt_firewall_protocol = (IN|OUT) (\d+ )?(?<vmw_nsxt_firewall_protocol>(TCP6?|UDP6?|ICMP|PROTO6? \d+))\s
EXTRACT-vmw_nsxt_fw_client_server_bytes = \s(?<vmw_nsxt_fw_client_server_bytes>-?\d+)/\d+.*$
EXTRACT-vmw_nsxt_fw_server_client_bytes = \s\d+/(?<vmw_nsxt_fw_server_client_bytes>-?\d+).*$
EXTRACT-vmw_nsxt_operation = Operation(:'|=")(?<vmw_nsxt_operation>\w+)('|")
EXTRACT-vmw_nsxt_user = UserName(:'|=")(?<vmw_nsxt_user>.+?)('|")
EXTRACT-vmw_nsxt_ulog_event_type = event_type":\s+"(?<vmw_nsxt_ulog_event_type>\w+)",\s+"event_trigger
EXTRACT-vmw_nsxt_ulog_origin_fw_type = fw_type":\s+"(?<vmw_nsxt_ulog_origin_fw_type>\w+)",\s+"fw_uuid
EXTRACT-vmw_nsxt_ulog_origin_fw_uuid = fw_uuid":\s+"(?<vmw_nsxt_ulog_origin_fw_uuid>[A-Fa-f\d\-]+)",\s+"node_uuid
EXTRACT-vmw_nsxt_ulog_flow_start = start":\s+"(?<vmw_nsxt_ulog_flow_start>[-\d\:\.TZ]+)",\s+"end
EXTRACT-vmw_nsxt_ulog_flow_end = end":\s+"(?<vmw_nsxt_ulog_flow_end>[-\d\:\.TZ]+)",\s+"ip_ver
EXTRACT-vmw_nsxt_ulog_flow_ip_ver = ip_ver":\s+"(?<vmw_nsxt_ulog_flow_ip_ver>ipv\d)",\s+"flow_id
EXTRACT-vmw_nsxt_ulog_flow_src_ip = src_ip":\s+"(?<vmw_nsxt_ulog_flow_src_ip>[A-Fa-f\d\.:]+)",\s+"src_port
EXTRACT-vmw_nsxt_ulog_flow_src_port = src_port":\s+(?<vmw_nsxt_ulog_flow_src_port>-?\d+),\s+"dest_ip
EXTRACT-vmw_nsxt_ulog_flow_dest_ip = dest_ip":\s+"(?<vmw_nsxt_ulog_flow_dest_ip>[A-Fa-f\d\.:]+)",\s+"dest_port
EXTRACT-vmw_nsxt_ulog_flow_dest_port = dest_port":\s+(?<vmw_nsxt_ulog_flow_dest_port>-?\d+),\s+"proto
EXTRACT-vmw_nsxt_ulog_flow_proto = proto":\s+"(?<vmw_nsxt_ulog_flow_proto>\w+)",\s+"tcp_flags
EXTRACT-vmw_nsxt_ulog_bytes_toserver = bytes_toserver":\s+(?<vmw_nsxt_ulog_bytes_toserver>-?\d+),\s+"bytes_toclient
EXTRACT-vmw_nsxt_ulog_bytes_toclient = bytes_toclient":\s+(?<vmw_nsxt_ulog_bytes_toclient>-?\d+),\s+"
EXTRACT-vmw_nsxt_ulog_flow_final_action = final_action":\s+"(?<vmw_nsxt_ulog_flow_final_action>\w+)"\s?}
EXTRACT-vmw_nsxt_ulog_fw_action = action":\s+"(?<vmw_nsxt_ulog_fw_action>\w+)",\s+"rule_id
EXTRACT-vmw_nsxt_ulog_fw_rule_id = rule_id":\s+(?<vmw_nsxt_ulog_fw_rule_id>-?\d+),\s+"direction
EXTRACT-vmw_nsxt_ulog_fw_rule_tag = rule_tag":\s+"(?<vmw_nsxt_ulog_fw_rule_tag>\w+)"\s?}
EXTRACT-vmw_nsxt_ulog_l7profile_entry_id = entry_id":\s+(?<vmw_nsxt_ulog_l7profile_entry_id>\+d),\s+"action
EXTRACT-vmw_nsxt_ulog_l7profile_action = action":\s+"(?<vmw_nsxt_ulog_l7profile_action>\w+)"\s?}
EXTRACT-vmw_nsxt_ulog_http_method = http_method":\s+"(?<vmw_nsxt_ulog_http_method>\w+)",\s+"hostname
EXTRACT-vmw_nsxt_ulog_http_hostname = hostname":\s+"(?<vmw_nsxt_ulog_http_hostname>\w+)",\s+"url
EXTRACT-vmw_nsxt_ulog_http_url = url":\s+"(?<vmw_nsxt_ulog_http_url>\w+)",\s+"scheme
EXTRACT-vmw_nsxt_ulog_http_scheme = scheme":\s+"(?<vmw_nsxt_ulog_http_scheme>\w+)",\s+"http_user_agent
EXTRACT-vmw_nsxt_ulog_http_user_agent = http_user_agent":\s+"(?<vmw_nsxt_ulog_http_user_agent>\w+)",\s+"status
EXTRACT-vmw_nsxt_ulog_http_status = status":\s+"(?<vmw_nsxt_ulog_http_status>\w+)",\s+"site_category
EXTRACT-vmw_nsxt_ulog_tls_action = action":\s+"(?<vmw_nsxt_ulog_tls_action>\w+)",\s+"rule_id
EXTRACT-vmw_nsxt_ulog_tls_rule_id = rule_id":\s+(?<vmw_nsxt_ulog_tls_rule_id>-?\d+),\s+"domain
EXTRACT-vmw_nsxt_ulog_tls_domain = domain":\s+"(?<vmw_nsxt_ulog_tls_domain>\w+)",\s+"cert_status
EXTRACT-vmw_nsxt_ulog_idps_action = action":\s+"(?<vmw_nsxt_ulog_idps_action>\w+)",\s+"rule_id
EXTRACT-vmw_nsxt_ulog_idps_rule_id = rule_id":\s+(?<vmw_nsxt_ulog_idps_rule_id>-?\d+),\s+"ids_profile_id
EXTRACT-vmw_nsxt_ulog_app_id_app = app":\s+"(?<vmw_nsxt_ulog_app_id_app>\w+)"\s?}
EXTRACT-vmw_nsxt_ulog_antimalware_sha256 = filehash_sha256":\s+"(?<vmw_nsxt_ulog_antimalware_sha256>\w+)",\s+"file_name
EXTRACT-vmw_nsxt_ulog_antimalware_file = file_name":\s+"(?<vmw_nsxt_ulog_antimalware_file>\w+)",\s+"file_size
EXTRACT-vmw_nsxt_ulog_antimalware_verdic = verdict":\s+"(?<vmw_nsxt_ulog_antimalware_verdic>\w+)",\s+"action
EXTRACT-vmw_nsxt_ulog_antimalware_action = action":\s+"(?<vmw_nsxt_ulog_antimalware_action>\w+)",\s+"verdict_source
SHOULD_LINEMERGE = False
REPORT-getfields = syslog_fields
TRANSFORMS-gethost = nsx_hostname
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TZ = UTC
