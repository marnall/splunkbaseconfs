[vsftpd:log]
EVAL-action = if(isnotnull(vendor_action),case(vendor_action=="UPLOAD", "created", vendor_action=="DOWNLOAD","read", vendor_action=="RENAME", "modified", vendor_action=="DELETE","deleted", vendor_action=="MKDIR", "created", vendor_action=="RMDIR", "deleted",vendor_action=="LOGIN" and vendor_result=="OK", "success", vendor_action=="LOGIN" and vendor_result=="FAIL", "failure", 1==1, null()), "unkown")
EVAL-app = vendor_product
EVAL-change_type = if(isnotnull(vendor_action),case(vendor_action=="UPLOAD" OR vendor_action=="DOWNLOAD" OR vendor_action=="RENAME" OR vendor_action=="DELETE" OR vendor_action=="MKDIR" OR vendor_action=="RMDIR", "filesystem", vendor_action="LOGIN", "AAA", 1=1,null()),null())
EVAL-command = if(vendor_result=="FTP", vendor_result + " "+ vendor_action, vendor_action)
EVAL-file_name = if(isnotnull(vendor_action),case(vendor_action=="RENAME",replace(split(replace(if(isnotnull(vendor_action),case(vendor_action=="UPLOAD" OR vendor_action=="DOWNLOAD" OR vendor_action=="RENAME" OR vendor_action=="DELETE" OR vendor_action=="MKDIR" OR vendor_action=="RMDIR", cmd, 1=1,null()),null()) , " /", " //"), " /"), ".*/", ""),vendor_action!="FTP",replace(if(isnotnull(vendor_action),case(vendor_action=="UPLOAD" OR vendor_action=="DOWNLOAD" OR vendor_action=="RENAME" OR vendor_action=="DELETE" OR vendor_action=="MKDIR" OR vendor_action=="RMDIR", cmd, 1=1,null()),null()) , ".*/", ""),1==1,null()),null())
EVAL-file_path = if(isnotnull(vendor_action),case(vendor_action=="UPLOAD" OR vendor_action=="DOWNLOAD" OR vendor_action=="RENAME" OR vendor_action=="DELETE" OR vendor_action=="MKDIR" OR vendor_action=="RMDIR", cmd, 1=1,null()),null())
EVAL-file_size = size/1024
EVAL-object_category = case(isnotnull(if(isnotnull(vendor_action),case(vendor_action=="RENAME",replace(split(replace(if(isnotnull(vendor_action),case(vendor_action=="UPLOAD" OR vendor_action=="DOWNLOAD" OR vendor_action=="RENAME" OR vendor_action=="DELETE" OR vendor_action=="MKDIR" OR vendor_action=="RMDIR", cmd, 1=1,null()),null()) , " /", " //"), " /"), ".*/", ""),vendor_action!="FTP",replace(if(isnotnull(vendor_action),case(vendor_action=="UPLOAD" OR vendor_action=="DOWNLOAD" OR vendor_action=="RENAME" OR vendor_action=="DELETE" OR vendor_action=="MKDIR" OR vendor_action=="RMDIR", cmd, 1=1,null()),null()) , ".*/", ""),1==1,null()),null())) and (vendor_action=="UPLOAD" or vendor_action=="DELETE" or vendor_action=="DOWNLOAD" or vendor_action=="RENAME") ,"file", isnotnull(if(isnotnull(vendor_action),case(vendor_action=="RENAME",replace(split(replace(if(isnotnull(vendor_action),case(vendor_action=="UPLOAD" OR vendor_action=="DOWNLOAD" OR vendor_action=="RENAME" OR vendor_action=="DELETE" OR vendor_action=="MKDIR" OR vendor_action=="RMDIR", cmd, 1=1,null()),null()) , " /", " //"), " /"), ".*/", ""),vendor_action!="FTP",replace(if(isnotnull(vendor_action),case(vendor_action=="UPLOAD" OR vendor_action=="DOWNLOAD" OR vendor_action=="RENAME" OR vendor_action=="DELETE" OR vendor_action=="MKDIR" OR vendor_action=="RMDIR", cmd, 1=1,null()),null()) , ".*/", ""),1==1,null()),null())) and (vendor_action=="MKDIR" or vendor_action=="RMDIR") ,"directory", 1==1, null())
EVAL-object_path = if(isnotnull(vendor_action),case(vendor_action=="UPLOAD" OR vendor_action=="DOWNLOAD" OR vendor_action=="RENAME" OR vendor_action=="DELETE" OR vendor_action=="MKDIR" OR vendor_action=="RMDIR", cmd, 1=1,null()),null())
EVAL-status = if(isnotnull(vendor_result),case(vendor_result=="OK","success",vendor_result=="FAIL","failure", 1==1, null()), null())
EVAL-vendor_product = "vsftpd"
FIELDALIAS-aob_gen_vsftpd_log_alias_3 = src_ip AS src
FIELDALIAS-aob_gen_vsftpd_log_alias_4 = host AS dest
MAX_TIMESTAMP_LOOKAHEAD = 32
SHOULD_LINEMERGE = 0
TIME_FORMAT = %A %b %d %H:%M:%S %Y
category = Application
pulldown_type = 1
EXTRACT-pid,user,result,vendor_action,src_ip,cmd,size,speed,speed_unit = ^[^\[]+ \[pid (?<pid>\d+)\] (\[(?<user>\w+)\])?\s?(?<vendor_result>\w+)\s?(?<vendor_action>[^:]+)?: Client \"(?<src_ip>[^\"]+)(\", \"(?<cmd>.+)(\"$|\", )((?<size>\d+) bytes, (?<speed>\d+.\d+)(?<speed_unit>.+$))?)?\"?$
BREAK_ONLY_BEFORE_DATE = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false

[vsftpd:xfer]
EVAL-action = case(direction="o","read",direction="i","modified")
EVAL-change_type = "filesystem"
EVAL-file_name = replace(file,".*/","")
EVAL-file_size = bytes/1024
EVAL-object_category = "file"
EVAL-status = case(completion_status="c","success",completion_status="i","failure",1==1,null())
FIELDALIAS-aob_gen_vsftpd_xfer_alias_1 = access_mode AS file_acl
FIELDALIAS-aob_gen_vsftpd_xfer_alias_2 = file AS file_path
FIELDALIAS-aob_gen_vsftpd_xfer_alias_3 = host AS dest
FIELDALIAS-aob_gen_vsftpd_xfer_alias_4 = src_ip AS src
FIELDALIAS-aob_gen_vsftpd_xfer_alias_5 = service_name AS app
MAX_TIMESTAMP_LOOKAHEAD = 32
SHOULD_LINEMERGE = 0
TIME_FORMAT = %A %b %d %H:%M:%S %Y
category = Application
pulldown_type = 1
EXTRACT-transfert_duration,src_ip,bytes,file,transfer_type,special_action_flag,direction,access_mode,user,service_name,authentication,authenticated_user_id,commpletion_status = ^([^\s]+\s+){5}(?<transfert_duration>\d+) (?<src_ip>[^ ]+) (?<bytes>[0-9.]+) (?<file>[^ ]+) (?<transfer_type>\w) (?<special_action_flag>\w) (?<direction>\w) (?<access_mode>\w) (?<user>\w+) (?<service_name>\w+) (?<authentication>\d+) (?<authenticated_user_id>[^ ]+) (?<completion_status>\w)$
BREAK_ONLY_BEFORE_DATE = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
disabled = false
