[host::*]
LOOKUP-IRS1075_assets = IRS1075_assets host AS host OUTPUTNEW is_FTI AS is_FTI is_IRS1075 AS is_IRS1075

[source::*:Security]
LOOKUP-IRS1075_groups = IRS1075_groups Group_Name AS Group_Name OUTPUTNEW is_IRS1075 AS is_IRS1075
LOOKUP-IRS1075_win_eventcode_alerts = IRS1075_win_eventcode_alerts EventCode AS EventCode OUTPUTNEW 1075_Potential_Criticalality AS 1075_Potential_Criticalality 1075_Requirement AS 1075_Requirement 1075_Requirement_Desc AS 1075_Requirement_Desc EventCode_Summary AS EventCode_Summary
EVAL-process = coalesce(New_Process_Name, ProcessName, Process_Name)

[linux_secure]
TRANSFORMS-linux_secure_extractions1 = linux_secure_user_1, linux_secure_src_user_1, linux_secure_affected_user_1, linux_secure_affected_user_action_1
TRANSFORMS-linux_secure_command_extraction1 = eval_command_extraction

[WinHostMon]
EVAL-action = coalesce(action, State)
