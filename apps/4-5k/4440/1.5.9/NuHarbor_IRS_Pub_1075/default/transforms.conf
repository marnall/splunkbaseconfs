[IRS1075_assets]
batch_index_query = 0
case_sensitive_match = 1
filename = IRS1075_assets.csv

[IRS1075_groups]
batch_index_query = 0
case_sensitive_match = 1
filename = IRS1075_groups.csv

[IRS1075_internal_ip_ranges]
batch_index_query = 0
case_sensitive_match = 1
filename = IRS1075_internal_ip_ranges.csv
match_type = CIDR(cidr_block)
max_matches = 1
min_matches = 1

[IRS1075_win_eventcode_alerts]
batch_index_query = 0
case_sensitive_match = 0
filename = IRS1075_win_eventcode_alerts.csv
max_matches = 1
min_matches = 1


[linux_secure_user_1]
REGEX = \ssession closed for user\s\K(?<user>[a-z^0-9]+)
FORMAT = user::$1

[linux_secure_src_user_1]
REGEX = \ssudo:\s\K(?<src_user>[a-z^0-9]+)
FORMAT = src_user::$1

[linux_secure_affected_user_1]
REGEX = \sCOMMAND=\/[a-z]+\/[a-z]+\/[a-z]+\s\K(?<affected_user>[a-z^0-9]+)
FORMAT = affected_user::$1

[linux_secure_affected_user_action_1]
REGEX = \sCOMMAND=\/[a-z]+\/[a-z]+\/\K(?<affected_user_action>[a-z^0-9]+)
FORMAT = affected_user_action::$1

[eval_command_extraction]
INGEST_EVAL = command=coalesce(command, COMMAND)
