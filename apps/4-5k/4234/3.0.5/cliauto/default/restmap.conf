#############################################################################
# Persistent non-EAI handler that processes CLIAuto jobs.
#
# Some additional arguments are enabled to permit the exposure of HTTP headers,
# payload, and cookies.
#
#############################################################################
[script:cliauto]
match                 = /cliauto
script                = cliauto.py
scripttype            = persist
handler               = cliauto.cliautoHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
capability            = cliauto_custom_endpoint
python.version=python3

[eai:conf-app]
capability.read=cliauto_custom_endpoint
python.version=python3

[eai:conf-cliauto]
capability.read=cliauto_custom_endpoint
python.version=python3

[eai:conf-cliauto_cmds]
capability.read=cliauto_custom_endpoint
python.version=python3
