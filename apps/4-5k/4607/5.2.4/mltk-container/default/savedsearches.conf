[DLTK Benchmark Generic]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 1640796000
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.statistics.rowNumbers = 1
display.statistics.show = 0
display.visualizations.chartHeight = 448
display.visualizations.charting.chart = bar
request.ui_dispatch_app = mltk-container
request.ui_dispatch_view = search
search = index=_internal mlspl.MLTKContainer \
| rex field=_raw "\sPID\s(?<pid>\d+)\s" \
| rex field=_raw "\s(?<status>\w+)\s\[mlspl\.MLTKContainer\]\s\[(?<function>\w+)\]\s(?<method>\w+)" \
| rex field=_raw "endpoint\s\[(?<url>.*)\]\s" \
| rex field=_raw "payload\s\((?<payload_bytes>\d+)\sbytes" \
| rex field=_raw "with\sstatus\s(?<endpoint_status>\d+)" \
| rex field=_raw "'algo':\s'(?<algorithm>.*?)'" \
| rex field=_raw "'model_name':\s'(?<model_name>.*?)'" \
| rex field=_raw "splunk/var/run/splunk/dispatch/(?<sid>.*?)'" \
| table _time pid sid status function method algorithm model_name url payload_bytes endpoint_status \
| transaction pid \
| where eventcount>1 \
| join model_name \
    [ search\
        index="mltk-container-benchmark" OR (index=_audit info=completed search_id=* search="'| `dltk_benchmark_generic_fit*") \
    | eval sid=trim(search_id,"'") \
    | eval sid=coalesce(sid,info_sid) \
    | selfjoin sid \
    | table _time sid model_name result_test_count result_test_dimensions result_test_input info_search_time info_sid info_test_result total_run_time ] \
| rename duration as duration_container_operation total_run_time as duration_total_search_run_time \
| eval duration_splunk_run_time=duration_total_search_run_time-duration_container_operation \
| eval payload_send=mvindex(payload_bytes,0) \
| eval payload_receive=mvindex(payload_bytes,1) \
| eval payload_total_transfer=payload_send+payload_receive \
| eval payload_total_transferMB=payload_total_transfer/1024.0/1024.0 \
| eval payload_throughputMBs=payload_total_transferMB/duration_container_operation\
| table _time pid sid algorithm model_name info_test_result result_test_count result_test_dimensions endpoint_status payload_* duration_* \
| sort result_test_count result_test_dimensions\
| eval sorting = result_test_count * result_test_dimensions\
| sort - sorting


[get_search_jobs_save_to_summary]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = * * * * *
dispatch.earliest_time = -1m@m
dispatch.latest_time = @m
display.general.timeRangePicker.show = 0
enableSched = 1
search = | rest /services/search/v2/jobs \
| where relative_time(now(), "-1m@m") < strptime(published,"%Y-%m-%dT%H:%M:%S.%3N+%z") \
| table search published sid author \
| regex search="fit\s+MLTKContainer.*algo" \
| rex field=search "algo=\"?(?<algo_name>[^\"\s]+)\"?" \
| lookup search_history_enabled_algos.csv algo_name \
| where algo_enabled=1 \
| eval _time = strptime(published, "%Y-%m-%dT%H:%M:%S.%Q%:z") \
| eval age = now() - _time \
| where age < 86400 \
| rename search as llm_search, author as user \
| eval uid = md5(sid) \
| table _time llm_search sid user uid \
| rex field=llm_search "(?<ischat>eval\s+ischat\s*=\s*1)" \
| eval chatid = if(isnotnull(ischat),md5(uid),"") \
| tojson llm_search output_field=search_job_search \
| table _time search_job_search sid user uid chatid \
| eval in_summary=0 \
| append \
    [ search index=summary search_job_search=* uid=* earliest=0 latest=now \
    | dedup uid \
    | table _time search_job_search sid user uid chatid \
    | eval in_summary=1 ] \
| stats max(in_summary) as in_summary first(_time) as _time first(search_job_search) as search_job_search first(sid) as sid first(user) as user first(chatid) as userid by uid\
| where in_summary=0\
| table _time search_job_search sid user uid chatid\
| collect index=summary
disabled = 1

[get_search_results_save_to_summary]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = * * * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
enableSched = 1
search = index=summary sid=* \
| stats count by sid \
| where count = 1 \
| map maxsearches=10000 search="| loadjob $sid$ | tojson output_field=inference_results | eval sid=$sid$ | fields sid inference_results | stats list(inference_results) as inference_results by sid | tojson output_field=inference_results_outer | fields - inference_results | appendcols [| rest /services/search/v2/jobs/$sid$ | fields runDuration performance.command.fit.duration_secs | tojson output_field=search_job_runtimes | fields search_job_runtimes]" \
| eval _time = now()\
| collect index=summary
disabled = 1
