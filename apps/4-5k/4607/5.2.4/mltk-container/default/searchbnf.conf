[compute-command]
syntax = compute algo:llm_rag param1:value1 param2:value2 field1 field2 
shortdesc = Computes a machine learning model with DSDL containers
description = This command is a generic command to communicate with external machine learning services as used in DSDL containers
comment1 = Example to list existing LLM models:
example1 = ... | compute algo:llm_rag_ollama_model_manager task:list model_type:LLM _time
usage = public