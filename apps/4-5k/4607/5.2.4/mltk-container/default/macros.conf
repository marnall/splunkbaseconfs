[dltk_benchmark_generic_fit(2)]
args = count,dimension
definition = makeresults count=$count$ | streamstats c as i | fields - _time | eval i=i-1 | eval s=i%$dimension$ | eval feature_{s}=0 | foreach feature_* [ eval <<FIELD>>=random()/pow(2,31)] | fields i feature_* | fit MLTKContainer algo=benchmark i from feature_* into app:benchmark_$count$x$dimension$ | eval test=if(i==predicted_i,1,0) | stats sum(test) as result_test_count | eval result_test_dimensions=$dimension$ | eval result_test_input=$count$ | eval model_name="benchmark_".result_test_input."x".result_test_dimensions | eval info_test_result=if(result_test_input==result_test_count,"PASSED","FAILED") | addinfo | eval _time=info_search_time | fields - info_m* | table _time model_name result* info*
iseval = 0

[dsdl_docker_logging_index]
definition = your_dsdl_docker_logging_index_name
iseval = 0

[search_history_isadmin]
definition = rest /services/authentication/current-context splunk_server=local | eval isadmin = if(isnotnull(mvfind(roles,"admin")),1,0) | table isadmin
iseval = 0

[search_history(1)]
args = user
definition = index=summary\
| stats first(_time) as _time first(inference_results_outer) as inference_results_outer first(search_job_search) as search_job_search first(search_job_runtimes) as search_job_runtimes first(uid) as uid first(user) as user by sid\
| search user="$user$"
iseval = 0

[search_history_format_results]
definition = | fromjson search_job_search \
| fields - search_job_search \
| fromjson inference_results_outer\
| fields - inference_results_outer \
| fromjson search_job_runtimes \
| fields - search_job_runtimes \
| fields - sid uid \
| table _time * user\
| sort - _time
iseval = 0
