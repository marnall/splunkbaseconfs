[admin:twoSteps_cloud]
match=/twoSteps_cloud
members=twoSteps_cloud_endpoint

[admin_external:twoSteps_cloud_endpoint]
handlertype = python
handlerfile = TwoSteps_setup.py
handleractions = list, edit
