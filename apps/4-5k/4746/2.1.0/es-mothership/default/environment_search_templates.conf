[Notable Events - Generator]
search_string = | `es_notable_events`

[Notable Events By Urgency - Generator]
search_string = | `es_notable_events` | search timeDiff_type=current | stats sum(count) as count by urgency | `stats2chart("urgency")`

[All Notables - Last 24 hours]
search_string = earliest=-24h `notable` | search NOT `suppression` | table _time, security_domain, rule_title, urgency, status_label, owner, bogon_ip, dest, transport, dest_port, threat_match_value, signature, src, process, infected_hosts, service, dvc, user, event_id, threat_activity
