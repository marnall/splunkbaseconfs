# props.conf

[seeker] 
TIME_PREFIX = ^\D+\[
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 34
SHOULD_LINEMERGE = False
LINE_BREAKER = ([\n\r]+)
TRUNCATE = 10000
EVAL-app = "Seeker"
EVAL-vendor = "Synopsys"
EVAL-product = "Seeker"
EVAL-vendor_product = "Synopsys Seeker"
EVAL-vendor_url = "https://www.synopsys.com/software-integrity/security-testing/interactive-application-security-testing.html"
EVAL-description = "Seeker monitors web app interactions in the background during normal testing and can quickly process hundreds of thousands of HTTP(S) requests, giving you results in seconds with near-zero false positives—no need to run manual security scans."