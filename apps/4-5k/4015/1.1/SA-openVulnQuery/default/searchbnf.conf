[ovquery-command]
syntax = ovquery get_by=<filter_string> (adv_type=<string>)? query=<string> (fields=<comma-separated-fields-list>)?
shortdesc = Queries Cisco openVuln APIT, generates Splunk events from the results returned.
description = Query Cisco's PSIRT openVuln API by providing the specific API filter (`get_by`) \
    Returned by default is fields of 'advisory_id', 'sir', 'first_published', 'last_updated', 'cves', 'bug_ids', \
    'cvss_base_score', 'advisory_title', 'publication_url', 'cwe', 'product_names', 'summary' and possibly others \
    depending on the filter, though you can specifiy only specific fields by providing a comma separated list to \
    the `fields` option. The command expects by default a `get_by` and `query` option. The `query` option will \
    depend on what the `get_by` option is set to.
usage = public
example1 = | ovquery get_by="ios_xe" query="3.7.2E"
example2 = | ovquery get_by="latest" query="10"
example3 = | ovquery get_by="cve" query="CVE-2018-0229"
