[Time Dettached by Volume - Lookup Gen]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 55 * * * *
description = Outputs a csv which contains the length of time volumes have been detached for
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = splunk_app_multicloud_billing
request.ui_dispatch_view = search
search = | datamodel Cloud Volume search \
| eval create_time='Cloud.Volume.create_time', id='Cloud.Volume.id', unused='Cloud.Volume.unused' \
| stats latest(_time) as _time latest(create_time) as created latest(unused) as unused by id \
| fields _time created id unused \
| sort - _time\
| transaction id endswith=unused=True\
| eval latest=_time + duration\
| where latest >= relative_time(now(),"-1d")\
| eval created=strptime(created,"%Y-%m-%dT%H:%M:%S.%7Q%Z")\
| eval duration=round(if(duration=0,now()-created,duration),2)\
| table id duration\
| rename duration as time_dettached\
| outputlookup dettached_duration.csv

[Time Stopped by Instance - Lookup Gen]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 45 * * * *
description = Outputs a csv which contains the length of time volumes have been detached for
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = | datamodel Cloud VM search\
| stats latest(_time) as _time latest(Cloud.launch_time) as launched by Cloud.VM.vm_state, Cloud.VM.id\
| rename Cloud.VM.vm_state AS state, Cloud.VM.id AS id\
| fields _time launched id state\
| sort - _time\
| transaction id endswith=state=stopped\
| eval latest=_time + duration\
| where latest >= relative_time(now(),"-1d")\
| eval launched=coalesce(strptime(launched,"%Y-%m-%dT%H:%M:%S.%3QZ"),strptime(launched,"%Y-%m-%dT%H:%M:%S.%3Q%Z")) \
| eval duration=round(if(duration=0,now()-launched,duration),2)\
| table id duration\
| rename duration as time_stopped\
| sort - time_stopped\
| outputlookup stopped_duration.csv

[Time Unassociated by EIP - Lookup Gen]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 35 * * * *
description = Outputs a csv which contains the length of time and elastic ip has been unassociated
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = splunk_app_multicloud_billing
request.ui_dispatch_view = search
search = | datamodel Cloud IP search \
| eval id = 'Cloud.IP.id', hasNetworkInterface = 'Cloud.IP.hasNetworkInterface' \
| stats latest(_time) as _time earliest(_time) as earliest by id, hasNetworkInterface, Cloud.provider\
| fields _time id hasNetworkInterface earliest\
| sort - _time \
| transaction id endswith=hasNetworkInterface=False maxevents=2 \
| eval latest=_time + duration \
| where latest >= relative_time(now(),"-1d") \
| eval duration = case(duration > 0, duration, duration=0 AND isnotnull(earliest), now()-earliest, 1=1, "Unknown") \
| table id duration \
| rename duration as time_unassociated\
| outputlookup unassociated_duration.csv

[Azure Network Interface VM Ids - Lookup Gen]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 15 * * * *
description = Outputs a csv which contains ids of the VMs associated with network interfaces for Azure
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = splunk_app_multicloud_billing
request.ui_dispatch_view = search
search = `azure_index` sourcetype=azure:compute:vm properties.networkProfile.networkInterfaces{}.id=* \
| stats latest(properties.networkProfile.networkInterfaces{}.id) as nic_id by id \
| rename id as vm_id \
| outputlookup azure_nic_vm_ids.csv


[Azure VM IDs - Lookup Gen]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 25 * * * *
description = Outputs a csv which contains ids of the Azure VMs
dispatch.earliest_time = 0
dispatch.latest_time = now
