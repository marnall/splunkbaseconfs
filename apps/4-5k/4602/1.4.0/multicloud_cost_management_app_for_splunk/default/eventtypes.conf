[Azure_IP]
search = (sourcetype=azure:vnet:ip:public) (type="Microsoft.Network/networkInterfaces" OR type="Microsoft.Network/publicIPAddresses")

[AWS_IP]
search = (sourcetype=aws:description source="*:ec2_addresses")

[AWS_Instances]
search = (sourcetype=aws:description source="*:ec2_instances")

[Azure_VM]
search = (sourcetype=mscs:resource:virtualMachine)

