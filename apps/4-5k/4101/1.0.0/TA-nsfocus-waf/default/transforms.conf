[waf_all]
CLEAN_KEYS = 0
FORMAT = $1::$2
#Following extraction may miss some words for the value of the field containing one or some space characteristics, you can address this problem by further customizing inline extraction or by other ways.   
REGEX = \s(?!waf:)(\w+):\s?(\S+\s\d{2}:\d{2}:\d{2}|MAC\sconflict|[^\s]+)
