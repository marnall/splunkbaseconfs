[insight_detections]
start_by_shell = false
python.version = python3
sourcetype = Insight:Detections
interval = 900
status = active
severity_levels = ['high', 'moderate', 'low']
confidence_levels = ['high', 'moderate', 'low']
pull_muted_rules = false
pull_muted_devices = false
pull_muted_detections = false
include_description = True
include_signature = True
include_pdns = False
include_dhcp = False
include_events = False
filter_training_detections = True
disabled = 0

[insight_entity]
start_by_shell = false
python.version = python3
sourcetype = Insight:Entity
interval = 900
fetch_pdns = True
fetch_dhcp = True
filter_training_data = True
disabled = 0

[insight_query]
start_by_shell = false
python.version = python3
sourcetype = Insight:Query
interval = 900
event_types = ['suricata', 'observation']
fetch_pdns = False
fetch_dhcp = False
disabled = 0

