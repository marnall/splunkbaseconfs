
[mCalcStatus(2)]
args = DueDate,Complete
definition = eval $DueDate$=if($DueDate$!="null",strftime(strptime($DueDate$,"%Y-%m-%dT%H:%M:%S"),"%d %b %y"),"N/A") |\
eval totOverdue=if($DueDate$!="N/A" and $Complete$="false",strptime($DueDate$,"%d %b %y"),now()) | \
eval totOverdue=if(totOverdue<now(),1,0) | \
eval totComp=if($Complete$="true",1,0) |\
eval totWithoutDate=if($DueDate$="N/A" and $Complete$="false",1,0) |\
eval totOpen=if(totOverdue=0 and totComp=0 and totWithoutDate=0,1,0) |\
eval status=case(totOverdue>0,"Overdue",totComp>0,"Complete",totWithoutDate>0,"Without Date",totOpen>0,"Open")
iseval = 0

[mGetCards(1)]
args = LISTID
definition = eval idList = $LISTID$ |\
join idList max=0 [search sourcetype="trello:cards"| dedup id sortby -_time | where closed="false" | rename labels{}.name as LabelNames | eval LabelNames=mvjoin(LabelNames,"|SPLIT|") ]
iseval = 0

[mGetLists(1)]
args = BOARDID
definition = eval idBoard = $BOARDID$ |\
join idBoard max=0 [search sourcetype="trello:lists"| dedup id sortby -_time | where closed="false"]
iseval = 0

[mParseCardMVFields(3)]
args = MEMBERS,CHECKLISTS,LABELS
definition = rename $MEMBERS$ as MemberIds, $CHECKLISTS$ as Checklists | \
makemv tokenizer="(\S+)" MemberIds | \
makemv tokenizer="(\S+)" Checklists | \
makemv delim="|SPLIT|" $LABELS$
iseval = 0

[mSetChartOrderDisp(1)]
args = CHARTORDERDISP
definition = eval $CHARTORDERDISP$=replace($CHARTORDERDISP$,"^.+\|","")
iseval = 0

[mSetChartOrderInit(3)]
args = CHARTPOS,CHARTLABEL,CHARTORDER
definition = eval $CHARTORDER$=$CHARTPOS$. "|" .$CHARTLABEL$
iseval = 0
