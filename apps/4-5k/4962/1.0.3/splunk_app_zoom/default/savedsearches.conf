[Zoom Room Inventory - Lookup Generator]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.chartHeight = 520
display.visualizations.show = 0
request.ui_dispatch_app = splunk_app_zoom
request.ui_dispatch_view = search
search = `zoom_indexes` sourcetype=zoom:webhook event="zoomroom.alert"\
| stats count by payload.object.room_name payload.object.id\
| fields - count\
| inputlookup zoom_room_inventory.csv append=t\
| stats count by payload.object.room_name payload.object.id\
| fields - count\
| outputlookup zoom_room_inventory.csv
