# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 1

[launcher]
author = Cyware Labs
version = 1.0.4
description = Cyware Splunk App to send Alert Events to Cyware Fusion and Threat Response (CFTR).

[ui]
is_visible = 1
label = Cyware Fusion Center and Threat Response
docs_section_override = AddOns:released

[package]
id = TA-cyware-app

[triggers]
reload.addon_builder = simple
reload.ta_cyware_app_account = simple
reload.ta_cyware_app_settings = simple
reload.passwords = simple