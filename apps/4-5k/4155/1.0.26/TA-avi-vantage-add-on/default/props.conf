[avi:logs]
FIELDALIAS-aob_gen_avi_alias_1 = client_ip AS src
FIELDALIAS-aob_gen_avi_alias_10 = client_dest_port AS dest_port
FIELDALIAS-aob_gen_avi_alias_11 = protocol AS transport
FIELDALIAS-aob_gen_avi_alias_12 = dns_response.answer_records_count AS answer_count
FIELDALIAS-aob_gen_avi_alias_13 = dns_fqdn AS query
FIELDALIAS-aob_gen_avi_alias_14 = dns_response.records{}.ttl AS ttl
FIELDALIAS-aob_gen_avi_alias_15 = dns_response.records{}.addr_ip AS answer
FIELDALIAS-aob_gen_avi_alias_16 = dns_request.question_count AS query_count
FIELDALIAS-aob_gen_avi_alias_17 = client_src_port AS src_port
FIELDALIAS-aob_gen_avi_alias_18 = dns_response.records{}.type AS record_type
FIELDALIAS-aob_gen_avi_alias_19 = dns_qtype AS query_type
FIELDALIAS-aob_gen_avi_alias_2 = vs_ip AS dest
FIELDALIAS-aob_gen_avi_alias_20 = dns_response.opcode AS message_type
FIELDALIAS-aob_gen_avi_alias_21 = dns_response.response_code AS reply_code
FIELDALIAS-aob_gen_avi_alias_22 = total_time AS duration
FIELDALIAS-aob_gen_avi_alias_23 = vs_name AS app
FIELDALIAS-aob_gen_avi_alias_24 = server_response_code AS status
FIELDALIAS-aob_gen_avi_alias_25 = response_content_type AS http_content_type
FIELDALIAS-aob_gen_avi_alias_4 = server_rtt AS response_time
FIELDALIAS-aob_gen_avi_alias_5 = vs_name AS site
FIELDALIAS-aob_gen_avi_alias_6 = user_agent AS http_user_agent
FIELDALIAS-aob_gen_avi_alias_7 = tx_bytes AS bytes_in
FIELDALIAS-aob_gen_avi_alias_8 = rx_bytes AS bytes_out
FIELDALIAS-aob_gen_avi_alias_9 = method AS http_method
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
category = Network & Security
pulldown_type = 1
DATETIME_CONFIG = 
disabled = false

[avi:events]
EXTRACT-tenant = (?:.*?Avi-Controller )(?:.*?)(?:in tenant )(?P<tenant>\S+)(?: )
EXTRACT-tenant-json = (?:{.*? "events": \[\{".*? "tenant_name": ")(?P<tenant>\S+)(?:", .*? "report_timestamp": .*?)

EXTRACT-user = (?:.*?Avi-Controller )(?:.*?)(?: event .*?)(?:(as User |performed by user |performed by ))(?P<user>\w+\S+\w+)
EXTRACT-user-json = (?:{.*? "events": \[\{".*? "event_id": .*?)(?:("User |performed by user |performed by ))(?P<user>\w+\S+\w+)

EXTRACT-controller = (?:.*? (?P<controller>\S+)\s*Avi-Controller )(?:.*?)(?:in tenant .*?)

EXTRACT-severity = (?:.*?Avi-Controller .*?)(?P<severity>[A-Za-z]+)(?:.*? \[.*? reason: .*? occur.*? in tenant .*?)

EXTRACT-event = (?:.*?Avi-Controller )(?:.*? \[.*? event )(?P<event>\w+)(?: occur.*? in tenant )
EXTRACT-event-json = (?:\{.*? "events": \[\{".*? "event_id": ")(?P<event>\w+)(?:", .*? "report_timestamp": .*?)

EXTRACT-config-object = (?:.*?Avi-Controller )(.*? CONFIG_.*? on object .*? as Config )(?P<config_object>.*?)(?:( create status| update status| delete status))(?: .*?)
EXTRACT-config-object-json = (?:{"level": .*?"timestamp": .*? "obj_name": "(?P<config_object>\S+)", .*? "reason": .*? "events": \[\{".*? "event_id": "CONFIG_)(.*?)(?:", .*? "report_timestamp": .*?)

EXTRACT-object = (?:.*?Avi-Controller .*? )event (?!CONFIG_).*? on object (?P<obj_name>.*?)(?: in tenant)(?: .*?)

EXTRACT-pool-server = (?:.*?Avi-Controller .*? event SERVER_.*? in tenant .*?\((?P<pool_server>\d+.\d+.\d+.\d+:\d+)\) is )
EXTRACT-pool-server-json = (?:.*?\{.*? "event_id": "SERVER_.*?", .*?"event_description": .*?\((?P<pool_server>\d+.\d+.\d+.\d+:\d+)\) is )

EXTRACT-login_source = (?:.*? login \(.*? from )(?P<login_source>\d+.\d+.\d+.\d+)
EXTRACT-login_status = (?:.*? login \()(?P<login_status>\w+)(\) )



