[set_sourcetype_avi-events]
REGEX = (?:.*? Avi-Controller .*?reason: .*?in tenant)
FORMAT = sourcetype::avi:events
DEST_KEY = MetaData:Sourcetype


[set_sourcetype_avi-events-json]
LOOKAHEAD = 10000
REGEX = (?:.*? Avi-Controller .*?reason: .*?\{.*?"events".*)
FORMAT = sourcetype::avi:events
DEST_KEY = MetaData:Sourcetype


[set_sourcetype_avi-clientlogs]
LOOKAHEAD = 10000
REGEX = (?:.*?\{)(?:.*?"virtualservice":)(?:.*?)(?:"service_engine":)(?:.*?)(?:"log_id":)(?:.*?)(?:"vs_name":)
FORMAT = sourcetype::avi:logs
DEST_KEY = MetaData:Sourcetype


[set_sourcetype_avi-clientlogs_syslog]
LOOKAHEAD = 10000
REGEX = (?:19|20)\d\d[?:-](?:0[1-9]|1[012])[?:-](?:0[1-9]|[12][0-9]|3[01])(?:.*?)[?: ](?:.*? - \{)(?:"virtualservice":)(?:.*?)(?:"report_timestamp":)(?:.*?)(?:"service_engine":)(?:.*?)(?:"log_id":)(?:.*?)(?:"vs_name":)
FORMAT = sourcetype::avi:logs
DEST_KEY = MetaData:Sourcetype


[set-controller-field-events-json]
LOOKAHEAD = 10000
REGEX = ^.*?Avi-Controller .*? \[.*? \{.*?": .*?"event_id": .*?$
FORMAT = controller::$1
WRITE_META = true


[set-severity-field-events-json]
LOOKAHEAD = 10000
REGEX = ^.*?Avi-Controller (\S+)(?:.*? \[.*? \{.*?": .*?"event_id": .*?)$
FORMAT = severity::$1
WRITE_META = true


[strip-syslog-header-avilogs]
LOOKAHEAD = 10000
REGEX = ^.*?(\{.*?"virtualservice":.*?"report_timestamp":.*?"service_engine".*?"log_id".*?"vs_name".*?)$
FORMAT = $1
DEST_KEY = _raw


[strip-syslogjson-header-avievents]
LOOKAHEAD = 10000
REGEX = ^.*? Avi-Controller .*? \[.*?\] (\{.*?"tenant": .*?"name": .*?)$
FORMAT = $1
DEST_KEY = _raw



