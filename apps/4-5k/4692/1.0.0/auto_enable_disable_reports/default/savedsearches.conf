[schedule_entry]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = * * * * *
description = enters into a scheduled state
dispatch.earliest_time = 0
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = splunk_app_disable_searches
request.ui_dispatch_view = search
search = | inputlookup schedule.csv \
| eval currenttime = now() \
| where from <= currenttime \
| search schedulestatus = "Pending" \
| eval disable=if(action=="enable","false", "true") \
| eval searchname=replace(searchname, " ", "#") \
| map search="| disablesearch owner=$owner$ app=$app$ name=$searchname$ disable=$disable$"

[schedule_exit]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = * * * * *
description = exits from a scheduled state
dispatch.earliest_time = 0
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = splunk_app_disable_searches
request.ui_dispatch_view = search
search = | inputlookup schedule.csv \
| eval currenttime = now() \
| where from <= currenttime AND to <=currenttime\
| search schedulestatus = "Pending" \
| eval disable=if(action=="enable","true", "false") \
| eval searchname=replace(searchname, " ", "#") \
| map search="| disablesearch owner=$owner$ app=$app$ name=$searchname$ disable=$disable$"
