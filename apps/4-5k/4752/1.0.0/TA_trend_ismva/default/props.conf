[trend:imsva:polevt]
SHOULD_LINEMERGE = false
TRUNCATE = 99999
MAX_TIMESTAMP_LOOKAHEAD = 19
TIME_FORMAT = %Y/%m/%d %H:%M:%S
TIME_PREFIX = ^
KV_MODE = none

REPORT-trend_imsva_polevt_extractions = trend_imsva_polevt_extractions
REPORT-trend_imsva_polevt_file_name = trend_imsva_polevt_file_name
REPORT-trend_imsva_recipient_domain = trend_imsva_recipient_domain
REPORT-trend_imsva_src_user_domain = trend_imsva_src_user_domain

EVAL-direction = case(direction = 1,"inbound",direction = 2,"outbound")
EVAL-file_name = split(file_name,";")
EVAL-file_type = split(file_type,";")
EVAL-recipient = split(lower(recipient),";")
EVAL-recipient_count = mvcount(recipient_domain)
EVAL-recipient_domain = lower(recipient_domain)
EVAL-src_user = lower(src_user)
EVAL-src_user_domain = lower(src_user_domain)
EVAL-vendor_product = "Trend IMSVA"

FIELDALIAS-signature_id = filter_rule_code as signature_id

LOOKUP-trend_imsva_action_rule = trend_imsva_action_rule_lookup action_rule_code OUTPUT filter_action action
LOOKUP-trend_imsva_filter_rule = trend_imsva_filter_rule_lookup filter_rule_code OUTPUT filter_rule AS signature

[trend:imsva:msgtra]
SHOULD_LINEMERGE = false
TRUNCATE = 99999
MAX_TIMESTAMP_LOOKAHEAD = 27
TIME_FORMAT = %Y %b %e %H:%M:%S %:z
TIME_PREFIX = ^\S+\s(?:(\#null\#\s){2}|)
KV_MODE = none

REPORT-trend_imsva_msgtra_action_rule_code = trend_imsva_msgtra_action_rule_code
REPORT-trend_imsva_msgtra_extractions = trend_imsva_msgtra_extractions
REPORT-trend_imsva_msgtra_internal_message_id = trend_imsva_msgtra_internal_message_id
REPORT-trend_imsva_msgtra_src_dst = trend_imsva_msgtra_src_dst
REPORT-trend_imsva_msgtra_transaction_type = trend_imsva_msgtra_transaction_type
REPORT-trend_imsva_recipient_domain = trend_imsva_recipient_domain
REPORT-trend_imsva_src_user_domain = trend_imsva_src_user_domain

EVAL-recipient = split(lower(recipient),";")
EVAL-recipient_domain = lower(recipient_domain)
EVAL-src_user = lower(src_user)
EVAL-src_user_domain = lower(src_user_domain)
EVAL-vendor_product = "Trend IMSVA"

LOOKUP-trend_imsva_action_rule = trend_imsva_action_rule_lookup action_rule_code OUTPUT filter_action action
