[sap_authentication]
search =  (sourcetype=sap:abap OR sourcetype=sap:java) (signature_id = LL01 OR signature_id = LL02 OR signature_id = LL03)

[sap_user_modification]
search =  (sourcetype=sap:abap OR sourcetype=sap:java) (signature_id = SA0* OR signature_id = LL04 OR signature_id = LL05)

[sap_application_modification]
search =  (sourcetype=sap:abap OR sourcetype=sap:java) (signature_id = CC01 OR signature_id = CC02 OR signature_id = CM03)

[sap_priviledged_access]
search =  (sourcetype=sap:abap OR sourcetype=sap:java) (signature_id = PA01 OR signature_id = PA02)

[sap_system_message]
search =  (sourcetype=sap:abap OR sourcetype=sap:java) (signature_id = SS01 OR signature_id = SS02)