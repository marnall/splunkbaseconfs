[box:shield:events]
SHOULD_LINEMERGE = 0
category = BOX-SHIELD
pulldown_type = 1

[source::...ta-box-shield*.log*]
SHOULD_LINEMERGE = true
sourcetype = taboxshield:log

[source::...ta_box_shield*.log*]
SHOULD_LINEMERGE = true
sourcetype = taboxshield:log

[box:shield:alerts]
SHOULD_LINEMERGE = 0
MAX_TIMESTAMP_LOOKAHEAD = 25
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%:z
TIME_PREFIX = "shield_alert.*?"created_at"\s*:\s*"
category = BOX-SHIELD
KV_MODE = json
TRUNCATE = 0
pulldown_type = 1
FIELDALIAS-shield_alert_link = additional_details.shield_alert.shield_alert_link as shield_alert_link
EVAL-extracted_link = mvindex(split(shield_alert_link, "https://"), 1)
EVAL-app = "box:shield"
EVAL-dest = "Box"
FIELDALIAS-id = additional_details.shield_alert.alert_id as id
FIELDALIAS-severity = additional_details.shield_alert.priority AS severity
FIELDALIAS-severity_id = additional_details.shield_alert.risk_score AS severity_id
EVAL-src = coalesce($additional_details.shield_alert.alert_summary.alert_activities{}.ip_info.ip$, $additional_details.shield_alert.alert_summary.sessions{}.activities{}.ip_info.ip$, $additional_details.shield_alert.alert_summary.download_ips{}.ip$, $additional_details.shield_alert.alert_summary.upload_activity.ip_info.ip$, "Unknown IP")
FIELDALIAS-subject = additional_details.shield_alert.rule_category as subject
EVAL-body = if(subject="Malicious Content", $additional_details.shield_alert.alert_summary.malware_info.threat_info.description$, $additional_details.shield_alert.alert_summary.description$)
EVAL-type = "alert"
EVAL-sender = case(subject="Malicious Content",$additional_details.shield_alert.user.id$)
EVAL-user = case(subject="Malicious Content", $additional_details.shield_alert.user.name$)
EVAL-date = case(subject="Malicious Content", $additional_details.shield_alert.alert_summary.malware_info.threat_info.scanned_at$)
EVAL-url = case(subject="Malicious Content", $additional_details.shield_alert.alert_summary.malware_info.threat_info.detail_link$)
EVAL-category = case(subject="Malicious Content", $additional_details.shield_alert.alert_summary.malware_info.threat_info.family$)
EVAL-signature = case(subject="Malicious Content", $additional_details.shield_alert.alert_summary.malware_info.threat_info.threat_name$)
EVAL-vendor_product = case(subject="Malicious Content", $additional_details.shield_alert.alert_summary.malware_info.threat_info.source$)
EVAL-file_name = case(subject="Malicious Content", $additional_details.shield_alert.alert_summary.malware_info.file_info.name$)
EVAL-file_hash = case(subject="Malicious Content", $additional_details.shield_alert.alert_summary.malware_info.file_info.hash$)
EVAL-file_path = case(subject="Malicious Content", $additional_details.shield_alert.alert_summary.malware_info.file_info.path$)





[box:shield:classification]
MAX_TIMESTAMP_LOOKAHEAD = 25
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%:z
TIME_PREFIX = "created_at"\s*:\s*"
category = BOX-SHIELD
KV_MODE = json
TRUNCATE = 0
pulldown_type = 1
EVAL-action = case(event_type=="METADATA_INSTANCE_CREATE" or event_type=="METADATA_TEMPLATE_CREATE", "created", event_type=="METADATA_INSTANCE_UPDATE" or event_type=="METADATA_TEMPLATE_UPDATE", "modified", event_type=="METADATA_INSTANCE_DELETE" or event_type=="METADATA_TEMPLATE_DELETE", "deleted", event_type=="METADATA_INSTANCE_COPY", "copied")
EVAL-change_type = "filesystem"
FIELDALIAS-dvc = ip_address as dvc
EVAL-object = coalesce($box_source.item_name$,"NA")
EVAL-object_id = coalesce($box_source.item_id$, "NA")
EVAL-object_category = coalesce($box_source.item_type$,"NA")
EVAL-dest = "Box Enterprise"
EVAL-object_path = coalesce($additional_details.file_path$,"NA")
EVAL-src = "Box Enterprise"
EVAL-status = "success"
FIELDALIAS-user = created_by.name as user
EVAL-vendor_product = "Box Shield"

[box:shield:smartaccess:policy]
MAX_TIMESTAMP_LOOKAHEAD = 25
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%:z
TIME_PREFIX = "created_at"\s*:\s*"
category = BOX-SHIELD
KV_MODE = json
TRUNCATE = 0
pulldown_type = 1