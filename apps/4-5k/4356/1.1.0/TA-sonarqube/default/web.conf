
[expose:TA_sonarqube_account]
pattern = TA_sonarqube_account
methods = POST, GET

[expose:TA_sonarqube_account_specified]
pattern = TA_sonarqube_account/*
methods = POST, GET, DELETE

[expose:TA_sonarqube_settings]
pattern = TA_sonarqube_settings
methods = POST, GET

[expose:TA_sonarqube_settings_specified]
pattern = TA_sonarqube_settings/*
methods = POST, GET, DELETE

[expose:TA_sonarqube_issues]
pattern = TA_sonarqube_issues
methods = POST, GET

[expose:TA_sonarqube_issues_specified]
pattern = TA_sonarqube_issues/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
