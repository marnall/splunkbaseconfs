[siebel:server]
pulldown_type = 0
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)[^\s]+\s.+?(?=\s\d\s)\s\d\s[^\s]+\s\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\s
EVENT_BREAKER = ([\r\n]+)[^\s]+\s.+?(?=\s\d\s)\s\d\s[^\s]+\s\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\s
EVENT_BREAKER_ENABLE = true
TIME_FORMAT = %Y-%m-%d %H:%M:%S
TRANSFORMS-aheader = ta_siebel_server_header,ta_siebel_server_source,ta_siebel_server_raw

[siebel:pop3smtp]
pulldown_type = 0
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
EVENT_BREAKER_ENABLE = true
