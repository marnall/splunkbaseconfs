[siebel_file.sample]
source=/var/syslog/remote/conhost1.log
sourcetype=siebel:server
#mode = replay
timeMultiple = 2
backfill = -15m

token.0.token = \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}
token.0.replacementType = timestamp
token.0.replacement = %Y-%m-%d %H:%M:%S
