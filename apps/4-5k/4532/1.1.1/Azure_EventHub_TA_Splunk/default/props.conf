[eventhub:operational:json]
description = Format of default operational insights eventhub entity
BREAK_ONLY_BEFORE_DATE =
DATETIME_CONFIG =
KV_MODE = JSON
LINE_BREAKER = ([\r\n]+)
MAX_EVENTS = 100000
MAX_TIMESTAMP_LOOKAHEAD = 27
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = \{\"records\"\:\s\[\{\s+\"time\"\:\s+\"
TRUNCATE = 100000
category = Custom
disabled = false
pulldown_type = true
TZ=UTC

[eventhub:json]
description = Generic eventhub json sourcetype
BREAK_ONLY_BEFORE_DATE=null
CHARSET=UTF-8
LINE_BREAKER=([\r\n]+)
MAX_EVENTS=100000
MAX_TIMESTAMP_LOOKAHEAD=27
NO_BINARY_CHECK=true
SHOULD_LINEMERGE=false
TIME_FORMAT=%Y-%m-%dT%H:%M:%S
TIME_PREFIX=\{\"records\"\:\s\[\{\s+\"time\"\:\s+\"
TRUNCATE=100000
category=Cloud
disabled=false
pulldown_type=true
INDEXED_EXTRACTIONS=json
TZ=UTC
AUTO_KV_JSON=false

[eventhub:log]
description = Format similar to linux log files. Utilizes Splunks default syslog sourcetype transformations
DATETIME_CONFIG = /etc/datetime.xml
LEARN_SOURCETYPE = true
CHARSET = UTF-8
category=Cloud
BREAK_ONLY_BEFORE_DATE = true
TRANSFORMS = syslog-host
TIME_FORMAT = %b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 27
LINE_BREAKER = ([\r\n]+)
MAX_EVENTS = 5000

