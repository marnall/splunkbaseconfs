# Sample monitoring stanzas for onboarding data written to disk from the scripted inputs
# The stanzas monitor the path defined by the variable $EVENTHUB_CONSUMER_LOG_DIR. For the the monitoring to work the variable needs to be defined
# The placeholders below for the eventhubs also need 
#[monitor://$EVENTHUB_CONSUMER_LOG_DIR/<eventhub>_insights-operational-logs*.log]
#disabled = true
#index = eventhub
#sourcetype = eventhub:json
#whitelist = solsys_insights-operational-logs_[\d]+\.log
#blacklist = \d+$
#ignoreOlderThan = 1d

