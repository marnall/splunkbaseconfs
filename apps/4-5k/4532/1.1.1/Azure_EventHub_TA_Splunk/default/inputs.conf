# Sample scripted inputs for invoking the wrapper script from the Azure Event Hub Connector
# Once the script is invoked ensure that you use the 'Rest/Passwords app' to pass the username/pass in an encripted format
#[script://$SPLUNK_HOME/etc/apps/Azure_EventHub_TA_Splunk/bin/scripts/wrapper.py <eventhubnamespace> <eventhubname> <saspolicyforeventhubname>]
#disabled = false
#interval = 60.0
#passAuth = admin

