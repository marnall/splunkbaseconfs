# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 1

[launcher]
author = TruSTAR Technology, Inc.
version = 1.0.7
description = TruSTAR Technology, Inc. TA specifically for the Enterprise Security (ES) component.  Downloads indicators of compromise from TruSTAR's Station platform to the Splunk ES Threat Intelligence KVStore collections and enables actions for enriching events.

[ui]
is_visible = 1
label = TruSTAR Splunk ES Technology Add-on
docs_section_override = AddOns:released

[package]
id = TA-trustar-es

[triggers]
reload.addon_builder = simple
reload.ta_trustar_es_account = simple
reload.ta_trustar_es_settings = simple
reload.passwords = simple