
[expose:TA_trustar_es_account]
pattern = TA_trustar_es_account
methods = POST, GET

[expose:TA_trustar_es_account_specified]
pattern = TA_trustar_es_account/*
methods = POST, GET, DELETE

[expose:TA_trustar_es_settings]
pattern = TA_trustar_es_settings
methods = POST, GET

[expose:TA_trustar_es_settings_specified]
pattern = TA_trustar_es_settings/*
methods = POST, GET, DELETE

[expose:TA_trustar_es_trustar_splunk_es_ingest_iocs]
pattern = TA_trustar_es_trustar_splunk_es_ingest_iocs
methods = POST, GET

[expose:TA_trustar_es_trustar_splunk_es_ingest_iocs_specified]
pattern = TA_trustar_es_trustar_splunk_es_ingest_iocs/*
methods = POST, GET, DELETE

# Splunk app inspect flags this stanza as a warning, but we at TruSTAR did not add this, it was
# added by the Splunk add on builder.
[expose:_splunkd_data]
pattern = data/*
methods = GET
