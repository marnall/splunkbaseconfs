[author=lalleman]
company = Kintyre
email = lowell@kintyre.co

[install]
build = 1250
is_configured = 0

[launcher]
author = lalleman
description = Ksconf Splunk CONFiguration tool.  \
    Provides the ksconf CLI tool for managing your Splunk deployment.
version = 0.12.3

[package]
check_for_updates = true
id = ksconf

[triggers]
# Nothing to update no restart needed
# However, icons don't show up until after a restart...
reload.app = simple

[ui]
attribution_link = https://ksconf.readthedocs.io/en/latest/license.html
is_visible = 1
label = KSCONF app for Splunk
show_in_nav = 1
