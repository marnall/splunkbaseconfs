[osquery_index]
search = index=osquery

[osquery_status]
search = eventtype=osquery_index sourcetype=osquery:status

[osquery_results]
search = eventtype=osquery_index sourcetype=osquery:results

[osquery_alert]
search = eventtype=osquery_results action=added

[osquery_process]
search = eventtype=osquery_results columns.cmdline=*

[osquery_filechange]
search = eventtype=osquery_results "name\":\"file_events"

