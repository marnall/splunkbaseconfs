[DiscoveredAssets_Tech]
collection = DiscoveredAssets_Tech_collection
external_type = kvstore
fields_list = _key, AssetID, Hostname, URL, FQDN, IP_Address, Network, IPv6, MAC_Address, DNS_Domain, Netbios, Operating_System, Vendor, Model, Amazon_EC2_ID, Last_Booted, Last_Seen, Collector, Origin, Active, DateAdded, First_Discovered_Date, Last_Discovered_Date

[DiscoveredAssets_Risk]
collection = DiscoveredAssets_Risk_collection
external_type = kvstore
fields_list = _key, AssetID, Value, Threat_Likelihood, Vulnerability_Exposure, Max_CVSS, Average_CVSS, Vulns_Count, DateModified, DateAdded, First_Discovered_Date, Last_Discovered_Date

[DiscoveredAssets_General]
collection = DiscoveredAssets_General_collection
external_type = kvstore
fields_list = _key, AssetID, Name, Description, Class, Type, Business_Function, Support_Status, Operational_Status, Environment, First_Discovered_Date, Last_Discovered_Date

[InstalledProducts]
collection = InstalledProducts_collection
external_type = kvstore
fields_list = _key, InstalledProductID, Product_Name, Version, Product_Vendor, Collector, Origin, DateAdded, First_Discovered_Date, Last_Discovered_Date

[ProductsToAssets]
collection = ProductsToAssets_collection
external_type = kvstore
fields_list = _key, AssetID, Hostname, URL, IP_Address, Amazon_EC2_ID, InstalledProductID, Product_Name, DateAdded

[InstalledProducts_to_VulnDB_ProductID]
collection = InstalledProducts_to_VulnDB_ProductID_collection
external_type = kvstore
fields_list = _key, InstalledProductID, Product_Name, Product_Vendor, Product_Version, Collector, VulnDB_ProductID, Verified, DateAdded, VulnDB_ProductName, First_Discovered_Date, Last_Discovered_Date

[VulnToAsset]
collection = VulnToAsset_collection
external_type = kvstore
fields_list = _key, AssetID, VulnDB_ID, DateAdded, DateStateUpdated, VulnState, First_Discovered_Date, Last_Discovered_Date, ExactVersionMatch

[VulnToVulnDB_ProductID]
collection = VulnToVulnDB_ProductID_collection
external_type = kvstore
fields_list = _key, VulnDB_ProductID, VulnDB_ID

[VulnDB_cvss]
collection = VulnDB_cvss_collection
external_type = kvstore
fields_list = _key, VulnDB_ID, Max_CVSS, Average_CVSS, Vuln_Class, Title, Published_Date,Solution_Date,Disclosure_date,Exploit_Publish_Date,Severity
