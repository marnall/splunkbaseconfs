imageCaption1 = Welcome to the Splunk Essentials for Wire Data app! In this app, we have provided many different examples of how Splunk can be used to deliver analytics on Wire Data. The examples presented in this app are broken down into data types, and focus on IT Operations, Security and Fraud use cases. Use the different categories to see wire data applied to different scenarios for your organisation.

imageCaption2 = Web Traffic Analysis – This data set allows you the ability to investigate security issues, analyse business use cases, and troubleshoot operational issues.

imageCaption3 = Network resolution analysis - Network resolution data, including the Domain Name System (DNS) and the Address Resolution Protocol (ARP) can be used to track network usage at a granular level. User activity can be monitored, along with identification of attacks.

imageCaption4 = File Share Analysis - Wire data can be used to monitor the sharing of files across your environment. Examples include monitoring Server Message Block (SMB) and File Transfer Protocol (FTP) traffic, to show both internal and external file sharing activity.

imageCaption5 = Email Analysis - This category showcases the ability to monitor email in and out of your environment through wire data. Analyse the contents of emails, along with attachments and headers.

imageCaption6 = Database Analysis - Wire data analysis can provide deep insight into database activity in your environment. Database queries can be interrogated, along with operational metrics such as latency and error rates.

imageCaption7 = Other Protocol Analysis - This bucket is for additional content and use cases that don't fall within the other categories listed.


