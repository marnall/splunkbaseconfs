#
# Splunk app KV Store transforms file
#

[dstcrs_lookup]
external_type = kvstore
collection = dstcrscollection
fields_list = _key, CreateTime, NormalizedDst, NormalizedDstUpdateTime, ServiceName, CRSServiceID, CRSServiceIDUpdateTime, RiskLevel, ServiceGenre, ReputationUpdateTime, OtherResponse



[demo_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = demo_data

