## appends the values of field2 to field1
[mvappend_field_gpg(2)]
args       = field1, field2
definition = eval "$field1$"=mvdedup(mvappend('$field1$',NULL,'$field2$'))

[drop_dm_object_name_gpg(1)]
args = object
definition = rename "$object$.*" as *
iseval = 0

[gpg_summariesonly]
definition = summariesonly=t
iseval = 0

[gpg_change_tag]
definition = All_Changes.tag="*" All_Changes.tag="*"
iseval = 0

# [gpg_boundary_devices]
# definition = All_Changes.dest_category="*"
# iseval = 0

[tstats]
definition = tstats
iseval = 0

[endpoint_identifier_filter]
definition = host="PR*"
iseval = 0

