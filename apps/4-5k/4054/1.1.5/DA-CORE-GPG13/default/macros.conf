[network_boundary_device_hostnames(1)]
args = dataset
definition = $dataset$="extfw1" OR $dataset$="extfw2" OR $dataset$="extfw3" OR $dataset$="extfw4" OR $dataset$="intfw" OR $dataset$="extfw6"
iseval = 0

[network_boundary_device_hostnames_negated(1)]
args = dataset
definition = $dataset$!="extfw1" AND $dataset$!="extfw2" AND $dataset$!="extfw3" AND $dataset$!="extfw4" AND $dataset$!="intfw" AND $dataset$!="extfw6"
iseval = 0

[network_device_apps(1)]
args = dataset
definition = $dataset$="vendor1" OR $dataset$="vendor2" OR $dataset$="vendor3" OR $dataset$="vendor4"
iseval = 0

[network_internal_firewall_hosts(1)]
args = dataset
definition = $dataset$="vendor"
iseval = 0

[network_device_hostnames(1)]
args = dataset
definition = $dataset$="extfw1" OR $dataset$="extfw2" OR $dataset$="extfw3" OR $dataset$="extfw4" OR $dataset$="intfw" OR $dataset$="extfw6" OR $dataset$="device_ip1" OR $dataset$="device_ip2" OR $dataset$="device_ip3" OR $dataset$="device_ip4"
iseval = 0

[network_vpn_hosts(1)]
args = dataset
definition = $dataset$="device_ip1" OR $dataset$="device_ip2" OR $dataset$="device_ip3" OR $dataset$="device_ip4"
iseval = 0

[network_remote_connection_hostnames(1)]
args = dataset
definition = $dataset$="remote_ips/16"
iseval = 0


[gpg_tstats]
definition = tstats
iseval = 0

[useother]
definition = true
iseval = 0

[unprepend_assets(1)]
args = subject
definition = rename $subject$_asset_id as asset_id,$subject$_ip as ip,$subject$_mac as mac,$subject$_nt_host as nt_host,$subject$_dns as dns,$subject$_owner as owner,$subject$_priority as priority,$subject$_lat as lat,$subject$_long as long,$subject$_city as city,$subject$_country as country,$subject$_bunit as bunit,$subject$_category as category,$subject$_pci_domain as pci_domain,$subject$_is_expected as is_expected,$subject$_should_timesync as should_timesync,$subject$_should_update as should_update,$subject$_requires_av as requires_av
iseval = 0
