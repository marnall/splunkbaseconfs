[tanium:endpoint:dns:stream]
EVAL-vendor = "Tanium"
EVAL-product = "Tanium Stream"
FIELDALIAS-endpoint_dns_name_stream = hostname AS dest
FIELDALIAS-endpoint_dns_query_stream = "fields.query" AS query
FIELDALIAS-endpoint_dns_response_stream = "fields.response" AS answer

[tanium:endpoint:securityevent:stream]
EVAL-vendor = "Tanium"
EVAL-product = "Tanium Stream"
FIELDALIAS-endpoint_securityevent_name_stream = hostname AS dest
FIELDALIAS-endpoint_securityevent_code_stream = "fields.event_id" AS EventCode
FIELDALIAS-endpoint_securityevent_process_stream = fields.event__CommandLine AS process
FIELDALIAS-endpoint_securityevent_id_stream = fields.event__NewProcessId AS process_id
FIELDALIAS-endpoint_securityevent_path_stream = fields.event__NewProcessName AS process_path
FIELDALIAS-endpoint_securityevent_process_path_stream = fields.event__ParentProcessName AS parent_process_path
FIELDALIAS-endpoint_securityevent_process_id_stream = fields.event__ProcessId AS parent_process_id
EXTRACT-endpoint_securityevent_proc_name_stream_stream = [\/\\](?<process_name>[^\/\\]+)\",\"login__user_id\"
EXTRACT-endpoint_securityevent_proc_parent_name_stream = [\/\\](?<parent_process_name>[^\/\\]+)\",\"parent__command_line\"
EVAL-action = case(isnotnull(action), action, EventCode In (4688, 4689, 4611), "allowed", EventCode IN (4624, 4648) OR Status="0x0", "success", EventCode IN (4625) OR Status!="0x0", "failure", EventCode IN (4657), case('fields.event__OperationType'="%%1904", "created", 'fields.event__OperationType'="%%1905", "modified", 'fields.event__OperationType'="%%1906", "deleted"), EventCode IN (4660), "deleted", EventCode IN (4663), "read")
EVAL-user = case(isnotnull(user),user, 'fields.event__Account'!="-",'fields.event__Account', 'fields.event__TargetAccount'!="-",'fields.event__TargetAccount', 'fields.event__TargetUserName'!="-",'fields.event__TargetUserName','fields.event__SubjectUserName'!="-",'fields.event__SubjectUserName')

[tanium:endpoint:library:stream]
EVAL-vendor = "Tanium"
EVAL-product = "Tanium Stream"
FIELDALIAS-endpoint_library_name_stream = hostname AS dest
FIELDALIAS-endpoint_library_dll_stream = "fields.path" AS service_dll_path
FIELDALIAS-endpoint_library_md5_stream = "fields.library__md5" AS service_dll_hash
FIELDALIAS-endpoint_library_verified_stream = "fields.signature__status" AS service_dll_signature_verified

[tanium:endpoint:processes:stream]
EVAL-vendor = "Tanium"
EVAL-product = "Tanium Stream"
EXTRACT-endpoint_process_name_stream = [\/\\](?<process_name>[^\/\\]+)\",\"login__user_id\"
EXTRACT-endpoint_process_parent_name_stream = [\/\\](?<parent_process_name>[^\/\\]+)\",\"parent__command_line\"
FIELDALIAS-endpoint_process_dest_stream = hostname AS dest
FIELDALIAS-endpoint_process_user_stream = "fields.user__name" AS user
FIELDALIAS-endpoint_process_cmd_stream = "fields.command_line" as process
FIELDALIAS-endpoint_process_path_stream = "fields.file__full_path" AS process_path
FIELDALIAS-endpoint_process_hash_stream = "fields.file__md5" AS process_hash
FIELDALIAS-endpoint_process_guid_stream = "fields.tanium_process_id" AS process_guid
FIELDALIAS-endpoint_process_pid_stream = "fields.pid" AS process_id
FIELDALIAS-endpoint_process_parent_cmd_stream = "fields.parent__command_line" as parent_process
FIELDALIAS-endpoint_process_parent_path_stream = "fields.parent__file__full_path" AS parent_process_path
FIELDALIAS-endpoint_process_parent_guid_stream = "fields.tanium_parent_process_id" AS parent_process_guid
FIELDALIAS-endpoint_process_parent_pid_stream = "fields.parent_pid" AS parent_process_id

[tanium:endpoint:netconn:stream]
EVAL-vendor = "Tanium"
EVAL-product = "Tanium Stream"
EXTRACT-endpoint_netconn_proc_name_stream = [\/\\](?<process_name>[^\/\\]+)\",\"process__user__name\"
FIELDALIAS-endpoint_netconn_path_stream = "fields.process__file__full_path" AS process_path
FIELDALIAS-endpoint_netconn_name_stream = hostname AS dest
