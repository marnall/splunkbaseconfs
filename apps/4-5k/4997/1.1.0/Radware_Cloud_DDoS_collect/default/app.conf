# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 5

[launcher]
author = Thomas Gobet
version = 1.1.0
description = Splunk for Radware Cloud DDoS Add-On allows Splunk to collect security events on Radware's Cloud DDoS portal

[ui]
is_visible = 1
label = Radware Cloud DDoS
docs_section_override = AddOns:released

[package]
id = Radware_Cloud_DDoS_collect

[triggers]
reload.addon_builder = simple
reload.radware_cloud_ddos_collect_account = simple
reload.radware_cloud_ddos_collect_settings = simple
reload.passwords = simple

