[oneidentity:sps:siem:syslog]
DATETIME_CONFIG = 
EVAL-vendor_product = vendor." ".product
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SEDCMD-strip_prefix = s/^[^{]+//g
SHOULD_LINEMERGE = false
TIME_FORMAT = %s%3N
category = Application
description = Events from Safeguard for Privileged Sessions
disabled = false
pulldown_type = 1
BREAK_ONLY_BEFORE_DATE = 
EVAL-severity = case(aggregated_score <=69, "informational", aggregated_score <=79, "high", aggregated_score >= 80, "critical")
EVAL-ids_type = "network"
