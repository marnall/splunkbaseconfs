[script:endpoint_download]
match           = /download_mmdb
script          = ipinfo_download_endpoint.py
scripttype      = persist
handler         = ipinfo_download_endpoint.DownloadMmdb
python.version  = python3

[script:endpoint_copy]
match           = /copy_mmdb
handler         = ipinfo_copy_endpoint.CopyMmdb
python.version  = python3

[script:endpoint_debug]
match           = /debug_ipinfo
handler         = ipinfo_debug_endpoint.DebugIpinfo
python.version  = python3