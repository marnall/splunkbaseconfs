[ipinfo-command]
syntax = ipinfo <ipinfo-options>
shortdesc = Polling Data from IPinfo API using secure https protocol.
description = Lookup command to lookup data from IPinfo API. Must specify at least one IP field. Please store token using setup option before using app and pass IPs.
usage = public
example1 = ipinfo ip
comment1 = Returns the IP Information from the endpoint as json using IPinfo.io account and Joins results with itself on 'ip' field.
example2 = ipinfo src_ip prefix=true
comment2 = Returns the IP Information from the endpoint as json using IPinfo.io account and Joins results with itself on 'src_ip' field and adds prefix 'src_ip' to all field names
example3 = ipinfo src_ip dest_ip
comment3 = Returns the IP Information from the endpoint as json using IPinfo.io account and Joins results with itself on 'src_ip' and 'dest_ip' field.
example4 = ipinfo src_ip dest_ip prefix=true privacy=true
comment4 = Returns the IP Information from the endpoint as json using IPinfo.io account and Joins results with itself on 'src_ip' and 'dest_ip' field along with privacy information
tags = ipinfo ip
maintainer = Neel Shah

[ipinfo-options]
syntax = (alltypes=<bool>)? | (prefix=<bool>)? | (privacy=<bool>)?| (abuse=<bool>)? | (company=<bool>)? | (carrier=<bool>)?| (asn=<bool>)? | (domains=<bool>)? | (restapi=<bool>)? | (country_asn=<bool>)? | (resproxy=<bool>)? | (resproxy_lookback=<string>)?
description = Lookup command to lookup data from IPinfo API. Please store token using setup option before using app and pass IPs. resproxy_lookback accepts values: 7 or 30 (days). Default is 30.

[ipinfolite-command]
syntax = ipinfolite <ipinfolite-options>
shortdesc = Lightweight lookup command for basic IP information from local MMDB or the IPinfo API
description = Lookup command to lookup basic IP geolocation data from local MMDB or the IPinfo API. Must specify at least one IP field. This is a simplified version optimized for common use cases.
usage = public
example1 = ipinfolite ip
comment1 = Returns basic IP geolocation information for the IP field
example2 = ipinfolite src_ip prefix=true
comment2 = Returns IP information for src_ip with field name prefix
example3 = ipinfolite src_ip dest_ip
comment3 = Returns IP information for both src_ip and dest_ip fields
example4 = ipinfolite ip restapi=true
comment4 = Forces the use of REST API instead of local MMDB
tags = ipinfo ip lite

[ipinfolite-options]
syntax = (prefix=<bool>)? | (restapi=<bool>)?
description = Options for ipinfolite command. prefix adds field name prefixes, restapi forces REST API usage.

