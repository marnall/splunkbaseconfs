[ipinfomax-command]
syntax = ipinfomax <ipinfomax-options>
shortdesc = Lookup command for the IPinfo Max dataset (REST API only).
description = Lookup command for the IPinfo Max dataset, providing the full Plus feature set plus residential proxy behavioral signals (is_res_proxy, last_seen, percent_days_seen). Must specify at least one IP field. This bundle is REST API only and has no MMDB equivalent, so REST API mode must be enabled either globally via method=RESTAPI or per-invocation via restapi=true.
usage = public
example1 = ipinfomax ip
comment1 = Returns the full Max dataset for the IP field
example2 = ipinfomax src_ip prefix=true
comment2 = Returns Max data for src_ip with field name prefix
example3 = ipinfomax src_ip dest_ip
comment3 = Returns Max data for both src_ip and dest_ip fields
example4 = ipinfomax ip restapi=true
comment4 = Forces REST API usage for this invocation (required when method=MMDB is configured globally)
tags = ipinfo ip max

[ipinfomax-options]
syntax = (prefix=<bool>)? | (restapi=<bool>)?
description = Options for ipinfomax command. prefix adds field name prefixes. restapi forces REST API usage; required when the app is globally set to MMDB mode since Max has no MMDB equivalent.

[ipinforesproxy-command]
syntax = ipinforesproxy <ipinforesproxy-options>
shortdesc = Reads residential proxy data from local MMDB or the IPinfo API
description = Lookup command to lookup residential proxy data from local MMDB or the IPinfo API. Must specify at least one IP field. Supports 7 or 30 day lookback periods.
usage = public
example1 = ipinforesproxy ip
comment1 = Returns residential proxy information for the IP using 30 day lookback (default)
example2 = ipinforesproxy ip lookback=30
comment2 = Returns residential proxy information for the IP using 30 day lookback
example3 = ipinforesproxy src_ip dest_ip lookback=7
comment3 = Returns residential proxy information for both src_ip and dest_ip using 7 day lookback
example4 = ipinforesproxy ip prefix=true lookback=7
comment4 = Returns residential proxy information with field name prefix using 7 day lookback
tags = ipinfo ip residential proxy

[ipinforesproxy-options]
syntax = (prefix=<bool>)? | (restapi=<bool>)? | (lookback=<string>)?
description = Options for ipinforesproxy command. lookback accepts values: 7 or 30 (days). Default is 30.

