[ip.sample]
disabled = false
debug = false
mode = sample
index = ipinfo_test
interval = 0
count = 100
earliest = now
latest = now
autotimestamp = false
sourcetype = ipinfo
source = ip.sample

token.0.token = "IP":(\d+)
token.0.replacementType = file
token.0.replacement = $SPLUNK_HOME/etc/apps/ipinfo_app/samples/ip.txt
