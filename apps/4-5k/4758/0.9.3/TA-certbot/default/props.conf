[certbot:log]
FIELDALIAS-aob_gen_certbot_log_alias_1 = vendor_component AS service
FIELDALIAS-aob_gen_certbot_log_alias_4 = vendor_level AS status
FIELDALIAS-aob_gen_certbot_log_alias_5 = vendor_message AS action
FIELDALIAS-aob_gen_certbot_log_alias_6 = vendor_details AS message
MAX_TIMESTAMP_LOOKAHEAD = 32
TIME_FORMAT = %Y-%m-%d %H:%M:%S.%3
TIME_PREFIX = ^
category = Splunk App Add-on Builder
pulldown_type = 1
EXTRACT-vendor_date,vendor_level,vendor_component,vendor_message,vendor_details = ^(?<vendor_date>\d{4}(?:\-\d\d){2} [^,]+,[^:]+):(?<vendor_level>[^:]+):(?<vendor_component>[^:]+):(?<vendor_message>[^\n\r]+)(?<vendor_details>(?(?=^\d{4}(?:\-\d\d){2})|[^\r])+)?
