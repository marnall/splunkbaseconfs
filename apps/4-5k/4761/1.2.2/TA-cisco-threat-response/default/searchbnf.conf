[threatresponse-command]
syntax = threatresponse (<threatresponse-options>)* <field-list>
shortdesc = Allow user to query threatresponse for context or verdict.
description = Query treatresponse for context or verdict. Must specify at least one field to query.
usage = public
example1 = 'threatresponse verdict = <field>'
example2 = 'threatresponse context = <field> <object_1> .. <object_n>'
example3 = 'threatresponse targets = <field>'
tags = threatresponse verdict context targets

[threatresponse-options]
syntax = verdict=<string> | context=<string> <string> | targets=<string>
description = 'threatresponse verdict=' provides a verdict for an observable in a Splunk record.\
  'threatresponse context=' contextualizes an observable in a Splunk record.\
  Objects should contain items like 'tools', 'indicators', 'judgements' etc.\
  'threatresponse targets=' provides sightings' targets for an observable in a Splunk record.
