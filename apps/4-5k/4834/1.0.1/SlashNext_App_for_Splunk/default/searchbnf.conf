[snxhostreputation-command]
syntax = snxhostreputation host=<hostname/ip/fqdn> | host_field=<fieldname>
description = Search in SlashNext Cloud database and retrieve reputation of a host.
example1 = | snxhostreputation host=www.slashnext.com
comment1 = Execute Host Reputation on Domain: "www.slashnext.com"
example2 = | snxhostreputation host=11.22.33.44
comment2 = Execute Host Reputation on IP: "11.22.33.44"
example3 = | snxhostreputation host_field=domains
comment3 = Execute Host Reputation on "domains" field in all the passed events
usage = public

[snxhosturls-command]
syntax = snxhosturls host=<hostname/ip/fpdn> urls_limit=<int>
description = Search in SlashNext Cloud database and retrieve list of all URLs associated with the specified host.
example1 = | snxhosturls host=www.slashnext.com urls_limit=10
comment1 = Retrieve at maximum 10 URLs with Domain: "www.slashnext.com"
example2 = | snxhosturls host=11.22.33.44 urls_limit=10
comment2 = Retrieve at maximum 10 URLs with IP: "11.22.33.44"
usage = public

[snxhostreport-command]
syntax = snxhostreport host=<hostname/ip/fqdn>
description = Queries the SlashNext Cloud database and retrieves a detailed report for a host and associated URL.
example1= | snxhostreport host=www.slashnext.com
comment1 = Retreive Host Report for Domain: "www.slashnext.com"
example2 = | snxhostreport host=11.22.33.44
comment2 = Retreive Host Report for IP: "11.22.33.44"
usage = public

[snxurlscansync-command]
syntax = snxurlscansync url=<Url>
description = Perform a real-time URL scan with SlashNext cloud-based SEER Engine in a blocking mode.
example1 = | snxurlscansync url=www.slashnext.com/about/
comment1 = Execute a Synchronous URL Scan on URL: www.slashnext.com/about/
usage = public

[snxurlscanreport-command]
syntax = snxurlscanreport scan_id=<SlashNext Scan ID> extended_info=<boolean>
description = Queries the SlashNext Cloud database and retrieves a detailed report for a Scan ID.
example1 = | snxurlscanreport scan_id=3b8f8a58-837a-4b81-8a0b-4654ab1e304b
comment1 =  Retrieve Scan Report against Scan ID: 3b8f8a58-837a-4b81-8a0b-4654ab1e304b
example2 = | snxurlscanreport scan_id=3b8f8a58-837a-4b81-8a0b-4654ab1e304b extended_info=true
comment2 =  Retrieve Scan Report against Scan ID: 3b8f8a58-837a-4b81-8a0b-4654ab1e304b with Extended Information (Screenshot, HTML and Text data)
usage = public

[snxurlscan-command]
syntax = snxurlscan url=<Url> | url_field=<fieldname>
description = Perform a real-time URL reputation scan with SlashNext cloud-based SEER Engine.
example1 = | snxurlscan url=www.slashnext.com/about/
comment1 = Execute URL Scan on URL: www.slashnext.com/about/
example2 = | snxurlscan url_field=urls
comment2= Execute URL Scan on "urls" field in all the passed events
usage = public

[snxapiquota-command]
syntax = snxapiquota
description = Find information about your API quota, like current usage, quota left etc.
example = | snxapiquota
usage = public