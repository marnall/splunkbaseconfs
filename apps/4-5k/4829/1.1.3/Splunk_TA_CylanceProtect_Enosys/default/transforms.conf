[protecthostname]
REGEX = \"Device\sName\":\s+\"([^"]+)
FORMAT = host::$1
DEST_KEY = MetaData:Host

[protecthostname_ns]
REGEX = \"DeviceName\":\s+\"([^"]+)
FORMAT = host::$1
DEST_KEY = MetaData:Host

[protecthostname_syslog]
REGEX = Device\sName:\s+([^,]+)
FORMAT = host::$1
DEST_KEY = MetaData:Host

