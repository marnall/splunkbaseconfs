[launcher]
version = 5.0.0
description = The Splunk TA MISP42 can pull data from MISP (custom commands) or push to MISP (alert actions & misprest).
author = Remi Seguy

[id]
version = 5.0.0
name = misp42splunk

[install]
build = 1741719232
is_configured = false
state = enabled

[package]
id = misp42splunk
check_for_updates = true

[ui]
label = MISP42
supported_themes = light, dark
is_visible = true

[triggers]
reload.misp42splunk_settings = simple
reload.misp42splunk_instances = simple
