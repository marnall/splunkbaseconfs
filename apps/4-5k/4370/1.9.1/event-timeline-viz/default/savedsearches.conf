[default]
default.visualizations.custom.event-timeline-viz.event-timeline-viz.orientation = "bottom"
default.visualizations.custom.event-timeline-viz.event-timeline-viz.allowOverlap = false
default.visualizations.custom.event-timeline-viz.event-timeline-viz.tooltipDateFormat = "DD-MMM-YYYY"
default.visualizations.custom.event-timeline-viz.event-timeline-viz.tooltipTimeFormat = "hh:mm:ss"
default.visualizations.custom.event-timeline-viz.event-timeline-viz.zoomMax = "315360000000000"
default.visualizations.custom.event-timeline-viz.event-timeline-viz.zoomMin = "10"


#Tokens
default.visualizations.custom.event-timeline-viz.event-timeline-viz.tokenStart = "tok_et_start"
default.visualizations.custom.event-timeline-viz.event-timeline-viz.tokenEnd = "tok_et_end"
default.visualizations.custom.event-timeline-viz.event-timeline-viz.tokenLabel = "tok_et_label"
default.visualizations.custom.event-timeline-viz.event-timeline-viz.tokenData = "tok_et_data"
default.visualizations.custom.event-timeline-viz.event-timeline-viz.tokenAllVisible = "tok_et_all_visible"

#Colors
default.visualizations.custom.event-timeline-viz.event-timeline-viz.backgroundColor = "#ffffff"
default.visualizations.custom.event-timeline-viz.event-timeline-viz.eventColor = "#d5ddf6"
default.visualizations.custom.event-timeline-viz.event-timeline-viz.textColor = "#000000"

#New as of 1.3.0
# Can sort groups by name or time
default.visualizations.custom.event-timeline-viz.event-timeline-viz.sortGroupsBy = "name"

#New as of 1.3.0
# Can sort groups by name or time
default.visualizations.custom.event-timeline-viz.event-timeline-viz.disableZoom = false

