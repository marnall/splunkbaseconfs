## VJM - Scheduled Search to update the lookups with completed reports ##
[VJM-Config - Sched - Report Item Completed]
alert.track = 0
cron_schedule = */10 * * * *
dispatch.earliest_time = -10m@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = vj_splunk
request.ui_dispatch_view = search
description = Scheduled Search to pick up Reports being Executed. Updating History and My Journey lookups.
search = | inputlookup vj_my_journey \
| join item_id \
    [ search index=_internal sourcetype=splunkd_ui_access "GET /en-US/splunkd/__raw/servicesNS/*/saved/searches/*" NOT "_new" \
    | fields user,_time,file \
    | join user\
        [| inputlookup vj_cfg_contact_user \
        | fields user,name \
        | rename name AS user_name \
        | table user, user_name] \
    | eval time_field=round(_time,0) \
    | eval session_id=user."_".time_field \
    | fields file,user,user_name,time_field,session_id \
    | rename file AS item_id \
    | rex mode=sed field=item_id "s/%3//g" \
    | rex mode=sed field=item_id "s/%20/ /g"]\
| `vj_cfg_hist_usage_rpt_ins`
