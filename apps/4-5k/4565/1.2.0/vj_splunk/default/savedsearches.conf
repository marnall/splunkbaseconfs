[Sec- Authentication - DB Access history]
alert.track = 0
dispatch.earliest_time = @d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = vj_splunk
request.ui_dispatch_view = search
search = eventtype="vj_index" sourcetype=vj:mysql:login\
| rex field=user "\x5C{1}(?<user_cn>.*)"\
| eval user=if(isnull(user_cn),user,user_cn)\
| append [| inputlookup vj_mysql_db_useraccess | fields user, DatabaseName, HasDBAccess] \
| append [| inputlookup vj_mysql_db_userdetails | fields user, dbdetail, value] \
| eval user_access=DatabaseName." - Has Access(".HasDBAccess.")" \
| eval user_details=dbdetail." - ".value\
| stats max(_time) AS Last_Logon_Time, list(user_details) AS User_Object_Details, list(user_access) AS User_DB_Access, count by user \
| sort -Last_Logon_Time\
| head 5\
| convert ctime(Last_Logon_Time) \
| fillnull value="Never Logged On" Last_Logon_Time \
| table user, count, Last_Logon_Time, User_Object_Details, User_DB_Access

[Sec- Authentication - VPN Distance Details]
alert.track = 0
dispatch.earliest_time = -1h@h
dispatch.latest_time = @h
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = vj_splunk
request.ui_dispatch_view = search
search = eventtype="vj_index" sourcetype=vj:juniper:sslvpn "Session Started"\
| iplocation src_ip\
| eval date=strftime(_time, "%Y-%m-%d %H:%M:%S") \
| strcat lat "," lon as latlon\
| stats first(Country) AS First_Country, last(Country) AS Last_Country, min(latlon) as first_latlon, dc(Country) AS Country_Count, values(eval("|-".Country." - Time: ".max(date))) AS Summary, max(latlon) AS second_latlon, min(_time) AS First_Login_Time, max(_time) AS Last_Login_Time by user\
| haversine originField=first_latlon second_latlon units=mil\
| eval Login_Time_Difference=tostring(Last_Login_Time-First_Login_Time,"duration")\
| convert ctime(First_Login_Time)\
| convert ctime(Last_Login_Time)\
| eval distance=tostring(round(distance,0),"commas")\
| sort -distance\
| eval Summary="|Total Distance in Miles: ".distance."|Total Time Difference: ".Login_Time_Difference."|Login History:".Summary\
| makemv delim="|" allowempty=t Summary\
| table user, Summary, First_Country, First_Login_Time, first_latlon, Last_Country, Last_Login_Time, second_latlon, distance, Login_Time_Difference


