[Sec- Authentication - Windows - Logon Session Details]
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
dispatch.earliest_time = @d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = area
display.visualizations.show = 0
request.ui_dispatch_app = vj_splunk
request.ui_dispatch_view = search
search = eventtype="vj_index" source=vj:WinEventLog:Security (EventCode=4624 OR EventCode=4634 OR EventCode=4647)\
| fields Logon_ID, _time, EventCode, Account_Name, host\
| eval Logon_ID=if(EventCode==4624,mvindex(Logon_ID,1),Logon_ID) \
| eval LogonUser=if(EventCode==4624,mvindex(Account_Name,1),Account_Name)  \
| stats first(_time) AS start_time, last(_time) AS end_time by LogonUser,Logon_ID,host\
| eval duration=start_time-end_time\
| sort -duration\
| eval dur_time=tostring(duration,"duration")\
| eval start_time=strftime(start_time, "%m/%d/%y %I:%M %p") \
| eval end_time=strftime(end_time, "%m/%d/%y %I:%M %p") \
| search duration>0\
| table host, LogonUser, Logon_ID, start_time, end_time, dur_time

