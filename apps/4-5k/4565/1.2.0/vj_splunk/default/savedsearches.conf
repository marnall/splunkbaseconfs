[Sec- Indicators - Compromised User Activity Summary]
dispatch.earliest_time = -1h@h
dispatch.latest_time = @h
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = vj_splunk
request.ui_dispatch_view = search
alert.track = 0
search = eventtype="vj_index" (hax0r OR 10.11.36.53 OR 27.35.11.11)\
| eval signature=if(isnull(signature),sourcetype,signature)\
| eval time_period=strftime(_time, "%Y-%m-%d %I:%M %p")\
| eval System_Summary="|".time_period."|--Src(".src.")".if(isnull(dest),"","|--Dest(".dest.")")\
| eval Signature_Summary=time_period." - ".signature\
| transaction host\
| stats max(time_period) AS end_time_period, min(time_period) AS start_time_period, sum(duration) AS total_duration, values(Signature_Summary) AS Signature_Summary,values(src) AS Source_Systems,values(dest) AS Destination_Systems, count by host\
| eval Time_Summary="From: ".start_time_period."|To: ".end_time_period."|-- Duration(".tostring(total_duration,"duration").")"\
| eval mv_cnt=mvcount(Signature_Summary)\
| sort 0 -mv_cnt\
| makemv delim="|" allowempty=t Time_Summary\
| table host, Time_Summary, Source_Systems, Destination_Systems, Signature_Summary

