| eval Summary="|Total Distance in Miles: ".distance."|Total Time Difference: ".Login_Time_Difference."|Login History:".Summary\
| makemv delim="|" allowempty=t Summary\
| table user, Summary, First_Country, First_Login_Time, first_latlon, Last_Country, Last_Login_Time, second_latlon, distance, Login_Time_Difference

[Sec- Indicators - Login Distance Calculations]
action.keyindicator.invert = 0
alert.track = 0
display.general.type = statistics
display.page.search.mode = verbose
display.visualizations.show = 0
request.ui_dispatch_app = vj_splunk
request.ui_dispatch_view = search
dispatch.earliest_time = -1h@h
dispatch.latest_time = @h
search = eventtype="vj_index" sourcetype="vj:juniper:sslvpn"\
| iplocation src_ip\
| eval login_location=if(isnull(City) OR City="",Country,City.", ".Country)\
| eval date=strftime(epoch, "%Y-%m-%d %H:%M:%S")\
| eval short_lon=round(lon, 2), short_lat=round(lat, 2)\
| eventstats min(_time) AS First_Login_Time, max(_time) AS Last_Login_Time by user\
| transaction user maxspan=12h maxevents=2 mvlist=t mvraw=f delim="|"\
| eval first_src=mvindex(src_ip ,0), last_src=mvindex(src_ip ,1)\
| eval first_location=mvindex(login_location,0), second_location=mvindex(login_location,1)\
| where first_src!=last_src AND isnotnull(first_location) OR isnotnull(second_location)\
| eval first_lat=mvindex(short_lat, 0), second_lat=mvindex(short_lat, 1)\
| eval first_lon=mvindex(short_lon, 0), second_lon=mvindex(short_lon, 1)\
| eval src_ip=mvdedup(src_ip), user=mvdedup(user), First_Login_Time=mvdedup(First_Login_Time), Last_Login_Time=mvdedup(Last_Login_Time)\
| eval  duration=Last_Login_Time-First_Login_Time\
| eval  lat1_r='first_lat'*pi()/180, lat2_r='second_lat'*pi()/180\
| eval  delta=('second_lon'-'first_lon')*pi()/180\
| eval  R=if('mil'="m",3959, 6372.8)\
| eval  "distance"=R*acos(sin(lat1_r)*sin(lat2_r) + cos(lat1_r) * cos(lat2_r) * cos(delta))\
| eval rate_mps = distance/duration, rate_mph = rate_mps * 3600\
| eval distance=round(distance, 0)\
| eval tdm=duration/60\
| eval tdm=round(tdm, 2)\
| eval First_Login_Time=strftime(First_Login_Time,"%m/%d/%y %I:%M %P"), Last_Login_Time=strftime(Last_Login_Time,"%m/%d/%y %I:%M %P")\
| table user, src_ip, First_Login_Time, Last_Login_Time, login_location, first_location, second_location, duration, distance, tdm, rate_mph\
| sort -rate_mph -distance\
| rename tdm as "Time Difference (Minutes)", rate_mph as "Speed (MPH)", distance as "Distance (Miles)", login_location AS "Login Locations"

