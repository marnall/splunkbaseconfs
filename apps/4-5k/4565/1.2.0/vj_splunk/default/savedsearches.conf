[Sec- Authentication - All - Success Ratio - By User]
alert.track = 0
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.statistics.format.0 = number
display.statistics.format.0.field = Fail_Percent
display.statistics.format.0.precision = 1
display.statistics.format.0.unit = %
display.statistics.format.1 = number
display.statistics.format.1.field = Success_Percent
display.statistics.format.1.precision = 0
display.statistics.format.1.unit = %
display.statistics.format.2 = color
display.statistics.format.2.colorPalette = minMidMax
display.statistics.format.2.colorPalette.maxColor = #DC4E41
display.statistics.format.2.colorPalette.minColor = #FFFFFF
display.statistics.format.2.field = Fail_Percent
display.statistics.format.2.scale = minMidMax
display.visualizations.show = 0
request.ui_dispatch_app = vj_splunk
request.ui_dispatch_view = search
search = eventtype="vj_index" login OR logoff OR Authorization OR authentication \
| eval action=if(action="login" OR action="allowed", "success",action) \
| fillnull app action user src_nt_host src_ip host status Logon_Type value="unknown" \
| stats count by action app user _time,src_nt_host,src_ip,host, status, Logon_Type\
| fields - unknown \
| fields user, status, _time, host,src_ip,action,Logon_Type\
| eval src_ip=replace(src_ip,"::ffff:|::1","") \
| eval src_nt_host=if(isnull(src_nt_host),if(isnull(src_ip) OR src_ip=="127.0.0.1" OR src_ip=="" OR src_ip=="-",upper(host),src_ip),src_nt_host) \
| eval Session_Status="Audit ".status \
| stats max(_time) AS latest, min(_time) AS earliest, count AS sesscount, dc(src_nt_host) AS Session_Host_Count, values(Logon_Type) AS Session_Types, count(eval(status="success")) AS success_count, count(eval(status="failure")) AS fail_count by user \
| eval First_Attempt=strftime(earliest, "%m/%d/%Y %H:%M:%S") \
| eval Last_Attempt=strftime(latest, "%m/%d/%Y %H:%M:%S") \
| eval Fail_Percent=round((fail_count/sesscount)*100,2) \
| eval Total_Attempts=fail_count+success_count \
| sort -Fail_Percent, - Total_Attempts \
| eval Success_Percent=round((success_count/sesscount)*100,2) \
| table user, Session_Host_Count, Total_Attempts, Fail_Percent, Success_Percent, First_Attempt, Last_Attempt \
| rename user AS Logon_User

[Sec- Authentication - Windows - Failed Logon Details]
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.maxLines = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = vj_splunk
request.ui_dispatch_view = search
search = eventtype="vj_index" source="vj:WinEventLog:Security" (EventCode=4625 OR ((EventCode=4768 OR EventCode=4771 OR EventCode=4776) Keywords="Audit Failure")) user_type="user"\
| fields user, status, _time, host,src_ip,src_nt_host,signature,Failure_Reason,Logon_Type,session_id,Sub_Status\
| eval Domain_Account=if(Sub_Status=="0xC0000064" OR Error_Code=="0xC0000064","Non_Domain_Account","Domain_Account")\
| eval Logon_User=lower(user) \
| eval src_ip=if(isnull(src_ip) OR match(src_ip,"^::|\-|127.0.0.1"),upper(host),src_ip) \
| eval src_nt_host=if(isnull(src_nt_host),src_ip,src_nt_host) \
| fillnull value="Not In Event" src_nt_host, src_ip,Failure_Reason,signature \
| eval Session_Status="Audit ".status \
| fields _time, host,src_ip,src_nt_host,Logon_User, status, Session_Status,signature,Failure_Reason,session_id,Logon_Type,Domain_Account\
| table _time, host,src_ip,src_nt_host,Logon_User, status, Session_Status,signature,Failure_Reason,session_id,Logon_Type,Domain_Account\
| stats count by _time, host,src_ip,src_nt_host,Logon_User, status, Session_Status,signature,Failure_Reason,session_id,Logon_Type,Domain_Account

