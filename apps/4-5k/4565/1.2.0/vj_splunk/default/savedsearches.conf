| eval Time_Period=strftime(_time, "%m/%d %I:%M:%S %p")\
| stats count, last(Time_Period) AS l_Time_Period by src_user, user\
| eval Target_User_History=user." (Last Attempt: ".l_Time_Period.")"\
| stats values(Target_User_History) AS Target_User_History, sum(count) AS Total_Attempts by src_user\
| sort -Total_Attempts\
| rename src_user AS Source_User

