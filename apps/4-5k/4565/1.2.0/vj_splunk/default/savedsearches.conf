[Sec- Windows File Audit Full Details]
alert.suppress = 0
alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
dispatch.earliest_time = @d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = area
display.visualizations.show = 0
request.ui_dispatch_app = vj_splunk
request.ui_dispatch_view = search
search = eventtype="vj_index" source="vj:WinEventLog:security" Object_Server="Security" TaskCategory="File System"\
| eval Object_Path=Object_Name\
| eval temp=_time\
| convert timeformat="%m-%d-%Y %H:%M:%S" ctime(temp) AS eventtimes\
| eval history=eventtimes."(User: ".Account_Name." Type:".Accesses.")"\
| stats values(history) as Change_History, values(EventCode) as Win_Event_IDs, values(RecordNumber) as Win_Event_Record, min(eventtimes) as First_Change_Time, values(Account_Name) as Change_Admin by Object_Path\
| dedup Object_Path\
| eval Win_Event_Record=mvjoin(Win_Event_Record,", ")\
| eval Win_Event_IDs=mvjoin(Win_Event_IDs,", ")\
| eval Change_Type=mvjoin(Change_Type,", ")\
| Table First_Change_Time, Object_Path, Change_Admin, Win_Event_IDs, Win_Event_Record, Change_History\
| sort First_Change_Time

