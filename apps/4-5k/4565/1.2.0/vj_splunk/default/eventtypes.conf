######## Index Definitions ########
[vj_index]
search = index=vj_ex

[vj_data_ex]
search = eventtype="vj_index" vj_sgs!="1" vj_walk!="1"
tags = ValueJourneySampleData

[vj_data_sgs]
search = eventtype="vj_index" vj_sgs="1" host!="dc-pla-01"
tags = ValueJourneySampleData,SecurityTutorial

[vj_data_walk]
search = eventtype="vj_index" vj_walk="1"
tags = ValueJourneySampleData,ITOATutorial

#### VJ Event Types ####
[vj_ua-mobile-android]
search =  eventtype="vj_data_walk" useragent="*Android*"
#ua.match(/(Android)\s+([\d.]+)/)

[vj_ua-mobile-iphone]
search = eventtype="vj_data_walk" useragent="*iPhone*" AND NOT useragent="*iPod*"
#ua.match(/(iPhone\sOS)\s([\d_]+)/)

[vj_ua-mobile-ipad]
search = eventtype="vj_data_walk" useragent="*iPad*"
#ua.match(/(iPad).*OS\s([\d_]+)/)

[vj_ua-mobile-ipod]
search = eventtype="vj_data_walk" useragent="*iPod*"

[vj_ua-mobile-webos]
search = eventtype="vj_data_walk" useragent="*webOS*"
#ua.match(/(webOS)\/([\d.]+)/)

[vj_ua-mobile-blackberry]
search = eventtype="vj_data_walk" useragent="*BlackBerry*"
#ua.match(/(BlackBerry).*Version\/([\d.]+)/)

[vj_ua-mobile-windowsphone]
search = eventtype="vj_data_walk" useragent="*Windows Phone*"

###### Cisco Authentication ######
[vj_cisco_authentication]
search = eventtype="vj_data_walk" sourcetype="vj:cisco:*" action="success" OR action="failure"
tags = authentication

###### Windows Authentication ######
[vj_windows_authentication]
search = eventtype="vj_index" source="vj:WinEventLog:Security" (EventCode=4624 OR EventCode=4634 OR EventCode=4647 OR EventCode=4778 OR EventCode=4779 OR EventCode=4800 OR EventCode=4801 OR EventCode=4802 OR EventCode=4803 OR EventCode=4625 OR EventCode=4726  OR EventCode=4739 OR EventCode=4743 OR EventCode=624 OR EventCode=628 OR EventCode=642 OR EventCode=644)
tags = authentication

###### Juniper SSLVPN ######
[vj_juniper_sslvpn]
search = eventtype="vj_data_walk" sourcetype=vj:juniper:sslvpn
tags = network vpn

[vj_juniper_sslvpn_authentication]
search = eventtype="vj_data_walk" sourcetype=vj:juniper:sslvpn ("Session started" OR "Session ended" OR "logout" OR "Login failed" OR "logged in" OR "exiting configuration mode")
tags = authentication

[vj_juniper_sslvpn_start]
search = eventtype="vj_data_walk" sourcetype=vj:juniper:sslvpn "Network Connect: Session started"
tags = start session

[vj_juniper_sslvpn_end]
search = eventtype="vj_data_walk" sourcetype=vj:juniper:sslvpn "Network Connect: Session ended"
tags = end session

###### Web Data ######
[vj_Web]
search = eventtype="vj_data_walk" (sourcetype="vj:access_custom" OR sourcetype="vj:access_combined")
tags = Web

###### NIX Authentication #####

###### Globals ######
[vj_nix_security]
search = eventtype="vj_index" sourcetype="vj:linux_secure"
#tags = os unix

[vj_nix_configs]
search = eventtype="vj_index" source="/vj/etc/*" OR source="*.conf" OR source="*.cfg"

[vj_nix_errors]
search = eventtype="vj_index" NOT sourcetype=stash error OR critical OR failure OR fail OR failed OR fatal
tags = error

#### Authentication

## ksu
[vj_ksu_authentication]
search = eventtype="vj_index" NOT sourcetype=stash NOT sourcetype=vj:ossec ksu ("authentication failed" OR authenticated OR (Account authorization (failed OR successful)))
tags = authentication

## login
[vj_login_authentication]
search = eventtype="vj_data_walk" ("login" OR "logged on" OR "logged out" OR "logon" OR "MySQL_Logoff" OR "MySQL_Login")
tags = authentication

## pam
[vj_pam_unix_authentication]
search = eventtype="vj_index" NOT sourcetype=stash NOT sourcetype=vj:ossec pam_unix (gdm OR sudo OR su OR sshd) ("authentication" OR "session opened")
tags = authentication

## passwd
#Oct  2 20:45:29 host passwd[15323]: User admin: Authentication failure
[vj_passwd-auth-failure]
search = eventtype="vj_index" process=passwd Authentication failure punct="*__::__[]:__:__"
tags = application authentication

## rlogin
[vj_rlogin_too_many_failures]
search = eventtype="vj_index" NOT sourcetype=stash "general syslog msg" "TOO MANY LOGIN TRIES"
tags = application attack watchlist

## Detects a failed user login via Telnet or Rlogin (except root) on Linux Red Hat 6.2 or 7 server.
[vj_remote_login_failure]
search = eventtype="vj_index" NOT sourcetye=stash "pam_rhosts_auth" OR "denied to" OR "access not allowed"
tags = application authentication remote

## sshd
[vj_sshd_authentication]
# osx sshd authentication error
# Jul 16 11:10:45 mycomputer sshd[34666]: error: PAM: authentication error for xxx from localhost via ::1
search = eventtype="vj_index" NOT sourcetype=stash NOT sourcetype=vj:ossec sshd (((Accepted OR Failed OR failure OR "Invalid user" OR "authentication error") from) OR "Authorized to" OR "Authentication tried" OR "Login restricted")
tags = authentication remote

[vj_ssh_login_postponed]
search = eventtype="vj_index" punct="*_::__[]:____*_...___" sshd Postponed
tags = authentication

[vj_ssh_open]
search = eventtype="vj_index" punct="*__::_*_[]:_(:):_____*__(=)" sshd (session opened) OR (connection from)
tags = communicate connect

# example = Dec 17 15:15:12 domU-12-31-39-03-01-11 sshd[24912]: Connection closed by 195.43.9.246
[vj_ssh_close]
search = eventtype="vj_index" punct="*__::_*_[]:____*..." OR punct="*__::_*_[]:_(:):_____" OR punct="*__::_*_()[]:_____" sshd (Closing connection to) OR (Connection closed by) OR (session closed)
tags = access stop logoff

# example = Dec 17 18:31:44 domU-12-31-39-03-01-11 sshd[31792]: Received disconnect from 74.53.187.50: 11: Bye Bye
[vj_ssh_disconnect]
search = eventtype="vj_index" punct="*__::_*_[]:___*...:_:__"  Bye Received disconnect
tags = access stop logoff

[vj_ssh_check_pass]
search = eventtype="vj_index" sshd check pass user unknown (punct="__*::__()[]:__;__" OR punct="*__::_*_[]:_(:):__;__")
#tags =

## su
[vj_su_authentication]
search = eventtype="vj_index" NOT sourcetype=stash NOT sourcetype=vj:ossec su NOT pam_unix ((from to) OR succeeded OR successful OR failed)
tags = authentication

[vj_su_failed]
search= eventtype="vj_index" NOT sourcetype=stash (("failed SU to another user" AND "Agent platform:" AND "linux-x86") OR ("failed SU to another user" AND "authentication failure" AND "for su service") OR ("failed SU to another user" AND logname=*) OR ("BAD SU "))
tags = authentication

[vj_su_session]
search = eventtype="vj_index" NOT sourcetype=stash su: session
tags = session

[vj_su_root_session]
search = eventtype="vj_index" NOT sourcetype=stash su: session root
tags = session privileged

[vj_app_su]
search = eventtype="vj_index" app=su
tags = local privileged

[vj_app_sudo]
search = eventtype="vj_index" app=sudo
tags = local privileged
## Telnet
[vj_wksh_authentication]
search = eventtype="vj_index" NOT sourcetype=stash NOT sourcetype=vj:ossec wksh "HANDLING TELNET CALL"
#tags = authentication

[vj_nix_ncftpd_logins]
search = eventtype="vj_index" ncftpd punct="__::_*:_*"
#tags = os unix ftp authentication

[vj_failed_login]
search = eventtype="vj_index" "failed login" OR "FAILED LOGIN" OR "Authentication failure"  OR "Failed to authenticate user" OR "authentication ERROR" OR "Failed password for"

[vj_Failed_SU]
search= eventtype="vj_index" ("failed SU to another user" AND "Agent platform:" AND "linux-x86") OR ("failed SU to another user" AND "authentication failure" AND "for su service") OR ("failed SU to another user" AND logname=*) OR (exe="/bin/su" AND res="failed") OR (FAILED su for) OR (source="/var/adm/sulog" SU "-") OR ("BAD SU ")

###### END FROM UNIX APP ######

###### Heartblead Scenario ######
[vj_sslnegotiationfailed]
search = eventtype="vj_data_walk" sourcetype=vj:juniper:sslvpn "SSL Negotiation Failed"

[vj_vpnfailedlogin]
search = eventtype="vj_data_walk" sourcetype=vj:juniper:sslvpn action=failure "Login failed"

[vj_vpnsuccessfullogin]
search = eventtype="vj_data_walk" or eventtype="vj_data_walk" sourcetype=vj:juniper:sslvpn "Session started"

[vj_sql_authentication]
search = eventtype="vj_data_walk" sourcetype=vj:mysql:login
#tags = authentication

## IOT - ICS Security Eventtypes ##

[vj_badge-access]
search= eventtype="vj_index" sourcetype=vj:badge_access
tags= access_control

[vj_firmware]
search= eventtype="vj_index" sourcetype=vj:ics_firmware
tags= change_management

[vj_ftp_auth_insecure]
search= eventtype="vj_index" NOT sourcetype=stash ftpd "FTP LOGIN FROM"
tags= authentication cleartext insecure success

[vj_monitoring]
search = eventtype="vj_index" tag=network
tags= monitoring

[vj_ms-sysmon-network]
search = eventtype="vj_index" sourcetype="vj:XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode="3"

[vj_ms-sysmon-process]
search = eventtype="vj_index" sourcetype="vj:XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" (EventCode="1" OR EventCode="5" OR EventCode="6" OR EventCode="8" OR EventCode="9" OR EventCode="10" OR EventCode="15" OR EventCode="17" OR EventCode="18")

[vj_ms-sysmon-filemod]
search = eventtype="vj_index" sourcetype="vj:XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" (EventCode="11" OR EventCode="2")

[vj_ms-sysmon-regmod]
search = eventtype="vj_index" sourcetype="vj:XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" (EventCode="12" OR EventCode="13" OR EventCode="14")

[vj_ms-sysmon-wmimod]
search = eventtype="vj_index" sourcetype="vj:XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" (EventCode="19" OR EventCode="20" OR EventCode="21")

###### Opsec Traffic ######
[vj_opsec]
search = eventtype="vj_index" sourcetype=vj:opsec
#tags = network

[vj_opsec_communicate]
search = eventtype="vj_index" (sourcetype=vj:opsec opsec_product="*Firewall*")
#tags = firewall communicate

[vj_opsec_vpn]
search = eventtype="vj_index" sourcetype=vj:opsec:vpn
#tags = network session communicate vpn

# what constitutes session start
[vj_opsec_vpn_start]
search = eventtype="vj_index" sourcetype=vj:opsec:vpn  (opsec_vendor_action=encrypt OR opsec_vendor_action=decrypt OR opsec_reason="connected to gateway")
#tags = start


## Threat Blade
[vj_opsec_malware_attack]
search = eventtype="vj_index" sourcetype=vj:opsec:anti_virus OR sourcetype=opsec:anti_malware OR (sourcetype=opsec:threat_emulation verdict=Malicious)
#tags = malware attack

[vj_opsec_smartdefense]
search = eventtype="vj_index" sourcetype=vj:opsec:smartdefense
#tags = ids attack 

###### Opsec Audit ######
[vj_opsec_audit]
search = eventtype="vj_index" sourcetype=vj:opsec:audit 
#tags = change

## Network Change
[vj_opsec_audit_change]
search = eventtype="vj_index" sourcetype=vj:opsec:audit (opsec_vendor_operation="Create Object" OR opsec_vendor_operation="Modify Object" OR opsec_vendor_operation="Delete Object")
#tags = audit

## Network Authentication
[vj_opsec_audit_authentication]
search = eventtype="vj_index" sourcetype=vj:opsec:audit (opsec_vendor_operation="Log In" OR opsec_vendor_operation="Log Out" OR opsec_vendor_operation="Force Log Out")
#tags = authentication privileged

## Filesystem
[vj_opsec_audit_filesystem]
search = eventtype="vj_index" sourcetype=vj:opsec:audit Subject="File Operation"
#tags = endpoint

[vj_pan]
search = eventtype="vj_index" sourcetype=vj:pan:*

[vj_pan_firewall]
search = eventtype="vj_index" sourcetype=vj:pan:traffic OR sourcetype=vj:pan:threat OR sourcetype=vj:pan:config OR sourcetype=vj:pan:system OR sourcetype=vj:pan:hipmatch OR sourcetype=vj:pan:correlation
#tags = network

[vj_pan_config]
search = eventtype="vj_index" sourcetype=vj:pan:config
#tags = change

[vj_pan_traffic]
search = eventtype="vj_index" sourcetype=vj:pan:traffic
#tags = network communicate

[vj_pan_traffic_start]
search = eventtype="vj_index" sourcetype=vj:pan:traffic AND log_subtype="start"
#tags = network session start

[vj_pan_traffic_end]
search = eventtype="vj_index" sourcetype=vj:pan:traffic AND log_subtype="end"
#tags = network session end

[vj_pan_system]
search = eventtype="vj_index" sourcetype=vj:pan:system
#tags = update status 

[vj_pan_threat]
search = eventtype="vj_index" sourcetype=vj:pan:threat AND log_subtype != "url" log_subtype != "file" log_subtype != "wildfire" log_subtype != "data" 
#tags = ids attack

[vj_pan_file]
search = eventtype="vj_index" sourcetype=vj:pan:threat AND log_subtype = "file" 
#tags = web

[vj_pan_url]
search = eventtype="vj_index" sourcetype=vj:pan:threat AND log_subtype = "url" 
#tags = web 

[vj_pan_data]
search = eventtype="vj_index" sourcetype=vj:pan:threat AND log_subtype = "data" 
#tags = web 

[vj_pan_spyware]
search = eventtype="vj_index" sourcetype=vj:pan:threat AND log_subtype = "spyware" 
#tags = ids attack

[vj_pan_wildfire_malicious]
search = eventtype="vj_index" sourcetype=vj:pan:threat AND log_subtype="wildfire" AND verdict=malicious
#tags = malware attack

[vj_pan_wildfire]
search = eventtype="vj_index" sourcetype=vj:pan:threat AND log_subtype = "wildfire" 
#tags = malware operations

[vj_pan_malware_attacks]
search = eventtype="vj_index"((sourcetype=vj:pan:endpoint OR sourcetype=vj:pan:traps4) (log_subtype="Prevention Event" OR log_subtype="Notification Event" OR log_subtype="Post Detection Event" OR log_subtype="Provisional Event" OR log_subtype="Service Warning" OR log_subtype="Access Violation" OR log_subtype="Verdict Changed Any To Malware")) OR (sourcetype=pan:threat_traps)
#tags = malware attack

[vj_pan_malware_operations]
search = eventtype="vj_index" ((sourcetype=pan:endpoint) (log_subtype!="Prevention Event" AND log_subtype!="Notification Event" AND log_subtype!="Post Detection Event" AND log_subtype!="Provisional Event" AND log_subtype!="Service Warning" AND log_subtype!="Access Violation" AND log_subtype!="Verdict Changed Any To Malware")) OR (sourcetype=pan:analytics_traps OR sourcetype=pan:system_traps OR sourcetype=pan:config_traps)
#tags = malware operations

[vj_pan_endpoint]
search = eventtype="vj_index" sourcetype=vj:pan:endpoint OR sourcetype=vj:pan:traps4 OR sourcetype=vj:pan:analytics_traps OR sourcetype=vj:pan:threat_traps OR sourcetype=vj:pan:system_traps OR sourcetype=vj:pan:config_traps
#tags = malware

[vj_pan_traps]
search = eventtype="vj_index" sourcetype=vj:pan:endpoint OR sourcetype=vj:pan:traps4 OR sourcetype=vj:pan:analytics_traps OR sourcetype=vj:pan:threat_traps OR sourcetype=vj:pan:system_traps OR sourcetype=vj:pan:config_traps
#tags = malware

[vj_pan_correlation]
search = eventtype="vj_index" sourcetype=vj:pan:correlation

[vj_pan_email]
search = eventtype="vj_index" sourcetype=vj:pan:threat AND recipient="*" AND sender="*"

[vj_pan_aperture]
search = eventtype="vj_index" sourcetype=vj:pan:aperture

[vj_pan_aperture_incident]
search = eventtype="vj_index" sourcetype=vj:pan:aperture AND log_type="incident"

[vj_pan_aperture_remediation]
search = eventtype="vj_index" sourcetype=vj:pan:aperture AND log_type="remediation"

[vj_pan_aperture_policy_violation]
search = eventtype="vj_index" sourcetype=vj:pan:aperture AND log_type="policy_violation"

[vj_pan_aperture_activity_monitoring]
search = eventtype="vj_index" sourcetype=vj:pan:aperture AND log_type="activity_monitoring"

[vj_pan_aperture_admin_audit]
search = eventtype="vj_index"  sourcetype=vj:pan:aperture AND log_type="admin_audit"

[vj_vsftpd]
search= eventtype="vj_index" sourcetype=vj:vsftpd
tags= application

[vj_vsftpd_access]
search= eventtype="vj_index" sourcetype=vj:vsftpd LOGIN
tags= authentication cleartext

[vj_vsftpd_access_failure]
search= eventtype="vj_index" sourcetype=vj:vsftpd LOGIN FAIL
tags= failure

[vj_vsftpd_access_success]
search= eventtype="vj_index" sourcetype=vj:vsftpd LOGIN OK
tags= success

[vj_vsftpd_access_success_anon]
