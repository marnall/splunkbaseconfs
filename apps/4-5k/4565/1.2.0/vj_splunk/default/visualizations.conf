#
# Declare shared visualizations
#

[bullet_graph]
label = Bullet Graph
description = Track key performance indicators in context.
search_fragment = | table title value range_low range_med range_high target
supports_drilldown = True
supports_trellis = True

[horizon_chart]
label = Horizon Chart
description = Track value changes above and below a baseline.
search_fragment = | timechart count by comparison_category
default_height = 400
supports_drilldown = False
supports_trellis = False

[sankey_diagram]
label = Sankey Diagram
default_height = 500
description = A sankey diagram is visualization method for displaying the magnitude of flow between nodes in a network.
search_fragment = | stats stats_function(size_field) [stats_function(color_field)] by source_category target_category

[parallel_coordinates]
label = Parallel Coordinates
description = Show relationships between multiple dimensions.
search_fragment = | table dimension1 dimension2 [dimension3] [dimension4] ...
default_height = 320
supports_drilldown = False
supports_trellis = False

[network_topology]
label = Network Topology
description = Graph visualization for network topology
search_fragment = | table sourceHost sourceRole targetHost targetRole linkType
default_height = 600

[timeline]
label = Timeline
description = Show activity time intervals and events across a resource set.
search_fragment = | table _time resource user duration
supports_drilldown = True

[leaflet_maps]
label = (Legacy) Clustered Single Value Map Visualization
description = Use Maps+ for new projects. Use this visualization for legacy compatibility with old dashbaords.
default_height = 600
search_fragment = | fillnull | eval description = "<b>".description."</b>" | table latitude, longitude, description