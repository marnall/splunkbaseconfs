[rqaware]
definition = inputlookup rqaware.csv\
| stats values(Age) as Age values(Application) as Application values(DataType) as DataType values(FeedCategory) as FeedCategory values(FeedSource) as FeedSource, values(Frequency) as Frequency values(LastSeenDate) as LastSeenDate values(Score) as Score values(TotalScore) as TotalScore values(blank1) as blank1 values(blank2) as blank2 values(blank3) as blank3 by IOC\
| outputlookup rqaware_dedup.csv
iseval = 0

[rqaware_ip]
definition = `rqaware_dedup`\
| search DataType=IPAddress
iseval = 0

[rqaware_threat_ip(1)]
args = ip_field
definition = search [|`rqaware` \
| search DataType=IPAddress\
| fields IOC\
| fields - _raw\
| rename IOC as $ip_field$]
iseval = 0

[rqaware_ioc_lookup(1)]
args = ioc_field
definition = lookup rqaware_dedup.csv IOC as $ioc_field$ OUTPUT Age, FeedCategory, FeedSource, Frequency, LastSeenDate, Score, TotalScore\

iseval = 0

[rq_include(2)]
args = lookup,fields
definition = search [|inputlookup append=t $lookup$ | fields $fields$]
iseval = 0

[rqaware_threat_url(1)]
args = url_field
definition = search [|`rqaware` | search DataType=URL | fields IOC | fields - _raw | rename IOC as $url_field$]
iseval = 0

[rqaware_threat(1)]
args = ioc_field
definition = search [|`rqaware` | fields IOC | fields - _raw | rename IOC as $ioc_field$]
iseval = 0

[drop_dm_object_name(1)]
args       = object
definition = rename "$object$.*" as *
[rqaware]
definition = inputlookup rqaware.csv | stats values(Age) as Age values(Application) as Application values(DataType) as DataType values(FeedCategory) as FeedCategory values(FeedSource) as FeedSource, values(Frequency) as Frequency last(LastSeenDate) as LastSeenDate values(Score) as Score values(TotalScore) as TotalScore values(blank1) as blank1 values(blank2) as blank2 values(blank3) as blank3 by IOC | outputlookup rqaware_dedup.csv

[rqaware_ioc_lookup(1)]

[rqaware_dedup]
definition = inputlookup rqaware_dedup.csv
iseval = 0

[rq_dynamic_time(1)]
args = token
definition = eval start_time=relative_time(now(),"$$token$.earliest$") | eval end_time=coalesce(relative_time(now(),"$$token$.latest$"),now()) | where _time>=start_time AND _time<=end_time
iseval = 0

[rqaware_url]
definition = `rqaware` | search DataType=URL
iseval = 0
