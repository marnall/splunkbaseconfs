alert.track = 0
auto_summarize.dispatch.earliest_time = -1d@h
cron_schedule = */15 * * * *
description = Populates the rqaware summary index with IDS matches
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = rqaware
request.ui_dispatch_view = search
schedule_priority = highest
search = | tstats  allow_old_summaries=t values(sourcetype) as sourcetype values(IDS_Attacks.category) as category values(IDS_Attacks.user) as user values(IDS_Attacks.ids_type) as ids_type values(IDS_Attacks.severity) as severity count \
    from datamodel=Intrusion_Detection.IDS_Attacks\
    where IDS_Attacks.signature!=unknown\
    by _time, IDS_Attacks.src, IDS_Attacks.dest, IDS_Attacks.signature IDS_Attacks.action span=1m \
|`drop_dm_object_name(IDS_Attacks)`\
| eval dm="Intrusion_Detection"\
| lookup rqaware_dedup.csv IOC as src OUTPUT IOC as src_match\
| lookup rqaware_dedup.csv IOC as dest OUTPUT IOC as dest_match\
| eval match_field=coalesce(src_match,dest_match)\
| where isnotnull(match_field)\
|`rqaware_ioc_lookup(match_field)`\
| stats max(Age) as Age, values(FeedCategory) as FeedCategory, values(FeedSource) as FeedSource max(Frequency) as Frequency, last(LastSeenDate) as LastSeenDate max(Score) as Score, max(TotalScore) as TotalScore values(dm) as dm values(src_match) as src_match, values(dest_match) as dest_match by _time, src, dest, signature, action, sourcetype, category, user, ids_type, severity, count\
| eval match_field=if(isnotnull(src_match),"src","dest")\
| fields - src_match, dest_match\
| addinfo

