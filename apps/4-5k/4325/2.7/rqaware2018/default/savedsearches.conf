[RQAware IP - All (Tstats)]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
alert.track = 0
cron_schedule = */10 * * * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","signature"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = rqaware
request.ui_dispatch_view = search
schedule_priority = highest
search = | tstats allow_old_summaries=t values(RQ_Aware.dm) as datamodel values(RQ_Aware.match_field) as match_field values(RQ_Aware.orig_sourcetype) as sourcetype values(RQ_Aware.app) as app values(RQ_Aware.user) as user values(RQ_Aware.protocol) as protocol sum(RQ_Aware.bytes_in) as bytes_in sum(RQ_Aware.bytes_out) as bytes_out values(RQ_Aware.Age) as age values(RQ_Aware.FeedCategory) as feed_category values(RQ_Aware.FeedSource) as feed_source values(RQ_Aware.Frequency) as frequency values(RQ_Aware.Score) as score values(RQ_Aware.TotalScore) as total_score sum(RQ_Aware.count) as count\
    from datamodel=RQ_Aware.RQ_Aware\
    where nodename=RQ_Aware.IP_Match\
    by _time, RQ_Aware.src, RQ_Aware.dest, RQ_Aware.src_ip, RQ_Aware.dest_ip, RQ_Aware.dest_port, RQ_Aware.action span=1m\
|`drop_dm_object_name(RQ_Aware)`\
| eval feed_category=split(feed_category," ")\
| eval feed_source=split(feed_source," ")

