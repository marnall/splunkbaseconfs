[nodes]
root_endpoint = {"/vdc/nodes":{"sourcetype":"dell:nodes","fields":"node","store_data":"nodeid", "flux_node_fields":["data_ip", "ip", "private_ip", "data2_ip", "mgmt_ip","nodename"]}}
dependent_endpoint = {"/dashboard/nodes/{id}?cfTimeFrame={1d;7d;30d}&cfTarget={50;80}":{"sourcetype":"dell:node:info"},"/dashboard/nodes/{id}/disks":{"sourcetype":"dell:node:disk"}}
flux_endpoint = {"endpoint":"/flux/api/external/v2/query", "product_version": "3.6", "flux_entities":{"transaction_system_user_errors_derivative": {"api_query":"from(bucket:\"monitoring_main\")|> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_error\" and r.host == \"{host}\")|> range(start: {start_time}, stop: {end_time})|> keep(columns:[\"_time\", \"_start\", \"_stop\", \"_field\", \"_value\", \"host\"])|> difference(nonNegative: true)|> window(every: 2m)|> drop(columns:[\"host\"])|> sum()|> fill(column: \"_value\", value: 0)|> rename(columns:{{\"_start\": \"_time\"}})", "sourcetype":"dell:flux:internal:errors"},"total_success_fail":{"api_query": "from(bucket: \"monitoring_main\")|> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_transactions\" and r.host == \"{host}\" )|> range(start: {start_time}, stop: {end_time})|> keep(columns:[\"_time\", \"_field\", \"_value\", \"host\", \"_stop\",\"_start\"])|> difference(nonNegative: true)|> window(every: 2m)|> fill(column: \"_value\", value: 0)|> drop(columns:[\"host\"])|> sum()|> rename(columns:{{\"_start\": \"_time\"}})", "sourcetype":"dell:flux:internal:transaction"},"transactions_error_code": {"api_query":"from(bucket: \"monitoring_main\")|> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_error_code\" and r.host == \"{host}\")|> range(start: {start_time}, stop: {end_time})|> keep(columns:[\"_time\", \"_value\", \"host\", \"_stop\", \"_start\", \"code\"])|> difference(nonNegative: true)|> window(every: 2m)|> fill(column: \"_value\", value: 0)|> drop(columns:[\"host\"])|> sum()|> rename(columns:{{\"_start\": \"_time\"}})", "sourcetype":"dell:flux:error:code"}, "transactions_error_protocol": {"api_query":"from(bucket: \"monitoring_main\")|> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_transactions_head\" and r.host == \"{host}\" and r._field == \"failed_request_counter\")|> range(start: {start_time}, stop: {end_time})|> keep(columns:[\"_time\", \"_value\", \"host\", \"_stop\", \"_start\", \"head\"])|> difference(nonNegative: true)|> window(every: 2m)|> fill(column: \"_value\", value: 0)|> drop(columns:[\"host\"])|> sum()|> rename(columns:{{\"_start\": \"_time\"}})","sourcetype":"dell:flux:error:protocol"},"transaction_system_user_errors": {"api_query":"from(bucket:\"monitoring_main\")|> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_error\" and r.host == \"{host}\")|> range(start: {start_time}, stop: {end_time})|> keep(columns:[\"_time\", \"_field\", \"_value\", \"host\"])|> derivative(nonNegative: true)|> window(every: 5m)|> mean()|> drop(columns:[\"host\"])|> sum()|> group(columns:[\"_field\"])|> rename(columns:{{\"_start\": \"_time\"}})", "sourcetype":"dell:flux:internal:error"},"transaction_failures_success": {"api_query":"from(bucket:\"monitoring_main\")|> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_transactions\" and r.host == \"{host}\")|> range(start: {start_time}, stop: {end_time})|> keep(columns:[\"_time\", \"_field\", \"_value\", \"host\"])|> derivative(nonNegative: true)|> window(every: 5m)|> mean()|> drop(columns:[\"host\"])|> sum()|> group(columns:[\"_field\"])|> rename(columns:{{\"_start\": \"_time\"}})","sourcetype":"dell:flux:internal:transactions"}, "disk_flux_entities":{"api_query": "from(bucket: \"monitoring_main\")|> filter(fn: (r) => r._measurement =~ /_IO_Statistics_data_(read|write)/ and r._field =~ /_{fields}/ and r.host == \"{host}\")|> range(start: {start_time}, stop: {end_time})|> keep(columns: [\"_measurement\",\"_value\",\"_stop\",\"_time\",\"_field\"])|> derivative(nonNegative: true)|> window(every:5m)|> mean()|> drop(columns:[\"_measurement\"]) |> sum()|> group()", "fields": {"USERTotal": "\"_stop\": \"_time\"", "XORTotal": "\"_stop\": \"_time\"", "CCTotal": "\"_stop\": \"_time\"", "ECTotal": "\"_stop\": \"_time\"", "GEOTotal": "\"_stop\": \"_time\"", "RECOVERTotal": "\"_start\": \"_time\""}, "sourcetype":"dell:flux:disk"},"transaction_internal_throughput": {"api_query":"from(bucket: \"monitoring_main\") |> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_throughput\" and r.host == \"{host}\")|> range(start: {start_time}, stop: {end_time})|> keep(columns:[\"_time\", \"_field\", \"_value\", \"host\"])|> derivative(nonNegative: true)|> window(every: 5m)|> mean()|> drop(columns:[\"host\"])|> sum()|> group(columns:[\"_field\"])|> rename(columns: {{_start: \"_time\"}})","sourcetype":"dell:flux:internal:throughput"}, "transaction_read_p50_latency": {"api_query": "from(bucket: \"monitoring_main\") |> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_latency\" and r._field =~ /.*/ and r.id == \"ttfb_read\" and  r.host == \"{host}\") |> range(start: {start_time}, stop: {end_time}) |> drop(columns:[\"_measurement\", \"process\", \"tag\"]) |> difference(nonNegative: true) |> fill(column: \"_value\", value: 0) |> group(columns: [\"_field\"]) |> window(every: 5m) |> sum() |> map(fn:(r) => ({{_time:r._start, le_float: float(v:r._field), cnt_float: float(v:r._value)}})) |> drop(columns:[\"_field\"])|> histogramQuantile(quantile:0.50, upperBoundColumn: \"le_float\", countColumn: \"cnt_float\")|> rename(columns:{{\"_start\": \"_time\"}})|> set(key: \"_field\", value: \"read_p50\")", "sourcetype":"dell:flux:internal:latency"},"transaction_read_p99_latency": {"api_query": "from(bucket: \"monitoring_main\") |> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_latency\" and r._field =~ /.*/ and r.id == \"ttfb_read\" and  r.host == \"{host}\") |> range(start: {start_time}, stop: {end_time}) |> drop(columns:[\"_measurement\", \"process\", \"tag\"]) |> difference(nonNegative: true) |> fill(column: \"_value\", value: 0) |> group(columns: [\"_field\"]) |> window(every: 5m) |> sum() |> map(fn:(r) => ({{_time:r._start, le_float: float(v:r._field), cnt_float: float(v:r._value)}})) |> drop(columns:[\"_field\"])|> histogramQuantile(quantile:0.99, upperBoundColumn: \"le_float\", countColumn: \"cnt_float\")|> rename(columns:{{\"_start\": \"_time\"}})|> set(key: \"_field\", value: \"read_p99\")", "sourcetype":"dell:flux:internal:latency"},"transaction_write_p50_latency": {"api_query": "from(bucket: \"monitoring_main\") |> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_latency\" and r._field =~ /.*/ and r.id == \"ttlb_write\" and  r.host == \"{host}\") |> range(start: {start_time}, stop: {end_time}) |> drop(columns:[\"_measurement\", \"process\", \"tag\"]) |> difference(nonNegative: true) |> fill(column: \"_value\", value: 0) |> group(columns: [\"_field\"]) |> window(every: 5m) |> sum() |> map(fn:(r) => ({{_time:r._start, le_float: float(v:r._field), cnt_float: float(v:r._value)}})) |> drop(columns:[\"_field\"])|> histogramQuantile(quantile:0.50, upperBoundColumn: \"le_float\", countColumn: \"cnt_float\")|> rename(columns:{{\"_start\": \"_time\"}})|> set(key: \"_field\", value: \"write_p50\")", "sourcetype":"dell:flux:internal:latency"},"transaction_write_p99_latency": {"api_query": "from(bucket: \"monitoring_main\") |> filter(fn: (r) => r._measurement == \"statDataHead_performance_internal_latency\" and r._field =~ /.*/ and r.id == \"ttlb_write\" and  r.host == \"{host}\") |> range(start: {start_time}, stop: {end_time}) |> drop(columns:[\"_measurement\", \"process\", \"tag\"]) |> difference(nonNegative: true) |> fill(column: \"_value\", value: 0) |> group(columns: [\"_field\"]) |> window(every: 5m) |> sum() |> map(fn:(r) => ({{_time:r._start, le_float: float(v:r._field), cnt_float: float(v:r._value)}})) |> drop(columns:[\"_field\"])|> histogramQuantile(quantile:0.99, upperBoundColumn: \"le_float\", countColumn: \"cnt_float\")|> rename(columns:{{\"_start\": \"_time\"}})|> set(key: \"_field\", value: \"write_p99\")", "sourcetype":"dell:flux:internal:latency"},"disk_read": {"api_query": "from(bucket: \"monitoring_main\")|> filter(fn: (r) => r._measurement =~ /_IO_Statistics_data_read/ and r._field =~ /Total/ and r.host == \"{host}\")  |> range(start: {start_time}, stop: {end_time})|> keep(columns: [\"_measurement\",\"host\",\"_value\",\"_stop\",\"_time\", \"_field\"])|> derivative(nonNegative: true)  |> mean()  |> drop(columns:[\"_measurement\"])|> sum()|> group(columns:[\"_field\", \"host\"])|> rename(columns:{{\"_stop\": \"_time\"}})|> last() |> pivot(rowKey:[\"_time\"], columnKey: [\"_field\"], valueColumn: \"_value\")", "sourcetype":"dell:flux:disk:read","last_one_day_data":"true"},"disk_write": {"api_query": "from(bucket: \"monitoring_main\")|> filter(fn: (r) => r._measurement =~ /_IO_Statistics_data_write/ and r._field =~ /Total/ and r.host == \"{host}\")  |> range(start: {start_time}, stop: {end_time})|> keep(columns: [\"_measurement\",\"host\",\"_value\",\"_stop\",\"_time\", \"_field\"])|> derivative(nonNegative: true)  |> mean()  |> drop(columns:[\"_measurement\"])|> sum()|> group(columns:[\"_field\", \"host\"])|> rename(columns:{{\"_stop\": \"_time\"}})|> last() |> pivot(rowKey:[\"_time\"], columnKey: [\"_field\"], valueColumn: \"_value\")","sourcetype":"dell:flux:disk:write","last_one_day_data":"true"}}}
type = default

