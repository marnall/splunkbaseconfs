#
# Spark configuration file
#

[pbs]
spark_instance_id=
spark_local_dirs_root=$SPLUNK_HOME/var/log/spark
spark_local_dirs_auto_clean_up_enabled=true
spark_local_dirs_auto_clean_up_interval=1800
spark_local_dirs_ttl_sec=1800
spark_master_host=localhost
spark_ui_port=8005
spark_block_manager_port=8006
spark_driver_port=8007
spark_master_port=8008
spark_master_webui_port=8009
spark_history_webui_port=8010
spark_port_max_retries=0
splunk_master_uri=
history_server_enabled=true
spark_custom_conf_enabled=false
security=
spark_shared_secret_key=
site_affinity=default
spark_home=$SPLUNK_HOME/etc/apps/splunk_dfs_manager/vendor/spark-2.3.3-bin-hadoop2.7
active_list=
poll_timeout=60
replication_id=0