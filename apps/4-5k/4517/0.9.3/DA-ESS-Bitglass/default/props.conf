[bitglass]
MAX_DAYS_AGO=-1
MAX_TIMESTAMP_LOOKAHEAD = 55
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %m/%d/%Y %H:%M:%S
TZ = UTC
category = Custom
description = Bitglass event data
disabled = false
pulldown_type = 1

TRANSFORMS-access = set_access
TRANSFORMS-cloudsummary = set_cloudsummary
TRANSFORMS-cloudaudit = set_cloudaudit
TRANSFORMS-stats = set_stats

[source::bitglass]
FIELDALIAS-Action = action ASNEW bgaction
#FIELDALIAS-Malware = filename AS file_name email AS sender DecodedUrl AS url ipaddress AS src application AS vendor_product fileid AS signature folder AS file_path owner AS user
FIELDALIAS-Malware = filename AS file_name email AS sender DecodedUrl AS url ipaddress AS src application AS vendor_product fileid AS signature folder AS file_path filename AS signature
FIELDALIAS-DLP = application AS app filename AS object folder AS object_path
EVAL-dpl_type = bitglass
#EVAL-dlppattern = split(dlppattern,",")
EVAL-patterns = split(patterns,";")
EXTRACT-CountryISO=location=.*\|(?P<CountryISO>[A-Z][A-Z])
EXTRACT-PENALTYACCES=bgaction=.*(?P<PENALTY>(Blocked, Threat|Blocked, Preview|UnsanctionedApp|DLP, Formtext, Masked|Watermarked|Suspicioususerlocations)).*
EXTRACT-PENALTYCLOUD=status=.*(?P<PENALTY>(Internal, Shared, DLP|External, Shared, DLP|Public, Shared, DLP|Internal, Shared, Threat|External, Shared, Threat|Public, Shared, Threat| Shared, Encrypted, Internal|Shared, Encrypted, External|Shared, Encrypted, Public|Quarantined)).*

[access]
TZ = UTC
EVAL-action = if(activity="Failure","failure","success")

[cloudsummary]
TZ = UTC
FIELDALIAS-User = owner ASNEW user

[cloudaudit]
TZ = UTC
FIELDALIAS-User = owner ASNEW user
