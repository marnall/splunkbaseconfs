[jirabugstatus-command]
syntax = jirabugstatus idfield=<field_name>  (fields=<string>)?
alias =
shortdesc = Gets the bug status for the given JIRA bug id.
description = \
    This command augments records with the JIRA bug status with bug id in field specified by IDFIELD.\
    This example gets the bug status and summary.
example1 = \
    | index=bugs_index | jirabugstatus idfield=bug_id fields="status,summary"
appears-in = 1.0
maintainer = jzhang
usage = public
tags = jira bug

[mvlatestpair-command]
syntax = mvlatestpair keyfield=<field_name> valuefield=<field_name>
alias =
shortdesc = Get the latest pair in multivalue.
description = \
    This command get the latest pair in multivalue
appears-in = 2.1
maintainer = jizhang
usage = public
tags = mv latest

[mvdiff-command]
syntax = mvdiff only1=<field_name> only2=<field_name> common=<field_name> mv1=<field_name> mv2=<field_name>
alias =
shortdesc = Gets the diff of two multivalue fields
description = \
    This command computes the diff of two multivalue fields
comment1 = \
    This example gets the diff of two multivalue fields values1 and values2
example1 = \
    | index="mvdiff" sourcetype="csv" | stats values(value1) as values1,  values(value2) as values2 | mvdiff mv1=values1 mv2=values2 only1=only1 only2=only2 common=common
appears-in = 1.0
maintainer = jzhang
usage = public
tags = mv diff

[flaky-command]
syntax = flaky status_list=<field_name> intermittency=<field_name> intermittency_count=<field_name> severity=<field_name>
alias =
shortdesc = computes the metrics for flaky test
description = \
    This command computes the computes the metrics (intermittency and severity) for flaky test
comment1 = \
    This example gets the intermittency and severity metrics for flaky test
example1 = \
    | index="test_results" sourcetype="csv" | stats list(status) as status_list by test_name | flaky status_list=status_list intermittency=intermittency severity=severity
appears-in = 1.0
maintainer = jzhang
usage = public
tags = flaky