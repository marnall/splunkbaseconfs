# Update the following macros according to your own metadata if needed
# --------------------------- Customization Section Start---------------------------
[extract_metadata]
definition = rename metadata.os TO os,\
     metadata.feature TO feature,\
     testsuite.failures TO failures, \
     testsuite.tests TO total, \
     testsuite.errors TO errors, \
     testsuite.skips TO skipped, \
     testsuite.skipped TO old_skipped, \
     testsuite.passes TO passes,\
     metadata.generic_pytest_args TO pytest_args, \
     metadata.testArgs To test_args, \
     metadata.jobConfig TO jobConfig \
    | eval skipped=coalesce(skipped, old_skipped), \
      jenkins_build= job_name+"-"+build_number, \
      build_no = build_number \
    | fillnull os value="default" \
    | eval feature = if(isnull(feature) OR feature="", spath(_raw, "testsuite.testcase{0}.groupname"), feature)
iseval = 0

# In this macro, we extract the error message from the pytest stacktrace
[generate_error]
definition = rex field=failure_message "(?m)((^(?<assert>[^\"\.\(^]+?): (?<assert_message>.+)|(?<errorinfo>.+?)(?<=assert) (?<errorinfo_message>.+) |(?<errorinfo2>[^\"^]+))$)|(?<assert2>^assert) (?<assert2_message>.+)" \
    | rex field=failure_content "(?m)^E\s+(?<assert3_message>.+)" \
    | eval errorinfo_message= coalesce(assert_message, errorinfo_message, assert2_message, assert3_message)  \
    | fillnull errorinfo_message value="unknown exception message" \
    | eval errorinfo_message=replace(errorinfo_message, "^(.{300}).*(.{16})$","\1...\2") \
    | `extract_errorinfo` \
    | eval connection_errorinfo_filter=`get_error_filter("connection", "errorinfo")` \
    | eval connection_errorinfo_message_filter=`get_error_filter("connection", "errorinfo_message")` \
    | eval start_errorinfo_filter=`get_error_filter("start", "errorinfo")` \
    | eval start_errorinfo_message_filter=`get_error_filter("start", "errorinfo_message")` \
    | eval job_name_errorinfo_message=job_name.".".errorinfo_message
iseval = 0

[extract_errorinfo]
definition = rex field=errorinfo_message "^(?<setup_exception>\S+?)(:|\s|$)(.*)" \
    | rex field=failure_message "^(?<normal_exception>\S+?)(:|\s|$)(.*)" \
    | rex field=failure_content "(?m)((^(?<internal_exception>[^\"\.\(^]+?): (?<internal_exception_msg>.+)))" \
    | eval errorinfo=if(`is_setup_step`, setup_exception, normal_exception) \
    | eval errorinfo=if(`is_internal_error`, internal_exception, errorinfo) \
    | eval errorinfo_message = if(`is_internal_error`, internal_exception_msg, errorinfo_message) \
    | fillnull errorinfo value="unknown exception"
iseval = 0

[feature_group]
definition = eval split_char=if(match(feature, ".+\..+"), ".", "_") \
    | eval feature_split=split(feature, split_char) \
    | eval group_split=mvindex(feature_split,0,2) \
    | eval group_label_split=mvindex(feature_split,1,2) \
    | eval group=mvjoin(group_split, split_char) \
    | eval group_label=mvjoin(group_label_split, split_char)
iseval = 0

# Update the following macros to define the failure category

[is_setup_step]
definition = failure_message == "test setup failure"
iseval = 0

[is_internal_error]
definition = failure_message == "internal error"
iseval = 0

[match_product_bug]
definition = (match(ticket_zip, "^([A-Z]){1,7}-([0-9]+)_(Bug|Crash|)$"))
iseval = 0

[infrastructure_failures]
definition = (`connection_failures` OR `start_failures` OR `setup_failures`)
iseval = 0

[match_connection_issue_list]
definition = ((connection_errorinfo_filter!="" AND match(errorinfo, connection_errorinfo_filter))\
   OR (connection_errorinfo_message_filter!="" AND match(errorinfo_message, connection_errorinfo_message_filter)))
iseval = 0

[match_start_issue_list]
definition = ((start_errorinfo_filter!="" AND match(errorinfo, start_errorinfo_filter))\
   OR (start_errorinfo_message_filter!="" AND match(errorinfo_message, start_errorinfo_message_filter)))
iseval = 0

[get_error_filter(2)]
args = category,type
definition = [|inputlookup failure_category_lookup\
   |where category="$category$" AND type="$type$"\
   |stats count, values(filter) as filter \
   |eval filter=mvjoin(filter,"|")\
   |fillnull value="" filter\
   |eval filter="\""+filter+"\""|return $filter]
iseval = 0

[setup_failures]
definition = (NOT `match_product_bug` AND `is_setup_step` AND `match_connection_issue_list`)
iseval = 0

[connection_failures]
definition = (NOT `match_product_bug` AND NOT `is_setup_step` AND `match_connection_issue_list`)
iseval = 0

[start_failures]
definition = (NOT `match_product_bug` AND NOT `match_connection_issue_list` AND `match_start_issue_list`)
iseval = 0

[flaky_failures]
definition = (NOT `match_product_bug` AND NOT `infrastructure_failures` AND match(tag, "^flaky"))
iseval = 0

[test_failures]
definition = (NOT `match_product_bug` AND NOT `infrastructure_failures` AND NOT `flaky_failures`)
iseval = 0

# -------------------------- Customize Section END-----------------------------------

[filter_failure_suite]
definition =(testsuite.failures>0 OR testsuite.errors>0)
iseval = 0

[filter_failure_cases]
definition = search status=FAILED AND status!=SKIPPED
iseval = 0

[extract_testcase_fields]
definition = spath output=test "testsuite.testcase{}" \
    | fields - testsuite.* _raw \
    | mvexpand test \
    | spath input=test output=name "name" \
    | spath input=test output=testname "testname" \
    | eval testname=coalesce(name, testname) \
    | spath input=test output=classname "classname" \
    | spath input=test output=failure_message "failure.message" \
    | spath input=test output=failure_content "failure.content" \
    | spath input=test output=error_message "error.message" \
    | spath input=test output=error_content "error.content" \
    | spath input=test output=skipped_message "skippedmessage" \
    | spath input=test output=skipped_content "skipped.content" \
    | spath input=test output=time "time" \
    | spath input=test output=duration "duration" \
    | eval duration=coalesce(time, duration) \
    | spath input=test output=stderr "stderr" \
    | spath input=test output=stdout "stdout" \
    | spath input=test output=errordetails "errordetails" \
    | spath input=test output=errorstacktrace "errorstacktrace" \
    | eval temp=split(testname, "[") | eval testmethod=mvindex(temp,0) \
    | eval full_testname=classname.".".testname \
    | eval full_testmethod=classname.".".testmethod \
    | eval job_name_full_testmethod=urldecode(job_name).".".full_testmethod \
    | eval job_name_full_testname=urldecode(job_name).".".full_testname \
    | eval job_name_testmethod=urldecode(job_name).".".testmethod \
    | eval job_name_testname=urldecode(job_name).".".testname \
    | eval job_name_classname=urldecode(job_name).".".classname \
    | eval job_name_feature=urldecode(job_name).".".feature \
    | eval failure_message=coalesce(failure_message, error_message, errordetails) \
    | eval failure_content=coalesce(failure_content, error_content, errorstacktrace) \
    | eval skipped_content=coalesce(skipped_content, skipped_message) \
    | eval status=if(isnull(failure_message) and isnull(failure_content), "PASSED", "FAILED") \
    | eval status=if(isnull(skipped_content), status, "SKIPPED") \
    | eval stderr=if(isnull(stderr), "", stderr) \
    | eval stdout=if(isnull(stdout), "", stdout) \
    | eval original_link = if(isnull(original_link), build_url, original_link) \
    | eval html_report_url=original_link."HTML_Report/" \
    | eval s3_url=original_link."s3/" \
    | `generate_error`
iseval = 0

[fields_for_testcase_events]
definition = eval event_content = if(isnull(failure_content), "", failure_content) \
    | eval event_content = if(isnull(skipped_content), event_content, skipped_content) \
    | eval _raw = full_testname \
    | rex mode=sed field=_raw "s/$/\n \n/g" \
    | eval _raw = _raw + if(status=="PASSED", "", errorinfo + ": " + errorinfo_message) \
    | rex mode=sed field=_raw "s/$/\n \n \n/g" \
    | eval _raw = _raw + event_content \
    | rex mode=sed field=_raw "s/$/\n \n/g" \
    | eval _raw=if(isnull(stderr), _raw, _raw+stderr)|eval _raw=if(isnull(stdout), _raw, _raw+stdout)\
    | fields  _raw
iseval = 0

[extract_pytest_args]
definition =rex field=jobConfig "(?m)\"testArgs\":\"(?<testargs>[^,]*)(-k[^,]*)(\")(?m)" \
    | eval pytest_args=coalesce(pytest_args, test_args, testargs)
iseval=0

[extract_and_filter_testcase_fields]
definition = `extract_testcase_fields` \
    | fields host, build_number, pytest_args, source, job_name, feature, classname, testname, testmethod, full_testname, full_testmethod, failure_content, skipped_content, \
    status, duration, original_link, html_report_url, s3_url, job_name_feature, job_name_classname, job_name_testname, job_name_testmethod, job_name_full_testname, job_name_full_testmethod, \
    errorinfo, errorinfo_message, failure_message, stderr, stdout，connection_errorinfo_filter,connection_errorinfo_message_filter, start_errorinfo_filter, start_errorinfo_message_filter \
    | tags feature, classname, testname, testmethod, full_testname, full_testmethod, job_name_feature, job_name_classname, job_name_testname,\
    job_name_testmethod, job_name_full_testname, job_name_full_testmethod, errorinfo_message, job_name_errorinfo_message
iseval = 0

[generate_full_name_with_tag]
definition = eval notes=mvjoin(tag,",") \
    | eval full_name_with_tag=\
        if(isnotnull(tag), "[notes:"+notes+"]====>"+full_testname+"........"+duration +"s", full_testname+"........"+if(isnull(duration), "0", duration)+"s")
iseval = 0

[get_deltaS(2)]
args = last_value, current_value
definition = eval deltaS=$current_value$-$last_value$ \
    | fillnull deltaS 0 \
    | eval syn=if(deltaS>0, "(+", "(") \
    | eval deltaS =toString($current_value$)+syn+toString(deltaS)+")"
iseval = 0

[filter_tag]
definition = fields host, job_name,status, source, feature, classname,testname, testmethod, full_testname, full_testmethod,errorinfo, errorinfo_message, failure_message, \
skipped_content, duration,build_number, job_name_feature, job_name_classname, job_name_testname, job_name_testmethod, job_name_full_testname, job_name_full_testmethod, \
original_link, html_report_url,failure_content,connection_errorinfo_filter,connection_errorinfo_message_filter, start_errorinfo_filter, start_errorinfo_message_filter \
    | tags feature, classname, testname, testmethod, full_testname, full_testmethod, job_name_feature, job_name_classname, \
      job_name_testname, job_name_testmethod, job_name_full_testname, job_name_full_testmethod, errorinfo_message, job_name_errorinfo_message,failure_content
iseval = 0

[first_last_build_number]
definition = stats first(build_number) as first_build_number, last(build_number) as last_build_number \
    | eval build_number = first_build_number + ";" + last_build_number \
    | fields build_number \
    | makemv delim=";" build_number \
    | mvexpand build_number \
    | rename build_number as build_number
iseval = 0

[generate_full_name_with_tag_without_duration]
definition = eval notes=mvjoin(tag,",") \
    | eval full_name_with_tag=if(isnotnull(tag),"[notes:"+notes+"]====>"+full_testname,full_testname)
iseval = 0

[get_status_code]
definition = eval status_code=case(status=="PASSED", 1, status=="FAILED", 0, status=="SKIPPED", -1)
iseval = 0


[filter_events]
definition = event_tag="tests"
iseval = 0

[filtered_jobs]
definition = (job_name != "Splunk/generic_jobs*" AND job_name != "Testcube/generic_jobs*")
iseval = 0

[add_bug_info]
definition =  `rex_bug_id` \
    | fillnull bug_id value="empty" \
    | lookup bug_type.csv bug_id OUTPUT issue_type,bug_id as key_id\
    | mvlatestpair keyfield=key_id valuefield=issue_type \
    | fillnull issue_type value="" \
    | eval ticket_zip=mvzip(bug_id,issue_type,"_")  \
    | eval ticket_zip=mvjoin(ticket_zip, ",") \
    |eval ticket_filter="("+`settings_bug_blacklist`+")-[0-9]+_(Bug|Crash)" \
    |eval ticket_zip=replace(ticket_zip, ticket_filter, "non_product_bug") \
    | makemv ticket_zip delim=","
iseval = 0

[rex_bug_id]
definition = rex field=tag "(?<bug_id>([A-Z]){1,7}-([0-9]+))"
iseval = 0

[search_jira_bugs]
definition =rex field=bug_id "(?<bug_id>([A-Z]){1,7}-([0-9]+))"|jirabugstatus idfield=bug_id fields="status,summary,versions,fixVersions,assignee,issuetype" \
   |rename jira_status as status, jira_summary as description, jira_versions as affected_version, jira_fixVersions as fix_version, jira_assignee as assignee, jira_issuetype as issue_type \
   |eval realname=[ \
       |rest /services/authentication/current-context/context \
       |eval user="\"".realname."\""|return  $user] \
   |eval assignee=if(assignee==realname, "YOU", assignee)|sort status \
   |fillnull issue_type value="" \
   |eval ticket_zip=bug_id+"_"+issue_type \
   |eval ticket_filter="("+`settings_bug_blacklist`+")-[0-9]+_(Bug|Crash)" \
   |eval ticket_zip=replace(ticket_zip, ticket_filter, "non_product_bug")
iseval = 0

[get_duration]
definition = eval temp=tostring( job_duration,"duration") \
    | rex field=temp "^(0*)(?<duration_hour>\S+):(0*)(?<duration_minute>\S+):(\S+)" \
    | eval duration_hour=if(duration_hour>0,duration_hour+"h", "") \
    | eval duration_minute=if(duration_minute>0,duration_minute+"m", "") \
    | eval duration=duration_hour+duration_minute \
    | eval duration=if(duration=="",0,duration) \
    | fillnull duration value="N/A" \
    | fields duration
iseval =0

[get_summary_row]
definition = fillnull expected_total value="N/A" \
    | eval totalcase=passedcase+failedcase+skippedcase \
    | eval norun_case=if(expected_total=="N/A", "N/A",expected_total-totalcase) \
    | eval totalcase=if(isnull(failedcase), "N/A", passedcase+failedcase) \
    | eval passrate=if(isnull(failedcase), "N/A",toString(round(passedcase/totalcase*100,2))+"%") \
    | fillnull failedcase value="N/A" \
    | fillnull skippedcase value="N/A" \
    | fields totalcase, skippedcase, passrate, failedcase, duration
iseval = 0

[generate_failure_file]
definition =  rex field=failure_content "(?m)(?<failure_file>\S+(\\\\|/)test\S+py)(:\d+)"
iseval = 0

[settings_jira_server_url]
definition = [| rest splunk_server=local /servicesNS/nobody/ARTs/configs/conf-jira_settings \
   | fields jira_server_url  \
   | head 1 | eval jira_server_url="\"".jira_server_url."\""  \
   | return $jira_server_url]
iseval = 0

[settings_html_report]
definition = [| rest splunk_server=local /servicesNS/nobody/ARTs/configs/conf-arts_settings \
   | fields enable_html_report  \
   | fillnull value=0 enable_html_report \
   | return $enable_html_report]
iseval = 0

[settings_pytest_script]
definition = [| rest splunk_server=local /servicesNS/nobody/ARTs/configs/conf-arts_settings \
   | fields enable_pytest_script  \
   | fillnull value=0 enable_pytest_script \
   | return $enable_pytest_script]
iseval = 0

[settings_bug_blacklist]
definition = [| rest splunk_server=local /servicesNS/nobody/ARTs/configs/conf-arts_settings \
   | fields jira_bug_blacklist  \
   | fillnull value=\"\" jira_bug_blacklist \
   | eval jira_bug_blacklist="\""+jira_bug_blacklist+"\"" \
   | return $jira_bug_blacklist]
iseval = 0