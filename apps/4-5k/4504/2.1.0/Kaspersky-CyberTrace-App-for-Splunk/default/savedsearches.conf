[Emergency alert]
action.email = 1
action.email.include.view_link = 0
action.email.message.alert = Dear Splunk administrator,\
In the course of 1 minute, Kaspersky CyberTrace App for Splunk received more than 5000 dangerous URLs, IP addresses, or hashes that matched Kaspersky feeds.\
To view a full list of matches, use the following link.
action.email.priority = 1
action.email.subject.alert = Kaspersky CyberTrace App for Splunk: Emergency
action.email.to =
action.email.useNSSubject = 1
alert.severity = 4
alert.track = 1
alert.suppress = 1
alert.suppress.period = 60s
counttype = number of events
cron_schedule = * * * * *
description = Triggers if there were 5000 matches in the course of 1 minute.
dispatch.earliest_time = rt-1m
dispatch.latest_time = rt-0m
enableSched = 1
quantity = 4999
relation = greater than
request.ui_dispatch_app = Kaspersky-CyberTrace-App-for-Splunk
request.ui_dispatch_view = search
search = sourcetype=kl_cybertrace_events eventName!=NULL

