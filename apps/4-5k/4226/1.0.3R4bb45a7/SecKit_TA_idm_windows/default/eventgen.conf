[get-AllInterfaceConfig.sample]
source=powershell
sourcetype=seckit:idm:windows:interface
#mode = replay
timeMultiple = 2
backfill = -15m
#2018-08-30T18:17:50+00:00
token.0.token = \d\d\d\d-\d\d-\d\dT\d\d:\d\d:\d\d\+\d\d:\d\d
token.0.replacementType = timestamp
token.0.replacement = %Y-%m-%dT%H:%M:%S+00:00:00

token.1.token = ##name##
token.1.replacementType = static
token.1.replacement = ADserver

token.2.token = ##DC##
token.2.replacementType = static
token.2.replacement = windows1

token.3.token = ##DC1##
token.3.replacementType = static
token.3.replacement = local
