[stealthbits:fam]
EXTRACT-DistinguishedName = DistinguishedName=(?P<DistinguishedName>[^\t]+)
EXTRACT-NewAttributeValue = NewAttributeValuee=(?P<NewAttributeValue>[^\t]+)
EXTRACT-stealthbits = fam : EXTRACT-OldAttributeValue = OldAttributeValuee=(?P<OldAttributeValue>[^\t]+)
EVAL-action = case(Operation=="Update", "modified",Operation=="Delete", "deleted",Operation=="Read", "read",Operation=="Create", "created",Operation=="Rename", "modified",Operation=="Access Rights Change", "acl_modified", 1=1,"unknown")
EVAL-change_type = "filesystem"
EVAL-command = PolicyName
EVAL-dest = TargetHost
EVAL-dvc = Server
EVAL-file_access_time = _time
EVAL-file_name = replace(DistinguishedName, ".*\\\\", "")
EVAL-file_path = replace(DistinguishedName, "\\\([\w|\d|\s]+\..+)$", "")
EVAL-object = DistinguishedName
EVAL-object_attrs = case(Operation=="Access Rights Change", OldAttributeValue,AttributeName=="Filename","filename")
EVAL-result = if(BlockedEvent=="False","allowed","blocked")
EVAL-src = ClientHost
EVAL-status = if(SuccessfulChange=="True","success","failure")
EVAL-user = Perpetrator
EVAL-vendor_product = "STEALTHBITS File Activity Monitoring"
EVAL-object_category = case(ObjectType=="FILE","file", ObjectType="FOLD","folder",1=1,"unknown")
EVAL-descr = if(Operation=="Rename","renamed to: ".NewAttributeValue,null())

