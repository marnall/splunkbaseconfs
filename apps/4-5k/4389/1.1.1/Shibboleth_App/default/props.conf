#The App first takes the datta in through the process sourcetype and sends it to transforms to be parsed
[shibboleth:process]
TRANSFORMS-override_audit_st = shibboleth:audit-set-sourcetype
TRANSFORMS-override_access_st = shibboleth:access-set-sourcetype
EXTRACT-action = ^(?:[^ \n]* ){3}(?P<action>\w+)
EXTRACT-signature = ^[^\[\n]*\[(?P<signature>[^:]+)
EXTRACT-signature_id = ^[^\[\n]*\[[\w\.]+:(?<signature_id>\d+)
EXTRACT-message = ^(?:[^ \n]* ){6}(?P<message>.+)

[shibboleth:access]
REPORT = shibboleth:access-fields

[shibboleth:audit]
REPORT = shibboleth:audit-fields
FIELDALIAS-user-Field_Alias = principalName  AS user
FIELDALIAS-dest_url-Field_Alias = relyingPartyId AS dest_url
FIELDALIAS-http_method-Field_Alias = requestBinding AS http_method
FIELDALIAS-signature_id-Field_Alias = nameIdentifier AS signature_id
FIELDALIAS-src_nt_domain-Field_Alias = assertingPartyId AS src_nt_domain

