
[expose:splunk_addon_huaweicloud_account]
pattern = splunk_addon_huaweicloud_account
methods = POST, GET

[expose:splunk_addon_huaweicloud_account_specified]
pattern = splunk_addon_huaweicloud_account/*
methods = POST, GET, DELETE

[expose:splunk_addon_huaweicloud_hcs_obs]
pattern = splunk_addon_huaweicloud_hcs_obs
methods = POST, GET

[expose:splunk_addon_huaweicloud_hcs_obs_specified]
pattern = splunk_addon_huaweicloud_hcs_obs/*
methods = POST, GET, DELETE

[expose:splunk_addon_huaweicloud_settings]
pattern = splunk_addon_huaweicloud_settings
methods = POST, GET

[expose:splunk_addon_huaweicloud_settings_specified]
pattern = splunk_addon_huaweicloud_settings/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
