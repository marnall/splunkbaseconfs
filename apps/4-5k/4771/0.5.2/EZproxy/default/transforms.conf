[REPORT-ezproxy:audit]
DELIMS = "\t"
FIELDS = "datetime","action_orig","src","user","sessionid","actionstatus"

[REPORT-ezproxy:spu]
DELIMS = "\t"
FIELDS = "datetime","src","user","groups","sessionid","status","type","site","url","http_user_agent","http_referrer"

[REPORT-ezproxy:urls]
DELIMS = "\t"
FIELDS = "datetime","src","user","groups","sessionid","protocol","http_method","status","url","duration","site","http_user_agent","http_referrer","bytes"

[app]
batch_index_query = 0
case_sensitive_match = 0
filename = app.csv

[httpstatus]
batch_index_query = 0
case_sensitive_match = 0
filename = httpstatus.csv

[datasourcecheck]
batch_index_query = 0
case_sensitive_match = 0
filename = datasourcecheck.csv

[macosversions]
batch_index_query = 0
case_sensitive_match = 0
filename = macosversions.csv

[actionstatus]
batch_index_query = 0
case_sensitive_match = 0
filename = actionstatus.csv

