# server.conf

# This is required for TrackMe settings to be replicated to all members in a SHC context
[shclustering]
conf_replication_include.trackme_settings = true
conf_replication_include.trackme_account = true
conf_replication_include.trackme_vtenants = true
conf_replication_include.trackme_emails = true
conf_replication_include.trackme_ai_provider = true
