# Lookups monitor: post-processing pipeline for the rows produced by the
# `| trackmelookupsmonitor` generative command (shipped by the TA
# `TA-trackme-lookupmonitor`). Mirrors `trackme_elastic_dedicated_tracker`
# with two differences:
#   * No `data_eventcount>0` filter — lookups can legitimately be empty
#     (header-only CSV files, empty KVstore collections).
#   * Latency fields are neutralised because lookups have no `_indextime`
#     concept; the alerting hook for lookups is the delay since the last
#     filesystem mtime / max(_time), not ingestion lag.
[trackme_lookups_dedicated_tracker(1)]
definition = eval tenant_id="$tenant_id$"\
\
| where isnotnull(object) AND isnotnull(data_last_time_seen)\
\
``` Lookups have no _indextime concept; neutralise latency upstream so the abstract macro's latency-state evaluation is a no-op ```\
| eval data_last_ingest=if(isnum(data_last_ingest), data_last_ingest, data_last_time_seen)\
| eval data_last_ingestion_lag_seen=0\
| eval avg_latency_5m=0\
| eval data_max_lag_allowed=0\
\
``` Specific to lookups: carry the lookup identity through as data_index / data_sourcetype, same shape as the elastic dedicated tracker ```\
| eval data_index=if(isnull(data_index) OR data_index="none", "lookups", data_index)\
| eval data_sourcetype=if(isnull(data_sourcetype) OR data_sourcetype="none", object, data_sourcetype)\
\
``` call the abstract macro tagged as lookups (informational only — the macro does not branch on this arg today) ```\
`trackme_dsm_tracker_abstract($tenant_id$, lookups)`\
\
``` collects latest collection state into the summary index ```\
| `trackme_collect_state("current_state_tracking:splk-dsm:$tenant_id$", "object", "$tenant_id$")`\
\
``` output flipping change status if changes ```\
| trackmesplkgetflipping tenant_id="$tenant_id$" object_category="splk-dsm"\
\
```Generate splk outliers rules``` \
| `set_splk_outliers_rules($tenant_id$, "dsm")`\
\
