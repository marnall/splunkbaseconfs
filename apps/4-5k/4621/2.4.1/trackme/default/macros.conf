[get_tenant_alerts(1)]
args = tenant_id
definition = rest splunk_server=local /servicesNS/nobody/trackme/saved/searches \
| search eai:acl.app="trackme" alert.track=1 title="TrackMe alert tenant_id:$tenant_id$ - *" \
