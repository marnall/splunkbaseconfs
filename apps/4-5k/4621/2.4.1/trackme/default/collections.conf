# collections.conf

########################################
# Virtual tenancy and user preferences #
########################################

#
# TrackMe NG virtual tenants
#

[kv_trackme_virtual_tenants]
replicate = false
field.tenant_dsm_enabled = bool
field.tenant_dhm_enabled = bool
field.tenant_mhm_enabled = bool
field.tenant_cim_enabled = bool
field.tenant_flx_enabled = bool
field.tenant_wlk_enabled = bool
field.tenant_fqm_enabled = bool
field.tenant_replica = bool

# entities summary
# This collection stores a quick access view regarding the number of entities and a status summary

[kv_trackme_virtual_tenants_entities_summary]
replicate = false

# exec summary
# This collection stores the tenant objects execution summary for audit and operational status purposes

[kv_trackme_virtual_tenants_exec_summary]
replicate = false

#
# Global maintenance mode
#

[kv_trackme_maintenance_mode]
replicate = false
field.maintenance = bool
field.maintenance_mode = string
field.maintenance_message = string
field.maintenance_mode_start = number
field.maintenance_mode_end = number
field.maintenance_comment = string
field.src_user = string
field.time_started = string
field.time_updated = string
field.epoch_started = time
field.epoch_updated = time
field.knowledge_record_id = string

#
# maintenance knowledge database: can be used to store maintenance knowledge and influence SLA calculations
#

[kv_trackme_maintenance_kdb]
replicate = false
# if true, the maintenance record is disabled
field.is_disabled = bool
# number of days of validity, if set to 0, the maintenance record is valid forever
field.no_days_validity = number
# reason for the maintenance
field.reason = string
# planned, unplanned
field.type = string
# additional information
field.add_info = string
# user who created the maintenance record
field.src_user = string
# start time of the maintenance in epochtime
field.time_start = time
# end time of the maintenance in epochtime
field.time_end = time
# expiration time of the maintenance in epochtime
field.time_expiration = time
# creation time of the maintenance record
field.ctime = time
# last modification time of the maintenance record
field.mtime = time

#
# Backup collection, used to store server / backup files Metadata
#
[kv_trackme_backup_archives_info]
replicate = false
# Search-Head identifier of the peer that produced the archive (used by SHC
# cross-peer delegation: an operation lands on any peer, the handler reads
# this field to delegate to the owning peer with force_local=true)
field.server_name = string
# Last update time
field.mtime = time
# Filesystem path of the archive
field.backup_archive = string
# Size in bytes
field.size = number
# 3.0.0 (multi-archive) — groups the N+1 archives of a single backup run.
# Empty for legacy 1.0.0/2.0.0 archives produced before 2.3.22; those render
# under a synthetic "legacy" run in GET /backup_runs.
field.backup_run_id = string
# 3.0.0 — "tenant" or "global". Empty for legacy rows.
field.archive_scope = string
# 3.0.0 — tenant_id when archive_scope=tenant; empty otherwise.
field.tenant_id = string
# Schema of the archive's in-archive manifest. "3.0.0" for multi-archive,
# "2.0.0"/"1.0.0" for legacy flat archives.
field.archive_schema_version = string
# 3.0.0 — sha256 of the archive file, used for integrity verification on
# restore and to detect on-disk corruption (the production failure mode
# this format exists to address surfaced as a silent zstd-93 extraction
# error; the sha256 lets us catch it before restore even starts).
field.archive_sha256 = string
# 3.0.0 — total number of archives that make up the run this row belongs
# to (N tenant archives + 1 global). Lets the Guardian's
# backup_run_incomplete check spot a partial run without re-querying.
field.run_total_archives = number
# Run lookup acceleration — Guardian and GET /backup_runs both group on this.
accelerated_fields.archive_run_idx = {"backup_run_id": 1, "archive_scope": 1}

#
# Schema-upgrade safety-backup lock (added 2.3.23 for Issue #1557).
#
# When TrackMe's schema_version_required is bumped by a release, every
# enabled tenant's health tracker independently evaluates "I need a safety
# backup before running my migration". Without coordination, N tenants
# fire N parallel backups in the same scheduling window. The older
# coordination mechanism — an SPL search against index=_internal for a
# log beacon — lost the race to Splunk's indexing pipeline latency under
# burst load (the first 6-12 of 18 trackers all read count=0 before the
# pipeline catches up).
#
# This collection replaces the SPL beacon with an atomic KV-INSERT lock.
# The _key encodes the target schema version and the UTC date, so each
# upgrade cycle (and each day a stuck upgrade is retried) gets a fresh
# lock that's claimed by exactly one tenant tracker via KV's natural
# primary-key uniqueness:
#
#   _key = f"schema_upgrade_backup_{schema_version_required}_{YYYYMMDD}"
#
# The first tracker to INSERT wins; subsequent trackers see HTTP 409
# "duplicate key" and skip the backup attempt. SHC-replicated; no
# indexing-pipeline dependency; no race window.
#
[kv_trackme_schema_upgrade_backup_lock]
replicate = false
# When the lock was claimed (epoch seconds).
field.mtime = time
# Human-readable claim time.
field.htime = string
# Schema version the firing tracker was migrating toward when it claimed
# the lock. Forensic field — also encoded in _key.
field.schema_version_required = number
# The tenant whose tracker successfully claimed the lock and fired the
# safety backup. Forensic field — useful for "which tracker fired the
# backup on this upgrade?".
field.tenant_id_initiator = string
# The SHC peer where the firing tracker happened to be dispatched.
# Forensic field — combined with mtime, gives a cluster-wide audit of
# upgrade-time backup activity.
field.server_name = string
# HTTP status returned by the post_backup REST call. Empty if the call
# didn't return (network failure, timeout). Forensic only — the lock
# is held regardless of backup success because re-firing wouldn't help
# (the cleanup_backup_directories race would just cannibalize it again,
# and the operator has the scheduled daily backup as a separate safety
# net).
field.backup_call_status = string

#
# Per-peer post_backup in-flight lock (added 2.3.23 for Issue #1557).
#
# Defense in depth on top of the schema-upgrade trigger lock above: the
# schema-upgrade lock prevents N tenant trackers from racing each other,
# but ANY caller of post_backup (scheduled cron, manual UI click, AI
# Assistant tool, automation SPL) could otherwise still cause concurrent
# backups on the same peer. The cleanup_backup_directories helper that
# runs at the start of post_backup wipes any sibling trackme-backup-*
# working directory — fatal for any in-flight neighbour. This collection
# adds a per-peer mutex enforced at the endpoint itself.
#
# Lifecycle:
#   * On entry, post_backup attempts INSERT with
#     ``_key=f"backup_in_flight_{server_name}"``. HTTP 200/201 → caller
#     proceeds. HTTP 409 → another backup is in flight on this peer →
#     caller receives a 409 response with a clear "try again later"
#     message.
#   * On exit (success OR failure, via try/finally), the row is DELETEd
#     so the next caller can acquire.
#   * If a backup crashes without releasing the lock (process recycled,
#     unhandled exception bypassing finally), the row is stale. A
#     staleness threshold permits the next caller to DELETE the stale
#     row and re-INSERT after the threshold elapses, so an orphaned
#     lock can never block backups indefinitely.
#
[kv_trackme_backup_in_flight_lock]
replicate = false
# When the lock was acquired (epoch seconds).
field.mtime = time
# Human-readable acquisition time.
field.htime = string
# Which SHC peer holds the lock. Encoded in _key for uniqueness but
# also stored as a field for query convenience.
field.server_name = string
# The user identity recorded by the REST framework as the caller.
# Forensic only — useful for "who triggered this backup?" auditing.
field.acquired_by_user = string
# Optional free-form caller context — schema-upgrade trackers set this
# to "schema_upgrade", the scheduled saved-search to "scheduled", the
# UI to "manual", etc. Empty when not specified by the caller.
field.caller_context = string
# Run ID once known. The lock is acquired BEFORE run_id generation, so
# this is empty at acquisition time and populated once the run starts.
field.run_id = string

#
# Async restore job state (3.0.0 — added 2.3.22). Tracks the lifecycle of
# a long-running restore submitted with async=true so the frontend can
# poll for completion without holding a synchronous HTTP connection
# through a multi-GB / multi-minute payload (which would hit gateway
# timeouts in the 5-minute neighbourhood). The CLI / SPL `| trackme`
# path stays synchronous by default (async=false) — those callers
# continue to read the response on the same connection that issued the
# POST, preserving backward compatibility with existing automation.
#
[kv_trackme_backup_restore_jobs]
replicate = false
# Last update time
field.mtime = time
# Job identifier (uuid4); also the row's _key for fast lookup.
field.job_id = string
# queued | running | completed | failed | cancelled
field.status = string
# When the job was submitted (epoch seconds).
field.started_epoch = number
# When the job finished (epoch seconds, 0 while running).
field.finished_epoch = number
# Cooperative cancel signal — set to "1" by DELETE /restore_job; the
# worker checks between archives in the run loop and aborts gracefully
# (in-flight archive completes; remaining archives are not touched).
field.cancel_requested = string
# JSON-serialised body params the job was submitted with (audit / replay).
field.request_args = string
# JSON-serialised final response when status in (completed, failed).
# Frontend polls the status endpoint; once non-empty, the modal renders
# this exactly the same way as the synchronous response.
field.response = string
# Free-form progress message for the operator. Updated by the worker
# between archives so the UI can show "Restoring tenant_a (3/5)…".
field.progress = string
# The user that submitted the job (for audit + filtering jobs in the UI).
field.submitted_by = string
# Index acceleration for the auto-purge sweep.
accelerated_fields.restore_jobs_status_idx = {"status": 1, "finished_epoch": 1}

#
# License key: this KVstore is used to store the license key
#
[kv_trackme_license_key]
replicate = false

#
# Remote Account token expiration Metadata store: this KVstore is used to store expiration related metadata for remote accounts
#
[kv_trackme_remote_account_token_expiration]
replicate = false
# account name
field.account = string
# last update time
field.mtime = time
# last message for the token renewal
field.last_message = string
# remote_bearer_token_id
field.remote_bearer_token_id = string

#
# Bank holidays: used to store bank holiday periods that prevent alerts from triggering
#
[kv_trackme_bank_holidays]
replicate = false
# optional name/description for the bank holiday period
field.period_name = string
# start date in epoch timestamp
field.start_date = time
# end date in epoch timestamp
field.end_date = time
# optional comment
field.comment = string
# optional country code for imported holidays (e.g., "US", "UK", "FR")
field.country_code = string
# whether this holiday repeats yearly
field.is_recurring = bool
# user who created the record
field.src_user = string
# creation timestamp
field.time_created = time
# last update timestamp
field.time_updated = time
# optional reference to maintenance KDB record (for SLA calculations)
field.maintenance_kdb_key = string

