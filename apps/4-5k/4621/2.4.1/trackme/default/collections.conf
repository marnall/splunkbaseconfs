#

[kv_trackme_component_jobs]
replicate = false
field.created_at = number
field.last_activity = number
field.timeout = number

# AI chat async jobs
#

[kv_trackme_ai_jobs]
replicate = false
field.created_at = number
field.timeout = number

[kv_trackme_ai_agent_jobs]
replicate = false
field.created_at = number
field.timeout = number

#
# Support Diagnostic — async job tracking for long-running archive generation
# Each record represents a single support_diag generation request, with lifecycle
# queued → running → complete | error | cancelled. Expired records are purged
# opportunistically from the handler and via the general health tracker.
#

[kv_trackme_support_diag_jobs]
replicate = false
field.created_at = number
field.last_activity = number
field.timeout = number

#
# Native ML models storage (per-tenant, created dynamically)
# Collection name pattern: kv_trackme_native_ml_models_tenant_<tenant_id>
# These store fitted density function models as an alternative to file-based .mlmodel storage
#

[kv_trackme_native_ml_models]
replicate = false
field.model_data = string
field.model_type = string
field.feature_name = string
field.dist_type = string
field.fitted_at = string
field.group_count = string
field.mtime = string

#
# Health tracker state: persists task execution counters and timestamps for frequency tiering
# Key format: {tenant_id}:{task_name}
#

[kv_trackme_health_tracker_state]
replicate = false
field.tenant_id = string
field.task_name = string
field.execution_count = number
field.last_execution_time = time
field.last_execution_duration = number
field.last_execution_status = string
field.mtime = time

#
# Global cache: stores globally shared cached results (e.g., license status) to avoid
# redundant expensive operations across multiple tenants.
# Key format: {cache_name} (e.g., "license_cache")
#

[kv_trackme_global_cache]
replicate = false
field.cache_name = string
field.cache_data = string
field.cache_time = time
field.updated_by_tenant_id = string
field.mtime = time

#
# Sourcetype cap alerts: stores active safeguard warnings for DSM sourcetype explosion
# Key format: SHA256 of tenant_id:data_index
#

[kv_trackme_sourcetype_cap_alerts]
replicate = false
field.tenant_id = string
field.data_index = string
field.collection_name = string
field.sourcetype_count = number
field.cap_value = number
field.mtime = time

#
# Configuration Guardian alerts: stores active misconfiguration warnings discovered by
# the Configuration Guardian framework (e.g. insufficient tenant owner capabilities).
# Key format: SHA256 of check_type:scope_key (deterministic upsert)
#

[kv_trackme_configuration_guardian_alerts]
replicate = false
field.check_type = string
field.severity = string
field.scope = string
field.scope_key = string
field.tenant_id = string
field.subject = string
field.title = string
field.message = string
field.remediation = string
field.metadata = string
field.mtime = time

#
# Virtual Groups: read-only cross-tenant aggregation views
# Key format: SHA256 of group_id
#

[kv_trackme_virtual_groups]
replicate = false
field.group_id = string
field.group_alias = string
field.group_description = string
field.group_category = string
field.tenants_scope = string
field.priority_filter = string
field.entity_filter = string
