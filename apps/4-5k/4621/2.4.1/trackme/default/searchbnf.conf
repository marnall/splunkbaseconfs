# Generating command to compute variable delay thresholds from historical metrics
[trackmesplkvariabledelay-command]
syntax = | trackmesplkvariabledelay tenant_id=<tenant identifier> component=<component, dsm or dhm> object=<Optional, entity name> method=<Optional, perc95 or perc99, default: perc95> lookback=<Optional, lookback period, default: -30d> min_samples=<Optional, minimum metric samples per hour/day, default: 10> dry_run=<Optional, true or false, default: true>
description = \
    This generating command computes variable delay thresholds from historical mstats data for DSM/DHM entities. \
    It aggregates per day-of-week and hour-of-day delay metrics, computes safe thresholds using the specified \
    statistical method (perc95 or perc99), and groups them into named time-based slots. \
    In dry_run mode (default), it returns proposed slots without saving. When dry_run=false, slots are saved \
    to the variable delay KVstore collection and the entity's delay policy is updated to 'variable'. \
    Syntax: \
    | trackmesplkvariabledelay tenant_id=<tenant identifier> component=<component, dsm or dhm> object=<Optional, entity name> method=<Optional, perc95 or perc99, default: perc95> lookback=<Optional, lookback period, default: -30d> min_samples=<Optional, minimum metric samples per hour/day, default: 10> dry_run=<Optional, true or false, default: true>
comment1 = \
    This example computes variable delay thresholds for all DSM entities in dry_run mode
example1 = \
    | trackmesplkvariabledelay tenant_id="mytenant" component="dsm"
comment2 = \
    This example computes and saves variable delay thresholds for a specific entity
example2 = \
    | trackmesplkvariabledelay tenant_id="mytenant" component="dsm" object="network:pan:traffic" method="perc99" lookback="-14d" dry_run="false"
shortdesc = Compute variable delay thresholds from historical metrics for DSM/DHM entities
usage = public
tags = trackme

# Generating command for variable delay auto-review of DSM/DHM entities
[trackmesplkvariabledelayreview-command]
syntax = | trackmesplkvariabledelayreview tenant_id=<tenant identifier> component=<component, dsm or dhm> review_frequency_sec=<Optional, minimum seconds between reviews per entity, default: 604800> deviation_threshold_pct=<Optional, minimum percentage change to trigger update, default: 20> lookback=<Optional, lookback period, default: -30d> method=<Optional, perc95 or perc99, default: perc95> min_samples=<Optional, minimum metric samples per hour/day, default: 10> max_threshold_sec=<Optional, safety cap for thresholds in seconds, default: 604800> max_runtime=<Optional, maximum runtime in seconds, default: 7200>
description = \
    This generating command performs automated review of variable delay thresholds for DSM/DHM entities. \
    It iterates through entities that have variable delay and auto-review enabled, re-computes thresholds \
    from recent mstats data, and updates slot configurations when the deviation from current thresholds \
    exceeds the configured percentage threshold. The command respects review frequency to avoid redundant \
    re-computation and includes runtime management to stay within the allowed execution window. \
    Syntax: \
    | trackmesplkvariabledelayreview tenant_id=<tenant identifier> component=<component, dsm or dhm> review_frequency_sec=<Optional, minimum seconds between reviews per entity, default: 604800> deviation_threshold_pct=<Optional, minimum percentage change to trigger update, default: 20> lookback=<Optional, lookback period, default: -30d> method=<Optional, perc95 or perc99, default: perc95> min_samples=<Optional, minimum metric samples per hour/day, default: 10> max_threshold_sec=<Optional, safety cap for thresholds in seconds, default: 604800> max_runtime=<Optional, maximum runtime in seconds, default: 7200>
comment1 = \
    This example runs the variable delay auto-review for DSM entities with default settings
example1 = \
    | trackmesplkvariabledelayreview tenant_id="mytenant" component="dsm"
comment2 = \
    This example runs the auto-review with custom deviation threshold and lookback
example2 = \
    | trackmesplkvariabledelayreview tenant_id="mytenant" component="dhm" deviation_threshold_pct="15" lookback="-14d" method="perc99"
shortdesc = Auto-review and update variable delay thresholds for DSM/DHM entities
usage = public
tags = trackme

# TrackMe Native Density Function fit command (replaces MLTK | fit DensityFunction)
[trackmefit-command]
syntax = | trackmefit feature=<feature field name> by=<Optional, groupby field name> lower_threshold=<Optional, lower density threshold, default: 0.01> upper_threshold=<Optional, upper density threshold, default: 0.01> into=<Optional, model name to save> tenant_id=<Optional, tenant identifier for KVstore storage> dist_type=<Optional, distribution type: auto|norm|expon|gaussian_kde|beta, default: auto> exclude_dist=<Optional, comma-separated distribution types to exclude from auto selection> model_storage=<Optional, kvstore or file, default: kvstore>
description = \
    This streaming command fits a native density function model to piped data, replacing Splunk's MLTK \
    '| fit DensityFunction' command. It uses scipy distributions directly with simple per-group fitting. \
    Supports 4 distribution types (norm, expon, gaussian_kde, beta) with automatic selection via \
    wasserstein distance. Models can be stored in KVstore (default) or as files. \
    Output: augments each input row with BoundaryRanges, LowerBound, UpperBound, IsOutlier fields. \
    Syntax: \
    | trackmefit feature=<feature> by=<groupby field> lower_threshold=<float> upper_threshold=<float> into=<model_name> tenant_id=<tenant_id> dist_type=<distribution> model_storage=<kvstore|file>
comment1 = \
    This example fits a native density function model with per-hour grouping
example1 = \
    | mstats avg(trackme.splk.dsm.lag_event_sec) as splk.dsm.lag_event_sec where index="trackme_metrics" by object span="10m" | eval factor=strftime(_time, "%H") | trackmefit feature="splk.dsm.lag_event_sec" by="factor" lower_threshold=0.005 upper_threshold=0.005 into="my_model" tenant_id="mytenant"
comment2 = \
    This example fits without grouping and saves to file storage
example2 = \
    | mstats avg(trackme.splk.dsm.lag_event_sec) as splk.dsm.lag_event_sec where index="trackme_metrics" by object span="10m" | trackmefit feature="splk.dsm.lag_event_sec" lower_threshold=0.01 upper_threshold=0.01 into="my_model" tenant_id="mytenant" model_storage="file"
shortdesc = Fit a native density function model to data, replacing MLTK DensityFunction
usage = public
tags = trackme

# TrackMe Native Density Function apply command (replaces MLTK | apply)
[trackmeapply-command]
syntax = | trackmeapply model_name=<model name to load and apply> tenant_id=<Optional, tenant identifier for KVstore loading> model_storage=<Optional, kvstore or file, default: kvstore>
description = \
    This streaming command applies a previously fitted native density function model to piped data, \
    replacing Splunk's MLTK '| apply model_name' command. Loads the model from KVstore (default) or \
    file and computes boundary ranges for each input row. \
    Output: augments each input row with BoundaryRanges, LowerBound, UpperBound, IsOutlier fields. \
    Syntax: \
    | trackmeapply model_name=<model_name> tenant_id=<tenant_id> model_storage=<kvstore|file>
comment1 = \
    This example applies a previously trained model from KVstore
example1 = \
    | mstats avg(trackme.splk.dsm.lag_event_sec) as splk.dsm.lag_event_sec where index="trackme_metrics" by object span="10m" | eval factor=strftime(_time, "%H") | trackmeapply model_name="my_model" tenant_id="mytenant"
comment2 = \
    This example applies a model from file storage
example2 = \
    | mstats avg(trackme.splk.dsm.lag_event_sec) as splk.dsm.lag_event_sec where index="trackme_metrics" by object span="10m" | trackmeapply model_name="my_model" tenant_id="mytenant" model_storage="file"
shortdesc = Apply a previously fitted native density function model to data
usage = public
tags = trackme
