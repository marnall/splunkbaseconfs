# Generating command performing automated AI-powered ML model inspection
[trackmesplkoutliersmladvisorhelper-command]
syntax = | trackmesplkoutliersmladvisorhelper tenant_id=<tenant_id> component=<component>
description = \
    This generating command performs automated AI-powered ML model inspection for TrackMe entities. \
    It reviews outlier models using the AI ML Advisor agent, prioritizing entities with active outlier conditions. \
    Syntax: \
    | trackmesplkoutliersmladvisorhelper tenant_id=<tenant_id> component=<component>
example1 = \
    | trackmesplkoutliersmladvisorhelper tenant_id="mytenant" component="flx"
shortdesc = AI ML Advisor automated inspection executor
usage = public
tags = trackme

# Generating command performing automated AI-powered Feed Lifecycle Advisor review
[trackmesplkfeedlifecycleadvisorhelper-command]
syntax = | trackmesplkfeedlifecycleadvisorhelper tenant_id=<tenant_id> component=<component>
description = \
    This generating command performs automated AI-powered entity lifecycle review for DSM/DHM feeds. \
    It reviews entity configurations using the Feed Lifecycle Advisor agent, assessing thresholds, \
    adaptive delay, variable delay schedules, monitoring state, and decommission candidates. \
    Syntax: \
    | trackmesplkfeedlifecycleadvisorhelper tenant_id=<tenant_id> component=<component>
example1 = \
    | trackmesplkfeedlifecycleadvisorhelper tenant_id="mytenant" component="dsm"
example2 = \
    | trackmesplkfeedlifecycleadvisorhelper tenant_id="mytenant" component="dhm"
shortdesc = AI Feed Lifecycle Advisor automated review executor
usage = public
tags = trackme

[trackmesplkflxthresholdadvisorhelper-command]
syntax = | trackmesplkflxthresholdadvisorhelper tenant_id=<tenant_id> component=flx
description = AI-powered threshold calibration review for Flex Object (FLX) entities. Reviews metric coverage, threshold value calibration, variable threshold opportunities, and decommission candidates using the Splunk Agent SDK.
shortdesc = AI FLX Threshold Advisor executor
usage = public
tags = trackme

[trackmesplkfqmadvisorhelper-command]
syntax = | trackmesplkfqmadvisorhelper tenant_id=<tenant_id> component=fqm
description = AI-powered Field Quality Monitoring advisor. Follows a 4-layer triage \
    (collect job health \u2192 dictionary calibration \u2192 per-field failure classification \u2192 threshold \
    tuning), proposes and tests candidate regexes against real sampled events, and applies \
    dictionary / threshold / priority changes in act mode via the Splunk Agent SDK.
shortdesc = AI FQM Advisor executor
usage = public
tags = trackme

[trackmesplkcomponenthealthadvisorhelper-command]
syntax = | trackmesplkcomponenthealthadvisorhelper tenant_id=<tenant_id> component=<component>
description = AI-powered health advisor for WLK and MHM entities. Reviews thresholds, \
    metric lag, execution health, and decommission candidates. (FQM has its own dedicated advisor \
    \u2014 see trackmesplkfqmadvisorhelper.)
shortdesc = AI Component Health Advisor executor
usage = public
tags = trackme

