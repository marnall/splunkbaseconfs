# splk-dhm: unified pipeline command (merge + threshold + aggregate + extract)
[trackmedhmpipeline-command]
syntax = | trackmedhmpipeline tenant_id=<tenant identifier> field_host=<host field> field_current=<current summary field> field_previous=<previous summary field> gen_metrics=<True|False>
description = \
    Unified DHM pipeline command that replaces the expand/process/collapse pattern. \
    Performs in-memory: merge current+previous summaries, apply blocklists, evaluate per-combo state, \
    resolve host-level thresholds, compute host aggregates, build splk_dhm_st_summary + display views, and collect metrics. \
    Syntax: \
    | trackmedhmpipeline tenant_id=<tenant identifier> field_host=<host field> field_current=<current summary field> field_previous=<previous summary field> gen_metrics=<True|False>
comment1 = \
    This streaming command is used by the splk-dhm component as a unified pipeline
example1 = \
    | trackmedhmpipeline tenant_id="mytenant" field_host="host" field_current="current_summary" field_previous="previous_summary" gen_metrics="True"
shortdesc = Unified DHM pipeline command for in-memory merge, threshold eval, aggregate and extract
usage = public
tags = trackme

# splk-mhm: unified pipeline command (merge + threshold + aggregate + extract)
[trackmemhmpipeline-command]
syntax = | trackmemhmpipeline tenant_id=<tenant identifier> field_host=<host field> field_current=<current summary field> field_previous=<previous summary field> gen_metrics=<True|False>
description = \
    Unified MHM pipeline command that replaces the merge/extract pattern. \
    Performs in-memory: merge current+previous metric summaries, apply per-metric-category lagging class thresholds, \
    evaluate per-metric state, build metric_details + display views, compute host aggregates, and collect metrics. \
    Syntax: \
    | trackmemhmpipeline tenant_id=<tenant identifier> field_host=<host field> field_current=<current summary field> field_previous=<previous summary field> gen_metrics=<True|False>
comment1 = \
    This streaming command is used by the splk-mhm component as a unified pipeline
example1 = \
    | trackmemhmpipeline tenant_id="mytenant" field_host="object" field_current="current_summary" field_previous="previous_summary" gen_metrics="True"
shortdesc = Unified MHM pipeline command for in-memory merge, threshold eval, aggregate and extract
usage = public
tags = trackme

