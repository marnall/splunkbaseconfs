#
# TrackMe AI Agent — Feed Lifecycle Advisor generate_model results
#
# Emitted by the Data Sampling Create Custom Rule wizard's
# "Generate model" flow (Phase 3b of issue #1901). The runner in
# ``trackme_libs_ai_feed_lifecycle.py`` builds the sourcetype dynamically
# as ``f"trackme:ai_agent:feed_lifecycle_advisor:{agent_mode}"`` where
# ``agent_mode`` can be ``inspect`` / ``act`` / ``generate_model``.
# Without this stanza, results larger than Splunk's default
# ``TRUNCATE=10000`` bytes are silently truncated mid-JSON, JSON KV
# extraction never engages (``KV_MODE`` defaults to ``none``), and
# indexed-time ``tenant_id`` / ``object_category`` / ``object``
# extractions don't run — the audit dashboard shows partial events
# with no user / duration / token context, and SPL filtering by tenant
# misses these events entirely. Same shape as the
# ``trackme:ai_agent:fqm_advisor:dictionary_generate`` stanza below.
#

[trackme:ai_agent:feed_lifecycle_advisor:generate_model]
KV_MODE = json
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)\{
CHARSET=UTF-8
DATETIME_CONFIG = CURRENT
TRUNCATE=0
TZ = UTC

TRANSFORMS-trackme_indexed_fields = trackme_indexed_json_tenant_id, trackme_indexed_json_object_category, trackme_indexed_json_object

