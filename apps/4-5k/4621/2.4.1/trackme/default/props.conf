#
# TrackMe AI Agent — per-tool-call audit events
#
# Emitted by ``make_tool_trace_middleware`` for every tool invocation
# (one event per ``tool_call_start`` / ``tool_call_end`` pair) so the
# audit dashboard can ``stats avg(duration_ms), p95(duration_ms),
# count by tool`` and chart per-tool latency / call volume across
# tenants. Carries the same ``tenant_id`` / ``object_category`` /
# ``object`` indexed-time fields as the advisor result sourcetypes
# so SPL filtering by tenant works consistently across both surfaces.
#

[trackme:ai_agent:tool_call]
KV_MODE = json
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)\{
CHARSET=UTF-8
DATETIME_CONFIG = CURRENT
TRUNCATE=0
TZ = UTC

TRANSFORMS-trackme_indexed_fields = trackme_indexed_json_tenant_id, trackme_indexed_json_object_category, trackme_indexed_json_object

#
# TrackMe AI Agent — Concierge proposal events
#
# Emitted by ``trackme_libs_ai_concierge_advisor.py`` (line 1538) every
# time the chat-direct or agent-launched path produces a
# ``concierge_invocation`` action contract — whether or not the user
# later confirms it from the consent card. Same shape requirements as
# the specialist advisor result sourcetypes: large JSON payload (the
# full action contract + reasoning trace + recorder set), needs
# ``KV_MODE = json`` for search-time field extraction,
# ``TRUNCATE = 0`` to keep multi-action contracts intact, and the
# tenant indexed fields for SPL filtering by tenant.
#
# A separate ``trackme:ai_agent:concierge_advisor:execute`` sourcetype is
# documented in ``trackme_libs_describe_concierge.py`` for post-
# consent action firing but is NOT yet wired in any emission site —
# add a matching stanza when that emission lands.
#

[trackme:ai_agent:concierge_advisor:propose]
KV_MODE = json
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)\{
CHARSET=UTF-8
DATETIME_CONFIG = CURRENT
TRUNCATE=0
TZ = UTC

TRANSFORMS-trackme_indexed_fields = trackme_indexed_json_tenant_id, trackme_indexed_json_object_category, trackme_indexed_json_object

