#
# TrackMe fields quality
#

[trackme:fields_quality]
KV_MODE=json
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)\{
CHARSET=UTF-8
TIME_PREFIX=\"time\":
TIME_FORMAT=%s.%f
MAX_TIMESTAMP_LOOKAHEAD = 25
TRUNCATE=0
# TZ: this is not UTC in this case and is meant to be ingested through the collect command

