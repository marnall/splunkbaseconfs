# AI Advisor REST API log family — dedicated sub-sourcetype so operators
# can filter to advisor-related REST traffic with a single sourcetype
# predicate (`sourcetype=trackme:rest_api:advisor`) rather than a wildcard
# source match.  Files in this family:
#   trackme_rest_api_ai_advisor_mloutliers.log       (ML Advisor)
#   trackme_rest_api_ai_advisor_feed_lifecycle.log   (Feed Lifecycle Advisor)
#   trackme_rest_api_ai_advisor_flx_threshold.log    (FLX Threshold Advisor)
#   trackme_rest_api_ai_advisor_fqm.log              (FQM Advisor)
#   trackme_rest_api_ai_advisor_component_health.log (WLK / MHM Component Health)
[source::...trackme_rest_api_ai_advisor_*.log*]
sourcetype = trackme:rest_api:advisor
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}
CHARSET=UTF-8
TIME_PREFIX=^
TIME_FORMAT=%Y-%m-%d %H:%M:%S,%3N
TRUNCATE=0
TRANSFORMS-trackme_indexed_fields = trackme_indexed_kv_tenant_id
TZ = UTC
EXTRACT-log_level = \d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}\,\d*\s(?<log_level>\w*)\s

