# Ack default duration in seconds
[trackme_ack_default_duration]
definition = [ | trackmegetconf target="trackme_general" | spath path=trackme_general.trackme_ack_duration_default output=trackme_ack_duration_default | return $trackme_ack_duration_default ]
iseval = 0

# Use to populate the list of durations
[trackme_ack_populate_dropdown]
definition = makeresults | head 1\
| eval choice1=`trackme_ack_default_duration` . "|" . "default" . "|" . 1, choice2=2*24*60*60 . "|" . "default" . "|" . 2, choice3=7*24*60*60 . "|" . "default" . "|" . 3, choice4=15*24*60*60 . "|" . "default" . "|" . 4, choice5=30*24*60*60 . "|" . 5, choice5=90*24*60*60 . "|" . "default" . "|" . 6\
| fields - _time\
| transpose | stats list("row 1") as choices\
| mvexpand choices\
| rex field=choices "(?<duration>[^\|]+)\|(?<label>[^\|]+)\|(?<priority>\d)"\
| fields duration, label, priority\
| eval label=tostring(duration, "duration")\
| sort priority | fields duration, label
iseval = 0

# Deprecation note: this macro has been deprecated in 2.0.81, and will removed in a future release
# Ack get
[trackme_ack_get(3)]
definition = makeresults | head 1\
| eval object="$object$", object_category="$object_category$"\
| lookup trackme_common_alerts_ack_tenant_$tenant_id$ object object_category OUTPUT | rename _key as keyid\
| eval ack_type=if(isnull(ack_type), "unsticky", ack_type)\
| table keyid, object, object_category, ack_mtime, ack_expiration, ack_type, ack_state, ack_comment | fields - _time\
| rename ack_comment as comment\
| eval ack_state=if(isnull(ack_state), "inactive", ack_state)\
| eval ack_state_icon=if(ack_state="active", "🟢", "🔴")\
| eval ack_mtime=if(ack_state="active", strftime(ack_mtime, "%c"), "N/A"), ack_expiration=if(ack_state="active", strftime(ack_expiration, "%c"), "N/A")
args = tenant_id, object, object_category
iseval = 0

