#
# Data sampling v2
#

[trackme_data_sampling_format_simulation_results]
args = tenant_id
definition = eventstats count as model_count by model_id, model_name \
| eventstats count as total_count \
| eval model_count_pct=round(model_count/total_count*100, 2) \
| eval model_split="model_name: " . model_name . ", pct: " . model_count_pct . "%" \
| stats values(model_match) as model_match, values(model_name) as model_name, values(model_type) as model_type, values(model_id) as model_id, dc(model_id) as model_dcount, values(model_split) as model_split, first(total_count) as events_count_sampled \
| fillnull value="N/A" model_match, model_name, model_type, model_id \
| eval state = case( \
events_count_sampled>0 AND model_name!="N/A", "🟢 The data sampling simulation was successful, events were sampled and the model matched events", \
events_count_sampled>0 AND (model_dcount=0 OR (model_dcount=1 AND model_id="N/A")), "🟠 The data sampling simulation was successful, however the model did not match any events", \
events_count_sampled>0 AND model_dcount>0, "🟠 The data sampling simulation was successful, however multiple models were matched wich can indicate quality issues and should be reviewed", \
1=1, "🔴 The data sampling simulation has failed, it seems that no events could be sampled, open this search for more details." \
) \
| fields state, events_count_sampled, model_split, *
iseval = 0

# tags policies simulation
[trackme_tags_policies_run_simulation(4)]
definition = inputlookup trackme_dsm_tenant_$tenant_id$ | eval keyid=_key\
| fields object, tags\
| eval new_tags=case(match(object, "$tags_regex$"), "$tags_list$")\
| eval simulation_tags = if(isnotnull(tags), tags . "," . new_tags, new_tags)\
| makemv delim="," simulation_tags\
| eval simulation_tags=mvsort(mvdedup(simulation_tags))\
| eval simulation_tags=mvjoin(simulation_tags, ",")\
| makemv delim="," new_tags | fillnull value="null" new_tags\
| mvexpand new_tags | where new_tags!="null"\
| stats values(object) as object, dc(object) as dcount by new_tags | sort - new_tags\
| eventstats sum(dcount) as total_matched\
| eval state="success"\
| fields state, new_tags, dcount\
| stats first(state) as state, values(new_tags) as new_tags, first(dcount) as dcount\
| append [ | makeresults | head 1 | eval state="warning", new_tags="sensitive", dcount=0 | fields - _time ] | head 1\
| eval new_tags=lower(new_tags)\
| eval status = case(\
state=="success", "One or more entities could be matched with this policy",\
state=="warning", "This policy would currently not match any entity"\
)\
| eval state = case(\
state=="success", "🟢 ",\
state=="warning", "🔴 "\
)\
| eval tags_policy_id="$tags_id$"\
| fields state, status, tags_policy_id, new_tags, dcount | rename dcount as "Number of entities matched"\
| lookup trackme_common_tag_policies_tenant_$tenant_id$ tags_policy_id as tags_policy_id OUTPUT tags_policy_id as matched_tags_policy_id\
| eval status=if(isnotnull(matched_tags_policy_id), "A policy with the same id already exists in the collection", status)\
| eval state=if(isnotnull(matched_tags_policy_id), "🔴 ", state) | fields - matched_tags_policy_id
args = tenant_id, tags_id, tags_list, tags_regex
iseval = 0

