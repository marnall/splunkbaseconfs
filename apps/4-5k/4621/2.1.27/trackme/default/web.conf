# web.conf

# ucc-gen

[expose:trackme_account]
pattern = trackme_account
methods = POST, GET

[expose:trackme_account_specified]
pattern = trackme_account/*
methods = POST, GET, DELETE

[expose:trackme_vtenants]
pattern = trackme_vtenants
methods = POST, GET

[expose:trackme_vtenants_specified]
pattern = trackme_vtenants/*
methods = POST, GET, DELETE

[expose:trackme_emails]
pattern = trackme_emails
methods = POST, GET

[expose:trackme_emails_specified]
pattern = trackme_emails/*
methods = POST, GET, DELETE

[expose:trackme_settings]
pattern = trackme_settings
methods = POST, GET

[expose:trackme_settings_specified]
pattern = trackme_settings/*
methods = POST, GET, DELETE

# Expose endpoint resources groups

