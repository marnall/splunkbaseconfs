# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 27

[launcher]
author = Alibaba Cloud Log Service
version = 1.0.9
description = Alibaba Cloud Log Service Add-on for Splunk collects the logs from Alibaba Cloud Log Service (SLS), and then sends them to Splunk. https://www.alibabacloud.com/help/doc-detail/159486.htm

[ui]
is_visible = 1
label = Alibaba Cloud Log Service Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-AlibabaCloudSLS

[triggers]
reload.addon_builder = simple
reload.ta_alibabacloudsls_account = simple
reload.ta_alibabacloudsls_settings = simple
reload.passwords = simple

