[azure_volume_size(1)]
args = field
definition = eval $field$=case($field$>1024, tostring(round($field$/1024, 1))+" TB", true(), tostring(round($field$, 0))+" GB")
iseval = 0

[id-vnet]
definition = id="/subscriptions/*/resourcegroups/*/providers/Microsoft.Network/virtualNetworks/*"
iseval = 0

[topology_metrics_i_cpu(1)]
args = id
definition = `azure-metrics-vm` metric_name="Percentage CPU" | rex field=host "(?<id>[^\/]+$)" | eval id=upper(host) | search id=$id$ | timechart avg(average) AS "Avg CPU %"
iseval = 0

[strftime_utc(2)]
args = field, format
definition = "strftime($field$ - (strptime(strftime($field$, \"%Y-%m-%dT%H:%M:%SZ\"), \"%Y-%m-%dT%H:%M:%S%Z\")-strptime(strftime($field$, \"%Y-%m-%dT%H:%M:%S\"), \"%Y-%m-%dT%H:%M:%S\")), \"$format$\")"
iseval = 1
