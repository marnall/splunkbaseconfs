[azure:billing]
EVAL-resourceGroup = lower(resourceGroup)
EXTRACT-resourceGroup = resource[g|G]roups\/(?<resourceGroup>\S+)\/providers

[azure:topology]
LOOKUP-azure_regions = azure_regions resourceRegion AS location OUTPUTNEW resourceRegionFriendly AS resourceRegionFriendly

[azure:securityCenter:task]
EXTRACT-SecurityCenterTask_SubscriptionId = \/subscriptions\/(?<subscriptionId>[a-zA-Z0-9\-]{0,})\/

[azure:resource:group]
LOOKUP-azure_locations = azure_locations name AS location OUTPUTNEW displayName AS displayName

[azure:resourcegraph]
LOOKUP-azure:resourcegraph = azure_locations name AS location OUTPUTNEW displayName AS displayName

[mscs:nsg:flow]
description = Azure NSG Flow Logs
LINE_BREAKER = (,|\[){"time"
category = Application
KV_MODE = json
SEDCMD-remove_footer = s/\]}$//g
SEDCMD-remove_header = s/{"records"://g
SHOULD_LINEMERGE = false
TIME_PREFIX = time\":\"
TRUNCATE = 0
MAX_TIMESTAMP_LOOKAHEAD = 32
