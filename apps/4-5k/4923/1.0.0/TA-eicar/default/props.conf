# props.conf

[script:eicar]
  pulldown_type = true
  category = Network & Security
  description = Download Anti Malware Testfile
  EVENT_BREAKER_ENABLE = true
  EVENT_BREAKER = ([\n\r]+)
  NO_BINARY_CHECK = True
  CHARSET = UTF-8
  TRUNCATE=550
  LINE_BREAKER = ([\n\r]+)
  SHOULD_LINEMERGE = False
  DATETIME_CONFIG=
  TIME_PREFIX= ^
  MAX_TIMESTAMP_LOOKAHEAD= 23
  TIME_FORMAT= %B %d %Y %H:%M:%S
  MAX_DAYS_AGO = 1
  MAX_DAYS_HENCE = 2
  ANNOTATE_PUNCT = False
  SEGMENTATION = indexing
  KV_MODE = auto
  FIELDALIAS-network_dest_as_dest_dns = dest AS dest_dns
  EVAL-vendor_product = vendor + " " + product
  EVAL-url = "https://en.wikipedia.org/wiki/EICAR_test_file"
  EVAL-eicar_string = "X5O!P%@AP[4\PZX54(P^)7CC)7}$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!$H+H*"
  EVAL-hash = "44d88612fea8a8f36de82e1278abb02f"
  EVAL-md5 = "44d88612fea8a8f36de82e1278abb02f"
  EVAL-SHA1 = "3395856ce81f2b7382dee72602f798b642f14140"
  EVAL-SHA256 = "275a021bbfb6489e54d471899f7db9d1663fc695ec2fe2a2c4538aabf651fd0f"
  EVAL-SHA512 = "cc805d5fab1fd71a4ab352a9c533e65fb2d5b885518f4e565e68847223b8e6b85cb48f3afad842726d99239c9e36505c64b0dc9a061d9e507d833277ada336ab"
  EVAL-teststring = "X5O!P%@AP[4\PZX54(P^)7CC)7}$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!$H+H*"
  EVAL-message = "The EICAR Anti-Virus Test File or EICAR test file is a computer file that was developed by the European Institute for Computer Antivirus Research (EICAR) and Computer Antivirus Research Organization (CARO), to test the response of computer antivirus (AV) programs. Instead of using real malware, which could cause real damage, this test file allows people to test anti-virus software without having to use a real computer virus."
