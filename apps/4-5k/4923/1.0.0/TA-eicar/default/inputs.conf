# inputs.conf

# index = You should create an index and set it here and in macros.conf
# If you leave this commented, it will probably end up in main. 
# Interval is 60 seconds, which is nice for testing but you need to adjust to your needs

[script://./bin/eicar.sh]
  # index = You should create an index and set it here and in macros.conf
  sourcetype=script:eicar
  interval = 60
