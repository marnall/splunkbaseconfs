[morphisec:eptp:syslog]
TIME_PREFIX = start=
TIME_FORMAT = %b %d %Y %T %Z
MAX_TIMESTAMP_LOOKAHEAD = 24
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}
KV_MODE = auto

### Aliases
FIELDALIAS-eptp_aliases = ParentSignature ASNEW parent_file_hash, ProcessSignature ASNEW child_file_hash, src ASNEW dest_ip, start ASNEW date, MorphisecVersion ASNEW product_version
FIELDALIAS-eptp_nullsrc = null_this_field AS src
FIELDALIAS-eptp_last_fix = vendor_LastStackFunctionCall AS LastStackFunctionCall, vendor_LastModuleLoaded AS LastModuleLoaded

### Extractions
EXTRACT-eptp_user = suser=(?>\w+\/)?(?P<user>\S+)
EXTRACT-eptp_file_path_and_name = CommandLine=(?P<file_path>.+\/)(?P<file_name>\S+\.\w+)\s+Parent
EXTRACT-eptp_url = msg=[^=]+(?P<url>https?\S+)
EXTRACT-eptp_signature = \/attacks\/(?P<signature>\S+)
EXTRACT-eptp_last_fix = LastStackFunctionCall=(?P<vendor_LastStackFunctionCall>.+)LastModuleLoaded=(?P<vendor_LastModuleLoaded>.+?)\s+CommandLine=

### Calculated Fields
EVAL-dest = coalesce(shost,dest_ip)
EVAL-action = if(like(msg, "%detected and stopped%"), "blocked", "allowed")
EVAL-vendor_product = "Morphisec EPTP"
EVAL-vendor = "Morphisec"
EVAL-product = "EPTP"
