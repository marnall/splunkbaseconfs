[source::...ta_recordedfuture*.log*]
SHOULD_LINEMERGE = true
sourcetype = tarecordedfuture:app:log

[tarecordedfuture:app:log]
EXTRACT-ta-recordedfuture:app:log = ^(?P<timestamp>\d+\-\d+\-\d+\s+\d+:\d+:\d+,\d+(\+\d+)?)[^ \n]* (?P<level>\w+)\s+(?P<file_location>[\S\[\] ]+: \d+)\s+\-\s+(?P<message>.+)
