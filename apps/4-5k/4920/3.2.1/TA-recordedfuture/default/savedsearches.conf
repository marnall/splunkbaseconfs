[Recorded Future - Sigma Rules Findings]
disabled = 1
action.correlationsearch.detection_type = ebd
action.correlationsearch.label = Recorded Future - Sigma Rules Findings
action.correlationsearch.enabled = 1
action.notable = 1
action.notable.param.drilldown_dashboards = []
action.notable.param.drilldown_searches = [{"name":"Show original Sigma detection in corresponding KV store collection.","search":"| inputlookup sigma_detections.csv where uuid=$uuid$","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$","disabled":false,"isDefault":false}]
action.notable.param.investigation_type = default
action.notable.param.rule_description = Detected suspicious behaviour by Recorded Future Sigma Rule: $title$
action.notable.param.rule_title = Recorded Future Sigma Rule: $title$
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.rfes_ar_links.param.risk = 0
action.risk.forceCsvResults = 1
action.risk.param._risk = [{"risk_object_field":"src_ip","risk_object_type":"system","risk_score":50},{"risk_object_field":"src","risk_object_type":"system","risk_score":50},{"risk_object_field":"User","risk_object_type":"user","risk_score":50},{"threat_object_field":"title","threat_object_type":"sigma_rule"}]
action.risk.param._risk_message = Sigma Rule match
action.risk.param.verbose = 0
alert.digest_mode = 0
alert.suppress = 1
alert.suppress.fields = uuid
alert.suppress.period = 86400s
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = Detect suspicious behaviour by Recorded Future Sigma Rule
dispatch.earliest_time = -65m@m
dispatch.latest_time = -5m@m
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-recordedfuture
search = | inputlookup sigma_detections.csv where [\
  | makeresults count=1\
  | addinfo\
  | eval info_max_time=if(info_max_time=="+Infinity", 4130316060, info_max_time)\
  | eval search="( (_time>=" . info_min_time . ") AND (" . "_time<" . info_max_time . ") )"\
  | table search\
]\
| join type=left rule_id [\
  | rest splunk_server=local /services/TA-recordedfuture/get_spl_sigma_rules\
  | eval annotations=case(isnotnull(tags), json_object("mitre_attack", tags))\
  | fields id annotations\
  | rename id as rule_id\
]\
| spath input=json\
| eval threat_match_value=title

[Recorded Future - Threat Hunts Findings]
disabled = 1
action.correlationsearch.detection_type = ebd
action.correlationsearch.label = Recorded Future - Threat Hunts Findings
action.correlationsearch.enabled = 1
action.notable = 1
action.notable.param.drilldown_dashboards = [{"app":"TA-recordedfuture","dashboard_id":"threathunt_runs","name":"Open Threat Hunt Results in Recorded Future app","tokens":[{"name":"run_key","value":"$run_key$"}]}]
action.notable.param.drilldown_searches = [{"name":"Show Threat Hunt Results in corresponding KV store collection.","search":"| inputlookup threathunt_result where run_key=$run_key$","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$","disabled":false,"isDefault":false}]
action.notable.param.investigation_type = default
action.notable.param.rule_description = Detected IOCs related to $target_type_display$ $target$
action.notable.param.rule_title = Recorded Future Threat Hunt: $name$ with $unique_ioc_count$ unique IOCs count
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.risk.forceCsvResults = 1
action.risk.param._risk = [{"risk_object_field":"target","risk_object_type":"other","risk_score":75},{"threat_object_field":"name","threat_object_type":"threat_hunt"},{"threat_object_field":"target","threat_object_type":"threat_target"}]
action.risk.param._risk_message = Threat Hunt match
action.risk.param.verbose = 0
alert.digest_mode = 0
alert.suppress = 1
alert.suppress.fields = run_key
alert.suppress.period = 86400s
alert.track = 1
counttype = number of events
cron_schedule = */5 * * * *
description = Results from Recorded Future threat hunts.
dispatch.earliest_time = -65m@m
dispatch.latest_time = -5m@m
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-recordedfuture
search = | inputlookup threathunt_run where [\
  | makeresults count=1\
  | addinfo\
  | eval info_max_time=if(info_max_time=="+Infinity", 4130316060, info_max_time)\
  | eval search="( (completed>=" . info_min_time . ") AND (" . "completed<" . info_max_time . ") )"\
  | table search\
] AND unique_ioc_count > 0\
| eval run_key=_key, target_type_display=replace(target_type, "_", " "), risk_score=max_risk

