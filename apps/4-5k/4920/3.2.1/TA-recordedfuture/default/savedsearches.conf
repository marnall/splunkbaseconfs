[Latest Updates of All Risk Lists]
action.email.useNSSubject = 1
alert.track = 0
description = List all Risk Lists configured in the app and when they were last updated.
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.enablePreview = 0
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-recordedfuture
request.ui_dispatch_view = search
search = | inputlookup checkpoints | eval Time=strftime(updated,"%a %b %d, %Y at %I:%M:%S:%p") | eval split_history=split(history,",") | eval time_history=strftime(split_history,"%a %b %d, %Y at %I:%M:%S:%p") | where isnotnull(time_history) | rename name TO "Risklist name" | rename Time TO "Last updated" | rename time_history TO "Last 5 updates" | fields "Risklist name", "Last updated", "Last 5 updates"

