[rfes_ar_enrichment]
command = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.action_name=$action_name$ | stats count
description = Enrich observables with Recorded Future reputation
icon_path = rfes_ar_enrichment.png
is_custom = 1
label = Recorded Future Enrichment
param._cam = {"category": ["Information Gathering"], "task": ["scan"], "subject": ["threat.artifact"], "technology": [{"version": ["1"], "product": ["Recorded Future Risk Assessment"], "vendor": "Recorded Future"}], "supports_adhoc": true, "required_params": ["param.field"]}
param.category = auto
param.field = threat_match_value
param.prefix = Threat Activity Enriched
payload_format = json
ttl = 240
python.version=python3
python.required=3.13

