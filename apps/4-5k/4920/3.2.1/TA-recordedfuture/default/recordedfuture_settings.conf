rows = 100000

[correlation_age_out:domain]
days = 365
rows = 100000

[correlation_age_out:hash]
days = 365
rows = 100000

[correlation_age_out:vulnerability]
days = 365
rows = 100000

[correlation_age_out:url]
days = 365
rows = 100000

[correlation_age_out:ato]
days = 365
rows = 100000

[sigma_detection_age_out]
days = 365
rows = 100000

[threat_hunt_result_age_out]
rows = 100000

[hidden_global_banner]

[playbook_alerts]

[alerts_ingestion]

[alert_ingested_age_out]
days = 365
rows = 10000

[playbook_alert_ingested_age_out]
days = 365
rows = 10000

[alert_index_settings]
