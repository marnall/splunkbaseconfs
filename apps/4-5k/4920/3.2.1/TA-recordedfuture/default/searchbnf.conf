[rfenrich-command]
syntax = rfenrich (ip|domain|url|hash|vulnerability)=<field_name> [api_key=<string>]
shortdesc = Enrich events based on the specified entity type and field name using Recorded Future intelligence. Optionally, provide an API key with api_key.
description = \
    This command enriches events based on the specified entity type and field name using Recorded Future intelligence.\
    The command adds 2 new fields to the events: rf_risk and rf_rules.\
    The supported entity types are: ip, domain, hash, url, vulnerability. You should specify only one entity type \
    per command invocation. Alternatively, you can specify Recorded Future API key using "api_key" argument. \
    Note: the command processes a maximum of 10,000 events per invocation.
comment1 = \
    This example enriches events based on IP addresses and optionally uses an API key.
example1 = \
    ... | rfenrich ip=src_ip api_key=YOUR_API_KEY
comment2 = \
    This example enriches events based on domain.
example2 = \
    ... | rfenrich domain=DNS.query
category = streaming
usage = public
tags = enrichment

[mergejson-command]
syntax = mergejson json_field=<field_name>
shortdesc = Takes JSON content from multiple rows and merges them into a single JSON object.
description = \
    This is used as a helper function for one of our savedsearches. Assuming that we have \
    many records with a json dictionary format it will use the update function to make a single \
    json entry that can be used for further processing.
comment1 = \
    This example uses the field "my_field" to merge the json data.
example1 = \
    ... | mergejson json_field="my_field"
comment2 = \
    Mergejson now uses the default field "content" to merge the json data.
example2 = \
    ... | mergejson
category = streaming
usage = public
tags = processing

[croniter-command]
syntax = croniter cron=<field_containing_cron> timestamp=<field_with_timestamp> field_name=<result_name>
shortdesc = Takes a field containing cron syntax and turns that into the next date.
description = \
    This is used as a helper for threat hunts, where we do not have saved searches. \
    if you assign the timestamp field you can use a different base, by default it is using now() \
    giving a value to "field_name" will let you use a different result field than "next_date" \
comment1 = \
    This example uses the field "cron_field", which should contain a string with valid cron syntax.
example1 = \
    ... | croniter cron=cron_field
category = streaming
usage = public
tags = processing


[rffeed-command]
syntax = rffeed id=<field_containing_cron>
shortdesc = Takes a field containing an id and returns a stream of indicators.
description = \
    This is used as a helper for fetching indicators for the detection feed. Not \
    really meant for public use, but used in one of the searches the app does. \
comment1 = \
    This example uses the field "id_field", which should contain a string which is a valid id.
example1 = \
    ... | rffeed id=id_field
category = streaming
usage = private
tags = processing
