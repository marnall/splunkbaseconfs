[unpack_metrics]
definition = eval metricsData=spath(metrics,"data{}*") \
      | mvexpand metricsData \
      | eval xx=spath(metricsData,"type") \
      | eval yy=spath(metricsData, "value") \
      | eval metricJson="\"".xx."\": ".yy\
      | fields - xx yy metricsData \
      | mvcombine metricJson \
      | eval mj="{\"metrics\": {".mvjoin(metricJson,",")."}}" \
      | spath input=mj \
      | fields - metricJson mj
iseval = 0

[to_date(1)]
args = dateString
definition = strftime(strptime($dateString$, "%Y-%m-%dT%H:%M:%S.%NZ"), "%b %d, %Y")
iseval = 0

[threat_profile]
definition = eval hunt_id=_key \
    | eval threat_hunt_search_name="threat_hunt_" . 'hunt_id' \
    | croniter cron=cron_schedule \
    | join type=left left=threathunt right=saved_search where threathunt.threat_hunt_search_name = saved_search.title \
        [ | rest /services/saved/searches \
        | where is_scheduled=1 \
        | fields title, next_scheduled_time \
        ] \
    | eval "threathunt.Next Scheduled Time" = strftime(strptime('saved_search.next_scheduled_time', "%Y-%m-%d %H:%M:%S %Z"), "%Y-%m-%d %H:%M") \
    | eval "threathunt.Next Scheduled Time" = coalesce('threathunt.Next Scheduled Time', strftime('threathunt.next_date', "%Y-%m-%d %H:%M"), "-") \
    | rename "threathunt.*" as * \
    | rename target AS "Target" \
    | eval "Threat Hunt"="{\"name\": \"" . 'name' . "\", \"key\": \"" . 'hunt_id' . "\"}" \
    | eval "Created"=strftime(created,"%Y-%m-%d %H:%M") \
    | join type=left left=threathunt right=threathunt_run where threathunt.hunt_id = threathunt_run.profile_key \
        [ | inputlookup threathunt_run \
        | sort -created \
        | dedup profile_key \
        | fields profile_key, status, sid, created \
        ] \
    | fillnull value="N/A" threathunt_run.status, threathunt_run.sid, threathunt_run.profile_key, threathunt_run.created \
    | eval "Last Status"="{\"status\": \"" . 'threathunt_run.status' . "\", \"sid\": \"" . 'threathunt_run.sid' . "\"}" \
    | eval "Last Run" = coalesce(strftime('threathunt_run.created', "%Y-%m-%d %H:%M"), 'threathunt_run.created') \
    | rename "threathunt.*" as * \
    | eval " " = "{\"id\": \"" . 'hunt_id' . "\", \"target_type\": \"" . 'target_type' . "\"}" \
    | eval target_type=replace(target_type, "_", " ") \
    | eval target_type=upper(substr(target_type,1,1)).lower(substr(target_type,2)) \
    | sort - "Created" \

[threat_profile_for(1)]
args = targetType
definition = where target_type="$targetType$" \
    | `threat_profile` \
    | table "Threat Hunt", "Target", "Last Status", "Last Run", "Next Scheduled Time", "Created", " " \

[to_splunk_time(1)]
args = dateString
definition = strptime($dateString$, "%Y-%m-%dT%H:%M:%S.%NZ")
iseval = 0

[to_time(1)]
args = dateString
definition = strftime(strptime($dateString$, "%Y-%m-%dT%H:%M:%S.%NZ"), "%b %d, %Y %X")
iseval = 0

[get_updated_time(1)]
args = risklist
definition = | inputlookup checkpoints | eval key=_key | search key=$risklist$ \
             | eval Time=strftime(updated,"%a %b %d, %Y at %I:%M:%S:%p")
iseval = 0

[time_id]
# An id based on time for when we can't base the id on event data
definition = eval _key=md5(time())

[make_unique_id]
# See https://community.splunk.com/t5/Splunk-Search/Does-each-Splunk-event-have-a-unique-identifier/m-p/9127#M21
definition = eval cd=_cd \
    | eval _id=md5(splunk_server + index + cd) \
    | eval _key = _id

[make_unique_id_correlation(1)]
# See https://community.splunk.com/t5/Splunk-Search/Does-each-Splunk-event-have-a-unique-identifier/m-p/9127#M21
args = correlation_id
definition = eval cd=_cd \
    | eval _id=md5(splunk_server + index + cd + "$correlation_id$") \
    | eval _key = _id

[make_unique_id_dm]
# Data-models does not have cd, this could cause conflicts
definition = eval _id=md5(splunk_server + _time + EvidenceDetails + index) \
            | eval _key = _id

[parse_mitre_as_annotations]
# Extracts MITRE defitinitions from field Mitre and parse as JSON
definition =  rex max_match=0  field=Mitre "\"Code\":\s?\"(?<code>[^\"]*)" \
| eval annotations = json_object("mitre_attack", code)

[parse_sourcetype]
# Regexp extracts sourcetype from _raw
definition = rex field=_raw "orig_sourcetype=\"(?<sourcetype>[^\"]*)"

[correlation_fields_to_json]
# Saving this in order to facilitate migration.
definition = `make_json`

[make_json]
# Produces a json from results.
definition = fields - punct \
|tojson auto(*)\
| eval json = _raw

[determine_field_usability_rate(2)]
# Calculates the proportion of events in a given
# field which can be used for correlation for any given type.
# The type is represented by a regexp matching the pattern of that type.
args = field,validation_regex
definition = eval fmt_test=if(match('$field$', "$validation_regex$"), "pass", "fail") \
             | stats count AS T,count(eval(fmt_test=="pass")) AS P \
             | eval pass_ratio=round((P/T)*100,1) \

[make_json_legacy]
# Splunk 8.2 release tojson, which is now the main way to make_json; though anyone pre 8.2 cannot use it.
# Leaving this here in case anyone needs it; though know that this is not supported.

# Describes all eval json blocks.
# For each, escape commas
# For each, remove double quotes in field.
# Join blocks together into a primitive json.
# un-escape commas
# Escape \ that occurs in different paths.
# Escape all quotation marks.
# Remove \ before , and {
# Remove \ for the last "}
# Remove \ before : and ,
definition = foreach * \
    [eval value = replace('<<FIELD>>', ",", "\,") \
     |eval value = replace(value, "\"\"", "") \
     |eval jsonmv_ = mvappend(jsonmv_, "\"<<MATCHSTR>>\":" + "\"" + value + "\"")] \
    | eval json = "{" + mvjoin(jsonmv_,",") + "}" \
    | fields - jsonmv_ \
    | eval json = replace(json, "[\\\\]", "\\\\\\\\") \
    | eval json = replace(json, "([^:])(\"{1,})", "\1\\\"") \
    | eval json = replace(json, "([{,])(\\\\)", "\1") \
    | eval json = replace(json, "(\\\\)(\"})", "\2") \
    | eval json = replace(json, "(\\\\)(\":|\",)", "\2") \
    | eval json = replace(json, "\\\\\\\,", ",") \

