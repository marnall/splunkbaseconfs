[admin:TA-recordedfuture]
match = /
members = TA-recordedfuture

[script:TA-recordedfuture]
match=/TA-recordedfuture
script = rfes_rest_endpoints.py
scripttype = persist
handler = rfes_rest_endpoints.RfesHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth	      = true
python.version        = python3
python.required       = 3.13
