[ciso_syslog_indexes]
definition = index=accellion_syslog
iseval = 0

[regex_ip_range]
definition = "(^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$)|(^((([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){0,3}\*)$)|(^((([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5]))-((([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5]))$)|(^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\/([1-9]|[1-2][0-9]|3[0-1])$)"

[regex_ip_mapping_csv]
definition = "[|]?(?<ip_range>[^,|]*)[|]?,\s*[|]?(?<loc>[^,|]*)[|]?"

[limit_csv_rows]
definition = 200

[response_csv_limit_exceeded]
definition = "Unable to process the CSV file. It has exceeded the maximum limit of ".tostring(`limit_csv_rows`)." IP addresses. Please split the IP addresses into several CSV files in order to proceed."

[query_ip_leading_zero(1)]
args = ip
definition = eval $ip$=replace(replace(replace(replace(replace(replace(replace(replace($ip$, "\.(\d)\.", ".00\1."), "\.(\d)\.", ".00\1\2."), "\.(\d)(\d)\.", ".0\1\2."), "\.(\d)(\d)\.", ".0\1\2."), "^(\d)\.", "00\1."), "\.(\d)$", ".00\1"), "^(\d)(\d)\.", "0\1\2."), "\.(\d)(\d)$", ".0\1\2")