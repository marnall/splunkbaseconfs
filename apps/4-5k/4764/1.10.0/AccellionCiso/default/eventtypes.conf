# Events
[ciso_auth]
search = tag IN (successful, failed)

[ciso_failed_auth]
search = event IN (user_login_failed, tfa_login_failed)

[ciso_file_transfer]
search = tag IN (downloads, uploads)

[ciso_file_transfer_downloads]
search = event IN (download, download_email, download_email_zip, download_zip, ec_download_file, download_file) AND successful="1" AND (flag="1" OR flag="true")

[ciso_file_transfer_uploads]
search = event IN (add_file, add_file_version, upload, upload_to_tray, ec_upload_file) AND successful="1" AND (flag="1" OR flag="true")

[ciso_new_user]
search = event IN (add_user, add_user_profile)

[ciso_receive_activities]
search = event IN (download_email, download_email_zip, view_attachment, view_mail, view_message)

[ciso_send_activities]
search = event IN (send_message, send_mail, send_preview)

[ciso_successful_auth]
search = event IN (admin_logged_in, user_logged_in)

[ciso_syslog]
search = sourcetype IN (Accellion:ACF:app) AND event IN (add_user, add_user_profile, malware_scanning, dlp_scanning, admin_logged_in, user_logged_in, user_login_failed, tfa_login_failed, add_file, add_file_version, upload, upload_to_tray, ec_upload_file, download, download_email, download_email_zip, download_zip, ec_download_file, download_file, view_file, send_mail, send_message, send_preview, view_attachment, view_mail, view_message, add_insights_alert, update_insights_alert)

[ciso_views]
search = event IN (view_file, view_attachment) AND (event!=view_file OR NOT ec_source_id!=null)

[ciso_dlp_scan]
search = event IN ("dlp_scanning") AND NOT ec_source_id!=null

[ciso_malware_scan]
search = event IN ("malware_scanning") AND NOT ec_source_id!=null

[ciso_activities]
search = tag IN (send, receive)

[ciso_scanning]
search = tag IN (dlp_scan, malware_scan)

[ciso_new_alert]
search = event IN ("add_insights_alert")

[ciso_alert_operations]
search = event IN ("update_insights_alert")


# Alerts
[ciso_alerts]
search = sourcetype IN (Accellion:ACF:app) AND feature_name!=null

[ciso_suspicious_download]
search = feature_name IN (download)


# Application
[event_syslog]
search = sourcetype IN (Accellion:ACF:app)