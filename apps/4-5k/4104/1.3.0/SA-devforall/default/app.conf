#
# Splunk app configuration file
#

[install]
is_configured = 0
build = 106

[ui]
is_visible = 1
label = Splunk Dev for All

[package]
id = SA-devforall

[launcher]
author = David Veuve and David Herrald
description = This app provides you with working snippets of content to make it easier to use SplunkJS, Splunk Python, and related capabilities such as some of the internals of Splunk. This app contains 30+ pre-packaged working code samples that you can put together to turn your Splunk dashboards into real applications with great user experience, more interactivity, and a richer feel. In addition, there are pointers to many places where you can learn more, or see the samples working in action. This app pairs with a talk at .conf18 by David Veuve and Dave Herrald: DEV1545 - Go From Dashboards to Applications With Ease: SplunkJS And Splunk Python for Non-Developers -- catch us in Orlando (or catch the replay)!
version = 1.3.0
