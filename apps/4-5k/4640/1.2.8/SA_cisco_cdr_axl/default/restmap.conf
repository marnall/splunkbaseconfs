[script:ciscoaxl_auth]
match                 = /ciscoaxl_auth
script                = ciscoaxl_auth_endpoint.py
scripttype            = persist
handler               = ciscoaxl_auth_endpoint.CiscoAxlAdminHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth        = true
passSession           = true
python.version        = python3
python.required       = 3.9, 3.13

[script:sa_cisco_cdr_axl_license]
match                 = /sa_cisco_cdr_axl_license
script                = licensing/sa_cisco_cdr_axl_license.py
scripttype            = persist
handler               = sa_cisco_cdr_axl_license.SACiscoCdrAXLLicenseInfoHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth        = true
passSession           = true
python.version        = python3
python.required       = 3.9, 3.13

# URL's we use in default.xml, that will redirect users either to a canary URI or to a sorry page
# telling them that they need to install Canary.  Canary itself rewrites these URI's when it sees
# them in the app navigation, so in effect this only us used when core splunk UI renders the app
# navigation.
[script:SA_cisco_cdr_axl_shunt]
match                 = /SA_cisco_cdr_axl_shunt
script                = shunt/SA_cisco_cdr_axl_shunt.py
scripttype            = persist
handler               = SA_cisco_cdr_axl_shunt.SACiscoCdrAxlShuntHandler
requireAuthentication = true
# see comments on this same key elsewhere in this file.
output_modes          = json, xml
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSession           = true
python.version        = python3
python.required       = 3.9, 3.13
