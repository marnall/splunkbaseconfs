[critical_required_version_of_canary]
title = Check whether a new enough version of Canary is installed.
category = Splunk Miscellaneous
tags = configuration, installation
description = This checks the [dependency:app:canary] stanza in app.conf against the current installed version of Canary and fails if the installed version is too old.
failure_text=This app required the Canary app but the installed version of that app is too old.
suggested_action = Upgrade the Canary app to the latest version available on Splunkbase.
search = | rest /servicesNS/nobody/SA_cisco_cdr_axl/properties/app/dependency%3Aapp%3Acanary/requiredVersion splunk_server=local \
| rename value as requiredVersion \
| appendcols [ | rest /services/apps/local/canary splunk_server=local | table version | rename version as hasVersion ] \
| table requiredVersion hasVersion \
| eval app="Canary" \
| eval has=split(hasVersion,".")  \
| eval req=split(requiredVersion,".") \
| eval req_weighted = 1000000000 * tonumber(mvindex(req,0)) + if(mvcount(req)>1,1000000 * tonumber(mvindex(req,1)),0) + if(mvcount(req)>2,1000 * tonumber(mvindex(req,2)),0)  + if(mvcount(req)>3,1 * tonumber(mvindex(req,3)),0) \
| eval has_weighted = 1000000000 * tonumber(mvindex(has,0)) + if(mvcount(has)>1,1000000 * tonumber(mvindex(has,1)),0) + if(mvcount(has)>2,1000 * tonumber(mvindex(has,2)),0)  + if(mvcount(has)>3,1 * tonumber(mvindex(has,3)),0) \
| eval metric=if(has_weighted<req_weighted, \
    "ERROR - App dependency not fullfilled: the Supporting App for AXL app needs at least version " + requiredVersion + " of " + app + " installed.", \
    "OK - " + app + " version " + hasVersion + " is new enough for the Supporting App for AXL") \
| eval severity_level=if(has_weighted<req_weighted,3,0) \
| sort - requiredVersion severity_level \
| fields instance_name metric severity_level appWithDependency app requiredVersion hasVersion

