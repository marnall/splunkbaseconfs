[critical_required_splunk_version2]
title = Check whether any apps require a newer version of Splunk.
category = Splunk Miscellaneous
tags = configuration, installation
description = This looks for apps whose app.conf files follow the Sideview convention of having a stanza called "dependency:splunk" with a key called "requiredVersion" set to the minimum required version of Splunk needed by that app.
failure_text = This app requires a newer version of Splunk Enterprise.
suggested_action = Either upgrade Splunk to the given version or newer, or disable or uninstall the app.

search = | rest /servicesNS/nobody/SA_cisco_cdr_axl/properties/app/dependency%3Asplunk/requiredVersion splunk_server=local \
| table value \
| rename value as requiredSplunkVersion \
| appendcols [ | rest /services/server/info splunk_server=local | table version | table version | rename version as hasSplunkVersion] \
| eval has=split(hasSplunkVersion,".") \
| eval req=split(requiredSplunkVersion,".") \
| eval req_weighted = 1000000000 * tonumber(mvindex(req,0)) + if(mvcount(req)>1,1000000 * tonumber(mvindex(req,1)),0) + if(mvcount(req)>2,1000 * tonumber(mvindex(req,2)),0)  + if(mvcount(req)>3,1 * tonumber(mvindex(req,3)),0) \
| eval has_weighted = 1000000000 * tonumber(mvindex(has,0)) + if(mvcount(has)>1,1000000 * tonumber(mvindex(has,1)),0) + if(mvcount(has)>2,1000 * tonumber(mvindex(has,2)),0)  + if(mvcount(has)>3,1 * tonumber(mvindex(has,3)),0) \
| eval metric=if(has_weighted<req_weighted,"WARNING - Splunk version " + hasSplunkVersion + " is too old for the Supporting App for AXL which requires at least version " + requiredSplunkVersion + " to work correctly.", \
    "OK - Splunk version " + hasSplunkVersion + " is new enough for the Supporting App for AXL.") \
| eval severity_level=if(has_weighted<req_weighted,3 ,0) \
| fields instance_name metric severity_level *

[critical_check_axlHost_values]
title = Check whether the axlHost entries in the clusters lookup align with the hosts in the AXL app's credentials
category = Splunk Miscellaneous
tags = configuration, installation
description = This looks for mistakes where the Supporting App for AXL is configured to connect to a host X,  but no cluster is configured with that axlHost value.
failure_text = Some axlHost values in the clusters lookup do not match the host values in the Supporting App for AXL's credentials, or vice versa.
suggested_action = Make sure all clusters are in the clusters lookup, and all hosts / ip addresses / FQDNs specified in the AXL app's credentials are listed in the corresponding row of the clusters lookup.

search = | rest /servicesNS/nobody/SA_cisco_cdr_axl/configs/conf-ciscoaxl splunk_server=local \
| fields title \
| eval titleArr=split(title,":") \
| eval host=mvindex(titleArr,0) \
| eval port=mvindex(titleArr,1) \
| eval user=mvindex(titleArr,2) \
|  table host \
|  eval type="in credential" \
| append [ \
  | inputlookup clusters \
  | stats count by axlHost \
  | rename axlHost as host \
  | eval type="in clusters lookup" \
] \
| stats values(type) as type dc(type) as dc_type by host \
| eval app="Supporting App for AXL" \
| eval error=case(dc_type=="1" AND type=="in credential", "ERROR: the " + app + " is configured to connect to " + host + " but there are no clusters in the Cisco CDR app's clusters lookup that have axlHost=\"" + host + "\"") \
| eval info=case(dc_type=="1" AND type=="in clusters lookup", "INFO: There are clusters in the Cisco CDR app's clusters lookup with axlHost=\"" + host + "\" but the " + app + " has no credential to connect to that host.") \
| eval severity_level=case(isnotnull(error),3,isnotnull(info),1,true(),0) \
| sort - severity_level \
| eval metric=mvappend(error,warn,info) \
| stats values(metric) as metric max(severity_level) as severity_level \
| eval metric=mvjoin(metric,"<br>") \
| eval instance="all" \
| table instance metric severity_level  \

drilldown = | rest /servicesNS/nobody/SA_cisco_cdr_axl/configs/conf-ciscoaxl splunk_server=local \
| fields title  \
| eval titleArr=split(title,":") \
| eval host=mvindex(titleArr,0) \
| eval port=mvindex(titleArr,1) \
| eval user=mvindex(titleArr,2) \
|  table host \
|  eval type="in credential" \
| append [ \
  | inputlookup clusters \
  | stats count by axlHost \
  | rename axlHost as host \
  | eval type="in clusters lookup" \
] \
| stats values(type) as type dc(type) as dc_type by host \
| eval app="Supporting App for AXL" \
| eval error=case(dc_type=="1" AND type=="in credential", "ERROR: the " + app + " is configured to connect to " + host + " but there are no clusters in the Cisco CDR app's clusters lookup that have axlHost=\"" + host + "\"") \
| eval info=case(dc_type=="1" AND type=="in clusters lookup", "WARNING: There are clusters in the Cisco CDR app's clusters lookup with axlHost=\"" + host + "\" but the " + app + " has no credential to connect to that host.") \
| eval severity_level=case(isnotnull(error),3,isnotnull(warn),2,isnotnull(info),1,true(),0) \
| sort - severity_level \
| eval message=mvappend(error, warn, info) \
| table message