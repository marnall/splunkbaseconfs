# note - local config can be reloaded from disk on the SH by hitting the following endpoint:
# https://localhost:8000/en-US/splunkd/__raw/servicesNS/nobody/SA_cisco_cdr_axl/configs/conf-ciscoaxl/_reload


[default]
# optional. DO NOT SET THESE IN LOCAL unless you really know what you're doing and you understand the risks
queryblacklist =  \b(ALTER|APPEND|BACKUP|COMMIT|CREATE|DEL|DELETE|DROP|EXEC|EXECUTE|GRANT|INSERT|REVOKE|ROLLBACK|SAVEPOINT|TRUNCATE|UPDATE)\b
methodwhitelist = ^list|^get|^help

# optional.  If you have only one stanza then don't bother setting this.
# just put the WSDL and XSD files for that one UCM host right in the bin
# directory of the SA_cisco_cdr_axl app
wsdl_subdirectory = bin

timeout = 900
