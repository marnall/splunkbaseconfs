
# candidate fields for the next time we do a migration on the fieldlist:
# lastRegistrationTime ?
# lastactive - it's in our SQL but we don't use it.
# lastKnownUCM - see commit 3678
[get_devices_example]
disabled = 1
action.email.useNSSubject = 1
alert.track = 0
description = Retrieves devices with either device-level assignment or line-level assignment from AXL.  Should be cloned and the clone should be tested and scheduled.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
search = | ciscoaxlquery "select \
eu.userid, eu.lastname, eu.firstname, eu.middlename, eu.manager, eu.department, eu.telephonenumber, eu.mailid, eu.mobile, eu.homephone, eu.title, eu.nickname, d.name AS name, d.description AS description, \
n.dnorpattern as dn, n.description as numplandescription, rp.name as partition, css.name as callingsearchspacename, dp.name as devicepool, sp.name as securityprofilename, \
tdp.name as protocol, tp.name as productname, tc.name as classname, tsc.name as subclassname, tm.name as model, rd.lastknownucm, rd.lastseen as lastseen, rd.datetimestamp as lastactive \
FROM device as d \
LEFT JOIN registrationdynamic rd on rd.fkdevice = d.pkid \
LEFT JOIN devicenumplanmap as dnpm on dnpm.fkdevice = d.pkid AND dnpm.numplanindex = (SELECT min(numplanindex) from devicenumplanmap where devicenumplanmap.fkdevice = d.pkid) \
LEFT JOIN numplan as n on dnpm.fknumplan = n.pkid \
LEFT JOIN routepartition as rp on rp.pkid = n.fkroutepartition \
LEFT JOIN enduserdevicemap as eudm on eudm.fkdevice=d.pkid \
LEFT JOIN enduser as eu on eudm.fkenduser=eu.pkid \
LEFT JOIN callingsearchspace css on css.pkid = d.fkcallingsearchspace \
LEFT JOIN devicepool dp on dp.pkid = d.fkdevicepool \
LEFT JOIN securityprofile sp on sp.pkid = d.fksecurityprofile \
LEFT JOIN typemodel tm on tm.enum = d.tkmodel \
LEFT JOIN typeclass tc on tc.enum = tm.tkclass \
LEFT JOIN typesubclass tsc on tsc.enum = tm.tksubclass \
LEFT JOIN typedeviceprotocol tdp on tdp.enum = d.tkdeviceprotocol \
LEFT JOIN typeproduct tp on tp.enum = d.tkproduct \
WHERE d.tkclass NOT IN (20, 248, 250, 251, 252, 253, 254, 255)" \
| eval userFullName = lastname . ", " . firstname \
| rename devicepool AS devicePool, productname as productName, mailid AS mailId, userid AS userId, callingsearchspacename AS callingSearchSpaceName, securityprofilename AS securityProfileName, classname as className, subclassname as subclassName, dn as directoryNumber \
| fillnull value="" \
| foreach userid, lastname, firstname, middlename, manager, department, telephonenumber, mailid, mobile, homephone, title, nickname, directoryNumber \
    [eval <<FIELD>> = if(<<FIELD>> == "" OR <<FIELD>> == " ", null(), '<<FIELD>>')] \
| stats values(*) as * BY name axlHost \
| lookup clusters axlHost output clusterId \
| convert num(lastseen) as lastseen | convert num(lastactive) as lastactive \
| eval lastUpdated=now() \
| table name, productName, department, description, className, subclassName, devicePool, mailId, userFullName, userId, callingSearchSpaceName, protocol, securityProfileName, directoryNumber, clusterId, lastUpdated


# if you are reading this file, know that the search above deliberately does not
# include the outputlookup command on the end.  Shipping it there would create an
# unstable situation where any admin could 'run a report' to see what it does and
# accidentally rewrite the lookup.
#
# If you are not already reading them, return to our docs here
# https://sideviewapps.com/documentation/populate-devices-from-axl
# and the outputlookup command when you add it,  should look like this:
# | outputlookup create_empty=false override_if_empty=false devices
