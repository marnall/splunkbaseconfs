
# https://docs.splunk.com/Documentation/SplunkCloud/latest/Security/SPLsafeguards
# Deactivates SPL safeguards
[settings]
enable_risky_command_check = false
enable_risky_command_check_dashboard = false

[expose:runinspect]
pattern = runinspect
methods = GET, POST

[expose:verifystatus]
pattern = verifystatus
methods = GET, POST

[expose:updatesplunkbaseassets]
pattern = updatesplunkbaseassets
methods = GET, POST

[expose:downloadreports]
pattern = downloadreports
methods = GET, POST

[expose:removejob]
pattern = removejob
methods = GET, POST


[expose:loadresults]
pattern = loadresults
methods = GET, POST

[expose:getsummary]
pattern = getsummary
methods = GET, POST

[expose:splunkauth]
pattern = splunkauth
methods = POST
skipCSRFProtection = 1

[expose:kill_checks]
pattern = kill_checks
methods = GET, POST

[expose:kill_aaainspect]
pattern = kill_aaainspect
methods = GET, POST

[expose:fix_aaa_lookup]
pattern = fix_aaa_lookup
methods = GET, POST

[expose:stack_connect]
pattern = stack_connect
methods = GET, POST

[expose:acs_helper]
pattern = acs_helper
methods = GET, POST

[expose:kill_rad]
pattern = kill_rad
methods = GET, POST

[expose:splunkbaseauth]
pattern = splunkbaseauth
methods = POST
skipCSRFProtection = 1