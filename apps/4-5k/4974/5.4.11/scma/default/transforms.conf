collection = scma_assets_html_dashboards
fields_list = shc_name, splunk_server app_name title user owner author permissions label app_clear user_clear main_search_html

[scma_assets_lookups]
external_type = kvstore
collection = scma_assets_lookups
fields_list = shc_name splunk_server app_name filename transform stanzas dc_inuse_type type owner

[scma_assets_macros]
external_type = kvstore
collection = scma_assets_macros
fields_list = shc_name splunk_server app_name macro_name simple_macro_name definition dc_inuse_type type owner sharing sub_macro_names

[scma_assets_reports_alerts]
external_type = kvstore
collection = scma_assets_reports_alerts
fields_list = shc_name, splunk_server, app_name, title, description_short, description, user, owner, permissions, search_title, app_clear, is_scheduled, cron_schedule, max_concurrent, dispatchAs, dispatch_earliest_time, dispatch_latest_time, actions, search, search_cksum, si_tgt_index, ol_tgt_filename, is_alert, has_report_action

[scma_assets_xml_dashboards]
external_type = kvstore
collection = scma_assets_xml_dashboards
fields_list = shc_name, splunk_server app_name title description_short description user owner author permissions label app_clear user_clear base_name base_name_unhashed is_base_search input_flag input_searches main_search named_searches search_cksum search_num ref_base_name ref_report_name search_rmd refresh_interval realtime alltime

[scma_csv_set]
REGEX = csv_scma_data_export
SOURCE_KEY = MetaData:Source
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::scma_csv

[scma_customer_details]
external_type = kvstore
collection = scma_customer_details
fields_list = _key, value

[scma_customer_name]
FORMAT = customer_name::$1
REGEX = ([^\/\\]+)(?=\-scma\_dsg)
SOURCE_KEY = source

[scma_developers]
filename = scma_developers.csv

[scma_dsg_extract]
DELIMS = ","
FIELDS = key,value

[scma_dsg_set]
REGEX = scma_dsg_detail_gen
SOURCE_KEY = MetaData:Source
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::scma_dsg

[scma_dsg_time]
INGEST_EVAL = _time = substr(replace(source,".*dsg\_detail\_gen\_(?=\d+)",""),0,10)

[scma_json_set]
SOURCE_KEY = MetaData:Source
REGEX = json_scma_data_export
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::scma_json

