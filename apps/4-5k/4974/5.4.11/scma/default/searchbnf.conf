[scma-command]
syntax       = scma (checks=<string>)? (order=<string>)* (timeout=<integer>)? (log=<string>)? (task_id=<string>)? (task_status=<string>)?
shortdesc    = Run scma checks...
description  = Run scma checks...
example1     =  | scma checks="precheck_unconfigured_mc_instances,precheck_customer_set"
commentcheat =  | scma checks="precheck_unconfigured_mc_instances,precheck_customer_set"
examplecheat =  | scma checks="precheck_unconfigured_mc_instances,precheck_customer_set"
example2     = | scma order="1,2,3,4,5"
comment2     = Runs checks using the order number as it appears in the troubleshooting dashboard
maintainer   = Tools Engineer Team
usage        = public

[scmatojson-command]
syntax = makejson <wc-field-list> (output=<string>)? (include_internal=<boolean>)? (include_defaults=<boolean>)? (fill_null=<boolean>)? (include_orig_raw=<boolean>)?
shortdesc = Combines specified fields into a stringified JSON
description = Combines the specified set of field names, or field name patterns, \
                                and creates an field with the output name.
example1 = ... | makejson name data.* "counts[float]" output=json_event
comment1 = Create a stringified JSON: { "name": "<value of name>", "data": { "count": <value of data.count>, "metrics": [values of data.metrics] }}
usage = internal
tags = json
category = results::filter

[miinspect-command]
simplesyntax    = miinspect (summary=<bool>)? (splunk_server=<string>)? (splunk_server_group=<string>)?
