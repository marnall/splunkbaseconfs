[rad-command]
syntax       = rad (apps=<string>) (paths=<string>) (stackname=<string>) (stacktoken=<string>) (appinspecttoken=<boolean>) (stack_experience=<string>)
shortdesc    = Deploy applications to splunk cloud stack...
description  = Deploy applications to splunk cloud stack...
example1     =  | rad apps="app1,app2" path="/path/app1,/path/app2" stackname="my-stack" stacktoken="xxxxxxx" appinspecttoken="xxxxxxxxxxx" stack_experience="classic|victoria"
comment2     = Deploy applications to splunk cloud stack...
maintainer   = Tools Engineer Team
usage        = public

