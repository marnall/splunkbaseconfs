[aaainspect-command]
syntax       = aaainspect (path=<string>) (token=<string>) (check_splunkbase=<string>)? (merge=<string>)? (saveapps=<boolean>)? (packagepath=<string>)? (deletebin=<boolean>)? (tags=<string>)? (debugmode=<boolean>)? (jobtitle=<string>)?
shortdesc    = Run appinspect validation for a set of applications with the specified configuration...
description  = Run appinspect validation for a set of applications with the specified configuration...
example1     =  | aaainspect token="xxxxxxxxx" path="/opt/splunk/etc/apps" merge=true
commentcheat =  | aaainspect token="xxxxxxxxx" path="/opt/splunk/etc/apps" merge=true
examplecheat =  | aaainspect token="xxxxxxxxx" path="/opt/splunk/etc/apps" merge=true
example2     = | aaainspect token="xxxxxxxxx" path="/opt/splunk/etc/apps" merge=true
comment2     = Run appinspect validation for a set of applications with the specified configuration...
maintainer   = Tools Engineer Team
usage        = public


