
# Removes "Redirecting Away from Splunk" message.

[feature:dashboards_csp]
enable_dashboards_external_content_restriction = false
enable_dashboards_redirection_restriction = false

dashboards_trusted_domain.google = https://www.google.com
dashboards_trusted_domain.splunkdocs = https://docs.splunk.com
dashboards_trusted_domain.splunk = https://www.splunk.com
dashboards_trusted_domain.splunksecurity = https://docs.splunksecurityessentials.com
dashboards_trusted_domain.tekstream = https://www.tekstream.com
dashboards_trusted_domain.splunkdev = https://dev.splunk.com
dashboards_trusted_domain.splunklantern = https://lantern.splunk.com

[feature:dashboard_inputs_localization]
enable_dashboard_inputs_localization = false
