[scma_import]
TRANSFORMS-set_scma_sourcetype = scma_dsg_set, scma_csv_set, scma_json_set
SHOULD_LINEMERGE = false
TRUNCATE = 0

[scma_json]
KV_MODE = json
TIME_PREFIX = export_time\:\s+\"
TIME_FORMAT = %s

[scma_csv]
TIMESTAMP_FIELDS = export_time
TIME_FORMAT = %s

[scma_dsg]
REPORT-scma_dsg_extract = scma_dsg_extract,scma_customer_name
TRANSFORMS-scma_dsg = scma_dsg_time

# SCMA Command Log
[source::...(scma2.log|scma.log)]
TIME_PREFIX = ^
TIME_FORMAT = %s.%6N
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\n\r]+)(?=\d+.\d+)
sourcetype = scma:log

[scma:log]
KV_MODE = auto
EXTRACT-log_level = (?<log_level>(DEBUG|INFO|ERROR))
EXTRACT-pid = scma\[(?<pid>\d+)


# aaainspect Command Log
[source::...(aaainspect.log)]
TIME_PREFIX = ^
TIME_FORMAT = %s.%6N
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\n\r]+)(?=\d+.\d+)
sourcetype = scma:aaainspect

[scma:aaainspect]
KV_MODE = auto
EXTRACT-log_level = (?<log_level>(DEBUG|INFO|ERROR))
EXTRACT-pid = aaainspect\[(?<pid>\d+)

# aaainspect Command Log
