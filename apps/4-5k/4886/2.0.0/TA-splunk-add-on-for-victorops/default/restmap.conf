[admin:ta_victorops_configuration]
match = /
members = ta_victorops_settings

[admin:ta_victorops_inputs]
match = /
members = ta_victorops_victorops_incidents, ta_victorops_victorops_oncall, ta_victorops_victorops_teams, ta_victorops_victorops_user

[admin_external:ta_victorops_settings]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = ta_victorops_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:ta_victorops_victorops_user]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = ta_victorops_rh_victorops_user.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:ta_victorops_victorops_incidents]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = ta_victorops_rh_victorops_incidents.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:ta_victorops_victorops_teams]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = ta_victorops_rh_victorops_teams.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:ta_victorops_victorops_oncall]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = ta_victorops_rh_victorops_oncall.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[script:custom_endpoint_vo_sess_key]
match = /vo_sess_key
handler = custom_endpoint_vo_sess_key.Key
python.version = python3
python.required = 3.13
script = custom_endpoint_vo_sess_key.py
scripttype = persist
requireAuthentication = true
output_modes = json
passPayload = true
passHttpHeaders = true
passHttpCookies = true
passSystemAuth = true
