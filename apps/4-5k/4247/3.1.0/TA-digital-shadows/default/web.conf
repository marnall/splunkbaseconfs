
[expose:TA_digital_shadows_account]
pattern = TA_digital_shadows_account
methods = POST, GET

[expose:TA_digital_shadows_account_specified]
pattern = TA_digital_shadows_account/*
methods = POST, GET, DELETE

[expose:TA_digital_shadows_digital_shadows_searchlight]
pattern = TA_digital_shadows_digital_shadows_searchlight
methods = POST, GET

[expose:TA_digital_shadows_digital_shadows_searchlight_specified]
pattern = TA_digital_shadows_digital_shadows_searchlight/*
methods = POST, GET, DELETE

[expose:TA_digital_shadows_settings]
pattern = TA_digital_shadows_settings
methods = POST, GET

[expose:TA_digital_shadows_settings_specified]
pattern = TA_digital_shadows_settings/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
