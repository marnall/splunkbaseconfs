[code-command]
syntax = code (<code-options>)*
shortdesc = Encode or decode the targeted field with the typed encoding mechanism.\
              "field"     - Specify the field containing the data needing to be coded.\
              "method"    - Specify the method of encoding to be performed. (base32, base64, base85, hex, url, or ROT)\
              "destfield" - Specify the destination field name containing the coded data. (Default: coded_data)\
              "action"    - Specify the action (encode or decode) of the data.\
              "offset"    - Specify the ROT offset for encoding or decoding the data. (Default: 13)\
              "key"       - Specify the key used for encoding or decoding the data. (Default: abc123)
description = Encode or decode the targeted field with the typed encoding mechanism.
usage = public
tags = encode decode codec
example1 = | code field=data method=base64 action=decode destfield=enc_data
comment1 = Base64 decode the "data" field
example2 = | code field=url_payload method=hex action=encode destfield=hex_url_payload
comment2 = Hex encode the "url_payload" field
example3 = | code field=enc_payload method=rot action=decode offset=8 destfield=decrypted_payload
comment3 = ROT8 decode a payload

[code-options]
syntax = field=<string> destfield=<string> (method=(base32|base64|base85|hex|url|rot|xor)) action=(encode|en|decode|de) offset=<int> key=<string>
description = Encode the targeted field with the typed encoding mechanism.\
              "field"     - Specify the field containing the data needing to be coded.\
              "method"    - Specify the method of encoding to be performed.\
              "destfield" - Specify the destination field name containing the coded data. (Default: coded_data)\
              "action"    - Specify the action (encode or decode) of the data.\
              "offset"    - Specify the ROT offset for encoding or decoding the data. (Default: 13)\
              "key"       - Specify the key used for encoding or decoding the data. (Default: abc123)
