
[APP report]
action.cefout2.enabled = 0
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TestApp
request.ui_dispatch_view = pivot
search = | pivot Event_model RootObject values(app_type) AS "APP TYPE" values(url) AS URL values(virsecevent_type) AS "EVENT TYPE" SPLITROW application_name AS "APP NAME" SORT 100 application_name ROWSUMMARY 0 COLSUMMARY 0 SHOWOTHER 1

[APPLICATION REPORT]
action.cefout2.enabled = 0
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = 0
display.general.type = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TestApp
request.ui_dispatch_view = search
search = | pivot virevent_model report values(virsecevent_type) AS "EVENT TYPE" values(url) AS URL values(app_type) AS "APPLICATION TYPE" SPLITROW application_name AS "APPLICATION NAME" SORT 100 application_name ROWSUMMARY 0 COLSUMMARY 0 SHOWOTHER 1
