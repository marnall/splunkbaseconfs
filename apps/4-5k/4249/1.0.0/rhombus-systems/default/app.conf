# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 4

[launcher]
author = Rhombus Developer
version = 1.0.0
description = This is an add-on to import data from your Rhombus Systems cameras into Splunk via the Rhombus API access.

[ui]
is_visible = 1
label = Rhombus Systems
docs_section_override = AddOns:released

[package]
id = rhombus-systems

[triggers]
reload.addon_builder = simple
reload.rhombus_systems_account = simple
reload.rhombus_systems_settings = simple
reload.passwords = simple

