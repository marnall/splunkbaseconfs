[count_severities_per_atm]
action.email.useNSSubject = 0
alert.track = 0
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = sourcetype="vss_eventlog" | rex field=EVT_HEAD_AND_SEVERITY "(?<EVT_HEAD_AND_SEVERITY>\w{1})$" | stats count by EVT_ATM_ID, EVT_HEAD_AND_SEVERITY

[Events per ATM]
action.email.useNSSubject = 0
alert.track = 0
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = sourcetype="vss_eventlog" | stats count by EVT_ATM_ID

[Deny sandbox triggered]
action.email.useNSSubject = 0
alert.track = 0
search = eventtype="process_denied" | stats count by EVT_ATM_ID

[Count of all combinations of sources and types]
action.email.useNSSubject = 0
alert.track = 0
search = sourcetype="vss_eventlog" | eval combo = EVT_SOURCE . "|" . EVT_TYPE | stats count by combo EVT_SOURCE EVT_TYPE

[top3_process_denied]
action.email.useNSSubject = 0
alert.track = 0
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-vynamic-security-add-on
request.ui_dispatch_view = search
search = eventtype="process_denied" | stats count by EVT_ATM_ID | sort - count | head 3

[top10_critical_events]
action.email.useNSSubject = 0
alert.track = 0
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-vynamic-security-add-on
request.ui_dispatch_view = search
search = eventtype="critical_event" | stats count by EVT_ATM_ID | sort - count | head 10

[currently_unprotected_atms]
action.email.useNSSubject = 0
alert.track = 0
display.general.timeRangePicker.show = 0
search = sourcetype="vss_eventlog" | transaction EVT_ATM_ID startswith="INTE|MPOF OR SCSP|MSTA" | search (EVT_SOURCE="INTE" EVT_TYPE="MPOF") OR (EVT_SOURCE="SCSP" EVT_TYPE="MSTA" EVT_DATA="*builtin*") | dedup EVT_ATM_ID | search NOT (EVT_SOURCE="INTE" EVT_TYPE="MPON") AND NOT (EVT_SOURCE="TSSV" EVT_TYPE="ticket end")
