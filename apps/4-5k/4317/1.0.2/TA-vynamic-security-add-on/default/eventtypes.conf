[internal_integrity_check_failed]
color = et_orange
priority = 3
search = EVT_SOURCE="INCH" EVT_TYPE="MIFA"

[file_or_reg_integrity_issue]
color = et_orange
priority = 3
search = EVT_SOURCE="INCH" (EVT_TYPE="MIFA" OR EVT_TYPE="MCFA" OR EVT_TYPE="VIRE" OR EVT_TYPE="VIFI" OR EVT_TYPE="VCRE" OR EVT_TYPE="VCFI")

[bios_integrity_issue]
color = et_orange
priority = 3
search = EVT_SOURCE="BIOS" (EVT_TYPE="IRER" OR EVT_TYPE="BSCH" OR EVT_TYPE="PWCH" OR EVT_TYPE="USUP")

[ips_overflow_block]
color = et_orange
priority = 8
search = EVT_SOURCE="SCSP" EVT_TYPE="PBOP"

[file_access_block]
color = et_red
priority = 2
search = EVT_SOURCE="SCSP" EVT_TYPE="PFIL"

[registry_access_block]
color = et_red
priority = 2
search = EVT_SOURCE="SCSP" EVT_TYPE="PREG"

[process_denied]
color = et_red
search = EVT_PSET="deny_ps"

[protected_mode_deactivated_ipsoff]
color = et_green
priority = 9
search = EVT_SOURCE="INTE" EVT_TYPE="MPOF"

[protected_mode_activated_ipson]
color = et_green
priority = 9
search = EVT_SOURCE="INTE" EVT_TYPE="MPON"

[usb_device_rejected]
color = et_orange
priority = 3
search = EVT_SOURCE="USBA" EVT_TYPE="REJE"

[violation_internal_integrity_check_filesystem]
color = et_orange
priority = 3
search = EVT_SOURCE="INCH" EVT_TYPE="VIFI"

[critical_event]
color = et_red
search = EVT_HEAD_AND_SEVERITY="*C"
