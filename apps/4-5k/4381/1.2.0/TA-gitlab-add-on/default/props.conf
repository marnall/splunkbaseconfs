[source::...ta-gitlab-add-on*.log*]
sourcetype = ta:gitlab:add:on:log

[source::...ta_gitlab_add_on*.log*]
sourcetype = ta:gitlab:add:on:log

[GitLab:Commit]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 24
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TIME_PREFIX = \s\"committed_date\":\s\"
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-GitLabCommitCIM = author_email AS commit_author_email author_name AS commit_author_name authored_date AS commit_authored_date id AS commit_id "parent_ids{}" AS "repository _id" title AS commit_title

[GitLab:Event]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 24
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TIME_PREFIX = \s\"created_at\":\s\"
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-GitLabEventCIM = action_name AS event_action author_id AS event_author_id author_name AS event_author_name author_username AS event_author_username pd_action AS event_push_action pd_commit_count AS event_push_commit_count pd_commit_title AS event_push_commit_title pd_commit_to AS event_push_commit_id pd_ref AS event_push_reference_name pd_ref_type AS event_push_reference_type
EVAL-commit_id = case(isnotnull(pd_commit_to),pd_commit_to,isnotnull(pd_commit_from),pd_commit_from)

[GitLab:Issue]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 24
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TIME_PREFIX = \s\"updated_at\":\s\"
category = Splunk App Add-on Builder
pulldown_type = 1

[GitLab:MergeRequest]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 24
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TIME_PREFIX = \s\"updated_at\":\s\"
category = Splunk App Add-on Builder
pulldown_type = 1

[GitLab:Milestone]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 24
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TIME_PREFIX = \s\"updated_at\":\s\"
category = Splunk App Add-on Builder
pulldown_type = 1

[GitLab:Project]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 24
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TIME_PREFIX = \s\"updated_at\":\s\"
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-GitLabProjectCIM = created_at AS repository_created_at default_branch AS repository_main_branch description AS repository_description forks_count AS repository_fork_count id AS repository_id last_activity_at AS repository_last_activity name AS repository_title namespace_id AS repository_namespace_id namespace_name AS repository_namespace_name owner_name AS repository_owner_name repository_id AS project_id web_url AS repository_web_url
FIELDALIAS-GitLabProjectID = id AS project_id

[GitLab:Job]
CHARSET=UTF-8
KV_MODE=json
MAX_TIMESTAMP_LOOKAHEAD=1500
SHOULD_LINEMERGE=false
category=Splunk App Add-on Builder
disabled=false
pulldown_type=true
TIME_PREFIX=\"event_time\": \"
LINE_BREAKER=([\r\n]+)
FIELDALIAS-GitLabCIJobCIM = job_commit_id ASNEW "commit.id" job_created_at ASNEW created_at job_duration ASNEW duration job_finished_at ASNEW finished_at job_id ASNEW id job_name ASNEW name job_pipe_id ASNEW "pipeline.id" job_pipe_ref ASNEW "pipeline.ref" job_pipe_status ASNEW "pipeline.status" job_pipe_url ASNEW "pipeline.web_url" job_runner_id ASNEW "runner.id" job_runner_name ASNEW "runner.name" job_runner_shared ASNEW "runner.is_shared" job_stage ASNEW stage job_started_at ASNEW started_at job_status ASNEW status job_url ASNEW web_url job_user_id ASNEW "user.id" job_user_name ASNEW "user.name"

[GitLab:Job:Trace]
CHARSET=UTF-8
KV_MODE=json
DATETIME_CONFIG=CURRENT
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)
NO_BINARY_CHECK=true
