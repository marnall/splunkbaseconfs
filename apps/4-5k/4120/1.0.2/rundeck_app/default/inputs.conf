#
# inputs.conf for Rundeck App
#

# ---------------------------------------------------------------------
# Common Properties (inherited by or can be overidden by child stanzas)
# ---------------------------------------------------------------------

[rundeck]

# if you want to change the default index, ensure you also change the gobal index used for searches in default/macros.conf in the 'rundeck_index' stanza
index = main

# your rundeck host , ie: foo.myrundeck.com (don't include 'https://' , this is hardcoded by default to satisfy Splunk certification requirements for secure network communications).You can also specify an alternative port with the host , foo.myrundeck.com:1234
https_api_host = **YOUR HOST** 

# enforces responses in JSON format
http_header_propertys = Content-Type=application/json,Accept=application/json

# custom response handler defiend in bin/responsehandlers.py for processing response JSON 
response_handler = RundeckJSONHandler

# default logging level
log_level=INFO

# described here : https://docs.splunk.com/Documentation/Splunk/7.1.1/Admin/Inputsconf
start_by_shell = false

# default polling interval for all rest endpoints
polling_interval = * * * * *

# whether or not to backfill the entire history (1) or just start from now (0)
backfill = 0

# ---------------------------------
# Properties for each REST endpoint
# ---------------------------------

[rundeck://users]
# disabled by default
disabled = 1
sourcetype = rundeck_rest_users
endpoint = /api/$api_version$/user/list
# poll every minute
polling_interval = * * * * *
response_handler = RundeckJSONArrayHandler

[rundeck://sysinfo]
# disabled by default
disabled = 1
sourcetype = rundeck_rest_sysinfo
endpoint = /api/$api_version$/system/info
# poll every minute
polling_interval = * * * * *

[rundeck://logstorage]
# disabled by default
disabled = 1
sourcetype = rundeck_rest_logstorage
endpoint = /api/$api_version$/system/logstorage
# poll every minute
polling_interval = * * * * *

[rundeck://logstorage_incomplete]
# disabled by default
disabled = 1
sourcetype = rundeck_rest_logstorage_incomplete
endpoint = /api/$api_version$/system/logstorage/incomplete
# poll every minute
polling_interval = * * * * *
response_handler = RundeckJSONLogStorageHandler

[rundeck://projects]
# disabled by default
disabled = 1
sourcetype = rundeck_rest_projects
endpoint = /api/$api_version$/projects
# poll every minute
polling_interval = * * * * *
response_handler = RundeckJSONArrayHandler

[rundeck://project_event_history]
# disabled by default
disabled = 1
sourcetype = rundeck_rest_project_event_history
endpoint = /api/$api_version$/project/$project$/history
# poll every minute
polling_interval = * * * * *
response_handler = RundeckJSONProjectEventsHandler

[rundeck://project_resources]
# disabled by default
disabled = 1
sourcetype = rundeck_rest_project_resources
endpoint = /api/$api_version$/project/$project$/resources
# poll every minute
polling_interval = * * * * *
response_handler = RundeckJSONResourcesHandler

[rundeck://project_jobs]
# disabled by default
disabled = 1
sourcetype = rundeck_rest_project_jobs
endpoint = /api/$api_version$/project/$project$/jobs
# poll every minute
polling_interval = * * * * *
response_handler = RundeckJSONArrayHandler

[rundeck://project_executions]
# disabled by default
disabled = 1
sourcetype = rundeck_rest_project_executions
endpoint = /api/$api_version$/project/$project$/executions
# poll every minute
polling_interval = * * * * *
response_handler = RundeckJSONExecutionsHandler

# this endpoint does not index any data , just performs a background admin task , auto authtoken refresh
[rundeck://authtokenrefresh]
# disabled by default
disabled = 1
sourcetype = rundeck_admin_authtokenrefresh
endpoint = /api/$api_version$/token/$auth_token$
# poll every day at 2am
polling_interval = 0 2 * * *
response_handler = RundeckAuthTokenRefreshHandler
response_handler_args = duration=30d,expiry_window_secs=172800
