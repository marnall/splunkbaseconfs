[zywall_idx]
definition = index=firewall
errormsg = Invalid index name
iseval = 0

[ActivityList]
definition = message IN ("Maximum sessions per host (1000) was exceeded." , "The configuration of L2TP over IPSec has been changed." , "abnormal tcp traffic detected,* Drop" , "AUTH fail!" , "diagnostic-info is collecting now. Wait it to complete." , "Facebook Wi-Fi daemon: uam_read_event failed." , "Possible ARP spoofing attack on IP *" , "Rule_id:1 from WAN to Any, [type:Scan-Detection(26)] tcp portscan Action:Drop Packet") OR note="Config*"
iseval = 0

[ThreatLevel]
definition = | eval ThreatLvl = case(msg=="Abnormal Traffic Detected" AND count>=10,"High",msg=="Configuration Change" AND count>=1,"High",msg="Diagnostic info collection" AND count>=10,"High",msg=="Max session per host exceeded" AND count>=200,"High",msg=="Authentication Failure" AND count>=1,"High",msg=="Facebook Wi-Fi Daemon" AND count>= 10,"High",msg=="Possible ARP Spoofing Attack" AND count>=1,"High",msg=="Scan Detection" AND count>=1,"High")
iseval = 0

[ThreatMsg]
definition = | eval msg=case(msg=="Maximum sessions per host (1000) was exceeded.","Max session per host exceeded",msg=="AUTH fail!","Authentication Failure",msg=="diagnostic-info is collecting now. Wait it to complete.","Diagnostic info collection",msg=="Facebook Wi-Fi daemon: uam_read_event failed.","Facebook Wi-Fi Daemon",msg=="Rule_id:1 from WAN to Any, [type:Scan-Detection(26)] tcp portscan Action:Drop Packet","Scan Detection",msg=="Abnormal Traffic","Abnormal Traffic Detected",msg=="ARP Spoofing","Possible ARP Spoofing Attack") \
	| eval msg=if(note=="CONFIG CHANGE","Configuration Change",msg) ,msg=if(note=="Configuration Change","Configuration Change",msg)
iseval = 0

[vpn_server]
definition = 110.227.192.43:9433
errormsg = VPN server IP does not defined
iseval = 0

[span]
definition = span=1h
iseval = 0

[odd_hours_vpn_login]
definition = | eval local_time=strftime('_time',"%H:%M:%S"), date_wday=lower(strftime('_time',"%A")) \
	| search (local_time<"18:00:00" local_time>"03:00:00") OR (date_wday="saturday" AND local_time>"03:00:00") OR (date_wday="sunday" )
errormsg = Time was not correct
iseval = 0

[zywall_timechart(2)]
args = bytes_out,bytes_in
definition = | timechart span=1d sum($bytes_out$) as t sum($bytes_in$) as r
errormsg = check macro
iseval = 0

[zywall_mb_cal(2)]
args = bytes_out,bytes_in
definition = | eval bytes_out = round(($bytes_out$/1024/1024),2)\
	| eval bytes_in = round(($bytes_in$/1024/1024),2)
errormsg = check macro
iseval = 0

