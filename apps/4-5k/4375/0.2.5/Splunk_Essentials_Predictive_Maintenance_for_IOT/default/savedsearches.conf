[pm_create_demo_dataset]
enableSched = 1
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 0,12 * * *
description = pm_create_demo_dataset
dispatch.earliest_time = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.chartHeight = 471
display.visualizations.charting.chart = line
display.visualizations.custom.type = scatterplot3d_app.scatter3d
display.visualizations.show = 0
request.ui_dispatch_app = Splunk_Essentials_Predictive_Maintenance_for_IOT
request.ui_dispatch_view = search
search = sourcetype="iot_pm_fail" \
| table unit_no unit_cycle sensor* \
| reverse \
| streamstats count(eval(unit_cycle=1)) as events_frame_id \
| rename sensor_02 as sname_LPC_Outlet_Temp, sensor_03 as sname_HPC_Outlet_Temp, sensor_04 as sname_LPT_Outlet_Temp, sensor_07 as sname_Total_HPC_Outlet_Pres, sensor_08 as sname_Phys_Fan_Speed, sensor_09 as sname_Phys_Core_Speed, sensor_11 as sname_Static_HPC_Outlet_Pres, sensor_12 as sname_Fuel_Flow_Ratio, sensor_13 as sname_Corr_Fan_Speed, sensor_14 as sname_Corr_Core_Speed, sensor_15 as sname_Bypass_Ratio, sensor_17 as sname_Bleed_Enthalpy, sensor_21 as sname_HPT_Coolant_Bleed, sensor_22 as sname_LPT_Coolant_Bleed\
| strcat events_frame_id "-" unit_cycle pkey\
| lookup engine_run_status pkey, pkey\
| search cycle_percent=*\
| collect index=iot_pm_stash

[EVENT_SUM_RUL_STATS]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 0,12 * * *
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
enableSched = 1
search = sourcetype="iot_pm_fail" \
| table unit_no unit_cycle sensor* \
| reverse \
| streamstats count(eval(unit_cycle=1)) as events_frame_id \
| eventstats max(unit_cycle) as eol by events_frame_id \
| rename sensor_02 as sname_LPC_Outlet_Temp, sensor_03 as sname_HPC_Outlet_Temp, sensor_04 as sname_LPT_Outlet_Temp, sensor_07 as sname_Total_HPC_Outlet_Pres, sensor_08 as sname_Phys_Fan_Speed, sensor_09 as sname_Phys_Core_Speed, sensor_11 as sname_Static_HPC_Outlet_Pres, sensor_12 as sname_Fuel_Flow_Ratio, sensor_13 as sname_Corr_Fan_Speed, sensor_14 as sname_Corr_Core_Speed, sensor_15 as sname_Bypass_Ratio, sensor_17 as sname_Bleed_Enthalpy, sensor_21 as sname_HPT_Coolant_Bleed, sensor_22 as sname_LPT_Coolant_Bleed \
| fit StandardScaler "sname_Bleed_Enthalpy", "sname_Bypass_Ratio", "sname_Corr_Core_Speed", "sname_Corr_Fan_Speed", "sname_Fuel_Flow_Ratio", "sname_HPC_Outlet_Temp", "sname_HPT_Coolant_Bleed", "sname_LPC_Outlet_Temp", "sname_LPT_Coolant_Bleed", "sname_LPT_Outlet_Temp", "sname_Phys_Core_Speed", "sname_Phys_Fan_Speed", "sname_Static_HPC_Outlet_Pres", "sname_Total_HPC_Outlet_Pres" with_mean=true with_std=true into iot_pm_ss_tmp \
| table events_frame_id, unit_cycle, "SS_sname_Phys_Core_Speed", "SS_sname_LPC_Outlet_Temp", eol \
| eval condition_ind=(SS_sname_Phys_Core_Speed+SS_sname_LPC_Outlet_Temp)*-1 \
| table events_frame_id, unit_cycle, condition_ind, eol\
| collect index=iot_pm_stash marker="EVT_TYPE=RUL_STATS"
