[iot_pm]
coldPath = $SPLUNK_DB/iot_pm/colddb
enableDataIntegrityControl = 0
enableTsidxReduction = 0
homePath = $SPLUNK_DB/iot_pm/db
maxTotalDataSizeMB = 10240
thawedPath = $SPLUNK_DB/iot_pm/thaweddb

[iot_pm_stash]
coldPath = $SPLUNK_DB/iot_pm_stash/colddb
enableDataIntegrityControl = 0
enableTsidxReduction = 0
homePath = $SPLUNK_DB/iot_pm_stash/db
maxTotalDataSizeMB = 1
thawedPath = $SPLUNK_DB/iot_pm_stash/thaweddb
compressRawdata = 1

