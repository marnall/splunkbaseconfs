[default]

[EndgameAPI]
category = Splunk App Add-on Builder
TRUNCATE = 999999
KV_MODE = json
pulldown_type = 1
SHOULD_LINEMERGE = 0
TIME_PREFIX = "created_at": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TZ = Etc/GMT
MAX_TIMESTAMP_LOOKAHEAD = 5838

#######################################
# Endpoint.Processes CIM Data Model Field Mapping
# event_type_full = process_event
#######################################

FIELDALIAS-os = endpoint.display_operating_system as os
FIELDALIAS-parent_process_exec = data.triggering_fact_array{}.data_buffer.parent_process_name as parent_process_exec
FIELDALIAS-parent_process_id = data.triggering_fact_array{}.data_buffer.ppid as parent_process_id
FIELDALIAS-parent_process_guid = data.triggering_fact_array{}.data_buffer.unique_ppid as parent_process_guid
FIELDALIAS-parent_process_path = data.triggering_fact_array{}.data_buffer.parent_process_path as parent_process_path
FIELDALIAS-process_current_directory = data.source_process_dirname as process_current_directory
FIELDALIAS-process_exec = data.triggering_fact_array{}.data_buffer.process_name as process_exec
EVAL-process_hash = coalesce('data.triggering_fact_array{}.data_buffer.sha256','data.triggering_fact_array{}.data_buffer.sha1','data.triggering_fact_array{}.data_buffer.md5')
FIELDALIAS-process_guid = data.triggering_fact_array{}.data_buffer.unique_pid as process_guid
FIELDALIAS-process_id = data.triggering_fact_array{}.data_buffer.pid as process_id
FIELDALIAS-process_path = data.triggering_fact_array{}.data_buffer.process_path as process_path

#######################################
# Endpoint.Registry CIM Data Model Field Mapping
# event_type_full = registry_event
#######################################

FIELDALIAS-registry_hive = data.triggering_fact_array{}.data_buffer.key_path as registry_hive

#######################################
# Network Traffic CIM Data Model Field Mapping
# event_type_full = network_event
#######################################

FIELDALIAS-app = data.triggering_fact_array{}.data_buffer.protocol as app
FIELDALIAS-bytes_in = data.triggering_fact_array{}.data_buffer.total_in_bytes as bytes_in
FIELDALIAS-bytes_out = data.triggering_fact_array{}.data_buffer.total_out_bytes as bytes_out
EVAL-bytes = tonumber(if(isnull('bytes_in'),"0", 'bytes_in')) + tonumber(if(isnull('bytes_out'),"0", 'bytes_out'))
FIELDALIAS-dest = data.triggering_fact_array{}.data_buffer.destination_address as dest
FIELDALIAS-dest_ip = data.triggering_fact_array{}.data_buffer.destination_address as dest_ip
FIELDALIAS-dest_mac = endpoint.mac_address as dest_mac
FIELDALIAS-dest_port = data.triggering_fact_array{}.data_buffer.destination_port as dest_port
FIELDALIAS-dvc = endpoint.name as dvc
FIELDALIAS-dvc_ip = endpoint.ip_address as dvc_ip
FIELDALIAS-dvc_mac = endpoint.mac_address as dvc_mac
FIELDALIAS-packets_in = data.triggering_fact_array{}.data_buffer.in_packet_count as packets_in
FIELDALIAS-packets_out = data.triggering_fact_array{}.data_buffer.out_packet_count as packets_out
EVAL-packets = tonumber('packets_in') + tonumber('packets_out')
FIELDALIAS-src_ip = data.triggering_fact_array{}.data_buffer.source_address as src_ip
FIELDALIAS-src_port = data.triggering_fact_array{}.data_buffer.source_port as src_port
FIELDALIAS-transport = data.triggering_fact_array{}.data_buffer.protocol as transport
# common to malware_actions cim model
FIELDALIAS-user = user_display_name as user

#######################################
# Malware CIM Data Model Field Mapping
# data.malware_classification.identifier!=""
#######################################
EVAL-dest = if('data.triggering_fact_array{}.data_buffer.event_type_full'="network_event", 'data.triggering_fact_array{}.data_buffer.destination_address', 'endpoint.ip_address')
FIELDALIAS-file_name = data.file_basename as file_name
FIELDALIAS-file_path = data.file_name as file_path
EVAL-file_hash = coalesce('data.hashes.sha256','data.hashes.sha1', 'data.hashes.md5')
FIELDALIAS-product_version = semantic_version as product_version

#######################################
# Network Resolution CIM Data Model Field Mapping
# event_type_full = dns_event
#######################################
FIELDALIAS-query = query_name as query
FIELDALIAS-answer = query_results as answer

#######################################
# ALerts CIM Data Model Field Mapping
# no condition as all events are alerts
#######################################
FIELDALIAS-message = system_msg as message
EVAL-type = "Alert"
FIELDALIAS-subject = data.event_type_human as subject
FIELDALIAS-body = _raw AS body

#######################################
# CIM Data Model Field Mapping
# Fields common to all datamodels
#######################################

EVAL-vendor_product = "Endgame"

[source::...ta-endgame*.log*]
sourcetype = ta:endgame:log
SHOULD_LINEMERGE = true

[source::...ta_endgame*.log*]
sourcetype = ta:endgame:log
SHOULD_LINEMERGE = true

