########################################################################
## Note: vj: added to sourcetypes to Prevent Default System Overwrite #
########################################################################
##--------------------------##
##      Value Journey       ##
##   Sample Data Load Log	##
##--------------------------##
[source::...(/|\\)var(/|\\)log(/|\\)splunk(/|\\)*vjm_splunk_sample_data.log*]
SHOULD_LINEMERGE = true
LINE_BREAKER=([\r\n]+)\d{4}-\d{2}-\d{2}
sourcetype = vj:splunk:sampledata
priority = 1

##--------------------------##
##      access_custom       ##
##--------------------------##
[vj:access_custom]
BREAK_ONLY_BEFORE = ^\d{2,4}/\d{2}/\d{2}
EXTRACT-vj_artist_id = /browse/artist/(?P<artist_id>\d+)
EXTRACT-vj_artist_search = /search/(?P<search_terms>.*?)\s
EXTRACT-vj_track_id = (/addtolibrary/|/browse/tracks/)(?P<track_id>\d+)
EXTRACT-vj_url = \"(http|https)\:\/\/(?<url>[^\"]+)
EXTRACT-vj_url_details = (?<cs_url_scheme>[^:]+)://(?<cs_url_host>[^/:]+)(:(?<cs_url_port>\d+))?(?<cs_url_stem>[^\?#\s]*)(\?(?<cs_url_query>[^#|\s*]*))?(#(?<cs_url_fragment>.*?))?
LOOKUP-vj_httpstatus = vj_http_status_lookup status OUTPUT status_description, status_type
MAX_DAYS_HENCE = 10
NO_BINARY_CHECK = 1
REPORT-vj_access_custom = vj_access_custom-extractions,vj_radius-extractions
SHOULD_LINEMERGE = 0
TRANSFORMS-vj_force_radius_bus_evt = vj_force_radius_bus_sourcetype_appmgmt, vj_force_radius_bus_source_appmgmt
EVAL-vj_sgs = 0
EVAL-vj_walk = 1
category = VJM_Sample Data

##--------------------------##
##      access_combined     ##
##--------------------------##
[vj:access_combined]
REPORT-vj_access = vj_access-extractions
REPORT-vj_apachebytes = vj_apachebytes
REPORT-vj_apachesrc = vj_apachesrc
REPORT-vj_apachestatus = vj_apachestatus
REPORT-vj_apacheclientip = vj_apacheclientip
REPORT-vj_apachetimetaken = vj_apachetimetaken
EXTRACT-vj_url_details = (?<cs_url_scheme>[^:]+)://(?<cs_url_host>[^/:]+)(:(?<cs_url_port>\d+))?(?<cs_url_stem>[^\?#\s]*)(\?(?<cs_url_query>[^#|\s*]*))?(#(?<cs_url_fragment>.*?))?
EXTRACT-vj_url = \"(http|https)\:\/\/(?<url>[^\"]+)
EXTRACT-vj_useragent = \"\s\"(?<http_user_agent>.+)\"\s\d+$
EXTRACT-vj_access_request = (?:\")(?<access_request>[^\"]+)\"\s+(?<status>[^\s]+)\s
LOOKUP-vj_httpstatus = vj_http_status_lookup status OUTPUT status_description, status_type
FIELDALIAS-vj_responsetime = other AS time_taken
LOOKUP-vj_prod = vj_prod_id_lookup product_id OUTPUT call_flwrs_price price product_id AS productId product_name tdf_price
EVAL-signature = if(isnull(signature),access_request,signature)
EVAL-vj_sgs = 0
EVAL-vj_walk = 1
category = VJM_Sample Data

##--------------------------##
## Access Combined w/cookie ##
##--------------------------##
[vj:access_combined_wcookie]
LOOKUP-vj_tut_prices_w_cookie = vj_tut_prices productId OUTPUT Code price product_name sale_price
MAX_DAYS_HENCE = 10
MAX_DIFF_SECS_AGO = 87000
REPORT-vj_access = vj_access-extractions
SHOULD_LINEMERGE = 0
TIME_FORMAT = %d/%b/%Y:%H:%M:%S
TIME_PREFIX = \[
EVAL-vj_sgs = 0
EVAL-vj_walk = 1
category = VJM_Sample Data

