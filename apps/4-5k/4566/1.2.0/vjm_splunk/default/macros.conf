[vjm_hist_usage]
definition = inputlookup vj_cfg_hist_usage WHERE item_type!="my_journey"\
| join user [|inputlookup vj_cfg_contact_user | rename name AS user_name| table user, user_name]\
| table item_id,item_type,object,object_label,part_num,part_title,session_id,time,total_parts,user,user_name | join type=left item_id \
    [| inputlookup vj_my_journey_activity WHERE item_type!="my_journey"\
    | table item_id, item_name]\
| eval User=if(isnull(user_name),user,user_name." (".user.")") \
| table time item_type item_name name User user user_type app item_id object_label part_title part_num total_parts session_id
iseval = 0

[vjm_progress_user_all]
definition = inputlookup vj_my_journey WHERE enabled="1" AND [| inputlookup vj_cfg_uc_main | stats count by root_id | append [|makeresults | eval root_id="default"]| table root_id]\
| eval item_completed=0\
| eventstats dc(item_id) AS tot_items\
| join item_id type=left [| inputlookup vj_cfg_hist_usage\
| addinfo\
| eval info_max_time=if(info_max_time>0,info_max_time,now())\
| where time>info_min_time AND time<info_max_time\
| stats max(total_parts) AS t_parts, max(part_num) AS l_part by user, item_id\
| eval item_completed=if(l_part=t_parts,1,0)\
| stats values(user) AS user, max(item_completed) AS item_completed by item_id\
| eval user=mvjoin(user,"|")]\
| makemv delim="|" user\
| mvexpand user\
| sort item_id\
| stats count(eval(item_completed=0)) AS start_nc_count,count(eval(item_completed=1)) AS c_count,max(tot_items) AS tot_items by user\
| eval completion_percent=if(c_count=0,"0",round((c_count/tot_items*100),0))\
| eval nc_count=tot_items-c_count\
| table user, start_nc_count, nc_count, c_count, tot_items,completion_percent
iseval = 0

[vj_mgmt_weekly_usage_email(3)]
args = company,splunk_owner_email,exec_flg
definition = `vjm_journey_progress("*")`\
| eval exec_flg="$exec_flg$"\
| WHERE exec_flg="1"\
| stats max(item_completed) AS item_completed by item_id,item_type,action_type\
| eval nc_req_items=if(action_type="required" AND item_completed="0","(Not Completed) ".item_name,0)\
| stats count AS total_items,count(eval(item_completed="0")) AS nc_items_cnt,count(eval(item_completed="1")) AS c_items_cnt,values(nc_req_items) AS nc_req_items,count(eval(action_type="required")) AS total_req_items_cnt,count(eval(item_completed="1" AND action_type="required")) AS c_req_items_cnt,count(eval(item_completed="0" AND action_type="required")) AS nc_req_items_cnt\
| eval nc_req_items_msg=if(nc_req_items="0","Required Items have been Completed{Required Items Completed}","Items Required but Not Completed (".nc_req_items_cnt.").{".mvjoin(nc_req_items,",")."}")\
| eval c_percent=round(((c_items_cnt/total_items)*100),0)\
| eval Description="Progress Metrics:| * Overall User progress for viewing and completing Available Items.|Required Items Check:| * ".nc_req_items_msg,sort_flg=1,Details="Completion Percent: ".c_percent."%|Total Items Available: ".total_items."|Total Items Viewed: ".c_items_cnt."|Total Items Not Viewed: ".nc_items_cnt."|Total Required Items Not Viewed: ".nc_req_items_cnt\
| rex field=Description "(?<Description>[^\{]+)\{(?<nc_details>[^\}]+)"\
| eval Details=if(isnull(nc_details),Details,Details."|".replace(nc_details,",","|")),sort_flg=if(isnull(nc_details),1,2)\
| append\
[| inputlookup vj_cfg_instance\
| stats values(company) AS company,min(date_started) AS start_time\
| eval company=if(mvcount(company)>1,mvindex(company,0),company), Details="Evaluation Start Time: ".strftime(start_time,"%m/%d/%y %I:%M %P"),sort_flg=0\
| eval Description="User (".company.") Weekly - Value Journey for Splunk - Usage Report:"\
| table Description,Details,sort_flg]\
| append\
[| inputlookup vj_cfg_contact_user\
| eval title=user\
| join type=left title\
[ search index=_audit "action=login attempt" info="succeeded"\
| fields _time, title\
| rex "user\=(?<title>[^\,]+)"\
| stats count AS t_u_lgn, min(_time) AS f_u_lgn,max(_time) AS l_u_lgn by title\
| eval f_u_lgn=strftime(f_u_lgn,"%m/%d/%y"),l_u_lgn=strftime(l_u_lgn,"%m/%d/%y")]\
| sort -f_u_lgn -t_u_lg\
| eval acc_times=if(isnull(f_u_lgn),""," (Total: ".t_u_lgn.", Last: ".l_u_lgn.", First: ".f_u_lgn.")")\
| eval Access_History=if(isnull(f_u_lgn),"","| ".name." (".title.") ".acc_times)\
| eval not_logged_in=if(isnull(f_u_lgn),name,"")\
| stats list(Access_History) AS Access_History, values(not_logged_in) AS not_logged_in\
| eval Access_History=mvindex(Access_History,0,4)\
| eval Description=case(mvcount(not_logged_in)=0,"Access History:| * Status: All Users have logged into the instance.",mvcount(not_logged_in)>0 AND mvcount(Access_History)>0,"Access History:| * Status: Warning - Some Users have not logged into the instance yet.",mvcount(not_logged_in)>0 AND mvcount(Access_History)=0,"Access History:| * Status: Warning - No Users have not logged into the instance yet.")\
| eval log_u=mvcount(Access_History),nlog_u=if(not_logged_in=="",0,mvcount(not_logged_in))\
| eval nlu_details=if(nlog_u=0," ",if(nlog_u>5,"|Total Users Not Logged In Yet: ".nlog_u,"|Users Not Logged In Yet: ".mvjoin(not_logged_in,"| * ")))\
| eval Details="Logged In Users: ".mvjoin(Access_History,"")." ".nlu_details,sort_flg=4\
| fields Description,Details,sort_flg\
| table Description,Details,sort_flg]\
| append\
[| inputlookup vj_cfg_uc_main\
| eval sort_order=if(level="main",1,0), filter=if(level="main",id,NULL)\
| eventstats values(filter) AS filter\
| eval filter=mvjoin(filter,"|")\
| WHERE match(root_id,filter) AND rank!="0"\
| eval rank_str=if(rank="0","Not Ranked",rank." Stars")\
| eval Use_Case=if(level="main",name." (".rank." Stars)| * ",NULL),Details=if(level="sub","| * (".rank_str.") ".name,"")\
| search NOT Use_Case=""\
| sort -rank\
| join type=left root_id [|inputlookup vj_cfg_uc_main WHERE level="main" | rename id AS root_id, name AS Name | table root_id,Name,rank]\
| stats list(Details) AS Details by Name,rank\
| sort -rank\
| eval comb="| ".Name." (".rank." Stars):".mvjoin(Details,"")\
| stats list(comb) AS comb\
| eval Details="|".mvjoin(comb," ")\
| eval Description="Use Case Selected Priorities:| * Use Case Priorites configured by the user during initial login or by updating during the tour."\
| table Description,Details]\
| append\
[| inputlookup vj_cfg_hist_feedback\
| WHERE match(tags,"Requested Assistance Page")\
| sort -_time item_name\
| eval req_time=strftime(_time,"%m/%d/%y %I:%M %P")\
| eval rating=if(isnull(rating),"0",rating)\
| eval Request="|Request (".user."): |   * Request Time:  ".req_time."|   * Target Dashboard: ".item_name."|   * Dashboard filename: ".link."|   * Rating: ".rating." Stars|   * Question: |    ".feedback\
| sort _time\
| stats list(Request) AS Details by user\
| join user [|inputlookup vj_cfg_contact_user | table user,name,email,phone_work,phone_mobile,title]\
| eval link_val="link"\
| join link_val [| inputlookup vj_cfg_instance\
| eval link_val="link"\
| table link_val, company]\
| eval company=if(isnull(company) OR company="","Missing - Need to Update",company),phone_mobile=if(isnull(phone_mobile) OR phone_mobile="","NA",phone_mobile),phone_work=if(isnull(phone_work) OR phone_work="","NA",phone_work),title=if(isnull(title) OR title="","NA",title)\
| eval Description="Request for Assistance:| * Contact: ".name."|   - - Company: ".company."|   - - User Account: ".user."|   - - Title: ".title."|   - - Email: ".email."|   - - Work Phone: ".phone_work."|   - - Mobile Phone: ".phone_mobile\
| table Description,Details]\
| sort sort_flg\
| makemv delim="|" Description\
| makemv delim="|" Details\
| rename Description AS Summary\
| fields Summary,Details\
| sendemail to="$splunk_owner_email$" inline="true" sendresults="true" format="table" message="$company$ - Value Journey for Splunk - Usage Report" subject="Value Journey for Splunk - User $company$ Usage" pdfview="vjm_email_report" sendpdf="true"
iseval = 0
