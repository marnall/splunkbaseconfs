| eval access_times=if(isnull(f_u_lgn),""," - Total: (".t_u_lgn."), Last: (".l_u_lgn."), First: (".f_u_lgn.")")\
| eval Access_History=if(isnull(f_u_lgn),"","|  ".name." (".user.") ".access_times)\
| eval not_logged_in=if(isnull(f_u_lgn),user,"")\
