[vj_mgmt_send_email_new_user(6)]
args = tok_set_contact_filt,tok_send_flg_t_pre,tok_email_to,tok_email_cc,tok_email_from,tok_email_subject
definition = inputlookup vj_cfg_contact_user WHERE date_added>$tok_set_contact_filt$ \
| eval link_val="link" \
| join type=left link_val \
    [ | inputlookup vj_cfg_instance \
    | eval link_val="link" \
    | stats last(url) AS email_url, last(company) AS company by link_val \
    | table company, email_url,link_val,def_pwd]\
| eval email_company="Company - ".company\
| fillnull value="Warning - Unable to get URL for instance" email_url \
| eval email_contacts=" Contact: ".name."|   Access ID: ".user."|   Password: ".def_pwd\
| eval Splunk_Instance_Steps="Value Journey for Splunk - Getting Started Steps: | 1. Click on this Link ( ".email_url." )| 2. Use the Splunk Access Credentials values to Access to your Splunk Instance.| 3. On your first login you will be automatically directed to the Value Journey for Splunk Configuration Wizard. |     a. The information entered in this initial wizard will determine which Use Case Splunk Items will be available in your Value Journey for Splunk Application.|     b. At the end of the configuration you will be directed to walk through an Inital Over of Splunk.|     c. Once you are completed with the inital Splunk Overview you will see the Use Case Overview Walkthrough, Example Dashboards and Reports for the Use Cases you selected.|     NOTE: You can update the Use Case Configuration at any time during your use of this Splunk Instance." \
| stats values(email_contacts) AS email_contacts by email_company, Splunk_Instance_Steps, splunk_account_owner, splunk_account_owner_email,email_url \
| eval Splunk_Access_Information="Instance URL:| ".email_url."|Splunk Access Credentials: |".mvjoin(email_contacts,"|") \
| eval email_msg_h="true" \
| makemv delim="|" Splunk_Access_Information \
| makemv delim="|" Splunk_Instance_Steps \
| fields Splunk_Access_Information,Splunk_Instance_Steps,email_msg_h\
| rename Splunk_Access_Information AS "Splunk Access Information:" ,Splunk_Instance_Steps AS "Getting Started Steps:"\
| fields "Splunk Access Information:","Getting Started Steps:" \
| table "Splunk Access Information:", "Getting Started Steps:"\
| $tok_send_flg_t_pre$ to="$tok_email_to$" cc="$tok_email_cc$" inline="true" sendresults="true" format="table" message="Getting Started with Splunk" subject="$tok_email_subject$"
iseval = 0

[vj_mgmt_request_assist_email(3)]
args = company,splunk_owner_email,req_flg
definition = inputlookup vj_cfg_hist_feedback\
| eval time_filt=relative_time(now(), "-60m")\
| WHERE $req_flg$>0 AND _time>time_filt AND match(tags,"Requested Assistance Page")\
| sort -_time view\
| eval req_time=strftime(_time,"%m/%d/%y %I:%M %P")\
| eval rating=if(isnull(rating),"0",rating)\
| eval Request="|Request: |   * Request Time:  ".req_time."|   * Target Dashboard: ".item_name."|   * Dashboard filename: ".link."|   * Rating: ".rating." Stars|   * Question: |    ".feedback\
| sort _time\
| stats list(Request) AS Request by user\
| join user [|inputlookup vj_cfg_contact_user | table user,name,email,phone_work,phone_mobile,title]\
| eval link_val="link"\
| join link_val [| inputlookup vj_cfg_instance\
| eval link_val="link"\
| table link_val, company]\
| eval company=if(isnull(company) OR company="","Missing - Need to Update",company),phone_mobile=if(isnull(phone_mobile) OR phone_mobile="","NA",phone_mobile),phone_work=if(isnull(phone_work) OR phone_work="","NA",phone_work),title=if(isnull(title) OR title="","NA",title)\
| eval User="Contact: ".name."|   * Company: ".company."|   * User Account: ".user."|   * Title: ".title."|   * Email: ".email."|   * Work Phone: ".phone_work."|   * Mobile Phone: ".phone_mobile\
| eval User=if(isnull(User),"Warning - User (".user.") is not in the vj_cfg_contact_user lookup table",User)\
| makemv delim="|" User\
| makemv delim="|" Request\
| table User,Request\
| sendemail to="$splunk_owner_email$" inline="true" sendresults="true" format="table" message="$company$ - Value Journey for Splunk - Request for Assistance" subject="Value Journey for Splunk - Company $company$ - Assistant request"
