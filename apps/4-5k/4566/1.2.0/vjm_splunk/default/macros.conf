[vj_mgmt_request_assist_ignore(3)]
args = company,splunk_owner_email,req_flg
definition = | makeresults\
| eval a="$req_flg$",b="$splunk_owner_email$",c="$company$"\
| table a,b,c
iseval = 0

[vjm_cfg_data_chk_good_evt]
definition = | metadata type=sourcetypes index=[| rest servicesNS/-/vj_splunk/saved/eventtypes/vj_index\
| rex field=search max_match=0 "index(\s\=|\"\=|\=)(?<evt_type_index>\S+)(\s|\"|$)"\
| rename evt_type_index AS index\
| table index\
| mvexpand index]\
| stats dc(sourcetype) AS sourcetype_count,sum(totalCount) AS totalcount,min(firstTime) AS firsttime,max(lastTime) AS lasttime,max(recentTime) AS indextime\
| eval Sample_Data_Indexed_Summary="Total Sourcetypes: ".sourcetype_count."|Total Events: ".tostring(totalcount,"commas")."|First Timestamp: ".strftime(firsttime,"%m/%d/%y %I:%M %P")."|Latest Timestamp: ".strftime(lasttime,"%m/%d/%y %I:%M %P")."|Last Time Loaded: ".strftime(indextime,"%m/%d/%y %I:%M %P")\
| eval link_txt="link"\
| eval sample_data_evt_type_flg=if(sourcetype_count>0,"true","false")\
| table Sample_Data_Indexed_Summary,sample_data_evt_type_flg,link_txt
iseval = 0

[vjm_chk_sys_info]
definition = rest /services/server/info/\
| eval link_txt="link"\
| eval host_type=if(match(host,"^idm\-.*cloud"),"cloud_idm",if(match(host,"^sh\-.*cloud"),"cloud_sh","ent"))\
| eval instance_env=if(instance_type=="cloud","Cloud",product_type)\
| table instance_env,host_type,link_txt
iseval = 0

[vjm_chk_app_status]
definition = rest /services/apps/local \
| search disabled=0 label="Value Journey for Splunk" \
| stats count AS step_1_chk_app\
| eval step_1_flg_app=if(step_1_chk_app=0,"install_app","ok"),link_txt="link"\
| table step_1_flg_app,link_txt
iseval = 0

[vjm_chk_avail_indexes]
definition = rest /services/data/indexes \
| search title!="_*" title!="main" title!="history" title!="summary" title!="splunklogger"\
| fields title\
| eval link_txt="link"\
| rename title as created_index\
| stats values(created_index) AS created_index by link_txt\
| eval created_index="^".mvjoin(created_index,"$|^")."$"\
| table link_txt,created_index
iseval = 0


[vj_get_index_eventtype(1)]
args = splunk_server
definition = rest servicesNS/-/vj_splunk/saved/eventtypes/vj_index count=0 splunk_server="$splunk_server$"\
| fields + "eai:acl.app", title, search \
| rex field=search max_match=0 "index(\s\=|\"\=|\=)(?<evt_type_index>\S+)(\s|\"|$)"\
| eval evt_type_index_filt=if(mvcount(evt_type_index) > 1,"(".mvjoin(evt_type_index,"|").")",evt_type_index)\
| eval evt_type_index=mvjoin(evt_type_index,"|")\
| eval link_txt="link"\
| rename title AS evt_type_name,search AS evt_type_search\
| eval Sample_Data_Eventtype_Config="Eventtype: ".evt_type_name."|Search: ".evt_type_search\
| table link_txt,Sample_Data_Eventtype_Config, evt_type_index, evt_type_index_filt
iseval = 0

[vjm_chk_sample_data_cfg]
definition = `vj_get_index_eventtype(*)`\
| join link_txt type=left [|`vjm_chk_meta_w_evt`]\
| stats dc(sourcetype) AS sourcetype_count,sum(totalCount) AS totalcount,min(firstTime) AS firsttime,max(lastTime) AS lasttime,max(recentTime) AS indextime\
| eval vj_data_l_w_evt=if(sourcetype_count>0,"true","false")\
| eval Sample_Data_Indexed_Summary="Total Sourcetypes: ".sourcetype_count."|Total Events: ".tostring(totalcount,"commas")."|First Timestamp: ".strftime(firsttime,"%m/%d/%y %I:%M %P")."|Latest Timestamp: ".strftime(lasttime,"%m/%d/%y %I:%M %P")."|Last Time Loaded: ".strftime(indextime,"%m/%d/%y %I:%M %P")\
| eval link_txt="link"\
| table Sample_Data_Indexed_Summary,link_txt,vj_data_l_w_evt]\
| join link_txt type=left [|`vjm_chk_meta_wo_evt`]\
| join link_txt type=left [|`vjm_chk_avail_indexes`]\
| eval bad_evt_to_data=if(vj_data_l_w_evt=="true","false",if(vj_data_l_wo_evt=="true","true","false"))\
| eval idx_state_flg=if(vj_data_l_w_evt="true",0,if(bad_evt_to_data=="true",2,if(match(evt_type_index_filt,created_index),0,1)))\
| eval Sample_Data_Status_msg=if(vj_data_l_w_evt=="true","Sample Data Successfully Loaded",if(bad_evt_to_data=="true","Warking - Sample Data Loaded but if this is the Splunk Search Head, then the eventtype ( vj_index ) not configured correctly.| Resolution: Update the search for the eventtype ( vj_index ) So it matches the index defined for the loaded Sample Data.","Sample Data Not Loaded yet"))\
| eval Sample_Data_Indexed_Summary=if(vj_data_l_w_evt=="true",Sample_Data_Indexed_Summary,if(bad_evt_to_data=="true","Sample Data Loaded but eventtype ( vj_index ) not configured correctly.|".Sample_n_e_Data_Indexed_Summary,"Sample Data Not Loaded yet"))\
| table link_txt,idx_state_flg,vj_data_l_w_evt,vj_data_l_wo_evt,bad_evt_to_data,Sample_Data_Eventtype_Config,evt_type_index,evt_type_index_filt,Sample_Data_Status_msg,Sample_Data_Indexed_Summary
iseval = 0

[vjm_chk_sample_data_input]
definition = rest /servicesNS/-/vjm_splunk/configs/conf-inputs/input_vjm_sample_data\
| rename eai:acl.app as app, eai:acl.perms.read as read, eai:acl.sharing as sharing\
| fields - updated published id eai*\
| eval link_txt="link"\
| join link_txt type=left [| rest /services/data/inputs/input_vjm_sample_data\
| eval title="input_vjm_sample_data://".title,link_txt="link"\
| rename index AS input_index\
| table host,link_txt,last_load_status,last_load_date,next_load_time,target_date_type,title,input_index,disabled]\
| fields host input_index last_load_status,last_load_date,next_load_time,target_date_type,title author splunk_server app read sharing *\
| eval title="[".title."]"\
| foreach * [eval title=if("<<FIELD>>"="author" OR "<<FIELD>>"="splunk_server" OR "<<FIELD>>"="app" OR "<<FIELD>>"="read"  OR "<<FIELD>>"="sharing" OR "<<FIELD>>"="title" OR '<<FIELD>>'="",title,mvappend(title,"<<FIELD>>"."="."\"".'<<FIELD>>'."\""))]\
| fields title author splunk_server app read sharing host last_load_status last_load_date next_load_time target_date_type input_index disabled\
| rex field=title "(?msi)(?:sourcetype)(\=|\=\")(?<sourcetype_set>[^(\"|\r|\n)]+)"\
| rex field=title "(?msi)(?:source)(\=|\=\")(?<source_set>[^(\"|\r|\n)]+)"\
| eval source_set="source::".source_set\
| eval props_filter=if(isnull(source_set) AND isnull(sourcetype_set),"",if(isnull(source_set),sourcetype_set,if(isnull(sourcetype_set),source_set,sourcetype_set."|".source_set))) \
| rename title AS inputs_conf_settings\
| eval link_txt="link"\
| table inputs_conf_settings,link_txt,disabled,input_index,last_load_status,last_load_date,next_load_time
iseval = 0

[vjm_chk_sample_data_log]
definition = index=_internal sourcetype="vj:splunk:sampledata"\
| table _time,status,name,message,target_date,target_date_label,tgt_index,target_date_type,details,file,log_level,pid,duration,input_settings\
| eval messages=log_level." - ".strftime(_time,"%m/%d/%y %I:%M:%S %P")." - ".message\
| eval messages=if(log_level=="ERROR",messages."| - Details: ".details,messages)\
| eval mi_input_settings=if(isnull(input_settings),"","Modular Input Script File: ".file."| |Last Set Input Settings (".strftime(_time,"%m/%d/%y %I:%M %P")."): |".input_settings) \
| eval succ_flg=if(status=="success",1,0)\
| fillnull value="" status,name,message,target_date,target_date_label,tgt_index,target_date_type,details,file,log_level,pid\
| fillnull value=0 duration\
| stats max(succ_flg) AS succ_flg,min(_time) AS start_time,max(_time) AS end_time, max(duration) AS duration,latest(status) AS status,latest(name) AS input_name,values(messages) AS messages,latest(target_date) AS target_date,latest(target_date_label) AS target_date_label,values(tgt_index) AS tgt_index,max(target_date_type) AS target_date_type,values(details) AS details,latest(file) AS file,latest(log_level) AS log_level,values(mi_input_settings) AS mi_input_settings by pid\
| eval script_timing="From: ".strftime(start_time,"%m/%d/%y %I:%M:%S %P")."|To: ".strftime(end_time,"%m/%d/%y %I:%M:%S %P")."|Duration: ".round(duration,0)\
| eval script_target_date_info="Target Date Type Setting: |(".target_date_type.")| ".target_date_label." ( ".target_date." )"\
| table pid, start_time,end_time,duration,log_level,script_timing, script_target_date_info,status, target_date,target_date_label,tgt_index,target_date_type,file,mi_input_settings,succ_flg\
| stats last(status) AS last_status,dc(pid) AS Total_Executions,sum(succ_flg) AS succ_cnt,count(eval(succ_flg=0 AND status!="skipped")) AS unsucc_cnt,count(eval(status="skipped")) AS skip_cnt, avg(duration) AS avg_duration,max(duration) AS max_duration,max(start_time) AS last_time\
| eval duration_info="| - Average Duration: ".round(avg_duration,0)."| - Max Duration: ".round(max_duration,0)\
| eval Sample_Load_Summary="Sample Load Total Summary: | Total Executions: ".Total_Executions."| Total Successful: ".succ_cnt."| Total Skipped: ".skip_cnt."| Total Unsuccesful: ".unsucc_cnt."| Duration Details: ".duration_info."| Last Load Status ( ".strftime(last_time,"%m/%d/%y %I:%M %P")." ): ".last_status
iseval = 0

[vjm_chk_meta_wo_evt]
definition = metadata type=sourcetypes\
| search sourcetype="vj:*"\
| stats dc(sourcetype) AS sourcetype_count,sum(totalCount) AS totalcount,min(firstTime) AS firsttime,max(lastTime) AS lasttime,max(recentTime) AS indextime\
| eval vj_data_l_wo_evt=if(sourcetype_count>0,"true","false")\
| eval Sample_n_e_Data_Indexed_Summary=if(sourcetype_count>0,"Total Sourcetypes: ".sourcetype_count."|Total Events: ".tostring(totalcount,"commas")."|First Timestamp: ".strftime(firsttime,"%m/%d/%y %I:%M %P")."|Latest Timestamp: ".strftime(lasttime,"%m/%d/%y %I:%M %P")."|Last Time Loaded: ".strftime(indextime,"%m/%d/%y %I:%M %P"),"Sample Data Not Indexed")\
| eval link_txt="link"\
| table Sample_n_e_Data_Indexed_Summary,link_txt,vj_data_l_wo_evt
iseval = 0

[vjm_chk_meta_w_evt]
definition = metadata type=sourcetypes index=[| rest servicesNS/-/vj_splunk/saved/eventtypes/vj_index count=0 splunk_server=*\
 | fields search \
 | rex field=search max_match=0 "index(\s\=|\"\=|\=)(?<index>\S+)(\s|\"|$)" \
 | mvexpand index\
 | table index
iseval = 0

