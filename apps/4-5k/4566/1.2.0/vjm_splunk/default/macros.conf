| eval link_val="link"\
| append [| inputlookup vj_cfg_contact_mgmt WHERE weekly_report_enabled="true"\
| eval link_val="link"\
| join link_val [| inputlookup vj_cfg_instance\
| eval link_val="link"\
| table link_val, company, date_started]\
| rename email AS splunk_owner_email\
| stats values(splunk_owner_email) AS splunk_owner_email by company, date_started,link_val\
| eval splunk_owner_email="To: ".mvjoin(splunk_owner_email,"|To: ")\
| table splunk_owner_email,company,link_val,date_started]\
| eval email_subject="VJM Weekly Report - User (".company.")"\
| eval Company="Company: ".company." (Since: ".strftime(date_started,"%m/%d/%y %I:%M %P").")"\
| append\
    [| inputlookup vj_my_journey where enabled="1"\
    | eval uc_ov_avail=if(item_type=="Overview" AND item_id!="vj_overview_splk_core",1,0)  \
    | join type=left item_id \
      [| inputlookup vj_my_journey_activity where user="*" \
      | eval splk_core_ov_state=if((item_id == "vj_overview_splk_core"),1,0)\
      | eval ov_compl_state=if(item_type=="overview" AND item_id!="vj_overview_splk_core",1,0)\
      | eventstats max(splk_core_ov_state) AS splk_core_ov_state\
      | table item_id, item_completed, splk_core_ov_state, ov_compl_state]\
     | eventstats dc(item_id) AS item_total\
     | stats dc(item_id) AS item_total,sum(item_completed) AS comp_items,sum(ov_compl_state) AS uc_ov_cnt,sum(uc_ov_avail) AS uc_ov_avail, max(splk_core_ov_state) AS splk_core_ov_state\
     | eval rem_items=item_total-comp_items,compl_perc=if(comp_items>0,(comp_items/item_total)*100,0)\
     | eval compl_flag=if(compl_perc<1,"  - Warning:","  - ")\
     | eval a_msg=compl_flag."%".round(compl_perc,0)." Completed: Reports, Dashboards and Walkthroughs have been viewed. (".comp_items." items of ".item_total." available)"\
     | eval b_msg=if(splk_core_ov_state="1","  - Ok: Splunk Core Overview Completed","  - Warning: Splunk Core Overview walkthrough has not been completed and is required")\
     | eval c_msg=if(uc_ov_avail=uc_ov_cnt,"  - Ok: Use Case Overviews have all been completed","  - Warning: ".uc_ov_cnt." Use Case Overviews have yet to be viewed")\
     | eval Progress = "Progress:|".a_msg."|".b_msg."|".c_msg\
     | eval link_val="link"\
     | table Progress,link_val]\
| append\
    [| inputlookup vj_cfg_uc_main WHERE state="active" AND rank>0\
    | eval mn_det=if(level="main",root_name." (Main Rank: ".rank." Stars)","")\
    | eval sub_det=if(level="sub","  - ".uc_name." (Sub Rank: ".rank." Stars)","")\
    | sort -rank\
    | stats list(sub_det) AS sub_det,values(mn_det) AS main_det by root_id\
    | eval Use_Case_Priorities=replace(mvjoin(main_det,""),"^\s","")."|".replace(mvjoin(sub_det,"|"),"^\|","")\
    | stats values(Use_Case_Priorities) AS Use_Case_Priorities\
    | eval Use_Case_Priorities=mvjoin(Use_Case_Priorities,"|")\
    | eval link_val="link"\
    | table Use_Case_Priorities,link_val]\
| table splunk_owner_email,email_subject,Use_Case_Priorities,Access_History,Progress,Company\
| stats values(email_subject) AS email_subject, values(splunk_owner_email) AS splunk_owner_email, values(Company) AS Company,values(Use_Case_Priorities) AS Use_Case_Priorities, values(Access_History) AS Access_History,values(Progress) AS Progress\
| eval Details=Company."|------------------------------|".Progress."|------------------------------|Use Case Priorities: ".Use_Case_Priorities."|------------------------------|".Access_History\
| makemv delim="|" Details\
| makemv delim="|" splunk_owner_email\
| table splunk_owner_email,email_subject,Details
