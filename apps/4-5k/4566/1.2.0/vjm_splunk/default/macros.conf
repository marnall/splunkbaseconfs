| eval c_percent=round(((c_items_cnt/total_items)*100),0)\
| eval Description="Progress Metrics:## * Overall User progress for viewing and completing Available Items.|Required Items Check:## * ".nc_req_items_msg,sort_flg=1,Details="Completion Percent: ".c_percent."%|Total Items Available: ".total_items."|Total Items Viewed: ".c_items_cnt."|Total Items Not Viewed: ".nc_items_cnt."|Total Required Items Not Viewed: ".nc_req_items_cnt\
| makemv delim="|" Description\
