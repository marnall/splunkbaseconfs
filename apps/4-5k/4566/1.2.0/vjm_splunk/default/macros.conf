| eval Details="Logged In Users: ".mvjoin(Access_History,"")." ".nlu_details,sort_flg=4\
| fields Description,Details,sort_flg,log_u,not_logged_in,nlu_details,nlog_u,n_li\
| table Description,Details,sort_flg]\
| append [| inputlookup vj_cfg_hist_feedback\
| WHERE match(tags,"Requested Assistance Page")\
| stats count AS req_cnt,latest(_time) AS l_time by user\
| join user [|inputlookup vj_cfg_contact_user | table user, name]\
| eval Details="Contact: ".name."(".user.") - Total Requests: ".req_cnt." - Last Request: ".strftime(l_time,"%m/%d/%Y %I:%M:%P")." |"\
| eval Description="Requests for Assistance:",sort_flg="5"\
| table Description,Details,sort_flg]\
| sort sort_flg \
| makemv delim="|" Description \
| makemv delim="|" Details\
| rename Description AS Summary\
| table Summary,Details
