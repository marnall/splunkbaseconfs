| eval Description="Weekly - Value Journey for Splunk - Usage Report for Company (".company."):"\
| table Description,Details,sort_flg]\
| append [|inputlookup vj_cfg_contact_user\
| join type=left user [search index=_audit  "action=login attempt" info="succeeded"\
| fields _time, user\
| stats count AS t_u_lgn, min(_time) AS f_u_lgn,max(_time) AS l_u_lgn by user\
