search = | inputlookup vj_cfg_contact_user \
| eval Role="User"\
| eval link_val="link" \
| join link_val\
    [| inputlookup vj_cfg_instance \
    | eval link_val="link" \
    | table link_val, company, date_started] \
| append [|inputlookup vj_cfg_contact_mgmt | eval Role="Owner"]    \
| fields company, Role,user, name, email, date_added \
| eval date_added=strftime(date_added,"%m/%d/%y"),user_created="0" \
| join type=left user \
    [| rest /services/authentication/users splunk_server=* \
    | WHERE match(mvjoin(roles," "),"(vj_user|vj_admin)") \
    | join type=left title \
        [ search index=_audit "action=login attempt" info="succeeded" \
        | rex "user\=(?<title>[^\,]+)" \
        | stats count AS Total_u_lgns, min(_time) AS f_u_lgn,max(_time) AS l_u_lgn by title \
        | eval f_u_lgn=strftime(f_u_lgn,"%m/%d/%y %I:%M %P"),l_u_lgn=strftime(l_u_lgn,"%m/%d/%y %I:%M %P") \
        | table title, Total_u_lgns, f_u_lgn,l_u_lgn] \
    | rename title AS user \
    | eval name=if(isnull(realname),"empty",realname),user_created="1" \
    | eval First_u_lgn=if(isnull(f_u_lgn),"Never",f_u_lgn),Last_u_lgn=if(isnull(l_u_lgn),"Never",l_u_lgn),Total_u_lgns=if(isnull(Total_u_lgns),0,Total_u_lgns) \
    | table user, name, Total_u_lgns,First_u_lgn, Last_u_lgn,user_created] \
| fillnull value=0 Total_u_lgns \
| fillnull value="Never" First_u_lgn, Last_u_lgn \
| eval User_State=if(user_created="0","Missing Splunk User Account","OK") \
| sort -Total_u_lgns Role User_State  \
| table company, Role, user, name,email, date_added,User_State,Total_u_lgns,First_u_lgn, Last_u_lgn

