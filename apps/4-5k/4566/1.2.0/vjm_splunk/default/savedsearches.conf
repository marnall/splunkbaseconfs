## Scheduled Searches ##
[VJM-Alert - Weekly User Progress Report]
description = Value Journey for Splunk - Weekly Scheduled Usage - Report to VJM Owner
alert.track = 0
cron_schedule = 45 23 * * 5
dispatch.earliest_time = 0
display.events.fields = ["company","splunk_owner_email","email","referer_domain"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = vjm_splunk
request.ui_dispatch_view = search
search = | makeresults\
| eval company="",splunk_owner_email="",exec_flg=0\
| append [| inputlookup vj_cfg_contact_mgmt WHERE weekly_report_enabled="true"\
| eval link_val="link"\
| join link_val\
[| inputlookup vj_cfg_instance\
| eval link_val="link"\
| stats last(company) AS company by link_val\
| table company,link_val]\
| stats values(company) AS company,values(email) AS splunk_owner_email\
| eval exec_flg=1]\
| stats last(company) AS company, last(splunk_owner_email) AS splunk_owner_email, last(exec_flg) AS exec_flg\
| eval exec_flg=if(exec_flg="0" OR company="" OR splunk_owner_email="",0,1)\
| eval company=if(mvcount(company)>1,mvindex(company,0),if(isnull(company),"",company)),splunk_owner_email=if(mvcount(splunk_owner_email)>1,mvjoin(splunk_owner_email,","),splunk_owner_email)\
| table company,splunk_owner_email,exec_flg\
| fields company,splunk_owner_email,exec_flg\
| head 1\
| map search="|`vj_mgmt_weekly_usage_email(\"$company$\",\"$splunk_owner_email$\",$exec_flg$)`"

[VJM-Alert - Assistance Request]
alert.track = 0
cron_schedule = */55 * * * *
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.events.fields = ["company","splunk_owner_email","email","feedback"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = vjm_splunk
request.ui_dispatch_view = search
search = | makeresults\
| eval company="",splunk_owner_email="",req_flg=0\
| append [| inputlookup vj_cfg_contact_mgmt WHERE weekly_report_enabled="true"\
| eval link_val="link"\
| join link_val [| inputlookup vj_cfg_instance\
| eval link_val="link"\
| stats last(company) AS company by link_val\
| table company,link_val]\
| stats values(company) AS company,values(email) AS splunk_owner_email\
| eval company=if(mvcount(company)>1,mvindex(company,0),company),splunk_owner_email=if(mvcount(splunk_owner_email)>1,mvjoin(splunk_owner_email,","),splunk_owner_email)\
| appendcols [| inputlookup vj_cfg_hist_feedback\
| eval time_filt=relative_time(now(), "-60m")\
| WHERE match(tags,"Requested Assistance Page") AND _time>time_filt\
| eval req_flg=if(isnull(feedback),"0","1")\
| stats max(req_flg) AS req_flg\
| table req_flg]]\
| stats count,last(company) AS company, last(splunk_owner_email) AS splunk_owner_email, last(req_flg) AS req_flg\
| eval req_flg=if(isnull(req_flg) OR req_flg="0" OR company="" OR splunk_owner_email="",0,1)\
| eval var_macro=if(req_flg=0,"vj_mgmt_request_assist_ignore","vj_mgmt_request_assist_email")\
| table company,splunk_owner_email,req_flg,var_macro\
| fields company,splunk_owner_email,req_flg,var_macro\
| map search="|`$var_macro$(\"$company$\",\"$splunk_owner_email$\",$req_flg$)`"

