| stats last(User) AS Last_Execution_User, last(Execution_Time) AS Last_Execution_Time, list(Execution_History) AS Execution_History, count by view \
| eval Last_Execution="Execution Count: ".count."|Last Time: ".Last_Execution_Time."|Last User: ".Last_Execution_User \
| makemv delim="|" Last_Execution \
| eval Previous_5_Executions=mvindex(Execution_History,0,4) \
