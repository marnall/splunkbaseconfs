| sort session_id, time\
| streamstats min(time) AS start_time, max(time) AS end_time by session_id,item_id\
| eventstats max(part_num) AS last_part,max(total_parts) AS total_parts by session_id, item_id\
| eval Status=if(last_part=(total_parts),"Completed","Not Completed")\
| eval duration=(end_time-start_time)\
| stats max(time) AS l_time, sum(duration) AS t_duration, last(Status) AS l_status by session_id,user,object_label\
| stats dc(user) AS Total_Users, sum(t_duration) AS Total_Duration, max(l_time) AS Last_Time, dc(session_id) AS Total_Sessions, count(eval(l_status="Completed")) AS Completed_Count, count(eval(l_status="Not Completed")) AS Not_Completed_Count by object_label\
| eval Completion_Percent=((Completed_Count/Total_Sessions)*100)\
| rename object_label AS Walkthrough\
| eval Last_Time=strftime(Last_Time,"%m/%d/%y %I:%M %P")\
| sort -Total_Duration\
| eval Total_Duration(H:M:S)=tostring(Total_Duration,"duration")\
| table Walkthrough, Total_Users, Total_Duration(H:M:S), Last_Time, Total_Sessions, Completed_Count, Not_Completed_Count,Completion_Percent\
| sort Completion_Percent

