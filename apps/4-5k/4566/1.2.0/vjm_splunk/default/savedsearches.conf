| eval messages=log_level." - ".strftime(_time,"%m/%d/%y %I:%M:%S %P")." - ".message\
| eval messages=if(log_level=="ERROR",messages."| - Details: ".details,messages)\
| eval mi_input_settings=if(isnull(input_settings),"","Modular Input Script File: ".file."| |Last Set Input Settings (".strftime(_time,"%m/%d/%y %I:%M %P")."): |".input_settings) \
| eval succ_flg=if(status=="success",1,0)\
| eval target_date_type=round(target_date_type,0)\
| fillnull value="" status,name,message,target_date,target_date_label,tgt_index,target_date_type,details,file,log_level,pid,duration\
| stats max(succ_flg) AS succ_flg,min(_time) AS start_time,max(_time) AS end_time, max(duration) AS duration,latest(status) AS status,latest(name) AS input_name,values(messages) AS messages,latest(target_date) AS target_date,latest(target_date_label) AS target_date_label,values(tgt_index) AS tgt_index,max(target_date_type) AS target_date_type,values(details) AS details,latest(file) AS file,latest(log_level) AS log_level,values(mi_input_settings) AS mi_input_settings by pid\
| eval dur_mgs=if(duration="" OR duration=0,"Duration: Not Successfully Executed in Time Range","Duration: ".round(duration,0))\
| eval script_timing="From: ".strftime(start_time,"%m/%d/%y %I:%M:%S %P")."|To: ".strftime(end_time,"%m/%d/%y %I:%M:%S %P")."|".dur_mgs\
| eval script_target_date_info="Target Date Setting:| target_date_type: (".target_date_type.")| Label: ".target_date_label." ( ".target_date." )"\
| table pid, start_time,end_time,duration,log_level,script_timing, script_target_date_info,status, target_date,target_date_label,tgt_index,target_date_type,file,mi_input_settings,succ_flg,messages |  eval  script_file_info= "pid: ".pid."|File:".file\
| table script_file_info,script_timing,script_target_date_info,mi_input_settings,messages\
| makemv delim="|" mi_input_settings\
| eval mv_cnt=mvcount(mi_input_settings)\
| sort -mv_cnt -start_time\
| eval mi_input_settings=if(mv_cnt=1,"inputs.conf Not Updated",mi_input_settings)\
| makemv delim="|" script_timing\
| makemv delim="|" script_target_date_info\
| makemv delim="|" script_file_info

