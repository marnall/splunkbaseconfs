search = | rest /servicesNS/-/-/saved/searches/\
| search author!=nobody\
| rename title AS Search_Name\
| eval Search_Text=replace(qualifiedSearch,"\|","#-#|")\
| eval match_found=if(match(Search_Text,field_name),1,0)\
| makemv delim="#-#" Search_Text\
