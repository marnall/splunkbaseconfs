[VJM-Instance - Scheduled Searches RunTime]
alert.track = 0
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = vjm_splunk
request.ui_dispatch_view = search
search = (index=_internal sourcetype=scheduler savedsearch_name="VJ*" (status="completed" OR status="success" OR status="skipped" OR status="deferred")) \
| fields + _time, status, dispatch_time, run_time, scheduled_time, window_time, savedsearch_id, savedsearch_name, user, alert_actions, reason, cron_schedule, app, result_count \
| search (status="completed" OR status="success" OR status="skipped" OR status="deferred") \
| eval window_time=if(isnotnull(window_time),window_time,0) \
| eval execution_latency=max((dispatch_time - (scheduled_time + window_time)),0) \
| stats avg(run_time) as runtime, avg(execution_latency) AS avg_exec_latency, count(eval(status=="completed" OR status="success" OR status=="skipped")) AS total_exec, count(eval(status=="skipped")) AS skipped_exec count(eval(status=="deferred")) AS deferred_exec by app, savedsearch_name, user, savedsearch_id \
| join type=outer savedsearch_id \
    [| rest "/servicesNS/-/-/saved/searches/" earliest_time=1547590464.000000 latest_time=1547596800.000000 search="is_scheduled=1" search="disabled=0" \
    | search (NOT "dispatch.earliest_time"=rt* NOT "dispatch.latest_time"=rt* "eai:acl.app"="ms_windows_ad_objects") \
    | mvexpand scheduled_times \
    | stats count(title) as count max(scheduled_times) as max_t min(scheduled_times) as min_t by title, eai:acl.app, eai:acl.owner cron_schedule \
    | eval schedule_interval=round(((max_t - min_t) / (count - 1)),0) \
    | eval savedsearch_id=(((('eai:acl.owner' . ";") . 'eai:acl.app') . ";") . title) \
    | fields + savedsearch_id, cron_schedule, schedule_interval] \
| eval runtime=round(runtime,0) \
| eval avg_exec_latency=round(avg_exec_latency,0) \
| eval search_workload=(round(((runtime / schedule_interval) * 100),2) . " %") \
| eval skip_ratio=(round(((skipped_exec / total_exec) * 100),2) . " %") \
| fields + savedsearch_name, app, user, cron_schedule, schedule_interval, runtime, search_workload, total_exec, skipped_exec, skip_ratio, deferred_exec, avg_exec_latency \
| sort - search_workload \
| rename app as App, avg_exec_latency as "Average Execution Latency (sec)", cron_schedule as "Cron Schedule", deferred_exec as "Deferred Executions", runtime as "Average Runtime (sec)", savedsearch_name as "Report Name", schedule_interval as "Schedule Interval (sec)", search_workload as "Interval Load Factor", skip_ratio as "Skip Ratio", skipped_exec as "Skipped Executions", total_exec as "Total Executions", user as User

