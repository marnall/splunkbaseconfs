search = | inputlookup vj_my_journey\
| eval p_ov_btn = 0\
| join type=left item_src_id\
[| inputlookup vj_cfg_uc_main WHERE level="main" AND state="active"\
| table id, rank\
| eval item_state=1\
| rename id AS item_src_id, rank AS item_src_rank\
| table item_src_id, item_src_rank,item_state]\
| eval item_type_filt=item_src_id.":".item_type\
| WHERE item_state="1" AND enabled="1"\
| eval p_ov_btn=case(splk_core_ov_state="0" AND item_src_id="default","3",splk_core_ov_state="0" AND item_src_id!="default","2",splk_core_ov_state="1" AND uc_ov_state="0" AND item_src_id="default", "0",splk_core_ov_state="1" AND uc_ov_state="0" AND item_src_id!="default", "1", splk_core_ov_state="1" AND uc_ov_state="1","0")\
| eval completed=if(isnull(item_completed),0,item_completed)\
| eval item_src_rank_id=if(item_src_id="default",p_ov_btn."6".item_src_id,p_ov_btn."".item_src_rank."".item_src_id)\
| fillnull value=""\
| stats max(completed) AS completed by item_id,item_display_name,item_state,item_src_id,item_type,item_description,item_rank,item_src_rank,item_type_filt,order,item_src_rank_id,action_type,p_ov_btn\
| join type=left item_id\
[ search index=_internal sourcetype=splunkd_ui_access "GET /en-US/splunkd/__raw/servicesNS/*/saved/searches/*" NOT "_new" earliest=-30m latest=now\
| search (*) user="*"\
| eval Execution_Time=strftime(_time, "%m/%d %I:%M:%S %p")\
| rename file AS item_id, user AS Execution_User\
| rex mode=sed field=item_id "s/%3//g"\
| rex mode=sed field=item_id "s/%20/ /g"\
| stats count by item_id\
| eval completed="1"\
| table item_id, completed]\
| fields item_id,completed,item_display_name,item_state,item_src_id,item_type,item_description,item_rank,item_src_rank,item_type_filt,order,item_src_rank_id,action_type,p_ov_btn\
| table action_type,item_id,item_display_name,order,completed\
| eval Required_Initial=if(action_type="required" AND item_id="vj_overview_splk_core" AND completed="0",item_display_name,NULL)\
| eval Required=if(action_type="required" AND item_id!="vj_overview_splk_core" AND completed="0",item_display_name,NULL)\
| eval Recommended=if(action_type="recommended" AND completed="0",item_display_name,NULL)\
| eval Optional=if(action_type="optional" AND completed="0",item_display_name,NULL)\
| stats count(eval(completed="1")) AS Items_Completed, count(eval(completed="0")) AS Items_NOT_Completed,list(Required_Initial) AS Required_Initial_Not_Completed,list(Required) AS Required_Not_Completed,list(Recommended) AS Recommended_Not_Completed,list(Optional) AS Optional_Not_Completed\
| eval Total_Items = Items_Completed+Items_NOT_Completed\
| eval Required_Initial_Not_Completed=if(isnull(Required_Initial_Not_Completed),"All Required Items have been Completed",Required_Initial_Not_Completed)\
| eval Completion_Percent=round((Items_Completed/(Total_Items)*100),0)\
| fillnull value="," Required_Initial_Not_Completed Required_Not_Completed\
| eval Description="Progress Metrics:## * Overall User progress for viewing and completing Available Items.|Required Items Check:## * Items Required but Not Completed.{".mvjoin(Required_Initial_Not_Completed,",")."".mvjoin(Required_Not_Completed,",")."}",sort_flg=1,Details="Completion Percent: ".Completion_Percent."%|Total Items Available: ".Total_Items."|Total Items Viewed: ".Items_Completed."|Total Items Not Viewed: ".Items_NOT_Completed\
| makemv delim="|" Description\
| mvexpand Description\
| eval Description=replace(Description,"##","|")\
| rex field=Description "(?<Description>[^\{]+)\{(?<nc_details>[^\}]+)"\
| eval Details=if(isnull(nc_details),Details,replace(nc_details,",","|")),sort_flg=if(isnull(nc_details),1,2)\
| append\
[| inputlookup vj_cfg_contact_user\
| eval link_val="link"\
| join link_val [| inputlookup vj_cfg_instance\
| eval link_val="link"\
| table link_val, company, date_started]\
| stats values(company) AS company,min(date_started) AS start_time\
| eval company=if(mvcount(company)>1,mvindex(company,0),company), Details="Evaluation Start Time: ".strftime(start_time,"%m/%d/%y %I:%M %P"),sort_flg=0\
| eval Description="User (".company.") Weekly - Value Journey for Splunk - Usage Report:"\
| table Description,Details,sort_flg]\
| append\
[| rest /services/authentication/users splunk_server=*\
| WHERE match(mvjoin(roles," "),"vj_user")\
| join type=left title\
[ search index=_audit "action=login attempt" info="succeeded"\
| fields _time, title\
| rex "user\=(?<title>[^\,]+)"\
| stats count AS t_u_lgn, min(_time) AS f_u_lgn,max(_time) AS l_u_lgn by title\
| eval f_u_lgn=strftime(f_u_lgn,"%m/%d/%y"),l_u_lgn=strftime(l_u_lgn,"%m/%d/%y")]\
| eval access_times=if(isnull(f_u_lgn),"","| * Total Logins: (".t_u_lgn."), Last: (".l_u_lgn."), First: (".f_u_lgn.")")\
| eval Access_History=if(isnull(f_u_lgn),"","| ".realname." (".title.") ".access_times)\
| eval not_logged_in=if(isnull(f_u_lgn),realname,"")\
| stats values(Access_History) AS Access_History, values(not_logged_in) AS not_logged_in\
| eval Description=case(mvcount(not_logged_in)=0,"Access History:| * Status: All Users have logged into the instance.",mvcount(not_logged_in)>0 AND mvcount(Access_History)>0,"Access History:| * Status: Warning - Some Users have not logged into the instance yet.",mvcount(not_logged_in)>0 AND mvcount(Access_History)=0,"Access History:| * Status: Warning - No Users have not logged into the instance yet.")\
| eval log_u=mvcount(Access_History),nlog_u=mvcount(not_logged_in)\
| eval nlu_details=if(nlog_u=0," ",if(nlog_u>10,"|Total Users Not Logged In Yet: ".nlog_u,"|Users Not Logged In Yet: ".mvjoin(not_logged_in,"| * ")))\
| eval Details="Logged In Users: ".mvjoin(Access_History,"")." ".nlu_details,sort_flg=4\
| fields Description,Details,sort_flg\
| table Description,Details,sort_flg]\
| append\
[| inputlookup vj_cfg_uc_main\
| eval sort_order=if(level="main",1,0), filter=if(level="main",id,NULL)\
| eventstats values(filter) AS filter\
| eval filter=mvjoin(filter,"|")\
| WHERE match(root_id,filter) AND rank!="0"\
| eval rank_str=if(rank="0","Not Ranked",rank." Stars")\
| eval Use_Case=if(level="main",name." (".rank." Stars)| * ",NULL),Details=if(level="sub","| * (".rank_str.") ".name,"")\
| search NOT Use_Case=""\
| sort -rank\
| join type=left root_id [|inputlookup vj_cfg_uc_main WHERE level="main" | rename id AS root_id, name AS Name | table root_id,Name,rank]\
| stats list(Details) AS Details by Name,rank\
| sort -rank\
| eval comb="| ".Name." (".rank." Stars):".mvjoin(Details,"")\
| stats list(comb) AS comb\
| eval Details="|".mvjoin(comb," ")\
| eval Description="Use Case Selected Priorities:| * Use Case Priorites configured by the User during initial login or by updating during the tour."\
| table Description,Details]\
| append\
[| inputlookup vj_cfg_hist_feedback \
| WHERE match(tags,"Requested Assistance Page")\
| sort -_time view\
| eval req_time=strftime(_time,"%m/%d/%y %I:%M %P")\
| eval rating=if(isnull(rating),"0",rating)\
| eval Request="|Request (".user."): |   * Request Time:  ".req_time."|   * Target Dashboard: ".view."|   * Dashboard filename: ".link."|   * Rating: ".rating." Stars|   * Question: |    ".feedback\
| sort _time\
| stats list(Request) AS Details by user\
| join type=left user [|inputlookup vj_cfg_contact_user | table user, name, email,phone_work,phone_mobile]\
| join type=left user [|inputlookup vj_cfg_contact_mgmt | table user, name, email,phone_work,phone_mobile]\
| eval link_val="link"\
| join link_val [| inputlookup vj_cfg_instance\
| eval link_val="link"\
| table link_val, company]\
| fillnull value="NA" name,phone_mobile,phone_work,email, company\
| eval Description="Request for Assistance:| * Contact: ".name."|   - - Company: ".company."|   - - User Account: ".user."|   - - Email: ".email."|   - - Work Phone: ".phone_work."|   - - Mobile Phone: ".phone_mobile\
| table Description,Details]\
| sort sort_flg\
| makemv delim="|" Description\
| makemv delim="|" Details\
| rename Description AS Summary\
| fields Summary,Details\
| table Summary,Details

