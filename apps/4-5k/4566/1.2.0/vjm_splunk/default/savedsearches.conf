| eval Description=case(mvcount(not_logged_in)=0,"Access History:|   * Status: All Users have logged into the instance.",mvcount(not_logged_in)>0 AND mvcount(Access_History)>0,"Access History:|   * Status: Warning - Some Users have not logged into the instance yet.",mvcount(not_logged_in)>0 AND mvcount(Access_History)=0,"Access History:|   * Status: Warning - No Users have not logged into the instance yet.")\
| eval log_u=mvcount(Access_History),nlog_u=mvcount(not_logged_in)\
| eval nlu_details=if(nlog_u=0," ",if(nlog_u>10,"|Total Users Not Logged In Yet: ".nlog_u,"|Users Not Logged In Yet: ".mvjoin(not_logged_in,"|   * ")))\
| eval Details="Logged In Users: ".mvjoin(Access_History,"")." ".nlu_details,sort_flg=4\
| fields Description,Details,sort_flg\
| table Description,Details,sort_flg]\
| append\
[| inputlookup vj_cfg_uc_main WHERE state="active"\
| eval sort_order=if(level="main",1,0), filter=if(level="main",id,NULL)\
| eventstats values(filter) AS filter\
| eval filter=mvjoin(filter,"|")\
| WHERE match(root_id,filter) AND rank!="0"\
| eval rank_str=if(rank="0","Not Ranked",rank." Stars")\
| eval Use_Case=if(level="main",name." (".rank." Stars)|    * ",NULL),Details=if(level="sub","|    * (".rank_str.") ".name,"")\
| search NOT Use_Case=""\
| sort -rank\
| rename root_name AS Name\
| stats list(Details) AS Details by Name,rank\
| sort -rank\
| eval comb="|  ".Name." (".rank." Stars):".mvjoin(Details,"")\
| stats list(comb) AS comb\
| eval Details="|".mvjoin(comb," ")\
| eval Description="Use Case Selected Priorities:|    * Use Case Priorites configured by the user during initial login or by updating during the tour."\
| table Description,Details]\
| sort sort_flg\
| makemv delim="|" Description\
| makemv delim="|" Details\
| rename Description AS Summary\
| table Summary,Details\
| append\
[| makeresults\
| eval Summary="sendemail Command used for scheduled report distribution",Details="sendemail to=\"to email address\" from=\"from email address\" inline=\"true\" sendresults=\"true\" format=\"table\" message=\"Company (Name) - Weekly Value Journey for Splunk - Usage\" subject=\"Value Journey for Splunk - Company (Splunktel) - Weekly\""\
| table Summary,Details]

