# props.conf

[arista_switch_log]
  # configure your TIME_FORMAT based on your Arista Settings
  #TIME_FORMAT = %Y-%m-%d %H:%M:%S 
  TIME_PREFIX = ^ 
  MAX_TIMESTAMP_LOOKAHEAD = 16
  pulldown_type = true
  EXTRACT-fields = %(?<facility>\S+)-(?<severity>\d)-(?<msg>[A-Z0-9\_]+): (?<message>.*)
  LOOKUP-syslogseverity = syslogseverity severity OUTPUTNEW severity, severity_desc
  EXTRACT-cmd = cmd=(?<command>.*)\<cr\>
  EXTRACT-app = Aaa:.*(EXEC|CMD):\s.*asw[0-9-]+\.stubprod\.com\s(?<user>[a-zA-Z0-9\-_]*)\s(?<app>[a-zA-Z0-9]*)\s(?<src_dns>\w{4}\d{2}\w{3}\d{3}[\.\w]*)\s
  EXTRACT-if = \sInterface\s(?<src_interface>[\S]*)
  EXTRACT-if_action = INTERFACE_(?<interface_action>.*):
  EXTRACT-if_status = UPDOWN:.*\s\((?<src_host>.*)\),\schanged state to (?<action>[\w]*)
  FIELDALIAS-src_dns = src_host AS src_dns
  FIELDALIAS-if-status = interface_action AS action
  EVAL-dvc = host
  EVAL-dvc_dns = host
  EVAL-dest = host
  EVAL-dest_dns = host
  FIELDALIAS-dvc = host AS dvc
  EVAL-vendor = "Arista"
  EVAL-product = "Multi Layer Switch"
  EVAL-vendor_product = "Arista Multi Layer Switch"

# Field extraction we need to make common eventtypes work 
  EXTRACT-user_from_cmd = cmd=username (?<user>.+) privilege
  EXTRACT-ssh_disconnect = (?<action>disconnected) the (?<app>SSH) session from the switch to (?<user>.+)@
  EXTRACT_ssh_connect = is (?<action>connecting) a (?<app>SSH) session from the switch to (?<user>.+)@

[arista_switch_ifcounter]
  pulldown_type = true
  LOOKUP-speed = interfacespeed speed OUTPUTNEW speed, speed_desc

[arista_switch_sflow]
  REPORT-arista_switch_sflow = arista_switch_sflow