[searchresults]
# wegen Abfrage im Detail-Dashboard für Trendberechnungen hinter der EEE
maxresultrows = 608400
# enstpricht einer Woche plus einer Stunde in Sekunden

[stats]
# wegen Abfrage im Detail-Dashboard für Trendberechnungen hinter der EEE
maxresultrows = 608400

# for streamstats's maximum window size
# wegen Abfrage im Detail-Dashboard für Trendberechnungen hinter der EEE
max_stream_window = 608400

[search]
allow_batch_mode = 1
allow_inexact_metasearch = 0
default_allow_queue = 1
disabled = 0
enable_cumulative_quota = 0
enable_datamodel_meval = 1
enable_history = 1
enable_memory_tracker = 0
force_saved_search_dispatch_as_user = 0
load_remote_bundles = 0
remote_timeline = 1
timeline_events_preview = 0
track_indextime_range = 1
truncate_report = 0
unified_search = 0
use_bloomfilter = 1
write_multifile_results_out = 1
base_max_searches = 20
