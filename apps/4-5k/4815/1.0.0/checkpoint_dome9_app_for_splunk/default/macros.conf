[checkpoint_dome9_data]
definition = index=* sourcetype="checkpoint:dome9:alerts"
iseval = 0

[checkpoint_dome9_region_alias]
definition = lookup region_alias alias as region_original OUTPUT name as region \
| eval region=if(isnull(region) or region="",if(isnull(region_original) or region_original="","Barmuda Triangle",region_original), region)
iseval = 0

[checkpoint_dome9_rename_fields]
definition = rename rule.severity as severity , entity.type as entity_type , region as region_original ,bundle.name as ruleset_name ,account.id as account_id,account.vendor as cloud_vendor, rule.name as rule_name
iseval = 0
