[checkpoint:dome9:alerts]
EVAL-app = "Checkpoint Dome9"
FIELDALIAS-body = rule.description as body
FIELDALIAS-id = rule.ruleId as id
FIELDALIAS-src = account.dome9CloudAccountId as src
FIELDALIAS-subject = rule.name as subject
FIELDALIAS-severity = rule.severity as severity
EVAL-type = "alert"

TIME_PREFIX = reportTime\":\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TZ = UTC
TRUNCATE = 0
MAX_DIFF_SECS_AGO = 172817280
MAX_DIFF_SECS_HENCE = 172817280
