[host::*]
LOOKUP-CJIS_assets = CJIS_assets host AS host OUTPUTNEW is_CJIS AS is_CJIS
#LOOKUP-CJIS_assets1 = ipv4_special cidr_block AS src_ip OUTPUTNEW scope AS is_CJIS

[source::*:Security]
EXTRACT-window_change_type_CJIS = \=*(?P<change_type>audit)
EVAL-process = coalesce(New_Process_Name, ProcessName, Process_Name)

[linux_secure]
EXTRACT-linux_secure_user_1 = \ssession closed for user\s\K(?<user>[a-z^0-9]+)
EXTRACT-linux_secure_src_user_1 = \ssudo:\s\K(?<src_user>[a-z^0-9]+)
EXTRACT-linux_secure_affected_user_1 = \sCOMMAND=\/[a-z]+\/[a-z]+\/[a-z]+\s\K(?<affected_user>[a-z^0-9]+)
EXTRACT-linux_secure_affected_user_action_1 = \sCOMMAND=\/[a-z]+\/[a-z]+\/\K(?<affected_user_action>[a-z^0-9]+)
EXTRACT-pass_change_status = password\s(?P<pass_change_status>changed|service)
EVAL-action = case(user="ftp", "protocol", pass_change_status="changed", "success",UID="112", "failure",UID="513", "failure", UID!="513", "success", pass_change_status="service", "failure")
EVAL-object_category = case(user="ftp", "protocol", process="groupadd","group",process="useradd","user", process="groupadd","group"
EVAL-command = coalesce(command, COMMAND)
SHOULD_LINEMERGE = 0

[linux_audit]
EXTRACT-change_type = \=*(?P<change_type>audit)
EVAL-action = case(type="DAEMON_START", "success", type="DAEMON_END", "stopped")

[WinHostMon]
EVAL-action = coalesce(action, State)
