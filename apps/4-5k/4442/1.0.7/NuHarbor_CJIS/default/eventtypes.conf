[CJIS]
search = (index=* is_CJIS=TRUE)
# CJIS

[windows_filesystem_changes_CJIS]
search = (source=WinEventLog:Security) EventCode=4663
# endpoint change

[windows_process_new_CJIS]
search = (source=WinEventLog:Security)  (EventCode=4688 OR EventCode=592)
# execute, process, report, start

[windows_logon_explicit_CJIS]
search = (source=WinEventLog:Security) (EventCode=4648 OR EventCode=552)
# authentication, escalation, privileged

[windows_security_groups_user_added_CJIS]
search = (source=WinEventLog:Security)  (EventCode=4728 OR EventCode=4732 OR EventCode=4756)
# created, group

[windows_security_groups_user_removed_CJIS]
search = (source=WinEventLog:Security) (EventCode=4729 OR EventCode=4733 OR EventCode=4757)
# deleted, group

[windows_winhostmon_eventlog_started_CJIS]
search = (source=WinEventLog:* Description="This service manages events and event logs. *" AND State="Running"
# eventlog, started, change, audit

##Probably need to update this to find more sourcetypes
[linux_password_change_CJIS]
search = index=nix sourcetype=linux_secure passwd
# password, change, account, authentication, escalation, privileged

##Probably need to update this to find more sourcetypes
[linux_session_closed_CJIS]
search = (NOT sourcetype=stash) NOT sourcetype=ossec pam_unix (gdm OR sudo OR su) ("session closed")
# authentication, logoff

[NCIC_database_CJIS]
search = (index=* eventtype=user-commands)

[III_database_CJIS]
search = (index=* eventtype=user-commands)

[linux_audit_start_CJIS]
search = index=* sourcetype=linux_audit type=DAEMON_START

[linux_audit_stop_CJIS]
search = index=* sourcetype=linux_audit type=DAEMON_END