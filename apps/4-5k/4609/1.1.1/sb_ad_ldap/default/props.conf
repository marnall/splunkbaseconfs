
[StealthINTERCEPT]
EXTRACT-event_id = StealthINTERCEPT - (?P<event_id>[^\-]+)\s\-
DATETIME_CONFIG = 
NO_BINARY_CHECK = true
disabled = false
FIELDALIAS-CIM: Authentication = AttributeName AS object_attrs ClientAddress AS src DistinguishedName AS object Domain AS src_nt_domain ObjectClass AS object_category Perpetrator AS user TargetHostIP AS dest _time AS file_access_time sourcetype AS vendor_product
EVAL-action = case(like(event_id, "%Delete%"), "deleted", like(event_id, "%Create%"), "created", like(event_id, "%Modified"), "modified", like(event_id, "%disabled"), "modified", like(event_id, "%enabled"), "modified", like(event_id, "%Update%"), "modified", like(event_id, "%Read"), "read", event_id == "Windows File System Access Rights Change", "modified", event_id == "Windows File System Attribute Change", "modified", SuccessfulChange == "True", "success", SuccessfulChange == "False", "failure")
EVAL-change_type = case(like(event_id, "Active Directory%"), "AD", like(event_id, "%File%"), "filesystem")
EVAL-status = case(SuccessfulChange == "True", "success", SuccessfulChange == "False", "failure")
