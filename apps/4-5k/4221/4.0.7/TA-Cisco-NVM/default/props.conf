pulldown_type=true
category=Network & Security
description=Cisco Network Visibility Process Info Data

## Extract fields from the raw data
EXTRACT-parg-for-nvm=parg="(?<parg>(?:[^"\\]|\\.)*)"
EXTRACT-ppath-for-nvm=ppath="(?<ppath>(?:[^"\\]|\\.)*)"

## CIM-mapped field aliases for process information
FIELDALIAS-pn-for-nvm = pn AS process_name
FIELDALIAS-pid-for-nvm = pid AS process_id
FIELDALIAS-ph-for-nvm = ph AS process_hash
FIELDALIAS-ppath-for-nvm = ppath AS process_path
FIELDALIAS-puid-for-nvm = puid AS process_guid
FIELDALIAS-pil-for-nvm = pil AS process_integrity_level
FIELDALIAS-ppuid-for-nvm = ppuid AS parent_process_guid

## Non-CIM mapped field aliases for process information
FIELDALIAS-fv-for-nvm = fv AS flow_version
FIELDALIAS-puat-for-nvm = puat AS process_user_account_type
FIELDALIAS-parg-for-nvm = parg AS process_arguments
FIELDALIAS-mnl-for-nvm = mnl AS module_name_list
FIELDALIAS-mhl-for-nvm = mhl AS module_hash_list
FIELDALIAS-pct-for-nvm = pct AS process_creation_time
FIELDALIAS-cppuid-for-nvm = cppuid AS creation_parent_process_guid

EVAL-process = ppath + " " + if(parg != "Unknown",parg,"")
EVAL-process_integrity_level = case(pil==0,"untrusted",pil==4096,"low",pil==8192,"medium", pil==8448, "medium high", pil==12288,"high",pil==16384,"system",pil==20480,"protected process",true(),"Unknown")

[cisco:nvm:osquery]
pulldown_type=true
category=Network & Security
description=Cisco Network Visibility OSQuery Data
EXTRACT-osquery-for-nvm = fv="(?<fv>[^"]+)"\s+udid="(?<udid>[^"]+)"\s+qv="(?<qv>[^"]+)"\s+qid="(?<qid>[^"]+)"\s+qt="(?<qt>[^"]+)"\s+qpi="(?<qpi>[^"]+)"\s+qpn="(?<qpn>[^"]+)"\s+qjr="(?<qjr>\[.*?\])"
EVAL-query_json_response = replace(replace(qjr, "^\"|\"$", ""), "\\\\\"", "\"")

## Non-CIM field aliases for OSQuery data
FIELDALIAS-qid-for-nvm = qid AS query_id
# FIELDALIAS-qjr-for-nvm = qjr AS query_json_response
FIELDALIAS-qpi-for-nvm = qpi AS current_page
FIELDALIAS-qpn-for-nvm = qpn AS total_pages
FIELDALIAS-qt-for-nvm = qt AS query_timestamp
FIELDALIAS-qv-for-nvm = qv AS osquery_version

