# [searchbnf.conf](http://docs.splunk.com/Documentation/Splunk/latest/Admin/Searchbnfconf)

[fixchecksum-command]
syntax = fixchecksum output=<output_field> <fix_message_field>
shortdesc = Calculates the checksum of a raw `FIX message` for validation.
description = A command to calculate the FIX checksum for fields containing `FIX messages` to look for errors.  This can be used to compare the sent checksum in the `10`, or `CheckSum`, tag to the one calculated by the command.
comment1 = Calculate the FIX message checksum in the `FIX message` and store the result in the output field.
example1 = <search> | fixchecksum output=<output_field> <fix_message_field>
category = streaming
appears-in = 1.0
maintainer = jkuepker
usage = public
tags =  TA-FIX_Add-on_for_Splunk

[fixdecode-command]
syntax = fixdecode
shortdesc = Decode FIX messages by generating names from tags. (Example: tag 35 as MsgType)
description = Decode FIX messages by generating names from tags. (Example: tag 35 as MsgType)
comment1 = Decode FIX messages and add tag names.
example1 = <search> | fixdecode
category = streaming
appears-in = 1.0
maintainer = jkuepker
usage = public
tags =  TA-FIX_Add-on_for_Splunk
