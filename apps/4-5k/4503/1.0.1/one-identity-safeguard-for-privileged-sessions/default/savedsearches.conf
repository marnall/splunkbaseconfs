[One Identity - RDP Audit Gap Details]
alert.track = 0
request.ui_dispatch_view = search
request.ui_dispatch_app = one-identity-safeguard-for-privileged-sessions
display.general.type = statistics
dispatch.earliest_time = 0
display.statistics.format.0.scale.thresholds = [1,5]
display.page.search.mode = fast
display.statistics.format.0.colorPalette = list
action.email.useNSSubject = 1
display.page.search.tab = statistics
display.statistics.format.0 = color
display.visualizations.charting.chart = bar
search = `OI_SPS_events` event_name=ServerAuthenticationSuccess app=rdp\
| bucket span=1day _time\
| stats count by _time\
| rename count as sps_count\
| rename _time as "Time"\
| appendcols override=true [search `OI_WIN_interactive_logins` [search `OI_SPS_monitored_hosts` ] | bucket span=1day _time | stats count by _time | rename count as log_count | rename _time as "Time" ] \
| fillnull value=0 sps_count\
| eval gap=log_count - sps_count\
| convert timeformat="%Y-%m-%d" ctime(Time)\
| table Time sps_count log_count gap\
| rename sps_count as "Audited Events"\
| rename log_count as "Logged Events"\
| rename gap as "Audit Gap"
display.visualizations.type = singlevalue
display.visualizations.show = 0
display.statistics.format.0.scale = threshold
display.statistics.format.0.field = Audit Gap
display.statistics.format.0.colorPalette.colors = [#618F3E,#F0DF3F,#B42126]

