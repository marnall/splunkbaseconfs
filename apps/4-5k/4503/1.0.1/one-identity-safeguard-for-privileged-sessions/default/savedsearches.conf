[One Identity - SPS Session details]
alert.track = 0
search = `OI_SPS_events`\
| transaction session_id mvlist=true nullstr="-"\
| sort _time desc\
| eval "Time"=strftime(_time, "%Y-%m-%d %H:%M:%S"),\
       "User"=mvindex(user, 1),\
       "From"=mvindex(src, 0).":".mvindex(src_port, 0),\
       "To"=mvindex(dest, 0).":".mvindex(dest_port, 0),\
       "SPS Details"="https://".mvindex(host,0)."/portal/#/audit/sessions/".mvindex(session_id, 0),\
       "Details"=mvindex(session_id, 0)\
| table "Time", "User", "From", "To", "SPS Details", "Details"\
| appendcols\
    [search index=sps_events eventtype="oneidentity_sps_session_scored"\
    | transaction session_id mvlist=true\
    | stats last(aggregated_score) as "Score"]
action.email.useNSSubject = 1

