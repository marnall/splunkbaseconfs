[ReversingLabsHash]
fields = file_hash, process_hash, service_dll_hash, service_hash, md5, sha1, sha256, container_hash, sample_hash, Container_hash, Sample_hash, RL_md5, RL_sha1, RL_sha256
display_location = both
label = ReversingLabs file reputation for $@field_value$
link.method = get
link.target = blank
link.uri = https://a1000.reversinglabs.com/uploads/?q=$@field_value$
type = link

[ReversingLabsThreatName]
fields = signature, RL_threat_name
display_location = both
label = ReversingLabs analysis search for threat name $@field_value$
link.method = get
link.target = blank
link.uri = https://a1000.reversinglabs.com/search/?q=av-detection%3A$@field_value$%20OR%20threatname%3A$@field_value$
type = link

