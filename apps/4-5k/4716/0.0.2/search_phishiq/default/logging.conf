[loggers]
keys = root, PhishiqCommand, PhishiqStreamingCommand

[logger_root]
level = DEBUG     ; Default: WARNING
handlers = stderr ; Default: stderr

[logger_PhishiqCommand]
qualname = PhishiqCommand
level = NOTSET    ; Default: WARNING
handlers = stderr ; Default: stderr

[logger_PhishiqStreamingCommand]
qualname = PhishiqStreamingCommand
level = NOTSET    ; Default: WARNING
handlers = stderr ; Default: stderr

[handlers]
keys=stderr

[handler_stderr]
class = logging.StreamHandler
level = NOTSET
args = (sys.stderr,)
formatter = search_command

[formatters]
keys = search_command

[formatter_search_command]
format=%(levelname)s:%(module)s: %(message)s
