[Messages Log Report]
action.report = 1
action.report.param.categories = 14
action.report.param.comment = Splunk® : port scan detected
alert.digest_mode = 0
alert.severity = 2
alert.suppress = 0
alert.track = 1
cron_schedule = */30 * * * *
description = An alert that monitors the /var/log/messages log and report malicious activity to AbuseIPDB
dispatch.earliest_time = -90m
dispatch.latest_time = -30m
display.events.fields = ["host","sourcetype","addr","source"]
enableSched = 1
request.ui_dispatch_app = abuseipdb
request.ui_dispatch_view = search
search = host=YOUR_HOST_NAME "SRC=*" SRC!="YOUR_IP_HERE"  source="/var/log/messages"

[Secure Log Report]
action.report = 1
action.report.param.categories = 22
action.report.param.comment = Splunk® : Brute-Force login attempt on SSH
alert.digest_mode = 0
alert.expires = 24d
alert.suppress = 0
alert.track = 1
cron_schedule = */28 * * * *
description = Reports invalid login attempts form /var/log/secure to abuseipdb
dispatch.earliest_time = -90m
dispatch.latest_time = -30m
display.events.fields = ["host","sourcetype","addr","source","COMMAND","date_hour","date_mday","date_minute","date_month","date_second","date_wday","date_year","date_zone","euid","index","linecount","pid","process","punct","PWD","rhost","splunk_server","timeendpos","timestartpos","TTY","tty","uid","USER","user","ip"]
enableSched = 1
request.ui_dispatch_app = abuseipdb
request.ui_dispatch_view = search
search = host=YOUR_HOST_NAME  source="/var/log/secure" ip="*"  NOT "YOUR_IP_HERE" ip!="0.0.0.0"
