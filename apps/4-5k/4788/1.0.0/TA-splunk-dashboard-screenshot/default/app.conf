# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 1

[launcher]
author = codebee
version = 1.0.0
description = This add-on is used to take screenshot of dashboard in splunk and email it over using SMTP.

[ui]
is_visible = 1
label = Splunk Dashboard Screenshot
docs_section_override = AddOns:released

[package]
id = TA-splunk-dashboard-screenshot

[triggers]
reload.addon_builder = simple
reload.ta_splunk_dashboard_screenshot_account = simple
reload.ta_splunk_dashboard_screenshot_settings = simple
reload.passwords = simple

