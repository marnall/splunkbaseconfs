[pdns_ip_dest]
display_location = both
fields = dest_ip
label = Query OSC for $@field_value$
search.app = sa-oscontext
search.preserve_timerange = 1
search.search_string = | oscsplq -i $dest_ip$
search.target = blank
type = search

