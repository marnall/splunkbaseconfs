[Risk Factors - Lookup Gen]
action.email.show_password = 1
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
cron_schedule = 0 3 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = es_configuration_explorer
request.ui_dispatch_view = search
schedule_window = auto
search = | rest splunk_server=local /servicesNS/nobody/SA-ThreatIntelligence/alerts/risk_factors \
| rename value as mod_value \
| spath input=conditions \
| fields - conditions \
| rename {}.* as * \
| eval disabled=if(disabled=0, "false", "true") \
| table disabled, author, title, operation_group, condition_type, field, comparator, value, value_type, mod_value, description \
| outputlookup es_configuration_explorer_risk_factor_lookup.csv
