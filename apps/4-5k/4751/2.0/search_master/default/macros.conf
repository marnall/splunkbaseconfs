[c(1)]
args = comment
definition = ""
iseval = 0

[term(2)]
definition = stats count by $f$ | fields - count\
| eval search = "TERM($pre$".$f$.")" | `null_term(search)` | return 999999 $search

[null_term(1)]
args = f
definition = | appendpipe [|stats count | search count=0 \
| eval earliest=now()-1,latest=now(),$f$="TERM(!@#$) earliest=".earliest." latest=".latest `c("This will never match")` | fields - count ]
iseval = 0

[values(1)]
definition = stats count by $f$ | rename $f$ AS search | fields - count  | `null_term(search)` | return 999999 $search

[term_time(3)]
definition = stats min(_time) AS earliest max(_time) AS latest by $f$ | fields - count\
| eval earliest=earliest-$time$,latest=latest+$time$,\
search = "TERM($pre$".$f$.") earliest=".earliest." latest=".latest | `null_term(search)` | return 999999 $search

[values_time(2)]
definition = stats min(_time) AS earliest max(_time) AS latest by $f$ | eval earliest=earliest-$time$,latest=latest+$time$,\
search=$f$." earliest=".earliest." latest=".latest \
| `null_term(search)` | return 999999 $search

[cross_join(4)]
args = A,a,B,b
definition = inputlookup $A$ | inputlookup append=t $B$ | stats values($a$) values($b$)\
| rename values(*) AS * | stats count by $a$ $b$\
| table $a$ $b$
iseval = 0