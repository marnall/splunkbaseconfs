[incapsula_index]
search = index=* (sourcetype=incapsula* OR sourcetype=imperva*)

[incapsula_waf]
search = eventtype=incapsula_index sourcetype=incapsula:cef
#tags network traffic web proxy

[incapsula_waf_ids]
search = eventtype=incapsula_waf ("cs9Label=Rule name")
#tags ids attack

[imperva_attack_analytics]
search = eventtype=incapsula_index sourcetype=imperva:aa:cef
#tags alert
