[flashpoint_index]
definition = (index=*)
iseval = 0

[flashpoint_indicators]
definition = `flashpoint_index` sourcetype="flashpoint_intelligence"
iseval = 0

[flashpoint_reports]
definition = `flashpoint_index` sourcetype="flashpoint_intelligence:reports"
iseval = 0

[flashpoint_cves]
definition = `flashpoint_index` sourcetype="flashpoint_intelligence:cve"
iseval = 0

[flashpoint_cve_exploits]
definition = `flashpoint_index` sourcetype="flashpoint_intelligence:exploits"
iseval = 0

[flashpoint_cve_mentions]
definition = `flashpoint_index` sourcetype="flashpoint_intelligence:mentions"
iseval = 0

[flashpoint_compromised_credentials]
definition = `flashpoint_index` sourcetype="flashpoint_intelligence:compromised_credentials"
iseval = 0

[flashpoint_alerts]
definition = `flashpoint_index` sourcetype="flashpoint_intelligence:alerts"
iseval = 0

[flashpoint_ransomware]
definition = `flashpoint_index` sourcetype="flashpoint_intelligence:ransomware"
iseval = 0

[match_config]
definition = (index=*) earliest=-7d@h latest=now sourcetype!="flashpoint_intelligence*"
iseval = 0

[date_format]
iseval = 0
definition = "%Y-%m-%d %H:%M:%S"

[flashpoint_info_min_time]
description  = Add earliest info to the query from specified timerange
definition = [| makeresults | addinfo | return $info_min_time]
iseval = 0
