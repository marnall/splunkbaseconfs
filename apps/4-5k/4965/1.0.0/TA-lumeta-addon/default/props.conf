[lumetaapiparser]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[source::...ta-lumeta-addon*.log*]
SHOULD_LINEMERGE = true
sourcetype = talumeta:log

[source::...ta_lumeta_addon*.log*]
SHOULD_LINEMERGE = true
sourcetype = talumeta:log

[lumeta_log_parser]

TRANSFORMS-set=setnull,setparsing

EXTRACT-eventinfo=\.\d+\|(?P<Event_Type>([A-Za-z]+(\_[A-Za-z]+)?))\|(?P<Event_Name>[A-Za-z\s\-]+)\|\w+\|Message=(?P<Message>(\w.+))Event_Category

SEDCMD-event_category = s/cat/Event_Category/g
SEDCMD-zone_id = s/cn1/Zone_Id/1
SEDCMD-zone_name = s/cn1Label/Zone_Name/g
SEDCMD-device_id = s/cn2/Device_Id/g
SEDCMD-time_zone = s/date_zone/Timezone/g
SEDCMD-device_address = s/dhost/Device_Address/g
SEDCMD-source = s/dvchost/Source/g
SEDCMD-source_address = s/host/Source_Address/g
SEDCMD-MAC_address = s/mac/MAC_address/g
SEDCMD-msg = s/msg/Message/g
SEDCMD-port_protocol = s/source/Port:Protocol/g
SEDCMD-source_type = s/sourcetype/Source_Type/g
SEDCMD-user = s/suser/User/g

FIELDALIAS-Zone_Id = Zone_Id as dest
FIELDALIAS-Zone_Name = Zone_Name as description
FIELDALIAS-Device_Id = Device_Id as object_id
FIELDALIAS-Event_Type = Event_Type as type
FIELDALIAS-User = User as user
FIELDALIAS-Device_Address = Device_Address as ip
FIELDALIAS-Source = Source as name
FIELDALIAS-host = host as src_ip
FIELDALIAS-MAC_Address = MAC_address as mac
