description = Daily diff for added and disappeared hosts. Populates summary index.
dispatch.earliest_time = -30d@d
dispatch.latest_time = -1d@d
display.general.timeRangePicker.show = 0
enableSched = 1
schedule_window = 15
search = sourcetype=riskiq assetType=HOST earliest=-30d@d latest=-1d@d \
| eval MARKER = if (_time < relative_time(now(), "-2d@d"), "DISAPPEARED","NEW") \
| stats count by host_host, MARKER \
| dedup host_host, MARKER \
| eventstats count by host_host \
| search count = 1 | eval _time=relative_time(now(), "-1d@d")

