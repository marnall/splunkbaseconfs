| fields + assetID, host_host, host_ipAddress, src, webSite_finalUrl,webSite_webSiteAssetCVEs_cveSummary_name, webSite_webSiteAssetCVEs_firstSeen, assetType,ZIP \
| mvexpand ZIP \
| rex field=ZIP "(?<CVENAME>\S+),(?<START>\S+)" \
| table assetID, host_host, host_ipAddress, src, webSite_finalUrl, CVENAME, START \
| eval _time=strptime(START, "%Y-%m-%dT%H:%M:%S.%3N-%z") \
| dedup assetID, CVENAME \
| where _time >= relative_time(now(),"-10d@d") \
| stats values(CVENAME) AS cve by  host_host, host_ipAddress, src, webSite_finalUrl, assetID \
| rename host_host AS dvc_nt_host, host_ipAddress AS dvc_ip, webSite_finalUrl AS url, assetID AS dvc_mac



