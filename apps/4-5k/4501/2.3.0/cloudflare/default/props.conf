KV_MODE=json

FIELDALIAS - AssetDisplayName_to_dest_name = AssetDisplayName AS dest
FIELDALIAS - AssetLink_to_url = AssetLink AS url
FIELDALIAS - FindingTypeDisplayName_to_category = FindingTypeDisplayName AS category
FIELDALIAS - FindingTypeID_to_category_id = FindingTypeID AS category_id
FIELDALIAS - FindingTypeSeverity_to_severity = FindingTypeSeverity AS severity
FIELDALIAS - InstanceID_to_signature_id = InstanceID AS signature_id


