[admin:twoSteps]
match=/twoSteps
members=twoSteps_endpoint

[admin_external:twoSteps_endpoint]
handlertype = python
handlerfile = TwoSteps_setup.py
handleractions = list, edit
python.version = python3
python.required = 3.13

[script:twoSteps_session]
match=/TwoSteps/session
passSession=true
handler=session.Send
python.version = python3
python.required = 3.13
