[script:apikey_validate]
python.version = python3
match=ta_idefense/apikey_validate
script = idefense-validate.py
scripttype = persist
handler = idefense-validate.checkapikey
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth	      = true

[script:acti_retention]
python.version = python3
match=ta_idefense/delete_old_ti
script = acti_retention.py
scripttype = persist
handler = acti_retention.acti_retention
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth	      = true