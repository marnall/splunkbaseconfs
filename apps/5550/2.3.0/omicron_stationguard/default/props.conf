[omicron_stationguard]
KV_MODE = none
EXTRACT-cef-message = \sCEF:\d\|(?<vendor>[^\|]+)\|(?<product>[^\|]+)\|(?<version>[^\|]+)\|(?<signature_id>[^\|]+)\|(?<signature>[^\|]+)\|(?<severity_id>[^\|]+)\|(?<cef_message>.*)
REPORT-parse_cef = cef_auto_kv,cef_first,cef_custom_fields,cef_last
EVAL-event_time = strftime(start/1000,"%d.%m.%Y %H:%M:%S:%3N")
EVAL-vendor_product = "OMICRONStationGuard"
EVAL-ids_type = "network"
FIELDALIAS-omicron_stationguard = dmac ASNEW dest_mac dpt ASNEW dest_port dst ASNEW dest dvchost ASNEW dvc eventtype ASNEW category smac ASNEW src_mac spt ASNEW src_port src ASNEW src
EVAL-customDeviceName = if(isnull(customDeviceName), dvchost, customDeviceName)
category = Network & Security
pulldown_type = 1
description = syslog of StationGuard
disabled = false

[omicron_stationguard_alert]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Network & Security
description = OMICRON StationGuard alerts aggregated and filtered for attacks
pulldown_type = 1
EVAL-app = "OMICRON StationGuard for Splunk"
EXTRACT-stationguard_alert_extractor = (?<type>[^\|]+)\|(?<signature_id>[^\|]+)\|(?<severity_id>[^\|]+)\|(?<dvc>[^\|]+)
FIELDALIAS-omicron_stationguard_alert = signature_id ASNEW eventtype
REPORT-parse_cef = cef_auto_kv,cef_first,cef_custom_fields,cef_last
disabled = false
