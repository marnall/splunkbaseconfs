
[admin:DataBeeAppForSplunk]
match = /
members = DataBeeAppForSplunk_account, DataBeeAppForSplunk_settings

[admin_external:DataBeeAppForSplunk_account]
handlertype = python
python.version = python3
handlerfile = DataBeeAppForSplunk_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:DataBeeAppForSplunk_settings]
handlertype = python
python.version = python3
handlerfile = DataBeeAppForSplunk_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[script:databee_post_historical_alerts_http_connector]
match = /databee_post_historical_alerts_http_connector
script = databee_post_historical_alerts_http_connector.py
scripttype = persist
output_modes  = json
python.version = python3
handler = databee_post_historical_alerts_http_connector.DatabeePostHistoricalAlertsHttpConnector
passSession    = true
passSystemAuth = true
