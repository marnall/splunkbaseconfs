[ccx:eset:endpointsecurity]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true
description = CCX ESET Endpoint Security (syslog)

REPORT-ccx_eset_endpointsecurity_log_parsing = ccx_eset_endpointsecurity_log_parsing
REPORT-ccx_eset_extracted_unquoted_string = ccx_eset_extract_unquoted_string
REPORT-ccx_eset_extract_vendor_action = ccx_eset_extract_vendor_action

##Support Documentation
##https://help.eset.com/protect_admin/90/en-US/events-exported-to-json-format.html

EVAL-action = case(match(action, ".*login.*|.*Login.*") AND result="Success","success",match(action, ".*login.*|.*Login.*") AND result!="Success","failure", match(action, "^Single sign on token issue"),"created", action=="Modify","modified",action=="Start","started", match(action,"^Update|Marked as Resolved"),"updated",match('vendor_action',".*terminated.*|.*Terminated.*|.* block.*|.*Block.*|Deleted|.*deleting.*|.*Deleting.*|.*Contained.*|.*contained.*|.*retained.*|.*Retained.*"),"blocked", match('vendor_action',"Unable to clean"),"deferred", match('vendor_action',".*allow.*|.*Allow.*|.* permit.*|.*Permit.*|.*clean .*|.*Clean .*"),"allowed",1=1,lower(action))
EVAL-product = "Endpoint Security"
EVAL-vendor = "ESET"
EVAL-vendor_product = "ESET:Endpoint Security"
EVAL-category = if(isnotnull('threat_type'),'threat_type',if(isnotnull(Category),lower(Category),if(event_type="FirewallAggregated_Event" OR event_type="HipsAggregated_Event",coalesce('event','rule_id'),null())))
EVAL-scanned = split(Scanned, ";")
EVAL-dest = if(isnotnull('ipv4') OR isnotnull('ipv6'),coalesce('ipv4','ipv6'),replace(Computer, "\s.*",""))
EVAL-file_hash = 'hash'
EVAL-product_version = 'engine_version'
EVAL-status = lower(Status)
EVAL-user = if(isnotnull(user),'user','username')
EVAL-signature = if((event_type="FirewallAggregated_Event" OR event_type="Threat_Event") AND isnotnull(threat_name),'threat_name',if(event_type="HipsAggregated_Event",'operation',null()))
EVAL-rule = 'rule_name'
EVAL-date = replace(occured, "\s.*","")
EVAL-file_path = if((event_type="Threat_Event" AND object_type="File") OR (event_type="FilteredWebsites_Event" AND isnotnull(object_uri)),'object_uri',if(event_type="HipsAggregated_Event" AND (isnotnull(target) OR isnotnull(Target)),coalesce('target','Target'),null()))
EVAL-file_name = if((event_type="Threat_Event" AND object_type="File") OR (event_type="FilteredWebsites_Event" AND isnotnull(object_uri)),replace(object_uri, "^.*\/|\/(.*)$", ""),if(event_type="HipsAggregated_Event" AND (isnotnull(target) OR isnotnull(Target)),coalesce(replace(target, "^.*\\|\/(.*)$", ""),replace(Target, "^.*\\|\/(.*)$", "")),null()))
EVAL-dest_ip = coalesce('ipv4','ipv6','target_address')
EVAL-severity = case(severity=="Information","informational", severity=="Notice","low", severity=="Warning","medium", severity=="Error","high", severity=="Critical" OR severity=="Fatal","critical")
EVAL-src = 'source_address'
EVAL-src_ip = 'source_address'
EVAL-src_port = 'source_port'
EVAL-dvc = 'hostname'
EVAL-direction = if(event_type="FirewallAggregated_Event" AND inbound="true","inbound","outbound")
EVAL-transport = lower(protocol)
EVAL-dest_port = 'target_port'
EVAL-ids_type = if((event_type="FirewallAggregated_Event" AND isnotnull(threat_name)) OR (event_type="HipsAggregated_Event"),"application",null())