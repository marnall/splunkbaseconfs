# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 1

[launcher]
author = Prewin Thomas
version = 1.1.1
description = This App for Splunk includes dashboards for most of the Cisco products.

[ui]
is_visible = 1
label = Cisco Suite for Splunk
docs_section_override = AddOns:released

[package]
id = Cisco-suite-for-splunk

[triggers]
reload.addon_builder = simple
reload.cisco_suite_for_splunk_account = simple
reload.cisco_suite_for_splunk_settings = simple
reload.passwords = simple

