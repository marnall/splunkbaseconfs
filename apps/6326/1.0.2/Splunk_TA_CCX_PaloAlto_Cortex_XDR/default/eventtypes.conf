[ccx_palo_cortex_ids]
search = (sourcetype=pan:cortexxdr:cef) (cat IN("Lateral Movement","Initial Access","Credential Access","Impact","Defense Evasion") log_subtype!="*login*") OR (cat="Discovery" AND log_subtype="Port Scan")

[ccx_palo_cortex_malware]
search = (sourcetype=pan:cortexxdr:cef) cat IN("Malware")

[ccx_palo_cortex_malware_operations]
search = (sourcetype=pan:cortexxdr:cef) file_hash=* NOT (eventtype="ccx_palo_cortex_malware" OR cat IN("Lateral Movement","Initial Access","Credential Access","Impact","Defense Evasion","Audit","Monitoring","Status") OR log_subtype="Port Scan")

[ccx_palo_cortex_change_audit]
search = (sourcetype=pan:cortexxdr:cef) (cat="Audit" AND NOT subtype IN("Scan","Payload Execution"))

[ccx_palo_cortex_alerts]
search = (sourcetype=pan:cortexxdr:cef) (cat IN("Defense Evasion")) OR (cat IN("Audit","Monitoring") AND subtype IN("Scan","Payload Execution","Quota Exceeded","Script Execution"))

[ccx_palo_cortex_change]
search = (sourcetype=pan:cortexxdr:cef) (cat="Monitoring" AND NOT subtype IN("Scan","Quota Exceeded","Script Execution"))

[ccx_palo_cortex_agent_status]
search = (sourcetype=pan:cortexxdr:cef) cat=Status

[ccx_palo_cortex_network_traffic]
search = (sourcetype=pan:cortexxdr:cef) dest_ip="*"