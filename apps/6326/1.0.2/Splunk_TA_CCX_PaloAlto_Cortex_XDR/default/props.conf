#https://docs.paloaltonetworks.com/cortex/cortex-xdr/cortex-xdr-pro-admin/logs/cortex-xdr-log-notification-formats/agent-audit-log-notification-format.html						  #
#https://docs.paloaltonetworks.com/cortex/cortex-xdr/cortex-xdr-pro-admin/logs/cortex-xdr-log-notification-formats/cortex-xdr-ioc-bioc-log-format.html							  #
#https://docs.paloaltonetworks.com/cortex/cortex-xdr/cortex-xdr-pro-admin/investigation-and-response/cortex-xdr-indicators/working-with-biocs/bioc-rules-details.html			  #
#https://docs.paloaltonetworks.com/cortex/cortex-xdr/cortex-xdr-pro-admin/analytics/analytics-concepts.html#id749fbec4-6e93-4611-8578-6af9bd87e0db								  #
#https://docs.paloaltonetworks.com/cortex/cortex-data-lake/cortex-data-lake-getting-started/get-started-with-log-forwarding-app/forward-logs-from-logging-service-to-syslog-server#
###################################################################################################################################################################################

[pan:cortexxdr:cef]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
MAX_TIMESTAMP_LOOKAHEAD = 256
TIME_PREFIX = end=
category = Custom
disabled = false
pulldown_type = true

REPORT-ccx_palo_cef_header = ccx_palo_cef_header
REPORT-ccx_palo_cortex_file_hash = ccx_palo_cortex_file_hash
REPORT-ccx_palo_cortex_file = ccx_palo_cortex_file
REPORT-ccx_palo_cef_keys = ccx_palo_cef_keys
REPORT-ccx_palo_cortex_cefExtraction = ccx_palo_cortex_cefExtraction
REPORT-ccx_palo_cortex_fName = ccx_palo_cortex_fName
REPORT-ccx_palo_cortex_fname = ccx_palo_cortex_fname

FIELDALIAS-ccx_palo_cortex_parent_process_exec = osParentCmd ASNEW parent_process
FIELDALIAS-ccx_palo_cortex_parent_process_name = osParentName ASNEW parent_process_name

EVAL-file_hash = mvdedup(mvappend('cgoSha256',coalesce(targetprocesssha256,fileHash,SHA256)))
EVAL-process_hash = 'osParentSha256'
EVAL-parent_process_exec = if(isnotnull('osParentCmd'),replace(osParentCmd, "^.*\\\\",""),null())
EVAL-user = if(isnotnull('suser'),replace(replace(suser, "^.*\\\\\\.*|['\]]*$",""),"^\['",""),null())
EVAL-file_path = coalesce('filePath','file')
EVAL-dest = 'dst'
EVAL-dest_ip = 'dst'
EVAL-dest_port = 'dpt'
EVAL-src_ip = 'src'
EVAL-vendor_product = 'vendor'+":".'product'
EVAL-src_port = 'spt'
EVAL-app = if(cat="Defense Evasion" OR (cat IN("Audit","Monitoring") AND (subtype IN("Scan","Payload Execution","Quota Exceeded","Script Execution"))),"CortexXDR",split('app',","))
EVAL-dest_zone = 'dstZoneName'
EVAL-signature = if(log_subtype="Action",'subtype','log_subtype')
EVAL-dvc = 'shost'
EVAL-src_zone = 'srcZoneName'
EVAL-action = case(match(act,"^Prevented.*"), "blocked", match(act,"^Detected.*"), "allowed", match(subtype,"^.*Update"), "updated", match(subtype,"^Upgrade"), "modified", match(subtype,"^Uninstall"), "modified", match(subtype,"^Install|Quarantine"), "modified", match(subtype,"^Stop"), "stopped",1=1,"unknown")
EVAL-ids_type = if(cat IN("Lateral Movement","Initial Access","Credential Access","Impact") OR (cat IN("Defense Evasion") AND NOT log_subtype="*login*") OR (cat="Discovery" AND log_subtype="Port Scan"), "application", null())
EVAL-severity = case(Severity=="0", "unknown", Severity=="6", "low", Severity=="8", "medium", Severity=="9", "high")
EVAL-category = 'cat'
EVAL-severity_id = 'Severity'
EVAL-vendor_account = 'tenantCDLid'
EVAL-file_name = if(isnotnull(cs4) AND cs4!="None" ,mvdedup(mvappend('cs4','file_name')),'file_name')
EVAL-date = strftime(end/1000, "%Y-%m-%d")
EVAL-description = if(log_subtype="Action" OR log_subtype="Agent Status",'msg','log_subtype')
EVAL-body = if(log_subtype="Action" OR log_subtype="Agent Status",'msg','log_subtype')
EVAL-id = 'externalId'
EVAL-type = if(cat="Defense Evasion" OR (cat="Audit" AND subtype="Payload Execution"),"alert", if((cat="Audit" OR cat="Monitoring") AND (subtype IN("Scan","Quota Exceeded","Script Execution")),"event",null()))
EVAL-product_version = replace('product_version',"^(.+)\s(.+)","\2")
EVAL-result = lower('result')
EVAL-change_type = case(match(subtype,"^Policy.*"), "policy", match(subtype,"^Content|Quarantine"), "content", match(subtype,"^Install|Uninstall|Upgrade|Stop"), "agent",1=1,"unknown")
EVAL-object = if(isnotnull(subtype),'shost',null())
EVAL-object_attrs = if(isnotnull(subtype),'product',null())
EVAL-object_category = if(isnotnull(subtype),'subtype',null())
EVAL-status = case(match(result,"^Fail.*|fail.*"), "failure", match(result,"^Succe.*|succe.*"), "success",1=1,"unknown")
EVAL-object_path = coalesce('filePath','file')