[ccx_palo_cef_keys]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = c\w\d+Label=([\s\w\d\.]+)\sc\w\d+=([\w\d\s\.\/\-]+)(?=\s[\w\d]+=)
disabled = 0

[ccx_palo_cortex_file_hash]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \,\s+(SHA256|MD5|SHA1|SHA\d+)\s(.*?)(?=\s)

[ccx_palo_cortex_cefExtraction]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = (?:_+)?([\w.:\[\]]+)=(.*?(?=(?:\s[\w.:\[\]]+=|$)))

[ccx_palo_cortex_fName]
CLEAN_KEYS = 0
FORMAT = file_name::$1
REGEX = ([^\\]*$)
SOURCE_KEY = filePath

[ccx_palo_cortex_file]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \s+(file)\s(.*?)(?=\,)

[ccx_palo_cortex_fname]
CLEAN_KEYS = 0
FORMAT = file_name::$1
REGEX = ([^\\]*$)
SOURCE_KEY = file

[ccx_palo_cef_header]
CLEAN_KEYS = 0
REGEX = CEF:(\s|)(?<cef_version>\d+)\|(?<vendor>[^|]*)\|(?<product>[^|]*)\|(?<product_version>[^|]*)\|(?<logtype>[^|]*)\|(?<log_subtype>[^|]*)\|(?<Severity>[^|]*)