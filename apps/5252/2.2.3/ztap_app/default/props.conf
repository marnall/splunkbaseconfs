[critical_start:alert_action:ataportal]
EVAL-vendor_product = "Critical Start"
EVAL-vendor="Critical Start"
HEADER_MODE = firstline
LEARN_MODEL = false
SHOULD_LINEMERGE       = false
BREAK_ONLY_BEFORE_DATE = false
LINE_BREAKER           = (\r?\n==##~~##~~  1E8N3D4E6V5E7N2T9 ~~##~~##==\r?\n\*\*\*Common Action Model\*\*\*[^\r\n]+[\r\n]+)
SEDCMD-removeCAM = s/^\*\*\*Common Action Model\*\*\*[^\r\n]+[\r\n]+(.*)/\1/g
TIME_PREFIX = device_timestamp":
MAX_TIMESTAMP_LOOKAHEAD = 50
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TZ = UTC
# Props for Search Heads
EXTRACT-generic_message = message="?(?<generic_message>[^:]+):
EVAL-generic_message = coalesce(generic_message, message)

