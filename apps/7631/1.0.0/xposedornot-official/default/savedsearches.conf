[XposedorNot - New Data Breach Alert]
action.notable.param.rule_title = XposedorNot - New Data Breach Alert $new_breach$
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable = 1
action.notable.param.verbose = 0
action.notable.param.severity = high
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.expires = 365d
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 8 * * *
description = This alert is triggered whenever a new breach occurs for the monitored domains. The alert identifies any new breaches that appear in the latest data but were not present in the previous data. When a new breach is detected, it indicates a potential security incident, prompting an alert to take necessary actions. - $new_breach$
dispatch.latest_time = now
dispatch.earliest_time = -24h@h
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = xposedornot
request.ui_dispatch_view = search
search = `xposedornot` \
| sort - _time \
| head 2 \
| spath path=metrics.Breaches_Details{}.breach output=breach \
| table _time breach \
| stats values(breach) as "Breach List" dc(breach) as "breach Count" by _time \
| sort _time \
| mvexpand "Breach List" \
| stats count by "Breach List" \
| where count=1 \
| rename "Breach List" as as new_breach  \
| table new_breach

[XposedorNot - New Data Breach Alert (Email)]
action.notable.param.rule_title = XposedorNot - New Data Breach Alert $new_breach$
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable = 1
action.notable.param.verbose = 0
action.notable.param.severity = high
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.expires = 2400d
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 8 * * *
description = This alert triggers when there is a significant increase in the number of exposed email addresses compared to the previous reporting period. It monitors the count of unique email addresses exposed in data breaches and compares it with historical data to detect any sudden rise.  - $new_breach$  exposed on $breach$
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = xposedornot
request.ui_dispatch_view = search
search = `xposedornot` \
| sort - _time \
| head 2 \
| spath path=metrics.Breaches_Details{}.breach output=breach \
| spath path=metrics.Breaches_Details{}.domain output=domain \
| spath path=metrics.Breaches_Details{}.email output=email \
| table _time breach domain email \
| eval x=mvzip(breach,mvzip(email,domain)) \
| mvexpand x \
| eval breach=mvindex(split(x, ","), 0) \
| eval email=mvindex(split(x, ","), 1) \
| eval domain=mvindex(split(x, ","), 2) \
| table _time breach email domain \
| stats values(email) as "Email List" dc(email) as "Email Count" by _time breach \
| sort _time \
| mvexpand "Email List" \
| stats count by "Email List" breach \
| where count=1 \
| rename "Email List" as new_breach \
| table new_breach breach