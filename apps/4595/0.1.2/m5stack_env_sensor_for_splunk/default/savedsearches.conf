[Temperature 1-day trend]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = visualizations
display.page.search.tab = visualizations
display.statistics.show = 0
display.visualizations.charting.chart = line
request.ui_dispatch_app = m5stack_env_sensor
request.ui_dispatch_view = search
search = | mstats \
  prestats=t\
  avg(temperature)\
  stdev(temperature)\
  WHERE index=m5stack_env\
  GROUPBY host span=15m\
| makecontinuous _time span=15min\
| timechart span=15min avg(temperature) AS T\
| timewrap 1d
workload_pool = matsu_pool

[Latest ENV sensor data]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = sonnenhaus_bastion
request.ui_dispatch_view = search
search = | mstats latest(*)\
  span=1min\
  WHERE index=m5stack_env earliest=-1h@m latest=-0m@m\
| sort _time\
| tail 1\
| eval duration_min=round((now() - _time) / 60, 1)
workload_pool = matsu_pool
