fields_list = _key, _delete, category, priority, accountStatus, domain, forest, identity, bunit, watchlist, memberOf, dn, description, title, nick, first, last, prefix, suffix, email, phone, managedBy, accountExpires, pwdLastSet, lastLogonTimestamp, msDS_AllowedToDelegateTo, startDate, endDate, servicePrincipalName, userPrincipalName, userAccountControl, lastUpdated, sAMAccountName, objectSid, downLevelDomainName
