[wsus_inventory]
description = This retrieves data from Target DB table in WSUS and provides asset information
index_time_mode = current
input_type = event
interval = 86400
mode = batch
query = SELECT \
      [LastSyncTime]\
      ,[LastReportedStatusTime] as last_status_datetime\
      ,[LastReportedRebootTime] as last_report_datetime\
      ,[IPAddress] as ip\
      ,[FullDomainName] as dns\
      ,[LastInventoryTime] as last_inventory_datetime\
      ,sync_result = (CASE LastSyncResult\
            WHEN 1 THEN N'Succeeded' \
            WHEN 2 THEN N'Failed' \
            ELSE N'Unknown' \
            END) \
          ,[OSMajorVersion] as os_major\
      ,[OSMinorVersion] as os_minor\
      ,[OSBuildNumber] as os_build\
      ,[OSServicePackMajorNumber] as os_servicepack_major\
      ,[OSServicePackMinorNumber] as os_servicepach_minor\
      ,[ComputerMake] as asset_vendor\
      ,[ComputerModel] as asset_model\
      ,[BiosVersion] as bios_version\
      ,[BiosName] as bios_name\
      ,[ProcessorArchitecture] as processor\
      ,[OSFamily] as os_family\
      ,[OSDescription] as os\
  FROM [SUSDB].[dbo].[tbComputerTarget] as computertarget LEFT JOIN\
  [SUSDB].[dbo].[tbComputerTargetDetail] as targetdetail on computertarget.TargetID=targetdetail.TargetID
sourcetype = wsus:computertargets

[wsus_serviceevents]
description = Events Generated by WSUS for monitoring the service
index_time_mode = dbColumn
input_type = event
interval = */15 * * * *
mode = batch
query = SELECT\
      [TimeAtTarget]\
      ,[TimeAtServer]\
      ,[MessageTemplate] as message\
      ,[AppName] as app\
      ,[Name] as src\
	  ,[DefaultTitle] as update_title\
      ,[DefaultDescription] as update_description\
      ,[ReplacementStringsXml] as replacement_string\
  FROM [SUSDB].[dbo].[vwEventHistory] as eventhistory LEFT JOIN\
  [SUSDB].[PUBLIC_VIEWS].[vComputerTarget] as dest ON eventhistory.ComputerID=ComputerTargetId LEFT JOIN\
  [SUSDB].[PUBLIC_VIEWS].[vUpdate] as updates ON eventhistory.UpdateId=updates.UpdateId
sourcetype = wsus:events

[wsus_updatereporting]
index_time_mode = dbColumn
input_type = event
interval = * */6 * * *
mode = batch
query = SELECT [DefaultTitle] as title\
      ,[State] as install_state\
	  ,[Name] as dest\
	  ,[SecurityBulletin] as signature\
	  ,[MsrcSeverity] as ms_severity\
	,GETUTCDATE() as _time\
  FROM [SUSDB].[PUBLIC_VIEWS].[vUpdateInstallationInfoBasic] as info LEFT JOIN\
  [SUSDB].[PUBLIC_VIEWS].[vComputerTarget] as targets ON info.ComputerTargetId=targets.ComputerTargetId LEFT JOIN\
  [SUSDB].[PUBLIC_VIEWS].[vUpdate] as updates ON info.UpdateId=updates.UpdateId
sourcetype = wsus:updatestates
