[mariadb:audit:csv]
# Splunk magic 8 props
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 20
TIME_FORMAT=%Y-%m-%d %H:%M:%S
# 700 is enough for authentication log
# TRUNCATE = 700
# For_Load_Balancing_On_UF
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)
NO_BINARY_CHECK=true
CHARSET=UTF-8
KV_MODE=none
category=Database
description=Comma-separated value format. Set header and other settings in "Delimited Settings"
pulldown_type=true
REPORT-mariadb_audit = auto_kv_for_mariadb_auth_audit
EVAL-app = MariaDB
EVAL-dest = host
EVAL-action = case(operation=="CONNECT", "success", operation=="FAILED_CONNECT", "failure")