[Jira Cloud Users]
disabled = 1
action.email.reportServerEnabled = 0
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 0,6,12,18 * * *
description = This savedsearch will populate the users of Jira Cloud from the events that are indexed in last 30 days in splunk_ta_jira_cloud_users_lookup lookup.
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.general.type = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `splunk_ta_jira_cloud_indexes` sourcetype=jira:cloud:users | dedup host, accountId | fields - _bkt, _cd, _indextime, _kv, _raw, _serial, _si, _sourcetype, _subsecond, punct, index, source, sourcetype, _time, splunk_server, linecount, timestamp, eventtype, tag, tag::eventtype, splunk_server_group | inputlookup append=t splunk_ta_jira_cloud_users_lookup  | dedup host, accountId | outputlookup splunk_ta_jira_cloud_users_lookup
