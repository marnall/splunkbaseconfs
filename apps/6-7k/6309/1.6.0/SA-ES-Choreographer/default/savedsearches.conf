[Update ESC_correlation_searches_schedule_business.csv - Lookup Gen]
cron_schedule = 4-59/15 * * * *
dispatch.earliest_time = @d
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = SA-ES-Choreographer
request.ui_dispatch_view = search
search = | inputlookup es_correlation_searches_config\
| search status=enabled \
| rex field=cron_schedule "^(?<minute>\S+)\s*(?<hour>\S+)\s*(?<day>\S+)\s*(?<month>\S+)\s*(?<weekday>\S+)$" \
    ```\
    Parse minutes\
    ``` \
| rex field=minute "^(?<mstart>\d+)-(?<mend>\d+)(?:/(?<mint>\d+))?$" \
| fillnull value=1 mint\
| rex max_match=0 field=minute "(?<commas>,)" \
| eval minute_interval=case(\
    minute=="*", 1,\
    match(minute, "^\*/\d+$"), replace(minute, "\W+", "" ),\
    match(minute, "^\d+$"), 60, \
    isnotnull(mstart), mint  ```round( 60 / ceil( ( mend-mstart+1)/ mint ), 0 )```,\
    mvcount(commas) > 0, round( 60 / ( mvcount(commas) + 1 ), 0),\
    1==1, null() ) \
| eval start_minute=case(\
    match(minute, "^\d+"), printf( "%i", tonumber( replace(minute, "^(\d+).*$", "\1" ) ) ), \
    match(minute, "^\*"), 0,\
    1==1, null() ) \
| fields - mstart mend mint commas\
    ```\
    Parse hours\
    ``` \
| rex field=hour "^(?<hstart>\d+)-(?<hend>\d+)(?:/(?<hint>\d+))?$" \
| fillnull value=1 hint\
| rex max_match=0 field=hour "(?<commas>,)" \
| eval hour_interval=case(\
    hour=="*", 1,\
    match(hour, "^\*/\d+$"), replace(hour, "\W+", "" ),\
    match(hour, "^\d+$"), 24, \
    isnotnull(hstart), hint ```round( 24 / ceil( ( hend-hstart+1)/ hint ), 0 )```,\
    mvcount(commas) > 0, round( 24 / ( mvcount(commas) + 1 ), 0),\
    1==1, null() ) \
| eval start_hour=case(\
    match(hour, "^\d+"), printf( "%i", tonumber( replace(hour, "^(\d+).*$", "\1" ) ) ), \
    match(hour, "^\*"), 0,\
    1==1, null() ) \
| fields - hstart hend hint commas\
    ```\
    Putting things together\
    ``` \
| eval interval=if( weekday=="*" AND month=="*" AND day=="*", case(\
    hour=="*", minute_interval,\
    minute_interval==60, 60*hour_interval,\
    1==1, null() ),\
    "N/A" ) \
| table title cron_schedule interval start_minute\
| eventstats count as count_per_interval_minute by interval start_minute\
| eventstats count as total_per_interval by interval\
| eval max_advisable_count=ceil( total_per_interval / interval )\
| eval busy=case( interval >= 240, "no", count_per_interval_minute>max_advisable_count, "yes", true(), "no" )\
| outputlookup ESC_correlation_searches_schedule_business.csv\
| stats count

