| fields - todo todo_time todoer\
| fillnull value="ImpossibleValueToChangeBackToNull" todo_combo\
| mvexpand todo_combo\
| eval todo_combo= if( todo_combo=="ImpossibleValueToChangeBackToNull", null(), todo_combo )\
| rex field=todo_combo "^(?<todo>.*)~~##~~(?<todo_time>\d+)~~##~~(?<todoer>\w+)$"\
| fields - todo_combo\
| rex field=todo "^\w{32}@(?<IR_timestamp>\d+) "\
| eval todo=replace( todo,  "^\w{32}@(\d+ .*)$", "IR-\1" )\
| `format_time( todo_time )`\
| `ESC_get_identity4events_summary(todoer)`\
| eval todoer=coalesce(todoername,todoer_original)\
| stats list(todo) as todo, list(todo_time) as todo_time, list(todoer) as todoer, list(IR_timestamp) as IR_timestamp, values(*) as * values(_*) as _* by title\
| eval todo_count = mvcount( todo)\
| fields  title compliance_score  review_status last_review_time last_reviewer last_review_action last_changed author modified_fields  owner  todo_count todo todo_time todoer IR_timestamp\
