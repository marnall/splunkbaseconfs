| eval is_in_1d=if( _time >= relative_time( now(), "-1d" ), 1, 0 ) \
| eval is_in_3d=if( _time >= relative_time( now(), "-3d" ), 1, 0 ) \
| eval is_in_7d=if( _time >= relative_time( now(), "-7d" ), 1, 0 ) \
| eval is_in_2w=if( _time >= relative_time( now(), "-2w" ), 1, 0 ) \
| eval is_in_3w=if( _time >= relative_time( now(), "-3w" ), 1, 0 ) \
| eval is_in_1mon=if( _time >= relative_time( now(), "-1mon" ), 1, 0 ) \
| eval is_in_3mon=if( _time >= relative_time( now(), "-3mon" ), 1, 0 ) \
| stats \
    count(eval(is_suppressed=="no" AND is_in_1d==1)) as 1d_notable,\
    count(eval(is_morning_check=="yes" AND is_in_1d==1)) as 1d_morncheck,\
    count(eval(is_redteam=="yes" AND is_in_1d==1)) as 1d_redteam,\
    count(eval(is_known_va_scanner=="yes" AND is_in_1d==1)) as 1d_va_scanner,\
    count(eval(is_suppressed=="yes" AND is_in_1d==1)) as 1d_suppressed,\
    count(eval(is_suppressed=="no" AND is_in_3d==1)) as 3d_notable,\
    count(eval(is_morning_check=="yes" AND is_in_3d==1)) as 3d_morncheck,\
    count(eval(is_redteam=="yes" AND is_in_3d==1)) as 3d_redteam,\
    count(eval(is_known_va_scanner=="yes" AND is_in_3d==1)) as 3d_va_scanner,\
    count(eval(is_suppressed=="yes" AND is_in_3d==1)) as 3d_suppressed,\
    count(eval(is_suppressed=="no" AND is_in_7d==1)) as 7d_notable,\
    count(eval(is_morning_check=="yes" AND is_in_7d==1)) as 7d_morncheck,\
    count(eval(is_redteam=="yes" AND is_in_7d==1)) as 7d_redteam,\
    count(eval(is_known_va_scanner=="yes" AND is_in_7d==1)) as 7d_va_scanner,\
    count(eval(is_suppressed=="yes" AND is_in_7d==1)) as 7d_suppressed,\
    count(eval(is_suppressed=="no" AND is_in_2w==1)) as 2w_notable,\
    count(eval(is_morning_check=="yes" AND is_in_2w==1)) as 2w_morncheck,\
    count(eval(is_redteam=="yes" AND is_in_2w==1)) as 2w_redteam,\
    count(eval(is_known_va_scanner=="yes" AND is_in_2w==1)) as 2w_va_scanner,\
    count(eval(is_suppressed=="yes" AND is_in_2w==1)) as 2w_suppressed,\
    count(eval(is_suppressed=="no" AND is_in_3w==1)) as 3w_notable,\
    count(eval(is_morning_check=="yes" AND is_in_3w==1)) as 3w_morncheck,\
    count(eval(is_redteam=="yes" AND is_in_3w==1)) as 3w_redteam,\
    count(eval(is_known_va_scanner=="yes" AND is_in_3w==1)) as 3w_va_scanner,\
    count(eval(is_suppressed=="yes" AND is_in_3w==1)) as 3w_suppressed,\
    count(eval(is_suppressed=="no" AND is_in_1mon==1)) as 1mon_notable,\
    count(eval(is_morning_check=="yes" AND is_in_1mon==1)) as 1mon_morncheck,\
    count(eval(is_redteam=="yes" AND is_in_1mon==1)) as 1mon_redteam,\
    count(eval(is_known_va_scanner=="yes" AND is_in_1mon==1)) as 1mon_va_scanner,\
    count(eval(is_suppressed=="yes" AND is_in_1mon==1)) as 1mon_suppressed,\
    count(eval(is_suppressed=="no" AND is_in_3mon==1)) as 3mon_notable,\
    count(eval(is_morning_check=="yes" AND is_in_3mon==1)) as 3mon_morncheck,\
    count(eval(is_redteam=="yes" AND is_in_3mon==1)) as 3mon_redteam,\
    count(eval(is_known_va_scanner=="yes" AND is_in_3mon==1)) as 3mon_va_scanner,\
    count(eval(is_suppressed=="yes" AND is_in_3mon==1)) as 3mon_suppressed,\
    by search_name \
| eval 1d='1d_notable'.":".'1d_morncheck'.":".'1d_redteam'.":".'1d_va_scanner'.":".'1d_suppressed'\
| eval 3d='3d_notable'.":".'3d_morncheck'.":".'3d_redteam'.":".'3d_va_scanner'.":".'3d_suppressed'\
| eval 7d='7d_notable'.":".'7d_morncheck'.":".'7d_redteam'.":".'7d_va_scanner'.":".'7d_suppressed'\
| eval 2w='2w_notable'.":".'2w_morncheck'.":".'2w_redteam'.":".'2w_va_scanner'.":".'2w_suppressed'\
| eval 3w='3w_notable'.":".'3w_morncheck'.":".'3w_redteam'.":".'3w_va_scanner'.":".'3w_suppressed'\
| eval 1mon='1mon_notable'.":".'1mon_morncheck'.":".'1mon_redteam'.":".'1mon_va_scanner'.":".'1mon_suppressed'\
| eval 3mon='3mon_notable'.":".'3mon_morncheck'.":".'3mon_redteam'.":".'3mon_va_scanner'.":".'3mon_suppressed'\
| table search_name 1d 3d 7d 2w 3w 1mon 3mon\
| untable search_name time value \
| rex field=value "^(?<notable_count>\d+):(?<morncheck_count>\d+):(?<redteam_count>\d+):(?<va_scanner_count>\d+):(?<suppressed_count>\d+)$" \
| fields - value\
| outputlookup ESC_notable_seen_stats\
| stats count

