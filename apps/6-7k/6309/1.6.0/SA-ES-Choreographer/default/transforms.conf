[ESC_universal_todo_store]
collection = ESC_universal_todo_store
external_type = kvstore
# _key       type-title-comment, this ensures uniqueness of a comment for an item
# type:      type of item in one word. E.g. macro, correlationsearch, savedsearch, workflowaction, etc
# title:     name of the item. E.g. full name of the correlation search
# comment:   TODO comment
# user:      TGI of who created the comment
# _time:     when the comment was created
fields_list = _key,_time,comment,title,type,user

[ESC_universal_done_store]
collection = ESC_universal_done_store
external_type = kvstore
# _key       type-title-comment, this ensures uniqueness of a comment for an item
# type:      type of item in one word. E.g. macro, correlationsearch, savedsearch, workflowaction, etc
# title:     name of the item. E.g. full name of the correlation search
# comment:   DONE comment
# user:      TGI of who created the comment
# _time:     when the comment was created
fields_list = _key,_time,comment,title,type,user

[ESC_universal_review_store]
collection = ESC_universal_review_store
external_type = kvstore
# _key       type-title, this ensures uniqueness for each item
# type:      type of item in one word. E.g. macro, correlationsearch, savedsearch, workflowaction, etc
# title:     name of the item. E.g. full name of the correlation search
# action:    action of the review: passed or failed
# user:      TGI of who did the review
# _time:     when the comment was created
# config_blob:         blob of key-value pairs detailing the configuration of the item at the time of the review
# best_practice_blob:  blob of key-value pairs detailing the compliance of the item with best practices at the time of the review (optional)
fields_list = _key,_time,action,best_practice_blob,config_blob,title,type,user 

[ESC_universal_owner_store]
collection = ESC_universal_owner_store
external_type = kvstore
# _key                 type-title, this ensures uniqueness for each item
# type:                type of item in one word. E.g. macro, correlationsearch, savedsearch, workflowaction, etc
# title:               name of the item. E.g. full name of the correlation search
# owner:               TGI of who is assigned the dev work on this item
# _time:               when the comment was created
fields_list = _key,_time,owner,title,type

[ESC_notables]
collection = ESC_notables
external_type = kvstore
fields_list = _key,_time,event_hash,is_redteam,is_known_va_scanner,is_morning_check,is_suppressed,rule_description,rule_id,rule_name,rule_title,savedsearch_description,search_name,source

[ESC_correlation_change_authors]
collection = ESC_correlation_change_authors
external_type = kvstore
fields_list = _key,_time,action,combo,title,user

[ESC_universal_comment_news]
collection = ESC_universal_comment_news
external_type = kvstore
fields_list = _key,_time,action,comment,comment_type,owner,title,type,user







[comment_todo]
REGEX = ^\d+ (?<comment_type>TODO) action="(?<action>[^"]+)" type="(?<type>[^"]+)" title="(?<title>[^"]+)" user="(?<user>\S+)" comment="(?<comment>.*)"$

[comment_done]
REGEX = ^\d+ (?<comment_type>DONE) type="(?<type>[^"]+)" title="(?<title>[^"]+)" user="(?<user>\S+)" comment="(?<comment>.*)"$

[comment_review]
REGEX = ^(?s)\d+ (?<comment_type>REVIEW).*?( likely_author="(?<author>[^"]+)")? type="(?<type>[^"]+)" title="(?<title>[^"]+)" user="(?<user>\S+)" action="(?<action>[^"]+)" config_blob="(?<config_blob>.*)" best_practice_blob="(?<best_practice_blob>.*)"$
