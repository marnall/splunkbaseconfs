# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = Lachlan Horsey
version = 1.0.0
description = This add-on provides a simple way to query Google and ingest the search results into Splunk. This is useful for a number of reasons but particularly in finding indexed pages that are posing as your own, for example Phish Kits.

[ui]
is_visible = 1
label = Google Search for Splunk
docs_section_override = AddOns:released

[package]
id = TA-google-search-for-splunk

[triggers]
reload.addon_builder = simple
reload.ta_google_search_for_splunk_account = simple
reload.ta_google_search_for_splunk_settings = simple
reload.passwords = simple

