[CrowdStrike Scheduled Search Logs - 30 Days]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
description = Collects the CrowdStrike Scheduled Search Technical Add-on logs for the past 30 days
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
dispatchAs = user
search = `cs_schedsearch_logs`
request.ui_dispatch_app = TA-crowdstrike-scheduled-search

[CrowdStrike Scheduled Search: Report and Execution Event Counts]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = This report shows the total event count for a Report ID and the results_counts field value by each Execution ID.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","ta_data.Input_name"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-scheduled-search
request.ui_dispatch_view = search
search = `cs_schedsearch_get_index` | stats count(ta_data.Execution_Data.id) as "Total Events"  values(ta_data.Execution_Data.id) as "Execution IDs" values(ta_data.Execution_Data.result_metadata.result_count) as "Execution Events" by  "ta_data.Report_Data.id" | rename "ta_data.Report_Data.id" as "Report ID"
