[crowdstrike:scheduledsearch:json]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 3000
TRUNCATE = 0
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
TIME_PREFIX = "@timestamp"\s*:\s*
TIME_FORMAT = %s%3N
TZ = UTC
category = security
pulldown_type = 1
sourcetype = crowdstrike:scheduledsearch:json