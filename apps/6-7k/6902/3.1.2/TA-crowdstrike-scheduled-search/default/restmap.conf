[admin:TA_crowdstrike_scheduled_search_configuration]
match = /
members = TA_crowdstrike_scheduled_search_account, TA_crowdstrike_scheduled_search_settings

[admin:TA_crowdstrike_scheduled_search_inputs]
match = /
members = TA_crowdstrike_scheduled_search_crowdstrike_scheduled_search_json

