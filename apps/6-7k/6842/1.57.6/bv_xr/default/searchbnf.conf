[xmaddgraphnode-command]
syntax = | xmAddGraphNode GRAPH_TYPE graphType GRAPH_NAME graphName IS_ROOT (true | false) [graphProperties props1=value1|prop2=value2|...] NODE_NAME <nodeName> [GRAPH_PROPS props1=value1|prop2=value2|...] [NODE_PROPS weight=1.11|props1=value1|prop2=value2|...] [MODEL_NAME modelName]
shortdesc = This command is used to create a node in a graph and the graph itself if it does not already exist.
description = This command is used to create a node in a graph and the graph itself if it does not already exist. Supported graph types include RELEVANCY and TRANSACTION. Pass GRAPH_PROPS to add properties to the graph when creating the first node. Also the IS_ROOT flag should always be passed with a value of true if creating the graph's root node or false for all other nodes. NOTE: A graph must have exactly 1 root node.
example1 = | xmAddGraphNode GRAPH_TYPE RELEVANCY GRAPH_NAME TestGraph NODE_NAME root IS_ROOT true GRAPH_PROPS "prop1=value1|prop2=value2" NODE_PROPS "weight=0.20|prop3=2|prop4=3 MODEL_NAME myModel"
comment1 = This example creates a RELEVANCY node in graph TestGraph belonging to model 'myModel' which is the designated root node. In addition properties to add to the graph and node are also specified. Note when creating a RELEVANCY graph, pass the weight property to specify the weight of the node.
example2 = | xmAddGraphNode GRAPH_TYPE RELEVANCY GRAPH_NAME TestGraph NODE_NAME child1 IS_ROOT false NODE_PROPS "weight=0.50|prop3=2|prop4=3" MODEL_NAME myModel
comment2 = This example creates a child (non-root) RELEVANCY node in TestGraph belonging to model 'myModel'. In this case IS_ROOT is false indicating the node is not root. Also properties to assign to the node are passed in NODE_PROPS. The weight specified in properties will be assigned to the node.
example3 = | xmAddGraphNode GRAPH_TYPE TRANSACTION GRAPH_NAME TestGraph NODE_NAME root IS_ROOT true GRAPH_PROPS "prop1=value1|prop2=value2" NODE_PROPS "prop3=2|prop4=3 MODEL_NAME myModel"
comment3 = This example creates a TRANSACTION node in graph TestGraph belonging to model 'myModel' which is the designated root node. In addition properties to add to the graph and node are also specified. Note when creating a RELEVANCY graph.
usage = public

[xmaddgraphedge-command]
syntax = | xmAddGraphEdge GRAPH_TYPE graphType GRAPH_NAME graphName [EDGE_NAME nodeName] FROM_NODE_NAME nodeName TO_NODE_NAME nodeName [EDGE_PROPS weight=2.22|props1=value1|prop2=value2|...] [MODEL_NAME modelName]
shortdesc = Use this command to create an edge that connects two nodes in the same graph together.
description = Use this command to create an edge that connects two nodes in the same graph together. Supported graph types include RELEVANCY and TRANSACTION. The weight assigned to the edge must be communicated in the EDGE_PROPS attribute as: weight=xxx.xx otherwise a default value of 1 will be assigned. Note that the command will fail if an edge with the specified name exists or a connection between the nodes specified in FROM_NODE_NAME and TO_NODE_NAME already exists.
example1 = | xmAddGraphEdge GRAPH_TYPE RELEVANCY GRAPH_NAME TestGraph MODEL_NAME myModel EDGE_NAME root->child1 FROM_NODE_NAME root TO_NODE_NAME child1 EDGE_PROPS weight=1.0|prop1=value1|props2=value2
comment1 = This example creates a RELEVANCY edge named 'root->child1' in graph TestGraph belonging to model myModel connecting a node named 'root' to a node named 'child1' and assigns a weight of 1.00 to the edge.
example2 = | xmAddGraphEdge GRAPH_TYPE TRANSACTION GRAPH_NAME TestGraph MODEL_NAME myModel EDGE_NAME root->child1 FROM_NODE_NAME root TO_NODE_NAME child1 EDGE_PROPS prop1=value1|props2=value2
comment2 = This example creates a TRANSACTION edge named 'root->child1' in graph TestGraph belonging to model myModel connecting a node named 'root' to a node named 'child1' and assigns properties prop1=value1 and prop2=value2.
usage = public

[xmupdategraph-command]
syntax = | xmUpdateGraph (GRAPH_ID graphId | GRAPH_TYPE graphType GRAPH_NAME graphName MODEL_NAME moodelName) [NEW_GRAPH_NAME newName] [GRAPH_PROPS "prop1=value1|prop2=value2"]
shortdesc = This command is used to rename a graph and/or to update properties stored in the graph.
description = This command is used to rename a graph and/or to update properties stored in the graph. The GRAPH_ID parameter is the primary key for the graph as seen in the xmListGraphs command output. When using name parameters (GRAPH_TYPE, GRAPH_NAME, MODEL_NAME) supported graph types are RELEVANCY or TRANSACTION. TRANSACTION_PATH graphs can be used using the GRAPH_ID parameter only.
example1 = | xmUpdateGraph GRAPH_ID 592ff42866e6d785c6758ba2 NEW_GRAPH_NAME MyGraph
comment1 = This example renames a RELEVANCY graph with ID 592ff42866e6d785c6758ba2 to MyGraph and sets properties prop1=value1 and prop2-value2 on the graph.
example2 = | xmUpdateGraph GRAPH_TYPE TRANSACTION GRAPH_NAME TestGraph MODEL_NAME myModel GRAPH_PROPS "prop1=value1|prop2=value2"
comment2 = This example updates properties on a TRANSACTION graph named TestGraph in model myModel to MyGraph.
usage = public

