[xmrunnaturalpeeranalysis-command]
syntax = xmRunNaturalPeerAnalysis modelName <analysis-option>? <region-option>? <businessunit-option>? <title-option>? <category-option>? <managedby-option>? <actortype-option>? <actorclass-option>? <startdate-option>?
shortdesc = This command will run the peer analysis for actors that shared attributes specified on command line.
description = This command will run the peer analysis comparing peers identified by command line parameters (business unit, age, gender, etc). To be truely effective, this command requires that actors are provisioned with attributes that distinguish them from on another (i.e. business unit, category, etc). See xmRunLowGranularityPeerAnalysis for another way to perform peer analysis that does not require actors to be provisioned.
example1 = | xmRunNaturalPeerAnalysis BL
comment1 = This example runs peer analysis for all actors in the model BL.
example2 = | xmRunNaturalPeerAnalysis BL BUSINESSUNIT americas
comment2 = This example runs peer analysis for all actors in the model BL who belong to business unit 'americas'.
example3 = | xmRunNaturalPeerAnalysis BL ACTORS "actor1|actor2|actor3|actor4|actor5|actor6"
comment3 = This example runs peer analysis for all actors specified in the ACTORS parameter
related = xmRunThresholdAnalysis, xmRunActorDayOfWeekAnalysis, xmRunActorBehaviorAnalysis, xmRunActorSequence, xmRunAnomalyRules, xmAcquireEvents, xmRunLowGranularityPeerAnalysis
usage = public

[xmrunlowgranularitypeeranalysis-command]
syntax = xmRunLowGranularityPeerAnalysis modelName [DAYS_INTERVAL number] [NUM_PERIODS_PER_DAY number] [LOOK_BACK_DAYS number] <startdate-option>? <analysis-option>? <signalprops-option>? [FORCE (true | false)]
shortdesc = This command will run a peer to peer analysis against each peer group discovered by xmDiscoverPeerGroups.
description = This command will run a peer to peer analysis against each peer group discovered by xmDiscoverPeerGroups. If peer group discovery was last ran more than 24 hours ago (or never at all), peer groups will be discovered or refreshed. To force re-discovery of peer groups, pass FORCE true. This version of peer analysis is considered low granularity because it will derive a centralized model of behavior for eech peer group then find actors in the peer group that are outliers vs. the highly granular analysis performed by xmRunNaturalPeerAnalysis. As a result this analysis is much faster and more appropriate for models with a large number of actors but may be less accurate than the natural peer analysis. The DAYS_INTERVAL parameter describes how many days of activity to include in a single cell, default is 3. This parameter is used to smooth noise in the data by combinding many days activity into a single comparison unit. The NUM_PERIODS_PER_DAY parameter is used to define how time of day is incorporated into comparison units. A value of 1 indicates time of day activities occurred should be effictively ignored, this is the default value. The LOOK_BACK_DAYS parameter (default 30) indicates how many dates in the past from STARTDATE to retrieve history for when comparing behavior. The STARTDATE parameter indicates where in the actors history to retrieve data FROM. If not supplied, STARTDATE will default to the max event time of the model. For example, if LOOK_BACK_DAYS is 30 and STARTDATE is 05/30/2018, then the derived date range of historical data to compare will be 05/01/2018 to 05/30/2018. 
example1 = | xmRunLowGranularityPeerAnalysis ANET
comment1 = This example runs peer analysis for all actors in the model ANET using default values for all other parameters.
example2 = | xmRunLowGranularityPeerAnalysis ANET STARTDATE 05/20/2018
comment2 = This example runs peer analysis for all actors in the model ANET using start date 05/20/2018 and default values for all other parameters.
example3 = | xmRunLowGranularityPeerAnalysis ANET STARTDATE 05/20/2018 DAYS_INTERVAL 1 NUM_PERIODS_PER_DAY 1 ANALYSISNAME MyAnalysis LOOK_BACK_DAYS 60 SIGNALPROPS "prop1=value1|prop2=value2"
comment3 = This example runs peer analysis for all actors in the model ANET using start date 05/20/2018, days interval of 1, number of periods per day of 1, etc.
related = xmDiscoverPeerGroups, xmListPeerGroups
usage = public

[xmrunanomalyrules-command]
syntax = xmRunAnomalyRules modelName RULE_PACKAGE rulePackageName STARTDATE <"mm/dd/yyyy hh:mm:ss"> | EPOCH> ENDDATE <"mm/dd/yyyy hh:mm:ss" | EPOCH> [ANALYSISNAME name] [SIGNALPROPS "prop1=value1|prop2=value2|..."]
shortdesc = This command will run a rule analysis for teh specified rule package.
