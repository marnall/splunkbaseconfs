[xmremovegraph-command]
syntax = | xmRemoveGraph GRAPH_TYPE graphType GRAPH_NAME graphName MODEL_NAME modelName [RECURSIVE (true | false)]
shortdesc = This command remove a graph and all nodes and edges defined for the graph.
description = This command remove a graph and all nodes and edges defined for the graph. Supported graph types include RELEVANCY and TRANSACTION_PATH. Note that this command will remove the graph and all associated nodes and edges. Use RECURSIVE true (default is false) to remove ALL data associated with the graph which can include data store in Splunk, depending on graph type passed. Note that graphs of type TRANSACTION are not supported, use xmRemoveTransaction to remove graphs of type TRANSACTION.
example1 = | xmRemoveGraph GRAPH_TYPE RELEVANCY GRAPH_NAME TestGraph MODEL_NAME myModel
comment1 = The commands removes a graph named 'TestGraph' of type 'RELEVANCY' from model myModel.
example2 = | xmRemoveGraph GRAPH_TYPE TRANSACTION GRAPH_NAME TestGraph MODEL_NAME myModel
comment2 = The commands removes a graph named 'TestGraph' of type 'TRANSACTION' from model myModel.
example3 = | xmRemoveGraph GRAPH_TYPE TRANSACTION_PATH GRAPH_NAME TestGraph MODEL_NAME myMode.
comment3 = The commands removes a graph named 'TestGraph' of type 'TRANSACTION_PATH' from model myModel.
example4 = | xmRemoveGraph GRAPH_TYPE TRANSACTION_PATH GRAPH_NAME TestGraph MODEL_NAME myModel RECURSIVE true
comment4 = The commands removes a graph named 'TestGraph' of type 'TRANSACTION_PATH' from model myModel including all records from the scm_transaction_instance index. NOTE: Relevancy graphs also store graph instance data in splunk, use RECURSIVE true when that data is to be removed as well when graph type is RELEVANCY.
related = xmAddGraphNode, xmAddGraphEdge, xmListGraphs, xmRemoveTransaction
usage = public

[xmlistgraphs-command]
syntax = | xmListGraphs GRAPH_TYPE graphType
shortdesc = This command list all graphs of the specified type that exist.
description = This command list all graphs of the specified type that exist. The supported graph types are RELEVANCY, TRANSACTION, and TRANSACTION_PATH. The output of the command is in CSV format one line defined graph.
example1 = | xmListGraphs GRAPH_TYPE relevancy
comment1 = List all graphs of type relevancy.
example2 = | xmListGraphs GRAPH_TYPE TRANSACTION
comment2 = List all graphs of type TRANSACTION.
example3 = | xmListGraphs GRAPH_TYPE TRANSACTION_PATH
comment3 = List all graphs of type TRANSACTION_PATH.
usage = public

[xmlistgraph-command]
syntax = | xmListGraph GRAPH_TYPE graphType GRAPH_NAME graphName MODEL_NAME modelName.
shortdesc = This command list the details of the specified graph.
description = This command list the details of the specified graph. The supported graph types are RELEVANCY or TRANSACTION. The details returned include a record describing the graph, 0..N records describing the graph's nodes, and 0..N records describing the graph's edges. The output of the command is CSV one row for each record type (graph, node, or edge) being described.
example1 = | xmListGraph GRAPH_TYPE RELEVANCY GRAPH_NAME TestGraph MODEL_NAME INTL_SALES
comment1 = This command list the details of a graph named 'TestGraph' of type 'RELEVANCY' in model INTL_SALES.
example2 = | xmListGraph GRAPH_TYPE TRANSACTION GRAPH_NAME TestGraph
comment2 = This command list the details of a graph named 'TestGraph' of type 'TRANSACTION' in model INTL_SALES.
usage = public

[xmrunrelevancygraph-command]
syntax = search | xmRunRelevancyGraph GRAPH_NAME graphName MODEL_NAME modelName [GRAPH_INSTANCE_COLUMN instanceColumnName] [GRAPH_NODE_COLUMN graphNodeColumn] [CIX_COLUMN cixColumnName] [TIME_COLUMN_NAME epochTimeColumnName] [ACTOR_ID_COLUMN_NAME actorIdColumnName] [ANALYSISNAME name] [SIGNALPROPS "prop1=value1|prop2=value2|..."] [FORMAT (CSV | FULL)]
shortdesc = The xmRunRelevancyGraph command analyzes a set of rule anomalies against a relevancy graph that references rule packages described in the anomalies
description = The xmRunRelevancyGraph command analyzes a set of rule anomalies against a relevancy graph that references rule packages described in the anomalies. A relevancy graph instance will be generated for each transaction (or sequence of events for an actor) that has at least one rule anomaly. In addition, if the normalized CIX at the root node of a relevancy graph instance exceeds a configurable alphacut (which defaults to .20), then a RelevancyGraphAnomalySignal signal will be generated. There will be 1 signal output for each graph instance found in the run with a normalized CIX > than the alphacut.
example1 = index=scm_signal type=RuleAnomaly earliest=-1d@d latest=now | xmRunRelevancyGraph GRAPH_NAME myGraph MODEL_NAME myModel FORMAT csv
comment1 = This command runs the relevancy graph against rule anomaly signals generated during the time period specified using default column names to extract attributes and test against a relevancy graph named myGraph found in model myModel. The default column names used are instanceColumnName (event_reference_key), nodeColumnName (rule_set_name), and cixColumnName (severityIntensity). The default column names correspond to columns from the scm_signal index. In this case CSV output will be returned.
example2 = index=scm_signal type=RuleAnomaly earliest=-1d@d latest=now | xmRunRelevancyGraph GRAPH_NAME myGraph MODEL_NAME myModel GRAPH_INSTANCE_COLUMN instance GRAPH_NODE_COLUMN graphNode CIX_COLUMN cix MODEL_NAME myModel
comment2 = This command runs the relevancy graph myGraph found in model myModel against rule anomaly signals generated during the time period specified. The column names the are specified on command line to over-ride default values.
example3 = index=scm_signal type=RuleAnomaly earliest=-1d@d latest=now | xmRunRelevancyGraph GRAPH_NAME myGraph MODEL_NAME myModel FORMT full | collect index=scm_relevancy_graph type=relevancy_graph
comment3 = This command runs the relevancy graph myGraph found in model myModel against rule anomaly signals generated during the time period using default column names and persists information using collect to the scm_relevancy_graph index. Note type 'relevancy_graph' passed to collect is defined in the applications props.conf and transforms.conf configuration files.
related = xmRunAnomalyRules, xmRunRelevancyEngine
usage = public

[xmexportmodel-command]
syntax = | xmExportModel modelName [OUTPUT_FILE_NAME outputFileName.json] [PRETTY_OUTPUT (true | false)]
shortdesc = Command to generate a gzipped export of a cognitive model which can be imported into another (or the same) installation.
description = Command to generate a gzipped export of a cognitive model which can be imported into another (or the same) installation. If OUTPUT_FILENAME is omitted, a default location and filename will be used. The default location for the exported file is: $(SPLUNK_HOME)/etc/apps/bv_xr/scm/temp and the generated file name will be modelName-export.json.gz. Last, the extension .gz will automatically be added to any OUTPUT_FILENAME. By default the output stored in the file is in 'compressed' json format meaning there are no spaces or newlines. Use 'PRETTY_OUTPUT true' to have the file generated in 'pretty' format which contains spaces and newlines, this allows the input to view viewed in an editor.
example1 = | xmExportModel myModel
comment1 = This command will export a model name 'myModel' from the local install to the default output file. In this case the output file will be localed at $SPLUNK_HOME/etc/apps/scm/backups/myModel-export.json.gz.
example2 =  | xmExportModel myModel OUTPUT_FILENAME /opt/splunk/etc/apps/bv_xr/scm/backups/myModel.json
comment2 =  This example will export a model name 'myModel' from the locall install to output file /opt/splunk/etc/apps/bv_xr/scm/backups/myModel.json.gz. NOTE: The output is automatically gzipped to save disk spaece and thus the '.gz' extision is added.
example3 =  | xmExportModel myModel OUTPUT_FILENAME /opt/splunk/etc/apps/bv_xr/scm/backups/myModel.json PRETTY_OUTPUT true
comment3 =  This example will export a model name 'myModel' from the locall install to output file /tmp/myModel.json.gz in 'pretty' json format.
usage = public

[xmimportmodel-command]
syntax = | xmImportModel newModelName INPUT_FILE_NAME fileName.json.gz [VALIDATE_ONLY (true | false)]
shortdesc =  This command creates a model with data contained in a file generated by the xmExportModel command.
description = This command creates a model with data contained in a file generated by the xmExportModel command. The model imported can exist in the same system it was exported from but there are limitations (in this situation) on what will be imported. If importing into the same system the model was exported from the only a sub-set of the signals will be updated. Also all the database primary keys will be regnerated prior to running the import. If the model does not already exist in the import database then all data (including signals) will be imported.
example1 = | xmImportModel myNewModel INPUT_FILENAME /opt/splunk/etc/apps/scm/temp/myModel.json.gz
comment1 = This example will import a model from the specified file into the local system into a model named 'myNewModel'.
example2 = | xmImportModel myNewModel INPUT_FILENAME /opt/splunk/etc/apps/scm/temp/myModel.json.gz VALIDATE_ONLY true
comment2 = This example will validate a model file's content but not import any data into the local bv_xr install.
usage = public

[xmsuppresssignal-command]
syntax = | xmSuppressSignal MODEL_NAME modelName TYPE (default | model | actor | taxonomy) SIGNAL_TYPE signalType [ACTOR_ID actorId] [TAXONOMY_ID [Actor~]Action~Process~Field] [PROPERTY_NAME "name1[|name2|name3|...]"] [PROPERTY_VALUE "value1[|value2|value3]"] [(START_DATE startDateEpoch END_DATE endDateEpoch) | (DAYS_OF_WEEK '0|1|...|6' HOURS_OF_DAY '0|1|...|23')]
shortdesc =  This command is used to add a new signal suppression of type default, model, actor, or taxonomy.
description = This command is used to add a new signal suppression of type default, model, actor, or taxonomy. The suppression type default is used to register default suppressions that will be applied to models when they are created. The other suppression types (model, actor, taxonomy) defines how the suppression is applied by the filterSuppressedSignals command as well as which parameters are required when creating a suppression, see examples below. In addition, a suppression can be applied to a time period which can be a date range or day of week and time of day.
example1 = | xmSuppressSignal TYPE default SIGNAL_TYPE RuleAnomaly
comment1 = This example defines a default suppression for signal signal type RuleAnomaly to be added to models as they are created. When a default suppression is added to a model during creation, it will be added with a type of MODEL meaning it will be suppressed for the specified signal type for all actors in the model.
example2 = | xmSuppressSignal MODEL_NAME MyModel TYPE model SIGNAL_TYPE RuleAnomaly
comment2 = This example suppressed signal type RuleAnomaly for model MyModel. This means that the RuleAnomaly signal will be suppressed by the | filterSuppressedSignals command.
example3 = | xmSuppressSignal MODEL_NAME MyModel TYPE actor SIGNAL_TYPE RuleAnomaly ACTOR_ID jstewart START_DATE 1481053740 END_DATE 1481140140
comment3 = This example suppressed signal type RuleAnomaly for model MyModel and actor jstewart between the dates of 12/06/2016 19:49:00 GMT to 12/07/2016 19:49:00 GMT. This means that the RuleAnomaly signal will be suppressed by the | filterSuppressedSignals command for actor jstewart between the dates of 12/06/2016 19:49:00 GMT to 12/07/2016 19:49:00 GMT.
example4 = | xmSuppressSignal MODEL_NAME MyModel TYPE taxonomy SIGNAL_TYPE RuleAnomaly TAXONOMY_ID jstewart~myAction~myProcess~myField DAYS_OF_WEEK "0|6" HORUS_OF_DAY "22,23,0,1"
comment4 = This example suppressed signal type RuleAnomaly for model MyModel and actor jstewart for taxonomy myAction~myProcess~myField between the for days of week Saturday (6) and Sunday (0) between the hours of 22 and 1. This means that the RuleAnomaly signal will be suppressed by the | filterSuppressedSignals for all RuleAnomaly signals that pertain the the specified taxonomy on Saturday and Sunday hours between 22 and 1.
example5 = | xmSuppressSignal MODEL_NAME MyModel TYPE taxonomy SIGNAL_TYPE RuleAnomaly TAXONOMY_ID myAction~myProcess~myField
comment5 = This example suppressed signal type RuleAnomaly for model MyModel and actor jstewart for partially qualified taxonomy myProcess~myField. Since the taxonomy is partially qualified (missing the actorId part of taxonomy) it applies to all actors.
example6 = | xmSuppressSignal MODEL_NAME MyModel TYPE taxonomy ACTOR_ID jstewart SIGNAL_TYPE RuleAnomaly PROPERTY_NAME "rule.package.name|"rule.set.name" PROPERTY_VALUE "myRulePackage|my rule set"
comment6 = This example suppressed signal type RuleAnomaly for model MyModel and actor jstewart where the signal contains property values rule.package.name=myRulePackage and rule.set.name=my rule set. This type of suppression is defined as taxonomy since it's at a low level of granularity but technically uses signal attributes to define what signals to suppress instead of the signal's taxonomyId.
usage = public

[xmunsuppresssignal-command]
syntax = | xmUnSuppressSignal modelName TYPE (default | model | actor | taxonomy) SIGNAL_TYPE signalType [ACTOR_ID actorId] [TAXONOMY_ID [Actor~]Action~Process~Field]
shortdesc = This command removes a previously provisioned signal suppression.
description = This command is used to remove a previously configured signal suppression, an error will be returned if the signal suppression could not be found. The actual parameters passed is defined by the type of suppression being removed.
example1 = | xmUnsuppressSignal TYPE default SIGNAL_TYPE RuleAnomaly
comment1 = This example removes the default suppression for signal type RuleAnomaly.
example2 = | xmUnsuppressSignal MODEL_NAME MyModel TYPE model SIGNAL_TYPE RuleAnomaly
comment2 = This example removes a previously provisioned model signal suppression for signal type RuleAnomaly.
example3 =  | xmUnSuppressSignal MODEL_NAME MyModel TYPE actor SIGNAL_TYPE RuleAnomaly ACTOR_ID jstewart
comment3 = This example removes a previously provisioned actor signal suppression for signal type RuleAnomaly and actor jstewart.
example4 = | xmUnSuppressSignal MODEL_NAME myModel TYPE taxonomy SIGNAL_TYPE RuleAnomaly TAXONOMY_ID myAction~myProcess~myField]
comment4 = This example removes a previously provisioned taxonomy signal suppression for model myModel for signal type RuleAnomaly. In this case the previously provisioned suppression was partially qualified meaning it applies to all actors, this example shows how to remove a partically qualified taxonomy suppression.
example5 = | xmUnSuppressSignal MODEL_NAME myModel TYPE taxonomy SIGNAL_TYPE RuleAnomaly TAXONOMY_ID myActor~myAction~myProcess~myField]
comment5 = This example removes a previously provisioned taxonomy signal suppression for model myModel for signal type RuleAnomaly, actor jstewart, action myAction, process myProcess, and field myField or fully qualified taxonomy of myActor~myAction~myProcess~myField.
usage = public

[xmlistsignalsuppressions-command]
syntax = | xmListSignalSuppressions [TYPE (default | model | actor | taxonomy)] [MODEL_NAME modelName] [ACTOR_ID actorId]
shortdesc =  This command lists signal suppressions provisioned in the system.
description = This command lists signal suppressions provisioned in the system.
example1 = | xmListSignalSuppressions
comment1 = This example will list all registered signal suppressions
example2 = | xmListSignalSuppressions MODEL_NAME myModel
comment2 = This example will list signal suppressions model 'myModel'.
example3 = | xmListSignalSuppressions TYPE default
comment3 = This example will list all signal suppressions of type DEFAULT.
example4 = | xmListSignalSuppressions TYPE model MODEL_NAME myModel.
comment4 = This example will list all signal suppressions of type MODEL that exist in model 'myModel'.
example5 = | xmListSignalSuppressions MODEL_NAME myModel ACTOR_ID myActor
comment5 = This example will list all signal suppressions that exist in model 'myModel' for actor 'myActor'.
usage = public

[filtersuppressedsignals-command]
syntax = index=scm_signal ... | filterSuppressedSignals
shortdesc =  This command reads signal as input and applies provisioned signal suppression rules against each signal received and outputs signals that are not suppressed.
description = This command reads signal as input and applies provisioned signal suppression rules against each signal received and outputs signals that are not suppressed. The suppression configuration to apply is identified using the modelName in the signal. This command should be used by commands that receive as input signals to ensure that signals that are suppressed are not included as input.
example1 = index=scm_signal modelName=BL category=ANOMALY | filterSuppressedSignals | xmDetectHazards BL STARTDATE "06/01/2016 00:00:00 ENDATE "06/02/2016 00:00:00"
comment1 = This example shows how filterSuppressedSignals should be included in the search pipeline to filter suppressed signals. In this the search will return all signals with category of anomaly, which are then filtered by filterSuppressedSignals. The signals that are not suppressed will then be received and processed by xmDetectHazards.
related = xmListSignalSuppressions, xmSuppressSignal, xmUnSuppressSignal
usage = public

[xmrunrelevancyengine-command]
syntax = index=scm_relevancy_graph | xmRunRelevancyEngine [MODEL_NAME_COLUMN modelName] [GRAPH_NAME_COLUMN graph] [GRAPH_NODE_COLUMN node] [NORMALIZED_CIX_COLUMN normalizedCIX] [ABSOLUTE_CIX_COLUMN absoluteCIX] [TIME_COLUMN_NAME instanceTime] [ALGORITHM (linear | quadratic)] [HISTORICAL_DEPTH 2-N] [PREDICTION_RANGE 1-N]
shortdesc = This is a long running (stateful) Splunk command that should be ran against a search that is realtime (all time) to effectively tail the relevancy graph index to receive graph updates will add statistics to the relevancy graph output over time.
description = This is a long running (stateful) Splunk command that should be ran against a search that is realtime (all time) to effectively tail the relevancy graph index to receive graph updates will add statistics to the relevancy graph output over time. The statistics returned include cixDelta, cixTrend (rate of change), cixVelocity (rate of rate of change), and cixPrediction of the future value for both the normalized and absolute CIX values found in a relevancy graph instance. This command is intended for use by a UI that can show current state of relevancy graphs that exist in the system. The graph instances tracked by the command are generated by the xmRunRelevancyGraph command (described above). If supplied the name of the columns monitored can be modified, all commands that end in 'COLUMN' are used to control this. In addition, various facets of the algorithm used to generated output can also be manipulated. The ALGORITHM parameter which accepts linear (default) or quadratic describe how trend, velocity, and prediction will be calculated. The historical depth (default 20) tells the command the maximum number of historical CIX values will be maintained and used to calculate results. Last, the prediction range parameter indicates how many time periods in the future (1 by default) will be used to generate the predicted value of normalized and absolute CIX. The screen shot below shows the content of a single row of data output by this command (using default values of all parameters).
example1 = index=scm_relevancy_graph | xmRunRelevancyEngine
comment1 = This example uses default values to monitor and append normalized and absolute CIX delta, trend, velocity, and prediction for relevancy graph instance normalized and absolute CIX values over time.
example2 =  index=scm_relevancy_graph | xmRunRelevancyEngine ALGORITHM quadratic HISTORICAL_DEPTH 10 PREDICTION_RANGE 2
comment2 = This example uses default relevancy graph instance column names but specifies use of the quadratic algorithm, a historical depth of 10, and prediction value of 2 indicating that the prediction should be made for 2 time periods in the future.
related = xmRunRelevancyGraph
usage = public

[xmgeneratefuzzyclusters-command]
syntax = search | xmGenerateFuzzyClusters CLUSTER_NAME clusterName FEATURE_COLUMN_NAMES "featureCol1|featureCol2|..." [CATEGORY_COLUMN_NAMES "categoryCol1|categoryCol2|..." CENTER_NAMES "centerName1|centerName2|..." FEATURE_STATS "featureCol1=min:max:avg:stdev:median|featureCol2=min:max:avg:stdev:median|..." [CATEGORY_MAPPINGS categoryCol1=minValue:incrementBy:value1~value2~value3~...|categoryCol2=minVlaue:incrementBy:value3~value4~value5|...] [SEARCH "URLEncodedSearch"] [UPDATE (true | false)] [PERSIST (true | false)] [CLUSTER_PROP "prop1=value1|prop2=value2|..."] [ALGORITHM (k-means | c-means | adaptive)]
shortdesc = This command is used to generate and persist fuzzy cluster centers using search data supplied, by default the k-means algorithm will be used.
description = This command is used to generate and persist fuzzy cluster centers using search data supplied, by default the k-means algorithm will be used. The persisted cluster and it's centers can then be used by the xmListFuzzyClusterMemberships to test membership of like data against the cluster. The feature columns supplied MUST contain numeric data. This command also supports categorical fields which are fields that contain enumerated string values. This command requires that statistics of the supplied data be provided as command line parameter in the FEATURE_STATS parameter for each input feature column that will be processed. This information includes min, max, average, standard deviation, and median. This information can be derived by doing a search against the data (using the same time frame) with | stats min(col) max(col) avg(col) stdev(col) median(col). When CATEGORY_COLUMN_NAMES are supplied, use the CATEGORY_MAPPINGS paramter to communicate possible values that can be found in each categorical field. The update command parameter (if supplied with a value of true) will be used to merge results of the current cluster operation with the existing cluster in the database, the default for this parameter is false. The persist parameter specifies if the results should be persisted, the default is true. If false is provided then the results will not be persisted and the result of the operation will be returned.
example1 = index=small-cluster-data  | xmGenerateFuzzyClusters CLUSTER_NAME smallDataCluster FEATURE_COLUMN_NAMES "tasks|length" CENTER_NAMES "one|two" FEATURE_STATS "tasks=10:1003:505.9:521.88:1000|length=20:2002:1010.80:1043.55:2000.00" SEARCH "index%3Dsmall-cluster-data" UPDATE false PERSIST true
comment1 = This command takes output from search 'index=small-cluster-data' and genreate a fuzzy cluster named 'smallDataCluster' with two centers named 'one' and 'two'. The FEATURE_STATS command is fileld out with statsitics of the search data derived using the '| stats' command against the same set of data. The cluster generated in this example will be persisted, if a cluster with the same name exists it will be over written.
example2 = index=small-cluster-data  | xmGenerateFuzzyClusters CLUSTER_NAME smallDataCluster FEATURE_COLUMN_NAMES "tasks|length" CENTER_NAMES "one|two" FEATURE_STATS "tasks=10:1003:505.9:521.88:1000|length=20:2002:1010.80:1043.55:2000.00" SEARCH "index%3Dsmall-cluster-data" UPDATE true
comment2 = This command takes output from search 'index=small-cluster-data' and genreate a fuzzy cluster named 'smallDataCluster' with two centers named 'one' and 'two'. The FEATURE_STATS command is fileld out with statsitics of the search data derived using the '| stats' command against the same set of data. The cluster generated in this example will be persisted, in this example the results will be merged with the cluster stored in the data store (if it exists).
example3 = index=pos-data | xmGenerateFuzzyClusters CLUSTER_NAME PosData FEATURE_COLUMN_NAMES "ITEMS|SALE" CATEGORY_COLUMN_NAMES "PAYMETHOD|PROMOAPPLIED" CENTER_NAMES "one|two|three" FEATURE_STATS "ITEMS=1:4:0:0:0|SALE=1.51:4.99:0:0:0" CATEGORY_MAPPINGS "PAYMETHOD=10:10:LOYALTY~CREDITCARD~CASH|PROMOAPPLIED=100:100:0~501~502~503~504~505~506~509"
comment3 = This example shows usage of both feature (numeric) and categoical (enumerated string) columns. The feature columns are ITEMS and SALE, the FEATURE_STATS attribute defines the min,max,avg,stdev,and median values for these colunms. The categorical columns are PAYMETHOD and PROMOAPPLIED. The CATEGORY_MAPPINGS parameter defines the values that can be found in PAYMETHOD and PROMOAPPLIED and how they should be mapped to numeric values when generating centers (this command) and testing data for membership with centers (done by getFuzzyClusterMembership). In this example, the PAYMETHOD categorical column can have values LOYALTY, CREDITCARD, and CASH which will be mapped as follows (as defined by minValue and incrementBy): LOYALTY=10, CREDITCARD=20, CASH=30. The same logic will be applied to the PROMOAPPLIED column. Note that PROMOAPPLIED is being mapped in this example (even though it's a numeric field) to smooth out the values found in the field and to allow the value '0' naturally found in the data to be included in the clustering process using the same proportion as other values (501,502,etc).
related = getFuzzyClusterMembership, xmListFuzzyClusters, xmListFuzzyCluster, xmRemoveFuzzyCluster
usage = private

[pregeneratefuzzyclusters-command]
syntax = | preGenerateFuzzyClusters FEATURE_COLUMN_NAMES "featureCol1|featureCol2|..." [CATEGORY_COLUMN_NAMES "categoryCol1|categoryCol2|..." CENTER_NAMES "centerName1|centerName2|..." FEATURE_STATS "featureCol1=min:max:avg:stdev:median|featureCol2=min:max:avg:stdev:median|..." [CATEGORY_MAPPINGS categoryCol1=minValue:incrementBy:value1~value2~value3~...|categoryCol2=minVlaue:incrementBy:value3~value4~value5|...] [ALGORITHM (k-means | c-means | adaptive)]
shortdesc = This command is the pre-op xmGeneateFuzzyClusters uses to spread the load of cluster generation across 1..N indexers.
description = This command is the pre-op xmGeneateFuzzyClusters uses to spread the load of cluster generation across 1..N indexers. The results of each instance of this command are returned to xmGeneateFuzzyClusters to be aggregated and used to generate cluster centers derived from the dataset processed. See xmGeneateFuzzyClusters for more detailed information.
example1= index=small-cluster-data  | xmGenerateFuzzyClusters FEATURE_COLUMN_NAMES "tasks|length" CENTER_NAMES "one|two" FEATURE_STATS "tasks=10:1003:505.9:521.88:1000|length=20:2002:1010.80:1043.55:2000.00"
comment1= This command takes output from search 'index=small-cluster-data' and genreate a fuzzy cluster named 'smallDataCluster' with two centers named 'one' and 'two'. The FEATURE_STATS command is fileld out with statsitics of the search data derived using the '| stats' command against the same set of data.
related = xmGenerateFuzzyClusters
usage = public

[xmlistfuzzyclusters-command]
syntax = | xmListFuzzyClusters
shortdesc = This command is used to list a summary of all clusters found in the data store created by the xmGenerateFuzzyCluster command.
description = This command is used to list a summary of all clusters found in the data store created by the xmGenerateFuzzyCluster command.
example1 = | xmListFuzzyClusters
comment1 = This example will list a summary of all clusters found in the data store created by the xmGenerateFuzzyCluster command.
related = xmGenerateFuzzyClusters, xmListFuzzyCluster, xmRemoveFuzzyCluster, getFuzzyClusterMembership
