[xmlistcontext-command]
syntax = | xmListContext [CONTAINER containerName] [NAME contextName] [CLASS className] [LIMIT maxToReturn]
shortdesc = This command lists contexts using supplied search criteria.
description = This command list contexts using supplied search critera. The CONTAINER option can be modelName or __APPLICATION__ for system global contexts. The name and class options support wildcard (*) to find contexts that contain the specified text. The limit option is used by limit the number of results returned. If limit is used, the totalCount column is used to report the number of records that matched search criteria. Using limit 0 will return all contexts and if not specified limit will default to 100.
example1 = | xmListContext CONTAINER INTL_SALES
comment1 = This example will display all contexts associated with the container "INTL_SALES"
example2 = | xmListContext CONTAINER __APPLICATION__ NAME *Severity
comment2 = This example will display all contexts associated with the container "__APPLICATION__" and name that contains 'Severity'.
example3 = | xmListContext CLASS actor1*
comment3 = This example will display all contexts with 'actor1' in the context's class.
example4 = | xmListContext LIMIT 10
comment4 = This example will display the first 10 contexts.
related = xmDisplayContext, xmDisplayContextAttributes, xmDeleteContext, xmCreateDDContext, xmCreateCDContext, xmCreateUDContext
usage = public

[xmdisplaycontext-command]
syntax = | xmDisplayContext CONTAINER <containerName> CONTEXT <contextName> [CLASSNAME <className>] [DOMAIN_MIN minValue DOMAIN_MAX maxValue] <application-option>
shortdesc = This command displays the detail of a context.
description = This command display the detail of a context. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command. Note that there are special contexts used by applications that reside in container __APPLICATION__, xmListContext __APPLICATION__ to see a complete listing of these contexts.
example1 = | xmDisplayContext CONTAINER INTL_SALES CONTEXT *TxnAmt APPLICATION XVAW
comment1 = This example will display the context "*TxnAmt" from the container INTL_SALES in application XVAW
example2 = | xmDisplayContext CONTAINER INTL_SALES CONTEXT *TxnAmt DOMAIN_MIN 10 DOMAIN_MAX 100 APPLICATION XVCS
comment2 =  This example will display the context "*TxnAmt" from the container INTL_SALES and application XVCS then over-ride domain min and domain max to have values 10 and 100
related = xmListContext,xmDisplayContextAttributes,xmDeleteContext,xmCreateDDContext
usage = public

[xmdisplaycontextattributes-command]
syntax = | xmDisplayContextAttributes CONTAINER <containerName> CONTEXT <contextName> [CLASSNAME <className>] <application-option>
shortdesc = This command displays the attributes of a context.
description = This command display the attributes of a context. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command.
example1 = | xmDisplayContextAttributes CONTAINER INTL_SALES CONTEXT *TxnAmt APPLICATION XVOE
comment1 = This example will display the attributes for the named context "*TxnAmt" from the container INTL_SALES in application XVOE.
