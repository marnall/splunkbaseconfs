[xmcreatesavedsearch-command]
syntax = | xmCreateSavedSearch name=<string> search=<string> app=<string> earliest_time=<string> latest_time=<string> cron=<string>
shortdesc = This command creates a saved search in Splunk associated with the Platform.
description = This command creates a saved search in Splunk associated with the Platform.
example1 = | xmCreateSavedSearch app="bv_xr" name="Analysis_TEST_ANET_Authentication_Acquire" search="| datamodel Authentication Authentication search  | fields _time Authentication.action Authentication.app Authentication.dest Authentication.src Authentication.user| eval data_dictionary=\"Authentication\" | xmAcquireEvents model ANET APPLICATION XVAW SIGNALPROPS \"dataDictionary=Authentication\" DISCOVER_ACTORS true NEW_ACTOR_CRITICALITY 8 DISCOVER_ASSETS true NEW_ASSET_CRITICALITY 8 GRAPH_TYPE AGGREGATE  ANALYSISNAME \"TEST\"" cron="" earliest_time="-15m" latest_time="now"
comment1 = This example creates a saved search named "Analysis_TEST_ANET_Authentication_Acquire" that could acquire authentication events.
related = xmVerifyAssets,xmListActors,xmListAssets
usage = public

[xmcreateudcontext-command]
syntax = xmCreateUDContext name string terms "string(,string)*" count int [class "string(,string)*"] [container string] [endshape (curve|linear)] [notes string] [read string] [scope (private|app)] [search string] [shape (pi|trapezoid|triangle|curveincrease|curvedecrease|linearincrease|lineardecrease)] (type average_centered avg double stdev double | type domain min double max double) [uom string] [write string] <application-option>
shortdesc = Creates a context, which contains concepts based on a variety of methods of mapping qualitative semantics to the data. This is a Splunk 'generating' command.
description = Creates a 'User Defined' Context with the specified parameters.  The fields type, avg, count, stdev, min, and max must be passed in as parameters.  If the type is 'domain', then the fields avg and stdev will be ignored.  If the type is 'average_centered', then the fields count, min and max will be ignored.
comment1 = Creates an Average-centered Context, centered at 0, with 3 terms (early, ontime, late) using minutes as the unit of measure (UOM)
example1 = ... | xmCreateUDContext APPLICATION XVAW NAME ArrDelay TERMS "early,ontime,late" TYPE average_centered AVG 0 COUNT 10000 STDEV 30 MAX 100 MIN 0 UOM minutes
comment2 = Creates an Domain Context with the min/max and count specified, the unit of measure is minutes.
example2 = ... | xmCreateUDContext APPLICATION XVCS NAME AirTime TYPE domain TERMS "minimal,short,medium,long,extended" AVG 0 STDEV 0 MIN 60 MAX 1400 COUNT 1000 UOM minutes
related = xmCreateDDContext, xmCreateCDContext
usage = public

[findbestconcept-command]
syntax = someSearch | findBestConcept FIELD inputFieldName FROM contextName IN containerName [BY classField1[,classField2]] AS outputFieldName";
shortdesc = Returns the name of the concept that best fits (highest compatability) with the value found in field, as well as the associated compatibility index (CIX).
description = For each event, lookup the value of a field and return the most relevant (highest compatible) concept in a context as well as the compatibility index (CIX). The field "BestConcept" will contain the concept name. The field "BestCIX" will contain the associated compatibility index.  If outputField is specified, it is used instead of "BestConcept" and "BestCIX" is replaced with the value of outputField + "CIX. When the BY clause if specified it will contain a comma separated list of class fields in order they are used to create the associated contexts."
example1 = ... | findBestConcept FIELD signalIntensity FROM CIX IN __APPLICATION__
comment1 = In each event, determines the most compatible Concept for the value of 'signalIntensity' in the Context 'CIX' and containerName '__APPLICATION__'.
example2 = ... | findBestConcept FIELD bytes_out FROM bytes_out IN ExtremeRules BY "src_ip,dest_port" AS BytesOutBestConcept
comment2 = In each event, determines the most compatible Concept for the value of 'bytes_out' in the Context 'bytes_out' and containerName 'ExtremeRules'. This example will generated the context's className using values from src_ip and dest_port (<src_ip>:<dest_port>).
related = xmCreateCDContext, xmCreateUDContext, xmCreateDDContext
usage = public

[xmfindmodelactors-command]
syntax = | xmFindModelActors modelName searchString
shortdesc = This command is used to find actorIds from that reside in the specified model that match search string supplied.
description = This command is used to find actorIds from that reside in the specified model that match search string supplied. The searchString parameter contains one or more characters to use when searching the model's actor list. This command will return all actors that contain the list of characters supplied in searchString.
