[xmdeactivatemodel-command]
syntax = xmDeactivateModel modelName
shortdesc = This command deactivates a model in the Scianta Cognitive Modeler Framework.
description = This command deactivates a model in the Scianta Cognitive Modeler Framework. If a model is inactive, then certain commands (xmRunActorSequence, xmRunActorBehaviorAnalysis, etc) will no longer function as the model must have an active state for these commands to function.
comment1 = This example deactivates an existing model named 'BL'.
example1 = | xmDeactivateModel BL
related = xmActivateModel, xmResetModel
usage = public

[xmdeleteactor-command]
syntax = xmDeleteActor actorid [modelName]
shortdesc = This command will delete the actor identified by ACTORID in the specified model, the ACTORID can be either the primaryId or one of actor's the alternateIds.
description = This command will delete the actor identified by ACTORID in the specified model, the ACTORID can be either the primaryId or one of actor's the alternateIds. If model is not supplied, then the actor is assumed to be global or has an empty modelName. Global actors can be applied to any model they are referenced by. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command.
example1 = | xmDeleteActor atristler
comment1 = This example deletes the 'atristler' global actor.
example2 = | xmDeleteActor atristler ANET
comment2 = This example deletes the 'atristler' actor associated with model ANET.
related = xmGetActor, xmListActors, xmSetActor
usage = public

[xmdeleteanalysisconfiguration-command]
syntax =  xmDeleteAnalysisConfiguration analysis=<string> model=<string> app=<string>
shortdesc = This command will delete the analysis configuration identified by ANALYSIS for the specified MODEL and APP. A user must have SCM_POWER or SCM_USER role to use this command.
description = This command will delete the analysis configuration identified by ANALYSIS for the specified MODEL and APP. A user must have SCM_POWER or SCM_USER role to use this command.
example1 = xmDeleteAnalysisConfiguration analysis=Find_Bad_Actors, model=BL app=bv_xr
comment1 = This example deletes the analysis Find_Bad_Actors for the model BL.
related = xmGetAnalysisConfiguration, xmListAnalysisConfigurations, xmSetAnalysisConfiguration
usage = public

[xmdeleteasset-command]
syntax = xmDeleteAsset asset=<string> [model=<string>]
shortdesc = This command will delete the asset identified by ASSET and optionally model. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command.
description = This command will delete the asset identified by ASSET and optionally model.  If model is not supplied, then the asset is assumed to be global or has an empty modelName. Global assets can be applied to any model they are referenced by The ASSET can be either the id or one of the alternativeIds. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command.
example1 = xmDeleteAsset asset=XX.XX.XX.XX
comment1 = This example deletes the asset identified by 'XX.XX.XX.XX'.
related = xmGetAsset, xmListAssets, xmSetAsset
usage = public

[xmdeletecategory-command]
syntax = xmDeleteCategory categoryName
shortdesc = This command deletes an existing category from the list of supported categories in the Scianta Cognitive Modeler Framework. A user must have SCM_ADMIN role to use this command.
description = This command deletes an existing category from the list of supported categories in the Scianta Cognitive Modeler Framework. A user must have SCM_ADMIN role to use this command.
comment1 = This example deletes the category "employee".
example1 = | xmDeleteCategory employee
related = xmAddCategory, xmListCategories
usage = public

[xmdeleteresourcemapping-command]
syntax = xmDeleteResourceMapping mappingName
shortdesc = This command will remove an existing resource mapping. A user must have SCM_POWER role to use this command.
description = This command will remove an existing resource mapping. A user must have SCM_POWER role to use this command.
comment1 = This example delete an existing mapping named 'Splunk_ES_Actor_To_Asset'.
example1 = | xmDeleteResourceMapping Splunk_Es_Actor_To_Asset
related = xmCreateResourceMapping, xmGetResourceMapping, xmListResourceMappings, xmMapResources
usage = public

[xmdeletesavedsearch-command]
syntax = xmDeleteSavedSearch name=<string> app=<string>
shortdesc = This command will delete the saved search identified by NAME and APP. A user must have SCM_POWER or SCM_USER role to use this command.
description = This command will delete the saved search identified by NAME and APP. A user must have SCM_POWER or SCM_USER role to use this command.
example1 = | xmDeleteSavedSearch name=BL_Run_Searches app=bv_xr
comment1 =  This example will delete the saved search named 'BL_Run_Searches'
related = xmGetSavedSearches, xmRunSearches, xmSetSavedSearches
usage = public

[xmdetecthazards-command]
syntax = xmDetectHazards modelName startdate <date-or-epoch-option> enddate <date-or-epoch-option> <analysis-option>?
shortdesc = This command analyzes anomaly signals from threshold, actor sequence, or any other signal that references a terrain to determine if any actor level hazards exist. A user must have SCM_USER role to use this command.
description = This command analyzes anomaly signals from threshold, actor sequence, or any other signal that references a terrain to determine if any actor level hazards exist. A STARTDATE and ENDDATE must be specified either in the date string format or as an epoch. If ANALYSISNAME is specified, only the signals with 'analysisname' set to this value are used.  Signals will be emitted if hazards are discovered along with assets associated with the hazard. A user must have SCM_USER role to use this command.
comment1 = This example runs Hazard Detection for an existing model named 'BL' analyzing anomalies generated on 06/01/2016.
example1 = | xmDetectHazards BL STARTDATE "06/01/2016 00:00:00 ENDATE "06/02/2016 00:00:00"
related = xmDetectThreats, xmRunActorBehaviorAnalysis, xmRunActorDayOfWeekAnalysis, xmRunActorSequence, xmRunNaturalPeerAnalysis
usage = public

[xmdetectthreats-command]
syntax = xmDetectThreats modelName startdate <date-or-epoch-option> enddate <date-or-epoch-option> <analysis-option>?
shortdesc = This command analyzes signals from hazard analysis and determines if an actor and/or asset threats exist. A user must have SCM_USER role to use this command.
description = This command analyzes signals generated from hazard analysis and determines if an actor and/or asset threats exist.  A STARTDATE and ENDDATE must be specified either in the date string format or as an epoch. If ANALYSISNAME is specified, only the signals with 'analysisname' set to this value are used.  Signals will be emitted if threats are discovered along with assets associated with the threat. A user must have SCM_USER role to use this command.
comment1 = This example runs Threat Detection for an existing model named 'BL' analyzing Hazard anomalies generated over a day.
example1 = | xmDetectThreats BL STARTDATE "06/01/2016 00:00:00" ENDATE "06/02/2016 00:00:00"
related = xmDetectHazards
usage = public

[rundistributedcmd-command]
syntax = | runDistributedCmd CMD urlEncodedCmd [targets "idx-host-1,idx-host-2,idx-host-3"]
shortdesc = This command receives an url encoded command stanza and executes the command on all compute servers (indexers) specified in targets or all if targets not supplied.
description = This command receives an url encoded command stanza and executes the command on all compute servers (indexers) specified in targes or all if targets not supplied. The following is a list of commands supported by runDistributedCmd: echo, list-data-dictionary, list-data-definition, create-data-definition, update-data-definition, delete-data-definition,list-properties, update-properties, run-peer-analysis, run-threshold-analysis, run-actor-behavior-analysis, run-actor-day-of-week-analysis, run-actor-sequence, calculate-information-density, and calculate-thresholds.
comment1 = This example invokes runDistributedCmd on the search head to and runs the echo command on all compute servers. The echo command can be used to discover which compute nodes are available to process requests. 
example1 = | runDistributedCmd cmd %20%5Becho%5D%0A | table *
comment2 = This example invokes runDistributedCmd on the search head to retrieve a listing of scm-framework.properties.
example2 = | localop | runDistributedCmd cmd %5blist-properties-file%5d%0afilename%3d..%2flookups%2fscm-framework.properties%0a | table *
comment3 = This example invokes runDistributedCmd on the search head to retrieve a listing of data dictionaries.
example3 = | localop | runDistributedCmd cmd %5blist-data-dictionary%5d%0aapp-directory%3d..%2f..%2fbv_xr%2flookups%0afilename%3d" + fileName + "%0a | table *
comment4 = This example invokes runDistributedCmd on the search head to retrieve details on a single data dictionary.
example4 = | localop | runDistributedCmd cmd %5blist-data-definition%5d%0aapp-directory%3d..%2f..%2fbv_xr%2flookups%0afilename%3ddata-dictionary.json%0adefinitionName%3d" + name + "%0a | table *
usage = public

[xmdispatchcmd-command]
syntax = | xmDispatchCmd cmd urlEncodedCmd
shortdesc = This command works like runDistributedCmd except the supplied command will only run on the search head.
description = This command works like runDistributedCmd except the supplied command will only run on the search head and not across all specified or configured compute servers. See runDistributedCmd for more details.
example1 = | xmDispatchCmd CMD %5becho%5d%
comment1 = This example will run the echo command on the search head, in this case the command will return a standard message indicating the command was successfully invoked.
related = runDistributedCmd
usage = public

[xmgetactor-command]
syntax = xmGetActor id=<string> [model=<string>] [exact=(true|false)]
shortdesc = This command will retrieve details for the actor identified by ID optionally associated to a model. The ID can be either the primaryId or one of the alternateIds of the actor.
description = This command will retrieve details for the actor identified by ID optionally associated to a model. The ID can be either the primaryId or one of the alternateIds of the actor. By default, if an actor with the specified modelName does not exist the global actor (empty modelName) will be returned if it exists. Use exact=true to force an exact match of id and model.
example1 = | xmGetActor id=atristler
comment1 = This exmaple will retrieve details for the global actor 'atrisler'.
example2 = | xmGetActor id=atristler model=ANET
comment2 = This exmaple will retrieve details for the actor 'atrisler' associated with model ANET or the global actor 'atrisler' if the model specific actor does not exist.
example3 = | xmGetActor id=atristler model=ANET exact=true
comment3 = This exmaple will retrieve details for the actor 'atrisler' associated with model ANET if the actor exists.
related = xmDeleteActor, xmListActors, xmSetActor
usage = public

[xmgetactorsequence-command]
syntax = xmGetActorSequence modelName actor actorId ((<fromdate-option> <todate-option>)|(<taxonomyid-option> <eventtime-option> <numnodes-option>? <numnodesafter-option>?))
shortdesc = This command will list an actor’s sequence of events. A user must have SCM_USER role to use this command. A user must have SCM_USER role to use this command.
description = This command will list an actor’s sequence of events. A FROMDATE and TODATE can be used to obtain events between two dates. Alternatively, you can specify a particular event by TAXONOMYID and EVENTTIME and then specify the NUMNODES before and NUMNODESAFTER afterwards. A user must have SCM_USER role to use this command. A user must have SCM_USER role to use this command.
comment1 = This example retrieves the sequence of activities from the BL model for actor atrisler on 06/02/2016.
example1 = | xmGetActorSequence BL ACTOR atrisler FROMDATE "06/01/2016 00:00:00" TODATE "06/02/2016 00:00:00"
comment2 = This example retrieves the sequence of activities from the BL model for actor atrisler displaying 3 events before and after a particular event.
example2 = | xmGetActorSequence BL ACTOR atrisler taxonomyid atrisler~Authentication~desktop~failure eventtime numnodes 3 numnodesafter 3
related = xmListActorSequence,xmQueryActorSequence
usage = public

[xmgetanalysisconfiguration-command]
syntax = xmGetAnalysisConfiguration  name=<string> app=<string>
shortdesc = This command will retrieve analysis configuration information identified by NAME and APP. A user must have SCM_POWER or SCM_USER role to use this command.
description = This command will retrieve analysis configuration information identified by NAME and APP. A user must have SCM_POWER or SCM_USER role to use this command.
