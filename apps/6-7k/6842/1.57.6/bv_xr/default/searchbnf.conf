example1 = | xmListFuzzyCluster CLUSTER_NAME smallDataCluster
comment1 = This example will list the details of a cluster named smallDataCluster.
example2 =  | xmListFuzzyCluster CLUSTER_NAME smallDataCluster VERBOSE
comment2 = This example will list the details of a cluster named smallDataCluster along with extra detail such as the statistics and seed values used to generate the cluster.
