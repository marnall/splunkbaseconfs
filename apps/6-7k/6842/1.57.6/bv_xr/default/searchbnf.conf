[getfuzzyclustermembership-command]
syntax = search | getFuzzyClusterMembership CLUSTER_NAME clusterName
shortdesc = This command is used to test data returned from a search for membership with the specified cluster created with the xmGenreateFuzzyClusters command.
description = This command is used to test data returned from a search for membership with the specified cluster created with the xmGenreateFuzzyClusters command. This is accomplished by comparing feature data values from each record (as specified in the cluster named on command line) with each cluster center for membership. This command will append columns to the data stream returned that provide a membership CIX value for each center defined in output. For example, if the cluster tested against defines three centers named 'one', 'two', and 'three' the output would have columns 'one_cix', 'two_cix', and 'three_cix' added to the output for each row processed. The CIX values (0-1) describe how closely the record is to the each of the center values with 0 being not at all related and 1 being an exact match.
example1 = index=small-cluster-data | getFuzzyClusterMembership CLUSTER_NAME smallDataCluster
comment1 = This example will test each row from the search supplied for membership with the centers defined in the cluster named smallDataCluster. The membership CIX (value between 0 and 1) for the row with each center will be added to the output.
related = xmGenerateFuzzyClusters, xmListFuzzyClusters, xmListFuzzyCluster, xmRemoveFuzzyCluster
usage = public

[xmlearntransactionsequence-command]
syntax = search | xmLearnTransactionSequence MODEL_NAME modelName TRANSACTION_NAME transactionName SEQUENCE_NAME pathName (referenceKeyField | startsWithField fieldName startsWithValue regEx endsWithField fieldName endsWithValue regEx) [GENERATE_INSTANCES (true | false)] [DETECT_ANOMALIES (true | false)] [DROP_DUPLICATES (true | false)] [NEW_PATH_ANOMALY_CIX numericValue] [ANOMALY_CIX_ALPHACUT numericValue] [PROPS prop1=value1|prop2=value2|prop3=value3] [SIGNALPROPS prop1=value1|prop2=value2|...] [ANALYSISNAME name]
shortdesc = This command takes output from the scm_terrain_event index sorted by time and grouped by actorId to learns transaction paths associated with the named transction object passed.
description = This command takes output from the scm_terrain_event index sorted by time and grouped by actorId to learns transaction paths associated with the named transaction object passed. The command should be invoked 1 time with DETECT_ANOMALIES false and GENERATE_INSTANCES false to learn the base set of paths that exist in the system. Subsequent invocations should be ran with GENERATE_ANOMALIES true and GENERATE_INSTANCES true to generate instance records which audit each path traversal found and detect anomalies for each path traversal. Note that the graphs created by this command can be viewed using the xmListGraph command or removed by the xmRemoveGraph (using GRAPH_TYPE TRANSACTION_PATH).  The NEW_PATH_ANOMALY_CIX is used to automaically assign a CIX (numeric value 0 through 1) to newly discovered paths. The ANOMALY_CIX_ALPHACUT parameter is used to define a CIX value that would constitute an anomalous path when DETECT_ANOMALIES true is used.
example1 = search | xmLearnTransactionSequence TRANSACTION_NAME myTransaction MODEL_NAME INTL_SALES SEQUENCE_NAME myPath GENERATE_INSTANCES false DETECT_ANOMALIES false
comment1 = This command discovers and increments counts for paths for a transaction named myTransaction from the INTL_SALES model creating tranaction paths named 'myPath'. This usage should be used the first time paths are discovered for a transaction object since instances (stored in scm_transaction_instance index) are not generated and anomalies are not detected.
example2 = search | xmLearnTransactionSequence TRANSACTION_NAME myTransaction MODEL_NAME INTL_SALES SEQUENCE_NAME myPath GENERATE_INSTANCES true DETECT_ANOMALIES true NEW_PATH_ANOMALY_CIX 0.9 ANOMALY_CIX_ALPHACUT 0.9
comment2 = This command tests and increments counts for paths for a transaction named myTransaction from the INTL_SALES model creating tranaction paths named 'myPath'. This usage example describes how to test paths after they have been initially learned from the prior usage example. In this case, any newly discovered paths will be assigned a CIX value of 0.9 and any paths traversed with a CIX value >= 0.9 will result a TransactioPathAnomaly signal being generated.
related = xmListTransactions, xmListTransactionSequence, xmRemoveTransactionSequence, xmListGraphs
usage = public

[xmremovetransaction-command]
syntax =  | xmRemoveTransaction MODEL_NAME modelName NAME transactionName
shortdesc = This command removes a transaction along it's associated TRANSACTION_PATH graphs and instance records from the scm_transaction_instance Splunk index.
description = This command removes a transaction along it's associated TRANSACTION_PATH graphs and instance records from the scm_transaction_instance Splunk index
example1 = | xmRemoveTransaction MODEL_NAME INTL_SALES NAME myTransaction
comment1 = This example will remove a transaction named myTransaction from model INTL_SALES
related = xmCreateTransaction, xmListTransactions
usage = public

[xmlisttransactions-command]
syntax = | xmListTransactions [MODEL_NAME modelName [NAME transactionName]]
shortdesc = This command is used to list transactions created by the xmLearnTransactionSequence command.
description = This command is used to list transactions created by the xmLearnTransactionSequence command. The command can be ran w/out any arguments to list transactions across all models, with MODEL_NAME to list transactions that reside in a specific model, or with MODEL_NAME and NAME to list a specific transaction.
example1 = | xmListTransactions
comment1 = This example will list transactions across all models
example2 = | xmListTransactions MODEL_NAME myModel
comment2 = This example will list transactions that reside in model myModel
example3 = | xmListTransactions MODEL_NAME myModel NAME myName
comment3 = This example will list the details of a specific tranaction named myName in model myModel.
related = xmCreateTransaction, xmUpdateTransaction, xmRemoveTransaction
usage = public

[xmlisttransactionsequence-command]
syntax = | xmListTransactionSequence [TRANSACTION_NAME transactionName] [MODEL_NAME modelName] [SEQUENCE_NAME sequenceName]
shortdesc = This command is used to list discovered transaction sequences created by the xmLearnTransactionSequence command.
description = This command is used to list discovered transaction sequences created by the xmLearnTransactionSequence command. The command can be ran w/out any arguments to list transaction sequences across all models, with MODEL_NAME to list transaction sequences that reside in a specific model, or with MODEL_NAME and SEQUENCE_NAME to list specific transaction sequences.
example1 = | xmListTransactionSequence
comment1 = This example will list transactions sequences across all models
example2 = | xmListTransactionSequence MODEL_NAME myModel
comment2 = This example will list transactions paths that reside in model myModel
example3 = | xmListTransactionSequence MODEL_NAME myModel SEQUNCE_NAME myName
comment3 = This example will list the details tranaction sequences named myName in model myModel.
related = xmLearnTransactionSequence, xmListTransactions, xmRemoveTransactionSequence
usage = public

[xmremovetransactionsequence-command]
syntax = | xmRemoveTransactionSequence TRANSACTION_NAME transactionName [MODEL_NAME modelName] [SEQUENCE_NAME sequenceName]
shortdesc = This command is used to remove transaction sequences discovered by the xmLearnTransactionSequence command.
example1 = | | xmRemoveTransactionSequence TRANSACTION_NAME myTransaction
comment1 = This example will remove all transaction sequences associated with a transaction named myTransaction across all models.
example2 = | xmRemoveTransactionSequence TRANSACTION_NAME myTransaction MODEL_NAME myModel
comment2 =  This example will remove all transaction sequences associated with a transaction named myTransaction in the model named myModel.
example3 = | xmRemoveTransactionSequence TRANSACTION_NAME myTransaction MODEL_NAME myModel SEQUENCE_NAME mySequence.
comment3 = This example will remove all transaction sequences associated with a transaction named myTransaction in the model named myModel for seqeunces named mySequence.
related = xmLearnTransactionSequence, xmListTransactionSequence, xmRemoveTransactionSequence
usage = public

[xmcreatetransaction-command]
syntax = | xmCreateTransaction MODEL_NAME modelName NAME transactionName PATH_NAME pathName [PROPS prop1=value1|prop2=value2|...]
shortdesc = This command is used to create a transaction object that can later be associated to paths by running the xmLearnTransactionSequence command.
description = This command is used to create a transaction object that can later be associated to paths by running the xmLearnTransactionSequence command.
example1 = | xmCreateTransaction MODEL_NAME myModel NAME myTransaction PATH_NAME myPath
comment1 = This example will create a transaction object named myTransaction in model myModel with paths named myPath. Note that paths are created by running xmLearnTransactionSequence and passing the name of the transaction to update.
example2 = | xmListTransactions MODEL_NAME myModel
comment2 = This example will list transactions that reside in model myModel
related = xmListTransactions, xmLearnTransactionSequence, xmUpdateTransaction, xmRemoveTransaction
usage = public

[xmupdatetransaction-command]
syntax = | xmUpdateTransaction MODEL_NAME modelName NAME transactionName [NEW_NAME newTransactionName] [PROPS prop1=value1|prop2=value2|...]
shortdesc = This command is used to update an existing transaction object's properties and optionally it's name.
description = This command is used to update an existing transaction object's properties and optionally it's name.
example1 = | xmUpdateTransaction MODEL_NAME myModel NAME myTransaction NEW_NAME myTransaction2
comment1 = This example will update a transaction object named myTransaction and rename it to myTransaction2 (assuming another transction with that name does not already exist).
example2 = | xmUpdateTransaction MODEL_NAME myModel NAME myTransaction PROPS "prop3=value3|prop4=value4"
comment2 = This example will update a transaction object named myTransaction adding property prop3=value3 and prop4=value4 to the transaction object. Note that properties are merged so existing properties will only be added or over-written as opposed to removed.
related = xmListTransactions, xmLearnTransactionSequence, xmRemoveTransaction
usage = public

[xmlistexports-command]
syntax = | xmListExports
shortdesc =  This command provides a list of exports in the $SPLULNK_HOME/etc/apps/bv_xr/scm/backups generated from the xmExportModel command.
description =  This command provides a list of exports in the $SPLULNK_HOME/etc/apps/bv_xr/scm/backups generated from the xmExportModel command.
example1 = | xmListExports
comment1 = This example will list export files found in $SPLULNK_HOME/etc/apps/bv_xr/scm/backups directory
usage = public

[xmdeleteexport-command]
syntax = | xmDeleteExport <filename>
shortdesc =  This command deletes the model export located in $SPLUNK_HOME/etc/apps/bv_xr/scm/backups directory.
description =  This command deletes the model export located in $SPLUNK_HOME/etc/apps/bv_xr/scm/backups directory.
example1 = | xmDeleteExport INTLSALES-export.json.gz
comment1 = This example will delete the export file named INTLSALES-export.json.gz located in $SPLULNK_HOME/etc/apps/bv_xr/scm/backups directory

[xmupdatemodel-command]
syntax = | xmUpdateModel MODEL_NAME modelName <<props-option> [DICTIONARY <dict1=field1^_^field2|dict2=field3^_^field4|dict3=field4>]
shortdesc =  This command is used to update properties on an existing model
description = This command is used to update properties on an existing model. The proerties passed will be added to the model as opposed to overwriting. In otherwords it's possible to only send properties to update without affecting other properties that already exist on the models.
example1 = | xmUpdateModel MODEL_NAME myModel PROPS "prop1=value1"
comment1 = This example will add / update a property named prop1 with value value1 on the model named myModel.
example2 = | xmUpdateModel MODEL_NAME myModel PROPS "prop1=value1" DICTIONARY "dict1=field1^_^field2"
comment2 = This example will add / update a property named prop1 with value value1 on the model named myModel. In addition a data dictionary named dict1 with 2 fields (field1 and field2) will be added to the model. In this case existing data dictioanry entries will be merged not overwritten.

[comparetransactionsequence-command]
syntax = index=scm_tranaction_instance ... | compareTransactionSequence INSTANCE_GUID guidOfTransactionInstanceToCompare [OUTPUT_COLUMN columnName] [LENGTH_WEIGHT weightNumeric] [MEMBER_WEIGHT weightNumeric] [ORDER_WEIGHT weightNumeric]
shortdesc =  This command compares the transaction sequence graph referenced in transaction instance specified in INSTANCE_GUID against all graphs received as input.
description = This command compares the transaction sequence graph referenced in transaction instance specified in INSTANCE_GUID against all graphs received as input. By default, this command will add column 'severityCIX' to each output record which is the similarity CIX of the graph begin tested (specified in INSTANCE_GUID) against the graph identifed in the current record. The name of the output column can be changed using the OUTPUT_COLUMN columnName parameter. The underlying comparison has 3 different tests: LENGTH, MEMBERSHIP, and ORDER. The optional _WEIGHT parameters can be specified to change the importance on one or all tests. By default, all weights will default to 1.0 making each tests equaly important when deriving the CIX.
example1 = index=scm_transaction_instance | compareTransactionSequence INSTANCE_GUID 5963c19566e6d78e358021c1
comment1 = This example compares transaction instance records from the supplied search against the transaction sequence found in a transaction instance record with guid 5963c19566e6d78e358021c1. In this example, the cix of each comparson will be output in column similarityCIX.
example2 = index=scm_transaction_instance | compareTransactionSequence INSTANCE_GUID 5963c19566e6d78e358021c1 OUTPUT_COLUMN testCIX
comment2 = This example compares transaction instance records from the supplied search against the transaction sequence found in a transaction instance record with guid 5963c19566e6d78e358021c1 and outputs the cix in a column named testCIX.

[xmloadresources-command]
syntax = | xmLoadResources [ACTORS_ASSETS (true | false)] [CONFIG (true|false)] [ALL (true | false)] [ACTORS (true | false)] [ASSETS (true | false)] [DATA_DICTIONARY (true | false)] [PROPERTIES (true | false)] [MAPPINGS (true | false)] [APPEND (true | false) FILE <fileName> [REMOVEINPUT (true | false)]] [FORCE (true | false)]
shortdesc =  This command will load actors, assets, data-dictionary, resource-mappings, and properties if they are not already loaded or reload if FORCE true is specified.
description = This command will load actors, assets, data-dictionary, resource-mappings, and properties if they are not already loaded or reload if FORCE true is specified. The resources are loaded from configuration files found in bv_xr/lookups. Actors are seeded from actrors.csv, assets from assets.csv, data dictionary from data-dictionary.json, properties from db-seed.properties, and resource mappings from resource-mapping.json. This command will take resources found in the respective file and load into the data store. Note that resources are automatically seeded in the data store by certain commands so use this command only when a reload of resources is necessary. If APPEND = true then resources found in FILE will be added to existing configuration. Use APPEND true and FORCE true to over write resoures from FILE in the data store.
example1 = | xmLoadResources
comment1 = This version of the command will load all resources if they do not already exist in the data store.
example2 = | xmLoadResources FORCE true
comment2 =  This version of the command will remove all resources from the data store and load from the respective seed files in the lookups directory.
example3 = | xmLoadResources ACTORS_ASSETS true FORCE true
comment3 = This version of the command will reload (remove and load) actors and assets.
example4 = | xmLoadResources DATA_DICTIONARY true FORCE true
comment4 = This version of the command will reload (remove and load) the data dictionary.
example5 = | xmLoadResources DATA_DICTIONARY true
comment5 = This version of the command will load the data dictionary if it is not already found in the datastore.
example6 = | xmLoadResources DATA_DICTIONARY true APPEND true FILE /opt/splunk/etc/apps/bv_xr/scm/temp/myFile.json
comment6 = This version of the command will add the data dictionary entries from the specified file if it is not already found in the datastore.
example7 = | xmLoadResources DATA_DICTIONARY true APPEND true  FILE /opt/splunk/etc/apps/bv_xr/scm/temp/myFile FORCE true REMOVEINPUT true
comment7 = This version of the command will add the data dictionary entries from the speciied file and over write existing entries found in FILE. The file will be removed if the data dictionary was successfully imported.

[xmexportgraphs-command]
syntax = | xmExportGraphs GRAPH_TYPE (RELEVANCY | TRANSACTION) MODEL_NAME <modelName> [GRAPH_NAME <rulePackageName>] [FILE <fileName>]
shortdesc = This command exports the specified graphs to the specified file.
description = This command exports the specified graphs to the specified file. If graphName is omitted then all graphs of the specified type from the model will be exported. If FILE is omitted rules will be exported to $SPLUNK_HOME/etc/apps/bv_xr/scm/exports/modelName_graph-export.json.
example1 = | xmExportGraphs MODEL_NAME ANET_DEMO TYPE RELEVANCY
comment1 = This command exports ALL relevancy graphs from model ANET_DEMO to file /opt/splunk/etc/apps/bv_xr/scm/temp/ANET_DEMO_graph-export.json.
example2 = | xmExportGraphs MODEL_NAME ANET_DEMO TYPE RELEVANCY GRAPH_NAME myGraph
comment2 = This command exports relevancy graph named myGraph from model ANET_DEMO to file /opt/splunk/etc/apps/bv_xr/scm/exports/ANET_DEMO_graph-export.json.
example3 = | xmExportGraphs MODEL_NAME ANET_DEMO TYPE RELEVANCY GRAPH_NAME myGraph FILE /opt/splunk/etc/apps/bv_xr/scm/exports/export.json
comment3 = This command exports relevancy graph named myGraph from model ANET_DEMO to file /opt/splunk/etc/apps/bv_xr/scm/exports/export.json
related = xmImportGraphs
usage = public

[xmimportgraphs-command]
syntax = | xmImportGraphs MODEL_NAME <modelName> FILE <fileName> [REPLACE (true | false)]
shortdesc = This command will import graphs from a file generated by xmExportGraphs. If present all rule packages referenced in the import file will be replaced, if not present any rules already present in the database but refernced will be ignored during import.
description = This command will import graphs from a file generated by xmExportGraphs. The REPLACE argument will replace graphs that have the same name as graphs found in the export file. If replace true not present, any graphs already present in the database but refernced in the export file will be ignored during import.
example1 = | xmImportGraphs MODEL_NAME ANET_DEMO FILE /opt/splunk/etc/apps/bv_xr/scm/exports/ANET_rules-export.json
comment1 = This example will import rules found in the specified export file into model ANET_DEMO. If rules found in the export file already exist in model ANET_DEMO (using name to find existing rules), the rules in the import file will be ignored.
example2 = | xmImportGraphs MODEL_NAME ANET_DEMO FILE /opt/splunk/etc/apps/bv_xr/scm/exports/rules/ANET_rules-export.json REPLACE true
comment2 = This example will import rules found in the specified export file into model ANET_DEMO. If rules found in the export file already exist in model ANET_DEMO (using name to find existing rules), these rules will be removed from the model before importing.
related = xmExportGraphs
usage = public

[xmexportresources-command]
syntax = | xmExportResources [ACTORS_ASSETS (true | false)] [CONFIG (true|false)] [ALL (true | false)] [ACTORS (true | false)] [ASSETS (true | false)] [DATA_DICTIONARY (true | false)] [PROPERTIES (true | false)] [MAPPINGS (true | false) [OUTPUT_FILE_NAME fileName] [PARAMS "dataDefinition1,dataDefinition2,dataDefinition3"]
shortdesc = This command will export actors, assets, data-dictionary, resource-mappings, and properties from the database to the default file they are loaded from in the lookups directory.
description = This command will export actors, assets, data-dictionary, resource-mappings, and properties from the database to the default file they are loaded from in the lookups directory. Each export that is created will create a backup file assuming the file exists in the database. If no parameters are provided then all resources will be exported to their appropriate output file in the lookups directory. Argument OUTPUT_FILE_NAME fileName is valid with 'DATA_DICTIONARY true' to specify the name and location of the exported data dictionary file. Argument PARAMS "param1,param2,param3" is valid with 'DATA_DICTIONARY true' is used to specify the names of data definitions to export."
example1 = | xmExportResource
comment1 = This command will export all resources from the database to the lookups directory.
example2 = | xmExportResource CONFIG true
comment2 = This version of the command will export data dictionary, properties, and resource mappings from the database to the lookups directory.
example3 = | xmExportResource ACTORS true ASSETS true PROPERTIES true
comment3 = This command will export actors, assets, and properties from the database to the lookups directory.
example4 = | xmExportResource DATA_DICTIONARY true PARAMS "ANET_Authentication,ANET_Session,ANET_Traffic" OUTPUT_FILE_NAME /opt/splunk/etc/apps/bv_xr/scm/temp/anet-data-dictionary.json
comment4 = This command will export a data dictionary containing data definitions ANET_Authentication, ANET_Session, ANET_Traffic to the specified file.
related = xmLoadResources
usage = public

[xmchainreferencekeys-command]
syntax = index=scm_terrain_event | xmChainReferenceKeys | xmLearnTransactionPaths ...
shortdesc = This command will preprocess records from the scm_terrain_event index for cases where reference keys are chained mapping chains of reference keys to a single value.
description = This command will preprocess records from the scm_terrain_event index for cases where reference keys are chained mapping chains of reference keys to a single value. For example, assume there are three events with the following reference keys: 'a' then 'a|b' then 'b'. In this example. all 3 reference keys would be mapped to value 'a'. This command is used to preprocess referenceKey values before they are passed to xmLearnTransactionSequence when using the referenceKey algorithm to discover transaction sequences.
example1 = index=scm_terrain_event modelName=test | xmChainReferenceKeys | xmLearnTransactionSequence MODEL_NAME test TRANSACTION_NAME myTransaction SEQUENCE_NAME myPath
comment1 = This example pre-processes reference keys from events in model test then passes results output from xmChainReferenceKeys to xmLearnTransactionSequence.
related = xmLoadResources
usage = public

[xmlistquotausage-command]
syntax = | xmListQuotaUsage <application-option> [FROMDATE <relativeTimeModified> TODATE <relativeTimeModifier>]
shortdesc = This command will display quota usage for the specified application license.
description = This command will display quota usage for the specified application for which there is a licese installed. If the date range is omitted, then quota usage for the last 30 days will be displayed. The relativeTimeModified can have 3 forms: epoch time, splunk relative modifier (-1d@d), or date string "mm/dd/yyyy"
example1 = | xmListQuotaUsage APPLICATION XVAW
comment1 = This example will list quota usage for the last 30 days for the XVAW application license.
example2 = | xmListQuotaUsage APPLICATION XVAW FROMDATE -10d TODATE now
comment2 = This example will list quota usage for the last 10 days using relative time modifier for the XVAW application license.
example3 = | xmListQuotaUsage APPLICATION XVAW FROMDATE 12/01/2017 TODATE 01/30/2018
comment3 = This example will list the quota usage between two dates.
related = xmInstallLicense, xmListLicense
usage = public

[xmlistmodelstatistics-command]
syntax = | xmListModelStatistics [MODEL_NAME <modelName>] [MAX_RECORDS <maxRecords>]
shortdesc = This command will display historical model statistics which includes information density and trust.
description = This command will display historical model statistics which includes information density and trust. The MAX_RECORDS parameter is optional, if omitted a maximum of 30 records will be returned. 
example1 = | xmListModelStatistics
comment1 = This example will list up to 30 model statistics records for each defined model.
example2 = | xmListModelStatistics MODEL_NAME myModel
comment2 = This example will list up to 30 model statistics records for a model named myModel.
example3 = | xmListModelStatistics MODEL_NAME INTL_SALES MAX_RECORDS 10
comment3 = This example will list up to 10 model statistics records for a model named myModel.
related = xmListModels, xmListLandscape
usage = public

[xmverifyactors-command]
syntax = | xmVerifyActors idlist=<string> [model=<string>]
shortdesc = This command takes a comma delimited list of actor identifiers and optional model then returns a list of those that do not exist in bv_xr.
description = This command takes a comma delimited list of actor identifiers and optional model then returns a list of those that do not exist in bv_xr.
example1 = | xmVerifyActors idlist="bakery,ejennifer,gamer,invalid"
comment1 = This example will verify if the following global actor ids exist in bv_xr: bakery, ejennifer, gamer, and invalid.
example2 = | xmVerifyActors idlist="bakery,ejennifer,gamer,invalid" model=ANET
comment2 = This example will verify if the following actor ids exist in bv_xr model ANET: bakery, ejennifer, gamer, and invalid.
related = xmVerifyAssets,xmListActors,xmListAssets
