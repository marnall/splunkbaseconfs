[xmrunthresholdanalysis-command]
syntax = | xmRunThresholdAnalysis <modelName>
shortdesc = This command is used to run a threshold analysis for the model specified.
description = This command is used to run a threshold analysis for the model specified. The date range used for the analysis is stored in the model and represents the date of the last events ran through the threshold analysis to the current date and time. The events found matching the date range are tested against thresholds and anolmaly signal are emitted if issues are discovered. Note that new data must be added to the model prior to running this command.
