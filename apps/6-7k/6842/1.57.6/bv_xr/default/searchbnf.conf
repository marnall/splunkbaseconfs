[runextremerules-command]
syntax = search | runExtremeRules RULE_PACKAGE rulePackageName <application-option> [SIGNAL (true | false)] [PRELOAD <numContextsToPreLoad>] [CIX (true | false)] [ABSOLUTE_CIX (true | false)] [QUERY expression [QUERY_ALPHACUT (0-1)] [CONTAINER container CONTEXT cixContext]] [MODEL <modelNameForSignals>]
shortdesc = This is a streaming command used to run ExtremeRules from the specified application and rule package against data received from a search.
description = This is a streaming command used to run ExtremeRules from the specified application and rule package against data received from a search. The RULE_PACKAGE parameter is the name of the rule package created by xmCreateRulePackage (VERSION 2) under the APPLICATION it resides in. This command will append a columns named rulePackageName_signal, rulePackageName_cix, andRulePackageName_absolute_cix to output describing which rule package(s) each row of search data was executed against, the weight of the rule, and resulting rule CIX and absolute CIX. The format of the _signal column is: <ruleSet1Name>:<ruleSet1Weight>:<ruleSet1CIX>|<rulSet2Name>:<ruleSet2Weight>:ruleSet2CIX>... If for some reason a record did not match any rule sets then the contents of the signal column to an empty string. Column nameds <rulePackage>_cix, <rulePackage>_signal, and <rulePackage>_absolute_cix will be appended . The parameter SIGNAL false can be supplied to supporess output of the signal column. Likewise, the parameter CIX false can be supplied to suppress output of the cix column. Last, the parameter ABSOLUTE_CIX with a value of false can be supplied to suppress output of the absolute_cix column. This command also allows output records to be filtered by the CIX value generated using a qualitative expression (i.e. "is above medium") using the QUERY paramter. This allows only records with a certain CIX range (anomalous for example) to be output by the command. The concept names available by default are: minimal,low,medium,high, or extreme.
example1 = index=scm_terrain_event modelName=INTL_SALES | search taxonomyId=*TxnAmt OR taxonomyId=*Transaction~Delta~time_diff | runExtremeRules RULE_PACKAGE myPackage APPLICATION XVAW
comment1 = This example runs the ExtremeRules package named myPackage that is part of the XVAW application against data received as input from the specified search. This command will append a columns named signal, cix, and absolute_cix to output describing which rule package(s) each row of search data was executed against, the weight of the rule, and resulting rule CIX.
example2 = index=scm_terrain_event modelName=INTL_SALES | search taxonomyId=*TxnAmt OR taxonomyId=*Transaction~Delta~time_diff | runExtremeRules RULE_PACKAGE myPackage APPLICATION XVAW SIGNAL false SIGNAL false CIX true ABSOLUTE_CIX false
comment2 = This example runs the ExtremeRules package named myPackage that is part of the XVAW application against data received as input from the specified search. This command will omit output of the signal column and suppress cix and absolute_cix from output.
example3 = index=scm_terrain_event modelName=INTL_SALES | search taxonomyId=*TxnAmt OR taxonomyId=*Transaction~Delta~time_diff | runExtremeRules RULE_PACKAGE myPackage APPLICATION XVAW QUERY "is above high" QUERY_ALPHACUT .50
comment3 = This example runs the ExtremeRules package named myPackage that is part of the XVAW application against data received as input from the specified search. This command will omit output all columns of records whose compatibility with statement "is above high" has a value >= .50
example4 = index=scm_terrain_event modelName=INTL_SALES | search taxonomyId=*TxnAmt OR taxonomyId=*Transaction~Delta~time_diff | runExtremeRules RULE_PACKAGE myPackage APPLICATION XVAW QUERY "is below high" CONTAINER myApp CONTEXT myCixContext
comment4 = This example runs the ExtremeRules package named myPackage that is part of the XVAW application against data received as input from the specified search. This command will omit output all columns of records whose compatibility with statement "is below high" the context used to test the CIX is in container myApp and has name myCixContext. Note that the context must exist in the same XV application where the rules exist.
related = xmCreateRulePackage,xmListRulePackages,xmListRulePackage
example5 = index=scm_terrain_event modelName=INTL_SALES | search taxonomyId=*TxnAmt OR taxonomyId=*Transaction~Delta~time_diff | runExtremeRules RULE_PACKAGE myPackage APPLICATION XVAW QUERY "is above .25"
comment5 = This example runs the ExtremeRules package named myPackage that is part of the XVAW application against data received as input from the specified search. In this case the records will be filtered using a scaler value of 0.25. In other words, only output records where the weighted average CIX score is greater than 0.25.
example6 = index=scm_terrain_event modelName=INTL_SALES | search taxonomyId=*TxnAmt OR taxonomyId=*Transaction~Delta~time_diff | runExtremeRules RULE_PACKAGE myPackage APPLICATION XVAW MODEL myModel"
comment6 = This example runs the ExtremeRules package named myPackage that is part of the XVAW application against data received as input from the specified search. In this case any generated signals will have the modelName attribute set to myModel
usage = public

