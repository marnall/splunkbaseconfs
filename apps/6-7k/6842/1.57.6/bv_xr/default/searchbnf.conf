[xmqueryactorsequence-command]
syntax = xmQueryActorSequence <modelName> ACTOR <actorId> DAY_OF_WEEK < 0 - 6 > START_NODE <action~process~field> END_NODE <action~process~field> [THRU_NODES <action~process~field[,action~process~field,...]> [NOT_THRU_NODES <action~process~field[,action~process~field,...]> [FILTER_TYPE (search | highProbability | lowProbability | shortest)] [FILTER_ARG arg]
shortdesc = This command is used to query the actor sequence graph for paths through the graph using various filter types. Based on the FILTER_TYPE specifed, FILTER_ARG has different meanings based on the filter type specified: high probablity - Value between 0 and 1 (i.e. .05) which is the alfacut for other paths that should also be returned. For example, if the highest probability path is .70 and FILTER_ARG = .05 then all paths with a probability > .65 will be returned. lowProbability - value between 0 and 1 (i.e. .05) which is the alfacut for other paths that should also be returned. For example if the lowest probability path is .30 then all paths with a probability < .35 will be returned. shortest - value between 0..X (3) which defines how many paths to return. If there are a total of 10 paths a value of 3 says to return the 3 shortest paths.
description = This command is used to query the actor sequence graph for paths through the graph using various filter types. This command requires modelName, actorId, dayOfWeek, startTaxon, endTaxon and will find all existing paths defined in the actor's day of week graph from the specified start and end nodes. In addition, 0..N nodes the path must pass through can also be supplied. Last, 0..N nodes the path should NOT pass through can also be supplied. Once all paths are found, an optional filter_type can be applied to further refine the paths returned, if no filter type is supplied all paths matching the criteria will be returned. There is also an optional argument: FILTER_ARG that can be passed when FILTER_TYPE is specified. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command.

example1 = | xmQueryActorSequence INTL_SALES ACTOR ger001 DAY_OF_WEEK 1 START_NODE Authentication~desktop~success END_NODE Session~network~end FILTER_TYPE shortest filter_arg 5
comment1 = This example will query the actor sequence for actor "ger001" and the day monday between the two taxonomy nodes Authentication~desktop~success and Session~network~end. No more that 5 paths will be returned.
related = xmGetActorSequence,xmListActorSequence
usage = public

[xmdiscoveractorsequencepatterns-command]
syntax = xmDiscoverActorSequencePatterns <modelName> START_NODE <action~process~field> END_NODE <action~process~field> [ACTORS <actorId1,actorId2,...>] [DAY_OF_WEEK < 0 - 6 >] [THRU_NODES <action~process~field[,action~process~field,...]> [NOT_THRU_NODES <action~process~field[,action~process~field,...]> [FILTER_TYPE (search | highProbability | lowProbability | shortest)] [FILTER_ARG arg]
shortdesc = This command is similar to xmQueryActorSequence except it can be used to discover pattens across all actors and days of the week in the specified model. FILTER_ARG has different meanings based on the filter type specified:: high probablity - Value between 0 and 1 (i.e. .05) which is the alfacut for other paths that should also be returned. For example, if the highest probability path is .70 and FILTER_ARG = .05 then all paths with a probability > .65 will be returned. lowProbability - value between 0 and 1 (i.e. .05) which is the alfacut for other paths that should also be returned. For example if the lowest probability path is .30 then all paths with a probability < .35 will be returned. shortest - value between 0..X (3) which defines how many paths to return. If there are a total of 10 paths a value of 3 says to return the 3 shortest paths.
description = This command is used to query the model's sequence graphs for paths through the graph using various filter types. Unlike xmQueryActorSequence (which operates against a single actor and day of week) this command can discover similar activity patters for 1..N actors in the model for all (or a specific) days of the the week. This command requires modelName, startTaxon, endTaxon and will find all existing paths defined n the model from the specified start and end nodes. In addition, 0..N nodes the path must pass through can also be supplied. Last, 0..N nodes the path should NOT pass through can also be supplied. Once all paths are found, an optional filter_type can be applied to further refine the paths returned, if no filter type is supplied all paths matching the criteria will be returned. There is also an optional argument: FILTER_ARG that can be passed when FILTER_TYPE is specified. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command.
example1 = | xmDiscoverActorSequencePatterns INTL_SALES ACTORS "ger001,ger002" DAY_OF_WEEK 1 START_NODE Authentication~desktop~success END_NODE Session~network~end FILTER_TYPE shortest filter_arg 5
comment1 = This example will query the actor sequence for actors "ger001" and "ger002" and the day monday between the two taxonomy nodes Authentication~desktop~success and Session~network~end. No more that 5 paths will be returned.
example2 = | xmDiscoverActorSequencePatterns INTL_SALES START_NODE Authentication~desktop~success END_NODE Session~network~end FILTER_TYPE highProbability filter_arg .00
comment2 = This example will query the actor sequence for all actors in the INTL_SALES model and all days of the week returning the highest probability paths between the two taxonomy nodes Authentication~desktop~success and Session~network~end. Filter arg of .00 indicates that only the highest probability path(s) should be returned.
related = xmQueryActorSequence,xmGetActorSequence,xmListActorSequence
example3 = | xmDiscoverActorSequencePatterns INTL_SALES START_NODE Authentication~desktop~success END_NODE Session~network~end THRU_NODES "Authentication~vpn~failure" NOT_THRU_NODES "Authentication~oracle~success" FILTER_TYPE lowProbability filter_arg .00
comment3 = This example will query the actor sequence for all actors in the INTL_SALES model and all days of the week returning the lowest probability paths between the two taxonomy nodes Authentication~desktop~success and Session~network~end. In addition the path must pass through the Authentication~vpn~failure taxonomy but not through the Authentication~oracle~success Authentication~oracle~success. Filter arg of .00 indicates that only the highest probability path(s) should be returned.
usage = public

[xmrundatastore-command]
syntax = xmRunDataStore
shortdesc = This command will check if the bv_xr datastore is running and start it if it is not.
