comment1 = This example loads the contents of the file indentities.csv and converts the actors based on the Splunk_ES_Identity mapping configuration. The mapped resources will be considered global as they will not be associated with a specific model.
example2 = | xmMapResources FILE /opt/splunk/etc/apps/bv_xr/scm/temp/identities.csv MAPPING Splunk_ES_Assets MODEL ANET
comment2 = This example loads the contents of the file indentities.csv and converts the actors based on the Splunk_ES_Assets mapping configuration. The mapped resources will be associated with model ANET.
related = xmCreateResourceMapping, xmDeleteResourceMapping, xmGetResourceMapping, xmListResourceMappings
