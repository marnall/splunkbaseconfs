usage = public

[xmdeletecontext-command]
syntax = | xmDeleteContext containerName CONTEXT contextName [CLASS className] <application-option>
shortdesc = This command deletes the named context from the specified application.
description = This command deletes the named context. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command.
example1 = | xmDeleteContext INTLSALES CONTEXT TxnAmt CLASS eng001 APPLICATION XVAW
comment1 = This example will delete the class "eng001" from context "TxnAmt" in the container "INTLSALES".
related = xmListContext,xmDisplayContext,xmDisplayContextAttributes,xmCreateDDContext
usage = public

[xmcreateddcontext-command]
syntax = | xmCreateDDContext name <contextName> terms conceptName1,conceptName2,conceptName3[,conceptName4,...] [type (domain|avg_centered|median_centered)] [container <containerName>] [class <classField1[,classField2,classField3,...] [uom <unitOfMeasure>] [update = (true | false)] [search <urlEncodedSearchString>] <application-option>
shortdesc = This command is used to generate a context for use by Rules or ExtremeRules.
description = This command is used to generate a context for use by Rules or ExtremeRules. This command is always proceeded with a search that returns a specific set of statistics required to generate a context. The search typically takes as input data from actor terrains that a rule value is attempting to test but is flexible enough to take any type of search as input as long as the required statistics are present. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command.
example1 = index=intlsales sourcetype=intlsales_transaction action=transaction  | fields _time buyer seller time_diff reference_number | streamstats window=2 global=false min(_time) as prev_time max(_time) as curr_time by seller | eval curr_day = strftime(curr_time,"%d") | eval prev_day = strftime(prev_time,"%d") | eval time_diff = if(curr_day==prev_day,curr_time - prev_time,0) | where time_diff > 0 | eval keyColumn="time_diff" | rename time_diff AS value seller AS actorId | stats avg(value) as avg, min(value) as min, max(value) as max, median(value) as median, stdev(value) as stdev, count by actorId | xmCreateDDContext application XVAW name time_diff terms "low,medium,high" class "actorId" container "INTL_SALES" uom “seconds” search  "index%3Dintlsales%20sourcetype%3Dintlsales_transaction%20action%3Dtransaction%20%20%7C%20fields%20_time%20buyer%20seller%20time_diff%20reference_number%20%7C%20streamstats%20window%3D2%20global%3Dfalse%20min(_time)%20as%20prev_time%20max(_time)%20as%20curr_time%20by%20seller%20%7C%20eval%20curr_day%20%3D%20strftime(curr_time%2C%22%25d%22)%20%7C%20eval%20prev_day%20%3D%20strftime(prev_time%2C%22%25d%22)%20%7C%20eval%20time_diff%20%3D%20if(curr_day%3D%3Dprev_day%2Ccurr_time%20-%20prev_time%2C0)%20%7C%20where%20time_diff%20%3E%200%20%7C%20eval%20keyColumn%3D%22time_diff%22%20%7C%20rename%20time_diff%20AS%20value%20seller%20AS%20actorId%20%7C%20stats%20avg(value)%20as%20avg%2C%20min(value)%20as%20min%2C%20max(value)%20as%20max%2C%20median(value)%20as%20median%2C%20stdev(value)%20as%20stdev%2C%20count%20by%20actorId"
comment1 = This example uses the search "index=intlsales sourcetype=intlsales_transaction action=transaction  | fields _time buyer seller time_diff reference_number | streamstats window=2 global=false min(_time) as prev_time max(_time) as curr_time by seller | eval curr_day = strftime(curr_time,"%d") | eval prev_day = strftime(prev_time,"%d") | eval time_diff = if(curr_day==prev_day,curr_time - prev_time,0) | where time_diff > 0 | eval keyColumn="time_diff" | rename time_diff AS value seller AS actorId | stats avg(value) as avg, min(value) as min, max(value) as max, median(value) as median, stdev(value) as stdev, count by actorId" to generate values for the create context command.  The context named "time_diff" with the concepts "low,medium,high" with class "actorId".
related = xmListContext,xmDisplayContext,xmDisplayContextAttributes,xmDeleteContext,xmCreateCDContext,xmCreateUDContext,xmCreateUDContext,xmRunAnomalyRules,runExtremeRules
usage = public

[xmcreatecdcontext-command]
syntax = search | xmCreateCDContext name <string> container <string> [class <string>[,<string>]] [type (domain|avg_centered|median_centered)] terms <string>[,<string>] [uom <string>] [search <string>] [shape <string>] [endshape <string>] <application-option>
shortdesc = This command is used to create a crossover driven context used by Rules or ExtremeRules. 
description = This command is used to create a crossover driven context used by Rules or ExtremeRules.
example1 = index=scm_terrain_event terrainType=NUMERIC | stats count(value) as count perc1(value) as min perc20(value) as minimal_low perc40(value) as low_medium perc60(value) as medium_high perc80(value) as high_extreme  perc99(value) as max  BY "taxonomyId" | xmCreateCDContext NAME test_cd_context TERMS "minimal,low,medium,high,extreme" CONTAINER INTL_SALES APPLICATION XVAW
comment1 = This command creates a crossover driven context for container INTL_SALES with context name test_cd_context.
related =  xmListContext,xmDisplayContext,xmDisplayContextAttributes,xmDeleteContext,xmCreateDDContext,xmCreateUDContext,xmRunAnomalyRules,runExtremeRules
usage = public

[xmexportrules-command]
syntax = | xmExportRules [MODEL_NAME <modelName>] [FILE <fileName>] RULE_PACKAGE <rulePackageName> <version-option> <application-option>
shortdesc = This command is used to export Rules (VERSION 1) or ExtremeRules (VERSION 2) rules and associated contexts to a file which can be later imported by xmImportRules.
description = This command is used to export Rules (VERSION 1) or ExtremeRules (VERSION 2) rules and associated contexts to a file which can be later imported by xmImportRules. If the FILE parameter is omitted, a default file name will be generated using supplied parameters. In all cases, the file will be placed in the $SPLUNK_HOME/etc/apps/bv_xr/scm/exports diretory. If RULE_PACKAGE_NAME is omitted all rule pacakges contained in the specified model or application will exported.
example1 = | xmExportRules MODEL_NAME ANET_DEMO APPLICATION XVCS
comment1 = This example exports all (VERSION 1) rule packages fromm model ANET_DEMO from application XVCS.
example2 = | xmExportRules MODEL_NAME ANET_DEMO RULE_PACKGE myPackage APPLICATION XVCS 
comment2 = This example exports an (VERSION 1) rule package named myPackage fromm model ANET_DEMO from application XVCS.
example3 = | xmExportRules VERSION 2 APPLICATION XVCS
comment3 = This example exports all ExtremeRules (VERSION 2) rule packages associated with application XVCS.
example4 = | xmExportRules RULE_PACKAGE myPackage VERSION 2 APPLICATION XVCS
comment4 = This example exports an ExtremeRules (VERSION 2) rule package named myPackage associated with application XVCS.
related = xmCreateRulePackage,xmListRulePackages,xmListRulePackage,xmDeleteRulePackage,xmImportRules,xmRunAnomalyRules,runExtremeRules
usage = public

[xmimportrules-command]
syntax = | xmImportRules [MODEL_NAME <modelName>] FILE <fileName> [REPLACE (true | false)] [RENAME newRulePackageName] <version-option> <application-option>
shortdesc = This command is used to import Rules (VERSION 1) or ExtremeRules (VERSION 2) rules and associated contexts from a file generated by xmExportRules into the specified model or application.
description = This command is used to import Rules (VERSION 1) or ExtremeRules (VERSION 2) rules and associated contexts from a file generated by xmExportRules into the specified model or application. The replace flag can be passed to over-write any rules and contexts that already exist in the system being imported into. The rename parameter is used to specify a new name for rule package(s) imported, if the file contains more than one package the new name will be used as a prefix.
example1 = | xmImportRules MODEL_NAME ANET_DEMO FILE /opt/splunk/etc/apps/bv_xr/scm/exports/rules.csv
comment1 = This example import (VERSION 1) rules from file /tmp/rules.csv into model ANET_DEMO, existing rules and contexts referenced in the import file will NOT be replaced.
example2 = | xmImportRules MODEL_NAME ANET_DEMO FILE /opt/splunk/etc/apps/bv_xr/scm/exports/rules.csv REPLACE true
comment2 = This example import (VERSION 1) rules and contexts from the specified file into model ANET_DEMO. In this example existing rules and contexts will be replaced.
example3 = | xmImportRules APPLICATION XVAW VERSION 2 FILE /opt/splunk/etc/apps/bv_xr/scm/exports/rules.csv
comment3 = This example import ExtremeRules (VERSION 2) rules from the specified file into application XVAW, existing rules and contexts referenced in the import file will NOT be replaced.
example4 = | xmImportRules APPLICATION XVAW VERSION 2 FILE /opt/splunk/etc/apps/bv_xr/scm/exports/rules.csv REPLACE true
comment4 = This example import ExtremeRules (VERSION 2) rules from file /opt/splunk/etc/apps/bv_xr/scm/exports/rules.csv into application XVAW. In this example existing rules and contexts will be replaced.
example5 = | xmImportRules APPLICATION XVAW VERSION 2 FILE /opt/splunk/etc/apps/bv_xr/scm/exports/rules.csv RENAME MyNewRules
comment5 = This example import ExtremeRules (VERSION 2) rules from file /opt/splunk/etc/apps/bv_xr/scm/exports/rules.csv into application XVAW. In this example the imported rule package(s) will be renamed to MyNewRules. If more than one package then packages will be imported as MyNewRules-1, MyNewRules-2, etc. Note that this functionality can be used with both VERSION 1 and VERSION 2 of this command.
related = xmCreateRulePackage,xmListRulePackages,xmListRulePackage,xmDeleteRulePackage,xmExportRules,xmRunAnomalyRules,runExtremeRules
usage = public

