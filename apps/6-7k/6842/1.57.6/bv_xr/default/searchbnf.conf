example1 = | xmCreateModel MODEL_NAME myModel APPLICATION xvaw
comment1 = This will create a model named myModel for application xvaw.
example2 =  | xmCreateModel MODEL_NAME myModel APPLICATION xvcs PROPS "prop1=value1|prop2=value2"
comment2 = This will create a model named myModel for application xvcs adding two properties prop1 and prop2.
related = xmUpdateModel, xmAcquireEvents, xmBuildActorSequence, xmActivateModel, xmUpdateProperties
