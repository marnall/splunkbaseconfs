[date-or-epoch-option]
syntax = 'mm/dd/yyyy hh:mm:ss' | epoch
description = clause that specifies a start date, either in a string format or as an epoch.

[analysis-option]
syntax = analysisName name
description = clause that assigns an analysisName to the generated signals.

[signalprops-option]
syntax = signalProps prop1=value1|prop2=value2|...

[props-option]
syntax = PROPS "prop1=value1|prop2=value2|..."

[startdate-option]
syntax = startdate mm/dd/yyyy

[actorid-option]
syntax = actorid id

[fromdate-option]
syntax = fromdate 'EPOCH or mm/dd/yyyy hh:mm:ss or Splunk (-1d@d)'

[todate-option]
syntax = todate 'EPOCH or mm/dd/yyyy hh:mm:ss or Splunk (-1d@d)'

[include-event-times-option]
syntax = include_event_times

[terrain-option]
syntax = terrainId

[terrain-2-option]
syntax = TERRAIN terrainId

[numdays-option]
syntax = numdays numPreviousDaysToCompare

[region-option]
syntax = region regionName

[businessunit-option]
syntax = businessunit businessUnitName

[title-option]
syntax = title titleName

[actorIds-option]
syntax = actors actorIdList

[category-option]
syntax = category categoryName

[managedby-option]
syntax = managedby managerName

[actortype-option]
syntax = actortype (human|machine|service)

[actorclass-option]
syntax = actorclass actorClassStr

[eventtime-option]
syntax = eventtime epoch

[taxonomyid-option]
syntax = taxonomyid id

[numnodes-option]
syntax = numnodes <int>

[numnodesafter-option]
syntax = numnodesafter <int>

[removeinput-option]
syntax = removeinput <bool>

[saveoutput-option]
syntax = saveoutput <bool>

[appendoutput-option]
syntax = appendoutput <bool>

[identity-option]
syntax = identity=<string>

[name-option]
syntax = name=<string>

[bunit-option]
syntax = bunit=<string>

[category-option-2]
syntax = category=<string>

[criticality-option]
syntax = criticality=<int>

[watchlist-option]
syntax = watchlist=<string>

[type-option]
syntax = type=<string>

[application-option]
syntax = APPLICATION (XVAW | XVCS | XVOE | ...)
description = The name of the application the operation is associated with.

[version-option]
syntax = [VERSION (1|2)]
description = The version of the command to run, if not present VERSION 1 is assumed.

[xmacquireevents-command]
syntax = xmAcquireEvents model modelName [DISCOVER_ACTORS (true | false) NEW_ACTOR_CRITICALITY (1-10)] [DISCOVER_ASSETS (true | false) NEW_ASSET_CRITICALITY (1-10)]  <analysis-option>? <signalprops-option>?
shortdesc = This command is used to load historical events into a model within the Scianta Cognitive Modeler Framework. A user must have SCM_POWER role to use this command.
description = This command is used to load historical events into a model within the Scianta Cognitive Modeler Framework. "modelName" identifies the name of the model to create/update. Use discover_actors true to discover actors on the fly, the value from new_actor_criticality will be used to set discovered actor's criticality (default is 10). Likewise, use discover_assets true to discover assets on the fly and new_asset_criticality to set criticality of discovered assets. "analysisname" is the name to assign to any signal generated by this command.  "signalprops" is used to pass any key/value pairs to store in the signals properties field.  The list of key/value pairs is pipe '|' delimited. A user must have SCM_POWER role to use this command.
comment1 = This example loads historical data from the Authentication Common Information Model into a model named 'BL'. A performance optimization here is the use of the 'fields' to only pass fields identified in a data dictionary (e.g., Authentication Data Dictionary).
example1 = | datamodel Authentication Authentication search  | fields Authentication.tag _time Authentication.action Authentication.app Authentication.dest Authentication.src Authentication.user| xmAcquireEvents model BL
example2 = | datamodel Authentication Authentication search  | fields Authentication.tag _time Authentication.action Authentication.app Authentication.dest Authentication.src Authentication.user| xmAcquireEvents model BL DISCOVER_ACTORS false NEW_ACTOR_CRITICALITY 9 DISCOVER_ASSETS true NEW_ASSET_CRITICALITY 8
related = preAcquire, xmPostAcquireEvents, xmActivateModel, xmDeactivateModel, xmBuildActorSequence, xmCalculateInformationDensity, xmResetModel
usage = public

[xmactivatemodel-command]
syntax = xmActivateModel modelName [DENSITY (true | false)] [THRESHOLDS (true | false)] [NUM_THRESHOLD_TIME_PERIODS (1 | 2 | 4 | 6| 8 | 24)]
shortdesc = This command activates a model in the Scianta Cognitive Modeler Framework. A user must have SCM_POWER role to use this command.
description = This command activates a model in the Scianta Cognitive Modeler Framework. In addition, actor work periods (days of week and hours of day), information density for each terrain, and the initial set of thresholds for the model can be calculated. If the DENSITY and THRESHOLDS parameters are omitted, they will be calculated. The parameter NUM_THRESHOLD_TIME_PERIODS can be used to define how many thresholds per day will be created, the value supplied must be evenly divisible by 24. The model must be 'active' before it can be used in analysis. A user must have SCM_POWER role to use this command.
example1 = | xmActivateModel BL
comment1 = This example activates the existing model named 'BL' which includes calclation of actor work periods, information density, and thresholds.
example2 = | xmActivateModel BL DENSITY false THRESHOLDS false
comment2 = This example activates the existing model named 'BL' but skips calculation of information density (and actor work periods) and thresholds.
example3 = | xmActivateModel BL NUM_THRESHOLD_TIME_PERIODS 6
comment3 = This example activates the existing model named 'BL' which includes calclation of actor work periods, information density, and thresholds. In this example 6 thresholds per day will be created.
related = xmDeactivateModel, xmResetModel, xmRunActorBehaviorAnalysis, xmRunActorDayOfWeekAnalysis, xmRunActorSequence, xmRunNaturalPeerAnalysis
usage = public

[xmaddcategory-command]
syntax = xmAddCategory categoryName
shortdesc = This command adds a new category to the list of supported categories in the Scianta Cognitive Modeler Framework. A user must have SCM_ADMIN role to use this command.
description = This command adds a new category to the list of supported categories in the Scianta Cognitive Modeler Framework. A user must have SCM_ADMIN role to use this command.
comment1 = This example adds the category "employee".
example1 = | xmAddCategory employee
related = xmDeleteCategory, xmListCategories
usage = public

[xmbuildactorsequence-command]
syntax = xmBuildActorSequence modelName <actorid-option>? <startdate-option>?
shortdesc = This command is used to build the initial sequence model. A user must have SCM_POWER role to use this command.
description = This command is used to build the initial sequence model from all events loaded into the ecosystem.  If ACTORID is specified, only that actor's sequence is built.  If STARTDATE is specified, only actions starting from that time are added to the sequence. A user must have SCM_POWER role to use this command.
comment1 = This example builds the actor sequence for all actors in the existing model named 'BL'.
example1 = | xmBuildActorSequence BL
comment2 = This example builds the actor sequence for the actor 'atristler' in the existing model named 'BL' using events from 05/01/2016 to current date.
example2 = | xmBuildActorSequence BL atristler startdate 05/01/2016
related = xmAcquireEvents
usage = public

[xmcalculateinformationdensity-command]
syntax = xmCalculateInformationDensity modelName
shortdesc = This command will recalculate information density for the model. A user must have SCM_POWER role to use this command.
description = This command will recalculate information density for all terrains, landscapes, and the ecosystem as a whole for the specified model. A user must have SCM_POWER role to use this command.
comment1 = This example recalculates information density for an existing model named 'BL'.
example1 = | xmCalculateInformationDensity BL
related = xmAcquireEvents
usage = public

[xmcalculatethresholds-command]
syntax = xmCalculateThresholds modelName
shortdesc = This command will recalculate thresholds for the model. A user must have SCM_POWER role to use this command.
description = This command will recalculate thresholds for all terrains for the specified model. A user must have SCM_POWER role to use this command.
comment1 = This example recalculates thresholds for an existing model named 'BL'.
example1 = | xmCalculateThresholds BL
related = xmAcquireEvents
usage = public

[xmcreateresourcemapping-command]
syntax = xmCreateResourceMapping json
shortdesc = This command will create/update a resource mapping using the supplied url encoded JSON. A user must have SCM_ADMIN role to use this command.
description = This command will create/update a resource mapping using the supplied url encoded JSON. A user must have SCM_ADMIN role to use this command.
comment1 = This example creates a resource ampping call Splunk_ES_Actor_to_Assets.
example1 = | xmCreateResourceMapping %7B%22Mapping%22%3A%7B%22name%22%3A%22Splunk_ES_Actor_to_Assets%22%2C%22description%22%3A%22Convert%20actors%20from%20identities.csv%20in%20Splunk%20ES%20and%20make%20them%20assets%20in%20bv_xr%20assets.csv%22%2C%22resourceType%22%3A%22ASSET%22%2C%22resourceSubType%22%3A%22HUMAN%22%2C%22fields%22%3A%5B%7B%22FieldMapping%22%3A%7B%22type%22%3A%22SPLIT-VALUE-MULTI-FIELDS%22%2C%22inputFieldName%22%3A%22identity%22%2C%22outputFields%22%3A%5B%22id%22%2C%22alternateIds%22%5D%2C%22outputFieldTokens%22%3A%5B0%2C-1%5D%2C%22inputSeparator%22%3A%22%20%22%2C%22transformations%22%3A%5B%7B%22Transformation%22%3A%7B%22type%22%3A%22TOKENIZE-AND-EXTRACT%22%2C%22separator%22%3A%22%20%22%2C%22extractToken%22%3A0%7D%7D%5D%7D%7D%2C%7B%22FieldMapping%22%3A%7B%22type%22%3A%22COPY-VALUE%22%2C%22inputFieldName%22%3A%22bunit%22%2C%22outputFieldName%22%3A%22businessUnit%22%7D%7D%2C%7B%22FieldMapping%22%3A%7B%22type%22%3A%22COPY-VALUE%22%2C%22inputFieldName%22%3A%22category%22%2C%22outputFieldName%22%3A%22categoryList%22%2C%22transformations%22%3A%5B%7B%22Transformation%22%3A%7B%22type%22%3A%22SEARCH-AND-REPLACE%22%2C%22search%22%3A%22%5C%5Cn%22%2C%22replace%22%3A%22%20%22%7D%7D%5D%7D%7D%2C%7B%22FieldMapping%22%3A%7B%22type%22%3A%22COPY-VALUE%22%2C%22inputFieldName%22%3A%22email%22%2C%22outputFieldName%22%3A%22email%22%7D%7D%2C%7B%22FieldMapping%22%3A%7B%22type%22%3A%22COPY-VALUE%22%2C%22inputFieldName%22%3A%22endDate%22%2C%22outputFieldName%22%3A%22endDate%22%2C%22transformations%22%3A%5B%7B%22Transformation%22%3A%7B%22type%22%3A%22DATE-STRING-TO-EPOCH%22%2C%22dateFormat%22%3A%22%25m%2F%25d%2F%25y%20%25GH%3A%25M%22%7D%7D%5D%7D%7D%2C%7B%22FieldMapping%22%3A%7B%22type%22%3A%22COPY-VALUE%22%2C%22inputFieldName%22%3A%22first%22%2C%22outputFieldName%22%3A%22firstName%22%7D%7D%2C%7B%22FieldMapping%22%3A%7B%22type%22%3A%22NONE%22%2C%22inputFieldName%22%3A%22identity_tag%22%7D%7D%2C%7B%22FieldMapping%22%3A%7B%22type%22%3A%22COPY-VALUE%22%2C%22inputFieldName%22%3A%2