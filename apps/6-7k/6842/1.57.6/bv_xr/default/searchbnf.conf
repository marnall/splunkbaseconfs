[xmverifyassets-command]
syntax = | xmVerifyAssets idlist=<string> [model=<string>]
shortdesc = This command takes a comma delimited list of asset identifiers and optional modelName and returns a list of those that do not exist in bv_xr.
description = This command takes a comma delimited list of asset identifiers and optional modelName and returns a list of those that do not exist in bv_xr. If model is not supplied, then the asset is assumed to be global or has an empty modelName.
example1 = | xmVerifyAssets idlist="XX.XX.XX.XX,XX.XX.XX.XX,XX.XX.XX.XX,invalid"
comment1 = This example will verify if the following asset ids exist in bv_xr: XX.XX.XX.XX, XX.XX.XX.XX, XX.XX.XX.XX, and invalid.
example2 = | xmVerifyAssets idlist="XX.XX.XX.XX,XX.XX.XX.XX,XX.XX.XX.XX,invalid" model=ANET
comment2 = This example will verify if the following asset ids exist with a modelName of ANET: XX.XX.XX.XX, XX.XX.XX.XX, XX.XX.XX.XX, and invalid.
