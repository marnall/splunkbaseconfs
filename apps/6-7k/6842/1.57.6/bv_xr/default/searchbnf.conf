[xmdiscoverpeergroups-command]
syntax = | xmDiscoverPeerGroups modelName [SIGNALPROPS prop1=value1|prop2=value2|...] [ANALYSISNAME name]
shortdesc = This command is used to discover peer groups for a particular model based on activities actors in the model have in common.
description = This command is used to discover peer groups for a particular model based on activities actors in the model have in common. There are 4 types of peer groups discovered by this command, the names assigened to the peer group define the type: complete, near, partial, and unassigned. Complete peer groups start with name complete_peers_ and represent actors that share the same a high percentage (i.e. 90%) of the same activities. Near peer groups start with name near_peers_ and represent actors that have a lower percentage of similar activities (i.e. 70%). Partial peer groups start with name partial_peers_ and are peers that share a lower percentage of activities (50%). Unassigned actors are those that could not be assigned to one of the other type of peer groups, actors. 
example1 = | xmDiscoverPeerGroups myModel
comment1 = This example discovers peer groups for a model named myModel.
related = xmListPeerGroups, xmRunLowGranularityPeerAnalysis
usage = public

[xmlistpeergroups-command]
syntax = | xmListPeerGroups modelName
shortdesc = This command lists peer groups created by xmDiscoverPeerGroups.
description = This command lists peer groups created by xmDiscoverPeerGroups. There are 4 types of peer groups listed by this command, complete, partial, near, and unassigned. The complete peer group consists of actors with the highest percentage of activities in common (90%). The Partial and near peer groups identify actors with 70% and 50% of activities (terrains) in common. The unassigned peer group consists of actorIds with less than 50% activities in common.
example1 = | xmListPeerGroups myModel
comment1 = This example lists peer groups discovered for model myModel by the xmDiscoverPeerGroupsCommand.
related = xmDiscoverPeerGroups, xmRunLowGranularityPeerAnalysis
usage = public


[xmruntransactionengine-command]
syntax = xmRunTransactionEngine [MODEL_NAME_COLUMN modelColumnName] [REFERENCE_KEY_COLUMN refKeyColumnName] [INTENSITY_COLUMN intensityColumnName] [WEIGHT_COLUMN weightColumn] [ANOMALY_GUID_COLUMN guidColumn] [ANOMALY_TYPE_COLUMN typeColumn] [ANOMALY_TIME_COLUMN timeColumn] [MAX_RECORDS maxRecordsToMaintainInMemory]
shortdesc = This is a long running stateful Splunk command to derive transaction risk by referenceKey.
description = This is a long running stateful Splunk command to derive transaction risk by referenceKey. The search should be ran real-time all-time and feed transaction anomaly signals to the command which will result in output the current normalized and absolute risk values for each transaction in near realtime. The left hand search is intended to be ran against the scm_signals index, the various COLUMN parameters allow the default names to be changed when used against a different data set.
example1 = index=scm_signal reference_key!="" category=ANOMALY | xmRunTransactionEngine
comment1 = This example uses default values to monitor and append normalized and absolute risk CIX values to each signal received. The name of the columns added to output are normalizedRisk and absoluteRisk.
example2 =  index=scm_signal reference_key!="" category=ANOMALY | xmRunTransactionEngine MAX_ROWS 10000
comment2 = This example will monitor and append normalized and absolute risk CIX values to each signal received but only 10000 records will be maintained in memory at a time. The default number of records maintained is 100K, this example will only keep the most recent 1000 records in memory. Do this to minimize memory usage in cases where transactions are short lived.
related = xmLearnTransactionSequence
usage = public

[xmlistsignaltypes-command]
syntax = xmListSignalTypes [CATEGORY category] [SOURCE source]
shortdesc = This command returns a summary of all signals that can be generated by analysis supported by the application.
description = This command returns a summary of all signals that can be generated by analysis supported by the application. Optionally output can be filtered by signal category and/or source. This command can be used to determine the list of signals. Valid category values are: INFORMATION, ANOMALY, HAZARD, VULNERABILITY, THREAT, OR RISK. Valid source values are: DATA_ACQUISITION, RUN_PEER_ANALYSIS, RUN_ACTOR_BEHAVIOR_ANALYSIS, RUN_ACTOR_DAY_OF_WEEK_ANALYSIS, THRESHOLD, SEQUENCE, HAZARD_DETECTION, THREAT_DETECTION, RULE, DISTRIBUTED_ANALYSIS, RELEVANCY_GRAPH_ANALYSIS, TRANSACTION_PATH_ANALYSIS, SIGNAL_SUPPERSSION, TRUST.
example1 = | xmListSignalTypes
comment1 = This will provide a complete list of all signal types supported by the application.
example2 =  | xmListSignalTypes CATEGORY ANOMALY
comment2 = This will provide a list of all anomaly signals that can be generated.
example3 =  | xmListSignalTypes CATEGORY INFORMATION SOURCE THRESHOLD
comment3 = This will provide a list of all information signals generated by threshold analysis.
related =
usage = public

[xmcreatemodel-command]
syntax = xmCreateModel MODEL_NAME modelName <application-option> <props-option>?
