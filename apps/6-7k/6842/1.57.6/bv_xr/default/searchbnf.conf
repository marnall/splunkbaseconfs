[xmgeneratesignal-command]
syntax = xmGenerateSignal [APPLICATION <app>] [SIGNAL_TYPE <signalType>] [ID signalId] [MODEL <modelName>] [CATEGORY <INFORMATION | ANOMALY | AD_HOC>] [ANALYSIS_NAME <name>] [INTENSITY <decimal>] [WEIGHT <weight>] [ACTOR_ID <actorId>] [ACTION <action>] [PROCESS <process>] [FIELD <field>] "[PROPS "prop1=value1|prop2=value2|..."]
shortdesc = This command is used to generate a signal using supplied command line parameters.
description = This command is used to generate a signal using supplied command line parameters. This command can be used in an extreme rules search action to genreate a signal to communicate results of a ruleSet's invocation via a custom signal. In the case of the search action, event attributes as well as built-in variables can be applied to the signal by using $<eventAttrName> or $<buildInVarableName>. The build in variables are: $rulePackageName, $ruleSetName, $ruleSetDescription, $ruleSetCix, and $ruleSetAlphacut. 
example1 = | xmGenerateSignal
comment1 = This example will genreate a signal of type AdHoc with a category of AdHoc using default values for weight, intensity, etc.
example2 =  | xmGenerateSignal TYPE RuleAnomaly MODEL_NAME myModelName ACTOR_ID myActor INTENSITY 0.78 PROPS "rule.set.cix=1.0|rule.set=myRuleSet|rulePackage=myRulePackage"
comment2 = This example will generate a signal of type RuleAnomaly with default values for id, category, and weight as defined by the RuleAnomaly signal. This example will set fields modelName to myMode, actorId to myActor, intensity to 0.78, and include 3 properties added to the singal.
example3 =  | xmGenerateSignal SIGNAL_TYPE UnusualActivityTime MODEL "myModel" ACTOR_ID "myActor" ACTION "myAction" PROCESS "myProcess" FIELD "myField" PROPS "prop1=value1|prop2=value2|prop3=value3"
comment3 = This example will generate a signal of type UnusualActivityTime which will have default values for id, category, and weight which are defined by the UnusualActivityTime signal. This example will also set fields actorId to myActor, action to myAction, process to myProcess, field to myField, modelName to myModel, and include 3 properties.
related = runExtremeRules
usage = public

[resourcelookup-command]
syntax = search | resourceLookup (actor | asset) ID <inputFieldNameId> MODEL <inputFieldNameModel> OUTPUT <dbFieldName>[ as <outputFieldName>] [<dbFieldName2>[ as <outputFieldName2>]
shortdesc = This command is used to lookup resources (actors or assets) from values in search data and add the specified fields from the resource record to search output.
description = This command is used to lookup resources (actors or assets) from values in search data and add the specified fields from the resource record to search output. This command can be used with a search to enrich data with actor or asset information. The ID <inputFieldNameId> parameter is the name of the field in search data that contains the resource's (actor or asset) primary or alternateId id. The MODEL field is the name of the field in search data that contains the name of the model the actor or asset belongs to. The OUTPUT parameter contains the list of fields from the resource record that will be added to search data. The 'as' can be used to rename the resource field before adding to output. The valid list of fields that can reside in OUTPUT are: primaryId, alternateIds, modelName, type, subType, criticality, and properties
example1 = index=scm_signal category=ANOMALY modelName=ANET | resourceLookup actor ID actorId MODEL modelName OUTPUT properties as actor_properties subType
comment1 = This example will use the actorId and modelName fields in input to lookup the actor identified in those fields. This command will add the actor's properties field as actor_properties and subType to the record.
example2 = index=scm_terrain_event modelName=ANET | resourceLookup asset ID src MODEL modelName OUTPUT properties as asset_properties subType
comment2 = This example will use the src and modelName fields in input to lookup the asset identified in those fields. This command will add the assets's properties field as asset_properties and subType to the record.
related = xmListActors xmGetActor
usage = public

