comment1 = This example runs a rule analysis for the rule package "Transaction_Rule_Package" over the specified date range.
related = xmCreateRulePackage, xmListRulePackages, xmListRulePackage, xmDeleteRulePackage, xmDeleteRulePackage,xmRunThresholdAnalysis, xmRunActorDayOfWeekAnalysis, xmRunActorBehaviorAnalysis, xmRunActorSequence, xmRunNaturalPeerAnalysis, xmAcquireEvents
usage = public

[xmcreaterulepackage-command]
syntax = | xmCreateRulePackage [MODEL_NAME modelName] RULE_PACKAGE urlEncodedRulePacakgeCSV RULE_SET urlEncodedRuleSetsCSV RULES urlEncodedRulesCSV <version-option>
shortdesc = This command is used to create an rulePackage (VERSION 1) or ExtremeRules (VERSION 2) rulePackage.
description = This command is used to create an rulePackage (VERSION 1) or ExtremeRules (VERSION 2) rulePackage. The supplied arguments consists of a URL encoded CSV rulePackage, ruleSets, and rules, the format of these records is version specific.
example1 = | xmCreateRulePackage MODEL_NAME "INTLSALES" RULE_PACKAGE "%22id%22%2C%22name%22%2C%22description%22%2C%22author%22%2C%22createDate%22%2C%22updateDate%22%2C%22ecoSystemId%22%0A%22%22%2C%22myPackage%22%2C%22Test%20version%201%20rule%20package%22%2C%22admin%22%2C%22%22%2C%22%22%2C%22%22" RULE_SET "%22id%22%2C%22taxonomyId%22%2C%22name%22%2C%22description%22%2C%22importance%22%0A%22%22%2C%22*TxnAmt%22%2C%22ruleSet1%22%2C%22Transaction%20amount%20high%22%2C%221%22%0A" RULES "%22ruleSetName%22%2C%22name%22%2C%22when%22%2C%22then%22%2C%22weight%22%0A%22ruleSet1%22%2C%22rule1%22%2C%22value%20FROM%20value_TxnAmt%20IN%20INTLSALES%20%20BY%20actor()%20IS%20%20high%22%2C%22risk%20is%20elevated%20by%20weight%22%2C%221%22%0A"
comment1 = This example creates a VERSION 1 (SCM) rule package called myPackage consisting of a single rule set which has one rule. In this example because VERSION (1|2) is omitted, VERSION 1 is assumed.
example2 = | xmCreateRulePackage RULE_PACKAGE %22id%22%2C%22name%22%2C%22application%22%2C%22search%22%2C%22dataDictionary%22%2C%22filterFields%22%2C%22description%22%2C%22author%22%2C%22properties%22%0A%2CmyPackage3%2C%22XVAW%22%2C%22index%3Dscm_terrain_event%22%2C%22%22%2CmodelName%3DINTL_SALES%2Ctest%20rule%20package%2C%2Cprop1%3Dvalue1%7Cprop2%3Dvalue2%7Cprop3%3Dvalue3  RULE_SET %22name%22%2C%22description%22%2C%22importance%22%2C%22generateSignal%22%2C%22signalCIX%22%2C%22ruleField%22%2C%22filterFields%22%0AruleSet1%2C%22Test%20rule%20set%201%22%2C1%2Ctrue%2C0.20%2Cvalue%2CtaxonomyId%3D*TxnAmt%0AruleSet2%2C%22Test%20rule%20set%202%22%2C1%2Ctrue%2C0.20%2Cvalue%2CtaxonomyId%3D*Transaction~Delta~time_diff VERSION 2
comment2 = This example creates a VERSION 2 (ExtremeRules) rule package called myPackage3 consisting of two rule sets each with one rule. In this case (as seen in the decoded rule package record) the rule package will be associated with application XVAW.
related = xmListRulePackages, xmListRulePackage, xmDeleteRulePackage, xmRunAnomalyRules, runExtremeRules
usage = public

