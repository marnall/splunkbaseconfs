[xmsetactor-command]
syntax = xmSetActor id=<string> type=actor subtype=(human | machine | service) model=<string> criticality=<string> createdate=<string> updatedate=<string> (alternateids=<string>)? (imageid=<string>)? (businessunit=<string>)? (categorylist=<string>)? (city=<string>)? (country=<string>)? (postalcode=<string>)? (gmtOffset=<int>)? (latitude=<string>)? (longitude=<string>)? (ownerlist=<string>)? (region=<string>)? (state=<string>)? (tag=<string>)? (watchlist=<string>)? (dateofbirth=<epoch>)? (enddate=<epoch>)? (email=<string>)? (firstname=<string>)? (gender=(m|f))? (lastname=<string>)? (managedby=<string>)? (phone1=<string>)? (phone2=<string>)? (prefix=<string>)? (startdate=<epoch>)? (suffix=<string>)? (title=<string>)? (cpuspeedghz=<string>)? (dnslist=<string>)? (hostname=<string>)? (iplist=<string>)? (mac=<string>)? (memorysizemb=<string>)? (numcpus=<string>)? (ostype=<string>)? (osversion=<string>)? (pcidomain=<string>)? (tags=<string>)? (description=<string>)? (name=<string>)?
shortdesc =  This command will create/update an actor within the Scianta Cognitive Modeler Framework. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command.
description = This command will create/update an actor within the Scianta Cognitive Modeler Framework. If creating a Machine Actor, the following fields are required: type, subtype, criticality, createdate, updatedate, hostname and iplist.  The Model parameter can contain an empty value (model=) to create a global actor which can be associated with any model that references the actorId. The following are optional parameters for a Machine Actor: alternateids, mac, dnslist, ostype, osversion, tags, businessunit, ownerlist, categorylist, watchlist, pciDomain, memorysizemb, numcpus, cpupeedghz, city, state, region, country, postalcode, latitude, longitude, and gmtoffset. If creating a Human Actor, the following fields are required: type, subtype, criticality, createdate, updatedate, firstname, and lastname. The following are optional parameters for a Human Actor: alternateids, prefix, firstname, lastname, suffix, email, phone1, phone2, title, tags, businessunit, ownerlist, categorylist,  watchlist, managedby, dateofbirth, gender, startdate, enddate, city, state, region, country, postalcode, latitude, longitude, and gmtoffset. A user must have SCM_POWER, SCM_ADMIN, or SCM_USER role to use this command.
example1 = | xmSetActor id=AAA  type=ACTOR subtype=MACHINE criticality=3 createdate=1464823653 updatedate=0 hostname=AAA iplist=XX.XX.XX.XX
comment1 = This example creates a global MACHINE ACTOR 'AAA' that has an IP Address of 'XX.XX.XX.XX'.
example2 = | xmSetActor id=jsmith  model=ANET type=ACTOR subtype=HUMAN criticality=3 createdate=1464823653 updatedate=0 firstname=John lastname=Smith
comment2 = This example creates a HUMAN ACTOR 'jsmith' associated with model ANET that has a firstname of 'John' and lastname of 'Smith'.
example3 = | xmSetActor id=finance  type=ACTOR subtype=SERVICE model=MyModel criticality=3 createdate=1464823653 updatedate=0 name=Finance
comment3 = This example creates a SERVICE ACTOR 'finance' associated with model MyModel that has a name of 'Finance'.
related = xmDeleteActor, xmGetActor, xmListActors
usage = public

