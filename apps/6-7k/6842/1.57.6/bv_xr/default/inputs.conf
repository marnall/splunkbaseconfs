# Don't need this, splunk is already monitoring all files in var/log/splunk
#[monitor://$SPLUNK_HOME/var/log/splunk/scm-framework.log]
#index = _internal
#sourcetype = scm_framework_log

[batch://$SPLUNK_HOME/var/spool/splunk/...stash_scm_signals/*.csv]
disabled = false
source=scm_signal
index=scm_signal
#sourcetype = stash
sourcetype = scm_signal
move_policy = sinkhole
crcSalt = <SOURCE>

[http://scm_terrain_event]
disabled = 0
index = scm_terrain_event
indexes = scm_terrain_event
token = 97ED0123-7C5E-43B3-A56F-7EF090F9905D

[script://$SPLUNK_HOME/etc/apps/bv_xr/bin/xmRunDataStore.py]
python.version = python3
disabled = 1
index = scm_signal
interval = -1
sourcetype = scm_script_run_data_store
passAuth = admin
