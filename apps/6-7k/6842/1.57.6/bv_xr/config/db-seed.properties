            "description" : "Defines the number of time periods model thresholds will use. The lower the value the less granular and sensive to time of day the model's thresholds will be. Likewise, the higher the value the more sensative threshold analysis will be to the time of day activity takes place. If a value of 1 is specified, each threshold will have 1 24 time period effectivlly removing time of day from threshold analysis. Likewise, if a value of 24 is specified then activity will be tracked and tested for each hour in a day making the time of day activity occurs very important during anomaly detection. Generally, it's better to use a value in the middle, like 6, which means there would be 6 thresholds (in 4 hour time blocks) created for every terrain in the model. The value specified for this property MUST be evenly divisible by 24.",
