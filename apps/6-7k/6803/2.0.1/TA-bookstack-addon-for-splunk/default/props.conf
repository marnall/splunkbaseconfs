[bookstack_users]
AUTO_KV_JSON = 0
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)\{\"id\"
MAX_TIMESTAMP_LOOKAHEAD = 30
NO_BINARY_CHECK = 1
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
TIME_PREFIX = \"updated_at\":\s\"

