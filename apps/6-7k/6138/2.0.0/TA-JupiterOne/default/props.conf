[jupiterone:alerts]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
KV_MODE = json
TIME_PREFIX = "lastUpdatedOn":\s
TIME_FORMAT = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 30
TZ = UTC
EVAL-severity_id = case(level="CRITICAL",10,level="HIGH",7,level="MEDIUM",5,level="LOW",2,level="INFO",0)
EVAL-type = "alert"
EVAL-app = "JupiterOne"
# CIM Field alias
FIELDALIAS-body = questionRuleInstance.description AS body
FIELDALIAS-description = questionRuleInstance.description AS description
FIELDALIAS-dest = accountId AS dest
FIELDALIAS-severity = level AS severity
FIELDALIAS-signature_id = questionRuleInstance.name AS signature_id
FIELDALIAS-src = ruleId AS src
FIELDALIAS-user = accountId AS user

[jupiterone:alerts:entities]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
KV_MODE = json
TIME_PREFIX = "_createdOn": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 30
TZ = UTC

[source::...ta-jupiterone*.log*]
sourcetype = tajupiterone:log

[source::...ta_jupiterone*.log*]
sourcetype = tajupiterone:log

