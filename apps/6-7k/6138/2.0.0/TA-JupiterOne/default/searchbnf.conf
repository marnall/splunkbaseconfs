[jupiteronesearch-command]
syntax =  jupiteronesearch query="<query>" account_name="<account name which is created in configuration tab>"
description = This command provides response of the query which you have passed in query parameter via REST API call to JupiterOne and displays the response in Splunk.
shortdesc = Provides the response in the Splunk for the query parameter which you have passed in <query> parameter of custom command. 
example1 = | jupiteronesearch query="Find jupiterone_user" account_name="Account1"
comment1 = Provides the response of all JupiterOne user present in JupiterOne portal via REST API call to JupiterOne and display the response in Splunk and Account1 is used to authenticate the API call.
example2 = | jupiteronesearch query="Find jupiterone_rule_alert" account_name="Account1"
comment2 = Provides the response of all the JupiterOne alerts present in JupiterOne portal via REST API call to JupiterOne and display the response in Splunk and Account1 is used to authenticate the API call.