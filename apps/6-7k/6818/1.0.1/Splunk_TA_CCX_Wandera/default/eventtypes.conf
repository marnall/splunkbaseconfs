[ccx_jamf_wandera_ids]
search = (sourcetype="jamf:wandera:hec") dataset_name="ids"
#tag = ids attack

[ccx_jamf_wandera_malware]
search = (sourcetype="jamf:wandera:hec") dataset_name="malware"
#tag = malware attack

[ccx_jamf_wandera_alert]
search = (sourcetype="jamf:wandera:hec") dataset_name="alert"
#tag = alert

[ccx_jamf_wandera_web]
search = (sourcetype="jamf:wandera:hec") url="*"
#tag = web

[ccx_jamf_wandera_network_traffic]
search = (sourcetype="jamf:wandera:hec") src_ip="*" AND dest_ip="*"
#tag = network communicate

[ccx_jamf_wandera_malware_operations]
search = (sourcetype="jamf:wandera:hec") AND NOT eventtype IN("ccx_jamf_wandera_malware") file_hash="*"
# tag = operations malware

[ccx_jamf_wandera_mobile]
search = (sourcetype="jamf:wandera:hec") os="*"
# tag = os system user version
