[googlescc_update_owner_lookup_from_index]
cron_schedule = */6 * * * *
description = Update roles/owner from index to owner_lookup
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = GoogleSCCAppforSplunk
request.ui_dispatch_view = search
search = `googlescc_index` sourcetype="google:scc:iam:assets" iamPolicy.bindings{}.role="roles/owner" OR asset.iamPolicy.bindings{}.role="roles/owner", ancestors{}="projects/*" OR asset.ancestors{}="projects/*" | eval "name"= coalesce('name','asset.name'), "iamPolicy.bindings{}"=coalesce('iamPolicy.bindings{}','asset.iamPolicy.bindings{}') | dedup name | spath input=_raw output=bindings iamPolicy.bindings{} | stats values(ancestor_project_id) as ancestor_project_id by bindings | spath input=bindings | where role="roles/owner" | rename members{} as members | table members, ancestor_project_id | outputlookup googlescc_owner_lookup

[googlescc_finding_state_lookup]
search = | maintainfindingstatelookup
dispatch.latest_time = now
disabled = 0
cron_schedule = */5 * * * *
enableSched = 1

