members = TA_certificates_expiry_fqdn_for_certificate, TA_certificates_expiry_settings

[admin_external:TA_certificates_expiry_settings]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = TA_certificates_expiry_rh_settings.py
