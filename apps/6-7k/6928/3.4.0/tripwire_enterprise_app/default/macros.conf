[te_tag_filter_string(2)]
args = tagSet, tagValue
definition = makeresults\
|eval tagSet=mvappend("$tagSet$",""),tagValue=mvappend("$tagValue$","")\
|eval isAllTagSet =if(isnotnull(mvfilter(tagSet="*")) ,1,0), isAllTagValue=if(isnotnull(mvfilter(tagValue="*")) ,1,0)\
|eval tagValue = if(isAllTagValue=1, "*", tagValue), tagSet = if(isAllTagSet=1, "*", tagSet)\
|stats count by tagSet, tagValue, isAllTagSet, isAllTagValue\
|search tagValue!="" AND tagSet!=""\
|eval tagSet = if(tagSet="*","%",tagSet), tagValue = if(tagValue="*", "%", tagValue)\
|eval filterStr1 = "like(TagSetValues, \"" . tagSet . "," .tagValue . "\")"\
|eval filterStr2 = "\"" . tagSet . "," .tagValue . "\""\
|eval filterString = if(isAllTagSet=0 AND isAllTagValue=0, filterStr2, filterStr1)\
|fields filterString, isAllTagSet, isAllTagValue\
|mvcombine delim=;  filterString | nomv filterString\
|eval delim=if(isAllTagSet=0 AND isAllTagValue=0, ", ", " OR ")\
|eval filterString=replace(filterString,";",delim)\
|eval filterString= case(isAllTagSet=1 AND isAllTagValue=1, "TagSetValues", isAllTagSet=0 AND isAllTagValue=0, "mvfilter(TagSetValues IN (" . filterString . "))", 1==1, "mvfilter(" . filterString . ")")\
|fields filterString\
|rename filterString as search
iseval = 0

[te_date_filter(3)]
args = arg_date_earliest, arg_date_latest, field_to_filter
definition = | eval arg_date_earliest="$arg_date_earliest$", arg_date_latest="$arg_date_latest$" \
| eval arg_date_earliest=case(arg_date_earliest="rt-30s","-30s@s",arg_date_earliest="rt-1m","-1m@m",arg_date_earliest="rt-5m","-5m@m",arg_date_earliest="rt-30m","-30m@m",arg_date_earliest="rt-1h","-1h@m",arg_date_earliest="rt","0",1=1,arg_date_earliest)\
| eval arg_date_latest=if(arg_date_latest="rt","now",arg_date_latest)\
| eval date_earliest=coalesce(if(isnum(arg_date_earliest),arg_date_earliest,relative_time(now(),arg_date_earliest)),0) \
| eval date_latest=coalesce(case(isnum(arg_date_latest),arg_date_latest,arg_date_latest="now",now(),1=1,relative_time(now(),arg_date_latest)),99999999999) \
| where $field_to_filter$ <= date_latest AND $field_to_filter$ >= date_earliest
iseval = 0

[comment(1)]
args = text
definition = ""
iseval = 1

