[asset_info]
filename = te_assets.csv
max_matches = 1

[tripwire_vendor_info_lookup]
filename = tripwire_vendor_info.csv
 
[object]
SOURCE_KEY = Element Name
REGEX = (?<object>[^\\/]+)$

[delete_header]
REGEX=^Node Name,Node Type,.+
DEST_KEY=queue
FORMAT=nullQueue
 
[object_path]
SOURCE_KEY = Element Name
REGEX = (?<object_path>^.*[\\/])\w+
 
[observedhash]
SOURCE_KEY = Attributes
REGEX =  ,Observed\=\"(?<Observed_Hash>[A-Fa-f0-9]{32,40})
 
[expectedhash]
SOURCE_KEY = Attributes
REGEX =  ,Expected\=\"(?<Expected_Hash>[A-Fa-f0-9]{32,40})
 
[observedsize]
SOURCE_KEY = Attributes
REGEX =  ,Observed\=\"(?<Observed_Size>\d+)
 
[expectedsize]
SOURCE_KEY = Attributes
REGEX =  ,Expected\=\"(?<Expected_Size>\d+)
 
[observedmodtime]
SOURCE_KEY = Attributes
REGEX =  ,Observed\=\"(?<Observed_Modtime>\d+\/\d+\/\d+\s\d{1,2}\:\d{1,2}\s[A|P]M)
 
[expectedmodtime]
SOURCE_KEY = Attributes
REGEX =  ,Expected\=\"(?<Expected_Modtime>\d+\/\d+\/\d+\s\d{1,2}\:\d{1,2}\s[A|P]M)

[te_asset_inventory]
collection = te_asset_inventory
external_type = kvstore
fields_list = AssetID, AssetIP, AssetType, CommonAgentCapabilities, CommonAgentOsName,CommonAgentOsVersion,CommonAgentUuid,CommonAgentVersion,DNSName,Description,Disabled,IPAddresses,IsLicensed,Licenses,MacAddresses,Make,Model,Name,SourceIdentifier,SourceName,Tag,TagSet,TagSetValues,Version

[te_test_and_policies]
collection = te_test_and_policies
external_type = kvstore
fields_list = TestID, PolicyID, SourceName, PolicyName, PolicyType, PolicyDescription, ParentGroup, ParentGroupList, FirstParentGroup, RootParentGroup

[te_adapter_logs_pipe_fields]
DELIMS = "|"
FIELDS = "timestamp", "log_level", "contextName", "marker", "mdc", "thread", "logger", "message"

[te_rest_api_logs_pipe_fields]
DELIMS = "|"
FIELDS = "timestamp", "log_level", "service", "thread", "logger", "message", "duration", "response_code", "client_ip", "user"

[response_id]
REGEX = \s+(GET|POST|PUT|DELETE|HEAD|OPTIONS|PATCH)\s+\/api\/v1\/
FORMAT = response_id::$1

# Extract response_code
[extract_response_code]
REGEX = response::\s+(?<response_code_value>\d+)
FORMAT = response_code_value::$1

# Extract user
[extract_user]
REGEX = by:\s+(?<user_name>\S+)
FORMAT = user_name::$1

# Extract duration
[extract_duration]
REGEX = duration:\s\{(?<duration_value>\d+)\}\sms
FORMAT = duration_value::$1

# Extract teserver log_level
[extract_log_level]
REGEX = ^(?<log_level>\w+)

# Extract teserver instance
[extract_instance]
REGEX = ^[^\|]*\|\s+(?<instance>[^\|]+)

# Extract teserver timestamp
[extract_timestamp]
REGEX = ^[^\|]*\|\s+[^\|]*\|\s+(?<timestamp>\d{4}/\d{2}/\d{2}\s\d{2}:\d{2}:\d{2})

# Extract teserver message
[extract_message]
REGEX = (?m)\|\s+(?<message>[^\|]+)$

# Extract teserver ip and port
[extract_ip_port_general]
REGEX = (?<ip>\d{1,3}(?:\.\d{1,3}){3}):(?<port>\d+)

# Post 3.5.0 Version
# Extract te_policy fields
[te_policy_lookup]
collection = te_policy_lookup
external_type = kvstore
fields_list = PolicyID, PolicyName, PolicyType, PolicyDescription, AssetID, trackingId, SourceName timestamp

# Extract te_rules fields
[te_rules_lookup]
collection = te_rules_lookup
external_type = kvstore
fields_list = RuleID, RuleName, RuleType, RuleDescription, ParentGroups_id, ParentGroups_name, importedTime, SourceIdentifier, trackingId, SourceName, timestamp

# Extract te_rules fields
[te_waiver_lookup]
collection = te_waiver_lookup
external_type = kvstore
fields_list = WaiverID, WaiverName, Description, responsible, grantedBy, classification, startTime, expiration, Closed, AssetID, TestID, PolicyID, TestName, DNSName, AssetIP,PolicyName, SourceName, timestamp


# Extract te_policytest fields
[te_policytest_lookup]
collection = te_policytest_lookup
external_type = kvstore
fields_list = TestID, RuleID, TestName, TestType, Description, Remediation, Severity, importedTime, modifiedTime, elementNameConditions, versionConditions, SourceName, timestamp, excludedNodes

# Extract te_policytesttoparentgroups fields
[te_policytesttoparentgroups_lookup]
collection = te_policytesttoparentgroups_lookup
external_type = kvstore
fields_list = timestamp, SourceName, SourceIdentifier, TestID, PolicyID, ParentGroup, ParentGroupList, FirstParentGroup, RootParentGroup

# Extract te_policypathitems fields
[te_policypathitems_lookup]
collection = te_policypathitems_lookup
external_type = kvstore
fields_list = timestamp, SourceName, SourceIdentifier, PolicyID, PolicyName, PolicyType, PolicyDescription

# Extract configuration_id fields from message
[extract_configuration_id]
REGEX = "ConfigurationId":"([^"]+)"
FORMAT = ConfigurationId::$1
WRITE_META = true

# Extract te_policypathitems fields short version
[te_test_and_policies_short]
collection = te_test_and_policies_short
external_type = kvstore
fields_list = TestID, PolicyID, SourceName, PolicyName

