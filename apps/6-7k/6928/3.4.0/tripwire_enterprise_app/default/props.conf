[te_adapter_logs]
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
CHARSET = UTF-8
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 28
REPORT-pipefields = te_adapter_logs_pipe_fields

[te_rest_api_logs]
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
CHARSET = UTF-8
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 28
REPORT-pipefields = te_rest_api_logs_pipe_fields
REPORT-response_id = response_id
REPORT-extract_duration = extract_duration
REPORT-extract_user = extract_user
REPORT-extract_response_code = extract_response_code

[te_server_logs]
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
CHARSET = UTF-8
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 28
TIME_FORMAT = %Y/%m/%d %H:%M:%S
TIME_PREFIX = ^[^\|]*\|\s+[^\|]*\|\s+
REPORT-loglevel = extract_log_level
REPORT-instance = extract_instance
REPORT-timestamp = extract_timestamp
REPORT-message = extract_message
REPORT-extract_ip_and_port_general = extract_ip_port_general