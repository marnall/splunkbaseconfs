target-version = "py39"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "G",    # flake8-logging-format (catches eager f-strings in logging calls)
    "UP",   # pyupgrade
]

# Bundled third-party libs — don't lint them.
exclude = ["lib/"]
