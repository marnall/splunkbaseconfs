[restartinput-command]
syntax = restartinput (<restartinput-options>)*
shortdesc = Restart an input.
description = Restart an input. Must specify an app, an input type and either a script (type=script) or input (all other types).
usage = public

[restartinput-options]
syntax = app=<string> | type=<string> | input=<string> | script=<string>
description = The restartinput command restarts an input or script when an `input`\
  or `script` belonging to an `app` of a `type` (e.g.: udp, script, monitor) is specified.