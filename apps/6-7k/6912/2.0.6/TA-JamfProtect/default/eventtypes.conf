###Jamf Protect Alerts eventtypes###

# Set Index when implementing in your organization
[jamf_protect]
search = index="*" sourcetype="jamf:protect:alerts"

[jamf_protect_alerts]
search = eventtype="jamf_protect" sourcetype="jamf:protect:alerts" severity!=informational input.eventType!=GPUnifiedLogEvent

[jamf_protect_informational]
search = eventtype="jamf_protect" sourcetype="jamf:protect:alerts" severity=informational input.eventType!=GPUnifiedLogEvent

[jamf_protect_unified_logs]
search = eventtype="jamf_protect" sourcetype="jamf:protect:alerts" input.eventType=GPUnifiedLogEvent

[jamf_protect_threat_known]
search = eventtype="jamf_protect" sourcetype="jamf:protect:alerts" input.eventType=GPThreatMatchExecEvent

[jamf_protect_custom_prevent]
search = eventtype="jamf_protect" sourcetype="jamf:protect:alerts" input.eventType=GPPreventedExecutionEvent

[jamf_protect_device_controls]
search = eventtype="jamf_protect" sourcetype="jamf:protect:alerts" input.eventType=auth-mount

###Jamf Protect Telemetry v2###

# Exec
[jamf_protect_telemetry_exec]
search = (sourcetype=jamf:protect:telemetry:v2:exec) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_exec_interactive]
search = (sourcetype=jamf:protect:telemetry:v2:exec) metadata.product="Device Telemetry Stream" tty_path="*"

[jamf_protect_telemetry_exec_noninteractive]
search = (sourcetype=jamf:protect:telemetry:v2:exec) metadata.product="Device Telemetry Stream" NOT tty_path="*"

[jamf_protect_telemetry_exec_blocked]
search = (sourcetype=jamf:protect:telemetry:v2:exec) metadata.product="Device Telemetry Stream" action=blocked

# XProtect
[jamf_protect_telemetry_xp_malware_detected]
search = (sourcetype=jamf:protect:telemetry:v2:xp_malware_detected) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_xp_malware_remediated]
search = (sourcetype=jamf:protect:telemetry:v2:xp_malware_remediated) metadata.product="Device Telemetry Stream"

# TouchID Failure
[jamf_protect_telemetry_touchid_failure]
search = (sourcetype=jamf:protect:telemetry:v2:authentication) authentication_method=touchid action=failure

# Token Failure
[jamf_protect_telemetry_token_failure]
search = (sourcetype=jamf:protect:telemetry:v2:authentication) authentication_method=token action=failure

# Apple Watch Unlock
[jamf_protect_telemetry_apple_watch_unlock]
search = (sourcetype=jamf:protect:telemetry:v2:authentication) authentication_method=auto_unlock auto_unlock_type=machine_unlock

# Apple Watch Auth
[jamf_protect_telemetry_apple_watch_auth]
search = (sourcetype=jamf:protect:telemetry:v2:authentication) authentication_method=auto_unlock auto_unlock_type=auth_prompt

# Sudo
[jamf_protect_telemetry_sudo_success]
search = (sourcetype=jamf:protect:telemetry:v2:sudo) metadata.product="Device Telemetry Stream" action=success

[jamf_protect_telemetry_sudo_failure]
search = (sourcetype=jamf:protect:telemetry:v2:sudo) metadata.product="Device Telemetry Stream" action=failure

# Remote
[jamf_protect_telemetry_openssh_login_success]
search = (sourcetype=jamf:protect:telemetry:v2:openssh_login) metadata.product="Device Telemetry Stream" action=success

[jamf_protect_telemetry_openssh_login_failure]
search = (sourcetype=jamf:protect:telemetry:v2:openssh_login) metadata.product="Device Telemetry Stream" action=failure

[jamf_protect_telemetry_screensharing_success]
search = (sourcetype=jamf:protect:telemetry:v2:screensharing_attach) metadata.product="Device Telemetry Stream" action=success

[jamf_protect_telemetry_screensharing_failure]
search = (sourcetype=jamf:protect:telemetry:v2:screensharing_attach) metadata.product="Device Telemetry Stream" action=failure

# Persistence
[jamf_protect_telemetry_btm_add]
search = (sourcetype=jamf:protect:telemetry:v2:btm_launch_item_add) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_btm_add_not_managed]
search = (sourcetype=jamf:protect:telemetry:v2:btm_launch_item_add) metadata.product="Device Telemetry Stream" btm_item_is_managed=false

[jamf_protect_telemetry_btm_add_is_legacy]
search = (sourcetype=jamf:protect:telemetry:v2:btm_launch_item_add) metadata.product="Device Telemetry Stream" btm_item_is_legacy=true

[jamf_protect_telemetry_btm_remove]
search = (sourcetype=jamf:protect:telemetry:v2:btm_launch_item_remove) metadata.product="Device Telemetry Stream"

# User Management
[jamf_protect_telemetry_password_change_success]
search = (sourcetype=jamf:protect:telemetry:v2:od_modify_password) metadata.product="Device Telemetry Stream" status=success

[jamf_protect_telemetry_password_change_failure]
search = (sourcetype=jamf:protect:telemetry:v2:od_modify_password) metadata.product="Device Telemetry Stream" status=failure

[jamf_protect_telemetry_create_user]
search = (sourcetype=jamf:protect:telemetry:v2:od_create_user) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_delete_user]
search = (sourcetype=jamf:protect:telemetry:v2:od_delete_user) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_create_group]
search = (sourcetype=jamf:protect:telemetry:v2:od_create_group) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_delete_group]
search = (sourcetype=jamf:protect:telemetry:v2:od_delete_group) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_group_add]
search = (sourcetype=jamf:protect:telemetry:v2:od_group_add) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_group_remove]
search = (sourcetype=jamf:protect:telemetry:v2:od_group_remove) metadata.product="Device Telemetry Stream"

# Profile Add/Remove
[jamf_protect_telemetry_profile_add]
search = (sourcetype=jamf:protect:telemetry:v2:profile_add) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_profile_add_manual]
search = (sourcetype=jamf:protect:telemetry:v2:profile_add) metadata.product="Device Telemetry Stream" install_source=manual

[jamf_protect_telemetry_profile_remove]
search = (sourcetype=jamf:protect:telemetry:v2:profile_remove) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_profile_remove_manual]
search = (sourcetype=jamf:protect:telemetry:v2:profile_remove) metadata.product="Device Telemetry Stream" install_source=manual

[jamf_protect_telemetry_gatekeeper_user_override]
search = (sourcetype=jamf:protect:telemetry:v2:gatekeeper_user_override) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_mount_external]
search = (sourcetype=jamf:protect:telemetry:v2:mount) metadata.product="Device Telemetry Stream" disposition=external

[jamf_protect_telemetry_mount_network]
search = (sourcetype=jamf:protect:telemetry:v2:mount) metadata.product="Device Telemetry Stream" disposition=network

[jamf_protect_telemetry_network]
search = (sourcetype=jamf:protect:telemetry:v2:network_connect) metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_network_outbound]
search = (sourcetype=jamf:protect:telemetry:v2:network_connect) direction=outbound metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_network_inbound]
search = (sourcetype=jamf:protect:telemetry:v2:network_connect) direction=inbound metadata.product="Device Telemetry Stream"

[jamf_protect_telemetry_tcc_modify]
search = (sourcetype=jamf:protect:telemetry:v2:tcc_modify) metadata.product="Device Telemetry Stream"

###Jamf Protect Telemetry (Deprecated)###

#################################
# Non-Specific Events
#################################

[jamf_protect_interactive]
search = sourcetype="jamf:protect:telemetry*" NOT (subject.audit_user_name="-1" OR subject.terminal_id.port=0)

[jamf_protect_non-interactive]
search = sourcetype="jamf:protect:telemetry*" subject.terminal_id.port=0

#################################
# Accounts (groups/users)
#################################
# All account events
[jamf_protect_account-all-events]
search = (sourcetype=jamf:protect:telemetry:account)

# All group events
[jamf_protect_account_group-change]
search = (sourcetype=jamf:protect:telemetry:account) header.event_name="AUE_*_group"

# Group creation
[jamf_protect_account_group-create]
search = (sourcetype=jamf:protect:telemetry:account) header.event_name="AUE_create_group"

# Group deletion
[jamf_protect_account_group-delete]
search = (sourcetype=jamf:protect:telemetry:account) header.event_name="AUE_delete_group"

# Group modification
[jamf_protect_account_group-modify]
search = (sourcetype=jamf:protect:telemetry:account) (header.event_name="AUE_modify_group" OR header.event_name="AUE_add_to_group")

# All user events
[jamf_protect_account_user-change]
search = (sourcetype=jamf:protect:telemetry:account) header.event_name="AUE_*_user"

# User creation
[jamf_protect_account_user-create]
search = (sourcetype=jamf:protect:telemetry:account) header.event_name="AUE_create_user"

# User deletion
[jamf_protect_account_user-delete]
search = (sourcetype=jamf:protect:telemetry:account) header.event_name="AUE_delete_user"

# User modification
[jamf_protect_account_user-modify]
search = (sourcetype=jamf:protect:telemetry:account) header.event_name="AUE_modify_user"

[jamf_protect_account_discovery]
search = sourcetype=jamf:protect:telemetry:exec "dscl"

#################################
# Audit
#################################
# All audit events
[jamf_protect_audit]
search = sourcetype=jamf:protect:telemetry:audit

#################################
# Authentication
#################################
# All authorization events
[jamf_protect_authorization]
search = (sourcetype=jamf:protect:telemetry:auth) (auth_mech_verb=entitiled OR header.event_name="AUE_ssauthorize")

[jamf_protect_authentication]
search = ((sourcetype=jamf:protect:telemetry:auth) AND (header.event_id=45023 OR header.event_id=45021 OR header.event_id=45026))

# All auth events
[jamf_protect_auth]
search = (sourcetype=jamf:protect:telemetry:auth) NOT (header.event_name="AUE_ssauthorize")

# Auth Failure
[jamf_protect_auth_failure]
search = (sourcetype=jamf:protect:telemetry:auth) "header.event_name"=AUE_auth_user return.error!=0 NOT (auth_mech_verb=entitled OR "header.event_name"=AUE_ssauthorize OR "subject.process_name"="/System/Library/PrivateFrameworks/AuthKit.framework/Versions/A/Support/akd")

# Auth Success
[jamf_protect_auth_success]
search = (sourcetype=jamf:protect:telemetry:auth) "header.event_name"=AUE_auth_user return.error=0 NOT (auth_mech_verb=entitled OR header.event_name=AUE_ssauthorize)

# Auth Failure - Password
[jamf_protect_auth_failure_password]
search = (sourcetype=jamf:protect:telemetry:auth) auth_mech=builtin return.error!=0 NOT (auth_mech_verb=entitled)

# Auth Failure - Touch ID
[jamf_protect_auth_failure_touchid]
search = (sourcetype=jamf:protect:telemetry:auth) auth_mech="Touch ID authentication" return.error!=0 NOT (auth_mech_verb=entitled OR "header.event_name"=AUE_ssauthorize)

[jamf_protect_auth_login_piv]
search = (sourcetype=jamf:protect:telemetry:auth) auth_mech=PKINITMechanism

[jamf_protect_auth_login_piv_success]
search = (sourcetype=jamf:protect:telemetry:auth) auth_mech=PKINITMechanism "return.error"=0

[jamf_protect_auth_login_piv_failed]
search = (sourcetype=jamf:protect:telemetry:auth) auth_mech=PKINITMechanism "return.error"!=0

[jamf_protect_auth_login_service_acct]
search = (sourcetype=jamf:protect:telemetry:auth) return.error=0 NOT (auth_mech_verb=entitled) (subject.audit_id<=500 OR subject.audit_user_name="_*")

[jamf_protect_auth_login_service_acct_failure]
search = (sourcetype=jamf:protect:telemetry:auth) NOT (return.description="failure : Operation not permitted" OR return.error="255" OR header.event_name="AUE_ssauthorize") (subject.audit_id<=500 OR subject.audit_user_name="_*") (return.error!=0)

[jamf_protect_auth_login_service_acct_success]
search = (sourcetype=jamf:protect:telemetry:auth) NOT (return.description="failure : Operation not permitted" OR return.error="255" OR header.event_name="AUE_ssauthorize") (subject.audit_id<=500 OR subject.audit_user_name="_*") (return.error=0)

# Auth Success - Password
[jamf_protect_auth_success_password]
search = (sourcetype=jamf:protect:telemetry:auth) NOT (return.description="failure : Operation not permitted" OR return.error="255" OR header.event_name="AUE_ssauthorize") texts{}="Verify password*" app="authorizationhost" return.description="success"

# Auth Success - Touch ID
[jamf_protect_auth_success_touchid]
search = (sourcetype=jamf:protect:telemetry:auth) NOT (return.description="failure : Operation not permitted" OR return.error="255" OR header.event_name="AUE_ssauthorize") texts{}="Touch ID authentication" return.description="success"

[jamf_protect_auth_service_acct_login]
search = (sourcetype=jamf:protect:telemetry:auth) NOT (return.description="failure : Operation not permitted" OR return.error="255" OR header.event_name="AUE_ssauthorize") (subject.audit_id<=500 OR subject.audit_user_name="_*")

[jamf_protect_auth_service_acct_login_failure]
search = (sourcetype=jamf:protect:telemetry:auth) NOT (return.description="failure : Operation not permitted" OR return.error="255" OR header.event_name="AUE_ssauthorize") (subject.audit_id<=500 OR subject.audit_user_name="_*") (return.error!=0)

[jamf_protect_auth_service_acct_login_success]
search = (sourcetype=jamf:protect:telemetry:auth) NOT (return.description="failure : Operation not permitted" OR return.error="255" OR header.event_name="AUE_ssauthorize") (subject.audit_id<=500 OR subject.audit_user_name="_*") (return.error=0)

[jamf_protect_authorization_checks_escalated_privileged]
search = (sourcetype=jamf:protect:telemetry:auth) auth_category="system*"

[jamf_protect_auth_privileged_escalation]
search = (sourcetype=jamf:protect:telemetry:auth) auth_mech_rights="privileged" NOT auth_mech_verb="entitled"

[jamf_protect_auth_privileged_preference_sharing]
search = (sourcetype=jamf:protect:telemetry:auth) auth_category="com.apple.opendirectoryd.linkidentity" NOT auth_mech_verb="entitled"

[jamf_protect_auth_privileged_authentication]
search = (sourcetype="jamf:protect:telemetry:auth" "header.event_name"=AUE_auth_user subject.effective_user_id=0 NOT subject.audit_user_name="-1")

[jamf_protect_auth_privileged_failure]
search = sourcetype=jamf:protect:telemetry:auth auth_mech_rights="privileged" "return.error"=1 NOT auth_mech_verb="entitled"

[jamf_protect_auth_privileged_success]
search = sourcetype=jamf:protect:telemetry:auth auth_mech_rights="privileged" "return.error"=0 NOT auth_mech_verb="entitled"

# Auth - Privileged (sudo)
[jamf_protect_auth_successful_sudo]
search = (sourcetype=jamf:protect:telemetry:auth) NOT (return.description="failure : Operation not permitted" OR return.error="255" OR header.event_name="AUE_ssauthorize") subject.process_name="/usr/bin/sudo"

#################################
## Disk/Volume
#################################

# All Mount/Unmount activity
[jamf_protect_diskvol]
search = (sourcetype=jamf:protect:telemetry:disk)

# Disk/Volume mounted
[jamf_protect_diskvol_mount]
search = (sourcetype=jamf:protect:telemetry:disk) header.event_name="AUE_MOUNT"

# Disk/Volume unmounted
[jamf_protect_diskvol_unmount]
search = (sourcetype=jamf:protect:telemetry:disk) header.event_name="AUE_UNMOUNT"

#################################
# Execution
#################################
# All exec events
[jamf_protect_exec]
search = (sourcetype=jamf:protect:telemetry:exec)

# App launched by root or background process
[jamf_protect_exec_privileged_background]
search = (sourcetype=jamf:protect:telemetry:exec) subject.effective_user_name="root" NOT auth_mech_verb="entitled"

# Firewall activity
[jamf_protect_exec_firewall]
search = (sourcetype=jamf:protect:telemetry:exec) subject.process_name="/usr/libexec/ApplicationFirewall/socketfilterfw"

# All user elevated priv actions
[jamf_protect_exec_privileged_actions]
search = (sourcetype=jamf:protect:telemetry:exec) NOT subject.audit_id="0" (subject.effective_user_id="0" OR subject.effective_group_id="0") NOT auth_mech_verb="entitled" "subject.terminal_id.port"!=0

[jamf_protect_exec_from_external]
search = (sourcetype=jamf:protect:telemetry:exec) subject.process_name="/Volumes/*"

[jamf_protect_global_service_action]
search = (sourcetype=jamf:protect:telemetry*) (subject.audit_user_name=-1 OR subject.terminal_id.port=0)

[jamf_protect_exec_from_hidden_folder]
search = (sourcetype=jamf:protect:telemetry:exec) (subject.process_name="*/\.*")

[jamf_protect_exec_service_action]
search = (sourcetype=jamf:protect:telemetry:exec) (subject.audit_user_name=-1 OR subject.terminal_id.port=0)

[jamf_protect_exec_applescript_action]
search = (sourcetype=jamf:protect:telemetry:exec) (subject.process_name="/usr/bin/osascript" OR subject.process_name="osascript")

#################################
# Internal
#################################
# All internal events
[jamf_protect_internal]
search = (sourcetype=jamf:protect:telemetry:internal)

# License events
[jamf_protect_internal_license]
search = (sourcetype=jamf:protect:telemetry:internal) header.event_name="LICENSE_INFO_EVENT"

#################################
# Listen
#################################
# All listen events
[jamf_protect_listen]
search = (sourcetype=jamf:protect:telemetry:listen) header.event_name="AUE_LISTEN"

#################################
# Misc
#################################
# All miscelanious events
[jamf_protect_misc]
search = (sourcetype=jamf:protect:telemetry:misc)

#################################
# Network
#################################
# All network events
[jamf_protect_network]
search = (sourcetype=jamf:protect:telemetry:network)

# System network events
[jamf_protect_network_background_service]
search = (sourcetype=jamf:protect:telemetry:network) socket_inet.ip_address="*" subject.effective_user_name="root"

# User network events
[jamf_protect_network_interactive_non-privileged]
search = (sourcetype=jamf:protect:telemetry:network) socket_inet.ip_address="*" subject.terminal_id.port!=0 NOT subject.effective_user_name="root"

#################################
# Session
#################################
# All session events
[jamf_protect_session]
search = (sourcetype=jamf:protect:telemetry:session)

[jamf_protect_remote_cli_session]
search = sourcetype="jamf:protect:telemetry*" subject.terminal_id.ip_address!="0.0.0.0"

[jamf_protect_remote_desktop_connected]
search =  sourcetype="jamf:protect:telemetry*" subject.process_name="/System/Library/CoreServices/RemoteManagement/screensharingd.bundle/Contents/MacOS/screensharingd"

[jamf_protect_session_start]
search =  sourcetype="jamf:protect:telemetry*" header.event_name=AUE_SESSION_START

[jamf_protect_session_end]
search =  sourcetype="jamf:protect:telemetry*" (header.event_name=AUE_SESSION_END OR header.event_name="AUE_SESSION_CLOSE" OR header.event_name=AUE_logout)

[jamf_protect_session_refresh]
search =  sourcetype="jamf:protect:telemetry*" "header.event_name"=AUE_SESSION_UPDATE

#################################
# Time
#################################
# All time events
[jamf_protect_time]
search = (sourcetype=jamf:protect:telemetry:time)

#################################
# Jamf Security Cloud
#################################

# Set Index when implementing in your organization
[jamf_protect_web]
search = index="*" sourcetype="jamf:protect:web:*"

[jamf_protect_web_threat]
search = eventtype=jamf_protect_web event.metadata.product="Threat Events Stream"

[jamf_protect_web_traffic]
search = eventtype=jamf_protect_web event.metadata.product="Network Traffic Stream"