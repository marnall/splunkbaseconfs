[Lookup Parent Process]
display_location = event_menu
fields = parent_process_guid
label = Lookup Parent Process
search.app = AddOn-JamfProtect
search.earliest = -24h
search.preserve_timerange = 0
# Set Index when implementing in your organization
search.search_string = index="*" eventtype=jamf_protect_telemetry_exec process_guid="$parent_process_guid$"
search.target = blank
type = search

