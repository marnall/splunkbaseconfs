###Sourcetype Transforms###
[set_sourcetype_jamf_protect_alerts]
DEST_KEY = MetaData:Sourcetype
REGEX = {"input":{"match":{"facts"
FORMAT = sourcetype::jamf:protect:alerts

[set_jamf_protect_web_traffic]
FORMAT = sourcetype::jamf:protect:web:traffic
REGEX = \"product\"\:\"Network Traffic Stream\"
DEST_KEY = MetaData:Sourcetype

[set_jamf_protect_web_threat]
FORMAT = sourcetype::jamf:protect:web:threat
REGEX = \"product\"\:\"Threat Events Stream\"
DEST_KEY = MetaData:Sourcetype

###REPORTs - Protect Alerts###
[jamf_protect_appid]
FORMAT = appid::$1
REGEX = "processes\":.*?,\"appid\":\"([^\"]*)"

[jamf_protect_cdhash]
FORMAT = cdhash::$1
REGEX = "processes\":.*?,\"cdhash\":\"([^\"]*)"

[jamf_protect_clean_contexts]
REGEX = \{"name":"([^"]+)","value":"([^"]+)","
FORMAT = $1::$2
MV_ADD = 1

[jamf_protect_file_info]
REGEX = related\":\s*\{.*?(?:binaries|files)\":.*?path\":\s*\"(?P<file_path>[^\"]+)\/(?P<file_name>[^\"]+)\"
MV_ADD = 1

[jamf_protect_group_info]
REGEX = "groups":\s*\[{"gid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"}(?:,\s*{"gid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"})?
FORMAT = group_id::$1 group_name::$2 group_uuid::$3 group_id::$4 group_name::$5 group_uuid::$6
MV_ADD = 1

[jamf_protect_mitre_technique_id]
FORMAT = mitre_technique_id::$1
REGEX = \"MITREattack\".*?(T\d{1,4}(?:\.\d{1,4})?)\"

[jamf_protect_process_path]
FORMAT = process_path::$1 parent_process_path::$2
REGEX = .*,\"processes\":.*?,\"originalParentPID\":.*?,\"path\":\"([^\"]*)\",(?:.*?\"path\":\"([^\"]*)\")?

[jamf_protect_process_args]
FORMAT = process_args::$1 parent_process_args::$2
REGEX = ".*?,\"processes\":.*?,\"args\":\[([^\]]+)\]\,.*?\,\"args\":\[([^\]]+)\]

[jamf_protect_sha1]
FORMAT = sha1::$1 parent_sha1::$2
REGEX = sha1hex\":\"([^\"]*)\".*sha1hex\":\"([^\"]*)\"

[jamf_protect_sha256]
FORMAT = sha256::$1 parent_sha256::$2
REGEX = sha256hex\":\"([^\"]*)\".*sha256hex\":\"([^\"]*)\"

[jamf_protect_short_usernames]
REGEX = shortUsername \= (?P<user>[^\,]*), userID \= (?P<user_id>\d*), groupID \= (?P<group_id>\d*)

[jamf_protect_signertype]
FORMAT = signerType::$1
REGEX = \"processes\":.*?\"signerType\":(\d)

[jamf_protect_signing_status]
FORMAT = signingInfo_status::$1
REGEX = \"processes\":.*?,.*?\"status\":([^\"]*)\,

[jamf_protect_signing_status_message]
FORMAT = signingInfo_statusMessage::$1
REGEX = "processes\":.*?,\"statusMessage\":\"([^\"]*)"

[jamf_protect_teamid]
FORMAT = teamid::$1
REGEX = "processes\":.*?,\"teamid\":\"([^\"]*)"

[jamf_protect_user_info]
REGEX = \s*"related":\s*{"users":\s*\[{"uid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"}(?:,\s*{"uid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"})?
FORMAT = user_uid::$1 user::$2 user_uuid::$3 user_uid::$4 user::$5 user_uuid::$6
MV_ADD = 1

#####################################
# Jamf Protect Telemetry v2
#####################################

# Universal Transforms
[jamf_protect_telemetry_event_name]
FORMAT = event_name::$1
REGEX = event\"\:\{\"([^\"]+)

[jamf_protect_telemetry_original_file_name]
FORMAT = original_file_name::$1
REGEX = (?:exec|child|instigator|responsible)\".*?executable\"\:\{\"path\"\:\"[^\"]*\/([^\"]*)

# Exec Transforms
[jamf_protect_telemetry_args_compiled]
FORMAT = args_compiled::$1
REGEX = exec\"\:\{\"args\"\:\[(.*?)\]

# Mount Transforms
[jamf_protect_telemetry_mount_on_name]
FORMAT = file_name::$1
REGEX = f_mntonname\"\:\"[^\"]*\/([^\"]*)

# XProtect Transforms
[jamf_protect_telemetry_xp_file_name]
FORMAT = xp_file_name::$1
REGEX = (?:xp_malware_detected|xp_malware_remediated)\"\:.*(?:detected_path|remediated_path)\"\:\"(?:[^\"]*\/)?([^\"]*)

# Remote Application Transforms
[jamf_protect_telemetry_remote_app]
FORMAT = app::$1
REGEX = process.*?path\"\:\"[^\"]*\/([^\"]*)

# Persistence Transforms
[jamf_protect_telemetry_service_name]
FORMAT = service_name::$1
REGEX = (?:executable_path|item_url)\":\"[^\"]*\/([^\/\"]+?)(?:[\/\\\\\"])|$

# Gatekeeper User Override Transforms
[jamf_protect_telemetry_gk_file_name]
FORMAT = file_name::$1
REGEX = file\"\:\{\"path\"\:\"[^\"]*\/([^\"]*)

