[script:stack_connect]
match                 = /stack_connect
script                = stack_connect.py
python.version        = python3
scripttype            = persist
handler               = application.Stack_Connect
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true

