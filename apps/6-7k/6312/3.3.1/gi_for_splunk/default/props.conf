[splunk_app]
EXTRACT-anomaly_id = ^[^ \n]* '(?P<id>[^']+)
EXTRACT-anomaly_id,description,confidence,type,status = ^\{'\w+':\s+'(?P<anomaly_id>[^']+)',\s+'\w+':\s+'(?P<description>[^']+)',\s+'\w+':\s+'(?P<confidence>[^']+)',\s+'\w+':\s+'(?P<type>\w+)(?:[^ \n]* ){10}'(?P<status>\w+)
EXTRACT-asset_type = ^[^ \n]* '(?P<asset_type>[^']+)
EXTRACT-category_id,category_name,category_description = ^[^:\n]*:\s+'(?P<category_id>[^']+)[^:\n]*:\s+'(?P<category_name>[^']+)[^:\n]*:\s+'(?P<category_description>[^']+)
EXTRACT-current_status = ^(?:[^,\n]*,){9}\s+'\w+':\s+'(?P<current_status>\w+)
EXTRACT-data_source = ^(?:[^'\n]*'){7}(?P<data_source>\w+)
EXTRACT-data_source,source_name,port = ^(?:[^:\n]*:){10}\s+'(?P<data_source>\w+)[^:\n]*:\s+'(?P<source_type>[^']+)(?:[^'\n]*'){8}(?P<port>\d+)
EXTRACT-database_id = ^(?:[^\{\n]*\{){2}'\w+_\w+':\s+'(?P<database_id>[^']+)
EXTRACT-database_id_ano = ^(?:[^:\n]*:){7}\s+'(?P<database_id>[^']+)
EXTRACT-ip,hostname,anomaly_count = ^(?:[^ \n]* ){7}'(?P<ip>[^']+)(?:[^:\n]*:){8}\s+'(?P<hostname>[^']+)(?:[^ \n]* ){8}(?P<anomaly_count>\d+)
EXTRACT-risk = ^[^\}\n]*\},\s+'\w+_\w+':\s+(?P<risk>[^,]+)
EXTRACT-sequence_anomalies = ^(?:[^,\n]*,){10}\s+'\w+_\w+':\s+'(?P<sequence_anomalies>[^']+)
EXTRACT-time = ^(?:[^:\n]*:){8}\s+'(?P<time>\d+\-\d+\-\d+\w+:\d+:\d+)
EXTRACT-type,confidence,status = ^(?:[^ \n]* ){3}'(?P<type>[^']+)',\s+'\w+':\s+'(?P<confidence>\d+)(?:[^ \n]* ){8}'(?P<status>\w+)
EXTRACT-type,time = ^(?:[^ \n]* ){7}'(?P<type>\w+)(?:[^'\n]*'){8}(?P<time>[^']+)
TRUNCATE = 250000

[gi_reports]
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
description = Reports Full SQL
disabled = false
pulldown_type = true

[gi_risks]
description = Risk events 
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Custom
disabled = false
pulldown_type = true
TRUNCATE = 250000

