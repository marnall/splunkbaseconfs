panel-23 = save

[xv_actor_threat_dashboard]
question-1 = "What does the ACTOR THREATS BY ACCUMULATIVE RISK SCORE chart represent?"
answer-1 = "The ACTOR THREATS BY ACCUMULATIVE RISK SCORE chart displays a node on the chart for each unique actor that one or more threats detected. The risk score for each Threat Signal for an individual actor are added together. Actors with higher accumulated risk scores will be displayed farther from the center of the chart, while actors with lower accumulated risk scores will be displayed closer to the center of the chart.<br></br>By placing the mouse cursor over the node, the Actor and their Accumulative Risk Score will be displayed in a popup.  By clicking on the node, the ACTOR THREATS chart will be filtered to only display the threats for the respective Actor the node represents."
question-2 = "What does the ACTOR THREATS BY NUMBER OF OBSERVABLES chart represent?"
answer-2 = "The ACTOR THREATS BY NUMBER OF OBSERVABLES chart displays a node on the chart for each unique actor that has one or more threats detected. The number of observables associated with the actor are added together. Actors with a higher number of observables will be displayed farther from the center of the chart, while actors with a lower number of observables will be displayed closer to the center of the chart.<br></br>By placing the mouse cursor over the node, the actor and their number of observables will be displayed in a popup.  By clicking on the node, the ACTOR THREATS chart will be filtered to only display the threats for the respective Actor the node represents."

[xv_asset_threat_dashboard]
question-1 = "What does the ASSET THREATS BY ACCUMULATIVE RISK SCORE chart represent?"
answer-1 = "The ASSET THREATS BY ACCUMULATIVE RISK SCORE chart displays a node on the chart for each unique asset that one or more threat signals have been generated. The risk score for each Threat Signal for an individual asset are added together. Assets with a higher accumulated risk scores will be displayed farther from the center of the chart, while assets with a lower accumulated risk score will be displayed closer to the center of the chart.<br></br>By placing the mouse cursor over the node, the Asset and their Accumulative Risk Score will be displayed in a popup.  By clicking on the node, the ASSET THREATS chart will be filtered to only display the threats for the respective Asset the node represents."
question-2 = "What does the ASSET THREATS BY NUMBER OF OBSERVABLES chart represent?"
answer-2 = "The ASSET THREATS BY NUMBER OF OBSERVABLES chart displays a node on the chart for each unique asset that one or more threat signals have been generated. The number of observables associated with the individual asset are added together. Assets with a higher number of observables will be displayed farther from the center of the chart, while assets with a lower number of observables will be displayed closer to the center of the chart.<br></br>By placing the mouse cursor over the node, the asset and their number of observables will be displayed in a popup.  By clicking on the node, the ASSET THREATS chart will be filtered to only display the threats for the respective Asset the node represents."


[xv_create_analysis_configuration]
question-1 = "What is an Analysis Configuration?"
answer-1 = "An Analysis Configuration, as the name implies, are all the properties and functional attributes required to schedule an analysis. These comprise everything necessary to execute an analysis and observe the results."
panel-1 = name

question-2 = "Why do I need an analysis configuration?"
answer-2 = "First, you can create many analyses, each having its own properties and contents. Second, without a name you cannot tell Extreme Vigilance which analysis to use at any point in time. Third, a naming convention for an analysis allows you to separate analyses with the same type of analysis but with different functions and purposes. Fourth, only one primary analysis can be deployed for each analytical phase for each incoming event and, of course, you access this through its name."
panel-2 = name

question-3 = "What is a valid Analysis Configuration name?"
answer-3 = "A configuration name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) and the underscore character."
panel-3 = name

question-4 = "What is the Analysis Configuration description?"
answer-4 = "A analysis description, as the name implies, is a free-form textual description of the analysis’ functionality and objectives (purpose). This may include such elements as the analysis’ creator (individual or team), the analysis’ purpose, the analysis’ constraints, proposed frequency of use, and so forth."
panel-4 = name

question-5 = "What is a valid Analysis Configuration description?"
answer-5 = "A description can be any quoted string between one and 512 characters. The description cannot contain quoted strings using the same quote symbol. As an example of a description: “An advanced peer-to-peer analysis aimed only at senior marketing executive in the California and Northwest Regions."
panel-5 = name

question-6 = "How are Analysis Configuration names used?"
answer-6 = "An analysis name is used throughout Extreme Vigilance to identify which analysis should be applied at a particular time (generally as a result of a stored search pattern). As a user, you mainly interact with Extreme Vigilance through its set of graphical user interfaces. But beneath these visual interfaces, a wide assortment of commands are being issued (such as xmPeertoPeerAnalysis() that measures the operational similarity between actors that are considered peers.)<br></br>An analysis configuration name is the name of a stored search process that sets up the proper environment for an analysis and then executes what every analysis command (or sets of analysis commands) that are specified by the search creator).  The analysis name and the analysis description appear in the profile signal for each specified analysis."
panel-6 = name

question-7 = "Why do I need to select a model?"
answer-7 = "A model is the name of an Extreme Vigilance instance. You need to tell the analysis the name of the model against which the analysis will be applied."
panel-7 = model

question-8 = "The model I want is not in the list. Why?"
answer-8 = "You can only select activated (deployed) models. If model name is not on the list then it has not been activated. Even personal and private models must be activated before you can create a stored analysis. This restriction is necessary to insure that a model is properly initialized and that the current information density metric has been computed (information density plays an important role in scaling the levels of observables, hazards, and threats.)"
panel-8 = model

question-9 = "What does the number of Landscapes tell me?"
answer-9 = "There is one landscape for each actor (containing all the behavior learning terrains for each selected field in each event type). Hence the number of landscapes tells you the number of actors."
panel-9 = model

question-10 = "What does the number of Actions tell me?"
answer-10 = "There is one terrain for each unique action. Hence the number of actions tells you the number of fields that are being analyzed across all the different event types."
panel-10 = model

question-11 = "What does the number of Graphs tell me?"
answer-11 = "Graphs are used to learn the order of actions performed by an actor on each day of the week. The number of graph actions will tell you the total number of unique actions that have been discovered and placed in their relative orders. The ordering of actions is probabilistic. Meaning that the system learns how many times a series of actions occur in the model."
panel-11 = model

question-12 = "What does Information Density tell me?"
answer-12 = "This metric aims to tell you whether or not you have enough information to trust Extreme Vigilance’s hazard and threat classifications. Information density combines two types of measurements: first, the degree to which the regular working or operational days of the week and hours of the day have been discovered; second, the degree to which enough data exists in the actor terrains to discover normal behavior (and, hence, accurately measure anomalous behavior). The two values are averaged to get the information density measure. A number greater than [.65] is generally good, and number below [.50] means that model is generally untrustworthy."
panel-12 = model

question-13 = "What are analysis types?"
answer-13 = "This part of the Analysis Wizard will let you pick one or more analyses. The name of the analysis specifies a particular kind of underlying analysis. In general here are two basic families of analyses: event-driven and actor-driven. An event-driven analysis (such as threshold monitoring) is applied to the fields in each incoming event. An actor-driven analysis (such as peer-to-peer) involves a comparison of behaviors and thus uses either terrains or graphs (such as order of operation)."
panel-13 = analysis

question-14 = "What are analysis parameters?"
answer-14 = "This is the additional information you provide the selected analysis that tells it how to perform a specific type or degree or intensity of analysis. See Analysis Parameters for more extensive information of what kinds of parameters you must (or can) supply to each kind of analysis."
panel-14 = analysis

question-15 = "What does a Threshold Analysis do?"
answer-15 = "A threshold is a measure of the most likely range of values that a field can safely assume. This range of values is based on a complex statistical analysis of the data derived from the history files used to create the Extreme Vigilance model (or, for new actors, the values are learned while the actor is in learning mode). A threshold analysis compares the incoming value of a field (or the current value of the field on the terrain) against the range of allowed fields to determine the degree to which the data is inconsistent with the threshold. Fields with inconsistent data are identified by an observable describing the degree that the threshold was violated."
panel-15 = analysis

question-16 = "What does a Sequence Analysis do?"
answer-16 = "A sequence analysis is shorthand for Actor Order of Operations analysis. The order of operations is the sequence in which an actor normally performs a series of actions (such as authentication  check emails  logon to VPN  start sales app). Obviously an actor (especially a human actor) does not do the same set of actions in precisely the time order and at precisely the same time of day on each day of the week. Hence the variations in the sequence of actions are maintained in a graph so that the transition from one action to the next is learned as a probability. An activity sequence analysis identifies and signals transitions that have low probabilities at a particular time and on a particular day of week."
panel-16 = analysis

question-17 = "What does an Actor Analysis do?"
answer-17 = "An actor analysis is shorthand for Actor Change in Behavior analysis. This analytical method is deigned to discover actors whose behaviors are changing over time. To do this we select N days of history and divide the days into M days of equal length. We then compare, using similarity metrics, M with M+1, then M+1 to M+2, all the way until we have evaluated M-1 intervals. From a change in the set of similarity measurements we can determine whether or not the behavior of an actor is changing over time (and also the rate of this change)."
panel-17 = analysis

question-18 = "What does an Actor Day Of Week Analysis do?"
answer-18 = "This is the same as the aggregate Actor Change in Behavior analysis except that the similarity analysis is performed at the day of week level."
panel-18 = analysis

question-19 = "What does a Peer Analysis do?"
answer-19 = "A peer-to-peer analysis, as the name implies, compares the time varying behavior of actors with like properties that are functional or operational peers. By “liked properties” we mean that they have the same defining attributes (for human actors this might be age, gender, education, duration of employment). By “peer”, we mean that he actors perform essentially the same kind of function. For human actors this might simply be job title and line of business thus separating, as an example, department managers (a job title) in marketing from those in engineering from those in logistics (line of business). Peer-to-Peer analysis measures the degree to which to actors are similar across all their actions."
panel-19 = analysis

question-20 = "Why do I need to create Saved Searches?"
answer-20 = "Extreme Vigilance stores the commands to run an analysis within a Splunk Saved Search. A Saved Search will be created to acquire new events for each data dictionary used to create the model.  Additional Saved Searches will be created to check for Hazards and Threats."
panel-20 = saved-searches

question-21 = "Why do I need to Activate a Scheduled Analysis?"
answer-21 = "The Saved Searches previously created are not scheduled to run.  Activating an Analysis essentially creates a Scheduled Saved Search that will ensure the saved searches (previously created) are ran in the correct sequence and with the correct parameters."
panel-21 = activate

