[xv_licensing]
question-1 = "What happens when my license expires?"
answer-1 = "When your license expires, you can no longer create cognitive models and analysis can no longer be performed for new events.  You can still view results of any analysis performed prior to the license expiration."

question-2 = "How do I get a license?"
answer-2 = "When your license expires, please contact contact@bluevoyant.com for information on pricing and obtaining a license."

question-3 = "Why can't I add a license?"
answer-3 = "Currently only a 120 day trial license is being provided with this release. Please contact sales to obtain full-functional release and license pricing information."

[xv_rule_packages]

question-1 = "What is a rule package?"
answer-1 = "A rule package defines a set of rules that can be run as an analysis to detect observables. The sets of rules are written in the conceptual search language and the rules are evaluated together to determine whether an observable should be generated.  The observables will only be generated if the compatibility of a rule set exceeds an alphacut."

[xv_rule_package_detail]
question-1 = "What is a valid rule package name?"
answer-1 = "A rule package name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) and the underscore character."
panel-1 = name

question-2 = "What is the rule package description?"
answer-2 = "A rule package description, as the name implies, is a free-form textual description of the rule package. This may include such elements as the rule package's creator (individual or team), the rule package's purpose, the rule package’s limitations, and so forth."
panel-2 = name

question-3 = "Why do I need to specify a cognitive model?"
answer-3 = "Rule packages are associated to a cognitive model.  The rule sets in the rule package operate on the taxonomies (or terrains) identified in the specified model."
panel-3 = name

question-4 = "What is a rule set?"
answer-4 = "A rule package contains one or more rule sets where each rule set operates on a specific taxonomy.  The taxonomy (also referred to as a terrain) can be fully qualified identifying a single taxonomy (e.g., Authentication-desktop-success) or you can specify a regular expression for a group of similiar taxonomies (e.g., Authentication*). When a rule analysis is performed on a rule package, an observable could potentially be generated by a rule set for each event matching the specified taxonomy."
panel-4 = rule-sets

question-5 = "How is the rule set name and description used?"
answer-5 = "The rule set name and description will be displayed to analysts when viewing a 'Rule Obserable' in the user interface. Special care should be taken when crafting the name and description so that it adequately describes the anomalous behavior to the end user."
panel-5 = rule-sets

question-6 = "How is the rule set 'Importance' setting used?"
answer-6 = "A rule set has an importance setting which is a multiplier applied to the rule set compatibility index (CIX) and when the resulting value exceeds an alphacut will result in the generation of an observable for the event being analyzed.  The rule set CIX is the average of the CIX for the individual rules in the rule set evaluated against an event."
panel-6 = rule-sets

question-7 = "What is a rule?"
answer-7 = "A rules set contains one or more rules where each rule is written in qualitative expression.  The individual rules will determine how compatible an event is with the qualitative expression generating a compatibility index (CIX) value."
panel-7 = rule-sets

question-8 = "How is the rule 'Weight' setting used?"
answer-8 = "A rule has a weight setting which is a multiplier applied to the rule compatibility index (CIX)."
panel-8 = rule-sets

question-9 = "What is the format for the qualitative expression in the WHEN clause?"
answer-9 = "Qualitative expressions are in the following format:<br/><br/>operater [from context] [in container] [by class] is [hedge,..] [concept|scalar] <br/><br> Valid operators include : value, count(hour), count(day), count(week) and count(month)<br/><br/>"
panel-9 = rule-sets

question-10 = "Why can't I set the THEN clause?"
answer-10 = "Currently only the one clause is supported: risk is elevated by weight"
panel-10 = rule-sets

question-11 = "Is there any limitation on number of rule sets or rules in a rule package?"
answer-11 = "There is no limit on the number of rule sets in a rule package and there is no limit on the number of rules in a rule set."
panel-11 = rule-sets

question-12 = "What is a context?"
answer-12 = "A context is a coherent grouping of concepts and the generated concepts are minimal, low, medium, high, and extreme. The context here will have its concepts evenly distributed across the range of values (domain) identified by the search."
panel-12 = contexts

question-13 = "How were these contexts identified?"
answer-13 = "Each rule set is associated with a taxonomy (or terrain) which will be used in the context name. Each rule in the rule set may require a context based on the operator and classes selected."
panel-13 = contexts

question-14 = "How do the contexts get created?"
answer-14 = "When creating the rule package, the contexts identified need to be created.  By default, each context is selected (with the checkbox) for creation and all you need to do is click the 'Create Contexts' button.  You can choose to create these at a later time; however, the contexts must exist prior to using the rule package in rule analysis.  If you are updating an existing rule package, the contexts that exist will have a status of 'CREATED' with the checkbox unchecked.  You could choose to re-create the contexts by checking the checkboxes and clicking the 'Create Contexts' button."
panel-14 = contexts

question-15 = "Why is the 'Save Rule Package' button disabled?"
answer-15 = "When updating an existing rule package, the rule button will remain disabled until you have made a change."
panel-15 = save

question-16 = "What to do when the save fails?"
answer-16 = "If you click the Save button and it fails, an error message should be displayed indicating the reason for the failure.  Most common failures are due to invalid or missing values in a qualitative expression or other field on the Rule Set tab."
panel-16 = save

[xv_extreme_rule_packages]

question-1 = "What is an extreme rule package?"
answer-1 = "An extreme rule package defines a set of rules that can be applied to a set of events to derive compatibility and trigger an action such as generating an alert or running a search. The sets of extreme rules are written in the conceptual search language and the extreme rules are evaluated together to derive a compatibility index (CIX) indicating how compatible those events are with th rules. Rule actions can be configured if the compatibility of a rule set exceeds an alphacut."

[xv_extreme_rule_package_detail]
question-1 = "What is a valid extreme rule package name?"
answer-1 = "An extreme rule package name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) and the underscore character."
panel-1 = name

question-2 = "What is the extreme rule package description?"
answer-2 = "An extreme rule package description, as the name implies, is a free-form textual description of the extreme rule package. This may include such elements as the extreme rule package's creator (individual or team), the extreme rule package's purpose, the extreme rule package’s limitations, and so forth."
panel-2 = name

question-3 = "Why do I need to specify a data dictionary or search?"
answer-3 = "The user can enter a search or specify a data dictionary (which is based on a search) to identify fields from events for analysis. After entering a search (or data dictionary), the user can specify a data range and click a button to validate the search is correct and returns results."
panel-3 = name

question-4 = "What is a rule set?"
answer-4 = "An extreme rule package contains one or more rule sets where each rule set operates on a specific event field.  The rule sets can be made up of one or more rules."
panel-4 = rule-sets

question-5 = "How is the rule set name and description used?"
answer-5 = "The rule set name and description will be displayed to analysts when viewing a 'Rule Observable' in the user interface. Special care should be taken when crafting the name and description so that it adequately describes the anomalous behavior to the end user."
panel-5 = rule-sets

question-6 = "How is the rule set 'Importance' setting used?"
answer-6 = "A rule set has an importance setting which is a multiplier applied to the rule set compatibility index (CIX) and when the resulting value exceeds an alphacut will result in the generation of an observable (if configured) for the event being analyzed.  The rule set CIX is the average of the CIX for the individual rules in the rule set evaluated against an event."
panel-6 = rule-sets

question-7 = "What is  the Event Value field?"
answer-7 = "The event value field identifies the field in raw events that the rule set will evaluate."
panel-7 = rule-sets

question-8 = "What is  the Event Filter field?"
answer-8 = "The rule set filter provides an additional  way to filter which events the rule set will be applied.  If the specified field in the event has the specified value, then the rule set is evaluated; otherwise, the event is skipped."
panel-8 = rule-sets

question-9 = "What are rule set actions?"
answer-9 = "Currently there are two supported actions that can be triggered when a rule set's compatability index (CIX) for an event exceeds the specified alphacut. A Rule Observable can be generated only if the Rule Package is based on a data dictionary.  The other option is to specify a search to run. You can reference any of the following attributes from the rule package to include in the search string:<br><br>$signalGuid<br>$rulePackageName<br>$rulePackageDescription<br>$ruleSetName<br>$ruleSetDescription<br>$ruleSetCix<br>$ruleSetAlphacut<br>$ANY_EVENT_FIELD_NAME_HERE<br><br>The following is an example of a search string using a rule package attribute:<br><br> | sendmail to='user@company.com' subject='$rulePackageName' message='$rulePackageDescription'"
panel-9 = rule-sets

question-10 = "What is the Generate Rule Observable action?"
answer-10 = "You can select the option to generate a rule observable for the rule set if the CIX exceeds the specified alphacut.  The generated observable will have the name of the rule set and the observable description will be the rule set description."
panel-10 = rule-sets

question-11 = "What is the Add Field action?"
answer-11 = "When the Generate Rule Observable option is selected, the user  can also select the Add Field option to specify one or more name/value pairs to the added to the properties of a generated rule observable. There is a special eval tag named source_override that can be added to override the signals source field."
panel-11 = rule-sets

question-12 = "What is the Run Search action?"
answer-12 = "You can select the option to execute the specified search for the rule set if the CIX exceeds the specified alphacut. You can reference any of the following attributes from the rule package to include in the search string:<br><br>$signalGuid<br>$rulePackageName<br>$rulePackageDescription<br>$rulePackageCix<br>$rulePackageAlphacut<br>$ANY_EVENT_FIELD_NAME_HERE<br><br>The following is an example of a search string using a rule package attribute:<br><br> | sendmail to='user@company.com' subject='$rulePackageName' message='$rulePackageDescription'"
panel-12 = rule-sets

question-13 = "What is a rule?"
answer-13 = "A rule set contains one or more rules where each rule is written in qualitative expression.  The individual rules will determine how compatible an event is with the qualitative expression generating a compatibility index (CIX) value."
panel-13 = rule-sets

question-14 = "How is the rule 'Weight' setting used?"
answer-14 = "A rule has a weight setting which is a multiplier applied to the rule compatibility index (CIX)."
panel-14 = rule-sets

question-15 = "What is the format for the qualitative expression in the WHEN clause?"
answer-15 = "Qualitative expressions are in the following format:<br/><br/>operater [from context] [in container] [by class] is [hedge,..] [concept|scalar] <br/><br> Valid operators include : value, count(hour), count(day), count(week) and count(month)<br/><br/>"
panel-15 = rule-sets

question-16 = "Why can't I set the THEN clause?"
answer-16 = "Currently only the one clause is supported: risk is elevated by weight"
panel-16 = rule-sets

question-17 = "Is there any limitation on number of rule sets or rules in an extreme rule package?"
answer-17 = "There is no limit on the number of rule sets in an extreme rule package and there is no limit on the number of rules in a rule set."
panel-17 = rule-sets

question-18 = "What are rule package actions?"
answer-18 = "The generation of an observable or execution of a search string can be triggered at the rule package level. If the overall (or average) CIX of rule sets contained in this package evaluate to a value higher than the specified alphacut, the the respective action will be performed."
panel-18 = rule-package

question-19 = "What is the Generate Rule Observable action?"
answer-19 = "You can select the option to generate a rule observable for the rule package if the overal CIX exceeds the specified alphacut.  The generated observable will have the name of the rule package and the observable description will be the rule package description."
panel-19 = rule-package

question-20 = "What is the Add Field action?"
answer-20 = "When the Generate Rule Observable option is selected, the user  can also select the Add Field option to specify one or more name/value pairs to the added to the properties of a generated rule observable. There is a special eval tag named source_override that can be added to override the signals source field."
panel-20 = rule-package

question-21 = "What is the Run Search action?"
answer-21 = "You can select the option to execute the specified search for the rule package if the overall CIX exceeds the specified alphacut. You can reference any of the following attributes from the rule package to include in the search string:<br><br>$signalGuid<br>$rulePackageName<br>$rulePackageDescription<br>$rulePackageCix<br>$rulePackageAlphacut<br>$ANY_EVENT_FIELD_NAME_HERE<br><br>The following is an example of a search string using a rule package attribute:<br><br> | sendmail to='user@company.com' subject='$rulePackageName' message='$rulePackageDescription'"
panel-21 = rule-package

question-22 = "Why is the 'Save Extreme Rule Package' button disabled?"
answer-22 = "When updating an existing extreme rule package, the rule button will remain disabled until you have made a change."
