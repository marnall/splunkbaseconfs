[xv_missing_resources]

question-1 = "What type of resources do you support?"
answer-1 = "Extreme Vigilance supports two types of resources: actors and assets.  Actors perform actions associated with Assets. These are key elements in cognitive models that tie everything together."

question-2 = "What are missing resources?"
answer-2 = "When historical data is initially loaded into cognitive models, the events are associated to an actor and assets.  If the actors are not defined in Extreme Vigilance, then we will discard the event from the model.  If the assets are not defined, we will still incorporate the event into Extreme Vigilance; however, we will not be able to analyze its relationship with the asset."

[xv_model_summary]

[xv_models]
question-1 = "What is a cognitive model?"
answer-1 = "A cognitive model is the named, container that holds (persists) all the information about actors and assets in an Extreme Vigilance system.  A cognitive model consumes events, learns normal behavior, detects and quantifies anomalous behaviors, and communicates with the outside world through a stream of signals."

question-2 = "How are cognitive model names used?"
answer-2 = "A cognitive model name is used throughout Extreme Vigilance to identify which cognitive model is the subject (or target) of a command. As a user, you mainly interact with Extreme Vigilance through its set of graphical user interfaces. But beneath these visual interfaces, a wide assortment of commands are being issued (such as xmAcquireEvents() that actually reads in the current set of events from the Splunk indexing system. The cognitive model name supplied to the command tells the command where to send the events.)"

question-3 = "Can I have more than one cognitive model?"
answer-3 = "There is no limit on the number of cognitive models."
panel-3 = name

[xv_properties]

question-1 = "What are properties?"
answer-1 = "Properties are attribute-value pairs that specify operating parameters within Extreme Vigilance.  It is recommended that you utilize professional service engineers when modifying properties to tune the Extreme Vigilance Applications."

[xv_resource_mapper]

question-1 = "What is a Resource Mapping?"
answer-1 = "A resource mapping is a collection of definitions that defines how fields in an external CSV file will be mapped to fields in an Extreme Vigilance resource file.  Extreme Vigilance has two types of resource files: actors.csv and assets.csv."
panel-1 = name

question-2 = "Why do I need a Resource Mapping?"
answer-2 = "A Resource Mapping provides the means to import (or migrate) actor and asset information from another source into Extreme Vigilance.  Extreme Vigilance maintains Actor and Asset information in the following resource files, respectively: actors.csv and assets.csv.  Extreme Vigilance will only perform analysis on known actors and assets.  For example, if events contains actors that Extreme Vigilance does not know about, they will be ignored."
panel-2 = name

[xv_resource_mapper_detail]

question-1 = "What is a valid Resource Mapping name?"
answer-1 = "A resource mapping name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) and the underscore character."
panel-1 = name

question-2 = "What is the Resource Mapping description?"
answer-2 = "A resource mapping description, as the name implies, is a free-form textual description of the resource mappings overall characteristics. This may include such elements as the creator (individual or team), the resource type, any limitations, and so forth."
panel-2 = name

question-3 = "What are Resource Mapping Types?"
answer-3 = "A resource mapping type will either be ACTOR or ASSET.  An input CSV file containing actor information should use a mapping that has a type of ACTOR and an input CSV file containing asset information should use a mapping that has a type of ASSET. The resulting type will determine whether actors.csv or assets.csv file will be updated within Extreme Vigilance, respectively."
panel-3 = type

question-4 = "Why are there ACTOR subtypes and what are they?"
answer-4 = "The following ACTOR subtypes are defined: HUMAN, MACHINE, or SERVICE.  There are common fields for all the ACTOR subtypes; but, we provide additional fields to store information unique to the subtypes for display purposes."
panel-4 = type

question-5 = "Why are there ASSET subtypes and what are they?"
answer-5 = "The following ASSET subtypes are defined: HUMAN and MACHINE.  There are common fields for all the ASSET subtypes; but, we provide additional fields to store information unique to the subtypes for display purposes."
panel-5 = type

question-6 = "Why do I need to upload a file to create a mapping?"
answer-6 = "The easies way to create a resource mapping is to use a sample of the CSV file you will want to load.  The individual fiels will be discovered and displayed for you on the Mapping step."
panel-6 = file

question-7 = "Can I drag and drop the file on the page?"
answer-7 = "You can either use the browse button to explore the filesystem on your local computer to find the file or you can drag it directly into the target box on the page."
panel-7 = file

question-8 = "Can I use a file format other than CSV?"
answer-8 = "Currently, we only support a CSV file format for Resource Mapping.  It is also required that the first line in the CSV file contain the CSV headers as per the specification.  It is this header row we use to identify the input field names to be mapped."
panel-8 = file

question-9 = "How do I select which fields I want to map?"
answer-9 = "When creating a mapping resource, each field discovered in the file will be displayed in its own row. To have the field mapped, all you have to do is select an output field name.  If no output field name is specified, then the field will not be mapped."
panel-9 = mapping

question-10 = "What is the COPY-VALUE mapping type?"
answer-10 = "The COPY-VALUE Mapping Type will take the value currently stored in the input field and copy it into the output field.  There is also a Default Value option where a value can be specified for the output field if no value is found in the input field."
panel-10 = mapping

question-11 = "What is the SPLIT-VALUE-MULTI-FIELDS mapping type?"
answer-11 = "The SPLIT-VALUE-MULTI-FIELDS Mapping Type supports the case where an input field contains multiple values separated by some delimiter (e.g, space) that you want mapped to multiple output fields.  For example, the identities.csv file from the Splunk Enterprise Security (ES) app has an identity field that can contain many different values identifying an individual actor.  The first value could be mapped to the Extreme Vigilance id field and the remaining values can be mapped to the Extreme Vigilance alternateIds. <br></br> In order to use this capability, you have to select at least two output fields.  If you select more than two output fields, then the first value found will go to the first output field, the second value found will go to the second output field and so on.  Additional values will all be mapped to the last identified output field."
panel-11 = mapping

question-12 = "What is the VALUE-MAPPING mapping type?"
answer-12 = "The VALUE-MAPPING Mapping Type allows you to specify a list of choices on how input field values should be mapped. If you click on the Set Choices button, then you will be presented an example choice list that you can modify by adding choices, removing choices, or modifying the existing choices.  For example, the identities.csv file from Splunk Enterprise Security (ES) app has a priority field that contains the following values: low, medium, high, and critical.  Extreme Vigilance has a criticality field with a range of 0-10.  The choices will map the string to a numeric value.  You will note that there is also a Default Value field where you can specify a value if there is no match with the choices."
panel-12 = mapping

question-13 = "What is the DATE-STRING-TO-EPOCH Transformation Type?"
answer-13 = "The DATE-STRING-TO-EPOCH Transformation Type converts date strings to the format used internally by Extreme Vigilance (i.e., epoch). A Format String field is provided so you can specify the format of the date string in the input field. For example, the identities.csv file from Splunk Enterprise Security (ES) app has dates in various fields (e.g., startDate, endDate) that are strings of the form '%m/%d/%y'. This transformation type will convert those string to an epoch."
panel-13 = mapping

question-14 = "What is the REGEX-CAPTURE-GROUP Transformation Type?"
answer-14 = "The REGEX-CAPTURE-GROUP Transformation Type allows you to specify Regular Expression groupings to capture strings when the regular expression matches. You can also specify the Output Format for the groups.  Up to 9 groups can be specfied. The following is an example of params for a REGEX-CAPTURE-GROUP transformation: <br></br><br></br> Regular Expression: OU=([^\s]+) DC=([^\s]+) <br></br> Output Format: $1:$2 <br></br>"
panel-14 = mapping

question-15 = "What is the SEARCH-AND-REPLACE Transformation Type?"
answer-15 = "The SEARCH-AND-REPLACE Transformation Type allows you to specify an additional transformation that can be applied to the value being mapped to the output field(s). For example, the identities.csv file from Splunk Enterprise Security (ES) app has a category field that contains values that have carriage-return/line-feeds between them.  You can simply specify a search value of '\n' for the carriage-return/line-feeds and have them replaced with spaces in the output field."
panel-15 = mapping

question-16 = "What is the TOKENIZE-AND-EXTRACT Transformation Type?"
answer-16 = "The TOKENIZE-AND-EXTRACT Transformation Type allows you to extract a specific token from an input field. A field is provided to identify the token separator and a field is provided to specify which token to extract.  For example, the assets.csv file from Splunk Enterprise Security (ES) app has an ip field that can contain one or more ip addresses with or without netmasks. A transformation can be configured to specify the '/' as the separator and indicate token 0 to be extracted."
panel-16 = mapping

question-17 = "How do I use the resource mapping I just created?"
answer-17 = "The resource mapping you just created should now be listed in the summary of Resource Mappings.  You can click the Return to Summary or navigate there from the menu item 'Manage > Resource Mappings'.  You can then select 'Run' to use this resource mapping against external files to load the actors and/or assets within Extreme Vigilance.  You can also update and delete existing Resource Mappings from this summary view."
panel-17 = summary

question-18 = "When I run the resource mapper, will it overwrite the existing resource file?"
answer-18 = "Yes. When you run the resource mapper, a new resource file (actors.csv or assets.csv) will be generated and the previous resource file will be backed up (actors.csv.bak or assets.csv.bak)."
panel-18 = summary

[xv_servers]
question-1 = "What is a compute server?"
answer-1 = "The Extreme Vigilance App introduces the concept of Compute Servers for distributing analysis across Splunk nodes (such as indexers), very similar to the way Splunk scales. You can configure which servers you want the analysis to be distributed."

question-2 = "Can any Splunk node be a compute server?"
answer-2 = "The Extreme Vigilance App discovers compute servers as Splunk nodes that have the TA_BV_ABA-Signals Add-On installed as well as the search head with Extreme Vigilance installed. You can then choose to enable (or disable) the individual servers."

