[xv_transaction_home]
question-1 = "What are the different severity levels on the dashboard?"
answer-1 = "Threats can have a severity level of low, medium, high, or critical. Threats in the low range could result in a small impact on the enterprise. Threats in the medium range could result in a higher impact to the enterprise.  Threats in the high range could result in a significant impact to your environment. Threats in the critical range could result in a significant compromise to your environment requiring immediate intervention."

question-2 = "What is the difference between observables and threats?"
answer-2 = "An observable is an inconsistency in normal behavior. We discover normal behavior by learning time-varying day-by-day behaviors over a long period of history. We then detect an observable by measuring a variance from this normal behavior at any specific time period. A threat is a collection of correlated observables that constitue an unusual pattern in the behavior that could have a significant impact on your environment. These collection of observables are escalated as a threat based on the severity of the observables and the criticality of the resources involved."

[xv_incident_review]
question-1 = "What is Incident Review?"
answer-1 = "Incident Review displays incidents which are threats that can be tracked, updated, and resolved. As an analyst, you can use the dashboard to gain insight into the severity of threats occurring in your system or network. You can use the dashboard to triage new threats, assign threats to analysts for review, and examine threats and their observables for investigative leads."

question-2 = "How do I assign an incident to a user?"
answer-2 = "The initial view will display a read-only table of incidents meeting the specified filters (Time, Owner, Status). When you click on a row, you will see a panel (on the right side of the view) that will display the current status and assigned user.  Initially incidents will have a status of 'New' and will have an owner of 'unassigned'. If you click on 'unassigned', then you will be presented a list of Splunk Users you can select from.  If you don't see the user you're looking for in the list, then they probably don't have the appropriate permissions. Splunk users must have the 'scm_user' role to be available for selection (and access to Extreme Vigilance)."

question-3 = "What are the different status values and what are their meanings?"
answer-3 = "The following is the list of possible status values: <br/></br>New - A new incident and has not yet been investigated <br/></br>In Progress - The incident is being investigated <br/></br>Pending - The incident has been resolved and pending some action <br/></br>Resolved - The incident has been resolved and awaits verification <br/></br>Closed - The incident has been resolved and verified"

question-4 = "How can I add a comment to an incident?"
answer-4 = "If you have selected an incident, then you will see a panel (on the right side of the view) that will display details of the incident.  You will notice a tab labeled 'Comment'. If you click on this tab, then you will see a field where you can enter a comment and press a Submit button.  Under the tab labeled 'Activity' you will see your comment listed with other incident activity."

question-5 = "Is there any audit information for activity associated with the incident?"
answer-5 = "If you have selected an incident, then you will see a panel (on the right side of the view) that will display details of the incident.  You will notice a tab labeled 'Activity'. If you click on this tab, then you will see a list of every activity associated with this incident.  Activities include each change in assignment of owner, change in status, and comments added by users."

[xv_incident_dashboard]
question-1 = "What is the Incident Review dashboard?"
answer-1 = "The Incident Review dashboard displays indicators and charts that summarize important metrics and visualizations for incidents."

question-2 = "What is an incident?"
answer-2 = "Incidents are threats that can be tracked, updated, and resolved.

[xv_transaction_transaction_explorer]
question-1 = "What is the Transaction Explorer?"
answer-1 = "The Transaction Explorer ..."

[xv_setup]
question-1 = "What is a data dictionary?"
answer-1 = "The purpose of the data dictionary is to define events that are of interest and define meta-data required to parse columns, identify column data types, call out columns that can be used to look-up actors and assets, and also in general define events and columns of interest to the Extreme Vigilance application."

question-2 = "What is a cognitive model?"
answer-2 = "A cognitive model is the container that holds (persists) all the information about actors and assets in an Extreme Vigilance system.  A cognitive model consumes events, learns normal behavior, detects and quantifies anomalous behaviors, and communicates with the outside world through a stream of signals."

question-3 = "What is a rule package?"
answer-3 = "A rule package defines a set of rules that can be run as an analysis to detect observables. The sets of rules are written in the conceptual search language and the rules are evaluated together to determine whether an observable should be generated."

question-4 = "What is a relevancy graph?"
answer-4 =  "A Relevancy Graph provides a hierarchical representation of anomalous conditions that have been detected when the graph instance was generated."

question-5 = "What is a transaction class?"
answer-5 =  "A transaction class defines the boundaries around a set of transactional events acquired by Extreme Vigilance based on a data dictionary definition that has been normalized into actions performed by the actors. The transaction class typically represents these actions that are part of a larger transaction that can be represented in transaction relationships."

question-6 = "What is a transaction sequence?"
answer-6 = "A transaction sequence identifies all the known paths (or sequences of events) and allows you to specify which paths should generate observables during transaction analysis."

question-7 = "What is a transaction relationship graph?"
answer-7 = "A Transaction Relationship Graph is a type of graph that represents a transaction composed of smaller transactions (or transaction classes). Each node in a transaction relationship graph corresponds to a transaction class.  Each transaction class represents events acquired by Extreme Vigilance based on a data dictionary definition that has been normalized into actions performed by the actors."

question-8 = "What is an extreme rule package?"
answer-8 = "An Extreme Rule Package defines a set of rules that can be run as an analysis to detect observables without a Cognitive Model. The set of rules are written in a conceptual search language and rules can be evaluated together to determine whether an observable should be generated or not."

[xv_discover]
question-1 = "What is on demand analysis?"
answer-1 = "On-Demand Analysis is typically used when setting up and testing your configuration. A user can select one or more analysis to be ran immediately and review the generated observables and threats. Once the setup is tested and complete, you are ready to Schedule Analysis and have it run at a periodic interval going forward."

question-2 = "What is scheduled analysis?"
answer-2 = "Setting up Scheduled Analysis involves selecting the various analysis you want ran at a periodic interval (default is 15 minutes). Extreme Vigilance creates a Splunk Saved Search for each analysis and will run the save searches sequentially where order is important. For example, new events must first be acquired before other analysis can be ran on those events."

question-3 = "What are the different types of analysis that can be run on-demand or scheduled?"
answer-3 = "The following is a summary of the different analysis types:<br></br><b>Acquire Events</b> - Acquire New Events aggregates new events and makes them available for analysis. The cognitive models landscape terrains and graphs will be updated with the new event information. <br></br><b>Threshold Analysis</b> - Threshold Analysis compares the incoming value of a field against the most likely range of values. This range of values is based on a complex statistical analysis of historical data used to create the cognitive model. Fields with inconsistent data are identified and the degree that the threshold was violated is determined. <br></br><b>Sequence Analysis</b> - Sequence Analysis examines an actor's order of actions. An actor normally performs a series of actions (such as authentication, check emails, logon to VPN) that vary day to day. Sequence Analysis identifies transitions that have low probabilities at a particular time and day. <br></br><b>Actor Analysis</b> - Actor Analysis is shorthand for Actor Change in Behavior Analysis. This analytical method is deigned to discover actors whose behaviors are changing over time. From a change in a set of similarity measurements we can determine whether or not the behavior of an actor is changing over time (and also the rate of this change). <br></br><b>Actor DOW Analysis</b> - Actor Day of Week Analysis is the same as the aggregate Actor Change in Behavior analysis except that the similarity analysis is performed at the day of week level. <br></br><b>Peer Analysis</b> -  Peer Analysis compares the time varying behavior of actors within a peer group. A 'Peer Group' is determined by selected attributes (such as business unit, category, title) and is intended to identify actors that perform the same kind of function. Peer Analysis measures the degree to which actors are similar across all their actions.</br><b>Rule Analysis</b> - Rule Analysis examines actor's activities based on rules defined in rule packages. Rules written in qualitative Expression are evaluated and adjust weights used to determine whether an observable should be generated.<br></br><b>Relevancy Analysis</b> - Relevancy Analysis applies a graph that models relationships across a set of potential observables or metrics. Whether looking for the root cause of a problem or simply in hopes of developing a more holistic view of the system, the analyst can quickly learn which metrics are relevant, or irrelevant for a given scenario.<br></br><b>Transaction Analysis</b> - Transaction Analysis examines an actor's transaction sequence with all other actors. A risk score is generated for the actor's transaction and an observable could be generated for unusual paths taken by an actor. <br></br><b>Threat Analysis</b> - Threat Analysis examines the observables that have been generated by the other sets of analysis. Threats may be generated based on the individual actors and assets associated with the observables and their criticality."

question-4 = "What are the supporting objects?"
answer-4 = "Some of the analysis that can be ran, on-demand or scheduled, require a supporting object.  For example, Rule Analysis requires a rule package identifying the rules to run during the analysis."

[xv_anomalies]
question-1 = "What are observables?"
answer-1 = "An observable is an inconsistency from  normal behavior. We discover normal behavior by learning time-varying day-by-day behaviors over a long period of history (say, three months of actor-specific events). We then detect an observable by measuring a variance from this normal behavior at any specific time period. The severity of an observable is measured by its (often non-linear) variance from behaviors in and around a specific time period."

question-2 = "What are the different observable types?"
answer-2 = "The following different types (or groupings) of observables are listed below:<br></br>Threshold<br></br>Sequence<br></br>Actor<br></br>Actor Day of Week<br></br>Peer<br></br>Rule<br></br>Relevancy<br></br>Transaction"

question-3 = "How is severity determined?"
answer-3 = "The various analysis generate a Compatibility Index (CIX) value based on Fuzzy Math for each event analyzed representing the variance from normal behavior.  The CIX value is in the range of 0 to 1 indicating the degree of how anomalous the event is.  The CIX value then has a 'weight' applied to the observable. The weight is provisionable for each type of observable on a scale of 0 to 100.  The CIX value with a weight applied is then evaluated to derive the severity value (also referenced to as the severity concept)."

question-4 = "How is risk determined?"
answer-4 = "Observables have a risk score associated with them.  The risk score is generated by taking an observables CIX value and applying an Importance value to them.  The importance value is a system level property (with a value between 0 and 1) provisioned for each observable type allowing a customer to tune what observables will result in a higher risk score."

[xv_anomaly_dashboard]
question-1 = "What are observables?"
answer-1 = "An observable is an inconsistency in normal behavior. We discover normal behavior by learning time-varying day-by- day behaviors over a long period of history (say, three months of actor-specific events). We then detect an observable by measuring a variance from this normal behavior at any specific time period. The severity of an observable is measured by its (often non-linear) variance from behaviors in and around a specific time period."

question-2 = "What is an actor threat?"
answer-2 = "An actor threat represents one or more observables associated with an actor that threat analysis has determined should be brought to the analyst's attention.  The individual severities of the observables are taken into account with the actors (and assets) criticality."

question-3 = "What is an asset threat?"
answer-3 = "An asset threat represents one or more actor threats that are  associated with the asset that threat analysis has determined should be brought to the analyst's attention.  The individual severities of the actor threats are taken into account with the actors (and assets) criticality."

[xv_transaction_transactions]
question-1 = "What are transaction observables?"
answer-1 = "A transaction observable is the instance of a transaction sequence that has been provisioned to be anomalous  representing an inconsistency in normal behavior."

[xv_create_model]
question-1 = "Why do I need to name a cognitive model?"
answer-1 = "First, you can create many cognitive models, each having its own properties and contents. Second, without a name you cannot tell Extreme Vigilance which cognitive model to use at any point in time. Third, a naming convention for your cognitive models can allow you to separate cognitive models with different functions and purposes."
panel-1 = name

question-2 = "What is a valid cognitive model name?"
answer-2 = "A cognitive model name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) and the underscore character."
panel-2 = name

question-3 = "What is a valid cognitive model description?"
answer-3 = "A description can be any quoted string between one and 512 characters. The description cannot contain quoted strings using the same quote symbol. As an example of a description: 'The Albuquerque data center’s NOC event filtering model. Created 10/15/17 by the Southwestern Data Team. Actors limited to Arizona and New Mexico IT staff'"
panel-3 = name

question-4 = "What is cognitive model granularity?"
answer-4 = "Granularity defines how actor behavior is tracked. Day of week will track activities at the day of week level and aggregate will track activity across all days."
panel-4 = name

question-5 = "Why do I need a Data Dictionary?"
answer-5 = "A data dictionary is the bridge between your enterprise and Extreme Vigilance. Through a data dictionary you define, among other things, the source of events, the nature of the actors, and the properties and characteristics of your assets. The nature of actors and assets are often called data models, but they are, in essence, a dictionary of your own elements in Extreme Vigilance."
panel-5 = data-dictionaries

question-6 = "What is the difference between a Data Dictionary and a Splunk Data Model?"
answer-6 = "In many instances the two terms can be used interchangeably. More technically a data dictionary is part of a larger data model. Dictionaries define the names of the major components as well as the names and properties of the elements (such as fields) that are part of the component. A data model describes the relationships between the major components."
panel-6 = data-dictionaries

question-7 = "How many Data Dictionaries do I need?"
answer-7 = "You may need many data dictionaries, especially if the events consumed by Extreme Vigilance are coming from a variety of sources.  You may also need a separate data dictionary for each class of asset (the properties of a server and a fire wall, as example, are very different)."
panel-7 = data-dictionaries

question-8 = "How do I select a Data Dictionary?"
answer-8 = "A data dictionary is selected by clicking the checkbox in the Select column for the respective data dictionary row in the table."
panel-8 = data-dictionaries

question-9 = "Can I add or delete Data Dictionaries to an existing cognitive model?"
answer-9 = "The set of Data Dictionaries you select during the Model Creation Wizard are used to create the internal organization of the cognitive model’s ecosystems and landscapes.  You can add more data dictionaries to an existing model at any time; however, removing a data dictionary will require the model to be reset (removing all data that was previously loaded into the model).  This is accomplished on the next step (Load Historical Data) by specifying the date range for the historical data, selecting the data dictionaries to load, selecting the 'Reset Model' checkbox, and then clicking the Load Historical Data button. You will then have to proceed through the next steps to build the model and activate the model to make it available for use again."
panel-9 = data-dictionaries

question-10 = "What is historical data?"
answer-10 = "As the name implies, historical data is past data (events) for each event type that will be consumed by Extreme Vigilance."
panel-10 = history

question-11 = "Why do I need historical data?"
answer-11 = "Historical data is the core foundation for the machine learning processing and must be discovered before any cognitive model can be put into operation. Historical data is associated with a data dictionary.  In the Model Building Wizard you are presented with a list of your data dictionaries. Select each data dictionary you want to process. The underlying SPL or Extreme Search will actually control which events are selected from the data source."
panel-11 = history

question-12 = "Can I add more historical data to an existing model?"
answer-12 = "You can easily add more data to an existing model.  Select the date range for the historical data to load, select the checkboxes for the data dictionaries for the events to load, and then click the Load Historical Data button. It is fine to overlap the dates for data that was previously loaded. Any events that were previously loaded for a data dictionary will be indicated with a Duplicates count in the table (i.e., those events won't be reloaded) and the new actions created will be indicated with an Actions count in the table. You will then need to proceed to the next steps to Build and Activate the model."
panel-12 = history

question-13 = "How do I define how far back to go in retrieving data?"
answer-13 = "You can specify the start data for history collection. This date is in the past. By default this date will be three months prior to the current date.  Basically the more historical data you have, the better. But as a guideline, anywhere from three to six months of event data (for each actor) should be sufficient to build a relatively stable and accurate cognitive model."
panel-13 = history

question-14 = "What if I have complex or non-standard collection requirements?"
answer-14 = "Historical data is gathered using a Splunk SPL search, derived for each Data Dictionary, and piped to the Extreme Vigilance xmAcquireEvents command. You can replace the existing Splunk SPL command with your own search or with your own customized Extreme Search command."
panel-14 = history

question-15 = "How is historical data used?"
answer-15 = "Historical data for each actor is used to learn the normal behavior for the actor. Each field in an event is coupled with the event’s date/time to give the cognitive model a point in time for some field’s value (frequency count or numeric data). Using a method that examines the behavior of data patterns around small intervals of time, the historical data creates a series of normal behavior patterns. At the same time, the incoming order of the events creates a set of graphs that learn the ordinary sequence in which a actor executes a family of operation throughout the day (for each day of the week)."
panel-15 = history

question-16 = "Do I need to scrub and clean my historical data?"
answer-16 = "Usually No.  Historical data is a mixture of undiscovered (unqualified) normal and anomalous behavior patterns. By definition, the greater amount of the behavior patterns (reflected in the data) will be normal data. Only small amounts of data will be anomalous to some degree (if anomalous data dominated the data, then it would be the normal data and the normal data would be anomalous.) In recording the way actors work over a large enough time horizon, we blend normal behavior with the small amounts of anomalous data. This anomalous data (called “noise”) is actually very important in learning how to soften thresholds and measure similarities."
panel-16 = history

question-17 = "What does the Events column in the table represent?"
answer-17 = "When loading historical data, the Events column represents the raw events being processed."
panel-17 = history

question-18 = "What does the Actions column in the table represent?"
answer-18 = "When loading historical data, the Actions column represents the actions added to the model. Note that a single event could result in multiple actions being created based on the data dictionary definition."
panel-18 = history

question-19 = "What does the Duplicates column in the table represent?"
answer-19 = "You can alway add more data to a cognitive model by changing the date range, selecting the checkboxes for the data dictionaries to load, and clicking on the Load Historical Data button. If the date range crosses a range where history has already been loaded into the cognitive model, then the new events that were previously loaded into the model will be dropped.  The number of events dropped is indicated in the Duplicates column."
panel-19 = history

question-20 = "When would I click the Reset Cognitive Model checkbox?"
answer-20 = "The Reset Cognitive Model button essentially clears all data out of the cognitive model so you can reload it fresh.  There may be situations where you want to reset a cognitive model. For example,  you have been making modifications to data dictionaries to tune the fields you want to analyze or the modifications to Splunk Technology Adapters to correctly map incoming data to event fields being splunked."
panel-20 = history

question-21 = "What does the Realtime column in the table represent?"
answer-21 = "The Realtime checkbox indicates the acquistion of events (after initial history is loaded) will be performed through the realtime engine (e.g., CRIBL). The acquisition of events will not be allowed in the On-Demand and Scheduled Analysis views."
panel-21 = history

question-22 = "What does it mean to build a cognitive model?"
answer-22 = "Up until this step, we have been defining a conceptual representation on the cognitive model by specifying the attributes and contents of the cognitive model. This phase of the Cognitive Model Wizard actually creates a persistent physical cognitive model."
panel-22 = build

question-23 = "What happens during the cognitive model building process?"
answer-23 = "During this process, the physical cognitive model is created from the historical data obtained based on the selected data dictionaries. Landscapes, terrains, and graphs are generated.  When the physical cognitive model is created, your history data will have defined each allowable actor and each allowable event. Unknown actors or events will generate a serious error diagnostic signal (which will show up on the operational display screens)."
panel-23 = build

question-24 = "Why do I need to Activate a cognitive model?"
answer-24 = "You activate a cognitive model in order to actually deploy the model for production.  Activation establishes a begin date for the cognitive model (which is important), computes the information density for the entire cognitive model, establishes an initial set of terrain thresholds, and creates an empty set of weekly order of operation graphs. Information density is a critical metric that indicates whether or not you have enough data in your cognitive model to actually believe what he cognitive model is telling you."
panel-24 = activate

question-25 = "What is the information density?"
answer-25 = "InformationDensity (ID) is a metric that accounts for the amount of noise in a system. Noise can be measured as the ratio of the actual data you have in your model to the potential amount of data that you could have in your model. This essentially translates to the more historical data you have that reinforces a pattern, the more confident we can be that the pattern actually exists, and hence the more we can trust the predictions. Information density is a value between 0 and 1. The larger the number, the higher the information density and is mapped to the concepts MINIMAL, LOW, MEDIUM, HIGH, and EXTREME.<br></br>When activating the cognitive model you can choose whether or not to calculate information density for the historical data loaded into the cognitive model.  By default this metric is calculated; however, you can unselect the box for 'Calculating Information Density'. Note that calculating information density adds additional time to the activation step."
panel-25 = activate

question-26 = "What is the trust metric?"
answer-26 = "Trust is, ultimately, a measure of the trustworthiness of a model. Trust takes information density and the number of days of data (minimum required currently is 30 days) into its calculation. For example, if information density is 1.00 and we have 14 days data, then trust will be .50. If the number of days is 30 or more, then trust is 1.0.  The trust metric is translated into a concept of MINIMAL, LOW, MEDIUM, HIGH, or EXTREME."
panel-26 = activate

question-27 = "What is the signal weight?"
answer-27 = "Observables that are detected during an analysis are saved as signals (in the scm_signal index) and have a severity associated with them.  That severity is derived from a Compatability Index (CIX) representing how anomalous the signal and the weight is applied to adjust the resulting severity."
panel-27 = properties

[xv_actor_detail]

[xv_actors]
question-1 = "What are Actors?"
answer-1 = "Actors are entities whose time-varying behavior we want to learn. Actors can be people; but, they can also be services or machines whose changes across time are tracked by a series of events. Actors are the core modeling elements in Extreme Vigilance."

question-2 = "Can I query an actor by name?"
answer-2 = "If an actor is a person, their first and last names are required and you can search by specifying either or both parts of their name. You can also query actors by id, business unit, tag, category, type, criticality, and watch list."

question-3 = "What types of actors do you support?"
answer-3 = "Currently we support the following actor types: Person, Machine, and Service."

[xv_asset_detail]

[xv_assets]
question-1 = "What are Assets?"
answer-1 = "Assets are generally machines (such as servers) that are used by actors but whose behaviors we are not learning. If we are learning the behavior of a machine (as an example) then an asset becomes an actor."

question-2 = "Can I query an asset by its IP address?"
answer-2 = "You can query an asset by its id which is typically the IP Address when it is a machine. You can also search assets by business unit, tag, category, type, criticality, and watch list."

question-3 = "What types of assets do you support?"
answer-3 = "Currently we support the following asset types: Machine and Person."

[xv_categories]
question-1 = "What are categories?"
answer-1 = "Extreme Vigilance is initially seeded with a set of categories based on those seeded with the Splunk Enterprise Security App.  You can add and remove categories as you need."

question-2 = "How are categories used?"
answer-2 = "Within Extreme Vigilance you can use categories as a way to group actors. For example, you can group actors by category when running a Peer analysis."

[xv_contexts]
question-1 = "What are contexts and concepts?"
answer-1 = "When we are thinking about an idea like the height of people, we consider a number of related concepts. The concepts tall and short are two conceptually coherent terms that describe concepts relating to height. In Extreme Vigilance, we call this coherent grouping of concepts a context. A context characterizes a particular view of the world based upon the meaning of the terms that define it."

question-2 = "Are contexts in Extreme Vigilance the same as in Extreme Search?"
answer-2 = "The capabilities of Extreme Search are embedded within the Extreme Vigilance product suite; however, the underlying implementation of contexts is different. Contexts implemented in Extreme Search can not be used within Extreme Vigilance; however, it is very easy to recreate them here."

question-3 = "What types of contexts do you support?"
answer-3 = "Currently we support Data Defined contexts. Data Defined contexts are generated based on actual event data and will evenly distribute the named concepts across the discovered domain of values."

[xv_data_dictionary_detail]
question-1 = "Why do I need to name a data dictionary?"
answer-1 = "First, you can create many data dictionaries, each having its own properties and contents. Second, without a name you cannot tell Extreme Vigilance which data dictionary to use at any point in time. Third, a naming convention for your data dictionaries can allow you to separate data dictionaries with different mappings."
panel-1 = name

question-2 = "What is a valid data dictionary name?"
answer-2 = "A data dictionary name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) and the underscore character."
panel-2 = name

question-3 = "What is the data dictionary description?"
answer-3 = "A data dictionary description, as the name implies, is a free-form textual description of the data dictionaries overall characteristics. This may include such elements as the creator (individual or team), the data source , any limitations, and so forth."
panel-3 = name

question-4 = "How are data dictionary names used?"
answer-4 = "A data dictionary name is used by Extreme Vigilance to identify how data will be mapped to a cognitive model. As a user, you mainly interact with Extreme Vigilance through its set of graphical user interfaces. But beneath these visual interfaces, a wide assortment of commands are being issued (such as xmAcquireEvents() that actually reads in the current set of events from the Splunk indexing system. The data dictionary name is used to lookup how events will be mapped by the command to process the events)."
panel-4 = name

question-5 = "What is a Data Model data source?"
answer-5 = "A data model is a hierarchically-structured search-time mapping of semantic knowledge about one or more datasets. It encodes the domain knowledge necessary to build a variety of specialized searches of those datasets. Briefly put, data models generate searches. If selecting a Data Model data source, then you must specify the Data Model and Data Model Object."
panel-5 = data-source

question-6 = "What is an Index data source?"
answer-6 = "An index is the repository for data in Splunk Enterprise. When Splunk Enterprise indexes raw event data, it transforms the data into searchable events. Indexes reside in flat files on the Splunk Enterprise instance known as the indexer. If selecting an Index data source, then you must specify an index."
panel-6 = data-source

question-7 = "What is a Custom Search data source?"
answer-7 = "A custom search is one you construct to create a new data field that doesn't exist in a data model or index. If selecting Custom Search data source, then you must specify the search."
panel-7 = data-source

question-8 = "What does the Validate button do?"
answer-8 = "The Validate button opens up a search window and runs the resulting search from your selections so you can verify it returns the expected results."
panel-8 = data-source

question-9 = "Why do I need to specify a Time field an Format String?"
answer-9 = "We are concerned with the time varying behavior of actors, so we need to know which fields in the events represent the time the event actually occurred."
panel-9 = time

question-10 = "Why can I not unselect the "Is Epoch" checkbox when time is set to "_time"?"
answer-10 = "Splunk stores timestamp values in the _time field of an event being indexed.  The format of _time is Epoch Time (also known as Unix Time or POSIX Time). This is a system for describing instants in time, defined as the number of seconds that have elapsed since 00:00:00 Coordinated Universal Time (UTC), Thursday, 1 January 1970, [note 1] not counting leap seconds.  When "Is Epoch" is selected, no special formatting is required.  The Format String will be disabled and set to "%s"."
panel-10 = time

question-11 = "What syntax do I use for the Format String?"
answer-11 = "The format string is passed to strptime to convert the string version of a DATE, DATE_TIME, or TIME fields into the internal representation of a date. For example, the following format string is currently used for the _time field: %Y/%m/%d %H:%M:%S %Z and can be used to parse the string representation of this date time: 2015/11/04 02:14:12 MDT. For more information see: http://pubs.opengroup.org/onlinepubs/009695399/functions/strptime.html"
panel-11 = time

question-12 = "What are Actors?"
answer-12 = "Actors can be users, machines, and/or services in the system."
panel-12 = actors

question-13 = "What is Source Asset and Destination Asset?"
answer-13 = "The Source Asset and Destination Assets indicate the assets associated with an event.  Typically an event will have fields indicating where the activity it represents originated and where it was consumed."
panel-13 = actors

question-14 = "Why do I need to specify a Process field or value?"
answer-14 = "The process attribute defines the ‘process’ part of the taxonomy to assign when incrementing terrains for fields called out in the definition’s fields attribute. This is needed because not every event has an attribute that identifies the ‘process’ that generated the event. This is used in cases where a hard coded process name to be used in the fields taxonomy must be specified."
panel-14 = process

question-15 = "Why do I need to specify an Action value?"
answer-15 = "The action attribute defines the ‘action’ part of the taxonomy to assign when incrementing terrains for fields called out in the definition’s fields attribute. A taxonomy is made up of 4 parts (Actor_Action_Process_Field). This value effectively hard codes the action to use when generating a taxonomy for fields called out by the data dictionary."
panel-15 = action

question-16 = "What is the difference between FIELD and FIELD_VALUE?"
answer-16 = "A data definition contains one or more field definition objects that callout fields to be extracted, transformed, and optionally used to annotate a parsed event. Also, the data definition can contain instructions used by the processing layer telling it which fields should be added to a terrain as it processes the parsed event.  The FIELD AND FIELD_VALUE choices are used in the processing phase and identify the ‘field’ part of a taxonomy. If these values are used then it’s stating that either the value of the field should be added to a terrain or the value itself makes up the terrain’s field name. In the case of the FIELD taxonomy type then the ‘Field Name’ attribute must be specified to identify the name of the taxonomy field attribute to use when creating the terrain. When the taxonomy type is FIELD and the terrain type is defined NUMERIC, the value from the field will be used to increment the terrain. The taxonomy type of FIELD_VALUE indicates that the value of the field will be extracted to define the value to use for the taxonomy’s field value. The FIELD_VALUE taxonomy type can ONLY be used with terrain types of COUNT."
panel-16 = fields

question-17 = "What does No Activity Test Enabled mean?"
answer-17 = "This parameter instructs threshold analysis to emit NoActivityAnomaly when there is no detected activity in a period where activity is expected. This option is present for fields with threshold types of LOWER or LOWER_AND_UPPER, unless threshold analysis is excluded."
panel-17 = fields

[xv_data_dictionaries]
question-1 = "What is a data dictionary?"
answer-1 = "A data dictionary is a collection of definitions that define how Extreme Vigilance shall parse events.  The data dictionary definition defines meta-data required to parse columns, identify column data types, call out columns that can be used to look-up actors and machines for the Extreme Vigilance application. In addition, the data dictionary is also used in the event acquisition process by defining taxonomy elements and terrains through configuration. This allows data acquisition into the actor landscape to be totally data driven. As new terrains are needed the data dictionary can be modified to drive which events and fields are aggregated by the data acquisition process."

