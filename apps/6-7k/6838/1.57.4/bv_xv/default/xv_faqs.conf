[xv_relevancy_graphs]
question-1 = "What are Relevancy Graphs?"
answer-1 = "A Relevancy Graph provides a hierarchical representation of Key Performance Indicators (KPI) for a business process, enabling behavior analysis of the business process services and/or its components.  Based on a graph template of KPIs, a graph instance shall be generated (at predetermined intervals) for the KPI values at that instance in time.  The individual KPIs in a graph instance represent anomalous conditions that have been detected since the last graph instance that was generated."

question-2 = "How are Relevancy Graph instances generated?"
answer-2 = "Relevancy Graph templates are associated to a single rule package and operate on rule observables detected from that rule package.  A Rule Analysis should be performed on the Rule Package followed by a Relevancy Analysis for the corresponding Relevancy Graph.   Each analysis can be performed ON-DEMAND or on a SCHEDULED basis.<br></br> If no Rule Observables are detected for the Rule Sets in the Rule Package during a specified interval, then no relevancy graph instances will be generated for that interval. If Rule Observables are generated for the Rule Sets in the Rule Package, then a Relevancy Graph instance will be generated during Relevancy analysis."

question-3 = "What are Relevancy Graph Observables?"
answer-3 = "Relevancy Graphs instances can also result in the generation of a Relevancy Graph Observable.  If the Compatibility Index (CIX) at the root node of a Relevancy Graph exceeds the alphacut (0.2), then a Relevancy Graph Observable will be generated for the Relevancy Graph instance."


[xv_relevancy_graph_detail]
question-1 = "Why do I need to select a Rule Package?"
answer-1 = "A Relevancy Graph operates on Rule Observables that have been generated from Rule Analysis for the corresponding Rule Package. Leaf nodes in a Relevancy Graph should correspond to a Rule Set from the associated Rule Package and if a rule observable has been generated for one of those rule sets, then an instance of the relevancy graph can be generated during Relevancy Analysis."
panel-1 = name

question-2 = "If Rule Package doesn’t exist, can I create it here?"
answer-2 = "Yes, you can create a new Rule Package and Rule Sets from within the Relevancy Graph Wizard; however, you can not edit them here.  Typically Rule Packages are created and/or updated from the Rule Package Wizard where finer tuning capabilities are provided."
panel-2 = name

question-3 = "What is a valid name for a Relevancy Graph / Rule Package?"
answer-3 = "The Relevancy Graph name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) and the underscore character."
panel-3 = name

question-4 = "What is the Relevancy Graph description?"
answer-4 = "A Relevancy Graph description, as the name implies, is a free-form textual description of the Relevancy Graph. This may include such elements as the Relevancy Graph's creator (individual or team), the Relevancy Graph's purpose, the Relevancy Graph’s limitations, and so forth."
panel-4 = name

question-5 = "How do I add/remove a node?"
answer-5 = "A new node can be added to the graph by double clicking anywhere on the canvas. If you select a node on the canvas, a properties panel is displayed on the right side of the view. The node can be removed by clicking the ‘Delete’ button."
panel-5 = graph

question-6 = "How do I add/remove an edge?"
answer-6 = "An edge can be created between nodes in a hierarchical fashion by selecting the box inside the parent node and dragging the anchor to the desired child node. If you select an edge on the canvas, then a properties panel is displayed on the right side of the view. The edge can be removed by clicking the ‘Delete’ button."
panel-6 = graph

question-7 = "How do I move nodes around in the graph?"
answer-7 = "A node (with the exception of the root node) can be moved by standard click-and-drag functionality.  Select a node holding down the mouse button, drag the node to the desired location, and then release the mouse button."
panel-7 =  graph

question-8 = "Why can’t I move the root node?"
answer-8 = "The ability to move the root node has been disabled intentionally.  The root node should always remain at the top of the graph with children below.  If you do want to reposition the graph as a whole, you can use click-and-drag functionality to reposition all nodes/edges together on the graph.  Select the background holding down the mouse, drag (or pan) the position of the whole graph to the desired position, and then release the mouse button."
panel-8 = graph

question-9 = "How do I associate a node to a Rule Set?"
answer-9 = "Typically the leaf nodes on a graph are associated to a Rule Set from the Rule Package.  If you select a node on the canvas, then a properties panel will be displayed on the right side of the view.  There is a choice box labeled ‘Rule Set’ in the properties panel where you can select an existing Rule Set for the node."
panel-9 = graph

question-10 = "If the rule set doesn’t exist, then can I create it here?"
answer-10 = "Yes, you can create a new Rule Set from within the Relevancy Graph Wizard.  If you select a node on the canvas, then a properties panel will be displayed on the right side of the view. There is a choice box labeled ‘Rule Set’ that has an option ‘Create New Rule Set’.  By selecting this option, a dialog will be presenting prompting you for information to define the Rule Set."
panel-10 = graph

question-11 = "What does the “weight” parameter represent on a node/edge?"
answer-11 = "A rule observable has a compatibility index (CIX) indicating its membership (EXTREME, HIGH, MEDIUM, LOW) ) in the rule set. The CIX values are then weighted (based on 'weights' on the indivdiual nodes and edges) up the heirarchy.  For example, consider two leaf nodes ('High Transaction Amount' and 'High Transaction Rate') with CIX values of 0.75 and 0.5, respectively.  If we have a parent node called 'Transaction' (and the leaf nodes/edges have a weight of 1), then the parent node would have a CIX of 0.625. The 'weight' value is a multiplier to apply to the CIX and will affect the derived CIX on the parent node. This weighting scheme applies all the way up the hierarchy to the root node."
panel-11 = graph

question-12 = "When will a Relevancy Graph Observable be generated?"
answer-12 = "If you walk up the heirarchy to the root node and the root node has a CIX value greater that 0.2 (alphacut), then the Relevancy Graph will generate a Relevancy Graph observable."
panel-12 = graph

question-13 = "What are the Graph Properties ‘Connector Style” and ‘Scale’?"
answer-13 = "The Relevancy Graph currently supports two types of connector styles: Flow Chart and State Machine.  The edges between nodes will be straight for Flow Chart and curved for State Machine.<br></br> The Relevancy Graph also supports scaling.   The Relevancy Graph could be very large (having many nodes/edges) and/or the viewable area is too small to view the whole graph.  The overall graph can be scaled down (or shrunk) so that it fits in the viewable pane."
panel-13 = graph

question-14 = "Why is the save button disabled?"
answer-14 = "When updating an existing Relevancy Graph, the ‘Save Relevancy Graph’ button will remain disabled until you have made a change."
panel-14 = save

question-15 = "What do I do when the save fails?"
answer-15 =" If you click the ‘Save Relevancy Graph' button and it fails, an error message should be displayed indicating the reason for the failure. Most errors will have already been checked for on the Name and Graph tabs of the Relevancy Graph Wizard."
panel-15 = save

[xv_backups]
question-1 = "What all is saved in a cognitive model export?"
answer-1 = "A Cognitive Model export saves all the information in the data store for the specified cognitive model.  In addition, the signals stored in scm_signal, scm_terrain_events, and scm_relevancy_graphs are saved in the cognitive model export.  If you import the cognitive model, then the state of the model and all its data should be the same as when it was exported."

question-2 = "Why can't I import a cognitive model export for a model that already exists?"
answer-2 = "Currently we don't allow replacing an existing model with an exported one. If you want to restore a cognitive model from an export, then you would need to delete the existing model before you import."

question-3 = "Can I download/upload a cognitive model export to/from my local computer?"
answer-3 = "Because the size of the cognitive model exports can be very large, we don't provide download links. We recommend you use scp/ftp type mechanisms to transfer files to/from the server."

question-4 = "Where is the cognitive model export saved?"
answer-4 = "Cognitive model exports are saved to the following directory: $(SPLUNK_HOME)/var/lib/scm/backups"

[xv_transaction_graphs]
question-1 = "What is a transaction relationship graph?"
answer-1 = "A Transaction Relationship Graph is a type of graph that represents a transaction composed of smaller transactions (or transaction classes). Each node in a transaction relationship graph corresponds to a transaction class.  Each transaction class represents events acquired by Extreme Vigilance based on a data dictionary definition that has been normalized into actions performed by the actors."

question-2 = "How is a transaction relationship graph used?"
answer-2 = "The Transaction Relationship Graph gives an analyst the ability to visualize a transaction that is composed of smaller transactions to help identify observables or other behavioral issues across the transaction."

#question-3 = "What is the 'Explore Graphs' action?"
#answer-3 = "The user can navigate through a transaction relationship graph to discover all transaction sequences that have been observed as well as view actual transaction instances for a given sequence."

[xv_transaction_graph_detail]
question-1 = "Why do I need to name a transaction relationship graph?"
answer-1 = "First, you can create many transaction relationship graphs, each representing different transaction class relationships. Second, without a name you cannot tell Extreme Vigilance which transaction relationship graph to use when analyzing transactions. Third, a naming convention for your transaction relationship graph can allow you to separate the different graphs with different functions and purposes."
panel-1 = name

question-2 = "What is a valid transaction relationship graph name?"
answer-2 = "A transaction relationship graph name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) including spaces and underscore characters."
panel-2 = name

question-3 = "What is the transaction relationship graph description?"
answer-3 = "A transaction relationship graph description, as the name implies, is a free-form textual description of the transaction relationship graph’s overall characteristics. This may include such elements as the transaction relationship graph’s creator (individual or team), the transaction relationship graph’s purpose, the transaction relationship graph’s limitations, and so forth."
panel-3 = name

question-4 = "How do I add/remove a node?"
answer-4 = "A new node can be added to the graph by double clicking anywhere on the canvas. If you select a node on the canvas, a properties panel is displayed on the right side of the view. The node can be removed by clicking the ‘Delete’ button."
panel-4 = graph

question-5 = "How do I add/remove an edge?"
answer-5 = "An edge can be created between nodes in a hierarchical fashion by selecting the box inside the parent node and dragging the anchor to the desired child node. If you select an edge on the canvas, then a properties panel is displayed on the right side of the view. The edge can be removed by clicking the ‘Delete’ button."
panel-5 = graph

question-6 = "How do I move nodes around in the graph?"
answer-6 = "A node (with the exception of the root node) can be moved by standard click-and-drag functionality.  Select a node holding down the mouse button, drag the node to the desired location, and then release the mouse button."
panel-6 =  graph

question-7 = "Why can’t I move the root node?"
answer-7 = "The ability to move the root node has been disabled intentionally.  The root node should always remain at the top of the graph with children below.  If you do want to reposition the graph as a whole, you can use click-and-drag functionality to reposition all nodes/edges together on the graph.  Select the background holding down the mouse, drag (or pan) the position of the whole graph to the desired position, and then release the mouse button."
panel-7 = graph

question-8 = "How do I associate a node to a transaction class?"
answer-8 = "Each node on the graph should be associated to a transaction class.  If you select a node on the canvas, then a properties panel will be displayed on the right side of the view.  There is a choice box labeled ‘Transaction Class’ in the properties panel where you can select an existing Transaction Class for the node."
panel-8 = graph

question-9 = "If the Transaction Class doesn’t exist, then can I create it here?"
answer-9 = "No, you can't currently create a Transaction Class from the Transaction Relationship Graph Wizard.  You should save your work and go to the Transaction Class Manager and create the Transaction Classes you want in the Transaction Relationship Graph."
panel-9 = graph

question-10 = "What are the Graph Properties ‘Connector Style” and ‘Scale’?"
answer-10 = "The Transaction Graph currently supports two types of connector styles: Flow Chart and State Machine.  The edges between nodes will be straight for Flow Chart and curved for State Machine.<br></br> The Transaction Graph also supports scaling.   The Transaction Graph could be very large (having many nodes/edges) and/or the viewable area is too small to view the whole graph.  The overall graph can be scaled down (or shrunk) so that it fits in the viewable pane."
panel-10 = graph

question-11 = "Why is the save button disabled?"
answer-11 = "When updating an existing Transaction Relationship Graph, the ‘Save Transaction Relationship Graph’ button will remain disabled until you have made a change."
panel-11 = save

question-12 = "What do I do when the save fails?"
answer-12 =" If you click the ‘Save Transaction Relationship Graph' button and it fails, an error message should be displayed indicating the reason for the failure. Most errors will have already been checked for on the Name and Graph tabs of the Transaction Relationship Graph Wizard."
panel-12 = save

[xv_transaction_class_detail]
question-1 = "Why do I need to name a transaction class?"
answer-1 = "First, you can create many transaction classes, each representing different a different set of transactional events. Second, without a name you cannot tell Extreme Vigilance which transaction class to use when analyzing transactions. Third, a naming convention for your transaction class can allow you to quickly identify the transactional events it represents."
panel-1 = name

question-2 = "What is a valid transaction class name?"
answer-2 = "A transaction class name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) including spaces and underscore characters."
panel-2 = name

question-3 = "What is the transaction class description?"
answer-3 = "A transaction class description, as the name implies, is a free-form textual description of the transaction class overall characteristics. This may include such elements as the transaction class creator (individual or team), the transaction class purpose, the transaction class limitations, and so forth."
panel-3 = name

question-4 = "Why do I have to select a data dictionary?"
answer-4 = "A transaction class identifies the actions from one or more data dictionaries that will be bounded together as a transaction. Only actions from the selected data dictionaries will be included."
panel-4 = transaction

question-5 = "What are the different transation boundary types?"
answer-5 = "Extreme Vigilance groups actions into transactions similar to how the Splunk SPL 'transaction' command can group a set of events. Details of the different transaction boundary types are shown below.<br></br>Timeout Only: After the specified number of seconds, the transaction will end.<br></br>Reference Key: If the actions contain a reference key (identified from the data dictionaries), then the reference key can be used to identify actions to include in the transaction.<br></br>Pattern: Specify the fields ('Starts With Field' and 'Ends with Field') and thier values that will mark the begging and end of the transaction."
panel-5 = transaction

question-6 = "Why is the save button disabled?"
answer-6 = "When updating an existing Transaction Class, the ‘Save Transaction Class’ button will remain disabled until you have made a change."
panel-6 = save

question-7 = "What do I do when the save fails?"
answer-7 = "If you click the ‘Save Transaction Class' button and it fails, an error message should be displayed indicating the reason for the failure. Most errors will have already been checked for on the Name and Data Dictionary tabs of the Transaction Class Wizard."
panel-7 = save

[xv_transaction_sequences]
question-1 = "What is a transaction sequence?"
answer-1 ="A transaction sequence is used by transaction analysis to group related events as a transaction sequence. The transaction sequence identifys all the known paths (or sequences of events) and allows you to specify which paths should generate observables during transaction analysis."

[xv_transaction_sequence_detail]
question-1 = "Why do I need to name a transaction sequence?"
answer-1 = "First, you can have many transaction sequences, each representing a different set of transaction instances. Second, without a name you cannot tell Extreme Vigilance which transaction sequence to use when analyzing transactions. Third, a naming convention for your transaction sequence can allow you to quickly identify the transaction instances it represents."
panel-1 = name

question-2 = "What is a valid transaction sequence name?"
answer-2 = "A transaction sequence name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) including spaces and underscore characters."
panel-2 = name

question-3 = "What do I need to select a transaction class?"
answer-3 = "A transaction sequence uses a transaction class to identify the boundaries to group actions (or sequences of events) identified in data dictionaries."
panel-3 = name

question-4 = "What do I need to select a cognitive model?"
answer-4 = "A transaction sequence is the application of a transaction class to a cognitive model. Only transaction sequence paths for the specified model will be discovered."
panel-4 = name

question-5 = "What do I need to discover sequences?"
answer-5 = "A transaction sequence is the application of a transaction class to a cognitive model. Only transaction sequence paths for the specified model will be discovered."
panel-5 = sequence

question-6 = "What if no sequence paths are discovered??"
answer-6 = "There are a couple cases where no sequence paths would be discovered.  First, the cognitive model must have historical data loaded.  Second, the date range you specify should correspond to the date range of historical data in the model.  Third, the selected transaction class may not specify the data dictionaries used in the cognitive model. Fourth, the selected transaction class may not have the bounds specified correctly."
panel-6 = sequence

question-7 = "When would I use the reset sequences checkbox?"
answer-7 = "You can run discover sequences as many times as you want for it will only add newly discovered sequence paths to the existing set of known sequence paths.  Reset will remove all the previously discovered sequence paths and add all the newly discovered sequence paths. In the case where the transaction class or model has changed, then you would want to do a reset."
panel-7 = sequence

question-8 = "What is the Observable CIX in the sequences table?"
answer-8 ="Each discovered path for the Transaction Sequence can be assigned a Compatibility Index (CIX) from 0 to 1 that is used for observable generation.  A CIX of 0 means no Transaction Path Observable will be generated if an actor performs this transaction sequence.  A non-zero CIX will result in the generation of a Transaction Path Observable with the specified CIX value.  CIX values are used during Threat Analysis to determine if a group of observables (weighted together) should result in the generation of an Actor and/or Asset Threat."
panel-8 = sequence

question-9 = "What is the description in the sequence path table?"
answer-9 ="If a transaction path observable is to be generated, this will be the text displayed to the end user describing the detected observable."
panel-9 = sequence

question-10 = "What if a sequence path not listed here is discovered during analysis?"
answer-10 ="If Transaction Analysis discovers a new sequence path, it will be added to the list of sequence paths for the transaction sequence with a CIX of 1 (resulting in the generation of an Observable). If this path is determined to be a normal and not anomalous, then the CIX value can be changed back to 0 here."
panel-10 = sequence

[xv_transaction_graph_explorer]
question-1 = "How can I see properties of a transation class (node) in the graph?"
answer-1 ="If you select a node on the graph with a mouse click, then you can view properties in the panel on the right of the view."
question-2 = "How do I drill down to the transaction class?"
answer-2 ="If you double-click your mouse on a node on the graph, then you will be directed to the Transaction Class Explorer view where you can now view all the discovered paths for that transaction class."

[xv_transaction_class_explorer]
question-1 = "How do I drill down to the transaction class?"
answer-1 ="If you select a transaction path (or row in the table), then you will be directed to a Transation Path Explorer view where you can now view all the transaction path instances."

[xv_transaction_path_explorer]
question-1 = "How do I view instances of the transaction path?"
answer-1 ="Three filters are provided for querying transaction instances for this transaction path: Time Range, Actor, and Reference Key. Specify any filters and click the submit button to see a list of transaction instances."

[xv_clusters]
question-1 = "What is a fuzzy cluster model?"
answer-1 = "An Extreme Vigilance Fuzzy Cluster Model is a form of clustering in which each data point can belong to more than one cluster. Clustering involves assigning data points to clusters (also called buckets, bins, or classes), or homogeneous classes, such that items in the same class or cluster are as similar as possible, while items belonging to different classes are as dissimilar as possible.<br/><br/>In Extreme Vigilance, clusters are identified by generating membership grades for data points.  These membership grades indicate the degree to which data points belong to each cluster. Thus, points on the edge of a cluster, with lower membership grades, may be in the cluster to a lesser degree than points in the center of cluster."

question-2 = "How is a fuzzy cluster model used?"
answer-2 = "The Fuzzy Cluster Model gives an analyst the ability to compare individual data points and there membership to various clusters in a Fuzzy Cluster Model."

[xv_cluster_detail]
question-1 = "Why do I need to name a fuzzy cluster model?"
answer-1 = "First, you can create many Fuzzy Cluster Models, each representing different fields and relationships. Second, without a name you cannot tell Extreme Vigilance which Fuzzy Cluster Model to use when comparing data sets for similarity. Third, a naming convention for your Fuzzy Cluster Model can allow you to separate the different models with different functions and purposes."
panel-1 = name

question-2 = "What is a valid fuzzy cluster model name?"
answer-2 = "A Fuzzy Cluster Model name can be three to thirty two characters long and can only contain alphanumeric characters (a-z, A-Z, 0-9) including spaces and underscore characters."
panel-2 = name

question-3 = "What is the fuzzy cluster model description?"
answer-3 = "A Fuzzy Cluster Model description, as the name implies, is a free-form textual description of the Fuzzy Cluster Model’s overall characteristics. This may include such elements as the model's creator (individual or team), the model’s purpose, the model’s limitations, and so forth."
panel-3 = name

question-4 = "How is the search used for generating a fuzzy cluster model?"
answer-4 = "The search allows us to identify the fields for selection, determine statistics for numeric fields and determine the map of possible values for string fields, and provide the raw values for generating the Fuzzy Cluster Model."
panel-4 = search

question-5 = "Is there a limit on the number of fields I can select?"
answer-5 = "There is no limit on the number of fields you select for the Fuzzy Cluster Model."
panel-5 = fields

question-6 = "Why do some fields show a 'Mapping' link in the table?"
answer-6 = "If you selected fields that are of type String (i.e. categorical), the string values must be mapped to numerics for the analysis. If you click the Mapping link in the table, a dialog will the display the possible values for this field.  The dialog does allow you to change the order of the items in the list using simple drag-and-drop with your mouse."
panel-6 = fields

question-7 = "Can I change the mapping values and order?"
answer-7 = "When you select fields that contain strings, every possible value is discovered based on the date range you specified in the search. There is no need to change the set of values; since the actual set has been discovered. This set of values need to be mapped to numeric numbers for the generation of a Fuzzy Cluster Model.  The actual numbering is arbitrary; but, we chose to start the numbering at 10 and then increment the number by 10 for each defined mapping. We do allow you to change the order of mappings which really only changes the how the individual values get numbered.  This will have an impact on visual display (like our scatter diagram in the next step) of the Fuzzy Cluster Model. There may be cases where you want the range of values in order (e.g., days of the week)."
panel-7 = fields

question-8 = "What are centers?"
answer-8 = "Each cluster has a centroid (or center).  When you specify the number of centers, you are also specifying the number of clusters you want generated in the model."
panel-8 = centers

question-9 = "How many centers can I specify?"
answer-9 = "The Fuzzy Cluster Model Wizard allow you to specify up to 10 centers; although there really is no limitation.  Just realize the more centers you select, the longer it will take to generate the Fuzzy Cluster Model."
panel-9 = centers

question-10 = "Can I give the center names?"
answer-10 = "When you select the number of centers you want in this Fuzzy Cluster Model, default name are provided for the center names.  You can easily change these names to whatever you desire by simply clicking on the input field and changing."
panel-10 = centers

question-11 = "Why can I only view 2 columns at a time on the scatter chart?"
answer-11 = "A scatter chart is designed to only display two columns at a time (two dimensional). For visually validating the columns with the generated centers, you can select which two columns you want displayed."
panel-11 = centers

question-12 = "Why is the save button disabled?"
answer-12 = "When updating an existing Fuzzy Cluster Model, the ‘Save Fuzzy Cluster Model’ button will remain disabled until you have made a change."
panel-12 = save

question-13 = "What do I do when the save fails?"
answer-13 =" If you click the ‘Save Fuzzy Cluster Model' button and it fails, an error message should be displayed indicating the reason for the failure. Most errors will have already been checked for on the Name, Fields, and Centers tabs of the Fuzzy Cluster Model Wizard."
panel-13 = save

[xv_signal_suppression]
question-1 = "What are observable suppressions?"
answer-1 = "Observable Suppressions do not prevent the detection and persistence of observables; however, they prevent the reporting of those observables to the user and inclusion into threat analysis."

question-2 = "What is the DEFAULT observable suppression type?"
answer-2 = "The DEFAULT observable suppression type will result in the creation of those observable suppressions for any newly created cognitive model."

question-3 = "What is the MODEL signal suppression type?"
answer-3 = "The MODEL observable suppression type will result in the suppression of the named observable type in the named cognitive model."

question-4 = "What is the ACTOR signal suppression type?"
answer-4 = "The ACTOR observable type will result in the suppression of the named observable type in the named cognitive model for the named actor."

question-5 = "What is the TAXONOMY observable suppression type?"
answer-5 = "The TAXONOMY observable suppression type will result in the suppression of the named observable type in the named cognitive model for the named taxonomy. The specification of actor is optional."

