#========================
# Database Configuration
#========================
mongo.host=127.0.0.1
mongo.port=27020
mongo.db=scm
mongo.dbpath=$(SPLUNK_HOME)/etc/apps/bv_xv/scm/db
mongo.auth.db=admin
mongo.user=__system
mongo.ssl=false
splunk.rest.protocol=https
splunk.rest.ipAddress=127.0.0.1
splunk.rest.port=8089
#------------------------------------------------------------------
# For DB configured with replication, if mongo.replica.set is empty
# then will assume single node mongo installation.
#------------------------------------------------------------------
mongo.replicaSet.hosts=
mongo.replicaSet.name=scm

#==========================================================================
# Set to true to enable DB logging. Note that in general the application to
# log in must also have the log level set to at least DEBUG to have db log
# messages show up in scm-framework.log.
# See $SPUNK_HOME/etc/apps/bv_xv/default/logging.conf
# to enable application level logging
#==========================================================================
db.logging.enabled=false

#=============================================================================
# Set to true to log splunk searches by various application components. These
# log messages are at the INFO level so updating application log levels should
# not be required by default.
#=============================================================================
splunk.logging.enabled=true

#========================
# Configuration Locations
#========================

# Location of the directory where UI model state is stored.
model.directory=$(SPLUNK_HOME)/etc/apps/bv_xv/scm/models

# Path from $SPLUNK_HOME/etc/apps/{app} where UI model state is stored.
app.model.directory=scm/models

# Application temporary directory used for creating scratch files.
temp.directory=$(SPLUNK_HOME)/etc/apps/bv_xv/scm/temp

# The batch monitored directory signals files should be moved to.
xv.persist.signals.directory=$(SPLUNK_HOME)/var/spool/splunk/stash_scm_signals

# Directory where model backup (exports) are saved to (by default).
backup.directory=$(SPLUNK_HOME)/etc/apps/bv_xv/scm/backups

# Directory the SplunkRESTClient saves search results retrieved from Splunk.
temp.search.results.dir=$(SPLUNK_HOME)/etc/apps/bv_xv/scm/temp_search

# Lookup file that defines actor categories known to the system. Used to
# look-up actors by category in various UI screens.
categories.filename=../lookups/categories.csv

# The directory where stash files are written to.
spool.directory=$(SPLUNK_HOME)/var/spool/splunk

# File used to configure ExtremRule and XV Rule synonyms
synonyms.filename=../lookups/scm-synonyms.csv

# The names of files used to seed the database.
identities.filename=../lookups/bv_actors.csv
assets.filename=../lookups/bv_assets.csv
data.dictionary.filename=../config/data-dictionary.json
resource.mapping.filename=../config/resource-mapping.json
app.context.seed.file=../lookups/APPLICATION.context.csv
application.types.filename=../lookups/app_types.csv

# DB Properties seed file, these properties will be loaded in the DB if they don't exist. 
# NOTE: The contents of this file will not be added to the DB rather it contains information
# needed to connect to the database and seed configuration in the database.
db.properties.filename=../config/db-seed.properties

# Names of default files used to seed files listed above when doing a fresh install.
default.actors.filename=../lookups/bv_actors-default.csv
default.assets.filename=../lookups/bv_assets-default.csv
default.data.dictionary.filename=../config/data-dictionary-default.json
default.resource.mapping.filename=../config/resource-mapping-default.json
default.properties.filename=../config/scm-framework-default.properties
