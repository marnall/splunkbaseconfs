#   Version 1.0
#
# alert_actions.conf

[sa_qradar_soar]
is_custom = 1
label = Create QRadar SOAR Case (SA_QRadar_SOAR)
icon_path = IBM_Shield_72x72.png 
payload_format = json

param._cam = {\
    "category":   	   ["Information Tracking"],\
    "task":       	   ["create"],\
    "subject":         ["splunk.event"],\
    "technology":      [{"vendor": "IBM Security", "product": "QRadar SOAR"}],\
    "supports_adhoc":  true\
}

disabled = 0
description = Opens a case in QRadar SOAR (SA_QRadar_SOAR)

# Splunk 8 requirement
python.version = python3

# Default mapping to QRadar SOAR incident
param.mapping_description =  <div>$name$</div><div>$result.rule_description$</div><div>Urgency: $result.urgency$</div><div>Owner: $result.owner$</div><div>Status:$result.status$</div><div>Link to Splunk ES <a href="https://$result.splunk_server$:8000/en-US/app/SplunkEnterpriseSecuritySuite/search?q=search%20%60notable_by_id($result.event_id$)%60&display.page.search.mode=smart">notable event</a></div>
param.mapping_name =  $name$ (from Splunk)
param.mapping_reporter =  Splunk $server.serverName$
param.mapping_inc_training = 0
param.mapping_properties.splunk_notable_event_id = $result.event_id$
param.mapping_discovered_date = $result.orig_time$

ttl = 240
command = sendalert $action_name$ results_file="$results.file$" results_link="$results.url$" param.action_name=$action_name$ | stats count
