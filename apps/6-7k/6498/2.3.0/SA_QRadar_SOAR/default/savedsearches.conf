[failed_splunk_login_send_to_qradar_soar]
# Sample alert configured to use SA_QRadar_SOAR
action.email.useNSSubject = 1
action.sa_qradar_soar = 1
action.sa_qradar_soar.param.artifact1description = Client IP
action.sa_qradar_soar.param.artifact1type = IP Address
action.sa_qradar_soar.param.artifact1value = $result.clientip$
action.sa_qradar_soar.param.mapping_artifact1description = Client IP
action.sa_qradar_soar.param.mapping_artifact1type = IP Address
action.sa_qradar_soar.param.mapping_artifact1value = $result.clientip$
action.sa_qradar_soar.param.mapping_confirmed = 0
action.sa_qradar_soar.param.mapping_country = United States
action.sa_qradar_soar.param.mapping_negative_pr_likely = 0
action.sa_qradar_soar.param.mapping_severity_code = Low
action.sa_qradar_soar.param.mapping_discovered_date = $result._time$
action.sa_qradar_soar.param.mapping_inc_training = 1
action.sa_qradar_soar.param.mapping_description = <div>$name$</div><div>$description$</div>
alert.digest_mode = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
description = Failed Splunk login attempt
request.ui_dispatch_app = SA_QRadar_SOAR
request.ui_dispatch_view = search
search = index=_internal sourcetype=splunkd ERROR UiAuth 
disabled = 1

