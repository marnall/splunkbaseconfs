[set_agent_source_type]
REGEX = (?i)platform\_architecture
FORMAT = sourcetype::picus:api:agent
DEST_KEY = MetaData:Sourcetype

[set_integrations_source_type]
REGEX = (?i)integration\_id
FORMAT = sourcetype::picus:api:integrations
DEST_KEY = MetaData:Sourcetype

[set_integration_agents_source_type]
REGEX = (?i)token\_expired
FORMAT = sourcetype::picus:api:integrations:agents
DEST_KEY = MetaData:Sourcetype

[set_simulation_list_source_type]
REGEX = (?i)simulation\_name
FORMAT = sourcetype::picus:api:simulations
DEST_KEY = MetaData:Sourcetype


[set_mitigation_devices_source_type]
REGEX = (?i)device_name.*?score
FORMAT = sourcetype::picus:api:mitigation:devices
DEST_KEY = MetaData:Sourcetype

[set_latest_results_source_type]
REGEX = (?i)results
FORMAT = sourcetype::picus:api:simulations:latest
DEST_KEY = MetaData:Sourcetype
