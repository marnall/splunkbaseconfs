# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = false
state = enabled
build = 130

[launcher]
author = Picus Security
version = 1.4.7
description = The Picus Security Add-on for Splunk allows users to collect data from the Picus Platform via Picus API. Users can collect activity-logs, simulations, agents and integrations as well as their details.

[ui]
is_visible = 1
label = Picus Security Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-picus-security

[triggers]
reload.addon_builder = simple
reload.ta_picus_security_account = simple
reload.ta_picus_security_settings = simple
reload.passwords = simple
