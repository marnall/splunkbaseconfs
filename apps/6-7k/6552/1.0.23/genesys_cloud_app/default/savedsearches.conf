action.email.useNSSubject = 1
action.summary_index = 1
action.summary_index._name = genesys_cloud_sum
action.summary_index._type = event
action.summary_index.sum_type = genesys_web_sockets
alert.track = 0
cron_schedule = * * * * *
dispatch.earliest_time = -1m@m
dispatch.latest_time = -0m@m
dispatch.index_earliest = -1m@m
dispatch.index_latest = -0m@m
durable.lag_time = 60
durable.max_backfill_intervals = 10
durable.track_time_type = _indextime
enableSched = 1
realtime_schedule = 0
schedule_priority = higher
search = sourcetype=genesys_cloud eventtype=genesys_web_socket\
| rex field=_raw "\"metadata\"\:\s*\{\"\s*\"CorrelationId\"\:\s*\"(?<CorrelationId>[^\"]+)\"\}" \
| rex field=_raw "\"(?<conversation_id>[^\"]+)\"}\,\s*\"metadata\"\:" \
| spath path=eventBody.participants{} output=participants \
| table _time conversation_id CorrelationId participants \
| mvexpand participants \
| rex field=participants "\,\s*\"id\": \"(?<participant_id>[^\"]+)\"" \
| rex field=participants "\"queue\":\s*\{\s*\"id\":\s*\"(?<queue_id>[^\"]+)\""\
| rex field=participants "\"user\":\s*\{\"id\"\:\s*\"(?<user_id>[^\"]+)\""\
| rex field=participants mode=sed "s/\"\w+\":\s*\"\"\s*,//g" \
| rex field=participants mode=sed "s/\s+/ /g" \
| rex field=participants "\"attributes\"\s*:\s*(?<attribute_rec>\{[^\}]+\})" \
| rex field=attribute_rec mode=sed "s/\"//g" \
| rex field=attribute_rec max_match=20 "(?<attribute_kpi_rec>Kpi[^,\}]+)" \
| rex field=participants max_match=20 "Transfer_(?<Transfer_time>\d*)" \
| rex field=participants mode=sed "s/Kpi_\d*/Kpi/g" \
| rex field=participants mode=sed "s/Transfer_\d*/Transfer/g"\
| eval _raw=participants \
| rename participants as participants_rec \
| extract pairdelim=",\;\{\}", kvdelim=":", auto=f \
| fields - _raw participants Append_* \
| rex field=address "^(?P<address_type>[^\:]+):(?P<address_info>[^\,;]+)" \
| rex field=address "language=(?P<address_language>[^,;]+)" \
| rex field=address "src=(?P<address_src>[^,;]+)" \
| rex field=address "user=(?P<address_user>[^,;]+)" \
| rex field=address "tgrp=(?P<address_tgrp>[^,;]+)" \
| rex field=address "trunk-context=(?P<address_trk_context>[^,;]+)"

