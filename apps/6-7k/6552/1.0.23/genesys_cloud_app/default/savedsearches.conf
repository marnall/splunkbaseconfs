[genesys_conversation_details_preprocessing]
action.email.show_password = 1
action.logevent = 1
action.logevent.param.event = processed event
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = * * * * *
description = genesys_conversation_details_preprocessing
disabled = 1
dispatch.earliest_time = -30m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA_genesys_cloud
request.ui_dispatch_view = search
search = sourcetype=genesys_cloud participants earliest=-1m@m latest=-0m@m \
| spath path=eventBody.participants{} output=participants \
| table _time CorrelationId event_id participants \
| mvexpand participants \
| eval _raw=participants \
| extract pairdelim=",\;\{\}", kvdelim=":", auto=f \
| fields - _raw Transfer* \
| rename participants as raw_record \
| rex field=raw_record mode=sed "s/\"//g"\
| rex field=address "^(?P<address_type>[^\:]+):(?P<address_info>[^\,;]+)" \
| rex field=address "language=(?P<address_language>[^,;]+)" \
| rex field=address "src=(?P<address_src>[^,;]+)" \
| rex field=address "user=(?P<address_user>[^,;]+)" \
| rex field=address "tgrp=(?P<address_tgrp>[^,;]+)" \
| rex field=address "trunk-context=(?P<address_trk_context>[^,;]+)" \
| collect index=genesys_evts marker="sum_type=genesys_web_sockets"

[genesys_web_sockets_flat_01]
