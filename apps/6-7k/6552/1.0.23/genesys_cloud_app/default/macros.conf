[conversation_detail_flat]
definition = sourcetype="conversations_detail" \
| spath path="participants{}" output=participant_rec \
| eval participant_cnt=mvcount(participant_rec) \
| mvexpand participant_rec \
| rex field=participant_rec mode=sed "s/\"\w+\":\s*null[\,]*//g" \
| rex field=participant_rec mode=sed "s/\,\s*\}/}/g" \
| rex field=participant_rec mode=sed "s/\s+/ /g" \
| rex field=participant_rec max_match=30 "(?<segments_rec>\{\s*\"conference\"[^\}]+\})" \
| rex field=participant_rec max_match=30 "(?<media_endpoint_stats>\{\"codecs[^\}]+\})" \
| rex field=segments_rec mode=sed "s/\"//g" \
| rex field=media_endpoint_stats mode=sed "s/\"//g" \
| table _time sourcetype conversation_id conversation_start conversation_end originating_direction media_stats_min_conversation_mos media_stats_min_conversation_r_factor participant_rec segments_rec media_endpoint_stats \
| eval _raw=participant_rec \
| extract pairdelim=",\;\{\}", kvdelim=":", auto=f \
| rex field=participant_rec "\"metrics\":\s*\[(?<metrics_rec>[^\]]+)" \
| rex field=segments_rec mode=sed "s/\"\w+\":\s*null[\,]*//g" \
| rex field=segments_rec mode=sed "s/\,\s*\}/}/g" \
| rex field=metrics_rec "tContacting\",\s*\"value\":\s*(?<metric_tContacting>\d+)" \
| rex field=metrics_rec "tDialing\",\s*\"value\":\s*(?<metric_tDialing>\d+)" \
| rex field=metrics_rec "tHandle\",\s*\"value\":\s*(?<metric_tHandle>\d+)" \
| rex field=metrics_rec "tTalk\",\s*\"value\":\s*(?<metric_tTalk>\d+)" \
| rex field=metrics_rec "tTalkComplete\",\s*\"value\":\s*(?<metric_tTalkComplete>\d+)" \
| rex field=metrics_rec "nFlow\",\s*\"value\":\s*(?<metric_nFlow>\d+)" \
| rex field=metrics_rec "tIvr\",\s*\"value\":\s*(?<metric_tIvr>\d+)" \
| rex field=metrics_rec "tFlow\",\s*\"value\":\s*(?<metric_tFlow>\d+)" \
| rex field=metrics_rec "tFlowExit\",\s*\"value\":\s*(?<metric_tFlowExit>\d+)" \
| rex field=metrics_rec "nOffered\",\s*\"value\":\s*(?<metric_nOffered>\d+)" \
| rex field=metrics_rec "tAcd\",\s*\"value\":\s*(?<metric_tAcd>\d+)" \
| rex field=metrics_rec "tFlowOut\",\s*\"value\":\s*(?<metric_tFlowOut>\d+)" \
| rex field=metrics_rec "tShortAbandon\",\s*\"value\":\s*(?<metric_tShortAbandon>\d+)" \
| rex field=metrics_rec "tAbandon\",\s*\"value\":\s*(?<metric_tAbandon>\d+)" \
| rex field=metrics_rec "nConnected\",\s*\"value\":\s*(?<metric_nConnected>\d+)" \
| rex field=metrics_rec "tFlowDisconnect\",\s*\"value\":\s*(?<metric_tFlowDisconnect>\d+)"\
| rex field=metrics_rec mode=sed "s/\"//g"\
| fields - _raw participant_rec \
| eval emit_date_epoch = strptime('emit_date', "%Y-%m-%dT%H:%M:%S") \
| eval _time=emit_date_epoch \
| table _time sourcetype * metrics_rec metric_tContacting metric_tDialing metric_tHandle metric_tTalk metric_tTalkComplete metric_nFlow metric_tIvr metric_tFlow metric_tFlowExit metric_nOffered metric_tAcd metric_tFlowOut metric_tShortAbandon metric_tAbandon metric_nConnected metric_tFlowDisconnect segments_rec media_endpoint_stats \
| fields - metrics segments sessions \
| rex field=segments_rec mode=sed "s/\"//g" \
| rex field=media_endpoint_stats mode=sed "s/\"//g"
iseval = 0

[genesys_cloud_index]
definition = index=genesys_cloud
iseval = 0

[genesys_cloud_sum_index]
definition = index=genesys_cloud_sum
iseval = 0

[demo_data_trend(6)]
args = metric, r1_low, r1_high, r2_low, r2_high, position
definition = eval r1_low=$r1_low$, r1_high=$r1_high$, r2_low=$r2_low$, r2_high=$r2_high$ \
| eval $metric$ = case(count>$position$, round(((random() % r1_high)/(r1_high)) * (r1_high - r1_low) + r1_low), count<=$position$, round(((random() % r2_high)/(r2_high)) * (r2_high - r2_low) + r2_low))
iseval = 0

[demo_data_stats_queue(6)]
args = metric, r1_low, r1_high, r2_low, r2_high, entity
definition = eval r1_low=$r1_low$, r1_high=$r1_high$, r2_low=$r2_low$, r2_high=$r2_high$ \
| eval $entity$ = case(queue_name!="$entity$", round(((random() % r1_high)/(r1_high)) * (r1_high - r1_low) + r1_low), queue_name="$entity$", round(((random() % r2_high)/(r2_high)) * (r2_high - r2_low) + r2_low))
iseval = 0
