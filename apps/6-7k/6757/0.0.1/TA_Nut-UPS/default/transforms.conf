# transforms.conf

#===========================================
# Add raw length to Meta Fields
#===========================================
[nut_raw_length]
INGEST_EVAL = nut_event_length=len(_raw)

#===========================================
# Extract fields and values dynamically
#===========================================
[nut_extract_fields]
#REGEX = (.+)\:\s+(.+)
#FORMAT = $1::$2
DELIMS = "\n", ":"
