FIELDALIAS-ssl_issuer_unit = issuer_organization_unit AS ssl_issuer_unit
FIELDALIAS-ssl_signature_algorithm = signature_algorithm AS ssl_signature_algorithm
FIELDALIAS-ssl_start_time = created AS ssl_start_time
FIELDALIAS-ssl_subject_locality = subject_locality AS ssl_subject_locality
FIELDALIAS-ssl_subject_state = subject_state AS ssl_subject_state
FIELDALIAS-ssl_subject_organization = subject_organization AS ssl_subject_organization
FIELDALIAS-ssl_subject_unit = subject_organization_unit AS ssl_subject_unit
FIELDALIAS-ssl_issuer = issuer_alt_names{} AS ssl_issuer
FIELDALIAS-ssl_issuer_common_name = issuer_common_name AS ssl_issuer_common_name
FIELDALIAS-ssl_subject = subject_alt_names{} AS ssl_subject
FIELDALIAS-ssl_subject_common_name = subject_common_name AS ssl_subject_common_name
EVAL-ssl_serial = mvindex(split(id,"/"),1)

