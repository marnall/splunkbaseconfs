[cycognito:assets:ip]
SHOULD_LINEMERGE = 0
DATETIME_CONFIG = CURRENT
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 9999999
KV_MODE = json
# Normalised
FIELDALIAS-locations = locations{} AS locations
FIELDALIAS-tags = tags{} AS tags
FIELDALIAS-organizations = organizations{}  AS organizations
EVAL-organizations = if(isnull(organizations), "-", organizations)
EVAL-type = case(type == "ip", "Ip", 1==1, type)
EVAL-hosting_type = case(hosting_type == "cloud", "Cloud", hosting_type == "undetermined", "Undetermined", hosting_type == "owned", "Owned", 1==1, hosting_type)
EVAL-security_grade = case(security_grade == "null", "N/A", security_grade == "A", "A",  security_grade == "B", "B",  security_grade == "C", "C",  security_grade == "D", "D",  security_grade == "F", "F", 1==1, security_grade)
EVAL-status = case(status == "changed", "Changed", status == "new", "New", status == "normal", "Normal", status == "removed", "Removed", 1==1, status)
EVAL-investigation_status = case(investigation_status == "uninvestigated", "Uninvestigated", investigation_status == "investigated", "Investigated", investigation_status == "investigating", "Investigating",1==1, investigation_status)
EVAL-locations = if(isnull(locations),"-",locations)
LOOKUP-cycognito_countries_code_mappings = cycognito_countries_code_mappings alpha-3 AS locations OUTPUT name AS countries
# CIM Mapping
FIELDALIAS-enabled = alive AS enabled
FIELDALIAS-dest = ip AS dest
EVAL-vendor_product = "CyCognito"

