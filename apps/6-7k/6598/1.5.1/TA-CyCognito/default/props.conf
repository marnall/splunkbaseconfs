[cycognito:issues]
SHOULD_LINEMERGE = 0
DATETIME_CONFIG = CURRENT
category = Splunk App Add-on Builder
pulldown_type = 1
TRUNCATE = 9999999
KV_MODE = json
# Normalised
FIELDALIAS-locations = locations{} AS locations
FIELDALIAS-tags = tags{} AS tags
FIELDALIAS-potential_impact = potential_impact{} AS potential_impact
FIELDALIAS-remediation_steps= remediation_steps{} AS remediation_steps
FIELDALIAS-organizations = organizations{}  AS organizations
FIELDALIAS-issue_types = issue_types{} as issue_types
EVAL-organizations = if(isnull(organizations), "-", organizations)
EVAL-severity = case(severity == "critical", "Critical", severity == "high", "High", severity == "medium", "Medium", severity == "low", "Low", 1==1, severity)
EVAL-issue_status = case(issue_status == "new",  "New" , issue_status == "normal", "Unresolved", issue_status == "asset-removed", "Asset Removed", issue_status == "issue-removed", "Issue Removed", issue_status == "asset-not-alive", "Asset Not Alive", 1==1, issue_status)
EVAL-locations = if(isnull(locations),"-", locations)
LOOKUP-cycognito_countries_code_mappings = cycognito_countries_code_mappings alpha-3 AS locations OUTPUT name AS countries
# CIM Mapping
FIELDALIAS-cvss = exploitation_score AS cvss
FIELDALIAS-severity_id = severity_score AS severity_id
FIELDALIAS-signature_id = id AS signature_id
FIELDALIAS-category = issue_type AS category
FIELDALIAS-dvc = host AS dvc
FIELDALIAS-signature = title AS signature
EVAL-vendor_product = "CyCognito"
EVAL-dest = mvindex(split(affected_asset,"/"),1)

