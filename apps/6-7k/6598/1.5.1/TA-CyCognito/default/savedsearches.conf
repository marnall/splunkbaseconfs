[Threat - CyCognito Assets Risk Alert - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = CyCognito Assets Risk Alert
action.customsearchbuilder.enabled = false
action.email.show_password = 1
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk = 1
action.risk.forceCsvResults = 1
action.risk.param._risk = [{"risk_object_field":"id","risk_object_type":"system","risk_score":20},{"threat_object_field":"security_grade","threat_object_type":"security_grade"},{"threat_object_field":"severe_issues","threat_object_type":"severe_issues"}]
action.risk.param._risk_message = Asset: $id$ with security_grade: $security_grade$ found at Location: $countries$
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.suppress = 1
alert.suppress.fields = id,security_grade
alert.suppress.period = 2592000s
alert.track = 1
counttype = number of events
cron_schedule = 0 0 * * *
description = Assets detected with "D" or "F" security grade.
disabled = 1
dispatch.earliest_time = -24h
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-CyCognito
search = `get_cycognito_index` source="cycognito_assets" sourcetype!="cycognito:assets:iprange" \
|  dedup id |  where security_grade IN ("D", "F") |  table id, type, security_grade, severe_issues, countries

