##CCX Extensions for Crowdstrike (Falcon Event Streams)##
[authentication_audit_event]
search = sourcetype=CrowdStrike:Event:Streams:JSON "metadata.eventType"="*ActivityAuditEvent" NOT "event.OperationName" IN("quarantined_file_update","validateEntitlementsHmac","update_group","update_policy","add_group","remove_group","create_report","update_priority","delete_report_execution","delete_policy","create_policy","disable_policy","create_group","enable_policy","delete_group","hide_host_requested","unhide_host_requested","detection_update","reveal_token","containment_requested")
# tag = authentication

[crowdstrike_change_event]
search = sourcetype=CrowdStrike:Event:Streams:JSON event.OperationName="Create*" OR event.OperationName="Reset*" OR event.OperationName="Update*" OR event.OperationName="quarantined_file_update" OR event.OperationName="validateEntitlementsHmac" OR event.OperationName IN("add_group","remove_group","delete_report_execution","delete_policy","disable_policy","enable_policy","delete_group","detection_update","reveal_token")
# tag = change

[crowdstrike_identityprotection_detection_alert]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="IdentityProtectionEvent" event.Category="Detections" NOT event.State="NEW"
#tag = alert

[crowdstrike_identityprotection_detection_ids]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="IdentityProtectionEvent" event.Category="Detections" event.State="NEW"
#tag = ids attack

[crowdstrike_identityprotection_incident_alert]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="IdentityProtectionEvent" event.Category="Incidents"
#tag = alert

[crowdstrike_customeriocevent_alert]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="CustomerIOCEvent" file_hash=""
#tag = alert

[crowdstrike_idpdetectionsummaryevent_ids]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="IdpDetectionSummaryEvent"
#tag = ids attack

[crowdstrike_customeriocevent_malware_operations]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="CustomerIOCEvent" NOT file_hash=""
#tag = malware operations

[crowdstrike_incidentsummaryevent_logs]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="IncidentSummaryEvent"

[crowdstrike_scheduledreportnotificationevent_data]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="ScheduledReportNotificationEvent"
#tag = data access

[crowdstrike_remoteresponsesessionstartevent_alert]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="RemoteResponseSessionStartEvent"
#tag = alert

[crowdstrike_remoteresponsesessionendevent_alert]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="RemoteResponseSessionEndEvent"
#tag = alert

[crowdstrike_change_request]
search = sourcetype="CrowdStrike:Event:Streams:JSON" metadata.eventType="UserActivityAuditEvent" event.OperationName="*_requested"

[ccx_crowdstrike_eppdetection_malware_event]
search = (sourcetype=CrowdStrike:Event:Streams:JSON) "metadata.eventType" IN("EppDetectionSummaryEvent")
#tag = malware attack

[ccx_crowdstrike_xdrdetection_malware_event]
search = (sourcetype=CrowdStrike:Event:Streams:JSON) "metadata.eventType" IN("XdrDetectionSummaryEvent")
#tag = malware attack

[ccx_crowdstrike_dataprotection_dlp]
search = (sourcetype="CrowdStrike:Event:Streams:JSON") "metadata.eventType"=DataProtectionDetectionSummaryEvent
# tags = dlp incident

##CCX Extensions for Crowdstrike (Spotlight Vulnerability)##
[crowdstrike_spotlight_vulnerability_event]
search = (sourcetype=crowdstrike:spotlight:vulnerability:json)

[ccx_crowdstrike_filevantage_change]
search = (sourcetype="crowdstrike:filevantage:json")
# tags = change