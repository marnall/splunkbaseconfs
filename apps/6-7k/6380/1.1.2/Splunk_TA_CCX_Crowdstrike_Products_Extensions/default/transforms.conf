[mod_crowdstrike_eventstreams_source]
SOURCE_KEY = _raw
REGEX = (\"ta_data\"\:\s{.*Cloud_environment\"\:\s\"(.*)\",\s"TA_version".*\,\s\"Input\"\:\s\"(.*)\",\s\"App_id\"\:\s\"(.*)\",\s"Event_types".*)
FORMAT = source::$2\$3\$4
DEST_KEY = MetaData:Source
LOOKAHEAD = 50000

