[sophos:utm]
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1

FIELDALIAS-product    = sys AS product
FIELDALIAS-dest_mac   = dstmac AS dest_mac
FIELDALIAS-dest_port  = dstport AS dest_port
FIELDALIAS-file_name  = file AS file_name
FIELDALIAS-mac        = sta AS mac
FIELDALIAS-src_ip     = srcip AS src_ip
FIELDALIAS-src_mac    = srcmac AS src_mac
FIELDALIAS-src_port   = srcport AS src_port
FIELDALIAS-tcp_flag   = tcpflags AS tcp_flag
FIELDALIAS-user       = username AS user

EVAL-action         = case((action=="accept" OR event="Connection started") , "allowed", action=="drop", "blocked", action=="log", "teardown", event=="Connection terminated", "terminated", sub=="ips", "unknown")
EVAL-name           = if((sub=="ha" AND like(name,"Version changed:%") OR (sub=="confd" AND like(name,"trimmed version%"))), null(), name)
EVAL-severity       = case(severity="debug","informational", severity="info","informational",severity="warn","warn", severity="crit","critical", severity="error", "error", severity!="informational" AND severity!="warn" AND severity!="critical" AND severity!="error","unknown")
EVAL-signature      = case(sub=="ips", name, sub=="vpn", variant, sub!="ips" AND sub!="vpn", signature)
EVAL-vendor_product = "Sophos:UTM:"+'product'
EVAL-bytes          = if(sub=="vpn", rx+tx, null())
EVAL-bytes_in       = if(sub=="vpn", rx, null())
EVAL-bytes_out      = if(sub=="vpn", tx, null())
EVAL-category       = if(sub=="ips","unknown",null())
EVAL-flow_id        = if(sub=="ips", sub, null())
EVAL-dest           = if((sub="vpn"), 'virtual_ip', dstip)
EVAL-ids_type       = if(sys=="SecureNet" AND sub=="ips", "network", null())
EVAL-src            = if(sub=="ips",src_ip,null())
EVAL-vendor_action  = if(sub=="ips","unknown",null())
EVAL-dest_ip        = if((sub="vpn"), 'virtual_ip', dstip)
