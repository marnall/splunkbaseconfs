[ipf_input]
python.version = python3
python.required = 3.9
start_by_shell = false
sourcetype = ip_fabric:table
interval = 30
snapshot_id = $last
use_ipf_timestamp = False
load_intent_checks = False
only_count = False
disabled = 0

[ipf_input://ipf_acl_interfaces]
disabled = 0
interval = 86400
index = ipf_acl_interfaces
ipf_url = https://change.this
snapshot_id = $last
use_ipf_timestamp = 1
load_intent_checks = 0
only_count = 0
table_path = /tables/security/acl/interfaces

[ipf_input://ipf_bgp]
disabled = 0
interval = 86400
index = ipf_bgp
ipf_url = https://change.this
snapshot_id = $last
use_ipf_timestamp = 1
load_intent_checks = 0
only_count = 0
table_path = technology/routing/bgp/neighbors

[ipf_input://ipf_bgp_neighbors]
disabled = 0
interval = 86400
index = ipf_bgp_neighbors
ipf_url = https://change.this
snapshot_id = $last
use_ipf_timestamp = 0
load_intent_checks = 0
only_count = 0
table_path = tables/routing/protocols/bgp/neighbors

[ipf_input://ipf_bgp_neighbors_nonest]
disabled = 0
interval = 86400
index = ipf_bgp_neighbors_nonest
ipf_url = https://change.this
snapshot_id = $last
use_ipf_timestamp = 0
load_intent_checks = 0
only_count = 0
table_path = tables/routing/protocols/bgp/neighbors
table_filter = {"and": [{"state": ["notlike", "blished"]}]}

[ipf_input://ipf_bgp_neighbors_nopref]
disabled = 0
interval = 86400
index = ipf_bgp_neighbors_nopref
ipf_url = https://change.this
snapshot_id = $last
use_ipf_timestamp = 0
load_intent_checks = 0
only_count = 0
table_path = tables/routing/protocols/bgp/neighbors
table_filter = {"and":[{"state": ["like","est"]},{"totalReceivedPrefixes":["lt",1]}]}

[ipf_input://ipf_devices]
disabled = 0
interval = 86400
index = ipf_devices
ipf_url = https://change.this
snapshot_id = $last
use_ipf_timestamp = 0
load_intent_checks = 0
only_count = 0
table_path = inventory/devices

[ipf_input://ipf_firewalls]
disabled = 0
interval = 86400
index = ipf_firewalls
ipf_url = https://change.this
snapshot_id = $last
use_ipf_timestamp = 0
load_intent_checks = 0
only_count = 0
table_path = inventory/devices
table_filter = {"devType":["like","fw"]}

[ipf_input://ipf_interfaces]
disabled = 0
interval = 86400
index = ipf_interfaces
ipf_url = https://change.this
snapshot_id = $last
use_ipf_timestamp = 0
load_intent_checks = 0
only_count = 0
table_path = /tables/inventory/interfaces

[ipf_input://ipf_ipsec_gateways]
disabled = 0
interval = 86400
index = ipf_ipsec_gateways
ipf_url = https://change.this
snapshot_id = $last
use_ipf_timestamp = 0
load_intent_checks = 0
only_count = 0
table_path = /technology/security/ipsec/gateways

[ipf_input://ipf_ipsec_tunnels]
disabled = 0
interval = 86400
index = ipf_ipsec_tunnels
ipf_url = https://change.this
snapshot_id = $last
use_ipf_timestamp = 0
load_intent_checks = 0
only_count = 0
table_path = /technology/security/ipsec/tunnels