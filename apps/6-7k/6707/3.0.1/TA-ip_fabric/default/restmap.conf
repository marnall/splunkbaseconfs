[admin:TA-ip_fabric_configuration]
match = /
members = TA-ip_fabric_settings

[admin:TA-ip_fabric_inputs]
match = /
members = TA-ip_fabric_ipf_input


[admin_external:TA-ip_fabric_settings]
handlertype = python
python.version = python3
python.required = 3.9
handlerfile = TA-ip_fabric_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA-ip_fabric_ipf_input]
handlertype = python
python.version = python3
python.required = 3.9
handlerfile = TA-ip_fabric_rh_ipf_input.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
