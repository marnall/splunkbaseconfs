[force_sourcetype_sepio_system]
DEST_KEY = MetaData:Sourcetype
REGEX = ^.+\"category\"\:\s+\"?(System)\",
FORMAT = sourcetype::sepio:system:events

[force_sourcetype_sepio_host]
DEST_KEY = MetaData:Sourcetype
REGEX = ^.+\"category\"\:\s+\"?(Host)\",
FORMAT = sourcetype::sepio:host:events

[force_sourcetype_sepio_general]
DEST_KEY = MetaData:Sourcetype
REGEX = ^.+\"category\"\:\s+\"?(General)\",
FORMAT = sourcetype::sepio:general:events

[force_sourcetype_sepio_network]
DEST_KEY = MetaData:Sourcetype
REGEX = ^.+\"category\"\:\s+\"?(Network*)\",
FORMAT = sourcetype::sepio:network:events

[extract_model]
REGEX = \"Model\":\"?(?P<Model>null|([^\"]*))\"?[^,]*

[extract_approved]
REGEX = \"Approved\":(?P<Approved>null|true|false)[^,]*

[extract_vendor]
REGEX = \"Vendor\":\"?(?P<Vendor>null|[^\"]*)\"?[^,]*

[extract_serialnumber]
REGEX = \"SerialNumber\":\"?(?P<SerialNumber>null|([^\"]*))\"?[^,]*

[extract_productinfo]
REGEX = \"ProductInfo\":\"?(?P<ProductInfo>null|[^\"]*)\"?[^,]*

[extract_macaddress]
REGEX = \"MacAddress\":\"?(?P<MacAddress>null|[^\"]*)\"?[^,]*

[extract_type]
REGEX = \"Type\":\"?(?P<Type>null|[^\"]*)\"?[^,]*

[extract_policy]
REGEX = \"Policy\":\"?(?P<Policy>null|([^\"]*))\"?[^,]*

[extract_manufacturer]
REGEX = \"Manufacturer\":\"?(?P<Manufacturer>null|[^\"]*)\"?[^,]*

[extract_vid]
REGEX = \"Vid\":\"?(?P<Vid>null|([^\"]*))\"?[^,]*

[extract_pid]
REGEX = \"Pid\":\"?(?P<Pid>null|([^\"]*))\"?[^,]*

[extract_status]
REGEX = \"Status\":\"?(?P<Status>null|[^\"]*)\"?[^,]*

[extract_ipaddress]
REGEX = \"IpAddress\":\"?(?P<IpAddress>null|[^\"]*)\"?[^,]*

[extract_risklevel]
REGEX = The\s+Risk\s+Level\s+of\s+.+?\s+(?:increased|decreased)\s+from\s+\d+\s+to\s+(?P<RiskLevel>\d+)\s+at\s+

[extract_hostname]
REGEX = \"eventEntityID\"\s*:\s*\"(?P<hostname>[^\(\"]+)

