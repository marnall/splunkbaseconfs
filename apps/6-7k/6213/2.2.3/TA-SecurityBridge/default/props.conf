[sapsb]
NO_BINARY_CHECK = true
PREFIX_SOURCETYPE = true
SHOULD_LINEMERGE = false
TIME_PREFIX = rt=
disabled = false
is_valid = true
maxDist = 9999
pulldown_type = true
REPORT-cefKeys = cefKeys
EXTRACT-body = ^.*msg=(?<msg>.*)\s+rt
EXTRACT-src_ip = ^.*src=(?<src_ip>[^ ]+)\s
EXTRACT-src_host,type_id,os = ^.*shost=(?<src_host>([^ ]+|.*))\stype=(?<type_id>\d)\s+SAPos=(?<os>\w+)
#EXTRACT-Version,Device_Vendor,Device_Product,Device_Version,Device_Event_Class_ID,Event,Severity = ^CEF:(?P<Version>\d+)\|(?P<Device_Vendor>[^\|]+)[^\|\n]*\|(?P<Device_Product>\w+)\|(?P<Device_Version>\d+)\|(?P<Device_Event_Class_ID>\d+)\|(?P<Event>[^.*]+)\|(?P<Severity>\d+)\|
#Enable above extract after install if needed
EVAL-src = if(isnotnull(src_ip), src_ip, src_host)
EVAL-user = if(isnotnull(user_id), user_id, user_name)
EVAL-type = "alert"
EVAL-id = device_event_class_id
EVAL-subject = alert_name
EVAL-severity_id = Severity
EVAL-app = "SecurityBridge"
EVAL-vendor_product = "SAP SecurityBridge"
EVAL-description = replace(msg, "\\\n|\\\r|\\\\", "" )
EVAL-Event = replace(Event, "\\\n|\\\r|\\\\", "" )
EVAL-eventUserEmail = eventUserEmail
EVAL-eventUserFullname = eventUserFullname
EVAL-mainContactAOR = mainContactAOR
EVAL-backupContactAOR = backupContactAOR
EVAL-eventAttr6 = eventAttr6
EVAL-eventAttr7 = eventAttr7
EVAL-eventAttr8 = eventAttr8
EVAL-eventAttr9 = eventAttr9
EVAL-eventAttr10 = eventAttr10

[sapsb_json]
BREAK_ONLY_BEFORE = (\},)\{
LINE_BREAKER = (\},)\{
SEDCMD-remove_prefix = s/{"d":{"results":\[//g
SEDCMD-remove_suffix = s/\]}}//g
SHOULD_LINEMERGE = false
category = Custom
pulldown_type = true
NO_BINARY_CHECK = true
disabled = false
SEDCMD-add_closing_bracket = s/\"$/"}/g
TIME_PREFIX = "timestamp":
TRUNCATE = 0
TZ = GMT
EVAL-severity_id = severity
EVAL-user = account
EVAL-user_name = account
EVAL-app = "SecurityBridge"
EVAL-vendor_product = "SAP SecurityBridge"
EVAL-type = "alert"
EVAL-subject = action
EVAL-id = object
EVAL-src = terminal
EVAL-cs1 = sid
EVAL-cs2 = client
EVAL-Device_Event_Class_ID = object
EVAL-Event = action
EVAL-Severity = severity
EVAL-duid = account
EVAL-msg = eventMsg
EVAL-description = eventMsg
EVAL-eventUserEmail = eventUserEmail
EVAL-eventUserFullname = eventUserFullname
EVAL-mainContactAOR = mainContactAOR
EVAL-backupContactAOR = backupContactAOR
EVAL-eventAttr6 = eventAttr6
EVAL-eventAttr7 = eventAttr7
EVAL-eventAttr8 = eventAttr8
EVAL-eventAttr9 = eventAttr9
EVAL-eventAttr10 = eventAttr10


[source::...ta-securitybridge*.log*]
sourcetype = tasecuritybridge:log

[source::...ta_securitybridge*.log*]
sourcetype = tasecuritybridge:log

[cert_logs]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1

[sapsb_push_json]
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
category = Custom
pulldown_type = true
disabled = false
TRUNCATE = 0
TIME_PREFIX = timestamp=
TIME_FORMAT = %s
TZ = GMT
KV_MODE = json
EXTRACT-timestamp = "timestamp":\s*(?<event_timestamp>\d+)
EXTRACT-sap_system = "system":\s*"(?<sap_system>[^"]+)"
EXTRACT-event_type = "event_type":\s*"(?<event_type>[^"]+)"
EXTRACT-severity = "severity":\s*"(?<severity_level>[^"]+)"
EXTRACT-user_account = "account":\s*"(?<user_account>[^"]+)"
EXTRACT-client_system = "client":\s*"(?<client_system>[^"]+)"
EXTRACT-terminal = "terminal":\s*"(?<terminal>[^"]+)"
EXTRACT-transaction = "transaction":\s*"(?<transaction>[^"]+)"
EXTRACT-object_type = "object":\s*"(?<object_type>[^"]+)"
EXTRACT-action_performed = "action":\s*"(?<action_performed>[^"]+)"
EVAL-severity_id = case(severity_level="Critical",1, severity_level="High",2, severity_level="Medium",3, severity_level="Low",4, 5)
EVAL-user = coalesce(user_account, "unknown")
EVAL-user_name = user_account
EVAL-app = "SecurityBridge"
EVAL-vendor_product = "SAP SecurityBridge"
EVAL-type = "alert"
EVAL-subject = action_performed
EVAL-id = object_type
EVAL-src = terminal
EVAL-cs1 = sap_system
EVAL-cs2 = client_system
EVAL-Device_Event_Class_ID = object_type
EVAL-Event = action_performed
EVAL-Severity = severity_id
EVAL-duid = user_account
EVAL-msg = eventMsg
EVAL-description = eventMsg
EVAL-eventUserEmail = eventUserEmail
EVAL-eventUserFullname = eventUserFullname
EVAL-mainContactAOR = mainContactAOR
EVAL-backupContactAOR = backupContactAOR
EVAL-eventAttr6 = eventAttr6
EVAL-eventAttr7 = eventAttr7
EVAL-eventAttr8 = eventAttr8
EVAL-eventAttr9 = eventAttr9
EVAL-eventAttr10 = eventAttr10