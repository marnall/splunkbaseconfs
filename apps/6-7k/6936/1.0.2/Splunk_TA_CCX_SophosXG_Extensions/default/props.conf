[sophos:xg:content_filtering]

FIELDALIAS-sophos_xg_content_filtering_category = http_category AS http_category
FIELDALIAS-ccx_sophosxg_protocol_to_transport = protocol AS transport

EVAL-action = case(log_subtype == "Allowed", "allowed", log_subtype =="Denied", "blocked", log_subtype == "Virus", "blocked", message like "blocked", "blocked", log_subtype == "Drop", "blocked", log_subtype == "Detect", "allowed", log_component == "SSL" AND log_subtype != "Error", "allowed", log_component == "SSL" AND log_subtype == "Error", "blocked")
EVAL-severity = case(priority == "Critical" OR severity == "Critical" OR rule_priority == "Critical", "critical", priority == "High"  OR severity == "High" OR rule_priority == "Major", "high", priority == "Medium"  OR severity == "Medium" OR rule_priority == "Minor", "medium", priority == "Low"  OR severity == "Low", "low", priority == "Information"  OR severity == "Information" OR rule_priority == "Warning", "informational")
EVAL-vendor_product = "Sophos XG"
EVAL-url = if(isnotnull(url),'url',if(isnotnull(sni) AND (log_component="SSL" OR log_component="HTTPS") ,"https://".tostring('sni'),if(isnotnull(sni) AND NOT (log_component="SSL" OR log_component="HTTPS"),'sni',null())))
EVAL-url_domain = coalesce('url_domain','sni')
EVAL-url_length = if(isnotnull(url),len('url'),if(isnotnull(sni) AND (log_component="SSL" OR log_component="HTTPS") ,len("https://".tostring('sni')),if(isnotnull(sni) AND NOT (log_component="SSL" OR log_component="HTTPS"),len('sni'),null())))
EVAL-app = 'app_name'
EVAL-category = if(isnotnull('http_category'),'http_category',if(isnotnull('sni') AND log_component="SSL",'category',null()))
EVAL-src = if(log_component="HTTP" OR log_component="Web Content Policy" OR (isnotnull('sni') AND log_component="SSL"), src_ip, null())
EVAL-dest = if(log_component="HTTP" OR log_component="Web Content Policy" OR (isnotnull('sni') AND log_component="SSL"), dst_ip, null())
EVAL-dest_ip = if(log_component="HTTP" OR log_component="Web Content Policy" OR (isnotnull('sni') AND log_component="SSL"), dst_ip, null())
EVAL-dest_port = if(log_component="HTTP" OR log_component="Web Content Policy" OR (isnotnull('sni') AND log_component="SSL"), dst_port, null())
EVAL-protocol = case(dst_port=="443","https",dst_port=="80","http",dst_port=="53","dns",dst_port=="123","ntp",dst_port=="23","telnet",dst_port=="22","ssh",1=1,lower(protocol))
EVAL-transport = lower('transport')
EVAL-rule = 'rule_name'

[sophos:xg:firewall]
EVAL-severity = case(priority == "Critical", "critical", priority == "High", "high", priority == "Medium", "medium", priority == "Low", "low", priority == "Information", "informational", rule_priority == "Critical", "critical", rule_priority == "Major", "high", rule_priority == "Minor", "medium", rule_priority == "Warning", "informational")
EVAL-action = case(log_subtype == "Allowed", "allowed", log_subtype =="Denied", "blocked", log_subtype == "Virus", "blocked", message like "blocked", "blocked", log_subtype ==  "Drop", "blocked", log_subtype == "Detect", "allowed")
EVAL-vendor_product = "Sophos XG"
EVAL-transport = lower(transport)
EVAL-app = lower('app_name')
EVAL-protocol = case(dest_port=="443","https",dest_port=="80","http",dest_port=="53","dns",dest_port=="123","ntp",dest_port=="23","telnet",dest_port=="22","ssh",1=1,lower(protocol))
EVAL-rule = 'fw_rule_name'
EVAL-dest = 'dest_ip'
EVAL-src = 'src_ip'

[sophos:xg:event]
EVAL-vendor_product = "Sophos XG"
EVAL-app = "SophosXG"
EVAL-body = 'message'
EVAL-description = 'message'
EVAL-severity = case(severity == "Critical", "critical", severity == "High", "high", severity == "Medium", "medium", severity == "Low", "low", severity == "Information", "informational", severity == "Major", "high", severity == "Minor", "medium", severity == "Warning", "informational",severity == "Notice", "informational")
EVAL-signature = if(log_type="Event" AND log_component IN("Anti-Virus","IPS","Interface","ATP"),'log_component',if((log_component="Firewall Authentication" OR log_component="My Account Authentication" OR log_component="Dial-In Authentication" OR log_component="VPN Authentication" OR log_component="SSL VPN Authentication" OR log_component="GUI" OR log_component="Web Application Firewall" OR log_component="CTA" OR log_component="Appliance" OR log_component="External Authentication" OR log_component="Quarantine" OR log_component="CLI") AND (isnotnull(user_name) OR isnotnull(user)),coalesce('reason','message'),null()))
EVAL-subject = if(log_type="Event" AND log_component IN("Anti-Virus","IPS","Interface","ATP"),'log_component',null())
EVAL-type = if(log_type="Event" AND status="Successful" AND log_component IN("Anti-Virus","IPS","Interface","ATP","GUI"),"event",if(log_type="Event" AND status!="Successful" AND log_component IN("Anti-Virus","IPS","Interface","ATP","GUI"),"alert",if(log_type="Event" AND isnull(status) AND match(message,".*success.*"),"event",if(log_type="Event" AND isnull(status) AND NOT match(message,".*success.*"),"alert",null()))))
EVAL-action = if(log_component="Firewall Authentication" OR log_component="My Account Authentication" OR log_component="Dial-In Authentication" OR log_component="VPN Authentication" OR log_component="SSL VPN Authentication" OR log_component="GUI" OR log_component="Web Application Firewall" OR log_component="CTA" OR log_component="Appliance" OR log_component="External Authentication" OR log_component="Quarantine" OR log_component="CLI", case(status=="Successful","success",status=="Failed","failure",1=1,lower(status)), if(log_type="Event" AND status="Successful" AND log_component IN("Anti-Virus","IPS","Interface","ATP"),"allowed", if(log_type="Event" AND status!="Successful" AND log_component IN("Anti-Virus","IPS","Interface","ATP"),"blocked", null())))
EVAL-src_user = if(log_component="Firewall Authentication" OR log_component="My Account Authentication" OR log_component="Dial-In Authentication" OR log_component="VPN Authentication" OR log_component="SSL VPN Authentication" OR log_component="GUI" OR log_component="Web Application Firewall" OR log_component="CTA" OR log_component="Appliance" OR log_component="External Authentication" OR log_component="Quarantine" OR log_component="IPSec" OR log_component="L2TP" OR log_component="PPTP" OR log_component="SSL VPN" OR log_component="CLI", user_name, null())
EVAL-user = if(log_component="Firewall Authentication" OR log_component="My Account Authentication" OR log_component="Dial-In Authentication" OR log_component="VPN Authentication" OR log_component="SSL VPN Authentication" OR log_component="GUI" OR log_component="Web Application Firewall" OR log_component="CTA" OR log_component="Appliance" OR log_component="External Authentication" OR log_component="Quarantine" OR log_component="IPSec" OR log_component="L2TP" OR log_component="PPTP" OR log_component="SSL VPN" OR log_component="CLI", user_name, null())
EVAL-dest = if(log_component="Firewall Authentication" OR log_component="My Account Authentication" OR log_component="Dial-In Authentication" OR log_component="VPN Authentication" OR log_component="SSL VPN Authentication" OR log_component="GUI" OR log_component="Web Application Firewall" OR log_component="CTA" OR log_component="External Authentication" OR log_component="Quarantine", dst_ip, if(log_component="Appliance" OR log_component="Central Management",coalesce('dst_ip','device_name'), null()))

[sophos:xg:sandbox]
EVAL-action = case(log_subtype == "Allowed", "allowed", log_subtype =="Denied", "blocked", log_subtype == "Virus", "blocked", message like "blocked", "blocked", log_subtype ==  "Drop", "blocked", log_subtype == "Detect", "allowed")
EVAL-app = "SophosXG"
