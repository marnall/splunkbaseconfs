[link_to_device]
display_location = both
fields = device_id, device_name, directory_device_id
label = Show Device in Google Admin Console
link.method = get
link.target = blank
link.uri = https://admin.google.com/ac/chrome/browsers/$directory_device_id$
type = link

[link_to_extension]
display_location = both
fields = extension_id, extension_name
label = Link to CBCM Console Apps
link.method = get
link.target = blank
link.uri = https://admin.google.com/ac/chrome/apps/$extension_id$
type = link

[link_to_webstore]
display_location = both
fields = extension_id, extension_name
label = Link to Chrome Webstore
link.method = get
link.target = blank
link.uri = https://chrome.google.com/webstore/detail/$extension_id$
type = link
