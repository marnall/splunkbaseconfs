cron_schedule = 0 * * * *
description = An extension was installed where one of the required permissions has the highest risk value.
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
quantity = 0
relation = greater than
search = `chrome` eventtype="extension_install" \
| lookup chrome_extension_risk_summary.csv id as extension_id output id, max_permission_risk, max_permission_risk_value \
| search max_permission_risk_value>=4

