[Create Combined Risk Lookup]
enableSched = 1
cron_schedule = */5 * * * *
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = uses the lookups chrome_extension_lookup and chrome_permission_risk to create a new outputlookup with risk value per extension permission
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","time"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = pie
display.visualizations.show = 0
request.ui_dispatch_app = splunk_app_google_chrome
request.ui_dispatch_view = search
search = | inputlookup chrome_extension_lookup\
| eval temp=split(permissions,",")\
| eval temp=trim(temp)\
| mvexpand temp\
| lookup chrome_permission_risk permission as temp\
| table id, name, temp, risk, installed, version\
| eval risk_value=`chrome_risk_eval(risk)`\
| outputlookup chrome_extension_risk_combined.csv

[Create Extension Permission Risk Summary]
enableSched = 1
cron_schedule = */5 * * * *
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = uses the lookups chrome_extension_lookup and chrome_permission_risk to create a new outputlookup with risk value per extension permission
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","time"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.charting.chart = pie
display.visualizations.show = 0
request.ui_dispatch_app = splunk_app_google_chrome
request.ui_dispatch_view = search
search = | inputlookup chrome_extension_risk_combined.csv \
| stats list(temp) as permissions list(risk) as risks list(risk_value) as risk_values max(risk_value) as max_permission_risk_value by id, name, version, installed \
| eval max_permission_risk=case(max_permission_risk_value==1, "Low", \
max_permission_risk_value==2, "Medium", max_permission_risk_value==3, "High", max_permission_risk_value==4, "Highest", 1==1, NULL)\
| outputlookup chrome_extension_risk_summary.csv

[Malware Transfer]
disabled = 1
action.email = 1
action.email.message.alert = Full event details:\$_raw$
action.email.subject.alert = $event$ detected on $device_user$ $client_type$
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = Malware Transfer event.
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
quantity = 1
relation = greater than
search = `chrome` eventtype=malware_transfer\
| where result in("EVENT_RESULT_WARNED","EVENT_RESULT_BYPASSED","EVENT_RESULT_ALLOWED")

