[alert_elevatepush]
is_custom = 1
label = Export Data to Elevate
python.version = python3
description = Export Data as a JSON file to Elevate
icon_path = elevatepush_alert_icon.png
command = elevatepush \
 "fields=$action.alert_elevatepush.param.fields$" \
 "stream_id=$action.alert_elevatepush.param.stream_id$"
 