[elevatepush-command]
syntax = elevatepush fields="comma,delimited,list,of,fields" | stream_id=<stream ID>
shortdesc = Export search results to your Elevate Customer Integration Endpoint
description = Exports search results in JSON format to your Elevate Customer Integration endpoint for the given Stream ID for the Elevate Behaviour.
example1 = elevatepush fields="field1,field2,field3" stream_id="some_stream_id"
example2 = elevatepush stream_id="some_stream_id"
comment1 = Configure your Elevate Host Address on this App's setup page 
usage = public
tags = elevate_app