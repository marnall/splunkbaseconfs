[admin:elevateappendpoint]
match = /elevateapp
members = elevateappsetup

[admin_external:elevateappsetup]
handlertype = python
handlerfile = elevate_setup_handler.py
handleractions = list, edit
python.version = python3
capability.post   = configure_elevate_write
capability.delete = configure_elevate_write
capability.put    = configure_elevate_write
capability.get    = configure_elevate_read or configure_elevate_write