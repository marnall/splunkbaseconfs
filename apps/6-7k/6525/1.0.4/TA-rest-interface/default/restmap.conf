[script:trifork-rest-raw]
match                 = /rest-raw
script                = trifork_rest.py
scripttype            = persist
handler               = application.TriforkRest
output_modes	      = json
passPayload           = true
python.version	      = python3

[script:trifork-rest-event]
match                 = /rest-event
script                = trifork_rest.py
scripttype            = persist
handler               = application.TriforkRest
output_modes          = json
passPayload           = true
python.version        = python3


