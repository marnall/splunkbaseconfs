
[ccx_extrahop_detection_alerts]
search = (sourcetype="extrahop:detection") categories{} IN ("perf.auth", "perf.network", "perf.web", "sec.caution", "sec.hardening", "sec.cryptomining")
# tags = alert

[ccx_extrahop_detection_ids]
search = (sourcetype="extrahop:detection") categories{} IN ("sec.action", "sec.botnet", "sec.exfil", "sec.exploit", "sec.lateral", "sec.recon") OR (categories{} IN ("sec.command", "sec.ransomware") AND NOT mitre_tactics{}.url="*")
# tags = attack ids

[ccx_extrahop_detection_malware]
search = (sourcetype="extrahop:detection") (categories{} IN ("sec.command", "sec.ransomware") AND mitre_tactics{}.url="*")
# tags = attack malware

[ccx_extrahop_detection_network_traffic]
search = (sourcetype="extrahop:detection") (categories{} IN ("sec.command", "sec.ransomware") AND mitre_tactics{}.url="*")
# tags = network communicate
