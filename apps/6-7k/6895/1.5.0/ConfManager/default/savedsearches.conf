[CM - Update and track CM_workflow_actions - Lookup Gen]
enableSched = 1
cron_schedule = 7-59/15 * * * *
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
disabled = 1
search = | rest timeout=600 splunk_server=local count=0\
    [ | rest timeout=600 splunk_server=local /services/apps/local\
    | search title=SplunkEnterpriseSecuritySuite\
    | stats count\
    | eval search=if(count==0, "/servicesNS/-/search/configs/conf-workflow_actions", "/servicesNS/-/SplunkEnterpriseSecuritySuite/configs/conf-workflow_actions" )\
    | fields search\
    | format\
    | rex field=search mode=sed "s/[ ()]//g"\
    ] f=eai:acl f=title f=fields f=label f=type f=display_location f=eventtypes f=link.method f=link.uri f=search.earliest f=search.latest f=search.search_string f=disabled f=updated\
| rename eai:* as *, acl.* as *, perms.* as *\
| fields app title fields label type display_location eventtypes link.method link.uri search.earliest search.latest search.search_string disabled owner read write sharing updated\
| eval method_or_time=coalesce('link.method', 'search.earliest'." => ".'search.latest' )\
| eval link_or_search=coalesce( 'link.uri', 'search.search_string' )\
| eval updated=strptime(updated,"%Y-%m-%dT%H:%M:%S%:z")\
| fields            app title fields label type display_location eventtypes method_or_time link_or_search disabled owner sharing read write updated\
| fillnull value="" app title fields label type display_location eventtypes method_or_time link_or_search disabled owner sharing read write updated\
| eval read=mvjoin(read, "\
"), write=mvjoin(write, "\
")\
| appendpipe\
    [\
    ``` There's no ID that allows to track a K.O. through its life. 2 K.O. with the same title can coexist in 2 different apps, or in the same app but owned by different users, or in the same app AND owned by the same user but one shared and one private (sharing="user"). It is however not possible for 2 K.O. to have the same title, in the same app, owned by the same user with the same sharing status.\
    So the ID of a K.O. becomes the combination: app-title-owner-sharing.\
    The problem with that is as soon as a private K.O. is shared for instance, it'll look like it disappeared and a brand new item appeared when the truth is the same item remained and had only one change (the value for sharing).\
    So how can we handle this?```\
    | eventstats count as instance_count by app title owner\
    ```if the first lookup works, that's the end of the story```\
    | lookup CM_workflow_actions app title owner sharing  OUTPUT  fields as old_fields  label as old_label  type as old_type  display_location as old_display_location  eventtypes as old_eventtypes  method_or_time as old_method_or_time  link_or_search as old_link_or_search  disabled as old_disabled  sharing as old_sharing  read as old_read  write as old_write  updated as old_updated\
      ```If the first lookup fails, the second one *might* be useful```\
      | lookup CM_workflow_actions app title owner OUTPUT  fields as old_fields2  label as old_label2  type as old_type2  display_location as old_display_location2  eventtypes as old_eventtypes2  method_or_time as old_method_or_time2  link_or_search as old_link_or_search2  disabled as old_disabled2  sharing as old_sharing2  read as old_read2  write as old_write2  updated as old_updated2\
      ```We only want to use the backup values if there is no other instance, so there is no possible ambiguity.```\
      | eval better_old_fields           = if( isnull(old_fields)           AND instance_count==1, old_fields2,           null() ),\
           better_old_label            = if( isnull(old_label)            AND instance_count==1, old_label2,            null() ),\
           better_old_type             = if( isnull(old_type)             AND instance_count==1, old_type2,             null() ),\
           better_old_display_location = if( isnull(old_display_location) AND instance_count==1, old_display_location2, null() ),\
           better_old_eventtypes       = if( isnull(old_eventtypes)       AND instance_count==1, old_eventtypes2,       null() ),\
           better_old_method_or_time   = if( isnull(old_method_or_time)   AND instance_count==1, old_method_or_time2,   null() ),\
           better_old_link_or_search   = if( isnull(old_link_or_search)   AND instance_count==1, old_link_or_search2,   null() ),\
           better_old_disabled         = if( isnull(old_disabled)         AND instance_count==1, old_disabled2,         null() ),\
           better_old_sharing          = if( isnull(old_sharing)          AND instance_count==1, old_sharing2,          null() ),\
           better_old_read             = if( isnull(old_read)             AND instance_count==1, old_read2,             null() ),\
           better_old_write            = if( isnull(old_write)            AND instance_count==1, old_write2,            null() ),\
           better_old_updated          = if( isnull(old_updated)          AND instance_count==1, old_updated2,          null() )\
    | fields app  title  owner\
             fields           old_fields           better_old_fields\
             label            old_label            better_old_label\
             type             old_type             better_old_type\
             display_location old_display_location better_old_display_location\
             eventtypes       old_eventtypes       better_old_eventtypes\
             method_or_time   old_method_or_time   better_old_method_or_time\
             link_or_search   old_link_or_search   better_old_link_or_search\
             disabled         old_disabled         better_old_disabled\
             sharing          old_sharing          better_old_sharing\
             read             old_read             better_old_read\
             write            old_write            better_old_write\
             updated          old_updated          better_old_updated\
    ``` Ok, so we're quite happy with that, but so far we've only been able to deal with items that are still here. What if an item used to be here but was deleted? How do we fish it out?```\
      | eval was_already_there=1\
      | inputlookup append=t CM_workflow_actions\
    | eval old_fields           = if( was_already_there==1, old_fields,           fields ),\
           old_label            = if( was_already_there==1, old_label,            label ),\
           old_type             = if( was_already_there==1, old_type,             type ),\
           old_display_location = if( was_already_there==1, old_display_location, display_location ),\
           old_eventtypes       = if( was_already_there==1, old_eventtypes,       eventtypes ),\
           old_method_or_time   = if( was_already_there==1, old_method_or_time,   method_or_time ),\
           old_link_or_search   = if( was_already_there==1, old_link_or_search,   link_or_search ),\
           old_disabled         = if( was_already_there==1, old_disabled,         disabled ),\
           old_sharing          = if( was_already_there==1, old_sharing,          sharing ),\
           old_read             = if( was_already_there==1, old_read,             read ),\
           old_write            = if( was_already_there==1, old_write,            write ),\
           old_updated          = if( was_already_there==1, old_updated,          updated )\
    | eval fields           = if( was_already_there==1, fields,           null() ),\
           label            = if( was_already_there==1, label,            null() ),\
           type             = if( was_already_there==1, type,             null() ),\
           display_location = if( was_already_there==1, display_location, null() ),\
           eventtypes       = if( was_already_there==1, eventtypes,       null() ),\
           method_or_time   = if( was_already_there==1, method_or_time,   null() ),\
           link_or_search   = if( was_already_there==1, link_or_search,   null() ),\
           disabled         = if( was_already_there==1, disabled,         null() ),\
           sharing          = if( was_already_there==1, sharing,          null() ),\
           read             = if( was_already_there==1, read,             null() ),\
           write            = if( was_already_there==1, write,            null() ),\
           updated          = if( was_already_there==1, updated,          null() )\
    ``` Now most of what we have just appended is duplicating what we had. The question is how do we identify what we need to remove ```\
      | eventstats count as actual_instance_count by app title owner old_sharing\
      ``` If actual_instance_count is more than 1 (it shouldn't be more than 2 though), we can safely get rid of it if it wasn't already there ```\
      | search was_already_there=1 OR actual_instance_count=1\
      ``` But we might still have fished out an item that we actually did use even if actual_instance_count missed it ```\
      | eval better_old_sharing=if( was_already_there==1, better_old_sharing, old_sharing )\
      | eventstats count as similar_instance_count by app title owner better_old_sharing\
      | search was_already_there=1 OR similar_instance_count=1\
      ``` Now we should have everything we wanted. We could try to do something similar for when ownership is reassigned or when an item is moved from one app to another, but these things are bit less common and would add a lot of complexity. Let's just tidy up ```\
