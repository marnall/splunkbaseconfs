[CM - Update and track CM_IR_fields - Lookup Gen]
enableSched = 1
cron_schedule = 8-59/15 * * * *
dispatch.earliest_time = -30m@m
dispatch.latest_time = now
disabled = 1
search = | rest timeout=600 splunk_server=local /servicesNS/-/-/configs/conf-log_review/incident_review         f=eai:acl              f=event_attributes    f=table_attributes       f=title f=updated           f=disabled\
| rename eai:* as *, acl.* as *, perms.* as *\
| fields app event_attributes table_attributes title   owner sharing read write updated disabled\
| rex field=event_attributes max_match=0 "field\"\s*:\s*\"(?<field>[^\"]+)"\
| rex field=event_attributes max_match=0 "label\"\s*:\s*\"(?<label>[^\"]+)"\
| fields - event_attributes\
| eval type="event attribute"\
| eval event_attribute=mvzip(field,label)\
| eval event_attribute=mvmap( event_attribute, type . "," . event_attribute )\
| rex field=table_attributes max_match=0 "field\"\s*:\s*\"(?<field>[^\"]+)"\
| rex field=table_attributes max_match=0 "label\"\s*:\s*\"(?<label>[^\"]+)"\
| fields - table_attributes\
| eval type="table attribute"\
| eval table_attribute=mvzip(field,label)\
| eval table_attribute=mvmap( table_attribute, type . "," . table_attribute )\
| eval attribute=mvappend( table_attribute, event_attribute)\
| fields - table_attribute event_attribute\
| mvexpand attribute\
| rex field=attribute "^(?s)(?<type>[^,]+),(?<field>[^,]+),(?<label>.*)$"\
| eval title=type . " " . field\
| eval updated=strptime(updated,"%Y-%m-%dT%H:%M:%S%:z")\
| fields            app title type field label owner sharing read write updated disabled\
| fillnull value="" app title type field label owner sharing read write updated disabled\
| eval read=mvjoin(read, "\
"), write=mvjoin(write, "\
")\
| appendpipe\
    [\
    ``` There's no ID that allows to track a K.O. through its life. 2 K.O. with the same title can coexist in 2 different apps, or in the same app but owned by different users, or in the same app AND owned by the same user but one shared and one private (sharing="user"). It is however not possible for 2 K.O. to have the same title, in the same app, owned by the same user with the same sharing status.\
    So the ID of a K.O. becomes the combination: app-title-owner-sharing.\
    The problem with that is as soon as a private K.O. is shared for instance, it'll look like it disappeared and a brand new item appeared when the truth is the same item remained and had only one change (the value for sharing).\
    So how can we handle this?```\
    | eventstats count as instance_count by app title owner\
    ```if the first lookup works, that's the end of the story```\
    | lookup CM_IR_fields app title owner sharing  OUTPUT  type as old_type  field as old_field  label as old_label  sharing as old_sharing  read as old_read  write as old_write  updated as old_updated  disabled as old_disabled\
      ```If the first lookup fails, the second one *might* be useful```\
      | lookup CM_IR_fields app title owner OUTPUT  type as old_type2  field as old_field2  label as old_label2  sharing as old_sharing2  read as old_read2  write as old_write2  updated as old_updated2  disabled as old_disabled2\
      ```We only want to use the backup values if there is no other instance, so there is no possible ambiguity.```\
      | eval better_old_type     = if( isnull(old_type)     AND instance_count==1, old_type2,     null() ),\
           better_old_field    = if( isnull(old_field)    AND instance_count==1, old_field2,    null() ),\
           better_old_label    = if( isnull(old_label)    AND instance_count==1, old_label2,    null() ),\
           better_old_sharing  = if( isnull(old_sharing)  AND instance_count==1, old_sharing2,  null() ),\
           better_old_read     = if( isnull(old_read)     AND instance_count==1, old_read2,     null() ),\
           better_old_write    = if( isnull(old_write)    AND instance_count==1, old_write2,    null() ),\
           better_old_updated  = if( isnull(old_updated)  AND instance_count==1, old_updated2,  null() ),\
           better_old_disabled = if( isnull(old_disabled) AND instance_count==1, old_disabled2, null() )\
    | fields app  title  owner\
             type     old_type     better_old_type\
             field    old_field    better_old_field\
             label    old_label    better_old_label\
             sharing  old_sharing  better_old_sharing\
             read     old_read     better_old_read\
             write    old_write    better_old_write\
             updated  old_updated  better_old_updated\
             disabled old_disabled better_old_disabled\
    ``` Ok, so we're quite happy with that, but so far we've only been able to deal with items that are still here. What if an item used to be here but was deleted? How do we fish it out?```\
      | eval was_already_there=1\
      | inputlookup append=t CM_IR_fields\
    | eval old_type     = if( was_already_there==1, old_type,     type ),\
           old_field    = if( was_already_there==1, old_field,    field ),\
           old_label    = if( was_already_there==1, old_label,    label ),\
           old_sharing  = if( was_already_there==1, old_sharing,  sharing ),\
           old_read     = if( was_already_there==1, old_read,     read ),\
           old_write    = if( was_already_there==1, old_write,    write ),\
           old_updated  = if( was_already_there==1, old_updated,  updated ),\
           old_disabled = if( was_already_there==1, old_disabled, disabled )\
    | eval type     = if( was_already_there==1, type,     null() ),\
           field    = if( was_already_there==1, field,    null() ),\
           label    = if( was_already_there==1, label,    null() ),\
           sharing  = if( was_already_there==1, sharing,  null() ),\
           read     = if( was_already_there==1, read,     null() ),\
           write    = if( was_already_there==1, write,    null() ),\
           updated  = if( was_already_there==1, updated,  null() ),\
           disabled = if( was_already_there==1, disabled, null() )\
    ``` Now most of what we have just appended is duplicating what we had. The question is how do we identify what we need to remove ```\
      | eventstats count as actual_instance_count by app title owner old_sharing\
      ``` If actual_instance_count is more than 1 (it shouldn't be more than 2 though), we can safely get rid of it if it wasn't already there ```\
      | search was_already_there=1 OR actual_instance_count=1\
      ``` But we might still have fished out an item that we actually did use even if actual_instance_count missed it ```\
      | eval better_old_sharing=if( was_already_there==1, better_old_sharing, old_sharing )\
      | eventstats count as similar_instance_count by app title owner better_old_sharing\
      | search was_already_there=1 OR similar_instance_count=1\
      ``` Now we should have everything we wanted. We could try to do something similar for when ownership is reassigned or when an item is moved from one app to another, but these things are bit less common and would add a lot of complexity. Let's just tidy up ```\
      | eval old_type     = coalesce( better_old_type,     old_type ),\
           old_field    = coalesce( better_old_field,    old_field ),\
           old_label    = coalesce( better_old_label,    old_label ),\
           old_sharing  = coalesce( better_old_sharing,  old_sharing ),\
           old_read     = coalesce( better_old_read,     old_read ),\
           old_write    = coalesce( better_old_write,    old_write ),\
           old_updated  = coalesce( better_old_updated,  old_updated ),\
           old_disabled = coalesce( better_old_disabled, old_disabled )\
    | fields app  title  owner\
             type     old_type\
             field    old_field\
             label    old_label\
             sharing  old_sharing\
             read     old_read\
             write    old_write\
             updated  old_updated\
             disabled old_disabled\
    | eval changed=mvappend( if( NOT 'old_type'     == 'type',     "type",     null() ),\
                             if( NOT 'old_field'    == 'field',    "field",    null() ),\
                             if( NOT 'old_label'    == 'label',    "label",    null() ),\
                             if( NOT 'old_sharing'  == 'sharing',  "sharing",  null() ),\
                             if( NOT 'old_read'     == 'read',     "read",     null() ),\
                             if( NOT 'old_write'    == 'write',    "write",    null() ),\
                             if( NOT 'old_updated'  == 'updated',  "updated",  null() ),\
                             if( NOT 'old_disabled' == 'disabled', "disabled", null() ) )\
    | search changed=*\
    | eval change =mvappend( if( NOT 'old_type'     == 'type',     "type"     . "<-" . "O->" . coalesce('old_type',     "") . "<-" . "O->" . coalesce('type',     ""), null() ),\
                             if( NOT 'old_field'    == 'field',    "field"    . "<-" . "O->" . coalesce('old_field',    "") . "<-" . "O->" . coalesce('field',    ""), null() ),\
                             if( NOT 'old_label'    == 'label',    "label"    . "<-" . "O->" . coalesce('old_label',    "") . "<-" . "O->" . coalesce('label',    ""), null() ),\
                             if( NOT 'old_sharing'  == 'sharing',  "sharing"  . "<-" . "O->" . coalesce('old_sharing',  "") . "<-" . "O->" . coalesce('sharing',  ""), null() ),\
                             if( NOT 'old_read'     == 'read',     "read"     . "<-" . "O->" . coalesce('old_read',     "") . "<-" . "O->" . coalesce('read',     ""), null() ),\
                             if( NOT 'old_write'    == 'write',    "write"    . "<-" . "O->" . coalesce('old_write',    "") . "<-" . "O->" . coalesce('write',    ""), null() ),\
                             if( NOT 'old_updated'  == 'updated',  "updated"  . "<-" . "O->" . coalesce('old_updated',  "") . "<-" . "O->" . coalesce('updated',  ""), null() ),\
                             if( NOT 'old_disabled' == 'disabled', "disabled" . "<-" . "O->" . coalesce('old_disabled', "") . "<-" . "O->" . coalesce('disabled', ""), null() ) )\
    | eval sharing=coalesce(sharing, old_sharing ), disabled=coalesce(disabled, old_disabled) ```We want to keep this information for filtering purposes```\
      | fields app title owner sharing disabled changed change\
      | eval change=mvjoin( change, "<<--" . "OO-->>" )\
      | eval _time=now()\
      | outputlookup append=t CM_IR_fields_changes\
      | search nevergoingtomatch=nothing\
      ]\
| outputlookup CM_IR_fields\
| stats count

