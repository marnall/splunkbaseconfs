[spycloud:watchlist]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TZ = GMT
KV_MODE = json
DATETIME_CONFIG = CURRENT
TIME_FORMAT = %Y-%m-%d
TIME_PREFIX = "spycloud_publish_date":\s"
EVAL-ip = coalesce('ip_addresses{}', ip_addresses)

