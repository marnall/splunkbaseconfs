
[admin:TA_SpyCloud]
match = /
members = TA_SpyCloud_settings, TA_SpyCloud_spycloud_watchlist, TA_SpyCloud_spycloud_watchlist_identifiers, TA_SpyCloud_spycloud_compass, TA_SpyCloud_spycloud_breach_catalog

[admin_external:TA_SpyCloud_settings]
handlertype = python
python.version = python3
handlerfile = TA_SpyCloud_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_SpyCloud_spycloud_watchlist]
handlertype = python
python.version = python3
handlerfile = TA_SpyCloud_rh_spycloud_watchlist.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_SpyCloud_spycloud_watchlist_identifiers]
handlertype = python
python.version = python3
handlerfile = TA_SpyCloud_rh_spycloud_watchlist_identifiers.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_SpyCloud_spycloud_compass]
handlertype = python
python.version = python3
handlerfile = TA_SpyCloud_rh_spycloud_compass.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_SpyCloud_spycloud_breach_catalog]
handlertype = python
python.version = python3
handlerfile = TA_SpyCloud_rh_spycloud_breach_catalog.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[script:spycloud_reset]
handlertype = python
python.version = python3
match = /spycloud_reset
handler = spycloud_reset.Reset

[script:spycloud_update_index]
handlertype = python
python.version = python3
match = /spycloud_update_index
handler = spycloud_update_index.Update

[script:spycloud_interval]
handlertype = python
python.version = python3
match = /spycloud_interval
handler = spycloud_interval.Interval

