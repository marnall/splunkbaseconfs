# SpyCloud TA Configuration Examples
# This shows how to configure the global ingestion mode and scheduling

# Global Configuration (in ta_spycloud_settings.conf):
# [additional_parameters]
# ingestion_mode = daily   # Options: "hourly" or "daily"

# Input Configuration for Hourly Mode:
# Set global ingestion_mode = hourly in ta_spycloud_settings.conf
# Then use this schedule in inputs.conf:
[spycloud_watchlist://SpyCloud_Watchlist_Hourly_Example]
sourcetype = spycloud:watchlist
disabled = 1
interval = 0 * * * *
# Note: All inputs will use hourly mode when global setting = hourly

# Input Configuration for Daily Mode (Current Default):
# Set global ingestion_mode = daily in ta_spycloud_settings.conf
# Then use this schedule in inputs.conf:
[spycloud_watchlist://SpyCloud_Watchlist_Daily_Example]
sourcetype = spycloud:watchlist
disabled = 1
interval = 15 1 * * *
# Note: All inputs will use daily mode when global setting = daily

# Architecture Notes:
# 1. Global Mode Setting: One setting controls ALL ingestions (hourly OR daily)
# 2. Reload Mode: ONLY triggered via manual reload page, not through config
# 3. Config Page: Admin sets global mode for entire system
# 4. Scheduling: Adjust interval based on chosen mode
#    - Hourly: 0 * * * * (every hour)
#    - Daily: 15 1 * * * (1:15 AM daily)