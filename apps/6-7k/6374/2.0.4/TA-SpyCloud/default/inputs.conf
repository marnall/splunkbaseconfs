[spycloud_watchlist]
start_by_shell = false
python.version = python3
sourcetype = spycloud:watchlist
interval = 30
disabled = 0

[spycloud_watchlist_identifiers]
start_by_shell = false
python.version = python3
sourcetype = spycloud:watchlist_identifiers
interval = 30
disabled = 0

[spycloud_compass]
start_by_shell = false
python.version = python3
sourcetype = spycloud:compass
interval = 30
disabled = 0

[spycloud_breach_catalog]
start_by_shell = false
python.version = python3
sourcetype = spycloud:breach_catalog
interval = 30
disabled = 0

[script://$SPLUNK_HOME/etc/apps/TA-SpyCloud/bin/spycloud_upgrade.py]
start_by_shell = false
sourcetype = spycloud:upgrade
interval = -1
passAuth = splunk-system-user
disabled = 0
python.version = python3

[script://$SPLUNK_HOME/etc/apps/TA-SpyCloud/bin/watchlist.py]
start_by_shell = false
sourcetype = spycloud:watchlist
interval = -1
passAuth = splunk-system-user
disabled = 1
python.version = python3

[script://$SPLUNK_HOME/etc/apps/TA-SpyCloud/bin/breach_catalog.py]
start_by_shell = false
sourcetype = spycloud:breach_catalog
interval = -1
passAuth = splunk-system-user
disabled = 1
python.version = python3

[script://$SPLUNK_HOME/etc/apps/TA-SpyCloud/bin/identifiers.py]
start_by_shell = false
sourcetype = spycloud:watchlist_identifiers
interval = -1
passAuth = splunk-system-user
disabled = 1
python.version = python3

[spycloud_breach_catalog://SpyCloud_Breach_Catalog]
sourcetype = spycloud:breach_catalog
disabled = 0
interval = 5 1 * * *

[spycloud_watchlist_identifiers://SpyCloud_Watchlist_Identifiers]
sourcetype = spycloud:watchlist_identifiers
disabled = 0
interval = 10 1 * * *

[spycloud_watchlist://SpyCloud_Watchlist]
sourcetype = spycloud:watchlist
disabled = 0
interval = 15 1 * * *

[spycloud_compass://SpyCloud_Compass]
sourcetype = spycloud:compass
disabled = 0
interval = 20 1 * * *

