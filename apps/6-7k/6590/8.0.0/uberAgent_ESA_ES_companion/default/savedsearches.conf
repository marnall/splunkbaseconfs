[uberAgent ESA - ES Risk Analysis]
dispatch.earliest_time = -15m
dispatch.latest_time = now
search = | pivot `uA_DM_ActivityMonitoring_ProcessTagging` ActivityMonitoring_ProcessTagging \
    latest(ProcName) as ProcName \
    latest(ProcID) as ProcID \
    latest(ProcParentName) as ProcParentName \
    latest(ProcParentID) as ProcParentID \
    latest(AppName) as AppName \
    latest(AppVersion) as AppVersion \
    latest(ProcCmdline) as "Command line" \
    latest(ProcPath) as "Process path" \
    latest(IsElevated) as Elevated \
    latest(IsProtected) as Protected \
    latest(ProcUser) as User \
    latest(ProcTag1) as Tag \
    latest(ProcRiskScore1) as RiskScore \
    latest(GenericProperty1Name) as GenericProperty1Name \
    latest(GenericProperty1Data) as GenericProperty1Data \
    latest(GenericProperty2Name) as GenericProperty2Name \
    latest(GenericProperty2Data) as GenericProperty2Data \
    latest(GenericProperty3Name) as GenericProperty3Name \
    latest(GenericProperty3Data) as GenericProperty3Data \
    latest(GenericProperty4Name) as GenericProperty4Name \
    latest(GenericProperty4Data) as GenericProperty4Data \
    latest(GenericProperty5Name) as GenericProperty5Name \
    latest(GenericProperty5Data) as GenericProperty5Data \
    latest(GenericProperty6Name) as GenericProperty6Name \
    latest(GenericProperty6Data) as GenericProperty6Data \
    latest(GenericProperty7Name) as GenericProperty7Name \
    latest(GenericProperty7Data) as GenericProperty7Data \
    latest(GenericProperty8Name) as GenericProperty8Name \
    latest(GenericProperty8Data) as GenericProperty8Data \
    latest(GenericProperty9Name) as GenericProperty9Name \
    latest(GenericProperty9Data) as GenericProperty9Data \
    latest(GenericProperty10Name) as GenericProperty10Name \
    latest(GenericProperty10Data) as GenericProperty10Data \
    latest(RuleAnnotation) as annotations \
    sum(EventCount) as EventCount \
    splitrow \
       ProcGUID \
    splitrow \
       host \
    splitrow \
       ProcLifetimeMs \
    splitrow \
       EventTypeName \
| eval "Process (ID)" = ProcName . " (" . ProcID . ")"  \
| eval "Parent (ID)" = ProcParentName . " (" . ProcParentID . ")"  \
| eval "Application (version)" = AppName . if(isnotnull(AppVersion), " (". AppVersion . ")", "")  \
| eval "Lifetime (s)" = if (isnotnull(ProcLifetimeMs), ProcLifetimeMs / 1000, "")  \
| eval risk_message = "Tag: " . Tag \
| eval risk_message = risk_message . (if(isnotnull('Process (ID)'), "," . "Process (ID): " . 'Process (ID)', "," . "")) \
| eval risk_message = risk_message . (if(isnotnull('Process path'), "," . "Process path: " . 'Process path', "," . "")) \
| eval risk_message = risk_message . (if(isnotnull('Command line'), "," . "Command line: " . 'Command line', "," . "")) \
| eval risk_message = risk_message . (if(isnotnull('Parent (ID)'), "," . "Parent (ID): " . 'Parent (ID)', "," . "")) \
| eval risk_message = risk_message . (if(isnotnull('Application (version)'), "," . "Application (version): " . 'Application (version)', "," . "")) \
| eval risk_message = risk_message . (if(isnotnull('Lifetime (s)'), "," . "Lifetime (s): " . 'Lifetime (s)', "," . "")) \
| eval risk_message = risk_message . (if(isnotnull(Elevated), "," . "Is elevated: " . Elevated, "," . "")) \
| eval risk_message = risk_message . (if(isnotnull(Protected), "," . "Is protected: " . Protected, "," . "")) \
| eval risk_message = risk_message . (if(isnotnull(GenericProperty1Name) and isnotnull(GenericProperty1Data), "," . GenericProperty1Name . ": " . GenericProperty1Data, "")) \
| eval risk_message = risk_message . (if(isnotnull(GenericProperty2Name) and isnotnull(GenericProperty2Data), "," . GenericProperty2Name . ": " . GenericProperty2Data, ""))  \
| eval risk_message = risk_message . (if(isnotnull(GenericProperty3Name) and isnotnull(GenericProperty3Data), "," . GenericProperty3Name . ": " . GenericProperty3Data, ""))  \
| eval risk_message = risk_message . (if(isnotnull(GenericProperty4Name) and isnotnull(GenericProperty4Data), "," . GenericProperty4Name . ": " . GenericProperty4Data, ""))  \
| eval risk_message = risk_message . (if(isnotnull(GenericProperty5Name) and isnotnull(GenericProperty5Data), "," . GenericProperty5Name . ": " . GenericProperty5Data, ""))  \
| eval risk_message = risk_message . (if(isnotnull(GenericProperty6Name) and isnotnull(GenericProperty6Data), "," . GenericProperty6Name . ": " . GenericProperty6Data, ""))  \
| eval risk_message = risk_message . (if(isnotnull(GenericProperty7Name) and isnotnull(GenericProperty7Data), "," . GenericProperty7Name . ": " . GenericProperty7Data, ""))  \
| eval risk_message = risk_message . (if(isnotnull(GenericProperty8Name) and isnotnull(GenericProperty8Data), "," . GenericProperty8Name . ": " . GenericProperty8Data, ""))  \
| eval risk_message = risk_message . (if(isnotnull(GenericProperty9Name) and isnotnull(GenericProperty9Data), "," . GenericProperty9Name . ": " . GenericProperty9Data, ""))  \
| eval risk_message = risk_message . (if(isnotnull(GenericProperty10Name) and isnotnull(GenericProperty10Data), "," . GenericProperty10Name . ": " . GenericProperty10Data, ""))  \
| makemv delim="," allowempty=true risk_message  \
| eval risk_object = host  \
| eval risk_object_type = "system"  \
| spathannotations \
| eval risk_score = RiskScore  \
| eval threat_object = ProcName \
| eval threat_object_type = case(like(EventTypeName,"Process.%"),"process",like(EventTypeName,"Image.%"),"process",like(EventTypeName,"Net.%"),"ip",like(EventTypeName,"DNS.%"),"ip",like(EventTypeName,"Reg.%"),"registry_path",1=1,"unknown") \
| eval dest = host  \
| eval src = host \
| eval user=User \
| fields risk_object risk_object_type annotations* risk_score threat_object threat_object_type risk_message EventTypeName dest user \
| sendalert risk
run_on_startup = true
enableSched  = 1
cron_schedule = */15 * * * *
schedule_window = auto
