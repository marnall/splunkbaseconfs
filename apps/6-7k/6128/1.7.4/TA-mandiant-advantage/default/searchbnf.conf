[mandiantmatchindicators-command]
syntax =  mandiantmatchindicators indicator_types="<comma-separated-list-of-indicator-types>"
description = This command performs the correlation between Mandiant indicators and provided Splunk events.
shortdesc = Correlate mandiant indicators against provided Splunk events.
example1 = | mandiantmatchindicators indicator_types="ipv4, url"
comment1 = Correlate mandiant indicators of type "ipv4" & "url" against provided Splunk events.
example2 = | mandiantmatchindicators
comment2 = Correlate all mandiant indicators against provided Splunk events.

[mandiantretireindicators-command]
syntax =  mandiantretireindicators ttl_days="<time to leave days for indicators>"
description = This command deletes mandiant indicators (from master & matched lookup) that are older than the provided ttl days.
shortdesc = Delete mandiant indicators that are older than configured days.
example1 = | mandiantretireindicators ttl_days=30
comment1 = Delete all mandiant indicators that are older than provided 30 days ttl.

[mandiantmatchvulnerabilities-command]
syntax =  mandiantmatchvulnerabilities
description = This command performs the correlation between Mandiant vulnerabilities and provided Splunk events.
shortdesc = Correlate mandiant vulnerabilities against provided Splunk events.
example1 = | mandiantmatchvulnerabilities
comment1 = Correlate mandiant vulnerabilities for specified fields against provided Splunk events.

[mandiantretirevulns-command]
syntax =  mandiantretirevulns ttl_days="<time to leave days for vulnerabilities>"
description = This command deletes mandiant vulnerabilities (from matched lookup) that are older than the provided ttl days.
shortdesc = Delete mandiant Vulnerabilities that are older than configured days.
example1 = | mandiantretirevulns ttl_days=30
comment1 = Delete all mandiant Vulnerabilities that are older than provided 30 days ttl.