[mandiant_master_lookup]
collection = mandiant_master_lookup
external_type = kvstore
fields_list = id, type, sha1, sha256, _key, mscore, malware, threat_actor, reports, campaigns last_seen, category, threat_score, severity_level, severity_reason

[mandiant_indicator_input_stats]
collection = mandiant_indicator_input_stats
external_type = kvstore
fields_list = _key, status, error_detail, indicators_added

[mandiant_matched_events]
collection = mandiant_matched_events
external_type = kvstore
fields_list = _time, data_model, index, sourcetype, host, action, src_ip, user, dest_ip, src, dest, indicator, file_hash, url, domain, last_seen, category, threat_actor, malware, campaigns, reports, matched_on, ic_score, _key, notable_created, type, threat_score, severity_level, severity_reason

[mandiant_matched_lookup]
collection = mandiant_matched_lookup
external_type = kvstore
fields_list = _key, first_seen_, last_seen_, indices

[mitre_attack_tech]
REGEX = ATT&CK:([^"\d]*)"
FORMAT = mitre_attack_tech::$1
MV_ADD = true

[mandiant_vuln_matched_lookup]
collection = mandiant_vuln_matched_lookup
external_type = kvstore
fields_list = hosts, vuln_id, exploitation_state, risk_rating, cve_last_match_time, available_mitigations, associated_actor_names, cpe_vendor_names, cpe_vendor_technology_names, _key

[mandiant_asm_issue_cache]
collection = mandiant_asm_issue_cache
external_type = kvstore
fields_list = _key, base64
