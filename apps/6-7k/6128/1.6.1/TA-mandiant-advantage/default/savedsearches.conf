[mandiant_create_notables]
disabled = 1
description = Queries the `mandiant_matched_events` KV Store for events and uses the `mandiantnotables` command to create a Splunk Notable Alert for each result found
action.correlationsearch.label = Mandiant Intel Hit
action.customsearchbuilder.enabled = 0
action.customsearchbuilder.spec = {}
action.notable = 1
action.notable.param.rule_description = Mandiant Threat Intelligence hit: Found in Data Model: $data_model$; Indicator: $indicator$; Mandiant Indicator Confidence Score: $calculated_risk_score$
action.notable.param.rule_title = Mandiant Matched Event - Indicator Match - $indicator$ in Data Model: $data_model$
action.notable.param.drilldown_name = Mandiant Matched Events
action.notable.param.drilldown_search = | inputlookup mandiant_matched_events | search indicator=$indicator$ notable_created=1 | table _time, index, sourcetype, data_model, action, host, src, src_ip, dest, dest_ip, domain, file_hash, indicator, category, malware, threat_actor, campaigns, reports
action.notable.param.security_domain = threat
action.notable.param.verbose = 0
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-mandiant-advantage
request.ui_dispatch_view = search
action.risk.forceCsvResults = 1
alert.digest_mode = 0
alert.suppress = 0
search = | inputlookup mandiant_matched_events | eval key=_key | search notable_created=0 | mandiantnotables | rename ic_score as calculated_risk_score | eval vendor_severity=severity | table _time, index, sourcetype, data_model, action, host, src, src_ip, dest, dest_ip, domain, file_hash, indicator, calculated_risk_score, vendor_severity, threat_source_type, category, malware_alias, threat_group, urgency, severity

