[mandiant_master_lookup]
cron_schedule = 0 */6 * * *
description = Populate the mandiant_master_lookup KV Store with Mandiant indicators
dispatch.earliest_time = -35m
dispatch.latest_time = now
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = TA-mandiant-advantage
request.ui_dispatch_view = search
allow_skew = 50%
search = index=`mandiant_indicator_index` sourcetype="mandiant:advantage:indicators" earliest=-`mandiant_indicator_time_window`d mscore>=`mandiant_min_ic_score`| dedup value | rename value as _key | eval last_seen=round(strptime(last_seen_index, "%Y-%m-%dT%H:%M:%S.%fZ")) | rename threat_rating.threat_score as threat_score | rename threat_rating.severity_level as severity_level | rename threat_rating.severity_reason{} as severity_reason | rename category{} as category | rename threat_actor{} as threat_actor | rename malware{} as malware | rename campaigns_list{} as campaigns | rename reports_list{} as reports | table _key id type last_seen sha1 sha256 mscore threat_actor malware category threat_score severity_level severity_reason campaigns reports | outputlookup mandiant_master_lookup

[mandiant_match_vulnerabilities]
disabled = 1
cron_schedule = 30-59/30 * * * *
description = Match Vulnerabilities from the selected indices and sourcetypes
dispatch.earliest_time = -35m
dispatch.latest_time = now
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = TA-mandiant-advantage
request.ui_dispatch_view = search
allow_skew = 50%
search = `mandiant_vuln_indices` `mandiant_vuln_srctypes`| rename `mandiant_vuln_host_field` as host_ | table `mandiant_vuln_fields`, host_ | mandiantmatchvulnerabilities

[mandiant_retire_vulnerabilities]
cron_schedule = 0 0 * * *
description = Delete mandiant vulnerabilities that are older than configured days.
dispatch.earliest_time = -1m
dispatch.latest_time = now
schedule_priority = highest
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = TA-mandiant-advantage
request.ui_dispatch_view = search
search = | mandiantretirevulns ttl_days=`mandiant_vuln_retiring_days`

[mandiant_match_events_authentication]
disabled = 1
cron_schedule = 30-59/30 * * * *
description = Queries the Authentication CIM Data Model and uses the `mandiantmatchevents` command to correlate the `src` or `dest` fields with Mandiant indicators in the `mandiant_master_lookup`. Results of matched events are added to the `mandiant_matched_events` KV Store.
dispatch.earliest_time = -35m
dispatch.latest_time = now
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = TA-mandiant-advantage
request.ui_dispatch_view = search
allow_skew = 50%
search = | datamodel Authentication Authentication search strict_fields=false | fillnull value=NULL | eval data_model="Authentication" | rename Authentication.action as action, Authentication.src, as src, Authentication.user, as user, Authentication.dest as dest | table _time, data_model, index, sourcetype, host, action, src, user, dest | mandiantmatchevents fields="src,dest" data_model="authentication"

