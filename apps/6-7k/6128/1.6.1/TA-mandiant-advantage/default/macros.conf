[mandiant_validation_indices]
definition = index IN (main)

[mandiant_dtm_alert_indices]
description = Definition for all indices where alerts are stored
definition = index IN (main)
iseval = 0

[mandiant_asm_issues_indices]
description = Definition for all indices where alerts are stored
definition = index IN (main)
iseval = 0

[mandiant_asm_entities_indices]
description = Definition for all indices where alerts are stored
definition = index IN (main)
iseval = 0

[mandiant_indicator_indices]
description = Definition for all indices where IOCs are stored
definition = index IN (main)
iseval = 0

[mandiant_mscore_to_maliciousness(1)]
args = ic_score
description = Covert M Score into Maliciousness value
definition = case(ic_score>=80, "Malicious", ic_score>=60, "Suspicious", ic_score>=40, "Indeterminant", ic_score<40, "Benign")

[mandiant_indicator_retiring_days]
description = Indicators that are older than configured days will be deleted.
definition = 30
iseval = 0

[mandiant_target_indices]
description = List of target indices configured in CIM data models that are used for correlation. This will be used for drilldown of Correlation Details Dashboard.
definition = index IN ()
iseval = 0

[mandiant_info_min_time]
description  = Add earliest info to the query from specified timerange
definition = [| makeresults | addinfo | return $info_min_time]
iseval = 0

[mandiant_info_max_time]
description = Add latest info to the query from specified timerange
definition = [| makeresults | addinfo | eval info_max_time=if(info_max_time="+Infinity", 2999999999, info_max_time) | return $info_max_time]
iseval = 0

[mandiant_vuln_indices]
description = Definition for all indices where Vulnerabilities are stored
definition = index IN (main)
iseval = 0

[mandiant_vuln_srctypes]
description = Definition for all sourcetypes where Vulnerabilities are stored
definition = sourcetype IN ()
iseval = 0

[mandiant_vuln_fields]
description = Definition for all fields that needs to be matched while performing correlation
definition = ()
iseval = 0

[mandiant_vuln_host_field]
description = Definition for the field to use as the host value in Vulnerability Correlation
definition = 
iseval = 0

[mandiant_vuln_retiring_days]
description = Vulnerabilities that are older than configured days will be deleted.
definition = 30
iseval = 0

[mandiant_indicator_index]
description = Define the index to query for Mandiant Indicators.
definition = main
iseval = 0

[mandiant_indicator_time_window]
description = Define the age of indicators included in the `mandiant_master_lookup` lookup table.
definition = 30
iseval = 0

[mandiant_min_ic_score]
description = Define the threshold to use to populate the `mandiant_master_lookup` lookup table used for Threat Matching rules.
definition = 80
iseval = 0
