[source::...ta_palo_alto_cortex_xdr_alert_retriever*.log*]
SHOULD_LINEMERGE = true
sourcetype = tapaloaltocortexxdralertretriever:log

[cortex:xdr:alerts]
TIME_PREFIX = detection_timestamp
KV_MODE = json
JSON_TRIM_BRACES_IN_ARRAY_NAMES = true
TRUNCATE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-cortex_xdr_alerts_alert_cim = alert_id ASNEW id "event_type{}" ASNEW type "host_ip{}" ASNEW src host_name ASNEW dest name ASNEW signature "user_name{}" ASNEW user
EXTRACT-mitre_technique_id = mitre_technique_id_and_name\"\:\s\[\"(?<mitre_technique_id>[^\-^\s^\,]+)
EVAL-action = if(action!="ALLOWED", "blocked", "allowed")
EVAL-app = cortex_xdr_alerts