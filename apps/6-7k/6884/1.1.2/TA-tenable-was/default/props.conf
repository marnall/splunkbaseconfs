[tenable:io:vuln:was]
SHOULD_LINEMERGE = 0
category = tenable
pulldown_type = 1
EVAL-vendor_product = "Tenable WAS"
EVAL-product = "WAS"
EVAL-vendor = "Tenable"
KV_MODE = JSON
DATETIME_CONFIG = NONE
FIELDALIAS-plugin_id = finding.plugin_id AS plugin_id
FIELDALIAS-plugin_name = finding.name AS plugin_name
FIELDALIAS-plugin_family = finding.family AS plugin_family
FIELDALIAS-severity = finding.risk_factor AS severity
FIELDALIAS-asset_name = finding.uri AS asset_name
FIELDALIAS-uri = finding.uri AS uri
FIELDALIAS-cve = finding.cves{} AS cve
FIELDALIAS-bugtraq_id = finding.bid{} AS bugtraq_id
FIELDALIAS-cwe = finding.cwe{} AS cwe
FIELDALIAS-cvssv2 = finding.cvss AS cvssv2
FIELDALIAS-cvssv3 = finding.cvssv3 AS cvssv3
FIELDALIAS-synopsis = finding.synopsis AS synopsis
FIELDALIAS-description = finding.description AS description
FIELDALIAS-solution = finding.solution AS solution
FIELDALIAS-see_also = finding.see_also{} AS see_also
FIELDALIAS-plugin_output = finding.output AS output
FIELDALIAS-xref = finding.xrefs{} AS xref
FIELDALIAS-first_seen = scan.first_seen AS first_seen
FIELDALIAS-last_seen = scan.finalized_at AS last_seen
FIELDALIAS-scan_name = config.name AS scan_name

FIELDALIAS-xrefs = finding.xrefs{} AS xrefs
FIELDALIAS-signature_id = finding.plugin_id AS signature_id
FIELDALIAS-signature = finding.name AS signature
FIELDALIAS-category = finding.family AS category
FIELDALIAS-dest_name = finding.uri AS dest_name
FIELDALIAS-url = finding.uri AS url
FIELDALIAS-bugtraq = finding.bid{} AS bugtraq
FIELDALIAS-cvss2 = finding.cvss AS cvss
FIELDALIAS-cvss3 = finding.cvssv3 AS cvss
FIELDALIAS-xref = finding.xrefs{}.xref_name AS xref

[source::...ta-tenable-was*.log*]
sourcetype = tenable:was:log

[source::...ta_tenable_was*.log*]
sourcetype = tenable:was:log
