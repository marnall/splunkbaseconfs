[nexus_insights_details_viewer]
display_location = both
eventtypes = cisco_ni_anomalies
fields = anomalyId, endTs, insights_group, ni_host, startTs
label = Explore Anomaly Details on Nexus Insights Dashboard
link.method = get
link.target = blank
link.uri = https://$ni_host$//appcenter/cisco/nir/ui/#/detailsScreen/analyze?insightsGroupName=$insights_group$&endTs=$!endTs$&startTs=$!startTs$&filter=anomalyId:$anomalyId$
type = link


[nexus_insights_details_viewer_advisories]
display_location = both
eventtypes = cisco_ni_advisories
fields = advisoryId, endTs, insights_group, ni_host, startTs
label = Explore Advisory Details on Nexus Insights Dashboard
link.method = get
link.target = blank
link.uri = https://$ni_host$//appcenter/cisco/nir/ui/#/detailsScreen/advisory?insightsGroupName=$insights_group$&endTs=$!endTs$&startTs=$!startTs$&filter=advisoryId:$advisoryId$
type = link
