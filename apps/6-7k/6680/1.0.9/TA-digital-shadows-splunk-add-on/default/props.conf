[digital:shadows:triage]
SHOULD_LINEMERGE = 0
MAX_DAYS_AGO=3660
category = Splunk App Add-on Builder
pulldown_type = 1
TIME_PREFIX="event-created":\s*"
TIME_FORMAT=%Y-%m-%dT%H:%M:%S.%f%Z
EXTRACT-domain=(Domain:\s+(?<domain>[^\n]+)) in description
EXTRACT-url=(URL:\s+(?<url>[^\n]+)) in description
EXTRACT-phishing_url=(Phishing Webpage:\s+(?<phishing_url>[^\n]+)) in description
EXTRACT-ip_address=(IP address:\s+(?<ip_address>[^\n]+)) in description
EXTRACT-port=(Port:\s+(?<port>[^\n]+)) in description
EXTRACT-registrar=(Registrar:\s+(?<registrar>[^\n]+)) in description
EXTRACT-registrar_abuse_email=(Registrar abuse contact email:\s+(?<registrar_abuse_email>[^\n]+)) in description
EXTRACT-registrar_abuse_phone=(Registrar abuse contact phone:\s+(?<registrar_abuse_phone>[^\n]+)) in description
EXTRACT-registrar_expiration=(Registrar registration expiration date:\s+(?<registrar_expiration>[^\n]+)) in description
EXTRACT-description_title=(Title:\s+(?<description_title>[^\n]+)) in description
EXTRACT-author=(Author:\s+(?<author>[^\n]+)) in description
EXTRACT-thread=(Thread:\s+(?<thread>[^\n]+)) in description
EXTRACT-posted=(Posted:\s+(?<posted>[^\n]+)) in description
EXTRACT-seller=(Seller:\s+(?<seller>[^\n]+)) in description
EXTRACT-channel=(Channel:\s+(?<channel>[^\n]+)) in description
EXTRACT-server=(Server:\s+(?<server>[^\n]+)) in description
EXTRACT-device_type=(Device type:\s+(?<device_type>[^\n]+)) in description
EXTRACT-shodan_link=(Shodan link:\s+(?<shodan_link>[^\n]+)) in description
EXTRACT-app_name=(App name:\s+(?<app_name>[^\n]+)) in description
EXTRACT-sandbox_result=(Sandbox result:\s+(?<sandbox_result>[^\n]+)) in description
EXTRACT-developer_name=(Developer name:\s+(?<developer_name>[^\n]+)) in description
EXTRACT-revocation_crl=(Revocation CRL:\s+(?<revocation_crl>[^\n]+)) in description
EXTRACT-revocation_ocsp=(Revocation OCSP:\s+(?<revocation_ocsp>[^\n]+)) in description
EXTRACT-cve_number=(CVE number:\s+(?<cve_number>[^\n]+)) in description
EXTRACT-cvss3_score=(CVSS3 score:\s+(?<cvss3_score>[^\n]+)) in description
EXTRACT-vector=(Vector:\s+(?<vector>[^\n]+)) in description
EXTRACT-weakness=(Weaknesses:\s+(?<weakness>[^\n]+)) in description
EXTRACT-certificate_subject=(Subject:\s+(?<certificate_subject>[^\n]+)) in description
EXTRACT-certificate_common_names=(Common names:\s+(?<certificate_common_names>[^\n]+)) in description
EXTRACT-certificate_alternative_names=(Alternative names:\s+(?<certificate_alternative_names>[^\n]+)) in description
EXTRACT-certificate_serial_number=(Serial number:\s+(?<certificate_serial_number>[^\n]+)) in description
EXTRACT-certificate_issuer=(Issuer:\s+(?<certificate_issuer>[^\n]+)) in description
EXTRACT-certificate_valid_from=(Valid from:\s+(?<certificate_valid_from>[^\n]+)) in description
EXTRACT-certificate_valid_until=(Valid until:\s+(?<certificate_valid_until>[^\n]+)) in description
EXTRACT-certificate_key=(Key:\s+(?<certificate_key>[^\n]+)) in description
EXTRACT-certificate_signature_algorithm=(Signature algorithm:\s+(?<certificate_signature_algorithm>[^\n]+)) in description
EXTRACT-certificate_sha_256=(SHA-256 of certificate:\s+(?<certificate_sha_256>[^\n]+)) in description

KV_MODE = json
TRUNCATE = 999999

[digital:shadows:intel:incidents]
SHOULD_LINEMERGE = 0
MAX_DAYS_AGO=3660
category = Splunk App Add-on Builder
TIME_PREFIX="modified":\s*"
TIME_FORMAT=%Y-%m-%dT%H:%M:%S.%f%Z
FIELDALIAS-comments = title AS comments
KV_MODE = json
TRUNCATE = 999999

[digital:shadows:ioc]
SHOULD_LINEMERGE = 0
MAX_DAYS_AGO=3660
category = Splunk App Add-on Builder
TIME_PREFIX="source_created":\s*"
TIME_FORMAT=%Y-%m-%dT%H:%M:%S%Z
KV_MODE = json
TRUNCATE = 999999

[source::...ta-digital-shadows-splunk-add-on*.log*]
SHOULD_LINEMERGE = true
sourcetype = tadigitalshadowssplunkaddon:log

[source::...ta_digital_shadows_splunk_add_on_digital_shadows_triage*.log*]
SHOULD_LINEMERGE = true
sourcetype = tadigitalshadowssplunkaddon:triage:log

[source::...ta_digital_shadows_splunk_add_on_digital_shadows_threat_intelligence*.log*]
SHOULD_LINEMERGE = true
sourcetype = tadigitalshadowssplunkaddon:ti:log

[source::...update_state_in_searchlight_modalert.log*]
SHOULD_LINEMERGE = true
sourcetype = tadigitalshadowssplunkaddon:ar:log

[tadigitalshadowssplunkaddon:log]
