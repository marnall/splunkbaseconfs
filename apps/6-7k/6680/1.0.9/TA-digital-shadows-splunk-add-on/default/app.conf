[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 2

[launcher]
author = Digital Shadows
version = 1.0.9
description = This Add-On collects data from Digital Shadows using SearchLight API and indexes it in Splunk.

[ui]
is_visible = 1
label = Digital Shadows SearchLight Add-On for Splunk
docs_section_override = AddOns:released

[package]
id = TA-digital-shadows-splunk-add-on

[triggers]
reload.addon_builder = simple
reload.ta_digital_shadows_splunk_add_on_account = simple
reload.ta_digital_shadows_splunk_add_on_settings = simple
reload.passwords = simple

