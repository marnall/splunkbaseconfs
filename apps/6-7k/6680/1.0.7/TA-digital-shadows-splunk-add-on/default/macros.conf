
[get_digitalshadows_index]
definition = index=*
iseval = 0

[get_digitalshadows_alerts]
definition = (sourcetype="digital:shadows:triage" AND source="digital_shadows")

[ds_alert_std_renames]
definition = rename "triage_item.id" as triage_id "triage_item.risk-level" as risk_level "alert.risk-factors" as risk_factors

[ds_severity_mapping(1)]
args = risk_level
definition = eval severity=case($risk_level$=="very-high", "critical", $risk_level$=="high", "high", $risk_level$=="medium", "medium", $risk_level$=="low", "low", $risk_level$=="very-low", "low", $risk_level$=="none", "unknown")
iseval = 0

[ds_risk_score_mapping(1)]
args = severity
definition = eval risk_score=case($severity$=="critical", 100, $severity$=="high", 80, $severity$=="medium", 60, $severity$=="low", 40, $severity$=="unknown", 20)
iseval = 0

[ds_incident_std_renames]
definition = rename "triage_item.id" as triage_id "triage_item.risk-level" as risk_level "incident.impact-description" as impact_description "incident.mitigation" as mitigation "incident.risk-factors" as risk_factors

[ds_exclude_closed]
definition = where ('triage_item.state'!="closed" AND 'triage_item.state'!="rejected" AND 'triage_item.state'!="resolved")

[ds_threat_field_maps]
definition = eval threat_source_id = 'triage_item.portal-shortcode' | eval threat_source_type = 'triage_item.risk-type'

[ds_ioc_lookup_indexes]
definition = index=*
iseval = 0

[ds_extract_hostname(1)]
args = url
definition = rex field=$url$ "http(?:s)?://(?<hostname>[^/]+)(?:$|/)"
iseval = 0

[ds_ioc_index]
definition = index=*
iseval = 0

[ds_ioc_sourcetype]
definition = sourcetype="digital:shadows:ioc"
iseval = 0

[ds_intel_update_index]
definition = index=*
iseval = 0

[ds_intel_update_sourcetype]
definition = sourcetype="digital:shadows:intel:incidents"
iseval = 0