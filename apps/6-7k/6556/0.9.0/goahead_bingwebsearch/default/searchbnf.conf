[bingwebsearch-command]
syntax = bingwebsearch q=<query string> count=<int> offset=<int> mkt=<market code> responseFilter=<category (list)> safeSearch=<Off|Strict|Moderate> others=<other parameters>
shortdesc =  Bing Web Search API(v7) wrapper command. (By GoAhead Inc.)
example = | bingwebsearch q="site:google.com apple" count=10 offset=0 mkt=en-US responseFilter=Webpages safeSearch=Strict others="setLang=en-US&freshness=2020-01-01..2022-04-01"
description = 
usage = public


[binghostinfo-command]
syntax = binghostinfo input_field=<field> mode=<ip or domain> mkt=<market code> apisaver=<true or false>
shortdesc = Append the web site hosting info for target ip or domain via Bing Web Search API(v7) (By GoAhead Inc.)
example = ...| fields ipfield | binghostinfo input_field=ipfield mode=ip
description = 
usage = public