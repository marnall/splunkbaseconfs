# Preventing index entries from being truncated
[ame-index-entry]
TRUNCATE = 999999

[ame-initial-event]
TRUNCATE = 999999

[ame-backup-entry]
TRUNCATE = 999999

# Setting parsing rules for the logs of AME
[source::...(/|\\)var(/|\\)log(/|\\)splunk(/|\\)datapunctum*]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)\d{4}-\d{2}-\d{2}T
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%f%:z
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 29
TRUNCATE = 0

[source::...datapunctum_ame_service.log]
sourcetype = ame:service

[source::...datapunctum_ame_handler.log]
sourcetype = ame:handler

[source::...datapunctum_ame_command.log]
sourcetype = ame:command

[source::...datapunctum_ame_modinput.log]
