[ameevents-command]
syntax = ameevents (<ameevents-options>)*
shortdesc = Load events from Alert Manager Enterprise.
description = Load events from Alert Manager Enterprise using various filters.
usage = public
example1 = | ameevents tenants="default" status="all_open"
comment1 = Get all open events for tenant default
example2 = | ameevents tenants="default" assignees="unassigned,user1"
comment2 = Get all events for tenant default which are assigned to user1 or unassigned
example3 = | ameevents tenants="default" tags="tag1,tag2" tag_mode="AND"
comment3 = Get all events for tenant default which have both tag1 and tag2
example4 = | ameevents tenants="default" saved_searches="[\"saved_search1\",\"saved_search2\"]"
comment4 = Get all events for tenant default generated by alert saved_search1 or saved_search2
tags = ame events

[ameevents-options]
syntax = tenants=<string> | priorities=<string> | status=<string> | assignees=<string> | tags=<string> | tag_mode=<string> | saved_searches=<string> | resolutions=<string> | sla_info=<bool> | has_slas=<bool> | has_sla_violations=<bool> | has_sla_violation_within=<int> | status_types=<string> | observable_info=<bool> | risk_event_info=<bool>
description = The ameevents command allows to filter events by various criteria. \
    tenants - comma separated list of tenants to filter by. \
    priorities - comma separated list of priorities to filter by. \
    status - comma separated list of statuses to filter by (supports both keys and names - special values 'all_open', 'all_done' and 'all'). \
    resolutions - comma separated list of resolutions to filter by. \
    assignees - comma separated list of assignees to filter by (special value 'all' for all users). \
    tags - comma separated list of tags to filter by. \
    tag_mode - AND or OR. Defaults to OR. \
    saved_searches - stringified JSON array of saved searches to filter by. \
    sla_info - boolean value to indicate whether to include SLA information in the results. Defaults to false. \
    has_slas - boolean value to indicate whether to include events that have SLAs. Defaults to None. \
    has_sla_violations - boolean value to indicate whether to include events that have SLA violations. Defaults to None. \
    has_sla_violation_within - integer value to indicate the number of seconds remaning until an SLA is violated. Defaults to None. \
    status_types - comma separated list of status types to filter by. \
    observable_info - boolean value to indicate whether to include observable information in the results. Defaults to false. \
    risk_event_info - boolean value to indicate whether to include risk event information in the results. Requires observable_info to be true. Defaults to false.

[ameenrich-command]
syntax = ameenrich <ameenrich-options>
shortdesc = Enrich events with data from Alert Manager Enterprise. Entires that match the filters given are tagged with filter_matched=1.
description = Enrich events with data from Alert Manager Enterprise.
usage = public
example1 = | ameenrich
comment1 = Enrich events with data from Alert Manager Enterprise
example2 = | ameenrich fields="status,count"
comment2 = Enrich events with data from Alert Manager Enterprise, but only for the fields named status and count
example3 = index=ame_default sourcetype="ame-index-entry" | ameenrich assignees="analyst_03,engineer_04" fields="status,assignee,tenant" | search filter_matched=1
comment3 = Enrich events with data from Alert Manager Enterprise, for the fields status, assignee and tenant, but only if the assignee is analyst_03 or engineer_04. Then search for events that were enriched.
tags = ame enrich

[ameenrich-options]
syntax = tenants=<string> | priorities=<string> | status=<string> | assignees=<string> | tags=<string> | tag_mode=<string> | saved_searches=<string> | fields=<string> | resolutions=<string> | use_time=<bool> | sla_info=<bool> | has_slas=<bool> | has_sla_violations=<bool> | has_sla_violation_within=<int>  | status_types=<string>
description = The ameevents command allows to filter events by various criteria. \
    tenants - comma separated list of tenants to filter by. \
    priorities - comma separated list of priorities to filter by. \
    status - comma separated list of statuses to filter by (supports both keys and names - special values 'all_open' and 'all_done'). \
    resolutions - comma separated list of resolutions to filter by. \
    assignees - comma separated list of assignees to filter by (special value 'all' for all users). \
    tags - comma separated list of tags to filter by. \
    tag_mode - AND or OR. Defaults to OR. \
    saved_searches - stringified JSON array of saved searches to filter by. \
    fields - comma separated list of fields to add to the event. Defaults to all fields. \
    use_time - boolean value to indicate whether to use the event's _time field to filter events. Defaults to false. \
    Filtering fields that allow for comma separated values can also be set to '*' to match all values. \
    Setting a field to '*' has the same effect as not setting it at all. \
    sla_info - boolean value to indicate whether to include SLA information in the results. Defaults to false. \
    has_slas - boolean value to indicate whether to include events that have SLAs. Defaults to None. \
    has_sla_violations - boolean value to indicate whether to include events that have SLA violations. Defaults to None. \
    has_sla_violation_within - integer value to indicate the number of seconds remaning until an SLA is violated. Defaults to None. \
    status_types - comma separated list of status types to filter by.

[amelookupreferences-command]
syntax = amelookupreferences <amelookupreferences-options>
shortdesc = Lookup referencing objects for an object in Alert Manager Enterprise.
description = Lookup referencing objects for an object in Alert Manager Enterprise.
usage = public
example1 = | amelookupreferences key="0abcdcafe7" type="template"
comment1 = Lookup referencing objects for a template with key 0abcdcafe7
example2 = | amelookupreferences object_name="my_template" tenant_uid="default" type="template"
comment2 = Lookup referencing objects for a template with name my_template in tenant default
tags = ame lookup

[amelookupreferences-options]
syntax = key=<string> | object_name=<string> | tenant_uid=<string> | type=<string>
description = The amelookupreferences command allows to lookup referencing objects for an object in Alert Manager Enterprise. \
    key - key of the object to lookup. \
    object_name - name of the object to lookup. \
    tenant_uid - UID of the tenant to lookup in. \
    type - type of the object to lookup, one of "tenant", "template", "notification", "notification_target", "notification_template", "status_option", "resolution", "rule"

[ameobsgroupinfo-command]
syntax = ameobsgroupinfo <ameobsgroupinfo-options>
shortdesc = Get information about an observable group in Alert Manager Enterprise.
description = Get information about an observable group in Alert Manager Enterprise.
usage = public
example1 = | inputlookup ame_default_observable_assets | ameobsgroupinfo key_field="observable_group" tenant_uids="default"
comment1 = Get information about an observable group for assets in tenant default in Alert Manager Enterprise.
example2 = | inputlookup ame_default_observable_assets | ameobsgroupinfo key_field="observable.observable_group" tenant_uids="default, soc"
comment2 = Get information about an observable group for assets in tenant default in Alert Manager Enterprise.

[ameobsgroupinfo-options]
syntax = key_field=<string> | tenant_uids=<string>
description = This returns information about the observable group in Alert Manager Enterprise. \
    key_field - field to use as the key for the observable group. Defaults to observable_group \
    tenant_uids - comma separated list of tenant UIDs to lookup in. If not set, will use the default tenant.

[amevulnintrealizations-command]
syntax = amevulnintrealizations <amevulnintrealizations-options>
shortdesc = Load realizations for CVEs from Alert Manager Enterprise.
description = Load realizations for CVEs from Alert Manager Enterprise. The first 10000 realizations are returned if no filters are provided.
usage = public
example1 = | amevulnintrealizations tenant_uid="default"
comment1 = Get open realizations in the default tenant
example2 = | amevulnintrealizations cve_filters="cve='CVE-2025-43963'" tenant_uid="default" state=all
comment2 = Get all realizations for CVE-2025-43963 in the default tenant
example3 = | amevulnintrealizations cve_filters="description='*Microsoft*'" tenant_uid="default" state=open
comment3 = Get open realizations for CVEs with description containing Microsoft in the default tenant
example4 = | amevulnintrealizations observable_filters="ip='192.168.1.*'" cve_filters="cvss_score>8" tenant_uid="default" state=open
comment4 = Get open realizations for observables with IPs starting with 192.168.1 in the default tenant and CVEs with CVSS score greater than 8
example5 = | amevulnintrealizations observable_group_filters="type='*web*'" cve_filters="cvss_score>8" tenant_uid="default" state=open
comment5 = Get open realizations for observables in an observable group having the additional field type with value web in the default tenant and CVEs with CVSS score greater than 8

[amevulnintrealizations-options]
syntax = cves=<string> | tenant_uid=<string> | realization_filters=<string> | observable_filters=<string> | observable_group_filters=<string> | cve_filters=<string> | state=<string> | time_field=<string>
description = This returns information about the observable group in Alert Manager Enterprise. \
    tenant_uid - tenant UIDs to lookup in. \
    realization_filters - comma separated list of realization filters to apply. Supports wildcard matches using *. Ensure that string values are quoted. \
    observable_filters - comma separated list of observable filters to apply. Supports wildcard matches using *. Ensure that string values are quoted. \
    observable_group_filters - comma separated list of observable group filters to apply. Supports wildcard matches using *. Ensure that string values are quoted. \
    cve_filters - comma separated list of CVE filters to apply. Supports wildcard matches using *. Ensure that string values are quoted. \
    state - enum value to indicate the state of the realization to return. Defaults to open realizations. Valid values are: \
        - all: all realizations, including fixed ones \
        - fixed: only realizations that have been fixed \
        - open: only realizations that have not been fixed \
    time_field - field to use as the time for the realization. Defaults to last_seen. Valid values are last_seen, fixed_at and first_seen.

[amevulnintstagedrealizations-command]
syntax = amevulnintstagedrealizations <amevulnintstagedrealizations-options>
shortdesc = Load realizations for CVEs from Alert Manager Enterprise.
description = Load realizations for CVEs from Alert Manager Enterprise. This command is similar to amevulnintrealizations, but it returns realizations that are staged for a CVE, which means they are not yet applied to an observable. This is useful for getting a list of realizations that are planned to be applied in the future.
usage = public
example1 = | amevulnintstagedrealizations cves="CVE-2025-43963,CVE-2025-2069" tenant_uid="default"
comment1 = Get all realizations for two CVEs in the default tenant
example2 = | amevulnintstagedrealizations cves="CVE-2025-43963,CVE-2025-2069" tenant_uid="default" enrich_cve=True
comment2 = Get all realizations for two CVEs in the default tenant and enrich the observable with data from Alert Manager Enterprise
example3 = | amevulnintstagedrealizations cves="CVE-2025-43963,CVE-2025-2069" tenant_uid="default" include_fixed=True
comment3 = Get all realizations for two CVEs in the default tenant including fixed realizations
example4 = | amevulnintstagedrealizations cves="CVE-2025-43963,CVE-2025-2069" tenant_uid="default" time_field=fixed_at include_fixed=True
comment4 = Get all realizations for two CVEs in the default tenant fixed during the search

[amevulnintstagedrealizations-options]
syntax = cves=<string> | tenant_uid=<string> | enrich_cve=<bool> | include_fixed=<bool> | time_field=<string>
description = This returns information about the observable group in Alert Manager Enterprise. \
    cves - comma separated list of CVEs to lookup. \
    tenant_uid - ctenant UIDs to lookup in. \
    enrich_cve = boolean value to indicate whether to enrich with CVE data from Alert Manager Enterprise. Defaults to false. \
    include_fixed - boolean value to indicate whether to include fixed realizations. Defaults to false. \
    time_field - field to use as the time for the realization. Defaults to last_seen. Valid values are last_seen, fixed_at and first_seen.
