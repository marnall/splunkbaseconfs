[create_alert]
python.version = python3
is_custom = 1
label = Create AME Event
description = Creates an alert and stores it in the corresponding event collection
icon_path = appIcon.png
payload_format = json
hostname = none

[observables_ingest]
python.version = python3
is_custom = 1
label = Ingest Observables
description = Ingests observables into AME. Matches onto existing observables where applicable, and overrides custom fields by confidence
icon_path = appIcon.png
payload_format = json
hostname = none
maxtime = 12h
ttl = 1p

[observable_group_ingest]
python.version = python3
is_custom = 1
label = Ingest Observable Groups
description = Ingests observable groups into AME. Overwrites existing groups with the same name and type, creates new groups otherwise.
icon_path = appIcon.png
payload_format = json
hostname = none
maxtime = 1h

[vuln_int_realization_ingest]
python.version = python3
is_custom = 1
label = Ingest Vulnerability Realizations
description = Ingests results from a vulnerability scanner into AME. Match onto observables and previously fetched CVE data
icon_path = appIcon.png
payload_format = json
hostname = none
maxtime = 12h
ttl = 1p

[create_notification]
python.version = python3
