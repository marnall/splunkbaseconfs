# NOTE: following macros are referenced the create_alert alert html
[template_options]
definition = rest splunk_server=local mode=search /services/ame_templates \
| rename _key to key \
| eval name = tenant_uid." - ".name \
| fields key, name

[notification_scheme_options]
definition = rest splunk_server=local mode=search /services/ame_notifications \
| rename _key to key \
| eval name = tenant_uid." - ".name \
| fields key, name

[tenant_uid_options]
definition = rest splunk_server=local mode=search /services/ame_tenants \
| rename _key to key \
| eval display_name = name." (".tenant_uid.")" \
| fields tenant_uid, display_name

[observable_type_options]
definition = rest splunk_server=local mode=search /services/ame_statics/enum/observabletype

# NOTE: following macros are used by the collection service
[priority]
definition = inputlookup priority

[priority_matrix]
definition = inputlookup priority_matrix

# NOTE: following macros are used in the tag service
[tags]
definition = inputlookup tags_lockheed_cyber-kill-chain \
| inputlookup append=true tags_unified_cyber-kill-chain \
| inputlookup append=true tags_mitre_techniques \
| inputlookup append=true tags_mitre_tactics \
| inputlookup append=true tags_nist_csf \
| inputlookup append=true tags_cis8 \
| inputlookup append=true tags_cis7 \
| inputlookup append=true tags_cve \
| dedup tag
