[id]
name = alert_manager_enterprise
version = 3.8.1

[ui]
is_visible = 1
label = Alert Manager Enterprise
supported_themes = light, dark

[launcher]
author = Datapunctum AG
description = Application to manage alerts and notifications within splunk
version = 3.8.1

[package]
id = alert_manager_enterprise
check_for_updates = 1
show_upgrade_notification = 1

[install]
build = 3810
state_change_requires_restart = true
python.version = python3

[triggers]
reload.splunk_create = simple
reload.datapunctum_licenses = simple
reload.datapunctum_settings = simple
reload.datapunctum_logging = simple
