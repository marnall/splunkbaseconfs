[priority]
filename = priority_default.csv

[priority_matrix]
filename = priority_matrix_default.csv

# shared lookups for all tenants based on KV-Store
[ame_vuln_int_cves]
external_type = kvstore
collection = ame_vuln_int_cves
fields_list = _key, cve, title, cna, description, published, updated, cvss_version, cvss_score, cvss_severity, cvss_vector, cvss_source, cvss, exploitable, has_exploit_tag, epss, cwe, capec, vendor, products, defender_public_exploit, defender_exploit_verified, defender_exploit_in_kit

# tenant specific lookups for KV-Store
[ame_default_observable_assets]
external_type = kvstore
collection = ame_default_observable_assets
fields_list = _key, tenant_uid, type, uid, first_seen, last_seen, observable_group, criticality, criticality_parsed, risk, data_info

[ame_default_observable_identities]
external_type = kvstore
collection = ame_default_observable_identities
fields_list = _key, tenant_uid, type, uid, first_seen, last_seen, observable_group, criticality, criticality_parsed, risk, data_info

[ame_default_risk_events]
external_type = kvstore
collection = ame_default_risk_events
fields_list = _key, tenant_uid, observable_id, observable_type, matched_alert_field, matched_observable_field, matched_value, related_event, related_search, comment, risk_change, status, occurrence, fixed

# Unified tag lookups
[tags_cve]
external_type = kvstore
collection = ame_tags_cve
fields_list = _key, tag, name, description, url, framework

