#DBX 3 Stanza
[mi_input://ip360_scan_status_dbx3]
timestamp_column_index = 1
rising_column_index = 4
checkpoint = {"value":"0","columnType":8}
queryTimeout = 100000
connection = DATABASE_NAME_DBX3
index = ip360
input_timestamp_column_name = start_date
interval = 1800
max_rows = 40000
mode = rising
output_timestamp_format = yyyy-MM-dd HH:mm:ss
query = select start_date, audit_id, end_date, FLOOR(EXTRACT(EPOCH FROM end_date)) as end_date_epoch, end_date - start_date as duration, s.status\
\
, n.network_id\
, n.name\
, (SELECT string_agg(range, ', ') from nc_network_range where network_id = a.network_id) as networkinc\
 , (SELECT string_agg(exclude::text, ', ') from nc_network_range where network_id = a.network_id) as networkexc\
 , '?' as networktotal\
 , '?' as networkgroups\
 , n.active as networkactive\
  , sp.name as scan_profile_name\
  , a.pool_id\
  , 'no permissions' as dpname\
  , 'no permissions' as dphw\
  , 'no permissions' as dpip\
\
  from nc_audit a\
  inner join nc_network n on n.network_id = a.network_id\
  inner join nc_audit_status s on s.status_id = a.status_id\
\
  left join nc_scan_profile sp on sp.scan_profile_id = a.scan_profile_id\
  where end_date IS NOT NULL AND start_date > cast('REPLACED_TIMESTAMP_DBX3' as timestamp) AND FLOOR(EXTRACT(EPOCH FROM end_date)) > ? ORDER BY end_date_epoch ASC

source = ip360_scan_status_dbx3
sourcetype = ip360_scan_status
tail_follow_only = 1
tail_rising_column_number = 4
ui_query_catalog = ice
ui_query_mode = advanced
ui_query_schema = public

#DBX3 formatted saved search (dbxquery)
[ip360_scan_status_dbx3]
realtime_schedule = 0
cron_schedule = 0 * * * *
alert.digest_mode = True
search = | dbxquery connection=DATABASE_NAME_DBX3 query="select%20start_date%2C%20audit_id%2C%20end_date%2C%20end_date%20-%20start_date%20as%20duration%2C%20s.status%2C%20n.network_id%2C%20n.name%2C%20(SELECT%20string_agg(range%2C%20%27%2C%20%27)%20from%20nc_network_range%20where%20network_id%20%3D%20a.network_id)%20as%20networkinc%2C%20(SELECT%20string_agg(exclude%3A%3Atext%2C%20%27%2C%20%27)%20from%20nc_network_range%20where%20network_id%20%3D%20a.network_id)%20as%20networkexc%2C%20%27%3F%27%20as%20networktotal%2C%20%27%3F%27%20as%20networkgroups%2C%20n.active%20as%20networkactive%2C%20sp.name%20as%20scan_profile_name%2C%20a.pool_id%2C%20%27no%20permissions%27%20as%20dpname%2C%20%27no%20permissions%27%20as%20dphw%2C%20%27no%20permissions%27%20as%20dpip%20from%20nc_audit%20a%20inner%20join%20nc_network%20n%20on%20n.network_id%20%3D%20a.network_id%20inner%20join%20nc_audit_status%20s%20on%20s.status_id%20%3D%20a.status_id%20left%20join%20nc_scan_profile%20sp%20on%20sp.scan_profile_id%20%3D%20a.scan_profile_id%20where%20(end_date%20IS%20NULL)%20AND%20(start_date%20%3E%20cast(%27REPLACED_TIMESTAMP_DBX3%27%20as%20timestamp))%20and%20(status!%3D%27In%20Progress%27)" | eval _time=start_date | search NOT [search index=ip360 source=*ip360_scan_status NOT end_date=* | stats count by audit_id | table audit_id]
action.summary_index = 1
action.summary_index._name = ip360
alert.track = 0
alert.suppress = 0
enableSched = 1
auto_summarize.dispatch.earliest_time = -1d@h
