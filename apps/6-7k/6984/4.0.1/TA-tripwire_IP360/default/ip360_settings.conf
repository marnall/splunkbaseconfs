#Severity Buckets Stanza
[ip360_distinct_audit]
EVAL-severity = case(host_score<=INFO_REPLACE,"informational",host_score>INFO_REPLACE AND host_score<=LOW_REPLACE,"low",host_score>LOW_REPLACE AND host_score<=MEDIUM_REPLACE,"medium",host_score>MEDIUM_REPLACE AND host_score<=HIGH_REPLACE,"high",host_score>HIGH_REPLACE,"critical",1=1,"unknown")

#########################################
#DBX1
#########################################

#DBX 1 Stanza
[dbmon-tail://DATABASE_NAME/ip360_distinct_audit]
index = ip360
query = WITH os_groups AS (\
  WITH RECURSIVE os_walk AS (\
    SELECT o1.os_id, o1.name, o1.parent, g1.os_group_id\
    FROM nc_os o1\
    LEFT JOIN nc_os_group_os g1 ON o1.os_id=g1.os_id\
    UNION\
    SELECT w.os_id, w.name, o2.parent, g2.os_group_id\
    FROM nc_os o2\
    LEFT JOIN nc_os_group_os g2 ON o2.os_id=g2.os_id\
    INNER JOIN os_walk w ON w.parent = o2.os_id\
  )\
  select os_id, max(name) as name, max(parent) as parent, max(os_group_id) as os_group_id\
  from os_walk\
  where os_group_id is not null\
  group by os_id\
) \
SELECT vrh.vuln_result_id, vrh.scan_time, vrh.host_id, h.netbios_name, ph.dns_name, n.name as host_network, COALESCE(h.ip_address,ph.ip_address)::text as ip_address\
, vrh.vuln_id, vrh.audit_id , h.os_id, os.name as os_name, COALESCE(og.name, 'not_set') as os_group , v.name, date , nc_vuln_score(vrh.vuln_id) as score, r.name as risk , s.name as skill\
, st.name as strategy , 'mitigation is parsed from description' as mitigation\
, (select string_agg(name,',') from nc_vuln_category vc inner join nc_vuln_category_set cs ON cs.vuln_category_set_id = vc.vuln_category_set_id where vc.vuln_id = v.vuln_id) as categories\
, COALESCE(a.name,ap.name) as applications\
, (select string_agg(name, ',')  from nc_vuln_cve vc  inner join nc_cve c on c.cve_id = vc.cve_id  where vc.vuln_id = v.vuln_id) as cves\
, (select MAX(advisory_id::decimal)  from nc_vuln_advisory a inner join nc_advisory_publisher ap ON ap.advisory_publisher_id = a.advisory_publisher_id where vuln_id = v.vuln_id and ap.name = 'CVSS Base Score') as cvss_base_score\
, h.host_score\
,COALESCE((SELECT STRING_AGG(z.name, ',') as network_group FROM nc_network JOIN nc_zone_network zn USING (network_id) JOIN nc_zone z USING (zone_id) WHERE nc_network.network_id = n.network_id), 'not_set') as network_group \
from nc_vuln_result_head vrh \
inner join nc_host h on h.host_id = vrh.host_id \
inner join nc_host_persistent_host hph on hph.host_id = vrh.host_id\
inner join nc_persistent_host ph on ph.persistent_host_id = hph.persistent_host_id \
inner join nc_network n on n.network_id = h.network_id\
INNER JOIN nc_vuln v ON vrh.vuln_id = v.vuln_id \
INNER JOIN nc_risk r ON r.risk_id = v.risk_id \
INNER JOIN nc_skill s ON s.skill_id = v.skill_id \
INNER JOIN nc_strategy st ON st.strategy_id = v.strategy_id \
INNER JOIN nc_os as os ON os.os_id = h.os_id \
LEFT JOIN os_groups ON os_groups.os_id = h.os_id\
LEFT JOIN nc_os_group og ON og.os_group_id = os_groups.os_group_id\
LEFT JOIN nc_application a on a.application_id = vrh.application_id\
LEFT JOIN nc_application_protocol ap on ap.application_id = vrh.application_id\
WHERE scan_time > cast('REPLACED_TIMESTAMP' as timestamp) {{AND $rising_column$ > ?}} \

tail.rising.column = vuln_result_id
output.timestamp = 1
interval = auto
disabled = 1
sourcetype = ip360_distinct_audit
output.format = kv
output.timestamp.column = scan_time
table = ip360_distinct_audit

