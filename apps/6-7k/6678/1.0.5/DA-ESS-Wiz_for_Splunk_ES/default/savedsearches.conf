
[Audit - Audit Logs - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Audit Logs
action.notable = 1
action.notable.param.rule_title = Audit Logs
action.notable.param.security_domain = audit
action.notable.param.severity = low
action.risk.param._risk = [{"risk_object_field":"","risk_object_type":"","risk_score":1}]
action.risk.param._risk_score = 0
alert.suppress = False
alert.track = True
relation = greater than
quantity = 0
counttype = number of events
cron_schedule = */5 * * * *
description = User Audit Logs
dispatch.earliest_time = -5m
dispatch.latest_time = now
dispatch.rt_backfill = True
enableSched = True
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = sourcetype="wiz:userAuditLogs" | eval src= source\
|  rename serviceAccount.id as "Client ID", serviceAccount.name as "Client", timestamp as "Log Time", action as "Action", status as "Status", actionParameters.userpoolID as "Pool ID" | table "Client ID", "Client", "Log Time", "Action", "Status", "Pool ID", "src"

[Threat - Issues - Critical - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Issues - Critical
action.notable = 1
action.notable.param.rule_title = Critical Issue
action.notable.param.security_domain = threat
action.notable.param.severity = critical
action.risk = 1
action.risk.param._risk = [{"risk_object_field":"src","risk_object_type":"system","risk_score":5},{"threat_object_field":"id","threat_object_type":"issue_critical"}]
action.risk.param._risk_message = Issues Critical Risk
action.risk.param._risk_score = 0
alert.suppress = False
alert.track = True
relation = greater than
quantity = 0
counttype = number of events
cron_schedule = */5 * * * *
description = Critical Issues fetched in the Wiz Addon for Splunk App
dispatch.earliest_time = -5m
dispatch.latest_time = now
dispatch.rt_backfill = True
enableSched = True
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
search = sourcetype="wiz:issues" (severity IN ("CRITICAL","Critical"))| eval src= source | fields + control.id, control.name, entitySnapshot.cloudPlatform, entitySnapshot.type, createdAt, severity, status, src | eval control.id=if(len('control.id')>19,substr('control.id',1,20)+"...",'control.id'), control.name=substr('control.name',1,20)+"...", createdAt=substr(createdAt,1,20)+".." | rename control.id as "Control ID", control.name as "Control Name", entitySnapshot.cloudPlatform as "Entity Cloud Platform", entitySnapshot.type as "Entity Type", createdAt as "Issue Created At", severity as "Issue Severity", status as "Issue Status" | table "Control ID", "Control Name", "Entity Cloud Platform", "Entity Type", "Issue Created At", "Issue Severity", "Issue Status",  "src"

