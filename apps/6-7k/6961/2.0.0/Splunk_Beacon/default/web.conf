[expose:splunk_beacon_api_token]
pattern = splunk_beacon_api_token
methods = POST, GET

[expose:splunk_beacon_api_token_specified]
pattern = splunk_beacon_api_token/*
methods = POST, GET, DELETE

[expose:splunk_beacon_beacon_input]
pattern = splunk_beacon_beacon_input
methods = POST, GET

[expose:splunk_beacon_beacon_input_specified]
pattern = splunk_beacon_beacon_input/*
methods = POST, GET, DELETE

[expose:splunk_beacon_settings]
pattern = splunk_beacon_settings
methods = POST, GET

[expose:splunk_beacon_settings_specified]
pattern = splunk_beacon_settings/*
methods = POST, GET, DELETE
