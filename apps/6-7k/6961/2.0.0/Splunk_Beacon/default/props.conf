[beacon:alert]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Guard Detect Add-on for Splunk
description = Output produced by Guard Detect Add-on for Splunk
pulldown_type = 1


[source::...splunk_beacon_input.log]
sourcetype = beacon:log
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2},
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 30
TIME_FORMAT = %Y-%m-%d %H:%M:%S,%3N
TRUNCATE = 99999

[beacon:log]
EXTRACT-fields1 = (?i)^(?:[^ ]* ){2}(?:[+\-]\d+ )?(?P<log_level>[^ ]*)\s+