[btool_search]
display_location = event_menu
fields = host, source, sourcetype
label = BTool Props Layer (Search Time)
type = search
search.search_string = | btool props layer --app --user --host="$host$" --sourcetype="$sourcetype$" --source="$source$"
search.preserve_timerange = true
search.target = blank

[btool_global]
display_location = event_menu
fields = host, source, sourcetype
label = BTool Props Layer (Index Time)
type = search
search.search_string = | btool props layer --host="$host$" --sourcetype="$sourcetype$" --source="$source$"
search.preserve_timerange = true
search.target = blank
