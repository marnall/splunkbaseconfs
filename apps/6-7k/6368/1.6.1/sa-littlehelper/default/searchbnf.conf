[btool-command]
syntax = btool <conf-file> list (--debug |--app(=<app-context>)?|--allapps |--user(=<user-context>)? |--kvpairs(=values|stanzas|both)? |--local |<splunk-server-opt> |<splunk-server-group-opt> |<stanza-prefix> )*
description = Runs btool X list --debug for any conf file across the current search head and all indexers. Supports specifying --app and --user contexts for app or user/app resolution instead of global resolution order App and user contexts can either be explicitly specified after an equals sign or implicitly picked up without specifying a value based on the context in which the search is running. Specifying App/User context implies looking into the distributed knowledge bundle on remote servers, unless the --local option is given. --allapps reruns the same btool for every app context for every app (found via paths) instead of individual apps. By default generates one event per stanza, but you can use the --kvpairs option to generate one event per key value pair within a stanza instead. Use the splunk_server option to limit where it runs e.g. if only interested in indexer side or search head side. --debug as an option is optional... it is always running btool --debug
shortdesc = Runs btool list across your search head and indexers.
usage = public
tags = btool

[bundlefiles-command]
syntax = bundlefiles (target=(captain|local|all) |bundle=(latest|computed|computed_exclusions) |distribute=(local|remote|all) (<splunk-server-opt> |<splunk-server-group-opt> )* )*
description = Gets search (knowledge) bundle information from your search head. Defaults to pulling info from the current Search Head Cluster captain, or local instance if not in an SHC. Target be changed to always get information from the local server, OR a listing from all members of the Search Head Cluster. By default the command does not distribute to peered search heads, but the distribute parameter can enable distributed search to get data back from remote search heads (Think monitoring console). By default returns information from the latest generated bundle, but you can instead produce an estimation of what would be in the bundle (for troubleshooting when bundles are too large and not generating), or you can have a computed_exclusion bundle which is the same estimation of what would be in the bundle, but also listing files that are omitted from the bundle (due to denylist, or other configurations) and lists those reasons.
shortdesc = Gets information about the search bundles
usage = public
tags = bundle
