[capability::run_btool_global]
[capability::run_bundlefiles]

[role_admin]
run_btool_global = enabled
run_bundlefiles = enabled

[role_sc_admin]
run_btool_global = enabled
run_bundlefiles = enabled

[role_alh_btool]
run_btool_global = enabled

### Reversing the [default] stanza so this role gives no other abilities
edit_own_objects = disabled
list_all_objects = disabled
run_collect = disabled
run_mcollect = disabled
schedule_rtsearch = disabled
# Unfortunately with cumulative quota on, 0 = infinite quota, so need to give a cheeky 1.
# Not many have cumulative quotas on.
cumulativeRTSrchJobsQuota = 1
cumulativeSrchJobsQuota = 1
# These, used to be zero, but there was a change with Splunk Cloud 9.3.2411+ / Splunk Enterprise 10.0+
# If a user has a 0 in any role then they have infinite quota.
rtSrchJobsQuota = 1
srchDiskQuota = 1
srchJobsQuota = 1
srchMaxTime = 1

[role_alh_bundlefiles]
run_bundlefiles = enabled

### Reversing the [default] stanza so this role gives no other abilities
edit_own_objects = disabled
list_all_objects = disabled
run_collect = disabled
run_mcollect = disabled
schedule_rtsearch = disabled
# Unfortunately with cumulative quota on, 0 = infinite quota, so need to give a cheeky 1.
# Not many have cumulative quotas on.
cumulativeRTSrchJobsQuota = 1
cumulativeSrchJobsQuota = 1
# These, used to be zero, but there was a change with Splunk Cloud 9.3.2411+ / Splunk Enterprise 10.0+
# If a user has a 0 in any role then they have infinite quota.
rtSrchJobsQuota = 1
srchDiskQuota = 1
srchJobsQuota = 1
srchMaxTime = 1
