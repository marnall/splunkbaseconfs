# Search time field extractions for Airport Events.
[appleairport]
EXTRACT-event_description = ^(?:[^ \n]* ){3}(?P<event_description>.+)
EXTRACT-device_mac_address = ((?<device_mac_address>([a-fA-F0-9]{2}[\:\-][a-fA-F0-9]{2}[\:\-][a-fA-F0-9]{2}[\:\-][a-fA-F0-9]{2}[\:\-][a-fA-F0-9]{2}[\:\-][a-fA-F0-9]{2})))
EXTRACT-operation = ((?<operation>((?i)(Associated|Disassociated|Deauthenticating|failed))))
