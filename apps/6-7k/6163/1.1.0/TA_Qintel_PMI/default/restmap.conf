[admin:qintel_pmi]
match = /qintel_pmi
members = qintel_clean_pmi_cache

[script:qintel_clean_pmi_cache]
match = /qintel_pmi/clean_cache
scripttype  = persist
script = clean_cache.py
handler = clean_cache.Clean
python.version = python3
requireAuthentication = true
output_modes          = json

[admin:qintel_pmi_config]
match = /
members = qintel_pmi_settings

[admin_external:qintel_pmi_settings]
handlertype = python
handlerfile = qintel_pmi_rh_settings.py
handleractions = edit, list
python.version = python3
