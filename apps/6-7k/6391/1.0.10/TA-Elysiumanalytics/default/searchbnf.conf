[elysiumquery-command]
syntax = elysiumquery  statement="<SQL_query>" timeout=<timeout_in_seconds> timecolumn=<columnname_to_refer_timestamp> timefilter=<true/False>| table *
description = This command helps users to query their data present in the snowflake table from Splunk.
shortdesc = Query snowflake table from Splunk.
example1 = | elysiumquery statement="select * from daily_14_total limit 10"  timecolumn="event_time" timefilter="True/False" | table *
comment1 = Retrieve the data from people table.
usage = public
appears-in = 1.0.0
catagory = generating
maintainer = Snowflake, Inc.

[database]
syntax = <string>
description = Database to be used to execute query.

[schema]
syntax = <string>
description = Schema to be used to execute query.

[warehouse]
syntax = <string>
description = Warehouse to be used to execute query.

[role]
syntax = <string>
description = Role to be used to execute query.

[SQL_query]
syntax = <string>
description = SQL query to be executed.

[timeColumn]
syntax = <string>
description = to refer the timestamp column to extract the data between dateranges.

[timefilter]
syntax = <boolean>
description = It should be true or false, which tells us whether to include timestamp or not

