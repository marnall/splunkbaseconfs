[elasticquery-command]
syntax = elasticquery instance="<string>" search_name="<string>" timestamp_used="<bool>" timestamp_field="<string>" timestamp_format="<string>" replacements="<string>" scroll_size="<int>"
shortdesc = Custom Search Command for Time-Series data stored in Elastic Search. The DSL query referenced by "search_name" is executed against the Elastic Search instance referenced by "instance". This command generates Splunk events.
category = generating
usage = public
tags = SA-DP-elasticspl

[elasticadhoc-command]
syntax = elasticadhoc instance="<string>" query="<string>" timestamp_used="<bool>" timestamp_field="<string>" timestamp_format="<string>" replacements="<string>" mode="ts|lucene" scroll_size="<int>"
shortdesc = Custom Search Command for Time-Series data stored in Elastic Search. The DSL query given in the "query" parameter is executed against the Elastic Search instance referenced by "instance". This command generates Splunk events.
category = generating
usage = public
tags = SA-DP-elasticspl

[elasticquerystats-command]
syntax = elasticquerystats instance="<string>" search_name="<string>" timestamp_used="<bool>" timestamp_field="<string>" timestamp_format="<string>" replacements="<string>"
shortdesc = Custom Search Command for non Time-Series data stored in Elastic Search. The DSL query referenced by "search_name" is executed against the Elastic Search instance referenced by "instance". This command generates Splunk results. Even though the returned data is not time-series it is possible to provide time based filtering of the data.
category = generating
usage = public
tags = SA-DP-elasticspl

[elasticadhocstats-command]
syntax = elasticadhocstats instance="<string>" query="<string>" timestamp_used="<bool>" timestamp_field="<string>" timestamp_format="<string>" replacements="<string>" mode="stats|esql"
shortdesc = Custom Search Command for non Time-Series data stored in Elastic Search. The DSL query given in the "query" parameter is executed against the Elastic Search instance referenced by "instance". This command generates Splunk results. Even though the returned data is not time-series it is possible to provide time based filtering of the data.
category = generating
usage = public
tags = SA-DP-elasticspl

[elasticparse-command]
syntax = elasticparse query="<string>" timestamp_used="<bool>" timestamp_field="<string>" timestamp_format="<string>" replacements="<string>"
shortdesc = Get DSL from query and user given replacements
category = generating
usage = public
tags = SA-DP-elasticspl
