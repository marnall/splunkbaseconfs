[role_elastic_user]
importRoles = user
list_storage_passwords = enabled

[role_elastic_adhoc]
importRoles = elastic_user

[role_elastic_power]
importRoles = elastic_user

[role_elastic_admin]
importRoles = elastic_user;elastic_power;elastic_adhoc

# Deprecated roles for backward compatibility - will be removed in a future release
[role_elastic_query_list]
importRoles = elastic_user

[role_elastic_query_run]
importRoles = elastic_user;elastic_query_list
list_storage_passwords = enabled

[role_elastic_query_edit]
importRoles = elastic_user;elastic_query_list