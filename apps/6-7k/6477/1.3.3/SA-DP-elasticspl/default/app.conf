[ui]
is_visible = 1
label = ElasticSPL
supported_themes = enterprise

[id]
version = 1.3.3

[launcher]
author = Datapunctum AG
description = Splunk Supporting Add-On for Elasticsearch
version = 1.3.3

[package]
id = SA-DP-elasticspl
check_for_updates = 1
show_upgrade_notification = 1

[install]
build = 133
state_change_requires_restart = 1

[triggers]
reload.splunk_create = simple
# Required for AppInspect - says its a custom configuration file even though it's not
reload.migration = simple
reload.elastic_instance = simple
reload.elastic_query = simple
reload.elasticspl_settings = simple
reload.elasticspl_licenses = simple
reload.elasticspl_logging = simple
