[elastic_json]
KV_MODE = json

[source::...datapunctum*.log]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)\d{4}-\d{2}-\d{2}T
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%f%:z
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 29

[source::...datapunctum_elasticspl_service.log]
sourcetype = elasticspl:service

[source::...datapunctum_elasticspl_handler.log]
sourcetype = elasticspl:handler

[source::...datapunctum_elasticspl_command.log]
sourcetype = elasticspl:command

[source::...datapunctum_elasticspl_modinput.log]
sourcetype = elasticspl:modinput

[source::...datapunctum_elasticspl_modalert.log]
sourcetype = elasticspl:modalert

[source::...datapunctum_elasticspl_datatype.log]
sourcetype = elasticspl:datatype

[source::...datapunctum_elasticspl_task_update.log]
sourcetype = elasticspl:task

[source::...datapunctum_elasticspl_task_setup.log]
sourcetype = elasticspl:task:setup

[source::...datapunctum_elasticspl_task_migration.log]
sourcetype = elasticspl:task:migration

[source::...datapunctum_elasticspl_dataset_service.log]
sourcetype = elasticspl:dataset_service

[source::...datapunctum_elasticspl_helper.log]
sourcetype = elasticspl:helper

[source::...datapunctum_elasticspl_factory.log]
sourcetype = elasticspl:factory