[island-audits]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-src_nt_host = machine_name AS src_nt_host
FIELDALIAS-url = top_level_url AS url
FIELDALIAS-event_id = client_event_id AS event_id
FIELDALIAS-time = timestamp AS time
FIELDALIAS-url_domain = short_top_level_url AS url_domain
FIELDALIAS-category = url_web_categories AS category
FIELDALIAS-rule = rule_name AS rule
FIELDALIAS-rule_action = verdict AS rule_action
FIELDALIAS-reason = verdict_reason AS reason
FIELDALIAS-app = saas_application_name AS app
FIELDALIAS-src_ip = public_ip AS src_ip
FIELDALIAS-ip = source_ip AS ip
FIELDALIAS-src_country = country AS src_country
FIELDALIAS-user_group = matched_user_group AS user_group
FIELDALIAS-file_hash = details.file_info_details.md5_hash AS file_hash
FIELDALIAS-file_name = details.file_info_details.name AS file_name
FIELDALIAS-file_size = details.file_info_details.size_in_bytes AS file_size

[source::...ta-island-add-on-for-splunk*.log*]
sourcetype = taislandaddonforsplunk:log

