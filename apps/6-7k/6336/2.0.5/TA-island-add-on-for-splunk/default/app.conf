# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = false
state = enabled
build = 4

[launcher]
author = Island
version = 2.0.5
description = The Island Add-on for Splunk allows events from the Island Management Console to be automatically shared with the Splunk platform for real-time analysis of alerts. This add-on includes user and admin event collection capabilities that will help your security teams monitor and analyze the data and respond accordingly.

[ui]
is_visible = 1
label = Island Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-island-add-on-for-splunk

[triggers]
reload.addon_builder = simple
reload.ta_island_add_on_for_splunk_account = simple
reload.ta_island_add_on_for_splunk_settings = simple
reload.passwords = simple