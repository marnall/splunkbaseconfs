# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = Splunk
version = 1.0.7
description = Send a customized message to Splunk App for Incident Intelligence for a triggered alert action in Splunk. For Splunk ITSI > Incident Intelligence integration, in order to provide a seamless experience from ITSI to Incident Intelligence we need to integrate ITSI episodes with Incident Intelligence incidents. When notable event aggregation policies (NEAPs) trigger episodes in ITSI, users should be provided with an option to post these episodes as incidents in Incident Intelligence.

[ui]
is_visible = 1
label = Splunk App for Incident Intelligence
docs_section_override = AddOns:released

[package]
id = splunk_incident_intelligence_app

[triggers]
reload.addon_builder = simple
reload.incident_intelligence_account = simple
reload.incident_intelligence_settings = simple
reload.passwords = simple
