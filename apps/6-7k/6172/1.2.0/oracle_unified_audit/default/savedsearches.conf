[default]

[Access]
action.email.useNSSubject = 1
alert.track = 0
description = Access
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","DBUSERNAME","EVENT_TIMESTAMP","EVENT_TIMESTAMP_UTC","DB_NAME"]
display.events.type = table
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.statistics.wrap = 0
display.visualizations.show = 0
request.ui_dispatch_app = oracle_unified_audit
request.ui_dispatch_view = search
search = `mc_ora_unf_md`  | search SEO_ACC=1 \
| table _time, DB_NAME, DB_HOST, DBUSERNAME, AUDIT_TYPE, ACTION_NAME, USERHOST, OS_USERNAME, TERMINAL, CLIENT_PROGRAM_NAME, SESSIONID, RETURN_CODE \
| rename DB_NAME as Database, DB_HOST as "DB Host", DBUSERNAME as Username, AUDIT_TYPE as "Audit Type", ACTION_NAME as Action, USERHOST as "User Host", OS_USERNAME as "OS User", TERMINAL as Terminal, CLIENT_PROGRAM_NAME as "Program Name", SESSIONID as "Session Id", RETURN_CODE as ReturnCode

