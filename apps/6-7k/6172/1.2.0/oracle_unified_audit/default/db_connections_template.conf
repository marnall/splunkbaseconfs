## DB Connection template. Use content or rename to db_connections.conf
## Complete settings: database, host, identity and port according to your environment!

[Ora_Aud_Conn]
connection_type = oracle
database = oracle_db_name
disabled = 0
fetch_size = 10000
host = oracle_db_host_ip
identity = Ora_Aud_Identity
idleTimeout = 600000
jdbcUseSSL = false
localTimezoneConversionEnabled = false
maxConnLifetimeMillis = 1800000
maxTotalConn = 8
maxWaitMillis = 30000
minIdle = 1
port = 1521
readonly = true
timezone = UTC
useConnectionPool = true
