## DB Input template. Use content or rename to db_inputs.conf
## review columns below according to your Oracle database version as per SQL command comments!
##
## EVENT_TIMESTAMP_UTC is the event timestamp on UTC, "rising" column and timestamp for _time field
## Cast-ed value in Oracle 12c and 18c. Field available on 19c and above
## DB_NAME uniquely identifies the database in a multi-database environment supported by this app
## Default value retrieved by sys_context. Can be hardcoded as an user choice
## DB_UNIQUE_NAME uniquely identifies the database in the Oracle environment
## Default value retrieved by sys_context. Field available on 21c and above
## OBJECT_TYPE is available as native field on 21c and above
## DP_WARNINGS1 is available as native field on 21c and above

[Ora_Aud_Input]
batch_upload_size = 10000
connection = Ora_Aud_Conn
disabled = 0
fetch_size = 10000
index = ora_unf_aud
index_time_mode = dbColumn
input_timestamp_column_number = 1
input_type = event
interval = 60
max_rows = 0
mode = rising
query = SELECT * FROM (\
SELECT\
CAST((event_timestamp at TIME zone 'UTC') AS TIMESTAMP) as EVENT_TIMESTAMP_UTC, -- Oracle 12c - 18c \
-- EVENT_TIMESTAMP_UTC, -- Oracle 19c \
SYS_CONTEXT('USERENV', 'DB_NAME') as DB_NAME,\
-- 'ora_db_name', -- custom value for db_name \
SYS_CONTEXT('USERENV', 'DB_UNIQUE_NAME') as DB_UNIQUE_NAME, -- Oracle 12c - 19c \
-- DB_UNIQUE_NAME, -- Oracle 21c \
SYS_CONTEXT('USERENV', 'SERVER_HOST') as DB_HOST,\
AUDIT_TYPE,\
SESSIONID,\
PROXY_SESSIONID,\
OS_USERNAME,\
USERHOST,\
TERMINAL,\
INSTANCE_ID,\
DBID,\
AUTHENTICATION_TYPE,\
DBUSERNAME,\
DBPROXY_USERNAME,\
EXTERNAL_USERID,\
GLOBAL_USERID,\
CLIENT_PROGRAM_NAME,\
DBLINK_INFO,\
XS_USER_NAME,\
XS_SESSIONID,\
ENTRY_ID,\
STATEMENT_ID,\
EVENT_TIMESTAMP,\
ACTION_NAME,\
RETURN_CODE,\
OS_PROCESS,\
TRANSACTION_ID,\
SCN,\
EXECUTION_ID,\
OBJECT_SCHEMA,\
OBJECT_NAME,\
-- OBJECT_TYPE, -- Oracle 21c\
SQL_TEXT,\
SQL_BINDS,\
APPLICATION_CONTEXTS,\
CLIENT_IDENTIFIER,\
NEW_SCHEMA,\
NEW_NAME,\
OBJECT_EDITION,\
SYSTEM_PRIVILEGE_USED,\
SYSTEM_PRIVILEGE,\
AUDIT_OPTION,\
OBJECT_PRIVILEGES,\
ROLE,\
TARGET_USER,\
EXCLUDED_USER,\
EXCLUDED_SCHEMA,\
EXCLUDED_OBJECT,\
ADDITIONAL_INFO,\
UNIFIED_AUDIT_POLICIES,\
FGA_POLICY_NAME,\
CURRENT_USER,\
XS_INACTIVITY_TIMEOUT,\
XS_ENTITY_TYPE,\
XS_TARGET_PRINCIPAL_NAME,\
XS_PROXY_USER_NAME,\
XS_DATASEC_POLICY_NAME,\
XS_SCHEMA_NAME,\
XS_CALLBACK_EVENT_TYPE,\
XS_PACKAGE_NAME,\
XS_PROCEDURE_NAME,\
XS_ENABLED_ROLE,\
XS_COOKIE,\
XS_NS_NAME,\
XS_NS_ATTRIBUTE,\
XS_NS_ATTRIBUTE_OLD_VAL,\
XS_NS_ATTRIBUTE_NEW_VAL,\
DV_ACTION_CODE,\
DV_ACTION_NAME,\
DV_EXTENDED_ACTION_CODE,\
DV_GRANTEE,\
DV_RETURN_CODE,\
DV_ACTION_OBJECT_NAME,\
DV_RULE_SET_NAME,\
DV_COMMENT,\
DV_FACTOR_CONTEXT,\
DV_OBJECT_STATUS,\
OLS_POLICY_NAME,\
OLS_GRANTEE,\
OLS_MAX_READ_LABEL,\
OLS_MAX_WRITE_LABEL,\
OLS_MIN_WRITE_LABEL,\
OLS_PRIVILEGES_GRANTED,\
OLS_PROGRAM_UNIT_NAME,\
OLS_PRIVILEGES_USED,\
OLS_STRING_LABEL,\
OLS_LABEL_COMPONENT_TYPE,\
OLS_LABEL_COMPONENT_NAME,\
OLS_PARENT_GROUP_NAME,\
OLS_OLD_VALUE,\
OLS_NEW_VALUE,\
RMAN_SESSION_RECID,\
RMAN_SESSION_STAMP,\
RMAN_OPERATION,\
RMAN_OBJECT_TYPE,\
RMAN_DEVICE_TYPE,\
DP_TEXT_PARAMETERS1,\
DP_BOOLEAN_PARAMETERS1,\
-- DP_WARNINGS1, -- Oracle 21c\
DIRECT_PATH_NUM_COLUMNS_LOADED,\
KSACL_USER_NAME,\
KSACL_SERVICE_NAME,\
KSACL_SOURCE_LOCATION\
FROM SYS.UNIFIED_AUDIT_TRAIL\
)\
WHERE EVENT_TIMESTAMP_UTC > ?\
ORDER BY EVENT_TIMESTAMP_UTC ASC
query_timeout = 60
sourcetype = ora_unf_aud_dbx
tail_rising_column_name = EVENT_TIMESTAMP_UTC
tail_rising_column_number = 1
