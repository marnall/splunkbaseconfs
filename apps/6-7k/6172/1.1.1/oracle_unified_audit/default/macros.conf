[mc_ora_unf_md]
definition = index = ora_unf_aud \
| eval ID = md5(_raw) \
\
| eval DBUSERNAME = if(isnull(DBUSERNAME),"",DBUSERNAME)\
| eval ACTION_NAME = if(isnull(ACTION_NAME),"",ACTION_NAME) \
| eval AUDIT_TYPE = if(isnull(AUDIT_TYPE),"",AUDIT_TYPE) \
| eval OBJECT_SCHEMA = if(isnull(OBJECT_SCHEMA),"",OBJECT_SCHEMA) \
| eval OBJECT_NAME = if(isnull(OBJECT_NAME),"",OBJECT_NAME) \
| eval OBJECT_TYPE = if(isnull(OBJECT_TYPE),"",OBJECT_TYPE) \
| eval USERHOST = if(isnull(USERHOST),"",USERHOST) \
| eval OS_USERNAME = if(isnull(OS_USERNAME),"",OS_USERNAME) \
| eval RETURN_CODE = if(isnull(RETURN_CODE),"",RETURN_CODE) \
\
| eval TERMINAL = if(isnull(TERMINAL),"",TERMINAL) \
| eval SESSIONID = if(isnull(SESSIONID),"",SESSIONID) \
| eval CLIENT_PROGRAM_NAME = if(isnull(CLIENT_PROGRAM_NAME),"",CLIENT_PROGRAM_NAME) \
| eval CLIENT_IDENTIFIER = if(isnull(CLIENT_IDENTIFIER),"",CLIENT_IDENTIFIER) \
| eval SQL_BINDS = if(isnull(SQL_BINDS),"",SQL_BINDS) \
| eval SQL_TEXT = if(isnull(SQL_TEXT),"",SQL_TEXT) \
\
| EVAL SEO_SEC = If( \
AUDIT_TYPE = "Standard" AND ACTION_NAME IN ("GRANT", "REVOKE", "AUDIT", "NOAUDIT", "CREATE AUDIT POLICY", "ALTER AUDIT POLICY", "DROP AUDIT POLICY", "ALTER USER", "CREATE USER", "DROP USER", "BECOME USER", "PASSWORD CHANGE", "ALTER ROLE", "CREATE ROLE", "DROP ROLE", "SET ROLE")\
OR\
AUDIT_TYPE = "Database Vault" and ACTION_NAME IN ("GRANT", "REVOKE", "AUDIT", "NOAUDIT", "CREATE AUDIT POLICY", "ALTER AUDIT POLICY", "DROP AUDIT POLICY", "ALTER USER", "CREATE USER", "DROP USER", "CHANGE PASSWORD", "ALTER ROLE", "CREATE ROLE", "DROP ROLE", "SET ROLE")\
OR\
AUDIT_TYPE IN ("XS", "Label Security"), \
1, 0)\
\
| EVAL SEO_ACC = If(\
AUDIT_TYPE = "Standard" AND ACTION_NAME IN ("LOGON", "LOGOFF", "LOGOFF BY CLEANUP", "PROXY AUTHENTICATION")\
OR\
AUDIT_TYPE = "Database Vault" AND ACTION_NAME IN ("LOGON", "LOGOFF")\
OR\
AUDIT_TYPE = "XS" AND ACTION_NAME IN ("CREATE SESSION", "DESTROY SESSION"), \
1, 0)\
\
| EVAL SEO_ORA = If(\
AUDIT_TYPE = "Standard" AND OBJECT_SCHEMA = "SYS", \
1, 0)\
\
| EVAL SEO_DML = If(\
AUDIT_TYPE = "Standard" AND ACTION_NAME IN ("INSERT", "DELETE", "UPDATE", "MERGE", "COMMIT", "ROLLBACK", "SAVEPOINT", "SET TRANSACTION", "WRITE DIRECTORY")\
OR \
AUDIT_TYPE = "FineGrainedAudit" AND ACTION_NAME IN ("INSERT", "DELETE", "UPDATE", "MERGE")\
OR \
AUDIT_TYPE = "Database Vault" AND ACTION_NAME IN ("INSERT", "DELETE", "UPDATE", "MERGE", "COMMIT", "ROLLBACK", "SAVEPOINT", "SET TRANSACTION"), \
1, 0)\
\
| EVAL SEO_SE = If(\
AUDIT_TYPE = "Standard" AND ACTION_NAME IN ("SELECT", "SELECT MINING MODEL", "EXECUTE", "PL/SQL EXECUTE", "EXECUTE DIRECTORY", "READ DIRECTORY") \
OR \
AUDIT_TYPE = "FineGrainedAudit" AND ACTION_NAME = "SELECT"\
OR \
AUDIT_TYPE = "Database Vault" AND ACTION_NAME IN ("SELECT", "EXECUTE"), \
1, 0)\
\
| EVAL SEO_DDL = If(\
AUDIT_TYPE = "Standard" AND NOT ACTION_NAME IN ("GRANT", "REVOKE", "AUDIT", "NOAUDIT", "CREATE AUDIT POLICY", "ALTER AUDIT POLICY", "DROP AUDIT POLICY", "ALTER USER", "CREATE USER", "DROP USER", "BECOME USER", "PASSWORD CHANGE", "ALTER ROLE", "CREATE ROLE", "DROP ROLE", "SET ROLE", "LOGON", "LOGOFF", "LOGOFF BY CLEANUP", "PROXY AUTHENTICATION",  "INSERT", "DELETE", "UPDATE", "MERGE", "COMMIT", "ROLLBACK", "SAVEPOINT", "SET TRANSACTION", "WRITE DIRECTORY", "SELECT", "SELECT MINING MODEL", "EXECUTE", "PL/SQL EXECUTE", "EXECUTE DIRECTORY", "READ DIRECTORY", "CALL METHOD", "EXPLAIN")\
OR\
AUDIT_TYPE = "Database Vault" AND NOT ACTION_NAME IN ("GRANT", "REVOKE", "AUDIT", "NOAUDIT", "CREATE AUDIT POLICY", "ALTER AUDIT POLICY", "DROP AUDIT POLICY", "ALTER USER", "CREATE USER", "DROP USER", "CHANGE PASSWORD",  "ALTER ROLE", "CREATE ROLE", "DROP ROLE", "SET ROLE", "LOGON", "LOGOFF", "INSERT", "DELETE", "UPDATE", "MERGE", "COMMIT", "ROLLBACK", "SAVEPOINT", "SET TRANSACTION", "SELECT", "EXECUTE", "CALL METHOD", "EXPLAIN"), \
1, 0)\
\
| EVAL SEO_ERR = If(\
AUDIT_TYPE = "Standard" AND RETURN_CODE != 0\
OR\
AUDIT_TYPE = "Database Vault" AND DV_RETURN_CODE != 0, \
1, 0)\
\
| lookup app_schema_lookup APP_SCHEMA as OBJECT_SCHEMA OUTPUT APP_SCHEMA\
| eval SEO_APP = if(APP_SCHEMA == OBJECT_SCHEMA, 1, 0)\
\
| eval SEO_CURR_USER = If(\
Isnull(CURRENT_USER) OR DBUSERNAME == CURRENT_USER, \
1, 0)\
\
| fields _time, ID, DB_NAME, DB_UNIQUE_NAME, DB_HOST, AUDIT_TYPE, DBUSERNAME, ACTION_NAME, USERHOST, OS_USERNAME, OBJECT_SCHEMA, OBJECT_NAME, OBJECT_TYPE, RETURN_CODE, TERMINAL, SESSIONID, CLIENT_PROGRAM_NAME, CLIENT_IDENTIFIER, SYSTEM_PRIVILEGE_USED, ENTRY_ID, STATEMENT_ID, TARGET_USER, EXCLUDED_USER, ROLE, AUDIT_OPTION, \
SQL_BINDS, SQL_TEXT, OBJECT_PRIVILEGES, SYSTEM_PRIVILEGE, AUDIT_OPTION, CURRENT_USER, XS_USER_NAME, DV_ACTION_NAME, OLS_POLICY_NAME, RMAN_OPERATION, \
SEO_SEC, SEO_ACC, SEO_ORA, SEO_DDL, SEO_DML, SEO_SE, SEO_ERR, SEO_APP, SEO_CURR_USER \
| table _time, ID, DB_NAME, DB_UNIQUE_NAME, DB_HOST, AUDIT_TYPE, DBUSERNAME, ACTION_NAME, USERHOST, OS_USERNAME, OBJECT_SCHEMA, OBJECT_NAME, OBJECT_TYPE, RETURN_CODE, TERMINAL, SESSIONID, CLIENT_PROGRAM_NAME, CLIENT_IDENTIFIER, SYSTEM_PRIVILEGE_USED, ENTRY_ID, STATEMENT_ID, TARGET_USER, EXCLUDED_USER, ROLE, AUDIT_OPTION, \
SQL_BINDS, SQL_TEXT, OBJECT_PRIVILEGES, SYSTEM_PRIVILEGE, AUDIT_OPTION, CURRENT_USER, XS_USER_NAME, DV_ACTION_NAME, OLS_POLICY_NAME, RMAN_OPERATION, \
SEO_SEC, SEO_ACC, SEO_ORA, SEO_DDL, SEO_DML, SEO_SE, SEO_ERR, SEO_APP, SEO_CURR_USER
iseval = 0

