
[syslog]
CHARSET = UTF-8
SHOULD_LINEMERGE = 0
pulldown_type = 1
REPORT-TrustONEFields1 = REPORT-TrustONEFields1
EXTRACT-src,user,host = ^(?:[^ \n]* ){7}(?P<src>[^ ]+)[^=\n]*=(?P<user>\w+)\s+\w+=(?P<host>[^ ]+)
EXTRACT-src,host,path = ^(?:[^ \n]* ){7}(?P<src>[^ ]+)[^=\n]*=(?P<host>[^ ]+)\s+\w+=(?P<path>\w+:\\\w+\\\w+\\\w+\\\w+)
