[default]
[pki]
FIELDALIAS-eventheader = eventDetails.header AS header
FIELDALIAS-source = agent.displayName AS src
FIELDALIAS-destination = agent.displayName AS dest
FIELDALIAS-device = agent.displayName AS dvc
EVAL-action = case(eventID IN (1,101,201,301,351,401,451,501,551,561),"stopped", eventID==165,"updated", eventID IN (4,104,204,304,354,404,454,504,554,564),"started", 'eventDetails.header' LIKE "%changed%", "modified", 'eventDetails.header' LIKE "%started%", "started", 'eventDetails.header' LIKE "%stopped%", "stopped", 'eventDetails.header' LIKE "%added%", "created", 'eventDetails.header' LIKE "%created%", "created", 'eventDetails.header' LIKE "%removed%", "deleted", 'eventDetails.header' LIKE "%deleted%", "deleted", 1==1,NULL)
EVAL-object_path = coalesce('eventDetails.eventData.Directory_path','eventDetails.eventData.Key_path', 'eventDetails.eventData.Site_path')
EVAL-vendor_product = "PKI"
EVAL-signature = 'eventDetails.eventData.Rule_name'
EVAL-signature_id = 'eventDetails.eventData.Rule_ID'
EVAL-category = 'eventDetails.eventData.Alert_category'
LOOKUP-eventid = agent_event eventID logname AS "logName.displayName" OUTPUTNEW event

