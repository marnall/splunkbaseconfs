# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 8

[launcher]
author = Ian Andrews
version = 1.1.3
description = Used to pull current and forecasted weather data, from OpenWeather, for a given lat/lon. Requires an OpenWeather One Call API 3.0 key.

[ui]
is_visible = 1
label = OpenWeather Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-openweather-add-on-for-splunk

[triggers]
reload.addon_builder = simple
reload.ta_openweather_add_on_for_splunk_account = simple
reload.ta_openweather_add_on_for_splunk_settings = simple
reload.passwords = simple

