[Generate - Cache - Service Ticket w/ Slack]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */5 * * * *
disabled = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = index=connectwise sourcetype="cw:service:ticket"\
| lookup service_tickets _key as id OUTPUTNEW _key as foundId\
| stats\
    latest(boardId) as boardId,\
    latest(foundId) as foundId,\
    latest(dateEntered) as dateEntered,\
    latest(companyId) as companyId,\
    latest(priorityId) as priorityId,\
    latest(summary) as summary,\
        by id\
| lookup service_priorities _key as priorityId OUTPUT name as priorityName\
| lookup companies _key as companyId OUTPUT name as companyName\
| rename\
    id as _key\
| outputlookup append=t service_tickets\
| search NOT foundId=*\
| eval\
    dateEnteredEpoch=round(strptime(dateEntered, "%Y-%m-%dT%H:%M:%S%Z"),0)\
| rename _key as id\
| fields id boardId dateEnteredEpoch dateEntered priorityName companyName summary
