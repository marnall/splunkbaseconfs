[Generate - Cache - Project Ticket]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */5 * * * *
disabled = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = index=connectwise sourcetype="cw:project:ticket"\
| stats\
    latest(boardId) as boardId,\
    latest(projectId) as projectId,\
    latest(summary) as summary\
        by id\
| rename\
    id as _key\
| outputlookup append=t project_tickets

