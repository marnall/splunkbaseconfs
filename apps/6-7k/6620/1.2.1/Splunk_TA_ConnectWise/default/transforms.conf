[members]
external_type = kvstore
collection = connectwise_members
fields_list = _key, identifier, firstName, lastName, workRoleId, defaultDepartmentId, primaryEmail, reportsToId

[projects]
external_type = kvstore
collection = connectwise_projects
fields_list = _key, companyId, departmentId, managerId, name, typeId

[project_tickets]
external_type = kvstore
collection = connectwise_project_tickets
fields_list = _key, boardId, projectId, summary

[project_types]
external_type = kvstore
collection = connectwise_project_types
fields_list = _key, name

[worktypes]
external_type = kvstore
collection = connectwise_worktypes
fields_list = _key, name

[workroles]
external_type = kvstore
collection = connectwise_workroles
fields_list = _key, name, hourlyRate

[chargecodes]
external_type = kvstore
collection = connectwise_chargecodes
fields_list = _key, name, billTime

[departments]
external_type = kvstore
collection = connectwise_department
fields_list = _key, name, identifier

[timesheets]
external_type = kvstore
collection = connectwise_timesheets
fields_list = _key, dateStart, dateEnd, hours, memberId, period, year

[service_tickets]
external_type = kvstore
collection = connectwise_service_tickets
fields_list = _key, boardId, companyId, priorityId, summary

[service_priorities]
external_type = kvstore
collection = connectwise_service_priorities
fields_list = _key, name

[service_boards]
external_type = kvstore
collection = connectwise_service_boards
fields_list = _key, name, departmentId, projectFlag

[companies]
external_type = kvstore
collection = connectwise_companies
fields_list = _key, name
