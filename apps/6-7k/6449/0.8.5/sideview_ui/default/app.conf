# Splunk app configuration file

[ui]
is_visible = 1
label = Sideview UI
supported_themes = light, dark

[launcher]
author = Sideview, LLC
description = This app packages some useful tools for admins.  If it succeeds in its mission its tools will become both more numerous and higher quality as time goes on.
version = 0.8.5

[id]
version = 0.8.5
name = sideview_ui

[install]
build = 23

[package]
id = sideview_ui

[dependency:app:canary]
requiredVersion = 2.0.3

[dependency:splunk]
requiredVersion = 9.0

[triggers]
reload.svobjects = access_endpoints /admin/conf-svobjects
