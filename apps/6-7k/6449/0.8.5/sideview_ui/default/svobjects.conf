
[default]
default_stats_function = list

[splunk_internal_search]

groupby = sid
default_stats_function = values
singular = search
plural = searches
indexes = _audit,_introspection


required_streaming_spl = ((index=_audit sourcetype=audittrail search_id=* (info=granted OR info=completed OR info=canceled) NOT "search='typeahead prefix=" ) \
OR (index=_introspection sourcetype="search_telemetry") \
OR (index=_introspection sourcetype="splunk_telemetry") \
OR (index=_introspection sourcetype=splunk_resource_usage data.search_props.sid::* NOT data.search_props.sid::remote_sh*)) \
```autokv can not be trusted in audittrail so we nuke it and reextract with our auditextractor command``` \
| fields - app user action event_count scan_count result_count available_count drop_count total_run_time exec_time search provenance sourcetypes sourcetype_count__* \
| eval search_id=if(index="_audit",null(), search_id) \
| auditextractor \
```view is also nuked and rebuilt from scratch using only the provenance``` \
| eval view=case(provenance=="UI:Search", "search", provenance=="UI:Report", "report", match(provenance,"UI:Canary:"), mvindex(split(provenance,":"),2), match(lower(provenance),"ui:dashboard:"), mvindex(split(provenance,":"),2)) \
| eval sid=case(sourcetype="search_telemetry", search_id, index="_introspection",'data.search_props.sid', isnotnull(search_id),search_id,true(),sid) \
| eval pct_cpu='data.pct_cpu' \
| eval pct_memory='data.pct_memory' \
| eval fd_used = 'data.fd_used' \
| eval mem_used = 'data.mem_used' \
| eval time_range_duration=round(time_range_duration) \
```nobody cares about nobody.``` \
| eval user=if(user=="nobody",null(),user) \
| eval time_range_duration = search_lt - search_et

default_selected_fields = host,user,app,view,pct_cpu,pct_memory,event_count,total_run_time


[splunk_internal_search::pct_cpu]
function=list

[splunk_internal_search::pct_memory]
function=list

[splunk_internal_search::scan_count]
function=list

[splunk_internal_search::event_count]
function=list

[splunk_internal_search::total_run_time]
function=list






