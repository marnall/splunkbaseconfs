



# see comments on the handler class in the python file in the shunt subdirectory.

[script:sideview_ui_shunt]
match                 = /sideview_ui_shunt
script                = shunt/sideview_ui_shunt.py
scripttype            = persist
handler               = sideview_ui_shunt.SideviewUIShuntHandler
requireAuthentication = true
# see comments on this same key elsewhere in this file.
output_modes          = json, xml
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSession           = true
python.version        = python3


