[baseutil-command]
syntax = baseutil input_field=<target field name> mode=<encode|decode> (base=<2|8|16|32|64|85>) (coding=<coding str for python3 encode() decode(), default: utf-8>)
shortdesc = base converting for input string, output field is created as "base" + <base option> + <mode option> + "_" + <input_field name> (By GoAhead Inc.)
example = ...| baseutil input_field=message mode=decode base=64 coding=sjis
description = 
usage = public

[rotutil-command]
syntax = rotutil input_field=<target field name> (num=<-47 ~ 47, ROT width default: 13>) (brute=true or false, ROT bruteforce conversion between ROT-<num> and ROT<num> <default: false>)
shortdesc = rot converting for input string, output field is created as (brute) + "rot" + <num option> + "_" + <input_field name>. Only alphabet rotation between -13 and 13, the outer is alphabet + numeric + symbol between ord(33) and ord(126). (By GoAhead Inc.)
example = ...| rotutil input_field=message num=13 brute=true
description = 
usage = public

[codingutil-command]
syntax = codingutil input_field=<target field name> (encoding=<codename1>) (decoding=<codename2>) 
shortdesc = char coding checking and converting for input string, output fields are created as "codinginfo" + "_" + <input_field name> ,and "decoding" + "_" + <codename2>  + "_" + <input_field name>  if codename2 is given as "decoding" option. The codename1 is utf-8 by default if you do not set. (By GoAhead Inc.)
example = ...| codingutil input_field=message encoding=cp932  OR  ...| codingutil input_field=message encoding=cp932 decoding=sjis
description = 
usage = public

[maskutil-command]
syntax = maskutil input_field=<target field name> (additional_input_fields=<field name A>,<field name B>,<field name C>,...)
shortdesc = masking multi-byte char like Japanese letters, Kanji etc excluding ascii to "笆｡", one input field is necessary and additional multi fields can be set to mask. output fields are "masked" + "_" + <input_field names>  (By GoAhead Inc.)
example = ...| maskutil input_field=message (additional_input_fields=<fieldA>,<fieldB>,<fieldC>)
description = 
usage = public

[randomutil-command]
syntax = randomutil input_field=<target field name> mode=<shannon|nostril|texttrans> (th=<int or float value for threshold to judge the randomness, default: 3.5 for shannon, 0.05 for texttrans, nostril does not need th option because of the built-in.>
shortdesc = randomness checker for input string, output field is created as "is_random" + "_" + <mode> + "_" + <th> + "_" + <input_field name>. (By GoAhead Inc.)
example = ...| randomutil input_field=message mode=shannon th=3.5
description = more faster order: shannon > texttrans >> nostril
usage = public

[escapeutil-command]
syntax = escapeutil input_field=<target field name> (escape=|unescape=)unicode-escape
shortdesc = escape and unescape about "unicode-escape","xmlcharref" and "urlpercent" encoding, output field is created as r"(escape|unescape)" + "_" + r"(unicode-escape|xmlcharref|urlpercent)" + "_" + <input_field name> (By GoAhead Inc.)
example = ...| escapeutil input_field=message unescape="unicode-escape"  OR  ...| escapeutil input_field=message escape="xmlcharref" 
description = 
usage = public

[renameutil-command]
syntax = renameutil field=(<field name>|<field name A>,<field name B>,<field name C>,...|*field) style=(replace|upper|lower|prefix|suffix) (prestub=<prestr>) (fixstub=fixstr)
shortdesc = multi field name converter for single or comma separated list or wildcard field names. Choose one style, prestub= is needed for only "replace" stype as replaced part. fixstub= is needed for "prefix", "suffix" and "replace" style as new str. It will sometimes be useful when built-in "rename" command cannot handle your demand. E.g Change to upper or lower cases (By GoAhead Inc.)
example = ...| renameutil field=src.* style=replace prestub="user" fixstub="idnum" OR  ...| renameutil field=username,useremail,iduser,idmessage style=prefix fixstub="osintintelA_" OR ...| renameutil field=*_* style=lower  OR ...| renameutil field=* style=replace prestub="id" fixstub="__upper__"   
description = 
usage = public