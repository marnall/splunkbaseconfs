[dell_sonicwall_sma]
search = sourcetype=dell:sonicwall:sma

[dell_sonicwall_sma_session_start]
search = sourcetype=dell:sonicwall:sma ("EventMessage: Session Start")

[dell_sonicwall_sma_session_end]
search = sourcetype=dell:sonicwall:sma ("EventMessage: Session End")

[dell_sonicwall_sma_post_auth]
search = sourcetype=dell:sonicwall:sma "Request='POST /__extraweb__authen" http_method="POST" AND uri_query="/__extraweb__authen*"

[dell_sonicwall_sma_phase1_authentication_success]
search = sourcetype=dell:sonicwall:sma "System  AUTH: " AND "User authentication for otp-attrib"

[dell_sonicwall_sma_web_proxy_service]
search = sourcetype=dell:sonicwall:securemobileaccess (app_id="ew" OR uri_query="*")