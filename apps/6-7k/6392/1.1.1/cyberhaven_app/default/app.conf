#
# Splunk app configuration file
#

[install]
is_configured = 0

[package]
id = cyberhaven_app

[ui]
is_visible = 1
label = Cyberhaven application
# Points to a file in:
# $SPLUNK_HOME/etc/apps/<SPLUNK_APP_NAME>/default/data/ui/views/*
# It does not need the extension of the file name provided
setup_view = setup_page_dashboard

[launcher]
author = Dmytro Mishchenko
description = This application loads all incidents from cyberhaven instance to the splunk
version = 1.1.1
