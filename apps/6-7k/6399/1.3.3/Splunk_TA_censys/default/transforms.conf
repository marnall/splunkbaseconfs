# IP → ASM seed assetId from host discoveryTrail. Populated by "Generate Risk Instance IP to Seed Lookup".
[asm_risk_instances_seed_lookup]
external_type = kvstore
collection = asm_risk_instances_seed
fields_list = ip, seed

# IP → ASM seed for logbook (indexed sourcetype censys:asm:logbook). Populated by "Generate Logbook IP to Seed Lookup".
[asm_logbook_seed_lookup]
external_type = kvstore
collection = asm_logbook_ip_to_seed
fields_list = ip, seed
