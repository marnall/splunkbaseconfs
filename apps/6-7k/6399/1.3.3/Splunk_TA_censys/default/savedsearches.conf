# Deduped IPs from risk instances → censysasmhosts. outputlookup replaces asm_risk_instances_seed_lookup each run (no append). Throttle when piped: batch_size= / batch_delay= (defaults 20/10).
[Generate Risk Instance IP to Seed Lookup]
disabled = 1
enableSched = 0
cron_schedule = 0 * * * *
search = | censysasmriskinstances | spath | rename context.ip as ip | dedup ip | censysasmhosts | table ip, seed | fillnull value="" seed | outputlookup asm_risk_instances_seed_lookup

# Indexed logbook events → dedup IP → censysasmhosts (head 100 for testing). Replaces asm_logbook_seed_lookup each run.
[Generate Logbook IP to Seed Lookup]
disabled = 1
enableSched = 0
cron_schedule = 0 * * * *
search = index=* sourcetype="censys:asm:logbook" ip=* | dedup ip | head 100 | censysasmhosts | table ip, seed | fillnull value="" seed | outputlookup asm_logbook_seed_lookup
