[Generating Lookup for dx_savedsearch_audit]
description = Generating lookup dx_savedsearch_audit
disabled = 1
enableSched = 1
cron_schedule = 11-59/30 * * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | rest /servicesNS/-/-/saved/searches splunk_server=local timeout=0 count=0 f="id" f="eai*" f="user" f="title" f="description" f="is_scheduled" f="disabled" f="cron_schedule" f="dispatch.earliest_time" f="dispatch.latest_time" f="action*" f="search" f="alert_type" f="alert.track" f="updated" \
| rex field=id "http(?:s|):\/\/[^\/]+\/servicesNS\/(?P<id_user>[^\/]+)\/(?P<id_app>[^\/]+)\/saved\/searches\/(?P<id_title>.*)" \
``` Needed to urldecode 2x for id_title.  Possible bug/weirdness in how the id is being generated.  Using title for now``` \
| eval savedsearch_id = urldecode(id_user).";".urldecode(id_app).";".title \
| rename id as rest_endpoint \
| rex field=rest_endpoint mode=sed "s/^http(?:s|):\/\/.*?:\d+//g"  \
| fields - id, - id_* \
| eval type = IF(((is_scheduled=="1" AND (alert_type!="always" OR alert.track=="1" OR (MATCH(dispatch.earliest_time, "^rt") AND MATCH(dispatch.latest_time, "^rt") AND ISNULL(actions) == false() AND actions!="")))), "Alert", "Report") \
| eval is_scheduled = IF(is_scheduled=="" OR ISNULL(is_scheduled), 0, is_scheduled) \
| rename eai:acl.* as * \
| fields savedsearch_id, rest_endpoint, app, owner, sharing, title, type, description, is_scheduled, disabled, cron_schedule, dispatch.earliest_time, dispatch.latest_time, action.*, search, updated \
``` Looks like there is an action field...  Need to switch to that ``` \
| foreach action.* [| eval actions = IF(MATCH("<<FIELD>>", "action\.[^.]+$") AND '<<FIELD>>'==1, mvappend("<<FIELD>>", actions), actions)] \
| eval email_to = SPLIT('action.email.to', ","), email_cc = SPLIT('action.email.cc', ","), email_bcc = SPLIT('action.email.bcc', ",") \
| rex mode=sed field=email_to "s/\n//g" \
| rex mode=sed field=email_cc "s/\n//g" \
| rex mode=sed field=email_bcc "s/\n//g" \
| eval email_recipients = mvappend(trim(email_to), trim(email_cc), trim(email_bcc)) \
| eval lookup_filename = 'action.lookup.filename' \
| fields - action.*, - email_to, - email_cc, - email_bcc \
| rename dispatch.* as * \
| eval actions = mvjoin(actions, "|"), email_recipients = lower(mvjoin(email_recipients, "|")) \
| eval refresh_time = now() \
| fields savedsearch_id, refresh_time, rest_endpoint, app, owner, sharing, title, type, description, is_scheduled, disabled, cron_schedule, earliest_time, latest_time, actions, email_recipients, lookup_filename, search, search_expanded, updated \
| dxsearchexpansion app=app, owner=owner input=search output=search_expanded \
| rename savedsearch_id as _key \
| fillnull value="" \
| eval updated = strptime(updated, "%Y-%m-%dT%H:%M:%S.%Q%:z") \
| eval updated = IF(ISNULL(updated) OR TRIM(updated)=="", 0, updated)  \
| outputlookup append=f override_if_empty=f dx_savedsearch_audit

[Generating Lookup for dx_savedsearch_perf]
description = Generating lookup dx_savedsearch_perf with trailing statistics
disabled = 1
enableSched = 1
cron_schedule = 3 1 * * *
dispatch.earliest_time = -30d
dispatch.latest_time = now
search = index=_internal `dx_search_tier` sourcetype=scheduler source=*scheduler.log* component=SavedSplunker status!=delegated* \
| rex field=_raw " savedsearch_id=\\\"(?P<savedsearch_id>.*?)\\\", \w+=" \
| rex field=_raw " savedsearch_name=\\\"(?P<savedsearch_name>.*?)\\\", \w+="  \
| rex field=_raw " user=\\\"(?<user>[^,]+)\\\", \w+=" \
| stats latest(_time) as _time, latest(sid) as sid, count(eval(status=="success")) as success, count(eval(status=="skipped")) as skipped, count(eval(status=="continued")) as continued, count(eval(alert_actions!="" AND status=="success")) as alerted, sum(run_time) as total_run_time by savedsearch_id, app, user, savedsearch_name \
| rename user as owner, savedsearch_name as title \
| fields _time, savedsearch_id, app, owner, title, sid, success, skipped, continued, alerted, total_run_time, refresh_time \
| append \
    [| rest /servicesNS/-/-/search/jobs splunk_server=local timeout=0 count=0 search="isSavedSearch=1 delegate=scheduler dispatchState=FAILED" f="published" f="savedSearchLabel" f="label" f="dispatchState" f="messages*" f="sid" \
        ``` Rest endpoint is not honoring field list ``` \
    | eval _time = strptime(published, "%Y-%m-%dT%H:%M:%S.%Q%:z") \
    | fields _time, savedSearchLabel, label, dispatchState, messages.fatal, sid \
    | rename label as title \
    | eval app = json_extract(savedSearchLabel, "app") \
    | eval owner = json_extract(savedSearchLabel, "owner") \
    | eval sharing = json_extract(savedSearchLabel, "sharing") \
    | eval savedsearch_id = IF(sharing=="user", owner, "nobody").";".app.";".title \
    | stats latest(_time) as _time, latest(sid) as sid, latest(messages.fatal) as message by savedsearch_id, app, owner, title ] \
| fillnull success, skipped, continued, alerted, total_run_time value=0 \
| stats sum(success) as success, sum(skipped) as skipped, sum(continued) as continued, sum(alerted) as alerted, sum(total_run_time) as total_run_time, latest(sid) as sid, latest(message) as message by savedsearch_id, app, owner, title \
| eval refresh_time = now() \
| rename savedsearch_id as _key \
| outputlookup append=f override_if_empty=f dx_savedsearch_perf

[Generating Lookup for dx_dashboard_audit]
description = Generating lookup dx_dashboard_audit
disabled = 1
enableSched = 1
cron_schedule = 16-59/30 * * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
search = | rest /servicesNS/-/-/data/ui/views splunk_server=local timeout=0 count=0 search="rootNode!=view" f="eai*" f="title" f="label" f="version" f="rootNode" f="id" f="updated" \
| where MATCH('eai:data', "(\<search(?:\s|\s*\>)|\{\"query\")") \
| rename id as rest_endpoint \
| rex field=rest_endpoint mode=sed "s/^http(?:s|):\/\/.*?:\d+//g" \
| rename eai:acl.* as *, eai:data as data \
| fields app, owner, sharing, title, label, version, rootNode, data, rest_endpoint, updated \
| where ISNULL(version) OR version="" OR version!="2" \
| dxdashboardsearchextraction input=data app=app owner=owner \
| fields - data \
    ``` TODO: Limit field set before mvexpand??```  \
| mvexpand dashboard_searches \
| spath input=dashboard_searches \
| fields rest_endpoint, app, owner, sharing, title, version, rootNode, parent, label, id, query, ref, base_id, base_ref, earliest, latest, search, search_expanded, error, exception, updated \
| eval updated = strptime(updated, "%Y-%m-%dT%H:%M:%S.%Q%:z") \
| eval updated = IF(ISNULL(updated) OR TRIM(updated)=="", 0, updated) \
| eval refresh_time = now() \
| eval type="Dashboard" \
| outputlookup append=f dx_dashboard_audit