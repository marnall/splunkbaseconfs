[ccx_eset_endpointsecurity_log_parsing]
FORMAT = $1::$2
REGEX = "([a-zA-Z0-9_-]+)":\"?(((?!\"?,\"|\"?}).)*)

[ccx_eset_extract_unquoted_string]
FORMAT = $1::$2
REGEX = (?<=^| )([^:\s]+)(?:: )(((?![^:\s]+: ).)*)(?= |$)

[ccx_eset_extract_vendor_action]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = \".+?[Aa]ction(_taken|_error)*\":\s*\"(?<vendor_action>.+?)\"