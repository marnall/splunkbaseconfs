[location__tegoguardian]
SOURCE_KEY = Location
#REGEX = (\(([^\)]+)\))*\s*(.*?)(->)(.*)
FORMAT = dest_dns::"$2" dest_ip::"$3" orig_source::"$5"

[ip_threat_list]
collection = ip_threat_list
external_type = kvstore
fields_list = _key,ip,ip_full,token,description,firstSeen,lastOnline,firstEnrichedOn,createdOn,riskLevel,_time

[url_threat_list]
collection = url_threat_list
external_type = kvstore
fields_list = _key,url,url_full,token,description,firstSeen,lastOnline,firstEnrichedOn,createdOn,riskLevel,_time

[hash_threat_list]
collection = hash_threat_list
external_type = kvstore
fields_list = _key,hash,hash_full,token,description,firstSeen,lastOnline,firstEnrichedOn,createdOn,riskLevel,_time

[domain_threat_list]
collection = domain_threat_list
external_type = kvstore
fields_list = _key,domain,domain_full,token,description,firstSeen,lastOnline,firstEnrichedOn,createdOn,riskLevel,_time