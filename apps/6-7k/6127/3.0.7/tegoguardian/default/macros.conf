[tego_summary_spl_meta(3)]
args = testmode, search_name,marker
definition = fields _time domain dest dest_name url_domain url ip dest_ip hash file_hash _raw host source sourcetype index raw_time_hash\
| eval tego_summary_hit=if(`tego_index` AND sourcetype="stash_hec",1,0)\
| foreach domain,dest,dest_name,url_domain,dest_ip,hash,file_hash \
    [ eval <<FIELD>>=if('<<FIELD>>'="" OR '<<FIELD>>'="null" OR '<<FIELD>>'="-", null(), <<FIELD>> ) ] \
| eval domain_lookup_field=if(tego_summary_hit=0,mvappend(domain,dest,dest_name,url_domain), null())\
| eval url_lookup_field=if(tego_summary_hit=0,mvappend(url,dest,dest_name,url_domain), null())\
| eval ip_lookup_field=if(tego_summary_hit=0,mvappend(ip,dest,dest_ip), null())\
| eval hash_lookup_field=if(tego_summary_hit=0,mvappend(hash,file_hash), null())\
| eval @lookup_field=mvdedup(if(tego_summary_hit=0,mvappend(domain,dest,dest_name,url_domain,url,ip,dest_ip,hash,file_hash), null()))\
| fields _time *lookup_field domain dest dest_name url_domain url ip dest_ip hash file_hash host source sourcetype index _raw tego_summary_hit raw_time_hash\
| foreach *lookup_field \
    [ eval <<FIELD>>=if(tego_summary_hit=0,if(len('<<FIELD>>')>500,substr('<<FIELD>>',1,500),'<<FIELD>>'),null()) ] \
| lookup ip_threat_list ip AS ip_lookup_field OUTPUTNEW ip as threat_ip, _key AS token, _key AS token_ip, description, riskLevel \
| lookup url_threat_list url AS url_lookup_field OUTPUTNEW url as threat_url, _key AS token, _key AS token_url, description, riskLevel \
| lookup domain_threat_list domain AS domain_lookup_field OUTPUTNEW domain as threat_domain, _key AS token, _key AS token_domain, description, riskLevel \
| lookup hash_threat_list hash AS hash_lookup_field OUTPUTNEW hash as threat_hash, _key AS token, _key AS token_hash,description, riskLevel \
| foreach threat_* \
    [ eval counter_<<FIELD>>=if(tego_summary_hit=0,if(isnotnull('<<FIELD>>'),1,0),null()) ] \
| fillnull value=0 counter_threat_hash counter_threat_ip counter_threat_domain counter_threat_url\
| eval type_hits=counter_threat_hash+counter_threat_ip+counter_threat_domain+counter_threat_url\
| eval token=mvappend(token_ip,token_url,token_domain,token_hash)\
| eval type=mvappend(if(counter_threat_ip=1,"ip",null()),if(counter_threat_url=1,"url",null()),if(counter_threat_domain=1,"domain",null()),if(counter_threat_hash=1,"hash",null())) \
| search ( type=* riskLevel=* ) OR tego_summary_hit=1\
| eval raw_time_hash=if(isnull(raw_time_hash),sha256(_time." ".host." "._raw),raw_time_hash)\
| fields _time type type_hits token* *lookup_field threat_* riskLevel host source sourcetype index raw_time_hash _raw tego_summary_hit\
| stats count AS raw_time_hash_count values(_time) AS _time values(*) AS * values(_raw) AS _raw max(tego_summary_hit) AS tego_summary_hit by raw_time_hash\
| fields _time tego_summary_hit type type_hits raw_time_hash_count token* *lookup_field threat_* riskLevel host source sourcetype index raw_time_hash _raw\
| search tego_summary_hit=0\
| eval time=strftime(_time,"%F %T %Z"), _raw=time.","._raw\
| fields - token_* tego_summary_hit time\
| eval summary_type="threat_hit", version=`tego_summary_version`, orig_sourcetype=sourcetype, orig_host=host, orig_index=index, orig_source=source, sourcetype=stash_hec, search_name="$search_name$", metafield="$marker$"\
| collect testmode=$testmode$ `tego_index` output_format="hec"
iseval = 0

