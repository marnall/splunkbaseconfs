[tego_append_lookup(2)]
args = type,eventlimit
definition = `tego_index` type=$type$ sourcetype=tegoguardian\
| lookup $type$_threat_list $type$ output _time AS lookup_time \
| eval lookup_time_logic=if(isnull(lookup_time) OR _time>lookup_time,1,0) ```checking if this is a newer record for this value of this type```\
| search lookup_time_logic=1 ```filter only for those not in lookup```\
| head $eventlimit$\
| fields $type$,token,description,firstSeen,lastOnline,firstEnrichedOn,createdOn,riskLevel,_time lookup_time_logic\
| stats latest(_time) AS _time latest(*) AS * by $type$\
| fields - lookup_time_logic\
| eval $type$_full=if(len($type$)>`tego_threat_char_limit`,'$type$',null())\
| eval $type$=if(len($type$)>`tego_threat_char_limit`,substr('$type$',1,`tego_threat_char_limit`),'$type$')\
| fields $type$*,token,description,firstSeen,lastOnline,firstEnrichedOn,createdOn,riskLevel,_time \
| table $type$*,token,description,firstSeen,lastOnline,firstEnrichedOn,createdOn,riskLevel,_time\
| outputlookup append=t key_field=token $type$_threat_list \
| stats earliest(_time) AS earliest latest(_time) AS latest count as eventcount\
| eval type="$type$"\
| foreach earliest latest  [ eval <<FIELD>>_readable=strftime('<<FIELD>>',"%Y-%m-%d %H:%M:%S") ]\
| `tego_lookback_collect`
iseval = 0

