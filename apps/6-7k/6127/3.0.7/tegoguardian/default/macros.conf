args = maxlookback
definition = [ | tstats latest(_time) AS earliest where `tego_summary_hits` \
    | eval earliest=earliest-`tego_raw_event_lag` \
    | append \
        [| makeresults \
        | eval earliest=now()-$maxlookback$ \
        | fields earliest] \
    | stats first(earliest) AS earliest ]
