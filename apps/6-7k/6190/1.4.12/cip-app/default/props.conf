[cip:ioc]
KV_MODE = json
TRUNCATE=500000
SHOULD_LINEMERGE = 0
DATETIME_CONFIG = NONE
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIME_PREFIX = \"Reported Date\":\s*\"
TIME_FORMAT = %a %b %d %H:%M:%S UTC %Y
category = Custom
disabled = false

