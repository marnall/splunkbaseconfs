[CA_PAM(3)]
args = PAM_earliest,PAM_latest,IsNotInteractive
definition = `CA_PAM-Retrievepassword($PAM_earliest$,$PAM_latest$,$IsNotInteractive$)` | append [ search `CA_PAM-UsePassword($PAM_earliest$,$PAM_latest$,$IsNotInteractive$)`] | `CA_PAM-eval_output_dest_nt_domain` | rename src AS PAM_src | rename dest_nt_domain AS PAM_dest_nt_domain | lookup dnslookup clientip as PAM_dest_ip outputnew clienthost AS PAM_dest_dns | rex field=PAM_dest_dns "(?<PAM_dest>[^.]+)" | eval Actual_Authenticaion_Server=if(isnull(Actual_Authenticaion_Server), PAM_dest_ip, Actual_Authenticaion_Server) | eval PAM_dest_nt_domain=if(isnull(PAM_dest_nt_domain), PAM_dest, PAM_dest_nt_domain) | eval PAM_Action=if(Service_App=="Exchange Server Web Access", "Use Web Password", PAM_Action)
