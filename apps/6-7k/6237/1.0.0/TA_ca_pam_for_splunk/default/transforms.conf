[ca_pam_kv_extraction]
#DELIMS = " = ",", "
REGEX=(hostname|[^,]+[^eventtype]) = ([^,]+)
FORMAT=$1::$2

[description_ca_pam_kv_extraction]
REGEX=<k>(.*?)</k><v>(.*?)</v>
FORMAT=$1::$2
SOURCE_KEY = description

[ca_pam_syslog_hashmap_kv_extraction]
REGEX=<k>(.*?)</k><v>(.*?)</v>
FORMAT=$1::$2
SOURCE_KEY = hashmap

[ca_pam_login_auth_action_success]
SOURCE_KEY = PAM_detail_message
#CLEAN_KEYS = 0
FORMAT = vendor_action::failure
REGEX = (?:.*?)(?:The user entered an incorrect password|Bad User ID or Password)

[ca_pam_login_auth_action_failure]
SOURCE_KEY = PAM_detail_message
CLEAN_KEYS = false
FORMAT = vendor_action::success pam_src_user::$1 pam_login_authentication_method::$2
REGEX = User (.*?) logged in successfully via (.*?) authentication

[ca_pam_auto_login_initiated]
SOURCE_KEY = PAM_detail_message
CLEAN_KEYS = false
FORMAT = PAM_Action::"Use Password" user_nt_domain::$1 TargetAccount_userName::$2 TargetAccount_ID::$3
#REGEX = Auto-login initiated with target account Name : ((?<user_nt_domain>[^\\]+)(\\))?(?<TargetAccount_userName>.*?) and target account Id : (?<TargetAccount_ID>.*?)\s+.$
REGEX = Auto-login initiated with target account Name : (?:([^\\]+)(?:\\))?(.*?) and target account Id : (.*?)(?:\s+)?.$

[ca_pam_autologin_session_id]
SOURCE_KEY = PAM_detail_message
CLEAN_KEYS = false
FORMAT = ca_pam_autologin_session_id::$1
REGEX = CA PAM\[(?<ca_pam_autologin_session_id>\d+)\]:

[ca_pam_dest_ip_from_dest]
SOURCE_KEY = dest
FORMAT = dest_ip::$1
REGEX = ^((?:25[0-5]|2[0-4][0-9]|[1][0-9][0-9]|[1-9][0-9]|[0-9]?)(?:\.(?:25[0-5]|2[0-4][0-9]|[1][0-9][0-9]|[1-9][0-9]|[0-9]?)){3})$

[ca_pam_dest_ip_from_targetserver_hostname]
SOURCE_KEY = TargetServer_hostName
FORMAT = dest_ip::$1
REGEX = ^((?:25[0-5]|2[0-4][0-9]|[1][0-9][0-9]|[1-9][0-9]|[0-9]?)(?:\.(?:25[0-5]|2[0-4][0-9]|[1][0-9][0-9]|[1-9][0-9]|[0-9]?)){3})$

