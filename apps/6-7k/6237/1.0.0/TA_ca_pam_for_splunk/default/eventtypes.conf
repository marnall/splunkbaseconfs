[ca_pam_authentication]
search = sourcetype="ca:pam:syslog" Transaction="login"

[ca_pam_authentication_success]
search = sourcetype="ca:pam:syslog" Transaction="login" action=success

[ca_pam_authentication_failure]
search = sourcetype="ca:pam:syslog" Transaction="login" action=failure

[ca_pam_change_analysis]
search = sourcetype="ca:pam:syslog"  cim_data_model="Change Analysis"

[ca_pam_change_analysis_cpm]
search = sourcetype="ca:pam:syslog"  cim_data_model="Change Analysis" (vendor_object_category="CPM Task" OR vendor_object_category="CPM Auto Detection")

[ca_pam_change_analysis_cpm_tasks]
search = sourcetype="ca:pam:syslog"  cim_data_model="Change Analysis" vendor_object_category="CPM Task"

[ca_pam_change_analysis_cpm_auto_detection]
search = sourcetype="ca:pam:syslog"  cim_data_model="Change Analysis" vendor_object_category="CPM Auto Detection"

[ca_pam_change_analysis_account]
search = sourcetype="ca:pam:syslog"  cim_data_model="Change Analysis" (vendor_object_category="Account" OR change_type="Account" OR extratag="Account")

[ca_pam_change_analysis_psm]
search = sourcetype="ca:pam:syslog"  cim_data_model="Change Analysis" vendor_object_category="PSM"

[ca_pam_change_analysis_safe_acl]
search = sourcetype="ca:pam:syslog"  cim_data_model="Change Analysis" vendor_object_category="Safe" action=acl_modified

[ca_pam_change_analysis_audit]
search = sourcetype="ca:pam:syslog"  cim_data_model="Change Analysis" alert="Yes"

[ca_pam_network_sessions]
search = sourcetype="ca:pam:syslog"  cim_data_model="Network Sessions"

[ca_pam_network_sessions_start]
search = sourcetype="ca:pam:syslog" "Auto-login initiated"

[ca_pam_network_sessions_end]
search = sourcetype="ca:pam:syslog" "Connection terminated"

[ca_pam_network_sessions_error]
search = sourcetype="ca:pam:syslog" "NLA login was canceled or invalid credentials were entered"

[ca_pam_pta_alerts]
search = sourcetype="ca:pam:syslog"

[ca_pam_default_privilege_user]
search = sourcetype="ca:pam:syslog" super OR config (src_user=super OR dest_user=super OR src_user=config OR dest_user=config)
disabled = 0

[ca_pam_syslog_auth]
search = sourcetype=ca:pam:syslog \
PamMessageCode IN (PAN-CMN-0899, PAM-CMN-09* , PAM-CMN-100*,PAM-CMN-101*,PAM-CMN-1021,PAM-CMN-1022,PAM-CMN-1023,PAM-CMN-1024,PAM-CMN-1025,PAM-CMN-1026,PAM-CMN-1027,PAM-CMN-3351,PAM-CMN-3352,PAM-CMN-3353,PAM-CMN-3252,PAM-CMN-3253,PAM-CMN-3254,PAM-CMN-3255,PAM-CMN-3256,PAM-CMN-3257,PAM-CMN-3258,PAM-CMN-3259,PAM-CMN-3260,PAM-CMN-3251)