[hyasinsightpassivedns-command]
syntax = hyasinsightpassivedns type="" value=""
description = Runs a HYAS Insight Passive query against the given Ioc Value and will return the latest results.
shortdesc = Get Passive DNS Records. Supported indicator types are IPv4, Domain.
example1 = | hyasinsightpassivedns type="Ip" value="103.14.120.241"
usage = public

