[admin:qintel_qsentry_feed]
match = /qintel_qsentry_feed
members = qintel_qsentry_feed_update, qintel_clean_qsentry_feed_cache

[script:qintel_qsentry_feed_update]
match = /qintel_qsentry_feed/update_feed
scripttype  = persist
script = qfeeds_update.py
handler = qfeeds_update.UpdateFeeds
python.version = python3
requireAuthentication = true
output_modes          = json

[script:qintel_clean_qsentry_feed_cache]
match = /qintel_qsentry_feed/clean_feed
scripttype  = persist
script = clean_feed.py
handler = clean_feed.Clean
python.version = python3
requireAuthentication = true
output_modes          = json

[admin:qintel_qsentry_feed_config]
match = /
members = qintel_qsentry_feed_settings

[admin_external:qintel_qsentry_feed_settings]
handlertype = python
handlerfile = qintel_qsentry_feed_rh_settings.py
handleractions = edit, list
python.version = python3
