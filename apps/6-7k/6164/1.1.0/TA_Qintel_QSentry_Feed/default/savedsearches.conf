[qintel_feed_generate_network_intel]
cron_schedule = */5 * * * *
allow_skew = 50%
dispatch.earliest_time = -5m@m
dispatch.latest_time = now
enableSched = 1
search = | datamodel qsentry_feed Network_Intel search | rename qsentry_feed.Network_Intel.src_ip as src_ip | qsentryfeed ip_field=src_ip \
| where isnotnull(qintel_tags) \
| `qsentry_feed_geo_lookup` src_ip | `qintel_shrink_threat_fields` \
| table _time,sourcetype,host,src_ip,qintel_*,lat,lon \
| collect `qintel_index` marker="type=\"qintel_network_intel\", search_name=\"qintel_generate_network_intel\""

[qintel_update_feed]
description = "Updates Qintel Qsentry Feed"
action.summary_index = 1
action.summary_index.type = qintel_update_feed
cron_schedule = 0 */1 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
schedule_window = auto
allow_skew = 2h
search = | rest /services/qintel_qsentry_feed/update_feed timeout=600

[qintel_clean_feed]
description = "Clears old entries from the local Qintel QSentry feed"
action.summary_index = 1
action.summary_index.type = qintel_clean_feed
cron_schedule = 30 */3 * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
schedule_window = auto
search = | rest /services/qintel_qsentry_feed/clean_feed timeout=900