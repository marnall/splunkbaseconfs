[Monthly Report on users hour count by project]
action.email = 1
action.email.inline = 1
disabled = 1
action.email.sendresults = 1
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 18 1 * *
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.statistics.overlay = heatmap
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = TA-clockify
request.ui_dispatch_view = search
search = `timeentries` `month` \
 \
| search workspace="*" | eval billable=if(billable == "true", "Billable", "Non billable") \
\
 \
| eval newtemp=hours*60 ,newtemp=newtemp+min+sec/60 \
| stats sum(newtemp) as Total sum(Totalamount) as "Monthly Bill" by name Project tasks clientName Amount billable \
| eval Total=round(Total/60,4) \
| eval "Monthly Bill" = round(Total*Amount,2) \
| eval Total=tostring(Total*60*60, "duration") \
| rex field=Total mode=sed "s/\.\d*//g" \
| eval Total=if(match(Total,"\+"),replace(Total,"(\d+)\+(\d+)\:(\d+)\:(\d+)","\1 Day \2 Hr \3 Min \4 Secs"),replace(Total,"(\d+)\:(\d+)\:(\d+)","\1 Hr \2 Min \3 Secs")) \
| rename name as "Clocked by" clientName as Client Amount as "Amount per hour" Total as "Total Time" billable as Billable tasks as Tasks \
| addcoltotals "Monthly Bill" labelfield="Total Time" label="Total Billing"

