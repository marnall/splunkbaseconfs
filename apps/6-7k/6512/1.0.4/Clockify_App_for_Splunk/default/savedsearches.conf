[Time Entry not filled]
action.email = 1
action.email.allow_empty_attachment = 0
action.email.include.trigger_time = 1
action.email.inline = 1
action.email.sendresults = 1
action.email.show_password = 1
action.email.useNSSubject = 1
alert.digest_mode = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 00 18 * * 1
disabled = 1
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = TA-clockify
request.ui_dispatch_view = search
search = `timeentries` \
| stats count by timeInterval.start name email\
| dedup name sortby - timeInterval.start \
| eval epoch_date = round(strptime('timeInterval.start', "%Y-%m-%dT%H:%M:%SZ"),0) \
| rename timeInterval.start as lastEvent | rex field=lastEvent "(?<date>\d+-\d+-\d+)" \
\
| eval diff=now()-epoch_date | eval hours=floor((diff%86400)/3600)|eval days=floor(diff/86400)\
| eval minutes=floor((diff % 3600)/60)\
| eval seconds=diff % 60|eval durations =days." Days".":".hours." hours".":".minutes." min"\
| table date name epoch_date diff durations email|rename durations as "Time since last filled" date as "Last Time Entry"\
| where diff > 604800|fields - epoch_date diff
