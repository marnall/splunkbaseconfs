[timeentries]
definition = `droplookup` \
| join projectId \
    [ search `index-name`  sourcetype="Clockify:Projects" earliest=0 latest=now() \
    | fields id name hourlyRate.amount clientName archived\
    | rename hourlyRate.amount as Amount \
    | eval Amount =Amount/100 \
    | rename id as projectId \
    | rename name as Project ] \
| join type=left  max=0 name \
    [ search `index-name` sourcetype="Clockify:Users" earliest=0 latest=now \
    |fields name email ]  \
| rex field=timeInterval.start "(?<date>\d+-\d+-\d+)" \
| rex field=timeInterval.duration "PT(?<time>\d+\w+)" \
| rex field=time max_match=0 "((?<hours>\d+)H)|((?<min>\d+)M)|((?<sec>\d+)S)" \
| fillnull \
| rex field=date "(?<year>\d{4})-(?<month>\d{2})-(?<day>\d{2})" \
| rex field=date "^(?<year>[^-]+)-(?<month>[^-]+)-(?<day>.+)" \
| eval min= if(len(min)=1,"0"+min,min) \
| eval hourscount = (hours.".".min)
iseval = 0

[month]
definition = | eval month=case(\
month="01","January",\
month="02","February",\
month="03","March",\
month="04","April",\
month="05","May",\
month="06","June",\
month="07","July",\
month="08","August",\
month="09","September",\
month="10","October",\
month="11","November",\
month="12","December",\
1=1, "INV")
iseval = 0

[droplookup]
definition = `index-name` sourcetype="Clockify:TimeEntries"| lookup id_workspace.csv id as workspaceId output workspace| lookup id_name.csv id as userId output name |eval bill=if(billable = "true","Billable","Non Billable")| lookup id_project.csv id as projectId output Project|lookup id_tasks.csv id as taskId output tasks
iseval = 0

[timeentries2]
definition = | eval newf = split(Time,".") \
| eval FieldB=mvindex(newf,0) \
| eval Fieldc=mvindex(newf,1) \
| eval FieldB=FieldB*60 \
| eval Fieldd=FieldB+Fieldc \
| eval mint=(Fieldd/60) \
| eval mint = split(mint,".") \
| eval Fielde=mvindex(mint,0) \
| eval toss = Fieldd % 60 |eval toss= if(len(toss)=1,"0"+toss,toss)\
| eval new_valu=Fielde+"."+toss \
| rename name as "Clocked by" clientName as Client Amount as "Amount per hour" new_valu as "Total hours"| fields _time Project tasks "Total hours"
iseval = 0

[index-name]
definition = index=clockify
iseval = 0
