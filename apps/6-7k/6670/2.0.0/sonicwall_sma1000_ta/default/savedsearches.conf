[Uptime by Appliance]
action.email.show_password = 1
action.email.useNSSubject = 1
dispatch.earliest_time = rt-1h
dispatch.latest_time = rt
display.general.timeRangePicker.show = 0
display.general.type = visualizations
display.page.search.mode = verbose
display.page.search.tab = visualizations
display.statistics.show = 0
display.visualizations.charting.axisTitleX.visibility = collapsed
display.visualizations.charting.axisTitleY.visibility = collapsed
display.visualizations.charting.axisTitleY2.visibility = collapsed
display.visualizations.charting.chart = bar
display.visualizations.charting.legend.placement = none
display.visualizations.singlevalue.rangeColors = ["0x53a051","0x0877a6","0xf8be34","0xf1813f","0xdc4e41"]
display.visualizations.trellis.enabled = 1
display.visualizations.type = singlevalue
request.ui_dispatch_app = sonicwall_sma1000_ta
request.ui_dispatch_view = search
search = eventtype=sma1000_system_status | fields uptime, host | stats latest(uptime) as uptime by host | fillnull uptime value=0 | eval uptime_days = round(uptime/86400, 2) . " days" | fields host, uptime_days
workload_pool = undefined

