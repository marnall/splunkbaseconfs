[Change Events]
action.email.useNSSubject = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.visualizations.show = 0
request.ui_dispatch_app = sonicwall_sma1000_ta
request.ui_dispatch_view = search
search = sourcetype="sonicwall:sma1000:audit:change"

[Disconnects by User]
action.email.show_password = 1
action.email.useNSSubject = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = visualizations
display.page.search.tab = visualizations
display.statistics.show = 1
display.visualizations.charting.axisLabelsY.majorUnit = 1
display.visualizations.charting.chart = bar
request.ui_dispatch_app = sonicwall_sma1000_ta
request.ui_dispatch_view = search
search = sourcetype="sonicwall:sma1000:audit:tunnel" AND type="session" AND error_id=* | fields user, error, error_description | lookup sonicwall_sma1000_traffic_codes description AS error_description | eval user_error = user . " / " . error | stats count(user_error) as error_count by user_error, error_description

[Disconnects by Source IP]
action.email.show_password = 1
action.email.useNSSubject = 1
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = visualizations
display.page.search.tab = visualizations
display.statistics.show = 1
display.visualizations.charting.axisLabelsY.majorUnit = 1
display.visualizations.charting.chart = bar
request.ui_dispatch_app = sonicwall_sma1000_ta
request.ui_dispatch_view = search
search = sourcetype="sonicwall:sma1000:audit:tunnel" AND type="session" AND error_id=* | fields src_ip, error, error_description | lookup sonicwall_sma1000_traffic_codes description AS error_description | eval src_ip_error = src_ip . " / " . error | stats count(src_ip_error) as error_count by src_ip_error, error_description
workload_pool = undefined

