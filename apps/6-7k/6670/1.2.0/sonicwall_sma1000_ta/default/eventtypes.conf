[sma1000_session_start]
search = sourcetype=sonicwall:sma1000:session AND type=start

[sma1000_session_update]
search = sourcetype=sonicwall:sma1000:session AND type=update

[sma1000_session_end]
search = sourcetype=sonicwall:sma1000:session AND type=end

[sma1000_session_failed]
search = sourcetype=sonicwall:sma1000:session AND action=failure

[sma1000_traffic]
search = (sourcetype=sonicwall:sma1000:audit:tunnel AND type=flow) OR sourcetype=sonicwall:sma1000:audit:web OR (sourcetype=sonicwall:sma1000:access AND action=blocked)

[sma1000_auth]
search = sourcetype=sonicwall:sma1000:auth:*

[sma1000_auth_privileged]
search = sourcetype=sonicwall:sma1000:auth:amc:*

[sma1000_change]
search = sourcetype=sonicwall:sma1000:audit:change

[sma1000_system_status]
search = sourcetype=sonicwall:sma1000:system_status
