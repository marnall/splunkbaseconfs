[set_sourcetype_sonicwall_sma1000_access]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:access
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma logserver: EventMessage: Resource Access

[set_sourcetype_sonicwall_sma1000_session]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:session
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma logserver: EventMessage: Session (?:Start Success|Start Failed|End|Update)

[set_sourcetype_sonicwall_sma1000_audit_tunnel]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:audit:tunnel
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma logserver: \[\d{2}\/\w{3}\/\d{4}:\d{2}:\d{2}:\d{2}\.\d{6} [+|-]\d{4}\] \S+ [\w\d]+ \w\w [\w\d]+ Info {4}Audit.*\bCommand='

[set_sourcetype_sonicwall_sma1000_audit_web]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:audit:web
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma logserver: \[\d{2}\/\w{3}\/\d{4}:\d{2}:\d{2}:\d{2}\.\d{6} [+|-]\d{4}\] \S+ [\w\d]+ \w\w [\w\d]+ Info {4}Audit.*\bRequest='

[set_sourcetype_sonicwall_sma1000_auth_amc_console_success_local]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:auth:amc:console
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma AUDIT: \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} [+|-]\d{4} INFO +\[[^\]]+\]: Login succeeded

[set_sourcetype_sonicwall_sma1000_auth_amc_console_success_policyserver]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:auth:amc:console
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma AMC: \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} [+|-]\d{4} INFO +com\.aventail\.mgmt\.console\.ConsoleActiveState - \[[^\]]+\]: Authentication successful

[set_sourcetype_sonicwall_sma1000_auth_amc_console_failure]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:auth:amc:console
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma AMC: \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} [+|-]\d{4} WARNING +com\.aventail\.mgmt\.jetty\.AmcLoginService - Authentication failed

[set_sourcetype_sonicwall_sma1000_auth_amc_rest_success]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:auth:amc:rest
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma AUDIT: \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} [+|-]\d{4} VERBOSE +\[[^\]]+\]: Performed

[set_sourcetype_sonicwall_sma1000_auth_amc_rest_failure]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:auth:amc:rest
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma AMC: \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} [+|-]\d{4} WARNING +com\.aventail\.mgmt\.jetty\.ConsoleAuthorization - API authentication failed

[set_sourcetype_sonicwall_sma1000_auth_tunnel_success]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:auth:tunnel
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma logserver: \[\d{2}\/\w{3}\/\d{4}:\d{2}:\d{2}:\d{2}\.\d{6} [+|-]\d{4}\] \S+ [\w\d]+ \w\w [\w\d]+ Info {4}Session Session Start: '[^']+', authenticated.

[set_sourcetype_sonicwall_sma1000_auth_tunnel_failure]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:auth:tunnel
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma logserver: \[\d{2}\/\w{3}\/\d{4}:\d{2}:\d{2}:\d{2}\.\d{6} [+|-]\d{4}\] \S+ [\w\d]+ \w\w [\w\d]+ Info {4}Session Authentication for user '[^']+' FAILED

[set_sourcetype_sonicwall_sma1000_audit_change]
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sonicwall:sma1000:audit:change
REGEX = ^<\d+>\w{3} {1,2}\d{1,2} \d{2}:\d{2}:\d{2} \S+\.sma AUDIT: +\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} [+|-]\d{4} INFO +\[[^\]]+\]: (?!Login|Logout)

[sonicwall_sma1000_traffic_codes]
filename = sonicwall_sma1000_traffic_codes.csv
