[syslog]
TRANSFORMS-sonicwall_sma1000 = set_sourcetype_sonicwall_sma1000_access, set_sourcetype_sonicwall_sma1000_audit_tunnel, set_sourcetype_sonicwall_sma1000_audit_web, set_sourcetype_sonicwall_sma1000_session, set_sourcetype_sonicwall_sma1000_auth_amc_console_success_local, set_sourcetype_sonicwall_sma1000_auth_amc_console_success_policyserver, set_sourcetype_sonicwall_sma1000_auth_amc_console_failure, set_sourcetype_sonicwall_sma1000_auth_amc_rest_success, set_sourcetype_sonicwall_sma1000_auth_amc_rest_failure, set_sourcetype_sonicwall_sma1000_auth_tunnel_success, set_sourcetype_sonicwall_sma1000_auth_tunnel_failure, set_sourcetype_sonicwall_sma1000_audit_change


[sonicwall:sma1000:access]
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^<\d+>
MAX_TIMESTAMP_LOOKAHEAD = 15
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Network & Security
description = SonicWall SMA1000 Access Events
disabled = false
KV_MODE = none

EXTRACT-sma1000_action = Allowed='(?P<action>0|1)'

EXTRACT-sma1000_dest_ip = Dest_IP='(?P<dest_ip>[\d\.]+):\d+'
EXTRACT-sma1000_dest_name = Full Destination='(?P<dest_name>(?!\d)[^']+)'
EXTRACT-sma1000_dest_port = Dest_IP='[^']+:(?P<dest_port>\d+)'

EXTRACT-sma1000_rule = Rule Info='(?P<rule>[^']+)'

EXTRACT-sma1000_src_ip = Src='(?P<src_ip>[\d\.]+):\d+'
EXTRACT-sma1000_src_port = Src='[^']+:(?P<src_port>\d+)'

EXTRACT-sma1000_user = User='(?P<user>[^']+)'

EVAL-action = IF(action == "0", "blocked", "allowed")

EVAL-dest = COALESCE(dest_name, dest_ip)

EVAL-vendor = "SonicWall"
EVAL-product = "SMA1000"
EVAL-vendor_product = "SonicWall SMA1000"

FIELDALIAS-sma1000_dvc = host AS dvc
FIELDALIAS-sma1000_src = src_ip AS src


[sonicwall:sma1000:session]
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^<\d+>
MAX_TIMESTAMP_LOOKAHEAD = 15
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Network & Security
description = SonicWall SMA1000 Session Events
disabled = false
KV_MODE = none

EXTRACT-sma1000_action = Session (?P<action>Start Success|Start Failed|End|Update)

EXTRACT-sma1000_dest_ip = FrameIP='(?P<dest_ip>[^']+)'

EXTRACT-sma1000_duration = duration=(?P<duration>\d+)

EXTRACT-sma1000_session_id = SessionKey='(?P<session_id>[\w\d:]+)'

EXTRACT-sma1000_src_ip = Source='(?P<src_ip>[\d\.]+)(?::\d+)?'

EXTRACT-sma1000_user = User='(?P<user>[^']+)'

EVAL-action = IF(action == "Start Failed", "failure", "success")

EVAL-type = CASE(action == "Start Success", "start", action == "Start Failed", NULL, TRUE(), LOWER(action))

EVAL-vendor = "SonicWall"
EVAL-product = "SMA1000"
EVAL-vendor_product = "SonicWall SMA1000"

FIELDALIAS-sma1000_dest = dest_ip AS dest
FIELDALIAS-sma1000_src = src_ip AS src


[sonicwall:sma1000:audit:tunnel]
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^<\d+>
MAX_TIMESTAMP_LOOKAHEAD = 15
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Network & Security
description = SonicWall SMA1000 Tunnel Events
disabled = false
KV_MODE = none

EXTRACT-sma1000_bytes_in = DstBytes='(?P<bytes_in>\d+)'
EXTRACT-sma1000_bytes_out = SrcBytes='(?P<bytes_out>\d+)'

EXTRACT-sma1000_duration = Duration='(?P<duration>\d+)'

EXTRACT-sma1000_dest_ip = Dest='(?P<dest_ip>[^']+):\d+'
EXTRACT-sma1000_dest_port = Dest='[^']+:(?P<dest_port>\d+)'

EXTRACT-sma1000_error_id = Error=(?!'0')'(?P<error_id>[\w\d]+)'

EXTRACT-sma1000_icmp_type = Command='Flow:ICMP' Dest='[^']+:(?P<icmp_type>\d+)'

EXTRACT-sma1000_session_id = SessionKey='(?P<session_id>[\w\d:]+)'

EXTRACT-sma1000_src_ip = Src='(?P<src_ip>[^']+):\d+'
EXTRACT-sma1000_src_port = Src='[^']+:(?P<src_port>\d+)'

EXTRACT-sma1000_transport = Command='Flow:(?P<transport>TCP|UDP|ICMP)'

EXTRACT-sma1000_user = User='(?P<user>[^']+)'

EVAL-action = "allowed"

EVAL-bytes = bytes_in + bytes_out
EVAL-dest_port = IF(transport IN ("TCP", "UDP"), dest_port, NULL)
EVAL-direction = "outbound"
EVAL-protocol = "ip"
EVAL-src_port = IF(transport IN ("TCP", "UDP"), src_port, NULL)
EVAL-type = IF(ISNULL(transport), "session", "flow")
EVAL-transport = LOWER(transport)

EVAL-vendor = "SonicWall"
EVAL-product = "SMA1000"
EVAL-vendor_product = "SonicWall SMA1000"

FIELDALIAS-sma1000_dest = dest_ip AS dest
FIELDALIAS-sma1000_dvc = host AS dvc
FIELDALIAS-sma1000_src = src_ip AS src

LOOKUP-error = sonicwall_sma1000_traffic_codes id AS error_id OUTPUT error
LOOKUP-error_description = sonicwall_sma1000_traffic_codes id AS error_id OUTPUT description AS error_description


[sonicwall:sma1000:audit:web]
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^<\d+>
MAX_TIMESTAMP_LOOKAHEAD = 15
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Network & Security
description = SonicWall SMA1000 Web Events
disabled = false
KV_MODE = none

EXTRACT-sma1000_bytes = Bytes='(?P<bytes>\d+)'

EXTRACT-sma1000_dest_ip = Request='\w+ (?!\/)(?:https?:\/\/)?(?<dest_ip>(?:[0-9]{1,3}\.){3}[0-9]{1,3})
EXTRACT-sma1000_dest_host = Request='\w+ (?!\/)(?:https?:\/\/)?+(?<dest_host>(?!(?:[0-9]{1,3}\.){3}[0-9]{1,3})[^':\/]+)

EXTRACT-sma1000_session_id = SessionKey='(?P<session_id>[\w\d:]+)'

EXTRACT-sma1000_src_ip = Src='(?P<src_ip>[^']+)'

EXTRACT-sma1000_user = User=(?!'-')'(?P<user>[^']+)'

EXTRACT-sma1000_virtual_host = VirtualHost='(?P<virtual_host>(?!(?:[0-9]{1,3}\.){3}[0-9]{1,3})[^']+)'
EXTRACT-sma1000_virtual_ip = VirtualHost='(?P<virtual_ip>(?:[0-9]{1,3}\.){3}[0-9]{1,3})'

EVAL-action = "allowed"

EVAL-dest = COALESCE(dest_host, virtual_host, IF(ISNULL(dest_ip) OR dest_ip == "127.0.0.1", virtual_ip, dest_ip))
EVAL-dest_host = COALESCE(dest_host, virtual_host)
EVAL-dest_ip = IF(ISNULL(dest_ip) OR dest_ip == "127.0.0.1", virtual_ip, dest_ip)

EVAL-virtual_host = NULL
EVAL-virtual_ip = NULL

EVAL-direction = "outbound"
EVAL-protocol = "ip"
EVAL-transport = "tcp"

EVAL-vendor = "SonicWall"
EVAL-product = "SMA1000"
EVAL-vendor_product = "SonicWall SMA1000"

FIELDALIAS-sma1000_dvc = host AS dvc
FIELDALIAS-sma1000_src = src_ip AS src


[sonicwall:sma1000:auth:amc:console]
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^<\d+>
MAX_TIMESTAMP_LOOKAHEAD = 15
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Network & Security
description = SonicWall SMA1000 AMC Console Authentication Events
disabled = false
KV_MODE = none

EXTRACT-sma1000_action = (?:Login|Authentication) (?P<action>successful|succeeded|failed)

EXTRACT-sma1000_user_success = \[(?P<user>[^\]]+)\]: (?:Login|Authentication) (?:successful|succeeded)
EXTRACT-sma1000_user_failed = Authentication failed: Username=(?P<user>[^,]+),

EXTRACT-sma1000_src_ip = Address=(?P<src_ip>\S+)\b

EVAL-action = CASE(action == "failed", "failure", TRUE(), "success")
EVAL-reason = CASE(action == "failed", "failure", TRUE(), "success")

EVAL-vendor = "SonicWall"
EVAL-product = "SMA1000"
EVAL-vendor_product = "SonicWall SMA1000"

FIELDALIAS-sma1000_dest = host AS dest
FIELDALIAS-sma1000_dest_host = host AS dest_host
FIELDALIAS-sma1000_src = src_ip AS src


[sonicwall:sma1000:auth:amc:rest]
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^<\d+>
MAX_TIMESTAMP_LOOKAHEAD = 15
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Network & Security
description = SonicWall SMA1000 AMC REST Authentication Events
disabled = false
KV_MODE = none

EXTRACT-sma1000_action = (?P<action>Performed|attempted) (?:GET|POST|PUT|DELETE) on resource

EXTRACT-sma1000_user_success = \[(?P<user>[^\]]+)\]: Performed (?:GET|POST|PUT|DELETE) on resource
EXTRACT-sma1000_user_failed = User (?P<user>\S+) attempted (?:GET|POST|PUT|DELETE) on resource

EXTRACT-sma1000_src_ip = from (?:IP )?address (?P<src_ip>\S+)\b

EVAL-action = CASE(action == "attempted", "failure", TRUE(), "success")
EVAL-reason = CASE(action == "attempted", "failure", TRUE(), "success")

EVAL-vendor = "SonicWall"
EVAL-product = "SMA1000"
EVAL-vendor_product = "SonicWall SMA1000"

FIELDALIAS-sma1000_dest = host AS dest
FIELDALIAS-sma1000_dest_host = host AS dest_host
FIELDALIAS-sma1000_src = src_ip AS src


[sonicwall:sma1000:auth:tunnel]
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^<\d+>
MAX_TIMESTAMP_LOOKAHEAD = 15
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Network & Security
description = SonicWall SMA1000 Tunnel Authentication Events
disabled = false
KV_MODE = none

EXTRACT-sma1000_action_success = (?P<action>authenticated)\.$
EXTRACT-sma1000_action_failed = (?P<action>FAILED) in method

EXTRACT-sma1000_user_success = Start: '(?P<user>[^']+)',
EXTRACT-sma1000_user_failed = Authentication for user '(?P<user>[^']+)' FAILED

EVAL-action = CASE(action == "authenticated", "success", TRUE(), "failure")
EVAL-reason = CASE(action == "authenticated", "success", TRUE(), "failure")

EVAL-vendor = "SonicWall"
EVAL-product = "SMA1000"
EVAL-vendor_product = "SonicWall SMA1000"

FIELDALIAS-sma1000_dest = host AS dest
FIELDALIAS-sma1000_dest_host = host AS dest_host


[sonicwall:sma1000:audit:change]
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^<\d+>
MAX_TIMESTAMP_LOOKAHEAD = 15
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Network & Security
description = SonicWall SMA1000 Change Events
disabled = false
KV_MODE = none

EXTRACT-sma1000_command = \]: (?P<command>.+)
EXTRACT-sma1000_user = \[(?P<user>[^\]]+)\]:

EVAL-vendor = "SonicWall"
EVAL-product = "SMA1000"
EVAL-vendor_product = "SonicWall SMA1000"

FIELDALIAS-sma1000_dest = host AS dest
FIELDALIAS-sma1000_dest_name = host AS dest_name
FIELDALIAS-sma1000_dvc = host AS dvc


[sonicwall:sma1000:system_status]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Network & Security
description = SonicWall SMA1000 System Status Polling Results
disabled = false

EVAL-resource_type = "system"

EVAL-vendor = "SonicWall"
EVAL-product = "SMA1000"
EVAL-vendor_product = "SonicWall SMA1000"

FIELDALIAS-sma1000_dest = host AS dest
FIELDALIAS-sma1000_dest_name = host AS dest_name