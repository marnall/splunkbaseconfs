[convert_time]
definition = eval Time=strftime(_time, "%F %T")
iseval = 0

[replace_slash]
definition = eval _raw=replace(_raw,"\\\\","/") | eval Artefact=replace(Artefact,"\\\\","/")
iseval = 0

[audit_assignments]
definition = rex field=source "\/(?P<auditfile>audit\.\w+$)" | eval audit_file=if(match(auditfile,"log.audit"), "elrond Log", if(match(auditfile,"lat.audit"), "Last Access Times", if(match(auditfile,"meta.audit"), "File Metadata", "-")))

[browser_name]
definition = rex field=source "/browsers/(?P<browser>[^/]+)/"
iseval = 0

[browser_domain_domain]
definition = search url=* | rex field=Domain "(?:https?://)?(?:www\.)?(?P<domain_domain>[^/:]+\.[^/:]+)(?:/|:)"
iseval = 0

[browser_domain_url]
definition = search url=* | rex field=url "(?:https?://)?(?:www\.)?(?P<domain_url>[^/:]+\.[^/:]+)(?:/|:)"
iseval = 0

[browser_domain]
definition = `browser_domain_domain` | `browser_domain_url` | eval domain = mvdedup(mvappend(domain_domain, domain_url)) | fields - domain_domain domain_url
iseval = 0

[jumplist_info]
definition = search logtype=jumplists | table index host mitre_id subid mitre_technique logtype Account JumplistType JumplistID | lookup jumplistID.csv appID AS JumplistID OUTPUT application source date | fillnull value=- | rename application AS Application date AS "Date(s)" source AS "ID Source" | table index host mitre_id subid mitre_technique logtype Account JumplistType JumplistID Application "ID Source" "Date(s)"
iseval = 0

[standard_ports]
definition = ForeignPort="110" OR ForeignPort="143" OR ForeignPort="465" OR ForeignPort="993" OR ForeignPort="995" OR ForeignPort="135" OR ForeignPort="137" OR ForeignPort="139" OR ForeignPort="20" OR ForeignPort="21" OR ForeignPort="22" OR ForeignPort="23" OR ForeignPort="25" OR ForeignPort="3389" OR ForeignPort="389" OR ForeignPort="88" OR ForeignPort="1433" OR ForeignPort="1521" OR ForeignPort="3306" OR ForeignPort="5900" OR ForeignPort="445" OR ForeignPort="53" OR ForeignPort="5355" OR ForeignPort="5800" OR ForeignPort="5895" OR ForeignPort="5938" OR ForeignPort="5984" OR ForeignPort="5986" OR ForeignPort="8200" OR ForeignPort="5900" OR ForeignPort="69" OR ForeignPort="989" OR ForeignPort="990" OR ForeignPort="80" OR ForeignPort="443" OR ForeignPort="2375" OR ForeignPort="2376" OR LocalPort="110" OR LocalPort="143" OR LocalPort="465" OR LocalPort="993" OR LocalPort="995" OR LocalPort="135" OR LocalPort="137" OR LocalPort="139" OR LocalPort="20" OR LocalPort="21" OR LocalPort="22" OR LocalPort="23" OR LocalPort="25" OR LocalPort="3389" OR LocalPort="389" OR LocalPort="88" OR LocalPort="1433" OR LocalPort="1521" OR LocalPort="3306" OR LocalPort="5900" OR LocalPort="445" OR LocalPort="53" OR LocalPort="5355" OR LocalPort="5800" OR LocalPort="5895" OR LocalPort="5938" OR LocalPort="5984" OR LocalPort="5986" OR LocalPort="8200" OR LocalPort="5900" OR LocalPort="69" OR LocalPort="989" OR LocalPort="990" OR LocalPort="80" OR LocalPort="443" OR LocalPort="2375" OR LocalPort="2376"
iseval = 0

[non-standard_ports]
definition = ForeignPort!="110" ForeignPort!="143" ForeignPort!="465" ForeignPort!="993" ForeignPort!="995" ForeignPort!="135" ForeignPort!="137" ForeignPort!="139" ForeignPort!="20" ForeignPort!="21" ForeignPort!="22" ForeignPort!="23" ForeignPort!="25" ForeignPort!="3389" ForeignPort!="389" ForeignPort!="88" ForeignPort!="1433" ForeignPort!="1521" ForeignPort!="3306" ForeignPort!="5900" ForeignPort!="445" ForeignPort!="53" ForeignPort!="5355" ForeignPort!="5800" ForeignPort!="5895" ForeignPort!="5938" ForeignPort!="5984" ForeignPort!="5986" ForeignPort!="8200" ForeignPort!="5900" ForeignPort!="69" ForeignPort!="989" ForeignPort!="990" ForeignPort!="80" ForeignPort!="443" ForeignPort="2375" ForeignPort="2376" LocalPort!="110" LocalPort!="143" LocalPort!="465" LocalPort!="993" LocalPort!="995" LocalPort!="135" LocalPort!="137" LocalPort!="139" LocalPort!="20" LocalPort!="21" LocalPort!="22" LocalPort!="23" LocalPort!="25" LocalPort!="3389" LocalPort!="389" LocalPort!="88" LocalPort!="1433" LocalPort!="1521" LocalPort!="3306" LocalPort!="5900" LocalPort!="445" LocalPort!="53" LocalPort!="5355" LocalPort!="5800" LocalPort!="5895" LocalPort!="5938" LocalPort!="5984" LocalPort!="5986" LocalPort!="8200" LocalPort!="5900" LocalPort!="69" LocalPort!="989" LocalPort!="990" LocalPort!="80" LocalPort!="443" LocalPort="2375" LocalPort="2376
iseval = 0

[make_userprofile]
definition = `replace_slash` | rex field=_raw "(?:\/Users\/|[^A-Za-z]\/home\/)(?<user_profile>[^\/\+\"\]\,\;]+)" | eval user_profile=trim(user_profile)
iseval = 0

[make_fileinfo]
definition = rex field=Filename "(?P<Filepath>.*)\/(?P<Filename>[^\/]+)\.(?P<Fileext>[^\.\/]+$)" | fillnull value=-
iseval = 0

[MITRE_lookup]
definition = search mitre_technique!=- | mvexpand mitre_technique | rex field=mitre_technique "^(?P<mitre_id>T\d{4}\.\d{3}) - (?P<mitre_technique>.*)$" | lookup mitre.csv name AS mitre_technique mitre_id AS mitre_id OUTPUT parent_id AS "id" tactic AS "tactic" threat_actor AS "threat_actor" platform AS "platform" software AS "software" mitre_description AS "mitre_description" | search mitre_description=* | fillnull value=- | rex mode=sed field=mitre_description "s/%22/\"/g" | rex mode=sed field=mitre_description "s/%27/'/g" | rex mode=sed field=detection "s/%22/\"/g" | rex mode=sed field=detection "s/%27/'/g" | rename tag::host AS elrond_tags | mvexpand elrond_tags
iseval = 0

[MITRE_sort-tactics]
definition = replace "Initial Access" WITH "00Initial Access" IN tactic | replace "Execution" WITH "01Execution" IN tactic | replace "Persistence" WITH "02Persistence" IN tactic | replace "Privilege Escalation" WITH "03Privilege Escalation" IN tactic | replace "Defense Evasion" WITH "04Defense Evasion" IN tactic | replace "Credential Access" WITH "05Credential Access" IN tactic | replace "Discovery" WITH "06Discovery" IN tactic | replace "Lateral Movement" WITH "07Lateral Movement" IN tactic | replace "Collection" WITH "08Collection" IN tactic | replace "Command and Control" WITH "09Command and Control" IN tactic | replace "Exfiltration" WITH "10Exfiltration" IN tactic | replace "Impact" WITH "11Impact" IN tactic
iseval = 0

[expand-threat_actor]
definition = eval threat_actor=split(threat_actor,"; ") | mvexpand threat_actor | search threat_actor!=""
iseval = 0

[expand-software]
definition = eval software=split(software,"; ") | mvexpand software | search software!=""
iseval = 0

[usb_out]
definition = (source=*usb.log.json OR source="*system-launchdaemons+com.apple.usbd.plist.json" OR source="*syslog.*") | `replace_slash` | `convert_time` | search (ven=* OR prod=* OR serial=*) | table index host Time LastWriteTime disk serial ven prod | fillnull value=- | rename index AS Case host AS Host disk AS Disk serial AS "Serial No." ven AS Vendor prod AS Product
iseval = 0

