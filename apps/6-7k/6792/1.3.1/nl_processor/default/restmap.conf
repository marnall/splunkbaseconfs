[script:configure]
match                 = /configure
python.version        = python3
script                = handlers/configure.py
scripttype            = persist
handler               = configure.ConfigureHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passSystemAuth        = true
capability            = manage_configure

[script:get_configure]
match                 = /get_configure
python.version        = python3
script                = handlers/get_configure.py
scripttype            = persist
handler               = get_configure.GetConfigureHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passSystemAuth        = true
capability            = manage_configure