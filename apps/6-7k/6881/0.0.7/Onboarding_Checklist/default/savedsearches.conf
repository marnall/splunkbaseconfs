[splunkd.log]
action.email.useNSSubject = 1
dispatch.earliest_time = -1d
dispatch.latest_time = +1d
display.events.type = raw
display.visualizations.show = 0
request.ui_dispatch_app = Onboarding_Checklist
search = index=_internal sourcetype=splunkd log_level!=INFO | rex mode=sed field=event_message "s/\([^\)]+\)//g" | rex mode=sed field=event_message "s/(source=\/[^\/]+\/[^\/]+\/).*$/\1/" | rex mode=sed field=event_message "s/>= \d+/XXXX/" | rex mode=sed field=event_message "s/from (\d+\.\d+\.\d+\.\d+):\d\d\d+/from \1:NNNN/" | rex mode=sed field=event_message "s/from src=(\d+\.\d+\.\d+\.\d+):\d\d\d+/from src=\1:NNNNN/"| rex mode=sed field=event_message "s/ sid=[^\s]+/ sid=XXXX/" | rex mode=sed field=event_message "s/(\w+)=\d\d\d\d\d\d+/\1=NNNN/" | rex mode=sed field=event_message "s/\[\d+\]/[NNNN]/g" | rex mode=sed field=event_message "s/ \d+ms\./ NNms./g"| stats  count by event_message |sort - count


