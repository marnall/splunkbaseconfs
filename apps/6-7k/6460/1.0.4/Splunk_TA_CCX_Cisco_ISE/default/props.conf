# Lookups
LOOKUP-cisco-ise-change = cisco-ise-change-lookup MESSAGE_CODE OUTPUT change_type,command,object,object_attrs,object_category,result
LOOKUP-cisco-ise-message-catalog = cisco-ise-message-catalog-lookup MESSAGE_CODE OUTPUTNEW MESSAGE_CLASS MESSAGE_TEXT AS signature
LOOKUP-cisco-ise-message-catalog_2024 = cisco-ise-message-catalog-2024-lookup MESSAGE_CODE OUTPUTNEW MESSAGE_CLASS MESSAGE_TEXT AS signature dataset_name type action
LOOKUP-cisco-ise-service = cisco-ise-service-lookup MESSAGE_CODE OUTPUTNEW SERVICE as service, SERVICE as service_name, MESSAGE_CODE as service_id

