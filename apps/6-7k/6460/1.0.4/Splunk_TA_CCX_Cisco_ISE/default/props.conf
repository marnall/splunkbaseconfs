EVAL-user = if(AuthenticationStatus=="UnknownUser" OR match('UserName', "^\w+\-\w+\-\w+\-\w+\-\w+\-\w+$"), null(), if(match(replace(coalesce('x_user',Admin,AdminName,PortalUser,User, case(MESSAGE_CODE IN("60227", "60125", "60184", "60185", "60082", "60081", "60188"), "admin"), replace('AD_Host_Resolved_Identities', "(.*)\,$", "\1"), user), "host\/(.+)", "\1"), "^([^\.]+)\.westrac\.com\.au$"), replace(replace(coalesce(if(match('x_user', "\w+\\\\.*$"), replace('x_user', "^(\w+\\\\).*$", "\1") + replace('x_user', "^\w+\\\\\\\\(.*)$", "\1"), 'x_user'),Admin,AdminName,PortalUser,User, case(MESSAGE_CODE IN("60227", "60125", "60184", "60185", "60082", "60081", "60188"), "admin"), replace('AD_Host_Resolved_Identities', "(.*)\,$", "\1"), user), "host\/(.+)", "\1"), "^([^\.]+).*$", "\1"), replace(coalesce(if(match('x_user', "\w+\\\\.*$"), replace('x_user', "^(\w+\\\\).*$", "\1") + replace('x_user', "^\w+\\\\\\\\(.*)$", "\1"), 'x_user'),Admin,AdminName,PortalUser,User, case(MESSAGE_CODE IN("60227", "60125", "60184", "60185", "60082", "60081", "60188"), "admin"),replace('AD_Host_Resolved_Identities', "(.*)\,$", "\1"), user), "host\/(.+)", "\1")))
EVAL-user_name = coalesce(OriginalUserName,UserName,User-Name,User_Name,Admin,AdminName,PortalUser,User, case(MESSAGE_CODE IN("60227", "60125", "60184", "60185", "60082", "60081", "60188"), "admin"))
EVAL-vendor = "Cisco"
