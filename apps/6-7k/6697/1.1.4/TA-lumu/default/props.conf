[source::...ta-lumu*.log*]
sourcetype = talumu:log

[source::...ta_lumu*.log*]
sourcetype = talumu:log

[lumu]
EVAL-app = "Lumu"
EVAL-dest_ip = if(match(dest, "^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$") OR match(dest, "^(([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:)|fe80:(:[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]{1,}|::(ffff(:0{1,4}){0,1}:){0,1}((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9]).){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])|([0-9a-fA-F]{1,4}:){1,4}:((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9]).){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9]))$"), dest, "")
EVAL-id = if(isnotnull('data.incidentId'), 'data.incidentId', 'data.incident.id')
EVAL-threat_type = if(isnotnull('data.incident.adversaryTypes{}'), 'data.incident.adversaryTypes{}', "")
EVAL-type = case(eventType = "IncidentUpdated", "event", eventType = "NewIncidentCreated", "alert", 1 = 1, "")
EVAL-vendor_product = "Lumu"
FIELDALIAS-aob_gen_lumu_alias_1 = data.companyId AS company_id
FIELDALIAS-aob_gen_lumu_alias_13 = data.incident.adversaryId AS adversary
FIELDALIAS-aob_gen_lumu_alias_14 = data.incident.description AS description
FIELDALIAS-aob_gen_lumu_alias_16 = data.incident.id AS id
FIELDALIAS-aob_gen_lumu_alias_19 = data.comment AS comments
FIELDALIAS-aob_gen_lumu_alias_20 = data.reason AS reason
FIELDALIAS-aob_gen_lumu_alias_21 = data.contactSummary.endpointIp AS src_ip
FIELDALIAS-aob_gen_lumu_alias_22 = data.contactSummary.endpointName AS src
FIELDALIAS-aob_gen_lumu_alias_24 = data.contactSummary.adversaryHost AS dest
FIELDALIAS-aob_gen_lumu_alias_25 = data.companyId AS vendor_account
FIELDALIAS-aob_gen_lumu_alias_26 = data.contactSummary.label.name AS label
FIELDALIAS-aob_gen_lumu_alias_27 = data.incident.status AS status
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

