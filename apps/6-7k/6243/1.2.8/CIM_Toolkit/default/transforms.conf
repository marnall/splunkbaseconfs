[CIM_Toolkit_Datamodel_index_macros_validator]
batch_index_query = 0
case_sensitive_match = 1
filename = CIM_Toolkit_Datamodel_index_macros_validator.csv

# All 3 of these (v1-v3) are flawed:
# First, they work on RegEx101.com but not in Splunk.
# Second, they are occasionally not greedy enough.  Try this search:
# | makeresults | rename COMMENT2of2 AS "Test: 'Last 24 hours', preferably at least 7 days"
# If I make the capture greedy, then it gobbles up non-SPL KVPs.

[CIM_Toolkit_audittrail_KVPs_with_SPL_blockout_v1]
REGEX = (?:(?:(?ms)([^\s,=[]+)=(?<=search=)'(.+?)'(?=,\s(?:)))|(?:([^\s,=[]+)=["']?([^=\]]+?)["']?))(?:,\s?|\s?\])
FORMAT = $1::$2 $3::$4
REPEAT_MATCH = true
CLEAN_KEYS = 1

[CIM_Toolkit_audittrail_KVPs_with_SPL_blockout_v2]
REGEX = (?:(?:(?ms)(?<_KEY_1>[^\s,=[]+)=(?<=search=)'(?<_VAL_1>.+?)'(?=,\s(?:)))|(?:(?<_KEY_2>[^\s,=[]+)=["']?(?<_VAL_2>[^=\]]+?)["']?))(?:,\s?|\s?\])
REPEAT_MATCH = true
CLEAN_KEYS = 1

[CIM_Toolkit_audittrail_KVPs_with_SPL_blockout_v3]
REGEX = (?:(?:(?ms)(?<_KEY_1>[^\s,=[]+)=(?<=search=)'(?<_VAL_1>.+?)'(?=,\s(?:)))|(?:(?<_KEY_1>[^\s,=[]+)=["']?(?<_VAL_1>[^=\]]+?)["']?))(?:,\s?|\s?\])
REPEAT_MATCH = true
CLEAN_KEYS = 1

[CIM_Toolkit_audittrail_KVPs_missing_commas_misc]
REGEX = ,\sinfo=(?<info>.*?)\sreason=(?<reason>.*?)\suseragent="(?<useragent>[^"]+)"\sclientip=(?<clientip>.*?)\smethod=(?<method>.*?)(?:\s\w+=|])
REPEAT_MATCH = false

[CIM_Toolkit_audittrail_KVPs_missing_commas_src]
REGEX = ,\ssrc=(?<src>[\d\.\w]+?)(?:,?\s\w+=|])
REPEAT_MATCH = false

[CIM_Toolkit_audittrail_KVPs_missing_commas_user]
REGEX = ,\suser=(?<user>[\d\.\w]+?)(?:.?\s\w+=|])
REPEAT_MATCH = false
