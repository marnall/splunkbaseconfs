#[security_content_summariesonly]
#definition = summariesonly=false allow_old_summaries=true fillnull_value=null
#description = search data model's summaries only (copied from Splunk's ES support app "DA-ESS-ContentUpdate"

[security_content_ctime(1)]
args = fieldName_INPUT_OUTPUT
definition = rename TRACE AS "BEGIN MACRO 'security_content_ctime(1)'"\
| fieldformat $fieldName_INPUT_OUTPUT$=strftime($fieldName_INPUT_OUTPUT$,"%Y-%m-%dT%H:%M:%S %Z")\
| rename TRACE AS "END MACRO 'security_content_ctime(1)'"
errormsg = DESCRIPTION: The orignal version uses 'eval', but the right thing to do is to use 'fieldformat'.
iseval = 0

[history(2)]
args = searchRegExFilter_INPUT, userFilter_INPUT
definition = index="_audit" AND sourcetype="audittrail" AND "action=search" AND user="$userFilter_INPUT$"\
| rename COMMENT1of2 AS "DO NOT trust the default search extraction!"\
| rename COMMENT2of2 AS "Yes, this is 'too greedy' sometimes but that is better than chancing clippping off actrual search string"\
| rex "(?ms),\ssearch='(?<search>.+)'(?:,\s?|\s?\])"\
| eval len=len(search)\
| regex search="$searchRegExFilter_INPUT$"\
| stats max(_time) AS _time count first(len) AS len values(savedsearch_name) AS savedsearch_name BY search user\
| sort 0 - _time
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[history(1)]
args = searchRegExFilter_INPUT
definition = `history("$searchRegExFilter_INPUT$", "*")`
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[history]
definition = `history(".*", "*")`
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

