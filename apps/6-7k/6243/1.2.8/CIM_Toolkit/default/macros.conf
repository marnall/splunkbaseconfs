[CIM_Toolkit_Datamodel_Search(2)]
args = datamodelName_INPUT, nodeName_INPUT
definition = [|`CIM_Toolkit_Get_Datamodel_SPL($datamodelName_INPUT$, $nodeName_INPUT$, search)`\
| rename COMMENT AS "Escape double-quote characters or ERROR for outer 'eval' happens"\
| rex field=DRILLDOWN_SPL mode=sed "s/\"/\\\"/g"\
| return $search]
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[CIM_Toolkit_Datamodel_Search(3)]
args = datamodelName_INPUT, nodeName_INPUT, fieldName_OUTPUT
definition = eval [|`CIM_Toolkit_Get_Datamodel_SPL($datamodelName_INPUT$, $nodeName_INPUT$, $fieldName_OUTPUT$)`\
| rename COMMENT AS "Escape double-quote characters or ERROR for outer 'eval' happens"\
| rex field=DRILLDOWN_SPL mode=sed "s/\"/\\\"/g"\
| return $fieldName_OUTPUT$]
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[CIM_Toolkit_Get_Datamodel_SPL(3)]
args = datamodelName_INPUT, nodeName_INPUT, SPLfieldName_OUTPUT
definition = datamodel $datamodelName_INPUT$ $nodeName_INPUT$\
| rename TRACE AS "BEGIN MACRO 'CIM_Toolkit_Get_Datamodel_SPL(3)'"\
| spath path=constraints{}.search output=constraint\
| spath path=baseSearch           output=baseSearch\
| foreach baseSearch constraint [rex field=<<FIELD>> mode=sed "s/^/(/ s/$/)/" | eval <<FIELD>> = mvjoin(<<FIELD>>, " AND ")]\
| eval search = coalesce(constraint, baseSearch)\
| table search\
\
| rename COMMENT1of2 AS "The rest of the code expands the macro because otherwise we get this error:"\
| rename COMMENT2of2 AS "Error in 'SearchParser': The search specifies a macro 'cim_DataModelNameHere_indexes' that cannot be found"\
\
| rex field=search "[^`]+`(?<macro_name>[^`]+)"\
| map search="\
|makeresults\
| eval [\
|rest/servicesNS/-/Splunk_SA_CIM/admin/macros splunk_server=local\
| search title=$macro_name$\
| rex field=definition mode=sed \"s/\\\"/\\\\\\\"/g\"\
| eval definition=if(len(definition)>=5, definition, \"(index=* OR index=_*)\")\
| rename definition AS macro_definition\
| return macro_definition\
]\
| nomv search\
| eval search = replace(\"$search$\", \"`$macro_name$`\", \" \" . macro_definition . \" \")\
| table search\
"\
| rename search AS $SPLfieldName_OUTPUT$\
| rename TRACE AS "END MACRO 'CIM_Toolkit_Get_Datamodel_SPL(3)'"
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[CIM_Toolkit_Escape_Backslashes(2)]
args = SPLfieldName_INPUT_OUTPUT, stringFieldName_INPUT
definition = rename TRACE AS "BEGIN MACRO 'CIM_Toolkit_Escape_Backslashes(2)'"\
| rename COMMENT AS "Replace single-backslashes in '$stringFieldName_INPUT$=value' w/ backslashes"\
| rex field=$SPLfieldName_INPUT_OUTPUT$ mode=sed "s/($stringFieldName_INPUT$=\"?[^\\\]+)\\\([^\\\])/\1\\\\\\\\\2/g"\
| rename TRACE AS "END MACRO 'CIM_Toolkit_Escape_Backslashes(2)'"
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[CIM_Toolkit_Escape_Backslashes(1)]
args = SPLfieldName_INPUT
definition = replace($SPLfieldName_INPUT$, "\\\\", "\\\\\\")
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[CIM_Toolkit_Fix_unknowns_in_SPL(1)]
args = SPLfieldName_INPUT_OUTPUT
definition = rename TRACE AS "BEGIN MACRO 'CIM_Toolkit_Fix_unknowns_in_SPL(1)'"\
| `CIM_Toolkit_Fix_unknowns_in_SPL($SPLfieldName_INPUT_OUTPUT$, "unknown")`\
| rename TRACE AS "END MACRO 'CIM_Toolkit_Fix_unknowns_in_SPL(1)'"
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[CIM_Toolkit_Fix_unknowns_in_SPL(2)]
args = SPLfieldName_INPUT_OUTPUT, SPLfieldName_INPUT
definition = rename TRACE AS "BEGIN MACRO 'CIM_Toolkit_Fix_unknowns_in_SPL(2)'"\
| rename COMMENT1of4 AS "Inside of a datamodel, certain fields are given a value of 'unknown'"\
| rename COMMENT2of4 AS "whenever it does not have a value, and yet 'unknown' may also be a real value!"\
| rename COMMENT3of4 AS "Therefore, we must check for this and accommodate it, if it happens to occur,"\
| rename COMMENT4of4 AS "by changing 'foo=unkownn' into '(NOT foo=* OR foo=unknown OR foo="")' everywhere."\
| rex field=$SPLfieldName_INPUT_OUTPUT$ mode=sed "s/([^=\s]+)(\s*=\s*\"?$SPLfieldName_INPUT$\"?)(?=$|[\s\|])/(NOT \1=\"*\" OR \1=\"\" OR \1=\"$SPLfieldName_INPUT$\")/g"\
| rename TRACE AS "END MACRO 'CIM_Toolkit_Fix_unknowns_in_SPL(2)'"
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[CIM_Toolkit_Extract_BaseSearch_SPL]
definition = rest/servicesNS/-/Splunk_SA_CIM/data/models splunk_server=local\
| rename TRACE AS "BEGIN MACRO 'CIM_Toolkit_Extract_BaseSearch_SPL'"\
| search acceleration=1 AND eai:acl.app="Splunk_SA_CIM" AND NOT title="Splunk_Audit"\
| dedup id\
| table eai:acl.app eai:acl.owner eai:acl.sharing disabled title acceleration acceleration.backfill_time eai:data\
| rename eai:acl.* AS * eai:data AS constraint\
| sort 0 title\
| table title constraint\
| rename constraint AS _raw\
| spath path=objects{}.constraints{}.search output=constraint\
| spath path=objects{}.baseSearch           output=baseSearch\
| eval baseSearch = coalesce(mvindex(constraint, 0), mvindex(baseSearch, 0))\
| table title baseSearch\
| rename COMMENT AS "Replace the existing macro call with the broadest possible net to search for events we might be missing now"\
| rex field=baseSearch mode=sed "s/`cim_.+?_indexes`/(index=* OR index=_*)/g"\
| rename COMMENT AS "Some DMs have extra stuff in the baseSearch that should not be there (e.g. 'Endpoint' has '| eval ...'); strip it"\
| rex field=baseSearch mode=sed "s/\|.*$// s/^/(/ s/$/)/"\
| rename TRACE AS "END MACRO 'CIM_Toolkit_Extract_BaseSearch_SPL'"
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[CIM_Toolkit_Extract_Node_List]
definition = rest /servicesNS/-/Splunk_SA_CIM/data/models splunk_server=local\
| rename TRACE AS "BEGIN MACRO 'CIM_Toolkit_Extract_Node_List'"\
| search eai:acl.app="Splunk_SA_CIM" AND NOT title="Splunk_Audit"\
| dedup id\
| rename eai:acl.* AS * eai:data AS constraint\
| sort 0 title\
| rename constraint AS _raw\
| fields _raw eai:acl.app eai:acl.owner eai:acl.sharing disabled title acceleration acceleration.backfill_time eai:data *\
| table _raw title\
| rex mode=sed "s/\"fields\":\s*\[[^]]+\]//g"\
| rex max_match=0 "(?ms)(?<keepers>\"objectName\": .*?\"parentName\": [^\r\n]+)"\
| table keepers title\
| mvexpand keepers\
| rename keepers AS _raw\
| rex mode=sed "s/\":\s*/=/g s/[\r\n\s]+\"/ /g s/^\"//"\
| kv\
| rename TRACE AS "END MACRO 'CIM_Toolkit_Extract_Node_List'"
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

