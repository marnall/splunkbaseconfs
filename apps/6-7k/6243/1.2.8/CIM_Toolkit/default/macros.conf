[CIM_Toolkit_Generate_Renames]
definition = `CIM_Toolkit_Generate_Renames(*)`
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[CIM_Toolkit_Generate_Renames(1)]
args = datamodelFilterCIM_INPUT
definition = `CIM_Toolkit_Extract_Node_List`\
| rename TRACE AS "BEGIN MACRO 'CIM_Toolkit_Generate_Renames(1)'"\
| search title IN("$datamodelFilterCIM_INPUT$")\
| search parentName = "Base*"\
| fields - _raw displayName\
| appendpipe [\
| map maxsearches=999 search="\
| `CIM_Toolkit_Extract_Node_List`\
| search title=\"$title$\" AND parentName=\"$objectName$\"\
| stats values(objectName) AS child1 BY title parentName\
| eval parentName=\"$parentName$\"\
| eval objectName=\"$objectName$\"\
"]\
| fillnull value="" child1\
| mvexpand child1\
| appendpipe [\
| map maxsearches=999 search="\
| `CIM_Toolkit_Extract_Node_List`\
| search title=\"$title$\" AND parentName=\"$child1$\"\
| stats values(objectName) AS child2 BY title parentName\
| eval parentName=\"$parentName$\"\
| eval objectName=\"$objectName$\"\
| eval child1=\"$child1$\"\
"]\
| reverse\
| dedup title parentName objectName child1\
| fillnull value="" child2\
| mvexpand child2\
| appendpipe [\
| map maxsearches=999 search="\
| `CIM_Toolkit_Extract_Node_List`\
| search title=\"$title$\" AND parentName=\"$child2$\"\
| stats values(objectName) AS child3 BY title parentName\
| eval parentName=\"$parentName$\"\
| eval objectName=\"$objectName$\"\
| eval child1=\"$child1$\"\
| eval child2=\"$child2$\"\
"]\
| reverse\
| dedup title parentName objectName child1 child2\
| fillnull value="" child3\
| mvexpand child3\
| eventstats dc(child1) AS dc_child1 BY title parentName objectName\
| where len(child1)>0 OR dc_child1==1\
| fields - keep_triple_null dc_child1\
| foreach child* [ eval <<FIELD>> = if(len(<<FIELD>>)>1, <<FIELD>>, null()) ]\
| eval rename = mvappend(\
"| rename " . objectName . "." . child1 . "." . child2 . "." . child3 . ".* AS *",\
"| rename " . objectName . "." . child1 . "." . child2 . ".* AS *",\
"| rename " . objectName . "." . child1 . ".* AS *",\
"| rename " . objectName . ".* AS *")\
| eval rename = if(parentName=="BaseSearch", "| rename " . objectName . ".* AS *", rename)\
| stats values(rename) AS rename ```BY title <- DO NOT DO THIS!  Remain agnostic, in case of doubles (e.g. Change vs. Change_Analysis)```\
| mvexpand rename\
| eval _len=len(rename)\
| sort 0 - _len + rename\
| sort 0 - rename - _len\
| reverse\
| append [\
| makeresults\
| eval rename = mvappend(\
"| rename COMMENT AS \"BE SURE TO START at the leaves (maximum depth) of the DM tree nodes *FIRST*!\"",\
"| rename CREATED AS \"SPL auto-generated against CIM version " . [\
| rest /services/apps/local splunk_server=local\
| search title="Splunk_SA_CIM"\
| appendpipe [ stats count AS version | where version==0 ]\
| table label title version\
| eval version = "\"" . version . "\""\
| return $version\
] . " by `CIM_Toolkit_Generate_Renames` macro on " . strftime(now(), "%F %T %z") . ".\"",\
"rename TRACE AS \"BEGIN MACRO 'CIM_Toolkit_Normalize_Fieldnames'\"")\
| fields - _time\
| mvexpand rename ]\
| reverse\
| append [\
| makeresults\
| eval rename = "| rename TRACE AS \"END MACRO 'CIM_Toolkit_Normalize_Fieldnames'\""\
| fields - _time\
| mvexpand rename ]\
| streamstats count\
| eval rename = printf("%03d", count) . "::" . rename\
| stats values(rename) AS rename\
| rex field=rename mode=sed "s/^\d+:://"\
| nomv rename\
| eval rename = replace(rename, " \| ", "\
| ")\
| rename TRACE AS "END MACRO 'CIM_Toolkit_Generate_Renames(1)'"
errormsg = DESCRIPTION: This is the main guts for the "CIM_Toolkit_Normalize_Fieldnames" macro

[CIM_Toolkit_isempty(1)]
args = fieldName_INPUT
definition = (isnull($fieldName_INPUT$) OR $fieldName_INPUT$=="")
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[isnull(1)]
args = fieldName_INPUT
definition = `CIM_Toolkit_isempty($fieldName_INPUT$)`
errormsg = DESCRIPTION: The built in 'isnull' function does not handle the "empty" case; it would be better to use this macro.
iseval = 0
