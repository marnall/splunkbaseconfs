[CIM_Toolkit_SETTING_Splunk_Infrastructure_host_values]
definition = [|tstats count\
WHERE index="_internal" AND source="*license_usage.log*" earliest=-24h latest=now\
BY host splunk_server\
| rename COMMENT AS "Feel free to replace this with a simple hard-coded list"\
| eval host = mvappend(host, splunk_server)\
| mvexpand host\
| stats sum(count) BY host\
| table host\
| format]
