| search httpport="*"\
| head 1\
| eval URLprefix = "\"" . if(enableSplunkWebSSL==0, "http", "https") . "://" . host . if(httpport IN("443","8443"), "", ":" . httpport) . "\""\
| return $URLprefix ]
errormsg = DESCRIPTION: Author = Gregg Woodcock <woodcock@Splunxter.com>
iseval = 0

[CIM_Toolkit_addinfo]
definition = rename TRACE AS "BEGIN MACRO 'CIM_Toolkit_addinfo'"\
| addinfo\
| rename COMMENT AS "Convert '+Infinity' to an actual number and strip subseconds"\
| replace "+Infinity" WITH "2147483647" IN info_max_time\
```| foreach info_min_time info_max_time [rex field=<<FIELD>> mode=sed "s/\.\d+//"]```\
| fields - info_sid info_search_time\
| rename TRACE AS "END MACRO 'CIM_Toolkit_addinfo'"
errormsg = DESCRIPTION: This normalizes the 'info_max_time` value so that it can always be safely used with 'latest='
iseval = 0

[addinfo]
