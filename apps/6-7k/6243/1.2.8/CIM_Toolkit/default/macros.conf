definition = rename TRACE AS "BEGIN MACRO 'CIM_Toolkit_duration(2)'"\
| fieldformat $fieldName_OUTPUT$ = if($fieldName_INPUT$<0, "-", "+") . tostring(abs($fieldName_INPUT$), "duration")\
| rename TRACE AS "END MACRO 'CIM_Toolkit_duration(2)'"
errormsg = DESCRIPTION: The built-in 'tostring($fieldName_INPUT$, "duration")' function does not handle negative numbers
