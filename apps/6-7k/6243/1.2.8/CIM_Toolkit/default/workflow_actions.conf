[src_host_DNSLOOKUP]
display_location = both
fields = src_host
label = DNS Lookup on src_host $src_host$
search.preserve_timerange = 1
search.search_string = | makeresults | eval src_host = "$src_host$" | lookup dnslookup clienthost AS src_host
search.target = blank
type = search

[src_ip_DNSLOOKUP]
display_location = both
fields = src_ip
label = DNS Lookup on src_ip $src_ip$
search.preserve_timerange = 0
search.search_string = | makeresults | eval src_ip = "$src_ip$" | lookup dnslookup clientip AS src_ip
search.target = blank
type = search

[src_DNSLOOKUP]
display_location = both
fields = src
label = DNS Lookup on src $src$
search.preserve_timerange = 1
search.search_string = | makeresults | eval src_ip = "$src$" | lookup dnslookup clientip AS src_ip  | eval src_host = "$src$" | lookup dnslookup clienthost AS src_host
search.target = blank
type = search

[dest_DNSLOOKUP]
display_location = both
fields = dest
label = DNS Lookup on dest $dest$
search.preserve_timerange = 1
search.search_string = | makeresults | eval dest_ip = "$dest$" | lookup dnslookup clientip AS dest_ip  | eval dest_host = "$dest$" | lookup dnslookup clienthost AS dest_host
search.target = blank
type = search

[AME_DRILLDOWN_SPL]
display_location = both
fields = _DRILLDOWN_NAME,_DRILLDOWN_SEARCH
label = $_DRILLDOWN_NAME$
search.preserve_timerange = 1
search.search_string = $_DRILLDOWN_SEARCH$
search.target = blank
type = search

[AME_DRILLDOWN_VIZ]
display_location = both
fields = _DRILLDOWN_NAME_VIZ, _DRILLDOWN_SEARCH_VIZ
label = $_DRILLDOWN_NAME_VIZ$
search.preserve_timerange = 1
search.search_string = $_DRILLDOWN_SEARCH_VIZ$
search.target = blank
type = search

[AME_DRILLDOWN_2]
display_location = both
fields = _DRILLDOWN_NAME_2, _DRILLDOWN_SEARCH_2
label = $_DRILLDOWN_NAME_2$
search.preserve_timerange = 1
search.search_string = $_DRILLDOWN_SEARCH_2$
search.target = blank
type = search

