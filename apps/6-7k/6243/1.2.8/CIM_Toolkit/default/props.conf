[audittrail-FIXME-Does-not-work-just-yet]
# The logs (and therefore the field extractions) for this sourcetype are an absolute SHAMBLES and pollute ALL the CIM datamodels!
# If we allow automatic KV_MODE field extractions, then SPL logged from executed searches is mistakenly parsed; we must DISALLOW this!
KV_MODE = none
AUTO_KV_JSON = false
# Disable the broken extraction for 'search' field from the monitoring console (splunk_monitoring_console)
EXTRACT-search_string = 
# Now that we have blocked the standard/automatic/broken ways of getting fields (including 'search'), do it smarter.  Order is important!
# The first transform fixes the broken 'search' field, the next 2 grab the few fields that aren't separated by commas
REPORT-CIM_Toolkit_audittrail_KVPs = CIM_Toolkit_audittrail_KVPs_with_SPL_blockout_v2, CIM_Toolkit_audittrail_KVPs_missing_commas_misc, CIM_Toolkit_audittrail_KVPs_missing_commas_src, CIM_Toolkit_audittrail_KVPs_missing_commas_user
# For some reason splunk GUI login events in this sourcetype have 'src' value of 'unspecified' which is crazy (and I can't find out how)!
EVAL-src = coalesce(clientip, src_ip, src)
EVAL-src_ip = coalesce(clientip, src_ip, src)
