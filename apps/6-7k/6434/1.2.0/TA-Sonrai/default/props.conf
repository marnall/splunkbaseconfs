[sonrai:sec:tickets]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TIME_PREFIX = \"lastModifiedtimestamp\":\s*
TIME_FORMAT = %s

REPORT-report_ticketId = report_ticket_id
FIELDALIAS-all_tickets_affect_dest = resourceLabel as affect_dest
FIELDALIAS-all_tickets_comment = ticketKeyName as comments
FIELDALIAS-all_tickets_description = title as description
FIELDALIAS-all_tickets_dest_category = resourceType as dest_category
FIELDALIAS-all_tickets_severity_id = severityNumeric as severity_id
FIELDALIAS-all_tickets_src_user = createdBy as src_user
FIELDALIAS-all_tickets_ticket_id = ticketId as ticket_id
FIELDALIAS-all_tickets_time_submitted = createdDate as time_submitted
FIELDALIAS-all_tickets_user = assignedTo as user

EVAL-severity = case(severityCategory="INFORMATIONAL", "info", \
                    severityCategory="LOW", "low", \
                    severityCategory="MEDIUM", "medium", \
                    severityCategory="HIGH", "high", \
                    severityCategory="CRITICAL", "critical")
EVAL-cloudType = case('cloudType'=="aws", "AWS", 'cloudType'=="gcp", "GCP", 'cloudType'=="azure", "AZURE", 'cloudType'=="oci", "OCI")
EVAL-status = case('status'=="RISK_ACCEPTED", "RISK ACCEPTED", 1==1, status)

[source::...ta-sonrai*.log*]
SHOULD_LINEMERGE = true
sourcetype = tasonrai:log

[source::...ta_sonrai*.log*]
SHOULD_LINEMERGE = true
sourcetype = tasonrai:log
