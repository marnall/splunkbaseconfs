# this add-on is powered by splunk Add-on builder
[id]
name = the-docker-app-for-splunk
version = 1.0.2

[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 3

[launcher]
author = Avotrix
version = 1.0.2
description = The App helps to gain valuable insight of your Docker platform such as information on the containers and their stats, list of images on the server.

[ui]
is_visible = 1
label = Docker App for Splunk
docs_section_override = AddOns:released

[package]
id = the-docker-app-for-splunk
check_for_updates = True

[triggers]
reload.addon_builder = simple
reload.the_docker_app_for_splunk_account = simple
reload.the_docker_app_for_splunk_settings = simple
reload.passwords = simple

