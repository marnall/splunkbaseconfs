
[expose:Transmit_security_settings]
pattern = Transmit_security_settings
methods = POST, GET

[expose:Transmit_security_settings_specified]
pattern = Transmit_security_settings/*
methods = POST, GET, DELETE

[expose:Transmit_security_transmit]
pattern = Transmit_security_transmit
methods = POST, GET

[expose:Transmit_security_transmit_specified]
pattern = Transmit_security_transmit/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
