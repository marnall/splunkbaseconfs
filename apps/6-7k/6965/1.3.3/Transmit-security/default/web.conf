[expose:Transmit_security_settings]
pattern = Transmit_security_settings
methods = POST, GET

[expose:Transmit_security_settings_specified]
pattern = Transmit_security_settings/*
methods = POST, GET, DELETE

[expose:Transmit_security_transmit_security]
pattern = Transmit_security_transmit_security
methods = POST, GET

[expose:Transmit_security_transmit_security_specified]
pattern = Transmit_security_transmit_security/*
methods = POST, GET, DELETE

[expose:data/indexes]
pattern = data/indexes
methods = GET
