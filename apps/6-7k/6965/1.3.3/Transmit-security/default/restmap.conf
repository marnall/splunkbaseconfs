[admin:Transmit_security_configuration]
match = /
members = Transmit_security_settings

[admin:Transmit_security_inputs]
match = /
members = Transmit_security_transmit_security

[admin_external:Transmit_security_settings]
handlertype = python
python.version = python3
handlerfile = Transmit_security_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:Transmit_security_transmit_security]
handlertype = python
python.version = python3
handlerfile = Transmit_security_rh_transmit_security.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
