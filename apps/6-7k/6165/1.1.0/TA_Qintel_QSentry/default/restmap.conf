[admin:qintel_qsentry]
match = /qintel_qsentry
members = qintel_clean_qsentry_cache

[script:qintel_clean_qsentry_cache]
match = /qintel_qsentry/clean_cache
scripttype  = persist
script = clean_cache.py
handler = clean_cache.Clean
python.version = python3
requireAuthentication = true
output_modes          = json

[admin:qintel_qsentry_config]
match = /
members = qintel_qsentry_settings

[admin_external:qintel_qsentry_settings]
handlertype = python
handlerfile = qintel_qsentry_rh_settings.py
handleractions = edit, list
python.version = python3
