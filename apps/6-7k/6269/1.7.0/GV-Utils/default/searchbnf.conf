[urlencode-command]
syntax = urlencode <field>
shortdesc = Encode text so it can be included safely in a URL
description = Makes a piece of text safe to include as part of a URL by encoding any special characters
usage = public
example1 = urlencode search
comment1 = Encodes the content of 'search'. Creates the 'search_encoded' field 

[splparse-command]
syntax = splparse <field>
shortdesc = Takes some SPL and splits it in individual search commands
description = Creates a multivalue field breaking down individual search commands of the SPL passed in <field>.
usage = public
example1 = splparse search
comment1 = Creates the 'parsed_search' field.

[splevalvalues-command]
syntax = splevalvalues <field>
shortdesc = Takes some eval command(s) (e.g. from splparse) and lists potential values
description = Creates a multivalue field listing potential values that the eval command in <field> might yield (very crude).
usage = public
example1 = splevalvalues eval
comment1 = Creates the 'values_eval' field.

[splhighlight-command]
syntax = splhighlight <field>
shortdesc = Takes some SPL and create a syntax-highlighted version
description = Creates HTML that represents a syntax-highlighted version of the SPL passed in <field>. You can render the HTML with GV-Utils:htmliser.js. You'll need to include the CSS with either GV-Utils:gv_spl_highlight_light.css or GV-Utils:gv_spl_highlight_dark.css depending on your dashboard's theme.
usage = public
example1 = splhighlight search
comment1 = Creates the 'html_search' field.

[xmlhighlight-command]
syntax = xmlhighlight <field>
shortdesc = Takes some XML and create a syntax-highlighted version
description = Creates HTML that represents a syntax-highlighted version of the XML passed in <field>. You can render the HTML with GV-Utils:htmliser.js. You'll need to include the CSS with either GV-Utils:gv_xml_highlight_light.css or GV-Utils:gv_xml_highlight_dark.css depending on your dashboard's theme.
usage = public
example1 = xmlhighlight definition
comment1 = Creates the 'html_definition' field.

[jsonhighlight-command]
syntax = jsonhighlight <field>
shortdesc = Takes some JSON and create a syntax-highlighted version
description = Creates HTML that represents a syntax-highlighted version of the JSON passed in <field>. You can render the HTML with GV-Utils:htmliser.js. You'll need to include the CSS with either GV-Utils:gv_json_highlight_light.css or GV-Utils:gv_json_highlight_dark.css depending on your dashboard's theme.
usage = public
example1 = jsonhighlight definition
comment1 = Creates the 'html_definition' field.

[summarise-command]
syntax = summarise (<multivalue-options>)* (<max_length-options>)* (<exclude_empty-options>)* (<json-options>)* (<add_prefix-options>)* (<remove_prefix-options>)* <field>
shortdesc = Reads a bunch of fields and report their content.
description = <field> must be a multivalue list of fields of interest. The command will produce a single 'summary' field that serialises the content of said fields. In a particular set of events, each event might have different key fields you want to highlight. This command allows you to gather them to avoid having a very sparse table with lots of columns.
usage = public
example1 = summarise fields_of_interest
comment1 = Creates the 'summary' field. 'fields_of_interest' must be a multivalue list of fields.

[multivalue-options]
syntax = multivalue=<boolean>
description = If true the summary field will be multivalue, one per field. False by default.

[json-options]
syntax = json=<boolean>
description = If true the summary field will be in JSON. False by default.

[max_length-options]
syntax = max_length=<integer>
description = If non-zero, limits the length of values to that number of characters. Defaults to zero.

[exclude_empty-options]
syntax = exclude_empty=<boolean>
description = If true, null or empty values will not be included. False by default.

[add_prefix-options]
syntax = add_prefix=<string>
description = Renames all the fields by adding the specified prefix.

[remove_prefix-options]
syntax = remove_prefix=<string>
description = Renames all the fields by removing the specified prefix.

[diffy-command]
syntax = diffy (<diffy-options>)* (<syntax_colouring-options>)* <key_field> <old_field> <new_field>
shortdesc = Generate an HTML-formatted diff
description = For each event, diffs <old_field> with <new_field> and produces an HTML table row (<tr>). <key_field> is used as a title for the row. You can then concatenate them all with a "stats list(diff) as diff", add a <th> table header row and enclode between <table></table> tags. You can then use GV-Utils:htmliser.js to render the result.
usage = public
example1 = diffy is_spl_field="is_spl" key before after
comment1 = Will produce a 'diff' field with the HTML for a <tr> table row representing the 'before' and 'after' values in a highlighted diff.

[diffy-options]
syntax = is_spl_field=<field>
description = DEPRECATED: please use syntax_colouring instead. If a field is provided in is_spl_field it will be used to decide whether or not to apply SPL syntax highlighting to the before and after values on top of the diff colours. If the value of the field is not null nor the empty string, SPL highlighting is applied.

[syntax_colouring-options]
syntax = syntax_colouring_field=<field>
description = If a field is provided in is_spl_field it will be used to decide whether or not to apply SPL, XML or JSON syntax highlighting to the before and after values on top of the diff colours. Possible values for the content of <field> are "spl", "xml" or "json", everything else is ignored. 

[evalify-command]
syntax = evalify <field>
shortdesc = Convert search syntax into eval syntax
description = This takes SPL that is supposed to be passed to the "| search" command and turns it into SPL that can be used in an eval-syntax context such as in a "| where" command or inside an "if" or "case" in a "| eval" command.
usage = public
example1 = evalify search
comment1 = Converts the content of 'search' into 'eval_search'

[whatchanged-command]
syntax = whatchanged <old_blob> <new_blob>
shortdesc = Identify what fields are different between <old_blob> and <new_blob>
description = Identify what fields are different between <old_blob> and <new_blob>. Blobs are multivalues formatted as "key:value". The fields has_changed and modified_fields are outputted.
usage = public
example1 = whatchanged old_blob new_blob

