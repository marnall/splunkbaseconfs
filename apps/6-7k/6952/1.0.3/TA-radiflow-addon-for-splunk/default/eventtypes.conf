[Asset_Event]
color = et_green
search = index="radiflow" sourcetype="Radiflow:Assets"

[SoftwareAssets_Event]
color = et_green
search = index="radiflow" sourcetype="Radiflow:SoftwareAssets"

[Alerts_Event]
color = et_blue
search = index="radiflow" sourcetype="Radiflow:Alerts"

[CYBER_ATTACK]
search = (index="radiflow" sourcetype="Radiflow:Alerts" packagename="Cyber Attack") OR (index="radiflow" sourcetype="Radiflow:Syslog" cat="'Cyber'")

[THIRD_PARTY]
search = (index="radiflow" sourcetype="Radiflow:Alerts" packagename="Third Party") OR (index="radiflow" sourcetype="Radiflow:Syslog" cat="'Third Party'")

[NETWORK_VISIBILITY]
search = (index="radiflow" sourcetype="Radiflow:Alerts" packagename="Network Visibility") OR (index="radiflow" sourcetype="Radiflow:Syslog" cat="'Link'")

[POLICY_MONITOR]
search = (index="radiflow" sourcetype="Radiflow:Alerts" packagename="Policy Monitor") OR (index="radiflow" sourcetype="Radiflow:Syslog" cat="'Policy alerts'")\


[SYSTEM]
search = (index="radiflow" sourcetype="Radiflow:Alerts" packagename="System") OR (index="radiflow" sourcetype="Radiflow:Syslog" cat="'System'")

[ASSET_MANAGEMENT]
search = (index="radiflow" sourcetype="Radiflow:Alerts" packagename="Asset Management") OR (index="radiflow" sourcetype="Radiflow:Syslog" cat="'Device'")

[User_Activity_Event]
search = (index="radiflow" sourcetype="Radiflow:Syslog" categories="User Activity")
