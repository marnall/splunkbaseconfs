EVAL-dvc = 'vendor_host'
EVAL-severity = case('vendor_category'=="DNS_CACHE_LIMIT_REACHED", "unknown")
EVAL-signature = case(like('ACTION', "%Open%") OR like('ACTION', "%Close%"), 'FW_POLICY_NAME', like('ACTION', "%Deny%"), 'REASON', 'vendor_category'=="DNS_CACHE_LIMIT_REACHED", 'vendor_category')
