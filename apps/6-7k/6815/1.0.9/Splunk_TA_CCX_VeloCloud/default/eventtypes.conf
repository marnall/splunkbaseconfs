
[ccx_velocloud_alert]
search = sourcetype="ccx:velocloud:sdwan" dataset_name="alert"
# tag = alert

[ccx_velocloud_authentication]
search = sourcetype="ccx:velocloud:sdwan" dataset_name="authentication"
# tag = authentication

[ccx_velocloud_change]
search = sourcetype="ccx:velocloud:sdwan" dataset_name="change"
# tag = change

[ccx_velocloud_os]
search = sourcetype="ccx:velocloud:sdwan" os="*"
# tag = inventory os system version

[ccx_velocloud_sdwanedge_syslog_alert]
search = (sourcetype="ccx:velocloud:sdwanedge:syslog") *DNS_CACHE_LIMIT_REACHED*
# tags = alert

[ccx_velocloud_sdwanedge_syslog_edge_new_device]
search = (sourcetype="ccx:velocloud:sdwanedge:syslog") *EDGE_NEW_DEVICE*

[ccx_velocloud_sdwanedge_syslog_traffic]
search = (sourcetype="ccx:velocloud:sdwanedge:syslog") ACTION IN ("*Open*", "*Close*", "*Deny*")
# tags = network communicate
