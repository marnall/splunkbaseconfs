[xm_servers]
question-1 = "What is a compute server?"
answer-1 = "The Extreme Vigilance App introduces the concept of Compute Servers for distributing analysis across Splunk nodes (such as indexers), very similar to the way Splunk scales. You can configure which servers you want the analysis to be distributed."

question-2 = "Can any Splunk node be a compute server?"
answer-2 = "The Extreme Vigilance App discovers compute servers as Splunk nodes that have the SCM-TA-Signals Add-On installed as well as the search head with SCM-Framework installed. You can then choose to enable (or disable) the individual servers."

[xm_licensing]
question-1 = "What happens when my license expires?"
answer-1 = "When your license expires, you can no longer create cognitive models and analysis can no longer be performed for new events.  You can still view results of any analysis performed prior to the license expiration."

question-2 = "How do I get a license?"
answer-2 = "When your license expires, please contact contact@bluevoyant.com for information on pricing and obtaining a license."

question-3 = "How do I add a license?"
answer-3 = "Only users with the scm_admin permission can add a license.  By clicking the 'Add License' button, a dialog will be presented for you to upload the license file you obtained from BlueVoyant Sales."

[xm_properties]
question-1 = "What are properties?"
answer-1 = "Properties are attribute-value pairs that specify operating parameters within Extreme Vigilance.  It is recommended that you utilize professional service engineers when modifying properties to tune the Extreme Vigilance Applications."
