[scm_signal]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^[^,]*,[^,]*,[^,]*,[^,]*,[^,]*,
TIME_FORMAT = %m/%d/%Y %H:%M:%S %Z
TRANSFORMS-new = use_compute_servers
TRUNCATE = 0
#
REPORT-scm_signal_extract = scm_signal_extract
#KV_MODE=none

#
# This source is used to insure index-time field extractions for terrain events
#
[source::xmacquire]
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)
TIME_PREFIX=localEventTimeEpoch=
TIME_FORMAT=%s.%3N
TRANSFORMS-new = indextime_extraction,indextime_extraction_taxonomyId,use_compute_servers

[source::relevancy_graph]
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)
TIME_PREFIX=instanceTime=
TIME_FORMAT=%s.%3N
TRANSFORMS-graph = relevancy_graph_indextime_extraction,use_compute_servers

[scm_framework_log]
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)\d+-\d+-\d{4}\s\d+:\d+:\d+\.\d+\s
TIME_PREFIX=^
TIME_FORMAT=%m-%d-%Y %H:%M:%S.%3N %Z
TRUNCATE=25000
#
EXTRACT-FULL = \d+-\d+-\d{4}\s\d+:\d+:\d+\.\d+\s[^\s]+\s+(?<log_level>[^\s]+)\s+(?<component>[^\s]+)\s+-\spid:(?<pid>[^\s]+)\s(?<file>[^:]+):(?<lineNumber>[^\s]+)\s(?<message>.*)

