[use_compute_servers]
REGEX = .
FORMAT = compute_servers
DEST_KEY = _TCP_ROUTING

[scm_signal_extract]
DELIMS = ","
FIELDS = guid,application,id,type,version,correlationId,analysisName,eventTime,generationTime,modelName,actorType,actorId,action,process,field,category,extracted_source,severity,severityWeight,severityIntensity,visibility,properties

[scm_actors]
filename = actors.csv

[scm_actors_default]
filename = actors-default.csv

[scm_assets]
filename = assets.csv

[scm_assets_default]
filename = assets-default.csv

[scm_asset_types]
filename = asset_types.csv

[scm_signal_types]
filename = signal_types.csv

[scm_categories]
filename = categories.csv

[scm_categories_default]
filename = categories-default.csv

[scm_synonyms]
filename = scm-synonyms.csv

# 
# force index-time field extractions for terrain events ingested via collect (source::xmacquire)
#
[indextime_extraction]
REGEX = =actorId=(.*?)=action=(.*?)=process=(.*?)=field=(.*?)=src=(.*?)=dest=(.*?)=value=(.*?)=localEventTimeEpoch=([^=]+)=terrainType=([^=]+)=terrainId=([^=]+)=key=(.*?)=modelName=(.*?)=guid=(.*?)=referenceKey=(.*?)=
FORMAT = actorId::$1 action::$2 process::$3 field::$4 src::$5 dest::$6 value::$7 localEventTimeEpoch::$8 terrainType::$9 terrainId::$10 key::$11 modelName::$12 guid::$13 referenceKey::$14
WRITE_META = true

[indextime_extraction_taxonomyId]
REGEX = =actorId=(.*?)=action=(.*?)=process=(.*?)=field=(.*?)=src=
FORMAT = taxonomyId::$1~$2~$3~$4
WRITE_META = true

#
# force index-time field extractions for relevancy graph records ingested via collect (source::relevancy_graph)
#
[relevancy_graph_indextime_extraction]
REGEX = =graph=(.*?)=instance=(.*?)=node=(.*?)=normalizedCIX=(.*?)=absoluteCIX=(.*?)=instanceTime=([^=]+)=generationTime=([^=]+)=
FORMAT = graph::$1 instance::$2 node::$3 normalizedCIX::$4 absoluteCIX::$5 instanceTime::$6 generationTime::$7
WRITE_META = true
