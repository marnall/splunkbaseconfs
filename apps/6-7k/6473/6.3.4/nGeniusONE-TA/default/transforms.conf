# into ../local and edit there.

[ngone_cefHeaders]
REGEX = CEF: *(?<ngone_cefVersion>\d+)\|(?<ngone_vendor>[^|]*)\|(?<ngone_product>[^|]*)\|(?<ngone_version>[^|]*)\|(?<ngone_eventtype>[^|]*)\|(?<ngone_eventname>[^|]*)

[ngone_cefKeys]
REGEX = (?:_+)?(?<_KEY_1>[\w.:\[\]]+)=(?<_VAL_1>.*?(?=(?:\s[\w.:\[\]]+=|$)))
REPEAT_MATCH = True
CLEAN_KEYS = 1
