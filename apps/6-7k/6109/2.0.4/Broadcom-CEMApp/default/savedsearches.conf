[Denial Of Service (DOS) Attack - More than 10 SIGNON events in 1 minute from the same user.]
action.email.useNSSubject = 1
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 1m
alert.track = 1
counttype = number of events
cron_schedule = */1 * * * *
description = This real time alert will be triggered if there are more than 10 SIGNON events in 1 minute from the same user.
disabled = 1
dispatch.earliest_time = rt-1m
dispatch.latest_time = rt-0m
display.events.fields = ["host","source","sourcetype","HOSTLOCATION"]
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = BroadcomCEMApp
request.ui_dispatch_view = search
search = index="cem_index" sourcetype="CEM_Event_Data" CATEGORY=SYSTEMACCESS EVENT=SIGNON | stats count by USERID | search count>10

