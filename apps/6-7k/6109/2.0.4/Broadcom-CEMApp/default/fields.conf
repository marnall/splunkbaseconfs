# In case your data has enriched fields and you need to search on that data in Splunk, you need to add those fields to the list below to let Splunk know 
# that these fields are unavailable in the indexed data.

# Currently it sets the "country","clienthost" & "ipaddress" field's indexed value as false - so that it is searchable in Splunk queries. 
# As all of these are looked-up fields, it is unavailable the raw text of the event (hence unavailable in the index) and not searchable by default.

[country]
INDEXED_VALUE = false

[clienthost]
INDEXED_VALUE = false

[ipaddress]
INDEXED_VALUE = false