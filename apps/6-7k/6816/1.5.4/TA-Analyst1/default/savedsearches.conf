[analyst1_master_lookup_data]
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
description = Collect the statistics of the all Indicators
cron_schedule = 45,15 * * * *
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
enableSched = 1
run_on_startup = true
search = | inputlookup analyst1_indicators_email \
| inputlookup append=true analyst1_indicators_ip \
| inputlookup append=true analyst1_indicators_mutex \
| inputlookup append=true analyst1_indicators_httpRequest \
| inputlookup append=true analyst1_indicators_string \
| inputlookup append=true analyst1_indicators_domain \
| inputlookup append=true analyst1_indicators_file \
| inputlookup append=true analyst1_indicators_url \
| eval lookup_type = case( \
    type IN ("md5","sha1","sha256","sha512","ssdeep","crc32"), "file", \
    type IN ("ip","ipv6"), "ip", \
    true(), type \
) \
| eval verified = case(IN(verified,"1","true"), "True", IN(verified,"0","false"), "False", 1=1, null()) \
| eval active   = case(IN(active,"1","true"), "True", IN(active,"0","false"), "False", 1=1, null()) \
| eval benign   = case(IN(benign,"1","true"), "True", IN(benign,"0","false"), "False", 1=1, null())


