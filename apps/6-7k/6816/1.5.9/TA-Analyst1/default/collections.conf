[analyst1_oauth_locks]
# OAuth token generation distributed locks for Search Head Cluster coordination
# Each document represents a per-account lock for token generation
# Documents should be cleaned up after use (30s TTL for safety)
replicate = true
field._key = string
field.owner_guid = string
field.acquired_at = time
field.account_name = string

[analyst1_migration_locks]
# Distributed locks for migration coordination across Search Head Cluster
# Each document represents a lock for a specific migration operation
# Locks expire after timeout_seconds (default: 90s) for safety
replicate = true
enforceTypes = true
field.owner_guid = string
field.acquired_at = number
field.lock_context = string

[analyst1_migration_state]
# Tracks completed migrations and failure counts across the cluster
# Single document with _key="migration_state" stores all state
# Replicates across SHC to ensure all nodes see completed migrations
replicate = true
enforceTypes = true
field.scope = string
field.completed = string
field.failures = string
field.last_updated = number
field.last_updated_by = string
