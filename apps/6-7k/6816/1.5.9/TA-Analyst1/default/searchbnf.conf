[analyst1matchindicators-command]
syntax =  analyst1matchindicators indicator_type="Value of indicator type"
description = This command performs the correlation between Analyst1 indicator and provided Splunk events.
shortdesc = Correlate analyst1 indicators against provided Splunk events.
example1 = | analyst1matchindicators indicator_type="domain"
comment1 = Correlate analyst1 indicators of type "domain" against provided Splunk events with respected analyst1_lookup.

[analyst1enrichindicators-command]
syntax =  analyst1enrichindicators indicator_type="Value of indicator type" fields="Comma seperated list of fields"
description = This command performs the enrichment between master lookup of Analyst1 indicator and provided fields for Splunk events.
shortdesc = Enrich matching analyst1 indicators against providedfields of Splunk events.
example1 = | analyst1enrichindicators indicator_type="domain" fields="field1"
comment1 = Enrich matching analyst1 indicators of type "domain" against field1 value for provided Splunk events with respected master lookup.
example2 = | analyst1enrichindicators indicator_type="domain"
comment2 = Enrich matching analyst1 indicators of type "domain" against the fields defined in the correlation fields with provided Splunk events with respected master lookup.
