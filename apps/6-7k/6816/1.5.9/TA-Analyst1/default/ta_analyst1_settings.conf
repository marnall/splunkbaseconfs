[proxy]

[logging]
loglevel = INFO

[additional_parameters]
required_disable_checkbox = 1
enabled_indicator_types =
lookup_location_domain = analyst1_lookup
lookup_location_email = analyst1_lookup
lookup_location_file = analyst1_lookup
lookup_location_httpRequest = analyst1_lookup
lookup_location_ip = analyst1_lookup
lookup_location_mutex = analyst1_lookup
lookup_location_string = analyst1_lookup
lookup_location_url = analyst1_lookup
target_fields_to_match_domain = domain, src, dest
target_fields_to_match_email = email, user
target_fields_to_match_file = filename, hash
target_fields_to_match_httpRequest = request
target_fields_to_match_ip = src, dest
target_fields_to_match_mutex = mutex
target_fields_to_match_string = description, comments
target_fields_to_match_url = url, uri, link
target_splunk_query_domain = index=main sourcetype!=analyst1:*
target_splunk_query_email = index=main sourcetype!=analyst1:*
target_splunk_query_file = index=main sourcetype!=analyst1:*
target_splunk_query_httpRequest = index=main sourcetype!=analyst1:*
target_splunk_query_ip = index=main sourcetype!=analyst1:*
target_splunk_query_mutex = index=main sourcetype!=analyst1:*
target_splunk_query_string = index=main sourcetype!=analyst1:*
target_splunk_query_url = index=main sourcetype!=analyst1:*

[splunk_rest_host]
skip_index = 1
full_sync_schedule = 0 0 * * *
diff_sync_schedule = 0 */4 * * *
analyst1_indicator_indices_macro = main
indicator_fields = All
splunk_rest_host_url = localhost
splunk_rest_port = 8089
splunk_username =
splunk_password =

[es_threatlist]
es_weight_benign_enabled = 1
es_weight_benign = 1
es_weight_lowest_enabled = 1
es_weight_lowest = 20
es_weight_low_enabled = 1
es_weight_low = 40
es_weight_moderate_enabled = 1
es_weight_moderate = 60
es_weight_high_enabled = 1
es_weight_high = 80
es_weight_critical_enabled = 1
es_weight_critical = 100
es_weight_unknown_enabled = 1
es_weight_unknown = 60