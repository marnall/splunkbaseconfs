[pps_messagelog]
REPORT-ccx_pps_messagelog_recipient = ccx_pps_messagelog_recipient

EVAL-src_ip = 'connection.ip'
EVAL-vendor_product = "Proofpoint:OnDemand"
EVAL-category = case(('signature_extra'=="av" OR 'signature_extra'=="sandbox") AND like('filter.actions.rule', "%notcleaned") OR like(_raw, "%malicious"),replace(coalesce('filter.modules.av.virusNames{}','msgParts{}.sandboxStatus','filter.actions.rule'), "(^[^\.]+).+", "\1"), isnotnull(file_hash), coalesce('filter.modules.av.virusNames{}','msgParts{}.sandboxStatus','filter.actions.rule'))
EVAL-date = strftime(_time, "%Y-%m-%d")
EVAL-file_hash = mvappend('msgParts{}.sha256','msgParts{}.md5')
EVAL-filter_action = case(filter_action=="accept" OR filter_action=="continue" OR filter_action=="retry", "accepted", filter_action=="discard" OR filter_action=="reject", "rejected", filter_action=="incomplete", "dropped")
EVAL-message_id = replace('msg.header.message-id{}', "\<([^\>]+)\>", "\1")
EVAL-recipient = coalesce('x_recipient', 'recipient', 'envelope.rcpts{}')
EVAL-signature = coalesce('filter.modules.av.virusNames{}','msgParts{}.sandboxStatus','filter.actions.rule')
EVAL-user = if((isnotnull('final_module') AND (like('filter.actions.rule', "%notclean") OR 'filter.actions.rule'=="threat")) OR ((signature_extra=="av" OR signature_extra=="sandbox") AND (like('filter.actions.rule',"%notcleaned") OR like(_raw,"%malicious%")) OR isnotnull(file_hash)),coalesce(split(coalesce('x_recipient', 'recipient'), ","),'envelope.rcpts{}'),null())

[proofpoint_tap_siem]
EVAL-vendor_product = "Proofpoint:Targeted Attack Protection"
EVAL-action = case(match(eventType,"^messagesDelivered"),"delivered",match(eventType,"^messagesBlocked"),"blocked")
EVAL-message_id = 'messageID'
EVAL-file_name = if('messageParts{}.filename'!="null",'messageParts{}.filename',null())
EVAL-file_hash = if('messageParts{}.md5'!="null" AND 'messageParts{}.sha256'!="null",mvappend('messageParts{}.md5','messageParts{}.sha256'),null())
EVAL-signature = if(isnotnull('quarantineFolder') AND quarantineFolder!="null",'quarantineFolder',"unknown")
EVAL-category = if(isnotnull('quarantineRule') AND quarantineRule!="null",'quarantineRule',if(isnotnull('classification') AND classification!="null",'classification',null()))
EVAL-sender = coalesce('fromAddress{}','sender')
EVAL-src_user = coalesce('fromAddress{}','sender')
EVAL-recipient = mvappend(coalesce('recipient{}','recipient','toAddresses{}'),'ccAddresses{}')
EVAL-user = mvappend(coalesce('recipient{}','recipient','toAddresses{}'),'ccAddresses{}')
EVAL-src = 'senderIP'
EVAL-size = 'messageSize'
EVAL-return_addr = split(replace('replyToAddress{}',"\>",""),",")
EVAL-url = if(isnotnull('url'),'url',coalesce('threatsInfoMap{}.threatUrl','threatURL'))
EVAL-date = 'eventTime'
EVAL-user_agent = 'userAgent'
EVAL-ids_type = if(isnotnull('quarantineFolder') AND quarantineFolder IN("Recipient Verification","Bulk","Impostor") AND NOT (quarantineRule="inbound_spam" OR quarantineRule="inbound_phish*" OR eventType="messagesDelivered"),"application",null())
EVAL-filter_action = case(eventType=="clicksPermitted","accepted")

[ccx:proofpoint:trap:hec]
KV_MODE = json
TRUNCATE = 999999

EXTRACT-ccx_proofpoint_trap_extend_kv_parsing = \"name\": \"(?<_KEY_1>[^\"]+)\",\s+\"value\": \"?(?<_VAL_1>((?<=\")[^\"]+)(?=\")|((?<!\")[^\n]+(?=\n)))\"?

EVAL-vendor_product = "Proofpoint:Threat Response Auto-Pull"
EVAL-file_hash = mvdedup(mvappend('attachments{}.md5','events{}.emails{}.attachments{}.md5','md5','events{}.emails{}.attachments{}.sha256','sha256'))
EVAL-file_name = mvdedup('events{}.emails{}.attachments{}.realnamePII.secret')
EVAL-sender = mvdedup('events{}.emails{}.sender.email')
EVAL-recipient = mvdedup('events{}.emails{}.recipient.email')
EVAL-message_id = if(isnotnull('events{}.emails{}.messageId'),mvdedup('events{}.emails{}.messageId'),mvdedup('quarantine_results{}.messageId'))
EVAL-severity = lower('Severity')
EVAL-category = if(isnotnull(Abuse_Disposition) AND NOT Abuse_Disposition IN("Unknown","null"),lower('Abuse_Disposition'),lower('Classification'))
EVAL-attack_vector = lower('Attack_Vector')
EVAL-subject = mvdedup('events{}.emails{}.subject')
EVAL-malicious = if('Abuse_Disposition'=="null","no",if('Abuse_Disposition'=="Malicious","yes",lower('Abuse_Disposition')))
EVAL-filter_action = mvdedup(lower('quarantine_results{}.status'))
EVAL-signature_extra = if(isnotnull('events{}.threatname'),'events{}.threatname',if(isnotnull('Sub_Disposition') AND 'Sub_Disposition'!="null",lower('Sub_Disposition'),null()))
EVAL-filter_score = 'score'
EVAL-messageDeliveryTime = 'events{}.emails{}.messageDeliveryTime'
