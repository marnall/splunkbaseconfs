[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 6

[ui]
is_visible = 0
label = Cisco Catalyst Enhanced Netflow Add-on for Splunk

[launcher]
author = Cisco Systems, Inc
description = Cisco Catalyst Enhanced Netflow Add-on for Splunk provides Netflow element mapping for the Cisco Netflow data
version = 2.1.0

[package]
id = splunk_app_stream_ipfix_cisco_hsl

[triggers]
reload.ipfixmap = simple