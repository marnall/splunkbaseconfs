[launcher]
version = 1.1.0
description = This add-on delivers an alert action that generates and schedules dashboards from search results.
author = aserpi

[id]
version = 1.1.0
name = SA-dashboard_generator

[install]
build = 1733946414
is_configured = false
state = enabled

[package]
id = SA-dashboard_generator
check_for_updates = true

[ui]
label = Dashboard Generator
is_visible = true

[triggers]
reload.sa_dashboard_generator_settings = simple
reload.sa_dashboard_generator_permissions_template = simple
reload.sa_dashboard_generator_scheduled_view_template = simple
