[vectra:stream:json]
KV_MODE = json
SHOULD_LINEMERGE = false
NO_BINARY_CHECK = true
TIME_FORMAT = %s%3N
TIME_PREFIX = "ts":
MAX_TIMESTAMP_LOOKAHEAD = 13
TRANSFORMS-vectra_sourcetypes = vectra_stream_isession,vectra_stream_dns,vectra_stream_ssl,vectra_stream_smbfiles,vectra_stream_smbmapping,vectra_stream_dcerpc,vectra_stream_httpsessioninfo,vectra_stream_dhcp,vectra_stream_x509,vectra_stream_ldap,vectra_stream_kerberos_txn,vectra_stream_ntlm,vectra_stream_beacon,vectra_stream_ssh,vectra_stream_smtp,vectra_stream_radius,vectra_stream_rdp,vectra_stream_match
description = Vectra Stream JSON Metadata
JSON_TRIM_BRACES_IN_ARRAY_NAMES = true

[vectra_dcerpc]
EVAL-src_ip = coalesce('id.orig_h','id_orig_h')
EVAL-src_port = coalesce('id.orig_p','id_orig_p')
EVAL-dest_ip = coalesce('id.resp_h','id_resp_h')
EVAL-dest_port = coalesce('id.resp_p','id_resp_p')
EVAL-vendor_product = "vectra_stream"

[vectra_dhcp]
FIELDALIASNEW-vectra_stream_dhcp_mapping = assigned_ip ASNEW dest_ip lease_time ASNEW lease_duration mac ASNEW dest_mac
EVAL-src_ip = coalesce('id.orig_h','id_orig_h')
EVAL-src_port = coalesce('id.orig_p','id_orig_p')
EVAL-dest_ip = coalesce('id.resp_h','id_resp_h')
EVAL-dest_port = coalesce('id.resp_p','id_resp_p')
EVAL-vendor_product = "vectra_stream"

[vectra_dns]
FIELDALIASNEW-vectra_stream_dns_mapping = TTLs ASNEW ttl answers ASNEW answer id.orig_h ASNEW src id.orig_p ASNEW src_port id.resp_h ASNEW dest id.resp_p ASNEW dest_port proto ASNEW transport qclass_name ASNEW record_class qtype_name ASNEW record_type rcode ASNEW reply_code_id rcode_name ASNEW reply_code total_replies ASNEW answer_count trans_id ASNEW transaction_id
EVAL-authority_answer_count = total_replies - total_answers
EVAL-message_type = if (saw_query == "true" AND saw_reply == "true", "Query and Response",  if(saw_query == "true", "Query", "Response"))
EVAL-query_type = qtype_name
EVAL-src_ip = coalesce('id.orig_h','id_orig_h')
EVAL-src_port = coalesce('id.orig_p','id_orig_p')
EVAL-dest_ip = coalesce('id.resp_h','id_resp_h')
EVAL-dest_port = coalesce('id.resp_p','id_resp_p')
EVAL-vendor_product = "vectra_stream"

[vectra_http]
FIELDALIASNEW-vectra_stream_http_mapping = host ASNEW site method ASNEW http_method orig_ip_bytes ASNEW bytes_out referrer ASNEW http_referrer resp_ip_bytes ASNEW bytes_in resp_mime_types ASNEW http_content_type status_code ASNEW status uri ASNEW url user_agent ASNEW http_user_agent
EVAL-http_user_agent_length = len(user_agent)
EVAL-url_length = len(uri)
EXTRACT-host header http json = "host":"(?P<host_header>[^"]+)"
EVAL-src_ip = coalesce('id.orig_h','id_orig_h')
EVAL-src_port = coalesce('id.orig_p','id_orig_p')
EVAL-dest_ip = coalesce('id.resp_h','id_resp_h')
EVAL-dest_port = coalesce('id.resp_p','id_resp_p')
EVAL-vendor_product = "vectra_stream"

[vectra_isession]
FIELDALIASNEW-vectra_stream_isession_mapping = conn_state ASNEW tcp_flag orig_ip_bytes ASNEW bytes_out orig_pkts ASNEW packets_out orig_vlan_id ASNEW vlan protoName ASNEW transport resp_ip_bytes ASNEW bytes_in resp_pkts ASNEW packets_in service ASNEW app uid ASNEW session_id
EVAL-bytes = orig_ip_bytes + resp_ip_bytes
EVAL-packets = orig_pkts + resp_pkts
EVAL-src_ip = coalesce('id.orig_h','id_orig_h')
EVAL-src_port = coalesce('id.orig_p','id_orig_p')
EVAL-dest_ip = coalesce('id.resp_h','id_resp_h')
EVAL-dest_port = coalesce('id.resp_p','id_resp_p')
EVAL-vendor_product = "vectra_stream"

