[vectra_x509]
FIELDALIASNEW-vectra_cognito_stream_x509_mapping = certificate.cn ASNEW ssl_subject_common_name certificate.issuer ASNEW ssl_issuer certificate.key_alg ASNEW ssl_publickey_algorithm certificate.not_valid_after ASNEW ssl_end_time certificate.not_valid_before ASNEW ssl_start_time certificate.serial ASNEW ssl_serial certificate.sig_alg ASNEW ssl_signature_algorithm certificate.subject ASNEW ssl_subject certificate.version ASNEW ssl_version id_orig_h ASNEW src id_orig_p ASNEW src_port id_resp_h ASNEW dest id_resp_p ASNEW dest_port uid ASNEW ssl_session_id
EVAL-src_ip = coalesce('id.orig_h','id_orig_h')
EVAL-src_port = coalesce('id.orig_p','id_orig_p')
EVAL-dest_ip = coalesce('id.resp_h','id_resp_h')
