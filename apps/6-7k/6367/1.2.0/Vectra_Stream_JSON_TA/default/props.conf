EVAL-dest_ip = coalesce('id.resp_h','id_resp_h')
EVAL-dest_port = coalesce('id.resp_p','id_resp_p')
EVAL-vendor_product = "vectra_stream"
FIELDALIAS-action       = eve_json.alert.action AS action
FIELDALIAS-category     = eve_json.alert.category AS category
FIELDALIAS-dvc          = system_name AS dvc
FIELDALIAS-id           = suri_id AS id
FIELDALIAS-severity_id  = eve_json.alert.severity AS severity_id
FIELDALIAS-signature    = eve_json.alert.signature AS signature
FIELDALIAS-signature_id = eve_json.alert.signature_id AS signature_id
FIELDALIAS-transport    = eve_json.proto
EVAL-ids_type           = "network"
EVAL-severity           = case('alert.severity'=0,"informational",'alert.severity'=1,"critical",'alert.severity'=2,"medium",'alert.severity'=3, "low")