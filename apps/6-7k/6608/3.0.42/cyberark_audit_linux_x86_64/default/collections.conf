# NOTE: Collection names use the linux_x86_64 build-time token so they match the
# runtime names constructed in SplunkKVStoreDBServices (`{app_name}_*`).
# `repack.sh` substitutes linux_x86_64 at build time. Splunk Cloud restricts the
# storage/collections/config REST endpoint, so collections MUST be declared
# here statically rather than created at runtime via splunklib.

# User Configurations Collection
[cyberark_audit_linux_x86_64_collection]
enforceTypes = false
replicate = true
field._key = string
field.device_name = string
field.auth_endpoint = string
field.api_endpoint = string
field.api_region = string
field.services_filter = string
field.initial_minutes_back_start = number
field.index_name = string
field.sourcetype = string
field.host = string
field.integration_display_name = string
field.enabled = bool
field.created_at = time
field.updated_at = time
field.page_size = number

# User Checkpoints Collection
[cyberark_audit_linux_x86_64_checkpoint_collection]
enforceTypes = false
replicate = true
field._key = string
field.device_name = string
field.next_page_cursor = string
field.last_fetch_time = time

# Global Proxy Configuration Collection
[cyberark_audit_linux_x86_64_global_proxy_config]
enforceTypes = false
replicate = true
field._key = string
field.proxy_enabled = bool
field.proxy_host = string
field.proxy_port = number
field.proxy_verify_ssl = bool
field.created_at = time
field.updated_at = time

# Legacy collection used as a readiness probe by _verify_kv_store_available.
# Kept for backward compatibility; do not store new data here.
[cyberark_user_configurations]
enforceTypes = false
replicate = true
field._key = string
