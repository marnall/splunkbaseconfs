[loggers]
keys=root,cyberark_audit_linux_x86_64

[handlers]
keys=stderr,file

[formatters]
keys=default

[logger_root]
level=WARNING
handlers=stderr

[logger_cyberark_audit_linux_x86_64]
level=INFO
handlers=stderr,file
qualname=cyberark_audit_linux_x86_64
propagate=0

[handler_stderr]
class=StreamHandler
level=NOTSET
args=(sys.stderr,)
formatter=default

[handler_file]
class=handlers.RotatingFileHandler
level=INFO
args=('%(SPLUNK_HOME)s/var/log/splunk/cyberark_audit_linux_x86_64.log', 'a', 10485760, 5, 'utf-8')
formatter=default

[formatter_default]
format=%(asctime)s %(levelname)s pid=%(process)d tid=%(threadName)s file=%(filename)s:%(funcName)s:%(lineno)d | %(message)s
datefmt=%Y-%m-%d %H:%M:%S %Z
