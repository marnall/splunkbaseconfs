[expose:Hispasec_Splunk_settings]
pattern = Hispasec_Splunk_settings
methods = POST, GET

[expose:Hispasec_Splunk_settings_specified]
pattern = Hispasec_Splunk_settings/*
methods = POST, GET, DELETE

[expose:Hispasec_Splunk_hispasec_notifications]
pattern = Hispasec_Splunk_hispasec_notifications
methods = POST, GET

[expose:Hispasec_Splunk_hispasec_notifications_specified]
pattern = Hispasec_Splunk_hispasec_notifications/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
