[chatgptevent-command]
syntax      = chatgptevent field=<string> question=<string>
shortdesc   = chatgptevent
description = This command will pipe data  and a question into a API call \i\
              "field"   - specify the field should be piped into an API call \i\
              "question"  - the question that you want ChatGPT to answer back from
