[source::...ta_constella_dome_app_for_splunk*.log*]
sourcetype = taconstelladomeappforsplunk:log

[constella:dome]
FIELDALIAS-aob_gen_constella_dome_alias_1 = finding.identities{}.value AS domeEvent_assetName
FIELDALIAS-aob_gen_constella_dome_alias_10 = finding.body AS body
FIELDALIAS-aob_gen_constella_dome_alias_11 = finding.title AS description
FIELDALIAS-aob_gen_constella_dome_alias_13 = finding.title AS subject
FIELDALIAS-aob_gen_constella_dome_alias_14 = finding.identities{}.value AS user
FIELDALIAS-aob_gen_constella_dome_alias_15 = finding.impact AS domeEvent_impact
FIELDALIAS-aob_gen_constella_dome_alias_16 = finding.namedEntities{}.name AS domeEvent_addlDetail
FIELDALIAS-aob_gen_constella_dome_alias_17 = finding.assetId AS domeEvent_assetID
FIELDALIAS-aob_gen_constella_dome_alias_18 = finding.risk AS domeEvent_risk
FIELDALIAS-aob_gen_constella_dome_alias_19 = domeEvent_riskScore AS severity
FIELDALIAS-aob_gen_constella_dome_alias_20 = finding.breach.source.name AS domeEvent_source
FIELDALIAS-aob_gen_constella_dome_alias_3 = finding.attackVectors{} AS domeEvent_eventType
FIELDALIAS-aob_gen_constella_dome_alias_4 = finding.infoTypes{} AS domeEvent_threatType
FIELDALIAS-aob_gen_constella_dome_alias_5 = finding.id AS domeEvent_eventID
FIELDALIAS-aob_gen_constella_dome_alias_6 = finding.title AS domeEvent_eventName
FIELDALIAS-aob_gen_constella_dome_alias_7 = finding.body AS domeEvent_description
FIELDALIAS-aob_gen_constella_dome_alias_9 = finding.id AS id
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
LOOKUP-DomeRiskScoreLookup = constella_risk_scrore_lookup_file risk AS domeEvent_risk OUTPUTNEW value AS domeEvent_riskScore
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
BREAK_ONLY_BEFORE_DATE =
DATETIME_CONFIG = ./local/datetime.xml
description = Output produced by Constella Dome
disabled = false
