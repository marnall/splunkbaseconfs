[RST Cloud: Update Job - Domain Feed]
cron_schedule = 1 2 * * *
description = This search is used to transform the newly downloaded ioc_domain_latest.csv into a corresponding summary csv used in other searches and merge with old results to avoid keeping duplicated
dispatch.earliest_time = -1m@m
dispatch.latest_time = @m
enableSched = 1
display.general.type = statistics
display.page.search.tab = statistics
schedule_window = auto
search = | inputlookup rst_threat_feed_domain \
    ``` get new data and reformat it``` \
| eval ioc_value=domain \
| eval ioc_type="domain" \
| makemv tokenizer="([^,]+),?" threat \
| makemv tokenizer="([^,]+),?" tags_str \
| eval threat=replace(threat,"\[|\]|\'", "") \
| eval tags=replace(tags_str,"\[|\]|\'", "") \
| rename score_total as score \
| fields collect fseen lseen ioc_value ioc_type threat tags score\
    ``` append new data with the existng summary ``` \
| inputlookup append=true rst_threat_feed_domain_summary\
    ``` remove duplicated, keep the most recent values ``` \
| stats max(collect) as collect, min(fseen) as fseen, max(lseen) as lseen, values(threat) as threat, values(tags) as tags, first(score) as score, last(ioc_type) as ioc_type by ioc_value\
    ``` overwrite the summary ``` \
| outputlookup rst_threat_feed_domain_summary

