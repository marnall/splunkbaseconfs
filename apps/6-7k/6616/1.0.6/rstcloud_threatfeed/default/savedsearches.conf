[RST Cloud: Clean Job - Domain Feed]
cron_schedule = 1 3 * * *
dispatch.earliest_time = -1m@m
dispatch.latest_time = @m
enableSched = 1
display.general.type = statistics
display.page.search.tab = statistics
schedule_window = auto
search = | inputlookup rst_threat_feed_domain_summary \
| eval diff=relative_time(now(), "@d")-collect \
| eval limit= \
    [| rest /servicesNS/nobody/rstcloud_threatfeed/properties/transforms/rst_threat_feed_domain_summary/max_offset_secs \
    | return $value] \
| eval old=if(diff>limit,1,0) \
| where old=0 \
| fields - diff,limit,old \
| outputlookup rst_threat_feed_domain_summary

