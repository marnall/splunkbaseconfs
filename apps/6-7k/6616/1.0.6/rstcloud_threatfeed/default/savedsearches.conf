[RST Cloud: Download Job - Domain Feed]
cron_schedule = 1 1 * * *
dispatch.earliest_time = -1m@m
dispatch.latest_time = @m
enableSched = 1
display.general.type = statistics
display.page.search.tab = statistics
schedule_window = auto
search = | rstdownload feed_type=domain feed_date=latest \
    ``` Download the latest feed from RST Cloud. A Gzipped csv is downloaded, unpacked and it could take about a minute ``` \
| fields - _raw \
    ``` Remove _raw field and save the result into a file. This will overwrite the CSV file with fresh values ``` \
| outputlookup ioc_domain_latest.csv

