[RST Cloud: Detected Suspicious Domain]
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.expires = 7d
alert.suppress = 1
alert.suppress.fields = domain
alert.suppress.period = 1d
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = This rule looks for a connection to a suspicious domain. It will throttle for a day per domain detected. To configure this rule, ensure that macro rst_domain_indexes is configured with the right index names
disabled = 1
dispatch.earliest_time = -15m@m
dispatch.latest_time = @m
display.events.fields = ["domain","tags","fseen","lseen","score","ioc_type"]
display.events.type = table
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = rstcloud_threatfeed
request.ui_dispatch_view = search
search = `rst_domain_indexes` \
| dedup domain \
| lookup rst_threat_feed_domain_summary ioc_value as domain \
| where (score>45) OR (score>15 and tags IN ("phishing", "c2", "botnet", "ransomware", "keylogger", "stealer", "rat", "dropper")) OR (score>30 and tags IN ("malware")) \
| eval lseen=strftime(lseen, "%d/%m/%Y %I:%M:%S %p") \
| eval fseen=strftime(fseen, "%d/%m/%Y %I:%M:%S %p") \
| `rst_domain_filter`

[RST Cloud: Detected Suspicious IP]
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.expires = 7d
alert.suppress = 1
alert.suppress.fields = dest_ip
alert.suppress.period = 1d
alert.track = 1
counttype = number of events
cron_schedule = */15 * * * *
description = This rule looks for a connection to a suspicious IP. It will throttle for a day per destination IP detected. To configure this rule, ensure that macro rst_dstip_indexes is configured with the right index names
disabled = 1
dispatch.earliest_time = -15m@m
dispatch.latest_time = @m
display.events.fields = ["dest_ip","tags","fseen","lseen","score","ioc_type"]
display.events.type = table
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = rstcloud_threatfeed
request.ui_dispatch_view = search
search = `rst_dstip_indexes` \
| eval dest_ip = coalesce(dest_ip,dest) \
| dedup dest_ip \
| lookup rst_threat_feed_ip_summary ioc_value as dest_ip \
| where (score>40) OR (score>15 and tags IN ("phishing", "c2", "botnet", "ransomware", "keylogger", "stealer", "rat", "dropper")) OR (score>30 and tags IN ("malware")) \
| eval lseen=strftime(lseen, "%d/%m/%Y %I:%M:%S %p") \
| eval fseen=strftime(fseen, "%d/%m/%Y %I:%M:%S %p") \
| `rst_dstip_filter`

