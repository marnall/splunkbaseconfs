# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 6

[launcher]
author = SOC Prime
version = 2.0.6
description = With the SOC Prime CCM App for Splunk - Optimized, you can continuously stream new rules and update the existing ones in the cloud environment or in your on-premise Splunk instance. Leveraging the SOC Prime Continuous Content Management (CCM) module, rules can be streamed directly into your Splunk environment from the specified Content Lists as part of the CCM capabilities. Optionally, security performers can specify rule Presets, Custom Field Mapping profiles, and Filters.

[ui]
is_visible = 1
label = SOC Prime CCM App for Splunk - Optimized
docs_section_override = AddOns:released

[package]
id = TA-soc-prime-ccm-app-for-splunk
check_for_updates = 1

[triggers]
reload.addon_builder = simple
reload.ta_soc_prime_ccm_app_for_splunk_account = simple
reload.ta_soc_prime_ccm_app_for_splunk_settings = simple
reload.passwords = simple

