[mysql_community_mcafee_auth]
search = sourcetype="mysql:community:mcafee:audit" msg-type="activity" (cmd="Connect" OR cmd="Failed Login")

[mysql_community_percona_auth]
search = sourcetype="mysql:community:percona:audit" EventName="Connect" NOT user="mysql.session"

[mysql_community_mariadb_auth]
search = sourcetype="mysql:community:mariadb:audit" (operation="Connect" OR operation="FAILED_CONNECT")