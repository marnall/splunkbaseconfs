[source::...splunk_ta_ctm360*.log*]
sourcetype = splunktactm360:log

[hackerview]
FIELDALIAS-time_submitted = timestamp AS time_submitted
FIELDALIAS-asset_type = meta.asset_type AS asset_type
EVAL-cve = case((issue_name="High Severity CVE Detected" OR issue_name="Medium Severity CVE Detected" OR issue_name="Low Severity CVE Detected"), $cve_id$)
EVAL-url = case((asset_type="website"), $meta.asset$)
FIELDALIAS-category = issue_category{} AS category
FIELDALIAS-signature = issue_name AS signature
FIELDALIAS-dest_ip = meta.ip AS dest_ip
FIELDALIAS-dest_host = meta.host AS dest_host
FIELDALIAS-ticket_id = meta.ticket_id AS ticket_id
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp"\s*:\s*"?
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
MAX_TIMESTAMP_LOOKAHEAD = 50
category = Splunk App Add-on Builder
pulldown_type = 1

[threatcover]
FIELDALIAS-aob_gen_threatcover_alias_1 = description AS host
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp"\s*:\s*"?
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
MAX_TIMESTAMP_LOOKAHEAD = 50
category = Splunk App Add-on Builder
pulldown_type = 1

[cbs]
EVAL-dest_host = case((class="Domain"), $subject$)
EVAL-severity = case(severity=="Informational","informational", severity=="Low","low", severity == "Medium","medium", severity == "High","high")
EVAL-time_submitted = strptime(created_date, "%d-%m-%Y %I:%M:%S %p")
EVAL-url = case((class="URL"), $subject$)
FIELDALIAS-comments = remarks AS comments
FIELDALIAS-ticket_id = id AS ticket_id
KV_MODE = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = "timestamp"\s*:\s*"?
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
MAX_TIMESTAMP_LOOKAHEAD = 50
category = Splunk App Add-on Builder
pulldown_type = 1
