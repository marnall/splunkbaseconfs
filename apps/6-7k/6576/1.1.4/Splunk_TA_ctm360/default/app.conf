# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = false
state = enabled
build = 3

[launcher]
author = CTM360 Ltd
version = 1.1.4
description = The CTM360 Add-on for Splunk allows subscribed users to import their asset inventory, issues, and incidents into Splunk®, and utilize this data to build reports, trigger alerts and identify vulnerabilities, exposures and misconfigurations against your assets. The CTM360 Splunk App and Add-on are designed to work together.

[ui]
is_visible = 1
label = CTM360 Add-on for Splunk
docs_section_override = AddOns:released

[package]
id = Splunk_TA_ctm360

[triggers]
reload.addon_builder = simple
reload.splunk_ta_ctm360_account = simple
reload.splunk_ta_ctm360_settings = simple
reload.passwords = simple
