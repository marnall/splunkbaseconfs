[asset-time-range-to-summarize]
definition = mstats avg("asset.electricity.kWh") WHERE "index"=`summary-asset-metrics-index` Report="Summarize Asset CO2e & kW V1.0" span=10m \
    [ ```Get a the timestamp of a recent metric, and set as the earliest, narrowing the time period we need to search``` \
    | mpreview "index"=`summary-asset-metrics-index` filter="Report=\"Summarize Asset CO2e & kW V1.0\"" chunk_size=10 earliest=`summary-fill-start` \
    | head 1 \
    | eval earliest=_time \
    | return earliest] \
| stats latest(_time) as earliest \
| eval earliest=relative_time(earliest,"+10m") \
| eval latest=relative_time(earliest,`summary-fill-increment`) \
    ```\
| eval latest=if((relative_time(latest,`summary-fill-increment`))>now(),relative_time(earliest,"+1h"),latest) ```\
| eval closest=relative_time(now(),"-2h@h")\
| eval latest=if(latest>closest,closest,latest) ```Avoid summarizing anything within the last 2 hours``` \
\
| append ``` If there is no data in the time range we are searching, (between summary-fill-start and now), we should default to the start at summary-fill-start``` \
    [| makeresults count=1 \
    | eval earliest=`summary-fill-start`\
    | eval latest=relative_time(earliest,`summary-fill-increment`)\
        ] \
| head 1 \
| return earliest latest
iseval = 0

[cmdb-lookup-name]
