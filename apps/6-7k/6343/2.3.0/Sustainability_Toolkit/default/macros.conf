[electricity-carbon-intensity]
definition = search index=`electricity-carbon-intensity-index` \
sourcetype="NG:carbonintensity:postcode" OR sourcetype="EM:carbonintensity" \
    [ `electricity-time-range-to-summarize`] \
| eval co2perkWh=coalesce(carbonIntensity,'intensity.forecast') \
| eval LocationCode=sourcetype."/".coalesce(zone,postcode)\
| eval LocationName=coalesce("GB/".shortname."/".postcode,"Zone/".zone)\
| eval LocationDetails=LocationName."|".LocationCode\
| eval _time=floor(_time) \
| appendpipe \
    [| head 1 \
    | fields _time \
    | addinfo \
    | eval TimeList=mvrange(info_min_time,info_max_time,"30m") \
    | mvexpand TimeList \
    | rename TimeList AS _time \
    | eval LocationDetails=0, co2perkWh=""\
        ] \
| xyseries _time, LocationDetails, co2perkWh \
| fields - 0 \
| filldown
iseval = 0

[electricity-carbon-intensity-for-assets]
definition = search index=`electricity-carbon-intensity-index` \
    [ `asset-time-range-to-summarize`] \
    [ ```produce a list of the sourcetypes, post codes and zones we need, in this time period\
        This list is based on which assets have energy consumption recorded in this period\
        ``` \
    | tstats values(host) as "Asset IP" where index=`redfish-snmp-index` AND sourcetype="redfish:chassis:power" \
        [ `asset-time-range-to-summarize`] \
    | mvexpand "Asset IP" \
    | lookup `cmdb-lookup-name` "Asset IP" OUTPUTNEW Site \
    | lookup `sites-lookup-name` "Site" OUTPUTNEW "Electricity CO2e per kWh Source" "Electricity CO2e per kWh Source Location Code" \
    | fields "Electricity CO2e per kWh Source" "Electricity CO2e per kWh Source Location Code" \
    | dedup "Electricity CO2e per kWh Source" "Electricity CO2e per kWh Source Location Code" \
```    | eval sourcetype=case(\
        'Electricity CO2e per kWh Source'=="elecrticity_maps_carbon_intensity","elecrticity_maps_carbon_intensity_latest",\
        'Electricity CO2e per kWh Source'=="carbon_intensity_api_regional_postcodes","carbon_intensity_api_regional_postcodes") ```\
    | eval sourcetype='Electricity CO2e per kWh Source'\
\
    | eval postcode=if('Electricity CO2e per kWh Source'=="NG:carbonintensity:postcode",'Electricity CO2e per kWh Source Location Code',NULL) \
    | eval zone=if('Electricity CO2e per kWh Source'=="EM:carbonintensity",'Electricity CO2e per kWh Source Location Code',NULL) \
    | fields sourcetype, postcode, zone\
        ] \
| eval co2perkWh=coalesce(carbonIntensity,'intensity.forecast') \
| eval LocationCode="Intensity_".sourcetype."/".coalesce(zone,postcode) \
| eval _time=floor(_time) \
| appendpipe \
    [| head 1 \
    | fields _time \
    | addinfo \
    | eval TimeList=mvrange(info_min_time,info_max_time,"10m") \
    | mvexpand TimeList \
    | rename TimeList AS _time \
    | eval LocationCode=0, co2perkWh=""\
        ] \
| xyseries _time, LocationCode, co2perkWh \
| fields - 0 \
| filldown
iseval = 0

