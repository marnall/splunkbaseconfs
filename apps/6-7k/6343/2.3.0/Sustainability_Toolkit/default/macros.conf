[power-asset-location]
definition = search `power-redfish-snmp`\
| lookup `cmdb-lookup-name` "Asset IP" OUTPUTNEW Site \
| lookup `sites-lookup-name` "Site" OUTPUTNEW "Electricity CO2e per kWh Source" "Electricity CO2e per kWh Source Location Code" \
| eval LocationCode='Electricity CO2e per kWh Source'."/".'Electricity CO2e per kWh Source Location Code' \
| eval Asset="kW!".'Asset IP'."!location!".LocationCode \
| xyseries _time, Asset, AverageConsumedkW
iseval = 0

[power-redfish-snmp]
definition = index=`redfish-snmp-index` sourcetype="redfish:chassis:power"\
    [`asset-time-range-to-summarize`] \
| fields _time, host, "PowerControl{}.PowerMetrics.IntervalInMin", "PowerControl{}.PowerMetrics.AverageConsumedWatts" \
| fields - _raw \
| appendpipe \
    [ search "PowerControl{}.PowerMetrics.IntervalInMin" IN (1,2,3,4,5) \
    | fields - "PowerControl{}.PowerMetrics.IntervalInMin" \
    | bin span=10m _time ``` redfish dataset may have a high frequency of events, but we only need 1 per 20 minutes, as the "AverageConsumedWatts" is from previous 20 minutes ```\
    | stats mean("PowerControl{}.PowerMetrics.AverageConsumedWatts") AS AverageConsumedWatts by _time, host\
        ] \
| appendpipe \
    [ search "PowerControl{}.PowerMetrics.IntervalInMin"=10 \
    | fields - "PowerControl{}.PowerMetrics.IntervalInMin" \
    | bin span=10m _time ``` redfish dataset may have a high frequency of events, but we need the last "AverageConsumedWatts" in the 10 minute period```\
    | stats first("PowerControl{}.PowerMetrics.AverageConsumedWatts") AS AverageConsumedWatts by _time, host \
        ] \
| appendpipe \
    [ search "PowerControl{}.PowerMetrics.IntervalInMin"=20 \
    | fields - "PowerControl{}.PowerMetrics.IntervalInMin" \
    | bin span=20m _time ``` redfish dataset may have a high frequency of events, but we need the last "AverageConsumedWatts" in the 20 minute period```\
    | stats first("PowerControl{}.PowerMetrics.AverageConsumedWatts") AS AverageConsumedWatts by _time, host \
    | eval TimeList=mvrange(_time,_time+11*60,"10m") ```Replicate the data we have every 20 minutes, so it's every 10 minutes```\
    | mvexpand TimeList \
    | rename TimeList AS _time \
        ] \
| appendpipe \
    [ search "PowerControl{}.PowerMetrics.IntervalInMin"=30 \
    | fields - "PowerControl{}.PowerMetrics.IntervalInMin" \
    | bin span=30m _time ``` redfish dataset may have a high frequency of events, but we need the last "AverageConsumedWatts" in the 30 minute period```\
    | stats first("PowerControl{}.PowerMetrics.AverageConsumedWatts") AS AverageConsumedWatts by _time, host \
    | eval TimeList=mvrange(_time,_time+21*60,"10m") ```Replicate the data we have every 30 minutes, so it's every 10 minutes```\
    | mvexpand TimeList \
    | rename TimeList AS _time \
        ] \
| where isnull('PowerControl{}.PowerMetrics.IntervalInMin') \
| fields _time, host, AverageConsumedWatts \
| eval AverageConsumedkW=exact(AverageConsumedWatts/1000) \
| fields - AverageConsumedWatts \
| rename host as "Asset IP"
iseval = 0

