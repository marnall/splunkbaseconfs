##
## DO NOT EDIT THIS FILE!
## Please make all changes to files in $SPLUNK_HOME/etc/apps/TA_MS_ExchangeForwardingRules_for_splunk/local.
## To make changes, copy the section/stanza you want to change from $SPLUNK_HOME/etc/apps/TA_MS_ExchangeForwardingRules_for_splunk/default
## into ../local and edit there.
##

## Below stanza will automatically generate Exchange Mailbox forwarding rules csv file
[powershell://generate_exchange_mailbox_forward_rules_csv]
script = . "$SplunkHome\etc\apps\TA_MS_ExchangeForwardingRules_for_splunk\bin\powershell\on_premises_exchange_mailbox_forward_rules.ps1" -csv_file "MSExchange_ForwardRule"
schedule = 0 * * * *
disabled = 1

## Below stanza will automatically cleanup Exchange Mailbox forwarding rules csv file
[powershell://cleanup_mailbox_forward_rules_csv]
script = . "$SplunkHome\etc\apps\TA_MS_ExchangeForwardingRules_for_splunk\bin\powershell\cleanup_exchange_mailbox_forward_rules_csv.ps1" -csv_file "MSExchange_ForwardRule" -age "-3"
schedule = 0 * * * *
disabled = 1

## Below stanza will monitor the generated Exchange Mailbox forwarding rules csv file
[monitor://$SPLUNK_HOME\var\log\TA_MS_ExchangeForwardingRules_for_splunk\MSExchange_ForwardRule_*.csv]
sourcetype = msexchange:mailforward:csv
crcSalt = <SOURCE>
disabled = 1

## Below stanza will directly ingest Exchange Mailbox forwarding rules using PowerShell (without generate CSV file)
[script://.\bin\run_exchange_ps.cmd on_premises_exchange_mailbox_forward_rules.ps1]
source=Powershell
sourcetype=msexchange:mailforward
interval=300
disabled=1