[ccx_nozomi_web]
search = (sourcetype="nozomi:captured_urls") url="*"
#tag = web

[ccx_nozomi_web_traffic]
search = (sourcetype="nozomi:captured_urls") dm_type="network"
#tag = network communicate

[ccx_nozomi_web_dns]
search = (sourcetype="nozomi:captured_urls") dm_type="dns"
#tag = dns

[ccx_nozomi_link_traffic]
search = (sourcetype="nozomi:link") NOT eventtype="ccx_nozomi_cip_placeholder"
#tag = network communicate

[ccx_nozomi_cip_placeholder]
search = (sourcetype="nozomi:link") dest="*@*"

[ccx_nozomi_session_traffic]
search = (sourcetype="nozomi:session")
#tag = network communicate

[ccx_nozomi_link_events_traffic]
search = (sourcetype="nozomi:link_events")
#tag = network communicate

[ccx_nozomi_alert_malware_attack]
search = (sourcetype="nozomi:alert") threat_name="*" file_hash="*"
#tag = malware attack

[ccx_nozomi_alert_ids_attack]
search = (sourcetype="nozomi:alert") ids_type="network" NOT file_hash="*"
#tag = ids attack

[ccx_nozomi_alert_alerts]
search = (sourcetype="nozomi:alert") type IN("alert","alarm") AND NOT eventtype IN("ccx_nozomi_alert_malware_attack","ccx_nozomi_alert_ids_attack")
#tag = alert

[ccx_nozomi_alert_general_tagging]
search = (sourcetype="nozomi:alert") NOT eventtype IN("ccx_nozomi_alert_malware_attack","ccx_nozomi_alert_ids_attack")
#tag = communicate inventory network session

[ccx_nozomi_variable_traffic_cip]
search = (sourcetype="nozomi:variable") label="cip-*"

[ccx_nozomi_variable_traffic_ptp]
search = (sourcetype="nozomi:variable") label="ptp_*"

[ccx_nozomi_nn_asset_performance]
search = (sourcetype="nozomi:nn_asset") os="*" OR thruput="*" OR thruput_max="*"
#tag = performance os

[ccx_nozomi_health_performance]
search = (sourcetype="nozomi:health") info.cpu="*" or info.ram="*"
#tag = performance cpu memory

