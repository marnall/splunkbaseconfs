[source::...ta-crowdstrike-falcon-spotlight-data*.log*]
sourcetype = tacrowdstrikefalconspotlightdata:log

[source::...ta_crowdstrike_falcon_spotlight_data*.log*]
sourcetype = tacrowdstrikefalconspotlightdata:log

[source::...ta-crowdstrike-falcon-spotlight-vulnerability-assessment*.log*]
sourcetype = tacrowdstrikefalconspotlightvulnerabilityassessment:log

[source::...ta_crowdstrike_falcon_spotlight_vulnerability_assessment*.log*]
sourcetype = tacrowdstrikefalconspotlightvulnerabilityassessment:log

[crowdstrike:spotlight:vulnerability:json]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 35
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%Z
TIME_PREFIX = "updated_timestamp"\s*:\s*"
TZ = UTC
category = Network & Security
pulldown_type = 1
TRUNCATE = 0
sourcetype = crowdstrike:spotlight:vulnerability:json

# CIM Vulnerabilities data model — field aliases
FIELDALIAS-cve = falcon_spotlight.cve.id AS cve
FIELDALIAS-cvss = falcon_spotlight.cve.base_score AS cvss
FIELDALIAS-dest = falcon_spotlight.host_info.hostname AS dest
FIELDALIAS-dest_ip = falcon_spotlight.host_info.local_ip AS dest_ip
FIELDALIAS-signature = falcon_spotlight.cve.description AS signature
FIELDALIAS-signature_id = falcon_spotlight.vulnerability_id AS signature_id
FIELDALIAS-severity_id = falcon_spotlight.cve.base_score AS severity_id
FIELDALIAS-mskb = falcon_spotlight.remediation.entities{}.reference AS mskb
FIELDALIAS-url = falcon_spotlight.cve.references{} AS url
FIELDALIAS-xref = falcon_spotlight.cve.cwes{} AS xref

# CIM Vulnerabilities data model — calculated fields
EVAL-severity = lower('falcon_spotlight.cve.severity')
EVAL-category = mvindex('falcon_spotlight.cve.types{}', 0)
EVAL-dvc = "CrowdStrike Falcon Spotlight"
EVAL-vendor_product = "CrowdStrike Falcon Spotlight"

