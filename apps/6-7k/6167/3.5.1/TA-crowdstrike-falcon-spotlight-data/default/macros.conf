[cs_spotlight_get_index]
definition = index=*
iseval = 0

[CrowdStrike_Spotlight_CVE(1)]
args = cve
definition = `cs_spotlight_get_index` falcon_spotlight.cve.id=$cve$
iseval = 0

[CrowdStrike_Spotlight_AppName(1)]
args = app
definition = `cs_spotlight_get_index` falcon_spotlight.apps{}.product_name_version=$app$
iseval = 0

[cs_spotlight_logs]
definition = index=_internal ((sourcetype="tacrowdstrikefalconspotlightdata:log") OR (source=*splunkd.log crowdstrike_falcon_spotlight_vulnerability (ERROR OR WARN)))
iseval = 0