[CrowdStrike Falcon Spotlight Data Logs - 30 Days]
action.email.useNSSubject = 1
alert.track = 0
description = Collects the CrowdStrike Spotlight Vulnerability Data Technical Add-on logs for the past 30 days
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
dispatchAs = user
display.general.timeRangePicker.show = 0
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-falcon-spotlight-data
request.ui_dispatch_view = search
search = `cs_spotlight_logs`

[CrowdStrike Falcon Spotlight Data Indexed vs Event Time]
action.email.useNSSubject = 1
alert.track = 0
description = Shows when the CrowdStrike Falcon Spotlight was indexed, the event timestamp and the count of events. Timespan needs to be large enough to include the Event Time stamp.
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-falcon-spotlight-data
request.ui_dispatch_view = search
search = `cs_spotlight_get_index` | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S")  | eventstats count by "Indexed Time"  | rename  count as "Number of CrowdStrike Spotlight Data Events"  | eval "Spotlight Event Time" = strftime(_time, "%Y-%m-%d %H:%M:%S")|table "Indexed Time", "Spotlight Event Time", "Number of CrowdStrike Spotlight Data Events" |sort  -"Indexed Time"

[CrowdStrike Falcon Spotlight Data Indexed Events by Hour]
action.email.useNSSubject = 1
alert.track = 0
description = Shows when the number of CrowdStrike Falcon Spotlight events that were indexed, broken down by hour buckets. The Timespan needs to be large enough to include the Event Time stamp.
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
dispatchAs = user
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-falcon-spotlight-data
request.ui_dispatch_view = search
search = `cs_spotlight_get_index`| bucket _indextime span=1h | eval "Indexed Time"=strftime(_indextime,"%Y-%m-%d %H:%M:%S")  | stats count by "Indexed Time"  | rename  count as "Number of CrowdStrike Spotlight Data Events" |sort  -"Indexed Time"

[CrowdStrike Falcon Spotlight Data Collection Counts by Collection Hash]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
description = Provides counts of the Vulnerability IDs that were collected for specific collections.
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
dispatchAs = user
display.events.fields = ["host","source","sourcetype","event.Type","eventtype"]
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-crowdstrike-falcon-spotlight-data
request.ui_dispatch_view = search
search = `cs_spotlight_get_index` | eval indextime=strftime(_indextime,"%Y-%m-%d %H:%M:%S") | eventstats latest(indextime) as "Last Vulnerability Indexed At"  by ta_data.Input, ta_data.Collection_hash | stats  dc(falcon_spotlight.id) as "Vulnerability IDs Collected" by ta_data.Input, ta_data.Collection_hash, "Last Vulnerability Indexed At" | rename ta_data.Collection_hash as "Collection Hash Value" ta_data.Input as "Input Name" | sort -"Last Vulnerability Indexed At"
