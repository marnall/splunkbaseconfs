# SAMPLE monitor stanza to read netscout NSA logs written to disk by your syslog service (e.g. syslog-ng or rsyslog)

[monitor:///path/to/your/logs/hostname/]
disabled = true
host_segment = 5
index = netscoutnsa
sourcetype = netscout:nsa

# SAMPLE monitor stanza to have splunk listen on a port for syslog data.
# NOT recommended for production environments.

[tcp-ssl://1514]
disabled = true
connection_host = dns
index = netscoutnsa
sourcetype = netscout:nsa
