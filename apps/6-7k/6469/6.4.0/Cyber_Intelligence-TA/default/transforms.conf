# Please make all changes to files in $SPLUNK_HOME/etc/apps/Cyber_Intelligence-TA/local.
# To make changes, copy the section/stanza you want to change from $SPLUNK_HOME/etc/apps/Cyber_Intelligence-TA/default
# into ../local and edit there.

[cefHeaders]
REGEX = CEF: *(?<cef_cefVersion>\d+)\|(?<cef_vendor>[^|]*)\|(?<cef_product>[^|]*)\|(?<cef_version>[^|]*)\|(?<cef_signature>[^|]*)\|(?<cef_name>[^|]*)\|(?<cef_severity>[^|]*)

[cefKeys]
REGEX = (?:_+)?(?<_KEY_1>[\w.:\[\]]+)=(?<_VAL_1>.*?(?=(?:\s[\w.:\[\]]+=|$)))
REPEAT_MATCH = True
CLEAN_KEYS = 1
