[dhIssueAppVersions]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
search = | rest /services/apps/local splunk_server=local\
| fields title version\
| fillnull value="" version\
| eval\
    appver=title+":"+version\
| fields appver

[dhIssueCreate]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
search = | makeresults\
| eval\
    dh_issue_id="$dh_issue_id$",\
    dh_issue_time="$dh_issue_time$",\
    dh_issue_user="$dh_issue_user$",\
    dh_issue_url="$dh_issue_url$",\
    dh_issue_app_cur="$dh_issue_app_cur$",\
    dh_issue_app_def="$dh_issue_app_def$",\
    dh_issue_view="$dh_issue_view$",\
    dh_issue_tok_def="$dh_issue_tok_def$",\
    dh_issue_tok_sub="$dh_issue_tok_sub$",\
    dh_issue_ua="$dh_issue_ua$",\
    dh_issue_roles="$dh_issue_roles$",\
    dh_issue_tz="$dh_issue_tz$",\
    dh_issue_text="$dh_issue_text$",\
    dh_issue_splunk_ver="$dh_issue_splunk_ver$",\
    dh_issue_app_ver="$dh_issue_app_ver$",\
    dh_issue_product="$dh_issue_product$",\
    dh_issue_locale="$dh_issue_locale$",\
    dh_issue_splunk_server="$dh_issue_splunk_server$",\
    _time=dh_issue_time\
| collect `dh_issue_report_index` sourcetype="dh:issue:report" source="dhIssueCreate"\
| fields _time dh_issue_id dh_issue_user\
| join [\
    | inputlookup dh_issue_status WHERE dh_issue_default_status=1\
    | rename dh_issue_status_id as dh_issue_status\
    | fields dh_issue_status\
]\
| eval\
    dh_issue_status_time=tonumber(_time)\
| collect `dh_issue_report_index` sourcetype="dh:issue:tracking" source="dhIssueCreate"\
| rename\
    dh_issue_id as _key\
| eval\
    dh_issue_user_read=1,\
    dh_issue_visible=1,\
    dh_issue_user_read=1\
| outputlookup append=t dh_issue_assignment\
| rename\
    _key as dh_issue_id\
| fields _time dh_issue_id\
| eval\
    dh_issue_screenshot="$dh_issue_screenshot$"\
| collect `dh_issue_report_index` sourcetype="dh:issue:screenshot" source="dhIssueCreate"\
| fields - dh_issue_screenshot\
| eval\
    dh_issue_screenshot="$dh_issue_screenshot_tn$"\
| collect `dh_issue_report_index` sourcetype="dh:issue:screenshot:tn" source="dhIssueCreate"

[dhIssueGetImageInfo]
action.email.useNSSubject = 1
alert.track = 0
search = `dh_issue_report_index` sourcetype="dh:issue:screenshot" $dh_issue_ids$\
| join type=outer dh_issue_id [\
    search `dh_issue_report_index` sourcetype="dh:issue:screenshot:tn" $dh_issue_ids$\
    | rename\
        dh_issue_screenshot as dh_issue_screenshot_tn\
    | fields dh_issue_id dh_issue_screenshot_tn\
]\
| fields dh_issue_id dh_issue_screenshot dh_issue_screenshot_tn

[dhIssueGetUserInfo]
action.email.useNSSubject = 1
alert.track = 0
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = dashboard_helpdesk
request.ui_dispatch_view = search
search = | rest /services/authentication/users splunk_server=local\
| search title=$user$\
| fields title roles tz defaultApp splunk_server\
| eval hash=upper(substr(md5(title),0,6))
