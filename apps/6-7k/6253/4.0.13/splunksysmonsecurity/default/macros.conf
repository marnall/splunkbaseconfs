[sysmon_detect_networkprovider_registry_set]
definition = `winlog_search` `winlog_rename_fields` \
| search EventCode=13 AND (TargetObject="*\\System\\CurrentControlSet\\Control\\NetworkProvider\\ProviderOrder\\*" OR TargetObject="*\\System\\CurrentControlSet\\Control\\NetworkProvider\\Order\\PROVIDERORDER*")\
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| table time, EventCode, ComputerName, TaskCategory, TargetObject, Details\
| eval severity="MEDIUM" \
| eval summary="Modification of NetworkProvider Registry keys typically used to capture credentials e.g. NPPSpy" \
| eval body="ComputerName: " . ComputerName . " TaskCategory: " . TaskCategory . " TargetObject: " . TargetObject  . " Value: " . Details\
| eval mitre_tactic="Credential Access" \
| eval mitre_technique="OS Credential Dumping" \
| eval mitre_sub_technique= "Cached Domain Credentials" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_nopac_computer_account_creation_cve_2021_42278]
definition = `winlog_search` `winlog_rename_fields` \
    ```look for new computer account creation where the account created does not include '$' ``` \
| where EventCode=4741 OR EventCode=4781 \
| where !like(New_Account_Name, "%$") \
| transaction ComputerName maxspan=2s \
| table _time, EventCode, EventName, New_Account_Name, ComputerName\
| nomv New_Account_Name\
| nomv EventCode\
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="MEDIUM" \
| eval summary="NoPAC Machine Account creation (CVE-2021-42287/CVE-2021-42278)" \
| eval body="Accounts: " . New_Account_Name . " EventCode: " . EventCode . " EventName: " . EventName . " ComputerName: " . ComputerName\
| eval mitre_tactic="Credential Access" \
| eval mitre_technique="Steal or forge Kerberos tickets" \
| eval mitre_sub_technique= "-" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_overpass_the_hash_rc4]
definition = `winlog_search` `winlog_rename_fields` \
| where EventCode=4768 AND Ticket_Encryption_Type="0x17"\
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| nomv Account_Name \
| nomv Client_Address\
| eval severity="MEDIUM" \
| eval summary="Over Pass the Hash Attempts Detected via RC4 Encryption" \
| eval body="Account: " . Account_Name . " Client_Address: " . Client_Address . " EventCode: " . EventCode . " EventName: " . EventName\
| eval mitre_tactic="Lateral Movement" \
| eval mitre_technique="User Alternate Authentication Material" \
| eval mitre_sub_technique= "Pass the Hash" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_pass_the_hash]
definition = `winlog_search` `winlog_rename_fields` \
