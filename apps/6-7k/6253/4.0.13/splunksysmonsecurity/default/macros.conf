[sysmon_detect_powershell_clm_bypass_invoke_wmimethod]
definition = `winlog_search` `winlog_rename_fields` \
| eval CommandLine=coalesce(lower(CommandLine), lower(Message), "NULL")\
| where (EventCode=1 AND like(CommandLine, "%powershell%version%2%")) OR (EventCode=4104 AND like(CommandLine, "%invoke-wmimethod%powershell%version%2%"))\
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats earliest(time) as time, latest(time) as latest_time, count by EventCode, EventName, ComputerName, User, CommandLine\
| eval severity="MEDIUM" \
| eval summary="Constrained Language Mode Bypass via Powershell version 2.0" \
| eval body="ComputerName: " . ComputerName . " Account: " . User . " EventCode: " . EventCode . " EventName: " . EventName . " CommandLine: " . CommandLine\
| eval mitre_tactic="Execution" \
| eval mitre_technique="Command and Scripting Interpreter" \
| eval mitre_sub_technique= "Powershell" \
| `sysmon_create_alert`
iseval = 0

