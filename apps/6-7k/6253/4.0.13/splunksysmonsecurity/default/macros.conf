[sysmon_detect_unusual_shell_commands]
definition = `sysmon_search` `sysmon_rename_fields` \
| eval CommandLine=lower(CommandLine)\
| where (\
    like(ParentCommandLine, "%cmd%") OR \
    like(ParentImage, "%\cmd.exe%")\
    ) AND\
    (\
    like(CommandLine, "%tasklist%") OR like(Image, "%\tasklist.exe%") OR \
    like(CommandLine, "%ipconfig%") OR like(Image, "%\ipconfig.exe%") OR \
    like(CommandLine, "%net %") OR like(Image, "%\net.exe %") OR \
    like(CommandLine, "%localgroup %") OR like(Image, "%\localgroup.exe%") OR \
    like(CommandLine, "%netsh %") OR like(Image, "%\netsh.exe%") OR \
    like(CommandLine, "%netstat%") OR like(Image, "%\netstat.exe %") OR \
    like(CommandLine, "%route %") OR like(Image, "%\route.exe %") OR \
    like(CommandLine, "%wmic %") OR like(Image, "%\wmic.exe %") OR \
    like(CommandLine, "%systeminfo %") OR like(Image, "%\systeminfo.exe %") OR \
    like(CommandLine, "%whoami %") OR like(Image, "%\whoami.exe %") OR like(CommandLine, "%whoami%") OR \
    like(CommandLine, "%nbtstat %") OR like(Image, "%\nbtstat.exe %") OR\
    like(CommandLine, "%dsquery%server%") OR \
    like(CommandLine, "%netdom%query%") OR \
    like(CommandLine, "%nltest%dclist%") OR \
    like(CommandLine, "%echo%userdomain%") OR like(CommandLine, "%activedirectory%getcurrentdomain%") OR\
    like(CommandLine, "%\setupapi.setup.log%")\
) \
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats count, values(EventCode) as event_codes, values(CommandLine) as CommandLines, earliest(time) as time, latest(time) as latest_time by ComputerName, User\
| eval CommandLines=mvjoin(CommandLines, ",")\
| nomv event_codes\
| where count > 2\
| eval severity="MEDIUM" \
| eval summary="Use of Unusual Shell Commands" \
| nomv User \
| eval body="Account: " . User . " ComputerName: " . ComputerName . " Commands: " . CommandLines\
| eval mitre_tactic="Discovery" \
| eval mitre_technique="Account Discovery" \
| eval mitre_sub_technique= "Local Account" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_username_password_bruteforce]
definition = `winlog_search` `winlog_rename_fields` \
| where (EventCode=4768)\
| stats distinct_count(Account_Name) as count by ComputerName, EventCode, EventName \
| `comment("Modify the threshold as appropriate for the environment")`\
| eval threshold=50\
| where count > threshold\
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="MEDIUM" \
| eval summary="Bruteforcing username and password combination via tools such as kerbrute" \
| eval body="ComputerName: " . ComputerName . " Account_Name_Count: " . count . " threshold: " . threshold\
| eval mitre_tactic="Credential Access" \
| eval mitre_technique="Brute Force" \
| eval mitre_sub_technique= "Password Guessing" \
| `sysmon_create_alert`
iseval = 0

