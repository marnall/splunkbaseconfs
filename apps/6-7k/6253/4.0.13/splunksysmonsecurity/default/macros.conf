[sysmon_rename_fields]
definition = | rex field=Message "(?<EventName>[^:]+):"\
| rex field=Hashes "MD5=(?<MD5>[0-9A-F]+)"\
| rex field=Hashes "SHA256=(?<SHA256>[0-9A-F]+)"\
| rex field=Hashes "IMPHASH=(?<IMPHASH>[0-9A-F]+)"
iseval = 0

[sysmon_search]
definition = index=main sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational
iseval = 0

[sysmon_tabulate]
definition = | table _time, User, EventCode, EventName, IntegrityLevel, Image, SourceImage, TargetImage, \
CommandLine, CurrentDirectory, Product, Description, ParentImage, ParentCommandLine, Hashes, SourceIp, SourceHostname, SourcePort, DestinationIp, DestinationHostname, DestinationPort, _raw
iseval = 0

[winlog_rename_fields]
definition = | rex field=Message "(?<EventName>[^\.]+)\."
iseval = 0

[winlog_search]
definition = index=main sourcetype=WinEventLog:* sourcetype!="sourcetype=WinEventLog:Microsoft-Windows-Sysmon/Operational"
iseval = 0

[winlog_tabulate_fields]
definition = |  table _time, sourcetype, EventCode, EventName, ComputerName, Message\
|  sort -_time
iseval = 0
