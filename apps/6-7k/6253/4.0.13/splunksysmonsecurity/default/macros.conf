[comment(1)]
args = arg1
definition = noop
iseval = 0

[sysmon_create_alert]
definition = fields time, severity, summary, body, mitre_tactic, mitre_technique, mitre_sub_technique\
| outputlookup append=true sysmon_alerts.csv
iseval = 0

[sysmon_detect-malicious_file_av]
definition = `winlog_search` `winlog_rename_fields` \
| where (EventCode=1116 OR EventCode=1117)\
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats earliest(time) as time, latest(time) as latest_time, count by EventCode, Path, ComputerName, Category, Name \
| eval severity="MEDIUM" \
| eval summary="Malware detected by Windows Defender AV" \
| eval body="ComputerName: " . ComputerName . " Path: " . Path . " Category: " . Category . " Name: " . Name\
| eval mitre_tactic="Execution" \
| eval mitre_technique="User Execution" \
| eval mitre_sub_technique= "Malicious File" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_adhunttool]
definition = `sysmon_search` EventCode=1\
`sysmon_rename_fields`\
| search (product="*adhunt*" \
  OR description="*adhunt*"\
  OR CommandLine="*adhunt*"\
  OR MD5="C8038262D3F47D90329B4B96C748E7B3"\
  OR SHA256="253391A34543EAAE5B594E61B9430205654F917FBA5E3E3FA01957CB657EFC2E"\
  OR IMPHASH="F34D5F2D4577ED6D9CEEC516C1F5A744")
iseval = 0

[sysmon_detect_applocker_file_block]
definition = `winlog_search` `winlog_rename_fields` \
| search EventCode=8004\
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S")\
| stats earliest(time) as time, latest(time) as latest_time, count by EventCode, User, ComputerName, Message\
| eval severity="LOW" \
| eval summary="AppLocker blocked an execution of application" \
| eval body="ComputerName: " . ComputerName . " User: " . User . " Message: " . Message \
| eval mitre_tactic="Execution" \
| eval mitre_technique="User Execution" \
| eval mitre_sub_technique= "Malicious File" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_applocker_policy_modified]
definition = `winlog_search` `winlog_rename_fields` \
| search EventCode=8001 \
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats earliest(time) as time, latest(time) as latest_time, count by EventCode, User, ComputerName, Message \
| eval severity="MEDIUM" \
| eval summary="AppLocker policy modified" \
| eval body="ComputerName: " . ComputerName . " User: " . User . " Message: " . Message \
| eval mitre_tactic="Defense Evasion" \
| eval mitre_technique="Impair Defenses" \
| eval mitre_sub_technique= "Disable or Modify Tools" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_binary_proxy_execution_explorer]
definition = `sysmon_search` `sysmon_rename_fields` \
| eval CommandLine=lower(CommandLine)\
| where EventCode=1 AND like(CommandLine, "%explorer.exe%microsoft-edge%https://%") \
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats earliest(time) as time, latest(time) as latest_time, count by EventCode, EventName, ComputerName, User, CommandLine \
| eval severity="MEDIUM" \
| eval summary="Use of Lolbin for Security tools bypass (explorer.exe for arbitrary file download)" \
| eval body="ComputerName: " . ComputerName . " Account: " . User . " EventCode: " . EventCode . " EventName: " . EventName . " CommandLine: " . CommandLine \
| eval mitre_tactic="Defence Evasion" \
| eval mitre_technique="Signed Binary Proxy Execution" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_binary_proxy_execution_rundll32]
definition = `sysmon_search` `sysmon_rename_fields` \
| search EventCode=1 AND CommandLine="*rundll32.exe*" AND CommandLine="*pcwutl*" AND CommandLine="*LaunchApplication*" \
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats earliest(time) as time, latest(time) as latest_time, count by EventCode, EventName, ComputerName, User, CommandLine\
| eval severity="MEDIUM" \
| eval summary="Use of Lolbin for Security tools bypass (See Lolbas for more details)"\
| eval body="ComputerName: " . ComputerName . " Account: " . User . " EventCode: " . EventCode . " EventName: " . EventName . " CommandLine: " . CommandLine\
| eval mitre_tactic="Defence Evasion" \
| eval mitre_technique="Signed Binary Proxy Execution" \
| eval mitre_sub_technique= "Rundll32"\
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_credential_dumping_via_ntdsutil]
definition = `winlog_search` `winlog_rename_fields` \
| eval TargetFilename=lower(TargetFilename)\
| eval Image=lower(Image)\
| where EventCode=11 AND (like(TargetFilename, "%ntds%.dit") OR like(TargetFilename, "%ntds%.jfm") OR like(Image, "%ntds.exe%") OR like(Image, "%ntdsutil%"))\
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S")\
| stats earliest(time) as time, latest(time) as latest_time, count by EventCode, EventName, ComputerName, TargetFilename, Image\
| eval severity="HIGH" \
| eval summary="Active Directory Dumping via NTDSUtil" \
| eval body="ComputerName: " . ComputerName . " TargetFilename: " . TargetFilename . " Image: " . Image\
| eval mitre_tactic="Credential Access" \
| eval mitre_technique="OS Credential Dumping" \
| eval mitre_sub_technique= "NTDS" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_cscript_gathernetworkinfo]
definition = `sysmon_search` `sysmon_rename_fields`\
| search (EventCode=1 AND CommandLine="*cscript.exe*" AND CommandLine="*gatherNetworkInfo.vbs*")\
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S")\
| stats earliest(time) as time, latest(time) as latest_time, count by EventCode, EventName, ComputerName, User, CommandLine\
| eval severity="MEDIUM"\
| eval summary="Use of LOLBIN gathernetworkinfo.vbs for Information Gathering" \
| eval body="ComputerName: " . ComputerName . " Account: " . User . " EventCode: " . EventCode . " EventName: " . EventName . " CommandLine: " . CommandLine \
| eval mitre_tactic="Execution"\
| eval mitre_technique="Command and Scripting Interpreter"\
| eval mitre_sub_technique= "Visual Basic"\
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_dcsync_execution]
definition = `winlog_search` `winlog_rename_fields` \
| where EventCode=4662 AND (like(Message, "%1131f6ad-9c07-11d1-f79f-00c04fc2dcd2%") OR like(Message, "%1131f6ad-9c07-11d1-f79f-00c04fc2dcd2%") OR like(Message, "%DS-Replication-Get-Changes-All%") OR like(Message, "%Replication Get Changes All%"))\
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats earliest(time) as time, latest(time) as latest_time, count by EventCode, EventName, ComputerName, Account_Domain, Account_Name\
| where count > 2\
| eval severity="HIGH" \
| eval summary="DCSync Execution Detected" \
| eval body="Account: " . Account_Domain . "/" . Account_Name . " ComputerName: " . ComputerName\
| eval mitre_tactic="Credential Access" \
| eval mitre_technique="OS Credential Dumping" \
| eval mitre_sub_technique= "DC Sync" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_encrypted_zip_phishing_files]
definition = `winlog_search` `winlog_rename_fields` \
| search (EventCode=1 OR EventCode=5379) \
| transaction maxspan=2m startswith="EventCode=5379" \
| mvexpand EventCode \
| search EventCode=1 AND (CommandLine="*.ppt*" OR CommandLine="*.lnk" OR CommandLine="*.doc*" OR CommandLine="*.xls*" OR CommandLine="*.accdb*" OR CommandLine="*.iso*" OR CommandLine="*.txt*") \
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="LOW" \
| eval summary="Opening of Encrypted zip files with Winows Zip OR 7zip followed by opening of Common Phishing documents. Ref: https://twitter.com/SBousseaden/status/1523383197513379841" \
| nomv User \
| nomv EventName\
| eval body="User: " . User . " EventCode: " . EventCode . " EventName:" . EventName . " CommandLine: " . CommandLine \
| eval mitre_tactic="Initial Access" \
| eval mitre_technique="Phishing" \
| eval mitre_sub_technique= "SpearPhishing Attachment" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_excessive_anonymous_network_logon]
definition = `winlog_search` `winlog_rename_fields`\
| search (EventCode=4624 AND Account_Name="ANONYMOUS LOGON" AND Logon_Type=3)\
| bin _time span=2m\
| stats count, values(Account_Domain) as Account_Domains, values(Source_Network_Address) as Source_Network_Addresses by _time, EventCode, EventName, ComputerName\
| where count > 5\
| table count, _time, EventCode, EventName, ComputerName, Account_Domains, Source_Network_Addresses\
| nomv Account_Domains\
| nomv Source_Network_Addresses\
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="MEDIUM" \
| eval summary="Excessive Anonymous Network Logon Events indicative of coercsion (e.g. via Coercer)" \
| eval body="ComputerName: " . ComputerName . " Account_Domains: " . Account_Domains . " Source_Network_Addresses: " . Source_Network_Addresses . " EventCode: " . EventCode . " EventName: " . EventName . " ComputerName: " . ComputerName . " Anonymous_Logon_Count: " . count\
| eval mitre_tactic="Collection" \
| eval mitre_technique="Adversary-in-the-Middle" \
| eval mitre_sub_technique= "LLMNR/NBT-NS Poisoning and SMB Relay" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_filetransfer_makecab]
definition = `sysmon_search` `sysmon_rename_fields` \
| search EventCode=1 AND CommandLine="*makecab*" AND CommandLine="*CabinetNameTemplate*"\
| eval time = strftime(_time, "%Y-%m-%d %H:%M:%S") \
| stats earliest(time) as time, latest(time) as latest_time, count by EventCode, EventName, ComputerName, User, CommandLine \
| eval severity="MEDIUM" \
| eval summary="Use of Lolbin makecab.exe for Exfiltration" \
| eval body="ComputerName: " . ComputerName . " Account: " . User . " EventCode: " . EventCode . " EventName: " . EventName . " CommandLine: " . CommandLine \
| eval mitre_tactic="Command and Control" \
| eval mitre_technique="Ingress Tool Transfer" \
| eval mitre_sub_technique= "-" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_kerberoasting_4769]
definition = `winlog_search` \
    `winlog_rename_fields` \
| search EventCode=4769 Ticket_Encryption_Type=0x17 Ticket_Options="0x408*" Keywords="Audit Success" \
| stats dc(Service_Name) as services_count, values(Service_Name) as services by EventCode, EventName, Account_Name\
| search services_count > 2 \
| nomv services \
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="MEDIUM" \
| eval summary="Kerberoasting detected from excessive Kerberos Service Tickets Generation" \
| nomv User \
| eval body="Account: " . Account_Name . " EventCode: " . EventCode . " EventName: " . EventName . " Services: " . services\
| eval mitre_tactic="Credential Access" \
| eval mitre_technique="Steal or forge Kerberos tickets" \
| eval mitre_sub_technique= "Kerberoasting" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_lsass_memory_access_mimikatz]
definition = ```sysmon_detect_lsass_memory_access_mimikatz```\
`sysmon_search` `sysmon_rename_fields` \
| eval CallTrace=lower(CallTrace)\
| eval GrantedAccess=lower(GrantedAccess)\
| where EventCode=10 AND (GrantedAccess="0x1010" OR GrantedAccess="0x1410" OR GrantedAccess="0x143a" OR GrantedAccess="0x1438") AND like(TargetImage, "%\lsass.exe") AND like(CallTrace, "%\\ntdll.dll%\\kernelbase.dll%")\
| table _time, TargetImage, TargetProcessId, GrantedAccess, SourceImage, SourceProcessId, ComputerName, User, EventCode, EventName\
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| eval severity="HIGH" \
| eval summary="LSASS Access possibly indicative of Mimikatz" \
| nomv User \
| eval body="ComputerName: " . ComputerName . "Account: " . User . " EventCode: " . EventCode . " EventName: " . EventName . " SourceImage: " . SourceImage . " TargetImage: " . TargetImage\
| eval mitre_tactic="Credential Access" \
| eval mitre_technique="OS Credential Dumping" \
| eval mitre_sub_technique= "LSASS Memory" \
| `sysmon_create_alert`
iseval = 0

