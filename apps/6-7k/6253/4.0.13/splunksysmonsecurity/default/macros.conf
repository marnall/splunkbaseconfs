[sysmon_detect_windows_dns_connections_beaconing]
definition = `sysmon_search` `sysmon_rename_fields` ```Look for Outbound DNS query activity``` \
| where EventCode=22 \
| table _time, QueryName, ComputerName \
| sort 0 queryName,_time ```Calculate the difference between beacon times - detects upto 60 minutes difference``` \
| delta _time AS time_delta \
| search time_delta>0 AND time_delta<900 ```Calculate the deviations``` \
| stats count, avg(time_delta) as average, stdev(time_delta) as std_dev by QueryName, ComputerName \
    ```Identify deviations which are within 20% of the average (aka 68% values are closeby within 20% to the average), and there is sufficient data points to calculate it``` \
| eval beacon_ratio = round(std_dev/average, 2) \
| where count > 20 AND (beacon_ratio > 0 AND beacon_ratio < 0.20)\
| eval std_dev = round(std_dev, 2) \
| eval average = round(average, 2) \
    ```Add time label``` \
| eval time=strftime(now(),"%Y-%m-%d %H:%M:%S") \
| eval severity="MEDIUM" \
| eval summary="DNS Beaconing detected to remote locations" \
| eval body="QueryName: " . QueryName . " ComputerName: " . ComputerName . " data_points: " . count . " Average Outbound connectivity(seconds): " . average . " Dev (seconds): " . std_dev \
| eval mitre_tactic="Command and Control" \
| eval mitre_technique="Application Layer Protocol" \
| eval mitre_sub_technique = "DNS" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_windows_network_connections_beaconing]
definition = `sysmon_search`\
    `sysmon_rename_fields`\
    ```Look for Outbound Network activity``` \
| where EventCode=3 \
| eval source=SourceIp \
| eval destination=DestinationIp . ":" . DestinationPort \
| table _time, destination,source \
| sort 0 destination,source,_time\
    ```Calculate the difference between beacon times - detects upto 60 minutes difference``` \
| delta _time AS time_delta \
| search time_delta>0 AND time_delta<900\
    ```Calculate the deviations``` \
| stats count, avg(time_delta) as average, stdev(time_delta) as std_dev by destination, source \
| eval beacon_ratio = round(std_dev/average, 2)\
    ```Identify deviations which are within 20% of the average (aka 68% values are closeby within 20% to the average), and there is sufficient data points to calculate it``` \
| where count > 20 AND (beacon_ratio > 0 AND beacon_ratio < 0.20)\
| eval std_dev = round(std_dev, 2)\
| eval average = round(average, 2)\
```Add time label```\
| eval time=strftime(now(),"%Y-%m-%d %H:%M:%S") \
| eval severity="MEDIUM" \
| eval summary="Outbound Network Beaconing detected to remote locations"\
| eval body="source: " . source . " destination: " . destination . " data_points: " . count . " Average Outbound connectivity(seconds): " . average . " Dev (seconds): " . std_dev \
| eval mitre_tactic="Command and Control" \
| eval mitre_technique="-" \
| eval mitre_sub_technique = "-" \
| `sysmon_create_alert`
iseval = 0

[sysmon_detect_windows_powershell_long_command_exec]
definition = `sysmon_search` `sysmon_rename_fields` `sysmon_tabulate` \
| search CommandLine = "*powershell*"\
| eval commandlineLen = len(CommandLine)\
