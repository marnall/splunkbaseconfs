[sysmon_detect_dotnet_assembly_execution_unusual_locations]
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 * * * *
description = Alert to detect execution C# .NET Assembly from unusual locations
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = splunksysmonsecurity
request.ui_dispatch_view = search
search = `winlog_search` `winlog_rename_fields` \
| search EventName="*Process Create*" OR (EventName="*Image Loaded*" AND (OriginalFileName="clr.dll" OR OriginalFileName="clrjit.dll" OR OriginalFileName="mscor*.dll")) \
| eval ProcessImageHash=if(like(EventName, "%Process Create%"), Hashes, "") \
| eval DllFileName=if(like(OriginalFileName, "%.dll"), OriginalFileName, null()) \
| transaction ProcessId Image maxspan=60m\
| where !isnull(ImageLoaded) AND !isnull(ParentProcessId) \
| eval time=strftime(_time,"%Y-%m-%d %H:%M:%S") \
| stats values(DllFileName) as DllFileName, dc(DllFileName) as DllFileNameCount, values(ProcessImageHash) as ProcessImageHashes, count by time,  ComputerName, ProcessId, ParentProcessId, Image, ParentImage \
| where DllFileNameCount >= 2\
```Ignore paths which are known to execute .net binaries. Note: Users can expand this block to exclude more paths```\
| where !(\
    like(Image, "C:\Windows\Microsoft.NET\%") OR \
    like(Image, "C:\Windows\System32\%") OR \
    like(ParentImage, "C:\Windows\System32\services.exe")\
)\
| nomv ProcessImageHashes\
| eval severity="MEDIUM" \
| eval summary="Execution of C# .NET assembly from unusual locations" \
| eval body="ComputerName: " . ComputerName . "\
ProcessId: " . ProcessId ."\
ProcessName: " . Image . "\
ParentProcessID: " . ParentProcessId . "\
ParentProcess: " . ParentImage . "\
ProcessImageHashes: " . ProcessImageHashes\
| eval mitre_tactic="Defense Evasion" \
| eval mitre_technique="Reflective Code Loading" \
| eval mitre_sub_technique= "-" \
| `sysmon_create_alert`

