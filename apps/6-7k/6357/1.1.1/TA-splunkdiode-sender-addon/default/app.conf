# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 1

[launcher]
author = Prewin Thomas
version = 1.1.1
description = This Add-On works together with the Diode Receiver Add-On.It is designed to send data between Splunk servers through a data diode, while preserving the Splunk metadata.The sender will encapsulate Splunk metadata like sourcetype, source, host, _time into the _raw message which can then be forwarded over UDP or TCP. The receiver will unpack this and populate the metadata fields as well and restore the _raw to its original state.

[ui]
is_visible = 0
label = SplunkDiode-Sender-Addon
docs_section_override = AddOns:released

[package]
id = TA-splunkdiode-sender-addon

[triggers]
reload.addon_builder = simple
reload.ta_splunkdiode_sender_addon_account = simple
reload.ta_splunkdiode_sender_addon_settings = simple
reload.passwords = simple

