[postgresql:edb:audit]
# Splunk magic 8 props
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 28
TIME_FORMAT=%Y-%m-%d %H:%M:%S.%Q %Z
# 700 is enough for authentication log
# TRUNCATE = 700
# For_Load_Balancing_On_UF
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = ([\r\n]+)
NO_BINARY_CHECK=true
CHARSET=UTF-8
KV_MODE=none
category=Database
description=Comma-separated value format. Set header and other settings in "Delimited Settings"
pulldown_type=true
EXTRACT-postgresql_edb_audit = (?<log_time>\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}.\d{3}\s\w{3}),\"(?<user>[^"]*)\",\"(?<database_name>[^"]*)\",(?<process_id>[^"]*),\"(?:\[)?(?<connection_from>([^\]\"]*))(?:\])?\",(?<session_id>[^"]*),(?<session_line_num>[^"]*),\"(?<process_status>[^"]*)\",(?<session_start_time>[^"]*),(?<virtual_transaction_id>[^"]*),(?<transaction_id>[^"]*),(?<error_severity>[^"]*),(?<sql_state_code>[^"]*),\"(?<message>[^"]*)\",(?<detail>[^"]*),(?<hint>[^"]*),(?<internal_query>[^"]*),(?<internal_query_pos>[^"]*),(?<context>[^"]*),(?<query>[^"]*),(?<query_pos>[^"]*),(?<location>[^"]*),\"(?<application_name>[^"]*)\",\"(?<command_tag>[^"]*)\",\"(?<audit_tag>[^"]*)\"
EVAL-app = postgresql-edb
EVAL-dest = host
EVAL-action = if(error_severity=="LOG", "success", "failure")
EVAL-src = coalesce(src_ip, connection_from)