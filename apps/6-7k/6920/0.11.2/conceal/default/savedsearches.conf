[ConcealBrowse Block Event]
cron_schedule = 0 * * * *
action.webhook.enable_allowlist = 0
alert.expires = 7d
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 60m
alert.track = 1
counttype = number of events
description = A block/redirect is a known bad. Security need to know about such events in a timely manner
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.visualizations.type = mapping
enableSched = 1
quantity = 1
relation = greater than
request.ui_dispatch_app = conceal
request.ui_dispatch_view = search
search = sourcetype=conceal_event final_decision=block OR redirect

[Habitual Offender Alert]
cron_schedule = 0 23 * * 0
action.webhook.enable_allowlist = 0
alert.expires = 7d
alert.suppress = 0
alert.track = 1
counttype = number of events
description = Alert triggered is a user has 3 ore more isolations over a 7 day period
dispatch.earliest_time = -1w
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.type = mapping
enableSched = 1
quantity = 3
relation = greater than
request.ui_dispatch_app = conceal
request.ui_dispatch_view = search
search = sourcetype=conceal_event final_decision=block OR redirect OR isolate | stats count by user_email
