[scm_signal]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
INDEXED_EXTRACTIONS = csv
TIME_FORMAT = %s
TRUNCATE = 0
#FIELDALIAS-extract_signalType = signalType AS type
# OLD 
#TIME_PREFIX = ^[^,]*,[^,]*,[^,]*,[^,]*,[^,]*,
#TIME_FORMAT = %m/%d/%Y %H:%M:%S %Z
#REPORT-scm_signal_extract = scm_signal_extract
#KV_MODE=none

#
# This source is used to insure index-time field extractions for terrain events
#
[source::xmacquire]
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)
TIME_PREFIX=eventTimeEpoch=
TIME_FORMAT=%s.%3N
TRANSFORMS-new = indextime_extraction,indextime_extraction_taxonomyId

[source::relevancy_graph]
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)
TIME_PREFIX=instanceTime=
TIME_FORMAT=%s.%3N
TRANSFORMS-graph = relevancy_graph_indextime_extraction

[source::transaction_instance]
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)
TIME_PREFIX=beginTime:
TIME_FORMAT=%s.%3N
KV_MODE=auto
TRANSFORMS-graph = transaction_graph_indextime_extraction

[scm_framework_log]
SHOULD_LINEMERGE=false
LINE_BREAKER=([\r\n]+)\d+-\d+-\d{4}\s\d+:\d+:\d+\.\d+\s
TIME_PREFIX=^
TIME_FORMAT=%m-%d-%Y %H:%M:%S.%3N %Z
TRUNCATE=25000
#
EXTRACT-FULL = \d+-\d+-\d{4}\s\d+:\d+:\d+\.\d+\s[^\s]+\s+(?<log_level>[^\s]+)\s+(?<component>[^\s]+)\s+-\spid:(?<pid>[^\s]+)\s(?<file>[^:]+):(?<lineNumber>[^\s]+)\s(?<message>.*)

