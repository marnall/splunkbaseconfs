[script:splunk_filelink_accounts]
match                 = /splunk-filelink/accounts
script                = filelink/api/web/account_handler.py
scripttype            = persist
handler               = filelink/api/web/account_handler.AccountHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth        = true
python.version        = python3

[script:splunk_filelink_files]
match                 = /splunk-filelink/files
script                = filelink/api/web/file_handler.py
scripttype            = persist
handler               = filelink/api/web/file_handler.FileHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth        = true
python.version        = python3


[script:splunk_filelink_permissions]
match                 = /splunk-filelink/permissions
script                = filelink/api/web/permissions_handler.py
scripttype            = persist
handler               = filelink/api/web/permissions_handler.PermissionsHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3
capability.post       = filelink_edit_roles

[script:splunk_filelink_config]
match                 = /splunk-filelink/popup
script                = filelink/api/web/config_handler.py
scripttype            = persist
handler               = filelink/api/web/config_handler.ConfigHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3