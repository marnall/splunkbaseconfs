[beyondtrust:rs:appliance]
NO_BINARY_CHECK = true
DATETIME_CONFIG = /etc/datetime.xml
SHOULD_LINEMERGE = false
pulldown_type = 1
description = BeyondTrust Remote Support Syslog Events
EXTRACT-confMemTeams = confMemTeams\=;(?P<confMemTeams>.+?);\|

[beyondtrust:rs:session:cef]
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = 0
pulldown_type = 1
description = BeyondTrust Remote Support Session Events
EXTRACT-session_event_header_fields = ^(?P<timestamp>[^\|]+)\|(?P<vendor>[^\|]+)\|(?P<vendor_product>[^\|]+)[^\|\n]*\|(?P<product_version>[^\|]+)\|(?P<event_id>[^\|]+)\|(?P<event_name>[^\|]+)
DATETIME_CONFIG = /etc/datetime.xml

[source::...beyondtrust-rs-integration*.log*]
sourcetype = beyondtrustrsintegration:log

[source::...beyondtrust_rs_integration*.log*]
sourcetype = beyondtrustrsintegration:log

