
[ccx_lastpass_alerts]
search = (sourcetype="ccx:lastpass:activity:hec" OR sourcetype="ccx:lastpass:activity:json" OR sourcetype="lastpass" OR sourcetype="ccx:lastpass:json") dataset_name="alert"
# alert

[ccx_lastpass_authentication]
search = (sourcetype="ccx:lastpass:activity:hec" OR sourcetype="ccx:lastpass:activity:json" OR sourcetype="lastpass" OR sourcetype="ccx:lastpass:json") dataset_name="authentication" AND NOT Action IN ("Login to Admin Console", "Login to admin console")
# authentication

[ccx_lastpass_change]
