[cisco_sdwan_index]
description = Definition for all indices where Cisco SDWAN data is stored
definition = ()
iseval = 0


[summariesonly]
description = Definition for the dashboard query to populate from summariesonly
definition = summariesonly=false
iseval = 0


[nataddress_regular]
description = Definition for the extracted NAT addresses to convert them to ipv4 addresses
definition = | fillnull value=0 cisco_hsl_post_nat_src_addr cisco_hsl_post_nat_dest_addr \
| rename cisco_hsl_post_nat_dest_addr as IP \
| eval ip=if(IP=0,0,IP) \
| eval aaa=floor(ip/16777216) \
| eval bbb=floor((ip-aaa*16777216)/65536) \
| eval ccc=floor((ip-(aaa*16777216+bbb*65536))/256) \
| eval ddd=ip-(aaa*16777216+bbb*65536+ccc*256) \
| eval cisco_hsl_post_nat_dest_addr=tostring(aaa)+"."+tostring(bbb)+"."+tostring(ccc)+"."+tostring(ddd)\
| rename cisco_hsl_post_nat_src_addr as IP \
| eval ip=if(IP=0,0,IP) \
| eval aaa=floor(ip/16777216) \
| eval bbb=floor((ip-aaa*16777216)/65536) \
| eval ccc=floor((ip-(aaa*16777216+bbb*65536))/256) \
| eval ddd=ip-(aaa*16777216+bbb*65536+ccc*256) \
| eval cisco_hsl_post_nat_src_addr=tostring(aaa)+"."+tostring(bbb)+"."+tostring(ccc)+"."+tostring(ddd)
iseval = 0


[nataddress_datamodel]
description = Definition for the extracted NAT addresses to convert them to ipv4 addresses
definition = | fillnull value=0 Cisco_SDWAN_Netflow.cisco_hsl_post_nat_src_addr Cisco_SDWAN_Netflow.cisco_hsl_post_nat_dest_addr \
| rename Cisco_SDWAN_Netflow.cisco_hsl_post_nat_dest_addr as IP \
| eval ip=if(IP="N/A",0,IP) \
| eval aaa=floor(ip/16777216) \
| eval bbb=floor((ip-aaa*16777216)/65536) \
| eval ccc=floor((ip-(aaa*16777216+bbb*65536))/256) \
| eval ddd=ip-(aaa*16777216+bbb*65536+ccc*256) \
| eval cisco_hsl_post_nat_dest_addr=tostring(aaa)+"."+tostring(bbb)+"."+tostring(ccc)+"."+tostring(ddd)\
| rename Cisco_SDWAN_Netflow.cisco_hsl_post_nat_src_addr as IP \
| eval ip=if(IP="N/A",0,IP) \
| eval aaa=floor(ip/16777216) \
| eval bbb=floor((ip-aaa*16777216)/65536) \
| eval ccc=floor((ip-(aaa*16777216+bbb*65536))/256) \
| eval ddd=ip-(aaa*16777216+bbb*65536+ccc*256) \
| eval cisco_hsl_post_nat_src_addr=tostring(aaa)+"."+tostring(bbb)+"."+tostring(ccc)+"."+tostring(ddd)
iseval = 0