[transaction]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIMESTAMP_FIELDS = 
TIME_FORMAT = %Y\/%m\/%d %H:%M:%S.%3N
TZ = Europe/Brussels
category = Structured
pulldown_type = 1
disabled = false
BREAK_ONLY_BEFORE_DATE = 
CHARSET = ISO-8859-1
SHOULD_LINEMERGE = false
TIME_PREFIX = \"t_req_first\":\"
LOOKUP-HTTPCODE = HTTPCODE status AS Response OUTPUTNEW description AS HTTP_RET_DESCRIPTION status AS HTTP_RET_STATUS type AS HTTP_RET_TYPE


[wifi]
DATETIME_CONFIG = 
INDEXED_EXTRACTIONS = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIMESTAMP_FIELDS = 
TIME_FORMAT = %Y\/%m\/%d %H:%M:%S.%3N
TZ = Europe/Brussels
category = Structured
pulldown_type = 1
disabled = false
BREAK_ONLY_BEFORE_DATE = 
CHARSET = ISO-8859-1
SHOULD_LINEMERGE = false
TIME_PREFIX = \"t_req_first\":\"
LOOKUP-WLANFCTYPE = WLANFCTYPE Wlan_Fc_Type AS wlan_fc_type OUTPUTNEW Wlan_Fc_Type AS Wlan_Fc_Type Wlan_Fc_Type_Description AS Wlan_Fc_Type_Description
LOOKUP-lookups_WLANFCRETRY = WLANFCRETRY Wlan_Fc_Retry AS wlan_fc_retry OUTPUTNEW Wlan_Fc_Retry AS Wlan_Fc_Retry Wlan_Fc_Retry_Description AS Wlan_Fc_Retry_Description
LOOKUP-lookups_WLANFCTYPESUBTYPE = WLANFCTYPESUBTYPE Wlan_Fc_Type_Subtype AS wlan_fc_type_subtype OUTPUTNEW Wlan_Fc_Type_Subtype AS Wlan_Fc_Type_Subtype Wlan_Fc_Type_Subtype_Description AS Wlan_Fc_Type_Subtype_Description
LOOKUP-WLANFIXEDREASONCODE = WLANFIXEDREASONCODE Reason_DeASSO_DeAUTH AS wlan_fixed_reason_code OUTPUTNEW Definition_DeASSO_DeAUTH AS Wlan_Fixed_Reason_Code_Description Reason_DeASSO_DeAUTH AS Wlan_Fixed_Reason_Code
LOOKUP-WLANFIXEDSTATUSCODE = WLANFIXEDSTATUSCODE Code_AUTH_ASSO AS wlan_fixed_status_code OUTPUTNEW Code_AUTH_ASSO AS Wlan_Fixed_Status_Code Definition_AUTH_ASSO AS Wlan_Fixed_Status_Code_Description
