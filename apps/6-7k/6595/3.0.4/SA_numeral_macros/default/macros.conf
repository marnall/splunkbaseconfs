# A regular expression for extracting IPv4 address field
[IP4Regex(1)]
args = field
definition = "(?<![0-9.])(?<$field$>"`IP4RegexRaw`")(?![0-9.])"
iseval = 0

[IP4RegexRaw]
definition = "(?:(?:25[0-5]|(?:2[0-4]|1[0-9]|[1-9]|)[0-9])\.){3}(?:25[0-5]|(?:2[0-4]|1[0-9]|[1-9]|)[0-9])"
iseval = 0

# A regular expression for extracting IPv6 address field
[IP6Regex(1)]
args = field
definition = "(?i)(?<![0-9a-z:.])(?<$field$>"`IP6RegexRaw`")(?![0-9a-z:.])"
iseval = 0

[IP6RegexRaw]
definition = "(?:(?:(?:[0-9a-f]{1,4}:){7}([0-9a-f]{1,4}|:))|(?:(?:[0-9a-f]{1,4}:){6}(?::[0-9a-f]{1,4}|(?:(?:25[0-5]|(?:2[0-4]|1[0-9]|[1-9]|)[0-9])\.){3}(?:25[0-5]|(?:2[0-4]|1[0-9]|[1-9]|)[0-9])|:))|(?:(?:[0-9a-f]{1,4}:){5}(?:(?:(?::[0-9a-f]{1,4}){1,2})|:(?:(?:25[0-5]|(?:2[0-4]|1[0-9]|[1-9]|)[0-9])\.){3}(?:25[0-5]|(?:2[0-4]|1[0-9]|[1-9]|)[0-9])|:))|(?:(?:[0-9a-f]{1,4}:){4}(?:(?:(?::[0-9a-f]{1,4}){1,3})|(?:(?::[0-9a-f]{1,4})?:(?:(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])(?:\.(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])){3}))|:))|(?:(?:[0-9a-f]{1,4}:){3}(?:(?:(?::[0-9a-f]{1,4}){1,4})|(?:(?::[0-9a-f]{1,4}){0,2}:(?:(?:25[0-5]|(?:2[0-4]|1[0-9]|[1-9]|)[0-9])\.){3}(?:25[0-5]|(?:2[0-4]|1[0-9]|[1-9]|)[0-9]))|:))|(?:(?:[0-9a-f]{1,4}:){2}(?:(?:(?::[0-9a-f]{1,4}){1,5})|(?:(?::[0-9a-f]{1,4}){0,3}:(?:(?:25[0-5]|(?:2[0-4]|1[0-9]|[1-9]|)[0-9])\.){3}(?:25[0-5]|(?:2[0-4]|1[0-9]|[1-9]|)[0-9]))|:))|(?:(?:[0-9a-f]{1,4}:){1}(?:(?:(?::[0-9a-f]{1,4}){1,6})|(?:(?::[0-9a-f]{1,4}){0,4}:(?:(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])(?:\.(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])){3}))|:))|(?::(?:(?:(?::[0-9a-f]{1,4}){1,7})|(?:(?::[0-9a-f]{1,4}){0,5}:(?:(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])(?:\.(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])){3}))|:)))(?:%[_a-z0-9]+)?"
iseval = 0

# A regular expression for extracting URI Element fields
[URIRegex(7)]
args = scheme,userinfo,host,port,path,query,fragment
definition ="^(?i)(?:(?<$scheme$>[a-z][a-z0-9+\-.]*):)?(?:\/\/(?:(?<$userinfo$>(?:[a-z0-9\-._~]|(?:%[0-9a-f]{2})|[!$&'()*+,;=:])*)@)?(?<$host$>(?:\["`IP6RegexRaw`"\]|(?:[a-z0-9\-._~]|(?:%[0-9a-f]{2})|[!$&'()*+,;=])*))(?::(?<$port$>[0-9]*))?)?(?<$path$>(?:(?:\/(?:(?:(?:[a-z0-9._~-]|%[0-9a-f]{2}|[!$&'()*+,;=:@]))*))*)|(?:(?:\/(?:(?:(?:[a-z0-9._~-]|%[0-9a-f]{2}|[!$&'()*+,;=:@]))+)(?:\/(?:((?:[a-z0-9._~-]|%[0-9a-f]{2}|[!$&'()*+,;=:@]))*))+?))|(?:(?:(?:[a-z0-9._~-]|%[0-9a-f]{2}|[!$&'()*+,;=@])(?:\/(?:(?:(?:[a-z0-9._~-]|%[0-9a-f]{2}|[!$&'()*+,;=:@]))*))*))|(?:(?:(?:(?:(?:[a-z0-9._~-]|%[0-9a-f]{2}|[!$&'()*+,;=:@]))+)(?:\/(?:(?:(?:[a-z0-9._~-]|%[0-9a-f]{2}|[!$&'()*+,;=:@]))*))*))|(?:))(?:\?(?<$query$>(?:(?:[a-z0-9\-._~!$&'()*+,;=:@\/?]|(?:%[0-9a-f]{2})))*))?(?:#(?<$fragment$>(?:[a-z0-9\-._~!$&'()*+,;=:@\/?]|(?:%[0-9a-f]{2}))*))?(?![a-z0-9\-._~!$x&'()*+,;=:@\/?])"
iseval = 0

# Get comma-separated values from a lookup with a where condition
# This is useful to get the list from inputlookup and set it to the “field IN (a,b,c,...)” condition of search.
[GetValueListFromLookup(3)]
args = lookup,where,column
definition = [| inputlookup $lookup$ where $where$ | eval "$column$" = if(match('$column$',"[\s\"]"),"\"".replace('$column$',"\"","\\\"")."\"",'$column$') | stats values("$column$") as list | eval list=mvjoin(list,",") | return $list ]
iseval = 0

# Values of all fields in a particular datamodel except for specific fields
# This is for using with tstats, instead of the "values(*) as *" for stats.
[DmAllFieldsExcept(3)]
args = datamodel,nodename,exceptfields
definition = [| datamodelsimple type=attributes datamodel=$datamodel$ nodename=$nodename$ | search lineage=$nodename.* NOT lineage IN ($exceptfields$) | eval rename="values(".lineage.") as ".attribute | stats values(rename) as rename | return $rename ]
iseval = 0

