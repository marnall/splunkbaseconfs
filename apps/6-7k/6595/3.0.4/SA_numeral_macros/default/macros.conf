# Numeral system macros for Splunk

# Macros for detection 1
[Detection1_search]
definition = index=_internal sourcetype=splunkd source=*splunkd.log* log_level!=INFO* NOT component IN (SearchParser)
iseval = 0

[Detection1_statsmethod]
definition = count
iseval = 0

[Detection1_splitfields]
definition = host,thread_name,thread_id,component,log_level
iseval = 0

[Detection1_name]
definition = splunkd ERR/WARN
iseval = 0

[Detection1_displayfields]
definition = event_message
iseval = 0

