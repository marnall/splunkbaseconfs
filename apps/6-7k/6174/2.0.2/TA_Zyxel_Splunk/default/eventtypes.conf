[zywall-traffic]
search = sourcetype=zywall:fw:traffic

[zywall-vpn-session]
search = sourcetype=zywall:fw:vpn

[zywall-vpn-session-start]
search = sourcetype=zywall:fw:vpn msg="SSL tunnel has been established"

[zywall-vpn-session-stop]
search = sourcetype=zywall:fw:vpn msg="SSL tunnel has been disconnected"

[zywall-vpn-session-fail]
search = sourcetype=zywall:fw:vpn msg="Failed login attempt to SSLVPN from http/https*"

[zywall-vpn-session-pass]
search = sourcetype=zywall:fw:vpn msg="*http/https has logged in SSLVPN*"

[zywall-user-auth]
search = sourcetype=zywall:fw:user

[zywall-user-auth-failed]
search =sourcetype=zywall:fw:user msg="Failed login attempt to Device from ssh (incorrect password or inexistent username)"

[zywall-user-auth-errors]
search =sourcetype=zywall:fw:user msg="Failed login attempt to Device from ssh (incorrect password or inexistent username)" OR msg="Fail login attempt to Device from ssh (login on a lockout address)"


[zywall-security-control]
search = sourcetype=zywall:fw:security:control 

[zywall-security-control-blocked]
search = sourcetype=zywall:fw:security:control note="ACCESS BLOCK"


[zywall-security-control-allowed]
search = sourcetype=zywall:fw:security:control note="ACCESS FORWARD"


