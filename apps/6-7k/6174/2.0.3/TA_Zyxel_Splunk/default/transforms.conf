[src_ip_and_port]
CLEAN_KEYS = 0
FORMAT = src_ip::$1 src_port::$2
REGEX = src="(\d+.\d+.\d+.\d+):(\d+)"

[Tx_and_Rx_rate]
CLEAN_KEYS = 0
FORMAT = TxB/s::$1 RxB/s::$2
REGEX = TxB\/s\=(\d+),RxB\/s\=(\d+),

[protocol_id_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = protocol_id_lookup.csv

[MAC]
CLEAN_KEYS = 0
FORMAT = dev_ID::$1
REGEX = mode=sed 's/(.{2})/\1:/g s/:$//'
SOURCE_KEY = devID

[USER]
FORMAT = Username::$1
REGEX = note=\"Account:\s(.*)\"\suser

[dest_port_ext]
CLEAN_KEYS = 0
FORMAT = dest_port::$1
REGEX = dst="[\d,\.]+:(\d+)

[destination_ip]
FORMAT = dest_ip::$1
REGEX = dst="(\d+.\d+.\d+.\d+)

[trans_msg]
CLEAN_KEYS = 0
FORMAT = message::$1
REGEX = msg="(.*)"\snote
