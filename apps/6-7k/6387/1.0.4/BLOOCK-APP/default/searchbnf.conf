# Send records
[sendrecords-command]
syntax = sendrecords (<sendrecords-options>)
shortdesc = Send records to Bloock.
description = Send records to Bloock. Must specify the license key, the internal cd field and the internal bkt field.
usage = public
example1 = sendrecords license=test field_cd=cd field_bkt=bkt
comment1 = Sends records to Bloock using test license.
related = send
tags = bloock send

[sendrecords-options]
syntax = wait=<bool> | license=<string> | field_cd=<field> | field_bkt=<field> | update_checkpoint=<bool> | reg_size=<int>
description = 'wait' controls if the send request waits for anchor to be processed (default=true)\
  'license' specifies the license key used for Bloock connections\
  'field_cd' specifies the internal cd field for identifying the event\
  'field_bkt' specifies the internal bkt field for identifying te event\
  'update_checkpoint' controls if the checkpoint is updated for this index and API key (default=false)\
  'reg_size' specifies the size of the bucket of events sent in a single request (default=100)\

# Verify records
[verifyrecords-command]
syntax = verifyrecords (<verifyrecords-options>)
shortdesc = Verify records sent to Bloock.
description = Verify records sent Bloock. Must specify the license key.
usage = public
example1 = verifyrecords license=test
comment1 = Verify records sent to Bloock using 'test' license.
related = verify
tags = bloock verify

[verifyrecords-options]
syntax = license=<string> | reg_size=<int>
description = 'license' specifies the license key used for Bloock connections\
  'reg_size' specifies the size of the bucket of events sent in a single request (default=100)\

# Read checkpoint
[readcheckpoint-command]
syntax = readcheckpoint (<readcheckpoint-options>)
shortdesc = Reads the checkpoint for a specific license key and index.
description = Reads the checkpoint for a specific license key and index. Must specify the license key and index.
usage = public
example1 = readcheckpoint license=test index=events
comment1 = Reads the checkpoint of the last event sent to Bloock using 'test' license and index 'events'.
related = checkpoint
tags = bloock checkpoint

[readcheckpoint-options]
syntax = license=<string> | index=<string>
description = 'license' specifies the license key used for Bloock connections\
  'index' specifies the index of the checkpoint (default=100)\
