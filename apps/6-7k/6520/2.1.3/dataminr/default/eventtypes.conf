[dataminr_alerts]
search = source=dataminr
#tags = ids attack

[dataminr_cyber_alerts]
search = source="dataminr"  watchlistsMatchedByType{}.userProperties.uiListType="CYBER"
#tags = ids attack malware report vulnerability

[dataminr_malware_data]
search = source="dataminr" metadata.cyber.malwares{}="*"

[dataminr_vulnerabilities_data]
search = source="dataminr" metadata.cyber.vulnerabilities{}.id="*"