[expose:dataminr_account_specified]
pattern = dataminr_account/*
methods = POST, GET, DELETE

[expose:dataminr_settings]
pattern = dataminr_settings
methods = POST, GET

[expose:dataminr_settings_specified]
pattern = dataminr_settings/*
methods = POST, GET, DELETE

[expose:dataminr_dataminr_api]
pattern = dataminr_dataminr_api
methods = POST, GET

[expose:dataminr_dataminr_api_specified]
pattern = dataminr_dataminr_api/*
methods = POST, GET, DELETE

[expose:dataminr_dataminr_webhook]
pattern = dataminr_dataminr_webhook
methods = POST, GET

[expose:dataminr_dataminr_webhook_specified]
pattern = dataminr_dataminr_webhook/*
methods = POST, GET, DELETE

[expose:dataminr_watch_lists]
pattern = dataminr_watch_lists
methods = GET

[expose:dataminr_watch_lists_specified]
pattern = dataminr_watch_lists/*
methods = GET

[expose:_splunkd_data]
