[asset_distance_miles(4)]
args = lat1,long1,lat2,long2
definition = abs(3956 * (2 * asin(sqrt(pow(sin((($lat1$*pi()/180)-($lat2$*pi()/180)) / 2),2) + cos(($lat1$*pi()/180)) * cos(($lat2$*pi()/180)) * pow(sin((($long1$*pi()/180)-($long2$*pi()/180)) / 2),2)))))
iseval = 0

