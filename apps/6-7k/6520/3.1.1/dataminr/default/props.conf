[source::dataminr]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
MAX_TIMESTAMP_LOOKAHEAD = 28
TIME_PREFIX = "eventTime":\s*|"timestamp\":\s*
TZ = UTC

# Mappings to accommodate Webhook data with API data
FIELDALIAS-caption = headline ASNEW caption
FIELDALIAS-location_name = location.name ASNEW eventLocation.name 
FIELDALIAS-location_radius = location.radius ASNEW eventLocation.radius
FIELDALIAS-location_coordinates = location.coordinates{} ASNEW eventLocation.coordinates{}  
FIELDALIAS-location_places = location.places{} ASNEW eventLocation.places{} 
FIELDALIAS-a_event_source = odsStatus.type ASNEW eventSource 
FIELDALIAS-eventTime = timestamp ASNEW eventTime  
FIELDALIAS-eventVolume = volume ASNEW eventVolume
FIELDALIAS-post_lang = post.languages{}.lang ASNEW odsStatus.languages{}.lang
FIELDALIAS-post_position = odsStatus.languages{}.position ASNEW post.languages{}.position
FIELDALIAS-post_link = odsStatus.link ASNEW post.link
FIELDALIAS-post_timestamp = odsStatus.timestamp ASNEW post.timestamp
FIELDALIAS-source_channels = odsStatus.source.channels{} ASNEW source.channels{}
FIELDALIAS-source_disp_name = odsStatus.source.displayName ASNEW source.displayName
FIELDALIAS-source_entity_name = odsStatus.source.entityName ASNEW source.entityName
FIELDALIAS-source_link = odsStatus.source.link ASNEW source.link
FIELDALIAS-source_verified = odsStatus.source.verified ASNEW source.verified
FIELDALIAS-metadata_urls = embedded.labels{}.data.URLs{} ASNEW metadata.cyber.URLs{} 
FIELDALIAS-a_metadata_ips = embedded.labels{}.data.addresses{}.ip ASNEW metadata.cyber.addresses{}.ip
FIELDALIAS-metadata_orgs = embedded.labels{}.data.orgs{} ASNEW metadata.cyber.orgs{}
FIELDALIAS-metadata_products = embedded.labels{}.data.products{} ASNEW metadata.cyber.products{}
FIELDALIAS-hashes = embedded.labels{}.data.hashes{} ASNEW metadata.cyber.hashes{}
FIELDALIAS-hash_value_type = embedded.labels{}.data.hashValues{}.type ASNEW metadata.cyber.hashValues{}.type
FIELDALIAS-a_hash_value_value = embedded.labels{}.data.hashValues{}.value ASNEW metadata.cyber.hashValues{}.value
FIELDALIAS-malwares = embedded.labels{}.data.malwares{} ASNEW metadata.cyber.malwares{} 
FIELDALIAS-a_threats = embedded.labels{}.data.threats{} ASNEW metadata.cyber.threats{} 
FIELDALIAS-a_metadata_vuln_id = embedded.labels{}.data.vulnerabilities{}.id ASNEW metadata.cyber.vulnerabilities{}.id
FIELDALIAS-a_cvss_score = embedded.labels{}.data.vulnerabilities{}.cvss ASNEW metadata.cyber.vulnerabilities{}.cvss
FIELDALIAS-a_vendor_product = embedded.labels{}.data.vulnerabilities{}.products{}.productName ASNEW metadata.cyber.vulnerabilities{}.products{}.productName

# Vulnerability CIM mapping
TRUNCATE = 999999999
FIELDALIAS-category = categories{}.name AS category
EVAL-categories_name = if(isnotnull(category), category, "-")
EVAL-cve = mvmap('metadata.cyber.vulnerabilities{}.id', replace('metadata.cyber.vulnerabilities{}.id', "[\"\[\]\s]*", ""))
EVAL-ip_addresses = 'metadata.cyber.addresses{}.ip'
EVAL-dvc = eventSource
EVAL-vendor_product = 'metadata.cyber.vulnerabilities{}.products{}.productName'
REPORT-extract_selected_topic = extract_selected_topics
EVAL-event_source = if(isnotnull(eventSource), eventSource, "-")
EVAL-threat_actor = if(isnotnull('metadata.cyber.threats{}'), 'metadata.cyber.threats{}', "-")
FIELDALIAS-companies = companies{}.name as companies
EVAL-companies = if(isnotnull(companies), companies, "-")
FIELDALIAS-watchlist = watchlistsMatchedByType{}.name as watchlist
EVAL-watchlist = if(isnotnull(watchlist), watchlist, "-")
EVAL-watchlist_id_name = mvzip('watchlistsMatchedByType{}.name','watchlistsMatchedByType{}.id')
FIELDALIAS-alert_severity = alertType.id as alert_severity
EVAL-alert_severity = if(isnotnull(alert_severity), alert_severity, "-")

# Alert CIM Mapping
EVAL-id = alertId
EVAL-description = caption
FIELDALIAS-type = alertType.id as type
EVAL-app = "Dataminr Pulse"

EVAL-src = if(category IN ("Network Scans", "Phishing", "Domain Impersonation", "Malware"), mvmap('metadata.cyber.addresses{}.ip', replace('metadata.cyber.addresses{}.ip', "[\[\]]", "")), eventSource)
EVAL-dest = if(NOT category IN("Network Scans", "Phishing", "Malware", "Domain Impersonation", "Cybersecurity - Crime & Malicious Activity", "Cybersecurity"), mvmap('metadata.cyber.addresses{}.ip', replace('metadata.cyber.addresses{}.ip', "[\[\]]", "")), null)
EVAL-severity = if(isnotnull('metadata.cyber.vulnerabilities{}.cvss'), case(max('metadata.cyber.vulnerabilities{}.cvss')>=9, "critical", max('metadata.cyber.vulnerabilities{}.cvss')>=7, "high", max('metadata.cyber.vulnerabilities{}.cvss')>=4, "medium", max('metadata.cyber.vulnerabilities{}.cvss')>=0, "low"), if(alert_severity!="-", case(alert_severity="flash","critical",alert_severity="urgent","high",alert_severity="alert","medium"), null))

# Malware CIM Mapping
EVAL-file_hash = 'metadata.cyber.hashValues{}.value'
EVAL-signature = 'metadata.cyber.malwares{}'

FIELDALIAS-sectors_name = sectors{}.name ASNEW sectors_name
EVAL-sectors_name = if(isnotnull(sectors_name), sectors_name, "-")
EVAL-lists_subtype = if(isnotnull('watchlistsMatchedByType{}.userProperties.uiListType'), 'watchlistsMatchedByType{}.userProperties.uiListType', "-")

EVAL-asn_org = if(isnotnull('metadata.cyber.asOrgs{}.asOrg'), 'metadata.cyber.asOrgs{}.asOrg', "-")
EVAL-asn = if(isnotnull('metadata.cyber.asOrgs{}.asn'), 'metadata.cyber.asOrgs{}.asn', "-")
EVAL-cyber_url = if(isnotnull('metadata.cyber.URLs{}'), 'metadata.cyber.URLs{}', "-")
FIELDALIAS-malware_os_sf = metadata.cyber.malware{}.attackVector{} ASNEW malware_os
EVAL-malware_os = case(malware_os=="ps1", "Play Station OS", malware_os=="win", "Windows", malware_os=="osx", "macOS", malware_os=="ios", "iOS", malware_os=="elf", "Linux", malware_os=="apk", "Android", malware_os=="jav", "Java", malware_os=="jsp", "Javascript", malware_os=="vbs", "VisualBasic", malware_os=="py", "Python", malware_os=="win", "php", 1==1, "Unknown")
EVAL-malware_name = if(isnotnull('metadata.cyber.malware{}.name'), 'metadata.cyber.malware{}.name', "-")
EVAL-malware_vuln_id = if(isnotnull('metadata.cyber.vulnerabilities{}.id'), 'metadata.cyber.vulnerabilities{}.id', "-")
EVAL-cyber_ips = if(isnotnull('metadata.cyber.addresses{}.ip'), 'metadata.cyber.addresses{}.ip', "-")
EVAL-vuln_product_name = if(isnotnull('metadata.cyber.vulnerabilities{}.products{}.productName'), 'metadata.cyber.vulnerabilities{}.products{}.productName', "-")
EVAL-vuln_product_vendor = if(isnotnull('metadata.cyber.vulnerabilities{}.products{}.productVendor'), 'metadata.cyber.vulnerabilities{}.products{}.productVendor', "-")
EVAL-metadata.cyber.threatActors{}.countriesOfOrigin{} = if(isnotnull('metadata.cyber.threatActors{}.countriesOfOrigin{}'), 'metadata.cyber.threatActors{}.countriesOfOrigin{}', "-")

[json]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true

[source::dataminr_v4]
TIME_PREFIX = "alertTimestamp":\s*
MAX_TIMESTAMP_LOOKAHEAD = 24
TZ = UTC
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ

# Vulnerability CIM mapping
TRUNCATE = 999999999
EVAL-cve = mvmap('metadata.cyber.vulnerabilities{}.id', replace('metadata.cyber.vulnerabilities{}.id', "[\"\[\]\s]*", ""))
EVAL-ip_addresses = 'metadata.cyber.addresses{}.ip'
EVAL-vendor_product = 'metadata.cyber.vulnerabilities{}.products{}.productName'

# Alert CIM Mapping
EVAL-id = alertId
EVAL-description = headline
EVAL-type = lower(alert_severity)
EVAL-app = "Dataminr Pulse"

# Malware CIM Mapping
EVAL-file_hash = 'metadata.cyber.hashValues{}.value'
EVAL-signature = 'metadata.cyber.malwares{}'

FIELDALIAS-v4_malware = metadata.cyber.malware{}.name ASNEW metadata.cyber.malwares{}
FIELDALIAS-alert_severity = alertType.name as alert_severity
EVAL-alert_severity = if(isnotnull(alert_severity), lower(alert_severity), "-")
EVAL-severity = if(isnotnull('metadata.cyber.vulnerabilities{}.cvss'), case(max('metadata.cyber.vulnerabilities{}.cvss')>=9, "critical", max('metadata.cyber.vulnerabilities{}.cvss')>=7, "high", max('metadata.cyber.vulnerabilities{}.cvss')>=4, "medium", max('metadata.cyber.vulnerabilities{}.cvss')>=0, "low"), if(lower(alert_severity)!="-", case(lower(alert_severity)="flash","critical",lower(alert_severity)="urgent","high",lower(alert_severity)="alert","medium"), null))
FIELDALIAS-headline = headline ASNEW caption
FIELDALIAS-companies_name = alertCompanies{}.name ASNEW companies{}.name
FIELDALIAS-companies = alertCompanies{}.name as companies
EVAL-companies = if(isnotnull(companies), companies, "-")
FIELDALIAS-wlists_name = listsMatched{}.name ASNEW watchlistsMatchedByType{}.name
FIELDALIAS-wlists_id = listsMatched{}.id ASNEW watchlistsMatchedByType{}.id
FIELDALIAS-watchlist = listsMatched{}.name as watchlist
EVAL-watchlist = if(isnotnull(watchlist), watchlist, "-")
EVAL-watchlist_id_name = mvzip('listsMatched{}.name','listsMatched{}.id')
FIELDALIAS-threat_actor_name = metadata.cyber.threatActors{}.name ASNEW metadata.cyber.threats{}
EVAL-threat_actor = if(isnotnull('metadata.cyber.threats{}'), 'metadata.cyber.threats{}', "-")
FIELDALIAS-alert_sector = alertSectors{}.name ASNEW sectors{}.name
FIELDALIAS-sectors_name = alertSectors{}.name ASNEW sectors_name
EVAL-sectors_name = if(isnotnull(sectors_name), sectors_name, "-")
EVAL-source.channels = if(isnotnull('source.channels{}'), 'source.channels{}', "-")
EVAL-source.displayName = if(isnotnull('source.displayName'), 'source.displayName', "-")
EVAL-source.entityName = if(isnotnull('source.entityName'), 'source.entityName', "-")
EVAL-source.link = if(isnotnull('source.link'), 'source.link', "-")
EVAL-source.verified = if(isnotnull('source.verified'), 'source.verified', "-")
EVAL-companies.id = if(isnotnull('companies.id'), 'companies.id', "-")
FIELDALIAS-coordinates = estimatedEventLocation.coordinates{} ASNEW eventLocation.coordinates{}
FIELDALIAS-location_name = estimatedEventLocation.name ASNEW eventLocation.name
FIELDALIAS-cyber_url = metadata.cyber.URL{}.name ASNEW metadata.cyber.URLs{}
FIELDALIAS-post_link = publicPost.href ASNEW post.link
EVAL-post.link = if(isnotnull('post.link'), 'post.link', "-")
FIELDALIAS-post_media_type = publicPost.media{}.type ASNEW post.media{}.type
EVAL-post.media.type = if(isnotnull('post.media{}.type'), 'post.media{}.type', "-")
FIELDALIAS-post_media_url = publicPost.media{}.href ASNEW post.media{}.url
EVAL-post.media.url = if(isnotnull('post.media{}.url'), 'post.media{}.url', "-")
FIELDALIAS-post_text = publicPost.text ASNEW post.text
EVAL-post.text = if(isnotnull('post.text'), 'post.text', "-")
FIELDALIAS-post_timestamp = publicPost.timestamp ASNEW post.timestamp
EVAL-post.timestamp = if(isnotnull('post.timestamp'), 'post.timestamp', "-")
FIELDALIAS-post_translated_text = publicPost.englishText ASNEW post.translatedText
EVAL-post.translatedText = if(isnotnull('post.translatedText'), 'post.translatedText', "-")
EVAL-publisherCategory.name = if(isnotnull('publisherCategory.name'), 'publisherCategory.name', "-")
FIELDALIAS-matched_lists_type = listsMatched{}.topicIds{} ASNEW watchlistsMatchedByType{}.externalTopicIds{}
EVAL-watchlistsMatchedByType.externalTopicIds = if(isnotnull('watchlistsMatchedByType{}.externalTopicIds{}'), 'watchlistsMatchedByType{}.externalTopicIds{}', "-")
EVAL-metadata.cyber.hashValues.value = if(isnotnull('metadata.cyber.hashValues{}.value'), 'metadata.cyber.hashValues{}.value', "-")
FIELDALIAS-selectedTopicIds = alertTopics{}.id ASNEW selectedTopicIds
FIELDALIAS-selectedTopics = alertTopics{}.name ASNEW selectedTopics
FIELDALIAS-alert_category = alertTopics{}.name ASNEW categories{}.name
FIELDALIAS-alert_category_id = alertTopics{}.id ASNEW categories{}.id
FIELDALIAS-category = alertTopics{}.name AS category
EVAL-categories_name = if(isnotnull(category), category, "-")
FIELDALIAS-event_src = publicPost.channels{} ASNEW eventSource
EVAL-event_source = if(isnotnull(eventSource), eventSource, "-")
EVAL-dvc = eventSource
EVAL-metadata.cyber.products = if(isnotnull('metadata.cyber.vulnerabilities{}.products{}.productName'), 'metadata.cyber.vulnerabilities{}.products{}.productName', "-")
FIELDALIAS-publisher_category = publicPost.channels{} ASNEW publisherCategory.name
FIELDALIAS-source_channels = publicPost.channels{} ASNEW source.channels{}
FIELDALIAS-lists_subtype = listsMatched{}.subType ASNEW lists_subtype
EVAL-lists_subtype = if(isnotnull(lists_subtype), lists_subtype, "-")
EVAL-asn_org = if(isnotnull('metadata.cyber.asOrgs{}.asOrg'), 'metadata.cyber.asOrgs{}.asOrg', "-")
EVAL-asn = if(isnotnull('metadata.cyber.asOrgs{}.asn'), 'metadata.cyber.asOrgs{}.asn', "-")
EVAL-cyber_url = if(isnotnull('metadata.cyber.URL{}.name'), 'metadata.cyber.URL{}.name', "-")
FIELDALIAS-malware_os_sf = intelAgents{}.discoveredEntities{}.affectedOperatingSystems ASNEW malware_os
EVAL-malware_os = case(malware_os=="ps1", "Play Station OS", malware_os=="win", "Windows", malware_os=="osx", "macOS", malware_os=="ios", "iOS", malware_os=="elf", "Linux", malware_os=="apk", "Android", malware_os=="jav", "Java", malware_os=="jsp", "Javascript", malware_os=="vbs", "VisualBasic", malware_os=="py", "Python", malware_os=="win", "php", 1==1, "Unknown")
EVAL-malware_name = if(isnotnull('metadata.cyber.malware{}.name'), 'metadata.cyber.malware{}.name', "-")
EVAL-malware_vuln_id = if(isnotnull('metadata.cyber.vulnerabilities{}.id'), 'metadata.cyber.vulnerabilities{}.id', "-")
EVAL-cyber_ips = if(isnotnull('metadata.cyber.addresses{}.ip'), 'metadata.cyber.addresses{}.ip', "-")
EVAL-vuln_product_name = if(isnotnull('metadata.cyber.vulnerabilities{}.products{}.productName'), 'metadata.cyber.vulnerabilities{}.products{}.productName', "-")
EVAL-vuln_product_vendor = if(isnotnull('metadata.cyber.vulnerabilities{}.products{}.productVendor'), 'metadata.cyber.vulnerabilities{}.products{}.productVendor', "-")
EVAL-metadata.cyber.threatActors{}.countriesOfOrigin{} = if(isnotnull('metadata.cyber.threatActors{}.countriesOfOrigin{}'), 'metadata.cyber.threatActors{}.countriesOfOrigin{}', "-")

EVAL-dest = if(NOT category IN("Network Scans", "Phishing", "Malware", "Domain Impersonation", "Cybersecurity - Crime & Malicious Activity", "Cybersecurity"), mvmap('metadata.cyber.addresses{}.ip', replace('metadata.cyber.addresses{}.ip', "[\[\]]", "")), null)
EVAL-date = alertTimestamp
EVAL-src = if(category IN ("Network Scans", "Phishing", "Domain Impersonation", "Malware"), mvmap('metadata.cyber.addresses{}.ip', replace('metadata.cyber.addresses{}.ip', "[\[\]]", "")), eventSource)

