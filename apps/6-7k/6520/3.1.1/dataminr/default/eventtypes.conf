[dataminr_index]
search = index=main

[dataminr_alerts]
search = eventtype=dataminr_index source IN ("dataminr", "dataminr_v4")
#tags = ids attack

[dataminr_cyber_alerts]
search = eventtype=dataminr_index source IN ("dataminr", "dataminr_v4") lists_subtype="CYBER"
#tags = ids attack malware report vulnerability

[dataminr_malware_data]
search = eventtype=dataminr_index source IN ("dataminr", "dataminr_v4") metadata.cyber.malwares{}="*"

[dataminr_vulnerabilities_data]
search = eventtype=dataminr_index source IN ("dataminr", "dataminr_v4") metadata.cyber.vulnerabilities{}.id="*"

[dataminr_intelAgent_malware_data]
search = eventtype=dataminr_index source="dataminr_v4" "intelAgents{}.discoveredEntities{}.type"=malware

[dataminr_intelAgent_vulnerability_data]
search = eventtype=dataminr_index source="dataminr_v4" "intelAgents{}.discoveredEntities{}.type"=vulnerability

[dataminr_intelAgent_threatActor_data]
search = eventtype=dataminr_index source="dataminr_v4" "intelAgents{}.discoveredEntities{}.type"=threatActor