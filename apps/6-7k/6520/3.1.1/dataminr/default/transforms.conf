[extract_selected_topics]
SOURCE_KEY = _raw
REGEX = \{\"name\": \"(?<selectedTopics>[^\"]+)\", \"topicType\": \"category\", \"id\": \"(?<selectedTopicIds>[^\"]+)\", \"idStr\": \"([^\"]+)\", \"requested\": \"true\", \"path\": \"(?<selectedTopicPaths>[^\"]+)\", \"retired\": (?<selectedTopicRetired>\S+)\}
MV_ADD = true


[dataminr_saved_alerts]
collection = dataminr_saved_alerts
external_type = kvstore
fields_list = _key, alert_id, watchlist, discoveredentities, intelagent, headline, alert_timestamp, livebrief