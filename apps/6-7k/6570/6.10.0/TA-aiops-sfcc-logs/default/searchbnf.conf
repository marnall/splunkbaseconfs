#############################################
# modinput command details
#############################################
[modinput-command]
syntax      = | modinput [op=view | op=delete] [type=<str>] [files=<str>]
shortdesc   = Manage Splunk modinputs directory content
usage       = public
example1    = | modinput type=<INPUT_TYPE> op=view
example2    = | modinput type=<INPUT_TYPE> files=foo.json;bar.json op=view
example3    = | modinput type=<INPUT_TYPE> files=foo.json;bar.json op=delete
maintainer  = AIOPSGROUP