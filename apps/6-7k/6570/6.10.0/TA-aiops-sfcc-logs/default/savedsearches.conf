[AIOPS Splunk License Expired]
action.email = 1
action.email.inline = 1
action.email.message.alert = Dear customer,\
\
We are reaching out to inform you that your AIOPS Splunk License has expired.\
\
Please reach out to your AIOPSGROUP representative to get this resolved!\
\
Monitoring Server :: $result.host$
action.email.priority = 1
action.email.sendresults = 1
action.email.subject.alert = Your AIOPS Splunk License has expired!
action.email.to = aiopsmonitoring@aiopsgroup.com
action.email.useNSSubject = 1
alert.expires = 24d
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 7d
alert.track = 1
counttype = number of events
cron_schedule = 0 0 * * *
description = This alert is triggered when the license supporting the "Salesforce Commerce Cloud Connector for AIOPSGROUP Monitoring" add-on expires.
disabled = false
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = aiops_group_monitoring
request.ui_dispatch_view = search
search = index="_internal" source="/opt/splunk/var/log/splunk/ta_aiops_sfcc_logs_salesforce_commerce_cloud_*.log" "event=*license*expired"\
| rex field=_raw "(?<_raw>\{.*\})"\
| spath time | spath path=data.message output=message\
| table time, message, host

[SFCC Add-on Installation]
action.email = 1
action.email.inline = 0
action.email.message.alert = The alert condition for '$name$' was triggered.\
\
Alert description ::\
'$description$'.\
\
Host: $server.serverName$\
\
Alert report ::\
$result.report$

action.email.priority = 1
action.email.include.results_link = 0
action.email.include.view_link = 1
action.email.subject = $name$ :: $server.serverName$
action.email.to = aiopsmonitoring_dev_team@aiopsgroup.com
alert.expires = 1h
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 24h
alert.suppress.fields = user, app_name, time_bucket
alert.track = 1
counttype = number of events
cron_schedule = 7 0 * * *
description = This alert is triggered when the Salesforce Commerce Cloud Connector for CX Monitoring add-on is successfully installed
disabled = false
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = ta_aiops_sfcc_logs
request.ui_dispatch_view = search
search = index=_internal action=install_app info=succeeded app_name="TA-aiops-sfcc-logs" \
| bin _time as time_bucket span=3m \
| table time_bucket user host app_name \
| join type=left time_bucket \
    [ search index=_internal sourcetype=splunkd_ui_access POST uri_path IN (*splunkd/__raw/services/apps/local*) \
    | bin _time as time_bucket span=3m \
    | table time_bucket host user] \
| convert ctime(time_bucket) \
| eval report=printf("[%s] User [%s] has installed or upgraded the [%s] app on host [%s].", time_bucket, user, app_name, host)

