[default]
[extInfosDatamodels]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 1 * * 0
dispatch.earliest_time = -1h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = cimmaa
request.ui_dispatch_view = search
search = | datamodel \
| spath output=modelName modelName \
| search modelName="Alerts" OR modelName="Application_State" OR modelName="Authentication" OR modelName="Certificates" OR modelName="Change" OR modelName="Change_Analysis" OR modelName="Splunk_CIM_Validation" OR modelName="DLP" OR modelName="Databases" OR modelName="Email" OR modelName="Endpoint" OR modelName="Event_Signatures" OR modelName="Interprocess_Messaging" OR modelName="Intrusion_Detection" OR modelName="Compute_Inventory" OR modelName="JVM" OR modelName="Malware" OR modelName="Network_Resolution" OR modelName="Network_Sessions" OR modelName="Network_Traffic" OR modelName="Performance" OR modelName="Splunk_Audit" OR modelName="Ticket_Management" OR modelName="Updates" OR modelName="Vulnerabilities" OR modelName="Web" \
| spath output=fieldName objects{}.calculations{}.outputFields{}\
| mvexpand fieldName\
| spath output=constraints path=objects{}.autoextractSearch\
| eval constraints=mvdedup(constraints)\
| append [\
          | datamodel \
          | spath output=modelName modelName \
          | search modelName="Alerts" OR modelName="Application_State" OR modelName="Authentication" OR modelName="Certificates" OR modelName="Change" OR modelName="Change_Analysis" OR modelName="Splunk_CIM_Validation" OR modelName="DLP" OR modelName="Databases" OR modelName="Email" OR modelName="Endpoint" OR modelName="Event_Signatures" OR modelName="Interprocess_Messaging" OR modelName="Intrusion_Detection" OR modelName="Compute_Inventory" OR modelName="JVM" OR modelName="Malware" OR modelName="Network_Resolution" OR modelName="Network_Sessions" OR modelName="Network_Traffic" OR modelName="Performance" OR modelName="Splunk_Audit" OR modelName="Ticket_Management" OR modelName="Updates" OR modelName="Vulnerabilities" OR modelName="Web" \
          | spath output=fields objects{}.fields{} \
          | mvexpand fields\
          | rename fields as fieldName          \
         ]\
\
| rex field=fieldName "description\":\"(?P<description>.*?)\",?[\"|\"}}]"\
| rex field=fieldName "owner\":\"(?P<owner>.*?)\",\"\w"\
| rex field=fieldName "type\":\"(?P<type>.*?)\",\""\
| rex field=fieldName "required\":(?P<required>.*?),\""\
| rex field=fieldName "multivalue\":(?P<multivalue>.*?),\""\
| rex field=fieldName "hidden\":(?P<hidden>.*?),\""\
| rex field=fieldName "editable\":(?P<editable>.*?),\""\
| rex field=fieldName "displayName\":\"(?P<displayName>.*?)\",\"\w"\
| rex field=fieldName "expected_values\":\[(?P<expected_values>.*?)],\"\w"\
| rex field=fieldName "recommended\":(?P<recommended>.*?)}}"\
| rex field=fieldName "fieldName\":\"(?P<fieldName>.*?)\",\"\w"\
\
| eval uni = modelName+owner+displayName\
| dedup uni\
\
| fillnull value="no comment." description\
| fillnull , value="-" expected_values\
| fillnull , value="false" recommended\
| table modelName owner displayName fieldName type description editable expected_values hidden multivalue recommended required constraints\
| sort modelName\
| outputlookup dmodels.csv

[tag_datamodels]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 2 * * 0
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = cimmaa
request.ui_dispatch_view = search
search = | datamodel\
| spath output=modelName path=modelName\
| spath output=tags path=objects{}.comment.tags{}\
| eval tag=mvdedup(tags)\
| mvexpand tag\
| table modelName tag\
| outputlookup dmtags.csv

