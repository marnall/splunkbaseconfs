[h3_index]
definition = ()
iseval = 0

[n0_op_status]
definition = inputlookup nodezero_ta_opstatus \
| eval op_name = spath(state, "op_name"), op_state = spath(state, "op_state"), op_id = spath(state, "op_id"), op_type = spath(state, "op_type"), scheduled_timestamp = spath(state, "scheduled_timestamp"), completed_timestamp = spath(state, "completed_timestamp"), pulled_hosts = spath(state, "pulled_hosts"), pulled_weaknesses = spath(state, "pulled_weaknesses"), pulled_action_logs = spath(state, "pulled_action_logs")\
| rex field=scheduled_timestamp mode=sed "s/\.[\d]+$//g" \
| rex field=completed_timestamp mode=sed "s/\.[\d]+$//g" \
| eval op_type = if(match(op_type, "NodeZero"),"Internal",op_type)\
| eval scheduled_timestamp = strftime(trim(scheduled_timestamp), "%c")\
| eval completed_timestamp = strftime(trim(completed_timestamp), "%c")
iseval = 0

[skip_action_logs_pull(1)]
args = opid
definition = inputlookup nodezero_ta_opstatus \
| eval view_key=_key \
| eval op_id = json_extract(state, "op_id")\
| eval state = if(match(op_id, "$opid$"),json_set_exact(state, "pulled_action_logs", "1"),state)\
| fields _key,state\
| outputlookup nodezero_ta_opstatus append=true
iseval = 0
validation = match($opid$, "\w{8}-\w{4}-\w{4}-\w{4}-\w{12}$")
