[h3:nodezero:api:host_export_csv]
FIELDALIAS-host_cim = IP ASNEW dest IP ASNEW dest_ip Hostname ASNEW dest_dns Hostname ASNEW dest_nt_host OS ASNEW os
EVAL-app = "NodeZero"
EVAL-dvc = "NodeZero"
EVAL-product = "NodeZero"
EVAL-vendor = "Horizon3.ai"
EVAL-vendor_product = "Horizon3.ai NodeZero"

[h3:nodezero:api:action_logs_export_csv]
FIELDALIAS-action_log_cim = IP ASNEW dest IP ASNEW dest_ip ModuleName ASNEW signature MitreTactics ASNEW category Cmd ASNEW command
EVAL-action = "allowed"
EVAL-app = "NodeZero"
EVAL-dvc = "NodeZero"
EVAL-ids_type = "pentest"
EVAL-severity = "informational"
EVAL-product = "NodeZero"
EVAL-vendor = "Horizon3.ai"
EVAL-vendor_product = "Horizon3.ai NodeZero"

[h3:nodezero:api:weakness_export_csv]
FIELDALIAS-weakness_cim = ContextScore ASNEW severity_id Name ASNEW signature PortalUrl ASNEW xref RootCause ASNEW category Severity ASNEW severity WeaknessID ASNEW signature_id
FIELDALIAS-weakness_id = WeaknessID ASNEW cve
FIELDALIAS-weakness_dest = IP ASNEW dest_ip Hostname ASNEW dest_dns
EVAL-app = "NodeZero"
EVAL-dvc = "NodeZero"
EVAL-product = "NodeZero"
EVAL-vendor = "Horizon3.ai"
EVAL-vendor_product = "Horizon3.ai NodeZero"
EVAL-dest = coalesce(Hostname, IP)
