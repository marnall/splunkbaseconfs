[admin:nodezero_configuration]
match = /
members = nodezero_Accounts, nodezero_settings

[admin:nodezero_inputs]
match = /
members = nodezero_nodezero_task

[admin_external:nodezero_Accounts]
handlertype = python
python.version = python3
handlerfile = nodezero_rh_Accounts.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:nodezero_settings]
handlertype = python
python.version = python3
handlerfile = nodezero_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:nodezero_nodezero_task]
handlertype = python
python.version = python3
handlerfile = nodezero_rh_nodezero_task.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
