[google:scc:sources]
TRUNCATE = 9999999
SHOULD_LINEMERGE = 0
KV_MODE = json
pulldown_type = 1
EXTRACT-org_id = "canonicalName": "organizations/(?<org_id>\d+)/sources/.*"
EVAL-organization_id = coalesce('org_id', 'orgID')

[google:scc:findings]
TRUNCATE = 9999999
SHOULD_LINEMERGE = 0
KV_MODE = json
pulldown_type = 1
EVAL-finding.severity = coalesce('finding.severity', "SEVERITY_UNSPECIFIED")
TIME_PREFIX = "eventTime": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
TZ = UTC
EXTRACT-org_id = "notificationConfigName": "organizations/(?<org_id>\d+)/notificationConfigs/.*"
EVAL-organization_id = coalesce('org_id', 'orgID')

[google:scc:assets]
TRUNCATE = 9999999
SHOULD_LINEMERGE = 0
KV_MODE = json
pulldown_type = 1
TIME_PREFIX = "updateTime": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
TZ = UTC
EXTRACT-org_id = (?:(?<!"priorAsset":\s{))"ancestors":\s*\[(?:"\w+/\d+"|,\s*)*"organizations/(?<org_id>\d+)"]
EVAL-organization_id = coalesce('org_id', 'orgID')

[google:scc:iam:assets]
TRUNCATE = 9999999
SHOULD_LINEMERGE = 0
KV_MODE = json
pulldown_type = 1
TIME_PREFIX = "updateTime": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
TZ = UTC
EXTRACT-org_id = (?:(?<!"priorAsset":\s{))"ancestors":\s*\[(?:"\w+/\d+"|,\s*)*"organizations/(?<org_id>\d+)"]
EVAL-organization_id = coalesce('org_id', 'orgID')

[google:scc:auditlogs]
TRUNCATE = 9999999
SHOULD_LINEMERGE = 0
KV_MODE = json
pulldown_type = 1
TIME_PREFIX = "timestamp": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
TZ = UTC
EVAL-severity = coalesce('severity', "DEFAULT")
EVAL-action = case(match(lower('protoPayload.methodName'), "create"), "created", match(lower('protoPayload.methodName'), "delete"), "deleted", match(lower('protoPayload.methodName'), "stop"), "stopped", match(lower('protoPayload.methodName'), "start"), "updated", match(lower('protoPayload.methodName'), "update"), "updated", match(lower('protoPayload.methodName'), "setiampolicy"), "updated", match(lower('protoPayload.methodName'), "insert"), "modified", true(), "read")
FIELDALIAS-app  = protoPayload.serviceName AS app
FIELDALIAS-dest = logName AS dest
FIELDALIAS-dest_url = logName AS dest_url
FIELDALIAS-email = protoPayload.authenticationInfo.principalEmail AS email
FIELDALIAS-user = protoPayload.authenticationInfo.principalEmail AS user
FIELDALIAS-user_agent = protoPayload.requestMetadata.callerSuppliedUserAgent AS user_agent
FIELDALIAS-object = protoPayload.resourceName AS object
FIELDALIAS-object_type = resource.type AS object_type
FIELDALIAS-object_id = protoPayload.resourceName AS object_id
FIELDALIAS-src = protoPayload.requestMetadata.callerIp AS src
FIELDALIAS-src_ip = protoPayload.requestMetadata.callerIp AS src_ip
EXTRACT-vendor_account = /(?<vendor_account>[^/]*)/ in logName
EVAL-vendor_product = "Google Cloud"
EXTRACT-org_id = "logName": "organizations/(?<org_id>\d+)/logs/.*"
EVAL-organization_id = coalesce('org_id', 'orgID')