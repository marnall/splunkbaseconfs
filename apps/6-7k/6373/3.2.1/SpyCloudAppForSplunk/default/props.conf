[spycloud:watchlist]
TZ = GMT
SHOULD_LINEMERGE = false
KV_MODE = json
TIME_FORMAT = %Y-%m-%d
TIME_PREFIX = "spycloud_publish_date":\s"
EVAL-ip = coalesce('ip_addresses{}', ip_addresses)

[spycloud:breach_catalog]
TZ = GMT
SHOULD_LINEMERGE = false
KV_MODE = json
TIME_FORMAT = %Y-%m-%d
TIME_PREFIX = "breach_date":\s"

[spycloud:watchlist_identifiers]
TZ = GMT
SHOULD_LINEMERGE = false
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%f
TIME_PREFIX = "export_time":\s"
