[SpyCloud Breach Catalog Lookup Populator]
alert.track = 0
dispatch.earliest_time = 0
dispatch.latest_time = now
search = index=* sourcetype=spycloud:breach_catalog | table acquisition_date breach_date description id num_records password_type spycloud_publish_date title type uuid media_urls public_data site | inputlookup append=t breach_catalog.csv | dedup id | outputlookup create_empty=f breach_catalog.csv
cron_schedule = 0 * * * *
enableSched = 1
disabled = 0

[SpyCloud Active User Lookup Populator]
alert.track = 0
dispatch.earliest_time = 0
dispatch.latest_time = now
search = |ldapsearch \
search="(&(objectclass=user)(!(objectClass=computer)))"\
attrs="sAMAccountName,displayName,mail,userAccountControl" \
| table sAMAccountName,displayName,mail,userAccountControl \
| outputlookup ad_users.csv
cron_schedule = 0 6 * * *
enableSched = 1
disabled = 1

[SpyCloud - Compromised Active User Alert]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
alert.suppress = 0
counttype = number of events
quantity = 0
relation = greater than
description = If SpyCloud observes an active user in a breach, this search will send an e-mail alert to that user.
disabled = 1
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
enableSched = 1
search = sourcetype=spycloud:watchlist | lookup ad_users mail AS email | where userAccountControl="ACCOUNTDISABLE" OR isnull(userAccountControl) | lookup breach_catalog id AS source_id | table title description breach_date acquisition_date email username password_type | fillnull value="-" | eval alert_text=`spycloud_alert_text` | map search="|makeresults |  eval Title=$title$ | eval Description=$description$ | eval \"Breach Date\"=$breach_date$ | eval \"Acquisition Date\"=$acquisition_date$ | eval \"E-mail\"=$email$ | eval Username=$username$ | eval \"Password Type\"=$password_type$ | convert ctime(_time) | rename _time AS Time | sendemail subject=\"SpyCloud Breach Alert\" message=\"$alert_text$\" sendresults=t inline=t to=$email$"

[SpyCloud - Compromised Active User Alert - Admin]
action.email = 1
action.email.include.results_link = 0
action.email.include.view_link = 0
action.email.inline = 1
action.email.message.report = One or more users in your organization have been observed in a breach:
action.email.sendresults = 1
action.email.subject.report = SpyCloud - Watchlist User Hit
action.email.useNSSubject = 1
action.email.to = you@example.com
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
alert.suppress = 0
counttype = number of events
quantity = 0
cron_schedule = 0 6 * * 1
description = If SpyCloud observes an active user in a breach, this search will send an e-mail alert to the configured admin.
disabled = 1
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
enableSched = 1
search = sourcetype=spycloud:watchlist | lookup ad_users mail AS email | where userAccountControl="ACCOUNTDISABLE" OR isnull(userAccountControl) | lookup breach_catalog id AS source_id | table title description breach_date acquisition_date email username password_type | rename title AS Title, description AS Description, breach_date AS "Breach Date", acquisition_date AS "Acquisition Date", email AS "E-mail", username AS Username, password_type AS "Password Type"


