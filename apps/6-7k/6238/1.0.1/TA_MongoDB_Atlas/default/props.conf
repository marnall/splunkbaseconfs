[mongodb:atlas:mongodb-audit-log.gz]
EVAL-action = case(result==0,"success",result==18 OR result == 13,"failure", 0 == 0, "error")
EVAL-app = "mongodb:atlas"
FIELDALIAS-authentication_method = param.mechanism as authentication_method
FIELDALIAS-dest = local.ip as dest
FIELDALIAS-dest_host = hostname as dest_host
FIELDALIAS-dest_ip = local.ip as dest_ip
FIELDALIAS-user = param.user as user
FIELDALIAS-src_user = param.user as src_user
FIELDALIAS-src_ip = remote.ip as src_ip
FIELDALIAS-src = remote.ip as src
