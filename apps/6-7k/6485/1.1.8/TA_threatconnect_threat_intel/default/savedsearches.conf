[TC-ModuleImportSync]
alert.suppress = 0
alert.track = 1
cron_schedule = */5 * * * *
description = Update Module Imports with what is configured from the UI Module Imports KV Store
enableSched = 1
realtime_schedule = 0
search = | tcmoduleimportsync
dispatch.earliest_time = -30d
dispatch.latest_time = now

