[beyondtrust:pra:appliance]
NO_BINARY_CHECK = true
DATETIME_CONFIG = /etc/datetime.xml
SHOULD_LINEMERGE = false
pulldown_type = 1
description = BeyondTrust Privileged Remote Access Syslog Events
EXTRACT-confMemTeams = confMemTeams\=;(?P<confMemTeams>.+?);\|

[beyondtrust:pra:session:cef]
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
pulldown_type = 1
description = BeyondTrust Privileged Remote Access Session Events
FIELDALIAS-beyondtrust_pra_fields_CEF_aliases = accessGrantedTo AS dest_user windowName AS app confMemOs AS os confMemPubName AS user credentialId AS dest_user deviceHost AS dvc_host dstAddr AS dest_ip dstHost AS dest dstPort AS dest_port dstPriv AS dest_user_type dstPrivAddr AS dest_translated_ip dstUid AS dest_user_id dstUser AS dest_user exeName AS object_path failureReason AS status filePath AS file_path fsize AS file_size msg AS message oldFilePath AS file_path_old sessionId AS session_id sessionOwner AS user sessionPriority AS session_id_priority srcAddr AS src_ip srcHost AS src srcPort AS src_port srcPriv AS src_user_type srcPrivAddr AS src_translated_ip srcUid AS src_user_id srcUser AS src_user windowName AS object
EXTRACT-session_event_header_fields = ^(?P<timestamp>[^\|]+)\|(?P<vendor>[^\|]+)\|(?P<vendor_product>[^\|]+)[^\|\n]*\|(?P<product_version>[^\|]+)\|(?P<event_id>[^\|]+)\|(?P<event_name>[^\|]+)
DATETIME_CONFIG = /etc/datetime.xml

[source::...beyondtrust-pra-integration*.log*]
sourcetype = beyondtrustpraintegration:log

[source::...beyondtrust_pra_integration*.log*]
sourcetype = beyondtrustpraintegration:log

