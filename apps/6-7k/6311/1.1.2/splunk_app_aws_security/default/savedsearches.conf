###### CloudTrail Searches ######

[AWS Security CloudTrail EventName Appender]
action.email.inline = 1
alert.digest_mode = True
alert.severity = 1
alert.suppress = 0
alert.track = 0
alert.expires = 2h
cron_schedule = */20 * * * *
dispatch.earliest_time = -22m@m
dispatch.latest_time = -2m@m
enableSched = 0
search = `aws-security-cloudtrail-sourcetype` | stats count by eventName | lookup aws_security_all_eventName eventName OUTPUTNEW eventName as existing | fillnull | search existing=0 | fields eventName | outputlookup aws_security_all_eventName append=true

[AWS Security CloudTrail EventName Generator]
action.email.inline = 1
alert.digest_mode = True
alert.severity = 1
alert.suppress = 0
alert.track = 0
alert.expires = 2h
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 0
search = `aws-security-cloudtrail-sourcetype` | stats count by eventName | lookup aws_security_all_eventName eventName OUTPUTNEW eventName as existing | fillnull | search existing=0 | fields eventName | outputlookup aws_security_all_eventName append=true

[AWS Security CloudTrail Base Search]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize = 1
auto_summarize.dispatch.earliest_time = -1mon@d
dispatch.earliest_time = -1mon
dispatch.latest_time = now
search = `aws-security-cloudtrail((aws_account_id="*"),  (region="**") )`       | lookup aws_security_unauthorized_errorCode errorCode OUTPUT Unauthorized              | stats count count(eval(errorCode!="success")) as errors count(Unauthorized) as Unauthorized by eventName region aws_account_id userName

[AWS Security CloudTrail Timechart Search]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize = 1
auto_summarize.dispatch.earliest_time = -1mon@d
dispatch.earliest_time = -1mon
dispatch.latest_time = now
search = `aws-security-cloudtrail((aws_account_id="*"),  (region="**") )` | eval day=strftime(_time, "%Y-%m-%d %z") | fields eventName region aws_account_id day errorCode | stats count by eventName region aws_account_id day errorCode | eval _time=strptime(day, "%Y-%m-%d %z") | eval response=if(errorCode=="success","success", "error") | lookup aws_security_unauthorized_errorCode errorCode OUTPUT Unauthorized | eval response=if(Unauthorized=="true", "unauthorized", response) | fields - day errorCode Unauthorized

[AWS Security CloudTrail S3 Data Event Search]
action.email.useNSSubject = 1
alert.digest_mode = True
alert.suppress = 0
alert.track = 0
auto_summarize = 1
auto_summarize.dispatch.earliest_time = -1mon@d
dispatch.earliest_time = -1mon
dispatch.latest_time = now
search = `aws-security-cloudtrail-sourcetype`| lookup aws_security_all_eventName eventName OUTPUTNEW function| search function="S3 Data Event" | spath output=bucketName path="requestParameters.bucketName" | spath output=objectName path=requestParameters.key | spath output=userName path=userIdentity.userName | eval error=if(errorCode=="success",0, 1) | lookup aws_security_unauthorized_errorCode errorCode OUTPUT Unauthorized | eval Unauthorized=if(Unauthorized=="true", 1, 0) | fields region, aws_account_id, bucketName, objectName, userName, eventName, userAgent, sourceIPAddress,Unauthorized, error, readOnly,_time | stats count by region, aws_account_id, bucketName, objectName, userName, eventName, userAgent, sourceIPAddress,Unauthorized, error, readOnly,_time

