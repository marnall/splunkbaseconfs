###### Tags Generator ######

[AWS Security Config - Tags Generator]
alert.suppress = 0
alert.track = 0
description = Extract tags lookup from AWS Config
schedule_window = 30
dispatch.earliest_time = 1
dispatch.latest_time = now
search = `aws-security-config-sourcetype` | spath output=tags path=tags | stats count by tags resourceType aws_account_id | fields - count | rex max_match=20 field=tags "\"(?<key>[^,]+)\": \"(?<value>[^,]+)\"" | eval keyvalue=mvzip('key', 'value',"=") | mvexpand keyvalue | fields keyvalue resourceType aws_account_id | rex field=keyvalue "(?<key>[^,]+)=(?<value>[^,]+)" |  stats count by key value resourceType aws_account_id | fields key value resourceType aws_account_id | rename resourceType as type | outputlookup aws_security_tags_config

[AWS Security Config - Tags Appender]
alert.suppress = 0
alert.track = 0
description = Extract tags lookup from AWS Config
cron_schedule = 5 1 * * *
schedule_window = 30
dispatch.earliest_time = -1d
dispatch.latest_time = now
search = `aws-security-config-sourcetype` | spath output=tags path=tags | stats count by tags resourceType aws_account_id | fields - count | rex max_match=20 field=tags "\"(?<key>[^,]+)\": \"(?<value>[^,]+)\"" | eval keyvalue=mvzip('key', 'value',"=") | mvexpand keyvalue | fields keyvalue resourceType aws_account_id | rex field=keyvalue "(?<key>[^,]+)=(?<value>[^,]+)" |  stats count by key value resourceType aws_account_id | fields key value resourceType aws_account_id | rename resourceType as type | append [ inputlookup aws_security_tags_config ]| dedup key aws_account_id type value | outputlookup aws_security_tags_config

