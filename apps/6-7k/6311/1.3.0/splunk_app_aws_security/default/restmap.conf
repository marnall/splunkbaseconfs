[admin:saas-aws-security]
match = /saas-aws-security
members = splunk_app_aws_security_current_context, splunk_app_aws_security_search_restrictions

[admin_external:splunk_app_aws_security_search_restrictions]
handlertype = python
handlerfile = restricted_search_term_handler.py
handleractions = list
python.version = python3
python.required = 3.13

[admin_external:splunk_app_aws_security_current_context]
handlertype = python
handlerfile = current_context_handler.py
handleractions = list
python.version = python3
python.required = 3.13
