[settings]
#worksheet.autofilter(0, 0, max_row, max_col - 1) #https://xlsxwriter.readthedocs.io/example_pandas_autofilter.html
autofilter=true
#https://xlsxwriter.readthedocs.io/format.html
font=
fontsize=
fontcolor=
text_wrap=
border=
header_format={"bold":1,"text_wrap":1,"valign":"top","fg_color":"#d8d8d8","border":1}
#https://xlsxwriter.readthedocs.io/page_setup.html
header=
footer=
margins_top=1.7
margins_bottom=0.6
margins_left=
margins_right=
pageview=1
paper=0
uselogo=true
center_horizontally=
center_vertically=
#orientation=[portrait|landscape]
orientation=portrait
#https://xlsxwriter.readthedocs.io/example_pandas_chart.html
chart=true
charttype=column
charttype_subtype=
#table stuff https://xlsxwriter.readthedocs.io/working_with_tables.html
banded_rows=true
banded_columns=false
first_column=false
last_column=false
table_style=Table Style Medium 9
total_row=false

