[etlookup-command]
syntax = etlookup filename="<filename>"
description = This command retrieves EchoTrail insights data about the filename
shortdesc = Retrieves context about the filename
example1 = event_id=1 | etlookup filename="<filename>"
comment1 = Retrieve context information about a filename
usage = public
appears-in = 1.0.0
category = generating
maintainer = EchoTrail
tags = context

[ethashlookup-command]
syntax = ethashlookup hash="<hash>"
description = This command retrieves EchoTrail insights data about the executable given its SHA256 or MD5 hash
shortdesc = Retrieves context about the hash
example1 = event_id=1 | ethashlookup hash="<hash>"
comment1 = Retrieve context information about a hash
usage = public
appears-in = 1.0.0
category = generating
maintainer = EchoTrail
tags = context

[etscore-command]
syntax = etscore
description = This command scores process execution from 0-100 on how anomalous or normal they are
shortdesc = Scores process execution events
example1 = event_id=1 | etscore
comment1 = Scores process execution events
usage = public
appears-in = 1.0.0
category = generating
maintainer = EchoTrail
tags = context