[source::...ta-cloudflare_data*.log*]
sourcetype = tacloudflaredata:log

[source::...ta_cloudflare_data*.log*]
sourcetype = tacloudflaredata:log

[cloudflare:firewall:rules]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[cloudflare:firewall:rules:ip]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[cloudflare:zone:rules:page]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[cloudflare:zone:settings]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[cloudflare:waf:events]
EVAL-bytes = ClientRequestBytes+OriginResponseBytes
EVAL-cached = if(CacheResponseStatus == "200", "true", "false")
EVAL-ids_type = "application"
EVAL-status = if(OriginResponseStatus == "0", null(), OriginResponseStatus)
EVAL-transport = "TCP"
EVAL-vendor_product = "Cloudflare WAF"
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_1 = ClientIP AS src
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_10 = ClientRequestUserAgent AS http_user_agent
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_11 = OriginResponseBytes AS bytes_out
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_12 = WAFAction AS action
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_13 = ClientRequestURI AS url
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_15 = source AS url_domain
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_2 = ClientSrcPort AS src_port
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_3 = OriginIP AS dest
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_4 = WAFRuleMessage AS signature
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_5 = OriginResponseTime AS response_time
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_6 = ClientRequestHost AS site
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_7 = ClientRequestBytes AS bytes_in
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_8 = ClientRequestMethod AS http_method
FIELDALIAS-aob_gen_cloudflare_waf_events_alias_9 = ClientRequestReferer AS http_referrer
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 1280
SHOULD_LINEMERGE = 0
TIME_PREFIX = EdgeStartTimestamp=
TRUNCATE = 0
category = Structured
pulldown_type = 1

