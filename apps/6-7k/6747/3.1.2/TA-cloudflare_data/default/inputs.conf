[firewall_rules]
start_by_shell = false
python.version = python3
sourcetype = cloudflare:firewall:rules
interval = 86400
action = all
disabled = 0

[zone_settings]
start_by_shell = false
python.version = python3
sourcetype = cloudflare:zone:settings
interval = 86400
ids = all
disabled = 0

[waf_logs_received]
start_by_shell = false
python.version = python3
sourcetype = cloudflare:waf:events
interval = 300
timestamps = unix
earliest_event = 10
disabled = 0

[ip_access_rules]
start_by_shell = false
python.version = python3
sourcetype = cloudflare:firewall:rules:ip
interval = 86400
mode = all
disabled = 0

[page_rules]
start_by_shell = false
python.version = python3
sourcetype = cloudflare:zone:rules:page
interval = 86400
status = all
disabled = 0

