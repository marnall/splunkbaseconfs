# CTM360 App for Splunk - Macros Configuration
# This file defines macros used across dashboards and saved searches

[default_index]
definition = index=*
iseval = 0
description = Default index filter for CTM360 data. Configure this in the app setup to match your data input index.

[ctm360_index_filter]
definition = `default_index`
iseval = 0
description = Index filter for CTM360 data queries

[ctm360_time_epoch(1)]
args = f
definition = coalesce(strptime($f$,"%Y-%m-%dT%H:%M:%S.%6N"),strptime($f$,"%d-%m-%Y %I:%M:%S %p"),strptime($f$,"%d-%m-%Y %H:%M:%S"))
iseval = 0
description = Parse a CTM360 date string (ISO or native) to epoch seconds, for sorting.

[ctm360_pretty_time(1)]
args = f
definition = if(isnull(coalesce(strptime($f$,"%Y-%m-%dT%H:%M:%S.%6N"),strptime($f$,"%d-%m-%Y %I:%M:%S %p"),strptime($f$,"%d-%m-%Y %H:%M:%S"))),$f$,strftime(coalesce(strptime($f$,"%Y-%m-%dT%H:%M:%S.%6N"),strptime($f$,"%d-%m-%Y %I:%M:%S %p"),strptime($f$,"%d-%m-%Y %H:%M:%S")),"%d-%m-%Y %I:%M:%S %p"))
iseval = 0
description = Display a CTM360 date string (ISO or native) as DD-MM-YYYY hh:mm:ss AM/PM; raw if unparseable.

