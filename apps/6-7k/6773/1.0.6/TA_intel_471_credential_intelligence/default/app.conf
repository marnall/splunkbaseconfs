# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 9

[launcher]
author = Intel 471 Inc.
version = 1.0.6
description = Intel 471 Credential Intelligence Splunk App provides coverage of compromised credentials across the entirety of the underground marketplace offering for proactive monitoring and risk mitigation. The app automatically ingests Credential Intelligence data from the Intel 471 Titan platform via the API and makes all data available via Splunk search. The app also provides a live dashboard that offers charts and tables with filter options to visualise the state of compromised credentials. The app requires an active Intel 471 Titan application programming interface (API) key to retrieve intelligence information and reporting. Please contact support@intel471.com for more information.

[ui]
is_visible = 1
label = Intel 471 Credential Intelligence
docs_section_override = AddOns:released

[package]
id = TA_intel_471_credential_intelligence

[triggers]
reload.addon_builder = simple
reload.ta_intel_471_credential_intelligence_account = simple
reload.ta_intel_471_credential_intelligence_settings = simple
reload.passwords = simple

[id]
version = 1.0.6

