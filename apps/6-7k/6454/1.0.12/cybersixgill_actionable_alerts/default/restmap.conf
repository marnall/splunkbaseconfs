[admin:cybersixgill_actionable_alerts_configuration]
match = /
members = cybersixgill_actionable_alerts_account, cybersixgill_actionable_alerts_settings

[admin:cybersixgill_actionable_alerts_inputs]
match = /
members = cybersixgill_actionable_alerts_actionable_alerts_input

[admin_external:cybersixgill_actionable_alerts_account]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = cybersixgill_actionable_alerts_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:cybersixgill_actionable_alerts_settings]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = cybersixgill_actionable_alerts_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:cybersixgill_actionable_alerts_actionable_alerts_input]
handlertype = python
python.version = python3
python.required = 3.13
handlerfile = cybersixgill_actionable_alerts_rh_actionable_alerts_input.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[script:alert_content_get]
match = /actionable-alert-content
script = actionable_alert_content.py
scripttype = persist
python.version = python3
python.required = 3.13
handler = actionable_alert_content.FetchActionableAlertContent
passHttpHeaders = true
output_modes = json
passHttpCookies = true

[script:alert_content_delete]
match = /actionable-alert-delete
script = actionable_alert_delete.py
scripttype = persist
python.version = python3
python.required = 3.13
handler = actionable_alert_delete.DeleteActionableAlertContent
passHttpHeaders = true
output_modes = json
passHttpCookies = true
