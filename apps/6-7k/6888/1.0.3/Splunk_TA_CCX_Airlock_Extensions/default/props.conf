[airlock:exechistories]
EVAL-loaded_file = 'filename'
EVAL-original_file_name = 'filename'
EVAL-file_name = 'filename'
EVAL-file_path = 'path'
EVAL-parent_process = if(isnotnull('commandline') AND commandline!="",replace('commandline',"\"",""),null())
EVAL-parent_process_exec = if(isnotnull(parentprocess) AND parentprocess!="",replace('parentprocess',"(.*[^\\\])\\\\",""),null())
EVAL-parent_process_name = if(isnotnull(parentprocess) AND parentprocess!="",replace('parentprocess',"(.*[^\\\])\\\\",""),null())
EVAL-parent_process_path = if(isnotnull(parentprocess) AND parentprocess!="",'parentprocess',null())
EVAL-process_exec = if(isnotnull(parentprocess) AND parentprocess!="",replace('parentprocess',"(.*[^\\\])\\\\",""),null())
EVAL-process_hash = if(md5="" AND sha1!="" AND sha256!="", mvappend(sha1,sha256),if(sha1="" AND md5!="" AND sha256!="", mvappend(md5,sha256),if(sha256="" AND md5!="" AND sha1!="", mvappend(sha1,md5),if(md5!="" AND sha1!="" AND sha256!="", mvappend(md5,sha1,sha256),if(md5="" AND sha1="" AND sha256!="", 'sha256',if(md5!="" AND sha1="" AND sha256="",'md5',if(md5="" AND sha1!="" AND sha256="",'sha1',null())))))))
EVAL-action = if(isnotnull(execution_type) AND match(execution_type,".*BLOCK.*|.*Block.*|.*block.*"),"blocked","allowed")
EVAL-user = 'username'
EVAL-dest = 'hostname'
EVAL-vendor_product = "Airlock Digital"

[airlock:svractivities]
REPORT-airlock_activity_login_src = airlock_activity_login_src
REPORT-airlock_activity_capture_description_content = airlock_activity_capture_description_content
REPORT-airlock_x_auth_method_capture = airlock_x_auth_method_capture

EVAL-type = case(task IN("Security","Delete Group","Policy Modify","OTP Revoked","Client Operation","Server Tasks") OR (task IN("Login") AND match(description,"^Invalid login.*|.*fail.*|.*Fail.*|.*Unsucces.*|.*unsucces.*")),"alarm",match('task',"^OTP.*|Delete.*") AND NOT task IN("OTP Revoked","Delete Group"),"event") 
EVAL-action = case((task IN("Login") AND match(description,".*successfully.*")) OR (match(task,"OTP.*") AND match(description,".*was activated.*|.*Activated.*|.*granted.*|.*Granted.*|.*generated.*|.*Generated.*")),"success",(task IN("Login") AND match(description,"^Invalid login.*|.*fail.*|.*Fail.*|.*Unsucces.*|.*unsucces.*")) OR (match(task,"OTP.*") AND match(description,".*revoked.*|.*Revoked.*")),"failure",(task IN("Policy Modify") OR match('task',"User.*|Definition.*|Repository.*")) AND match(description,".*UPDATED.*|.*Update.*|.*update.*"),"updated",(task IN("Policy Modify") OR match('task',"User.*|Definition.*|Repository.*")) AND match(description,".*MODIFI.*|.*Modifi.*|.*modifi.*|.*edited.*|.*Edited.*|.*Added.*|.*added.*|.*Remove.*|.*remove.*"),"modified",(task IN("Policy Modify") OR match('task',"User.*|Definition.*|Repository.*")) AND match(description,".*CREATE.*|.*Create.*|.*create.*|.*generated.*"),"created",(task IN("Policy Modify") OR match('task',"User.*|Delete.*|Definition.*|Repository.*")) AND match(description,".*DELETE.*|.*Delete.*|.*delete.*"),"deleted")
EVAL-body = 'description'
EVAL-file_name = if(match('task',"Repository.*"),'description_content',null())
EVAL-src_user = 'user'
EVAL-reason = 'description'
EVAL-signature = if(isnotnull('event'),'event','description')
EVAL-subject = if(isnotnull('event'),'event','description')
EVAL-change_type = if(match('task',"User.*"),"AAA",if(match('task',"Definition.*"),"filesystem",if(match('task',"Repository.*"),"file",null())))
EVAL-src = if(isnotnull('src'),'src','host')
EVAL-src_ip = if(cidrmatch("0.0.0.0/0",'src') OR cidrmatch("::/0",'src'),'src', null())
EVAL-dest = if(match('task',"User.*|Delete.*|Definition.*|Repository.*|Server Tasks"),'host',if(isnotnull('dest'),'dest',if(match('description',".+(?:agent)\s+(\S+)(?:.+)?"),replace('description',".+(?:agent)\s+(\S+)(?:.+)?","\1"), null())))
EVAL-dvc = if(match('task',"User.*|Definition.*|Repository.*"),'host',null())
EVAL-object = if(match('task',"User.*"),'user',if(match('task',"Definition.*"),replace(description,"(?:.+)?(?:N|n)ew\s+(.+)\s+for.+","\1"),if(match('task',"Repository.*"),'description_content',null())))
EVAL-object_attrs = if(match('task',"User.*|Definition.*|Repository.*"),'description',null())
EVAL-object_category = if(match('task',"User.*"),"user",if(match('task',"Definition.*"),replace(description,"(?:.+)?(?:N|n)ew\s+(.+)\s+for.+","\1"),if(match('task',"Repository.*"),"file",null())))
EVAL-object_path = if(match('task',"User.*|Definition.*|Repository.*"),"airlockdigital",null())
EVAL-authentication_method = if(isnotnull('x_auth_method'),lower(replace(x_auth_method,"^(.*)\s+User.*","\1")),null())
EVAL-app = if(task IN("Login","Policy Modify","Security","Client Operation","Server Tasks") OR match('task',"^OTP.*|Delete.*"),"airlock",null())
EVAL-status = if(match('task',"User.*|Definition.*|Repository.*") AND match(description,".*invalid.*|.*Invalid.*|.*fail.*|.*Fail.*|.*Unsucces.*|.*unsucces.*|.*block.*|.*Block.*|.*deny.*|.*Deny.*|.*denied.*|.*Denied.*"),"failure",if(match('task',"User.*|Definition.*|Repository.*") AND NOT match(description,".*invalid.*|.*Invalid.*|.*fail.*|.*Fail.*|.*Unsucces.*|.*unsucces.*|.*block.*|.*Block.*|.*deny.*|.*Deny.*|.*denied.*|.*Denied.*"),"success",null()))
EVAL-vendor_product = "Airlock Digital"
EVAL-vendor_account = "AirlockDigital"
