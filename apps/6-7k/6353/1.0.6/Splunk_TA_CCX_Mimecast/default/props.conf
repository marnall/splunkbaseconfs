[ccx:mimecastsiemst]
TIME_PREFIX = datetime\=
MAX_TIMESTAMP_LOOKAHEAD = 512
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
KV_MODE = none
SHOULD_LINEMERGE = 0
category = Custom CCX Add-on for Mimecast
pulldown_type = 1

REPORT-ccx_kv_format_results_for_mimecastsiemst = ccx_kv_format_results_for_mimecastsiemst

FIELDALIAS-ccx_alias_http_content_type = fileType AS http_content_type
#FIELDALIAS-ccx_alias_size = MsgSize AS size
FIELDALIAS-ccx_alias_recipient_status = ReceiptAck AS recipient_status
#FIELDALIAS-ccx_alias_message_info = RejInfo AS message_info
#FIELDALIAS-ccx_alias_size = Snt AS size
#FIELDALIAS-ccx_alias_src_ip = sourceIp AS src_ip
#FIELDALIAS-ccx_alias_message_info = SpamInfo AS message_info
FIELDALIAS-ccx_alias_internal_message_id = aggregateId AS internal_message_id

EVAL-retries = coalesce('deliveryAttempts','Attempt')
EVAL-size = coalesce('MsgSize','Snt','emailSize')
EVAL-delay = coalesce('Latency','deliveryTime')
EVAL-status_code = if('RejCode'!="None" OR 'rejectionCode'!="None", coalesce('rejectionCode','RejCode'),null())
EVAL-signature = case('RejType'!="None" OR 'rejectionType'!="None", coalesce('rejectionType','RejType'),isnotnull('Virus'), split('Virus',", "),mcType="email_antivirus",'virusFound')
EVAL-signature_extra = if('RejInfo'!="None" OR 'rejectionInfo'!="None", coalesce(replace('rejectionInfo', "\[|\]",""),replace('RejInfo', "\[|\]","")),null())
EVAL-src_host = coalesce('SenderDomain','senderDomain')
EVAL-ssl_version = coalesce('TlsVer','tlsVersion')
EVAL-protocol = "smtp"
EVAL-src_ip = case(match(mcType,"email_receipt|email_antivirus|email_ttp_impersonation|email_ttp_ap|email_spam"), coalesce('IP','senderIp'),mcType=="email_ttp_url",'sourceIp')
EVAL-src = case(match(mcType,"email_receipt|email_antivirus|email_ttp_impersonation|email_ttp_ap|email_spam"), coalesce('IP','senderIp'),mcType=="email_ttp_url",'sourceIp')
EVAL-dest = if(mcType="email_delivery",coalesce('IP','destinationIp'),coalesce('dest','destinationIp'))
EVAL-dest_ip = if(mcType="email_delivery",coalesce('IP','destinationIp'),coalesce('dest','destinationIp'))
EVAL-orig_recipient = if(mcType=="email_delivery" OR mcType=="email_antivirus", coalesce('Rcpt','recipients','recipient'),null())
EVAL-src_user = if('senderEnvelope'!="None" OR 'senderEnvelope'!="<>" OR 'Sender'!="<>", coalesce('senderEnvelope','Sender'),null())
EVAL-sender = if('senderEnvelope'!="None" OR 'senderEnvelope'!="<>" OR 'Sender'!="<>", coalesce('senderEnvelope','Sender'),null())
EVAL-recipient = case(mcType=="email_delivery" OR mcType=="email_receipt", coalesce('Rcpt','recipients','recipient'), mcType=="email_ttp_ap", coalesce('Recipient','recipient'), mcType=="email_ttp_impersonation", coalesce('Recipient','recipient'), mcType=="email_ttp_url", coalesce('Recipient','recipient'))
EVAL-date = if(mcType="email_antivirus", coalesce(Datetime,datetime), date)
EVAL-subject = if(subject="None" OR Subject="None", null(), coalesce('subject','Subject'))
EVAL-transport = "SMTP"
EVAL-vendor_product = "Mimecast:Mail:Service"
EVAL-url_length = len(url)
EVAL-file_hash = mvappend(fileHash,sha256,sha1,md5)
EVAL-category = if((isnotnull('RejType') AND 'RejType'!="None") OR (isnotnull('rejectionType') AND 'rejectionType'!="None") , coalesce('rejectionType','RejType'), if(isnotnull('Virus'), mvdedup(split('Virus',", ")), coalesce(replace(replace(Error, "^([^\:]+)\:.+", "\1"),"\[|\]",""), 'urlCategory',' mcType')))
EVAL-url_domain = replace(url, "^(?:https?:\/\/)?(?:[^@\n]+@)?(?:www\.)?([^:\/\n?]+)(?:.+)?", "\1")
EVAL-user = if(mcType="email_antivirus" OR match('RejType',".*Virus.*|Malware|Trojan|Ransonware")  OR match('rejectionType',".*Virus.*|Malware|Trojan|Ransonware"),coalesce('Rcpt','recipients','recipient'),coalesce('senderEnvelope','Sender','user'))
EVAL-file_name = if(AttNames!="None" OR 'fileName'!="None" OR 'attachments'!="None", coalesce(split('AttNames',", "),'fileName',split('attachments',",")),null())
EVAL-file_size = if(AttSize!="0" OR totalSizeAttachments!="None" OR 'Size'!="None" OR 'sizeAttachment'!="None", coalesce('Size','totalSizeAttachments','AttSize','sizeAttachment'),null())
EVAL-message_info = case((isnotnull('RejInfo') AND 'RejInfo'!="None") OR (isnotnull('rejectionInfo') AND 'rejectionInfo'!="None"),coalesce(replace('rejectionInfo', "\[|\]",""),replace('RejInfo', "\[|\]","")), isnotnull('SpamInfo') AND SpamInfo!="[]", replace('SpamInfo', "\[|\]",""))
EVAL-message_id = if((isnotnull('MsgId') AND MsgId!="None") OR  (isnotnull('messageId') AND messageId!="None"), coalesce('MsgId','messageId'), null())
EVAL-return_addr = case(mcType IN ("email_delivery") AND ('senderEnvelope'!="None" OR 'senderEnvelope'!="<>" OR 'Sender'!="<>"), coalesce('senderEnvelope','Sender'),mcType IN ("email_delivery") AND return_addr!="<>",'return_addr')
EVAL-action = case((sourcetype="ccx:mimecastsiemst") AND (isnotnull(Subject) OR isnotnull(subject)) OR isnotnull(recipientAddress) OR isnotnull(recipients) OR (isnotnull(sender) OR (isnotnull(senderEnvelope)) OR isnotnull(Sender)), case(act=="Delivered" OR Act=="Delivered" OR action=="Delivered" OR action="allow" OR delivered="true" OR Delivered="True", "delivered", act=="Blocked" OR act="block" OR Act=="Blocked" OR action=="Blocked" OR action=="block", "blocked", act=="Quarantined" OR Act=="Quarantined" OR Action=="hold" OR action=="Quarantined" OR action=="hold", "quarantined", action=="Warn", "deferred", mcType == "email_process", Act, mcType == "email_delivery" AND Delivered == True, "delivered", mcType =="email_delivery" AND Delivered == "False", "blocked", Action =="hold", "quarantined", Action == "rejected", "blocked", Action == "None", "unknown", mcType == "email_antivirus", "blocked", 1=1, "unknown"))

[ccx:mimecastttpurlst]
MAX_TIMESTAMP_LOOKAHEAD = 512
KV_MODE = none
SHOULD_LINEMERGE = 0
category = Custom CCX Add-on for Mimecast
pulldown_type = 1

REPORT-ccx_kv_format_results_for_mimecastttpurlst = ccx_kv_format_results_for_mimecastttpurlst

FIELDALIAS-ccx_alias_http_content_type = fileType AS http_content_type
FIELDALIAS-ccx_alias_user = user_email_address AS user
FIELDALIAS-ccx_alias_file_hash = fileHash AS file_hash
FIELDALIAS-ccx_alias_signature_extra = scan_result AS signature_extra
FIELDALIAS-ccx_alias_orig_subject = subject AS orig_subject

EVAL-vendor_product = "Mimecast:Mail:Threat Protect"
EVAL-url_length = len(url)
EVAL-action = case(action=="block" OR action=="Block", "blocked", action=="allow" OR  action=="Allow", "allowed", 1=1, "unknown")
EVAL-app = "Mimecast"
EVAL-url_domain = replace(url, "^(?:https?:\/\/)?(?:[^@\n]+@)?(?:www\.)?([^:\/\n?]+)(?:.+)?", "\1")
EVAL-subject = replace(subject,"\'|\(|\,|\)","")
EVAL-filter_action = case(action=="block" OR action=="Block", "dropped", action=="allow" OR action=="Allow", "accepted", 1=1, "unknown")
EVAL-signature = coalesce('ttp_definition','ttpDefinition')

[ccx:mimecastauditst]
MAX_TIMESTAMP_LOOKAHEAD = 512
KV_MODE = none
SHOULD_LINEMERGE = 0
category = Custom CCX Add-on for Mimecast
pulldown_type = 1

REPORT-ccx_kv_format_results_for_mimecastauditst = ccx_kv_format_results_for_mimecastauditst
REPORT-ccx_mimecast_ip_extraction = ccx_mimecast_ip_extraction

FIELDALIAS-ccx_alias_src_ip = src AS src_ip
FIELDALIAS-ccx_alias_object_attrs = auditType AS object_attrs

EVAL-action = if(isnotnull('action'), 'action', if(isnotnull('eventInfo'), case(match(eventInfo,"^.*Updated.*"),"updated",match(eventInfo,"^.*locked.*"),"lockout",match(eventInfo,"^.*unlocked.*"),"unlocked",match(eventInfo,"^.*Delete.*|.*delete.*"),"deleted",match(eventInfo,"^.*Cleare.*|.*cleare.*"),"cleared",match(eventInfo,"^.*Create.*|.*create.*"),"created",1=1,"modified"),null()))
EVAL-change_type = if(like(auditType, "%User%") OR like(auditType, "%user%"), "AAA", "filesystem")
EVAL-signature = case(like('auditType', "%Log%") OR like('auditType', "%log%"), 'auditType',  1==1, 'virus')
EVAL-object = replace(eventInfo,"^.*(?<=Application:|App:)(?s)(.*$)","\1")
EVAL-object_category = if(like(auditType, "%User%") OR like(auditType, "%user%"), "user", "instance")
EVAL-reason = replace(eventInfo,"^.*(?<=Reason:)(?s)(.*$)","\1")
EVAL-vendor_product = "Mimecast:Mail:Audit"


