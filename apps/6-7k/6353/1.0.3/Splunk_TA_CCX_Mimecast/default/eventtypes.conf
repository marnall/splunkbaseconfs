[ccx_mimecast_authentication]
search = (sourcetype="ccx:mimecastauditst") auditType IN ("*log*")
# tags = authentication

[ccx_mimecast_change]
search = (sourcetype="ccx:mimecastauditst") auditType IN ("User Locked*", "User Password Changed*", "User Password Reset Request*", "User Unlocked*", "Update*", "Content Definition Adjustments")
# tags = change

[ccx_mimecast_dlp]
search = (sourcetype="ccx:mimecastdlpst")
# tags = dlp incident

[ccx_mimecast_email]
search = (sourcetype="ccx:mimecastttpurlst" OR sourcetype="ccx:mimecastsiemst" OR sourcetype="ccx:mimecastttpapst" OR sourcetype="ccx:mimecastttpipst" OR sourcetype="ccx:mimecastdlpst") AND (Subject=* OR subject=*) OR recipientAddress=* OR (sender=* OR Sender=*) NOT eventtype="ccx_mimecast_email_journal"
# tags = email

[ccx_mimecast_ids_detection]
search = (sourcetype="ccx:mimecastttpipst") mcType="ttp_ip" OR taggedMalicious=true OR RejType=*
# tags = attack ids

[ccx_mimecast_malware_attack]
search = (sourcetype="ccx:mimecastsiemst" OR sourcetype="ccx:mimecastttpapst") (urlCategory="Malware" OR Virus=* OR verdict="malicious") NOT mcType="email_ttp_url"
# tags = attack malware

[ccx_mimecast_malware_operations]
search = (sourcetype="ccx:mimecastttpapst") file_hash=* OR fileHash=* NOT eventtype="ccx_mimecast_malware_attack"
# tags = operations malware

[ccx_mimecast_web_traffic]
search = (sourcetype="ccx:mimecastttpurlst" OR sourcetype="ccx:mimecastsiemst") (mcType="ttp_url" OR mcType="email_ttp_url") AND (user=* OR url=*)
# tags = web

[ccx_mimecast_email_journal]
search = (sourcetype="ccx:mimecastsiemst") mcType=email_journal
