############CCX Mimecast##################################################################

##Mod sourcetypes CCX Mimecast##
#mimecastservicehealthst       #
#mimecastauditst               #
#mimecastttpurlst              #
#mimecastsiemst                #
#mimecastttpapst               #
#mimecastttpipst               #
#mimecastdlpst                 #
#mimecasttifrst                #
#mimecasttiftst                #   
################################

[set_mimecastservicehealthst]
REGEX = .
FORMAT = sourcetype::ccx:mimecastservicehealthst
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_mimecastauditst]
REGEX = .
FORMAT = sourcetype::ccx:mimecastauditst
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_mimecastttpurlst]
REGEX = .
FORMAT = sourcetype::ccx:mimecastttpurlst
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_mimecastsiemst]
REGEX = .
FORMAT = sourcetype::ccx:mimecastsiemst
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_mimecastttpapst]
REGEX = .
FORMAT = sourcetype::ccx:mimecastttpapst
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_mimecastttpipst]
REGEX = .
FORMAT = sourcetype::ccx:mimecastttpipst
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_mimecastdlpst]
REGEX = .
FORMAT = sourcetype::ccx:mimecastdlpst
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_mimecasttifrst]
REGEX = .
FORMAT = sourcetype::ccx:mimecasttifrst
