[set_mimecasttiftst]
REGEX = .
FORMAT = sourcetype::ccx:mimecasttiftst
DEST_KEY = MetaData:Sourcetype
WRITE_META = true


##Field Extraction CCX Mimecast## 
[ccx_mimecast_ip_extraction]
CLEAN_KEYS = 0
REGEX = IP\:\s(?<IP>(?:\d{1,3}\.){1,3}\d{1,3})

#Default Mimecast Extraction#
[ccx_kv_format_results_for_mimecastservicehealthst]
DELIMS = "|", "="

[ccx_kv_format_results_for_mimecastsiemst]
FORMAT = $1::$2
REGEX = \|?(.*?)=(.*?)(?:\||$)

[ccx_kv_format_results_for_mimecastttpurlst]
DELIMS = "|", "="

[ccx_kv_format_results_for_mimecastauditst]
DELIMS = "|", "="

[ccx_kv_format_results_for_mimecastttpipst]
DELIMS = "|", "="

[ccx_kv_format_results_for_mimecastttpapst]
DELIMS = "|", "="

[ccx_kv_format_results_for_mimecastdlpst]
FORMAT = $1::$2
REGEX = \|?([a-zA-Z\-]+)=(.*?)(?:\||$)

[ccx_kv_format_results_for_mimecasttifrst]
DELIMS = "|", "="

[ccx_kv_format_results_for_mimecasttiftst]
DELIMS = "|", "="
