FIELDALIAS-ccx_alias_message_id = messageId AS message_id
FIELDALIAS-ccx_alias_subject = Subject AS subject
FIELDALIAS-ccx_alias_recipient = recipientAddress AS recipient
FIELDALIAS-ccx_alias_sender = senderAddress AS sender
