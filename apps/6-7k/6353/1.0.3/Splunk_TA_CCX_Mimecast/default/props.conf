EVAL-signature = replace(Policy, "\d+\s\-\s(.+)$", "\1")
EVAL-signature_id = replace(Policy, "(\d+)\s\-\s.+$", "\1")
EVAL-vendor_product = "Mimecast:Mail:Data Loss Prevention"
EVAL-action = case((sourcetype="mimecastttpurlst" OR sourcetype="mimecastsiemst" OR sourcetype="mimecastttpapst" OR sourcetype="mimecastttpipst" OR sourcetype="mimecastdlpst") AND (isnotnull(Subject) OR isnotnull(subject)) OR isnotnull(recipientAddress) OR (isnotnull(sender) OR isnotnull(Sender)), case(Act=="Delivered" OR action=="Delivered" OR action="allow", "delivered", Act=="Blocked" OR action=="Blocked" OR action=="block", "blocked", Act=="Quarantined" OR Action=="hold" OR action=="Quarantined" OR action=="hold", "quarantined"))
EVAL-app = "Mimecast Mail Service Targeted Threat Protect"
EVAL-category = replace(Policy, "\d+\s\-\s(.+)$", "\1")

