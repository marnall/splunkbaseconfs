[ccx:mimecastsiemst]
TIME_PREFIX = datetime\=
MAX_TIMESTAMP_LOOKAHEAD = 512
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
KV_MODE = none
SHOULD_LINEMERGE = 0
category = Custom CCX Add-on for Mimecast
pulldown_type = 1

REPORT-ccx_kv_format_results_for_mimecastsiemst = ccx_kv_format_results_for_mimecastsiemst

FIELDALIAS-ccx_alias_http_content_type = fileType AS http_content_type
FIELDALIAS-ccx_alias_retries = Attempt AS retries
FIELDALIAS-ccx_alias_file_name = fileName AS file_name
FIELDALIAS-ccx_alias_delay = Latency AS delay
FIELDALIAS-ccx_alias_message_id = MsgId AS message_id
#FIELDALIAS-ccx_alias_size = MsgSize AS size
FIELDALIAS-ccx_alias_recipient_status = ReceiptAck AS recipient_status
FIELDALIAS-ccx_alias_status_code = RejCode AS status_code
#FIELDALIAS-ccx_alias_message_info = RejInfo AS message_info
FIELDALIAS-ccx_alias_src_host = SenderDomain AS src_host
FIELDALIAS-ccx_alias_file_size = Size AS file_size
#FIELDALIAS-ccx_alias_size = Snt AS size
#FIELDALIAS-ccx_alias_src_ip = sourceIp AS src_ip
#FIELDALIAS-ccx_alias_message_info = SpamInfo AS message_info
FIELDALIAS-ccx_alias_subject = Subject AS subject
FIELDALIAS-ccx_alias_ssl_version = TlsVer AS ssl_version

EVAL-size = coalesce('MsgSize','Snt')
EVAL-protocol = "smtp"
EVAL-src_ip = CASE(mcType =="email_receipt", IP, mcType =="email_antivirus", IP, mcType=="email_ttp_impersonation", IP, mcType=="email_ttp_ap", IP)
EVAL-src = CASE(mcType =="email_receipt", IP, mcType =="email_antivirus", IP, mcType=="email_ttp_impersonation", IP, mcType=="email_ttp_ap", IP, 1=1,'sourceIp')
EVAL-dest = IF(mcType =="email_delivery", IP, dest)
EVAL-dest_ip = IF(mcType =="email_delivery", IP, dest)
EVAL-orig_recipient = CASE(mcType=="email_receipt", Rcpt, mcType="email_antivirus", Recipient)
EVAL-src_user = if(mcType IN("email_receipt","email_ttp_impersonation","email_ttp_ap","email_ttp_url", "email_antivirus") AND Sender!="<>",'Sender',null())
EVAL-sender = CASE(mcType=="email_process", Sender, mcType=="email_antivirus", Sender)
EVAL-recipient = CASE(mcType=="email_delivery" OR mcType=="email_receipt", Rcpt, mcType=="email_ttp_ap", Recipient, mcType=="email_ttp_impersonation", Recipient, mcType=="email_ttp_url", Recipient)
EVAL-date = if(mcType="email_antivirus", coalesce(Datetime,datetime), date)
EVAL-subject = if(Subject=="None", null(), Subject)
EVAL-transport = "SMTP"
EVAL-vendor_product = "Mimecast:Mail:Service"
EVAL-url_length = len(url)
EVAL-file_hash = mvappend(fileHash,sha256,sha1,md5)
EVAL-category = if(isnotnull('RejType'), 'RejType', if(isnotnull('Virus'), mvdedup(split('Virus',", ")), coalesce(replace(replace(Error, "^([^\:]+)\:.+", "\1"),"\[|\]",""), 'urlCategory',' mcType')))
EVAL-signature = if(isnotnull('Virus'), split('Virus',", "), replace(replace(Error, "^[^\:]+\:\s(.+)", "\1"),"\[|\]",""))
EVAL-url_domain = replace(url, "^(?:https?:\/\/)?(?:[^@\n]+@)?(?:www\.)?([^:\/\n?]+)(?:.+)?", "\1")
EVAL-user = if(mcType="email_antivirus" OR match('RejType',".*Virus.*|Malware|Trojan|Ransonware"), coalesce('Recipient','Rcpt'), coalesce('user', 'sender'))
EVAL-file_name = if(isnotnull(AttNames) AND AttNames!="None", split('AttNames',", "),'file_name')
EVAL-file_size = if(isnotnull(AttSize) AND AttSize!="0", 'AttSize','file_size')
EVAL-message_info = if(isnotnull('RejInfo'), replace('RejInfo', "\[|\]",""), if(isnotnull('SpamInfo') AND SpamInfo!="[]", replace('SpamInfo', "\[|\]",""),null()))
EVAL-message_id = if(isnotnull('message_id') AND message_id!="None", 'message_id', null())
EVAL-return_addr = if(isnotnull('Sender') AND mcType IN("email_delivery") AND Sender!="<>",'Sender',if(isnotnull('return_addr') AND mcType IN("email_delivery") AND return_addr!="<>",'return_addr',null()))
EVAL-action = case((sourcetype="mimecastttpurlst" OR sourcetype="mimecastsiemst" OR sourcetype="mimecastttpapst" OR sourcetype="mimecastttpipst" OR sourcetype="mimecastdlpst") AND (isnotnull(Subject) OR isnotnull(subject)) OR isnotnull(recipientAddress) OR (isnotnull(sender) OR isnotnull(Sender)), case(Act=="Delivered" OR action=="Delivered" OR action="allow" OR Delivered="True", "delivered", Act=="Blocked" OR action=="Blocked" OR action=="block", "blocked", Act=="Quarantined" OR Action=="hold" OR action=="Quarantined" OR action=="hold", "quarantined", action=="Warn", "deferred", mcType == "email_process", Act, mcType == "email_delivery" AND Delivered == True, "delivered", mcType =="email_delivery" AND Delivered == "False", "blocked", Action =="hold", "quarantined", Action == "rejected", "blocked", Action == "None", "unknown", mcType == "email_antivirus", "blocked", 1=1, "unknown"))
EVAL-signature_extra = if(isnotnull('RejInfo'), split(replace('RejInfo', "\[|\]",""),", "),null())

[ccx:mimecastttpurlst]
MAX_TIMESTAMP_LOOKAHEAD = 512
KV_MODE = none
SHOULD_LINEMERGE = 0
category = Custom CCX Add-on for Mimecast
pulldown_type = 1

REPORT-ccx_kv_format_results_for_mimecastttpurlst = ccx_kv_format_results_for_mimecastttpurlst

FIELDALIAS-ccx_alias_http_content_type = fileType AS http_content_type
FIELDALIAS-ccx_alias_user = user_email_address AS user
FIELDALIAS-ccx_alias_file_hash = fileHash AS file_hash
FIELDALIAS-ccx_alias_signature_extra = scan_result AS signature_extra
FIELDALIAS-ccx_alias_orig_subject = subject AS orig_subject

EVAL-vendor_product = "Mimecast:Mail:Threat Protect"
EVAL-url_length = len(url)
EVAL-action = case(action=="block", "blocked", action=="allow", "allowed", 1=1, "unknown")
EVAL-app = "Mimecast"
EVAL-url_domain = replace(url, "^(?:https?:\/\/)?(?:[^@\n]+@)?(?:www\.)?([^:\/\n?]+)(?:.+)?", "\1")
EVAL-subject = replace(subject,"\'|\(|\,|\)","")
EVAL-filter_action = case(action=="block", "dropped", action=="allow", "accepted", 1=1, "unknown")
EVAL-signature = coalesce('ttp_definition','ttpDefinition')

[ccx:mimecastauditst]
MAX_TIMESTAMP_LOOKAHEAD = 512
KV_MODE = none
SHOULD_LINEMERGE = 0
category = Custom CCX Add-on for Mimecast
pulldown_type = 1

REPORT-ccx_kv_format_results_for_mimecastauditst = ccx_kv_format_results_for_mimecastauditst
REPORT-ccx_mimecast_ip_extraction = ccx_mimecast_ip_extraction

FIELDALIAS-ccx_alias_src_ip = src AS src_ip
FIELDALIAS-ccx_alias_object_attrs = auditType AS object_attrs

EVAL-action = if(isnotnull('action'), 'action', if(isnotnull('eventInfo'), case(match(eventInfo,"^.*Updated.*"),"updated",match(eventInfo,"^.*locked.*"),"lockout",match(eventInfo,"^.*unlocked.*"),"unlocked",match(eventInfo,"^.*Delete.*|.*delete.*"),"deleted",match(eventInfo,"^.*Cleare.*|.*cleare.*"),"cleared",match(eventInfo,"^.*Create.*|.*create.*"),"created",1=1,"modified"),null()))
EVAL-change_type = if(like(auditType, "%User%") OR like(auditType, "%user%"), "AAA", "filesystem")
EVAL-signature = case(like('auditType', "%Log%") OR like('auditType', "%log%"), 'auditType',  1==1, 'virus')
EVAL-object = replace(eventInfo,"^.*(?<=Application:|App:)(?s)(.*$)","\1")
EVAL-object_category = if(like(auditType, "%User%") OR like(auditType, "%user%"), "user", "instance")
EVAL-reason = replace(eventInfo,"^.*(?<=Reason:)(?s)(.*$)","\1")
EVAL-vendor_product = "Mimecast:Mail:Audit"


