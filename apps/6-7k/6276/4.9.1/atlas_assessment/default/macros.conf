[queued_search_base(2)]
args = parent_sid, base_name
definition = inputlookup queued_searches | where like(_key,"$parent_sid$ $base_name$%") AND status="Success" | table sid | stats c first(sid) as sid | map search="| loadjob $sid$ | eval base_sid=\"$sid$\""

[record_assessment_status(5)]
args = assessment_sid, timerange, base_sid, category_key, key
definition = addinfo \
| eval value=coalesce(value, 0), value_type=coalesce(value_type, "num"), value_str=coalesce(value_str, ""), updated=info_search_time, sid=info_sid,  _key="$key$", category_key="$category_key$", base_sid=coalesce(base_sid,"-"), assessment_sid="$assessment_sid$", timerange="$timerange$" \
| table value, value_type, value_str, updated, sid, base_sid, assessment_sid, _key, category_key label, timerange\
| outputlookup append=true assessment_buffer

[assessment_metrics_index]
definition= "_metrics"