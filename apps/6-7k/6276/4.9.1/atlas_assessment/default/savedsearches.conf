[Sourcetype Utilization]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
display.general.timeRangePicker.show = 0
display.visualizations.show = 0
request.ui_dispatch_app = atlas_assessment
request.ui_dispatch_view = search
search = index=_audit action=search info=completed search=* event_count>0 NOT ("searchactivityquery" OR savedsearch_name="_ACCELERATE_*_ACCELERATE_" OR app IN (splunk_archiver,splunk_instance_monitoring,splunk_instrumentation,splunk_monitoring_console)) \
| eval \
    is_sub=if(like(search_id, "'subsearch_%"),1,0), \
    sid=trim(search_id,"'"), \
    sid=if(is_sub=1, replace(sid, "^subsearch_|_[^_]+$$", ""), sid), \
    roles=split(trim(roles,"'"),"+"), \
    user=if(user="splunk-system-user","nobody",user), \
    type=case(match(sid, "^scheduler_"), "Scheduled", match(sid, "^(?:rt_)?\d+\.\d+"), "Ad Hoc", match(sid, "^_?[^_]+_?_[^_]+_+[^_]+__[^_]+_\d+\.\d+"), "Dashboard"), \
    name=if(type="Scheduled" OR type="Dashboard", case(savedsearch_name!="",savedsearch_name), "-") \
| where is_sub=1 OR (isnotnull(type) AND (type="Ad Hoc" OR !like(app, "atlas%"))) \
| fields host _time sid type provenance is_sub app user roles sid name _raw \
| eventstats first(provenance) as provenance, first(name) as name, first(type) as type by sid \
| where isnotnull(type) AND (type="Ad Hoc" OR !like(app, "atlas%")) \
| rex "search='\s*(?:\|\s*\b(?:search|searchtxn|[tm]stats)\b|search)?\s*(?<gen>[\s\S]*)'(, is_federated_search=[01]|]$$)" \
| where isnotnull(gen) \
| eval gen=replace(gen,"(?<!\\\)[|[][\s\S]*$$","") \
| rex max_match=0 "sourcetype_count__(?<st>[^=]+)=\d+," \
| fields host _time sid type provenance st gen name app user roles \
| rex max_match=0 field="gen" "\bindex\s*=\s*\"?(?<idx>[\w*]+)" \
| eval idx=coalesce(idx,"*"), idx=mvfilter(!match(idx,"^_")), is_definite=if(isnotnull(st),1,0), st_gen=case(isnull(st),gen) \
| where isnotnull(idx) \
| rex max_match=0 field="st_gen" "\bsourcetype\s*=\s*(?:\"(?<st1>[^?#&\n]+?)(?<!\\\)\"|(?<st2>(?:\\\[^\s\n]|[^\s?#&\n\"\|\(\)\[\]\<\>])+))" \
| eval st=coalesce(st,mvappend(st1,st2),"*") \
    | eval s="-" \
| stats values(user) as u, values(_time) as t, values(sid) as sids by host type provenance is_definite idx st s name app \
| where idx!="*" OR st!="*" \
| eval dataset=if(idx=="default","main",idx)." : ".st \
| appendcols \
    [ `queued_search_base($parent_sid$, "Data Utilization Usage")` \
    | stats values(dataset) as all_datasets ] \
| filldown all_datasets \
| eval dataset=replace(dataset,"\*","%")." :: %", dataset=mvmap(all_datasets,case(like(all_datasets,dataset),all_datasets)) \
| fields - all_datasets \
| where isnotnull(dataset) \
| mvexpand dataset \
| eval dataset=split(dataset," :: "), usage=mvindex(dataset,1), dataset=mvindex(dataset,0) \
| fields dataset usage type is_definite sids \
| append \
    [ `queued_search_base($parent_sid$, "Data Utilization Usage")` \
    | eval dataset=split(dataset," :: "), usage=mvindex(dataset,1), dataset=mvindex(dataset,0)  ] \
| stats \
    first(usage) as usage, \
    dc(eval(case(type=="Ad Hoc",sids))) as adhoc_c, dc(eval(case(type=="Scheduled",sids))) as sched_c, dc(eval(case(type=="Dashboard",sids))) as dash_c, \
    values(eval(case(is_definite==1,sids))) as def_sids, values(eval(case(is_definite==0,sids))) as indef_sids \
    by dataset \
| fillnull adhoc_c sched_c dash_c def_sids indef_sids \
| eval \
    total_c = adhoc_c + sched_c + dash_c, \
    ratio = round(total_c/usage,1), \
    def_sids=mvjoin(def_sids,"'\",\"'"), \
    indef_sids=mvjoin(indef_sids,"'\",\"'") \
| table dataset adhoc_c sched_c dash_c total_c usage ratio def_sids indef_sids

[Search Window Base]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
request.ui_dispatch_app = atlas_assessment
request.ui_dispatch_view = search
search = | rest splunk_server=local /servicesNS/-/-/saved/searches search="eai:acl.app!=splunk_monitoring_console" \
| search disabled=0 is_scheduled=1 dispatch.earliest_time=* dispatch.earliest_time!="rt" \
| rename \
    title as savedsearch_name \
    dispatch.earliest_time as earliest_time\
    dispatch.latest_time as latest_time \
| fields\
    savedsearch_name earliest_time latest_time \
    cron_schedule search \
| fillnull earliest_time \
| fillnull latest_time value="now" \
| cronminutes field=cron_schedule \
| rex field=search "earliest[\\s\\n]*=[\\s\\n]*(?<inline_earliest_time>[^\\s]+)" \
| rex field=search "latest[\\s\\n]*=[\\s\\n]*(?<inline_latest_time>[^\\s]+)" \
| where isnull(inline_earliest_time) \
| eval \
    now = now(),\
    interval_minutes = cronMax,\
    earliest_time = if(isnull(earliest_time),0,earliest_time),\
    latest_time = if(isnull(latest_time) OR latest_time=="now","+0s",latest_time),\
    window_minutes = if(earliest_time==0 and latest_time=="+0s","All Time",floor((relative_time(now,latest_time) - relative_time(now,earliest_time)) /60) ),\
    gap_minutes = if(earliest_time==0 and latest_time=="+0s",0,interval_minutes-window_minutes)

[Dashboard Resource Base]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
