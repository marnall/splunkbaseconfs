```Macro expansion logic. Does not expand macros in macros.```\
| rex field=search max_match=10 "(?<macro_match>`[\w-]+(?:\([^\)]+\))?`)"\
| mvexpand macro_match\
| rex field="macro_match" max_match=1 "`(?<macro_name>[\w-]+)(?:\((?<macro_argvals>[^\)]+)\))?`"\
| eval macro_argvals=split(replace(macro_argvals,"[\s\"]+",""),","), macro_title=if(isnull(macro_argvals), macro_name, macro_name."(".mvcount(macro_argvals).")")\
| join type=left macro_title\
    [ rest splunk_server=local /servicesNS/-/-/data/macros/ f=definition f=args\
    | fields title definition args\
    | rename * as macro_* ]\
| eval macro_args=mvzip(split(replace(macro_args,"\s+",""),","),macro_argvals,"=")\
| foreach macro_args mode=multivalue [ eval macro_definition=replace(macro_definition, "\$".replace(<<ITEM>>, "(^[^=]+)=.+$", "\1")."\$", replace(<<ITEM>>, "^[^=]+=", "")) ]\
| eval macro=macro_match."=".macro_definition\
| fields - macro_*\
| stats values(*) as * by title\
| foreach macro mode=multivalue [ eval search=replace(search, replace(replace(<<ITEM>>, "(^[^=]+)=.+$", "\1"), "(?=[()\"])", "\\"), replace(<<ITEM>>, "^[^=]+=", "")) ]\
| fields - macro\
```End macro Expansion logic```\
| rename eai:acl.* as *\
| where NOT match(search,"^(?=.*index\s*=)(?=.*sourcetype\s*=).*") AND NOT match(search,"^\|\s*.*")\
| stats dc(title) as value\
| eval label="Scheduled Searches Not Specifying Index and Sourcetype"\
| `record_assessment_status($parent_sid$, $timerange$, "-", "Search Performance","1077")`

