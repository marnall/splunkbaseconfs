search = | tstats summariesonly=true allow_old_summaries=false fillnull_value=0, \
    max(data.search_props.scan_count) AS scan_count, \
    max(data.mem_used) AS mem_used, \
    max(data.elapsed) AS run_time, \
    values(data.search_props.provenance) as provenance \
    WHERE index=_introspection sourcetype=splunk_resource_usage component::PerProcess data.process_type::search data.search_props.type=ad-hoc data.search_props.provenance=UI:*ashboard:* \
    BY data.search_props.sid \
| stats sum(mem_used) as dashboard_mem_mb, sum(run_time) as search_time_ms by provenance \
| rex field=provenance "^UI:[Dd]ashboard:(?<Dashboard>.+)$" \
| fields Dashboard dashboard_mem_mb search_time_ms

