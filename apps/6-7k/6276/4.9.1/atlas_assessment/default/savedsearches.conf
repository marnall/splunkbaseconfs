[Search SVCs]
# As of CMC 3.30.0 / Splunk Cloud 9.2.2408, SVC search attribution has been split into a separate log, splunk-svc-search-attribution. The old log, splunk-svc-consumer, could not accurately detect SVC usage for searches which completed in under 10 seconds, and placed all associated SVCs under process_type="search_launcher". The old log remains the source of truth for data services & shared services, but should not be used for searches. This is likely an evolving situation. Both the docs and the CMC searches appear very inconsistent / unreliable, particularly regarding which index is used. 
