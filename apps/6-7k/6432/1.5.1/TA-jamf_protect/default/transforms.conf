###Sourcetyper TRANSFORMs###
[force_st-jamf_protect]
DEST_KEY = MetaData:Sourcetype
REGEX = {"input":{"match":{"facts"
FORMAT = sourcetype::jamf:protect:alerts

[force_st-threat-cef]
DEST_KEY = MetaData:Sourcetype
REGEX = CEF:\d\|Wandera\|Threat Events Stream
FORMAT = sourcetype::wandera:threat:cef

[force_st-threat-json]
DEST_KEY = MetaData:Sourcetype
REGEX = ^\{\"metadata\".*?\"product\"\:\"Threat Events Stream\"
FORMAT = sourcetype::wandera:threat:json

###End Sourcetypers###

###REPORTs - Protect Alerts###
[jamf_protect_clean_contexts]
REGEX = \{"name":"([^"]+)","value":"([^"]+)","
FORMAT = $1::$2
MV_ADD = true

#pull some a signature field that we can use specifically for authentication events
[jamf_protect_auth_reason]
REGEX = composedMessage":".*?(?<authentication_reason>(?:PAM: )?authentication error|maximum authentication attempts exceeded|(?:kex_exchange_identification: )?Connection closed by remote host|INCORRECT password|Unlock succeeded, with password, attempting to unlock the login keychain|APEventTouchIDNoMatch|APEventTouchIDMatch|Connection reset by peer|Password changed)

[jamf_protect_short_usernames]
REGEX = shortUsername \= (?P<user>[^\,]*), userID \= (?P<user_id>\d*), groupID \= (?P<group_id>\d*)

#group_name is consistent with other extracted names, but the value we need for CIM is called user_role. Take care of that afterwards with FIELALIAS in props.conf
##If there are additional "eventtypes" that contain user and src_user fields then they should be added to the regex below
[jamf_protect_escalation_events]
REGEX = (?:GPProcessEvent|GPThreatMatchExecEvent|GPPreventedExecutionEvent|GPClickEvent|GPDownloadEvent)",\s*"related":\s*{"users":\s*\[{"uid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"}(?:,\s*{"uid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"})?
FORMAT = user_uid::$1 user::$2 user_uuid:$3 src_user_uid::$4 src_user::$5 src_user_uuid::$6

#GPFSevents list the accounts in the opposite order from GPProcessEvent types. So the REGEX mostly the same but the the field order is different.
###There are still some issues with the way i'm doing this. Might be better to extract the user/src_user fields as different names then eval them over.
#####Events themselves seem to use different order sometimes. So even though it's unlikely that "root" sudo's to "dan", it is possible, thus hard to evaluate if the order is inconsistent
[jamf_protect_escalation_events_1]
REGEX = (?:GPFSEvent|GPGatekeeperEvent)",\s*"related":\s*\{"users":\s*\[(?:{"uid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"}\]*,\s*)?\{"uid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"}
FORMAT = src_user_uid::$1 src_user::$2 src_user_uuid::$3 user_uid::$4 user::$5 user_uuid:$6

#using FORMAT we can use the same extracted value for multiple field names. This is done because group_name is consistent with other extracted names, but the value we need for CIM is called user_role
[jamf_protect_escalation_events_role]
REGEX = (?:GPProcessEvent|GPThreatMatchExecEvent|GPPreventedExecutionEvent|GPClickEvent|GPDownloadEvent).*?groups":\s*\[{"gid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"}(?:,\s*{"gid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"})?
FORMAT = group_id::$1 group_name::$2 group_uuid::$3 src_group_id::$4 src_group_name::$5 src_group_uuid::$6

[jamf_protect_escalation_events_role_1]
REGEX = (?:GPFSEvent|GPGatekeeperEvent).*?groups":\s*\[(?:{"gid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"}\]*,)?{"gid":\s*(\d+),\s*"name":\s*"([^"]*)",\s*"uuid":\s*"([^"]*)"}
FORMAT = src_group_id::$1 src_group_name::$2 src_group_uuid::$3 group_id::$4 group_name::$5 group_uuid::$6

[file_name_and_path]
REGEX = related\":\s*\{.*?(?:binaries|files)\":.*?path\":\s*\"(?P<file_path>[^\"]+)\/(?P<file_name>[^\"]+)\"
#FORMAT = file_name::$1 file_path::$2
MV_ADD = true
###End Reports Protect Alerts###

###REPORTs - Threat Defense###
[wandera]
REGEX= (?:\S+) (?<dvc>\S+) (?:\S+) (?:\S+) (?:\S+) CEF:\d\|Wandera

[cefHeaders]
REGEX = CEF:(?<cef_version>\d*)\|(?<vendor>.*?)\|(?<product>.*?)\|(?<version>.*?)\|(?<vendor_rule_id>.*?)\|(?<vendor_rule>.*?)\|(?<cef_severity>.*?)\|

[cefKeys]
REGEX = (?:_+)?([\w.:\[\]]+)=(.*?(?=(?:\s[\w.:\[\]]+=|$)))
FORMAT = $1::$2

[cefKeys_1]
REGEX = (?:_+)?([\w.:\[\]]+)\\=(.*?(?=(?:\s[\w.:\[\]]+\\?=|$)))
FORMAT = $1::$2
###End Reports Threat Defense###
