###Establish base eventtypes###
##This is preferred vs a macro as macros don't unfold index= fields properly when searching by event type
[jamf_protect]
search = index=* sourcetype="jamf:protect:alerts"
##tags = none

[wandera_threats]
search = index=* sourcetype="wandera:threat:*"
###End Base eventtypes###
###End Establish base event types###

###Jamf Protect Alerts eventttypes###
####Events missing severity or with severity=informational are just normal logs. Everything else that is not a threat/malware event is an alert
[jamf_protect_alerts]
search = eventtype=jamf_protect (severity!=informational NOT "input.eventType" IN ("GPThreatMatchExecEvent","GPPreventedExecutionEvent","GPGatekeeperEvent","GPFSEvent","GPUnifiedLogEvent"))
##tags = alert

#Known threats only
[jamf_protect_threat_known]
color = none
search = eventtype=jamf_protect "input.eventType" IN ("GPThreatMatchExecEvent","GPPreventedExecutionEvent")
##tags = attack, malware

#You should deside if you want the "suspicious" events to land in your Alerts or Malware DM. By default they will map to alerts
[jamf_protect_threat_suspicious]
color = none
search = eventtype=jamf_protect severity!=informational "input.eventType" IN ("GPGatekeeperEvent","GPFSEvent")
##default tags = alerts
##alternate tags = attack, malware

[jamf_protect_unified_event_log]
search = eventtype=jamf_protect "input.eventType"=GPUnifiedLogEvent
##tags = none

####These events are OKAY for authentication data but ComplianceReporter would provide better data
[jamf_protect_alert_authentication]
color = none
search = eventtype=jamf_protect input.match.event.process IN ("loginwindow","opendirectoryd","sshd")
##tags = authentication
###End Jamf Protect Alerts eventttypes###

###Jamf Protect Threat Defense eventtypes###
##All events EXCEPT BAD_HOST events are just Vulnerabilities or Alerts.
[wandera_threats_vuln]
color = none
search = eventtype=wandera_threats ("eventType.name"!=ACCESS_BAD_HOST) OR (sourcetype="wandera:threat:cef" EventType!=ACCESS_*)

##BAD_HOST and ACCESS_* events are Malware detection/blocks
[wandera_threats_traffic]
color = none
search = eventtype=wandera_threats ((sourcetype="wandera:threat:json" "eventType.name"=ACCESS_BAD_HOST) OR (sourcetype="wandera:threat:cef" EventType=ACCESS_*))
###End Jamf Protect Threat Defense eventtypes###
