##TEMP
[wandera:cef:threat]
rename = wandera:threat:cef

[wandera:json:threat]
rename = wandera:threat:json

[wandera:cef:traffic]
rename = wandera:traffic:cef


###Generic Sourcetype for initial data onboarding###
##This is used to find correct sub-sourcetypes within Jamf application logs
[jamf:protect]
##Identify and split data to specific sourcetypes
TRANSFORMS-set_sourcetypes = force_st-jamf_protect, force_st-threat-cef, force_st-threat-json

###
##This is an example of how to get existing data to work with the jamf:protect:alerts sourcetype settings below
#[EXISTING-SOURCETYPE]
#rename = jamf:protect:alerts
####End Generic onboarding Sourcetypes

###Jamf Protect Alerts Sourcetype###
[jamf:protect:alerts]
CHARSET=UTF-8
MAX_TIMESTAMP_LOOKAHEAD=18
SHOULD_LINEMERGE=false
category=Custom
description=Jamf Protect Alert Logs
disabled=false
pulldown_type=true
KV_MODE=json
LINE_BREAKER=([\r\n]+)
TIME_FORMAT=%s.%7Q
TIME_PREFIX="timestamp":
###Truncate limit increased for long events such as credential dumps. Default is only 10000
TRUNCATE=99999

## 1. REPORT
################
REPORT-clean_up_contexts = jamf_protect_clean_contexts
REPORT-additional_extractions = jamf_protect_auth_reason, jamf_protect_short_usernames, jamf_protect_escalation_events, jamf_protect_escalation_events_1, jamf_protect_escalation_events_role, jamf_protect_escalation_events_role_1
REPORT-file_name_and_path = file_name_and_path

## 2. EXTRACT
################
#####These are all related to authentication and not needed for now
EXTRACT-auth_methods1 = (?<authentication_method>LoginWindow .*?) (?:Success|Failure)\"
EXTRACT-auth_methods2 = (?<authentication_method>kex_exchange_identification|SSH login)
EXTRACT-auth_methods3 = \"auth\",\"name\":\"(?P<authentication_method>Local User Password Change Success)\",
EXTRACT-auth_methods4 = (?<authentication_method>Lock Screen Unlock) (?:Success|Failure)\"
EXTRACT-auth_methods5 = (?<authentication_method>screen unlock attempts)
EXTRACT-auth_reason1 = LoginWindow (?P<authentication_reason>Password \w+)
#####

EXTRACT-cve = (?P<cve>CVE\-\d{3,4}\-\d{3,5})
EXTRACT-mitre_attack_id = \"MITREattack\".*?(?<mitre_technique_id>T\d{1,4}(?:\.\d{1,4})?)\"
EXTRACT-src_ip_from_ssh = from (?P<src_ip>(?:[\d\.]{1,3}){4}) port (?P<src_port>\d{1,5}) (?<authentication_method>ssh2)
EXTRACT-src_ip_pam = (?<authentication_method>PAM): .*?for (?<user>\S+) from (?<src_ip>(?:[\d\.]{1,3}){4})

## 3. FIELDALIAS
################
FIELDALIAS-args = input.related.processes{}.args{} AS args
##for dest, consider using the device serial number, which is consistent and will not contain dupes. Then use a lookup to get the hostnames
FIELDALIAS-category = input.match.facts{}.tags{} AS category
FIELDALIAS-client = context.identity.claims.clientid AS client
FIELDALIAS-dest = input.host.hostname AS dest
FIELDALIAS-dest_ip = input.host.ips{} AS dest_ip
##I think dest_type is only part of Alerts DM. If it is part of other DM we may need to adjust
#FIELDALIAS-dest_type = input.match.context{}.name AS dest_type
FIELDALIAS-dvc = host AS dvc
FIELDALIAS-event_name = input.eventType AS event_name
FIELDALIAS-file_hash = input.related.binaries{}.sha256hex AS file_hash
FIELDALIAS-id = input.match.event.uuid AS id
FIELDALIAS-threat_name = input.match.event.matchName = threat_name
##field <type> is defined by Alerts DM, and suggests values like "alarm, alert, event, task, warning, unknown".
FIELDALIAS-type = input.reportType AS type
##For events where user uses sudo privileges or similar, we need to capture the user initiating the action as "src_user" and user as the user the action was run as.
###To accomplish this, i use a transforms to extract events with src_user and user, then use ASNEW with the field alias below so that it only uses the alias if the field <user> does not already exist (such as if the extraction doesn't extract anything)
FIELDALIAS-user = input.related.users{}.name ASNEW user
FIELDALIAS-user_ids = user_uid ASNEW user_id, src_user_uid AS src_user_id
FIELDALIAS-user_name = input.related.users{}.name ASNEW user_name
FIELDALIAS-user_role = input.related.groups{}.name AS user_role, src_group_name AS src_user_role
FIELDALIAS-vendor_account = context.identity.claims.tenantid AS vendor_account

## 4. EVAL
################
##Validate action on the SSHD events.  Sort by input.match.event.composedMessage
EVAL-action = case(match('input.match.event.blocked',"true") OR match('input.match.facts{}.name',"Quarantined|GatekeeperBlocked"),"blocked", match('input.match.facts{}.name',"[Ll]ogin.*[Ff]ailure|Failed SSH Connection Events|Unlock Failure|Failed screen unlock attempts with incorrect password") OR match('input.match.event.composedMessage',"authentication error|maximum authentication attempts exceeded|Connection closed|Connection reset by peer"),"failure", match('input.match.facts{}.name',"[Ll]ogin.*[Ss]uccess|SSHLogin|LoginWindow Activity|Authentication Allowed|Local User Password Change Success|SSH Events"),"success", true(),"allowed")
EVAL-authentication_service = case(match('input.match.event.process',"sshd|loginwindow|opendirectoryd"),'input.match.event.process')
EVAL-app = coalesce(case('input.eventType'=="GPGatekeeperEvent","Gatekeeper"),'input.match.event.process',"Jamf:Protect")
EVAL-Args = mvdedup(Args)
EVAL-change_type = case('input.match.event.category'="MDMDaemon","MDM")
EVAL-description = coalesce('input.match.event.composedMessage','input.match.facts{}.human','input.match.facts{}.name')
#duration for auth Events
EVAL-duration = timeendpos-timestartpos
EVAL-durationstr = tostring(timeendpos-timestartpos,"duration")
EVAL-file_access_time = 'input.related.files{}.accessed'
EVAL-file_created_time = 'input.related.files{}.created'
EVAL-file_modify_time = 'input.related.files{}.modified'
EVAL-ItemBinary=  mvdedup(ItemBinary)
EVAL-ItemName = mvdedup(ItemName)
EVAL-Label = mvdedup(Label)
EVAL-Name = mvdedup(Name)
EVAL-process_id = 'input.related.processes{}.pid'
EVAL-process_guid = 'input.related.processes{}.uuid'
EVAL-process_path = coalesce(rtrim('input.match.event.process.path','input.match.event.process.name'),rtrim('input.related.processes{}.path','input.related.processes{}.name'))
EVAL-process_name = coalesce('input.match.event.process.name','input.related.processes{}.name')
EVAL-reason = coalesce(authentication_reason,'input.match.facts{}.actions{}.parameters.message','input.match.facts{}.human','input.match.facts{}.name')
###Some items have multiple severity_id attached to them. I'm processing from high to low so the severity set is the highest one attached to an event
#####Use input.match.severity because... "If an alert has more than one analytic associated to it (such as PlistDisguisedByApple, whereby it’s a tier 1 analytic that involved a tier 0 analytic first) then each analytic will also have a severity of it’s one listed in input.match.facts{} but the parent input.match.severity is still the highest / truest value for the alert as a whole."
EVAL-severity = case('input.match.facts{}.severity'=="3","high",'input.match.facts{}.severity'=="2","medium",'input.match.facts{}.severity'=="1","low",'input.match.facts{}.severity'=="0" OR isnull('input.match.facts{}.severity'),"informational")
EVAL-severity_id = 'input.match.severity'
EVAL-signature = coalesce('input.match.facts{}.name','input.match.facts{}.human')
EVAL-signature_id = 'input.match.facts{}.uuid'
EVAL-signature_version = coalesce('input.match.facts{}.version',version)
EVAL-src = coalesce(src,src_ip,'input.related.files{}.downloadedFrom{}'')
EVAL-user_type = split(case(user_role=="wheel","admin|default",'input.related.users{}.uid'=="0","system|default"),"|")
EVAL-vendor_action = 'input.match.facts{}.actions{}.name'
EVAL-vendor_product="Jamf:Protect"

##depricated fields for ALERT data
#body= <field is now DESCRIPTION>
#subject= <field is now SIGNATURE>

###End Jamf Protect Alerts Sourcetype###

###Jamf Protect Threat Defense Sourcetypes###
[wandera:threat:cef]
KV_MODE = none

## 1. REPORT
################
REPORT-cef = wandera,cefHeaders,cefKeys

## 2. EXTRACT
################

## 3. FIELDALIAS
################
##For threat events, DeviceID refers to the ID unique to the UEM software, NOT the ID unique to Wandera.
#These are the only events where we actually want to use GUID and NOT DeviceID
FIELDALIAS-wandera_device_id = GUID AS wandera_device_id

## 4. EVAL
################
#The context for source vs dest might be backwards for the Malware logic in Splunk CIM
EVAL-action = if(ACT="Detected" OR ACT="Resolved","allowed","blocked")
EVAL-app = AppName
EVAL-category = Event
###This should properly handle the difference between Network Traffic and Vulnerabilities
EVAL-dest = coalesce(Destination,wandera_device_id)
EVAL-dest_ip = DestinationIP
EVAL-dest_name = DeviceName
EVAL-file_name = AppID
EVAL-file_hash = coalesce(AppSha256,AppSha1)
EVAL-product_version = version
EVAL-severity = case(Severity>7,"critical",Severity>5,"high",Severity>3,"medium",Severity>1,"low",Severity=0,"informational")
EVAL-severity_id = Severity
EVAL-signature = Event
#EVAL-src = UserDeviceName
###Validate the use of GUID vs DeviceID
#EVAL-src_id = GUID
#EVAL-src_ip = SourceIP
#EVAL-src_uem_id = DeviceId
EVAL-ssid = coalesce(AccessPoint,AccessPointBSSID)
EVAL-url = EventURL
EVAL-user = coalesce(UserEmail,suser)
EVAL-user_name = suser
EVAL-vendor_account = CustomerId
EVAL-vendor_product = vendor+":"+product

[wandera:threat:json]
CHARSET=UTF-8
KV_MODE=json
MAX_TIMESTAMP_LOOKAHEAD=24
SHOULD_LINEMERGE=false
disabled=false
TIME_FORMAT=%Y-%m-%dT%H:%M:%S.%QZ
TIME_PREFIX=\,\"timestamp\":\"
LINE_BREAKER=([\r\n]+)

## 1. REPORT
################

## 2. EXTRACT
################

## 3. FIELDALIAS
################
FIELDALIAS-rule = vendor_rule AS rule
FIELDALAIS-rule_id = vendor_rule_id AS rule_id
#original field for severity uses numbers, which we need for severity_id.
##this requires us to use a FIELDALIAS so we can retain the severity as severity_id
FIELDALIAS-severity_id = severity AS severity_id
FIELDALIAS-wandera_device_id = device.deviceId AS wandera_device_id

## 4. EVAL
################
EVAL-action = if(action=="Detected" OR action=="Resolved","allowed","blocked")
EVAL-app = case('app.name'!="null",'app.name')
EVAL-category = coalesce('eventType.description',Category)
###dest and src are contextual based on if the block reason is due to network event or if the alert is due to a vulnerability. Current field mappings are correct for network_traffic and NOT for vulnerabilities
##consider using device.deviceId here instead of device.deviceName
EVAL-dest = if('destination.name'=="null",wandera_device_id,'destination.name')
EVAL-dest_ip = case('destination.ip'!="null",'destination.ip')
EVAL-dest_name = if('destination.name'=="null",'device.deviceName','destination.name')
EVAL-dest_port = case('destination.port'!="null",'destination.port')
##Might need to customize this or find another way to fill it out
EVAL-dvc = "radar.wandera.com"
EVAL-file_name = 'app.id'
EVAL-file_hash = coalesce('app.sha256','app.sha1')
EVAL-product = 'metadata.product'
##EVAL-product_version = version
EVAL-severity = case(severity>7,"critical",severity>5,"high",severity>3,"medium",severity>1,"low",severity=0,"informational")
EVAL-signature = 'eventType.description'
EVAL-signature_id = 'eventType.id'
EVAL-src = case('source.ip'!="null",'source.ip')
EVAL-src_ip = case('source.ip'!="null",'source.ip')
EVAL-ssid = coalesce('accessPoint','accessPointBssid')
#EVAL-url = 'eventUrl'
EVAL-user = coalesce('user.email','user.name')
EVAL-vendor = 'metadata.vendor'
EVAL-vendor_account = 'account.customerId'
EVAL-vendor_product = 'metadata.vendor'+":"+'metadata.product'
