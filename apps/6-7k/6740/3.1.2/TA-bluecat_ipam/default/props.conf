[bluecat:ipam]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[source::...ta-bluecat_ipam*.log*]
sourcetype = tabluecatipam:log

[source::...ta_bluecat_ipam*.log*]
sourcetype = tabluecatipam:log

[bluecat:ipam:network]
DATETIME_CONFIG = CURRENT
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Structured
pulldown_type = 1
EXTRACT-CIDR = CIDR=(?<cidr>[^\|]+)
EXTRACT-allowDuplicateHost = allowDuplicateHost=(?<allow_duplicate>[^\|]+)
EXTRACT-inheritAllowDuplicateHost = inheritAllowDuplicateHost=(?<inherit_allow>[^\|]+)
EXTRACT-pingBeforeAssign = pingBeforeAssign=(?<ping_before>[^\|]+)
EXTRACT-inheritPingBeforeAssign = inheritPingBeforeAssign=(?<inherit_ping_before>[^\|]+)
EXTRACT-locationInherited = locationInherited=(?<inherit_location>[^\|]+)
EXTRACT-gateway = gateway=(?<gateway>[^\|]+)
EXTRACT-inheritDefaultDomains = inheritDefaultDomains=(?<inherit_domains>[^\|]+)
EXTRACT-defaultView = defaultView=(?<default_view>[^\|]+)
EXTRACT-inheritDefaultView = inheritDefaultView=(?<inherit_default_view>[^\|]+)
EXTRACT-inheritDNSRestrictions = inheritDNSRestrictions=(?<inherit_dns>[^\|]+)
EXTRACT-network_prefix = prefix=(?<prefix>[^\|]+)

[bluecat:ipam:block]
DATETIME_CONFIG = CURRENT
KV_MODE = json
SHOULD_LINEMERGE = 0
TRUNCATE = 0
category = Structured
pulldown_type = 1
EXTRACT-CIDR = CIDR=(?<cidr>[^\|]+)
EXTRACT-start = start=(?<start>[^\|]+)
EXTRACT-end = end=(?<end>[^\|]+)
EXTRACT-allowDuplicateHost = allowDuplicateHost=(?<allow_duplicate>[^\|]+)
EXTRACT-inheritAllowDuplicateHost = inheritAllowDuplicateHost=(?<inherit_allow>[^\|]+)
EXTRACT-pingBeforeAssign = pingBeforeAssign=(?<ping_before>[^\|]+)
EXTRACT-inheritPingBeforeAssign = inheritPingBeforeAssign=(?<inherit_ping_before>[^\|]+)
EXTRACT-locationInherited = locationInherited=(?<inherit_location>[^\|]+)
EXTRACT-inheritDefaultDomains = inheritDefaultDomains=(?<inherit_domains>[^\|]+)
EXTRACT-defaultView = defaultView=(?<default_view>[^\|]+)\|)
EXTRACT-inheritDefaultView = inheritDefaultView=(?<inherit_default_view>[^\|]+)
EXTRACT-inheritDNSRestrictions = inheritDNSRestrictions=(?<inherit_dns>[^\|]+)
EXTRACT-block_prefix = prefix=(?<prefix>[^\|]+)

[bluecat:ipam:address]
DATETIME_CONFIG = CURRENT
KV_MODE = json
SHOULD_LINEMERGE = 0
TRUNCATE = 0
category = Structured
pulldown_type = 1
EXTRACT-ip = address=(?<ip>[^\|]+)\|
EXTRACT-state = state=(?<state>[^\|]+)\|
EXTRACT-leaseTime = leaseTime=(?<lease_time>[^\|]+)?
EXTRACT-expiryTime = expiryTime=(?<expiry_time>[^\|]+)?
EXTRACT-parameterRequestList = parameterRequestList=(?<parameter_list>[^\|]+)?
EXTRACT-vendorClassIdentifier = vendorClassIdentifier=(?<vendor_class>[^\|]+)?
EXTRACT-locationInherited = locationInherited=(?<location_inherited>[^\|]+)?
EXTRACT-locationCode = locationCode=(?<location_code>[^\|]+)?
EXTRACT-macAddress = macAddress=(?<mac>[^\|]+)?

[bluecat:ipam:host]
DATETIME_CONFIG = CURRENT
KV_MODE = json
SHOULD_LINEMERGE = 0
TRUNCATE = 0
category = Structured
pulldown_type = 1
EXTRACT-host_properties = ((?:comments=)(?<comments>[^\|]+)\|)?absoluteName=(?<fqdn>[^\|]+)\|addresses=(?<ip>[^\|]+)\|reverseRecord=(?<reverse>[^\|]+)

