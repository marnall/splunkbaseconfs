[ccx_microsoft_windows_security_registry_endpoint_capture]
search = (source="WinEventLog:Security" OR source="XmlWinEventLog:Security") (EventCode IN("4663","4660","4657","5039","4670") AND ObjectName="\\\REGISTRY*")
# tags = registry endpoint

[ccx_microsoft_windows_security_registry_capture_endpoint_process]
search = (source="WinEventLog:Security" OR source="XmlWinEventLog:Security") (EventCode IN("4663","4660","4657","5039","4670") AND ProcessName="*")
# tags = report process

[ccx_ms_windows_winregistry_process]
search = sourcetype=WinRegistry process_name="*"
# tags = report process

[ccx_microsoft_windows_defender_alerts]
search = source="XmlWinEventLog:Microsoft-Windows-Windows Defender/Operational" OR source="WinEventLog:Microsoft-Windows-Windows Defender/Operational" EventCode IN("1121","2050","2051","1002","1005","1008","1010","1012","1014","1118","1119","2001","2003","2004","2006","2012","2021","2031","3002","3007","5008","5013","2014")
# tags = alert

[ccx_microsoft_windows_defender_change]
search = source="XmlWinEventLog:Microsoft-Windows-Windows Defender/Operational" OR source="WinEventLog:Microsoft-Windows-Windows Defender/Operational" EventCode IN("5007","2000","2014","2002","1013","2011","1011","1009","1013","2010","2013","2020","2030","5000","5001","5004","5009","5010","5011","5012")
# tags = change audit

[ccx_microsoft_windows_defender_health_report]
search = source="XmlWinEventLog:Microsoft-Windows-Windows Defender/Operational" OR source="WinEventLog:Microsoft-Windows-Windows Defender/Operational" EventCode IN("1151")

[ccx_microsoft_windows_defender_malware_attacks]
search = source="XmlWinEventLog:Microsoft-Windows-Windows Defender/Operational" OR source="WinEventLog:Microsoft-Windows-Windows Defender/Operational" EventCode IN("1006","1116")
# tags = attack malware

[ccx_microsoft_windows_defender_malware_operations]
search = source="XmlWinEventLog:Microsoft-Windows-Windows Defender/Operational" OR source="WinEventLog:Microsoft-Windows-Windows Defender/Operational" (EventCode IN("1003","1004","1007","1008","1009","1010","1011","1012","1014","1015","1117","1118","1119","1120","1127","2003","2005","2006","2007","2012","2013","2020","2021","2030","2031","2040","2041","2042","5000","5009","5010","5011","5012","5100","5101") OR Sha256="*")
# tags = malware operations

[ccx_microsoft_windows_defender_protection_running_healthy]
search = source="XmlWinEventLog:Microsoft-Windows-Windows Defender/Operational" OR source="WinEventLog:Microsoft-Windows-Windows Defender/Operational" EventCode IN("1150")

[ccx_microsoft_windows_defender_scan_finished]
search = source="XmlWinEventLog:Microsoft-Windows-Windows Defender/Operational" OR source="WinEventLog:Microsoft-Windows-Windows Defender/Operational" EventCode IN("1001")

[ccx_microsoft_windows_defender_scan_started]
search = source="XmlWinEventLog:Microsoft-Windows-Windows Defender/Operational" OR source="WinEventLog:Microsoft-Windows-Windows Defender/Operational" EventCode IN("1000")

##MODIFIED Splunk Add-on for Sysmon - https://splunkbase.splunk.com/app/5709##
[ccx_ms_sysmon_network]
search = source="WinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode="3"

[ccx_ms_sysmon_process]
search = source="WinEventLog:Microsoft-Windows-Sysmon/Operational" process_name="*"

[ccx_ms_sysmon_filemod]
search = source="WinEventLog:Microsoft-Windows-Sysmon/Operational" (EventCode IN ("2","11","23","26","27","28","29") )

[ccx_ms_sysmon_regmod]
search = source="WinEventLog:Microsoft-Windows-Sysmon/Operational" (EventCode IN ("12","13","14") )

[ccx_ms_sysmon_wmimod]
search = source="WinEventLog:Microsoft-Windows-Sysmon/Operational" (EventCode IN ("19","20","21") )

[ccx_ms_sysmon_dns]
search = source="WinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode="22"

[ccx_ms_sysmon_service]
search = source="WinEventLog:Microsoft-Windows-Sysmon/Operational" (EventCode IN ("4","16","255") )