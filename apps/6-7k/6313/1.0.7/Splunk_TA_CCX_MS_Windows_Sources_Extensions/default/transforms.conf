[description_for_defender]
CLEAN_KEYS = 0
FORMAT = description::$1
REGEX = ^(.*?)\.
SOURCE_KEY = Message

[file_name_for_defender]
CLEAN_KEYS = 0
FORMAT = file_name::$1
MV_ADD = 1
REGEX = ([^\|;\\\/\%]+\.[^\|;\\\/\%\"]+)(?=; |$|\||-&gt)
SOURCE_KEY = Path

[filename_file_name_for_defender]
CLEAN_KEYS = 0
FORMAT = file_name::$1
MV_ADD = 1
REGEX = ([^\|;\\\/\%]+\.[^\|;\\\/\%\"]+)(?=; |$|\||-&gt)
SOURCE_KEY = Filename

[file_name_for_email_for_defender]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = (?<=Attachment\.)\d+\:\s\"(?<email_file_name>[^\"]+)|(?<=Message\.)\d+\:\s\"[^\[]+\[(?<subject>[^\]]+)|file\:_(?<email_file_path>\S+MAIL[^\;]+)(?=; |$|\||-&gt)
SOURCE_KEY = Path

[file_path_for_defender]
CLEAN_KEYS = 0
FORMAT = file_path::$1
MV_ADD = 1
REGEX = (?<=file\:\_)([^\;]+)(?=; |$|\||-&gt)
SOURCE_KEY = Path

