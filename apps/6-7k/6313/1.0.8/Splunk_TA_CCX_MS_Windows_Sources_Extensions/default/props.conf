#requires override on default config Splunk_ta_windows#
EVAL-registry_path = if(EventCode IN("4663","4660","4657","5039","4670") AND match(ObjectName,"\\\REGISTRY\\\.*"),ObjectName,registry_path)
EVAL-registry_value_name = if(EventCode IN("4663","4660","4657","5039","4670") AND (isnotnull(ObjectValueName) OR isnotnull(registry_value_name)),coalesce(ObjectValueName,registry_value_name), if(EventCode IN("4663","4660","4657","5039","4670") AND (isnull(ObjectValueName) AND isnull(registry_value_name)),replace(ObjectName, "^(\\\.*\\\.*\\\.*\\\)(.*)(\\\|\\\).*","\2"),null()))
EVAL-user = case(EventCode IN (4727,4730,4731,4734,4735,4737,4754,4755,4758,4764),null(),EventCode==4688,if(user=="-" OR isnull(user),src_user,user),EventCode IN (1102,4673,4674,4689,4697,4698,4700,4701,4702,4719,4799,4657), case(SubjectUserName!="-",SubjectUserName),EventCode==4696,case(user!="-",user),EventCode IN (4703,4704,4705,4720,4722,4723,4724,4725,4726,4738,4767,4798), TargetUserName, EventCode==4781, NewTargetUserName, EventCode IN (4728, 4729, 4732, 4733, 4756, 4757), if(like(MemberSid, "%\%"), mvindex(split(MemberSid, "\\"),-1), if(like(member_user_name, "%\%"), null(), member_user_name)), EventCode IN (5156,5157), RemoteMachineID, true(), user)
EVAL-process_name = if(isnotnull(ProcessName),replace('ProcessName',".*\\\([^\\\]+$)","\1"),if(isnotnull(process_name),replace('process_name',".*\\\([^\\\]+$)","\1"),case(EventCode=4688,new_process_name,EventCode==4696,target_process_name)))

EVAL-registry_hive = if(isnotnull('registry_hive'),'registry_hive',case(like(ObjectName, "\REGISTRY\MACHINE\SECURITY\%"),"HKEY_LOCAL_MACHINE\\\Security",like(ObjectName, "\REGISTRY\USER\DEFAULT\%"),"HKEY_USERS\\\.DEFAULT",like(ObjectName, "\REGISTRY\USER\%"),"HKEY_CURRENT_USER",like(ObjectName, "\REGISTRY\MACHINE\SOFTWARE\%"),"HKEY_LOCAL_MACHINE\\\Software",like(ObjectName, "\REGISTRY\MACHINE\SYSTEM\ControlSet001\%"),"HKEY_CURRENT_CONFIG"))
EVAL-registry_key_name = if(isnotnull('object_file_name') AND (EventCode IN("4663","4660","4657","5039","4670")),'object_file_name',null())
EVAL-registry_value_data = if(isnotnull('NewValue') AND (EventCode IN("4663","4660","4657","5039","4670")),'NewValue',null())
EVAL-action = case((EventCode=="4688") AND Keywords=="0x8020000000000000","allowed", match(ObjectName,"\\\REGISTRY\\\.*") AND EventCode IN("4657","5039","4670"), "modified", match(ObjectName,"\\\REGISTRY\\\.*") AND EventCode=="4663", "read", match(ObjectName,"\\\REGISTRY\\\.*") AND EventCode=="4660", "deleted") 

[WinRegistry]
