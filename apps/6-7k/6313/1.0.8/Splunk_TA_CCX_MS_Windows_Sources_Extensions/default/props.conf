EVAL-dest = if(match(EventCode,"1000|1001|1002|1003|1004|1005|1007|1008|1009|1010|1011|1012|1013|1014|1015|1117|1118|1119|1120|1127|1150|1151|2000|2001|2002|2003|2004|2005|2006|2007|2010|2011|2012|2013|2020|2021|2030|2031|2040|2041|2042|3002|3007|5000|5001|5004|5007|5008|5009|5010|5011|5012|5013|5100|5101|1006|1116"), 'Computer', null())
EVAL-dest_host = if(match(EventCode,"1000|1001|1002|1003|1004|1005|1007|1008|1009|1010|1011|1012|1013|1014|1015|1117|1118|1119|1120|1127|1150|1151|2000|2001|2002|2003|2004|2005|2006|2007|2010|2011|2012|2013|2020|2021|2030|2031|2040|2041|2042|3002|3007|5000|5001|5004|5007|5008|5009|5010|5011|5012|5013|5100|5101|1006|1116"), 'Computer', null())
EVAL-user = if(isnotnull(User) AND User!="(unknown user)", replace(User, ".*\\\|", ""),'Detection_User')
EVAL-file_name = if(isnotnull('email_file_name'), 'email_file_name', 'file_name')
EVAL-file_path = if(isnotnull('email_file_path'), 'email_file_path', if(isnotnull('Filename'),'Filename','file_path'))
EVAL-object = if(match(EventCode,"5007|2014|2000|2002|1013|2011|1011|1009|1013|2010|2013|2020|2030|5000|5001|5004|5009|5010|5011|5012"), coalesce('New_Value','Old_Value','Path','Channel'), null())
EVAL-object_attrs = if(match(EventCode,"5007|2014|2000|2002|1013|2011|1011|1009|1013|2010|2013|2020|2030|5000|5001|5004|5009|5010|5011|5012"), 'description', null())
EVAL-object_path = if(match(EventCode,"5007|2014|2000|2002|1013|2011|1011|1009|1013|2010|2013|2020|2030|5000|5001|5004|5009|5010|5011|5012"), coalesce('New_Value','Old_Value','Path'), null())
EVAL-severity = case(Severity_Name=="Severe", "critical", Severity_Name=="High", "high", Severity_Name=="Medium", "medium", Severity_Name=="Low", "low", Severity_Name=="Information*", "informational", Level=="1", "critical", Level=="2", "medium", Level=="3", "low", Level=="4", "informational")
EVAL-severity_id = coalesce(case(Level=="1", "1", Level=="2", "2", Level=="3", "3", Level=="4", "4"),'Severity_ID')
EVAL-src = if(NOT match(EventCode,"1000|1001|1002|1003|1004|1005|1007|1008|1009|1010|1011|1012|1013|1014|1015|1117|1118|1119|1120|1127|1150|1151|2000|2001|2002|2003|2004|2005|2006|2007|2010|2011|2012|2013|2020|2021|2030|2031|2040|2041|2042|3002|3007|5000|5001|5004|5007|5008|5009|5010|5011|5012|5013|5100|5101|1006|1116"), 'Computer', null())
EVAL-src_host = if(NOT match(EventCode,"1000|1001|1002|1003|1004|1005|1007|1008|1009|1010|1011|1012|1013|1014|1015|1117|1118|1119|1120|1127|1150|1151|2000|2001|2002|2003|2004|2005|2006|2007|2010|2011|2012|2013|2020|2021|2030|2031|2040|2041|2042|3002|3007|5000|5001|5004|5007|5008|5009|5010|5011|5012|5013|5100|5101|1006|1116"), 'Computer', null())
EVAL-status = if(match(EventCode,"5007|2014|2000|2002|1013|2011|1011|1009|1013|2010|2013|2020|2030|5000|5001|5004|5009|5010|5011|5012"), if(match(Message, "error*"), "failure", "success"), null())
EVAL-type = if(match(EventCode,"1121|2050|2051|1150|2010|1002|1005|1008|1010|1012|1014|1118|1119|2001|2003|2006|2012|2021|2031|3002|5008"), "alert", null())
EVAL-vendor_product = "Microsoft Windows Defender"
EVAL-dvc = 'host'
EVAL-file_hash = 'Sha256'
EVAL-date = if(isnotnull('date'),'date',replace('SystemTime',"'",""))

