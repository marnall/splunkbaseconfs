EVAL-errorCode = coalesce(errorCode, if('responseElements.ConsoleLogin'=="Failure", "failure", "success"), "success")
EVAL-severity = case(match(eventName, "^(Get|List|Describe|Update)") AND NOT 'errorCode'=="Access Denied", "unknown")
EVAL-status = if(match(eventName, "^(List|Describe|Update)") AND NOT 'errorCode'=="Access Denied", if(coalesce(errorCode, if(responseElements.ConsoleLogin=="Failure", "failure", "success"), "success")=="success", "success", "failure"), null())
EVAL-subject = case((match(eventName, "^(Get|List|Describe|Update)") AND NOT 'errorCode'=="Access Denied"), 'eventName')
EVAL-type = case((match(eventName, "^(Get|List|Describe|Update)") AND NOT 'errorCode'=="Access Denied"), "event")
EVAL-user = case('eventName'=="PutBucketAcl", 'userIdentity.userName', eventName IN("CreateLoadBalancerListeners","CreateLoadBalancerPolicy","CreateLogGroup","CreateLogStream","GetBucketEncryption"), 'userIdentity.sessionContext.sessionIssuer.userName', 'eventName'=="CreateLoginProfile", 'responseElements.loginProfile.userName', 'eventName'=="CreateUser", 'responseElements.user.userName', eventName IN("DeleteUser", "DeleteLoginProfile"), 'requestParameters.userName', 'eventName'=="UpdateUser", 'requestParameters.newUserName', 'eventName'=="CreateAccessKey", coalesce('responseElements.accessKey.userName', mvindex(split(errorMessage, ".*resource\\s*:\\s*(?:user\\s*)?(.*)"), 1)), eventName IN ("ListSigningCertificates", "ListAccessKeys", "GetUser", "GetAccountSummary", "ListAccountAliases"), mvindex(split(errorMessage, ".*resource\\s*:\\s*(?:user\\s*)?(.*)"), 1), eventName IN ("CreateVirtualMFADevice", "CreateNetworkInterface", "DeleteNetworkInterface"), 'userIdentity.sessionContext.sessionIssuer.userName', 'eventName'=="AssumeRole" AND 'userIdentity.type'=="AssumedRole", mvindex(split(requestParameters.roleArn, "/"), -1), eventName IN("AssumeRole", "AssumeRoleWithSAML", "AssumeRoleWithWebIdentity"), mvindex(split('responseElements.assumedRoleUser.arn', "/"), -1), 'eventName'=="ConsoleLogin" AND 'userIdentity.type'=="AssumedRole" AND isnotnull('additionalEventData.LoginTo'), coalesce(mvindex(split('userIdentity.principalId', ":"), 1), 'userIdentity.userName'), 'eventType'=="AwsConsoleSignIn" OR eventName IN("ListAliases", "ListRoles"), coalesce('userIdentity.userNam', 'userIdentity.sessionContext.sessionIssuer.userName'), match(eventName, "Instances$|Volume$|Put|Bucket$"), coalesce('userIdentity.userName', 'userIdentity.sessionContext.sessionIssuer.userName'), 1==1, 'userIdentity.userName')
EVAL-user_agent = coalesce(userAgent,'userAgent{}')
EVAL-user_name = case(eventName="ListRoles",mvindex(split('userIdentity.principalId', ":"), 0), eventName="CreateLoginProfile", 'responseElements.loginProfile.userName', eventName="CreateUser",'responseElements.user.userName', (eventName="DeleteUser" OR eventName="DeleteLoginProfile"),'requestParameters.userName', eventName="UpdateUser",'requestParameters.newUserName', (eventName="ListSigningCertificates" OR eventName="ListAccessKeys" OR eventName="GetUser" OR eventName="GetAccountSummary" OR eventName="ListAccountAliases" OR eventName="ListSigningCertificates" OR eventName="CreateAccessKey"),replace(errorMessage, "resource\s*:\s*(?:user\s*)?(.*)","\1"), eventName="CreateVirtualMFADevice",'userIdentity.userName', true(),coalesce('userIdentity.userName','userIdentity.sessionContext.sessionIssuer.userName',if(isnull('userIdentity.arn'),mvindex(split(mvindex(split('requestParameters.roleArn',":"), -1), "/"), -1), mvindex(split(mvindex(split('userIdentity.arn',":"), -1), "/"), -1))))
EVAL-user_role = if(eventName="AssumeRole" OR eventName="AssumeRoleWithSAML" OR eventName="AssumeRoleWithWebIdentity", case('userIdentity.type'="AssumedRole", 'requestParameters.roleArn', 'userIdentity.type'!="AWSService", 'responseElements.assumedRoleUser.arn', 'userIdentity.type'="AWSService", null()), null())
EVAL-user_type = case((eventName="CreateLoginProfile" OR like(eventName, "%User") OR eventName="ListSigningCertificates" OR eventName="CreateAccessKey" OR eventName="ListAccessKeys" OR eventName="CreateVirtualMFADevice" OR eventName="GetAccountSummary" OR eventName="ListAccountAliases"), null(), (eventName="ConsoleLogin" AND 'userIdentity.type'="AssumedRole" AND isnull('additionalEventData.LoginTo')), 'userIdentity.sessionContext.sessionIssuer.type', eventType="AwsConsoleSignIn" , 'userIdentity.type', like(eventName, "%Instances") OR like(eventName, "%Volume") OR like(eventName,"Put%") OR like(eventName,"%Bucket"), 'userIdentity.type', eventName IN("ListAliases", "ListRoles", "DeleteNetworkInterface"),'userIdentity.sessionContext.sessionIssuer.type', like(eventName, "AssumeRole%"),mvjoin(coalesce('resources{}.type',mvindex(split('responseElements.assumedRoleUser.arn', "/"), 1)), ","), true(),'userIdentity.type')
EVAL-vendor_account = coalesce('userIdentity.accountId', 'recipientAccountId')
EVAL-vendor_command = 'eventName'
EVAL-vendor_product = "AWS Macie"

[ccx:aws:apigateway:accesslogs]
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1

EVAL-app = case("Request Details.errorType"!="-", "AWS:Amazon API Gateway")
EVAL-body = case("Request Details.errorType"!="-", 'Request Details.errorMessage')
