EVAL-src_type = case('Resources{}.ResourceRole'="ACTOR" OR 'ProductFields.aws/guardduty/service/resourceRole'="ACTOR",  \
            if(mvcount('Resources{}.Type') > 1, \
            mvappend(case('Resources{}.Type'="AwsEc2Instance", "instance"), case('Resources{}.Type'="AwsEc2Volume", "disk"), \
            case('Resources{}.Type'="AwsIamAccessKey" OR 'Resources{}.Type'="AwsIamUser", "user"), case('Resources{}.Type'="AwsEc2SecurityGroup", "firewall"), \
            case('Resources{}.Type'="AwsS3Bucket", "storage"), case('Resources{}.Type'="AwsIamRole", "role"), case('Resources{}.Type'="AwsEc2Eip", "public ip")), \
            if('Resources{}.Type'="AwsEc2Instance", "instance", if('Resources{}.Type'="AwsEc2Volume", "disk", if('Resources{}.Type'="AwsS3Bucket", "storage", \
            if('Resources{}.Type'="AwsEc2SecurityGroup", "firewall", if('Resources{}.Type'="AwsIamAccessKey" OR 'Resources{}.Type'="AwsIamUser", "user", \
            if('Resources{}.Type'="AwsIamRole", "role", if('Resources{}.Type'="AwsEc2Eip", "public ip", 'Resources{}.Type')))))))), \
            (NOT ("Resources{}.ResourceRole"="ACTOR" OR "ProductFields.aws/guardduty/service/resourceRole"="ACTOR")), null())
EVAL-type = case('Severity.Label'="INFORMATIONAL", "event", 'Severity.Label'="LOW", "warning", 'Severity.Label'="MEDIUM", "alert", 'Severity.Label'="HIGH", "alert", 'Severity.Label'="CRITICAL", "alarm")
EVAL-user = coalesce('Resources{}.Details.AwsIamUser.UserName', case('Resources{}.Type'="AwsIamUser", 'Resources{}.Details.AwsIamUser.UserId'), 'Resources{}.Details.AwsIamAccessKey.PrincipalName', account_user)
EVAL-user_name = coalesce('Resources{}.Details.AwsIamUser.UserName', case('Resources{}.Type'="AwsIamUser", 'Resources{}.Details.AwsIamUser.UserId'), 'Resources{}.Details.AwsIamAccessKey.PrincipalName', account_user)

[aws:asl]
##Combined##
FIELDALIAS-signature = finding_info.title AS signature

EVAL-user = case(class_name="Detection Finding",'cloud.account.uid',class_name="Vulnerability Finding",mvindex('unmapped{}.value',mvfind('unmapped{}.key', "AwsAccountName")))
EVAL-dest = case(class_name="Detection Finding",mvindex(mvsort('observables{}.value'),0),class_name="DNS Activity",'dest_endpoint.ip',class_name="Vulnerability Finding",spath('resource.data',"AwsEc2Instance{}.IpV4Addresses{}"))
EVAL-src = case(class_name="Detection Finding",'metadata.product.name',class_name="DNS Activity",'src_endpoint.ip')
EVAL-vendor_product = case(class_name="DNS Activity","Amazon Security Lake",class_name="Vulnerability Finding","Amazon ".'metadata.product.name') 
EVAL-severity=lower(severity) 

##alert##
FIELDALIAS-description = finding_info.desc AS description
FIELDALIAS-app = metadata.product.name AS app
FIELDALIAS-id = finding_info.uid AS id

EVAL-type="alert"

##dns##
FIELDALIAS-reply_code_id = rcode_id AS reply_code_id
FIELDALIAS-query_type = query.type AS query_type 
FIELDALIAS-answer = answers{}.rdata AS answer
FIELDALIAS-src_ip = src_endpoint.ip AS src_ip
FIELDALIAS-src_port = src_endpoint.port AS src_port
FIELDALIAS-dest_ip = dest_endpoint.ip AS dest_ip
FIELDALIAS-dest_port = dest_endpoint.port AS dest_port
FIELDALIAS-query = query.hostname AS query

EVAL-reply_code = case(rcode="NoError","No Error",rcode="FormErr","Format Error",rcode="ServFail","Server Failure",rcode="NXDomain","Non-Existent Domain",true(),rode)
EVAL-answer_count = mvcount('answers{}.rdata')
EVAL-record_type = mvdedup('answers{}.type')

##vulnerability##
FIELDALIAS-cve = vulnerabilities{}.cve.uid AS cve
FIELDALIAS-category = vulnerabilities{}.affected_packages{}.name AS category

EVAL-cvss = mvdedup('vulnerabilities{}.cve.cvss{}.base_score')
EVAL-url = mvindex('vulnerabilities{}.references{}',0)
EVAL-dvc = spath('resource.data',"AwsEc2Instance{}.KeyName")


[aws:securityhub:finding]

FIELDALIAS-vulnerabilitesID_as_cve = Vulnerabilities{}.Id AS cve
FIELDALIAS-inspectorScore_as_cvss = ProductFields.aws/inspector/inspectorScore AS cvss
FIELDALIAS-ccx-securityhub-vendor_account = AwsAccountId AS vendor_account
FIELDALIAS-ccx-securityhub-vendor_region =  Resources{}.Region AS vendor_region
FIELDALIAS-ccx-securityhub-severity_id = Severity.Normalized AS severity_id
FIELDALIAS-ccx-securityhub-signature = Title AS signature
FIELDALIAS-ccx-securityhub-url = Vulnerabilities{}.Vendor.Url AS url
FIELDALIAS-ccx-securityhub-vendor_product = GeneratorId AS vendor_product
FIELDALIAS-ccx-securityhub-category = Types{} AS category

EVAL-dvc = case(isnotnull(dvc) AND dvc!="" AND dvc!="null", dvc, isnotnull(Id) AND Id!="" AND Id!="null", replace(Id,"(?:.*)\/(.*)","\1"))