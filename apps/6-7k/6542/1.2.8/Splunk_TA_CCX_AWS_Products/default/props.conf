##AWS Network Firewall##
[ccx:aws:networkfirewall]
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
KV_MODE = json
category = Structured
description = CCX AWS Network Firewall
disabled = false

FIELDALIAS-ccx_aws_network_firewall_app = "event.app_proto" AS app
FIELDALIAS-ccx_aws_network_firewall_bytes  = "event.netflow.bytes" AS bytes
FIELDALIAS-ccx_aws_network_firewall_dest = "event.dest_ip" AS dest
FIELDALIAS-ccx_aws_network_firewall_dest_ip  = "event.dest_ip" AS dest_ip
FIELDALIAS-ccx_aws_network_firewall_dest_port  = "event.dest_port" AS dest_port
FIELDALIAS-ccx_aws_network_firewall_firewall_name_dvc = firewall_name AS dvc
FIELDALIAS-ccx_aws_network_firewall_packets  = "event.netflow.pkts" AS packets
FIELDALIAS-ccx_aws_network_firewall_session_id = "event.flow_id" AS session_id
FIELDALIAS-ccx_aws_network_firewall_src  = "event.src_ip" AS src
FIELDALIAS-ccx_aws_network_firewall_src_ip = "event.src_ip" AS src_ip
FIELDALIAS-ccx_aws_network_firewall_src_port = "event.src_port" AS src_port
FIELDALIAS-ccx_aws_network_firewall_transport  = "event.proto" AS transport

EVAL-action  = if(isnotnull('action'),'action',"unknown")
EVAL-tcp_flag  = mvappend(case('event.tcp.ack'=="true","ACK"),case('event.tcp.fin'=="true","FIN"),case('event.tcp.psh'=="true","PSH"),case('event.tcp.syn'=="true","SYN"),case('event.tcp.rst'=="true","RST"),case('event.tcp.urg'=="true","URG"))
EVAL-transport = lower('transport')
EVAL-vendor_product = "AWS Network Firewall"

##AWS Web Application Firewall##
[ccx:aws:waf]
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
KV_MODE = JSON
category = Structured
description = CCX AWS Web Application Firewall
disabled = false
TIME_PREFIX = "timestamp":
BREAK_ONLY_BEFORE_DATE = true

REPORT-ccx_aws_waf_extraction = ccx_aws_waf_extraction
REPORT-ccx_aws_waf_x_dhost = ccx_aws_waf_x_dhost

FIELDALIAS-ccx_aws_waf_http_method = "httpRequest.httpMethod" AS http_method
FIELDALIAS-ccx_aws_waf_src = "httpRequest.clientIp" AS src
FIELDALIAS-ccx_aws_waf_src_ip  = "httpRequest.clientIp" AS src_ip
FIELDALIAS-ccx_aws_waf_uri_path  = "httpRequest.uri" AS uri_path
FIELDALIAS-ccx_aws_waf_vendor_action = action AS vendor_action

EVAL-action  = case(vendor_action=="ALLOW","allowed",vendor_action=="BLOCK","blocked",1=1,lower('vendor_action'))
EVAL-http_user_agent_length = len(coalesce('user_agent', 'user-agent', 'User-Agent', 'User-agent'))
EVAL-uri_query = if('httpRequest.args'=="", null(), 'httpRequest.args')
EVAL-uri_path  = if(uri_path="/",null(),'uri_path')
EVAL-vendor_product  = "AWS:Web Application Firewall"
EVAL-http_user_agent = coalesce('user_agent', 'user-agent', 'User-Agent', 'User-agent')
EVAL-url = if(like(coalesce('referer', 'Referer', 'x_dhost' + 'httpRequest.uri'), "$%") OR like(coalesce('referer', 'Referer', 'x_dhost' + 'httpRequest.uri'), "0%"), null(), coalesce('referer', 'Referer', 'x_dhost' + 'httpRequest.uri'))
EVAL-http_content_type = coalesce(replace('content-type', "([^\;]+)\;.+", "\1"), replace('Content-Type', "([^\;]+)\;.+", "\1"))
EVAL-cookie  = coalesce(split('cookie', ";"), split('Cookie', ";"))
EVAL-dest_ip = if(match('x_dhost', "^((?:\d{1,3}\.){3}\d{1,3})$"), 'x_dhost', null())
EVAL-dest_host = if(match('x_dhost', "^((?:\d{1,3}\.){3}\d{1,3})$"), null(), 'x_dhost')
EVAL-url_length  = len(if(like(coalesce('referer', 'Referer', 'x_dhost' + 'httpRequest.uri'), "$%") OR like(coalesce('referer', 'Referer', 'x_dhost' + 'httpRequest.uri'), "0%"), null(), coalesce('referer', 'Referer', 'x_dhost' + 'httpRequest.uri')))
EVAL-dest  = if(match('x_dhost', "^((?:\d{1,3}\.){3}\d{1,3})$"), 'x_dhost', null())
EVAL-cached  = if(isnotnull(coalesce('cache-control', 'Cache-Control')), "true", "false")
EVAL-url_domain  = if(like(coalesce('referer', 'Referer', 'x_dhost' + 'httpRequest.uri'), "$%") OR like(coalesce('referer', 'Referer', 'x_dhost' + 'httpRequest.uri'), "0%"), null(), coalesce(replace('referer', "https?\:\/\/([^\/:]+).+", "\1"), replace('Referer', "https?\:\/\/([^\/:]+).+", "\1"), 'x_dhost'))

##AWS S3 VPC Flow Logs - dependencies on Splunk_TA_aws lookups and transforms.conf##
[ccx:aws:s3:vpcflow]
REPORT-ccx_aws_s3_vpcflow_default = report-vpcflowlogs-default
REPORT-ccx_aws_s3_vpcflow_custom = report-vpcflowlogs-custom
REPORT-ccx_aws_s3_vpcflow_select_all = report-vpcflowlogs-select-all
REPORT-ccx_aws_s3_vpcflow_extract_region = extract-region

FIELDALIAS-ccx_aws_s3_vpcflow_aws_account_id = account_id as aws_account_id
FIELDALIAS-ccx_aws_s3_vpcflow_user_id = account_id as user_id
FIELDALIAS-ccx_aws_s3_vpcflow_dest = dest_ip as dest
FIELDALIAS-ccx_aws_s3_vpcflow_dvc = interface_id as dvc
FIELDALIAS-ccx_aws_s3_vpcflow_src = src_ip as src
FIELDALIAS-ccx_aws_s3_vpcflow_vendor_account = account_id as vendor_account

EVAL-app = "AWS VPC Flow Logs"
EVAL-bytes = if(bytes!="-", bytes, "unknown")
EVAL-dest = if(dest!="-", dest, "unknown")
EVAL-dest_ip = if(dest_ip!="-", dest_ip, "unknown")
EVAL-dest_port = if(dest_port!="-", dest_port, "unknown")
EVAL-duration=end_time-start_time
EVAL-packets = if(packets!="-", packets, "unknown")
EVAL-protocol_code = if(protocol_code!="-", protocol_code, "unknown")
EVAL-protocol_version = case(match(dest_ip,"((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)"),"IPV4",dest_ip="-" OR dest_ip="unknown", "unknown", match(dest_ip,"(([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:))"),"IPV6")
EVAL-src = if(src!="-", src, "unknown")
EVAL-src_port = if(src_port!="-", src_port, "unknown")
EVAL-src_ip = if(src_ip!="-", src_ip, "unknown")
EVAL-vendor_product = "AWS S3 VPC Flow Logs"
EVAL-vpcflow_action = if(vpcflow_action!="-", vpcflow_action, "unknown")

LOOKUP-ccx_aws_s3_vpcflow_action          = vpcflow_action_lookup vpcflow_action OUTPUT action
LOOKUP-ccx_aws_s3_vpcflow_proto_transport = protocol_code_transport_lookup protocol_code OUTPUT protocol transport protocol_full_name

[aws:cloudtrail]
TRANSFORMS-ccx_aws_macie = set_ccx_aws_macie

[ccx:aws:macie]
MAX_TIMESTAMP_LOOKAHEAD = 28
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%Z
TIME_PREFIX = \"eventTime\"\s*\:\s*\"
TRUNCATE = 8388608
category = Custom
disabled = false
pulldown_type = 1
KV_MODE = json
LINE_BREAKER = ([\r\n]+)

FIELDALIAS-awsRegion-for-aws-macie_region = awsRegion AS region
FIELDALIAS-awsRegion-for-aws-macie_vendor_region = awsRegion AS vendor_region
FIELDALIAS-errorCode-for-aws-macie-result_id = errorCode AS result_id
FIELDALIAS-errorMessage-for-aws-macie-reason = errorMessage AS reason
FIELDALIAS-errorMessage-for-aws-macie-result = errorMessage AS result
FIELDALIAS-eventName-for-aws-macie_signature = eventName AS signature
FIELDALIAS-eventSource-for-aws-macie-dvc = eventSource AS dvc
FIELDALIAS-eventTime-for-aws-macie = eventTime AS start_time
FIELDALIAS-eventType-for-aws-macie-app = eventType AS app
FIELDALIAS-sourceIPAddress-for-aws-macie-src = sourceIPAddress AS src
FIELDALIAS-sourceIPAddress-for-aws-macie-src_ip = sourceIPAddress AS src_ip

EVAL-action = case(match(eventName, "^(List|Describe)") AND NOT ('errorCode'=="AccessDenied"), "read", match(eventName, "^Update") AND NOT ('errorCode'=="AccessDenied"), "updated")
EVAL-body = if(match(eventName, "^(Get|List|Describe|Update)"),eventName . ":" . coalesce(errorCode, if(responseElements.ConsoleLogin=="Failure", "failure", "success"), "success")." - User: ".'userIdentity.sessionContext.sessionIssuer.userName'." Source IP: ".sourceIPAddress, null())
EVAL-change_type = case(match(eventName, "^(Update)") AND NOT 'errorCode'=="AccessDenied", "file")
EVAL-description = if(match(eventName, "^(Get|List|Describe|Update)"),eventName . ":" . coalesce(errorCode, if(responseElements.ConsoleLogin=="Failure", "failure", "success"), "success")." - User: ".'userIdentity.sessionContext.sessionIssuer.userName'." Source IP: ".sourceIPAddress, null())
