
[ccx_aws_networkfirewall]
search = (sourcetype="ccx:aws:networkfirewall")
# tags = network communicate

[ccx_aws_waf_web_traffic]
search = (sourcetype="ccx:aws:waf")
# tags = web

[ccx_aws_s3_vpcflow_traffic]
search = (sourcetype=ccx:aws:s3:vpcflow) AND (dest!="unknown" AND action!="unknown" AND app!="unknown" AND protocol!="unknown" AND src!="unknown")
# tags = cloud communicate network

[ccx_aws_macie_alert]
search = (sourcetype="ccx:aws:macie") ((eventName="Get*") OR (eventName IN ("List*", "Describe*", "Update*") AND errorCode="AccessDenied"))
# tags = alert

[ccx_aws_macie_change]
search = (sourcetype="ccx:aws:macie") (eventName IN ("Update*") AND NOT errorCode="AccessDenied")
# tags = change

[ccx_aws_macie_read_logs]
search = (sourcetype="ccx:aws:macie") (eventName IN ("List*", "Describe*") AND NOT errorCode="AccessDenied")

[ccx_aws_alb_accesslogs]
search = (sourcetype="ccx:aws:alb:accesslogs")

[ccx_aws_apigateway_alert]
search = (sourcetype="ccx:aws:apigateway:accesslogs") "Request Details.errorType"!="-"
# tags = alert

[ccx_aws_apigateway_events]
search = (sourcetype="ccx:aws:apigateway:accesslogs") "Request Details.errorType"="-"

## eventtype for AWS Security Hub ##
## replication from aws:securityhub:finding from release 7.10.0 - CCX enhancements to the code applied 06/08/2025 ##
[ccx_securityhub_events]
search = (sourcetype="aws:securityhub:custom")
# tags = alert

[ccx_aws_security_lake_alert]
search = (sourcetype="aws:asl") class_name="Detection Finding"
# tags = alert

[ccx_aws_security_lake_dns]
search = (sourcetype="aws:asl") class_name="DNS Activity"
# tags = dns network resolution

[ccx_aws_security_lake_vulnerability]
search = (sourcetype="aws:asl") class_name="Vulnerability Finding"
# tags = vulnerability report

[ccx_securityhub_events_finding_vulnerability]
search = (sourcetype="aws:securityhub:finding") Vulnerabilities{}.Id=*
# tags = vulnerbility report
