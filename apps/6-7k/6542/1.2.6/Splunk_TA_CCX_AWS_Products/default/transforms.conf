[ccx_aws_waf_extraction]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \"name\"\:\"([^\"]+)\"\,\"value\"\:\"([^\"]+)\"

[ccx_aws_waf_x_dhost]
CLEAN_KEYS = 0
REGEX = \"name\"\:\"(?:H|h)ost\"\,\"value\"\:\"(?<x_dhost>[^\"]+)\"

[set_ccx_aws_macie]
REGEX = "eventSource"\:\s*"macie(?:\d+)?\.amazonaws\.com"
FORMAT = sourcetype::ccx:aws:macie
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

## regex for AWS Security Hub ##
## replication from aws:securityhub:finding from release 7.10.0 - CCX enhancements to the code applied 06/08/2025 ##
[ccx-securityhub-dest-instance-extract]
SOURCE_KEY = Resources{}.Id
REGEX = \S*\:\d+:instance\/(?<instance_extract>[\w\d-]+)

[ccx-securityhub-dest-iam_accesskey-extract]
SOURCE_KEY = Resources{}.Id
REGEX = \S*\:\:AccessKey\:(?<accesskey_extract>[\w\d-]+)

[ccx-securityhub-dest-s3-extract]
SOURCE_KEY = Resources{}.Id
REGEX = \S*\w+:\w+:s3:::(?<s3bucket_extract>[\w\d-]+)

[ccx-securityhub-dest-managed-instance-extract]
SOURCE_KEY = Resources{}.Id
REGEX = \S*\:\:ManagedInstanceInventory\/(?<managed_instance_extract>[\w\d-]+)

[ccx-securityhub-dest-volume-extract]
SOURCE_KEY = Resources{}.Id
REGEX = \S*\:\d+:volume\/(?<volume_extract>[\w\d-]+)

[ccx-securityhub-dest-security-group-extract]
SOURCE_KEY = Resources{}.Id
REGEX = \S*\:\d+:security-group\/(?<security_group_extract>[\w\d-]+)

[ccx-securityhub-dest-vpc-extract]
SOURCE_KEY = Resources{}.Id
REGEX = \S*\:\d+:vpc\/(?<vpc_extract>[\w\d-]+)

[ccx_securityhub_account_user_report]
REGEX = \\\"(?<account_user>[^\\\"]*)\\\" account.*

[ccx_securityhub_dest_iam_user_report]
SOURCE_KEY = Resources{}.Id
REGEX = \:\d+:user\/(?<user_extract>[\w\d-]+)
