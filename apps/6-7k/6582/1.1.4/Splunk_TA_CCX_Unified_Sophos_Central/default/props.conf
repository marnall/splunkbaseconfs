############CCX Sophos Central##########################################################

##Mod sourcetypes CCX Unified Add-On for Sophos Central##

[sophos_alerts]
TRANSFORMS-ccx_sophos_central_alerts = set_sophos_alerts

[sophos_events]
TRANSFORMS-ccx_sophos_central_events = set_sophos_events

[sophos_tenants]
TRANSFORMS-ccx_sophos_central_tenants = set_sophos_tenants

[sophos_endpoints]
TRANSFORMS-ccx_sophos_central_endpoints = set_sophos_endpoints


[sophos:central:events]
DATETIME_CONFIG =
KV_MODE = json
LINE_BREAKER = ([\r\n]+){\n*\s*("|")
TIME_PREFIX = rt": "
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%QZ
MAX_TIMESTAMP_LOOKAHEAD = 24
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1

REPORT-event_vendor_action = event_vendor_action

FIELDALIAS-dest_name = dhost AS dest_name
FIELDALIAS-file_path = filePath AS file_path
FIELDALIAS-signature = detection_identity_name AS signature

EVAL-action = case(like('name', "%clear%"), "cleared", group=="POLICY" AND NOT like('name', "Policy%"), case(like('name', "%enable%") OR like('name', "%disable%"), "modified", like('name', "%create%"), "created", like('name', "%delete%"), "deleted", like('name', "%cleared%"), "cleared", like('name', "%read%"), "read", like('name', "%stop%"), "stopped", like('name', "%start%"), "started", like('name', "%restart%"), "restarted"))
EVAL-app = if(group=="PERIPHERALS" OR group=="APPLICATION_CONTROL", "Sophos", 'app')
EVAL-body = if(group=="PERIPHERALS", 'name', 'body')
EVAL-category = if(group=="RUNTIME_DETECTIONS", 'group', 'category')
EVAL-change_type = if(group="POLICY" AND (like(name, "%User%") OR like(name, "%user%") OR like(name, "%Computer%") OR like(name, "%computer%")), "AAA", if(group="POLICY" AND (NOT (like(name, "%User%") OR like(name, "%user%") OR like(name, "%Computer%") OR like(name, "%computer%") OR like(name, "Policy%") OR like(name, "Real time protection%"))), "filesystem", if(like(name, "Real time protection%"), "policy", if((like(type, "%Dismissed%") OR like(type, "%HomeCookiesDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomeThreatRemnantsDeleted%") OR like(type, "%HmpaCookiesDeleted%")), "filesystem", null()))))
EVAL-description = if(group=="PERIPHERALS", 'name', 'description')
EVAL-dest = if(NOT group IN("RUNTIME_DETECTIONS","WEB"), 'source_info.ip',null())
EVAL-dest_ip = if(NOT group IN("RUNTIME_DETECTIONS","WEB"), 'source_info.ip',null())
EVAL-file_name = replace(filePath, ".*[\/\\\](\w+\.\w{1,4}$)", "\1")
EVAL-ids_type = if(group=="RUNTIME_DETECTIONS", "application", 'ids_type')
EVAL-dvc = if(((group="POLICY" OR (like(type, "%Dismissed%") OR like(type, "%HomeCookiesDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomeThreatRemnantsDeleted%") OR like(type, "%HmpaCookiesDeleted%"))) AND NOT like(name, "Policy%")), 'dhost', null())
EVAL-object = if(((group="POLICY" OR (like(type, "%Dismissed%") OR like(type, "%HomeCookiesDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomeThreatRemnantsDeleted%") OR like(type, "%HmpaCookiesDeleted%"))) AND NOT like(name, "Policy%")), 'dhost', null())
EVAL-object_attrs = if(((group="POLICY" OR (like(type, "%Dismissed%") OR like(type, "%HomeCookiesDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomeThreatRemnantsDeleted%") OR like(type, "%HmpaCookiesDeleted%"))) AND NOT like(name, "Policy%")), 'name', null())
EVAL-object_category = if(((group="POLICY" OR (like(type, "%Dismissed%") OR like(type, "%HomeCookiesDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomeThreatRemnantsDeleted%") OR like(type, "%HmpaCookiesDeleted%"))) AND (NOT (like(name, "Policy%") OR like(name, "Real time protection%")))), "file", if((group="POLICY" AND (like(name, "%User%") OR like(name, "%user%") OR like(name, "%Computer%") OR like(name, "%computer%"))), "user", if(like(name, "Real time protection%"),"protection", null())))
EVAL-signature = if(group=="PERIPHERALS" OR group=="RUNTIME_DETECTIONS", 'name', 'signature')
EVAL-src = if(group=="RUNTIME_DETECTIONS" OR group=="WEB" OR group=="MALWARE", 'source_info.ip', null())
EVAL-src_ip = if(group=="RUNTIME_DETECTIONS" OR group=="WEB" OR group=="MALWARE", 'source_info.ip', null())
EVAL-src_name = case(group=="POLICY" AND NOT like('name', "Policy%"), "Sophos Central", group=="RUNTIME_DETECTIONS", 'dhost')
EVAL-status = if((group=="POLICY" OR (like(type, "%Dismissed%") OR like(type, "%HomeCookiesDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomeThreatRemnantsDeleted%") OR like(type, "%HmpaCookiesDeleted%"))) AND like(name, "%fail%"), "failure", if((group=="POLICY" OR (like(type, "%Dismissed%") OR like(type, "%HomeCookiesDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomePuaRemnantsDeleted%") OR like(type, "%HomeThreatRemnantsDeleted%") OR like(type, "%HmpaCookiesDeleted%"))) AND NOT like(name, "%fail%"),"success", null()))
EVAL-type = if(group=="PERIPHERALS" OR group=="APPLICATION_CONTROL" OR group=="POLICY", 'datastream', 'type')
EVAL-url = if(group=="WEB", replace('name', "(?:[^\']+)?\'(?<url>https?[^\']+)\'(?:[^\']+)?", "\1"), 'url')
EVAL-user = if(isnotnull(suser) AND suser=="n/a", null(), 'suser')
EVAL-vendor_account = 'customer_id'
EVAL-vendor_product = if(isnotnull(group), "Sophos Central:Endpoint:"+'group', "Sophos Central:Endpoint")

LOOKUP-sophos_central_vendor_actions = sophos_central_vendor_actions vendor_action OUTPUTNEW action

[ccx:sophos:central:alerts]
SHOULD_LINEMERGE = 0
pulldown_type = 1
TIME_PREFIX = "raisedAt":

FIELDALIAS-type = type AS signature
FIELDALIAS-vendor_alert_type = type AS eventType

EVAL-body = 'description'
EVAL-subject = 'category'
EVAL-type = case(match('eventType',"^.*OutOfDate|.*NotProtected"), "alarm", 1==1, "alert")
EVAL-vendor_product = "Sophos Central:Endpoint"
EVAL-app = "Sophos Central:Endpoint"

[ccx:sophos:central:events]
SHOULD_LINEMERGE = 0
pulldown_type = 1
TIME_PREFIX = "created_at|when|rt":

REPORT-ccx_sophos_central_malware_file = ccx_sophos_central_malware_file
REPORT-event_vendor_action = event_vendor_action

FIELDALIAS-sophos_events_parent_process_id = "amsi_threat_data.parentProcessId" ASNEW parent_process_id
FIELDALIAS-sophos_events_parent_process_path = "amsi_threat_data.parentProcessPath" ASNEW parent_process_path
FIELDALIAS-sophos_events_process_id = "amsi_threat_data.processId" ASNEW process_id
FIELDALIAS-sophos_events_process_name = "amsi_threat_data.processName" ASNEW process_name
FIELDALIAS-sophos_events_process_path = "amsi_threat_data.processPath" ASNEW process_path
FIELDALIAS-sophos_events_date = "created_at" ASNEW date
FIELDALIAS-sophos_events_src = "source_info.ip" ASNEW src 
FIELDALIAS-sophos_events_signature = "threat" ASNEW signature
FIELDALIAS-sophos_events_user = "user_id" ASNEW user
FIELDALIAS-sophos_events_src_user = "user_id" ASNEW src_user
FIELDALIAS-ccx_sophos_events_vendor_type = type AS eventType

EVAL-category = 'group'
EVAL-app = "Sophos"
EVAL-body = 'name'
EVAL-description = 'name'
EVAL-dest = case(group=="MALWARE" OR group=="PUA" OR eventType IN("Event::Endpoint::Threat::*","Event::Endpoint::HmpaApplicationHijacking","Event::Endpoint::HmpaBehaviourPrevented","Event::Endpoint::HmpaCryptoGuard*","Event::Endpoint::HmpaMalware*","Event::Endpoint::HmpaPua*","Event::Endpoint::Core*") AND NOT eventType IN("*::Threat::*Dismissed*","Event::Endpoint::*CleanNothingFound"), 'location', 1==1, 'dest')
EVAL-signature = case(group=="MALWARE" OR group=="PUA" OR eventType IN("Event::Endpoint::Threat::*","Event::Endpoint::HmpaApplicationHijacking","Event::Endpoint::HmpaBehaviourPrevented","Event::Endpoint::HmpaCryptoGuard*","Event::Endpoint::HmpaMalware*","Event::Endpoint::HmpaPua*","Event::Endpoint::Core*") AND NOT eventType IN("*::Threat::*Dismissed*","Event::Endpoint::*CleanNothingFound"), 'signature', 1==1, 'group')
EVAL-src = 'source_info.ip'
EVAL-src_ip = 'source_info.ip'
EVAL-type = case(match('eventType',"^.*OutOfDate|.*NotProtected|.*ServiceNotRunning"), "alarm", 1==1, "alert")
EVAL-vendor_product = "Sophos Central:Endpoint"
EVAL-file_path = if('core_remedy_items.items{}.type'="file",'core_remedy_items.items{}.descriptor', 'x_file_path')
EVAL-file_name = if('core_remedy_items.items{}.type'="file",replace('core_remedy_items.items{}.descriptor',".*[/\\\](?<file_name>.*.\w{1,4}$)", "\1"), 'x_file_name')
EVAL-file_hash = 'appSha256'

LOOKUP-sophos_central_vendor_actions = sophos_central_vendor_actions vendor_action OUTPUTNEW action

[ccx:sophos:central:tenants]
SHOULD_LINEMERGE = 0
pulldown_type = 1

[ccx:sophos:central:endpoints]
SHOULD_LINEMERGE = 0
pulldown_type = 1

FIELDALIAS-ccx_sophos_endpoints_vendor_type = type AS eventType

EVAL-description = 'health.services.serviceDetails{}.name'
EVAL-body = if(isnotnull('body'),'body','health.services.serviceDetails{}.name')
EVAL-app = "Sophos"
EVAL-family = 'os.platform'
EVAL-os = 'os.name'
EVAL-service = 'health.services.serviceDetails{}.name'
EVAL-service_name = 'health.services.serviceDetails{}.name'
EVAL-dest = 'ipv4Addresses{}'
EVAL-dest_ip = 'ipv4Addresses{}'
EVAL-mac = 'macAddresses{}'
EVAL-status = case('health.services.serviceDetails{}.status'=="running", "started", 'health.services.serviceDetails{}.status'!="running", "warning")
EVAL-user = 'associatedPerson.viaLogin'
EVAL-vendor_product = "Sophos Central:Endpoint"
EVAL-signature = if('health.threats.status'!="good","SophosServiceHealthStatusIssues",null())
EVAL-subject = if(isnotnull('group.name') AND 'health.threats.status'!="good",""+tostring('group.name')." - SophosServiceHealthStatusIssues"."",null())
EVAL-type =  if('health.threats.status'!="good","alert",'eventType')

