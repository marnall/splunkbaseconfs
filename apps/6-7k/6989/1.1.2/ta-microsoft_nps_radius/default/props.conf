[microsoft:nps:radius]
TIME_PREFIX = "IAS",
TIME_FORMAT = %m/%d/%Y,%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
REPORT-microsoft_nps_radius_fields = microsoft_nps_radius_fields
LOOKUP-authentication_type = authentication_type_lookup authentication_type OUTPUTNEW app
LOOKUP-packet_type = packet_type_lookup packet_type OUTPUTNEW packet_type_name
LOOKUP-provider_name = provider_name_lookup provider_name OUTPUTNEW provider_name_description
LOOKUP-provider_type = provider_type_lookup provider_type OUTPUTNEW provider_type_description
LOOKUP-reason_code = reason_code_lookup signature_id OUTPUTNEW signature
LOOKUP-action_code = action_code_lookup signature_id OUTPUTNEW action
FIELDALIAS-CIM = client_ip_address AS src username AS user servicename AS authentication_service
