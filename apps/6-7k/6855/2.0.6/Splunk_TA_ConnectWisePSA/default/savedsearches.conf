[Generate - Cache - Companies]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */5 * * * *
disabled = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = `connectwise_index` sourcetype="cw:company"\
| eval\
    active = if(\
        deletedFlag=="true",\
        0,\
        1\
    )\
| stats\
    latest(name) as name,\
    latest(active) as active\
        by id\
| rename\
    id as _key\
| outputlookup append=t companies

