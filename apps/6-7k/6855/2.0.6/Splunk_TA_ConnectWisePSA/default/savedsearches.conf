[Generate - Cache - Agreements]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */5 * * * *
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 1
search = `connectwise_index` sourcetype="cw:agreement"\
| stats\
    latest(name) AS name,\
    latest(applicationLimit) as applicationLimit,\
    latest(cDefaultAgreement) as cDefaultAgreement,\
    latest(companyId) AS companyId,\
    latest(contactId) AS contactId,\
    latest(typeId) AS typeId,\
    latest(siteId) AS siteId,\
    latest(startDate) AS startDate,\
    latest(endDate) AS endDate,\
    latest(slaId) AS slaId\
        BY id\
| lookup agreements _key AS id OUTPUT active\
| fillnull value=1 active\
| fillnull value=0 cDefaultAgreement\
| rename\
    id AS _key\
| outputlookup append=t agreements

