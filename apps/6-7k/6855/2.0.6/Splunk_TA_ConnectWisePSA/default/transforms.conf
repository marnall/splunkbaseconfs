[agreements]
collection = connectwise_agreements
external_type = kvstore
fields_list = _key, active, name, applicationLimit, cDefaultAgreement, companyId, contactId, typeId, siteId, startDate, endDate, slaId

[chargecodes]
collection = connectwise_chargecodes
external_type = kvstore
fields_list = _key, active, name, billTime

[checkpoints]
collection = connectwise_checkpoints
external_type = kvstore
fields_list = _key, checkpoint, lastId

[companies]
collection = connectwise_companies
external_type = kvstore
fields_list = _key, active, name

[contacts]
collection = connectwise_contacts
external_type = kvstore
fields_list = _key, active, companyId, firstName, lastName, linkedInUrl, title

[departments]
collection = connectwise_department
external_type = kvstore
fields_list = _key, active, name, identifier

[member_types]
collection = connectwise_member_types
external_type = kvstore
fields_list = _key, active, name, inactiveFlag

[members]
collection = connectwise_members
external_type = kvstore
fields_list = _key, active, identifier, firstName, lastName, workRoleId, defaultDepartmentId, primaryEmail, reportsToId, includeInUtilizationReportingFlag, inactiveFlag, timeZoneId, typeId, dailyCapacity, billableForecast

[primary_holidays]
collection = connectwise_primary_holidays
external_type = kvstore
fields_list = _key, active, date, name

[project_statuses]
collection = connectwise_project_statuses
external_type = kvstore
fields_list = _key, active, name, inactiveFlag, noTimeFlag, closedFlag

[project_tickets]
collection = connectwise_project_tickets
external_type = kvstore
fields_list = _key, active, boardId, projectId, summary

[project_types]
collection = connectwise_project_types
external_type = kvstore
fields_list = _key, active, name

[projects]
collection = connectwise_projects
external_type = kvstore
fields_list = _key, active, companyId, departmentId, managerId, name, typeId, statusId, billingAmount, billingMethod, estimatedHours, estimatedStart, estimatedEnd

[sales_activities]
collection = connectwise_sales_activities
external_type = kvstore
fields_list = _key, active, assignToId, assignedById, name, statusId, whereId

[schedule_entries]
collection = connectwise_schedule_entries
external_type = kvstore
fields_list = _key, active, objectId, name, whereId, memberId, dateStart, dateEnd, reminderId, statusId, typeId, spanId, doneFlag, acknowledgedFlag, ownerFlag, meetingFlag, closeDate, hours

[schedule_types]
collection = connectwise_schedule_types
external_type = kvstore
fields_list = _key, active, name, identifier, systemFlag

[service_boards]
collection = connectwise_service_boards
external_type = kvstore
fields_list = _key, active, name, departmentId, projectFlag

[service_priorities]
collection = connectwise_service_priorities
external_type = kvstore
fields_list = _key, active, defaultFlag, name

[service_tickets]
collection = connectwise_service_tickets
external_type = kvstore
fields_list = _key, active, boardId, budgetHours, companyId, dateEntered, dateResolved, isInSla, priorityId, resolveMinutes, respondMinutes, respondedHours, statusId, summary

[timeentries]
collection = connectwise_timeentries
external_type = kvstore
fields_list = _key, active, actualHours, agreementAmount, agreementHours, agreementId, billableOption, chargeToId, chargeToType, companyId, cJIRAStory, dateEntered, enteredBy, hourlyRate, hoursBilled, hoursDeduct, invoiceHours, lastUpdated, locationId, memberId, phaseId, projectId, status, ticketId, timeEnd, timeSheetId, timeStart, updatedBy, workRoleId, workTypeId

[timesheets]
collection = connectwise_timesheets
external_type = kvstore
fields_list = _key, active, dateStart, dateEnd, hours, memberId, period, year

[timezones]
collection = connectwise_timezones
external_type = kvstore
fields_list = _key, active, name, offset, daylightSavingsFlag

[workroles]
collection = connectwise_workroles
external_type = kvstore
fields_list = _key, active, name, hourlyRate

[worktypes]
collection = connectwise_worktypes
external_type = kvstore
fields_list = _key, active, name
