[source::connectWiseQuery://*]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%Z
TIME_PREFIX = "lastUpdated":\s+"
TRUNCATE = 15000

[source::connectWiseQuery://Schedule Types]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
MAX_DAYS_AGO = 15000
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%Z
TIME_PREFIX = "lastUpdated":\s+"
TRUNCATE = 15000

[source::connectWiseQuery://Time Entries]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%Z
TIME_PREFIX = "lastUpdated":\s+"
TRUNCATE = 1000000

[source::connectWiseQuery://Time Zones]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
MAX_DAYS_AGO = 15000
MAX_TIMESTAMP_LOOKAHEAD = 20
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%Z
TIME_PREFIX = "lastUpdated":\s+"
TRUNCATE = 15000
