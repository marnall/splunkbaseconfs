[connectWiseTicket-command]
comment1 = Retrieves current open tickets for a given account.
description = Generating command that retrieves data from the nthº mesh™ API. This should not\
    be used directly unless you know what you are doing. In all cases, this command requires\
    valid certificates and an API token; please contact your account team if you do not have\
    either of these.
example1 = index=* | stats values(descfield) as initialDescription | eval summary="Ticket Summary", board=nn, contact=nn, company=nn, priority=nn, agreement=nn | connectWiseTicket
maintainer = Paul Stout <paul@nthdegree.io>
shortdesc = Generating command that retrieves data from the nthº mesh™ API.
syntax = connectWiseTicket
usage = public
