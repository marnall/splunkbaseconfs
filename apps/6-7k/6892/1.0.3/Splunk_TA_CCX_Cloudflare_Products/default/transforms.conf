####PARSE SOURCETYPES CLOUDFLARE####
[ccx:cloudflare:zerotrust:network_sessions]
REGEX = \"AccountID\"\:.*\,\"BytesReceived\"
FORMAT = sourcetype::ccx:cloudflare:zerotrust:network_sessions
DEST_KEY = MetaData:Sourcetype

[ccx:cloudflare:gateway_network]
REGEX = \"AccountID\"\:.*\,\"Action\"\:.*\,\"Datetime\"\:.*\,\"DestinationIP\"
FORMAT = sourcetype::ccx:cloudflare:gateway_network
DEST_KEY = MetaData:Sourcetype

[ccx:cloudflare:access_requests]
REGEX = \"Action\"\:.*\,\"Allowed\"
FORMAT = sourcetype::ccx:cloudflare:access_requests
DEST_KEY = MetaData:Sourcetype

[ccx:cloudflare:gateway_dns]
REGEX = \"ApplicationID\"\:.*\,\"ColoCode\"\:.*\,\"ColoID\"
FORMAT = sourcetype::ccx:cloudflare:gateway_dns
DEST_KEY = MetaData:Sourcetype

[ccx:cloudflare:audit_logs]
REGEX = \"ActionResult\"\:.*\,\"ActionType\"\:.*\,\"ActorEmail\"
FORMAT = sourcetype::ccx:cloudflare:audit_logs
DEST_KEY = MetaData:Sourcetype

[ccx:cloudflare:gateway_http]
REGEX = \"AccountID\"\:.*\,\"Action\"\:.*\,\"BlockedFileHash\"
FORMAT = sourcetype::ccx:cloudflare:gateway_http
DEST_KEY = MetaData:Sourcetype

[ccx:cloudflare:waf]
REGEX = \"CacheCacheStatus\"\:\"|\"\ClientIP\"\:.*\,\"ClientRequestHost\"\:.*\,\"ClientRequestMethod\"
FORMAT = sourcetype::ccx:cloudflare:waf
DEST_KEY = MetaData:Sourcetype


##LOOKUPS##
[ccx_cloudflare_waf_action]
