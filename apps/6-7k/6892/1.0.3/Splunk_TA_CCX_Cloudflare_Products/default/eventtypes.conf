[ccx_cloudflare_waf_ids]
search = (sourcetype="ccx:cloudflare:waf") dataset_name="ids"
#tags = ids attack cloud

[ccx_cloudflare_waf_web]
search = (sourcetype="ccx:cloudflare:waf") url=*
#tags = web

[ccx_cloudflare_audit_changes]
search = (sourcetype="ccx:cloudflare:audit_logs") NOT ActionType="sso_login"
#tags = change audit

[ccx_cloudflare_audit_sso]
search = (sourcetype="ccx:cloudflare:audit_logs") ActionType="sso_login"

[ccx_cloudflare_gateway_http_web]
search = (sourcetype="ccx:cloudflare:gateway_http") url="*"
#tags = web

[ccx_cloudflare_gateway_http_ids]
search = (sourcetype="ccx:cloudflare:gateway_http") signature="*" AND NOT signature IN("*bypass*","*allow*","*whitelist*")
#tags = ids attack cloud

[ccx_cloudflare_gateway_http_malware_operations]
search = (sourcetype="ccx:cloudflare:gateway_http") file_hash="*"
#tags = malware operations cloud

[ccx_cloudflare_gateway_dns]
search = (sourcetype="ccx:cloudflare:gateway_dns")
#tags = network resolution dns

[ccx_cloudflare_access_requests]
search = (sourcetype="ccx:cloudflare:access_requests")
#tags = authentication

[ccx_cloudflare_gateway_network]
search = (sourcetype="ccx:cloudflare:gateway_network")
#tags = network communicate

[ccx_cloudflare_zerotrust_network_sessions]
search = (sourcetype="ccx:cloudflare:zerotrust:network_sessions")
#tags = network communicate
