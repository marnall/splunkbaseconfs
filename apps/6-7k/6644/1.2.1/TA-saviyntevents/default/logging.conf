[loggers]
keys = root, saviyntevents

[logger_saviyntevents]
level = INFO
handlers = console, file
qualname = saviyntevents
propagate = 0

[handlers]
keys = console, file

[handler_console]
class = StreamHandler
args = (sys.stdout,)

[handler_file]
class = FileHandler
args = ('$SPLUNK_HOME/var/log/splunk/saviyntevents.log', 'a')

[formatters]
keys = simple

[formatter_simple]
format = %(asctime)s %(name)s %(levelname)s: %(message)s
datefmt = %Y-%m-%d %H:%M:%S

