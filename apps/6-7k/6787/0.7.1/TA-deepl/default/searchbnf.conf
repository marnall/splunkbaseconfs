[translate-command]
usage = public
syntax = translate (<translate-options>)* <source_field>
description = Translates the text into the specified language(default: Japanese)
example1 = | translate t_lang="JA" messaage

[translate-options]
syntax = t_lang=<target language>
description = The language into which the text should be translated. Options currently available: \
BG - Bulgarian, CS - Czech, DA - Danish, DE - German, EL - Greek, EN - English, \
EN-US - English (American), ES - Spanish, ET - Estonian, FI - Finnish, FR - French, HU - Hungarian \
ID - Indonesian, IT - Italian, JA - Japanese, KO - Korean, LT - Lithuanian, LV - Latvian, \
NB - Norwegian (Bokmål), NL - Dutch, PL - Polish, PT - Portuguese, PT-BR - Portuguese (Brazilian), \
PT-PT - Portuguese, RO - Romanian, RU - Russian, SK - Slovak, SL - Slovenian, SV - Swedish, \
TR - Turkish, UK - Ukrainian, ZH - Chinese (simplified)
