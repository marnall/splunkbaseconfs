[alertedevents-command]
syntax = alertedevents (sam_account_name=<string>)? (start_date=<string>)? (end_date=<string>)? (columns=<string>)? 
shortdesc = Connects to the Varonis Report API and executes a search for Audit events from User Access Log.
description = This command connects to the Varonis Report API and executes a search for Audit events from User Access Log, and a Splunk event is generated for each result. sam_account_name is optional to filter by SamAccountName_acting_object. start_date and end_date are optional alternatives to the Splunk time picker. columns is optional if it needs to customize list of out fields (use * to retrieve all the fields). 
comment1 = Search for Audit events from User Access Log for specific SAM Account Name.
example1 = | alertedevents sam_account_name="Administrator"
comment2 = Search for Audit events from User Access Log for the time range provided in command params.
example2 = | alertedevents start_date="2023-05-10 12:00:00" end_date="2023-05-10 12:01:00"
comment3 = Search for Audit events from User Access Log for the time range selected in Splunk time picker.
example3 = | alertedevents
comment4 = Search for Audit events for specific SAM Account Name and return specific columns as a table.
example4 = | alertedevents sam_account_name="Administrator" columns="Time,File_Server_Domain,Event_status,Event_type,event_description,operation_by,distinguishedName_Acting_object" | rename distinguishedName_Acting_object as DN | table Time,File_Server_Domain,Event*,Operation_By,DN
category = generating
usage = public
tags = varonis report api

[varonissearch-command]
syntax = varonissearch (query=<string>)
shortdesc = Connects to the Varonis Report API and executes a query.
description = This command connects to the Varonis Report API and executes a query, and a Splunk event is generated for each result. 
comment1 = Search for Audit events for specific SAM Account Name and return specific columns as a table.
example1 = | varonissearch query="SELECT * FROM User_Access_Log WHERE Show_data_from = 'Audit_events' and (time between '2023-05-10 12:00:00' and '2023-05-10 12:01:00') and SamAccountName_acting_object = 'Administrator' order by time desc" | rename distinguishedName_Acting_object as DN | table Time,File_Server_Domain,Event*,Operation_By,DN
category = generating
usage = public
tags = varonis report api