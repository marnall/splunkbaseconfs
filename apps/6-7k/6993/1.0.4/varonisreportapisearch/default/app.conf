[launcher]
version = 1.0.4
description = Search command for calling Varonis Report API
author=Varonis

[package]
id = varonisreportapisearch

[install]
build = ${value.build.number}
is_configured = false

[ui]
is_visible = 1
label = Varonis Search & Reporting
# Points to a file in:
# $SPLUNK_HOME/etc/apps/<SPLUNK_APP_NAME>/default/data/ui/views/*
# It does not need the extension of the file name provided
setup_view = setup_page_dashboard

[api]
api_url = http://localhost:80/ReportAPI/api/