# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = 0
state = enabled
build = 1

[launcher]
author = Prewin Thomas
version = 1.1.1
description = This Add-On works together with the Splunk Diode Sender Add-On .It is designed to receive data from Splunk servers that pass through a data diode, while preserving the Splunk metadata.The receiver will encapsulate Splunk metadata like sourcetype, source, host, _time into the _raw message. The receiver will unpack this and populate the metadata fields as well and restore the _raw to its original state.

[ui]
is_visible = 0
label = SplunkDiode-Receiver-Addon
docs_section_override = AddOns:released

[package]
id = TA-splunkdiode-receiver-addon

[triggers]
reload.addon_builder = simple
reload.ta_splunkdiode_receiver_addon_account = simple
reload.ta_splunkdiode_receiver_addon_settings = simple
reload.passwords = simple

