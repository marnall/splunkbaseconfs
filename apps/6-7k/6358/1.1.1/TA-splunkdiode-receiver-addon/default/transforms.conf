[extract_host]
REGEX = h=([^\|]*)\|
FORMAT = host::$1
DEST_KEY = MetaData:Host

[extract_source]
REGEX = s=([^\|]*)\|
FORMAT = source::$1
DEST_KEY = MetaData:Source

[extract_sourcetype]
REGEX = st=([^\|]*)\|
FORMAT = sourcetype::$1
DEST_KEY = MetaData:Sourcetype

[extract_time]
REGEX = t=([^\|]*)\|
FORMAT = $1
DEST_KEY = _time

[extract_index]
REGEX = i=([^\|]*)\|
FORMAT = $1
DEST_KEY = _MetaData:Index

[rewrite_raw]
REGEX = \|r=(.*)$
FORMAT = $1
DEST_KEY = _raw

