
[akamai_etp_dns]
search = sourcetype="akamai:etp:threat" OR sourcetype="akamai:etp:aup" OR sourcetype="akamai:etp:dns" query.dnsIp=*
# tags = dns network resolution

[akamai_etp_flagged_traffic]
search = sourcetype="akamai:etp:threat" NOT event.threatName IN ("Known*", "AUP")

[akamai_etp_ids]
search = sourcetype="akamai:etp:threat" event.threatName="Known*"
# tags = attack ids

[akamai_etp_network]
search = sourcetype="akamai:etp:threat" OR sourcetype="akamai:etp:aup" OR sourcetype="akamai:etp:dns" query.clientIp=* AND (query.resolved{}.response=* AND query.resolved{}.response!="N/A")
# tags = network communicate

[akamai_etp_web]
search = sourcetype="akamai:etp:threat" OR sourcetype="akamai:etp:aup" OR sourcetype="akamai:etp:dns" query.domain=*
# tags = web