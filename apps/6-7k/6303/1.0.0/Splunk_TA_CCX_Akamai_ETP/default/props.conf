
[akamai:etp:dns]
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1
FIELDALIAS-category = "event.aupCategories{}.name" AS category
FIELDALIAS-rule = "event.policyName" AS rule
FIELDALIAS-src_translated_ip = "query.clientIp" AS src_translated_ip
EVAL-action = if(like('event.actionName', "%block%") OR like('event.actionName', "%Block%"), "blocked", "allowed")
EVAL-app = "akamai_etp_traffic"
EVAL-dest = if('query.resolved{}.response'=="N/A" OR isnull('query.resolved{}.response'), 'query.dnsIp', 'query.resolved{}.response')
EVAL-dest_ip = if('query.resolved{}.response'=="N/A" OR isnull('query.resolved{}.response'), 'query.dnsIp', 'query.resolved{}.response')
EVAL-dvc = if('query.deviceName'=="N/A", null(), 'query.deviceName')
EVAL-message_type = if(isnotnull('query.time'), "Query", "Response")
EVAL-query = if(isnotnull('query.time'), replace('query.domain', "\.$", ""), null())
EVAL-query_type = if('query.queryType'=="N/A", null(), 'query.queryType')
EVAL-severity = case('event.severityLevel'=="Low", "low", 'event.severityLevel'=="Medium", "medium", 'event.severityLevel'=="High", "high", 'event.severityLevel'=="Critical", "critical")
EVAL-signature = if(like('event.threatName', "Known%"), 'event.threatName', null())
EVAL-src = 'query.clientIp'
EVAL-src_ip = 'query.clientIp'
EVAL-url = replace('query.domain', "\.$", "")
EVAL-url_domain = replace('query.domain', "\.$", "")
EVAL-url_length = len('query.domain')
EVAL-vendor_product = "Akamai:ETP"

