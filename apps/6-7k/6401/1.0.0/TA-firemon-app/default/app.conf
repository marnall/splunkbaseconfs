# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = FireMon
version = 1.0.0
description = FireMon App Add-on for Splunk provides details of HealthCheck,Control Status,NSG Count & UnUsedNSG count details using REST API data and the App provides visualizations on these data.

[ui]
is_visible = 1
label = FireMon App
docs_section_override = AddOns:released

[package]
id = TA-firemon-app

[triggers]
reload.addon_builder = simple
reload.ta_firemon_app_account = simple
reload.ta_firemon_app_settings = simple
reload.passwords = simple

