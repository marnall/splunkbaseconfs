
[KO_Disablement]
action.Disable_KOs = 1
action.Disable_KOs.param.source = alert:$name$
action.Disable_KOs.track_alert = 1
action.Disable_KOs.ttl = 600
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 01 00 01 */3 *
description = This saved search can be run manually (as needed) or set to run periodically.  This search when triggered will disable all applicable KOs identified within the user_ko_disablement.csv.  By default this search is set to run at one minute after midnight on the first day every three months.
dispatch.earliest_time = -4h@m
dispatch.latest_time = now
disabled = 1
enableSched = 1
quantity = 0
relation = greater than
search = | makeresults \
| inputlookup append=true user_ko_disablement.csv\
| where app!=""\
| table app config owner title
