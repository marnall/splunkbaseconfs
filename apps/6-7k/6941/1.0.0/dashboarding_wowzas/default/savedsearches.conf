[Energy Stats]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 0 * * * *
dispatch.earliest_time = -1d@d
dispatch.latest_time = @d
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = westy_dashboarding_wowzas
request.ui_dispatch_view = search
search = | inputlookup westy_house_energy.csv \
| eval _time = strptime(_time,"%Y-%m-%dT%H:%M:%S.%3N%Z") \
| fields _time value device \
| rename device as entity_id\
| eval weekday = strftime(_time,"%w") \
| bin span=30m _time \
| eval day = strftime(_time,"%d-%m-%Y") \
| eventstats max(_time) as day_marker by day \
| eventstats max(day_marker) as day_latest, max(_time) as current_time by weekday\
| where _time != current_time OR strftime(current_time,"%H:%M") = "23:30"\
| eval is_current = if(day_marker = day_latest,"Today","Historic"), _time = round(if(is_current = "Today",_time,strptime(strftime(current_time,"%d-%m-%Y") + "T" + strftime(_time,"%H:%M"),"%d-%m-%YT%H:%M")),0)\
| stats min(value) as start max(value) as end by _time weekday day is_current entity_id\
| eval units_used = end - start, cost = round(units_used * 0.1848,2), display = is_current + " " + replace(entity_id,"(_channel_\d)?_energy","") \
| chart useother=f limit=50 min(units_used) as "Minimum kWh" avg(units_used) as "Average kWh" max(units_used) as "Maximum kWh" min(cost) as "Minimum Cost" avg(cost) as "Average Cost" max(cost) as "Maximum Cost" by _time  display\
| untable _time field value\
| eval field = split(if(match(field,"Today"), replace(field,"^\w+\s+(\w+)\:\s+\w+\s+(\w+)","\2 \1"), replace(field,"^(\w+)\s+(\w+)\:\s+(\w+)\s+(\w+)", "\4: \3 \2 (\1)")),"_"), value=round(value,2)\
| streamstats count as event_id\
| mvexpand field\
| eval field = upper(substr(field,1,1)) + substr(field,2)\
| stats list(field) as field by _time event_id value\
| eval field = mvjoin(field," ")\
| fields _time field value\
| xyseries _time field value\
| fillnull value=0.00 \
| eval weekday = strftime(_time,"%w") \
| table _time *
