[ccx_watchguard_admd]
search = sourcetype="watchguard:firebox:syslog" "admd*"

[ccx_watchguard_firewall]
search = sourcetype="watchguard:firebox:syslog" "firewall*"

[ccx_watchguard_http_proxy]
search = sourcetype="watchguard:firebox:syslog" "http-proxy*"

[ccx_watchguard_https_proxy]
search = sourcetype="watchguard:firebox:syslog" "https-proxy*"

[ccx_watchguard_ids]
search = sourcetype="watchguard:firebox:syslog" severity_id="*"
# tags = attack ids

[ccx_watchguard_iked]
search = sourcetype="watchguard:firebox:syslog" "iked*"

[ccx_watchguard_network]
search = sourcetype="watchguard:firebox:syslog" sent_bytes="*" NOT eventtype="ccx_watchguard_vpn_session"
# tags = communicate network

[ccx_watchguard_pxy]
search = sourcetype="watchguard:firebox:syslog" "pxy*"

[ccx_watchguard_sessiond]
search = sourcetype="watchguard:firebox:syslog" "sessiond*"

[ccx_watchguard_sshd]
search = sourcetype="watchguard:firebox:syslog" "sshd*"

[ccx_watchguard_vpn_session]
search = sourcetype="watchguard:firebox:syslog" vpn="*" OR Reason="*"
# tags = network session vpn

[ccx_watchguard_web]
search = sourcetype="watchguard:firebox:syslog" url="*"
# tags = proxy web