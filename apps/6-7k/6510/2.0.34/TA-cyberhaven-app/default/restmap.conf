
[admin:TA_cyberhaven_app]
match = /
members = TA_cyberhaven_app_settings, TA_cyberhaven_app_incidents_script

[admin_external:TA_cyberhaven_app_settings]
handlertype = python
python.version = python3
handlerfile = TA_cyberhaven_app_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_cyberhaven_app_incidents_script]
handlertype = python
python.version = python3
handlerfile = TA_cyberhaven_app_rh_incidents_script.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
