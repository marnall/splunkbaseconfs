[Bad Open Ports discovered]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 30 2 * * *
description = Bad Open Ports discovered in BitSight
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = BitSightAppforSplunk
request.ui_dispatch_view = search
search = `bitsight_index`  sourcetype="bitsight"  End_Point="findings"  risk_category="Diligence" risk_vector_label= "Open Ports" |sort -"first_seen"\
|eval epochdate=strptime(first_seen, "%Y-%m-%d") |eval now=now()\
|eval deltaDays = (now - epochdate)/86400 | where deltaDays < 4\
|table risk_category,risk_vector_label,details.grade,details.diligence_annotations.message,evidence_key,first_seen,severity|rename risk_category as Category, risk_vector_label as Risk_Vector, details.grade as Grade , details.diligence_annotations.message as Message


