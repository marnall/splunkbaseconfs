|eval deltaDays = (now - epochdate)/86400 | where deltaDays < 4\
|table company_name,alert_date, alert_type,severity,trigger

[BitSight - Get All Companies]
cron_schedule = 0 0 * * *
description = This will get a list of companies from the data for the last 24 hours.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
run_on_startup = true
enableSched = 1
request.ui_dispatch_app = BitSightAppforSplunk
request.ui_dispatch_view = search
search = `bitsight_index` sourcetype="bitsight" | dedup Company | table Company | join type=outer max=0 Company [inputlookup append=t company_lookup | dedup Company ] | outputlookup company_lookup

