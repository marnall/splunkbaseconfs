[canarytools:incident]
FIELDALIAS-aob_gen_canarytools_incident_alias_1 = description.dst_host AS dest
FIELDALIAS-aob_gen_canarytools_incident_alias_2 = description.dst_port AS dest_port
FIELDALIAS-aob_gen_canarytools_incident_alias_3 = description.src_host AS src
FIELDALIAS-aob_gen_canarytools_incident_alias_4 = summary AS signature
KV_MODE = json
AUTO_KV_JSON = 1
MAX_TIMESTAMP_LOOKAHEAD = 10
SHOULD_LINEMERGE = 0
TIME_FORMAT = %s
TIME_PREFIX = \"updated_time\":\s+"
TRUNCATE = 0
TZ = UTC
category = Splunk App Add-on Builder
pulldown_type = 1

