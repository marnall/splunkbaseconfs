[xmcyber:riskscore]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT

[xmcyber:riskscore:scenario]
TRUNCATE = 0
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT

[xmcyber:scenarios]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT
EVAL-riskScore.affectedAssetsCount = coalesce('riskScore.affectedAssetsCount', 'riskScore.compromisedCriticalAssets')
EVAL-riskScore.allAffectedEntitiesCount = coalesce('riskScore.allAffectedEntitiesCount', 'riskScore.compromisedEntities')

[xmcyber:auditrecords]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 999999999
TIME_PREFIX = "timestamp\":\s*
TZ = UTC
FIELDALIAS-user_name = userId.name ASNEW user_name
FIELDALIAS-user = userId.email ASNEW user
FIELDALIAS-object = objectName ASNEW object
FIELDALIAS-object_category = objectType ASNEW object_category
FIELDALIAS-action = eventSubType ASNEW action
FIELDALIAS-change_type = eventType ASNEW change_type

[xmcyber:entities]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT
FIELDALIAS-affectedUniqueAssetsCount = affectedCriticalAssetsCount.count ASNEW affectedUniqueAssets.count.value
FIELDALIAS-asset = source_entity.isAsset ASNEW asset
FIELDALIAS-severity = riskScore.severity ASNEW attackComplexity.avg.level
FIELDALIAS-displayName = source_entity.name ASNEW displayName
FIELDALIAS-entityType = type ASNEW entityType
FIELDALIAS-entityTypeDisplayName = typeDisplayName ASNEW entityTypeDisplayName

[xmcyber:sensors]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT
FIELDALIAS-securityFlagsForDisplayReason = securityFlagsForDisplay{}.reason ASNEW securityFlagsForDisplayReason

[xmcyber:techniques]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT
FIELDALIAS-operationalTeamsOptions = operationalTeams{} ASNEW operationalTeamsList

[xmcyber:chokepoint:stats]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT

[xmcyber:devices]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT
EVAL-chokePointLevel = case(chokePointScore >= 90, "Critical", chokePointScore >= 70 AND chokePointScore < 90, "High", chokePointScore >= 40 AND chokePointScore < 70, "Medium", chokePointScore >= 20 AND chokePointScore < 40, "Low", true(), "Informative")

[xmcyber:vulnerabilities]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT

[xmcyber:products]
TRUNCATE = 999999999
SHOULD_LINEMERGE = False
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
DATETIME_CONFIG = CURRENT

[source::...*TA_xm_cyber*.log*]
sourcetype = xmcyber:log