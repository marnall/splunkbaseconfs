[exchange:smtp]
EXTRACT-protocol_fields = (?<date_time>[^,]*),(?<connector_id>[^,]*),(?<session_id>[^,]*),(?<sequence_number>[^,]*),(?<local_endpoint>[^,]*),(?<remote_endpoint>[^,]*),(?<event>[^,]*),(?<data>[^,]*),(?<context>.*)
EXTRACT-src_user = MAIL FROM:\s*\<(?<src_user>[^\>]+)\>
EXTRACT-recipient = RCPT TO:\s*\<(?<recipient>[^\>]+)\>

EVAL-remote_endpoint_ip = mvindex(split(remote_endpoint,":"),0)
EVAL-remote_endpoint_port = mvindex(split(remote_endpoint,":"),1)
EVAL-local_endpoint_ip = mvindex(split(local_endpoint,":"),0)
EVAL-local_endpoint_port = mvindex(split(local_endpoint,":"),1)

LOOKUP-protocol_event_codes = protocol_event_codes event OUTPUT action
