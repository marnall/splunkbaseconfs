[seasonalitydetection-command]
syntax = [seasonalitydetection]
shortdesc = [autodetects the dominant seasonal frequency in a time series, if any]
usage = public

[timeserieshealthcheck-command]
syntax = [timeserieshealthcheck]
shortdesc = [runs a diagnostic analysis on a time series to determine how well-suited it is to downstream modeling such as forecasting or anomaly detection.]
usage = public


