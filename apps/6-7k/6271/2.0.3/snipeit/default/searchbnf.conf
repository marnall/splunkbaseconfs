[snipeasset-command]
syntax = snipeasset (search=<search> | infield=<event_input_field>) (limit=<limit> | 500)? (outfield=<event_ouput_field> || 'assets')?
shortdesc = Query for assets matching search.
usage = public
example1 = snipeasset search="returned"
comment1 = Search for all returned assets
example2 = snipeassest infield=hostname outfield=device
comment2 = Search for assets matching the 'hostname' field of event and output to 'device' field
tags = snipeit
related = snipeassetsearch snipeuser snipeusersearch
description = \
  This streaming command queries for any assets that match the search term. If you are \
  trying to return a single device, make sure that your query is as specific as possible for \
  the device. For example: use unique hostname instead of the name of an owner (in case the \
  owner has multiple devices).
  
[snipeassetsearch-command]
syntax = snipeassetsearch search=<search> (limit=<limit> | 500)?
shortdesc = Query for assets matching search and generate events.
usage = public
example1 = snipeassetsearch search="returned"
comment1 = Search for all returned assets
tags = snipeit
related = snipeasset snipeuser snipeusersearch
description = \
  This generating command queries for any assets that match the search term. If you are \
  trying to return a single device, make sure that your query is as specific as possible for \
  the device. For example: use unique hostname instead of the name of an owner (in case the \
  owner has multiple devices).

[snipeuser-command]
syntax = snipeuser (search=<search> | infield=<event_input_field>) (limit=<limit> | 500)? (outfield=<event_ouput_field> || 'users')?
shortdesc = Query for users matching search.
usage = public
example1 = snipeuser search="John"
comment1 = Search for all users who's first or last names are "John"
example2 = snipeassest infield=location outfield=locaction_users
comment2 = Search for users in the location specified by the 'location' field of event and output to 'location_users' field
tags = snipeit
related = snipeusersearch snipeasset snipeassetsearch
description = \
  This streaming command queries for any users that match the search term. If you are \
  trying to return a single user, make sure that your query is as specific as possible for \
  that user.

[snipeusersearch-command]
syntax = snipeusersearch search=<search>(limit=<limit> | 500)?
shortdesc = Query for users matching search.
usage = public
example1 = snipeuser search="John"
comment1 = Search for all users who's first or last names are "John"
tags = snipeit
related = snipeuser snipeasset snipeassetsearch
description = \
  This generating command queries for any users that match the search term. If you are \
  trying to return a single user, make sure that your query is as specific as possible for \
  that user.
