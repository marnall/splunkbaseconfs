[s3splquery-command]
syntax = s3splquery bucket="<string>" query_name="<string>" timestamp_used="<bool>" timestamp_field="<string>" replacements="<string>" threads="<int>" fields="<string>" record_delimiter="<string>" field_delimiter="<string>" index_field="<string>" host_field="<string>" sourcetype_field="<string>" source_field="<string>" raw_field="<string>" timestamp_format="<string>"
shortdesc = Custom Search Command for querying data in S3. The query referenced by "query_name" is executed against the bucket instance referenced by "bucket". This command generates Splunk events.
category = generating
usage = public
tags = s3spl

[s3spladhoc-command]
syntax = s3spladhoc bucket="<string>" query="<string>" timestamp_used="<bool>" timestamp_field="<string>" replacements="<string>" threads="<int>" fields="<string>" record_delimiter="<string>" field_delimiter="<string>" index_field="<string>" host_field="<string>" sourcetype_field="<string>" source_field="<string>" raw_field="<string>" timestamp_format="<string>" 
shortdesc = Custom Search Command for querying data in S3. The query given in the "query" parameter is executed against the bucket instance referenced by "bucket". This command generates Splunk events.
category = generating
usage = public
tags = s3spl
