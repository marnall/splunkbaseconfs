[advhunt-command]
syntax = [advhunt <advhunt-options>]
shortdesc = [Query Microsoft Defender Advanced Hunting]
description = [Query Microsoft Defender Advanced Hunting and return a list of data.]
usage = public
tags = advanced_hunting
example1 = | advhunt query="DeviceEvents | limit 2" | spath input=_raw 
example2 = | advhunt cred=all renew=True query="AlertInfo | limit 2" | spath input=_raw 

[advhunt-options]
syntax = renew=<True> | cred=<string> | query=<Query>

