[samplr-command]
syntax = | samplr <samplr-options>
shortdesc = Removes some of the events
description = A custom command that removes a certain percentage from the total events of the main search
example1 = index=main | samplr perc=25
comment1 = Returns just roughly 25% of the total events from main search
tags = random
maintainer = Daniel Astillero (daniel.l.astillero@gmail.com)

[samplr-options]
syntax = (perc=<number>)
