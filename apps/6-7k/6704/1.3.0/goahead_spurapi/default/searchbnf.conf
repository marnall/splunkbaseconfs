[spurapi-command]
syntax = spurapi ip_field=<field>  apisaver=<true or false>
shortdesc = Spur context API(v2)'s streaming command to lookup IP (v4 || v6) address via ip field. API results is pre-processed. (By GoAhead Inc.)
example = ...| fields src_ip | spurapi ip_field=src_ip
description = 
usage = public

[spurapigen-command]
syntax = spurapigen ip=<str> 
shortdesc = Spur context API(v2) wrapper generating command to lookup IP (v4 || v6) address. (By GoAhead Inc.)
example = | spurapigen ip="x.x.x.x" 
description = 
usage = public

[spurapiremain-command]
syntax = spurapiremain
shortdesc = Query to status endpoint of Spur context API(v2). (By GoAhead Inc.)
example = | spurapiremain
description = 
usage = public