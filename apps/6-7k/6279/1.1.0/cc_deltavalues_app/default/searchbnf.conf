[deltavalues-command]
syntax    = deltavalues <list>
shortdesc = The deltavalues command provides all intersection data between 2 fields.\
  The command takes 1 required field. The field must be multi-value, a list.\
  A list may be derived from a values(field) function in a stats command.
example1  = | stats values(display_name) as display_name by _time ... | deltavalues display_name 
usage     = public
related   = delta