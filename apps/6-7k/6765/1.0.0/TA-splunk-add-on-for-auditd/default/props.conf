[linux:audit:enriched]
KV_MODE = none
NO_BINARY_CHECK = 1
REPORT-ta_builder_internal_use_kv_format_results_for_linux_audit_enriched = ta_builder_internal_use_kv_format_results_for_linux_audit_enriched
SEDCMD-convert_group_separator = s/\x1d/ /
SHOULD_LINEMERGE = 0
category = Operating System
description = Linux kernel auditing events produced and resolved by auditd
pulldown_type = 1
FIELDALIAS-Auditd = action AS status addr AS src_ip comm AS process exe AS app host AS dest hostname AS src op AS change_type pid AS process_id

[linux:audit*]
EVAL-command = if(match(cmd,"^[0-9A-F]+$"),urldecode(replace(cmd,"([0-9A-F]{2})","%\1")),coalesce(cmd,exe,comm))
EVAL-event_result = coalesce(res,success,result,avc_result,"unknown")
EVAL-keystrokes = urldecode(replace(data,"([0-9A-F]{2})","%\1"))
EVAL-process_name = urldecode(replace(replace(proctitle,"([0-9A-F]{2})","%\1"),"%00","%20"))
EVAL-src = if(hostname="?",addr,hostname)
