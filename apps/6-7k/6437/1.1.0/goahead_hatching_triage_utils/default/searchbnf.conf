[triageindex-command]
syntax = triageindex instance=["public" or "private" or "recordedfuture"] subset=["public" or "org" or "owned"] (limit=[int (default:50, max:200)]) (offset="[next's datetime value to dig next page]")
shortdesc = GeneratingCommand to get sample index report via Triage Cloud API of "GET /samples" (By GoAhead Inc.)
example = | triageindex instance="public" subset="public" limit=10
description = 
usage = public

[triagesearch-command]
syntax = triagesearch instance=["public" or "private" or "recordedfuture"] query="family:emotet" (limit=[int (default:50, max:200)]) (offset="[next's datetime value to dig next page]")
shortdesc = GeneratingCommand to search samples via Triage Cloud API of "GET /search" (By GoAhead Inc.)
example = | triagesearch instance="public" query="family:emotet" limit=30
description = 
usage = public

[triagereport-command]
syntax = triagereport instance=["public" or "private" or "recordedfuture"] report=["base"|"summary"|"static"|"overview"|"dynamic"|"onemon"|"pcap"|"pcapng"|"magic"|"ioc_extracted"|"proc_tree"] sampleID='sampleID' (taskID='taskID')
shortdesc = GeneratingCommand to get the sample report of your report option choice via Triage Cloud API  (By GoAhead Inc.)
example = | triagereport instance="public" report="dynamic" sampleID="YYYYMMDD-cy7xkahgcr" taskID="behavioral1"
description = 
usage = public

[triageurlsubmit-command]
syntax = triageurlsubmit instance=["public" or "private" or "recordedfuture"] kind=["url" or "import" or "fetch"] url=target_url (profile_name=profile_name_string)
shortdesc = GeneratingCommand to submit "target_url" or "fetch sample from url" and "import sample from public triage" via Triage Cloud API of "POST /samples" (By GoAhead Inc.)
example = | triageurlsubmit instance="public" kind="url" url="http://example.org/"
description = 
usage = public

