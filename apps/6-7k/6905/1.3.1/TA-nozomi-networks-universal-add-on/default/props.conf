[nozomi:universal_alert]
KV_MODE = json
SHOULD_LINEMERGE = 0
TRUNCATE = 0

TIME_PREFIX = (?i)"created_time"\s*:\s*
TIME_FORMAT = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 16
EVAL-_time = coalesce(created_time, time)/1000

EVAL-signature = coalesce(type_name, name)
EVAL-signature_id = trigger_id

EVAL-dest = if(isnull(label_dst) OR label_dst="" OR label_dst="-" OR lower(label_dst)="null",if(isnull(ip_dst) OR ip_dst="" OR ip_dst="-" OR lower(ip_dst)="null","", ip_dst),label_dst)
EVAL-src = if(isnull(label_src) OR label_src="" OR label_src="-" OR lower(label_src)="null",if(isnull(ip_src) OR ip_src="" OR ip_src="-" OR lower(ip_src)="null","", ip_src),label_src)

EVAL-dest_ip = if(isnull(ip_dst)  OR ip_dst=""  OR ip_dst="-"  OR lower(ip_dst)="null","", ip_dst)
EVAL-src_ip = if(isnull(ip_src)  OR ip_src=""  OR ip_src="-"  OR lower(ip_src)="null","", ip_src)
EVAL-dest_mac = if(isnull(mac_dst) OR mac_dst="" OR mac_dst="-" OR lower(mac_dst)="null","", mac_dst)
EVAL-src_mac = if(isnull(mac_src) OR mac_src="" OR mac_src="-" OR lower(mac_src)="null","", mac_src)

EVAL-src_port = if(isnull(port_src) OR port_src="" OR port_src="-" OR lower(port_src)="null",null(),tonumber(mvindex(port_src,0)))
EVAL-dest_port = if(isnull(port_dst) OR port_dst="" OR port_dst="-" OR lower(port_dst)="null",null(),tonumber(mvindex(port_dst,0)))

EVAL-src_zone = if(isnull(zone_src)  OR zone_src=""  OR zone_src="-"  OR lower(zone_src)="null","", zone_src)
EVAL-dest_zone = if(isnull(zone_dst)  OR zone_dst=""  OR zone_dst="-"  OR lower(zone_dst)="null","", zone_dst)

EVAL-ids_type = "network"
EVAL-action = "allowed"

EVAL-vendor_product = "Nozomi"
 
EVAL-severity = case(risk>=9,"critical", risk>=7,"high", risk>=4,"medium", true(),"low")

EVAL-dvc = host

EVAL-protocol = protocol
EVAL-transport = transport_protocol

EVAL-category = "ids"
EVAL-app = lower(protocol)

EVAL-description = description
EVAL-ack = ack
EVAL-status = status

EVAL-src_roles = src_roles
EVAL-dest_roles = dst_roles

EVAL-rule = type_id

category = Splunk App Add-on Builder
pulldown_type = 1

[nozomi:universal_asset]
EVAL-asset_model = if(isnull(product_name) OR product_name="" OR lower(product_name)="null", null(), product_name)
EVAL-asset_type = if(isnull(type) OR type="" OR type="-" OR lower(type)="null", null(), type)
EVAL-asset_vendor = if(isnull(vendor) OR vendor="" OR lower(vendor)="null", null(), vendor)
EVAL-asset_version = if(isnull(firmware_version) OR firmware_version="" OR lower(firmware_version)="null", null(), firmware_version)
EVAL-os = if(isnull(os_or_firmware) OR os_or_firmware="" OR lower(os_or_firmware)="null", null(), os_or_firmware)
EVAL-serial = if(isnull(serial_number) OR serial_number="" OR lower(serial_number)="null", null(), serial_number)

FIELDALIAS-zone_from_array = "zones{}" ASNEW zone
EVAL-zone = mvmap(zone, replace($zone$, "(?i)Layer\\s*", "purdue:level:"))

FIELDALIAS-roles_from_array = "roles{}" ASNEW roles
FIELDALIAS-asset_id = id ASNEW asset_id
EVAL-asset = id
FIELDALIAS-ip_from_array = "ip{}"          ASNEW ip
FIELDALIAS-mac_from_array = "mac_address{}" ASNEW mac
FIELDALIAS-vlan_from_array = "vlan_id{}"     ASNEW vlan

EVAL-app = lower(mvindex(protocols,0))

EVAL-lat = if(isnull(latitude) OR latitude="" OR lower(latitude)="null", null(), tonumber(latitude))
EVAL-lon = if(isnull(longitude) OR longitude="" OR lower(longitude)="null", null(), tonumber(longitude))

EVAL-asset_criticality = risk
EVAL-priority = case(risk>=9,"critical", risk>=7,"high", risk>=4,"medium", risk>0,"low", true(),"low")
KV_MODE = json

EVAL-appliance_host = coalesce(appliance_host, mvindex('appliance_hosts{}',0), mvindex(appliance_hosts,0))

LOOKUP-appliance_host_site_id_universal = appliance_host_site_id_universal appliance_host AS appliance_host OUTPUT site_id AS site_id

LOOKUP-asset_category_type_universal = asset_category_universal type AS type OUTPUTNEW category AS asset_category_mapped
EVAL-category = coalesce(asset_category_mapped, "ot" + if(isnull(technology_category) OR technology_category="" OR lower(technology_category)="null","", "|tech_cat:" + technology_category) + if(isnull(product_name) OR product_name="" OR lower(product_name)="null","", "|" + product_name) + if(isnull(roles) OR mvcount(roles)=0,"", "|" + mvjoin(roles,"|")))

LOOKUP-asset_system_universal = asset_system_universal appliance_host OUTPUT asset_system

EVAL-bunit = if(isnull(technology_category) OR technology_category="" OR lower(technology_category)="null","unknown",technology_category)

SHOULD_LINEMERGE = 0
TIME_PREFIX = (?i)"last_activity_time"\s*:\s*
TIME_FORMAT = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 16
category = Splunk App Add-on Builder
pulldown_type = 1

[nozomi:universal_link]
KV_MODE = json
SHOULD_LINEMERGE = 0
TRUNCATE = 0

TIME_PREFIX = (?i)"last_activity_time"\s*:\s*
TIME_FORMAT = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 16
EVAL-_time = coalesce(last_activity_time, record_created_at, first_activity_time)/1000

EVAL-src_ip = from
EVAL-dest_ip = to
EVAL-src_zone = from_zone
EVAL-dest_zone = to_zone

EVAL-app = lower(protocol)
EVAL-transport = lower(mvindex(transport_protocols, 0))

EVAL-category = "network"
EVAL-tag = mvappend("network","flow","link")

category = Splunk App Add-on Builder
pulldown_type = 1

[nozomi:universal_node]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[nozomi:universal_node_cve]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0

TIME_PREFIX = (?i)"time"\s*:\s*
TIME_FORMAT = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 16
EVAL-_time = round(coalesce(time, record_created_at)/1000, 3)

EVAL-dvc = host

EVAL-dest = mvindex('nodes{}', 0)
EVAL-src = mvindex('nodes{}', 0)
EVAL-dest_ip = mvindex('nodes{}', 0)
EVAL-dest_zone = mvindex('zones{}', 0)

EVAL-vendor_product = "Nozomi"

EVAL-signature_id = cve
EVAL-signature = coalesce(cve_summary, cwe_name)
FIELDALIAS-cve_id = cve AS cve_id
EVAL-cvss = tonumber(cve_score)
EVAL-severity_id = round(cve_score,1)
EVAL-severity = case(cve_score>=9,"critical",cve_score>=7,"high",cve_score>=4,"medium",cve_score>0,"info", true(), "low")
EVAL-confidence = case(probability="Confirmed","high", probability="Reasonable","medium", probability="Unknown","low", true(),"medium")
EVAL-kev = is_kev

FIELDALIAS-category_from_cwe = cwe_name AS category
EVAL-url = mvindex('references{}.url', 0)
FIELDALIAS-xref_from_refs = "references{}.url" AS xref

EVAL-os = os
EVAL-vendor = vendor
EVAL-product = product_name
EVAL-product_version = firmware_version

EVAL-action = "allowed"
FIELDALIAS-cpe_from_array = "matching_cpes{}" AS cpe

