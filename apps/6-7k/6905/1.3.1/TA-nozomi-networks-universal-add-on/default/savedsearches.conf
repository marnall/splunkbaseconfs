
[Build Nozomi Assets Lookup]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 0 * * * *
description = populate nozomi_assets lookup file
disabled = 1
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 1
search = sourcetype="nozomi:universal_asset"\
| fillnull value="" ip mac vlan zone nt_host dns bunit\
| eval ip=if(mvcount(ip)>1, mvsort(ip), ip),\
       mac=if(mvcount(mac)>1, mvsort(mac), mac),\
       vlan=if(mvcount(vlan)>1, mvsort(vlan), vlan),\
       zone=if(mvcount(zone)>1, mvsort(zone), zone)\
| eventstats count as mac_count by mac\
| eval mac=if(mac_count>1,"",mac)\
| dedup ip dns nt_host mac sortby -_time\
| eval priority=case(risk>=9,"critical", risk>=7,"high", risk>=4,"medium", risk>0,"low", true(),"low")\
| eval end_of_support = coalesce(end_of_support, end_of_support_date)\
| table asset_id asset_model asset_status asset_system asset_type asset_vendor asset_version asset_criticality bunit category city classification country dns end_of_support exposure ip is_expected lat lon location mac nt_host owner parent_asset_id pci_domain priority requires_av serial should_timesync should_update site_id vlan zone\
| outputlookup nozomi_assets
