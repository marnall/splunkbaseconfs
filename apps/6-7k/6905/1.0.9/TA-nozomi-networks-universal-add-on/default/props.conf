[nozomi:universal_alert]
EVAL-category = name
EVAL-description = description
EVAL-dest_ip = ip_dst
EVAL-dest_mac = mac_dst
EVAL-dest_port = port_dst
EVAL-dest_zone = zone_dst
EVAL-id = id
EVAL-protocol = protocol
EVAL-severity = risk
EVAL-signature = trigger_id
EVAL-src_ip = ip_src
EVAL-src_mac = mac_src
EVAL-src_port = port_src
EVAL-src_zone = zone_src
EVAL-transport = transport_protocol
EVAL-type = type_id
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[nozomi:universal_asset]
EVAL-asset_id = id
EVAL-asset_type = if(type="-",null,type)
EVAL-os = if(os_or_firmware="null",null,os_or_firmware)
EVAL-serial = if(serial_number="null",null,serial_number)
EVAL-vendor_product = if(vendor="null",null,vendor)
EVAL-version = if(firmware_version="null",null,firmware_version)
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
LOOKUP-appliance_host_site_id_universal = appliance_host_site_id_universal appliance_host AS appliance_host OUTPUT site_id AS site_id
LOOKUP-asset_category_type_universal = asset_category_universal type AS type OUTPUT category AS category

