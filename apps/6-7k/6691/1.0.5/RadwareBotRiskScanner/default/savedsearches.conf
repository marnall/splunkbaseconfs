[BotRiskScannerInputs]
action.email.useNSSubject = 1
alert.track = 0
display.general.timeRangePicker.show = 0
search = | inputlookup radware_brs_config_lookup \
| eval fields=split(input_field,"|")| eval addr=mvindex(fields,0) \
| eval url=mvindex(fields,1) | eval ua=mvindex(fields,2) | eval ref=mvindex(fields,3) \
| table addr,url,ua,ref
