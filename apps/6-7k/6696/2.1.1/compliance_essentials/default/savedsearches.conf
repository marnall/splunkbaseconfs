[Failed Audit Changes]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 6 * * 1
dispatch.earliest_time = -1w
dispatch.latest_time = now
enableSched = 0
quantity = 0
relation = greater than
search = | tstats count from datamodel=Change where nodename=All_Changes.Auditing_Changes All_Changes.status!="success" by host, All_Changes.user,  All_Changes.result, All_Changes.status, All_Changes.action _time span=1s\
| rename All_Changes.user as user, All_Changes.action as action All_Changes.result as result, All_Changes.status as status\
| table _time, host, user, action, result, status

[Index Audit Events]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 08 * * * *
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 0
search = | inputlookup audit_entries\
| eval _time = creation_date\
| table _time, capacity, creation_date, date_of_observation, description, domain, entry_title, modified_date, practice, reviewer, status\
| collect index=summary

[Hosts without Events Logged for 1 Day]
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 0 6 * * 1
dispatch.earliest_time = -1w
dispatch.latest_time = now
enableSched = 0
quantity = 0
relation = greater than
search = | tstats count where host!=Splunk* by host _time span=1d \
| timechart count as total by host span=1d useother=false limit=0\
| fillnull value=0\
| untable _time, host, total\
| where total==0
