[te_fim_csv]
INDEXED_EXTRACTIONS = csv
KV_MODE = none
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
TIMESTAMP_FIELDS = Version Time
HEADER_FIELD_LINE_NUMBER = 1
CHECK_METHOD = modtime
TRANSFORMS-delete = delete_header
TZ = UTC
TIME_FORMAT = %m/%d/%y %H:%M

FIELDALIAS-nodename = "Node Name" AS NodeName
FIELDALIAS-changetype = "Change Type" as ChangeType
FIELDALIAS-elementname = "Element Name" AS ElementName
FIELDALIAS-rulename = "Rule Name" AS RuleName
FIELDALIAS-sevname = "Severity Name" as SeverityName
FIELDALIAS-severity = "Severity Name" AS severity
FIELDALIAS-signature = "Rule Name" AS signature
FIELDALIAS-user = Users AS user
FIELDALIAS-src = "Node Name" AS src
FIELDALIAS-nodetype = "Node Type" AS NodeType
FIELDALIAS-versiontime = "Version Time" AS VersionTime
FIELDALIAS-approvalid = "Approval ID" AS ApprovalID
FIELDALIAS-object_attrs = "Attributes" as object_attrs
FIELDALIAS-object_category = "Node Type" as object_category
FIELDALIAS-dest = "Node Name" as dest
FIELDALIAS-msg = "Change Type" as msg
FIELDALIAS-status = "Change Type" as status
FIELDALIAS-data = "Attributes" as data
FIELDALIAS-action = "Change Type" as action
EVAL-user_type = "Unknown"
EVAL-action = lower(action)
LOOKUP-vendor_info_for_tripwire = tripwire_vendor_info_lookup sourcetype OUTPUT vendor,product,ids_type
LOOKUP-fim_asset_info = asset_info hostname AS NodeName OUTPUTNEW resource AS resource assetviewid AS assetviewid make AS make model AS model tenodetype AS tenodetype version AS version ipv4 AS ipv4 ipv6 AS ipv6
REPORT-object=object,object_path,observedhash,expectedhash,observedsize,expectedsize,observedmodtime,expectedmodtime

[te_scm_csv]
INDEXED_EXTRACTIONS = csv
HEADER_FIELD_LINE_NUMBER = 1
KV_MODE = none
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
TIMESTAMP_FIELDS = Result Time
CHECK_METHOD = modtime
TRANSFORMS-delete = delete_header
TZ = UTC
TIME_FORMAT = %m/%d/%y %H:%M

FIELDALIAS-nodename = "Node Name" AS NodeName
FIELDALIAS-nodetype = "Node Type" AS NodeType
FIELDALIAS-testname = "Test Name" AS TestName
FIELDALIAS-ResultState = "Result State" AS ResultState
FIELDALIAS-parenttestgroup = "Parent Test Group" AS ParentTestGroup
FIELDALIAS-resulttime = "Result Time" AS ResultTime
FIELDALIAS-actualvalue = "Actual Value" AS ActualValue
FIELDALIAS-approvalid = "Approval ID" AS ApprovalID
LOOKUP-vendor_info_for_tripwire = tripwire_vendor_info_lookup sourcetype OUTPUT vendor,product,ids_type
LOOKUP-scm_asset_info = asset_info hostname AS NodeName OUTPUTNEW resource AS resource assetviewid AS assetviewid make AS make model AS model tenodetype AS tenodetype version AS version ipv4 AS ipv4 ipv6 AS ipv6

#Alert CIM Mapping
FIELDALIAS-app = product AS app
FIELDALIAS-body = Description AS body
FIELDALIAS-dest = product AS dest 
FIELDALIAS-dest_category = "Parent Test Group" AS category
FIELDALIAS-id = "Test Name" AS id
EVAL-severity = "Unknown"
EVAL-severity_id = "Unknown"
FIELDALIAS-src = "Node Name" AS src
FIELDALIAS-src_category = "Node Type" AS src_category
EVAL-type = "task"
EVAL-subject = "Policy audit for <".TestName."> : ".upper(ResultState)

[te_ecr_csv]
INDEXED_EXTRACTIONS = csv
HEADER_FIELD_LINE_NUMBER = 1
KV_MODE = none
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
TIMESTAMP_FIELDS = Version Time
CHECK_METHOD = modtime
TRANSFORMS-delete = delete_header
TZ = UTC
TIME_FORMAT = %m/%d/%y %H:%M

FIELDALIAS-nodename = "Node Name" AS NodeName
FIELDALIAS-nodetype = "Node Type" AS NodeType
FIELDALIAS-rule = "Rule" as Rule
FIELDALIAS-ruletype = "Rule Type" AS RuleType
FIELDALIAS-element = "Element" AS Element
FIELDALIAS-versiontime = "Version Time" AS VersionTime
FIELDALIAS-content = "Content" AS Content

[te_syslog]
TIME_PREFIX = \<\d\d\d\>
BREAK_ONLY_BEFORE = \<\d\d\d\>
MAX_TIMESTAMP_LOOKAHEAD = 20
FIELDALIAS-command = AppType AS command
FIELDALIAS-Element ID = "Element ID" AS ElementId

[te_api]
TRUNCATE=0

[te_assets]
DATETIME_CONFIG = CURRENT
HEADER_MODE = firstline
INDEXED_EXTRACTIONS = csv
SHOULD_LINEMERGE = false
