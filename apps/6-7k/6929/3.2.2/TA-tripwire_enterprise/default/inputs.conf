[monitor:///te_default/FIM/*.(log|csv)]
disabled = 1
followTail = 0
index = te
sourcetype = te_fim_csv
crcSalt = <string>

[monitor:///te_default/SCM/*.(log|csv)]
disabled = 1
followTail = 0
index = te
sourcetype = te_scm_csv
crcSalt = <string>

[monitor:///te_default/ECR/*.(log|csv)]
disabled = 1
followTail = 0
index = te
sourcetype = te_ecr_csv
crcSalt = <string>

[monitor:///te_default/te_assets.csv]
disabled = 1
followTail = 0
index = te_assets_lookuptable_builder
sourcetype = te_assets
crcSalt = <string>

[tcp://te_default]
connection_host = ip
sourcetype = te_syslog
source =
index = te
disabled = 1

[script://$SPLUNK_HOME/etc/apps/TA-tripwire_enterprise/bin/te_assets.py]
disabled = 1
index = te
interval = 3600.0
sourcetype = te_api
passAuth = splunk-system-user
python.version = python3

[script://$SPLUNK_HOME/etc/apps/TA-tripwire_enterprise/bin/tripwire_fim.py]
disabled = 1
index = main
interval = 3600
source = te_script
sourcetype = te_script
passAuth = splunk-system-user
python.version = python3

[script://$SPLUNK_HOME/etc/apps/TA-tripwire_enterprise/bin/tripwire_scm.py]
disabled = 1
index = main
interval = 86400
source = te_script
sourcetype = te_script
passAuth = splunk-system-user
python.version = python3


[script://$SPLUNK_HOME/etc/apps/TA-tripwire_enterprise/bin/tripwire_ecr.py]
disabled = 1
index = main
interval = 86400
source = te_script
sourcetype = te_script
passAuth = splunk-system-user
python.version = python3
