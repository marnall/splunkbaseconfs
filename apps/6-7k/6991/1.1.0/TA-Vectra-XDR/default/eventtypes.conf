[vectra_cloud_detections]
search = sourcetype=vectra:cloud:detections

[vectra_cloud_audits_alerts]
search = sourcetype=vectra:cloud:audits event_action IN ("downloaded", "resolved")

[vectra_cloud_audits_authenication]
search = sourcetype=vectra:cloud:audits event_action IN ("login", "logout")

[vectra_cloud_audits_change]
search = sourcetype=vectra:cloud:audits event_action IN ("created", "updated", "deleted")