[vectra:cloud:entity:scoring]
SHOULD_LINEMERGE = 0
category = Vectra XDR Technology Add-on
pulldown_type = 1
TIME_PREFIX = "event_timestamp":\s"
MAX_TIMESTAMP_LOOKAHEAD = 24
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TZ = UTC
TRUNCATE = 999999
#  API fields mapped to syslog fields
EVAL-vectra_timestamp = round(strptime(event_timestamp,"%Y-%m-%dT%H:%M:%S"), 0)
FIELDALIAS-saccount = account_uid AS saccount
FIELDALIAS-vectra_url = href AS vectra_url
EXTRACT-dvchost = "href": "https?://(?<dvchost>.*)/accounts/.*"
FIELDALIAS-severity_id = severity AS severity_id
EVAL-severity = case(severity_id==0,"informational",severity_id>=1 AND severity_id<4,"low",severity_id>=4 AND severity_id<=5,"medium",severity_id>=6 AND severity_id<=7,"high",severity_id>=8,"critical",1==1,severity_id)

[vectra:cloud:detections]
SHOULD_LINEMERGE = 0
category = Vectra XDR Technology Add-on
pulldown_type = 1
TIME_PREFIX = "event_timestamp":\s"
MAX_TIMESTAMP_LOOKAHEAD = 24
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TZ = UTC
TRUNCATE = 999999
FIELDALIAS-vendor_category = category AS vendor_category
# API fields mapped to syslog fields
EVAL-vectra_timestamp = round(strptime(event_timestamp,"%Y-%m-%dT%H:%M:%S"), 0)
FIELDALIAS-account = account_uid AS account
FIELDALIAS-external_id = detection_id ASNEW external_id
FIELDALIAS-vectra_url = detection_href AS vectra_url
EXTRACT-dvchost = "href": "https?://(?<dvchost>.*)/accounts/.*"
# CIM Mapping
EVAL-action = "allow"
EVAL-ids_type = "network"
EVAL-vendor_product = "Vectra XDR Detections"
FIELDALIAS-src = src_ip AS src
FIELDALIAS-user = entity_uid AS user
FIELDALIAS-signature_id = detection_type AS signature_id
FIELDALIAS-signature = detection_type AS signature
FIELDALIAS-severity_id = severity AS severity_id
FIELDALIAS-dvc = dvchost AS dvc
EVAL-severity = case(severity_id==0,"informational",severity_id>=1 AND severity_id<4,"low",severity_id>=4 AND severity_id<=5,"medium",severity_id>=6 AND severity_id<=7,"high",severity_id>=8,"critical",1==1,severity_id)
EVAL-category = case(category=="command_and_control", "Command & Control", category=="botnet_activity", "Botnet Activity", category=="reconnaissance", "Reconnaissance", category=="lateral_movement", "Lateral Movement", category=="exfiltration", "Exfiltration", category=="info", "Info")

[vectra:cloud:audits]
SHOULD_LINEMERGE = 0
category = Vectra XDR Technology Add-on
pulldown_type = 1
TIME_PREFIX = "event_timestamp":\s"
MAX_TIMESTAMP_LOOKAHEAD = 24
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TZ = UTC
TRUNCATE = 999999
# CIM Mapping
FIELDALIAS-src = source_ip AS src
FIELDALIAS-action = event_action AS action
FIELDALIAS-user_name = username AS user_name
FIELDALIAS-user = username as user
FIELDALIAS-status = result_status AS status
FIELDALIAS-result_id = id AS result_id
FIELDALIAS-description = message AS description
FIELDALIAS-type = event_data.report.type as type

[vectra:cloud:lockdown]
SHOULD_LINEMERGE = 0
category = Vectra XDR Technology Add-on
pulldown_type = 1
TIME_PREFIX = "lock_event_timestamp":\s"
MAX_TIMESTAMP_LOOKAHEAD = 24
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TZ = UTC
TRUNCATE = 999999

[vectra:cloud:health]
SHOULD_LINEMERGE = 0
category = Vectra XDR Technology Add-on
pulldown_type = 1
TRUNCATE = 999999

[source::...ta-vectra-xdr*.log*]
sourcetype = tavectraxdr:log

