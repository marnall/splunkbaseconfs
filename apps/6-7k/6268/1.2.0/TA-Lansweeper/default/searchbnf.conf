# Custom commands for fetching Assets information

[lsip-command]
syntax = lsip ips="<ip_address/comma_separated_ip_addresses>" field="<ip_field>" site_ids="<site_ids/comma_separated_site_ids>" max_results_per_site="<maximum events per site>"
description = When ips and site_ids parameter will given, then this command retrieves assets information \
              of the given IP addresses and Site ids. And when used with field and site_ids parameter, this command retrieves \
              assets information of the IP addresses in field parameter and Site ids.
shortdesc = Retrieves assets data with given site ids and ip addresses.
example1 = | lsip ips="<ip_address1>,<ip_address2>" site_ids="<site_id1>,<site_id2>" max_results_per_site="<optional / number>"
comment1 = Retrieve the assets information present in site ids for given ip addresses.
example2 = [SPL_QUERY] | lsip field="<ip_field>" site_ids="<site_id1>,<site_id2>" max_results_per_site="<optional / number>"
comment2 = Retrieve the assets information present in site ids for ip addresses from specified field.
example3 = | lsip ips="<ip_address1>,<ip_address2>" site_ids="<site_id1>,<site_id2>" max_results_per_site="<optional / number>" mode="<optional / Live>"
comment3 = Retrieve the assets information present in site ids for given ip addresses.
example4 = [SPL_QUERY] | lsip field="<ip_field>" site_ids="<site_id1>,<site_id2>" max_results_per_site="<optional / number>"  mode="<optional / Local>"
comment4 = Retrieve the assets information present in site ids for ip addresses from specified field.
usage = public

