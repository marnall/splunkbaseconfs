[lansweeper_investigate_by_ip]
label               = Lansweeper investigate by IP Address
type                = link
fields              =  ip, dest, src, dest_ip, src_ip, dvc_ip, orig_host_ip, dest_translated_ip, src_translated_ip, threat_ip
link.uri            = /app/$@namespace$/investigation_dashboard?form.mode=Live&form.investigate_by=IP&form.sites=*&form.filter_value=$@field_value$
link.target         = blank
link.method         = get


[lansweeper_investigate_by_mac]
label               = Lansweeper investigate by MAC Address
type                = link
fields              =  mac, dest, src, dest_mac, src_mac, dvc_mac, orig_host_mac
link.uri            = /app/$@namespace$/investigation_dashboard?form.mode=Live&&form.investigate_by=MAC&form.sites=*&form.filter_value=$@field_value$
link.target         = blank
link.method         = get