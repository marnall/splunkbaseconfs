[aruba_ec_security_ids_log]
NO_BINARY_CHECK = true
pulldown_type = true
category = Custom
description = HPE Aruba Networking EdgeConnect SD-WAN Security IDPS log parser

EXTRACT-gateway,action,id,msg,category,prio,ecos_info,proto,src_ip,src_port,dest_ip,dest_port = ^(?:[^\:\n]*)(?:\S+)(?:\s\d+)?\s+(?P<gateway>\S+)\s+(?:[\w]+\[[\d]+\]:\s+|[\w]+\s+\d+\s+-\s+-\s+)?(?:(?:\[(?P<action>[a-zA-Z]+)\]\s)|(?P<action1>[a-zA-Z]+)\s)?\[\d+:(?P<id>\d+):\d+\]\s+(?P<msg>.+?(?= \[))\s+\[(?:[^ ]+)\s+(?P<category>[^\]]+)\]\s+(?:[^ ]+)\s+(?P<prio>[^\]]+)\]\s(?:ecos_info:\s{(?P<ecos_info>[^}]+)}\s)?{(?P<proto>[^}]+)}\s+\[?(?P<src_ip>[a-zA-Z0-9:.]+)\]?:(?P<src_port>\d+)\s+\->\s+\[?(?P<dest_ip>[a-zA-Z0-9:.]+)\]?:(?P<dest_port>\d+)
#EXTRACT-gateway,action,id,msg,category,prio,ecos_info,proto,src_ip,src_port,dest_ip,dest_port = ^(?:[^\:\n]*)(?:\S+)(?:.)+?(?:\d+)\s(?P<gateway>\S+)\s(?:\S+)\s(?:(?:(?:\[)?(?P<action>[a-zA-Z]+)(?:\])?\s))?\[\d+:(?P<id>\d+):\d+\]\s+(?P<msg>.+?(?= \[))\s+\[(?:[^ ]+)\s+(?P<category>[^\]]+)\]\s+(?:[^ ]+)\s+(?P<prio>[^\]]+)\]\s(?:ecos_info:\s{(?P<ecos_info>[^}]+)}\s)?{(?P<proto>[^}]+)}\s+(?P<src_ip>\S+):(?P<src_port>\d+)\s+\->\s+(?P<dest_ip>\S+):(?P<dest_port>\d+)

EXTRACT-id,msg,category,prio,src_ip,src_port,dest_ip,dest_port = ^(?:[^\*\n]*\*){2}\]\s+\[\d+:(?P<id>\d+):\d+\]\s+(?P<msg>.+?(?= \[))\s+\[(?:[^ \n]* ){2}(?P<category>[^\]]+)\]\s+(?:[^ ]+)\s+(?P<prio>[^\]]+)\]\s+[^ \n]*\}\s+(?P<src_ip>[^:]+):(?P<src_port>\d+)\s+\->\s+(?P<dest_ip>[^:]+)[^:\n]*:(?P<dest_port>.+)

EXTRACT-gateway,id,msg,category,prio,src_ip,src_port,dest_ip,dest_port = ^(?:[^\:\n]*)(?:[^ ]*)(?:[\d+ ]*)(?P<gateway>[^ ]+)\s+(?:[^\:]*)\:\s+\[\d+:(?P<id>\d+):\d+\]\s+(?P<msg>.+?(?= \[))\s+\[(?:[^ ]+)\s+(?P<category>[^\]]+)\]\s+(?:[^ ]+)\s+(?P<prio>[^\]]+)\]\s+(?:[^\}]*)\}\s+(?P<src_ip>[^\n]+):(?P<src_port>\d+)\s+\->\s+(?P<dest_ip>[^\n]+)[^:\n]*:(?P<dest_port>.+)

#EVAL-type = if(match(msg, " HTTP | HTTP$| DNS | DNS$| TLS| SSL |Certificate|HTTPS|ICMP|TFTP|SMB| SSH|DHCP|SMTP|NMAP| SQL I|DDoS| FTP|base64|Android"), "", "ASSORTED")

EVAL-type =  if(match(msg, " HTTP | HTTP$| DNS | DNS$|\(DNS |HTTPS| TLS| SSL |Certificate|ICMP|TFTP|SMB| SSH|DHCP|SMTP|NMAP| SQL I|DDoS| FTP|base64|Android"), case(match(msg, " HTTP | HTTP$"), "HTTP", match(msg, " DNS | DNS$|\(DNS "), "DNS", match(msg, "HTTPS"), "HTTPS", match(msg, " TLS| SSL |Certificate"), "TLS/SSL", match(msg, "ICMP"), "ICMP", match(msg, "TFTP"), "TFTP", match(msg, "SMB"), "SMB",match(msg, " SSH"), "SSH", match(msg, "DHCP"), "DHCP", match(msg, "SMTP"), "SMTP", match(msg, "NMAP"), "NMAP", match(msg, " SQL I"), "SQL_Inject", match(msg, "DDoS"), "DDoS", match(msg, " FTP"), "FTP", match(msg, "base64"), "base64", match(msg, "Android"), "Android"), "ASSORTED")

EVAL-gateway = if(isnull(gateway), host, gateway)

EVAL-sid = id

EVAL-action = if(isnull(action), "unknown", if(match(action, "(?i)drop|alert|inspect|quarantine|logging|tcp-reset|reset"), case(match(action, "(?i)drop"), "drop", match(action, "(?i)alert"), "inspect", match(action, "(?i)inspect"), "inspect", match(action, "(?i)quarantine"), "quarantine", match(action, "(?i)logging"), "logging", match(action, "(?i)tcp-reset"), "tcp-reset", match(action, "(?i)reset"), "reset"), lower(action)))

LOOKUP-severity_for_suricata = suricata_severity prio OUTPUT priority

REPORT-ecos_info = repeat_regex