[utwritelookup-command]
syntax = utwritelookup instance="<string>" lookup_name="<string>" append="<bool>" create_empty="<bool>" override_if_empty="<bool>" 
alias =
shortdesc = Writes the result of the current search to a lookup table in Cribl Stream
category = eventing
usage = public
tags = utstream

[utreadlookup-command]
syntax = utreadlookup instance="<string>" lookup_name="<string>"
alias =
shortdesc = Reads the conten of a lookup table in Cribl Stream to a result table in Splunk
category = generating
usage = public
tags = utstream

[utrunjob-command]
syntax = utrunjob instance="<string>" job_name="<string>" expression="<string>"
alias =
shortdesc = Run a job in Cribl Stream as one shot
category = generating
usage = public
tags = utstream

[criblsearch-command]
syntax = criblsearch index="<string>" sourcetype="<string>" host="<string>" instance="<string>"
alias =
shortdesc = Run discovery job for files stored in storage blobs accessible by Cribl.
category = generating
usage = public
tags = utstream

[criblqueue-command]
syntax = criblqueue mode="wildcard|distinct" _key="<string>" index="<string>" sourcetype="<string>" host="<string>" earliest="<string>" latest="<string>"
alias =
shortdesc = Add results to the replay stage. Depending on the selected mode different fields are required.
category = generating
usage = public
tags = utstream

[criblpreview-command]
syntax = criblpreview _key="<string>" count=<100> duration=<10>
alias =
shortdesc = Previews the result of a file if replayed.
category = generating
usage = public
tags = utstream
