#
# datamodel data
#

[tcdmd]
external_type = kvstore
collection = tc_dm_data
fields_list = _key, fieldName, modelName, objectName, objectSearch

#
# Datamodel searches
#
[tcdms]
external_type = kvstore
collection = tc_dm_search_settings
fields_list = _key, dataModel, earliest, iocCollections, iocField, labels, latest, name, reportObservations, victimField, where

#
# Indicator Collections
#
[tcic]
external_type = kvstore
collection = tc_ioc_collection
fields_list = _key, dirty, enabled, fields, interval, name, owners, search_uuid, tql, version

#
# Indicator Cache
#
[tcicache]
external_type = kvstore
collection = tc_ioc_cache
fields_list = _key, cached_at, indicator, data

#
# observations
#

[tcob]
external_type = kvstore
collection = tc_observations
fields_list = _key, dateObserved, indicator, observationCount, type

#
# Command Metrics
#
[tccm]
external_type = kvstore
collection = tc_command_metrics
fields_list = _key, command, last_run


#
# fields
#
[tcfields]
external_type = kvstore
collection = tc_fields
fields_list = _key, name, description, includedByDefault


#
# TC Owners
#
[tco]
external_type = kvstore
collection = tc_owners
fields_list = name
