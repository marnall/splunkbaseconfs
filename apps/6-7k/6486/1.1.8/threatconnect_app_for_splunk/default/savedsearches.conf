[TC-Indicator-CSV-File]
alert.suppress = 0
alert.track = 1
cron_schedule = 23 1 * * *
description = Generate CSV of indicators from tc_indicator_data (ES - Local File Intel)
enableSched = 0
realtime_schedule = 0
search = index="tc_indicator_data" \
| join left=L right=R where L.metadata.search_uuid5 = R.search_uuid [|inputlookup tcic ] \
| dedup "L.metadata.uuid5" \
| search "L.metadata.deleted" = "false" \
| search "L.type" = "File" \
| strcat "ThreatConnect indicator from owner " L.ownerName description \
| eval file_name="N/A" \
| rename  L.summary as indicator \
| eval weight=tonumber('L.rating') * 20 \
| eval file_hash=split(indicator, " : ") \
| mvexpand file_hash \
| table description, file_hash, file_name, weight \
| outputlookup threatconnect_file_indicators.csv
dispatch.earliest_time = -30d
dispatch.latest_time = now

