[TC-Clear-Indicator-Cache]
alert.suppress = 0
alert.track = 1
cron_schedule = 13 * * * *
description = Delete stale data from tc indicator cache
enableSched = 1
realtime_schedule = 0
search = |inputlookup tcicache | eval age = now() - cached_at | where age < (30 * 60)  | outputlookup tcicache
dispatch.earliest_time = -30d
dispatch.latest_time = now


#
# CSV Generators for ES
#

[TC-Indicator-CSV-Address]
alert.suppress = 0
alert.track = 1
cron_schedule = 43 1 * * *
description = Generate CSV of indicators from tc_indicator_data (ES - Local Ip Intel)
enableSched = 0
realtime_schedule = 0
search = index="tc_indicator_data" \
| join left=L right=R where L.metadata.search_uuid5 = R.search_uuid [|inputlookup tcic ] \
| dedup "L.metadata.uuid5" \
| search "L.metadata.deleted" = "false" \
| search "L.type" = "Address" \
| strcat "ThreatConnect indicator from owner " L.ownerName description \
| rename "L.summary" as ip \
| eval weight=tonumber('L.rating') * 20 \
| table description, ip, weight \
| outputlookup threatconnect_ip_indicators.csv
dispatch.earliest_time = -30d
dispatch.latest_time = now

