[TC-Gateway-Push]
alert.suppress = 0
alert.track = 1
cron_schedule = */15 * * * *
description = Pushes configuration from the ThreatConnect App For Splunk to the ThreatConnect Splunk Gateway Service.
enableSched = 1
realtime_schedule = 0
search = | tcmoduleimportpush
dispatch.earliest_time = -30d
dispatch.latest_time = now

