
[ASGER Login Brute Force]
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
search = index="asger" node="manager" account!= "" account= "*"\
 | bin _time span=5m as minute \
 | stats count(stat) as Attempts,count(eval(match(stat,"failed"))) as Failed,count(eval(match(stat,"successfully"))) as Success by minute ip,account\
 | where Failed>=1\
 | stats dc(account) as Total by minute\
 |where Total>1

[ASGER- Login Anomaly]
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
search = index="asger" node="manager" | stats count(eval(type="anomaly")) as Anomaly by ip\
| where Anomaly > 10

[Account Based Brute Force  Alert]
alert.digest_mode = 0
alert.expires = 1095d
alert.severity = 5
alert.suppress = 0
alert.suppress.fields = 1
alert.suppress.period = 3m
alert.track = 1
alert_condition = search count >= 1
counttype = number of events
cron_schedule = */1 * * * *
description = This alert triggered when someone try to login on same account more than 3 times in 3 min with wrong credentials.
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = asger
request.ui_dispatch_view = search
search = index="asger" type="login" account!= "" account= "*"\
 | bin _time span=5m as minute \
 | stats count(msg) as Attempts,count(eval(match(msg,"Failed"))) as Failed,count(eval(match(msg,"successfully"))) as Success by minute, ip,account\
 | where Failed>=3\
 | stats dc(account) as Total by minute, account, ip\
 |where Total>=1\

