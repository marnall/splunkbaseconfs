[claroty:alerts:json]
BREAK_ONLY_BEFORE_DATE = NONE
EVAL-app = "Claroty"
EVAL-description = "(" + 'alert.device_status' + ") " + 'alert.description'
EVAL-mitre_technique_id = alert.mitre_technique_ids{}
EVAL-severity = "unknown"
EVAL-type = "alert"
FIELDALIAS-aob_gen_claroty_alerts_json_alias_1 = affected_device.risk_score AS vendor_severity
FIELDALIAS-claroty_alerts_json = "affected_device.asset_id" AS dest "alert.id" AS id  "alert.type_name" AS signature
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
TIMESTAMP_FIELDS = time
TRUNCATE = 999999
category = Network & Security
description = Claroty Alerts
pulldown_type = 1

[claroty:events:json]
EVAL-app = "Claroty"
EVAL-severity = "unknown"
EVAL-type = "event"
FIELDALIAS-aob_gen_claroty_events_json_alias_1 = affected_device.risk_score AS vendor_severity
FIELDALIAS-claroty_events_json = "comm_tuple.dst_ip" AS dest "comm_tuple.src_ip" AS src "event.description" AS description "event.id" AS id "event.type" AS signature
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
TIMESTAMP_FIELDS = time
TRUNCATE = 999999
category = Network & Security
description = Claroty Events
pulldown_type = 1

[claroty:devices:json]
EVAL-asset_system = "unknown"
EVAL-bunit = "unknown"
EVAL-category = if(device_category="OT", "ot | " + lower(replace("ot_"+device_subcategory, " ", "_")), null)
EVAL-interface = mvindex('connection_type_list{}', 0)
EVAL-ip = mvindex('ip_list{}', 0)
EVAL-mac = mvindex('mac_list{}', 0)
EVAL-nt_host = mvindex('dhcp_hostnames{}', 0)
EVAL-owner = 'assignees{}'
EVAL-vendor_product = manufacturer
EVAL-version = app_version
EVAL-vlan = mvindex('vlan_name_list{}', 0)
FIELDALIAS-claroty_devices_json = app_version AS asset_version combined_os AS os device_type AS asset_type manufacturer AS asset_vendor model AS asset_model ot_criticality AS asset_criticality serial_number AS serial site_name AS site_id
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
TIMESTAMP_FIELDS = time
category = Network & Security
description = Claroty Devices
pulldown_type = 1

[claroty:vulnerabilities:json]
EVAL-app = "Claroty"
EVAL-cvss = if(isnum('vulnerability_info.cvssv3_base_score'), 'vulnerability_info.cvssv3_base_score', 'vulnerability_info.cvssv2_base_score')
EVAL-description = 'vulnerability_info.type' + " vulnerability for " + 'vulnerability_device_info.relevance' + " device: " + 'affected_device.asset_id'
EVAL-dvc = "Claroty"
EVAL-severity = "unknown"
EVAL-type = "vulnerability"
FIELDALIAS-aob_gen_claroty_vulnerabilities_json_alias_1 = affected_device.risk_score AS vendor_severity
FIELDALIAS-aob_gen_claroty_vulnerabilities_json_alias_2 = vulnerability_info.cves{} AS cve
FIELDALIAS-claroty_vulnerabilities_json = "affected_device.asset_id" AS dest "vulnerability_info.affected_products" AS vendor_product "vulnerability_info.name" AS signature "vulnerability_info.type" AS category
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
TIMESTAMP_FIELDS = time
category = Network & Security
description = Claroty Vulnerabilities
pulldown_type = 1

[claroty:incidents:json]
EVAL-app = "Claroty"
FIELDALIAS-aob_gen_claroty_incidents_json_alias_2 = incident_id AS id
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
TIMESTAMP_FIELDS = time
category = Network & Security
description = Claroty Incidents
pulldown_type = 1

