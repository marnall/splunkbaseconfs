[get_claroty_ot_device_type(1)]
args = assetType
definition = $assetType$="Building Management" OR $assetType$="Process" OR $assetType$="Control" OR $assetType$="Operation"
iseval = 0

[earliest_devices_from_claroty]
definition = earliest=-4h
iseval = 0
