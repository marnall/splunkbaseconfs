[add_claroty_asset_types]
definition = inputlookup asset_type_standard_lookup | append [search inputlookup claroty_asset_type_lookup] | dedup asset_type, old_asset_type| outputlookup asset_type_standard_lookup
iseval = 0

[add_claroty_vendors]
definition = inputlookup vendor_lookup | append [search inputlookup claroty_vendors_lookup] | dedup match_string, vendor | outputlookup vendor_lookup
iseval = 0

[get_claroty_ot_vendors]
definition = vendor="3COM" OR vendor="Altus" OR vendor="ABB" OR vendor="Advantech Technology" OR vendor="American Power" OR vendor="ASUSTek" OR vendor="Axis Communications AB" OR vendor="Beckhoff" OR vendor="Bently Nevada" OR vendor="B&R Industrial Automation" OR vendor="Buffalo" OR vendor="Canon" OR vendor="Check Point" OR vendor="Cisco" OR vendor="Cognex" OR vendor="Comtrol" OR vendor="Control Technology" OR vendor="Dell" OR vendor="Econolite" OR vendor="Emerson" OR vendor="Fanuc Robotics" OR vendor="FlexKom" OR vendor="Fortinet" OR vendor="Foxboro" OR vendor="GE Automation" OR vendor="GE Fanuc Automation" OR vendor="Gigabyte Technology" OR vendor="Google" OR vendor="Hikvision" OR vendor="Hirschmann" OR vendor="HMS Industrial Networks" OR vendor="Honeywell" OR vendor="Hewlett Packard" OR vendor="Huawei" OR vendor="Intel" OR vendor="Juniper Networks" OR vendor="Keyence" OR vendor="Kongsberg" OR vendor="Konica Minolta Holdings" OR vendor="Koyo" OR vendor="Lantronix" OR vendor="Lcfc Hefei Electronics Technology" OR vendor="LG" OR vendor="LS Electric" OR vendor="Matrox Electronic" OR vendor="Mitsubishi Hitachi Power Systems" OR vendor="Micro Industries" OR vendor="Microsoft" OR vendor="Mikronika" OR vendor="Mitsubishi" OR vendor="Motorola" OR vendor="Omniflow" OR vendor="Omron" OR vendor="OnePlus" OR vendor="Opto 22" OR vendor="Panasonic" OR vendor="Pegatron" OR vendor="Pepperl+Fuchs" OR vendor="Plum" OR vendor="ProSoft" OR vendor="Red Lion" OR vendor="Rockwell Automation" OR vendor="RS Automation" OR vendor="RuggedCom" OR vendor="Samsung" OR vendor="Schneider Electric" OR vendor="Schweitzer Engineering Laboratories" OR vendor="Siemens" OR vendor="SolarWinds" OR vendor="Sony" OR vendor="Telemecanique" OR vendor="TP-Link" OR vendor="Trend Micro" OR vendor="Triconex" OR vendor="Ubiquiti Networks" OR vendor="UNIX" OR vendor="Valmet" OR vendor="VMware" OR vendor="WAGO" OR vendor="Xerox" OR vendor="Xiaomi" OR vendor="Yokogawa" OR vendor="Zebra Technologies"
