[cloudflare:json]

FIELDALIAS-vendor_action = "FirewallMatchesActions{}" AS vendor_action
FIELDALIAS-src_ip = ClientIP AS src_ip

EVAL-src = 'ClientIP'
EVAL-action = if(isnotnull('action'), null(), "unknown")
EVAL-app = "Cloudflare"
EVAL-dest_ip = if('OriginIP'=="", null(), 'OriginIP')
EVAL-file_name = if('dataset_name'=="ids", if(match(replace('ClientRequestHost', "([^\:]+)\:.+", "\1") + if('ClientRequestURI'=="/", "", 'ClientRequestURI'), ".*[\\\|\/]((?:.+\.\w{2,4}\)?)|(?:\*))$"), replace(replace('ClientRequestHost', "([^\:]+)\:.+", "\1") + if('ClientRequestURI'=="/", "", 'ClientRequestURI'), ".*[\\\|\/]((?:.+\.\w{2,4}\)?)|(?:\*))$", "\1"), null()), null())
EVAL-file_path = if('dataset_name'=="ids", if(match(replace('ClientRequestHost', "([^\:]+)\:.+", "\1") + if('ClientRequestURI'=="/", "", 'ClientRequestURI'), ".*[\\\|\/]((?:.+\.\w{2,4}\)?)|(?:\*))$"),replace('ClientRequestHost', "([^\:]+)\:.+", "\1") + if('ClientRequestURI'=="/", "", 'ClientRequestURI') , null()), null())
EVAL-http_content_type = if('EdgeResponseContentType'=="", null(), 'EdgeResponseContentType')
EVAL-http_referrer = if('ClientRequestReferer'=="", null(), 'ClientRequestReferer')
EVAL-http_referrer_domain = if('ClientRequestReferer'=="", null(), replace('ClientRequestReferer', "(?:\S+:\/\/)?([^\/\:]+).*", "\1"))
EVAL-http_user_agent_length = len('ClientRequestUserAgent')
EVAL-ids_type = if('dataset_name'=="ids", "application", null())
EVAL-severity = if('dataset_name'=="ids", case('SecurityLevel'=="med", "medium", 'SecurityLevel'=="unk" OR 'SecurityLevel'=="off", "unknown", 1==1, 'SecurityLevel'), null())
EVAL-uri_path = if('ClientRequestURI'=="/", null(), 'ClientRequestURI')
EVAL-url_domain = replace('ClientRequestHost', "(?:(?:http(?:s)?\:\/\/)?www\.)?([^\:]+)\:?(?:.+)?", "\1")
EVAL-url_length = len(replace('ClientRequestHost', "([^\:]+)\:.+", "\1"))
EVAL-vendor_ip_reputation = if(isnotnull('FirewallMatchesActions{}'), null(), 'EdgePathingStatus')
EVAL-vendor_product = "Cloudflare"

#copy and overwrite these calculated CIM fields on default Cloudflare App#
EVAL-dest = if('OriginIP'=="", null(), 'OriginIP')
EVAL-url = replace('ClientRequestHost', "([^\:]+)\:.+", "\1") + if('ClientRequestURI'=="/", "", 'ClientRequestURI')

LOOKUP-ccx_cloudflare_json_action = ccx_cloudflare_json_action vendor_action OUTPUT action description
LOOKUP-ccx_cloudflare_json_ip_reputation = ccx_cloudflare_json_ip_reputation EdgePathingOp EdgePathingSrc EdgePathingStatus AS vendor_ip_reputation OUTPUT action dataset_name description signature
LOOKUP-ccx_cloudflare_json_pathing_status = ccx_cloudflare_json_pathing_status EdgePathingOp EdgePathingSrc EdgePathingStatus OUTPUTNEW action dataset_name description
