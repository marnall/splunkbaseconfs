#
# Splunk app configuration file
#

[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = Ziga Humar
version = 1.0.2
description = This app us used to visualize key security events from MacOS endpoints - authentications and running processes.

[ui]
is_visible = 1
label = App for Apple Unified Logging
docs_section_override = AddOns:released

[package]
id = app_apple_unified_logging
check_for_updates = 1

[triggers]
reload.addon_builder = simple
reload.app_apple_unified_logging_account = simple
reload.app_apple_unified_logging_settings = simple
reload.passwords = simple

