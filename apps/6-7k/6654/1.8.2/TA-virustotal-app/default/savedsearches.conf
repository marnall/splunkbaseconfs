[VirusTotal Clean Lookups]
cron_schedule = 0,30 * * * *
description = Retire IoCs older than the expiration setting value every 30 minutes
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | makeresults | vtdeleteiocs ttl=`virustotal_ttl`
enableSched = true

[VirusTotal Keep Adversary Lookups Updated]
cron_schedule = 7,37 * * * *
description = Update Adversary lookup tables (campaigns, threat actors, ...) every 30 minutes
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | localop | vtadversaryupdate
enableSched = true

[VirusTotal Keep CVE Lookup Updated]
cron_schedule = 7,37 * * * *
description = Update vulnerabilities lookup table every 30 minutes
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | localop | vtvulnerabilitiesupdate
enableSched = true

