[admin:TA_virustotal_app]
match = /
members = TA_virustotal_app_settings, TA_virustotal_app_vt_ioc_stream

[admin_external:TA_virustotal_app_settings]
handlertype = python
python.version = python3
python.required = 3
handlerfile = TA_virustotal_app_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_virustotal_app_vt_ioc_stream]
handlertype = python
python.version = python3
python.required = 3
handlerfile = TA_virustotal_app_rh_vt_ioc_stream.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[script:virustotal]
match=/tavirustotalapp
script = vt_rest_endpoints.py
scripttype = persist
handler = vt_rest_endpoints.VtHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth	      = true
python.version        = python3
python.required       = 3
