[expose:TA_virustotal_app_settings]
pattern = TA_virustotal_app_settings
methods = POST, GET

[expose:TA_virustotal_app_settings_specified]
pattern = TA_virustotal_app_settings/*
methods = POST, GET, DELETE

[expose:TA_virustotal_app_vt_ioc_stream]
pattern = TA_virustotal_app_vt_ioc_stream
methods = POST, GET

[expose:TA_virustotal_app_vt_ioc_stream_specified]
pattern = TA_virustotal_app_vt_ioc_stream/*
methods = POST, GET, DELETE

[expose:virustotal]
pattern = tavirustotalapp
methods = GET

[expose:virustotal_specified]
pattern = tavirustotalapp/*
methods = POST, GET

[expose:_splunkd_data]
pattern = data/*
methods = GET
