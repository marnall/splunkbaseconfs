[virustotal_index_list]
definition = ()

[virustotal_command_list(1)]
args = list_str
definition = eval list_cache = "$list_str$" | makemv delim="," list_cache | mvexpand list_cache

[virustotal_file_list]
definition = `virustotal_command_list("md5,sha1,sha256,MD5,SHA1,SHA256")`

[virustotal_url_list]
definition = `virustotal_command_list("target_url,url")`

[virustotal_domain_list]
definition = `virustotal_command_list("cert_cn,domain")`

[virustotal_ip_list]
definition = `virustotal_command_list("src_ip,src_address,ip_address,ip")`

[virustotal_ttl]
definition = 30

# macro `check_time` that takes 3 arguments and checks if time is correct
[check_time(3)]
args = time, earliest, latest
definition = where ("$earliest$" = "0" OR $time$ >= relative_time(now(), "$earliest$")) AND ("$latest$" = "" OR "$latest$" = "now" OR relative_time(now(), "$latest$") >= $time$)

[mitre(2)]
args = earliest, latest
definition = inputlookup vt_file_cache | `check_time(_first_seen_in_events, $earliest$, $latest$)` | join type=inner vt_id [| inputlookup vt_mitre_cache | fields - _first_seen_in_events _last_seen_in_events ] | join type=left vt_id [| inputlookup vt_ignore_cache | search vt_type=hash] | where isnull(vt_type) | fields vt_id vt_mitre_tree | appendpipe [ stats count | where count=0 ]
