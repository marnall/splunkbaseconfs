[vt4splunk-command]
syntax = vt4splunk <vt4splunk-options>*
description= Enrichs a record using VirusTotal, caching the results for subsequent searches.
shortdesc = Enrichs a record using VirusTotal
usage = public

[vt4splunk-options]
syntax = hash=<string> | ip=<string> | domain=<string> | url=<string> | nocache=(true)

[vtdeleteiocs-command]
syntax = vtdeleteiocs (<vtdeleteiocs-options>)*
description = Delete IoCs from VirusTotal lookup table using the given options.
shortdesc = Delete IoCs from VirusTotal lookup table
usage = public

[vtdeleteiocs-options]
syntax = lookups=<list> | ttl=<int>

[vtadversaryupdate-command]
syntax = vtadversaryupdate
description = Keep up-to date campaigns, malware toolkits and threat actors.
shortdesc = Keep up-to date campaigns, malware toolkits and threat actors
usage = public

[vtvulnerabilitiesupdate-command]
syntax = vtvulnerabilitiesupdate
description = Keep up-to date vulnerabilities.
shortdesc = Keep up-to date vulnerabilities
usage = public

[vtmitreupdate-command]
syntax = vtmitreupdate
description = Keep up-to date MITRE ATT&CS.
shortdesc = Keep up-to date MITRE ATT&CS
usage = public
