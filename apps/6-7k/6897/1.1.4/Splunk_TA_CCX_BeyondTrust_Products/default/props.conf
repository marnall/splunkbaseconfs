[ccx:beyondtrust:privilegedmanagementcloud]
KV_MODE = json
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE=150000
category = Structured
description = CCX BeyondTrust PAM JSON
disabled = false
pulldown_type = true

EVAL-action = case(('Processes.action'=="logon"), "allowed", ((isnotnull('All_Changes.command') AND NOT 'All_Changes.command'=="RecordUserSignIn" AND NOT 'All_Changes.object_category'=="ManagementRule" AND NOT 'All_Changes.object_category'=="Portal")), case(like('All_Changes.action', "%Update%") OR like('All_Changes.action', "%Commit%"), "updated", like('All_Changes.action', "%Edit%") OR like('All_Changes.action', "%Assign%"), "modified", like('All_Changes.action', "%Delete%") OR like('All_Changes.action', "%Purge%") OR like('All_Changes.action', "%Archive%") OR like('All_Changes.action', "%Abort%"), "deleted", like('All_Changes.action', "%Create%"), "created", like('All_Changes.action', "%Retrieve%"), "read", like('All_Changes.command', "%started%"), "started"), (isnotnull('Processes.description') AND NOT Processes.action=="logon"), 'Processes.action')
EVAL-app = case(('All_Changes.object_category'=="Portal"), 'All_Changes.vendor_product', ('Processes.action'=="logon"), 'Processes.vendor_product')
EVAL-body = case(('All_Changes.object_category'=="Portal"), 'All_Changes.command')
EVAL-change_type = case(((isnotnull('All_Changes.command') AND NOT 'All_Changes.command'=="RecordUserSignIn" AND NOT 'All_Changes.object_category'=="ManagementRule" AND NOT 'All_Changes.object_category'=="Portal")), if('All_Changes.object_category'=="User", "AAA", 'All_Changes.object_category'))
EVAL-description = case(('All_Changes.object_category'=="Portal"), 'All_Changes.command')
EVAL-dest = 'Processes.dest'
EVAL-object = case(((isnotnull('All_Changes.command') AND NOT 'All_Changes.command'=="RecordUserSignIn" AND NOT 'All_Changes.object_category'=="ManagementRule" AND NOT 'All_Changes.object_category'=="Portal")), if('All_Changes.object_category'=="User", coalesce('Processes.user', 'All_Changes.user', 'All_Changes.src_user'), 'All_Changes.object_category'))
EVAL-object_category = 'All_Changes.object_category'
EVAL-object_id = 'All_Changes.object_id'
EVAL-parent_process = 'Processes.parent_process'
EVAL-parent_process_exec = if(isnotnull('Processes.parent_process_exec') AND match('Processes.parent_process_exec',"^.*(\.)(\\\|\/).*|.*(\\\|\/).*"),replace('Processes.parent_process_exec',"^.*\.*\/(.*)","\1"),if(isnotnull('Processes.parent_process_exec{}') AND match('Processes.parent_process_exec{}',"^.*(\.)(\\\|\/).*|.*(\\\|\/).*"),replace('Processes.parent_process_exec{}',"^.*\.*\/(.*)","\1"),coalesce('Processes.parent_process_exec','Processes.parent_process_exec{}')))
EVAL-parent_process_id = 'Processes.parent_process_id'
EVAL-process = 'Processes.process'
EVAL-process_exec = if(isnotnull('Processes.process_exec') AND match('Processes.process_exec',"^.*(\.)(\\\|\/).*|.*(\\\|\/).*"),replace('Processes.process_exec',"^.*\.*\/(.*)","\1"),if(isnotnull('Processes.process_exec{}') AND match('Processes.process_exec{}',"^.*(\.)(\\\|\/).*|.*(\\\|\/).*"),replace('Processes.process_exec{}',"^.*\.*\/(.*)","\1"),coalesce('Processes.process_exec','Processes.process_exec{}')))
EVAL-process_hash = 'Processes.process_hash'
EVAL-process_id = 'Processes.process_id'
EVAL-process_name = if(isnotnull('Processes.process_name') AND 'Processes.process_name'!="" AND NOT match('Processes.process_name',".*\s.*"),'Processes.process_name',if(isnotnull('Processes.process_exec') AND match('Processes.process_exec',"^.*(\.)(\\\|\/).*|.*(\\\|\/).*"),replace('Processes.process_exec',"^.*\.*\/(.*)","\1"),if(isnotnull('Processes.process_exec{}') AND match('Processes.process_exec{}',"^.*(\.)(\\\|\/).*|.*(\\\|\/).*"),mvdedup(replace('Processes.process_exec{}',"^.*\.*\/(.*)","\1")),coalesce('Processes.process_exec',mvdedup('Processes.process_exec{}')))))
EVAL-process_path = 'Processes.process_path'
EVAL-reason = case(('Processes.action'=="logon"), 'Processes.action')
EVAL-result = case(((isnotnull('All_Changes.command') AND NOT 'All_Changes.command'=="RecordUserSignIn" AND NOT 'All_Changes.object_category'=="ManagementRule" AND NOT 'All_Changes.object_category'=="Portal")), 'All_Changes.action')
EVAL-signature = case(('All_Changes.object_category'=="Portal"), 'All_Changes.action', ('Processes.action'=="logon"), 'Processes.description')
