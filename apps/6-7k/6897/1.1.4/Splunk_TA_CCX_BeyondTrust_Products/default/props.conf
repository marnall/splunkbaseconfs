# BeyondTrust Secure Remote Access

[beyondtrust:sra]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TRUNCATE = 150000
category = Structured
description = CCX BeyondTrust Secure Remote Access
disabled = false
pulldown_type = true

EVAL-action = 'status'
EVAL-app = case('event'=="login", "BeyondTrust:Secure Remote Access")
EVAL-signature = case('event'=="login", 'event'." - ".'who')
EVAL-src = case('event'=="login", 'who_ip')
EVAL-src_ip = case('event'=="login", 'who_ip')
EVAL-user = if(match('who', ".+\(([^\)]+)\).+"), replace('who', ".+\(([^\)]+)\).+", "\1"), null())
EVAL-vendor_product = "BeyondTrust:Secure Remote Access"
