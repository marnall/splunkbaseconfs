####PARSE SOURCETYPES BEYONDTRUST####

##Privileged Remote Access (PRA)##
[ccx:beyondtrust:privilegedremoteaccess]
REGEX = \{\"who_ip\"\:\".*\"\,\"who\"\:\"
FORMAT = sourcetype::ccx:beyondtrust:privilegedremoteaccess
DEST_KEY = MetaData:Sourcetype

##BeyondInsight Password Safe##
[set_beyondinsight_passwordsafe]
SOURCE_KEY = MetaData:Source
REGEX = http:beyondinsight_passwordsafe
FORMAT = sourcetype::ccx:beyondinsight:passwordsafe
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

[set_beyondtrust_privilegedmanagementcloud]
SOURCE_KEY = MetaData:Source
REGEX = pm-cloud-siem
FORMAT = sourcetype::ccx:beyondtrust:privilegedmanagementcloud
DEST_KEY = MetaData:Sourcetype
WRITE_META = true

####LOOKUPS####
[ccx_beyondtrust_events_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_beyondtrust_events_lookup.csv

[ccx_beyondinsight_psafe_eventname_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_beyondinsight_psafe_eventname_lookup.csv

[ccx_beyondinsight_psafe_result_lookup]
batch_index_query = 0
case_sensitive_match = 0
filename = ccx_beyondinsight_psafe_result_lookup.csv

