[ccx_beyondtrust_pra_change]
search = (sourcetype="ccx:beyondtrust:privilegedremoteaccess") dataset_name="change"
#tags = change

[ccx_beyondtrust_pra_authentication]
search = (sourcetype="ccx:beyondtrust:privilegedremoteaccess") dataset_name="authentication"
#tags = authentication

[ccx_beyondtrust_pra_authentication_privileged]
search = (sourcetype="ccx:beyondtrust:privilegedremoteaccess") dataset_name="authentication" privileged="true"
#tags = privileged

[ccx_beyondtrust_pra_logout]
search = (sourcetype="ccx:beyondtrust:privilegedremoteaccess") dataset_name="logout"

[ccx_beyondtrust_pra_alert]
search = (sourcetype="ccx:beyondtrust:privilegedremoteaccess") dataset_name="alert"
#tags alert

[ccx_beyondtrust_pra_general_report]
search = (sourcetype="ccx:beyondtrust:privilegedremoteaccess") NOT (dataset_name="*" OR event="token")

[ccx_beyondtrust_pra_general_token_events]
search = (sourcetype="ccx:beyondtrust:privilegedremoteaccess") event="token"

[ccx_beyondinsight_password_safe_alert]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") AND (dataset_name="alert" OR dataset_name="change_alert")
#tags = alert

[ccx_beyondinsight_password_safe_authentication]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") AND (dataset_name="auth")
#tags = authentication

[ccx_beyondinsight_password_safe_change]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") AND (dataset_name="change" OR dataset_name="change_alert")
#tags = change

[ccx_beyondinsight_password_safe_logout]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") AND (dataset_name="logout")

[ccx_beyondinsight_password_safe_session_end]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") AND (dataset_name="session_end")

[ccx_beyondinsight_password_safe_system]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") AND (dataset_name="system")

[ccx_beyondinsight_password_safe_test]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") AND (dataset_name="test")

[ccx_beyondinsight_password_safe_validate]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") AND (dataset_name="validate")

[ccx_beyondinsight_password_safe_event_forwarder]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") Category="Event Forwarder"

[ccx_beyondinsight_password_safe_net_traffic]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") AND ObjectType="Session"
#tags = network communicate

[ccx_beyondinsight_password_safe_malware_operations]
search = (sourcetype="ccx:beyondinsight:passwordsafe" OR source="http:beyondinsight_passwordsafe") AND file_hash="*"
#tags = malware operations

# BeyondTrust Privilege Management Cloud

[ccx_beyondtrust_pm_alert]
search = (sourcetype="ccx:beyondtrust:privilegedmanagementcloud") (All_Changes.object_category="Portal")
# tags = alert

[ccx_beyondtrust_pm_auth_login]
search = (sourcetype="ccx:beyondtrust:privilegedmanagementcloud") Processes.action="logon"
# tags = authentication

[ccx_beyondtrust_pm_change]
search = (sourcetype="ccx:beyondtrust:privilegedmanagementcloud") (All_Changes.command=* AND NOT All_Changes.command=RecordUserSignIn AND NOT All_Changes.object_category="ManagementRule" AND NOT All_Changes.object_category="Portal")
# tags = change

[ccx_beyondtrust_pm_endpoint_processes]
search = (sourcetype="ccx:beyondtrust:privilegedmanagementcloud") (Processes.description=* AND NOT Processes.action="logon")
# tags = process report

[ccx_beyondtrust_pm_management_rule]
search = (sourcetype="ccx:beyondtrust:privilegedmanagementcloud") (All_Changes.object_category="ManagementRule")

[ccx_beyondtrust_pm_record_user_signin]
search = (sourcetype="ccx:beyondtrust:privilegedmanagementcloud") All_Changes.command=RecordUserSignIn

[ccx_beyondtrust_pm_sendtocomputers]
search = (sourcetype="ccx:beyondtrust:privilegedmanagementcloud") (All_Changes.object_category="PolicyRevision" AND All_Changes.action="SendToComputers")


# BeyondTrust Secure Remote Access

[ccx_beyondtrust_sra_authentication]
search = (sourcetype="beyondtrust:sra") event="login"
# tags = authentication

[ccx_beyondtrust_sra_logout]
search = (sourcetype="beyondtrust:sra") event="logout"
