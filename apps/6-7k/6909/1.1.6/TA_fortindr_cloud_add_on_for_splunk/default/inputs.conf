[fortindr_cloud_entities]
start_by_shell = false
python.version = python3
sourcetype = FortiNDRCloud:Entities
interval = 900
fetch_pdns = False
fetch_dhcp = False
fetch_vt = False
disabled = 0

[fortindr_cloud_events]
start_by_shell = false
python.version = python3
sourcetype = FortiNDRCloud:Events
interval = 900
aws_bucket_name = fortindr-cloud-metastream
event_types = ['observation', 'suricata']
disabled = 0

[fortindr_cloud_detections]
start_by_shell = false
python.version = python3
sourcetype = FortiNDRCloud:Detections
interval = 300
polling_delay = 10
status = active
severity_levels = ['low', 'moderate', 'high']
confidence_levels = ['low', 'moderate', 'high']
pull_muted_rules = false
pull_muted_devices = false
pull_muted_detections = false
include_description = False
include_signature = False
include_pdns = False
include_annotations = False
include_events = False
disabled = 0

