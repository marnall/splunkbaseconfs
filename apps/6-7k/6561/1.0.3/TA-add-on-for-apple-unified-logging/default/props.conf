[logd]
SHOULD_LINEMERGE = false
category = Splunk App Add-on Builder
pulldown_type = 1
LINE_BREAKER = ([\r\n]+)\{"traceID":
NO_BINARY_CHECK = true
disabled = false
BREAK_ONLY_BEFORE_DATE = 
EXTRACT-user = ^\s+(?P<user>\w+)\s+:\s+TTY=
EXTRACT-user_id = (userID:|uid\s+)(?P<user_id>\d+)
EXTRACT-user_password_changed = ^Password\s+changed\s+for\s+(?P<user>\S+)
EXTRACT-auth-failed-for-user = Authentication\s+failed\s+for\s+(?P<user>\S+)
EXTRACT-kerberospassword-for-user = (Failed|Successful)\s+kerberos\s+password\s+verification\s+for\s+(?P<user>[\w+\.@_\-$]+)(,\s+)?(?P<reason>.+)?
EXTRACT-sandbox_action = ^(\d+\s+duplicate reports? for ){0,1}(Sandbox|System Policy):\s+(?<app>.+?)\(\d+\)\s+(?P<sandbox_action>[\w]+)\(\d+\)\s+(?P<sandbox_deny_type>\S+)\s+(?P<sandbox_path>.+)
EXTRACT-failed_to_authenticate_user = ^Failed to authenticate user <(?P<user>.+?)>\s+\((?P<reason>.+)?\)
EXTRACT-ssh_failed = ^error:\s+PAM:\s+authentication\s+error\s+for\s+(?P<user>\S+)\s+from\s+(?P<src>.+)
EXTRACT-ssh_sucess = ^Accepted\s+(?P<authentication_method>\S+)\s+for\s+(?P<user>\S+)\s+from\s+(?P<src>.+)
EXTRACT-sudo_tty_user = ^\s+(?P<user>\S+)\s+:\s+TTY=
EVAL-dest = if(isnull(dest), host, dest)
EVAL-process_id = tonumber(process_id)
FIELDALIAS-process = CFBundleExecutablePath AS process, CFBundleName AS process_name, pid AS process_id, CFBundleExecutablePath AS process_path, logd_processImagePath as parent_process, logd_processID as parent_process_id
LOOKUP-macos_cim_enrichment = macos_cim_enrichment logd_eventMessage AS _raw logd_eventMessage_supp AS _raw logd_processImagePath AS logd_processImagePath OUTPUTNEW out_action AS action out_app AS app out_authentication_method AS authentication_method
LOOKUP-macos_identities = macos_identities host AS host user_id AS user_id OUTPUTNEW user AS user

