[sophos_endpoints_lookup_from_index]
cron_schedule = 0 * * * *
description = Update Endpoints (aggregated by value) from index to sophos_endpoints lookup
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = TA-sophos-central-addon-for-splunk
request.ui_dispatch_view = search
search = `sophos_central_idx` sourcetype="sophos_endpoints"| spath output=associatedPerson_id path=associatedPerson.id | spath output=associatedPerson_name path=associatedPerson.name | spath output=associatedPerson_viaLogin path=associatedPerson.viaLogin | spath output=health_overall path=health.overall | spath output=health_threats_status path=health.threats.status | spath output=health_services_status path=health.services.status | spath output=ipv4Addresses path=ipv4Addresses{0} | spath output=ipv6Addresses path=ipv6Addresses{0} | spath output=macAddresses path=macAddresses{0} | spath output=os_build path=os.build | spath output=os_isServer path=os.isServer | spath output=os_majorVersion path=os.majorVersion | spath output=os_minorVersion path=os.minorVersion | spath output=os_platform path=os.platform | spath output=tenant_id path=tenant.id | spath output=health_services_serviceDetails path=health.services.serviceDetails{}.status | spath output=endpoint_id path=id | rex field=associatedPerson.viaLogin (?<fqdn>.*)\\\ | eval tamper_protection_status=case(tamperProtectionEnabled == "false", "Inactive", tamperProtectionEnabled == "true", "Active") | table endpoint_id associatedPerson_id associatedPerson_name associatedPerson_viaLogin health_overall health_services_status health_threats_status ipv4Addresses ipv6Addresses macAddresses os_build os_isServer os_majorVersion os_minorVersion os_platform tenant_id id hostname lastSeenAt type tamper_protection_status health_services_serviceDetails fqdn | outputlookup sophos_endpoints key_field=id
