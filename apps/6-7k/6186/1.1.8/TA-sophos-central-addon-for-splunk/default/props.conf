
[sophos_alerts]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TIME_PREFIX = "raisedAt":

[sophos_events]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TIME_PREFIX = "created_at|when|rt":
FIELDALIAS-sophos_events_parent_process_id = "amsi_threat_data.parentProcessId" ASNEW parent_process_id
FIELDALIAS-sophos_events_parent_process_path = "amsi_threat_data.parentProcessPath" ASNEW parent_process_path
FIELDALIAS-sophos_events_process_id = "amsi_threat_data.processId" ASNEW process_id
FIELDALIAS-sophos_events_process_name = "amsi_threat_data.processName" ASNEW process_name
FIELDALIAS-sophos_events_process_path = "amsi_threat_data.processPath" ASNEW process_path
FIELDALIAS-sophos_events_date = "created_at" ASNEW date
FIELDALIAS-sophos_events_src = "source_info.ip" ASNEW src 
FIELDALIAS-sophos_events_signature = "threat" ASNEW signature
FIELDALIAS-sophos_events_user = "user_id" ASNEW user
FIELDALIAS-sophos_events_src_user = "user_id" ASNEW src_user

[sophos_tenants]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[sophos_endpoints]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[source::...ta-sophos-central-addon-for-splunk*.log*]
sourcetype = tasophoscentraladdonforsplunk:log

