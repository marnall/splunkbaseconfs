[author=PhilMeyerson]
company = NASA Earth Science Mission, Operations Project Office, EOS Networks & Security
email = phillip.j.meyerson@nasa.gov

[author=SarahDietrich]
company = NASA Earth Science Mission, Operations Project Office, EOS Networks & Security
email = sarah.b.dietrich@nasa.gov

[id]
version = 2.3.5

[install]
allows_disable = true
build = 1633115143
is_configured = False
python.version = python3
state = enabled

[launcher]
author = phillip.j.meyerson@nasa.gov, sarah.b.dietrich@nasa.gov
description = Compile Aggregated Inventory from already ingested data
version = 2.3.5

[package]
