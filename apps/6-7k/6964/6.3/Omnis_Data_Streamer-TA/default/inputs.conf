# SAMPLE monitor stanza to read netscout NSA logs written to disk by your syslog service (e.g. syslog-ng or rsyslog)

[monitor:///path/to/your/logs/hostname/]
disabled = true
host_segment = 5
index = netscoutods
sourcetype = netscout:ods

