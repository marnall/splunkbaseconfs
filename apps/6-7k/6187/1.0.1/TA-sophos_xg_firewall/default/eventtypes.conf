[sophosxg_idx]
search = index=main

[sophosxg_authentication]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event log_type="Event" (log_component="Firewall Authentication" OR log_component="My Account Authentication" OR log_component="Dial-In Authentication" OR log_component="VPN Authentication" OR log_component="SSL VPN Authentication" OR log_component="GUI" OR log_component="Web Application Firewall" OR log_component="CTA" OR log_component="Appliance" OR log_component="External Authentication")
#tags = authentication

[sophosxg_email_anti_spam]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:anti_spam log_type="Anti-Spam" (log_component="SMTP" OR log_component="SMTPS")
#tags = email

[sophosxg_email_anti_virus]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:anti_virus log_type="Anti-Virus" (log_component="SMTP" OR log_component="SMTPS")
#tags = email

[sophosxg_firewall]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:firewall log_type="Firewall"
#tags = network communicate

[sophosxg_vpn]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:event log_type="Event" (log_component="SSL VPN" OR log_component="IPsec" OR log_component="L2TP" OR log_component="PPTP") log_subtype="System"
#tags = network session vpn

[sophosxg_system_health]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:system_health log_type="System Health"
#tags = performance

[sophosxg_system_health_cpu]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:system_health log_type="System Health" log_component="CPU"
#tags = cpu

[sophosxg_system_health_memory]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:system_health log_type="System Health" log_component="Memory"
#tags = memory

[sophosxg_http_anti_virus]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:anti_virus log_type="Anti-Virus" (log_component="HTTP" OR log_component="HTTPS")
#tags = web

[sophosxg_web_content_policy]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:content_filtering log_type="Content Filtering" log_component="Web Content Policy" log_subtype="Alert"
#tags = web

[sophosxg_web_filter]
search = eventtype=sophosxg_idx sourcetype=sophos:xg:content_filtering log_type="Content Filtering" log_component="HTTP"
#tags = web