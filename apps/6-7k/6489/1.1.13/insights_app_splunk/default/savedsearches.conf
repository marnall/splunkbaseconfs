[splunk_introspection_index_size_idx_summary_trackero]
cron_schedule = 40 0 * * *
description = Index Size BY Cluster and Index Tracker Job Summary Index - [Daily - 00:40]
dispatch.earliest_time = -1d@d
dispatch.latest_time = -0d@d
dispatch.ttl = 600
search = | tstats \
`ia4s_comment(" In order to backfill the summary index: \
1. Remove earliest and latest from the first line \
2. remove the | search NOT [...] code toward the bottom \
3. Adjust your time to whatever you like to backfill, for example use Last 30 Days etc...")` \
    Max(data.bucket_dirs.home.warm_bucket_size) AS warm_bucket_size\
    Max(data.bucket_dirs.cold.bucket_size) AS cold_bucket_size\
    Max(data.datamodel_summary_size) AS datamodel_summary_size\
    Max(data.total_size) AS total_size\
    Where index=_introspection sourcetype=splunk_disk_objects data.total_size > 0\
    earliest=-1d@d latest=-0d@d \
    BY _time, component, host, data.name \
| `drop_dm_object_name(data)` \
| where component="Indexes"\
| rename host AS Splunk_Instance , name AS Index_Name \
| fields _time Splunk_Instance Index_Name warm_bucket_size cold_bucket_size datamodel_summary_size total_size \
| bin _time Span=1d \
| stats LATEST(eval(round(total_size * 1024 * 1024,0))) AS total_size LATEST(eval(round((total_size * 1024 * 1024) - (cold_bucket_size * 1024 * 1024),0))) AS home_bucket_size LATEST(eval(round(warm_bucket_size * 1024,0))) AS warm_bucket_size LATEST(eval(round(cold_bucket_size * 1024 * 1024,0))) AS cold_bucket_size LATEST(eval(round(datamodel_summary_size * 1024 * 1024,0))) AS datamodel_summary_size BY _time Splunk_Instance Index_Name \
| `get_idxcluster_label(Splunk_Instance)` \
| where Splunk_Roles = "indexer"\
| stats SUM(total_size) AS total_size SUM(home_bucket_size) AS home_bucket_size SUM(warm_bucket_size) AS warm_bucket_size SUM(cold_bucket_size) AS cold_bucket_size SUM(datamodel_summary_size) AS datamodel_summary_size VALUES(Splunk_Instance) AS Splunk_Instance VALUES(Splunk_Roles) AS Splunk_Roles BY _time, idxcluster_label, Index_Name \
| fillnull value=0 \
| foreach Splunk_Roles, Splunk_Instance [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| table _time, idxcluster_label, Splunk_Roles, Splunk_Instance, Index_Name, total_size, home_bucket_size, warm_bucket_size, cold_bucket_size, datamodel_summary_size \
| where idxcluster_label != "No-idxcluster_label" \
| search NOT [ search `setup_summary_index` source=splunk_introspection_index_size_idx_summary_tracker earliest=-1d@d latest=-0d@d | fields _time, idxcluster_label, Index_Name ] \
| collect `setup_summary_index` source=splunk_introspection_index_size_idx_summary_tracker testmode=false\
| eval data="splunk_introspection_index_size_idx_summary_tracker" | stats count by data

