[splunk_assets_cloud_summary_data_old]
cron_schedule = 3 */4 * * *
description = Splunk Cloud Assets Discovery KV Store Gen Job From REST - [Every 4th Hour]
dispatch.earliest_time = -1s
dispatch.latest_time = now
dispatch.ttl = 600
run_on_startup = 1
search = | rest /servicesNS/-/-/cluster/config splunk_server=idx-* \
| rename splunk_server AS Splunk_Instance \
| eval _time = now() \
| fields Splunk_Instance cluster_label \
| append \
    [| tstats LATEST(_time) AS _time LATEST(dns_alt_name) AS dns_alt_name LATEST(sh_label) AS sh_label \
        Where index=_introspection sourcetype=splunk_resource_usage data.process_type=search host IN (idx-*,sh-*,idm-*,c0m1-*) earliest=-24h \
        BY host \
    | rename host AS Splunk_Instance \
    | rex field=dns_alt_name mode=sed "s/^sh\d+,//g" \
    | fields _time Splunk_Instance dns_alt_name sh_label ] \
| append \
    [| tstats LATEST(_time) AS _time Where index=_introspection sourcetype=splunk_resource_usage data.process_type=search NOT data.search_props.search_head IN (sh-*,idm-*,c0m1-*) AND host=idx-* earliest=-24h BY data.search_props.search_head \
    | rename data.search_props.search_head AS Splunk_Instance \
    | eval hybrid="yes" \
    | fields _time, Splunk_Instance, hybrid ] \
| append \
    [ search `setup_summary_index_list` source=splunk_rest_assets_summary_data Splunk_Roles=heavy_forwarder earliest=-24h \
    | stats LATEST(_time) AS _time BY Splunk_Instance \
    | eval heavy_forwarder="yes" \
    | fields _time Splunk_Instance, heavy_forwarder] \
| eval Splunk_Roles = Case(\
    match(Splunk_Instance, "^idm-"), "idm",\
    match(Splunk_Instance, "^c0m1-"), "cluster_manager",\
    match(Splunk_Instance, "^idx-"), "indexer",\
    match(Splunk_Instance, "^sh-"), "search_head",\
    hybrid="yes", "search_head",\
    heavy_forwarder="yes", "heavy_forwarder",\
    TRUE(), "search_head") \
| eval label = Case ( \
    Match(Splunk_Instance, "^idm-"), "idm",\
    Match(Splunk_Instance, "^c0m1-"), "cm",\
    match(Splunk_Instance, "^sh-"), dns_alt_name,\
    match(Splunk_Instance, "^idx-"), cluster_label,\
    hybrid="yes" OR heavy_forwarder="yes", lower(Splunk_Instance),\
    True(), "other") \
| eval Splunk_Instance=lower(Splunk_Instance) , label=lower(label)\
| streamstats dc(Splunk_Instance) AS count BY label \
| eval label = if(match(label,"^idm"), label . "-" . count , label) \
| stats LAST(label) AS label LAST(Splunk_Roles) AS Splunk_Roles LAST(sh_label) AS sh_label LATEST(_time) AS _time BY Splunk_Instance \
| eval label = if(isnull(label) OR label="", Splunk_Instance, label) \
| table _time Splunk_Instance label sh_label Splunk_Roles \
| outputlookup splunk_assets_discovery_kv_store_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
| collect `setup_summary_index` source=splunk_assets_cloud_summary_data testmode=false

[splunk_internal_index_license_usage_idx_summary_trackero]
cron_schedule = 0 */1 * * *
description = Total License Usage BY Cluster BY Index Tracker Job Summary Index - [At minute 0 past every hour]
dispatch.earliest_time = -1d@d
dispatch.latest_time = now
dispatch.ttl = 600
realtime_schedule = 0
search = index=_internal sourcetype=splunkd component=LicenseUsage type=Usage `setup_license_manager_search` b > 0 earliest=-1h@h latest=-0h@h \
| rename i AS Indexer_GUID idx AS Index_Name h AS Lic_Host s AS Lic_Source st AS Lic_Sourcetype b AS License_Usage o AS Lic_O pool AS Lic_Pool poolsz AS Lic_Pool_Size \
| fields _time Indexer_GUID Index_Name Lic_Host Lic_Source Lic_O Lic_Sourcetype License_Usage Lic_Pool Lic_Pool_Size \
\
`ia4s_comment(" In order to backfill the summary index: \
1. Remove earliest and latest from the first line \
2. remove the | search NOT [...] code toward the bottom \
3. Adjust your time to whatever you like to backfill, for example use Last 30 Days etc...")` \
\
| eval\
    Lic_Host = if(len(Lic_Host)=0 OR isnull(Lic_Host), "(SQUASHED)", Lic_Host),\
    Lic_Source = if(len(Lic_Source)=0 OR isnull(Lic_Source), "(SQUASHED)", Lic_Source), \
    Index_Name = if(len(Index_Name)=0 OR isnull(Index_Name), "(UNKNOWN)", Index_Name),\
    Index_Name = if(Index_Name="default", "main", Index_Name) \
| `get_instance_name(Indexer_GUID)` \
| `get_idxcluster_label_guid(Indexer_GUID)` \
| `get_custom_group(Splunk_Instance)` \
| eval idxcluster_label = if(isnull(idxcluster_label) OR idxcluster_label="", Custom_Groups, idxcluster_label) \
| eval idxcluster_label = if(isnull(idxcluster_label) OR idxcluster_label="", Splunk_Instance, idxcluster_label) \
| eval idxcluster_label = if(isnull(idxcluster_label) OR idxcluster_label="", "other", idxcluster_label) \
| bin _time span=1h \
| stats \
    LATEST(Lic_Pool_Size) AS Lic_Pool_Size\
    sum(License_Usage) AS License_Usage\
    VALUES(Indexer_GUID) AS Indexer_GUID\
    BY _time idxcluster_label Lic_Pool Lic_Source Lic_Sourcetype Lic_Host Index_Name \
| stats \
    VALUES(Lic_Source) AS Lic_Source\
    VALUES(Lic_Host) AS Lic_Host\
    LATEST(Lic_Pool_Size) AS Lic_Pool_Size\
    sum(License_Usage) AS License_Usage\
    VALUES(Indexer_GUID) AS Indexer_GUID \
    BY _time idxcluster_label Lic_Pool Index_Name Lic_Sourcetype \
| eval type = "Usage" \
| foreach Lic_Source, Lic_Host, Indexer_GUID \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| table _time, idxcluster_label, Lic_Pool, Lic_Pool_Size, type, Index_Name, Lic_Sourcetype, Lic_Source, Lic_Host, License_Usage, Indexer_GUID \
| where idxcluster_label != "No-idxcluster_label" \
| search NOT \
    [ search `setup_summary_index` source=splunk_internal_index_license_usage_idx_summary_tracker earliest=-1h@h latest=now \
    | fields _time idxcluster_label Lic_Pool Index_Name Lic_Sourcetype] \
| collect `setup_summary_index` source=splunk_internal_index_license_usage_idx_summary_tracker testmode=false \
| eval data="splunk_internal_index_license_usage_idx_summary_tracker" \
| stats count by data

[splunk_audit_user_login_idx_summary_trackerr]
cron_schedule = 4-59/5 * * * *
description = User Login Activities Tracker Job Summary Index - [At every 5th minute from 4 through 59]
dispatch.earliest_time = -10m@m
dispatch.latest_time = -5m@m
dispatch.ttl = 600
search = ( (index=_audit sourcetype=audittrail) AND (user=* "action=login attempt" info=succeeded) NOT user IN (internal_*,index-manager,int_*,splunk-system-user) `setup_search_head_search` ) OR (index=_audit sourcetype=audittrail user=* NOT user IN ("n/a",splunk-system-user) action=search info=granted search_id!="rsa_*" search=* NOT user IN (admin,internal_*,index-manager,int_*,splunk-system-user) `setup_search_head_search` ) OR (index=_internal sourcetype=splunkd_ui_access useragent=* status=200 user!="-" NOT user IN (admin,internal_*,index-manager,int_*,splunk-system-user) `setup_search_head_search` ) \
| fields _time, host, search_type, search_id, user, useragent, info, index, sourcetype, login_source, clientip, status, src, workload_pool \
\
`ia4s_comment("In order to backfill the summary index: 1. Adjust your time to whatever you like to backfill, for example use Last 30 Days etc...")` \
\
| eval search_type = if(match(search_id, "\d{10}\.\d+(_[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12})?$"), "adhoc", "other") \
| where info="succeeded" OR search_type="adhoc" OR (index="_internal" AND sourcetype="splunkd_ui_access" AND isnotnull(useragent) AND status="200" AND user!="-") \
| rex field=useragent "(?<Browser_and_Version>(MSIE|Trident|(?!Gecko.+)Firefox|(?!AppleWebKit.+Chrome.+)Safari(?!.+Edge)|(?!AppleWebKit.+)Chrome(?!.+Edge)|(?!AppleWebKit.+Chrome.+Safari.+)Edge|AppleWebKit(?!.+Chrome|.+Safari)|Gecko(?!.+Firefox))(?: |\/)([\d\.apre]+)|Splunk.*?\s|^Chrome.*|^Go-http.*|^Prometheus.*|^REST.*|^Ruby|^curl.*|^[pP]ython.*|^splunk.*|^AdvancedInstaller|^Microsoft.*|^Postman.*|^Vault.*|^go-resty.*)" \
| rex field=Browser_and_Version "(?<browser_name1>^.*?)/" \
| rex field=Browser_and_Version "(?<browser_name2>.*)" \
| rex field=Browser_and_Version "/(?<browser_version1>.*?)$" \
| rex field=Browser_and_Version "\s+(?<browser_version2>.*?)$" \
| rex field=useragent "Edg\/(?<browser_version3>.*?)$" \
| rex field=useragent "(Version/|iPhone\sOS\s)(?<Safari_Version>.*?)\s" \
| rex field=useragent "(?<os_arch>(Win64|x86_64))" \
| rex field=useragent "(?<os_name>(Linux|Macintosh|Windows\s*\w+|iPhone|iPad))" \
| rex field=useragent "(Linux\s|Macintosh;\s|i\w+;\s|Windows\sNT\s)(?<os_version>.*?)[;)]" \
| eval \
    browser_name = coalesce(browser_name1,browser_name2),\
    browser_name = if(match(useragent, "Edg\/\d+"), "Microsoft Edge", browser_name), \
    browser_name = if(match(browser_name, "Trident|MSIE"), "Internet Explorer", browser_name), \
    browser_version = coalesce(browser_version1,browser_version2),\
    browser_version = if(isnotnull(Safari_Version), Safari_Version, browser_version), \
    browser_version = if(browser_name = "Microsoft Edge", browser_version3, browser_version), \
    os_name = case ( \
    match(useragent,"Windows NT 6.1"), "Windows 7", \
    match(useragent,"Windows NT 6.2"), "Windows 8", \
    match(useragent,"Windows NT 6.3"), "Windows 8.1", \
    match(useragent,"Windows NT 10.0"), "Windows 10", \
    match(useragent,"Pixel"), "Google Pixel", \
    match(useragent,"Android"), "Android", \
    true(), os_name ), \
    Splunk_Instance = trim(lower(host)), \
    login_source = lower(src), \
    login_source = mvsort(mvdedup((mvappend(login_source, clientip)))), \
    login_source = trim(login_source, "\"") \
| `get_cluster_label(Splunk_Instance)` \
| bin _time span=5m \
| stats \
    LATEST(login_source) AS login_source\
    LATEST(os_name) AS os_name\
    LATEST(os_version) AS os_version\
    LATEST(browser_name) AS browser_name\
    LATEST(browser_version) AS browser_version\
    LATEST(os_arch) AS os_arch\
    LATEST(workload_pool) AS workload_pool\
    VALUES(Splunk_Roles) AS Splunk_Roles\
    BY _time, cluster_label, Splunk_Instance, user \
| eval \
    login_source = mvfilter ( ! match (login_source,"127.0.0.1|\*|unspecified|<ip>") ),\
    os_name = mvfilter ( ! match (os_name,"\*") ),\
    os_version = mvfilter ( ! match (os_version,"\*") ),\
    browser_name = mvfilter ( ! match (browser_name,"\*") ),\
    browser_version = mvfilter ( ! match (browser_version,"\*") ) \
| eval workload_pool = if(workload_pool="undefined" OR isnull(workload_pool), "standard_perf", workload_pool) \
| foreach Splunk_Roles \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| table _time, cluster_label, Splunk_Roles, Splunk_Instance, user, login_source, os_name, os_version, browser_name, browser_version, os_arch, workload_pool \
| search NOT \
    [ search `setup_summary_index` source=splunk_audit_user_login_idx_summary_tracker earliest=-15m@m latest=now \
    | fields _time cluster_label, Splunk_Instance, user ] \
| collect `setup_summary_index` source=splunk_audit_user_login_idx_summary_tracker testmode=false \
| eval data="splunk_audit_user_login_idx_summary_tracker" \
| stats count by data

[splunk_internal_scheduler_jobs_idx_summary_trackerr]
cron_schedule = 3-58/5 * * * *
description = Schedule Executions racker Job Summary Index - [At every 5th minute from 3 through 55]
dispatch.earliest_time = -10m@m
dispatch.latest_time = -5m@m
dispatch.ttl = 600
search = index=_internal sourcetype=scheduler `setup_search_head_search` app!=splunk_archiver \
| fields _time, host, sid, savedsearch_name, app, user, scheduled_time, priority, dispatch_time, window_time, run_time, result_count, status, concurrency_category, concurrency_context, concurrency_limit, reason, alert_actions, workload_pool, search_type, skipped_count \
\
`ia4s_comment(" In order to backfill the summary index: Adjust your time to whatever you like to backfill, for example use Last 30 Days and run the job")` \
\
