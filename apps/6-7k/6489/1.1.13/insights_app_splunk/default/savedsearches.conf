    scheduleStartDate = spath(records,"scheduleStartDate"),\
    scheduleEndDate = spath(records,"scheduleEndDate"),\
    elearningStartDate = spath(records,"elearningStartDate"),\
    eLearningLastAccessedDate = spath(records,"eLearningLastAccessedDate"),\
    registrationTimeStamp = spath(records,"registrationTimeStamp"),\
    passed = spath(records,"passed"),\
    SCORMLessonStatus = spath(records,"SCORMLessonStatus"),\
