| foreach registrationEnteredDate elearningCompletionDate scheduleStartDate scheduleEndDate elearningStartDate eLearningLastAccessedDate registrationTimeStamp [ eval <<FIELD>>=strptime('<<FIELD>>',"%m/%d/%Y")] \
| table _time registrationID firstName lastName email domainName classType courseName attended registrationStatus registrationEnteredDate registrationTimeStamp elearningStartDate elearningCompletionDate eLearningLastAccessedDate scheduleID scheduleStartDate scheduleEndDate passed SCORMLessonStatus \
