[splunk_assets_cloud_summary_data_genr]
cron_schedule = 3 */4 * * *
description = Splunk Cloud Assets Discovery KV Store Gen Job From REST - [Every 4th Hour]
dispatch.earliest_time = -1s
dispatch.latest_time = now
dispatch.ttl = 600
run_on_startup = 1
search = | tstats summariesonly=true \
    LATEST(_time) AS _time LATEST(dns_alt_name) AS dns_alt_name LATEST(sh_label) AS sh_label count AS num_events \
    Where index=_introspection sourcetype=splunk_resource_usage data.process_type=search host IN (idx-*,sh-*,idm-*,c0m1-*) earliest=-24h \
    BY host \
| rex field=dns_alt_name mode=sed "s/^sh\d+,//g" \
| eval label = Case ( \
    MATCH(dns_alt_name, "^es,"), "es",\
    MATCH(dns_alt_name, "^itsi,"), "itsi",\
    MATCH(host,"^idm-"), "idm",\
    MATCH(host,"^c0m1-"), "cm",\
    MATCH(host,"^idx-"), "idxc",\
    MATCH(sh_label, "shc"), sh_label,\
    True(), dns_alt_name) \
| eval role = Case(\
    MATCH(host,"^idm-"), "idm",\
    MATCH(host,"^c0m1-"), "cm",\
    MATCH(host,"^idx-"), "indexer",\
    TRUE(), "search_head") \
| append \
    [| tstats summariesonly=true LATEST(_time) AS _time Where index=_introspection sourcetype=splunk_resource_usage data.process_type=search NOT data.search_props.search_head IN (sh-*,idm-*,c0m1-*) AND host=idx-* earliest=-24h BY data.search_props.search_head \
    | rename data.search_props.search_head AS host \
    | eval role="search_head" , label="hybrid" \
    | fields _time, host, role, label ] \
| eval label = IF(ISNULL(label) OR label="", "hybrid", label) , fqdn = LOWER(host) \
| stats LATEST(label) AS label LATEST(role) AS role LATEST(sh_label) AS sh_label BY fqdn \
| rename fqdn as Splunk_Instance, role as Splunk_Roles \
| eval _time = now() \
| sort label Splunk_Instance \
| table _time label Splunk_Instance sh_label Splunk_Roles \
| outputlookup splunk_assets_discovery_kv_store_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
| collect `setup_summary_index` source=splunk_assets_cloud_summary_data testmode=false

