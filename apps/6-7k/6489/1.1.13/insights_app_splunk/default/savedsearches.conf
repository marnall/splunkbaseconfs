dispatch.earliest_time = -10m@m
dispatch.latest_time = -5m@m
dispatch.ttl = 600
search = (index=_internal sourcetype IN (splunkd_ui_access, splunkd_access) method IN (POST,DELETE) uri_path!="*/notify" uri IN ("*/saved/searches/*", "*/data/ui/views/*", "*/admin/macros/*", "*/saved/eventtypes/*", "*/data/lookup-table-files/*", "*/data/props/calcfields/*", "*/data/props/extractions/*", "*/data/props/fieldaliases/*", "*/data/props/lookups/*", "*/data/transforms/extractions/*", "*/data/transforms/lookups/*", "*/datamodel/model/*", "*/saved/sourcetypes/*", "*/authorization/roles/*", "*/authentication/users/*") NOT uri IN ("*/dispatch","*/splunk_app_infrastructure/*","*/__mlspl_*") NOT file IN ("_new","acl","Indicator*ITSI*Search","remove_suppression","dispatch") `setup_search_head_search` ) NOT Rigor NOT "/_reload"\
\
`ia4s_comment(" In order to backfill the summary index: 1. Adjust your time to whatever you like to backfill, for example use Last 30 Days etc...")` \
\
| fields _time host clientip file status uri user spent req_time sourcetype method \
| rename host AS Splunk_Instance , file AS Knowledge_Object , spent AS Duration , clientip AS Client_IP, status AS Change_Status , req_time AS Change_Time \
| eval user = lower(user) , Splunk_Instance = lower(Splunk_Instance) , user = if(user="nobody", "system", user), Change_Time = strptime(Change_Time, "%d/%b/%Y:%H:%M:%S.%3N %z") \
| `decode_field(Knowledge_Object)` \
| rex field=Knowledge_Object mode=sed "s/^.*(EVAL-|FIELDALIAS-|EXTRACT-|TRANSFORM-|LOOKUP-)//g" \
| eval Knowledge_Object_Type = case ( \
    match(uri, "saved\/searches"), "Reports_Alerts", \
