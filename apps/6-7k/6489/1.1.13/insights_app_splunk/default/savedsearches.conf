[splunk_bundlefiles_command_summary_trackerr]
cron_schedule = 7 */1 * * *
description = Bundle Files Tracker Job Summary Index using the Admin Helper | bundlefiles command - [At minute 7 past every hour]
dispatch.earliest_time = -1s@s
dispatch.latest_time = now
dispatch.ttl = 600
search = | bundlefiles bundle=latest \
| `get_shcluster_label(host)` \
| stats max(bytes) as bytes values(kvstore_app) as kvstore_app values(kvstore_collection) as kvstore_collection by shcluster_label, app, path \
| rex field=path "(?<folder>(apps|users|system))" \
| rex field=path "(apps|users|system)\/\S+\/(?<file_name>.*)" \
| eval file_name_tmp=lower(file_name) \
| rex field=file_name_tmp "\.(?<file_ext>\w+$)" \
| eval file_name = if(isnull(file_name) AND isnotnull(kvstore_collection), kvstore_collection, file_name) \
| eval folder = if(isnull(folder) AND isnotnull(kvstore_collection), "kvstore", folder) \
| eval file_ext = if(isnull(file_ext) AND isnotnull(kvstore_collection), "csv", file_ext) \
| fillnull value="other" file_ext file_name folder path \
| eventstats sum(bytes) as bundle_size_bytes \
| eval _time = now()\
| table _time, shcluster_label, app, file_name, path, bytes, kvstore_collection, kvstore_app, file_ext, folder, bundle_size_bytes \
| search NOT [ search `setup_summary_index` source=splunk_bundlefiles_command_summary_tracker earliest=-1h latest=now | fields _time shcluster_label, app, file_name, path ] \
