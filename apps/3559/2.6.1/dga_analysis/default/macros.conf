[domain_input]
definition = index=dga_proxy
iseval = 0

[dga_apply_features]
definition = | apply "dga_ngram"\
| apply "dga_pca"\
| fields - domain_tfidf* \
| `ut_shannon(domain)` \
| `ut_meaning(domain)` \
| eval ut_digit_ratio = 0.0 \
| eval ut_vowel_ratio = 0.0 \
| eval ut_domain_length = max(1,len(domain)) \
| rex field=domain max_match=0 "(?<digits>\d)" \
| rex field=domain max_match=0 "(?<vowels>[aeiou])" \
| eval ut_digit_ratio=if(isnull(digits),0.0,mvcount(digits) / ut_domain_length) \
| eval ut_vowel_ratio=if(isnull(vowels),0.0,mvcount(vowels) / ut_domain_length) \
| eval ut_consonant_ratio = max(0.0, 1.000000 - ut_digit_ratio - ut_vowel_ratio) \
| fields - digits - vowels
iseval = 0

[dga_create_tfidf_pca_model]
definition = fit TFIDF domain analyzer=char ngram_range=2-3 into "dga_ngram"\
| fit PCA domain_tfidf* k=3 into "dga_pca"\
| fields - domain_tfidf*
iseval = 0

[dga_create_ngram_model(2)]
args = in,out
definition = inputlookup $in$ | `dga_create_tfidf_pca_model` | stats count | eval setup_action="events processed into models \"dga_ngram\" and \"dga_pca\" to generate ngram based text features" | eval ignored="\"$out$\""
iseval = 0

[dga_create_full_features(2)]
args = in,out
definition = inputlookup $in$ `dga_apply_features` | sample partitions=2 | outputlookup $out$ | stats count | eval setup_action="events processed and written to lookup \"$out$\""
iseval = 0

[dga_create_validation(2)]
args = in,out
definition = inputlookup $in$ | apply "dga_randomforest" | chart count over subclass by "predicted(class)" | eval ratio=dga/(dga+legit+1) | sort ratio | outputlookup $out$
iseval = 0
