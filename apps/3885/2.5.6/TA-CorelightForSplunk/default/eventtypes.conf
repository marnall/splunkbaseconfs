# #::HDR:: ;; # App: TA-CorelightForSplunk ;; # File: eventtypes.conf ;; # Updated: 2023-09-05 17:27:37

[corelight_detections]
search = eventtype=corelight_idx sourcetype IN (corelight_detections)

[corelight_aggregations]
search = eventtype=corelight_idx sourcetype IN (corelight_suri_aggregations, corelight_suri_aggregations_hec)

[corelight_suri_aggregations]
search = eventtype=corelight_idx sourcetype IN (corelight_suri_aggregations)

[corelight_intel]
search = eventtype=corelight_idx sourcetype IN (corelight_intel, corelight_intel_red)

[corelight_idx]
search = index IN ( main )

[corelight_smb]
search = sourcetype IN (corelight_smb, corelight_smb_mapping, corelight_smb_files)

[corelight_metrics_bro]
search = sourcetype=corelight_corelight_metrics_bro

[corelight_metrics_iface]
search = sourcetype IN (corelight_corelight_metrics_iface, corelight_metrics_iface)

[corelight_metrics_system]
search = eventtype=corelight_idx sourcetype=corelight_corelight_metrics_system OR sourcetype="corelight_corelight_metrics_disk" OR sourcetype=corelight_corelight_metrics_memory

[corelight_conn]
search = (sourcetype=corelight_conn OR sourcetype=corelight_conn_red OR sourcetype=corelight_conn_agg)

[corelight_weird]
search = (sourcetype=corelight_weird OR sourcetype=corelight_weird_red OR sourcetype=corelight_weird_agg)

[corelight_files]
search = (sourcetype=corelight_files OR sourcetype=corelight_files_red OR sourcetype=corelight_files_agg)

[corelight_smtp]
search = sourcetype=corelight_smtp

[corelight_ssl]
search = (sourcetype=corelight_ssl OR sourcetype=corelight_ssl_red OR sourcetype=corelight_ssl_agg)

[corelight_x509]
search = (sourcetype=corelight_x509 OR sourcetype=corelight_x509_red)

[corelight_conn_base]
search = eventtype=corelight_ssl OR eventtype=corelight_files OR eventtype=corelight_smtp OR eventtype=corelight_dns OR eventtype=corelight_conn OR eventtype=corelight_http

[corelight_dns]
search = (sourcetype=corelight_dns OR sourcetype=corelight_dns_red OR sourcetype=corelight_dns_agg)

[corelight_http]
search = (sourcetype=corelight_http OR sourcetype=corelight_http_red OR sourcetype=corelight_http_agg)

[corelight_software]
search = (sourcetype=corelight_software)

[corelight_dhcp]
search = (sourcetype=corelight_dhcp)

[corelight_conn_session_start]
search = eventtype = corelight_conn NOT conn_state=SF NOT conn_state=RST* conn_state=*

[corelight_conn_session_end]
search = eventtype = corelight_conn conn_state=SF OR conn_state=RST*

[corelight_suri]
search = eventtype=corelight_idx (sourcetype=corelight_suricata_corelight OR sourcetype=corelight_suricata_corelight_hec)

[corelight_ssh]
search = sourcetype IN (corelight_ssh, corelight_ssh_red)