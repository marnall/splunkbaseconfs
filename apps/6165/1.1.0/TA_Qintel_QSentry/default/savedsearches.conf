[qintel_generate_network_intel]
cron_schedule = */5 * * * *
allow_skew = 50%
dispatch.earliest_time = -5m@m
dispatch.latest_time = now
enableSched = 1
search = | datamodel qsentry Network_Intel search | rename qsentry.Network_Intel.src_ip as src_ip | qsentry ip_field=src_ip \
| where isnotnull(qintel_tags) \
| `qsentry_geo_lookup` src_ip | `qintel_shrink_threat_fields` \
| table _time,sourcetype,host,src_ip,qintel_*,lat,lon \
| collect `qintel_index` marker="type=\"qintel_network_intel\", search_name=\"qintel_generate_network_intel\""

[qintel_qsentry_clean_cache]
description = "Clears old entries from the local Qintel QSentry cache"
action.summary_index = 1
action.summary_index.type = qintel_qsentry_cache_clear
cron_schedule = */5 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = now
enableSched = 1
search = | rest /services/qintel_qsentry/clean_cache
