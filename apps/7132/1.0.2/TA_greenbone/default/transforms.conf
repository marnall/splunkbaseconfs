#===========================================
# Add raw length to Meta Fields
#===========================================
[get_raw_length]
INGEST_EVAL = raw_length=len(_raw)

[detection_is_cisa_kev]
REGEX = (cisa\:\s+Known\s+Exploited\s+Vulnerability\s+\(KEV\)\s+catalog)
FORMAT = detection_is_cisa_kev::true
