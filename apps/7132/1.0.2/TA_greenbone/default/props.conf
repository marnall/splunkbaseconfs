# DO NOT EDIT THIS FILE!
# Please make all changes to files in $SPLUNK_HOME/etc/apps/TA_greenbone/local.
# To make changes, copy the section/stanza you want to change from $SPLUNK_HOME/etc/apps/TA_greenbone/default
# into ../local and edit there.
#
# TA_greenbone
# Simon Richardson
# props.conf

[(::){0}gvm:*]
TRANSFORMS-get_raw_length = get_raw_length
EVAL-vendor = "Greenbone"
EVAL-vendor_product = "Greenbone Community Edition"

[gvm:gsad]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
TIME_FORMAT = %Y-%m-%d %Hh%M.%S %Z:
TIME_PREFIX = gsad\s+(?<gsad_process>.+?)\:(?<severity>\w+)\:
MAX_TIMESTAMP_LOOKAHEAD = 25
SHOULD_LINEMERGE = false

EXTRACT-gsad_auth = Authentication\s+(?<action>\w+)\s+for\s+\'(?<user>.+?)\'\s+from\s+(?<src>\d+\.\d+\.\d+\.\d+)
EXTRACT-gsad_auth_status = .\s+Status\s+was\s+(?<auth_status>\d+)
EXTRACT-gsad_main = gsad\s+(?<gsad_process>.+?)\:(?<severity>\w+)\:.+?\:\s+[main\:\s]{0,}(?<message>.+)
EXTRACT-gsad_version = Starting\s+GSAD\s+version\s+(?<gsad_version>.+)$

FIELDALIAS-app = vendor_product AS app
FIELDALIAS-dest = host AS dest


[gvm:gvmd]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = none
ANNOTATE_PUNCT = false
TIME_FORMAT = %Y-%m-%d %Hh%M.%S %Z:
TIME_PREFIX = ^\w+\s+\w+\:[\s+]{0,}\w+\:
MAX_TIMESTAMP_LOOKAHEAD = 25
LINE_BREAKER = ^\w+\s+\w+\:[\s+]{0,}\w+\:\d+\-\d+\-\d+

EXTRACT-gvmd_alert_action = The\s+alert\s+(?<alert_name>.+?)was\s+(?<alert_action>\w+)\s\(Event\:\s+(?<alert_reason>.+?)\,\s+Condition\:\s+(?<alert_condition>.+?)\)
EXTRACT-gvmd_alert_activity = Alert\s+(?<alert_name>.+?)\s+\((?<alert_guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})\)\s+has\s+been\s+(?<alert_action>.+?)\s+by\s+(?<user>\w+)
EXTRACT-gvmd_credential_action = \:\s+Credential\s+(?<credential_name>.+?)\s+\((?<credential_guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})\)\s+has\s+been\s+(?<credential_action>.+?)\s+by\s+(?<user>.+?)$
EXTRACT-gvmd_main = ^(?<process>.+?)\:[\s+]{0,}\w+\:.+?\:\s+(?<message>.+)$
EXTRACT-gvmd_openpgp_version = Using\s+OpenPGP\s+engine\s+version\s+\'(?<openpgp_version>.+?)\'
EXTRACT-gvmd_schedule_action = \:\s+Schedule\s+(?<schedule_name>.+?)\s+\((?<schedule_guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})\)\s+has\s+been\s+(?<schedule_action>.+?)\s+by\s+(?<user>.+?)$
EXTRACT-gvmd_task_status = Status\s+of\s+task\s+(?<task_name>.+?)\s+\((?<task_guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})\).+?to\s+(?<task_status>.+)
EXTRACT-gvmd_task_update = Task\s+(?<task_name>.+?)\s+\((?<task_guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})\)\s+has\s+been\s+(?<task_action>\w+)\s+by\s+(?<user>\w+)
EXTRACT-gvmd_target_actions = \:\s+Target\s+(?<target>.+?)\s+\((?<target_guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})\).+?has\s+been\s+(?<target_action>\w+)\s+by\s+(?<user>\w+)
EXTRACT-gvmd_update_data = (?i)updating(?-i)\s+(?<update_data>[aA-zZ].+)
EXTRACT-gvmd_update_path = (?i)updating(?-i)\s+(?<update_path>\/.+)
EXTRACT-gvmd_update_status = Updating\s+(?<update_target>.+?)\s+(?<update_result>[failed|succeeded]{6,})
EXTRACT-gvmd_version = Greenbone\s+Vulnerability\s+Manager\s+version\s+(?<gvm_version>.+?)\s+\(DB revision (?<db_revision>\d+)\)


[gvm:notus]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
TIME_FORMAT = %Y-%m-%d %H:%M:%S,%3Q
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 25
SHOULD_LINEMERGE = false

EXTRACT-notus_main = notus-scanner\:\s+(?<severity>\w+)\:\s+\((?<process>.+)\)\s+(?<message>.+?)$

[gvm:openvas]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
TIME_FORMAT = %Y-%m-%d %Hh%M.%S %Z:
TIME_PREFIX = ^\w+\s+\w+\:[\s+]{0,}\w+\:
MAX_TIMESTAMP_LOOKAHEAD = 16
SHOULD_LINEMERGE = false

EXTRACT-openvas_guid_action = (?<guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})\s+(?<action>\w+)
EXTRACT-openvas_main = ^(?<process>.+?)\:(?<severity>\w+)\:.+?(?<guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})\:\s+(?<message>.+)$
EXTRACT-openvas_max_checks = max_checks\s+\=\s+(?<max_checks>\d+)
EXTRACT-openvas_max_hosts = max_hosts\s+\=\s+(?<max_hosts>\d+)
EXTRACT-openvas_scan_alive_hosts = seconds\:\s+(?<alive_hosts>\d+).+?of\s+(?<total_hosts>\d+)
EXTRACT-openvas_scan_targets = Target\s+has\s+(?<scan_targets>\d+)
EXTRACT-openvas_scan_time = finished\s+in\s+(?<scan_time_in_secs>\d+)
EXTRACT-openvas_target_hosts = hosts\:\s+(?<target_hosts>.+?)\,\swith

[gvm:ospd]
NO_BINARY_CHECK = true
CHARSET = UTF-8
KV_MODE = None
ANNOTATE_PUNCT = false
TIME_FORMAT = %Y-%m-%d %H:%M:%S,%3Q
TIME_PREFIX = \w+\[\d+\]\s+
MAX_TIMESTAMP_LOOKAHEAD = 25
SHOULD_LINEMERGE = false

EXTRACT-ospd_guid = (?<guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})
EXTRACT-ospd_host_guid = (?<host_guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})\:\s+(?i)host(?-i)
EXTRACT-ospd_main = (?<service>\w+)\[(?<pid>\d+)\].+?\:\s+(?<severity>.+?)\:\s+\((?<process>.+?)\)\s+(?<message>.+?)$
EXTRACT-ospd_scan_guid = (?i)scan(?-i)\s+(?<scan_guid>[\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12})
EXTRACT-ospd_queue_count = Currently\s+(?<queue_count>\d+)\s+queued\s+scans
EXTRACT-ospd_queue_position = [\w|\d]{8,8}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{4,4}\-[\w|\d]{12,12}\s+added\s+to\s+the\s+queue\s+in\s+position\s+(?<queue_position>\d+)
EXTRACT-ospd_vt_update = The\s+VT\s+cache\s+has\s+been\s+updated\s+from\s+version\s+(?<old_version>\d+)\s+to\s+(?<new_version>\d+)

[gvm:reports]
#Copied from official Greenbone App
KV_MODE = xml
LINE_BREAKER = (\<\/result\>)
NO_BINARY_CHECK = true
SEDCMD-alter1 = s/\n/ /g
SEDCMD-alter2 = s/\<\/results\>.*//g
SEDCMD-alter3 = s/.*\<results\ max\=\"[0-9]+\"\ start\=\"[0-9]+\">//g
SEDCMD-alter4 = s/\<\/overrides\>/&<\/result>/g
SEDCMD-alter5 = s/<result id\=\"\">/&<\/result>/g
TIME_PREFIX = (<creation_time>)
TRUNCATE = 0
TZ = UTC
#category = Custom
#description = Greenbone XML Report
disabled = false
pulldown_type = true

#Commented this out as we're making a new CIM compliant field set.
#FIELDALIAS-reportfields = result.owner.name as VulnerabilityResultOwner result{@id} as VulnerabilityResultID result{@title} as VulnerabilityResultTitle result.host as VulnerabilityResultHost result.nvt{@oid} as VulnerabilityResultNvtOid result.nvt.name as VulnerabilityResultNvtName result.nvt.family as VulnerabilityResultNvtFamily result.nvt.cvss_base as VulnerabilityResultNvtCVSS result.nvt.tags as VulnerabilityResultNvtTags result.nvt.xref as VulnerabilityResultNvtXref result.threat as VulnerabilityResultThreat result.severity as VulnerabilityResultSeverity result.qod.value as VulnerabilityResultQod result.description as VulnerabilityResultDescription result.nvt.cert.cert_ref{@id} as VulnerabilityResultNvtCertRef result.nvt.cve as VulnerabilityResultNvtCVE


#CIM Fields not from official Greenbone App
#Might need some work to extract msft and mskb.  No Windows hosts to scan so no results to work with.
EVAL-cert = "No US-CERT Data"
EVAL-dest = coalesce(target_hostname, target_host_ip)

EVAL-severity = lower(severity)

EXTRACT-category = \<family\>(?<category>.+?)\<
EXTRACT-cve = tyen-GB/app/App_greenbone/search?q=search index%3Dgreenbone result.original_threat%3D* | eval severity %3D lower(severity)&display.page.search.mode=verbose&dispatch.sample_ratio=1&workload_pool=&earliest=-90d%40d&latest=now&sid=1709558600.287pe=\"cve\"\s+id\=\"(?<cve>.+?)\"
EXTRACT-cert_dfn = type=\"dfn-cert\"\s+id\=\"(?<cert_dfn>.+?)\"
EXTRACT-cert_bund = type=\"cert-bund\"\s+id\=\"(?<cert_bund>.+?)\" 
EXTRACT-cpe = (?<cpe>cpe\:.+?)[\s+\<]{1,}
EXTRACT-cvss = \<severity\>(?<cvss>.+?)\<\/
EXTRACT-detection_summary = summary\=(?<detection_summary>[aA-zZ]{1,}.+?)\|
EXTRACT-detection_insights = insight\=(?<detection_insight>[aA-zZ]{1,}.+?)\|
EXTRACT-detection_affects = affected\=(?<detection_affects>[aA-zZ]{1,}.+?)\|
EXTRACT-detection_impact = impact\=(?<detection_impact>[aA-zZ]{1,}.+?)\|
EXTRACT-detection_location = location\<\/name\>\<value\>(?<detection_location>.+?)\<\/value\>
EXTRACT-detection_solution = solution\=(?<detection_solution>[aA-zZ]{1,}.+?)\|
EXTRACT-remediation_url = type=\"url\"\s+id\=\"(?<remediation_url>.+?)\"
EXTRACT-severity = \<threat\>(?<severity>\w+)\<
EXTRACT-severity_id = original_severity\>(?<severity_id>\d+[\.\d+]{0,})\<
EXTRACT-solution_type = solution\s+type\=\'(?<solution_type>.+?)\'
EXTRACT-target_hostname = \<hostname\>(?<target_hostname>.+?)\<\/hostname\>
EXTRACT-target_host_ip = \<host\>(?<target_host_ip>.+?)\<
EXTRACT-mskb = Microsoft\s(?<mskb>KB\d+)
EXTRACT-msft = (?<msft>https\:\/\/support\.microsoft\.com\/.+?)[$|\s\"]{1,}


FIELDALIAS-cvss_vector = result.nvt.severities.severity.value AS cvss_vector
FIELDALIAS-detection_quality = result.qod.value AS detection_quality
FIELDALIAS-dvc = host AS dvc
FIELDALIAS-port = result.port AS port
FIELDALIAS-signature = result.name AS signature
FIELDALIAS-solution = result.nvt.solution AS solution
FIELDALIAS-user = result.owner.name AS user

#Creates detection_is_cisa_kev field which shows if result is a CISA known exploited vulnerability
TRANSFORMS-detection_is_cisa_kev = detection_is_cisa_kev

