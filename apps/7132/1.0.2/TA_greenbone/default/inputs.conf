# Greenbone Report TCP inputs (replace IP with your Greenbone IP)
#[tcp://192.168.1.1:7680]
#connection_host = dns
#disabled = 1
#index = greenbone
#sourcetype = gvm:reports


# Greenbone log monitors.  Change paths/index accordingly, un-comment and set disabled to 0

#[monitor:///var/log/gvm/gvmd.log]
#disabled = 1
#index=greenbone
#sourcetype=gvm:gvmd

#[monitor:///var/log/gvm/gsad.log]
#disabled = 1
#index=greenbone
#sourcetype=gvm:gsad

#[monitor:///var/log/gvm/notus-scanner.log]
#disabled = 1
#index=greenbone
#sourcetype=gvm:notus

#[monitor:///var/log/gvm/openvas.log]
#disabled = 1
#index=greenbone
#sourcetype=gvm:openvas

#[monitor:///var/log/gvm/ospd-openvas.log]
