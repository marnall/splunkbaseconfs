[ccure:journal]
TIME_FORMAT=%Y-%m-%d%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD=25
SHOULD_LINEMERGE=false
TRUNCATE=9999
EXTRACT-card = <Card\>(?<Card>\d+)\<\/Card\>
EXTRACT-direction = <Direction\>(?<Direction>\w+)\<\/Direction\>
EXTRACT-state_code = <StateCode\>(?<State_code>\w+)\<\/StateCode\>
EXTRACT-admit_code = <AdmitCode\>(?<Admit_code>\w+)\<\/AdmitCode\>
EXTRACT-reject_code = <RejectCode\>(?<Reject_code>\w+)\<\/RejectCode\>
#CIM compliance for Authentication
FIELDALIAS-dest = SecondaryObjectName as dest
FIELDALIAS-signature = MessageType as signature
FIELDALIAS-signature_id = Card as signature_id
FIELDALIAS-src = PrimaryObjectIdentity as src
FIELDALIAS-user = PrimaryObjectName as user
EVAL-action = case(State_code=="Reject", "failure", State_code=="Admit", "success")
