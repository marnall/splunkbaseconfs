# RFC5424 props based on Technology Add-On by dmillis,
# released under Creative Commons BY 3.0 license

[rfc5424_syslog]
TRANSFORMS-syslog = test_for_syslog
TRANSFORMS-unknown = test_for_unknown
TRANSFORMS-host = rfc5424_host
REPORT-rfc5424_data = rfc5424_header, rfc5424_sdid
SHOULD_LINEMERGE = false
TIME_PREFIX = ^<[0-9][0-9]>1\s
TIME_FORMAT = %Y-%m-%dT%H.%M.%S.%3N%z
MAX_TIMESTAMP_LOOKAHEAD = 25
TZ = UTC

[thalestct-dsp]
# Index-time field extractions
TRANSFORMS-001_syslog_rewrite = cm_st

[cm-st]
# Search-time "inline" field extraction
EXTRACT-IPAddress,Hostname = ^(\S+\s+){3}(?<IPAddress>\S+)\s+(\S+\s+){3}(?<Hostname>\S+)

# Search-time "transform" field extraction with references to stanzas in transforms.conf
REPORT-json = report-json, report-json-kv

# LEEF props based on above

[leef]
TRANSFORMS-syslog = test_for_syslog
TRANSFORMS-unknown = test_for_not_leef
TRANSFORMS-host = leef_host
SHOULD_LINEMERGE = false
TIME_PREFIX = devTime=
TIME_FORMAT = %Y-%m-%dT%H.%M.%S.%3N%z
MAX_TIMESTAMP_LOOKAHEAD = 30
TZ = UTC
