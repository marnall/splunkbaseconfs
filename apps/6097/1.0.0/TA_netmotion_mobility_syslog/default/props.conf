[netmotion:mobility]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRANSFORMS-netmotion_mobility_sourcetyper = netmotion_mobility_sourcetyper

[netmotion:mobility:Security]

EVAL-action = case(action=="failed","failure",action=="Successful","success",action=="created","success",1=1,action)

EXTRACT-nm_sec_auth = SecurID:\s+(?P<action>\w+)\sauthentication\.\s+User
EXTRACT-nm_sec_bind = BindId\((?P<bind_id>[^)]+)
EXTRACT-nm_sec_cl_ciph = cipher\s+suite\s+(?P<client_cipher_suite>.+)\swith\s+version\s+(?P<client_cipher_version>\S+)\.
EXTRACT-nm_sec_cl_ciph_2 = client\s+cipher\s+suites\s+(?P<client_cipher_suite>.+)\sfor
EXTRACT-nm_sec_d = client\s+device\s+(?P<device>\S\s+\(PID
EXTRACT-nm_sec_d2 = For\s+device\s+(?P<device_pid>\S+)
EXTRACT-nm_sec_d_pid = device\s+(?P<device_pid>\S+)\s+with\sPID
EXTRACT-nm_sec_d_pid2 = \s+\(PID\s(?P<device_pid>[^)]+)\)
EXTRACT-nm_sec_logon_fail = Logon\s(?P<action>\w+)\sfor\s+user\((?P<user>[^)]+)\),\son\sdevice\((?P<device>[^)]+)\).+?\.(?P<signature>.+)\(ss=(?P<signature_id>[^)]+)\)\s+\w+\s+(?P<reason>.+)\.\(msg=(?P<reason_id>[^)]+)
EXTRACT-nm_sec_session_action = Session\s+(?P<bind_id>\S+)\s+(?P<action>\w+)
EXTRACT-nm_sec_srv_ciph = server\s+cipher\s+suites\s+(?P<server_cipher_suite>.+)\sfor
EXTRACT-nm_sec_user = User=(?P<user>\S+)
EXTRACT-nm_sec_user_2 = but\sserver\sused\s(?P<user>\S+),
EXTRACT-nm_sec_user_3 = Mobility permissions check for\s+(?P<user>\S+)\s+(?P<action>\w+).+?\.\s(?P<reason>.+)

FIELDALIAS-nm_sec_cim = bind_id ASNEW session_id


[netmotion:mobility:RPCProxy]
EVAL-action = case(action=="Abort","teardown",action=="Session start time","allowed",action=="Failed","blocked",1=1,action)
EVAL-src = coalesce(device,src_ip)

EXTRACT-nm_rpc_user_session = user\s+\[(?P<user>[^\]]+)\].\s+device\s+\[(?P<device>[^\]]+)\],\s+address\s+\[(?P<src_ip>[^\]]+)\].\s+IMP\s+handle\s+\[(?P<imp_id>[^\]]+)\],\s+client\s+version\s\[(?P<client_version>[^\]]+)\],\s+build\s+\[(?P<build>[^\]]+)\]
EXTRACT-nm_rpc_user_session_2 = termination.+address\s+(?P<src_ip>[^,]+),\s+IMP\s+handle\s+(?P<imp_id>[^,]+),\show\s(?P<action>[^,]+),\s+reason\s+(?P<reason>.+)
EXTRACT-nm_rpc_user_session_3 = Pid\s+(?P<device_pid>\S+),\s+device\s+"(?P<device>[^"]+)",\s+user\s+"(?P<user>[^"]+)",\s+ipv4\s+(?P<src_ip>[^,]+),\s+connectTime\s(?P<duration>\d+)
EXTRACT-nm_rpc_sess_fail = User\s+name:\s+(?P<user>[^,]+),\s+Device\s+Identity:\s+\[(?P<device>\w+)\],\svirtual\s+address(?P<src_ip>[^,]+),\s+reason:\s+(?P<reason>[^,]+),
EXTRACT-nm_rpc_sess_ind = user:\s+(?P<user>[^,]+),\s+IMP\s+handle:\s+(?P<imp_id>[^,]+),\s+client\s+version:\s+(?P<client_version>[^,]+),\s+build:\s+(?P<build>\d+)
EXTRACT-nm_rpc_sess_term = IMP\s+handle:\s+(?P<imp_id>[^,]+),\s+how:\s+(?P<action>[^,]+),\s+reason:\s+(?P<reason>.+)
EXTRACT-nm_rpc_pid = PID\s+alias:\s+(?P<device>[^,]+),.+IMP\s+session\s+id:\s+(?P<imp_id>[^,]+)
EXTRACT-nm_rpc_prot_mis = User\s+name:\s+(?P<user>[^,]+),\s+Device\s+Identity\s+\[(?P<device>\w+)
EXTRACT-nm_rpc_action = (?P<action>Session start time)

FIELDALIAS-nm_sec_cim = imp_id ASNEW session_id

[netmotion:mobility:Reporting]
EXTRACT-nm_rep_connection = connection\s+from\s+(?P<transport>\w+)://(?P<src_ip>[^:]+):(?P<src_port>\d+)\s+:\s+(?P<reason>.+)

EVAL-src = coalesce(device,src_ip)

[netmotion:mobility:IMP]
EVAL-src = coalesce(device,src_ip)

EXTRACT-nm_imp_sess = Indicating\s+session\s+(?P<imp_id>\S+)\s+for\s+peer\s+(?P<device_pid>\S+)\s+from\s+local\s+address\s+(?P<src_ip>[^:]+):(?P<src_port>\d+)

FIELDALIAS-nm_sec_cim = imp_id ASNEW session_id

[netmotion:mobility:Policy]
EXTRACT-nm_policy_policy = Policy:\s+Policy\s+\((?P<policy>[^)]+)\),\s+NAC\s+\((?P<nac>[^)]+)\).+user:\s+\((?P<user>[^)]+)\)\s+device:\s+\((?P<device_id>[^)]+)\)

[netmotion:mobility:Directory]
EVAL-action = case(action=="added","modified",1=1,action)

EXTRACT-nm_directory_useradd = User\s+(?P<user>\S+)\s+was.+(?P<action>added)\s+to\s+group\s+(?P<group>.+)

[netmotion:mobility:PortMapper]
EVAL-action = case(action=="failure","blocked",action=="Failed","blocked",1=1,action)
EVAL-src = coalesce(device,src_ip)

EXTRACT-nm_portmapper_map = Port\s+Mapper:\s+(?P<action>\w+).+client\s+(?P<src_ip>[^:]+):(?P<src_port>\d+)->(?P<dest_ip>[^:]+):(?P<dest_port>\d+),\s+proxy\s+(?P<src_translated_ip>[^:]+):(?P<src_translated_port>\d+)->(?P<dest_translated_ip>[^:]+):(?P<dest_translated_port>\d+),

[netmotion:mobility:Service]
EXTRACT-nm_service_pid = Device\s+(?P<device>\S+).+PID\s+(?P<device_pid>[^.]+)\.

[netmotion:mobility:SystemAudit]
EVAL-action = case(action=="logged on","success",action=="removed","deleted",action=="granted","success",action=="unsubscribed","modified",action=="saved","modified",action=="subscribed","modified",1=1,action)
EVAL-status = case(object_category=="group","success",1=1,null)

EXTRACT-nm_audit_logon = logon\s+(?P<action>\w+):\s+(?P<user>\S+)
EXTRACT-nm_audit_logon_2 = User\s+"(?P<user>[^"]+)"\s+(?P<action>logged on)
EXTRACT-nm_audit_logoff = logged\s+off.+:\s+(?P<user>\S+)
EXTRACT-nm_audit_grpchange = Device\s+"(?P<object>[^"]+)"\s+\((?P<device_id>[^)]+)\)\s+was\s+moved\s+from\s+(?P<object_category>\w+)\s+"(?P<object_orig>[^"]+)"\s+to\s+group\s+"(?P<object_path>[^"]+)"\s+by\s+"(?P<user_name>[^"]+)
EXTRACT-nm_audit_dvcdelete = Device\s+"(?P<object>[^"]+)"\s+\((?P<device_id>[^)]+)\)\s+(?P<action>removed)\s+by\s+"(?P<user_name>[^"]+)
EXTRACT-nm_audit_dvc = Device\s+"(?P<device>[^"]+)"\s+\((?P<device_id>[^)]+)\)
EXTRACT-nm_audit_policy1 = System\s+Audit:\s+(?P<object>\S+)\s+(?P<action>unsubscribed).+by\s+"(?P<user_name>[^"]+)
EXTRACT-nm_audit_policy2 = Policy\s+"(?P<object>[^"]+)"\s+(?P<action>saved)\s+by\s+"(?P<user_name>[^"]+)
EXTRACT-nm_audit_policy3 = System\s+Audit:\s+(?P<object>\S+)\s+(?P<action>subscribed)\s+to\s+policy\s+"(?P<object_path>[^"]+)".+by\s+"(?P<user_name>[^"]+)
EXTRACT-nm_audit_policy4 = Policy\s+rule\s+"(?P<object>[^"]+)"\s+(?P<action>saved)\s+by\s+"(?P<user_name>[^"]+)
