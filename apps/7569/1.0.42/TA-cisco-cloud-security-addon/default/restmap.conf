[admin_external:TA_cisco_cloud_security_addon_settings]
handlertype = python
python.version = python3
handlerfile = TA_cisco_cloud_security_addon_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_cisco_cloud_security_addon_cisco_cloud_security_addon]
handlertype = python
python.version = python3
handlerfile = TA_cisco_cloud_security_addon_rh_cisco_cloud_security_addon.py
handleractions = edit, list, remove, create
