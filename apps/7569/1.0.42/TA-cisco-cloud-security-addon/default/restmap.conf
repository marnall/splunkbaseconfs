[admin:TA_cisco_cloud_security_addon]
match = /
members = TA_cisco_cloud_security_addon_aws_account, TA_cisco_cloud_security_addon_cisco_cloud_security_addon, TA_cisco_cloud_security_addon_event_logs, TA_cisco_cloud_security_addon_settings

[admin_external:TA_cisco_cloud_security_addon_aws_account]
handlertype = python
