handlerfile = TA_cisco_cloud_security_addon_rh_aws_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_cisco_cloud_security_addon_event_logs]
handlertype = python
python.version = python3
handlerfile = TA_cisco_cloud_security_addon_rh_event_logs.py
handleractions = edit, list, remove, create
