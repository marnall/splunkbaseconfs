[expose:flashpoint_hunt_handler]
pattern = flashpoint/hunts/*
methods = GET,DELETE

[expose:flashpoint_hunts_handler]
pattern = flashpoint/hunts
methods = GET,POST

[expose:flashpoint_hunt_run_handler]
pattern = flashpoint/hunts/*/runs/*
methods = GET

[expose:flashpoint_hunt_runs_handler]
pattern = flashpoint/hunts/*/runs
methods = GET,POST

[expose:flashpoint_indexes_handler]
pattern = flashpoint/indexes
methods = GET

[expose:flashpoint_indexes_handler_fields]
pattern = flashpoint/indexes/*/fields

[expose:flashpoint_indexes_handler_sourcetypes]
pattern = flashpoint/indexes/*/sourcetypes
methods = GET

[expose:flashpoint_settings_handler]
pattern = flashpoint/settings
methods = GET,POST

[expose:flashpoint_settings_access_handler]
pattern = flashpoint/settings_access
methods = GET
