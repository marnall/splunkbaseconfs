[author=Flashpoint]
email = support@flashpoint.io
company = Flashpoint

[id]
name = flashpoint_ignite_technical_indicators
version = 1.1.4

[ui]
is_visible = 1
label = Flashpoint Technical Indicators
supported_themes = light
setup_view = settings

[launcher]
author = Flashpoint
description = Flashpoint Technical Indicators app for Splunk
version = 1.1.4

[package]
check_for_updates = true
id = flashpoint_ignite_technical_indicators
show_upgrade_notification = false

[install]
build = 1
is_configured = 0
state = enabled
state_change_requires_restart = false

[triggers]
reload.splunk_create = simple
reload.ignite_settings = simple

[shclustering]
deployer_push_mode = merge_to_default
deployer_lookups_push_mode = always_preserve
