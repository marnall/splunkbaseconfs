# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[launcher]
author = luke.monahan@rivium.com.au
version = 1.0.0
description = Contains a custom alert action to remove a SAML user role mapping from Splunk. Intended to be used as an automated action for when logs show a SAML user is removed from the directory.

[ui]
is_visible = 1
label = SAML User Removal
docs_section_override = AddOns:released

[package]
id = TA-saml-user-removal

[triggers]
reload.addon_builder = simple
reload.ta_saml_user_removal_account = simple
reload.ta_saml_user_removal_settings = simple
reload.passwords = simple

