# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 1

[id]
version = 2.1.0
name = TA-workday

[launcher]
author = Workday Inc.
version = 2.1.0
description = The Workday Add-on for Splunk enables you to collect user activity logs as well as signon logs from your Workday tenant into Splunk for security monitoring and analysis. If you enable this functionality, the collected user activity logs will reside outside of Workday.

[ui]
is_visible = 1
label = Workday add-on for Splunk
docs_section_override = AddOns:released

[package]
id = TA-workday

[triggers]
reload.addon_builder = simple
reload.ta_workday_account = simple
reload.ta_workday_settings = simple
reload.passwords = simple

