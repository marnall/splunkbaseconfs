[xendesktop]
homePath   = $SPLUNK_DB/xendesktop/db
coldPath   = $SPLUNK_DB/xendesktop/colddb
thawedPath = $SPLUNK_DB/xendesktop/thaweddb
maxMemMB = 20
maxConcurrentOptimizes = 6
maxHotIdleSecs = 86400
maxHotBuckets = 10
maxDataSize = auto_high_volume

