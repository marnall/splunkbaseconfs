[Threat - Flashpoint Matched Indicator - Rule]
action.correlationsearch.enabled = 1
action.correlationsearch.label = Flashpoint Matched Indicator
action.customsearchbuilder.enabled = false
action.customsearchbuilder.spec = {}
action.notable = 1
action.notable.param.rule_description = Generate Notable Events for new sightings from Flashpoint Matched Indicators data in Splunk
action.notable.param.rule_title = Indicator : $type$ : $value$
action.notable.param.security_domain = threat
action.notable.param.severity = high
action.notable.param.verbose = 0
alert.suppress = 1
alert.suppress.fields = value
alert.suppress.period = 604800s
alert.track = 1
counttype = number of events
cron_schedule = */30 * * * *
description = Search to generate Notable Events for new sightings from Flashpoint Matched Indicators in Splunk
dispatch.earliest_time = -35m
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = flashpoint
schedule_priority = higher
schedule_window = auto
search = | inputlookup matched_lookup |  where _time >= `flashpoint_info_min_time` | eval event_time=strftime(event_time, "%Y-%m-%d %H:%M:%S %Z") | table type, value, index, event_time, event
disabled = 1
