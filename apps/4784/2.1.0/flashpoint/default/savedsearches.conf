[populate_lookup]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 0 * * *
description = This gets the indicators from sourcetype flashpoint_intelligence:indicators
disabled = 0
dispatch.earliest_time = 0
dispatch.latest_time = now
run_on_startup = true
enableSched = 1
search = `flashpoint_indicators` | dedup uuid | eval value=mvappend(url, http_user_agent, file_size, registry_hive, ssl_issuer_email, ssl_hash, recipient, dest_dns, file_hash, file_name, src, dest, registry_value_text) | mvexpand value | dedup value | table value type | outputlookup list_iocs

[perform_matching]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 * * * *
description = This saved search get iocs from list_iocs lookup and match them with raw events and populate matched_lookup
disabled = 0
dispatch.earliest_time = -60m
dispatch.latest_time = now
enableSched = 1
search = `match_config` | matchiocs | inputlookup append=t matched_lookup | dedup event_time event value | outputlookup matched_lookup 

[flashpoint_populate_email_intel]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0,30 * * * *
description = This savedsearch get email from list_iocs lookup and populate data in flashpoint_email_intel lookup
disabled = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
run_on_startup = true
enableSched = 1
search = | inputlookup list_iocs where type="email-src" | rename value as src_user | inputlookup append=t flashpoint_email_intel | dedup src_user | table src_user | outputlookup flashpoint_email_intel

[flashpoint_populate_file_intel]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0,30 * * * *
description = This savedsearch get file hash from list_iocs lookup and populate data in flashpoint_file_intel lookup
disabled = 1
dispatch.earliest_time = 0
dispatch.latest_time = now
run_on_startup = true
enableSched = 1
search = | inputlookup list_iocs where (type="md5" OR type="sha256" OR type="sha512" OR type="sha224" OR type="sha1" OR type="imphash" OR type="filename" OR type="ssdeep")  | rename value as file_hash | inputlookup append=t flashpoint_file_intel | dedup file_hash | table file_hash | outputlookup flashpoint_file_intel

