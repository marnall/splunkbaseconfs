[pps_messagelog]
category = Proofpoint
KV_MODE = JSON
SHOULD_LINEMERGE = 0
TRUNCATE = 0
pulldown_type = 1
TIME_PREFIX = \"ts\"\s*:\s*\"
MAX_TIMESTAMP_LOOKAHEAD = 34
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%z
FIELDALIAS-filter.actions.action = filter.actions{}.action AS filter.actions.action
FIELDALIAS-filter.actions.isFinal = filter.actions{}.isFinal AS filter.actions.isFinal
FIELDALIAS-filter.actions.module = filter.actions{}.module AS filter.actions.module
FIELDALIAS-filter.actions.rule = filter.actions{}.rule AS filter.actions.rule
FIELDALIAS-msg.header.message-id = msg.header.message-id{} AS msg.header.message-id
FIELDALIAS-msg_normalized_header_message_id = msg.normalizedHeader.message-id{} AS msg_normalized_header_message_id
EVAL-msg.header.subject = if('msg.header.subject{}'!="", 'msg.header.subject{}', null)
EVAL-msg_normalized_header_subject = if('msg.normalizedHeader.subject{}'!="", 'msg.normalizedHeader.subject{}', null)
FIELDALIAS-msg.header.to = msg.header.to{} AS msg.header.to
FIELDALIAS-msg_normalized_header_to = msg.normalizedHeader.to{} AS msg_normalized_header_to
FIELDALIAS-msg_header_from = msg.header.from{} AS msg_header_from
FIELDALIAS-msg_normalized_header_from = msg.normalizedHeader.from{} AS msg_normalized_header_from
FIELDALIAS-msg_normalized_header_cc = msg.normalizedHeader.cc{} AS msg_normalized_header_cc
FIELDALIAS-msg_normalized_header_return_path = msg.normalizedHeader.return-path{} AS msg_normalized_header_return_path
FIELDALIAS-action_dkimv.rule = action_dkimv{}.rule AS action_dkimv.rule
FIELDALIAS-action_spf.rule = action_spf{}.rule AS action_spf.rule
FIELDALIAS-action_dmarc.rule = action_dmarc{}.rule AS action_dmarc.rule
EVAL-vendor_product = "Proofpoint Inc"
FIELDALIAS-duration = filter.durationSecs AS duration
FIELDALIAS-file_hash = msgParts{}.sha256 AS file_hash
FIELDALIAS-file_name = msgParts{}.labeledName AS file_name
FIELDALIAS-file_size = msgParts{}.detectedSizeBytes AS file_size
FIELDALIAS-internal_message_id = connection.sid AS internal_message_id
FIELDALIAS-message_id = msg.header.message-id{} AS message_id
FIELDALIAS-orig_recipient = envelope.rcpts{} AS orig_recipient
FIELDALIAS-process = pps.agent AS process
FIELDALIAS-recipient = msg.header.to{} AS recipient
FIELDALIAS-return_addr = msg.header.reply-to{} AS return_addr
FIELDALIAS-msg_normalized_return_addr = msg.normalizedHeader.reply-to{} AS msg_normalized_return_addr
FIELDALIAS-size = msg.sizeBytes AS size
FIELDALIAS-src = connection.ip AS src
EVAL-src_user = if('envelope.from'!="", 'envelope.from', null)
EVAL-subject = if('msg.header.subject{}'!="", 'msg.header.subject{}', null)
FIELDALIAS-filter_action = final_action AS filter_action
FIELDALIAS-filter_score = filter.modules.spam.scores.classifiers.spam AS filter_score
FIELDALIAS-signature = final_rule AS signature
FIELDALIAS-signature_extra = final_module AS signature_extra
REPORT-protocol = field-protocol
EVAL-action = case('final_action' =="accept","delivered",'final_action' == "discard","deleted",'final_action' == "reject","blocked",'final_action' =="continue","delivered",'final_action'=="encrypt","encrypted",'final_action' == "retry","blocked",1==1,'final_action')
FIELDALIAS-url = msgParts{}.urls{}.url AS url
REPORT-domain_fields = field-recipient_domain, field-src_user_domain
EVAL-recipient_count = mvcount('msg.header.to{}')
EVAL-recipient_domain = mvappend(angular_email_recipient_domain, direct_email_recipient_domain)
EVAL-dest = mvappend(angular_email_recipient_domain, direct_email_recipient_domain)

[pps_maillog]
SHOULD_LINEMERGE = 0
category = Proofpoint
KV_MODE = JSON
TRUNCATE = 0
pulldown_type = 1
TIME_PREFIX = \"ts\"\s*:\s*\"
MAX_TIMESTAMP_LOOKAHEAD = 34
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%z
EVAL-vendor_product = "Proofpoint Inc"
FIELDALIAS-recipient_count = sm.nrcpts AS recipient_count
EVAL-delay = (strptime('sm.delay',"%H:%M:%S")- strptime("00:00:00.00","%H:%M:%S.%2N"))*1000
EVAL-xdelay = (strptime('sm.xdelay',"%H:%M:%S")- strptime("00:00:00.00","%H:%M:%S.%2N"))*1000
FIELDALIAS-protocol = sm.proto AS protocol
FIELDALIAS-src_user = sm.from AS src_user
FIELDALIAS-recipient = sm.to{} AS recipient
FIELDALIAS-size = sm.sizeBytes AS size
FIELDALIAS-message_id = sm.msgid AS message_id
FIELDALIAS-internal_message_id = id AS internal_message_id
FIELDALIAS-process_id = sm.pri AS process_id
FIELDALIAS-filter_action = sm.tls.verify AS filter_action

[pps_auditlog]
SHOULD_LINEMERGE = 0
category = Proofpoint
KV_MODE = JSON
TRUNCATE = 0
pulldown_type = 1
TIME_PREFIX = \"ts\"\s*:\s*\"
MAX_TIMESTAMP_LOOKAHEAD = 34
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%z
FIELDALIAS-change_type = metadata.origin.type as change_type
FIELDALIAS-user = audit.user.email as user
FIELDALIAS-src = audit.user.ipAddress as src
FIELDALIAS-dest = metadata.origin.data.agent as dest
EVAL-vendor_product = "Proofpoint Inc"

[source::...ta-pps_ondemand*.log*]
sourcetype = tappsondemand:log

[source::...ta_pps_ondemand*.log*]
sourcetype = tappsondemand:log

