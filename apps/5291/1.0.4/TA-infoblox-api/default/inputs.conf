[infoblox_hosts]
interval = 3600
item_limit = 1000
python.version = python3
requested_fields = mac,zone,ipv4addrs,name,view,disable,dns_name,extattrs
sourcetype = infoblox:api:hosts
start_by_shell = false
disabled = 0

[infoblox_ipv4_addresses]
interval = 86400
item_limit = 1000
python.version = python3
requested_fields = configure_for_dhcp,host,ipv4addr,mac
sourcetype = infoblox:api:ipv4
start_by_shell = false
disabled = 0

[infoblox_networks]
interval = 86400
item_limit = 1000
python.version = python3
requested_fields = dynamic_hosts,comment,disable,network,network_view,extattrs,ipv4addr,netmask,members,static_hosts,total_hosts,unmanaged,utilization
sourcetype = infoblox:api:networks
start_by_shell = false
disabled = 0

