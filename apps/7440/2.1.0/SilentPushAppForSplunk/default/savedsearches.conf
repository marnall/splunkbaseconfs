[Delete Older Domains from `silent_push_matched_indicators_domain` and `silent_push_indicators_enrichment_domain`.]
description = Domains older than specified time will be deleted from `silent_push_indicators_enrichment_domain` and `silent_push_matched_indicators_domain` lookups.
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
cron_schedule = 0 0 * * *
enableSched = 1
search = | inputlookup silent_push_indicators_enrichment_domain \
| eval event_time=strptime(timestamp, "%Y-%m-%dT%H:%M:%S.%3f") \
| eval value=md5(name) \
| join type=left value \
