[source::...ta-add-on-for-cisco-prime-infrastructure*.log*]
sourcetype = taaddonforciscoprimeinfrastructure:log

[source::...ta_add_on_for_cisco_prime_infrastructure*.log*]
sourcetype = taaddonforciscoprimeinfrastructure:log

[cisco:pi:data:clients]
INDEXED_EXTRACTIONS = JSON
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 1024
TIME_FORMAT = %s%3N
TIME_PREFIX = \"updateTime\":
category = Splunk App Add-on Builder
pulldown_type = 1

[cisco:pi:data:clientsessions]
EVAL-action = "allowed"
EVAL-bytes = (bytes_in + bytes_out)
EVAL-packets = (packets_in + packets_out)
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_1 = clientSessionsDTO.macAddress AS src_mac
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_11 = clientSessionsDTO.packetsSent AS packets_out
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_12 = clientSessionsDTO.packetsReceived AS packets_in
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_13 = clientSessionsDTO.bytesSent AS bytes_out
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_15 = clientSessionsDTO.deviceMgmtAddress.address AS dvc_ip
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_16 = clientSessionsDTO.clientInterface AS dvc_zone
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_18 = clientSessionsDTO.bytesReceived AS bytes_in
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_3 = clientSessionsDTO.ipAddress.address AS src_ip
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_4 = clientSessionsDTO.userName AS user
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_6 = clientSessionsDTO.apMacAddress AS dvc_mac
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_7 = clientSessionsDTO.profileName AS ssid
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_8 = clientSessionsDTO.protocol AS wifi
FIELDALIAS-aob_gen_cisco_pi_data_clientsessions_alias_9 = clientSessionsDTO.vlan AS vlan
INDEXED_EXTRACTIONS = JSON
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 1024
SHOULD_LINEMERGE = 0
TIME_FORMAT = %s%3N
TIME_PREFIX = \"sessionStartTime\":
TZ = UTC
category = Splunk App Add-on Builder
pulldown_type = 1

[cisco:pi:data:accesspoints]
DATETIME_CONFIG = CURRENT
EVAL-enabled = if(accessPointsDTO.adminStatus == "ENABLED", "true", "false")
EVAL-mac = (substr(accessPointsDTO.macAddress.octets,1,2) + ":" + substr(accessPointsDTO.macAddress.octets,3,2) + ":" + substr(accessPointsDTO.macAddress.octets,5,2) + ":" + substr(accessPointsDTO.macAddress.octets,7,2) + ":" + substr(accessPointsDTO.macAddress.octets,9,2) + ":" + substr(accessPointsDTO.macAddress.octets,11,2))
FIELDALIAS-aob_gen_cisco_pi_data_accesspoints_alias_1 = accessPointsDTO.model AS vendor_product
FIELDALIAS-aob_gen_cisco_pi_data_accesspoints_alias_2 = accessPointsDTO.ipAddress.address AS ip
FIELDALIAS-aob_gen_cisco_pi_data_accesspoints_alias_3 = accessPointsDTO.name AS name
FIELDALIAS-aob_gen_cisco_pi_data_accesspoints_alias_5 = accessPointsDTO.softwareVersion AS version
FIELDALIAS-aob_gen_cisco_pi_data_accesspoints_alias_6 = accessPointsDTO.status AS status
FIELDALIAS-aob_gen_cisco_pi_data_accesspoints_alias_8 = accessPointsDTO.serialNumber AS serial
INDEXED_EXTRACTIONS = JSON
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[cisco:pi:data:alarms]
EVAL-app = "cisco:prime:infrastructure"
EVAL-severity = case(alarmsDTO.severity == "CRITICAL", "critical",alarmsDTO.severity == "MAJOR", "high", alarmsDTO.severity == "MINOR", "medium", alarmsDTO.severity == "WARNING", "low", alarmsDTO.severity == "INFORMATION", "informational". 1==1, null)
EVAL-type = "alarm"
FIELDALIAS-aob_gen_cisco_pi_data_alarms_alias_2 = alarmsDTO.message AS body
FIELDALIAS-aob_gen_cisco_pi_data_alarms_alias_3 = alarmsDTO.alarmId AS id
FIELDALIAS-aob_gen_cisco_pi_data_alarms_alias_6 = alarmsDTO.source AS src
FIELDALIAS-aob_gen_cisco_pi_data_alarms_alias_7 = alarmsDTO.condition.value AS subject
INDEXED_EXTRACTIONS = JSON
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 512
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3QZ
TIME_PREFIX = \"alarmFoundAt\":\"
TZ = UTC
category = Splunk App Add-on Builder
pulldown_type = 1

[cisco:pi:data:devices]
DATETIME_CONFIG = CURRENT
INDEXED_EXTRACTIONS = JSON
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[cisco:pi:data:events]
INDEXED_EXTRACTIONS = JSON
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 2048
SHOULD_LINEMERGE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3QZ
TIME_PREFIX = \"eventFoundAt\":\s\"
TZ = UTC
category = Splunk App Add-on Builder
pulldown_type = 1

[cisco:pi:data:inventorydetails]
DATETIME_CONFIG = CURRENT
INDEXED_EXTRACTIONS = JSON
KV_MODE = json
SHOULD_LINEMERGE = 0
TRUNCATE = 1000000
category = Splunk App Add-on Builder
pulldown_type = 1

