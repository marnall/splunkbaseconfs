[axway:apigateway:traffic:json]
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD = 20
TIME_FORMAT = %s%3N
TIME_PREFIX = \"timestamp\"\:
TRUNCATE = 150000
KV_MODE = json

REPORT-axway_api_gateway_recvheader = axway_api_gateway_recvheader
REPORT-axway_api_gateway_sentheader = axway_api_gateway_sentheader

FIELDALIAS-duration = transactionElement.duration as duration
FIELDALIAS-group = processInfo.groupName as group
FIELDALIAS-http_method = transactionElement.protocolInfo.http.method as method
FIELDALIAS-leg = transactionElement.leg as leg
FIELDALIAS-operation = transactionElement.operation as operation
FIELDALIAS-path = transactionElement.protocolInfo.http.uri AS path
FIELDALIAS-remote_addr = transactionElement.protocolInfo.http.remoteAddr as remote_addr
FIELDALIAS-remote_name = transactionElement.protocolInfo.http.remoteName as remote_name
FIELDALIAS-server = processInfo.serviceName as server
FIELDALIAS-service = transactionElement.serviceName as service
FIELDALIAS-status = transactionElement.protocolInfo.http.status as status_code
FIELDALIAS-status_description = transactionElement.protocolInfo.http.statusText as status_description
FIELDALIAS-subject = transactionElement.protocolInfo.http.authSubjectId as subject

EVAL-status = status_code." ".status_description