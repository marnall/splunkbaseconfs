[purestorage:flashblade:array]
DATETIME_CONFIG = NONE
SHOULD_LINEMERGE = 0
category = PureStorage FlashBlade
pulldown_type = 1
KV_MODE = JSON
TRUNCATE = 0
FIELDALIAS-os = os AS os
FIELDALIAS-host = array_name AS host

[purestorage:flashblade:inventory]
DATETIME_CONFIG = NONE
SHOULD_LINEMERGE = 0
category = PureStorage FlashBlade
pulldown_type = 1
KV_MODE = JSON
TRUNCATE = 0
FIELDALIAS-rules.at = rules{}.at AS rules.at
FIELDALIAS-rules.every = rules{}.every AS rules.every
FIELDALIAS-rules.keep_for = rules{}.keep_for AS rules.keep_for

[purestorage:flashblade:performance]
DATETIME_CONFIG = NONE
SHOULD_LINEMERGE = 0
category = PureStorage FlashBlade
pulldown_type = 1
KV_MODE = JSON
TRUNCATE = 0
FIELDALIAS-storage_read_throughput = read_bytes_per_sec AS storage_read_throughput
FIELDALIAS-read_ops = reads_per_sec AS read_ops
FIELDALIAS-host = array_name AS host
FIELDALIAS-read_latency = usec_per_read_op AS read_latency
FIELDALIAS-write_latency = usec_per_write_op AS write_latency
EVAL-io_ops = read_latency + write_latency
FIELDALIAS-storage_write_throughput = write_bytes_per_sec AS storage_write_throughput
FIELDALIAS-write_ops = writes_per_sec AS write_ops
FIELDALIAS-volume_id = name AS volume_id

