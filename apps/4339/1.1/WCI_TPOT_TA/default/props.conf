[heralding]
TIME_FORMAT = %Y-%m-%d %H:%M:%S.%L
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD = 30
EXTRACT-01-FILE_LOGGER = \((?<service>heralding\.reporting\.file_logger)\)\sFile\slogger:\sUsing\s(?<file_path>\/(?:[^\/]+\/){0,})?(?<file_name>\S+)\sto\s(?<log_purpose>[^\.]+).$
EXTRACT-02-PUBLIC_IP = \((?<service>heralding\.honeypot)\)\sFound\spublic\sip\:\s(?<src_ip>.*)
EXTRACT-03-SERVICE =  \((?<service>heralding\.honeypot)\)\sStarted\s(?<process>\S+)\scapability\slistening\son\sport\s(?<dest_port>\d+)
EXTRACT-04-SSH = \((?<service>asyncssh)\)\sCreating\s(?<process>SSH)\sserver\son\s(?<dest_ip>[^,]+),\sport\s(?<dest_port>\d+)

[tanner]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
KV_MODE = json
TIMESTAMP_FIELDS = timestamp
MAX_TIMESTAMP_LOOKAHEAD = 800
SHOULD_LINEMERGE = false

[honeytrap_attacker]
TIME_FORMAT = %Y-%m-%d %H:%M:%S.%6N %Z
MAX_TIMESTAMP_LOOKAHEAD = 30
SHOULD_LINEMERGE = false
EXTRACT-01-ATTACKER = \]\s(?<transport>\S+)\s(?<src>[^:]+):(?<src_port>\S+)\s->\s(?<dest>[^:]+):(?<dest_port>\S+)\s(?<MD5>\S+)\s(?<SHA512>\S+)\s\((?<bytes>\d+)

[honeytrap_attackers]
TIME_FORMAT = %FT%TZ
KV_MODE = json
TIMESTAMP_FIELDS = @timestamp
MAX_TIMESTAMP_LOOKAHEAD = 100
SHOULD_LINEMERGE = false

[honeytrap]
TIME_FORMAT = %F %T
SHOULD_LINEMERGE = false 
MAX_TIMESTAMP_LOOKAHEAD = 30
EXTRACT-01-CONNECTION = \]\s(?<src>[^:]+):(?<src_port>\d+)\srequesting\s(?<transport>\S+)\sconnection\son\s(?<dest>[^:]+):(?<dest_port>[^\.]+)
EXTRACT-02-CONNECTION2 = \]\s+\d+\/(?<transport>\w+)\s+Handling\s\w+\sconnection\srequest\sfrom\s(?<src>[^:]+):(?<src_port>\d+)\sto\s(?<dest>[^:]+):(?<dest_port>[^\.]+)
EXTRACT-03-BYTES = \]\s+\d+\/(?<transport>\w+)\*?\s+(?<bytes>\d+)\sbytes
EXTRACT-04-TIMEOUT = \]\s+\d+\/(?<transport>\w+)\s+No\sdata\sfor\s(?<duration>\d+)\ssecond\(s\),\ssending\s\'(?<response>[^\']+)
EXTRACT-05-ATTACK = \][\s\*]+(?<dest_port>[^\/]+)\/(?<transport>\S+)\s+(?<bytes>\d+)\sbytes\sattack\sstring\sfrom\s(?<src>[^:]+):(?<src_port>\d+)
EXTRACT-05-ERROR = \][\s\*]+(?<dest_port>[^\/]+)\/(?<transport>\S+)\s+Error\s-\sSending\sresponse\sfailed:\s(?<reason>.*)

