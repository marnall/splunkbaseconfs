[adbhoney]
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TIMESTAMP_FIELDS = timestamp
MAX_TIMESTAMP_LOOKAHEAD = 200
SHOULD_LINEMERGE = false

[ciscoasapot]
KV_MODE = json
SEDCMD-REMOVEHEADER1 = s/Starting\sserver\son\sport\s5000\/udp//g
SEDCMD-REMOVEHEADER2 = s/Using\sselector:sEpollSelector//g
SEDCMD-REMOVEHEADER3 = s/Starting\sserver\son\sport\s8443\/tcp,\suse\s\<Ctrl-C\>sto\sstop//g
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
TIMESTAMP_FIELDS = timestamp
MAX_TIMESTAMP_LOOKAHEAD = 200
SHOULD_LINEMERGE = false

[elasticpot]
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIMESTAMP_FIELDS = timestamp
MAX_TIMESTAMP_LOOKAHEAD = 100
SHOULD_LINEMERGE = false

[heralding_auth]
#KV_MODE = csv
#FIELD_NAMES = timestamp,auth_id,session_id,source_ip,source_port,destination_ip,destination_port,protocol,username,password
#FIELD_DELIMITER=,
#FIELD_QUOTE="
