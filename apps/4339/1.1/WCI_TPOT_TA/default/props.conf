#TIMESTAMP_FIELDS = timestamp
MAX_TIMESTAMP_LOOKAHEAD = 100
EXTRACT-01-FIELDS = (?<timestamp>[^,]+),(?<auth_id>[^,]+),(?<session_id>[^,]+),(?<source_ip>[^,]+),(?<source_port>[^,]+),(?<destination_ip>[^,]+),(?<destination_port>[^,]+),(?<protocol>[^,]+),(?<username>[^,]+)?,(?<password>[^,]+)?

[heralding_session]
#KV_MODE = csv
#FIELD_NAMES = timestamp,duration,session_id,source_ip,source_port,destination_ip,destination_port,protocol,auth_attempts
SHOULD_LINEMERGE = false
#FIELD_DELIMITER=,
#FIELD_QUOTE="
