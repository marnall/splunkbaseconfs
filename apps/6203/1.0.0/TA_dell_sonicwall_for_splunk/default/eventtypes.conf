[dell_sonicwall_log]
search = sourcetype=dell:sonicwall
#tags = network firewall 
#Map ALL logs to "network" so that "Network Changes" CIM will be reflected

[dell_sonicwall_traffic]
search = sourcetype=dell:sonicwall Network_Traffic="TRUE"
#tags = communicate

[dell_sonicwall_session_start]
search = sourcetype=dell:sonicwall Event_ID=98
#tags = network session start

[sonicwall_session_end]
search = sourcetype=dell:sonicwall Event_ID=537
#tags = network session end

[dell_sonicwall_intrusion]
search = sourcetype=dell:sonicwall (SonicOS_Group_Name="Attacks" OR Syslog_Legacy_Category="Attack")
#tags = ids attack

[dell_sonicwall_authentication]
search = sourcetype=dell:sonicwall SonicOS_Group_Name="Authentication Access" OR SonicOS_Group_Name="Radius Authentication" OR SonicOS_Group_Name="SSO Agent Authentication"
#tags = authentication

[dell_sonicwall_privileged]
search = sourcetype=dell:sonicwall ("admin" OR "Administrator" OR "Administrators")
#tags = privileged

[dell_sonicwall_vpn]
search = sourcetype=dell:sonicwall SonicOS_Category_Name="VPN" OR SonicOS_Category_Name="SSL VPN"
#tags = session vpn

[dell_sonicwall_dhcp]
search = sourcetype=dell:sonicwall (SonicOS_Group_Name="DHCP Client" OR SonicOS_Group_Name="DHCP Server" OR SonicOS_Group_Name="DHCP Relay" OR SonicOS_Group_Name="DHCPv6 Server" OR SonicOS_Group_Name="DHCPv6 Client")
#tags = session dhcp

[dell_sonicwall_error]
search = sourcetype=dell:sonicwall Priority_Level="ERROR" OR Syslog_Legacy_Category="System Error"
#tags = error

[dell_sonicwall_change]
search = sourcetype=dell:sonicwall SonicOS_Group_Name="Configuration Auditing" OR mv_tag="*change*"
#tags = change

[dell_sonicwall_account]
search = sourcetype=dell:sonicwall mv_tag="*account*"
#tags = account

[dell_sonicwall_group]
search = sourcetype=dell:sonicwall mv_tag="*group*"
#tags = group

[dell_sonicwall_suspicious]
search = sourcetype=dell:sonicwall mv_tag="*suspicious*"
#tags = suspicious