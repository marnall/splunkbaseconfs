[dell_sonicwall_allowed_opened_connection]
definition = sourcetype="dell:sonicwall" tag=network tag=communicate (action="conn_opened" OR action="nat_mapping" OR "dropped") | transaction host, protocol, transport, src, src_port, dest, dest_port maxspan=2s maxpause=2s keeporphans=false unifyends= true keepevicted=false startswith="action=conn_opened" | search NOT action="blocked" | eval action="allowed" | append [ | search sourcetype="dell:sonicwall" tag=network tag=communicate NOT (bytes_in>0 action="allowed") OR action="blocked"]
iseval = 0

[dell_sonicwall_closed_connection]
definition = sourcetype="dell:sonicwall" tag=network tag=communicate (action="conn_closed" OR "dropped") | transaction host, protocol, transport, src, src_port, dest, dest_port maxspan=2s maxpause=2s keeporphans=false unifyends= true keepevicted=false endswith="action=conn_closed" | search NOT action="blocked" | eval action="allowed" | append [ | search sourcetype="dell:sonicwall" tag=network tag=communicate (action="allowed" bytes_in>0) OR action="blocked"]
iseval = 0

