[dell_sonicwall_all_vendor_action]
CLEAN_KEYS = 0
SOURCE_KEY = msg
REGEX = (?i)\b(Nat Mapping|failed|failure|denied|deny|dropped|blocked|allowed|success|detected|successfully|drop|added|created|create|edited|edit|modified|deleted|delete|changed|change|removed|enabled|disabled)\b
FORMAT = vendor_action::$1

[dell_sonicwall_connection_closed_vendor_action]
CLEAN_KEYS = 0
REGEX = msg=\"Connection Closed\"\s.*?\ssent=([1-9]\d*) rcvd=([1-9]\d*) spkt=([1-9]\d*) rpkt=([1-9]\d*)
FORMAT = vendor_action::allowed bytes_out::$1 bytes_in::$2 packets_out::$3 packets_in::$4

[dell_sonicwall_sonicOS_group_name_attacks]
CLEAN_KEYS = 0
SOURCE_KEY = Event_ID
REGEX = ^(22|23|27|81|82|83|177|178|179|267|606|1373|1374|1375|1376|1387|1471)$
FORMAT = SonicOS_Group_Name::Attacks Event_ID::$1

[sonicos_log_events_reference]
batch_index_query = 0
case_sensitive_match = 1
filename = sonicos_log_events_reference.csv