# The examples below are kind of a hack to get around shipping 2 versions, one for windows one for *ix.
# You can either turn on both and let one fail at startup ( one time error ) or just turn on the appropriate stanza.

[script://./bin/webmon.py]
interval = 30
sourcetype = webmon
source = webmon
disabled = false 

[script://.\bin\webmon.py]
interval = 30
sourcetype = webmon
source = webmon
disabled = false 
