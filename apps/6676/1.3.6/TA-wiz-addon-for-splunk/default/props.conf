[source::...ta-wiz-addon-for-splunk*.log*]
SHOULD_LINEMERGE = true
sourcetype = tawizforsplunkaddon:log

[source::...ta_wiz_addon_for_splunk*.log*]
SHOULD_LINEMERGE = true
sourcetype = tawizforsplunkaddon:log

[wiz:issues]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = 0
TRUNCATE = 99999999
TIME_PREFIX = updatedAt
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%NZ
MAX_TIMESTAMP_LOOKAHEAD = 30

[wiz:vulnerabilities]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = 0

[wiz:userAuditLogs]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = 0
TIME_PREFIX = timestamp
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%NZ
MAX_TIMESTAMP_LOOKAHEAD = 30

[wiz:detections]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = 0
TRUNCATE = 99999999
TIME_PREFIX = createdAt
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%NZ
MAX_TIMESTAMP_LOOKAHEAD = 30
