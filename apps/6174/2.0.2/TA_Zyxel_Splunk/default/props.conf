[zywall:fw:traffic]
FIELDALIAS-src_mac = "client_mac" AS src_mac
FIELDALIAS-firewall_flow_bytes = "sent" AS bytes_out "rcvd" AS bytes_in
EVAL-bytes = bytes_in + bytes_out
REPORT-prop_for_src_ip_and_port = src_ip_and_port
REPORT-prop_for_dest_ip_regex = destination_ip
REPORT-dest_port_regex = dest_port_ext
LOOKUP-protocol_lookup = protocol_id_lookup ID AS protoID OUTPUT protocol transport
REPORT-mac = MAC
FIELDALIAS-source = src_ip as src
FIELDALIAS-destination = dest_ip as dest
EVAL-dest_mac = substr(devID, 0,2).":".substr(devID,3,2).":".substr(devID,5,2).":".substr(devID,7,2).":".substr(devID,9,2).":".substr(devID,11,2)
FIELDALIAS-fw_direction = dir AS direction
REPORT-destination-ip = destination_ip
EVAL-dvc = "zyxell-firewall"
EVAL-vendor_product = "nix"
FIELDALIAS-fw_msg = msg as message

[zywall:fw:vpn]
REPORT-prop_for_src_ip_and_port = src_ip_and_port
REPORT-prop_for_dest_ip_regex = destination_ip
REPORT-dest_port_regex = dest_port_ext
REPORT-mac = MAC
EVAL-dest_mac = substr(devID, 0,2).":".substr(devID,3,2).":".substr(devID,5,2).":".substr(devID,7,2).":".substr(devID,9,2).":".substr(devID,11,2)
REPORT-fw_user = USER
EVAL-user = coalesce(Username,user)
FIELDALIAS-fw_direction = dir AS direction
EVAL-vendor_product = "nix"
FIELDALIAS-fw_msg = msg as message
EVAL-action = case(like(msg,"%Failed login attempt to SSLVPN from http/https%"), "failure",like(msg,"%http/https has logged in SSLVPN%"), "success")
EVAL-dvc = "zyxell-firewall"


[zywall:fw:user]
REPORT-prop_for_src_ip_and_port = src_ip_and_port
REPORT-prop_for_dest_ip_regex = destination_ip
REPORT-dest_port_regex = dest_port_ext
FIELDALIAS-source = src_ip as src
FIELDALIAS-destination = dest_ip as dest
EVAL-dest_mac = substr(devID, 0,2).":".substr(devID,3,2).":".substr(devID,5,2).":".substr(devID,7,2).":".substr(devID,9,2).":".substr(devID,11,2)
EVAL-action = case(like(msg,"%Failed login attempt to Device%"), "failure",like(msg,"%Fail login attempt to Device%"), "error",like(msg,"%put into lockout%"), "error",like(msg,"%has logged in Device%"), "success")
REPORT-fw_user = USER
EVAL-user = coalesce(Username,user)
FIELDALIAS-fw_msg = msg as message
EVAL-dvc = "zyxell-firewall"
EVAL-vendor_product = "nix"

[zywall:fw:security:control]
FIELDALIAS-fw_direction = dir AS direction
REPORT-prop_for_src_ip_and_port = src_ip_and_port
REPORT-prop_for_dest_ip_regex = destination_ip
REPORT-dest_port_regex = dest_port_ext
REPORT-mac = MAC
FIELDALIAS-destination = dest_ip as dest
EVAL-dest_mac = substr(devID, 0,2).":".substr(devID,3,2).":".substr(devID,5,2).":".substr(devID,7,2).":".substr(devID,9,2).":".substr(devID,11,2)
EVAL-dvc = "zyxell-firewall"
EVAL-vendor_product = "nix"
FIELDALIAS-source = src_ip as src
EVAL-action = case(like(note,"%ACCESS FORWARD%"), "allowed",like(note,"%ACCESS BLOCK%"), "blocked")
LOOKUP-protocol_lookup = protocol_id_lookup ID AS protoID OUTPUT protocol transport
FIELDALIAS-fw_msg = msg as message


