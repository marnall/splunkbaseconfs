[zyxel:syslog]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TRANSFORMS-zw_traffic = zywall-fw-traffic
TRANSFORMS-zw-ssl = zywall-fw-vpn
TRANSFORMS-zw_user = zywall-fw-user
TRANSFORMS-zw_traffic_security_control = zywall-fw-security-control
TRANSFORMS-zw_interface_stats = zywall-fw-interface-stats
TRANSFORMS-zw_myzyxel = zywall-fw-myzyxel
TRANSFORMS-zw_sys_mon = zywall-fw-sys-mon
TRANSFORMS-zw_sys = zywall-fw-sys
TRANSFORMS-zw_auth_server = zywall-fw-auth-server
TRANSFORMS-zw_built_in_service = zywall-fw-built-in-service
TRANSFORMS-zw_file_manage = zywall-fw-file-manage
TRANSFORMS-zw-ike = zywall-fw-ike
TRANSFORMS-zw-interface = zywall-fw-interface
TRANSFORMS-zw-l2tp = zywall-fw-l2tp
TRANSFORMS-zw-pki = zywall-fw-pki
TRANSFORMS-zw-policy-route = zywall-fw-policy-route
TRANSFORMS-zw-upnp = zywall-fw-upnp
TRANSFORMS-zw-session-limit = zywall-fw-session-limit
TRANSFORMS-zw-web-auth = zywall-fw-web-auth
TRANSFORMS-zw-adp = zywall-fw-adp
TRANSFORMS-zw-ipsec = zywall-fw-ipsec
TRANSFORMS-zw_dhcp = zywall-fw-dhcp
TRANSFORMS-zw_ipmac_binding = zywall-fw-ipmac-binding

[zywall:fw:ipmac:binding]
REPORT-prop_for_src_ip_and_port = src_ip_and_port
REPORT-prop_for_dest_ip_regex = destination_ip
REPORT-dest_port_regex = dest_port_ext
EVAL-dvc = "zyxell-firewall"
EVAL-vendor_product = "nix"
EVAL-dest_mac = substr(devID, 0,2).":".substr(devID,3,2).":".substr(devID,5,2).":".substr(devID,7,2).":".substr(devID,9,2).":".substr(devID,11,2)
FIELDALIAS-destination = dest_ip as dest
FIELDALIAS-source = src_ip as src
FIELDALIAS-fw_msg = msg as message



