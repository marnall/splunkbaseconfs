[symantec:smg:textmail]
LINE_BREAKER=(\\n)| \w{3}\s+\d+\s+\d+:\d+:\d+\s+\w+-\w+\s+\w+\[\d+\]
SHOULD_LINEMERGE = false
KV_MODE = none
REPORT-fields_for_symantec_smg_textmail = dvc_symantec_gw,process_id_symantec_gw,session_id_symantec_gw,sender_symantec_gw,subject_symantec_gw,MSG_SIZE_symantec_gw,msgid_symantec_gw,action_symantec_gw,filename_symantec_gw,src_port_to_symantec_gw,from_symantec_gw,virus_symantec_gw,unscannable_symantec_gw,DELIVERY_FAILURE_symantec_gw,authen_symantec_gw,cmd_symantec_gw


EVAL-vendor_action = vendor_action
EVAL-file_name=split(file_name,"|")
EVAL-recipient=split(recipient,"|")
EVAL-action = case(lower(action)="deliver","delivered", lower(action)="delivery_failure","blocked")
EVAL-vendor = "Symantec"
EVAL-Vendor_product = "Symantec Messaging Gateway"


