#########################################
# IBM Backup
#########################################
[ibm_audit_change]
search = sourcetype=ibm_audit
#tag=change


#########################################
# F5 ASM WAF
#########################################
[asm_web_traffic]
search = sourcetype=f5:bigip:asm:syslog
#tag=web


#########################################
# Fujitsu
#########################################
#Fujitsu storage
[fujitsu_auth]
search = sourcetype=fujitsu_audit_syslog action_name="Login"
#tag=authentication


#########################################
# Cisco eStreamer
#########################################
[estreamer-ids-ips-event]
search = sourcetype=cisco:estreamer:data (rec_type_simple=EVENT OR rec_type_simple="IPS EVENT")

[estreamer-packet]
search = sourcetype=cisco:estreamer:data rec_type_simple=PACKET

[estreamer-file-malware-attack]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT") NOT signature="Unknown" NOT signature="Clean" NOT sha256=""

[estreamer-file-malware-operations]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT") (signature="Unknown" OR signature="Clean") NOT sha256=""

[estreamer-scan-event-operations]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT") sha256="" NOT signature=""

[estreamer-scan-event]
search = sourcetype=cisco:estreamer:data (rec_type_simple="FILELOG EVENT" OR rec_type_simple="FILELOG MALWARE EVENT" OR rec_type_simple="MALWARE EVENT") sha256="" signature=""

[estreamer-flow]
search = sourcetype=cisco:estreamer:data rec_type_category=RNA event_type=1003

[estreamer-si-event]
search = sourcetype=cisco:estreamer:data rec_type_simple=RNA event_type=1003 sec_intel_event=Yes

[estreamer-proxy]
search = sourcetype=cisco:estreamer:data rec_type_category=RNA event_type=1003 app=http OR app=https


#########################################
# Cisco Firepower
#########################################
# VPN session_start
[cisco_firepower_vpn_session_start]
search = sourcetype="cisco:estreamer:data" rec_type_category="VPN" rec_type_desc="*Login*"
#tags = network sessions vpn start

# VPN session_end
[cisco_firepower_vpn_session_end]
search = sourcetype="cisco:estreamer:data" rec_type_category=VPN rec_type_desc="*Logoff*"
#tags = network session vpn end

# IDS events
[cisco_firepower_ids_events]
search = sourcetype="cisco:estreamer:data" rec_type_category=IPS*
#tags = ids attack

# Network Traffic
[cisco_firepower_network_traffic]
search = sourcetype="cisco:estreamer:data" rec_type_category=RNA event_type="10*"
# tags network communicate

[cisco_firepower_authentication]
search = sourcetype="cisco:estreamer:data" event_desc="User Login Information"


#########################################
# Linux
#########################################
[linux_audit_authentication]
search = sourcetype=linux_audit command="sshd"


#########################################
# Fireeye
#########################################
[fireeye_malware]
search = sourcetype= fe_json_syslog


#########################################
# Netwrix
#########################################
# Authentication
[netwrix_authentication]
search = sourcetype=netwrix DataSource="Logon Activity"

# Active Directory Changes
[netwrix_ad_change]
search = sourcetype=netwrix DataSource="Active Directory"

[netwrix_auth_success_events]
search = sourcetype="netwrix:privilege:secure" action="success"
#tags authentication privileged success

[netwrix_auth_failure_events]
search = sourcetype="netwrix:privilege:secure" action="failure"
#tags authentication privileged failure


#########################################
# SYSMON
#########################################
[ms-sysmon-network]
search = (source="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR source="WinEventLog:Microsoft-Windows-Sysmon/Operational") EventCode="3"

[ms-sysmon-process]
search = (source="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR source="WinEventLog:Microsoft-Windows-Sysmon/Operational") (EventCode="1" OR EventCode="5" OR EventCode="6" OR EventCode="8" OR EventCode="9" OR EventCode="10" OR EventCode="15" OR EventCode="17" OR EventCode="18")

[ms-sysmon-filemod]
search = (source="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR source="WinEventLog:Microsoft-Windows-Sysmon/Operational") (EventCode="11" OR EventCode="2")

[ms-sysmon-regmod]
search = (source="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR source="WinEventLog:Microsoft-Windows-Sysmon/Operational") (EventCode="12" OR EventCode="13" OR EventCode="14")

[ms-sysmon-wmimod]
search = (source="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR source="WinEventLog:Microsoft-Windows-Sysmon/Operational") (EventCode="19" OR EventCode="20" OR EventCode="21")

[ms-sysmon-dns]
search = (source="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" OR source="WinEventLog:Microsoft-Windows-Sysmon/Operational") EventCode="22"


#########################################
# MS Defender
#########################################
[ms_defender_malware_alerts]
search = sourcetype="ms:defender:atp:alerts" category="Malware"
#tags malware attack

# Larger sample of events should be reviewed and, as this is incidents with status updates, update eventtype with status=New
[ms_defender_incident_malware_alerts]
search = sourcetype="ms365:defender:incident:alerts" category=Malware
#tags malware attack

[ms_defender_identity_alerts]
search = sourcetype="ms:defender:identity:syslog"
#tags alert


#########################################
# Palo Alto
#########################################
[pan_globalprotect_vpn]
search = sourcetype="pan:globalprotect" log_subtype="connected"
#tags network session vpn start 

[pan_globalprotect_vpn_end]
search = sourcetype="pan:globalprotect" log_subtype="logout"
#tags network session vpn end 

[pan_gtp]
search = sourcetype="pan:gtp"
#tags = network communicate

[pan_system_auth_success]
search = sourcetype="pan:system" log_subtype=auth event_id="auth-success"
#tags = authentication success

[pan_system_auth_failure]
search = sourcetype="pan:system" log_subtype=auth event_id="auth-fail" user=*
#tags = authentication failure


#########################################
# IIS Custom
#########################################
[microsoft_iis_web]
search = sourcetype=iis_custom
#tags = web activity inventory