#########################################
# Palo Alto
#########################################
[pan:log]
SEDCMD-delete_pan_syslog_header = s/^[^\s]+\s.*?(?=\s)\s//g
TRANSFORMS-sourcetype = pan_threat, pan_traffic, pan_system, pan_config, pan_hipmatch, pan_correlation, pan_userid, pan_globalprotect, pan_decryption, pan_gtp

[pan:userid]
EVAL-user  = coalesce(source_name,"unknown")

[pan:globalprotect]
FIELDALIAS-pan_vpn_cim = src_ip AS src machine_name AS src_nt_host event_id AS signature client_ver AS src_category private_ip AS dest_ip
EVAL-action = case(log_subtype=="connected", "login", log_subtype=="logout", "logout", true(), status)
EVAL-vendor_product = "Pan Globalprotect"
EVAL-app = "Globalprotect

[pan:traffic]
SEDCMD-filter=s/2305|Splunk-1|010108001849|from-policy|0x0|vsys1|\w{8}-\w{4}-\w{4}-\w{4}-\w{12}|10\.0\.0\.0-10\.255\.255\.255|0\.0\.0\.0//g
SEDCMD-filter_syslog_header=s/^\w+\s\w+\s\w+:\w+:\w+\s\w+-\w+-\w+-\w+-\w+.\w+.\w+\s1.\d+\/\d+\/\d+\s\d+:\d+:\d+/,/g

# PAN GTP logs. Report for field extractions mapped according to vendor documentation, but there is discrepancy in number of fields (best effort field extraction and CIM mapping).
[pan:gtp]
SHOULD_LINEMERGE = false
EVENT_BREAKER_ENABLE = true
KV_MODE = none
TIME_PREFIX = ^(?:[^,]*,){6}
MAX_TIMESTAMP_LOOKAHEAD = 32
TIME_FORMAT = %Y/%m/%d %H:%M:%S
REPORT-search-gpt = extract_gtp
FIELDALIAS-fwgtp_dest = dest_ip as dest
FIELDALIAS-fwgtp_src = src_ip as src
EVAL-vendor_product = "Palo Alto Networks Firewall"

[pan:system]
REPORT-search-systemauth = extract_system_user_logins
EVAL-action = case(log_subtype="auth" AND event_id="auth-success", "success",  log_subtype="auth" AND event_id="auth-fail", "failure")


#########################################
# IIS Custom
#########################################
[iis_custom]
SHOULD_LINEMERGE = false
INDEXED_EXTRACTIONS = w3c
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
TZ = Europe/Zagreb
LINE_BREAKER = ([\r\n]+)
REPORT-url_host_extraction = url_host_extraction

FIELDALIAS-cs_User_Agent = cs_User_Agent as http_user_agent
FIELDALIAS-sc_status = sc_status as status
FIELDALIAS-s_sitename = s_sitename as site
FIELDALIAS-s_ip = s_ip as dest_ip, s_ip as dvc
FIELDALIAS-s_port = s_port as http_port, s_port as dest_port, s_port as port
FIELDALIAS-RequestsPerSecond = RequestsPerSecond as hits_per_second
FIELDALIAS-cs_method = cs_method as http_method
FIELDALIAS-c_ip = c_ip as src_ip, c_ip as src

EVAL-dest = coalesce(dest, url_host, s_ip)
EVAL-cookie = if(cs_Cookie == "-", null(), cs_Cookie)
EVAL-duration = if(TimeTakenMS == "-" OR time_taken == "-", null(), coalesce(TimeTakenMS, time_taken))
EVAL-response_time = if(TimeTakenMS == "-" OR time_taken == "-", null(), coalesce(TimeTakenMS, time_taken))
EVAL-http_referer = if(cs_Referer == "-", null(), cs_Referer)
EVAL-http_referrer = if(cs_Referer == "-", null(), cs_Referer)
EVAL-http_content_type = if(Content_Type == "-", null(), Content_Type)
EVAL-category = if(Content_Type == "-", null(), Content_Type)
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-bytes = if(sc_bytes != "-" AND cs_bytes != "-", sc_bytes + cs_bytes, null())
EVAL-bytes_in = if(cs_bytes == "-", null(), cs_bytes)
EVAL-bytes_out = if(sc_bytes == "-", null(), sc_bytes)
EVAL-user = if(cs_username == "-", null(), cs_username)
EVAL-uri_path = if(cs_uri_stem == "-", null(), cs_uri_stem)
EVAL-uri_query = if(cs_uri_query == "-", null(), cs_uri_query)
EVAL-status = if(isnotnull(sc_substatus), sc_status +"."+ sc_substatus, sc_status +".0")
EVAL-src = if(X_Forwarded_For=="-" OR isnull(X_Forwarded_For), c_ip, X_Forwarded_For)
EVAL-src_ip = if(X_Forwarded_For=="-" OR isnull(X_Forwarded_For), c_ip, X_Forwarded_For)
EVAL-host = coalesce(s_computername, host)
EVAL-web_server = coalesce(s_computername, host) . ":" . site
EVAL-vendor = "Microsoft"
EVAL-product = "Internet Information Services (IIS)"
EVAL-vendor_product = "Microsoft Internet Information Services (IIS)"
EVAL-app = "Microsoft Internet Information Services (IIS)"
EVAL-url = if(((isnotnull(https) OR isnotnull(s_port) ) AND (isnotnull(url_host) OR isnotnull(s_ip)) AND isnotnull(s_port) AND isnotnull(cs_uri_stem) ), (case(https=="on", "https://", https=="off", "http://", s_port==443, "https://", 1=1, "http://") . if(isnotnull(url_host), url_host, s_ip) . if(s_port == 80 OR s_port==443,"", ":".s_port) . cs_uri_stem . if(isnull(cs_uri_query) OR (cs_uri_query =="-"), "", "?" + cs_uri_query)), null())
EVAL-url_length = len(if(((isnotnull(https) OR isnotnull(s_port) ) AND (isnotnull(url_host) OR isnotnull(s_ip)) AND isnotnull(s_port) AND isnotnull(cs_uri_stem) ), (case(https=="on", "https://", https=="off", "http://", s_port==443, "https://", 1=1, "http://") . if(isnotnull(url_host), url_host, s_ip) . if(s_port == 80 OR s_port==443,"", ":".s_port) . cs_uri_stem . if(isnull(cs_uri_query) OR (cs_uri_query =="-"), "", "?" + cs_uri_query)), null()))
EVAL-role = "web_server"

LOOKUP-iis_action_lookup = iis_action_lookup iis_status as status OUTPUT status_description as action


