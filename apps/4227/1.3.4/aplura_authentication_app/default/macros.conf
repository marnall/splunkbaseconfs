[apl_aut_tstats]
definition = tstats prestats=false summariesonly=true allow_old_summaries=true
iseval = 0

[apl_aut_tstats_prestats]
definition = tstats prestats=true summariesonly=true allow_old_summaries=true
iseval = 0

[apl_aut_drop_auth_dm]
definition = rename Authentication.* AS *
iseval = 0

[apl_aut_default_users_lookup]
definition = inputlookup apl_aut_default_users | fields user | rename user AS Authentication.user
iseval = 0

[apl_aut_priv_users_lookup]
definition = inputlookup apl_aut_priv_users | fields user | rename user AS Authentication.user
iseval = 0
