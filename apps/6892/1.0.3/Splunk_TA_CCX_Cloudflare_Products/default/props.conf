###MAIN SOURCETYPE###
[cloudflare:json]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
LINE_BREAKER =([\r\n]+)\{\"\w+\"
DATETIME_CONFIG = CURRENT
#To parse the timestamped in the logs remove the comment from line below (TIME_PREFIX) and comment the line above, otherwise logs will be timestamped as arrives in Splunk (CURRENT). 
#TIME_PREFIX= \"(EdgeStartTimestamp|SessionEndTime|Datetime|CreatedAt|When|)\":\"

disabled=false
TRUNCATE=150000
pulldown_type = 1
TRANSFORMS-sourcetype = ccx:cloudflare:zerotrust:network_sessions,ccx:cloudflare:gateway_network,ccx:cloudflare:access_requests,ccx:cloudflare:gateway_dns,ccx:cloudflare:audit_logs,ccx:cloudflare:gateway_http,ccx:cloudflare:waf
KV_MODE=json

#########################################RESOURCES####################################################################
#List Cloudflare Products - https://developers.cloudflare.com/products/
#Gateway Network - https://developers.cloudflare.com/logs/reference/log-fields/account/gateway_network/
#Access requests - https://developers.cloudflare.com/logs/reference/log-fields/account/access_requests/
#Gateway DNS - https://developers.cloudflare.com/logs/reference/log-fields/account/gateway_dns/
#Audit logs - https://developers.cloudflare.com/logs/reference/log-fields/account/audit_logs/
#Zero Trust Network Session Logs - https://developers.cloudflare.com/logs/reference/log-fields/account/zero_trust_network_sessions/
#Gateway HTTP - https://developers.cloudflare.com/logs/reference/log-fields/account/gateway_http/
#Protocols by port (Cloudflare) - https://www.cloudflare.com/learning/network-layer/what-is-a-computer-port/
######################################################################################################################

[ccx:cloudflare:waf]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
LINE_BREAKER=([\r\n]+)\{\"\w+\"
KV_MODE=json
disabled=false
TRUNCATE=150000
pulldown_type = 1
#TIME_PREFIX=\"EdgeStartTimestamp\":\"

FIELDALIAS-ClientRequestHost_to_clientHostname = ClientRequestHost AS dest_host
FIELDALIAS-ClientRequestMethod_to_httpMethod = ClientRequestMethod AS http_method
FIELDALIAS-ClientSSLProtocol_to_sslProtocol = ClientSSLProtocol AS ssl_protocol
FIELDALIAS-ClientRequestUserAgent_to_httpUserAgent = ClientRequestUserAgent AS http_user_agent
FIELDALIAS-EdgeReposeStatus_to_status = EdgeResponseStatus AS status
FIELDALIAS-ClientRequestBytes_to_bytesIn = ClientRequestBytes AS bytes_in
FIELDALIAS-EdgeResponseBytes_to_bytesOut = EdgeResponseBytes AS bytes_out
FIELDALIAS-ClientRequestURI_to_uri = ClientRequestURI AS uri
FIELDALIAS-ClientSrcPort_to_srcPort = ClientSrcPort AS src_port
FIELDALIAS-OriginResponseTime_to_responseTime = OriginResponseTime AS response_time
FIELDALIAS-ClientRequestReferer_to_httpReferer = ClientRequestReferer AS http_referer

EVAL-action = if(isnotnull('EdgeRateLimitAction'),'EdgeRateLimitAction',null())
EVAL-vendor_action = coalesce('FirewallMatchesActions{}','FirewallMatchesActions','Action')
EVAL-app = "Cloudflare"
EVAL-dest_ip = if('OriginIP'=="", null(), 'OriginIP')
EVAL-file_name = if('dataset_name'=="ids", if(match(replace('ClientRequestHost', "([^\:]+)\:.+", "\1") + if('ClientRequestURI'=="/", "", 'ClientRequestURI'), ".*[\\\|\/]((?:.+\.\w{2,4}\)?)|(?:\*))$"), replace(replace('ClientRequestHost', "([^\:]+)\:.+", "\1") + if('ClientRequestURI'=="/", "", 'ClientRequestURI'), ".*[\\\|\/]((?:.+\.\w{2,4}\)?)|(?:\*))$", "\1"), null()), null())
EVAL-file_path = if('dataset_name'=="ids", if(match(replace('ClientRequestHost', "([^\:]+)\:.+", "\1") + if('ClientRequestURI'=="/", "", 'ClientRequestURI'), ".*[\\\|\/]((?:.+\.\w{2,4}\)?)|(?:\*))$"),replace('ClientRequestHost', "([^\:]+)\:.+", "\1") + if('ClientRequestURI'=="/", "", 'ClientRequestURI') , null()), null())
EVAL-http_content_type = if('EdgeResponseContentType'=="", null(), 'EdgeResponseContentType')
EVAL-http_referrer = if('ClientRequestReferer'=="", null(), 'ClientRequestReferer')
EVAL-http_referrer_domain = if('ClientRequestReferer'=="", null(), replace('ClientRequestReferer', "(?:\S+:\/\/)?([^\/\:]+).*", "\1"))
EVAL-http_user_agent_length = len('ClientRequestUserAgent')
EVAL-ids_type = if('dataset_name'=="ids", "application", null())
EVAL-severity = if('dataset_name'=="ids", case('SecurityLevel'=="med", "medium", 'SecurityLevel'=="unk" OR 'SecurityLevel'=="off", "unknown", 1==1, 'SecurityLevel'), null())
EVAL-src_ip = if(match('ClientIP', "((?:\d{1,3}\.){3}\d{1,3})"), 'ClientIP', null())
EVAL-uri_path = if('ClientRequestURI'=="/", null(), 'ClientRequestURI')
EVAL-url_domain = replace('ClientRequestHost', "(?:(?:http(?:s)?\:\/\/)?www\.)?([^\:]+)\:?(?:.+)?", "\1")
EVAL-url_length = len(replace('ClientRequestHost', "([^\:]+)\:.+", "\1"))
EVAL-vendor_ip_reputation = if(isnotnull('FirewallMatchesActions{}'), null(), 'EdgePathingStatus')
EVAL-vendor_product = "Cloudflare:WAF"
EVAL-bytes = bytes_in + bytes_out
EVAL-dest = if('OriginIP'=="", null(), 'OriginIP')
EVAL-src = if(match('ClientIP', "((?:\d{1,3}\.){3}\d{1,3})"), 'ClientIP', null())
EVAL-url = if(isnotnull(ClientRequestHost) AND (isnotnull(ClientRequestURI) OR isnotnull(ClientRequestQuery)),replace('ClientRequestHost', "([^\:]+)\:.+", "\1") + if('ClientRequestURI'=="/" OR 'ClientRequestQuery'="", "", coalesce('ClientRequestURI','ClientRequestQuery')),if(isnull(ClientRequestHost),null(),null()))

LOOKUP-ccx_cloudflare_waf_action = ccx_cloudflare_waf_action vendor_action OUTPUT action description
LOOKUP-ccx_cloudflare_waf_ip_reputation = ccx_cloudflare_waf_ip_reputation EdgePathingOp EdgePathingSrc EdgePathingStatus AS vendor_ip_reputation OUTPUT action dataset_name description signature
LOOKUP-ccx_cloudflare_waf_pathing_status = ccx_cloudflare_waf_pathing_status EdgePathingOp EdgePathingSrc EdgePathingStatus OUTPUTNEW action dataset_name description

[ccx:cloudflare:zerotrust:network_sessions]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
LINE_BREAKER=([\r\n]+)\{\"\w+\"
KV_MODE=json
disabled=false
TRUNCATE=150000
pulldown_type = 1
#TIME_PREFIX=\"SessionEndTime\":\"

EVAL-action = if(isnotnull(ConnectionCloseReason) AND match(ConnectionCloseReason,"^.*UNREACHABLE.*|.*BLOCK.*|.*REFUSE.*|.*BLACK.*"),"blocked","allowed") 
EVAL-bytes_in = 'BytesReceived' 
EVAL-bytes_out = 'BytesSent' 
EVAL-bytes = 'BytesSent' + 'BytesReceived' 
EVAL-end_reason = 'ConnectionCloseReason' 
EVAL-src = 'SourceIP' 
EVAL-src_ip = 'SourceIP' 
EVAL-src_port = 'SourcePort' 
EVAL-src_translated_ip = if(isnotnull('InternalSourceIP') AND 'InternalSourceIP'!="",'InternalSourceIP',null()) 
EVAL-src_nt_host = 'DeviceName' 
EVAL-dvc = 'DeviceName' 
EVAL-transport = lower('Protocol') 
EVAL-signature = 'Offramp' 
EVAL-rule = if(isnotnull('EgressRuleName') AND 'EgressRuleName'!="",'EgressRuleName',null()) 
EVAL-dest = 'OriginIP' 
EVAL-dest_ip = 'OriginIP' 
EVAL-dest_port = 'OriginPort' 
EVAL-dest_translated_ip = if(isnotnull('EgressIP') AND 'EgressIP'!="",'EgressIP',null()) 
EVAL-dest_translated_port = if(isnotnull('EgressPort') AND 'EgressPort'!="",'EgressPort',null()) 
EVAL-vendor_product = "Cloudflare:Cloudflare Zero Trust Network Session" 
EVAL-vendor_account = 'AccountID' 
EVAL-session_id = 'SessionID' 
EVAL-user = 'Email' 
EVAL-date = 'Datetime'  
EVAL-session_end_etime = replace(strptime(SessionEndTime,"%Y-%m-%dT%H:%M:%S"),"\.\d+","") 
EVAL-session_start_etime = replace(strptime(SessionStartTime,"%Y-%m-%dT%H:%M:%S"),"\.\d+","") 
EVAL-duration = 'session_end_etime' - 'session_start_etime'

LOOKUP-ccx_cloudflare_net_protocol_support = ccx_cloudflare_net_protocol_support port AS dest_port transport AS Protocol OUTPUTNEW protocol protocol AS app

[ccx:cloudflare:gateway_network]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
LINE_BREAKER=([\r\n]+)\{\"\w+\"
KV_MODE=json
disabled=false
TRUNCATE=150000
pulldown_type = 1
#TIME_PREFIX=\"Datetime\":\"

EVAL-action = case(match(Action,"allow.*|Allow.*"),"allowed",match(Action,"block.*|Block.*"),"blocked")
EVAL-src = 'SourceIP' 
EVAL-src_ip = 'SourceIP'
EVAL-src_port = 'SourcePort'
EVAL-src_translated_ip = if(isnotnull('SourceInternalIP') AND 'SourceInternalIP'!="",'SourceInternalIP',null())
EVAL-transport = lower('Transport')
EVAL-rule = if(isnotnull('PolicyName') AND 'PolicyName'!="",'PolicyName',null()) 
EVAL-dest = 'DestinationIP'
EVAL-dest_ip = 'DestinationIP'
EVAL-dest_port = 'DestinationPort'
EVAL-dvc = 'DeviceName'
EVAL-vendor_product = "Cloudflare:Cloudflare One Gateway Network"
EVAL-vendor_account = 'AccountID'
EVAL-session_id = 'SessionID'
EVAL-user = 'Email'
EVAL-date = 'Datetime'

LOOKUP-ccx_cloudflare_net_protocol_support = ccx_cloudflare_net_protocol_support port AS dest_port transport OUTPUTNEW protocol protocol AS app

[ccx:cloudflare:access_requests]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
LINE_BREAKER=([\r\n]+)\{\"\w+\"
KV_MODE=json
disabled=false
TRUNCATE=150000
pulldown_type = 1
#TIME_PREFIX=\"CreatedAt\":\"

EVAL-action = if(isnotnull('Action') AND Allowed="true","success","failure") 
EVAL-app = replace('AppDomain',"\/.*","")
EVAL-authentication_method = if(match('Action',"^login|Login|logout|Logout"),null(),'Action')
EVAL-authentication_service = 'Connection' 
EVAL-protocol = if(isnotnull('Protocol') AND 'Protocol'!="" AND 'Protocol'!="0",'Protocol',null()) 
EVAL-src = 'IPAddress' 
EVAL-src_ip = 'IPAddress' 
EVAL-reason = if(isnotnull('PurposeJustificationResponse') AND 'PurposeJustificationResponse'!="" AND 'PurposeJustificationResponse'!="0",'PurposeJustificationResponse',null()) 
EVAL-signature = if(isnotnull('PurposeJustificationResponse') AND 'PurposeJustificationResponse'!="" AND 'PurposeJustificationResponse'!="0",'PurposeJustificationResponse',null()) 
EVAL-dest = 'AppDomain' 
EVAL-vendor_product = "Cloudflare:Cloudflare One Access" 
EVAL-user = 'Email' 
EVAL-src_user = 'Email'

[ccx:cloudflare:gateway_dns]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
LINE_BREAKER=([\r\n]+)\{\"\w+\"
KV_MODE=json
disabled=false
TRUNCATE=150000
pulldown_type = 1
#TIME_PREFIX=\"Datetime\":\"

EVAL-category = if(isnotnull('QueryCategoryNames{}') AND 'QueryCategoryNames{}'!="",'QueryCategoryNames{}',null())
EVAL-protocol = if(isnotnull('Protocol') AND 'Protocol'!="" AND 'Protocol'!="0",'Protocol',null())
EVAL-src = 'SrcIP' 
EVAL-src_ip = 'SrcIP' 
EVAL-src_port = if(isnotnull('SrcPort') AND 'SrcPort'!="" AND 'SrcPort'!="0",'SrcPort',null())  
EVAL-dest = coalesce('ResolvedIPs{}','DstIP') 
EVAL-dest_ip = 'DstIP' 
EVAL-dest_port = if(isnotnull('DstPort') AND 'DstPort'!="" AND 'DstPort'!="0",'DstPort',null())
EVAL-query = 'QueryName'
EVAL-message_type = "Query"
EVAL-vendor_product = "Cloudflare:Cloudflare One Gateway DNS" 
EVAL-query_type = 'QueryTypeName'
EVAL-reply_code_id = 'RCode'
EVAL-date = 'Datetime' 
EVAL-user = 'Email'

LOOKUP-ccx_cloudflare_dns_reply_code_id = ccx_cloudflare_dns_reply_code_id reply_code_id OUTPUT reply_code

[ccx:cloudflare:audit_logs]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
LINE_BREAKER=([\r\n]+)\{\"\w+\"
KV_MODE=json
disabled=false
TRUNCATE=150000
pulldown_type = 1
#TIME_PREFIX=\"When\":\"

EVAL-status = if(ActionResult="true","success","failure")
EVAL-result = 'ActionResult'
EVAL-action = case(match(ActionType,".*create.*"),"created",match(ActionType,".*view.*"),"read",match(ActionType,".*delete.*"),"deleted",match(ActionType,".*modify.*"),"modified",match(ActionType,".*modifi.*"),"modified",match(ActionType,".*update.*"),"updated",match(ActionType,".*login.*") AND ActionResult="true","success",match(ActionType,".*login.*") AND ActionResult!="true","failure",1=1,'ActionType')
EVAL-change_type = if(ResourceType="user","AAA","filesystem")
EVAL-object = coalesce(OldValue,ActionType)
EVAL-object_attrs = 'NewValue'
EVAL-object_id = 'ResourceID'
EVAL-user = 'Actoremail'
EVAL-src_user = 'Actoremail'
EVAL-vendor_product = "Cloudflare:Cloudflare Essentials"
EVAL-date = 'When'

[ccx:cloudflare:gateway_http]
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = false
LINE_BREAKER=([\r\n]+)\{\"\w+\"
KV_MODE=json
disabled=false
TRUNCATE=150000
pulldown_type = 1
#TIME_PREFIX=\"Datetime\":\"

EVAL-url = if(isnotnull(URL) AND URL!="",'URL',null())
EVAL-url_domain = if(isnotnull(URL) AND URL!="",replace(URL,"^(?:https?\:\/\/)?(?:www\.)?([^\/\:]+).*$","\1"),null())
EVAL-http_user_agent = if(isnotnull(UserAgent) AND UserAgent!="",'UserAgent',null())
EVAL-http_user_agent_length = if(isnotnull(UserAgent) AND UserAgent!="",len('UserAgent'),null())
EVAL-src = 'SourceIP'
EVAL-src_ip = 'SourceIP'
EVAL-src_port = 'SourcePort'
EVAL-status = if(isnotnull(HTTPStatusCode) AND HTTPStatusCode!="0",'HTTPStatusCode',null())
EVAL-http_method = if(isnotnull(HTTPMethod) AND HTTPMethod!="UNKNOWN",'HTTPMethod',null())
EVAL-dest = 'DestinationIP'
EVAL-dest_ip = 'DestinationIP'
EVAL-dest_port = if(isnotnull('DestinationPort') AND 'DestinationPort'!="" AND 'DestinationPort'!="0",'DestinationPort',null())
EVAL-http_referrer = if(isnotnull(Referer) AND Referer!="",'Referer',null())
EVAL-vendor_product = "Cloudflare:Cloudflare One Gateway HTTP"
EVAL-vendor = "Cloudflare"
EVAL-vendor_action = 'Action'
EVAL-vendor_account = 'AccountID'
#EVAL-app = if(isnotnull(HTTPHost) AND HTTPHost!="",'HTTPHost',null())
EVAL-app = "cloudflare"
EVAL-action = case(match(Action,"allow.*|Allow.*|.*bypass.*|.*Bypass.*|.*isolate.*|.*Isolate.*|.*unknown.*|.*Unknown.*"),"allowed",match(Action,".*block.*|.*Block.*|.*error.*|.*Error.*"),"blocked")
EVAL-file_hash = if(isnotnull(BlockedFileHash) AND BlockedFileHash!="",'BlockedFileHash',null())
EVAL-file_name = if(isnotnull(BlockedFileName) AND BlockedFileName!="",'BlockedFileName',if(isnotnull('DownloadedFileNames{}') AND 'DownloadedFileNames{}'!="" AND 'DownloadedFileNames{}'!="<unknown file name>",'DownloadedFileNames{}',if(isnotnull('UploadedFileNames{}') AND 'UploadedFileNames{}'!="" AND 'UploadedFileNames{}'!="<unknown file name>",'UploadedFileNames{}',null())))
EVAL-signature = if(isnotnull(FileInfo) AND FileInfo!="",'FileInfo',if(isnotnull(BlockedFileReason) AND BlockedFileReason!="" AND BlockedFileReason!="unknown",'BlockedFileReason',if(isnotnull(PolicyName) AND PolicyName!="",'PolicyName',null())))
EVAL-file_size = if(isnotnull(BlockedFileSize) AND BlockedFileSize!="",'BlockedFileSize',null())
EVAL-ids_type = case(((isnotnull(FileInfo) AND NOT FileInfo="") OR (isnotnull(BlockedFileReason) AND NOT (BlockedFileReason="" OR BlockedFileReason="unknown")) OR (isnotnull(PolicyName) AND NOT PolicyName="")),"application")
EVAL-date = 'Datetime'
EVAL-user = 'Email'
EVAL-protocol = if(isnotnull(HTTPVersion) AND HTTPVersion!="",lower(HTTPVersion),null())
EVAL-src_translated_ip = if(isnotnull(InternalSourceIP) AND InternalSourceIP!="",'InternalSourceIP',null())
EVAL-rule = if(isnotnull(PolicyName) AND PolicyName!="",'PolicyName',null())
EVAL-dvc = 'DeviceName'
