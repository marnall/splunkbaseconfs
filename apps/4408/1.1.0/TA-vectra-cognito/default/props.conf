[default]

[vectra:cognito:accountscoring]
DATETIME_CONFIG =
EVAL-dest = coalesce(dest_host, dest_ip)
EVAL-severity = case(severity_id==0,"informational",severity_id>=1 AND severity_id<4,"low",severity_id>=4 AND severity_id<=5,"medium",severity_id>=6 AND severity_id<=7,"high",severity_id>=8,"critical")
EVAL-src = coalesce(src_host, src_ip)
KV_MODE = none
LINE_BREAKER = ([\n\r]+)
MAX_TIMESTAMP_LOOKAHEAD = 13
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %s%3N
TIME_PREFIX = start=
disabled = false
pulldown_type = true
#EXTRACT-cs1Label = cs1Label=(?<cs1Label>.*)\scs1
#EXTRACT-cs1 = cs1=(?<cs1>.*?)\sstart
EXTRACT-vectra_url = Vectra Event URL cs\d+=(?<vectra_url>\S+)
EXTRACT-version = Series\|(?<version>[\d\.]+)
EXTRACT-cat = cat=(?<cat>.*) dvc
EXTRACT-saccount = saccount=(?<saccount>.*) flexNumber1Label=
EXTRACT-dvc = dvc=(?<dvc>.*?) saccount=
EXTRACT-end = end=(?<end>\d+)
EXTRACT-externalId = externalId=(?<externalId>.+?)\s
EXTRACT-flexNumber = flexNumber1Label=(?<flexNumber1Label>.*?) flexNumber1=(?<flexNumber1>[\d\.]+)
EXTRACT-flexNumber2 = flexNumber2Label=(?<flexNumber2Label>.*?) flexNumber2=(?<flexNumber2>[\d\.]+)
EXTRACT-start = start=(?<start>\d+)
FIELDALIAS-alias = cat ASNEW category vectra_url ASNEW href dvc ASNEW "headend_addr" end ASNEW UTCTimeEndCEF externalId ASNEW account_id flexNumber1 ASNEW threat flexNumber2 ASNEW certainty start ASNEW UTCTimeStartCEF

