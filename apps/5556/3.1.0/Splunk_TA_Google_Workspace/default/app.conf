[launcher]
version = 3.1.0
description = "Splunk Add-on for Google Workspace"
author = Splunk, Inc.

[id]
version = 3.1.0
name = Splunk_TA_Google_Workspace

[install]
build = 1
is_configured = false
state = enabled

[package]
id = Splunk_TA_Google_Workspace
check_for_updates = true

[ui]
label = "Splunk Add-on for Google Workspace"
is_visible = true
docs_section_override = AddOns:released

[triggers]
reload.splunk_ta_google_workspace_settings = simple
reload.splunk_ta_google_workspace_account = simple
reload.gws_checkpoints = simple
