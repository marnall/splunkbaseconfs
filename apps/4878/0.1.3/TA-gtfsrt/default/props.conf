[gtfsrt:vehicle]
SHOULD_LINEMERGE = 0
NO_BINARY_CHECK = true
DATETIME_CONFIG = NONE
EXTRACT-operator = trip="\d+-(?<operator>\w+)\s
EVAL-uid = route.":".id

[gtfsrt:tripupdate]
SHOULD_LINEMERGE = 0
NO_BINARY_CHECK = true
DATETIME_CONFIG = NONE

[gtfsrt:alert]
SHOULD_LINEMERGE = 0
NO_BINARY_CHECK = true
DATETIME_CONFIG = NONE