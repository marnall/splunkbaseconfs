[script:savepresentation]
match                 = /savepresentation
script                = savepresentation.py
scripttype            = persist
handler               = application.SavePresentation
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3


