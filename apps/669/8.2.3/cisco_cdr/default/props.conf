
[cucm_cdr]

## Note - the INDEX time keys at the top here
## are effectively unused if you are forwarding
## the data in via a UF or HF.
## So make sure you are also checking the TA_cisco_cdr
## version on your forwarder(s) and update to the latest
## version of TA_cisco_cdr periodically.
SHOULD_LINEMERGE = False
INDEXED_EXTRACTIONS = csv

# SEE "custom_timestamp_extraction" in transforms.conf for how _time is calculated.
#TIME_FORMAT = %s
#TIMESTAMP_FIELDS = dateTimeOrigination
BREAK_ONLY_BEFORE_DATE = False
MAX_TIMESTAMP_LOOKAHEAD = 60

# timestamp recognition is very solid in this sourcetype.
# and it's not uncommon for customers setting up a new instance
# to want to ingest the past few months of historical data.
# therefore we are setting this sourcetype to allow timestamps
# of up to five years in the past.
MAX_DAYS_AGO=1825

# with default initCrcLength of 256,  all get deleted,
# MANY fail crc checks and dont get indexed.
initCrcLength = 1500
ANNOTATE_PUNCT = false
pulldown_type = true

# THE ORDER OF THINGS.
# E A C L E T = Extractions (inline, then transforms.conf, then kv),
#               Then Aliases, Calculated Fields, Lookups, EventTypes, Tags

TRANSFORMS = custom_timestamp_extraction, no_column_headers, multivalue_device_name, cucm_server_name, make_called_party_number_index_time, make_hpdn_index_time, make_cucm_call_id_index_time, make_src_ip_addr_index_time, make_dest_ip_addr_index_time
# build_call_guid_words

REPORT-mgcp-gateway = cisco-cdr-dest-mgcp-gateway,cisco-cdr-orig-mgcp-gateway
REPORT-phone-types = cisco-cdr-orighardphone, cisco-cdr-desthardphone, cisco-cdr-origanalogdevice, cisco-cdr-destanalogdevice, cisco-cdr-origjabberdesktop, cisco-cdr-destjabberdesktop,cisco-cdr-origjabberiphone, cisco-cdr-destjabberiphone,cisco-cdr-origjabberandroid, cisco-cdr-destjabberandroid,cisco-cdr-origjabbertablet, cisco-cdr-destjabbertablet,cisco-cdr-origcupc,cisco-cdr-destcupc,cisco-cdr-origuccx,cisco-cdr-destuccx,cisco-cdr-origcallcontrolgroup,cisco-cdr-destcallcontrolgroup,cisco-cdr-origunityvm,cisco-cdr-destunityvm,cisco-cdr-origipcom,cisco-cdr-destipcom,cisco-cdr-origicd,cisco-cdr-desticd,cisco-cdr-origcfb,cisco-cdr-destcfb, cisco-cdr-destcti, cisco-cdr-origcti, cisco-cdr-destipcc, cisco-cdr-origipcc, cisco-cdr-destata, cisco-cdr-origata
REPORT-call-reference-id-for-cube = cucm_outgoing_call_reference_id,cucm_incoming_call_reference_id
REPORT-comment = cisco-cdr-comment

EVAL-data_type = "cucm"
EVAL-calledPartyNumber = finalCalledPartyNumber

EVAL-conversationId = mvappend(if(origConversationId!=0,origConversationId,null()),if(destConversationId!=0,destConversationId,null()))
EVAL-call_reference_id = case(origSpan>1000000 AND destSpan>1000000 AND match(origDeviceName,"^SEP"),outgoing_call_reference_id,origSpan!=0 AND destSpan!=0,null(),origSpan!=0,incoming_call_reference_id,destSpan!=0,outgoing_call_reference_id)
EVAL-seconds_until_answered = if(dateTimeConnect>0 AND dateTimeOrigination>0,dateTimeConnect - dateTimeOrigination,null())
EVAL-seconds_until_disconnected = dateTimeDisconnect-dateTimeOrigination

EVAL-ring_time = case(dateTimeConnect=0, seconds_until_disconnected, dateTimeOrigination>0,dateTimeConnect - dateTimeOrigination)
#EVAL-rings = case(dateTimeConnect=0, round(seconds_until_disconnected/6,2), dateTimeOrigination>0,round((dateTimeConnect - dateTimeOrigination)/6,2))

# Media bandwidth and type fields
EVAL-callMediaType = if(destVideoCap_Codec==0 AND origVideoCap_Codec==0,"audio","video")
EVAL-audio_leg_kb = destMediaCap_Bandwidth + origMediaCap_Bandwidth
EVAL-video_leg_kb = destVideoCap_Bandwidth + destVideoCap_Bandwidth_Channel2 + origVideoCap_Bandwidth + origVideoCap_Bandwidth_Channel2
EVAL-overall_leg_kb = destMediaCap_Bandwidth + destVideoCap_Bandwidth + destVideoCap_Bandwidth_Channel2 + origMediaCap_Bandwidth + origVideoCap_Bandwidth + origVideoCap_Bandwidth_Channel2

# how we create the "type" field for our users:
# simple!  any device that has the span value of "0" is an internal endpoint.
# except... no.   Old versions of callmanager would do odd things with conference bridges.
# The span field on those calls would hold the conversationId, so span!=0, it would look like a trunk.
# so ok.   if span is 0 OR if it's equal to the conversation id.
# except.. still not quite.  the cisco cdr app lets you set a custom device_type, and these are implicitly always
# for "internal" devices.  Therefore we have a loophole - if a field extraction ever paints one of those on our rows
# in an earlier phase, then by the time this calcualted field comes along, that value will be here.   If we see one
# of those,  then this is an internal endpoint even if the span > 0
# a word about mgcp gateways.  Which are... generally gateways except when someone sticks a fax machine or three
# on some of their ports.  mgcp regex transform creates all the gateway fields.
# "type" field - our logic ignores mgcp fields. trusts only the logic above:
# "device_type" fields - mgcp devices get "gateway" for all these, courtesy of the mgcp transform
# "gateway" fields - calcfields further down will create these for mgcp devices, even if its a fax call
# and the gateway is treated as an internal device.
EVAL-type = case((origSpan=0 OR origSpan==origConversationId OR orig_device_type!="gateway" ) AND (destSpan=0 OR destSpan==destConversationId OR dest_device_type!="gateway"),"internal",origSpan!=0 AND (destSpan=0 OR destSpan==destConversationId OR dest_device_type!="gateway"), "incoming",	(origSpan=0 OR origSpan==origConversationId OR orig_device_type!="gateway") AND destSpan!=0,"outgoing", true(), "tandem")
EVAL-number = mvappend(callingPartyNumber,originalCalledPartyNumber,finalCalledPartyNumber)

#this is a small step of the way towards connecting UCM CDR with ICM things.
EVAL-peripheral_call_key = (globalCallID_callManagerId * (16777216)) +  globalCallID_callId
EVAL-peripheral_call_key_hex = tostring(((globalCallID_callManagerId * (16777216)) +  globalCallID_callId),"hex")
EVAL-ciscoguid = if(isnull(OutgoingProtocolCallRef) AND isnull(IncomingProtocolCallRef),null(),mvappend(OutgoingProtocolCallRef,IncomingProtocolCallRef))

# TODO - it doesn't seem like an outer mvdedup is necessary but... it seems almost weird that it's not necessary.
EVAL-protocolCallRef = mvappend(if(isnull(IncomingProtocolCallRef) OR IncomingProtocolCallRef=="",null(),IncomingProtocolCallRef), if(isnull(OutgoingProtocolCallRef) OR OutgoingProtocolCallRef=="",null(),OutgoingProtocolCallRef))

#EVAL-guid_link = mvdedup(mvappend(if(incomingGuidWord1!="00000000" AND incomingGuidWord1!="",incomingGuidWord1,null()), if(outgoingGuidWord1!="00000000" AND outgoingGuidWord1!="" AND destDeviceName!="*Verint*" AND destDeviceName!="*forcedMTP*",outgoingGuidWord1,null())))


# FUN WITH "BUSINESS HOURS"
# CONS (of what we ship)
# 1 - useless for customers for whom the actual "business hours" definition
#     depends on site and cannot be a global definition.
# 2 - admins setting the TZ of the splunk server to UTC.  - MITIGATED BECAUSE
#     most of these admins have #1 as a problem anyway.
# 3 - holidays aren't in here.  so dead holiday days will drag down business hours averages.
# 4 - as customers customize, (if they have 'short fridays' or 'half saturdays',
#     or manually hacking in labor day etc) it'll add cases, and calling strftime
#     over and over again drags us down
# PROS
# its simple!!
# ALTERNATIVES:
# 1 - times_of_day.csv that allows some wildcard matching and that looks like:
#  day_of_week,hour,minute,is_business_hours
#  Sat,*,*,0
#  Sun,*,*,0
#  Mon,0,*,0
#  Mon,1,*,0
#  ....
#  but this doesn't solve #1 or #3.
# other ideas
#   - somehow have a script (re)generate a time-based lookup with every single epochtime switch. 2 records for every business day in the last year.
#   - do it all client side?  have the client pull a file with some weird syntax...
EVAL-bh_type = case((strftime(_time,"%a")=="Sat" OR strftime(_time,"%a")=="Sun"),"off_hours",(tonumber(strftime(_time,"%H"))>7 AND tonumber(strftime(_time,"%H"))<17),"business_hours",true(),"off_hours")
# possibly in 'call types' -  add a divider and then bh/offhours,  zeroduration, nonzero?

# GATEWAY FIELDS
# see comments on EVAL-type above
EVAL-dest_gateway = case(isnotnull(dest_mgcp_gateway),dest_mgcp_gateway,destSpan=0,null(),destSpan==destConversationId,null(),isnotnull(dest_device_type),null(),destSpan!=0,destDeviceName,true(),null())
EVAL-orig_gateway = case(isnotnull(orig_mgcp_gateway),orig_mgcp_gateway,origSpan=0,null(),origSpan==origConversationId,null(),isnotnull(orig_device_type),null(),origSpan!=0,origDeviceName,true(),null())

# because we can't reference calculated fields in other calculated fields, even though that's been
# a frequent customer and developer request for many years, we are forced to respecify both sides
# inline here wrapped in mvdedup(mvappend()).
# Past a certain point these hoop jumping calculation s become really resource intensive at search
# time and we would move this into the UI layer, as another explicit SPL extraction that the UI
# injects as needed.
EVAL-gateway = mvdedup(mvappend(case(isnotnull(dest_mgcp_gateway),dest_mgcp_gateway,destSpan=0,null(),destSpan==destConversationId,null(),isnotnull(dest_device_type),null(),destSpan!=0,destDeviceName,true(),null()),  case(isnotnull(orig_mgcp_gateway),orig_mgcp_gateway,origSpan=0,null(),origSpan==origConversationId,null(),isnotnull(orig_device_type),null(),origSpan!=0,origDeviceName,true(),null())))

# DEVICE TYPE FIELDS
# several extractions like MGCP gateways and conference_bridge devices set a device_type.
# However other gateways and SIP trunks do not, so this calculated field sneaks in and fills
# these gaps for us.
EVAL-dest_device_type = case(isnotnull(dest_mgcp_gateway),"gateway",isnotnull(dest_device_type),dest_device_type,destSpan!=0,"gateway",true(),dest_device_type)
EVAL-orig_device_type = case(isnotnull(orig_mgcp_gateway),"gateway",isnotnull(orig_device_type),orig_device_type,origSpan!=0,"gateway",true(),orig_device_type)

# device_type is handled by JS
EVAL-internal_device_type = mvdedup(mvappend(if(orig_device_type!="gateway",orig_device_type,null()),if(dest_device_type!="gateway",dest_device_type,null())))
# likewise device_name is handled by JS
EVAL-internal_device_name = mvdedup(mvappend(if(orig_device_type!="gateway",origDeviceName,null()),if(dest_device_type!="gateway",destDeviceName,null())))


EVAL-minute_of_hour = strftime(_time,"%M")
EVAL-hour_of_day = strftime(_time,"%H")
EVAL-day_of_week = strftime(_time,"%a")
EVAL-day_of_year = strftime(_time,"%j")
EVAL-month_of_year = strftime(_time,"%B")

EVAL-duration_in_minutes = round(duration/60,2)
EVAL-cause = case(destCause_value>0,destCause_value,origCause_value>0,origCause_value,true(),0)
EVAL-transfers = if(origCause_value=393216 OR destCause_value=393216,1,0)
EVAL-legs = 1
EVAL-call_id = globalCallId_ClusterID + "." + globalCallID_callManagerId + "." + globalCallID_callId

#deprecated
EVAL-callId = globalCallId_ClusterID + "." + globalCallID_callManagerId + "." + globalCallID_callId


# field alias not appropriate because we later use streamstats to do
# sum(duration_total) as duration_total by call_id
EVAL-duration_total = duration
EVAL-on_hook_party = case(origCallTerminationOnBehalfOf="12" OR origTerminationOnBehalfOf="12","caller",destCallTerminationOnBehalfOf="12" OR destTerminationOnBehalfOf="12","recipient",true(),null())

# WILL GO AWAY someday, because we make the same field using INGEST_EVAL
# however for data the customer has indexed prior to Cisco CDR version 5.3.9,  we still need this
# rule to be here.
EVAL-device_name = mvappend(origDeviceName,destDeviceName)


# we overwrite this explicitly in the UI with the dotted-quad values, but this is here for legacy
#cases like dc(ip_addr)
EVAL-ip_addr = mvappend(origIpAddr,destIpAddr)

