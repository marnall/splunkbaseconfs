ure_id_field11,feature_id_field12
TIMESTAMP_FIELDS = unix_time
TIME_FORMAT = %s
SHOULD_LINEMERGE = False

TRANSFORMS = remove_lines_without_data, cube_server_name, cube_calling_party_number, cube_called_party_number, cube_duration

REPORT-cube-field-extractions = cube_call_reference_id,cube_final_xlated_cgn, cube_final_xlated_cdn, cube_rxd_cdn, cube_rxd_cgn

# NOTE - although INDEXED_EXTRACTIONS=csv is in place on the forwarder, we still leave these here
# so customers can search historical data from before their upgrade to 7.7.1
REPORT-AutoHeader = AutoHeader-ios-gateway-detailed

FIELDALIAS-dateTimeConnect = unix_time AS dateTimeConnect

# NOTE - although INDEXED_EXTRACTIONS=csv is in place on the forwarder, we still leave these here
# so customers can search historical data from before their upgrade to 7.7.1
EVAL-callingPartyNumber = clid
EVAL-calledPartyNumber = dnis

EVAL-call_id = call_reference_id
EVAL-number = mvappend(clid,dnis)
EVAL-legs = 1
# without the spaces it will match ciscoguid in other sourcetypes.
EVAL-ciscoguid = replace(h323_conf_id," ","")

EVAL-data_type = "cube"



#duration is now calculated via INGEST_EVAL.   Over time as customers roll this out eventually we'll be
# able to phase out the second half of these if() statements and just rely in the indexed field being there.
EVAL-dateTimeDisconnect = unix_time + if(isnotnull(duration), duration, round(if(isnotnull(tx_duration) AND tx_duration!="",tonumber(substr(tx_duration,0,len(tx_duration)-3))/1000,tonumber(strptime(h323_disconnect_time,"*%H:%M:%S.%3N %Z %a %b %d %Y")) - tonumber(strptime(h323_connect_time,"*%H:%M:%S.%3N %Z %a %b %d %Y"))),3))
EVAL-cube_duration = if(isnotnull(duration),duration,round(if(isnotnull(tx_duration),tonumber(substr(tx_duration,0,len(tx_duration)-3))/1000,tonumber(strptime(h323_disconnect_time,"*%H:%M:%S.%3N %Z %a %b %d %Y")) - tonumber(strptime(h323_connect_time,"*%H:%M:%S.%3N %Z %a %b %d %Y"))),3))
EVAL-duration_total=if(isnotnull(duration),duration,round(if(isnotnull(tx_duration),tonumber(substr(tx_duration,0,len(tx_duration)-3))/1000,tonumber(strptime(h323_disconnect_time,"*%H:%M:%S.%3N %Z %a %b %d %Y")) - tonumber(strptime(h323_connect_time,"*%H:%M:%S.%3N %Z %a %b %d %Y"))),3))
EVAL-duration_in_minutes=if(isnotnull(duration),round(duration/60,2),round(round(if(isnotnull(tx_duration),tonumber(substr(tx_duration,0,len(tx_duration)-3))/1000,tonumber(strptime(h323_disconnect_time,"*%H:%M:%S.%3N %Z %a %b %d %Y")) - tonumber(strptime(h323_connect_time,"*%H:%M:%S.%3N %Z %a %b %d %Y"))),3)/60,2))

EVAL-cause_description = upper(substr(disconnect_text,1,1)) . substr(replace(disconnect_text," \(\d+\)",""),2)

EVAL-minute_of_hour = strftime(_time,"%M")
EVAL-hour_of_day = strftime(_time,"%H")
EVAL-day_of_week = strftime(_time,"%a")
EVAL-day_of_year = strftime(_time,"%j")
EVAL-month_of_year = strftime(_time,"%B")

#Derive the Total Voice Playout Duration for Active Voice by adding the OnTimeRvPlayout value to the GapFill values.
EVAL-gapfill_with_interpolation = tonumber(substr(gapfill_with_interpolation,0,len(gapfill_with_interpolation)-3))
EVAL-gapfill_with_prediction = tonumber(substr(gapfill_with_interpolation,0,len(gapfill_with_interpolation)-3))
EVAL-gapfill_with_redundancy = tonumber(substr(gapfill_with_interpolation,0,len(gapfill_with_interpolation)-3))
EVAL-gapfill_with_silence = tonumber(substr(gapfill_with_interpolation,0,len(gapfill_with_interpolation)-3))
EVAL-unusable_packets = early_packets + late_packets + lost_packets

EVAL-huntgroup_vdn = if(substr(dnis,1,3)=="000" AND length(dnis)==6,substr(dnis,4,3),null())

LOOKUP-huntgroup = vg_huntgroups vdn as huntgroup_vdn site as site OUTPUT huntgroup
LOOKUP-causeCode = vg_q931_cause_codes decimal as h323_disconnect_cause OUTPUT cause as h323_disconnect_description
