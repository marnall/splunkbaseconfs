[cucm_cmr]
SHOULD_LINEMERGE = False
INDEXED_EXTRACTIONS=csv
TIME_FORMAT = %s
TIMESTAMP_FIELDS = dateTimeStamp
BREAK_ONLY_BEFORE_DATE = False
MAX_TIMESTAMP_LOOKAHEAD = 13

# timestamp recognition is very solid in this sourcetype.
# and it's not uncommon for customers setting up a new instance
# to want to ingest the past few months of historical data.
# therefore we are setting this sourcetype to allow timestamps
# of up to five years in the past.
MAX_DAYS_AGO=1825



# with default initCrcLength of 256,  all get deleted,
# MANY fail crc checks and dont get indexed.
initCrcLength = 1000
ANNOTATE_PUNCT = false
pulldown_type = true
TRANSFORMS = no_column_headers, cucm_server_name


REPORT-varVQMetrics = cisco-cmr-varvqmetrics
REPORT-videoTransmissionMetrics1 = cisco-cmr-videotransmissionmetrics
REPORT-videoReceptionMetrics1 = cisco-cmr-videoreceptionmetrics
REPORT-videoTransmissionMetrics2 = cisco-cmr-videotransmissionmetrics_channel2
REPORT-videoReceptionMetrics2 = cisco-cmr-videoreceptionmetrics_channel2

LOOKUP-cluster = clusters clusterId as globalCallId_ClusterID OUTPUT name as clusterName group as clusterGroup locale as clusterLocale

#patch for occasional overflow error in UCM's jitter values.
EVAL-jitter=if(jitter="2147483647",0,jitter)

EVAL-call_id = globalCallId_ClusterID + "." + globalCallID_callManagerId + "." + globalCallID_callId
EVAL-cmr_duration = duration
EVAL-duration = null()

EVAL-data_type = "cucm"

# trim out "zero" values for these - They're not really valid, and they make user-supplied complex search criteria be awkward.
EVAL-MLQK = if(round(MLQK)==0,null(),MLQK)
EVAL-MLQKav = if(round(MLQKav)==0,null(),MLQKav)
EVAL-MLQKmn = if(round(MLQKmn)==0,null(),MLQKmn)
EVAL-MLQKmx = if(round(MLQKmx)==0,null(),MLQKmx)

#deprecated
EVAL-callId = globalCallId_ClusterID + "." + globalCallID_callManagerId + "." + globalCallID_callId


