# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 9

[launcher]
author = Maciej Duda
version = 1.0.7
description = Collect  eventlogs from JumpCloud Directory Insights via API - https://docs.jumpcloud.com/api/insights/directory/1.0/index.htmlCreates new sourcetype jumpcloud:json.*Configuration*Required inputs:Name - put any name you want to easily identify the inputInterval - How often will you pull logs (default: 300 seconds) TODO: this feature isn't implemented yetIndex - name of splunk index to save the logsJumpCloud API key - an API key generated by JumpCloud admin (https://support.jumpcloud.com/support/s/article/jumpcloud-apis1)This is an unofficial app.

[ui]
is_visible = 1
label = JumpCloud Directory Insights logs add-on
docs_section_override = AddOns:released

[package]
id = TA-jumpcloud-directory-insights-logs

[triggers]
reload.addon_builder = simple
reload.ta_jumpcloud_directory_insights_logs_account = simple
reload.ta_jumpcloud_directory_insights_logs_settings = simple
reload.passwords = simple

