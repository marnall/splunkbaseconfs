[Requests over time]
search = sourcetype="squid" action="*" | eval reqcount=1 | timechart per_second(reqcount) by action

[Bandwidth over time]
search = sourcetype="squid" bytes="*" | timechart per_second(bytes) as "Bytes per second"

[Top 10 client IPs]
search = sourcetype="squid" action="*" | top 10 clientip

[Top 10 destination sites]
search = sourcetype="squid" action="*" | top 10 uri_host
