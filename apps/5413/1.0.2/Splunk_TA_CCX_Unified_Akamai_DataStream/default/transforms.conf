[ccx_akamai_datastream_vendor_action]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_akamai_datastream_vendor_action.csv

[ccx_akamai_datastream_security_parser]
CLEAN_KEYS = 0
REGEX = ^(?<policy_id>.*)\|(?<rules>.*)\|(?<category>.*)
SOURCE_KEY = securityRules

[ccx_akamai_datastream_vendor_action]
CLEAN_KEYS = 0
FORMAT = vendor_action::$1
REGEX = .+\_([^\_]+(?=\|))\|.+
SOURCE_KEY = errorCode
