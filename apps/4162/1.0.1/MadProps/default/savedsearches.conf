[Mad Props - 01 - Generate initial lookup for active sourcetypes]
action.email.useNSSubject = 1
alert.track = 0
description = Use this report to initiate the lookup for active sourcetypes. See documentation for more details.
dispatch.earliest_time = -24h
display.general.timeRangePicker.show = 0
search = | metadata type=sourcetypes index="*"\
| fields sourcetype\
| outputlookup madprops_active_sourcetypes_lookup

[Mad Props - 02 - Generate initial empty whitelist lookups]
action.email.useNSSubject = 1
alert.track = 0
description = Use this report to initiate empty whitelist lookups. See documentation for more details.
display.general.timeRangePicker.show = 0
search = | makeresults\
| eval app=""\
| eval whitelisted=""\
| fields - _time\
| outputlookup madprops_apps_whitelist_lookup\
| fields - app\
| eval sourcetype=""\
| outputlookup madprops_sourcetypes_whitelist_lookup\
| eval _mkv_child=""\
| eval parameter=""\
| outputlookup madprops_parameters_whitelist_lookup

[Mad Props - 03 - Generate lookup base for whitelisting apps]
action.email.useNSSubject = 1
alert.track = 0
description = Use this report to generate a base lookup for whitelisting apps. See documentation for more details.
display.general.timeRangePicker.show = 0
search = | rest /servicesNS/-/-/configs/conf-props splunk_server=`mad_props_splunk_server`\
| fields eai:acl.app\
| rename eai:acl.app as app\
| dedup app\
| eval whitelisted=if(app=="learned" OR app=="search" OR app=="splunk_archiver" OR app=="splunk_instrumentation" OR app=="splunk_monitoring_console" OR app=="system","yes","no")\
| eval _sortfield=lower(app)\
| sort _sortfield\
| fields - _sortfield\
| outputlookup madprops_apps_whitelist_lookup_base

[Mad Props - 04 - Generate base lookup for whitelisting sourcetypes]
action.email.useNSSubject = 1
alert.track = 0
description = Use this report to generate a base lookup for whitelisting sourcetypes. See documentation for more details.
display.general.timeRangePicker.show = 0
search = | rest /servicesNS/-/-/configs/conf-props splunk_server=`mad_props_splunk_server`\
| rename eai:acl.app as app\
| search NOT [|inputlookup madprops_apps_whitelist_lookup | search whitelisted="yes" | fields app]\
| dedup title\
| rename title as sourcetype\
| fields sourcetype\
| dedup sourcetype\
| eval whitelisted="yes"\
| append [| inputlookup madprops_active_sourcetypes_lookup | eval whitelisted="no"]\
| reverse\
| dedup sourcetype\
| sort sourcetype\
| outputlookup madprops_sourcetypes_whitelist_lookup_base

[Mad Props - 05 - Generate base lookup for whitelisting parameters]
action.email.useNSSubject = 1
alert.track = 0
description = Use this report to generate a base lookup for whitelisting sourcetypes parameters. See documentation for more details.
display.general.timeRangePicker.show = 0
search = | rest /servicesNS/-/-/configs/conf-props splunk_server=`mad_props_splunk_server`\
| rename eai:acl.app as app\
| search NOT [|inputlookup madprops_apps_whitelist_lookup | search whitelisted="yes" | fields app]\
| dedup title\
| rename title as sourcetype\
| table sourcetype\
| foreach sourcetype [eval parameters="LINE_BREAKER MAX_TIMESTAMP_LOOKAHEAD SHOULD_LINEMERGE TIME_FORMAT TIME_PREFIX TRUNCATE"]\
| rex field="parameters" max_match="0" "(?<parameter>.+?)(\s|$)"\
| fields - parameters\
| mvexpand parameter\
| eval whitelisted="no"\
| outputlookup madprops_parameters_whitelist_lookup_base

[Mad Props - 06 - Active sourcetypes]
action.lookup = 1
action.lookup.filename = madprops_active_sourcetypes_lookup.csv
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = 0 3 * * *
description = This alert runs once a day to build and maintain a list of sourcetypes under which data has been indexed in the last 48 hours.
dispatch.earliest_time = -24h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = fast
display.page.search.tab = statistics
display.visualizations.charting.chart = line
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = MadProps
request.ui_dispatch_view = search
search = | metadata type=sourcetypes index="*"\
| fields sourcetype
