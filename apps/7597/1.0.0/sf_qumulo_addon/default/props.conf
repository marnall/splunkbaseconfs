[ldo:qumulo]
EXTRACT-ldo_qumulo = \w+\s+\d+\s+\d+:\d+:\d+\s+(?<hostname>[^ ]*)\s+(?<app>[^ ]*)\s+(?<client_ip>\d+\.\d+\.\d+\.\d+),\"(?<user>[^\"]*)\",(?<protocol>[^,]*),(?<op>[^,]*),(?<status>[^,]*),(?<id>[^,]*),\"(?<object1>[^\"]*)?\",\"(?<object2>[^\"]*)\"
FIELDALIAS-action = client_ip AS src_ip src_ip AS src user AS src_user
EVAL-action = case(status="ok","success",like(status,"%_error"),"error",like(status,"%_failure"),"failure",like(status,"%_FAILURE"),"failure")
