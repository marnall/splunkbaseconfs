methods = POST, GET

[expose:TA_gitlab_auditor_settings_specified]
pattern = TA_gitlab_auditor_settings/*
methods = POST, GET, DELETE

[expose:TA_gitlab_auditor_gitlabapi]
pattern = TA_gitlab_auditor_gitlabapi
methods = POST, GET

[expose:TA_gitlab_auditor_gitlabapi_specified]
