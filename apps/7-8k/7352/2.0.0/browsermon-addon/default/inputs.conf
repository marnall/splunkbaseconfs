# Version 2.0.0
# This is browsermon addon (inputs.conf) that will forward three types of logs to Splunk
# 1. Watchdog Logs
# 2. Browsermon System Logs
# 3. Browser History Logs

# Before deploying this addon, please ensure Splunk indexer have 
# Browsermon App for Splunk already installed. Otherwise, data may be lost
# due to non-availability of browsermon and browsermon_system indexes.

# please modify "disabled" flag based on your OS and System type

###### WATCHDOG ##############
#watchdog-unicorn
[monitor:///opt/browsermon-watchdog/logs/watchdog_gunicorn.log]
index = browsermon_system
disabled = true
sourcetype = browsermon-watchdog-gunicorn

#watchdog-processes
[monitor:///opt/browsermon-watchdog/logs/watchdog_*.log]
index = browsermon_system
disabled = true
blacklist = gunicorn
sourcetype = browsermon-watchdog-processes

###### LINUX BASED ##############
#browsermon-history-linux-json
[monitor:///opt/browsermong/history/browsermon_*.json]
index = browsermon
disabled = true
sourcetype = browsermon-history-json

#browsermon-history-linux-csv
[monitor:///opt/browsermong/history/browsermon_*.csv]
index = browsermon
disabled = true
sourcetype = browsermon-history-csv

#browsermon-controller-linux
[monitor:///opt/browsermong/browsermon.log]
index = browsermon_system
disabled = true
sourcetype = browsermon-controller-logs

###### WINDOWS BASED ##############
#browsermon-history-windows-json
[monitor://C:\browsermon\history\browsermon_*.json]
index = browsermon
disabled = true
sourcetype = _json

#browsermon-history-windows-csv
[monitor://C:\browsermon\history\browsermon_*.csv]
index = browsermon
disabled = true
sourcetype = csv

#browsermon-controller-windows
[monitor://C:\browsermon\browsermon.log]
index = browsermon_system
disabled = true
sourcetype = browsermon-controller-logs