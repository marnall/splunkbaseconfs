[pritunl:journal]
EVAL-vendor_product = "Pritunl"
FIELDALIAS-user_name = user_name AS user
FIELDALIAS-mac_addr = mac_addr AS src_mac
FIELDALIAS-event = event AS action
FIELDALIAS-real_address = real_address AS src_ip
FIELDALIAS-virt_address = virt_address AS dest_ip
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
category = Structured
description = Pritunl Journal logs
pulldown_type = 1
TRUNCATE = 9999999
INDEXED_EXTRACTIONS = json

