#
# Splunk app KV Store lookup configuration file
#
[lookout_mra_routing_lookup]
external_type = kvstore
collection = lookout_mra_routing
fields_list = _key, endpoint, proxyEndpoint, proxyUsername

[lookout_mra_connection_lookup]
external_type = kvstore
collection = lookout_mra_connection
fields_list = _key, entName, streamPosition, threatEnabled, deviceEnabled, auditEnabled, isActive

[lookout_mra_history_lookup]
external_type = kvstore
collection = lookout_mra_history
fields_list = _key, connectionKey, eventCount, lastFetch, currentStreamPosition, exception
