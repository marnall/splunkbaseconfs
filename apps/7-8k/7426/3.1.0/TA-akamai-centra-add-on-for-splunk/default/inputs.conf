[akamai_guardicore]
start_by_shell = false
python.version = python3
sourcetype = akamai:guardicore
interval = 30
port = 443
request_timeout = 15
log_export_delay = 15
event_limit = 1000
connection_type = ['Failed', 'Redirected']
policy_verdict = ['Alerted', 'Blocked']
use_daily_connections = False
maximum_task_retries_per_date = 2
use_proxy = False
disabled = 0

