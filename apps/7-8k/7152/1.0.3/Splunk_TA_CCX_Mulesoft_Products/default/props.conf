EVAL-status = 'Status Code'
EVAL-subject = case(('action' IN ("Warning", "download", "Approved")), 'vendor_action')
EVAL-type = case('action'=="Warning", "warning", 'action'=="download", "event", 'action'=="Approved", "alert")
EVAL-user = if(isnull('userName') OR 'userName'=="" OR 'userName'=="null", null(), 'userName')
EVAL-vendor_product = "MuleSoft:Anypoint"

REPORT-ccx_mulesoft_anypoint_vendor_action = ccx_mulesoft_anypoint_vendor_action
