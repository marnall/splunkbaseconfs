[ccx:mulesoft:anypoint]
KV_MODE = none
INDEXED_EXTRACTIONS = json
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
category = Structured
description = CCX Mulesoft Products
disabled = false
pulldown_type = true

LOOKUP-ccx_mulesoft_anypoint_lookup = ccx_mulesoft_anypoint_lookup vendor_action OUTPUTNEW action change_type dataset_name

FIELDALIAS-API Name = "API Name" AS APIName
FIELDALIAS-RequestOutcome = "Request Outcome" AS RequestOutcome

EVAL-action = case('vendor_action'=="Login" AND 'failed'=="false", "success", 'vendor_action'=="Login" AND 'failed'=="true", "failure", isnotnull('APIName'), lower('RequestOutcome'))
EVAL-app = case(('action' IN ("Warning", "download", "Approved")), "MuleSoft:Anypoint", ('action' IN ("Login")), coalesce('payload.properties.connectedApp.as_id', "anypoint"), isnotnull('APIName'), 'APIName')
EVAL-body = case(('action' IN ("Warning", "download", "Approved")), 'vendor_action')
EVAL-description = case(('action' IN ("Warning", "download", "Approved")), 'vendor_action')
EVAL-http_method = 'Verb'
EVAL-http_user_agent = 'User Agent Name'." ".'User Agent Version'
EVAL-http_user_agent_length = len('User Agent Name'." ".'User Agent Version')
EVAL-object = case(('action' IN ("Update Link", "update", "Stop", "stop", "status update", "Start", "start", "Save Branch", "run", "restart", "Rename Project", "rename", "Remove Dependencies", "Read", "Purge queue", "Publish to Exchange", "publish", "Permissions change", "Patch Dependencies", "Move File", "Modify queue", "Modify exchange", "Modify", "modify", "Migrate role", "Merge Branch", "Import Project", "Edit", "edit", "deploy", "Delete store", "Delete queue", "Delete Project", "Delete private space", "Delete Link", "Delete File", "Delete exchange", "Delete client", "Delete Branch", "Delete binding", "Delete", "delete", "Create Trusted Domain", "Create store", "Create queue", "Create Project", "Create private space", "Create Link", "Create exchange", "Create client", "Create Branch", "Create binding", "Create", "create", "Clone Project", "Clean Branch")), 'objects{}.objectName')
EVAL-object_category = case(('action' IN ("Update Link", "update", "Stop", "stop", "status update", "Start", "start", "Save Branch", "run", "restart", "Rename Project", "rename", "Remove Dependencies", "Read", "Purge queue", "Publish to Exchange", "publish", "Permissions change", "Patch Dependencies", "Move File", "Modify queue", "Modify exchange", "Modify", "modify", "Migrate role", "Merge Branch", "Import Project", "Edit", "edit", "deploy", "Delete store", "Delete queue", "Delete Project", "Delete private space", "Delete Link", "Delete File", "Delete exchange", "Delete client", "Delete Branch", "Delete binding", "Delete", "delete", "Create Trusted Domain", "Create store", "Create queue", "Create Project", "Create private space", "Create Link", "Create exchange", "Create client", "Create Branch", "Create binding", "Create", "create", "Clone Project", "Clean Branch")), 'objects{}.objectType')
EVAL-object_id = case(('action' IN ("Update Link", "update", "Stop", "stop", "status update", "Start", "start", "Save Branch", "run", "restart", "Rename Project", "rename", "Remove Dependencies", "Read", "Purge queue", "Publish to Exchange", "publish", "Permissions change", "Patch Dependencies", "Move File", "Modify queue", "Modify exchange", "Modify", "modify", "Migrate role", "Merge Branch", "Import Project", "Edit", "edit", "deploy", "Delete store", "Delete queue", "Delete Project", "Delete private space", "Delete Link", "Delete File", "Delete exchange", "Delete client", "Delete Branch", "Delete binding", "Delete", "delete", "Create Trusted Domain", "Create store", "Create queue", "Create Project", "Create private space", "Create Link", "Create exchange", "Create client", "Create Branch", "Create binding", "Create", "create", "Clone Project", "Clean Branch")), 'objects{}.objectId')
EVAL-reason = case(('action' IN ("Login")), if('failed'=="true", 'failedCause', null()))
EVAL-response_time = case(isnotnull('APIName'), 'Response Time')
EVAL-result = case(('action' IN ("Update Link", "update", "Stop", "stop", "status update", "Start", "start", "Save Branch", "run", "restart", "Rename Project", "rename", "Remove Dependencies", "Read", "Purge queue", "Publish to Exchange", "publish", "Permissions change", "Patch Dependencies", "Move File", "Modify queue", "Modify exchange", "Modify", "modify", "Migrate role", "Merge Branch", "Import Project", "Edit", "edit", "deploy", "Delete store", "Delete queue", "Delete Project", "Delete private space", "Delete Link", "Delete File", "Delete exchange", "Delete client", "Delete Branch", "Delete binding", "Delete", "delete", "Create Trusted Domain", "Create store", "Create queue", "Create Project", "Create private space", "Create Link", "Create exchange", "Create client", "Create Branch", "Create binding", "Create", "create", "Clone Project", "Clean Branch")) AND 'failed'=="false", "success", ('action' IN ("Update Link", "update", "Stop", "stop", "status update", "Start", "start", "Save Branch", "run", "restart", "Rename Project", "rename", "Remove Dependencies", "Read", "Purge queue", "Publish to Exchange", "publish", "Permissions change", "Patch Dependencies", "Move File", "Modify queue", "Modify exchange", "Modify", "modify", "Migrate role", "Merge Branch", "Import Project", "Edit", "edit", "deploy", "Delete store", "Delete queue", "Delete Project", "Delete private space", "Delete Link", "Delete File", "Delete exchange", "Delete client", "Delete Branch", "Delete binding", "Delete", "delete", "Create Trusted Domain", "Create store", "Create queue", "Create Project", "Create private space", "Create Link", "Create exchange", "Create client", "Create Branch", "Create binding", "Create", "create", "Clone Project", "Clean Branch")) AND 'failed'=="true", "failure")
