
[admin:xposedornot]
match = /
members = xposedornot_settings, xposedornot_xposedornot

[admin_external:xposedornot_settings]
handlertype = python
python.version = python3
handlerfile = xposedornot_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:xposedornot_xposedornot]
handlertype = python
python.version = python3
handlerfile = xposedornot_rh_xposedornot.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[script:api_key_validator]
handlertype = python
python.version = python3
match = /services/data/validate_api_key
handler = api_key_validator.ApiKeyValidator
output_modes = json

