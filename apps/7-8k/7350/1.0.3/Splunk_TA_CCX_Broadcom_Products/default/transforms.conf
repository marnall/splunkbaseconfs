
[ccx_broadcom_symantec_pam_xml_transform]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = \<([^\>]+)\>([^\<]+)\<

[ccx_broadcom_symantec_pam_kvp_transform]
CLEAN_KEYS = 0
FORMAT = $1::$2
MV_ADD = 1
REGEX = \s([^\:]+):\s((?:(?!, ).)*)(?:\,|;|\.)

[ccx_broadcom_symantec_pam_vendor_details]
CLEAN_KEYS = 0
REGEX = .+Details\:(?:\s+)?(?<vendor_details>.+)

[ccx_broadcom_symantec_pam_xml_kvp_transform]
CLEAN_KEYS = 1
FORMAT = $1::$2
MV_ADD = 1
REGEX = \<k\>((?:(?!\<\/k\>).)*)\<\/k\>\<v\>((?:(?!\<\/v\>).)*)\<\/v\>

[ccx_broadcom_symantec_pam_vendor_type]
CLEAN_KEYS = 0
MV_ADD = 1
REGEX = .+\<type\>(?<vendor_type>[^\<]+)\<\/type\>.+
