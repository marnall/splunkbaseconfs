
[veeam_vbr_syslog]
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1

EXTRACT-fullName = fullName="(?<fullName>[^"]*)"
EXTRACT-original_host = \s(?<original_host>\S+)\s(?:Veeam_MP|Veeam_Backup)
EXTRACT-param3 = param3="(?<param3>[^"]*)"
EXTRACT-param6 = param6="(?<param6>[^"]*)"
EXTRACT-Result = Result="(?<Result>[^"]*)"
EXTRACT-UserName = UserName="(?<UserName>[^"]*)"

EVAL-action = case(match('Description', "(created|added)"), "created", match('Description', "(removed|deleted)"), "deleted", match('Description', "(started|initiated|launched)"), "started", match('Description', "(changed)"), "modified", match('Description', "(restored)"), "restarted", match('Description', "(closed|finished)"), "stopped")
EVAL-app = "Veeam MP"
EVAL-body = 'Description'
EVAL-change_type = case((match('Description', "(created|removed|added|deleted|changed|started|initiated|closed|launched|restored)") AND NOT match('Description', "fail|finish|malware")), case(match('EventName', "^(User or Group)") OR match('Description', "^(Credentials)") OR (match('Description', "((?:U|u)ser)") AND match('Description', "((?:R|r)ole)")), "AAA", match('Description', "(File|file)"), "filesystem", match('Description', "(Backup & Replication)"), "backup and replication", match('Description', "((?:r|R)estore point)"), "restore point", match('Description', "^(Backup job)"), "backup job", match('Description', "^(Backup Copy job)"), "backup copy job", match('Description', "(backup repository)"), "backup repository", match('Description', "(backup proxy)"), "backup proxy", match('Description', "^(Backup server)"), "backup server", match('Description', "^(Rescan job)"), "rescan job", match('Description', "(session)"), "session", match('Description', "((?:T|t)ape)"), "tape", match('Description', "(Free job)"), "free job"))
EVAL-description = 'Description'
EVAL-dest = 'VbrHostName'
EVAL-object = case((match('Description', "(created|removed|added|deleted|changed|started|initiated|closed|launched|restored)") AND NOT match('Description', "fail|finish|malware")), case(match('EventName', "^(User or Group)") OR match('Description', "^(Credentials)") OR (match('Description', "((?:U|u)ser)") AND match('Description', "((?:R|r)ole)")), coalesce('UserName', 'fullName'), isnotnull('ObjectName'), 'ObjectName', isnotnull('JobID'), 'JobID', isnotnull('VmName'), 'VmName', isnotnull('JobSessionID'), 'JobSessionID'))
EVAL-signature = case((match('Description', "((?:task has finished)|(?:Backup Copy job)|(?:Backup job)|(?:Backup Copy job)|(?:Retry of Backup job)|(?:Malware detection session)|(?:finished)|(?:completed)|(?:lost connection)|(?:Invalid MFA code)|(?:Veeam Backup and Replication service is connected))") AND NOT match('Description', "(started)")), 'Description')
EVAL-src = case((match('Description', "((?:task has finished)|(?:Backup Copy job)|(?:Backup job)|(?:Backup Copy job)|(?:Retry of Backup job)|(?:Malware detection session)|(?:finished)|(?:completed)|(?:lost connection)|(?:Invalid MFA code)|(?:Veeam Backup and Replication service is connected))") AND NOT match('Description', "(started)")), 'SourceHostName')
EVAL-status = if(match('Description', "((?:F|f)ail)"), "failure", "success")
EVAL-type = case(match('Description', "((?:task has finished)|(?:Backup Copy job)|(?:Backup job)|(?:Backup Copy job)|(?:Retry of Backup job)|(?:Malware detection session)|(?:finished)|(?:completed)|(?:lost connection)|(?:Invalid MFA code)|(?:Veeam Backup and Replication service is connected))"), case(match('Description', "((?:task has finished)|(?:finished)|(?:completed))") AND NOT match('Description', "((?:W|w)arning)"), "event", match('Description', "((?:W|w)arning)"), "warning", NOT match('Description', "((?:task has finished)|(?:finished)|(?:completed))") AND NOT match('Description', "(warning)"), "alert"))
EVAL-user = case(isnotnull(user) AND user!="", user, instanceId IN ("40201","42402","42404","42405","40204","40400","40500","40600","40700","42400","42401","42403"), if(isnull(fullName) OR fullName="","unknown",fullName), instanceId IN ("36013"), if(isnull(InitiatorName) OR InitiatorName="","unknown",InitiatorName), instanceId IN ("41800","41810"), if(isnull(param3) OR param3="","unknown",param3), instanceId IN ("23090","23420","41402"), if(isnull(param6) OR param6="","unknown",param6), instanceId IN ("40205","40206","41610","42301","24080","28200","28500","28920","28950","29120","29150","29900","30200","30500","32120","32200","25500","28100","29800","31600","31700","31800","31900","42260","42270","42280","42302","30100","30400","31500","31210","31400","41600", "31200","28970","28980","42230","42220","42290"), if(isnull(UserName) OR UserName="","unknown",UserName), (match('Description', "((?:task has finished)|(?:Backup Copy job)|(?:Backup job)|(?:Backup Copy job)|(?:Retry of Backup job)|(?:Malware detection session)|(?:finished)|(?:completed)|(?:lost connection)|(?:Invalid MFA code)|(?:Veeam Backup and Replication service is connected))") AND NOT match('Description', "(started)")), replace('JobDescription', "Created\s+by\s+(\S+).+", "\1"), 1==1, coalesce('UserName', 'fullName'))
EVAL-user_name = case(isnotnull(user) AND user!="", user, instanceId IN ("40201","42402","42404","42405","40204","40400","40500","40600","40700","42400","42401","42403"), if(isnull(fullName) OR fullName="","unknown",fullName), instanceId IN ("36013"), if(isnull(InitiatorName) OR InitiatorName="","unknown",InitiatorName), instanceId IN ("41800","41810"), if(isnull(param3) OR param3="","unknown",param3), instanceId IN ("23090","23420","41402"), if(isnull(param6) OR param6="","unknown",param6), instanceId IN ("40205","40206","41610","42301","24080","28200","28500","28920","28950","29120","29150","29900","30200","30500","32120","32200","25500","28100","29800","31600","31700","31800","31900","42260","42270","42280","42302","30100","30400","31500","31210","31400","41600", "31200","28970","28980","42230","42220","42290"), if(isnull(UserName) OR UserName="","unknown",UserName), (match('Description', "((?:task has finished)|(?:Backup Copy job)|(?:Backup job)|(?:Backup Copy job)|(?:Retry of Backup job)|(?:Malware detection session)|(?:finished)|(?:completed)|(?:lost connection)|(?:Invalid MFA code)|(?:Veeam Backup and Replication service is connected))") AND NOT match('Description', "(started)")), replace('JobDescription', "Created\s+by\s+(\S+).+", "\1"), 1==1, coalesce('UserName', 'fullName'))
EVAL-vendor_product = "Veeam:VBR"

LOOKUP-vbr_events_lookup = vbr_events_lookup "Event Id" AS instanceId OUTPUT "Event Group" AS EventGroup "Event Name" AS EventName Severity AS severity
