
[ccx_veeam_vbr_alert]
search = (sourcetype="veeam_vbr_syslog") Description IN ("*task has finished*", "Backup Copy job*", "Backup job*", "Retry of Backup job*", "Malware detection session*", "*finished*", "*completed*", "*lost connection*", "Invalid MFA code*", "Veeam Backup and Replication service is connected*") AND NOT Description IN ("*started*")
# tags = alert

[ccx_veeam_vbr_change]
search = (sourcetype="veeam_vbr_syslog") Description IN ("*created*", "*removed*", "*added*", "*deleted*", "*changed*", "*started*", "*initiated*", "*closed*", "*launched*", "*restored*") AND NOT Description IN ("*fail*", "*finish*", "*malware*")
# tags = change

[ccx_veeam_vbr_malware_operations]
search = (sourcetype="veeam_vbr_syslog") Description IN ("*malware*")
# tags = malware operation

[ccx_veeam_vbr_mounted]
search = (sourcetype="veeam_vbr_syslog") Description IN ("*has been mounted*")

[ccx_veeam_vbr_offloaded]
search = (sourcetype="veeam_vbr_syslog") Description IN ("*has been offloaded*")

[ccx_veeam_vbr_unmounted]
search = (sourcetype="veeam_vbr_syslog") Description IN ("Backup has been unmounted*")
