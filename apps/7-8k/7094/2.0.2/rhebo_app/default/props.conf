[rhebo_syslog]
TIME_FORMAT=%b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 20
TZ=UTC
category = Application
description = Rhebo Industrial Protector data based on syslog Common Event Formats (CEF).
EXTRACT-rhebo = ^[^\|\n]*\|(?P<vendor>\w+)\|(?P<product>[^\|]+)\|(?P<product_version>[^\|]+)\|(((alert\|)(?P<sig1>[^\|]+)(?:[^\|\n]*\|)(?P<severity_id>\w+))|(system\|.*)|((?P<sig2>[^\|]+)(?:[^\|\n]*\|)(?P<signaturedetail>[^\|]+)(?:[^\|\n]*\|)(?P<severity>\w+)\|dvc=(?P<dvc>[^ ]+)))
EVAL-ids_type="network"
EVAL-action="allowed"
EVAL-category="unspecified"
EVAL-transport="nonapplicable"
EVAL-vendor_product=vendor. "-" .product 
EVAL-severity=case(severity_id=="1","low", severity=="low","low", severity_id=="2","medium",severity=="medium","medium", severity_id=="3","high", severity=="high","high",severity_id=="4","critical", severity=="very high","critical",1=1,"unknown")
EVAL-signature=case(sig1=="",sig2,sig1!="", sig1, sig2!="",sig2, 1=1,"unknown")

