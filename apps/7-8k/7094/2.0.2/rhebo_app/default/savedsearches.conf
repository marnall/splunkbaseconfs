[RHEBO-AL-01]
action.email = 1
action.email.message.alert = The alert condition for '$name$' was triggered.\
\
Alert-ID: $name$\

action.email.priority = 2
action.email.subject.alert = $name$ | Potential MACFlooding
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.expires = 7d
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = */10 * * * *
description = The detection of multiple new MAC-adresses in a considerably short amount of time should be monitored. An unusual amount of new MAC-adresses has to be alerted.
dispatch.earliest_time = -10m@m
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","signature"]
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 20
relation = greater than
request.ui_dispatch_app = rhebo-app
request.ui_dispatch_view = search
search = eventtype="rhebo_syslog" signature="MAC_ACTIVE" earliest=-10m@m | stats count as "New MAC's"

