[RHEBO-AL-04]
action.email = 1
action.email.message.alert = The alert condition for '$name$' was triggered.\
\
Alert-ID: $name$\

action.email.priority = 2
action.email.subject.alert = $name$ | Cyclic Message Anomalies
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.expires = 7d
alert.severity = 4
alert.suppress = 0
alert.track = 1
counttype = number of events
cron_schedule = 1 */10 * * *
description = The detection of multiple anomalies concerning cyclic messages should be monitored. An unusual amount that occur consecutively has to be alerted.
dispatch.earliest_time = -10h@m
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","signature"]
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
quantity = 5
relation = greater than
request.ui_dispatch_app = rhebo-app
request.ui_dispatch_view = search
search = eventtype="rhebo_syslog" (signature="CYCLIC_MESSAGE_MISSING" OR signature="CYCLIC_MESSAGE_DOUBLE" OR signature="CYCLIC_MESSAGE_OUT_OF_ORDER" OR signature="CYCLIC_MESSAGE_TOO_EARLY" OR signature="CYCLIC_MESSAGE_TOO_LATE") earliest=-1h@m | stats count as "Cyclic Message Anomalies"

