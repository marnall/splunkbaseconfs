[rhebo_syslog]
TIME_FORMAT=%b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 20
description = Rhebo Industrial Protector data based on syslog Common Event Formats (CEF).

# there are two different formats: one for host messages, the other for event messages.

# Pre 3.6 header still working
#EXTRACT-rhebo = ^[^\|\n]*\|(?P<vendor>\w+)\|(?P<product>[^\|]+)\|(?P<product_version>[^\|]+)\|(((alert\|)(?P<sig1>[^\|]+)(?:[^\|\n]*\|)(?P<severity_id>\w+))|(system\|.*)|((?P<sig2>[^\|]+)(?:[^\|\n]*\|)(?P<signaturedetail>[^\|]+)(?:[^\|\n]*\|)(?P<severity>\w+)\|dvc=(?P<dvc>[^ ]+)))

# Post 3.6 expression does not fit into limits.conf so we have to split it up into multiple extractions. The following regexes are based on the original one and extract the same fields, but in multiple steps. The order of the extractions is defined in the REPORT-rhebo_fields line below.
# EXTRACT-rhebo = ^[^\|\n]*\|(?P<vendor>\w+)\|(?P<product>[^\|]+)\|(?P<product_version>[^\|]+)\|(((alert\|)(?P<sig1>[^\|]+)(?:[^\|\n]*\|)(?P<severity_id>\w+))|(system\|.*)|((?P<sig2>[^\|]+)(?:[^\|\n]*\|)(?P<signaturedetail>[^\|]+)(?:[^\|\n]*\|)(?P<severity>\w+)\|dvc=(?P<dvc>[0-9.]+) cnt=(?P<cnt>[0-9]+)( cs1=(?P<cs1>[^ ]+))?( cs1Label=(?P<cs1Label>.+))?( cs2=(?P<cs2>[^ ]+))?( cs2Label=(?P<cs2Label>.+))? rt=(?P<rt>\d+) src=(?P<src>[0-9.]+) dst=(?P<dst>[0-9.]+) app=(?P<app>.+) cn1=(?P<cn1>[0-9.]+) cn1Label=(?P<cn1Label>.+) cat=(?P<cat>\w+) ExternalID=(?P<ExternalID>.+) dvchost=(?P<dvchost>[^ ]+) cfp1=(?P<cfp1>[0-9.]+) cfp1Label=(?P<cfp1Label>[^ ]+) cs4=(?P<cs4>\w+) cs4Label=(?P<cs4Label>\w+) cs5=(?P<cs5>\w+) cs5Label=(?P<cs5Label>\w+) type=(?P<type>\w+)))

EXTRACT-rhebo = ^[^\|\n]*\|(?P<vendor>\w+)\|(?P<product>[^\|]+)\|(?P<product_version>[^\|]+)\|((?P<host_event_class>[^\|]+)\|(?P<host_sig>[^\|]+)\|(?P<host_severity_id>[0-9]+)\|)?((?P<event_class>[^\|]+)\|(?P<event_sig>[^\|]+)\|(?P<event_severity>\w+)\|)?

# the transformations are executed in sequence.
# If one fails (because the field is missing), Splunk simply moves on to the next.
# additional fields:

REPORT-rhebo_host_additional_fields = extract_rt, extract_device_mac_address, extract_dvc, extract_dvc_host
REPORT-rhebo_event_additional_fields = extract_dvc, extract_cnt, extract_cs1, extract_cs1Label, extract_cs2, extract_cs2Label, extract_rt, extract_smac,extract_dmac, extract_src, extract_dst, extract_app, extract_cn1, extract_cn1Label, extract_cat, extract_ExternalID, extract_dvchost, extract_cfp1, extract_cfp1Label, extract_cs4, extract_cs4Label, extract_cs5, extract_cs5Label, extract_type

EVAL-monitoring_status = case(isnotnull(cn1Label), cn1Label, cn1=="0", "not monitored",1==1, "no data")

#EVAL-ids_type="network"
EVAL-ids_type=case(isnotnull(cs5Label), cs5Label, 1==1, "network")

# CIM conformity
EVAL-action= if(cs4=="allow", "allowed", "blocked")

# CIM wants here attack category, vendor specific
EVAL-category=case(isnotnull(event_class), event_class, isnotnull(host_event_class), host_event_class, 1==1, "unspecified")

# CIM wants here icmp, tcp or udp
EVAL-transport=case(isnotnull(app), app, 1==1, "undetected")

EVAL-vendor_product=vendor. "-" .product 
# map from 1->"low", Unknown, Low->"low", Medium->"medium", High->"high", Very High->"critical" 
EVAL-severity=case(host_severity_id=="1","low", event_severity=="Low","low", host_severity_id=="2","medium",event_severity=="Medium","medium",host_severity_id=="3","high", event_severity=="High", "high",host_severity_id=="4","critical", event_severity=="Very High","critical",1=1,"unknown")
EVAL-signature=case(event_sig=="",host_sig, event_sig!="", event_sig, host_sig!="",host_sig, 1=1,"unknown")

