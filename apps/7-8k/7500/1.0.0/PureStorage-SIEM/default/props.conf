[syslog]
EXTRACT-FA-1 = (?P<AlertType>purity\.alert)\[(?P<AlertID>\d+)\]:\s+(?P<Message>(?P<Event>.+?\[(?P<EventID>\d+)\]).*?)#012Severity:\s+(?P<Severity>[^\n#]+).*?Array Name:\s+(?P<ArrayName>[^\n#]+).*?Domain:\s+(?P<Domain>[^\n#]+).*(?:Suggested Action:\s*(?P<SuggestedAction>(?:(?!#012|Knowledge Base Article:|Purity Version:|Variables:|Array ID:|#011|$).|#012|#011|\s)+))(?:#012|$)?.?.*?Variables:\s+(?P<Variables>.*)
EXTRACT-FA-2 = (?:.*?#012Purity Version:\s+(?P<PurityVersion>[^\n#]+))
EXTRACT-FB-1 = (?P<AlertType>purity\.alert):\s+(?P<Severity>\w+)\s+(?P<State>\w+)\s+-\s+(?P<ArrayName>[^\s:]+):.*?\[(?P<AlertID>\d+)\]
EXTRACT-FB-2 = Suggested Action:\s*(?P<SuggestedAction>(?:.*?)(?=(?:#012Knowledge Base Article:|$)))
EXTRACT-FB-3 = \(Alert ID: [^\)]+\)(?P<Event>.+?\[(?P<EventID>\d+)\])#012(?P<Message>.*?)(?=#012Severity).*?#012Purity//FB(?: Version)?: (?P<PurityVersion>[^\n#]+)
EXTRACT-KB = (?:.*?Knowledge Base Article:\s+(?P<KnowledgeBase>[^\n#]+))?
