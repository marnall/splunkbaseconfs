
[source::...keycloak_nxtp*.log*]
sourcetype = keycloak:ta:log

[keycloak:realm]
SHOULD_LINEMERGE = 0
category = Keycloak Realms
pulldown_type = 1

EVAL-description = "Realms registered in Keycloak service"

EVAL-vendor_name = "RedHat"
EVAL-vendor_product = "Keycloak"

FIELDALIAS-realm_name = realm AS realm_name
EVAL-realm = null

FIELDALIAS-realm_id = defaultRole.id AS realm_id

EVAL-timestamp = null

[keycloak:event]
SHOULD_LINEMERGE = 0
category = Keycloak Eventlog
pulldown_type = 1

EVAL-vendor_name = "RedHat"
EVAL-vendor_product = "Keycloak"

FIELDALIAS-realm_name = realmId AS realm_name
EVAL-realmId = null

FIELDALIAS-src_ip = ipAddress AS src_ip
EVAL-src = coalesce(ipAddress,authDetails.ipAddress)

FIELDALIAS-vendor_account = realmId AS vendor_account

##################################### AUTHENTICATION #####################################

LOOKUP-keycloak_auth_events = keycloak_auth_events auth_event AS signature OUTPUTNEW auth_action AS action

EVAL-app = "Keycloak"
EVAL-authentication_method = coalesce('details.auth_method','details.client_auth_method')
EVAL-authentication_service = "Keycloak"
EVAL-dest="Placeholder"
FIELDALIAS-reason = error AS reason
FIELDALIAS-signature = type AS signature
FIELDALIAS-src_client = clientId AS src_client
FIELDALIAS-client_id = clientId AS client_id
EVAL-clientId = null
FIELDALIAS-src_user = details.impersonator AS src_user
FIELDALIAS-user = details.username AS user
FIELDALIAS-userId = userId AS user_id
EVAL-userId = null

##################################### CHANGE #####################################

LOOKUP-keycloak_change_events = keycloak_change_events change_event AS signature OUTPUTNEW change_status AS status change_action AS action type_of_change AS change_type

EVAL-object = if((signature LIKE ("UPDATE%") OR signature LIKE ("CUSTOM%")),coalesce(details.user_name,user_id),"unknown")
EVAL-object_category = if((signature LIKE ("UPDATE%") OR signature LIKE ("CUSTOM%")),"user",null)
REPORT-object_attrs_off_prev_vals = object_attrs_off_prev_vals
REPORT-object_attrs_off_custom_action = object_attrs_off_custom_action
EVAL-object_attrs = lower(object_attrs)
EVAL-object_id = if((signature LIKE ("UPDATE%") OR signature LIKE ("CUSTOM%")),user_id,"unknown")
EVAL-result = "Placeholder"
EVAL-user = if(isnull(user),user_id,user)


[keycloak:audit]
SHOULD_LINEMERGE = 0
category = Keycloak Auditlog
pulldown_type = 1

EVAL-vendor_name = "RedHat"
EVAL-vendor_product = "Keycloak"

##################################### CHANGE #####################################

EVAL-action = case(                  \
   like(lower(operationType), "action")        \
      , "updated",                         \
   like(lower(operationType), "create")        \
      , "created",                         \
   like(lower(operationType), "update")        \
      , "updated",                         \
   like(lower(operationType), "delete")        \
      , "deleted",                         \
   true(),                                \
      null()                           \
)

EVAL-change_type = "AAA"
EVAL-signature = operationType. " - " .resourceType
EXTRACT-dest = \"resourcePath\":\s\"[^\/]+\/(?<dest>[^\/]+) in _raw
FIELDALIAS-dvc = source AS dvc
FIELDALIAS-dvc_ip = source AS dvc_ip
FIELDALIAS-object = dest AS object
FIELDALIAS-object_id = dest AS object_id
FIELDALIAS-object_category = resourceType AS object_category
FIELDALIAS-object_path = resourcePath AS object_path
FIELDALIAS-src = source AS src
EVAL-status= if(like(signature,"%ERROR%"),failure,success)
FIELDALIAS-user = dest AS user
FIELDALIAS-src_user = authDetails.userId AS user




[keycloak:user]
SHOULD_LINEMERGE = 0
category = Keycloak Users
pulldown_type = 1
MAX_TIMESTAMP_LOOKAHEAD = 1

EVAL-description = "Users registered in Keycloak service"

EVAL-vendor_name = "RedHat"
EVAL-vendor_product = "Keycloak"

FIELDALIAS-user_email = email AS user_email
EVAL-email = null

FIELDALIAS-user = username AS user
EVAL-username = null

FIELDALIAS-user_realm = realm AS user_realm

FIELDALIAS-user_id = id AS user_id
EVAL-id = null

FIELDALIAS-user_active = enabled AS user_active

EVAL-user_name = firstName . " " . lastName

EVAL-timestamp = null
