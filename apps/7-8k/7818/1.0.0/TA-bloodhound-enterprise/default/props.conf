EXTRACT-status = status:\s*"([^"]+)"
EXTRACT-commit_id = commit_id:\s*"([^"]+)"


[BHE:tier_zero_assets]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
EXTRACT-asset_group_id = "asset_group_id":\s*(\d+)
EXTRACT-object_id = "object_id":\s*"([^"]+)"
EXTRACT-primary_kind = "primary_kind":\s*"([^"]+)"
EXTRACT-kinds = "kinds":\s*\[([^\]]+)\]
EXTRACT-environment_id = "environment_id":\s*"([^"]+)"
EXTRACT-environment_kind = "environment_kind":\s*"([^"]+)"
EXTRACT-name = "name":\s*"([^"]+)"
EXTRACT-custom_member = "custom_member":\s*(true|false)
EXTRACT-domain_name = "name":\s*"[^"]+@([^"]+)"
# CIM Compute Inventory Normalization
EVAL-system_id = object_id
EVAL-system = name
EVAL-zone_id = environment_id
EVAL-zone = environment_kind
EVAL-system_category = primary_kind
EVAL-system_type = kinds
EVAL-is_managed = if(custom_member=="true", "yes", "no")
EVAL-group_id = asset_group_id


