[BHE:attack_paths]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
EXTRACT-Finding = "Finding":\s*"([^"]+)"
EXTRACT-Principal = "Principal":\s*"([^"]+)"
EXTRACT-PrincipalKind = "PrincipalKind":\s*"([^"]+)"
EXTRACT-DomainSID = "DomainSID":\s*"([^"]+)"
EXTRACT-ImpactPercentage = "ImpactPercentage":\s*([\d.]+)
EXTRACT-ImpactCount = "ImpactCount":\s*(\d+)
EXTRACT-Props_admincount = "admincount":\s*(true|false)
EXTRACT-Props_displayname = "displayname":\s*"([^"]+)"
EXTRACT-Props_distinguishedname = "distinguishedname":\s*"([^"]+)"
EXTRACT-Props_domain = "domain":\s*"([^"]+)"
EXTRACT-Props_domainsid = "domainsid":\s*"([^"]+)"
EXTRACT-Props_dontreqpreauth = "dontreqpreauth":\s*(true|false)
EXTRACT-Props_enabled = "enabled":\s*(true|false)
EXTRACT-Props_hasspn = "hasspn":\s*(true|false)
EXTRACT-Props_isaclprotected = "isaclprotected":\s*(true|false)
EXTRACT-Props_lastlogon = "lastlogon":\s*(\d+)
EXTRACT-Props_lastlogontimestamp = "lastlogontimestamp":\s*(\d+)
EXTRACT-Props_lastseen = "lastseen":\s*"([^"]+)"
EXTRACT-Props_name = "name":\s*"([^"]+)"
EXTRACT-Props_objectid = "objectid":\s*"([^"]+)"
EXTRACT-Props_passwordnotreqd = "passwordnotreqd":\s*(true|false)
EXTRACT-Props_pwdlastset = "pwdlastset":\s*(\d+)
EXTRACT-Props_pwdneverexpires = "pwdneverexpires":\s*(true|false)
EXTRACT-Props_samaccountname = "samaccountname":\s*"([^"]+)"
EXTRACT-Props_sensitive = "sensitive":\s*(true|false)
EXTRACT-Props_serviceprincipalnames = "serviceprincipalnames":\s*\[([^\]]*)\]
EXTRACT-Props_sidhistory = "sidhistory":\s*\[([^\]]*)\]
EXTRACT-Props_trustedtoauth = "trustedtoauth":\s*(true|false)
EXTRACT-Props_unconstraineddelegation = "unconstraineddelegation":\s*(true|false)
EXTRACT-Props_whencreated = "whencreated":\s*(\d+)
EXTRACT-Severity = "Severity":\s*"([^"]+)"
EXTRACT-AcceptedUntil = "AcceptedUntil":\s*"([^"]+)"
EXTRACT-Accepted = "Accepted":\s*(true|false)
EXTRACT-Environment = "Environment":\s*"([^"]+)"
EXTRACT-PrincipalName = "PrincipalName":\s*"([^"]+)"
EXTRACT-id = "id":\s*(\d+)
EXTRACT-created_at = "created_at":\s*"([^"]+)"
EXTRACT-updated_at = "updated_at":\s*"([^"]+)"
EXTRACT-deleted_at_Time = "Time":\s*"([^"]+)"
EXTRACT-deleted_at_Valid = "Valid":\s*(true|false)
# CIM Normalization
EVAL-ticket_id = id
EVAL-ticket_category = Finding
EVAL-ticket_priority = Severity
EVAL-ticket_due_time = AcceptedUntil
EVAL-ticket_created_time = created_at
EVAL-ticket_modified_time = updated_at
EVAL-ticket_closed_time = deleted_at_Time
EVAL-ticket_status = if(deleted_at_Valid=="true", "closed", if(Accepted=="true", "accepted", "open"))
EVAL-user = PrincipalName
EVAL-ticket_owner = Principal
EVAL-impact = ImpactPercentage
EVAL-impact_count = ImpactCount



