# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = true
is_configured = false
state = enabled
build = 1

[launcher]
author = BloodHound Enterprise
version = 1.1.3
description = This BloodHound Enterprise Splunk app ingests data from your BHE tenant into Splunk. Dashboards can be used to track the Active Directory & Azure attack paths of your environment. Enrich SIEM data with BHE attack path finding details.

[ui]
is_visible = 1
label = BloodHound Enterprise
docs_section_override = AddOns:released

[package]
id = TA-bloodhound-enterprise

[triggers]
reload.addon_builder = simple
reload.ta_bloodhound_enterprise_account = simple
reload.ta_bloodhound_enterprise_settings = simple
reload.passwords = simple