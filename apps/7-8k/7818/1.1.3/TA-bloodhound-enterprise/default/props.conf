[BHE:attack_paths]
SHOULD_LINEMERGE = 0
TRUNCATE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
REPORT-attack_paths = BHE_ap_Finding, BHE_ap_Principal, BHE_ap_PrincipalKind, BHE_ap_DomainSID, BHE_ap_ImpactPercentage, BHE_ap_ImpactCount, BHE_ap_Props_admincount, BHE_ap_Props_displayname, BHE_ap_Props_distinguishedname, BHE_ap_Props_domain, BHE_ap_Props_domainsid, BHE_ap_Props_dontreqpreauth, BHE_ap_Props_enabled, BHE_ap_Props_hasspn, BHE_ap_Props_isaclprotected, BHE_ap_Props_lastlogon, BHE_ap_Props_lastlogontimestamp, BHE_ap_Props_lastseen, BHE_ap_Props_name, BHE_ap_Props_objectid, BHE_ap_Props_passwordnotreqd, BHE_ap_Props_pwdlastset, BHE_ap_Props_pwdneverexpires, BHE_ap_Props_samaccountname, BHE_ap_Props_sensitive, BHE_ap_Props_serviceprincipalnames, BHE_ap_Props_sidhistory, BHE_ap_Props_trustedtoauth, BHE_ap_Props_unconstraineddelegation, BHE_ap_Props_whencreated, BHE_ap_Severity, BHE_ap_AcceptedUntil, BHE_ap_Accepted, BHE_ap_Environment, BHE_ap_PrincipalName, BHE_ap_id, BHE_ap_created_at, BHE_ap_updated_at, BHE_ap_deleted_at_Time, BHE_ap_deleted_at_Valid
# CIM Normalization
EVAL-ticket_id = id
EVAL-ticket_category = Finding
EVAL-ticket_priority = Severity
EVAL-ticket_due_time = AcceptedUntil
EVAL-ticket_created_time = created_at
EVAL-ticket_modified_time = updated_at
EVAL-ticket_closed_time = deleted_at_Time
EVAL-ticket_status = if(deleted_at_Valid=="true", "closed", if(Accepted=="true", "accepted", "open"))
EVAL-user = PrincipalName
EVAL-ticket_owner = Principal
EVAL-impact = ImpactPercentage
EVAL-impact_count = ImpactCount


[BHE:audit_logs]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
REPORT-audit_logs = BHE_al_id, BHE_al_created_at, BHE_al_actor_id, BHE_al_actor_name, BHE_al_actor_email, BHE_al_action, BHE_al_fields_client_id, BHE_al_fields_id, BHE_al_fields_last_access, BHE_al_fields_name, BHE_al_fields_user_id, BHE_al_request_id, BHE_al_source_ip_address, BHE_al_status, BHE_al_commit_id


[BHE:tier_zero_assets]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
REPORT-tier_zero_assets = BHE_tz_object_id, BHE_tz_name, BHE_tz_primary_kind, BHE_tz_kinds, BHE_tz_custom_member, BHE_tz_domain_name, BHE_tz_source_domain, BHE_tz_is_tier_zero, BHE_tz_system_tags, BHE_tz_last_seen, BHE_tz_environment_kind, BHE_tz_environment_id, BHE_tz_display_name, BHE_tz_enabled, BHE_tz_admin_count, BHE_tz_asset_group_id
EVAL-system_id = object_id
EVAL-system = name
EVAL-zone_id = environment_id
EVAL-zone = environment_kind
EVAL-system_category = primary_kind
EVAL-system_type = kinds
EVAL-is_managed = if(custom_member=="true", "yes", "no")
EVAL-group_id = if(isnull(asset_group_id), "tier_zero_query", asset_group_id)
EVAL-is_privileged = if(is_tier_zero=="true" OR match(system_tags, "admin_tier_0"), "yes", "no")
EVAL-last_seen_time = strptime(last_seen, "%Y-%m-%dT%H:%M:%S")
EVAL-domain = if(isnull(domain_name) OR domain_name=="Unknown", source_domain, domain_name)


[BHE:Posture_stats]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
REPORT-posture_stats = BHE_ps_domain_sid, BHE_ps_exposure_index, BHE_ps_tier_zero_count, BHE_ps_critical_risk_count, BHE_ps_id, BHE_ps_created_at, BHE_ps_updated_at, BHE_ps_deleted_at_Time, BHE_ps_deleted_at_Valid

[BHE:path_timeline]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
TIME_FORMAT=%Y-%m-%dT%H:%M:%S.%6NZ
TIME_PREFIX=created_at

[source::...ta-bloodhound-enterprise*.log*]
sourcetype = tabloodhoundenterprise:log

