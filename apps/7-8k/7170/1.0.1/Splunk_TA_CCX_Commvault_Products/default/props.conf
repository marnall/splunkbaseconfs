[ccx:commvault:backup]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 20
NO_BINARY_CHECK = true
TIME_PREFIX = ^
category = Custom
description = CCX Custom Commvault Backup Syslog
disabled = false
pulldown_type = true

EXTRACT-ccx_commvault_backup_log_type = ^\w+\s+\d+\s+\d+:\d+:\d+\s+\d+.\d+.\d+.\d+\s+(?<logType>[^:]*)
EXTRACT-ccx_commvault_backup_duration = Duration\s+\[(?<duration>[\d+:\d+:\d]*)
EXTRACT-ccx_commvault_backup_object_size = Copied\s+\:\s+(?<object_size>[\w.]*)
EXTRACT-ccx_commvault_backup_client = (Client|Client\(s\))\s+\[(?<Client>(.*?))\]
EXTRACT-ccx_commvault_backup_agenttype = Agent Type\s+\[(?<AgentType>(.*?))\]
EXTRACT-ccx_commvault_backup_details_extraction = Details\s+=\s+\{(?<x_details>.*)\}
EXTRACT-ccx_commvault_backup_cim_eventseverity = (Eventseverity|Severitylevel|Alertseverity)\s+\=\s+\{(?<Severity>(.*?))\}
EXTRACT-ccx_commvault_backup_file_path = file\s+\[(?<file_path>(.*?))\]
EXTRACT-ccx_commvault_backup_events_data_connection_parse = Description\s+\=\s+\{(?<vendor_action>(.*?))\s+incoming\s+(?<protocol>(.*?))\s+data connection from the file server IP\:\s+\[(?<src>(.*?))\]\s+Port\:\s+\[(?<src_port>(.*?))\]\s+to local IP\:\s+\[(?<dest>(.*?))\]\s+Port\:\s+\[(?<dest_port>(.*?))\]
EXTRACT-ccx_commvault_backup_events_user_extract = has been killed by\s+(?<User>(.*?))\.
EXTRACT-ccx_commvault_backup_audittrail_details_capture1 = ^.*AuditTrail.*Login success: username:\[(?<User>(.*))\]\,\s+host\/\s+device\:\[(?<src>(.*))\]\,\s+logged in from\:\s+\[(?<authentication_method>(.*))\]\}
EXTRACT-ccx_commvault_backup_audittrail_details_capture2 = ^.*AuditTrail.*Login failure: username:\[(?<User>(.*?))\]\,\s+host\/\s+device\:\[(?<src>(.*?))\]\,\s+login attempted from\:\s+\[(?<authentication_method>(.*?))\]\}
EXTRACT-ccx_commvault_backup_audittrail_details_capture3 = ^.*AuditTrail.*Login Name\:(?<User>(.*))Machine\:(?<vendor_reason>(.*))\}
EXTRACT-ccx_commvault_backup_audittrail_details_capture4 = ^.*AuditTrail.*Storage Policy\:\s+(?<object_attrs>.*)\s+Copy\:\s+(?<ChangeDetail>.*)\}
EXTRACT-ccx_commvault_backup_audittrail_details_capture5 = .*Uninstall Client.*Client\:\s+(?<Client>(.*?))\}

REPORT-ccx_commvault_backup_audittrail_details_capture_client = ccx_commvault_backup_audittrail_details_capture_client

FIELDALIAS-ccx_audittrail_detail_description = Details ASNEW Description
FIELDALIAS-ccx_alerts_detail_description = Alertdescription ASNEW Description

EVAL-app = if((logType="Events" OR logType="Alerts" OR logType="AuditTrail") AND isnull('authentication_method'),"Commvault",coalesce(trim('Program',"\{|\}"),'authentication_method'))
EVAL-action = case(logType="Events" AND match('vendor_action',".*(A|a)ccept.*"),"allowed",logType="Events" AND match('vendor_action',".*(B|b)lock.*"),"blocked",(logType="Events" OR logType="Alerts" OR logType="AuditTrail") AND (match('Description',".*(A|a)ccept.*|.*operation has completed.*|.*with success.*|.*successfully validated.*|.*successfully pushed.*|Restore job.*completed.*|Workflow.*completed|.*Job Succeeded.*|.*Login success.*")),"success",(logType="Events" OR logType="AuditTrail" OR logType="Alerts") AND match('Description',".*(F|f)ail.*"),"failure", logType="Events" AND match('Description',".*(R|r)estart.*"),"restarted",logType="Events" AND match('Description',".*(S|s)tart.*"),"started",logType="Events" AND match('Description',".*(S|s)top.*|.*has been killed by.*"),"stopped",logType="Events" AND match('Description',".*was interrupted.*"),"blocked",logType="AuditTrail" AND match('Operation',".*Change Subclient Content.*"),"modified") 
EVAL-date = 'Occurrencetime' 
EVAL-dest = if(isnotnull('dest'),'dest',coalesce('Client',trim('Computer',"\{|\}")))
EVAL-dest_ip = if(cidrmatch("0.0.0.0/0",'dest'),'dest',if(cidrmatch("0.0.0.0/0",'Client'),'Client',if(cidrmatch("0.0.0.0/0",trim('Computer',"\{|\}")),trim('Computer',"\{|\}"),null())))  
EVAL-src = if(isnotnull('src'),'src',if(isnull('src') AND match('Description',".*Virtual machine.*was not found.*"),replace('Description',"^.*Virtual machine\s+\[(.*?)\]\s+was\s+not\s+found.*","\1"),if(isnull('src') AND match('Description',".*Failed to remove the backup snapshot.*"),replace('Description',"^.*Failed to remove the backup snapshot for virtual machine\s+\[(.*?)\].*","\1"),null()))) 
EVAL-src_ip = if(cidrmatch("0.0.0.0/0",'src'),'src',if(cidrmatch("0.0.0.0/0",replace('Description',"^.*Virtual machine\s+\[(.*?)\]\s+was\s+not\s+found.*","\1")),replace('Description',"^.*Virtual machine\s+\[(.*?)\]\s+was\s+not\s+found.*","\1"),if(cidrmatch("0.0.0.0/0",replace('Description',"^.*Failed to remove the backup snapshot for virtual machine\s+\[(.*?)\].*","\1")),replace('Description',"^.*Failed to remove the backup snapshot for virtual machine\s+\[(.*?)\].*","\1"),null()))) 
EVAL-change_type = if(logType="Events" AND match('Description',".*has been killed by.*"),"backup",if(logType="AuditTrail" AND match('Operation',".*Change Subclient Content.*"),"backup",null())) 
EVAL-object = if(isnotnull('object'),'object',if(logType="Events" AND match('Description',".*has been killed by.*"),'Client',if(logType="AuditTrail" AND Operation="{Change Subclient Content}",replace('x_details',".*Backup\sSet\:(.*?)(Subclient|$).*","\1"),null()))) 
EVAL-object_category = if(isnotnull('object_category'),'object_category',if((logType="Events" OR logType="AuditTrail") AND (match('Description',".*has been killed by.*") OR Operation="{Change Subclient Content}"),coalesce('AgentType',replace('x_details',".*Application\s+Type\:(.*?)Instance\:.*","\1")),null())) 
EVAL-object_attrs = if(isnotnull('object_attrs'),'object_attrs',if(logType="AuditTrail" AND Operation="{Change Subclient Content}",replace('x_details',".*Instance\:(.*?)Backup.*","\1"),null())) 
EVAL-result = if(isnotnull('result'),'result',if(logType="Events" AND match('Description',".*has been killed by.*"),replace('Description',"^.*\{(.*?)\s+by.*","\1"),if(logType="AuditTrail" AND Operation="{Change Subclient Content}",replace('x_details',".*Subclient\:(.*?)(\.).*","\1"),null()))) 
EVAL-status = case(logType="Events" AND match('Description',".*has been killed by.*"),"success",logType="AuditTrail" AND match('Operation',".*Change Subclient Content.*"),"success") 
EVAL-description = trim('Description',"\{|\}|\.\.\.") 
EVAL-body = trim('Description',"\{|\}|\.\.\.") 
EVAL-type = case((logType="Events" OR logType="Alerts") AND (Severity="Critical" OR Severity="Major" OR (match('Description',".*operation has failed.*|.*failed to download.*"))),"alarm",logType="Events" AND (vendor_action="Accepted" OR match('Description',".*operation has completed.*|.*was interrupted.*|.*is being converted to a Full Database Backup.*|.*Deduplication.*has been sealed.*|.*MediaAgent.*is.*|.*Reboot is pending.*|.*Uninstall Client.*|.*log on was denied.*")),"event",logType="Events" AND vendor_action!="Accepted","alert",logType="Events" AND Severity!="Information" AND match('Description',".*integrity check.*|.*Received failed.*|.*Virtual machine.*was not found.*|.*Unknown VMInfo error.*"),"warning",logType="Events" AND match('Description',".*Deduplication Engine.*") AND NOT Severity IN("Information","Minor"),"warning",logType="Alerts" AND NOT match('Description',".*Job Succeeded.*"),"alert",logType="AuditTrail" AND Operation IN("{Retire Client}","{Update Storage Policy Copy Properties}","{Register/Install Client}","{Uninstall Client}"),"alert",logType="AuditTrail" AND Operation IN("{Kill Job}","{Trying to lower Basic or Extended Retention on a Worm enabled copy.}"),"event") 
EVAL-file_name = replace('file_path',"^.*\\\([^\\\]+(?=\.*$))","\1")
EVAL-severity = if(logType="Events" OR logType="Alerts",case(Severity="Critical","critical",Severity="Major","high",Severity="Minor","low",Severity="Information","informational"),if(logType="AuditTrail",lower('Severity'),null())) 
EVAL-severity_id = if(logType="Events" OR logType="Alerts",case(Severity="Critical","9",Severity="Major","6",Severity="Minor","3",Severity="Information","0"),null()) 
EVAL-id = coalesce(trim('Eventid',"\{|\}"),trim('Alertid',"\{|\}"),trim('Opid',"\{|\}")) 
EVAL-reason = 'vendor_reason'
EVAL-signature = case(match('Description',".*reached within 100 percent limit.*"),"Exceeded the Number of Physical Servers Licensed",match('Description',".*suspicious file.*alert your administrator.*"),"Anomaly Framework",match('Description',".*data connection*"),"Data Connection",match('Description',".*operation has failed.*|.*failed to download.*|.*Failed to remove the backup snapshot.*|.*Failed to set up pipeline.*|.*Backup Pending. Failed to update metadata.*|.*Unable to get the SQL.*"),"Failed Operation",match('Description',".*operation has completed.*"),"Success Operation",match('Description',".*integrity check.*"),"Integrity Check",match('Description',".*Deduplication Engine.*"),"Deduplication Engine",match('Description',".*failed message.*"),"Failed Job",match('Description',".*(W|w)orkflow.*Cloud Storage Archive.*"),"Workflow Cloud Storage Archive",match('Description',".*Workflow.*Load Balance.*"),"Workflow Load Balance",match('Description',"Workflow.*"),"Workflow",match('Description',"Virtual machine.*was not found.*"),"Virtual Machine not found",match('Description',".*is being converted to a Full Database Backup.*"),"Convert Full Database Backup",match('Description',".*Deduplication.*has been sealed.*"),"Deduplication has been sealed",isnull('Alertname') AND match('Description',".*MediaAgent.*is.*"),"MediaAgent",match('Description',".*Unknown VMInfo error.*"),"VMInfo error",match('Description',".*Error downloading.*"),"Download error",match('Description',".*Number of restarts has exceeded.*"),"Number of restarts has exceeded",match('Description',".*Reboot is pending.*"),"Reboot is pending",match('Description',".*Uninstall Client.*"),"Uninstall Client",match('Description',".*log on was denied.*"),"Log on denied",match('Description',".*Unusual performance drop.*"),"Performance drop",Alertname="{Aux copy status}" AND NOT match('Description',".*Job Succeeded.*"),"Auxiliary Copy Failed",isnotnull('Alertname') AND NOT Severity IN("Information"),replace('Description',".*Detected Criteria\:\s+(.*)\s+\#.*Detected.*","\1"),isnotnull('vendor_reason'),'vendor_reason',match('Description',".*has been retired.*|.*are retired.*"),"Client Retired",Operation="{Kill Job}",replace('x_details',"Job ID\:\s+\d+\s+(.*)\.","\1"),Operation="{Update Storage Policy Copy Properties}","Update Storage Policy",Operation="{Register/Install Client}",trim('Operation',"\{|\}"),Operation="{Trying to lower Basic or Extended Retention on a Worm enabled copy.}","Backup Retention",Operation="{Uninstall Client}","Uninstall Client",match('Description',".*not able to create the snapshot.*"),"Snapshot Failed",match('Description',".*file activity anomaly.*"),"File Activity Anomaly",match('Description',".*LiveSync to Standby Commserve delayed.*"),"Sync Delayed")
EVAL-vendor_product = "Commvault Backup" 
EVAL-vendor = "Commvault" 
EVAL-log_subtype = coalesce(trim(Operation,"\{|\}"),trim(Alertname,"\{|\}"))  
EVAL-user = if(isnotnull('User'),'User',if(match('Description',".*attempt to log on was denied.*"),replace('Description',"\{User\s+\[(.*?)\].*","\1"),if(isnotnull('Alertname'),replace('Description',".*User\:\s+(.*)\s+\#.*Job.*","\1"),if(match('Operation',".*Change Subclient Content.*"),replace('Username',"\{((.*?))(\}|\s+\(.*)","\1"),if(Operation IN("{User Logged in}"),replace('x_details',".*Login Name\:(.*)Machine.*","\1"),if(Operation IN("{Register/Install Client}","{Uninstall Client}"),replace('x_details',".*Login Name\:(.*)Client.*","\1"),null()))))))
