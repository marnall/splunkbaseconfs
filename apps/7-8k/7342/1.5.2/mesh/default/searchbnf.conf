[enmesh-command]
comment1 = Pushes search results to mesh NET™ for analysis
description = Streaming command that sends data to the nthº mesh™ API. This should not\
    be used directly unless you know what you are doing. In all cases, this command\
    requires valid certificates and an API token; please contact your account team if\
    you do not have either of these.
example1 = | enmesh query=data method=POST origin=adhoc view_id=splunk_mesh_overview view_session=b69010d88467a45a6a9a47c1158e1f3689645f0b5a6d8c7219307cf74700eb14
maintainer = Paul Stout <paul@nthdegree.io>
shortdesc = Streaming command that sends data to the nthº mesh™ API.
syntax = enmesh™ (<enmesh-options>)
usage = public

[enmesh-options]
description = enmesh™ allows interaction with nthº's API using the POST and PUT HTTP methods.\
    If no 'method' is specified, the command defaults to POST. The 'query' parameter\
    specifies the API endpoint and has no default. enmesh™ is a streaming command and should\
    be used after other search commands generate and transform search results intended for API\
    processing. The command can be used with or without the ™ marker; we just thought it was\
    cool you could include it ;)
syntax = query=<query> | method=<method> | origin=<origin> | view_id=<view_id> | view_session=<view_session>

[mesh-command]
comment1 = Retrieves current open tickets for a given account.
description = Generating command that retrieves data from the nthº mesh™ API. This should not\
    be used directly unless you know what you are doing. In all cases, this command requires\
    valid certificates and an API token; please contact your account team if you do not have\
    either of these.
example1 = mesh™ query=tickets view_id=splunk_mesh_overview view_session=b69010d88467a45a6a9a47c1158e1f3689645f0b5a6d8c7219307cf74700eb14
maintainer = Paul Stout <paul@nthdegree.io>
shortdesc = Generating command that retrieves data from the nthº mesh™ API.
syntax = mesh™ (<mesh-options>)
usage = public

[mesh-options]
description = mesh™ allows interaction with nthº's API using the GET HTTP method. The 'query'\
    parameter specifies the API endpoint and has no default. mesh™ is a generating command\
    and should be used as the first command in a search. The command can be used with or\
    without the ™ marker; we just thought it was cool you could include it ;)
syntax = query=<query> | method=<method> | view_id=<view_id> | view_session=<view_session>

[meshcreds-command]
comment1 = Processes a base64-encoded credentials package from the client portal.
description = Generating command that procedsses and saves credentials generated by the nth\
    degree client portal. This should not be used directly unless you know what you are doing.
example1 = meshcreds package="data:model/mesh;base64,H4sICF...="
maintainer = Paul Stout <paul@nthdegree.io>
shortdesc = Generating command that processes a base64-encoded credentials package.
syntax = meshcreds (<meshcreds-options>)
usage = public

[meshcreds-options]
description = meshcreds allows usage of the mesh™ app by installing required certificates and\
    API tokens. If you don't have a token or certificates, head on over to https://portal.nthdegree.io/\
    to obtain a package. If you're a current client, these will be downloadable from your account\
    page and, if not, you can sign up for a free one-time mesh™ Pre-Care engagement.
syntax = action=<action> | package=<package>
