[mesh_contacts]
description = Renders contact cards for mesh™ service, billing, and partner contacts.
label = mesh™ Contact View
search_fragment = | mesh™ query=contacts

[mesh_health_overview]
description = Renders the available health checks and last status through the mesh™ app.
label = mesh™ Health Overview
search_fragment = | table time_date, time_time, key, title, description, check_count, severity_level

[mesh_thresholds]
description = Displays checkup thresholds in the mesh™ app.
label = mesh™ Thresholds
search_fragment = | stats values(*) as * by id

[mesh_ticket]
description = Displays a single ticket through the mesh™ app.
label = mesh™ Ticket
search_fragment = | stats values(*) as * by id

[mesh_ticket_notes]
description = Displays the notes on a single ticket through the mesh™ app.
label = mesh™ Ticket Notes
search_fragment = | stats values(*) as * by id
