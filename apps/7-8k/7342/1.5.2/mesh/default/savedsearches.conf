[dhIssueCreate]
description = An override of Dashboard Helpdesk's 'dhCreateIssue' method allowing for POST back to mesh NET™. This will go away at some near point as we make Dashboard Helpdesk aware of mesh - not the inverse.
dispatch.earliest_time = 
dispatch.latest_time = 
display.general.timeRangePicker.show = 1
search = | makeresults\
| eval\
    dh_issue_id="$dh_issue_id$",\
    dh_issue_time="$dh_issue_time$",\
    dh_issue_user="$dh_issue_user$",\
    dh_issue_url="$dh_issue_url$",\
    dh_issue_app_cur="$dh_issue_app_cur$",\
    dh_issue_app_def="$dh_issue_app_def$",\
    dh_issue_view="$dh_issue_view$",\
    dh_issue_tok_def="$dh_issue_tok_def$",\
    dh_issue_tok_sub="$dh_issue_tok_sub$",\
    dh_issue_ua="$dh_issue_ua$",\
    dh_issue_roles="$dh_issue_roles$",\
    dh_issue_tz="$dh_issue_tz$",\
    dh_issue_text="$dh_issue_text$",\
    dh_issue_splunk_ver="$dh_issue_splunk_ver$",\
    dh_issue_app_ver="$dh_issue_app_ver$",\
    dh_issue_product="$dh_issue_product$",\
    dh_issue_locale="$dh_issue_locale$",\
    dh_issue_splunk_server="$dh_issue_splunk_server$",\
    _time=dh_issue_time\
| collect `dh_issue_report_index` sourcetype="dh:issue:report" source="dhIssueCreate"\
| eval sourcetype="dh:issue:report"\
| enmesh™\
| fields _time dh_issue_id dh_issue_user\
| join [\
    | inputlookup dh_issue_status WHERE dh_issue_default_status=1\
    | rename dh_issue_status_id as dh_issue_status\
    | fields dh_issue_status\
]\
| eval\
    dh_issue_status_time=tonumber(_time)\
| collect `dh_issue_report_index` sourcetype="dh:issue:tracking" source="dhIssueCreate"\
| eval sourcetype="dh:issue:tracking"\
| enmesh™\
| rename\
    dh_issue_id as _key\
| eval\
    dh_issue_user_read=1,\
    dh_issue_visible=1,\
    dh_issue_user_read=1\
| outputlookup append=t dh_issue_assignment\
| rename\
    _key as dh_issue_id\
| fields _time dh_issue_id\
| eval\
    dh_issue_screenshot="$dh_issue_screenshot$"\
| collect `dh_issue_report_index` sourcetype="dh:issue:screenshot" source="dhIssueCreate"\
| eval sourcetype="dh:issue:screenshot"\
| enmesh™\
| fields - dh_issue_screenshot\
| eval\
    dh_issue_screenshot="$dh_issue_screenshot_tn$"\
| collect `dh_issue_report_index` sourcetype="dh:issue:screenshot:tn" source="dhIssueCreate"\
| eval sourcetype="dh:issue:screenshot:tn"\
| enmesh™

[meshCheckAccountAuth]
action.email.useNSSubject = 1
alert.track = 0
description = Checks if the Splunk user's email is an authorized contact in the ticketing backend.
search = | mesh™\
    query=contactStatus\
    view_id="$view_id$"\
    view_session="$view_session$"\
| table authorized, agr_cap, acl, has_update, renewal_days, renewal_flag, expire_days, expire_flag, has_cert_update

[meshCreateOutcome]
action.email.useNSSubject = 1
alert.track = 0
description = Schedules an outcome from the mesh™ outcomes catalog. This is on the client to ensure the scheduled time is within an approved change window.
search = | makeresults\
| eval\
    outcome_id="$outcome_id$",\
    scheduled_time="$scheduled_time$",\
    attestation="$attestation$"\
| enmesh™\
    query=outcomes\
    method=POST\
    view_id=$view_id$\
    view_session=$view_session$

[meshCreateTicket]
action.email.useNSSubject = 1
alert.track = 0
description = Creates a ticket in the backend ticketing system based on minimal, environment-detected  input from the client front-end.
search = | makeresults\
| eval\
    summary="$mTicketSummary$",\
    description="$mTicketDescription$",\
    priority="$mTicketPriority$",\
    agreement="$mTicketAgreement$",\
    cc="$mTicketCC$"\
| enmesh™\
    query=tickets method=POST\
    view_id="$view_id$"\
    view_session="$view_session$"\
| spath input=resp\
| fields _time, summary, description, priority, agreement, meshed, id\
| eval\
    id=mvdedup(id)

