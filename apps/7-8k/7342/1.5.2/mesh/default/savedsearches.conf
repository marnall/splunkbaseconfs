[meshMungedSettings]
action.email.useNSSubject = 1
alert.track = 0
description = Provides a current-state view of the runtime mesh™ settings.
dispatch.earliest_time = -1m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
search = | inputlookup mesh_settings\
| rename\
    _key AS id\
| eval\
    _time = now()\
| append [\
    inputlookup mesh_settings_default\
    | eval\
        _time = now()-86400,\
        default = value,\
        isDefault = 1\
]\
| stats\
    latest(label) AS label,\
    latest(value) AS value,\
    values(default) as default,\
    values(desired) as desired,\
    latest(description) AS description,\
    latest(isDefault) AS isDefault\
        BY id

[meshOutcomesScheduler]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = 0 * * * *
description = Don't be deceived by the short search. This is the heart and soul of the autonomous outcomes capability. This polls hourly to see if there are any scheduled outcomes for the hour and, if so, implements them and updates mesh NET™ on the progress/status/outcome.
enableSched = 1
schedule_window = 15
search = | rest /services/mesh/scheduler

