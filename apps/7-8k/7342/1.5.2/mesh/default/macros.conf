[mesh_prep(2)]
args = view_id,view_session
definition = | eval\
    auto_healthcheck=[\
        | inputlookup mesh_settings WHERE _key="mesh_health_tickets"\
        | return $value\
    ]\
| join type=outer mesh_check [\
    | mesh™\
        query=health\
        view_id=$view_id$\
        view_session=$view_session$\
    | rename\
        id AS mesh_check\
    | table mesh_check, key\
]\
| addinfo
iseval = 0
