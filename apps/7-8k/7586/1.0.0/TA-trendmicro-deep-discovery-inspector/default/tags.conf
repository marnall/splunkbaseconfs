# Tags for Threat Logs
[eventtype=trendmicro_ddi_threat]
attack = enabled
malware = enabled
ids = enabled

# Tags for Disruptive Application Logs
[eventtype=trendmicro_ddi_disruptive_application]
attack = enabled
ids = enabled

[eventtype=trendmicro_ddi_web_reputation]
web = enabled
ids = enabled

# Tags for System Logs
[eventtype=trendmicro_ddi_system]
change = enabled
authentication = enabled
ids = enabled

# Tags for Virtual Analyzer File Analysis Logs
[eventtype=trendmicro_ddi_va_file_analysis]
attack = enabled
malware = enabled
ids = enabled

# Tags for Virtual Analyzer Notable Characteristics Logs
[eventtype=trendmicro_ddi_va_notable_characteristics]
attack = enabled
malware = enabled
ids = enabled

# Tags for Virtual Analyzer Deny List Transaction Logs
[eventtype=trendmicro_ddi_va_deny_list_transaction]
change = enabled
configuration = enabled
ids = enabled
