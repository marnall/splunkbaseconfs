[Update Entra ID Identities - KV Store]
alert.track = 0
cron_schedule = */10 * * * *
description = Update the entra_id_identities KV Store with Entra ID users.
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `sa_entra_id_identities` \
| spath input=_raw path=memberOf{}.displayName output=memberOf \
| eval memberOf=mvfilter(memberOf!="null") \
| spath input=_raw path=manager{}.userPrincipalName output=manager \
| stats latest(onPremisesDistinguishedName) as distinguishedName, latest(onPremisesDomainName) as onPremisesDomainName, latest(securityIdentifier) as objectSid, latest(personalTitle) as personalTitle, latest(displayName) as nick, latest(givenName) as first, latest(surname) as last, latest(mail) as email, latest(manager) as managedBy, latest(department) as bunit, latest(whenCreated) as whenCreated, latest(_time) as _time latest(onPremisesSamAccountName) as sAMAccountName values(memberOf) as memberOf latest(jobTitle) as title latest(accountEnabled) as accountEnabled latest(userPrincipalName) as userPrincipalName latest(businessPhones{}) as businessPhones latest(employeeHireDate) as startDate latest(mobilePhone) as mobilePhone by id\
```Update & Expand Categories as required\
| eval cat_account_status=if(accountEnabled="false","disabled","enabled") \
| eval cat_service_account=if(distinguishedName like "%Service Account%" OR description like "%service account%" OR sAMAccountName like "%svc%","service_account",null) \
| eval cat_exec=if(match(title,"(?i)Director|Chief|CEO|General\sManager|Vice|President"),"vip_account",null) \
| eval cat_ea=if(match(title, "(?i)Executive\sAssistant"),"ea_account",null) \
| eval cat_legal=if(match(title, "(?i)legal"),"legal",null) \
| eval cat_vendor_account=if(match(distinguishedName, "(?i)vendor\saccount"),"vendor_account",null)\
| eval cat_privileged=if(match(memberOf,"(?i)admin"),"privileged",null)\
| foreach cat_* \
    [ eval category = mvappend(category, '<<FIELD>>')] \
| eval priority=case(match(category,"vip_account|ea_account|legal"),"critical",\
    match(category,"privileged|service_account|vendor_account"),"high",\
    1=1,"medium")\
```\
| rex field=distinguishedName max_match=100 "DC=(?P<domain>\w+?)(,|$)" \
| eval domain=mvjoin(domain,".") \
| rex field=domain "(?P<netbiosDomainName>.*)\." \
| eval downLevelDomainName = upper(netbiosDomainName) + "\\" + 'sAMAccountName', _key=id, phone=mvdedup(mvappend(businessPhones,mobilePhone))\
| rename distinguishedName as dn, onPremisesDomainName as forest, id as objectId \
| foreach * \
    [ eval <<FIELD>> = if(<<FIELD>>="null",null(),<<FIELD>>)] \
| table _key, category, objectId, priority, domain, forest, bunit, watchlist, memberOf, dn, title, nick, first, last, email, phone, managedBy, startDate, userPrincipalName, sAMAccountName, objectSid, downLevelDomainName\
| outputlookup entra_id_identities append=true\
| stats count
