[XBaseD DrillDown Searches - Lookup Gen]
search = | rest splunk_server=local count=0 /services/saved/searches search="action.correlationsearch.enabled=1" search="disabled=0"\
\
```Removing self supporting condition```\
| eval search=replace(search,"\| eval self_supporting=.*","") \
\
```Remove unnecessary EOL```\
| eval search=replace(search,"[\n\r]"," ") \
\
| eval orig_search=search\
\
```Drilldown cut processing``` \
| rex field=search "(?<search>.*) `drilldown_cut"\
\
```Drilldown Mark processing``` \
| rex field=search "`drilldown_mark\(\"(?<category>[^\)]+)\"\)`" \
| eval temp=replace(search,"`drilldown_mark\(\"[^\)]+\"\)`", " " + category + "=\"REPLACEME\"")\
\
```Add earliest=info_min_time and latest=info_max_time from the results```\
```If tstats WITHOUT where before the group by```\
| rex field=search "^(?<part1_tstats>\|\s*tstats(?:(?!where).)*?)(?i)by(?<part2_tstats>.*)$"\
| eval search_tstats_no_where=part1_tstats." where earliest=INFOMINTIME latest=INFOMAXTIME by ".part2_tstats\
\
```If tstats with where before the group by```\
| rex field=search "^(?<part1_tstats>\|(\s|tstats).*?where.*?)(?<part2_tstats>(?i)by.*)$"\
| eval search_tstats=if(isnotnull(search_tstats_no_where),null(),part1_tstats." earliest=INFOMINTIME latest=INFOMAXTIME ".part2_tstats)\
\
``` Else If savedsearch```\
| rex field=search "^(?<part1_savedsearch>\|(\s|)savedsearch.*?(?i:where))(?<part2_savedsearch>.*)"\
| eval search_savedsearch=part1_savedsearch." earliest=INFOMINTIME latest=INFOMAXTIME ".part2_savedsearch\
\
``` Else If rest```\
| rex field=search "^(?<part1_rest>\|(\s|)rest.*?(?i:where))(?<part2_rest>.*)"\
| eval search_rest=part1_rest." earliest=INFOMINTIME latest=INFOMAXTIME ".part2_rest\
\
```Else if mstats command stay untouched```\
| eval search_mstats=if(match(search,"mstats"), search,null())\
\
```Else if not tstats/savedsearch/rest/mstats command at beginning, add at beginning earliest=INFOMINTIME and latest=INFOMAXTIME```\
| eval search_normal="earliest=INFOMINTIME latest=INFOMAXTIME ".search\
| eval search=coalesce(search_tstats_no_where, search_tstats, search_savedsearch,search_rest, search_mstats, search_normal)\
\
```Drilldown processing without marker(s)``` \
| eval line= \
    [| rest /servicesNS/-/-/saved/searches/ splunk_server=local search="action.correlationsearch.enabled=1" search="disabled=0"\
    ``` Get from All Saved Searches all risk_objects fields that create Intermediate Findings (and not Findings)```\
    | spath input=action.risk.param._risk \
    |  table action.risk.param._risk title  id search description cron_schedule {}.risk_object_field\
    |  stats dc("{}.risk_object_field") as count values("{}.risk_object_field") as risk_objects_fields \
    ``` Concatenate all risk_object_fields in a string ready to be replaced in XBaseD DrillDown Searches - Lookup Gen ```\
    ``` The default line in the search is : ```\
    ``` | strcat search "| search src_user=\"REPLACEME\" OR user=\"REPLACEME\" OR src=\"REPLACEME\" OR dvc=\"REPLACEME\" OR dest=\"REPLACEME\"" temp2 ``` \
    | eval ro_fields=mvjoin(risk_objects_fields,"=REPLACEME OR ") \
    | eval line=ro_fields."=REPLACEME" \
    | rex mode=sed field=line "s/REPLACEME/\"REPLACEME\"/g"\
    | fields line \
    | rename line as search \
    | format\
]\
| eval line= " | search ".line\
| strcat search line temp2\
\
```Best search selection``` \
| eval search=if(match(search,"`drilldown_mark\(\"(?<category>[^\)]+)\"\)`"), temp,temp2)\
\
```Keep fixed_search if exists``` \
| lookup xbased_drilldown_searches.csv search_name AS title OUTPUTNEW fixed_search \
| eval modified_search=search\
| eval search=if(isnotnull(fixed_search),fixed_search,search)\
\
```Fields selection & rename``` \
| rename title AS search_name, search AS drilldown_search \
| table search_name orig_search drilldown_search modified_search fixed_search\
\
```Lookup export```\
| outputlookup xbased_drilldown_searches.csv
