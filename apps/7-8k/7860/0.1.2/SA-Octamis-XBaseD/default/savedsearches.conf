search = | rest splunk_server=local count=0 /services/saved/searches search="action.correlationsearch.enabled=1" search="disabled=0"\
\
```Removing self supporting condition```\
| eval search=replace(search,"\| eval self_supporting=.*","") \
\
```Remove unnecessary EOL```\
| eval search=replace(search,"[\n\r]"," ") \
\
| eval orig_search=search\
\
```Drilldown cut processing``` \
| rex field=search "(?<search>.*) `drilldown_cut"\
\
```Drilldown Mark processing``` \
| rex field=search "`drilldown_mark\(\"(?<category>[^\)]+)\"\)`" \
| eval temp=replace(search,"`drilldown_mark\(\"[^\)]+\"\)`", " " + category + "=\"REPLACEME\"")\
\
```Drilldown processing without marker(s)``` \
| strcat search "| search user=\"REPLACEME\" OR src=\"REPLACEME\" OR dvc=\"REPLACEME\" OR dest=\"REPLACEME\"" temp2\
\
```Best search selection``` \
| eval search=if(match(search,"`drilldown_mark\(\"(?<category>[^\)]+)\"\)`"), temp,temp2)\
\
```Keep fixed_search if exists``` \
| lookup xbased_drilldown_searches.csv search_name AS title OUTPUTNEW fixed_search \
| eval modified_search=search\
| eval search=if(isnotnull(fixed_search),fixed_search,search)\
\
```Fields selection & rename``` \
| rename title AS search_name, search AS drilldown_search \
| table search_name orig_search drilldown_search modified_search fixed_search\
\
```Lookup export```\
| outputlookup xbased_drilldown_searches.csv
