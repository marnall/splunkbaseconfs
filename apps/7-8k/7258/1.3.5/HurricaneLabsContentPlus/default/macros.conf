[hlcp_package_filter]
definition = (deployment_type="global")(NOT tags="rba_only")

[hlcp_fork(1)]
args = package_id
definition = makeresults \
| eval package_id="$package_id$", key="$package_id$", forked=1\
| fields - _time\
| outputlookup hlcp_forked_packages key_field=key append=t

[hlcp_unfork(1)]
args = package_id
definition = makeresults \
| eval package_id="$package_id$", key="$package_id$", forked=0\
| fields - _time\
| outputlookup hlcp_forked_packages key_field=key append=t

[hdsi_ext_ips(1)]
args = field
definition = ($field$="0.0.0.0/5" OR\
	$field$="8.0.0.0/7" OR\
	$field$="11.0.0.0/8" OR\
	$field$="12.0.0.0/6" OR\
	$field$="16.0.0.0/4" OR\
	$field$="32.0.0.0/3" OR\
	$field$="64.0.0.0/2" OR\
	$field$="128.0.0.0/3" OR\
	$field$="160.0.0.0/5" OR\
	$field$="168.0.0.0/6" OR\
	$field$="172.0.0.0/12" OR\
	$field$="172.32.0.0/11" OR\
	$field$="172.64.0.0/10" OR\
	$field$="172.128.0.0/9" OR\
	$field$="173.0.0.0/8" OR\
	$field$="174.0.0.0/7" OR\
	$field$="176.0.0.0/4" OR\
	$field$="192.0.0.0/9" OR\
	$field$="192.128.0.0/11" OR\
	$field$="192.160.0.0/13" OR\
	$field$="192.169.0.0/16" OR\
	$field$="192.170.0.0/15" OR\
	$field$="192.172.0.0/14" OR\
	$field$="192.176.0.0/12" OR\
	$field$="192.192.0.0/10" OR\
	$field$="193.0.0.0/8" OR\
	$field$="194.0.0.0/7" OR\
	$field$="196.0.0.0/6" OR\
	$field$="200.0.0.0/5" OR\
	$field$="208.0.0.0/4" OR\
	$field$="*:*"\
	NOT $field$ IN ("127.0.0.0/8", "169.254.0.0/16", "::1", "0:0:0:0:0:0:0:1", "FE80:*", "::ffff:*"))
description = v1

[hdsi_rfc1918(1)]
args = field
definition = ($field$="10.*" OR\
	$field$="172.16.*" OR\
	$field$="172.17.*" OR\
	$field$="172.18.*" OR\
	$field$="172.19.*" OR\
	$field$="172.20.*" OR\
	$field$="172.21.*" OR\
	$field$="172.22.*" OR\
	$field$="172.23.*" OR\
	$field$="172.24.*" OR\
	$field$="172.25.*" OR\
	$field$="172.26.*" OR\
	$field$="172.27.*" OR\
	$field$="172.28.*" OR\
	$field$="172.29.*" OR\
	$field$="172.30.*" OR\
	$field$="172.31.*" OR\
	$field$="192.168.*")

[hdsi_known_scanners(1)]
args = field
definition = ($field$="Qualys")

[hdsi_process_logs]
definition = ()
description = v1.0 search string for process logs
disabled = False
iseval = 0

[hdsi_windows_security]
definition = index=* source=*wineventlog:security
description = v1.0
disabled = False
iseval = 0

[hdsi_o365_management_activity]
definition = (index=* sourcetype=o365:management:activity)
description = v1.0
disabled = False
iseval = 0

[hdsi_pan_logs]
definition = (index=*)

[hdsi_sysmon]
definition = (index=* source="*wineventlog:microsoft-windows-sysmon/operational")

[hdsi_duo]
