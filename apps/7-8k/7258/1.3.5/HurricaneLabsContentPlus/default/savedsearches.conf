[Lookup Gen - hlcp_duplicate_searches]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 24 * * * *
description = Finds searches which are duplicates from HLCP packages and keeps track of them in a lookup. Used for the content overview dashboard.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = | rest /servicesNS/-/-/saved/searches \
| search eai:acl.app!="HurricaneLabsContentPlus" \
| table title eai:acl.app\
| rename title AS search, eai:acl.app AS app\
| join type=inner [|inputlookup hlcp_catalog \
| eval package_id=_key\
| table package_id searches\
| mvexpand searches\
| rename searches AS search]\
| outputlookup create_empty=f override_if_empty=f hlcp_duplicate_searches
allow_skew = 5m

[Lookup Gen - hlcp_sourcetypes_by_index]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 21 * * * *
description = Maintains the hlcp_sourcetypes_by_index KV store lookup
dispatch.earliest_time = -60m
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
allow_skew = 5m
search = | tstats latest(_time) AS last_seen WHERE index!=_* by sourcetype, index\
| inputlookup append=t hlcp_sourcetypes_by_index\
| stats max(last_seen) AS last_seen by sourcetype, index\
| where last_seen > relative_time(now(), "-30d")\
| outputlookup create_empty=f override_if_empty=f hlcp_sourcetypes_by_index