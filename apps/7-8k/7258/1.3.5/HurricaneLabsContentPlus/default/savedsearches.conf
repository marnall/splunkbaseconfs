[HLCP Content Auto-Installation]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 24,54 * * * *
description = Automatically installs packages that either \
1. Are already installed and have updates available\
2. Are compatible and deployment type global_critical\
Packages installed by this search do not count against any quota.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = | inputlookup hlcp_catalog \
	| eval package_id=_key\
	| lookup hlcp_forked_packages package_id OUTPUT forked\
	| where NOT forked=1\
	| lookup hlcp_package_compatibility package_id OUTPUT is_compatible\
	| lookup hlcp_install_status package_id OUTPUT package_version AS installed_version, status\
	| where NOT installed_version==version AND is_compatible==1\
	| search deployment_type="global_critical" OR installed_version=*\
	| hlcpinstallstreaming

[HLCP Monthly Content Feed]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 17 3 1 * *
description = On the first of each month installs new packages that \
	1. Are Compatible (app prereqs, data prereqs)\
	2. Match the hlcp_package_filter macro.\
Only installs as many packages are as allowed by the API key's quota. 
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
enableSched = 1
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = | inputlookup hlcp_catalog\
	| eval package_id=_key\
	| lookup hlcp_forked_packages package_id OUTPUT forked\
	| where NOT forked=1\
	| lookup hlcp_package_compatibility package_id OUTPUT is_compatible\
	| lookup hlcp_install_status package_id OUTPUT package_version AS installed_version, status\
	| where isnull(installed_version) AND is_compatible==1\
	| eval creation_date_epoch=strptime(creation_date, "%Y-%m-%d")\
    | sort 0 - creation_date_epoch\
	| search `hlcp_package_filter`\
    | head [|hlcpquota | spath input=_raw | table monthly_quota | eval monthly_quota=if(monthly_quota==0, 10000, monthly_quota) | rename monthly_quota AS search]\
	| hlcpinstallstreaming

