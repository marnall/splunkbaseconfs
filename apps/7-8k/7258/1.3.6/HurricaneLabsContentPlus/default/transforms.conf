[hlcp_catalog]
external_type = kvstore
collection = hlcp_catalog
fields_list = _key, deployment_type, version, creation_date, package_title, description, tags, data_prereqs, prereq_packages, post_deploy_search, enable_alerting, mitre_annotations, searches, is_free, is_hl_only

[hlcp_install_status]
external_type = kvstore
collection = hlcp_install_status
fields_list = _key, time_installed, time_updated, package_id, package_version, status

[hlcp_installed_objects]
external_type = kvstore
collection = hlcp_installed_objects
fields_list = _key, package_id, package_version, conf_type, stanza

[hlcp_metadata]
external_type = kvstore
collection = hlcp_metadata
fields_list = _key, catalog_last_updated_at

[hlcp_compatibility_search_cache]
external_type = kvstore
collection = hlcp_compatibility_search_cache
fields_list = _key, requirement, satisfied, error, last_checked

[hlcp_compatibility_datamodel_cache]
external_type = kvstore
collection = hlcp_compatibility_datamodel_cache
fields_list = _key, requirement, satisfied, error, last_checked

[hlcp_compatibility_source_cache]
external_type = kvstore
collection = hlcp_compatibility_source_cache
fields_list = _key, requirement, satisfied, error, last_checked

[hlcp_package_compatibility]
external_type = kvstore
collection = hlcp_package_compatibility
fields_list = _key, package_id, is_compatible, additional_info, encountered_error

[hlcp_duplicate_searches]
external_type = kvstore
collection = hlcp_duplicate_searches
fields_list = _key, search, app, package_id

[hlcp_forked_packages]
external_type = kvstore
collection = hlcp_forked_packages
fields_list = _key, package_id, forked

[hlcp_sourcetypes_by_index]
external_type = kvstore
collection = hlcp_sourcetypes_by_index
fields_list = sourcetype, index, last_seen