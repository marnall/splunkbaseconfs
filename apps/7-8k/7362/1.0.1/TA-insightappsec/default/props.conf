[source::...ta-insightappsec*.log*]
sourcetype = tainsightappsec:log

[source::...ta_insightappsec*.log*]
sourcetype = tainsightappsec:log

[rapid7:insightappsec:app]
DATETIME_CONFIG = CURRENT
INDEXED_EXTRACTIONS = JSON
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[rapid7:insightappsec:app:vulnerability_finding]
DATETIME_CONFIG = CURRENT
EVAL-severity = case(match(upper(severity), "SAFE"), "informational", 1=1, lower(severity))
FIELDALIAS-aob_gen_rapid7_insightappsec_app_vulnerability_finding_alias_1 = vulnerability_score AS cvss
FIELDALIAS-aob_gen_rapid7_insightappsec_app_vulnerability_finding_alias_2 = root_cause.url AS url
FIELDALIAS-aob_gen_rapid7_insightappsec_app_vulnerability_finding_alias_3 = app.id AS dest
FIELDALIAS-aob_gen_rapid7_insightappsec_app_vulnerability_finding_alias_5 = root_cause.parameter AS signature
FIELDALIAS-aob_gen_rapid7_insightappsec_app_vulnerability_finding_alias_6 = app.id AS dvc
FIELDALIAS-aob_gen_rapid7_insightappsec_app_vulnerability_finding_alias_7 = vector_string AS xref
FIELDALIAS-aob_gen_rapid7_insightappsec_app_vulnerability_finding_alias_8 = status AS category
INDEXED_EXTRACTIONS = JSON
SHOULD_LINEMERGE = 0
TRUNCATE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

