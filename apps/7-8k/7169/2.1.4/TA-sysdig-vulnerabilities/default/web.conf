
[expose:TA_sysdig_vulnerabilities_settings]
pattern = TA_sysdig_vulnerabilities_settings
methods = POST, GET

[expose:TA_sysdig_vulnerabilities_settings_specified]
pattern = TA_sysdig_vulnerabilities_settings/*
methods = POST, GET, DELETE

[expose:TA_sysdig_vulnerabilities_sysdig_secure_vulnerabilities]
pattern = TA_sysdig_vulnerabilities_sysdig_secure_vulnerabilities
methods = POST, GET

[expose:TA_sysdig_vulnerabilities_sysdig_secure_vulnerabilities_specified]
pattern = TA_sysdig_vulnerabilities_sysdig_secure_vulnerabilities/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
