[source::...ta-sysdig-vulnerabilities*.log*]
sourcetype = tasysdigvulnerabilities:log

[source::...ta_sysdig_vulnerabilities*.log*]
sourcetype = tasysdigvulnerabilities:log

[sysdig:secure:vulnerabilities]
EVAL-cve = 'vulnerability.vuln'
EVAL-cvss = 'vulnerability_details.cvssScore.value.score'
EVAL-dest = 'asset.assetId'
EVAL-severity = 'vulnerability.severity'
EVAL-signature_id = 'vulnerability.package'
EVAL-url = 'asset.url'
KV_MODE = json
SHOULD_LINEMERGE = 0
TRUNCATE = 999999
category = Sysdig
pulldown_type = 1

