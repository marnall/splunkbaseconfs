[itsi_share_es]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */5 * * * *
default.visualizations.custom.event-timeline-viz.event-timeline-viz.allowOverlap = 0
dispatch.earliest_time = -5m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.network-diagram-viz.network-diagram-viz.canZoom = 1
display.visualizations.network-diagram-viz.network-diagram-viz.designLayoutDashboard = 0
display.visualizations.network-diagram-viz.network-diagram-viz.draggableNodes = 1
display.visualizations.network-diagram-viz.network-diagram-viz.enablePhysics = 1
display.visualizations.network-diagram-viz.network-diagram-viz.hideEdgesOnDrag = 0
display.visualizations.network-diagram-viz.network-diagram-viz.hierarchy = 0
display.visualizations.network-diagram-viz.network-diagram-viz.smoothEdges = 1
display.visualizations.show = 0
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = `itsi_event_management_group_index` `filter_share_es` | eval asset=case(match(entity_title, "(?=^.{1,254}$)(^(?:(?!\d+\.)[a-zA-Z0-9_\-]{1,63}\.?)+(?:[a-zA-Z]{2,})*$)"),"host", match(entity_title, "(?:\d{1,3}\.){3}\d{1,3}"), "IP", match(entity_title, "^(?:[0-9a-fA-F][0-9a-fA-F]:){5}(?:[0-9a-fA-F][0-9a-fA-F])$"), "MAC")  | search asset=* | rename entity_title as src itsi_policy_id as rule_number  | stats max(itsi_group_severity) as max_severity, values(itsi_group_title) as reason values(itsi_group_id) as view values(itsi_group_description) as desc by rule_number, src | rex mode=sed field=desc "s/=/:/g" | eval severity=`itsi_severvity_description(max_severity)` | collect index=share_with_es

[Network - ITSI Episode - Rule]
action.correlationsearch.detection_type = ebd
action.correlationsearch.enabled = 1
action.correlationsearch.label = ITSI Episode
action.customsearchbuilder.enabled = false
action.escu = 0
action.escu.enabled = 1
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable = 1
action.notable.param.drilldown_name = View ITSI Raw event
action.notable.param.drilldown_searches = [{"search":"index=share_with_es rule_number=$rule_number$","name":"View ITSI Raw event","earliest_offset":"$info_min_time$","latest_offset":"$info_max_time$","disabled":false}]
action.notable.param.rule_description = $rule_number$ has generated an ITSI episode for $src$
action.notable.param.rule_title = ITSI Alert - $rule_number$
action.notable.param.security_domain = network
action.notable.param.severity = medium
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk = 1
action.risk.forceCsvResults = 1
action.risk.param._risk = [{"risk_object_field":"src","risk_object_type":"system","risk_score":1}]
action.risk.param._risk_message = ITSI Alert - $itsi_policy_id$
action.risk.param._risk_score = 0
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.suppress = 1
alert.suppress.fields = rule_nuumber,src
alert.suppress.period = 14400s
alert.track = 1
allow_skew = 100%
counttype = number of events
cron_schedule = */5 * * * *
description = Generate noteable events for episodes that are shared from ITSI
disabled = true
dispatch.earliest_time = -5m
dispatch.latest_time = now
dispatch.rt_backfill = 1
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = SplunkEnterpriseSecuritySuite
schedule_window = auto
search = index=share_with_es | stats values(severity) as severity, values(reason) as reason values(view) as view values(desc) as desc by rule_number, src

