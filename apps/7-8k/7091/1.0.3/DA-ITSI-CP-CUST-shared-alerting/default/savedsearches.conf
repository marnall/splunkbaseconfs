[es_share_itsi]
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
search = `notable` | `filter_share_itsi` | expandtoken | eval entity=coalesce(risk_object,dest_asset,src_asset,dest,src)  | rename source as rule  | stats latest(_time) as _time, values(urgency) as urgency, values(rule_title) as notable_description, values(rule_id) as notable_id  by rule, entity | eval notable_description=mvjoin(notable_description, "|") | rename entity as src | collect index=share_with_itsi

