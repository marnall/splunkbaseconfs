[filter_share_itsi]
definition = search NOT risk_object_type IN (user,"") NOT urgency=informational
iseval = 0

[itsi_severvity_description(1)]
args = severity
definition = case($severity$=1, "info", $severity$=2, "normal", $severity$=3, "low", $severity$=4, "medium", $severity$=5, "high", $severity$=6, "critical")
iseval = 0

[filter_share_es]
definition = itsi_group_severity>2 entity_title=* NOT itsi_policy_id="itsi_default_policy"
iseval = 0
