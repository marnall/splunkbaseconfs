##sourcetype

[force_sourcetype_fwbcld_attack]
DEST_KEY = MetaData:Sourcetype
REGEX = cat=\"?attack
FORMAT = sourcetype::fwbcld_attack

[force_sourcetype_fwbcld_event]
DEST_KEY = MetaData:Sourcetype
REGEX = cat=\"?audit
FORMAT = sourcetype::fwbcld_event

[force_sourcetype_fwbcld_traffic]
DEST_KEY = MetaData:Sourcetype
REGEX = trafficlog
FORMAT = sourcetype::fwbcld_traffic

