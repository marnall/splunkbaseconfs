search = `chromeos_index` sourcetype="google:chromeos:json" eventtype=data_access_control trigger_type=SCREENSHOT \
| eval KPI_Name= "Multiple Screenshots on Device" \
| lookup Google_ChromeOS_Alerts_threshold Alert_name as KPI_Name output Threshold \
