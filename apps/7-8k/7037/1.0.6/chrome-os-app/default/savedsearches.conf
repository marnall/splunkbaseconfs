
[Multiple failed login attempts]
disabled = 1
cron_schedule = */60 * * * *
dispatch.earliest_time = -60m
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
description = This alert provides
enableSched = 1
quantity = 0
relation = greater than
search = `chromeos_index` sourcetype="google:chromeos:json" \
    eventtype="chromeos_login*" \
| eval KPI_Name= "Multiple Failed Login Attempts" \
| lookup Google_ChromeOS_Alerts_threshold Alert_name as KPI_Name output Threshold \
| mvexpand eventtype \
| search eventtype!=err* \
| eval final = directory_device_id.eventtype \
| table _time KPI_Name device_user device_name device_id directory_device_id eventtype final Threshold reason \
| sort directory_device_id _time \
| streamstats reset_on_change=true time_window=6h count(final) as sum_c by final \
| rename _time as Time_Stamp \
| convert ctime(Time_Stamp) as "Time Stamp" \
| fields - Time_Stamp \
| where sum_c>Threshold \
| search eventtype=chromeos_login_failure \
| fields - final \
| eval to_be_suumarized= if(sum_c=Threshold+1,"Breach","Breach_continuity") \
| rename sum_c as "Attempt Count" \
| where to_be_suumarized="Breach" \
| collect `chrome_os_summary_idx`

