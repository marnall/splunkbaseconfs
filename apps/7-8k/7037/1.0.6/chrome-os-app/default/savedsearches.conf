[Multiple CRD Sessions on device]
disabled = 1
cron_schedule = */60 * * * *
dispatch.earliest_time = -60m
action.webhook.enable_allowlist = 0
alert.suppress = 0
alert.track = 1
counttype = number of events
description = This alert provides
enableSched = 1
quantity = 0
relation = greater than
search = `chromeos_index` sourcetype="google:chromeos:json" \
eventtype=chromeos_crd_client_connected \
| eval KPI_Name= "Multiple CRD Sessions on device" |lookup Google_ChromeOS_Alerts_threshold  Alert_name as KPI_Name output Threshold\
| eval final = directory_device_id.eventtype |sort _time\
| table _time KPI_Name device_user device_name device_id directory_device_id eventtype final Threshold action\
| streamstats reset_on_change=false time_window=60min count(final) as total_crd_on_device by final \
| rename _time as Time_Stamp action as reason\
| convert ctime(Time_Stamp) as "Time Stamp" \
| fields - Time_Stamp|where total_crd_on_device >Threshold| fields - final \
| eval to_be_suumarized= if(total_crd_on_device=Threshold+1,"Breach","Breach_continuity") \
| rename total_crd_on_device as "CRD Session Count" \
| where to_be_suumarized="Breach" |collect `chrome_os_summary_idx`

