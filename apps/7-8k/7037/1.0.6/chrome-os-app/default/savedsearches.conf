| streamstats reset_on_change=false time_window=6h count(final) as total_screenshot_on_device by final \
| rename _time as Time_Stamp action as reason \
| convert ctime(Time_Stamp) as "Time Stamp" \
| fields - Time_Stamp \
| where total_screenshot_on_device >Threshold \
| fields - final \
| eval to_be_suumarized= if(total_screenshot_on_device=Threshold+1,"Breach","Breach_continuity") \
| rename total_screenshot_on_device as "Screenshot Count" \
| where to_be_suumarized="Breach" \
| collect `chrome_os_summary_idx`


[Google chromeos workflow internal lookup]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */15 * * * *
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
display.visualizations.type = singlevalue
enableSched = 1
request.ui_dispatch_app = chrome-os-app
request.ui_dispatch_view = search
search = index=_internal  sourcetype="google_chromeos_workflow_action-*" "file=*workflow_action.py" \
| rex field=_raw  "\|\s(Moving|Disabling|Rebooting|Wipe) device\s(?P<directory_device_id>[\w,\-]*)" \
| rex field=_raw  "\|\s(Moving user|Moving device|Suspending profile)\s(?P<device_user>.*)\sto |,\striggered\s(?P<operation>.*)" \
| rex field=_raw  "\|\susername:\s(?P<user>\w+)|status\scode:\s(?P<status_code>.*)|to OU:\s(?P<Updated_OU>.*)" \
| transaction startswith=triggered  endswith=Ended \
| sort 0 - _time \
| table _time user directory_device_id device_user operation Updated_OU status_code \
| outputlookup Google_ChromeOS_Workflow override_if_empty=true append=true \

