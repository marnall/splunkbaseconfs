[forward_alert]
is_custom = 1
python.version = python3
label = Cyber Security Essentials Avertpoint
description = Sends triggered alert data
icon_path = appIcon.png
disabled = 0
alert.execute = 1
alert.execute.cmd = diagnostics.py
payload_format = json
#command = $SPLUNK_HOME/bin/splunk cmd python $SPLUNK_HOME/etc/apps/cyber_security_essentials_avert/bin/diagnostics.py
script.timeout = 60
script.maxruns = 5
script.maxtime = 600
streamresults = false
param.event_data = $result._raw$
param.search_name = $name$
param.trigger_time = $trigger_time$
param.results_link = $results.url$
param.sid = $sid$
param.api_version = v1.0
param.environment = production
