[admin:TA_prisma_cloud_audit_configuration]
match = /
members = TA_prisma_cloud_audit_account, TA_prisma_cloud_audit_settings

[admin:TA_prisma_cloud_audit_inputs]
match = /
members = TA_prisma_cloud_audit_prisma_cloud_audit_logs

[admin_external:TA_prisma_cloud_audit_account]
handlertype = python
python.version = python3
handlerfile = TA_prisma_cloud_audit_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
python.required = 3.13

[admin_external:TA_prisma_cloud_audit_settings]
handlertype = python
python.version = python3
handlerfile = TA_prisma_cloud_audit_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true
python.required = 3.13

[admin_external:TA_prisma_cloud_audit_prisma_cloud_audit_logs]
handlertype = python
python.version = python3
handlerfile = TA_prisma_cloud_audit_rh_prisma_cloud_audit_logs.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
python.required = 3.13
