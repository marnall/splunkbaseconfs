# FIELD EXTRACTION USING DELIMS
#
# Note: Splunk will correctly interpret fields which are wrapped by 
# double-quotes (") even when containing the DELIMS character.

# [auto_kv_for_all_fields]
# DELIMS = "|"
# FIELDS = "field_one","field_two","field_three","field_four","field_five","field_six","field_seven","field_eight"

# FIELD EXTRACTION USING A REGEX

# Extract a field
# [netscreen-error]
# REGEX = device_id=[^ ]+\s+\[w+\](.*)(?
# FORMAT = err_code::$1

# Rewrite the Source -- This must be listed in a TRANSFORMS-<name> entry.
# [normalize_source]
# SOURCE_KEY = MetaData:Source 
# DEST_KEY = MetaData:Source
# REGEX = (.*)(CACHE\d{8}|LOGHISTORY\d{8})(.*)(\.CSV|\.csv)
# FORMAT = $1$2$4

################################################################
# INDEX TIME TRANSFORMS
# See the docs for transforms.conf for special metadata DEST_KEYs and
# their values:
# http://docs.splunk.com/Documentation/Splunk/latest/Admin/Transformsconf 
[org_drop_comments]
# If SOURCE_KEY is not given, _raw is assumed.
REGEX = ^#
DEST_KEY = queue
FORMAT = nullQueue

[org_save_special_comments]
REGEX = ^# KEEP ME
DEST_KEY = queue
FORMAT = indexQueue

[org_sourcetype_cisco]
REGEX = %(ASA|FWSM|PIX)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::cisco

[org_sourcetype_juniper]
# This is borrowed from TA-juniper to serve as an example.
REGEX = NetScreen\s+device_id\=
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::juniper

[org_sourcetype_sshd]
REGEX = sshd\[
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::sshd

[org_sourcetype_cisco_index]
SOURCE_KEY = MetaData:Sourcetype
REGEX = cisco
DEST_KEY = _MetaData:Index
FORMAT = network

[org_sourcetype_juniper_index]
SOURCE_KEY = MetaData:Sourcetype
REGEX = juniper
DEST_KEY = _MetaData:Index
FORMAT = firewall

[org_host_fw309-dmz_index]
SOURCE_KEY = MetaData:Host
REGEX = host::fw309.*
DEST_KEY = _MetaData:Index
FORMAT = dmz

[fw_actions]
filename = fw_actions.csv

[ip_protos]
filename = ip_protos.csv

[file_actions]
filename = file_actions.csv

[severities]
filename = severities.csv

[ids_actions]
filename = ids_actions.csv

[vpn_actions]
filename = vpn_actions.csv

[actions_action]
filename = actions_action.csv

[actions_action_category]
filename = actions_action_category.csv

[actions_action_category_signature]
filename = actions_action_category_signature.csv


#########################################
# SYSMON
#########################################
[eventcode]
default_match = Unknown
filename = microsoft_sysmon_eventcode.csv
min_matches = 1


#########################################
# F5 ASM WAF
#########################################
[f5_asm_extension]
REGEX=\\r\\n([^:]+):([^\\r]+)
FORMAT=$1::$2


#########################################
# Fujitsu
#########################################
[fujitsu_log]
DELIMS="," 
FIELDS = "syslog_header","date","id","dest","id2","line_nubmer","action_id","action","unknown","user","full_name","interface","src","action_name"


#########################################
# Netwrix
#########################################
[netwrix_action]
filename=netwrix_action.csv

[extract_netwrix_info]
DELIMS = "|="
FIELDS = "vendor","vendor_product","product_version","event_severity","severity_id"

[extract_netwrix_field]
SOURCE_KEY = _raw
REGEX = ([^|]\w+)=(.*?(?=\||\n))
FORMAT = $1::$2


#########################################
# Palo Alto
#########################################
# GTP logs 
[pan_gtp]
DEST_KEY = MetaData:Sourcetype
REGEX = ^[^,]+,[^,]+,[^,]+,GTP,
FORMAT = sourcetype::pan:gtp

[extract_gtp]
DELIMS = ","
FIELDS = "future_use1","receive_time","serial_number","log_type","log_subtype","future_use2","generated_time","src_ip","dest_ip","future_use3","future_use4","rule","future_use5","future_use6","app","vsys","src_zone","dest_zone","src_interface","dest_interface","log_forwarding_profile","future_use7","session_id","future_use8","src_port","dest_port","future_use9","future_use10","future_use11","transport","action","gtp_event_type","msisdnN","ap_name","radio_access_technology","gtp_message_type","end_user_ip_address","tunnel_endpoint_identifier1","tunnel_endpoint_identifier2","gtp_interface","gtp_ause","severity","serving_country_mcc","serving_network_mnc","area_code","cell_id","gtp_event_code","future_use12","future_use13","source_location","destination_location","future_use14","future_use15","future_use16","future_use17","future_use18","future_use19","future_use20","tunnel_id_imsi","monitor_tag_imei","future_use21","future_use22","future_use23","future_use24","future_use25","future_use26","future_use27","future_use28","future_use29","future_use30","future_use31","future_use32","future_use33","future_use34","future_use35","future_use36","start_tim","duration","tunnel_inspection_rule","remote_user_ip","remote_user_id","rule_uuuid","pcap_id","high_resolution_timestamp",slice_service_type","slice_differentiator","application_subcategory","application_category","aplication_technology","application_risk","application_characteristic","application_container","application_saaS","application_sanctioned_state"

# System user 
[extract_system_user_logins]
SOURCE_KEY =  description
REGEX = user\s\'(?<user>.+?)\'.+From\:\s(?<src_ip>.\d+\.\d+\.\d+\.\d+)


#########################################
# MS Defender
#########################################
[extract_defender_info]
DELIMS = "|"
FIELDS = "vendor","vendor_product","product_version","signature_id","signature","severity_id","cef_message"

[extract_defender_message]
SOURCE_KEY = cef_message
REGEX = (\w+)=([^=]+)\s
FORMAT = $1::$2

[defender_classification_lookup]
filename = defender_classification.csv


#########################################
# IIS Custom
#########################################
[url_host_extraction]
SOURCE_KEY = cs_host
REGEX = (?<url_host>[^:]+):?

[iis_action_lookup]
filename = iis_action_lookup.csv
