
#######################################
### Risk Factors for ES Integration ###
#######################################

[DNS Guard AI - Beaconing]
conditions = [{"comparator":"equal","field":"anomalous_type","value":"Beaconing","value_type":"value"}]
description = Repeated DNS queries with consistent timing intervals, indicating potential beaconing behavior.
value = 50
disabled = 0

[DNS Guard AI - C2 Tunneling]
conditions = [{"comparator":"equal","field":"anomalous_type","value":"C2 Tunneling","value_type":"value"}]
description = High volume of DNS queries over short periods, often used to tunnel C2 traffic through DNS.
value = 50
disabled = 0

[DNS Guard AI - Query Length Anomalies]
conditions = [{"comparator":"equal","field":"anomalous_type","value":"Query Length","value_type":"value"}]
description = DNS queries with unusually long domain names, often used for data exfiltration or command encoding.
value = 50
disabled = 0

[DNS Guard AI - Domain Shadowing]
conditions = [{"comparator":"equal","field":"anomalous_type","value":"Domain Shadowing","value_type":"value"}]
description = Detection of excessive subdomain use for a single parent domain, indicating domain shadowing techniques.
value = 50
disabled = 0

[DNS Guard AI - TXT Record Anomalies]
conditions = [{"comparator":"equal","field":"anomalous_type","value":"TXT Record Anomalies","value_type":"value"}]
description = Use of TXT records to encode suspicious payloads or commands, commonly used in DNS-based malware.
value = 50
disabled = 0

[DNS Guard AI - ANY Record Anomalies]
conditions = [{"comparator":"equal","field":"anomalous_type","value":"ANY Record Anomalies","value_type":"value"}]
description = Use of ANY DNS queries, which are rare and often used for reconnaissance or evasion.
value = 50
disabled = 0

[DNS Guard AI - HINFO Record Anomalies]
conditions = [{"comparator":"equal","field":"anomalous_type","value":"HINFO Record Anomalies","value_type":"value"}]
description = HINFO record requests, which are deprecated and rarely used legitimately, often linked to scanning.
value = 50
disabled = 0

[DNS Guard AI - AXFR Record Anomalies]
conditions = [{"comparator":"equal","field":"anomalous_type","value":"AXFR Record Anomalies","value_type":"value"}]
description = Attempts to perform DNS zone transfers (AXFR), commonly used in reconnaissance and enumeration.
value = 50
disabled = 0

[DNS Guard AI - Whitelist]
conditions = [{"comparator":"equal","field":"whitelisted","value":"1","value_type":"value"}]
description = Matched domain is present in a trusted whitelist; no risk assigned.
operation_group = mult
value = 0
disabled = 0
