[xerox:syslog]
EVAL-event_severity=case(event_severity_id=0,"Emergency",event_severity_id=1,"Alert",event_severity_id=2,"Critical",event_severity_id=3,"Error",event_severity_id=4,"Warning",event_severity_id=5,"Notice",event_severity_id=6,"Informational",event_severity_id=7,"Debug")
EXTRACT-xerox_fields=<(?P<priority>[^\>]+)>\s(?P<timestamp>[^\s]+)\s(?P<printer>[\w]+)\s{1,}CEF\:(?P<cef_version>[\d])\|(?P<vendor>[^\|]+)\|(?<vendor_product>[^\|]+)\|(?<software_version>[^\|]+)\|(?<event_class_id>[^\|]+)\|(?<event_name>[^\|]+)\|(?<event_severity_id>[^\|]+)\|(?<event_entry_data>[^\|].*)
MAX_TIMESTAMP_LOOKAHEAD=26
TRUNCATE=999999
TIME_FORMAT=%Y-%m-%dT%H:%M:%S%:z
TIME_PREFIX=<\d{1,}\>\s
EXTRACT-suser=suser\=(?P<suser>[^\s]+)
EXTRACT-duser=duser\=(?P<duser>[^\s]+)
EXTRACT-outcome=outcome\=(?P<outcome>[^\s]+)
EXTRACT-request=request\=(?P<request>[^\s]+)
EXTRACT-msg=msg\=(?P<msg>[^\s]+)
EXTRACT-src=src\=(?P<src>[^\s]+)
EXTRACT-fname=fname\=(?P<fname>[^\s]+)
EXTRACT-filetype=fileType\=(?P<fileType>[^\s]+)
EXTRACT-deviceExternalId=deviceExternalId=\=(?P<deviceExternalId>[^\s]+)
EVAL-user=suser
EVAL-src_user=suser
EVAL-action=coalesce(case(like(event_name,"%Copy%"),"created",like(event_name,"%Delete%"),"deleted",like(event_name,"%Shutdown%"),"stopped",like(event_name,"%Start%"),"started",like(event_name,"%Logout%"),"logoff",like(event_name,"%Login%"),"login",like(event_name,"%Job"),"created",event_name="SNMPv3","modified",like(event_name,"%Config%"),"modified",like(event_name,"%Removal%"),"deleted"),event_name)
EVAL-protocol="tcp"
EVAL-dest=printer
EVAL-status=coalesce(case(outcome="Success","success",outcome="comp-normal","success",outcome="comp-deleted","success",outcome="Enabled","success"),outcome)
EVAL-app="Xerox Printer"
EVAL-signature=event_name
EVAL-src_host=src
EVAL-src_ip=if(like(src,"%.%.%.%"),src,null)
EVAL-dest_user=duser
EVAL-dest_host=host
EVAL-dest_ip=if(like(host,"%.%.%.%"),host,null)
EVAL-category="Printer"
EVAL-url=request
EVAL-message=msg
EVAL-file_name=fname
EVAL-file_type=fileType
EVAL-serial_number=deviceExternalId