##
## DO NOT EDIT THIS FILE!
## Please make all changes to files in $SPLUNK_HOME/etc/apps/TA-saltsecurity/local.
## To make changes, copy the section/stanza you want to change from $SPLUNK_HOME/etc/apps/TA-saltsecurity/default
## into ../local and edit there.
##

##############################
## Salt Security defult syslog
##############################

[salt:syslog]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
TIME_PREFIX = ^[\d\s\<]+\>\d\s
MAX_TIMESTAMP_LOOKAHEAD = 40
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+) 
TRUNCATE = 1050000

TZ = UTC

SEDCMD-noSyslogHeader = s/^[\d\s\<]+\>\d\s//
TRANSFORMS-force_sourcetype = salt_sourcetype_attacker, salt_sourcetype_attacker_action, salt_sourcetype_attacker_data



##############################
## Salt Security Attacker Data
##############################

[salt:syslog:attacker_data]
KV_MODE = none
REPORT-cefParse = cefHeaders, cefKeys
REPORT-jsonParse = salt_json_parse

#
# Search-time CIM-compliant field aliases and field calculations
# CIM compliance is mapped to the CIM Web Data Model
#
FIELDALIAS-country = CloudFront_Viewer_Country as country
FIELDALIAS-dest = dst as dest
FIELDALIAS-http_referrer = Referer as http_referrer
FIELDALIAS-src = attackerSourceID as src
FIELDALIAS-src_host = Host as src_host
FIELDALIAS-status = attemptResponseServer as status
FIELDALIAS-user_agent = User_Agent as user_agent


EVAL-attemptAttackTypes = split(attemptAttackTypes,",")
EVAL-description = attemptAttackTypes
EVAL-http_method = mvindex(split(attemptRequestPath," "),0)
EVAL-http_content_type = mvindex(split(attemptRequestPath," "),1)
EVAL-sec_ch_ua = split(replace(sec_ch_ua,"[\"\\\\]|;v",""), ", ")
EVAL-sec_ch_ua_platform = replace(sec_ch_ua_platform,"[\"\\\\]","")
EVAL-src_host = coalesce(src_host, "")
EVAL-src_ip = if(attackerSourceType="IP", attackerSourceID, attemptInternalIP)
EVAL-X_Forwarded_For = split(X_Forwarded_For, ", ")

EVAL-app = "Salt Security Platform"
EVAL-product = "API Protection Platform"
EVAL-vendor = "Salt Security"
EVAL-vendor_product = "Salt Security Platform"

##############################
## Salt Security Attacker Action
##############################

[salt:syslog:attacker_action]
KV_MODE = none
REPORT-cefParse = cefHeaders, cefKeys
REPORT-jsonParse = salt_json_parse

#
# Search-time CIM-compliant field aliases and field calculations
# CIM compliance is mapped to the CIM Web Data Model
#

FIELDALIAS-attacker_status = attackerStatus as attacker_status
FIELDALIAS-country = attackerCountryCode as country
FIELDALIAS-severity = attackerSeverity as severity
FIELDALIAS-src = attackerSourceID as src
FIELDALIAS-src_host = attackerHost as src_host
FIELDALIAS-status = attackerResponseCodes as status

EVAL-attackerAttackTypes = split(attackerAttackTypes,",")
EVAL-attackerResponseCodes = split(attackerResponseCodes, ",")
EVAL-API_endpoint_labels = split(attackerEndpointLabels, ",")
EVAL-country = upper(split(country,","))
EVAL-src_host = coalesce(replace(src_host, "\\\\\\\Q|\\\\\\\E",""), "")
EVAL-src_ip = if(attackerSourceType="IP", attackerSourceID, null)
EVAL-status = split(status,",")

EVAL-app = "Salt Security Platform"
EVAL-product = "API Protection Platform"
EVAL-vendor = "Salt Security"
EVAL-vendor_product = "Salt Security Platform"

