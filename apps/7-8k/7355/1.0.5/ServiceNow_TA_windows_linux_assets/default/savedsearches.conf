
[ServiceNow Coalesce Asset Details]
disabled = 0
enableSched = 1
description = Search that consolidates basic asset information for all asset types into one KV.
cron_schedule = 0 1 * * *
search = | inputlookup servicenow_asset_details \
| lookup servicenow_asset_forwarder_details host OUTPUTNEW hostIp, guid, fwdType, fwdVersion, fwdTime, OS \
| lookup servicenow_asset_linux_hardware_details host OUTPUTNEW processorName, numberOfCores, clockSpeedMHz \
| lookup servicenow_asset_win_bios_details host OUTPUTNEW hostSerialNumber \
| lookup servicenow_asset_win_computer_details host OUTPUTNEW hostManufacturer, hostModelName, hostType, hostStatus \
| lookup servicenow_asset_linux_interface_details host OUTPUTNEW networkAdapterDiscription \
| lookup servicenow_asset_win_net_adapter_details host OUTPUTNEW networkAdapterDiscription \
| lookup servicenow_asset_win_os_details host OUTPUTNEW OS as OSNameAddon, OSArchitecture, OSVersion, OSBuidNumber \
| lookup servicenow_asset_win_processor_details host OUTPUTNEW processorName, numberOfCores, clockSpeedMHz, numberOfProcessors, processorManufacturer, processorArchitecture \
| lookup servicenow_asset_linux_os_details host OUTPUTNEW OS as OSNameAddon, OSArchitecture, OSVersion, OSServicePack, OSFamily \
| lookup servicenow_asset_linux_open_ports host OUTPUTNEW openPortsData \
| lookup servicenow_asset_win_open_ports host OUTPUTNEW openPortsData \
| lookup servicenow_asset_linux_disks host OUTPUTNEW diskData \
| lookup servicenow_asset_win_disks host OUTPUTNEW diskData \
| eval OS=if(isnull(OSNameAddon), OS, OSNameAddon) \
| stats values(hostIp) as hostIp, values(processorName) as processorName, values(numberOfCores) as numberOfCores, values(clockSpeedMHz) as clockSpeedMHz, values(processorArchitecture) as processorArchitecture, values(OSFamily) as OSFamily, values(OS) as OS, values(OSArchitecture) as OSArchitecture, latest(OSVersion) as OSVersion, values(hostSerialNumber) as hostSerialNumber, values(OSBuidNumber) as OSBuidNumber, latest(OSServicePack) as OSServicePack, values(processorManufacturer) as processorManufacturer, values(numberOfProcessors) as numberOfProcessors, values(hostManufacturer) as hostManufacturer, values(hostModelName) as hostModelName, values(hostType) as hostType, values(hostStatus) as hostStatus, values(networkAdapterDiscription) as networkAdapterDiscription, values(guid) as guid, values(fwdType) as fwdType, values(fwdVersion) as fwdVersion, values(fwdTime) as fwdTime, values(openPortsData) as openPortsData, values(diskData) as diskData, values(logonTime) as logonTime by host \
| outputlookup servicenow_coalesced_asset_details \

