[ServiceNow Populate Linux Asset Logon time]
disabled = 0
enableSched = 1
description = Captures logon date time for all the linux hosts.
cron_schedule = 30 3 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
search = `servicenow_asset_linux_index_macro` source="/var/log/secure" sourcetype="linux_secure"  (user=* OR ruser=*) ("Accepted Publickey" OR "session opened" OR "Accepted password") \
| stats latest(_time) as logonTime by host \
| eval logonTime=strftime(logonTime, "%Y-%m-%d %H:%M:%S") \
| outputlookup servicenow_linux_asset_logon_details \

