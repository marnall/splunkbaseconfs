[ServiceNow Populate Basic Asset Details]
disabled = 0
enableSched = 1
description = Captures all the hosts in the instance.
cron_schedule = 0 2 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
search = `servicenow_asset_index_macro` \
| dedup host | table host \
| lookup servicenow_linux_asset_logon_details host OUTPUTNEW logonTime \
| lookup servicenow_win_asset_logon_details host OUTPUTNEW logonTime \
| outputlookup servicenow_asset_details \

[ServiceNow Populate Forwarder Details]
disabled = 0
enableSched = 1
description = Captures splunk forwarder details like guid, version, etc for each asset.
cron_schedule = 0 3 * * *
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
search = `servicenow_asset_index_macro` group=tcpin_connections (connectionType=cooked OR connectionType=cookedSSL) fwdType=* guid=* \
| dedup hostname, guid \
| eval host=hostname, fwdType = case(fwdType == "full", "Heavy Forwarder", fwdType == "uf", "Universal Forwarder", fwdType == "lwf", "Light Forwarder", true(), fwdType) \
| stats latest(sourceIp) as hostIp, latest(guid) as guid, latest(fwdType) as fwdType, latest(version) as fwdVersion, latest(_time) as fwdTime, latest(os) as OS  by host \
| outputlookup servicenow_asset_forwarder_details \

[ServiceNow Populate Linux Interface Details]
disabled = 0
enableSched = 1
