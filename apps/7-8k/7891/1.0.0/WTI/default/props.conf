# Extract the syslog_priority field and then
# apply lookup automatically to udp:514 source.
# Add other sources/sourcetypes as necessary!

[syslog]
EXTRACT-extract_syslog_priority = ^<(?<severity_id>\d+)> 
LOOKUP-lookup_syslog_priority = syslog_priority_lookup severity_id OUTPUTNEW facility, severity_name

[syslog]
EXTRACT-location = ^[^/\n]*/\s+(?P<location>[^,]+)
EXTRACT-message = ^(?:[^:\n]*:){5}\s+(?P<message>.+)
EXTRACT-siteid = ^(?:[^:\n]*:){4}\s+(?P<siteid>[^ ]+)
EXTRACT-host = ^(?:[^ \n]* ){2}(?P<host>[^ ]+)
EXTRACT-vendor_category = ^[^\(\n]*\((?P<vendor_category>[^\)]+)

EXTRACT-severity_id,siteid,location,vendor_category,message = ^[^ \n]* <(?P<severity_id>\d+)(?:[^ \n]* ){2}(?P<siteid>[^ ]+)[^/\n]*/\s+(?P<location>[^,]+)[^\(\n]*\((?P<vendor_category>[^\)]+)[^:\n]*:\s+(?P<message>.+)

[syslog]
TZ = GMT