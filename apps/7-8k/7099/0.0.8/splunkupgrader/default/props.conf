[source::...splunkupgrader.log]
TRUNCATE = 99999
LINE_BREAKER = [(\r\n)+]\d+-\d+-\d+\s\d+:\d+:\d+,\d+
SHOULD_LINEMERGE = false
# BREAK_ONLY_BEFORE = [(\r\n)+]\d+-\d+-\d+\s\d+:\d+:\d+,\d+
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 25
TIME_FORMAT = %Y-%m-%d %H:%M:%S.%N
sourcetype = splunkupgrader:log
SHOULD_LINEMERGE = false
EVENT_BREAKER_ENABLE = true
EVENT_BREAKER = [(\r\n)+]\d+-\d+-\d+\s\d+:\d+:\d+,\d+

TRANSFORMS-set_souretype = splunkupgrader-sourcetype
TRANSFORMS-extract_message = extract-message
TRANSFORMS-extract_component = extract-component
TRANSFORMS-splunkupgrader_loglevel = extract-loglevel
# TRANSFORMS-splunkupgrader_logs = extract-logs

