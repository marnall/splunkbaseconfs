[script:runbackup]
# handlertype = python
output_modes = json
match = /run-backup
script = run_backup.py
handler = application.RunBackup
python.version = python3
scripttype = persist
passPayload = true
passHttpHeaders = true
passHttpCookies = true

[script:getversion]
# handlertype = python
output_modes = json
