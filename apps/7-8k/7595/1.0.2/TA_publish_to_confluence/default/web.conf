[expose:TA_publish_to_confluence_account]
pattern = TA_publish_to_confluence_account
methods = POST, GET

[expose:TA_publish_to_confluence_account_specified]
pattern = TA_publish_to_confluence_account/*
methods = POST, GET, DELETE

[expose:TA_publish_to_confluence_settings]
pattern = TA_publish_to_confluence_settings
methods = POST, GET

[expose:TA_publish_to_confluence_settings_specified]
pattern = TA_publish_to_confluence_settings/*
methods = POST, GET, DELETE
