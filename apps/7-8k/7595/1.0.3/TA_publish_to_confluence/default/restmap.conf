[admin:TA_publish_to_confluence_configuration]
match = /
members = TA_publish_to_confluence_account, TA_publish_to_confluence_settings

[admin_external:TA_publish_to_confluence_account]
handlertype = python
python.version = python3
handlerfile = TA_publish_to_confluence_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true

[admin_external:TA_publish_to_confluence_settings]
handlertype = python
python.version = python3
handlerfile = TA_publish_to_confluence_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true
