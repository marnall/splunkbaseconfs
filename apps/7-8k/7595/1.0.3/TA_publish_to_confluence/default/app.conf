[launcher]
version = 1.0.3
description = TA Publish to Confluence provides a method of exporting Splunk search results into a Confluence page.
author = Daniel Spavin

[id]
version = 1.0.3
name = TA_publish_to_confluence

[install]
build = 1777015508
is_configured = false
state = enabled

[package]
id = TA_publish_to_confluence
check_for_updates = true

[ui]
label = Publish to Confluence
supported_themes = light, dark
is_visible = true

[triggers]
reload.ta_publish_to_confluence_settings = simple
reload.ta_publish_to_confluence_account = simple
