# REST endpoints for CyberWatch AI API Key management

[admin:cyberwatch_api_keys]
match = /cyberwatch/api_keys
members = api_keys

[admin_external:api_keys]
handlertype = python
handlerfile = api_keys_handler.py
handleractions = list, create, remove
handlerpersistentmode = true
python.version = python3

[admin:cyberwatch_active_api]
match = /cyberwatch/active_api
members = active_api

[admin_external:cyberwatch_active_api]
handlertype = python
handlerfile = active_api_handler.py
handleractions = list, create
handlerpersistentmode = true
python.version = python3

# AI Analysis REST endpoint
[script:ai_analyze]
match = /ai_analyze
script = ai_analysis_proxy.py
scripttype = persist
handler = ai_analysis_proxy.AIAnalysisProxyHandler
requireAuthentication = true
output_modes = json
passPayload = true
python.version = python3
