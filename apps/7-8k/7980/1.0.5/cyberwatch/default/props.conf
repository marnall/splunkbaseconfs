[ai_investigation]
TRUNCATE = 100000
KV_MODE = auto
# Extract fields that might be missing or need explicit extraction
EXTRACT-inc_number = inc_number="?(?<inc_number>[^",\s]+)"?
EXTRACT-analysis_base64 = analysis_base64="?(?<analysis_base64>[^",\s]+)"?
EXTRACT-username = username="?(?<username>[^",\s]+)"?
EXTRACT-timestamp = timestamp="?(?<timestamp>[^",\s]+)"?
EXTRACT-provider = provider="?(?<provider>[^",\s]+)"?

# Ensure proper line breaking if needed (collect usually handles this but good to be safe)
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)

