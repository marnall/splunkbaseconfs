
[netasq]
DATETIME_CONFIG =
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
disabled = false
pulldown_type = true
TRANSFORMS-netasq_host=netasq_host
FIELDALIAS-bytes = rcvd ASNEW bytes_in sent ASNEW bytes_out
FIELDALIAS-dest_name = dstname ASNEW dest_name
FIELDALIAS-dest_port = dstport ASNEW dest_port
FIELDALIAS-dst = dst ASNEW dest
FIELDALIAS-dstif = dstif ASNEW dest_interface
FIELDALIAS-protocol = ipproto ASNEW protocol proto ASNEW protocol
FIELDALIAS-src_interface = srcif ASNEW src_interface
FIELDALIAS-src_port = srcport ASNEW src_port
FIELDALIAS-src_priority = pri ASNEW src_priority
FIELDALIAS-icmp_type = icmptype ASNEW icmp_type
EVAL-action = case(action="pass","allowed",action="block","blocked")