[proxmox_task]
AUTO_KV_JSON = false
INDEXED_EXTRACTIONS = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = starttime
TRUNCATE = 100000
category = Splunk App Add-on Builder
pulldown_type = 1

[TA-proxmox-add-on-for-splunk]
SEDCMD-501 = s/("|')message("|'):\s*("|')501("|')/"message" : "Activation Key mismatch or invalid characters detected."/g
SEDCMD-502 = s/("|')message("|'):\s*("|')502("|')/"message" : "Trial License Expired"/g
SEDCMD-503 = s/("|')message("|'):\s*("|')503("|')/"message" : "Annual Key is Expired"/g
SEDCMD-504= s/("|')message("|'):\s*("|')505("|')/"message" : "Activation Key validation failed. Please enter the correct key."/g