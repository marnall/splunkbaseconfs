[reversinglabs_log]
# Timestamp is at the very start of each line: 2026-05-21 09:14:32 INFO ...
TIME_PREFIX        = ^
TIME_FORMAT        = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 19

# Multiline support: tracebacks are part of the same event as the ERROR line above them
SHOULD_LINEMERGE   = true
BREAK_ONLY_BEFORE  = \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}

# Extract structured fields so they are searchable without rex
EXTRACT-log_level  = \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} (?P<log_level>\w+)\s+
EXTRACT-logger     = \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} \w+\s+(?P<logger_name>\S+)
EXTRACT-source_file = \[(?P<source_file>[^\]]+)\]
