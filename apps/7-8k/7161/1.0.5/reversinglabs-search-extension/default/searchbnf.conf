[reversinglabs-command]
syntax = reversinglabs (<reversinglabs-options>)*
shortdesc = Query the ReversingLabs TitaniumCloud API-s to enrich Splunk Search records
description = This command can query various ReversingLabs TitaniumCloud API-s, depending on the provided record field, and enrich the Search records with ReversingLabs threat intel
usage = public
example1 = reversinglabs file_reputation_hash=sample_hash
comment1 = Queries the ReversingLabs File Reputation API using a field named sample_hash from the Search records
example2 = reversinglabs network_reputation_location=source_ip
comment2 = Queries the ReversingLabs Network Reputation API using a field named source_ip from the Search records
tags = reversinglabs command reputation

[reversinglabs-options]
syntax = file_reputation_hash=<field> | file_analysis_hash=<field> | network_reputation_location=<field>
description = The file_reputation_hash and file_analysis_hash parameters take a field that contains a hash. The network_reputation_location parameter takes a field that contains either a URL, a domain or an IP address.