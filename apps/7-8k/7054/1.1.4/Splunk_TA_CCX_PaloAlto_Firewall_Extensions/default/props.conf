[pan:iot_alert]

REPORT-ccx_paloalto_iot_extended_kv_capture = ccx_paloalto_iot_extended_kv_capture
 
FIELDALIAS-vendor_type = type AS vendor_type
FIELDALIAS-threat_category = msg.threatCategory AS threat_category
FIELDALIAS-event_id = id AS  event_id

EVAL-type = "alert" 
EVAL-app = if(isnotnull('app'),'app',"Palo Alto IoT Security") 
EVAL-dest_ip = if(cidrmatch("0.0.0.0/0",'dest'),'dest',null()) 
EVAL-dest_port = 'msg.remoteHostMetadata{}.connections{}.port' 
EVAL-src_ip = if(cidrmatch("0.0.0.0/0",'src'),'src',null()) 
EVAL-severity = if(isnotnull('severity'),case(severity=="info" OR severity=="Info","informational",severity=="low" OR severity=="Low","low",severity=="medium" OR severity=="Medium","medium",severity=="high" OR severity=="High","high",severity=="critical" OR severity=="Critical","critical"),lower('severity')) 
EVAL-description = if(isnotnull('description'),'description',tostring('name')+" - "+tostring('msg.hostname')+" ("+tostring('vendor_type')+")") 
EVAL-body = if(isnotnull('body'),'body',tostring('name')+" - "+tostring('msg.hostname')+" ("+tostring('vendor_type')+")") 
EVAL-vendor_account = if(isnotnull('vendor_account') AND vendor_account!="0",'vendor_account',null()) 
EVAL-transport = 'msg.remoteHostMetadata{}.connections{}.ipProto' 
EVAL-protocol = if(isnotnull('app'),'app',null()) 
EVAL-category = if(isnotnull('msg.threatCategory'),'msg.threatCategory','category') 
EVAL-ids_type = if(isnotnull('msg.threatCategory'),"network",null()) 
EVAL-dvc = coalesce('Firewall_Name','deviceid') 
EVAL-action = if(isnotnull('msg.threatCategory'),case(match('Firewall_Action',".*(T|t)erminate.*|.*(B|b)lock.*|.*(F|f)ail.*") OR match('msg.description',".*may try to brute-force.*"),"blocked",1=1,"allowed"),null()) 
EVAL-id = 'zb_ticketid'
EVAL-cve = if(isnotnull('msg.vulIds{}') AND match('msg.vulIds{}',"CVE-.*"),'msg.vulIds{}',null())


[pan:iot_vulnerability]

FIELDALIAS-vendor_type = type AS vendor_type 
FIELDALIAS-category = display_profile_category AS category
FIELDALIAS-signature = display_profile_category AS signature

EVAL-dest_ip = if(cidrmatch("0.0.0.0/0",'dest'),'dest',null())
EVAL-type = "alert" 
EVAL-app = if(isnotnull('app'),'app',"Palo Alto IoT Security") 
EVAL-severity = if(isnotnull('severity'),case(severity=="info" OR severity=="Info","informational",severity=="low" OR severity=="Low","low",severity=="medium" OR severity=="Medium","medium",severity=="high" OR severity=="High","high",severity=="critical" OR severity=="Critical","critical"),lower('severity')) 
EVAL-description = if(isnotnull('description'),'description',"Vulnerability detected"+": "+tostring('display_profile_category')+" ("+tostring('cve')+")"+" severity "+tostring(lower('severity'))) 
EVAL-body = if(isnotnull('description'),'description',"Vulnerability detected"+": "+tostring('display_profile_category')+" ("+tostring('cve')+")"+" severity "+tostring(lower('severity'))) 
EVAL-vendor_account = if(isnotnull('vendor_account') AND vendor_account!="0",'vendor_account',null()) 
EVAL-cvss = 'cvss_score'
EVAL-id = 'zb_ticketid'

