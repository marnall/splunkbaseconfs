##Palo Alto Networks Global Protect - GP##
[pan:globalprotect]

EVAL-action = if(log_subtype="login",'result', if(log_subtype="quarantine",case(match(event_id,"^.*[d|D]elete.*|.*[r|R]emove.*"),"deleted",match(event_id,"^.*[m|M]odif.*|.*[c|C]hange.*"),"modified",match(event_id,"^.*[c|C]reate.*"),"created"),if(log_subtype="connected","connected",null()))) 
EVAL-dest = coalesce('portal','dvc_name') 
EVAL-dest_ip = if(isnotnull('private_ip') AND 'private_ip'!="0.0.0.0" ,'private_ip',null()) 
EVAL-dest_dns = if(isnotnull('portal') AND match('portal',"^.*\.com.*"),'portal',null()) 
EVAL-src = 'public_ip' 
EVAL-app = if(log_subtype="host-info",lower('log_type'),'portal') 
EVAL-body = 'description' 
EVAL-dvc = 'dvc_name' 
EVAL-id = 'sequence_number' 
EVAL-type = if(log_subtype="host-info" AND status="failure","alert", if(log_subtype="host-info" AND status="success","event",'type')) 
EVAL-object_category = if(log_subtype="quarantine","list",null()) 
EVAL-object_attrs = if(log_subtype="quarantine",'host_id',null()) 
EVAL-change_type = if(log_subtype="quarantine","filesystem",null()) 
EVAL-object = if(log_subtype="quarantine","quarantine list",null()) 
EVAL-command = if(log_subtype="quarantine",'event_id',null()) 
EVAL-duration = if(isnotnull('login_duration') AND 'login_duration'!=0,'login_duration',null()) 
EVAL-authentication_method = if(log_subtype="login",lower('auth_method'),null()) 
EVAL-authentication_service = if(log_subtype="login" AND isnotnull('description') AND match('description',".*[o|O]kta.*"),"Okta",null()) 
EVAL-signature = if(log_subtype="login" AND isnotnull('error'),'error',if(log_subtype="login" AND isnotnull('description') AND match('description',"^.*profile\:\s+"),replace('description',"^.*profile\:\s+(.*)","\1"),if(log_subtype="connected",'tunnel_type','event_id'))) 
EVAL-signature_id = if(isnotnull('error_code') AND 'error_code'!=0,'error_code',null()) 
EVAL-reason = if(log_subtype="login",coalesce('error','event_id'),null()) 
EVAL-user = if(isnotnull(src_user),'src_user',if(log_subtype="quarantine" AND match(_raw,"^.*Admin Delete.*"),"Admin Delete",null())) 
EVAL-vendor_product = "Palo Alto Firewall:GlobalProtect" 
EVAL-severity = if(isnull('severity') AND log_subtype="host-info","unknwon",'severity')

