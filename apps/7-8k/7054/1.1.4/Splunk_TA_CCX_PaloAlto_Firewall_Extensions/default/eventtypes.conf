##Palo Alto Networks Global Protect - GP##

[ccx_paloalto_fw_globalprotect_login]
search = (sourcetype=pan_globalprotect OR sourcetype=pan:globalprotect) log_subtype="login"
#tags = authentication

[ccx_paloalto_fw_globalprotect_logout]
search = (sourcetype=pan_globalprotect OR sourcetype=pan:globalprotect) log_subtype="logout"

[ccx_paloalto_fw_globalprotect_quarantine]
search = (sourcetype=pan_globalprotect OR sourcetype=pan:globalprotect) log_subtype="quarantine"
#tags = change

[ccx_paloalto_fw_globalprotect_hostinfo]
search = (sourcetype=pan_globalprotect OR sourcetype=pan:globalprotect) log_subtype="host-info"
#tags = alert

[ccx_paloalto_fw_globalprotect_session]
search = (sourcetype=pan_globalprotect OR sourcetype=pan:globalprotect) log_subtype="connected"
#tags = network session

[ccx_paloalto_fw_globalprotect_agent_msg]
search = (sourcetype=pan_globalprotect OR sourcetype=pan:globalprotect) log_subtype="agent-msg"

[ccx_paloalto_fw_globalprotect_before_login]
search = (sourcetype=pan_globalprotect OR sourcetype=pan:globalprotect) log_subtype="before-login"

[ccx_paloalto_fw_globalprotect_tunnel]
search = (sourcetype=pan_globalprotect OR sourcetype=pan:globalprotect) log_subtype="tunnel"

[ccx_paloalto_fw_globalprotect_configuration]
search = (sourcetype=pan_globalprotect OR sourcetype=pan:globalprotect) log_subtype="configuration"


##Palo Alto Networks IoT Security##

[ccx_paloalto_iot_alert_ids]
search = (sourcetype="pan:iot_alert") threat_category="*"
#tags = network communicate ids attack


# Palo Alto Firewall Cloud

[ccx_palo_alto_firewall_cloud_alert]
search = (sourcetype="pan:firewall_cloud") dataset_name="alert" OR EventDescription IN ("Auto update agent found no new*", "*job started processing*", "*downloaded by Auto update agent", "Commit job succeeded*", "Installed WildFire package*")
# tags = alert

[ccx_palo_alto_firewall_cloud_authentication]
search = (sourcetype="pan:firewall_cloud") (dataset_name="authentication" OR EventDescription="*Logged In*")
# tags = authentication

[ccx_palo_alto_firewall_cloud_change]
search = (sourcetype="pan:firewall_cloud") (dataset_name="change" OR EventDescription IN ("Antivirus job started*", "Advanced Routing mode = off", "Antivirus package upgraded*"))
# tags = change

[ccx_palo_alto_firewall_cloud_filtering]
search = (sourcetype="pan:firewall_cloud") dataset_name="filtering"

[ccx_palo_alto_firewall_cloud_general]
search = (sourcetype="pan:firewall_cloud") dataset_name="general"

[ccx_palo_alto_firewall_cloud_job_enqueued]
search = (sourcetype="pan:firewall_cloud") EventDescription="*job enqueued*"

[ccx_palo_alto_firewall_cloud_logout]
search = (sourcetype="pan:firewall_cloud") (EventDescription="*Logged Out*")

[ccx_palo_alto_firewall_cloud_network_traffic]
search = (sourcetype="pan:firewall_cloud") EventDescription="gRPC connection to*"
# tags = network communicate

[ccx_palo_alto_firewall_cloud_request]
search = (sourcetype="pan:firewall_cloud") dataset_name="request"

[ccx_palo_alto_firewall_cloud_sync]
search = (sourcetype="pan:firewall_cloud") dataset_name="sync"
