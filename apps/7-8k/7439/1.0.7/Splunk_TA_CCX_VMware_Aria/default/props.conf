
[ccx:vmware:aria]
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 32
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TZ = UTC
category = Operating System
disabled = false
maxDist = 3
pulldown_type = 1
KV_MODE = none
TRANSFORMS-gethost = nsx_hostname

EXTRACT-vmw_nsxt_audit_operation_status = status(:'|=")(?<vmw_nsxt_audit_operation_status>\w+)('|")
EXTRACT-vmw_nsxt_display_name = "display_name":"(?<vmw_nsxt_display_name>[\w \\']+)"
EXTRACT-vmw_nsxt_firewall_action = (?:match|TERM|L7 Rule pending)\s(?<vmw_nsxt_firewall_action>\w+)\s(?:\d+)
EXTRACT-vmw_nsxt_firewall_dst = [A-Fa-f\d]+->(?<vmw_nsxt_firewall_dst>[A-Fa-f\d\.:]+)( |/|$)
EXTRACT-vmw_nsxt_firewall_dst_ip_port = [A-Fa-f\d]+->(?<vmw_nsxt_firewall_dst_ip_port>[A-Fa-f\d\.:]+/\d+)( |$)
EXTRACT-vmw_nsxt_firewall_dst_port = [A-Fa-f\d]+->[A-Fa-f\d\.:]+/(?<vmw_nsxt_firewall_dst_port>-?\d+)( |$)
EXTRACT-vmw_nsxt_firewall_protocol = (IN|OUT) (\d+ )?(?<vmw_nsxt_firewall_protocol>(TCP6?|UDP6?|ICMP|PROTO6? \d+))\s
EXTRACT-vmw_nsxt_firewall_reason = (?:INET|INET6)\s(?<vmw_nsxt_firewall_reason>.*)\s(?:PASS|DROP|REJECT|GOTO_FILTER)
EXTRACT-vmw_nsxt_firewall_src = \S+\s+(?<vmw_nsxt_firewall_src>[A-Fa-f\d\.:]+)(/|->)
EXTRACT-vmw_nsxt_fw_client_server_bytes = \s(?<vmw_nsxt_fw_client_server_bytes>-?\d+)/\d+.*$
EXTRACT-vmw_nsxt_fw_server_client_bytes = \s\d+/(?<vmw_nsxt_fw_server_client_bytes>-?\d+).*$
EXTRACT-vmw_nsxt_operation = Operation(:'|=")(?<vmw_nsxt_operation>\w+)('|")
EXTRACT-vmw_nsxt_user = UserName(:'|=")(?<vmw_nsxt_user>.+?)('|")


EVAL-action = if(('header_common_header_publisher'=="CSP Authentication" OR 'vendor_log_type'=="UserLoginSessionEvent") AND match(_raw, ".*fail.*"), "failure", if(('header_common_header_publisher'=="CSP Authentication" OR 'vendor_log_type'=="UserLoginSessionEvent") AND match(_raw, ".*block.*"), "success", if(match('vendor_description', ".*USER_LOGIN.*"), lower('vendor_action'), if(match('vmw_nsxt_operation', "Read.*|Get.*|List.*"), "read", if('msgid'=="FIREWALL" OR 'appname'=="FIREWALL-PKTLOG", if('vmw_nsxt_firewall_action'=="DROP", "blocked", "allowed"), if('vendor_log_type'=="BadUsernameSessionEvent", "failure", 'action'))))))
EVAL-app = if('process'=="CROND" OR ('header_common_header_publisher'=="CSP Authentication" OR 'vendor_log_type'=="UserLoginSessionEvent" OR 'vendor_log_type'=="BadUsernameSessionEvent" OR match('vendor_description', ".*USER_LOGIN.*")), "VMWare Aria", if('msgid'=="FIREWALL" OR 'appname'=="FIREWALL-PKTLOG", coalesce('comp', "VMWare Aria"), null()))
EVAL-body = if('process'=="CROND", 'vendor_description', null())
EVAL-change_type = if(match('vmw_nsxt_operation', "Read.*|Get.*|List.*"), 'ModuleName', null())
EVAL-dest_port = coalesce('dest_port', 'vmw_nsxt_firewall_dst_port')
EVAL-description = if('process'=="CROND", 'vendor_description', null())
EVAL-dest = if('process'=="CROND", 'vendor_device', if(match('vmw_nsxt_operation', "Read.*|Get.*|List.*"), 'comp', if('msgid'=="FIREWALL" OR 'appname'=="FIREWALL-PKTLOG", 'vmw_nsxt_firewall_dst', 'dest_ip')))
EVAL-dest_ip = if('msgid'=="FIREWALL" OR 'appname'=="FIREWALL-PKTLOG", 'vmw_nsxt_firewall_dst', 'dest_ip')
EVAL-protocol = 'vmw_nsxt_firewall_protocol'
EVAL-severity = case('process'=="CROND", "unknown", 'severity'=="1", "critical", 'severity'=="2", "high", 'severity'=="3", "medium", 'severity'=="4", "low", 'severity'=="5", "informational", 1==1, 'severity')
EVAL-signature = if('process'=="CROND", 'process'."[".'vendor_log_id'."]", if('header_common_header_publisher'=="CSP Authentication", 'header_common_header_message_type', if(match('vendor_description', ".*USER_LOGIN.*"), "USER_LOGIN", if('vendor_log_type'=="UserLoginSessionEvent" OR 'vendor_log_type'=="BadUsernameSessionEvent", 'vendor_log_type', 'signature'))))
EVAL-src = if('header_common_header_publisher'=="CSP Authentication", 'client_ip', if(match('vendor_description', ".*USER_LOGIN.*"), replace('vendor_description', "(?:.+from)\s+((?:\d{1,3}\.){3}\d{1,3}).+", "\1"), if('vendor_log_type'=="UserLoginSessionEvent" OR 'vendor_log_type'=="BadUsernameSessionEvent", replace('vendor_description', "(?:.+\@)((?:\d{1,3}\.){3}\d{1,3})(?:.+)?", "\1"), if('msgid'=="FIREWALL" OR 'appname'=="FIREWALL-PKTLOG", 'vmw_nsxt_firewall_src', 'src_ip'))))
EVAL-src_ip = if('header_common_header_publisher'=="CSP Authentication", 'client_ip', if(match('vendor_description', ".*USER_LOGIN.*"), replace('vendor_description', "(?:.+from)\s+((?:\d{1,3}\.){3}\d{1,3}).+", "\1"), if('vendor_log_type'=="UserLoginSessionEvent" OR 'vendor_log_type'=="BadUsernameSessionEvent", replace('vendor_description', "(?:.+\@)((?:\d{1,3}\.){3}\d{1,3})(?:.+)?", "\1"), if('msgid'=="FIREWALL" OR 'appname'=="FIREWALL-PKTLOG", 'vmw_nsxt_firewall_src', 'src_ip'))))
EVAL-src_port = coalesce('src_port', 'vmw_nsxt_firewall_src_port')
EVAL-status = 'status'
EVAL-subject = if('process'=="CROND", 'process'."[".'vendor_log_id'."]", null())
EVAL-type = if('process'=="CROND", "event", null())
EVAL-user = if('process'=="CROND" OR ('header_common_header_publisher'=="CSP Authentication" OR 'vendor_log_type'=="UserLoginSessionEvent" OR 'vendor_log_type'=="BadUsernameSessionEvent" OR match('vendor_description', ".*USER_LOGIN.*")), 'vendor_user', if(match('vmw_nsxt_operation', "Read.*|Get.*|List.*"), coalesce('username', 'UserName'), null()))
EVAL-user_name = if(match('vmw_nsxt_operation', "Read.*|Get.*|List.*"), coalesce('username', 'UserName'), null())
EVAL-vendor_product = "VMware:Aria:Operations"

# REPORT-ccx_vmware_aria_kvp_extraction = ccx_vmware_aria_kvp_extraction
REPORT-ccx_vmware_aria_script_extraction = ccx_vmware_aria_script_extraction
REPORT-ccx_vmware_aria_user_login = ccx_vmware_aria_user_login
REPORT-ccx_vmware_aria_usersessionevent = ccx_vmware_aria_usersessionevent
REPORT-getfields = syslog_fields
REPORT-syslog = syslog-extractions
