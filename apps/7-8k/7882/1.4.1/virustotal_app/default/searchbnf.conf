[vt-command]
syntax = vt <vt-options>
description = Checks file hashes or URLs against VirusTotal.
shortdesc = Queries VirusTotal using a hash or URL to enrich data.
example1 = ...| vt hash=file_sha256
comment1 = Queries VirusTotal for an event with a field file hash.
example2 = ...| vt url="https://example.com"
comment2 = Queries VirusTotal for the specified URL.
example3 = ...| vt domain="example.com"
comment3 = Queries VirusTotal for the specified Domain.
example4 = ...| vt ip="8.8.8.8"
comment4 = Queries VirusTotal for the specified IP.
usage = public

[vt-options]
syntax = (hash=<string>) | (url=<string> | (domain=<string> | (ip=<string>)
description = hash: File hash (MD5, SHA1, or SHA256).\
    url: Full URL to lookup.\
    domain: Domain to lookup.\
    ip: Valid IP to lookup.\
    Only one of the hash, url, domain or ip params shoud be used.



