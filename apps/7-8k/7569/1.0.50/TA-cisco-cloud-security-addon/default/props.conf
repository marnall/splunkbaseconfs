[source::security_events_and_alerts]
TRANSFORMS-cisco_sourcetype = security_event_alert_sourcetype
SHOULD_LINEMERGE = false
KV_MODE = json
AUTO_KV_JSON = false
NO_BINARY_CHECK = true
TRUNCATE = 0
CHARSET = AUTO
TZ = UTC
# Product/Vendor Information (CIM)
EVAL-product = "Cisco Secure Access"
EVAL-vendor = "Cisco"
EVAL-vendor_product = "Cisco Secure Access"

[cisco:secure_access:security_events_dns]
# DNS CIM Required Fields
FIELDALIAS-dns_query = query.hostname as query
FIELDALIAS-dns_record_type = query.type as record_type
FIELDALIAS-dns_src = src_endpoint.ip as src_ip
FIELDALIAS-dns_source_ip = src_endpoint.ip as src

# DNS CIM Conditional Fields
FIELDALIAS-dns_reply_code_id = rcode_id as reply_code_id
EVAL-reply_code = case(rcode_id=="0","NOERROR",rcode_id=="1","FORMERR",rcode_id=="2","SERVFAIL",rcode_id=="3","NXDOMAIN",rcode_id=="4","NOTIMP",rcode_id=="5","REFUSED",rcode_id=="6","YXDOMAIN",rcode_id=="7","YXRRSET",rcode_id=="8","NOTAUTH",rcode_id=="9","NOTZONE",rcode_id=="10","DSOTYPENI",rcode_id=="16","BADSIG",rcode_id=="17","BADKEY",rcode_id=="18","BADTIME",rcode_id=="19","BADMODE",rcode_id=="20","BADNAME",rcode_id=="21","BADALG",rcode_id=="22","BADTRUNC",rcode_id=="23","BADCOOKIE",1==1,"Unknown")
EVAL-message_type = "Query"

[cisco:secure_access:security_events_intrusion]
# IDS CIM Required Fields
FIELDALIAS-ids_src = src_endpoint.ip as src
FIELDALIAS-ids_dest = destination_endpoint.ip as dest
FIELDALIAS-ids_signature = cisco_ips_metadata.signature_message as signature
FIELDALIAS-ids_category = cisco_ips_metadata.attack_classification as category

# IDS CIM Conditional Fields
FIELDALIAS-ids_dest_port = destination_endpoint.port as dest_port
FIELDALIAS-ids_src_port = src_endpoint.port as src_port
FIELDALIAS-ids_transport = connection_info.protocol_name as transport
FIELDALIAS-ids_signature_id = cisco_ips_metadata.signature_id as signature_id
FIELDALIAS-ids_severity_id = severity_id as severity_id
EVAL-severity = case(severity_id==0,"informational",severity_id==1,"low",severity_id==2,"medium",severity_id==3,"high",severity_id==4,"critical",1==1,"unknown")
EVAL-action = lower(cisco_ips_metadata.action)

# IDS Type
EVAL-ids_type = "network"

[cisco:secure_access:security_events_web]
# Web CIM Required Fields
FIELDALIAS-web_url = http_request.url.url_string as url
FIELDALIAS-web_src = src_endpoint.ip as src
FIELDALIAS-web_dest = dst_endpoint.ip as dest
FIELDALIAS-web_http_method = http_request.http_method as http_method
FIELDALIAS-web_status = http_response.code as status
# Web CIM Conditional Fields
FIELDALIAS-web_user_agent = http_request.user_agent as http_user_agent
FIELDALIAS-web_http_content_type = http_response.content_type as http_content_type
FIELDALIAS-web_bytes_in = http_request.length as bytes_in
FIELDALIAS-web_bytes_out = http_response.length as bytes_out
FIELDALIAS-web_dest_port = dst_endpoint.port as dest_port
FIELDALIAS-web_http_referrer = http_request.referrer as http_referrer
EVAL-url_length = len('http_request.url.url_string')
EVAL-http_user_agent_length = len('http_request.user_agent')
EVAL-action = case(cisco_swg_verdict.action=="BLOCKED","blocked",cisco_swg_verdict.action=="ALLOWED","allowed",1==1,"unknown")
EVAL-bytes = coalesce('http_request.length',0) + coalesce('http_response.length',0)

# Category
FIELDALIAS-web_category = policy.categories{} as category

[cisco:secure_access:security_events_firewall]
# Network Traffic CIM Required Fields
FIELDALIAS-fw_src = src_endpoint.ip as src
FIELDALIAS-fw_dest = dst_endpoint.ip as dest
FIELDALIAS-fw_src_port = src_endpoint.port as src_port
FIELDALIAS-fw_dest_port = dst_endpoint.port as dest_port

# Network Traffic CIM Conditional Fields
FIELDALIAS-fw_bytes_in = cisco_fw_metadata.bytes_received as bytes_in
FIELDALIAS-fw_bytes_out = cisco_fw_metadata.bytes_sent as bytes_out
FIELDALIAS-fw_packets_in = cisco_fw_metadata.packets_received as packets_in
FIELDALIAS-fw_packets_out = cisco_fw_metadata.packets_sent as packets_out
EVAL-bytes = coalesce('cisco_fw_metadata.bytes_received',0) + coalesce('cisco_fw_metadata.bytes_sent',0)
EVAL-packets = coalesce('cisco_fw_metadata.packets_received',0) + coalesce('cisco_fw_metadata.packets_sent',0)
FIELDALIAS-fw_transport = connection_info.protocol_name as transport
EVAL-protocol = "ip"
FIELDALIAS-fw_rule = firewall_rule.name as rule
FIELDALIAS-fw_direction = cisco_fw_metadata.direction as direction
EVAL-action = case(cisco_fw_metadata.verdict=="ALLOW","allowed",cisco_fw_metadata.verdict=="BLOCK","blocked",1==1,"unknown")
EVAL-duration = if(isnotnull('end_time') AND isnotnull('start_time'), ('end_time' - 'start_time')/1000, null())
# Protocol Version
EVAL-protocol_version = if(match('src_endpoint.ip',":"), "ipv6", if(match('src_endpoint.ip', "(?:\d+\.\d+\.\d+\.\d+)"),"ipv4", null()))

[cisco:secure_access:security_events_ztna]
# Authentication CIM Fields
FIELDALIAS-ztna_user = cisco_ztna_metadata.identity_email as user
FIELDALIAS-ztna_src = cisco_ztna_metadata.client_ip as src
FIELDALIAS-ztna_dest = cisco_ztna_metadata.resolved_ip as dest
FIELDALIAS-ztna_app = cisco_ztna_metadata.private_app_name as app
EVAL-action = case(cisco_ztna_metadata.verdict=="ALLOW","allowed",cisco_ztna_metadata.verdict=="BLOCK","blocked",1==1,"unknown")
# Network Sessions CIM Fields
FIELDALIAS-ztna_dest_dns = cisco_ztna_metadata.requested_fqdn as dest_dns
FIELDALIAS-ztna_auth_method = cisco_ztna_metadata.stepup_auth_type as authentication_method

[cisco:secure_access:security_events_dlp]
# DLP CIM Required Fields
FIELDALIAS-dlp_dest = dst_endpoint.ip as dest
FIELDALIAS-dlp_object = cisco_dlp_metadata.file_name as object
FIELDALIAS-dlp_signature = policy.name as signature
EVAL-action = lower(cisco_dlp_metadata.action)

# DLP CIM Conditional Fields
FIELDALIAS-dlp_user = cisco_dlp_metadata.owner_email as user
FIELDALIAS-dlp_classification = policy.data.classification as dlp_type
EVAL-severity = lower('cisco_dlp_metadata.severity')

[cisco:secure_access:security_events_ravpn]
# Authentication CIM Fields
FIELDALIAS-ravpn_user = cisco_origin.user_id as user
FIELDALIAS-ravpn_src = cisco_ravpn_session.public_ip as src
FIELDALIAS-ravpn_dest = cisco_ravpn_session.assigned_ip as dest
EVAL-action = case(isnotnull(cisco_ravpn_session.connected_at),"success",isnotnull(cisco_ravpn_session.disconnection_reason),"failure",1==1,"unknown")
EVAL-app = "vpn"

# Authentication CIM Fields
FIELDALIAS-ravpn_vpn_profile = cisco_ravpn_session.vpn_profile as signature

[cisco:secure_access:alerts_connectivity_tunnels]
FIELDALIAS-alert_signature = ruleName as signature
FIELDALIAS-alert_severity = severity as severity
FIELDALIAS-alert_id = alertId as id
FIELDALIAS-alert_type = alertType as type
FIELDALIAS-alert_description = ruleDescription as description
FIELDALIAS-alert_rule_id = ruleId as signature_id
FIELDALIAS-alert_status = status as status
EVAL-action = lower(status)

