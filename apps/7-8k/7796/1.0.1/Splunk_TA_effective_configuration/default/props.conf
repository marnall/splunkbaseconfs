
[source::...(/|\\)var(/|\\)log(/|\\)splunk(/|\\)effective_configuration.log(.\d+)?]
sourcetype = splunk:effective-configuration-add-on

[splunk:effective-configuration-add-on]
pulldown_type = true
description = Output produced by Splunk Add-on for Effective Configuration
category = Application
EVAL-log_level = upper(coalesce(log_level, level))
ANNOTATE_PUNCT = false
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD = 25
TZ = UTC
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%Z
TIME_PREFIX = {"level":"\w*","time":"
