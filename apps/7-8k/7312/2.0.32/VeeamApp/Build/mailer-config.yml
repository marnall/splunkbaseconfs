title: SIEM Splunk Plugin Build {{ env['BUILD_NUMBER'] }}
query: 
    SELECT [System.Id]
    FROM WorkItems
    WHERE 
      [System.TeamProject] = 'SIEM'
      AND 
      Veeam.Product.Build = '{{ env['BUILD_NUMBER'] }}'
      AND Microsoft.VSTS.Common.ResolvedBy != ''
    ORDER BY [System.Id] ASC
    
build_info: >-
    Build log: <a href="https://teamcity.rd.veeam.dev/buildConfiguration/Siem_Splunk_SendEmail/{{ env['BUILD_ID'] }}?buildTab=dependencies&mode=chain">https://teamcity.rd.veeam.dev/buildConfiguration/Siem_Splunk_SendEmail/{{ env['BUILD_ID'] }}?buildTab=dependencies&mode=chain</a>
    <br /> Build path: 
    <a href="file://amust.local/Products/Build/SIEM/Splunk/{{ env['BUILD_VERSION_MAJOR'] }}.{{ env['BUILD_VERSION_MINOR'] }}/{{ env['BUILD_NUMBER'] }}">
    \\amust.local\Products\Build\SIEM\Splunk\{{ env['BUILD_VERSION_MAJOR'] }}.{{ env['BUILD_VERSION_MINOR'] }}\{{ env['BUILD_NUMBER'] }}
    </a>
    <br /><b style='color:red;'> TBD count: {{ env['TBD_COUNT'] }} </b>
    <br /><b style='color:red;'> Copyrights missing: {{ env['IS_ADDED_COPYRIGHTS'] }} </b>
    <br /><b style='color:red;'> Non-ASCII characters in code: {{ env['IS_NONASCII_COMMENTS'] }} </b>

subject: "SIEM Splunk Plugin Build #{{ env['BUILD_NUMBER'] }}"
send_to: "{{ env['SEND_TO'] }}"