#
# Splunk app configuration file
#

[install]
is_configured = 0

[ui]
is_visible = 1
label = Veeam App

[id]
version = 2.0.32
name = VeeamApp

[launcher]
author = Veeam Software Group GmbH
description = Leveraging Veeam Event Forwarding capabilities, Veeam App includes monitoring and security dashboards, security alerts, and reports. The app integrates seamlessly with Splunk user roles and location management.
version = 2.0.32

[triggers]
reload.splunk_create = simple

[package]
check_for_updates = 1
id = VeeamApp

[deployment]
serverRoles = indexer_cluster,search_head_cluster