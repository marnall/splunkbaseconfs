
### DEFAULT MERAKI SOURCETYPES ###

[ccx_cisco_meraki_association]
search = sourcetype="meraki:accesspoints" meraki_event_type="association"

[ccx_cisco_meraki_bgp_alert]
search = (sourcetype="meraki:securityappliances") (meraki_event_type="bgp_received_notification" OR meraki_event_type="bgp_sent_notification")
# tags = alert

[ccx_cisco_meraki_dhcp_release]
search = sourcetype="meraki:securityappliances" meraki_event_type="dhcp_release"

[ccx_cisco_meraki_dhcp_renew_alert]
search = (sourcetype="meraki:securityappliances") ((meraki_event_type="dhcp6na_ren_*" OR meraki_event_type="dhcp6pd_ren_*") AND NOT meraki_event_type="*success*")
# tags = alert

[ccx_cisco_meraki_dhcp_renew_success]
search = (sourcetype="meraki:securityappliances") (meraki_event_type="dhcp6na_ren_success" OR meraki_event_type="dhcp6pd_ren_success")

[ccx_cisco_meraki_route_connection_change]
search = (sourcetype="meraki:securityappliances") (meraki_event_type="route_connection_change")

[ccx_cisco_meraki_disassociation]
search = sourcetype="meraki:accesspoints" meraki_event_type="disassociation"

[ccx_cisco_meraki_modem_reset]
search = (sourcetype="meraki:securityappliances") (meraki_event_type="modem_reset")

[ccx_cisco_meraki_packet_floodccx_cisco_meraki_packet_flood]
search = sourcetype="meraki:accesspoints" meraki_event_type="*packet_flood"

[ccx_meraki_switches_general_activity]
search = (sourcetype="meraki:switches") type IN ("cli_set_rad_parms", "mac_flap_detected", "8021x_eap_success")

[ccx_cisco_meraki_switches_alerts]
search = (sourcetype="meraki:switches") meraki_event_type="8021x_auth"
# tags = alert

[ccx_cisco_meraki_non_meraki_vpn]
search = (sourcetype="meraki:securityappliances") (meraki_event_type="non_meraki_vpn")

[ccx_cisco_meraki_vpn_connectivity_change]
search = (sourcetype="meraki:securityappliances") (meraki_event_type="vpn_connectivity_change")

[ccx_cisco_meraki_vpn_network_sessions]
search = (sourcetype="meraki:securityappliances") AND meraki_event_type="bgp_session*"
# tags = vpn network session

[ccx_cisco_meraki_web]
search = sourcetype="meraki:securityappliances" url="*"
# tags = web

[ccx_meraki_api_organizationsecurity_general_malware]
search = sourcetype="meraki:organizationsecurity" NOT (eventtype="ccx_meraki_api_organizationsecurity_ids" OR signature="Content filtering blocked URL")
# tags = attack malware

[ccx_meraki_api_organizationsecurity_ids]
search = (sourcetype="meraki:organizationsecurity") eventType="IDS Alert"
# tags = attack ids

[ccx_meraki_wpa_deauth]
search = (sourcetype="meraki:accesspoints" OR sourcetype="meraki:switches") AND meraki_event_type IN("wpa_deauth", "8021x_deauth")

[ccx_cisco_meraki_aps_association_reject]
search = sourcetype="meraki:accesspoints" meraki_event_type="aps_association_reject"

[ccx_cisco_meraki_security_appliances_network_traffic]
search = (sourcetype="meraki:securityappliances" OR sourcetype="meraki:accesspoints") meraki_event_type="nbar_block"
# tags = communicate network

[meraki_api_securityappliances_alerts]
search = sourcetype="meraki:securityappliances" AND meraki_event_type IN ("dhcp_problem", "dhcp_blocked", "martian_vlan", "failover_event", "ip_conflict", "cellular_*", "carrier_event")
# tags = alert

[meraki_api_securityappliances_events_dropped]
search = (sourcetype="meraki:securityappliances" OR sourcetype="meraki:switches") AND meraki_event_type IN ("events_dropped2")

[meraki_api_securityappliances_networksessions]
search = (sourcetype="meraki:securityappliances") AND meraki_event_type IN ("dhcp_lease")
#tags = dhcp network session


[meraki_api_accesspoints_alerts]
search = sourcetype="meraki:accesspoints" AND meraki_event_type IN("bcast_deauth_attack", "mac_spoofing_attack", "cli_set_rad*", "events_dropped2", "channel_scan", "carrier_event")

[meraki_api_accesspoints_change]
search = sourcetype="meraki:accesspoints" AND meraki_event_type IN("auto_rf_channel_change", "auto_tx_power_change", "dfs_event")
#tags = change


### MERAKI SC4S ###

[ccx_meraki_sc4s_alerts]
search = (sourcetype="ccx:meraki:sc4s:events") data_type="events" AND ("*8021x_auth*" OR "*martian_vlan*" OR "*8021x_eap_failure*" OR "*udld_alert*")
# tags = alert

[ccx_meraki_sc4s_batch_dns_host]
search = (sourcetype="ccx:meraki:sc4s:flows") data_type="flows"

[ccx_meraki_sc4s_general_activity]
search = (sourcetype="ccx:meraki:sc4s:events") data_type="events" type IN ("cli_set_rad_parms", "mac_flap_detected", "8021x_eap_success")

[ccx_meraki_sc4s_general_auth]
search = (sourcetype="ccx:meraki:sc4s:events") data_type="events" type IN ("radius_mac_auth")

[ccx_meraki_sc4s_general_network_activity]
search = (sourcetype="ccx:meraki:sc4s:events") data_type="events" type IN ("8021x_deauth", "disassociation", "association", "route_connection_change")

[ccx_meraki_sc4s_ids]
search = (sourcetype="ccx:meraki:sc4s:events") data_type="security_event" AND NOT disposition="malicious"
# tags = attack ids

[ccx_meraki_sc4s_malware]
search = (sourcetype="ccx:meraki:sc4s:events") data_type="security_event" AND disposition="malicious"
# tags = attack malware

[ccx_meraki_sc4s_network_sessions]
search = (sourcetype="ccx:meraki:sc4s:events") data_type="events" "*vpn_connectivity_change*"
# tags = network session vpn

[ccx_meraki_sc4s_network_traffic]
search = (sourcetype="ccx:meraki:sc4s:flows" OR sourcetype="ccx:meraki:sc4s:firewall") (data_type="ip_flow_*" OR data_type="l7_firewall")
# tags = communicate network

[ccx_meraki_sc4s_web]
search = (sourcetype="ccx:meraki:sc4s:urls" data_type="urls") OR (sourcetype="ccx:meraki:sc4s:events" url="*")
# tags = web
