####PARSE SOURCETYPES Cisco Meraki(SC4S)####
[ccx:meraki:sc4s:events]
REGEX = ^events|security_event\s+
FORMAT = sourcetype::ccx:meraki:sc4s:events
DEST_KEY = MetaData:Sourcetype

[ccx:meraki:sc4s:firewall]
REGEX = ^l7_firewall\s+
FORMAT = sourcetype::ccx:meraki:sc4s:firewall
DEST_KEY = MetaData:Sourcetype

[ccx:meraki:sc4s:flows]
REGEX = ^ip_flow_start|flows|ip_flow_end\s+
FORMAT = sourcetype::ccx:meraki:sc4s:flows
DEST_KEY = MetaData:Sourcetype

[ccx:meraki:sc4s:urls]
REGEX = ^urls\s+
FORMAT = sourcetype::ccx:meraki:sc4s:urls
DEST_KEY = MetaData:Sourcetype

############################################

[ccx_meraki_sc4s_data_type]
CLEAN_KEYS = 0
REGEX = ^(?<data_type>\w+).+

[ccx_meraki_sc4s_kvp]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \s+(\w+)\='?((?<=')[^\']+(?=')|[^\s]+)'?

[ccx_meraki_sc4s_malware_signature]
CLEAN_KEYS = 0
REGEX = (?:security_event)\s+(?<malware_signature>\w+)\s(?:url|signature)

[ccx_meraki_sc4s_message_request]
CLEAN_KEYS = 0
REGEX = (?:message\:\s+(?<message>.+))|(?:request\:\s+(?<request>.+))

[ccx_meraki_sc4s_web_extraction]
CLEAN_KEYS = 0
REGEX = .+(?:request\:\s+)(?<method>\w+)\s+(?<web_url>\w+\:\/\/.+)

