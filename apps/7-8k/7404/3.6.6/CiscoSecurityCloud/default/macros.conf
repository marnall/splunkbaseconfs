[csc_isovalent_all]
definition = sourcetype IN ("cisco:isovalent", "cisco:isovalent:alert", "cisco:isovalent:processConnect", "cisco:isovalent:processExec", "cisco:isovalent:telemetry:network", "cisco:isovalent:telemetry:process", "cisco:isovalent:edge_processor", "cisco:isovalent:edge_processor:alert", "cisco:isovalent:edge_processor:processConnect", "cisco:isovalent:edge_processor:processExec", "cisco:isovalent:edge_processor:telemetry:network", "cisco:isovalent:edge_processor:telemetry:process")
iseval = 0

[csc_isovalent_alert]
definition = sourcetype IN ("cisco:isovalent:alert", "cisco:isovalent:edge_processor:alert")
iseval = 0

[csc_isovalent_process_connect]
definition = sourcetype IN ("cisco:isovalent:processConnect", "cisco:isovalent:edge_processor:processConnect")
iseval = 0

[csc_isovalent_process_exec]
definition = sourcetype IN ("cisco:isovalent:processExec", "cisco:isovalent:edge_processor:processExec")
iseval = 0

[csc_isovalent_telemetry]
definition = sourcetype IN ("cisco:isovalent:telemetry:network", "cisco:isovalent:telemetry:process", "cisco:isovalent:edge_processor:telemetry:network", "cisco:isovalent:edge_processor:telemetry:process")
iseval = 0

[csc_isovalent_telemetry_network]
definition = sourcetype IN ("cisco:isovalent:telemetry:network", "cisco:isovalent:edge_processor:telemetry:network")
iseval = 0

[csc_isovalent_telemetry_process]
definition = sourcetype IN ("cisco:isovalent:telemetry:process", "cisco:isovalent:edge_processor:telemetry:process")
iseval = 0

# Macros for NVM (Network Visibility and Monitoring) searches

[nvm_sysdata_index]
definition = (index=main OR index="cisco_nvm_sysdata") sourcetype="cisco:nvm:sysdata:v2"
iseval = 0

[nvm_process_index]
definition = (index=main OR index="cisco_nvm_processinfodata") sourcetype="cisco:nvm:processinfodata:v2"
iseval = 0

[nvm_flowdata_index]
definition = (index=main OR index="cisco_nvm_flowdata") sourcetype="cisco:nvm:flowdata:v2"
iseval = 0

[nvm_combined_index]
definition = (index=main OR index="cisco_nvm_flowdata" OR index="cisco_nvm_processinfodata") (sourcetype="cisco:nvm:flowdata:v2" OR sourcetype="cisco:nvm:processinfodata:v2")
iseval = 0
