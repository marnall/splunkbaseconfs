EVAL-id_orig_h = replace(id_orig_h, "^\"|\"$", "")
EVAL-id_resp_h = replace(id_resp_h, "^\"|\"$", "")
EVAL-InitiatorIP = coalesce(SrcIP, InitiatorIP)
EVAL-InitiatorPort = coalesce(SrcPort, InitiatorPort)
EVAL-IntrusionRuleMessage = coalesce(Message, IntrusionRuleMessage)
EVAL-msg = coalesce(Message, msg)
EVAL-refs = split(replace(refs, "\"", ""), ",")
EVAL-ResponderIP = coalesce(DestIP, DstIP, ResponderIP)
EVAL-ResponderPort = coalesce(DstPort, ResponderPort)
EVAL-sid = coalesce(SID, SignatureID, sid)
