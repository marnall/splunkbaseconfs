TIME_PREFIX = "?(?:FirstPacketSecond|EventSecond|ts)"?\s*:\s*
LINE_BREAKER = ([\r\n]+)

TRANSFORMS-set_log_format = is_advanced_format, is_legacy_format

EXTRACT-extract_rec_type = (?:%FTD|%FMC)-\d+\-(?P<rec_type>\d{6}):
EXTRACT-extract_EventPriority = .+EventPriority\:\s*(?P<EventPriority>.[^,]+)
EXTRACT-extract_fields = ^(?P<event_sec>\d{4}-\d+-(?P<message_id>\d+)[\s+|T]\d+:\d+:\d+)
EXTRACT-extract_header_tag = (?<!\S)(?:\S*\.\S*\.\S*)\s+(?<header_tag>[\d\.]+|\w+)\s+(?=%FTD|FMC)
EXTRACT-extract_header_host = \b(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\s+(?P<header_host>\d{1,3}(?:\.\d{1,3}){3})

REPORT-json_format = report-json,report-json-kv-string,report-json-kv-numeric,report-json-kv-list
REPORT-syslog_auto_kv = syslog_auto_kv
REPORT-syslog_fields = cisco_asa_log_level_message_id
REPORT-syslog_user_agent = syslog_user_agent

EVAL-AC_RuleAction = coalesce(AccessControlRuleAction, AC_RuleAction)
EVAL-action = coalesce(AccessControlRuleAction, InlineResult, action)
EVAL-ClientApplication = coalesce(Client, ClientApplication)
EVAL-client_version = coalesce(client_version, replace(_raw, "^.*?\"client\.version\"\s*:\s*\"([^\"]+)\".*$", "\1"))
EVAL-dest_ip = coalesce(DstIP, DestIP)
EVAL-dest = coalesce(SrcIP, dest_ip)
EVAL-duration = coalesce(duration, tonumber(replace(_raw, "^.*?\"duration\"\s*:\s*(-?\d+(?:\.\d+)?).*$", "\1")))
