EVAL-app = case(message_id IN ("716039","113004","716001","113005","113012","113008","713198"), "VPN", message_id IN ("611101", "713166", "713167", "302016", "106012"), "ASA", message_id == "716002", "WebVPN", message_id IN ("110003", "405001") , "Firewall" , true(), app)
