[cisco:evm:process_activity]
INDEXED_EXTRACTIONS =
KV_MODE = json
# These mappings are dictated first and foremost by the Endpoint.Processes CIM dataset
# Only Process Activity: Launch is tagged for that dataset though
# Action appears to have a different interpretation depending on data model so we don't define a lookup
EVAL-action = case('action_id'==0, "unknown", 'action_id'==1, "allowed", 'action_id'==2, "blocked", 'action_id'==3, "observed", 'action_id'==4, "modified", 'action_id'==99, "other")
FIELDALIAS-dest = device.hostname as dest
# loaded_file is not reported by EVM yet
FIELDALIAS-original_file_name = process.file.internal_name as original_file_name
FIELDALIAS-os = device.os.version as os
FIELDALIAS-parent_process = process.parent_process.cmd_line AS parent_process
FIELDALIAS-parent_process_exec = process.parent_process.file.name AS parent_process_exec
FIELDALIAS-parent_process_guid = process.parent_process.cpid AS parent_process_guid
FIELDALIAS-parent_process_hash = process.parent_process.file.hashes{}.value AS parent_process_hash
FIELDALIAS-parent_process_id = process.parent_process.pid AS parent_process_id
FIELDALIAS-parent_process_name = process.parent_process.name AS parent_process_name
FIELDALIAS-parent_process_path = process.parent_process.file.path AS parent_process_path
FIELDALIAS-process = process.cmd_line AS process
FIELDALIAS-process_current_directory = process.working_directory AS process_current_directory
FIELDALIAS-process_exec = process.file.name AS process_exec
FIELDALIAS-process_guid = process.cpid AS process_guid
FIELDALIAS-process_hash = process.file.hashes{}.value AS process_hash
FIELDALIAS-process_id = process.pid AS process_id
FIELDALIAS-process_name = process.name AS process_name
FIELDALIAS-process_path = process.file.path AS process_path
LOOKUP-process_integrity_level = cisco_evm_integrity_id_lookup integrity_id AS process.integrity_id OUTPUT process_integrity_level
FIELDALIAS-user = process.user.name AS user
FIELDALIAS-user_id = process.user.uid AS user_id
FIELDALIAS-vendor_product = metadata.product.name AS vendor_product

[cisco:evm:file_activity]
INDEXED_EXTRACTIONS =
KV_MODE = json
# These mappings are dictated first and foremost by the Endpoint.Filesystem CIM dataset
# All Filesystem Activities are tagged for that dataset
# Prescribed values are "acl_modified, created, deleted, modified, read".
# OCSF updated (3) -> modified. OCSF Set Attributes (6) -> attributes_modified. OCSF Set Security (7) -> acl_modified. OCSF Get Attributes (8) -> attributes_read. OCSF Get Security (9) -> acl_read.
EVAL-action = case('activity_id'==0, "unknown", 'activity_id'==1, "created", 'activity_id'==2, "read", 'activity_id'==3, "modified", 'activity_id'==4, "deleted", 'activity_id'==5, "renamed", 'activity_id'==6, "attributes_modified", 'activity_id'==7, "acl_modified", 'activity_id'==8, "attributes_read", 'activity_id'==9, "acl_read", 'activity_id'==10, "encrypted", 'activity_id'==11, "decrypted", 'activity_id'==12, "mounted", 'activity_id'==13, "unmounted", 'activity_id'==14, "opened", 'activity_id'==99, "other")
FIELDALIAS-dest = device.hostname as dest
EVAL-file_access_time = 'time' / 1000
# Depending on the event type only one or both of the file/file_result fields are present
# Prioritize file_result as it is the newer state.
# Also, all values tend to be in file_result when that object is present
# All values tend to be in file when file_result is not present
# file_acl is not currently captured in EVM data
EVAL-file_create_time = coalesce('file_result.created_time', 'file.created_time') / 1000
EVAL-file_hash = coalesce('file_result.hashes{}.value', 'file.hashes{}.value')
EVAL-file_modify_time = coalesce('file_result.modified_time', 'file.modified_time') / 1000
EVAL-file_name = coalesce('file_result.name', 'file.name')
EVAL-file_path = coalesce('file_result.path', 'file.path')
EVAL-file_size = coalesce('file_result.size', 'file.size') / 1000
FIELDALIAS-image = actor.process.file.path AS image
FIELDALIAS-process_guid = actor.process.cpid AS process_guid
FIELDALIAS-process_id = actor.process.pid AS process_id
FIELDALIAS-process_name = actor.process.name AS process_name
FIELDALIAS-process_path = actor.process.file.path AS process_path
FIELDALIAS-process_exec = actor.process.file.name AS process_exec
FIELDALIAS-process_hash = actor.process.file.hashes{}.value AS process_hash
FIELDALIAS-process = actor.process.cmd_line AS process
FIELDALIAS-user = actor.process.user.name AS user
FIELDALIAS-vendor_product = metadata.product.name AS vendor_product

[cisco:evm:windows_service_activity]
INDEXED_EXTRACTIONS =
KV_MODE = json
# These mappings are dictated first and foremost by the Endpoint.Services CIM dataset
# All Windows Service Activities are tagged for that dataset
FIELDALIAS-dest = device.hostname as dest
# message doesn't strictly describe the service but it describes what was done to the service
FIELDALIAS-description = message as description
FIELDALIAS-process_guid = win_service.hosting_process.cpid AS process_guid
FIELDALIAS-process_id = win_service.hosting_process.pid AS process_id
FIELDALIAS-process_path = win_service.hosting_process.path AS process_path
FIELDALIAS-process = win_service.hosting_process.cmd_line AS process
# Note: Windows services have unique names and this is the name that we report in win_service.name
#       Therefore that field gets mapped to service (full service name), service_name (friendly name) and service_id (unique id)
FIELDALIAS-service = win_service.name AS service
FIELDALIAS-service_dll = win_service.service_dll_file.name AS service_dll
FIELDALIAS-service_dll_path = win_service.service_dll_file.path AS service_dll_path
FIELDALIAS-service_dll_hash = win_service.service_dll_file.hashes{}.value AS service_dll_hash
# Note: These will need to reference "signatures{}" with OCSF 1.8
EVAL-service_dll_signature_exists = if(isnotnull('win_service.service_dll_file.signature.state_id'), "true", "false")
EVAL-service_dll_signature_verified = if('win_service.service_dll_file.signature.state_id'==1, "true", "false")
FIELDALIAS-service_exec = win_service.service_file.name AS service_exec
FIELDALIAS-service_hash = win_service.service_file.hashes{}.value AS service_hash
FIELDALIAS-service_id = win_service.name AS service_id
FIELDALIAS-service_name = win_service.name AS service_name
FIELDALIAS-service_path = win_service.service_file.path AS service_path
# Note: These will need to reference "signatures{}" with OCSF 1.8
EVAL-service_signature_exists = if(isnotnull('win_service.service_file.signature.state_id'), "true", "false")
EVAL-service_signature_verified = if('win_service.service_file.signature.state_id'==1, "true", "false")
# 'win_service.service_start_type_id'==4, "manual" has an OCSF string rendering of "demand", but "manual" is the prescribed value in CIM docs
EVAL-start_mode = case('win_service.service_start_type_id'==0, "unknown", 'win_service.service_start_type_id'==1, "boot", 'win_service.service_start_type_id'==2, "system", 'win_service.service_start_type_id'==3, "auto", 'win_service.service_start_type_id'==4, "manual", 'win_service.service_start_type_id'==5, "disabled", 'win_service.service_start_type_id'==99, "other")
# This status field asks for the status of the services and gives prescribed values of "critical, started, stopped, warning"
# This roughly aligns with the activity_id values so thats what we map, which allows us to differentiate different service events and tag them all for Endpoint.Services
EVAL-status = case('activity_id'==0, "unknown", 'activity_id'==1, "created", 'activity_id'==2, "reconfigured", 'activity_id'==3, "started", 'activity_id'==4, "stopped", 'activity_id'==5, "paused", 'activity_id'==6, "continued", 'activity_id'==7, "deleted", 'activity_id'==99, "other")
# FIELDALIAS-user we do not currently report the user of the hosting process
FIELDALIAS-vendor_product = metadata.product.name AS vendor_product

[cisco:evm:registry_key_activity]
INDEXED_EXTRACTIONS =
KV_MODE = json
# These mappings are dictated first and foremost by the Endpoint.Registry CIM dataset
# All Windows Registry Key Activities are tagged for that dataset
EVAL-action = case('activity_id'==0, "unknown", 'activity_id'==1, "created", 'activity_id'==2, "read", 'activity_id'==3, "modified", 'activity_id'==4, "deleted", 'activity_id'==5, "renamed", 'activity_id'==6, "security_set", 'activity_id'==7, "restored", 'activity_id'==8, "imported", 'activity_id'==9, "exported", 'activity_id'==99, "other")
FIELDALIAS-dest = device.hostname as dest
FIELDALIAS-image = actor.process.file.path AS image
FIELDALIAS-process_guid = actor.process.cpid AS process_guid
FIELDALIAS-process_id = actor.process.pid AS process_id
FIELDALIAS-process_name = actor.process.name AS process_name
FIELDALIAS-process_path = actor.process.file.path AS process_path
FIELDALIAS-process_exec = actor.process.file.name AS process_exec
FIELDALIAS-process_hash = actor.process.file.hashes{}.value AS process_hash
FIELDALIAS-process = actor.process.cmd_line AS process
# EVM reports HKLM and HKU
EVAL-registry_hive = case(like('reg_key.path', "HKLM\\SAM"), "HKEY_LOCAL_MACHINE\\SAM", like('reg_key.path', "HKLM\\SAM\\%"), "HKEY_LOCAL_MACHINE\\SAM", like('reg_key.path', "HKLM\\SECURITY"), "HKEY_LOCAL_MACHINE\\Security", like('reg_key.path', "HKLM\\SECURITY\\%"), "HKEY_LOCAL_MACHINE\\Security", like('reg_key.path', "HKLM\\SOFTWARE"), "HKEY_LOCAL_MACHINE\\Software", like('reg_key.path', "HKLM\\SOFTWARE\\%"), "HKEY_LOCAL_MACHINE\\Software", like('reg_key.path', "HKLM\\SYSTEM"), "HKEY_LOCAL_MACHINE\\System", like('reg_key.path', "HKLM\\SYSTEM\\%"), "HKEY_LOCAL_MACHINE\\System", like('reg_key.path', "HKLM\\%"), "HKEY_LOCAL_MACHINE", like('reg_key.path', "HKU\\.DEFAULT"), "HKEY_USERS\\.DEFAULT", like('reg_key.path', "HKU\\.DEFAULT\\%"), "HKEY_USERS\\.DEFAULT", like('reg_key.path', "HKU\\%"), "HKEY_USERS")

FIELDALIAS-registry_path = reg_key.path AS registry_path
EVAL-registry_key_name = mvindex(split('reg_key.path', "\\"), -1)
# registry_value_data is not applicable for key activities
# registry_value_name is not applicable for key activities
# registry_value_text is not applicable for key activities
# registry_value_type is not applicable for key activities
EVAL-status = case('status_id'==0, "unknown", 'status_id'==1, "success", 'status_id'==2, "failure", 'status_id'==99, "other")
FIELDALIAS-user = actor.process.user.name AS user
FIELDALIAS-vendor_product = metadata.product.name AS vendor_product

[cisco:evm:registry_value_activity]
INDEXED_EXTRACTIONS =
KV_MODE = json
# These mappings are dictated first and foremost by the Endpoint.Registry CIM dataset
# All Windows Registry Value Activities are tagged for that dataset
# Prescribed values: "created, deleted, modified, read"
# OCSF Get (1) -> read, OCSF Set (2) -> created.
EVAL-action = case('activity_id'==0, "unknown", 'activity_id'==1, "read", 'activity_id'==2, "created", 'activity_id'==3, "modified", 'activity_id'==4, "deleted", 'activity_id'==99, "other")
FIELDALIAS-dest = device.hostname as dest
FIELDALIAS-image = actor.process.file.path AS image
FIELDALIAS-process_guid = actor.process.cpid AS process_guid
FIELDALIAS-process_id = actor.process.pid AS process_id
FIELDALIAS-process_name = actor.process.name AS process_name
FIELDALIAS-process_path = actor.process.file.path AS process_path
FIELDALIAS-process_exec = actor.process.file.name AS process_exec
FIELDALIAS-process_hash = actor.process.file.hashes{}.value AS process_hash
FIELDALIAS-process = actor.process.cmd_line AS process
# EVM reports HKLM and HKU
EVAL-registry_hive = case(like('reg_value.path', "HKLM\\SAM"), "HKEY_LOCAL_MACHINE\\SAM", like('reg_value.path', "HKLM\\SAM\\%"), "HKEY_LOCAL_MACHINE\\SAM", like('reg_value.path', "HKLM\\SECURITY"), "HKEY_LOCAL_MACHINE\\Security", like('reg_value.path', "HKLM\\SECURITY\\%"), "HKEY_LOCAL_MACHINE\\Security", like('reg_value.path', "HKLM\\SOFTWARE"), "HKEY_LOCAL_MACHINE\\Software", like('reg_value.path', "HKLM\\SOFTWARE\\%"), "HKEY_LOCAL_MACHINE\\Software", like('reg_value.path', "HKLM\\SYSTEM"), "HKEY_LOCAL_MACHINE\\System", like('reg_value.path', "HKLM\\SYSTEM\\%"), "HKEY_LOCAL_MACHINE\\System", like('reg_value.path', "HKLM\\%"), "HKEY_LOCAL_MACHINE", like('reg_value.path', "HKU\\.DEFAULT"), "HKEY_USERS\\.DEFAULT", like('reg_value.path', "HKU\\.DEFAULT\\%"), "HKEY_USERS\\.DEFAULT", like('reg_value.path', "HKU\\%"), "HKEY_USERS")
FIELDALIAS-registry_path = reg_value.path AS registry_path
EVAL-registry_key_name = mvindex(split('reg_value.path', "\\"), -1)
EVAL-registry_value_data = case('reg_value.type_id'==1 OR 'reg_value.type_id'==7, 'reg_value.reg_binary_data', 'reg_value.type_id'==2 OR 'reg_value.type_id'==3 OR 'reg_value.type_id'==8, 'reg_value.reg_integer_data', 'reg_value.type_id'==4 OR 'reg_value.type_id'==5 OR 'reg_value.type_id'==10, 'reg_value.reg_string_data', 'reg_value.type_id'==6, 'reg_value.reg_string_list_data{}')
FIELDALIAS-registry_value_name = reg_value.name AS registry_value_name
# same as registry_value_data
EVAL-registry_value_text = case('reg_value.type_id'==1 OR 'reg_value.type_id'==7, 'reg_value.reg_binary_data', 'reg_value.type_id'==2 OR 'reg_value.type_id'==3 OR 'reg_value.type_id'==8, 'reg_value.reg_integer_data', 'reg_value.type_id'==4 OR 'reg_value.type_id'==5 OR 'reg_value.type_id'==10, 'reg_value.reg_string_data', 'reg_value.type_id'==6, 'reg_value.reg_string_list_data{}')
