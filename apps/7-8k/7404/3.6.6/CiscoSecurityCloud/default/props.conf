[cisco:nvm:flowdata:v2]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)(?=\{)
TIME_PREFIX = "fss"\s*:\s*
TIME_FORMAT = %s
MAX_TIMESTAMP_LOOKAHEAD = 16
TRUNCATE = 999999
ANNOTATE_PUNCT = false
LEARN_SOURCETYPE = false
KV_MODE = json
CHARSET = UTF-8

EVAL-vendor_product = "Cisco Secure Client NVM"

## CIM-mapped field aliases for Flow data
FIELDALIAS-dp-for-nvm = dp AS dest_port
FIELDALIAS-sp-for-nvm = sp AS src_port
FIELDALIAS-da-for-nvm = da AS dest_ip
FIELDALIAS-sa-for-nvm = sa AS src_ip
FIELDALIAS-pn-for-nvm = pn AS process_name 
FIELDALIAS-app-for-nvm = pn AS app
FIELDALIAS-ph-for-nvm = ph AS process_hash
FIELDALIAS-ppn-for-nvm = ppn AS parent_process_name 
FIELDALIAS-obc-for-nvm = obc AS bytes_out 
FIELDALIAS-ibc-for-nvm = ibc AS bytes_in
FIELDALIAS-hm-for-nvm = hm AS http_method
FIELDALIAS-ht-for-nvm = ht AS uri_path
FIELDALIAS-pid-for-nvm = pid AS process_id
FIELDALIAS-ppath-for-nvm = ppath AS process_path
FIELDALIAS-ppid-for-nvm = ppid AS parent_process_id
FIELDALIAS-pppath-for-nvm = pppath AS parent_process_path
FIELDALIAS-puid-for-nvm = puid AS process_guid
FIELDALIAS-iid-for-nvm = iid AS src_interface
FIELDALIAS-pa-for-nvm = pa AS user
## End of CIM-mapped field aliases for Flow data

## Non-CIM mapped field aliases for Flow data
FIELDALIAS-fv-for-nvm = fv AS flow_version
FIELDALIAS-sa6-for-nvm = sa6 AS src_ipv6
FIELDALIAS-da6-for-nvm = da6 AS dest_ipv6
FIELDALIAS-dh-for-nvm = dh AS dest_hostname
FIELDALIAS-pph-for-nvm = pph AS parent_process_hash 
FIELDALIAS-fst-for-nvm = fst AS flow_start_time
FIELDALIAS-fss-for-nvm = fss AS flow_start_sec
FIELDALIAS-fsms-for-nvm = fsm AS flow_start_msec
FIELDALIAS-fet-for-nvm = fet AS flow_end_time
FIELDALIAS-fes-for-nvm = fes AS flow_end_sec
FIELDALIAS-fems-for-nvm = fems AS flow_end_msec
FIELDALIAS-hh-for-nvm = hh AS http_host
FIELDALIAS-liuid-for-nvm = liuid AS logged_in_user
FIELDALIAS-liuidp-for-nvm = liuidp AS logged_in_user_principal
FIELDALIAS-liuida-for-nvm = liuida AS logged_in_user_authority
FIELDALIAS-liuat-for-nvm = liuat AS logged_in_user_account_type
FIELDALIAS-puat-for-nvm = puat AS process_user_account_type
FIELDALIAS-ppa-for-nvm = ppa AS parent_process_account
FIELDALIAS-ppuat-for-nvm = ppuat AS parent_process_user_account_type
FIELDALIAS-mnl-for-nvm = mnl AS module_name_list
FIELDALIAS-mhl-for-nvm = mhl AS module_hash_list
FIELDALIAS-fsg-for-nvm = fsg AS flow_report_stage
FIELDALIAS-aliul-for-nvm = aliul AS additional_logged_in_user_list
FIELDALIAS-ds-for-nvm = ds AS flow_dns_suffix
FIELDALIAS-paa-for-nvm = paa AS process_account_authority
FIELDALIAS-pap-for-nvm = pap AS process_account_principal
FIELDALIAS-pparg-for-nvm = pparg AS parent_process_arguments
FIELDALIAS-parg-for-nvm = parg AS process_arguments
FIELDALIAS-pr-for-nvm = pr AS protocol_identifier
## End of non-CIM field aliases for Flow data

EVAL-src = if(isnull(sa),sa6,sa)
EVAL-dest = if(isnull(da),da6,da)
EVAL-bytes = obc+ibc
EVAL-transport = case(pr==6,"tcp",pr==17,"udp",pr==1,"icmp")
EVAL-action = "allowed"
EVAL-direction = case(fd==0,"inbound",fd==1,"outbound",true(),"unknown")
EVAL-process = ppath + " " + if(parg != "Unknown",parg,"")
EVAL-parent_process = pppath + " " + if(pparg != "Unknown",pparg,"")
EVAL-process_integrity_level = case(pil==0,"untrusted",pil==4096,"low",pil==8192,"medium", pil==8448, "medium high", pil==12288,"high",pil==16384,"system",pil==20480,"protected process",true(),"unknown")
EVAL-parent_process_integrity_level = case(ppil==0,"untrusted",ppil==4096,"low",ppil==8192,"medium", ppil==8448, "medium high", ppil==12288,"high",ppil==16384,"system",ppil==20480,"protected process",true(),"unknown")

LOOKUP-cisco_nvm_flowdata_fields_lookup = cisco_nvm_flowdata_fields_lookup key OUTPUTNEW value


