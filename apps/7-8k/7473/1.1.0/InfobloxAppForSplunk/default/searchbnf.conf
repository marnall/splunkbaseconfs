[infobloxtidelookup-command]
syntax =  infobloxtidelookup type="type" value="value of type" account_name="account_name"
description = This command provides details of TIDE lookup.
shortdesc = This command provides details of TIDE lookup.
example1 = | infobloxtidelookup type="ip" value="1.1.1.1" account_name=infoblox_account
comment1 = This command provides details of TIDE lookup with type and IP using infoblox_account.

[infobloxipamlookup-command]
syntax =  infobloxipamlookup filter="filter" account_name="account_name"
description = This command provides details of IPAM Lookup.
shortdesc = This command provides details of IPAM Lookup.
example1 = | infobloxipamlookup filter="address==1.1.1.1" account_name=infoblox_account
comment1 = This command provides details of IPAM Lookup with given filter using infoblox_account.

[infobloxdossierlookup-command]
syntax =  infobloxdossierlookup type="type" target="target value" account_name="account_name"
description = This command provides details from Dossier Lookup.
shortdesc = This command provides details from Dossier Lookup.
example1 = | infobloxdossierlookup type="ip" target="1.1.1.1" account_name=infoblox_account
comment1 = This command provides details of Dossier lookup using infoblox_account.

[infobloxsocinsights-command]
syntax =  infobloxsocinsights type="type" insight_id="Insight ID" account_name="account_name"
description = This command provides details of provided type for insight_id.
shortdesc = This command provides details of provided type for insight_id.
example1 = | infobloxsocinsights type="comments" insight_id="13b9578c-f824-4026-bb44-1ca8672f290e" account_name=infoblox_account
comment1 = This command provides details of comment for 13b9578c-f824-4026-bb44-1ca8672f290e.

[infobloxsocinsightsdetails-command]
syntax =  infobloxsocinsightsdetails type="type" account_name="account_name" insight_id="Insight ID"
description = This command retrieves insight details data using the specified type and insight_id from the indexed data if available. If not found, it will fetch the data from the platform via an API call.
shortdesc = This command provides details of provided type for insight_id.
example1 = | infobloxsocinsightsdetails type="comments" insight_id="13b9578c-f824-4026-bb44-1ca8672f290e" account_name=infoblox_account
comment1 = This command provides details of comment for 13b9578c-f824-4026-bb44-1ca8672f290e.

[infobloxnamedlist-command]
syntax =  infobloxnamedlist account_name="account_name"
description = This command provides details of Named Lists.
shortdesc = This command provides details of Named Lists.
example1 = | infobloxnamedlist account_name=infoblox_account
comment1 = This command provides details of Named Lists in infoblox_account.

[infobloxblockallowtool-command]
syntax =  infobloxblockallowtool action="action" named_list="Named List" value="value of IP/Domain" description="Description" account_name="account_name"
description = This command allows user to perform block or allow domain/IP corresponding to provided action and named_list.
shortdesc = This command allows user to perform block or allow domain/IP corresponding to provided action and named_list.
example1 = | infobloxblockallowtool action="allow" named_list="111111" value="1.1.1.1" account_name=infoblox_account
comment1 = This command will add the 1.1.1.1 IP in the allow list of 111111 named list.
