[Docker_container_images]
INDEXED_EXTRACTIONS = json
KV_MODE = none
AUTO_KV_JSON =false

[Docker_container_network]
TIME_PREFIX="Created":\s*
TIME_FORMAT=%s
INDEXED_EXTRACTIONS=json
KV_MODE=none
AUTO_KV_JSON=false
SHOULD_LINEMERGE=true
NO_BINARY_CHECK=true

[Docker_container_list]
TIME_PREFIX="Created":\s*
TIME_FORMAT=%s
INDEXED_EXTRACTIONS=json
KV_MODE=none
AUTO_KV_JSON=false
SHOULD_LINEMERGE=true
NO_BINARY_CHECK=true

[Docker_container_stats]
INDEXED_EXTRACTIONS = json
KV_MODE = none
AUTO_KV_JSON =false

[Docker_container_info]
AUTO_KV_JSON = 0
INDEXED_EXTRACTIONS = json
SHOULD_LINEMERGE = 0
TIME_PREFIX = SystemTime

[TA-docker-add-on-for-splunk]
SEDCMD-501 = s/("|')message("|'):\s*("|')501("|')/"message" : "Activation Key mismatch or invalid characters detected."/g
SEDCMD-502 = s/("|')message("|'):\s*("|')502("|')/"message" : "Trial License Expired"/g
SEDCMD-503 = s/("|')message("|'):\s*("|')503("|')/"message" : "Annual Key is Expired"/g 
SEDCMD-504 = s/("|')message("|'):\s*("|')504("|')/"message" : "Activation Key is mismatched"/g
