[getdiaginfo]
syntax = GETDIAGINFO FILENAME=<filename>
shortdesc = Retrieves diagnostic file details from a specified directory.
description = \
    This command lists diagnostic files in the specified directory, and if a filename is provided, it attempts to delete that file. The output includes information such as the hostname, UUID, submission date, and the file’s download options.
comment1 = \
    This example retrieves diagnostic file details from the default directory, or deletes a specified file if FILENAME is provided.
example1 = | getdiaginfo
example2 = | getdiaginfo filename="diag_host_1234_2024-11-20_12-30-00.tar.gz"
maintainer = jigar
usage = public
tags = diag, diagnostic, file_management


[setupdiag]
syntax = setupdiag url=<DNS/IP:post>
shortdesc = Used to set Deployment Server IP.
description = \
    This command used to set DS ip in diag.conf and put app in deployment-apps
example1 = | getdiaginfo
example2 = | getdiaginfo url="example.com:8089"
maintainer = ravi
usage = public
tags = diag, diagnostic, file_management


[requestdiag]
syntax = requestdiag server_list=<DNS/IP/Hostname/Servername>
shortdesc = Used to request diag for given commas seperated server_list.
description = \
    This command used to set request diag from any server/UFs which is connected with Deployment server
example1 = | requestdiag
example2 = | requestdiag server_list="example.com,192.168.0.1"
maintainer = ravi
usage = public
tags = diag, diagnostic, file_management
