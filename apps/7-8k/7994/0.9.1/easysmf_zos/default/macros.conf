[set_span(3)]
args = index, interval_value, host
definition = ```get count as well as max to ensure we get a result even if there is no actual value ```\
max($interval_value$) as interval count($interval_value$) where index="$index$" host IN ($host$)\
      | addinfo\
      | fillnull value=0 interval\
      | eval interval=round(interval/60,0)\
      | eval interval=if(interval>60, 60, interval)\
      ```round to a minute then convert back to seconds```\
      | eval search_range=round((min(info_max_time, info_search_time)-info_min_time)/60/60, 0)*60\
      | eval timechart_span=case(interval=0, "",\
      ```4 hours```\
      search_range <= 240, "span=".interval."m",\
      ```24 hours```\
      search_range <= 1440 AND interval < 10, "span=10m",\
      search_range <= 1440, "span=".interval."m",\
      ```48 hours```\
      search_range <= 2880, "span=1h",\
      ```14 days```\
      search_range <= 20160, "span=3h",\
      ```31 days```\
      search_range <= 44640, "span=6h",\
      true(), "minspan=".interval."m")\
      | eval mstats_span=case(interval=0, "span=auto",\
      ```4 hours```\
      search_range <= 240, "span=".interval."m",\
      ```24 hours```\
      search_range <= 1440 AND interval < 10, "span=10m",\
      search_range <= 1440, "span=".interval."m",\
      ```48 hours```\
      search_range <= 2880, "span=1h",\
      ```14 days```\
      search_range <= 20160, "span=3h",\
      ```31 days```\
      search_range <= 44640, "span=6h",\
      true(), "span=auto")\
      | eval span=case(interval=0, 0,\
      ```4 hours```\
      search_range <= 240, interval*60,\
      ```24 hours```\
      search_range <= 1440 AND interval < 10, 600,\
      search_range <= 1440, interval*60,\
      ```48 hours```\
      search_range <= 2880, 3600,\
      ```14 days```\
      search_range <= 20160, 10800,\
      ```31 days```\
      search_range <= 44640, 21600,\
      true(), 0)\
      | eval midinterval=span/2
iseval = 0
