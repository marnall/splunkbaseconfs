[Datalake IOC Collection]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = TA-datalake2splunk-v3
request.ui_dispatch_view = search
search = index=_internal sourcetype="tadatalake2splunk:log"\
| transaction datainput startswith="start" endswith="end"\
| eval count=coalesce(count,"0")\
| table _time datainput storage_type count filename data_index step duration

[Datalake - Build Datalake ASN lookup]
disabled = 1
action.email.show_password = 1
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
alert.track = 0
cron_schedule = 12 * * * *
dispatch.earliest_time = -24h
dispatch.latest_time = -0m
display.events.fields = ["host","source","sourcetype","src_asset","src_bunit","src_category","src_city","src_country"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = index=`datalake-index` atom_type=as\
	|  eval threat_types="[" + coalesce(threat_types," ")+ "]"\
	|  eval threat_scores="[" + coalesce(threat_scores," ") + "]"\
	|  eval sources="[" + coalesce(sources," ") + "]"\
	|  eval sighting_sources="[" + coalesce(sighting_sources," ") + "]"\
	|  eval tags="[" + coalesce(tags," ") + "]"\
	|  eval threat_entities= "[" + coalesce(threat_entities," ") + "]"\
	|  eval description=threat_types + threat_scores + sources + threat_entities\
	|  eval as = atom_value\
	``` To remove duplicated entries for some IOC``` \
	| stats latest(last_updated) latest(first_seen) latest(last_positive_sighting_timestamp) latest(sighting_sources) latest(sources) latest(tags) latest(threat_entities) latest(threat_hashkey) latest(threat_scores) latest(threat_types) latest(description) by atom_type atom_value as\
	| rename latest(*) as *\
	| table atom_type atom_value first_seen as last_positive_sighting_timestamp last_updated sighting_sources sources tags threat_entities threat_hashkey	threat_scores threat_types description\
	| outputlookup datalake_as

