[datalake_parser]
definition = eval threat_types = ltrim(threat_types,"[")\
| eval threat_types = rtrim(threat_types,"]")\
| eval threat_scores = ltrim(threat_scores,"[")\
| eval threat_scores = rtrim(threat_scores,"]")\
| eval tags = ltrim(tags,"[")\
| eval tags = rtrim(tags,"]")\
| eval sources = ltrim(sources,"[")\
| eval sources = rtrim(sources,"]")\
| eval threat_entities = ltrim(threat_entities,"[")\
| eval threat_entities = rtrim(threat_entities,"]")\
| eval sighting_sources = ltrim(sighting_sources,"[")\
| eval sighting_sources = rtrim(sighting_sources,"]")\
| eval threat_source=trim(split(sources,", "),"'")\
| eval threat_tag=trim(split(tags,", "),"'")\
| eval threat_type=trim(split(threat_types,", "),"'")\
| eval threat_score=trim(split(threat_scores,", "),"'")\
| eval threat_entity=trim(split(threat_entities,", "),"'")\
| eval threat_sighting_source=trim(split(sighting_sources,", "),"'")\
| eval malware_score = mvindex(threat_score,mvfind(threat_type,"malware"))\
| eval spam_score = mvindex(threat_score,mvfind(threat_type,"spam"))\
| eval scan_score = mvindex(threat_score,mvfind(threat_type,"scan"))\
| eval scam_score = mvindex(threat_score,mvfind(threat_type,"scam"))\
| eval hack_score = mvindex(threat_score,mvfind(threat_type,"hack"))\
| eval phishing_score = mvindex(threat_score,mvfind(threat_type,"phishing"))\
| eval fraud_score = mvindex(threat_score,mvfind(threat_type,"fraud"))\
| eval ddos_score = mvindex(threat_score,mvfind(threat_type,"ddos"))\
| fields - sources tags threat_entities threat_scores threat_types
iseval = 0

[inputlookup_all_datalake]
definition = inputlookup datalake_ip\
|inputlookup  append=true datalake_as\
|inputlookup append=true datalake_cc\
|inputlookup append=true datalake_crypto\
|inputlookup append=true datalake_phone\
|inputlookup append=true datalake_certificate\
|inputlookup append=true datalake_file\
|inputlookup append=true datalake_url\
|inputlookup append=true datalake_domain\
|inputlookup append=true datalake_email\
|inputlookup append=true datalake_ip_range
iseval = 0

[datalake_parser(1)]
args = description
definition = rex field=$description$ "\[(?<threat_types>[^\]]*)\]\[(?<threat_scores>[^\]]*)\]\[(?<sources>[^\]]*)\]\[(?<threat_entities>[^\]]*)\]$" \
| makemv delim=", " threat_types | makemv delim=", " threat_entities | makemv delim=", " sources | makemv delim=", " threat_scores\
| eval malware_score = mvindex(threat_scores,mvfind(threat_types,"malware"))\
| eval spam_score = mvindex(threat_scores,mvfind(threat_types,"spam"))\
| eval scan_score = mvindex(threat_scores,mvfind(threat_types,"scan"))\
| eval scam_score = mvindex(threat_scores,mvfind(threat_types,"scam"))\
| eval hack_score = mvindex(threat_scores,mvfind(threat_types,"hack"))\
| eval phishing_score = mvindex(threat_scores,mvfind(threat_types,"phishing"))\
| eval fraud_score = mvindex(threat_scores,mvfind(threat_types,"fraud"))\
| eval ddos_score = mvindex(threat_scores,mvfind(threat_types,"ddos"))\
| fields - threat_types, threat_scores, $description$
iseval = 0

[datalake-index]
definition = datalake
iseval = 0