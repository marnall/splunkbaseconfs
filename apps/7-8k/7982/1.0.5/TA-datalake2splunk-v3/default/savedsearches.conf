display.visualizations.charting.chart = line
display.visualizations.show = 0
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = index=`datalake-index` atom_type=as\
	|  eval threat_types=coalesce(threat_types," ")\
	|  eval threat_scores=coalesce(threat_scores," ")\
	|  eval sources=coalesce(sources," ")\
	|  eval tags=coalesce(tags," ")\
	|  eval threat_entities=coalesce(threat_entities," ")\
	|  eval description="[" + threat_types + "]" + "[" + threat_scores + "]" + "[" + sources + "]" + "[" + tags + "]"\
	| eval as = atom_value\
	\
	\
	``` To remove duplicated entries for some IOC``` \
	| stats latest(description) as description, latest(last_updated) as last_updated, latest(first_seen) as first_seen, latest(sources) as sources, latest(tags) as tags, latest(threat_entities) as threat_entities, latest(threat_hashkey) as threat_hashkey, latest(threat_scores) as threat_scores, latest(threat_types) as threat_types   by atom_type atom_value as\
	\
	| outputlookup  datalake_as

