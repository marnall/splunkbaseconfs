[datalake2splunkv3]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[source::...ta-datalake2splunk*.log*]
sourcetype = tadatalake2splunk:log

[source::...ta_datalake2splunk*.log*]
sourcetype = tadatalake2splunk:log

[datalake:indicators]
DATETIME_CONFIG = CURRENT
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = 1
SHOULD_LINEMERGE = 0
EXTRACT-datalake_fields = \[\'(?<atom_type>[^\']*)\', \'(?<atom_value>[^\']*)\', \'(?<first_seen>[^\']*)\', \'(?<last_updated>[^\']*)\', \'(?<threat_hashkey>[^\']*)\', \[(?<threat_types>[^\]]*)\], \[(?<threat_scores>[^\]]*)\], \[(?<sources>[^\]]*)\], \[(?<threat_entities>[^\]]*)\], \[(?<sighting_sources>[^\]]*)\], (?<last_positive_sighting_timestamp>[^\']*), \[(?<tags>.*)\]\]
EVAL-threat_source = trim(split(sources,", "),"'")
EVAL-threat_tag = trim(split(tags,", "),"'")
EVAL-threat_type = trim(split(threat_types,", "),"'")
EVAL-threat_score = trim(split(threat_scores,", "),"'")
EVAL-last_positive_sighting_timestamp = trim(last_positive_sighting_timestamp,"'")
EVAL-threat_entity = trim(split(threat_entities,", "),"'")
EVAL-sighting_source = trim(split(sighting_sources,", "),"'")
EVAL-malware_score = mvindex(trim(split(threat_scores,", "),"'"),mvfind(trim(split(threat_types,", "),"'"),"malware"))
EVAL-spam_score = mvindex(trim(split(threat_scores,", "),"'"),mvfind(trim(split(threat_types,", "),"'"),"spam"))
EVAL-scan_score = mvindex(trim(split(threat_scores,", "),"'"),mvfind(trim(split(threat_types,", "),"'"),"scan"))
EVAL-scam_score = mvindex(trim(split(threat_scores,", "),"'"),mvfind(trim(split(threat_types,", "),"'"),"scam"))
EVAL-hack_score = mvindex(trim(split(threat_scores,", "),"'"),mvfind(trim(split(threat_types,", "),"'"),"hack"))
EVAL-phishing_score = mvindex(trim(split(threat_scores,", "),"'"),mvfind(trim(split(threat_types,", "),"'"),"phishing"))
EVAL-fraud_score = mvindex(trim(split(threat_scores,", "),"'"),mvfind(trim(split(threat_types,", "),"'"),"fraud"))
EVAL-ddos_score = mvindex(trim(split(threat_scores,", "),"'"),mvfind(trim(split(threat_types,", "),"'"),"ddos"))