
[deepsecurity_antimalware_events]
color = et_blue
search = index=deepsecurity sourcetype=syslog sigid>=4000000 sigid<5000000

[deepsecurity_applicationcontrol_events]
color = et_green
search = index=deepsecurity sourcetype=syslog sigid >= 6000000 sigid<7000000

[deepsecurity_firewall_events]
color = et_magenta
search = index=deepsecurity sourcetype=syslog (sigid=21 OR sigid=22 OR (sigid>=100 AND sigid<=199))

[deepsecurity_integritymonitoring_events]
color = et_orange
search = index=deepsecurity sourcetype=syslog sigid >= 2000000 sigid<=2999999

[deepsecurity_intrusionprevention_events]
color = et_purple
search = index=deepsecurity sourcetype=syslog sigid >= 1000000 sigid<=1999999

[deepsecurity_loginspection_events]
color = et_red
search = index=deepsecurity sourcetype=syslog sigid=40 OR (sigid >= 3000000 sigid<=3999999)

[deepsecurity_webreputation_events]
color = et_sky
search = index=deepsecurity sourcetype=syslog sigid >= 5000000 sigid<=5999999
