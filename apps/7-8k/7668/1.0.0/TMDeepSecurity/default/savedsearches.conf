search = | pivot Trend_Micro_DS_Events TM_DS_Events count(TM_DS_Events) AS "Count of TM DS Events" SPLITROW act AS Action SPLITROW severity AS Severity SPLITROW tag AS Tag SPLITCOL sourcetype FILTER sigid >= 4000000 FILTER sigid < 5000000 SORT 100 act ROWSUMMARY 0 COLSUMMARY 0 NUMCOLS 100 SHOWOTHER 1

