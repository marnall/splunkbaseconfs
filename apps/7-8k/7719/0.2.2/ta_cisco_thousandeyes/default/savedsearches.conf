[thousandeyes_account_groups_update]
cron_schedule = */5 * * * *
description = Update account groups from index to thousandeyes_account_group
dispatch.earliest_time = -6m
dispatch.latest_time = now
enableSched = 1
realtime_schedule = 0
run_on_startup = true
search = `stream_index` OR `event_index` sourcetype="cisco:thousandeyes:account-group" | stats values(accountGroupName) as accountGroupName by aid, orgId | eval key_value = aid.orgId , key=md5(key_value) | table orgId, aid, accountGroupName, key | outputlookup thousandeyes_account_group key_field=key append=true
