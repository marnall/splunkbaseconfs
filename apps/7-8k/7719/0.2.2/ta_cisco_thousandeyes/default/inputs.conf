[test_traces_stream]
python.version = python3
index = default
related_paths = 0
sourcetype = cisco:thousandeyes:trace

[test_metrics_stream]
python.version = python3
index = default
interval = 300
related_paths = 0
sourcetype = cisco:thousandeyes:path-vis

[event]
python.version = python3
index = default
interval = 3600
sourcetype = cisco:thousandeyes:event

[activity_logs_stream]
python.version = python3
index = default
sourcetype = cisco:thousandeyes:activity

[thousandeyes_refresh_tokens]
python.version = python3

[thousandeyes_refresh_tokens://default]
python.version = python3
index = default
disabled = false
interval = 604800
account_refresh_sleep_interval = 60
dry_run = false

[monitor://$SPLUNK_HOME/var/log/splunk/thousandeyes_refresh_tokens.log]
python.version = python3
disabled = false
index = _internal
sourcetype = cisco:thousandeyes:refresh-tokens
