
[Zscaler_Proxy_General]
search = (sourcetype=zscalernss-web) url="*"
# tags = web performance proxy

[ccx_zscaler_zpa]
search = (sourcetype=zscalerlss-zpa-app) OR (sourcetype=zscalerlss-zpa-connector)
# tags = communicate end network performance session start vpn

[zscaler_proxy_authentication]
search = (sourcetype=zscalerlss-zpa-auth)
# tags = authentication

[zscaler_proxy_authentication_traffic]
search = (sourcetype=zscalerlss-zpa-auth) dest_ip="*" src_ip="*"
# tags = communicate network

[ccx_zscaler_proxy_dlp]
search = (sourcetype=zscalernss-web) NOT dlpengine="None"
# tags = dlp incident

[zscaler_proxy_ids]
search = (sourcetype=zscalernss-web) threatname!="None"
# tags = attack ids

[zscaler_proxy_malware_attack]
search = (sourcetype=zscalernss-web) file_hash="*" NOT (threatcategory="None" OR threatcategory="*Benign*" OR threatclass="Behavior Analysis" OR threatname="None" OR file_hash="None")
# tags = attack malware

[zscaler_proxy_malware_operations]
search = (sourcetype=zscalernss-web) NOT (threatname="None" OR threatcategory="None")
# tags = malware operations

[zscaler_proxy_network_session]
search = (sourcetype=zscalernss-web) dest_ip="*" src_ip="*" AND (duration>0 AND response_time>0)
# tags = network session

[zscaler_proxy_network_traffic]
search = (sourcetype=zscalernss-web) src_ip="*" NOT dest_ip="0.0.0.0"
# tags = communicate network
