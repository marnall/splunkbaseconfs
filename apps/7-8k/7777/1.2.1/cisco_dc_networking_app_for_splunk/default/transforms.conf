[cisco_dc_mso_extraction]
REGEX= (?<_KEY_1>\w+)=(?<_VAL_1>.*?(?=\s\w+=|$))
MV_ADD = true
CLEAN_KEYS = false
KEEP_EMPTY_VALS= true

[cisco_dc_aci_auth_extractions]
