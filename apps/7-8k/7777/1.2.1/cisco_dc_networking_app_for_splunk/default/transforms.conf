[extract_deviceconnector_connected_desc_fields]
REGEX = (?=.*\bdeviceConnected\b)"description":"DeviceConnector: \{\\\"IP\\\":\\\"(?<deviceconnector_ip>[^\"]+)\\\",\\\"Leadership\\\":\\\"(?<leadership>[^\"]+)\\\",\\\"Node\\\":\\\"(?<node>[^\"]+)\\\",\\\"Type\\\":\\\"(?<connection_type>[^\"]+)\\\"\}

