[nexus_dashboard_details_viewer]
display_location = both
eventtypes = cisco_dc_nd_anomalies
fields = anomalyId, endTs, insights_group, nd_host, startTs
label = Explore Anomaly Details on Nexus Dashboard Dashboard
link.method = get
link.target = blank
link.uri = https://$nd_host$//appcenter/cisco/nir/ui/#/detailsScreen/analyze?insightsGroupName=$insights_group$&endTs=$!endTs$&startTs=$!startTs$&filter=anomalyId:$anomalyId$
type = link


[nexus_dashboard_details_viewer_advisories]
display_location = both
eventtypes = cisco_dc_nd_advisories
fields = advisoryId, endTs, insights_group, nd_host, startTs
label = Explore Advisory Details on Nexus Dashboard Dashboard
link.method = get
link.target = blank
link.uri = https://$nd_host$//appcenter/cisco/nir/ui/#/detailsScreen/advisory?insightsGroupName=$insights_group$&endTs=$!endTs$&startTs=$!startTs$&filter=advisoryId:$advisoryId$
type = link
