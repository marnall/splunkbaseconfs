[cisco_nexus_dashboard]
python.version = python3
python.required = 3.9

[cisco_nexus_aci]
python.version = python3
python.required = 3.9

[cisco_nexus_9k]
python.version = python3
python.required = 3.9

[cisco_nexus_dashboard://advisories]
interval = 300
nd_advisories_category = *
nd_alert_type = advisories
nd_severity = *
nd_time_range = 4
disabled = 1

[cisco_nexus_dashboard://anomalies]
interval = 300
nd_alert_type = anomalies
nd_severity = *
nd_time_range = 4
nd_anomalies_category = *
disabled = 1

[cisco_nexus_dashboard://congestion]
interval = 300
nd_alert_type = congestion
disabled = 1

[cisco_nexus_dashboard://endpoints]
interval = 300
nd_alert_type = endpoints
nd_start_date = 1h
disabled = 1

[cisco_nexus_dashboard://flows]
interval = 300
nd_alert_type = flows
nd_flow_start_date = 1m
nd_time_slice = 5
disabled = 1

[cisco_nexus_dashboard://protocols]
interval = 300
nd_alert_type = protocols
nd_start_date = 1h
disabled = 1

[cisco_nexus_dashboard://mso_tenant_site_schema]
