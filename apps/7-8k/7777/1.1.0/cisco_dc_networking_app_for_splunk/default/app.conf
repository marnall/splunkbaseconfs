[launcher]
version = 1.1.0
description = Cisco DC Networking App for Splunk
author = Cisco Systems

[id]
version = 1.1.0
name = cisco_dc_networking_app_for_splunk

[install]
build = 81
is_configured = false
state = enabled

[package]
id = cisco_dc_networking_app_for_splunk
check_for_updates = true

[ui]
label = Cisco DC Networking App for Splunk
supported_themes = light, dark
is_visible = true

[triggers]
reload.cisco_dc_networking_app_for_splunk_settings = simple
reload.cisco_dc_networking_app_for_splunk_nd_account = simple
reload.cisco_dc_networking_app_for_splunk_aci_account = simple
reload.cisco_dc_networking_app_for_splunk_nexus_9k_account = simple
