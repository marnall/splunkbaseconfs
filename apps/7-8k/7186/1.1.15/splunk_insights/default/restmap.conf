
[eai:conf-ssef]     
capability.read=search
capability.write=search

[script:ai_insight_rest]
match = /aiinsight
script = ai_insight_rest.py
scripttype            = persist
handler               = application.AiInsightHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3
