
# ########## SSEF Framework Start ##########

# ssef Command Log
[source::...ssef.log]
TIME_PREFIX = ^
TIME_FORMAT = "%Y-%m-%d %H:%M:%S,%f"
MAX_TIMESTAMP_LOOKAHEAD = 23
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\n\r]+)(?=\d+.\d+)
sourcetype = ssef:log

[ssef:log]
KV_MODE = auto
EXTRACT-log_level = (?<log_level>(DEBUG|INFO|ERROR))
EXTRACT-pid = ssef\[(?<pid>\d+)

# dataexport Command Log
[source::...dataexport.log]
TIME_PREFIX = ^
TIME_FORMAT = "%Y-%m-%d %H:%M:%S,%f"
MAX_TIMESTAMP_LOOKAHEAD = 23
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\n\r]+)(?=\d+.\d+)
sourcetype = dataexport:log

[dataexport:log]
KV_MODE = auto
EXTRACT-log_level = (?<log_level>(DEBUG|INFO|ERROR))
LINE_BREAKER = ([\r\n]+)

# ########## SSEF Framework End ##########
