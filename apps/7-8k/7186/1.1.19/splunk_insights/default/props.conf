[source::.../updatesearchbaseconf.log]
sourcetype = updatesearchbaseconf:log
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S,%3N
MAX_TIMESTAMP_LOOKAHEAD = 23
SHOULD_LINEMERGE = true
LINE_BREAKER = ([\r\n]+)\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2},\d{3}

[updatesearchbaseconf:log]
category = Custom
# The following EXTRACT lines use regex with named capture groups to create fields.
EXTRACT-log_level = \d{3}\s+(?<log_level>\w+)\s+\[
EXTRACT-process_id = \[(?<process_id>\d+):
EXTRACT-thread_name = :(?<thread_name>[^\]]+)\]
EXTRACT-component = \]\s+(?<component>\S+)\s+-
EXTRACT-message = -\s+(?<message>.*)

