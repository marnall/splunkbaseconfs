[summary_sourcetypes_with_onboarding_issues]
search_name = Sourcetypes With Onboarding Issues
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 3.0.0
date_created = 2025-08-08
date_updated = 2026-1-28 12:39:28
category = Splunk
sub_category = _internal
tags = Data Quality,EFS,Indexing,Summary,_internal
solution = <p>Provides visibility into ingestion pipeline health by identifying how many sourcetypes are affected by parsing or processing errors.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate specific sourcetypes with errors.<br><b>2.</b> Review and correct source data formats.<br><b>3.</b> Tune line-breaking and timestamp extraction settings.<br><b>4.</b> Validate metric schema compliance.<br><b>5.</b> Monitor post-fix to confirm resolution.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (sourcetypes_impacted_with_quality_issues=0,1, sourcetypes_impacted_with_quality_issues<=3,2, sourcetypes_impacted_with_quality_issues<=5,3, sourcetypes_impacted_with_quality_issues<=10,4, sourcetypes_impacted_with_quality_issues>10,5)</code></pre><p>Add before the final <code>| table</code> to classify severity. More impacted sourcetypes = higher operational risk.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No impacted sourcetypes.</li><li><b>Low (Severity 2):</b> 1–3 impacted sourcetypes.</li><li><b>Medium (Severity 3):</b> 4–5 impacted sourcetypes.</li><li><b>High (Severity 4):</b> 6–10 impacted sourcetypes.</li><li><b>Critical (Severity 5):</b> More than 10 impacted sourcetypes.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal source="*splunkd.log*" ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve WARN/ERROR ingestion logs from targeted components.<br><b>02</b> <code>| stats dc(data_sourcetype) as sourcetypes_impacted_with_quality_issues</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct sourcetypes impacted.<br><b>03</b> <code>| eval severity_level = case (sourcetypes_impacted_with_quality_issues=0,1, sourcetypes_impacted_with_quality_issues<=3,2, sourcetypes_impacted_with_quality_issues<=5,3, sourcetypes_impacted_with_quality_issues<=10,4, sourcetypes_impacted_with_quality_issues>10,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity levels based on breadth of impact.<br><b>04</b> <code>| table sourcetypes_impacted_with_quality_issues severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output KPI and severity.<br>
explanation = <p>This search examines the <b>_internal</b> index for WARN/ERROR logs from core ingestion components like <b>AggregatorMiningProcessor</b>, <b>LineBreakingProcessor</b>, <b>DateParserVerbose</b>, <b>MetricSchemaProcessor</b>, and <b>MetricsProcessor</b>. It counts the distinct sourcetypes affected by these issues to provide a KPI for ingestion health. Elevated counts may indicate widespread parsing problems, delayed indexing, or malformed data. This KPI supports proactive ingestion pipeline monitoring and quick remediation to maintain data reliability.</p><p>For junior Splunkers, it highlights how to target specific ingestion components, filter on log levels, and track the breadth of impact across sourcetypes.</p>
quid = 4CB5DA97D23E18C4EAB1DA0B69354AAC
search_author = Splunk Searchbase Assistant
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/Troubleshooting/Cantfinddata" target="_blank">Troubleshooting Missing Data</a><br>Diagnose why expected events are not indexed.</li></ul>
severity_normal_text = <p>No sourcetypes are experiencing ingestion quality issues.</p>
severity_low_text = <p>Few sourcetypes affected; monitor and resolve as needed.</p>
severity_medium_text = <p>Moderate number of sourcetypes impacted; review ingestion configurations.</p>
severity_high_text = <p>High number of sourcetypes impacted; ingestion pipeline stability at risk.</p>
severity_critical_text = <p>Widespread ingestion issues across many sourcetypes; immediate action required.</p>
description = <p>This search is looking for any errors when ingesting data on the indexer & the indexer is having issues interpreting said data. The number of sourcetypes with data quality issues is displayed. Having data quality issues will persist for any search that hits that specific sourcetype which can result in incorrect interpretations or can result in inefficiencies which will result in the indexer consuming more resources and impacts queues.</p>
search = index=_internal source="*splunkd.log*" (component=AggregatorMiningProcessor OR component=LineBreakingProcessor OR component=DateParserVerbose OR component=MetricSchemaProcessor OR component=MetricsProcessor) TERM(AggregatorMiningProcessor) OR TERM(LineBreakingProcessor) OR TERM(DateParserVerbose) OR TERM(MetricSchemaProcessor) OR TERM(MetricsProcessor) (log_level=WARN OR log_level=ERROR) \
| eval summary_id="summary_sourcetypes_with_onboarding_issues" \
| stats dc(data_sourcetype) as sourcetypes_impacted_with_quality_issues values(event_message) as event_message \
| eval event_message = mvindex(event_message,0,20) \
| eval severity_level = case (sourcetypes_impacted_with_quality_issues=0,1, sourcetypes_impacted_with_quality_issues<=3,2, sourcetypes_impacted_with_quality_issues<=5,3, sourcetypes_impacted_with_quality_issues<=10,4, sourcetypes_impacted_with_quality_issues>10,5) \
| table sourcetypes_impacted_with_quality_issues event_message severity_level \
| `ssef_handle_no_results(1,"The summary_sourcetypes_with_onboarding_issues summary job completed successfully without identifying any issues, and everything is operating as expected.")`

