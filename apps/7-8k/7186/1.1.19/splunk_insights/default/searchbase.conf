solution = <p>Use this search to identify heavy users affecting platform performance and take corrective action as needed.</p><p><b>Suggested Actions</b><br>• Review dashboards used by top users for inefficiencies<br>• Limit dashboard refresh frequency or result size for heavy users<br>• Educate users on efficient search practices<br>• Apply resource-based role caps where appropriate</p><p><b>Recommended For You:</b><ul><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=resource+usage+dashboards" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps to enhance visibility into dashboard performance and user cost metrics.</li><li><a href="https://splunkbase.splunk.com/app/1465" target="_blank">Splunkbase: Keyword App</a><br>Helps correlate dashboard names with expensive SPL terms and usage patterns.</li><li><a href="https://splunkbase.splunk.com/app/742" target="_blank">Splunkbase: Splunk App for AWS</a><br>Useful for analyzing expense in cloud-based Splunk environments.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_scma_top_50_dashboards)`</code><br> - Pulls summary data from top dashboard activity.<br><b>02</b> <code>| fields _time label Splunk_Role name app user provenance weighted_expense_factor overall_expense_factor user_count search_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb severity_level role</code><br> - Selects only fields relevant to user behavior and resource usage.<br><b>03</b> <code>| stats latest(*) AS * latest(_time) as _time by label Splunk_Role app provenance</code><br> - Aggregates latest values for each dashboard group.<br><b>04</b> <code>| makemv delim="," user</code><br> - Ensures user field is treated as multivalue where applicable.<br><b>05</b> <code>| stats max(overall_expense_factor) as "Top Active Users by Resource Usage" by user</code><br> - Captures peak resource usage metric by user.<br><b>06</b> <code>| sort 50 - "Top Active Users by Resource Usage"</code><br> - Ranks the top 50 users by descending impact.</p>
explanation = <p>This search helps Splunk admins quickly identify which users are placing the greatest demand on Splunk infrastructure by calculating the maximum "overall_expense_factor" across dashboards. High values may indicate inefficient searches, resource-heavy dashboards, or misuse of shared environments. Understanding these patterns enables better dashboard design, user training, and tuning of resource limits. This data is key for IT Operations and Platform Engineering teams tasked with maintaining performance at scale.</p>
quid = 618EBB193B5A8AD2FD7573B847ABA070
search_author = khutchinson
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/search?q=overall_expense_factor" target="_blank">Splunk Help: Overall Expense Factor</a><br>Explains how expense factors are calculated and used in monitoring.</li><li><a href="https://lantern.splunk.com/Search?q=expensive+dashboards" target="_blank">Lantern: Expensive Dashboards</a><br>Strategies to reduce dashboard resource consumption.</li><li><a href="https://community.splunk.com/t5/Getting-Data-In/Monitoring-user-resource-usage/td-p/482279" target="_blank">Community: Monitoring User Resource Usage</a><br>Community suggestions on analyzing high-cost user activity.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=dashboard+performance" target="_blank">Splunk Docs: Dashboard Performance</a><br>Guidance for optimizing dashboard-based workflows.</li></ul>
description = <p>Ranks <b>top Splunk users</b> based on their <b>resource consumption</b> across top dashboards. Identifies users with the highest <b>overall expense factor</b> to prioritize optimization efforts.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.column
viz_options = {  "stackMode": "stacked", "backgroundColor": "transparent", "seriesColors": ["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"], "legendDisplay": "top", "xAxisTitleVisibility": "hide"  }
search = `ssef_summary(ssef_scma_top_50_dashboards)` \
| fields _time label Splunk_Role name app user provenance weighted_expense_factor overall_expense_factor user_count search_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb severity_level role \
| stats latest(*) AS * latest(_time) as _time by label Splunk_Role app provenance \
| makemv delim="," user\
| stats max(overall_expense_factor) as "Top Active Users by Resource Usage" by user\
| sort 50 - "Top Active Users by Resource Usage"

