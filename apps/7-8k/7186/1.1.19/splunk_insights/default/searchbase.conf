[ssef_scma_environment_dashboard_migration]
search_name = Detect HTML and Advanced XML Dashboards
readonly = 1
target_component = Infra & Arch
version = 1.0.1
date_created = 2022-09-14
date_updated = 2024-2-4 12:53:39
category = Splunk
sub_category = Dashboards
tags = Dashboards,Environment,REST,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = 59CB22731796FEB98117CDE98556E3DD
updated_author = akhamis
related_info = <div class="diag-content-box"><div class="diag-content"><a class="doc-drilldown" href="https://www.splunk.com/en_us/blog/tips-and-tricks/html-dashboards-deprecation.html" target="_blank">https://www.splunk.com/en_us/blog/tips-and-tricks/html-dashboards-deprecation.html</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div><div class="diag-content"><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/latest/ReleaseNotes/Deprecatedfeatures" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/ReleaseNotes/Deprecatedfeatures</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div></div>
severity_normal_text = <br/><p>No issues were found. The environment is free of old HTML or Advanced XML dashboards, so no additional steps are needed for migrating Summary Jobs. Everything looks good.</p>
severity_medium_text = <br/><p>We found old HTML or Advanced XML dashboards in the environment. Additional steps will be required to properly migrate Summary Jobs. We recommend addressing these to ensure a smooth migration.</p>
description = <p>This checks if the environment contains any old html or Advanced XML dashboards that requires additional steps to migrate.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/data/ui/views  \
| eval summary_id="ssef_scma_environment_dashboard_migration" \
| rename eai:acl.app As app, eai:acl.perms.read As acl_perms_read, eai:acl.perms.write As acl_perms_write, eai:acl.removable As acl_removable, eai:acl.sharing As sharing, eai:data As data, eai:type As type \
| search NOT app IN (system,trackme,config_explorer) \
| rex field=data max_match=0 "<module name=\"(?<advanced_xml_module>.*?)\"" \
| `ssef_instance_info(splunk_server)` \
| eval is_advanced_xml_dashboard = if(isnotnull(advanced_xml_module) AND app!="system", "yes", "no") \
| eval is_htlm_dashboard = if(type="html", "yes", "no") , type = if(is_advanced_xml_dashboard="yes", "advanced_xml", type) \
| where is_htlm_dashboard="yes" OR is_advanced_xml_dashboard="yes" \
| stats count(eval(type=="html")) AS num_htlm_dashboards count(eval(type=="advanced_xml")) AS num_advanced_xml_dashboards latest(name) as name values(type) as type by label, app \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_htlm_dashboards > 0 OR num_advanced_xml_dashboards > 0, medium, true(), normal ) \
| table label app name num_advanced_xml_dashboards num_htlm_dashboards type severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_environment_dashboard_migration summary job completed successfully without identifying any issues, and everything is operating as expected.")`

