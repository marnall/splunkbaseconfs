    [ search `ssef_summary(ssef_ia4s_users_account_modifications)` operation="create" \
    | fields _time dest_user \
    | rename dest_user as user \
    | stats count by user \
    | fields user ] \
| fields _time label app user session \
| eval session=split(session,"|") \
| bin _time span=1h \
| stats dc(session) as num_logins by _time label app user \
| makecontinuous _time span=1h \
| fillnull value=0 num_logins \
| eval hour=strftime(_time, "%H") \
| chart sum(num_logins) AS "New User Peak Usage Time" by hour user

