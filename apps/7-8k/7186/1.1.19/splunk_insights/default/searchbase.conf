[ssef_scma_data_hygiene_event_indexing]
search_name = Data Hygiene
readonly = 1
target_component = GDI & Data Hygiene
version = 1.0.3
date_created = 2022-09-14
date_updated = 2024-12-27 14:37:59
category = Splunk
sub_category = Indexing
tags = GDI,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 381E192E582583F84E1FE999AFE796A7
updated_author = akhamis
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Bestpracticesfordatahygiene" target="_blank">Splunk Docs - Best Practices for Data Hygiene</a></li>\
<li><a href="https://community.splunk.com/t5/Getting-Data-In/Data-hygiene-tips/td-p/412321" target="_blank">Splunk Answers - Data Hygiene Tips</a></li>\
</ul>
severity_normal_text = <br/><p>This search has returned a 'normal' status. There is nothing to worry about here unless you were expecting a different severity. If that is the case reach out to your Splunk Account team. More information may be added here to support this search result.</p>
severity_low_text = <br/><p>Minimal data hygiene issues detected, primarily with the AggregatorMiningProcessor indicating slight aggregation problems. While not immediately critical, it's advisable to review your data processing configurations to ensure optimal performance and prevent future issues.</p>
severity_medium_text = <br/><p>Moderate issues observed, particularly with the DateParserVerbose, indicating problems with date parsing that may affect data accuracy and searchability. Recommended to examine and correct date format handling in your indexing settings to maintain data integrity.</p>
severity_high_text = <br/><p>Significant line breaking issues detected by the LineBreakingProcessor, potentially leading to serious data formatting and ingestion problems. Immediate action is required to adjust line breaking settings to ensure data is correctly processed and searchable.</p>
description = <p>This check, which monitors for warnings about index-time settings that hinder the proper processing of recently ingested data, is vital for ensuring data quality and system performance. Inadequate index-time configurations can compromise data integrity, leading to inaccuracies that affect decision-making and system functionality. By addressing these issues proactively, organizations can maintain high data hygiene, preventing performance challenges and ensuring that the data remains reliable and valuable for operational and strategic purposes. This focus is crucial for optimizing system performance and maximizing the value derived from the data processed.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> Line breaking issues &gt; 10</li>\
<li><strong>Medium:</strong> Date parsing issues  &gt; 10</li>\
<li><strong>Low:</strong> Aggregation Issues &gt; 10</li>\
<li><strong>Normal:</strong> No impactful problems found.</li>\
</ul>
search = index=_internal sourcetype=splunkd component=LineBreakingProcessor OR (component=DateParserVerbose NOT FileClassifier) OR component=AggregatorMiningProcessor \
| eval summary_id="ssef_scma_data_hygiene_event_indexing" \
| rex "Context:\s+source[:=]{1,2}(?<data_source>[^\|]+)\|host[:=]{1,2}(?<data_host>[^\|]+)\|(?<data_sourcetype>[^\|]+)" \
| search NOT data_sourcetype IN (scma:*,splunk_*,splunkd_*,itsi_*,search_telemetry) \
| stats count AS warn_count count(eval(component=="AggregatorMiningProcessor")) AS aggregation_issues count(eval(component=="LineBreakingProcessor")) AS line_breaking_issues count(eval(component=="DateParserVerbose")) AS date_parsing_issues dc(data_host) AS data_hosts dc(data_source) AS data_sources latest(_time) as _time by data_sourcetype \
| rename data_sourcetype AS orig_sourcetype \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( aggregation_issues >=10 , low, date_parsing_issues >=10 , medium, line_breaking_issues >=10 , high, true(), normal ) \
| table _time orig_sourcetype warn_count data_hosts data_sources line_breaking_issues date_parsing_issues aggregation_issues severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_data_hygiene_event_indexing summary job completed successfully without identifying any issues, and everything is operating as expected.")`

