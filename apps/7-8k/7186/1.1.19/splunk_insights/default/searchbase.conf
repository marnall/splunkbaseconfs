[ssef_internal_splunkd_ui_access_tracker]
search_name = Hourly Knowledge Object Changes Tracker
readonly = 1
ssef_cron = hourly
target_component = Search & Visualization
version = 2.0
date_created = 2024-11-6 14:36:37
date_updated = 2025-10-18 18:52:19
category = Splunk
sub_category = Search
tags = Discovery,Knowledge Objects,Tracker
dispatch_earliest_time = -4h@h
dispatch_latest_time = -0h@h
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 39E60168E7C3C45D59EE3ECF4DEFF2FD
search_author = akhamis
updated_author = akhamis
description = <p>Tracks <b>knowledge object changes</b> performed via UI or REST by monitoring splunkd access logs. Captures create, modify, and delete operations across searches, dashboards, lookups, roles, users, and other configuration artifacts to support <b>governance auditing</b>.</p>
explanation = <p>This search analyzes splunkd access telemetry for POST and DELETE operations targeting configuration endpoints. It normalizes user and instance metadata, extracts knowledge object type and application context, distinguishes UI versus REST provenance, and aggregates the latest change metadata per object. The output provides structured visibility into configuration changes affecting saved searches, dashboards, macros, roles, users, data models, and field definitions. Monitoring this activity strengthens governance controls, change tracking, and security auditing across Splunk environments.</p>
execution_plan = <b>01</b> <code>index=_internal sourcetype IN (splunkd_ui_access,splunkd_access)</code><br> - Retrieve UI and REST modification events for the defined time window.<br><b>02</b> <code>| eval / rex normalization</code><br> - Decode knowledge object identifiers and classify object types.<br><b>03</b> <code>| extract app context</code><br> - Determine application scope from REST or manager paths.<br><b>04</b> <code>| `ssef_instance_info(Splunk_Instance)`</code><br> - Enrich with deployment metadata and role context.<br><b>05</b> <code>| stats ... by Knowledge_Object</code><br> - Summarize latest change activity per object for governance reporting.
solution = <p>This KPI provides visibility into configuration and knowledge object changes, supporting compliance validation and operational transparency.</p><p><b>Suggested Actions</b>: Review unexpected object changes, validate administrative privileges, enforce change management workflows, and monitor high-risk object types such as roles, users, and saved searches.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/monitor-splunk-enterprise/audit-splunk-enterprise-activity" target="_blank">Splunk Help: Audit Splunk Enterprise activity</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/manage-knowledge-objects/about-knowledge-objects" target="_blank">Splunk Help: About knowledge objects</a></li></ul>
viz_options = { "count":100 }
search = earliest=-4h@h latest=-0h@h (index=_internal sourcetype IN (splunkd_ui_access, splunkd_access) method IN (POST,DELETE) uri_path!="*/notify" uri IN ("*/saved/searches/*", "*/data/ui/views/*", "*/admin/macros/*", "*/saved/eventtypes/*", "*/data/lookup-table-files/*", "*/data/props/calcfields/*", "*/data/props/extractions/*", "*/data/props/fieldaliases/*", "*/data/props/lookups/*", "*/data/transforms/extractions/*", "*/data/transforms/lookups/*", "*/datamodel/model/*", "*/saved/sourcetypes/*", "*/authorization/roles/*", "*/authentication/users/*") NOT uri IN ("*/dispatch","*/splunk_app_infrastructure/*","*/__mlspl_*") NOT file IN ("_new","acl","remove_suppression","dispatch") ) NOT Rigor NOT "/_reload" \
| eval summary_id="ssef_internal_splunkd_ui_access_tracker" \
| fields _time host clientip file status uri user spent req_time sourcetype method \
| rename host AS Splunk_Instance , file AS Knowledge_Object , spent AS Duration , clientip AS Client_IP, status AS Change_Status , req_time AS Change_Time \
| eval user = lower(user) , Splunk_Instance = lower(Splunk_Instance) , user = if(user="nobody", "system", user), Change_Time = strptime(Change_Time, "%d/%b/%Y:%H:%M:%S.%3N %z") \
| `ssef_decode_field(Knowledge_Object)` \
| rex field=Knowledge_Object mode=sed "s/^.*(EVAL-|FIELDALIAS-|EXTRACT-|TRANSFORM-|LOOKUP-)//g" \
| eval Knowledge_Object_Type = case ( \
    match(uri, "saved\/searches"), "Reports_Alerts", \
    match(uri, "datamodel\/model"), "Data_Models", \
    match(uri, "saved\/eventtypes"), "Event_Types",\
    match(uri, "data\/props\/fieldaliases"), "Field_Aliases", \
    match(uri, "data\/props\/calcfields"), "Calculated_Fields", \
    match(uri, "data\/props\/extractions"), "Field_Extractions", \
    match(uri, "\/transforms\/extractions"), "Field_Transformations", \
    match(uri, "data\/lookup-table-files"), "Lookup_Table_Files", \
    match(uri, "data\/transforms\/lookups"), "Lookup_Definitions", \
    match(uri, "data\/props\/lookups"), "Automatic_Lookups", \
    match(uri, "data\/ui\/views"), "Dashboards", \
    match(uri, "\/macros\/"), "Macros", \
    match(uri, "saved\/sourcetypes"), "Sourcetypes",\
    match(uri, "authorization\/roles"), "Roles",\
    match(uri, "authentication\/users"), "Users",\
    true(), null()) \
| eval provenance = If(sourcetype="splunkd_ui_access", "UI", "REST") \
| `ssef_decode_field(uri)` \
| eval Knowledge_Object=if(match(uri,"\/disable$") OR match(uri,"\/move$"), uri, Knowledge_Object) \
| rex field=uri "\/(services|servicesNS)/\w+\/(?<app1>.*?)\/" \
| rex field=uri "\/(services|servicesNS)/splunk-system-user\/(?<app2>.*?)\/" \
| rex field=uri "\/manager\/(?<app3>.*?)\/" \
| eval app = mvappend(app1,app2,app3) \
| eval app=if(isnull(app) OR app="", "system", app) \
| search NOT app IN (splunk_app_infrastructure) \
| `ssef_instance_info(Splunk_Instance)` \
| stats VALUES(Splunk_Instance) AS Splunk_Instance , VALUES(role) AS role , LATEST(app) AS app , LATEST(Client_IP) AS Client_IP , LATEST(Change_Status) AS Change_Status , LATEST(Duration) AS Duration , LATEST(Change_Time) AS Change_Time , LATEST(provenance) AS provenance , LATEST(method) AS method , LATEST(uri) AS uri by _time label user Knowledge_Object_Type Knowledge_Object \
| foreach role, Splunk_Instance \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| dedup Knowledge_Object \
| eval severity_level=1 \
| table _time, label, role, Splunk_Instance, app, user, Client_IP, Knowledge_Object_Type, Knowledge_Object, Change_Status, Duration, Change_Time, provenance, method, uri , severity_level \
| `ssef_handle_no_results(1,"The ssef_internal_splunkd_ui_access_tracker summary job completed successfully without identifying any issues, and everything is operating as expected.")`

