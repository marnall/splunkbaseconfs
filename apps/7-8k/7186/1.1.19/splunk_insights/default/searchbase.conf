description = <p>Evaluates <b>role-based quota settings</b> using authorization summary data to identify excessively high search job or disk quotas. Supports <b>governance validation</b> and configuration hygiene for role-based access control.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>\
