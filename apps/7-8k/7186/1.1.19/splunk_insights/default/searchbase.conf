[summary_indexers_throttling_forwarders]
search_name = Indexer Throughput Limit
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 3.0.0
date_created = 2025-08-08
date_updated = 2026-1-28 12:30:16
category = Splunk
sub_category = _internal
tags = EFS,Indexer,Monitoring,Summary,Throughput
solution = <p>Enables proactive detection of ingestion slowdowns caused by indexer throughput limits.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate indexer hardware and network performance.<br><b>2.</b> Adjust <code>maxKBps</code> settings where appropriate.<br><b>3.</b> Review forwarder-to-indexer load balancing.<br><b>4.</b> Monitor ingestion rates and license usage.<br><b>5.</b> Consider scaling indexer tier or enabling adaptive load shedding.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (indexers_throttling_forwarders&lt;=2,1, indexers_throttling_forwarders&lt;=5,2, indexers_throttling_forwarders&lt;=10,3, indexers_throttling_forwarders&lt;=20,4, indexers_throttling_forwarders&gt;20,5)</code></pre><p>Add this logic before the final <code>| table</code> command to classify alert severity. <b>Adjust thresholds</b> to align with ingestion requirements and indexer capacity planning.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> 0–2 indexers throttling.</li><li><b>Low (Severity 2):</b> 3–5 indexers.</li><li><b>Medium (Severity 3):</b> 6–10 indexers.</li><li><b>High (Severity 4):</b> 11–20 indexers.</li><li><b>Critical (Severity 5):</b> More than 20 indexers throttling — urgent capacity intervention needed.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="splunkd" TERM(ThruputProcessor) data CASE(maxKBps)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve internal logs indicating throughput processing metrics.<br><b>02</b> <code>| rex "throughput\s\((?&lt;maxKBps&gt;\d+)"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extract maximum throughput (KBps) value from log text.<br><b>03</b> <code>| eval host=lower(host)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Normalize hostnames to lowercase for consistent grouping.<br><b>04</b> <code>| stats count AS throttle_event_count avg(maxKBps) AS avg_maxKBps by host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count throttling events and compute average throughput per host.<br><b>05</b> <code>| where throttle_event_count &gt; 10</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter to indexers experiencing more than 10 throttling events.<br><b>06</b> <code>| stats count as indexers_throttling_forwarders</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count affected indexers.<br><b>07</b> <code>| eval severity_level = case (indexers_throttling_forwarders&lt;=2,1, indexers_throttling_forwarders&lt;=5,2, indexers_throttling_forwarders&lt;=10,3, indexers_throttling_forwarders&lt;=20,4, indexers_throttling_forwarders&gt;20,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity level based on number of impacted indexers.<br><b>08</b> <code>| table indexers_throttling_forwarders severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Display count and severity classification.<br>
explanation = <p>This search inspects the <b>_internal</b> index for <b>splunkd</b> logs containing <b>ThruputProcessor</b> events with a <b>maxKBps</b> value. Using a <b>rex</b> extraction, it isolates the maximum throughput in kilobytes per second per host. Hosts are normalized to lowercase for consistent reporting.</p><p>The query counts throttle events per host, calculates average max throughput, and flags indexers exceeding <b>10 throttling events</b> in the search window. The final count represents the number of indexers throttling forwarders, which can be critical for ingestion reliability and performance.</p><p>For junior Splunkers, this showcases event filtering with <b>TERM()</b>, targeted regex field extraction, aggregation with <b>stats</b>, and multi-stage filtering for operational significance.</p>
quid = 959C503BA2988EB48A12B70E9270DD75
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>Few or no indexers are throttling forwarders; data ingestion is operating efficiently.</p>
severity_low_text = <p>Low number of indexers throttling forwarders; minimal impact on ingestion performance.</p>
severity_medium_text = <p>Moderate number of indexers throttling forwarders; monitor ingestion rates and indexing queues.</p>
severity_high_text = <p>High number of indexers throttling forwarders; ingestion delays likely, review indexing capacity.</p>
severity_critical_text = <p>Excessive indexers throttling forwarders; immediate action required to restore ingestion throughput.</p>
description = <p>This search looks at the indexers over a business week to understand how many indexers are starting to throttle forwarders due to a throughput limit being hit. The higher the count, the higher indication that bottleneck can cause downstream issues with data delivery.</p>
search = index=_internal sourcetype="splunkd" TERM(ThruputProcessor) data CASE(maxKBps) \
| eval summary_id="summary_indexers_throttling_forwarders" \
| rex "throughput\s\((?<maxKBps>\d+)" \
| eval host=lower(host) \
| stats count AS throttle_event_count avg(maxKBps) AS avg_maxKBps values(event_message) as event_message by host \
| where throttle_event_count > 10 \
| stats count as indexers_throttling_forwarders values(event_message) as event_message \
| eval event_message = mvindex(event_message,0,9) \
| eval severity_level = case (indexers_throttling_forwarders<=2,1, indexers_throttling_forwarders<=5,2, indexers_throttling_forwarders<=10,3, indexers_throttling_forwarders<=20,4, indexers_throttling_forwarders>20,5) \
| table indexers_throttling_forwarders event_message severity_level \
| `ssef_handle_no_results(1,"The summary_indexers_throttling_forwarders summary job completed successfully without identifying any issues, and everything is operating as expected.")`

