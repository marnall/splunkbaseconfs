[mc_near_critical_disk_usage]
search_name = Near-critical disk usage
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Infra & Arch
category = Health Check
sub_category = System and Environment
tags = Capacity,Disk,Health Check,Monitoring Console,Searches Skipped,Storage,Summary
solution = Check the data retention policies on the affected instances to ensure that the disk doesn't fill up. Alternatively, provision more disk space. You can also enable a platform alert for this condition. Go to the Monitoring Console's alert setup page and enable the "Near-critical Disk Usage" platform alert.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 5D4F12AED6EB44737607190C2630BA06
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_low_text = At least one partition, on at least one instance, was found with disk usage above 90%.
description = This checks the disk usage of partitions that Splunk Enterprise reads or writes to.
search = | rest `ssef_rest_target` `ssef_rest_timeout` /services/server/status/partitions-space \
| eval summary_id="mc_near_critical_disk_usage" \
| eval free = if(isnotnull(available), available, free) \
| eval usage = capacity - free \
| eval pct_usage = floor(usage / capacity * 100) \
| stats first(pct_usage) AS pct_usage by splunk_server, mount_point \
| eval severity_level = case (pct_usage < 90, 1, pct_usage >= 90, 2, True(), -1) \
| eval mount_info = if(isNull(pct_usage), "No disk information available", mount_point.": ".pct_usage."%") \
| stats values(mount_info) AS mount_information max(severity_level) AS severity_level by splunk_server \
| lookup local=true ssef_splunk_instance_info_lookup serverName AS splunk_server OUTPUT host_fqdn as machine  \
| eval machine = mvdedup(machine) \
| fields splunk_server machine mount_information severity_level \
| rename splunk_server AS instance\
| `ssef_handle_no_results(1,"The mc_near_critical_disk_usage summary job completed successfully without identifying any issues, and everything is operating as expected.")`

