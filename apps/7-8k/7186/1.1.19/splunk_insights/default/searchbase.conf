/blog/customers/harmonizing-digital-channels-and-business-operations-to-deliver-a-good-customer-experience.html">Splunk Blogs: Harmonizing Digital Channels and Business Operations to Deliver a Good Customer Experience</a></p><p>This blog post discusses the importance of integrating new digital tools and applications within the Splunk platform to harmonize business operations and enhance customer experience, thereby increasing the overall value provided to clients.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/customers/why-is-customer-success-so-important.html">Splunk Blogs: Why Is Customer Success So Important?</a></p><p>This article emphasizes the role of customer success in driving the adoption of new Splunk applications, highlighting how these tools can improve user experience and deliver greater value to customers.</p></li><li><p><a href="https://lantern.splunk.com/Platform_Data_Management/Optimize_Data">Drive More Value Through Data Source and Use Case Optimization</a></p><p>This presentation explores strategies for optimizing data sources and use cases within Splunk, discussing how the adoption of new applications can lead to improved user experience and increased customer value.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/devops/observability-to-modernize-apps-and-increase-business-resilience.html">Splunk Blogs: Observability to Modernize Apps and Increase Business Resilience</a></p><p>This blog post examines how adopting Splunks observability applications can modernize existing systems, enhance user experience, and boost business resilience, thereby providing significant value to customers.</p></li></ul>
description = <p>This search tracks <b>application creation, modification, and removal activity</b> across the environment. It provides visibility into <b>app lifecycle changes</b> and associated metadata. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_ia4s_apps_app_activities)` \
| fields _time label name app_name num_apps_created num_apps_modified num_apps_removed severity_level \
| bin _time span=1d \
| stats latest(*) as * by label, app_name \
| `ssef_splunkbase_apps(app_name)` \
| eval categories=split(categories,"|") \
| `ssef_technology(app_name,categories)` \
| stats latest(*) as * by label, app_name, categories \
| `ssef_app_categories(categories)` \
| stats latest(*) as * latest(_time) as _time values(Categories) as Categories values(Domain) as Domain values(label) as label by app_name \
| eval updated_time=trim(updated_time,".000000") \
| convert ctime(updated_time) \
| table app_name title uid app_version updated_time label Categories Domain

