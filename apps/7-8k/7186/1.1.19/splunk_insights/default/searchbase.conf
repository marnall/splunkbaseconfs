[threat_activity_logsource_breakdown]
search_name = Threat Activity LogSource Breakdown
readonly = 1
ssef_cron = weekly
target_component = Threat Intelligence
version = 1.0.8
date_updated = 2025-11-24 14:12:32
category = ES Adoption
sub_category = Security
tags = ES Adoption,Summary,Threat Intelligence
dispatch_earliest_time = -30d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 4E75B14869AE542EB6D6BCD0FB21ED4E
search_author = dluxton
updated_author = akhamis
severity_medium_text = <br/><p>More than 80 percent of all threat matching events have been genrated from src matching. </p>\
<p>Recommended to subscribe firewalls and other perimeter security controls to the threat feeds to block traffic from known bad sources. </p>
severity_high_text = <br/><p>One of the following criteria has been met:</p>\
<ul>\
<li>0 threat matching events observed over 30 day window</li>\
<li>On average, more than 50 daily threat match events occurred per ES analyst - this may indicate further tuning is required</li>\
</ul>
description = <p>Each event in the Threat_Intelligence datamodel is a single sighting which closely equates to a single notable event, or risk event. Large volumes of sightings are not sustainable. This search breaks down the number of sightings per log source &amp; field.</p>
search = | tstats summariesonly=false count from datamodel=Threat_Intelligence.Threat_Activity by Threat_Activity.threat_match_field Threat_Activity.orig_sourcetype \
| eval summary_id="threat_activity_logsource_breakdown" \
| `drop_dm_object_name(Threat_Activity)` \
| append \
    [| search `notable` \
    | stats dc(eval(if(owner!="unassigned",owner,null()))) as uniqueCountOfAnalysts \
    | eval uniqueCountOfAnalysts=if(uniqueCountOfAnalysts=0,1,uniqueCountOfAnalysts)] \
| eventstats sum(count) as total dc(threat_match_field) as uniq_field_matches sum(eval(if(match(threat_match_field,".*?src$"),count,null()))) as src_total values(uniqueCountOfAnalysts) as uniqueCountOfAnalysts \
| fillnull value=0 total \
| eval severity_level = case (\
    total=0 OR total/30/uniqueCountOfAnalysts>50,4,\
    src_total/total*100>80,3,\
    true(),1) \
| rename orig_sourcetype as sourcetype_name\
| table sourcetype_name src_total threat_match_field total uniq_field_matches uniqueCountOfAnalysts count severity_level \
| `ssef_handle_no_results(4,"WARNING: No threat matching events have been identified during this 30 day window")`

