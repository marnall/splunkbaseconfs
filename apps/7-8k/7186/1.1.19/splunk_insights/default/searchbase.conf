        [ eval title = if("<<FIELD>>"="author" OR "<<FIELD>>"="splunk_server" OR "<<FIELD>>"="app" OR "<<FIELD>>"="sharing" OR "<<FIELD>>"="title" OR "<<FIELD>>"="stanza" OR '<<FIELD>>'="", title, mvappend (title, "<<FIELD>>"." = ".'<<FIELD>>'." ")) ] \
    | eval Splunk_Instance = lower(splunk_server), title = mvjoin(title, "###") , config_file="workloads_categories.conf" \
    | fields Splunk_Instance config_file app sharing author stanza title updated ] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/workloads/pools \
    | rename eai:acl.app AS app \
    | rename eai:acl.sharing AS sharing \
    | fields - published id eai* null* \
    | `ssef_strptime_format(updated)` \
    | eval stanza = title \
    | fields title author splunk_server app sharing stanza ** \
    | eval author = if(author="nobody", "system", author) , title="[".title."]" \
    | foreach * \
        [ eval title = if("<<FIELD>>"="author" OR "<<FIELD>>"="splunk_server" OR "<<FIELD>>"="app" OR "<<FIELD>>"="sharing" OR "<<FIELD>>"="title" OR "<<FIELD>>"="stanza" OR '<<FIELD>>'="", title, mvappend (title, "<<FIELD>>"." = ".'<<FIELD>>'." ")) ] \
    | eval Splunk_Instance = lower(splunk_server), title = mvjoin(title, "###") , config_file="workloads_pools.conf" \
    | fields Splunk_Instance config_file app sharing author stanza title updated ] \
| `ssef_strptime_format(updated)` \
| `ssef_instance_info(Splunk_Instance)` \
| fields label role Splunk_Instance config_file app sharing author stanza title updated \
| makemv delim="###" title \
| mvexpand title \
| search title!="[*" \
| stats LAST(updated) AS updated, VALUES(Splunk_Instance) AS Splunk_Instance, VALUES(role) AS role \
    by label, app, sharing, author, config_file, stanza, title \
| eval _time = now() \
| foreach role, Splunk_Instance \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| eval is4s="summary" \
| append \
    [| search `ssef_summary(ssef_configs_conf_files)` earliest=-1d@d \
    | foreach Splunk_Instance, role, acl_perms_* \
        [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
    | stats\
        values(*) as * \
        LATEST(_time) AS _time\
        by label, app, sharing, author, config_file, stanza, title \
    | table _time, label, role, Splunk_Instance, config_file, app, sharing, author, stanza, title, updated \
    | outputlookup ssef_configs_conf_files_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | stats count as num_items \
    | eval is4s="lookup" ] \
| where is4s="summary" \
| table _time, label, role, Splunk_Instance, config_file, app, sharing, author, stanza, title, updated, severity_level \
| `ssef_handle_no_results(1,"The ssef_configs_conf_files summary job completed successfully without identifying any issues, and everything is operating as expected.")`

