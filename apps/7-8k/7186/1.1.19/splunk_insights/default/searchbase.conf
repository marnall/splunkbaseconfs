quid = 1F9350763E345B93A5E412310F0B4588
updated_author = akhamis
description = <p>This check reviews the status of your Splunk forwarders over the past 72 hours to determine if any are running on unsupported versions or are close to reaching the end of their support period. By identifying forwarders that are outdated or nearing the end of support, this process ensures that you can plan for necessary upgrades and maintain compliance with current technology standards. Keeping forwarders up-to-date is crucial for security, compatibility, and optimal performance, helping prevent potential vulnerabilities and ensuring that your data collection infrastructure remains robust and effective.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> Out of support.</li>\
<li><strong>Medium:</strong> < 1 Months remaining for support.</li>\
<li><strong>Low:</strong> < 7 Months remaining for support.</li>\
<li><strong>Normal:</strong> > More than 7 Months remaining for support.</li>\
</ul>
search = `ssef_summary(ssef_scma_forwarders_count_and_inventory)` \
| fields _time destPort version useACK fwdType message severity_level unique_forwarders total_forwarders events forwarder_cloud_versions forwarder_support_end_date_epoch heavy_forwarder_support_end_date months_remaining_in_support univeral_forwarder_full_support_end_date universal_forwarder_p3_support_end_date fwd_os fwd_arch unique_endpoints unique_endpoints_relaxed unique_sourcetypes unsupported_count ack_sum \
| fillnull value="other" destPort, version, fwdType, useACK \
| stats latest(*) as * latest(_time) as _time latest(severity_level) as severity_level by destPort, version, fwdType, useACK \
| sort - severity_level \
| `ssef_severity_level_text(severity_level)` \
| rename severity_text as Severity \
| convert ctime(_time) \
| table _time destPort version useACK fwdType message unique_forwarders heavy_forwarder_support_end_date months_remaining_in_support univeral_forwarder_full_support_end_date universal_forwarder_p3_support_end_date Severity

[ssef_scma_indexing_api_exports]
search_name = API Export Attempts
readonly = 1
target_component = Indexing
category = Splunk
sub_category = Indexing
tags = SCMA,Summary
dispatch_earliest_time = -14d@d
dispatch_latest_time = -0h@h
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 32989C867DD253C9906D63A2595973EE
related_info = <div class="diag-content-box"><div class="diag-content">This check does not have any related info. See description.</div></div>
severity_normal_text = <br/><p>The check results indicate you are compatible with the limit set in the "Splunk Cloud Service Description" and therefore a candidate for migration.</p>
severity_low_text = <br/><p>The check results indicate you may not be compatible with the limit set in the "Splunk Cloud Service Description" and therefore a candidate for migration.</p>
description = <p>The check detects potential data export activities from Splunk using the Splunk API or CLI command like curl or postman etc.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = index=_internal sourcetype=splunk_web_access NOT uri_path IN ("*/custom/*-ITSI-*") NOT method IN ("HEAD") \
| eval summary_id="ssef_scma_indexing_api_exports" \
| fields _time host useragent status method referer referer_domain bytes spent uri_path \
| regex useragent!="Mozilla/\S+ \([^\)]+\) (?:\S+ \([^\)]+\)|Gecko/\d+) \S+" \
| rex field=useragent "(?<Browser_and_Version>(MSIE|Trident|(?!Gecko.+)Firefox|(?!AppleWebKit.+Chrome.+)Safari(?!.+Edge)|(?!AppleWebKit.+)Chrome(?!.+Edge)|(?!AppleWebKit.+Chrome.+Safari.+)Edge|AppleWebKit(?!.+Chrome|.+Safari)|Gecko(?!.+Firefox))(?: |\/)([\d\.apre]+)|Splunk.*?\s|^Chrome.*|^Go-http.*|^Prometheus.*|^REST.*|^Ruby|^curl.*|^[pP]ython.*|^splunk.*|^AdvancedInstaller|^Microsoft.*|^Postman.*|^Vault.*|^go-resty.*)" \
| rex field=Browser_and_Version "(?<browser_name1>^.*?)/" \
| rex field=Browser_and_Version "(?<browser_name2>.*)" \
| rex field=Browser_and_Version "/(?<browser_version1>.*?)$" \
| rex field=Browser_and_Version "\s+(?<browser_version2>.*?)$" \
| rex field=useragent "Edg\/(?<browser_version3>.*?)$" \
| rex field=useragent "(Version/|iPhone\sOS\s)(?<Safari_Version>.*?)\s" \
| rex field=useragent "(?<os_arch>(Win64|x86_64))" \
| rex field=useragent "(?<os_name>(Linux|Macintosh|Windows\s*\w+|iPhone|iPad))" \
| rex field=useragent "(Linux\s|Macintosh;\s|i\w+;\s|Windows\sNT\s)(?<os_version>.*?)[;)]" \
| eval browser_name = coalesce(browser_name1,browser_name2), browser_name = if(match(useragent, "Edg\/\d+"), "Microsoft Edge", browser_name), browser_name = if(match(browser_name, "Trident|MSIE"), "Internet Explorer", browser_name), browser_version = coalesce(browser_version1,browser_version2), browser_version = if(isnotnull(Safari_Version), Safari_Version, browser_version), browser_version = if(browser_name = "Microsoft Edge", browser_version3, browser_version), os_name = case ( match(useragent,"Windows NT 6.1"), "Windows 7", match(useragent,"Windows NT 6.2"), "Windows 8", match(useragent,"Windows NT 6.3"), "Windows 8.1", match(useragent,"Windows NT 10.0"), "Windows 10", match(useragent,"Pixel"), "Google Pixel", match(useragent,"Android"), "Android", true(), os_name ) \
| fields - browser_name1 browser_name2 browser_version1 browser_version2 browser_version3 Browser_and_Version \
| `ssef_instance_info(host)` \
| fillnull value=0 bytes spent \
| fillnull value="other" browser_name browser_version \
| stats count as num_events sum(bytes) as data_transfer_bytes sum(spent) as spent_seconds values(os_version) as os_version values(name) as name values(label) as label dc(referer_domain) as num_referer_domains values(browser_version) as browser_version values(method) as method by os_name browser_name status \
| rename status as export_status \
| eval os_version=mvjoin(os_version, ":") , browser_version=mvjoin(browser_version, ":") , method=mvjoin(method, ":") , name=mvjoin(name, ":"),  label=mvjoin(label, ":") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_events > 0, low, true(), normal ) \
| table label name os_name browser_name export_status num_events data_transfer_bytes spent_seconds os_version num_referer_domains browser_version method severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_api_exports summary job completed successfully without identifying any issues, and everything is operating as expected.")`

