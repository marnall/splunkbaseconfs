[ssef_scma_indexing_summary_stats]
search_name = Indexing Summary Data Statistics by Summary Name
readonly = 1
target_component = Indexing
version = 1.0.1
date_created = 2022-09-14
date_updated = 2024-4-9 9:28:22
category = Splunk
sub_category = Clustering
tags = Indexes,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = FC50C61796959A6C203A62FD86523F22
updated_author = akhamis
related_info = <div class="diag-content-box">\
 <div class="diag-content"> \
 <li><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/9.2.0/Knowledge/Usesummaryindexing" target="_blank">Use Summary Indexing</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></li>\
 <li><a class="doc-drilldown" href="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://www.youtube.com/watch%3Fv%3DVdTWJBz8Lt4&ved=2ahUKEwjdxKiT-4-FAxWlHNAFHT_RCUUQwqsBegQIIxAF&usg=AOvVaw3EAZ_D_nxOMLp8xtk0zWIS" target="_blank">Video: Indexing </a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></li>\
 <li><a href ="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://lantern.splunk.com/Splunk_Platform/Product_Tips/Searching_and_Reporting/Using_summary_indexing_to_accelerate_searches&ved=2ahUKEwjdxKiT-4-FAxWlHNAFHT_RCUUQFnoECCYQAQ&usg=AOvVaw31BpFCqMyNNBIMUMwK6c_c" target="_blank">Using Summary Indexing to Accelerate Searches</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></li>\
 </div>\
 </div>
severity_normal_text = <br/><p>This search has returned information that indicates you are inline with acceptable health parameters as it pertains to indexing.</p>
severity_medium_text = <br/><p>The check results indicate you are above the recommended number of bucket counts that indicative of a healthy environment.</p>
severity_high_text = <br/><p>The check results indicate you are above the recommended number of bucket counts that indicate a healthy environment. Due to the High label set in this indicator it is recommended that you take tuning actions sooner than later.</p>
description = <p>Summary indexes enable you to efficiently search on large volumes of data. When you create a summary index you design a scheduled search that runs in the background, extracting a precise set of statistical information from a large and varied dataset.The check provides data model and report acceleration storage size usage information, bucket count and related indexes count by indexer cluster by summary type and summary name.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> > 500,000</li>\
<li><strong>Medium:</strong> 100,000-499,000</li>\
<li><strong>Normal:</strong> < 100,000</li>\
</ul>
search = | tstats summariesonly=true values(data.related_indexes) As related_indexes Max(data.related_indexes_count) As related_indexes_count Max(data.total_bucket_count) As total_bucket_count Max(data.total_size) As total_size_mb WHERE index=_introspection sourcetype=splunk_disk_objects By host data.type data.name \
| eval summary_id="ssef_scma_indexing_summary_stats" \
| rename "data.*" As * , name as summary_name, type as summary_type \
| `ssef_instance_info(host)` \
| where total_size_mb > 1 AND role="indexer" \
| rex field=related_indexes mode=sed "s/,/ /g" \
| makemv delim=" " related_indexes \
| stats sum(total_size_mb) as total_size_mb sum(total_bucket_count) as total_bucket_count values(related_indexes) as related_indexes dc(related_indexes) as related_indexes_count latest(name) as name by label summary_type summary_name \
| eval total_size_gb = round(total_size_mb / 1024 , 2) , total_size_mb = round(total_size_mb, 2) , related_indexes = mvjoin(related_indexes, ",") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( total_bucket_count >= 500000, high, total_bucket_count >= 100000, medium, true(), normal ) \
| table label name summary_type summary_name total_bucket_count total_size_mb total_size_gb related_indexes_count severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_summary_stats summary job completed successfully without identifying any issues, and everything is operating as expected.")`

