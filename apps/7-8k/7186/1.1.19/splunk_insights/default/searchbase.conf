[ssef_scma_apps_splunk_apps_vet_status]
search_name = App Status
readonly = 1
target_component = Apps and Add-ons
version = 2.0
date_created = 2022-09-14
date_updated = 2026-2-12 15:45:24
category = Splunk
sub_category = Apps
tags = Applications,Compliance,Governance,Vetting,Hybrid
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 70B2D2C9E0D2BD0D307FB0705D673104
updated_author = akhamis
severity_normal_text = <br/><p>There were no issues identified with this check. The information, however, is useful to determine what apps you need to migrate based on usage patterns.</p>
severity_low_text = <br/><p>There were issues identified with this check. This poses a low threat to the health of your migration. Please address the issues indicated and run the assessment again. This will need to be addressed to ensure the success of your migration.</p>
severity_medium_text = <br/><p>Several installed applications require further review or action prior to migration to Splunk Cloud.</p>
description = <p>This search summarizes the <b>vetting status of Splunk applications</b> using SCMA data and highlights severity conditions by message. It provides visibility into <b>application compliance and approval posture</b> across the environment.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> The number of installed apps is exceeding 250.</li>\
<li><strong>Medium:</strong> The number of installed apps is approaching 250.</li>\
<li><strong>Normal:</strong> The number of installed apps is less than 200.</li>\
</ul>
explanation = <p>This search evaluates Splunk application vetting status by aggregating SCMA summary data and grouping results by status message. It calculates the number of distinct apps associated with each vetting condition and prioritizes output by severity level. Governance and security teams can use this to identify non-compliant, outdated, or unapproved applications that may introduce operational or compliance risk. By surfacing severity alongside version information, the search supports risk-based prioritization and strengthens application lifecycle oversight.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_scma_apps_splunk_apps_vet_status)`</code><br> - Load SCMA summary data containing application vetting and compliance status.<br><b>02</b> <code>| stats latest(*) as * dc(appid) as num_apps ... by message</code><br> - Aggregate latest application state and count distinct apps per vetting message.<br><b>03</b> <code>| sort - severity_level</code><br> - Prioritize higher-severity compliance conditions for visibility.<br><b>04</b> <code>| `ssef_severity_level_text(severity_level)`</code><br> - Translate numeric severity into descriptive text for governance reporting.<br><b>05</b> <code>| table ...</code><br> - Present a concise compliance summary including version and severity context.
solution = <p>This search delivers a structured overview of <b>Splunk application vetting and compliance posture</b>.</p><p><b>Suggested Actions</b></p><ul><li>Investigate applications flagged with elevated severity or non-compliant status messages.</li><li>Validate that installed versions align with approved and vetted releases.</li><li>Establish periodic review cycles for third-party and custom app compliance.</li><li>Remove or remediate unapproved applications to reduce governance risk.</li></ul><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Advisory services to strengthen application governance and compliance practices.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Centralized controls to manage and monitor application lifecycle governance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=splunk%20app%20vetting%20compliance%20governance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps supporting compliance tracking and lifecycle oversight.</li></ul></p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Getting-Data-In/Managing-Multiple-Splunk-Apps/m-p/528967" target="_blank">Splunk Answers - Impact of Having Multiple Apps<li><a href="https://community.splunk.com/t5/Deployment-Architecture/Pros-and-Cons-of-Many-Splunk-Apps/m-p/486213" target="_blank">Splunk Community - Pros and Cons of Using Many Apps</a></li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=stats%20command" target="_blank">Splunk Docs: stats Command Search</a><br>Reference for aggregation functions used in vetting analysis (provisionally validated).</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=dc%20function" target="_blank">Splunk Docs: dc Function Search</a><br>Documentation for distinct count calculations in compliance reporting (provisionally validated).</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=severity%20level" target="_blank">Splunk Docs: Severity Level Search</a><br>Guidance for interpreting severity levels in governance contexts (provisionally validated).</li><li><a href="https://lantern.splunk.com/Search?q=application%20governance" target="_blank">Lantern: Application Governance Search</a><br>Operational insights for managing app compliance and lifecycle oversight (provisionally validated).</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Category</a><br>Apps supporting governance and administrative oversight use cases.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q="splunk%20app%20vetting"" target="_blank">Community: Splunk App Vetting Discussions</a><br>Community discussions related to app approval and compliance management (provisionally validated).</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_apps_local)` NOT app_name IN (`ssef_default_apps`,search,launcher,searchbase,splunk_insights) \
| eval summary_id="ssef_scma_apps_splunk_apps_vet_status" \
| stats latest(app_label) AS app_label latest(current_version) AS version latest(author) AS author latest(disabled) AS disabled values(details) latest(_time) as _time by app_name \
| stats count AS install_instance_count dc(version) values(version) AS installed_version values(app_label) values(author) values(disabled) latest(_time) as _time by app_name \
| rename values(*) AS * dc(*) AS dc_* app_name AS appid \
| lookup ssef_splunkbase_apps appid app_version AS installed_version OUTPUT local=t \
| `ssef_splunkbase_apps(appid)` \
| rex field=categories mode=sed "s/^\[|\]$|'|\s+//g" \
| eval categories=split(categories,","), product_compatibility=split(product_compatibility,", ") \
| stats values(*) as * latest(_time) as _time by appid \
| eval uid=mvdedup(uid), eos_eol_regex_pattern="(?i)\seol|end of life|\seos|end of support", latest_app_version=mvindex(all_app_versions, 0), latest_version_compatibility=mvjoin(mvdedup(split(latest_version_compatibility, ",")), ",") , categories=mvdedup(categories) , product_compatibility=mvdedup(product_compatibility) \
| eval app_type=case (\
    match(appid,"SplunkEnterpriseSecuritySuite|Splunk_DA-ESS_PCICompliance|^DA-ESS|^SA-\w+Protection|^SA-\w+Management|SA-UEBA|SA-ThreatIntelligence|SA-Utils|Splunk_SA_ExtremeSearch|DA-ITSI|itsi|SA-IndexCreation|SA-ITOA|SA-ITSI|SA-UserAccess|vmware_ta_itsi|Splunk_TA_ForIndexers"), "premium", \
    match(details, "apps.splunk.com"), "splunkbase", \
    isnotnull(latest_app_version), "splunkbase", \
    true(), "private") \
| eval message=case ( app_type="premium", "GOOD: App is premium and meets migration criteria; note, local customization will require additional review", match(description, eos_eol_regex_pattern) OR match(documentation, eos_eol_regex_pattern) OR match(is_archived, "(?i)true"), "ISSUE: The app has been marked as End of Life, End of Sale, or has been archived; further review is required", match(disabled, "1"), "ISSUE: At least one installation of this app is in disabled state; further review is required", dc_version > 1, "ISSUE: Multiple versions of the app found; further review is required", NOT match(version_compatibility, "9\.\d") AND match(latest_version_compatibility, "9\.\d"), "WARNING: App needs to be upgraded to gain Splunk 9.x support", isnull(passed_validation), "WARNING: No record of app passing AppInspect; further review is required", NOT match(version_compatibility, "9\.\d"), "WARNING: App is not Splunk 9.x certified; further review is required", true(), "GOOD: App meets migration criteria; note, local customization will require additional review") \
| eval app_class = case (match(appid, "_base$|_outputs$|_props$|_inputs$|_indexes$|_server$|TA-\w+_splunk|_limits$|_splunkcloud$|_deploymentclient$|_tuning$"), "Splunk Base Config Apps (Core)", \
    core=1 OR match(appid, "_cluster|SplunkForwarder|^search|splunk_metrics_workspace|SplunkLightForwarder|introspection_generator_addon|splunk_archiver|splunk_monitoring_console|launcher|splunk_gdi|user-prefs|alert_logevent|learned|splunk_httpinput|alert_webhook|legacy|splunk_instrumentation|appsbrowser|sample_app|splunk_internal_metrics|appwork"), "Splunk Core Apps (Core)", \
    match(appid, "SplunkEnterpriseSecuritySuite|Splunk_DA-ESS_PCICompliance|^DA-ESS|^SA-\w+Protection|^SA-\w+Management|SA-UEBA|SA-ThreatIntelligence|SA-Utils|Splunk_SA_ExtremeSearch"), "Splunk Enterprise Security Premium App", \
    match(appid, "DA-ITSI|itsi|SA-IndexCreation|SA-ITOA|SA-ITSI|SA-UserAccess|vmware_ta_itsi"), "Splunk IT Service Intelligence Premium App", \
    match(appid, "^Splunk_TA_") OR (match(appid, "^TA_|^TA-") AND match(details, "apps.splunk.com")), "Splunkbase Technology Add-ons (Core)", \
    match(appid, "^Splunk_SA_") OR (match(appid, "^SA_|^SA-") AND match(details, "apps.splunk.com")), "Splunkbase Solution Add-ons (Core)", \
    (match(appid, "viz|semicircle_donut") AND match(details, "apps.splunk.com")) OR (match(details, "apps.splunk.com") AND match(appid, "_app$")), "Splunkbase Visualizations (Core)",\
    match(details, "apps.splunk.com"), "Splunkbase Apps & Add-ons (Core)", \
    match(appid, "^TA_|^TA-"), "Custom Technology Add-ons (Core)",\
    match(appid, "^SA_|^SA-"), "Custom Solution Add-ons (Core)", \
    true(), "Custom Apps & Add-ons (Core)") \
| rex field=app_label mode=sed "s/=/<equals>/g" \
| eval categories=mvjoin(categories,","), product_compatibility=mvjoin(product_compatibility,",") \
| eval critical=5, high=4, medium=3, low=2, normal=1, severity_level = case ( match(message, "^ISSUE"), medium, match(message, "^WARNING"), low, true(), normal ) \
| table _time uid appid app_label categories app_type app_class product_compatibility installed_version latest_app_version message severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_apps_splunk_apps_vet_status summary job completed successfully without identifying any issues, and everything is operating as expected.")`

