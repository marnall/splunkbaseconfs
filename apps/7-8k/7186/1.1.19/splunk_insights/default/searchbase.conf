dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 0525C13FA939641A11AACDD9D0972D75
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://dev.splunk.com/enterprise/docs/devtools/python/sdk-python/pythoneol/" target="_blank">Python 2 End-of-Life Statement</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Python3migration/" target="_blank">Splunk Docs - Python 3 Migration in Splunk</a></li>\
<li><a href="https://community.splunk.com/t5/Deployment-Architecture/Migrating-Python-2-to-Python-3-in-Splunk/m-p/513321" target="_blank">Splunk Answers - Migrating Python 2 to Python 3 in Splunk</a></li>\
<li><a href="https://splunkbase.splunk.com/app/4930/" target="_blank">Splunkbase - Python Upgrade Readiness App</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/AdvancedDev/CustomPythoncommands" target="_blank">Splunk Docs - Custom Python Commands and Scripts</a></li>\
</ul>
severity_normal_text = <br/><p>No Python V2 commands were found running in your environment.</p>
severity_medium_text = <br/><p>We have found Python version 2 used in search commands.</p>
description = <p>This check identifies the use of Python Version 2 commands within the Splunk environment, which poses significant risks in terms of security, compatibility, and long-term sustainability. It is strongly recommended to migrate to Python Version 3 to ensure ongoing support and enhance both compatibility and security in Splunk deployments. Identifying and updating Python Version 2 commands is a crucial step towards maintaining a robust and future-proofed system, minimizing vulnerabilities and ensuring seamless functionality in the evolving technological landscape.<br></p>\
<p><strong>Severity Levels:</strong></p>\
<ul><li><strong>High:</strong> We found Python 2 in your Splunk Environment</li>\
<li><strong>Normal:</strong> We did not find Python 2 in your Splunk Environment.</li>\
</ul>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /services/data/commands  \
| eval summary_id="ssef_scma_search_commands_python" \
| rename eai:acl.* as * , python.version as python_version , title as command \
| fields splunk_server app command python_version chunked enableheader filename generates_timeorder generating is_order_sensitive is_risky local maxinputs outputheader overrides_timeorder pass_timezone passauth perf_warn_limit required_fields requires_preop requires_srinfo retainsevents run_in_preview stderr_dest streaming supports_getinfo supports_multivalues supports_rawargs type \
| search NOT app IN (`ssef_default_apps`) NOT (command IN (bucketdir,createrss,diff,erex,findtypes,gauge,gentimes,iconify,indextimerange,overlap,predict,rawstats,reltime,return,runshellscript,scrub,searchtxn,sendemail,streambag,trendline,windbag,x11,xmlkv,xmlunescape,xpath,oldreturn) AND app=search) \
| `ssef_instance_info(splunk_server)` \
| stats values(python_version) as python_version latest(name) as name by label, app, command \
| join label type=left \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/server/info f=splunk_server f=version \
    | rex field=version "(?<splunk_version>^\d+.\d+)" \
    | `ssef_instance_info(splunk_server)` \
    | fields label name splunk_version ] \
| eval python_version = if(isnull(python_version) OR python_version="" OR python_version="python2", "python2", python_version) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( isnull(python_version) OR python_version="" OR python_version="python2", medium, true(), normal ) \
| table label name app command python_version splunk_version severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_commands_python summary job completed successfully without identifying any issues, and everything is operating as expected.")`

