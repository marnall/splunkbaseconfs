[summary_skipped_searches]
search_name = Skipped Searches
readonly = 1
ssef_cron = weekly
target_component = Search & Visualization
version = 3.0.1
date_created = 2025-08-08
date_updated = 2026-1-28 12:36:13
category = Splunk
sub_category = _internal
tags = EFS,Performance,Scheduler,_internal
solution = <p>Highlights potential scheduler overload or conflicts that cause scheduled searches to be skipped.</p><p><b>Suggested Actions</b><br><b>1.</b> Review system load and search concurrency settings.<br><b>2.</b> Reschedule non-critical searches to off-peak times.<br><b>3.</b> Increase search concurrency limits if appropriate.<br><b>4.</b> Identify and optimize heavy searches.<br><b>5.</b> Monitor trends after changes to confirm improvement.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (avg_daily_skipped_searches_invocations=0,1, avg_daily_skipped_searches_invocations<=5,2, avg_daily_skipped_searches_invocations<=10,3, avg_daily_skipped_searches_invocations<=20,4, avg_daily_skipped_searches_invocations>20,5)</code></pre><p>Add before the final <code>| table</code> to classify severity. Higher averages indicate greater operational risk.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No skipped searches.</li><li><b>Low (Severity 2):</b> 1–5 skipped searches per day.</li><li><b>Medium (Severity 3):</b> 6–10 skipped searches per day.</li><li><b>High (Severity 4):</b> 11–20 skipped searches per day.</li><li><b>Critical (Severity 5):</b> More than 20 skipped searches per day.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="scheduler" status="skipped" search_type!="*acceleration"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve skipped scheduled searches excluding accelerations.<br><b>02</b> <code>| timechart partial=t fixedrange=t span=1d max(skipped_count) as avg_daily_skipped_searches_invocations</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Build daily timechart of maximum skipped counts.<br><b>03</b> <code>| stats avg(avg_daily_skipped_searches_invocations) as avg_daily_skipped_searches_invocations</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate average over the period.<br><b>04</b> <code>| eval avg_daily_skipped_searches_invocations=ceiling(avg_daily_skipped_searches_invocations)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Round up to nearest whole number.<br><b>05</b> <code>| eval severity_level = case (avg_daily_skipped_searches_invocations=0,1, avg_daily_skipped_searches_invocations<=5,2, avg_daily_skipped_searches_invocations<=10,3, avg_daily_skipped_searches_invocations<=20,4, avg_daily_skipped_searches_invocations>20,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity levels.<br><b>06</b> <code>| table avg_daily_skipped_searches_invocations severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output KPI and severity.<br>
explanation = <p>This search analyzes the <b>_internal</b> index for scheduler logs where status is <b>skipped</b> and the search type is not an acceleration. It builds a timechart of the maximum skipped count per day, averages this value, and rounds it up. Skipped searches may result in delayed or missing data for dashboards, alerts, and reports, so tracking this KPI helps detect and address scheduler performance issues early.</p><p>For junior Splunkers, this example shows how to aggregate over time using <b>timechart</b>, calculate averages with <b>stats</b>, and apply rounding functions for clean KPIs.</p>
quid = 73DAD3A1A2AE9F8D3D6CDA84B9662F82
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>No skipped scheduled searches detected.</p>
severity_low_text = <p>Low count of skipped searches; monitor for changes.</p>
severity_medium_text = <p>Moderate number of skipped searches; review scheduler performance.</p>
severity_high_text = <p>High number of skipped searches; system may be overloaded.</p>
severity_critical_text = <p>Severe scheduler bottlenecks; immediate action required to prevent data loss.</p>
description = <p>This search takes a look at the sum of skipped search invocations on a daily basis and then calculates an average value & outputs avg_daily_skipped_searches_invocations. Searches that get skipped can result in alerts not triggering & lookups not being populated.</p>
viz_options = { "count":100 }
search = index=_internal sourcetype="scheduler" status="skipped" search_type!="*acceleration" \
| eval summary_id="summary_skipped_searches" \
| timechart partial=t fixedrange=t span=1d max(skipped_count) as avg_daily_skipped_searches_invocations values(event_message) as event_message \
| stats avg(avg_daily_skipped_searches_invocations) as avg_daily_skipped_searches_invocations values(event_message) as event_message \
| eval avg_daily_skipped_searches_invocations=ceiling(avg_daily_skipped_searches_invocations) , event_message = mvindex(event_message,0,9) \
| eval severity_level = case (avg_daily_skipped_searches_invocations<=15,1, avg_daily_skipped_searches_invocations<=25,2, avg_daily_skipped_searches_invocations<=45,3, avg_daily_skipped_searches_invocations<=100,4, avg_daily_skipped_searches_invocations>100,5) \
| table avg_daily_skipped_searches_invocations event_message severity_level \
| `ssef_handle_no_results(1,"The summary_skipped_searches summary job completed successfully without identifying any issues, and everything is operating as expected.")`

