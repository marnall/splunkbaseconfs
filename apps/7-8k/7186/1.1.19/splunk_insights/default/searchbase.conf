[mc_unknown_ca_check]
search_name = Unknown Certificate Authority Certificates
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Upgrade Checks
version = 1.0.1
date_updated = 2025-8-18 14:43:59
category = Health Check
sub_category = Security
tags = Configuration,Health Check,Monitoring Console,SSL,Splunk 10,Summary,Upgrade
solution = Confirm that the Splunk platform instance has the 'sslRootCAPath' setting configured in the appropriate configuration file stanza. If no valid certificate authority (CA) certificate file exists in the certificate trust store, add one. If a CA certificate already exists in the trust store, verify that it is readable, using the 'splunk cmd openssl' CLI command where available. Confirm that all CA certificates contain the X.509 v3 basicConstraint field with a value of "CA:TRUE".
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 5D6F8C7B88004F17384E1AECBBEEC408
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because it could not find one or more valid certificate authority (CA) certificate(s) in the trust store to verify the certificate it was presented.
description = Evaluates for the presence of any TLS or SSL alerts which indicate that an unknown certificate authority (CA) certificate was encountered in the last hour, and marks as Critical if any are present.
search = index=_internal source=*splunkd.log* "Received fatal SSL3 alert" "alert_description='unknown CA'" earliest=-60m \
| eval summary_id="mc_unknown_ca_check" \
| stats count AS sixty_min_event_count by host \
| eval alerts = mvjoin(alerts, ", ") \
| eval severity_level = 3 \
| table host, sixty_min_event_count, severity_level \
| rename host as instance \
| table instance, sixty_min_event_count, severity_level \
| append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance sixty_min_event_count severity_level] \
| stats sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance \
| eval severity_level=if(severity_level=0, 1, severity_level) \
| `ssef_handle_no_results(1,"The mc_unknown_ca_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

