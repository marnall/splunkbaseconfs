severity_normal_text = <br/><p>The result of this search which looks at the number of search counts and active indexes are below the limits set for both Classic (400) and Victoria Platforms (1000). As a result the customer is compatible with the Splunk Cloud Service Description and therefore a candidate for migration.</p>
