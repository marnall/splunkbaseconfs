[notable_event_suppressions]
search_name = Notable Event Suppressions
readonly = 1
ssef_cron = weekly
target_component = Detections and Alerts
version = 1.1.0
date_updated = 2025-11-11 7:59:52
category = ES Adoption
sub_category = Security
tags = Detections and Alerts,ES Adoption,Summary
dispatch_earliest_time = -1mon
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 435B0056018FE5AFF357BD8B6827539D
search_author = dluxton
updated_author = akhamis
related_info = <p><strong>How to Review</strong></p>\
<p>Suppressions are event types under the hood. Large volumes of suppressions can have an impact to ES performance.</p>\
<p></p>\
<p>Review indefinate or long running suppressions, remove where possible &amp; convert to correlation search tuning.</p>
severity_low_text = <br/><p>A moderate volume of suppressions are present.</p>
severity_high_text = <br/><p>A large volume of suppressions are present.</p>
description = <p>Notable event suppressions are used to temporarily suppress notable events from landing in incident review. For example; a user is travelling overseas and has triggered a number of detections for activity from an unusual geo-zone, after confirming travel times with the individual's manager, a suppression can be placed for the duration of their travel. Preventing further notables being triggered for this benign activity.</p>
search = | makeresults \
| eval summary_id="notable_event_suppressions" \
| append \
    [| search `ssef_summary(ssef_admin_eventtypes)` disabled=0 title="notable_suppression-*" \
    | fields _time, label, app, sharing, title, author, description, disabled, color, priority, tags, search, updated, acl_perms_read, acl_perms_write, acl_removable \
    | stats latest(search) as search by label, app, sharing, title \
    | rex field=search "_time>=(?P<min_time>\d+)" \
    | rex field=search "_time<=(?P<max_time>\d+)" \
    | eval ctime=now() \
    | eval total_duration_days=round((max_time-min_time) / 86400, 0) , remaining_duration_days=coalesce(round((max_time-ctime) / 86400, 0), "indefinite") \
    | where remaining_duration_days>1 OR remaining_duration_days="indefinite"] \
| stats count as total_suppresssions \
| eval total_suppresssions=total_suppresssions-1 \
| eval comment = "Total number of active suppressions: "+total_suppresssions+"|" \
| append \
    [| search `ssef_summary(ssef_admin_eventtypes)` disabled=0 title="notable_suppression-*" \
    | fields _time, label, app, sharing, title, author, description, disabled, color, priority, tags, search, updated, acl_perms_read, acl_perms_write, acl_removable \
    | stats latest(search) as search by label, app, sharing, title \
    | rex field=search "source=\"(?P<rule_name>.*?)\"" \
    | rex field=search "_time>=(?P<min_time>\d+)" \
    | rex field=search "_time<=(?P<max_time>\d+)" \
    | eval ctime=now() \
    | eval total_duration_days = round((max_time-min_time) / 86400, 0) , remaining_duration_days = coalesce(round((max_time-ctime) / 86400, 0), "indefinite") \
    | where remaining_duration_days>1 OR remaining_duration_days="indefinite" \
    | stats count by rule_name] \
| append \
    [ search earliest=-1mon `suppressed_notables` \
    | stats count by rule_name \
    | sort - count \
    | head 10 \
    | eval rule_count="- "+rule_name+": "+count \
    | stats list(rule_count) as rule_count \
    | eval rule_count=mvjoin(rule_count,"") \
    | eval comment="Top 10 rules with highest total of suppressed notables over the past month: "+rule_count+"|"] \
| append \
    [| search `ssef_summary(ssef_admin_eventtypes)` disabled=0 title="notable_suppression-*" \
    | fields _time, label, app, sharing, title, author, description, disabled, color, priority, tags, search, updated, acl_perms_read, acl_perms_write, acl_removable \
    | stats latest(search) as search by label, app, sharing, title \
    | rex field=search "source=\"(?P<rule_name>.*?)\"" \
    | rex field=search "_time>=(?P<min_time>\d+)" \
    | rex field=search "_time<=(?P<max_time>\d+)" \
    | eval ctime=now() \
    | eval total_duration_days=round((max_time-min_time)/86400,0),remaining_duration_days=coalesce(round((max_time-ctime)/86400,0),"indefinite") \
    | stats count(eval(if(remaining_duration_days="indefinite",1,null()))) as count_indefinate_timeframe_suppressions count(eval(if(total_duration_days>182,1,null()))) as count_long_running_suppresssions \
    | eval comment="Unique count of active suppressions with an indefinite timeframe: "+count_indefinate_timeframe_suppressions+"|Unique count of active suppressions with a duration longer than six months: "+count_long_running_suppresssions] \
| stats values(comment) as comment values(total_suppresssions) as total_suppresssions values(count_indefinate_timeframe_suppressions) as count_indefinate_timeframe_suppressions values(count_long_running_suppresssions) as count_long_running_suppresssions \
| eval severity_level = case ( total_suppresssions > 1000 OR count_indefinate_timeframe_suppressions > 100 OR count_long_running_suppresssions > 100, 4, total_suppresssions > 100 OR count_indefinate_timeframe_suppressions > 50 OR count_long_running_suppresssions > 50, 2, true(),1) \
| nomv comment \
| rex field=comment mode=sed "s/\|\s/|/g" \
| table comment count_indefinate_timeframe_suppressions count_long_running_suppresssions severity_level total_suppresssions \
| `ssef_handle_no_results(1,"The notable_event_suppressions summary job completed successfully without identifying any issues, and everything is operating as expected.")`

