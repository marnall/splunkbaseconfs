updated_author = akhamis
related_info = <ul><li><a href="https://lantern.splunk.com/Platform_Data_Management" target="_blank">Lantern: Use Case Explorer for the Splunk Platform</a><p>Explore a comprehensive guide designed to inspire and assist in developing new use cases using Splunk Enterprise or Splunk Cloud Platform. This resource helps you identify and implement analytic capabilities across different domains.</p></li><li><a href="https://www.splunk.com/en_us/solutions/all-use-cases.html" target="_blank">Splunk Solutions: Splunk Use Cases</a><p>Discover how your organization can become more resilient by exploring various use cases that Splunk can help solve, categorized to address specific challenges and objectives.</p></li><li><a href="https://docs.splunk.com/Documentation/ESCU/4.44.0/user/UCLKeyFeatures" target="_blank">Splunk Docs: Implement Security Use Cases Using the Use Case Library in Splunk</a><p>Learn how to implement security use cases using Splunk's Use Case Library, which offers categorized searches and analytic stories to enhance your security operations.</p></li><li><a href="https://lantern.splunk.com/Security/Getting_Started/Identifying_Splunk_Enterprise_Security_use_cases_and_data_sources" target="_blank">Lantern: Identifying Splunk Enterprise Security Use Cases and Data Sources</a><p>Gain insights into common security use cases and the associated data sources within Splunk Enterprise Security, aiding in the development of targeted analytic capabilities.</p></li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-use-cases.html" target="_blank">Splunk Blogs: Splunk Use Cases</a><p>Read about various ways to utilize Splunk to enhance organizational security and resilience, with links to resources for popular use cases across different domains.</p></li></ul>
description = <p>This search identifies <b>newly added sourcetypes</b> and summarizes their <b>indexing footprint</b> across the environment.</p><p>It highlights where new data sources are coming from and how widely they are distributed.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_scma_indexing_data_source_inventory)` newly_added="yes" \
| fields _time orig_index orig_sourcetype dc_host dc_source event_count severity_level newly_added \
| `ssef_sourcetype_mapping(orig_sourcetype)` \
| makemv delim="|" category \
| makemv delim="|" domain \
| stats latest(*) as * latest(_time) as _time values(orig_index) as Indexes values(category) as Category values(domain) as Domain by orig_sourcetype \
| rename orig_sourcetype as Sourcetype \
| sort - event_count dc_host \
| table _time Sourcetype Category Domain Indexes dc_host dc_source event_count \
| rename dc_host as "Number of Hosts" , dc_source as "Number of Sources" , event_count as "Number of Events"

