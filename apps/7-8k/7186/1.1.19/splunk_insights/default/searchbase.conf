[mc_distributed_search_health_assessment]
search_name = Distributed search health assessment
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Search & Visualization
category = Health Check
sub_category = Data Search
tags = Distributed Search,Health Check,Indexer,Monitoring Console,Summary
solution = Check the Monitoring Console Distributed Search: Instance view for more information. Review resource usage and general instance health of the unhealthy peers.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 7675106D535F7BC26D9403A084946E0C
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = One or more search heads are reporting unhealthy search peers.
description = This checks the status of the search peers (indexers) of each search head. It assesses the overall health of distributed search on a per search head basis.
search = | rest `ssef_rest_target` `ssef_rest_timeout` splunk_server_group=dmc_group_search_head /services/search/distributed/peers \
| eval summary_id="mc_distributed_search_health_assessment" \
| fields splunk_server peerName server_roles status status_details \
| eval peer_health = case(status == "Up" AND isnull(status_details), "optimal", status != "Down" AND isnotnull(status_details), "degraded", status == "Down" , "down", status!= "Up" OR status != "Down", "inconclusive") \
| stats count AS peer_count count(eval(peer_health == "optimal")) AS peer_count_optimal count(eval(peer_health == "degraded")) AS peer_count_degraded,  count(eval(peer_health == "down")) AS peer_count_down, count(eval(peer_health == "inconclusive")) AS peer_count_inconclusive, by splunk_server \
| eval severity_level = case (peer_count_down > 0, 3, peer_count_degraded > 0, 2, peer_count_inconclusive > 0, 1, peer_count_optimal > 0, 1, True(), -1) \
| rename splunk_server AS search_head\
| `ssef_handle_no_results(1,"The mc_distributed_search_health_assessment summary job completed successfully without identifying any issues, and everything is operating as expected.")`

