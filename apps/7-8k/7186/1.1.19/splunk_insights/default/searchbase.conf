quid = 147F3D0CD3942C390B7EB70F48ED7CCE
updated_author = akhamis
related_info = 
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>Tracks <b>Splunk system messages</b> via REST to provide centralized visibility into warnings, informational notices, and system alerts across instances. Supports <b>operational monitoring</b> and governance oversight.</p>
explanation = <p>This search queries the <code>/services/messages</code> REST endpoint to retrieve active Splunk system messages, normalizes severity values, decodes message content, and enriches results with instance metadata. It aggregates message details per label and message text while preserving severity and creation time. The resulting dataset provides authoritative visibility into system notifications, configuration warnings, and operational advisories.</p>
execution_plan = <b>01</b> <code>| rest /services/messages</code><br> - Retrieve system messages across all instances.<br><b>02</b> <code>| normalization</code><br> - Normalize severity casing and decode encoded message fields.<br><b>03</b> <code>| `ssef_instance_info(Splunk_Instance)`</code><br> - Enrich with instance label and role metadata.<br><b>04</b> <code>| stats ... by message</code><br> - Consolidate messages and preserve latest severity and timestamp metadata.
solution = <p>This KPI provides centralized visibility into Splunk system health notifications.</p><p><b>Suggested Actions</b>: Investigate ERROR or WARN messages promptly, validate configuration advisories, address deprecated settings, and ensure cluster or license messages are resolved before impacting operations.</p>
related_info = <ul><li><a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Viewmessages" target="_blank">Splunk Docs: View system messages</a></li></ul>
viz_options = { "count":100 }
search = | rest splunk_server=* `ssef_rest_timeout` /services/messages count=0 f=server f=message f=help f=message_alternate f=severity f=timeCreated_epochSecs \
| eval summary_id="ssef_messages_tracker" \
| eval Splunk_Instance = lower(splunk_server) \
| `ssef_instance_info(Splunk_Instance)` \
| rename timeCreated_epochSecs AS timecreated \
| eval severity = upper(severity) \
| `ssef_decode_field(message_alternate)` \
| rex field=message mode=sed "s/\[\[|\]\]//g" \
| rex field=message_alternate mode=sed "s/\[\[|\]\]//g" \
| stats \
    VALUES(Splunk_Instance) AS Splunk_Instance\
    VALUES(role) AS role \
    VALUES(message_alternate) AS message_alternate\
    VALUES(help) AS help\
    LAST(severity) AS severity\
    LAST(timecreated) AS timecreated\
    LATEST(name) AS name\
    by label, message \
| eval _time = now() \
| foreach role, Splunk_Instance, message_alternate, help [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time, label, name, role, Splunk_Instance,message, message_alternate, help, severity, timecreated,severity_level \
| `ssef_handle_no_results(1,"The ssef_messages_tracker summary job completed successfully without identifying any issues, and everything is operating as expected.")`

