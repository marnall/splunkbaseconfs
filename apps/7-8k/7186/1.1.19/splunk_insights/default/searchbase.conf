description = <p>Ranks sourcetypes by their <b>relative resource usage</b> using a combined score of <b>event volume</b> and <b>throughput</b>, filtered for active data only. Provides <b>event age</b> metrics to detect ingestion lag. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = | mstats fillnull_value=0\
    ```The avg_age and max_age refer to the difference between the time that the event was seen by the thruput processor in the indexing queue, and the time when the event occurred (or more accurately, the time that Splunk decided the event occurred).```\
    avg(spl.mlog.per_sourcetype_thruput.avg_age) as avg_event_age ```avg_age is the average difference, in seconds, between the current time and the perceived time of the events coming through the thruput processor.```\
    max(spl.mlog.per_sourcetype_thruput.max_age) as max_event_age ```max_age is the largest difference, in seconds, between the current time and the perceived time of the events coming through the thruput processor.```\
    sum(spl.mlog.per_sourcetype_thruput.kbps) as total_kbps ```kbps indicates kilobytes per second averaged over the sampling period.```\
    sum(spl.mlog.per_sourcetype_thruput.ev) as total_events ```ev is a simple total count of events during the sampling period.```\
    WHERE index=_metrics group=per_sourcetype_thruput \
    NOT series IN (splunk*, audittrail, scheduler, stash, stash_new, mongod, kvstore, itsi_*, http_event_collector_metrics, search_telemetry, secure_gateway_app_internal_log, python_modular_input, python_upgrade_readiness_app) \
    [| tstats summariesonly=true count WHERE [ | `ssef_all_indexes` ] sourcetype=* by sourcetype \
    | rename sourcetype as series \
    | fields series ] \
    by series \
| fillnull value=0 avg_event_age total_kbps max_event_age total_events \
| where total_kbps > 1 \
| eventstats sum(total_events) as overall_events sum(total_kbps) as overall_kbps \
| eval relative_resource_score = ((total_events / overall_events) * 0.5) + ((total_kbps / overall_kbps) * 0.5) \
| sort 10 - relative_resource_score \
| rename series as Sourcetype \
| eval total_events=round(total_events) \
| foreach total_kbps avg_event_age max_event_age \
    [ eval <<FIELD>> = round(<<FIELD>>, 2)] \
| table Sourcetype relative_resource_score total_events total_kbps avg_event_age max_event_age \
| rename total_events as "Total Events", total_kbps as "Total Throughput (KBps)", avg_event_age as "Average Event Age", max_event_age as "Maximum Event Age", relative_resource_score as "Relative Resource Score"

