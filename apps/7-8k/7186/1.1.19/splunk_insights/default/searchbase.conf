# version = 202601201430 (for January 20, 2026, 2:30 PM)
#### Begin Global Default Values####
[default]
## Boolean fields
disabled = 0
bookmark = 0
search_hidden = 0
readonly = 0
# dispatch_context_force = 0
splunk_certified = 0

## Integer fields
ranking = 5
sleep_after = 10
env_run = 3
# Possible values: 1 = Cloud, 2 = On Prem or Enterprise and 3 for both or any platform

## String Fields
search_origin = searchbase
search_author = Field Innovation Engineering
category = Miscellaneous
version = 1.0.0
date_updated = 2023-1-1 00:00:00
date_created = 2023-1-1 00:00:00
default_viz = splunk.table
# Possible values: splunk.area, splunk.bar, splunk.column, splunk.events, splunk.line, splunk.pie, splunk.singlevalue, splunk.singlevalueradial, splunk.table
search_type = display
# search_type Possible values: discovery | summary | display. This field will be helpful in determining which searches can be displayed in the list of checks that can be added to a new collection (only summary searches).
# ssef_cron Possible values: [hourly | daily | monthly | weekly]. This will be used in the SSEF builder to create collection sub-groups based on the search schedule.
# target_component Possible values: [summary | search | licensing | indexing | apps | ...]. it needs to match one of the existent KPI tabs and will indicate where the search result card will be displayed.
## Other fields
dispatch_earliest_time = -24h
dispatch_latest_time = now
# ssef_cron Possible values: [hourly | daily | monthly | weekly]. This will be used in the SSEF builder to create collection sub-groups based on the search schedule.
# target_component Possible values: [summary | search | licensing | indexing | apps | ...]. it needs to match one of the existent KPI tabs and will indicate where the search result card will be displayed.
ssef_cron = daily
target_component = Miscellaneous

#### Severity Fields and Severity Codes
# General Information
# severity_info_text (0)
# severity_normal_text (1)
# severity_low_text (2)
# severity_medium_text (3)
# severity_high_text (4)
# severity_critical_text (5)
#############
# Severity Level Logic:
# * - (-2) (N/A) means: "Not Applicable": GRAY. Example: if ES does not exist in the env, means we are checking for
# * - (-1) (None) means: "No results found": GRAY --> N/A
# * - 0    (Info) means: "not stateful, informational only": BLUE = #AED3E5 --> Info
# * - 1    (Normal) means: "all good" : GREEN = #99D18B --> OK
# * - 2    (Low) means: "borderline problematic..." : YELLOW = #FFE98C
# * - 3    (Medium) means: "well, you'd better take a look" : ORANGE = #FCB64E --> Warning
# * - 4    (High) means: "almost fire!" : dark orange = #F26A35 --> Error
# * - 5    (Critical) means: "FIRE!" : RED = #B50101 --> Fatal

#############
#
# Configurable Diagnostic Workflow
# diag_work = 0 | 1 | 2
# diag_work = 0 (Default — Results First)
# diag_work = 1 (Diagnostics First )
# diag_work = 2 (Hybrid — Context Without Noise)
# 
#############
diag_work = 0
description = 
#### End Global Default Values ####



[ssef_admin_eventtypes]
search_name = Event Types Inventory
readonly = 1
ssef_cron = weekly
target_component = Inventory
version = 1.0.2
date_updated = 2025-7-3 11:46:51
category = Splunk
sub_category = Search Heads
tags = Discovery,Event Types,Inventory,REST
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 3D90B711AC06DF5A49BA851ADBFF4203
updated_author = akhamis
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>This Splunk query retrieves information about event types from the Splunk REST API and saves it to a summary index and a lookup table.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/admin/eventtypes \
| eval summary_id="ssef_admin_eventtypes" \
| rename eai:acl.* AS * \
| rename eai:* AS * , perms.read AS acl_perms_read , perms.write AS acl_perms_write , removable AS acl_removable \
| eval Splunk_Instance = lower(splunk_server) \
| `ssef_instance_info(Splunk_Instance)` \
| `ssef_strptime_format(updated)` \
| eval author = if(author="nobody", "system", author), acl_perms_read = if(match(acl_perms_read, "\*"), "Everyone", acl_perms_read), acl_perms_write = if(match(acl_perms_write, "\*"), "Everyone", acl_perms_write) \
| eval title=lower(title) \
| stats \
    VALUES(Splunk_Instance) AS Splunk_Instance \
    VALUES(role) AS role \
    VALUES(acl_perms_read) AS acl_perms_read \
    VALUES(acl_perms_write) AS acl_perms_write \
    VALUES(tags) AS tags\
    LAST(acl_removable) AS acl_removable\
    LAST(author) AS author\
    LAST(description) AS description\
    LAST(disabled) AS disabled\
    LAST(color) AS color\
    LAST(priority) AS priority\
    LAST(search) AS search\
    LAST(updated) AS updated\
    LATEST(name) AS name\
    by label, app, sharing, title \
| eval _time = now() \
| foreach role, Splunk_Instance, acl_perms_*, tags \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| eval is4s="summary" \
| append \
    [| search `ssef_summary(ssef_admin_eventtypes)` earliest=-1d@d \
    | foreach Splunk_Instance, role, acl_perms_*, tags \
        [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
    | eval title=lower(title) \
    | stats VALUES(role) AS role, VALUES(Splunk_Instance) AS Splunk_Instance , VALUES(acl_perms_read) AS acl_perms_read , VALUES(acl_perms_write) AS acl_perms_write , VALUES(tags) AS tags , LATEST(_time) AS _time , LATEST(author) AS author , LATEST(description) AS description , LATEST(disabled) AS disabled , LATEST(color) AS color , LATEST(priority) AS priority , LATEST(search) AS search , LATEST(updated) AS updated , LATEST(acl_removable) AS acl_removable\
        by label, app, sharing, title \
    | table _time, label, name, role, Splunk_Instance, app, sharing, title, author, description, disabled, color, priority, tags, search, updated, acl_perms_read, acl_perms_write, acl_removable \
    | outputlookup ssef_admin_eventtypes_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | stats count as num_items \
    | eval is4s="lookup" ] \
| where is4s="summary" \
| table _time, label, name, role, Splunk_Instance, app, sharing, title, author, description, disabled, color, priority, tags, search, updated, acl_perms_read, acl_perms_write, acl_removable,severity_level \
| `ssef_handle_no_results(1,"The ssef_admin_eventtypes summary job completed successfully without identifying any issues, and everything is operating as expected.")`

