[ssef_scma_indexing_data_source_inventory]
search_name = Data Source Inventory
readonly = 1
target_component = Inventory
version = 1.0.8
date_created = 2022-09-14
date_updated = 2025-11-16 1:30:39
category = Splunk
sub_category = Sourcetypes
tags = Admin,Discovery,Indexes,Indexing,SCMA,Sourcetypes
solution = <h3>High-Level Overview &amp; Purpose</h3><p>This IS4S Summary search is a foundational data engineering job that creates a daily inventory of all sourcetypes present in the environment. Its primary purpose is to enrich this daily inventory with a critical piece of metadata: a <code>newly_added</code> flag, which indicates if a specific <code>(index, sourcetype)</code> combination is being seen for the very first time.</p><p>This single query efficiently populates three essential data sources for downstream analytics:</p><ol><li data-list="ordered"><span class="ql-ui"></span><strong>The Summary Index (</strong><code><strong>ssef_scma_indexing_data_source_inventory</strong></code><strong>):</strong> A complete daily record of all sourcetypes, their metrics (<code>event_count</code>, <code>dc_host</code>), and their <code>newly_added</code> status for that day.</li><li data-list="ordered"><span class="ql-ui"></span><strong>The Daily Snapshot Lookup (</strong><code><strong>ssef_scma_indexing_data_source_inventory_lookup</strong></code><strong>):</strong> A rich lookup file that is a direct, one-to-one copy of the data sent to the summary index each day.</li><li data-list="ordered"><span class="ql-ui"></span><strong>The Master List Lookup (</strong><code><strong>ssef_sourcetype_seen_list</strong></code><strong>):</strong> A simple, persistent, and ever-growing historical record of every unique <code>(index, sourcetype)</code> pair ever seen. This is the "source of truth" for newness.</li></ol><h3>Methodology Deep Dive: The Two-Lookup Architecture</h3><p>This query solves a complex data architecture problem. We have two conflicting requirements: we need a lookup that is <strong>overwritten daily</strong> with the latest metrics, and we need a lookup that is <strong>only ever appended to</strong> for historical tracking. A single lookup file cannot satisfy both needs.</p><p>This query solves the problem by implementing a <strong>Two-Lookup Architecture</strong> in a single, efficient pass.</p><ol><li data-list="ordered"><span class="ql-ui"></span><strong>Generate &amp; Flag:</strong> The query begins by getting the full inventory of sourcetypes for the day. It then uses the <code>ssef_sourcetype_seen_list</code> (the historical master list) to check if each sourcetype has been seen before. Based on this check, it correctly flags each sourcetype as <code>newly_added="yes"</code> or <code>"no"</code>.</li><li data-list="ordered"><span class="ql-ui"></span><strong>Save &amp; Pass-Through (The </strong><code><strong>collect</strong></code><strong> Command):</strong> The query then uses the <code>collect</code> command (wrapped in the <code>ssef_summarize_data_normal</code> macro). This is the most critical step. The <code>collect</code> command saves the <strong>complete, fully-flagged daily report</strong> to the summary index, and then, crucially, <strong>passes the same complete dataset</strong> down the pipeline to the next commands.</li><li data-list="ordered"><span class="ql-ui"></span><strong>Update Lookups:</strong> The query then uses the data passed through by <code>collect</code> to perform two separate actions in sequence:</li><li class="ql-indent-1" data-list="bullet"><span class="ql-ui"></span>First, it uses <code>outputlookup</code> to <strong>overwrite</strong> the <code>ssef_scma_indexing_data_source_inventory_lookup</code> with the complete daily report.</li><li class="ql-indent-1" data-list="bullet"><span class="ql-ui"></span>Second, it filters the data stream down to <code>where newly_added=="yes"</code>, and then uses another <code>outputlookup</code> with <code>append=true</code> to add <strong>only the new discoveries</strong> to the <code>ssef_sourcetype_seen_list</code>.</li></ol><h3>Defense of This Approach</h3><p>This query design is highly defensible and represents Splunk best practices for the following reasons:</p><ol><li data-list="bullet"><span class="ql-ui"></span><strong>Correctness:</strong> It elegantly resolves the conflicting requirements of a daily snapshot versus a historical list by using a two-lookup architecture. This is the only way to achieve both goals without data corruption.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Efficiency:</strong> It achieves three distinct goals (populating a summary index and two lookups) in a <strong>single, efficient pass</strong>. This is made possible by leveraging the <code>collect</code> command's unique "pass-through" behavior, avoiding the need for multiple, separate summary jobs.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Maintainability:</strong> The separation of concerns makes the system easy to understand. The purpose of each lookup is clear from its update method (<code>overwrite</code> vs. <code>append</code>).</li><li data-list="bullet"><span class="ql-ui"></span><strong>Robustness:</strong> The logic correctly handles the "Day 1 / cold start" problem (when all sourcetypes are new) and includes defensive best practices like filtering out internal Splunk indexes (<code>_internal</code>, <code>_audit</code>, etc.) to keep the inventory clean and relevant.</li></ol><p><br></p>
