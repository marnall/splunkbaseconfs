[ssef_scma_kv_store_size]
search_name = KV Store Status
readonly = 1
target_component = Infra & Arch
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 16:54:12
category = Splunk
sub_category = Environment
tags = Environment,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = E92BEC8F8C43D17177DCFAA36BD3F02F
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/ManageKVstorecollections" target="_blank">Splunk Best Practices - Managing KV Store Size</a></li>\
<li><a href="https://community.splunk.com/t5/Knowledge-Management/KV-Store-Performance/td-p/506925" target="_blank">Splunk Answers - KV Store Performance</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/DefineKVStorecollections" target="_blank">Splunk Docs - KV Store Collection Configuration</a></li>\
</ul>
severity_normal_text = <br/><p>No problems were found with the KV Store(s). Each one is below 25 GB, and the total is under 100 GB.</p>
severity_high_text = <br/><p>There's an issue with the size of the KV Store(s). Please make sure each one is under 25 GB and all of them together are less than 100 GB.</p>
description = <p>Keeping individual KV store files under 25 GB in a Splunk environment is important for ensuring optimal performance, stability, and reliability. Large KV store files can lead to slower query performance, increased memory usage, and potential issues with data corruption or loss. By maintaining KV store files within this size limit, customers can avoid performance bottlenecks, reduce the risk of system instability, and ensure that data remains accessible and manageable. This helps maximize the value of the Splunk platform by maintaining a responsive, efficient, and stable environment.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> KV store sizes are over 25 GB individually and/or under 100GB total.</li>\
<li><strong>Normal:</strong> KV store sizes are under 25 GB individually and/or under 100GB total.</li>\
</ul>
search = | tstats summariesonly=true Max(data.size) as size latest(_time) as _time WHERE (index=_introspection component=KVStoreCollectionStats "data.size">0 `ssef_host_excl` ) by host, "data.ns" \
| eval summary_id="ssef_scma_kv_store_size" \
| rename "data.*" as "*" \
| rex field=ns "(?<app>.*)\.(?<kvstore>.*)" \
| `ssef_instance_info(host)` \
| search app!=system NOT (app=splunk-dashboard-studio AND kvstore=splunk-dashboard-icons) \
| stats Max(size) As collection_size_bytes latest(name) as name by label app kvstore \
| eventstats sum(collection_size_bytes) as total_collection_size_bytes_instance latest(_time) as _time by label \
| eventstats sum(collection_size_bytes) as total_collection_size_bytes_global \
| eval collection_size_mb = collection_size_bytes / 1024 / 1024 , collection_size_gb = collection_size_mb / 1024 , total_collection_size_gb_instance = total_collection_size_bytes_instance / 1024 / 1024 / 1024, total_collection_size_gb_global = total_collection_size_bytes_global / 1024 / 1024 / 1024 \
| eval total = total_collection_size_gb_instance \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( collection_size_gb > 25 OR total_collection_size_gb_instance > 100, high, true(), normal ) \
| table _time label name app kvstore collection_size_mb collection_size_gb total_collection_size_gb_instance total_collection_size_gb_global severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_kv_store_size summary job completed successfully without identifying any issues, and everything is operating as expected.")`

