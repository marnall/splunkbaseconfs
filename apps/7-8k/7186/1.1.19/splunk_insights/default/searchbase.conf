sub_category = _internal
tags = Dashboards,EFS,KPIs,Performance,_introspection
solution = <p>Identifies high-memory or long-running dashboard searches for targeted optimization.</p><p><b>Suggested Actions</b><br><b>1.</b> Optimize dashboard SPL to reduce runtime and memory usage.<br><b>2.</b> Use accelerated data models or summary indexes.<br><b>3.</b> Schedule searches instead of running them on-demand.<br><b>4.</b> Educate users on dashboard best practices.<br><b>5.</b> Monitor after changes to confirm improvements.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (daily_avg_searches_with_high_memory_usage=0,1, daily_avg_searches_with_high_memory_usage<=5,2, daily_avg_searches_with_high_memory_usage<=10,3, daily_avg_searches_with_high_memory_usage<=20,4, daily_avg_searches_with_high_memory_usage>20,5)</code></pre><p>This SPL should be inserted before the final <code>| table</code> to classify severity. Thresholds can be tuned based on system capacity and acceptable dashboard performance.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No dashboards exceed thresholds.</li><li><b>Low (Severity 2):</b> 1–5 daily occurrences.</li><li><b>Medium (Severity 3):</b> 6–10 occurrences.</li><li><b>High (Severity 4):</b> 11–20 occurrences.</li><li><b>Critical (Severity 5):</b> More than 20 daily occurrences.</li></ul>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
explanation = <p>This search leverages the <b>_introspection</b> index to identify UI dashboard executions classified as <b>ad-hoc</b> searches. It filters out real-time searches, system users, and searches not originating from dashboards. It detects cases where <b>memory usage</b> exceeds 1 GB or <b>elapsed time</b> exceeds 1 hour, then aggregates statistics to determine the daily average count of high-impact dashboard executions. The output supports optimization efforts by pinpointing performance bottlenecks and enabling dashboard tuning.</p><p>For junior Splunkers, this SPL illustrates field renaming from structured JSON-like sources, conditional filtering, and applying stats to detect resource usage trends.</p>
quid = 91997131C29210F5D488A776E7F14401
updated_author = akhamis
description = <p>This search looks for searches that consume over 5GB (5,120 bytes) of memory &amp; returns the unique number of searches that are deemed high memory usage per day. Then an average is calculated so that we can get a daily average of offending searches.High memory searches, especially at 5GB mark, are consuming a significant amount of memory that exists within the search head. This can cause waiting periods for other users on the platform to wait for this memory to be released for their searches.</p>
viz_options = { "count":100 }
search = | tstats summariesonly=true count as dashboard_executions max(data.mem_used) as max_mem_used max(data.elapsed) as max_elapsed dc(data.search_props.user) as daily_distinct_dashboard_users dc(host) as dc_host\
    WHERE index=_introspection sourcetype="splunk_resource_usage"\
    data.search_props.sid=* data.search_props.mode!=RT data.search_props.user!="splunk-system-user"\
    data.search_props.type="ad-hoc" data.search_props.provenance="UI:Dashboard*"\
    (data.mem_used > 1000 OR data.elapsed > 3600)\
    BY data.search_props.provenance \
| rename data.search_props.provenance as provenance \
| eval max_elapsed = round(max_elapsed/60, 2) \
| stats count as daily_avg_searches_with_high_memory_usage \
| eval severity_level = case (\
    daily_avg_searches_with_high_memory_usage=0, 1,\
    daily_avg_searches_with_high_memory_usage<=5, 2,\
    daily_avg_searches_with_high_memory_usage<=10, 3,\
    daily_avg_searches_with_high_memory_usage<=20, 4,\
    daily_avg_searches_with_high_memory_usage>20, 5\
    ) \
| `ssef_severity_level_text(severity_level)` \
| rename severity_text as Severity \
| table daily_avg_searches_with_high_memory_usage Severity


