solution = <p>This search highlights when the system experiences the highest user login activity, allowing teams to plan resources accordingly.</p><p><b>Suggested Actions</b><br>• Schedule maintenance outside of peak hours<br>• Review capacity planning strategies<br>• Monitor for anomalies during expected low-use periods</p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`, splunk-system-user) search_type=*adhoc*</code><br> - Limits to non-system, non-default users running ad hoc searches.<br><b>02</b> <code>| fields _time user app label session</code><br> - Extracts relevant metadata for user login sessions.<br><b>03</b> <code>| bin _time span=1h</code><br> - Buckets time into hourly segments for time series analysis.<br><b>04</b> <code>| stats values(session) as session by _time label app user</code><br> - Aggregates unique session identifiers per user by time.<br><b>05</b> <code>| makecontinuous _time span=1h</code><br> - Fills in any missing hourly time buckets.<br><b>06</b> <code>| fillnull value=0 session</code><br> - Replaces null session values with 0.<br><b>07</b> <code>| eval hour_order=strftime(_time, "%H")</code><br> - Extracts hour in 24-hour format for sorting.<br><b>08</b> <code>| eval hour=strftime(_time, "%I:%M %p")</code><br> - Converts hour to 12-hour AM/PM format for readable output.<br><b>09</b> <code>| sort + hour_order</code><br> - Orders output chronologically.<br><b>10</b> <code>| chart dc(session) AS "Regularly Seen User Peak Usage Time" by hour_order hour</code><br> - Charts distinct session counts to identify peak usage hours.<br>
explanation = <p>This data supports capacity planning and scheduling for Splunk Admins by showing when regular users are most active. Observing login peaks helps with tuning infrastructure, improving user experience, and ensuring system availability during high-demand periods.</p>
quid = 29C6AA882FCFB1D38FCEF29B1006556F
search_author = khutchinson
updated_author = khutchinson
related_info = <ul><li><a href="https://lantern.splunk.com/Search?q=User%20Activity" target="_blank">Lantern: User Activity</a><br>Guidance on tracking and interpreting user interactions in Splunk.</li><li><a href="https://help.splunk.com/en/search?q=Login%20Tracking" target="_blank">Help: Login Tracking</a><br>Instructions for analyzing user login events.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=Audit+Searches" target="_blank">Splunk Docs: Audit Searches</a><br>Details about using audit data to monitor search usage.</li><li><a href="https://help.splunk.com/en/search?q=Session%20Management" target="_blank">Help: Session Management</a><br>Explanation of session data and how it can be utilized for behavioral analysis.</li></ul>
description = <p>Analyzes <b>user login behavior</b> to determine <b>peak usage times</b> across hours. Helps identify when active users are engaging with the system.</p> <p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.column
viz_options = {  "stackMode": "stacked", "backgroundColor": "transparent", "seriesColors": ["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"], "legendDisplay": "top", "xAxisTitleVisibility": "hide", "dataValuesDisplay": "minmax"  }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`, splunk-system-user) search_type=*adhoc* \
| fields _time user app label session \
| bin _time span=1h \
| stats values(session) as session by _time label app user \
| makecontinuous _time span=1h\
| fillnull value=0 session\
| eval hour_order=strftime(_time, "%H")\
| eval hour=strftime(_time, "%I:%M %p")\
| sort + hour_order\
| chart dc(session) AS "Regularly Seen User Peak Usage Time" by hour_order hour

