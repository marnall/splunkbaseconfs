quid = A544BF30923C85CF4F5F7703F793B4B0
updated_author = akhamis
description = <p>This search summarizes an hourly breakdown of <b>search telemetry</b> by <b>Sourcetype</b> to show which data types drive the most retrieved events. It helps identify high-volume sourcetypes that can contribute to <b>search performance</b> and compute pressure. Use it to prioritize optimization and capacity decisions for the biggest contributors.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
explanation = <p>Understanding which sourcetypes dominate event retrieval helps teams control search costs, improve user experience, and reduce platform contention. When a small number of sourcetypes account for most retrieved events, admins can focus onboarding hygiene, field extractions, acceleration strategies, or data retention policies where they matter most. This insight supports platform owners in forecasting compute requirements and tuning workload controls before peak usage periods. It also helps engineering and app teams validate whether high-volume data sources are truly delivering value relative to their performance impact.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_introspection_search_telemetry)`</code><br> - Retrieves IS4S-generated summary telemetry about search activity and event retrieval volumes.<br><b>02</b> <code>| fields _time label app provenance savedsearch_name Sourcetype event_count severity_level</code><br> - Limits the dataset to the core dimensions needed for aggregation and reporting.<br><b>03</b> <code>| bin _time span=1h</code><br> - Buckets time into hourly windows to stabilize counts for consistent rollups.<br><b>04</b> <code>| stats latest(event_count) as event_count by _time label app provenance savedsearch_name Sourcetype</code><br> - Keeps the most recent hourly count per saved search and sourcetype to prevent double counting within the bin.<br><b>05</b> <code>| stats sum(event_count) as sum_event_count by Sourcetype</code><br> - Sums retrieval counts per sourcetype to identify the largest event drivers.<br><b>06</b> <code>| `ssef_large_string_abbr(sum_event_count,2)`</code><br> - Abbreviates large numeric totals for easier reading in dashboards and tables.<br><b>07</b> <code>| sort 50 - sum_event_count</code><br> - Ranks the top contributors so teams can focus on the biggest optimization wins first.<br><b>08</b> <code>| fields Sourcetype sum_event_count_norm</code><br> - Narrows output to the key reporting fields for downstream visualization.<br><b>09</b> <code>| rename sum_event_count_norm as "Total # of Events Retrieved"</code><br> - Labels the metric for clear stakeholder interpretation.</br>
solution = <p>This search highlights which <b>sourcetypes</b> drive the highest overall <b>event retrieval</b>, helping you prioritize tuning and capacity work where it delivers the most impact.</p><p><b>Suggested Actions</b>Investigate the top sourcetypes for expensive field extractions, overly broad time ranges, and high-cardinality fields; optimize or constrain saved searches that pull excessive events; and consider workload controls or data lifecycle adjustments for consistently dominant sources.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Scale search and storage elastically to absorb high retrieval workloads driven by top sourcetypes.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Splunk Free Courses</a><br>Build practical skills in efficient SPL patterns and performance-aware search habits to reduce unnecessary event retrieval.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services and Support (CX)</a><br>Engage experts to assess search workload drivers, capacity constraints, and operational tuning opportunities at scale.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=search%20telemetry%20sourcetype" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps that enhance telemetry visibility, search workload reporting, and platform optimization.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: SPL Search Reference</a><br>Authoritative reference for SPL concepts and command behavior used in this search.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/understanding-spl-syntax" target="_blank">Splunk Help: Understanding SPL Syntax</a><br>Guidance on SPL structure to help refine queries that over-retrieve events.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: Command Quick Reference</a><br>Quick mapping of SPL commands to use cases for faster optimization work.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/evaluation-functions/evaluation-functions" target="_blank">Splunk Help: Evaluation Functions</a><br>Reference for eval-style functions that often influence performance and result shaping.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/time-format-variables-and-modifiers/date-and-time-format-variables" target="_blank">Splunk Help: Date And Time Format Variables</a><br>Time handling guidance to avoid overly broad time bucketing and inefficient time expressions.</li><li><a href="https://www.splunk.com/en_us/blog/2015/02/16/splunk-search-optimization-techniques.html" target="_blank">Splunk Blogs: Splunk Search Optimization Techniques</a><br>Practical optimization tactics for improving search efficiency and reducing unnecessary event retrieval.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=search%20telemetry%20sourcetype" target="_blank">Splunk Docs: SplunkSearch Results For Search Telemetry Sourcetype (provisionally validated)</a><br>Search Splunk docs for additional guidance on telemetry, sourcetype analysis, and performance tuning.</li><li><a href="https://lantern.splunk.com/Search?q=Search%20Telemetry" target="_blank">Lantern: Search Results For Search Telemetry (provisionally validated)</a><br>Find guided best practices and playbooks related to search usage analysis and optimization.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_introspection_search_telemetry)` \
| fields _time label app provenance savedsearch_name Sourcetype event_count severity_level \
| bin _time span=1h \
| stats latest(event_count) as event_count by _time label app provenance savedsearch_name Sourcetype \
| stats sum(event_count) as sum_event_count by Sourcetype \
| `ssef_large_string_abbr(sum_event_count,2)` \
| sort 50 - sum_event_count \
| fields Sourcetype sum_event_count_norm \
| rename sum_event_count_norm as "Total # of Events Retrieved"

[ssef_introspection_vcpu_usage_tracker]
search_name = Hourly Splunk Enterprise vCPU Tracker
readonly = 1
ssef_cron = hourly
target_component = Infra & Arch
version = 1.0.4
date_created = 2024-5-23 12:9:35
date_updated = 2025-10-18 22:43:49
category = Splunk
sub_category = vCPU
tags = Discovery,Tracker,vCPU
dispatch_earliest_time = -2h@h
dispatch_latest_time = -1h@h
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = 092171CCDC51020E7ED4C2EA7497A1B6
search_author = akhamis
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>Tracks <b>vCPU utilization</b> across indexers and search heads using introspection Hostwide telemetry. Calculates effective vCPU usage relative to licensed and total vCPU counts to support <b>capacity governance</b> and workload optimization.</p>
explanation = <p>This search leverages Hostwide introspection metrics to calculate CPU utilization at high resolution, focusing on indexer and search head tiers. It computes percentile-based utilization, derives effective vCPU consumption, aggregates by Splunk role, and normalizes usage relative to licensed CPU capacity. The output provides visibility into aggregate CPU saturation patterns and helps identify sustained workload pressure, underutilization, or scaling inefficiencies. Monitoring vCPU utilization supports proactive infrastructure right-sizing and workload balancing.</p>
execution_plan = <b>01</b> <code>| tstats ... component::Hostwide</code><br> - Retrieve percentile CPU telemetry from introspection summaries.<br><b>02</b> <code>| eval PctUsed=(100-cpu_idle_pct)/100</code><br> - Derive CPU utilization ratio from idle percentage.<br><b>03</b> <code>| stats p99(PctUsed) by role</code><br> - Aggregate utilization per 5-minute interval and per Splunk role.<br><b>04</b> <code>| eval vCPU_Utilization=PctUtilized*License_vCPUs</code><br> - Calculate effective vCPU consumption.<br><b>05</b> <code>| stats sum(...) by Splunk_Role</code><br> - Summarize total utilization across role tiers.
solution = <p>This KPI provides tier-level vCPU utilization visibility to support scaling decisions and workload governance.</p><p><b>Suggested Actions</b>: Investigate sustained high utilization on indexers or search heads, rebalance workloads, optimize search density, and validate that virtual CPU allocation aligns with ingestion and search concurrency demands.</p>
related_info = <ul><li><a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Introspectionabout" target="_blank">Splunk Docs: About Introspection Logs</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/Investigateperformanceissues" target="_blank">Splunk Docs: Investigate Performance Issues</a></li></ul>
viz_options = { "count":100 }
search = | tstats summariesonly=true fillnull_value=0 P99(data.cpu_idle_pct) AS cpu_idle_pct P99(data.cpu_user_pct) AS cpu_user_pct P99(data.cpu_system_pct) AS cpu_system_pct max(data.virtual_cpu_count) AS virtual_cpu_count WHERE index=_introspection sourcetype=splunk_resource_usage component::Hostwide earliest=-2h@h latest=-1h@h by _time span=10s host \
| eval summary_id="ssef_introspection_vcpu_usage_tracker" \
| rename "data.*" As * \
| `ssef_instance_info(host)` \
| where role IN ("indexer","search_head") \
| eval label = if(isnull(label) OR label="", lower(host), label) \
| eval PctUsed = (100 - cpu_idle_pct) / 100 , License_vCPUs = virtual_cpu_count \
| eval Splunk_Role = CASE (role="indexer", "indexer", TRUE(), "search_head") \
| bin span=5m _time \
| stats max(License_vCPUs) as License_vCPUs p99(PctUsed) as PctUtilized max(virtual_cpu_count) as total_vCPUs by _time host Splunk_Role \
| eval vCPU_Utilization = round((PctUtilized * License_vCPUs), 2) \
| stats sum(vCPU_Utilization) as vCPU_Utilization sum(License_vCPUs) as License_vCPUs sum(total_vCPUs) as total_vCPUs by _time Splunk_Role \
| eval PctUtilized = vCPU_Utilization / License_vCPUs \
| eventstats sum(total_vCPUs) as License by _time \
| eval PctUsed = (PctUtilized * License) * (total_vCPUs / License) \
| eventstats SUM(PctUsed) As total_PctUsed BY _time \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time, Splunk_Role, PctUsed, total_PctUsed, total_vCPUs, severity_level\
| `ssef_handle_no_results(1,"The ssef_introspection_vcpu_usage_tracker summary job completed successfully without identifying any issues, and everything is operating as expected.")`

