[mc_forwarder_output_throughput_limits]
search_name = Forwarder output throughput limits (Deprecated)
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Infra & Arch
category = Health Check
sub_category = System and Environment
tags = Communication,Configuration,Health Check,Monitoring Console,Splunk Health Assistant,Summary
solution = Review the identified forwarder instances to ensure appropriate throughput settings are configured in limits.conf. Consistent throttling can result in data loss, and inaccurate or misleading reporting.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = EC5192E6879F8720E33270B94B26A460
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_low_text = One or more Splunk forwarders has been found to hit throttle throughput limit 10 times or more within past 24 hours.
description = This check looks for instances of Splunk forwarder are throughput throttled based on limits.conf settings within past 24 hours.
search = index=_internal sourcetype=splunkd ThruputProcessor data maxKBps \
| eval summary_id="mc_forwarder_output_throughput_limits" \
| rex "throughput\s\((?<KBps>\d+)" \
| stats count AS throttle_event_count avg(KBps) AS avg_KBps by host \
| eval avg_KBps = round(avg_KBps, 2), severity_level=2 \
| rename host AS instance \
| where throttle_event_count >= 10 \
| sort - throttle_event_count \
| append [ makeresults | eval severity_level = 1, throttle_event_count=0 | stats values(severity_level) AS severity_level values(*_count) AS *_count] \
| eventstats max(severity_level) AS max_severity_level \
| where severity_level >= max_severity_level \
| fields - max_severity_level\
| `ssef_handle_no_results(1,"The mc_forwarder_output_throughput_limits summary job completed successfully without identifying any issues, and everything is operating as expected.")`

