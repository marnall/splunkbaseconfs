search_author = dluxton
updated_author = akhamis
related_info = <p><a href="https://splunkbase.splunk.com/app/7066" target="_blank">SA-DetectionInsights</a></p>\
<p></p>
severity_normal_text = <br/><p>All of the following criteria have been met:</p>\
<ul>\
<li>At least 95% of correlation rules are defining a security domain</li>\
<li>All the ootb security domains are in use</li>\
<li>The existing security domains have been expanded with custom domains</li>\
</ul>
severity_low_text = <br/><p>One of the following criteria has been met:</p>\
<ul>\
<li>custom domains not in use</li>\
<li>undefined security domains</li>\
<li>potentially underutilized security domain</li>\
<li>overutilized threat security domain</li>\
</ul>
severity_medium_text = <br/><p>Both. ofthe below criteria have been met:</p>\
<ul>\
<li>Not using custom security domains</li>\
<li>Missing coverage for 1 or more out of the box security domains</li>\
</ul>
description = <p>Security Domains are a useful categorisation for detections which allows for a quick understanding of the data source which triggered the alert.</p>\
<p>They can also be used to identify weak spots in detection catalogues and reporting on attack trends.</p>\
<p></p>\
<p>List of OOTB security domains:</p>\
<ul>\
<li>access</li>\
<li>audit</li>\
<li>endpoint</li>\
<li>identity</li>\
<li>network</li>\
<li>threat</li>\
</ul>
search = `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 action_notable_param_security_domain!="fraud" \
| eval summary_id="detection_security_domains" \
| stats latest(*) as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
| rename action_notable_param_security_domain as security_domain \
| eventstats count as total dc(security_domain) as num_domains \
| fillnull security_domain value="undefined" \
| stats values(total) as total values(num_domains) as num_domains count by label security_domain \
| eval count=if(security_domain="endpoint",238,'count'), total=330 \
| eval percentage=round(count/total*100,2), split=round(total/num_domains,0), upper=split*1.6, lower=split*0.2, domain_type=case(match(security_domain,"access|audit|endpoint|identity|network|threat"),"ootb",security_domain="undefined","undefined",true(),"custom") \
| eventstats count(eval(if(domain_type="ootb",domain_type,null()))) as ootb_domain_count, count(eval(if(domain_type="custom",domain_type,null()))) as custom_domain_count \
| eval severity_level = case ( ootb_domain_count<6 AND custom_domain_count=0,3, (security_domain="undefined" AND percentage>5) OR (count<lower AND security_domain!="threat") OR (count>upper AND security_domain="threat"),2, custom_domain_count=0,2, true(),1) \
| table label security_domain count custom_domain_count domain_type lower num_domains ootb_domain_count percentage split total upper severity_level\
| `ssef_handle_no_results(1,"The detection_security_domains summary job completed successfully without identifying any issues, and everything is operating as expected.")`

