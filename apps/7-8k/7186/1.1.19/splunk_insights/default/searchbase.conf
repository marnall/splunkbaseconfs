search_name = # of Unused Apps
readonly = 1
target_component = Apps and Add-ons
version = 1.1.1
date_updated = 2024-7-24 9:44:39
category = Splunk
sub_category = Apps
tags = Apps,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 05373357D9B86F2176E1AD810AFB948F
updated_author = akhamis
related_info = <ul>\
<li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/optimize/" target="_blank">Splunkbase - Managing and Optimizing App Usage</a></li>\
<li><a href="https://community.splunk.com/t5/Getting-Data-In/How-can-I-identify-unused-apps/m-p/403053" target="_blank">Splunk Answers - Identifying Unused Apps</a></li>\
</ul>
severity_normal_text = <br/><p>The application is being accessed regularly, reflecting a standard level of utilization within the system.</p>
severity_low_text = <br/><p>Although the app is currently in use, it is marked as archived in Splunkbase, which suggests that it may no longer receive updates. Considering this, it is advisable to carefully evaluate whether to uninstall the app.</p>
severity_medium_text = <br/><p>The app appears to be inactive, showing no signs of current usage. Given this, it is advisable to consider uninstalling it.</p>
severity_high_text = <br/><p>The app appears to be inactive, with no indications of current use. It is also marked as archived in Splunkbase, suggesting that it may no longer receive updates. Given these factors, it is advisable to consider uninstalling the app.</p>
description = <p>This search targets applications within the Splunk environment that have not been utilized within a specified time frame. It specifically excludes core and system applications to concentrate on those installed by users, calculating the number of these inactive apps. Identifying unused applications is crucial for optimizing system performance and resource allocation. By removing or repurposing these dormant apps, organizations can streamline their environments, potentially reduce costs, and ensure that active applications align more closely with current operational needs.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> App is not being utilized and status = Archived.</li>\
<li><strong>Medium:</strong> App is not being utilized.</li>\
<li><strong>Low:</strong> Currently in use but status = Archived.</li>\
<li><strong>Normal:</strong> Percent Supported > 70</li>\
</ul>
search = `ssef_summary(ssef_apps_local)` disabled=0 core=0 NOT app_name IN (`ssef_default_apps`) \
| eval summary_id="ssef_ia4s_apps_inventory_unused" \
| fields _time, label, name, role, Splunk_Instance, app_name, app_label, author, current_version, latest_version, build, check_for_updates, visible, sharing, disabled, configured, show_in_nav, description, updated \
| `ssef_splunkbase_apps(app_name)` \
| where isnotnull(uid) AND ! match(app_name, "^Splunk_\w+_\w+|(?i:alert)|(?i:^TA[-_])|(?i:_TA_)|(?i:-TA-)|(?i:[_-]TA$)|(?i:^SA[-_])|(?i:_SA_)|^DA-\w+-|^itsi") AND ! match(app_label,"(?i:addon)|(?i:add-on)|(?i:add\s+on)") \
| eval label=split(label,",") \
| stats count latest(app_label) as app_label values(label) as label latest(uid) as splunkbase_id latest(is_archived) as is_archived latest(description) as description latest(_time) as _time by app_name \
| join app_name type=left \
    [ search `ssef_summary(ssef_internal_web_access_tracker)` earliest=-30d@d \
    | stats latest(_time) as last_used max(num_users) as num_users by app \
    | rename app as app_name \
    | fields app_name last_used num_users ] \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( isnull(last_used) AND is_archived="true", high, isnull(last_used), medium, is_archived="true", low, true(), normal ) \
| eval label=mvjoin(label,",") \
| table _time app_name app_label splunkbase_id is_archived label last_used num_users severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_apps_inventory_unused summary job completed successfully without identifying any issues, and everything is operating as expected.")`

