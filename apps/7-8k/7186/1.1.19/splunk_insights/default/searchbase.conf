[ssef_ia4s_users_disk_quota]
search_name = Users Disk Quota
readonly = 1
target_component = Users
version = 2.0
date_created = 2024-1-11 12:19:19
date_updated = 2026-2-25 16:21:45
category = Splunk
sub_category = Users
tags = _internal,DispatchManager,Quota
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 26CC5FE7D95CC44433AC2CCD29FEE591
updated_author = akhamis
severity_normal_text = <br/><p>No instances of users exceeding disk usage quotas, suggesting that disk usage is within expected limits and operations are running smoothly without immediate resource constraints.</p>
severity_medium_text = <br/><p>Detects when any user encounters warnings or errors due to exceeding the maximum disk usage quota, indicating potential issues with resource allocation or user activity that could impact system performance and require intervention.</p>
description = <p>Detects users hitting the <b>maximum disk usage quota</b> by parsing <b>DispatchManager</b> WARN/ERROR events in <b>_internal</b>. Enriches results with instance labeling and user/role context to highlight who is impacted. Helps identify <b>quota-driven search failures</b> and operational governance gaps.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Disk quota warnings have been triggered, with over 100 queuing issues..</li>\
<li><strong>Normal:</strong> No disk quota warnings detected.</li>\
</ul>
explanation = <p>This search monitors splunkd DispatchManager warnings and errors that indicate a user exceeded the maximum disk usage quota for dispatched artifacts. It normalizes user identity, enriches events with instance metadata, and summarizes the most recent quota/usage context while counting how often the quota condition occurs per user. Quota hits can disrupt both ad-hoc and scheduled search execution, leading to user-impacting failures, degraded troubleshooting velocity, and noisy operational patterns. Use the output to identify repeat offenders, validate quota settings against expected workloads, and reduce disk footprint drivers (large results, export-heavy searches, long-running historical searches, or excessive report generation).</p>
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd component=DispatchManager ...</code><br> - Collect DispatchManager WARN/ERROR events indicating maximum disk usage quota enforcement.<br><b>02</b> <code>| fields ... | `ssef_instance_info(host)`</code><br> - Keep relevant quota/usage fields and enrich with instance label/name/role context.<br><b>03</b> <code>| eval ... | stats ... by label username</code><br> - Normalize username, derive search type, coalesce quota fields, and summarize latest context plus event volume per user.<br><b>04</b> <code>| eval severity_level=case(...)</code><br> - Assign severity based on frequency of quota enforcement to support triage and dashboards.
solution = <p>This KPI highlights users repeatedly exceeding DispatchManager disk usage quota, which can cause search dispatch failures and degrade operator productivity.</p><p><b>Suggested Actions</b>: Review the identified users’ high-footprint searches (large result sets, exports, long time ranges), reduce unnecessary output, tune search limits, and validate quota sizing for expected workflows. If a premium app stack is present, ensure scheduled workloads are sized and governed to avoid systematic quota pressure.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(num_queue&gt;200,5,num_queue&gt;100,3,num_queue&gt;0,2,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Managed scaling and operational guardrails that can help reduce platform friction from repeated dispatch quota pressure.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utility Apps</a><br>Administration and troubleshooting utilities that can help analyze dispatch artifacts, usage, and operational constraints.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=disk%20quota" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Find apps that help monitor and govern search workload footprint and dispatch artifacts.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: SPL Command Quick Reference</a><br>Reference for stats, eval, fields, and aggregation patterns used in this KPI.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search Reference</a><br>Core SPL documentation for maintaining internal telemetry searches.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Splunk Free Courses</a><br>Training resources to improve SPL efficiency and reduce high-footprint search behaviors.</li></ul>
viz_options = { "count":100 }
search = index=_internal sourcetype=splunkd component=DispatchManager log_level IN (WARN, ERROR) reason="The maximum disk usage quota*" \
| eval summary_id="ssef_ia4s_users_disk_quota" \
| fields _time component host user username quota reason usage log_level \
| `ssef_instance_info(host)` \
| eval username=coalesce(username,user) \
| eval concurrency_limit=concurrency_limit."MB" \
| eval srch_type=if(component="SearchScheduler","Scheduled","Ad-Hoc") \
| eval quota=coalesce(quota,concurrency_limit) \
| stats latest(_time) as _time latest(*) as * count as num_queue latest(name) as name values(role) as role dc(username) as num_users by label username \
| eval role=mvjoin(role, ":") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_queue > 100, medium, true(), normal ) \
| table _time label name role username quota usage reason srch_type num_queue severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_users_disk_quota summary job completed successfully without identifying any issues, and everything is operating as expected.")`

