[Total_#_of_Analytic_Capabilities_Export]
search_name = Total # of Analytic Capabilities Export
readonly = 1
search_hidden = 1
target_component = Capabilities
category = Splunk
sub_category = Capabilities
tags = IS4S Data Export,Summary
dispatch_earliest_time = -8d@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = B27F6D99EBBDBB62ED45AD366DFED701
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br><br>The total number of analytic capabilities identified in Splunk based on the selected time frame. In Splunk, an **analytic capability** is a component of a use case that can be determined from a given sourcetype or combination of sourcetypes. Currently, these analytic capabilities are matched to those defined in Splunk Lantern. For instance, a capability might involve a search analyzing proxy data to identify incoming requests by extracting and reporting on source IPs. This ability to measure source types and fields through search mechanisms demonstrates how different data streams can address multiple questions, each representing unique analytic capabilities.<br><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>While the number of capabilities indicates the platform's functional range and versatility for various use cases, the critical factor is their alignment with and impact on organizational objectives. It is vital to evaluate whether these capabilities are actively utilized and contribute to operational improvements and strategic decision-making. The true value of Splunk is reflected in its ability to help achieve business goals and enhance strategic processes.<br><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>Regular monitoring of this KPI <em>weekly</em>, <em>monthly</em>, <em>quarterly</em>, and <em>yearly</em> is recommended to ensure that Splunks capabilities are effectively utilized to meet organizational needs.</p>
search = | `ssef_license_search_data` \
| eval summary_id="Total_#_of_Analytic_Capabilities_Export" \
| where License_Usage > 0 \
| rename Sourcetype as sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type \
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type \
| stats max(num_searches) as num_searches by _time sourcetype data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUT use_case \
| stats max(num_searches) as num_searches by _time sourcetype use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type \
| stats max(num_searches) as num_searches by _time sourcetype use_case use_case_type \
| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()) , Analytic_Capability = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null()) \
| bin _time span=1d \
| addinfo \
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by sourcetype \
| eval perc_active = round((num_active_days / num_days) * 100, 2) \
| eval Active_Analytic_Capability = if((perc_active >= `ssef_perc_active_threshold`) AND num_searches > 0, Analytic_Capability, null() ) \
| stats \
    dc(Analytic_Capability) as Num_Analytic_Capabilities\
    dc(Active_Analytic_Capability) as Num_Active_Analytic_Capabilities\
    by _time \
| eval Perc_of_Regularly_Accessed_Analytic_Capabilities_to_total = round((Num_Active_Analytic_Capabilities / Num_Analytic_Capabilities) * 100, 2) \
| fillnull value=0 Num_Analytic_Capabilities, Num_Active_Analytic_Capabilities, Perc_of_Regularly_Accessed_Analytic_Capabilities_to_total \
| fields _time Num_Analytic_Capabilities Num_Active_Analytic_Capabilities Perc_of_Regularly_Accessed_Analytic_Capabilities_to_total \
| bin _time span=1d \
| stats max(Num_Analytic_Capabilities) as kpi_value by _time  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "Total # of Analytic Capabilities" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

