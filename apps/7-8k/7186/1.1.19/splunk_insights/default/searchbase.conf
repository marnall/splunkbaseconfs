search_name = # of Universal Forwarders
readonly = 1
diagnostic_searches = ssef_scma_forwarders_count_and_inventory
version = 2.0
date_created = 2024-5-19 15:6:14
date_updated = 2024-5-19 15:7:34
category = Splunk
sub_category = Forwarders
tags = Adoption,Details,Forwarders,Infrastructure
solution = <p>This search highlights trends in <b>Universal Forwarder deployment</b> over time.</p><p><b>Suggested Actions</b> Monitor growth trends to ensure indexing and network capacity scale appropriately. Investigate unexpected drops or spikes to identify decommissioned systems, onboarding waves, or configuration issues.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise.html" target="_blank">Products: Splunk Enterprise</a><br>Core platform for managing forwarder-based data ingestion.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Assistance with forwarder deployment strategy and scaling.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=forwarder%20monitoring" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps that provide visibility into forwarder health and inventory.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_scma_forwarders_count_and_inventory</code><br> - Retrieves summarized forwarder inventory data.<br><b>02</b> <code>| stats</code><br> - Aggregates forwarder counts by type and time.<br><b>03</b> <code>| eval</code><br> - Calculates Universal Forwarder totals for trend analysis.<br>
explanation = <p>Forwarders are the foundation of Splunk data collection, and understanding their population over time is critical for capacity planning, upgrade strategy, and operational health. Tracking Universal Forwarders separately highlights lightweight data collection adoption, while implicitly validating architectural best practices. Sudden changes in forwarder counts may indicate onboarding activity, infrastructure growth, or configuration drift. This insight helps administrators forecast resource needs, validate deployment standards, and align data ingestion strategy with business growth.</p>
quid = AD5157ED8A2518086FB1BB4957A09661
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/manage-forwarders" target="_blank">Splunk Help: Manage Forwarders</a><br>Guidance on configuring and managing Splunk forwarders.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/deploy-and-manage/forwarders" target="_blank">Splunk Help: Forwarder Deployment</a><br>Best practices for Universal and Heavy Forwarder deployments.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=forwarder%20inventory" target="_blank">Splunk Docs: Forwarder Inventory Searches</a><br>Search patterns for tracking forwarder populations.</li><li><a href="https://community.splunk.com/t5/Deployment-Architecture/bd-p/deployment-architecture" target="_blank">Community: Deployment Architecture</a><br>Community discussions on scaling and managing forwarders.</li></ul>
description = <p>This search tracks the <b>number of Splunk forwarders</b> over time.</p><p>It focuses on <b>Universal Forwarder adoption</b> to understand deployment scale and growth.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_scma_forwarders_count_and_inventory)` unique_forwarders=* \
| fields _time destPort version fwdType unique_forwarders \
| bin _time span=1d \
| stats max(unique_forwarders) as unique_forwarders by _time destPort version fwdType \
| stats sum(unique_forwarders) as num_forwarders_by_type by _time fwdType \
| stats sum(eval(if(fwdType=="uf", num_forwarders_by_type, 0))) as num_uf, sum(eval(if(fwdType=="full", num_forwarders_by_type, 0))) as num_full by _time \
| eval total_forwarders = num_uf + num_full \
| stats max(num_uf) as "# of Universal Forwarders" by _time

