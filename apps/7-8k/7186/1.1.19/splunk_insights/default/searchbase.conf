[ssef_scma_search_result_accuracy]
search_name = Detected Search Errors
readonly = 1
target_component = Search & Visualization
version = 2.0
date_created = 2022-09-14
date_updated = 2026-2-9 9:28:22
category = Splunk
sub_category = Search
tags = Search,Errors
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 9B66B910B982A48F8D56221513CC1E9F
updated_author = akhamis
related_info = <div class="diag-content-box"><div class="diag-content"><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/latest/DistSearch/ViewdistsearchstatusinDMC" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/DistSearch/ViewdistsearchstatusinDMC</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div></div>
severity_normal_text = <br/><p>No error messages have been detected in the environment; all systems appear to be functioning normally.</p>
severity_low_text = <br/><p>Over the last 2 days, we have detected more than 10 warning messages. Please verify the accuracy of the identified searches and implement any required corrections to ensure these searches execute successfully.</p>
severity_medium_text = <br/><p>Over the last 2 days, we have detected more than 25 error messages. Please verify the accuracy of the identified searches and implement any required corrections to ensure these searches execute successfully.</p>
severity_high_text = <br/><p>Over the last 2 days, we have detected more than 50 error messages. Please verify the accuracy of the identified searches and implement any required corrections to ensure these searches execute successfully.</p>
description = <p>This search summarizes <b>search job tracker</b> message telemetry to quantify <b>result accuracy signals</b> across searches. It counts distinct <b>info</b>, <b>warn</b>, and <b>error</b> message occurrences to highlight reliability hotspots. Use it to prioritize remediation where elevated error volume suggests degraded search outcomes.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
explanation = <p>When search jobs emit rising <b>error_messages</b> or persistent <b>warn_messages</b>, teams can lose confidence in dashboards, alerts, and ad-hoc investigations because outputs may be incomplete, delayed, or misleading. By tracking the distinct message counts per label, this search helps admins and platform owners separate isolated noise from systemic reliability patterns across apps and owners. The resulting severity score supports operational triage, so engineering effort goes first to the searches most likely to be producing inaccurate or unstable results. Over time, trending these counts can validate tuning work (macros, field extractions, data quality, dispatch settings) and reduce incident churn tied to inconsistent search outcomes.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_search_jobs_tracker)`</code><br> - Pull the summarized search job telemetry dataset required for downstream accuracy scoring.<br><b>02</b> <code>| eval summary_id="ssef_scma_search_result_accuracy"</code><br> - Stamp a stable identifier so results can be tracked and compared across collection runs.<br><b>03</b> <code>| foreach info_messages, warn_messages, error_messages [ eval &lt;&lt;FIELD&gt;&gt; = split('&lt;&lt;FIELD&gt;&gt;', "#####")]</code><br> - Normalize message fields into arrays so distinct message counts reflect unique message occurrences.<br><b>04</b> <code>| stats dc(info_messages) AS num_info_messages dc(warn_messages) AS num_warn_messages dc(error_messages) AS num_error_messages latest(name) as name by label</code><br> - Aggregate per label to quantify how many unique info/warn/error messages are being produced.<br><b>05</b> <code>| eval total_messages = num_info_messages + num_warn_messages + num_error_messages</code><br> - Create a single workload indicator to quickly spot high-volume message emitters.<br><b>06</b> <code>| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_error_messages &gt;= 50, high, num_error_messages &gt;= 25, medium ,num_warn_messages &gt;= 10, low, true(), normal )</code><br> - Translate message volume into an operational severity score for triage and escalation.<br><b>07</b> <code>| table _time label name num_info_messages num_warn_messages num_error_messages severity_level</code><br> - Present a concise, review-ready table for owners to action by severity.<br><b>08</b> <code>| `ssef_handle_no_results(1,"The ssef_scma_search_result_accuracy summary job completed successfully without identifying any issues, and everything is operating as expected.")`</code><br> - Ensure a clear success message when no problematic signals are detected.</br>
solution = <p>This view highlights labels producing elevated <b>error</b> or <b>warning</b> message volumes so you can focus reliability work where it most impacts trust in search outputs.</p><p><b>Suggested Actions</b> Review the top labels with higher severity and validate underlying saved searches for data availability, macro failures, field extraction issues, and dispatch/runtime constraints; then reduce recurring warn/error patterns and re-run to confirm improvement.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products.html" target="_blank">Products: Splunk Products (Overview)</a><br>Explore Splunk platform capabilities that align to improving reliability, governance, and operational insights.</li><li><a href="https://www.splunk.com/en_us/resources.html" target="_blank">Services: Splunk Resources Library</a><br>Find guided materials and enablement resources to operationalize troubleshooting and governance practices.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Splunk Free Training Courses</a><br>Upskill admins and power users on SPL, troubleshooting workflows, and platform operations fundamentals.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=search%20jobs%20tracker" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps and add-ons that can help with search governance, troubleshooting, and operational visibility.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Search Commands Overview</a><br>Reference for SPL command categories to interpret and optimize pipeline behavior.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: Command Quick Reference</a><br>Quick lookup for common SPL commands used in troubleshooting and aggregation.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/evaluation-functions/evaluation-functions" target="_blank">Splunk Help: Evaluation Functions</a><br>Details on eval functions to reason about split(), math, and conditional severity scoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/understanding-spl-syntax" target="_blank">Splunk Help: Understanding SPL Syntax</a><br>Foundational SPL syntax guidance to reduce parsing mistakes and improve maintainability.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/time-format-variables-and-modifiers/date-and-time-format-variables" target="_blank">Splunk Help: Date and Time Variables</a><br>Time formatting reference for accurate table/timeline interpretation and alignment.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Splunk Blogs: SPL Cheat Sheet</a><br>Practical SPL patterns and command examples useful for troubleshooting search behavior.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.1/meet-splunk-apps/apps-and-add-ons" target="_blank">Splunk Help: Apps and Add-ons</a><br>Background on how apps/package content is managed, helpful when issues correlate to specific apps.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_search_jobs_tracker)` \
| eval summary_id="ssef_scma_search_result_accuracy" \
| foreach info_messages, warn_messages, error_messages \
    [ eval <<FIELD>> = split('<<FIELD>>', "#####")] \
| stats dc(info_messages) AS num_info_messages dc(warn_messages) AS num_warn_messages dc(error_messages) AS num_error_messages latest(name) as name by label \
| eval total_messages = num_info_messages + num_warn_messages + num_error_messages \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_error_messages >= 50, high, num_error_messages >= 25, medium ,num_warn_messages >= 10, low, true(), normal ) \
| table _time label name num_info_messages num_warn_messages num_error_messages severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_result_accuracy summary job completed successfully without identifying any issues, and everything is operating as expected.")`

