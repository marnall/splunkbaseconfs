solution = <p>Provides insight into the scale and persistence of HTTP Event Collector forwarding errors, enabling proactive troubleshooting.</p><p><b>Suggested Actions</b><br><b>1.</b> Check HEC token configurations and permissions.<br><b>2.</b> Verify source system network connectivity.<br><b>3.</b> Review HTTP input size limits and payload formatting.<br><b>4.</b> Investigate repeated failures from the same source_IP.<br><b>5.</b> Enable additional logging for persistent high-severity cases.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (avg_fwd_httpIssue&lt;=2,1, avg_fwd_httpIssue&lt;=5,2, avg_fwd_httpIssue&lt;=10,3, avg_fwd_httpIssue&lt;=20,4, avg_fwd_httpIssue&gt;20,5)</code></pre><p>Add before the final <code>| table</code> to classify alert severity. <b>Adjust thresholds</b> to reflect environment-specific tolerance for HTTP event failures.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> 0–2 average daily unique failures.</li><li><b>Low (Severity 2):</b> 3–5 failures.</li><li><b>Medium (Severity 3):</b> 6–10 failures.</li><li><b>High (Severity 4):</b> 11–20 failures.</li><li><b>Critical (Severity 5):</b> More than 20 failures — immediate HEC troubleshooting required.</li></ul>
