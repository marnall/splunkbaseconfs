tags = Ingestion,KPIs,Licensing
solution = <p>This search helps monitor ingestion trends, ensuring license compliance and identifying potential overages for proactive management.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor overall averages and identify patterns of high ingestion.<br><b>2.</b> Investigate spikes in weekend usage to optimize off-hour workloads.<br><b>3.</b> Compare trends against licensed limits to ensure compliance.<br><b>4.</b> Plan for additional license capacity if ingestion consistently approaches limits.<br><b>5.</b> Set alerts for significant deviations from normal ingestion patterns.</p><p><b>Recommended Alerts</b></p><p><b>Normal: </b> Notify if ingestion remains below 70% of licensed limits.</p><p><b>Low: </b> Alert if ingestion exceeds 70% but remains below 90% of licensed limits.</p><p><b>Medium: </b> Alert if ingestion exceeds 90% of licensed limits.</p><p><b>High: </b> Escalate if daily usage exceeds licensed limits by over 10%.</p><p><b>Critical: </b> Trigger emergency alerts if ingestion significantly exceeds licensed limits.</p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_telemetry source=*/license_usage_summary.log type=RolloverSummary</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Collects telemetry data on license usage.<br><b>02</b> <code>eval date_wday and daytype</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Categorizes ingestion data into weekday and weekend usage.<br><b>03</b> <code>eval GB</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Converts byte data into GB for readability.<br><b>04</b> <code>bucket and stats</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Groups data by daily intervals and aggregates ingestion metrics.<br><b>05</b> <code>eval overall average</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Identifies potential overages for GB-licensed environments.<br><b>06</b> <code>transpose</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Formats the table for easier visualization of usage trends.<br>
explanation = <p>This search calculates <b>daily GB ingestion</b> from telemetry logs, categorizes usage by weekdays and weekends, and evaluates overall trends. It identifies maximum, minimum, and average usage while checking for potential license overages.</p><p>- Uses <b>bucket</b> to group data by daily intervals.<br>- Aggregates ingestion metrics for <b>weekend</b> and <b>weekday</b> patterns.<br>- Calculates overall averages and highlights overages for GB-licensed environments.<br>- Outputs a transposed table summarizing usage trends for easier visualization.</p><p>This analysis supports license compliance, capacity planning, and workload optimization by identifying key ingestion patterns.</p>
quid = F6FBD633EBDB3B4D269588B64B41C5D7
search_author = Splunk Searchbase Assistant
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Bucket" target="_blank">Bucket Command Documentation</a><br>Learn about bucketing data for time-based grouping.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Stats" target="_blank">Stats Command Documentation</a><br>Details on aggregating data with stats.</li></ul>
description = <b>Analyzes daily telemetry license usage</b> to identify patterns across weekdays and weekends, and highlights potential license overages.
search = index=_telemetry source=*/license_usage_summary.log type=RolloverSummary \
| eval date_wday=lower(strftime(_time,"%A")) \
| eval date_w=strftime(_time,"%d-%b-%y %a") \
| eval daytype=if(date_wday = "sunday" OR date_wday = "saturday","weekend","weekday") \
| eval GB=b/1024/1024/1024 \
| bucket _time span=1d \
| stats sum(GB) as GB by _time daytype \
| stats avg(eval(if(daytype="weekend",GB, null()))) as Weekend avg(eval(if(daytype="weekday",GB, null()))) as Weekday max(GB) as "Max Daily" min(GB) as "Min Daily" avg(GB) as "OverallAverage" \
| eval "Overall Average"=if(license_type="GB" AND OverallAverage > SizeGB ,tostring(round(OverallAverage,0),"commas")." (over ".SizeGB."GB license)",OverallAverage) \
| fields - OverallAverage SizeGB license_type stack \
| transpose \
| eval "row 1"=round('row 1', 2) \
| rename column as Days "row 1" as "Volume (GB)"

