[mc_system_python_version_in_acceptable_range_check]
search_name = Python Version Usage
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Search & Visualization
version = 1.0.3
date_updated = 2025-8-21 10:32:27
category = Health Check
sub_category = Search
tags = Configuration,Health Check,Monitoring Console,Splunk 10,Summary
solution = If your Splunk platform instance runs version 9.3.x or 9.4.x, you can force usage of Python v3.9 by setting "python.version=force_python3" in the server.conf configuration file. This lets you verify app and add-on functionality before an upgrade. \
\
Splunk Enterprise version 9.2.x or lower does not include Python v3.9. Splunk Enterprise versions 9.3.x and 9.4.x do, but have the option to run lower versions of Python. If you don't know whether your app or add-on is compatible with Python v3.9, use a Splunk 10.0 lab environment to test your apps and add-ons before you upgrade production systems.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = C9FDF557D0B9DDBFA47021C8627E7540
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = One or more Spunk Instance is not using the Python 3.9 runtime environment.
severity_high_text = One or more Spunk Instance is not using the Python 3.9 runtime environment.
description = Evaluates the current Python runtime environment used by each Splunk platform instance by determining the Splunk platform version and global Python runtime configuration for the usage of the Python version 3.9 environment. Marks as Critical if any instance is not configured to force usage of Python v3.9.
search = | rest `ssef_rest_target` `ssef_rest_timeout` services/configs/conf-server \
| eval summary_id="mc_system_python_version_in_acceptable_range_check" \
| fields splunk_server, python.version \
| search python.version = * \
| join type=left splunk_server \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /services/server/info \
    | fields splunk_server version ] \
| rename splunk_server AS instance \
| rename python.version AS python_version \
| eval version = split(version, ".") \
| eval major = mvindex(version, 0) \
| eval minor = mvindex(version, 1) \
| eval metric = case( \
    (major >= 10 OR (major = 9 AND minor >= 3)) AND python_version="force_python3", "Your Splunk platform deployment is configured to use Python 3.9.", \
    major < 8, "Your Splunk platform deployment is configured to use Python 2.7.", \
    python_version="force_python3", "Your Splunk platform deployment is configured to use Python 3.7.", \
    true(), "Your Splunk platform deployment is configured to use " . python_version . ".") \
| eval severity_level = case ( \
    metric="Your Splunk platform deployment is configured to use Python 3.9.", 1, \
    metric="Your Splunk platform deployment is configured to use Python 3.7.", 3, \
    metric="Your Splunk platform deployment is configured to use Python 2.7.", 3, \
    true(), 3) \
| table instance python_version metric severity_level \
| `ssef_handle_no_results(1,"The mc_system_python_version_in_acceptable_range_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

