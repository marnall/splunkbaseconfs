execution_plan = <b>01</b> <code>`ssef_summary(ssef_internal_web_access_tracker)`</code><br> - Collects summarized web usage metrics to identify active application usage.<br><b>02</b> <code>| mstats avg(cpu), avg(memory)</code><br> - Retrieves average per-process CPU and memory utilization for each app.<br><b>03</b> <code>| eval resource_intensity_score</code><br> - Calculates a weighted score to rank apps by combined resource consumption.<br>
explanation = <p>Understanding which Splunk applications consume the most system resources relative to their active user base is critical for maintaining platform performance and scalability. This search combines web usage telemetry with internal process-level CPU and memory metrics to surface apps that have a disproportionate impact on infrastructure. By ranking applications using a composite <b>resource intensity score</b>, administrators can prioritize tuning, capacity planning, or architectural changes. These insights support proactive performance management and help prevent high-impact apps from degrading the user experience.</p>
quid = DE2D3E4F3688202E0E95C2785DB0365C
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.1/monitoring-splunk-enterprise/about-monitoring-splunk-enterprise" target="_blank">Splunk Help: Monitoring Splunk Enterprise</a><br>Guidance on monitoring system performance, resource usage, and application impact.</li><li><a href="https://lantern.splunk.com/Search?q=Search%20Performance" target="_blank">Lantern: Search Performance</a><br>Best practices for optimizing search performance and reducing resource consumption.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=resource%20usage" target="_blank">Splunk Docs: Resource Usage Searches</a><br>Reference material for searches related to CPU, memory, and process-level metrics.</li></ul>
description = <p>This search correlates <b>application user activity</b> with <b>CPU and memory consumption</b> to identify Splunk apps that are both actively used and resource intensive.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_internal_web_access_tracker)` app=* \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1h \
| stats latest(*) as * by _time, label, type, app, view \
| eval users_mv=split(users_mv,", ") \
| `ssef_regularly_seen(app)` \
| stats sum(num_users) as num_users values(view) as view values(users_mv) as users_mv by app \
| eval num_users = if(isnotnull(users_mv), mvcount(users_mv), num_users) \
| fields app num_users view \
| append \
    [| mstats fillnull_value=0 \
        avg(spl.intr.resource_usage.PerProcess.data.mem_used) as avg_mem_used \
        avg(spl.intr.resource_usage.PerProcess.data.normalized_pct_cpu) as avg_normalized_pct_cpu \
        WHERE index=_metrics AND sourcetype=splunk_intro_resource_usage AND component=PerProcess\
        by data.search_props.app \
    | rename data.search_props.app as app \
    | where app!="0" ] \
| eval app = lower(app) \
| stats max(avg_normalized_pct_cpu) as avg_normalized_pct_cpu, max(avg_mem_used) as avg_mem_used, max(num_users) as total_users latest(app) as App by app \
| where total_users > 0 AND avg_normalized_pct_cpu > 0 \
| eval resource_intensity_score = (avg_normalized_pct_cpu * 0.75) + (avg_mem_used * 0.25) \
| sort - resource_intensity_score \
| foreach avg_normalized_pct_cpu avg_mem_used \
    [| eval <<FIELD>>=round(<<FIELD>>, 2) ] \
| table App total_users avg_normalized_pct_cpu avg_mem_used resource_intensity_score \
| rename total_users as "Total Users", avg_normalized_pct_cpu as "Avg CPU Usage (%)", avg_mem_used as "Avg Memory Used (MB)", resource_intensity_score as "Resource Intensity Score"

