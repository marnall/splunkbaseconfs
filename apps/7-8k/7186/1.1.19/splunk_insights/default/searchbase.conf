solution = <p>This search provides visibility into Splunk ES user activity, enabling teams to monitor search behavior, identify potential misuse, and ensure operational compliance.</p><p><b>Suggested Actions</b><br><b>1.</b> Review ES user activity to ensure efficient and compliant usage.<br><b>2.</b> Investigate high activity levels in specific apps or views to detect potential misuse.<br><b>3.</b> Monitor ad-hoc searches and scheduled searches for unusual patterns.<br><b>4.</b> Use enriched metadata to identify users or teams requiring additional training.<br><b>5.</b> Ensure access to ES apps and views aligns with organizational policies.</p><p><b>Recommended Alerts</b></p><p><b>Normal: </b> Notify if ES user activity remains within expected thresholds.</p><p><b>Low: </b> Alert if activity exceeds 80% of the average for a given period.</p><p><b>Medium: </b> Trigger alerts for users with unusually high activity levels.<br></p><p><b>High: </b> Escalate if specific apps or views are accessed excessively without justification.</p><p><b>Critical: </b> Trigger immediate action if unauthorized users access ES apps or views.</p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>ssef_summary(ssef_internal_web_access_tracker)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieves internal web access data related to Splunk ES user activity.<br><b>02</b> <code>fields</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Selects relevant fields for analyzing user activity, such as apps, views, and time spent.<br><b>03</b> <code>eval es_activity</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Categorizes user activity as ES-related based on app and view patterns.<br><b>04</b> <code>`ssef_app_info(app)`</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Enriches the data with additional app metadata for context and reporting.<br>
explanation = <p>This search detects user activity within <b>Splunk Enterprise Security (ES)</b>, identifying both scheduled and ad-hoc searches across various ES-related apps and views. The search provides visibility into user interactions, search types, and application-level activity for deeper operational insights.</p><p>- Queries the <b>ssef_internal_web_access_tracker</b> to track web access data.<br>- Filters activity related to a comprehensive list of <b>Splunk ES apps</b> and views.<br>- Uses <b>eval</b> to categorize activity as ES-related or not based on app and view criteria.<br>- Enriches the data with application metadata for further context.</p><p>This analysis helps monitor ES user activity, ensure proper access controls, and identify patterns in search behavior for improved security and operational compliance.</p>
quid = 5E52304F3F24F2B6EF6E6F5C4B80BF71
