\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span></p>\
Tracking this KPI is vital for assessing Splunks value, as it provides insights into user behavior, underscores the relevance of specific data and metrics, and shows Splunks influence on operational efficiency and decision-making. This logic is not a one size fits all indicator of value. Some dashboards may be incredibly valuable but only accessed when needed, which could depend upon the situation. Keep this in mind as you make decisions about your dashboard inventory.\
\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span></p>\
This is an important KPI to measure <em>weekly</em>, <em>monthly</em>, and <em>quarterly</em>.
search = `ssef_summary(ssef_internal_web_access_tracker)` type!=system view=* \
| eval summary_id="#_of_Regularly_Used_Dashboards_Export" \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
