description = <p>This search summarizes <b>distinct sourcetypes by domain</b> using UCE lookup enrichment. It highlights how data is distributed across <b>business and operational domains</b> to support governance and onboarding decisions.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
explanation = <p>This search builds a domain view by enriching sourcetypes with UCE mappings and then counting how many distinct sourcetypes map to each domain. This helps platform owners and data stewards see where data coverage is concentrated and where domains may be underrepresented, which impacts readiness for analytics, use-case enablement, and roadmap planning. For administrators, it provides a practical way to validate sourcetype classification quality and spot mapping drift that can reduce downstream content accuracy. For leaders, the domain breakdown supports decisions around investment, ownership, and alignment of license spend with the highest-value domains.</p>
execution_plan = <b>01</b> <code>| `ssef_license_search_data`</code><br> - Load summary dataset used by Searchbase/IS4S license and search usage reporting.<br><b>02</b> <code>| stats ... by Sourcetype</code><br> - Aggregate max license usage and search volume per sourcetype to establish a clean per-sourcetype baseline.<br><b>03</b> <code>| lookup uce_*_sourcetype_mapping ...</code><br> - Enrich sourcetypes with domain/data_type/category so results align to UCE classification and coverage expectations.<br><b>04</b> <code>| mvexpand use_case</code><br> - Expand mapped use cases to ensure domain can be derived even when sourcetype domain is missing or multi-valued.<br><b>05</b> <code>| eval domain = mvdedup(coalesce(...))</code><br> - Resolve final domain assignment deterministically by preferring sourcetype mapping and falling back to use-case domain.<br><b>06</b> <code>| stats dc(sourcetype) ... | sort</code><br> - Count distinct sourcetypes by domain and rank domains to highlight where data coverage is strongest.
solution = <p>This search provides a ranked list of <b>domains</b> by the number of distinct <b>sourcetypes</b> mapped to each domain.</p><p><b>Suggested Actions</b></p><ul><li>Validate the top domains: confirm ownership, normalization standards, and mapping accuracy for high-volume sourcetypes.</li><li>Investigate domains with low coverage: determine whether this is expected or indicates a data onboarding gap for priority use cases.</li><li>Review “Unclassified” results: update UCE lookup mappings to improve downstream content relevance and reporting accuracy.</li><li>Use results for roadmap alignment: ensure license usage and onboarding effort match strategic domain priorities.</li></ul><p><b>Recommended For You:</b></p><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Managed Splunk platform for scalable ingestion, search, and governance across domains.</li><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Service-centric monitoring and KPI modeling to operationalize domain-aligned data into outcomes.</li><li><a href="https://www.splunk.com/en_us/products/observability-cloud.html" target="_blank">Products: Splunk Observability Cloud</a><br>Unified metrics/logs/traces to improve domain visibility and accelerate troubleshooting workflows.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services and Support</a><br>Adoption and operational support to improve data mapping, governance, and outcome-driven enablement.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=license%20sourcetype%20domain%20mapping" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Find apps for license monitoring, sourcetype governance, and domain reporting using these extracted keywords.</li></ul>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: SPL Command Quick Reference</a><br>Reference for SPL commands used throughout this search (stats, lookup, eval, mvexpand, sort).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/understanding-spl-syntax" target="_blank">Splunk Help: Understanding SPL Syntax</a><br>Guidance on SPL structure to help teams maintain consistent, readable searches.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/evaluation-functions/evaluation-functions" target="_blank">Splunk Help: Evaluation Functions</a><br>Details on eval functions relevant to this search (coalesce, split, mvdedup).</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Splunk Blogs: Splunk Cheat Sheet (SPL)</a><br>Quick learning resource for SPL patterns and command usage aligned to this query.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.1/meet-splunk-apps/apps-and-add-ons" target="_blank">Splunk Help: Apps and Add-ons</a><br>Explains how apps/add-ons extend Splunk and support sourcetype onboarding and governance.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Category</a><br>Utility apps that can help with administration, configuration, and knowledge object management.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunkbase: IT Operations Management Category</a><br>Apps supporting operational monitoring and reporting that commonly align with domain-based governance.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Free Splunk Courses</a><br>Enablement paths to improve SPL proficiency and operational reporting practices.</li><li><a href="https://lantern.splunk.com/Search?q=license%20usage" target="_blank">Lantern: License Usage Search</a><br>Lantern search results for guidance on license usage practices (provisionally validated).</li></ul>
viz_options = { "count":100 }
search = | `ssef_license_search_data`\
| stats \
    Max(License_Usage_GB) as License_Usage_GB\
    Max(License_Usage) as License_Usage\
    Max(num_searches) as num_searches\
    values(Index_Name) as Index_Name\
    by Sourcetype \
| fillnull value=0 License_Usage_GB License_Usage num_searches \
| where License_Usage >= 0 AND num_searches >= 0 \
| rename Sourcetype as sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT domain data_type \
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW domain data_type category \
| rename domain as sourcetype_domain \
| eval sourcetype_domain=split(mvdedup(sourcetype_domain),"|") , category=split(mvdedup(category),"|") , data_type=mvdedup(data_type) \
| lookup uce_usecase_mapping data_type AS data_type OUTPUT use_case as use_case \
| mvexpand use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT domain as use_case_domain \
| eval use_case_domain=split(use_case_domain,"|") \
| eval domain = mvdedup(coalesce(sourcetype_domain, use_case_domain)) \
| stats values(Index_Name) as Index_Name Max(num_searches) as "Num Searches" Max(License_Usage_GB) as "License Usage (GB)" values(domain) as domain values(data_type) as "Data Type" values(category) as Category by sourcetype \
| fillnull value="Unclassified" domain category data_type \
| stats dc(sourcetype) as "# of Sourcetypes" by domain \
| sort 1 - "# of Sourcetypes" \
| rename domain as Category \
| fields Category

