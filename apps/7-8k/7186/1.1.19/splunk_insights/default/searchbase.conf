solution = <p>This search provides visibility into ad-hoc searches interacting with specific sourcetypes, enabling teams to monitor user activity and assess sourcetype interactions for operational insights.</p><p><b>Suggested Actions</b><br><b>1.</b> Review ad-hoc searches referencing "WinEventLog" to ensure efficient and compliant usage.<br><b>2.</b> Identify and address users with high search counts or excessive search times.<br><b>3.</b> Investigate sourcetype interactions for potential optimization opportunities.<br><b>4.</b> Share findings with stakeholders to align on ad-hoc search strategies.<br><b>5.</b> Monitor session counts and user activity to detect unusual behavior.</p><p><b>Recommended Alerts</b></p><p><b>Normal: </b> Notify if sourcetype interactions remain within expected thresholds.</p><p><b>Low: </b> Alert if user search activity exceeds 150% of the average for a given period.</p><p><b>Medium: </b> Trigger alerts for users with excessive search times or session counts.<br></p><p><b>High: </b> Escalate if ad-hoc searches heavily impact critical sourcetypes.</p><p><b>Critical: </b> Trigger immediate action if unauthorized users interact with sensitive sourcetypes.</p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>ssef_summary(ssef_audit_user_login_tracker)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Collects user activity data related to ad-hoc searches.<br><b>02</b> <code>sourcetype_reference="*WinEventLog*"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters interactions with the "WinEventLog" sourcetype.<br><b>03</b> <code>fields</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Selects relevant fields for analysis.<br><b>04</b> <code>bin</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Groups data into 1-hour intervals for temporal analysis.<br><b>05</b> <code>stats latest(*) as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates the latest values for key fields by time, label, app, and user.<br><b>06</b> <code>makemv</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Splits sourcetype references into multivalue fields for detailed analysis.<br><b>07</b> <code>stats</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Summarizes sourcetype interactions, search head activity, and user metrics.<br>
explanation = <p>This search examines <b>ad-hoc searches</b> that interact with specific sourcetypes, focusing on "WinEventLog." It provides insights into user activity, including the number of searches, total search time, and session details. While field-level usage is not visible here, the search highlights sourcetype interactions and user activity patterns.</p><p>- Retrieves user activity data from <b>ssef_audit_user_login_tracker</b>.<br>- Filters interactions with the "WinEventLog" sourcetype.<br>- Aggregates search activity by user, including metrics such as the number of searches, session counts, and total search time.<br>- Outputs a summary table showing sourcetype interactions, search heads, apps, and user metrics.</p><p>This analysis helps monitor ad-hoc search usage, identify active users, and assess sourcetype interactions for operational insights.</p>
quid = 1B432CE6C027D56EAB682A57DEA8682B
search_author = Splunk Searchbase Assistant
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/UserActivity" target="_blank">User Activity Documentation</a><br>Details on monitoring user activity in Splunk.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Stats" target="_blank">Stats Command Documentation</a><br>Learn how to aggregate data using stats.</li></ul>
description = <b>Analyzes ad-hoc searches interacting with specific sourcetypes</b>, particularly "WinEventLog."
search = `ssef_summary(ssef_audit_user_login_tracker)` sourcetype_reference="*WinEventLog*" \
| fields sourcetype_reference _time app label latest_logon latest_search name session num_searches search_type total_search_time user \
| bin _time span=1h \
| stats latest(*) as * by _time label app user \
| makemv delim="|" sourcetype_reference \
| stats values(sourcetype_reference) as "Sourcetype Interactions" values(label) as "Search Head(s)" values(app) as App latest(latest_logon) as latest_logon earliest(latest_logon) as earliest_logon latest(_time) as "Latest Interaction" sum(num_searches) as "Num of Searches" sum(total_search_time) as total_search_time dc(session) as num_auth by user

