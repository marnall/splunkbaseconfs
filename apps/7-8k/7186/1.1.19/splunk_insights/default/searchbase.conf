[ssef_identities]
search_name = Identities Inventory
readonly = 1
target_component = Inventory
version = 2.0.2
date_updated = 2026-2-27 15:11:55
category = Splunk
sub_category = Users
tags = Discovery,Inventory,REST,Users
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 9D947AC08F0B50F006E390064ECF3A41
updated_author = akhamis
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>Builds a normalized <b>identity inventory</b> using REST user data and maintains a synchronized summary/lookup dataset. Supports <b>access governance</b>, role mapping validation, and capability auditing.</p>
explanation = <p>This search queries the authentication users REST endpoint to retrieve live identity metadata including roles, capabilities, authentication type, and account attributes. It normalizes multivalue fields for deterministic comparison, enriches results with instance metadata, and appends previously summarized data to maintain continuity. The workflow updates a managed lookup for downstream governance checks while outputting the authoritative summary dataset. This provides a consistent identity baseline for privilege monitoring, role validation, and compliance review.</p>
execution_plan = <b>01</b> <code>| rest /servicesNS/-/-/authentication/users</code><br> - Retrieve current user identities and role mappings from REST.<br><b>02</b> <code>| rename / eval normalization</code><br> - Normalize identity fields, enforce lowercase formatting, and align metadata.<br><b>03</b> <code>| `ssef_instance_info(...)`</code><br> - Enrich with deployment label and role metadata.<br><b>04</b> <code>| stats ... by label identity</code><br> - Consolidate identity attributes into authoritative summary form.<br><b>05</b> <code>| append summary → outputlookup</code><br> - Maintain synchronized lookup state for downstream security controls.<br><b>06</b> <code>| table ...</code><br> - Emit normalized identity summary dataset.
solution = <p>This search establishes the authoritative user inventory baseline for governance analytics, privilege validation, and compliance auditing.</p><p><b>Suggested Actions</b>: Use this dataset to validate least-privilege alignment, monitor capability drift, identify unused or stale accounts, and enforce authentication policy consistency across instances.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/manage-users-and-authentication/about-user-authentication" target="_blank">Splunk Help: About user authentication</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/configuration-file-reference/authorize.conf" target="_blank">Splunk Help: authorize.conf reference</a></li></ul>
viz_options = { "count":100 }
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/authentication/users  \
| eval summary_id="ssef_identities" \
| rename title AS identity , realname AS emp_name roles AS splunk_role_map type AS auth_type \
| eval Splunk_Instance = lower(splunk_server), identity = lower(trim(identity)), email = lower(email) \
| `ssef_instance_info(Splunk_Instance)` \
| stats \
    LAST(emp_name) AS emp_name \
    LAST(email) AS emp_email \
    VALUES(splunk_role_map) AS splunk_role_map\
    VALUES(Splunk_Instance) AS Splunk_Instance\
    VALUES(role) AS role\
    VALUES(auth_type) AS auth_type\
    VALUES(capabilities ) AS capabilities \
    LAST(locked-out) AS locked_out\
    LAST(lang) AS lang \
    LAST(tz) AS tz\
    LAST(last_successful_login) AS last_successful_login\
    LAST(defaultApp) AS defaultApp\
    LAST(defaultAppIsUserOverride) AS defaultAppIsUserOverride\
    LATEST(name) AS name\
    by label, identity \
| eval _time = now() \
| foreach role, Splunk_Instance, splunk_role_map, auth_type, capabilities \
    [ eval <<FIELD>>=mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| eval is4s="summary" \
| append \
    [| search `ssef_summary(ssef_identities)` \
    | foreach role, Splunk_Instance, splunk_role_map, auth_type, capabilities \
        [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
    | stats latest(_time) as _time VALUES(splunk_role_map) AS splunk_role_map , VALUES(role) AS role, VALUES(Splunk_Instance) AS Splunk_Instance, VALUES(capabilities) AS capabilities latest(*) as * LATEST(name) AS name\
        by label identity \
    | foreach role, Splunk_Instance, splunk_role_map, auth_type, capabilities \
    [ eval <<FIELD>>=mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
    | table _time identity label name Splunk_Instance emp_name emp_email auth_type last_successful_login locked_out defaultApp defaultAppIsUserOverride tz lang role splunk_role_map capabilities \
    | outputlookup ssef_identities_lookup CreateInApp=True Create_Empty=True Override_If_Empty=false \
    | stats count as num_items \
    | eval is4s="lookup" ] \
| where is4s="summary" \
| table _time identity label name Splunk_Instance emp_name emp_email auth_type last_successful_login locked_out defaultApp defaultAppIsUserOverride tz lang role splunk_role_map capabilities severity_level \
| `ssef_handle_no_results(1,"The ssef_identities summary job completed successfully without identifying any issues, and everything is operating as expected.")`

