[ssef_entitlements_csv_lookup]
search_name = Splunk Enterprise Estimated Entitlement Discovery Job.
readonly = 1
target_component = Licensing
version = 1.0.3
date_created = 2024-5-23 12:48:34
date_updated = 2024-5-23 12:54:43
category = Splunk
sub_category = Licensing
tags = Discovery,Entitlement,REST,SVC,Workload
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = 3CE9640BA9883A110E0421F9D591A64E
search_author = akhamis
updated_author = akhamis
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>Splunk Enterprise Estimated Entitlement Discovery Job.</p>
search = | inputlookup ssef_entitlements_csv_lookup \
| eval summary_id="ssef_entitlements_csv_lookup" \
| append \
    [ search index=_telemetry source=*license_usage* type=RolloverSummary earliest=-6d@w1 latest=-1d@w6 \
    | fields _time b guid licenseGroup licenseGuids pool poolsz productType slave stack stacksz subgroupId \
    | bin span=1d _time \
    | eval Volume = IF(stack="enterprise", stacksz, NULL()) \
    | stats LATEST(b) AS b VALUES(Volume) AS Volume by slave, pool, _time \
    | stats SUM(b) AS b VALUES(Volume) AS Volume by _time \
    | stats max(b) AS Max_Daily_Ingest_Bytes VALUES(Volume) AS Volume \
    | mvexpand Volume \
    | stats max(Max_Daily_Ingest_Bytes) AS Max_Daily_Ingest_Bytes SUM(Volume) AS Volume_Bytes \
    | `ssef_get_entitlement(ingest)` \
    | rename ingest_* AS * \
    | eval type="INGEST", new_entitlement = ROUND(Volume_Bytes / 1024 / 1024 / 1024), entitlement = IF(ISNULL(entitlement) OR entitlement<=10, new_entitlement, entitlement) \
    | fields type, entitlement, yearly_cost ] \
| append \
    [| tstats summariesonly=true max(data.total_size) AS total_size WHERE index=_introspection sourcetype=splunk_disk_objects component::Indexes earliest=-4h by host, data.name \
    | where total_size > 0 \
    | rename data.name AS index_name \
    | `ssef_instance_info(host)` \
    | where role="indexer" \
    | join index_name \
        [| rest /services/data/indexes \
        | where ISNOTNULL(remotePath) \
        | stats COUNT by title \
        | rename title AS index_name] \
    | stats SUM(total_size) AS total_size_MB \
    | `ssef_get_entitlement(SmartStore)` \
    | rename SmartStore_* AS * \
    | eval type="SmartStore", new_entitlement = ROUND((total_size_MB / 1024 / 500), 2) , entitlement = IF(ISNULL(entitlement) OR entitlement<=10, new_entitlement, entitlement) \
    | fields type, entitlement, yearly_cost ] \
| append \
    [| tstats summariesonly=true max(data.capacity) AS capacity WHERE index=_introspection sourcetype=splunk_disk_objects component::Partitions earliest=-4h by host, data.mount_point \
    | stats SUM(capacity) AS capacity by host \
    | `ssef_instance_info(host)` \
    | where role="indexer" \
    | stats SUM(capacity) AS capacity_MB \
    | `ssef_get_entitlement(ddas)` \
    | rename ddas_* AS * \
    | eval type="DDAS", new_entitlement = ROUND((capacity_MB / 1024 / 500), 2) , entitlement = IF(ISNULL(entitlement) OR entitlement<=10, new_entitlement, entitlement) \
    | fields type, entitlement, yearly_cost] \
| append \
    [| tstats summariesonly=true max(data.virtual_cpu_count) AS virtual_cpu_count WHERE index=_introspection sourcetype=splunk_resource_usage component::Hostwide earliest=-2h@h latest=-1h@h by host \
    | `ssef_drop_dm_object_name(data)` \
    | `ssef_instance_info(host)` \
    | where role IN("indexer","search_head") \
    | stats SUM(virtual_cpu_count) AS total_vCPUs \
    | `ssef_get_entitlement(svc)` \
    | rename svc_* AS * \
    | eval type="SVC", new_entitlement = CEILING(total_vCPUs), entitlement = IF(ISNULL(entitlement) OR entitlement<=10, new_entitlement, entitlement) \
    | fields type, entitlement, yearly_cost] \
| stats LAST(entitlement) AS entitlement LAST(yearly_cost) AS yearly_cost by type \
| fillnull value=0 entitlement yearly_cost \
| eval order = case (\
    match(type, "SVC"), 1,\
    match(type, "INGEST"), 2,\
    match(type, "DDAS"), 3,\
    match(type, "DDAA"), 4,\
    match(type, "DDSS"), 5,\
    match(type, "SmartStore"), 7,\
    true(), 8) \
| sort order \
| fillnull value=0 entitlement, yearly_cost \
| eval _time=now() \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time, type, entitlement, yearly_cost, severity_level \
| outputlookup ssef_entitlements_csv_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
| `ssef_handle_no_results(1,"The ssef_entitlements_csv_lookup summary job completed successfully without identifying any issues, and everything is operating as expected.")`

