updated_author = akhamis
related_info = <ul><li><p><a href="https://lantern.splunk.com/Platform_Data_Management">Lantern: Use Case Explorer for the Splunk Platform</a></p><p>Explore a comprehensive guide designed to inspire and assist in developing new use cases using Splunk Enterprise or Splunk Cloud Platform. This resource helps you identify and implement analytic capabilities across different domains.</p></li><li><p><a href="https://www.splunk.com/en_us/solutions/all-use-cases.html">Splunk Solutions: Splunk Use Cases</a></p><p>Discover how your organization can become more resilient by exploring various use cases that Splunk can help solve, categorized to address specific challenges and objectives.</p></li><li><p><a href="https://docs.splunk.com/Documentation/ESCU/4.44.0/user/UCLKeyFeatures">Splunk Docs: Implement Security Use Cases Using the Use Case Library in Splunk</a></p><p>Learn how to implement security use cases using Splunk`s Use Case Library, which offers categorized searches and analytic stories to enhance your security operations.</p></li><li><p><a href="https://lantern.splunk.com/Security/Getting_Started/Identifying_Splunk_Enterprise_Security_use_cases_and_data_sources">Lantern: Identifying Splunk Enterprise Security Use Cases and Data Sources</a></p><p>Gain insights into common security use cases and the associated data sources within Splunk Enterprise Security, aiding in the development of targeted analytic capabilities.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/learn/splunk-use-cases.html">Splunk Blogs: Splunk Use Cases</a></p><p>Read about various ways to utilize Splunk to enhance organizational security and resilience, with links to resources for popular use cases across different domains.</p></li></ul>
description = <p><b>Provides</b> a daily summary of indexed sourcetypes and their mapped use cases. <b>Highlights</b> analytic and technical capabilities across domains. <b>Supports</b> data inventory insights and use case validation.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.bar
viz_options = { "stackMode":"stacked","seriesColors":["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"],"legendDisplay":"top" }
search = `ssef_summary(ssef_scma_indexing_data_source_inventory)` \
| fields _time orig_index orig_sourcetype dc_host dc_source event_count severity_level newly_added \
| bin _time span=1d \
| stats count by _time orig_sourcetype \
| rename orig_sourcetype as sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type category as sourcetype_category domain as sourcetype_domain \
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type category as sourcetype_category domain as sourcetype_domain \
| eval sourcetype_category=split(mvdedup(sourcetype_category), "|"), sourcetype_domain=split(mvdedup(sourcetype_domain), "|") \
| stats values(*) as * by sourcetype data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUTNEW use_case \
| eval use_case=mvdedup(use_case) \
| stats values(*) as * by sourcetype use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type as use_case_type category as usecase_category domain as usecase_domain \
| eval use_case_type=mvdedup(use_case_type) \
| eval domain = mvdedup(coalesce(usecase_domain, sourcetype_domain)) \
| eval category = mvdedup(coalesce(usecase_category, sourcetype_category)) \
| eval use_case_name = if(match(use_case_type, "Use Case"), use_case, null()) \
| stats sum(eval(if(use_case_type=="Analytic Capability", 1, 0))) as num_Analytic_Capabilities values(eval(if(use_case_type=="Analytic Capability", use_case, null()))) as Analytic_Capabilities values(eval(if(use_case_type=="Technical Capability", use_case, null()))) as Technical_Capabilities sum(eval(if(use_case_type=="Technical Capability", 1, 0))) as num_Technical_Capabilities sum(eval(if(match(use_case_type, "Use Case"), 1, 0))) as num_Use_Cases by domain category \
| chart sum(num_Technical_Capabilities) as num_Technical_Capabilities over category by domain

