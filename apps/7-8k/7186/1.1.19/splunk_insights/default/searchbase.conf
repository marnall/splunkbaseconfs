[ssef_ia4s_environment_version_compatibility]
search_name = Splunk Version Compatibility
readonly = 1
target_component = Infra & Arch
version = 1.0.4
date_updated = 2025-11-11 14:43:0
category = Splunk
sub_category = Environment
tags = Environment,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 3E44A2300E6D2EE33319E02D2EB25169
updated_author = akhamis
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/VersionCompatibility/current/Matrix/Compatibilitybetweenforwardersandindexers" target="_blank">Version Compatibility Matrix</a></li>\
</ul>
severity_normal_text = <br/><p>All instances are running on the same version, indicating a uniform environment.</p>
severity_medium_text = <br/><p>There are some instances within the environment that are not running the latest version of Splunk. This could result in a less than optimal Splunk environment. Upgrading to the latest version of Splunk will provide the latest features that Splunk has to offer.</p>
description = <p>Knowing the versions of Splunk and the operating systems running on various hosts in a Splunk environment is crucial for maximizing platform value. This knowledge ensures compatibility and stability, helps in identifying potential security vulnerabilities, and enables efficient troubleshooting and support. Keeping track of versions also aids in planning upgrades, ensuring that the environment benefits from the latest features, performance improvements, and security patches, ultimately leading to a more secure, efficient, and reliable Splunk deployment.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> The operating systems and versions are not uniform.</li>\
<li><strong>Normal:</strong> The operating system and versions are uniform.</li>\
</ul>
search = `ssef_summary(ssef_scma_environment_instance_inventory)` \
| eval summary_id="ssef_ia4s_environment_version_compatibility" \
| fields _time label name cpu_core_count instance_count role os_name physical_memory_gb severity_level message sumOfPhysicalCores sumOfVirtualCores version \
| rex field=version "(?<major_num>\d+)\.(?<minor_num>\d+)\.(?<patch_num>\d+)" \
| stats latest(major_num) as major_num latest(minor_num) as minor_num latest(patch_num) as patch_num latest(version) as version latest(_time) as _time by label \
| eval version_numeric = (major_num * 1000000) + (minor_num * 1000) + patch_num \
| eventstats max(version_numeric) as max_version_numeric \
| eventstats max(eval(if(version_numeric=max_version_numeric, version, null() ))) AS max_version \
| rex field=max_version "(?<max_version_major>\d+)\.(?<max_version_minor>\d+)\.(?<max_version_patch>\d+)" \
| eval max_version_major=tonumber(max_version_major), max_version_minor=tonumber(max_version_minor), max_version_patch=tonumber(max_version_patch) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( major_num < max_version_major, high, major_num == max_version_major AND minor_num < max_version_minor, medium, major_num == max_version_major AND minor_num == max_version_minor AND patch_num < max_version_patch, low, true(), normal) \
| table _time label version max_version severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_environment_version_compatibility summary job completed successfully without identifying any issues, and everything is operating as expected.")`

