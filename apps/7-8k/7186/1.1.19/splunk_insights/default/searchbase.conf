severity_normal_text = <br/><p>The check results indicate you are compatible with the limit set in the "Splunk Cloud Service Description" and therefore a candidate for migration.</p>
severity_low_text = <br/><p>Unused tokens were found in the environment. We recommend reviewing the list and the message field for more details.</p>
description = <p>This check works alongside indexing_api_exports to detect all provides authorization tokens that are provisioned in the environment. The tokens provides hints to the PS team to check for any CLI activities that mainly retrieves or export data from Splunk programmatically.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = | rest `ssef_rest_timeout` splunk_server=* /services/authorization/tokens \
| eval summary_id="ssef_scma_indexing_auth_tokens" \
| `ssef_instance_info(splunk_server)` \
| stats dc(splunk_server) as dc_instance latest(name) as name last(lastUsed) AS last_used values(status) AS message values(claims.aud) AS description values(claims.idp) AS idp_type last(claims.iat) AS create_date last(claims.exp) as expiry_date by label title \
| eval last_used = if(last_used==0, "never", strftime(last_used, "%Y-%m-%d %H:%M:%S %Z")), create_date = strftime(create_date, "%Y-%m-%d %H:%M:%S %Z"), expiry_date = strftime(expiry_date, "%Y-%m-%d %H:%M:%S %Z") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( message=="enabled" and last_used!="never", low, true(), normal ) \
| table label name title dc_instance description idp_type create_date expiry_date last_used message severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_auth_tokens summary job completed successfully without identifying any issues, and everything is operating as expected.")`

