explanation = <h3>The <code>newly_added</code> Logic</h3><p>To understand how the <code>newly_added</code> flag is calculated, it is essential to follow the two main data flows within the query. The core of the logic is to compare today's live data against yesterday's global summary data.</p><p><strong>Step 1: Get Today's Live Saved Search List</strong> The query begins with a <code>rest</code> command to get a complete list of all saved searches <em>from the local search head where the job is currently running</em>. It then performs extensive processing, enrichment (adding references to indexes, sourcetypes, etc.), and aggregation on this data to create a clean, final list of today's local saved searches.</p><p><strong>Step 2: Compare to Yesterday's Global List (The </strong><code><strong>join</strong></code><strong>)</strong> This is the heart of the "newness" calculation.</p><div spellcheck="false" class="ql-code-block-container"><div data-language="plain" class="ql-code-block">| join type=left label, app, savedsearch_name </div><div data-language="plain" class="ql-code-block">    [| search `ssef_summary(ssef_saved_searches)` earliest=-1d@d latest=@d </div><div data-language="plain" class="ql-code-block">    | ...</div><div data-language="plain" class="ql-code-block">    | eval found_yesterday=1 ]</div></div><ol><li data-list="bullet"><span class="ql-ui"></span>The query takes today's processed local saved search list.</li><li data-list="bullet"><span class="ql-ui"></span>The <code>join</code>'s subsearch runs, querying the central summary index for all saved searches that were recorded <em>yesterday</em> across <strong>all search heads</strong>.</li><li data-list="bullet"><span class="ql-ui"></span>It then attempts to match each of today's local saved searches against this global list from yesterday using the <code>label</code>, <code>app</code>, and <code>savedsearch_name</code> as the composite key.</li><li data-list="bullet"><span class="ql-ui"></span>If a match is found, a field called <code>found_yesterday</code> is added to the event.</li></ol><p><strong>Step 3: The </strong><code><strong>eval</strong></code><strong> Command</strong></p><div spellcheck="false" class="ql-code-block-container"><div data-language="plain" class="ql-code-block">| eval newly_added = if(isnull(found_yesterday), "yes", "no")</div></div><ol><li data-list="bullet"><span class="ql-ui"></span>This is the final decision. The query looks at each of today's saved searches:</li><li class="ql-indent-1" data-list="bullet"><span class="ql-ui"></span>If the <code>found_yesterday</code> field is <code>null</code>, it means the saved search did not exist in yesterday's global summary. It is therefore flagged as <code><strong>newly_added="yes"</strong></code>.</li><li class="ql-indent-1" data-list="bullet"><span class="ql-ui"></span>If the <code>found_yesterday</code> field has a value, it means the saved search was present yesterday, and it is correctly flagged as <code><strong>newly_added="no"</strong></code>.</li></ol><p><strong>Step 4: Separating the Data Streams for Output</strong> The query then uses a clever <code>append</code> and <code>where is4s="summary"</code> structure to manage its two goals:</p><ol><li data-list="bullet"><span class="ql-ui"></span>The data stream marked with <code>is4s="summary"</code> (which is today's live data with the correct <code>newly_added</code> flag) is sent to the <code>collect</code> command (wrapped in your <code>ssef_handle_no_results</code> macro) to be saved in the central summary index.</li><li data-list="bullet"><span class="ql-ui"></span>The <code>append</code> subsearch independently runs, reads yesterday's summary data, and uses <code>outputlookup</code> to refresh the local lookup file with that global list from the previous day.</li></ol><p>This complex structure allows the job to use the summary index as its "source of truth" for historical data, a necessary pattern for a distributed, multi-search-head environment.</p>
quid = 652B4F305301881B3A2245A3F769EEC8
updated_author = akhamis
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p><strong>Purpose:</strong> This daily job performs a comprehensive inventory of all saved searches (reports and alerts) across one or more Splunk search heads. It is designed to "shoot two birds with one stone" by performing two critical functions in a single run:</p><ol><li data-list="ordered"><span class="ql-ui"></span><strong>Populates a Central Summary Index:</strong> It saves this specific search head's saved search data, enriched with a <code>newly_added</code> flag, to the central <code>ssef_saved_searches</code> summary index. This allows for global, time-based reporting on saved search creation.</li><li data-list="ordered"><span class="ql-ui"></span><strong>Refreshes a Global Lookup:</strong> It refreshes a local lookup file (<code>ssef_saved_searches_lookup</code>) on each search head with the complete, global list of all saved searches from the <em>previous day's</em> summary. This enables consistent ad-hoc analysis against a common baseline across the entire distributed environment.</li></ol><p>By comparing the live data from today against the summarized data from yesterday, this job provides the core data needed for tracking new saved searches.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/saved/searches earliest_time=-1d@d latest_time=-0d@d add_orphan_field=1 \
| eval summary_id="ssef_saved_searches" \
| fields - id display.* action.customsearchbuilder.spec severity_*_text related_info search_post search_name qualifiedSearch published auto_summarize.command \
| rename splunk_server as Splunk_Instance , title as savedsearch_name , search as savedsearch_search \
| rename eai:acl.app As app , eai:acl.sharing As sharing , eai:*.*.* as *_*_* , eai:*.* as *_* \
| rename action.action_* as action_* \
| rename *.*.*.*.*.* as *_*_*_*_*_* , *.*.*.*.* as *_*_*_*_* , *.*.*.* as *_*_*_* , *.*.* as *_*_* , *.* as *_* \
| rename *_*_*_*__* as *_*_*_*_* , *_*_*__* as *_*_*_* , *_*__* as *_*_* , *__* as *_* \
| eval Splunk_Instance = lower(Splunk_Instance) , author = if(author="nobody" OR author="splunk-system-user", "system", author) \
| search NOT (app IN (`ssef_default_apps`) AND (is_scheduled=0 OR disabled=1) ) \
| `ssef_index_reference(savedsearch_search)` \
| `ssef_sourcetype_reference(savedsearch_search)` \
| `ssef_source_reference(savedsearch_search)` \
| `ssef_eventtype_reference(savedsearch_search)` \
| `ssef_macro_reference(savedsearch_search)` \
| `ssef_lookup_reference(savedsearch_search)` \
| `ssef_datamodel_reference(savedsearch_search)` \
| `ssef_rest_reference(savedsearch_search)` \
| `ssef_strptime_format(updated)` \
| `ssef_instance_info(Splunk_Instance)` \
| fields - serverName Splunk_Instance_name host_* guid \
| makemv delim="," action_correlationsearch_related_searches \
| makemv delim="," actions \
| makemv delim="," action_email_to \
| rex field=action_correlationsearch_related_searches mode=sed "s/\[\"|\"\]|\[|\]|\"//g" \
| rex field=savedsearch_search "\|\s*collect\s+index=(?<summary_index_name_collect>.*?)\s" \
| eval\
    savedsearch_type = if(alert_track == 1, "alert", "report"),\
    acl_perms_read = if(match(acl_perms_read, "\*"), "Everyone", acl_perms_read),\
    acl_perms_write = if(match(acl_perms_write, "\*"), "Everyone", acl_perms_write),\
    action_correlationsearch_related_searches = mvdedup(mvsort(trim(action_correlationsearch_related_searches))),\
    is_summary_job = if(isnotnull(summary_index_name_collect) OR isnotnull(action_summary_index_name) OR action_summary_index=1, 1, 0),\
    action_summary_index_name = mvdedup(mvappend(action_summary_index_name, trim(summary_index_name_collect))),\
    next_scheduled_time = strptime(next_scheduled_time,"%Y-%m-%d %H:%M:%S %Z"),\
    dispatch_earliest_time = if(dispatch_earliest_time="" OR isnull(dispatch_earliest_time) OR dispatch_earliest_time=0 OR dispatch_earliest_time=1, "All-Time", dispatch_earliest_time),\
    dispatch_latest_time = if(dispatch_latest_time="" OR isnull(dispatch_latest_time) OR dispatch_latest_time=0 OR dispatch_latest_time=1, "All-Time", dispatch_latest_time),\
    action_email_to = trim(lower(action_email_to)),\
    macro_reference = if(macro_reference = "`" OR match(macro_reference,"^cim_"), null(), macro_reference) \
| stats values(*) as * last(name) AS name by label, app, sharing, author, savedsearch_name \
| eval _time = now() , scheduled_times = mvindex(scheduled_times, 0, 4) \
| foreach role, Splunk_Instance, scheduled_times, acl_perms_*, actions, action_email_to, *_reference action_correlationsearch_related_searches \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| join type=left label, app, savedsearch_name \
    [| search `ssef_summary(ssef_saved_searches)` earliest=-3d@d latest=@d \
    | fields label, app, savedsearch_name \
    | dedup label, app, savedsearch_name \
    | eval found_yesterday=1 ] \
| eval newly_added = if(isnull(found_yesterday), "yes", "no") \
| eval severity_level = if(newly_added="yes", 0, 1) \
| eval is4s="summary" \
| append \
    [| search `ssef_summary(ssef_saved_searches)` earliest=-1d@d \
    | stats latest(*) as * latest(_time) AS _time by label, app, sharing, author, savedsearch_name \
    | table _time label Splunk_Instance role name app sharing author savedsearch_name savedsearch_type savedsearch_search allow_skew auto_summarize* category cron_schedule defer_scheduled_searchable_idxc description disabled dispatch* displayview embed_enabled is_scheduled is_visible max_concurrent next_scheduled_time orphan ranking realtime_schedule restart_on_searchpeer_add run_n_times run_on_startup schedule_as schedule_priority schedule_window scheduled_times skip_scheduled_realtime_idxc triggered_alert_count updated vsid workload_pool durable_* *_reference acl_* action* alert_* precalculate_* request_* summary_* is_summary_job \
    | outputlookup ssef_saved_searches_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false ] \
| where is4s="summary" \
| table _time label Splunk_Instance role name app sharing author savedsearch_name savedsearch_type savedsearch_search allow_skew auto_summarize* category cron_schedule defer_scheduled_searchable_idxc description disabled dispatch* displayview embed_enabled is_scheduled is_visible max_concurrent next_scheduled_time orphan ranking realtime_schedule restart_on_searchpeer_add run_n_times run_on_startup schedule_as schedule_priority schedule_window scheduled_times skip_scheduled_realtime_idxc triggered_alert_count updated vsid workload_pool durable_* *_reference acl_* action* alert_* precalculate_* request_* summary_* is_summary_job newly_added severity_level \
| `ssef_handle_no_results(1,"The ssef_saved_searches summary job completed successfully without identifying any issues, and everything is operating as expected.")`

[ssef_saved_searches_backup]
search_name = Daily Backup of Saved Searches Changes
readonly = 1
target_component = Backup Jobs
version = 1.0.7
date_created = 2024-11-6 14:41:3
date_updated = 2025-11-11 15:8:15
category = IS4S
sub_category = Backup
tags = Backup,Jobs,REST,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 5D87BBBE5CE7B665B733EC1838DBCB7C
search_author = akhamis
updated_author = akhamis
description = <p>This Splunk job runs daily to back up saved searches that have been modified in the last 24 hours. It leverages REST API calls to detect and retrieve updates, storing the modified searches in a summary index for auditing, recovery, or version tracking. This ensures that any recent changes to saved searches are securely archived and readily available for future use or troubleshooting.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/saved/searches ```search="NOT eai:acl.app IN (splunk_monitoring_console, splunk_archiver, Splunk_SA_CIM, splunk_app_infrastructure, splunk_instrumentation) AND is_scheduled=1 AND disabled=0"``` \
| eval summary_id="ssef_saved_searches_backup" \
| fields - id display.* action.customsearchbuilder.spec severity_*_text related_info search_post search_name qualifiedSearch published auto_summarize.command \
| rename splunk_server as Splunk_Instance , title as savedsearch_name , search as savedsearch_search \
| rename eai:acl.app As app , eai:acl.sharing As sharing , eai:*.*.* as *_*_* , eai:*.* as *_* \
| rename action.action_* as action_* \
| rename *.*.*.*.*.* as *_*_*_*_*_* , *.*.*.*.* as *_*_*_*_* , *.*.*.* as *_*_*_* , *.*.* as *_*_* , *.* as *_* \
| rename *_*_*_*__* as *_*_*_*_* , *_*_*__* as *_*_*_* , *_*__* as *_*_* , *__* as *_* \
| `ssef_strptime_format(updated)` \
| eval Latest_Change_Sec = now() - updated \
| where (isnotnull(updated) AND updated!="" AND updated!="1969-12-31T19:00:00-05:00") AND (Latest_Change_Sec<86400 OR acl_removable=1) \
| eval Splunk_Instance = lower(Splunk_Instance) \
| `ssef_instance_info(Splunk_Instance)` \
| stats values(*) as * last(name) AS name by label, app, sharing, author, savedsearch_name \
| eval _time = now() \
| foreach role, Splunk_Instance, scheduled_times, acl_perms_*, actions, action_email_to, *_reference action_correlationsearch_related_searches \
    [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time label *remo* Splunk_Instance role name app sharing author savedsearch_name savedsearch_type Change_Time Latest_Change_Sec savedsearch_search allow_skew auto_summarize* category cron_schedule defer_scheduled_searchable_idxc description disabled dispatch* displayview embed_enabled is_scheduled is_visible max_concurrent next_scheduled_time orphan ranking realtime_schedule restart_on_searchpeer_add run_n_times run_on_startup schedule_as schedule_priority schedule_window scheduled_times skip_scheduled_realtime_idxc triggered_alert_count updated vsid workload_pool durable_* *_reference acl_* action* alert_* precalculate_* request_* summary_* is_summary_job severity_level \
| `ssef_handle_no_results(1,"The ssef_saved_searches_backup summary job completed successfully without identifying any issues, and everything is operating as expected.")`

