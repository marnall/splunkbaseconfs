description = <p>This search provides details behind the number of new capabilities added to Splunk within a set time frame. Growth in this metric reflects increased variety of data ingest, introduction of new sourcetype definitions, newly added apps, and/or knowledge object configuration suggesting users recognize Splunks value and are naturally increasing capabilities based on demand. Understanding what new capabilities are introduced over time which provides insights into demand and possible implications to new use cases.</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_scma_indexing_data_source_inventory)` newly_added="yes" \
| fields _time orig_index orig_sourcetype dc_host dc_source event_count severity_level newly_added \
| bin _time span=1d \
| stats count by _time orig_sourcetype \
| rename orig_sourcetype as sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type category as sourcetype_category domain as sourcetype_domain \
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type category as sourcetype_category domain as sourcetype_domain \
| eval sourcetype_category=split(mvdedup(sourcetype_category), "|"), sourcetype_domain=split(mvdedup(sourcetype_domain), "|") \
| stats values(*) as * by sourcetype data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUTNEW use_case \
| eval use_case=mvdedup(use_case) \
| stats values(*) as * by sourcetype use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type as use_case_type category as usecase_category domain as usecase_domain \
| eval use_case_type=mvdedup(use_case_type) \
| eval use_case_name = if(match(use_case_type, "Use Case"), use_case, null()) \
| eval domain=mvdedup(mvappend(sourcetype_domain,usecase_domain)) , category=mvdedup(mvappend(sourcetype_category,usecase_category)) \
| fillnull value="Unclassified" domain category \
| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()) , Analytic_Capabilities = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null()) \
| stats values(*) as * sum(eval(if(use_case_type=="Analytic Capability", 1, 0))) as num_Analytic_Capabilities values(eval(if(use_case_type=="Analytic Capability", use_case, null()))) as Analytic_Capabilities values(eval(if(use_case_type=="Technical Capability", use_case, null()))) as Technical_Capabilities sum(eval(if(use_case_type=="Technical Capability", 1, 0))) as num_Technical_Capabilities sum(eval(if(match(use_case_type, "Use Case"), 1, 0))) as num_Use_Cases by sourcetype \
| table sourcetype num_Use_Cases use_case_name num_Analytic_Capabilities Analytic_Capabilities ```num_Technical_Capabilities Technical_Capabilities``` data_type sourcetype_category sourcetype_domain usecase_category usecase_domain use_case_type \
| rename use_case_name as "Analytic Use Case"

