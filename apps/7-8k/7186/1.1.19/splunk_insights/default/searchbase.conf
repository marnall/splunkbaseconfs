[# of Regularly Used Apps]
search_name = # of Regularly Used Apps
readonly = 1
diagnostic_searches = ssef_internal_web_access_tracker
version = 1.0.3
date_updated = 2025-10-29 17:46:56
category = Splunk
sub_category = Apps
tags = Apps,IS4S,KPIs
solution = <p>Use this KPI to ensure Splunk app resources are aligned with usage patterns and business priorities. Apps with low activity can be deprecated, while heavily used ones may need scaling or enhancement.</p><p><b>Suggested Actions</b><br>• Review apps with low or no usage for potential cleanup.<br>• Highlight regularly used apps for optimization or scaling.<br>• Track app trends over time to detect shifts in usage.</p><p>Recommended For You: <ul><li><a href="https://splunkbase.splunk.com/app/5254/" target="_blank">Splunkbase: IS4S App</a><br>Core dependency app required for summary macros used in this search. (provisionally validated)</li><li><a href="https://www.cisco.com/c/en/us/products/security/cloud-lock/index.html" target="_blank">Cisco Cloudlock</a><br>For organizations scaling Splunk in hybrid cloud environments. (provisionally validated)</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_internal_web_access_tracker)` app=*</code><br> - Pulls summarized app usage data from the IS4S web access tracker.<br><b>02</b> <code>| fields ...</code><br> - Limits the fields to only those needed for further processing.<br><b>03</b> <code>| bin _time span=1d</code><br> - Normalizes timestamps into daily buckets.<br><b>04</b> <code>| stats count by _time, app</code><br> - Tracks which apps had activity on which days.<br><b>05</b> <code>| appendcols [ search `ssef_summary(ssef_apps_local)` ... ]</code><br> - Adds app visibility info to get total installed/enabled apps per day.<br><b>06</b> <code>| filldown total_apps</code><br> - Ensures each row has a value for total visible apps.<br><b>07</b> <code>| addinfo</code><br> - Retrieves search time range metadata.<br><b>08</b> <code>| eval num_days = ...</code><br> - Calculates number of total days in the search range.<br><b>09</b> <code>| eventstats dc(_time) as num_active_days by app</code><br> - Measures how many unique days each app was active.<br><b>10</b> <code>| eval perc_active = round(...)</code><br> - Calculates the percent of days each app was active.<br><b>11</b> <code>| fillnull value=0 perc_active total_apps</code><br> - Prevents nulls from interfering in logic.<br><b>12</b> <code>| eval active_app = if(...)</code><br> - Filters apps based on whether they meet the activity threshold.<br><b>13</b> <code>| stats max(...) dc(...) by _time</code><br> - Aggregates final counts of total vs regularly used apps per day.<br><b>14</b> <code>| eval reg_seen_to_total = ceiling(...)</code><br> - Converts ratios into percent values for tracking.<br><b>15</b> <code>| fields ...</code><br> - Selects final output columns.<br><b>16</b> <code>| bin _time span=1d</code><br> - Ensures final binning.<br><b>17</b> <code>| stats max(active_apps) as "# of Regularly Used Apps" by _time</code><br> - Produces final daily count of regularly used apps.<br>
explanation = <p>This KPI assesses app engagement in Splunk environments by identifying applications that users consistently access. Apps that appear as active on at least 10% of the days in the search period are counted as regularly used. This helps IT and Splunk admins determine which apps are valuable to users and which may no longer be necessary. Regularly tracking this metric supports proactive app lifecycle decisions, informs license utilization, and promotes an optimized Splunk deployment aligned with business needs.</p>
quid = 27C5F20918AA03B686CF71692A115F07
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/ManagingApps" target="_blank">Splunk Docs: Managing Apps</a><br>Learn how to manage and maintain apps within your Splunk instance. (provisionally validated)</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Working_with_apps_in_Splunk_Web" target="_blank">Lantern: Working with Apps in Splunk Web</a><br>Provides guidance for users interacting with apps via the Splunk UI. (provisionally validated)</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/AboutApp" target="_blank">Splunk Docs: About Apps and Add-ons</a><br>Describes the purpose and function of apps and add-ons. (provisionally validated)</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=apps" target="_blank">Splunk Docs: Apps Search</a><br>Explore official Splunk documentation about apps. (provisionally validated)</li></ul>
description = <p>This search calculates the <b>number of regularly used apps</b> in a Splunk environment by identifying which apps have been used on at least 10% of the days in the selected period. It leverages web access tracking and installed app visibility to gauge usage. <b>Regularly used</b> means meaningful engagement across the defined date range. This can help prioritize app maintenance or optimization.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_internal_web_access_tracker)` app=* \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1d \
| stats count by _time, app \
| appendcols \
    [ search `ssef_summary(ssef_apps_local)` disabled=0 visible=1 \
    | bin _time span=1d \
    | stats dc(app_name) as total_apps by _time ] \
| filldown total_apps \
| addinfo \
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by app \
| eval perc_active = round((num_active_days / num_days) * 100, 2) \
| fillnull value=0 perc_active total_apps \
| eval active_app = if(perc_active >= `ssef_perc_active_threshold`, app, null() ) \
| stats max(total_apps) as total_apps dc(app) as all_apps dc(active_app) as active_apps max(num_days) as num_days by _time \
| eval reg_seen_to_total = ceiling((active_apps / total_apps) * 100) , threshold=`ssef_perc_active_threshold` \
| fields _time total_apps all_apps active_apps num_days reg_seen_to_total threshold \
| bin _time span=1d \
| stats max(active_apps) as "# of Regularly Used Apps" by _time

