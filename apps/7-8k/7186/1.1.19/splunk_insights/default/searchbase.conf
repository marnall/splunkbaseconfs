severity_low_text = <br/><p>The number of ES data model accelerations is slightly elevated and should be addressed. Overall, while data model accelerations can provide significant benefits, it's essential to strike a balance and avoid creating too many accelerations in the Splunk environment. Administrators should carefully evaluate the necessity and impact of each acceleration and prioritize those that provide the most value while minimizing resource usage and maintenance overhead.</p>
severity_medium_text = <br/><p>The number of ES data model accelerations is moderately elevated and should be addressed. Overall, while data model accelerations can provide significant benefits, it's essential to strike a balance and avoid creating too many accelerations in the Splunk environment. Administrators should carefully evaluate the necessity and impact of each acceleration and prioritize those that provide the most value while minimizing resource usage and maintenance overhead.</p>
description = <p>This metric tracks the count of "ES Data Model Accelerations." Data Model Acceleration searches require more resources compared to standard searches and are closely monitored to prevent noticeable performance degradation. Keeping an eye on this metric is essential for maintaining system efficiency and ensuring that resource-intensive searches do not impact overall system performance, thereby preserving the smooth operation and responsiveness of your environment. </p>\
