solution = <p>This insight shows which sourcetypes are the largest contributors to daily license consumption.</p><p><b>Suggested Actions</b> Review top-consuming sourcetypes to confirm business value, apply event filtering or transforms where appropriate, adjust retention policies, and use this data to inform license forecasting and ingestion strategy.</p><p><b>Recommended For You:</b><ul><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=license%20usage" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps that help analyze, visualize, and manage Splunk license usage.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_license_data</code><br> - Retrieves summarized daily license usage metrics by sourcetype.<br><b>02</b> <code>| search / where</code><br> - Filters out non-relevant sourcetypes and zero-usage records.<br><b>03</b> <code>| stats</code><br> - Calculates average daily license usage, stack size, and utilization by sourcetype.<br><b>04</b> <code>| sort</code><br> - Ranks sourcetypes by average daily license usage to highlight top contributors.<br>
explanation = <p>License usage visibility at the sourcetype level is critical for controlling costs and aligning data ingestion with business value. This insight helps platform owners and administrators understand which data sources consume the most license capacity on a daily basis and whether that usage is proportional to operational needs. By identifying high-volume sourcetypes, teams can tune parsing, adjust retention, apply filtering, or re-evaluate onboarding decisions. Over time, acting on this data supports sustainable license management, improved forecasting, and better cost efficiency.</p>
