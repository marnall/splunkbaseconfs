[summary_data_model_constrained_by_indexes]
search_name = Data Models Constrained by Indexes
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 3.0.1
date_created = 2025-08-07
date_updated = 2025-11-9 18:45:58
category = Splunk
sub_category = _internal
tags = Data Models,EFS,Optimization,Summary
solution = <p>Provides visibility into how many indexes accelerated data models are scoped to, enabling optimization of performance and storage usage.</p><p><b>Suggested Actions</b><br><b>1.</b> Review models with no index constraints; consider narrowing scope.<br><b>2.</b> Reassess models with excessive index counts to reduce storage load.<br><b>3.</b> Keep index constraints aligned with the data model’s intended purpose.<br><b>4.</b> Periodically audit constraints to match evolving data sources.<br><b>5.</b> Use coverage metrics to guide acceleration enablement decisions.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (indexes_for_acceleration &gt; 10, 4, indexes_for_acceleration &gt; 5, 3, indexes_for_acceleration &gt; 0, 2, indexes_for_acceleration = 0, 5)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboards. <b>Thresholds should be tuned to match your environment</b>.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> 1–5 indexes constrained — optimal scope.</li><li><b>Low (Severity 2):</b> 6–10 indexes constrained — slightly broad scope.</li><li><b>Medium (Severity 3):</b> &gt;10 indexes constrained — broad scope with possible performance impact.</li><li><b>High (Severity 4):</b> 0 indexes constrained — no scope limitation, high potential for inefficiency.</li><li><b>Critical (Severity 5):</b> Acceleration enabled with unbounded index access and significant storage risk.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| rest ... /services/datamodel/model f=acceleration f=fast f=title f=splunk_server</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve metadata for all data models including acceleration settings.<br><b>02</b> <code>| rex field=acceleration "^{\"\w+\"\:(?&lt;fast&gt;\w+)"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extract the acceleration flag from the acceleration field.<br><b>03</b> <code>| rex field=definition max_match=0 "[\s\(]index=(?&lt;indexes&gt;\w+)"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Identify and extract index constraints applied to each model.<br><b>04</b> <code>| search fast=true</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter for accelerated data models only.<br><b>05</b> <code>| stats dc(indexes) as indexes_for_acceleration</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct indexes each model is constrained to.<br><b>06</b> <code>| table indexes_for_acceleration indexes_for_acceleration</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Present the count for operational review.<br>
quid = 1667B6AA73605356D88E972068DBB080
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>Data model index constraints are optimal for performance and resource usage.</p>
severity_low_text = <p>Slightly broad index scope; consider refining constraints for better efficiency.</p>
severity_medium_text = <p>Broad index coverage; review necessity to avoid performance or storage issues.</p>
severity_high_text = <p>No index constraints; acceleration applies to all data, impacting efficiency.</p>
severity_critical_text = <p>Acceleration is consuming excessive storage and resources due to unbounded index scope.</p>
description = <p>This search leverages REST to look at all the datamodels that exist today & understand if any indexes are used to constrain any datamodels that are accelerated. Having a data model not constrained to the adequate indexes results in performance degradation to a large subset of the searches & will impact all user's experience on the platform. So having more of these indexes defined, makes these DM more robust and indicates better DM use.</p>
search = `ssef_summary(ssef_data_models)` fast=true \
| eval summary_id="summary_data_model_constrained_by_indexes" \
| stats latest(*) as * latest(_time) as _time by label, app, title \
| eval baseSearch=split(baseSearch,"#####") \
| stats count by label, app, title, baseSearch \
| rex field=baseSearch "(?<cim_indexes>cim_\w+_\w+)" \
| `ssef_index_reference(baseSearch)` \
| rename index_reference as index_reference1 \
| `ssef_macro_definition(label,cim_indexes)` \
| rename Macro_Definition as Macro_Definition1 \
| `ssef_index_reference(Macro_Definition1)` \
| rename index_reference as index_reference2 \
| `ssef_macro_definition(label,index_reference1)` \
| rename Macro_Definition as Macro_Definition2 \
| `ssef_index_reference(Macro_Definition2)` \
| rename index_reference as index_reference3 \
| eval index_reference=mvappend(index_reference1,index_reference2,index_reference3) \
| eval index_reference = mvfilter(! match(index_reference, "cim_")) \
| stats dc(index_reference) as indexes_for_acceleration \
| eval severity_level = case (indexes_for_acceleration > 10, 4, indexes_for_acceleration > 5, 3, indexes_for_acceleration > 0, 2, indexes_for_acceleration = 0, 5) \
| table indexes_for_acceleration severity_level \
| `ssef_handle_no_results(1,"The summary_data_model_constrained_by_indexes summary job completed successfully without identifying any issues, and everything is operating as expected.")`

