quid = B1CD63BDE609CC4F8D7844063C66AD43
search_author = dluxton
updated_author = akhamis
related_info = <p><strong>How To Review</strong><br>Take note of real time searches &amp; inconsistencies or abnormalities with cron schedules and time ranges.  <br>Cron schedules are ideally evenly distributed over the minutes / hours of the day. I.e. if 90% of the searches were scheduled to run at 0 minutes past every hour, this would cause some delays &amp; resource contention.</p>\
<ul>\
<li><a href="https://lantern.splunk.com/Security/Product_Tips/Enterprise_Security/Preventing_concurrency_issues_and_skipped_searches" target="_blank">Preventing concurrency issues and skipped searches</a></li>\
<li><a href="https://splunkbase.splunk.com/app/7066" target="_blank">SA-DetectionInsights</a></li>\
</ul>
severity_low_text = <br/><p>At least one of the below criteria has been met:</p>\
<ul>\
<li>More than 5% of searches are realtime searches</li>\
<li>Less than 80% of detections have the schedule window set to auto</li>\
<li>More than 20% of detections are using a unqiue time window</li>\
</ul>
severity_high_text = <br/><p>More than 50% of alerts are running in realtime mode.</p>
description = <p>Identify potential improvements with detection scheduling.</p>
search = `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 \
| eval summary_id="detection_schedule_windows" \
| stats latest(*) as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
| eval rt_search=if(dispatch_earliest_time like "rt%" OR dispatch_latest_time like "rt%","true",null()), auto_window=if(schedule_window="auto", "true", null()), no_schedule_window=if(schedule_window=0,"true",null()) \
| eventstats count(eval(if(rt_search="true",rt_search,null()))) as rt_search_count count as total, count(eval(if(auto_window="true",auto_window,null()))) as auto_window_count, count(eval(if(no_schedule_window="true",no_schedule_window,null()))) as no_schedule_window_count \
| stats values(rt_search_count) as rt_search_count values(total) as total values(auto_window_count) as auto_window_count values(no_schedule_window_count) as no_schedule_window_count count by label dispatch_earliest_time, dispatch_latest_time \
| eventstats count as unique_schedules \
| eval severity_level = case ( rt_search_count/total*100>50 AND total>20,4, unique_schedules>total/5 OR auto_window_count<total*0.8 OR rt_search_count/total*100>5,2, true(),1) \
| table label auto_window_count count dispatch_earliest_time dispatch_latest_time no_schedule_window_count rt_search_count severity_level total unique_schedules \
| `ssef_handle_no_results(1,"The detection_schedule_windows summary job completed successfully without identifying any issues, and everything is operating as expected.")`

