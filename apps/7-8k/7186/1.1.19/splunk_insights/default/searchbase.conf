[summary_issue_reading_events_that_originated_via_hec]
search_name = HEC Forwarding Issues
readonly = 1
ssef_cron = weekly
target_component = Infra & Arch
version = 3.0.0
date_created = 2025-08-08
date_updated = 2026-1-28 12:31:55
category = Splunk
sub_category = _internal
tags = EFS,Forwarding,HEC,Monitoring,Summary
solution = <p>Provides insight into the scale and persistence of HTTP Event Collector forwarding errors, enabling proactive troubleshooting.</p><p><b>Suggested Actions</b><br><b>1.</b> Check HEC token configurations and permissions.<br><b>2.</b> Verify source system network connectivity.<br><b>3.</b> Review HTTP input size limits and payload formatting.<br><b>4.</b> Investigate repeated failures from the same source_IP.<br><b>5.</b> Enable additional logging for persistent high-severity cases.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (avg_fwd_httpIssue&lt;=2,1, avg_fwd_httpIssue&lt;=5,2, avg_fwd_httpIssue&lt;=10,3, avg_fwd_httpIssue&lt;=20,4, avg_fwd_httpIssue&gt;20,5)</code></pre><p>Add before the final <code>| table</code> to classify alert severity. <b>Adjust thresholds</b> to reflect environment-specific tolerance for HTTP event failures.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> 0–2 average daily unique failures.</li><li><b>Low (Severity 2):</b> 3–5 failures.</li><li><b>Medium (Severity 3):</b> 6–10 failures.</li><li><b>High (Severity 4):</b> 11–20 failures.</li><li><b>Critical (Severity 5):</b> More than 20 failures — immediate HEC troubleshooting required.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="splunkd" source="*splunkd.log*" component=HttpInputDataHandler CASE(ERROR) status &gt;= 400</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve HTTP input error events from internal logs where status code indicates client/server error.<br><b>02</b> <code>| eval tuple=name + source_IP</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Create a composite key for unique event sources.<br><b>03</b> <code>| timechart partial=t fixedrange=t span=1d dc(tuple) as fwd_httpIssue</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct daily HTTP event forwarding issues.<br><b>04</b> <code>| stats avg(fwd_httpIssue) as avg_fwd_httpIssue</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Compute the average number of unique issues per day.<br><b>05</b> <code>| eval avg_fwd_httpIssue=round(avg_fwd_httpIssue, 2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Round the average for cleaner reporting.<br><b>06</b> <code>| eval severity_level = case (avg_fwd_httpIssue&lt;=2,1, avg_fwd_httpIssue&lt;=5,2, avg_fwd_httpIssue&lt;=10,3, avg_fwd_httpIssue&lt;=20,4, avg_fwd_httpIssue&gt;20,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity level based on average daily issue count.<br><b>07</b> <code>| table avg_fwd_httpIssue severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Present final metrics and classification.<br>
