[ssef_internal_index_license_usage]
search_name = Hourly Total License Usage by Cluster by Index Tracker
readonly = 1
ssef_cron = hourly
target_component = Licensing
version = 2.0
date_updated = 2025-10-19 19:20:21
category = Splunk
sub_category = Clustering
tags = Discovery,Ingestion,Licensing,Tracker
dispatch_earliest_time = -4h@h
dispatch_latest_time = -0h@h
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = 1CFEC2B6AB091CA89290CA43648CC74C
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>Summarizes <b>internal license usage</b> by index, sourcetype, and license pool using <b>LicenseUsage</b> telemetry. Provides hourly visibility into ingest distribution to support <b>capacity planning</b> and governance validation.</p>
explanation = <p>This search analyzes LicenseUsage events from _internal logs over a rolling four-hour window. It normalizes missing values, maps indexer GUIDs to instance metadata, aggregates hourly ingest volume, and summarizes license consumption by pool, index, and sourcetype. The output highlights how ingest is distributed across sources and indexes, enabling detection of unexpected growth, misrouted data, or pool misalignment. Monitoring internal license usage at this granularity supports proactive license governance and ingest optimization.</p>
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd component=LicenseUsage ...</code><br> - Retrieve license usage telemetry for the defined time window.<br><b>02</b> <code>| rename / eval normalization</code><br> - Normalize index names and squash empty host/source values.<br><b>03</b> <code>| lookup ssef_splunk_instance_info_lookup</code><br> - Enrich with instance label and name using GUID mapping.<br><b>04</b> <code>| bin span=1h | stats ...</code><br> - Aggregate hourly license usage by index and sourcetype.<br><b>05</b> <code>| foreach ... mvjoin()</code><br> - Normalize multivalue fields for deterministic summary output.
solution = <p>This KPI provides granular insight into ingest distribution across indexes and sourcetypes, supporting license optimization and early detection of unexpected growth patterns.</p><p><b>Suggested Actions</b>: Review high-volume sourcetypes, validate index routing, confirm license pool alignment, and investigate anomalous ingestion spikes to prevent overages or compliance exposure.</p>
related_info = <ul><li><a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/manage-licenses/about-splunk-enterprise-licenses" target="_blank">Splunk Help: About Splunk Enterprise licenses</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/manage-licenses/view-license-usage-details" target="_blank">Splunk Help: View license usage details</a></li></ul>
viz_options = { "count":100 }
search = earliest=-4h@h latest=-0h@h index=_internal sourcetype=splunkd component=LicenseUsage type=Usage b > 0 \
| eval summary_id="ssef_internal_index_license_usage" \
| rename i AS Indexer_GUID idx AS Index_Name h AS Lic_Host s AS Lic_Source st AS Lic_Sourcetype b AS License_Usage o AS Lic_O pool AS Lic_Pool poolsz AS Lic_Pool_Size \
| fields _time Indexer_GUID Index_Name Lic_Host Lic_Source Lic_O Lic_Sourcetype License_Usage Lic_Pool Lic_Pool_Size \
| eval\
    Lic_Host = if(len(Lic_Host)=0 OR isnull(Lic_Host), "(SQUASHED)", Lic_Host),\
    Lic_Source = if(len(Lic_Source)=0 OR isnull(Lic_Source), "(SQUASHED)", Lic_Source), \
    Index_Name = if(len(Index_Name)=0 OR isnull(Index_Name), "(UNKNOWN)", Index_Name),\
    Index_Name = if(Index_Name="default", "main", Index_Name) \
| lookup ssef_splunk_instance_info_lookup guid As Indexer_GUID OUTPUTNEW label name \
| bin _time span=1h \
| stats \
    LATEST(Lic_Pool_Size) AS Lic_Pool_Size\
    sum(License_Usage) AS License_Usage\
    VALUES(Indexer_GUID) AS Indexer_GUID\
    latest(name) as name\
    by _time label Lic_Pool Lic_Source Lic_Sourcetype Lic_Host Index_Name \
| stats \
    VALUES(Lic_Source) AS Lic_Source\
    VALUES(Lic_Host) AS Lic_Host\
    LATEST(Lic_Pool_Size) AS Lic_Pool_Size\
    sum(License_Usage) AS License_Usage\
    VALUES(Indexer_GUID) AS Indexer_GUID \
    latest(name) as name\
    by _time label Lic_Pool Index_Name Lic_Sourcetype \
| eval type = "Usage" \
| foreach Lic_Source, Lic_Host, Indexer_GUID \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
