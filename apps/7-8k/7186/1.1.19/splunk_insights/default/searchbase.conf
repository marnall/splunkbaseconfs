quid = BB1556ADB75AB60CDD50EC512B320C44
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Aboutmanagingsearchjobs" target="_blank">Splunk Docs - Search Job Management</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/DMC/Search" target="_blank">Splunk Docs - Search Monitoring Console</a></li>\
<li><a href="https://community.splunk.com/t5/Performance/How-to-manage-search-performance-based-on-search-type/m-p/476234" target="_blank">Splunk Answers - Managing Search Performance Based on Search Type</a></li>\
<li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/search%20monitoring" target="_blank">Splunkbase - Apps for Monitoring Search Activity</a></li>\
</ul>
severity_normal_text = <br/><p>No problems were detected with this check. Your search type densities were below problematic thresholds.</p>
severity_medium_text = <br/><p>An average daily search count by type has been identified that exceeds 250,000 but is less than 500,000 over the last 1 days. This density may indicate inefficient search practices or potential overutilization of resources. It's recommended to review search patterns and optimize where possible to ensure resource efficiency and maintain system performance.</p>
severity_high_text = <br/><p>An average daily search count by type exceeding 500,000 over the last 1 days has been detected. This high level of search activity significantly impacts system performance and resource utilization. Immediate action is required to analyze and optimize search strategies, potentially by refining search queries, scheduling searches during off-peak hours, or increasing system resources to handle the load.</p>
description = <p>This search calculates the average number of searches per day by each search type over the last 1 days. Not all searches have the same impact to your environment.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> >= 500,000</li>\
<li><strong>Medium:</strong> 250,000 - 499,000</li>\
<li><strong>Normal:</strong> < 250,000</li>\
</ul>
search = index=_audit search_id!="*rsa_*" search_id!="*RemoteStorageRetrieveBuckets_*" search_id!="*searchparsetmp_*" search_id!="*remote_*" search_id=* total_run_time \
| eval summary_id="ssef_scma_search_count_by_type" \
| eval host_sid = 'host'.":".'search_id' \
| eval searchtype=case ( match(search_id,"^\'?\d{10}\.\d+"),"ad_hoc", match(search_id,"^\'?md\_"),"metadata", match(search_id,"^\'?prd\.ph\_"),"parallel_reduce", match(search_id,"^\'?rt\_\d{10}\.\d+"),"real_time", match(search_id,"^\'?scheduler\_\_?"),"scheduled", match(search_id,"^\'?subsearch\_"),"subsearch", match(search_id,"^\'?summarize\_"),"summary", match(search_id,"^\'?SummaryDirector\_"),"report_acceleration", match(search_id,"^\'?ta\_"),"type_ahead", match(search_id,"^\'?alertsmanager"),"type_ahead", match(search_id,"^\'?\w+\_\_\w+\_\_"),"dashboard_panel",true(),"unclassified") \
| bin _time span=1d \
| stats dc(host_sid) AS search_count by _time searchtype \
| stats avg(search_count) AS search_count_daily_avg latest(_time) as _time by searchtype \
| eval search_count_daily_avg=round(search_count_daily_avg,0) \
| addcoltotals labelfield=searchtype \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( search_count_daily_avg >= 500000, high, search_count_daily_avg >= 250000, medium, searchtype="Total", normal, true(), normal ) \
| table _time searchtype search_count_daily_avg severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_count_by_type summary job completed successfully without identifying any issues, and everything is operating as expected.")`

