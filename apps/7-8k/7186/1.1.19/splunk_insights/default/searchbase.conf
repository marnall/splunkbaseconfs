severity_medium_text = <br/><p><span style="color: rgb(60,68,77);background-color: rgb(255,255,255);font-size: 14px;font-family: Splunk Platform Sans", "Proxima Nova", Roboto, Droid, "Helvetica Neue", Helvetica, Arial, sans-serif;">Less than 30% of the enabled detections have triggered</span> within the past 3 months.</p>
severity_high_text = <br/><p>Less than 30% of the enabled detections have triggered within the past year.</p>
severity_critical_text = <br/><p>Less than 10% of the enabled detections have triggered within the past year.</p>
description = <p>Look back over the the past 365 days and record the latest time each active detection has triggered.</p>\
<p>Review detections which have not fired and validate.</p>\
<p>Consider using attack simulation tools where there would not be any expected attack data to test with.</p>
search = index=notable \
| eval summary_id="correlation_search_strike_rate" \
| `ssef_instance_info(host)` \
| stats max(_time) as _time count as total_count by label source\
| rename source as savedsearch_name\
| append \
    [| search `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 \
    | stats latest() as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
    | stats latest(savedsearch_search) as search by label savedsearch_name \
    | eval mockCount="0" \
    | fields label savedsearch_name search mockCount ] \
| stats values(mockCount) as mockCount values(total_count) as total_count values(_time) as _time values(search) as search by label savedsearch_name \
| where search like "%" \
| eval total_count=coalesce(total_count,mockCount) \
| fields - mockCount \
| eval last_triggered=case(_time>now()-86400*7,"past_week",_time<now()-86400*7 AND _time>now()-86400*31,"past_month",_time<now()-86400*31 AND _time>now()-86400*92,"past_3_months",_time<now()-86400*92 AND _time>now()-86400*92*2,"past_6_months",_time<now()-86400*92*2,"over_6_months_ago",total_count="0","never",1=1,"error") \
| eventstats count(eval(if(last_triggered="past_week",last_triggered,null()))) as past_week_count, count(eval(if(last_triggered="past_month",last_triggered,null()))) as past_month_count, count(eval(if(last_triggered="past_3_months",last_triggered,null()))) as past_3_months_count, count(eval(if(last_triggered="past_6_months",last_triggered,null()))) as past_6_months_count, count(eval(if(last_triggered="over_6_months_ago",last_triggered,null()))) as over_6_months_ago_count, count(eval(if(last_triggered="never",last_triggered,null()))) as never_count count as total_correlation_searches \
| eval this_year_perc=(past_week_count + past_month_count + past_3_months_count)/total_correlation_searches*100 \
| eval severity_level = case ( never_count/total_correlation_searches*100 > 90, 5, never_count/total_correlation_searches*100 > 70, 4, (past_week_count + past_month_count + past_3_months_count)/total_correlation_searches*100 < 30, 3, never_count/total_correlation_searches*100 > 50, 2, true(), 1) \
| table label savedsearch_name last_triggered never_count over_6_months_ago_count past_3_months_count past_6_months_count past_month_count past_week_count search this_year_perc total_correlation_searches total_count severity_level \
| `ssef_handle_no_results(1,"The correlation_search_strike_rate summary job completed successfully without identifying any issues, and everything is operating as expected.")`

