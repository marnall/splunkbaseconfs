execution_plan = <b>01</b> <code>| ssef_scma_indexing_data_source_inventory</code><br> - Identifies sourcetypes newly introduced into the environment.<br><b>02</b> <code>| ssef_sourcetype_mapping</code><br> - Enriches sourcetypes with category and domain metadata.<br><b>03</b> <code>| stats latest(*)</code><br> - Aggregates indexing footprint by sourcetype.<br>
explanation = <p>Tracking newly added sourcetypes is critical for maintaining control over data growth, schema consistency, and license consumption. This search enriches new sourcetypes with category and domain context, then aggregates their host count, source count, and event volume to provide immediate visibility into onboarding impact. Platform administrators can use this information to validate ingestion standards, identify unexpected data sources, and prioritize follow-up with data owners. Over time, this insight supports stronger data governance and more predictable indexing behavior.</p>
