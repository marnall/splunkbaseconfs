[is4s_efs_score]
search_name = IS4S EFS Score KPI
readonly = 1
date_created = 2025-11-26 11:54:42
date_updated = 2025-11-26 11:54:42
category = Splunk
sub_category = _internal
tags = Details,EFS,IS4S
solution = <p>Produces a weekly roll-up of operational KPIs that can be used to generate an overall efficiency score for the Splunk environment.</p><p><b>Suggested Actions</b><br><b>1.</b> Use this search as input for a calculated efficiency score metric.<br><b>2.</b> Identify KPIs with persistently high or low values for targeted remediation.<br><b>3.</b> Track efficiency score trends to detect gradual degradation in performance.<br><b>4.</b> Correlate drops in efficiency with platform changes or incidents.<br><b>5.</b> Integrate score into executive-level operational dashboards.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (efficiency_score &gt;= 90, 1, efficiency_score &gt;= 75, 2, efficiency_score &gt;= 60, 3, efficiency_score &gt;= 40, 4, efficiency_score &lt; 40, 5)</code></pre><p>This SPL should be added after calculating your efficiency_score field to classify its health. <b>Thresholds should be tuned to match your environment</b>.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> ≥90 efficiency score — optimal operations.</li><li><b>Low (Severity 2):</b> 75–89 score — healthy but with room for improvement.</li><li><b>Medium (Severity 3):</b> 60–74 score — moderate efficiency loss.</li><li><b>High (Severity 4):</b> 40–59 score — significant inefficiencies detected.</li><li><b>Critical (Severity 5):</b> &lt;40 score — severe operational risk.</li></ul>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
explanation = <p>This search pulls a wide set of pre-summarized Splunk health metrics from the <code>ssef_summary_index</code>, covering ingestion, search performance, clustering health, resource utilization, data model acceleration, and more. By filling nulls, binning to weekly spans, and taking the maximum per KPI, it provides a reliable weekly "worst-case" snapshot across the monitored environment.</p><p>Operationally, these weekly aggregates can feed into an efficiency score formula that quantifies overall Splunk platform health. Trends in this score can be used for SLA reporting, capacity planning, and targeted remediation. The search demonstrates how to efficiently roll up multiple disparate metrics into a single time-aligned view.</p>
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Fillnull" target="_blank">fillnull command</a><br>Replace null field values with a default to ensure consistent calculations.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Bin" target="_blank">bin command</a><br>Group events into buckets based on time or numerical ranges.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Stats" target="_blank">stats command</a><br>Perform statistical calculations on search results.</li></ul>
description = <p>Efficiency Score KPIs.</p>
search = ```Main search block to get data for the LATEST valid day (Current)```\
`ssef_summary_index`\
    [| search `ssef_summary_index` source IN (`ssef_efs_sources`) latest=-0d@d\
    | bin _time span=1d\
    | stats count by _time\
    | search count > 30\
    | sort - _time\
    | head 1\
    | eval earliest=_time, latest=_time+86400\
    | fields earliest latest]\
source IN (`ssef_efs_sources`)\
| fields `ssef_efs_fields`\
| fillnull value=0\
| fields - source search_name\
| stats max(*) as *\
| transpose\
| lookup ssef_efs_scoring Output_Fields as column output\
| rename "row 1" as Current column as Output_Fields \
| sort ID \
| table ID Category Subcategory Quotient_Type Name Title Output_Fields Feasibility Impact Weighting Current Baseline\
\
```Append columns with data for the EARLIEST valid day (Baseline)```\
| appendcols\
    [ search `ssef_summary_index`\
        [| search `ssef_summary_index` source IN (`ssef_efs_sources`) latest=-0d@d\
        | bin _time span=1d\
        | stats count by _time\
        | search count > 30\
        | sort _time\
        | head 1\
        | eval earliest=_time, latest=_time+86400\
        | fields earliest latest]\
    source IN (`ssef_efs_sources`)\
    | fields `ssef_efs_fields`\
    | fillnull value=0\
    | fields - source search_name\
    | stats max(*) as *\
    | transpose\
    | lookup ssef_efs_scoring Output_Fields as column output\
    | rename "row 1" as Baseline column as Output_Fields \
| sort ID \
| table ID Category Subcategory Quotient_Type Name Title Output_Fields Feasibility Impact Weighting Current Baseline]\
\
```Perform final calculations on the combined Current and Baseline data```\
| table ID Category Subcategory Quotient_Type Name Title Output_Fields Feasibility Impact Weighting Baseline Current\
| eval CPQ_Base = ROUND(if(isnull(Baseline) OR isnull(Current) OR Baseline=0 OR Current=0, 0, 1),4)\
| eval CPQ_Current = ROUND(if(isnull(Baseline) OR isnull(Current) OR Baseline=0 OR Current=0, 0, (((Current - Baseline)/Baseline) + 1)),4)\
| eval CPQ_Perc = ROUND(if(isnull(Baseline) OR isnull(Current) OR Baseline=0 OR Current=0, 0, (CPQ_Current - 1) * 100),4)\
| eval Weighted_Score_Base=ROUND(if(isnull(Baseline) OR isnull(Current) OR Baseline=0 OR Current=0, 0, Weighting),2)\
| eval Weighted_Score_Current=if(ROUND(Weighting*CPQ_Current,2) <= 3*Weighting, ROUND(Weighting*CPQ_Current,2), 3*Weighting)\
| fields - Subcategory Title Output_Fields Feasibility Impact CPQ_Base CPQ_Current\
| sort ID\
| fields - CPQ_Perc Weighting ID\
| eval skipped_metrics_count=if(Weighted_Score_Current=0, 1, 0), assessed_metrics_count=if(Weighted_Score_Current=0, 0, 1), Category=if(match(Category, "^Search.*"), "Search", Category) \
| stats sum(Weighted_Score_Base) as Weighted_Score_Base sum(Weighted_Score_Current) as Weighted_Score_Current sum(skipped_metrics_count) as skipped_metrics_count sum(assessed_metrics_count) as assessed_metrics_count by Quotient_Type \
| eval Holistic_Quotient_Percentage=((Weighted_Score_Current-Weighted_Score_Base)/Weighted_Score_Base) * 100 \
| fields - skipped_metrics_count assessed_metrics_count Holistic_Quotient_Percentage \
| eval Adoption_Base=if(Quotient_Type="Adoption", Weighted_Score_Base, null()) \
| eval Resource_Utilization_Base=if(Quotient_Type="Resource Utilization", Weighted_Score_Base, null()) \
| eval Adoption_Current=if(Quotient_Type="Adoption", Weighted_Score_Current, null()) \
| eval Resource_Utilization_Current=if(Quotient_Type="Resource Utilization", Weighted_Score_Current, null()) \
| stats\
    max(Adoption_Base) as Adoption_Base,\
    max(Resource_Utilization_Base) as Resource_Utilization_Base,\
    max(Adoption_Current) as Adoption_Current,\
    max(Resource_Utilization_Current) as Resource_Utilization_Current \
| eval Base_Ratio=round(Adoption_Base / Resource_Utilization_Base, 4) \
| eval Current_Ratio=round(Adoption_Current / Resource_Utilization_Current, 4) \
| eval Assessment_EfS_Score_Percentage = round(((1 - (Base_Ratio-Current_Ratio)/Base_Ratio) - 1) * 100)\
| fields Assessment_EfS_Score_Percentage\
| rename Assessment_EfS_Score_Percentage as "EfS Score Change"

[summary_accelerated_data_models]
search_name = Accelerated Data Models
readonly = 1
ssef_cron = weekly
target_component = Data Models
version = 3.0.1
date_created = 2025-08-04
date_updated = 2025-11-26 15:54:39
category = Splunk
sub_category = _internal
tags = Acceleration,EFS,Performance,Summary
solution = <p>Having accelerated data models improves overall Splunk search responsiveness and supports many core apps like ITSI and Enterprise Security.</p><p><b>Suggested Actions</b><br><b>1.</b> Validate data model acceleration is enabled for performance-critical objects<br><b>2.</b> Investigate and fix models that are disabled or not accelerating as expected<br><b>3.</b> Audit permissions on accelerated models to ensure correct sharing<br><b>4.</b> Consult app documentation on best practices for acceleration settings<br><b>5.</b> Periodically review acceleration summaries via Monitoring Console</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (accel_data_model_count == 0, 3, accel_data_model_count > 0, 1)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> <i>At least one accelerated data model is active</i></li><li><b>Medium (Severity 3):</b> <i>No active accelerated data models found</i></li></ul>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| rest /services/data/models</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieves metadata for all data models including acceleration status<br><b>02</b> <code>| fields title acceleration disabled dataset.type</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Restricts to relevant fields for analysis<br><b>03</b> <code>| search acceleration="1" disabled="0" dataset.type=datamodel</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters for actively accelerated data models<br><b>04</b> <code>| stats count as accel_data_model_count</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Counts how many are active<br><b>05</b> <code>| eval severity_level = case (...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assigns severity level based on count<br>
quid = AF109C83EC4A1842AF9A7D4D2EE83E9D
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>Your Splunk deployment includes one or more active accelerated data models, ensuring faster search performance and optimal app responsiveness.</p>
severity_medium_text = <p>No active accelerated data models were found. This may indicate a misconfiguration, missing app setup, or lost optimization potential for searches dependent on acceleration.</p>
description = <p>This search uses REST to find enabled datamodels that are accelerated. A larger DMA count may indicate higher adoption and maturity in the Splunk environment. Have more accelerated data models gives users the ability to run advanced and faster searches.</p>
search = `ssef_summary(ssef_data_models)` (disabled=0 acceleration=1 dataset_type=datamodel) \
| eval summary_id="summary_accelerated_data_models" \
| stats latest(*) as * latest(_time) as _time by label, app, title \
| stats count as accel_data_model_count \
| eval severity_level = case (accel_data_model_count == 0, 3, accel_data_model_count > 0, 1) \
| table accel_data_model_count severity_level \
| `ssef_handle_no_results(1,"The summary_accelerated_data_models summary job completed successfully without identifying any issues, and everything is operating as expected.")`

