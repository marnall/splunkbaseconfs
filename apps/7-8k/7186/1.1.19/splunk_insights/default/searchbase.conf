[Search Execution by Domain and Category]
search_name = Search Execution by Domain and Category
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker
version = 2.0
date_updated = 2025-2-3 12:47:23
category = Splunk
sub_category = Adoption
tags = Adoption,Details,Search
solution = <p>This search provides clear visibility into which users and apps consume the most search time across the platform.</p><p><b>Suggested Actions</b>: Review high search-time users for optimization opportunities, tune or refactor expensive apps, and use the results to guide enablement, governance, and performance improvement initiatives.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Targeted training can reduce inefficient searches and improve overall platform performance.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert assistance for search optimization, governance models, and usage management.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=search%20optimization" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps that help analyze, optimize, and govern search usage and performance.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary()</code><br> - Reads summarized audit data from IS4S to analyze user login and search behavior efficiently.<br><b>02</b> <code>| stats / eval / lookup</code><br> - Aggregates total search time by user and app, enriches with domain and category context, and converts metrics into actionable units.<br>
explanation = <p>Understanding how search time is distributed across users and apps is critical for capacity planning, governance, and adoption optimization. This search helps platform administrators and enablement teams identify heavy search users, high-cost apps, and domains that consume disproportionate resources. These insights can inform performance tuning, targeted training, and app rationalization decisions. Over time, tracking search time by app and user supports fair-use policies and helps align platform usage with business value.</p>
quid = 2C6AF8A3209D8D696C324844308D3534
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/DMC/SearchactivityDeploymentwide" target="_blank">Splunk Docs: Search Activity - Splunk Documentation</a> - This documentation provides insights into search activity across Splunk deployments, helping to identify searches by domain and category and assess their impact on system performance.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Commandsbycategory" target="_blank">Splunk Docs: Commands by category - Splunk Documentation</a> - Explore Splunks categorized search commands to understand their application across various domains and use cases, facilitating effective search analysis.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-generate-a-search-to-sort-based-on-domain-names-and-count/m-p/352176" target="_blank">Splunk Community: How to generate a search to sort based on domain names and count</a> - This discussion offers practical methods to sort and count search results by domain, aiding in evaluating search activity by category.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-can-I-create-this-Splunk-Query-for-a-specific-domain-an/m-p/302268" target="_blank">Splunk Community: How can I create this Splunk Query for a specific domain</a> - Learn how to create tailored queries for specific domains, enabling focused analysis of search activity within Splunk.</li></ul>
description = <p>This search analyzes <b>user search time consumption</b> by <b>app and domain</b> using audit summary data. It highlights <b>which users and apps drive the most search effort</b> across search heads. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p></p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`, splunk-system-user) \
| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type role index_reference sourcetype_reference datamodel_reference \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| stats sum(total_search_time) as total_search_time by label, app, user \
| `ssef_splunkbase_apps(app)` \
| eval categories=split(categories,"|") \
| `ssef_technology(app,categories)` \
| stats latest(*) as * by label, app, user, categories \
| `ssef_app_categories(categories)` \
| stats latest(*) as * latest(_time) as _time values(Categories) as Categories values(Domain) as Domain by label app user \
| eval updated_time=trim(updated_time,".000000") \
| convert ctime(updated_time) \
| eval total_search_time_hr = round(total_search_time/3600, 2) \
| sort 0 - total_search_time \
| table label title app user Domain Categories app_version updated_time total_search_time_hr \
| rename app as "App ID" title as "App Name" app_version AS "App Version" updated_time AS "App Last Update" label AS "Search Head", total_search_time_hr as "Total Search Time (hr)" , user as "Splunk User"

[Search Execution Details]
search_name = Search Execution Details
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker
version = 2.0
date_updated = 2025-2-3 12:52:28
category = Splunk
sub_category = Health
tags = Adoption,Details,Search,Usage
solution = <p>This search highlights how Splunk usage is distributed across individual users and Search Heads, enabling teams to understand where search activity and compute demand are concentrated.</p><p><b>Suggested Actions</b><br><b>1.</b> Review top users regularly to understand legitimate heavy usage versus inefficient search behavior.<br><b>2.</b> Engage power users to optimize long-running or repetitive searches.<br><b>3.</b> Use trends from this data to support <b>capacity planning</b> and Search Head scaling decisions.<br><b>4.</b> Validate that elevated usage aligns with business priorities rather than accidental overconsumption.<br><b>5.</b> Incorporate these insights into governance and enablement programs to improve overall platform efficiency.</p><p> Recommended For You: <ul><li><a href="https://www.splunk.com/en_us/products/observability-cloud.html" target="_blank">Cisco or Splunk Products or Services: Splunk Observability Cloud</a><br>End-to-end metrics, traces, and logs correlation to speed troubleshooting and reduce blind spots.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Cisco or Splunk Products or Services: Splunk Cloud Platform</a><br>Managed Splunk platform to simplify operations while supporting scalable search and analytics.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Cisco or Splunk Products or Services: Cisco ThousandEyes Assurance</a><br>Internet and network assurance visibility to correlate user experience issues with network/service health.</li><li><a href="https://www.cisco.com/site/us/en/solutions/full-stack-observability/index.html" target="_blank">Cisco or Splunk Products or Services: Cisco AppDynamics</a><br>Full-stack observability to connect application performance and business impact across domains.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_audit_user_login_tracker)`</code><br> - Retrieves pre-aggregated audit summary data required for efficient historical analysis.<br><b>02</b> <code>NOT user IN (...)</code><br> - Excludes default and system users to focus analysis on human-driven activity.<br><b>03</b> <code>| fields ...</code><br> - Limits the dataset to only the fields required for aggregation and reporting.<br><b>04</b> <code>| bin _time span=1h</code><br> - Normalizes events into hourly buckets for consistent time-based aggregation.<br><b>05</b> <code>| stats latest(*)</code><br> - Captures the most recent values per user, app, and Search Head within each time bucket.<br><b>06</b> <code>| stats sum(total_search_time)</code><br> - Aggregates total search time per user to reflect cumulative usage impact.<br><b>07</b> <code>| eval total_search_time_hr</code><br> - Converts raw seconds into hours for easier interpretation by stakeholders.<br><b>08</b> <code>| sort - total_search_time</code><br> - Prioritizes users with the highest cumulative search consumption.<br><b>09</b> <code>| table ...</code><br> - Presents a concise, executive-friendly view of usage by user and Search Head.<br>
explanation = <p>This search provides operational visibility into how individual users interact with Splunk across Search Heads by aggregating historical audit-derived summary data. By focusing on total search time rather than raw event counts alone, teams gain a clearer understanding of <b>actual compute consumption</b> driven by user behavior.</p><p>From an operational standpoint, this enables leaders to distinguish between casual and heavy users, identify candidates for query optimization, and validate whether search usage aligns with organizational expectations or licensing models. Over time, these insights can inform <b>capacity forecasting</b>, <b>governance discussions</b>, and <b>cost optimization strategies</b> without treating higher adoption as an inherent problem.</p>
quid = 8C36979E751905894973754982E36885
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Eval" target="_blank">Splunk Docs: eval</a><br>Reference for creating calculated fields like time-in-hours and other derived metrics.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/SearchReference/Stats" target="_blank">Splunk Docs: stats</a><br>Reference for aggregations used to summarize user activity and total search time.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.1/SearchReference/Fields" target="_blank">Splunk Docs: fields</a><br>Reference for keeping only required fields to reduce processing and improve readability.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/10.0/search-commands/bin" target="_blank">Help: bin</a><br>Reference for time bucketing (span=1h) prior to aggregation.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.3/search-commands/sort" target="_blank">Help: sort</a><br>Reference for ordering results to spotlight highest total search time consumers.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.1/search-commands/table" target="_blank">Help: table</a><br>Reference for producing the final tabular output for dashboards and reporting.</li><li><a href="https://help.splunk.com/en/splunk-cloud-platform/search/spl2-search-reference/rename-command/rename-command-overview-syntax-and-usage" target="_blank">Help: rename</a><br>Reference for renaming fields into presentation-friendly column headers.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Cisco or Splunk Products or Services: Splunk SPL Cheat Sheet</a><br>Quick reference for common SPL commands and patterns used in operational reporting searches.</li></ul>
description = <p>This search analyzes <b>user activity</b> on Splunk Search Heads by summarizing login behavior and cumulative search usage over time. It helps administrators understand <b>who is actively using Splunk</b> and how much total search time is being consumed per user. This insight supports <b>capacity planning</b>, <b>usage accountability</b>, and informed operational decision-making.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`, splunk-system-user) \
| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type role index_reference sourcetype_reference datamodel_reference \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| stats sum(total_search_time) as total_search_time by label, app, user \
| eval total_search_time_hr = round(total_search_time/3600, 2) \
| sort 0 - total_search_time \
| table label app user total_search_time_hr \
| rename label as "Search Head" , total_search_time_hr as "Total Search Time (hr)" , user as "Splunk User" , app as App

