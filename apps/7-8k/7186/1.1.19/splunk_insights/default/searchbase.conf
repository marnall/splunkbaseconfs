category = Splunk
sub_category = _internal
tags = CPU,KPIs,Performance
solution = <p>This query provides visibility into CPU usage trends across applications, enabling proactive performance monitoring and resource optimization.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify applications with consistently high CPU usage and investigate root causes.<br><b>2.</b> Optimize resource-intensive applications to reduce CPU load.<br><b>3.</b> Set thresholds for CPU usage alerts to prevent resource saturation.<br><b>4.</b> Use the insights to allocate system resources more effectively.<br><b>5.</b> Monitor trends over time to assess the impact of changes in workload or configuration.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (normalized_pct_cpu<50, 1, normalized_pct_cpu>=50 AND normalized_pct_cpu<70, 2, normalized_pct_cpu>=70 AND normalized_pct_cpu<85, 3, normalized_pct_cpu>=85 AND normalized_pct_cpu<95, 4, normalized_pct_cpu>=95, 5)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> CPU usage below 50%.</li><li><b>Low (Severity 2):</b> CPU usage between 50% and 70%.</li><li><b>Medium (Severity 3):</b> CPU usage between 70% and 85%.</li><li><b>High (Severity 4):</b> CPU usage between 85% and 95%.</li><li><b>Critical (Severity 5):</b> CPU usage above 95%.</li></ul>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>tstats summariesonly=true count perc95(data.normalized_pct_cpu) as normalized_pct_cpu</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates CPU usage data using percentile statistics.<br><b>02</b> <code>where index="<<_introspection>>" sourcetype="<<splunk_resource_usage>>" component=PerProcess</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters data for the introspection index and specific components.<br><b>03</b> <code>data.search_props.app IN (search,itsi,*sec*)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Focuses on applications like search, ITSI, and security-related ones.<br><b>04</b> <code>timechart perc95(normalized_pct_cpu) by data.search_props.app</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Visualizes CPU usage trends over time, categorized by application.<br>
explanation = <p>This search analyzes CPU usage data collected by Splunks introspection index. It focuses on the <b>data.normalized_pct_cpu</b> field, filtering for positive values and specific applications (e.g., search, ITSI, and security-related apps). The query uses <b>tstats</b> for performance-efficient aggregation and <b>timechart</b> to visualize percentile CPU usage trends over time, categorized by application.</p><p>For junior engineers, this search demonstrates efficient usage of <b>tstats</b> for large-scale data analysis and the value of percentile statistics (<b>perc95</b>) in identifying CPU usage patterns. It showcases how to segment data by applications and visualize results with <b>timechart</b>.</p><p>Operationally, this search aids in monitoring resource utilization by application, helping diagnose performance issues and ensure optimal use of system resources.</p>
quid = DB24341CD26B5488AC57D1FA50DC50CA
search_author = akhamis
updated_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com" target="_blank">Splunk Community</a><br>Discuss CPU performance monitoring and optimization strategies.</li><li><a href="https://lantern.splunk.com" target="_blank">Splunk Lantern</a><br>Guidance on monitoring and managing system performance.</li><li><a href="https://splunkbase.splunk.com" target="_blank">Splunkbase Apps</a><br>Find apps for advanced performance monitoring and resource management.</li></ul>
description = <b>Monitors normalized CPU usage</b> for specific Splunk apps, focusing on apps like search, ITSI, and security-related apps.
default_viz = splunk.column
search = | tstats summariesonly=true count perc95(data.normalized_pct_cpu) as normalized_pct_cpu WHERE index=_introspection sourcetype="splunk_resource_usage" component=PerProcess data.normalized_pct_cpu>0 data.search_props.app IN (search,itsi,*sec*) by _time span=5m data.search_props.app \
| timechart partial=t fixedrange=t perc95(normalized_pct_cpu) as normalized_pct_cpu by data.search_props.app

[Page View Details]
search_name = Page View Details
readonly = 1
diagnostic_searches = ssef_internal_web_access_tracker
version = 1.0.3
date_updated = 2025-10-15 14:23:9
category = Splunk
sub_category = Adoption
tags = Adoption,Details
solution = <p>This search provides a clear view into how Splunk apps and views are actually used, enabling data-driven adoption and optimization decisions.</p><p><b>Suggested Actions</b>: Identify underused apps or views for cleanup or enablement, promote high-value workflows, and align training efforts with observed usage patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Targeted training helps increase adoption and ensures users get more value from commonly accessed apps and views.</li><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise.html" target="_blank">Products: Splunk Enterprise</a><br>Provides the core platform capabilities for monitoring usage, optimizing experience, and scaling user engagement.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=usage" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover additional Splunk and Cisco apps that extend usage analytics, adoption tracking, and platform insights.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary()</code><br> - Reads pre-aggregated IS4S summary data to efficiently analyze web access behavior without scanning raw events.<br><b>02</b> <code>| stats / eval / lookup</code><br> - Aggregates usage metrics, enriches app context, and normalizes user counts to produce actionable adoption insights.<br>
explanation = <p>Understanding how users interact with Splunk’s web interface is critical for driving adoption and improving operational efficiency. This search helps platform owners and admins identify which apps and views deliver value, which ones see limited engagement, and where users spend the most time. These insights support better decisions around app rationalization, UX improvements, and targeted enablement. Over time, trends from this data can guide capacity planning, training investments, and governance priorities.</p>
quid = C0640A88256CF00184C1B5ECC882ED6F
updated_author = akhamis
related_info = <ul><li><p><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Admin/MonitoringUsage">Splunk Docs: Use the Usage dashboards</a></p><p>This documentation explains how to utilize the Usage dashboards in Splunk Cloud Platform to monitor user activity, including page views and app interactions, aiding in understanding user engagement and system utilization.</p></li><li><p><a href="https://community.splunk.com/t5/Getting-Data-In/Is-it-possible-to-Monitor-Splunk-User-activity/m-p/61992">Splunk Community: Is it possible to Monitor Splunk User activity?</a></p><p>This community discussion explores methods to monitor user activity within Splunk, providing insights into tracking page views and user interactions to assess their impact on user experience.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/learn/user-engagement-ux-metrics.html">Splunk Blogs: User Engagement Metrics To Know</a></p><p>This blog post discusses key user engagement metrics, including page views, and their significance in evaluating user experience and the value delivered to customers through the Splunk platform.</p></li><li><p><a href="https://community.splunk.com/t5/All-Apps-and-Add-ons/See-User-Activity-by-App-and-View/m-p/404469">Splunk Community: See User Activity by App and View</a></p><p>This discussion provides insights into tracking user activity by app and view within Splunk, helping to understand user engagement and the utilization of different parts of the platform.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/learn/customer-experience-metrics.html">Splunk Blogs: Customer Experience (CX) Metrics</a></p><p>This blog post explores various metrics essential for evaluating customer experience, emphasizing the role of user activity data, such as page views, in understanding and enhancing user satisfaction.</p></li><li><p><a href="https://docs.splunk.com/Documentation/UBA/5.4.1/User/Users">Splunk Docs: Review overall user activity</a></p><p>This documentation provides guidance on reviewing overall user activity in Splunk User Behavior Analytics, offering insights into user interactions and behaviors that can impact system performance and user experience.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/tips-tricks-using-splunk-for-web-analytics-and-sessions.html">Splunk Blogs: Tips & Tricks: Using Splunk for Web Analytics and Sessions</a></p><p>This blog post offers tips on utilizing Splunk for web analytics, including tracking page views and user sessions, to gain insights into user behavior and improve the overall user experience.</p></li><li><p><a href="https://docs.splunk.com/Documentation/ES/8.0.1/User/UserRiskDashboard">Splunk Docs: User activity monitoring</a></p><p>This documentation explains how to monitor user activity using the User Risk Dashboard in Splunk Enterprise Security, aiding in understanding user interactions and their potential impact on system security and performance.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/learn/rum-real-user-monitoring.html">Splunk Blogs: What is Real User Monitoring?</a></p><p>This blog post introduces Real User Monitoring (RUM) and discusses how tracking real user interactions, including page views, can provide valuable insights into user experience and help enhance the value delivered to customers.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/it/understanding-the-causes-of-negative-customer-experience.html">Splunk Blogs: Understanding The Causes of Negative Customer Experience</a></p><p>This blog post explores factors that can lead to negative customer experiences, highlighting the importance of monitoring user interactions, such as page views, to identify and address potential issues proactively.</p></li></ul>
description = <p>This search summarizes <b>internal Splunk web usage</b> by tracking <b>search head, app, and view activity</b> over time. It measures <b>page loads, user engagement, and time spent</b> to understand how the platform is being used. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p></p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_internal_web_access_tracker)` type!=system \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \\
| bin _time span=1h \
| stats latest(*) as * by _time, label, type, app, view \
| eval users_mv=split(users_mv,", ") \
| `ssef_splunkbase_apps(app)` \
| eval categories=split(categories,"|") \
| `ssef_technology(app,categories)` \
| stats sum(num_page_loads) as num_page_loads sum(num_users) as num_users values(users_mv) as users_mv sum(spent_ms) as spent_ms values(Domain) as Domain latest(_time) as _time by label, type, app, view, categories \
| `ssef_app_categories(categories)` \
| stats latest(*) as * values(users_mv) as users_mv latest(_time) as _time values(Categories) as Categories values(Domain) as Domain by label, type, app, view \
| eval num_users = if(isnotnull(users_mv), mvcount(users_mv), num_users) \
| table _time label type app view num_page_loads num_users spent_ms Domain Categories \
| rename label AS "Search Head" type AS "Type" app AS "App" view AS "View" num_page_loads AS "Num Page Loads" num_users AS "Num Users" spent_ms AS "Spent Ms" Domain AS "Domain" Categories AS "Categories"

