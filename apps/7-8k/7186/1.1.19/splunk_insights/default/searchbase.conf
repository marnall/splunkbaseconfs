solution = <p>Previous Version:</p><div spellcheck="false" class="ql-code-block-container"><div class="ql-code-block">| `ssef_license_search_data` ```Sourcetypes Base``` </div><div class="ql-code-block">| where License_Usage &gt; 0 </div><div class="ql-code-block">| bin _time span=1d </div><div class="ql-code-block">| addinfo </div><div class="ql-code-block">| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 </div><div class="ql-code-block">| eventstats dc(_time) as num_active_days by Sourcetype </div><div class="ql-code-block">| eval perc_active = round((num_active_days / num_days) * 100, 2) </div><div class="ql-code-block">| eval Active_Sourcetype = if((perc_active &gt;= `ssef_perc_active_threshold`) AND num_searches &gt; 0, Sourcetype, null() ) </div><div class="ql-code-block">| eval datamodel_reference=split(datamodel_reference,"|") </div><div class="ql-code-block">| eval Sourcetype=mvdedup(mvappend(lower(Sourcetype),lower(datamodel_reference))) </div><div class="ql-code-block">| stats </div><div class="ql-code-block">    dc(Sourcetype) as Num_Sourcetypes, </div><div class="ql-code-block">    dc(Active_Sourcetype) as Num_Regularly_Accessed_Sourcetypes </div><div class="ql-code-block">    by _time </div><div class="ql-code-block">| eval Perc_of_Regularly_Accessed_Sourcetypes_to_total = round((Num_Regularly_Accessed_Sourcetypes / Num_Sourcetypes) * 100, 2) </div><div class="ql-code-block">| fillnull value=0 Num_Sourcetypes, Num_Regularly_Accessed_Sourcetypes, Perc_of_Regularly_Accessed_Sourcetypes_to_total </div><div class="ql-code-block">| fields _time Num_Sourcetypes Num_Regularly_Accessed_Sourcetypes Perc_of_Regularly_Accessed_Sourcetypes_to_total </div><div class="ql-code-block">| bin _time span=1d </div><div class="ql-code-block">| stats max(Num_Regularly_Accessed_Sourcetypes) as "# of Regularly Accessed Sourcetypes" by _time </div><div class="ql-code-block">``` | `ssef_delta_predict("# of Regularly Accessed Sourcetypes")`  ``` </div><div class="ql-code-block">| `ssef_no_data_post("# of Regularly Accessed Sourcetypes")`</div></div>
