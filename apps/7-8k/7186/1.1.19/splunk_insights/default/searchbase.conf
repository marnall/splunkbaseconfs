search_author = akhamis
updated_author = akhamis
description = <p>This search analyzes Splunk dashboard and view definitions to identify and reconstruct complex searches that are built using a "base" and "post-search" structure.</p><p><strong>Purpose:</strong> In many advanced dashboards, a panel's search is split into two parts: a main base search defined once with an <code>id</code>, and a second inline search that uses the <code>base</code> attribute to run after the main one. This makes it difficult to see the full, executable query just by looking at the panel's XML. This query solves that problem by making those hidden dependencies visible.</p><p><strong>How it Works:</strong></p><ol><li data-list="ordered"><span class="ql-ui"></span>It scans all search blocks within the specified dashboards.</li><li data-list="ordered"><span class="ql-ui"></span>It isolates the "child" searches (those with a <code>base="..."</code> attribute).</li><li data-list="ordered"><span class="ql-ui"></span>Using a <code>join</code>, it finds the corresponding "parent" search (the one with a matching <code>id="..."</code> attribute).</li><li data-list="ordered"><span class="ql-ui"></span>It then combines the base query and the inline query to show the full, reconstructed SPL.</li></ol><p><strong>Use Cases:</strong></p><ol><li data-list="bullet"><span class="ql-ui"></span><strong>Performance Tuning:</strong> Identify which inline searches are running on top of large, expensive base searches.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Troubleshooting:</strong> Understand the complete logic of a dashboard panel that is failing or producing unexpected results.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Security &amp; Auditing:</strong> Reveal the full extent of data being accessed by a dashboard.</li></ol>
search = `ssef_summary(ssef_data_ui_views)` type=classic classic_search_block=* \
| stats LATEST(*) AS * by label app sharing author view_name \
| makemv delim="#####" classic_search_block \
| mvexpand classic_search_block \
| where isnotnull(classic_search_block) AND classic_search_block!="" \
| dedup classic_search_block \
| where like(classic_search_block, "%base=%") \
| rex field=classic_search_block "base=\"(?<base_id>\w+)" \
| rex field=classic_search_block "<query>(?<inline_query>[\s\S]*?)<\/query>" \
| where isnotnull(base_id) \
| join type=left label app sharing author view_name base_id \
    [| search `ssef_summary(ssef_data_ui_views)` type=classic classic_search_block=* \
    | stats LATEST(*) AS * by label app sharing author view_name \
    | makemv delim="#####" classic_search_block \
    | mvexpand classic_search_block \
    | where isnotnull(classic_search_block) AND classic_search_block!="" \
    | dedup classic_search_block \
    | where like(classic_search_block, "%id=%") \
    | rex field=classic_search_block "id=\"(?<base_id>\w+)" \
    | rex field=classic_search_block "<query>(?<base_query>[\s\S]*?)<\/query>" \
    | where isnotnull(base_id) \
    | eval base_query=trim(base_query) \
    | fields label app sharing author view_name base_id base_query ] \
| eval inline_query = trim(inline_query) \
| eval full_query = base_query + " " + inline_query \
| where isnotnull(base_query) \
| rename base_id as "Linked By ID" \
| eval source="dashboards" \
| fields source label app view_name full_query \
| rename full_query as search , view_name as name \
| append \
    [ search `ssef_summary(ssef_saved_searches)` \
    | stats latest(*) as * latest(_time) AS _time by label, app, sharing, author, savedsearch_name \
    | table label, app, sharing, author, savedsearch_name, savedsearch_search \
    | rename savedsearch_search as search , savedsearch_name as name \
    | eval source="jobs"] \
| table source label app name search\
| search label=* app=*

[Dashboard Details]
search_name = Dashboard Details
readonly = 1
diagnostic_searches = ssef_data_ui_views,ssef_internal_web_access_tracker
version = 1.1.5
date_created = 2024-11-22 14:8:37
date_updated = 2025-10-15 9:3:17
category = Splunk
sub_category = Dashboards
tags = Adoption,Dashboards,Details,KPIs
solution = <p>This insight delivers a single authoritative view of dashboard inventory enriched with real usage data.</p><p><b>Suggested Actions</b> Review dashboards with low or zero usage for retirement or redesign, validate newly added dashboards, and prioritize optimization or enablement efforts for high-impact dashboards.</p><p><b>Recommended For You:</b><ul><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=dashboards" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps that enhance dashboard governance, visualization, and adoption tracking.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary(ssef_data_ui_views)</code><br> - Collects detailed dashboard and view metadata including ownership, configuration, and references.<br><b>02</b> <code>| ssef_summary(ssef_internal_web_access_tracker)</code><br> - Aggregates user interaction data such as page loads and unique users per dashboard.<br><b>03</b> <code>| stats</code><br> - Merges metadata and usage signals to produce a unified dashboard inventory with usage context.<br>
explanation = <p>Understanding both dashboard configuration and real-world usage is critical for maintaining a healthy Splunk environment. This insight helps admins, content owners, and platform champions identify heavily used dashboards, underutilized content, and newly added assets that may require validation or promotion. By correlating structural metadata with page loads and user counts, teams can prioritize optimization efforts, reduce clutter, and focus enablement on dashboards that deliver the most value. Over time, this supports better governance, improved user experience, and stronger adoption across the platform.</p>
quid = 55DC45EBB47085F5377E3C93CB4BD36A
updated_author = akhamis
related_info = <ul><li><a href="https://www.splunk.com/en_us/blog/platform/dashboard-studio-dashboard-customization-made-easy.html" target="_blank">Splunk Blogs: Dashboard Studio: Dashboard Customization Made Easy</a><p>This blog introduces Splunk Dashboard Studio, highlighting how its flexible and intuitive features enable users to create visually appealing dashboards that improve user experience.</p></li><li><a href="https://discover.splunk.com/Improving-User-Experience-with-Dashboard-Studio.html" target="_blank">Improving User Experience with Dashboard Studio</a><p>This resource discusses how Splunk Dashboard Studio enhances user engagement by enabling better dashboard designs and improved data presentation.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/Viz/WorkingWithDashboardPanels" target="_blank">Splunk Docs: Working with Dashboard Panels</a><p>This documentation explains how to create, manage, and organize dashboard panels, helping to design dashboards that provide value and clarity to users.</p></li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/dashboard-design-getting-started-with-best-practices-part-1.html" target="_blank">Create Dashboards that People Love</a><p>A presentation providing design guidelines to create user-friendly dashboards that clearly communicate insights and enhance the user experience.</p></li><li><a href="https://rigorousthemes.com/blog/best-splunk-dashboard-examples/" target="_blank">14 Best Splunk Dashboard Examples</a><p>This article showcases inspiring examples of effective Splunk dashboards, demonstrating how well-designed dashboards can improve user satisfaction and value delivery.</p></li><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/9.3.2408/Viz/tokens" target="_blank">Splunk Docs: Token Usage in Dashboards</a><p>Learn how to use tokens to add dynamic functionality and interactivity to Splunk dashboards, enhancing the overall user experience.</p></li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Can-you-search-for-users-who-are-using-a-dashboard-between/m-p/430281" target="_blank">Splunk Community: Can you search for users who are using a dashboard between certain dates?</a><p>This community discussion explains how to track dashboard usage by users, providing insights into dashboard engagement and value.</p></li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/How-to-pass-click-value-from-Single-panel-to-other-dashboard/m-p/584530" target="_blank">Splunk Community: How to pass click.value from Single panel to other dashboard using drilldown</a><p>A guide on passing values through drilldowns in dashboards, enhancing user interactivity and usability.</p></li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Set-a-token-value-of-a-dashboard-as-the-default-of-a-drilldown/m-p/551585" target="_blank">Splunk Community: Set a token value of a dashboard as the default of a drilldown</a><p>This thread provides a solution for setting default token values in drilldowns to improve dashboard usability and user navigation.</p></li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/In-a-dashboard-how-do-I-set-a-token-using-the-first-value-from-a/m-p/378673" target="_blank">Splunk Community: In a dashboard, how do I set a token using the first value from a sorted search?</a><p>Learn how to set tokens dynamically within dashboards, enabling smarter workflows and improved functionality for users.</p></li></ul>
description = <p>This search provides a <b>comprehensive inventory</b> of dashboards along with their <b>usage metrics</b> across search heads. It combines dashboard metadata with actual user access data to show <b>what exists versus what is used</b>. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
search = `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
| fields _time, label, name, Splunk_Instance, role, app, sharing, author, view_name, view_label, type, description, location, updated, acl_perms_read, acl_perms_write, acl_removable, auto_refresh_delay, autoRun, BaseSearch, dashboard_reference, dashboard_size, datamodel_reference, eventtype_reference, index_reference, is_time_selector, lookup_reference, macro_reference, num_panels, panel_title, report_reference, rest_reference, search, source_reference, sourcetype_reference, submitButton, time_range, version, newly_added \
| foreach role, Splunk_Instance, acl_perms_*, *_reference, panel_title, time_range, auto_refresh_delay \
    [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
| foreach search BaseSearch \
    [ eval <<FIELD>> = split('<<FIELD>>', "#####") ] \
| stats `ssef_stats_rest_data_ui_views_fields` latest(newly_added) as newly_added by label app view_name \
| append \
    [| search `ssef_summary(ssef_internal_web_access_tracker)` type!=system NOT view IN (`ssef_default_views`, search) \
    | fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
    | bin _time span=1h \
    | stats latest(*) as * by _time, label, type, app, view \
    | eval users_mv=split(users_mv,", ") \
    | rename view as view_name \
    | stats sum(num_page_loads) as num_page_loads sum(num_users) as num_users values(users_mv) as users_mv by label, app, view_name \
    | eval num_users = if(isnotnull(users_mv), mvcount(users_mv), num_users) \
    | fields - users_mv ] \
| stats `ssef_stats_rest_data_ui_views_fields` max(num_page_loads) as num_page_loads max(num_users) as num_users values(newly_added) as newly_added by label app view_name \
| stats `ssef_stats_rest_data_ui_views_fields` max(num_page_loads) as num_page_loads max(num_users) as num_users latest(newly_added) as newly_added values(label) as label by app view_name \
| eval label=mvjoin(label,",") \
