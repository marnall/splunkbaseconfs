severity_normal_text = <br/><p>The check results indicate you are compatible with the limit set in the Splunk Cloud Service Description and therefore a candidate for migration.</p>
severity_medium_text = <br/><p>The inventory check has identified alert actions still using Python 2 or without a specified Python version, which may not be compatible with the latest Splunk Cloud standards. Updating these alert actions to Python 3 is strongly recommended to ensure compatibility and functionality post-migration.</p>
description = <p>This check systematically identifies all alert actions within the environment, cataloging each instance where alerts are triggered. By monitoring these alert actions, organizations can ensure that all critical notifications are functioning correctly and are aligned with operational protocols. This oversight is essential for maintaining system responsiveness, managing potential issues proactively, and enhancing security measures. Comprehensive tracking of alert actions helps in auditing compliance with established procedures and in making necessary adjustments to optimize alert efficacy and relevance.</p>\
