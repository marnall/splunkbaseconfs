search_author = akhamis
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span></p>\
<p>The count of searches executed per day in Splunk for the selected time frame. A search in Splunk is a specific query written in Splunks Search Processing Language (SPL) that is used to extract, filter, and manipulate data stored in Splunk. Searches can range from simple data retrievals to complex analytics involving multiple data sources and operations.</p>\
<p><span style="font-size: 12px;"><strong><em>The Value it Uncovers</em></strong></span></p>\
<p>Splunk searches can be thought of as the number of questions that you are asking your data. High daily search volumes signify active engagement with Splunk for data analysis, troubleshooting, and monitoring, reflecting strong platform adoption. However, the true measure of value is determined by how effectively these searches align with and meet business objectives and user needs.  Additionally, this KPI is closely linked to the performance of the Splunk instance. A downward trend in this metric may indicate performance degradations, which could negatively impact business goals as well as user satisfaction and adoption of Splunk.</p>\
<p><span style="font-size: 12px;"><strong><em>Recommended Time Period</em></strong></span></p>\
<p>Tracking this KPI monthly, quarterly, or yearly is recommended for more valuable insights into search trends, adoption rates, and user satisfaction over time.</p>
search = `ssef_summary(ssef_audit_user_login_tracker)` \
| eval summary_id="#_of_Searches_Per_Day_Export" \
| fields _time label name app user session num_searches latest_logon latest_search total_search_time search_type role index_reference sourcetype_reference datamodel_reference lookup_reference severity_level \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| timechart partial=t fixedrange=t sum(num_searches) as kpi_value span=1d  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "# of Searches Per Day" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

