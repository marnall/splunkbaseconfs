[Total_#_of_Apps_Export]
search_name = Total # of Apps Export
readonly = 1
search_hidden = 1
target_component = Apps and Add-ons
category = Splunk
sub_category = Apps
tags = Apps,IS4S Data Export,Summary
dispatch_earliest_time = -8d@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = DCB40C2792AB36E1687426795502CB26
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The total number of non-default apps installed in a customer's Splunk environment within a selected time frame. <br><br></p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>Apps, including dashboards and knowledge objects, significantly enhance the utility of indexed data. An increase in app installations often indicates a maturing Splunk environment. Monitoring the variety of installed apps is key to assessing active adoption across the organization. It's also important to watch for app sprawl—situations where apps are installed but not utilized. This metric should be analyzed alongside other KPIs, such as the number of regularly used apps and the ratio of regularly used apps to total installed apps, to get a comprehensive view of Splunk adoption. <br><br></p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>Tracking this metric <em>monthly</em>, <em>quarterly</em>, and <em>yearly</em> provides valuable insights into how effectively Splunk is being integrated.</p>
search = `ssef_summary(ssef_internal_web_access_tracker)` app=* \
| eval summary_id="Total_#_of_Apps_Export" \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1d \
| stats count by _time, app \
| appendcols \
    [ search `ssef_summary(ssef_apps_local)` disabled=0 visible=1 \
    | bin _time span=1d \
    | stats dc(app_name) as total_apps by _time ] \
| filldown total_apps \
| addinfo \
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by app \
| eval perc_active = round((num_active_days / num_days) * 100, 2) \
| fillnull value=0 perc_active total_apps \
| eval active_app = if(perc_active >= `ssef_perc_active_threshold`, app, null() ) \
| stats max(total_apps) as total_apps dc(app) as all_apps dc(active_app) as active_apps max(num_days) as num_days by _time \
| eval reg_seen_to_total = ceiling((active_apps / total_apps) * 100) , threshold=`ssef_perc_active_threshold` \
| fields _time total_apps all_apps active_apps num_days reg_seen_to_total threshold \
| bin _time span=1d \
| stats max(total_apps) as kpi_value by _time  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "Total # of Apps" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

