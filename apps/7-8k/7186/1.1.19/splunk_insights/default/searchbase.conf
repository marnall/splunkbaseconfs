[ssef_scma_indexing_compression_ratio]
search_name = Indexing Storage Compression Ratio
readonly = 1
target_component = Indexing
category = Splunk
sub_category = Indexing
tags = SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 4A11E7A722663D7957832E539FE04CA4
severity_normal_text = <br/><p>The check results indicate you are compatible with the limit set in the "Splunk Cloud Service Description" and therefore a candidate for migration.</p>
severity_low_text = <br/><p>The check results indicate you may not be compatible with the limit set in the "Splunk Cloud Service Description" and therefore a candidate for migration.</p>
description = <p>The check calculates the overall index compression ratio to better understand the daily ingest disk space utilization.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = | tstats summariesonly=true Perc90(data.total_size) AS total_size_mb Perc90(data.total_raw_size) AS total_raw_size_mb WHERE index=_introspection sourcetype=splunk_disk_objects component=Indexes data.total_size > 100 By data.name \
| eval summary_id="ssef_scma_indexing_compression_ratio" \
| rename data.* AS * \
| stats sum(total_raw_size_mb) AS total_raw_size_mb, sum(total_size_mb) AS total_size_mb \
| eval compression_ratio = round(total_raw_size_mb / total_size_mb, 1).":".1 \
| eval space_savings_percent = 100 - round( (1/ (total_raw_size_mb / total_size_mb)) * 100, 1 ) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( space_savings_percent > 0, low, true(), normal ) \
| table compression_ratio space_savings_percent severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_compression_ratio summary job completed successfully without identifying any issues, and everything is operating as expected.")`

