updated_author = akhamis
description = <p>This Splunk preflight check verifies the Search Process Memory Threshold setting. If this limit is enabled, some app functionality may be impacted, as certain searches could terminate prematurely if they exceed the configured memory usage limit.  If you are running the app in Splunk Cloud, please disregard this check, as it is not applicable in that environment.</p>
search = | `ssef_splunk_deployment` \
| appendcols \
    [| rest splunk_server=local `ssef_rest_timeout` /services/configs/conf-limits \
    | fields splunk_server enable_memory_tracker search_process_memory_usage_percentage_threshold search_process_memory_usage_threshold \
    | stats values(*) as * by splunk_server enable_memory_tracker ] \
| filldown splunk_deployment \
| eval message = case(\
    splunk_deployment="Enterprise" AND enable_memory_tracker=1, "WARNING! The Memory Tracker is currently enabled on this instance. This setting might prevent the App from executing certain checks successfully. Current settings: the memory usage threshold is set to " . search_process_memory_usage_threshold . "MB and the memory usage percentage threshold is " . search_process_memory_usage_percentage_threshold . "%.",\
    splunk_deployment="Enterprise" AND enable_memory_tracker=0, "The Memory Tracker is disabled on this instance.",\
    splunk_deployment="Cloud", "Detected a Splunk Cloud deployment. This pre-flight check is only applicable to Splunk Enterprise customers.",\
    true(),\
    "Error detecting the Splunk deployment type." ) \
| eval severity_level = if(splunk_deployment="Enterprise" AND enable_memory_tracker=1, 3, 0) , index="N/A", type="Memory Tracker" \
| fields severity_level message

