[ssef_ia4s_users_role_concurrency_queuing]
search_name = Role Concurrency Queuing
readonly = 1
target_component = Users
version = 2.0
date_updated = 2026-2-25 16:10:29
category = Splunk
sub_category = Users
tags = DispatchManager,Concurrency,Queueing,Users,Roles
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 35534C672F7E04C405175201AB20E73C
updated_author = akhamis
severity_normal_text = <br/><p>No significant quota errors or warnings have been detected related to user concurrency limits in the last 7 days. This indicates that users are operating within their allocated quotas, and there are no immediate concerns regarding role concurrency or queuing issues. Continue to monitor these logs to ensure users remain within their concurrency limits.</p>
severity_low_text = <br/><p>A notable number of warnings or errors related to user concurrency limits have been detected, indicating potential issues with users exceeding their allocated quotas. This could lead to queued searches and possibly impact user experience. It's recommended to review these incidents and consider adjusting user quotas or concurrency settings to better align with operational needs and prevent further issues.</p>
severity_medium_text = <br/><p>A notable number of warnings or errors related to user concurrency limits have been detected, indicating potential issues with users exceeding their allocated quotas. This could lead to queued searches and possibly impact user experience. It's recommended to review these incidents and consider adjusting user quotas or concurrency settings to better align with operational needs and prevent further issues.</p>
description = <p>Identifies users hitting <b>role-based concurrency limits</b> by parsing DispatchManager WARN/ERROR events indicating maximum concurrent search thresholds. Highlights <b>search queuing</b> behavior that may impact user productivity and workload governance.</p>\<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> The number of users that have exceeded their quota is greater than 100.</li>\
<li><strong>Low:</strong> The number of users that have exceeded their quota is greater than 50.</li>\
<li><strong>Normal:</strong> The number of users that have exceeded their quota is 0.</li>\
</ul>
explanation = <p>This search analyzes splunkd DispatchManager events where users exceed maximum concurrent search thresholds. These events indicate role-based concurrency enforcement and search queuing. The search enriches results with instance metadata and aggregates queueing frequency per user and label. Repeated queueing suggests misaligned role limits, burst-heavy search patterns, inefficient SPL, or scheduler congestion. Monitoring this KPI helps maintain workload balance and prevent degraded search responsiveness.</p>
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd component=DispatchManager ...</code><br> - Retrieve WARN/ERROR events indicating maximum concurrency enforcement.<br><b>02</b> <code>| fields ... | `ssef_instance_info(host)`</code><br> - Preserve relevant concurrency fields and enrich with instance metadata.<br><b>03</b> <code>| stats values(*) count by label user</code><br> - Aggregate queueing frequency and retain contextual concurrency limits.<br><b>04</b> <code>| eval severity_level=case(...)</code><br> - Classify severity based on frequency of concurrency queuing events.
solution = <p>This KPI surfaces users frequently hitting role concurrency limits, which can delay search execution and indicate governance misalignment.</p><p><b>Suggested Actions</b>: Review affected users’ search patterns, optimize inefficient searches, validate role concurrency settings, and ensure workload management policies align with operational needs. If queueing is widespread, evaluate overall search-head capacity and scheduler density.</p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Deployment-Architecture/Managing-Search-Concurrency-Limits-in-Splunk/m-p/493211" target="_blank">Splunk Answers - Managing Search Concurrency Limits</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/DistSearch/SHCjobscheduling" target="_blank">Control Search Concurrency on Search Head Custers</a><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/configuration-file-reference/limits.conf" target="_blank">Splunk Help: limits.conf reference</a><br>Documentation for configuring search concurrency and role-based limits.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search Reference</a><br>Core SPL documentation for maintaining internal telemetry searches.</li></ul>
viz_options = { "count":100 }
search = index=_internal sourcetype=splunkd component=DispatchManager user=* log_level=WARN OR log_level=ERROR reason="The maximum number*" \
| eval summary_id="ssef_ia4s_users_role_concurrency_queuing" \
| fields _time host user reason concurrency_limit currenct_concurrency \
| `ssef_instance_info(host)` \
| eval user=coalesce(user,username) \
| stats values(*) as * count as num_queuing latest(_time) as _time by label, user \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_queuing > 100, medium, num_queuing > 50, low, true(), normal ) \
| table _time label name role user reason concurrency_limit currenct_concurrency num_queuing severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_users_role_concurrency_queuing summary job completed successfully without identifying any issues, and everything is operating as expected.")`

