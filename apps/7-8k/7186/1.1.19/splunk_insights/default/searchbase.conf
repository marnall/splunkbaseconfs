[summary_blocked_queues_on_indexers]
search_name = Blocked Queues on Indexers
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 3.0.0
date_created = 2025-08-06
date_updated = 2026-1-27 9:16:11
category = Splunk
sub_category = _internal
tags = EFS,Indexing,Monitoring,Pipelines,Queues
solution = <p>Provides visibility into nodes experiencing sustained ingestion pipeline blockage, enabling timely intervention to avoid data delays or loss.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate system resource usage (disk, I/O, CPU) on affected instances<br><b>2.</b> Review ingest pipeline configurations like regex performance and parallelization<br><b>3.</b> Use Monitoring Console (Indexing → Performance) to pinpoint queue and processor load:contentReference[oaicite:0]{index=0}<br><b>4.</b> Tune limits.conf (e.g., regex_cpu_profiling) to enhance observability:contentReference[oaicite:1]{index=1}<br><b>5.</b> Scale indexing infrastructure as needed to eliminate congestion points</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (instances_with_blocked_queues == 0,1, instances_with_blocked_queues == 1,2, instances_with_blocked_queues >= 2 AND instances_with_blocked_queues <= 5,3, instances_with_blocked_queues > 5 AND instances_with_blocked_queues <= 10,4, instances_with_blocked_queues > 10,5)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> <i>No blocked queue instances detected; ingestion healthy.</i></li><li><b>Low (Severity 2):</b> <i>One instance showing sustained blockage; minor concern.</i></li><li><b>Medium (Severity 3):</b> <i>2–5 instances affected; moderate ingestion degradation risk.</i></li><li><b>High (Severity 4):</b> <i>6–10 instances blocked; urgent remediation needed.</i></li><li><b>Critical (Severity 5):</b> <i>More than 10 instances blocked; systemic failure likely.</i></li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>search</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Select queue metrics from metrics.log on internal index<br><b>02</b> <code>| bin _time span=1h</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate data into hourly buckets<br><b>03</b> <code>| eval fill_perc...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate fill percentage per queue<br><b>04</b> <code>| chart perc90(fill_perc) over host_and_pipe by queue</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Compute 90th percentile fill for each host-pipe combination<br><b>05</b> <code>| search queue thresholds</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter records exceeding queue fill threshold of 30%</br><b>06</b> <code>| stats count as blocked_1h_threshold by instance | where blocked_1h_threshold > 84</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Identify instances blocked on >84 hours per day<br><b>07</b> <code>| stats count(instance) as instances_with_blocked_queues | table …</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output number of affected instances along with severity_level
explanation = <p>This search monitors the health of Splunk’s ingestion pipelines by measuring the 90th percentile of queue fill percentage over hour intervals. Pipelines like tcpin, parsing, typing, aggregation, and indexing are tracked per instance/ingest_pipe.</p><p>It helps you proactively pinpoint hosts experiencing sustained blockage—especially helpful for spotting disk throughput, CPU, or pipeline configuration issues.</p><p>For newer Splunk users, this SPL showcases chart aggregation, eval-driven field normalization, time conversion techniques (<code>strftime</code>, <code>strptime</code>), and conditional threshold logic in action.</p><p>Operationally, it’s key for diagnosing ingestion health, guarding against data latency or loss, and informing tuning in both forwarders and indexers.</p>
