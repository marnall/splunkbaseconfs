related_info = <div class="diag-content-box"><div class="diag-content"> <a class="doc-drilldown" href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Search/Writebettersearches" target="_blank">https://docs.splunk.com/Documentation/SplunkCloud/latest/Search/Writebettersearches</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i> </div><div class="diag-content"><i class="icn-lantern icon-color-info margin-r v-top"></i><a class="doc-drilldown" href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Enterprise/Optimizing_search_in_Splunk_Enterprise" target="_blank">Lantern: Optimizing Search in Splunk Enterprise</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div></div>
description = <p>Splunk Alerts with statistics</p>
search = | tstats summariesonly=true allow_old_summaries=false fillnull_value=0 max(data.search_props.scan_count) AS scan_count max(data.read_mb) AS read_mb max(data.written_mb) AS written_mb max(data.normalized_pct_cpu) AS normalized_pct_cpu max(data.mem_used) AS mem_used max(data.elapsed) AS elapsed WHERE index=_introspection sourcetype=splunk_resource_usage component::PerProcess data.process_type::search AND data.search_props.type IN (scheduled) data.search_props.label = * NOT data.search_props.label IN (itsi_mad_context,itsi_mad_cohesive_context,itsi_event_grouping) ``` (data.normalized_pct_cpu > 1 data.mem_used > 1 data.elapsed > 1) ``` by _time span=5m host data.search_props.app data.search_props.user data.search_props.label data.search_props.sid \
| rename data.search_props.* AS * \
| eval normalized_pct_cpu=if(normalized_pct_cpu=0.00, 0, normalized_pct_cpu) \
| rename label AS savedsearch_name \
| `ssef_instance_info(host)` \
| stats dc(sid) AS run_count, avg(elapsed) AS elapsed, avg(scan_count) AS scan_count, avg(mem_used) AS mem_used, avg(normalized_pct_cpu) AS normalized_pct_cpu, avg(written_mb) AS disk_write_mb, avg(read_mb) AS disk_read_mb latest(_time) as _time latest(name) as name values(role) as role by label app user savedsearch_name \
| eventstats max(elapsed) AS max_elapsed max(scan_count) AS max_scan_count max(mem_used) AS max_mem_used max(normalized_pct_cpu) AS max_normalized_pct_cpu max(disk_read_mb) AS max_disk_read_mb max(disk_write_mb) AS max_disk_write_mb \
| foreach elapsed mem_used normalized_pct_cpu disk_read_mb disk_write_mb scan_count "max_*" \
    [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="" OR <<FIELD>>=0, 1, <<FIELD>>) ] \
| eval weighted_expense_factor = ( (normalized_pct_cpu / max_normalized_pct_cpu) * 0.25 + (mem_used / max_mem_used) * 0.25 + (scan_count / max_scan_count) * 0.2 + (elapsed / max_elapsed) * 0.2 + (disk_read_mb / max_disk_read_mb) * 0.05 + (disk_write_mb / max_disk_write_mb) * 0.05 ) \
| eval overall_expense_factor = weighted_expense_factor * run_count * 0.25 \
| foreach elapsed mem_used normalized_pct_cpu disk_read_mb disk_write_mb scan_count \
    [ eval <<FIELD>>=round(<<FIELD>>, 2) ] \
| lookup ssef_saved_searches_lookup label app savedsearch_name output savedsearch_type description cron_schedule schedule_priority schedule_window allow_skew dispatch_earliest_time dispatch_latest_time actions action_email_to \
| eval actions=split(actions,"|"), action_email_to=split(action_email_to,"|") \
| foreach savedsearch_type description cron_schedule schedule_priority schedule_window allow_skew dispatch_earliest_time dispatch_latest_time actions action_email_to \
    [| eval <<FIELD>>=mvjoin(mvsort(mvdedup(<<FIELD>>)),"|") ] \
| eval es_sh = case ( \
    app IN ("SplunkEnterpriseSecuritySuite","DA-ESS-AccessProtection","DA-ESS-EndpointProtection","DA-ESS-IdentityManagement","DA-ESS-NetworkProtection","DA-ESS-ThreatIntelligence","missioncontrol","SA-AccessProtection","SA-AuditAndDataProtection","SA-ContentVersioning","SA-EndpointProtection","SA-IdentityManagement","SA-NetworkProtection","SA-ThreatIntelligence","SA-UEBA","DA-ESS-ContentUpdate","Splunk_Security_Essentials","security_getting_started","Splunk_DA-ESS_PCICompliance","Splunk_App_SAA","Splunk_App_for_Anomaly_Detection","InfoSec_App_for_Splunk","splunk_app_sap_etd_alerts","splunk_app_phantom","trustar_unified","Splunk_TA_Talos_Intelligence"), "yes", \
    app="SplunkEnterpriseSecuritySuite" AND view IN ("access_*","account_*","alert*","algorithm","asset_*","cluster_*","contents","correlation_*","create_*","data_*","default_*","detect_*","dns_*","email_*","endpoint_*","ess_*","experiment_*","finding*","forecast_*","forwarder_*","generic_*","http_*","iam*","identity_*","ids_*","incident_*","index_*","intelligence","landing","malware_*","managed_*","map_rule_to_technique","mc_*","microsoft365*","mitre_*","mltk_*","network*","new_*","per_*","port_*","predict_*","redirect_*","response_*","rest_*","risk_*","search*","security_*","sess_*","session_*","showcase*","smart_*","soar*","ssl_*","suppress*","system*","threat_*","time_*","traffic_*","uba*","update_*","url_*","user_*","vuln_*","web_*"), "yes", \
    true(), "no") \
| `ssef_app_info(app)` \
| join label app savedsearch_name type=left \
    [ search index=_internal sourcetype=scheduler \
        ``` | extract pairdelim=",", kvdelim="=", auto=f ``` \
    | eval alert_actions=if(alert_actions="", null(), alert_actions) \
    | `ssef_instance_info(host)` \
    | stats values(alert_actions) as alert_actions dc(alert_actions) as num_of_actions max(result_count) AS max_result_count p99(run_time) AS p99_run_time_sec sum(run_time) AS sum_run_time_sec dc(host) AS dc_instance count AS num_runs by label app savedsearch_name ] \
| table label app user savedsearch_name savedsearch_type es_sh weighted_expense_factor overall_expense_factor run_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb description cron_schedule schedule_priority schedule_window allow_skew dispatch_earliest_time dispatch_latest_time actions action_email_to num_of_actions max_result_count p99_run_time_sec sum_run_time_sec dc_instance num_runs \
| where savedsearch_type = "alert" ```AND es_sh = "yes"``` AND max_result_count = 0

