[multi_threaded_detections]
search_name = Multi-threaded Detections
readonly = 1
ssef_cron = weekly
target_component = Detections and Alerts
version = 1.0.5
date_updated = 2025-11-10 12:43:33
category = ES Adoption
sub_category = Security
tags = Detections and Alerts,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 98B2E4A18D0D7DA3ECD7ED1D0B4E576D
search_author = dluxton
updated_author = akhamis
severity_low_text = <br/><p>Where there are more than 5 corelation searches looking for brute force, password spray or threat intel matching.</p>
description = <p>This search looks for evidence of multiple correlation searches existing for common SIEM use cases (Password Spray, Brute Force, Threat Intel Matching) <br><br>Where possible, leverage the CIM datamodels and avoid re-writing detections for new datasources.</p>\
<ul>\
<li><a href="https://splunkbase.splunk.com/app/7066" target="_blank">SA-DetectionInsights</a></li>\
</ul>
search = `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 \
| eval summary_id="multi_threaded_detections" \
| stats latest() as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
| eval ltitle=lower(savedsearch_name), BFsearch=if(match(ltitle,"brute") AND match(ltitle,"force"),"true","false"), PWDSpraySearch=if(match(ltitle,"spray"),"true","false"), intelSearch=if(match(ltitle,"intel"),"true","false") \
| stats count as total_correlation_searches, count(eval(if(BFsearch="true",BFsearch,null()))) as bruteforce_correlation_search_count, count(eval(if(PWDSpraySearch="true",PWDSpraySearch,null()))) as pwdspray_correlation_search_count, count(eval(if(intelSearch="true",intelSearch,null()))) as intel_correlation_search_count, values(eval(if(BFsearch="true",savedsearch_name,null()))) as bruteforce_correlation_searches, values(eval(if(PWDSpraySearch="true",savedsearch_name,null()))) as pwdspray_correlation_searches, values(eval(if(intelSearch="true",savedsearch_name,null()))) as intel_correlation_searches by label \
| eval severity_level = if(pwdspray_correlation_search_count>5 OR intel_correlation_search_count>5 OR bruteforce_correlation_searches>5,2,1) \
| table label bruteforce_correlation_search_count bruteforce_correlation_searches intel_correlation_search_count pwdspray_correlation_search_count total_correlation_searches severity_level \
| `ssef_handle_no_results(1,"The multi_threaded_detections summary job completed successfully without identifying any issues, and everything is operating as expected.")`

