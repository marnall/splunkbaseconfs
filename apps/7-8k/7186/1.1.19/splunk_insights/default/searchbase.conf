[mc_local_indexing_on_non-indexer_instances]
search_name = Local indexing on non-indexer instances
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Indexing
category = Health Check
sub_category = Data Indexing
tags = Best Practices,Forwarding,Health Check,Indexing,Monitoring Console,Summary
solution = Make sure that all non-indexer instances are forwarding their internal events to the indexers, per best practices.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 77BDB69F9AF2E09DDE70E004D077FFCC
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_low_text = One or more non-indexer instances is not forwarding their events to the indexers. This can isolate some of your data and prevent some Monitoring Console dashboards from working.
description = This checks whether any non-indexer instances (search heads, indexer cluster manager nodes, license managers, deployment servers, search head cluster deployers) are indexing their own events locally, instead of forwarding the data to the indexers, per best practices.
search = | rest `ssef_rest_target` `ssef_rest_timeout` /services/server/info \
| eval summary_id="mc_local_indexing_on_non-indexer_instances" \
| fields splunk_server isForwarding server_roles \
| where (server_roles=="search_head" OR server_roles=="cluster_master" OR server_roles=="license_master" OR server_roles=="shc_deployer" OR server_roles=="deployment_server" OR isNull(server_roles)) \
