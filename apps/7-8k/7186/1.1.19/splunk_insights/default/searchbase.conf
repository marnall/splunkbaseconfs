related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/Capacity/Accommodatemanysimultaneoussearches" target="_blank">Splunk Docs: How concurrent users and searches impact performance</a> - This documentation explains how the number of concurrent users and searches can affect Splunks performance, providing insights into managing search loads effectively.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/Capacity/HowconcurrentusersaffectSplunkEnterpriseperformance" target="_blank">Splunk Docs: How concurrent users affect Splunk Enterprise performance</a> - This resource details the impact of multiple users running searches simultaneously and offers guidance on optimizing system performance.</li><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Search/Realtimeperformanceandlimitations" target="_blank">Splunk Docs: Expected performance and known limitations of real-time searches and reports</a> - This page outlines the performance expectations and limitations associated with real-time searches, helping you understand their impact on system resources.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-can-I-show-average-peak-and-peak-time-in-a-single-search/m-p/230517" target="_blank">Splunk Community: How can I show average, peak, and peak time in a single search?</a> - A community discussion that provides solutions for displaying average and peak transaction rates along with their timestamps in a single search.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/finding-peak-times-from-timechart-Part-2/m-p/583701" target="_blank">Splunk Community: Finding peak times from timechart (Part 2)</a> - This thread discusses methods to identify peak times using the timechart command in Splunk, offering practical examples and solutions.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Get-top-20-queries-for-avarage-execution-time/m-p/549786" target="_blank">Splunk Community: Get top 20 queries for average execution time</a> - A discussion focused on retrieving the top 20 queries based on average execution time, which can help in identifying resource-intensive searches.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Calculate-average-execution-time-for-a-known-field/m-p/223520" target="_blank">Splunk Community: Calculate average execution time for a known field</a> - This thread provides insights into calculating the average execution time for specific fields, aiding in performance analysis.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Min-and-Max-Response-Time/m-p/536202" target="_blank">Splunk Community: Min and Max Response Time</a> - A discussion that explores methods to calculate minimum and maximum response times, useful for performance monitoring.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-measure-Execution-Latency-of-Ad-hoc-Searches/m-p/298649" target="_blank">Splunk Community: How to measure Execution Latency of Ad-hoc Searches?</a> - This thread discusses approaches to measure the execution latency of ad-hoc searches, providing insights into search performance.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Search-performance-impact-How-to-find-user-deploying-high-impact/m-p/405050" target="_blank">Splunk Community: Search performance impact &amp; How to find user deploying high impact searches</a> - A discussion on identifying users running high-impact searches and understanding their effect on system performance.</li></ul>
description = <p>This search identifies <b>peak hours of search execution</b> by analyzing <b>total user search time by hour of day</b>. It highlights <b>when users execute the most searches</b> to reveal demand concentration patterns. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p></p>
default_viz = splunk.column
viz_options = {  "stackMode": "stacked", "backgroundColor": "transparent", "seriesColors": ["#7e52d2","#009be6","#00cdb0","#e39a2b","#ff677e","#d52094","#0050b1","#008c80","#97b22a","#ff6acb","#8098F6","#C83C10"], "legendDisplay": "top", "xAxisTitleVisibility": "hide"  }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`, splunk-system-user) \
| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type role index_reference sourcetype_reference datamodel_reference \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| makecontinuous _time span=1h \
| fillnull value=0 total_search_time \
| eval hour=strftime(_time, "%H") \
| chart sum(total_search_time) AS "Search Execution Peak Time" by hour user \
| rename hour as "Hour of day" , user as "Splunk User"

