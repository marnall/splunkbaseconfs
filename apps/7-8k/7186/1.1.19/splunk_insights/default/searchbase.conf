readonly = 1
search_hidden = 1
version = 1.0.3
date_updated = 2025-2-15 16:46:50
category = IS4S
sub_category = Preflight Checks
tags = Preflight
dispatch_earliest_time = -4h@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 3B1C6CFF153208B708BB7E568D4F50D6
updated_author = akhamis
description = <p>This Splunk preflight check queries the _audit index to verify host availability for audit trail data, ensuring that all relevant hosts are actively reporting and that audit logging is functioning as expected.</p>
search = | tstats summariesonly=true dc(host) as hosts WHERE index=_audit sourcetype=audittrail earliest=-4h@h by index \
| appendpipe \
    [| makeresults \
    | eval fill=0 ] \
| eval message = if ( \
    hosts>0,"Audit Data Found.", \
    "Audit Data NOT Found! Click the magnifying glass for troubleshooting.") \
| stats first(hosts) as hosts, first(message) as message \
| eval severity_level = if(hosts > 0, 0, 3) \
| fields severity_level message

[preflight_check_mc_role_conflict]
search_name = Splunk MC Role Conflict Check
readonly = 1
search_hidden = 1
version = 1.0.3
date_created = 2025-7-9 10:3:25
date_updated = 2025-7-9 14:42:13
category = IS4S
sub_category = Preflight Checks
tags = Preflight
solution = <p>Find a better spot for IS4S.</p>
dispatch_earliest_time = -4h@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = FBA841CB6A5D4C4917AF422A58E75006
updated_author = akhamis
description = <p>This preflight check assesses the roles assigned to the Splunk instance hosting the Monitoring Console. Its purpose is to identify if the Monitoring Console is concurrently acting as a Cluster Manager, License Manager, or Deployment Server. Running these critical roles on the same instance as the Monitoring Console is generally not recommended as it can significantly impact the performance and stability of the Monitoring Console itself, and consequently, the performance of any other applications installed on it, including IS4S. An optimal configuration ensures the Monitoring Console is dedicated to its monitoring functions.  If you are running the app in Splunk Cloud, please disregard this check, as it is not applicable in that environment.</p>
search = | `ssef_splunk_deployment` \
| appendcols \
    [| rest splunk_server=local /services/server/info f=server_roles \
    | fields splunk_serevr server_roles ] \
| filldown splunk_deployment \
| eval message=case(match(server_roles, "cluster_ma|license_ma|deployment_server"), "WARNING: Monitoring Console is also performing other critical Splunk roles (e.g., Cluster Manager, License Manager, Deployment Server). This configuration is not recommended for a dedicated Monitoring Console as it can impact its own performance, and the performance of any other apps including IS4S.", \
    splunk_deployment="Cloud", "Detected a Splunk Cloud deployment. This pre-flight check is only applicable to Splunk Enterprise customers.", \
    true(), "Optimal: Monitoring Console is dedicated and not performing other critical Splunk roles.") \
| eval severity_level = if(match(server_roles, "cluster_ma|license_ma|deployment_server") AND splunk_deployment="Enterprise", 4, 0) \
| fields splunk_server severity_level message server_roles

