quid = A056503F795098B06B12C681078A5F2C
updated_author = akhamis
related_info = <div class="diag-content-box"><div class="diag-content"> <a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Indexesconf" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/Admin/Indexesconf</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div></div>
severity_normal_text = <br/><p>This search has returned an 'informational' status. There is nothing to worry about here unless you were expecting a different severity. If that is the case reach out to your Splunk Account team. More information may be added here to support this search result.</p>
severity_medium_text = <br/><p>This search has returned a status indicating a potential issue. Please review the findings carefully, as they may require attention. If you were expecting a different severity or need further clarification, please contact your Splunk Account team. Additional details may be provided to support the resolution of this issue.</p>
severity_high_text = <br/><p>This search has returned a status indicating a potential issue. Please review the findings carefully, as they may require attention. If you were expecting a different severity or need further clarification, please contact your Splunk Account team. Additional details may be provided to support the resolution of this issue.</p>
description = <p>This search reviews all index definitions in the environment across all instances and identifies any potential mismatch entries between hosts for the same index or if an index is using a feature not supported in Splunk Cloud.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = `ssef_summary(ssef_data_indexes)` isInternal=0 disabled=0 role=*indexer* \
| eval summary_id="ssef_scma_indexing_index_inventory" \
| eval retentionInDays=round(frozenTimePeriodInSecs/86400,0) \
| stats dc(splunk_server) AS dc_instance max(retentionInDays) AS max_retentionInDays avg(retentionInDays) AS avg_retentionInDays min(retentionInDays) AS min_retentionInDays values(enableDataIntegrityControl) AS enableDataIntegrityControl values(enableTsidxReduction) as enableTsidxReduction values(timePeriodInSecBeforeTsidxReduction) as timePeriodInSecBeforeTsidxReduction values(tsidxReductionCheckPeriodInSec) as tsidxReductionCheckPeriodInSec values(coldToFrozenScript) as coldToFrozenScript values(warmToColdScript) as warmToColdScript values(coldToFrozenDir) as coldToFrozenDir by label, title \
| eval message = case ( max_retentionInDays!=avg_retentionInDays, "The max_retentionInDays does not match the avg_retentionInDays, there is a mismatch in the index retention configuration.", enableDataIntegrityControl!=0,"The enableDataIntegrityControl feature has been enabled on an index, this is not supported in Splunk Cloud.", enableTsidxReduction!=0,"The enableTsidxReduction feature has been enabled on an index, this is not supported in Splunk Cloud.", (isnotnull(coldToFrozenScript) AND coldToFrozenScript!="") OR (isnotnull(warmToColdScript) AND warmToColdScript!="") OR (isnotnull(coldToFrozenDir) AND coldToFrozenDir!=""), "Archival may be enabled for this index!", true(), "OK") \
| rename title AS orig_index \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( max_retentionInDays!=avg_retentionInDays OR enableDataIntegrityControl!=0 OR enableTsidxReduction!=0, high, (isnotnull(coldToFrozenScript) AND coldToFrozenScript!="") OR (isnotnull(warmToColdScript) AND warmToColdScript!="") OR (isnotnull(coldToFrozenDir) AND coldToFrozenDir!=""), medium, true(), normal ) \
| table _time label name orig_index avg_retentionInDays dc_instance enableDataIntegrityControl enableTsidxReduction max_retentionInDays min_retentionInDays timePeriodInSecBeforeTsidxReduction tsidxReductionCheckPeriodInSec coldToFrozenDir coldToFrozenScript warmToColdScript severity_level message \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_index_inventory summary job completed successfully without identifying any issues, and everything is operating as expected.")`

