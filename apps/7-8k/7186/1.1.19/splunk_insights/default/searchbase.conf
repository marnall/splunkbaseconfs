[mc_missing_cipher_check]
search_name = Missing TLS Ciphers
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Upgrade Checks
version = 1.0.1
date_updated = 2025-8-18 14:47:56
category = Health Check
sub_category = Security
tags = Configuration,Health Check,Monitoring Console,SSL,Splunk 10,Summary,Upgrade
solution = Inspect the 'sslVersions', 'sslVersionsforClient', and 'cipherSuite' setting values in the client configuration stanza which corresponds to the channel that produces this error. Then, determine the highest version of TLS that the client is configured to use. Next, confirm that there is at least one cipher that is compatible with this version of TLS in the 'cipherSuites' setting. If there is not, add at least one such cipher to the client configuration. Finally, confirm that the server TLS configuration also includes these ciphers.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 1CD424ABFB34BFA892B9B83857C9CB79
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because its configuration did not contain any ciphers that were compatible with the TLS version that was used during the connection attempt.
description = This checks for the presence of any events which indicate that no ciphers compatible with the TLS version attempting to be used are present in the configuration in the last hour, and marks as Critical if any are present.
search = index=_internal source=*splunkd.log* "SSL23_CLIENT_HELLO:no ciphers available" earliest=-60m \
| eval summary_id="mc_missing_cipher_check" \
| stats count AS sixty_min_event_count by host \
| eval alerts = mvjoin(alerts, ", ") \
| eval severity_level = 3 \
| table host, sixty_min_event_count, severity_level \
| rename host as instance \
| table instance, sixty_min_event_count, severity_level \
| append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance sixty_min_event_count severity_level] \
| stats sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance \
| eval severity_level=if(severity_level=0, 1, severity_level) \
| `ssef_handle_no_results(1,"The mc_missing_cipher_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

