description = <p><strong>Definition</strong></p><p>This KPI trends the daily count of "<strong>Regularly Accessed Sourcetypes</strong>" within the selected time frame. A sourcetype is considered 'regularly accessed' if it was used in a search on 10% or more of the total active days within that period. This metric accurately identifies which data sources are consistently relevant to users, helping to validate data value and guide data retention policies.</p><p><br></p><p><strong>The Value it Uncovers</strong></p><p>This measure highlights the most frequently used data sources, demonstrating their role in achieving strategic objectives. By identifying consistently used sourcetypes, organizations can assess the alignment of their data practices with business goals. Leveraging underutilized sourcetypes that meet crucial needs could significantly boost risk management. </p><p><br></p><p><strong>Recommended Time Period</strong></p><p>Tracking this KPI <em>weekly</em> and <em>monthly</em> provides valuable insights into which sourcetypes are most valued.</p>
default_viz = splunk.singlevalue
search = `ssef_regularly_accessed_sourcetypes` \
| timechart span=1d dc(inventory_sourcetype) by usage_category \
| eval total_sourcetypes_for_day = coalesce('# of Regularly Accessed Sourcetypes', 0) + coalesce('# of Unused Sourcetypes', 0) \
| eval "% of Regularly Accessed Sourcetypes to Total" = if(total_sourcetypes_for_day > 0, round((coalesce('# of Regularly Accessed Sourcetypes', 0) * 100) / total_sourcetypes_for_day, 2), 0) \
| rename total_sourcetypes_for_day as "Total # of Sourcetypes" \
| fields _time "# of Regularly Accessed Sourcetypes"

