[summary_deployment_server_errors]
search_name = Deployment Server Errors
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 3.0.1
date_created = 2025-08-07
date_updated = 2026-1-28 12:22:54
category = Splunk
sub_category = _internal
tags = Deployment Server,EFS,Error Monitoring,Internal Logs,Summary
solution = <p>Provides a quantifiable daily average of Deployment Server error messages, enabling proactive monitoring and troubleshooting of configuration deployment health.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts with repeated errors to confirm configuration object presence.<br><b>2.</b> Validate app and configuration bundle integrity.<br><b>3.</b> Review recent changes or deployments preceding spikes.<br><b>4.</b> Ensure forwarders are pointed to the correct deployment server.<br><b>5.</b> Track this metric over time to detect regressions in deployment processes.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (avg_count_per_day &lt;= 1, 1, avg_count_per_day &lt;= 3, 2, avg_count_per_day &lt;= 5, 3, avg_count_per_day &lt;= 10, 4, avg_count_per_day &gt; 10, 5)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting. <b>Thresholds should be tuned to your environment</b>.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> 0–1 average daily errors — stable deployment environment.</li><li><b>Low (Severity 2):</b> 2–3 average daily errors — minor and possibly transient.</li><li><b>Medium (Severity 3):</b> 4–5 average daily errors — moderate, investigate root cause.</li><li><b>High (Severity 4):</b> 6–10 average daily errors — high frequency, likely impacting deployment reliability.</li><li><b>Critical (Severity 5):</b> More than 10 daily errors — severe impact, urgent resolution needed.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd source=*splunkd.log "cannot be loaded" OR "does not exist" CASE(ERROR)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter internal logs for deployment server errors matching the specified phrases.<br><b>02</b> <code>| fields _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Keep only the timestamp for temporal analysis.<br><b>03</b> <code>| timechart partial=t fixedrange=t span=1d count as daily_count</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate error events into daily counts.<br><b>04</b> <code>| stats avg(daily_count) as avg_count_per_day</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Compute the average number of errors per day.<br><b>05</b> <code>| eval avg_count_per_day=ceiling(avg_count_per_day)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Round the daily average up to the nearest whole number.<br><b>06</b> <code>| eval severity_level = case (avg_count_per_day &lt;= 1, 1, avg_count_per_day &lt;= 3, 2, avg_count_per_day &lt;= 5, 3, avg_count_per_day &lt;= 10, 4, avg_count_per_day &gt; 10, 5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign a severity score based on thresholds.<br><b>07</b> <code>| table avg_count_per_day severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Display the results.<br>
explanation = <p>This search scans <b>_internal</b> logs for critical error patterns indicating missing or unloadable configurations within the Splunk Deployment Server environment. By aggregating daily counts and averaging them, it provides a baseline metric for operational stability.</p><p>Operationally, this baseline helps identify abnormal error spikes that may impact forwarder configurations, app deployments, or distributed environment stability. Keeping the average low signals healthy deployment operations.</p><p>For learners, this search demonstrates filtering on <b>index=_internal</b> logs, applying string matching with OR logic, time-based aggregation using <b>timechart</b>, and summarizing trends with <b>stats</b> and <b>eval</b> for post-processing.</p>
quid = D78097388BBA47E75FAD462A536F4474
search_author = Splunk Searchbase Assistant
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/Troubleshooting/Cantfinddata" target="_blank">Cannot find data or configuration</a><br>Official troubleshooting guide for missing data or objects.</li><li><a href="https://community.splunk.com/t5/Deployment-Architecture/bd-p/deployment-architecture" target="_blank">Splunk Community: Deployment Architecture</a><br>Community discussions and solutions for deployment architecture problems.</li></ul>
severity_normal_text = <p>Deployment Server error rate is minimal, indicating stable operations.</p>
severity_low_text = <p>Minor errors observed; monitor for potential escalation.</p>
severity_medium_text = <p>Moderate error levels detected; review deployment processes and logs.</p>
severity_high_text = <p>High frequency of errors; deployment reliability may be degraded.</p>
severity_critical_text = <p>Severe error rate; immediate investigation and remediation required.</p>
description = <p>This search looks for any issues with the deployment server (DS) over a business week & then calculates the average daily errors that are reported. It looks for 2 groups of key word matches to find issues with deployments. These issues typically happen when the DS is sending over new configurations to its endpoints and the endpoint(s) throw an error.  Endpoints not receiving the correct configurations can lead to misconfiguration of data or inefficiencies within the platform.</p>search = index=_internal sourcetype=splunkd source=*splunkd.log "cannot be loaded" OR "does not exist" CASE(ERROR) | fields _time | timechart partial=t fixedrange=t span=1d count as daily_count | stats avg(daily_count) as avg_count_per_day | eval avg_count_per_day=ceiling(avg_count_per_day, 0) | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( avg_count_per_day > 0, high, true(), normal ) | table avg_count_per_day severity_level | `ssef_handle_no_results(1,"The summary_deployment_server_errors summary job completed successfully without identifying any issues, and everything is operating as expected.")`
search = index=_internal sourcetype=splunkd source=*splunkd.log "cannot be loaded" OR "does not exist" CASE(ERROR) \
| eval summary_id="summary_deployment_server_errors" \
| timechart partial=t fixedrange=t span=1d count as daily_count values(event_message) as event_message\
| stats avg(daily_count) as avg_count_per_day values(event_message) as event_message\
| eval avg_count_per_day=ceiling(avg_count_per_day) \
| eval severity_level = case (avg_count_per_day <= 10, 1, avg_count_per_day <= 20, 2, avg_count_per_day <= 30, 3, avg_count_per_day <= 40, 4, avg_count_per_day > 40, 5) \
| table avg_count_per_day event_message severity_level\
| `ssef_handle_no_results(1,"The summary_deployment_server_errors summary job completed successfully without identifying any issues, and everything is operating as expected.")`

[summary_distinct_data_sources]
search_name = Distinct Data Sources
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 2.x
date_created = 2025-08-07
date_updated = 2025-8-1 12:54:52
category = Splunk
sub_category = _internal
tags = EFS,Sourcetypes,Summary
solution = <p>Provides a quick count of unique sourcetypes available in Splunk, enabling monitoring of ingestion diversity and health.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any sudden drop in sourcetype count.<br><b>2.</b> Confirm all expected data sources are still active and properly configured.<br><b>3.</b> Review index permissions if expected sourcetypes are missing.<br><b>4.</b> Add monitoring to track changes in sourcetype diversity over time.<br><b>5.</b> Validate upstream data pipelines when zero sourcetypes are reported.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (distinct_sourcetypes &gt; 50, 1, distinct_sourcetypes &gt; 20, 2, distinct_sourcetypes &gt; 10, 3, distinct_sourcetypes &gt; 0, 4, distinct_sourcetypes = 0, 5)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels. <b>Threshold values should be tuned to match your environment</b>.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> More than 50 sourcetypes — diverse and healthy ingestion.</li><li><b>Low (Severity 2):</b> 21–50 sourcetypes — slightly reduced diversity, watch for trends.</li><li><b>Medium (Severity 3):</b> 11–20 sourcetypes — limited diversity, potential ingestion loss.</li><li><b>High (Severity 4):</b> 1–10 sourcetypes — severely reduced diversity, possible input failures.</li><li><b>Critical (Severity 5):</b> 0 sourcetypes — no data available, ingestion failure.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| tstats dc(sourcetype) as distinct_sourcetypes WHERE [| `ssef_all_indexes` ]</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count the number of unique sourcetypes across all defined indexes.<br><b>02</b> <code>| appendpipe [ stats count AS distinct_sourcetypes | where distinct_sourcetypes=0 ]</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Append a result indicating zero sourcetypes if applicable.<br><b>03</b> <code>| eval severity_level = case (distinct_sourcetypes &gt; 50, 1, distinct_sourcetypes &gt; 20, 2, distinct_sourcetypes &gt; 10, 3, distinct_sourcetypes &gt; 0, 4, distinct_sourcetypes = 0, 5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign a severity score based on sourcetype diversity.<br><b>04</b> <code>| table distinct_sourcetypes severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Display results for operational review.<br>
explanation = <p>This search uses <b>tstats</b> to efficiently count unique sourcetypes across all accessible indexes, as defined by the <code>`ssef_all_indexes`</code> macro. It appends a special case to explicitly identify when no sourcetypes are present, helping quickly detect ingestion issues or gaps in data coverage.</p><p>Operationally, it enables teams to track ingestion health and confirm that all expected sourcetypes are present. Sudden drops or a zero count can indicate broken inputs, index misconfigurations, or upstream data source outages.</p><p>For learners, this demonstrates how to leverage <b>tstats</b> for performance efficiency, <b>appendpipe</b> for conditional logic, and basic <b>where</b> filtering for exception handling.</p>
quid = 28CD1DEAE23326C2B19D78C617CA991D
search_author = Splunk Searchbase Assistant
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Tstats" target="_blank">tstats command</a><br>Efficiently perform statistical queries on indexed data.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Appendpipe" target="_blank">appendpipe command</a><br>Append results from an inline subsearch.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Where" target="_blank">where command</a><br>Filter search results based on expressions.</li></ul>
severity_normal_text = <p>Diverse and healthy data ingestion with broad sourcetype coverage.</p>
severity_low_text = <p>Slightly reduced sourcetype diversity; monitor for further decline.</p>
severity_medium_text = <p>Moderate loss of sourcetype diversity; investigate potential input issues.</p>
severity_high_text = <p>Severe reduction in sourcetype diversity; likely ingestion problems.</p>
severity_critical_text = <p>No sourcetypes detected; ingestion pipeline may have failed.</p>
description = <p>Uses tstats to find the distinct count of sourcetypes in your environment over all indexes. This is a distinct count of unique sourcetypes, and alongside other environmental KPI's can provide additional insight on usage in your Splunk environment.</p>
search = | tstats summariesonly=true dc(sourcetype) as distinct_sourcetypes WHERE [| `ssef_all_indexes` ] \
| eval summary_id="summary_distinct_data_sources" \
| appendpipe [ stats count AS distinct_sourcetypes | where distinct_sourcetypes=0 ] \
| eval severity_level = case (distinct_sourcetypes > 50, 1, distinct_sourcetypes > 20, 2, distinct_sourcetypes > 10, 3, distinct_sourcetypes > 0, 4, distinct_sourcetypes = 0, 5) \
| table distinct_sourcetypes severity_level\
| `ssef_handle_no_results(1,"The summary_distinct_data_sources summary job completed successfully without identifying any issues, and everything is operating as expected.")`

