<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> > 500,000</li>\
<li><strong>Medium:</strong> 100,000-499,000</li>\
<li><strong>Normal:</strong> < 100,000</li>\
</ul>
search = `ssef_summary(ssef_scma_indexing_summary_stats)` \
| fields _time label name summary_type summary_name total_bucket_count total_size_mb total_size_gb related_indexes_count severity_level \
| stats latest(_time) as _time latest(*) AS * by label summary_type summary_name \
| `ssef_severity_level_text(severity_level)` \
| sort - severity_level | rename severity_text as Severity \
| convert ctime(_time) \
| table _time label summary_type summary_name total_bucket_count total_size_mb total_size_gb related_indexes_count Severity

