[summary_high_cpu_usage_across_splunk_ecosystem]
search_name = High Load Instances
readonly = 1
ssef_cron = weekly
target_component = Infra & Arch
version = 3.0.0
date_created = 2025-08-07
date_updated = 2025-8-11 16:59:32
category = Splunk
sub_category = _internal
tags = CPU Load,EFS,Host Monitoring,Performance
solution = <p>Counts the number of Splunk instances with sustained high CPU load, helping prioritize performance tuning and workload balancing.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts with high load for resource bottlenecks.<br><b>2.</b> Review and adjust search concurrency and scheduling.<br><b>3.</b> Optimize indexing and search pipelines on overloaded instances.<br><b>4.</b> Consider hardware upgrades or scaling out infrastructure.<br><b>5.</b> Monitor after changes to ensure sustained performance improvement.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (high_load_instance_count &lt;= 1, 1, high_load_instance_count &lt;= 3, 2, high_load_instance_count &lt;= 5, 3, high_load_instance_count &lt;= 10, 4, high_load_instance_count &gt; 10, 5)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting. <b>Thresholds should be tuned to match your environment</b>.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> ≤1 host affected — minimal performance impact.</li><li><b>Low (Severity 2):</b> 2–3 hosts affected — watch for spread.</li><li><b>Medium (Severity 3):</b> 4–5 hosts affected — moderate operational impact.</li><li><b>High (Severity 4):</b> 6–10 hosts affected — significant workload issues.</li><li><b>Critical (Severity 5):</b> &gt;10 hosts affected — widespread performance degradation.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| tstats summariesonly=true avg(data.normalized_load_avg_1min) AS load WHERE index=_introspection sourcetype::splunk_resource_usage component::Hostwide by host, _time span=5m</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve host-wide average CPU load in 5-minute spans.<br><b>02</b> <code>| where load &gt; .85</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Keep only high-load intervals.<br><b>03</b> <code>| stats count AS high_load_5m_slice avg(load) AS avg_load by host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count high-load intervals and calculate average load per host.<br><b>04</b> <code>| where high_load_5m_slice &gt; 1260</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Flag hosts sustaining high load for most of the time period.<br><b>05</b> <code>| eval avg_load=round(avg_load, 2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Round average load values for readability.<br><b>06</b> <code>| stats count AS high_load_instance_count</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count the number of impacted hosts.<br><b>07</b> <code>| eval severity_level = case (high_load_instance_count &lt;= 1, 1, high_load_instance_count &lt;= 3, 2, high_load_instance_count &lt;= 5, 3, high_load_instance_count &lt;= 10, 4, high_load_instance_count &gt; 10, 5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign a severity level based on impacted host count.<br><b>08</b> <code>| table high_load_instance_count severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Present the results.<br>
explanation = <p>This search uses <b>tstats</b> against the <code>_introspection</code> index for efficiency, calculating average 1-minute load values in 5-minute spans. It filters for loads greater than 0.85, counts these intervals per host, and flags hosts exceeding 1,260 high-load intervals — equivalent to sustained elevated load throughout a week.</p><p>Operationally, this detects persistent CPU saturation that can cause search delays, skipped jobs, or degraded user experience. Addressing high-load hosts can involve tuning search concurrency, balancing data distribution, upgrading hardware, or optimizing indexer and search head workloads.</p><p>For learners, this demonstrates filtered aggregation with <b>tstats</b>, multi-stage <b>stats</b> summarization, and threshold-based classification.</p>
quid = 7E78307C2D131700B3C4922F92A0B8BE
search_author = Splunk Searchbase Assistant
updated_author = khutchinson
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Tstats" target="_blank">tstats command</a><br>Efficient statistical queries on indexed data.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Where" target="_blank">where command</a><br>Filter results based on Boolean expressions.</li></ul>
severity_normal_text = <p>Minimal high-load occurrence across the environment.</p>
severity_low_text = <p>Low number of high-load hosts; monitor for possible trend growth.</p>
severity_medium_text = <p>Moderate high-load occurrence; workload balancing recommended.</p>
severity_high_text = <p>Significant number of high-load hosts; investigate resource usage.</p>
severity_critical_text = <p>Widespread high-load issues; immediate remediation required.</p>
description = <p>Wile looking at all the instances within the Splunk ecosystem over the peirod of a business week, this search looks to see how much of the CPU capacity is used over 5 time-minute slices. 5 minute time splices are good middle ground to not use too much search memory and also to get accurate KPI measurement. A higher CPU load indicates higher utlizaion of the Splunk environment by users, searches or other knowledge objects.</p>
search = | tstats summariesonly=true avg(data.normalized_load_avg_1min) AS load WHERE index=_introspection sourcetype::splunk_resource_usage component::Hostwide by host, _time span=5m \
| eval summary_id="summary_high_cpu_usage_across_splunk_ecosystem" \
| where load > .85 \
| stats count AS high_load_5m_slice avg(load) AS avg_load by host \
| where high_load_5m_slice > 1260 \
| eval avg_load=round(avg_load, 2) \
| stats count AS high_load_instance_count \
| eval severity_level = case (high_load_instance_count <= 3, 1, high_load_instance_count <= 6, 2, high_load_instance_count <= 9, 3, high_load_instance_count <= 12, 4, high_load_instance_count > 12, 5)\
| table high_load_instance_count severity_level\
| `ssef_handle_no_results(1,"The summary_high_cpu_usage_across_splunk_ecosystem summary job completed successfully without identifying any issues, and everything is operating as expected.")`

