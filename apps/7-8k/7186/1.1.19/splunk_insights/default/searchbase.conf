execution_plan = <b>01</b> <code>`ssef_summary(ssef_scma_top_50_jobs)` earliest=-30d</code><br> - Pulls job metrics from the last 30 days.<br><b>02</b> <code>| bin _time span=1d</code><br> - Bins data daily.<br><b>03</b> <code>| stats latest(*) AS * by _time</code><br> - Captures most recent job metrics per day.<br><b>04</b> <code>| rename fields to job_* variants</code><br> - Distinguishes job metrics.<br><b>05</b> <code>| append [ search `ssef_summary(ssef_scma_top_50_dashboards)` earliest=-30d ... ]</code><br> - Combines dashboard metrics.<br><b>06</b> <code>| stats values(*) AS * by _time app</code><br> - Aggregates all by app and time.<br><b>07</b> <code>| eval total_* = job_* + dashboard_*</code><br> - Sums job and dashboard values.<br><b>08</b> <code>| eventstats sum(total_*) as *_gt</code><br> - Captures global totals for normalization.<br><b>09</b> <code>| eval normalized values as percent</code><br> - Normalizes values to percent of total.<br><b>10</b> <code>| stats sum(total_*) by app</code><br> - Sums across entire period by app.<br><b>11</b> <code>| sort, format, and rename fields</code><br> - Prepares output for presentation.</p>
explanation = <p>This search provides a clear picture of how each Splunk App contributes to total platform resource usage. By combining job and dashboard metrics, platform owners can assess which apps have the highest cost profiles. This enables better decisions around app optimization, user training, or possible deprecation. Understanding normalized CPU, memory consumption, and expense factors can help teams manage Splunk infrastructure at scale, especially in multi-tenant or performance-sensitive environments.</p>
