[ssef_scma_search_search_concurrency_stats]
search_name = Search Concurrency
readonly = 1
target_component = Search & Visualization
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 18:36:41
category = Splunk
sub_category = Search
tags = _internal,Concurrency,Search
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 182209A9B1A9FBAD1FBE06348C67AD06
updated_author = khutchinson
severity_normal_text = <br/><p>Search concurrency is operating within normal parameters; no action is necessary, and the environment is healthy.</p>
severity_low_text = <br/><p>More than 78 concurrent searches have been identified. No immediate action is required, but monitor this metric closely and take action if exponential growth is observed.</p>
severity_medium_text = <br/><p>Detected over 390 concurrent searches, indicating a need for search load optimization and potential compute upgrades to ensure optimal performance in the Splunk environment.</p>
severity_high_text = <br/><p>Detected over 468 concurrent searches, indicating a need for search load optimization and potential compute upgrades to ensure optimal performance in the Splunk environment.</p>
description = <p>Analyzes <b>search concurrency</b> telemetry from <b>metrics.log</b> to quantify historical search activity per instance. Computes daily <b>p95</b> and <b>max</b> active historical searches to surface peak concurrency pressure. Supports <b>capacity</b> and limit alignment by highlighting burst risk across the search tier.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> >= 468 consecutive running searches.</li>\
<li><strong>Medium:</strong> 390 - 467 consecutive running searches.</li>\
<li><strong>Low:</strong>  79 - 389 consecutive running searches.</li>\
<li><strong>Normal:</strong> <= 78 consecutive running searches.</li>\
</ul>
explanation = <p>This search reads internal Splunkd Metrics events for the <b>search_concurrency</b> group and extracts <b>active_hist_searches</b> as a proxy for historical search workload pressure. It bins results daily, captures the distribution of observed concurrency, and calculates p95 and max by instance label to distinguish typical peak behavior from extreme spikes. It enriches results with instance metadata, flags premium stack presence (ES/ITSI) to guide limit interpretation, and applies cloud limits logic to align observed behavior with environment constraints. Use this output to identify nodes with disproportionate burst concurrency, validate workload governance, and prioritize scaling or scheduling remediation when daily peaks trend upward.</p>
execution_plan = <b>01</b> <code>index=_internal ... metrics.log group=search_concurrency</code><br> - Pull concurrency telemetry from Splunkd Metrics with active historical searches &gt; 0.<br><b>02</b> <code>| bin span=1d | stats list(...)</code><br> - Bucket daily and retain the full daily sequence per host for distribution calculations.<br><b>03</b> <code>| `ssef_instance_info(host)`</code><br> - Enrich with instance naming/label metadata for tier-level grouping.<br><b>04</b> <code>| stats perc95/max ... by _time label</code><br> - Compute daily p95 and max active historical searches per instance label.<br><b>05</b> <code>| `ssef_cloud_limits(...)` | eval severity_level=case(...)</code><br> - Apply environment limit context and map peaks to severity for triage and dashboards.
solution = <p>This KPI identifies daily peak <b>historical search concurrency</b> pressure by instance, helping you spot burst-driven contention and prioritize capacity or governance actions.</p><p><b>Suggested Actions</b>: Investigate labels with persistently high max values; review scheduled workload distribution, search-time constraints, and concurrency governance. If peaks are concentrated on a subset of nodes, validate load balancing, captain/SHC behavior, and workload routing.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(active_hist_searches_max&gt;=468,4,active_hist_searches_max&gt;=390,3,active_hist_searches_max&gt;=78,2,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Capacity and scaling options relevant when sustained concurrency peaks indicate search-tier compute pressure.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utility Apps</a><br>Discover admin and troubleshooting utilities that can support operational governance and performance investigations.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=search%20concurrency" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Find apps related to search performance, workload governance, and concurrency troubleshooting.</li></ul></p>
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Service_limits_and_constraints" target="_blank">Cloud service limits and constraints</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Limitsconf#Configure_search_concurrency_limits" target="_blank">Configure Search Concurrency Limits</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Aboutsearchconcurrencylimits" target="_blank">Splunk Documentation: Search Concurrency Limits</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Capacity/Accommodatemanysimultaneoussearches" target="_blank">How Concurrent Users and Searches Impact Performance</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: SPL Command Quick Reference</a><br>Reference for SPL commands used here (stats, eventstats, eval, bin, fields) and related patterns.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search Reference</a><br>Core SPL reference for maintaining and extending internal telemetry KPI searches.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/evaluation-functions/evaluation-functions" target="_blank">Splunk Help: Evaluation Functions</a><br>Details on functions used for normalization and classification (match, coalesce, if, case, ceiling).</li></ul>
viz_options = { "count":100 }
search = index=_internal sourcetype=splunkd component=Metrics `ssef_host_excl` source=*metrics.log group=search_concurrency "system total" active_hist_searches>0 \
| eval summary_id="ssef_scma_search_search_concurrency_stats" \
| fields _time host active_hist_searches \
| bin _time span=1d \
| stats list(active_hist_searches) AS active_hist_searches by _time host \
| `ssef_instance_info(host)` \
| stats perc95(active_hist_searches) AS active_hist_searches_p95 max(active_hist_searches) AS active_hist_searches_max latest(name) as name by _time label \
| eval active_hist_searches_p95=ceiling(active_hist_searches_p95), active_hist_searches_max=ceiling(active_hist_searches_max) \
| eval is_premium = if( match(name,"^itsi|^es"), "premium_app_stack", "core_only" ) \
| eventstats values(is_premium) as is_premium_check \
| eval is_premium = if(match(is_premium_check, "premium_app_stack"), "premium_app_stack", is_premium ) \
| eval name = if(name==label, "other", name) \
| `ssef_cloud_limits(search_search_concurrency_stats)` \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( active_hist_searches_max >= 468, high, active_hist_searches_max >= 390, medium, active_hist_searches_max >= 78, low, true(), normal ) \
| table _time label name active_hist_searches_p95 active_hist_searches_max severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_search_concurrency_stats summary job completed successfully without identifying any issues, and everything is operating as expected.")`

