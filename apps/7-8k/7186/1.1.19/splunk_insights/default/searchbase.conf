[microsoft_azure_log_sources]
search_name = Microsoft Azure Log Sources
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 1.0.8
date_created = 2025-1-22 18:24:13
date_updated = 2025-11-24 14:27:1
category = ES Adoption
sub_category = Security
tags = Azure,ES Adoption,Log Sources,Summary,Windows
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 63F161E350AEA43B4D42CC107D6012DF
search_author = dluxton
updated_author = akhamis
related_info = <ul>\
<li><a href="https://docs.google.com/spreadsheets/d/1YJAqNmcXZU-7O9CxVKupOkR6q2S8TXriMeLAUMYmMs4/edit?gid=0#gid=0" target="_blank">Source of Truth Spreadsheet</a></li>\
<li><a href="https://splunkbase.splunk.com/app/3757" target="_blank">Splunk Add on for Microsoft Azure</a></li>\
<li><a href="https://splunkbase.splunk.com/app/4055" target="_blank">Splunk Add-on for Microsoft Office 365</a></li>\
<li><a href="https://splunkbase.splunk.com/app/3110" target="_blank">Splunk Add-on for Microsoft Cloud Services</a></li>\
<li><a href="https://splunkbase.splunk.com/app/7112" target="_blank">SA-AzureResources</a></li>\
<li><a href="https://splunkbase.splunk.com/app/7100" target="_blank">SA-EntraID</a></li>\
</ul>\
<p></p>
severity_medium_text = <br/><p>At least one of the following criteria was met:</p>\
<ul>\
<li>Azure / Entra ID ready A&amp;I sourcetypes were not identified</li>\
<li>365 Management activity logs are onboard, however not collecting message trace logs</li>\
</ul>
severity_high_text = <br/><p>At least one of the following best practice azure sourcetypes was not found</p>\
<ul>\
<li><span style="color: rgb(60,68,77);background-color: rgb(255,255,255);font-size: 14px;font-family: Splunk Platform Sans", "Proxima Nova", Roboto, Droid, "Helvetica Neue", Helvetica, Arial, sans-serif;">azure:monitor:aad</span></li>\
<li><span style="color: rgb(60,68,77);background-color: rgb(255,255,255);font-size: 14px;font-family: Splunk Platform Sans", "Proxima Nova", Roboto, Droid, "Helvetica Neue", Helvetica, Arial, sans-serif;">o365:management:activity</span></li>\
</ul>
description = <p>Review of Azure Log Sources</p>
search = | tstats summariesonly=true count as eventcount WHERE \
    [| `ssef_all_indexes` ] AND sourcetype IN (azure*,mcsc*,o365*) by sourcetype index host \
| eval summary_id="microsoft_azure_log_sources" \
| stats values(index) as index sum(eventcount) as eventcount dc(host) as hostcount by sourcetype \
| eval sourcetype_desc=case(\
    sourcetype IN ("azure:aad:user","mscs:resource:networkInterfaceCard","mscs:resource:publicIPAddress","mscs:resource:virtualMachine"),"Useful datasource for A&I",\
    sourcetype="mscs:azure:eventhub","generic eventhub sourcetype",\
    sourcetype="azure:aad:signin","Azure Sign-In sourcetype, not recommended due to throttling",\
    sourcetype="azure:monitor:aad","Azure Sign-In sourcetype, recommended, best practice",\
    sourcetype="azure:monitor:activity","Azure activity sourcetype, recommended, best practice",\
    sourcetype="o365:management:activity","o365 Management Activity Logs",\
    sourcetype="o365:reporting:messagetrace","o365 Message Trace Logs") \
| eventstats count as sourcetypeCount values(sourcetype_desc) as comb_sourcetype_desc values(sourcetype) as comb_sourcetype \
| eval severity_level = case (\
    sourcetypeCount>0 AND (NOT "azure:monitor:aad" IN (comb_sourcetype) OR NOT "o365:management:activity" IN (comb_sourcetype)),4,\
    sourcetypeCount>0 AND (NOT "Useful datasource for A&I" IN (comb_sourcetype_desc) OR ("o365:management:activity" IN (comb_sourcetype) AND NOT "o365 Message Trace Logs" IN (comb_sourcetype))),3,\
    true(),1) \
| rename index as index_name , sourcetype as sourcetype_name \
| table sourcetype_name index_name comb_sourcetype eventcount hostcount sourcetypeCount severity_level \
| `ssef_handle_no_results(1,"The microsoft_azure_log_sources summary job completed successfully without identifying any issues, and everything is operating as expected.")`

