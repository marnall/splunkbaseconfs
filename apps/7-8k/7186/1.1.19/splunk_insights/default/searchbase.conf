[list_threat_sources]
search_name = List Threat Sources
readonly = 1
ssef_cron = weekly
target_component = Threat Intelligence
version = 1.0.6
date_updated = 2025-11-11 7:44:29
category = ES Adoption
sub_category = Security
tags = ES Adoption,Summary,Threat Intelligence
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = D889ADEE90FCE89C0BDCDD32D332620D
search_author = dluxton
updated_author = akhamis
related_info = <p><strong>How to Review</strong></p>\
<ul>\
<li>Look for empty feeds which could be disabled</li>\
<li>Look for feeds with a max_age greater than 30 days</li>\
<li>Identify if local lists are in use</li>\
<li>Identify if any non-OOTB threat feeds are in use</li>\
</ul>
severity_low_text = <br/><p>One of the following criteria was met:</p>\
<ul>\
<li><span style="color: rgb(60,68,77);background-color: rgb(255,255,255);font-size: 14px;font-family: Splunk Platform Sans", "Proxima Nova", Roboto, Droid, "Helvetica Neue", Helvetica, Arial, sans-serif;">0 custom threat feeds enabled</span></li>\
<li><span style="color: rgb(60,68,77);background-color: rgb(255,255,255);font-size: 14px;font-family: Splunk Platform Sans", "Proxima Nova", Roboto, Droid, "Helvetica Neue", Helvetica, Arial, sans-serif;">There are less than 5 threat feeds with artifacts</span></li>\
<li>There are more than 10 threat feeds which have 0 artifacts</li>\
</ul>
severity_medium_text = <br/><p>At least one custom threat feed has 0 artifacts. A common cause for this can be expired credentials.</p>
severity_high_text = <br/><p>On average, there are less than 20 threat artifacts per enabled threat feed</p>
severity_critical_text = <br/><p>One of the following criteria was met:</p>\
<ul>\
<li>0 threat artifacts (indicators)</li>\
<li>0 threat sources enabled</li>\
</ul>
description = <p>List out all enabled threat intel sources, the weighting, max indicator age &amp; number of artefacts.</p>
search = | inputlookup append=T service_intel max=`threat_artifacts_max` \
| eval summary_id="list_threat_sources" \
| `set_threat_collection_name("service_intel")` \
| eval file_name=mvappend(service_file_name,service_dll_file_name), file_path=mvappend(service_file_path, service_dll_file_path), file_hash=mvappend(service_file_hash, service_dll_file_hash) \
| inputlookup append=T process_intel max=`threat_artifacts_max` \
| `set_threat_collection_name("process_intel")` \
| eval ip=mvappend(src, dest), domain=mvappend(src, dest) \
| inputlookup append=T file_intel max=`threat_artifacts_max` \
| `set_threat_collection_name("file_intel")` \
| inputlookup append=T certificate_intel max=`threat_artifacts_max` \
| `set_threat_collection_name("certificate_intel")` \
| fillnull value="" certificate_serial \
| mvexpand certificate_serial \
| `get_certificate_serial` \
| eventstats values(certificate_serial) as certificate_serial,values(certificate_serial_clean) as certificate_serial_clean,values(certificate_serial_dec) as certificate_serial_dec by _key \
| dedup _key,threat_collection \
| inputlookup append=T email_intel max=`threat_artifacts_max` \
| `set_threat_collection_name("email_intel")` \
| inputlookup append=T http_intel max=`threat_artifacts_max` \
| `set_threat_collection_name("http_intel")` \
| inputlookup append=T ip_intel max=`threat_artifacts_max` \
| `set_threat_collection_name("ip_intel")` \
| inputlookup append=T registry_intel max=`threat_artifacts_max` \
| `set_threat_collection_name("registry_intel")` \
| inputlookup append=T user_intel max=`threat_artifacts_max` \
| fillnull value=0 updated,disabled \
| `set_threat_collection_name("user_intel")` \
| eval file_hash=coalesce(certificate_file_hash,file_hash), src_user=coalesce(certificate_issuer_email,src_user), actual_src_user=coalesce(certificate_subject_email,actual_src_user), ip=coalesce(embedded_ip,ip), domain=coalesce(embedded_domain,domain), file_name=coalesce(process_file_name,file_name), file_path=coalesce(process_file_path,file_path) \
| stats dc(file_hash) as file_hash_count, dc(file_name) as file_name_count, dc(certificate_serial) as certificate_serial_count, dc(certificate_issuer_common_name) as certificate_issuer_common_name_count, dc(src_user) as src_user_count, dc(certificate_issuer_organization) as certificate_issuer_organization_count, dc(certificate_issuer_unit) as certificate_issuer_unit_count, dc(certificate_subject_common_name) as certificate_subject_common_name_count, dc(actual_src_user) as actual_src_user_count, dc(certificate_subject_organization) as certificate_subject_organization_count, dc(certificate_subject_unit) as certificate_subject_unit_count, dc(ip) as ip_count, dc(domain) as domain_count, dc(subject) as subject_count, dc(http_user_agent) as http_user_agent_count, dc(http_referrer) as http_referrer_count, dc(url) as url_count, dc(header) as header_count, dc(process) as process_count, dc(process_handle_name) as process_handle_name_count, dc(registry_path) as registry_path_count, dc(registry_value_name) as registry_value_name_count, dc(registry_value_text) as registry_value_text_count, dc(service) as service_count, dc(user) as user_count by threat_key \
| `get_threat_attribution(threat_key)` \
| search \
| addtotals fieldname=count *_count \
| fields source_id, source_path, source_type, threat_group, threat_category, malware_alias, count \
| rename source_id as title, count as artifact_count \
| append \
    [| rest splunk_server=local count=0 /services/data/inputs/threatlist search="disabled=0" search="is_threatintel=1" \
    | fields title description max_age weight url] \
| fillnull artifact_count value=0 \
| stats sum(artifact_count) as artifact_count, values(source_path) as source_path, values(source_type) as source_type, values(threat_group) as threat_group, values(threat_category) as threat_category, values(malware_alias) as malware_alias, values(description) as description, values(max_age) as max_age, values(url) as url values(weight) as weight by title \
| fields title, source_path, source_type, threat_group, threat_category, malware_alias, artifact_count, description, max_age, weight, url \
| sort + threat_group, threat_category, - artifact_count \
| eval ootb=if(match(title,"sans|phishtank|iblocklist|emerging_threats|hailataxii_malware|local_"),"true","false") \
| eventstats values(ootb) as all_ootb, count(eval(if(artifact_count>0,artifact_count,null()))) as active_feed_count, count(eval(if(artifact_count=0,artifact_count,null()))) as inactive_feed_count, sum(artifact_count) as total_artifact_count \
| eval severity_level = case (\
    total_artifact_count=0,5,\
    total_artifact_count/(active_feed_count+inactive_feed_count)<20,4,\
    ootb="false" AND artifact_count=0,3,\
    NOT match(all_ootb,"false") OR active_feed_count<5 OR inactive_feed_count>10,2,\
    true(),1) \
| table active_feed_count all_ootb artifact_count description inactive_feed_count max_age ootb severity_level source_path source_type threat_category threat_group title total_artifact_count url weight \
| `ssef_handle_no_results(5,"WARNING: No threat enabled intelligence sources could be identified")`

