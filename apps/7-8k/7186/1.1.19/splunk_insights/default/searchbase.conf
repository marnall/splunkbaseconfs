[ssef_scma_search_long_running_searches]
search_name = Long Running Search
readonly = 1
target_component = Search & Visualization
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 17:10:25
category = Splunk
sub_category = Dashboards
tags = SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 16C99A87A34B62B79A25F04FEE3764C8
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Search/Writebettersearches" target="_blank">Write Better Searches</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Aboutoptimization" target="_blank">Search Optimization</a></li>\
<li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Enterprise/Optimizing_search_in_Splunk_Enterprise" target="_blank">Lantern: Optimizing Search in Splunk Enterprise</a></li>\
<li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Cloud_Platform/Optimizing_search_in_Splunk_Cloud_Platform" target="_blank">Lantern: Optimizing Search in Splunk Cloud Platform</a></li>\
</ul>
severity_normal_text = <br/><p>No searches were found running longer than 5 minutes. This is excellent news. Your Splunk thanks you!</p>
severity_low_text = <br/><p>Searches running longer than 5 minutes were identified in the environment. Please consider reviewing these searches for optimization opportunities.</p>
severity_medium_text = <br/><p>Searches running longer than 5 minutes were identified in the environment. Please consider reviewing these searches for optimization opportunities.</p>
severity_high_text = <br/><p>Searches running longer than 5 minutes were identified in the environment. Please consider reviewing these searches for optimization opportunities.</p>
description = <p>This dashboard highlights searches within Splunk that exceed a 5-minute duration, pinpointing areas where search efficiency could be improved. Addressing a high frequency of lengthy searches through targeted user education on search optimization, summary indexing, data models, and dashboard best practices can greatly enhance user proficiency and system performance. We recommend incorporating educational initiatives as part of a strategy to boost user engagement and proficiency. Moreover, establishing roles with different levels of access and promoting users to these roles after completing Splunk training can not only optimize system security and resource use but also foster a deeper adoption of Splunk. These measures enhance the overall value of Splunk by ensuring that it is used more effectively and efficiently across the organization.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> Run Time > 14,440s.</li>\
<li><strong>Medium:</strong> All Time or N/A + Run Time > 3,600s OR Run Time > 3600.</li>\
<li><strong>Low:</strong> Run Time > 300s.</li>\
<li><strong>Normal:</strong> Run Time < 300s.</li>\
</ul>
search = index=_audit action=search user=* user!=splunk-system-user search_id=* info=completed NOT app IN (scma,splunk_insights) \
| eval summary_id="ssef_scma_search_long_running_searches" \
| eval search_name=if(savedsearch_name=="", search_id, savedsearch_name) \
| rex "\,\s+app\=\"(?<app_context>\S+)\"" \
| fillnull value="N/A" app_context \
| eval range=if((search_lt=="N/A" OR search_et=="N/A"),"All Time or N/A",tostring((search_lt-search_et),"duration")) \
| `ssef_instance_info(host)` \
| stats max(event_count) AS event_count count AS search_runs max(total_run_time) AS run_time_sec dc(host) AS dc_instance latest(name) as name latest(_time) as _time by label search_name app_context range provenance \
| where run_time_sec >= 300 \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( range="All Time or N/A" AND run_time_sec > 3600, medium, run_time_sec>14400, high, run_time_sec>3600, medium, run_time_sec>=300, low, true(), normal ) \
| table _time label name app_context provenance search_name dc_instance event_count range run_time_sec search_runs severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_long_running_searches summary job completed successfully without identifying any issues, and everything is operating as expected.")`

