updated_author = akhamis
related_info = <ul><li><p><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Admin/MonitoringLicenseUsage" target="_blank">Splunk Docs: Use the License Usage dashboards</a></p><p>This documentation explains how to monitor your daily data ingestion and license usage in Splunk Cloud Platform, helping you understand its impact on user experience and customer value.</p></li><li><p><a href="https://community.splunk.com/t5/Monitoring-Splunk/License-consumed-how-to-calculate-the-daily-ingest-per-index/m-p/551214" target="_blank">Splunk Community: License consumed, how to calculate the daily ingest per index?</a></p><p>This discussion provides insights into calculating daily data ingestion per index, aiding in assessing license usage and its implications for system performance.</p></li><li><p><a href="https://gosplunk.com/license-usage-by-index-per-day-with-average/" target="_blank">License Usage by Index per Day - GoSplunk</a></p><p>This resource offers a search query to determine daily license usage by index, assisting in identifying data volume patterns and their effect on user experience.</p></li><li><p><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Data_Management/Reducing_low-value_data_ingestion_to_improve_license_usage" target="_blank">Lantern: Reducing low-value data ingestion to improve license usage</a></p><p>This guide discusses strategies to minimize ingestion of low-value data, optimizing license usage and enhancing the value derived from Splunk.</p></li><li><p><a href="https://community.splunk.com/t5/Splunk-Cloud-Platform/What-happens-if-the-amount-of-data-exceeds-the-daily-limit-in/td-p/697791" target="_blank">Splunk Community: What happens if the amount of data exceeds the daily limit in Splunk Cloud?</a></p><p>This thread explores the consequences of exceeding daily data ingestion limits in Splunk Cloud, providing insights into license management and potential impacts on service availability.</p></li><li><p><a href="https://www.splunk.com/en_us/products/pricing/pricing-calculator.html" target="_blank">Splunk Pricing Calculator</a></p><p>This tool helps estimate costs based on daily data ingestion volumes, assisting in understanding the financial implications of your data strategies.</p></li><li><p><a href="https://community.splunk.com/t5/Installation/How-to-identify-what-caused-the-sudden-spike-in-the-log-volume/m-p/357900" target="_blank">Splunk Community: How to identify what caused the sudden spike in the log volume?</a></p><p>This discussion provides methods to identify causes of unexpected increases in data ingestion, aiding in proactive license management and maintaining user experience.</p></li></ul>
description = <p>This search summarizes <b>license consumption</b> by <b>sourcetype and index</b>. It highlights which data sources contribute most to overall <b>license usage</b>. This helps prioritize <b>cost and ingestion optimization</b> efforts.</p>
viz_options = { "count": 100 }
search = | `ssef_license_data` \
| stats values(Index_Name) as Index_Name sum(License_Usage_GB) as License_Usage_GB sum(License_Usage) as License_Usage by Sourcetype \
