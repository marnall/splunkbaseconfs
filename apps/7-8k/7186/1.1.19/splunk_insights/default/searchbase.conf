[ssef_ia4s_indexing_storage_capacity]
search_name = Indexing Storage Capacity
readonly = 1
target_component = Indexing
version = 2.0
date_updated = 2024-5-9 16:52:27
category = Splunk
sub_category = _internal
tags = Storage,Indexers
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = FF06BEC603B0D5CBBB50C152C37144EA
updated_author = khutchinson
severity_normal_text = <br/><p>Storage capacity is at a healthy level, with sufficient space for ongoing operations. Regular monitoring and maintenance are advised to maintain this state and ensure storage does not reach a critical low.</p>
severity_low_text = <br/><p>Indicates available storage capacity is critically low, with less than 10% remaining. Immediate action is required to increase storage capacity or reduce data volume to avoid service disruption and potential data loss.</p>
description = <p>Monitors <b>indexer partition capacity</b> using Splunk <b>introspection</b> data and highlights mounts with low available space. It calculates <b>percent available</b> by filesystem mount point and assigns a severity level for quick triage. Use it to support capacity planning and prevent indexing interruptions caused by disk exhaustion.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Low:</strong> Storage capacity < 10%.</li>\
<li><strong>Normal:</strong> Storage capacity healthy.</li>\
</ul>
explanation = <p>Indexer disk pressure is one of the fastest ways to trigger ingest backlogs, search degradation, and potential data loss if queues fill or retention enforcement accelerates unexpectedly. This search focuses on partition-level capacity so admins can pinpoint the exact <b>mount point</b> at risk rather than relying on host-wide disk averages. By filtering to systems with the <b>indexer</b> role, it keeps attention on the tier where storage availability directly impacts hot/warm buckets and indexing throughput. Tracking pct_available over time helps infrastructure and Splunk platform teams coordinate remediation (cleanup, retention changes, SmartStore/volume strategy, or storage expansion) before outages occur.</p>
execution_plan = <b>01</b> <code>| tstats summariesonly=true ... WHERE index=_introspection sourcetype=splunk_disk_objects component=Partitions ...</code><br> - Pull the latest partition capacity/availability metrics per host and mount point from introspection summaries.<br><b>02</b> <code>| eval summary_id=... | rename data.* as *</code><br> - Stamp a stable summary identifier and normalize field names for downstream reporting.<br><b>03</b> <code>| eval pct_available=round((available/capacity)*100,2)</code><br> - Compute the percent of free space available to enable consistent thresholding across mount sizes.<br><b>04</b> <code>| `ssef_instance_info(host)` | where role="indexer"</code><br> - Enrich with instance metadata and restrict results to indexers to keep findings actionable for indexing storage.<br><b>05</b> <code>| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( pct_available <= 10, low, true(), normal )</code><br> - Assign a severity level based on availability thresholds to prioritize remediation work.<br><b>06</b> <code>| table _time label indexer name mount_point fs_type pct_available available capacity free severity_level</code><br> - Present the key operational fields needed for triage, ticketing, and capacity planning.<br><b>07</b> <code>| `ssef_handle_no_results(1,"...")`</code><br> - Return a friendly success message when no issues are detected.</br>
solution = <p>This search flags indexer mounts where available capacity falls at or below the configured threshold, helping you intervene before indexing or retention behavior is impacted.</p><p><b>Suggested Actions</b><ul><li>Validate which mount points are used for Splunk hot/warm/cold paths and confirm the impacted filesystem matches Splunk storage volumes.</li><li>Free space safely (archive, clean up non-Splunk files, or adjust retention) and confirm there is sufficient headroom for bucket growth and replication.</li><li>If the condition repeats, plan storage expansion or redesign volumes (separate OS/Splunk paths, SmartStore strategy, or tiering) to avoid recurring risk.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Helps correlate infrastructure health signals (including storage pressure) into service-level KPIs for faster operational response.</li><li><a href="https://www.splunk.com/en_us/products/observability.html" target="_blank">Products: Splunk Observability Cloud</a><br>Extends infrastructure monitoring and alerting patterns that complement platform health checks like indexer storage capacity.</li><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Role-based education to strengthen admin workflows for capacity planning, troubleshooting, and platform operations.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=indexer%20storage%20capacity" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Find complementary apps and add-ons related to indexer storage monitoring and operational dashboards.</li></ul></p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Deployment-Architecture/Indexing-Storage-Capacity-Management-in-Splunk/m-p/416783" target="_blank">Splunk Answers - Troubleshooting Storage Capacity Issues</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Indexer/Configureindexstorage" target="_blank">Configure Index Storage</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/deployment-capacity-manual/9.0/hardware-capacity-planning/estimate-your-storage-requirements" target="_blank">Splunk Help: Estimate your storage requirements</a><br>Guidance for planning index storage based on daily volume, retention, and deployment choices.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: SPL search commands overview</a><br>Reference for SPL command categories useful when extending this search (tstats, eval, where, table).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: Command quick reference</a><br>Quick refresher on SPL commands and usage patterns for troubleshooting and enhancements.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=%22indexer%20disk%22" target="_blank">Splunk Docs: SplunkSearch for "indexer disk"</a><br>(provisionally validated) Keyword search across Splunk Docs for indexer disk and storage topics.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=_introspection" target="_blank">Splunk Docs: SplunkSearch for _introspection</a><br>(provisionally validated) Find documentation related to introspection metrics and monitoring approaches.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=tstats" target="_blank">Splunk Docs: SplunkSearch for tstats</a><br>(provisionally validated) Learn about tstats usage, acceleration considerations, and performance best practices.</li><li><a href="https://help.splunk.com/en/search?q=%22storage%20capacity%22" target="_blank">Splunk Help: Search for "storage capacity"</a><br>(provisionally validated) Help site search for storage capacity planning and operational guidance.</li><li><a href="https://lantern.splunk.com/Search?q=%22capacity%20planning%22" target="_blank">Lantern: Search for "capacity planning"</a><br>(provisionally validated) Lantern search for practical guidance and patterns related to capacity planning.</li></ul>
viz_options = { "count":100 }
search = | tstats summariesonly=true latest(_time) as _time latest(data.capacity) AS capacity latest(data.available) AS available latest(data.free) AS free latest(data.fs_type) AS fs_type WHERE index=_introspection sourcetype=splunk_disk_objects component=Partitions by host data.mount_point \
| eval summary_id="ssef_ia4s_indexing_storage_capacity" \
| rename data.* as * \
| eval pct_available=round((available/capacity)*100,2) \
| `ssef_instance_info(host)` \
| where role="indexer" \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( pct_available <= 10, low, true(), normal ) \
| rename host as indexer \
| table _time label indexer name mount_point fs_type pct_available available capacity free severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_indexing_storage_capacity summary job completed successfully without identifying any issues, and everything is operating as expected.")`

