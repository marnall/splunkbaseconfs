[ssef_audit_user_login_tracker]
search_name = Hourly User Login Activities Tracker v2
readonly = 1
ssef_cron = hourly
target_component = Users
version = 1.1.9
date_updated = 2025-11-13 13:1:32
category = Splunk
sub_category = Users
tags = Discovery,Tracker,Users
dispatch_earliest_time = -4h@h
dispatch_latest_time = -0h@h
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 51F642EEC6C35B310B6A2D9B6ED5B4AB
updated_author = akhamis
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>This Splunk query is analyzing user login activity and collecting information about the users operating system, browser, and other details.</p>
search = earliest=-4h@h latest=-0h@h index=_audit sourcetype=audittrail ( ("action=login attempt" AND info=succeeded ```NOT useragent IN ("Splunk*","Go-http-client*")``` ) OR (action=search search_id=* total_run_time>0 NOT info IN (cancel,pause,finalize,setworkloadpool,granted)) ) `ssef_host_excl` NOT app IN (SplunkDeploymentServerConfig) \
| eval summary_id="ssef_audit_user_login_tracker" \
| fields _time host app action search_id total_run_time user is_realtime provenance savedsearch_name acceleration_id session sourcetype* \
| `ssef_tracker_search_type` \
| `ssef_index_sourcetype_reference(search_string)` \
| `ssef_lookup_reference(search_string)` \
| `ssef_source_reference(search_string)` \
| rex field=_raw "exec_time=(?<exec_time>\d+)" \
| eval logon_time = if(match(_raw, "action=login attempt"), _time, null() ) \
| bin _time span=1h \
| `ssef_instance_info(host)` \
| fillnull value="system" app \
| eval datamodel_reference=split(datamodel_reference,",") \
| stats dc(search_id) as num_searches latest(exec_time) as latest_search sum(total_run_time) as total_search_time, values(session) AS session, latest(logon_time) AS latest_logon values(search_type) as search_type latest(name) as name values(role) as role values(index_reference) As index_reference values(sourcetype_reference) As sourcetype_reference values(datamodel_reference) As datamodel_reference values(lookup_reference) As lookup_reference values(source_reference) As source_reference values(search_provenance) as search_provenance by _time , label, app, user \
| fillnull value=0 num_searches total_search_time \
| eval session = mvfilter(! match(session, "split|\*")) \
    ```| eval sourcetype_reference = replace(sourcetype_reference, "[^A-Za-z0-9:_*-]", "")```\
| rex field=sourcetype_reference mode=sed "s/[~!@#\$%\^&()=+\[\]{}\\\|'\";<>\?\/`]//g" \
| foreach name role search_type index_reference sourcetype_reference datamodel_reference lookup_reference session search_provenance source_reference \
    [| eval <<FIELD>>=mvjoin(<<FIELD>>,"|") ] \
| rex field=sourcetype_reference mode=sed "s/\s+|,/|/g" \
| rex field=sourcetype_reference mode=sed "s/\*{2,}/*/g" \
| rex field=index_reference mode=sed "s/\s+|,/|/g" \
| eval latest_logon = round(latest_logon) , role=if(user="splunk-system-user", "any", role) \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time label name app user session num_searches latest_logon latest_search total_search_time search_type search_provenance role index_reference sourcetype_reference datamodel_reference lookup_reference source_reference severity_level \
| `ssef_handle_no_results(1,"The ssef_audit_user_login_tracker summary job completed successfully without identifying any issues, and everything is operating as expected.")`

