[#_of_Analytic_Capabilities_Added_by_Apps_Export]
search_name = # of Analytic Capabilities Added by Apps Export
readonly = 1
search_hidden = 1
target_component = Capabilities
category = Splunk
sub_category = Capabilities
tags = Apps,IS4S Data Export,Summary
solution = <p>This output shows how each <b>sourcetype contributes to analytic and technical capabilities</b> across domains.</p><p><b>Suggested Actions</b> Review sourcetypes with low or missing analytic capability counts to identify enrichment or normalization opportunities. Use this view to prioritize onboarding enhancements and align sourcetypes to high-value analytic use cases.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/data-stream-processor.html" target="_blank">Products: Splunk Data Stream Processor</a><br>Transform and enrich data in real time to improve analytic capability coverage.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert guidance to design data models and onboarding strategies aligned to analytics goals.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=data%20normalization" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Additional apps that support data normalization, enrichment, and analytics enablement.</li></ul></p>
dispatch_earliest_time = -8d@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary(ssef_configs_conf_props)</code><br> - Retrieves summarized configuration properties for non-default apps.<br><b>02</b> <code>| lookup uce_* mappings</code><br> - Enriches sourcetypes with data types, use cases, and domains.<br><b>03</b> <code>| stats</code><br> - Aggregates analytic, technical, and use case coverage per sourcetype.<br>
explanation = <p>Understanding which analytic and technical capabilities are enabled by configured sourcetypes is essential for measuring analytics maturity. This search correlates configuration metadata with standardized data type, use case, and domain mappings to expose coverage gaps and strengths. By quantifying analytic capabilities per sourcetype, teams can identify underutilized data, prioritize onboarding improvements, and align data engineering efforts with business outcomes. These insights support strategic planning, governance, and value realization from ingested data.</p>
quid = 5959DD93629FCE7FB9586F4075F853F7
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/get-data/get-data-into-splunk-enterprise" target="_blank">Splunk Help: Get Data Into Splunk</a><br>Best practices for onboarding and configuring data sources.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/manage-sourcetypes" target="_blank">Splunk Help: Manage Sourcetypes</a><br>Guidance on sourcetype configuration and normalization.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=sourcetype%20analysis" target="_blank">Splunk Docs: Sourcetype Analysis Searches</a><br>Search examples for analyzing sourcetype usage and coverage.</li><li><a href="https://community.splunk.com/t5/Data-Onboarding/bd-p/data-onboarding" target="_blank">Community: Data Onboarding</a><br>Community knowledge on data onboarding and analytics alignment.</li></ul>
description = <p>This search analyzes <b>configured sourcetypes</b> to determine their <b>mapped analytic and technical capabilities</b> across data domains.</p><p>It highlights how existing configurations support <b>use cases and analytics coverage</b> within the platform.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
search = `ssef_summary(ssef_configs_conf_props)` NOT app IN (`ssef_default_apps`) NOT title IN (splunk*,source::*,*?*,*\(*,-too_small*)\
| eval summary_id="#_of_Analytic_Capabilities_Added_by_Apps_Export" \
| fields _time, label, name, Splunk_Instance, app, title, sharing, author, app \
| bin _time span=1d \
| stats count by _time title \
| rename title as sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type \
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type \
| stats count by _time data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUT use_case \
| stats count by _time use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type \
| stats count by _time use_case use_case_type \
| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()) , Analytic_Capabilities = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null()) \
| stats dc(Analytic_Capabilities) as kpi_value by _time  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "# of Analytic Capabilities Added by Apps" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level \
| `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

