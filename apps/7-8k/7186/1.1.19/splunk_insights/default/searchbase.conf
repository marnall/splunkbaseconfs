description = <p>This KPI monitors the identification of sourcetypes that Splunk automatically assigns during data ingestion. Auto-assigned sourcetypes are a result of Splunk optimizing data ingest by automatically configuring data types for inputs that are not explicitly defined.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Auto assigned sourcetypes with event counts >= 1000 found.</li>\
<li><strong>Low:</strong> Auto assigned sourcetypes with event counts between 100 - 999 found.</li>\
<li><strong>Normal:</strong> Auto assigned sourcetypes with event counts > 100 not found.</li>\
