dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_ia4s_users_account_modifications)` operation="create"</code><br> - Identifies newly created user accounts from account modification summary.<br><b>02</b> <code>| fields _time dest_user | rename dest_user as user | stats count by user | fields user</code><br> - Produces a list of new users for filtering.<br><b>03</b> <code>`ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`, splunk-system-user) search_type="*adhoc*"</code><br> - Retrieves adhoc login tracker events, excluding system and default accounts.<br><b>04</b> <code>| fields _time label app user num_searches</code><br> - Keeps only fields relevant to search counting.<br><b>05</b> <code>| bin _time span=1h</code><br> - Buckets events into hourly intervals.<br><b>06</b> <code>| stats max(num_searches) as num_searches by _time label app user</code><br> - Aggregates the peak number of searches per hour for each user/app/head.<br><b>07</b> <code>| makecontinuous _time span=1h</code><br> - Ensures continuous hourly timeline for visualization.<br><b>08</b> <code>| fillnull value=0 num_searches</code><br> - Fills missing hours with zero search count.<br><b>09</b> <code>| eval hour=strftime(_time, "%H")</code><br> - Extracts the hour portion for charting.<br><b>10</b> <code>| chart sum(num_searches) AS "New User Search Count by Time" by hour user</code><br> - Produces a timechart of summed search counts by hour for each new user.<br>
explanation = <p>This search reveals the distribution of search activity by new users across hours of the day. Understanding these patterns can help teams assess onboarding effectiveness, user engagement timing, and potential automation or misuse of credentials.</p>
quid = 26A628FEDAAFA52A1569293D6E387EB3
search_author = khutchinson
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/search?q=chart+command" target="_blank">Splunk Help: Chart Command</a><br>Details on using the chart command to aggregate values by fields.</li><li><a href="https://help.splunk.com/en/search?q=makecontinuous" target="_blank">Splunk Help: Makecontinuous Command</a><br>Ensures continuous time series for accurate visualizations.</li><li><a href="https://lantern.splunk.com/Search?q=user+search+activity" target="_blank">Lantern: User Search Activity Analysis</a><br>Guidance on methods to analyze search activity patterns over time.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Search‑trends‑by‑hour‑and‑user/td-p/547280" target="_blank">Community: Search Trends by Hour and User</a><br>Discussion on tracking search trends by hour across users.</li><li><a href="https://help.splunk.com/en/search?q=stats+command" target="_blank">Splunk Help: Stats Command</a><br>Explanation of aggregation functions for summarizing data.</li></ul>
description = <p>Tracks <b>hourly search activity</b> of newly created users based on summary login and audit data. Highlights when new users perform searches after account creation.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_ia4s_users_account_modifications)` operation="create" \
| fields _time label src_user dest_user operation severity_level \
| stats latest(_time) as discovered values(src_user) as src_user by label dest_user \
| convert ctime(discovered) \
| lookup ssef_identities_lookup identity as dest_user output emp_email emp_name \
| eval emp_name=mvdedup(emp_name), emp_email=mvdedup(emp_email) \
| table label dest_user emp_name emp_email src_user discovered\
| rename dest_user as "New User", label as "Search Head", src_user as "Creating User", discovered as "Created On", emp_email as Email, emp_name as Name

