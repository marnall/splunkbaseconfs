[ssef_scma_indexing_blocked_queue_status]
search_name = Blocked Queue Status
readonly = 1
target_component = GDI & Data Hygiene
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 12:31:42
category = Splunk
sub_category = Indexing
tags = GDI,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = F885F807B4E10052C9B4105794C2CB06
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Indexer/Monitorindexingperformance" target="_blank">Splunk Docs - Monitor Indexing Performance</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/Investigateblockqueues" target="_blank">Splunk Docs - Configure Queue Settings</a></li>\
<li><a href="https://community.splunk.com/t5/Monitoring-Splunk/Troubleshooting-blocked-queues-in-Splunk/m-p/419326" target="_blank">Splunk Answers - Troubleshooting Blocked Queues</a></li>\
<li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/queue%20monitor" target="_blank">Splunkbase - Apps for Monitoring Queue Health</a></li>\
</ul>
severity_normal_text = <br/><p>This search has returned an 'normal' status. There is nothing to worry about here unless you were expecting a different severity. If that is the case reach out to your Splunk Account team. More information may be added here to support this search result.</p>
severity_medium_text = <br/><p>One or more instances has been identified with consistently full forwarding or indexing queues.</p>
description = <p>This key performance indicator (KPI) is crucial as it measures the utilization of data processing queues linked to ingestion, providing early warnings of potential system issues. When these queues approach capacity, it highlights imminent performance bottlenecks and resource shortages, significantly increasing the risk of data loss in summary jobs. Regular monitoring of this KPI is essential for proactively managing system performance and safeguarding data integrity, thereby ensuring optimal adoption and analytic capability attainment.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> One or more instances have been found that deal with excessive queuing.</li>\
<li><strong>Normal:</strong> No processing queue issues have been found.</li>\
</ul>
search = index=_internal `ssef_host_excl` source=*metrics.log sourcetype=splunkd group=queue (name=tcpin_queue OR name=parsingqueue OR name=aggqueue OR name=typingqueue OR name=indexqueue) \
| eval summary_id="ssef_scma_indexing_blocked_queue_status" \
| fields _time host,name,ingest_pipe,max_size,max_size_kb,current_size_kb \
| rename name AS queue \
| eval ingest_pipe = if(isnotnull(ingest_pipe), ingest_pipe, "0") \
| eval max=if(isnotnull(max_size_kb),max_size_kb,max_size) \
| eval curr=if(isnotnull(current_size_kb),current_size_kb,current_size) \
| eval fill_perc=round((curr/max)*100,2) \
| eval host_and_pipe=host."@@".ingest_pipe \
| chart perc90(fill_perc) over host_and_pipe by queue \
| eval host_and_pipe=split(host_and_pipe, "@@"), instance=mvindex(host_and_pipe, 0), ingest_pipe=mvindex(host_and_pipe, 1) \
| `ssef_cloud_limits(indexing_blocked_queue_status)` \
| eval queue_warning_limit=30 \
| eval message=if(parsingqueue > queue_warning_limit OR aggqueue > queue_warning_limit OR typingqueue > queue_warning_limit OR indexqueue > queue_warning_limit OR tcpin_queue > queue_warning_limit, "WARNING: One of the queues is over ".queue_warning_limit."% threshold.", "OK") \
| `ssef_instance_info(instance)` \
| eval role=mvjoin(role, ":") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( ! match(message, "^OK"), medium, true(), normal ) \
| eval _time = now() \
| table _time label name ingest_pipe role message tcpin_queue parsingqueue aggqueue typingqueue indexqueue severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_blocked_queue_status summary job completed successfully without identifying any issues, and everything is operating as expected.")`

