| `ssef_sourcetype_reference(savedsearch_search)` \
| search NOT sourcetype_reference IN (splunk*,scheduler)\
| stats values(index_reference) as Indexes values(sourcetype_reference) as Sourcetypes by label app author savedsearch_name sourcetype_reference \
| lookup ssef_scma_indexing_data_source_inventory_lookup orig_sourcetype as sourcetype_reference output orig_sourcetype as found orig_index as ingest_index \
| where not match(sourcetype_reference, "\*")\
| eval ingest_index=mvdedup(ingest_index), found=mvdedup(found)\
| where isnull(found)

