updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Search command overview</a><br>Provides an overview of SPL command types and their impact on search behavior.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search reference introduction</a><br>Background documentation on SPL structure and execution.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=search%20performance" target="_blank">Splunk Docs: Search performance</a><br>Search results for guidance on understanding and optimizing search workloads.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Apps</a><br>Apps that assist with usage analysis, performance insight, and operational governance.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunkbase: IT Operations Management</a><br>Apps aligned to operational monitoring and performance tuning use cases.</li><li><a href="https://www.splunk.com/en_us/blog/2015/02/16/splunk-search-optimization-techniques.html" target="_blank">Splunk Blogs: Search optimization techniques</a><br>Best practices for managing search volume and performance impact.</li></ul>
description = <p>This search visualizes <b>daily search volume trends</b> by <b>search type</b> using summarized metrics. It highlights how different search behaviors contribute to overall platform activity. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p></p>
default_viz = splunk.column
viz_options = { "stackMode":"stacked","overlayFields":["Total"],"seriesColors":["#7e52d2","#009be6","#00cdb0","#e39a2b","#ff677e","#d52094","#0050b1","#008c80","#97b22a","#ff6acb","#8098F6","#C83C10"] }
search = `ssef_summary(ssef_scma_search_count_by_type)` searchtype!=Total \
