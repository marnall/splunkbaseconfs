[detection_mitre_attack_annotations]
search_name = Detection MITRE ATT&CK Annotations
readonly = 1
ssef_cron = weekly
target_component = Detections and Alerts
version = 1.1.2
date_updated = 2025-11-25 16:43:9
category = ES Adoption
sub_category = Security
tags = Detections and Alerts,ES Adoption,MITRE ATTACK,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 59FFB0AD8E8CC680BF80AA70CE97FF6A
search_author = dluxton
updated_author = akhamis
related_info = <ul>\
<li><a href="https://splunkbase.splunk.com/app/7066" target="_blank">SA-DetectionInsights</a></li>\
<li><a href="https://attack.mitre.org/" target="_blank">MITRE ATT&amp;CK Framework</a></li>\
<li><a href="https://www.splunk.com/en_us/blog/security/macro-att-ck-2024-a-five-year-perspective.html" target="_blank">Macro-ATT&amp;CK</a></li>\
</ul>
severity_normal_text = <br/><p>All of the following criteria has been met:</p>\
<ul>\
<li>There are more than 60 unique Mitre ATT&amp;CK Technique annotations in use</li>\
<li>Less than 20% of correlation searches are missing Mitre ATT&amp;CK annotations</li>\
</ul>\
<p></p>
severity_low_text = <br/><p>At least one of the following criteria has been met:</p>\
<ul>\
<li>There are less than 60 unique Mitre ATT&amp;CK Technique annotations in use</li>\
<li>More than 20% of correlation searches are missing Mitre ATT&amp;CK annotations</li>\
</ul>\
<p></p>
severity_medium_text = <br/><p>At least one of the following criteria has been met:</p>\
<ul>\
<li>There are less than 30 unique Mitre ATT&amp;CK Technique annotations in use</li>\
<li>More than 50% of correlation searches are missing Mitre ATT&amp;CK annotations</li>\
</ul>
severity_high_text = <br/><p>At least one of the following criteria has been met:</p>\
<ul>\
<li>There are less than 10 unique Mitre ATT&amp;CK Technique annotations in use</li>\
<li>More than 80% of correlation searches are missing Mitre ATT&amp;CK annotations</li>\
</ul>
description = <p>MITRE ATT&amp;CK is an essential tool for defenders.</p>\
<p>Ensure all detections are mapped to the MITRE ATT&amp;CK framework where possible, this will help ensure that the following actions can be performed.</p>\
<ul>\
<li>Threat Hunting for adversaries by looking for groupings of techniques</li>\
<li>Identifying detection coverage weak spots</li>\
<li>Providing analysts with a quick way to research about the particular technique featured in the alert</li>\
</ul>
search = `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 \
| eval summary_id="detection_mitre_attack_annotations" \
| stats latest(*) as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
| rename action_correlationsearch_annotations as annotations \
| rename action_correlationsearch_label as correlationsearch_label \
| spathannotations \
| rename annotations.mitre_attack AS mitre_attack \
| fillnull mitre_attack value="null" \
| append \
    [| search `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 \
    | stats latest(*) as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
    | rename action_correlationsearch_annotations as annotations \
    | spathannotations \
    | rename annotations.mitre_attack AS mitre_attack \
    | stats count by label mitre_attack \
    | sort - count \
    | lookup mitre_attack_lookup mitre_technique_id as mitre_attack OUTPUT mitre_technique \
    | eval top_technique=mitre_attack+" "+mitre_technique+" count: "+count \
    | head 5 \
    | stats list(top_technique) as top_techniques by label \
    | fields label top_techniques ] \
| fillnull value="top_techniques" correlationsearch_label \
| eventstats dc(correlationsearch_label) as detectionCount, count(eval(if(mitre_attack!="null",correlationsearch_label,null()))) as detectionsWithMitreTechniquesCount, count(eval(if(mitre_attack="null",mitre_attack,null()))) as detectionsWithoutMitreTechniqueCount, dc(eval(if(mitre_attack!="null",mitre_attack,null()))) as uniqueMitreTechniqueCount, values(top_techniques) as top_techniques \
| eval undefined_techniques_perc=round(detectionsWithoutMitreTechniqueCount/detectionCount*100,2) \
| eval severity_level = case ( uniqueMitreTechniqueCount<10 OR undefined_techniques_perc>80,4, uniqueMitreTechniqueCount<30 OR undefined_techniques_perc>50,3, uniqueMitreTechniqueCount<60 OR undefined_techniques_perc>20,2, true(),1) \
| table label correlationsearch_label detectionCount detectionsWithMitreTechniquesCount detectionsWithoutMitreTechniqueCount mitre_attack severity_level top_techniques undefined_techniques_perc uniqueMitreTechniqueCount \
| `ssef_handle_no_results(1,"The detection_mitre_attack_annotations summary job completed successfully without identifying any issues, and everything is operating as expected.")`

