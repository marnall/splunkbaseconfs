| fields splunk_server version shpooling_state \
| eval severity_level = if(shpooling_state = 1 AND match(version,"^(6\.[234]|[7-9]\.)"), 1, 1) \
| rename splunk_server AS instance \
| fields - _timediff\
| `ssef_handle_no_results(1,"The mc_shp_to_shc_upgrade_opportunity summary job completed successfully without identifying any issues, and everything is operating as expected.")`

