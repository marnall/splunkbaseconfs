updated_author = akhamis
description = <p>While looking at all the instances within the Splunk ecosystem over the period of a business week, this search looks to see how much of the CPU capacity is used over 5 time-minute slices. Load average was selected vs. % use as it's more accurate whilst still indicating user activity on the system.</p><p><br></p><p><strong style="background-color: rgb(255, 255, 255); color: rgb(60, 68, 77);">Regular</strong><strong> Search:</strong></p><div class="ql-code-block-container" spellcheck="false"><div class="ql-code-block" data-language="plain">index=_introspection sourcetype="splunk_disk_objects" component=Partitions</div><div class="ql-code-block" data-language="plain">| bin span=10m@m _time</div><div class="ql-code-block" data-language="plain">| eval free=if(isnotnull('data.available'),'data.available','data.free'), usage=round(('data.capacity'-free)/1024,2), capacity=round('data.capacity'/1024,2), pct_usage=(usage/capacity)*100</div><div class="ql-code-block" data-language="plain">| eval free=round(free/1024,2), pct_usage=round(pct_usage,2)</div><div class="ql-code-block" data-language="plain">| stats avg(free) as avg_free avg(usage) as avg_usage avg(capacity) as avg_capacity avg(pct_usage) as avg_pct_usage by host,_time</div><div class="ql-code-block" data-language="plain">| where avg_pct_usage &gt; 90</div><div class="ql-code-block" data-language="plain">| stats count as high_disk_usage_count avg(avg_pct_usage) as aggre_avg_pct_usage by host</div><div class="ql-code-block" data-language="plain">| where high_disk_usage_count &gt; 504</div><div class="ql-code-block" data-language="plain">| eventstats count as high_disk_usage_count</div><div class="ql-code-block" data-language="plain">| eval high_disk_usage_count=round(high_disk_usage_count,2)</div><div class="ql-code-block" data-language="plain">| eval severity_level = case (high_disk_usage_count&lt;=2,1, high_disk_usage_count&lt;=5,2, high_disk_usage_count&lt;=10,3, high_disk_usage_count&lt;=20,4, high_disk_usage_count&gt;20,5)</div><div class="ql-code-block" data-language="plain">| `ssef_severity_level_text(severity_level)`</div><div class="ql-code-block" data-language="plain">| rename severity_text as Severity</div><div class="ql-code-block" data-language="plain">| table high_disk_usage_count Severity</div></div>
viz_options = { "count":100 }
search = | tstats summariesonly=true avg(data.available) as avg_available avg(data.free) as avg_free_raw avg(data.capacity) as avg_capacity_raw WHERE index=_introspection sourcetype="splunk_disk_objects" component=Partitions by host _time span=10m \
| eval free = coalesce(avg_available, avg_free_raw) \
| eval usage = round((avg_capacity_raw - free)/1024, 2) \
| eval capacity = round(avg_capacity_raw/1024, 2) \
| eval pct_usage = round((usage/capacity)*100, 2) \
| eval free = round(free/1024, 2) \
| `ssef_instance_info(host)` \
| stats avg(free) as avg_free avg(usage) as avg_usage avg(capacity) as avg_capacity avg(pct_usage) as avg_pct_usage by label host _time \
| where avg_pct_usage > 90 \
| stats max(*) as * count as high_disk_usage_count avg(avg_pct_usage) as aggre_avg_pct_usage by label host \
| where high_disk_usage_count > 504 \
| eventstats count as high_disk_usage_count \
| eval high_disk_usage_count = round(high_disk_usage_count, 2) \
| eval severity_level = case (\
    high_disk_usage_count<=2, 1,\
    high_disk_usage_count<=5, 2,\
    high_disk_usage_count<=10, 3,\
    high_disk_usage_count<=20, 4,\
    high_disk_usage_count>20, 5 ) \
| `ssef_severity_level_text(severity_level)` \
| rename severity_text as Severity \
| table label host high_disk_usage_count avg_free avg_usage avg_capacity avg_pct_usage Severity

