updated_author = akhamis
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
description = <p>This Splunk query retrieves information about failed search jobs that are not in certain dispatch states and have specific ACL owner and app values.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/search/jobs search="dispatchState IN (FAILED) AND eai:acl.owner=* NOT eai:acl.app IN (splunk_archiver,splunk_instrumentation)" \
| eval summary_id="ssef_search_failed_jobs_tracker" \
| rename eai:acl.* AS * \
| rename eai:* AS * \
| rename messages.error AS error_messages, messages.fatal AS fatal_messages, messages.info AS info_messages, messages.warn AS warn_messages, searchEarliestTime AS search_et, searchLatestTime AS search_lt, runDuration AS total_run_time, scanCount AS scan_count, owner AS user, resultCount AS result_count, label AS savedsearch_name, eventAvailableCount AS available_count, eventCount AS event_count, searchTotalBucketsCount AS TotalBucketsCount, runtime.auto_cancel AS runtime_auto_cancel, runtime.auto_pause AS runtime_auto_pause , request.auto_cancel AS request_auto_cancel \
| `ssef_normalized_search_id(sid)` \
| eval Splunk_Instance = lower(splunk_server) \
| `ssef_instance_info(Splunk_Instance)` \
| eval savedsearch_name = if(isnotnull(savedSearchLabel) AND savedSearchLabel!="" , savedsearch_name, null()) \
| eval provenance = case ( match(sid,"subsearch_scheduler"), "subsearch_scheduler", isnotnull(savedsearch_name) OR match(sid,"_scheduler_"), "scheduler", match(sid,"subsearch_nested"), "subsearch_nested", match(sid,"subsearch_"), "subsearch", match(sid,"\d{10}\.\d{5}") AND isnull('request.provenance') ,"REST:Search", true(), provenance) \
| eval status = case ( match(error_messages, "cancelled"), "Cancelled", isFinalized = "1", "Finalized", isZombie = "1", "Zombie", dispatchState = "RUNNING", "Running", dispatchState = "PARSING", "Parsing", dispatchState = "DONE", "Completed", dispatchState = "PAUSED", "Paused", dispatchState = "QUEUED", "Queued", dispatchState = "FAILED", "Failed", dispatchState = "FINALIZING", "Finalizing", true(), Upper(dispatchState)) \
| rex field=error_messages mode=sed "s/\[.*\]\s+//g" \
| rex field=fatal_messages mode=sed "s/\[.*\]\s+//g" \
| stats `ssef_stats_rest_search_jobs_fields` LATEST(name) AS name by label, search_id_normalized, pid \
| eval _time = if(isnotnull(published) AND published!="", strptime(published, "%Y-%m-%dT%H:%M:%S.%3N%z") , now() ) \
| eval error_messages = mvdedup(mvappend(error_messages, fatal_messages)) \
| foreach role, Splunk_Instance \
    [ eval <<FIELD>> = mvjoin('<<FIELD>>', "|")] \
| foreach warn_messages, error_messages \
    [ eval <<FIELD>> = mvjoin('<<FIELD>>', "#####")] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time, label, name, Splunk_Instance, role, app, user, provenance, savedsearch_name, search_id_normalized, pid, status, search_et, search_lt, diskUsage, available_count, event_count, result_count, total_run_time, scan_count, request_auto_cancel, runtime_auto_cancel, runtime_auto_pause, error_messages, warn_messages, TotalBucketsCount, search, severity_level \
