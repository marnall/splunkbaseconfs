search_name = A&I Asset Lookups
readonly = 1
ssef_cron = weekly
target_component = Assets & Identities
version = 1.0.9
date_updated = 2025-1-24 19:24:30
category = ES Adoption
sub_category = Security
tags = Assets and Identities,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 79F52EDAB0E0D506206EA84D93B67EB9
search_author = dluxton
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/ES/7.0.2/Admin/Configureassetandidentitycorrelation#How_asset_and_identity_correlation_works" target="_blank">How asset and identity correlation works</a></li>\
</ul>
severity_low_text = <br/><p>Low volume of asset records</p>
severity_medium_text = <br/><p>Prioritisation of assets does not allign to best practice.</p>
severity_high_text = <br/><p>Assets with an undefined priority detected, or one of the following fields are not being populated by any asset</p>\
<ul>\
<li>ip</li>\
<li>nt_host</li>\
<li>dns</li>\
<li>category</li>\
<li>bunit</li>\
</ul>
severity_critical_text = <br/><p>No asset records found</p>
description = <p>Assets by string matches where the asset field within the below lookup is present in the dest, src or device fields within raw logs.</p>
search = | inputlookup asset_lookup_by_str \
| eval summary_id="asset_lookups" \
| eval asset_identifier_count=mvcount(asset), asset_md5=md5(mvjoin(asset,"")) \
| fillnull priority value="undefined" \
| stats dc(ip) as ipCount, dc(mac) as macCount, dc(dns) as dnsCount, dc(nt_host) as nt_hostCount, count as totalAssetCount, count(eval(if(match(category,"server"),"true",null()))) as serverCount, count(eval(if(match(category,"workstation"),"true",null()))) as workstationCount, count(eval(if(match(category,"windows"),"true",null()))) as windowsDeviceCount, count(eval(if(match(category,"linux"),"true",null()))) as linuxDeviceCount avg(asset_identifier_count) as asset_identifier_avg_count, values(category) as categories, dc(category) as categoryCount, values(bunit) as bunit, dc(bunit) as bunitCount, count(eval(if(priority="critical",asset_md5,null()))) as pcount_critical, count(eval(if(priority="high",asset_md5,null()))) as pcount_high, count(eval(if(priority="medium",asset_md5,null()))) as pcount_medium, count(eval(if(priority="low",asset_md5,null()))) as pcount_low, count(eval(if(priority="undefined",asset_md5,null()))) as pcount_undefined \
| eval severity_level = case (totalAssetCount=0,5,\
    nt_hostCount=0 OR dnsCount=0 OR ipCount=0 OR categoryCount=0 OR bunitCount=0 OR pcount_undefined>0,4,\
    (pcount_low>pcount_medium) OR ((pcount_high+pcount_critical)>pcount_medium) OR pcount_critical>pcount_high,3,\
    categoryCount>10 AND bunitCount>5 AND asset_identifier_avg_count>2 AND totalAssetCount>50,1,\
    true(),2) \
| table asset_identifier_avg_count bunit bunitCount categories categoryCount dnsCount ipCount linuxDeviceCount macCount nt_hostCount pcount_critical pcount_high pcount_low pcount_medium pcount_undefined serverCount severity_level totalAssetCount windowsDeviceCount workstationCount \
| `ssef_handle_no_results(1,"The asset_lookups summary job completed successfully without identifying any issues, and everything is operating as expected.")`

