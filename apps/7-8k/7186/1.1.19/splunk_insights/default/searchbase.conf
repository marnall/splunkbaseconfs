category = Splunk
sub_category = Search
tags = Display,SCMA,Search
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 5689116601E1A3482F3AE0BFE3CDB3D8
updated_author = akhamis
related_info = <div class="diag-content-box"><div class="diag-content"><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/latest/Indexer/AboutSmartStore" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/Indexer/AboutSmartStore</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div></div>
description = <p>This profiles what is being put in the time picker for each search over the past 7 days.  This provides insight to how search is being used in this environment.</p>\
<p>The longer the search range is, typically the longer a search takes to run.  All Time searches can be very useful, but are very resource intensive.  Use this information to see if the search periodicity needs to be adjusted to create a more efficient environment.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul><li><strong>High:</strong> All Time searches over 20% of the searches run</li>\
<li><strong>Medium:</strong> All Time searches or searches over 90 days over 20% of the searches run.</li>\
<li><strong>Normal:</strong> anything under 20% of the searches run.</li></ul>\
\
<p><strong>Note:</strong> Searches that start with a leading pipe are ignored as they usually do not look at event data.  They are more commonly used for lookups and other operations that look outside of Splunks indexed data.</p>
search = `ssef_summary(ssef_scma_search_search_periodicity)` \
| fields _time search_range_in_days count perc severity_level \
| stats latest(*) AS * latest(_time) as _time by search_range_in_days \
| `ssef_severity_level_text(severity_level)` \
| sort - severity_level \
| table search_range_in_days perc count severity_text \
| rename severity_text as Severity perc as "%" search_range_in_days as "Range in Days" count as "# Searches"

