| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type role index_reference sourcetype_reference datamodel_reference \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| timechart partial=t fixedrange=t eval(round(sum(total_search_time) / 60 / 60, 0)) As "Total # of Search Hours" span=1d

[Total # of Sourcetypes]
search_name = Total # of Sourcetypes
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker,ssef_internal_index_license_usage
version = 1.1.2
date_updated = 2025-11-16 15:25:40
category = Splunk
sub_category = Sourcetypes
tags = IS4S,KPIs,Sourcetypes
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 4F220F4D1C1DA62C7EEE24DD406891E1
updated_author = akhamis
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The total sourcetype count of ingested data in Splunk based on the selected time frame.<br><br></p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>This highlights the diversity and growth of data sources. An increase in sourcetypes enhances Splunks value through richer data, broader use cases, and deeper analytics. Monitoring this count is crucial as it reflects expanding or contracting analytical capabilities, impacting overall benefits. <br><br></p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>It is recommended to track this KPI <em>monthly</em>, <em>quarterly</em>, and <em>yearly</em> to identify trends and provide strategic insights into data integration and utilization.</p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_scma_indexing_data_source_inventory)` \
| bin _time span=1d \
| eval inventory_sourcetype = lower(orig_sourcetype) \
| stats count by _time, inventory_sourcetype \
| lookup ssef_effectively_referenced_sourcetypes sourcetype_name AS inventory_sourcetype OUTPUT sourcetype_name AS searched_pattern \
| mvexpand searched_pattern \
| join type=left _time searched_pattern \
    [| search `ssef_summary_index` source IN (ssef_audit_user_login_tracker, ssef_introspection_search_telemetry) \
    | bin _time span=1d \
    | eval searched_pattern = lower(coalesce(Sourcetype, sourcetype_reference)) \
    | where isnotnull(searched_pattern) AND searched_pattern!="" \
    | makemv delim="|" searched_pattern \
    | mvexpand searched_pattern \
    | rex field=searched_pattern mode=sed "s/[^a-z0-9:*_.-]//g" \
    | stats count by _time, searched_pattern \
    | eval was_searched_today=1 \
    | fields _time, searched_pattern, was_searched_today ] \
| eventstats dc(_time) as total_days_in_window \
| eventstats dc(eval(if(was_searched_today=1, _time, null()))) as days_sourcetype_was_searched by inventory_sourcetype \
| eval search_coverage_percent = round((days_sourcetype_was_searched / total_days_in_window) * 100, 2) \
| eval usage_category = if(search_coverage_percent >= `ssef_perc_active_threshold`, "# of Regularly Accessed Sourcetypes", "# of Unused Sourcetypes") \
| timechart span=1d dc(inventory_sourcetype) by usage_category \
| eval total_sourcetypes_for_day = coalesce('# of Regularly Accessed Sourcetypes', 0) + coalesce('# of Unused Sourcetypes', 0) \
| eval "% of Regularly Accessed Sourcetypes to Total" = if(total_sourcetypes_for_day > 0, round((coalesce('# of Regularly Accessed Sourcetypes', 0) * 100) / total_sourcetypes_for_day, 2), 0) \
| rename total_sourcetypes_for_day as "Total # of Sourcetypes" \
| fields _time "Total # of Sourcetypes"

