[key_wineventlog_sources]
search_name = Key Wineventlog Sources
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 1.0.5
date_updated = 2025-11-24 13:42:12
category = ES Adoption
sub_category = Security
tags = ES Adoption,Log Sources,Summary,Windows
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 6ACB28C99663FB9106011450B08584FD
search_author = dluxton
updated_author = akhamis
related_info = <ul>\
<li><a href="https://lantern.splunk.com/Security/Product_Tips/Enterprise_Security/Configuring_Windows_event_logs_for_Enterprise_Security_use" target="_blank">Configuring Windows event logs for Enterprise Security use</a></li>\
</ul>
severity_normal_text = <br/><p>All 3 key wineventlog sources are being ingested.</p>
severity_medium_text = <br/><p>There are are than 3 of the key sources sending to Splunk, this may be indicating the combination of Xml and traditional multiline logs.</p>\
<p>Due to the differences in field names &amp; values between these two formats, false negative searches can occur. <br><br>It is recommended to switch over to the Xml version of the event log.</p>
severity_high_text = <br/><p>One or more of the key sources is not logging to Splunk</p>
description = <p>The three key WinEventLog sources for security are:</p>\
<ul>\
<li>WinEventLog:Security</li>\
<li>WinEventLog:System</li>\
<li>WinEventLog:Microsoft-Windows-PowerShell/Operational</li>\
</ul>
search = | tstats summariesonly=true dc(host) as hostCount count WHERE \
    [| `ssef_all_indexes` ] AND sourcetype=*WinEventLog* source IN (*WinEventLog:Security, *WinEventLog:System, *WinEventLog:Microsoft-Windows-PowerShell/Operational) by sourcetype source \
| eval summary_id="key_wineventlog_sources" \
| eval t_source=source \
| rex mode=sed field=t_source "s/\w+?WinEventLog/WinEventLog/g" \
| eval recomended_sources=mvappend("WinEventLog:Security","WinEventLog:System","WinEventLog:Microsoft-Windows-PowerShell/Operational") \
| eventstats values(source) as matched_sources values(t_source) as t_source \
| eval severity_level = case (mvcount(matched_sources)=3,1,mvcount(matched_sources)>3,3,mvcount(matched_sources)<3,4,true(),0) \
| appendpipe \
    [| mvexpand recomended_sources \
    | where NOT recomended_sources IN (t_source) \
    | stats values(recomended_sources) as missing_sources] \
| eventstats values(missing_sources) as missing_sources \
| rename sourcetype as sourcetype_name , source as source_name \
| table sourcetype_name source_name count hostCount matched_sources missing_sources recomended_sources severity_level \
| `ssef_handle_no_results(4,"WARNING: No key WinEventLog sources were identified.")`

