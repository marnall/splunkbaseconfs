description = <p>Provides a weekly trend of <b>search concurrency</b> derived from the Summary Total Search Concurrency KPI. Highlights sustained growth patterns and weekly peak pressure to support <b>capacity planning</b>. Designed to identify long-term scheduler workload expansion.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
explanation = <p>This search consumes the summarized scheduler concurrency KPI and rolls it into weekly buckets using the maximum observed concurrency per week. By trending weekly peaks rather than daily averages, it surfaces sustained growth patterns and repeated burst behavior that can drive long-term contention risk. This perspective is especially valuable when evaluating scaling decisions, workload governance effectiveness, and search-head tier alignment over time.</p>
