updated_author = akhamis
related_info = <ul>\
<li><p><a href="https://splunkbase.splunk.com/apps?page=1" target="_blank">Splunkbase Apps</a></p>\
<p>Explore a comprehensive collection of apps categorized by functionality, including Artificial Intelligence, Business Analytics, DevOps, and more, to extend Splunk`s capabilities.</p>\
</li>\
<li>\
<p><a href="https://community.splunk.com/t5/Splunk-Tech-Talks/Tips-for-Finding-Valuable-App-Gems-in-Splunkbase/ba-p/506349" target="_blank">Tips for Finding Valuable App Gems in Splunkbase</a></p>\
<p>This community article offers strategies for discovering valuable apps on Splunkbase, enhancing user experience and expanding use cases within the platform.</p>\
</li>\
<li>\
<p><a href="https://splunkbase.splunk.com/category/utilities/" target="_blank">Utilities Category on Splunkbase</a></p>\
<p>Browse the Utilities category on Splunkbase to find apps that extend, harness, and visualize data, improving operational efficiency and user engagement.</p>\
</li>\
<li>\
<p><a href="https://splunkbase.splunk.com/app/4342/" target="_blank">Carousel Viz App</a></p>\
<p>Discover the Carousel Viz app, which provides a new way to visualize data, enhancing dashboard interactivity and user experience.</p>\
</li>\
<li>\
<p><a href="https://splunkbase.splunk.com/app/2919" target="_blank">Analysis Of SplunkBase Apps for Splunk</a></p>\
