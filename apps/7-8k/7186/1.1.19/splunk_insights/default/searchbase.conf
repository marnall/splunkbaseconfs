updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Capacity/Searchperformancescaling" target="_blank">Splunk Documentation: Search Performance and Scaling</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Aboutmanagingsearches" target="_blank">Splunk Documentation: Managing Search Load</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Capacity/CapacityplanningforSplunkEnterprise" target="_blank">Splunk Docs: Capacity Planning</a></li>\
</ul>
severity_normal_text = <br/><p>This indicates that there are less than 25% of any type of search being run.  This indicator is used to provide color to the table to highlight the current usage.  No action is needed.</p>
severity_low_text = <br/><p>This indicates that there are between 25% and 50% of any type of search being run.  This indicator is used to provide color to the table to highlight the current usage.  Action may be required if it is determined to negatively impact the environment..</p>
severity_medium_text = <br/><p>This indicates that there are more than 50% of any type of search being run.  This indicator is used to provide color to the table to highlight the current usage.  Action may be required if it is determined to negatively impact the environment.</p>
description = <p>Checks for search density patterns across your searches over the last business week.  Search density represents the number of events that a search looks per SPL query. Low density searches run very quickly, while higher density take much longer to complete.</p>\
<p><strong>Rare</strong> = .01 % of the events of the buckets scanned are read for the search</p>\
<p><strong>Sparse</strong> = 1 % of the events of the buckets scanned are read for the search</p>\
<p><strong>Dense</strong> = 10 % of the events of the buckets scanned are read for the search</p>\
<p>Searches with a leading pipe = These are ignored as they generally do not search event data</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Greater than 50%.</li>\
<li><strong>Low:</strong> 25% - 49%.</li>\
<li><strong>Normal:</strong> Less than 25%.</li>\
</ul>
search = index=_audit action=search user=* user!=splunk-system-user search_id=* info=completed \
| eval summary_id="ssef_scma_search_search_density" \
| eval sparseness=(event_count/scan_count)*100, range=case ((sparseness<=100 AND sparseness>10),"Dense - 10%",(sparseness<=10 AND sparseness>1),"Sparse - 1%",(sparseness<=1),"Rare - .01%",true(),"N/A - Leading Pipe Searches") \
| stats count latest(_time) as _time by range \
| eventstats sum(count) as perc \
| eval perc=round(count*100/perc,2) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( perc >= 50, medium, perc >= 25, low, range="N/A - Leading Pipe Searches", normal, true(), normal ) \
| table _time range count perc severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_search_density summary job completed successfully without identifying any issues, and everything is operating as expected.")`

