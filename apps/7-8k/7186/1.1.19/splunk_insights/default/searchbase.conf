[ssef_scma_search_default_search_limits]
search_name = Default Limits
readonly = 1
target_component = Search & Visualization
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-14 10:47:25
category = Splunk
sub_category = Search
tags = REST,SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 49A936B11B4678DA9855074027808CCD
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Aboutsearchlimits" target="_blank">Splunk Docs - Search Limits</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Limitsconf" target="_blank">Splunk Docs - Configure Limits.conf</a></li>\
<li><a href="https://community.splunk.com/t5/Getting-Data-In/Troubleshooting-Search-Performance-Issues-in-Splunk/m-p/467982" target="_blank">Splunk Answers - Troubleshooting Search Performance Issues</a></li>\
</ul>
severity_normal_text = <br/><p>It appears as if no modifications have been made to the default search limits. If no modifications have been made to the default search limits in Splunk, it means that the Splunk environment is operating within the default constraints set by the platform. These default search limits are predefined by Splunk and are intended to provide a balance between performance and resource utilization in typical deployment scenarios.</p>
severity_medium_text = <br/><p>One or more modifications have been identified to the default search limits. Please make sure that these settings are as intended.</p>
description = <p>Modifying default search limits in Splunk requires careful consideration of performance, resource utilization, user experience, scalability, administrative overhead, risk management, and compatibility with other system components. It's essential to strike a balance that meets the needs of users while maintaining the stability and efficiency of the Splunk environment.</p>\
<p>This search determines if any of the default search limits for max_searches_per_cpu or base_max_searches have been modified. These settings allow the search head to issue increased number of concurrent searches, at a possible expense of the indexing tier, and need to be carefully reviewed.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> If modified.</li>\
<li><strong>Normal:</strong> If not modified..</li></ul>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/configs/conf-limits  \
| eval summary_id="ssef_scma_search_default_search_limits" \
| `ssef_instance_info(splunk_server)` \
| stats max(base_max_searches) max(max_searches_per_cpu) latest(name) as name max(enable_memory_tracker) as enable_memory_tracker max(search_process_memory_usage_percentage_threshold) as search_process_memory_usage_percentage_threshold max(search_process_memory_usage_threshold) as search_process_memory_usage_threshold by label \
| rename max(*) AS * \
| eval default_base_max_searches=6, default_max_searches_per_cpu=1 \
| eval message=if(base_max_searches>default_base_max_searches OR max_searches_per_cpu>default_max_searches_per_cpu,"ISSUE: Defaults modified, needs review","OK") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( ! match(message, "^OK"), medium, true(), normal ) \
| table label name base_max_searches default_base_max_searches default_max_searches_per_cpu max_searches_per_cpu message enable_memory_tracker search_process_memory_usage_percentage_threshold search_process_memory_usage_threshold severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_default_search_limits summary job completed successfully without identifying any issues, and everything is operating as expected.")`

