[ssef_scma_apps_local_user_content]
search_name = Private Knowledge Objects Inventory
readonly = 1
target_component = Inventory
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 17:39:18
category = Splunk
sub_category = Apps
tags = Apps,REST,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = B16E66BFBB7F29BFFCB98C3D79930709
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/Manage/" target="_blank">Splunk Docs - Manage Knowledge Object Permissions</a></li>\
</ul>
severity_normal_text = <br/><p>This search has returned an 'informational' status. There is nothing to worry about here unless you were expecting a different severity. If that is the case reach out to your Splunk Account team. More information may be added here to support this search result.</p>
severity_low_text = <br/><p>Please review the identified knowledge objects to make sure they are vetted and appropriate for the Splunk Cloud environment.</p>
severity_medium_text = <br/><p>Private user content was identified within the environment. Please review the identified knowledge objects to make sure they are vetted and appropriate for the Splunk Cloud environment.</p>
description = <p>This search identifies private knowledge objects within your environment that may require migration, focusing on transforms, props, saved searches, tags, event types, lookups, and dashboards. While creating private Splunk content is encouraged, it is essential to review these customizations to ensure they meet the standards necessary for the Splunk Cloud environment. This process helps maintain compliance and functionality by verifying that all private content is properly vetted and suitable for cloud deployment.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Private knowledge objects are 10 or more.</li>\
<li><strong>Low:</strong> Private knowledge objects are between 5 and 10.</li>\
<li><strong>Normal:</strong> Private knowledge objects are below 5.</li>\
</ul>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/directory search="eai:acl.sharing=user" \
| eval summary_id="ssef_scma_apps_local_user_content" \
| rename eai:acl.* AS * eai:type AS config \
| stats dc(owner) AS dc_users dc(splunk_server) AS dc_splunk_server dc(title) AS object_count by app, sharing, config \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/data/lookup-table-files search="eai:acl.sharing=user" \
    | rename eai:acl.* AS * \
    | eval config="lookup-file" \
    | stats dc(eai:userName) AS dc_users dc(splunk_server) AS dc_splunk_server dc(title) AS object_count by app, sharing, config] \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( object_count >= 10, medium, object_count >= 5, low, true(), normal ) \
| table app config dc_splunk_server dc_users object_count severity_level sharing  \
| `ssef_handle_no_results(1,"The ssef_scma_apps_local_user_content summary job completed successfully without identifying any issues, and everything is operating as expected.")`

