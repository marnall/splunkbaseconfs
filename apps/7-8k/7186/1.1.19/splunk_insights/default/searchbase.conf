[ssef_scma_top_50_dashboards]
search_name = Expensive Dashboards
readonly = 1
target_component = Search & Visualization
version = 1.0.4
date_created = 2022-09-14
date_updated = 2024-9-11 21:57:19
category = Splunk
sub_category = Dashboards
tags = Dashboards,SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = @d
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = A09FD069726533D65DB8F27C47B31CC0
updated_author = akhamis
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/OptimizeSplunkforpeakperformance" target="_blank">Optimize Splunk for Peak Performance</a></li>\
<li><a href="https://www.google.com/search?q=splunk+optimizing+dashboards" target="_blank">Optimizing Splunk Dashboards</a></li>\
<li><a href="https://community.splunk.com/t5/Splunk-Tech-Talks/Improving-Dashboard-Performance-and-Resource-Usage/ba-p/619008" target="_blank">Improving Dashboard Performance and Resource Usage</a></li>\
</ul>
severity_normal_text = <br/><p>This search is informational in nature and there are no limits set to define severities. Please use this information to determine if any of the top utilized dashboards need tuning.</p>
severity_low_text = <br/><p>Dashboards with CPU utilization between 10% and 19% have been detected. While not as critical as higher utilization levels, there is still room for optimization to enhance system performance and reduce resource usage. Consider reviewing the search efficiency and design of these dashboards to identify potential improvements.</p>
severity_medium_text = <br/><p>Dashboards with CPU utilization consistently exceeding 20% have been identified. This level of resource usage suggests these dashboards may be significantly impacting system performance. It is strongly recommended to review these dashboards for optimization opportunities, such as simplifying searches, reducing search concurrency, or leveraging report acceleration to improve performance and resource efficiency.</p>
description = <p>This check gathers data on the top 50 CPU and memory-intensive dashboards visited. It analyzes resource usage to identify which dashboards are consuming significant amounts of CPU and memory. By pinpointing these resource-heavy dashboards, organizations can investigate the reasons behind high consumption, optimize dashboard performance, and ensure efficient resource allocation. This proactive monitoring helps maintain system responsiveness and enhances overall user experience by minimizing potential slowdowns caused by overloaded dashboards.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> More than 20% CPU.</li>\
<li><strong>Low:</strong> Between 10% and 19% CPU.</li>\
<li><strong>Normal:</strong> Below 10% CPU.</li>\
</ul>
search = | tstats summariesonly=true allow_old_summaries=false fillnull_value=0 max(data.search_props.scan_count) AS scan_count max(data.read_mb) AS read_mb max(data.written_mb) AS written_mb max(data.normalized_pct_cpu) AS normalized_pct_cpu max(data.mem_used) AS mem_used max(data.elapsed) AS elapsed \
    WHERE index=_introspection sourcetype=splunk_resource_usage component::PerProcess data.process_type::search data.search_props.type=ad-hoc data.search_props.provenance=UI:Dashboard:* \
    by _time span=10s host data.search_props.app data.search_props.user data.search_props.provenance data.search_props.sid \
| rename data.search_props.* AS * \
| eval summary_id="ssef_scma_top_50_dashboards" \
| eval normalized_pct_cpu=if(normalized_pct_cpu=0.00, 0, normalized_pct_cpu) \
| eval provenance = replace(provenance, "UI:[Dd]ashboard:","") \
| `ssef_instance_info(host)` \
| eval Splunk_Role = CASE (role="indexer", "indexer", TRUE(), "search_head") ```Determines whether the Dashboard ran on an indexer or a search head, which helps in understanding the impact on both tiers.```\
| stats dc(sid) AS search_count, dc(user) as user_count, values(user) as user, avg(elapsed) AS elapsed, avg(scan_count) AS scan_count, avg(mem_used) AS mem_used, avg(normalized_pct_cpu) AS normalized_pct_cpu, avg(written_mb) AS disk_write_mb, avg(read_mb) AS disk_read_mb latest(_time) as _time latest(name) as name values(role) as role\
    by label Splunk_Role app provenance ```Aggregates key metrics like run count, average elapsed time, memory, CPU usage, etc., by Dashboard and role (whether indexer or search head). and Groups the data by key fields like label, Splunk_Role, app, and provenance to get an overview of each Dashboard's performance across both tiers.```\
| eventstats max(elapsed) AS max_elapsed max(scan_count) AS max_scan_count max(mem_used) AS max_mem_used max(normalized_pct_cpu) AS max_normalized_pct_cpu max(disk_read_mb) AS max_disk_read_mb max(disk_write_mb) AS max_disk_write_mb  ```Calculates the maximum values for key metrics like CPU, memory, and disk usage across all Dashboards to be used for normalization later.```\
| foreach elapsed mem_used normalized_pct_cpu disk_read_mb disk_write_mb scan_count max_*\
    [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="" OR <<FIELD>>=0, 1, <<FIELD>>) ] \
| eval weighted_expense_factor = ( ```This formula weights the importance of different metrics to calculate an overall "expense" score for each Dashboard, prioritizing CPU and memory usage.```\
    (normalized_pct_cpu / max_normalized_pct_cpu) * 0.25 + \
    (mem_used / max_mem_used) * 0.25 +\
    (scan_count / max_scan_count) * 0.2 + \
    (elapsed / max_elapsed) * 0.2 + \
    (disk_read_mb / max_disk_read_mb) * 0.05 + \
    (disk_write_mb / max_disk_write_mb) * 0.05 ) \
| eval overall_expense_factor = weighted_expense_factor * search_count * user_count * 0.25  ```Multiplies the weighted expense by the number of times the Dashboard ran, with a 0.25 factor to reduce the dominance of highly frequent Dashboards that are low-impact individually.```\
| sort - overall_expense_factor ```Sorts the Dashboards by their expense factor, showing the most resource-intensive ones first.```\
| eventstats count AS total_Dashboards \
| eval top_20_percent_limit = round(total_Dashboards * 0.20)  ```Determines the number of Dashboards that make up the top 20% of the most expensive Dashboards based on their expense factor.```\
| streamstats count AS row_number \
```| where row_number <= top_20_percent_limit``` ``` AND overall_expense_factor > 1```  ``` Filters the Dashboards to include only those in the top 20% of overall expense and where the overall expense factor is greater than 1.``` \
| foreach elapsed mem_used normalized_pct_cpu disk_read_mb disk_write_mb scan_count\
    [ eval <<FIELD>>=ceiling(<<FIELD>>) ] \
| eval role=mvjoin(role,",") , user=mvjoin(user,",") \
| eval critical=5, high=4, medium=3, low=2, normal=1, severity_level = case (overall_expense_factor >= 20, high, overall_expense_factor >= 15, medium, overall_expense_factor >= 10, low, true(), normal) ```Assigns a severity level based on the overall expense factor.``` \
| table _time label Splunk_Role name app user provenance weighted_expense_factor overall_expense_factor user_count search_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb severity_level role \
| `ssef_handle_no_results(1,"The ssef_scma_top_50_dashboards summary job completed successfully without identifying any issues, and everything is operating as expected.")`

