quid = 76FB9B8138DBED66A53CB7867863F6E1
updated_author = akhamis
related_info = <p><a href="https://dev.splunk.com/enterprise/docs/developapps/createapps/appanatomy/" target="_blank">Anatomy of a Splunk app in Splunk Cloud Platform or Splunk Enterprise</a></p>
severity_normal_text = <br/><p>No issues were found. All customizations to the configuration files within Splunk apps are appropriate and fully compliant with Splunk Cloud requirements. Everything looks good.</p>
severity_medium_text = <br/><p>We identified some issues with the customizations to the configuration files within Splunk apps. We recommend reviewing and resolving these to ensure they are properly vetted and suitable for the Splunk Cloud environment.</p>
description = <p>This check performs review of local overwrites and customization to configuration files within Splunk apps. While it is perfectly acceptable and encouraged to customize Splunk apps, the customization requires a review to ensure they can be properly vetted and are appropriate for the Splunk Cloud environment.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> > 0</li>\
<li><strong>Normal:</strong> None found.</li>\
</ul>
search = | ssefbtool conf="alert_actions,distsearch,commands,datamodels,distsearch,savedsearches,eventtypes,fields,indexes,inputs,limits,macros,props,server,transforms,web,tags" \
| eval summary_id="ssef_scma_apps_local_settings" \
| rename sos_server AS splunk_server \
| where NOT (conf="props" AND app="learned") \
| stats dc(stanza) AS dc_local_stanza by app, splunk_server, conf \
| `ssef_instance_info(splunk_server)` \
| stats dc(splunk_server) AS dc_splunk_server sum(dc_local_stanza) AS dc_local_stanza values(role) AS role by conf, app \
| eval role=mvjoin(mvdedup(role), ":") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( dc_local_stanza > 0, medium, true(), normal ) \
| table app conf dc_local_stanza dc_splunk_server role severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_apps_local_settings summary job completed successfully without identifying any issues, and everything is operating as expected.")`

