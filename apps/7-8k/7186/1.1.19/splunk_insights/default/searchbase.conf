[ssef_environment_secure_protocol_deprecation]
search_name = Secure Protocol Depreciation
readonly = 1
ssef_cron = weekly
target_component = Infra & Arch
version = 1.0.2
date_created = Nov 25, 2024
date_updated = 2024-12-10 21:34:6
category = Splunk
sub_category = Environment
tags = Environment,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = 3ED346EA0E56E82D3D6BE346443AF6C9
updated_author = akhamis
related_info = <p><a href="https://docs.splunk.com/Documentation/Splunk/latest/Security/SetyourSSLversion" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/Security/SetyourSSLversion</a></p>
severity_info_text = <br/><p>This search has returned an 'informational' status. There is nothing to worry about here unless you were expecting a different severity. If that is the case reach out to your Splunk Account team. More information may be added here to support this search result.</p>
severity_critical_text = <br/><p>A deprecated encryption protocol is in use.  Please check the results for instance and configuration information.</p>
description = <p>This check assesses the Splunk environment for use of deprecated encryption protocols.  The deprecated settings can be found in various conf files under the sslVersions and sslVersionsForClient attributes.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/configs/conf-web \
| eval summary_id="ssef_environment_secure_protocol_deprecation" \
| where isnotnull(sslVersionsForClient) OR isnotnull(sslVersions) \
| fields id title splunk_server sslVersionsForClient sslVersions \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/configs/conf-alert_actions \
    | where isnotnull(sslVersionsForClient) OR isnotnull(sslVersions) \
    | fields id title splunk_server sslVersionsForClient sslVersions] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/configs/conf-authentication \
    | where isnotnull(sslVersionsForClient) OR isnotnull(sslVersions) \
    | fields id title splunk_server sslVersionsForClient sslVersions] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/configs/conf-deploymentclient \
    | where isnotnull(sslVersionsForClient) OR isnotnull(sslVersions) \
    | fields id title splunk_server sslVersionsForClient sslVersions] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/configs/conf-indexes \
    | where isnotnull(sslVersionsForClient) OR isnotnull(sslVersions) \
    | fields id title splunk_server sslVersionsForClient sslVersions] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/configs/conf-inputs \
    | where isnotnull(sslVersionsForClient) OR isnotnull(sslVersions) \
    | fields id title splunk_server sslVersionsForClient sslVersions] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/configs/conf-outputs \
    | where isnotnull(sslVersionsForClient) OR isnotnull(sslVersions) \
    | fields id title splunk_server sslVersionsForClient sslVersions] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/configs/conf-server \
    | where isnotnull(sslVersionsForClient) OR isnotnull(sslVersions) \
    | fields id title splunk_server sslVersionsForClient sslVersions] \
| rex field=id "^.*?configs/conf-(?<conf_file>[^/]+)" \
| rename title AS conf_stanza \
| `ssef_instance_info(splunk_server)` \
| stats dc(splunk_server) AS dc_instance, values(sslVersionsForClient) AS sslVersionsForClient, values(sslVersions) AS sslVersions latest(name) as name by label conf_file conf_stanza \
| eval severity_level=if(sslVersionsForClient!="tls1.2" OR sslVersions!="tls1.2", 5, 1) , _time=now() \
| table _time label name conf_file conf_stanza dc_instance sslVersionsForClient sslVersions severity_level \
| `ssef_handle_no_results(1,"The ssef_environment_secure_protocol_deprecation summary job completed successfully without identifying any issues, and everything is operating as expected.")`

