explanation = <p>This search evaluates the IA4S application inventory to determine which apps have not been recently used and correlates them with user counts, archival status, and support metadata. Governance teams can use this to identify stale or abandoned applications that increase operational complexity and risk. By enriching with Splunkbase and local lookup data, the search provides context on support status, version alignment, and visibility configuration. This enables platform owners to rationalize application sprawl, reduce unnecessary maintenance overhead, and improve overall platform hygiene.</p>
