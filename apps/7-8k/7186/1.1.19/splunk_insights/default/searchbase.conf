[summary_average_ingest]
search_name = Average Daily Ingest (EFS)
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 2.x
date_created = 2025-08-06
date_updated = 2025-8-1 12:45:32
category = Splunk
sub_category = _internal
tags = EFS,Indexing,Ingestion,License Usage,Summary
solution = <p>This search helps assess the overall value your organization extracts from Splunk. Higher ingest volumes generally mean more observability, more correlations, and better outcomes from searches, alerts, and dashboards.</p><p><b>Suggested Actions</b><br><b>1.</b> Compare with license tier to ensure alignment<br><b>2.</b> Use in KPIs to reflect Splunk adoption maturity<br><b>3.</b> Investigate drops in ingest as potential failures<br><b>4.</b> Share ingest volumes with business teams to illustrate coverage<br><b>5.</b> Correlate with alert density to measure insight generation</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (daily_average_ingestion > 100, 1, daily_average_ingestion > 75, 2, daily_average_ingestion > 50, 3, daily_average_ingestion > 25, 4, daily_average_ingestion <= 25, 5)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> High ingest (>100 GB/day) — maximum Splunk value</li><li><b>Low (Severity 2):</b> Near-optimal ingest — continue onboarding</li><li><b>Medium (Severity 3):</b> Moderate ingest — stable but review for hidden gaps</li><li><b>High (Severity 4):</b> Lower-than-expected — investigate value leakage</li><li><b>Critical (Severity 5):</b> Critically low ingest — Splunk may be underutilized</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal source="*license_usage.log*" TERM(type=RolloverSummary) pool="*"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Pulls license summary data to analyze ingestion trends<br><b>02</b> <code>| timechart partial=t fixedrange=t span=1d sum(b) AS "volume"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates daily total bytes indexed<br><b>03</b> <code>| stats avg(volume) as daily_average_ingestion</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Computes 30-day average ingest volume<br><b>04</b> <code>| eval daily_average_ingestion=round(daily_average_ingestion/1024/1024/1024, 4)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Converts from bytes to GB<br><b>05</b> <code>| eval severity_level = case (...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assigns insight-focused severity logic<br><b>06</b> <code>| table daily_average_ingestion severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Formats output<br>
explanation = <p>This search leverages <b>license_usage.log</b> to calculate the rolling average of data ingested into Splunk. It aligns ingestion with value delivery — high ingest volumes indicate extensive data visibility, making Splunk more valuable.</p><p>For junior engineers, this SPL shows how to use <b>internal logs</b> and <b>eval with case()</b> for threshold-based logic. The conversion from bytes to GB emphasizes performance awareness and accuracy.</p><p>It's also a teaching model for <b>metrics-based alerting</b>, helping assess platform ROI, data onboarding health, and overall architecture effectiveness.</p>
quid = 1ACC2B8CF6FCC83799690A295A96C64A
search_author = Splunk Searchbase Assistant
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/Admin/Aboutlicenseusage" target="_blank">About license usage</a><br>Details Splunk’s license model and tracking.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/Troubleshooting/Investigatelicenseusage" target="_blank">Investigate license usage</a><br>Shows how to analyze data volume trends using internal logs.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Eval" target="_blank">eval command</a><br>Used for GB conversion and severity scoring.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Case" target="_blank">case() function</a><br>Implements conditional logic to rank ingest performance.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Timechart" target="_blank">timechart command</a><br>Used for temporal aggregation of ingestion by day.</li></ul>
severity_normal_text = <p>You're ingesting large volumes of data — excellent! This level of ingestion typically yields richer insights and high operational value.</p>
severity_low_text = <p>Healthy ingest rate. You are extracting good value, but there’s still room to grow toward optimal usage.</p>
severity_medium_text = <p>Moderate usage detected — review data sources to determine if important logs are missing.</p>
severity_high_text = <p>Lower-than-expected data ingest. This may signal underuse of Splunk’s capabilities.</p>
severity_critical_text = <p>Critically low ingest volume — your Splunk instance may not be delivering full value. Evaluate onboarding pipeline.</p>
description = <p>Calculates average license usage for the business week in gigabytes. Weekends are explicitly excluded as they skew KPI calculations for normal busines hours. A lower trending license usage can be problematic for adopting Splunk, while a higer trending KPI generally means better use of Splunk.</p>
search = index=_internal source="*license_usage.log*" TERM(type=RolloverSummary) pool="*" \
| eval summary_id="summary_average_ingest" \
| timechart partial=t fixedrange=t span=1d sum(b) AS "volume" \
| stats avg(volume) as daily_average_ingestion \
| eval daily_average_ingestion=round(daily_average_ingestion/1024/1024/1024, 4) \
| eval severity_level = case ( \
    daily_average_ingestion > 100, 1, \
    daily_average_ingestion > 75, 2, \
    daily_average_ingestion > 50, 3, \
    daily_average_ingestion > 25, 4, \
    daily_average_ingestion <= 25, 5) \
| table daily_average_ingestion severity_level\
| `ssef_handle_no_results(1,"The summary_average_ingest summary job completed successfully without identifying any issues, and everything is operating as expected.")`

