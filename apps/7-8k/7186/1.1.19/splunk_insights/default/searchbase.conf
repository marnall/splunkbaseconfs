<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>It's crucial to align this data with organizational goals to gauge Splunks value accurately. Noting fluctuations helps identify potential issues with critical data not being captured or indexed.   <br><br>The volume and variety of data ingested reflect the platform's comprehensive insights, support for diverse use cases, and contribution to operational excellence. <br><br></p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>As a key performance indicator, it is advisable to monitor this <em>monthly</em>, <em>quarterly</em>, and <em>yearly</em>.</p>
search = | `ssef_license_data` \
| eval summary_id="Average_Daily_Ingest_Export" \
| timechart partial=t fixedrange=t eval(round(sum(License_Usage_GB),0)) AS kpi_value span=1d  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "Average Daily Ingest" , export_time = now() \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) \
| rename _time as timechart_time \
| table timechart_time export_time customer_name kpi_name kpi_value severity_level \
| `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

