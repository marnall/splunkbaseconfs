    [| rest splunk_server=* `ssef_rest_timeout` /services/data/indexes datatype=metric \
    | join type=outer splunk_server title \
        [| rest splunk_server=* `ssef_rest_timeout` /services/data/indexes-extended datatype=metric]] \
| rename eai:acl.* AS * \
| rename eai:* AS * \
| eval Splunk_Instance = lower(splunk_server) \
