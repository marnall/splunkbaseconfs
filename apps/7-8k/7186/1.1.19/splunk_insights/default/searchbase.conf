description = <p>This search compiles an inventory of applications within the Splunk environment, categorizing them as Splunk Supported, Developer Supported, and Not Supported. It excludes system and security apps to focus on user-installed ones, offering a clear overview of the application landscape. This categorization helps manage risks and compliance by highlighting the support status of each app, aiding in efficient system management and security decisions.</p>
search = `ssef_summary(ssef_apps_local)` core=0 current_version=* \
| fields _time, label, role, Splunk_Instance, app_name, app_label, core, author, current_version, latest_version, build, check_for_updates, visible, sharing, disabled, configured, show_in_nav, state_change_requires_restart, description, details, updated, acl_perms_read, acl_perms_write, setup_view, attribution_link, update_appurl, update_homepage, docs_section_override, managed_by_deployment_client \
| `ssef_app_info(app_name)` \
| search NOT app_type IN ("Splunk IT Service Intelligence Apps" , "Splunk Enterprise Security Apps", "Splunk Base Config Apps (Core)") \
| `ssef_splunkbase_apps(app_name)` \
| eval supported = case ( (isnull(support) OR support="") AND match(app_type,"^Splunkbase|^Custom") OR support="not_supported", "Not Supported", (isnull(support) OR support="") AND ( match(app_type,"^Splunk") OR match(app_name, "^Splunk_TA_") OR app_type in("Splunk IT Service Intelligence Apps" , "Splunk Enterprise Security Apps") ), "Splunk Supported", support="splunk", "Splunk Supported", support="cisco", "Cisco Supported", support="developer", "Developer Supported", true(), support ) \
| stats count as num_apps by supported \
| eventstats sum(num_apps) as total \
| eval perc_app_support = round(num_apps / total * 100, 0)

[7 Day Average Ingest Full From _telemetry]
search_name = 7 Day Average Ingest Full From _telemetry
readonly = 1
version = 3.0.1
date_created = 2025-06-02
date_updated = 2025-10-19 16:10:51
category = Splunk
sub_category = Licensing
tags = Ingestion,KPIs,Licensing
solution = <p>Helps identify ingestion trends and compare them to license entitlements to avoid overages.</p><p><b>Suggested Actions</b><br><b>1.</b> Set alerts if average weekday or weekend usage exceeds license.<br><b>2.</b> Forecast ingest trends based on seasonal usage.<br><b>3.</b> Optimize source ingestion if nearing license ceiling.<br><b>4.</b> Notify stack owners with consistent spikes.<br><b>5.</b> Use for monthly license review meetings.</p><p><b>Recommended Alerts</b></p><p><b>Normal</b> - Overall average < 90% of license<br><b>Low</b> - Weekday average > 90% but < 100%<br><b>Medium</b> - Overall average = 100% of license<br><b>High</b> - Any day exceeds licensed GB limit<br><b>Critical</b> - Weekday and weekend averages both exceed license by >10%</p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_cloud_summary` source=*/license_usage_summary.log type=RolloverSummary</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Pulls daily license usage summaries.<br><b>02</b> <code>eval date_wday=lower(strftime(_time,"%A"))</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extracts and normalizes weekday name.<br><b>03</b> <code>eval daytype=if(date_wday = "sunday" OR date_wday = "saturday","weekend","weekday")</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Labels each event as 'weekday' or 'weekend'.<br><b>04</b> <code>eval GB=b/1024/1024/1024</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Converts ingest from bytes to GB.<br><b>05</b> <code>bucket _time span=1d</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aligns events into daily buckets.<br><b>06</b> <code>stats sum(GB) as GB by _time daytype</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Sums daily GB grouped by type.<br><b>07</b> <code>stats avg(...) max(...) min(...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Computes daily usage stats and type-based averages.<br><b>08</b> <code>lookup licensed_ingestion</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Adds license size/type from external reference.<br><b>09</b> <code>eval if license exceeded...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Annotates overage if average exceeds entitlement.<br><b>10</b> <code>transpose | rename</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Rotates rows/columns for presentation formatting.<br>
explanation = <p>This search analyzes daily license usage and computes <b>average GB ingestion</b> by day type (weekday vs. weekend). It highlights daily peaks, lows, and detects whether average usage exceeds the entitled license tier.</p><p>By combining <b>eval</b> for classification, <b>stats</b> for rollups, and <b>lookup</b> for license thresholds, it turns ingestion logs into actionable metrics. The <b>transpose</b> stage pivots the data for dashboard-friendly presentation.</p><p>This query is critical for license management, visibility, and compliance. Admins can quickly flag consistent overages or usage anomalies before license enforcement issues arise.</p>
quid = F5B477D93DD72FC7429C92D6AFF05C7B
search_author = akhamis
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Transpose" target="_blank">transpose command</a><br>Converts row/column layout for result display.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Eval" target="_blank">eval command</a><br>Creates and transforms fields for enrichment.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Stats" target="_blank">stats command</a><br>Performs aggregations and conditional math.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Lookup" target="_blank">lookup command</a><br>Joins external license limits to enrich data.</li><li><a href="https://lantern.splunk.com" target="_blank">Splunk Lantern</a><br>Operational guidance for search best practices.</li></ul>
description = <b>Summarizes Splunk ingest volume</b> with weekday/weekend averages and license overage status.
search = index=_telemetry source=*license_usage_summary.log type=RolloverSummary \
| eval date_wday=lower(strftime(_time,"%A")) \
| eval date_w=strftime(_time,"%d-%b-%y %a") \
| eval daytype=if(date_wday = "sunday" OR date_wday = "saturday","weekend","weekday") \
| eval GB=b/1024/1024/1024 \
| bucket _time span=1d \
| stats sum(GB) as GB by _time daytype \
| stats avg(eval(if(daytype="weekend",GB, null()))) as Weekend avg(eval(if(daytype="weekday",GB, null()))) as Weekday max(GB) as "Max Daily" min(GB) as "Min Daily" avg(GB) as "OverallAverage" \
| eval "Overall Average"=if(license_type="GB" AND OverallAverage > SizeGB ,tostring(round(OverallAverage,0),"commas")." (over ".SizeGB."GB license)",OverallAverage) \
| fields - OverallAverage SizeGB license_type stack \
| transpose \
| eval "row 1"=round('row 1', 2) \
| rename column as Days "row 1" as "Volume (GB)"

