description = <p>Provides a daily trend of <b>percentage of skipped scheduled searches</b> by instance label. Highlights sustained <b>scheduler contention</b> and governance gaps impacting reliability. Designed to support <b>capacity and workload planning</b>.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>\
<p><strong>Severity Levels:</strong></p>\
<ul><li><strong>High:</strong> Percent skipped is over 50%</li>\
<li><strong>Medium:</strong> Percent skipped is between 25% and 49%.</li>\
<li><strong>Low:</strong> Percent skipped is less than 25%.</li>\
<li><strong>Normal:</strong> 0% skipped.</li></ul>
explanation = <p>This Details search consumes the summarized skipped-search KPI and trends the average daily percentage of skipped searches by instance label. By focusing on pct_skipped rather than raw counts, it normalizes skip behavior against total search volume, allowing fair comparison across tiers and app contexts. Sustained increases in skip percentage typically indicate concurrency saturation, cron density conflicts, or workload governance misalignment. Use this trend to identify structural scheduler pressure and prioritize remediation actions before reliability degrades.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_scma_search_skipped_searches)`</code><br> - Retrieve summarized skipped-search KPI data from the Insights collection.<br><b>02</b> <code>| fields ...</code><br> - Select percent skipped and supporting context fields.<br><b>03</b> <code>| timechart span=1d avg(pct_skipped) by label</code><br> - Trend daily average skipped-search percentage by instance label.
solution = <p>This trend highlights sustained skipped-search behavior, an early indicator of scheduler overload and workload imbalance.</p><p><b>Suggested Actions</b>: Review high-frequency saved searches, optimize inefficient SPL, stagger cron schedules, reduce unnecessary execution frequency, and validate workload management settings. If pct_skipped persists across labels, evaluate overall search-head capacity alignment.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(pct_skipped&gt;10,5,pct_skipped&gt;5,4,pct_skipped&gt;2,3,pct_skipped&gt;0,2,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Scaling and managed workload governance options when sustained scheduler contention impacts reliability.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utility Apps</a><br>Administrative and troubleshooting utilities that support scheduler diagnostics and workload governance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=skipped%20scheduled%20searches" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps focused on scheduler health monitoring and workload optimization.</li></ul></p>
