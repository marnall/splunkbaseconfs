solution = <p>This search provides a structured view of <b>unused or inactive applications</b> to support lifecycle rationalization.</p><p><b>Suggested Actions</b></p><ul><li>Review unused applications for decommissioning or archival to reduce maintenance overhead.</li><li>Validate that inactive apps are not required for compliance or audit retention.</li><li>Ensure version alignment and support status for apps still visible but rarely used.</li><li>Establish periodic review cycles to prevent application sprawl.</li></ul><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Manage application scale efficiently with centralized governance controls.</li><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Align service health with application lifecycle posture.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Advisory services to optimize platform hygiene and lifecycle governance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=application%20inventory%20unused%20governance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps that enhance inventory visibility and lifecycle optimization.</li></ul></p>
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=lookup%20command" target="_blank">Splunk Docs: lookup Command Search</a><br>Reference for enriching events using lookup tables (provisionally validated).</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=stats%20latest" target="_blank">Splunk Docs: stats latest Search</a><br>Guidance for retrieving the most recent values in grouped results (provisionally validated).</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=fillnull" target="_blank">Splunk Docs: fillnull Search</a><br>Documentation for handling missing values in lifecycle reporting (provisionally validated).</li><li><a href="https://lantern.splunk.com/Search?q=application%20governance" target="_blank">Lantern: Application Governance Search</a><br>Operational guidance for managing application lifecycle and platform hygiene (provisionally validated).</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Category</a><br>Apps supporting administrative and lifecycle optimization use cases.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q="unused%20applications"" target="_blank">Community: Unused Applications Discussions</a><br>Community insights on identifying and cleaning up inactive apps (provisionally validated).</li></ul>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_ia4s_apps_inventory_unused)` \
