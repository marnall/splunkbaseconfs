| stats latest(severity_level) as severity_level by _time label app conf sharing object \
| `ssef_no_data_filter` \
| `ssef_severity_level_text(severity_level)` \
| sort - severity_level | rename severity_text as Severity \
| convert ctime(_time) \
| table _time label app conf sharing object Severity

[ssef_scma_search_count_by_type]
search_name = Search Count by Type
readonly = 1
target_component = Search & Visualization
version = 1.0.2
