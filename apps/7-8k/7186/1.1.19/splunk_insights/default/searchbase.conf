[summary_total_search_concurrency]
search_name = Total Search Concurrency
readonly = 1
ssef_cron = weekly
target_component = Search & Visualization
version = 2.0
date_updated = 2025-8-8 20:5:44
category = Splunk
sub_category = _internal
tags = EFS,Performance,Scheduler,_internal
solution = <p>Tracks search concurrency to prevent scheduler overload and performance degradation.</p><p><b>Suggested Actions</b><br><b>1.</b> Reschedule heavy searches to reduce peak concurrency.<br><b>2.</b> Use summary indexes or accelerated data models.<br><b>3.</b> Reduce SPL complexity in high-demand searches.<br><b>4.</b> Scale search head capacity if concurrency remains high.<br><b>5.</b> Enable scheduler load balancing.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (search_concurrency<=5,1, search_concurrency<=10,2, search_concurrency<=20,3, search_concurrency<=40,4, search_concurrency>40,5)</code></pre><p>This SPL should be applied before the final <code>| table</code>. Higher concurrency levels will raise severity scores.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> ≤5 concurrent searches.</li><li><b>Low (Severity 2):</b> 6–10 concurrent searches.</li><li><b>Medium (Severity 3):</b> 11–20 concurrent searches.</li><li><b>High (Severity 4):</b> 21–40 concurrent searches.</li><li><b>Critical (Severity 5):</b> >40 concurrent searches.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="scheduler" status="completed" OR status="success" OR status="continued"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Get scheduler logs for finished and active searches.<br><b>02</b> <code>| timechart partial=t fixedrange=t span=1m@m dc(sid) AS distinct_search_count</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count unique searches per minute.<br><b>03</b> <code>| stats avg(distinct_search_count) as search_concurrency</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate average concurrency.<br><b>04</b> <code>| eval search_concurrency=round(search_concurrency,2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Round to 2 decimals.<br><b>05</b> <code>| eval severity_level = case (search_concurrency<=5,1, search_concurrency<=10,2, search_concurrency<=20,3, search_concurrency<=40,4, search_concurrency>40,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign higher severity to higher concurrency.<br><b>06</b> <code>| table search_concurrency severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Display results.<br>
explanation = <p>This search processes the <b>_internal</b> scheduler logs for <b>completed</b>, <b>success</b>, or <b>continued</b> searches, measures the number of distinct searches running concurrently each minute, and then averages these counts. Elevated concurrency can lead to <b>scheduler bottlenecks</b>, <b>increased skipped searches</b>, and <b>search head performance degradation</b>. Tracking this KPI helps administrators proactively adjust scheduling, optimize SPL, or scale infrastructure to avoid overload.</p><p>For junior Splunkers, this search illustrates turning log activity into a capacity metric and applying severity thresholds aligned with operational risk.</p>
quid = C6A98FB6FE067E58F7B1453685BB7E3B
updated_author = khutchinson
severity_normal_text = <p>Search concurrency is well within safe operating limits.</p>
severity_low_text = <p>Low concurrency; minimal performance risk.</p>
severity_medium_text = <p>Moderate concurrency; monitor for scheduler delays.</p>
severity_high_text = <p>High concurrency; possible performance impact on search heads.</p>
severity_critical_text = <p>Very high concurrency; immediate action needed to prevent system overload.</p>
search = index=_internal sourcetype=scheduler status="completed" OR status="success" OR status="continued" \
| timechart partial=t fixedrange=t span=1m@m dc(sid) AS distinct_search_count \
| stats avg(distinct_search_count) as search_concurrency \
| eval search_concurrency=round(search_concurrency,2) \
| eval severity_level = case (search_concurrency<=5,1, search_concurrency<=10,2, search_concurrency<=20,3, search_concurrency<=40,4, search_concurrency>40,5)\
| table search_concurrency severity_level\
| `ssef_handle_no_results(1,"The summary_total_search_concurrency summary job completed successfully without identifying any issues, and everything is operating as expected.")`
description = <p>This search is looking at the last business week and then looks at 1 minute time slices to understand how many distinct searches were ran at that point in time. This outputs the 'search_concurrency' or rather how many searches are typically running at any given time. While a large number is can indicate good adoption and usage of Splunk, depending on environment compute units sizing, it can also be a limiting factor to utilizing Splunk properly. </p>
viz_options = { "count":100 }
search = index=_internal sourcetype=scheduler status="completed" OR status="success" OR status="continued" \
| eval summary_id="summary_total_search_concurrency" \
| timechart partial=t fixedrange=t span=1m@m dc(sid) AS distinct_search_count \
| stats avg(distinct_search_count) as search_concurrency \
| eval search_concurrency=round(search_concurrency,2) \
| eval severity_level = case (search_concurrency<=35,1, search_concurrency<=70,2, search_concurrency<=120,3, search_concurrency<=160,4, search_concurrency>160,5)\
| table search_concurrency severity_level \
| `ssef_handle_no_results(1,"The summary_total_search_concurrency summary job completed successfully without identifying any issues, and everything is operating as expected.")`

