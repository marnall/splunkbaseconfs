[endpoint_datamodel_process_commandline_review]
search_name = Endpoint Datamodel Process Commandline Review
readonly = 1
ssef_cron = weekly
target_component = Data Models
version = 1.1.0
date_updated = 2025-11-24 13:33:28
category = ES Adoption
sub_category = Security
tags = Data Models,ES Adoption,Summary
dispatch_earliest_time = -30m
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = EF7953951A964115A339BAFBC41E89D7
search_author = dluxton
updated_author = akhamis
related_info = <p><a href="https://lantern.splunk.com/Security/Product_Tips/Enterprise_Security/Enabling_Windows_event_log_process_command_line_logging_via_group_policy_object" target="_blank">Enabling Windows event log process command line logging via group policy object</a></p>
severity_info_text = <br/><p>Endpoint Processes datamodel contains windows process commandline events, a crucial datasource for the SIEM.</p>
severity_normal_text = <br/><p>Events featuring Windows commandline parameters are populating the Endpoint datamodel.</p>
severity_high_text = <br/><p>Unable to locate process execution events which feature Windows commandline logging parameters. This vital SIEM datasource appears to be missing or not feeding into the Endpoint datamodel.</p>
description = <p>Identify the sources populating the endpoint processes datamodel. The ideal datasources of endpoint telemetry come from sysmon or EDR tools which track process level interactions across the OS.</p>\
<p></p>\
<p>Wineventlog Security 4688 can also be leveraged however its missing file hash information &amp; requires additional configuration to enable process commandline logging.</p>
search = | tstats summariesonly=true count from datamodel="Endpoint.Processes" by sourcetype Processes.process source host index \
| eval summary_id="endpoint_datamodel_process_commandline_review" \
| regex Processes.process="\.exe(\s|\"\s).*" \
| stats values(index) as index dc(host) as hostCount Count by sourcetype source \
| rename sourcetype as sourcetype_name , source as source_name , index as index_name \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = normal \
| table index_name sourcetype_name source_name hostCount Count severity_level \
| `ssef_handle_no_results(4,"WARNING: The search could not identify any process execution events with Windows commandline parameters, this is a vital SIEM datasource which appears to be missing or not feeding into the Endpoint datamodel.")`

