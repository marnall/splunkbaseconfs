execution_plan = <b>01</b> <code>| ssef_summary(ssef_internal_web_access_tracker)</code><br> - Collects summarized dashboard access activity excluding system traffic.<br><b>02</b> <code>| bin _time span=1h</code><br> - Normalizes access events to hourly resolution for consistency.<br><b>03</b> <code>| bin _time span=1d</code><br> - Rolls up activity into daily totals for trend analysis.<br><b>04</b> <code>| stats</code><br> - Counts dashboard page views per day.<br>
explanation = <p>Tracking daily dashboard page views provides a high-level signal of user engagement and platform adoption over time. This insight helps Splunk administrators and platform owners understand whether dashboard usage is increasing, stable, or declining across the organization. Sustained growth in page views often reflects healthy adoption, while drops may indicate performance issues, content relevance problems, or changes in user behavior. Monitoring this trend supports better capacity planning, adoption analysis, and strategic decisions about dashboard investment.</p>
quid = 9A6FC827C8FC504F7C3C2198DDF5ED75
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Get Started With Search</a><br>Explains how dashboard searches execute and generate page view activity.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunkbase: IT Operations Management Apps</a><br>Apps aligned with operational dashboards and usage monitoring.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Category</a><br>Utility apps that support usage analysis and administration.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Free Splunk Training</a><br>Training resources covering dashboard usage analysis and adoption.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Splunk Blogs: What Splunk Does</a><br>Context on how dashboards drive value and user engagement.</li><li><a href="https://www.splunk.com/en_us/blog/2015/03/09/how-to-use-splunk-dashboards.html" target="_blank">Splunk Blogs: How to Use Splunk Dashboards</a><br>Best practices for dashboard design and adoption.</li></ul>
description = <p>This search calculates the <b>total number of dashboard page views</b> per day across the environment. It summarizes UI access activity to show <b>overall dashboard consumption trends</b>. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
