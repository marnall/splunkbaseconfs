execution_plan = <b>01</b> <code>(`ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) num_searches>0 ) OR (`ssef_summary(ssef_identities)`)</code><br> - Merges login tracker and identity data to get a complete user view.<br><b>02</b> <code>| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type identity</code><br> - Selects relevant user session and identity fields.<br><b>03</b> <code>| bin _time span=1d</code><br> - Buckets data by day for time series comparisons.<br><b>04</b> <code>| stats dc(identity) as total_defined_users dc(user) as num_regular_users by _time</code><br> - Counts distinct defined identities and regular users per day.<br><b>05</b> <code>| eval Perc_Regular_Users_to_Authenticated_Users = round((num_regular_users / total_defined_users) * 100, 2)</code><br> - Calculates ratio of regular to total authenticated users.<br><b>06</b> <code>| timechart partial=t fixedrange=t max(num_regular_users) as num_regular_users span=1d</code><br> - Builds daily chart of max regular users seen.<br><b>07</b> <code>| streamstats count</code><br> - Assigns incremental count for time ordering.<br><b>08</b> <code>| eventstats max(count) as max_bins</code><br> - Gets total number of time buckets.<br><b>09</b> <code>| eval first_comp_window=round(max_bins*0.1,0)</code><br> - Calculates the size of the first comparison window (10%).<br><b>10</b> <code>| eval last_comp_window=round(max_bins*(1-0.1),0)</code><br> - Calculates the size of the last comparison window (last 10%).<br><b>11</b> <code>| eval last_7=max_bins-7, first_7=7</code><br> - Marks edges for fixed 7-day window.<br><b>12</b> <code>| eval bucket=case(count<=first_comp_window OR count<=7,"first",count>last_comp_window OR count>last_7, "last",true(), "other")</code><br> - Labels each bucket into 'first', 'last', or 'other'.<br><b>13</b> <code>| fields _time num_regular_users bucket</code><br> - Keeps only fields needed for bucket comparison.<br><b>14</b> <code>| eval {bucket}=num_regular_users</code><br> - Renames regular user count by bucket type.<br><b>15</b> <code>| fields - num_regular_users bucket</code><br> - Removes temporary fields.<br><b>16</b> <code>| eventstats p90(*) as p90_*</code><br> - Calculates P90 for each bucket type.<br><b>17</b> <code>| eval p90_first=round(p90_first,2)</code><br> - Rounds P90 for 'first' window.<br><b>18</b> <code>| eval p90_last=round(p90_last,2)</code><br> - Rounds P90 for 'last' window.<br><b>19</b> <code>| fields - p90_other</code><br> - Cleans up unused P90 values.<br>
explanation = <p>This search identifies fluctuations in regular user behavior over time by comparing the number of regular users per day and calculating P90 metrics. This helps Admins and Security teams detect abnormal drops or surges in usage, indicating shifts in user engagement or potential issues.</p>
quid = 7F3321503B4DECFE38B848B333BC2D46
updated_author = akhamis
related_info = <p><ul>\
<li><a href="https://community.splunk.com/t5/Splunk-Search/Unique-users-logging-in-each-day-chart-search/m-p/681867">Splunk Community: Unique users logging in each day chart/search</a> - This discussion provides methods to chart the number of unique users logging into Splunk daily, offering insights into user engagement trends.</li>\
<li><a href="https://community.splunk.com/t5/Splunk-Search/How-do-I-get-Unique-users-per-day-and-per-month-in-one-query-and/m-p/205212">Splunk Community: How do I get Unique users per day and per month in one query and then divide them</a> - This thread explores techniques to calculate daily and monthly unique user counts within a single query, aiding in understanding user activity patterns.</li>\
<li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/the-all-new-performance-insights-for-splunk.html">Splunk Blogs: The All New Performance Insights for Splunk</a> - This blog introduces Performance Insights, a feature that provides an overview of ingest rates and search load, as well as indexer and search head CPU and memory metrics, helping to monitor system performance and user activity trends.</li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Shareperformancedata">Splunk Docs: Share performance and usage data in Splunk Enterprise</a> - This documentation explains how to share aggregated usage, support, and license data with Splunk, which can help in analyzing user activity and system performance.</li>\
<li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-capture-trend-over-time-with-Splunk-using-span-or/m-p/318771">Splunk Community: How to capture trend over time with Splunk (using span or timechart)?</a> - This discussion provides guidance on using the 'span' and 'timechart' commands to capture and visualize trends over time, useful for analyzing user activity patterns.</li>\
</ul></p>
description = <p>Compares <b>regular user activity</b> over time to detect behavioral changes. Calculates P90 values across time windows for better trend visibility.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.column
viz_options = {  "backgroundColor": "transparent", "seriesColors": ["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"], "xAxisTitleVisibility": "hide", "legendDisplay": "top", "stackMode": "stacked", "overlayFields": ["p90_first", "p90_last" ]  }
search = (`ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) num_searches>0 ) OR (`ssef_summary(ssef_identities)`) \
| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type identity \
| bin _time span=1d \
| stats dc(identity) as total_defined_users dc(user) as num_regular_users by _time \
| eval Perc_Regular_Users_to_Authenticated_Users = round((num_regular_users / total_defined_users) * 100, 2) \
| timechart partial=t fixedrange=t max(num_regular_users) as num_regular_users span=1d \
| streamstats count \
| eventstats max(count) as max_bins \
| eval first_comp_window=round(max_bins*0.1,0) \
| eval last_comp_window=round(max_bins*(1-0.1),0) \
| eval last_7=max_bins-7, first_7=7 \
| eval bucket=case(count<=first_comp_window OR count<=7,"first",count>last_comp_window OR count>last_7, "last",true(), "other") \
| fields _time num_regular_users bucket \
| eval {bucket}=num_regular_users \
| fields - num_regular_users bucket \
| eventstats p90(*) as p90_* \
| eval p90_first=round(p90_first,2) \
| eval p90_last=round(p90_last,2) \
| fields - p90_other

