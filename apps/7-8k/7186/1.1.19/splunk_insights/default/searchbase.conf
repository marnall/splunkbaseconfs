description = <p>This search analyzes <b>average daily license usage</b> by <b>sourcetype</b> to identify primary drivers of license consumption. It highlights how much data each sourcetype contributes relative to overall <b>license utilization</b>. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = | `ssef_license_data` \
| search NOT Sourcetype IN (itsi_summary:*, itsi_notable:*) \
| where License_Usage_GB > 0 \
| bin _time span=1d \
| stats avg(License_Usage_GB) AS avgLicenseUsageGB avg(License_Usage) AS avgLicenseUsage avg(stacksz_gb) AS stacksz_gb avg(perc_usage) AS avgPercUsage values(Index_Name) as Indexes by Sourcetype \
| foreach avgLicenseUsageGB avgLicenseUsage stacksz_gb avgPercUsage \
    [ eval <<FIELD>>=round(<<FIELD>>, 2) ] \
| rename Sourcetype AS "Source Type" avgLicenseUsageGB AS "Average Daily License Usage (GB)" avgLicenseUsage AS "Average Daily License Usage (Raw)" stacksz_gb AS "Stack Size (GB)" avgPercUsage AS "Average Daily License Utilization (%)" \
| table "Source Type" Indexes "Average Daily License Usage (GB)" "Stack Size (GB)" "Average Daily License Utilization (%)" \
| sort - "Average Daily License Usage (GB)"

