tags = Adoption,Capabilities,Details,Sourcetypes
solution = <p>This report is designed to support cleanup and governance efforts by exposing unmapped sourcetypes that are active and consuming resources. It encourages cross-team collaboration to resolve unknown data sources.</p><p><b>Suggested Actions</b><ul><li>Investigate each unmapped sourcetype and determine its source and ownership.</li><li>Update the sourcetype reference lookup to include these missing entries.</li><li>Use search and license impact metrics to prioritize resolution efforts.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise.html" target="_blank">Products: Splunk Enterprise</a><br>Provides deep control over data ingestion, source mapping, and license tracking.</li><li><a href="https://lantern.splunk.com/Search?q=%22sourcetype%20mapping%22" target="_blank">Lantern: Sourcetype Mapping</a><br>Best practices for maintaining accurate and enriched sourcetype references.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=sourcetype%20mapping" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps that assist with mapping and tracking data sources in Splunk.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| `ssef_license_search_data`</code><br> - Load license and search usage data at the sourcetype level.<br><b>02</b> <code>| stats values(Index_Name)... by Sourcetype</code><br> - Aggregate license, search, and reference metadata.<br><b>03</b> <code>| where License_Usage > 0</code><br> - Focus on sourcetypes that consume license.<br><b>04</b> <code>| `ssef_sourcetype_reference_lookup(Sourcetype)`</code><br> - Enrich with known sourcetype mappings.<br><b>05</b> <code>| where isnull(firstSearched)</code><br> - Filter to sourcetypes missing reference context.<br><b>06</b> <code>| sort - License_Usage</code><br> - Prioritize high-usage entries.<br><b>07</b> <code>| eval total_search_time_hr = ...</code><br> - Convert total search time to hours.<br><b>08</b> <code>| table ...</code><br> - Format fields for display.<br><b>09</b> <code>| convert ctime()</code><br> - Format earliest and latest timestamps.<br><b>10</b> <code>| rename ...</code><br> - Clean up final field labels.<br>
explanation = <p>This search highlights sourcetypes consuming license volume but missing from your reference mapping, indicating unknown, unmapped, or orphaned sources. These sourcetypes are active but have no metadata context like ownership, purpose, or classification. Visibility into these gaps is essential for license governance, data hygiene, and search performance analysis. By listing key metrics such as search volume, license impact, and search types, the search helps data owners and administrators prioritize mapping actions and reduce ingestion risks.</p>
quid = 570F6842F4F0F7EC29F561A6B44BE3F1
updated_author = akhamis
related_info = <ul>\
<li><a href="https://community.splunk.com/t5/Splunk-Search/To-identify-unused-unsearches-data-in-Splunk/m-p/466584">Splunk Community: To identify unused/unsearched data in Splunk</a> - This discussion provides methods for identifying unused or unqueried data sources and sourcetypes in Splunk, helping to pinpoint underutilized data inputs.</li>\
<li><a href="https://community.splunk.com/t5/Getting-Data-In/What-sourcetypes-or-sources-aren-t-being-searched/m-p/104351">Splunk Community: What sourcetypes or sources aren’t being searched</a> - This thread explains how to find sourcetypes and data sources that are not being accessed regularly, offering strategies to optimize data usage.</li>\
<li><a href="https://community.splunk.com/t5/Splunk-Search/Data-frequency-for-all-index-and-sourcetype/m-p/545729">Splunk Community: Data frequency for all index and sourcetype</a> - Learn about calculating data ingestion frequency for all indexes and sourcetypes, providing visibility into which data sources are less frequently accessed.</li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Listofpretrainedsourcetypes">Splunk Docs: List of pretrained source types</a> - This documentation lists pretrained sourcetypes in Splunk, helping to organize and assess their usage for better data management.</li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/Data/Managesourcetypes">Splunk Docs: Manage source types</a> - Understand how to manage sourcetypes in Splunk effectively, ensuring that you can identify and handle unused or underutilized data sources.</li>\
</ul>
description = <p>This search provides details behind sourcetypes haven't been accessed in Splunk for extended periods of time. This can signal underutilization, indicating that the sourcetype is not providing users value and/or has not been promoted or has other operational issues that are impacting user experience. Identifying unused sourcetypes to address potential gaps in engagement, uncover training needs, or to remove to save space and reclaim resource usage, ultimately ensuring that all users derive maximum benefit from the platform.</p>
viz_options = { "count": 100 }
search = | `ssef_license_search_data` \
| stats \
    values(Index_Name) as Indexes \
    Sum(num_searches) as num_searches\
    Sum(License_Usage_GB) as License_Usage_GB\
    Sum(License_Usage) as License_Usage\
    Latest(earliest_search) as earliest_search\
    Latest(latest_search) as latest_search\
    Latest(total_search_time) as total_search_time\
    Latest(index_reference) as index_reference\
    Latest(datamodel_reference) as datamodel_reference\
    Latest(lookup_reference) as lookup_reference\
    Latest(search_type) as search_type\
    by Sourcetype \
| where License_Usage > 0 \
| `ssef_sourcetype_reference_lookup(Sourcetype)` \
| where isnull(firstSearched)\
| sort - License_Usage \
| eval total_search_time_hr = round(total_search_time/3600, 2) \
| table Sourcetype ```Indexes``` License_Usage_GB ```num_searches earliest_search latest_search total_search_time_hr search_type``` \
| convert ctime(earliest_search) , ctime(latest_search) \
| rename search_type as "Search Types" total_search_time_hr as "Total Search Time (hr)" num_searches as "Total Searches" , earliest_search as "Earliest Search" , latest_search as "Latest Search", License_Usage_GB as "License Usage (GB)"

