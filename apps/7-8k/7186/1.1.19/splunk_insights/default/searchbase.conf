[mc_deprecated_tls_version_check]
search_name = Deprecated TLS Protocol Versions in Splunk Configuration
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Upgrade Checks
version = 1.0.1
date_updated = 2025-8-18 14:45:31
category = Health Check
sub_category = Security
tags = Configuration,Health Check,Monitoring Console,SSL,Splunk 10,Summary,Upgrade
solution = In any configuration (.conf) file, replace values for the 'sslVersions' and 'sslVersionsforClient' settings that are not "tls1.2" with "tls1.2". The highest precedence configuration for any .conf file should never contain a TLS protocol version that is lower than 1.2.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 21889C5768E317A55D0AA7448D766AAB
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = The configuration on this Splunk platform instance contains a deprecated TLS protocol version that is lower than 1.2 in either the 'sslVersions' or 'sslVersionsforClient' settings.
severity_high_text = The configuration on this Splunk platform instance contains a deprecated TLS protocol version that is lower than 1.2 in either the 'sslVersions' or 'sslVersionsforClient' settings.
description = Evaluates whether or not any transport layer security (TLS) protocol version other than TLS 1.2 is present in the Splunk configuration under either the 'sslVersions' or 'sslVersionsForClient' key. Marks as Critical if any such version is present.
search = | rest `ssef_rest_target` `ssef_rest_timeout` "/services/configs/conf-server" \
| eval summary_id="mc_deprecated_tls_version_check" \
| eval conf = "server" \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` "/servicesNS/-/-/configs/conf-inputs" \
    | eval conf = "inputs" ] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` "/servicesNS/-/-/configs/conf-outputs" \
    | eval conf = "outputs" ] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` "/servicesNS/-/-/configs/conf-web" \
    | eval conf = "web" ] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` "/servicesNS/-/-/configs/conf-indexes" \
    | eval conf = "indexes" ] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` "/servicesNS/-/-/configs/conf-authentication" \
    | eval conf = "authentication" ] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` "/servicesNS/-/-/configs/conf-alert_actions" \
    | eval conf = "alert_actions" ] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` "/servicesNS/-/-/configs/conf-deploymentclient" \
    | eval conf = "deploymentclient" ] \
| where sslVersions != "tls1.2" or sslVersionsForClient != "tls1.2" \
| eval app_conf_stanza_tls_version_too_low = 'eai:appName' . ": " . conf . ".conf" . " [" . title . "]" \
| stats values(app_conf_stanza_tls_version_too_low) AS app_conf_stanzas_tls_version_too_low by splunk_server \
| eval app_conf_stanzas_tls_version_too_low = mvjoin(app_conf_stanzas_tls_version_too_low, ", ") \
| eval severity_level = 3 \
| rename splunk_server as instance \
| table instance app_conf_stanzas_tls_version_too_low severity_level \
| append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="" app_conf_stanzas_tls_version_too_low \
    | fillnull value="0" severity_level \
    | table instance app_conf_stanzas_tls_version_too_low severity_level] \
| stats values(app_conf_stanzas_tls_version_too_low) as app_conf_stanzas_tls_version_too_low sum(severity_level) as severity_level by instance \
| eval severity_level=if(severity_level=0, 1, severity_level) \
| `ssef_handle_no_results(1,"The mc_deprecated_tls_version_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

