[mc_assessment_of_server_ulimits]
search_name = Assessment of server ulimits
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Infra & Arch
version = 1.0.1
date_updated = 2025-7-8 16:33:2
category = Health Check
sub_category = System and Environment
tags = Best Practices,Health Check,Monitoring Console,Operating System,Summary
solution = Persistently modify resource limits per documented best practices.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 0D905B677B7039B99C76332FDB77F627
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_high_text = One or more Splunk instances are running on a host that has one or more resource limits set below official recommendations.
description = This checks whether the machine is provisioned with ulimit settings (file descriptors, user processes, and data segment size) that are adequate for running Splunk software.
search = | rest `ssef_rest_target` `ssef_rest_timeout` /services/server/info \
| eval summary_id="mc_assessment_of_server_ulimits" \
| join type=outer splunk_server [rest `ssef_rest_target` `ssef_rest_timeout` /services/server/sysinfo | fields splunk_server ulimits.data_segment_size ulimits.open_files ulimits.user_processes] \
| eval ulimits.data_segment_size = if(isnotnull('ulimits.data_segment_size'), 'ulimits.data_segment_size', "unavailable") \
| eval ulimits.open_files = if(isnotnull('ulimits.open_files'), 'ulimits.open_files', "unavailable") \
| eval ulimits.user_processes = if(isnotnull('ulimits.user_processes'), 'ulimits.user_processes', "unavailable") \
| eval sev_segment_size = case('ulimits.data_segment_size' == -1 OR 'ulimits.data_segment_size' >= 20000000000, 1, 'ulimits.data_segment_size' == "unavailable", -1, True(), 2) \
| eval sev_open_files = case('ulimits.open_files' == -1 OR 'ulimits.open_files' >= 64000, 1, 'ulimits.open_files' == "unavailable", -1, True(), 2) \
| eval sev_user_processes = case('ulimits.user_processes' == -1 OR 'ulimits.user_processes' >= 16000, 1, 'ulimits.user_processes' == "unavailable", -1, True(), 2) \
| eval severity_level = max(sev_segment_size, sev_open_files, sev_user_processes) \
| fields splunk_server ulimits.data_segment_size ulimits.open_files ulimits.user_processes severity_level \
| rename splunk_server AS instance ulimits.data_segment_size AS "ulimits.data_segment_size (current / recommended)" ulimits.open_files AS "ulimits.open_files (current / recommended)" ulimits.user_processes AS "ulimits.user_processes (current / recommended)" \
| fieldformat ulimits.data_segment_size (current / recommended) = (if('ulimits.data_segment_size (current / recommended)' >= 0, 'ulimits.data_segment_size (current / recommended)', 'ulimits.data_segment_size (current / recommended)'))." / 20000000000" \
| fieldformat ulimits.open_files (current / recommended) = (if('ulimits.open_files (current / recommended)' >= 0, 'ulimits.open_files (current / recommended)', 'ulimits.open_files (current / recommended)'))." / 64000" \
| fieldformat ulimits.user_processes (current / recommended) = (if('ulimits.user_processes (current / recommended)' >= 0, 'ulimits.user_processes (current / recommended)', 'ulimits.user_processes (current / recommended)'))." / 16000" \
| fields - _timediff\
| `ssef_handle_no_results(1,"The mc_assessment_of_server_ulimits summary job completed successfully without identifying any issues, and everything is operating as expected.")`

