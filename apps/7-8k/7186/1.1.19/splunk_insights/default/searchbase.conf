explanation = <p>This search highlights sourcetypes that meet a defined activity threshold, helping teams determine which data sources are regularly used in search workflows. It connects those sourcetypes to mapped use cases, enabling platform owners and analysts to validate whether actively searched data supports business-aligned capabilities. The output assists with refining onboarding priorities, managing lookup accuracy, and ensuring enrichment consistency across the most utilized datasets.</p>
