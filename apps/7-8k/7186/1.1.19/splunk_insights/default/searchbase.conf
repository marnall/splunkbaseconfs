related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/manage-searches-and-reports/monitor-search-performance/about-search-job-inspector" target="_blank">Splunk Help: Search Job Inspector</a><br>Explains how to analyze search and dashboard execution performance and errors.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=dashboard%20performance" target="_blank">Splunk Docs: Dashboard Performance Searches</a><br>Search references and examples for analyzing dashboard usage and efficiency.</li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/bd-p/dashboards-visualizations" target="_blank">Community: Dashboards & Visualizations</a><br>Community guidance and best practices for building reliable dashboards.</li></ul>
description = <p>This search analyzes <b>application-level dashboard usage</b> and correlates it with <b>dashboard execution errors</b> across non-system apps. It highlights which apps are most used and where <b>user impact may exist due to errors</b>.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_internal_web_access_tracker)` type!=system app=* \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1h \
| stats latest(*) as * by _time, label, type, app, view \
| eval users_mv=split(users_mv,", ") \
| `ssef_regularly_seen(app)` \
| stats sum(num_users) as num_users sum(num_page_loads) as num_page_loads values(view) as view values(users_mv) as users_mv by app \
| eval num_users = if(isnotnull(users_mv), mvcount(users_mv), num_users) \
| fields app num_users num_page_loads view \
| append \
    [| search `ssef_summary(ssef_search_failed_jobs_tracker)` provenance=UI:dashboard:* \
    | fields _time, label, name, Splunk_Instance, role, app, user, search_id_normalized, pid, provenance, savedsearch_name, status, search_et, search_lt, diskUsage, available_count, event_count, result_count, total_run_time, scan_count, request_auto_cancel, runtime_auto_cancel, runtime_auto_pause, error_messages, warn_messages, TotalBucketsCount, search, severity_level, source, host \
    | rex field=provenance mode=sed "s/^UI:dashboard://g" \
    | rename provenance as view \
    | eval error_messages=mvappend(error_messages,warn_messages) \
    | stats values(error_messages) as error_messages by app \
    | fields app error_messages ] \
| stats values(error_messages) as Errors values(view) as Dashboards sum(num_users) as num_users sum(num_page_loads) as num_page_loads by app \
| sort 0 Errors - num_users \
| fillnull value="No Errors found" Errors \
| table app num_users num_page_loads Errors \
| rename app AS "App" num_users AS "Number of Users" num_page_loads AS "Page Loads" Errors AS "Errors"

