quid = BC4603FCA8D22AC1884C0CC92B46B8B9
updated_author = akhamis
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span></p>\
This metric measures the number of non-Splunk alerts generated within the selected time frame.\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span></p>\
Non-Splunk alerts are defined as alerts created from external data sources, not internal to Splunk. These are custom alerts set up by users to monitor specific situations in their environment that require immediate notification and/or automated response. Tracking non-Splunk alerts offers a nuanced view of the alerting system's effectiveness, efficiency, and alignment with strategic objectives. Monitoring fluctuations in this metric provides key insights into the platform's adoption, optimization, and value, reflecting how well it supports the organization's operational and strategic goals.\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span></p>\
It is recommended to track this KPI daily, <em>monthly</em>, and <em>quarterly</em> for effective oversight and management of the alerting system.
default_viz = splunk.singlevalue
search = index=_internal sourcetype="scheduler" thread_id="AlertNotifier*" NOT alert_actions IN ("","summary_index","lookup","populate_lookup","outputtelemetry","itsi_import_objects","itsi_summary_metrics_collect","indicator") NOT app IN (`ssef_default_apps`) \
| fields _time host app thread_id alert_actions user savedsearch_id sid \
| timechart partial=t fixedrange=t dc(sid) as "# of Non Splunk Alerts Fired" span=1d

