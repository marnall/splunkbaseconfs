dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_audit action=search search="*WinEventLog*"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieves search activity data from the _audit index.<br><b>02</b> <code>fields</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Selects relevant fields for analysis, including time, user, and search details.<br><b>03</b> <code>`ssef_instance_info(host)`</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Enriches the data with host-level instance metadata.<br><b>04</b> <code>`ssef_tracker_search_type`</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Enriches the data with search type metadata for better categorization.<br><b>05</b> <code>`ssef_index_sourcetype_reference(search_string)`</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extracts index and sourcetype references from search strings.<br><b>06</b> <code>`ssef_lookup_reference(search_string)`</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extracts lookup references for further context.<br><b>07</b> <code>stats</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates search metrics, including run times and metadata, by user and search details.<br><b>08</b> <code>table</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Outputs a detailed table summarizing search activity and references.<br>
explanation = <p>This search examines <b>ad-hoc search activity</b> against a specific sourcetype, using the <b>_audit index</b> or raw data, and enriches the output with IS4S metadata. It provides insights into search interactions, total run times, and user activity, focusing on searches referencing "WinEventLog."</p><p>- Queries the <b>_audit index</b> for search actions.<br>- Filters searches that contain "WinEventLog" in their query strings.<br>- Enriches search data with IS4S metadata, including search types and index/sourcetype references.<br>- Aggregates search metrics by user, app, and search type.<br>- Outputs a detailed table summarizing search activity, run times, and references.</p><p>This analysis supports monitoring of search activity, identifying high-impact searches, and ensuring compliance with data usage policies.</p>
quid = 4261F40012F4789E481CB558A60DF056
search_author = Splunk Searchbase Assistant
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/UserActivity" target="_blank">User Activity Documentation</a><br>Details on monitoring user activity in Splunk.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Stats" target="_blank">Stats Command Documentation</a><br>Learn how to aggregate data using stats.</li></ul>
description = <b>Reports on ad-hoc search activity against a specific sourcetype</b>, focusing on interactions with "WinEventLog," enriched with IS4S metadata.
search = index=_audit action=search search="*WinEventLog*" \
| fields _time host app user savedsearch_name search total_run_time \
| `ssef_instance_info(host)` \
| `ssef_tracker_search_type` \
| `ssef_index_sourcetype_reference(search_string)` \
| `ssef_lookup_reference(search_string)` \
| stats values(*) as * max(total_run_time) as total_run_time by label search_type app user search \
