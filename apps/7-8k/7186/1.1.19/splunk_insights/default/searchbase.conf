category = Splunk
sub_category = Adoption
tags = Adoption,Apps,Details
solution = <p>This view surfaces search heads with a high number of installed apps that are not actively used, indicating opportunities to reduce clutter and improve governance.</p><p><b>Suggested Actions</b> Review unused apps with stakeholders to confirm whether they are still required, consolidate overlapping functionality, or remove obsolete packages. Consider user training or enablement if important apps are installed but not adopted.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products.html" target="_blank">Products: Splunk Products Overview</a><br>Explore the full Splunk product portfolio to align installed capabilities with actual adoption and business needs.</li><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Services: Splunk Training and Education</a><br>Enable users and administrators with targeted training to drive adoption of valuable apps and features.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=apps%20usage" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover additional Splunk apps related to app usage, governance, and adoption optimization.</li></ul></p>
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_apps_local)`</code><br> - Pulls summarized inventory of locally installed apps per search head.<br><b>02</b> <code>| rename app_name AS app label AS host</code><br> - Normalizes field names for consistent aggregation and readability.<br><b>03</b> <code>| append [ search `ssef_summary(ssef_scma_apps_top_app_hits)` … ]</code><br> - Appends summarized app view counts to correlate usage with inventory.<br><b>04</b> <code>| where total_views=0</code><br> - Filters to apps that have not been viewed by any users.<br><b>05</b> <code>| stats count(app), values(app) by host</code><br> - Produces per–search head counts and lists of unused apps.<br>
explanation = <p>Unused applications increase operational complexity, consume system resources, and can introduce upgrade and security risk if left unmanaged. By surfacing apps with no recorded views, this search supports administrators and platform owners in identifying candidates for rationalization, decommissioning, or user enablement. Over time, reducing unused apps improves platform maintainability, search performance, and user experience. The results can also inform training or communication efforts when valuable apps are installed but not adopted.</p>
quid = 0114EB3E392752ADF1BF3D401FFB01A5
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.1/meet-splunk-apps/apps-and-add-ons" target="_blank">Splunk Help: Apps and Add-ons</a><br>Overview of what Splunk apps and add-ons are and how they extend platform functionality.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.0/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: App Deployment Overview</a><br>Guidance on deploying and managing apps across Splunk environments.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utility Apps</a><br>Browse utility apps that support administration, configuration, and platform hygiene.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunkbase: IT Operations Management Apps</a><br>Apps focused on operational monitoring, troubleshooting, and automation use cases.</li><li><a href="https://www.splunk.com/en_us/resources.html" target="_blank">Products: Splunk Resources</a><br>Central library of Splunk resources, guides, and best practices.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Splunk Blogs: What Are Splunk Apps and Add-ons</a><br>Blog overview explaining how apps and add-ons are used in real-world scenarios.</li></ul>
description = <p>This search identifies <b>installed Splunk apps</b> that have <b>zero user views</b> across each search head, highlighting potential <b>app sprawl</b> and unused content. It helps teams understand where apps are deployed but not actively consumed, enabling better governance and cleanup decisions.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_apps_local)` core=0 disabled=0 NOT app_name IN (`ssef_default_apps`) NOT ( app_name IN (*-ITSI-*, *-ESS-*, SA*, Splunk_TA_*, Splunk_SA_*) author="Splunk*") \
| rename app_name AS app label AS host \
| search NOT app IN ( `ssef_default_apps` ) \
| stats values(host) AS host by app \
| append \
    [ search `ssef_summary(ssef_scma_apps_top_app_hits)` NOT app IN ( `ssef_default_apps` ) \
    | stats sum(views) AS total_views by app ] \
| stats values(host) AS host sum(total_views) AS total_views by app \
| fillnull value=0 total_views \
| where total_views=0 \
| stats count(app) AS apps_with_no_views, values(app) AS app_list by host \
| eval app_list=if(apps_with_no_views>30, "More than 30 apps with no views.", mvjoin(app_list, ", ")) \
| rename host AS "Search Head" apps_with_no_views AS "Apps With No Views" app_list AS "Application List"

