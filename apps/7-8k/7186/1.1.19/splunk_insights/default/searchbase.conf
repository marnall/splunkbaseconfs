execution_plan = <b>01</b> <code>| ssef_summary(ssef_scma_indexing_data_source_inventory)</code><br> - Identifies all sourcetypes that have data ingested each day.<br><b>02</b> <code>| ssef_summary(ssef_audit_user_login_tracker)</code><br> - Determines which sourcetypes are referenced in user searches over time.<br><b>03</b> <code>| append</code><br> - Combines ingestion and search activity to compare usage by sourcetype.<br><b>04</b> <code>| stats</code><br> - Calculates how often ingested data is actually searched and derives access percentages.<br>
explanation = <p>Ingesting data that is never searched represents unrealized value and unnecessary cost within a Splunk environment. This insight helps platform owners and administrators understand which data sources are actively supporting investigations, dashboards, and analytics versus those that remain untouched. By identifying sourcetypes with low or zero search activity, teams can reassess onboarding decisions, improve enablement for users, or adjust retention strategies. Over time, this improves cost efficiency, strengthens adoption, and ensures that ingested data aligns with real business use cases.</p>
quid = 9A33B5A2E499BB93A1FA6D3B25827DD7
updated_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-get-Splunk-access-statistics/m-p/23881" target="_blank">Splunk Data Access Statistics</a><p>This community discussion covers methods to track user access statistics, helping identify the frequency of data access and user activity in Splunk.</p></li><li><a href="https://community.splunk.com/t5/Splunk-Search/how-to-display-percentage-of-total/m-p/129233" target="_blank">Calculating Percentage of Accessed Data</a><p>Provides techniques to calculate and display percentages of data accessed using Splunk's Search Processing Language (SPL).</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Reportonuseractivity" target="_blank">Report on User Activity</a><p>Official documentation for generating reports on user activity, including search trends and the frequency of data access.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Aboutoptimization" target="_blank">Optimizing Data Access in Splunk</a><p>This guide offers strategies for improving the efficiency and performance of data access in Splunk through search optimization techniques.</p></li></ul>
description = <p>Understanding the percentage of data accessed in Splunk indexes helps customers optimize storage and query performance by identifying underutilized data. This insight enables better data management, reduces costs, and ensures critical data is readily available for analysis.</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_scma_indexing_data_source_inventory)` NOT orig_sourcetype IN (stash) \
| fields _time orig_sourcetype \
| eval Sourcetype=lower(orig_sourcetype) \
| bin _time span=1d \
| stats count by _time Sourcetype \
| eval ingested = 1 \
| fields _time Sourcetype ingested \
| append \
    [ search `ssef_summary(ssef_audit_user_login_tracker)` \
    | eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
    | fields _time sourcetype_reference \
    | eval sourcetype_reference=split(sourcetype_reference,"|") \
    | eval Sourcetype=lower(sourcetype_reference) \
    | bin _time span=1d \
    | stats count by _time Sourcetype \
    | where NOT match(Sourcetype,"\*|\"|-too_small") AND Sourcetype!="" \
    | search NOT Sourcetype IN (`ssef_default_sourcetypes`,0,mvindex) \
    | eval searched = 1 \
    | fields _time Sourcetype searched ] \
| bin _time span=1d \
| stats \
    max(ingested) as ingested\
    max(searched) as searched\
    by _time Sourcetype \
| fillnull value=0 ingested searched \
| where ingested = 1 \
| stats \
    sum(ingested) as num_ingested\
    sum(searched) as num_searched\
    by Sourcetype \
| eval perc_data_access = round((num_searched / num_ingested) * 100, 2) \
| rename num_ingested as "Ingestion (Days)" , num_searched as "Searched (Days)" , perc_data_access as "% Data Access"

