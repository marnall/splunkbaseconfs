[Adoption_by_Category_Export]
search_name = Adoption by Category Export
readonly = 1
search_hidden = 1
target_component = Adoption
version = 1.1.2
date_updated = 2025-4-16 8:46:44
category = Splunk
sub_category = Adoption
tags = Adoption,Capabilities,IS4S Data Export,Summary
dispatch_earliest_time = -8d@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 16806DED97DC0354295331AB534FA917
updated_author = akhamis
related_info = <ul>\
<li><a href="https://community.splunk.com/t5/Adoption-Boards/ct-p/adoption-boards" target="_blank">Adoption Boards</a></li>\
</ul>
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The search activity within Splunk is assigned to specific adoption categories over a selected time frame. An "Adoption Category" classifies users by their usage characteristics. More specifically categories are defined by terms defined in Splunk Lantern surrounding usage and use cases. Examples of category groupings in the current example include "Security Monitoring, Infrastructure Monitoring, Compliance, etc.".</p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>This categorization highlights Splunks versatility and essential role across various groups, demonstrating its broad organizational acceptance. The widespread use of Splunk across diverse teams underscores its value in enhancing operational efficiency, improving collaboration, and contributing to overall organizational success.</p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>It is advisable to track this metric <em>monthly</em> and <em>quarterly</em> for effective performance and adoption analysis.</p>
search = `ssef_summary(ssef_audit_user_login_tracker)` \
| eval summary_id="Adoption_by_Category_Export" \
| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
| fields _time user app label sourcetype_reference \
| bin _time span=1h \
| stats latest(*) as * by _time, label, app, user \
| rename sourcetype_reference as sourcetype_name \
| eval sourcetype_name=split(sourcetype_name,"|") \
| stats count by _time, user, sourcetype_name \
| where match(sourcetype_name, "^[^<>?&#]+$") AND NOT match(sourcetype_name, "[\"'`*]|-too_small|itsi_internal_log|itsi_notable|itsi_license_checker") \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype_name OUTPUT category \
| lookup uce_sourcetype_mapping sourcetype_name AS sourcetype_name OUTPUTNEW category \
| eval category=split(category,"|") \
| fillnull value="Unclassified" category \
| stats dc(user) as kpi_value by _time category  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "Adoption by Category" , export_time = now() \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) \
| rename _time as timechart_time \
| table timechart_time export_time customer_name kpi_name kpi_value category severity_level \
| `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

