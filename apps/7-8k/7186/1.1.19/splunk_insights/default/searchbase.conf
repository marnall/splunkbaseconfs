| table _time _time sourcetype_name source_name count hostCount matched_sources missing_sources recomended_sources Severity

[list_tas_without_correct_permissions]
search_name = List TAs Without Correct Permissions
readonly = 1
ssef_cron = weekly
target_component = Apps and Add-ons
version = 1.0.7
date_updated = 2025-11-10 12:32:14
category = ES Adoption
sub_category = Security
tags = Apps,Details,ES Adoption
solution = <p>This search provides a governance-focused view of Technology Add-ons that may cause platform-wide issues due to incorrect permissions.</p><p><b>Suggested Actions</b>: Update affected TAs to be readable by Everyone with global sharing, validate changes across search heads and indexers, and include permission checks in standard TA onboarding procedures.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Improve administrator understanding of app and TA permission models.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert assistance for TA governance, standardization, and platform hardening.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=technology%20add-on" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover supported Technology Add-ons and governance utilities from Splunk and Cisco.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary()</code><br> - Loads IS4S summary data describing installed apps and their permission metadata.<br><b>02</b> <code>| stats / eval / where</code><br> - Filters Technology Add-ons, evaluates ACL correctness, and assigns severity based on prevalence of common TAs.<br>
explanation = <p>Technology Add-ons are foundational components that should be consistently readable across the platform to avoid parsing errors, data gaps, and unpredictable behavior. This search helps administrators identify TAs that are not shared correctly, which can lead to inconsistent field extraction, broken data pipelines, or supportability issues. By flagging commonly used vendor TAs with restrictive permissions, teams can proactively correct ACL settings and reduce operational risk. The severity scoring helps prioritize remediation when multiple common TAs are affected.</p>
quid = D636902702B14028F9AF2E5720968996
search_author = dluxton
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=technology%20add-on%20permissions" target="_blank">Splunk Docs: Technology Add-on permissions</a><br>Search results for documentation related to TA permission models and best practices.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=app%20permissions%20splunk" target="_blank">Splunk Docs: App permissions</a><br>Guidance on configuring read/write permissions and sharing scope for apps.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=splunk%20app%20governance" target="_blank">Splunk Docs: App governance</a><br>Best practices for managing app lifecycle, ownership, and access.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Apps</a><br>Utilities that assist with app inventory, permissions, and governance.</li><li><a href="https://classic.splunkbase.splunk.com/category/security/" target="_blank">Splunkbase: Security Apps</a><br>Apps that support secure configuration and platform hygiene.</li><li><a href="https://www.splunk.com/en_us/resources.html" target="_blank">Splunk Resources: Platform resources</a><br>Central guidance for platform administration and governance.</li></ul>
severity_normal_text = <br/><p>There were no TAs with incorrect permissions identified</p>
severity_medium_text = <br/><p>1 or more TA is configured with non-standard permissions.</p>
severity_high_text = <br/><p>1 or more TA belonging to common technology types is configured with non-standard permissions.</p>
severity_critical_text = <br/><p>10 or more TAs belonging to common technology types are configured with non-standard permissions.</p>
description = <p>This search identifies <b>Technology Add-ons (TAs)</b> with <b>incorrect permission settings</b>. It highlights TAs that are <b>not globally readable</b> despite being commonly shared components. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p></p>
search = `ssef_summary(ssef_apps_local)` disabled=0 (app_name="TA*" OR app_name="Splunk_TA*" OR app_name="SA*") \
| eval summary_id="list_tas_without_correct_permissions" \
| fields _time, label, app_name, app_label, core, author, current_version, latest_version, build, check_for_updates, visible, sharing, disabled, configured, show_in_nav, state_change_requires_restart, description, details, updated, acl_perms_read, acl_perms_write, setup_view, attribution_link, update_appurl, update_homepage, docs_section_override, managed_by_deployment_client \
| stats latest(*) as * latest(_time) as _time by label, app_name \
| where match(app_name, "^(TA|Splunk_TA|SA)") AND NOT (acl_perms_read="Everyone" AND sharing="global")\
| eval common_ta=if(match(app_label,"(?i)Cisco|AWS|Microsoft|Google|Sysmon|auditd|Palo|Forti|Crowdstrike|Okta|Stream|F5|Amazon|Azure|NGINX|SQL|Citrix|Nix|Tomcat|IIS|Point"), "true", null()) \
| eventstats count(eval(if(common_ta="true",app_label,null()))) as common_ta_count \
| eval severity_level = case (common_ta_count > 9, 5, common_ta_count > 0, 4, true(), 3) \
| table label app_name app_label current_version author acl_perms_read acl_perms_write sharing common_ta common_ta_count severity_level\
| `ssef_handle_no_results(1,"The list_tas_without_correct_permissions summary job completed successfully without identifying any issues, and everything is operating as expected.")`

