explanation = <p>This search produces a comprehensive timechart that trends sourcetype usage and user engagement. It is designed to be the authoritative source for understanding which data is actively being used and which is not.</p><p><strong>Key Metrics Provided:</strong></p><p>For each day in the selected time range, this search provides four key metrics:</p><ol><li data-list="ordered"><span class="ql-ui"></span><code><strong># of Regularly Accessed Sourcetypes</strong></code>: The count of sourcetypes that meet the "regularly searched" criteria.</li><li data-list="ordered"><span class="ql-ui"></span><code><strong># of Unused Sourcetypes</strong></code>: The count of all other sourcetypes present in the inventory.</li><li data-list="ordered"><span class="ql-ui"></span><code><strong>Total # of Sourcetypes</strong></code>: The total count of unique sourcetypes present in the inventory for that day.</li><li data-list="ordered"><span class="ql-ui"></span><code><strong>% of Regularly Accessed Sourcetypes to Total</strong></code>: The percentage of regularly accessed sourcetypes relative to the total.</li></ol><p>"Regularly searched" is defined as any sourcetype queried on a number of distinct days that exceeds the percentage threshold defined in the <code>ssef_perc_active_threshold</code> macro.</p><h3>Methodology and Logic</h3><p>The primary challenge this query solves is accurately connecting specific inventory sourcetypes (e.g., <code>access_combined</code>) with the wildcard search patterns used by users to find them (e.g., <code>access_com*</code>). A simple comparison would fail because the names don't match.</p><p>The query solves this using a <strong>"Key Normalization"</strong> technique with a <code>join</code>:</p><ol><li data-list="ordered"><span class="ql-ui"></span><strong>Translation (Main Search):</strong> It begins with the daily inventory of specific sourcetypes. It then uses the <code>ssef_effectively_referenced_sourcetypes</code> WILDCARD lookup not as a filter, but as a <strong>translation map</strong>. It translates each specific sourcetype into all its corresponding generic search patterns (e.g., <code>access_combined</code> becomes <code>access_com*</code>). This pattern becomes the common join key. The <code>mvexpand</code> command is used to handle cases where one sourcetype can be found by multiple patterns.</li><li data-list="ordered"><span class="ql-ui"></span><strong>Activity (Subsearch):</strong> An independent subsearch analyzes the audit logs to generate a simple list of which search patterns were <em>actually used</em> on each day.</li><li data-list="ordered"><span class="ql-ui"></span><strong>Connection (</strong><code><strong>join</strong></code><strong>):</strong> A <code>left join</code> connects the translated inventory data with the daily search activity using the normalized pattern as the key. This correctly flags which specific sourcetypes were effectively searched on which days, even via wildcards.</li><li data-list="ordered"><span class="ql-ui"></span><strong>Final Calculation:</strong> It uses <code>eventstats</code> to calculate the overall search frequency for each sourcetype across the entire time window. This ensures the "Regularly Searched" classification is accurate and based on true activity frequency. The final <code>timechart</code> and <code>eval</code> commands then aggregate the daily counts and compute the final percentage.</li></ol><h3>Why This Approach is Correct and Defensible</h3><p>This query is the result of rigorous analysis and is defensible for the following reasons:</p><ol><li data-list="bullet"><span class="ql-ui"></span><strong>It Measures True Frequency:</strong> It counts the number of distinct days a sourcetype was searched, not the misleading time span between the first and last search.</li><li data-list="bullet"><span class="ql-ui"></span><strong>It Handles Wildcards Correctly:</strong> The "Key Normalization" technique is the only robust way to connect specific sourcetypes to the wildcard patterns used to search them.</li><li data-list="bullet"><span class="ql-ui"></span><strong>It is Comprehensive:</strong> By using a <code>left join</code>, the query analyzes <strong>every single sourcetype</strong> from the inventory, proving the analysis did not ignore any data.</li><li data-list="bullet"><span class="ql-ui"></span><strong>It Uses Authoritative Timing:</strong> The query gets its timing information directly from the source logs, which is far more accurate than relying on historical timestamps.</li><li data-list="bullet"><span class="ql-ui"></span><strong>It Justifies the Use of </strong><code><strong>join</strong></code><strong>:</strong> While <code>join</code> is often discouraged, it is the only command that can perform the required relational logic for this problem. The performance impact is minimized because the <code>join</code> operates on small, pre-aggregated datasets, not raw events, making it an acceptable and necessary choice.</li></ol><p><br></p><div spellcheck="false" class="ql-code-block-container"><div class="ql-code-block">`ssef_summary(ssef_scma_indexing_data_source_inventory)`</div><div class="ql-code-block">| bin _time span=1d</div><div class="ql-code-block">| eval inventory_sourcetype = lower(orig_sourcetype)</div><div class="ql-code-block">| stats count by _time, inventory_sourcetype</div><div class="ql-code-block">```"PHASE 1: Get a daily inventory of all specific sourcetypes that exist."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">| lookup ssef_effectively_referenced_sourcetypes sourcetype_name AS inventory_sourcetype OUTPUT sourcetype_name AS searched_pattern</div><div class="ql-code-block">```"PHASE 2: Use the WILDCARD lookup to translate each specific sourcetype into the search pattern that finds it."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">| mvexpand searched_pattern</div><div class="ql-code-block">```"PHASE 3: Flatten the data, creating a separate row for each possible search pattern to ensure the join works correctly."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">| join type=left _time, searched_pattern [ ```"SUBSEARCH: Get a list of all patterns ACTUALLY searched on each day."```</div><div class="ql-code-block">| search `ssef_summary_index` source IN (ssef_audit_user_login_tracker, ssef_introspection_search_telemetry)</div><div class="ql-code-block">| bin _time span=1d</div><div class="ql-code-block">| eval searched_pattern = lower(coalesce(Sourcetype, sourcetype_reference))</div><div class="ql-code-block">| where isnotnull(searched_pattern) AND searched_pattern!=""</div><div class="ql-code-block">| makemv delim="|" searched_pattern</div><div class="ql-code-block">| mvexpand searched_pattern</div><div class="ql-code-block">| rex field=searched_pattern mode=sed "s/[^a-z0-9:*_.-]//g"</div><div class="ql-code-block">| stats count by _time, searched_pattern</div><div class="ql-code-block">| eval was_searched_today=1</div><div class="ql-code-block">| fields _time, searched_pattern, was_searched_today ]</div><div class="ql-code-block"><br></div><div class="ql-code-block">```"PHASE 4: Left-join the flattened inventory to the daily search list. 'was_searched_today' is added if the pattern was searched."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">| eventstats dc(_time) as total_days_in_window</div><div class="ql-code-block">```"PHASE 5a: Calculate the total number of active calendar days in the entire search window."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">| eventstats dc(eval(if(was_searched_today=1, _time, null()))) as days_sourcetype_was_searched by inventory_sourcetype</div><div class="ql-code-block">```"PHASE 5b: THE CORE LOGIC - For each original sourcetype, count the distinct days that ANY of its corresponding patterns were searched."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">| eval search_coverage_percent = round((days_sourcetype_was_searched / total_days_in_window) * 100, 2)</div><div class="ql-code-block">```"PHASE 6: Calculate the search frequency percentage for every sourcetype."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">| eval usage_category = if(search_coverage_percent &gt;= `ssef_perc_active_threshold`, "# of Regularly Accessed Sourcetypes", "# of Unused Sourcetypes")</div><div class="ql-code-block">```"PHASE 7: Classify every sourcetype into a descriptive category that will become the final column name."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">| timechart span=1d dc(inventory_sourcetype) by usage_category</div><div class="ql-code-block">```"PHASE 8: Generate the trend, counting the distinct sourcetypes in each category per day."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">```"--- POST-PROCESSING: Calculate Totals and Percentage ---"```</div><div class="ql-code-block">| eval total_sourcetypes_for_day = coalesce('# of Regularly Accessed Sourcetypes', 0) + coalesce('# of Unused Sourcetypes', 0)</div><div class="ql-code-block">```"PHASE 9: For each day, calculate the total number of sourcetypes by summing the two categories."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">| eval "% of Regularly Accessed Sourcetypes to Total" = if(total_sourcetypes_for_day &gt; 0, round((coalesce('# of Regularly Accessed Sourcetypes', 0) * 100) / total_sourcetypes_for_day, 2), 0)</div><div class="ql-code-block">```"PHASE 10: Calculate the final percentage, ensuring we don't divide by zero."```</div><div class="ql-code-block"><br></div><div class="ql-code-block">| rename total_sourcetypes_for_day as "Total # of Sourcetypes"</div><div class="ql-code-block">```"PHASE 11: Give the total count a clean final name."```</div></div>
