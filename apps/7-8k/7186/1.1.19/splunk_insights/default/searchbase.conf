search_author = akhamis
updated_author = akhamis
description = <p>Total search hours across all users, excluding admin and splunk-system-user accounts. These excluded accounts are typically engaged in background tasks such as scheduled jobs, data model accelerations, and report acceleration, which do not reflect typical user search activities. The hours reported are specifically from active users, excluding system processes.</p>
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (admin, splunk-system-user) \
| eval summary_id="Active_User_Search_Hours_Export" \
| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| eval total_search_time_hrs = (total_search_time / 60) \
| bin _time span=1d \
| stats sum(total_search_time_hrs) AS kpi_value by _time  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval kpi_value = round(kpi_value) \
| eval customer_name = `ssef_customer_name` , kpi_name = "Active User Search Hours" , export_time = now() \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) \
| rename _time as timechart_time \
| table timechart_time export_time customer_name kpi_name kpi_value severity_level \
| `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

