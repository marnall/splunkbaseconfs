dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 21914CB58923DA863FE31A9195CE9F73
updated_author = akhamis
description = <p><strong>Definition</strong></p>\
<p>This KPI tracks the total number of users frequently seen in Splunk, defined as those authenticating daily for at least 10% of the chosen time frame. This KPI excludes all internal users, including admin and the splunk-system-user, and specifically targets users who are actively and consistently engaged in search activities.</p>\
<p><strong>The Value it Uncovers</strong></p>\
<p>This measurement is a strong indicator of team adoption across the business and helps track overall Splunk usage.</p>\
<p><strong>Recommended Time Period</strong></p>\
<p>It is an effective KPI to monitor <em>weekly</em> and <em>monthly</em>, allowing for timely adjustments in adoption strategies.</p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) num_searches>0 search_type="*adhoc*"\
| bin _time span=1d\
| stats count latest(name) as name by _time, label, app, user\
| `ssef_app_info(app)`\
| where app_type="Splunk Enterprise Security Apps" OR name like "es-%"\
| stats count by _time, user\
| appendcols\
    [ search `ssef_summary(ssef_identities)` NOT identity IN (`ssef_default_users`)\
    | bin _time span=1d\
    | stats dc(identity) as total_authorized by _time ]\
| filldown total_authorized\
| addinfo\
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by user\
| eval perc_active = round((num_active_days / num_days) * 100, 2)\
| fillnull value=0 perc_active total_authorized\
| eval active_user = if(perc_active >= `ssef_perc_active_threshold`, user, null() )\
| stats max(total_authorized) as total_authorized dc(user) as all_users dc(active_user) as active_users max(num_days) as num_days by _time\
| eval reg_seen_to_total = ceiling((active_users / total_authorized) * 100) , threshold=`ssef_perc_active_threshold`\
| bin _time span=1d\
| stats max(active_users) as "# of Regularly Seen ES Users" by _time

