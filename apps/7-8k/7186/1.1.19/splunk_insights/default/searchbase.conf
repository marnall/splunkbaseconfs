quid = DE52158F8F24AF5908DDEF7377FB1F62
updated_author = akhamis
related_info = <div class="diag-content-box">\
<div class="diag-content"> \
<a class="doc-drilldown" href="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://docs.splunk.com/Documentation/Splunk/latest/Indexer/Aboutindexesandindexers&ved=2ahUKEwii6aW5g5CFAxVnGtAFHYlkAkQQFnoECB4QAQ&usg=AOvVaw2TlgnPiToUeeun4wEUxOZi" target="_blank">About Indexes and Indexers </a> <i class="icon-external icon-modal-xsmall icon-color-link"></i>\
<a class="doc-drilldown" href="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://docs.splunk.com/Documentation/Splunk/latest/Indexer/Howindexingworks&ved=2ahUKEwii6aW5g5CFAxVnGtAFHYlkAkQQFnoECDYQAQ&usg=AOvVaw2P0rrmn2i7OjqVAeDT2_tk" target="_blank"> How Indexing Works</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i>\
<a class="doc-drilldown" href="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://docs.splunk.com/Splexicon:Indexer&ved=2ahUKEwjtypeEhJCFAxXLENAFHVjzCEQ4ChAWegQIBxAB&usg=AOvVaw032YLkpaj3fa8gyXnERp9v" target="_blank">Splexicon</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i>\
</div>\
</div>
description = <p>A Splunk index is a repository for Splunk data. Data that has not been previously added to Splunk is referred to as raw data. When the data is added to Splunk, it indexes the data (uses the data to update its indexes), creating event data. Individual units of this data are called events. This search provides statistical information by index.</p>\
<p>Within a 7 day period collects information on number of searches, number of users, number of hosts, number of scheduled jobs number of apps , search types, search head host id names searching these indexes and grand total runtime for each.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> > 1000</li>\
<li><strong>Low:</strong> 500-100</li>\
<li><strong>Normal:</strong> < 500</li>\
</ul>
search = `ssef_summary(ssef_scma_search_index_statistics)` \
| fields index_name num_hosts num_events num_searches search_type num_apps num_jobs total_run_time num_users severity_level \
| stats latest(total_run_time) AS total_run_time latest(*) AS * by index_name \
| eval search_type=split(search_type," ") \
| `ssef_severity_level_text(severity_level)` \
| table index_name search_type num_hosts num_events num_searches num_apps num_jobs total_run_time num_users severity_text \
| rename severity_text as Severity index_name as Index search_type As Type num_hosts as "# Hosts" num_events as "# Events" num_apps as "# Apps" num_users as "# Users" total_run_time as "Run Time" num_searches as "Search Count" num_jobs as "# Jobs"

[ssef_scma_search_indexer_concurrency_instance]
search_name = Remote Active Searches
readonly = 1
target_component = Search & Visualization
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 18:15:13
category = Splunk
sub_category = Search
tags = SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 99B94B272CB8C6B1373AACD53406D357
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/DistributedSearch/Aboutdistributedsearch" target="_blank">Distributed Search in Splunk</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/DistSearch/SHCarchitecture" target="_blank">Search Head Performance Best Practices</a></li>\
<li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Splunk Education</a></li>\
</ul>
severity_normal_text = <br/><p>Everything looks good here. Your indexers appear to working in a healthy manner and balanced. As always you should follow up with your customer or Splunk account team to verify these results.</p>
severity_low_text = <br/><p>This search shows that some indexers are working out of balance. Please take measures to balance out this load. By rebalancing the indexer cluster, you balance the distribution of bucket copies across the set of peer nodes. A balanced set of bucket copies optimizes each peer's search load and, in the case of data rebalancing, each peer's disk storage.</p>
severity_medium_text = <br/><p>This search shows that some indexers are working out of balance. Please take measures to balance out this load. By rebalancing the indexer cluster, you balance the distribution of bucket copies across the set of peer nodes. A balanced set of bucket copies optimizes each peer's search load and, in the case of data rebalancing, each peer's disk storage.</p>
description = <p>This search evaluates the workload distribution among indexers by tracking the Maximum Average and P95 of active searches, aggregated hourly over the last 24 hours. By examining these metrics, it highlights whether some indexers are working harder than others. This analysis is instrumental in identifying and visualizing imbalances across the indexer tier. Understanding these disparities allows for better resource management and system optimization, ensuring a more balanced load distribution that can enhance overall system performance and prevent potential overloads or bottlenecks.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> > 100</li>\
<li><strong>Low:</strong> 50-99</li>\
<li><strong>Normal:</strong> < 50</li>\
<ul>
search = index=_internal sourcetype=splunkd_remote_searches Streamed search connection closed TERM(elapsedTime=*) TERM(search_id=remote_*) active_searches>0 \
    [| inputlookup ssef_splunk_instance_info_lookup WHERE name="idx*" \
    | stats values(host_name) AS host \
    | fields host ] \
| eval summary_id="ssef_scma_search_indexer_concurrency_instance" \
| fields active_searches, host \
| bin _time span=1h \
| stats list(active_searches) AS active_searches by _time host \
| `ssef_instance_info(host)` \
| streamstats dc(host) as count by _time \
| eval label = label . "-" . count \
| stats max(active_searches) as max_active_searches avg(active_searches) as avg_active_searches p95(active_searches) as p95_active_searches latest(name) as name by _time label \
| foreach max_active_searches, avg_active_searches, p95_active_searches \
    [ eval <<FIELD>>=ceiling('<<FIELD>>')] \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( p95_active_searches >= 100, medium, p95_active_searches >= 50, low, true(), normal ) \
| table _time label name severity_level p95_active_searches avg_active_searches max_active_searches \
| `ssef_handle_no_results(1,"The ssef_scma_search_indexer_concurrency_instance summary job completed successfully without identifying any issues, and everything is operating as expected.")`

