execution_plan = <b>01</b> <code>`ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user)</code><br> - Pulls summarized login and search activity while excluding system accounts.<br><b>02</b> <code>| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference)</code><br> - Normalizes sourcetype reference fields for consistency.<br><b>03</b> <code>| fields sourcetype_reference _time app label latest_logon latest_search name session num_searches search_type total_search_time user</code><br> - Selects relevant fields for usage analysis.<br><b>04</b> <code>| bin _time span=1h</code><br> - Buckets events into hourly intervals.<br><b>05</b> <code>| stats latest(*) as * by _time label app user</code><br> - Consolidates latest values per user, app, and search head per hour.<br><b>06</b> <code>| makemv delim="|" sourcetype_reference</code><br> - Converts sourcetype references into multivalue format.<br><b>07</b> <code>| where NOT match(sourcetype_reference, "[^[:ascii:]]|[\"'`*]|-too_small|\.")</code><br> - Filters out invalid or malformed sourcetype values.<br><b>08</b> <code>| stats values(sourcetype_reference) as "Sourcetype Interactions" values(label) as "Search Head(s)" values(app) as App latest(latest_logon) as latest_logon earliest(latest_logon) as earliest_logon latest(_time) as "Latest Interaction" sum(num_searches) as "Num of Searches" sum(total_search_time) as total_search_time dc(session) as num_auth by user</code><br> - Aggregates interaction metrics per user.<br><b>09</b> <code>| where num_auth&gt;0</code><br> - Keeps only users with at least one authenticated session.<br><b>10</b> <code>| eval "Total Search Time"=total_search_time/60/60</code><br> - Converts total search time to hours.<br><b>11</b> <code>| fieldformat "Total Search Time" = printf("%'.2f hrs", 'Total Search Time')</code><br> - Formats total search time for readability.<br><b>12</b> <code>| fieldformat "Num of Searches" = printf("%'.0f", 'Num of Searches')</code><br> - Formats search count values.<br><b>13</b> <code>| rename latest_logon as "Last Login", earliest_logon as "First Seen", user as "User Name", App as "App Interactions", num_auth as "# of Logins"</code><br> - Renames fields for report clarity.<br><b>14</b> <code>| convert ctime("Last Login"), ctime("Latest Interaction"), ctime("First Seen")</code><br> - Converts timestamps to human-readable format.<br><b>15</b> <code>| table "User Name" "First Seen" "Last Login" "Latest Interaction" "Search Head(s)" "Num of Searches" "App Interactions" "Sourcetype Interactions" "Total Search Time" "# of Logins"</code><br> - Produces final tabular output.<br><b>16</b> <code>| sort - "# of Logins"</code><br> - Sorts users by login frequency.<br>
explanation = <p>This search helps administrators and platform owners understand how users interact with Splunk by correlating logins, search frequency, applications used, and sourcetypes accessed. These insights support capacity planning, onboarding analysis, and identification of power users or abnormal usage patterns.</p>
quid = E6A955E9453C3F293AFFA26D3AE508B0
search_author = khutchinson
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/search?q=stats+command" target="_blank">Splunk Help: Stats Command</a><br>Details on aggregating and summarizing search results.</li><li><a href="https://help.splunk.com/en/search?q=fieldformat" target="_blank">Splunk Help: Fieldformat Command</a><br>Learn how to format field values for presentation.</li><li><a href="https://help.splunk.com/en/search?q=convert+command" target="_blank">Splunk Help: Convert Command</a><br>Reference for converting timestamps and numeric values.</li><li><a href="https://lantern.splunk.com/Search?q=user+behavior+analysis" target="_blank">Lantern: User Behavior Analysis</a><br>Best practices for analyzing user interaction patterns.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-analyze-user-search-behavior/td-p/540112" target="_blank">Community: Analyze User Search Behavior</a><br>Community discussion on tracking and interpreting user search activity.</li></ul>
description = <p>Provides a consolidated view of <b>user search behavior</b> and <b>sourcetype interactions</b> across Splunk. Highlights login activity, search volume, and time spent searching.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) \
| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
| fields sourcetype_reference _time app label latest_logon latest_search name session num_searches search_type total_search_time user \
| bin _time span=1h \
| stats latest(*) as * by _time label app user \
| makemv delim="|" sourcetype_reference \
| where NOT match(sourcetype_reference, "[^[:ascii:]]|[\"'`*]|-too_small|\.") \
| stats values(sourcetype_reference) as "Sourcetype Interactions" values(label) as "Search Head(s)" values(app) as App latest(latest_logon) as latest_logon earliest(latest_logon) as earliest_logon latest(_time) as "Latest Interaction" sum(num_searches) as "Num of Searches" sum(total_search_time) as total_search_time dc(session) as num_auth by user \
| where num_auth>0 \
| eval "Total Search Time"=total_search_time/60/60 \
| fieldformat "Total Search Time" = printf("%'.2f hrs", 'Total Search Time') \
| fieldformat "Num of Searches" = printf("%'.0f", 'Num of Searches') \
| rename latest_logon as "Last Login", earliest_logon as "First Seen", user as "User Name", App as "App Interactions", num_auth as "# of Logins" \
| convert ctime("Last Login"), ctime("Latest Interaction"), ctime("First Seen") \
| table "User Name" "First Seen" "Last Login" "Latest Interaction" "Search Head(s)" "Num of Searches" "App Interactions" "Sourcetype Interactions" "Total Search Time" "# of Logins" \
| sort - "# of Logins"

