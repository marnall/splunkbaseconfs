updated_author = akhamis
description = <p>This search tracks <b>newly created applications</b> within the IA4S dataset and summarizes daily counts. It provides visibility into <b>app onboarding and platform adoption trends</b> across the environment.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
explanation = <p>This search analyzes application lifecycle activity from the IA4S summary dataset and calculates the number of distinct new apps created per day. Platform administrators and governance teams can use this to monitor adoption velocity and understand how quickly new applications are being onboarded. High app creation rates may indicate strong platform adoption and business engagement, while unexpected spikes could warrant review for governance alignment or naming standards. By trending daily app creation, leadership gains insight into growth patterns, operational scaling requirements, and the impact of enablement initiatives across teams.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_ia4s_apps_app_activities)` num_apps_created &gt; 0</code><br> - Load IA4S summary data and filter for events where new applications were created.<br><b>02</b> <code>| fields _time label name app_name num_apps_created num_apps_modified num_apps_removed severity_level</code><br> - Retain only relevant lifecycle and identification fields for analysis.<br><b>03</b> <code>| bin _time span=1d</code><br> - Normalize timestamps into daily buckets to support trend analysis.<br><b>04</b> <code>| stats latest(*) as * by _time, label, app_name</code><br> - Deduplicate activity records per app per day.<br><b>05</b> <code>| stats dc(app_name) as "# of New Apps" by _time</code><br> - Count distinct applications created each day to measure onboarding volume.
solution = <p>This search delivers daily visibility into <b>application growth and onboarding activity</b> within IA4S.</p><p><b>Suggested Actions</b></p><ul><li>Monitor sustained increases in app creation to anticipate infrastructure scaling needs.</li><li>Review spikes in daily onboarding to ensure governance and naming standards are enforced.</li><li>Correlate adoption trends with enablement campaigns or organizational changes.</li><li>Validate that unused or duplicate apps are reviewed periodically for cleanup.</li></ul><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Scalable cloud environment to support growing application onboarding and analytics workloads.</li><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Service modeling and KPI tracking to align application growth with operational performance.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Adoption and governance advisory services to optimize application lifecycle management.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=application%20lifecycle%20adoption%20governance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps supporting application lifecycle tracking and governance visibility.</li></ul></p>
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=bin%20command" target="_blank">Splunk Docs: bin Command Search</a><br>Reference for time bucketing and data normalization (provisionally validated).</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=stats%20command" target="_blank">Splunk Docs: stats Command Search</a><br>Documentation for aggregation and distinct counting (provisionally validated).</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=dc%20function" target="_blank">Splunk Docs: dc Function Search</a><br>Details on distinct count calculations (provisionally validated).</li><li><a href="https://lantern.splunk.com/Search?q=application%20governance" target="_blank">Lantern: Application Governance Search</a><br>Guidance on managing application growth and governance (provisionally validated).</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Category</a><br>Apps supporting administrative and lifecycle visibility use cases.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q="application%20adoption"" target="_blank">Community: Application Adoption Discussions</a><br>Community insights on managing and scaling Splunk applications (provisionally validated).</li></ul>
default_viz = splunk.column
search = `ssef_summary(ssef_ia4s_apps_app_activities)` num_apps_created > 0 \
| fields _time label name app_name num_apps_created num_apps_modified num_apps_removed severity_level \
| bin _time span=1d \
| stats latest(*) as * by _time, label, app_name \
| bin _time span=1d \
| stats dc(app_name) as "# of New Apps" by _time \
| fillnull value=0 "# of New Apps"

[# of New Dashboards]
search_name = # of New Dashboards
readonly = 1
diagnostic_searches = ssef_data_ui_views
version = 1.0.7
date_updated = 2025-2-7 13:16:54
category = Splunk
sub_category = Dashboards
tags = Dashboards,IS4S,KPIs
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = FDB5D5DEB86D4C28D5F88A977404D851
updated_author = akhamis
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The number of new dashboards, custom-created and those installed from Splunk apps, added to Splunk within a selected time frame. <br><br></p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>The increase in new dashboards reflects growing use of Splunk and interest in improving daily operations. <br><br></p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>Tracking this KPI <em>monthly</em> offers insights into adoption trends, allowing organizations to assess how actively and effectively Splunk is being used to support business objectives.</p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
| bin _time span=1d \
| stats latest(newly_added) as newly_added LATEST(name) AS name by _time, label, app, sharing, author, view_name \
| bin _time span=1d \
| stats sum(eval(if(newly_added=="yes", 1, 0))) as newly_added by _time \
| eventstats avg("newly_added") as avg stdev("newly_added") as stdev \
| eval lowerBound=(avg-stdev*exact(2)), upperBound=(avg+stdev*exact(2)) \
| eval isOutlier=if('newly_added' < lowerBound OR 'newly_added' > upperBound, 1, 0) \
| where isOutlier!=1 \
| fields _time newly_added \
| rename newly_added as "# of New Dashboards"

