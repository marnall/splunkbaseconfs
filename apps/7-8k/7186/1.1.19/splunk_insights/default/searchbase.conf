| eval name=mvjoin(name, ":") \
| rex field=command mode=sed "s/\"//g" \
| search NOT command IN ("*noop*") \
| fillnull value="python2" python_version \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( python_version = "python2" OR isnull(python_version), medium, true(), normal ) \
