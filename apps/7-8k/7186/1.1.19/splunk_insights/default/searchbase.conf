[mc_fips_incompatible_apps]
search_name = FIPS-incompatible Splunk-built Apps
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Upgrade Checks
version = 1.0.1
date_updated = 2025-8-18 14:46:29
category = Health Check
sub_category = Security
tags = App Compatibility,FIPS 140-3,Health Check,Monitoring Console,Splunk 10,Summary,Upgrade
solution = Uninstall these apps.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 0F718B803D534ADEC55B0E54A51CA680
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_low_text = Found one or more apps that are known to be incompatible with the Splunk platform when it runs in FIPS mode.
description = Evaluates for the presence of apps that are not compatible with The Splunk platform when it runs in FIPS mode, and marks as Warning if any are present.
search = | rest /services/apps/local `ssef_rest_target` `ssef_rest_timeout` \
| eval summary_id="mc_fips_incompatible_apps" \
| table title, label, author, version, splunk_server \
| join splunk_server type=outer \
    [| rest /services/server/info `ssef_rest_target` `ssef_rest_timeout` \
    | fields splunk_server fips_mode \
    | stats count by splunk_server fips_mode \
    | fields splunk_server fips_mode] \
| eval split_version = split(version, ".") \
| eval installed_major = mvindex(split_version, 0) \
| eval installed_minor = mvindex(split_version, 1) \
| eval installed_patch = mvindex(split_version, 2) \
| fields - split_version \
| fields title, label, fips_mode, author, version, splunk_server \
| lookup splunk-upgrade-readiness-checks-installed-apps title \
| search check_eol_apps=* OR check_compatible_app_version=* OR check_fips_compatible_app_version=* OR check_fips_incompatible_app=* \
| eval status=if(check_fips_incompatible_app=="TRUE", "non-conforming", "conforming") \
| rename splunk_server AS instance \
| rename title AS metric \
| eval app_id=metric \
| eval severity_level = if(status=="conforming", "1","2") \
| stats max(severity_level) as severity_level by instance app_id metric \
| `ssef_handle_no_results(1,"The mc_fips_incompatible_apps summary job completed successfully without identifying any issues, and everything is operating as expected.")`

