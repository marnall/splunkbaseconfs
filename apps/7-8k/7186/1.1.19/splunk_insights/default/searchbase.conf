[ssef_scma_environment_excessive_cpu_load_average]
search_name = Excessive CPU Load Average
readonly = 1
target_component = Infra & Arch
version = 1.0.3
date_created = 2022-09-14
date_updated = 2024-5-9 13:42:4
category = Splunk
sub_category = Performance
tags = Environment,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 17E1E259921650496ABB1A3E2F6E53EF
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Administration/Troubleshooting_high_resource_usage" target="_blank">Troubleshooting High Resource Usage in Splunk Enterprise</a></li>\
<li><a href="https://community.splunk.com/t5/Installation/High-CPU-Usage-and-Load-Average/m-p/528784" target="_blank">Splunk Answers - High CPU Usage and Load Average</a></li>\
</ul>
severity_normal_text = <br/><p>This search has returned an 'informational' status. This status indicates that all instances within the environment are operating at optimal levels.</p>
severity_medium_text = <br/><p>CPU utilization has been observerved on one or more instances over a consecutive period of time. These instances should be observed to monitor for a negative impact on the Splunk environment. Please see the related link to the documentation to ensure that the instances meet or exceed the Splunk minimum server requirements.</p>
severity_high_text = <br/><p>One or more instances have been observed to have a higher than normal CPU load average over consecutive periods of time. These instance should be monitored for negative performance impact on the Splunk environment. Please see the documentation link to understand Splunks minimum server requirements.</p>
description = <p>This check, which monitors the system-wide CPU load average and issues warnings for loads that consistently exceed 0.85 relative to CPU count over four hours. Monitoring CPU utilization is essential for maintaining system health and performance. By ensuring that CPU load remains within safe operational limits, it helps prevent system slowdowns and failures that can disrupt user experiences. Maintaining smooth and efficient system performance is critical not only for user satisfaction but also for fostering trust and continued adoption of the system. Promptly addressing potential overloads ensures that users can rely on the system for their critical operations without experiencing performance degradation, thereby supporting sustained user engagement and satisfaction.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> High load over a 5 minute slice is 30 or greater.</li>\
<li><strong>Medium:</strong> Average load is between 1 and 29.</li>\
<li><strong>Normal:</strong> Average load is 0.</li>\
</ul>
search = | tstats summariesonly=true avg(data.normalized_load_avg_1min) AS load WHERE index=_introspection sourcetype::splunk_resource_usage component::Hostwide NOT host IN (`ssef_cloud_stack`) By host, _time span=5m \
| eval summary_id="ssef_scma_environment_excessive_cpu_load_average" \
| where load > .85 \
| eval host=lower(host) \
| `ssef_instance_info(host)` \
| stats count AS high_load_5m_slice avg(load) AS avg_load values(role) as role latest(name) as name latest(_time) as _time by label \
| eval avg_load=round(avg_load, 2) \
| eval role=mvjoin(role, ":") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( avg_load >= 1, high, high_load_5m_slice >= 30, medium, true(), normal ) \
| table _time label name avg_load high_load_5m_slice role severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_environment_excessive_cpu_load_average summary job completed successfully without identifying any issues, and everything is operating as expected.")`

