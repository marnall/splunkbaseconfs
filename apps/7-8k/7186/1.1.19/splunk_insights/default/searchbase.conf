[ssef_scma_inputs_modinputs_check]
search_name = # of Modular Inputs discovered in the environment
readonly = 1
target_component = GDI & Data Hygiene
version = 1.0.1
date_created = 2022-09-14
date_updated = 2024-4-9 9:28:22
category = Splunk
sub_category = Indexing
tags = GDI,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = F838758A48906B0256ABC5BEF736188C
updated_author = akhamis
related_info = <div class="diag-content-box"><div class="diag-content"> <a class="doc-drilldown" href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Experience_designations" target="_blank">https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Experience_designations</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div></div>
severity_normal_text = <br/><p>The number of modular inputs and the size of checkpoint files are within expected limits. Everything looks good.</p>
severity_medium_text = <br/><p>The number of modular inputs or the size of checkpoint files may be higher than expected. Please review these to ensure they do not impact system performance or efficiency.</p>
description = <p>This checks the number of modular inputs in the environment and measures the checkpoint files' sizes. It uses a special command called miinspect to find out the total number of checkpoint files and their total size in gigabytes (GB).</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = | miinspect `ssef_rest_target` summary=false \
| eval summary_id="ssef_scma_inputs_modinputs_check" \
| rex field=path "modinputs\/(?<modinput>.*)" \
| `ssef_instance_info(splunk_server)` \
| eval checkpoint_path_size_gb=round(checkpoint_path_size_bytes/1024/1024/1024,3) \
| stats max(checkpoint_path_count) as file_count max(checkpoint_path_size_gb) as file_size_gb latest(name) as name by label modinput \
| stats sum(file_count) as instance_file_count sum(file_size_gb) as instance_file_size_gb latest(name) as name by label \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( total_file_size_gb > 10 OR total_file_count > 1000000, medium, true(), normal ) \
| table label name instance_file_count total_file_count instance_file_size_gb total_file_size_gb severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_inputs_modinputs_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

