an-ever.html" target="_blank">Splunk Blogs: Splunk UI and the Dashboard Framework: More Visual Control Than Ever</a><p>This article discusses the capabilities of Splunk's Dashboard Framework, enabling developers to create dashboards with enhanced visual control, contributing to improved user experience.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/Viz/WorkingWithDashboardPanels" target="_blank">Splunk Docs: Working with dashboard panels</a><p>This documentation explains how to effectively work with dashboard panels in Splunk, ensuring that new dashboards are both functional and user-friendly.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/SearchTutorial/Createnewdashboard" target="_blank">Splunk Docs: Create dashboards and panels</a><p>This tutorial guides users through the process of creating dashboards and panels in Splunk, emphasizing the importance of design choices on user engagement and satisfaction.</p></li><li><a href="https://docs.splunk.com/observability/en/data-visualization/dashboards/dashboard-create-customize.html" target="_blank">Splunk Docs: Create and customize dashboards</a><p>This resource provides information on creating and customizing dashboards in Splunk Observability Cloud, highlighting features that can enhance the user experience.</p></li><li><a href="https://www.splunk.com/en_us/resources/videos/how-to-create-custom-dashboards-and-alerts-to-achieve-the-best-mean-time-to-detection.html" target="_blank">How to Create Custom Dashboards and Alerts to Achieve the Best Mean Time to Detection</a><p>This video demonstrates how to create custom dashboards and alerts in Splunk, focusing on improving detection times and overall user experience.</p></li></ul>
