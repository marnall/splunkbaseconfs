[Total_#_of_search_hours_export]
search_name = Total # of Search Hours Export
readonly = 1
target_component = Users
version = 2.0
date_created = 2025-12-15
date_updated = 2025-12-15
category = Splunk
sub_category = Search
tags = Details,IS4S Data Export
solution = <p>This KPI provides a performance-oriented summary of Splunk platform usage by capturing total search runtime in hours.</p><p><b>Suggested Actions</b><br><b>1.</b> Use in monthly and quarterly adoption reports.<br><b>2.</b> Investigate sharp increases that may indicate changes in search behavior.<br><b>3.</b> Compare against licensed resources for optimization opportunities.<br><b>4.</b> Alert on abnormal spikes to detect potential inefficient queries.<br><b>5.</b> Integrate into executive dashboards for transparency into Splunk ROI.</p><p> Recommended For You: <ul><li><a href="https://www.cisco.com/c/en/us/solutions/analytics.html" target="_blank">Cisco Business Analytics Solutions</a><br>Use to correlate Splunk search time with broader enterprise data analytics patterns.</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Monitoring_Splunk/Track_your_search_activity" target="_blank">Lantern: Track your search activity</a><br>Use to monitor and analyze search execution metrics within Splunk environments.</li></ul></p>
dispatch_earliest_time = -8d@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_audit_user_login_tracker)`</code><br>      - Loads summary-level audit data about user search activities.<br><b>02</b> <code>| eval summary_id="Total_#_of_Search_Hours_Export"</code><br>      - Assigns an identifier to tag the export for traceability.<br><b>03</b> <code>| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference)</code><br>      - Ensures sourcetype reference field normalization.<br><b>04</b> <code>| fields ...</code><br>      - Retains only relevant metadata and performance metrics.<br><b>05</b> <code>| bin _time span=1h</code><br>      - Buckets events hourly for accurate aggregation.<br><b>06</b> <code>| stats latest(*) as * by _time , label, app, user</code><br>      - Compresses event granularity to most recent values per dimension.<br><b>07</b> <code>| timechart ... As kpi_value span=1d</code><br>      - Converts search time to hours and trends it daily.<br><b>08</b> <code>| where isnotnull(kpi_value) AND kpi_value!=""</code><br>      - Filters out null or empty data points.<br><b>09</b> <code>| eval customer_name = `ssef_customer_name`, ...</code><br>      - Adds export and context metadata fields.<br><b>10</b> <code>| rename _time as timechart_time</code><br>      - Prepares time field for export format.<br><b>11</b> <code>| table ...</code><br>      - Finalizes output for downstream use.<br><b>12</b> <code>| `ssef_handle_no_results(...)`</code><br>      - Applies macro to gracefully handle empty results.<br>
explanation = <p>By aggregating and converting total search durations into hours, this search enables organizations to quantify the scale of Splunk search execution. It supports tracking platform usage and assessing user adoption trends over time. This metric is helpful for teams responsible for platform utilization, executive reporting, and proactive capacity planning. The result also supports optimization efforts by highlighting elevated usage that may indicate inefficient searches, user training gaps, or new business demands.</p>
quid = C416279ABC599383D6A77CE6352E70C4
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/timechart" target="_blank">Splunk Docs: timechart</a><br>Documentation on the timechart command and time-based aggregations.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/stats" target="_blank">Splunk Docs: stats</a><br>How to use <code>stats</code> for summarizing data.</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Data_Management/Search_job_monitoring_and_performance" target="_blank">Lantern: Search job monitoring and performance</a><br>Review best practices for search tuning and resource usage.</li><li><a href="https://community.splunk.com/t5/Monitoring-Splunk/bd-p/monitoring-splunk" target="_blank">Splunk Community: Monitoring Splunk</a><br>Peer support for monitoring search behavior and resource load.</li></ul>
description = <p>This search calculates the <b>total number of search execution hours</b> within a selected timeframe using SSEF audit summary data. It derives this KPI by converting total search duration in seconds to hours for better interpretability across operational reporting dashboards.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
search = `ssef_summary(ssef_audit_user_login_tracker)` \
| eval summary_id="Total_#_of_Search_Hours_Export" \
| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type role index_reference sourcetype_reference datamodel_reference \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| timechart partial=t fixedrange=t eval(round(sum(total_search_time) / 60 / 60, 0)) As kpi_value span=1d  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "Total # of Search Hours" , export_time = now() \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) \
| rename _time as timechart_time \
| table timechart_time export_time customer_name kpi_name kpi_value severity_level \
| `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

