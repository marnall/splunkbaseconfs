description = <p>How to Review <br>Gain an overview of the last time each of the detections has fired - this helps identify when detections rarely fire / never fire and may need to be tested / validated to ensure they are effective. The second search provides a breakdown which can be used to selectively review the noisy contributors.</p>
search = index=notable \
| eval summary_id="correlation_search_strike_rate_2" \
| `ssef_instance_info(host)` \
| stats max(_time) as _time count(eval(if(match(disposition_label,"(?i)true\s+positive"),disposition_label,null()))) as tp_count, count(eval(if(match(disposition_label,"(?i)false\s+positive"),disposition_label,null()))) as fp_count, count(eval(if(match(disposition_label,"(?i)benign\s+positive"),disposition_label,null()))) as bp_count count as total_count by label source \
| rename source as savedsearch_name \
| append \
    [| search `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 \
    | stats latest() as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
    | stats latest(savedsearch_search) as search by label savedsearch_name \
    | eval mockCount="0" \
    | fields label savedsearch_name mockCount ] \
| stats values(mockCount) as mockCount values(total_count) as total_count, values(tp_count) as tp_count, values(fp_count) as fp_count, values(bp_count) as bp_count values(_time) as _time by label savedsearch_name \
| eval total_count=coalesce(total_count,mockCount) \
| eval last_triggered=case(_time>now()-86400*7,"past_week",_time<now()-86400*7 AND _time>now()-86400*31,"past_month",_time<now()-86400*31 AND _time>now()-86400*92,"past_3_months",_time<now()-86400*92 AND _time>now()-86400*92*2,"past_6_months",_time<now()-86400*92*2,"over_6_months_ago",total_count="0","never",1=1,"error") \
| eval last_triggered_num=case(_time>now()-86400*7,"1",_time<now()-86400*7 AND _time>now()-86400*31,"2",_time<now()-86400*31 AND _time>now()-86400*92,"3",_time<now()-86400*92 AND _time>now()-86400*92*2,"4",_time<now()-86400*92*2,"5",total_count="0","6",1=1,"7") \
| sort + last_triggered_num - total_count \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = normal \
| table label savedsearch_name bp_count fp_count last_triggered severity_level total_count tp_count \
| `ssef_handle_no_results(1,"The correlation_search_strike_rate_2 summary job completed successfully without identifying any issues, and everything is operating as expected.")`

