[mc_expiring_or_expired_licenses]
search_name = Expiring or expired licenses
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Indexing
category = Health Check
sub_category = Data Indexing
tags = Health Check,Licensing,Monitoring Console,Summary
solution = Contact your sales representative if you need a new license. Make sure to delete already expired licenses on the license manager page.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = E555F63980962A5059765E66DA8933E3
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = One or more licenses installed on your license manager(s) have expired or will expire soon.
description = This checks for licenses that are about to expire or have already expired.
search = | rest `ssef_rest_target` `ssef_rest_timeout` splunk_server_group=dmc_group_license_master /services/licenser/licenses \
| eval summary_id="mc_expiring_or_expired_licenses" \
| join type=outer group_id splunk_server [ \
    rest `ssef_rest_target` `ssef_rest_timeout` splunk_server_group=dmc_group_license_master /services/licenser/groups \
    | where is_active = 1 \
    | rename title AS group_id \
    | fields is_active group_id splunk_server] \
| where is_active = 1 \
| eval days_left = floor((expiration_time - now()) / 86400) \
| where NOT (quota = 1048576 OR label == "Splunk Enterprise Reset Warnings" OR label == "Splunk Lite Reset Warnings") \
| eval status = case(days_left >= 14, days_left." days left", days_left < 14 AND days_left >= 0, "Expires soon: ".days_left." days left", days_left < 0, "Expired") \
| eval size_gb = round(quota/1024/1024/1024,3) \
| fields splunk_server label license_hash size_gb days_left status \
| eval license_info = label." (size = ".size_gb." GB ; hash = ".license_hash.") - ".status \
| eval severity_level = case (days_left >= 14, 1, days_left < 14 AND days_left >= 0, 2, days_left < 0, 3) \
| stats values(license_info) AS license_information max(severity_level) AS severity_level by splunk_server \
| rename splunk_server AS instance\
| `ssef_handle_no_results(1,"The mc_expiring_or_expired_licenses summary job completed successfully without identifying any issues, and everything is operating as expected.")`

