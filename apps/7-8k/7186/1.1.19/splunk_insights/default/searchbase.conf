description = <p>Analyzes <b>newly created user activity</b> to determine their <b>peak login times</b>. Helps track when new users begin engaging with Splunk after account creation.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
