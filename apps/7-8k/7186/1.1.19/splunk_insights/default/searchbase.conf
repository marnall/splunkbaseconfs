[summary_inefficient_dashboard_panels]
search_name = Dashboard Panel Limits
readonly = 1
ssef_cron = weekly
target_component = Search & Visualization
version = 2.0.0
date_created = 2025-08-08
date_updated = 2025-11-9 18:51:20
category = Splunk
sub_category = _internal
tags = Dashboards,EFS,Monitoring,Performance
solution = <p>Helps identify and manage dashboards with excessive panels that could impact performance and user experience.</p><p><b>Suggested Actions</b><br><b>1.</b> Review dashboards exceeding 20 panels for necessity of all visualizations.<br><b>2.</b> Split overly complex dashboards into multiple focused dashboards.<br><b>3.</b> Evaluate panel search efficiency to reduce load time.<br><b>4.</b> Work with dashboard authors to apply best practices.<br><b>5.</b> Implement review processes for new dashboards before deployment.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (dashboards_with_over_20_panels&lt;=2,1, dashboards_with_over_20_panels&lt;=5,2, dashboards_with_over_20_panels&lt;=10,3, dashboards_with_over_20_panels&lt;=20,4, dashboards_with_over_20_panels&gt;20,5)</code></pre><p>Place this before the final <code>| table</code> to categorize alert severity. <b>Adjust thresholds</b> based on dashboard governance policies.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> 0–2 dashboards exceed threshold.</li><li><b>Low (Severity 2):</b> 3–5 dashboards.</li><li><b>Medium (Severity 3):</b> 6–10 dashboards.</li><li><b>High (Severity 4):</b> 11–20 dashboards.</li><li><b>Critical (Severity 5):</b> More than 20 dashboards — significant UI performance risk.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/data/ui/views f=title f=eai:* f=author</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve dashboard definitions, including XML content and metadata.<br><b>02</b> <code>| rex field=eai:data max_match=0 "(?&lt;panels&gt;&lt;panel&gt;)"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extract all panel tags from dashboard XML.<br><b>03</b> <code>| eval panel_count=mvcount(panels)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count the number of panels per dashboard.<br><b>04</b> <code>| where panel_count &gt; 20</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter dashboards exceeding the panel count threshold.<br><b>05</b> <code>| fields title panel_count author</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Select key fields for reporting.<br><b>06</b> <code>| stats count as dashboards_with_over_20_panels</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count how many dashboards exceed the threshold.<br><b>07</b> <code>| eval severity_level = case (dashboards_with_over_20_panels&lt;=2,1, dashboards_with_over_20_panels&lt;=5,2, dashboards_with_over_20_panels&lt;=10,3, dashboards_with_over_20_panels&lt;=20,4, dashboards_with_over_20_panels&gt;20,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity based on the number of affected dashboards.<br><b>08</b> <code>| table dashboards_with_over_20_panels severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Display final count and severity classification.<br>
quid = 29F1EEE019DA85D4B557C7BEFC9B9C69
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>Very few dashboards have more than 20 panels; dashboard performance impact is minimal.</p>
severity_low_text = <p>Low number of dashboards exceeding 20 panels; minor performance concerns possible.</p>
severity_medium_text = <p>Moderate number of dashboards exceed 20 panels; review for potential load time issues.</p>
severity_high_text = <p>High number of dashboards exceed 20 panels; performance degradation likely for affected dashboards.</p>
severity_critical_text = <p>Excessive dashboards with more than 20 panels; immediate action recommended to optimize performance.</p>
description = <p>This search, which is conducted via REST, is looking at all the classic dashboards that exist that have more than 20 panels contained in them. Dashboards with this many panels tend to be egregious & inefficient and should be split up into many different dashboards. Having too many searches run within one dashboard will consume resources inefficiently & not be very valuable</p>
viz_options = { "count":100 }
search = `ssef_summary(ssef_data_ui_views)` \
| eval summary_id="summary_inefficient_dashboard_panels" \
| stats latest(num_panels) as num_panels by label, app, sharing, author, view_name \
| where num_panels > 20 \
| stats count as dashboards_with_over_20_panels \
| eval severity_level = case (dashboards_with_over_20_panels<=2,1, dashboards_with_over_20_panels<=5,2, dashboards_with_over_20_panels<=10,3, dashboards_with_over_20_panels<=20,4, dashboards_with_over_20_panels>20,5) \
| table dashboards_with_over_20_panels severity_level \
| `ssef_handle_no_results(1,"The summary_inefficient_dashboard_panels summary job completed successfully without identifying any issues, and everything is operating as expected.")`

