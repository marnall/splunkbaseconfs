[mc_deprecated_call_check]
search_name = Deprecated REST API Call Check
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Search & Visualization
version = 1.0.6
date_updated = 2025-8-21 10:33:31
category = Health Check
sub_category = Search
tags = Health Check,Monitoring Console,Search,Splunk 10,Summary
solution = Review any apps or users that are calling these deprecated endpoints and update them to use the latest REST endpoints.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = F63495EB44432DB8D2616B261869DC60
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = Within the last 7 days one or more calls to deprecated search endpoints were made.
severity_high_text = Within the last 7 days one or more calls to deprecated search endpoints were made.
description = Evaluates whether calls are made to deprecated REST API version 1.0 endpoints and marks as Critical if any are present.
search = earliest=-7d@d index=_internal method=GET (sourcetype::splunkd_access OR sourcetype::splunkd_ui_access OR sourcetype::splunk_web_access) \
    (uri="*/results_preview?search=*" \
    OR uri="*/results_preview?%&search=*" \
    OR uri="*/results?search=*" \
    OR uri="*/results?%&search=*" \
    OR uri="*/results/export?search=*" \
    OR uri="*/results/export?%&search=*" \
    OR uri="*/events?search=*" \
    OR uri="*/events?%&search=*" \
    OR uri="*/events/export?search=*" \
    OR uri="*/events/export?%&search=*" \
    OR uri="*/jobs/export*" \
    OR uri="*/parser*") AND NOT uri="*/v2/*" \
| eval summary_id="mc_deprecated_call_check" \
| eval metric="user=".user." uri=".uri \
| rename host AS instance \
| table instance metric \
    ```remove SPL below to get complete list of deprecated API calls and the user``` \
| stats count AS deprecated_api_calls by instance \
| append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" deprecated_api_calls \
    | table instance deprecated_api_calls] \
| stats sum(deprecated_api_calls) AS deprecated_api_calls by instance \
| eval metric="Deprecated_API_Calls=".deprecated_api_calls \
| eval severity_level=if(deprecated_api_calls>0,3,1) \
| fields - deprecated_api_calls \
| `ssef_handle_no_results(1,"The mc_deprecated_call_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

