[summary_searches_with_high_memory_use]
search_name = High Memory Searches
readonly = 1
ssef_cron = weekly
target_component = Search & Visualization
version = 2.0
date_created = 2025-08-08
date_updated = 2025-11-8 14:9:46
category = Splunk
sub_category = _internal
tags = Dashboards,EFS,Performance,Summary,_introspection
solution = <p>Identifies high-memory or long-running dashboard searches for targeted optimization.</p><p><b>Suggested Actions</b><br><b>1.</b> Optimize dashboard SPL to reduce runtime and memory usage.<br><b>2.</b> Use accelerated data models or summary indexes.<br><b>3.</b> Schedule searches instead of running them on-demand.<br><b>4.</b> Educate users on dashboard best practices.<br><b>5.</b> Monitor after changes to confirm improvements.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (daily_avg_searches_with_high_memory_usage=0,1, daily_avg_searches_with_high_memory_usage<=5,2, daily_avg_searches_with_high_memory_usage<=10,3, daily_avg_searches_with_high_memory_usage<=20,4, daily_avg_searches_with_high_memory_usage>20,5)</code></pre><p>This SPL should be inserted before the final <code>| table</code> to classify severity. Thresholds can be tuned based on system capacity and acceptable dashboard performance.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No dashboards exceed thresholds.</li><li><b>Low (Severity 2):</b> 1–5 daily occurrences.</li><li><b>Medium (Severity 3):</b> 6–10 occurrences.</li><li><b>High (Severity 4):</b> 11–20 occurrences.</li><li><b>Critical (Severity 5):</b> More than 20 daily occurrences.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_introspection sourcetype="splunk_resource_usage" ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve introspection logs for resource usage by dashboards.<br><b>02</b> <code>| rename data.* as * , search_props.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Flatten nested field names for easier processing.<br><b>03</b> <code>| stats count ... by provenance</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate key metrics per dashboard provenance.<br><b>04</b> <code>| eval max_elapsed=round(max_elapsed/60,2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Convert max elapsed time to minutes.<br><b>05</b> <code>| stats count as daily_avg_searches_with_high_memory_usage</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Determine daily average of searches exceeding thresholds.<br><b>06</b> <code>| eval severity_level = case (daily_avg_searches_with_high_memory_usage=0,1, daily_avg_searches_with_high_memory_usage<=5,2, daily_avg_searches_with_high_memory_usage<=10,3, daily_avg_searches_with_high_memory_usage<=20,4, daily_avg_searches_with_high_memory_usage>20,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity levels where more heavy searches = greater performance risk.<br><b>07</b> <code>| table daily_avg_searches_with_high_memory_usage severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Present KPI and severity.<br>
quid = C0B2D96FCF33272C8CAB3BD7BA74B715
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>No high-memory or long-running dashboard searches detected.</p>
severity_low_text = <p>Few dashboards exceed thresholds; monitor and review if trend grows.</p>
severity_medium_text = <p>Moderate number of dashboards exceed thresholds; optimization recommended.</p>
severity_high_text = <p>High number of dashboards exceed thresholds; system performance may be impacted.</p>
severity_critical_text = <p>Severe dashboard performance impact; immediate optimization required.</p>
description = <p>This search looks for searches that consume over 5GB (5,120 bytes) of memory & returns the unique number of searches that are deemed high memory usage per day. Then an average is calculated so that we can get a daily average of offending searches.High memory searches, especially at 5GB mark, are consuming a significant amount of memory that exists within the search head. This can cause waiting periods for other users on the platform to wait for this memory to be released for their searches.</p>
viz_options = { "count":100 }
search = | tstats summariesonly=true count as dashboard_executions max(data.mem_used) as max_mem_used max(data.elapsed) as max_elapsed dc(data.search_props.user) as daily_distinct_dashboard_users dc(host) as dc_host WHERE index=_introspection sourcetype="splunk_resource_usage" data.search_props.sid=* data.search_props.mode!=RT data.search_props.user!="splunk-system-user" data.search_props.type="ad-hoc" data.search_props.provenance="UI:Dashboard*" (data.mem_used>1000 OR data.elapsed>3600) BY data.search_props.provenance\
| eval summary_id="summary_searches_with_high_memory_use"\
| eval max_elapsed=round(max_elapsed/60,2)\
| stats count as daily_avg_searches_with_high_memory_usage\
| eval severity_level = case (daily_avg_searches_with_high_memory_usage=0,1, daily_avg_searches_with_high_memory_usage<=5,2, daily_avg_searches_with_high_memory_usage<=10,3, daily_avg_searches_with_high_memory_usage<=20,4, daily_avg_searches_with_high_memory_usage>20,5)\
| table daily_avg_searches_with_high_memory_usage severity_level\
| `ssef_handle_no_results(1,"The summary_searches_with_high_memory_use summary job completed successfully without identifying any issues, and everything is operating as expected.")`

