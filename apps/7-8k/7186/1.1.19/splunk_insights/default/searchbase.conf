description = <p>For Splunk Enterprise deployments, the 'runshellscript' command executes scripted alerts. This command is not supported as a search command. While powerful, this command is considered risky because, if used incorrectly, it can pose a security risk or potentially lose data when it runs. As a result, this command triggers SPL safeguards. See SPL safeguards for risky commands in Securing the Splunk Platform. </p>\
