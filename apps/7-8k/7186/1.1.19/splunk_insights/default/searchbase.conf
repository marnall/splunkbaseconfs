[ssef_scma_forwarder_output_connection_issues]
search_name = Connection Issues
readonly = 1
target_component = GDI & Data Hygiene
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 12:47:8
category = Splunk
sub_category = GDI
tags = GDI,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
