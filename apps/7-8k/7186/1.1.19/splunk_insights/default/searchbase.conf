solution = <p>This view highlights sourcetypes that place the heaviest load on indexing infrastructure. This allows early detection of skewed data loads or ingestion latency, supporting capacity planning and triage.</p><p><b>Suggested Actions</b><ul><li>Investigate sourcetypes with high average or max event age for clock sync or delivery delays.</li><li>Optimize heavy sourcetypes using parsing improvements or load balancing.</li><li>Alert or dashboard this report for ongoing visibility into ingestion pressure.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/observability.html" target="_blank">Products: Splunk Observability Cloud</a><br>Helps monitor infrastructure health and resource usage across environments.</li><li><a href="https://lantern.splunk.com/Search?q=%22indexing%20performance%22" target="_blank">Lantern: Indexing Performance</a><br>Techniques and guidance on optimizing indexing pipelines.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=mlog%20thruput" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps that enhance metrics collection and visibility for indexing.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| mstats fillnull_value=0 ... by series</code><br> - Pull metrics for throughput, event age, and volume by sourcetype, filtering out internal and non-user data.<br><b>02</b> <code>| fillnull value=0 ...</code><br> - Ensure no null values impact downstream math.<br><b>03</b> <code>| where total_kbps > 1</code><br> - Keep only active sources with meaningful data flow.<br><b>04</b> <code>| eventstats sum(...)</code><br> - Calculate overall totals for normalization.<br><b>05</b> <code>| eval relative_resource_score = ...</code><br> - Compute a normalized 0–1 score blending volume and throughput weight.<br><b>06</b> <code>| sort 10 - relative_resource_score</code><br> - Return top 10 most resource-intensive sourcetypes.<br><b>07</b> <code>| rename series as Sourcetype</code><br> - Final field label normalization.<br><b>08</b> <code>| foreach ... round()</code><br> - Format key numeric metrics for readability.<br><b>09</b> <code>| table ...</code><br> - Build the output report.<br><b>10</b> <code>| rename ...</code><br> - Provide presentation-ready headers.<br>
explanation = <p>This search estimates relative data pressure by sourcetype based on event volume and kilobytes per second metrics collected from Splunk’s throughput processor. It also incorporates average and maximum event age to expose ingestion lag or delays in data arrival. The score helps platform teams identify which sourcetypes are consuming the most indexing resources and should be prioritized for troubleshooting or optimization. Data with high throughput and aging metrics may indicate time sync problems or delayed log delivery.</p>
