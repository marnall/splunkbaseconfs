[summary_indexers_reaching_disk_capacity]
search_name = Indexers Reaching Disk Capacity
readonly = 1
ssef_cron = weekly
target_component = Infra & Arch
version = 3.0.1
date_created = 2025-08-08
date_updated = 2025-11-8 14:4:27
category = Splunk
sub_category = _internal
tags = Disk,EFS,Monitoring,Summary,Usage
solution = <p>Highlights storage capacity risks within Splunk infrastructure for proactive remediation.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts with high usage for large hot/warm bucket retention.<br><b>2.</b> Verify partition configurations in OS and Splunk settings.<br><b>3.</b> Implement indexer tier scaling or storage expansion plans.<br><b>4.</b> Clean up unused or orphaned buckets.<br><b>5.</b> Set up continuous monitoring to prevent data loss from storage exhaustion.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (high_disk_usage_count&lt;=2,1, high_disk_usage_count&lt;=5,2, high_disk_usage_count&lt;=10,3, high_disk_usage_count&lt;=20,4, high_disk_usage_count&gt;20,5)</code></pre><p>This SPL should be added before the final <code>| table</code> command in your search pipeline to categorize host risk. <b>Adjust thresholds</b> based on your indexer fleet size and retention policies.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> 0–2 hosts with sustained high usage.</li><li><b>Low (Severity 2):</b> 3–5 hosts.</li><li><b>Medium (Severity 3):</b> 6–10 hosts.</li><li><b>High (Severity 4):</b> 11–20 hosts.</li><li><b>Critical (Severity 5):</b> More than 20 hosts — immediate storage intervention required.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_introspection sourcetype="splunk_disk_objects" component=Partitions</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve partition-level disk usage metrics from internal Splunk introspection logs.<br><b>02</b> <code>| bin span=10m@m _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Align events into 10-minute time buckets.<br><b>03</b> <code>| eval free=if(isnotnull('data.available'),'data.available','data.free'), usage=round(('data.capacity'-free)/1024,2), capacity=round('data.capacity'/1024,2), pct_usage=(usage/capacity)*100</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate free space, used space, total capacity (GB), and usage percentage.<br><b>04</b> <code>| eval free=round(free/1024,2), pct_usage=round(pct_usage,2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Convert free space to GB and round values.<br><b>05</b> <code>| stats avg(free) as avg_free avg(usage) as avg_usage avg(capacity) as avg_capacity avg(pct_usage) as avg_pct_usage by host,_time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Compute average disk metrics for each host and time bucket.<br><b>06</b> <code>| where avg_pct_usage &gt; 90</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter for high-usage partitions over 90% utilization.<br><b>07</b> <code>| stats count as high_disk_usage_count avg(avg_pct_usage) as aggre_avg_pct_usage by host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate number of high-usage samples per host.<br><b>08</b> <code>| where high_disk_usage_count &gt; 504</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Identify hosts with persistent high usage (over 3.5 days at 10-min intervals).<br><b>09</b> <code>| eventstats count as high_disk_usage_count</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Append the count of such hosts across all results.<br><b>10</b> <code>| eval high_disk_usage_count=round(high_disk_usage_count,2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Round count for clean reporting.<br><b>11</b> <code>| eval severity_level = case (high_disk_usage_count&lt;=2,1, high_disk_usage_count&lt;=5,2, high_disk_usage_count&lt;=10,3, high_disk_usage_count&lt;=20,4, high_disk_usage_count&gt;20,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity levels based on count of affected hosts.<br><b>12</b> <code>| table high_disk_usage_count severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Display summarized host count and severity classification.<br>
quid = 09678386C96AC9396748F86E10952150
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>Few or no hosts are experiencing sustained high disk usage; storage health is optimal.</p>
severity_low_text = <p>Low number of hosts with sustained high disk usage; monitor for early signs of storage pressure.</p>
severity_medium_text = <p>Moderate number of hosts with sustained high disk usage; investigate and plan capacity adjustments.</p>
severity_high_text = <p>High number of hosts with sustained high disk usage; performance degradation and indexing delays likely.</p>
severity_critical_text = <p>Widespread sustained high disk usage across hosts; immediate remediation required to prevent outages.</p>
description = <p>While looking at all the instances within the Splunk ecosystem over the period of a business week, this search looks to see how much of the CPU capacity is used over 5 time-minute slices. Load average was selected vs. % use as it's more accurate whilst still indicating user activity on the system. </p>
search = | tstats summariesonly=true avg(data.available) as avg_available avg(data.free) as avg_free avg(data.capacity) as avg_capacity WHERE index=_introspection sourcetype="splunk_disk_objects" component=Partitions by host _time span=10m\
| eval summary_id="summary_indexers_reaching_disk_capacity"\
| eval free=coalesce(avg_available, avg_free), usage=round((avg_capacity - free)/1024, 2), capacity=round(avg_capacity/1024, 2), pct_usage=round((usage/capacity)*100, 2), free=round(free/1024, 2)\
| stats avg(free) as avg_free avg(usage) as avg_usage avg(capacity) as avg_capacity avg(pct_usage) as avg_pct_usage by host _time\
| where avg_pct_usage > 90\
| stats count as high_disk_usage_count avg(avg_pct_usage) as aggre_avg_pct_usage by host\
| where high_disk_usage_count > 504\
| eventstats count as high_disk_usage_count\
| eval high_disk_usage_count=round(high_disk_usage_count, 2)\
| eval severity_level = case (high_disk_usage_count<=2,1, high_disk_usage_count<=5,2, high_disk_usage_count<=10,3, high_disk_usage_count<=20,4, high_disk_usage_count>20,5)\
| table high_disk_usage_count severity_level\
| `ssef_handle_no_results(1,"The summary_indexers_reaching_disk_capacity summary job completed successfully without identifying any issues, and everything is operating as expected.")`

