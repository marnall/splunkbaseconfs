description = <p>Lists sourcetypes that were ingested during the reporting period and for which limited or no search activity was recorded. The value shown is the total license usage (in GB) for each of these <strong>potentially</strong> unused sourcetypes. This serves as an <strong>estimate</strong> to help identify data sources that may not be actively utilized, guiding efforts in data lifecycle optimization and license cost management.</p>
