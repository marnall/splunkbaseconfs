[# of Active Users]
search_name = # of Active Users
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker
version = 1.1.9
date_updated = 2025-10-30 17:32:13
category = Splunk
sub_category = Users
tags = IS4S,KPIs,Users
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = D6BC701961B009E91AD487416C377571
updated_author = akhamis
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The distinct count of users who have authenticated to Splunk within a selected time frame.</p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>Monitoring the trend of active users is critical. An increase suggests that Splunk is becoming more integrated and valuable in daily workflows, indicating a positive impact. Conversely, a decrease may highlight areas for investigation to improve its utility and maintain its status as an essential organizational tool.</p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>It is advisable to track this KPI <em>weekly</em>, <em>monthly</em>, and <em>quarterly</em> for optimal insight.</p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) num_searches>0 search_type="*adhoc*"\
| bin _time span=1d\
| stats count by _time, user\
| appendcols\
    [ search `ssef_summary(ssef_identities)` NOT identity IN (`ssef_default_users`)\
    | bin _time span=1d\
    | stats dc(identity) as total_authorized by _time ]\
| filldown total_authorized\
| addinfo\
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by user\
| eval perc_active = round((num_active_days / num_days) * 100, 2)\
| fillnull value=0 perc_active total_authorized\
| eval active_user = if(perc_active >= `ssef_perc_active_threshold`, user, null() )\
| stats max(total_authorized) as total_authorized dc(user) as all_users dc(active_user) as active_users max(num_days) as num_days by _time\
| eval reg_seen_to_total = ceiling((active_users / total_authorized) * 100) , threshold=`ssef_perc_active_threshold`\
| timechart partial=f fixedrange=t max(all_users) as "# of Active Users" span=1d

[# of Analytic Capabilities Added by Apps]
search_name = # of Analytic Capabilities Added by Apps
readonly = 1
diagnostic_searches = ssef_configs_conf_props
version = 1.2.1
date_updated = 2025-2-7 11:45:8
category = Splunk
sub_category = Capabilities
tags = Apps,Capabilities,IS4S,KPIs
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 6EF018727CB16A8EB4D056766CAF50AC
updated_author = akhamis
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The number of analytical capabilities introduced or utilized by apps within Splunk, for the selected time frame. <br><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>Splunk apps, which typically include dashboards and always contain knowledge objects, significantly enhance the value derived from indexed data. By tracking this aspect alongside other metrics related to apps and their contribution to adoption, this insight enriches the understanding of how apps add value to Splunk. This supports ensuring that Splunk aligns with business goals through both adoption and capability attainment. <br><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>Monitoring this KPI <em>monthly</em>, <em>quarterly</em>, and <em>yearly</em> is recommended to maximize strategic insights.</p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_configs_conf_props)` NOT app IN (`ssef_default_apps`) NOT title IN (splunk*,source::*,*?*,*\(*,-too_small*)\
| fields _time, label, name, Splunk_Instance, app, title, sharing, author, app \
| bin _time span=1d \
| stats count by _time title \
| rename title as sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type \
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type \
| stats count by _time data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUT use_case \
| stats count by _time use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type \
| stats count by _time use_case use_case_type \
| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()) , Analytic_Capabilities = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null()) \
| stats dc(Analytic_Capabilities) as "# of Analytic Capabilities Added by Apps" by _time

