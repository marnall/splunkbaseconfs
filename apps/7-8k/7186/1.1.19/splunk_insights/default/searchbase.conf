[Total # of Search Hour Details]
search_name = Total # of Search Hour Details
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker
version = 1.0.5
date_created = 2024-9-25 19:14:27
date_updated = 2024-9-26 14:26:10
category = Splunk
sub_category = Search
tags = Adoption,Details,Search
solution = <p>This search helps identify users whose ad-hoc activity may be driving disproportionate compute usage.</p><p><b>Suggested Actions</b><br>• Review top users for opportunities to convert ad-hoc searches into dashboards or reports<br>• Provide targeted SPL optimization training for heavy users<br>• Evaluate role-based limits for excessive interactive usage<br>• Monitor trends over time to validate optimization efforts</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise.html" target="_blank">Products: Splunk Enterprise</a><br>Core platform for analyzing and managing search workloads.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Managed Splunk service with elastic scaling for ad-hoc workloads.</li><li><a href="https://splunkbase.splunk.com/app/1465" target="_blank">Splunkbase: Keyword App</a><br>Helps analyze SPL usage patterns and expensive keywords.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=search+performance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Additional apps focused on search performance and optimization.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_audit_user_login_tracker)`</code><br> - Loads summarized user search activity from IS4S.<br><b>02</b> <code>| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type role index_reference sourcetype_reference datamodel_reference</code><br> - Selects user, context, and performance-related fields.<br><b>03</b> <code>| bin _time span=1h</code><br> - Normalizes activity into hourly time buckets.<br><b>04</b> <code>| stats latest(*) as * by _time , label, app, user</code><br> - Retains the most recent values per hour and user context.<br><b>05</b> <code>| stats sum(eval(total_search_time/60/60)) As "Total Search Time" by label, app, user</code><br> - Converts cumulative search time into hours per user.<br><b>06</b> <code>| sort - "Total Search Time"</code><br> - Ranks users by highest total ad-hoc search time.</p>
explanation = <p>This search provides visibility into how much cumulative time users spend running ad-hoc searches, which is a strong indicator of interactive workload pressure on the Splunk platform. Users with high total search time may be exploring data manually instead of relying on dashboards, reports, or scheduled jobs. This insight is valuable for Splunk administrators and platform teams when identifying optimization opportunities, training needs, or candidates for dashboard creation. Reducing excessive ad-hoc search time can directly improve overall system responsiveness and cost efficiency.</p>
quid = 7C55A8BD471560DCC67AC550E30552A7
search_author = khutchinson
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=ad-hoc+search+performance" target="_blank">Splunk Docs: Ad-hoc Search Performance</a><br>Documentation related to optimizing interactive search workloads.</li><li><a href="https://help.splunk.com/en/search?q=optimize+searches" target="_blank">Splunk Help: Optimize Searches</a><br>Guidance on improving search efficiency and reducing runtime.</li><li><a href="https://lantern.splunk.com/Search?q=Search%20Performance" target="_blank">Lantern: Search Performance</a><br>Best practices for improving Splunk search performance.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q=ad-hoc+search+performance" target="_blank">Community: Ad-hoc Search Performance</a><br>Community discussions and real-world tuning examples.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=search+workload+management" target="_blank">Splunk Docs: Search Workload Management</a><br>Information on managing and prioritizing search workloads.</li><li><a href="https://lantern.splunk.com/Search?q=Search%20Optimization" target="_blank">Lantern: Search Optimization</a><br>Practical recommendations for reducing search cost.</li></ul>
description = <p>Measures <b>total ad-hoc search time</b> consumed by each <b>user</b> across apps and search heads. This search highlights where <b>manual search activity</b> is driving compute utilization.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) num_searches>0 search_type="*adhoc*" \
| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type role index_reference sourcetype_reference datamodel_reference \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| stats sum(eval(total_search_time/60/60)) As "Total Search Time" by label, app, user \
| sort - "Total Search Time" \
| fieldformat "Total Search Time" = printf("%'.2f hrs",'Total Search Time') \
| rename label as "Search Head" app as "App Context" user as "User Name" \
| table "User Name" "App Context" "Search Head" "Total Search Time"

