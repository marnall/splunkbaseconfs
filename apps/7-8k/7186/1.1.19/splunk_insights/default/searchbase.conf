sub_category = Apps
tags = Deployment,Discovery,Inventory,REST
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = F6C3B1B39BE3DA8A7E5493C8C8E4C0DA
updated_author = akhamis
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>This Splunk query retrieves information about deployment server applications and creates a summary lookup table.</p>
search = | rest splunk_server=* `ssef_rest_timeout` /servicesNS/-/-/deployment/server/applications  \
| eval summary_id="ssef_deployment_server_applications" \
| rex field=loadtime mode=sed "s/.*1969$//g" \
| eval \
    loadtime = strptime(loadtime,"%a %b %d %H:%M:%S %Y"), \
    Splunk_Instance = lower(splunk_server), \
    checksum = if(checksum=0, null(), checksum),\
    size = if(size=-1, null(), size),\
    author = if(author="nobody", "system", author) \
| rename title AS app \
| `ssef_instance_info(Splunk_Instance)` \
| stats\
    VALUES(serverclasses) AS serverclasses\
    VALUES(role) AS role \
    LAST(stateOnClient) AS stateOnClient\
    LAST(restartSplunkd) AS restartSplunkd\
    LAST(restartSplunkWeb) AS restartSplunkWeb\
    LAST(restartIfNeeded) AS restartIfNeeded\
    LAST(issueReload) AS issueReload\
    LAST(excludeFromUpdate) AS excludeFromUpdate\
    LAST(loadtime) AS loadtime\
    LAST(checksum) AS checksum\
    Max(size) AS size\
    LATEST(name) AS name\
    by label, Splunk_Instance, app \
| eval _time = now() \
| foreach role, serverclasses \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| eval is4s="summary" \
| append \
    [| search `ssef_summary(ssef_deployment_server_applications)` earliest=-1d@d \
    | foreach Splunk_Instance, role, serverclasses \
        [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
    | stats\
        VALUES(serverclasses) AS serverclasses\
        LATEST(_time) AS _time\
        LATEST(stateOnClient) AS stateOnClient\
        LATEST(restartSplunkd) AS restartSplunkd\
        LATEST(restartSplunkWeb) AS restartSplunkWeb\
        LATEST(restartIfNeeded) AS restartIfNeeded\
        LATEST(issueReload) AS issueReload\
        LATEST(excludeFromUpdate) AS excludeFromUpdate\
        LATEST(loadtime) AS loadtime\
        LATEST(checksum) AS checksum\
        LATEST(size) AS size\
        VALUES(role) AS role \
        LATEST(name) AS name\
        by label, Splunk_Instance, app \
    | table _time, label, name, role, Splunk_Instance, app, serverclasses, stateOnClient, restartSplunkd, restartSplunkWeb, restartIfNeeded, issueReload, excludeFromUpdate, loadtime, checksum, size \
    | outputlookup ssef_deployment_server_applications_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | stats count as num_items \
    | eval is4s="lookup" ] \
| where is4s="summary" \
| table _time, label, name, role, Splunk_Instance, app,serverclasses, stateOnClient, restartSplunkd, restartSplunkWeb, restartIfNeeded, issueReload, excludeFromUpdate,loadtime, checksum,size,severity_level \
| `ssef_handle_no_results(1,"The ssef_deployment_server_applications summary job completed successfully without identifying any issues, and everything is operating as expected.")`

