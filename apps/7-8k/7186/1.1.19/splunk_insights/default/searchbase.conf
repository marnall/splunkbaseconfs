search_name = Endpoints by Domain and Category
readonly = 1
version = 1.0.4
date_updated = 2025-1-24 12:11:6
category = Splunk
sub_category = Adoption
tags = Adoption,Details,Drill-downs,Endpoints,IS4S,KPIs
solution = <p>This search provides a consolidated view of host-level data coverage mapped to analytic and technical use cases.</p><p><b>Suggested Actions</b>: Identify hosts with large volumes of unclassified data, validate sourcetype and use case mappings, and prioritize onboarding work that expands analytic capabilities aligned to business outcomes.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Enable teams to better design sourcetypes, data models, and use case mappings.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=data%20quality" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover Splunk and Cisco apps that support data classification, coverage validation, and analytics maturity.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert guidance for data strategy, use case development, and platform governance.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| tstats summariesonly=true</code><br> - Uses accelerated summaries to efficiently count events by host and sourcetype at scale.<br><b>02</b> <code>| lookup / eval / stats</code><br> - Enriches sourcetypes with domains, categories, and use cases, then aggregates coverage and event volume by host.<br>
explanation = <p>Understanding how data maps to domains and use cases at the host level is critical for validating coverage, maturity, and value realization. This search helps platform owners, architects, and security or observability leaders identify which endpoints meaningfully contribute to analytic capabilities and which remain unclassified or underutilized. By linking sourcetypes to use cases and domains, teams can assess alignment to business objectives, identify gaps in onboarding, and reduce redundant or low-value data. Over time, this insight supports roadmap planning, use case expansion, and governance improvements.</p>
quid = F00CED826422A3F60976665EF49A766B
updated_author = akhamis
related_info = <ul><li><p><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/Data/DataIngest" target="_blank">Splunk Docs: Use ingest actions to improve the data input process</a></p><p>This documentation explains how to utilize ingest actions to enhance data input processes in Splunk, enabling efficient data management from various endpoints, which is crucial for maintaining optimal user experience and delivering value to customers.</p></li><li><p><a href="https://community.splunk.com/t5/Getting-Data-In/Why-did-ingestion-slow-way-down-after-I-added-thousands-of-new/m-p/465796" target="_blank">Splunk Community: Why did ingestion slow way down after I added thousands of new inputs?</a></p><p>This community discussion addresses issues related to data ingestion performance when numerous new endpoints are added, offering insights into managing data sources to prevent negative impacts on user experience.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/conf-splunklive/ingest-actions-data-access-when-where-and-how-you-need-it.html" target="_blank">Splunk Blogs: Ingest Actions: Data Access When, Where and How You Need It</a></p><p>This blog post introduces Ingest Actions, a feature that allows users to manage data from various endpoints effectively, ensuring that data is available at the right time and place, thereby enhancing user experience and customer value.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/platform/enhancements-to-ingest-actions-improve-usability-and-expand-searchability-wherever-your-data-lives.html" target="_blank">Splunk Blogs: Enhancements To Ingest Actions Improve Usability and Expand Searchability Wherever Your Data Lives</a></p><p>This article discusses improvements to Ingest Actions that enhance performance and usability, facilitating better management of data from diverse endpoints, which contributes to improved user satisfaction.</p></li><li><p><a href="https://lantern.splunk.com/Platform_Data_Management/Optimize_Data" target="_blank">Drive more value through data source and use case optimization</a></p><p>This presentation explores strategies for optimizing data sources and use cases, emphasizing the importance of efficient endpoint data management in maximizing the value customers derive from Splunk.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/devops/3-easy-steps-to-data-ingestion-with-splunk-investigate1.html" target="_blank">Splunk Blogs: 3 Easy Steps to Data Ingestion with Splunk Investigate</a></p><p>This blog post outlines a simplified process for data ingestion from various endpoints using Splunk Investigate, highlighting how streamlined data input can positively impact user experience.</p></li><li><p><a href="https://lantern.splunk.com/Observability/Product_Tips/IT_Service_Intelligence/The_definitive_guide_to_best_practices_for_IT_Service_Intelligence" target="_blank">Lantern: The definitive guide to best practices for IT Service Intelligence</a></p><p>This guide provides best practices for configuring and optimizing IT Service Intelligence (ITSI) deployments, including data ingestion from multiple endpoints, to ensure optimal operations and an excellent end-user experience.</p></li><li><p><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/Data/IngestEval" target="_blank">Splunk Docs: Process events with ingest-time eval</a></p><p>This documentation explains how to use ingest-time eval to process events during data ingestion, allowing for real-time data transformation from various endpoints, which can enhance data quality and user interactions.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/platform/workload-management-maximizing-business-value-from-your-splunk-infrastructure.html" target="_blank">Splunk Blogs: Workload Management: Maximizing Business Value from Your Splunk Infrastructure</a></p><p>This article discusses how workload management can help balance resource usage when handling data from multiple endpoints, ensuring consistent performance and value delivery to customers.</p></li><li><p><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/WhatSplunkdoeswithyourdata" target="_blank">Splunk Docs: How Splunk handles your data</a></p><p>This resource provides an overview of how Splunk processes data from ingestion to indexing, offering insights into the journey of data from various endpoints and its impact on user experience.</p></li></ul>
description = <p>This search analyzes <b>data coverage by host</b> across <b>domains, categories, and analytic use cases</b>. It correlates sourcetypes to <b>business and technical use cases</b> while summarizing event volume distribution. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p></p>
viz_options = { "count": 100 }
search = | tstats summariesonly=true count as num_events WHERE [ | `ssef_all_indexes` ] by host sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type category as sourcetype_category domain as sourcetype_domain \
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type category as sourcetype_category domain as sourcetype_domain \
| eval sourcetype_category=split(mvdedup(sourcetype_category), "|") , sourcetype_domain=split(mvdedup(sourcetype_domain), "|") \
| fillnull value="Unclassified" sourcetype_category sourcetype_domain \
| stats values(*) as * max(num_events) as num_events by host sourcetype data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUT use_case \
| eval use_case=mvdedup(use_case) \
| stats values(*) as * sum(num_events) as num_events by host sourcetype use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type as use_case_type category as usecase_category domain as usecase_domain \
| fillnull value="Unclassified" usecase_category usecase_domain \
| eval use_case_type=mvdedup(use_case_type) \
| eval domain=mvdedup(mvappend(sourcetype_domain,usecase_domain)) , category=mvdedup(mvappend(sourcetype_category,usecase_category)) \
| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()) , Analytic_Capabilities = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null()) \
| fillnull value="Unclassified" domain category \
| stats values(category) as Categories values(data_type) as "Data Types" values(domain) as Domains values(sourcetype) as Sourcetypes sum(num_events) as num_events by host \
| sort 500 - num_events \
| `ssef_large_string_abbr(num_events,0)` \
| table host Sourcetypes "Data Types" Categories Domains num_events_string_abbr \
| rename host as Endpoint , num_events_string_abbr as "# of Events"

