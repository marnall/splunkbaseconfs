solution = <p>This search provides a trend-based view of license consumption relative to total entitlement.</p><p><b>Suggested Actions</b>: Monitor sustained upward trends in percentage usage, investigate ingestion spikes, and plan filtering or optimization efforts before license thresholds are reached.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Helps teams design efficient ingestion strategies and control license growth.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert guidance for license optimization, ingestion governance, and capacity planning.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=license%20usage" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover Splunk and Cisco apps that enhance license monitoring and ingestion visibility.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_license_data</code><br> - Loads normalized license usage data including daily ingestion and licensed stack size.<br><b>02</b> <code>| stats / eval / timechart</code><br> - Calculates percentage license usage and visualizes both trend and daily ingestion over time for capacity monitoring.<br>
explanation = <p>Monitoring license usage as a percentage of total entitlement provides an early-warning signal that absolute volume alone cannot capture. This search helps platform owners understand how quickly ingestion is approaching licensed capacity and whether growth is steady or accelerating. By pairing percentage usage with daily ingestion volume, teams can distinguish organic growth from sudden spikes caused by onboarding changes or misconfigured data sources. These insights support proactive license management, ingestion governance, and budget planning.</p>
quid = C0E8DE8D3C6948A2D9CE3AFB8BF1C2BB
updated_author = akhamis
related_info = related_info = <ul><li><p><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/Admin/AboutSplunksLicenseUsageReportView" target="_blank">Splunk Docs: About the Splunk Enterprise license usage report view</a></p><p>This documentation explains how to monitor your license capacity usage and indexing volume over time using the license usage reports in Splunk Enterprise.</p></li><li><p><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Admin/MonitoringLicenseUsage" target="_blank">Splunk Docs: Use the License Usage dashboards</a></p><p>Learn how to utilize the License Usage dashboards in Splunk Cloud Platform to monitor data ingestion and stay within your subscription entitlement.</p></li><li><p><a href="https://community.splunk.com/t5/Monitoring-Splunk/License-consumed-how-to-calculate-the-daily-ingest-per-index/m-p/551214" target="_blank">Splunk Community: License consumed, how to calculate the daily ingest per index?</a></p><p>This community discussion provides insights into calculating daily data ingestion per index, helping you manage license consumption effectively.</p></li><li><p><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Data_Management/Reducing_low-value_data_ingestion_to_improve_license_usage" target="_blank">Lantern: Reducing low-value data ingestion to improve license usage</a></p><p>Explore strategies to minimize ingestion of low-value data, thereby optimizing license usage and enhancing the efficiency of your Splunk deployment.</p></li><li><p><a href="https://www.splunk.com/en_us/products/pricing/ingest-pricing.html" target="_blank">Splunk Solutions: Ingest Pricing</a></p><p>Understand Splunks ingest-based pricing model, which aligns costs with the amount of data brought into the Splunk Platform per day.</p></li></ul>
description = <p>This search tracks <b>license usage trends over time</b> and compares them to the available <b>licensed stack size</b>. It highlights <b>percentage-based license consumption</b> alongside <b>daily ingestion volume</b>. This helps monitor growth patterns and identify early risk of license saturation.</p>
default_viz = splunk.column
viz_options = { "stackMode":"stacked","seriesColors":["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"],"legendDisplay":"top" }
search = | `ssef_license_data` \
| stats sum(License_Usage_GB) as License_Usage_GB min(stacksz_gb) as stacksz_gb by _time \
| eval perc_usage = (License_Usage_GB / stacksz_gb) * 100 \
| timechart partial=t fixedrange=t eval(round(avg(perc_usage),2)) as "License Usage Trends" eval(round(sum(License_Usage_GB),0)) AS "Platform-Specific Daily Ingestion (Cloud or Enterprise)" span=1d

[License Utilization (Ingest)]
search_name = License Utilization (Ingest)
readonly = 1
diagnostic_searches = ssef_internal_index_license_usage
version = 1.0.3
date_updated = 2025-7-30 14:2:17
category = Splunk
sub_category = Licensing
tags = IS4S,KPIs,Licensing
solution = <p>This search provides a ground-truth view of daily license utilization using raw telemetry data.</p><p><b>Suggested Actions</b>: Use this search to validate license dashboards, investigate discrepancies in daily usage reporting, and confirm true utilization before making licensing or ingestion decisions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Build deeper expertise in license monitoring and telemetry analysis.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert assistance for license reconciliation, ingestion strategy, and capacity planning.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=license%20monitoring" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps that enhance license visibility and operational governance.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| index=_telemetry</code><br> - Reads raw license rollover summaries directly from telemetry logs for authoritative usage data.<br><b>02</b> <code>| eval / stats / timechart</code><br> - Normalizes event timing, aggregates daily usage, and calculates percentage license utilization trends.<br>
explanation = <p>Telemetry-based license analysis provides the most authoritative view of actual license consumption as recorded by indexers. This search corrects for timezone offsets and rollover timing to accurately align usage with the correct calendar day. Platform owners can use this to validate summary-based license metrics, investigate discrepancies, and confirm true utilization trends. These insights are especially valuable when troubleshooting unexpected license spikes or reconciling usage across distributed environments.</p>
quid = 6C452D2E4DFDC87242093E45C021967B
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=license%20telemetry" target="_blank">Splunk Docs: License telemetry</a><br>Search results for documentation related to license usage telemetry.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=license%20usage%20calculation" target="_blank">Splunk Docs: License usage calculation</a><br>Guidance on how Splunk calculates and reports license consumption.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Apps</a><br>Utility apps that assist with license analysis and operational insight.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunkbase: IT Operations Management</a><br>Apps aligned to platform monitoring and capacity management.</li><li><a href="https://www.splunk.com/en_us/blog/2015/01/26/log-analysis-best-practices.html" target="_blank">Splunk Blogs: Log analysis best practices</a><br>Best practices for interpreting high-volume operational data.</li><li><a href="https://www.splunk.com/en_us/resources.html" target="_blank">Splunk Resources: Platform resources</a><br>Central guidance for license management and platform operations.</li></ul>
description = <p>This search calculates <b>daily license utilization</b> directly from <b>raw telemetry rollover summaries</b>. It normalizes timestamps to ensure <b>accurate daily usage percentages</b> across license pools.</p>
default_viz = splunk.singlevalue
search = index=_telemetry sourcetype=splunkd component=LicenseUsageSummary source="*license_usage_summary.log" TERM("type=RolloverSummary") b>0 pool=* \
| rex field=_raw "^(?<timestring>\d\d-\d\d-\d{4}\s\d\d:\d\d:\d\d.\d{3}\s\+\d{4})" \
| eval event_time=strptime(timestring,"%m-%d-%Y %H:%M:%S.%N%z") \
| eval rel_src_time=relative_time(event_time, tostring(-1440)."m") \
| eval zone=strftime(rel_src_time,"%z") \
| eval minutes=substr(zone,-2) \
| eval hours=substr(zone,2,2) \
| eval mzone=if(zone!=0, ((hours*60)+minutes)*(zone/abs(zone)), 0) \
| eval rel_time_in_mins=-1440-mzone \
| eval rel_time=if(rel_time_in_mins >= 0 , "+".tostring(rel_time_in_mins)."m", tostring(rel_time_in_mins)."m") \
| eval _time=relative_time(event_time, rel_time) + 1 \
| eval peer=coalesce(slave,peer) \
| bin _time span=1d \
    ```If you notice that the total daily usage appears inaccurate, try adding the following line to your query to see if it improves the results:\
| latest(b) AS b latest(stacksz) as stacksz by peer, pool, _time ```\
| stats sum(b) AS b latest(stacksz) as stacksz by peer, pool, _time\
| eval stacksz=if(stacksz>=214748364800000, 0, stacksz) \
| stats sum(b) as b max(stacksz) as stacksz by _time \
| eval perc_usage = (b / stacksz) * 100 \
| timechart partial=f fixedrange=t eval(round(avg(perc_usage), 2)) as "License Utilization" span=1d

[List of Unused Splunk Dashboards in the Last 21 Days]
search_name = List of Unused Splunk Dashboards in the Last 21 Days
readonly = 1
diagnostic_searches = ssef_data_ui_views,ssef_internal_web_access_tracker
version = 1.0.4
date_created = 2025-5-13 12:9:48
date_updated = 2025-5-27 11:35:55
category = Splunk
sub_category = Dashboards
tags = Access,Dashboards,KPIs
solution = <p>This search provides a governance-ready list of dashboards that appear unused or stale.</p><p><b>Suggested Actions</b>: Review owners for validation, retire or consolidate dashboards with no recent views, reduce sharing where appropriate, and refactor large dashboards that remain business-critical.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Build best practices for dashboard design, ownership, and lifecycle management.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert guidance for content governance, dashboard rationalization, and UX optimization.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=dashboard%20governance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps that support dashboard analytics, governance, and usage insight.</li></ul></p>
dispatch_earliest_time = -21d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary()</code><br> - Reads IS4S summaries to enumerate dashboards and their metadata efficiently.<br><b>02</b> <code>| join / eval / stats</code><br> - Correlates dashboard metadata with last-access telemetry, computes staleness, and prepares governance-ready outputs.<br>
explanation = <p>Dashboards that are rarely viewed can increase maintenance overhead, slow navigation, and dilute user focus. This search helps platform owners and app teams understand which dashboards have not been accessed recently, who owns them, and where they are shared. By combining metadata with last-access telemetry, teams can prioritize retirement, consolidation, or refresh efforts. Over time, this supports stronger content governance, better performance, and improved user experience.</p>
quid = 0459242808068EA3EB65901DDA113C48
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=dashboard%20best%20practices" target="_blank">Splunk Docs: Dashboard best practices</a><br>Search results for guidance on building maintainable and performant dashboards.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=content%20governance" target="_blank">Splunk Docs: Content governance</a><br>Search results covering governance approaches for Splunk content.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Apps</a><br>Utility apps that assist with content inventory and optimization.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunkbase: IT Operations Management</a><br>Apps aligned to operational visibility and content hygiene.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=splunk%20web%20usage" target="_blank">Splunk Docs: Splunk Web usage</a><br>Search results for understanding usage telemetry that informs dashboard access.</li><li><a href="https://www.splunk.com/en_us/resources.html" target="_blank">Splunk Resources: Platform resources</a><br>Central guidance for platform optimization and governance.</li></ul>
description = <p>This search identifies <b>stale dashboards</b> with <b>low or no recent usage</b> across allowed apps. It highlights <b>last viewed time, ownership, sharing scope, and size</b> to support cleanup and governance decisions. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p></p>
search = `ssef_summary(ssef_data_ui_views)` dashboard_size>0 NOT app IN (`ssef_default_apps`,Splunk_TA*,TA-*,TA_*,*_TA) NOT view_name IN (`ssef_default_views`) `ssef_allowed_apps(app)` author!=system \
| stats count values(sharing) as sharing values(author) AS owner values(view_label) as view_label values(label) as search_heads max(dashboard_size) as dashboard_size latest(updated) as updated by view_name, app \
| eval last_view_time_days_ago=-1 , last_view_time_days_ago_pretty="no views in last 30 days" \
| join view_name app type=outer \
    [ search `ssef_summary(ssef_internal_web_access_tracker)` \
    | fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
    | rename view as view_name \
    | stats latest(_time) AS last_view_time latest(user) AS last_user by app, view_name \
    | eval last_view_time_days_ago=round(abs(now()-last_view_time),0) \
    | eval last_view_time_days_ago_pretty=tostring(last_view_time_days_ago, "duration") \
    | convert ctime(last_view_time) ] \
| where last_view_time_days_ago > (60*60*24*21) OR last_view_time_days_ago=-1 \
| eval dashboard_size_kb=round(dashboard_size/1024,2), search_heads=mvjoin(search_heads,",") , updated=round(updated) \
| sort updated \
| convert ctime(updated) \
| table view_name view_label updated owner sharing app dashboard_size_kb search_heads last_view_time_days_ago_pretty

