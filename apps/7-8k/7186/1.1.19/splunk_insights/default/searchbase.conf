description = <p>Ad-hoc search impact by user</p>
search = | tstats summariesonly=true allow_old_summaries=false fillnull_value=0 max(data.search_props.scan_count) AS scan_count max(data.read_mb) AS read_mb max(data.written_mb) AS written_mb max(data.normalized_pct_cpu) AS normalized_pct_cpu max(data.mem_used) AS mem_used max(data.elapsed) AS elapsed \
    WHERE index=_introspection sourcetype=splunk_resource_usage component::PerProcess data.process_type::search data.search_props.type=ad-hoc data.search_props.provenance=UI:Search \
    by _time span=10s host data.search_props.app data.search_props.user data.search_props.provenance data.search_props.sid \
| rename data.search_props.* AS * \
| eval normalized_pct_cpu=if(normalized_pct_cpu=0.00, 0, normalized_pct_cpu) \
| `ssef_instance_info(host)` \
| eval Splunk_Role = CASE (role="indexer", "indexer", TRUE(), "search_head") ```Determines whether the adhoc_search ran on an indexer or a search head, which helps in understanding the impact on both tiers.```\
| stats dc(sid) AS search_count, sum(elapsed) AS elapsed, sum(scan_count) AS scan_count, sum(mem_used) AS mem_used, sum(normalized_pct_cpu) AS normalized_pct_cpu, sum(written_mb) AS disk_write_mb, sum(read_mb) AS disk_read_mb latest(_time) as _time\
    by label Splunk_Role app user provenance ```Aggregates key metrics like run count, average elapsed time, memory, CPU usage, etc., by adhoc_search and role (whether indexer or search head). and Groups the data by key fields like label, Splunk_Role, app, and provenance to get an overview of each adhoc_searchs performance across both tiers.```\
| eventstats max(elapsed) AS max_elapsed max(scan_count) AS max_scan_count max(mem_used) AS max_mem_used max(normalized_pct_cpu) AS max_normalized_pct_cpu max(disk_read_mb) AS max_disk_read_mb max(disk_write_mb) AS max_disk_write_mb  ```Calculates the maximum values for key metrics like CPU, memory, and disk usage across all adhoc_searchs to be used for normalization later.```\
| foreach elapsed mem_used normalized_pct_cpu disk_read_mb disk_write_mb scan_count max_*\
    [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="" OR <<FIELD>>=0, 1, <<FIELD>>) ] \
| eval weighted_expense_factor = ( ```This formula weights the importance of different metrics to calculate an overall "expense" score for each adhoc_search, prioritizing CPU and memory usage.```\
    (normalized_pct_cpu / max_normalized_pct_cpu) * 0.25 + \
    (mem_used / max_mem_used) * 0.25 +\
    (scan_count / max_scan_count) * 0.2 + \
    (elapsed / max_elapsed) * 0.2 + \
    (disk_read_mb / max_disk_read_mb) * 0.05 + \
    (disk_write_mb / max_disk_write_mb) * 0.05 ) \
| eval overall_expense_factor = weighted_expense_factor * search_count * 0.25  ```Multiplies the weighted expense by the number of times the adhoc_search ran, with a 0.25 factor to reduce the dominance of highly frequent adhoc_searchs that are low-impact individually.```\
| sort - overall_expense_factor ```Sorts the adhoc_searchs by their expense factor, showing the most resource-intensive ones first.```\
| eventstats count AS total_adhoc_searchs \
| eval top_20_percent_limit = round(total_adhoc_searchs * 0.20)  ```Determines the number of adhoc_searchs that make up the top 20% of the most expensive adhoc_searchs based on their expense factor.```\
| streamstats count AS row_number \
```| where row_number <= top_20_percent_limit``` ``` AND overall_expense_factor > 1```  ``` Filters the adhoc_searchs to include only those in the top 20% of overall expense and where the overall expense factor is greater than 1.``` \
| foreach elapsed mem_used normalized_pct_cpu disk_read_mb disk_write_mb scan_count\
    [ eval <<FIELD>>=ceiling(<<FIELD>>) ] \
| table _time label Splunk_Role name app user provenance weighted_expense_factor overall_expense_factor search_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb

