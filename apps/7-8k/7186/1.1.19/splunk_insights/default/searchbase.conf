solution = <p>This visualization highlights <b>peak hourly usage trends</b> for regularly used Splunk apps.</p><p><b>Suggested Actions</b> Review peak usage hours to align system maintenance, optimize resource allocation, and ensure adequate performance during high-demand periods. Consider staggering heavy workloads or tuning resource-intensive apps if peaks coincide with known performance constraints.</p><p><b>Recommended For You:</b><ul><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunk Apps: IT Operations Management</a><br>Apps that help monitor usage patterns, troubleshoot performance issues, and optimize operational workflows.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utilities</a><br>Utility apps that enhance Splunk administration, reporting, and usage visibility.</li><li><a href="https://classic.splunkbase.splunk.com/category/business_analytics/" target="_blank">Splunk Apps: Business Analytics</a><br>Apps that provide dashboards and analytics to better understand user behavior and platform adoption.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| stats latest(*) by time, app</code><br> - Normalizes app activity into hourly buckets for consistent analysis.<br><b>02</b> <code>| eval num_users</code><br> - Ensures accurate user counts by reconciling multivalue user fields.<br><b>03</b> <code>| chart sum(num_users) by hour app</code><br> - Aggregates user activity to reveal peak usage times per app.<br>
explanation = <p>Understanding the time-of-day patterns for application usage provides valuable insight into how users interact with Splunk throughout the day. By visualizing hourly peaks in app usage, administrators can align maintenance windows, schedule intensive workloads, and anticipate performance demands during business-critical periods. This information also helps identify whether app usage aligns with expected business hours or if there are unexpected spikes that may warrant investigation. Platform owners, operations teams, and capacity planners can use these insights to optimize system availability and user experience.</p>
quid = C9CE28AFA0EF595B6C7B347144A87E98
updated_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/How-can-I-create-a-query-to-find-dashboard-usage-and-top-used/m-p/364152">How to Create a Query to Find Dashboard Usage and Top Used Dashboards</a></li><p>This community discussion offers guidance on crafting SPL queries to monitor dashboard usage, helping identify peak access times and popular dashboards.</p><li><a href="https://community.splunk.com/t5/All-Apps-and-Add-ons/See-User-Activity-by-App-and-View/m-p/404469">See User Activity by App and View</a></li><p>This thread provides insights into tracking user activity within specific apps and views, aiding in understanding user engagement and peak usage periods.</p><li><a href="https://www.splunk.com/en_us/solutions/optimize-your-web-and-mobile-experience.html">Optimize Your Web and Mobile Experience</a></li><p>This resource outlines strategies to monitor and enhance user experience across web and mobile platforms, emphasizing the importance of understanding user interactions during peak times.</p><li><a href="https://lantern.splunk.com/Observability/Use_Cases/Digital_Experience_Monitoring/Optimizing_mobile_app_startup_processes">Optimizing Mobile App Startup Processes</a></li><p>This guide discusses methods to improve mobile app performance, particularly during high-usage periods, to ensure a seamless user experience.</p><li><a href="https://www.splunk.com/en_us/blog/devops/why-knowing-the-front-end-and-user-s-experience-of-your-platform-is-key-to-understanding-how-that-platform-is-working.html">Why Knowing the Front-End and Users Experience of Your Platform is Key</a></li><p>This article emphasizes the significance of monitoring front-end performance to understand user experience, especially during peak usage times.</p></ul>
description = <p>This search identifies <b>when Splunk apps are most actively used</b> by aggregating user activity by hour of day. It helps teams understand <b>peak usage patterns</b> across applications for capacity planning and operational alignment.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.column
viz_options = { "stackMode":"stacked","seriesColors":["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"],"legendDisplay":"top" }
search = `ssef_summary(ssef_internal_web_access_tracker)` app=* \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1h \
| stats latest(*) as * by _time, label, type, app, view \
| eval users_mv=split(users_mv,", ") \
| eval num_users = if(isnotnull(users_mv), mvcount(users_mv), num_users) \
| makecontinuous _time span=1h \
| fillnull value=0 num_users \
| eval hour=strftime(_time, "%H") \
| chart sum(num_users) AS "Regularly Used Apps by Peak Usage Time" by hour app

[Regularly Used Dashboard Details]
search_name = Regularly Used Dashboard Details
readonly = 1
diagnostic_searches = ssef_internal_web_access_tracker
version = 2.0
date_updated = 2025-10-15 14:34:5
category = Splunk
sub_category = Adoption
tags = Adoption,Dashboards,Details,Usage
solution = <p>This analysis highlights dashboards that deliver <b>consistent value</b> based on sustained usage over time.</p><p><b>Suggested Actions</b> Prioritize optimization, performance tuning, and ownership reviews for dashboards with high activity percentages. Consider archiving or consolidating dashboards that fall below the activity threshold to reduce clutter and improve user experience.</p><p><b>Recommended For You:</b><ul><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utilities</a><br>Utility apps that help analyze usage, manage dashboards, and improve Splunk administration.</li><li><a href="https://classic.splunkbase.splunk.com/category/business_analytics/" target="_blank">Splunk Apps: Business Analytics</a><br>Apps that enhance dashboarding, reporting, and analytics for better decision-making.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunk Apps: IT Operations Management</a><br>Apps supporting operational visibility, monitoring, and usage optimization.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| eventstats sum(bytes), sum(users)</code><br> - Aggregates usage metrics per dashboard to capture total engagement.<br><b>02</b> <code>| lookup ssef_data_ui_views_lookup</code><br> - Enriches dashboards with descriptive metadata such as name, author, and description.<br><b>03</b> <code>| eval activity_percentage_days</code><br> - Calculates the percentage of days each dashboard was active to determine sustained usage.<br><b>04</b> <code>| where activity_percentage_days &gt;= threshold</code><br> - Filters to dashboards that meet or exceed the defined activity threshold.<br>
explanation = <p>Dashboards that are consistently accessed over time typically deliver the most operational value to users. This search measures dashboard activity by calculating how often each dashboard is used relative to the total number of days in scope, providing a clear signal of sustained adoption. By combining activity duration, page loads, and total time spent, teams can distinguish between dashboards that are critical to daily operations and those that may be candidates for cleanup or optimization. These insights support content rationalization, user experience improvement, and more effective governance of dashboard assets.</p>
quid = 74F860B1F5D1374171C8EC90A50001BC
updated_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/How-can-I-create-a-query-to-find-dashboard-usage-and-top-used/m-p/364152">How to Create a Query to Find Dashboard Usage and Top Used Dashboards</a></li><p>This community discussion offers guidance on crafting SPL queries to monitor dashboard usage, helping identify peak access times and popular dashboards.</p><li><a href="https://community.splunk.com/t5/All-Apps-and-Add-ons/See-User-Activity-by-App-and-View/m-p/404469">See User Activity by App and View</a></li><p>This thread provides insights into tracking user activity within specific apps and views, aiding in understanding user engagement and peak usage periods.</p><li><a href="https://www.splunk.com/en_us/solutions/optimize-your-web-and-mobile-experience.html">Optimize Your Web and Mobile Experience</a></li><p>This resource outlines strategies to monitor and enhance user experience across web and mobile platforms, emphasizing the importance of understanding user interactions during peak times.</p><li><a href="https://lantern.splunk.com/Observability/Use_Cases/Digital_Experience_Monitoring/Optimizing_mobile_app_startup_processes">Optimizing Mobile App Startup Processes</a></li><p>This guide discusses methods to improve mobile app performance, particularly during high-usage periods, to ensure a seamless user experience.</p><li><a href="https://www.splunk.com/en_us/blog/devops/why-knowing-the-front-end-and-user-s-experience-of-your-platform-is-key-to-understanding-how-that-platform-is-working.html">Why Knowing the Front-End and Users Experience of Your Platform is Key</a></li><p>This article emphasizes the significance of monitoring front-end performance to understand user experience, especially during peak usage times.</p></ul>
description = <p>This search identifies <b>actively used dashboards</b> based on the percentage of days they were accessed within the selected time range. It helps teams focus on <b>high-value dashboards</b> that demonstrate sustained user engagement.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_internal_web_access_tracker)` type!=system NOT view IN (`ssef_default_views`, search) \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1h \
| stats latest(*) as * by _time, label, type, app, view \
| eval users_mv=split(users_mv,", ") \
| eventstats sum(bytes) as sum_bytes sum(num_users) as sum_num_users values(users_mv) as users_mv sum(num_page_loads) as sum_num_page_loads sum(spent_ms) as sum_spent_ms by label, type, app, view \
| eval sum_num_users = if(isnotnull(users_mv), mvcount(users_mv), sum_num_users) \
| fields - spent_ms bytes num_page_loads num_users users_mv \
| lookup ssef_data_ui_views_lookup label as label app as app view_name as view output view_label description author \
| bin _time span=1d \
| eventstats earliest(_time) as earliest_time latest(_time) as latest_time \
| addinfo \
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| stats values(*) as * dc(_time) as num_active_days max(num_days) as num_days earliest(_time) as earliest_time latest(_time) as latest_time max(sum_bytes) as sum_bytes max(sum_num_users) as sum_num_users max(sum_num_page_loads) as sum_num_page_loads max(sum_spent_ms) as sum_spent_ms by view \
| eval activity_percentage_days = round((num_active_days / num_days) * 100, 2) \
| eval Threshold = `ssef_perc_active_threshold` . " %" \
| eval Status = if(activity_percentage_days > `ssef_perc_active_threshold`, "Dashboard was active for over " . Threshold . " of the selected time period", "Dashboard was not active for over `ssef_perc_active_threshold`% of the selected time period") \
| where activity_percentage_days >= `ssef_perc_active_threshold` \
| sort - activity_percentage_days sum_spent_ms \
| fields - latest_time earliest_time \
| table view view_label description activity_percentage_days sum_num_users sum_num_page_loads sum_spent_ms Status \
| rename view AS "Dashboard", activity_percentage_days AS "Percent Active", num_active_days AS "Active Days Count", num_days AS "Total Days Count", type AS "Dashboard Type", label AS "Search Heads", app AS "Apps", sum_num_page_loads as "Total Page Loads", sum_num_users as "Total Users", sum_spent_ms as "Total Time Spent (ms)", view_label as "Dashboard Name", description as Description, author as Author

