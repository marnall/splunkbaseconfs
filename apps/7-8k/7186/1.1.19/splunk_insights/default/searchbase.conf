[detections_searching_raw_data_without_indexes_defined]
search_name = Detections Searching Raw Data without Indexes Defined
readonly = 1
ssef_cron = weekly
target_component = Detections and Alerts
version = 1.0.5
date_updated = 2025-11-10 13:22:47
category = ES Adoption
sub_category = Security
tags = Detections and Alerts,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = F62815A13A9802513FE7E4AA0F6F3864
search_author = dluxton
updated_author = akhamis
related_info = <p>Be sure all searches are configured to run with an index defined.</p>\
<p>When using ESCU content, add the index to the sourcetype macro. <br></p>\
<p>Advanced Search &gt; Macros &gt; macro_name (i.e. wineventlog_security)</p>\
<p>Add the index(es) to the start of the macro</p>\
<p><em>index IN (wineventlog, dev_wineventlog)</em> eventtype=wineventlog_security OR Channel=security OR source=XmlWinEventLog:Security</p>
severity_normal_text = <br/><p>Unable to identify correlation searches running without an index specified.</p>\
<p>Be sure to manually validate correlation searches using nested macros, they have been excluded from this search.</p>
severity_low_text = <br/><p>More than 1 correlation search does not have an index specified in the base search.</p>
severity_medium_text = <br/><p>More than 20 correlation searches do not have an index specified in the base search.</p>
severity_high_text = <br/><p>More than 50 correlation searches do not have an index specified in the base search.</p>
severity_critical_text = <br/><p>More than 100 correlation searches do not have an index specified in the base search. </p>
description = <p>When an index is not defined in a base search, Splunk will do one of two things (depending on configuration)<br><br>1. run an index=* search which can have a significant performance impact the more correlation searches enabled</p>\
<p>2. not run an index=* search, which will mean Splunk won't be searching across all relevant indexes, leading to false negative results</p>
search = `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 \
| eval summary_id="detections_searching_raw_data_without_indexes_defined" \
| stats latest() as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
| rex field=savedsearch_search "(?ms)^(?P<basesearch1>.*?)\|" \
| rex field=savedsearch_search "(?ms)^\|(?P<basesearch2>.*?)\|" \
| eval basesearch=if(isnull(basesearch1) OR len(basesearch1)==0 OR basesearch1="",basesearch2,basesearch1) \
| rex field=basesearch max_match=0 "\`(?P<macro>.*?)\`" \
| eval basesearch_macro_count=mvcount(macro) \
| mvexpand macro \
| rex field=macro "\((?P<params>.*?)\)" \
| eval param_count=mvcount(split(params,",")) \
| eval param_macro=if(isnotnull(param_count),macro,null()) \
| rex mode=sed field=param_macro "s/\(.*/(/g" \
| eval param_macro=param_macro+param_count+")" \
| eval macro=coalesce(param_macro,macro) \
| lookup ssef_data_macros_lookup label title as macro output definition \
| stats values(definition) as definition values(basesearch) as basesearch values(macro) as macro values(basesearch_macro_count) as basesearch_macro_count values(savedsearch_search) as orig_search by label savedsearch_name \
| eval expanded_basesearch=mvappend(basesearch,definition) \
| rex field=expanded_basesearch max_match=0 "\`(?P<second_macro>.*?)\`" \
| eval nested_macro_count=mvcount(second_macro)-basesearch_macro_count \
| eval noIDX=if(NOT match(expanded_basesearch,"^[\|\s]+tstats|metadata|makeresults|rest|datamodel|from\s+datamodel|inputlookup") AND NOT match(expanded_basesearch,"index\s*(?:=\s*\"?([a-zA-Z0-9_-]+)\"?|\s+IN\s*\(\s*(?:(?:\"?[a-zA-Z0-9_-]+\"?)\s*,?\s*)+\))"),"true","false") \
| where noIDX="true" \
| eventstats dc(eval(if(isnotnull(nested_macro_count) AND nested_macro_count>0, savedsearch_name,null()))) as total_searches_with_nested_macros_in_base_search \
| where NOT nested_macro_count>0 \
| eventstats count as total_undefined \
| eval severity_level = case ( total_undefined>100,5, total_undefined>50,4, total_undefined>20,3, total_undefined>0,2, true(),1) \
| table label savedsearch_name orig_search expanded_basesearch macro total_undefined total_searches_with_nested_macros_in_base_search severity_level \
| `ssef_handle_no_results(1,"The detections_searching_raw_data_without_indexes_defined summary job completed successfully without identifying any issues, and everything is operating as expected.")`

