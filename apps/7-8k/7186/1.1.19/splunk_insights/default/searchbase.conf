[ssef_ia4s_apps_inventory_support]
search_name = Percentage of Supported Apps
readonly = 1
target_component = Apps and Add-ons
version = 1.0.6
date_updated = 2024-7-25 21:40:59
category = Splunk
sub_category = Apps
tags = Apps,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 70F2AB688B581B8505CC45D0667445D1
updated_author = akhamis
related_info = <ul>\
<li><a href="https://splunkbase.splunk.com/apps/#certification" target="_blank">Splunkbase - Certified Apps and Add-ons</a></li>\
<li><a href="https://community.splunk.com/t5/All-Apps-and-Add-ons/Why-should-I-avoid-unsupported-apps/td-p/416984" target="_blank">Splunk Answers - Impact of Unsupported Apps</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Managingappobjects" target="_blank">Splunk Docs - Managing and Maintaining Apps</a></li>\
</ul>
severity_normal_text = <br/><p>More than 70% of apps are supported, indicating a healthy ecosystem with a majority of applications maintained or verified, enhancing system reliability and security.</p>
severity_low_text = <br/><p>70% or fewer apps are supported, suggesting a need for review to improve application support coverage, potentially impacting system performance or security posture.</p>
description = <p>This search measures the percentage of supported applications within the Splunk environment, classifying them as 'supported' or 'not supported' based on criteria like developer backing and core app designation. While understanding this ratio is key for risk management and maintaining a secure, efficient system, custom, non-supported apps can offer extreme value. These should be evaluated on a case-by-case basis to maximize their potential benefits within the customers environment.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Low:</strong> Percent Supported < 70%.</li>\
<li><strong>Normal:</strong> Percent Supported > 70%.</li>\
</ul>
search = `ssef_summary(ssef_apps_local)` NOT app_name IN (`ssef_default_apps`) \
| eval summary_id="ssef_ia4s_apps_inventory_support" \
| fields _time, label, name, role, Splunk_Instance, app_name, app_label, core, author, current_version, latest_version, build, check_for_updates, visible, sharing, show_in_nav, state_change_requires_restart, description, details, updated, acl_perms_read, acl_perms_write, setup_view, attribution_link, update_appurl, update_homepage \
| bin _time span=1d \
| stats latest(*) as * latest(_time) as _time LATEST(name) AS name by label, app_name \
| `ssef_splunkbase_apps(app_name)` \
| eval supported=case ( support="splunk" OR support="developer" OR core=1 OR match(app_name,"SplunkEnterpriseSecuritySuite|^Splunk_DA-ESS_PCICompliance|^SA-ES-Choreographer|^DA-ESS-|^SA-Protection|^SA-Management|^SA-UEBA|SA-ThreatIntelligence|SA-Utils|Splunk_SA_ExtremeSearch|DA-ITSI-|itsi|SA-IndexCreation|SA-ITOA|SA-ITSI-|SA-UserAccess|vmware_ta_itsi|^splunk_essentials"), "supported", \
    true(), support) \
| where isnotnull(uid) OR match(app_name,"SplunkEnterpriseSecuritySuite|^Splunk_DA-ESS_PCICompliance|^SA-ES-Choreographer|^DA-ESS-|^SA-Protection|^SA-Management|^SA-UEBA|SA-ThreatIntelligence|SA-Utils|Splunk_SA_ExtremeSearch|DA-ITSI-|itsi|SA-IndexCreation|SA-ITOA|SA-ITSI-|SA-UserAccess|vmware_ta_itsi|^splunk_essentials") \
| fillnull value="not_supported" supported \
| bin _time span=1d \
| stats count(eval(supported="not_supported")) AS unsupported_apps count(eval(supported="supported")) AS supported_apps dc(app_name) as num_apps by _time \
| eval perc_app_support = round(supported_apps / num_apps * 100, 0) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( perc_app_support < 70, low, true(), normal ) \
| table _time num_apps supported_apps unsupported_apps perc_app_support severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_apps_inventory_support summary job completed successfully without identifying any issues, and everything is operating as expected.")`

