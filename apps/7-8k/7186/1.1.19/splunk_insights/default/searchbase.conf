[mc_data_hygiene_learned_sourcetypes]
search_name = Data hygiene - learned sourcetypes (Deprecated)
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Data Hygiene
version = 1.0.1
date_updated = 2025-7-8 9:20:1
category = Health Check
sub_category = Data Hygiene
tags = Data Hygiene,Health Check,Indexing,Monitoring Console,Splunk Health Assistant,Summary
solution = Review the sourcetype data onboarding configuration. When no explicit data configuration settings exist, Splunk software introduces auto-generated or "learned" sourcetypes as an optimization technique. Based on the data ingest method, each Splunk instance that indexes the event generates its own rule set, which can result in different sourcetype names that cause reporting issues.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = F4C43EEBD6ABCD55BF85819B6363E677
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_low_text = One or more sourcetypes has been found to utilize “learned” or auto-assigned sourcetype.
description = This check looks for sourcetypes that have been auto-assigned by Splunk within 24 hour period.
search = | tstats summariesonly=true count AS event_count WHERE index=* AND earliest=-24h by sourcetype index \
| eval summary_id="mc_data_hygiene_learned_sourcetypes" \
| where match(sourcetype, "\-\d+$|too_small$") \
| eval severity_level=2, instance=sourcetype \
| sort -event_count \
| append \
    [ makeresults \
    | eval severity_level = 1, event_count = 0 \
    | stats values(severity_level) AS severity_level values(*_count) AS *_count] \
| eventstats max(severity_level) AS max_severity_level \
| where severity_level >= max_severity_level \
| fields - max_severity_level \
| rename index as org_index, sourcetype as org_sourcetype\
| `ssef_handle_no_results(1,"The mc_data_hygiene_learned_sourcetypes summary job completed successfully without identifying any issues, and everything is operating as expected.")`

