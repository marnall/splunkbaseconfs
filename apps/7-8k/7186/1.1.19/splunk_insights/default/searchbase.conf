[triggered_risk_rules]
search_name = Triggered Risk Rules
readonly = 1
ssef_cron = weekly
target_component = Risk Based Alerting
version = 1.0.6
date_updated = 2025-11-24 15:57:59
category = ES Adoption
sub_category = Security
tags = Detections and Alerts,ES Adoption,RBA,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 195310779AC394FA8F5F5323CA095896
search_author = dluxton
updated_author = akhamis
related_info = <p>How to Review<br>There should be a correlation between the notable severity and the risk score. <br>This search also identifies when there are noisy risk rules which would need to be tuned.</p>
severity_normal_text = <br/><p>All of the following criteria have been met:</p>\
<ul>\
<li>20 or more unique risk rules have triggered</li>\
<li>Less than 10 risk rules triggered have missing security domain or severity details</li>\
<li>Less than 25% of the triggered risk rules have a severity which alligns to the risk score</li>\
<li>There are 50% or higher triggered risk rules which have had their risk score altered by Risk Factors</li>\
<li>There are no noisy risk rules contributing 20% or more of the overall risk rule volume</li>\
</ul>
severity_low_text = <br/><p>One of the following criteria has been met:</p>\
<ul>\
<li>More than 10 risk rules have triggered which are missing security domain or severity details</li>\
<li>More than 25% of the triggered risk rules have a severity which does not allign to the risk score</li>\
<li>Less than 50% of the triggered risk rules have had the risk score altered by Risk Factors</li>\
<li>There is one or more moderately noisy risk rule which is accounting for more than 20% of all triggered risk events</li>\
</ul>
severity_medium_text = <br/><p>One of the following criteria has been met:</p>\
<ul>\
<li>Less than 20 unique risk rules have triggered</li>\
<li>More than 50 risk rules have triggered which are missing security domain or severity details</li>\
<li>More than 50% of the triggered risk rules have a severity which does not allign to the risk score</li>\
<li>Less than 10% of the triggered risk rules have had the risk score altered by Risk Factors</li>\
<li>There is one or more highly noisy risk rule which is accounting for more than 40% of all triggered risk events</li>\
</ul>
severity_high_text = <br/><p>One of the following criteria has been met:</p>\
<ul>\
<li>Less than 10 unique risk rules have triggered</li>\
<li>More than 100 risk rules have triggered missing security domain or severity details</li>\
<li>More than 75% of the triggered risk rules have a severity which does not allign to the risk score</li>\
<li>None of the triggered risk rules have had the risk score altered by Risk Factors</li>\
<li>There is an extremely noisy risk rule which is accounting for more than 70% of all triggered risk events</li>\
</ul>
severity_critical_text = <br/><p>0 risk rules triggered over the past 7 days.</p>
description = <p>Breakdown of triggered risk rules.</p>\
<p></p>\
<p>Identify noisy rules, missing details, use of risk factors &amp; potential misalignment of severity to risk score.</p>
search = | tstats summariesonly=false min(All_Risk.risk_score) as min_risk_score max(All_Risk.risk_score) as max_risk_score avg(All_Risk.risk_score) as avg_risk_score count from datamodel=Risk by source \
| eval summary_id="triggered_risk_rules" \
| rename source as search_name \
| join search_name \
    [| search `ssef_summary(ssef_saved_searches)` host=sh-i-scma disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 \
    | stats latest(*) as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
    | spath input=action_risk_param_risk \
    | eval risk_score = mvindex(coalesce('{}.risk_score', action_risk_param_risk_score), 0) \
    | eval risk_score = if(isnull(risk_score) OR risk_score=="", 0, risk_score) \
    | fields savedsearch_name action_notable_param_security_domain action_notable_param_severity risk_score \
    | rename savedsearch_name as search_name, action_notable_param_security_domain as security_domain, action_notable_param_severity as severity ] \
| sort -count \
| fillnull value="none" severity, security_domain \
| eval flat_risk=if(min_risk_score=max_risk_score,"true","false") \
| eval sev_bounds=case(\
    severity="critical" AND (avg_risk_score>=75 OR risk_score>=75),"risk to severity on target",\
    severity="high" AND ((avg_risk_score<=85 AND avg_risk_score>=60) OR (risk_score<=85 AND risk_score>=60)),"risk to severity on target",\
    severity="medium" AND ((avg_risk_score>=25 AND avg_risk_score<=75) OR (risk_score>=25 AND risk_score<=75)),"risk to severity on target",\
    severity="low" AND ((avg_risk_score<=45 AND avg_risk_score>=10) OR (risk_score<=45 AND risk_score>=10)),"risk to severity on target",\
    severity="informational" AND (avg_risk_score<=10 OR risk_score<=10),"risk to severity on target",\
    true(),"risk to severity misalignment") \
| eventstats count as count_unique_alert sum(count) as total_triggers \
| eval trigger_pec=round(count/total_triggers*100,2) \
| eval noise_ratio=case(\
    count_unique_alert<5,"less than 5 risk alerts triggered",\
    trigger_pec>70,"extreme",\
    trigger_pec>40,"high",\
    trigger_pec>20,"moderate",\
    true(),null()) \
| eventstats count(eval(if(noise_ratio!="less than 5 risk alerts triggered",noise_ratio,null()))) as count_noisy_rules, count(eval(if(noise_ratio="extreme",noise_ratio,null()))) as count_extremely_noisy_rules, count(eval(if(noise_ratio="high",noise_ratio,null()))) as count_highly_noisy_rules, count(eval(if(noise_ratio="moderate",noise_ratio,null()))) as count_moderately_noisy_rules, count(eval(if(flat_risk="true",flat_risk,null()))) as count_flat_risk, count(eval(if(flat_risk="false",flat_risk,null()))) as count_flat_risk_false, count(eval(if(security_domain="none",security_domain,null()))) as count_none_security_domain, count(eval(if(severity="none",severity,null()))) as count_none_severity_domain, count(eval(if(sev_bounds="risk to severity on target",severity,null()))) as count_sev_bounds_ot, count(eval(if(sev_bounds="risk to severity misalignment",severity,null()))) as count_sev_bounds_not_ot \
| eval sec_domain_obs=case(\
    count_none_security_domain>100,"More than 100 risk rules are missing security domain|",\
    count_none_security_domain>50,"More than 50 risk rules are missing security domain|",\
    count_none_security_domain>10,"More than 10 risk rules are missing security domain|",\
    true(),null()) \
| eval sec_domain_obs=case(\
    count_none_severity_domain>100,"More than 100 risk rules are missing severity|",\
    count_none_severity_domain>50,"More than 50 risk rules are missing severity|",\
    count_none_severity_domain>10,"More than 10 risk rules are missing severity|",\
    true(),null()) \
| eval sev_bounds_obs=case(\
    count_sev_bounds_not_ot/total_triggers*100>75,"More than 75% ("+count_sev_bounds_not_ot+") of the triggered risk rules are missing severity or their risk score does not match the expected severity value|",\
    count_sev_bounds_not_ot/total_triggers*100>50,"More than 50% ("+count_sev_bounds_not_ot+") of the triggered risk rules are missing severity or their risk score does not match the expected severity value|",\
    count_sev_bounds_not_ot/total_triggers*100>25,"More than 25% ("+count_sev_bounds_not_ot+") of the triggered risk rules are missing severity or their risk score does not match the expected severity value|",\
    true(),null()) \
| eval flat_risk_obs=case(\
    count_flat_risk_false=0,"risk factors are not in effect|",\
    (count_flat_risk/total_triggers*100)<10,"less than 10% of the triggered risk rules have had their score modified by risk factors|",\
    (count_flat_risk/total_triggers*100)<25,"less than 25% of the triggered risk rules have had their score modified by risk factors|",\
    (count_flat_risk/total_triggers*100)<50,"less than 50% of the triggered risk rules have had their score modified by risk factors|",\
    true(),null()) \
| eval noisy_rules_obs=mvappend(\
    if(count_noisy_rules>0,count_noisy_rules+" risk rule(s) in need of tuning|",null()),\
    if(count_extremely_noisy_rules>0,"There is an extremely noisy rule in need of tuning|",null()),\
    if(count_highly_noisy_rules>0,count_highly_noisy_rules+" highly noisy rule(s) in need of tuning|",null()),\
    if(count_moderately_noisy_rules>0,count_moderately_noisy_rules+" moderately noisy rule(s) in need of tuning|",null())) \
| eval description=mvappend(noisy_rules_obs,sec_domain_obs,sec_domain_obs,sev_bounds_obs,flat_risk_obs) \
| eval severity_level = case (\
    count_unique_alert=0,5,\
    count_unique_alert<10 OR count_none_security_domain>100 OR count_none_severity_domain>100 OR sev_bounds_obs like "More than 75%" OR count_flat_risk_false=0 OR count_extremely_noisy_rules>0,4,\
    count_unique_alert<20 OR count_none_security_domain>50 OR count_none_severity_domain>50 OR sev_bounds_obs like "More than 50%" OR (count_flat_risk/total_triggers*100)<10 OR count_highly_noisy_rules>0,3,\
    count_none_security_domain>10 OR count_none_severity_domain>10 OR sev_bounds_obs like "More than 25%" OR (count_flat_risk/total_triggers*100)<50 OR count_moderately_noisy_rules>0,2,\
    count_unique_alert>=20 AND count_none_security_domain<=10 AND count_none_severity_domain<=10 AND (count_flat_risk/total_triggers*100)>=50 AND count_noisy_rules=0,1,\
    true(),1) \
| table avg_risk_score count count_extremely_noisy_rules count_flat_risk count_flat_risk_false count_highly_noisy_rules count_moderately_noisy_rules count_noisy_rules count_none_security_domain count_none_severity_domain count_sev_bounds_not_ot count_sev_bounds_ot count_unique_alert description flat_risk flat_risk_obs max_risk_score min_risk_score noise_ratio noisy_rules_obs risk_score search_name security_domain sev_bounds severity total_triggers trigger_pec severity_level \
| `ssef_handle_no_results(1,"The triggered_risk_rules summary job completed successfully without identifying any issues, and everything is operating as expected.")`

