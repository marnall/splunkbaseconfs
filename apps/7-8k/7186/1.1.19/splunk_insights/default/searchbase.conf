description = <p>This looks at the how many unique scheduled searches (not inclusive of acceleration searches) have been run via the _introspection index, on a daily basis over the last business weeks & then computes the daily average.  This is directly correlated with product usage, as searches go up, Splunk is being leveraged more.</p>
search = | tstats summariesonly=true dc(data.search_props.label) as distinct_searches_ran WHERE index=_introspection sourcetype="splunk_resource_usage" data.search_props.sid=* data.search_props.mode!=RT data.search_props.user!="splunk-system-user" data.search_props.type="scheduled" by _time span=1d\
| eval summary_id="summary_average_daily_searches_distinct"\
| stats avg(distinct_searches_ran) as daily_average_distinct_searches_ran\
| eval daily_average_distinct_searches_ran = ceiling(daily_average_distinct_searches_ran)\
| eval severity_level = case (daily_average_distinct_searches_ran > 100, 1, daily_average_distinct_searches_ran > 75, 2, daily_average_distinct_searches_ran > 50, 3, daily_average_distinct_searches_ran > 25, 4, true(), 5)\
| table daily_average_distinct_searches_ran severity_level\
| `ssef_handle_no_results(1,"The summary_average_daily_searches_distinct summary job completed successfully without identifying any issues, and everything is operating as expected.")`

