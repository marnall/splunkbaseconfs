execution_plan = <b>01</b> <code>| fields ...</code><br> - Extracts relevant fields for downstream analysis.<br><b>02</b> <code>| bin _time span=1d</code><br> - Buckets results by day.<br><b>03</b> <code>| stats count by _time orig_sourcetype</code><br> - Tallies daily event counts per sourcetype.<br><b>04</b> <code>| rename orig_sourcetype as sourcetype</code><br> - Standardizes field for lookup compatibility.<br><b>05</b> <code>| lookup uce_custom_sourcetype_mapping...</code><br> - Adds sourcetype classification from custom mappings.<br><b>06</b> <code>| lookup uce_sourcetype_mapping...</code><br> - Applies default fallback metadata.<br><b>07</b> <code>| eval sourcetype_category=split(...)</code><br> - Normalizes multi-value category/domain fields.<br><b>08</b> <code>| stats values(*) as * by sourcetype data_type</code><br> - Aggregates enriched metadata.<br><b>09</b> <code>| lookup uce_usecase_mapping...</code><br> - Maps data types to use cases.<br><b>10</b> <code>| eval use_case=mvdedup(...)</code><br> - Deduplicates mapped use cases.<br><b>11</b> <code>| stats values(*) as * by sourcetype use_case</code><br> - Re-aggregates by use case.<br><b>12</b> <code>| lookup uce_usecase_mapping...</code><br> - Enriches with use case classification metadata.<br><b>13</b> <code>| eval use_case_type=mvdedup(...)</code><br> - Collapses duplicate type values.<br><b>14</b> <code>| eval domain = mvdedup(...)</code><br> - Resolves final domain attribution.<br><b>15</b> <code>| eval category = mvdedup(...)</code><br> - Resolves final category attribution.<br><b>16</b> <code>| eval use_case_name = if(...)</code><br> - Filters for valid use cases only.<br><b>17</b> <code>| stats sum(...) as num_Analytic_Capabilities...</code><br> - Sums capability counts per classification.<br><b>18</b> <code>| chart sum(...) over category by domain</code><br> - Produces a matrix view of technical capabilities by category and domain.<br>
explanation = <p>This search offers operational insight into what types of data are being indexed and how they map to business-aligned use cases. It supports platform owners and data analysts in identifying coverage gaps, prioritizing onboarding, and ensuring sourcetypes are aligned with analytic and technical capabilities. It enables teams to assess whether ingested data is delivering actionable outcomes, measure domain presence, and validate enrichment completeness from lookup mappings.</p>
