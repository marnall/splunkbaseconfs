description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The ratio of "regularly" accessed sourcetypes to the total number of sourcetypes within Splunk for the selected time frame.  A regularly accessed sourcetype is a sourcetype used in searches at least five times a day.<br><br></p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>This percentage serves as a key KPI, offering insights into strategic utilization, user satisfaction, informed decision-making, and potential value at risk. A notably low percentage indicates underutilization, suggesting that Splunks full benefits and value are not being maximized. Maintaining proper sourcetype hygiene is critical for accurate analytics. Regular monitoring and removal of unused or irrelevant sourcetypes are essential to maintain the integrity and relevance of data analytics.<br><br></p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>This KPI should be tracked <em>weekly</em> and <em>monthly</em> to ensure optimal engagement and efficient use of resources within Splunk.</p>
search = | `ssef_license_search_data` \
| eval summary_id="%_of_Regularly_Accessed_Sourcetypes_to_Total_Export" \
| where License_Usage > 0 \
| bin _time span=1d \
| addinfo \
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by Sourcetype \
| eval perc_active = round((num_active_days / num_days) * 100, 2) \
| eval Active_Sourcetype = if((perc_active >= `ssef_perc_active_threshold`) AND num_searches > 0, Sourcetype, null() ) \
| eval datamodel_reference=split(datamodel_reference,"|") \
| eval Sourcetype=mvdedup(mvappend(lower(Sourcetype),lower(datamodel_reference))) \
| stats \
    dc(Sourcetype) as Num_Sourcetypes, \
    dc(Active_Sourcetype) as Num_Regularly_Accessed_Sourcetypes \
    by _time \
| eval Perc_of_Regularly_Accessed_Sourcetypes_to_total = round((Num_Regularly_Accessed_Sourcetypes / Num_Sourcetypes) * 100, 2) \
| fillnull value=0 Num_Sourcetypes, Num_Regularly_Accessed_Sourcetypes, Perc_of_Regularly_Accessed_Sourcetypes_to_total \
| fields _time Num_Sourcetypes Num_Regularly_Accessed_Sourcetypes Perc_of_Regularly_Accessed_Sourcetypes_to_total \
| bin _time span=1d \
| stats max(Perc_of_Regularly_Accessed_Sourcetypes_to_total) as kpi_value by _time  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "% of Regularly Accessed Sourcetypes to Total" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

