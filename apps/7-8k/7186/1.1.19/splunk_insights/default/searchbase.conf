| fields _time label name host_num_events host_gb_transfered host_sourcetype_count count_gb_sourcetype role severity_level \
| stats latest(_time) as _time latest(*) AS * values(role) AS role by label \
| makemv delim="," count_gb_sourcetype \
| mvexpand count_gb_sourcetype \
