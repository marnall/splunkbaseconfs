[ssef_scma_object_collisions]
search_name = Knowledge Object Collisions
readonly = 1
target_component = Apps and Add-ons
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 17:1:22
category = Splunk
sub_category = Apps
tags = Apps,REST,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 28690066573392D9BC300DF4380F27EB
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/Knowledgeobjectnamecollisions" target="_blank">Knowledge Object Name Collisions</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/InheritedDeployment/Searchesandknowledgeobjects" target="_blank">Searches and Knowledge Objects</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/Manageknowledgeobjectconflicts" target="_blank">Splunk Docs - Knowledge Object Conflicts and Merging</a></li>\
<li><a href="https://community.splunk.com/t5/Knowledge-Management/Handling-Knowledge-Object-Collisions-in-Splunk/m-p/526781" target="_blank">Splunk Community - Handling Knowledge Object Collisions</a></li>\
<li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/dependencies" target="_blank">Splunkbase - Managing App Dependencies and Conflicts</a></li>\
</ul>
severity_normal_text = <br/><p>No object collisions were detected; everything appears to be functioning normally.</p>
severity_medium_text = <br/><p>Detected multiple global definitions and mixed visibility of knowledge objects, risking conflicts across apps. Recommend reconciling these objects for consistent functionality and avoiding knowledge management issues.</p>
description = <p>This search is designed to identify and analyze object collisions across Splunk Apps. Object collisions occur when multiple applications use the same identifiers for different objects, which can lead to conflicts and unexpected behavior within the system. By pinpointing these collisions, the search helps in ensuring that apps function as intended without interference. This analysis is crucial for maintaining system integrity and performance, preventing potential issues that could arise from overlapping configurations and ensuring a smoother operation of Splunk environments.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Knowledge object collisions were detected.</li>\
<li><strong>Normal:</strong> No knowledge object collisions were detected.</li>\
</ul>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/directory \
| eval summary_id="ssef_scma_object_collisions" \
| rename eai:acl.* AS * eai:type AS config \
| `ssef_instance_info(splunk_server)` \
| search NOT app IN (splunk_insights) \
| stats dc(app) AS dc_app values(app) AS app values(sharing) AS sharing values(splunk_server) AS splunk_server values(role) AS role latest(name) as name by label, title, config \
| where dc_app>1 AND sharing="global" AND NOT match(config, "^(:?views|nav)$") \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/data/lookup-table-files \
    | rename eai:acl.* AS * \
    | eval config="lookup-file" \
    | `ssef_instance_info(splunk_server)` \
    | stats dc(app) AS dc_app values(app) AS app values(sharing) AS sharing values(splunk_server) AS splunk_server values(role) AS role latest(name) as name by label, title, config \
    | where dc_app>1 AND sharing="global" ] \
| rename title AS object \
| eval message=case (dc_sharing>1, "Public and private versions of this object have been identified, this object may not function as-desired depending on the app it is used from.", sharing=="global", "Multiple definitions of this object have been identified, this object may not function as-desired.", true(), "This object has an issue") \
| eval sharing=mvjoin(sharing,",") , role=mvjoin(role,":") , app=mvjoin(app,":") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( dc_sharing > 1 OR sharing=="global", medium, true(), normal ) \
| table label name object config app sharing dc_app role message severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_object_collisions summary job completed successfully without identifying any issues, and everything is operating as expected.")`

