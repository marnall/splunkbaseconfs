search_name = Saturation of event-processing queues
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Indexing
category = Health Check
sub_category = Data Indexing
tags = Health Check,Indexing,Monitoring Console,Queues,Summary
solution = Check the Monitoring Console indexing performance view for the affected indexers.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 64382DE1A57A610E09303221B60F7A74
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_low_text = One or more of the indexer queues on this instance is reporting an averaged fill percentage of 90 or more over the last 15 minutes. This might affect how quickly this instance indexes events.
description = This checks if queues on your indexers have been saturated (i.e: 90% full or more) consistently in the past 15 minutes.
search = | rest `ssef_rest_target` `ssef_rest_timeout` /services/server/introspection/queues \
| eval summary_id="mc_saturation_of_event_processing_queues" \
| search title=parsingQueue* OR title=aggQueue* OR title=typingQueue* OR title=indexQueue* \
| eval fill_perc = round(current_size_bytes / max_size_bytes * 100,2) \
| rex field=title "(?<queue_name>^\w+)(?:\.(?<pipeline_number>\d+))?" \
| fields splunk_server fill_perc queue_name pipeline_number \
| eval severity_level = if( fill_perc > 90, 2, 1) \
| eval fill_perc = if(isnotnull(pipeline_number), "pset".pipeline_number.": ".fill_perc, fill_perc) \
| chart values(fill_perc) AS fill_perc max(severity_level) AS severity_level over splunk_server by queue_name \
| rename "fill_perc: *" AS * "severity_level: *" AS "sev_*" \
| eval severity_level = max(sev_parsingQueue, sev_aggQueue, sev_typingQueue, sev_indexQueue) \
| fields splunk_server severity_level parsingQueue aggQueue typingQueue indexQueue \
| rename splunk_server AS instance parsingQueue as "Parsing Queue Fill Ratio (%)", aggQueue as "Aggregation Queue Fill Ratio (%)", "typingQueue" as "Typing Queue Fill Ratio (%)", indexQueue as "Indexing Queue Fill Ratio (%)"\
| `ssef_handle_no_results(1,"The mc_saturation_of_event_processing_queues summary job completed successfully without identifying any issues, and everything is operating as expected.")`

