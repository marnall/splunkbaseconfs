solution = <p>This insight highlights how different types of searches contribute to daily platform usage.</p><p><b>Suggested Actions</b> Use this breakdown to identify opportunities to convert frequent adhoc searches into scheduled workloads, rebalance search scheduling during peak hours, and guide user enablement or automation efforts.</p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary(ssef_audit_user_login_tracker)</code><br> - Collects summarized user search activity including counts and classifications.<br><b>02</b> <code>| eval / case</code><br> - Normalizes mixed search types to avoid double-counting combined behaviors.<br><b>03</b> <code>| stats</code><br> - Calculates average daily search volume by normalized search type.<br><b>04</b> <code>| timechart</code><br> - Visualizes search activity trends over time by category.<br>
explanation = <p>Understanding how users interact with Splunk through different search types provides critical insight into platform behavior and load characteristics. Adhoc searches often reflect exploratory analysis and troubleshooting, while scheduled searches indicate automation, reporting, and background workloads. This insight helps administrators balance performance tuning, capacity planning, and governance by revealing which usage patterns dominate over time. By monitoring trends in search type distribution, teams can optimize scheduling strategies, reduce contention, and improve overall search efficiency.</p>
quid = F890896FA51D682C5D2A10786DB3F03B
updated_author = akhamis
description = <p>This search analyzes <b>average daily search volume</b> by <b>search type</b> across the environment. It normalizes mixed search classifications to show how <b>adhoc versus scheduled activity</b> contributes to overall usage. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_audit_user_login_tracker)` \
| fields _time label name app user session num_searches latest_logon latest_search total_search_time search_type role index_reference sourcetype_reference datamodel_reference lookup_reference severity_level \
| bin _time span=1h \
| stats latest(num_searches) as num_searches latest(search_type) as search_type by _time, label, app, user \
| eval search_type=split(search_type, "|") \
| eval search_type=case( \
    search_type="adhoc" AND search_type="subsearch" AND mvcount(search_type)=2, "adhoc", \
    search_type="scheduled" AND search_type="subsearch" AND mvcount(search_type)=2, "scheduled", \
    search_type="scheduled" AND search_type="subsearch" AND match(search_type,"_acceleration") AND mvcount(search_type)>=3, "scheduled", \
    search_type="scheduled" AND match(search_type,"_acceleration") AND mvcount(search_type)=2, "scheduled", \
    search_type="subsearch" AND mvcount(search_type)=1, "scheduled", \
    true(), search_type ) \
| eval search_type_count = mvcount(search_type) \
| eval adjusted_num_searches = num_searches / search_type_count \
| bin _time span=1d \
| stats sum(adjusted_num_searches) as total_num_searches by _time search_type \
| stats avg(total_num_searches) as avg_num_searches by _time search_type \
| eval search_type=case(match(search_type,"_acceleration|alertsmanager"), "scheduled", match(search_type,"api|realtime|metadata"), "adhoc", true(), "other") \
| timechart partial=t fixedrange=t sum(avg_num_searches) as avg_num_searches by search_type span=1d

[Classic Dashboard Search Dependency Analyzer]
search_name = Classic Dashboard Search Dependency Analyzer
readonly = 1
diagnostic_searches = ssef_data_ui_views
version = 1.0.2
date_created = 2025-12-3 15:53:17
date_updated = 2025-12-3 16:15:34
category = Splunk
sub_category = Dashboards
tags = Dashboards,Extractions,Searches
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
search_author = akhamis
updated_author = akhamis
description = <p>This search analyzes Splunk dashboard and view definitions to identify and reconstruct complex searches that are built using a "base" and "post-search" structure.</p><p><strong>Purpose:</strong> In many advanced dashboards, a panel's search is split into two parts: a main base search defined once with an <code>id</code>, and a second inline search that uses the <code>base</code> attribute to run after the main one. This makes it difficult to see the full, executable query just by looking at the panel's XML. This query solves that problem by making those hidden dependencies visible.</p><p><strong>How it Works:</strong></p><ol><li data-list="ordered"><span class="ql-ui"></span>It scans all search blocks within the specified dashboards.</li><li data-list="ordered"><span class="ql-ui"></span>It isolates the "child" searches (those with a <code>base="..."</code> attribute).</li><li data-list="ordered"><span class="ql-ui"></span>Using a <code>join</code>, it finds the corresponding "parent" search (the one with a matching <code>id="..."</code> attribute).</li><li data-list="ordered"><span class="ql-ui"></span>It then combines the base query and the inline query to show the full, reconstructed SPL.</li></ol><p><strong>Use Cases:</strong></p><ol><li data-list="bullet"><span class="ql-ui"></span><strong>Performance Tuning:</strong> Identify which inline searches are running on top of large, expensive base searches.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Troubleshooting:</strong> Understand the complete logic of a dashboard panel that is failing or producing unexpected results.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Security &amp; Auditing:</strong> Reveal the full extent of data being accessed by a dashboard.</li></ol>
search = `ssef_summary(ssef_data_ui_views)` type=classic classic_search_block=* \
| stats LATEST(*) AS * by label app sharing author view_name \
| makemv delim="#####" classic_search_block \
| mvexpand classic_search_block \
| where isnotnull(classic_search_block) AND classic_search_block!="" \
| dedup classic_search_block \
| where like(classic_search_block, "%base=%") \
| rex field=classic_search_block "base=\"(?<base_id>\w+)" \
| rex field=classic_search_block "<query>(?<inline_query>[\s\S]*?)<\/query>" \
| where isnotnull(base_id) \
| join type=left label app sharing author view_name base_id \
    [| search `ssef_summary(ssef_data_ui_views)` type=classic classic_search_block=* \
    | stats LATEST(*) AS * by label app sharing author view_name \
    | makemv delim="#####" classic_search_block \
    | mvexpand classic_search_block \
    | where isnotnull(classic_search_block) AND classic_search_block!="" \
    | dedup classic_search_block \
    | where like(classic_search_block, "%id=%") \
    | rex field=classic_search_block "id=\"(?<base_id>\w+)" \
    | rex field=classic_search_block "<query>(?<base_query>[\s\S]*?)<\/query>" \
    | where isnotnull(base_id) \
    | eval base_query=trim(base_query) \
    | fields label app sharing author view_name base_id base_query ] \
| eval inline_query = trim(inline_query) \
| eval full_query = base_query + " " + inline_query \
| where isnotnull(base_query) \
| rename base_id as "Linked By ID" \
| table label app view_name base_query inline_query "Linked By ID" full_query

[Cloud Storage Summary Analysis]
search_name = Cloud Storage Summary Analysis
readonly = 1
version = 2.x
date_created = 2023-10-06
category = Splunk
sub_category = Storage
tags = Cloud,DDAS,KPIs,Licensing,Storage
solution = <p>This search helps identify storage trends and potential licensing overages, enabling teams to take corrective actions to optimize storage usage.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor storage usage regularly to ensure compliance with licensing limits.<br><b>2.</b> Investigate severe usage ranges to identify root causes and mitigate risks.<br><b>3.</b> Plan for additional storage capacity if customer storage consistently approaches or exceeds active license limits.<br><b>4.</b> Optimize internal storage to reduce total storage usage and free up customer capacity.<br><b>5.</b> Set alerts for sudden spikes in storage usage.</p><p><b>Recommended Alerts</b></p><p><b>Normal: </b> Notify if storage usage remains below 70% of licensing limits.</p><p><b>Low: </b> Trigger alerts if storage usage exceeds 70% but remains below 90% of licensing limits.</p><p><b>Medium: </b> Alert if storage usage exceeds 90% of licensing limits.</p><p><b>High: </b> Escalate if customer storage exceeds active storage license limits.</p><p><b>Critical: </b> Trigger emergency alerts if total storage exceeds both customer and internal licensing limits.</p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>ssef_cloud_summary source=splunk-storage-summary</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Collects cloud storage usage and licensing data.<br><b>02</b> <code>stats max</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates maximum storage values for customer and internal usage.<br><b>03</b> <code>eval sum</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Computes total raw storage by summing customer and internal storage.<br><b>04</b> <code>eval storageTB</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Converts raw storage into TB and formats the data for readability.<br><b>05</b> <code>eval range</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Categorizes storage usage into severity ranges based on licensing limits.<br><b>06</b> <code>table</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Outputs a clean table summarizing storage usage, licensing, and severity.</br>
explanation = <p>This search provides a summary of <b>cloud storage usage</b>, including customer and internal storage, compared against active licensing limits. It evaluates current storage usage, formats data for readability, and categorizes storage range severity based on licensing thresholds.</p><p>- Calculates <b>total raw storage</b> by combining customer and internal storage volumes.<br>- Converts raw storage values into TB for easier comprehension.<br>- Identifies <b>severe</b> or <b>low</b> ranges based on whether usage exceeds licensed limits.<br>- Outputs a concise table highlighting storage usage, limits, and severity ranges.</p><p>This analysis helps teams manage storage usage effectively while maintaining compliance with licensing agreements.</p>
quid = 7888CF950D5F442636AF666A319771C7
search_author = Splunk Searchbase Assistant
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Stats" target="_blank">Stats Command Documentation</a><br>Details on aggregating storage usage data.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Eval" target="_blank">Eval Command Documentation</a><br>Learn how to calculate and format storage metrics using eval.</li></ul>
description = <p>Cloud Retention TB - Paid: Total Searchable storage licensed for &lt;data&gt; Purchased TB</p> \
<b>Summarizes cloud storage usage and licensing</b>, identifying potential overages and storage trends.
search = `ssef_cloud_summary` source=splunk-storage-summary \
| stats max(activeArchiveLicenseGB) as activeArchiveLicenseGB max(activeStorageLicenseGB) as activeStorageLicenseGB max(rawSizeGBCustomer) as rawSizeGBCustomer max(rawSizeGBInternal) as rawSizeGBInternal \
| eval sum=rawSizeGBCustomer+rawSizeGBInternal \
| eval storageTB=tostring(round(rawSizeGBCustomer/1024,0),"commas")."/".tostring(round(sum/1024,0),"commas") \
| eval range=if(rawSizeGBCustomer>activeStorageLicenseGB, "severe", "low") \
| eval activeStorageLicenseGB=tostring(round(activeStorageLicenseGB/1024,0),"commas") \
| table storageTB range activeStorageLicenseGB activeArchiveLicenseGB rawSizeGBCustomer rawSizeGBInternal activeStorageLicenseGB

[Cloud SVC Utilization]
search_name = Cloud SVC Utilization
readonly = 1
version = 2.x
date_created = 2025-06-04
category = Splunk
sub_category = Licensing
tags = Capacity,Cloud,KPIs,Licensing,SVC,Utilization,Workload
solution = <p>Tracks daily usage of Splunk Virtual Compute (SVC) to evaluate licensing efficiency and detect capacity risks based on historical patterns.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor trends in daily and weekly SVC utilization.<br><b>2.</b> Investigate spike patterns and compare weekday vs. weekend demand.<br><b>3.</b> Scale infrastructure if average utilization nears thresholds.<br><b>4.</b> Review workloads running during weekends if weekend usage is higher.<br><b>5.</b> Coordinate with licensing or support teams if compute saturation occurs.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case ( 'Overall Average'&lt;75, 1, 'Max Daily'&gt;='Overall Average'*1.5, 2, 'Min Daily'&lt;='Overall Average'*0.5, 2, 'Weekend'&gt;='Weekday' AND 'Overall Average'&gt;=75, 3, 'Overall Average'&gt;=85, 4, 'Overall Average'&gt;=95, 5, 1=1, 0)</code></pre><p>Insert this logic after the final stats/transpose/rename stage of your existing search to append a severity field for alerting or dashboard visualizations.</p><p><b>Evaluation Logic:</b></p><ul><li>Normal (Severity 1): 'Overall Average' &lt; 75 — Indicates a healthy buffer between current usage and licensed compute capacity.</li><li>Low (Severity 2): 'Max Daily' ≥ 150% of 'Overall Average' or 'Min Daily' ≤ 50% of 'Overall Average' — Highlights irregular demand swings suggesting potential workload spikes or underutilization periods.</li><li>Medium (Severity 3): 'Weekend' ≥ 'Weekday' AND 'Overall Average' ≥ 75 — Suggests off-hour or batch jobs are consuming high compute, potentially interfering with weekday workloads.</li><li>High (Severity 4): 'Overall Average' ≥ 85 — Signals that the environment is nearing its compute ceiling; optimization or capacity expansion should be considered.</li><li>Critical (Severity 5): 'Overall Average' ≥ 95 — Indicates saturation; critical compute risk requiring immediate action to avoid degraded performance or ingestion failures.</li></ul>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_cloud_summary` source=splunk-svc</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Invokes macro pulling raw SVC usage by role and stack<br><b>02</b> <code>convert num(utilized_svc)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Coerces field to numeric type<br><b>03</b> <code>rename fields</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Standardizes column headers<br><b>04</b> <code>stats max() by _time stack_license_svc role</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Gets daily peak usage by license and role<br><b>05</b> <code>stats sum + latest</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates daily volume, attaches stack name<br><b>06</b> <code>eval weekday/weekend</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Tags days for weekday/weekend segmentation<br><b>07</b> <code>bucket _time span=1d</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Normalizes timestamps for daily resolution<br><b>08</b> <code>stats avg/max/min by daytype</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Derives daily utilization metrics<br><b>09</b> <code>transpose</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Rotates results for columnar output<br><b>10</b> <code>round + rename</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Finalizes table for display clarity<br>
explanation = <p>This search helps assess how Splunk Virtual Compute resources are consumed daily by breaking out weekday and weekend usage. SVCs are tied to the computational demand of a Splunk Cloud environment and not bound to ingest volume. Analyzing these patterns enables stakeholders to optimize infrastructure sizing, align workloads, and anticipate licensing needs.</p><p>It aggregates daily maximum and minimum utilization, calculates average volumes, and surfaces variations based on the day type. For practitioners, the SPL uses <b>convert</b> for field coercion, <b>eval</b> for temporal classification, <b>stats</b> for aggregation, and <b>transpose</b> to pivot results for reporting clarity.</p><p>This breakdown also provides visibility into whether weekend processing loads impact the overall average or indicate underutilized weekdays. By correlating against thresholds, users can manage compute overhead more efficiently.</p>
quid = 6A98AA4CB0847F1E56532F2DCE9087B2
search_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Admin/AboutSplunkVirtualCompute" target="_blank">About Splunk Virtual Compute</a><br>Overview of how SVC works in Splunk Cloud environments.</li><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Admin/ServiceLimits" target="_blank">Service Limits</a><br>Lists compute thresholds and usage policies.</li><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Admin/MonitoringUsage" target="_blank">Monitoring Usage</a><br>Describes how to track SVC usage in the Cloud Monitoring Console.</li></ul>
description = <b>Measures SVC (Splunk Virtual Compute) usage trends</b> by contrasting weekday and weekend utilization to support compute capacity planning.
search = `ssef_cloud_summary` source=splunk-svc \
| convert num(utilized_svc) AS utilized_svc \
| rename role as "role", stack_license_svc as "stack_license_svc", utilized_svc as utilized_svc \
| stats max(utilized_svc) as utilized_svc by _time stack_license_svc role \
| stats sum(utilized_svc) as utilized_svc latest(stack_license_svc) as stack_license_svc by _time \
| eval date_wday=lower(strftime(_time,"%A")) \
| eval date_w=strftime(_time,"%d-%b-%y %a") \
| eval daytype=if(date_wday = "sunday" OR date_wday = "saturday","weekend","weekday") \
| bucket _time span=1d \
| stats avg(eval(if(daytype="weekend",utilized_svc, null()))) as Weekend avg(eval(if(daytype="weekday",utilized_svc, null()))) as Weekday max(utilized_svc) as "Max Daily" min(utilized_svc) as "Min Daily" avg(utilized_svc) as "Overall Average" \
| transpose \
| eval "row 1"=round('row 1', 2) \
| rename column as Days "row 1" as "Volume (utilized_svc)"

[Cloud SVC Utilization Analysis]
search_name = Cloud SVC Utilization Analysis
readonly = 1
version = 2.x
date_created = 2023-10-06
