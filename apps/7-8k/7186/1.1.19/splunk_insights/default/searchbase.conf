[Index Activity Overview: Average Ingest and Search Metrics]
search_name = Index Activity Overview: Average Ingest and Search Metrics
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker,ssef_internal_index_license_usage
version = 1.0.2
date_created = 2023-10-06
date_updated = 2025-6-6 13:44:40
category = Splunk
sub_category = Licensing
tags = Ingestion,KPIs,Licensing,Search
solution = <p>This search provides actionable insights into index activity, enabling teams to monitor search counts and license usage for operational optimization.</p><p><b>Suggested Actions</b><br><b>1.</b> Review indexes with high daily license usage to identify potential overuse or inefficiencies.<br><b>2.</b> Investigate indexes with unusually high or low search counts to ensure proper usage.<br><b>3.</b> Use the results to forecast future license needs and plan capacity expansions.<br><b>4.</b> Align index activity with organizational goals to optimize resource allocation.<br><b>5.</b> Share findings with stakeholders to improve data management strategies.</p><p><b>Recommended Alerts</b></p><p><b>Normal: </b> Notify if daily license usage remains within expected thresholds.</p><p><b>Low: </b> Alert if search counts fall below 50% of the average for a given period.<br></p><p><b>Medium: </b> Trigger alerts for indexes with high search counts or license usage.<br></p><p><b>High: </b> Escalate if daily license usage exceeds 90% of the allocated limit.<br></p><p><b>Critical: </b> Trigger immediate action if license usage exceeds allocated limits or search counts deviate significantly.</p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_license_search_data`</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieves data on license usage and search activity.<br><b>02</b> <code>stats by _time Index_Name</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates total search counts and license usage for each index over time.<br><b>03</b> <code>fillnull</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Replaces null values with 0 to ensure accurate calculations.<br><b>04</b> <code>where</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters results to include only indexes with non-zero license usage and valid search counts.<br><b>05</b> <code>bin</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Groups data into daily intervals for temporal analysis.<br><b>06</b> <code>stats max and sum</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates daily license usage and estimated search counts for each index.<br>
explanation = <p>This search generates a <b>KPI for index activity</b> by estimating data ingestion and search counts for each index. While the primary goal is to identify active indexes accurately, this analysis involves some level of approximation due to query constraints, incomplete data, or other limitations. Despite these challenges, the KPI delivers operational insights into index usage and search behavior.</p><p>- Uses <b>ssef_license_search_data</b> to gather license and search data.<br>- Aggregates search counts and license usage by index and time.<br>- Applies thresholds to filter out irrelevant or zero-usage indexes.<br>- Outputs daily license usage and estimated search counts for each index.</p><p>This analysis supports monitoring of index activity, capacity planning, and identifying trends in search behavior.</p>
quid = 4E8A215087777B6D699A54DE39E25210
search_author = Splunk Searchbase Assistant
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/Indexes" target="_blank">Indexes Documentation</a><br>Details on managing and monitoring Splunk indexes.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Stats" target="_blank">Stats Command Documentation</a><br>Learn how to aggregate data using stats.</li></ul>
description = <p>This KPI provides a <strong>rough</strong> <strong>estimate</strong> of index activity, including average data ingestion (in GB) and total search counts for each index. While the primary goal is to identify the indexes being searched as accurately as possible, it is important to note that this analysis involves some degree of guessing. As a result, certain indexes may not be captured in the final results due to factors such as incomplete data, query constraints, or other limitations. Despite these challenges, this KPI aims to deliver a useful approximation of index usage and search activity to support operational insights.</p>
default_viz = splunk.column
search = | `ssef_license_search_data` \
| eval index_reference = split(index_reference,"|") \
| stats sum(num_searches) as num_searches sum(License_Usage_GB) as License_Usage_GB by _time index_reference \
| where NOT match(index_reference, "\*|^_|^summary") \
| `ssef_macro_definition(label,index_reference)` \
| rename index_reference as orig_index_reference \
| `ssef_index_reference(Macro_Definition)` \
| eval index_reference=if(isnotnull(index_reference), index_reference, orig_index_reference) \
| stats avg(num_searches) as num_searches avg(License_Usage_GB) as License_Usage_GB by _time index_reference \
| where NOT match(index_reference, "\*|^_|^summary") \
| fillnull value=0 num_searches \
| where License_Usage_GB > 0 AND num_searches >= 0 \
| bin _time span=1d \
| stats max(eval(round(num_searches, 2))) as "Estimated # of Searches" sum(eval(round(License_Usage_GB, 2))) as "Daily License Usage (GB)" by _time index_reference

