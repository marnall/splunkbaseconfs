</ul><p>This discussion provides insights into calculating the average daily data ingestion by month, excluding weekends, to understand data patterns and their impact on customer value.</p><ul><li><a href="https://docs.splunk.com/Documentation/SOAR/current/Admin/IngestSummary" target="_blank">Splunk Docs: View how much data is ingested using ingestion summary</a></li></ul><p>This documentation explains how to use the ingestion summary feature to monitor data ingestion volumes, aiding in evaluating data usage and customer value.</p><ul><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/9.3.2408/Data/DataIngest" target="_blank">Splunk Docs: Use ingest actions to improve the data input process</a></li></ul><p>This resource discusses how to utilize ingest actions to enhance data input processes, which can influence data ingestion efficiency and customer value.</p><ul><li><a href="https://www.splunk.com/en_us/blog/platform/enhancements-to-ingest-actions-improve-usability-and-expand-searchability-wherever-your-data-lives.html" target="_blank">Splunk Blogs: Enhancements To Ingest Actions Improve Usability and Expand Searchability Wherever Your Data Lives</a></li></ul><p>This blog post highlights improvements to ingest actions in Splunk, emphasizing how these enhancements can optimize data ingestion and increase customer value.</p><ul><li><a href="https://www.splunk.com/en_us/blog/conf-splunklive/ingest-actions-data-access-when-where-and-how-you-need-it.html" target="_blank">Splunk Blogs: Ingest Actions: Data Access When, Where and How You Need It</a></li></ul><p>This article introduces ingest actions in Splunk, detailing how they provide flexible data access and improve the value delivered to customers.</p><ul><li><a href="https://www.splunk.com/en_us/blog/leadership/the-dollars-and-sense-of-data-strategy-managing-data-agility-and-value.html" target="_blank">Splunk Blogs: The Dollars and Sense of Data Strategy: Managing Data, Agility, and Value</a></li></ul><p>This blog post explores the economic aspects of data strategy, discussing how effective data ingestion and management can enhance customer value.</p>
description = <p>This search correlates <b>cloud license ingestion</b> with <b>index-level storage and search activity</b>. It identifies indexes that consume license capacity while also measuring <b>actual search usage</b>. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_cloud_summary` source=splunk-ingestion \
| fields _time idx st ingestion_gb indexer_count ingest_license \
| bin _time span=1h \
| stats Latest(ingestion_gb) As License_Usage_GB Latest(ingest_license) as stacksz_gb by _time, idx, st \
| bin _time span=1d \
| stats sum(License_Usage_GB) As License_Usage_GB Latest(stacksz_gb) as stacksz_gb values(st) as st by _time, idx \
| rename idx as Index \
| eval License_Usage=License_Usage_GB*1024 \
| fields Index Index License_Usage License_Usage_GB stacksz_gb \
| append \
    [ search `ssef_cloud_summary` source=splunk-storage-detail idxName!=_* \
    | fields _time idxName retentionDays rawSizeBytes rawSizeBytesCustomer rawSizeBytesInternal rawSizeGBCustomer rawSizeGBInternal startEpoch endEpoch eventCount maxGlobalDataSizeMB maxGlobalRawDataSizeMB rawSizeBytesDDAARestored rawSizeGBDDAARestored includedRetentionDays \
    | rename idxName As Index \
    | bin _time span=1d \
    | stats latest(*) as * by _time, Index \
    | fields _time Index rawSizeGBCustomer retentionDays ] \
| append \
    [ search `ssef_summary(ssef_audit_user_login_tracker)` \
    | fields _time label name app user session num_searches latest_logon latest_search total_search_time search_type role index_reference sourcetype_reference datamodel_reference lookup_reference severity_level \
    | bin _time span=1h \
    | stats latest(*) as * by _time , label, app, user \
    | foreach search_type session index_reference datamodel_reference lookup_reference sourcetype_reference \
        [| eval <<FIELD>>=split(lower(<<FIELD>>),"|") ] \
    | where match(index_reference, "^[^<>?&#]+$") AND NOT match(index_reference, "[\"'`*]") AND index_reference!="" \
    | rex field=index_reference mode=sed "s/\*{2,}/*/g" \
    | `ssef_macro_definition(label,index_reference)` \
    | rename index_reference as orig_index_reference \
    | `ssef_index_reference(Macro_Definition)` \
    | eval index_reference=if(isnotnull(index_reference) AND index_reference!="", index_reference, orig_index_reference) \
    | stats values(search_type) as search_type dc(session) as num_sessions values(*_reference) as *_reference sum(num_searches) as num_searches sum(total_search_time) as total_search_time latest(latest_search) as latest_search earliest(latest_search) as earliest_search dc(sourcetype_reference) as num_sourcetype_references by _time, app, user \
    | eval avg_searches_per_sourcetype_reference = if(num_sourcetype_references > 0, ceiling(num_searches / num_sourcetype_references), 0) \
    | eval avg_total_search_time = if(num_sourcetype_references > 0, ceiling(total_search_time / num_sourcetype_references), 0) \
    | stats sum(num_sessions) as num_sessions values(search_type) as search_type avg(avg_searches_per_sourcetype_reference) as num_searches avg(avg_total_search_time) as total_search_time values(*_reference) as *_reference by _time, index_reference \
    | rename sourcetype_reference as Sourcetype , index_reference as Index \
    | fields _time Index Sourcetype num_searches num_sessions total_search_time datamodel_reference lookup_reference search_type ] \
| bin _time span=1d \
| stats latest(rawSizeGBCustomer) as rawSizeGBCustomer Max(License_Usage_GB) as License_Usage_GB Max(License_Usage) as License_Usage Latest(num_searches) as num_searches Latest(total_search_time) as total_search_time Values(Sourcetype) as Sourcetype by _time, Index \
| fillnull value=0 License_Usage_GB estimated_num_searches total_search_time rawSizeGBCustomer License_Usage \
| where License_Usage > 0 \
```| eval Sourcetype = replace(Sourcetype, "[^A-Za-z0-9:_*-]", "") ```\
| stats latest(rawSizeGBCustomer) as rawSizeGBCustomer sum(License_Usage_GB) as License_Usage_GB sum(num_searches) as estimated_num_searches sum(total_search_time) as total_search_time Values(Sourcetype) as Sourcetype by Index \
| eval License_Usage_GB=round(License_Usage_GB,2) \
| fillnull value="No Search Activity Detected" total_search_time estimated_num_searches \
| sort - License_Usage_GB rawSizeGBCustomer

[Average Daily Web Access Count]
search_name = Average Daily Web Access Count
readonly = 1
version = 3.0.1
date_created = 2025-06-05
date_updated = 2025-8-13 16:27:27
category = Splunk
sub_category = _internal
tags = Adoption,KPIs,Statistics,Web,_internal
solution = <p>This query surfaces hourly web interface usage, enabling teams to monitor both engagement and operational risk. Zero or near-zero access can signal a system outage or broken user experience. Conversely, high sustained activity may reflect excellent adoption but risks overloading shared resources.</p><p><b>Suggested Actions</b><br><b>1.</b> Alert on <i>zero or near-zero average access</i> during business hours as a possible outage or user access issue.<br><b>2.</b> Alert on <i>high average access</i> outside business hours to flag anomalous or automated usage.<br><b>3.</b> Correlate spikes with resource metrics to assess infrastructure strain.<br><b>4.</b> Use this baseline to model capacity needs and concurrent user support.<br><b>5.</b> Add to an executive dashboard to demonstrate usage growth and adoption patterns.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case ( avg&lt;1, 5, avg&lt;5, 4, avg&gt;=5 AND avg&lt;20, 2, avg&gt;=20 AND avg&lt;=50, 3, avg&gt;50, 4, avg&gt;80, 5, 1=1, 1)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> <i>avg between 5 and 20</i> — Healthy user engagement without strain.</li><li><b>Low (Severity 2):</b> <i>avg between 20 and 50</i> — High adoption, monitor for scaling concerns.</li><li><b>Medium (Severity 3):</b> <i>avg over 50</i> — Watch for saturation, especially if sustained over time.</li><li><b>High (Severity 4):</b> <i>avg under 5</i> — Indicates drop in user interaction, potentially a UX or availability problem.</li><li><b>Critical (Severity 5):</b> <i>avg under 1</i> OR <i>avg over 80</i> — Represents either outage-like conditions or risk of infrastructure stress.</li></ul>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="splunk_web_access"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Limits search to Splunk web access events within internal logs<br><b>02</b> <code>[ rest / splunk_server=* | fields splunk_server | rename splunk_server as host ]</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Dynamically populates host filtering using REST<br><b>03</b> <code>bin _time span=1d</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Buckets events into daily time spans<br><b>04</b> <code>stats count by date_hour _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates event counts per hour<br><b>05</b> <code>appendpipe [...]</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Appends zero-filled data for missing hours using multivalue generation<br><b>06</b> <code>stats sum(count) as count by date_hour _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Sums original and zero-padded counts<br><b>07</b> <code>stats avg(count) as avg by date_hour</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Computes average access count per hour<br><b>08</b> <code>sort date_hour</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Orders the result by hour for readability<br>
explanation = <p>This search provides deeper visibility into web interface usage by calculating average hourly access volumes from internal Splunk web logs.</p><p>By including all hours in the result, even those without activity, it ensures complete visualization across the 24-hour span. This enables detection of off-peak vs. peak usage patterns, improving insights into user behavior and workload distribution.</p><p>For junior users, the query demonstrates key techniques such as <b>appendpipe</b> for hour normalization, <b>mvexpand</b> to generate hour slots, and <b>stats</b> for aggregating count data. Understanding this pattern is valuable for visualizing complete time series data in dashboards.</p>
quid = 6D2DF7074B17D3470DA2DD7E136A4F8D
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
description = <b>Calculates the average number of web access events per hour</b> over the last 24 hours from Splunk internal logs.
search = index=_internal sourcetype="splunk_web_access" \
 [ rest / splunk_server=* \
 | fields splunk_server \
 | rename splunk_server as host ] \
| bin _time span=1d \
| stats count by date_hour _time \
| appendpipe [ fields _time \
| dedup _time \
| eval date_hour=mvrange(0,24,1) \
| eval count=0 \
| mvexpand date_hour ] \
| stats sum(count) as count by date_hour _time \
| stats avg(count) as avg by date_hour \
| sort date_hour

