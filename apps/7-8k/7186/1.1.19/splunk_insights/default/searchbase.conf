updated_author = akhamis
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The total number of hours in Splunk to execute all searches for a selected time frame,  with each search hour calculated by dividing the total sum of all search durations, measured in seconds by 60, we get the minutes, then we divide that by 60 to get the number of hours.<br><br></p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>Monitoring search hours is vital for evaluating Splunks contribution to an organization, as it reflects usage intensity and support for business objectives. Regularly analyzing this KPI helps identify shifts in adoption rates and potential performance issues, crucial for maximizing Splunks benefits. <br><br></p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>It is advisable to track this metric <em>monthly</em> and <em>quarterly</em> for effective performance and adoption analysis.</p>
default_viz = splunk.singlevalue
