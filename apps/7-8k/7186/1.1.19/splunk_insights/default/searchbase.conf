| eval summary_id="ssef_internal_web_access_tracker" \
| fields _time, host, user, spent, bytes, uri_query, uri_path \
| rex field=uri_path "/(?:app|manager)/(?<app>[^/]+)/(?<view>[^/?#]+)" \
| rex field=uri_query "name=(?<dataset_name>[^&]+)" \
| eval type=case( view in("job_manager","triggered_alerts","alert","alerts","dashboards","integrity_check_of_installed_files","job_details_dashboard","report","reports","check_alerts","field_extractor","show_source","charting","data_model","flashtimeline","licenseusage","live_tail","mod_setup","orphaned_scheduled_searches"), "system", \
    view in("search","analytics_workspace","dataset","datasets","table","pivot"), "adhoc", \
    true(), "normal" ) \
| eval view=case(type="adhoc" AND view in("dataset","datasets","table","pivot") AND isnotnull(dataset_name), "dataset:" . dataset_name, true(), view) , user=lower(trim(user)) \
| `ssef_instance_info(host)` \
| bin _time span=1h \
| stats sum(spent) AS spent_ms sum(bytes) AS bytes latest(name) AS name dc(user) As num_users count as num_page_loads values(user) as users_mv by _time, label, type, app, view \
| eval severity_level = if(isnotnull(_time), 1, null()) , users_mv = mvjoin(users_mv, ", ") \
| table _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv, severity_level \
