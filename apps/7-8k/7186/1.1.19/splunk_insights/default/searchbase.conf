description = <p>Tracking new Splunk users by categories of use helps measure onboarding effectiveness and early engagement with the platform. It reveals which features (e.g., security, observability, platform) are driving initial adoption, helping to identify valuable use cases or areas needing further support. Understanding new user behavior ensures that the customer is maximizing Splunk`s value and growing its impact across different functionalities.</p>
