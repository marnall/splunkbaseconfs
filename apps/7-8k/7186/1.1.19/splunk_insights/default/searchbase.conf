[ssef_scma_indexing_sourcetype_ingestion]
search_name = Indexing Sourcetype Ingestion with Heavy Forwarder details
readonly = 1
target_component = Indexing
version = 1.0.1
date_created = 2023-03-30
date_updated = 2024-4-9 9:28:22
category = Splunk
sub_category = Indexing
tags = Indexes,Indexing,SCMA,Summary
dispatch_earliest_time = -3d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = 121D5339B7CA37FF526F732980DB94D4
updated_author = akhamis
severity_normal_text = <br/><p>The check results indicate you are compatible with the limit set in the Splunk Cloud Service Description and therefore a candidate for migration.</p>
severity_low_text = <br/><p>Detected instances where a small number of heavy forwarders (less than 5) encountered connection issues over the past 3 days. While not immediately critical, it's advisable to review these connections to ensure reliable data forwarding and prevent potential data loss.</p>
description = <p>This check calculates the amount of ingestion by host and returns all sourcetypes that are being ingested and the amount of data being ingested in the last 3 days.</p>\
<p><strong>Severity Levels:</strong></p>\
<li><strong>Normal:</strong> 5 or more sourectypes being ingested.</li>\
<li><strong>Low:</strong> Less than 5 sourcetypes being ingested..</li>
search = index=_internal sourcetype=splunkd component=Metrics (source="*/splunk/*/metrics.log" OR source="*\\splunk\\*\\metrics.log") group=per_sourcetype_thruput NOT series IN (auditd,bandwidth,bash_history,bash_history,cpu,cpu_metric,df,df_metric,hardware,interfaces,interfaces_metric,iostat,iostat_metric,lastlog,Linux:*,lsof,netstat,nfsiostat,openPorts,package,protocol,ps,ps_metric,time,top,Unix:*,usersWithLoginPrivs,vmstat,vmstat_metric,who,admon,DhcpSrvLog,monitor,MonitorNoHandle,MSAD:*,perfmon:*,perfmonmk:*,powershell,script,Script:*,WindowsUpdateLog,WinEventLog*,WinHostMon,WinNetMon,WinPrintMon,WinRegMon,WMI:*,xmlwineventlog*,*-too_small,app_permissions_manager.*,audittrail,aws:*:log,cloud_monitoring_console,config_explorer,content_management_filter,contentinfo_rest_handler,dbx_*,es_investigations_rest_handler,http_event_collector_metrics,ite_rest_audit*,itsi_*,kvstore,lookup_editor*,managed_lookups_rest_handler,mlspl*,modular_alerts*,mongod,phantom*,python_*,scheduler,scma*,scsproxy_*,search_telemetry,secure_gateway_*,security_analytics_*,splunk*,stash*,threatintel:*,trustarunified:log,vscode:debug:logs,app_permissions_manager,*rest_handler,fs_notification,identity_correlation*,saingestion_*,-_user_account_control_property*) \
| eval summary_id="ssef_scma_indexing_sourcetype_ingestion" \
| `ssef_instance_info(host)` \
| stats sum(kb) as kb sum(ev) as num_events values(role) as role latest(name) as name by label series \
| eval gb_ingested = round(kb / 1024 / 1024 , 3) \
| eval count_gb_sourcetype = num_events . "|" . gb_ingested . "|" . series \
| eval sourcetypes = mvjoin(count_gb_sourcetype,",") , role = mvjoin(role,":") \
| stats sum(gb_ingested) as host_gb_transfered sum(num_events) as host_num_events dc(series) as host_sourcetype_count values(count_gb_sourcetype) as count_gb_sourcetype values(role) as role latest(name) as name by label \
| eval count_gb_sourcetype = mvjoin(count_gb_sourcetype,",") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( host_sourcetype_count < 5, low, true(), normal ) \
| table label name host_num_events host_gb_transfered host_sourcetype_count count_gb_sourcetype role severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_sourcetype_ingestion summary job completed successfully without identifying any issues, and everything is operating as expected.")`

