[inefficient_tstats_searches]
search_name = Inefficient TSTATS Searches
readonly = 1
ssef_cron = weekly
target_component = Detections and Alerts
version = 1.0.6
date_updated = 2025-11-10 12:55:17
category = ES Adoption
sub_category = Security
tags = Detections and Alerts,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = C7C13778B136CDDDE8B4D49E9224CFB9
search_author = dluxton
updated_author = akhamis
related_info = <p><strong>Steps to Rectify</strong></p>\
<p>Ensure datamodels are populated with the necessary data and acceleration is enabled.</p>\
<p>Once the accelerated datamodels are ready, enable the summariesonly flag within the SPL via the summariesonly macro.</p>\
<p></p>\
<p>Review the searches &amp; macros within the 2nd table to see which macro needs updating.</p>\
<p>Example:</p>\
<p>Settings &gt; Advanced Search &gt; Macros: summariesonly_config</p>\
<p>Set the definition to true</p>
severity_medium_text = <br/><p>Between 1 and 10 tstats correlation searches are set to summariesonly=false</p>
severity_high_text = <br/><p>More than 10 tstats searches are set to summariesonly=false</p>
severity_critical_text = <br/><p>More than 20 tstats searches are set to summariesonly=false</p>
description = <p>List of enabled correlation searches which feature tstats and are not using accelerated data.</p>\
<p>The summariesonly flag is a setting which forces TSTATS searches to use only accelerated data when set to true.</p>\
<p>When set to false this forces TSTATS searches to ignore any accelerated data and rebuild the summaries on the fly.</p>
search = `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 savedsearch_search="*|*tstats *" \
| eval summary_id="inefficient_tstats_searches" \
| stats latest() as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
| rex field=savedsearch_search "(?ms)^\|(?P<basesearch>.*?)\|" \
| where match(basesearch,"(?i)tstats") \
| rex field=basesearch max_match=1 "\`(?P<macro>\w+?)\`" \
| lookup ssef_data_macros_lookup label title as macro output definition \
| append \
    [| inputlookup ssef_data_macros_lookup \
    | search title IN (summariesonly_config) \
    | eval summariesonly_config_value=definition \
    | stats count by summariesonly_config_value \
    | fields summariesonly_config_value ] \
| eventstats values(summariesonly_config_value) as summariesonly_config_value \
| search basesearch="*summariesonly=f*" OR definition="*summariesonly=f*" OR (basesearch="*summariesonly=`*" AND definition="f*") OR (basesearch="*`security_content_summariesonly`*" AND definition="*`summariesonly_config`*" AND summariesonly_config_value="false") \
| rename definition as macro_definition \
| eventstats count(savedsearch_name) as total_searches \
| eval severity_level = case (total_searches>20,5,total_searches>10,4,total_searches>0,3,true(),1) \
| table label savedsearch_name savedsearch_search macro macro_definition summariesonly_config_value total_searches severity_level\
| `ssef_handle_no_results(1,"The inefficient_tstats_searches summary job completed successfully without identifying any issues, and everything is operating as expected.")`

