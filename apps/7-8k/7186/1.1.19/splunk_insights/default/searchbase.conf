tags = Admin,Environment,Inventory,REST,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 0DF5CDD8FB9C12B03C04B00D5B8A7702
updated_author = khutchinson
related_info = <ul>\
 <li><a href="https://docs.splunk.com/Documentation/VMW/4.0.4/User/KnowledgeObjects" target="_blank">https://docs.splunk.com/Documentation/VMW/4.0.4/User/KnowledgeObjects</a></li>\
 <li><a href="https://www.splunk.com/en_us/pdfs/training/creating-knowledge-objects-course-description.pdf" target="_blank">Creating Knowledge Objects</a></li>\
 </ul>
severity_normal_text = <br/><p>No issues were found. The number of Splunk knowledge objects in the system is within acceptable limits and does not impact performance or manageability. Everything looks good.</p>
severity_low_text = <br/><p>We identified a high number of Splunk knowledge objects in the system. This could potentially affect system performance or manageability. We recommend reviewing and managing these objects to ensure they align with performance and operational efficiency goals.</p>
severity_medium_text = <br/><p>We identified a high number of Splunk knowledge objects in the system. This could potentially affect system performance or manageability. We recommend reviewing and managing these objects to ensure they align with performance and operational efficiency goals.</p>
description = <p>This check tracks the number of Splunk knowledge objects in the system including apps, dashboards, searches, and workflows categorizing and tallying each type. Data is gathered using the Splunk REST API without a time restriction. Monitoring these counts is essential for assessing system adoption, maturity, and capability, as well as understanding the scale of the system's content. This oversight helps ensure that the proliferation of these objects does not adversely affect system performance or manageability, safeguarding both operational efficiency and strategic progress.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/apps/local search="core=0" \
| eval summary_id="ssef_scma_environment_ko_inventory" \
| `ssef_instance_info(splunk_server)` \
| stats dc(title) as dc_title by label title \
| eventstats dc(title) as count \
| stats dc(title) as ko by label \
| eval ko_type = "dc_apps" \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/datamodel/model \
    | `ssef_instance_info(splunk_server)` \
    | stats dc(title) as dc_datamodels by label title \
    | eventstats dc(title) as count \
    | stats dc(title) as ko by label \
    | eval ko_type = "dc_datamodels" ] \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/data/ui/workflow-actions \
    | `ssef_instance_info(splunk_server)` \
    | stats dc(title) as dc_title by label title \
    | eventstats dc(title) as count \
    | stats dc(title) as ko by label \
    | eval ko_type = "dc_workflows" ] \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/saved/searches \
    | `ssef_instance_info(splunk_server)` \
    | stats dc(title) as dc_title by label title \
    | eventstats dc(title) as count \
    | stats dc(title) as ko by label \
    | eval ko_type = "dc_searches" ] \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/saved/searches \
    | where is_scheduled=1 AND disabled=0 \
    | `ssef_instance_info(splunk_server)` \
    | stats dc(title) as dc_title by label title \
    | eventstats dc(title) as count \
    | stats dc(title) as ko by label \
    | eval ko_type = "dc_scheduled_searches" ] \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/data/ui/views \
    | `ssef_instance_info(splunk_server)` \
    | stats dc(title) as dc_title by label title \
    | eventstats dc(title) as count \
    | stats dc(title) as ko by label \
    | eval ko_type = "dc_views" ] \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/storage/collections/config \
    | `ssef_instance_info(splunk_server)` \
    | stats dc(title) as dc_title by label title \
    | eventstats dc(title) as count \
    | stats dc(title) as ko by label \
    | eval ko_type = "dc_collections" ] \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/alerts/alert_actions search="eai:acl.app!=system AND eai:acl.app!=alert_logevent AND eai:acl.app!=splunk_instrumentation AND eai:acl.app!=alert_webhook" \
    | `ssef_instance_info(splunk_server)` \
    | stats dc(title) as dc_title by label title \
    | eventstats dc(title) as count \
    | stats dc(title) as ko by label \
    | eval ko_type = "dc_actions" ] \
| xyseries label ko_type ko \
| rename "ko: *" as * \
| lookup ssef_splunk_instance_info_lookup label AS label OUTPUT role as role name as name \
| makemv delim="," role \
| eval role=mvjoin(role, ":") \
| addcoltotals dc_* labelfield=totals \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( dc_apps >= 400, medium, dc_apps >= 200, low, searchtype="Total", normal, true(), normal ) \
| table _time label name role dc_actions dc_apps dc_collections dc_datamodels dc_scheduled_searches dc_searches dc_views dc_workflows totals severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_environment_ko_inventory summary job completed successfully without identifying any issues, and everything is operating as expected.")`

