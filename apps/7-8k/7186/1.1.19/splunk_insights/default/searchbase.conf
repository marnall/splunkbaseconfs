[ssef_search_collection_backup]
search_name = Daily Backup of IS4S Search Collection Changes
readonly = 1
target_component = Backup Jobs
version = 1.0.3
date_created = 2024-12-4 10:53:14
date_updated = 2025-10-18 19:8:52
category = IS4S
sub_category = Backup
tags = Backup,REST,Search Collections,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = E636A659E78602F3C1010C6B5380B137
search_author = akhamis
updated_author = akhamis
description = <p>This Splunk job executes daily to back up IS4S Search Collection that have been modified in the last 24 hours. It uses REST API calls to identify and retrieve changes, saving the updated items in a summary index for recovery, auditing, or version control. This process ensures that recent modifications to IS4S Search Collection items are securely archived and available for future reference or troubleshooting.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/configs/conf-ssef \
| eval summary_id="ssef_search_collection_backup" \
| rename eai:acl.app AS app , eai:acl.removable as removable \
| `ssef_strptime_format(updated)` \
| eval date_diff = now() - updated , _time=now() \
| where date_diff < 86400 OR removable=1 \
| `ssef_instance_info(splunk_server)` \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time label app title type visible readonly removable author checks searches collection_name cron description disabled group_name groups homepage personas platform selectedkpis updated severity_level \
| `ssef_handle_no_results(1,"The ssef_search_collection_backup summary job completed successfully without identifying any issues, and everything is operating as expected.")`

