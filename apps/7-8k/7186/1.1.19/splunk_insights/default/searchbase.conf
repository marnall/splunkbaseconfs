[correlation_search_action_counts]
search_name = List of Correlation Searches without actions
readonly = 1
ssef_cron = weekly
target_component = Detections and Alerts
version = 1.1.0
date_updated = 2025-11-25 16:12:33
category = ES Adoption
sub_category = Security
tags = Detections and Alerts,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 15DAEEC9B3AED0D0DD57673754DEAACD
search_author = dluxton
updated_author = akhamis
related_info = <p><strong>How to Review</strong><br>This search outputs a list of all the enabled actions which run off the back of the correlation search adaptive response framework. This will identify how many notable events are enabled, how many risk rules are enabled and other actions. <br>The total number of detections should ideally sit well above 100.</p>
severity_normal_text = <br/><p>More than 100 correlation searches are enabled &amp; more than 60% are contributing risk.</p>
severity_low_text = <br/><p>One of the following criteria has been met:</p>\
<p>- less than 90% of correlations have the notable or risk adaptive response action</p>\
<p>- correlation searches are scheduled and enabled however do not trigger any adaptive response action</p>\
<p>- Less than 60% of the correlation searches are generating risk</p>\
<p>- More correlation searches are triggering notables than risk events<br></p>
severity_medium_text = <br/><p>One of the following criteria has been met:</p>\
<p>- There are less than 100 correlation searches enabled</p>\
<p>- 0 correlation searches are contributing risk</p>
severity_high_text = <br/><p>There are less than 50 correlation searches enabled</p>
severity_critical_text = <br/><p>There are less than 20 correlation searches enabled</p>
description = <p>Adaptive response actions decide what actions will follow a detection.</p>\
<p>Create a notable, send to SOAR, generate risk.</p>
search = `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 \
| eval summary_id="correlation_search_action_counts" \
| stats latest(*) as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
| fillnull value="None" actions \
| eval actions = trim(split(actions, "|")) \
| stats count by label actions \
| append \
    [ search `ssef_summary(ssef_saved_searches)` disabled=0 is_scheduled=1 action_correlationsearch_enabled=1 \
    | stats latest(*) as * latest(_time) as _time by label, app, sharing, author, savedsearch_name \
    | eval is_alert=if(match(actions,"risk|notable"),"true","false") \
    | stats count by label is_alert \
    | fields label is_alert count ] \
| eval results=mvzip('actions','count',": ") \
| stats sum(eval(if(actions="None",'count',null()))) as count_none, sum(eval(if(actions="notable",'count',null()))) as count_notable, sum(eval(if(actions="risk",'count',null()))) as count_risk, sum(eval(if(is_alert="true",'count',null()))) as total_alerts, sum(eval(if(isnotnull(is_alert),'count',null()))) as total_correlation_searches, values(results) as results by label \
| eval alert_perc=round(total_alerts/total_correlation_searches*100,2), risk_perc=round(count_risk/total_correlation_searches*100,2) \
| eval severity_level = case (total_alerts<20,5, total_alerts<50,4, total_alerts<100 OR count_risk=0,3, alert_perc<90 OR count_none>0 OR risk_perc<60 OR count_notable>count_risk,2, risk_perc>=60,1, true(),0) \
| table label results alert_perc risk_perc count_none count_notable count_risk total_alerts total_correlation_searches severity_level

