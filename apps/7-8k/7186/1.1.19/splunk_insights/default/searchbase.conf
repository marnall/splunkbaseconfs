[ssef_ia4s_users_delete_role]
search_name = Users with Delete Role
readonly = 1
target_component = Users
version = 1.0.2
date_created = 2024-1-11 12:16:20
date_updated = 2024-5-12 15:10:34
category = Splunk
sub_category = Users
tags = Roles,Capabilities,Delete
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 462A7308243CDB570E1DCDEEB2CC14E7
updated_author = akhamis
severity_normal_text = <br/><p>No users with deletion capabilities detected, implying a lower risk profile regarding unauthorized or accidental data deletion, reflecting a more controlled access environment.</p>
severity_high_text = <br/><p>Indicates the presence of users with the capability to delete, suggesting a potential risk if such permissions are not closely monitored and justified, highlighting the importance of overseeing and possibly restricting delete capabilities to maintain system integrity.</p>
description = <p>Identifies identities mapped to roles with the <b>can_delete</b> capability using summarized identity data. Highlights elevated privilege assignments that may impact <b>data governance</b> and compliance posture.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
explanation = <p>This search consumes summarized identity-role mapping data and evaluates whether any identities are associated with roles granting the <b>can_delete</b> capability. The can_delete capability allows deletion of knowledge objects and potentially sensitive configurations. Identifying users with this capability supports least-privilege governance, separation-of-duties validation, and compliance monitoring. Results are aggregated by instance label and identity to provide clear visibility into privilege assignments.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_identities)`</code><br> - Retrieve summarized identity and role mapping data.<br><b>02</b> <code>| eval splunk_role_map=split(...)</code><br> - Normalize role capability mapping values.<br><b>03</b> <code>| where splunk_role_map="can_delete"</code><br> - Filter for identities with delete capability.<br><b>04</b> <code>| stats ... by label identity</code><br> - Aggregate identities with elevated privileges and assign severity classification.
solution = <p>This KPI surfaces identities granted delete privileges, supporting least-privilege enforcement and governance review.</p><p><b>Suggested Actions</b>: Validate that identities with can_delete capability align with administrative policy, remove unnecessary privilege assignments, and ensure change management controls are enforced for destructive operations.</p>
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Security/Rolesandcapabilities" target="_blank">Roles and Capabilities</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/configuration-file-reference/authorize.conf" target="_blank">Splunk Help: authorize.conf reference</a><br>Documentation for role capabilities and privilege configuration.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/security/9.4/secure-your-splunk-enterprise-deployment/about-users-and-roles" target="_blank">Splunk Help: About users and roles</a><br>Concepts for role-based access control and capability management.</li></ul>
search = `ssef_summary(ssef_identities)` \
| eval summary_id="ssef_ia4s_users_delete_role" \
| fields _time label splunk_role_map identity \
| eval splunk_role_map=split(splunk_role_map,"|") \
| where splunk_role_map="can_delete" \
| stats values(splunk_role_map) as splunk_role_map latest(_time) as _time by label identity \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( splunk_role_map="can_delete", high, true(), normal ) \
| table _time label identity splunk_role_map severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_users_delete_role summary job completed successfully without identifying any issues, and everything is operating as expected.")`

