description = <p>Summarizes <b>Splunk Cloud license entitlements</b> from splunk-entitlements data. Determines whether the environment operates under <b>Ingest-based</b> or <b>Workload-based</b> licensing and surfaces effective license capacity indicators.</p>
explanation = <p>This search consumes Cloud entitlement summary data and determines the effective license model based on svc_license flags. It classifies the deployment as either Ingest or Workload licensing and exposes entitlement capacity metrics for governance validation. Understanding the active license model is critical for interpreting concurrency limits, indexing capacity, and workload management controls across the environment.</p>
execution_plan = <b>01</b> <code>`ssef_cloud_summary` source=splunk-entitlements</code><br> - Retrieve Cloud entitlement metadata from summary storage.<br><b>02</b> <code>| eval license_type=if(...)</code><br> - Classify license model as Ingest or Workload based on service license flag.<br><b>03</b> <code>| stats latest(...) max(...)</code><br> - Determine effective license model and capacity values.
solution = <p>This KPI provides a clear indicator of the environment’s Cloud licensing model and entitlement capacity, supporting governance and workload alignment decisions.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-cloud-platform/administer/admin-manual/9.2/administer-splunk-cloud-platform/licenses-and-entitlements" target="_blank">Splunk Help: Licenses and entitlements</a><br>Documentation covering Splunk Cloud licensing models and entitlement interpretation.</li></ul>
viz_options = { "count":100 }
search = `ssef_cloud_summary` source=splunk-entitlements \
| eval license_type=if(svc_license==0,"Ingest","Workload") \
| stats latest(license_type) AS license_type, latest(eval(if(license_type=="Workload","true",null()))) AS is_workload, latest(eval(if(license_type=="Ingest","true",null()))) AS is_ingest max(svc_license) as svc_license max(ingest_license) as ingest_license

[ssef_ia4s_licensing_current_entitlements_expiration]
search_name = License Expiry
readonly = 1
target_component = Licensing
version = 2.0
date_updated = 2026-2-12 15:49:24
category = Splunk
sub_category = Licensing
tags = Licensing,Entitlements,Expiration
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = 2E2778C3F1281B58F66101C61DDE9AB5
updated_author = akhamis
severity_normal_text = <br/><p>This search returns NORMAL status for licenses with no immediate expiration concerns.</p>
severity_medium_text = <br/><p>This search becomes MEDIUM if a license is set to expire within 4-6 months, requiring monitoring and future planning.</p>
description = <p>Monitors <b>current license entitlements</b> and calculates months remaining until expiration. Highlights non-valid license states and supports proactive <b>renewal governance</b> and compliance management.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Ingest license expiration in 4-6 months.</li>\
<li><strong>Normal:</strong> Ingest license current.</li>\
</ul>
explanation = <p>This search consumes the Licensing Current Entitlements summary dataset and extracts the latest entitlement state per license label and instance. It calculates the number of months remaining until expiration and flags licenses that are not in a VALID state. Monitoring expiration timelines ensures renewal planning, prevents ingestion interruption, and avoids compliance exposure. Non-valid license states may indicate expired, suspended, or misconfigured entitlements that require immediate review.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_scma_licensing_current_entitlements)`</code><br> - Retrieve summarized entitlement data from Insights summary storage.<br><b>02</b> <code>| stats latest(*) by label license_label</code><br> - Determine most recent entitlement attributes per license.<br><b>03</b> <code>| eval months_until_expiration ...</code><br> - Compute remaining months until expiration.<br><b>04</b> <code>| eval severity_level=case(...)</code><br> - Flag non-valid license states for governance review.
solution = <p>This KPI provides visibility into entitlement expiration timelines and license validity to prevent service disruption.</p><p><b>Suggested Actions</b>: Initiate renewal planning for licenses nearing expiration, validate license_status values, confirm entitlement stacking configuration, and coordinate with procurement or Splunk account teams when expiration windows approach.</p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Monitoring-Splunk/License-Usage-Monitoring/m-p/428949" target="_blank">Splunk Answers - License Usage Monitoring</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Aboutlicenseviolations" target="_blank">Splunk Docs - About Splunk License Violations</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/MonitoringSplunklicenses" target="_blank">Splunk Docs - License Monitoring</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/manage-licenses/about-splunk-enterprise-licenses" target="_blank">Splunk Help: About Splunk Enterprise licenses</a><br>Overview of license management concepts and expiration handling.</li><li><a href="https://help.splunk.com/en/splunk-cloud-platform/administer/admin-manual/9.2/administer-splunk-cloud-platform/licenses-and-entitlements" target="_blank">Splunk Help: Splunk Cloud licenses and entitlements</a><br>Documentation for entitlement tracking and renewal governance.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_scma_licensing_current_entitlements)` \
| eval summary_id="ssef_ia4s_licensing_current_entitlements_expiration" \
| fields _time label name type license_label quota creation_time expiration_time group_id stack_id sourcetypes license_status severity_level \
| stats latest(*) AS * latest(severity_level) as severity_level latest(_time) as _time by label license_label \
| eval months_until_expiration = floor((expiration_time-now())/(86400*30)) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( license_status != "VALID", medium, true(), normal ) \
| table _time label license_label expiration_time months_until_expiration license_status severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_licensing_current_entitlements_expiration summary job completed successfully without identifying any issues, and everything is operating as expected.")`

