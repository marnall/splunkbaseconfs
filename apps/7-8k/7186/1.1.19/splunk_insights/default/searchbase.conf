category = Splunk
sub_category = Jobs
tags = Discovery,Jobs,Tracker
dispatch_earliest_time = -1h@h
dispatch_latest_time = -0h@h
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 96F808B7B4C07915469969B71AD9A76E
updated_author = akhamis
description = <p>Tracks <b>scheduled search execution activity</b> using scheduler telemetry. Provides visibility into run time, skipped executions, concurrency limits, workload pools, and execution status to support <b>operational governance</b> and performance optimization.</p>
explanation = <p>This search analyzes scheduler events for scheduled searches (excluding splunk_archiver) over the previous hour. It normalizes user and instance metadata, aggregates execution statistics per saved search, and captures concurrency context, workload pool, run time, and skipped counts. The output provides a structured summary of scheduled search behavior to identify inefficiencies, workload contention, misconfigured concurrency limits, or excessive runtime accumulation. Monitoring this KPI supports workload balancing and scheduler reliability assurance.</p>
execution_plan = <b>01</b> <code>index=_internal sourcetype=scheduler search_type=scheduled</code><br> - Retrieve scheduled search execution events for the defined window.<br><b>02</b> <code>| eval normalization</code><br> - Normalize user identity, instance metadata, and search_type defaults.<br><b>03</b> <code>| `ssef_instance_info(Splunk_Instance)`</code><br> - Enrich with instance label and role metadata.<br><b>04</b> <code>| stats ... by savedsearch_name</code><br> - Aggregate runtime, result count, skipped executions, and concurrency metadata per scheduled search.<br><b>05</b> <code>| foreach mvjoin normalization</code><br> - Normalize multivalue concurrency and status fields for deterministic output.
solution = <p>This KPI provides operational visibility into scheduled search workload behavior and concurrency governance.</p><p><b>Suggested Actions</b>: Investigate searches with high runtime or skipped counts, validate concurrency limits, rebalance workload pools, and optimize inefficient SPL to reduce scheduler contention.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/manage-scheduled-searches/about-scheduled-searches" target="_blank">Splunk Help: About scheduled searches</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/configuration-file-reference/limits.conf" target="_blank">Splunk Help: limits.conf reference</a></li></ul>
viz_options = { "count":100 }
search = earliest=-1h@h latest=-0h@h index=_internal sourcetype=scheduler app!=splunk_archiver search_type=scheduled \
| eval summary_id="ssef_internal_scheduler_jobs_tracker" \
| fields _time, host, sid, savedsearch_name, app, user, scheduled_time, priority, dispatch_time, window_time, run_time, result_count, status, concurrency_category, concurrency_context, concurrency_limit, reason, alert_actions, workload_pool, search_type, skipped_count \
| rename host AS Splunk_Instance , savedsearch_name AS savedsearch_name, run_time AS total_run_time \
| eval user = lower(user) , Splunk_Instance = lower(Splunk_Instance) , user = if(user="nobody", "system", user) , search_type = if(isnull(search_type) OR search_type="", "scheduled", search_type) \
| `ssef_instance_info(Splunk_Instance)` \
| bin _time span=1h \
| stats \
    VALUES(Splunk_Instance) AS Splunk_Instance\
    VALUES(alert_actions) AS alert_actions\
    VALUES(role) AS role\
    VALUES(status) AS status\
    VALUES(concurrency_category) AS concurrency_category\
    VALUES(concurrency_context) AS concurrency_context\
    VALUES(concurrency_limit) AS concurrency_limit\
    VALUES(reason) AS reason\
    LATEST(workload_pool) AS workload_pool\
    LATEST(scheduled_time) AS scheduled_time\
    LATEST(dispatch_time) AS dispatch_time\
    LATEST(priority) AS priority\
    LATEST(window_time) AS window_time\
    SUM(total_run_time) AS total_run_time\
    SUM(result_count) AS result_count\
    SUM(skipped_count) AS skipped_count\
    LATEST(name) AS name\
    by _time, label, search_type, app, user, savedsearch_name \
| foreach role, alert_actions, status, concurrency_category, concurrency_context, concurrency_limit \
    [ eval <<FIELD>>=mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time, label, name, search_type, savedsearch_name, app, user, scheduled_time, dispatch_time, priority, window_time, total_run_time, result_count, status, concurrency_category, concurrency_context, concurrency_limit, reason, alert_actions, workload_pool, skipped_count,severity_level \
