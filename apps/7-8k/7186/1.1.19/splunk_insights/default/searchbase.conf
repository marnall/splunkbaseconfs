category = ES Adoption
sub_category = Security
tags = Detections and Alerts,ES Adoption,RBA,Summary
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 1624053DD10DFF4CC69F0689E719B56F
search_author = dluxton
updated_author = akhamis
related_info = <p>How to Review<br>Identify correlation searches which need tuning (sending vastly higher quantities of detections)<br>Also view the spread of urgency via incident review</p>
severity_medium_text = <br/><p>One of the following criteria has been met.</p>\
<ul>\
<li>Less than 40 total risk notables triggered over 7 day period.</li>\
<li>A risk rule is featured in over 40% of all risk notables, indicative of further tuning reqired.</li>\
<li>The count of non-informational notables exceeded 50 alerts per day, per analyst</li>\
</ul>
severity_high_text = <br/><p>One of the following criteria has been met:</p>\
<ul>\
<li>Less than 10 risk notables triggered over 7 day period</li>\
<li>A risk rule is featured in over 70% of all risk notables, indicative of further tuning reqired</li>\
<li>The count of non-informational notables exceeded 100 alerts per day, per analyst</li>\
</ul>
severity_critical_text = <br/><p>One of the following criteria has been met:</p>\
<ul>\
<li>No risk rules triggered over 7 day period</li>\
<li>The count of non-informational risk notables exceeded 1000 alerts per day, per analyst</li>\
</ul>
description = <p>Review the number of risk notables which have been generated.</p>\
<p>High volumes of risk notables (RBA alerts) where analysts would not possibly be able to review each and every one</p>\
<p>Noisy alerts</p>\
<p>Low volume of alerts</p>
search = `notable` \
| eval summary_id="rba_alerts" \
| search notable_type=risk_event \
| eventstats count as total_risk_incidents dc(eval(if(owner!="unassigned",owner,null()))) as uniqueCountOfAnalysts \
| stats values(total_risk_incidents) as total_risk_incidents values(source) as source values(uniqueCountOfAnalysts) as uniqueCountOfAnalysts count by orig_source \
| rename orig_source as notable_source_name , source as source_name \
| eval uniqueCountOfAnalysts=if(uniqueCountOfAnalysts=0,1,uniqueCountOfAnalysts) \
| sort - count \
| eval severity_level = case (\
    total_risk_incidents=0 OR (total_risk_incidents/7/uniqueCountOfAnalysts)>1000,5,\
    total_risk_incidents<10 OR (total_risk_incidents/7/uniqueCountOfAnalysts)>100 OR count/total_risk_incidents*100>=70,4,\
    total_risk_incidents<40 OR (total_risk_incidents/7/uniqueCountOfAnalysts)>50 OR count/total_risk_incidents*100>=40,3,\
    true(),1) \
| table notable_source_name source_name total_risk_incidents uniqueCountOfAnalysts count severity_level \
| `ssef_handle_no_results(5,"WARNING: No risk notables were triggered over 7 day time period.")`

