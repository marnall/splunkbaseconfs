[summary_searches_that_used_tstats]
search_name = Search Using Tstats
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 2.x
date_created = 2025-08-08
date_updated = 2025-8-1 13:25:57
category = Splunk
sub_category = _internal
tags = Data Models,EFS,Scheduler,Summary,_internal
solution = <p>Encourages use of efficient <b>tstats/datamodel</b> searches in scheduled jobs to improve performance and reduce search load.</p><p><b>Suggested Actions</b><br><b>1.</b> Promote use of accelerated data models for common searches.<br><b>2.</b> Refactor raw index searches to use tstats/datamodel where possible.<br><b>3.</b> Train teams on data model acceleration benefits.<br><b>4.</b> Monitor adoption over time.<br><b>5.</b> Ensure acceleration is enabled and maintained.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (completed_saved_searches_referencing_datamodels=0,5, completed_saved_searches_referencing_datamodels<=5,4, completed_saved_searches_referencing_datamodels<=10,3, completed_saved_searches_referencing_datamodels<=20,2, completed_saved_searches_referencing_datamodels>20,1)</code></pre><p>This SPL should be inserted before the final <code>| table</code> to classify severity, with fewer references being higher severity.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> More than 20 saved searches use tstats/datamodels — strong adoption.</li><li><b>Low (Severity 2):</b> 11–20 such searches.</li><li><b>Medium (Severity 3):</b> 6–10 such searches.</li><li><b>High (Severity 4):</b> 1–5 such searches — underutilization.</li><li><b>Critical (Severity 5):</b> None — missed optimization opportunities.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="scheduler" TERM(status=completed) OR TERM(status=success)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Collect completed/successful scheduled search executions.<br><b>02</b> <code>| fields savedsearch_name</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Keep only saved search names.<br><b>03</b> <code>| stats count by savedsearch_name</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count executions per saved search.<br><b>04</b> <code>| join type=inner savedsearch_name [...]</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Match against REST API metadata for saved searches.<br><b>05</b> <code>| search search IN ("*tstats*", "*datamodel*")</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Keep searches containing tstats/datamodel references.<br><b>06</b> <code>| stats count as completed_saved_searches_referencing_datamodels</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count matches.<br><b>07</b> <code>| eval severity_level = case (completed_saved_searches_referencing_datamodels=0,5, completed_saved_searches_referencing_datamodels<=5,4, completed_saved_searches_referencing_datamodels<=10,3, completed_saved_searches_referencing_datamodels<=20,2, completed_saved_searches_referencing_datamodels>20,1)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity where fewer = higher risk.<br><b>08</b> <code>| table completed_saved_searches_referencing_datamodels severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output KPI and severity.<br>
explanation = <p>This search matches completed or successful scheduled searches in the <b>_internal</b> scheduler logs to saved searches containing <b>tstats</b> or <b>datamodel</b> references from the REST API metadata. Since <b>tstats/datamodel</b> searches are typically far more efficient than raw index searches, higher counts indicate better optimization. A low number of such searches may point to underutilization of accelerated datasets and missed performance gains.</p><p>This search also illustrates joining indexed scheduler data with REST metadata to enrich operational insights.</p>
quid = F799A71911391D55458F7293CB0A2127
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>Strong adoption of tstats/datamodel searches; environment optimized.</p>
severity_low_text = <p>Good adoption; continue promoting accelerated dataset use.</p>
severity_medium_text = <p>Moderate use of tstats/datamodels; room for improvement.</p>
severity_high_text = <p>Low usage of tstats/datamodels; encourage optimization.</p>
severity_critical_text = <p>No tstats/datamodel use in completed saved searches; high performance risk.</p>
description = <p>This looks at any searches that leverage the tstats paradigm which deomonstrate performance efficience. Though not all searches can use this paradigm, there is a large percentage of searches that can be converted to tstats which frees up system resources and improves compute resources availability for other functions. </p>
search = index=_internal sourcetype="scheduler" TERM(status=completed) OR TERM(status=success) \
| eval summary_id="summary_searches_that_used_tstats" \
| fields savedsearch_name \
| stats count by savedsearch_name \
| join type=inner savedsearch_name [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/saved/searches \
    | search search IN ("*tstats*", "*datamodel*") \
    | rename title as savedsearch_name eai:acl.app as app \
    | fields savedsearch_name app] \
| stats count as completed_saved_searches_referencing_datamodels \
| eval severity_level = case (completed_saved_searches_referencing_datamodels=0,5, completed_saved_searches_referencing_datamodels<=5,4, completed_saved_searches_referencing_datamodels<=10,3, completed_saved_searches_referencing_datamodels<=20,2, completed_saved_searches_referencing_datamodels>20,1) \
| table completed_saved_searches_referencing_datamodels severity_level\
| `ssef_handle_no_results(1,"The summary_searches_that_used_tstats summary job completed successfully without identifying any issues, and everything is operating as expected.")`

