[asset_merging]
search_name = A&I Asset Merging
readonly = 1
ssef_cron = weekly
target_component = Assets & Identities
version = 1.0.7
date_updated = 2025-1-25 0:5:15
category = ES Adoption
sub_category = Security
tags = Assets and Identities,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 67648C1E0DBECF27CA65282865C09D5A
search_author = dluxton
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/ES/7.0.2/Admin/Howassetandidentitydataprocessed" target="_blank">How Splunk Enterprise Security processes and merges asset and identity data</a></li>\
<li><a href="https://docs.splunk.com/Documentation/ES/8.0.2/Admin/TurnonEntityZonesAssetIdentity" target="_blank">Turn on entity zones for assets and identities in Splunk Enterprise Security</a></li>\
<li><a href="https://splunk.github.io/SA-admon/InstallationGuide/troubleshooting/#merging-issues" target="_blank">Troubleshooting Merging Issues</a></li>\
</ul>
severity_normal_text = <br/><p>No evidence of asset merging found.</p>
severity_medium_text = <br/><p>The number of assets with multiple host records is between 0 and 5%</p>
severity_high_text = <br/><p>More than 5% of asset records have more than one host record</p>
severity_critical_text = <br/><p>More than 50% of asset records have more than one host record</p>
description = <p>When an asset should has more than one nt_hostname, this is usually an indication that asset records are being merged together.</p>\
<p>Here are a few examples of what can trigger asset merging and example resolutions:</p>\
<p></p>\
<p><strong>Remote Assets</strong></p>\
<p>A common culprit for erronous asset merging is the IP address of remote assets.</p>\
<p>Caused by common subnet ranges used on home networks by folks working from home.</p>\
<ul>\
<li>Resolution Method 1: Use an eval statement within the lookup populating search to null out the ip address for devices when they can be identified as working from home.</li>\
<li>Resolution Method 2: Add the IP address to the Field Exclusion List within the A&amp;I Asset Lookup Settings</li>\
</ul>\
<p></p>\
<p></p>\
<p><strong>Vulnerability Scanning Data</strong></p>\
<p>Vuln scanners commonly will not be scanning the assets at a regular enough interval to keep up with DHCP leases.</p>\
<p>This leads to assets getting merged together with devices which previously held the IP address.</p>\
<ul>\
<li>Resolution Method 1: Considering nulling out known DHCP lease ranges within the lookup populating search.</li>\
<li>Resolution Method 2: Add the IP address to the Field Exclusion List within the A&amp;I Asset Lookup Settings</li>\
</ul>\
<p></p>\
<p><strong>MAC Address Merging - Virtual NICs</strong></p>\
<p>Datasets which collect host information from the NIC may identify virtual NICs which present the same MAC address.</p>\
<ul>\
<li>Resolution Method 1: These should be identified and excluded from the lookup generating search.</li>\
<li>Resolution Method 2: Add the common MAC to the list of asset ignored fields within the A&amp;I Global Settings menu</li>\
</ul>\
<p></p>\
<p><strong>Overlapping IP address or hostname records</strong></p>\
<p>More complex orgnisations may have sub-orgs which can have overlapping subnets or naming conventions.</p>\
<p>The CIM Entity Zones in ES can help logicall separate out these assets.</p>
search = | inputlookup asset_lookup_by_str \
| eval summary_id="asset_merging" \
| eval hostcount=mvcount(nt_host) \
| stats count by hostcount \
| eval hosts=hostcount*count \
| eventstats sum(hosts) as totalHosts count as nt_hostcount_count\
| eval host_perc=round(hosts/totalHosts*100,2)\
| eval severity_level = case (\
    nt_hostcount_count=1 AND count=hosts,1,\
    nt_hostcount_count>1 AND host_perc>50 AND hostcount!=1,5,\
    nt_hostcount_count>1 AND host_perc>5 AND hostcount!=1,4,\
    nt_hostcount_count>1,3,\
    1=1,1)\
| table count host_perc hostcount hosts nt_hostcount_count severity_level totalHosts \
| `ssef_handle_no_results(1,"The asset_merging summary job completed successfully without identifying any issues, and everything is operating as expected.")`

