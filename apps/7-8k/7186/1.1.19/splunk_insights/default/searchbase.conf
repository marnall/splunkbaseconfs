<li><a href="https://community.splunk.com/t5/Splunk-Search/Is-there-a-search-for-indexes-sources-that-aren-t-being-used/m-p/271302">Splunk Community: Is there a search for indexes/sources that aren't being used</a> - This discussion explores methods to identify data sources and indexes in Splunk that are not actively queried, helping to optimize data ingestion and storage.</li>\
<li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Data_Management/Setting_data_retention_rules_in_Splunk_Cloud_Platform">Lantern: Setting data retention rules in Splunk Cloud Platform</a> - This guide provides strategies for configuring data retention policies in Splunk Cloud, ensuring efficient storage management and compliance with organizational requirements.</li>\
<li><a href="https://community.splunk.com/t5/Deployment-Architecture/Splunk-data-retention-policy-What-is-the-best-way-to-reconfigure/m-p/373742">Splunk Community: Splunk data retention policy: What is the best way to reconfigure</a> - A community thread discussing best practices for setting up data retention policies in Splunk to manage storage effectively and maintain optimal performance.</li>\
<li><a href="https://lantern.splunk.com/Splunk_Platform/Splunk_Outcome_Paths/Reduce_Costs/Optimizing_storage">Lantern: Optimizing storage</a> - This article offers insights into analyzing data usage patterns and tailoring retention policies to optimize data availability while minimizing storage costs.</li>\
<li><a href="https://www.splunk.com/en_us/resources/videos/data-retention-in-splunk-cloud.html">Splunk Blogs: Data Retention in Splunk Cloud</a> - A video resource explaining how to enable retention rules in Splunk Cloud, ensuring your data lifecycle aligns with your organization's retention needs.</li>\
</ul></p>
description = <ul>\
<li>Aids in identification of potential use cases</li>\
<li>Aids in identification of candidate data for filtering and routing to alternative locations</li>\
<li>Aids in directing workshop discovery</li>\
</ul>
default_viz = splunk.column
viz_options = { "stackMode":"stacked","seriesColors":["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"],"legendDisplay":"top" }
search = | `ssef_license_search_data` \
| stats \
    values(Index_Name) as Indexes \
    Sum(num_searches) as num_searches\
    Sum(License_Usage_GB) as License_Usage_GB\
    Sum(License_Usage) as License_Usage\
    Latest(earliest_search) as earliest_search\
    Latest(latest_search) as latest_search\
    Latest(total_search_time) as total_search_time\
    Latest(index_reference) as index_reference\
    Latest(datamodel_reference) as datamodel_reference\
    Latest(lookup_reference) as lookup_reference\
    Latest(search_type) as search_type\
    by Sourcetype \
| fillnull value=0 License_Usage_GB License_Usage num_searches \
| where License_Usage > 0 AND num_searches=0\
| sort - License_Usage\
| table Sourcetype Indexes License_Usage_GB num_searches total_search_time

