description = <p>This KPI tracks the ratio of regularly seen Splunk users to total authorized users over a set time frame. A rising ratio signals improving adoption, while a lower ratio may indicate users needing more support. Monitoring this monthly, quarterly, and yearly helps assess platform adoption, user engagement, and overall effectiveness.</p>
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) num_searches>0 search_type="*adhoc*" \
| eval summary_id="%_of_Regularly_Seen_Users_to_Total_Users_Export" \
| bin _time span=1d \
| stats count by _time, user \
| appendcols \
    [ search `ssef_summary(ssef_identities)` NOT identity IN (`ssef_default_users`) \
    | bin _time span=1d \
    | stats dc(identity) as total_authorized by _time ] \
| filldown total_authorized \
| addinfo \
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by user \
| eval perc_active = round((num_active_days / num_days) * 100, 2) \
| fillnull value=0 perc_active total_authorized \
| eval active_user = if(perc_active >= `ssef_perc_active_threshold`, user, null() ) \
| stats max(total_authorized) as total_authorized dc(user) as all_users dc(active_user) as active_users max(num_days) as num_days by _time \
| eval reg_seen_to_total = ceiling((active_users / total_authorized) * 100) , threshold=`ssef_perc_active_threshold` \
| bin _time span=1d \
| stats max(reg_seen_to_total) as kpi_value by _time  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "% of Regularly Seen Users to Total Users" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

