category = Splunk
sub_category = Performance
tags = Infrastructure,Performance,Indexing,Storage
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 3773A44713C5A05515F01E83D2CCB66A
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://community.splunk.com/t5/Monitoring-Splunk/How-to-identify-and-troubleshoot-storage-I-O-issues-in-Splunk/m-p/477430" target="_blank">Splunk Answers - Troubleshooting Storage I/O Saturation Issues</a></li>\
</ul>
severity_normal_text = <br/><p>Storage IO levels are within optimal ranges, indicating healthy storage system performance. No immediate action required. Continue regular monitoring to ensure performance levels are maintained.</p>
severity_low_text = <br/><p>Minimal storage IO saturation detected, indicating slight stress on storage resources. It's unlikely to impact performance significantly at this stage, but should be monitored to prevent future issues. Consider periodic reviews of storage performance and capacity planning.</p>
severity_medium_text = <br/><p>Moderate storage IO saturation is present, suggesting the beginning of potential performance degradation. While not yet critical, it's important to monitor and address these signs of stress on storage systems to prevent escalation. Consider reviewing and optimizing storage usage and performance configurations.</p>
severity_high_text = <br/><p>High storage IO latency will lead to poor user experience. This will negatively impact adoption and expose your organization to risk. Please take steps to remedy this problem as soon as possible.</p>
severity_critical_text = <br/><p>High storage IO latency will lead to poor user experience. This will negatively impact adoption and expose your organization to risk. Please take steps to remedy this problem as soon as possible.</p>
description = <p>This search highlights <b>indexer storage I/O saturation</b> and associated CPU utilization across cluster nodes. It provides visibility into <b>infrastructure performance pressure</b> that may impact indexing throughput and search responsiveness.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Critical:</strong> I/O saturation > 98%.</li>\
<li><strong>High:</strong> I/O saturation > 96%.</li>\
<li><strong>Medium:</strong> I/O saturation > 94%.</li>\
<li><strong>Low:</strong> I/O saturation > 90%.</li>\
<li><strong>Normal:</strong> I/O saturation healthy.</li>\
</ul>
explanation = <p>This search evaluates the latest indexing storage and device-level CPU utilization metrics from the IA4S summary dataset. By grouping results per cluster, indexer, and storage device, it surfaces nodes experiencing potential I/O saturation or elevated compute pressure. Infrastructure and platform administrators can use this information to detect early signs of performance degradation that may affect ingestion rates, search concurrency, or cluster stability. Proactive monitoring of storage I/O saturation supports capacity planning, hardware scaling decisions, and optimization of indexing workloads.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_ia4s_indexing_storage_io_saturation)`</code><br> - Load IS4S summary data containing indexing storage and device utilization metrics.<br><b>02</b> <code>| stats latest(_time) as _time latest(*) as * by label indexer device</code><br> - Retrieve the most recent utilization snapshot per cluster, indexer, and storage device.<br><b>03</b> <code>| `ssef_severity_level_text(severity_level)`</code><br> - Translate numeric severity into descriptive text for operational clarity.<br><b>04</b> <code>| sort - severity_level</code><br> - Prioritize higher severity infrastructure conditions for immediate review.<br><b>05</b> <code>| table ...</code><br> - Present a structured infrastructure performance view for troubleshooting.
solution = <p>This search provides operational insight into <b>indexing storage and CPU saturation risks</b>.</p><p><b>Suggested Actions</b></p><ul><li>Investigate indexers showing elevated CPU and storage utilization.</li><li>Correlate saturation with ingestion spikes or search concurrency increases.</li><li>Review hardware capacity and consider scaling storage or compute resources.</li><li>Optimize indexing configurations to reduce sustained I/O pressure.</li></ul><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/observability-cloud.html" target="_blank">Products: Splunk Observability Cloud</a><br>Comprehensive infrastructure monitoring for proactive performance management.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert guidance for scaling, tuning, and optimizing indexing performance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=indexer%20storage%20io%20performance%20saturation" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps focused on infrastructure monitoring and performance analytics.</li></ul></p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/pdfs/tech-brief/disk-diagnosis-digging-deep-with-monitoring-console-and-more.pdf" target="_blank">Tech Brief</a></li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=indexer%20performance" target="_blank">Splunk Docs: Indexer Performance Search</a><br>Documentation related to monitoring indexer performance (provisionally validated).</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=cpu%20utilization" target="_blank">Splunk Docs: CPU Utilization Search</a><br>Reference for monitoring compute resource utilization (provisionally validated).</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=stats%20latest" target="_blank">Splunk Docs: stats latest Search</a><br>Guidance for retrieving most recent infrastructure metrics (provisionally validated).</li><li><a href="https://lantern.splunk.com/Search?q=indexer%20capacity" target="_blank">Lantern: Indexer Capacity Search</a><br>Operational best practices for capacity planning and scaling (provisionally validated).</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunkbase: IT Operations Management Category</a><br>Apps supporting infrastructure monitoring and operational visibility.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q="indexer%20performance"" target="_blank">Community: Indexer Performance Discussions</a><br>Community insights on managing indexer resource constraints (provisionally validated).</li></ul>
viz_options = { "count":100 }
search = | tstats summariesonly=true count avg(data.cpu_pct) as avg_cpu_pct WHERE index=_introspection sourcetype=splunk_resource_usage component=IOStats by _time span=1m host data.device \
| eval summary_id="ssef_ia4s_indexing_storage_io_saturation" \
| rename data.device as device \
| `ssef_instance_info(host)` \
| where role="indexer" \
| where avg_cpu_pct >= 90 \
| fields _time label name host device avg_cpu_pct \
| stats latest(name) as name latest(avg_cpu_pct) as avg_cpu_pct latest(_time) as _time by label host device \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( avg_cpu_pct>=98, critical, avg_cpu_pct>=96, high, avg_cpu_pct>=94, medium, avg_cpu_pct>=90, low, true(), normal) \
| rename host as indexer \
| convert ctime(_time) \
| table _time label name indexer device avg_cpu_pct severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_indexing_storage_io_saturation summary job completed successfully without identifying any issues, and everything is operating as expected.")`

