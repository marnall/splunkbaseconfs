date_updated = 2024-5-9 13:52:56
category = Splunk
sub_category = GDI
tags = GDI,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = A734C854762CB03396CEF6660DCE0434
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Inputsconf" target="_blank">Splunk Docs - Configure Throughput Limits</a></li>\
<li><a href="https://community.splunk.com/t5/Monitoring-Splunk/Troubleshooting-throughput-limit-issues/m-p/460371" target="_blank">Splunk Answers - Troubleshooting Throughput Limit Issues</a></li>\
<li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/throughput" target="_blank">Splunkbase - Apps for Monitoring Throughput</a></li>\
</ul>
severity_normal_text = <br/><p>Your forwarders are working perfectly, so you don't need to do anything right now.</p>
severity_low_text = <br/><p>One or more Splunk forwarders has been found to hit throttle throughput limit 5 - 9 within past 24 hours.</p>
severity_medium_text = <br/><p>One or more Splunk forwarders has been found to hit throttle throughput limit 10 times or more within past 24 hours.</p>
description = <p>This check monitors instances where Splunk forwarders are throughput throttled based on the settings in limits.conf over the past 24 hours. It identifies forwarders experiencing continuous throttling, which can lead to significant issues such as data delays and, in worst-case scenarios, data loss. Addressing throttling issues promptly ensures that data flows efficiently and reliably through the system, preventing bottlenecks that can impair data integrity and timeliness. This proactive monitoring is crucial for maintaining optimal data transmission and system performance, safeguarding against the potential impact of data delays or loss on operations.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Error count of 10 or more.</li>\
<li><strong>Low:</strong> Error count of 5 or less than 10.</li>\
<li><strong>Normal:</strong> Error count under 5.</li>\
</ul>
search = index=_internal sourcetype=splunkd ThruputProcessor data maxKBps \
| eval summary_id="ssef_scma_forwarder_output_throughput_limits" \
| rex "throughput\s\((?<maxKBps>\d+)" \
| `ssef_instance_info(host)` \
| stats count AS throttle_event_count avg(maxKBps) AS avg_maxKBps latest(name) as name latest(_time) as _time by label \
| eval avg_maxKBps = round(avg_maxKBps, 2) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( throttle_event_count >= 10, medium, throttle_event_count >= 5, low, true(), normal ) \
| table _time label name throttle_event_count avg_maxKBps severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_forwarder_output_throughput_limits summary job completed successfully without identifying any issues, and everything is operating as expected.")`

