[mc_integrity_check_installed_files]
search_name = Integrity check of installed files
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Search & Visualization
category = Health Check
sub_category = Search
tags = Configuration,Health Check,Installation,Monitoring Console,Summary
solution = Review the list of files that failed the integrity check. Make sure that no default configuration files have been modified. Consider restoring non-configuration files from backup or from the Splunk package.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 9F293E35149FED63FAA436C9FC59F637
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_low_text = One or more files that were originally installed by Splunk have been unexpectedly modified or are missing.
description = Verifies the integrity of files that were installed by Splunk.
search = | rest `ssef_rest_target` `ssef_rest_timeout` /services/server/info \
| eval summary_id="mc_integrity_check_installed_files" \
| join type=outer splunk_server [rest `ssef_rest_target` `ssef_rest_timeout` /services/server/status/installed-file-integrity \
    | fields splunk_server check_ready check_failures.* \
    | untable splunk_server file_path check_result \
    | replace "check_failures.*" WITH "*" IN file_path \
    | eval check_ready = if(file_path == "check_ready", check_result, null()) \
    | eval file_path = if(file_path == "check_ready", NULL, file_path) \
    | eval checker_not_working = if(file_path == "fail", check_result, null()) \
    | stats count(eval(isnotnull(file_path))) AS file_integrity_failures max(check_ready) AS check_ready first(checker_not_working) AS checker_not_working by splunk_server] \
| fields splunk_server check_ready file_integrity_failures checker_not_working \
| eval severity_level = case (check_ready != "true", -1, file_integrity_failures = 0, 1, isnull(file_integrity_failures), 1, checker_not_working == "check_disabled", 1, file_integrity_failures > 0, 2, True(), -1) \
| eval file_integrity_failures = if(isnotnull(checker_not_working), checker_not_working, file_integrity_failures) \
| eval file_integrity_failures = if(isnotnull(file_integrity_failures), file_integrity_failures, "integrity check not available") \
| eval check_ready = if(isnotnull(check_ready), check_ready, "integrity check not available") \
| rename splunk_server AS instance \
| fields - checker_not_working _timediff\
| `ssef_handle_no_results(1,"The mc_integrity_check_installed_files summary job completed successfully without identifying any issues, and everything is operating as expected.")`

