execution_plan = <b>01</b> <code>| ssef_summary(ssef_saved_searches)</code><br> - Retrieves summarized metadata for saved searches from IS4S.<br><b>02</b> <code>| search is_scheduled=1 AND disabled=0</code><br> - Filters to active scheduled searches only.<br><b>03</b> <code>| search savedsearch_search="*WinEventLog*"</code><br> - Isolates searches that reference Windows Event Log data.<br><b>04</b> <code>| table</code><br> - Presents ownership, data references, and search definitions for review.<br>
explanation = <p>Scheduled searches that rely on Windows Event Log data often underpin alerting, reporting, and operational workflows. By cataloging where WinEventLog is referenced, teams gain visibility into data dependencies, ownership, and potential risk if inputs change. This is particularly valuable during data onboarding changes, sourcetype normalization, or migration efforts. Platform administrators can also use this information to rationalize redundant searches and ensure alignment with supported data sources.</p>
