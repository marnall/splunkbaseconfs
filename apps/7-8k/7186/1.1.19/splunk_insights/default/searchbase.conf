solution = <p>This weekly trend view helps determine whether concurrency growth is temporary or structurally increasing across reporting periods.</p><p><b>Suggested Actions</b>: If weekly peaks trend upward over multiple periods, evaluate scheduled workload density, optimize inefficient searches, stagger cron schedules, and review workload management settings to control burst concurrency.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(search_concurrency&gt;160,5,search_concurrency&gt;120,4,search_concurrency&gt;70,3,search_concurrency&gt;35,2,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Scaling and managed capacity options when sustained concurrency growth impacts search-tier performance.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utility Apps</a><br>Administration and troubleshooting utilities that support scheduler governance and performance tuning.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=search%20concurrency" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps related to search workload optimization and concurrency visibility.</li></ul></p>
