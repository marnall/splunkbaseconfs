updated_author = khutchinson
related_info = <ul>\
 <li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Indexer/Setaretirementandarchivingpolicy" target="_blank">Set a Retirement and Archiving Policy</a></li>\
 </ul>
severity_normal_text = <br/><p>The check results indicate that you are compatible with Splunk Cloud and therefore a candidate for migration. This particular search is used to compare results to limits in the Splunk Cloud Service Description which decides if a customer is eligible to move to Splunk Cloud.</p>
severity_medium_text = <br/><p>The average retention period of your indexes exceeds the Splunk Cloud default of 90 days. Please consult with your Splunk account team to purchase more storage as your needs dictate. There are three options for the customer to obtain additional storage: Add more storage at the indexing tier DDAA DDSS</p>
severity_high_text = <br/><p>The average retention period of your indexes exceeds the Splunk Cloud default of 90 days. This is not a true blocker but just a call to either purchase more storage or change your retention settings. Please consult with your Splunk account team to purchase more storage as your needs dictate. There are three options for the customer to obtain additional storage: Add more storage at the indexing tier DDAA DDSS Click on the Indexing tab in the tab menu and look for the panel Data Retention Check to see the actual results.</p>
description = <p>This table displays the data retention durations configured for each customer. It's important to verify that customers have not merely defaulted to the standard retention setting of six years. In the context of Splunk Cloud under the ingest model, the service includes storage for a maximum of 90 days as part of the license: calculated as 90 times the number of terabytes licensed. This formula determines the total default storage available in terabytes. Ensuring that retention settings are actively managed rather than left at defaults helps optimize storage usage and can significantly affect compliance with data management policies and cost efficiencies.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = `ssef_summary(ssef_data_indexes)` isInternal=0 disabled=0 role=*indexer* \
| eval summary_id="ssef_scma_indexing_data_retention_check" \
| eval retentionInDays=round(frozenTimePeriodInSecs/86400,0) \
| stats max(retentionInDays) AS max_retentionInDays avg(retentionInDays) AS avg_retentionInDays, p95(retentionInDays) AS p95_retentionInDays latest(name) as name by label \
| `ssef_cloud_limits(indexing_data_retention_check)` \
| eval avg_retentionInDays=round(avg_retentionInDays,0), p95_retentionInDays=round(p95_retentionInDays) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( avg_retentionInDays >= 180, high, avg_retentionInDays >= 90, medium, true(), normal ) \
| table _time label name avg_retentionInDays p95_retentionInDays max_retentionInDays severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_data_retention_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

