viz_options = {  "stackMode": "stacked", "backgroundColor": "transparent", "seriesColors": ["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"], "legendDisplay": "top", "xAxisTitleVisibility": "hide"  }
