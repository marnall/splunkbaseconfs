[mc_data_hygiene_events_future]
search_name = Data hygiene - events in the future
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Data Hygiene
version = 1.0.3
date_updated = 2025-7-8 9:19:24
category = Health Check
sub_category = Data Hygiene
tags = Data Hygiene,Health Check,Indexing,Monitoring Console,Splunk Health Assistant,Summary,Timestamp Extraction
solution = Review the identified sourcetypes for data onboarding issues (such as incorrect parsing time, not considering timezone, etc.) or source configuration issues (such as NTP settings, invalid timezone, etc.). Events that occur in the future are generally not considered part of the search process as they are outside the search window and can cause misleading or inaccurate search results.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 2C0245D605879A6830739BD5DC27FDEC
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = One or more sourcetypes has been found to present events in the future.
description = This check looks for events that are with a future timestamp.
search = | tstats summariesonly=true count AS event_count dc(source) AS source_count dc(host) AS host_count latest(_time) AS latest_event_time WHERE index=* AND (earliest=+5m latest=+10y) by index, sourcetype \
| eval summary_id="mc_data_hygiene_events_future" \
| eval severity_level=3, message="Event is in future by ".tostring(latest_event_time-now(), "duration") \
| convert ctime(latest_event_time) \
| eval instance=sourcetype \
| sort - event_count \
| append \
    [ makeresults \
    | eval severity_level = 1, event_count = 0, source_count = 0, host_count = 0 \
    | stats values(severity_level) AS severity_level values(*_count) AS *_count] \
| eventstats max(severity_level) AS max_severity_level \
| where severity_level >= max_severity_level \
| fields - max_severity_level \
| rename index as org_index, sourcetype as org_sourcetype\
| `ssef_handle_no_results(1,"The mc_data_hygiene_events_future summary job completed successfully without identifying any issues, and everything is operating as expected.")`

