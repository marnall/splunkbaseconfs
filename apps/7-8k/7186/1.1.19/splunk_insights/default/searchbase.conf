[ssef_scma_environment_instance_inventory]
search_name = Inventory and Splunk Versions
readonly = 1
ssef_cron = weekly
target_component = Inventory
version = 1.0.3
date_created = 2022-09-14
date_updated = 2024-9-11 23:0:20
category = Splunk
sub_category = Inventory
tags = Admin,Discovery,Environment,REST,SCMA
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 9B5F6C1D8C44801729542DB65AC49E48
updated_author = khutchinson
related_info = <ul>\
 <li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/AdvancedWindowsTroubleshooting" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/AdvancedWindowsTroubleshooting</a></li>\
 </ul>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_low_text = <br/><p>One or more core instances have been identified as running operating system other than Linux.  Splunk Cloud runs on Linux systems to ensure ongoing reliability of the service.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>This search collects the instances configured in your environment, their Splunk version, hardware resources, and role.\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Low:</strong> The operating system is not Linux.</li>\
<li><strong>Normal:</strong> The operating system is Linux.</li>\
</ul>
search = | rest splunk_server=* `ssef_rest_timeout` /servicesNS/-/-/server/info \
| eval summary_id="ssef_scma_environment_instance_inventory" \
| eval physical_memory_gb = round(physicalMemoryMB / 1024, 0) \
| rename splunk_server as Splunk_Instance \
| `ssef_instance_info(Splunk_Instance)` \
| stats sum(numberOfVirtualCores) as sumOfVirtualCores sum(numberOfCores) as sumOfPhysicalCores Sum(physical_memory_gb) as physical_memory_gb last(os_name) as os_name last(version) as version values(server_roles) as role latest(name) as name by label, Splunk_Instance \
| eventstats dc(Splunk_Instance) as instance_count by label \
| eval role = mvjoin(role,":") , cpu_core_count = sumOfVirtualCores \
| eval message=if(os_name!="Linux", "Non-Linux based operating system is detected", "OK") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( os_name!="Linux", low, true(), normal ) \
| table label name Splunk_Instance cpu_core_count instance_count role os_name physical_memory_gb severity_level message sumOfPhysicalCores sumOfVirtualCores version \
| `ssef_handle_no_results(1,"The ssef_scma_environment_instance_inventory summary job completed successfully without identifying any issues, and everything is operating as expected.")`

