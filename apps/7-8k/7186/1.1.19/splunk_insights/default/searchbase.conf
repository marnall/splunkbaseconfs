| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1h \
| stats latest(*) as * by _time, label, type, app, view \
| eval users_mv=split(users_mv,", ") \
| `ssef_splunkbase_apps(app)` \
| eval categories=split(categories,"|") \
| `ssef_technology(app,categories)` \
| bin _time span=1d \
| stats values(users_mv) as users_mv sum(num_users) as num_users values(Domain) as Domain by _time, label, type, app, view \
| stats dc(users_mv) as num_users_new max(num_users) as num_users by _time, Domain \
| eval num_users = if(isnotnull(num_users_new), num_users_new, num_users) \
| timechart partial=t fixedrange=t span=1d sum(num_users) as "# of Users by Domain" by Domain

