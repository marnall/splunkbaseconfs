execution_plan = <b>01</b> <code>`ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) search_type="*adhoc*"</code><br> - Pulls adhoc user activity, excluding system/default users.<br><b>02</b> <code>| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference)</code><br> - Normalizes sourcetype reference field.<br><b>03</b> <code>| fields _time user app label name num_searches latest_logon latest_search total_search_time session search_type sourcetype_reference</code><br> - Restricts to relevant fields for enrichment.<br><b>04</b> <code>| bin _time span=1h</code><br> - Aggregates user activity hourly.<br><b>05</b> <code>| stats latest(*) as * by _time , label, app, user</code><br> - Consolidates last seen info per user and app.<br><b>06</b> <code>| `ssef_regularly_seen(user)`</code><br> - Filters to regularly seen users only.<br><b>07</b> <code>| `ssef_splunkbase_apps(app)`</code><br> - Enriches apps with Splunkbase metadata.<br><b>08</b> <code>| eval categories=split(categories,"|")</code><br> - Converts categories string into list.<br><b>09</b> <code>| `ssef_technology(app,categories)`</code><br> - Adds technology metadata based on apps and categories.<br><b>10</b> <code>| `ssef_app_categories(categories)`</code><br> - Resolves and formats app categories.<br><b>11</b> <code>| stats values(*) as * by user</code><br> - Final aggregation by user for deduped values.<br><b>12</b> <code>| table user label Domain Categories</code><br> - Selects key fields for output.<br><b>13</b> <code>| rename label AS "Search Head(s)", user as "Splunk User"</code><br> - Makes column headers user-friendly.<br>
