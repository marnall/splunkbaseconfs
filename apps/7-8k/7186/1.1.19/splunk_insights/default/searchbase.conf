solution = <p>This analysis surfaces <b>new sourcetypes with measurable license and search impact</b>, enabling faster governance and optimization decisions.</p><p><b>Suggested Actions</b> Review newly added sourcetypes with high license usage or search time to validate data necessity. Engage data owners to optimize parsing, filtering, or retention where appropriate. Use category and domain context to align sourcetypes with responsible teams and establish onboarding standards.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise.html" target="_blank">Products: Splunk Enterprise</a><br>The core platform for indexing, searching, and governing machine data and sourcetypes.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Managed Splunk service that simplifies licensing oversight and data source governance.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utilities</a><br>Apps that enhance sourcetype management, data hygiene, and administrative visibility.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_license_search_data</code><br> - Aggregates license usage by sourcetype.<br><b>02</b> <code>| ssef_scma_indexing_data_source_inventory</code><br> - Identifies newly added sourcetypes.<br><b>03</b> <code>| ssef_audit_user_login_tracker</code><br> - Correlates sourcetypes with user search activity.<br><b>04</b> <code>| lookup uce_*_sourcetype_mapping</code><br> - Enriches sourcetypes with domain and category metadata.<br>
explanation = <p>Introducing new sourcetypes can significantly affect licensing, search performance, and data governance. This search combines license usage, indexing inventory, and user search activity to highlight newly added sourcetypes that are actively consuming resources. By correlating usage volume with search time and user counts, platform owners can quickly determine whether new data sources are justified, misconfigured, or under-optimized. The additional enrichment with domain and category metadata supports better ownership assignment and lifecycle decisions.</p>
quid = 06537D83ABA84CA06047008A4A86CAB6
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Createsourcetypes">Splunk Docs: Create source types</a><p>This documentation provides guidance on creating new source types in Splunk, detailing how proper source type configuration can enhance data organization and improve user experience.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Whysourcetypesmatter">Splunk Docs: Why source types matter</a><p>This resource explains the significance of source types in Splunk, emphasizing their role in data classification and how they impact search efficiency and user adoption.</p></li><li><a href="https://community.splunk.com/t5/Getting-Data-In/When-to-add-a-new-index-or-sourcetype/m-p/147956">Splunk Community: When to add a new index or sourcetype?</a><p>This community discussion explores scenarios for creating new indexes or source types, offering insights into best practices that can affect data management and customer value.</p></li><li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Data_Management/Configuring_new_source_types">Lantern: Configuring new source types</a><p>This guide provides step-by-step instructions for configuring new source types in Splunk, highlighting how accurate configuration can lead to better data parsing and user satisfaction.</p></li><li><a href="https://lantern.splunk.com/Platform_Data_Management/Optimize_Data">Drive more value through data source and use case optimization</a><p>This presentation discusses strategies for optimizing data sources and use cases in Splunk, illustrating how introducing appropriate source types can enhance operational efficiency and deliver greater value to customers.</p></li></ul>
description = <p>This search identifies <b>newly introduced sourcetypes</b> and correlates them with <b>license usage</b> and <b>user activity</b>. It helps teams understand which new data sources are <b>consuming license volume</b> and driving search behavior.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = | `ssef_license_search_data` \
| eval Sourcetype=lower(Sourcetype) \
| stats sum(License_Usage) as License_Usage sum(License_Usage_GB) as License_Usage_GB values(Index_Name) as Indexes by Sourcetype \
| where License_Usage > 0 \
```| where match(Sourcetype, "^[^<>?&#]+$") AND NOT match(Sourcetype, "[\"'`*]|-too_small|itsi_internal_log|itsi_notable|itsi_license_checker") ```\
| append \
    [ search `ssef_summary(ssef_scma_indexing_data_source_inventory)` newly_added="yes" \
    | eval Sourcetype=lower(orig_sourcetype) \
    | stats latest(_time) as date_added by Sourcetype \
``` | where match(Sourcetype, "^[^<>?&#]+$") AND NOT match(Sourcetype, "[\"'`*]|-too_small|itsi_internal_log|itsi_notable|itsi_license_checker") ```\
    | fields Sourcetype date_added ] \
| eval new=1 \
| append \
    [ search `ssef_summary(ssef_audit_user_login_tracker)` \
    | eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
    | fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type role index_reference sourcetype_reference datamodel_reference \
    | bin _time span=1h \
    | stats latest(*) as * by _time , label, app, user \
    | eval sourcetype_reference=split(sourcetype_reference,"|") \
    | eval Sourcetype=lower(sourcetype_reference) \
    | stats sum(total_search_time) as total_search_time dc(user) as num_users by Sourcetype \
``` | where match(Sourcetype, "^[^<>?&#]+$") AND NOT match(Sourcetype, "[\"'`*]|-too_small|itsi_internal_log|itsi_notable|itsi_license_checker") ```\
    | fields Sourcetype total_search_time num_users ] \
| stats max(*) as * values(Index_Name) as Indexes last(date_added) as date_added by Sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as Sourcetype OUTPUT data_type category as sourcetype_category domain as sourcetype_domain \
| lookup uce_sourcetype_mapping sourcetype_name as Sourcetype OUTPUTNEW data_type category as sourcetype_category domain as sourcetype_domain \
| eval sourcetype_category=split(mvdedup(sourcetype_category), "|"), sourcetype_domain=split(mvdedup(sourcetype_domain), "|") \
| fillnull value="Unclassified" sourcetype_domain sourcetype_category \
| fillnull value=0 total_search_time num_users new \
| where new=1 \
| sort 0 - total_search_time \
| eval "Total Search Time"=total_search_time/3600 \
| fieldformat "Total Search Time" = printf("%'.2f hrs", 'Total Search Time') \
| convert ctime(date_added) \
| fillnull value="unknown" date_added \
```| eval Sourcetype = replace(Sourcetype, "[^A-Za-z0-9:_*-]", "") ```\
| table Sourcetype date_added Indexes License_Usage_GB "Total Search Time" num_users sourcetype_category sourcetype_domain \
| rename License_Usage_GB as "License Usage (GB)" , num_users as "# of Users", sourcetype_domain as Domain , sourcetype_category as Category

