    dispatchState = "FINALIZING", "Finalizing", \
    true(), Upper(dispatchState)) \
| search NOT status IN (Running,Parsing,Finalized,Finalizing) \
| rex field=error_messages mode=sed "s/\[.*\]\s+//g" \
| rex field=fatal_messages mode=sed "s/\[.*\]\s+//g" \
| rex field=error_messages mode=sed "s/^The limit has been reached for log messages in info.*//g" \
| makemv keywords \
| eval pid = if(status="Queued", sid, pid) \
| eval updated = strptime(updated, "%Y-%m-%dT%H:%M:%S.%3N%z") \
| eval _time = if(isnotnull(published) AND published!="", strptime(published, "%Y-%m-%dT%H:%M:%S.%3N%z") , now() ) \
| stats `ssef_stats_rest_search_jobs_fields` LATEST(name) AS name by label, search_id_normalized, pid \
| eval Splunk_Instance=lower(Splunk_Instance), error_messages = mvdedup(mvappend(error_messages, fatal_messages)) \
| foreach role, Splunk_Instance, keywords \
    [ eval <<FIELD>> = mvjoin('<<FIELD>>', "|")] \
| foreach info_messages, warn_messages, error_messages \
    [ eval <<FIELD>> = mvjoin('<<FIELD>>', "#####")] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time, label, name, role, Splunk_Instance, search_id_normalized, status, search_et, search_lt, pid, app, savedsearch_name, ttl, user, priority, provenance, delegate, diskUsage, available_count, event_count, isEventsPreviewEnabled, isPreviewEnabled, isRemoteTimeline, meanPreviewPeriod, numPreviews, result_count, resultIsStreaming, resultPreviewCount, total_run_time, sampleRatio, sampleSeed, scan_count, searchCanBeEventType, request_auto_cancel, runtime_auto_cancel, runtime_auto_pause, error_messages, info_messages, warn_messages, base_search, TotalBucketsCount, TotalEliminatedBucketsCount, isBatchModeSearch, isGoodSummarizationCandidate, isRealTimeSearch, keywords, search, sid, workload_action_information, workload_pool, custom_workload_pool, request_custom_workload_pool, request_workload_pool, published, updated, severity_level \
