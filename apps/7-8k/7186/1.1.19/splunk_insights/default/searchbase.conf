[Sourcetype Analysis by Domain]
search_name = Sourcetype Analysis by Domain
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker,ssef_internal_index_license_usage
version = 1.1.3
date_created = 2025-2-26 13:34:12
date_updated = 2025-5-23 9:23:16
category = Splunk
sub_category = Adoption
tags = Data,IS4S,KPIs,Sourcetypes,UCI
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = AAB28E698642B4FA7233D747DB690E12
search_author = akhamis
updated_author = akhamis
description = Pie Chart of "Sourcetype Analysis by Domain" as showcased in the Use Case Insights Business Dashboard.
default_viz = splunk.pie
viz_options = {"seriesColors":["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"],"backgroundColor":"transparent","labelDisplay":"valuesAndPercentage"}
search = | `ssef_license_search_data`\
| stats \
    Max(License_Usage_GB) as License_Usage_GB\
    Max(License_Usage) as License_Usage\
    Max(num_searches) as num_searches\
    values(Index_Name) as Index_Name\
    by Sourcetype \
| fillnull value=0 License_Usage_GB License_Usage num_searches \
| where License_Usage >= 1024 AND num_searches >= 1 \
| rename Sourcetype as sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT domain data_type category \
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW domain data_type category \
| fillnull value="Unclassified" domain category data_type \
| stats values(*) as * max(License_Usage) as License_Usage max(License_Usage_GB) as License_Usage_GB max(num_searches) as num_searches by sourcetype domain category data_type \
| eval domain=split(domain,"|") , category=split(category,"|") , data_type=split(data_type,"|") \
| stats values(*) as * max(License_Usage) as License_Usage max(License_Usage_GB) as License_Usage_GB max(num_searches) as num_searches by sourcetype data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUTNEW domain \
| stats values(*) as * max(License_Usage) as License_Usage max(License_Usage_GB) as License_Usage_GB max(num_searches) as num_searches by sourcetype \
| stats dc(sourcetype) as "# of Sourcetypes" by domain

