related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: SPL Command Quick Reference</a><br>Reference for stats, eval, fields, and aggregation patterns used in this KPI.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search Reference</a><br>Core SPL documentation for maintaining internal telemetry searches.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Splunk Free Courses</a><br>Training resources to improve SPL efficiency and reduce high-footprint search behaviors.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_ia4s_users_disk_quota)` \
| fields _time label name role username quota usage reason srch_type num_queue severity_level \
| stats latest(_time) as _time latest(*) as * count as num_queue by label username \
| appendpipe \
    [ stats count \
    | where count=0 \
    | fields - count \
    | eval label="No disk quota issues were detected" , severity_level = 1 ] \
| `ssef_severity_level_text(severity_level)` \
| sort - severity_level \
| eval _time=if(isnull(_time), now(), _time) \
| convert ctime(_time) \
| table _time label username quota reason srch_type num_queue severity_text \
| rename severity_text as Severity, label as "Search Head", quota as Quota, reason as Reason, srch_type as "Search Type", num_queue as "# Queuing", username as User


[ssef_ia4s_users_indexer_login_activity]
search_name = Users Logging Into Indexers
readonly = 1
target_component = Users
version = 2.0
date_updated = 2026-2-12 15:20:16
category = Splunk
sub_category = Users
tags = Authentication,Indexer,Login
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = F9B10FD7ED6852DB9EA1F17B9DD8C709
updated_author = akhamis
severity_normal_text = <br/><p>This search is NORMAL when login activities on indexers are within expected parameters and show no signs of suspicious behavior.</p>
severity_medium_text = <br/><p>This search becomes MEDIUM if there is a moderate, but noticeable increase in login activities on indexers.</p>
description = <p>Detects <b>successful login activity on indexers</b> using <b>_audit</b> and UI access telemetry. Highlights user access patterns directly targeting indexer roles to support <b>security governance</b> and architectural best practices.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Possible suspicious activity.</li>\
<li><strong>Normal:</strong> No suspicious activity.</li>\
</ul>
explanation = <p>This search identifies successful login attempts and related UI access events, enriches them with instance metadata, and filters specifically for systems labeled as indexers. Direct user interaction with indexers may indicate architectural deviation (users should typically access search heads instead). The search aggregates the latest login event per user and flags indexer access as a medium-severity governance condition to encourage review. Monitoring indexer login activity supports separation-of-duties enforcement and reduces risk of unintended configuration or performance impact.</p>
execution_plan = <b>01</b> <code>index=_audit sourcetype=audittrail ...</code><br> - Retrieve successful login attempts and related access telemetry.<br><b>02</b> <code>| eval search_type=...</code><br> - Classify adhoc search patterns for additional behavioral context.<br><b>03</b> <code>| `ssef_instance_info(host)` | where role="indexer"</code><br> - Enrich with deployment metadata and restrict to indexer-tier systems.<br><b>04</b> <code>| stats latest(...) by label user</code><br> - Summarize latest login event per user and assign severity.
solution = <p>This KPI surfaces user login activity directly targeting indexers, which may indicate governance drift or architectural misalignment.</p><p><b>Suggested Actions</b>: Validate that users accessing indexers have appropriate administrative justification, enforce role-based access controls, restrict UI access to search heads where applicable, and review network segmentation policies.</p>
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Indexer/Managingindexers" target="_blank">Splunk Docs - Indexer Management</a></li><li><a href="https://community.splunk.com/t5/Deployment-Architecture/How-to-prevent-users-from-logging-directly-into-indexers/m-p/403023" target="_blank">Splunk Answers - Managing User Access to Indexers</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Security/AuditSplunkactivity" target="_blank">Audit Splunk Activity</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/security/9.4/secure-your-splunk-enterprise-deployment/harden-splunk-enterprise" target="_blank">Splunk Help: Harden Splunk Enterprise</a><br>Best practices for securing Splunk components and limiting unnecessary access.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/manage-users-and-authentication/about-user-authentication" target="_blank">Splunk Help: About user authentication</a><br>Reference for authentication events and user access governance.</li></ul>
viz_options = { "count":100 }
search = index=_audit sourcetype=audittrail user=* "action=login attempt" info=succeeded \
| eval summary_id="ssef_ia4s_users_indexer_login_activity" \
| fields _time, host, search_type, search_id, user, useragent, info, index, sourcetype, login_source, clientip, status, src \
| eval search_type = if(match(search_id, "\d{10}\.\d+(_[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12})?$"), "adhoc", "other") \
| where info="succeeded" OR search_type="adhoc" OR (index=_internal AND sourcetype="splunkd_ui_access" AND isnotnull(useragent) AND status="200" AND user!="-") \
| `ssef_instance_info(host)` \
| where role="indexer" \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( role="indexer", medium, true(), normal ) \
| stats latest(_time) as _time latest(severity_level) as severity_level by label user \
| table _time label user severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_users_indexer_login_activity summary job completed successfully without identifying any issues, and everything is operating as expected.")`

