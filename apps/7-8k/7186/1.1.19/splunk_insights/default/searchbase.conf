tags = Indexes,KPIs,Licensing,Usage
solution = <p>This query provides insights into license usage patterns, index storage capacity, and user search activity.</p><p><b>Suggested Actions</b><br><b>1.</b> Regularly monitor license usage trends to avoid overages.<br><b>2.</b> Identify indexes with high retention days and optimize accordingly.<br><b>3.</b> Evaluate search activity statistics to balance user workloads.<br><b>4.</b> Implement alerts for critical license consumption thresholds.<br><b>5.</b> Leverage these metrics for capacity planning and scaling decisions.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (License_Usage_GB<10, 1, License_Usage_GB>=10 AND License_Usage_GB<50, 2, License_Usage_GB>=50 AND License_Usage_GB<100, 3, License_Usage_GB>=100 AND License_Usage_GB<200, 4, License_Usage_GB>=200, 5)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> License usage below 10 GB.</li><li><b>Low (Severity 2):</b> License usage between 10 GB and 50 GB.</li><li><b>Medium (Severity 3):</b> License usage between 50 GB and 100 GB.</li><li><b>High (Severity 4):</b> License usage between 100 GB and 200 GB.</li><li><b>Critical (Severity 5):</b> License usage above 200 GB.</li></ul>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index="<<summary>>" source="<<ssef_internal_index_license_usage>>" Lic_Pool!="auto_generated_pool_fixed-sourcetype*"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters the license usage index for relevant data.<br><b>02</b> <code>bin _time span=1h</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Buckets events into hourly spans.<br><b>03</b> <code>stats max(), latest() by ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates max usage and latest pool size values.<br><b>04</b> <code>append [search]</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Combines results from additional subqueries.<br><b>05</b> <code>eval, rename, fields</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Computes new metrics, renames fields, and selects output columns.<br>
explanation = <p>This search aggregates license usage, index storage details, and user activity metrics to provide comprehensive insights into resource utilization and retention policies.</p><p>It combines multiple subqueries to calculate license usage in GB, monitor current database sizes, and evaluate search activity across indexes. The search leverages <b>stats</b>, <b>eval</b>, and <b>bin</b> commands to organize data by time spans and compute key metrics.</p><p>For junior engineers, this search demonstrates advanced SPL techniques like <b>append</b> for combining datasets, <b>stats</b> for aggregating information, and <b>eval</b> for calculating derived fields.</p><p>Overall, this query is designed to track license consumption and index activity, assisting with capacity planning and operational monitoring.</p>
quid = 7D75869523EE639410E0936917CBC4D1
search_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com" target="_blank">Splunk Community</a><br>Explore community discussions on managing license usage.</li><li><a href="https://lantern.splunk.com" target="_blank">Splunk Lantern</a><br>Guidance on optimizing license and index management.</li><li><a href="https://splunkbase.splunk.com" target="_blank">Splunkbase Apps</a><br>Discover apps to enhance license monitoring and capacity planning.</li></ul>
description = <b>Summarizes license usage</b> across indexes, including retention policies, database sizes, and search activity statistics.
search = `ssef_summary(ssef_internal_index_license_usage)` Lic_Pool!="auto_generated_pool_fixed-sourcetype*" \
| bin _time span=1h \
| stats max(License_Usage) AS License_Usage latest(Lic_Pool_Size) as Lic_Pool_Size by _time label Lic_Pool Index_Name Lic_Sourcetype \
| bin _time span=1d \
| stats sum(License_Usage) as License_Usage by _time Index_Name \
| eval License_Usage_GB = round(License_Usage/1024/1024/1024, 2) \
| rename Index_Name as Index \
| fields _time Index License_Usage License_Usage_GB \
| append \
    [ search `ssef_summary(ssef_data_indexes)` isInternal=0 \
    | bin _time span=1d \
    | stats latest() as * LATEST(name) AS name by _time, label, title \
    | stats max(frozenTimePeriodInSecs) as frozenTimePeriodInSecs sum(currentDBSizeMB) as currentDBSizeMB by _time, title \
    | eval retentionDays = frozenTimePeriodInSecs / 86400 \
    | rename title as Index \
    | fields Index currentDBSizeMB retentionDays ] \
| append \
    [ search `ssef_summary(ssef_audit_user_login_tracker)` \
    | bin _time span=1h \
    | stats latest(*) as * by _time , label, app, user \
    | eval index_reference=split(index_reference,"|") \
    | bin _time span=1d \
    | stats avg(num_searches) as num_searches by _time index_reference \
    | eval num_searches=ceiling(num_searches) \
    | rename index_reference as Index \
    | fields _time Index num_searches ] \
| stats max(*) as * by Index \
| where License_Usage>0 \
| eval License_Usage_GB=round(License_Usage_GB,2) , currentDBSizeGB=round(currentDBSizeMB/1024) , License_Usage_MB=round(License_Usage/1024/1024) \
| table Index License_Usage_GB License_Usage_MB currentDBSizeGB currentDBSizeMB retentionDays num_searches

