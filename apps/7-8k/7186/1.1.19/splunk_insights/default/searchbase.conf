 <li><a href="https://docs.splunk.com/Documentation/ITSI/4.14.2/EA/AggOverview" target="_blank">Overview of aggregation policies in ITSI</a></li>\
 <li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#IT_Service_Intelligence_service_limits_and_constraints" target="_blank">IT Service Intelligence Service Limits</a></li>\
 </ul>
severity_normal_text = <br/><p>The number of ITSI Aggregation Policies fully complies with the requirements outlined in the Splunk Cloud service description.</p>
severity_medium_text = <br/><p>The number of ITSI Aggregation Policies does not comply with the requirements outlined in the Splunk Cloud service description.</p>
description = <p>This metric tracks the count of "ITSI Aggregation Policies" in use. Aggregation Policies typically require more resources than standard searches, making it essential to monitor their usage to prevent potential adverse impacts on the Splunk Cloud environment. The current limit is based on the maximum number Splunk has tested for optimal performance; however, it is possible to exceed this number with careful management to ensure the environment remains stable and efficient. Monitoring these policies is crucial for maintaining system performance and scalability.<br></p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> >= 15</li>\
<li><strong>Normal:</strong> < 15</li>\
</ul>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/nobody/SA-ITOA/event_management_interface/notable_event_aggregation_policy report_as=text  \
| eval summary_id="ssef_scma_search_itsi_aggregation_limits" \
| eval value=spath(value,"{}") \
| stats count by splunk_server value \
| spath input=value \
| dedup title \
| where disabled=0 \
| eval x=mvzip(title,disabled,"~") \
| mvexpand x \
| rex field=x "(?<title>[^\~]+)\~(?<disabled>\d+)" \
| search disabled=0 \
| `ssef_instance_info(splunk_server)` \
| stats count AS num_notable_event_aggregation_policies_itsi latest(name) as name by label \
| `ssef_cloud_limits(search_itsi_aggregation_limits)` \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_notable_event_aggregation_policies_itsi >= 15, medium, true(), normal ) \
| table label name num_notable_event_aggregation_policies_itsi severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_itsi_aggregation_limits summary job completed successfully without identifying any issues, and everything is operating as expected.")`

