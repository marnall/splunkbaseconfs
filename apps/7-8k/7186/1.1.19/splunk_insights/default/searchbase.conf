[ssef_scma_workload_classification]
search_name = Workload Classification
readonly = 1
target_component = Infra & Arch
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 17:58:37
category = Splunk
sub_category = Performance
tags = Environment,SCMA,Summary
dispatch_earliest_time = -14d@d
dispatch_latest_time = -0d@d
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = EAE7740F7F83B71C1D71956CA63FA29C
updated_author = khutchinson
related_info = <div class="diag-content-box">\
 <div class="diag-content"><a class="doc-drilldown" href="" target="_blank"></a></div>\
 </div>
severity_normal_text = <br/><p>This search has returned a normal status. Please use the information provided to understand how workload is divided by internal search activity.</p>
severity_low_text = <br/><p>This search has returned a low severity. Please use the information provided to understand how workload is divided by internal search activity and take steps to normalize if applicable.</p>
severity_medium_text = <br/><p>This search has returned a medium severity. Please use the information provided to understand how workload is divided by internal search activity and take steps to normalize if applicable.</p>
severity_high_text = <br/><p>This search has returned a high severity. Please use the information provided to understand how workload is divided by internal search activity and take steps to normalize if applicable.</p>
description = <p>This search breaks down the Splunk environment workload resource usage based on certain criteria.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = | tstats summariesonly=true Sum(data.normalized_pct_cpu) As normalized_pct_cpu WHERE index=_introspection sourcetype=splunk_resource_usage data.process_type=search data.normalized_pct_cpu > 0 by _time Span=1d host data.search_props.sid data.search_props.type data.search_props.app data.search_props.user \
| eval summary_id="ssef_scma_workload_classification" \
| rename "data.search_props.*" As * , "data.*" As * \
| rename sid As search_id \
| eval normalized_pct_cpu=if(normalized_pct_cpu="0.00", null(), normalized_pct_cpu) \
| eval normalized_pct_cpu = if(isnull(normalized_pct_cpu) OR normalized_pct_cpu="", 0, normalized_pct_cpu) \
| eval Workload_Class = case ( match(app, "SplunkEnterpriseSecuritySuite|Splunk_DA-ESS_PCICompliance|^DA-ESS|^SA-\w+Protection|^SA-\w+Management|SA-UEBA|SA-ThreatIntelligence|SA-Utils|Splunk_SA_ExtremeSearch|Splunk_SA_CIM|Splunk_Security_Essentials|splunk_app_eshealthcheck|^SecKit_|SA-ldapsearch"), "ES_base_apps", match(app, "^DA-ITSI|itsi|SA-IndexCreation|^SA-ITOA|^SA-ITSI|SA-UserAccess|vmware_ta_itsi|it_essentials_learn|splunk_app_infrastructure"), "ITSI_base_apps", match(app, "splunk_instrumentation|splunk_rapid_diag|splunk_instance_monitoring|splunk_archiver|system|splunk_monitoring_console|python_upgrade_readiness_app|^scma"), "Splunk_default_apps", match(app,"^search$|^launcher$"), "Search_app", true(), "Core_apps" ) \
| fields _time search_id host type Workload_Class app user normalized_pct_cpu \
| stats Sum(normalized_pct_cpu) As normalized_pct_cpu by _time, Workload_Class \
| eventstats Sum(normalized_pct_cpu) As total_normalized_pct_cpu by _time \
| eval Workload_Class_pct_cpu = normalized_pct_cpu / total_normalized_pct_cpu * 100 \
| fields _time Workload_Class Workload_Class_pct_cpu total_normalized_pct_cpu normalized_pct_cpu \
| join _time \
    [| tstats summariesonly=true P99(data.cpu_system_pct) As cpu_system_pct P99(data.cpu_user_pct) As cpu_user_pct Max(data.virtual_cpu_count) As virtual_cpu_count WHERE index=_introspection sourcetype=splunk_resource_usage component=Hostwide by _time, host Span=5m \
    | rename "data.*" As * \
    | eval host=lower(host) \
    | stats P99(eval((cpu_user_pct + cpu_system_pct) * virtual_cpu_count / 100)) As PctUsed by _time, host \
    | stats Sum(PctUsed) As PctUsed by _time \
    | timechart partial=t fixedrange=t Span=1d P99(PctUsed) As Env_Utilization] \
| eval vCPU_Usage = Workload_Class_pct_cpu * Env_Utilization / 100 , Perc_vCPU_Usage = vCPU_Usage / Env_Utilization * 100 \
| eval timechart_time = _time \
| eval _time=now() \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( Perc_vCPU_Usage > 95, high, Perc_vCPU_Usage > 90, medium, Perc_vCPU_Usage > 80, low, true(), normal ) \
| table timechart_time Workload_Class Env_Utilization Perc_vCPU_Usage Workload_Class_pct_cpu normalized_pct_cpu total_normalized_pct_cpu vCPU_Usage severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_workload_classification summary job completed successfully without identifying any issues, and everything is operating as expected.")`

