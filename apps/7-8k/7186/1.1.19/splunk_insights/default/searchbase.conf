quid = 697457375F37592F8BFE7C06B3561CE7
updated_author = akhamis
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>This search tracks the unique number of active indexes containing data and compares this figure to the maximum number permitted in Splunk Cloud environments—<strong>400</strong> for legacy setups and<strong> 1,000</strong> for Victoria experience environments. By monitoring the count of active indexes, this search ensures compliance with Splunk Cloud's capacity limits, helping to prevent potential system overloads or license violations. Maintaining awareness of active indexes relative to limits is crucial for managing system scalability, ensuring efficient resource utilization, and avoiding operational disruptions due to exceeded capacity. This oversight is essential for optimizing performance and adherence to service constraints in different Splunk Cloud environments.</p>
search = | tstats summariesonly=true count AS event_count dc(host) as dc_host dc(source) as dc_source WHERE [| `ssef_all_indexes` ] AND sourcetype!="*-too_small" AND index!=_* by _time span=1d index sourcetype \
| rename index AS orig_index , sourcetype AS orig_sourcetype \
| where NOT match(orig_index,"^_") \
| lookup ssef_sourcetype_seen_list orig_index, orig_sourcetype OUTPUT orig_sourcetype as found \
| eval newly_added = if(isnull(found), "yes", "no") \
| eval severity_level = if(newly_added=="yes", 2, 1) \
| fields - found \
| `ssef_summarize_data_normal(ssef_scma_indexing_data_source_inventory)` \
| outputlookup ssef_scma_indexing_data_source_inventory_lookup \
| where newly_added=="yes" \
| dedup orig_index, orig_sourcetype \
| fields orig_index, orig_sourcetype\
| outputlookup ssef_sourcetype_seen_list append=true

