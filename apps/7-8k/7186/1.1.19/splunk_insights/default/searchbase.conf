[ssef_ia4s_indexing_thawed_data]
search_name = Thawed Data Detected
readonly = 1
target_component = Indexing
version = 2.0
date_updated = 2024-4-26 15:28:2
category = Splunk
sub_category = Indexing
tags = Indexing,Thawed,Introspection
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 0617DD88ACC5FD2F6E0282F9B076FCB7
updated_author = khutchinson
severity_normal_text = <br/><p>No thawed data detected, indicating optimal data processing with no current issues in handling thawed data. Maintain regular monitoring to ensure continued efficiency in data indexing and processing.</p>
severity_medium_text = <br/><p>A moderate amount of thawed data has been detected, indicating that there are over 100 events of thawed data. This situation warrants attention to ensure that the data is being processed and indexed efficiently.</p>
description = <p>Detects <b>thawed index data activity</b> on indexers using <b>_introspection</b> metrics. It identifies indexes where thawed buckets contain events and assigns a severity level based on volume. This helps administrators understand when restored data is actively present and potentially impacting storage or compliance posture.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> > 100 thawed data events indicating a possible audit.</li>\
<li><strong>Normal:</strong> No issues with thawed data.</li>\
</ul>
explanation = <p>Thawed buckets are typically restored for investigative, audit, or compliance purposes and are not part of normal hot/warm/cold lifecycle operations. When thawed data appears unexpectedly or persists longer than intended, it can consume additional storage and affect retention planning on indexers. This search provides visibility into indexes that currently contain thawed events so platform administrators can validate whether the restore was intentional and still required. Operations teams can use this information to confirm investigation timelines, enforce retention governance, and prevent unnecessary disk pressure caused by forgotten restored buckets.</p>
execution_plan = <b>01</b> <code>| tstats summariesonly=true count max(data.bucket_dirs.thawed.event_count) as event_count WHERE index=_introspection sourcetype=splunk_disk_objects component=Indexes by _time span=1m host data.name</code><br> - Retrieve thawed bucket event counts per index from introspection summaries at one-minute intervals.<br><b>02</b> <code>| eval summary_id="ssef_ia4s_indexing_thawed_data" | rename data.name as index_name</code><br> - Tag the search with a stable summary identifier and normalize the index name field for clarity.<br><b>03</b> <code>| `ssef_instance_info(host)` | where role="indexer"</code><br> - Enrich with instance metadata and restrict analysis to indexer nodes for operational relevance.<br><b>04</b> <code>| eval thawed_event_count = if(isnull(event_count) , 0, event_count)</code><br> - Normalize null thawed counts to zero to ensure consistent aggregation behavior.<br><b>05</b> <code>| stats latest(_time) as _time sum(thawed_event_count) AS thawed_event_count latest(*) as * by label host index_name</code><br> - Aggregate thawed event totals by index and host to provide current state visibility.<br><b>06</b> <code>| where thawed_event_count > 0 | eval ... severity_level = case ( thawed_event_count > 100, medium, true(), normal )</code><br> - Filter to active thawed data and assign severity based on event volume thresholds.<br><b>07</b> <code>| table _time label name indexer index_name thawed_event_count severity_level</code><br> - Present a concise operational table for review and action.</br>
solution = <p>This search highlights indexes with active thawed events so administrators can validate whether restored data is intentional, temporary, and properly governed.</p><p><b>Suggested Actions</b><ul><li>Confirm the business or investigative reason for thawed data and document the expected retention period.</li><li>Monitor disk utilization on affected indexers to ensure restored buckets are not introducing storage risk.</li><li>Remove or re-archive thawed data once the investigation or compliance requirement is complete.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Correlate indexing lifecycle signals into service-level KPIs to improve operational visibility.</li><li><a href="https://www.splunk.com/en_us/products/observability.html" target="_blank">Products: Splunk Observability Cloud</a><br>Extend infrastructure-level monitoring to complement index lifecycle and storage oversight.</li><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Strengthen operational expertise around index management, retention, and lifecycle controls.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=thawed%20index%20data" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps and add-ons related to index management, compliance, and storage visibility.</li></ul></p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Deployment-Architecture/Thawed-data-management-in-Splunk/m-p/517602" target="_blank">Splunk Answers - Thawed Data Management</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Indexer/Restorearchiveddata" target="_blank">Splunk Docs - Restore Archived Data</a></li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=%22thawed%20buckets%22" target="_blank">Splunk Docs: SplunkSearch for "thawed buckets"</a><br>(provisionally validated) Search documentation related to restoring and managing thawed buckets.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=index%20lifecycle" target="_blank">Splunk Docs: SplunkSearch for index lifecycle</a><br>(provisionally validated) Explore index data lifecycle concepts and retention behavior.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=_introspection" target="_blank">Splunk Docs: SplunkSearch for _introspection</a><br>(provisionally validated) Reference documentation for introspection metrics used in this search.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=tstats" target="_blank">Splunk Docs: SplunkSearch for tstats</a><br>(provisionally validated) Learn how to optimize summary-based searches using tstats.</li><li><a href="https://help.splunk.com/en/search?q=%22bucket%20management%22" target="_blank">Splunk Help: Search for "bucket management"</a><br>(provisionally validated) Help site search for managing buckets and index storage.</li><li><a href="https://lantern.splunk.com/Search?q=%22data%20retention%22" target="_blank">Lantern: Search for "data retention"</a><br>(provisionally validated) Lantern search for practical guidance on retention strategy and governance.</li></ul>
description = <p>Monitors thawed data indexing status across indexes.<br>The search calculates the total thawed event count for each index and presents it as 'indexing_thawed_data.' Knowing about thawed data in Splunk is essential for ensuring value, as it allows customers to access critical historical data for compliance and analysis. Proper management of thawed data optimizes storage costs, maintains system performance, and enables comprehensive insights, ensuring that the platform effectively supports the organizations data needs and strategic objectives</p>\
viz_options = { "count":100 }
search = | tstats summariesonly=true count max(data.bucket_dirs.thawed.event_count) as event_count WHERE index=_introspection sourcetype=splunk_disk_objects component=Indexes by _time span=1m host data.name \
| eval summary_id="ssef_ia4s_indexing_thawed_data" \
| rename data.name as index_name \
| `ssef_instance_info(host)` \
| where role="indexer" \
| eval thawed_event_count = if(isnull(event_count) , 0, event_count) \
| stats latest(_time) as _time sum(thawed_event_count) AS thawed_event_count latest(*) as * by label host index_name \
| rename host as indexer \
| where thawed_event_count > 0 \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( thawed_event_count > 100, medium, true(), normal ) \
| table _time label name indexer index_name thawed_event_count severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_indexing_thawed_data summary job completed successfully without identifying any issues, and everything is operating as expected.")`

