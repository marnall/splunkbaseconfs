category = Splunk
sub_category = Sourcetypes
tags = KPIs,Sourcetypes
solution = <p>This view shows the <b>trend of unused sourcetypes</b> alongside overall sourcetype counts.</p><p><b>Suggested Actions</b> Review consistently unused sourcetypes to determine whether they should be optimized, retired, or mapped to analytics use cases. Track increases in regularly accessed sourcetypes as a positive indicator of data adoption.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise.html" target="_blank">Products: Splunk Enterprise</a><br>Core platform for managing and analyzing sourcetype-based data.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert guidance to optimize data onboarding and usage efficiency.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=sourcetype%20optimization" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps that help analyze and optimize sourcetype usage.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
explanation = <p>This search analyzes how many sourcetypes are actively used compared to those that remain unused over time. By trending daily distinct counts, administrators can quantify whether ingested data is delivering analytical value. A rising percentage of unused sourcetypes may indicate unnecessary ingestion costs, poor onboarding alignment, or outdated data sources. Platform and governance teams can use this insight to optimize retention policies, reduce ingestion overhead, and focus enablement efforts on high-value datasets. Over time, this metric supports cost efficiency, data lifecycle governance, and better alignment between ingestion strategy and search demand.</p>
execution_plan = <b>01</b> <code>`ssef_regularly_accessed_sourcetypes`</code><br> - Retrieve summarized sourcetype usage classifications.<br><b>02</b> <code>| timechart span=1d dc(inventory_sourcetype) by usage_category</code><br> - Trend daily distinct sourcetype counts by usage category.<br><b>03</b> <code>| eval total_sourcetypes_for_day = ...</code><br> - Compute total daily sourcetype inventory for comparison context.<br><b>04</b> <code>| eval "% of Regularly Accessed Sourcetypes to Total" = ...</code><br> - Calculate utilization percentage to measure data value density.<br><b>05</b> <code>| fields _time "# of Unused Sourcetypes"</code><br> - Present trend data focused on unused sourcetypes for governance review.<br>
solution = <p>This search provides measurable visibility into <b>Sourcetype Utilization Efficiency</b>, helping teams align ingestion volume with analytical demand.</p><p><b>Suggested Actions</b><ul><li>Investigate sourcetypes with sustained inactivity and evaluate retention reduction or ingestion disablement.</li><li>Align onboarding efforts toward datasets with demonstrated search demand.</li><li>Incorporate utilization ratios into quarterly ingestion cost reviews.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Engage experts to design data lifecycle governance and ingestion optimization strategies.</li><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Strengthen internal capability in data modeling, sourcetype normalization, and search optimization.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Leverage scalable governance controls and workload visibility when optimizing ingestion at scale.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=sourcetype%20usage" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps focused on sourcetype analysis, data governance, and ingestion optimization.</li></ul></p>
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=sourcetype%20management" target="_blank">Splunk Docs: SplunkSearch for sourcetype management</a><br>(provisionally validated) Documentation related to managing and organizing sourcetypes.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=data%20lifecycle%20management" target="_blank">Splunk Docs: SplunkSearch for data lifecycle management</a><br>(provisionally validated) Guidance on managing data retention and lifecycle policies.</li><li><a href="https://help.splunk.com/en/search?q=%22ingestion%20optimization%22" target="_blank">Splunk Help: Search for "ingestion optimization"</a><br>(provisionally validated) Help resources focused on reducing unnecessary data ingestion.</li><li><a href="https://lantern.splunk.com/Search?q=%22data%20governance%22" target="_blank">Lantern: Search for "data governance"</a><br>(provisionally validated) Practical insights for improving data governance maturity.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=search%20performance%20optimization" target="_blank">Splunk Docs: SplunkSearch for search performance optimization</a><br>(provisionally validated) Documentation related to improving search efficiency.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=capacity%20planning" target="_blank">Splunk Docs: SplunkSearch for capacity planning</a><br>(provisionally validated) References for forecasting ingestion growth and storage demand.</li></ul>
description = <p>This search tracks <b>regularly accessed versus unused sourcetypes</b> over time.</p><p>It provides visibility into <b>data adoption and usage efficiency</b> across the environment.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count":100 }
search = `ssef_regularly_accessed_sourcetypes` \
| timechart span=1d dc(inventory_sourcetype) by usage_category \
| eval total_sourcetypes_for_day = coalesce('# of Regularly Accessed Sourcetypes', 0) + coalesce('# of Unused Sourcetypes', 0) \
| eval "% of Regularly Accessed Sourcetypes to Total" = if(total_sourcetypes_for_day > 0, round((coalesce('# of Regularly Accessed Sourcetypes', 0) * 100) / total_sourcetypes_for_day, 2), 0) \
| rename total_sourcetypes_for_day as "Total # of Sourcetypes" \
| table _time "# of Unused Sourcetypes" \
| `ssef_handle_no_results(1,"There are no unused sourcetypes currently detected.")`

