solution = <p>Provides visibility into user-owned dashboards for governance and lifecycle management.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify owners with many dashboards and review for redundancy.<br><b>2.</b> Consolidate dashboards where possible.<br><b>3.</b> Promote shared dashboard ownership for critical use cases.<br><b>4.</b> Implement lifecycle policies for dashboard cleanup.<br><b>5.</b> Monitor trends in dashboard ownership distribution.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (number_of_dashboards=0,1, number_of_dashboards<=5,2, number_of_dashboards<=10,3, number_of_dashboards<=20,4, number_of_dashboards>20,5)</code></pre><p>This SPL should be added before the final <code>| table</code> to assign severity. Higher dashboard counts per user may indicate fragmentation or duplication risk.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No user-owned dashboards.</li><li><b>Low (Severity 2):</b> 1–5 dashboards owned by users.</li><li><b>Medium (Severity 3):</b> 6–10 dashboards.</li><li><b>High (Severity 4):</b> 11–20 dashboards.</li><li><b>Critical (Severity 5):</b> More than 20 dashboards.</li></ul>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/data/ui/views f=author f=uid f=eai:acl*</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve dashboard metadata.<br><b>02</b> <code>| search NOT author=nobody</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Exclude dashboards owned by nobody.<br><b>03</b> <code>| eval uid= title + 'eai:acl.app' + 'eai:acl.sharing' + author</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Create a unique dashboard identifier.<br><b>04</b> <code>| stats dc(uid) as number_of_dashboards</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count unique dashboards.<br><b>05</b> <code>| eval severity_level = case (number_of_dashboards=0,1, number_of_dashboards<=5,2, number_of_dashboards<=10,3, number_of_dashboards<=20,4, number_of_dashboards>20,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity levels.<br><b>06</b> <code>| table number_of_dashboards severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output KPI and severity.<br>
quid = F020130D93292BD65671E58F5AA35FD0
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>No user-owned dashboards; all dashboards are centrally managed.</p>
severity_low_text = <p>Few user-owned dashboards; low governance impact.</p>
severity_medium_text = <p>Moderate number of user-owned dashboards; review for possible consolidation.</p>
severity_high_text = <p>High number of user-owned dashboards; potential governance challenges.</p>
severity_critical_text = <p>Very high number of user-owned dashboards; strong governance action recommended.</p>
description = <p>This search is looking at all non-internal dashboards that are created & the number produced represents the unique number of dashboards. This is showcasing that users are visualizing and gathering insights on many points of data & in some instances, are sharing it with other users. This is a good measure of adoption and building visuals for insights.</p>
search = `ssef_summary(ssef_data_ui_views)` author!=system \
| eval summary_id="summary_total_number_of_dashboards" \
| stats count by label, app, sharing, author, view_name \
| eval uid= view_name + app + sharing + author \
| stats dc(uid) as number_of_dashboards \
| eval severity_level = case (number_of_dashboards<=40,1, number_of_dashboards<=60,2, number_of_dashboards<=80,3, number_of_dashboards<=100,4, number_of_dashboards>100,5) \
| table number_of_dashboards severity_level \
| `ssef_handle_no_results(1,"The summary_total_number_of_dashboards summary job completed successfully without identifying any issues, and everything is operating as expected.")`

