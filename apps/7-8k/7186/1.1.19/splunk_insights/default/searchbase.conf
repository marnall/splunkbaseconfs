[ssef_scma_indexing_index_storage_size]
search_name = Index Storage Sizing
readonly = 1
target_component = Indexing
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 14:39:24
category = Splunk
sub_category = Indexing
tags = Indexes,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = C53F7DDC3231809D60FB1E0E3BE3A95F
updated_author = khutchinson
related_info = <ul>\
 <li><a href="https://lantern.splunk.com/Splunk_Platform/Splunk_Outcome_Paths/Reduce_Costs/Optimizing_storage" target="_blank">Optimizing Storage</a></li>\
 </ul>
severity_normal_text = <br/><p>This check has not found any issues with configurations for your storage. Some issues could be that you have multiple settings for the same index or missing settings which could cause problems. Please use this data as an estimate in understanding the amount of data and time that is potentially scoped for migration to SPlunk Cloud.</p>
severity_medium_text = <br/><p>This check has identified potential issues with your storage configurations. Possible problems include multiple settings for the same index or missing settings that could lead to complications. Please review the data carefully to estimate the amount of data and time required for migration to Splunk Cloud.</p>
description = <p>This search offers insights into the quantity of data currently stored in the environment on a per-index basis. This detailed information is crucial for assessing the scope of data and the time required for potential migration to Splunk Cloud. By understanding the data volume distributed across different indexes, organizations can plan migrations more effectively, ensuring efficient resource allocation and minimizing downtime. This analysis aids in strategic decision-making, particularly in optimizing storage solutions for higher efficiencies and cost optimizations</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = `ssef_summary(ssef_data_indexes)` isInternal=0 disabled=0 role=*indexer* \
| eval summary_id="ssef_scma_indexing_index_storage_size" \
| rename title as orig_index \
| stats latest(currentDBSizeMB) latest(totalEventCount) values(maxDataSize) values(maxTotalDataSizeMB) values(maxGlobalDataSizeMB) values(frozenTimePeriodInSecs) values(datatype) AS index_datatype dc(splunk_server) AS dc_splunk_server max(total_bucket_count) as bucket_count max(total_event_count) as event_count latest(name) as name by label orig_index \
| rename latest(*) AS sum_* values(*) AS * dc(*) AS dc_* \
| eval message=case ( mvcount(split(maxDataSize, " ")) > 1, "ISSUE: multiple maxDataSize for same index", mvcount(split(maxTotalDataSizeMB, " ")) > 1, "ISSUE: multiple maxTotalDataSizeMB for same index", isnull(maxDataSize) OR isnull(frozenTimePeriodInSecs), "ISSUE: rest definition not found for the index", true(), "OK" ) \
| foreach *_size bucket_count \
    [ eval <<FIELD>>=ceiling(<<FIELD>>)] \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( ! match(message, "^OK"), medium, true(), normal ) \
| table _time label name orig_index index_datatype bucket_count dc_splunk_server event_count frozenTimePeriodInSecs maxDataSize maxGlobalDataSizeMB maxTotalDataSizeMB sum_currentDBSizeMB sum_totalEventCount message severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_index_storage_size summary job completed successfully without identifying any issues, and everything is operating as expected.")`

