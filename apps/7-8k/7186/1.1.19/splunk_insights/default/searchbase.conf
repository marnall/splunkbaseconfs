execution_plan = <b>01</b> <code>`ssef_summary(ssef_internal_web_access_tracker)` type!=system view=*</code><br> - Collects usage data excluding system views.<br><b>02</b> <code>| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv</code><br> - Selects relevant fields for dashboard tracking.<br><b>03</b> <code>| bin _time span=1h</code><br> - Bins events hourly for granularity.<br><b>04</b> <code>| stats count by _time, label, type, app, view</code><br> - Counts usage events per view.<br><b>05</b> <code>| bin _time span=1d</code><br> - Re-bins to daily level.<br><b>06</b> <code>| stats count by _time, label, app, view</code><br> - Aggregates daily view access.<br><b>07</b> <code>| appendcols [ search `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` | bin _time span=1d | stats count by _time, label, app, view_name | stats dc(view_name) as unique_views by _time, app | stats sum(unique_views) as total_views by _time ]</code><br> - Appends summary of UI views per app.<br><b>08</b> <code>| filldown total_views</code><br> - Ensures total_views is present for all rows.<br><b>09</b> <code>| addinfo</code><br> - Adds search metadata for time calculation.<br><b>10</b> <code>| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1</code><br> - Calculates total search duration in days.<br><b>11</b> <code>| eventstats dc(_time) as num_active_days by label, app, view</code><br> - Determines number of active days per view.<br><b>12</b> <code>| eval perc_active = round((num_active_days / num_days) * 100, 2)</code><br> - Calculates percentage of active usage.<br><b>13</b> <code>| fillnull value=0 perc_active total_views</code><br> - Fills null values to avoid errors.<br><b>14</b> <code>| eval active_view = if(perc_active >= `ssef_perc_active_threshold`, view, null() )</code><br> - Flags views as active based on threshold.<br><b>15</b> <code>| stats max(total_views) as total_views dc(view) as all_views dc(active_view) as active_views max(num_days) as num_days by _time, label, app, view</code><br> - Compiles metrics per view.<br><b>16</b> <code>| stats max(total_views) as total_views sum(all_views) as all_views sum(active_views) as active_views max(num_days) as num_days by _time</code><br> - Summarizes per day.<br><b>17</b> <code>| eval reg_seen_to_total = ceiling((active_views / total_views) * 100), threshold=`ssef_perc_active_threshold`</code><br> - Computes percentage of regularly used dashboards.<br><b>18</b> <code>| fields _time total_views all_views active_views reg_seen_to_total num_days threshold</code><br> - Selects relevant output fields.<br><b>19</b> <code>| bin _time span=1d</code><br> - Normalizes final time bin.<br><b>20</b> <code>| stats max(active_views) as "# of Regularly Used Dashboards" by _time</code><br> - Outputs the final KPI.</p>
explanation = <p>This search helps Splunk administrators evaluate user engagement with app dashboards over time. It identifies which dashboards are used frequently, defined by a percentage threshold of activity days, and supports prioritization for dashboard optimization, maintenance, or retirement.</p>
quid = 676E125039618F59DF28E042B9385FCB
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/SearchTutorial/Aboutdashboards" target="_blank">Splunk Docs: About dashboards</a><br>Explains dashboard structure and usage in the Splunk platform, useful background for this KPI. :contentReference[oaicite:2]{index=2}</li><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/SearchReference/Stats" target="_blank">Splunk Docs: stats command</a><br>Detailed documentation on the <code>stats</code> command used for aggregating usage counts. :contentReference[oaicite:3]{index=3}</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Eval" target="_blank">Splunk Docs: eval command</a><br>Shows how <code>eval</code> expressions are used to compute derived metrics like percentages. :contentReference[oaicite:4]{index=4}</li></ul>
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span></p>\
The count of "regularly" used dashboards for the specified time period. A regularly used dashboard is defined as one that is accessed daily for at least 10% of the specified time period.\
\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span></p>\
Tracking this KPI is vital for assessing Splunks value, as it provides insights into user behavior, underscores the relevance of specific data and metrics, and shows Splunks influence on operational efficiency and decision-making. This logic is not a one size fits all indicator of value. Some dashboards may be incredibly valuable but only accessed when needed, which could depend upon the situation. Keep this in mind as you make decisions about your dashboard inventory.\
\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span></p>\
This is an important KPI to measure <em>weekly</em>, <em>monthly</em>, and <em>quarterly</em>.
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_internal_web_access_tracker)` type!=system view=* \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1h \
| stats count by _time, label, type, app, view \
| bin _time span=1d \
| stats count by _time, label, app, view \
| appendcols \
    [ search `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
    | bin _time span=1d \
    | stats count by _time, label, app, view_name \
    | stats dc(view_name) as unique_views by _time, app \
    | stats sum(unique_views) as total_views by _time ] \
| filldown total_views \
| addinfo \
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by label, app, view \
| eval perc_active = round((num_active_days / num_days) * 100, 2) \
| fillnull value=0 perc_active total_views \
| eval active_view = if(perc_active >= `ssef_perc_active_threshold`, view, null() ) \
| stats max(total_views) as total_views dc(view) as all_views dc(active_view) as active_views max(num_days) as num_days by _time, label, app, view \
| stats max(total_views) as total_views sum(all_views) as all_views sum(active_views) as active_views max(num_days) as num_days by _time \
| eval reg_seen_to_total = ceiling((active_views / total_views) * 100) , threshold=`ssef_perc_active_threshold` \
| fields _time total_views all_views active_views reg_seen_to_total num_days threshold \
| bin _time span=1d \
| stats max(active_views) as "# of Regularly Used Dashboards" by _time

