explanation = <p>Alternatively we can just focus on the worst performing jobs:</p><div spellcheck="false" class="ql-code-block-container"><div class="ql-code-block">`ssef_summary(ssef_scma_top_50_jobs)` earliest=-30d </div><div class="ql-code-block">| fields _time label Splunk_Role app user savedsearch_name weighted_expense_factor overall_expense_factor run_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb </div><div class="ql-code-block">| stats latest(*) as * by label Splunk_Role app user savedsearch_name </div><div class="ql-code-block">| table label Splunk_Role app user savedsearch_name </div><div class="ql-code-block">| lookup ssef_saved_searches_lookup label app savedsearch_name output description cron_schedule schedule_priority schedule_window allow_skew dispatch_earliest_time dispatch_latest_time actions action_email_to </div><div class="ql-code-block">| eval es_sh = case ( </div><div class="ql-code-block">    app IN ("SplunkEnterpriseSecuritySuite","DA-ESS-AccessProtection","DA-ESS-EndpointProtection","DA-ESS-IdentityManagement","DA-ESS-NetworkProtection","DA-ESS-ThreatIntelligence","missioncontrol","SA-AccessProtection","SA-AuditAndDataProtection","SA-ContentVersioning","SA-EndpointProtection","SA-IdentityManagement","SA-NetworkProtection","SA-ThreatIntelligence","SA-UEBA","DA-ESS-ContentUpdate","Splunk_Security_Essentials","security_getting_started","Splunk_DA-ESS_PCICompliance","Splunk_App_SAA","Splunk_App_for_Anomaly_Detection","InfoSec_App_for_Splunk","splunk_app_sap_etd_alerts","splunk_app_phantom","trustar_unified","Splunk_TA_Talos_Intelligence"), "yes", </div><div class="ql-code-block">    app="SplunkEnterpriseSecuritySuite" AND view IN ("access_*","account_*","alert*","algorithm","asset_*","cluster_*","contents","correlation_*","create_*","data_*","default_*","detect_*","dns_*","email_*","endpoint_*","ess_*","experiment_*","finding*","forecast_*","forwarder_*","generic_*","http_*","iam*","identity_*","ids_*","incident_*","index_*","intelligence","landing","malware_*","managed_*","map_rule_to_technique","mc_*","microsoft365*","mitre_*","mltk_*","network*","new_*","per_*","port_*","predict_*","redirect_*","response_*","rest_*","risk_*","search*","security_*","sess_*","session_*","showcase*","smart_*","soar*","ssl_*","suppress*","system*","threat_*","time_*","traffic_*","uba*","update_*","url_*","user_*","vuln_*","web_*"), "yes", </div><div class="ql-code-block">    true(), "no") </div><div class="ql-code-block">| `ssef_app_info(app)` </div><div class="ql-code-block">| where es_sh="yes"</div></div>
quid = 489E1CF7C3662459A22B5FB504CD5497
