solution = <p>Monitors daily average users exceeding disk or job quotas to maintain search head performance and equitable resource distribution.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify high-usage users and review search efficiency.<br><b>2.</b> Educate users on best practices for memory and job usage.<br><b>3.</b> Adjust role quotas if necessary.<br><b>4.</b> Reschedule or optimize searches causing quota exceedance.<br><b>5.</b> Monitor after adjustments for improvement.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (daily_average_users_exceeding_disk_quota_limit=0,1, daily_average_users_exceeding_disk_quota_limit<=2,2, daily_average_users_exceeding_disk_quota_limit<=5,3, daily_average_users_exceeding_disk_quota_limit<=10,4, daily_average_users_exceeding_disk_quota_limit>10,5)</code></pre><p>Add before the final <code>| table</code> to apply severity scoring. Higher counts indicate a broader impact on search head performance.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No users exceeding quotas.</li><li><b>Low (Severity 2):</b> 1–2 users.</li><li><b>Medium (Severity 3):</b> 3–5 users.</li><li><b>High (Severity 4):</b> 6–10 users.</li><li><b>Critical (Severity 5):</b> More than 10 users.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_introspection "data.search_props.role"=head data.written_mb>0 sourcetype=splunk_resource_usage NOT "data.search_props.user"=splunk-system-user</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Select resource usage events for non-system users on search heads.<br><b>02</b> <code>| bin span=1h _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Bucket events into hourly intervals.<br><b>03</b> <code>| rename "data.search_props.user" as user</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Standardize field naming.<br><b>04</b> <code>| stats sum(data.written_mb) ... by user _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate written MB and distinct searches per user per hour.<br><b>05</b> <code>| join type=left user ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Enrich with user-to-role mapping from authentication REST API.<br><b>06</b> <code>| mvexpand role</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Handle multiple roles per user.<br><b>07</b> <code>| join type=left role ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Enrich with role quota settings.<br><b>08</b> <code>| where written_mb_user > max_srchDiskQuota_mb*0.80 OR distinct_search_count > max_srchJobsQuota*0.8</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter users exceeding 80% of their quotas.<br><b>09</b> <code>| timechart partial=t fixedrange=t span=1d dc(user) as users_exceeding_disk_quota_limit</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct users per day exceeding limits.<br><b>10</b> <code>| stats avg(users_exceeding_disk_quota_limit) ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate daily average.<br><b>11</b> <code>| eval severity_level = case (...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity levels.<br><b>12</b> <code>| table ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output results.<br>
quid = E37045FA130D8B0380652E649DDC43F4
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>No users are exceeding their assigned search disk or job quotas.</p>
severity_low_text = <p>Few users exceeding quotas; minimal performance impact.</p>
severity_medium_text = <p>Several users exceeding quotas; monitor and optimize searches.</p>
severity_high_text = <p>High number of users exceeding quotas; performance impact likely.</p>
severity_critical_text = <p>Widespread quota exceedance; immediate action required to restore system stability.</p>
description = <p>This search identifies users who are reaching their maximum disk allotment. The disk allocation is extracted for each user based on their role. Rest commands are used to join this information with the main search. If more users are hitting their maximum disk allotment, it will be restrictive to their day-to-day activity but also to the Splunk environment as it is a shared resource under-the-hood. </p>
viz_options = { "count":100 }
search = | tstats summariesonly=true sum(data.written_mb) as written_mb_user dc(data.search_props.sid) as distinct_search_count WHERE index=_introspection sourcetype="splunk_resource_usage" "data.search_props.role"=head data.written_mb>0 NOT "data.search_props.user"=splunk-system-user by _time span=1h "data.search_props.user" \
| eval summary_id="summary_users_exceeding_the_disk_quota_or_concurrency_quota" \
| rename "data.search_props.user" as user \
| join type=left user \
    [| search `ssef_summary(ssef_identities)` \
    | stats latest(*) as * latest(_time) as _time by label, identity \
    | eval splunk_role_map=split(splunk_role_map,"|") \
    | stats values(splunk_role_map) as role by identity \
    | rename identity as user \
    | fields user role] \
| rex mode=sed field="role" "s/\n/|/g" \
| makemv role delim="|" \
| mvexpand role \
| join type=left role \
    [| search `ssef_summary(ssef_authorization_roles)` \
    | stats latest(*) as * latest(_time) as _time by label, title \
    | stats max(srchDiskQuota) as srchDiskQuota max(srchJobsQuota) as srchJobsQuota by title \
    | rename title as role \
    | fields role srchDiskQuota srchJobsQuota ] \
| where isnotnull(srchDiskQuota) OR isnotnull(srchJobsQuota) \
| stats max(srchDiskQuota) as max_srchDiskQuota_mb max(srchJobsQuota) as max_srchJobsQuota values(role) as role by user _time written_mb_user distinct_search_count \
| where written_mb_user > max_srchDiskQuota_mb*0.80 OR distinct_search_count > max_srchJobsQuota*0.8 \
| timechart partial=t fixedrange=t span=1d dc(user) as users_exceeding_disk_quota_limit \
| stats avg(users_exceeding_disk_quota_limit) as daily_average_users_exceeding_disk_quota_limit \
| eval severity_level = case (daily_average_users_exceeding_disk_quota_limit<=3,1, daily_average_users_exceeding_disk_quota_limit<=8,2, daily_average_users_exceeding_disk_quota_limit<=12,3, daily_average_users_exceeding_disk_quota_limit<=14,4, daily_average_users_exceeding_disk_quota_limit>14,5) \
| table daily_average_users_exceeding_disk_quota_limit severity_level \
| `ssef_handle_no_results(1,"The summary_users_exceeding_the_disk_quota_or_concurrency_quota summary job completed successfully without identifying any issues, and everything is operating as expected.")`

