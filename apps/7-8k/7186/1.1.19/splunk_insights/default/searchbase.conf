description = <p>This search calculates the distribution of ingested data by index retention over the last day. It provides a detailed view of how data is allocated across different retention policies, helping to ensure that data storage practices align with organizational guidelines and compliance requirements. Monitoring ingest distribution by retention is crucial for optimizing storage management, maintaining system efficiency, and ensuring that data is retained appropriately to meet both operational needs and regulatory obligations. This process supports strategic decision-making regarding data handling and resource allocation.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = `ssef_summary(ssef_scma_indexing_ingest_retention)` \
| fields _time label name frozenTimePeriodInDays index_count avg_bytes avg_total_bytes ingest_pct severity_level \
| stats latest(_time) as _time latest(*) AS * by label, frozenTimePeriodInDays \
| `ssef_severity_level_text(severity_level)` \
| sort - severity_level \
| rename severity_text as Severity \
| convert ctime(_time) \
| table _time label frozenTimePeriodInDays index_count avg_bytes avg_total_bytes ingest_pct Severity

