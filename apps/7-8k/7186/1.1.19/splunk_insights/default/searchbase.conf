quid = CE6AC53D1228723C336132135746B691
updated_author = akhamis
related_info = <p><a href="https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/Troubleshootindexingperformance" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/Troubleshootindexingperformance</a></p>
description = <p>This check, which monitors for warnings about index-time settings that hinder the proper processing of recently ingested data, is vital for ensuring data quality and system performance. Inadequate index-time configurations can compromise data integrity, leading to inaccuracies that affect decision-making and system functionality. By addressing these issues proactively, organizations can maintain high data hygiene, preventing performance challenges and ensuring that the data remains reliable and valuable for operational and strategic purposes. This focus is crucial for optimizing system performance and maximizing the value derived from the data processed.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> Line breaking issues &gt; 10</li>\
<li><strong>Medium:</strong> Date parsing issues  &gt; 10</li>\
<li><strong>Low:</strong> Aggregation Issues &gt; 10</li>\
<li><strong>Normal:</strong> No impactful problems found.</li>\
</ul>
search = `ssef_summary(ssef_scma_data_hygiene_event_indexing)` orig_sourcetype!=audittrail\
| fields _time aggregation_issues data_hosts data_sources date_parsing_issues line_breaking_issues orig_sourcetype severity_level warn_count \
| stats latest(*) as * latest(_time) as _time by orig_sourcetype \
| `ssef_severity_level_text(severity_level)` \
| sort - severity_level \
| rename severity_text as Severity \
| convert ctime(_time) \
| table orig_sourcetype data_sources data_hosts line_breaking_issues date_parsing_issues aggregation_issues warn_count Severity \
| rename orig_sourcetype as Sourcetype

[ssef_scma_data_hygiene_events_future]
search_name = Future Events (Deprecated)
readonly = 1
target_component = GDI & Data Hygiene
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 13:59:48
category = Splunk
sub_category = GDI
tags = GDI,SCMA,Summary
dispatch_earliest_time = +5m
dispatch_latest_time = +1y
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = C84DECBD93B4734D424404525E1B19AE
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/HowSplunkextractstimestamps" target="_blank">Splunk Docs - Managing Timestamps</a></li>\
<li><a href="https://community.splunk.com/t5/Getting-Data-In/How-to-handle-future-dated-events/td-p/176678" target="_blank">Splunk Answers - Handling Future-Dated Events</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Troubleshooteventtimestamps" target="_blank">Splunk Docs - Troubleshooting Event Timestamp Issues</a></li>\
<li><a href="https://community.splunk.com/t5/Splunk-Search/Future-events-indexing/m-p/397343" target="_blank">Splunk Answers - Future Events Indexing</a></li>\
</ul>
severity_normal_text = <br/><p>There are no events in your Splunk indexes that have future timestamps. Well done!</p>
severity_medium_text = <br/><p>One or more of your events in your Splunk indexes appear to have future timestamps. Please look the information presented in the results panel to identify the indexes, sources, and event counts that contain the events in question. Splunk uses the timestamps in the logs generated on an endpoint in order to log an accurate time when an event actually happened. This is why having all of the systems reporting into Splunk leverage an authoritative time source, like NTP, is so important. Attackers may realize that your correlation rules are based on time boundaries, e.g. search the last five minutes of data but if a system is logging time in the future then your correlation rules may not trip when suspicious behavior is logged. It is important to find the systems with inaccurate system times and fix them. Please see the troubleshooting documentation link to help address these issues.</p>
severity_high_text = <br/><p>One or more of your events in your Splunk indexes appear to have future timestamps. Please look the information presented in the results panel to identify the indexes, sources, and event counts that contain the events in question. Splunk uses the timestamps in the logs generated on an endpoint in order to log an accurate time when an event actually happened. This is why having all of the systems reporting into Splunk leverage an authoritative time source, like NTP, is so important. Attackers may realize that your correlation rules are based on time boundaries, e.g. search the last five minutes of data but if a system is logging time in the future then your correlation rules may not trip when suspicious behavior is logged. It is important to find the systems with inaccurate system times and fix them. Please see the troubleshooting documentation link to help address these issues.</p>
description = <p>This check identifies events within your system that have future timestamps. Incorrect timestamps can lead to inaccurate results in data analysis, compromising the reliability of alerts and reports. It is crucial to remediate such issues promptly to ensure the accuracy and integrity of the information presented. Addressing timestamp errors quickly helps maintain the overall effectiveness of data-driven decision-making and ensures that operational insights and responses are based on precise and current data.<br></p>\
<p><strong>Severity Levels:</strong></p>\
<ul><li><strong>High:</strong> The number of events with inaccurate timestamps is 100 or greater.</li>\
<li><strong>Medium:</strong> The number of events with inaccurate timestamps is between 10 and 99.</li>\
<li><strong>Normal:</strong> The number of events with inaccurate timestamps is less than 10.</li>\
</ul>
search = | tstats summariesonly=true count AS event_count dc(source) AS source_count dc(host) AS host_count latest(_time) AS latest_event_time latest(source) AS latest_source WHERE [ | `ssef_all_indexes` ] AND earliest=+5m latest=+1y by index, sourcetype \
| eval summary_id="ssef_scma_data_hygiene_events_future" \
| rename index AS orig_index sourcetype AS orig_sourcetype \
| eval message="Event is in future by ".tostring(latest_event_time-now(), "duration") \
| convert ctime(latest_event_time) \
| eval message=replace(message, "[:=]", " ") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( event_count >= 100, high, event_count >= 10, medium, true(), normal ) \
| table orig_index orig_sourcetype event_count host_count latest_event_time latest_source severity_level message source_count \
| `ssef_handle_no_results(1,"The ssef_scma_data_hygiene_events_future summary job completed successfully without identifying any issues, and everything is operating as expected.")`

