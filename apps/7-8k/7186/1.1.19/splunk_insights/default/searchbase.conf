sub_category = Dashboards
tags = Dashboards,Details,KPIs
solution = <p>This search delivers actionable insight into how dashboards are distributed across technological or organizational domains.</p><p><b>Suggested Actions</b><br><b>1.</b> Review domains with low dashboard counts to identify underutilized areas.<br><b>2.</b> Identify high-usage domains for platform investment or optimization.<br><b>3.</b> Use output to inform dashboard governance policies.<br><b>4.</b> Engage with app owners in low-dashboard domains to understand adoption blockers.<br><b>5.</b> Validate domain mappings and app-category relationships for accuracy.</p><p> Recommended For You: <ul><li><a href="https://splunkbase.splunk.com/app/6201/" target="_blank">Splunk App for Content Packs</a><br>Enable rapid onboarding of dashboards by leveraging curated packs.</li><li><a href="https://www.cisco.com/c/en/us/products/security/index.html" target="_blank">Cisco Secure Solutions</a><br>Use alongside security domains to monitor dashboard adoption in SecOps.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)`</code><br>      - Pulls in summarized dashboard data and filters to allowed apps.<br><b>02</b> <code>| stats dc(view_name) as num_app_dashboards by app</code><br>      - Calculates the number of distinct dashboards per app.<br><b>03</b> <code>| `ssef_splunkbase_apps(app)`</code><br>      - Enriches app data with Splunkbase metadata.<br><b>04</b> <code>| fields app num_app_dashboards categories</code><br>      - Limits to relevant fields for further processing.<br><b>05</b> <code>| eval categories=split(categories,"|")</code><br>      - Converts category string into a multi-value field.<br><b>06</b> <code>| `ssef_technology(app,categories)`</code><br>      - Applies technology mapping logic based on app and category.<br><b>07</b> <code>| rename Domain as domain</code><br>      - Renames the field for consistency and clarity.<br><b>08</b> <code>| fields app num_app_dashboards categories domain</code><br>      - Selects only the necessary fields for aggregation.<br><b>09</b> <code>| stats sum(num_app_dashboards) as "# of Dashboards by Domain" by domain</code><br>      - Sums dashboards by domain to produce the final metric.<br>
explanation = <p>This query helps organizations understand <b>dashboard adoption across domains</b> by aggregating the number of dashboards associated with different apps and their mapped domains. It is particularly useful for portfolio managers and platform teams seeking visibility into how dashboards are distributed across internal capabilities or business units. The use of macros ensures consistent and maintainable enrichment logic across environments, while the summary nature of the data allows for fast execution and real-time reporting.</p>
quid = F23B0CDFDCF7243032F09E6DE8FCE08E
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Aboutreportingcommands" target="_blank">Splunk Docs: About reporting commands</a><br>Details on using <code>stats</code> for aggregation.</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Visualizations/Use_cases_for_different_dashboard_types" target="_blank">Lantern: Use cases for different dashboard types</a><br>Explore how to use dashboards effectively across the enterprise.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Viz/Dashboards" target="_blank">Splunk Docs: Dashboards</a><br>Overview of dashboard types and usage.</li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/bd-p/dashboards" target="_blank">Splunk Community: Dashboards and Visualizations</a><br>Q&A and solutions for dashboard-related topics.</li><li><a href="https://lantern.splunk.com/Observability/Infrastructure_Monitoring" target="_blank">Lantern: Infrastructure Monitoring</a><br>Leverage insights into domain dashboards for infra visibility.</li></ul>
description = <p>This search provides a <b>summary of dashboard counts by domain</b> using SSEF summary data. It leverages normalized application and category information to calculate the number of dashboards per domain.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.pie
search = `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
| stats dc(view_name) as num_app_dashboards by app \
| `ssef_splunkbase_apps(app)` \
| fields app num_app_dashboards categories \
| eval categories=split(categories,"|") \
| `ssef_technology(app,categories)` \
| rename Domain as domain \
| fields app num_app_dashboards categories domain \
| stats sum(num_app_dashboards) as "# of Dashboards by Domain" by domain

[# of Events on Hand]
search_name = # of Events on Hand
readonly = 1
version = 2.0
date_created = 2025-12-15
date_updated = 2025-12-15
category = Splunk
sub_category = Search
tags = Data,Details,KPIs
solution = <p>This search enables executive and technical stakeholders to visualize the magnitude of available event data.</p><p><b>Suggested Actions</b><br><b>1.</b> Use as a health indicator of data retention.<br><b>2.</b> Add to executive dashboards for volume visibility.<br><b>3.</b> Compare across time to identify ingest or retention anomalies.<br><b>4.</b> Integrate with capacity planning tools.<br><b>5.</b> Use to support workload scaling analysis.</p><p> Recommended For You: <ul><li><a href="https://lantern.splunk.com/Splunk_Platform/Data_Management/Estimating_your_data_volume" target="_blank">Lantern: Estimating your data volume</a><br>Use this to align platform provisioning with event scale.</li><li><a href="https://www.cisco.com/c/en/us/solutions/data-center-analytics/index.html" target="_blank">Cisco Data Center Analytics</a><br>Correlate Splunk event scale with underlying compute capacity and infrastructure.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| dbinspect [ | `ssef_all_indexes` ]</code><br>      - Inspects all index buckets returned by the macro.<br><b>02</b> <code>| stats max(eventCount) as eventCount by bucketId</code><br>      - Extracts the highest event count per bucket.<br><b>03</b> <code>| stats sum(eventCount) as eventCount</code><br>      - Aggregates total events across all buckets.<br><b>04</b> <code>| `ssef_large_string_abbr(eventCount,2)`</code><br>      - Converts large event count into a readable abbreviated format.<br><b>05</b> <code>| fields eventCount_string_abbr</code><br>      - Selects the normalized event count field.<br><b>06</b> <code>| rename eventCount_string_abbr as "# of Events on Hand"</code><br>      - Renames output field for clarity in display.<br>
explanation = <p>This search utilizes <b>dbinspect</b> in conjunction with <b>`ssef_all_indexes`</b> to assess the number of events across buckets. It surfaces a normalized event count that reflects data availability and can be used for gauging system scale or monitoring ingestion activity. This is particularly useful for platform engineering and capacity planning teams seeking to understand index health, retention, and workload sizing. It also has "wow factor" utility for exec dashboards, showing volume scale in simplified form.</p>
quid = 8C17C0B1E42D4222C84D324CADCAB44C
updated_author = jkwiatek
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/DBinspectcommand" target="_blank">Splunk Docs: DBinspect command</a><br>Details on the <code>dbinspect</code> command and how it evaluates index buckets.</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Data_Management/Data_visibility_metrics" target="_blank">Lantern: Data visibility metrics</a><br>Use metrics like this to improve data planning.</li><li><a href="https://community.splunk.com/t5/Getting-Data-In/bd-p/getting-data-in" target="_blank">Splunk Community: Getting Data In</a><br>Forum on ingestion and volume management.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Indexesconf" target="_blank">Splunk Docs: indexes.conf</a><br>Configuration reference for managing index settings and volumes.</li></ul>
description = <p>This search provides a <b>normalized snapshot of event volume</b> on hand using index and bucket metadata. It offers high-level visibility into how much data is available for analysis, supporting strategic capacity planning.</p>
default_viz = splunk.singlevalue
search = | dbinspect [ | `ssef_all_indexes` ] \
| stats max(eventCount) as eventCount by bucketId \
| stats sum(eventCount) as eventCount \
| `ssef_large_string_abbr(eventCount,2)` \
| fields eventCount_string_abbr \
| rename eventCount_string_abbr as "# of Events on Hand"

