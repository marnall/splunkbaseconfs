execution_plan = <b>01</b> <code>`ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`, splunk-system-user)</code><br> - Filters for all active, non-system users.<br><b>02</b> <code>| fields _time user app label session</code><br> - Narrows down to fields relevant to session tracking.<br><b>03</b> <code>| bin _time span=1h</code><br> - Groups events into 1-hour intervals.<br><b>04</b> <code>| eval session=split(session,"|")</code><br> - Ensures session data is treated as a multi-value field.<br><b>05</b> <code>| stats latest(*) as * dc(session) as num_logins by _time label app user</code><br> - Gets latest values and counts distinct sessions as logins per user/hour.<br><b>06</b> <code>| makecontinuous _time span=1h</code><br> - Ensures uninterrupted hourly time series.<br><b>07</b> <code>| fillnull value=0 num_logins</code><br> - Replaces missing values with zero to normalize data.<br><b>08</b> <code>| eval hour=strftime(_time, "%H")</code><br> - Extracts hour component for temporal analysis.<br><b>09</b> <code>| chart sum(num_logins) AS "Active Users Peak Usage Time" by hour user</code><br> - Summarizes login count by user and hour.</p>
explanation = <p>This search highlights the hours when users most frequently log into Splunk by analyzing session activity on an hourly basis. Teams can identify peak usage periods, allowing them to align platform maintenance, support coverage, or resource scaling with actual user demand. It is especially valuable for performance tuning, capacity planning, and understanding behavior trends within various user groups.</p>
