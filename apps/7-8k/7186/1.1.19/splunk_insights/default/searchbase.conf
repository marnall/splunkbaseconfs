solution = <p>Provides visibility into network ingestion reliability by tracking TCP input errors. High counts may indicate misconfigured forwarders, connectivity drops, or other infrastructure issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate forwarders generating frequent errors.<br><b>2.</b> Validate network routes and firewall rules.<br><b>3.</b> Check for bandwidth saturation during peak ingest times.<br><b>4.</b> Engage network teams for packet loss analysis.<br><b>5.</b> Use forwarder monitoring to proactively detect issues.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (avg_daily_tcp_input_errors=0,1,avg_daily_tcp_input_errors<=5,2,avg_daily_tcp_input_errors<=15,3,avg_daily_tcp_input_errors<=30,4,avg_daily_tcp_input_errors>30,5)</code></pre><p>This SPL should be placed before the final <code>| table</code> command to classify severity levels for alerting or dashboards. <b>Thresholds should be tuned</b> to your environment's typical error volumes.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No TCP input errors.</li><li><b>Low (Severity 2):</b> 1–5 errors/day on average.</li><li><b>Medium (Severity 3):</b> 6–15 errors/day on average.</li><li><b>High (Severity 4):</b> 16–30 errors/day on average.</li><li><b>Critical (Severity 5):</b> More than 30 errors/day on average.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd component=TcpInputProc TERM(ERROR)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters internal logs for TCP input processing errors.<br><b>02</b> <code>| timechart partial=t fixedrange=t span=1d count as tcp_input_errors</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates errors into daily counts.<br><b>03</b> <code>| stats avg(tcp_input_errors) as avg_daily_tcp_input_errors</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates the average daily error count.<br><b>04</b> <code>| eval avg_daily_tcp_input_errors=round(avg_daily_tcp_input_errors, 2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Rounds the result for cleaner presentation.<br><b>05</b> <code>| eval severity_level = case (avg_daily_tcp_input_errors=0,1,avg_daily_tcp_input_errors<=5,2,avg_daily_tcp_input_errors<=15,3,avg_daily_tcp_input_errors<=30,4,avg_daily_tcp_input_errors>30,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assigns severity based on daily averages.<br><b>06</b> <code>| table avg_daily_tcp_input_errors severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Outputs final KPI and severity.</p>
explanation = <p>This search analyzes <b>_internal</b> logs for <b>ERROR</b> events generated by the <b>TcpInputProc</b> component, which handles incoming data streams. By aggregating these events into daily counts and calculating the average, it provides a measure of <b>network health</b> and <b>data pipeline reliability</b>.</p><p>Consistent or high averages may point to firewall issues, bandwidth constraints, misconfigured forwarders, or intermittent connectivity problems. For junior Splunkers, it demonstrates the value of using <b>TERM()</b> for efficient search filtering, <b>timechart</b> for trend aggregation, and <b>stats</b> for KPI derivation.</p>
quid = F16E9B17C930854B4477E1104861BFC7
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>No TCP input errors observed; data ingestion via TCP inputs is healthy.</p>
severity_low_text = <p>Low TCP input error rate; minor impact expected but continue monitoring.</p>
severity_medium_text = <p>Moderate TCP input errors; investigate receivers, network paths, and input configurations.</p>
severity_high_text = <p>High TCP input errors; ingestion reliability degraded, prioritize remediation.</p>
severity_critical_text = <p>Severe TCP input errors; data ingestion significantly impacted—immediate action required.</p>
description = <p>This search looks for any issues related to when the indexer has an issue receiving or interpreting a payload over the last business week & calculates a daily average. These errors can be due to bad SSL connections or corrupted forwarders or network misconfigruationt that prevents data from reaching Splunk in real-time. </p>
search = index=_internal sourcetype=splunkd component=TcpInputProc TERM(ERROR) \
| eval summary_id="summary_incoming_networking_errors" \
| timechart partial=t fixedrange=t span=1d count as tcp_input_errors values(event_message) as event_message \
| stats avg(tcp_input_errors) as avg_daily_tcp_input_errors values(event_message) as event_message \
| eval avg_daily_tcp_input_errors=round(avg_daily_tcp_input_errors, 2) \
| eval event_message = mvindex(event_message,0,9) \
| eval severity_level = case (avg_daily_tcp_input_errors<=50,1,avg_daily_tcp_input_errors<=75,2,avg_daily_tcp_input_errors<=100,3,avg_daily_tcp_input_errors<=150,4,avg_daily_tcp_input_errors>150,5) \
| table avg_daily_tcp_input_errors event_message severity_level \
| `ssef_handle_no_results(1,"The summary_incoming_networking_errors summary job completed successfully without identifying any issues, and everything is operating as expected.")`

