[ssef_scma_environment_splunk_crash]
search_name = Splunk Crashes
readonly = 1
target_component = Infra & Arch
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-14 13:49:14
category = Splunk
sub_category = Environment
tags = Environment,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 92E5460880095B21C6279EDB79192C15
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/Troubleshootingcrashes" target="_blank">Splunk Docs - Troubleshooting Splunk Crashes</a></li>\
<li><a href="https://community.splunk.com/t5/Splunk-Enterprise/How-to-diagnose-and-prevent-crashes-in-Splunk/m-p/524366" target="_blank">Splunk Answers - How to Diagnose and Prevent Crashes in Splunk</a></li>\
\
<li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/health" target="_blank">Splunkbase - Apps for Monitoring Splunk Health</a></li>\
</ul>
severity_normal_text = <br/><p>No splunkd crashes have been identified in the environment in the last 14 days.</p>
severity_high_text = <br/><p>Less than 5 splunkd crashes, or less, have been identified in the environment in the last 14 days.</p>
severity_critical_text = <br/><p>5 or more splunkd crashes have been identified in the environment in the last 14 days.</p>
description = <p>This check identifies any Splunk crash logs in the environment from the past 14 days. Identifying the number of times Splunk has crashed in a given time period is crucial for maximizing the platform's value by enabling proactive issue resolution and system optimization. Frequent crashes indicate underlying problems that can affect system stability, performance, and data integrity. By monitoring crash occurrences, customers can diagnose and address these issues promptly, ensuring reliable operation, minimizing downtime, and maintaining user confidence, which ultimately leads to a more efficient and effective use of the Splunk platform.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Critical:</strong> > 5 crashes detected.</li>\
<li><strong>High:</strong> < 5 crashes detected.</li>\
<li><strong>Normal:</strong> No crashes detected.</li>\
</ul>
search = index=_internal sourcetype=splunkd_crash_log NOT host IN (`ssef_cloud_stack`) \
| eval summary_id="ssef_scma_environment_splunk_crash" \
| rex "^\[build\s+(?<splunk_build>\w+)\]\s+(?<splunk_build_date>[^\n\r]+)" \
| rex "Crashing\sthread:\s+(?<crash_thread>\S+)" \
| rex "Cause:\s+(?<crash_cause>[^\n\r]+)" \
| rex field=crash_cause mode=sed "s/[^[:ascii:]]|\[|\]|\.//g" \
| search crash_thread=* \
| `ssef_instance_info(host)` \
| stats count AS crash_count_24h latest(_time) AS last_crash_time values(splunk_build) values(crash_thread) latest(name) as name latest(_time) as _time by label crash_cause \
| rename values(*) AS * \
| convert ctime(last_crash_time) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( crash_count_24h >= 5, critical, crash_count_24h >= 1, high, true(), normal ) \
| table _time label name splunk_build last_crash_time crash_count_24h crash_thread crash_cause severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_environment_splunk_crash summary job completed successfully without identifying any issues, and everything is operating as expected.")`

