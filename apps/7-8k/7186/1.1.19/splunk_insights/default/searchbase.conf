updated_author = akhamis
description = <p>Performs a <b>pre-flight validation</b> and initialization of required <b>CSV lookup tables</b> for the IS4S application framework. It ensures all supporting lookup files exist and are writable before dependent searches execute. This safeguards configuration integrity and prevents runtime failures caused by missing or uninitialized lookup assets.</p>
explanation = <p>This search validates and initializes all required CSV lookup tables that power configuration, inventory, governance, and metadata reporting across the environment. By proactively creating or refreshing lookup files, administrators reduce the risk of downstream searches failing due to missing assets or schema mismatches. The search acts as a control-plane health check for configuration state, especially useful after app deployment, upgrades, or migration activities. Platform engineers and Splunk administrators can use the results to confirm that foundational data stores are properly staged, ensuring consistent behavior across saved searches, dashboards, and automation workflows.</p>
execution_plan = <b>01</b> <code>| union [| makeresults ... | inputlookup ... | outputlookup ...]</code><br> - Iteratively initialize each required CSV lookup by appending and rewriting its structure to guarantee file presence.<br><b>02</b> <code>| stats count | eval lookup="..."</code><br> - Record validation status for each lookup to confirm successful initialization.<br><b>03</b> <code>| eval message="Pre-Flight Check..." , _time=now()</code><br> - Generate a standardized completion message and timestamp for operational visibility.<br><b>04</b> <code>| eval ... severity_level = if(num_records > 0, normal, normal)</code><br> - Assign a consistent normal severity to indicate non-risk validation behavior.<br><b>05</b> <code>| table _time lookup message num_records severity_level</code><br> - Present a concise summary confirming lookup readiness.</br>
solution = <p>This search confirms that all application lookup tables required for configuration tracking, governance reporting, and inventory correlation are properly initialized.</p><p><b>Suggested Actions</b><ul><li>Run this search after app deployment, upgrade, or migration to validate lookup integrity.</li><li>If any lookup fails to initialize, review file system permissions and Splunk app context settings.</li><li>Schedule this search as part of operational readiness or CI/CD validation workflows.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Enhance operational governance by correlating configuration state and lookup health into service-level KPIs.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Provides managed infrastructure and governance controls to support scalable configuration management.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Engage experts to optimize app lifecycle management, lookup governance, and deployment automation.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=lookup%20management" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps that enhance lookup lifecycle management, governance, and configuration auditing.</li></ul></p>
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=outputlookup" target="_blank">Splunk Docs: SplunkSearch for outputlookup</a><br>(provisionally validated) Reference documentation for managing and writing CSV lookup files.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=inputlookup" target="_blank">Splunk Docs: SplunkSearch for inputlookup</a><br>(provisionally validated) Learn how to read and validate lookup file content in searches.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=union%20command" target="_blank">Splunk Docs: SplunkSearch for union command</a><br>(provisionally validated) Understand how union combines multiple datasets in a single validation workflow.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=makeresults" target="_blank">Splunk Docs: SplunkSearch for makeresults</a><br>(provisionally validated) Documentation for generating placeholder events during initialization routines.</li><li><a href="https://help.splunk.com/en/search?q=%22csv%20lookup%22" target="_blank">Splunk Help: Search for "csv lookup"</a><br>(provisionally validated) Help site resources for CSV lookup configuration and troubleshooting.</li><li><a href="https://lantern.splunk.com/Search?q=%22configuration%20management%22" target="_blank">Lantern: Search for "configuration management"</a><br>(provisionally validated) Operational best practices related to configuration governance and app management.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(preflight_csv_table_init)` \
| fields _time source host lookup message num_records severity_level \
| stats latest(*) as * latest(_time) as _time by lookup \
| `ssef_severity_level_text(severity_level)` \
| sort severity_text\
| rename severity_text as Severity \
| convert ctime(_time) \
| table _time lookup message num_records Severity

[preflight_data_forwarding_check]
search_name = IS4S Server data Forwarding
readonly = 1
search_hidden = 1
version = 1.0.4
date_updated = 2025-7-9 15:5:31
category = IS4S
sub_category = Preflight Checks
tags = Preflight
dispatch_earliest_time = -4h@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = FFFF5E7E53857184D936AB44C00F1A62
updated_author = akhamis
description = <p>This Splunk preflight check checks the IS4S Server's data forwarding status.  If you are running the app in Splunk Cloud, please disregard this check, as it is not applicable in that environment.</p>
search = | `ssef_splunk_deployment` \
| appendcols \
    [| rest splunk_server=local `ssef_rest_timeout` /services/server/info \
    | fields splunk_server, isForwarding ] \
| filldown splunk_deployment \
| rename splunk_server as host \
| join host type=left \
    [| search index=_audit earliest=-4h@h \
        [| rest splunk_server=local `ssef_rest_timeout` /services/server/info f=host \
        | return host ] \
    | stats count as event_count by host \
    | fields host event_count ] \
| fillnull value=0 event_count \
| eval message = case ( isForwarding = 0, \
    "IS4S Server NOT Forwarding data! Ignore if this is a single instance. See this guide: https://docs.splunk.com/Documentation/Forwarder/latest/Forwarder/Configureforwardingwithoutputs.conf)", \
    event_count < 1,\
    "IS4S Server is unable to search it's own logs! check if indexer clustering is enabled.",\
    splunk_deployment="Cloud",\
    "Detected a Splunk Cloud deployment. This pre-flight check is only applicable to Splunk Enterprise customers.",\
    true(), "IS4S Server is Forwarding data, Event Count: " . event_count) \
| eval severity_level = if(splunk_deployment="Enterprise" AND (event_count < 1 OR isForwarding = 0), 3, 0) \
| fields splunk_deployment severity_level message isForwarding event_count

[preflight_duplicates_check]
search_name = Duplicate Detection for Searchbase and Saved Searches
readonly = 1
search_hidden = 1
version = 1.0.2
date_updated = 2025-2-15 11:49:49
category = IS4S
sub_category = Preflight Checks
tags = Preflight
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 346221B87DB647C01FA45278E7039D92
updated_author = akhamis
description = <p>This Splunk preflight check is designed to identify any duplicate entries within your Searchbase and Saved Searches. By running this check, you can ensure that your search configurations are streamlined and free of redundancies, which helps maintain optimal performance and organization.</p>
search = | rest splunk_server=local `ssef_rest_timeout` /servicesNS/-/-/configs/conf-searchbase \
| rename eai:acl.app as app , eai:acl.removable as acl_removable \
| fields app title search_name dispatch_context search_origin \
| stats values(app) as searchbase_apps by title \
| join title type=left \
    [| rest splunk_server=local `ssef_rest_timeout` /servicesNS/-/-/saved/searches \
    | rename eai:acl.app as app , eai:acl.removable as acl_removable \
    | fields app title \
    | stats count as duplicates_found values(app) as savedsearches_apps by title ] \
| where isnotnull(duplicates_found) \
| appendpipe \
    [| makeresults \
    | eval fill=0 ] \
| eval message=if(duplicates_found > 0, "Duplicate Searchbase entries in your saved searches. To ensure optimal performance and organization, it may be helpful to review and consolidate these searches.", "No duplicate Searchbase entries in your saved searches. Everything appears to be in order.") \
| eval severity_level = if(duplicates_found > 0, 2, 0) \
| table title duplicates_found searchbase_apps savedsearches_apps message severity_level \
| rename title as "Search Name", duplicates_found as "# of Duplicates", searchbase_apps as "Searchbase Apps" , savedsearches_apps as "Savedsearches Apps"

