[identity_lookups]
search_name = A&I Identity Lookups
readonly = 1
ssef_cron = weekly
target_component = Assets & Identities
version = 1.0.7
date_updated = 2025-1-24 19:54:3
category = ES Adoption
sub_category = Security
tags = Assets and Identities,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 363778F4A6BC83D40D29A79285644CEA
search_author = dluxton
severity_normal_text = <br/><p>All of the below criteria has been met</p>\
<ul>\
<li>There are more than 50 identities</li>\
<li>More than 10 categories</li>\
<li>More than 5 business units</li>\
<li>Priorities are set</li>\
<li>Each identity 3 or more identifying attributes (i.e. username, UPN, email, objectID, objectSID, Downlevel domain name)</li>\
</ul>
severity_low_text = <br/><p>One or more of the below criteria has been met:</p>\
<ul>\
<li>There are less than 50 identities</li>\
<li>Fewer than 11 categories</li>\
<li><span style="color: rgb(60,68,77);background-color: rgb(255,255,255);font-size: 14px;font-family: Splunk Platform Sans", "Proxima Nova", Roboto, Droid, "Helvetica Neue", Helvetica, Arial, sans-serif;">Fewer than 6</span> business units</li>\
</ul>
severity_medium_text = <br/><p>Non-standard prioritisation of identities</p>\
<p>Majority of users should be a medium priority, fewer critical users than high users.</p>
severity_high_text = <br/><p>Incomplete identity data presented. One or more of the below criteria was met.</p>\
<ul>\
<li>Unused priorities medium,high,critical</li>\
<li>Identities missing priority</li>\
<li>No categories assigned</li>\
<li>No business units assigned</li>\
<li>An average of less than 3 identifying attributes per identity (i.e. username, UPN, email, objectID, objectSID, Downlevel domain name)</li>\
</ul>
severity_critical_text = <br/><p>No identity records found</p>
description = <p>The identities lookup enriches raw logs where the user or src_user field contain a value which matches the identity field in the lookup.</p>
search = | inputlookup identity_lookup_expanded \
| eval summary_id="identity_lookups" \
| eval identity_identifier_count=mvcount(identity), identity_md5=md5(mvjoin(identity,"")) \
| fillnull priority value="undefined" \
| stats count as totalIdentityCount, avg(identity_identifier_count) as identity_identifier_avg_count, values(category) as categories, dc(category) as categoryCount, values(bunit) as bunit, dc(bunit) as bunitCount, count(eval(if(priority="critical",identity_md5,null()))) as pcount_critical, count(eval(if(priority="high",identity_md5,null()))) as pcount_high, count(eval(if(priority="medium",identity_md5,null()))) as pcount_medium, count(eval(if(priority="low",identity_md5,null()))) as pcount_low, count(eval(if(priority="undefined",identity_md5,null()))) as pcount_undefined \
| eval severity_level = case (totalIdentityCount=0,5,\
    categoryCount=0 OR bunitCount=0 OR identity_identifier_avg_count<3 OR pcount_undefined>0,4,\
    (pcount_low>pcount_medium) OR ((pcount_high+pcount_critical)>pcount_medium) OR pcount_critical>pcount_high,3,\
    categoryCount>10 AND bunitCount>5 AND totalIdentityCount>50,1,\
    true(),2) \
| table bunit bunitCount categories categoryCount identity_identifier_avg_count pcount_critical pcount_high pcount_low pcount_medium pcount_undefined severity_level totalIdentityCount \
| `ssef_handle_no_results(1,"The identity_lookups summary job completed successfully without identifying any issues, and everything is operating as expected.")`

