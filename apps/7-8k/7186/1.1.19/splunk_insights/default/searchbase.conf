description = <p>This check verifies whether the HTTP Event Collector (HEC) has been utilized in the environment within the past 7 days, supporting the planning for PS (Professional Services) migration. Monitoring HEC usage helps ensure that data ingestion via HTTP is accounted for and properly integrated into the migration strategy, maintaining data continuity and system efficiency during transitions.</p>\
