[ssef_scma_search_skipped_searches]
search_name = Skipped Search Metrics
readonly = 1
target_component = Search & Visualization
version = 2.0
date_created = 2022-09-14
date_updated = 2026-2-14 13:45:18
category = Splunk
sub_category = Search
tags = _internal,Scheduler,Skipped,Search
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = B52B2A175CAC3BD3B45FEF47DEF5CF6A
updated_author = khutchinson
severity_normal_text = <br/><p>This is an acceptable percentage of skipped searches.</p>
severity_low_text = <br/><p>This is an indicator that the number of skipped searches is low, but should be investigated or monitored to ensure that the percentage does not rize.</p>
severity_medium_text = <br/><p>This is an indicator that the number of skipped searches is higher than expected in a tuned environment.  It should be investigated to ensure that the percentage does not rize.</p>
severity_high_text = <br/><p>This is an indicator that the number of skipped searches is very high.  It should be investigated immediately to ensure that you are successfully executing important Splunk searches.</p>
description = <p>Calculates the <b>percentage of skipped scheduled searches</b> across non-default apps using <b>scheduler.log</b>. Highlights workload imbalance and <b>scheduler contention</b> impacting execution reliability. Supports proactive <b>capacity and governance</b> tuning.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul><li><strong>High:</strong> Percent skipped is over 50%</li>\
<li><strong>Medium:</strong> Percent skipped is between 25% and 49%.</li>\
<li><strong>Low:</strong> Percent skipped is less than 25%.</li>\
<li><strong>Normal:</strong> 0% skipped.</li></ul>
explanation = <p>This search evaluates scheduled search activity from scheduler.log, excluding acceleration workloads and default apps, to determine the total number of searches and how many were skipped. It aggregates by host and app context, enriches results with instance metadata, and calculates the percentage of skipped executions. The pct_skipped metric provides normalized visibility into scheduler health relative to total workload volume. Sustained increases in skipped percentages typically indicate concurrency saturation, excessive cron density, or inefficient saved searches requiring optimization.</p>
execution_plan = <b>01</b> <code>index=_internal source=*scheduler.log ...</code><br> - Retrieve scheduler events while excluding acceleration jobs and default apps.<br><b>02</b> <code>| rex ...</code><br> - Extract app context from raw scheduler events.<br><b>03</b> <code>| stats ...</code><br> - Calculate total searches and skipped searches per host/app context.<br><b>04</b> <code>| `ssef_instance_info(host)`</code><br> - Enrich with instance label metadata for tier-level aggregation.<br><b>05</b> <code>| eval pct_skipped ... | eval severity_level=case(...)</code><br> - Compute skip percentage and classify severity thresholds.
solution = <p>This KPI surfaces normalized skipped-search behavior to help identify structural scheduler overload before it affects reliability and SLAs.</p><p><b>Suggested Actions</b>: Review high-frequency saved searches, optimize inefficient SPL, stagger cron schedules, reduce unnecessary frequency, and validate workload management policies. Persistent elevated pct_skipped across labels may indicate broader capacity alignment issues.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(pct_skipped&gt;50,4,pct_skipped&gt;25,3,pct_skipped&gt;0,2,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Managed scaling and governance capabilities when sustained scheduler contention impacts reliability.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utility Apps</a><br>Administrative and troubleshooting utilities that assist with scheduler diagnostics and workload governance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=skipped%20scheduled%20searches" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps focused on scheduler health monitoring and search workload optimization.</li></ul></p>
related_info = <ul><li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Enterprise/Reducing_skipped_searches_in_Splunk_Enterprise" target="_blank">Check out Splunk Lantern for more information on skipped searches.</a></li><li>Blogs: Tips N Tricks:  <a href="https://www.splunk.com/en_us/blog/tips-and-tricks/are-you-skipping-please-read.html" target="_blank">Are You Skipping? Please Read!</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: SPL Command Quick Reference</a><br>Reference for rex, stats, eval, and aggregation commands used in this KPI.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search Reference</a><br>Core SPL documentation for optimizing scheduled searches.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Splunk Free Courses</a><br>Training resources to improve SPL efficiency and reduce skipped workload conditions.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunk Apps: IT Operations Management Apps</a><br>Operations monitoring apps that complement scheduler health and workload governance visibility.</li></ul>
viz_options = { "count":100 }
search = index=_internal source=*scheduler.log sourcetype=scheduler SavedSplunker `ssef_host_excl` NOT search_type IN (*_acceleration) NOT app IN (`ssef_default_apps`) \
| eval summary_id="ssef_scma_search_skipped_searches" \
| rex "\,\s+app\=\"(?<app_context>\S+)\"" \
| search NOT app_context IN (`ssef_default_apps`,splunk_insights) \
| stats dc(user) AS user values(reason) AS reason count AS total_searches count(eval(status="skipped")) AS search_skip_count latest(_time) as _time by host app_context \
| `ssef_instance_info(host)` \
| stats sum(user) AS dc_user values(reason) AS reason sum(total_searches) AS total_searches sum(search_skip_count) AS search_skip_count latest(name) as name latest(_time) as _time by label app_context \
| eval pct_skipped=round(search_skip_count/total_searches * 100, 0) \
| eval reason=replace(reason, "[:=]", " ") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( pct_skipped>0 AND pct_skipped<=25, low, pct_skipped>25 AND pct_skipped<=50, medium, pct_skipped>50, high, true(), normal ) \
| table _time label name app_context dc_user pct_skipped search_skip_count total_searches reason severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_skipped_searches summary job completed successfully without identifying any issues, and everything is operating as expected.")`

