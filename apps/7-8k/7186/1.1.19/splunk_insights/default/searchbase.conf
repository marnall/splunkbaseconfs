updated_author = akhamis
description = <p>This Splunk preflight check evaluates the server's resource requirements. We are specifically verifying the presence of at least 12 CPU cores and 16 GB of RAM to ensure optimal performance.  If you are running the app in Splunk Cloud, please disregard this check, as it is not applicable in that environment.</p>
search = | `ssef_splunk_deployment` \
| appendcols \
    [| rest splunk_server=local `ssef_rest_timeout` /servicesNS/-/-/server/info \
    | fields splunk_server numberOfVirtualCores numberOfCores physicalMemoryMB \
    | eval cpu_core_count = if(isnotnull(numberOfVirtualCores), numberOfVirtualCores, numberOfCores) \
    | eval physical_memory_gb = round(physicalMemoryMB / 1024, 0) ] \
| filldown splunk_deployment \
| eval message = case (\
    splunk_deployment="Enterprise" AND (cpu_core_count < 12 OR physical_memory_gb < 16),\
    "This server DOES NOT meet the minimum requirements: it currently has " . cpu_core_count . " CPU cores and " . physical_memory_gb . " GB of RAM.",\
    splunk_deployment="Enterprise" AND (cpu_core_count >= 12 AND physical_memory_gb >= 16),\
    "This server meets the minimum requirements: it has " . cpu_core_count . " CPU cores and " . physical_memory_gb . " GB of RAM.",\
    splunk_deployment="Cloud",\
    "Detected a Splunk Cloud deployment. This pre-flight check is only applicable to Splunk Enterprise customers.",\
    true(), "Error detecting the Splunk deployment type." ) \
| eval severity_level = if(splunk_deployment="Enterprise" AND (cpu_core_count < 12 OR physical_memory_gb < 16), 3, 0) \
| fields splunk_deployment severity_level message

