[ssef_scma_search_search_concurrency]
search_name = Concurrency Reached
readonly = 1
target_component = Search & Visualization
version = 2.0
date_created = 2022-09-14
date_updated = 2026-2-9 18:32:36
category = Splunk
sub_category = Search
tags = Concurrency,Search,Performance,Introspection
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 19DADA524D79AF5C1D7C87E8D52B53EB
updated_author = khutchinson
severity_normal_text = <br/><p>The evaluation shows your setup complies with the limits outlined in the Splunk Cloud Service Description, making you eligible for migration.</p>
severity_medium_text = <br/><p>Over the last 1 days, the average daily search concurrency has met or surpassed 1000. Such high concurrency levels can burden system resources, possibly degrading search functionality and system responsiveness. It's recommended to reassess and refine search approaches, which may include distributing search executions more evenly, enhancing search efficiency, or expanding search head capacity. These measures can help control concurrency levels and preserve optimal system performance.</p>
description = <p>Measures daily <b>search concurrency</b> by counting distinct SIDs per <b>search head</b> from <b>_introspection</b> telemetry. Aggregates daily averages, p95, and max to highlight overall concurrency pressure and search-head scale. Helps validate whether the environment’s <b>compute concurrency</b> profile is trending toward saturation.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
explanation = <p>This search uses Splunk’s internal resource-usage telemetry to estimate how many searches run concurrently across your search-head tier, then rolls that up into daily average, p95, and max concurrency. Concurrency is a leading indicator of scheduler contention, CPU pressure, and user experience degradation, especially when bursts push the search tier beyond what the deployment architecture was sized to handle. Tracking p95 and max alongside averages helps distinguish steady-state demand from peak-driven incidents that impact SLAs and on-call load. The output supports capacity planning decisions (scale up/out, workload governance, and scheduling policies) by quantifying the real concurrency envelope your search heads must sustain.</p>
execution_plan = <b>01</b> <code>| tstats ... WHERE index=_introspection ...</code><br> - Pull per-process Search Head telemetry from introspection summaries to capture search session identifiers (SIDs) and search_head identity.<br><b>02</b> <code>| eval/rename ... | stats dc(sid) AS concurrency ...</code><br> - Normalize search_head naming and calculate concurrent searches as distinct SID counts per 30s slice and search head.<br><b>03</b> <code>| bin span=1d ... | stats ... by search_head</code><br> - Roll up to daily granularity and compute average, p95, and max concurrency per search head.<br><b>04</b> <code>| stats ...</code><br> - Collapse per-instance metrics into environment totals for daily average/p95/max concurrency across the tier.<br><b>05</b> <code>| eval ... severity_level ... | table ...</code><br> - Round totals and assign a severity level to support dashboard coloring and alert routing.
solution = <p>This KPI summarizes total daily search concurrency across the search-head tier and highlights whether average concurrency is reaching levels that commonly correlate with contention and degraded search experience.</p><p><b>Suggested Actions</b>: Review peak-driving workloads during high p95/max periods, validate scheduler and workload controls (e.g., limits/quotas), and use the per-search-head breakdown to identify uneven distribution or undersized nodes.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(sum_total_concurrency_avg>=4000,5,sum_total_concurrency_avg>=2000,4,sum_total_concurrency_avg>=1000,3,sum_total_concurrency_avg>=500,2,true(),1)</code></pre><p>This SPL can be appended near the end of the pipeline to normalize severity for alerting and dashboard visualization; calibrate thresholds to match your baseline and business peak windows.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> Average concurrency is within expected operating range for the current search-head tier.</li><li><b>Low (Severity 2):</b> Average concurrency is elevated and may warrant workload review and scheduling hygiene.</li><li><b>Medium (Severity 3):</b> Average concurrency suggests meaningful contention risk; validate workload policies and search-head sizing.</li><li><b>High (Severity 4):</b> Average concurrency is approaching saturation; prioritize capacity actions and peak workload controls.</li><li><b>Critical (Severity 5):</b> Average concurrency is at a level commonly associated with chronic contention and user-impact; treat as an urgent capacity and governance issue.</li></ul><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Managed Splunk platform options and scaling patterns relevant when concurrency growth indicates compute pressure on the search tier.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Admin & Utility Apps</a><br>Discover administration and troubleshooting utilities that can help validate search-tier health and operational governance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=search%20concurrency" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Find apps and add-ons related to search performance, workload governance, and concurrency troubleshooting.</li></ul></p>
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Service_limits_and_constraints" target="_blank">https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Service_limits_and_constraints</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.2.1/Capacity/Accommodatemanysimultaneoussearches" target="_blank">How concurrent users and searches impact performance</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: SPL Command Quick Reference</a><br>Quick lookup for SPL commands used in this pipeline (tstats, eval, stats, bin, perc95) and related usage notes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search Reference</a><br>Core SPL reference documentation for building, validating, and tuning searches like this concurrency KPI.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/understanding-spl-syntax" target="_blank">Splunk Help: Understanding SPL Syntax</a><br>SPL structure guidance that helps keep KPI searches consistent, maintainable, and easier to troubleshoot.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Splunk Blogs: SPL Cheat Sheet</a><br>Practical SPL patterns and command examples for faster iteration while tuning concurrency and performance searches.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/time-format-variables-and-modifiers/date-and-time-format-variables" target="_blank">Splunk Help: Time Format Variables</a><br>Reference for time handling that’s relevant to binning and daily rollups used by this KPI.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Splunk Free Courses</a><br>Enablement resources for SPL fundamentals and performance-aware searching to reduce avoidable concurrency pressure.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunk Apps: IT Operations Management Apps</a><br>Explore monitoring and operations apps that can complement search-tier KPIs with broader service health context.</li></ul>
viz_options = { "count":100 }
search = | tstats summariesonly=true Values(data.search_props.search_head) As search_head WHERE index=_introspection sourcetype::splunk_resource_usage component::PerProcess data.search_props.sid::* by _time span=30s host data.search_props.sid \
| eval summary_id="ssef_scma_search_search_concurrency" \
| rename data.search_props.sid as sid \
| eval search_head=lower(coalesce(search_head,host)) \
| stats dc(sid) AS concurrency by _time search_head \
| bin span=1d _time \
| stats dc(search_head) AS dc_instance avg(concurrency) AS average_daily_concurrency perc95(concurrency) AS perc95_daily_concurrency max(concurrency) AS max_daily_concurrency latest(_time) as _time by search_head \
| stats max(dc_instance) AS dc_instance sum(average_daily_concurrency) AS sum_total_concurrency_avg sum(perc95_daily_concurrency) AS sum_total_concurrency_perc95 sum(max_daily_concurrency) AS sum_total_concurrency_max latest(_time) as _time \
| eval sum_total_concurrency_avg=round(sum_total_concurrency_avg,0), sum_total_concurrency_perc95=round(sum_total_concurrency_perc95,0), sum_total_concurrency_max=round(sum_total_concurrency_max,0) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( sum_total_concurrency_avg >= 1000, medium, true(), normal ) \
| table _time dc_instance sum_total_concurrency_avg sum_total_concurrency_max sum_total_concurrency_perc95 severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_search_concurrency summary job completed successfully without identifying any issues, and everything is operating as expected.")`

