# explanation = <p>This search focuses on <b>_introspection</b> index events from the <b>splunk_disk_objects</b> sourcetype, specifically the <b>Partitions</b> component. It measures disk usage by calculating free and used space in gigabytes and percentage utilization. The data is aggregated every 10 minutes for precision.</p><p>The search flags hosts exceeding <b>90% usage</b> for more than 504 intervals (approx. 3.5 days of 10-minute samples) in the search period. This persistent high usage threshold helps detect critical storage conditions that can affect indexing, clustering, and data retention.</p><p>For junior Splunkers, this illustrates how to combine <b>eval</b> math functions, conditional field selection, time bucketing, and filtering logic to derive actionable infrastructure metrics from internal monitoring data.</p>
