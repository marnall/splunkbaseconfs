description = <p>This Splunk query retrieves information about SAML groups from the Splunk server and performs various transformations and calculations on the data.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/admin/SAML-groups  \
| eval summary_id="ssef_admin_saml_groups" \
| rename eai:acl.* AS * \
| rename eai:* AS * \
| eval Splunk_Instance = lower(splunk_server) \
| `ssef_instance_info(Splunk_Instance)` \
| eval title=lower(title) \
| stats \
    VALUES(Splunk_Instance) AS Splunk_Instance\
    VALUES(role) AS role\
    VALUES(roles) AS roles\
    LATEST(name) AS name\
    by label, title \
| eval _time = now() \
| foreach role, Splunk_Instance, roles \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| appendpipe \
    [ stats count \
    | where count=0 \
    | fields - count \
    | eval signature="This check did not produce results"] \
| eval _time=if(isnull(_time), now(), _time) \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| eval is4s="summary" \
| append \
    [| search `ssef_summary(ssef_admin_saml_groups)` earliest=-1d@d \
    | foreach Splunk_Instance, role, roles \
        [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
    | bin _time Span=1d \
    | eval title=lower(title) \
    | stats \
        VALUES(roles) AS roles\
        VALUES(Splunk_Instance) AS Splunk_Instance\
        VALUES(role) AS role \
        LATEST(name) AS name\
        by _time, label, title \
    | table _time,label,name,role,Splunk_Instance,title,roles \
    | outputlookup ssef_admin_saml_groups_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | stats count as num_items \
    | eval is4s="lookup" ] \
| where is4s="summary" \
| table _time,label,name,role,Splunk_Instance,title,roles,signature,severity_level \
| `ssef_handle_no_results(1,"The ssef_admin_saml_groups summary job completed successfully without identifying any issues, and everything is operating as expected.")`

