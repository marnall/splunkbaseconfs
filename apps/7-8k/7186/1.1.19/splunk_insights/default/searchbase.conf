search_author = dluxton
updated_author = akhamis
related_info = <p>Steps to Review<br>Ensure the search returns results <br>Ensure there are an accurate number of identities being returned <br>(if the total count of identities is considerably higher or lower than the total number of users + devices this can be indicative of an issue with A&amp;I configuration)<br>Identities until you find out why - i.e. merging issues combining identities which shouldn't be combined, random strings added as identities<br>Remediation for these issues is out of scope for this review<br>Ensure the bunit and category fields are being populated<br>If the avg_num_ofIdentityObjects_per_identity is low (3 or below) the customer may be missing other components of the identity - note computer accounts will skew this figure. Take a look at the results from search 2 and check the identity field (of user accounts) contains the following<br>sAMAccountName (username)<br>UPN<br>Email Address<br>SID (useful where XMLWineventLog is in use)<br>Downlevel Domain Name (DOMAIN\username)</p>
description = <p>The identities lookup enriches raw logs where the user or src_user field contain a value which matches the identity field in the lookup.</p>
search = `ssef_summary(aandi_correlation_setup)` \
| eval label=if(isnull(label) OR label="", host, label) \
| fields _time label asset_match_count description identity_match_count severity_level stash_asset_matching_enabled stash_identity_matching_enabled titleCount titles \
| stats latest(*) as * latest(_time) as _time by label \
| `ssef_severity_level_text(severity_level)` \
| sort - severity_level \
| rename severity_text as Severity \
| convert ctime(_time) \
| table _time label asset_match_count description identity_match_count stash_asset_matching_enabled stash_identity_matching_enabled titleCount titles Severity

[aandi_custom_lookups]
search_name = A&I Custom Lookups
readonly = 1
ssef_cron = weekly
target_component = Assets & Identities
version = 1.0.8
date_updated = 2025-11-10 15:10:54
category = ES Adoption
sub_category = Security
tags = Assets and Identities,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 68936D1EB92990083957319C56AB0922
search_author = dluxton
updated_author = akhamis
related_info = <p>Review the full list of asset &amp; identity helper apps via the <a href="https://rba.community/apps/asset-identity/sa-admon/" target="_blank">RBA github page</a></p>\
<p></p>
severity_normal_text = <br/><p>There are more than 1 custom asset and identity lookups enabled</p>
severity_medium_text = <br/><p>At least one of the following criteria has been met:</p>\
<ul>\
<li>Only 1 custom asset lookups have been configured</li>\
<li><span style="color: rgb(60,68,77);background-color: rgb(255,255,255);font-size: 14px;font-family: Splunk Platform Sans", "Proxima Nova", Roboto, Droid, "Helvetica Neue", Helvetica, Arial, sans-serif;">Only 1 c</span>ustom identity lookups have been configured</li>\
</ul>
severity_high_text = <br/><p>One of the following criteria has been met:</p>\
<ul>\
<li>0 Custom asset lookups have been configured</li>\
<li>0 custom identity lookups have been configured</li>\
</ul>
severity_critical_text = <br/><p>Both of the following criteria have been met:</p>\
<ul>\
<li>0 Custom asset lookups <span style="color: rgb(60,68,77);background-color: rgb(255,255,255);font-size: 14px;font-family: Splunk Platform Sans", "Proxima Nova", Roboto, Droid, "Helvetica Neue", Helvetica, Arial, sans-serif;">have been configured</span></li>\
<li>0 custom identity lookups have been configured</li>\
</ul>
description = <p>Multiple asset and identitiy lookups can be added to the A&amp;I framework and ES will handle the merging of records.</p>\
<p>Avoid using single long and complex Splunk searches to merge multiple datasources together and leverage the functionality of the ES framework instead.</p>
search = `ssef_summary(ssef_data_inputs)` disabled=0 NOT title IN (administrative_identities,demo_identities,static_identities,demo_assets,static_assets) type=identity_manager \
| eval summary_id="aandi_custom_lookups" \
| fields _time, label, app, title, disabled, sharing, author, type, description, source_name, sourcetype_name, index_name, location, acceleration, whitelist, blacklist, crcSalt, interval, updated, acl_removable, connection_host, duration, endtime, exclude, group, host_resolved, id_field, host_name, path, port, queue, table, target \
| stats latest(*) as * latest(_time) as _time by label, app, title \
| stats dc(eval(if(target="identity",title,null()))) as custom_identity_lookup_count values(eval(if(target="identity",title,null()))) as custom_identity_lookups dc(eval(if(target="asset",title,null()))) as custom_asset_lookup_count values(eval(if(target="asset",title,null()))) as custom_asset_lookups by label \
| eval severity_level = case ((custom_identity_lookup_count=0 AND custom_asset_lookup_count=0),5,(custom_identity_lookup_count=0 OR custom_asset_lookup_count=0),4,custom_asset_lookup_count>1 AND custom_identity_lookup_count>1,1,true(),3) \
| table label custom_identity_lookup_count custom_identity_lookups custom_asset_lookup_count custom_asset_lookups severity_level \
| `ssef_handle_no_results(1,"The aandi_custom_lookups summary job completed successfully without identifying any issues, and everything is operating as expected.")`

