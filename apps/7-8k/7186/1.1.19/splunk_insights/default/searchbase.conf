description = <p>Identifies <b>scheduler execution errors</b> from <b>_internal</b> logs and attributes them to app, author, and saved search. Highlights reliability risks in scheduled search execution. Supports <b>troubleshooting</b> and governance remediation.</p>
explanation = <p>This search analyzes scheduler ERROR events from _internal logs (excluding Splunk Cloud control hosts) and extracts author, app, and saved search identifiers from savedsearch_id. It enriches results with instance metadata and aggregates execution error counts per label, app, and author. Frequent execution errors typically indicate SPL syntax issues, missing data sources, permission problems, macro failures, or dependency misalignment. Monitoring this KPI helps ensure scheduled search reliability and prevents silent degradation of reporting and alerting workflows.</p>
execution_plan = <b>01</b> <code>index=_internal sourcetype=scheduler log_level=ERROR</code><br> - Retrieve scheduler execution errors while excluding cloud control-plane hosts.<br><b>02</b> <code>| rex field=savedsearch_id ...</code><br> - Extract author, app, and saved search identifiers from scheduler metadata.<br><b>03</b> <code>| `ssef_instance_info(host)`</code><br> - Enrich results with instance label metadata.<br><b>04</b> <code>| stats values(message) count by label app author savedsearch_name</code><br> - Aggregate execution errors and associated messages per saved search.
solution = <p>Scheduler execution errors can silently degrade reporting, alerting, and operational workflows.</p><p><b>Suggested Actions</b>: Review failing saved searches for SPL errors, validate macros and lookups, confirm index and data availability, verify permissions for the author context, and ensure dependent knowledge objects are intact. Persistent errors in specific apps may indicate configuration drift or deployment inconsistencies.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(num_exec_errors&gt;50,5,num_exec_errors&gt;20,4,num_exec_errors&gt;5,3,num_exec_errors&gt;0,2,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-observability-cloud.html" target="_blank">Products: Splunk Observability Cloud</a><br>Enhance visibility into operational reliability and search execution performance.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utility Apps</a><br>Discover troubleshooting and administrative tools that assist with scheduler diagnostics.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=scheduler%20errors" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps focused on monitoring scheduler health and search execution reliability.</li></ul></p>
viz_options = { "count":100 }
search = index=_internal sourcetype=scheduler log_level=ERROR host!="c0m1-*.splunkcloud.com" \
| fields _time host savedsearch_id message \
| rex field=savedsearch_id "(?<author>[^;]+);(?<app>[^;]+);(?<savedsearch_name>.+)" \
| `ssef_instance_info(host)` \
| eval author=if(author="nobody", "splunk-system-user", author) \
| stats values(message) as messages count as num_exec_errors by label app author savedsearch_name \
| table label app author savedsearch_name num_exec_errors messages \
| sort - num_exec_errors

