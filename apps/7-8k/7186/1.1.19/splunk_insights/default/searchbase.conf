category = Splunk
sub_category = Data Model Acceleration
tags = Data Models,ES Adoption,Environment,Summary
solution = <p>Administrators gain crucial insights into the performance health of their data models.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor data model acceleration trends regularly.<br><b>2.</b> Investigate any flagged errors immediately.<br><b>3.</b> Use this search output in operational dashboards.<br><b>4.</b> Adjust data model configurations based on insights.<br><b>5.</b> Regularly update summarization processes.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (isnotnull(last_error),critical,isnull(average_time),high)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <br/><b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> <i>No notable issues in data model acceleration.</i></li><li><b>Low (Severity 2):</b> <i>Minor performance issues reported.</i></li><li><b>Medium (Severity 3):</b> <i>Moderate issues affecting performance.</i></li><li><b>High (Severity 4):</b> <i>Critical issues reported, requires immediate attention.</i></li><li><b>Critical (Severity 5):</b> <i>Severe errors detected, immediate intervention required.</i></li></ul>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| rest /servicesNS/-/-/admin/summarization by_tstats=t splunk_server=local</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve summarization data from the Splunk REST API<br><b>02</b> <code>| search title = tstats:DM_* </code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter the results to only include data models<br><b>03</b> <code>| fields title eai:acl.app...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Limit output to relevant fields for review<br>
explanation = <p>This search provides deeper visibility into the performance of data model acceleration, focusing specifically on key metrics related to summarization processes. By integrating these insights, administrators can identify <b>performance bottlenecks</b>, ensure data integrity, and proactively address any potential issues. As a result, this search is vital for maintaining the overall health of Splunk deployments and supporting operational efficiency.</p><p>The SPL employs a variety of commands, like <b>rest</b> to retrieve main data, <b>fields</b> to select relevant metrics, and <b>eval</b> for generating new calculations. These functions combine to create a comprehensive picture of data model performance, teaching users the importance of focused data extraction and analyses.</p><p>Junior Splunkers will benefit from understanding how to leverage the <b>rename</b> command for clear output and the <b>eval</b> function for dynamic value creation. This search emphasizes the critical role of proper metric monitoring in data model effectiveness.</p>
quid = 74224EE07DAE9C40382E808C278DA59E
search_author = Splunk Searchbase Assistant
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/Understandingdatamodelacceleration" target="_blank">Splunk Docs: Understanding Data Model Acceleration</a><br>Overview of data model acceleration best practices.</li><li><a href="https://community.splunk.com/t5/Knowledge-Base/What-is-data-model-acceleration-in-Splunk/ta-p/499207" target="_blank">Splunk Community: What is Data Model Acceleration in Splunk?</a><br>Detailed explanation of data model acceleration.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/Acceleratedatamodels" target="_blank">Splunk Docs: Accelerating Data Models</a><br>Guidance on effectively accelerating data models.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Security_Essentials" target="_blank">Lantern: Getting Started with Splunk Security Essentials</a><br>A resource for enhancing Splunk security capabilities.</li></ul>
severity_normal_text = <p>No notable issues in data model acceleration.</p>
severity_low_text = <p>Minor performance issues reported.</p>
severity_medium_text = <p>Moderate issues affecting performance.</p>
severity_high_text = <p>Critical issues reported, requires immediate attention.</p>
severity_critical_text = <p>Severe errors detected, immediate intervention required.</p>
description = <p>This Splunk search string provides essential data for monitoring and optimizing the performance of accelerated data models. It leverages the summarization endpoint to gather detailed metrics, which are crucial for tracking acceleration efficiency and identifying potential issues within your Splunk environment. This data is particularly valuable for comprehensive operational oversight, including its use in dashboards like the CIM audit dashboard in Splunk Enterprise Security (ES).</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/admin/summarization by_tstats=t \
| eval summary_id="ssef_admin_summarization_endpoints" \
| search title = tstats:DM_* \
| fields title eai:acl.app splunk_server summary.average_time summary.buckets summary.size summary.complete summary.is_inprogress summary.last_error summary.p90 summary.time_range \
| rename summary.* as * eai:acl.app as app \
| eval title = replace(title, "tstats:DM_", "") \
| eval title = replace(title, app."_", "") \
| `ssef_instance_info(splunk_server)` \
| eval _time = now() \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(_time), normal, low) \
| table _time label name role app title average_time buckets complete is_inprogress last_error p90 size time_range severity_level \
| `ssef_handle_no_results(1,"The ssef_admin_summarization_endpoints summary job completed successfully without identifying any issues, and everything is operating as expected.")`

