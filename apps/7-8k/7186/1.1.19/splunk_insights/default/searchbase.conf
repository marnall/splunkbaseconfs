quid = 055BD4EE654A677D3F933DEEA8E90F12
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>License utilization based on the "Ingest" licensing model in Splunk, aggregated in 24 hour time slices.<br><br></p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>It serves as a crucial indicator of how effectively users are leveraging the Splunk platform. Efficient license utilization reflects strategic resource management, alignment with business goals, and proactive scalability and cost management. Regular monitoring and optimization of this metric are essential to maximize the value derived from Splunk investments. <br><br></p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>Tracking this KPI <em>weekly</em>, <em>monthly</em>, <em>quarterly</em>, and <em>yearly</em> is recommended.</p>
search = | `ssef_license_data` \
| eval summary_id="License_Utilization_Export" \
| stats sum(License_Usage_GB) as License_Usage_GB min(stacksz_gb) as stacksz_gb by _time \
| eval perc_usage = (License_Usage_GB / stacksz_gb) * 100 \
| timechart partial=t fixedrange=t eval(round(avg(perc_usage),2)) as kpi_value span=1d  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "License Utilization" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

