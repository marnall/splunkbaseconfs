[# of Daily Jobs]
search_name = # of Daily Jobs
readonly = 1
diagnostic_searches = ssef_saved_searches
version = 1.0.6
date_updated = 2024-5-17 17:31:24
category = Splunk
sub_category = Jobs
tags = Jobs,KPIs,Linked
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = FA85316F0C90A0BEA9BBE57E06E9BD4F
updated_author = akhamis
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span></p>\
This metric represents the total count of jobs that run daily in Splunk. It serves as an operational metric reflecting the platform's continuous activity, diverse use cases, and its contribution to operational efficiency. \
\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span></p>\
Analyzing this metric helps organizations ensure that Splunk is actively delivering value and meeting their evolving data processing needs. However, it's crucial to ensure that the jobs being executed align with business goals, as misaligned jobs can divert resources from those that provide significant value. \
\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span></p>\
Tracking this KPI <em>weekly</em> and <em>monthly</em> is recommended to maintain effective oversight and resource allocation.
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_saved_searches)` is_scheduled=1 AND disabled=0 \
| fields _time, label, app, author, sharing, savedsearch_name \
| bin _time span=1d \
| stats latest(*) as * latest(_time) AS _time by label, app, sharing, author, savedsearch_name \
| stats dc(savedsearch_name) as num_jobs by _time label, app, sharing, author \
| stats sum(num_jobs) as "# of Daily Jobs" by _time

[# of Dashboards by Category]
search_name = # of Dashboards by Category
readonly = 1
diagnostic_searches = ssef_data_ui_views
version = 2.0
date_created = 2025-02-07
date_updated = 2025-12-15
category = Splunk
sub_category = Dashboards
tags = Dashboards,Details,Linked
solution = <p>This search enables data-driven decision-making for content planning and dashboard governance by showing category-level dashboard distribution.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor dashboard adoption trends by category.<br><b>2.</b> Identify underrepresented categories for development.<br><b>3.</b> Align content with strategic or business goals by domain.<br><b>4.</b> Inform leadership reporting using dashboard coverage insights.<br><b>5.</b> Use output to guide dashboard rationalization efforts.</p><p> Recommended For You: <ul><li><a href="https://splunkbase.splunk.com/app/3435/" target="_blank">Splunk App for Content Packs</a><br>Deploy prebuilt dashboards across strategic categories.</li><li><a href="https://www.cisco.com/c/en/us/products/security/index.html" target="_blank">Cisco SecureX</a><br>Use with categorized security dashboards to enhance threat visibility.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)`</code><br>      - Loads summary data for dashboards filtered by allowed apps.<br><b>02</b> <code>| stats dc(view_name) as num_app_dashboards by app</code><br>      - Counts distinct dashboards per app.<br><b>03</b> <code>| `ssef_splunkbase_apps(app)`</code><br>      - Enriches with Splunkbase category data.<br><b>04</b> <code>| fields app num_app_dashboards categories</code><br>      - Narrows focus to key data.<br><b>05</b> <code>| eval categories=split(categories,"|")</code><br>      - Converts string to multi-value categories field.<br><b>06</b> <code>| `ssef_technology(app,categories)`</code><br>      - Tags categories with domain relevance.<br><b>07</b> <code>| rename Domain as domain</code><br>      - Normalizes domain field name.<br><b>08</b> <code>| fields app num_app_dashboards categories domain</code><br>      - Prepares fields for final grouping.<br><b>09</b> <code>| stats sum(num_app_dashboards) as "# of Dashboards by Category" by categories</code><br>      - Aggregates total dashboards per category.<br><b>10</b> <code>| `ssef_app_categories(categories)`</code><br>      - Applies canonical category normalization.<br><b>11</b> <code>| fields Categories "# of Dashboards by Category"</code><br>      - Selects only clean output fields.<br>
explanation = <p>This query surfaces how dashboards align with Splunkbase categories by combining view data with app metadata and classification macros. It supports platform managers, governance owners, and engineering leads by showing how dashboards align to Splunk technology domains. This aids in identifying gaps, overlaps, or opportunity areas within dashboard adoption. SSEF macros ensure consistent mappings across apps and environments, and macro modularity supports maintainability and extension.</p>
quid = C44D5B4E40494B587A79FA5FAD4BAA53
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Aboutreportingcommands" target="_blank">Splunk Docs: About reporting commands</a><br>Reference for using <code>stats</code> in grouped aggregations.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Viz/Dashboards" target="_blank">Splunk Docs: Dashboards</a><br>Comprehensive overview of dashboard types and usage.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/timechart" target="_blank">Splunk Docs: timechart</a><br>Documentation on the <code>timechart</code> command and time‑based aggregations.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/stats" target="_blank">Splunk Docs: stats</a><br>How to use <code>stats</code> for summarizing data.</li><li><a href="https://www.splunk.com/en_us/resources/splunk-dashboards-quick-reference-guide.html" target="_blank">Splunk Dashboards Quick Reference Guide</a><br>High‑level guide to dashboard usage and visualization principles.</li></ul>
description = <p>This search returns the <b>number of dashboards grouped by category</b> using enriched app metadata and normalized classification logic. It offers domain-level visibility into how dashboards are distributed across categorized solution spaces.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.pie
search = `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
| stats dc(view_name) as num_app_dashboards by app \
| `ssef_splunkbase_apps(app)` \
| fields app num_app_dashboards categories \
| eval categories=split(categories,"|") \
| `ssef_technology(app,categories)` \
| rename Domain as domain \
| fields app num_app_dashboards categories domain \
| stats sum(num_app_dashboards) as "# of Dashboards by Category" by categories \
| `ssef_app_categories(categories)` \
| fields Categories "# of Dashboards by Category"

