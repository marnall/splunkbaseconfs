[broken_auto_sourcetyped_sourcetypes]
search_name = Broken Auto-Sourcetyped Sourcetypes
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 2.0
date_updated = 2025-11-24 14:31:3
category = ES Adoption
sub_category = Security
tags = Details,ES Adoption,Log Sources
solution = <p>This search helps establish a proactive control for identifying and correcting malformed or unintended sourcetypes before they impact scale, cost, or usability.</p><p><b>Suggested Actions</b>: Review the highlighted sourcetypes and validate their source definitions, update props and transforms where needed, and consolidate or reclassify data sources that should share a common sourcetype.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise.html" target="_blank">Products: Splunk Enterprise</a><br>Provides the core indexing, sourcetype management, and data onboarding controls needed to standardize and govern data at scale.</li><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Helps admins and data engineers build best practices for sourcetype design, ingestion pipelines, and platform governance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=sourcetype" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover additional Splunk and Cisco apps that support ingestion monitoring, data quality validation, and platform optimization.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| tstats summariesonly=true</code><br> - Efficiently scans accelerated summary data to identify sourcetypes flagged as too small without scanning raw events.<br><b>02</b> <code>| stats / eval / eventstats</code><br> - Aggregates event counts, host spread, and index coverage to estimate ingest impact and assign a relative severity level.<br>
explanation = <p>Broken or auto-sourcetyped data can silently degrade platform efficiency by fragmenting data models, increasing search complexity, and inflating operational overhead. For platform administrators and data onboarding teams, this insight reveals where small-volume data sources are incorrectly classified and may later expand unexpectedly. Left unaddressed, these sourcetypes can lead to inconsistent dashboards, unreliable detections, and higher support effort as environments scale. By surfacing severity based on breadth and host distribution, the search enables teams to focus remediation where it will have the greatest long-term impact.</p>
quid = 9CCFAAA526DB34D3E871545B9FCB3D51
search_author = dluxton
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/tstats" target="_blank">Splunk Help: tstats command</a><br>Explains how the tstats command leverages accelerated data models for efficient large-scale searches.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/manage-indexes-and-indexers/about-sourcetypes" target="_blank">Splunk Help: About sourcetypes</a><br>Describes how sourcetypes work and why consistent definitions are critical for search and knowledge reuse.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=sourcetype" target="_blank">Splunk Docs: Sourcetype search reference</a><br>Search results for sourcetype-related documentation and configuration guidance.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Apps</a><br>Utility apps that assist with Splunk administration, configuration validation, and data quality checks.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunkbase: IT Operations Management</a><br>Apps focused on operational visibility, troubleshooting, and ingestion-related workflows.</li><li><a href="https://www.splunk.com/en_us/blog/2015/01/26/log-analysis-best-practices.html" target="_blank">Splunk Blogs: Log analysis best practices</a><br>Best practices for structuring and analyzing log data effectively at scale.</li></ul>
severity_medium_text = <br/><p>Autosourcetyping events ocurring on a single index.</p>
severity_high_text = <br/><p>Large number of auto sourcetyping events occuring on more than 1 index.</p>
severity_critical_text = <br/><p>Large number of autosourcetyping errors ocurring across multiple indexes.</p>
description = <p>This search identifies <b>auto-generated or malformed sourcetypes</b> that are being marked as <b>-too_small</b> and estimates their potential ingest impact. It highlights patterns that indicate <b>broken sourcetype behavior</b> across indexes and hosts. This helps teams prioritize <b>data hygiene and onboarding fixes</b> before they scale into larger ingestion problems.</p>
search = | tstats summariesonly=true count as eventcount WHERE \
    [| `ssef_all_indexes` ] index!=_* sourcetype=*-too_small by sourcetype index host \
| eval summary_id="broken_auto_sourcetyped_sourcetypes" \
| stats values(index) as index sum(eventcount) as eventcount by sourcetype host \
| lookup ssef_configs_conf_props_lookup title as sourcetype OUTPUT app as app_name \
| eval app_name=mvdedup(app_name) \
| lookup ssef_admin_eventtypes_lookup app as app_name OUTPUT tags \
| eval tags=mvdedup(tags) \
| where NOT tags like "%" \
| rex field=sourcetype "(?P<extracted_sourcetype>.*?)(-too_small)" \
| stats sum(eventcount) as eventcount dc(host) as hostcount by index extracted_sourcetype \
| eval rough_daily_ingest_estimate_mb=round(((eventcount*1024)/1024/1024),0) \
| eventstats dc(extracted_sourcetype) as total_extracted_sourcetypes_count sum(rough_daily_ingest_estimate_mb) as total_rough_daily_ingest_estimate_mb sum(hostcount) as total_hosts dc(index) as total_indexes \
| eval severity_level = case (total_indexes>2 AND total_extracted_sourcetypes_count>100,5,total_indexes>1 AND total_extracted_sourcetypes_count>10,4,true(),3) \
| rename index as index_name \
| table eventcount extracted_sourcetype hostcount index_name rough_daily_ingest_estimate_mb severity_level total_extracted_sourcetypes_count total_hosts total_indexes total_rough_daily_ingest_estimate_mb \
| `ssef_handle_no_results(1,"The broken_auto_sourcetyped_sourcetypes summary job completed successfully without identifying any issues, and everything is operating as expected.")`

