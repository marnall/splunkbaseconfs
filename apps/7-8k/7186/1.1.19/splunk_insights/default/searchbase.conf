updated_author = akhamis
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the Apps Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>Builds and maintains a governed inventory of <b>Splunkbase applications</b> by ingesting external metadata into a normalized lookup. It standardizes compatibility, validation, and hosting attributes for enterprise reporting. This enables centralized oversight of <b>app governance and compliance posture</b>.</p>
explanation = <p>This search imports authoritative Splunkbase metadata and transforms it into a structured enterprise-ready dataset. By normalizing categories, compatibility flags, validation states, and installation methods, it creates a single source of truth for application governance. Security and platform teams can use this inventory to assess validation status (AppInspect, FIPS, FedRAMP), lifecycle state (archived, supported), and hosting model. Maintaining an updated Splunkbase app registry strengthens compliance visibility, reduces risk from deprecated apps, and supports informed decisions around platform extensibility and third-party integrations.</p>
execution_plan = <b>01</b> <code>| updatecsvfromexternal ...</code><br> - Retrieve the latest Splunkbase application metadata from the external CSV source.<br><b>02</b> <code>| inputlookup ssef_splunkbase_apps</code><br> - Load the dataset for transformation and normalization.<br><b>03</b> <code>| rex / foreach transformations</code><br> - Clean and standardize categorical, compatibility, and metadata fields.<br><b>04</b> <code>| stats ... by uid</code><br> - Consolidate application attributes into authoritative records.<br><b>05</b> <code>| outputlookup ssef_splunkbase_apps</code><br> - Persist the governed dataset for reuse in dashboards, compliance checks, and governance workflows.<br>
solution = <p>This search maintains a centralized Splunkbase application governance registry for operational, compliance, and lifecycle oversight.</p><p><b>Suggested Actions</b><ul><li>Review archived or unsupported apps to reduce operational risk.</li><li>Validate AppInspect and validation status before promoting apps to production.</li><li>Use compatibility metadata to ensure platform upgrades align with installed app requirements.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Correlate app governance and operational signals into service-level visibility.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Engage experts to review application governance, validation processes, and upgrade planning.</li><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Strengthen operational expertise in app lifecycle management and governance controls.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=splunkbase%20governance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore additional apps focused on governance, inventory, and compliance monitoring.</li></ul></p>
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=appinspect" target="_blank">Splunk Docs: SplunkSearch for appinspect</a><br>(provisionally validated) Documentation related to Splunk AppInspect validation standards.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=splunkbase%20apps" target="_blank">Splunk Docs: SplunkSearch for splunkbase apps</a><br>(provisionally validated) Explore documentation and guidance on managing Splunkbase applications.</li><li><a href="https://help.splunk.com/en/search?q=%22app%20management%22" target="_blank">Splunk Help: Search for "app management"</a><br>(provisionally validated) Help content covering application lifecycle and administration.</li><li><a href="https://lantern.splunk.com/Search?q=%22app%20governance%22" target="_blank">Lantern: Search for "app governance"</a><br>(provisionally validated) Practical guidance on managing and governing Splunk applications.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=configuration%20management" target="_blank">Splunk Docs: SplunkSearch for configuration management</a><br>(provisionally validated) Documentation references for managing configuration across environments.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=security%20validation" target="_blank">Splunk Docs: SplunkSearch for security validation</a><br>(provisionally validated) Guidance related to application security and validation practices.</li></ul>
viz_options = { "count":100 }
search = | updatecsvfromexternal input_csv=splunkbase_assets/splunkbase_apps.csv.gz output_csv=ssef_splunkbase_apps.csv.gz \
| eval summary_id="ssef_splunkbase_apps" \
| where 1==2 \
| inputlookup ssef_splunkbase_apps append=t \
| rex field=title mode=sed "s/^\(DEPRECATED\)\s+//g" \
| eval username=spath(created_by,"username"), display_name=spath(created_by,"display_name") \
| foreach categories *_compatibility sourcetypes cim_tags \
    [| eval <<FIELD>>=trim(split(<<FIELD>>,"|")) ] \
| foreach *_validation appinspect_status appinspect_passed is_archived archive_status fips_compatibility sourcetypes cim_tags \
    [| eval <<FIELD>>=trim(lower(<<FIELD>>)) ] \
| foreach app_version sourcetypes cim_tags \
    [| eval <<FIELD>>=if(<<FIELD>>="null" OR <<FIELD>>="" OR isnull(<<FIELD>>), null(), <<FIELD>>) ] \
| mvexpand categories \
| stats \
    values(categories) as categories \
    values(product_compatibility) as product_compatibility \
    values(version_compatibility) as version_compatibility \
    values(cim_compatibility) as cim_compatibility \
    values(sourcetypes) as sourcetypes \
    values(cim_tags) as cim_tags \
    latest(appid) as appid \
    latest(type) as type \
    latest(access) as access \
    latest(created_by) as created_by \
    latest(username) as username \
    latest(display_name) as display_name \
    latest(title) as title \
    latest(hosting) as hosting \
    latest(app_version) as app_version \
    latest(platform) as platform \
    latest(is_archived) as is_archived \
    latest(archive_status) as archive_status \
    latest(support) as support \
    latest(fedramp_validation) as fedramp_validation \
    latest(fips_compatibility) as fips_compatibility \
    latest(passed_validation) as passed_validation \
    latest(appinspect_status) as appinspect_status \
    latest(appinspect_passed) as appinspect_passed \
    latest(description) as description \
    latest(documentation) as documentation \
    latest(download_count) as download_count \
    latest(notes) as notes \
    latest(size) as size \
    latest(filename) as filename \
    latest(release_history) as release_history \
    latest(updated_time) as updated_time \
    latest(created_time) as created_time \
    latest(published_time) as published_time \
    by uid \
| eval gold_standard = if(uid IN(833,1620,1747,1761,1876,1915,1928,2680,2731,2772,2790,6553,2847,3088,3110,3185,3549,4055,5556,5579,5580,5709,7404,742,7523,7538), "yes", "no") \
| eval hosting = if(match(appid,"^\d+"), "github", "splunkbase") \
| foreach categories *_compatibility sourcetypes cim_tags \
    [| eval <<FIELD>>=trim(mvjoin(<<FIELD>>,"|")) ] \
| foreach updated_time created_time published_time \
    [| eval <<FIELD>> = strptime(<<FIELD>>, "%Y-%m-%dT%H:%M:%S%z") ] \
| table uid,appid,title,type,created_by,access,username,display_name,hosting,categories,app_version,platform,is_archived,archive_status,support,fedramp_validation,fips_compatibility,passed_validation,appinspect_status,appinspect_passed,product_compatibility,version_compatibility,cim_compatibility,description,notes,documentation,download_count,size,filename,release_history,sourcetypes,cim_tags,updated_time,created_time,published_time,gold_standard \
| outputlookup ssef_splunkbase_apps CreateInApp=true Create_Empty=true Override_If_Empty=false \
| eval _time=now() \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time,uid,appid,title,updated_time,categories,app_version,support,severity_level \
| stats count as num_apps latest(severity_level) as severity_level \
| `ssef_handle_no_results(1,"The ssef_splunkbase_apps summary job completed successfully without identifying any issues, and everything is operating as expected.")`

[ssef_audit_sourcetype_search_tracker]
search_name = Daily Searches by Sourcetype
readonly = 1
ssef_cron = daily
target_component = Search & Visualization
version = 1.1.17
date_updated = 2026-01-26 09:41:00
category = Splunk
sub_category = Search
tags = Discovery,Tracker,Users,searches,Use Case
dispatch_earliest_time = -d@d
dispatch_latest_time = @d
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
updated_author = sthalpin
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>Daily searches by sourcetype by user.</p>
search = index=_audit sourcetype=audittrail action=search info=completed search_id=* total_run_time>0 sourcetype \
    NOT host IN (c0m1-*, idx-*)  \
    NOT app IN (SplunkDeploymentServerConfig)  \
    NOT search_type="typeahead"  \
    NOT search_id IN ("'subsearch*", "'SummaryDirector*") \
    earliest=-d@d latest=@d \
| fields host search_id user sourcetype_count__* \
| regex "\ssourcetype\s*(=|IN)" \
| rex field=search_string mode=sed "s/\s{2,}/ /g"  \
| rex field=_raw "(?s),\ssearch='(?<search_string>.*)'.*?\Z" \
| rex field=search_string max_match=10 "\ssourcetype\s*=\s*\"?(?<sourcetype_reference_1>[-\w*:]+)"  \
| rex field=search_string max_match=10 "\ssourcetype\s+IN\s*\(\s*(?<sourcetype_reference_2>.*?)\)"  \
| rex field=sourcetype_reference_2 mode=sed "s/[\s,]+/,/g"  \
| eval sourcetype_reference_2 = split(sourcetype_reference_2, ",")  \
| rex max_match=0 "sourcetype_count__(?<sourcetype_reference_3>[[:alnum:]][\w:-]*)="  \
| eval sourcetype_reference = lower(mvdedup(mvappend(sourcetype_reference_1, \
                                                     sourcetype_reference_2, \
                                                     sourcetype_reference_3))) \
| mvexpand sourcetype_reference \
| bin _time span=d \
| stats count AS search_count by _time user sourcetype_reference \
| eval summary_id="ssef_audit_sourcetype_search_tracker"  \
| `ssef_handle_no_results(1,"The " . summary_id \
