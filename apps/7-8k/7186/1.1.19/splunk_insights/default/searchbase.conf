[ssef_scma_search_scheduled_search_actions]
search_name = Actions Detected in Jobs
readonly = 1
target_component = Search & Visualization
version = 1.0.5
date_created = 2022-09-14
date_updated = 2024-5-9 17:17:19
category = Splunk
sub_category = Jobs
tags = SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = AA23A3658F71EEF7CF6AAF68D5DA0501
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Search/Schedulingsearches" target="_blank">Scheduling Searches </a></li>\
<li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Search/Performsearchactions" target="_blank">Search Actions </a></li>\
<li><a href="https://dev.splunk.com/enterprise/docs/devtools/customalertactions/" target="_blank">Create Custom Alert Actions</a></li>\
</ul>
severity_normal_text = <br/><p>No actions have been identified in any scheduled alerts or reports within the environment.</p>
severity_low_text = <br/><p>Actions have been detected within scheduled alerts or reports.</p>
description = <p>When a search is saved as a report in Splunk, it can be upgraded to a scheduled report. These reports are programmed to execute automatically at set intervals and can be configured to trigger specific actions, such as sending emails or running scripts. This search is dedicated to identifying those scheduled reports that have associated actions. Linking actions to scheduled reports significantly enhances their value by automating critical workflows and ensuring timely communication or task execution. This automation not only boosts efficiency but also ensures that key processes are consistently managed according to predefined schedules, thus improving reliability and operational responsiveness.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Low:</strong> Actions detected in search jobs.</li>\
<li><strong>Normal:</strong> No actions detected in search jobs.</li>\
</ul>
search = `ssef_summary(ssef_saved_searches)` is_scheduled=1 disabled=0 NOT app IN (splunk_monitoring_console,splunk_instrumentation) savedsearch_search IN ("*|*sendalert *" , "*|*script *" , "*|*sendemail *", "*|*collect *", "*|*mcollect *", "*|*outputlookup *", "*|*outputcsv *" ) OR (actions=* NOT actions IN ("*outputtelemetry*","")) \
| eval summary_id="ssef_scma_search_scheduled_search_actions" \
| stats latest(*) as * latest(_time) AS _time by label, app, sharing, author, savedsearch_name \
| foreach role, Splunk_Instance, scheduled_times, acl_perms_*, actions, action_email_to \
    [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
| stats values(savedsearch_search) values(cron_schedule) dc(actions) values(actions) dc(Splunk_Instance) values(sharing) values(action_email_to) AS email_destinations dc(action_email_to) as email_destinations_count latest(name) as name latest(_time) as _time by label app author savedsearch_name \
| rename values(*) AS * dc(*) AS dc_* author AS user , dc_Splunk_Instance as dc_instance \
| rex field=savedsearch_name mode=sed "s/=/<equals>/g" \
| eval is_enabled="true", is_scheduled="true" \
| eval spl_command = case (match(savedsearch_search, "\|\s?outputlookup\s+"), mvappend(spl_command,"spl_command_outputlookup"), match(savedsearch_search, "\|\s?sendalert\s+"), mvappend(spl_command,"spl_command_sendalert"), match(savedsearch_search, "\|\s?script\s+"), mvappend(spl_command,"spl_command_script"), match(savedsearch_search, "\|\s?sendemail\s+"), mvappend(spl_command,"spl_command_sendemail"), match(savedsearch_search, "\|\s?outputcsv\s+"), mvappend(spl_command,"spl_command_outputcsv"), match(savedsearch_search, "\|\s?collect\s+"), mvappend(spl_command,"spl_command_collect"), match(savedsearch_search, "\|\s?mcollect\s+"), mvappend(spl_command,"spl_command_mcollect"), true(), null() ) \
| eval actions=mvjoin(actions, ", ") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( savedsearch_search IN ("*|*sendalert *" , "*|*script *" , "*|*sendemail *", "*|*collect *", "*|*mcollect *", "*|*outputlookup *", "*|*outputcsv *" ) OR actions IN ("*lookup*", "*mail*", "summary_index"), low, true(), normal ) \
| table _time label name app savedsearch_name sharing cron_schedule dc_actions actions spl_command dc_instance is_enabled is_scheduled email_destinations_count severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_scheduled_search_actions summary job completed successfully without identifying any issues, and everything is operating as expected.")`

