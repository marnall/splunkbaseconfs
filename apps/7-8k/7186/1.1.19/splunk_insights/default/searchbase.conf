[Dashboard Expense]
search_name = Dashboard Expense
readonly = 1
diagnostic_searches = ssef_scma_top_50_dashboards
version = 2.0
date_updated = 2025-7-30 13:27:5
category = Splunk
sub_category = Health
tags = Adoption,Dashboards,Details,Resources
solution = <p>This search highlights dashboards that place the greatest load on the Splunk platform.</p><p><b>Suggested Actions</b> Review top-ranked dashboards to reduce panel count, optimize base searches, restrict access, or convert heavy dashboards into scheduled reports or summary-based views.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-observability-cloud.html" target="_blank">Products: Splunk Observability Cloud</a><br>Correlate dashboard resource usage with underlying infrastructure and application performance.</li><li><a href="https://www.splunk.com/en_us/services/professional-services.html" target="_blank">Services: Splunk Professional Services</a><br>Engage experts to optimize high-impact dashboards and improve overall search performance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=dashboard%20performance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps that assist with dashboard performance analysis and optimization.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| stats values(user) latest(expense metrics) by app, provenance</code><br> - Aggregates dashboard usage and resource metrics per app and dashboard.<br><b>02</b> <code>| sort - weighted_expense_factor</code><br> - Ranks dashboards by weighted resource impact.<br><b>03</b> <code>| rename / convert</code><br> - Normalizes fields for reporting and interpretation.
explanation = <p>High-cost dashboards can significantly affect search head and indexer performance, especially in environments with broad user adoption. This analysis surfaces dashboards that generate disproportionate resource usage relative to their value, enabling teams to prioritize optimization, refactoring, or access controls. By combining expense factors with user counts and execution metrics, administrators can make informed decisions about dashboard lifecycle management. Over time, this data supports performance governance and capacity planning initiatives.</p>
quid = D0098D3019607E6B9907A3C9ECFF41AE
updated_author = akhamis
related_info = related_info = <ul><li><a href="https://community.splunk.com/t5/Splunk-Search/Search-performance-impact-How-to-find-user-deploying-high-impact/m-p/405050">Splunk Community: Search performance impact & How to find user deploying high impact searches</a><p>This discussion provides insights into identifying resource-intensive searches and dashboards, helping understand their impact on system performance and user experience.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.0/DMC/ResourceusageCPU">Splunk Docs: Resource Usage: CPU Usage</a><p>This documentation explains how to monitor CPU usage across your Splunk deployment, aiding in identifying dashboards that consume excessive resources.</p></li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/How-to-increase-dashboard-performance-faster/m-p/568087">Splunk Community: How to increase dashboard performance faster?</a><p>This thread offers advice on enhancing dashboard performance through optimization techniques, contributing to better resource management and user satisfaction.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Quicktipsforoptimization">Splunk Docs: Quick tips for optimization</a><p>This documentation provides quick optimization tips for searches and dashboards in Splunk, aiming to enhance performance and reduce resource usage.</p></li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/How-can-I-create-a-query-to-find-dashboard-usage-and-top-used/m-p/364152">Splunk Community: How can I create a query to find dashboard usage and top used dashboards of all the dashboards in my environment?</a><p>This thread offers guidance on crafting queries to determine dashboard usage statistics, which can help identify resource-intensive dashboards.</p></li><li><a href="https://community.splunk.com/t5/Splunk-Search/Best-Methods-to-Improve-Performance-of-Dashboard/m-p/365234">Splunk Community: Best Methods to Improve Performance of Dashboard</a><p>This discussion explores common ways to improve dashboard performance, focusing on factors that may impact Splunk's efficiency and user experience.</p></li><li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Administration/Troubleshooting_high_resource_usage">Lantern: Troubleshooting high resource usage in Splunk Enterprise</a><p>This resource provides strategies for identifying and mitigating high resource usage in Splunk, including tips on managing resource-intensive dashboards.</p></li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/the-all-new-performance-insights-for-splunk.html">Splunk Blogs: The All New Performance Insights for Splunk</a><p>This blog introduces a tool designed to monitor and optimize performance in Splunk, assisting in identifying dashboards that may be consuming excessive resources.</p></li><li><a href="https://lantern.splunk.com/Splunk_Platform/Splunk_Outcome_Paths/Improve_Performance/Planning_for_infrastructure_and_resource_scalability">Lantern: Planning for infrastructure and resource scalability</a><p>This resource discusses strategies for scaling Splunk infrastructure, including considerations for managing resource-intensive dashboards to maintain optimal performance.</p></li><li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Searching_and_Reporting/Creating_efficient_searches_and_dashboards_for_cost_reduction">Lantern: Creating efficient searches and dashboards for cost reduction</a><p>This guide offers tips on optimizing searches and dashboards to reduce resource usage, thereby enhancing performance and user satisfaction.</p></li></ul>
description = <p>This search identifies the <b>top resource-consuming dashboards</b> by correlating <b>user activity</b> with <b>CPU, memory, and I/O impact</b> to highlight dashboards with the highest operational cost.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_scma_top_50_dashboards)` \
| fields _time label Splunk_Role app user provenance weighted_expense_factor overall_expense_factor search_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb \
| bin _time span=1d \
| eval user=split(user,",") \
| stats values(user) as user latest(weighted_expense_factor) as weighted_expense_factor latest(overall_expense_factor) as overall_expense_factor latest(search_count) as search_count latest(normalized_pct_cpu) as normalized_pct_cpu latest(mem_used) as mem_used latest(elapsed) as elapsed latest(scan_count) as scan_count latest(disk_read_mb) as disk_read_mb latest(disk_write_mb) as disk_write_mb by _time label Splunk_Role app provenance \
| stats values(Splunk_Role) as Splunk_Role values(user) as user dc(user) as num_users values(label) as label sum(weighted_expense_factor) as weighted_expense_factor sum(overall_expense_factor) as overall_expense_factor sum(search_count) as search_count sum(normalized_pct_cpu) as normalized_pct_cpu sum(mem_used) as mem_used sum(elapsed) as elapsed sum(scan_count) as scan_count sum(disk_read_mb) as disk_read_mb sum(disk_write_mb) as disk_write_mb latest(_time) as _time by app provenance \
| table _time label Splunk_Role app user provenance weighted_expense_factor overall_expense_factor num_users search_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb \
| sort - weighted_expense_factor \
| eval user=mvjoin(user,", ") , label=mvjoin(label,", ") \
| rename user AS "Sample Users", label AS "Search Head(s) / Indexers", app AS "Apps", provenance AS "Dashboard", weighted_expense_factor AS "Weighted Expense Factor", overall_expense_factor AS "Overall Expense Factor", _time as "Latest Usage", num_users AS "User Count", search_count AS "Search Count", normalized_pct_cpu AS "% CPU Used", mem_used AS "Memory Used (MB)", elapsed AS "Elapsed Time (s)", scan_count AS "Scan Count", disk_read_mb AS "Disk Read (MB)", disk_write_mb AS "Disk Write (MB)" , Splunk_Role as "Splunk Roles" \
| convert ctime("Latest Usage")

[Dashboards by Domain and Category Details]
search_name = Dashboards by Domain and Category Details
readonly = 1
diagnostic_searches = ssef_data_ui_views
version = 2.0
date_updated = 2024-12-20 9:22:21
category = Splunk
sub_category = Adoption
tags = Adoption,Dashboards,Details
solution = <p>This search provides a categorized view of dashboards based on their underlying Splunkbase applications.</p><p><b>Suggested Actions</b> Review category and domain distribution to identify gaps, consolidate overlapping dashboard capabilities, and align dashboard development with priority technology domains.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-observability-cloud.html" target="_blank">Products: Splunk Observability Cloud</a><br>Extend dashboard insights with end-to-end observability across infrastructure and applications.</li><li><a href="https://www.splunk.com/en_us/services/professional-services.html" target="_blank">Services: Splunk Professional Services</a><br>Get expert guidance on dashboard rationalization and app standardization strategies.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=dashboard%20apps" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore additional apps that enhance dashboard capabilities and coverage.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_splunkbase_apps(app)</code><br> - Enriches dashboards with Splunkbase app metadata.<br><b>02</b> <code>| ssef_technology(app,categories)</code><br> - Maps apps to technology domains and categories.<br><b>03</b> <code>| stats / table</code><br> - Aggregates and formats app category and domain context.
explanation = <p>Understanding which Splunkbase app categories and technology domains are represented by dashboards helps organizations evaluate platform coverage and alignment with business needs. This view enables administrators and platform owners to identify over- or under-represented capability areas, such as observability, IT operations, or security analytics. By associating dashboards with app metadata, teams can better prioritize investments, rationalize content, and guide future dashboard development. Over time, this insight supports governance, standardization, and strategic planning across Splunk environments.</p>
quid = CED44549AA0F5FBAAD329B0FF87784EC
updated_author = akhamis
related_info = <ul><li><a href="https://rigorousthemes.com/blog/best-splunk-dashboard-examples/" target="_blank">14 Best Splunk Dashboard Examples</a><p>This article showcases 14 examples of effective Splunk dashboards, providing inspiration and best practices for clear, insightful visualizations.</p></li><li><a href="https://logit.io/blog/post/splunk-dashboard-examples/" target="_blank">The Top 15 Splunk Dashboard Examples</a><p>This blog post highlights 15 top Splunk dashboard examples, helping users understand how to design dashboards that drive actionable insights.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/DashStudio/ExHub" target="_blank">Splunk Dashboard Studio Examples Hub</a><p>This official Splunk resource offers a curated collection of dashboard examples built with Dashboard Studio to demonstrate advanced design capabilities.</p></li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/dashboard-design-visualization-choices-and-configurations-part-1.html" target="_blank">Dashboard Design: Visualization Choices and Configurations</a><p>This article explores visualization options and configuration tips to improve the effectiveness and clarity of Splunk dashboards.</p></li><li><a href="https://lantern.splunk.com/Security/Product_Tips/Enterprise_Security/Comparing_security_domain_dashboards_in_Enterprise_Security" target="_blank">Comparing Security Domain Dashboards in Enterprise Security</a><p>This guide compares key security domain dashboards in Splunk Enterprise Security, helping users choose and configure the right visualizations for their needs.</p></li></ul>
description = <p>Understanding the domains and categories of dashboards that exist in your Splunk environment (e.g., security, observability, platform) reveals how well the dashboards support the platform to address specific needs. It provides insights into understanding which business functions benefit most from the dashboards in Splunk, showing where the platform delivers the most value. This helps identify critical use cases, optimize resource allocation, and ensure that Splunk aligns with the customer's goals. It also highlights potential areas for expansion or improvement, ensuring the customer maximizes their return on investment (ROI) from the platform.</p>
search = `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
| fields _time, label, name, Splunk_Instance, role, app, sharing, author, view_name, view_label, type, description, location, updated, acl_perms_read, acl_perms_write, acl_removable, auto_refresh_delay, autoRun, BaseSearch, dashboard_reference, dashboard_size, datamodel_reference, eventtype_reference, index_reference, is_time_selector, lookup_reference, macro_reference, num_panels, panel_title, report_reference, rest_reference, search, source_reference, sourcetype_reference, submitButton, time_range, version, newly_added \
| bin _time span=1d \
| stats latest(newly_added) as newly_added LATEST(name) AS name by label, app, sharing, author, view_name \
| `ssef_splunkbase_apps(app)` \
| eval categories=split(categories,"|") \
| `ssef_technology(app,categories)` \
| stats latest(*) as * by label, app, categories \
| `ssef_app_categories(categories)` \
| stats latest(*) as * latest(_time) as _time values(Categories) as Categories values(Domain) as Domain values(label) as label by app \
| eval updated_time=trim(updated_time,".000000") \
| convert ctime(updated_time) \
| table app title uid app_version updated_time label Categories Domain

