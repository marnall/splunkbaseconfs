description = <p>Calculates <b>total resource usage</b> by <b>Splunk App</b> over a 30-day period, combining dashboard and job-based consumption. Measures normalized CPU, memory usage, and weighted expense factors.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_scma_top_50_jobs)` earliest=-30d \
| bin _time span=1d \
| stats latest(*) AS * by _time \
| fields _time weighted_expense_factor normalized_pct_cpu mem_used app \
| rename weighted_expense_factor AS job_weighted_expense_factor \
    normalized_pct_cpu AS job_normalized_pct_cpu \
    mem_used AS job_mem_used \
| append \
    [ search `ssef_summary(ssef_scma_top_50_dashboards)` earliest=-30d \
    | bin _time span=1d \
    | stats latest(*) AS * by _time \
    | fields _time weighted_expense_factor normalized_pct_cpu mem_used app \
    | rename weighted_expense_factor AS dashboard_weighted_expense_factor \
        normalized_pct_cpu AS dashboard_normalized_pct_cpu \
        mem_used AS dashboard_mem_used ] \
| stats values(*) AS * by _time app \
| fillnull value=0 \
| eval total_weighted_expense_factor = job_weighted_expense_factor + dashboard_weighted_expense_factor,\
    total_normalized_pct_cpu = job_normalized_pct_cpu + dashboard_normalized_pct_cpu,\
    total_mem_used = job_mem_used + dashboard_mem_used \
| eventstats sum(total_weighted_expense_factor) as total_weighted_expense_factor_gt sum(total_normalized_pct_cpu) as total_normalized_pct_cpu_gt sum(total_mem_used) as total_mem_used_gt \
| eval total_weighted_expense_factor = round((total_weighted_expense_factor / total_weighted_expense_factor_gt * 100), 2) \
| eval total_normalized_pct_cpu = round((total_normalized_pct_cpu / total_normalized_pct_cpu_gt * 100) , 2) \
| eval total_mem_used = round((total_mem_used / total_mem_used_gt * 100) , 2) \
| stats sum(total_weighted_expense_factor) AS total_weighted_expense_factor sum(total_normalized_pct_cpu) AS total_normalized_pct_cpu,\
    sum(total_mem_used) AS total_mem_used\
    by app \
| sort - total_normalized_pct_cpu total_mem_used \
| eval total_mem_used = total_mem_used . " MB" \
| eval total_normalized_pct_cpu = total_normalized_pct_cpu . " %" \
| table app total_normalized_pct_cpu total_mem_used total_weighted_expense_factor \
| rename app as "Splunk App" total_normalized_pct_cpu AS "Total Normalized CPU" total_mem_used AS "Total Memory Used" total_weighted_expense_factor as "Weighted Expense Factor"

