[ssef_scma_forwarders_count_and_inventory]
search_name = Forwarder Version Compatibility
readonly = 1
target_component = Infra & Arch
version = 1.0.9
date_updated = 2025-11-6 11:47:56
category = Splunk
sub_category = Forwarders
tags = Environment,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = E79DF38C4FAC49131E8054738DBFE83D
updated_author = akhamis
related_info = <ul>\
\
<li><a href="https://docs.splunk.com/Documentation/Forwarder/latest/Forwarder/Introduction" target="_blank">Splunk Docs - Splunk Universal Forwarder Overview</a></li>\
\
<li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/forwarder%20compatibility" target="_blank">Splunkbase - Universal Forwarder Compatibility Checks</a></li>\
</ul>
severity_normal_text = <br/><p>All forwarders in your environment are compliant with support, and nothing is expiring or about to expire.</p>
severity_low_text = <br/><p>Forwarder versions that will expire in the next 6 months have been found! Please check the list and plan to upgrade them before they expire.</p>
severity_medium_text = <br/><p>Forwarder versions that will expire this month have been identified. Please look at the list and plan to upgrade them immediately, before they expire.</p>
severity_high_text = <br/><p>Forwarder versions were identified as out of support.  Please look at the list and plan to upgrade them.</p>
description = <p>This Splunk query monitors the health and support status of forwarders connecting to an indexer or heavy forwarder, categorizing them by port, version, and forwarder type (e.g., Universal or Heavy). It enriches the data with support lifecycle details, calculates remaining support time, flags unsupported versions, aggregates host-level usage, and appends endpoint diversity metrics from <code>tstats</code>. It ultimately produces a table to aid infrastructure monitoring and lifecycle planning. Keeping forwarders up-to-date is crucial for security, compatibility, and optimal performance, helping prevent potential vulnerabilities and ensuring that your data collection infrastructure remains robust and effective.</p><p><strong>Severity Levels:</strong></p><ol><li data-list="bullet"><span class="ql-ui"></span><strong>High:</strong> Out of support.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Medium:</strong> &lt; 1 Months remaining for support.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Low:</strong> &lt; 7 Months remaining for support.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Normal:</strong> &gt; More than 7 Months remaining for support.</li></ol>
search = index=_internal sourcetype=splunkd source="*metrics.log" sourcetype=splunkd group=tcpin_connections (connectionType=cooked OR connectionType=cookedSSL) guid=* destPort!="-" \
| eval summary_id="ssef_scma_forwarders_count_and_inventory" \
| fields _time hostname destPort version fwdType ack os arch \
| bin _time span=1d \
| stats latest(version) as version latest(fwdType) as fwdType latest(ack) as ack latest(os) as os latest(arch) as arch count as events by _time hostname destPort \
| stats values(os) as fwd_os values(arch) as fwd_arch sum(events) as events dc(hostname) as unique_forwarders latest(_time) as _time by destPort version fwdType ack \
| lookup ssef_supported_forwarder_versions forwarder_version AS version OUTPUT forwarder_cloud_versions heavy_forwarder_support_end_date univeral_forwarder_full_support_end_date universal_forwarder_p3_support_end_date \
| eval forwarder_support_end_date_epoch=if(fwdType="full", strptime(heavy_forwarder_support_end_date,"%B %d, %Y"), strptime(univeral_forwarder_full_support_end_date,"%B %d, %Y")) \
| eval months_remaining_in_support=ceil((forwarder_support_end_date_epoch - now())/86400/30) \
| eval message=if(isnull(forwarder_cloud_versions) OR months_remaining_in_support<=1,"!!out of support- consider upgrading!!","Supported") \
| fillnull value="!!out of support- consider upgrading!!" forwarder_cloud_versions heavy_forwarder_support_end_date univeral_forwarder_full_support_end_date \
| eventstats sum(unique_forwarders) as ack_sum by ack \
| eventstats sum(unique_forwarders) as total_forwarders \
| eval useACK="num_" . ack . "_ack_" . ack_sum \
| eval fwd_os=mvjoin(fwd_os,",") \
| eval fwd_arch=mvjoin(fwd_arch,",") \
| eval critical=5,high=4,medium=3,low=2,normal=1, severity_level = case (message="!!out of support- consider upgrading!!",high, forwarder_support_end_date_epoch<now(), medium, months_remaining_in_support<7 OR events=0, low, true(), normal) \
| eval months_remaining_in_support=if(months_remaining_in_support<0,0,months_remaining_in_support) \
| eval unsupported_count=if(severity_level>1,unique_forwarders,0) \
| append \
    [| tstats summariesonly=t count WHERE [ `ssef_all_indexes` ] by _time span=1d host sourcetype \
    | where host!="" \
    | eval _h=trim(host) \
    | eval _h=replace(_h,"^[\"']+|[\"']+$","") \
    | eval _h=replace(_h,"^\\[([^\\]]+)\\](?::\\d+)?$","\\1") \
    | eval _h=replace(_h,"%[0-9A-Za-z_.-]+$","") \
    | eval _h=replace(_h,"^(\\d{1,3}(?:\\.\\d{1,3}){3}):\\d+$","\\1") \
    | eval _h=replace(_h,"^([A-Za-z0-9.-]+):\\d+$","\\1") \
    | eval short_host_strict=lower(case( match(_h,"^\\d{1,3}(?:\\.\\d{1,3}){3}$"), _h, like(_h,"%:%") AND match(_h,"^[0-9A-Fa-f:.]+$"), _h, true(), mvindex(split(replace(replace(_h,"[^A-Za-z0-9.-]",""),"^\\.+",""),"."),0) )) \
    | eval short_host_strict=replace(short_host_strict,"^-+|-+$","") \
    | eval short_host_strict=if(len(short_host_strict)=0, lower(replace(_h,"[^A-Za-z0-9.-]","")), short_host_strict) \
    | eval short_host_relaxed=lower(case( match(_h,"^\\d{1,3}(?:\\.\\d{1,3}){3}$"), _h, like(_h,"%:%") AND match(_h,"^[0-9A-Fa-f:.]+$"), _h, true(), mvindex(split(replace(replace(_h,"[^A-Za-z0-9._:-]",""),"^\\.+",""),"."),0) )) \
    | eval short_host_relaxed=if(len(short_host_relaxed)=0, lower(replace(_h,"[^A-Za-z0-9._:-]","")), short_host_relaxed) \
    | stats dc(short_host_strict) as unique_endpoints dc(short_host_relaxed) as unique_endpoints_relaxed dc(sourcetype) as unique_sourcetypes by _time \
    | fields _time unique_endpoints unique_endpoints_relaxed unique_sourcetypes ] \
| fillnull value="other" destPort version fwdType useACK\
| table _time destPort version useACK fwdType message severity_level unique_forwarders total_forwarders events forwarder_cloud_versions forwarder_support_end_date_epoch heavy_forwarder_support_end_date months_remaining_in_support univeral_forwarder_full_support_end_date universal_forwarder_p3_support_end_date fwd_os fwd_arch unique_endpoints unique_endpoints_relaxed unique_sourcetypes unsupported_count ack_sum \
| `ssef_handle_no_results(1,"The ssef_scma_forwarders_count_and_inventory summary job completed successfully without identifying any issues, and everything is operating as expected.")`

