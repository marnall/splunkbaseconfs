solution = <p>This search provides a clear breakdown of how users authenticate into Splunk, enabling informed decisions around identity governance and security hardening.</p><p><b>Suggested Actions</b><br><b>1.</b> Review authentication types with high user counts for security alignment.<br><b>2.</b> Identify and plan migration away from legacy authentication methods.<br><b>3.</b> Validate authentication configurations against security policies.<br><b>4.</b> Use results to support audits and compliance reporting.<br><b>5.</b> Track trends over time to measure adoption of centralized identity providers.</p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_scma_users_authentication_mechanism)`</code><br> - Loads summarized authentication mechanism data collected by IS4S.<br><b>02</b> <code>| fields _time type dc_roles dc_splunk_server total_users severity_level</code><br> - Selects the fields required to evaluate authentication usage.<br><b>03</b> <code>| `ssef_no_data_filter`</code><br> - Removes empty or invalid summary records from the dataset.<br><b>04</b> <code>| stats latest(total_users) as total_users by type</code><br> - Aggregates the latest user counts by authentication mechanism.<br>
explanation = <p>Understanding which authentication mechanisms are in use is critical for maintaining a secure and scalable Splunk deployment. This search highlights how many users rely on each authentication type, enabling teams to assess reliance on local accounts versus centralized identity providers. Operationally, this supports risk reduction, compliance validation, and long-term identity modernization efforts by identifying legacy or less secure authentication methods.</p>
quid = 9FA6A1AFEC5489239DADBB52B2F58558
search_author = khutchinson
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/manage-users-and-security/9.3/manage-splunk-platform-users-and-roles/about-users-and-roles" target="_blank">Help: About users and roles</a><br>Overview of how users, roles, and access controls are structured in Splunk.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/manage-users-and-security/9.3/configure-authentication/configure-authentication-in-splunk-enterprise" target="_blank">Help: Configure authentication in Splunk Enterprise</a><br>Guidance on configuring authentication mechanisms and identity providers.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/manage-users-and-security/9.3/configure-authentication/set-up-ldap-authentication" target="_blank">Help: Set up LDAP authentication</a><br>Instructions for integrating Splunk with LDAP-based identity systems.</li><li><a href="https://lantern.splunk.com/Security/Authentication" target="_blank">Lantern: Authentication</a><br>Best practices and patterns for securing authentication in Splunk.</li></ul>
description = <p>This search summarizes <b>user authentication mechanisms</b> in the environment by reporting the <b>total number of users</b> associated with each authentication type. It provides high-level visibility into how users are authenticating across the platform, helping teams understand adoption of different identity methods. This insight supports security posture reviews and authentication strategy planning.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.pie
viz_options = { "stackMode":"stacked","seriesColors":["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"],"legendDisplay":"top" }
search = `ssef_summary(ssef_scma_users_authentication_mechanism)` \
| fields _time type dc_roles dc_splunk_server total_users severity_level \
| `ssef_no_data_filter` \
| stats latest(total_users) as total_users by type

