[summary_alerts_failing_to_trigger]
search_name = Alerts Failing to Trigger
readonly = 1
ssef_cron = weekly
target_component = Search & Visualization
version = 2.0.0
date_created = 2025-08-06
date_updated = 2026-1-26 21:26:13
category = Splunk
sub_category = _internal
tags = Alerts,EFS,Failures,Scheduler
solution = <p>This search surfaces execution failures in alert pipelines, enabling proactive resolution of misfired alerts that may impact monitoring reliability.</p><p><b>Suggested Actions</b><br><b>1.</b> Review configurations for frequently failing alerts<br><b>2.</b> Check permissions and ownership of saved searches<br><b>3.</b> Inspect splunkd.log for error contexts<br><b>4.</b> Confirm downstream systems (email/webhook) are reachable<br><b>5.</b> Monitor scheduler load and performance over time</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (num_failed_alert_actions > 10, 5, num_failed_alert_actions > 5, 4, num_failed_alert_actions > 0, 2, true(), 1)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No alert action failures</li><li><b>Low (Severity 2):</b> 1–5 failures — minor issue</li><li><b>High (Severity 4):</b> 6–10 failures — significant concern</li><li><b>Critical (Severity 5):</b> More than 10 failures — urgent attention required</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| index=_internal sourcetype=scheduler alert_actions="*" NOT status IN(completed,success) search_type!="*acceleration"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters scheduler logs for failed alert actions excluding acceleration<br><b>02</b> <code>| stats count as num_failed_alert_actions</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Counts total failed alert executions<br><b>03</b> <code>| eval severity_level = case (...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assigns tiered severity based on number of failures<br><b>04</b> <code>| table num_failed_alert_actions severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Formats the final output for clarity
explanation = <p>This search identifies failed alert dispatches recorded in the scheduler logs, excluding acceleration-related events. Tracking failures helps maintain alert integrity and ensures consistent notification delivery.</p><p>It’s critical for platform teams and SREs to spot issues in alert pipelines. Using <b>stats</b> and <b>eval with case()</b> allows quantitative failure tracking and severity classification. Clear insights into alert performance are especially helpful for junior engineers to diagnose alert-related problems.</p>
quid = 425DF4BF55B827D5E7E764B9E5FFC013
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>No alert actions failed — system integrity maintained.</p>
severity_low_text = <p>A few alert actions failed — monitor for recurring issues.</p>
severity_medium_text = <p>N/A</p>
severity_high_text = <p>Multiple alert failures detected — investigation recommended.</p>
severity_critical_text = <p>High volume of alert failures — immediate remediation needed.</p>
description = <p>This looks for the daily average of any searches that were meant to trigger an alert but failed to execute the alert action.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: SPL Command Quick Reference</a><br>Reference for stats and eval commands used in this KPI.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search Reference</a><br>Core SPL documentation for troubleshooting scheduler and alert searches.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Splunk Free Courses</a><br>Training resources for building reliable saved searches and alert workflows.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunk Apps: IT Operations Management Apps</a><br>Operations apps that complement alert reliability and monitoring governance visibility.</li></ul>
viz_options = { "count":100 }
search = index=_internal sourcetype=scheduler alert_actions="*" NOT status IN(completed,success) search_type!="*acceleration" \
| eval summary_id="summary_alerts_failing_to_trigger" \
| stats count as num_failed_alert_actions values(app) as app values(user) as user values(savedsearch_name) as savedsearch_name values(alert_actions) as alert_actions \
| eval severity_level = case (num_failed_alert_actions > 10, 5, num_failed_alert_actions > 5, 4, num_failed_alert_actions > 0, 2, true(), 1) \
| table num_failed_alert_actions app user savedsearch_name alert_actions severity_level \
| `ssef_handle_no_results(1,"The summary_alerts_failing_to_trigger summary job completed successfully without identifying any issues, and everything is operating as expected.")`

[summary_alerts_failing_to_trigger_drill]
search_name = Alerts Failing to Trigger Details
readonly = 1
