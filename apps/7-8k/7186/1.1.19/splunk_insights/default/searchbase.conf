updated_author = akhamis
related_info = <p><a href="https://docs.splunk.com/Documentation/Splunk/latest/DistSearch/Whatisdistributedsearch" target="_blank">Splunk Docs: Distributed Search</a></p>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>This Splunk query retrieves information about replication blacklists, denylists, and allowlists from the properties configuration.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/properties/distsearch/replicationBlacklist \
| eval summary_id="ssef_distsearch_replication" \
| search NOT title IN (DMC_NOT_REPLICATE_FORWARDER_ASSETS,framework,sampleapp,conf,lookupindexfiles,user_specific_meta) \
| stats count by splunk_server title \
| eval stanza="replicationBlacklist" \
| map maxsearches=100 search="| rest /servicesNS/-/-/properties/distsearch/replicationBlacklist/$title$ splunk_server=$splunk_server$ | eval property_name=\"$title$\" ,  stanza=\"$stanza$\" , property_value=value" \
| fields splunk_server stanza property_name property_value \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/properties/distsearch/replicationDenylist \
    | search NOT title IN (DMC_NOT_REPLICATE_FORWARDER_ASSETS,framework,sampleapp,conf,lookupindexfiles,user_specific_meta) \
    | stats count by splunk_server title \
    | eval stanza="replicationDenylist" \
    | map maxsearches=100 search="| rest /servicesNS/-/-/properties/distsearch/replicationDenylist/$title$ splunk_server=$splunk_server$ | eval property_name=\"$title$\" ,  stanza=\"$stanza$\" , property_value=value" \
    | fields splunk_server stanza property_name property_value ] \
| append \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/properties/distsearch/replicationAllowlist \
    | stats count by splunk_server title \
    | eval stanza="replicationAllowlist" \
    | map maxsearches=100 search="| rest /servicesNS/-/-/properties/distsearch/replicationAllowlist/$title$ splunk_server=$splunk_server$ | eval property_name=\"$title$\" ,  stanza=\"$stanza$\" , property_value=value" \
    | fields splunk_server stanza property_name property_value ] \
| rename splunk_server AS Splunk_Instance \
| `ssef_instance_info(Splunk_Instance)` \
| stats VALUES(Splunk_Instance) AS Splunk_Instance VALUES(role) AS role VALUES(property_value) AS property_value LATEST(name) AS name by label, stanza, property_name \
| eval _time = now() \
| foreach role, Splunk_Instance \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 0, null()) \
| eval is4s="summary" \
| append \
    [| search `ssef_summary(ssef_distsearch_replication)` earliest=-1d@d \
    | foreach Splunk_Instance, role \
        [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
    | stats VALUES(Splunk_Instance) AS Splunk_Instance VALUES(role) AS role VALUES(property_value) AS property_value LATEST(_time) AS _time LATEST(name) AS name by label, stanza, property_name \
    | table _time, label, name, role, Splunk_Instance, stanza, property_name, property_value \
    | outputlookup ssef_distsearch_replication_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | stats count as num_items \
    | eval is4s="lookup" ] \
| where is4s="summary" \
| table _time, label, name, role, Splunk_Instance, stanza, property_name, property_value,severity_level \
| `ssef_handle_no_results(1,"The ssef_distsearch_replication summary job completed successfully without identifying any issues, and everything is operating as expected.")`

