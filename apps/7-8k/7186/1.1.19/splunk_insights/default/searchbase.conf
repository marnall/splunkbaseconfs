[ssef_scma_indexing_ingest_retention]
search_name = Indexing Ingest distribution by index retention
readonly = 1
target_component = Indexing
version = 1.0.2
date_created = 2023-03-30
date_updated = 2024-5-9 17:22:22
category = Splunk
sub_category = Indexing
tags = Ingestion,Licensing,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 40B82C6435CD5BF9FCBB6AA79F1176CF
updated_author = khutchinson
severity_normal_text = <br/><p>This level applies to data indexes within an acceptable range of retention, typically less than 400 days, which aligns with standard operational practices. It indicates a normal operational status with no immediate action required. These indexes are presumed to be operating within defined parameters, reflecting effective and efficient data management and retention strategies.</p>
severity_low_text = <br/><p>Assigned to data indexes with a retention period of 400 days or more but less than 1000 days. Low severity suggests a moderate deviation from optimal data retention practices, implying a lesser, yet still notable, need for evaluation and adjustment. It flags potential for slight inefficiencies in data storage without immediate significant impacts, offering an opportunity for preemptive optimization.</p>
severity_medium_text = <br/><p>Represents data indexes that have a retention period exceeding 1000 days. This severity level is considered medium because these indexes hold data beyond typical retention policies, potentially indicating inefficient data management or oversight. It's a call to action to review data retention needs and possibly optimize storage to balance between access needs and cost/storage constraints.</p>
description = <p>This search calculates the distribution of ingested data by index retention over the last day. It provides a detailed view of how data is allocated across different retention policies, helping to ensure that data storage practices align with organizational guidelines and compliance requirements. Monitoring ingest distribution by retention is crucial for optimizing storage management, maintaining system efficiency, and ensuring that data is retained appropriately to meet both operational needs and regulatory obligations. This process supports strategic decision-making regarding data handling and resource allocation.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = `ssef_summary(ssef_internal_index_license_usage)` Lic_Pool!="auto_generated_pool_fixed-sourcetype*" \
| eval summary_id="ssef_scma_indexing_ingest_retention" \
| bin _time span=1h \
| stats max(License_Usage) AS License_Usage latest(name) as name by _time label Lic_Pool Index_Name Lic_Sourcetype \
| bin _time span=1d \
| sistats sum(License_Usage) AS License_Usage latest(name) as name by _time label Lic_Pool Index_Name Lic_Sourcetype \
| stats avg(License_Usage) AS b by label, Index_Name \
| rename Index_Name as idx \
| join label idx type=outer \
    [| search `ssef_summary(ssef_data_indexes)` isInternal=0 disabled=0 role=*indexer* \
    | stats max(eval(frozenTimePeriodInSecs/86400)) AS frozenTimePeriodInDays latest(name) as name by label, title \
    | rename title AS idx \
    | fields label idx frozenTimePeriodInDays] \
| stats dc(idx) AS index_count, sum(b) AS avg_bytes latest(name) as name by label, frozenTimePeriodInDays \
| eventstats sum(avg_bytes) AS avg_total_bytes by label \
| eval ingest_pct=round((avg_bytes/avg_total_bytes)*100,2) , avg_bytes = round(avg_bytes, 2) , avg_total_bytes = round(avg_total_bytes, 2) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( frozenTimePeriodInDays >= 1000, medium, frozenTimePeriodInDays >= 400, low, true(), normal ) \
| table _time label name frozenTimePeriodInDays index_count avg_bytes avg_total_bytes ingest_pct severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_ingest_retention summary job completed successfully without identifying any issues, and everything is operating as expected.")`

