description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br><br>"Regularly accessed analytic capabilities" in Splunk are capabilities that are accessed for 10% of the selected time frame. <br><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>Monitoring "regularly accessed capabilities" helps identify heavily and lightly used analytic features, facilitating strategic adjustments. Discovering underused capabilities can automate tasks, enhancing efficiency. Aligning Splunk usage with organizational goals boosts efficiency, reduces costs, and improves value. <br><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>Track this KPI <em>weekly</em>, <em>monthly</em>, and <em>quarterly</em> for optimal alignment and utilization.</p>
default_viz = splunk.singlevalue
search = `ssef_regularly_accessed_sourcetypes` \
| bin _time span=1d \
| `ssef_active_analytic_capabilities(inventory_sourcetype)` \
| timechart span=1d fixedrange=f dc(Analytic_Capability) as "Total # of Analytic Capabilities", dc(Active_Analytic_Capability) as "# of Regularly Accessed Analytic Capabilities" \
| eval "% of Regularly Accessed Analytic Capabilities to Total" = if('Total # of Analytic Capabilities' > 0, round(('# of Regularly Accessed Analytic Capabilities' * 100) / 'Total # of Analytic Capabilities', 2), 0) \
| fields _time, "# of Regularly Accessed Analytic Capabilities"

