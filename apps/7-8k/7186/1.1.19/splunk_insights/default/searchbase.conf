description = <p>Audits <b>SSEF framework execution health</b> by analyzing job results, runtime metrics, and severity states across all ssef_* sources. Identifies searches with abnormal severity values or execution anomalies.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
explanation = <p>This search evaluates SSEF execution metadata across all ssef_* summary sources. It aggregates job execution counts, runtime duration, result volumes, and maximum severity levels, then enriches the dataset with SSEF meta information. The search specifically filters for abnormal severity states (severity_level = -1), which may indicate execution failures, summary corruption, or unexpected framework behavior. This KPI provides centralized oversight of framework operational integrity.</p>
execution_plan = <b>01</b> <code>`ssef` source=ssef_*</code><br> - Retrieve SSEF summary execution events.<br><b>02</b> <code>| stats ... by source</code><br> - Aggregate job execution metrics and severity levels.<br><b>03</b> <code>| `ssef_meta(source)`</code><br> - Enrich with framework metadata and configuration context.<br><b>04</b> <code>| search severity_level="-1"</code><br> - Filter for abnormal or unexpected severity states.
solution = <p>This KPI provides governance oversight of SSEF framework health and execution stability.</p><p><b>Suggested Actions</b>: Investigate searches returning severity_level -1, validate summary generation logic, review job execution logs, confirm collection integrity, and ensure dependent summary searches are functioning correctly.</p>
