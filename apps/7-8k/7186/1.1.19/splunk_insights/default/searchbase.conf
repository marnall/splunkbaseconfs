[ssef_scma_search_bundle_size]
search_name = Knowledge Bundle Size
readonly = 1
target_component = Infra & Arch
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 16:58:0
category = Splunk
sub_category = Search
tags = Environment,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = CDDFF68528AFA0F958A66523D577E6D6
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/DistSearch/Howsearchesdistributed" target="_blank">Splunk Docs - Manage Search Bundle Size</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/DistSearch/Bestpracticesformanaginglargesearchbundles" target="_blank">Splunk Best Practices - Reducing Search Bundle Size</a></li>\
<li><a href="https://community.splunk.com/t5/Deployment-Architecture/How-to-reduce-search-bundle-size/td-p/489093" target="_blank">Splunk Answers - Search Bundle Size Impact</a></li>\
</ul>
severity_normal_text = <br/><p>Your bundle sizes are in accordance with Splunk best practices. Well done!</p>
severity_medium_text = <br/><p>One or more instances has returned a bundle size that exceeds 800 MB. This is probably contributing to performance issues and keeping you from getting the most out of your Splunk environment. Understand the Issue: Identify the cause and impact of the Search Bundle Size problem. <ul> \
<li>Review Configuration: Check settings like max_bundle_size in limits.conf.</li>\
<li>Optimize Searches: Refine queries, limit time ranges, and use efficient commands.</li>\
<li>Use Summary Indexes: Pre-calculate data to reduce complex searches.</li> \
<li>Distribute Load: Balance search load and use search affinity in distributed setups.</li> \
<li>Scale Infrastructure: Add more search heads or indexers as needed.</li> \
<li>Monitor and Maintain: Set up alerts and regularly review configurations.</li> \
<li>Engage Support: Seek assistance from Splunk support if necessary.</li> \
<ul>\
</p>
severity_high_text = <br/><p>One or more instances has returned a bundle size that exceeds 2GB. This is probably contributing to performance issues and keeping you from getting the most out of your Splunk environment. Understand the Issue: Identify the cause and impact of the Search Bundle Size problem. <ul> \
<li><Review Configuration: Check settings like max_bundle_size in limits.conf.</li>\
<li>Optimize Searches: Refine queries, limit time ranges, and use efficient commands.</li>\
<li>Use Summary Indexes: Pre-calculate data to reduce complex searches.</li> \
<li>Distribute Load: Balance search load and use search affinity in distributed setups.</li> \
<li>Scale Infrastructure: Add more search heads or indexers as needed.</li> \
<li>Monitor and Maintain: Set up alerts and regularly review configurations.</li> \
<li>Engage Support: Seek assistance from Splunk support if necessary.</li> \
<ul>\
</p>
severity_critical_text = <br/><p>One or more instances has returned a bundle size that exceeds 5GB. This is probably contributing to performance issues and keeping you from getting the most out of your Splunk environment. Understand the Issue: Identify the cause and impact of the Search Bundle Size problem. <ul> \
<li><Review Configuration: Check settings like max_bundle_size in limits.conf.</li>\
<li>Optimize Searches: Refine queries, limit time ranges, and use efficient commands.</li>\
<li>Use Summary Indexes: Pre-calculate data to reduce complex searches.</li> \
<li>Distribute Load: Balance search load and use search affinity in distributed setups.</li> \
<li>Scale Infrastructure: Add more search heads or indexers as needed.</li> \
<li>Monitor and Maintain: Set up alerts and regularly review configurations.</li> \
<li>Engage Support: Seek assistance from Splunk support if necessary.</li> \
<ul>\
</p>
description = <p>This check evaluates the search bundle sizes within your Splunk environment, focusing on identifying potentially excessive sizes. Search bundles are crucial as they directly impact several aspects of system performance, including search speed, network utilization, resource usage, scalability, indexer efficiency, and administrative overhead. Smaller bundles generally result in faster searches, less strain on the network, reduced resource usage, and simplified management. However, if the search bundle size becomes too large, it can detrimentally affect search performance and may even lead to a complete search outage if size limits are exceeded. Monitoring and managing these bundle sizes are therefore essential for maintaining a good user experience to support healthy adoption and accurate reporting.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Critical:</strong> Search bundle size >= 3000MB.</li>\
<li><strong>High:</strong> Search bundle size  >= 2000MB.</li>\
<li><strong>Medium:</strong> Search bundle size >= 800MB.</li>\
<li><strong>Normal:</strong> Search bundle size < 800MB.</li>\
</ul>
search = index=_internal `ssef_host_excl` source=*metrics.log sourcetype=splunkd group=bundle_replication name=bundle_metadata bundle_type=full_bundle bundle_bytes > 0 \
| eval summary_id="ssef_scma_search_bundle_size" \
| `ssef_instance_info(host)` \
| stats max(bundle_bytes) AS max_full_bundle_size values(role) as role latest(name) as name latest(_time) as _time by label \
| `ssef_cloud_limits(search_bundle_size)` \
| eval max_full_bundle_size_mb = round(max_full_bundle_size/1024/1024,2) ,role=mvjoin(role, ":") \
| eval message=if( max_full_bundle_size_mb > 3000, "Bundle size is over 3000 MB, please review content", "Normal bundle size") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( max_full_bundle_size_mb >= 3000, critical, max_full_bundle_size_mb >= 2000, high, max_full_bundle_size_mb >= 800, medium, true(), normal ) \
| table _time label name role max_full_bundle_size_mb message severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_bundle_size summary job completed successfully without identifying any issues, and everything is operating as expected.")`

