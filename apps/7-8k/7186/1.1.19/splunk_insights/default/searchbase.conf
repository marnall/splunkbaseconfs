search = `ssef_regularly_accessed_sourcetypes` \
| where search_coverage_percent >= `ssef_perc_active_threshold` \
| lookup uce_custom_sourcetype_mapping sourcetype_name as inventory_sourcetype OUTPUT data_type category as sourcetype_category domain as sourcetype_domain \
| lookup uce_sourcetype_mapping sourcetype_name as inventory_sourcetype OUTPUTNEW data_type category as sourcetype_category domain as sourcetype_domain \
| eval sourcetype_category=split(mvdedup(sourcetype_category), "|"), sourcetype_domain=split(mvdedup(sourcetype_domain), "|") \
| stats values(*) as * by inventory_sourcetype data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUTNEW use_case \
| eval use_case=mvdedup(use_case) \
| stats values(*) as * by inventory_sourcetype use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type as use_case_type category as usecase_category domain as usecase_domain \
| eval use_case_type=mvdedup(use_case_type) \
| eval use_case_name = if(match(use_case_type, "Use Case"), use_case, null()) \
| stats values(*) as * sum(eval(if(use_case_type=="Analytic Capability", 1, 0))) as num_Analytic_Capabilities values(eval(if(use_case_type=="Analytic Capability", use_case, null()))) as Analytic_Capabilities values(eval(if(use_case_type=="Technical Capability", use_case, null()))) as Technical_Capabilities sum(eval(if(use_case_type=="Technical Capability", 1, 0))) as num_Technical_Capabilities sum(eval(if(match(use_case_type, "Use Case"), 1, 0))) as num_Use_Cases by inventory_sourcetype \
| table inventory_sourcetype num_Use_Cases use_case_name num_Analytic_Capabilities Analytic_Capabilities ```num_Technical_Capabilities Technical_Capabilities``` data_type sourcetype_category sourcetype_domain usecase_category usecase_domain use_case_type \
| rename use_case_name as "Analytic Use Case"

