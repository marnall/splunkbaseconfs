[ssef_scma_top_50_jobs]
search_name = Expensive Jobs
readonly = 1
target_component = Search & Visualization
version = 1.0.4
date_created = 2022-09-14
date_updated = 2024-9-11 21:43:23
category = Splunk
sub_category = Jobs
tags = Jobs,SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = @d
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 4210D8A3ED72ECBD70CAA6E7B4AF3F5E
updated_author = akhamis
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Search/Writebettersearches" target="_blank">https://docs.splunk.com/Documentation/SplunkCloud/latest/Search/Writebettersearches</a></li>\
<li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Enterprise/Optimizing_search_in_Splunk_Enterprise" target="_blank">Lantern: Optimizing Search in Splunk Enterprise</a></li>\
</ul>\
<p></p>
severity_normal_text = <br/><p>This search is informational in nature and there are no limits set to define severities. Please use this information to determine if any of the most utilized jobs/searches need tuning.</p>
severity_low_text = <br/><p>Jobs with CPU utilization between 10% and 19% have been detected among the top 50 most resource-intensive jobs. While these jobs may not immediately impact system performance, there is an opportunity to enhance efficiency. Consider reviewing these jobs for potential optimization to improve system resource management and search performance.</p>
severity_medium_text = <br/><p>Jobs with CPU utilization consistently exceeding 20% have been identified among the top 50 most resource-intensive jobs. This indicates potential inefficiencies or high resource usage that could impact overall system performance. It is recommended to review and optimize these jobs for better resource utilization, possibly by refining search queries, reducing search complexity, or scheduling jobs during off-peak hours.</p>
description = <p>This check identifies the 50 most CPU and memory-intensive jobs. It focuses on assessing which jobs consume the most resources, allowing for a targeted analysis of their impact on system performance. Understanding the resource demands helps in optimizing job configurations and scheduling ensuring efficient resource utilization. This proactive approach aids in preventing system bottlenecks and enhances overall system stability and performance, supporting smoother operations and improved user experiences.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> More than 20% CPU.</li>\
<li><strong>Low:</strong> Between 10% and 19% CPU.</li>\
<li><strong>Normal:</strong> Below 10% CPU.</li>\
</ul>
search = | tstats summariesonly=true allow_old_summaries=false fillnull_value=0 max(data.search_props.scan_count) AS scan_count max(data.read_mb) AS read_mb max(data.written_mb) AS written_mb max(data.normalized_pct_cpu) AS normalized_pct_cpu max(data.mem_used) AS mem_used max(data.elapsed) AS elapsed \
    WHERE index=_introspection sourcetype=splunk_resource_usage component::PerProcess data.process_type::search AND data.search_props.type IN (scheduled) \
    data.search_props.label = *\
    NOT data.search_props.label IN (itsi_mad_context,itsi_mad_cohesive_context,itsi_event_grouping) \
    (data.normalized_pct_cpu > 1 data.mem_used > 1 data.elapsed > 1) ```Filter out low-impact jobs based on CPU, memory, or elapsed time to focus on resource-intensive jobs.```\
    by _time span=10s host data.search_props.app data.search_props.user data.search_props.label data.search_props.sid \
| rename data.search_props.* AS * \
| eval summary_id="ssef_scma_top_50_jobs" \
| eval normalized_pct_cpu=if(normalized_pct_cpu=0.00, 0, normalized_pct_cpu) \
| rename label AS savedsearch_name \
| `ssef_instance_info(host)` \
| eval Splunk_Role = CASE (role="indexer", "indexer", TRUE(), "search_head") ```Determines whether the job ran on an indexer or a search head, which helps in understanding the impact on both tiers.``` \
| stats dc(sid) AS run_count, avg(elapsed) AS elapsed, avg(scan_count) AS scan_count, avg(mem_used) AS mem_used, avg(normalized_pct_cpu) AS normalized_pct_cpu, avg(written_mb) AS disk_write_mb, avg(read_mb) AS disk_read_mb latest(_time) as _time latest(name) as name values(role) as role\
    by label Splunk_Role app user savedsearch_name ```Aggregates key metrics like run count, average elapsed time, memory, CPU usage, etc., by saved search and role (whether indexer or search head). and Groups the data by key fields like label, Splunk_Role, app, user, and savedsearch_name to get an overview of each job's performance across both tiers.\
    ``` \
| eventstats max(elapsed) AS max_elapsed max(scan_count) AS max_scan_count max(mem_used) AS max_mem_used max(normalized_pct_cpu) AS max_normalized_pct_cpu max(disk_read_mb) AS max_disk_read_mb max(disk_write_mb) AS max_disk_write_mb ```Calculates the maximum values for key metrics like CPU, memory, and disk usage across all jobs to be used for normalization later.``` \
| foreach elapsed mem_used normalized_pct_cpu disk_read_mb disk_write_mb scan_count max_* \
    [ eval <<FIELD>>=if(isnull(<<FIELD>>) OR <<FIELD>>="" OR <<FIELD>>=0, 1, <<FIELD>>) ] \
| eval weighted_expense_factor = ( ```This formula weights the importance of different metrics to calculate an overall "expense" score for each job, prioritizing CPU and memory usage.```\
    (normalized_pct_cpu / max_normalized_pct_cpu) * 0.25 + \
    (mem_used / max_mem_used) * 0.25 +\
    (scan_count / max_scan_count) * 0.2 + \
    (elapsed / max_elapsed) * 0.2 + \
    (disk_read_mb / max_disk_read_mb) * 0.05 + \
    (disk_write_mb / max_disk_write_mb) * 0.05 ) \
| eval overall_expense_factor = weighted_expense_factor * run_count * 0.25 ```Multiplies the weighted expense by the number of times the job ran, with a 0.25 factor to reduce the dominance of highly frequent jobs that are low-impact individually.``` \
| sort - overall_expense_factor ```Sorts the jobs by their expense factor, showing the most resource-intensive ones first.``` \
| eventstats count AS total_jobs \
| eval top_20_percent_limit = round(total_jobs * 0.20) ```Determines the number of jobs that make up the top 20% of the most expensive jobs based on their expense factor.``` \
| streamstats count AS row_number \
| where row_number <= top_20_percent_limit ``` AND overall_expense_factor > 1``` ``` Filters the jobs to include only those in the top 20% of overall expense and where the overall expense factor is greater than 1.``` \
| foreach elapsed mem_used normalized_pct_cpu disk_read_mb disk_write_mb scan_count \
    [ eval <<FIELD>>=round(<<FIELD>>, 2) ] \
| eval role=mvjoin(role,",") \
| eval critical=5, high=4, medium=3, low=2, normal=1, severity_level = case (overall_expense_factor >= 20, high, overall_expense_factor >= 15, medium, overall_expense_factor >= 10, low, true(), normal) ```Assigns a severity level based on the overall expense factor.``` \
| table _time label Splunk_Role name app user savedsearch_name weighted_expense_factor overall_expense_factor run_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb severity_level role \
| `ssef_handle_no_results(1,"The ssef_scma_top_50_jobs summary job completed successfully without identifying any issues, and everything is operating as expected.")`

