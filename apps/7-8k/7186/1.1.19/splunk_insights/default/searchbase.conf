solution = <p>This search lets admins quickly see validated, active apps and when they were last updated on Splunkbase.</p><p><b>Suggested Actions</b><ul><li>Review which apps need updates or validation.</li><li>Use category and domain mapping to align app use to Splunk goals (e.g., Observability or Security).</li><li>Retire unused apps or replace redundant ones.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=apps" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore related apps and extensions available in Splunkbase for your current app context.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security.html" target="_blank">Products: Splunk Enterprise Security</a><br>Recommended if apps include SecOps or security capabilities.</li><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk ITSI</a><br>Use this when apps are tied to service health, alerting, or IT operations.</li><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training Catalog</a><br>Deepen team expertise in app usage and administration.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Include if identity/mfa-related apps are present.</li></ul></p>
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_apps_local)` NOT app_name IN (`ssef_default_apps`,search,launcher,searchbase,splunk_insights) disabled=0 visible=1</code><br> - Filters out system/default apps and selects only visible/enabled ones<br><b>02</b> <code>| stats latest(*) as * values(label) as label by app_name</code><br> - Aggregates metadata across versions and instances<br><b>03</b> <code>| eval label=mvjoin(label,", ")</code><br> - Combines multiple labels for clarity<br><b>04</b> <code>| `ssef_splunkbase_apps(app_name)`</code><br> - Enriches each app with metadata from Splunkbase<br><b>05</b> <code>| eval categories=split(categories,"|")</code><br> - Converts category string to multivalue list<br><b>06</b> <code>| `ssef_technology(app_name,categories)`</code><br> - Derives associated technologies based on app and category<br><b>07</b> <code>| `ssef_app_categories(categories)`</code><br> - Maps categories to human-readable labels<br><b>08</b> <code>| table app_label app_name uid title visible show_in_nav current_version latest_version updated_time Domain Categories label passed_validation support description</code><br> - Projects clean, user-friendly view<br><b>09</b> <code>| eval updated_time=trim(updated_time,".000000")</code><br> - Cleans timestamp<br><b>10</b> <code>| convert ctime(updated_time)</code><br> - Converts to human-readable datetime<br><b>11</b> <code>| rename ...</code><br> - Final renaming for display purposes<br>
explanation = This search identifies Splunk apps installed locally, filtering out default system apps like `search`, `launcher`, or `searchbase`. It then joins metadata from Splunkbase such as version, support, and update info, allowing teams to understand current usage and update status. Categorization adds context around the apps functionality, helping admins manage app portfolios and spot opportunities for validation, deprecation, or upgrades. Ideal for app hygiene audits and security reviews where visibility and validation matter.
quid = 5C03A93F0CEEA4BB806ECBC3538B4FED
updated_author = akhamis
related_info = <ul><li><p><a href="https://splunkbase.splunk.com/apps?page=1" target="_blank">Splunkbase Apps</a></p><p>Explore a comprehensive collection of apps categorized by functionality, including Artificial Intelligence, Business Analytics, DevOps, and more, to extend Splunk`s capabilities.</p></li><li><p><a href="https://community.splunk.com/t5/Splunk-Tech-Talks/Tips-for-Finding-Valuable-App-Gems-in-Splunkbase/ba-p/506349" target="_blank">Tips for Finding Valuable App Gems in Splunkbase</a></p><p>This community article offers strategies for discovering valuable apps on Splunkbase, enhancing user experience and expanding use cases within the platform.</p></li><li><p><a href="https://splunkbase.splunk.com/category/utilities/" target="_blank">Utilities Category on Splunkbase</a></p><p>Browse the Utilities category on Splunkbase to find apps that extend, harness, and visualize data, improving operational efficiency and user engagement.</p></li><li><p><a href="https://splunkbase.splunk.com/app/4342/" target="_blank">Carousel Viz App</a></p><p>Discover the Carousel Viz app, which provides a new way to visualize data, enhancing dashboard interactivity and user experience.</p></li><li><p><a href="https://splunkbase.splunk.com/app/2919" target="_blank">Analysis Of SplunkBase Apps for Splunk</a></p><p>This app offers a dashboard with app statistics, allowing users to search for Splunk apps within Splunk, aiding in app discovery and management.</p></li></ul>
description = <p>This search provides the details behind the total number of non-default apps installed in a Splunk environment within a set time frame. More app installations indicate a maturing environment, enhancing data utility. Monitoring app variety helps assess adoption, while app sprawl is a concern. Tracking this monthly, quarterly, and yearly offers key insights.</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_apps_local)` NOT app_name IN (`ssef_default_apps`,search,launcher,searchbase,splunk_insights) disabled=0 visible=1 \
| stats latest(*) as * values(label) as label by app_name \
| eval label=mvjoin(label,", ") \
| `ssef_splunkbase_apps(app_name)` \
| eval categories=split(categories,"|") \
| `ssef_technology(app_name,categories)` \
| `ssef_app_categories(categories)` \
| table app_label app_name uid title visible show_in_nav current_version latest_version updated_time Domain Categories label passed_validation support description \
| eval updated_time=trim(updated_time,".000000") \
| convert ctime(updated_time) \
| rename app_label as App label AS "Search Head" , updated_time as "Latest Splunkbase Update" , uid as "App ID", title as "Title", visible as "Visible", show_in_nav as "Show in Navigation", current_version as "Current Version", latest_version as "Latest Version", passed_validation as "Passed Validation", support as "Support"

