dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_apps_local)` disabled=0 visible=1</code><br> - Retrieve summary of local apps, only enabled and visible ones.<br><b>02</b> <code>| bin _time span=1d</code><br> - Bin results into daily buckets.<br><b>03</b> <code>| stats dc(app_name) as "Total # of Apps" by _time</code><br> - Count distinct app names per day to compute total visible apps.<br>
explanation = <p>This KPI aggregates distinct installed apps that are enabled and visible within the environment on a daily basis. Monitoring the total count of operational apps can help gauge environment growth, assess maintenance needs, identify unexpected spikes in installed apps, and support governance decisions. By filtering out disabled apps, the search ensures focus on actively available apps.</p>
quid = 2FBFFA5BE4EABC171676D623B3157E6A
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Admin/Aboutapps" target="_blank">Splunk Docs: About apps and add-ons</a><br>Documentation describing what Splunk apps are and their role in your environment. (provisionally validated)</li><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Admin/ManagingApps" target="_blank">Splunk Docs: Managing apps and add-ons</a><br>Official guidance on managing app visibility and lifecycle. (provisionally validated)</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/bin" target="_blank">Splunk Docs: bin command</a><br>Reference for the <code>bin</code> command used for time binning. (provisionally validated)</li></ul>
