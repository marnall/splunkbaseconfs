explanation = <p>Understanding when dashboards are most heavily used helps teams align performance tuning, maintenance windows, and capacity planning with real user behavior. This insight enables administrators and platform owners to see daily usage patterns and identify hours of peak demand that may place additional load on search heads. By correlating regular usage with time-of-day activity, teams can proactively reduce performance risk, adjust auto-refresh behavior, or schedule background workloads more effectively. Over time, this supports a more reliable user experience and better infrastructure utilization.</p>
quid = B2690B4410DEFE32F7340FA2751566E1
updated_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/How-can-I-create-a-query-to-find-dashboard-usage-and-top-used/m-p/364152" target="_blank">Splunk Community: How can I create a query to find dashboard usage and top used dashboards of all the dashboards in my environment?</a><p>This community discussion provides insights into creating queries to monitor dashboard usage, helping identify frequently accessed dashboards and understand their impact on user experience.</p></li><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/9.3.2408/Viz/WorkingWithDashboardPanels" target="_blank">Splunk Docs: Working with dashboard panels</a><p>This documentation offers guidance on configuring and optimizing dashboard panels in Splunk, enhancing data visualization and user interaction.</p></li><li><a href="https://www.splunk.com/en_us/blog/learn/customer-experience-metrics.html" target="_blank">Splunk Blogs: Customer Experience (CX) Metrics</a><p>This blog post discusses metrics essential for evaluating customer experience, emphasizing the role of effective dashboards in delivering actionable insights.</p></li><li><a href="https://lantern.splunk.com/Observability/UCE/Proactive_response/Optimize_End-User_Experiences" target="_blank">Lantern: Optimize End-User Experiences</a><p>This guide provides strategies to enhance end-user experiences through optimized dashboards and proactive monitoring.</p></li><li><a href="https://www.splunk.com/en_us/resources/videos/splunk-digital-experience-monitoring-real-insights-into-real-user-experience.html" target="_blank">Splunk Digital Experience Monitoring: Real insights into real user experience</a><p>This resource offers insights into monitoring digital experiences, highlighting the importance of dashboards in understanding user interactions.</p></li><li><a href="https://www.splunk.com/en_us/pdfs/getting-started/splunk-for-customer-experience-analytics.pdf" target="_blank">Splunk for Customer Experience Analytics</a><p>This guide illustrates how to leverage Splunk dashboards for analyzing customer experience, aiding in the optimization of services and user satisfaction.</p></li><li><a href="https://www.splunk.com/en_us/solutions/optimize-your-web-and-mobile-experience.html" target="_blank">Splunk Solutions: Optimize Your Web and Mobile Experience</a><p>This solution page discusses how to use Splunk dashboards to optimize web and mobile user experiences, ensuring high performance and customer satisfaction.</p></li><li><a href="https://www.splunk.com/en_us/blog/devops/using-observability-as-a-proxy-for-customer-happiness.html" target="_blank">Splunk Blogs: Using Observability as a Proxy for Customer Happiness</a><p>This blog post explores how observability and dashboards can serve as proxies for measuring customer satisfaction and improving user experience.</p></li><li><a href="https://community.splunk.com/t5/Community-Blog/Tech-Talk-Optimizing-Your-Observability-Usage-and-Costs-as-You/ba-p/644661" target="_blank">Splunk Community: Tech Talk | Optimizing Your Observability Usage and Costs as You Scale</a><p>This community blog discusses optimizing observability usage and costs, emphasizing the role of dashboards in scaling and enhancing user experience.</p></li><li><a href="https://www.splunk.com/en_us/solutions/digital-customer-experience.html" target="_blank">Splunk Solutions: Digital Customer Experience</a><p>This solution page highlights how Splunk dashboards can be utilized to monitor and enhance digital customer experiences, driving value for businesses.</p></li></ul>
description = <p>This search analyzes <b>regularly used dashboards</b> to identify <b>peak usage times</b> throughout the day. It focuses on dashboards that meet a defined <b>activity threshold</b> and visualizes when users are most active. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.column
viz_options = {  "stackMode": "stacked", "backgroundColor": "transparent", "seriesColors": ["#7e52d2","#009be6","#00cdb0","#e39a2b","#ff677e","#d52094","#0050b1","#008c80","#97b22a","#ff6acb","#8098F6","#C83C10"], "legendDisplay": "top", "xAxisTitleVisibility": "hide"  }
search = `ssef_summary(ssef_internal_web_access_tracker)` type!=system \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1h \
| stats latest(*) as * by _time, label, type, app, view \
| eval users_mv=split(users_mv,", ") \
| `ssef_regularly_seen(view)` \
| eventstats sum(bytes) as sum_bytes sum(num_users) as sum_num_users values(users_mv) as users_mv sum(num_page_loads) as sum_num_page_loads sum(spent_ms) as sum_spent_ms by _time label, type, app, view \
| eval sum_num_users = if(isnotnull(users_mv), mvcount(users_mv), sum_num_users) \
| eventstats earliest(_time) as earliest_time latest(_time) as latest_time \
| addinfo \
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by view \
| eval activity_percentage_days = round((num_active_days / num_days) * 100, 2) \
| where activity_percentage_days >= `ssef_perc_active_threshold` \
| stats max(sum_bytes) as sum_bytes max(sum_num_users) as sum_num_users max(sum_num_page_loads) as sum_num_page_loads max(sum_spent_ms) as sum_spent_ms by _time view \
| makecontinuous _time span=1h \
| fillnull value=0 sum_num_users \
| eval hour=strftime(_time, "%H") \
| chart sum(sum_num_users) AS "Regularly Used Dashboards by Peak Usage Time" by hour view

[Resource Usage by Instance Details]
search_name = Resource Usage by Instance Details
readonly = 1
version = 2.0
date_created = 2025-6-30 13:26:43
date_updated = 2025-6-30 13:26:43
category = Splunk
sub_category = Health
tags = KPIs,Resources
solution = <p>This view highlights <b>resource-intensive Splunk hosts</b> that may require tuning or scaling.</p><p><b>Suggested Actions</b> Investigate hosts with sustained high CPU or memory usage and review workload distribution. Consider adding capacity, rebalancing roles, or tuning search concurrency when resource saturation is observed.</p><p><b>Recommended For You:</b><ul><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunk Apps: IT Operations Management</a><br>Apps that support infrastructure monitoring, performance analysis, and operational visibility.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utilities</a><br>Utility apps that enhance system monitoring, diagnostics, and administrative efficiency.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=host%20performance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Additional apps related to host performance, capacity, and resource monitoring.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| tstats ... component=Hostwide</code><br> - Collects host-level CPU, memory, and load metrics from introspection data.<br><b>02</b> <code>| tstats ... component=iostats</code><br> - Aggregates disk read/write and CPU wait metrics by mount point.<br><b>03</b> <code>| eval cpu_usage, mem_used_pct</code><br> - Calculates derived utilization metrics for easier interpretation.<br><b>04</b> <code>| where role=\"search_peer\" OR role=\"search_head\"</code><br> - Limits results to hosts that directly impact search execution.<br>
explanation = <p>Monitoring host resource utilization is critical for maintaining stable and responsive Splunk environments. This search combines CPU load, memory consumption, and disk I/O metrics into a single operational view, enabling teams to quickly identify constrained systems. By focusing on search heads and search peers, the results directly support capacity planning, performance troubleshooting, and infrastructure scaling decisions. Operations teams can use these insights to proactively address saturation risks before they impact search performance or user experience.</p>
quid = 419210D34C36FD06CC7E2AD4B5949E21
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/latest/monitoring-splunk-enterprise/about-monitoring-splunk-enterprise" target="_blank">Splunk Help: Monitoring Splunk Enterprise</a><br>Guidance on monitoring CPU, memory, and I/O performance in Splunk deployments.</li><li><a href="https://lantern.splunk.com/Search?q=Search%20Performance" target="_blank">Lantern: Search Performance</a><br>Best practices for identifying and resolving resource-related search performance issues.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=tstats" target="_blank">Splunk Docs: tstats Command</a><br>Reference documentation for using tstats with introspection and metrics data.</li></ul>
description = <p>This search provides a consolidated view of <b>host-level resource utilization</b> across CPU, memory, and storage I/O. It helps identify <b>performance pressure points</b> on search heads and search peers.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
search = | tstats summariesonly=true latest(data.mem_used) as mem_used latest(data.mem) as mem latest(data.cpu_system_pct) as cpu_system_pct latest(data.cpu_user_pct) as cpu_user_pct latest(data.virtual_cpu_count) as virtual_cpu_count latest(data.cpu_count) as cpu_count latest(data.normalized_load_avg_1min) as normalized_load_avg_1min WHERE index=_introspection sourcetype=splunk_resource_usage component=Hostwide by host \
| join type=outer host \
    [| tstats summariesonly=true latest(data.reads_ps) as reads_ps latest(data.writes_ps) as writes_ps latest(data.cpu_pct) as cpu_pct WHERE index=_introspection sourcetype=splunk_resource_usage component=iostats by host data.mount_point \
    | rename data.mount_point as mount_point \
    | eval iops = round(reads_ps + writes_ps) \
    | eval iops_mountpoint = iops." (".mount_point.")" \
    | eval cpupct_mountpoint = cpu_pct."% (".mount_point.")" \
    | stats values(iops_mountpoint) as iops_mountpoint, values(cpupct_mountpoint) as cpupct_mountpoint by host ] \
| eventstats min(eval(if(isnull(normalized_load_avg_1min), "0", "1"))) as _load_avg_full_availability \
| eval normalized_load_avg_1min = if(isnull(normalized_load_avg_1min), "N/A", normalized_load_avg_1min) \
| eval core_info = if(isnull(cpu_count), "N/A", cpu_count)." / ".if(isnull(virtual_cpu_count), "N/A", virtual_cpu_count) \
| eval cpu_usage = cpu_system_pct + cpu_user_pct \
| eval mem_used_pct = round(mem_used / mem * 100 , 2) \
| eval mem_used = round(mem_used, 0) \
| eval mem = round(mem, 0) \
| `ssef_instance_info(host)` \
| fields host, role, label, normalized_load_avg_1min, core_info, cpu_usage, mem, mem_used, mem_used_pct, iops_mountpoint, cpupct_mountpoint \
| sort - cpu_usage, - mem_used \
| where role="search_peer" OR role="search_head" \
| rename host AS Instance, normalized_load_avg_1min AS "Load Average", core_info AS "CPU Cores (Physical / Virtual)", cpu_usage AS "CPU Usage (%)", mem AS "Physical Memory Capacity (MB)", mem_used AS "Physical Memory Usage (MB)", mem_used_pct AS "Physical Memory Usage (%)", iops_mountpoint as "I/O Operations per second (Mount Point)", cpupct_mountpoint as "Storage I/O Saturation (Mount Point)"

