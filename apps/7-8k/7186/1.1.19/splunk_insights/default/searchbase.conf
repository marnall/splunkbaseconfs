[summary_long_running_searches]
search_name = Long Running Searches > 10m
readonly = 1
ssef_cron = weekly
target_component = Search & Visualization
version = 2.0
date_created = 2025-08-08
date_updated = 2026-2-11 16:51:18
category = Splunk
sub_category = _internal
tags = EFS,Monitoring,Performance,Search
solution = <p>Helps identify resource-heavy scheduled searches that could degrade Splunk performance.</p><p><b>Suggested Actions</b><br><b>1.</b> Optimize search SPL for efficiency.<br><b>2.</b> Review data model acceleration settings.<br><b>3.</b> Adjust schedule times to avoid peak system load.<br><b>4.</b> Increase indexer/search head resources if necessary.<br><b>5.</b> Monitor these searches over time to confirm improvements.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (searches_over_10_minutes&lt;=2,1, searches_over_10_minutes&lt;=5,2, searches_over_10_minutes&lt;=10,3, searches_over_10_minutes&lt;=20,4, searches_over_10_minutes&gt;20,5)</code></pre><p>Include before the final <code>| table</code> to categorize severity. <b>Adjust thresholds</b> to align with your operational tolerance for long-running jobs.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> 0–2 long searches.</li><li><b>Low (Severity 2):</b> 3–5 long searches.</li><li><b>Medium (Severity 3):</b> 6–10 long searches.</li><li><b>High (Severity 4):</b> 11–20 long searches.</li><li><b>Critical (Severity 5):</b> More than 20 long searches — severe performance degradation risk.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| tstats count WHERE index=_audit TERM(action=search) sourcetype=audittrail by host PREFIX(scheduler__) PREFIX(total_run_time=)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve scheduler job execution data from audit logs.<br><b>02</b> <code>| rename "total_run_time=" as total_run_time "scheduler__" as sid</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Rename prefixed fields for clarity.<br><b>03</b> <code>| where isNum(total_run_time)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Ensure runtime values are numeric.<br><b>04</b> <code>| search total_run_time &gt;= 600</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter for searches running longer than 10 minutes.<br><b>05</b> <code>| stats dc(sid) as searches_over_10_minutes</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct long-running search executions.<br><b>06</b> <code>| eval severity_level = case (searches_over_10_minutes&lt;=2,1, searches_over_10_minutes&lt;=5,2, searches_over_10_minutes&lt;=10,3, searches_over_10_minutes&lt;=20,4, searches_over_10_minutes&gt;20,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Classify based on the number of slow searches.<br><b>07</b> <code>| table searches_over_10_minutes severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Present final count and severity classification.<br>
explanation = <p>This search uses <b>tstats</b> to efficiently query the <b>_audit</b> index for <b>audittrail</b> events containing <b>action=search</b>. It extracts fields prefixed with <code>scheduler__</code> (search IDs) and <code>total_run_time=</code> to measure execution durations.</p><p>By filtering for <b>total_run_time ≥ 600 seconds</b>, the search counts the distinct search IDs that exceeded the threshold. This can help administrators spot resource-intensive saved searches that may impact indexing or user search performance.</p><p>For junior Splunkers, this query demonstrates optimized <b>tstats</b> usage, field prefix extraction, type checking with <b>isNum()</b>, and performance monitoring logic.</p>
quid = 7A283747E9389513959AEF72438C1272
search_author = Splunk Searchbase Assistant
updated_author = khutchinson
severity_normal_text = <p>Very few searches exceeding 10 minutes; system performance is optimal.</p>
severity_low_text = <p>Low number of searches exceeding 10 minutes; minor performance impact possible.</p>
severity_medium_text = <p>Moderate number of searches exceeding 10 minutes; investigate long-running searches.</p>
severity_high_text = <p>High number of searches exceeding 10 minutes; performance degradation likely.</p>
severity_critical_text = <p>Excessive searches exceeding 10 minutes; immediate action required to optimize search performance.</p>
description = <p>This search looks at all the searches ran within the last full business week and counts the unique number of searches that ran for longer than 10 minutes. Having long running searches can be indicative of inefficient searches or insufficient capacity of the platform. This creates space for effiencies in search and optimization.</p>
viz_options = { "count":100 }
search = | tstats summariesonly=true count WHERE index=_audit TERM(action=search) sourcetype=audittrail by host PREFIX(scheduler__) PREFIX(total_run_time=) \
| eval summary_id="summary_long_running_searches" \
| rename "total_run_time=" as total_run_time "scheduler__" as sid \
| where isNum(total_run_time) \
| search total_run_time >= 600 \
| stats dc(sid) as searches_over_10_minutes \
| eval severity_level = case (searches_over_10_minutes<=10,1, searches_over_10_minutes<=20,2, searches_over_10_minutes<=40,3, searches_over_10_minutes<=60,4, searches_over_10_minutes>60,5) \
| table searches_over_10_minutes severity_level\
| `ssef_handle_no_results(1,"The summary_long_running_searches summary job completed successfully without identifying any issues, and everything is operating as expected.")`

