| lookup uce_sourcetype_mapping sourcetype_name AS sourcetype OUTPUTNEW \
| eval domain=split(domain,"|"), data_model=split(data_model,"|"), category=split(category,"|") \
| where ```filter down results to targeted dataset``` \
(match(data_type,"Endpoint data") AND data_model="Endpoint data") OR match(sourcetype,"(?i)activedirectory") OR (match(data_type,"Linux and Unix data") AND data_model="Endpoint data") OR (match(data_type,"Authentication data") AND data_model="Authentication data") OR\
    (match(data_type,"Network Firewall data") AND data_model="Network Traffic data") OR (match(data_type,"Intrusion Detection data") AND data_model="Intrusion Detection data") OR match(data_type,"Network Access Control data") OR match(data_type,"Network Detection and Response data") OR \
    (match(data_type,"Web Application Firewall data") AND data_model="Web data" AND data_model="Intrusion Detection data") OR (match(data_type,"Web Proxy data") AND data_model="Web Proxy data") OR (match(data_type,"Network Resolution data") AND data_model="Network Resolution data") OR\
    (match(data_type,"Network Sessions data") AND data_model="Network Sessions data") OR (match(data_type,"Email data") AND data_model="Email data") OR (match(data_type,"Database data") AND data_model="Database data") OR (match(data_type,"Web Server data") AND data_model="Web data") OR \
    (match(data_type,"Network VPN data") AND data_model="Network Sessions data") OR (match(data_type,"Vulnerability Detection data") AND data_model="Vulnerabilities data") OR (match(data_type,"Malware data") AND data_model="Malware data" AND data_model="Alerts data") OR\
    (match(data_type,"Data Loss Prevention data") AND data_model="Data Loss Prevention data") OR (match(data_type,"Cloud Services data") OR match(sourcetype,"(?i)azure|aws|gcp|mscs|oci")) OR (match(data_type,"Microsoft:365 data") OR match(sourcetype,"(?i)gsuite")) \
| eventstats values(data_type) as data_types values(sourcetype) as sourcetypes \
| eval missing_datatypes=mvappend(\
    if(match(data_types,"Endpoint data"),null,"Endpoint data"),\
    if(match(sourcetypes,"(?i)activedirectory"),null,"Microsoft:Active Directory data"),\
    if(match(data_types,"Linux and Unix data"),null,"Linux and Unix data"),\
    if(match(data_types,"Network Firewall data"),null,"Network Firewall data"),\
    if(match(data_types,"Intrusion Detection data"),null,"Intrusion Detection data"),\
    if(match(data_types,"Network Access Control data"),null,"Network Access Control data"),\
    if(match(data_types,"Network Detection and Response data"),null,"Network Detection and Response data"),\
    if(match(data_types,"Web Application Firewall data"),null,"Web Application Firewall data"),\
    if(match(data_types,"Web Proxy data"),null,"Web Proxy data"),\
    if(match(data_types,"Network Resolution data"),null,"Network Resolution data"),\
    if(match(data_types,"Network Sessions data"),null,"Network Sessions data"),\
    if(match(data_types,"Email data"),null,"Email data"),\
    if(match(data_types,"Database data"),null,"Database data"),\
    if(match(data_types,"Web Server data"),null,"Web Server data"),\
    if(match(data_types,"Network VPN data"),null,"Network VPN data"),\
    if(match(data_types,"Vulnerability Detection data"),null,"Vulnerability Detection data"),\
    if(match(data_types,"Malware data"),null,"Malware data"),\
    if(match(data_types,"Data Loss Prevention data"),null,"Data Loss Prevention data"),\
    if(match(data_types,"Cloud Services data") OR match(sourcetypes,"(?i)azure|aws|gcp|mscs|oci"),null,"Cloud Services data"),\
    if(match(data_types,"IoT and Industrial data"),null,"IoT and Industrial data"),\
    if(match(data_types,"Microsoft:365 data") OR match(sourcetypes,"(?i)gsuite"),null,"Cloud Productivity Platform"),\
    if(match(data_types,"Authentication data"),null,"Authentication data")\
    ) \
| eval missing_core_datatypes=mvappend(\
    if(match(data_types,"Endpoint data"),null,"Endpoint data"),\
    if(match(data_types,"Network Firewall data"),null,"Network Firewall data"),\
    if(match(data_types,"Intrusion Detection data"),null,"Intrusion Detection data"),\
    if(match(data_types,"Web Application Firewall data"),null,"Web Application Firewall data"),\
    if(match(data_types,"Web Proxy data"),null,"Web Proxy data"),\
    if(match(data_types,"Network Resolution data"),null,"Network Resolution data"),\
    if(match(data_types,"Network Sessions data"),null,"Network Sessions data"),\
    if(match(data_types,"Email data"),null,"Email data"),\
    if(match(data_types,"Web Server data"),null,"Web Server data"),\
    if(match(data_types,"Network VPN data"),null,"Network VPN data"),\
    if(match(data_types,"Vulnerability Detection data"),null,"Vulnerability Detection data"),\
    if(match(data_types,"Malware data"),null,"Malware data"),\
    if(match(data_types,"Cloud Services data") OR match(sourcetypes,"(?i)azure|aws|gcp|mscs|oci"),null,"Cloud Services data"),\
    if(match(data_types,"Authentication data"),null,"Authentication data")\
    ) \
| eval missing_datatype_count=mvcount(missing_datatypes), missing_core_datatypes_count=mvcount(missing_core_datatypes) \
