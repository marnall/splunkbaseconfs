[ssef_data_ui_views]
search_name = Dashboards Inventory
readonly = 1
target_component = Inventory
version = 1.0.7
date_updated = 2025-12-3 15:11:58
category = Splunk
sub_category = Dashboards
tags = Dashboards,Discovery,Inventory,REST
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
explanation = <h3>Deeper Explanation: The <code>newly_added</code> Logic</h3><p>To understand how the <code>newly_added</code> flag is calculated, it's essential to follow the two main data flows within the query. The core of the logic is to compare today's live data against yesterday's global summary data.</p><p><strong>Step 1: Get Today's Live Dashboard List</strong> The query begins with a <code>rest</code> command to get a complete list of all visible dashboards <em>from the local search head where the job is currently running</em>. It then performs extensive processing and aggregation on this data to create a clean, final list of today's local dashboards.</p><p><strong>Step 2: Compare to Yesterday's Global List (The </strong><code><strong>join</strong></code><strong>)</strong> This is the heart of the "newness" calculation.</p><div spellcheck="false" class="ql-code-block-container"><div data-language="plain" class="ql-code-block">| join type=left label, app, view_name </div><div data-language="plain" class="ql-code-block">    [| search `ssef_summary(ssef_data_ui_views)` earliest=-1d@d latest=@d </div><div data-language="plain" class="ql-code-block">    | ...</div><div data-language="plain" class="ql-code-block">    | eval found_yesterday=1 ]</div></div><ol><li data-list="bullet"><span class="ql-ui"></span>The query takes today's local dashboard list.</li><li data-list="bullet"><span class="ql-ui"></span>The <code>join</code>'s subsearch runs, querying the central summary index for all dashboards that were recorded <em>yesterday</em> across <strong>all search heads</strong>.</li><li data-list="bullet"><span class="ql-ui"></span>It then attempts to match each of today's local dashboards against this global list from yesterday.</li><li data-list="bullet"><span class="ql-ui"></span>If a match is found, a field called <code>found_yesterday</code> is added to the event.</li></ol><p><strong>Step 3: The </strong><code><strong>eval</strong></code><strong> Command</strong></p><div spellcheck="false" class="ql-code-block-container"><div data-language="plain" class="ql-code-block">| eval newly_added = if(isnull(found_yesterday), "yes", "no")</div></div><ol><li data-list="bullet"><span class="ql-ui"></span>This is the final decision. The query looks at each of today's dashboards:</li><li class="ql-indent-1" data-list="bullet"><span class="ql-ui"></span>If the <code>found_yesterday</code> field is <code>null</code>, it means the dashboard did not exist in yesterday's global summary. It is therefore flagged as <code><strong>newly_added="yes"</strong></code>.</li><li class="ql-indent-1" data-list="bullet"><span class="ql-ui"></span>If the <code>found_yesterday</code> field has a value, it means the dashboard was present yesterday, and it is correctly flagged as <code><strong>newly_added="no"</strong></code>.</li></ol><p><strong>Step 4: Separating the Data Streams</strong> The query then uses a clever <code>append</code> and <code>where is4s="summary"</code> structure to manage its two goals:</p><ol><li data-list="bullet"><span class="ql-ui"></span>The data stream marked with <code>is4s="summary"</code> (which is today's live data with the correct <code>newly_added</code> flag) is sent to the <code>collect</code> command to be saved in the central summary index.</li><li data-list="bullet"><span class="ql-ui"></span>The <code>append</code> subsearch independently runs, reads yesterday's summary data, and uses <code>outputlookup</code> to refresh the local lookup file with that global list from the previous day.</li></ol><p>This complex structure allows the job to use the summary index as its "source of truth" for historical data, a necessary pattern for a distributed, multi-search-head environment.</p>
quid = DC2ECFCD2A560D1A35AA850C6CD8A732
updated_author = akhamis
related_info = <div class="diag-content-box"><div class="diag-content"><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/Whatsinhere" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/Whatsinhere</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div></div>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p><strong>Purpose:</strong> This daily job performs a comprehensive inventory of all visible dashboards across one or more Splunk search heads. It is designed to "shoot two birds with one stone" by performing two critical functions in a single run:</p><ol><li data-list="ordered"><span class="ql-ui"></span><strong>Populates a Central Summary Index:</strong> It saves this specific search head's dashboard data, enriched with a <code>newly_added</code> flag, to the central <code>ssef_data_ui_views</code> summary index. This allows for global, time-based reporting on dashboard creation.</li><li data-list="ordered"><span class="ql-ui"></span><strong>Refreshes a Global Lookup:</strong> It refreshes a local lookup file (<code>ssef_data_ui_views_lookup</code>) on each search head with the complete, global list of all dashboards from the <em>previous day's</em> summary. This enables consistent ad-hoc analysis against a common baseline across the entire distributed environment.</li></ol><p>By comparing the live data from today against the summarized data from yesterday, this job provides the core data needed for tracking new dashboards.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/data/ui/views search="isDashboard=1 isVisible=1" \
| rename eai:acl.app as app, eai:acl.sharing as sharing , eai:acl.perms.* as acl_perms_*, eai:acl.* as acl_* , eai:* as * , title as view_name , label as view_label, embed.* as embed_* \
| eval summary_id="ssef_data_ui_views" \
| search NOT app IN (`ssef_default_apps`) NOT view_name IN (`ssef_default_views`) NOT (app=search AND view_name=search) NOT (app=launcher AND view_name=home) \
| eval Splunk_Instance = lower(splunk_server) \
| eval acl_perms_read = if(match(acl_perms_read, "\*"), "Everyone", acl_perms_read), acl_perms_write = if(match(acl_perms_write, "\*"), "Everyone", acl_perms_write) \
| `ssef_dashboard_searches_v2` \
| `ssef_index_reference(search)` \
| `ssef_sourcetype_reference(search)` \
| `ssef_source_reference(search)` \
| `ssef_eventtype_reference(search)` \
| `ssef_datamodel_reference(search)` \
| `ssef_macro_reference(search)` \
| `ssef_lookup_reference(search)` \
| `ssef_rest_reference(search)` \
| `ssef_report_reference(classic_data)` \
| `ssef_dashboard_reference(classic_data)` \
| `ssef_update_value(time_range,"0","All-Time")` \
| `ssef_update_value(time_range,"1","All-Time")` \
| `ssef_strptime_format(updated)` \
| `ssef_instance_info(Splunk_Instance)` \
| eval macro_reference = if(macro_reference = "`" OR match(macro_reference,"^cim_"), null(), macro_reference) \
| eval view_name=lower(view_name) \
| fields label name Splunk_Instance role app sharing author view_name view_label location type description search BaseSearch acl_perms acl_perms_read acl_perms_write acl_removable autoRun auto_refresh_delay dashboard_reference dashboard_size datamodel_reference embed_enabled embed_expiry eventtype_reference index_reference is_time_selector lookup_reference macro_reference panel_tag panel_title report_reference rest_reference rootNode source_reference sourcetype_reference submitButton tags time_range time_selector updated version classic_search_block \
| stats values(*) as * , LATEST(name) as name by label Splunk_Instance app sharing author view_name \
| eval num_panels = mvcount(panel_tag) \
| fields - panel_tag \
| stats values(*) as * , LATEST(name) as name by label, app, sharing, author, view_name \
| eval _time = now() \
| foreach role, Splunk_Instance, acl_perms_read, acl_perms_write, *_reference, panel_title, time_range, auto_refresh_delay \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| foreach search BaseSearch classic_search_block \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "#####") ] \
| join type=left label, app, view_name \
    [| search `ssef_summary(ssef_data_ui_views)` earliest=-3d@d latest=@d \
    | fields label, app, view_name \
    | eval view_name=lower(view_name) \
    | dedup label, app, view_name \
    | eval found_yesterday=1 ] \
| eval newly_added = if(isnull(found_yesterday), "yes", "no") \
| eval severity_level = if(newly_added="yes", 0, 1) \
| eval is4s="summary" \
| append \
    [| search `ssef_summary(ssef_data_ui_views)` earliest=-1d@d \
    | stats LATEST(*) AS * , latest(_time) as _time by label app sharing author view_name \
    | table _time label name Splunk_Instance role app sharing author view_name view_label location type description search BaseSearch acl_perms acl_perms_read acl_perms_write acl_removable autoRun auto_refresh_delay dashboard_reference dashboard_size datamodel_reference embed_enabled embed_expiry eventtype_reference index_reference is_time_selector lookup_reference macro_reference panel_title num_panels report_reference rest_reference rootNode source_reference sourcetype_reference submitButton tags time_range time_selector updated version newly_added \
    | outputlookup ssef_data_ui_views_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false ] \
| where is4s="summary" \
| table _time, label name Splunk_Instance role app sharing author view_name view_label location type description search classic_search_block BaseSearch acl_perms acl_perms_read acl_perms_write acl_removable autoRun auto_refresh_delay dashboard_reference dashboard_size datamodel_reference embed_enabled embed_expiry eventtype_reference index_reference is_time_selector lookup_reference macro_reference panel_title num_panels report_reference rest_reference rootNode source_reference sourcetype_reference submitButton tags time_range time_selector updated version newly_added severity_level \
| `ssef_handle_no_results(1,"The ssef_data_ui_views summary job completed successfully without identifying any issues, and everything is operating as expected.")`

[ssef_data_ui_views_backup]
search_name = Daily Backup of Dashboard Changes
readonly = 1
target_component = Backup Jobs
version = 1.0.6
date_created = 2024-11-6 14:40:24
date_updated = 2024-12-3 21:53:18
category = IS4S
sub_category = Backup
tags = Backup,Dashboards,REST,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = DAA4007B4078B386D13879A219F9C94F
search_author = akhamis
updated_author = akhamis
description = <p>This Splunk job runs daily to back up dashboards that have been modified in the last 24 hours. It utilizes REST API calls to identify and capture changes, storing the updated dashboards in a summary index for recovery, auditing, or version control purposes. The process ensures that any recent modifications to dashboards are securely archived and easily accessible for future reference.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/data/ui/views search="isDashboard=1" search="isVisible=1" search="disabled=0" ```search="eai:acl.removable=1"```\
| eval summary_id="ssef_data_ui_views_backup" \
| rename eai:acl.app AS app, eai:acl.sharing AS sharing, eai:data AS data \
| eval Splunk_Instance = lower(splunk_server) , author = if(author="nobody", "system", author) \
| `ssef_strptime_format(updated)` \
| eval Days_Latest_Changes = round((now() - updated) / 86400 , 0) \
| where Days_Latest_Changes < 2 \
| rename label as view_label, title as view_name\
| `ssef_instance_info(Splunk_Instance)` \
| stats \
    LAST(sharing) AS sharing\
    VALUES(role) AS role \
    LAST(author) AS author\
    LAST(view_label) AS view_label\
    LAST(description) AS description\
    LAST(updated) AS updated\
    LAST(data) AS data\
    by label Splunk_Instance app view_name \
| stats \
    VALUES(Splunk_Instance) AS Splunk_Instance \
    VALUES(role) AS role \
    LAST(sharing) AS sharing\
    LAST(author) AS author\
    LAST(view_label) AS view_label\
    LAST(description) AS description\
    LAST(updated) AS updated\
    LAST(data) AS data\
    by label, app, view_name \
| eval _time = now() \
| foreach role, Splunk_Instance \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| table _time, label, role, Splunk_Instance, app, sharing, author, view_name, view_label, description, updated, data, severity_level \
| `ssef_handle_no_results(1,"The ssef_data_ui_views_backup summary job completed successfully without identifying any issues, and everything is operating as expected.")`

