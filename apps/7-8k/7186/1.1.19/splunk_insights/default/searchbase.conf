category = Splunk
sub_category = Adoption
tags = Adoption,Details,Forwarders,Infrastructure,Support
solution = <p>This search surfaces forwarders that may require <b>upgrade, configuration adjustment, or retirement</b>.</p><p><b>Suggested Actions</b> Prioritize remediation for forwarders approaching or beyond support end dates. Validate acknowledgment settings for critical data flows and investigate high-severity entries indicating unsupported versions, architectures, or operating systems.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert assistance for forwarder upgrade planning, support compliance, and architecture optimization.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=forwarder%20inventory" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps that extend visibility into forwarder inventory, health, and compliance.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_scma_forwarders_count_and_inventory</code><br> - Collects summarized forwarder inventory, configuration, and lifecycle data.<br><b>02</b> <code>| stats latest(*)</code><br> - Consolidates the most recent state per forwarder attribute set.<br><b>03</b> <code>| ssef_severity_level_text</code><br> - Translates numeric severity into human-readable risk indicators.<br>
explanation = <p>Forwarders play a critical role in data ingestion reliability and platform stability, making their lifecycle and configuration posture essential operational concerns. This search enables administrators to quickly identify unsupported forwarder versions, operating systems, and architectures that may introduce security or reliability risks. Tracking acknowledgment usage, endpoint counts, and event throughput also supports troubleshooting data loss scenarios and validating ingestion design decisions. By correlating severity indicators with support timelines, teams can prioritize remediation efforts, plan upgrades, and maintain compliance with Splunk support policies.</p>
quid = 3FDF1B0E045DD9EF4DD4D2CCD2740621
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/deploy-and-manage/forwarders" target="_blank">Splunk Help: Forwarder Deployment</a><br>Official guidance on deploying and managing Splunk forwarders.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/upgrade-splunk-enterprise" target="_blank">Splunk Help: Upgrade Planning</a><br>Best practices for planning Splunk upgrades, including forwarders.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=forwarder%20support" target="_blank">Splunk Docs: Forwarder Support Searches</a><br>Search patterns for monitoring forwarder support status.</li><li><a href="https://community.splunk.com/t5/Deployment-Architecture/bd-p/deployment-architecture" target="_blank">Community: Deployment Architecture</a><br>Peer discussions on forwarder architecture and lifecycle management.</li></ul>
description = <p>This search provides a <b>comprehensive inventory</b> of Splunk forwarders with focus on <b>support lifecycle, configuration posture, and risk indicators</b>.</p><p>It highlights forwarder versions, acknowledgment usage, endpoint counts, and support timelines to help identify <b>unsupported or at-risk deployments</b>.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_scma_forwarders_count_and_inventory)` \
| fields _time destPort version useACK fwdType message severity_level unique_forwarders total_forwarders events forwarder_cloud_versions forwarder_support_end_date_epoch heavy_forwarder_support_end_date months_remaining_in_support univeral_forwarder_full_support_end_date universal_forwarder_p3_support_end_date fwd_os fwd_arch unique_endpoints unique_endpoints_relaxed unique_sourcetypes unsupported_count ack_sum \
| fillnull value="other" destPort, version, fwdType, useACK \
| stats latest(*) as * latest(_time) as _time latest(severity_level) as severity_level by destPort, version, fwdType, useACK \
| sort - severity_level \
| `ssef_severity_level_text(severity_level)` \
| rename severity_text as Severity \
| convert ctime(_time) \
| table _time destPort version useACK fwdType message severity_level unique_forwarders total_forwarders events forwarder_cloud_versions forwarder_support_end_date_epoch heavy_forwarder_support_end_date months_remaining_in_support univeral_forwarder_full_support_end_date universal_forwarder_p3_support_end_date fwd_os fwd_arch unique_endpoints unique_endpoints_relaxed unique_sourcetypes unsupported_count ack_sum \
| sort unique_endpoints \
| rename destPort as "Destination Port", version as "Version", useACK as "Use Acknowledgment", fwdType as "Forwarder Type", message as "Message", unique_forwarders as "# of FWD Endpoints", total_forwarders as "Total Forwarders", events as "# of Events", forwarder_cloud_versions as "Forwarder Cloud Versions", forwarder_support_end_date_epoch as "Forwarder Support End Date (Epoch)", heavy_forwarder_support_end_date as "Heavy Forwarder Support End Date", months_remaining_in_support as "Months Remaining in Support", univeral_forwarder_full_support_end_date as "Universal Forwarder Full Support End Date", universal_forwarder_p3_support_end_date as "Universal Forwarder Priority 3 Support End Date", fwd_os as "Forwarder OS", fwd_arch as "Forwarder Architecture", unique_endpoints as "Total # of Endpoints", unique_sourcetypes as "Unique Source Types", unsupported_count as "Unsupported Count", ack_sum as "Total using Acknowledgment"

