[ssef_scma_licensing_current_volumes]
search_name = Ingestion in the Past 30 Days
readonly = 1
target_component = Licensing
version = 1.0.1
date_updated = 2024-4-9 9:28:22
category = Splunk
sub_category = Licensing
tags = Access,Ingestion,Licensing,SCMA,Summary
dispatch_earliest_time = -30d@d
dispatch_latest_time = @d
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = 92FAAC144ACBDE0E1D1441DCB7A228A7
updated_author = akhamis
related_info = <div class="diag-content-box">\
 <div class="diag-content"><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/TypesofSplunklicenses" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/Admin/TypesofSplunklicenses</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div>\
 </div>
severity_normal_text = <br/><p>License usage remains within normal parameters and does not surpass the daily license allocation.</p>
severity_medium_text = <br/><p>The customer is consuming more Splunk than licensed for. Please work with the account team to right size your Splunk license.</p>
description = <p>This displays the amount of data the customer has indexed in the last 30 days. From this, we can determine whether the customer needs to buy a larger license to move to Splunk Cloud.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = `ssef_summary(ssef_internal_license_rollover_summary)` \
| eval summary_id="ssef_scma_licensing_current_volumes" \
| bin _time span=1h \
| stats max(License_Usage) AS License_Usage LATEST(Lic_Stack_Size) AS Lic_Stack_Size by _time label, Lic_Pool \
| bin _time span=1d \
| stats sum(License_Usage) AS License_Usage LATEST(Lic_Stack_Size) AS Lic_Stack_Size by _time label, Lic_Pool \
| eval stacksz = if(match(Lic_Pool,"enterprise"), Lic_Stack_Size, 0) \
| stats sum(License_Usage) AS b max(stacksz) as stacksz by _time \
| eval stacksz=round(stacksz/1024/1024/1024) \
| eval daily_volume_gb = round(b/1024/1024/1024,2) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( daily_volume_gb > stacksz, medium, true(), normal ) \
| table _time b daily_volume_gb stacksz severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_licensing_current_volumes summary job completed successfully without identifying any issues, and everything is operating as expected.")`

