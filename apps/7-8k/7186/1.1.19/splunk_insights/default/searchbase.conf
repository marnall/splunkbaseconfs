[ssef_scma_precheck_unconfigured_mc_instances]
search_name = Unconfigured Monitoring Console Instances
readonly = 1
target_component = Infra & Arch
version = 1.0.1
date_created = 2022-09-14
date_updated = 2024-4-9 9:28:22
category = Splunk
sub_category = Indexing
tags = Environment,REST,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = CF87D1E78FE5D407676FF0C4FB070118
updated_author = akhamis
related_info = <div class="diag-content-box"><div class="diag-content"> <a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/latest/DMC/DMCprerequisites" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/DMC/DMCprerequisites</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div></div>
severity_normal_text = <br/><p>No Unconfigured Monitoring Console Instances were detected; everything appears to be functioning normally.</p>
severity_medium_text = <br/><p>Detected multiple Unconfigured Monitoring Console Instances. Recommend fixing the issues with these instances.</p>
description = <p>This checks the status of distributed peers to ensure all of them are properly configured to desired role within the Monitoring Console.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Search groups match "dmc_group_*" or "dmc_customgroup_*".</li>\
<li><strong>Normal:</strong> Search groups do not match the above.</li>\
</ul>
search = | rest splunk_server=local `ssef_rest_timeout` /services/search/distributed/peers search="status=Up disabled=0" \
| eval summary_id="ssef_scma_precheck_unconfigured_mc_instances" \
| fields title, peerName, host, host_fqdn, guid server_roles search_groups cpu_arch os_name numberOfCores physicalMemoryMB version \
| eval instance=coalesce(title, peerName, host_fqdn, host) \
| `ssef_instance_info(host)` \
| rename numberOfCores AS cpu_count physicalMemoryMB AS mem version AS splunk_version server_roles AS inherited_server_roles \
| eval role = mvjoin(mvsort(search_groups), ":") , inherited_server_roles = mvjoin(mvsort(inherited_server_roles), ":") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( isnull(mvfind(search_groups,"dmc_group_|dmc_customgroup_")), medium, true(), normal ) \
| table label name splunk_version inherited_server_roles cpu_arch os_name cpu_count mem role severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_precheck_unconfigured_mc_instances summary job completed successfully without identifying any issues, and everything is operating as expected.")`

