[ssef_ia4s_indexing_queue_latency]
search_name = Storage I/O Latency
readonly = 1
target_component = Indexing
version = 2.0.3
date_updated = 2026-2-14 14:7:41
category = Splunk
sub_category = Indexing
tags = IOStats,Indexing,Latency,Queue
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = CF38AF478D2B5EE53D6E80FFAD37D66F
updated_author = khutchinson
related_info = <ul>\
\
<li><a href="https://community.splunk.com/t5/Deployment-Architecture/Dealing-with-Storage-I-O-Latency-in-Splunk/m-p/469524" target="_blank">Splunk Answers - Storage I/O Latency Issues and Solutions</a></li>\
\
<li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/storage%20performance" target="_blank">Splunkbase - Apps for Monitoring Storage Performance</a></li>\
</ul>
severity_normal_text = <br/><p>I/O latency is within expected ranges, indicating healthy indexing and storage operations. Regular monitoring should continue to maintain this state and preempt any potential latency issues.</p>
severity_low_text = <br/><p>Slight increase in I/O latency identified, which may not currently impact performance significantly but could indicate emerging issues. Monitoring and minor adjustments recommended to ensure optimal operation.</p>
severity_medium_text = <br/><p>Moderate I/O latency detected, suggesting potential inefficiencies in data handling that may affect indexing speed and overall system performance. Analysis of system and storage resources is advised to identify optimization opportunities.</p>
severity_high_text = <br/><p>High I/O latency observed, indicating notable delays in data processing that could lead to indexing backlogs and performance issues. Prompt investigation and adjustments to storage performance or configuration are recommended.</p>
severity_critical_text = <br/><p>Excessive I/O latency has been detected, severely impacting indexing efficiency and data availability. Immediate action is required to diagnose and resolve underlying storage or system issues to prevent data loss or significant performance degradation.</p>
description = <p>Measures <b>indexing queue latency</b> using <b>IOStats</b> telemetry from <b>_introspection</b>. Calculates the percentage of time devices experience elevated time in queue, highlighting potential <b>disk I/O contention</b> impacting indexing performance.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Critical:</strong> I/O latency > 75</li>\
<li><strong>High:</strong> I/O latency > 25 <= 75</li>\
<li><strong>Medium:</strong> I/O latency >= 25</li>\
<li><strong>Low:</strong> I/O latency >= 1</li>\
<li><strong>Normal:</strong> I/O latency <= 1</li>\
</ul>
explanation = <p>This search leverages introspection resource usage metrics to calculate I/O latency by subtracting service time from total time, isolating time spent waiting in the queue. It identifies elevated queue conditions (latency &gt; 8ms), computes the percentage of affected intervals, and aggregates daily averages per indexer and device. Sustained elevated queue time can indicate storage bottlenecks, undersized IOPS capacity, RAID/cache contention, virtualization constraints, or noisy neighbor workloads. Monitoring this KPI supports proactive indexing performance management and infrastructure right-sizing.</p>
execution_plan = <b>01</b> <code>| tstats ... component=IOStats ...</code><br> - Pull IO statistics from introspection summaries at 1-minute granularity.<br><b>02</b> <code>| eval io_latency = avg_total_ms - avg_service_ms</code><br> - Derive time spent waiting in I/O queue.<br><b>03</b> <code>| eval has_elevated_time_in_queue=if(io_latency&gt;8,1,0)</code><br> - Flag elevated queue latency intervals.<br><b>04</b> <code>| bucket span=30m | stats ...</code><br> - Aggregate short-term intervals to compute percentage of elevated queue time.<br><b>05</b> <code>| bin span=1d | stats avg(pct_elevated_time_in_queue)</code><br> - Calculate daily average percentage of elevated queue time per device.<br><b>06</b> <code>| eval severity_level=case(...)</code><br> - Classify indexing latency severity.
solution = <p>This KPI identifies indexers and devices experiencing sustained queue latency, which may degrade ingestion throughput and increase indexing delay.</p><p><b>Suggested Actions</b>: Validate storage IOPS capacity, review RAID configuration and disk health, assess virtualization resource contention, confirm storage latency SLAs, and evaluate scaling indexer count or storage tier performance.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(pct_elevated_time_in_queue&gt;=75,4,pct_elevated_time_in_queue&gt;=25,3,pct_elevated_time_in_queue&gt;=1,2,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise.html" target="_blank">Products: Splunk Enterprise</a><br>Platform architecture and scaling guidance for indexing performance optimization.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utility Apps</a><br>Tools for monitoring indexer health and infrastructure performance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=indexing%20performance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps focused on indexing throughput, latency analysis, and infrastructure monitoring.</li></ul></p>
related_info = <ul><li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/storage%20performance" target="_blank">Splunkbase - Apps for Monitoring Storage Performance</a></li><li><a href="https://community.splunk.com/t5/Deployment-Architecture/Dealing-with-Storage-I-O-Latency-in-Splunk/m-p/469524" target="_blank">Splunk Answers - Storage I/O Latency Issues and Solutions</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/Investigateperformanceissues" target="_blank">Splunk Docs: Investigate Performance Issues</a><br>Guidance on diagnosing indexing and storage bottlenecks.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Introspectionabout" target="_blank">Splunk Docs: About Introspection Logs</a><br>Overview of introspection data sources used in this KPI.</li></ul>
viz_options = { "count":100 }
search = | tstats summariesonly=true count max(data.avg_total_ms) as avg_total_ms max(data.avg_service_ms) as avg_service_ms WHERE index=_introspection sourcetype=splunk_resource_usage component=IOStats by _time span=1m host data.device \
| eval summary_id="ssef_ia4s_indexing_queue_latency" \
| rename data.device as device \
| `ssef_instance_info(host)` \
| where role="indexer" \
| eval io_latency = avg_total_ms - avg_service_ms \
| eval has_elevated_time_in_queue=if(io_latency>8,1,0) \
| bucket span=30m _time \
| stats count sum(has_elevated_time_in_queue) AS has_elevated_time_in_queue latest(*) as * by _time label host device \
| eval pct_elevated_time_in_queue=round((has_elevated_time_in_queue/count)*100,2) \
| bin _time span=1d \
| stats avg(pct_elevated_time_in_queue) AS pct_elevated_time_in_queue latest(*) as * by _time label host device \
| rename host as indexer \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( pct_elevated_time_in_queue>=76, critical, pct_elevated_time_in_queue>=75, high, pct_elevated_time_in_queue>=25, medium, pct_elevated_time_in_queue>=1, low, true(), normal) \
| table _time label indexer device pct_elevated_time_in_queue io_latency severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_indexing_queue_latency summary job completed successfully without identifying any issues, and everything is operating as expected.")`

