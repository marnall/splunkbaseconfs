[mc_incorrect_tls_protocol_version_check]
search_name = Incorrect TLS Protocol Versions
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Upgrade Checks
version = 1.0.1
date_updated = 2025-8-18 14:46:44
category = Health Check
sub_category = Security
tags = Configuration,Health Check,Monitoring Console,SSL,Splunk 10,Summary,Upgrade
solution = Verify that the client initiates TLS connections using TLS version 1.2. If it does not, update the client configuration. On the Splunk platform instance, verify that the 'sslVersions' in the respective configuration file stanza has a value of "tls1.2".
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = C409C2E58595D1B5C1222A755217945A
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because it and a peer did not share a common TLS version during the protocol message exchange.
severity_high_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because it and a peer did not share a common TLS version during the protocol message exchange.
description = Evaluates for the presence of any events which indicate that a TLS handshake was attempted where the server and client do not share a common TLS version in the last hour, and marks as Critical if any are present.
search = index=_internal source=*splunkd.log* ("Received fatal SSL3 alert" AND "alert_description='protocol version'") OR "SSL23_GET_CLIENT_HELLO:unknown protocol" earliest=-60m \
| eval summary_id="mc_incorrect_tls_protocol_version_check" \
| stats count AS sixty_min_event_count by host \
| eval alerts = mvjoin(alerts, ", ") \
| eval severity_level = 3 \
| table host, sixty_min_event_count, severity_level \
| rename host as instance \
| table instance, sixty_min_event_count, severity_level \
| append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance sixty_min_event_count severity_level] \
| stats sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance \
| eval severity_level=if(severity_level=0, 1, severity_level) \
| `ssef_handle_no_results(1,"The mc_incorrect_tls_protocol_version_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

