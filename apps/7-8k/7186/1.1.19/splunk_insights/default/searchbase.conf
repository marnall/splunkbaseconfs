search_name = Daily Ingestion Metrics (Average, Max, Min, Weekday vs. Weekend)
readonly = 1
diagnostic_searches = ssef_internal_index_license_usage
version = 1.0.5
date_created = 2024-8-16 22:38:49
date_updated = 2024-8-16 22:38:49
category = Splunk
sub_category = Licensing
tags = Ingestion,KPIs,Licensing
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 8FFB37821AA17030BCC29A2992D8492E
updated_author = akhamis
description = <p>Daily Ingestion Metrics (Average, Max, Min, Weekday vs. Weekend)</p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_internal_index_license_usage)` Lic_Pool!="auto_generated_pool_fixed-sourcetype*" \
| fields _time, label, Lic_Pool, Lic_Pool_Size, type, Index_Name, Lic_Sourcetype, Lic_Source, Lic_Host, License_Usage, Indexer_GUID \
| timechart partial=t fixedrange=t span=1h sum(eval(License_Usage/1024/1024/1024)) AS gb \
| bucket span=1d _time \
| stats sum(gb) AS gb by _time \
| eval wday=strftime(_time,"%a") \
| stats avg(gb) AS "Daily Average", max(gb) AS "Daily Max", min(gb) AS "Daily Min", avg(eval(if(match(wday,"^S"),gb,null()))) AS "Weekend Average", avg(eval(if(!match(wday,"^S"),gb,null()))) AS "Weekday Average" \
| transpose \
| rename column AS Period, "row 1" AS "Volume"

