[preflight_instance_job_error_analysis]
search_name = IS4S Instance Job Error analysis
readonly = 1
search_hidden = 1
date_created = 2025-7-8 16:30:50
date_updated = 2025-7-10 15:49:24
category = IS4S
sub_category = Preflight Checks
tags = Preflight
dispatch_earliest_time = -4h@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 22B54E10ABE436698C3E7640D1FAED85
updated_author = akhamis
description = <p>This Preflight Check analyzes recent failed search jobs on the local Splunk instance to identify error trends and assess overall environment stability prior to an IS4S installation. It aggregates error counts, highlights error messages, and calculates key metrics such as run duration and time range. If the total number of errors exceeds a set threshold, the check flags the environment as unstable and not ready for IS4S deployment. This helps ensure installations are only performed in stable and healthy environments.</p>
search = | rest /services/search/jobs splunk_server=local search="dispatchState=FAILED" \
| rename eai:acl.* AS * \
| rename eai:* AS * \
| rename messages.error AS error_messages, messages.fatal AS fatal_messages, messages.info AS info_messages, messages.warn AS warn_messages \
| eval error_messages = mvdedup(mvappend(error_messages, fatal_messages)) \
| eval searchLatestTime=round(searchLatestTime) , searchEarliestTime=round(searchEarliestTime) \
| eval time_range_days = (searchLatestTime - searchEarliestTime) / 86400 , runDuration=round(runDuration,2) \
| fillnull value="" \
| stats count as num_errors max(*) as * by provenance label error_messages \
| eventstats sum(num_errors) as total_errors \
| fields splunk_server app owner provenance label num_errors total_errors searchEarliestTime searchLatestTime time_range_days runDuration error_messages \
| eval threshold = 1000 \
| eval message=if(total_errors > threshold, \
    "Environment status: UNSTABLE - High number of search-related errors detected. IS4S installation is NOT recommended until issues are resolved.", \
    "Environment status: STABLE - Search-related errors are within acceptable limits. IS4S installation can proceed.") \
| eval severity_level = if(total_errors > threshold, 2, 0) \
| table splunk_server app owner provenance label num_errors total_errors searchEarliestTime searchLatestTime time_range_days runDuration error_messages message severity_level

[preflight_is4s_server_is_stable]
search_name = IS4S Environment Readiness Pre-Flight Check
readonly = 1
search_hidden = 1
version = 1.1.2
date_created = 2025-7-8 12:3:31
date_updated = 2025-11-30 12:6:55
category = IS4S
sub_category = Preflight Checks
tags = Health,Preflight
solution = <p>Another useful approach is to monitor the level of queuing occurring in the environment. A high number of queued searches can indicate that the environment is overwhelmed, in which case it’s best to delay configuring anything new until the system stabilizes.</p><p>Here’s a sample SPL query you can use to assess queuing activity over the past 7 days:</p><div spellcheck="false" class="ql-code-block-container"><div data-language="plain" class="ql-code-block">index=_internal sourcetype=splunkd component=DispatchManager reason=* earliest=-7d </div><div data-language="plain" class="ql-code-block">| fields _time host username concurrency_* provenance reason search_id </div><div data-language="plain" class="ql-code-block">| stats max(concurrency_*) as concurrency_* dc(provenance) as num_provenance dc(username) as num_users dc(search_id) as num_messages by reason </div><div data-language="plain" class="ql-code-block">| eventstats sum(num_messages) as total_messages</div></div><p>This query helps you:</p><ol><li data-list="bullet"><span class="ql-ui"></span>Identify the maximum concurrency by reason.</li><li data-list="bullet"><span class="ql-ui"></span>See the number of unique users and provenance sources.</li><li data-list="bullet"><span class="ql-ui"></span>Measure how many searches have been queued, both by reason and in total.</li></ol><p>If you notice consistently high queue counts, it’s a sign that the environment is under heavy load and you should hold off on making additional configuration changes until things improve</p>
dispatch_earliest_time = -4h@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = D6DE73D1741FF24432197B1C8CC02847
updated_author = akhamis
description = <p>This Splunk preflight check evaluates the readiness of the environment for IS4S installation by detecting error-prone conditions, measuring Splunk search response times, and identifying instability or slowness. It flags hosts with high error rates or slow search performance to ensure IS4S is deployed only in stable and performant environments.</p>
search = index=_internal sourcetype=splunkd source="*health.log" color=red indicator=*search* NOT indicator IN (cluster_search_factor,data_searchable) earliest=-4h \
| fields _time host component feature indicator reason \
| fillnull value="" component feature indicator reason \
| stats count as num_messages latest(reason) as reason by feature indicator \
| eval threshold=1000 \
| eval message = case(num_messages > threshold, \
    "Environment status: UNSTABLE - High number of search-related errors detected. IS4S installation is NOT recommended until issues are resolved.", \
    true(), "Environment status: STABLE - Search-related errors are within acceptable limits. IS4S installation can proceed.") \
| eval severity_level = if(num_messages > threshold, 3, 0) \
| table feature indicator num_messages reason component message threshold severity_level

