dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = CC8BDEB9D0B1CCE1D4FC6D47689E15FF
updated_author = akhamis
severity_normal_text = <br/><p>This search is NORMAL when license usage is below 80%, indicating healthy compliance.</p>
severity_medium_text = <br/><p>This search is MEDIUM if license usage reaches 80% to 90%, suggesting close monitoring is needed.</p>
severity_high_text = <br/><p>This search is HIGH if license usage is 95% or above, signaling an imminent risk of license violation.</p>
severity_critical_text = <br/><p>This search becomes CRITICAL when license usage is 100% or more, indicating a license violation.</p>
description = <p>Evaluates <b>enterprise license rollover utilization</b> and calculates daily percentage consumption relative to stack capacity. Highlights thresholds approaching or exceeding license limits to support <b>proactive compliance management</b>.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Critical:</strong> When 100% or more of the license is used.</li>\
<li><strong>High:</strong> When 90% to 99% of the license is used.</li>\
<li><strong>Medium:</strong> When 85% to 90% of the license is used.</li>\
<li><strong>Normal:</strong> When the license utilization is below 85%.</li>\
</ul>
explanation = <p>This search consumes the internal license rollover summary dataset and filters for enterprise license pools. It converts stack size and usage into gigabytes, aggregates daily maximum usage, and calculates percentage consumption relative to total stack capacity. Severity levels are assigned based on utilization thresholds to help identify environments nearing or exceeding licensed ingest limits. Monitoring daily rollover utilization ensures compliance visibility and prevents unexpected overage violations.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_internal_license_rollover_summary)`</code><br> - Retrieve summarized rollover license data.<br><b>02</b> <code>| where match(Lic_Pool,"enterprise")</code><br> - Filter for enterprise license pools only.<br><b>03</b> <code>| eval stacksz_gb / License_Usage</code><br> - Convert stack size and usage to gigabytes.<br><b>04</b> <code>| stats ... by _time</code><br> - Aggregate daily maximum usage and total stack size.<br><b>05</b> <code>| eval pct_used=...</code><br> - Calculate percentage of license stack consumed and assign severity.
solution = <p>This KPI provides a clear daily indicator of enterprise license utilization against stack capacity.</p><p><b>Suggested Actions</b>: Investigate sustained utilization above 85%, validate ingest routing, remove unnecessary data sources, optimize filtering at forwarders, and coordinate license expansion before exceeding contractual limits.</p>
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/AboutSplunksLicenseUsageReportView" target="_blank">License Usage Report View</a></li><li><a href="https://community.splunk.com/t5/Monitoring-Splunk/License-Usage-Monitoring/m-p/428949" target="_blank">Splunk Answers - License Usage Monitoring</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Aboutlicenseviolations" target="_blank">Splunk Docs - About Splunk License Violations</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/MonitoringSplunklicenses" target="_blank">Splunk Docs - License Monitoring</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/manage-licenses/view-license-usage-details" target="_blank">Splunk Help: View license usage details</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/manage-licenses/about-splunk-enterprise-licenses" target="_blank">Splunk Help: About Splunk Enterprise licenses</a></li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_internal_license_rollover_summary)` \
| eval summary_id="ssef_internal_license_rollover_summary_status" \
| fields _time, label, Lic_Pool, type, Lic_Stack_Size, License_Usage , Indexer_GUID \
```| where match(Lic_Pool,"enterprise") ```\
| eval stacksz_gb = round(Lic_Stack_Size/1024/1024/1024) \
| eval License_Usage=License_Usage/1024/1024/1024 \
| bin _time span=1d \
| stats max(License_Usage) AS License_Usage latest(stacksz_gb) AS stacksz_gb by _time label, Lic_Pool \
| stats max(stacksz_gb) AS stacksz_gb sum(License_Usage) AS License_Usage by _time Lic_Pool \
| stats sum(stacksz_gb) AS stacksz_gb sum(License_Usage) AS License_Usage by _time \
| eval pct_used=round((License_Usage/stacksz_gb)*100,2) , License_Usage=round(License_Usage)\
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( pct_used >= 100, critical, pct_used >= 90, high, pct_used >= 85, medium, true(), normal ) \
| table _time License_Usage severity_level pct_used stacksz_gb \
| `ssef_handle_no_results(1,"The ssef_internal_license_rollover_summary_status summary job completed successfully without identifying any issues, and everything is operating as expected.")`

