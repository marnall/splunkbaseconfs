| stats values(object) as objects max(num_objects) as num_objects latest(severity_level) as severity_level by label conf app \
| sort - severity_level \
| `ssef_severity_level_text(severity_level)` \
| table label conf app objects num_objects severity_text \
| rename severity_text as Severity

[ssef_scma_search_provisioning_lookups]
search_name = Searching Lookup file creation by a custom search command
readonly = 1
target_component = Search & Visualization
category = Splunk
sub_category = Search
tags = REST,SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 0D7F5B0A35E0ADE287F71992E4FC6040
severity_normal_text = <br/><p>The check results indicate you are compatible with the limit set in the "Splunk Cloud Service Description" and therefore a candidate for migration.</p>
severity_medium_text = <br/><p>Scheduled jobs generating lookup files with custom search commands have been identified. Please review these jobs to ensure they are correctly configured and operating as intended.</p>
description = <p>The check finds scheduled jobs that generates lookup files using custom search commands.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = | rest `ssef_rest_timeout` splunk_server=* /servicesNS/-/-/saved/searches search="eai:acl.app!=splunk_monitoring_console" search="eai:acl.app!=splunk_instrumentation" search="is_scheduled=1" search="disabled=0" \
| eval summary_id="ssef_scma_search_provisioning_lookups" \
| where match(search,"mcollect\s+|collect\s+|meventcollect\s+|tscollect\s+|outputlookup\s+|outputcsv\s+") OR isnotnull(action.lookup.filename) \
| rename eai:acl.app as app, title as savedsearch_name \
| fields splunk_server app owner savedsearch_name search action.lookup.filename actions \
| rex max_match=0 field=search "\|\s*(?<non_core_command>\w+?)\s" \
| mvexpand non_core_command \
| eval is_core_command = if(match(non_core_command, "^abstract$|^accum$|^addcoltotals$|^addinfo$|^addtotals$|^analyzefields$|^anomalies$|^anomalousvalue$|^anomalydetection$|^append$|^appendcols$|^appendpipe$|^arules$|^associate$|^audit$|^autoregress$|^awssnsalert$|^bin$|^bucket$|^bucketdir$|^chart$|^cluster$|^cofilter$|^collapse$|^collect$|^concurrency$|^contingency$|^convert$|^correlate$|^ctable$|^datamodel$|^datamodelsimple$|^dbinspect$|^dbxquery$|^dedup$|^delete$|^delta$|^diff$|^dump$|^entitymerge$|^erex$|^eval$|^eventcount$|^eventstats$|^extract$|^fieldformat$|^fields$|^fieldsummary$|^filldown$|^fillnull$|^findkeywords$|^findtypes$|^folderize$|^foreach$|^format$|^from$|^fromjson$|^gauge$|^gentimes$|^geom$|^geomfilter$|^geostats$|^head$|^highlight$|^history$|^iconify$|^inputcsv$|^inputintelligence$|^outputlookup$|^inputlookup$|^iplocation$|^join$|^kmeans$|^kvform$|^loadjob$|^localize$|^localop$|^lookup$|^makecontinuous$|^makejson$|^makemv$|^makeresults$|^map$|^mcatalog$|^mcollect$|^metadata$|^metasearch$|^meventcollect$|^mpreview$|^msearch$|^mstats$|^multikv$|^multisearch$|^mvcombine$|^mvexpand$|^nomv$|^noop$|^outlier$|^outputcsv$|^outputtext$|^overlap$|^pivot$|^predict$|^prjob$|^rangemap$|^rare$|^redistribute$|^regex$|^reltime$|^rename$|^replace$|^require$|^rest$|^return$|^reverse$|^rex$|^rtorder$|^run$|^runshellscript$|^savedsearch$|^script$|^scrub$|^search$|^searchtxn$|^selfjoin$|^sendalert$|^sendemail$|^set$|^setfields$|^sichart$|^sirare$|^sistats$|^sitimechart$|^sitop$|^snowevent$|^snoweventstream$|^snowincident$|^snowincidentstream$|^sort$|^spath$|^stats$|^strcat$|^streamstats$|^table$|^tags$|^tail$|^timechart$|^timewrap$|^tojson$|^top$|^transaction$|^transpose$|^trendline$|^tscollect$|^tstats$|^typeahead$|^typelearner$|^typer$|^union$|^uniq$|^untable$|^walklex$|^where$|^x11$|^xmlkv$|^xmlunescape$|^xpath$|^xyseries$|^esssequence$|^setretiredentities$|^mitremap$|^logResults$|^generateiit$|^fit$|^expandtoken$|^dnstwist$|^mad$|^getsysinfo$|^bundlefiles$"), 1, 0) \
| where is_core_command = 0 \
| `ssef_instance_info(splunk_server)` \
| stats values(non_core_command) as non_core_command values(app) as app values(action.lookup.filename) as lookup_filename values(search) as search values(eai:acl.owner) as owner values(splunk_server) as splunk_server values(actions) as actions last(name) as name by label, savedsearch_name \
| foreach actions,app,lookup_filename,non_core_command \
    [| eval <<FIELD>> = mvjoin(<<FIELD>>, ",") ] \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( isnotnull(non_core_command), medium, true(), normal ) \
| table label name app savedsearch_name actions lookup_filename non_core_command severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_provisioning_lookups summary job completed successfully without identifying any issues, and everything is operating as expected.")`

