solution = <p>This search reveals how indexed sourcetypes align with technical and analytic capabilities across categories and domains, helping validate data onboarding and enrichment quality.</p><p><b>Suggested Actions</b>: Validate sourcetype coverage across business domains. Ensure enrichment lookups are current and mappings are complete. Investigate underrepresented categories and prioritize onboarding accordingly.</p><p><b>Recommended For You:</b><ul><li><a href="https://splunkbase.splunk.com/app/833" target="_blank">Splunkbase: Splunk Add-On for Unix and Linux</a><br>Support for host- and syslog-based data sourcetypes.</li><li><a href="https://splunkbase.splunk.com/app/3110" target="_blank">Splunkbase: Splunk Add-On for Microsoft Cloud Services</a><br>Improves domain classification for Microsoft source mappings.</li><li><a href="https://splunkbase.splunk.com/app/3088" target="_blank">Splunkbase: Splunk Add-On for Google Cloud Platform</a><br>Provides GCP sourcetype support for domain/categorization use.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=data%20source%20inventory" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps that help inventory and classify indexed sourcetypes.</li></ul></p>
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| fields _time orig_index orig_sourcetype dc_host dc_source event_count severity_level newly_added</code><br> - Select key metadata fields relevant for analysis.<br><b>02</b> <code>| bin _time span=1d</code><br> - Aggregate event data into daily buckets.<br><b>03</b> <code>| stats count by _time orig_sourcetype</code><br> - Count events per sourcetype per day.<br><b>04</b> <code>| rename orig_sourcetype as sourcetype</code><br> - Normalize sourcetype field name.<br><b>05</b> <code>| lookup uce_custom_sourcetype_mapping...</code><br> - Enrich sourcetype with domain/category/data_type metadata.<br><b>06</b> <code>| lookup uce_sourcetype_mapping...</code><br> - Provide fallback enrichment where custom mapping is missing.<br><b>07</b> <code>| eval sourcetype_category=split(...)</code><br> - Normalize multivalue category/domain fields.<br><b>08</b> <code>| stats values(*) as * by sourcetype data_type</code><br> - Aggregate by sourcetype and data_type.<br><b>09</b> <code>| lookup uce_usecase_mapping data_type...</code><br> - Map data types to business-aligned use cases.<br><b>10</b> <code>| eval use_case=mvdedup(use_case)</code><br> - Deduplicate use cases per sourcetype.<br><b>11</b> <code>| stats values(*) as * by sourcetype use_case</code><br> - Group enriched results by use case.<br><b>12</b> <code>| lookup uce_usecase_mapping use_case...</code><br> - Enrich use case with domain, type, and category.<br><b>13</b> <code>| eval use_case_type=mvdedup(...)</code><br> - Resolve use case type deduplication.<br><b>14</b> <code>| eval domain = mvdedup(coalesce(...))</code><br> - Consolidate domain attribution from multiple sources.<br><b>15</b> <code>| eval category = mvdedup(coalesce(...))</code><br> - Consolidate category attribution.<br><b>16</b> <code>| eval use_case_name = if(match(...))</code><br> - Identify only valid use case types.<br><b>17</b> <code>| stats sum(...) as num_Analytic_Capabilities ...</code><br> - Aggregate use case counts by domain and category.<br><b>18</b> <code>| chart sum(...) over category by domain</code><br> - Pivot view to visualize capability coverage.<br>
explanation = <p>This search offers operational insight into what types of data are being indexed and how they map to business-aligned use cases. It supports platform owners and data analysts in identifying coverage gaps, prioritizing onboarding, and ensuring sourcetypes are aligned with analytic and technical capabilities. The output supports capacity planning, improves metadata accuracy, and helps maintain lookup hygiene across data inventories.</p>
