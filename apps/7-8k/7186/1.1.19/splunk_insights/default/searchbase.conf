description = <p>Tracking active Splunk user activity by categories of use (e.g., Security, Observability, Platform) provides insights into how users engage with the platform`s core features. This helps identify high-value use cases, monitor adoption trends, and detect underutilized areas. Understanding this activity ensures the customer is leveraging Splunk effectively, maximizing their return on investment, and addressing any potential gaps in usage.</p>
default_viz = splunk.pie
viz_options = {  "showDonutHole": true, "seriesColors": ["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"], "labelDisplay": "valuesAndPercentage"  }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) search_type="*adhoc*" \
| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
| fields _time user app label name num_searches latest_logon latest_search total_search_time session search_type sourcetype_reference \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| rename sourcetype_reference as sourcetype_name \
| eval sourcetype_name=split(sourcetype_name,"|") \
| stats count by _time, user, sourcetype_name \
| where match(sourcetype_name, "^[^<>?&#]+$") AND NOT match(sourcetype_name, "[\"'`*]|-too_small|itsi_internal_log|itsi_notable|itsi_license_checker") \
| `ssef_sourcetype_mapping(sourcetype_name)` \
| rename domain as sourcetype_domain \
| `ssef_usecase_mapping(data_type)` \
| eval sourcetype_domain=split(sourcetype_domain,"|") \
| stats count values(sourcetype_domain) as sourcetype_domain by _time, user, use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT domain as use_case_domain \
| eval use_case_domain=mvdedup(use_case_domain) \
| eval domain = mvdedup(mvappend(use_case_domain, sourcetype_domain)) \
| fillnull value="Unclassified" domain \
| timechart partial=t fixedrange=t dc(user) as "Active Users by Domain" by domain

