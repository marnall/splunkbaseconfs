[mc_common_name_mismatch_check]
search_name = Certificate Common Name Mismatches
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Upgrade Checks
version = 1.0.1
date_updated = 2025-7-8 9:13:28
category = Health Check
sub_category = Security
tags = Health Check,Monitoring Console,SSL,Splunk 10,Summary,Upgrade
solution = Review the value for the 'sslCommonNameToCheck' setting in the configuration stanza that corresponds to the channel that produces this error. Next, verify the CN of the certificate that is presented in the TLS handshake. These values must match. If they do not, then configure the 'sslCommonNameToCheck' value to match the certificate CN or replace the certificate with one that has a CN that matches the value for 'sslCommonNameToCheck'.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = C965ECD75ABD10C98A99A6A14AAB80ED
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because it received a certificate with a common name (CN) that did not match the value it expected.
description = Evaluates for the presence of any events which indicate a certificate common name mismatch during certificate name validation in the last hour, and marks as Critical if any are present.
search = index=_internal source=*splunkd.log* "X509 certificate" "did not match any allowed names" earliest=-60m \
| eval summary_id="mc_common_name_mismatch_check" \
| rex "CN=(?<common_name>[^)]+).*allowed names \((?<allowed_names>[^)]+)\)" \
| eval observed_cn_vs_allowed = "{CN: " . common_name . "; Allowed CNs: " . allowed_names . "}" \
| stats values(observed_cn_vs_allowed) AS observed_cns_vs_allowed by host \
| eval observed_cns_vs_allowed = mvjoin(observed_cns_vs_allowed, ", ") \
| eval severity_level = 3 \
| table host, observed_cns_vs_allowed, severity_level \
| rename host as instance \
| append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level \
    | fillnull value="" observed_cns_vs_allowed \
    | table instance observed_cns_vs_allowed severity_level] \
| stats values(observed_cns_vs_allowed) as observed_cns_vs_allowed sum(severity_level) as severity_level by instance \
| eval severity_level=if(severity_level=0, 1, severity_level) \
| `ssef_handle_no_results(1,"The mc_common_name_mismatch_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

