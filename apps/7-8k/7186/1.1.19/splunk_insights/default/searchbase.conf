dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 761A5BFA0520262DCD87786438D03459
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br><br>The new analytic capabilities added to Splunk, each usually linked to a new data source, for the selected time frame. <br><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>Adding new data sources boosts Splunks analytical power, broadens its applications, and deepens insights, enhancing adaptability. Monitoring these additions is essential as it serves as a key performance indicator (KPI), reflecting the platform's expanding value and indicating strong adoption. <br><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>It is advisable to track this KPI <em>monthly</em>, <em>quarterly</em>, and <em>yearly</em> to assess strategic growth and successful data integration.</p>
search = `ssef_summary(ssef_scma_indexing_data_source_inventory)` newly_added="yes" \
| eval summary_id="#_of_New_Analytic_Capabilities_Export" \
| fields _time orig_index orig_sourcetype dc_host dc_source event_count severity_level newly_added \
| bin _time span=1d \
| stats count by _time orig_sourcetype \
| rename orig_sourcetype as sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type\
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type \
| stats count by _time sourcetype data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUT use_case \
| stats count by _time sourcetype use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type \
| stats count by _time sourcetype use_case use_case_type \
| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()) , Analytic_Capabilities = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null()) \
| bin _time span=1d \
| stats dc(Analytic_Capabilities) as kpi_value by _time  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "# of New Analytic Capabilities" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

