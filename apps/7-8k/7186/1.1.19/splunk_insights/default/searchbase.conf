tags = Cloud,KPIs,Licensing,SVC,Utilization,Workload
solution = <p>This search helps identify trends and potential issues in SVC utilization, allowing teams to optimize resource allocation and ensure compliance with license limits.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor elevated and degraded utilization levels to identify potential capacity issues.<br><b>2.</b> Investigate usage spikes that exceed optimal thresholds.<br><b>3.</b> Plan for license upgrades if utilization trends consistently approach limits.<br><b>4.</b> Use trendline analysis to forecast future resource demands.<br><b>5.</b> Adjust workloads to maintain compliance with licensing policies.</p><p><b>Recommended Alerts</b></p><p><b>Normal: </b> No action required if utilization remains below optimal thresholds.</p><p><b>Low: </b> Notify if utilization approaches 80% of licensing limits.</p><p><b>Medium: </b> Alert if utilization exceeds 90% of licensing limits.</p><p><b>High: </b> Escalate if degradation levels are consistently reached.</p><p><b>Critical: </b> Trigger emergency alerts if utilization exceeds licensing limits.</p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>ssef_cloud_summary source=splunk-svc</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Collects cloud service utilization data.<br><b>02</b> <code>convert and rename</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Prepares fields for analysis by renaming and converting key metrics.<br><b>03</b> <code>stats and timechart</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates daily maximum and sum values and visualizes trends over time.<br><b>04</b> <code>trendline and eventstats</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Adds trendline and calculates average utilization for deeper insights.<br><b>05</b> <code>eval thresholds</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Identifies optimal and degraded utilization levels based on thresholds.<br><b>06</b> <code>fields and rename</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Cleans up unnecessary fields and formats output for reporting.<br>
explanation = <p>This search provides a detailed analysis of <b>Splunk Virtual Core (SVC)</b> utilization. It calculates daily maximum usage, identifies optimal and degraded utilization thresholds, and visualizes trends over time. The search highlights patterns of usage that may approach or exceed licensing limits, enabling proactive management.</p><p>- Computes <b>daily maximum SVC usage</b> and compares it against thresholds.<br>- Uses <b>trendline</b> to smooth and visualize utilization trends.<br>- Categorizes usage into <b>elevated</b> and <b>degraded</b> levels for better insights.<br>- Supports decisions related to license capacity planning and workload optimization.</p>
quid = 90D3F75915054BFD5FEAB142660A5A68
search_author = Splunk Searchbase Assistant
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Trendline" target="_blank">Trendline Command Documentation</a><br>Learn more about using trendline for smoothing data trends.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Eval" target="_blank">Eval Command Documentation</a><br>Details on eval for calculating thresholds and categorizing data.</li></ul>
description = <b>Analyzes Splunk Virtual Core (SVC) utilization</b>, identifying trends, thresholds, and degradation points.
default_viz = splunk.singlevalue
search = `ssef_cloud_summary` source=splunk-svc \
| convert num(utilized_svc) AS utilized_svc \
| rename role as "role", stack_license_svc as "stack_license_svc", utilized_svc as utilized_svc \
| stats max(utilized_svc) as utilized_svc by _time stack_license_svc role \
| stats sum(utilized_svc) as utilized_svc latest(stack_license_svc) as stack_license_svc by _time \
| timechart partial=t fixedrange=t span=24h cont=FALSE max(utilized_svc) AS utilized_svc max(stack_license_svc) AS stack_license_svc \
| eventstats avg(utilized_svc) as "average SVC utilization" \
| trendline sma5(utilized_svc) AS "SVC utilization trend" \
| eval optimal_threshold=if(stack_license_svc>0, stack_license_svc*.8, null()) \
| eval degradation_threshold=stack_license_svc*.9 \
| eval degraded=if(stack_license_svc>0 AND utilized_svc>=degradation_threshold,utilized_svc,null()) \
| eval elevated=if(stack_license_svc>0 AND utilized_svc>=optimal_threshold AND isnull(degraded),utilized_svc,null()) \
| eval utilized_svc=if(isnull(elevated) AND isnull(degraded),utilized_svc,null()) \
| eval "license limit"=if(stack_license_svc>0,stack_license_svc,null()) \
| fields - degradation_threshold stack_license_svc \
| rename optimal_threshold as "optimal utilization threshold", utilized_svc as "utilized svc"

