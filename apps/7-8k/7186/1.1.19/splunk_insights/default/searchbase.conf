[ssef_sourcetype_search_activity_usage_tracker]
search_name = Hourly Sourcetype Search Activity Usage Tracker
readonly = 1
ssef_cron = hourly
target_component = Search & Visualization
version = 1.0.6
date_created = 2025-11-13 13:35:13
date_updated = 2025-11-16 11:35:52
category = Splunk
sub_category = Sourcetypes
tags = Discovery,Sourcetypes,Tracker
dispatch_earliest_time = -8h@h
dispatch_latest_time = -0h@h
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
explanation = <h3>Documentation for the <code>ssef_effectively_referenced_sourcetypes</code> Lookup Generation Job</h3><h3>High-Level Overview &amp; Purpose</h3><p>This scheduled search is a foundational data engineering job that creates and maintains a persistent, <strong>stateful</strong> historical record of all user search activity related to sourcetypes. Its primary purpose is to populate a master lookup file, <code>ssef_effectively_referenced_sourcetypes.csv</code>.</p><p>This lookup serves as the definitive "source of truth" for data engagement. For every unique search pattern (including wildcards) ever used by a user, this job meticulously tracks two crucial timestamps:</p><ol><li data-list="ordered"><span class="ql-ui"></span><code><strong>firstSearched</strong></code><strong>:</strong> The timestamp of the absolute first time the pattern was ever seen.</li><li data-list="ordered"><span class="ql-ui"></span><code><strong>lastSearched</strong></code><strong>:</strong> The timestamp of the most recent time the pattern was seen.</li></ol><p>By running hourly with an 8-hour lookback, this job ensures the data is both resilient to transient system failures and historically accurate, forming the foundation for all downstream analytics.</p><h3><br></h3><h3>Methodology Deep Dive: The "Read, Merge, Aggregate, Overwrite" Pattern</h3><p>This query solves a classic stateful processing problem: how to update a master list without ever losing historical data. A naive approach that only looks at recent data and overwrites the file is guaranteed to cause data loss.</p><p>This query avoids that fatal flaw by implementing the correct architectural pattern: <strong>"Read, Merge, Aggregate, Overwrite."</strong></p><ol><li data-list="ordered"><span class="ql-ui"></span><strong>READ:</strong> The query begins with <code>| inputlookup</code>, loading the <strong>entire historical record</strong> from the existing lookup file into memory. This is the most critical step for preventing data loss.</li><li data-list="ordered"><span class="ql-ui"></span><strong>MERGE:</strong> It then uses <code>| append</code> to add the results of a subsearch that finds all search activity from the <strong>last 8 hours</strong>. The subsearch is highly intelligent; it combines values from both the <code>Sourcetype</code> and <code>sourcetype_reference</code> fields to ensure all patterns are captured.</li><li data-list="ordered"><span class="ql-ui"></span><strong>AGGREGATE:</strong> The <code>| stats min(firstSearched) as firstSearched, max(lastSearched) as lastSearched</code> command is the "brain" of the operation. It groups all records for each unique search pattern and calculates the true earliest <code>firstSearched</code> and the true latest <code>lastSearched</code> across the combined dataset of old and new data.</li><li data-list="ordered"><span class="ql-ui"></span><strong>OVERWRITE:</strong> Finally, after cleaning the results, the <code>| outputlookup</code> command safely <strong>overwrites</strong> the old lookup file with this new, complete, and correct master list.</li></ol><h3><br></h3><h3>Defense of This Approach</h3><p>This query design is highly defensible and represents Splunk best practices for several key reasons:</p><ol><li data-list="bullet"><span class="ql-ui"></span><strong>Guaranteed No Data Loss:</strong> The "Inputlookup-First" pattern is architecturally designed to prevent the data loss that would occur if the query started by only looking at recent data. The full history is always present before any calculations are made.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Comprehensive Data Handling:</strong> The subsearch uses a robust <code>mvappend</code> and <code>mvdedup</code> combination to ensure that every pattern is captured from all relevant fields, without duplicates.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Resilience and Fault Tolerance:</strong> By using an 8-hour lookback window for a job that runs hourly (an "overlapping window"), the query is resilient to transient failures of this job or its upstream data sources. It also correctly handles late-arriving data.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Idempotent Logic:</strong> The use of <code>stats min(...) max(...)</code> is idempotent, meaning that processing the same data multiple times (due to the overlapping window) does not produce incorrect results. This makes the redundant processing both safe and effective.</li><li data-list="bullet"><span class="ql-ui"></span><strong>Correctness Over Perceived Simplicity:</strong> While the logic may seem complex, it is the standard and correct way to handle stateful aggregations in Splunk. Simpler approaches are demonstrably flawed and would lead to incorrect data.</li></ol>
quid = E3269FA7975C63F71DA49873D14361F9
updated_author = akhamis
related_info = <p><a rel="noopener noreferrer" href="troubleshooting">Click to open the IS4S Troubleshooting Dashboard</a></p><p><br></p><p>Previous Version:</p><div spellcheck="false" class="ql-code-block-container"><div class="ql-code-block">earliest=-8h@h latest=-0h@h `ssef_summary_index` source IN (ssef_audit_user_login_tracker,ssef_introspection_search_telemetry) </div><div class="ql-code-block">| eval sourcetype_name = lower(coalesce(Sourcetype, sourcetype_reference)) </div><div class="ql-code-block">| where isnotnull(sourcetype_name) AND sourcetype_name!="" </div><div class="ql-code-block">| makemv delim="|" sourcetype_name </div><div class="ql-code-block">| mvexpand sourcetype_name </div><div class="ql-code-block">| rex field=sourcetype_name mode=sed "s/[^a-z0-9:*_.-]//g" </div><div class="ql-code-block">| eval current_event_time = _time </div><div class="ql-code-block">| stats min(current_event_time) as current_search_firstSearched, max(current_event_time) as current_search_lastSearched by sourcetype_name </div><div class="ql-code-block">| lookup ssef_effectively_referenced_sourcetypes sourcetype_name OUTPUTNEW firstSearched as lookup_firstSearched, lastSearched as lookup_lastSearched </div><div class="ql-code-block">| eval lookup_firstSearched = if(isnum(lookup_firstSearched), lookup_firstSearched, null()) </div><div class="ql-code-block">| eval lookup_lastSearched = if(isnum(lookup_lastSearched), lookup_lastSearched, null()) </div><div class="ql-code-block">| eval firstSearched = if(isnotnull(current_search_firstSearched) AND isnotnull(lookup_firstSearched), min(current_search_firstSearched, lookup_firstSearched), coalesce(current_search_firstSearched, lookup_firstSearched)) </div><div class="ql-code-block">| eval lastSearched = if(isnotnull(current_search_lastSearched) AND isnotnull(lookup_lastSearched), max(current_search_lastSearched, lookup_lastSearched), coalesce(current_search_lastSearched, lookup_lastSearched)) </div><div class="ql-code-block">| where NOT match(sourcetype_name, "^\*$|-too_small$") </div><div class="ql-code-block">| table sourcetype_name firstSearched lastSearched </div><div class="ql-code-block">| outputlookup ssef_effectively_referenced_sourcetypes append=false CreateInApp=true Create_Empty=true Override_If_Empty=false </div><div class="ql-code-block">| eval _time = firstSearched </div><div class="ql-code-block">| eval severity_level = if(isnotnull(_time), 1, null()) </div><div class="ql-code-block">| `ssef_handle_no_results(1,"The ssef_sourcetype_search_activity_usage_tracker summary job completed successfully without identifying any issues, and everything is operating as expected.")`</div></div>
description = <p>This job maintains the <strong>ssef_effectively_referenced_sourcetypes</strong>.csv lookup, which serves as the master historical record of all <strong>sourcetype</strong> search patterns (including <strong>wildcards</strong>) used by users. By analyzing hourly search activity, it meticulously tracks the absolute first and most recent time each pattern was ever seen. This stateful lookup is the foundational engine for advanced analytics on data engagement and sourcetype usage.</p>
search = | inputlookup ssef_effectively_referenced_sourcetypes \
| eval summary_id="ssef_sourcetype_search_activity_usage_tracker" \
| append \
    [| search earliest=-8h@h latest=-0h@h `ssef_summary_index` source IN (ssef_audit_user_login_tracker, ssef_introspection_search_telemetry) \
    | fields _time, sourcetype_reference, Sourcetype \
    | makemv delim="|" sourcetype_reference \
    | eval sourcetype_name = mvdedup(lower(mvappend(sourcetype_reference, Sourcetype))) \
    | mvexpand sourcetype_name \
    | rex field=sourcetype_name mode=sed "s/[^a-z0-9:*_.-]//g" \
    | where isnotnull(sourcetype_name) AND sourcetype_name!="" AND NOT match(sourcetype_name, "^\*$|-too_small$") \
    | rename _time as lastSearched \
    | eval firstSearched = lastSearched \
    | fields sourcetype_name, firstSearched, lastSearched ] \
| stats min(firstSearched) as firstSearched, max(lastSearched) as lastSearched by sourcetype_name \
| where isnotnull(sourcetype_name) AND sourcetype_name!="" AND NOT match(sourcetype_name, "^\*$|-too_small$") \
| outputlookup ssef_effectively_referenced_sourcetypes CreateInApp=true Create_Empty=true Override_If_Empty=false \
| eval severity_level = if(isnotnull(lastSearched), 1, 2)

