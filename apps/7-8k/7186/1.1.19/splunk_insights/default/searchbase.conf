search_name = Total User Count by Search Head
readonly = 1
diagnostic_searches = ssef_identities
version = 2.0
date_created = 2024-9-25 19:8:1
date_updated = 2025-1-11 18:17:47
category = Splunk
sub_category = Users
tags = Authentication,Details,Usage
solution = <p>Use this search to determine how many unique users are authorized on each search head over time. It is especially useful in environments with load balancing, identity federation, or shared infrastructure responsibilities.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any unexpected spikes or dips in user count per SH.<br><b>2.</b> Validate that load balancers are evenly distributing user sessions.<br><b>3.</b> Detect shared credentials if identity counts appear unnaturally low or high.<br><b>4.</b> Review identity federation (SAML, LDAP) configurations.<br><b>5.</b> Feed this search into licensing and performance planning dashboards.</p><p> Recommended For You: <ul><li><a href="https://splunkbase.splunk.com/app/1465" target="_blank">Splunkbase: Splunk Supporting Add-on for Active Directory</a><br>Provides identity enrichment from Active Directory for better access analysis.</li><li><a href="https://splunkbase.splunk.com/app/3110" target="_blank">Splunkbase: Splunk Add-on for Microsoft Cloud Services</a><br>Enriches identity data from Azure AD and other Microsoft services.</li><li><a href="https://splunkbase.splunk.com/app/3088" target="_blank">Splunkbase: Splunk Add-on for Google Cloud Platform</a><br>Brings in user and identity logs from GCP environments for correlation.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_identities)`</code><br> - Loads summary identity data pre-collected via IS4S job pipelines.<br><b>02</b> <code>| fields _time label identity</code><br> - Filters fields to those required for access analysis.<br><b>03</b> <code>| stats dc(identity) as "# of Authorized Users" by label</code><br> - Calculates distinct identity counts per infrastructure label.<br><b>04</b> <code>| rename label as "Search Head"</code><br> - Enhances label readability by renaming to "Search Head".<br>
explanation = <p>This search provides operational visibility into how users are distributed across different search heads by calculating the number of unique authorized identities. This helps in validating balanced access, identifying anomalies such as shared accounts or failed distribution by load balancers, and supporting audits of identity access. Especially in multi-SH or federated setups, this insight supports performance planning and access policy enforcement.</p>
quid = CC034483DD98EAF738C79DBFD77F5CD6
search_author = khutchinson
updated_author = khutchinson
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/manage-users-and-security/9.2/manage-splunk-platform-users-and-roles/find-existing-users-and-roles" target="_blank">Help: Find existing users and roles</a><br>How to locate and review all active users and their assigned roles in Splunk.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/manage-users-and-security/9.2/manage-splunk-platform-users-and-roles/define-roles-on-the-splunk-platform-with-capabilities" target="_blank">Help: Define roles on the Splunk platform with capabilities</a><br>Describes role-based access control and related capabilities for Splunk users.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/manage-users-and-security/9.1/manage-splunk-platform-users-and-roles/create-and-manage-roles-with-splunk-web" target="_blank">Help: Create and manage roles with Splunk Web</a><br>Instructions on role creation and permission assignments via the UI.</li><li><a href="https://lantern.splunk.com/Security/Authentication/Investigating_suspicious_login_activity" target="_blank">Lantern: Investigating suspicious login activity</a><br>Tips for detecting abnormal user activity, shared credentials, and threats.</li></ul>
description = <p><b>Displays the number of unique authorized users</b> accessing each search head within your Splunk deployment. This search helps identify how user identities are distributed across infrastructure components, enabling load validation and usage monitoring.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.pie
viz_options = {  "backgroundColor": "transparent", "seriesColors":  ["#7e52d2","#009be6","#00cdb0","#e39a2b","#ff677e","#d52094","#0050b1","#008c80","#97b22a","#ff6acb","#8098F6","#C83C10"], "showDonutHole": true, "labelDisplay": "valuesAndPercentage"  }
search = `ssef_summary(ssef_identities)` \
| fields _time label identity \
| stats dc(identity) as "# of Authorized Users" by label\
| rename label as "Search Head"

[Upgraded App Details]
search_name = Upgraded App Details
readonly = 1
diagnostic_searches = ssef_ia4s_apps_app_activities_modified
version = 1.0.4
date_updated = 2025-1-30 14:31:45
category = Splunk
sub_category = Adoption
tags = Adoption,Apps,Details
solution = <p>This view highlights <b>recently modified Splunk apps</b>, helping teams understand where configuration or content changes have taken place.</p><p><b>Suggested Actions</b> Review recently modified apps to confirm changes were authorized and documented. Validate updates against version control or deployment pipelines where applicable. If unexpected modifications are detected, engage app owners to assess impact and ensure alignment with operational standards.</p><p><b>Recommended For You:</b><ul><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utilities</a><br>Administrative utility apps that support app lifecycle management, auditing, and configuration visibility.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert assistance for establishing app governance, deployment standards, and change management practices.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=app%20management" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Additional Splunk and Cisco apps related to app management, governance, and operational oversight.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_ia4s_apps_app_activities_modified</code><br> - Identifies app modification events captured by Insights Suite summaries.<br><b>02</b> <code>| stats latest(*)</code><br> - Aggregates modification activity by search head and app name.<br><b>03</b> <code>| ssef_no_data_kpi</code><br> - Displays a message when no app updates occurred in the selected period.<br>
explanation = <p>Tracking modifications to Splunk apps is essential for maintaining platform stability, compliance, and supportability. App changes can introduce new functionality, configuration drift, or unexpected performance impacts if not properly reviewed. This search highlights when and where apps were modified, allowing administrators to correlate changes with incidents, performance shifts, or user-reported issues. Over time, this visibility supports stronger change management practices and clearer accountability for app ownership.</p>
quid = 9CE457FD6E6C72703F2C0A8BB9006589
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/manage-apps-and-add-ons" target="_blank">Splunk Help: Manage Apps and Add-ons</a><br>Guidance on installing, updating, and maintaining Splunk apps.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/deploy-apps-across-your-environment" target="_blank">Splunk Help: Deploy Apps Across Your Environment</a><br>Best practices for distributing and updating apps in distributed deployments.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=app%20management" target="_blank">Splunk Docs: App Management Searches</a><br>Search references and examples for analyzing app configuration and usage.</li><li><a href="https://community.splunk.com/t5/Splunk-Administration/bd-p/admin" target="_blank">Community: Splunk Administration</a><br>Community discussions on app updates, governance, and operational best practices.</li></ul>
description = <p>This search identifies <b>Splunk apps that have been modified</b> within the selected time range and shows where those changes occurred.</p><p>It provides visibility into <b>application change activity</b> across search heads for governance and operational awareness.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_ia4s_apps_app_activities_modified)` num_apps_modified > 0 \
| fields _time label app_name num_apps_modified \
| eval Date = _time \
| fieldformat Date = strftime(Date, "%B %d, %Y %I:%M:%S %p") \
| stats latest(*) as * latest(Date) as Date by label, app_name \
| rename label AS "Search Head" app_name AS "App Name" num_apps_modified AS "# Modified" \
| `ssef_no_data_kpi(No Splunk apps have been updated in based on the time chosen)`

[Use Case Analytic Capabilities by Domain]
search_name = Use Case Analytic Capabilities by Domain
readonly = 1
diagnostic_searches = ssef_scma_indexing_data_source_inventory
version = 2.0
date_updated = 2025-1-17 14:35:47
category = Splunk
sub_category = Capabilities
tags = Analytics,Data,Details,Governance
solution = <p>This output shows how many <b>distinct analytic capabilities</b> are enabled within each domain based on currently indexed data.</p><p><b>Suggested Actions</b> Review domains with low analytic capability counts to identify missing or underutilized data sources. Prioritize onboarding additional sourcetypes where business-critical analytics are not yet supported. Use these insights to guide ingestion strategy, content development, and stakeholder discussions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/data-stream-processor.html" target="_blank">Products: Splunk Data Stream Processor</a><br>Ingest, route, and transform data in real time to accelerate analytics coverage and domain alignment.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert guidance to design data onboarding strategies aligned to analytic use cases and business domains.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=data%20onboarding" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Additional Splunk and Cisco apps that support data onboarding, enrichment, and analytics enablement.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_scma_indexing_data_source_inventory</code><br> - Retrieves summarized inventory of indexed data sources.<br><b>02</b> <code>| lookup uce_* mappings</code><br> - Enriches sourcetypes with standardized data types, use cases, and domains.<br><b>03</b> <code>| stats dc()</code><br> - Counts distinct analytic capabilities by domain.<br>
explanation = <p>Understanding which analytic capabilities are enabled by existing data sources is critical for maximizing the value of Splunk. This search correlates sourcetypes with standardized data types, use cases, and domains to reveal where analytic coverage is strong or lacking. By grouping analytic capabilities by domain, organizations can identify gaps in data onboarding, prioritize new sources, and align ingestion efforts with business objectives. Over time, this insight supports better roadmap planning, analytics maturity assessments, and stakeholder alignment.</p>
quid = DFB085FC050348998F5EDFAE02DF3107
updated_author = akhamis
related_info = <p><ul>\
<li><a href="https://lantern.splunk.com/Security/UCE">Lantern: Use Case Explorer for Security</a> - This resource provides a structured approach to implementing security use cases with Splunk, categorized by operational areas such as Data Optimization, Security Monitoring, and Incident Management, enhancing user experience and adoption.</li>\
<li><a href="https://lantern.splunk.com/Observability/UCE">Lantern: Use Case Explorer for Observability</a> - Explore observability use cases organized by categories like Infrastructure Monitoring, Application Performance Monitoring, and Digital Experience Monitoring, aiding in understanding Splunks analytic capabilities across different operational domains.</li>\
<li><a href="https://lantern.splunk.com/Platform_Data_Management">Lantern: Platform Data Management</a> - Discover platform-centric use cases divided into areas such as Data Onboarding, Search and Investigation, and Dashboarding, to maximize the value derived from Splunks analytics.</li>\
<li><a href="https://lantern.splunk.com/Security/Getting_Started/Identifying_Splunk_Enterprise_Security_use_cases_and_data_sources">Lantern: Identifying Splunk Enterprise Security use cases and data sources</a> - This guide assists in mapping data sources to specific security use cases, facilitating better utilization of Splunks analytic capabilities within defined operational categories.</li>\
<li><a href="https://lantern.splunk.com/Security/Getting_Started/Getting_started_with_Splunk_Security_Essentials">Lantern: Getting started with Splunk Security Essentials</a> - Learn how to leverage Splunk Security Essentials to enrich security content with tags and metadata, organized by threat and data source categories, enhancing analytic effectiveness.</li>\
</ul></p>
description = <p>This search analyzes <b>indexed data sources</b> to identify and quantify <b>analytic capabilities</b> mapped to business and technical domains.</p><p>It helps teams understand how onboarded data supports <b>use cases and analytics coverage</b> across the environment.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.pie
search = `ssef_summary(ssef_scma_indexing_data_source_inventory)` \
| fields _time orig_index orig_sourcetype dc_host dc_source event_count severity_level newly_added \
| bin _time span=1d \
| stats count by _time orig_sourcetype \
| rename orig_sourcetype as sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type category as sourcetype_category domain as sourcetype_domain \
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type category as sourcetype_category domain as sourcetype_domain \
| eval sourcetype_category=split(mvdedup(sourcetype_category), "|"), sourcetype_domain=split(mvdedup(sourcetype_domain), "|") \
| stats values(*) as * by sourcetype data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUTNEW use_case \
| eval use_case=mvdedup(use_case) \
| stats values(*) as * by sourcetype use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type as use_case_type category as usecase_category domain as usecase_domain \
| eval use_case_type=mvdedup(use_case_type) \
| eval domain=mvdedup(mvappend(sourcetype_domain,usecase_domain)) \
| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()) , Analytic_Capabilities = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null()) \
| stats dc(Analytic_Capabilities) as "Use Case Analytic Capabilities by Domain" by domain

[Users that Have Not Logged In by Time Period]
search_name = Users that Have Not Logged In by Time Period
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker
version = 2.0
date_created = 2024-10-15 15:54:3
date_updated = 2025-1-11 18:36:38
category = Splunk
sub_category = Adoption
tags = Adoption,Authentication,Details,Login
solution = <p>This search reveals user login recency and usage metrics, aiding security and compliance monitoring. It highlights dormant or active accounts, enabling accountability and lifecycle management.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate accounts with long idle periods for potential deactivation.<br><b>2.</b> Correlate search usage patterns with expected job roles or activity norms.<br><b>3.</b> Use findings to refine access control policies.<br><b>4.</b> Feed results into periodic review processes for audit and compliance.<br><b>5.</b> Combine with real‑time alerts for anomalous login and search behavior.</p><p> Recommended For You: <ul><li><a href="https://splunkbase.splunk.com/app/1465" target="_blank">Splunkbase: Splunk Supporting Add-on for Active Directory</a><br>Provides enhanced identity enrichment and integration for user audit and authentication insights.</li><li><a href="https://splunkbase.splunk.com/app/3088" target="_blank">Splunkbase: Splunk Add-on for Google Cloud Platform</a><br>Enables correlation of cloud‑based user identity and activity logs to complement audit analysis.</li><li><a href="https://splunkbase.splunk.com/app/3110" target="_blank">Splunkbase: Splunk Add-on for Microsoft Cloud Services</a><br>Enriches Azure AD and other Microsoft identity logs for comprehensive user activity tracking.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_audit_user_login_tracker)`</code><br> - Loads summarized audit login and search activity data.<br><b>02</b> <code>NOT user IN (`ssef_default_users`, splunk-system-user) user!="*$*"</code><br> - Excludes default and system accounts to focus on real user activity.<br><b>03</b> <code>| fields _time user latest_logon latest_search num_searches search_type</code><br> - Selects relevant fields for login and search activity analysis.<br><b>04</b> <code>| eval latest_logon=coalesce(latest_logon, latest_search, _time)</code><br> - Defines last activity when no explicit login exists.<br><b>05</b> <code>| stats latest(latest_logon) as latest_logon dc(num_searches) as num_searches values(search_type) as search_type by user</code><br> - Calculates distinct activity metrics per user.<br><b>06</b> <code>| eval current_time=now()</code><br> - Captures current time for relative calculations.<br><b>07</b> <code>| eval days_since_last_login = round((current_time - latest_logon) / 86400, 0)</code><br> - Computes days since last login for operational context.<br><b>08</b> <code>| convert ctime(latest_logon)</code><br> - Converts login time to human-readable format.<br><b>09</b> <code>| sort 100 - days_since_last_login</code><br> - Sorts users by inactivity duration descending.<br><b>10</b> <code>| table user days_since_last_login num_searches search_type</code><br> - Formats output with key activity indicators.<br><b>11</b> <code>| rename user as "User", latest_logon as "Last Login Time", days_since_last_login as "Days Since Last Login" num_searches as "Number of Searches" search_type as "Search Type"</code><br> - Renames fields for readability.</br>
explanation = <p>This search uses pre-collected audit login and search activity summary data to show how recently users have authenticated and how actively they are using the system. Monitoring days since last login and number of searches by type can assist in detecting inactive accounts, potential misuse, or abnormal patterns in user behavior. These operational insights support compliance, user lifecycle management, and security monitoring by highlighting accounts that may need review or administrative action.</p>
quid = 53C0436E522441A79BA5B08E6005BDC1
updated_author = khutchinson
related_info = <ul><li><a href="https://community.splunk.com/t5/Splunk-Search/How-do-I-edit-my-search-to-identify-inactive-users-over-the-last/m-p/285256">Splunk Community: How do I edit my search to identify inactive users over the last 12 months?</a><p>This discussion provides guidance on creating searches to identify users who have not logged into Splunk over a specified period, aiding in understanding user engagement levels and their impact on the platform's value to customers.</p></li><li><a href="https://community.splunk.com/t5/Splunk-Search/Search-for-inactive-users-in-my-application/m-p/178742">Splunk Community: Search for inactive users in my application</a><p>This thread explores methods to detect inactive users within an application monitored by Splunk, offering insights into user behavior that can influence user experience and customer satisfaction.</p></li><li><a href="https://community.splunk.com/t5/Splunk-Search/Inactive-Users/m-p/372001">Splunk Community: Inactive Users</a><p>This discussion addresses strategies to query and report on users who have not logged into Splunk within a certain timeframe, assisting in assessing user engagement and its effects on the perceived value of the platform.</p></li><li><a href="https://docs.splunk.com/Documentation/ES/8.0.1/User/UserRiskDashboard">Splunk Docs: User activity monitoring</a><p>This documentation details the User Activity dashboard in Splunk Enterprise Security, which displays panels representing common risk-generating user activities, aiding in monitoring user engagement and identifying inactive users.</p></li><li><a href="https://community.splunk.com/t5/Splunk-Search/Search-for-inactive-Splunk-users/m-p/9859">Splunk Community: Search for inactive Splunk users</a><p>This thread discusses methods to find Splunk instance users who have not logged in for a specified amount of time, providing insights into user activity levels and their impact on system utilization.</p></li><li><a href="https://community.splunk.com/t5/Splunk-Enterprise-Security/Query-to-detect-activity-from-inactive-account/m-p/461014">Splunk Community: Query to detect activity from inactive account</a><p>This discussion explores how to detect activity from accounts that have been inactive, assisting in understanding user behavior patterns and their implications for user experience and security.</p></li><li><a href="https://community.splunk.com/t5/Getting-Data-In/Is-it-possible-to-Monitor-Splunk-User-activity/m-p/61996">Splunk Community: Is it possible to Monitor Splunk User activity?</a><p>This thread discusses the feasibility of monitoring user activity within Splunk, providing insights into tracking user engagement and identifying inactive users to enhance platform value.</p></li><li><a href="https://docs.splunk.com/Documentation/UBA/5.4.1/User/Users">Splunk Docs: Review overall user activity</a><p>This documentation provides an overview of user activity monitoring in Splunk User Behavior Analytics, assisting in identifying inactive users and understanding their impact on user experience and customer value.</p></li><li><a href="https://docs.splunk.com/Documentation/UBA/5.4.1/User/UserReview">Splunk Docs: Review current user activity</a><p>This resource explains how to review current user activity in Splunk UBA, aiding in monitoring user engagement levels and identifying inactive users to assess their impact on the platform's value.</p></li><li><a href="https://www.splunk.com/en_us/blog/security/solving-user-monitoring-use-cases-with-splunk-enterprise-security.html">Splunk Blogs: Solving User Monitoring Use Cases With Splunk Enterprise Security</a><p>This blog post discusses how to utilize Splunk Enterprise Security for user activity monitoring, including identifying inactive users, to enhance user experience and maximize customer value.</p></li></ul>
description = <p><b>Displays the most recent login activity and search usage per user</b> by calculating the time since last login, total searches performed, and types of searches executed. This search helps identify dormant accounts and quantify user engagement with the Splunk platform. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`, splunk-system-user) user!="*$*"\
| fields _time user latest_logon latest_search num_searches search_type\
| eval latest_logon=coalesce(latest_logon, latest_search, _time) \
| stats latest(latest_logon) as latest_logon dc(num_searches) as num_searches values(search_type) as search_type by user \
| eval current_time=now() \
| eval days_since_last_login = round((current_time - latest_logon) / 86400, 0) \
| convert ctime(latest_logon) \
| sort 100 - days_since_last_login \
| table user days_since_last_login num_searches search_type\
| rename user as "User", latest_logon as "Last Login Time", days_since_last_login as "Days Since Last Login" num_searches AS "Number of Searches" search_type AS "Search Type"

[vCPU Usage Details]
search_name = vCPU Usage Details
readonly = 1
diagnostic_searches = ssef_introspection_vcpu_usage_tracker
version = 1.0.4
date_created = 2024-5-23 12:25:42
date_updated = 2025-9-15 12:3:51
category = Splunk
sub_category = Enterprise
tags = Adoption,KPIs,vCPU
solution = <p>This visualization highlights <b>peak vCPU usage trends</b> to help detect sustained compute pressure.</p><p><b>Suggested Actions</b> Investigate periods of consistently high vCPU usage and correlate them with search activity, app usage, or onboarding events. Consider scaling compute resources, redistributing workloads, or optimizing expensive searches if peak usage approaches capacity limits.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Elastic compute capabilities that help absorb peak vCPU demand and simplify capacity management.</li><li><a href="https://www.splunk.com/en_us/products/observability-cloud.html" target="_blank">Products: Splunk Observability Cloud</a><br>End-to-end infrastructure visibility to correlate CPU pressure with system and application behavior.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=cpu%20capacity" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Additional Splunk and Cisco apps that support capacity monitoring and performance optimization.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
execution_plan = <b>01</b> <code>| ssef_summary(ssef_introspection_vcpu_usage_tracker)</code><br> - Retrieves summarized vCPU usage metrics from IS4S.<br><b>02</b> <code>| stats MAX()</code><br> - Captures peak vCPU usage per role and time slice.<br><b>03</b> <code>| timechart Perc99()</code><br> - Visualizes high-percentile vCPU utilization trends over time.<br>
explanation = <p>vCPU utilization is a key indicator of overall platform health and scalability. This search tracks high-percentile CPU usage over time to surface peak demand rather than averages that can hide contention. By breaking usage down by Splunk role, teams can distinguish whether load is driven by search heads, indexers, or other components. These insights support proactive capacity planning, infrastructure right-sizing, and informed decisions around scaling or workload redistribution.</p>
quid = 6A4FAC36BDD5823AED66EA3043D0970F
search_author = akhamis
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/manage-system-resources" target="_blank">Splunk Help: Manage System Resources</a><br>Guidance on monitoring and tuning CPU and memory resources in Splunk.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=cpu%20usage" target="_blank">Splunk Docs: CPU Usage Searches</a><br>Search references for analyzing CPU utilization and performance metrics.</li><li><a href="https://community.splunk.com/t5/Deployment-Architecture/bd-p/deployment-architecture" target="_blank">Community: Deployment Architecture</a><br>Best practices and discussions on sizing and scaling Splunk deployments.</li></ul>
description = <p>This search analyzes <b>vCPU utilization</b> across Splunk roles to highlight <b>compute consumption patterns</b> over time.</p><p>It helps identify sustained or peak CPU pressure that may impact performance and capacity planning.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_introspection_vcpu_usage_tracker)` \
| fields _time, Splunk_Role, total_vCPUs, PctUsed, total_PctUsed, License \
| bin span=5m _time \
| stats MAX(total_PctUsed) as total_PctUsed MAX(PctUsed) As PctUsed MAX(total_vCPUs) As total_vCPUs by _time Splunk_Role \
| timechart partial=t fixedrange=t span=1h Perc99(eval(round(total_PctUsed, 2))) as "vCPU Usage Details"

[What Data is Accessed Through Scheduled Searches]
search_name = What Data is Accessed Through Scheduled Searches
readonly = 1
diagnostic_searches = ssef_saved_searches
version = 2.0
date_created = 2024-11-25 14:48:59
date_updated = 2024-11-25 14:50:3
category = Splunk
sub_category = Cloud
tags = Data Management,Details,Jobs,Sourcetypes
solution = <p>This output shows which <b>indexes and sourcetypes</b> are actively queried by scheduled saved searches.</p><p><b>Suggested Actions</b> Review searches that reference high-volume or sensitive data sources to ensure they are justified and optimized. Identify opportunities to consolidate redundant searches, adjust schedules, or update ownership where needed.</p><p><b>Recommended For You:</b><ul><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utilities</a><br>Utility apps that help audit, document, and manage saved searches and configurations.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunk Apps: IT Operations Management</a><br>Apps that support operational oversight, scheduling analysis, and search performance monitoring.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=scheduled%20search%20governance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Additional Splunk apps related to search governance, auditing, and optimization.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary(ssef_saved_searches)</code><br> - Retrieves summarized saved search metadata from IS4S.<br><b>02</b> <code>| ssef_index_reference()</code><br> - Extracts index references from saved search SPL.<br><b>03</b> <code>| ssef_sourcetype_reference()</code><br> - Extracts sourcetype references from saved search SPL.<br>
explanation = <p>Scheduled saved searches can have a significant impact on system performance, data access patterns, and governance posture. This search correlates active scheduled searches with the indexes and sourcetypes they query, enabling administrators to understand data dependencies and potential performance drivers. By grouping results by app and author, teams can identify ownership, assess redundancy, and validate that searches align with intended data access policies. These insights support optimization, auditing, and long-term search lifecycle management.</p>
quid = D00C1B8FF28D1D6C1AAA7281EDFF794A
search_author = akhamis
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/saved-searches" target="_blank">Splunk Help: Saved Searches</a><br>Documentation on creating, scheduling, and managing saved searches.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/manage-searches" target="_blank">Splunk Help: Manage Searches</a><br>Administrative guidance for governing and optimizing search workloads.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=scheduled%20search" target="_blank">Splunk Docs: Scheduled Search Examples</a><br>Search references related to scheduling and search management.</li><li><a href="https://community.splunk.com/t5/Search/bd-p/search" target="_blank">Community: Search</a><br>Community discussions on saved search design and performance.</li></ul>
description = <p>This search identifies <b>scheduled and enabled saved searches</b> and extracts the <b>indexes and sourcetypes</b> they reference.</p><p>It provides visibility into how scheduled searches consume data sources across apps and authors.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.column
viz_options = { "stackMode":"stacked","seriesColors":["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"],"legendDisplay":"top" }
search = `ssef_summary(ssef_saved_searches)` is_scheduled=1 AND disabled=0 \
| fields _time, label, app, author, sharing, savedsearch_name savedsearch_search \
| bin _time span=1d \
| stats latest(savedsearch_search) as savedsearch_search by label, app, sharing, author savedsearch_name \
| `ssef_index_reference(savedsearch_search)` \
| `ssef_sourcetype_reference(savedsearch_search)` \
| stats values(index_reference) as Indexes values(sourcetype_reference) as Sourcetypes by label app author savedsearch_name

