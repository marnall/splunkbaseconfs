solution = <p>This search provides a centralized inventory of dashboards to support visibility, governance, and lifecycle management.</p><p><b>Suggested Actions</b> Review dashboards with broad sharing permissions, identify dashboards without clear ownership, and assess large or auto-running dashboards for performance impact.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/observability.html" target="_blank">Products: Splunk Observability Cloud</a><br>Gain end-to-end visibility into application and infrastructure performance that complements dashboard usage insights.</li><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Education Services</a><br>Enable teams to build efficient, well-governed dashboards through role-based Splunk training.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=dashboards" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore additional Splunk apps that extend dashboarding, visualization, and governance capabilities.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| stats latest(*) by label, app, sharing, author, view_name</code><br> - Collapses dashboard metadata to the most recent state per dashboard.<br><b>02</b> <code>| convert ctime(updated)</code><br> - Converts dashboard update timestamps into a readable format.<br><b>03</b> <code>| table / rename</code><br> - Presents normalized dashboard attributes for reporting and governance.
explanation = <p>This view helps administrators and platform owners understand how dashboards are distributed, maintained, and configured across the environment. By exposing authorship, sharing permissions, refresh behavior, and structural complexity, teams can identify ownership gaps, over-privileged content, and dashboards that may require optimization or retirement. These insights support governance initiatives, content standardization, and user experience improvements. Over time, the data can also be used to track dashboard growth trends and operational maturity.</p>
quid = 59DF81B2987E1B15B1C5351799BD5FBF
updated_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Count-of-Dashboards/m-p/372591" target="_blank">Splunk Community: Count of Dashboards?</a><p>This community discussion provides insights into counting the number of dashboards in your Splunk environment, helping you assess the extent of customization and its potential impact on user experience.</p></li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Is-there-a-way-to-count-the-number-of-dashboard-views-per-day-or/m-p/215834" target="_blank">Splunk Community: Is there a way to count the number of dashboard views per day or per hour for a particular dashboard?</a><p>This thread explores methods to track dashboard usage metrics, enabling you to understand user engagement and the value derived from custom dashboards.</p></li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/How-to-check-the-number-of-users-who-visited-the-Dashboards/m-p/533846" target="_blank">Splunk Community: How to check the number of users who visited the Dashboards</a><p>This discussion offers approaches to monitor the number of users accessing dashboards, providing insights into user interaction and the effectiveness of your custom dashboards.</p></li></ul>
description = <p>This search inventories <b>Splunk dashboards</b> across apps, capturing <b>ownership</b>, <b>sharing</b>, and <b>configuration details</b> to support governance and adoption tracking.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
| fields _time, label, app, sharing, author, view_name, view_label, type, description, view_label, autoRun, num_panels, newly_added, dashboard_size, auto_refresh_delay submitButton updated \
| stats latest(*) as * by label, app, sharing, author, view_name \
| eval updated=trim(updated,".000000") \
| convert ctime(updated) \
| table label, app, sharing, author, view_name view_label updated description newly_added autoRun num_panels dashboard_size auto_refresh_delay submitButton \
| rename label as "Search Head", app as "App", sharing as "Sharing Permissions", author as "Author", view_name as "Dashboard ID", view_label as "Dashboard Name", updated as "Last Updated", description as "Description", newly_added as "Newly Added", autoRun as "Auto Run", num_panels as "# of Panels", dashboard_size as "Dashboard Size", auto_refresh_delay as "Auto Refresh Delay", submitButton as "Has a Submit Button"

