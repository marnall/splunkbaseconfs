[ssef_scma_search_es_correlation_rules]
search_name = ES Correlation Rules Enabled
readonly = 1
target_component = Data Models
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 13:1:8
category = Splunk
sub_category = Enterprise Security
tags = ES Adoption,SCMA,Search,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = F75F2BB8F84E772C6A6B96E93056E1D7
updated_author = khutchinson
related_info = <ul>\
<li><a href=" https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Enterprise_Security_service_limits_and_constraints" target="_blank">https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Enterprise_Security_service_limits_and_constraints</a></li>\
</ul>
severity_normal_text = <br/><p>It appears as if the number of ES correlation rules enabled are in line with best practices. A good balance of correlation searches relative to compute horsepower indicates a well-optimized Splunk deployment that effectively leverages computational resources to meet operational and analytical requirements while ensuring performance, scalability, and efficiency.</p>
severity_medium_text = <br/><p>It appears as if the number of ES correlation rules enabled are moderately elevated which could negatively impact performance. Overall, while correlation rules are essential for detecting security threats and anomalies, it's crucial to strike a balance and avoid creating too many rules in the Splunk ES deployment. Administrators should prioritize quality over quantity, regularly review and refine rules, and ensure they align with the organization's security objectives and operational requirements. Please disable some correlation rules and or adjust your computing horsepower to handle the elevated load.</p>
severity_high_text = <br/><p>It appears as if the number of ES correlation rules enabled are highly elevated which could negatively impact performance. Overall, while correlation rules are essential for detecting security threats and anomalies, it's crucial to strike a balance and avoid creating too many rules in the Splunk ES deployment. Administrators should prioritize quality over quantity, regularly review and refine rules, and ensure they align with the organization's security objectives and operational requirements. Please disable some correlation rules and or adjust your computing horsepower to handle the elevated load.</p>
description = <p>This is the count of "ES Correlation Rules Enabled".  Enabling more Enterprise Security (ES) correlation searches in Splunk impacts resource usage, search performance, and indexer workload</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> >= 200</li>\
<li><strong>Medium:</strong> 70-199</li>\
<li><strong>Normal:</strong> < 70</li>\
</ul>
search = `ssef_summary(ssef_saved_searches)` is_scheduled=1 AND disabled=0 action_correlationsearch_enabled=1 \
| eval summary_id="ssef_scma_search_es_correlation_rules" \
| stats latest(*) as * latest(_time) AS _time by label, app, sharing, author, savedsearch_name \
| rename savedsearch_name as title \
| stats dc(title) AS num_correlation_rules_es latest(name) as name latest(_time) as _time by label \
| `ssef_cloud_limits(search_es_correlation_rules)` \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_correlation_rules_es >= 200, high, num_correlation_rules_es >= 70 , medium, true(), normal ) \
| table _time label name num_correlation_rules_es severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_es_correlation_rules summary job completed successfully without identifying any issues, and everything is operating as expected.")`

