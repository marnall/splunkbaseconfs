solution = <p>This search produces an hourly chart of ad hoc search counts for users, helping teams interpret daily and weekly usage patterns.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify peak search hours to inform maintenance windows or capacity planning.<br><b>2.</b> Compare hourly ad hoc counts with system performance metrics.<br><b>3.</b> Investigate users with consistently high activity for optimization opportunities.<br><b>4.</b> Incorporate into usage dashboards for trend monitoring.<br><b>5.</b> Use findings to guide user education on efficient search practices.</p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) search_type="*adhoc*"</code><br> - Selects summary audit data for real users performing ad hoc searches.<br><b>02</b> <code>| fields _time label app user num_searches</code><br> - Limits fields to those relevant for hourly analysis.<br><b>03</b> <code>| bin _time span=1h</code><br> - Buckets events into one‑hour intervals.<br><b>04</b> <code>| stats latest(*) AS * by _time label app user</code><br> - Aggregates search counts and contextual fields per hour.<br><b>05</b> <code>| makecontinuous _time span=1h</code><br> - Ensures continuous hourly time series.<br><b>06</b> <code>| fillnull value=0 num_searches</code><br> - Fills missing search count values with zero.<br><b>07</b> <code>| eval hour=strftime(_time, "%H")</code><br> - Extracts the hour of day for charting.<br><b>08</b> <code>| chart sum(num_searches) AS "Regularly Seen User Search Count by Time" by hour user</code><br> - Produces the final hourly search count chart per user.</br>
explanation = <p>Hourly breakdowns of ad hoc search counts help Splunk administrators and SecOps teams observe usage rhythms and their impact on system load. By charting search counts across hours and users, teams can identify heavy usage windows, correlate search activity to system performance, and plan capacity or training accordingly. This analysis supports both performance tuning and user behavior insights.</p>
quid = 40E0051CFB58B277BEB2187EEE766029
search_author = khutchinson
updated_author = shalpin
related_info = <ul><li><a href="https://help.splunk.com/en/search?q=ad%20hoc%20searches" target="_blank">Help: Search query reference for ad hoc searches</a><br>Reference content on how ad hoc searches are constructed and executed.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/manage-search-performance/9.3/optimize-searches" target="_blank">Help: Optimize searches</a><br>Guidance on tuning search performance and reducing unnecessary load.</li><li><a href="https://help.splunk.com/en/search?q=chart" target="_blank">Help: Chart command</a><br>Documentation on how to summarize and visualize search results using the chart command.</li><li><a href="https://help.splunk.com/en/search?q=makecontinuous" target="_blank">Help: Makecontinuous command</a><br>Explains how to fill gaps in time series data for consistent reporting.</li></ul>
description = <p>This search calculates hourly counts of <b>ad hoc searches</b> executed by non‑system users using summary audit data. It shows how search activity patterns vary by time of day, user, app, and search head. This view helps administrators detect peak usage periods and understand when users are most actively querying the platform.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.column
viz_options = {  "stackMode": "stacked", "backgroundColor": "transparent", "seriesColors": ["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"], "legendDisplay": "top", "xAxisTitleVisibility": "hide"  }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) search_type="*adhoc*"\
| fields _time label app user num_searches\
| bin _time span=1h\
| stats latest(*) AS * by _time label app user\
