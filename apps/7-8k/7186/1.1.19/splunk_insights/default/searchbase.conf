updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=license%20usage" target="_blank">Splunk Docs: License usage</a><br>Search results for documentation related to monitoring and managing Splunk license consumption.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=data%20ingestion%20best%20practices" target="_blank">Splunk Docs: Data ingestion best practices</a><br>Guidance on optimizing data onboarding to control license growth.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Apps</a><br>Utility apps that support license analysis, ingestion control, and data hygiene.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunkbase: IT Operations Management</a><br>Apps aligned to operational monitoring and platform optimization.</li><li><a href="https://www.splunk.com/en_us/blog/2015/01/26/log-analysis-best-practices.html" target="_blank">Splunk Blogs: Log analysis best practices</a><br>Best practices for managing log volume and extracting value efficiently.</li><li><a href="https://www.splunk.com/en_us/resources.html" target="_blank">Splunk Resources: Platform resources</a><br>Central library of guidance for platform optimization and cost management.</li></ul>
description = <p>This KPI tracks daily license usage (in GB) and the total number of events for each index and sourcetype, providing insights into data ingestion trends and event generation. It highlights potential discrepancies, such as a <strong>zero event count</strong>, which may indicate missing or incomplete data in the secondary summary (<code>ssef_scma_indexing_data_source_inventory</code>) for the given time frame.</p><p>It helps in identifying:</p><ol><li data-list="bullet"><span class="ql-ui"></span>High data ingestion volumes by index and sourcetype.</li><li data-list="bullet"><span class="ql-ui"></span>Sourcetypes or indexes with unusually low or zero event counts that may require investigation.</li><li data-list="bullet"><span class="ql-ui"></span>Licensing trends to ensure proper resource allocation and compliance.</li></ol><h3>Additional Notes:</h3><ol><li data-list="bullet"><span class="ql-ui"></span><strong>Zero Event Count</strong>: A zero value in the <code># of Events</code> field may indicate that the secondary summary (<code>ssef_scma_indexing_data_source_inventory</code>) did not produce results for the specified period. This should trigger further review to confirm if the data source is inactive or if there’s an issue with summary generation.</li><li data-list="bullet"><span class="ql-ui"></span><strong>License Usage</strong>: The license usage is calculated in gigabytes (GB), allowing you to monitor ingestion against licensing thresholds.</li></ol><p>Let me know if you’d like further refinements or additional insights!</p>
default_viz = splunk.column
search = `ssef_summary(ssef_internal_index_license_usage)` latest=-0d@d \
| fields _time, label, Lic_Pool, Lic_Pool_Size, type, Index_Name, Lic_Sourcetype, Lic_Source, Lic_Host, License_Usage, Indexer_GUID \
| bin _time span=1h \
| stats Max(License_Usage) AS License_Usage latest(Lic_Pool_Size) as Lic_Pool_Size by _time label Lic_Pool Index_Name Lic_Sourcetype \
| bin _time span=1d \
| stats sum(License_Usage) AS License_Usage latest(Lic_Pool_Size) as Lic_Pool_Size by _time Lic_Pool Index_Name Lic_Sourcetype \
| rename Index_Name as Index , Lic_Sourcetype as Sourcetype \
| appendcols \
    [ search `ssef_summary(ssef_scma_indexing_data_source_inventory)` orig_index!=_* latest=-0d@d \
    | fields _time orig_index orig_sourcetype dc_host dc_source event_count severity_level newly_added \
    | bin _time span=1d \
    | stats latest(event_count) as event_count latest(dc_source) as dc_source latest(dc_host) as dc_host by _time orig_index orig_sourcetype \
    | rename orig_index as Index , orig_sourcetype as Sourcetype ] \
| fillnull value=0 event_count \
| stats max(eval(License_Usage/1024/1024/1024)) AS "License Usage (GB)" max(event_count) as "# of Events" by _time Index Sourcetype

[License Usage And Ingest Analysis]
search_name = License Usage And Ingest Analysis
readonly = 1
version = 3.0.0
date_created = 2023-10-06
date_updated = 2025-10-20 9:9:38
category = Splunk
sub_category = Licensing
tags = Cloud,Ingestion,KPIs,Licensing,Troubleshooting
solution = <p>This search enables proactive management of license usage and data ingestion, helping teams stay compliant and optimize capacity.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor overages to identify potential licensing issues.<br><b>2.</b> Investigate ingestion spikes that exceed purchased limits.<br><b>3.</b> Adjust data sources or license plans to align with trends.<br><b>4.</b> Use trend data to forecast future ingestion needs.<br><b>5.</b> Set alerts for significant deviations from average ingestion.</p><p><b>Recommended Alerts</b></p><p><b>Normal: </b> Notify if ingestion remains below purchased limits.</p><p><b>Low: </b> Trigger alerts if ingestion approaches 80% of purchased limits.</p><p><b>Medium: </b> Alert if ingestion exceeds 90% of purchased limits.</p><p><b>High: </b> Escalate if overages are sustained for multiple days.</p><p><b>Critical: </b> Trigger emergency alerts if ingestion significantly exceeds limits.</p>
dispatch_earliest_time = -90d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_telemetry source=*/license_usage_summary.log type=RolloverSummary</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Collects telemetry data related to license usage.<br><b>02</b> <code>eval GB</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Converts byte data into GB for readability.<br><b>03</b> <code>eval purchased_license</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Determines purchased license size for comparison.<br><b>04</b> <code>timechart</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates daily data ingestion and license usage.<br><b>05</b> <code>trendline</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Smooths ingestion data using a 10-day moving average.<br><b>06</b> <code>eventstats</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates average daily ingestion for reference.<br><b>07</b> <code>eval overage</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Identifies overages where ingestion exceeds license limits.<br><b>08</b> <code>eval GB</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Separates compliant data volumes from overages.<br>
explanation = <p>This search provides insights into <b>license usage</b> and <b>data ingestion patterns</b> by analyzing telemetry logs. It calculates daily ingestion volumes, compares them against purchased license limits, and identifies overages. Additionally, it uses trendlines to highlight long-term ingestion patterns.</p><p>- Calculates <b>daily GB ingestion</b> and purchased license limits.<br>- Uses <b>trendline</b> to smooth ingestion trends for better forecasting.<br>- Identifies <b>overages</b> when ingestion exceeds license limits and separates compliant data volumes.</p><p>This analysis supports capacity planning, license compliance monitoring, and proactive management of data ingestion.</p>
quid = 27FA6C6C36E9F3251800F4595C5B01B8
search_author = Splunk Searchbase Assistant
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Trendline" target="_blank">Trendline Command Documentation</a><br>Details on using trendlines for smoothing data trends.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Eventstats" target="_blank">Eventstats Command Documentation</a><br>Learn how to calculate averages and aggregate data with eventstats.</li></ul>
description = <b>Analyzes license usage and data ingestion trends</b>, identifying overages and trends based on telemetry data.
default_viz = splunk.singlevalue
search = index=_telemetry sourcetype=splunkd component=LicenseUsageSummary type=RolloverSummary\
| eval GB=b/1024/1024/1024 \
| eval purchased_license=if(license_type="SVC" OR isnull(SizeGB),0,SizeGB) \
| timechart partial=t fixedrange=t span=1d values(purchased_license) as purchased_license sum(GB) as GB \
| trendline sma10(GB) as ingest_trend \
| eventstats avg(GB) as totalavgGB \
| eval overage=if(GB>purchased_license AND purchased_license!=0,GB,null()) \
| eval GB=if(GB<=purchased_license OR purchased_license=0,GB,null())

[License Usage Trends]
search_name = License Usage Trends
readonly = 1
