<p>This documentation explains how the number of concurrent users and searches can affect Splunks performance, providing insights into resource utilization and user experience.</p>\
<ul>\
<li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Analytics/Metricsdatausecase" target="_blank">Splunk Docs: Analyzing data in the Analytics Workspace</a></li>\
</ul>\
<p>This guide demonstrates how to analyze metrics data in Splunks Analytics Workspace, offering methods to monitor data usage and user interactions.</p>\
<ul>\
<li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Metrics/Visualize" target="_blank">Splunk Docs: Visualize metrics in the Analytics Workspace</a></li>\
</ul>\
<p>This resource provides instructions on creating interactive charts of your metrics data, aiding in the visualization of data usage patterns.</p>\
<ul>\
<li><a href="https://www.splunk.com/en_us/blog/platform/welcome-to-the-future-of-data-search-exploration.html" target="_blank">Splunk Blogs: Welcome to the Future of Data Search &amp; Exploration</a></li>\
</ul>\
<p>This blog post introduces new features in Splunks search experience, enhancing data exploration and user engagement.</p>\
<ul>\
<li><a href="https://www.splunk.com/en_us/blog/learn/log-analytics.html" target="_blank">Splunk Blogs: Log Analytics: Analyzing Log Data 101</a></li>\
</ul>\
<p>This article provides an overview of log analytics, discussing how to effectively analyze log data to gain insights into system performance and user behavior.</p>
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The percentage of data in Splunk indexes accessed by searches over a selected time frame.</p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>The percentage of data accessed reflects the value derived from Splunk usage. High utilization indicates effective data use and a good return on investment, while low utilization points to potential inefficiencies and missed opportunities. <br><br>It is important to note that some data, stored for compliance or audit purposes, may not be frequently searched.</p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>Monitoring this KPI <em>monthly</em> and <em>quarterly</em> is recommended for optimal management and insight.</p>
default_viz = splunk.singlevalue
search = | `ssef_license_search_data` \
| fields _time Sourcetype License_Usage num_searches \
| where License_Usage > 0 \
| eval ingested=if(License_Usage > 0, 1, 0) , searched=if(num_searches > 0, 1, 0) \
| eventstats count(eval(ingested = 1)) as num_ingested count(eval(searched = 1)) as num_searched by _time \
| eval perc_data_access = round((num_searched / num_ingested) * 100, 2) \
| timechart partial=f fixedrange=t max(perc_data_access) as "% of Data Accessed" span=1d

[% of Regularly Accessed Analytic Capabilities to Total]
search_name = % of Regularly Accessed Analytic Capabilities to Total
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker,ssef_internal_index_license_usage
version = 1.1.5
date_updated = 2025-11-18 13:54:11
category = Splunk
sub_category = Capabilities
tags = Capabilities,IS4S,KPIs
solution = <p>Previous Version:</p><div spellcheck="false" class="ql-code-block-container"><div class="ql-code-block">| `ssef_license_search_data` </div><div class="ql-code-block">| where License_Usage &gt; 0 </div><div class="ql-code-block">| rename Sourcetype as sourcetype </div><div class="ql-code-block">| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type </div><div class="ql-code-block">| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type </div><div class="ql-code-block">| stats max(num_searches) as num_searches by _time sourcetype data_type </div><div class="ql-code-block">| lookup uce_usecase_mapping data_type AS data_type OUTPUT use_case </div><div class="ql-code-block">| stats max(num_searches) as num_searches by _time sourcetype use_case </div><div class="ql-code-block">| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type </div><div class="ql-code-block">| stats max(num_searches) as num_searches by _time sourcetype use_case use_case_type </div><div class="ql-code-block">| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()) , Analytic_Capability = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null()) </div><div class="ql-code-block">| bin _time span=1d </div><div class="ql-code-block">| addinfo </div><div class="ql-code-block">| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 </div><div class="ql-code-block">| eventstats dc(_time) as num_active_days by sourcetype </div><div class="ql-code-block">| eval perc_active = round((num_active_days / num_days) * 100, 2) </div><div class="ql-code-block">| eval Active_Analytic_Capability = if((perc_active &gt;= `ssef_perc_active_threshold`) AND num_searches &gt; 0, Analytic_Capability, null() ) </div><div class="ql-code-block">| stats </div><div class="ql-code-block">    dc(Analytic_Capability) as Num_Analytic_Capabilities</div><div class="ql-code-block">    dc(Active_Analytic_Capability) as Num_Active_Analytic_Capabilities</div><div class="ql-code-block">    by _time </div><div class="ql-code-block">| eval Perc_of_Regularly_Accessed_Analytic_Capabilities_to_total = round((Num_Active_Analytic_Capabilities / Num_Analytic_Capabilities) * 100, 2) </div><div class="ql-code-block">| fillnull value=0 Num_Analytic_Capabilities, Num_Active_Analytic_Capabilities, Perc_of_Regularly_Accessed_Analytic_Capabilities_to_total </div><div class="ql-code-block">| fields _time Num_Analytic_Capabilities Num_Active_Analytic_Capabilities Perc_of_Regularly_Accessed_Analytic_Capabilities_to_total </div><div class="ql-code-block">| bin _time span=1d </div><div class="ql-code-block">| stats max(Perc_of_Regularly_Accessed_Analytic_Capabilities_to_total) as "% of Regularly Accessed Analytic Capabilities to Total" by _time </div><div class="ql-code-block">``` | `ssef_delta_predict("% of Regularly Accessed Analytic Capabilities to Total")`  ``` </div><div class="ql-code-block">| `ssef_no_data_post("% of Regularly Accessed Analytic Capabilities to Total")`</div></div>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = A0A24E5F1C2CD9FEFAAF955E640BA373
updated_author = akhamis
description = <p><strong>Definition</strong></span> <br>The ratio of "regularly accessed analytic capabilities" to the total analytic capabilities available within Splunk over a selected time frame. <br><strong>The Value it Uncovers</strong><br>This percentage serves as a crucial Key Performance Indicator (KPI) highlighting strategic use, user satisfaction, informed decision-making, and alignment with business objectives. A low percentage indicates underutilization, suggesting that Splunk`s potential benefits are not being fully realized. Regular monitoring of this KPI is essential. <br><strong>Recommended Time Period</strong><br>It is recommended to track it <em>weekly</em>, <em>monthly</em>, <em>quarterly</em>, and <em>yearly</em> to ensure optimal utilization and benefit from the Splunk environment.</p>
default_viz = splunk.singlevalue
search = `ssef_regularly_accessed_sourcetypes` \
| bin _time span=1d \
| `ssef_active_analytic_capabilities(inventory_sourcetype)` \
| timechart span=1d fixedrange=f dc(Analytic_Capability) as "Total # of Analytic Capabilities", dc(Active_Analytic_Capability) as "# of Regularly Accessed Analytic Capabilities" \
| eval "% of Regularly Accessed Analytic Capabilities to Total" = if('Total # of Analytic Capabilities' > 0, round(('# of Regularly Accessed Analytic Capabilities' * 100) / 'Total # of Analytic Capabilities', 2), 0) \
| fields _time, "% of Regularly Accessed Analytic Capabilities to Total"

[% of Regularly Accessed Sourcetypes to Total]
search_name = % of Regularly Accessed Sourcetypes to Total
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker,ssef_internal_index_license_usage
version = 1.1.6
date_updated = 2025-11-18 13:55:45
category = Splunk
sub_category = Sourcetypes
tags = IS4S,KPIs,Sourcetypes
solution = <p>Previous Version:</p><div spellcheck="false" class="ql-code-block-container"><div class="ql-code-block">`ssef_summary(ssef_scma_indexing_data_source_inventory)` </div><div class="ql-code-block">| bin _time span=1d </div><div class="ql-code-block">| eval inventory_sourcetype = lower(orig_sourcetype) </div><div class="ql-code-block">| stats count by _time, inventory_sourcetype </div><div class="ql-code-block">| lookup ssef_effectively_referenced_sourcetypes sourcetype_name AS inventory_sourcetype OUTPUT sourcetype_name AS searched_pattern </div><div class="ql-code-block">| mvexpand searched_pattern </div><div class="ql-code-block">| join type=left _time searched_pattern </div><div class="ql-code-block">    [| search `ssef_summary_index` source IN (ssef_audit_user_login_tracker, ssef_introspection_search_telemetry) </div><div class="ql-code-block">    | bin _time span=1d </div><div class="ql-code-block">    | eval searched_pattern = lower(coalesce(Sourcetype, sourcetype_reference)) </div><div class="ql-code-block">    | where isnotnull(searched_pattern) AND searched_pattern!="" </div><div class="ql-code-block">    | makemv delim="|" searched_pattern </div><div class="ql-code-block">    | mvexpand searched_pattern </div><div class="ql-code-block">    | rex field=searched_pattern mode=sed "s/[^a-z0-9:*_.-]//g" </div><div class="ql-code-block">    | stats count by _time, searched_pattern </div><div class="ql-code-block">    | eval was_searched_today=1 </div><div class="ql-code-block">    | fields _time, searched_pattern, was_searched_today ] </div><div class="ql-code-block">| eventstats dc(_time) as total_days_in_window </div><div class="ql-code-block">| eventstats dc(eval(if(was_searched_today=1, _time, null()))) as days_sourcetype_was_searched by inventory_sourcetype </div><div class="ql-code-block">| eval search_coverage_percent = round((days_sourcetype_was_searched / total_days_in_window) * 100, 2) </div><div class="ql-code-block">| eval usage_category = if(search_coverage_percent &gt;= `ssef_perc_active_threshold`, "# of Regularly Accessed Sourcetypes", "# of Unused Sourcetypes") </div><div class="ql-code-block">| timechart span=1d dc(inventory_sourcetype) by usage_category </div><div class="ql-code-block">| eval total_sourcetypes_for_day = coalesce('# of Regularly Accessed Sourcetypes', 0) + coalesce('# of Unused Sourcetypes', 0) </div><div class="ql-code-block">| eval "% of Regularly Accessed Sourcetypes to Total" = if(total_sourcetypes_for_day &gt; 0, round((coalesce('# of Regularly Accessed Sourcetypes', 0) * 100) / total_sourcetypes_for_day, 2), 0) </div><div class="ql-code-block">| rename total_sourcetypes_for_day as "Total # of Sourcetypes" </div><div class="ql-code-block">| fields _time "% of Regularly Accessed Sourcetypes to Total"</div></div>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 38B95A2778CC1A197ED7B74FC3300011
updated_author = akhamis
description = <p><strong>Definition</strong></p><p>A sourcetype is considered '<strong>regularly accessed</strong>' if it was used in a search on 10% or more of the total active days within that period. This metric accurately identifies which data sources are consistently relevant to users, helping to validate data value and guide data retention policies.</p><p><br></p><p><strong>The Value it Uncovers</strong></p><p>This percentage serves as a key KPI, offering insights into strategic utilization, user satisfaction, informed decision-making, and potential value at risk. A notably low percentage indicates underutilization, suggesting that Splunks full benefits and value are not being maximized. Maintaining proper sourcetype hygiene is critical for accurate analytics. Regular monitoring and removal of unused or irrelevant sourcetypes are essential to maintain the integrity and relevance of data analytics.</p><p><br></p><p><strong>Recommended Time Period</strong></p><p>This KPI should be tracked <em>weekly</em> and <em>monthly</em> to ensure optimal engagement and efficient use of resources within Splunk.</p>
default_viz = splunk.singlevalue
search = `ssef_regularly_accessed_sourcetypes` \
| timechart span=1d dc(inventory_sourcetype) by usage_category \
| eval total_sourcetypes_for_day = coalesce('# of Regularly Accessed Sourcetypes', 0) + coalesce('# of Unused Sourcetypes', 0) \
| eval "% of Regularly Accessed Sourcetypes to Total" = if(total_sourcetypes_for_day > 0, round((coalesce('# of Regularly Accessed Sourcetypes', 0) * 100) / total_sourcetypes_for_day, 2), 0) \
| rename total_sourcetypes_for_day as "Total # of Sourcetypes" \
| fields _time "# of Unused Sourcetypes"

