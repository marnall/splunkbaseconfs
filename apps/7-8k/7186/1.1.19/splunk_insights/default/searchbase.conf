[accelerated_datamodels_with_undefined_root_constraints]
search_name = Accelerated Datamodels with Undefined Root Constraints
readonly = 1
ssef_cron = weekly
target_component = Data Models
version = 1.1.1
date_updated = 2025-11-25 16:4:31
category = ES Adoption
sub_category = Security
tags = Data Models,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 3D6689CFAE3179128FA42908A0A4B120
search_author = dluxton
updated_author = akhamis
related_info = <p><strong>Steps to Rectify</strong><br>Run the 2nd search in the carousel to identify what restrictions should be implemented.</p>\
<p>Either update the index allowlist via the CIM setup page. <br>ES &gt; Configure &gt; CIM Setup &gt; Authentication<br>Update index allowlist with comma-separated indexes or disable acceleration if no authentication data exists<br><br>Or directly update the CIM datamodel macros via <br>Settings &gt; Advanced Search &gt; Macros</p>
severity_normal_text = <br/><p>Unable to identify datamodels with undefined root dataset constraints</p>
severity_medium_text = <br/><p>There are between 1 and 5 accelerated datamodels with undefined root constraints<br></p>
severity_high_text = <br/><p>There are between 6 and 10 accelerated datamodels with undefined root constraints</p>\
<p></p>
severity_critical_text = <br/><p>There are more than 10 accelerated datamodels with undefined root constraints</p>\
<p></p>
description = <p>The root dataset constraint is the base search which is run to create the accelerated summaries.<br>The default root constraint for CIM datamodels specifies the appropritate tags for the data, and also has this line of configuration <em>( )</em>, which is effectively an index=*  search. <br>With the default schedule of summaries to run every 5 minutes, with multiple accleration searches, the number of index=* searches can have a significant performance impact, which then leads to long running searches, skipped searches and even resource contention.</p>
search = `ssef_summary(ssef_data_models)` disabled=0 acceleration=1 \
| eval summary_id="accelerated_datamodels_with_undefined_root_constraints" \
| stats latest(*) as * latest(_time) as _time by label, app, title \
| eval baseSearch=split(baseSearch, "#####") \
| stats count by label app title baseSearch \
| rex field=baseSearch "\`(?P<macro>\w+?)\`" \
| eval macro=trim(macro) \
| search macro=cim_* \
| lookup ssef_data_macros_lookup label title as macro output definition \
| stats values(macro) as macro values(definition) as definition values(baseSearch) as baseSearch by label, app, title \
| regex definition="(\(\)|index=\*)" \
| eventstats count as total_count \
| eval severity_level = case (total_count>10,5,total_count>5,4,true(),3) \
| rename title as datamodel, definition as macro_contents, baseSearch as constraint \
| table label app datamodel macro macro_contents constraint total_count severity_level\
| `ssef_handle_no_results(1,"The accelerated_datamodels_with_undefined_root_constraints summary job completed successfully without identifying any issues, and everything is operating as expected.")`

[accelerated_datamodels_with_undefined_root_constraints_post]
search_name = Accelerated Datamodels with Undefined Root Constraints KPI
readonly = 1
diagnostic_searches = accelerated_datamodels_with_undefined_root_constraints
version = 1.0.7
date_updated = 2025-11-25 16:5:29
category = ES Adoption
sub_category = Security
tags = Display,ES Adoption
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 0C2A13D9E660C05F83FC13508C9A9A31
search_author = dluxton
updated_author = akhamis
related_info = <p>Steps to Rectify<br>Identify the indexes with the necessary tags, i.e. for the Authentication datamodel<br>index=* tag=authentication | stats values(index) as indexes | eval indexes=mvjoin(indexes,",")<br>ES &gt; Configure &gt; CIM Setup &gt; Authentication<br>Update index whitelist with comma-separated indexes or disable acceleration if no authentication data exists</p>
description = <p>The root dataset constraint is a base search which populates the datamodel. With the CIM datamodels, the constraint is set to ( ) by default, which is effectively a index=*  search. This has a large performance impact on the instances, which leads to long running searches and even resource contention. If no results are returned, everything is all good.</p>
search = `ssef_summary(accelerated_datamodels_with_undefined_root_constraints)` \
| eval label=if(isnull(label) OR label="", host, label) \
| fields _time label app datamodel macro macro_contents constraint total_count severity_level \
| fillnull value="" app \
| stats latest(*) as * latest(_time) as _time by label app datamodel \
| bin _time span=1w \
| stats values(*) as * by _time app datamodel \
| `ssef_severity_level_text(severity_level)` \
| sort - severity_level \
| rename severity_text as Severity \
