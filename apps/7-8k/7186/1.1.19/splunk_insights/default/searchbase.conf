[ssef_search_head_bundle]
search_name = Search Head Bundle Content
readonly = 1
target_component = Infra & Arch
date_created = 2024-7-31 12:25:4
date_updated = 2024-7-31 12:25:4
category = Splunk
sub_category = Environment
tags = Environment,Summary
dispatch_earliest_time = -1d@d
