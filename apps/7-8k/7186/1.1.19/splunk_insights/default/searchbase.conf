severity_normal_text = <br/><p>No significant user account modifications have been detected in the last 1 day. User management activities, such as account creation or removal, appear to be within expected norms. It's important to continue monitoring these activities to maintain secure and appropriate access controls within Splunk.</p>
severity_medium_text = <br/><p>A notable number of user account modifications, including creations or removals, have been detected in the last 1 day. This level of activity may warrant further investigation to ensure all changes are authorized and align with security policies. Review these modifications to confirm they are legitimate and reflect intentional user management actions.</p>
description = <p>Tracks <b>Splunk user account modifications</b> (create/remove) from the <b>_audit</b> index to support <b>security governance</b> and compliance visibility. Attributes changes to source and destination users and enriches with instance labeling.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> A notable number of user modifications have been detected.</li>\
<li><strong>Normal:</strong> No significant user modifications detected.</li>\
</ul>
explanation = <p>This search monitors <b>edit_user</b> audit events where the operation is <b>create</b> or <b>remove</b>. It extracts the destination user from the audited object payload and records the actor (source user) who performed the change. Results are enriched with instance metadata (label) to support tier-level reporting and are classified with severity to flag account lifecycle activity requiring review. Use this KPI to validate account provisioning/deprovisioning workflows and detect unexpected user administration behavior.</p>
execution_plan = <b>01</b> <code>index=_audit action=edit_user ...</code><br> - Retrieve audit events for user create/remove operations.<br><b>02</b> <code>| rex "object=...dest_user"</code><br> - Extract destination user from the audited object payload.<br><b>03</b> <code>| `ssef_instance_info(host)`</code><br> - Enrich with deployment label metadata.<br><b>04</b> <code>| stats count ... by label operation src_user dest_user</code><br> - Summarize account modifications for reporting and governance review.<br><b>05</b> <code>| eval severity_level=case(...)</code><br> - Flag account lifecycle actions for attention.
solution = <p>This KPI provides audit visibility into user lifecycle events (create/remove) to support compliance, governance review, and detection of unexpected administrative behavior.</p><p><b>Suggested Actions</b>: Validate that account creates/removals align with approved change tickets and IAM policy. Investigate unexpected source users performing admin actions, unusual spikes, or modifications outside maintenance windows.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(operation="create" OR operation="remove",3,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise-security.html" target="_blank">Products: Splunk Enterprise Security</a><br>Security monitoring and compliance workflows that commonly leverage audit trails for identity governance.</li><li><a href="https://classic.splunkbase.splunk.com/category/security/" target="_blank">Splunk Apps: Security Apps</a><br>Explore security-focused apps that extend audit monitoring and identity-related detections.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=audit%20user" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Find apps related to audit analytics and user administration monitoring.</li></ul></p>
related_info = <ul><li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/user%20activity" target="_blank">Splunkbase - Apps for Monitoring User Activity</a></li><li><a href="https://community.splunk.com/t5/Monitoring-Splunk/How-to-monitor-user-account-changes-in-Splunk/m-p/517984" target="_blank">Splunk Answers - Monitoring User Account Changes</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/monitor-splunk-enterprise/audit-splunk-enterprise-activity" target="_blank">Splunk Help: Audit Splunk Enterprise activity</a><br>Background on _audit events and how Splunk records administrative actions.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search Reference</a><br>Core SPL documentation for maintaining and extending audit KPI searches.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/security/9.4/secure-your-splunk-enterprise-deployment/about-users-and-roles" target="_blank">Splunk Help: About users and roles</a><br>Conceptual reference for user/role governance relevant to account lifecycle monitoring.</li></ul>
viz_options = { "count":100 }
search = index=_audit action=edit_user (operation=create OR operation=remove) \
| eval summary_id="ssef_ia4s_users_account_modifications" \
| fields _time host info, user, operation \
| rename info AS status, user AS src_user \
| rex "object=\"(?<dest_user>\w+)" \
| `ssef_instance_info(host)` \
| stats count latest(_time) as _time by label operation src_user dest_user \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( operation="create" OR operation="remove", medium, true(), normal ) \
| table _time label src_user dest_user operation severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_users_account_modifications summary job completed successfully without identifying any issues, and everything is operating as expected.")`

