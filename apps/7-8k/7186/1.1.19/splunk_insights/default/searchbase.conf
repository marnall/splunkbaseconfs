[ssef_ia4s_users_local_accounts]
search_name = Users with Local Accounts
readonly = 1
target_component = Users
version = 2.0
date_created = 2024-1-11 12:18:17
date_updated = 2026-2-12 15:15:37
category = Splunk
sub_category = Users
tags = Identities,Local_Accounts,Authentication
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 3B8AFA130DB8746A80B46B5F79CAF644
updated_author = akhamis
severity_normal_text = <br/><p>100 or fewer Splunk-authenticated users per day, suggesting standard operational levels without indication of abnormal access patterns.</p>
severity_medium_text = <br/><p>This search becomes MEDIUM if there is a moderate, but noticeable, increase in local user accounts.</p>
description = <p>Identifies <b>locally authenticated Splunk accounts</b> (auth_type="Splunk") excluding default users. Supports <b>identity governance</b> and enforcement of centralized authentication best practices.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
explanation = <p>This search consumes summarized identity data and filters for accounts authenticated directly by Splunk (local accounts), excluding known default users. It aggregates the count of such accounts per instance label and flags environments with more than one local account. Excess local accounts can introduce governance risk, bypass centralized IAM controls, and complicate compliance validation. Monitoring local account usage supports least-privilege enforcement and identity lifecycle management.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_identities)`</code><br> - Retrieve summarized identity and authentication data.<br><b>02</b> <code>| where auth_type="Splunk"</code><br> - Filter for locally authenticated accounts only.<br><b>03</b> <code>| stats dc(identity) by label</code><br> - Calculate number of local accounts per instance label.<br><b>04</b> <code>| eval severity_level=case(...)</code><br> - Flag environments with multiple local accounts.
solution = <p>This KPI highlights environments relying on local Splunk accounts rather than centralized authentication providers.</p><p><b>Suggested Actions</b>: Validate business justification for local accounts, migrate users to centralized authentication (LDAP/SAML/SSO), remove stale accounts, and ensure break-glass accounts are controlled and monitored.</p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Security/Impact-of-local-accounts-on-security-and-user-experience-in-Splunk/m-p/420784" target="_blank">Splunk Answers - Impact of Local Accounts on Security and User Experience</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Security/Managingusersandauthentication" target="_blank">Splunk Docs - Managing Users and Authentication</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Security/SetupuserauthenticationwithSplunk" target="_blank">Setup User Authentication with Splunk</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/security/9.4/secure-your-splunk-enterprise-deployment/about-user-authentication" target="_blank">Splunk Help: About user authentication</a><br>Overview of authentication methods and best practices.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/security/9.4/secure-your-splunk-enterprise-deployment/harden-splunk-enterprise" target="_blank">Splunk Help: Harden Splunk Enterprise</a><br>Security hardening guidance including identity and access control best practices.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_identities)` NOT identity IN (`ssef_default_users`) \
| eval summary_id="ssef_ia4s_users_local_accounts" \
| fields _time identity label name Splunk_Instance emp_name emp_email auth_type last_successful_login locked_out defaultApp defaultAppIsUserOverride tz lang role splunk_role_map capabilities \
| where auth_type="Splunk" \
| stats latest(_time) as _time values(auth_type) as auth_type dc(identity) as num_users by label \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_users > 1, medium, true(), normal ) \
| table _time label auth_type num_users severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_users_local_accounts summary job completed successfully without identifying any issues, and everything is operating as expected.")`

