category = Splunk
sub_category = Apps
tags = Apps,Discovery,Inventory,REST
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 5FF3B0E6F9E5A5CF0C9983EEF2E8738F
updated_author = akhamis
related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>This Splunk query retrieves information about local apps and saves it to a lookup table.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/apps/local \
| eval summary_id="ssef_apps_local" \
| rename eai:acl.* AS * , label as app_label \
| eval Splunk_Instance = lower(splunk_server) , author = if(author="nobody", "system", author) \
| rename perms.read AS acl_perms_read , perms.write AS acl_perms_write update.appurl AS update_appurl update.homepage AS update_homepage , version AS current_version update.version AS latest_version \
| search NOT app_name IN (`ssef_default_apps`, search, launcher, splunk_datasets_addon) \
| `ssef_instance_info(Splunk_Instance)` \
| `ssef_strptime_format(updated)` \
| eval acl_perms_read = if(match(acl_perms_read, "\*"), "Everyone", acl_perms_read), acl_perms_write = if(match(acl_perms_write, "\*"), "Everyone", acl_perms_write) \
| rename title as app_name \
| stats VALUES(Splunk_Instance) AS Splunk_Instance VALUES(role) AS role VALUES(acl_perms_read) AS acl_perms_read VALUES(acl_perms_write) AS acl_perms_write LAST(app_label) AS app_label LAST(core) AS core LAST(author) AS author LAST(current_version) AS current_version LAST(latest_version) AS latest_version LAST(build) AS build LAST(check_for_updates) AS check_for_updates LAST(visible) AS visible LAST(sharing) AS sharing LAST(disabled) AS disabled LAST(configured) AS configured LAST(show_in_nav) AS show_in_nav LAST(state_change_requires_restart) AS state_change_requires_restart LAST(description) AS description LAST(details) AS details LAST(updated) AS updated LAST(setup_view) AS setup_view LAST(attribution_link) AS attribution_link LAST(update_appurl) AS update_appurl LAST(update_homepage) AS update_homepage LAST(docs_section_override) AS docs_section_override LAST(managed_by_deployment_client) AS managed_by_deployment_client LATEST(name) AS name by label, app_name \
| eval _time = now() \
| foreach role, Splunk_Instance, acl_perms_* \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| eval is4s="summary" \
| append \
    [| search `ssef_summary(ssef_apps_local)` earliest=-1d@d \
    | foreach Splunk_Instance, role, acl_perms_* \
        [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
    | stats VALUES(role) AS role, VALUES(Splunk_Instance) AS Splunk_Instance , VALUES(acl_perms_read) AS acl_perms_read , VALUES(acl_perms_write) AS acl_perms_write , LATEST(_time) AS _time , LATEST(app_label) AS app_label , LATEST(core) AS core , LATEST(author) AS author , LATEST(current_version) AS current_version , LATEST(latest_version) AS latest_version, LATEST(build) AS build , LATEST(check_for_updates) AS check_for_updates , LATEST(visible) AS visible , LATEST(sharing) AS sharing , LATEST(disabled) AS disabled , LATEST(configured) AS configured , LATEST(show_in_nav) AS show_in_nav , LATEST(state_change_requires_restart) AS state_change_requires_restart , LATEST(description) AS description , LATEST(details) AS details , LATEST(updated) AS updated , LATEST(managed_by_deployment_client) AS managed_by_deployment_client , LATEST(setup_view) AS setup_view , LATEST(attribution_link) AS attribution_link , LATEST(update_appurl) AS update_appurl , LATEST(update_homepage) AS update_homepage , LATEST(docs_section_override) AS docs_section_override LATEST(name) AS name\
        by label, app_name \
    | foreach role, Splunk_Instance, acl_perms_* \
        [ eval <<FIELD>>=mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
    | table _time, label, name, role, Splunk_Instance, app_name, app_label, core, author, current_version, latest_version, build, check_for_updates, visible, sharing, disabled, configured, show_in_nav, state_change_requires_restart, description, details, updated, acl_perms_read, acl_perms_write, setup_view, attribution_link, update_appurl, update_homepage, docs_section_override, managed_by_deployment_client \
    | outputlookup ssef_apps_local_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | stats count as num_items \
    | eval is4s="lookup" ] \
| where is4s="summary" \
| table _time, label, name, role, Splunk_Instance, app_name, app_label, core, author, current_version, latest_version, build, check_for_updates, visible, sharing, disabled, configured, show_in_nav, state_change_requires_restart, description, details, updated, acl_perms_read, acl_perms_write, setup_view, attribution_link, update_appurl, update_homepage, docs_section_override, managed_by_deployment_client, severity_level \
| `ssef_handle_no_results(1,"The ssef_apps_local summary job completed successfully without identifying any issues, and everything is operating as expected.")`

