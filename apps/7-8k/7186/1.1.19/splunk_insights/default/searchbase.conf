updated_author = shalpin
related_info = <ul><li><a href="https://help.splunk.com/en/search?q=chart+command" target="_blank">Splunk Help: Chart Command</a><br>Documentation on visualizing data with chart transformations.</li><li><a href="https://lantern.splunk.com/Search?q=login+usage+patterns" target="_blank">Lantern: Login Usage Patterns</a><br>Use case examples for understanding login trends and behavior.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-track-login-patterns-by-hour/m-p/625879" target="_blank">Community: Track Login Patterns by Hour</a><br>Community discussion on visualizing login times effectively.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=session+tracking" target="_blank">Splunk Docs: Session Tracking</a><br>Explore how sessions are tracked and utilized within searches.</li></ul>
description = <p>Tracks <b>hourly login activity</b> for active users, helping identify <b>peak usage times</b> across the platform. Useful for scheduling and resource planning.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.column
viz_options = {  "stackMode": "stacked", "backgroundColor": "transparent", "seriesColors": ["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"], "legendDisplay": "top", "xAxisTitleVisibility": "hide"  }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`, splunk-system-user) \
| fields _time user app label session \
| bin _time span=1h \
| eval session=split(session,"|") \
| stats latest(*) as * dc(session) as num_logins by _time label app user \
| makecontinuous _time span=1h\
