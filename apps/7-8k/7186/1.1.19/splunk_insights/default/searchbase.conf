dispatch_earliest_time = -8d@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 52C38AD672AF04B63A6E8FBE641215A2
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The number of new dashboards, custom-created and those installed from Splunk apps, added to Splunk within a selected time frame. <br><br></p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>The increase in new dashboards reflects growing use of Splunk and interest in improving daily operations. <br><br></p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>Tracking this KPI <em>monthly</em> offers insights into adoption trends, allowing organizations to assess how actively and effectively Splunk is being used to support business objectives.</p>
search = `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
| eval summary_id="#_of_New_Dashboards_Export" \
| bin _time span=1d \
| stats latest(newly_added) as newly_added LATEST(name) AS name by _time, label, app, sharing, author, view_name \
| bin _time span=1d \
| stats sum(eval(if(newly_added=="yes", 1, 0))) as newly_added by _time \
| eventstats avg("newly_added") as avg stdev("newly_added") as stdev \
| eval lowerBound=(avg-stdev*exact(2)), upperBound=(avg+stdev*exact(2)) \
| eval isOutlier=if('newly_added' < lowerBound OR 'newly_added' > upperBound, 1, 0) \
| where isOutlier!=1 \
| fields _time newly_added \
| rename newly_added as kpi_value  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "# of New Dashboards" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

