description = <p>Data Collection and Analysis Using Splunk Search Head Bundle.</p>
search = | bundlefiles bundle=latest \
| eval summary_id="ssef_search_head_bundle" \
| `ssef_instance_info(host)` \
| stats max(bytes) as bytes values(kvstore_app) as kvstore_app values(kvstore_collection) as kvstore_collection by label, app, path \
| rex field=path "(?<folder>(apps|users|system))" \
| rex field=path "(apps|users|system)\/\S+\/(?<file_name>.*)" \
| eval file_name_tmp=lower(file_name) \
| rex field=file_name_tmp "\.(?<file_ext>\w+$)" \
| eval file_name = if(isnull(file_name) AND isnotnull(kvstore_collection), kvstore_collection, file_name) \
| eval folder = if(isnull(folder) AND isnotnull(kvstore_collection), "kvstore", folder) \
| eval file_ext = if(isnull(file_ext) AND isnotnull(kvstore_collection), "csv", file_ext) \
| fillnull value="other" file_ext file_name folder path \
| eventstats sum(bytes) as bundle_size_bytes \
| eval _time = now() \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( bundle_size_bytes > 838860800, high, true(), normal ) \
| table _time, label, app, file_name, path, bytes, kvstore_collection, kvstore_app, file_ext, folder, bundle_size_bytes, severity_level \
| `ssef_handle_no_results(1,"The ssef_search_head_bundle summary job completed successfully without identifying any issues, and everything is operating as expected.")`

