[mc_event_processing_issues]
search_name = Event-processing issues
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Data Hygiene
category = Health Check
sub_category = Data Collection
tags = Event Breaking,Health Check,Indexing,Monitoring Console,Summary,Timestamp Extraction
solution = Check the events that are triggering these warnings. Adjust event-processing settings as needed to ensure their proper ingestion.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 363C5AF49BDF1B14587DF13E81245182
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_low_text = Some recently ingested events are triggering event-processing warnings and indicate the presence of one or more of these scenarios:  \
 1. Lines in the event are too long, exceeding props.conf / TRUNCATE  \
 2. There are too many lines per event, exceeding props.conf / MAX_EVENTS  \
 3. The extraction of event time stamps was partially or completely unsuccessful  \
These event-processing issues can have a negative impact on the performance of data ingestion.
description = This checks for warnings emitted when the index-time settings in place do not allow for the proper processing of recently ingested data (in the last hour).
search = index=_internal earliest=-60m (source=*splunkd.log* (component=AggregatorMiningProcessor OR component= LineBreakingProcessor OR component=DateParserVerbose) (log_level=WARN OR log_level=ERROR)) OR (source=*metrics.log* group=thruput name=index_thruput) \
| eval summary_id="mc_event_processing_issues" \
| stats sum(eval(round(ev,0))) AS event_count count(eval(component=="AggregatorMiningProcessor")) AS aggregation_issues count(eval(component=="LineBreakingProcessor")) AS line_breaking_issues count(eval(component=="DateParserVerbose")) AS date_parsing_issues by host \
| eval crap_score = round((aggregation_issues + line_breaking_issues + date_parsing_issues) / event_count * 1000, 3) \
| eval severity_level = case (crap_score == 0, 1, crap_score > 0 AND crap_score < 1, 1, True(), 2) \
| rename host AS instance \
| fields - crap_score\
| `ssef_handle_no_results(1,"The mc_event_processing_issues summary job completed successfully without identifying any issues, and everything is operating as expected.")`

