related_info = <ul><li><a href="https://lantern.splunk.com/Search?q=User%20Behavior%20Profiling" target="_blank">Lantern: User Behavior Profiling</a><br>Learn how to identify and understand power users in Splunk.</li><li><a href="https://help.splunk.com/en/search?q=Stats+Command" target="_blank">Splunk Help: Stats Command</a><br>Guide on using stats for aggregation and reporting.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=Dashboards+Performance" target="_blank">Splunk Docs: Dashboards Performance</a><br>Improving dashboard responsiveness and efficiency.</li><li><a href="https://lantern.splunk.com/Search?q=Search%20Efficiency" target="_blank">Lantern: Search Efficiency</a><br>Best practices for writing efficient searches to reduce resource use.</li></ul>
description = <p>Summarizes <b>resource usage and search behavior</b> of regularly seen users across dashboards and saved searches. Filters by active users and highlights usage impact metrics.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = (`ssef_summary(ssef_scma_top_50_dashboards)`) OR (`ssef_summary(ssef_scma_top_50_jobs)`) NOT user IN (`ssef_default_users`,splunk-system-user,admin) \
| fields _time source label Splunk_Role role name app user provenance weighted_expense_factor overall_expense_factor user_count search_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb savedsearch_name run_count severity_level \
| eval user=split(user,","), type=if(source="ssef_scma_top_50_dashboards", "adhoc", "jobs") \
| stats avg(search_count) as avg_search_count_adhoc avg(weighted_expense_factor) as weighted_expense_factor avg(overall_expense_factor) as overall_expense_factor avg(normalized_pct_cpu) as avg_normalized_pct_cpu avg(disk_read_mb) as avg_disk_read_mb avg(disk_write_mb) as avg_disk_write_mb avg(mem_used) as avg_mem_used avg(elapsed) as avg_elapsed avg(scan_count) as avg_scan_count values(label) as label values(provenance) as provenance values(savedsearch_name) as savedsearch_name dc(savedsearch_name) as num_jobs dc(provenance) as num_adhoc values(type) as type values(app) as app dc(app) as num_apps by user \
| foreach avg_* weighted_expense_factor overall_expense_factor \
    [ eval <<FIELD>>=round(<<FIELD>>,2) ] \
| `ssef_regularly_seen_users(user)` \
| where perc_active >= `ssef_perc_active_threshold` \
| sort - perc_active \
| table user perc_active num_active_days num_days type label app num_apps provenance num_adhoc avg_elapsed avg_mem_used avg_normalized_pct_cpu avg_disk_read_mb avg_disk_write_mb \
| rename user AS "Username", perc_active AS "Percent Active", num_active_days AS "Active Days Count", num_days AS "Total Days Count", type AS "Search Type", label AS "Search Head(s)", app AS "Apps", num_apps AS "Number of Apps", provenance AS "Dashboard(s)", num_adhoc AS "Adhoc Searches Count", avg_elapsed AS "Average Elapsed Time", avg_mem_used AS "Average Memory Used (MB)", avg_normalized_pct_cpu AS "Average Normalized CPU %", avg_scan_count AS "Average Scan Count", avg_search_count_adhoc AS "Average Adhoc Search Count", avg_disk_read_mb AS "Average Disk Read (MB)", avg_disk_write_mb AS "Average Disk Write (MB)"

