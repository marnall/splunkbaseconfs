[recommended_additional_key_wineventlog_sources]
search_name = Recommended Additional WinEventLog Sources
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 1.0.6
date_updated = 2025-11-24 13:45:41
category = ES Adoption
sub_category = Security
tags = ES Adoption,Log Sources,Summary,Utility,Windows
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = B74B76AD54B2D0986F61F27FDFACBF30
search_author = dluxton
updated_author = akhamis
related_info = <p><strong>How to Review</strong><br>There should be a consistent number of hosts across all of the additional recommended sources<br></p>\
<p>Example inputs.conf configuration for onboarding this data can be found <a href="https://lantern.splunk.com/Security/Product_Tips/Enterprise_Security/Configuring_Windows_event_logs_for_Enterprise_Security_use" target="_blank">here</a> .</p>
severity_normal_text = <br/><p>All 5 <span style="color: rgb(60,68,77);background-color: rgb(255,255,255);font-size: 14px;font-family: Splunk Platform Sans", "Proxima Nova", Roboto, Droid, "Helvetica Neue", Helvetica, Arial, sans-serif;">additional recommended</span> wineventlog sources were identified.</p>
severity_medium_text = <br/><p>Between 1 and 4 additional recommended wineventlog sources were not identified.</p>
severity_high_text = <br/><p>Unable to identify all 5 <span style="color: rgb(60,68,77);background-color: rgb(255,255,255);font-size: 14px;font-family: Splunk Platform Sans", "Proxima Nova", Roboto, Droid, "Helvetica Neue", Helvetica, Arial, sans-serif;">additional recommended </span>WinEventLog Sources.</p>
description = <p>In an ideal deployment, all windows devices will have a consistent baseline of which sourcetypes and eventcodes are being ingested. Use the search below to identify potential gaps in the inputs configuration across the fleet.</p>\
<p>List of additional recommended wineventlog sources:</p>\
<ul>\
<li>WinEventLog:Directory Service</li>\
<li>WinEventLog:Key Management Service</li>\
<li>WinEventLog:Microsoft-Windows-TerminalServices-LocalSessionManager/Operational</li>\
<li>WinEventLog:Microsoft-Windows-WinRM/Operational</li>\
<li>WinEventLog:Microsoft-Windows-TaskScheduler/Operational</li>\
</ul>\
<p></p>
search = | tstats summariesonly=true dc(host) as hostCount count WHERE \
    [| `ssef_all_indexes` ] AND sourcetype=*wineventlog* source IN ("*WinEventLog:Directory Service","*WinEventLog:Key Management Service","*WinEventLog:Microsoft-Windows-TerminalServices-LocalSessionManager/Operational","*WinEventLog:Microsoft-Windows-WinRM/Operational","*WinEventLog:Microsoft-Windows-TaskScheduler/Operational") by sourcetype source \
| eval summary_id="recommended_additional_key_wineventlog_sources" \
| rex mode=sed field=source "s/Xml//g" \
| eval recomended_sources=mvappend("WinEventLog:Directory Service","WinEventLog:Key Management Service","WinEventLog:Microsoft-Windows-TerminalServices-LocalSessionManager/Operational","WinEventLog:Microsoft-Windows-WinRM/Operational","WinEventLog:Microsoft-Windows-TaskScheduler/Operational") \
| eventstats values(source) as matched_sources \
| eval severity_level = case (mvcount(matched_sources)>=5,1,mvcount(matched_sources)=0,4,true(),3) \
| appendpipe \
    [| mvexpand recomended_sources \
    | where NOT recomended_sources IN (matched_sources) \
    | stats values(recomended_sources) as missing_sources] \
| eventstats values(missing_sources) as missing_sources \
| rename sourcetype as sourcetype_name , source as source_name \
| table sourcetype_name source_name count hostCount matched_sources missing_sources recomended_sources severity_level \
| `ssef_handle_no_results(4,"WARNING: Unable to identify additional recommended WinEventLog Sources.")`

