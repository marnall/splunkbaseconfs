related_info = <ul>\
<li><a href="https://splunkbase.splunk.com/app/7066" target="_blank">SA-DetectionInsights</a></li>\
</ul>
severity_medium_text = <br/><p>One of the following criteria was met:</p>\
<ul>\
<li>Less than 40 notables triggered during 7 day window</li>\
<li>A single notable triggered over 40% of all notable alerts</li>\
<li>The count of non-informational notables exceeded 50 alerts per day, per analyst</li>\
</ul>
severity_high_text = <br/><p>One of the following criteria was met:</p>\
<ul>\
<li>Less than 10 notables triggered during 7 day window</li>\
<li>A single notable triggered over 70% of all notable alerts</li>\
<li>The count of non-informational notables exceeded 100 alerts per day, per analyst</li>\
</ul>
severity_critical_text = <br/><p>One of the following criteria was met:</p>\
<ul>\
<li>No notables triggered during 7 day time period</li>\
<li>The count of non-informational notables exceeded 1000 alerts per day, per analyst</li>\
</ul>
description = <p>A review of the volume of alerts over the past 7 days.</p>
search = `notable` \
| eval summary_id="triggered_alerts" \
| search notable_type=notable \
| eventstats count as total_notables dc(eval(if(owner!="unassigned",owner,null()))) as uniqueCountOfAnalysts count(eval(if(NOT severity="informational",source,null()))) as total_notables_non_informational \
| stats values(total_notables) as total_notables values(uniqueCountOfAnalysts) as uniqueCountOfAnalysts values(total_notables_non_informational) as total_notables_non_informational count by source \
| eval uniqueCountOfAnalysts=if(uniqueCountOfAnalysts=0,1,uniqueCountOfAnalysts) \
| sort - count \
    ``` Missing logic to calculate too many notables triggered, need to have a form which inputs the number of SOC analysts then works out some averages from there```\
| eval severity_level = case (\
    total_notables=0 OR (total_notables_non_informational/7/uniqueCountOfAnalysts)>1000,5,\
    total_notables<10 OR (total_notables_non_informational/7/uniqueCountOfAnalysts)>100 OR count/total_notables*100>=70,4,\
    total_notables<40 OR (total_notables_non_informational/7/uniqueCountOfAnalysts)>50 OR count/total_notables*100>=40,3,\
    true(),1) \
| rename source as source_name\
| table count severity_level source_name total_notables total_notables_non_informational uniqueCountOfAnalysts\
