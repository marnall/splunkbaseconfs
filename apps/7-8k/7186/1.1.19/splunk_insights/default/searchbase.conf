description = <p>Top 50 Dashboards With User Count</p>
search = `ssef_summary(ssef_scma_top_50_dashboards)` \
| fields _time label Splunk_Role role name app user provenance weighted_expense_factor overall_expense_factor user_count search_count normalized_pct_cpu mem_used elapsed scan_count disk_read_mb disk_write_mb severity_level \
| stats latest(*) AS * latest(_time) as _time by label Splunk_Role app provenance \
| bin _time span=1d \
| stats max(*) AS * by _time provenance \
| rename provenance as dashboard \
| join dashboard type=left \
    [| search `ssef_summary(ssef_internal_web_access_tracker)` \
    | fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
    | bin _time span=1h \
    | stats latest(*) as * sum(num_users) as num_users by _time, label, type, app, view \
    | eval users_mv=split(users_mv,", ") \
    | rename view as dashboard \
    | bin _time span=1d \
    | stats values(users_mv) as users_mv max(num_users) as num_users by dashboard \
    | eval num_users = if(isnotnull(users_mv), mvcount(users_mv), num_users) ] \
| fields - users_mv \
| table _time Splunk_Role label dashboard app user disk_read_mb disk_write_mb elapsed mem_used normalized_pct_cpu num_users overall_expense_factor scan_count search_count user_count weighted_expense_factor

