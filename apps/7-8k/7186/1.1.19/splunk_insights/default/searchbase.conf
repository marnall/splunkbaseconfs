description = <p>Monitoring new app access activity over the first 30 days helps identify engagement patterns that indicate successful adoption, such as frequent searches or dashboard use. Recognizing these behaviors early can highlight users likely to remain engaged, allowing for targeted support or training. Ensuring consistent usage during the initial period maximizes the chances that new users will continue to derive long-term value from the Splunk platform.</p>\
<p></p>\
<p><strong>Consideration</strong>: An app is considered "new" for 3 weeks after being first seen. It might be valuable to understand which new users stay engaged by tracking the first 3 weeks of activity.</p>
search = `ssef_summary(ssef_ia4s_apps_app_activities)` num_apps_created>0  earliest=-30d\
| fields _time label name app_name num_apps_created num_apps_modified num_apps_removed severity_level\
| bin _time span=1d\
| where _time >= relative_time(now(), "-30d")  ```Ensures only last 30 days```\
| eval Date = _time\
| fieldformat Date = strftime(Date, "%B %d, %Y %I:%M:%S %p")\
| stats latest(Date) as Date by label, app_name\
| rename label as "Search Head" app_name AS "App Name"\
| appendpipe \
    [| stats count \
    | where count=0 \
    | eval Message="No new Splunk apps have been created or installed in the last 30 days." \
    | table Message ]

