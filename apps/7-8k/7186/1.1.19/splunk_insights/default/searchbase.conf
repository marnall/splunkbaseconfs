related_info = <ul><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-calculate-daily-volume-of-logs-ingested-by-index/m-p/676870" target="_blank">Splunk Community: How to calculate daily volume of logs ingested by index</a></li></ul><p>This discussion provides methods to calculate the daily volume of logs ingested by index in Splunk, offering insights into data ingestion patterns and their reflection on customer value.</p><ul><li><a href="https://community.splunk.com/t5/Deployment-Architecture/How-can-I-get-Splunk-index-daily-data-volume-size-for-specific/m-p/325003" target="_blank">Splunk Community: How can I get Splunk index daily data volume size for specific indexes</a></li></ul><p>This thread discusses approaches to determine the daily data volume ingested into specific indexes, aiding in understanding data usage and its impact on customer value.</p><ul><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-find-the-average-of-daily-indexed-data-by-host-for-a/m-p/193784" target="_blank">Splunk Community: How to find the average of daily indexed data by host for a given time range</a></li></ul><p>This discussion explores methods to calculate the average daily indexed data per host over a specified time range, providing insights into data ingestion trends and customer value.</p><ul><li><a href="https://community.splunk.com/t5/Monitoring-Splunk/License-consumed-how-to-calculate-the-daily-ingest-per-index/m-p/551214" target="_blank">Splunk Community: License consumed, how to calculate the daily ingest per index</a></li></ul><p>This thread offers guidance on calculating daily data ingestion per index in relation to license usage, helping assess data volumes and their correlation with customer value.</p><ul><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Splunk-Average-Daily-Ingest-by-Month-Excluding-Weekends/m-p/660697" target="_blank">Splunk Community: Splunk Average Daily Ingest by Month Excluding Weekends</a></li></ul><p>This discussion provides insights into calculating the average daily data ingestion by month, excluding weekends, to understand data patterns and their impact on customer value.</p><ul><li><a href="https://docs.splunk.com/Documentation/SOAR/current/Admin/IngestSummary" target="_blank">Splunk Docs: View how much data is ingested using ingestion summary</a></li></ul><p>This documentation explains how to use the ingestion summary feature to monitor data ingestion volumes, aiding in evaluating data usage and customer value.</p><ul><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/9.3.2408/Data/DataIngest" target="_blank">Splunk Docs: Use ingest actions to improve the data input process</a></li></ul><p>This resource discusses how to utilize ingest actions to enhance data input processes, which can influence data ingestion efficiency and customer value.</p><ul><li><a href="https://www.splunk.com/en_us/blog/platform/enhancements-to-ingest-actions-improve-usability-and-expand-searchability-wherever-your-data-lives.html" target="_blank">Splunk Blogs: Enhancements To Ingest Actions Improve Usability and Expand Searchability Wherever Your Data Lives</a></li></ul><p>This blog post highlights improvements to ingest actions in Splunk, emphasizing how these enhancements can optimize data ingestion and increase customer value.</p><ul><li><a href="https://www.splunk.com/en_us/blog/conf-splunklive/ingest-actions-data-access-when-where-and-how-you-need-it.html" target="_blank">Splunk Blogs: Ingest Actions: Data Access When, Where and How You Need It</a></li></ul><p>This article introduces ingest actions in Splunk, detailing how they provide flexible data access and improve the value delivered to customers.</p><ul><li><a href="https://www.splunk.com/en_us/blog/leadership/the-dollars-and-sense-of-data-strategy-managing-data-agility-and-value.html" target="_blank">Splunk Blogs: The Dollars and Sense of Data Strategy: Managing Data, Agility, and Value</a></li></ul><p>This blog post explores the economic aspects of data strategy, discussing how effective data ingestion and management can enhance customer value.</p>
description = <p>This search analyzes <b>average daily license usage</b> by <b>sourcetype</b> to identify primary drivers of license consumption. It highlights how much data each sourcetype contributes relative to overall <b>license utilization</b>. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.singlevalue
search = index=_telemetry sourcetype=splunkd component=LicenseUsageSummary source="*license_usage_summary.log" TERM("type=RolloverSummary") b>0 pool=* \
| rex field=_raw "^(?<timestring>\d\d-\d\d-\d{4}\s\d\d:\d\d:\d\d.\d{3}\s\+\d{4})" \
| eval event_time=strptime(timestring,"%m-%d-%Y %H:%M:%S.%N%z") \
| eval rel_src_time=relative_time(event_time, tostring(-1440)."m") \
| eval zone=strftime(rel_src_time,"%z") \
| eval minutes=substr(zone,-2) \
| eval hours=substr(zone,2,2) \
| eval mzone=if(zone!=0, ((hours*60)+minutes)*(zone/abs(zone)), 0) \
| eval rel_time_in_mins=-1440-mzone \
| eval rel_time=if(rel_time_in_mins >= 0 , "+".tostring(rel_time_in_mins)."m", tostring(rel_time_in_mins)."m") \
| eval _time=relative_time(event_time, rel_time) + 1 \
| eval peer=coalesce(slave,peer) \
| bin _time span=1d \
    ```If you notice that the total daily usage appears inaccurate, try changing the following line in your query to see if it improves the results: | stats latest(b) AS b by peer, pool, _time ```\
| stats sum(b) AS b by peer, pool, _time\
| stats sum(b) as b by _time \
| timechart partial=t fixedrange=t eval(round(avg(b) / 1024/1024/1024, 2)) AS "Average Daily Ingest" span=1d

