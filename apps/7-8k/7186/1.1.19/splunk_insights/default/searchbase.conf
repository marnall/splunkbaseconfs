description = <p>Summarizes hosts with <b>large knowledge bundle sizes</b> using summary data. Highlights deployment and configuration risks that can impact <b>search performance</b> and replication latency. Supports proactive <b>architecture governance</b> and bundle optimization.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
explanation = <p>This Details search consumes the Hosts With Large Bundles KPI summary and aggregates the latest state across the search tier. Large knowledge bundles can increase replication latency, captain synchronization delays, dispatch time, and overall search-head cluster instability. By surfacing affected hosts and associated event messages alongside severity context, this search helps operators identify configuration bloat caused by excessive lookups, large knowledge objects, unmanaged app growth, or unoptimized deployment packaging. Monitoring bundle growth is critical for maintaining cluster stability and search execution performance.</p>
execution_plan = <b>01</b> <code>`ssef_summary(summary_hosts_with_large_bundles)`</code><br> - Retrieve summarized bundle-size KPI results from the Insights collection.<br><b>02</b> <code>| stats latest(*) values(event_message)</code><br> - Aggregate the most recent state across hosts and retain event context.<br><b>03</b> <code>| `ssef_severity_level_text(severity_level)`</code><br> - Translate numeric severity into descriptive severity text.<br><b>04</b> <code>| convert ctime(_time)</code><br> - Normalize timestamp for presentation and reporting.
solution = <p>Large knowledge bundles can degrade replication performance and increase dispatch latency within search-head clusters.</p><p><b>Suggested Actions</b>: Review oversized apps and lookups, remove unused knowledge objects, compress large CSV lookups, split overly large apps, and validate bundle replication health. Consider implementing governance controls around app deployment and content packaging.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(hosts_with_large_bundle_sizes&gt;10,5,hosts_with_large_bundle_sizes&gt;5,4,hosts_with_large_bundle_sizes&gt;0,3,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Managed deployment architecture and scaling options that reduce operational overhead from bundle replication pressure.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utility Apps</a><br>Administrative and troubleshooting tools that help audit and optimize knowledge object footprint.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=knowledge%20bundle%20size" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps focused on bundle analysis, configuration governance, and deployment optimization.</li></ul></p>
