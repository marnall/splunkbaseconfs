search_name = Threat Activity Threat Feed Breakdown
readonly = 1
ssef_cron = weekly
target_component = Threat Intelligence
version = 1.0.2
date_updated = 2025-11-25 22:37:49
category = ES Adoption
sub_category = Security
tags = ES Adoption,Summary,Threat Intelligence
dispatch_earliest_time = -30d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 9A2F3079915557320CDE86FBB1E85916
search_author = dluxton
updated_author = akhamis
related_info = <p>How to Review<br>Run the search over the past 7 days to identify the most noisy feeds. <br>Take note of weighting applied (ES &gt; Configure &gt; Data Enrichment &gt; Threat Intelligence Management &gt; Sources: Edit individual source to view weighting applied) and see if the detection "Threat Activity Detected" spits out too many results.</p>
severity_high_text = <br/><p>No threat matching data present over 30 day period.</p>
description = <p>Each different threat feed may have its own confidence or score. When combining the use of high confidence feeds and lower confidence feeds, weighting can be implemented to prioritise sightings from more reputable feeds. That said, sometimes the lower confidence feeds can contribute so much noise, they no longer provide any value. <br>This search aims to identify particular threat feeds which are raising large volumes of noise.</p>
search = | tstats summariesonly=false count from datamodel=Threat_Intelligence.Threat_Activity by host Threat_Activity.threat_key span=1d _time \
| eval summary_id="threat_activity_threat_feed_breakdown" \
| rename "Threat_Activity.*" as * \
| stats sum(count) as count by threat_key \
| eventstats sum(count) as total \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( total > 0, high, true(), normal ) \
| table threat_key count total severity_level \
| `ssef_handle_no_results(4,"WARNING: No threat matching events have been identified during this 30 day window")`

