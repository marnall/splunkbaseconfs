description = <p>Detects <b>parsing issues</b> and other <b>data hygiene warnings</b> on sourcetypes that are regularly accessed, ensuring focus on high-impact sources. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_regularly_accessed_sourcetypes` \
| where search_coverage_percent >= `ssef_perc_active_threshold` \
| join type=left searched_pattern \
    [ search `ssef_summary(ssef_scma_data_hygiene_event_indexing)` \
    | fields _time aggregation_issues data_hosts data_sources date_parsing_issues line_breaking_issues orig_sourcetype severity_level warn_count \
    | bin _time span=1d \
    | stats latest(*) as * by _time orig_sourcetype \
    | lookup ssef_effectively_referenced_sourcetypes sourcetype_name AS orig_sourcetype OUTPUT sourcetype_name AS searched_pattern \
    | mvexpand searched_pattern \
    | fields _time searched_pattern data_sources data_hosts line_breaking_issues date_parsing_issues aggregation_issues warn_count severity_level ] \
| where isnotnull(warn_count) \
| `ssef_sourcetype_info(inventory_sourcetype)` \
| stats max(*) as * by inventory_sourcetype \
| foreach * \
    [ eval <<FIELD>>=mvdedup(<<FIELD>>) ] \
| sort - warn_count \
| table inventory_sourcetype warn_count line_breaking_issues date_parsing_issues aggregation_issues data_hosts data_sources severity_level LINE_BREAKER SHOULD_LINEMERGE KV_MODE MAX_TIMESTAMP_LOOKAHEAD EVENT_BREAKER_ENABLE ANNOTATE_PUNCT LEARN_MODEL LEARN_SOURCETYPE BREAK_ONLY_BEFORE_DATE TRUNCATE TIME_PREFIX EVENT_BREAKER DATETIME_CONFIG INDEXED_EXTRACTIONS maxDist MAX_EVENTS \
| rename inventory_sourcetype as Sourcetype , dc_host as "# of Hosts" , dc_source as "# of Sources" , event_count as "# of Events" , newly_added as "Newly Added"

