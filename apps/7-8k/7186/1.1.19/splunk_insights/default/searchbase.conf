solution = <p>This search enables tracking of sourcetype usage across the Splunk environment, offering capability for performance tuning and resource optimization.</p><p><b>Suggested Actions</b><br><b>1.</b> Review sourcetype performance metrics regularly.<br><b>2.</b> Set alerts on unexpected sourcetype spikes.<br><b>3.</b> Consider optimizing frequently queried sourcetypes.<br><b>4.</b> Evaluate app performance based on sourcetype usage.<br><b>5.</b> Document findings to share with your Splunk team.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (extracted_sourcetype="Critical Sourcetype", 5, extracted_sourcetype="High Usage", 4, extracted_sourcetype="Medium Usage", 3, extracted_sourcetype="Low Usage", 2, true(), 1)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <br/><b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload! In some cases if the search "returns no results" but finishes without errors we will set the severity to "normal.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> <i>Usage is consistent and expected without anomalies.</i></li><li><b>Low (Severity 2):</b> <i>Some sourcetypes are rarely used, potential for optimization.</i></li><li><b>Medium (Severity 3):</b> <i>Moderate usage noted, indicating areas to monitor.</i></li><li><b>High (Severity 4):</b> <i>High usage detected, requiring immediate investigation.</i></li><li><b>Critical (Severity 5):</b> <i>Critical sourcetype in heavy use, may impact performance.</i></li></ul>
