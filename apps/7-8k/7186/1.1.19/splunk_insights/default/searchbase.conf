[Sourcetype Details]
search_name = Sourcetype Details
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker,ssef_internal_index_license_usage
version = 2.0
date_created = 2024-11-22 15:58:19
date_updated = 2025-2-4 16:10:5
category = Splunk
sub_category = Capabilities
tags = Adoption,Details,Sourcetypes
solution = <p>This search helps optimize license usage by identifying heavily used sourcetypes and their mapping to use cases. This supports cost control, ingestion planning, and use case coverage analysis.</p><p><b>Suggested Actions</b><ul><li>Review high-usage sourcetypes to ensure their ingestion is justified.</li><li>Investigate sourcetypes with low or no associated use cases.</li><li>Use domain/category mapping to align ingestion with strategic priorities.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Monitor and optimize license usage across your cloud workloads.</li><li><a href="https://lantern.splunk.com/Search?q=license%20usage" target="_blank">Lantern: License Usage</a><br>Best practices for understanding and managing license volume.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=license%20usage" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps related to license auditing and data consumption insights.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| `ssef_license_search_data`</code><br> - Use summary macro to retrieve license and search data per sourcetype.<br><b>02</b> <code>| stats values(Index_Name)... by Sourcetype</code><br> - Aggregate metrics such as license usage, search count, references, and search timing.<br><b>03</b> <code>| where License_Usage > 0</code><br> - Filter out sourcetypes with zero license usage.<br><b>04</b> <code>| lookup uce_custom_sourcetype_mapping...</code><br> - Enrich sourcetypes with category, domain, and data_type from custom mapping.<br><b>05</b> <code>| lookup uce_sourcetype_mapping...</code><br> - Apply fallback mapping for unmapped entries.<br><b>06</b> <code>| eval ... mvdedup and makemv</code><br> - Normalize and split multivalue fields for further processing.<br><b>07</b> <code>| lookup uce_usecase_mapping...</code><br> - Map data types to use cases.<br><b>08</b> <code>| fillnull value="None matched"</code><br> - Label unmatched categories and domains.<br><b>09</b> <code>| stats dc(use_case)...</code><br> - Calculate use case count and aggregate metadata per sourcetype.<br><b>10</b> <code>| sort - num_searches</code><br> - Prioritize sourcetypes by search frequency.<br><b>11</b> <code>| eval ... tostring</code><br> - Format numbers with commas for readability.<br><b>12</b> <code>| table...</code><br> - Format final fields for reporting.<br><b>13</b> <code>| rename...</code><br> - Rename columns for clarity in output.<br>
explanation = <p>This search reveals how much license volume and search activity is consumed per sourcetype, helping you understand content utilization patterns. It enriches sourcetypes with category, domain, and use case metadata to contextualize data consumption. This is valuable for license optimization, auditing search behavior, and identifying high-value sources. Data platform owners and content strategists can use these insights to manage ingestion costs and prioritize supported content. The output also shows how many use cases are associated with each sourcetype, emphasizing coverage and mapping effectiveness.</p>
quid = 5303E781A24E92B3E57E727B1C621A6B
updated_author = akhamis
related_info = related_info = <ul><li><p><a href="https://docs.splunk.com/Documentation/SplunkCloud/9.2.2406/Data/Whysourcetypesmatter">Splunk Docs: Why source types matter</a></p><p>This documentation explains the importance of source types in the Splunk platform, detailing how they categorize data inputs and influence data processing, which directly impacts user experience and the value derived from Splunk.</p></li><li><p><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/Data/Setsourcetype">Splunk Docs: Assign the correct source types to your data</a></p><p>This guide provides instructions on assigning appropriate source types to your data, ensuring accurate data interpretation and optimal search performance, thereby enhancing user satisfaction.</p></li><li><p><a href="https://docs.splunk.com/Documentation/SplunkCloud/9.3.2408/Data/Aboutdefaultfields">Splunk Docs: About default fields (host, source, sourcetype, and more)</a></p><p>This resource offers insights into default fields in Splunk, including 'sourcetype', and discusses their roles in data indexing and search functionalities, which are crucial for effective data analysis and user experience.</p></li><li><p><a href="https://community.splunk.com/t5/Getting-Data-In/What-is-best-way-to-use-sourcetype-with-HTTP-Event-Collector-to/m-p/225109">Splunk Community: What is best way to use sourcetype with HTTP Event Collector to categorize data?</a></p><p>This community discussion explores best practices for utilizing 'sourcetype' with the HTTP Event Collector to categorize data effectively, aiding in streamlined data management and improved user interactions.</p></li><li><p><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Data/Createsourcetypes">Splunk Docs: Create source types</a></p><p>This documentation guides you through creating custom source types in Splunk, enabling tailored data processing configurations that can enhance the relevance and efficiency of user searches.</p></li><li><p><a href="https://lantern.splunk.com/Platform_Data_Management/Optimize_Data">Drive more value through data source and use case optimization</a></p><p>This presentation discusses strategies for optimizing data sources and use cases in Splunk, emphasizing the role of proper source type management in maximizing customer value and improving user experience.</p></li><li><p><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Data_Management/Configuring_new_source_types">Lantern: Configuring new source types</a></p><p>This guide provides best practices for configuring new source types in Splunk, ensuring accurate data parsing and indexing, which are essential for effective searches and user satisfaction.</p></li><li><p><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/Data/Managesourcetypes">Splunk Docs: Manage source types</a></p><p>This resource offers information on managing source types within Splunk, including editing and deleting custom source types, to maintain data integrity and optimal platform performance.</p></li><li><p><a href="https://community.splunk.com/t5/Splunk-Search/Search-Performance-Does-filtering-on-sourcetype-source-or-host/m-p/172210">Splunk Community: Search Performance: Does filtering on sourcetype, source, or host improve search performance?</a></p><p>This discussion examines how filtering searches by 'sourcetype', 'source', or 'host' can impact search performance, providing insights into efficient search practices that enhance user experience.</p></li><li><p><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Listofpretrainedsourcetypes">Splunk Docs: List of pretrained source types</a></p><p>This documentation lists the pretrained source types recognized by Splunk, assisting in understanding default data categorizations and their implications for data processing and user interactions.</p></li></ul>
description = <p>Aggregates <b>license usage</b> and <b>search activity</b> by sourcetype, linking them to <b>categories, domains</b>, and <b>use cases</b> for better content mapping and visibility. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = | `ssef_license_search_data` \
| stats \
    values(Index_Name) as Indexes \
    Sum(num_searches) as num_searches\
    Sum(License_Usage_GB) as License_Usage_GB\
    Sum(License_Usage) as License_Usage\
    Latest(earliest_search) as earliest_search\
    Latest(latest_search) as latest_search\
    Latest(total_search_time) as total_search_time\
    Latest(index_reference) as index_reference\
    Latest(datamodel_reference) as datamodel_reference\
    Latest(lookup_reference) as lookup_reference\
    Latest(search_type) as search_type\
    by Sourcetype \
| where License_Usage > 0 \
| lookup uce_custom_sourcetype_mapping sourcetype_name as Sourcetype OUTPUT category, domain, data_type \
| lookup uce_sourcetype_mapping sourcetype_name AS Sourcetype OUTPUTNEW category, domain, data_type \
| eval data_type=mvdedup(data_type),\
    category=mvdedup(category), \
    domain=mvdedup(domain) \
| makemv delim="|" category \
| makemv delim="|" domain \
| lookup uce_usecase_mapping data_type OUTPUT use_case \
| fillnull value="None matched" category domain \
| stats dc(use_case) AS capability_count \
    values(category) AS category \
    values(domain) AS domain by Sourcetype Indexes License_Usage_GB num_searches \
| sort - num_searches \
| eval num_searches=tostring(num_searches, "commas"),\
    License_Usage_GB=tostring(License_Usage_GB, "commas") \
| table Sourcetype Indexes License_Usage_GB num_searches category domain capability_count \
| rename "License_Usage_GB" AS "License Usage (MB)" num_searches AS "Search Count" category AS Category domain AS Domain capability_count AS "Capabilities linked to"

