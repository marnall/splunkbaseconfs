solution = <p>This view enables teams to <b>rationalize dashboard sprawl</b> and focus optimization efforts on dashboards that matter most.</p><p><b>Suggested Actions</b> Review dashboards with low or zero usage for potential retirement. Optimize frequently accessed dashboards by validating refresh intervals, panel counts, and underlying data references.</p><p><b>Recommended For You:</b><ul><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utilities</a><br>Utility apps that assist with dashboard governance, cleanup, and administrative visibility.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunk Apps: IT Operations Management</a><br>Apps that help monitor dashboard usage patterns and overall UI performance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=dashboard%20governance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Additional Splunk apps related to dashboard inventory, governance, and usage analysis.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary(ssef_data_ui_views)</code><br> - Collects dashboard and view metadata from IS4S summaries.<br><b>02</b> <code>| foreach / stats</code><br> - Normalizes multi-value fields and aggregates dashboard attributes.<br><b>03</b> <code>| append ssef_internal_web_access_tracker</code><br> - Enriches dashboards with usage metrics such as users and page loads.<br><b>04</b> <code>| stats / table</code><br> - Produces a unified inventory combining configuration and usage data.<br>
explanation = <p>Dashboards represent a critical interaction layer between users and data. This search combines REST-based dashboard metadata with internal web access telemetry to show not only what dashboards exist, but how frequently they are accessed and by how many users. By correlating configuration attributes such as refresh behavior, panel counts, and data dependencies with actual usage, teams can make informed decisions about dashboard optimization and retirement. Administrators can use this insight to reduce clutter, improve performance, and focus effort on high-value dashboards.</p>
quid = 827E35385E50A300555E7C200CB34452
updated_author = akhamis
related_info = <ul><li><a href="https://lantern.splunk.com/Splunk_Success_Framework/Fundamentals/Setting_success_metrics" target="_blank">Lantern: Setting success metrics</a><p>This guide discusses how to establish success metrics in Splunk, including user adoption and search volume, which can help assess the impact of new dashboards on user experience and customer value.</p></li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/dashboard-design-getting-started-with-best-practices-part-1.html" target="_blank">Create Dashboards that People Love</a><p>This presentation offers guidelines for designing engaging and effective dashboards in Splunk, emphasizing the importance of user-centric design to enhance user experience and drive adoption.</p></li><li><a href="https://lantern.splunk.com/Platform_Data_Management/Optimize_Data" target="_blank">Drive more value through data source and use case optimization</a><p>This resource explores strategies for optimizing data sources and use cases in Splunk, highlighting how tailored dashboards can improve operational efficiency and deliver greater value to customers.</p></li><li><a href="https://www.splunk.com/en_us/resources/videos/the-power-of-splunk-customer-success.html" target="_blank">The Power of Splunk Customer Success</a><p>This video provides an overview of how Splunk's Customer Success resources support users, including the development and adoption of dashboards that enhance user experience and maximize platform value.</p></li><li><a href="https://community.splunk.com/t5/Community-Blog/Tech-Talk-Optimizing-Customer-Experiences-with-Splunk-s-Digital/ba-p/656334" target="_blank">Splunk Community: Tech Talk | Optimizing Customer Experiences with Splunk's Digital Experience Monitoring</a><p>This community blog discusses how Splunk’s Digital Experience Monitoring tools, including dashboards, can be utilized to optimize customer experiences, thereby increasing the value derived from the platform.</p></li><li><a href="https://rigorousthemes.com/blog/best-splunk-dashboard-examples/" target="_blank">14 Best Splunk Dashboard Examples</a></li><li><a href="https://logit.io/blog/post/splunk-dashboard-examples/" target="_blank">The Top 15 Splunk Dashboard Examples</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/DashStudio/ExHub" target="_blank">Splunk Dashboard Studio Examples Hub</a></li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/dashboard-design-visualization-choices-and-configurations-part-1.html" target="_blank">Dashboard Design: Visualization Choices and Configurations</a></li><li><a href="https://lantern.splunk.com/Security/Product_Tips/Enterprise_Security/Comparing_security_domain_dashboards_in_Enterprise_Security" target="_blank">Comparing Security Domain Dashboards in Enterprise Security</a></li></ul>
description = <p>This search provides a <b>comprehensive inventory of Splunk dashboards and views</b> enriched with <b>actual usage metrics</b> such as page loads and user counts. It helps identify <b>which dashboards are used, newly introduced, or potentially underutilized</b>.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
| fields _time, label, name, Splunk_Instance, role, app, sharing, author, view_name, view_label, type, description, location, updated, acl_perms_read, acl_perms_write, acl_removable, auto_refresh_delay, autoRun, BaseSearch, dashboard_reference, dashboard_size, datamodel_reference, eventtype_reference, index_reference, is_time_selector, lookup_reference, macro_reference, num_panels, panel_title, report_reference, rest_reference, search, source_reference, sourcetype_reference, submitButton, time_range, version, newly_added \
| foreach role, Splunk_Instance, acl_perms_*, *_reference, panel_title, time_range, auto_refresh_delay \
    [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
| foreach search BaseSearch \
    [ eval <<FIELD>> = split('<<FIELD>>', "#####") ] \
| stats `ssef_stats_rest_data_ui_views_fields` latest(newly_added) as newly_added by label app view_name \
| append \
    [| search `ssef_summary(ssef_internal_web_access_tracker)` type!=system NOT view IN (`ssef_default_views`, search) \
    | fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
    | bin _time span=1h \
    | stats latest(*) as * by _time, label, type, app, view \
    | eval users_mv=split(users_mv,", ") \
    | rename view as view_name \
    | stats sum(num_page_loads) as num_page_loads sum(num_users) as num_users values(users_mv) as users_mv by label, app, view_name \
    | eval num_users = if(isnotnull(users_mv), mvcount(users_mv), num_users) \
    | fields - users_mv ] \
| stats `ssef_stats_rest_data_ui_views_fields` max(num_page_loads) as num_page_loads max(num_users) as num_users values(newly_added) as newly_added by label app view_name \
| stats `ssef_stats_rest_data_ui_views_fields` max(num_page_loads) as num_page_loads max(num_users) as num_users latest(newly_added) as newly_added values(label) as label by app view_name \
| eval label=mvjoin(label,",") \
| table view_name view_label app label view_label newly_added num_panels dashboard_size description num_page_loads num_users autoRun auto_refresh_delay time_range submitButton index_reference lookup_reference sourcetype_reference source_reference eventtype_reference datamodel_reference \
| rename label as "Search Heads" \
| fillnull value=0 num_page_loads num_users \
| sort 0 - num_page_loads num_users

