[mc_ssl_alert_check]
search_name = TLS Errors
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Upgrade Checks
version = 1.0.1
date_updated = 2025-8-18 14:44:14
category = Health Check
sub_category = Security
tags = Health Check,Monitoring Console,SSL,Splunk 10,Summary,Upgrade
solution = Confirm that secure communication with TLS is on for both the client and the server. Verify that the TLS settings on the client and server have common attributes such as TLS protocol versions, cipher suites, and any other configurable TLS values.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 8429DF0E6AB98089464FA6D2C607D465
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake.
severity_high_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake.
description = Evaluates for the presence of any TLS or SSL alerts in the last hour, and marks as Critical if any are present.
search = index=_internal source=*splunkd.log* "Received fatal SSL3 alert" earliest=-60m \
| eval summary_id="mc_ssl_alert_check" \
| rex "ssl_state='(?<ssl_state>[^']+)'.*alert_description='(?<alert>[^']+)'" \
| stats values(alert) AS alerts, count AS sixty_min_event_count by host \
| eval alerts = mvjoin(alerts, ", ") \
| eval severity_level = 3 \
| table host, alerts, sixty_min_event_count, severity_level \
| rename host as instance \
| table instance, alerts, sixty_min_event_count, severity_level \
| append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="" alerts \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance alerts sixty_min_event_count severity_level] \
| stats values(alerts) as alerts sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance \
| eval severity_level=if(severity_level=0, 1, severity_level) \
| `ssef_handle_no_results(1,"The mc_ssl_alert_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

