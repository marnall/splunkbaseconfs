related_info = <p>How to Review<br>The following are also a valuable log source, however may not have a consistent number of hosts depending on activity and server roles. <br>XmlWinEventLog:Directory Service<br>XmlWinEventLog:Key Management Service<br>XmlWinEventLog:Microsoft-Windows-TerminalServices-LocalSessionManager/Operational<br>XmlWinEventLog:Microsoft-Windows-WinRM/Operational<br>XmlWinEventLog:Microsoft-Windows-TaskScheduler/Operational<br><br>Also Keep an eye out for old wineventlog sourcetypes, with the windows TA version 5, the sourcetype was renamed to WinEventlog, leaving the source to define WinEventlog:Security, or WinEventlog:System etc. <br>Example evidence of an old TA installed on SH, IDX or HF: Sourcetype will look like <br>- XmlWinEventLog:Security<br>- WinEventLog:Security</p>
