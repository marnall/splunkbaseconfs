explanation = <p>This search surfaces sourcetypes that meet the active search threshold but have associated hygiene warnings such as line breaking issues, date parsing failures, or field extraction anomalies. It joins data hygiene summaries with active sourcetype usage, enriching the results with sourcetype configuration details like LINE_BREAKER, KV_MODE, or EVENT_BREAKER. This allows teams to prioritize remediation efforts on sourcetypes that are not only faulty but also highly utilized. This proactive approach strengthens data quality and reduces downstream noise in analytics.</p>
