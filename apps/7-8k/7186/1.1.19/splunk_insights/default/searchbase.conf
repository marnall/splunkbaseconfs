[Top 10 Indexes by Ingest SVC Usage]
search_name = Top 10 Indexes by Ingest SVC Usage
readonly = 1
version = 1.0.1
date_created = 2024-5-22 22:34:36
date_updated = 2024-5-22 22:37:55
category = Splunk
sub_category = Cloud
tags = Ingestion,KPIs,SVC,Workload
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = AC772BBA37CF0C533BF8D616D0B04ADF
search_author = akhamis
updated_author = akhamis
description = <p>Top 10 Indexes by Ingest SVC Usage</p>
default_viz = splunk.column
viz_options = { "stackMode":"stacked","seriesColors":["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"],"legendDisplay":"top" }
search = `ssef_cloud_summary` source=splunk-ingestion \
| fields _time idx st ingestion_gb indexer_count \
| rename idx As index_name \
| bin _time span=1h \
| stats Latest(ingestion_gb) As ingestion_gb_idx_st by _time, index_name, st \
| bin _time span=1d \
| stats Sum(ingestion_gb_idx_st) As ingestion_gb_idx_st by _time, index_name, st \
| eval ingestion_idx_st_GB = ingestion_gb_idx_st , ingestion_idx_st_TB = ingestion_gb_idx_st / 1024 \
| stats Sum(ingestion_gb_idx_st) As ingestion_gb_idx by _time, index_name, st \
| stats Sum(ingestion_gb_idx) As ingestion_gb_idx by _time index_name \
| eventstats Sum(ingestion_gb_idx) As total_ingestion_gb_idx by _time \
| eval Perc_Usage = ingestion_gb_idx / total_ingestion_gb_idx \
| stats Max(Perc_Usage) As Perc_Usage by _time index_name \
| join _time \
    [ search `ssef_cloud_summary` source=splunk-svc-consumer svc_consumer="data services" svc_usage > 0 \
    | fields _time svc_usage \
    | bin _time span=1h \
    | stats Sum(svc_usage) as svc_usage by _time \
    | timechart partial=t fixedrange=t span=1d Max(svc_usage) As ingest_svc_usage \
    | fields _time ingest_svc_usage ] \
| eval ingestiond_svc_usage = ingest_svc_usage * Perc_Usage \
| timechart partial=t fixedrange=t span=1d useother=t Max(eval(round(ingestiond_svc_usage,2))) As ingestiond_svc_usage by index_name \
| addtotals

