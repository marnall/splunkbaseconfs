[ssef_scma_indexing_splunk_cloud_storage_blocks]
search_name = Splunk Cloud Estimated Storage Blocks
readonly = 1
target_component = Indexing
version = 1.0.1
date_created = 2022-09-14
date_updated = 2024-4-9 9:28:22
category = Splunk
sub_category = Indexing
tags = Indexes,Indexing,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = 3E5982E95A878B9C728B5146CEDFB5BA
updated_author = akhamis
related_info = <div class="diag-content-box"><div class="diag-content"> <a class="doc-drilldown" href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Storage" target="_blank">https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Storage</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div></div>
severity_normal_text = <br/><p>We did not find any errors when running this check. When you send data to Splunk Cloud Platform, it is stored in indexes and you can self-manage your Splunk Cloud Platform indexes settings using the Indexes page in Splunk Web. Splunk Cloud Platform retains data based on index settings that enable you to specify when data is to be deleted. To configure different data retention settings for different sources of data, store the data in separate indexes according to the desired retention policy. You can configure different data retention policies for individual indexes according to your auditing and compliance requirements.</p>
severity_low_text = <br/><p>The average amount of retention days is greater or equal to 400 days. Please review the index configurations and adjust where necessary.</p>
description = <p>Check to calculate the estimated number of storage blocks in Splunk Cloud based on data ingestion volumes and current index retention settings. This not only impacts Splunk Cloud but can also affect Splunk Enterprise on-prem.</p>\
<p><strong>Severity Levels:</strong></p>\
<li><strong>Low:</strong> Average retention days greater than or equal to 400.</li>\
<li><strong>Normal:</strong> Average retention days less than 400..</li>
search = `ssef_summary(ssef_internal_index_license_usage)` Lic_Pool!="auto_generated_pool_fixed-sourcetype*" \
| eval summary_id="ssef_scma_indexing_splunk_cloud_storage_blocks" \
| bin _time span=1h \
| stats max(License_Usage) AS License_Usage by _time label Lic_Pool Index_Name Lic_Sourcetype \
| bin _time span=1d \
| stats sum(License_Usage) AS License_Usage by _time label Lic_Pool Index_Name Lic_Sourcetype \
| eval gb=License_Usage/1024/1024/1024 \
| stats avg(gb) AS avg_daily_volume_gb latest(name) as name by label Index_Name \
| eventstats sum(avg_daily_volume_gb) AS total_daily_volume_gb \
| eval volume_license_used_pct=avg_daily_volume_gb/total_daily_volume_gb, volume_license_used_pct=round(volume_license_used_pct,2), total_daily_volume_gb=round(total_daily_volume_gb,2), avg_daily_volume_gb=round(avg_daily_volume_gb,2) \
| rename Index_Name AS orig_index \
| join label orig_index type=outer \
    [| search `ssef_summary(ssef_data_indexes)` isInternal=0 disabled=0 role=*indexer* \
    | eval retentionInDays=round(frozenTimePeriodInSecs/86400,0) \
    | stats mode(retentionInDays) AS avg_retentionInDays latest(name) as name by label title \
    | rename title AS orig_index] \
| fillnull value="unknown" \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( avg_retentionInDays >= 400, low, true(), normal ) \
| table _time label name orig_index avg_daily_volume_gb avg_retentionInDays total_daily_volume_gb volume_license_used_pct severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_splunk_cloud_storage_blocks summary job completed successfully without identifying any issues, and everything is operating as expected.")`

