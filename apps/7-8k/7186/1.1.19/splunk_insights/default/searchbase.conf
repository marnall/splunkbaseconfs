search_name = WinEventLog Bloat
readonly = 1
ssef_cron = weekly
target_component = Log Sources
version = 1.1.1
date_updated = 2025-12-1 12:58:57
category = ES Adoption
sub_category = Security
tags = ES Adoption,Summary,Windows
dispatch_earliest_time = -1h@h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = E72BE38D421E2FE0DC87451DEAAD4140
search_author = dluxton
updated_author = akhamis
related_info = <p><strong>How to Rectify</strong><br>There is a method to remove this field using ingest actions or props/transforms, however the recommended approach to remove it is to switch over to XmlWinEventLog by setting renderXml = true in inputs.conf. <br></p>
severity_normal_text = <br/><p>The descriptive paragraph was not sighted.</p>
severity_medium_text = <br/><p>The descritptive paragraph was found for a less than half of the windows events.</p>
severity_high_text = <br/><p>The wineventlog_security macro does not have indexes defined.</p>
severity_critical_text = <br/><p>More than half of all windows security events feature this descriptive paragraph.</p>
description = <p>The Multiline WinEventLog sourcetype (non-XML) includes a descriptive paragraph about each event which is generated. This adds a considerable amount of unnecessary ingest and is recommended to be removed.</p>
search = [ `ssef_all_indexes`] (source="*WinEventLog:Security" OR Channel="security") ("This event is generated" OR "Token Elevation Type indicates" OR "Certificate information is only provided if" OR "The subject fields indicate the account") \
| eval summary_id="this_event_was_generated" \
| stats values(index) as ec_index dc(EventCode) as ec_uniq_num_event_codes count as ec_total_count \
| append \
    [| tstats summariesonly=true count WHERE \
        [| `ssef_all_indexes` ] AND (sourcetype=*WinEventLog* source=*WinEventLog:Security) by index \
    | stats values(index) as index sum(count) as win_sec_total_event_count ] \
| append \
    [| search `ssef_summary(ssef_data_macros)` title=wineventlog_security \
    | fields _time, label, name, role, Splunk_Instance, app, title, definition, args, sharing, author, description, updated, disabled, errormsg, iseval, validation, acl_perms_read, acl_perms_write, acl_removable , severity_level , source , host \
    | stats latest(definition) as definition by label, app, title \
    | fields definition ] \
| stats values(ec_*) as * values(definition) as wineventlog_security_macro_definition values(index) as win_sec_index values(win_sec_total_event_count) as win_sec_total_event_count \
| eval severity_level = case (total_count > (win_sec_total_event_count*0.5), 5, total_count > 0, 3, win_sec_total_event_count > 0 AND NOT match(macro_definition, "index"), 4, true(),1) \
| rename index as index_name \
| table index_name severity_level total_count uniq_num_event_codes win_sec_index win_sec_total_event_count wineventlog_security_macro_definition \
| `ssef_handle_no_results(1,"The this_event_was_generated summary job completed successfully without identifying any issues, and everything is operating as expected.")`

