description = <p><span style="font-size: 12px;"><strong>Definition</strong></span></p>\
The percentage of regularly used apps out of the total number of apps within a selected time frame. \
\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span></p>\
A regularly used app is defined as one whose knowledge objects have been accessed at least once a day for 10% of the period reviewed. This ratio identifies which Splunk apps are crucial for team functions and business operations. \
\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span></p>\
Tracking this percentage <em>monthly</em> is valuable for monitoring the expansion of Splunk use cases and app utilization, highlighting how teams are progressing in their proficiency with Splunk. This is an essential KPI for assessing engagement and effectiveness.
search = `ssef_summary(ssef_internal_web_access_tracker)` app=* \
| eval summary_id="%_of_Regularly_Used_Apps_to_Total_Export" \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1d \
| stats count by _time, app \
| appendcols \
    [ search `ssef_summary(ssef_apps_local)` disabled=0 visible=1 \
    | bin _time span=1d \
    | stats dc(app_name) as total_apps by _time ] \
| filldown total_apps \
| addinfo \
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by app \
| eval perc_active = round((num_active_days / num_days) * 100, 2) \
| fillnull value=0 perc_active total_apps \
| eval active_app = if(perc_active >= `ssef_perc_active_threshold`, app, null() ) \
| stats max(total_apps) as total_apps dc(app) as all_apps dc(active_app) as active_apps max(num_days) as num_days by _time \
| eval reg_seen_to_total = ceiling((active_apps / total_apps) * 100) , threshold=`ssef_perc_active_threshold` \
| fields _time total_apps all_apps active_apps num_days reg_seen_to_total threshold \
| bin _time span=1d \
| stats max(reg_seen_to_total) as kpi_value by _time  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "% of Regularly Used Apps to Total" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

