description = <p>This Splunk job executes daily to back up Searchbase items that have been modified in the last 24 hours. It uses REST API calls to identify and retrieve changes, saving the updated items in a summary index for recovery, auditing, or version control. This process ensures that recent modifications to Searchbase items are securely archived and available for future reference or troubleshooting.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/searchbase/configs/conf-searchbase \
| eval summary_id="ssef_searchbase_backup" \
| eval date_created_epoch = strptime(date_updated, "%Y-%m-%d %H:%M:%S") , date_diff = now() - date_created_epoch , _time=now() \
| rename eai:acl.app as app , eai:acl.removable AS acl_removable \
| where date_diff < 86400 OR search_origin="custom" \
| `ssef_instance_info(splunk_server)` \
| eval _time = now(), severity_level = if(isnotnull(_time), 1, null()) \
