[expired_suppressions]
search_name = Expired Suppressions
readonly = 1
ssef_cron = weekly
target_component = Detections and Alerts
version = 1.0.5
date_updated = 2025-11-10 13:13:1
category = ES Adoption
sub_category = Security
tags = Detections and Alerts,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = A7B89F678C429C30D92586DD3A93EF2B
search_author = dluxton
updated_author = akhamis
related_info = <p>This search lists out expired suppressions which expired more than a week ago. The recommendation is for these suppressions to be disabled.  ES &gt; Configure &gt; Incident Management &gt; Notable Event Suppressions</p>
severity_normal_text = <br/><p>Less than 10 expired suppressions are present on the platform</p>
severity_low_text = <br/><p>More than 10 expired suppressions are present on the platform</p>
severity_medium_text = <br/><p>More than 100 expired suppressions are present on the platform</p>
severity_high_text = <br/><p>More than 1000 expired suppressions are present on the platform</p>
description = <p>Expired suppressions can have a performance impact on ES and should be disabled after they are no longer valid.</p>
search = `ssef_summary(ssef_admin_eventtypes)` disabled=0 title="notable_suppression-*" \
| eval summary_id="expired_suppressions" \
| fields _time, label, app, sharing, title, author, description, disabled, color, priority, tags, search, updated, acl_perms_read, acl_perms_write, acl_removable \
| stats latest(*) as * latest(_time) as _time by label, app, sharing, title \
| rex field=search "_time>=(?P<min_time>\d+)" \
| rex field=search "_time<=(?P<max_time>\d+)" \
| eval ctime=now(), total_duration_days=round((max_time-min_time)/86400,0), expired_age_days=if(max_time<ctime,round((ctime-max_time)/86400,2),null()), long_running=if(total_duration_days>182,"true","false") \
| where max_time<ctime AND expired_age_days>6 \
| eventstats count as total_expired \
| eval severity_level = case ( total_expired > 1000,4, total_expired > 100,3, total_expired > 10,2, true(),1) \
| table label app sharing title author search updated expired_age_days long_running total_duration_days total_expired severity_level \
| `ssef_handle_no_results(1,"The expired_suppressions summary job completed successfully without identifying any issues, and everything is operating as expected.")`

