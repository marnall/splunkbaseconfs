[summary_dashboards_with_high_memory_and_runtime]
search_name = High Memory Dashboards
readonly = 1
ssef_cron = weekly
target_component = Infra & Arch
version = 3.0.0
date_created = 2025-08-07
date_updated = 2026-2-8 19:19:19
category = Splunk
sub_category = _internal
tags = EFS,Introspection,Memory Usage,Search Optimization,Summary
solution = <p>Identifies dashboards with excessive memory usage that may cause Splunk performance degradation.</p><p><b>Suggested Actions</b><br><b>1.</b> Audit searches tied to large memory usage<br><b>2.</b> Refactor dashboards to reduce expensive SPL (e.g., unnecessary joins or large time spans)<br><b>3.</b> Limit concurrent execution of heavy dashboards using roles or quotas<br><b>4.</b> Educate users on optimized SPL writing<br><b>5.</b> Monitor SVC cost if running in Cloud</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (high_resource_dashboards <= 5,1, high_resource_dashboards <= 10,2, high_resource_dashboards <= 20,3, high_resource_dashboards <= 40,4, high_resource_dashboards > 40,5)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> <i>≤5 dashboards use excessive memory. Expected for busy environments.</i></li><li><b>Low (Severity 2):</b> <i>6–10 dashboards exceeding 5GB. Review needed.</i></li><li><b>Medium (Severity 3):</b> <i>11–20 dashboards hitting memory threshold. Performance degradation possible.</i></li><li><b>High (Severity 4):</b> <i>21–40 high-memory dashboards. Urgent tuning needed.</i></li><li><b>Critical (Severity 5):</b> <i>More than 40 such dashboards. System instability likely.</i></li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| tstats count WHERE ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extract search processes exceeding 5GB from introspection logs<br><b>02</b> <code>| stats dc(...) by _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct heavy search SIDs per day<br><b>03</b> <code>| stats avg(...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate daily average of high-memory dashboards<br><b>04</b> <code>| eval severity_level = case (...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign alert levels based on dashboard volume<br><b>05</b> <code>| table ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Format output for clarity<br>
explanation = <p>This query uses <code>tstats</code> to retrieve high memory-consuming search processes from Splunk’s introspection data. It filters for search-related memory usage above 5120MB and counts distinct search SIDs using more than that threshold, averaged across the day.</p><p>Useful for identifying dashboards or users responsible for resource-heavy activity. Demonstrates efficient SPL techniques like <b>tstats</b> over raw logs, cardinality metrics (<code>dc()</code>), and average trend extraction.</p><p>Ideal for newer engineers wanting to learn high-impact performance diagnostics that scale across distributed search environments.</p>
quid = 0DBE3E6556BA228A3AB73DDBBCB8A952
search_author = Splunk Searchbase Assistant
updated_author = khutchinson
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/Admin/Limitsconf" target="_blank">limits.conf Settings</a><br>Throttle and control memory-intensive activity.</li></ul>
severity_normal_text = <p>≤5 high-memory dashboards active. This is expected in most environments.</p>
severity_low_text = <p>6–10 dashboards crossing the 5GB memory line. Recommend inspection.</p>
severity_medium_text = <p>11–20 heavy dashboards identified. May impact cluster performance.</p>
severity_high_text = <p>21–40 dashboards with high memory usage. Degradation likely—optimize immediately.</p>
severity_critical_text = <p>Over 40 high-memory dashboards detected. Serious risk to Splunk health and cost.</p>
description = <p>This search aims to look for any dashboards within last weeks time period & count the number of dashboards which are utilizing a high amount of resources. The criteria is if the dashboard took longer than 60s to load OR if the dashboard consumes more than 1GB of memory. As Dashboards are shared amongst many users, producing & viewing inefficient dashboards can cause resources on the SH to be incorrectly allocated. This can result in other users searches being queued or delayed from returning results.</p>
search = | tstats summariesonly=true count WHERE index=_introspection source="*resource_usage.log*" sourcetype="splunk_resource_usage" data.mem_used>5120 data.process_type="search" component=PerProcess by data.search_props.sid _time span=1d \
| eval summary_id="summary_dashboards_with_high_memory_and_runtime" \
| stats dc(data.search_props.sid) as searches_with_high_memory_usage by _time \
| stats avg(searches_with_high_memory_usage) as high_resource_dashboards \
| eval severity_level = case (high_resource_dashboards <= 15,1, high_resource_dashboards <= 25,2, high_resource_dashboards <= 30,3, high_resource_dashboards <= 50,4, high_resource_dashboards > 51,5) \
| table high_resource_dashboards severity_level\
| `ssef_handle_no_results(1,"The summary_dashboards_with_high_memory_and_runtime summary job completed successfully without identifying any issues, and everything is operating as expected.")`

