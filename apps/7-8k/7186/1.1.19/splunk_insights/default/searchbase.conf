| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv, severity_level, source, host \
| eval es_activity = case ( \
    app IN ("SplunkEnterpriseSecuritySuite","DA-ESS-AccessProtection","DA-ESS-EndpointProtection","DA-ESS-IdentityManagement","DA-ESS-NetworkProtection","DA-ESS-ThreatIntelligence","missioncontrol","SA-AccessProtection","SA-AuditAndDataProtection","SA-ContentVersioning","SA-EndpointProtection","SA-IdentityManagement","SA-NetworkProtection","SA-ThreatIntelligence","SA-UEBA","DA-ESS-ContentUpdate","Splunk_Security_Essentials","security_getting_started","Splunk_DA-ESS_PCICompliance","Splunk_App_SAA","Splunk_App_for_Anomaly_Detection","InfoSec_App_for_Splunk","splunk_app_sap_etd_alerts","splunk_app_phantom","trustar_unified","Splunk_TA_Talos_Intelligence"), "yes", \
    app="SplunkEnterpriseSecuritySuite" AND view IN ("access_*","account_*","alert*","algorithm","asset_*","cluster_*","contents","correlation_*","create_*","data_*","default_*","detect_*","dns_*","email_*","endpoint_*","ess_*","experiment_*","finding*","forecast_*","forwarder_*","generic_*","http_*","iam*","identity_*","ids_*","incident_*","index_*","intelligence","landing","malware_*","managed_*","map_rule_to_technique","mc_*","microsoft365*","mitre_*","mltk_*","network*","new_*","per_*","port_*","predict_*","redirect_*","response_*","rest_*","risk_*","search*","security_*","sess_*","session_*","showcase*","smart_*","soar*","ssl_*","suppress*","system*","threat_*","time_*","traffic_*","uba*","update_*","url_*","user_*","vuln_*","web_*"), "yes", \
    true(), "no") \
| `ssef_app_info(app)` \
| lookup ssef_data_ui_views_lookup label app view_name as view output view_label description sharing author updated

[Identify Unengaged Splunk Roles]
search_name = Identify Unengaged Splunk Roles
readonly = 1
diagnostic_searches = ssef_authorization_roles
version = 1.0.1
date_created = 2025-08-12
date_updated = 2025-8-12 10:28:39
category = Splunk
sub_category = _internal
tags = Audit,Authentication,KPIs,Roles
solution = <p>Provides insights into roles not engaged in searches, allowing for targeted review and potential optimization. Helps in efficient authorization management and operational oversight.</p><p><b>Suggested Actions</b><br><b>1.</b> Review roles not engaged in searches for potential optimization.<br><b>2.</b> Assess role usage patterns for efficiency.<br><b>3.</b> Implement role-based access control policies.<br><b>4.</b> Schedule regular audits of role engagement.<br><b>5.</b> Enhance visibility into authorization practices.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (found > 0, "Normal", found == 0, "Critical")</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> Role is engaged in searches.</li><li><b>Critical (Severity 5):</b> Role is not engaged.</li></ul>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>ssef_summary(ssef_authorization_roles)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count roles from authorization summary<br><b>02</b> <code>join roles type=left</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Left join with audit logs to identify unengaged roles<br>
explanation = <p>This search evaluates Splunk roles from `ssef_summary(ssef_authorization_roles)` against audit logs to identify roles not involved in any completed searches. By examining logs in the `_audit` index, it determines whether roles have been active.</p><p>Utilizing commands such as <b>stats</b> and <b>join</b>, the search aggregates role usage and performs a left join to find roles without audit log entries. This aids in understanding <b>authorization management</b> and <b>role engagement efficiency</b>.</p><p>For junior engineers, this search demonstrates how to use <b>join</b> for dataset comparison and <b>rex</b> for field manipulation, offering insights into roles that may need review or optimization.</p>
quid = AB15F7BBD7F0B072C82D008B41FC0F50
search_author = Splunk Searchbase Assistant
updated_author = akhamis
description = <p><b>Identifies Splunk roles</b> not engaged in any completed searches within the environment.</p>
search = ssef_summary(ssef_authorization_roles) \
| stats count by title \
| rename title as roles \
| fields roles \
| join roles type=left \
    [ search index=_audit action=search info=completed \
    | rex field=roles mode=sed "s/'//g" \
    | makemv delim="+" roles \
    | stats count as found by roles ] \
| where isnull(found)

