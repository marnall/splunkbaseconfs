quid = 40A232299EF2B82BCDF4B886FE9E215C
search_author = Splunk Searchbase Assistant
updated_author = khutchinson
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Tstats" target="_blank">tstats command</a><br>Optimized querying of indexed fields and accelerated data models for fast counts.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Eventstats" target="_blank">eventstats command</a><br>Compute fleet-wide metrics (avg, stdevp) and add them to each event.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/Stats" target="_blank">stats command</a><br>Aggregate counts by indexer for concise comparisons.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/SearchReference/ConditionalFunctions" target="_blank">Conditional functions (case)</a><br>Use <code>case()</code> to assign severities from outlier counts.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/Knowledge/Acceleratedatamodels" target="_blank">Accelerate data models</a><br>Background on leveraging acceleration with <code>tstats</code> for speed.</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Administration/Performance_tuning_the_search_head_tier" target="_blank">Performance tuning the search head tier</a><br>Reduce search latency when running cluster-wide health checks.</li></ul>
severity_normal_text = <p>Ingestion appears balanced across indexers; continue routine monitoring and periodic validation.</p>
severity_low_text = <p>N/A for this binary outlier signal; consider expanding logic if additional tiers are useful in your environment.</p>
severity_medium_text = <p>N/A for this binary outlier signal; calibrate thresholds if you adopt multi-level severity in the future.</p>
severity_high_text = <p>One or more indexers exceed statistical bounds; investigate routing, performance, or capacity issues immediately.</p>
severity_critical_text = <p>N/A for this signal; reserve Critical for systemic ingest failures or license risk.</p>
description = <p>This search looks at all the data that was written to indexes during the last business week and discerns which indexers the data exists on. This count is then compared across all indexers to insure that one indexer is not heavier or lighter than the rest & if they are, this search will return the number of indexers which are committing this offence. With an indexing cluster, it's imperative to have the data distributed equally across all of its peers to insure that one indexer is not working harder than the rest.</p>
search = | tstats summariesonly=true prestats=t count WHERE [| `ssef_all_indexes` ] by splunk_server\
| eval summary_id="summary_data_balance_across_splunk_servers" \
| stats count by splunk_server\
| sort - count\
| eventstats avg(count) as Average stdevp(count) as StdDev\
| eval UpperBound = Average + StdDev, LowerBound = Average - StdDev\
| eval OutlierFlag = if(count > UpperBound OR count < LowerBound, "Yes", "No")\
| stats count(eval(OutlierFlag="Yes")) as indexers_with_high_data_distribution\
| eval severity_level = case (indexers_with_high_data_distribution < 1,1,indexers_with_high_data_distribution<2,2,indexers_with_high_data_distribution < 3, 3,indexers_with_high_data_distribution >= 3, 4)\
| table indexers_with_high_data_distribution severity_level\
| `ssef_handle_no_results(1,"The summary_data_balance_across_splunk_servers summary job completed successfully without identifying any issues, and everything is operating as expected.")`

