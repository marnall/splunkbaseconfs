target_component = Infra & Arch
version = 2.x
date_created = 2025-08-08
date_updated = 2025-8-1 13:16:20
category = Splunk
sub_category = _internal
tags = Connections,EFS,Forwarders,Monitoring,Summary
solution = <p>Tracks ingestion coverage by counting active forwarders. Fewer forwarders indicate reduced visibility.</p><p><b>Suggested Actions</b><br><b>1.</b> If counts are low, validate receiver ports and network reachability.<br><b>2.</b> Use Deployment Server/Forwarder Management to identify missing clients.<br><b>3.</b> Onboard additional forwarders to broaden data sources.<br><b>4.</b> Verify TLS settings for cookedSSL.<br><b>5.</b> Baseline forwarder_count and monitor for regressions with Monitoring Console.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (forwarder_count=0,4, forwarder_count&lt;10,2, forwarder_count&lt;20,3, forwarder_count&gt;=20,1)</code></pre><p>This SPL should be added before the final <code>| table</code> to assign severity where <b>more forwarders = healthier</b>.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> ≥ 20 forwarders — healthy coverage.</li><li><b>Low (Severity 2):</b> &lt; 10 forwarders — add more to diversify data.</li><li><b>Medium (Severity 3):</b> 10–19 forwarders — limited coverage; plan expansion.</li><li><b>High (Severity 4):</b> 0 forwarders — ingestion halted; immediate action required.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="splunkd" group=tcpin_connections (connectionType=cooked OR connectionType=cookedSSL) TERM(connectionType=cooked) OR TERM(connectionType=cookedSSL) TERM(fwdType=*) TERM(guid=*)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Pull TCP input connection events representing forwarder sessions.<br><b>02</b> <code>| eval connection = hostname."-&gt;".host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Create a readable forwarder-to-indexer mapping for troubleshooting.<br><b>03</b> <code>| stats dc(hostname) as forwarder_count</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct forwarders to derive coverage.<br><b>04</b> <code>| eval severity_level = case (forwarder_count=0,4, forwarder_count&lt;10,2, forwarder_count&lt;20,3, forwarder_count&gt;=20,1)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity where fewer forwarders = higher risk (no Critical level defined).<br><b>05</b> <code>| table forwarder_count severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output KPI and severity for alerting or dashboards.<br>
explanation = <p>This search inspects <b>_internal</b> <b>splunkd</b> events from the <b>tcpin_connections</b> group for <b>cooked</b> and <b>cookedSSL</b> connections and ensures <code>fwdType</code> and <code>guid</code> are present. It builds a readable <code>connection</code> mapping and then counts distinct forwarder hostnames as a KPI for ingestion coverage. Environments with too few forwarders risk blind spots; adding forwarders increases data diversity and actionability.</p><p>For junior Splunkers, this demonstrates targeted filtering with <b>TERM()</b>, enrichment with <b>eval</b>, and KPI creation via <b>stats dc()</b> without altering the original intent of the SPL.</p>
quid = 45EE65CEE90D5C2F174FD1DCAA3BB420
search_author = Splunk Searchbase Assistant
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/Forwarding/Aboutforwardingandreceivingdata" target="_blank">About Forwarding and Receiving</a><br>Overview of forwarder-to-indexer communications.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/DMC/DMCoverview" target="_blank">Monitoring Console Overview</a><br>Use MC to visualize forwarder connections and health.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/Forwarding/Enableareceiver" target="_blank">Enable a Receiver</a><br>Configure indexers to accept forwarder connections.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/Admin/Inputsconf" target="_blank">inputs.conf Reference</a><br>Define inputs and networking parameters for forwarders.</li></ul>
severity_normal_text = <p>Forwarder coverage is healthy; continue onboarding per roadmap.</p>
severity_low_text = <p>Few forwarders detected; adding more will broaden data and improve insights.</p>
severity_medium_text = <p>Forwarder count below target; prioritize onboarding to close visibility gaps.</p>
severity_high_text = <p>No forwarders connected; ingestion is down and needs urgent remediation.</p>
severity_critical_text = <p>Critical threshold not defined in this search; escalate only per local policy.</p>
description = <p>This search counts the unique number of forwarder connections (Via the S2S protocol) connected to the indexers over the time period.  This is a unique way of calculating forwarders based on tcp input connection and a larger count does indicate a larger data and adoption of Splunk. Their are other ways of calculating forwarders however this was chosen because of it being agnositic of being installed on search head or monitoring console.</p>
search = index=_internal sourcetype="splunkd" group=tcpin_connections (connectionType=cooked OR connectionType=cookedSSL) TERM(connectionType=cooked) OR TERM(connectionType=cookedSSL) TERM(fwdType=*) TERM(guid=*) \
| eval summary_id="summary_number_of_forwarders" \
| eval connection = hostname."->".host \
| stats dc(hostname) as forwarder_count \
| eval severity_level = case (forwarder_count=0,4, forwarder_count<10,2, forwarder_count<20,3, forwarder_count>=20,1) \
| table forwarder_count severity_level\
| `ssef_handle_no_results(1,"The summary_number_of_forwarders summary job completed successfully without identifying any issues, and everything is operating as expected.")`

