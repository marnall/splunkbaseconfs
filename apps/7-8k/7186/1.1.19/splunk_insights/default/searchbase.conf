[ssef_scma_search_orphaned_objects]
search_name = Orphaned Objects
readonly = 1
target_component = Search & Visualization
version = 1.0.2
date_created = 2023-04-12
date_updated = 2024-5-14 12:54:7
category = Splunk
sub_category = Search
tags = REST,SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = C0D3BC8F55DB01DE0520CD84551D8F60
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/Manageknowledgeobjects" target="_blank">Manage knowledge objects in Splunk</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/Managescheduledreportsalerts#Reassign_or_delete_scheduled_reports_and_alerts_created_by_disabled_or_deleted_users" target="_blank">Manage orphaned scheduled searches</a></li>\
</ul>
severity_normal_text = <br/><p>Congratulations. The scan we ran for orphaned objects came back clean. You are doing a great job keeping your Splunk instance happy and healthy!</p>
severity_low_text = <br/><p>A small number of orphaned objects (between 2 and 10) have been identified. While not critical, it's advisable to periodically review and clean up these objects to prevent configuration clutter and maintain optimal environment efficiency. Consider evaluating the necessity of these objects and taking appropriate action.</p>
severity_medium_text = <br/><p>More than 10 orphaned objects have been detected in your environment. Orphaned objects can lead to clutter and potential confusion in your configuration management. It's recommended to review these objects for relevance and either reintegrate them into your operational configurations or safely remove them to maintain a clean and efficient Splunk environment.</p>
description = <p>An orphaned object in Splunk refers to a configuration item or artifact within the Splunk environment that is no longer associated with any active or relevant component. These objects are typically remnants of previous configurations, searches, reports, dashboards, data models, or other elements that have become obsolete or redundant over time.</p>\
<p>Orphaned objects in a Splunk environment can lead to resource wastage, performance degradation, maintenance overhead, security risks, compliance issues, and user experience challenges. Regular cleanup and management of these objects are essential to maintain a healthy and efficient Splunk deployment.The check finds Orphaned Objects in the environment.</p>\
<p><strong>Severity Levels:</strong> </p>\
<ul><li><strong>Medium:</strong> > 10</li>\
<li><strong>Low:</strong> 1-9</li>\
<li><strong>Normal:</strong> 0</li>\
</ul>
search = `ssef_summary(ssef_saved_searches)` is_scheduled=1 AND disabled=0 orphan=1 \
| eval summary_id="ssef_scma_search_orphaned_objects" \
| eval conf="savedsearches" \
| stats latest(*) as * latest(_time) AS _time by label, app, sharing, author, savedsearch_name \
| rename savedsearch_name as title , author as owner \
| stats dc(title) as num_objects values(title) as object values(role) as role latest(name) as name latest(_time) as _time by conf label app owner \
| append maxtime=60 maxout=50000 timeout=60 \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/admin/directory search="eai:orphaned=1 eai:type!=savedsearch"  \
    | rename eai:acl.* as * \
    | rex field=eai:location "^\/(?(?=data)[^\/]+\/(?(?=ui)ui\/(?<conf1>[^\/]+)|(?<conf2>[^\/]+))|(?(?=saved)[^\/]+\/(?<conf3>[^\/]+)|storage\/(?<conf4>[^\/]+)))" \
    | eval conf=coalesce(conf1,conf2,conf3,conf4) \
    | `ssef_instance_info(splunk_server)` \
    | stats dc(title) as num_objects values(title) as object values(role) as role latest(name) as name by conf label app owner ] \
| eval object=mvjoin(object,",") , role = mvjoin(mvsort(role), ":") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_objects > 10, medium, num_objects > 1, low, true(), normal ) \
| table _time label name conf app object num_objects role severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_orphaned_objects summary job completed successfully without identifying any issues, and everything is operating as expected.")`

