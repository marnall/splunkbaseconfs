related_info = <ul><li><p><a href="https://www.splunk.com/en_us/blog/devops/why-knowing-the-front-end-and-user-s-experience-of-your-platform-is-key-to-understanding-how-that-platform-is-working.html" target="_blank">Why Knowing the Front-End and User's Experience of Your Platform is Key</a></p><p>This article highlights the importance of monitoring frontend performance to address peak time issues, ensuring consistent user experience and adoption.</p></li><li><p><a href="https://www.splunk.com/en_us/products/real-user-monitoring.html" target="_blank">Splunk Real User Monitoring (RUM)</a></p><p>This tool provides insights into user interactions, including peak activity times, helping to optimize performance and improve user adoption by addressing customer-facing issues.</p></li><li><p><a href="https://www.splunk.com/en_us/solutions/optimize-your-web-and-mobile-experience.html" target="_blank">Optimize Your Web and Mobile Experience</a></p><p>This solution page outlines strategies to monitor the entire user journey, correlating frontend and backend data to improve experience during peak usage periods.</p></li><li><p><a href="https://www.splunk.com/en_us/blog/learn/user-engagement-ux-metrics.html" target="_blank">User Engagement Metrics to Know</a></p><p>This blog explores key user engagement metrics, emphasizing the role of observability tools like Splunk in managing peak usage times and enhancing adoption.</p></li></ul>
description = <p>This search identifies <b>peak access times</b> for Splunk Web by analyzing <b>page view activity by hour</b> across apps and views. It highlights when users most frequently interact with the platform to reveal <b>usage concentration patterns</b>. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p></p>
default_viz = splunk.column
viz_options = {  "stackMode": "stacked", "backgroundColor": "transparent", "seriesColors": ["#7e52d2","#009be6","#00cdb0","#e39a2b","#ff677e","#d52094","#0050b1","#008c80","#97b22a","#ff6acb","#8098F6","#C83C10"], "legendDisplay": "top", "xAxisTitleVisibility": "hide"  }
search = `ssef_summary(ssef_internal_web_access_tracker)` type!=system \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1h \
| stats latest(*) as * by _time, label, type, app, view \
| stats sum(num_page_loads) as num_page_loads by _time view \
| makecontinuous _time span=1h \
| fillnull value=0 num_page_loads \
| eval hour=strftime(_time, "%X") \
| chart sum(num_page_loads) AS "Page View Peak Access Times" by hour view

