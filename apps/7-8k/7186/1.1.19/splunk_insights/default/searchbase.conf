[windows_active_directory_auditing]
search_name = Windows Active Directory Auditing
readonly = 1
ssef_cron = weekly
target_component = GDI & Data Hygiene
version = 1.1.4
date_updated = 2025-12-1 13:9:30
category = ES Adoption
sub_category = Security
tags = ES Adoption,KPIs,Log Sources,Summary,Windows
solution = <p>This check helps confirm that <b>Active Directory auditing is fully enabled and consistently generating events</b> across domain controllers.</p><p><b>Suggested Actions</b> If required event codes are missing or volumes are low, verify Group Policy auditing settings on all domain controllers. Confirm that WinEventLog:Security data is being forwarded and indexed correctly. Investigate host coverage discrepancies to ensure all controllers participate in auditing.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise-security.html" target="_blank">Products: Splunk Enterprise Security</a><br>Advanced security analytics and detections for Active Directory and Windows environments.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Security Services</a><br>Expert assistance to validate auditing configurations and strengthen identity security monitoring.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=active%20directory%20security" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Additional Splunk and Cisco apps focused on Active Directory and Windows security monitoring.</li></ul></p>
dispatch_earliest_time = -1h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| search WinEventLog:Security</code><br> - Collects Active Directory–related Windows Security events.<br><b>02</b> <code>| stats count()</code><br> - Measures event volume and host coverage by event code.<br><b>03</b> <code>| tstats</code><br> - Establishes a short-term baseline for comparison.<br><b>04</b> <code>| eval severity_level</code><br> - Assigns severity based on missing events, low volume, or low host coverage.<br>
explanation = <p>Active Directory auditing is foundational to security monitoring, forensic investigations, and compliance reporting. This search ensures that key Windows Security Event Codes associated with directory service changes and access are consistently being generated and collected. By comparing recent activity against short-term baselines, it can identify scenarios where auditing has been disabled, misconfigured, or partially deployed across domain controllers. The resulting severity assessment helps security and identity teams quickly prioritize remediation before blind spots impact detection or compliance posture.</p>
quid = 6B1CF57247B0BBE28CD69F28A9AA41BD
search_author = dluxton
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/get-data/windows-data/about-windows-event-logs" target="_blank">Splunk Help: Windows Event Logs</a><br>Overview of ingesting and managing Windows Security Event Logs.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=active%20directory%20auditing" target="_blank">Splunk Docs: Active Directory Auditing Searches</a><br>Search references and examples for monitoring AD security events.</li><li><a href="https://community.splunk.com/t5/Security/bd-p/security" target="_blank">Community: Security</a><br>Community discussions and best practices for AD auditing and detection.</li></ul>
severity_normal_text = <br/><p>AD Auditing event codes found.</p>
severity_medium_text = <br/><p>Low Volume of events sighted from 1 or all of the AD Auditing events.</p>
severity_high_text = <br/><p>One of the following AD auditing event codes is missing (5136,5137,4662)</p>
severity_critical_text = <br/><p>No AD Auditing Event Codes (5136,5137,4662) were identified.</p>\
<p>Please ensure the wineventlog_security macro is populated with the necessary wineventlog indexes.</p>
description = <p>This search validates <b>Windows Active Directory auditing coverage</b> by checking for critical <b>security event codes</b> related to directory changes and access.</p><p>It detects <b>missing events, low activity volume, or reduced host participation</b> that may indicate auditing gaps.</p><p><b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
search = [ `ssef_all_indexes`] (source="*WinEventLog:Security" OR Channel="security") EventCode IN (5136,5137,4662) \
| eval summary_id="windows_active_directory_auditing" \
| where (Task=14080 OR TaskCategory="Directory Service Access") OR EventCode IN (5136,5137) \
| stats count as eventCount dc(dest) as destCount by EventCode \
| eval details="Event Code: "+EventCode+" eventCount: "+eventCount+" Dest Count: "+destCount+"|" \
| append \
    [| tstats summariesonly=true count as 15m_count WHERE \
        [| `ssef_all_indexes` ] AND (sourcetype=*WinEventLog* source=*WinEventLog:Security) earliest=-15m ] \
| stats values(details) as details values(EventCode) as EventCodes sum(eventCount) as totalEventCount max(destCount) as max_destCount min(destCount) as min_destCount values(15m_count) as 15m_count \
| eval missing_eventCode=if(NOT (match(EventCodes,"5136") AND match(EventCodes,"5137") AND match(EventCodes,"4662")),"true",null()), low_volume=if(totalEventCount<('15m_count'/10/24),"true",null()), low_hosts=if('min_destCount'<('max_destCount'*0.65),"true",null()) \
| eval severity_level = case (missing_eventCode="true",4,low_volume="true" OR low_hosts="true",3,true(),1) \
| table 15m_count missing_eventCode severity_level \
| `ssef_handle_no_results(5,"WARNING: AD Auditing eventCodes were not found.")`

