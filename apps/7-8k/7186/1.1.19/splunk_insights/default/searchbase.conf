quid = 0D5F8AEB8F340E3CAF33C7231B122B8C
updated_author = khutchinson
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Forwarder/latest/Forwarder/Troubleshoottheuniversalforwarder" target="_blank">Troubleshoot Forwarding Issues</a></li>\
<li><a href="https://community.splunk.com/t5/Getting-Data-In/Troubleshooting-connection-issues-with-forwarders/m-p/520987" target="_blank">Splunk Answers - Troubleshooting Forwarder Connection Problems</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Forwarding/Monitorforwarders" target="_blank">Splunk Docs - Monitoring Forwarders</a></li>\
<li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/forwarder%20health" target="_blank">Splunkbase - Apps for Monitoring Forwarder Health</a></li>\
</ul>
severity_normal_text = <br/><p>This search has returned an 'informational' status. There is nothing to worry about here unless you were expecting a different severity. If that is the case reach out to your Splunk Account team. More information may be added here to support this search result.</p>
severity_low_text = <br/><p>Detected instances where a small number of forwarders (less than 5) encountered connection issues over the past 24 hours. While not immediately critical, it's advisable to review these connections to ensure reliable data forwarding and prevent potential data loss.</p>
severity_medium_text = <br/><p>Notable connection issues detected, with 5 to 10 forwarders experiencing problems sending data to their defined output destinations in the last 24 hours. Recommended to investigate and resolve these connectivity issues to maintain optimal data forwarding efficiency and system reliability.</p>
description = <p>This check, which identifies forwarders unable to send data to defined output locations in the past 24 hours. It is crucial for maintaining optimal system performance and data integrity. When forwarders fail to deliver data to all available upstream destinations, it significantly impacts search performance, data throughput, and system availability. Addressing these issues promptly ensures continuous data flow and system reliability, thereby safeguarding the overall effectiveness and value of the data processing infrastructure.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Error count of 10 or more.</li>\
<li><strong>Low:</strong> Error count of 5 or less than 10.</li>\
<li><strong>Normal:</strong> Error count under 5.</li>\
</ul>
search = index=_internal sourcetype=splunkd TERM(ERROR) component=TcpOutput* (resolve OR connection) \
| eval summary_id="ssef_scma_forwarder_output_connection_issues" \
| `ssef_instance_info(host)` \
| rex "host=\"?(?<instance>[^\s\"]+)\"?" \
| eval message=if(match(_raw, "resolve"), "Cannot resolve host", "Cannot establish connection") \
| stats count AS error_count_24h dc(host) AS impacted_forwarders values(message) AS message dc(instance) as num_indexers latest(name) as name latest(_time) as _time by label \
| rename values(*) AS * , dc(*) AS dc_* \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( error_count_24h >= 10, medium, error_count_24h >= 5, low, true(), normal ) \
| table _time label name error_count_24h impacted_forwarders num_indexers severity_level message \
| `ssef_handle_no_results(1,"The ssef_scma_forwarder_output_connection_issues summary job completed successfully without identifying any issues, and everything is operating as expected.")`

