dispatch_context_uid = 7186
quid = 310751FB0AB4D088CB442443A370B64E
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span></p>\
The ratio of regularly used dashboards to the total number of non-system dashboards in a Splunk environment for a given time frame. \
\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span></p>\
A dashboard qualifies as regularly used if it is accessed daily during at least 10% of the period. This ratio sheds light on adoption rates, performance efficiency, and dashboard alignment with business objectives. A low ratio may signal underutilization, misalignment with organizational goals, or a surplus of infrequently used dashboards. \
\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span></p>\
Monitoring and analyzing this KPI <em>monthly</em> and reviewing it <em>quarterly</em> helps organizations identify areas for improvement and ensure Splunk is effectively supporting their business goals and investment expectations.
search = `ssef_summary(ssef_internal_web_access_tracker)` type!=system view=* \
| eval summary_id="%_of_Regularly_Used_Dashboards_to_Total_Export" \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1h \
| stats count by _time, label, type, app, view \
| bin _time span=1d \
| stats count by _time, view \
| appendcols \
    [ search `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
    | bin _time span=1d \
    | stats dc(view_name) as total_views by _time ] \
| filldown total_views \
| addinfo \
| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 \
| eventstats dc(_time) as num_active_days by view \
| eval perc_active = round((num_active_days / num_days) * 100, 2) \
| fillnull value=0 perc_active total_views \
| eval active_view = if(perc_active >= `ssef_perc_active_threshold`, view, null() ) \
| stats max(total_views) as total_views dc(view) as all_views dc(active_view) as active_views max(num_days) as num_days by _time \
| eval reg_seen_to_total = ceiling((active_views / total_views) * 100) , threshold=`ssef_perc_active_threshold` \
| fields _time total_views all_views active_views reg_seen_to_total num_days threshold \
| bin _time span=1d \
| stats max(reg_seen_to_total) as kpi_value by _time  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "% of Regularly Used Dashboards to Total" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

