sub_category = Use Cases
tags = Admin,Capabilities,Summary,Use Case
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = ED92917B1ABBB6546A729C05E2EBD3D0
updated_author = shalpin
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>Maintain the lookups for Lantern Use Case Explorer search collection, so that they do not grow indefinitely.</p>
search = | inputlookup uce_usecase_interactions WHERE use_case!="" \
| eval summary_id="ssef_usecase_explorer_interactions" \
| where interaction_time >= relative_time(now(), `ssef_use_case_interaction_retention`) \
| append \
    [| inputlookup uce_usecase_interactions WHERE use_case!="" AND bookmark!="" \
    | where interaction_time < relative_time(now(), `ssef_use_case_interaction_retention`) \
    | stats latest(*) AS * by use_case ] \
| append \
    [| inputlookup uce_usecase_interactions WHERE use_case!="" AND completed!="" \
    | where interaction_time < relative_time(now(), `ssef_use_case_interaction_retention`) \
    | stats latest(*) AS * by use_case ] \
| sort use_case interaction_time \
| eval bookmark=if(bookmark=="", null(), bookmark),\
    completed=if(completed=="", null(), completed) \
| filldown bookmark completed \
| table "interaction_time","use_case","bookmark","completed","Data_Match_Discovered","distinct_UCE_Data_Category","distinct_Discovered_Sourcetypes","distinct_use_case_name","user","user_realname","user_email","user_timezone","bookmark_count","completed_count" \
| outputlookup uce_usecase_interactions \
| eval severity_level = 0 \
| `ssef_handle_no_results(1,"The ssef_usecase_explorer_interactions summary job completed successfully without identifying any issues, and everything is operating as expected.")`

