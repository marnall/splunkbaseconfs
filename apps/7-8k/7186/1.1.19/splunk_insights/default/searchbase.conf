[summary_number_of_search_heads]
search_name = Number of Search Heads
readonly = 1
ssef_cron = weekly
target_component = Infra & Arch
version = 3.0.0
date_created = 2025-08-08
date_updated = 2025-8-8 19:48:8
category = Splunk
sub_category = _internal
tags = EFS,Monitoring,Search Heads,Summary,_internal
solution = <p>Ensures search head tier activity is in line with expectations and detects missing or inactive nodes.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any missing search heads in cluster status.<br><b>2.</b> Validate Splunk Web and Splunkd are running on affected nodes.<br><b>3.</b> Check load balancer health checks and VIP configuration.<br><b>4.</b> Review <code>server.conf</code> and <code>search_head_clustering.conf</code> for proper membership settings.<br><b>5.</b> Use Monitoring Console to compare search head availability over time.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (total_search_heads=0,5, total_search_heads&lt;=1,4, total_search_heads&lt;=3,3, total_search_heads&lt;=5,2, total_search_heads&gt;5,1)</code></pre><p>This SPL should be added before the final <code>| table</code> to classify severity based on the number of active search heads observed in POST activity.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> More than 5 active search heads — healthy tier activity.</li><li><b>Low (Severity 2):</b> 4–5 active search heads — slightly reduced.</li><li><b>Medium (Severity 3):</b> 2–3 active search heads — limited redundancy.</li><li><b>High (Severity 4):</b> Only 1 active search head — high risk of outages.</li><li><b>Critical (Severity 5):</b> 0 active search heads — no search jobs being created.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="splunkd_ui_access" method=POST "/services/search/jobs" OR "/services/search/v2/jobs"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve internal audit logs of POST requests for search job creation.<br><b>02</b> <code>| stats dc(host) as total_search_heads</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct search head hosts initiating jobs.<br><b>03</b> <code>| eval severity_level = case (total_search_heads=0,5, total_search_heads&lt;=1,4, total_search_heads&lt;=3,3, total_search_heads&lt;=5,2, total_search_heads&gt;5,1)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity where fewer active search heads = higher risk.<br><b>04</b> <code>| table total_search_heads severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output the metric and severity for alerting/dashboards.<br>
explanation = <p>This search queries the <b>_internal</b> index for <b>splunkd_ui_access</b> events with HTTP POST requests to <code>/services/search/jobs</code> or <code>/services/search/v2/jobs</code>. These endpoints indicate that a search head initiated a search job. It counts distinct search head hosts to monitor the number of active search heads contributing to workload execution.</p><p>Environments with fewer active search heads than expected may indicate connectivity, load balancing, or service availability issues. The severity logic classifies fewer search heads as higher risk, with <b>0</b> meaning no search job creation observed.</p>
quid = 266F0A0823B9B0B0C65CE27F1B52E455
search_author = Splunk Searchbase Assistant
updated_author = khutchinson
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/DistSearch/SHCdeploymentoverview" target="_blank">Search Head Clustering Overview</a><br>Concepts and configuration for search head clustering.</li><li><a href="https://community.splunk.com/t5/Deployment-Architecture/Search-head-issues/m-p/641921" target="_blank">Splunk Community: Search Head Issues</a><br>Peer discussions on diagnosing search head problems.</li></ul>
severity_normal_text = <p>Search head tier is healthy with expected activity levels.</p>
severity_low_text = <p>Slightly reduced search head activity; monitor for further drops.</p>
severity_medium_text = <p>Limited number of active search heads; investigate missing nodes.</p>
severity_high_text = <p>Only one search head is active; risk of search service outage is high.</p>
severity_critical_text = <p>No search heads are creating jobs; search service is down or inaccessible.</p>
description = <p>This search looks for any instance in which the search endpoint was hit via POST & indicates a search head. The more search heads, the more surface area & capacity for users to leverage Splunk</p>
search = index=_internal sourcetype="splunkd_ui_access" method=POST "/services/search/jobs" OR "/services/search/v2/jobs" \
| eval summary_id="summary_number_of_search_heads" \
| stats dc(host) as total_search_heads \
| eval severity_level = case (total_search_heads=0,5, total_search_heads>=1,1) \
| table total_search_heads severity_level\
| `ssef_handle_no_results(1,"The summary_number_of_search_heads summary job completed successfully without identifying any issues, and everything is operating as expected.")`

