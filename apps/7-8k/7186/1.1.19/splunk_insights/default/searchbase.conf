execution_plan = <b>01</b> <code>index=_internal source=*scheduler.log ... status=skipped</code><br> - Retrieve skipped scheduled searches while excluding acceleration workloads and default apps.<br><b>02</b> <code>| rex ...</code><br> - Extract app context from raw scheduler events.<br><b>03</b> <code>| stats ... by host app_context ... reason</code><br> - Aggregate skip counts per host and search definition.<br><b>04</b> <code>| `ssef_instance_info(host)`</code><br> - Enrich with deployment label metadata for tier-level visibility.<br><b>05</b> <code>| eval severity_level=case(...)</code><br> - Map skip volume to severity thresholds for governance triage.
solution = <p>Skipped searches typically indicate <b>scheduler contention</b>, concurrency saturation, or misconfigured cron density.</p><p><b>Suggested Actions</b>: Review frequently skipped saved searches, optimize inefficient SPL, stagger cron schedules, reduce unnecessary frequency, and validate workload management and concurrency limits. Persistent skips in specific app contexts may indicate governance or design issues requiring remediation.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(count&gt;50,4,count&gt;25,3,count&gt;0,2,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Managed scaling and workload governance capabilities when scheduler contention impacts reliability.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utility Apps</a><br>Administrative and troubleshooting utilities that support scheduler diagnostics and governance review.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=skipped%20scheduled%20searches" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps that help monitor scheduler health and optimize search workloads.</li></ul></p>
related_info = <ul><li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Enterprise/Reducing_skipped_searches_in_Splunk_Enterprise" target="_blank">Check out Splunk Lantern for more information on skipped searches.</a></li><li>Blogs: Tips N Tricks:  <a href="https://www.splunk.com/en_us/blog/tips-and-tricks/are-you-skipping-please-read.html" target="_blank">Are You Skipping? Please Read!</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: SPL Command Quick Reference</a><br>Reference for rex, stats, eval, and aggregation commands used in this search.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search Reference</a><br>Core SPL documentation for optimizing scheduled search definitions.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Splunk Free Courses</a><br>Training resources to improve SPL efficiency and reduce skipped workload scenarios.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunk Apps: IT Operations Management Apps</a><br>Operations monitoring apps that complement scheduler health and workload governance visibility.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_scma_search_skipped_searches_detail)` \
| fields _time label app_context search_type savedsearch_name count message severity_level \
| stats latest(*) AS * latest(_time) as _time by label app_context savedsearch_name \
| rename app_context AS app \
| `ssef_severity_level_text(severity_level)` \
| sort - severity_level \
| table label app search_type savedsearch_name message count severity_text \
| rename severity_text as Severity label as "Search Head" app as App message As Reason count as "# Skips" search_type as Type savedsearch_name as Job

