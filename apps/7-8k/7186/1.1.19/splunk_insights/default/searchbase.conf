[ssef_scma_search_index_statistics]
search_name = Search Statistics by Index
readonly = 1
target_component = Search & Visualization
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-14 13:8:0
category = Splunk
sub_category = Search
tags = SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = -0h@h
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = EDCAB7CA005853A41DAE538F4EBCA049
updated_author = khutchinson
related_info = <ul>\
 <li><a href="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://docs.splunk.com/Documentation/Splunk/9.2.0/Indexer/Aboutindexesandindexers&ved=2ahUKEwii6aW5g5CFAxVnGtAFHYlkAkQQFnoECB4QAQ&usg=AOvVaw2TlgnPiToUeeun4wEUxOZi" target="_blank">About Indexes and Indexers </a></li>\
 <li><a href="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://docs.splunk.com/Documentation/Splunk/9.2.0/Indexer/Howindexingworks&ved=2ahUKEwii6aW5g5CFAxVnGtAFHYlkAkQQFnoECDYQAQ&usg=AOvVaw2P0rrmn2i7OjqVAeDT2_tk" target="_blank">How Indexing Works</a> <a href="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://docs.splunk.com/Splexicon:Indexer&ved=2ahUKEwjtypeEhJCFAxXLENAFHVjzCEQ4ChAWegQIBxAB&usg=AOvVaw032YLkpaj3fa8gyXnERp9v" target="_blank">Splexicon</a></li>\
 </ul>
severity_normal_text = <br/><p>This search has returned information that indicates you are inline with acceptable health parameters as it pertains to indexing.</p>
severity_low_text = <br/><p>Detected indexes with a notable number of scheduled jobs (between 500 and 999), suggesting a moderate level of search activity that may benefit from review. While not immediately critical, optimizing these searches could improve system efficiency and performance. Consider evaluating the scheduling frequency and efficiency of these jobs to better balance resource utilization.</p>
severity_medium_text = <br/><p>Detected indexes with a significant number of scheduled jobs (1000 or more), indicating potential overutilization or inefficient scheduling. This level of activity could strain system resources and affect overall performance. Review and optimization of scheduled searches, particularly their necessity and scheduling frequency, are recommended to ensure efficient resource usage and maintain optimal system performance.</p>
description = <p>A Splunk index is a repository for Splunk data. Data that has not been previously added to Splunk is referred to as raw data. When the data is added to Splunk, it indexes the data (uses the data to update its indexes), creating event data. Individual units of this data are called events. This search provides statistical information by index.</p>\
<p>Within a 7 day period collects information on number of searches, number of users, number of hosts, number of scheduled jobs number of apps , search types, search head host id names searching these indexes and grand total runtime for each.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> > 1000</li>\
<li><strong>Low:</strong> 500-100</li>\
<li><strong>Normal:</strong> < 500</li>\
</ul>
search = index=_audit sourcetype=audittrail action=search search_id=* total_run_time>0 NOT info IN (cancel,pause,finalize,setworkloadpool,granted) \
| eval summary_id="ssef_scma_search_index_statistics" \
| rex field=_raw ",\s+search='(?<search_string>\p{Any}+)" \
| eval total_run_time = if (is_realtime=1 AND savedsearch_name="itsi_event_grouping", 0, total_run_time) \
| eval search_id = if((isnull(search_id) OR (search_id == "")), null(), trim(search_id, "'")) \
| eval search_type = case ( match(search_id, "^\'?md\_"), "metadata", match(search_id, "^\'?subsearch_"), "subsearch", match(search_id, "^\'?rt_") OR is_realtime=1, "realtime", match(search_id, "^\'?alertsmanager_"), "alertsmanager", match(search_id, "^\'?ta_\\d+") OR match(search_string, "^\'?typeahead\s+"), "typeahead", (match(search_id, "^\'?SummaryDirector") OR match(search_id, "^\'?summarize_SummaryDirector") OR match(savedsearch_name, "^\'?_ACCELERATE_")) AND ! match(_raw, "_DM_"), "report_acceleration", match(search_id, "^\'?DM_|^\'?SummaryDirector_") OR match(savedsearch_name, "^\'?_ACCELERATE_DM_") OR match(search_string,"id=DM_|_DM_") AND ( match(search_string,"summarize\s+tstats=") AND provenance = "summary_director"), "datamodel_acceleration", match(search_id, "^\'?scheduler_"), "scheduled", ( in(app,"splunk_archiver","splunk_instrumentation") OR match(search_string,"\|\s*savedsearch\s+|\|\s*copybuckets\s+|sourcetype=splunk_telemetry") ) AND user="splunk-system-user", "scheduled", provenance = "N/A" AND user="splunk-system-user", "scheduled", ( match(provenance, "^UI:") OR ( match(search_string, "^\'?search") AND provenance="N/A" ) OR match(search_id,"^\'?\d{10}\.\d+") ) AND user!="splunk-system-user", "adhoc", true(), "adhoc") \
| eval search_et = case (isnum(search_et),search_et, (((search_et == "N/A") OR (apiStartTime == "N/A")) OR match(apiStartTime,"_TIME")),0,((isnull(search_et) OR (search_et == "")) AND isnotnull(apiStartTime)),strptime(apiStartTime,"%a %b %d %H:%M:%S %Y"),true(),null()), search_lt = case (isnum(search_lt),search_lt,(((search_lt == "N/A") OR (apiEndTime == "N/A")) OR match(apiEndTime,"_TIME")),0,((isnull(search_lt) OR (search_lt == "")) AND isnotnull(apiEndTime)),strptime(apiEndTime,"%a %b %d %H:%M:%S %Y"),true(),null()) \
| rex field=search_string mode=sed "s/^search\s+|']$//g" \
| `ssef_index_reference(search_string)` \
| where index_reference!="no-index-reference" \
| rename index_reference as index_name \
| join index_name \
    [| tstats summariesonly=true count as num_events WHERE [ | `ssef_all_indexes` ] by index \
    | rename index as index_name \
    | fields index_name, num_events ] \
| stats count as num_searches dc(host) as num_hosts max(num_events) as num_events dc(user) as num_users dc(app) as num_apps dc(savedsearch_origin = custom\
    search_name) as num_jobs sum(total_run_time) as total_run_time values(search_type) as search_type values(host) as host by index_name \
| `ssef_instance_info(host)` \
| eval name = mvjoin(name, ":") , label=mvjoin(label, ":") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_jobs >= 1000, medium, num_jobs >= 500, low, true(), normal ) \
| table index_name name label num_hosts num_events num_searches search_type num_apps num_jobs num_users total_run_time severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_index_statistics summary job completed successfully without identifying any issues, and everything is operating as expected.")`

