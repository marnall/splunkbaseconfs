| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| eval total_search_time_hrs = (total_search_time / 60) \
| bin _time span=1d \
| stats sum(total_search_time_hrs) AS "Active User Search Hours" by _time \
| eval "Active User Search Hours" = round('Active User Search Hours')

