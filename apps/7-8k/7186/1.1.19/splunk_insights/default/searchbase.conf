[summary_average_daily_scheduled_searches]
search_name = Average Daily Scheduled Searches
readonly = 1
ssef_cron = weekly
target_component = Search & Visualization
version = 3.0.2
date_created = 2025-08-06
date_updated = 2025-11-8 14:3:6
category = Splunk
sub_category = _internal
tags = EFS,Scheduled Search,Summary,Usage Metrics
solution = <p>This search allows you to assess the scale of daily scheduled searches, helping manage scheduling load and identify trends.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor for abnormal increases or drops in scheduled search activity.<br><b>2.</b> Correlate spikes with operational events or deployments.<br><b>3.</b> Optimize or consolidate scheduled searches if volumes are excessively high.<br><b>4.</b> Consider load balancing across search head cluster members.<br><b>5.</b> Validate resource allocation if volumes hit capacity thresholds.</p><p><b>Recommended Alerts</b></p><pre><code>solution = <p>This search allows you to assess the scale of daily scheduled searches, helping manage scheduling load and identify usage trends that correlate with Splunk value realization.</p><p><b>Suggested Actions</b><br><b>1.</b> Encourage teams with low search volume to build more automation and alerts.<br><b>2.</b> Promote best practices for scheduled searches to maximize platform efficiency.<br><b>3.</b> If search volume is too low, investigate whether Splunk adoption is lagging.<br><b>4.</b> For higher volumes, ensure system capacity supports demand.<br><b>5.</b> Track changes over time to benchmark maturity progress across business units.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (daily_average_total_searches_ran > 400,1,daily_average_total_searches_ran > 200,2,daily_average_total_searches_ran > 100,3,daily_average_total_searches_ran > 0,4,true(),5)</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> Excellent activity — more than 100 scheduled searches/day</li><li><b>Low (Severity 2):</b> Strong utilization — 51–100 scheduled searches/day</li><li><b>Medium (Severity 3):</b> Moderate use — 21–50 scheduled searches/day</li><li><b>High (Severity 4):</b> Underutilization risk — fewer than 20 scheduled searches/day</li><li><b>Critical (Severity 5):</b> No scheduled searches — possible missed value or misconfiguration</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| timechart partial=t fixedrange=t span=1d dc(data.search_props.sid) as total_searches_ran</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Counts unique scheduled searches run per day<br><b>02</b> <code>| stats avg(...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates the daily average<br><b>03</b> <code>| eval ...=round(...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Rounds the average to two decimal places<br><b>04</b> <code>| eval severity_level = case (...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assigns severity based on volume thresholds<br><b>05</b> <code>| table ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Formats final output
quid = EFF4187E013B9B575D846F6CC07332C5
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>Excellent use of Splunk—automated insights are continuously running.</p>
severity_low_text = <p>Healthy scheduled search usage. Continue driving automated insights.</p>
severity_medium_text = <p>Moderate scheduled search activity. May indicate limited automation or newer deployment.</p>
severity_high_text = <p>Low search activity detected. Encourage further Splunk usage and content development.</p>
severity_critical_text = <p>No scheduled searches found. Investigate configuration or adoption gaps immediately.</p>
description = <p>This looks at the how many search invocations (not inclusive of acceleration searches) are being run via the introspection index, on a daily basis over the last business weeks & then computes the daily average.  This is directly correlated with product usage, as searches go up, Splunk is being leveraged more.</p>
search = | tstats summariesonly=true dc(data.search_props.sid) as total_searches_ran WHERE index=_introspection sourcetype="splunk_resource_usage" data.search_props.sid=* data.search_props.mode!=RT data.search_props.user!="splunk-system-user" data.search_props.type="scheduled" by _time span=1d\
| eval summary_id="summary_average_daily_scheduled_searches"\
| timechart partial=t fixedrange=t span=1d sum(total_searches_ran) as total_searches_ran\
| stats avg(total_searches_ran) as daily_average_total_searches_ran\
| eval daily_average_total_searches_ran = round(daily_average_total_searches_ran,2)\
| eval severity_level = case (daily_average_total_searches_ran > 400,1,daily_average_total_searches_ran > 200,2,daily_average_total_searches_ran > 100,3,daily_average_total_searches_ran > 0,4,true(),5)\
| table daily_average_total_searches_ran severity_level\
| `ssef_handle_no_results(1,"The summary_average_daily_scheduled_searches summary job completed successfully without identifying any issues, and everything is operating as expected.")`

