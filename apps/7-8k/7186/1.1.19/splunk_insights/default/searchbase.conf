diagnostic_searches = ssef_audit_user_login_tracker,ssef_internal_index_license_usage
version = 2.0
date_updated = 2025-11-18 14:7:21
category = Splunk
sub_category = Adoption
tags = Adoption,Capabilities,Details,Sourcetypes
solution = <p>This search gives a curated view of sourcetypes that are both highly used and properly mapped. It supports data quality initiatives and makes it easier to identify gaps in enrichment or classification.</p><p><b>Suggested Actions</b><ul><li>Verify that high-usage sourcetypes have the correct vendor and product details.</li><li>Ensure domain and category mappings are aligned with team objectives (e.g., SecOps, ITOps).</li><li>Expand the mapping coverage for partially enriched sourcetypes.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise-security.html" target="_blank">Products: Splunk Enterprise Security</a><br>Enables content mapping and classification of sourcetypes within security frameworks.</li><li><a href="https://lantern.splunk.com/Search?q=%22data%20classification%22" target="_blank">Lantern: Data Classification</a><br>How to categorize and manage data sources for security and observability use cases.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=sourcetype%20mapping" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps to help improve sourcetype enrichment and metadata quality.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_regularly_accessed_sourcetypes`</code><br> - Retrieve active sourcetypes based on search coverage.<br><b>02</b> <code>| where search_coverage_percent >= `ssef_perc_active_threshold`</code><br> - Keep only sourcetypes above the active use threshold.<br><b>03</b> <code>| `ssef_sourcetype_mapping(inventory_sourcetype)`</code><br> - Enrich with sourcetype metadata including vendor, domain, and category.<br><b>04</b> <code>| makemv delim="|" ...</code><br> - Prepare domain and category as multivalue fields.<br><b>05</b> <code>| stats values(*) as * by inventory_sourcetype</code><br> - Aggregate and deduplicate metadata.<br><b>06</b> <code>| table ...</code><br> - Select final output fields for presentation.<br><b>07</b> <code>| rename ...</code><br> - Clean field names for dashboard/report readiness.<br>
explanation = <p>This search evaluates which sourcetypes are not only actively accessed in searches but also successfully mapped to known domains, categories, vendors, and products. This provides assurance that critical data sources are properly documented and classified. The inclusion of event volume and diversity (hosts, sources) allows teams to spot widely used sourcetypes and verify enrichment quality. This enables better governance, onboarding validation, and strategic data alignment across security, IT, and observability domains.</p>
quid = 4FB05C7AE21C838E13824C77B396A6B8
updated_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com/t5/Getting-Data-In/How-can-you-regulate-resource-consumption-when-monitoring-a/m-p/54525" target="_blank">Splunk Community: How can you regulate resource usage when monitoring a large number of files?</a><p>This discussion addresses the impact of monitoring numerous files without explicit sourcetype assignments, which can lead to increased CPU usage. Properly assigning sourcetypes can help manage resource usage, thereby enhancing user experience.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Listofpretrainedsourcetypes" target="_blank">Splunk Docs: List of pretrained source types</a><p>This documentation provides a comprehensive list of Splunks pretrained sourcetypes, assisting in identifying and categorizing data sources to optimize resource allocation and improve system performance.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Setsourcetype" target="_blank">Splunk Docs: Assign the correct source types to your data</a><p>This guide explains how to assign appropriate sourcetypes to your data, ensuring efficient data processing and resource utilization, which positively impacts user experience.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Whysourcetypesmatter" target="_blank">Splunk Docs: Why source types matter</a><p>This resource elaborates on the significance of sourcetypes in data indexing and searchability, highlighting their role in resource management and user satisfaction.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Managesourcetypes" target="_blank">Splunk Docs: Manage source types</a><p>This documentation offers insights into managing sourcetypes within Splunk, including creation, modification, and deletion, to maintain optimal system performance and user experience.</p></li><li><a href="https://community.splunk.com/t5/Getting-Data-In/Source-vs-Sourcetype-What-s-the-difference/m-p/347340" target="_blank">Splunk Community: Source vs Sourcetype: What is the difference?</a><p>This discussion clarifies the distinction between 'source' and 'sourcetype' in Splunk, aiding in better data organization and resource management strategies.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Data/Createsourcetypes" target="_blank">Splunk Docs: Create source types</a><p>This guide provides instructions on creating custom sourcetypes to accurately represent unique data formats, facilitating efficient resource usage and enhancing user experience.</p></li><li><a href="https://docs.splunk.com/Documentation/AddonBuilder/latest/UserGuide/ManageSourceTypes" target="_blank">Splunk Docs: Manage source types with Add-on Builder</a><p>This resource explains how to manage sourcetypes using Splunk`s Add-on Builder, streamlining the process of handling diverse data sources and their associated resource usage.</p></li><li><a href="https://community.splunk.com/t5/Getting-Data-In/Source-types-in-var-log/m-p/698945" target="_blank">Splunk Community: Source types in /var/log</a><p>This discussion focuses on assigning appropriate sourcetypes to logs in the /var/log directory, ensuring efficient data processing and resource management.</p></li><li><a href="https://splunk.github.io/splunk-add-on-for-microsoft-cloud-services/Sourcetypes/" target="_blank">Source types - Splunk Add-on for Microsoft Cloud Services</a><p>This resource lists the sourcetypes provided by the Splunk Add-on for Microsoft Cloud Services, assisting in understanding data categorization and its impact on resource usage.</p></li></ul>
description = <p>Identifies <b>regularly accessed sourcetypes</b> that have existing <b>domain and category mapping</b> through the reference mapping system. This helps confirm alignment between usage and classification. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_regularly_accessed_sourcetypes` \
| where search_coverage_percent >= `ssef_perc_active_threshold` \
| `ssef_sourcetype_mapping(inventory_sourcetype)` \
| makemv delim="|" category \
| makemv delim="|" domain \
| stats values(*) as * by inventory_sourcetype \
| table inventory_sourcetype Indexes domain category event_count dc_host dc_source newly_added vendor product \
| rename inventory_sourcetype as Sourcetype , domain as Domain , category as Category , dc_host as "# of Hosts" , dc_source as "# of Sources" , event_count as "# of Events" , newly_added as "Newly Added" , vendor as Vendor , product as Product

[Regularly Seen User Details]
search_name = Regularly Seen User Details
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker
version = 2.0
date_created = 2025-1-21 15:59:20
date_updated = 2025-11-12 19:27:27
category = Splunk
sub_category = Users
tags = Adoption,Details,Users
solution = <p>This search surfaces high-volume ad hoc search users, revealing the potential for performance tuning and education.</p><p><b>Suggested Actions</b><br><b>1.</b> Review users with high total runtime.<br><b>2.</b> Cross-reference sourcetypes and indexes with system load.<br><b>3.</b> Encourage converting repeated searches into saved searches.<br><b>4.</b> Consider user education for more efficient SPL practices.<br><b>5.</b> Optimize data models or indexing strategies if common patterns emerge.</p><p> Recommended For You: <ul><li><a href="https://splunkbase.splunk.com/app/1465" target="_blank">Splunkbase: Keyword App</a><br>Token-based keyword extraction for search pattern analysis.</li><li><a href="https://splunkbase.splunk.com/app/7719" target="_blank">Splunkbase: ThousandEyes App for Splunk</a><br>Network observability integration to correlate search behavior with performance data.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) num_searches>0 search_type="*adhoc*"</code><br> - Filters for active ad hoc search users, excluding system/default accounts.<br><b>02</b> <code>| fields ...</code><br> - Selects only relevant fields for analysis.<br><b>03</b> <code>| bin _time span=1h</code><br> - Groups activity by hour.<br><b>04</b> <code>| stats latest(*) as * by _time , label, app, user</code><br> - Aggregates latest activity by time, app, and search head.<br><b>05</b> <code>| eval sourcetype_reference=split(...) ...</code><br> - Splits multivalue fields for processing.<br><b>06</b> <code>| `ssef_macro_definition(...)`</code><br> - Maps label/index references using macro.<br><b>07</b> <code>| rename ...</code><br> - Stores original reference for deduplication.<br><b>08</b> <code>| `ssef_index_reference(...)`</code><br> - Expands and resolves data reference definitions.<br><b>09</b> <code>| eval index_reference=... </code><br> - Merges and deduplicates index sources.<br><b>10</b> <code>| stats ... by _time, user</code><br> - Summarizes searches, sourcetypes, and usage.<br><b>11</b> <code>| `ssef_regularly_seen(user)`</code><br> - Flags consistent users for analysis.<br><b>12</b> <code>| eval sourcetype_reference = replace(...)</code><br> - Sanitizes sourcetype strings for consistency.<br><b>13</b> <code>| stats ... by user</code><br> - Final summary by user across session activity.<br><b>14</b> <code>| eval total_search_time_hr=round(...)</code><br> - Converts runtime to hours.<br><b>15</b> <code>| table ...</code><br> - Formats final table view.<br><b>16</b> <code>| rename ...</code><br> - Final user-friendly column labels.<br>
explanation = <p>Frequent ad hoc searches can stress infrastructure. This search helps identify who is generating the most such searches, what resources are involved, and how long they’re running. Tracking app and search head usage alongside accessed data helps optimize workloads, reduce duplication, and guide dashboard or saved search creation. Administrators can use this to improve performance, reduce unnecessary searches, and enhance governance by promoting responsible usage of resources.</p>
quid = 2B1512BF4BD96B06954CE1E1D611F6CE
search_author = khutchinson
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.3/manage-users/about-users-and-roles" target="_blank">Help: About users and roles</a><br>Overview of Splunk user access control.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/manage-search-performance/9.3/optimize-searches" target="_blank">Help: Optimize searches</a><br>Techniques to enhance search efficiency in Splunk.</li><li><a href="https://lantern.splunk.com/Search?q=Search%20Performance" target="_blank">Lantern: Search Performance</a><br>Guidance on managing search efficiency and resource usage in Splunk.</li></ul>
description = <p>This search identifies <b>users executing ad hoc searches</b> in Splunk and analyzes their activity over time. It aggregates search behavior by user, app, and search head, while revealing accessed <b>indexes and sourcetypes</b>. This helps administrators understand <b>who is generating load</b> and what data sources they are accessing.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`,splunk-system-user) num_searches>0 search_type="*adhoc*" \
| fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type role index_reference sourcetype_reference datamodel_reference \
| bin _time span=1h \
| stats latest(*) as * by _time , label, app, user \
| eval sourcetype_reference=split(sourcetype_reference,"|") , index_reference=split(index_reference,"|") \
| `ssef_macro_definition(label,index_reference)` \
| rename index_reference as orig_index_reference \
| `ssef_index_reference(Macro_Definition)` \
| eval index_reference=mvdedup(mvappend(orig_index_reference,index_reference)) \
| stats values(label) as label values(app) as app values(index_reference) as index_reference latest(sourcetype_reference) as sourcetype_reference sum(num_searches) as num_searches sum(total_search_time) as total_search_time by _time, user \
| `ssef_regularly_seen(user)` \
```| eval sourcetype_reference = replace(sourcetype_reference, "[^A-Za-z0-9:_*-]", "") ```\
| stats values(label) as "Search Head(s)" values(app) as "App" values(index_reference) as Indexes values(sourcetype_reference) as Sourcetypes sum(num_searches) as "# of Searches" sum(total_search_time) as total_search_time by user \
| eval total_search_time_hr=round(total_search_time/3600, 2) \
| table user "Search Head(s)" App Indexes Sourcetypes "# of Searches" total_search_time_hr \
| rename user as User, total_search_time_hr as "Runtime (hr)"

