related_info = <a href="troubleshooting" target="_blank" rel="noopener" style="font-size:15px">Click to open the IS4S Troubleshooting Dashboard</a>
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = <br/><p>The job did not produce any results. If extending the time selector to more than 24 hours still yields no data, please visit the troubleshooting dashboard for detailed guidance on resolving this issue.</p>
description = <p>This Splunk query retrieves information about Splunk instances, system settings, and pipeline sets.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/server/info  \
| eval summary_id="ssef_assets" \
| rename eai:acl.* AS * \
| rename field.* AS * \
| eval Splunk_Instance=lower(splunk_server) \
| `ssef_instance_info(Splunk_Instance)` \
| join Splunk_Instance \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/admin/system-info  \
    | rename "eai:acl.*" AS "*" \
    | rename eai:* AS * , transparent_hugepages.* AS transparent_hugepages_* , ulimits.* AS ulimits_* \
    | eval Splunk_Instance=lower(splunk_server) \
    | fields Splunk_Instance, transparent_hugepages_defrag, transparent_hugepages_effective_state, transparent_hugepages_enabled, ulimits_core_file_size, ulimits_cpu_time, ulimits_data_file_size, ulimits_data_segment_size, ulimits_nice, ulimits_open_files, ulimits_resident_memory_size, ulimits_stack_size, ulimits_user_processes, ulimits_virtual_address_space_size] \
| join Splunk_Instance type=left \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/server/settings  \
    | fields splunk_server, serverName, host, host_resolved, SPLUNK_DB, SPLUNK_HOME, appServerPorts, dfsDisabled, dfsMasterPort, enableSplunkWebSSL, httpport, kvStoreDisabled, kvStorePort, mgmtHostPort, minFreeSpace, sessionTimeout, startwebserver, trustedIP \
    | eval Splunk_Instance=lower(splunk_server) \
    | fields Splunk_Instance, serverName, host, host_resolved, SPLUNK_DB, SPLUNK_HOME, appServerPorts, dfsDisabled, dfsMasterPort, enableSplunkWebSSL, httpport, kvStoreDisabled, kvStorePort, mgmtHostPort, minFreeSpace, sessionTimeout, startwebserver, trustedIP \
    | stats LAST(serverName) AS serverName , LAST(host) AS host , LAST(host_resolved) AS host_resolved , LAST(SPLUNK_DB) AS SPLUNK_DB , LAST(SPLUNK_HOME) AS SPLUNK_HOME , LAST(appServerPorts) AS appServerPorts , LAST(dfsDisabled) AS dfsDisabled , LAST(dfsMasterPort) AS dfsMasterPort , LAST(enableSplunkWebSSL) AS enableSplunkWebSSL , LAST(httpport) AS httpport , LAST(kvStoreDisabled) AS kvStoreDisabled , LAST(kvStorePort) AS kvStorePort , LAST(mgmtHostPort) AS mgmtHostPort , LAST(minFreeSpace) AS minFreeSpace , LAST(sessionTimeout) AS sessionTimeout , LAST(startwebserver) AS startwebserver , LAST(trustedIP) AS trustedIP , \
        by Splunk_Instance \
    | fields Splunk_Instance, serverName, host, host_resolved, SPLUNK_DB, SPLUNK_HOME, appServerPorts, dfsDisabled, dfsMasterPort, enableSplunkWebSSL, httpport, kvStoreDisabled, kvStorePort, mgmtHostPort, minFreeSpace, sessionTimeout, startwebserver, trustedIP ] \
| join Splunk_Instance type=left \
    [| rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/server/pipelinesets  \
    | stats count AS pipelinesets by splunk_server \
    | eval Splunk_Instance = lower(splunk_server) \
    | fields Splunk_Instance pipelinesets] \
| stats `ssef_stats_rest_assets_fields` by Splunk_Instance \
| eval _time = now() \
| eval host_short_tmp = mvindex ( split(host_fqdn, "."), 0 ) , host_short = if ( len (host_short_tmp) > 3, host_short_tmp, null()) \
| foreach role \
    [ eval <<FIELD>>=mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| rename host as host_name \
| eval is4s="summary" \
| append maxtime=60 maxout=50000 timeout=60 \
    [| search `ssef_summary(ssef_assets)` earliest=-1d@d \
    | foreach Splunk_Instance, role \
        [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
    | stats `ssef_stats_rest_assets_fields` LATEST(_time) AS _time by Splunk_Instance \
    | table _time,host_name,label,Splunk_Instance,role,host_short,host_fqdn,host_resolved,host_ip,label,appServerPorts,build,cpu_arch,dfsDisabled,dfsMasterPort,enableSplunkWebSSL,guid,httpport,isForwarding,isTrial,kvStoreDisabled,kvStorePort,kvStoreStatus,license_labels,licenseState,manager_guid,manager_uri,mgmtHostPort,minFreeSpace,mode,numberOfCores,numberOfVirtualCores,os_build,os_name,os_name_extended,os_version,physicalMemoryMB,rtsearch_enabled,serverName,sessionTimeout,SPLUNK_DB,SPLUNK_HOME,startup_time,startwebserver,transparent_hugepages_defrag,transparent_hugepages_effective_state,transparent_hugepages_enabled,trustedIP,ulimits_core_file_size,ulimits_cpu_time,ulimits_data_file_size,ulimits_data_segment_size,ulimits_nice,ulimits_open_files,ulimits_resident_memory_size,ulimits_stack_size,ulimits_user_processes,ulimits_virtual_address_space_size,version,pipelinesets \
    | outputlookup ssef_assets_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | stats count as num_items \
    | eval is4s="lookup" ] \
| where is4s="summary" \
| table _time, Splunk_Instance, role, serverName, host_name, host_short, host_fqdn, host_resolved, host_ip, label, guid, mode, version, build, os_name, os_name_extended, cpu_arch, os_version, os_build, startup_time, kvStoreStatus, numberOfCores, numberOfVirtualCores, physicalMemoryMB, rtsearch_enabled, manager_uri, manager_guid, licenseState, isForwarding, isTrial, license_labels, transparent_hugepages_defrag, transparent_hugepages_effective_state, transparent_hugepages_enabled, ulimits_core_file_size, ulimits_cpu_time, ulimits_data_file_size, ulimits_data_segment_size, ulimits_nice, ulimits_open_files, ulimits_resident_memory_size, ulimits_stack_size, ulimits_user_processes, ulimits_virtual_address_space_size, SPLUNK_DB, SPLUNK_HOME, appServerPorts, dfsDisabled, dfsMasterPort, enableSplunkWebSSL, httpport, kvStoreDisabled, kvStorePort, mgmtHostPort, minFreeSpace, sessionTimeout, startwebserver, trustedIP, pipelinesets,severity_level \
