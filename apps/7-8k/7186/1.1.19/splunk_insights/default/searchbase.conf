date_updated = 2024-5-9 17:53:13
category = Splunk
sub_category = Apps
tags = Apps,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 9F4082273059141E5B2D2A93FDC42D08
updated_author = khutchinson
related_info = <ul>\
 <li><a href="https://www.splunk.com/en_us/customer-success/splunk-cloud-platform-migration.html" target="_blank">https://www.splunk.com/en_us/customer-success/splunk-cloud-platform-migration.html</a></li>\
 </ul>
severity_normal_text = <br/><p>Review the output of the search to determine if all applications are still relevant to your deployment and qualify for migration to Splunk Cloud. This is a great time to clean up your environment and apply the best practices that you have developed over time, but were not ready to implement.</p>
severity_low_text = <br/><p>Review the output of the search to determine if all applications are still relevant to your deployment and qualify for migration to Splunk Cloud. This is a great time to clean up your environment and apply the best practices that you have developed over time, but were not ready to implement.</p>
description = <p>This analysis of Splunk app usage, based on dashboard views, is crucial as it distinguishes essential apps from those less necessary. Engaging with users of popular apps allows organizations to understand effective usage patterns and maximize value. Conversely, assessing underutilized apps highlights opportunities to streamline operations and optimize resource use, especially important in Splunk Enterprise on-prem environments. This strategic evaluation ensures resources are allocated where they provide the greatest benefit, enhancing overall system efficiency and effectiveness.</p>\
<p><strong>Severity Levels:</strong></p>\
 <ul>\
 <li><strong>Low:</strong> The app has been accessed less than one time by a user</li>\
 <li><strong>Normal:</strong> The app has been access more than one time by a user.</li>\
 </ul>
search = index=_internal sourcetype=splunkd_ui_access method=GET uri="*/app/*" user!=cmon_user user!="-" \
| eval summary_id="ssef_scma_apps_top_app_hits" \
| rex field=uri "app/(?<app>[^/]+)/" \
| stats count AS views dc(user) AS dc_users dc(host) AS dc_instance by app \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( dc_users <= 1, low, true(), normal ) \
| table app dc_instance dc_users percent views severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_apps_top_app_hits summary job completed successfully without identifying any issues, and everything is operating as expected.")`

