search_name = Search Average Run Time
readonly = 1
target_component = Search & Visualization
version = 1.0.1
date_created = 2023-03-27
date_updated = 2024-2-4 12:38:20
category = Splunk
sub_category = Search
tags = SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 63C6877EC150F39C5008DDA9626F612A
updated_author = akhamis
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Aboutsearchperformanceconsiderations" target="_blank">Splunk Docs - Performance Considerations for Search</a></li>\
<li><a href="https://community.splunk.com/t5/Deployment-Architecture/Why-are-my-searches-running-slow/m-p/416734" target="_blank">Splunk Answers - Troubleshooting Slow Searche</a></li>\
<li><a href="https://splunkbase.splunk.com/apps/#/order/relevance/search/search%20performance" target="_blank">Splunkbase - Apps for Monitoring Search Performance</a></li>\
</ul>
severity_normal_text = <br/><p>Your average search run times look to be in a healthy range. There is currently no need to tune your searches for optimization. You are ahead of the game!</p>
severity_medium_text = <br/><p><p>We have found that the average run time for searches in your environment exceed 25s. When the average search run time is high in Splunk, it means that queries are taking longer than usual to process and return results. This could be due to various factors such as complex search queries, large volumes of data, insufficient system resources, or performance issues within the Splunk environment. High search run times can impact user experience, cause delays in obtaining insights from data, and indicate potential optimization or resource allocation needs within the Splunk deployment.</p></p>
severity_high_text = <br/><p>We have found that the average run time for searches in your environment exceed 50s. When the average search run time is high in Splunk, it means that queries are taking longer than usual to process and return results. This could be due to various factors such as complex search queries, large volumes of data, insufficient system resources, or performance issues within the Splunk environment. High search run times can impact user experience, cause delays in obtaining insights from data, and indicate potential optimization or resource allocation needs within the Splunk deployment.</p>
description = <p>Overall, lower average search run times contribute to a more responsive, efficient, and scalable Splunk platform, enhancing user satisfaction and enabling faster data-driven decision-making.  The check provides average run time and search count statistics by product (Core, ES, ITSI).</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> > 50</li>\
<li><strong>Medium:</strong> 25 - 49</li>\
<li><strong>Normal:</strong> < 25</li>\
</ul>
search = index=_audit sourcetype=audittrail action=search TERM(is_realtime=0) TERM(info=completed) \
| eval summary_id="ssef_scma_search_avg_run_time" \
| fields host,total_run_time \
| bin _time span=1d \
| sistats avg(total_run_time) AS h_total_run_time by _time, host \
| `ssef_instance_info(host)` \
| eval product = case (match(name, "^es"), "es", match(name, "^itsi"), "itsi", true(), "core") \
| sistats avg(total_run_time) AS h_total_run_time by _time, product \
| foreach psrsvd_*_* \
    [ eval psrsvd_<<MATCHSEG1>>_count = psrsvd_gc] \
| stats sum(count) AS search_count_product, avg(total_run_time) AS avg_run_time_env by _time, product \
| eventstats sum(search_count_product) AS total_search_count \
| eval search_distribution_perc = round( (search_count_product / total_search_count) * 100, 2) \
| eval total_search_count = round(total_search_count) , search_count_product = round(search_count_product) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( avg_run_time_env >= 50, high, avg_run_time_env >= 25, medium, true(), normal ) \
| table _time product avg_run_time_env search_count_product total_search_count search_distribution_perc severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_avg_run_time summary job completed successfully without identifying any issues, and everything is operating as expected.")`

