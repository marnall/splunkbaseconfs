| eval summary_id="ssef_scma_licensing_current_entitlements" \
| rename label as license_label , status as license_status \
| `ssef_instance_info(splunk_server)` \
| eval type = if(match(sourcetypes,"^itsi_"), "ITSI", type) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( license_status != "VALID", medium, true(), normal ) \
