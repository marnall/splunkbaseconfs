[summary_number_of_indexers]
search_name = Number of Indexers
readonly = 1
ssef_cron = weekly
target_component = Infra & Arch
version = 2.x
date_created = 2025-08-08
date_updated = 2025-8-1 13:17:17
category = Splunk
sub_category = _internal
tags = Buckets,EFS,Indexing,Summary
solution = <p>Validates that indexers are actively writing buckets; sudden drops may indicate ingestion stalls or cluster issues.</p><p><b>Suggested Actions</b><br><b>1.</b> If indexer count is low, check indexer health (CPU, disk, queues).<br><b>2.</b> Review cluster manager status and bucket fix-ups.<br><b>3.</b> Verify inputs and network paths from forwarders to indexers.<br><b>4.</b> Inspect indexing pipelines (parsing/merging) for backlogs.<br><b>5.</b> Correlate with license usage and ingestion volume trends.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (indexers=0,5, indexers<=2,4, indexers<=5,3, indexers<=10,2, indexers>10,1)</code></pre><p>This SPL should be added before the final <code>| table</code> command to classify severity for alerting and dashboards. <b>Tune thresholds</b> for your environment size.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> &gt;10 indexers writing — healthy activity.</li><li><b>Low (Severity 2):</b> 6–10 indexers — mildly reduced activity.</li><li><b>Medium (Severity 3):</b> 3–5 indexers — limited activity; investigate.</li><li><b>High (Severity 4):</b> 1–2 indexers — significant risk of ingestion issues.</li><li><b>Critical (Severity 5):</b> 0 indexers — indexing halted; immediate action.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="splunkd" source="*splunkd.log" component=TERM(IndexWriter) thread_name=indexerPipe* bucket=*</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Select internal events from IndexWriter threads indicating active bucket writes.<br><b>02</b> <code>| fields host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Keep only the host field for deduplication and counting.<br><b>03</b> <code>| stats dc(host) AS indexers</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct indexers performing writes.<br><b>04</b> <code>| eval severity_level = case (indexers=0,5, indexers&lt;=2,4, indexers&lt;=5,3, indexers&lt;=10,2, indexers&gt;10,1)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity (fewer indexers = higher risk; none = Critical).<br><b>05</b> <code>| table indexers severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Present the KPI and severity for dashboards/alerts.<br>
explanation = <p>This search inspects <b>_internal</b> <b>splunkd</b> logs, focusing on <b>IndexWriter</b> threads (<code>indexerPipe*</code>) to identify indexers performing write operations on buckets. It deduplicates hosts to return the count of unique indexers engaged in bucket writes during the time window—an indicator of ingestion and indexing activity.</p><p>For junior Splunkers, this demonstrates targeted filtering, field reduction with <b>fields</b>, distinct counting via <b>stats dc()</b>, and adding <b>severity</b> classifications for alerting.</p>
quid = DFDD7FC26D806B89244765F747044FEC
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>Indexer write activity is healthy across the cluster.</p>
severity_low_text = <p>Indexer write activity is reduced; monitor for further decline.</p>
severity_medium_text = <p>Limited number of indexers writing; investigate pipeline bottlenecks.</p>
severity_high_text = <p>Very few indexers are writing; risk of ingestion gaps is high.</p>
severity_critical_text = <p>No indexers are writing buckets; ingestion is halted and requires urgent remediation.</p>
description = <p>Calculates the number of indexing instances in your splunk environment by finding instances that have IndexWriter component. A higher indexer count in most cases indicates a higher adoption of Splunk and its capabilities</p>
search = index=_internal sourcetype="splunkd" source="*splunkd.log" component=TERM(IndexWriter) thread_name=indexerPipe* bucket=* \
| eval summary_id="summary_number_of_indexers" \
| fields host \
| stats dc(host) AS indexers \
| eval severity_level = case (indexers=0,5, indexers<=2,4, indexers<=3,3, indexers>3,1) \
| table indexers severity_level\
| `ssef_handle_no_results(1,"The summary_number_of_indexers summary job completed successfully without identifying any issues, and everything is operating as expected.")`

