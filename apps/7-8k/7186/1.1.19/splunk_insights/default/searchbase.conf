| eval conf="savedsearches" \
| stats latest(*) as * latest(_time) AS _time by label, app, sharing, author, savedsearch_name \
| rename savedsearch_name as title \
| stats values(sharing) as sharing values(savedsearch_search) as savedsearch_search latest(name) as name by conf label app title \
| append maxtime=60 maxout=50000 timeout=60 \
    [| search `ssef_summary(ssef_data_macros)` definition="*runshellscript*" \
    | eval conf="macros" \
    | stats values(definition) AS search values(sharing) AS sharing latest(name) as name by conf label app title ] \
| stats values(sharing) as sharing values(search) as search latest(name) as name by label, title, app, conf \
| rename title as object \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( isnotnull(app), medium, true(), normal ) \
