severity_normal_text = <br/><p>No license issues were detected in the environment.</p>
severity_medium_text = <br/><p>Invalid Splunk licenses have been identified in the environment. Please ensure these licenses are either removed from your license manager or replaced with valid ones. For any questions, contact your Splunk account team.</p>
description = <p>This search detects the license entitlements deployed within the environment and identifies any issues related to these licenses, such as invalid licenses, among others.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
