| table label app author savedsearch_name actions index_reference sourcetype_reference savedsearch_search *_reference

[Search Concurrency]
search_name = Search Concurrency
readonly = 1
diagnostic_searches = ssef_scma_search_search_concurrency
version = 2.0
date_updated = 2024-11-23 17:46:20
category = Splunk
sub_category = Search
tags = Details,KPIs,Search
solution = <p>This search provides a time-based view of search concurrency behavior across the platform.</p><p><b>Suggested Actions</b>: Investigate sustained increases in peak or 95th percentile concurrency, align workload scheduling to reduce contention, and plan search head scaling before performance degradation occurs.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Help users design efficient searches that reduce concurrent load.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Expert guidance for workload management, capacity planning, and performance optimization.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=workload%20management" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover Splunk and Cisco apps that support concurrency analysis and workload governance.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary()</code><br> - Loads IS4S summary data containing pre-aggregated search concurrency metrics.<br><b>02</b> <code>| stats / time normalization</code><br> - Aggregates daily concurrency indicators to visualize trends and detect sustained pressure patterns.<br>
explanation = <p>Search concurrency is a critical indicator of platform pressure and user behavior. By monitoring average, maximum, and high-percentile concurrency over time, platform owners can understand whether usage patterns are stable, spiky, or trending upward. This data helps distinguish healthy adoption growth from potentially risky contention scenarios that could impact search performance. These insights support informed decisions around search head scaling, workload management, and governance thresholds.</p>
quid = DC51946555868906568D6B16C886B86C
updated_author = akhamis
related_info = <p><ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.0/Capacity/Accommodatemanysimultaneoussearches">Splunk Docs: How concurrent users and searches impact performance</a> - This guide explains how multiple concurrent searches affect Splunks performance and offers strategies to optimize search efficiency.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.0/Capacity/HowconcurrentusersaffectSplunkEnterpriseperformance">Splunk Docs: How concurrent users affect Splunk Enterprise performance</a> - This article discusses the impact of multiple users running searches simultaneously and provides recommendations for managing system resources effectively.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.0/DistSearch/SHCjobscheduling">Splunk Docs: Control search concurrency on search head clusters</a> - This documentation details how to manage search concurrency within search head clusters, including enforcing user and role quotas.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/User-level-Concurrent-search-limits/m-p/395995">Splunk Community: User-level Concurrent search limits</a> - This community discussion explores setting concurrent search job limits for specific user roles to optimize performance.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/The-maximum-number-of-concurrent-historical-searches-on-this/m-p/361491">Splunk Community: The maximum number of concurrent historical searches on this instance has been reached</a> - This thread addresses issues related to exceeding concurrent historical search limits and offers potential solutions.</li></ul></p>
description = <p>This search tracks <b>daily search concurrency trends</b> using summarized metrics. It highlights <b>average, peak, and 95th percentile concurrency</b> to understand overall platform load behavior. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p></p>
default_viz = splunk.singlevalue
search = `ssef_summary(ssef_scma_search_search_concurrency)` \
| fields _time,dc_instance,severity_level,sum_total_concurrency_avg,sum_total_concurrency_max,sum_total_concurrency_perc95 \
| bin _time span=1d \
| stats latest(sum_total_*) AS sum_total_* by _time

