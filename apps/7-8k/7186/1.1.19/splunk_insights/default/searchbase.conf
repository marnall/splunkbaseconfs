solution = <p>This search helps identify how your analytic landscape is expanding by highlighting new capabilities as they are added. This can guide roadmap alignment, content validation, and help prioritize future development.</p><p><b>Suggested Actions</b><ul><li>Review newly added capabilities and verify alignment with organizational goals.</li><li>Investigate unclassified entries to improve source mapping quality.</li><li>Use this data to track analytic maturity over time.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-enterprise-security.html" target="_blank">Products: Splunk Enterprise Security</a><br>Enables correlation and detection of new analytic capabilities across domains.</li><li><a href="https://www.splunk.com/en_us/software/splunk-security-essentials.html" target="_blank">Products: Splunk Security Essentials</a><br>Provides prebuilt use cases that align with analytic capability classification.</li><li><a href="https://lantern.splunk.com/Search?q=%22analytic%20capabilities%22" target="_blank">Lantern: Analytic Capabilities</a><br>Explore analytic capability best practices and use case examples.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=analytic%20capabilities" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Apps that support new analytic capabilities and use case mapping.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>`ssef_summary(ssef_scma_indexing_data_source_inventory)` newly_added="yes"</code><br> - Filter for newly added data sources using a summary macro.<br><b>02</b> <code>| fields _time orig_index orig_sourcetype dc_host dc_source event_count severity_level newly_added</code><br> - Keep only relevant fields for analysis.<br><b>03</b> <code>| bin _time span=1d</code><br> - Bucket events into daily time spans.<br><b>04</b> <code>| stats count by _time orig_sourcetype</code><br> - Count new sourcetypes per day.<br><b>05</b> <code>| rename orig_sourcetype as sourcetype</code><br> - Normalize field name for lookups.<br><b>06</b> <code>| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type category as sourcetype_category domain as sourcetype_domain</code><br> - Map sourcetypes to content metadata.<br><b>07</b> <code>| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type category as sourcetype_category domain as sourcetype_domain</code><br> - Apply fallback mapping if custom mapping is missing.<br><b>08</b> <code>| eval sourcetype_category=split(mvdedup(sourcetype_category), "|"), sourcetype_domain=split(mvdedup(sourcetype_domain), "|")</code><br> - Split multivalue fields for category/domain.<br><b>09</b> <code>| stats values(*) as * by sourcetype data_type</code><br> - Aggregate all fields by sourcetype and data_type.<br><b>10</b> <code>| lookup uce_usecase_mapping data_type AS data_type OUTPUTNEW use_case</code><br> - Map data_type to use cases.<br><b>11</b> <code>| eval use_case=mvdedup(use_case)</code><br> - Deduplicate use cases.<br><b>12</b> <code>| stats values(*) as * by sourcetype use_case</code><br> - Aggregate again by sourcetype and use_case.<br><b>13</b> <code>| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type as use_case_type category as usecase_category domain as usecase_domain</code><br> - Add metadata for each use case.<br><b>14</b> <code>| eval use_case_type=mvdedup(use_case_type)</code><br> - Deduplicate use case types.<br><b>15</b> <code>| eval use_case_name = if(match(use_case_type, "Use Case"), use_case, null())</code><br> - Identify true use case names.<br><b>16</b> <code>| eval domain=mvdedup(mvappend(sourcetype_domain,usecase_domain)), category=mvdedup(mvappend(sourcetype_category,usecase_category))</code><br> - Merge and deduplicate domain and category fields.<br><b>17</b> <code>| fillnull value="Unclassified" domain category</code><br> - Replace missing values with 'Unclassified'.<br><b>18</b> <code>| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()), Analytic_Capabilities = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null())</code><br> - Differentiate analytic capabilities from use cases.<br><b>19</b> <code>| stats values(Analytic_Capabilities) as "New Analytic Capabilities by Domain and Category" by domain sourcetype</code><br> - Final output showing new analytic capabilities grouped by domain and sourcetype.<br>
explanation = <p>This search is useful for understanding how analytic content evolves over time by identifying which analytic capabilities are newly introduced. It leverages source type to use case mapping to provide a business-context view of new content. This is crucial for content validation, expansion planning, and use case development. Data teams, content developers, and security analysts can leverage this to detect and prioritize emerging analytic potential within indexed data. Categorizing capabilities by domain and category also ensures alignment with strategic frameworks.</p>
quid = F1298C3C061154F5A60A5F8D8FD30113
updated_author = akhamis
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/ingest-and-index/9.3/monitor-data-sources" target="_blank">Splunk Help: Monitor Data Sources</a><br>Describes how to onboard and monitor new data sources in Splunk.</li><li><a href="https://lantern.splunk.com/Search?q=%22data%20source" target="_blank">Lantern: Data Source Inventory</a><br>Understand how data sources feed analytic use cases.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q=%22analytic%20capabilities%22" target="_blank">Community: Analytic Capabilities</a><br>Discussions and questions about analytic capabilities and implementation.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=lookup%20command" target="_blank">Splunk Docs: Lookup Command</a><br>Documentation on using the lookup command to enrich search data.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/use/reports/9.3/build-and-schedule-reports" target="_blank">Splunk Help: Build and Schedule Reports</a><br>Learn to schedule alerts or dashboards to track capability growth.</li><li><a href="https://search.cisco.com/search?query=%22analytic%20capabilities%22" target="_blank">Cisco Docs: Analytic Capabilities</a><br>How Cisco integrates with analytic capabilities across observability.</li></ul>
description = <p>Identifies <b>newly added analytic capabilities</b> based on indexed data sources, and maps them to their respective <b>domain</b> and <b>category</b>. This helps teams track analytics growth and capability alignment with use cases. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
default_viz = splunk.pie
search = `ssef_summary(ssef_scma_indexing_data_source_inventory)` newly_added="yes" \
| fields _time orig_index orig_sourcetype dc_host dc_source event_count severity_level newly_added \
| bin _time span=1d \
| stats count by _time orig_sourcetype \
| rename orig_sourcetype as sourcetype \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type category as sourcetype_category domain as sourcetype_domain \
| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type category as sourcetype_category domain as sourcetype_domain \
| eval sourcetype_category=split(mvdedup(sourcetype_category), "|"), sourcetype_domain=split(mvdedup(sourcetype_domain), "|") \
| stats values(*) as * by sourcetype data_type \
| lookup uce_usecase_mapping data_type AS data_type OUTPUTNEW use_case \
| eval use_case=mvdedup(use_case) \
| stats values(*) as * by sourcetype use_case \
| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type as use_case_type category as usecase_category domain as usecase_domain \
| eval use_case_type=mvdedup(use_case_type) \
| eval use_case_name = if(match(use_case_type, "Use Case"), use_case, null()) \
| eval domain=mvdedup(mvappend(sourcetype_domain,usecase_domain)) , category=mvdedup(mvappend(sourcetype_category,usecase_category)) \
| fillnull value="Unclassified" domain category \
| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()) , Analytic_Capabilities = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null()) \
| stats values(Analytic_Capabilities) as "New Analytic Capabilities by Domain and Category" by domain sourcetype

