severity_high_text = <p>High number of blocked instances (6‑10); serious ingestion delays—action required.</p>
severity_critical_text = <p>Critical ingestion disruption: over 10 instances blocked. Immediate action essential.</p>
description = <p>This search calculations the number of times within a 1hr timestamp, how often indexing and input queues have been blocked 90percent or more. A final filter is added to find instances the the blocked queues measure more than 30 times in the span of an hour. Whilist there are many ways to get a count of blocked queues, it is calculated in time slices to make it consistent and replicatable. A larger count of blocked queues will cause downstream data issues and eventually customer experience issues with data quality and integrity. </p>
search = index=_internal sourcetype="splunkd" source="*metrics.log" group=queue (name=splunktcpin OR name=tcpin_queue OR name=parsingqueue OR name=aggqueue OR name=typingqueue OR name=indexqueue) \
| eval summary_id="summary_blocked_queues_on_indexers" \
| bin _time span=1h \
| fields _time host,name,ingest_pipe,max_size,max_size_kb,current_size_kb \
| rename name AS queue \
| eval ingest_pipe = if(isnotnull(ingest_pipe), ingest_pipe, "0") \
| eval max = if(isnotnull(max_size_kb), max_size_kb, max_size) \
| eval curr = if(isnotnull(current_size_kb), current_size_kb, current_size) \
| eval fill_perc = round((curr/max)*100,2) \
| eval host_and_pipe = host . "@@" . ingest_pipe \
| eval readable_time = strftime(_time, "%Y-%m-%d %H:%M:%S"), host_and_pipe = host_and_pipe . "@@" . readable_time \
| chart perc90(fill_perc) over host_and_pipe by queue \
| eval host_and_pipe = split(host_and_pipe, "@@"), instance = lower(mvindex(host_and_pipe, 0)), ingest_pipe = mvindex(host_and_pipe, 1), timestamp = mvindex(host_and_pipe, 2) \
| eval NewTime = strptime(timestamp, "%Y-%m-%d %H:%M:%S") \
| eval _time = NewTime \
| fields - host_and_pipe \
| search tcpin_queue >= 30 OR parsingqueue >= 30 OR aggqueue >= 30 OR typingqueue >= 30 OR indexqueue >= 30 \
| stats max(*) as * count as blocked_1h_threshold by instance \
| where blocked_1h_threshold > 84 \
| stats values(instance) as instance max(*) as * count(instance) as instances_with_blocked_queues \
| eval severity_level = case (instances_with_blocked_queues == 0,1, instances_with_blocked_queues == 1,2, instances_with_blocked_queues >= 2 AND instances_with_blocked_queues <= 5,3, instances_with_blocked_queues > 5 AND instances_with_blocked_queues <= 10,4, instances_with_blocked_queues > 10,5) \
| table instances_with_blocked_queues instance aggqueue blocked_1h_threshold indexqueue ingest_pipe parsingqueue splunktcpin tcpin_queue typingqueue severity_level\
| `ssef_handle_no_results(1,"The summary_blocked_queues_on_indexers summary job completed successfully without identifying any issues, and everything is operating as expected.")`

