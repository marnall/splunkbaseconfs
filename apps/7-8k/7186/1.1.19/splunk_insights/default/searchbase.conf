[summary_search_head_cluster_warnings_and_errors]
search_name = Search Head Cluster Issues
readonly = 1
ssef_cron = weekly
target_component = Infra & Arch
version = 3.0.0
date_created = 2025-08-08
date_updated = 2026-1-28 12:33:22
category = Splunk
sub_category = _internal
tags = Clustering,EFS,SearchHeads,Summary,_internal
solution = <p>Identifies operational instability in the search head cluster by tracking daily WARN and ERROR logs from clustering components.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate the nature of frequent WARN/ERROR logs.<br><b>2.</b> Check SHC member connectivity, replication latency, and captain elections.<br><b>3.</b> Validate replication port settings and firewall rules.<br><b>4.</b> Monitor cluster resource utilization.<br><b>5.</b> Apply fixes or Splunk patches if issues are persistent.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (avg_daily_shc_issues=0,1, avg_daily_shc_issues<=2,2, avg_daily_shc_issues<=5,3, avg_daily_shc_issues<=10,4, avg_daily_shc_issues>10,5)</code></pre><p>Insert this before the final <code>| table</code> to assign severity classification. <b>Thresholds should be tuned</b> based on your SHC size and workload.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No daily SHC issues observed.</li><li><b>Low (Severity 2):</b> ≤2 average issues — negligible impact.</li><li><b>Medium (Severity 3):</b> 3–5 average issues — monitor for patterns.</li><li><b>High (Severity 4):</b> 6–10 average issues — possible instability.</li><li><b>Critical (Severity 5):</b> &gt;10 average issues — severe SHC health problem.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal component IN (ConfReplication* SHP* SHC*) CASE(WARN) OR CASE(ERROR) (log_level=warn OR log_level=error) NOT (Default pass4symkey is being used.)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter internal logs for SHC-related WARN/ERROR messages, excluding benign pass4symkey notices.<br><b>02</b> <code>| timechart partial=t fixedrange=t span=1d count as daily_shc_issues</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Build a daily time series of SHC issue counts.<br><b>03</b> <code>| stats avg(daily_shc_issues) as avg_daily_shc_issues</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate the average daily issue count.<br><b>04</b> <code>| eval avg_daily_shc_issues=round(avg_daily_shc_issues,2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Round for readability.<br><b>05</b> <code>| eval severity_level = case (avg_daily_shc_issues=0,1, avg_daily_shc_issues&lt;=2,2, avg_daily_shc_issues&lt;=5,3, avg_daily_shc_issues&lt;=10,4, avg_daily_shc_issues&gt;10,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Classify severity where more SHC issues = higher risk.<br><b>06</b> <code>| table avg_daily_shc_issues severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output KPI and severity.<br>
explanation = <p>This search reviews <b>_internal</b> logs for clustering-related components (<b>ConfReplication*</b>, <b>SHP*</b>, <b>SHC*</b>) and filters only <b>WARN</b> or <b>ERROR</b> messages. It excludes default pass4symkey warnings, which are informational. A 1-day timechart counts cluster-related issues, and the average over the search period is computed and rounded. Severity is assigned so that higher averages indicate greater operational risk in search head clustering.</p><p>For junior Splunkers, this SPL demonstrates scoped component filtering, conditional event exclusion, aggregation via <b>timechart</b> and <b>stats</b>, and applying alert severity thresholds.</p>
quid = 5A3C5EACB07245B40B3A768A615B6A0E
search_author = Splunk Searchbase Assistant
updated_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com/t5/Deployment-Architecture/SHC-problems-discussion/m-p/645920" target="_blank">Community: SHC Problems</a><br>Peer discussion on diagnosing and resolving SHC problems.</li></ul>
severity_normal_text = <p>No search head cluster issues detected; cluster is healthy.</p>
severity_low_text = <p>Minor SHC warnings/errors; continue monitoring.</p>
severity_medium_text = <p>Recurring SHC issues; investigate potential configuration or resource bottlenecks.</p>
severity_high_text = <p>Frequent SHC warnings/errors; cluster stability at risk.</p>
severity_critical_text = <p>Severe SHC instability detected; urgent remediation required.</p>
description = <p>This search looks at any issues related to Search Head clustering and calculates the daily average of issues found over a business week. SH Clustering issues can cause unpredictable searches, instability & general platform slowness. A higher count indicates more errors with SHC that can negatively impact user experience and knowledge bundles synchronization.</p>
search = index=_internal component IN (ConfReplication* SHP* SHC*) CASE(WARN) OR CASE(ERROR) (log_level=warn OR log_level=error) NOT (Default pass4symkey is being used.) \
| eval summary_id="summary_search_head_cluster_warnings_and_errors" \
| timechart partial=t fixedrange=t span=1d count as daily_shc_issues values(event_message) as event_message \
| stats avg(daily_shc_issues) as avg_daily_shc_issues values(event_message) as event_message \
| eval avg_daily_shc_issues=round(avg_daily_shc_issues,2) , event_message = mvindex(event_message,0,9) \
| eval severity_level = case (avg_daily_shc_issues=0,1, avg_daily_shc_issues<=2,2, avg_daily_shc_issues<=5,3, avg_daily_shc_issues<=10,4, avg_daily_shc_issues>10,5) \
| table avg_daily_shc_issues event_message severity_level \
| `ssef_handle_no_results(1,"The summary_search_head_cluster_warnings_and_errors summary job completed successfully without identifying any issues, and everything is operating as expected.")`

