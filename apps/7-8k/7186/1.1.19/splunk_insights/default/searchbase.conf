| search NOT app_name IN (dynamic-data-self-storage-app,splunk_ta_data_manager,data_manager,splunk_instance_monitoring,_cluster_admin,default,100-*,75-*) \
| stats latest(_time) as _time latest(event_message) as event_message by host app_action app_name \
| `ssef_instance_info(host)` \
| stats count(eval(app_action="creation")) AS num_apps_created count(eval(app_action="modification")) AS num_apps_modified count(eval(app_action="removal")) AS num_apps_removed latest(name) as name latest(_time) as _time by label, app_name \
| eval severity_level = if(isnotnull(_time), 1, null()) \
