cases with type, category, and domain.</b><br><b>14</b> <code>| eval use_case_type=mvdedup(use_case_type)</code><br> - Deduplicates types.</b><br><b>15</b> <code>| eval use_case_name = if(match(use_case_type, "Use Case"), use_case, null())</code><br> - Identifies primary use case names.</b><br><b>16</b> <code>| stats values(*) as * sum(eval(if(use_case_type=="Analytic Capability", 1, 0))) as num_Analytic_Capabilities values(eval(if(use_case_type=="Analytic Capability", use_case, null()))) as Analytic_Capabilities values(eval(if(use_case_type=="Technical Capability", use_case, null()))) as Technical_Capabilities sum(eval(if(use_case_type=="Technical Capability", 1, 0))) as num_Technical_Capabilities sum(eval(if(match(use_case_type, "Use Case"), 1, 0))) as num_Use_Cases by sourcetype</code><br> - Tallies counts and lists capabilities and use cases by sourcetype.</b><br><b>17</b> <code>| table sourcetype num_Use_Cases use_case_name num_Analytic_Capabilities Analytic_Capabilities num_Technical_Capabilities Technical_Capabilities data_type sourcetype_category sourcetype_domain usecase_category usecase_domain use_case_type</code><br> - Selects final fields for reporting.</b><br><b>18</b> <code>| rename use_case_name as "Analytic Use Case"</code><br> - Makes final use case field readable.</b>
