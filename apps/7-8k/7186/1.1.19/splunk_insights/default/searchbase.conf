env_run = 2
quid = DA5F1BDF55CF5CBCF0B7E0580B7007E7
updated_author = akhamis
severity_normal_text = <br/><p>Memory tracking is enabled across all instances, with settings configured to monitor search process memory usage effectively. This proactive measure helps in maintaining optimal performance and preventing issues related to excessive memory consumption. Continue monitoring to ensure these settings remain effective in managing system resources.</p>
severity_medium_text = <br/><p>Some instances have the memory tracker disabled, which could hinder the ability to monitor and manage search process memory usage effectively. Without this monitoring, there's an increased risk of encountering performance issues due to untracked memory consumption. It's recommended to review and enable memory tracking where necessary to enhance visibility into memory usage and ensure system stability.</p>
description = <p>Evaluates whether the <b>search memory tracker</b> is enabled and validates configured memory thresholds. It highlights deviations from expected configuration to protect search stability and system health. This ensures memory governance controls are active across the environment.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> Memory tracking is not enabled.</li>\
<li><strong>Normal:</strong> Memory tracking is enabled.</li>\
</ul>
explanation = <p>The memory tracker plays a critical role in protecting Splunk search processes from uncontrolled memory growth. When disabled, runaway or poorly optimized searches can exhaust system resources, impacting concurrency, scheduler stability, and overall platform performance. This search verifies that memory governance controls are enabled and confirms configured thresholds align with operational expectations. Infrastructure teams and Splunk administrators can use this insight to enforce consistent configuration standards, prevent memory saturation events, and maintain predictable workload behavior across search heads.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_scma_search_default_search_limits)`</code><br> - Retrieve summarized configuration data related to default search limits and memory tracker settings.<br><b>02</b> <code>| fields _time label name ... severity_level</code><br> - Select only relevant configuration attributes needed for memory governance validation.<br><b>03</b> <code>| stats max(...) latest(_time) as _time by label</code><br> - Aggregate configuration values by logical instance grouping for consistent reporting.<br><b>04</b> <code>| eval severity_level = case ( enable_memory_tracker != 1, medium, true(), normal )</code><br> - Assign severity if the memory tracker is disabled or misconfigured.<br><b>05</b> <code>| table _time label enable_memory_tracker severity_level ...</code><br> - Present a concise summary showing tracker status and configured thresholds.</br>
solution = <p>This search ensures that search memory governance controls are properly enabled and aligned with operational standards.</p><p><b>Suggested Actions</b><ul><li>Enable the memory tracker if it is disabled to prevent uncontrolled search memory consumption.</li><li>Review configured percentage and absolute memory thresholds to ensure they align with hardware capacity and workload expectations.</li><li>Validate changes across clustered search heads to maintain configuration consistency.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Correlate configuration drift and memory governance signals into service-level KPIs.</li><li><a href="https://www.splunk.com/en_us/products/observability.html" target="_blank">Products: Splunk Observability Cloud</a><br>Extend system-level observability and detect memory-related instability trends.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Engage experts to validate search limits, workload management, and performance tuning strategies.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=search%20memory%20management" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore complementary apps for search performance and memory optimization.</li></ul></p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Monitoring-Splunk/How-to-monitor-memory-usage-in-Splunk/m-p/520032" target="_blank">Splunk Answers - How to Monitor Memory Usage in Splunk</a></li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=%22search%20memory%20tracker%22" target="_blank">Splunk Docs: SplunkSearch for "search memory tracker"</a><br>(provisionally validated) Documentation references for search memory governance settings.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=search%20limits.conf" target="_blank">Splunk Docs: SplunkSearch for search limits.conf</a><br>(provisionally validated) Explore configuration parameters related to search process controls.</li><li><a href="https://help.splunk.com/en/search?q=%22max_searches_per_cpu%22" target="_blank">Splunk Help: Search for "max_searches_per_cpu"</a><br>(provisionally validated) Help resources for tuning search concurrency and CPU-based limits.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=workload%20management" target="_blank">Splunk Docs: SplunkSearch for workload management</a><br>(provisionally validated) Learn about workload controls and search resource governance.</li><li><a href="https://lantern.splunk.com/Search?q=%22search%20performance%22" target="_blank">Lantern: Search for "search performance"</a><br>(provisionally validated) Practical guidance on optimizing search efficiency and stability.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=configuration%20governance" target="_blank">Splunk Docs: SplunkSearch for configuration governance</a><br>(provisionally validated) Explore best practices for maintaining configuration consistency.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_scma_search_default_search_limits)` \
| eval summary_id="ssef_ia4s_environment_memory_tracker" \
| fields _time label name base_max_searches default_base_max_searches default_max_searches_per_cpu max_searches_per_cpu message enable_memory_tracker search_process_memory_usage_percentage_threshold search_process_memory_usage_threshold severity_level \
| stats max(base_max_searches) max(max_searches_per_cpu) latest(name) as name max(enable_memory_tracker) as enable_memory_tracker max(search_process_memory_usage_percentage_threshold) as search_process_memory_usage_percentage_threshold max(search_process_memory_usage_threshold) as search_process_memory_usage_threshold latest(_time) as _time by label \
| rename max(*) AS * \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( enable_memory_tracker != 1, medium, true(), normal ) \
