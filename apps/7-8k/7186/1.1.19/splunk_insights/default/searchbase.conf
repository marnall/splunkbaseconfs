quid = DCA2E565FCD2CA689DAD77D7A5D771D0
search_author = dluxton
related_info = <ul>\
<li><a href="https://splunkbase.splunk.com/app/7066" target="_blank">SA-DetectionInsights</a></li>\
</ul>
severity_normal_text = <br/><p>Looking at historical notables between 7 and 30 days old, all notabes were resolved.</p>
severity_medium_text = <br/><p>Looking at historical notables between 7 and 30 days old, one of the following criteria was met:</p>\
<ul>\
<li>More than 1 notables was left in an untouched state</li>\
<li>More than 10% of notables were left in an open state</li>\
</ul>\
<p></p>
severity_high_text = <br/><p>Looking at historical notables between 7 and 30 days old, one of the following criteria was met:</p>\
<ul>\
<li>More than 50% of notables were left in an untouched state</li>\
<li>More than 90% of notables were left in an open state</li>\
</ul>
severity_critical_text = <br/><p>Looking at historical notables between 7 and 30 days old, one of the following criteria was met:</p>\
<ul>\
<li>No historical notables were found</li>\
<li>More than 90% of notables were left in an untouched state</li>\
</ul>
description = <p>Best practice approach to alerting triage is to perform investigations and resolve alerts within the Splunk Enterprise Security platform.</p>\
<p>This allows analysts to take advantage of the supporting visutalisations, drilldowns, response plans for efficiencies with response and also generate an audit trail for their activities.</p>\
<p>This audit trail is crucial for measuring key performance indicators (KPIs) for detection and response such as MTTD &amp; MTTR.</p>\
<p></p>\
<p>This audit trail can also feed into the detection lifecycle, where detection engineers can identify alerts have a high false positive ratio then they can decide if the need further tuning, or even weigh up a risk VS reward ratio to decide if the alert is consuming too much time and should be drastically modified or decomissioned.</p>\
<p></p>
search = `notable` \
| eval summary_id="alerts_historical_notable_dispositions" \
| `ssef_instance_info(host)` \
| stats dc(eval(if(owner!="unassigned",owner,null()))) as uniqueCountOfAnalysts values(eval(if(owner!="unassigned",owner,null()))) as analysts count by label disposition_label status_label \
| fillnull analysts value="unassigned" \
| eval open=if(match(status_label,"(?i)resolved|closed|") OR status_end="true","false","true") \
| eventstats sum(count) as total count(eval(if(open="true",open,null()))) as open_count \
| eval percent=round(count/total*100,2), open_percent=round(open_count/total*100,2) \
| eval severity_level = case (\
    uniqueCountOfAnalysts=0 AND disposition_label="Undetermined" AND status_label="New" AND analysts="unassigned" AND percent>90,5,\
    uniqueCountOfAnalysts=0 AND disposition_label="Undetermined" AND status_label="New" AND analysts="unassigned" AND percent>50 OR open_percent>90,4,\
    uniqueCountOfAnalysts=0 AND disposition_label="Undetermined" AND status_label="New" AND analysts="unassigned" AND percent>0 OR open_percent>10,3,\
    open_percent=0,1,\
    true(),0) \
| table label analysts count disposition_label open open_count open_percent percent status_label total uniqueCountOfAnalysts severity_level \
| `ssef_handle_no_results(5,"WARNING: No historical notables were found")`

