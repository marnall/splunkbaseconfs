[ssef_ia4s_environment_cache_thrash]
search_name = Cache Thrashing Detected
readonly = 1
target_component = Infra & Arch
version = 2.0
date_updated = 2026-2-9 12:33:32
category = Splunk
sub_category = Storage
tags = Cache,Performance,_Internal
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 8DADF9D225B43901FE77EB8374525F4E
updated_author = khutchinson
severity_normal_text = <br/><p>Reflects a normal operational state with no significant cache misses.</p>
severity_low_text = <br/><p>Identifies low levels of cache misses, suggesting minor issues.</p>
severity_medium_text = <br/><p>At least 10 instances of excessive duplicate downloads of buckets in SmartStore, indicating potential cache thrashing or misconfiguration, possibly affecting system performance and resource efficiency.</p>
severity_high_text = <br/><p>Indicates a high level of cache misses that may impact performance.</p>
description = <p>Detects <b>CacheManager journal download thrashing</b> events within <b>splunkd.log</b> to identify repeated cache fetches for the same customer index. It measures duplicate and excessive downloads to surface potential cache inefficiencies. This helps platform teams proactively address performance degradation and storage churn.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> > 10 duplicate downloads / cache misses.</li>\
<li><strong>Medium:</strong> >= 10  <=20 duplicate downloads / cache misses.</li>\
<li><strong>Low:</strong> >= 5  < 10 duplicate downloads / cache misses.</li>\
<li><strong>Normal:</strong> No cache thrashing detected.</li>\
</ul>
explanation = <p>Cache thrashing can significantly degrade Splunk performance by repeatedly downloading journal data that should already exist in cache. When duplicate downloads increase, it often indicates misconfigured storage paths, insufficient cache retention, or unstable filesystem behavior. This search quantifies duplicate and excessive duplicate downloads per customer index so administrators can pinpoint where cache instability may be impacting search performance or indexing throughput. By monitoring duplicate_percent and severity thresholds, infrastructure and platform teams can prevent unnecessary disk I/O, reduce compute strain, and maintain predictable system behavior.</p>
execution_plan = <b>01</b> <code>index=_internal source=*splunkd.log CacheManager AND TERM(action=download) AND TERM(status=succeeded) AND download_set="*journal*"</code><br> - Identify successful CacheManager journal download events in internal logs.<br><b>02</b> <code>| rex field=cache_id ".*\|(?&lt;customer_index&gt;.*)~.*~.*\|"</code><br> - Extract the associated customer index from the cache identifier.<br><b>03</b> <code>| stats count latest(name) as name latest(_time) as _time by identifier, customer_index</code><br> - Aggregate repeated downloads per identifier to detect duplication patterns.<br><b>04</b> <code>| stats count(eval(count&gt;1)) as duplicate_downloads ... by customer_index</code><br> - Quantify duplicate and excessive duplicate download frequency per index.<br><b>05</b> <code>| eval duplicate_percent=... | eval severity_level = case (...)</code><br> - Calculate duplication ratio and assign KPI severity thresholds.<br><b>06</b> <code>| table _time customer_index ... severity_level</code><br> - Output a concise operational summary for review and remediation.</br>
solution = <p>This search highlights cache instability patterns that may impact performance, storage efficiency, and overall Splunk responsiveness.</p><p><b>Suggested Actions</b><ul><li>Validate cache directory health and confirm filesystem stability.</li><li>Review SmartStore or remote storage configuration for latency or connectivity issues.</li><li>Investigate excessive duplicate downloads to determine if cache eviction or sizing adjustments are required.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Correlate cache performance anomalies with broader service health KPIs.</li><li><a href="https://www.splunk.com/en_us/products/observability.html" target="_blank">Products: Splunk Observability Cloud</a><br>Extend infrastructure-level visibility to detect storage and I/O instability.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Engage experts to optimize cache configuration and performance tuning.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=cache%20performance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore additional apps focused on cache monitoring and performance optimization.</li></ul></p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Performance/Improving-Splunk-Performance/td-p/471287" target="_blank">Splunk Answers - Improving Splunk Performance</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Indexer/ConfigureSmartStorecachemanager" target="_blank">Configure Smart Store Cache Manager</a></li><li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Searching_and_Reporting/Reducing_Smartstore_cache_churn_with_smart_Workload_Management_rules" target="_blank">SmartStore Cache Churn</a></li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=CacheManager" target="_blank">Splunk Docs: SplunkSearch for CacheManager</a><br>(provisionally validated) Documentation references related to cache management behavior.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=splunkd.log" target="_blank">Splunk Docs: SplunkSearch for splunkd.log</a><br>(provisionally validated) Learn about internal logging components and troubleshooting techniques.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=_internal%20logs" target="_blank">Splunk Docs: SplunkSearch for _internal logs</a><br>(provisionally validated) Reference internal logging data and diagnostic patterns.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=SmartStore%20caching" target="_blank">Splunk Docs: SplunkSearch for SmartStore caching</a><br>(provisionally validated) Explore SmartStore cache design and optimization guidance.</li><li><a href="https://help.splunk.com/en/search?q=%22performance%20troubleshooting%22" target="_blank">Splunk Help: Search for "performance troubleshooting"</a><br>(provisionally validated) Help site search for performance analysis best practices.</li><li><a href="https://lantern.splunk.com/Search?q=%22storage%20optimization%22" target="_blank">Lantern: Search for "storage optimization"</a><br>(provisionally validated) Operational best practices for storage and performance optimization.</li></ul>
viz_options = { "count":100 }
search = index=_internal source=*splunkd.log CacheManager AND TERM(action=download) AND TERM(status=succeeded) AND download_set="*journal*" \
| eval summary_id="ssef_ia4s_environment_cache_thrash" \
| rex field=cache_id ".*\|(?<customer_index>.*)~.*~.*\|" \
| eval identifier=(cache_id + host) \
| stats count latest(name) as name latest(_time) as _time by identifier, customer_index \
| stats count(eval(count>1)) as duplicate_downloads, sum(count) as all_downloads count(eval(count>=10)) as excessive_duplicate_downloads latest(_time) as _time by customer_index \
| eval duplicate_percent=if(all_downloads=0, 0, round((duplicate_downloads/all_downloads)*100, 2)) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( excessive_duplicate_downloads >= 10, high, excessive_duplicate_downloads >= 5, medium, excessive_duplicate_downloads > 0, low, true(), normal ) \
| table _time customer_index duplicate_percent all_downloads duplicate_downloads excessive_duplicate_downloads severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_environment_cache_thrash summary job completed successfully without identifying any issues, and everything is operating as expected.")`

[ssef_ia4s_environment_cache_thrash_post]
search_name = Cache Thrashing Detected Details
readonly = 1
diagnostic_searches = ssef_ia4s_environment_cache_thrash
version = 2.0.2
date_updated = 2024-4-8 15:15:9
category = Splunk
sub_category = Storage
tags = Cache,Performance,_Internal,Details
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 97E1F6E98A98EE21E133EACBBC601EA9
updated_author = akhamis
description = <p>Detects <b>CacheManager journal download thrashing</b> events within <b>splunkd.log</b> to identify repeated cache fetches for the same customer index. It measures duplicate and excessive downloads to surface potential cache inefficiencies. This helps platform teams proactively address performance degradation and storage churn.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> > 10 duplicate downloads / cache misses.</li>\
<li><strong>Medium:</strong> >= 10  <=20 duplicate downloads / cache misses.</li>\
<li><strong>Low:</strong> >= 5  < 10 duplicate downloads / cache misses.</li>\
<li><strong>Normal:</strong> No cache thrashing detected.</li>\
</ul>
explanation = <p>Cache thrashing can significantly degrade Splunk performance by repeatedly downloading journal data that should already exist in cache. When duplicate downloads increase, it often indicates misconfigured storage paths, insufficient cache retention, or unstable filesystem behavior. This search quantifies duplicate and excessive duplicate downloads per customer index so administrators can pinpoint where cache instability may be impacting search performance or indexing throughput. By monitoring duplicate_percent and severity thresholds, infrastructure and platform teams can prevent unnecessary disk I/O, reduce compute strain, and maintain predictable system behavior.</p>
execution_plan = <b>01</b> <code>index=_internal source=*splunkd.log CacheManager AND TERM(action=download) AND TERM(status=succeeded) AND download_set="*journal*"</code><br> - Identify successful CacheManager journal download events in internal logs.<br><b>02</b> <code>| rex field=cache_id ".*\|(?&lt;customer_index&gt;.*)~.*~.*\|"</code><br> - Extract the associated customer index from the cache identifier.<br><b>03</b> <code>| stats count latest(name) as name latest(_time) as _time by identifier, customer_index</code><br> - Aggregate repeated downloads per identifier to detect duplication patterns.<br><b>04</b> <code>| stats count(eval(count&gt;1)) as duplicate_downloads ... by customer_index</code><br> - Quantify duplicate and excessive duplicate download frequency per index.<br><b>05</b> <code>| eval duplicate_percent=... | eval severity_level = case (...)</code><br> - Calculate duplication ratio and assign KPI severity thresholds.<br><b>06</b> <code>| table _time customer_index ... severity_level</code><br> - Output a concise operational summary for review and remediation.</br>
solution = <p>This search highlights cache instability patterns that may impact performance, storage efficiency, and overall Splunk responsiveness.</p><p><b>Suggested Actions</b><ul><li>Validate cache directory health and confirm filesystem stability.</li><li>Review SmartStore or remote storage configuration for latency or connectivity issues.</li><li>Investigate excessive duplicate downloads to determine if cache eviction or sizing adjustments are required.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Correlate cache performance anomalies with broader service health KPIs.</li><li><a href="https://www.splunk.com/en_us/products/observability.html" target="_blank">Products: Splunk Observability Cloud</a><br>Extend infrastructure-level visibility to detect storage and I/O instability.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Engage experts to optimize cache configuration and performance tuning.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=cache%20performance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore additional apps focused on cache monitoring and performance optimization.</li></ul></p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Performance/Improving-Splunk-Performance/td-p/471287" target="_blank">Splunk Answers - Improving Splunk Performance</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Indexer/ConfigureSmartStorecachemanager" target="_blank">Configure Smart Store Cache Manager</a></li><li><a href="https://lantern.splunk.com/Splunk_Platform/Product_Tips/Searching_and_Reporting/Reducing_Smartstore_cache_churn_with_smart_Workload_Management_rules" target="_blank">SmartStore Cache Churn</a></li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=CacheManager" target="_blank">Splunk Docs: SplunkSearch for CacheManager</a><br>(provisionally validated) Documentation references related to cache management behavior.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=splunkd.log" target="_blank">Splunk Docs: SplunkSearch for splunkd.log</a><br>(provisionally validated) Learn about internal logging components and troubleshooting techniques.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=_internal%20logs" target="_blank">Splunk Docs: SplunkSearch for _internal logs</a><br>(provisionally validated) Reference internal logging data and diagnostic patterns.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=SmartStore%20caching" target="_blank">Splunk Docs: SplunkSearch for SmartStore caching</a><br>(provisionally validated) Explore SmartStore cache design and optimization guidance.</li><li><a href="https://help.splunk.com/en/search?q=%22performance%20troubleshooting%22" target="_blank">Splunk Help: Search for "performance troubleshooting"</a><br>(provisionally validated) Help site search for performance analysis best practices.</li><li><a href="https://lantern.splunk.com/Search?q=%22storage%20optimization%22" target="_blank">Lantern: Search for "storage optimization"</a><br>(provisionally validated) Operational best practices for storage and performance optimization.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_ia4s_environment_cache_thrash)` \
| fields _time customer_index duplicate_percent all_downloads duplicate_downloads excessive_duplicate_downloads severity_level \
| rename customer_index as Index, duplicate_percent as "Repeated Download Percent", all_downloads as "All Downloads", duplicate_downloads as "Repeated Downloads", excessive_duplicate_downloads as "Excessively Repeated Downloads" \
| stats latest(*) as * latest(_time) as _time by customer_index \
| sort - severity_level \
| `ssef_severity_level_text(severity_level)` \
| appendpipe \
    [ stats count \
    | where count=0 \
    | fields - count \
    | eval customer_index="No Cache Thrashing Was Detected" ] \
| fillnull value="Normal" severity_text \
| table customer_index duplicate_percent all_downloads duplicate_downloads excessive_duplicate_downloads severity_text \
| rename severity_text as Severity

[ssef_ia4s_environment_excessive_memory_usage]
search_name = Excessive Memory Usage
readonly = 1
target_component = Infra & Arch
version = 2.0
date_updated = 2026-2-9 13:44:4
category = Splunk
sub_category = Performance
tags = Memory,Performance,Details
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = E49458383B40E685CCDC976EF4CFA374
updated_author = khutchinson
severity_normal_text = <br/><p>Memory usage below 90%, suggesting healthy system operation with adequate resource utilization.</p>
severity_high_text = <br/><p>Instances with memory usage exceeding 90% have been identified, indicating excessive consumption that could impact system performance and stability. Immediate investigation and action are recommended to identify and mitigate the cause of high memory usage, such as optimizing applications, increasing physical memory, or redistributing workloads.</p>
description = <p>Monitors <b>host-wide memory utilization</b> using <b>_introspection</b> resource metrics. It calculates overall memory consumption percentage and flags excessive usage conditions. This enables early detection of memory pressure that could impact search performance, indexing throughput, or service stability.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> > 90% memory utilized.</li>\
<li><strong>Normal:</strong> < 90% memory utilized.</li>\
</ul>
explanation = <p>High memory utilization can directly impact Splunk stability, especially on indexers and search heads where concurrent workloads compete for system resources. Sustained memory pressure increases the risk of search slowdowns, skipped scheduled searches, process restarts, or operating system swapping. This search aggregates host-wide memory usage to provide a simplified operational indicator that platform engineers and infrastructure teams can monitor daily. By identifying hosts exceeding the defined threshold, organizations can proactively adjust workload distribution, optimize search concurrency, or scale compute resources to maintain predictable performance.</p>
execution_plan = <b>01</b> <code>| tstats summariesonly=true count max(data.mem_used) as mem_used max(data.mem) as mem latest(_time) as _time WHERE index=_introspection sourcetype=splunk_resource_usage component=Hostwide `ssef_host_excl` by host</code><br> - Retrieve host-wide memory metrics from introspection summaries while excluding defined hosts.<br><b>02</b> <code>| eval summary_id="ssef_ia4s_environment_excessive_memory_usage" | rename data.* as *</code><br> - Assign a stable summary identifier and normalize field names for reporting clarity.<br><b>03</b> <code>| `ssef_instance_info(host)`</code><br> - Enrich results with instance metadata to align hosts with platform roles and labels.<br><b>04</b> <code>| stats max(mem_used) as mem_used max(mem) as mem latest(_time) as _time by label</code><br> - Aggregate memory statistics by logical instance grouping for actionable visibility.<br><b>05</b> <code>| eval percentage=round(mem_used/mem,3)*100 | eval severity_level = case ( percentage &gt;= 90, high, true(), normal )</code><br> - Calculate utilization percentage and apply KPI-based severity classification.<br><b>06</b> <code>| table _time label mem_used mem percentage severity_level</code><br> - Present a concise operational summary for rapid triage.</br>
solution = <p>This search identifies hosts experiencing sustained high memory utilization so teams can act before system stability is impacted.</p><p><b>Suggested Actions</b><ul><li>Review concurrent search limits and workload distribution across search heads and indexers.</li><li>Validate operating system swap activity and confirm memory reservations align with deployment sizing guidance.</li><li>If thresholds are repeatedly exceeded, plan vertical scaling (RAM increase) or horizontal scaling to maintain performance headroom.</li></ul></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Correlate infrastructure memory pressure with service-level KPIs for proactive remediation.</li><li><a href="https://www.splunk.com/en_us/products/observability.html" target="_blank">Products: Splunk Observability Cloud</a><br>Extend infrastructure monitoring to capture deeper system-level telemetry and trends.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Engage experts to review capacity planning and performance optimization strategies.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=memory%20monitoring" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover additional apps for memory monitoring and infrastructure performance analytics.</li></ul></p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Performance/High-Memory-Usage-After-Upgrading-Splunk/m-p/483732" target="_blank">Splunk Answers - Memory Usage and Performance Optimization</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Troubleshooting/Troubleshootmemoryusage" target="_blank">Troubleshoot high memory usage</a></li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=_introspection" target="_blank">Splunk Docs: SplunkSearch for _introspection</a><br>(provisionally validated) Reference documentation for introspection resource metrics.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=splunk_resource_usage" target="_blank">Splunk Docs: SplunkSearch for splunk_resource_usage</a><br>(provisionally validated) Explore resource usage metrics and monitoring details.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=tstats" target="_blank">Splunk Docs: SplunkSearch for tstats</a><br>(provisionally validated) Learn about efficient summary-based searches.</li><li><a href="https://help.splunk.com/en/search?q=%22memory%20usage%22" target="_blank">Splunk Help: Search for "memory usage"</a><br>(provisionally validated) Help content related to monitoring and troubleshooting memory pressure.</li><li><a href="https://lantern.splunk.com/Search?q=%22capacity%20planning%22" target="_blank">Lantern: Search for "capacity planning"</a><br>(provisionally validated) Practical operational guidance for scaling and performance tuning.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=performance%20tuning" target="_blank">Splunk Docs: SplunkSearch for performance tuning</a><br>(provisionally validated) Documentation references for optimizing Splunk system performance.</li></ul>
viz_options = { "count":100 }
search = | tstats summariesonly=true count max(data.mem_used) as mem_used max(data.mem) as mem latest(_time) as _time WHERE index=_introspection sourcetype=splunk_resource_usage component=Hostwide `ssef_host_excl` by host \
| eval summary_id="ssef_ia4s_environment_excessive_memory_usage" \
| rename data.* as * \
| `ssef_instance_info(host)` \
| stats max(mem_used) as mem_used max(mem) as mem latest(_time) as _time by label \
| eval percentage=round(mem_used/mem,3)*100 \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( percentage >= 90, high, true(), normal ) \
| table _time label mem_used mem percentage severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_environment_excessive_memory_usage summary job completed successfully without identifying any issues, and everything is operating as expected.")`

