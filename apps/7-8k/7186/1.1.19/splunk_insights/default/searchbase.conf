quid = 23A24819D669205DDEF8AC93D87A8388
updated_author = akhamis
description = <p>Correlates <b>index storage growth</b> with <b>user search activity</b> to identify high-volume indexes and their relative usage. It highlights the top storage consumers and compares them to search demand percentages. This enables data-driven storage optimization and retention decisions.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
explanation = <p>This search provides a strategic view of storage consumption compared to actual search utilization across indexes. By identifying the largest indexes and correlating them with the percentage of total search activity, administrators can determine whether storage allocation aligns with business value. Indexes consuming significant space but generating minimal search activity may indicate opportunities for retention tuning, archival, or cost optimization. Conversely, heavily searched indexes justify higher storage investment and performance optimization. This analysis supports capacity forecasting, data lifecycle governance, and workload alignment across Splunk environments.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_data_indexes)` isInternal=0</code><br> - Retrieve summarized index storage metrics excluding internal indexes.<br><b>02</b> <code>| stats sum(currentDBSizeMB) by _time title</code><br> - Aggregate daily index storage size to identify top storage consumers.<br><b>03</b> <code>| eval currentDBSizeTB = round(currentDBSizeMB/1024/1024, 3)</code><br> - Convert storage metrics into terabytes for executive readability.<br><b>04</b> <code>| join ... `ssef_summary(ssef_audit_user_login_tracker)`</code><br> - Correlate index storage data with summarized search activity metrics.<br><b>05</b> <code>| eval perc_search = (num_searches / total_searches) * 100</code><br> - Calculate relative search demand percentage per index.<br><b>06</b> <code>| table _time inde_name currentDBSizeTB num_searches perc_search</code><br> - Present combined storage and search demand metrics for governance review.<br>
solution = <p>This search enables strategic alignment between storage investment and actual search utilization.</p><p><b>Suggested Actions</b><ul><li>Review large indexes with low search percentages for potential retention reduction or archival.</li><li>Validate that high-demand indexes have appropriate performance and storage allocation.</li><li>Incorporate these findings into quarterly capacity planning and cost governance discussions.</li></ul></p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/services/security-and-compliance-services.html" target="_blank">Services: Splunk Security & Compliance Services</a><br>Engage specialists to formalize governance controls, validation workflows, and compliance alignment for Splunk applications.</li><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Develop internal expertise in application lifecycle management, AppInspect validation, and secure deployment practices.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Leverage managed validation and compliance controls when standardizing application governance at scale.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=app%20governance" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore additional applications that enhance app inventory management, compliance tracking, and lifecycle governance.</li></ul></p>
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=index%20capacity%20planning" target="_blank">Splunk Docs: SplunkSearch for index capacity planning</a><br>(provisionally validated) Documentation related to storage forecasting and sizing.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=data%20retention%20policy" target="_blank">Splunk Docs: SplunkSearch for data retention policy</a><br>(provisionally validated) Explore lifecycle and retention configuration guidance.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=tstats" target="_blank">Splunk Docs: SplunkSearch for tstats</a><br>(provisionally validated) Learn about efficient summary-based index analysis.</li><li><a href="https://help.splunk.com/en/search?q=%22index%20usage%22" target="_blank">Splunk Help: Search for "index usage"</a><br>(provisionally validated) Help content for analyzing index utilization.</li><li><a href="https://lantern.splunk.com/Search?q=%22cost%20optimization%22" target="_blank">Lantern: Search for "cost optimization"</a><br>(provisionally validated) Practical guidance for managing data growth and cost efficiency.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=storage%20governance" target="_blank">Splunk Docs: SplunkSearch for storage governance</a><br>(provisionally validated) Documentation references for managing storage lifecycle policies.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_data_indexes)` isInternal=0 \
| fields _time label name title currentDBSizeMB \
| bin _time span=1d \
| stats latest(currentDBSizeMB) as currentDBSizeMB LATEST(name) AS name by _time, label, title \
| stats sum(currentDBSizeMB) As "currentDBSizeMB" by _time title \
| sort - currentDBSizeMB \
| eval currentDBSizeTB = round(currentDBSizeMB/1024/1024, 3) \
| rename title as inde_name \
| head 10\
| fields _time, inde_name, currentDBSizeTB \
| join _time, inde_name type=left \
    [ search `ssef_summary(ssef_audit_user_login_tracker)` index_reference=* \
    | eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
    | fields _time user app label name num_logins num_searches latest_logon latest_search total_search_time num_sessions search_type role index_reference sourcetype_reference datamodel_reference \
    | foreach name role search_type index_reference sourcetype_reference datamodel_reference \
        [| eval <<FIELD>>=split(<<FIELD>>,"|") ] \
    | where NOT match(index_reference,"\*") \
    | bin _time span=1h \
    | stats values(index_reference) as index_reference latest(num_searches) as num_searches by _time label app user \
    | bin _time span=1d \
    | stats sum(num_searches) as num_searches by _time index_reference \
    | eventstats sum(num_searches) as total_searches by _time \
    | eval perc_search = (num_searches / total_searches) * 100 \
    | rename index_reference as inde_name \
    | fields _time, inde_name, num_searches, perc_search ] \
| fillnull value=0 num_searches, perc_search \
| table _time inde_name currentDBSizeTB num_searches perc_search

