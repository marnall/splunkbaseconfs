[ssef_scma_precheck_unconfigured_rogue_search_instances]
search_name = Unconfigured Rogue Search Head instances
readonly = 1
target_component = Infra & Arch
version = 1.0.1
date_created = 2022-09-14
date_updated = 2024-4-9 9:28:22
category = Splunk
sub_category = Environment
tags = Environment,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = 6C7B16C644A120713525EC7C03874EDF
updated_author = akhamis
related_info = <div class="diag-content-box">\
 <div class="diag-content">\
 <li><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/9.2.0/Indexer/Configurethesearchhead " target="_blank">Configuring search heads.</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></li>\
 <li><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/9.2.0/Indexer/Configuresearchheadwithserverconf" target="_blank">Configure the search head with server.conf</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></li>\
 </div>\
 </div>
severity_normal_text = <br/><p>Upon scanning your environment we could find no rogue search head instances (misconfigured) or the number of misconfigured search heads was too low as to suggest impacts to performance.</p>
severity_high_text = <br/><p>We have identified an instance of a rogue search head(s), please review configuration to identify instance role.</p>
description = <p>This check reviews peer remote logs for rogue search heads that are not configured within the Monitoring Console to the desired role.</p>\
<p>Unconfigured Splunk instances introduce a monitoring visibility gap in the environment, and can result in incomplete environment assessment. These search head instances could be misconfigurations, special or forgotten integrations, or special purpose "heavy forwarders".</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>High:</strong> If the search head is not registered as connected and the number of active searches is greater than 0 there is a misconfiguration.</li>\
<li><strong>Normal:</strong> Search head is registered.</li>\
</ul>
search = | inputlookup ssef_splunk_instance_info_lookup \
| eval summary_id="ssef_scma_precheck_unconfigured_rogue_search_instances" \
| rename num_searches as avg_active_searches \
| eval message="This instance was not configured under Settings -> Distributed search -> Search peers!" \
| makemv delim="," role \
| eval role=mvjoin(role,":") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( is_connected="no" AND avg_active_searches > 0, high, true(), normal ) \
| table label name message avg_active_searches severity_level role is_connected is_search_head \
| `ssef_handle_no_results(1,"The ssef_scma_precheck_unconfigured_rogue_search_instances summary job completed successfully without identifying any issues, and everything is operating as expected.")`

