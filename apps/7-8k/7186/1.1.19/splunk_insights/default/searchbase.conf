quid = B16DFAF521BEC27852C4025B6DF59EB8
updated_author = akhamis
related_info = <div class="diag-content-box">\
 <div class="diag-content"> <a class="doc-drilldown" href="https://docs.splunk.com/Documentation/SplunkCloud/9.0.2208/Service/SplunkCloudservice#Data_policies" target="_blank">https://docs.splunk.com/Documentation/SplunkCloud/9.0.2208/Service/SplunkCloudservice#Data_policies</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div>\
 </div>
severity_normal_text = <br/><p>This instance qualifies for Splunk Cloud Workload pricing.</p>
severity_critical_text = <br/><p>The instance does not qualify for Splunk Cloud Workload pricing.</p>
description = <p>Checks current search activity and future ingest volume to determine candidacy for Splunk Cloud Workload Pricing.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = index=_audit search_id!="'rsa_*" search_id!="'RemoteStorageRetrieveBuckets_*" search_id!="'searchparsetmp_*" search_id!="'remote_*" search_id=* total_run_time \
| eval summary_id="ssef_scma_search_svc_qualification_check" \
| eval host_sid = 'host'.":".'search_id' \
| bin _time span=1d \
| stats dc(host_sid) AS search_count by _time host \
| `ssef_instance_info(host)` \
| eval label = case(match(name, "^es"), "es", match(name, "^itsi"), "itsi", true(), "core") \
| stats sum(search_count) as search_count by _time label \
| stats avg(search_count) AS search_count_daily_avg by label \
| eventstats Sum(search_count_daily_avg) as search_count_daily_avg_entire_env \
| eval search_count_daily_avg = round(search_count_daily_avg,0) , search_count_daily_avg_entire_env = round(search_count_daily_avg_entire_env,0) \
| eval is_premium=case(license_es>0 OR license_pci>0 OR license_itsi>0,"yes", license_core>0,"no") \
| eval svc_recommendation=case(license_core < 200,"Does not qualify at this data volume", license_core >= 200 AND license_core < 100000,"Approved", license_core >= 100000,"Seek Deal Desk for approval for this volume") \
| eval workload_factor=case(search_count_daily_avg <= 1000,"20", search_count_daily_avg > 1000 AND search_count_daily_avg <= 10000,"25", search_count_daily_avg > 10000 AND search_count_daily_avg <= 50000,"35", search_count_daily_avg > 50000 AND search_count_daily_avg <= 100000,"45", search_count_daily_avg > 100000 AND search_count_daily_avg <= 200000,"55", search_count_daily_avg > 200000 AND search_count_daily_avg <= 300000,"65", search_count_daily_avg > 300000 AND search_count_daily_avg <= 500000,"75", search_count_daily_avg > 500000 AND search_count_daily_avg <= 1000000,"90", search_count_daily_avg > 1000000,"100") \
| eval workload_factor_entire_env=case(search_count_daily_avg_entire_env <= 1000,"20", search_count_daily_avg_entire_env > 1000 AND search_count_daily_avg_entire_env <= 10000,"25", search_count_daily_avg_entire_env > 10000 AND search_count_daily_avg_entire_env <= 50000,"35", search_count_daily_avg_entire_env > 50000 AND search_count_daily_avg_entire_env <= 100000,"45", search_count_daily_avg_entire_env > 100000 AND search_count_daily_avg_entire_env <= 200000,"55", search_count_daily_avg_entire_env > 200000 AND search_count_daily_avg_entire_env <= 300000,"65", search_count_daily_avg_entire_env > 300000 AND search_count_daily_avg_entire_env <= 500000,"75", search_count_daily_avg_entire_env > 500000 AND search_count_daily_avg_entire_env <= 1000000,"90", search_count_daily_avg_entire_env > 1000000,"100") \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( svc_recommendation=="Does not qualify at this data volume", critical,svc_recommendation=="Seek Deal Desk for approval for this volume", normal, svc_recommendation=="Approved", normal, true(), normal ) \
| rename search_count_daily_avg as search_count_daily_avg_premium, workload_factor as workload_factor_premium, search_count_daily_avg_entire_env as search_count_daily_avg, workload_factor_entire_env as workload_factor \
| table label search_count_daily_avg workload_factor search_count_daily_avg_premium workload_factor_premium svc_recommendation is_premium license_core license_es license_itsi license_model license_pci severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_search_svc_qualification_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

