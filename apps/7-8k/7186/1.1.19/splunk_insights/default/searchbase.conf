severity_normal_text = <br/><p>Each premium app meets the requirement of comprising at least 20% of the base core Splunk volume. Everything is aligned with the recommended guidelines.</p>
severity_low_text = <br/><p>One or more premium apps do not meet the requirement of comprising at least 20% of the base core Splunk volume. Please work with your account team to adjust the ratios for optimal alignment with your use cases.</p>
severity_medium_text = <br/><p>Each premium app must be at least 20 percent of the base core Splunk volume. Work with your account team to determine the ratio that is a proper fit for your use cases.</p>
severity_high_text = <br/><p>One or more premium apps do not meet the requirement of comprising at least 20% of the base core Splunk volume. Please work with your account team to adjust the ratios for optimal alignment with your use cases.</p>
description = <p>Each premium app must be at least 20 percent of the base core Splunk volume. Work with your account team to determine the ratio that is a proper fit for your use cases.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = index=_internal sourcetype=splunkd component=LicenseUsage type=RolloverSummary stack=enterprise \
| eval summary_id="ssef_scma_licensing_premium_app_balanced" \
| fields _time stack stacksz \
| stats latest(*) as * by stack \
| eval license_core=round(stacksz/1024/1024/1024) \
| fields license_core \
| eval balanced_license_es = case ( license_es = 0, "N/A:" . license_es, license_es / license_core * 100 < 20, "No, seek Deal Desk approval for unbalanced Premium apps below 20% capacity:" . license_core, license_es > license_core, "Premium license larger than Core license:" . license_es / license_core * 100, true(), "OK:" . license_es / license_core * 100) \
| eval balanced_license_pci = case ( license_pci = 0, "N/A:" . license_pci, license_pci / license_core * 100 < 20, "No, seek Deal Desk approval for unbalanced Premium apps below 20% capacity:" . license_core, license_pci > license_core, "Premium license larger than Core license:" . license_pci / license_core * 100, true(), "OK:" . license_pci / license_core *100) \
| eval balanced_license_itsi = case ( license_itsi = 0, "N/A:" . license_itsi, license_itsi / license_core * 100 < 20, "No, seek Deal Desk approval for unbalanced Premium apps below 20% capacity:" . license_core, license_itsi > license_core, "Premium license larger than Core license:" . license_itsi / license_core * 100, true(), "OK:" . license_itsi / license_core *100) \
| rex field=message mode=sed "s/:\d+//g" \
| `ssef_cloud_limits(licensing_premium_app_balanced)` \
| eval limit=limit_classic \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( message=="N/A", normal, message=="No, seek Deal Desk approval for unbalanced Premium apps below 20% capacity", medium, message=="OK", normal,message=="Premium license larger than Core license", high, true(), normal) \
| table balanced_check value limit severity_level message \
| `ssef_handle_no_results(1,"The ssef_scma_licensing_premium_app_balanced summary job completed successfully without identifying any issues, and everything is operating as expected.")`

