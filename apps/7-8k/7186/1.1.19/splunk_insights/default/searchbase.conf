explanation = <p>This Details search consumes the Search Concurrency Stats summary and trends the maximum daily active historical searches by instance label. By aggregating via timechart and summing across labels, it exposes both per-tier peak behavior and total environment concurrency pressure. The addtotals step produces an overall concurrency indicator that reflects aggregate burst demand across the search-head tier. Use this view to identify sustained peak growth patterns, uneven distribution across labels, and potential saturation risks that require workload redistribution or scaling.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_scma_search_search_concurrency_stats)`</code><br> - Retrieve summarized per-instance concurrency statistics.<br><b>02</b> <code>| fields ...</code><br> - Select relevant label and concurrency peak fields.<br><b>03</b> <code>| timechart span=1d max(active_hist_searches_max) by label</code><br> - Trend daily peak concurrency per label.<br><b>04</b> <code>| addtotals fieldname=total_concurrency</code><br> - Calculate total environment concurrency to expose aggregate burst pressure.
solution = <p>This weekly-scale concurrency view highlights sustained peak demand and total burst pressure across the search tier.</p><p><b>Suggested Actions</b>: If total_concurrency trends upward or specific labels consistently dominate peaks, evaluate search scheduling density, optimize inefficient searches, validate workload management policies, and assess search-head capacity alignment.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(total_concurrency&gt;=800,5,total_concurrency&gt;=600,4,total_concurrency&gt;=400,3,total_concurrency&gt;=200,2,true(),1)</code></pre><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Scaling and managed compute capacity options when sustained concurrency growth impacts search-tier performance.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunk Apps: Utility Apps</a><br>Administration and troubleshooting apps supporting workload governance and search performance analysis.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=historical%20search%20concurrency" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps related to search workload optimization and concurrency visibility.</li></ul></p>
related_info = <ul><li><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Report/Skewscheduledreportstarttimes" target="_blank">Skewed Schedule Report Times </a></i></li><li><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Report/PrioritizescheduledreportsinSplunkWeb" target="_blank">Prioritized Reports </a> </i></li><li><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Service_limits_and_constraints" target="_blank">https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Service_limits_and_constraints</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.2/quick-reference/command-quick-reference" target="_blank">Splunk Help: SPL Command Quick Reference</a><br>Reference for timechart and aggregation commands used in concurrency trending.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Search Reference</a><br>Core SPL documentation supporting summary-based KPI maintenance.</li><li><a href="https://www.splunk.com/en_us/training/free-courses/overview.html" target="_blank">Education: Splunk Free Courses</a><br>Free SPL and performance optimization training resources.</li><li><a href="https://classic.splunkbase.splunk.com/category/it_operations_management/" target="_blank">Splunk Apps: IT Operations Management Apps</a><br>Operations apps that complement search concurrency and capacity monitoring.</li></ul>
viz_options = { "stackMode": "stacked", "nullValueDisplay": "connect", "overlayFields": [ "total_concurrency" ], "xAxisTitleVisibility": "hide", "yAxisTitleVisibility": "hide", "legendDisplay": "off" }
