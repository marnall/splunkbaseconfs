[SVC License Utilization]
search_name = SVC License Utilization
readonly = 1
version = 1.0.3
date_updated = 2025-7-30 14:2:17
category = Splunk
sub_category = Licensing
tags = IS4S,KPIs,Licensing,SVC
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = CF62F3CA8CD8B0F288B0413023406D77
updated_author = akhamis
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>License utilization percentage based on the "SVC" licensing model in Splunk Cloud. This metric represents the percentage (%) of SVC used out of the customers actual entitlement (what the customer owns).<br><br></p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>It serves as a crucial indicator of how effectively users are leveraging the Splunk Cloud platform. Efficient license utilization reflects strategic resource management, alignment with business goals, and proactive scalability and cost management. Regular monitoring and optimization of this metric are essential to maximize the value derived from Splunk investments. <br><br></p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>Tracking this KPI <em>weekly</em>, <em>monthly</em>, <em>quarterly</em>, and <em>yearly</em> is recommended.</p>
default_viz = splunk.singlevalue
search = `ssef_cloud_summary` source=splunk-svc \
| bin _time span=1h \
| stats max(utilized_svc) as utilized_svc max(stack_license_svc) as stack_license_svc by _time, role, indexer_type \
| stats sum(utilized_svc) as utilized_svc latest(stack_license_svc) as stack_license_svc by _time \
| eval perc_usage = (utilized_svc / stack_license_svc) * 100 \
| timechart partial=t fixedrange=t eval(round(max(perc_usage),2)) as "License Utilization" span=1d

