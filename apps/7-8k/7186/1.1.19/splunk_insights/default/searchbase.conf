description = <p><span style="font-size: 12px;"><strong>Definition</strong></span></p>\
<p>This metric quantifies the number of Splunk alerts generated within the selected time frame.</p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span></p>\
<p>Splunk alerts are specifically defined as alerts created from data sources internal to Splunk, pertaining to its operational performance. These internal alerts serve as early indicators of potential issues that could threaten the platform's adoption and value. They highlight operational challenges that may affect user experience, adoption rates, and confidence in the platform's reliability and performance. Each of these factors directly impacts the value Splunk provides to the organization. Prompt and effective resolution of these alerts is crucial for maintaining user trust and ensuring the continued value and effectiveness of Splunk.</p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span></p>\
<p>It is recommended to track this KPI <em>weekly</em>, <em>monthly</em>, and <em>quarterly</em> for effective oversight and management of the alerting system.</p>
default_viz = splunk.singlevalue
search = index=_internal sourcetype="scheduler" thread_id="AlertNotifier*" alert_actions IN ("","summary_index","lookup","populate_lookup","outputtelemetry","itsi_import_objects","itsi_summary_metrics_collect","indicator") NOT app IN (`ssef_default_apps`) \
| fields _time host app thread_id alert_actions user savedsearch_id sid \
| timechart partial=t fixedrange=t dc(sid) as "# of Splunk Alerts Fired" span=1d

