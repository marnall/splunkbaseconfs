 <div class="diag-content"><a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/TypesofSplunklicenses" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/Admin/TypesofSplunklicenses</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div>\
 </div>
severity_normal_text = <br/><p>Hourly data ingestion is normal and as expected.</p>
severity_medium_text = <br/><p>Hourly data ingestion appears to be significantly lower than expected, which may signal problems with the data intake process. Please verify and ensure that data is being correctly ingested.</p>
description = <p>This representation details the average daily profile of a customer's indexed volume over the past 7 days. It serves to simulate historical data ingestion patterns and aids in assessing the bandwidth needed to accommodate peaks in data intake.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = index=_internal source=*license_usage.log TERM(Usage) \
| eval summary_id="ssef_scma_licensing_hourly_average_ingestion" \
| bin _time span=1h \
| eval day=strftime(_time,"%d"), hour=strftime(_time,"%H") \
| stats sum(b) AS total_b_hour by _time day hour \
| stats avg(total_b_hour) AS avg_b by hour \
| eventstats sum(avg_b) AS total_b \
| eval pct_used=round((avg_b/total_b),4) , avg_b=ceiling(avg_b), total_b=ceiling(total_b) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( avg_b < 1024, medium, true(), normal ) \
| table hour pct_used avg_b total_b severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_licensing_hourly_average_ingestion summary job completed successfully without identifying any issues, and everything is operating as expected.")`

