category = Splunk
sub_category = Indexing
tags = Indexes,Indexing,REST,SCMA,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
env_run = 2
quid = A4863E9114952D1CAB11F51BA5D8FE0D
updated_author = akhamis
related_info = <div class="diag-content-box"><div class="diag-content"> <a class="doc-drilldown" href="https://docs.splunk.com/Documentation/Splunk/latest/Indexer/AboutSmartStore" target="_blank">https://docs.splunk.com/Documentation/Splunk/latest/Indexer/AboutSmartStore</a> <i class="icon-external icon-modal-xsmall icon-color-link"></i></div></div>
severity_normal_text = <br/><p>SmartStore is not currently deployed in your environment. Everything looks good.</p>
severity_medium_text = <br/><p>SmartStore is currently deployed in your environment. Please review its configuration to ensure it aligns with your operational requirements.</p>
description = <p>This search checks to determine if SmartStore is currently deployed in your environment. </p>\
 Additional time may be required to migrate the data if the environments are in different regions. If data encryption is being utilized, the migration process will need to decrypt, and if applicable, re-encrypt the data during the migration process Summary Job.\
 <p><strong>Severity Levels:</strong></p>\
<ul>\
<li><strong>Medium:</strong> TBD.</li>\
<li><strong>Normal:</strong> TBD.</li>\
</ul>
search = | rest splunk_server=* `ssef_rest_timeout` servicesNS/-/-/configs/conf-indexes search="storageType=remote" \
| eval summary_id="ssef_scma_indexing_smart_store_check" \
| rename title AS instance, remote.s3.encryption as remote_s3_encryption, remote.s3.endpoint as remote_s3_endpoint \
| `ssef_instance_info(splunk_server)` \
| stats dc(splunk_server) values(eai:acl.app) AS app, values(disabled), values(path), values(storageType), values(remote.s3.bucket_name), values(remote_s3_endpoint), values(remote_s3_encryption), values(remote.s3.list_objects_version), values(remote.s3.auth_region) values(name) as name values(label) as label by instance \
| rename values(*) AS * dc(*) AS dc_* \
| eval "remote_s3_encryption" = if(isnull(remote_s3_encryption) OR remote_s3_encryption="", "none", remote_s3_encryption) \
| eval message = "SmartStore was detected. The buckets are being encrypted with " . remote_s3_encryption . ". Data may need to be decrypted and re-encrypted during migration." \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( dc_splunk_server >= 1, medium, true(), normal ) \
| table label name app instance disabled storageType dc_splunk_server path remote_s3_encryption remote_s3_endpoint message severity_level \
| `ssef_handle_no_results(1,"The ssef_scma_indexing_smart_store_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

