[Adoption by Category]
search_name = Adoption by Category
readonly = 1
diagnostic_searches = ssef_audit_user_login_tracker
version = 2.0
date_updated = 2025-12-15 11:31:34
category = Splunk
sub_category = Adoption
tags = Adoption,Capabilities,KPIs
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 1B062C162BD1378A273FE133C6E8AA30
updated_author = akhamis
related_info = <ul>\
<li><a href="https://community.splunk.com/t5/Adoption-Boards/ct-p/adoption-boards" target="_blank">Adoption Boards</a></li>\
</ul>
description = <p>The search activity within Splunk is assigned to specific adoption categories over a selected time frame. An "Adoption Category" classifies users by their usage characteristics. More specifically categories are defined by terms defined in Splunk Lantern surrounding usage and use cases. Examples of category groupings in the current example include "Security Monitoring, Infrastructure Monitoring, Compliance, etc." This categorization highlights Splunks versatility and essential role across various groups, demonstrating its broad organizational acceptance. The widespread use of Splunk across diverse teams underscores its value in enhancing operational efficiency, improving collaboration, and contributing to overall organizational success.</p><p><strong>Recommended Time Period</strong></p><p>It is advisable to track this metric <em>monthly</em> and <em>quarterly</em> for effective performance and adoption analysis.</p>
default_viz = splunk.pie
search = `ssef_summary(ssef_audit_user_login_tracker)` \
| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
| fields _time user app label sourcetype_reference \
| bin _time span=1h \
| stats latest(*) as * by _time, label, app, user \
| rename sourcetype_reference as sourcetype_name \
| eval sourcetype_name=split(sourcetype_name,"|") \
| stats count by _time, user, sourcetype_name \
| where match(sourcetype_name, "^[^<>?&#]+$") AND NOT match(sourcetype_name, "[\"'`*]|-too_small|itsi_internal_log|itsi_notable|itsi_license_checker") \
| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype_name OUTPUT category \
| lookup uce_sourcetype_mapping sourcetype_name AS sourcetype_name OUTPUTNEW category \
| eval category=split(category,"|") \
| fillnull value="Unclassified" category \
| stats dc(user) as "Adoption by Category" by category

