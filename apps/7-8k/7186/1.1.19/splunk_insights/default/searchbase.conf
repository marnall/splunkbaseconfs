[mc_cipher_suite_mismatch_check]
search_name = TLS Cipher Suite Mismatches
readonly = 1
search_hidden = 1
ssef_cron = weekly
target_component = Upgrade Checks
version = 1.0.1
date_updated = 2025-8-18 14:42:4
category = Health Check
sub_category = Security
tags = Configuration,Health Check,Monitoring Console,SSL,Splunk 10,Summary,Upgrade
solution = Inspect the 'sslVersions' and 'cipherSuite' setting values in the server configuration stanza which corresponds to the channel that produces this error. Additionally, review the supported TLS protocol versions and ciphers for this channel as well as the TLS configuration on the client. Determine the highest mutually-shared TLS protocol version between the server and the client. Next, check that there is at least one mutually-shared cipher between the server and the client that is compatible with this version of TLS. If there is not, add at least one such cipher to the configurations of both the server and the client for the version of TLS that both mutually share.
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 4079765C7C71A99F90E9BE824604D317
updated_author = akhamis
severity_info_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_normal_text = <br/><p>The job ran successfully and produced the expected results.</p>
severity_medium_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because its configuration and the configuration of the connecting client did not contain any mutually shared ciphers for the TLS version that was used during the connection attempt.
severity_high_text = Within the last 60 minutes, this Splunk platform instance could not complete a TLS handshake because its configuration and the configuration of the connecting client did not contain any mutually shared ciphers for the TLS version that was used during the connection attempt.
description = Evaluates for the presence of any events which indicate a mismatch in the supported ciphers between the server and client in the last hour, and marks as Critical if any are present.
search = index=_internal source=*splunkd.log* "ssl3_get_client_hello:no shared cipher" earliest=-60m \
| eval summary_id="mc_cipher_suite_mismatch_check" \
| stats count AS sixty_min_event_count by host \
| eval alerts = mvjoin(alerts, ", ") \
| eval severity_level = 3 \
| table host, sixty_min_event_count, severity_level \
| rename host as instance \
| table instance, sixty_min_event_count, severity_level \
| append \
    [| makeresults count=1 splunk_server=* annotate=true \
    | rename splunk_server as instance \
    | fillnull value="0" severity_level sixty_min_event_count \
    | table instance sixty_min_event_count severity_level] \
| stats sum(sixty_min_event_count) as sixty_min_event_count sum(severity_level) as severity_level by instance \
| eval severity_level=if(severity_level=0, 1, severity_level) \
| `ssef_handle_no_results(1,"The mc_cipher_suite_mismatch_check summary job completed successfully without identifying any issues, and everything is operating as expected.")`

