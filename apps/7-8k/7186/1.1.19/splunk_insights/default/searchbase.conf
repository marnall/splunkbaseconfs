viz_options = {  "backgroundColor": "transparent", "seriesColors": ["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"], "showDonutHole": true, "labelDisplay": "valuesAndPercentage"  }
search = `ssef_summary(ssef_audit_user_login_tracker)` \
    [ search `ssef_summary(ssef_ia4s_users_account_modifications)` operation="create" \
    | stats count by dest_user \
    | rename dest_user as user \
    | fields user ] \
| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
| fields _time user app label sourcetype_reference \
| rename sourcetype_reference as sourcetype_name \
| eval sourcetype_name=split(sourcetype_name,"|") \
| stats count by _time, user, sourcetype_name \
| where match(sourcetype_name, "^[^<>?&#]+$") AND NOT match(sourcetype_name, "[\"'`*]|-too_small|itsi_internal_log|itsi_notable|itsi_license_checker") \
| `ssef_sourcetype_mapping(sourcetype_name)` \
| rename domain as sourcetype_domain \
| eval sourcetype_domain=split(sourcetype_domain,"|") \
| fillnull value="Unclassified" sourcetype_domain \
| `ssef_usecase_mapping(data_type)` \
| stats values(sourcetype_domain) as sourcetype_domain by _time, user, use_case \
| `ssef_usecase_mapping(use_case)` \
| rename domain as use_case_domain \
| fillnull value="Unclassified" use_case_domain \
| eval use_case_domain=mvdedup(use_case_domain) \
| eval domain = mvdedup(mvappend(use_case_domain, sourcetype_domain)) \
| fillnull value="Unclassified" domain \
| timechart partial=t fixedrange=t dc(user) as "New Users by Domain" by domain span=1d

[New Users Who Are Also Regularly Seen]
search_name = New Users Who Are Also Regularly Seen
readonly = 1
diagnostic_searches = ssef_ia4s_users_account_modifications
version = 1.0.5
date_created = 2024-10-15 15:54:3
date_updated = 2024-10-24 12:40:55
category = Splunk
sub_category = Users
tags = Adoption,Details,Users
solution = <p>This search provides a quality-focused view of new user adoption by measuring how many new accounts become regularly active.</p><p><b>Suggested Actions</b>: Investigate low regular-activity rates to improve onboarding, align training with early user behavior, and use the results to guide license planning and access governance.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Improve early user success and increase the likelihood that new accounts become regularly active.</li><li><a href="https://www.splunk.com/en_us/services.html" target="_blank">Services: Splunk Professional Services</a><br>Support adoption strategy, onboarding frameworks, and user lifecycle governance.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=user%20adoption" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore Splunk and Cisco apps that help track adoption quality, usage patterns, and user engagement.</li></ul></p>
dispatch_earliest_time = -7d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary()</code><br> - Uses IS4S summaries to identify user account creation events over time without scanning raw audit data.<br><b>02</b> <code>| stats / eventstats / eval</code><br> - Calculates activity consistency, identifies regularly active new users, and derives adoption-quality percentages.<br>
explanation = <p>Not all newly created users translate into meaningful platform adoption. This search helps platform owners, admins, and enablement teams understand whether onboarding efforts are resulting in sustained usage. By calculating the percentage of active days and identifying regularly active new users, the search provides a quality signal beyond simple account creation counts. These insights support better onboarding strategies, license governance, and user lifecycle management by highlighting where engagement is strong versus where follow-up or training may be required.</p>
quid = F3FAF629B566EBADDB3F88F327CCA104
search_author = khutchinson
updated_author = akhamis
related_info = <ul><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=audit%20user%20activity" target="_blank">Splunk Docs: Audit user activity</a><br>Search results for documentation related to auditing user behavior and account activity.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=user%20governance" target="_blank">Splunk Docs: User governance</a><br>Search results covering best practices for managing users and access over time.</li><li><a href="https://classic.splunkbase.splunk.com/category/business_analytics/" target="_blank">Splunkbase: Business Analytics</a><br>Apps that support adoption measurement and user engagement analytics.</li><li><a href="https://classic.splunkbase.splunk.com/category/utilities/" target="_blank">Splunkbase: Utilities Apps</a><br>Utility apps that assist with administration, governance, and usage insight.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Splunk Blogs: What Splunk does</a><br>Overview of common use cases that drive sustained user adoption.</li><li><a href="https://www.splunk.com/en_us/resources.html" target="_blank">Splunk Resources: Platform resources</a><br>Guidance and best practices for improving adoption and user success.</li></ul>
description = <p>This search evaluates <b>newly created user accounts</b> and identifies which become <b>regularly active users</b> over time. It measures <b>user activity consistency</b> to distinguish one-time access from sustained adoption. <p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p></p>
viz_options = { "count": 100 }
search = `ssef_summary(ssef_ia4s_users_account_modifications)` \
| fields _time label src_user dest_user operation severity_level \
| bin _time span=1d \
| stats latest(*) as * by _time, label, src_user, dest_user, operation \
| stats count as new_user by dest_user \
| `ssef_regularly_seen_users(dest_user)` \
| where isnotnull(new_user) \
| fields - new_user \
| eventstats dc(dest_user) as new_users_total \
| eventstats dc(eval(if(perc_active >= `ssef_perc_active_threshold`, dest_user, null() ))) AS num_regular_new_users \
| eval perc_regular_new_users = round((num_regular_new_users / new_users_total ) * 100) \
| where perc_active >= `ssef_perc_active_threshold` \
| sort - perc_active\
| table dest_user num_active_days num_days perc_active num_regular_new_users new_users_total perc_regular_new_users \
| rename dest_user as "New User", num_active_days as "Number of Active Days", num_days as "Total Number of Days", perc_active as "% of Active Days", num_regular_new_users as "Number of Regular New Users", new_users_total as "Total New Users", perc_regular_new_users as "% of Regular New Users"

