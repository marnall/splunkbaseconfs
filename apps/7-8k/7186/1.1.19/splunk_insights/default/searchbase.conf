description = <p>This Splunk query retrieves search concurrency settings from the Splunk server and joins it with server status limits. It then performs some calculations and transformations on the data and saves the results to a summary index and a lookup table.</p>
search = | rest `ssef_rest_target` `ssef_rest_timeout` /servicesNS/-/-/admin/search-concurrency-settings-handler  \
| eval summary_id="ssef_admin_search_concurrency_settings_handler" \
| eval Splunk_Instance = lower(splunk_server) \
| rename max_searches_perc.*.* AS max_searches_perc_*_*, max_searches_perc.* AS max_searches_perc_* \
| fields Splunk_Instance title auto_summary_perc* base_max_searches max_rt_search_multiplier max_searches_per_cpu max_searches_perc* \
| join Splunk_Instance \
    [| rest `ssef_rest_target` `ssef_rest_timeout` "/servicesNS/-/-/server/status/limits/search-concurrency?cluster_wide_quota=1" \
    | rename eai:acl.* AS * \
    | rename eai:* AS * \
    | eval Splunk_Instance = lower(splunk_server) \
    | fields Splunk_Instance title max_auto_summary_searches max_hist_scheduled_searches max_hist_searches max_rt_scheduled_searches max_rt_searches] \
| `ssef_instance_info(Splunk_Instance)` \
| eval title=lower(title) \
| stats \
    VALUES(Splunk_Instance) AS Splunk_Instance\
    VALUES(role) AS role\
    LAST(auto_summary_perc*) AS auto_summary_perc*\
    LAST(max_searches_perc*) AS max_searches_perc*\
    LAST(base_max_searches) AS base_max_searches\
    LAST(max_rt_search_multiplier) AS max_rt_search_multiplier\
    LAST(max_searches_per_cpu) AS max_searches_per_cpu\
    LAST(max_auto_summary_searches) AS max_auto_summary_searches\
    LAST(max_hist_scheduled_searches) AS max_hist_scheduled_searches\
    LAST(max_hist_searches) AS max_hist_searches\
    LAST(max_rt_scheduled_searches) AS max_rt_scheduled_searches\
    LAST(max_rt_searches) AS max_rt_searches\
    LATEST(name) AS name\
    by label, title \
| eval _time = now() \
| foreach role, Splunk_Instance \
    [ eval <<FIELD>>=mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| eval is4s="summary" \
| append \
    [| search `ssef_summary(ssef_admin_search_concurrency_settings_handler)` earliest=-1d@d \
    | foreach Splunk_Instance, role \
        [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
    | eval title=lower(title) \
    | stats\
        VALUES(Splunk_Instance) AS Splunk_Instance\
        VALUES(role) AS role \
        LATEST(auto_summary_perc*) AS auto_summary_perc*\
        LATEST(base_max_searches) AS base_max_searches\
        LATEST(max_rt_search_multiplier) AS max_rt_search_multiplier\
        LATEST(max_searches_per_cpu) AS max_searches_per_cpu\
        LATEST(max_searches_perc*) AS max_searches_perc*\
        LATEST(max_auto_summary_searches) AS max_auto_summary_searches\
        LATEST(max_hist_scheduled_searches) AS max_hist_scheduled_searches\
        LATEST(max_hist_searches) AS max_hist_searches\
        LATEST(max_rt_scheduled_searches) AS max_rt_scheduled_searches\
        LATEST(max_rt_searches) AS max_rt_searches\
        LATEST(_time) AS _time\
        LATEST(name) AS name\
        by label,title \
    | table _time,label,name,Splunk_Instance,role,title,auto_summary_perc,base_max_searches,max_rt_search_multiplier,max_searches_per_cpu,max_searches_perc,max_auto_summary_searches,max_hist_scheduled_searches,max_hist_searches,max_rt_scheduled_searches,max_rt_searches,max_searches_perc_0,max_searches_perc_1,max_searches_perc_2,max_searches_perc_3,max_searches_perc_0_when,max_searches_perc_1_when,max_searches_perc_2_when,max_searches_perc_3_when \
    | outputlookup ssef_admin_search_concurrency_settings_handler_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | stats count as num_items | eval is4s="lookup" ] \
| where is4s="summary" \
| table _time,label,name,Splunk_Instance,role,title,auto_summary_perc,base_max_searches,max_rt_search_multiplier,max_searches_per_cpu,max_searches_perc,max_auto_summary_searches,max_hist_scheduled_searches,max_hist_searches,max_rt_scheduled_searches,max_rt_searches,max_searches_perc_0,max_searches_perc_1,max_searches_perc_2,max_searches_perc_3,max_searches_perc_0_when,max_searches_perc_1_when,max_searches_perc_2_when,max_searches_perc_3_when severity_level \
