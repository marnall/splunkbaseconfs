[preflight_tsidx_reduction_check]
search_name = TSIDX Reduction
readonly = 1
search_hidden = 1
version = 1.0.1
date_updated = 2025-2-15 16:45:24
category = IS4S
sub_category = Preflight Checks
tags = Preflight
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 372FAC31AAC67FCF1C87B5C117077382
updated_author = akhamis
description = <p>This Splunk preflight check checks TSIDX reduction status.  If you are running the app in Splunk Cloud, please disregard this check, as it is not applicable in that environment.</p>
search = | `ssef_splunk_deployment` \
| appendcols \
    [| rest splunk_server=* `ssef_rest_timeout` /servicesNS/-/-/data/indexes search="isInternal=1" \
    | search title IN (_audit,_internal,_introspection) \
    | fields splunk_server title enableTsidxReduction ] \
| filldown splunk_deployment \
| stats last(enableTsidxReduction) AS enableTsidxReduction by splunk_deployment title \
| eval message = case (\
    splunk_deployment="Enterprise" AND enableTsidxReduction=1,\
    "TSIDX reduction is enabled, the checks are going to run extremly slowly. Consider restoring reduced buckets to their original state. See https://docs.splunk.com/Documentation/Splunk/latest/Indexer/Reducetsidxdiskusage",\
    splunk_deployment="Cloud",\
    "Detected a Splunk Cloud deployment. This pre-flight check is only applicable to Splunk Enterprise customers.",\
    splunk_deployment="Enterprise" AND enableTsidxReduction=0, \
    "TSIDX reduction is not enabled",\
    true(),\
    "Error detecting the Splunk deployment type." ) \
| eval severity_level = if ( splunk_deployment="Enterprise" AND enableTsidxReduction=1, 3, 0) \
| stats values(message) AS message max(severity_level) As severity_level by splunk_deployment \
| fields splunk_deployment severity_level message

[aandi_correlation_setup]
search_name = A&I Correlation Setup
readonly = 1
ssef_cron = weekly
target_component = Assets & Identities
version = 1.1.2
date_updated = 2025-11-25 22:41:3
category = ES Adoption
sub_category = Security
tags = Assets and Identities,ES Adoption,Summary
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = C02105527B6F3E38EEB133C96D4223F8
search_author = dluxton
updated_author = akhamis
related_info = <ul>\
<li><a href="https://docs.splunk.com/Documentation/ES/8.0.2/Admin/ConfigureAssetIdentityCorrelation" target="_blank">Configure asset and identity correlation in Splunk Enterprise Security</a></li>\
</ul>
severity_normal_text = <br/><p>This check is all clear when either of the Asset &amp; Identity Correlation Setup criteria are met:</p>\
<ul>\
<li>Enabled for all sourcetypes</li>\
<li>The Assets &amp; Identities lookups are enabled selectively by sourcetype, the sourcetype stash is included and at least 1 other sourcetype has been selected for A&amp;I enrichment</li>\
</ul>
severity_low_text = <br/><p>All of the following configurations are set:</p>\
<ul>\
<li>The Assets &amp; Identities lookups are enabled selectively by sourcetype</li>\
<li>The stash sourcetype for both asset and identity enrichment</li>\
<li>At minimum, the asset or identity lookup is not enriching any additional sourcetypes</li>\
</ul>
severity_medium_text = <br/><p>Both of the below criteria have been met:</p>\
<ul>\
<li>The Assets &amp; Identities lookups are enabled selectively by sourcetype</li>\
<li>The stash sourcetype is only enabled for asset or identitiy enrichment</li>\
</ul>
severity_high_text = <br/><p>The Assets &amp; Identities lookups are enabled selectively by sourcetype and one of the following configurations has been set:</p>\
<ul>\
<li>Asset or Identity enrichment is disabled</li>\
<li>Asset and Identity enrichment are both enabled however neither are enriching the stash sourcetype</li>\
</ul>
severity_critical_text = <br/><p>Assets &amp; Identities enrichment is disabled</p>
description = <p>After the lookups have been configured, the correlation setup then dictates where the enrichment takes place.</p>
search = | rest splunk_server=local /servicesNS/-/SA-IdentityManagement/configs/conf-props search="eai:appName=SA-IdentityManagement" \
| eval summary_id="aandi_correlation_setup" \
| search disabled=0 AND ( LOOKUP-zu-asset_lookup_by_str-dest=* OR LOOKUP-zy-identity_lookup_expanded-user=* ) \
| eval asset_matching_enabled=if(match('LOOKUP-zu-asset_lookup_by_str-dest',"\w+"),"true",null()), identity_matching_enabled=if(match('LOOKUP-zy-identity_lookup_expanded-user',"\w+"),"true",null()), stash_asset_matching_enabled=if(title="stash" AND match('LOOKUP-zu-asset_lookup_by_str-dest',"\w+"),"true",null()), stash_identity_matching_enabled=if(title="stash" AND match('LOOKUP-zy-identity_lookup_expanded-user',"\w+"),"true",null()) \
| `ssef_instance_info(splunk_server)` \
| stats dc(title) as titleCount values(title) as titles count(eval(if(asset_matching_enabled="true",'asset_matching_enabled',null()))) as asset_match_count count(eval(if(identity_matching_enabled="true",'identity_matching_enabled',null()))) as identity_match_count values(stash_asset_matching_enabled) as stash_asset_matching_enabled values(stash_identity_matching_enabled) as stash_identity_matching_enabled by label \
| fillnull value="false" stash_asset_matching_enabled, stash_identity_matching_enabled \
| eval description=case(\
    asset_match_count>=4 AND identity_match_count>=4 AND match(titles,"source::...entity_diff.log"),"Enabled for all sourcetypes",\
    stash_identity_matching_enabled="true" AND stash_asset_matching_enabled="true" AND asset_match_count>1 AND identity_match_count>1,"The Assets & Identities lookups are enabled selectively by sourcetype, the sourcetype stash is included and at least 1 other sourcetype has been selected for A&I enrichment",\
    stash_identity_matching_enabled="true" AND stash_asset_matching_enabled="true" AND (asset_match_count>1 OR identity_match_count>1),"The Assets & Identities lookups are enabled selectively by sourcetype, the sourcetype stash is included and at least 1 other sourcetype has been selected for either asset enrichment or identity enrichment",\
    stash_identity_matching_enabled="true" AND stash_asset_matching_enabled="true" AND asset_match_count=1 AND identity_match_count=1,"The Assets & Identities lookups are enabled selectively by sourcetype for only the stash sourcetype",\
    (stash_identity_matching_enabled="true" OR stash_asset_matching_enabled="true") AND (stash_identity_matching_enabled="false" OR stash_asset_matching_enabled="false") AND (asset_match_count>=1 AND identity_match_count>=1),"The Assets & Identities lookups are enabled selectively by sourcetype, the stash sourcetype is only enabled for asset or identitiy enrichment",\
    (stash_identity_matching_enabled="true" OR stash_asset_matching_enabled="true") AND (stash_identity_matching_enabled="false" OR stash_asset_matching_enabled="false") AND (asset_match_count>=1 OR identity_match_count>=1),"The Assets & Identities lookups are enabled selectively by sourcetype, only asset or identitiy enrichment is enabled, stash is included",\
    (stash_identity_matching_enabled="false" AND stash_asset_matching_enabled="false") AND (asset_match_count>=1 AND identity_match_count>=1),"A&I enrichment is selectively enabled for both assets & identities, however the stash sourcetype is not enabled",\
    (stash_identity_matching_enabled="false" AND stash_asset_matching_enabled="false") AND (asset_match_count>=1 OR identity_match_count>=1),"A&I enrichment is selectively enabled for only assets or only identities, the stash sourcetype is also not enabled",\
    titleCount=0 AND asset_match_count=0 AND identity_match_count=0,"Assets & Identities enrichment is disabled",\
    1=1,"logic error") \
| eval severity_level = case (\
    asset_match_count>=4 AND identity_match_count>=4 AND match(titles,"source::...entity_diff.log"),1,\
    stash_identity_matching_enabled="true" AND stash_asset_matching_enabled="true" AND asset_match_count>1 AND identity_match_count>1,1,\
    stash_identity_matching_enabled="true" AND stash_asset_matching_enabled="true" AND (asset_match_count>1 OR identity_match_count>1),2,\
    stash_identity_matching_enabled="true" AND stash_asset_matching_enabled="true" AND asset_match_count=1 AND identity_match_count=1,2,\
    (stash_identity_matching_enabled="true" OR stash_asset_matching_enabled="true") AND (stash_identity_matching_enabled="false" OR stash_asset_matching_enabled="false") AND (asset_match_count>=1 AND identity_match_count>=1),3,\
    (stash_identity_matching_enabled="true" OR stash_asset_matching_enabled="true") AND (stash_identity_matching_enabled="false" OR stash_asset_matching_enabled="false") AND (asset_match_count>=1 OR identity_match_count>=1),4,\
    (stash_identity_matching_enabled="false" AND stash_asset_matching_enabled="false") AND (asset_match_count>=1 AND identity_match_count>=1),4,\
    (stash_identity_matching_enabled="false" AND stash_asset_matching_enabled="false") AND (asset_match_count>=1 OR identity_match_count>=1),4,\
    titleCount=0 AND asset_match_count=0 AND identity_match_count=0,5,\
    1=1,0) \
| table label asset_match_count description identity_match_count stash_asset_matching_enabled stash_identity_matching_enabled titleCount titles severity_level \
| `ssef_handle_no_results(1,"The aandi_correlation_setup summary job completed successfully without identifying any issues, and everything is operating as expected.")`

