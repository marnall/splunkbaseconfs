[ssef_ia4s_environment_memory_tracker]
search_name = Memory Tracker Disabled
readonly = 1
target_component = Infra & Arch
version = 2.0
date_updated = 2026-2-12 21:21:44
category = Splunk
sub_category = Performance
tags = Memory,Configuration,_internal
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
