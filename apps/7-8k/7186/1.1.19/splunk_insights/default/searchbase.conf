[summary_searches_returning_no_results_improperly]
search_name = Scheduled Search with No Results or Alerts
readonly = 1
ssef_cron = weekly
target_component = Search & Visualization
version = 3.0.2
date_created = 2025-08-08
date_updated = 2026-1-28 12:34:29
category = Splunk
sub_category = _internal
tags = EFS,Monitoring,Scheduler,Summary,_internal
solution = <p>Identifies potentially unnecessary scheduled searches that consume resources without producing results or actionable alerts.</p><p><b>Suggested Actions</b><br><b>1.</b> Review saved searches with persistent no-result/no-alert status.<br><b>2.</b> Remove or disable unused searches to reclaim scheduler capacity.<br><b>3.</b> Refine search criteria to ensure meaningful results.<br><b>4.</b> Engage owners to confirm necessity.<br><b>5.</b> Track improvements after cleanup.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (daily_average_searches_with_no_results=0,1, daily_average_searches_with_no_results<=5,2, daily_average_searches_with_no_results<=10,3, daily_average_searches_with_no_results<=20,4, daily_average_searches_with_no_results>20,5)</code></pre><p>Place before the final <code>| table</code> to classify severity based on the average count.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No such searches found.</li><li><b>Low (Severity 2):</b> 1–5 searches per day.</li><li><b>Medium (Severity 3):</b> 6–10 per day.</li><li><b>High (Severity 4):</b> 11–20 per day.</li><li><b>Critical (Severity 5):</b> More than 20 per day.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="scheduler" result_count</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve scheduler execution logs with result counts.<br><b>02</b> <code>| bin _time span=1d</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Bucket events by day.<br><b>03</b> <code>| extract pairdelim=",", kvdelim="=", auto=f</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extract key=value pairs from raw event.<br><b>04</b> <code>| eval alert_actions=if(alert_actions="", NULL, alert_actions)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Normalize empty alert_actions values to NULL.<br><b>05</b> <code>| stats ... by savedsearch_name, _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate metrics including number of actions, results, run time, execution count.<br><b>06</b> <code>| where max_result_count = 0 AND num_of_actions = 0</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter for searches producing no results and triggering no alerts.<br><b>07</b> <code>| timechart partial=t fixedrange=t span=1d dc(savedsearch_name) as searches_with_no_results_not_alerts</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct searches per day matching this criteria.<br><b>08</b> <code>| stats avg(searches_with_no_results_not_alerts) as daily_average_searches_with_no_results</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Compute daily average.<br><b>09</b> <code>| eval severity_level = case (daily_average_searches_with_no_results=0,1, daily_average_searches_with_no_results&lt;=5,2, daily_average_searches_with_no_results&lt;=10,3, daily_average_searches_with_no_results&lt;=20,4, daily_average_searches_with_no_results&gt;20,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity classification.<br><b>10</b> <code>| table daily_average_searches_with_no_results severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output KPI and severity.<br>
explanation = <p>This search inspects <b>_internal</b> index <b>scheduler</b> logs, extracting key-value pairs to evaluate <code>alert_actions</code>. It calculates stats per saved search and day, filtering for those with both <b>0 results</b> and <b>no alert actions</b>. It then builds a timechart and computes the daily average count of such searches. Higher averages may indicate wasted search runtime and resource usage. Severity classification assigns higher risk to higher averages, signalling the need for review and possible decommissioning of these searches.</p><p>For junior Splunkers, this demonstrates multi-stage filtering, field extraction, KPI building, and relevance scoring.</p>
quid = 1204D91AD11C8448FAFE25199411DBCE
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>No scheduled searches meet the no-results/no-alert criteria.</p>
severity_low_text = <p>Few scheduled searches meet the no-results/no-alert criteria; monitor for growth.</p>
severity_medium_text = <p>Moderate count of scheduled searches producing no results or alerts; consider review.</p>
severity_high_text = <p>High count of such searches; resource waste likely, review urgently.</p>
severity_critical_text = <p>Severe scheduler inefficiency detected; many searches are non-productive and should be addressed immediately.</p>
description = <p>This search is looking at all searches that run last week and finds instances of searches that return 0 results & don't have any actions associate to them. It then calculates the daily average of how many times this behaviour occurs. No results mean that there are no searches that returned 0 results imporperly. If the result of this KPI is a non-zero value it will be helpful to find the root cause of the search and SPL that is not working.</p>
viz_options = { "count":100 }
search = index=_internal sourcetype="scheduler" result_count \
| eval summary_id="summary_searches_returning_no_results_improperly" \
| bin _time span=1d \
| extract pairdelim="," kvdelim="=", auto=f \
| eval alert_actions=if(alert_actions="", NULL, alert_actions) \
| stats dc(alert_actions) as num_of_actions max(result_count) AS max_result_count avg(run_time) AS avg_run_time_sec sum(run_time) AS sum_run_time_sec dc(host) AS dc_instance count AS execution_count values(event_message) as event_message by savedsearch_name, _time \
| where max_result_count = 0 AND num_of_actions = 0 \
| timechart partial=t fixedrange=t span=1d dc(savedsearch_name) as searches_with_no_results_not_alerts values(event_message) as event_message \
| stats avg(searches_with_no_results_not_alerts) as daily_average_searches_with_no_results values(event_message) as event_message \
| eval event_message = mvindex(event_message,0,9) \
| eval severity_level = case (daily_average_searches_with_no_results<=20,1, daily_average_searches_with_no_results<=30,2, daily_average_searches_with_no_results<=40,3, daily_average_searches_with_no_results<=60,4, daily_average_searches_with_no_results>60,5) \
| table daily_average_searches_with_no_results event_message severity_level \
| `ssef_handle_no_results(1,"The summary_searches_returning_no_results_improperly summary job completed successfully without identifying any issues, and everything is operating as expected.")`

