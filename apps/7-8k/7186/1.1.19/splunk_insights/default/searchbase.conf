dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="splunkd_ui_access" method=POST "/services/search/jobs" OR "/services/search/v2/jobs"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve internal audit logs of POST requests for search job creation.<br><b>02</b> <code>| stats dc(host) as total_search_heads</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Count distinct search head hosts initiating jobs.<br><b>03</b> <code>| eval severity_level = case (total_search_heads=0,5, total_search_heads&lt;=1,4, total_search_heads&lt;=3,3, total_search_heads&lt;=5,2, total_search_heads&gt;5,1)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity where fewer active search heads = higher risk.<br><b>04</b> <code>| table total_search_heads severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output the metric and severity for alerting/dashboards.<br>
explanation = <p>This search queries the <b>_internal</b> index for <b>splunkd_ui_access</b> events with HTTP POST requests to <code>/services/search/jobs</code> or <code>/services/search/v2/jobs</code>. These endpoints indicate that a search head initiated a search job. It counts distinct search head hosts to monitor the number of active search heads contributing to workload execution.</p><p>Environments with fewer active search heads than expected may indicate connectivity, load balancing, or service availability issues. The severity logic classifies fewer search heads as higher risk, with <b>0</b> meaning no search job creation observed.</p>
quid = DCDB5BC7FC4FA57C2518A1BAD62CD800
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/9.4.2/DistSearch/SHCdeploymentoverview" target="_blank">Search Head Clustering Overview</a><br>Concepts and configuration for search head clustering.</li><li><a href="https://community.splunk.com/t5/Deployment-Architecture/Search-head-issues/m-p/641921" target="_blank">Splunk Community: Search Head Issues</a><br>Peer discussions on diagnosing search head problems.</li></ul>
description = <p>This search looks for any instance in which the search endpoint was hit via POST & indicates a search head. The more search heads, the more surface area & capacity for users to leverage Splunk</p>
default_viz = splunk.column
viz_options = { "stackMode":"stacked","seriesColors":["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"],"legendDisplay":"top" }
search = `ssef_summary(summary_number_of_search_heads)` | timechart partial=t fixedrange=t max(total_search_heads) as total_search_heads span=1w

[summary_outgoing_networking_errors]
search_name = Outgoing Networking Errors
readonly = 1
ssef_cron = weekly
target_component = Infra & Arch
version = 3.0.0
date_created = 2025-08-08
date_updated = 2026-1-28 12:32:43
category = Splunk
sub_category = _internal
tags = EFS,Errors,Forwarding,Summary
solution = <p>Quantifies TCP output reliability. Persistent errors suggest blocked egress, misrouted outputs, or destination instability.</p><p><b>Suggested Actions</b><br><b>1.</b> Check network reachability and firewalls between indexers and receivers.<br><b>2.</b> Review <code>outputs.conf</code> targets and load balancer health.<br><b>3.</b> Inspect indexing/queue health (aggQueue, tcpOut) via Monitoring Console.<br><b>4.</b> Correlate with forwarder connection drops and license dips.<br><b>5.</b> Engage network/storage teams if errors persist.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (avg_daily_tcp_output_errors=0,1, avg_daily_tcp_output_errors<=2,2, avg_daily_tcp_output_errors<=5,3, avg_daily_tcp_output_errors<=10,4, avg_daily_tcp_output_errors>10,5)</code></pre><p>This SPL should be added before the final <code>| table</code> to classify severity. <b>Tune thresholds</b> to your environment’s normal error baseline.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No daily TCP output errors observed.</li><li><b>Low (Severity 2):</b> ≤2 average daily errors — negligible impact.</li><li><b>Medium (Severity 3):</b> 3–5 — investigate intermittent egress issues.</li><li><b>High (Severity 4):</b> 6–10 — likely persistent problems affecting reliability.</li><li><b>Critical (Severity 5):</b> &gt;10 — severe egress instability; immediate action.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype="splunkd" component IN (TcpO*) CASE(ERROR)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Select TCP output-related ERROR events from internal logs.<br><b>02</b> <code>| timechart partial=t fixedrange=t span=1d count as tcp_output_errors</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Create a daily time series of error counts.<br><b>03</b> <code>| stats avg(tcp_output_errors) as avg_daily_tcp_output_errors</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Compute the average daily TCP output errors over the period.<br><b>04</b> <code>| eval avg_daily_tcp_output_errors=round(avg_daily_tcp_output_errors, 2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Round for readable reporting.<br><b>05</b> <code>| eval severity_level = case (avg_daily_tcp_output_errors=0,1, avg_daily_tcp_output_errors&lt;=2,2, avg_daily_tcp_output_errors&lt;=5,3, avg_daily_tcp_output_errors&lt;=10,4, avg_daily_tcp_output_errors&gt;10,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign severity where more errors = higher risk.<br><b>06</b> <code>| table avg_daily_tcp_output_errors severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Output KPI and severity for alerting/visualization.<br>
explanation = <p>This search analyzes <b>splunkd</b> events in the <b>_internal</b> index where the component matches <b>TcpO*</b> and level is <b>ERROR</b>. It builds a 1-day time series of error counts and averages them across the window, surfacing persistent TCP output problems such as blocked queues, connection resets, or destination unavailability. The severity model classifies higher averages as higher risk.</p><p>For junior Splunkers, this demonstrates clean pipeline stages: time-bucketing with <b>timechart</b>, aggregation with <b>stats</b>, rounding with <b>eval</b>, and severity assignment suitable for alerts and dashboards.</p>
quid = 9313C52745B651E19ED6923E0B29B0A4
search_author = Splunk Searchbase Assistant
updated_author = akhamis
severity_normal_text = <p>No TCP output errors detected; egress is healthy.</p>
severity_low_text = <p>Minor TCP output errors; monitor for trend increases.</p>
severity_medium_text = <p>Intermittent TCP output errors; investigate destinations and routes.</p>
severity_high_text = <p>Persistent TCP output errors; service reliability is degraded.</p>
severity_critical_text = <p>Severe TCP output errors; egress likely failing — urgent remediation required.</p>
description = <p>This search looks for any issues related to when the indexer has an issue sending a payload to and endpoint over the last business week & calculates a daily average. This can be due to infrastructuce issues, bad configs, DNS issues or firewall issues. This can also be caused if the forwarder process or server it self has been offline or locked.</p>
search = index=_internal sourcetype="splunkd" component IN (TcpO*) CASE(ERROR) \
| eval summary_id="summary_outgoing_networking_errors" \
| timechart partial=t fixedrange=t span=1d count as tcp_output_errors values(event_message) as event_message \
| stats avg(tcp_output_errors) as avg_daily_tcp_output_errors values(event_message) as event_message \
| eval avg_daily_tcp_output_errors=round(avg_daily_tcp_output_errors, 2) , event_message = mvindex(event_message,0,9) \
| eval severity_level = case (avg_daily_tcp_output_errors=0,1, avg_daily_tcp_output_errors<=2,2, avg_daily_tcp_output_errors<=5,3, avg_daily_tcp_output_errors<=10,4, avg_daily_tcp_output_errors>10,5) \
| table avg_daily_tcp_output_errors event_message severity_level \
| `ssef_handle_no_results(1,"The summary_outgoing_networking_errors summary job completed successfully without identifying any issues, and everything is operating as expected.")`

