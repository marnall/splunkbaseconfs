| eval value = spath(value,"{}") \
| stats count by splunk_server value \
| eval Splunk_Instance = lower(splunk_server) \
| foreach _key title base_search \
    [ eval <<FIELD>> = spath(value,"<<FIELD>>") ] \
| rename _key AS key \
| `ssef_instance_info(Splunk_Instance)` \
| stats \
    VALUES(Splunk_Instance) AS Splunk_Instance \
    VALUES(role) AS role \
    LAST(key) AS key\
    LAST(base_search) AS base_search\
    LATEST(name) AS name\
    by label, title \
| eval _time = now() \
| foreach role, Splunk_Instance \
    [ eval <<FIELD>> = mvjoin(mvsort(mvdedup('<<FIELD>>')), "|") ] \
| eval severity_level = if(isnotnull(_time), 1, null()) \
| eval is4s="summary" \
| append maxtime=60 maxout=50000 timeout=60 \
    [| search `ssef_summary(ssef_itsi_kpi_base_search)` earliest=-1d@d \
    | foreach Splunk_Instance, role \
        [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
    | stats \
        VALUES(Splunk_Instance) AS Splunk_Instance \
        VALUES(role) AS role \
        LATEST(_time) AS _time\
        LATEST(base_search) AS base_search \
        LATEST(key) AS key \
        LATEST(name) AS name\
        by label, title \
    | table _time, label, name, role, Splunk_Instance, title, key, base_search \
    | outputlookup ssef_itsi_kpi_base_search_lookup CreateInApp=true Create_Empty=true Override_If_Empty=false \
    | stats count as num_items \
    | eval is4s="lookup" ] \
| where is4s="summary" \
| table _time, label, name, role, Splunk_Instance, title, key, base_search, severity_level \
| `ssef_handle_no_results(1,"The ssef_itsi_kpi_base_search summary job completed successfully without identifying any issues, and everything is operating as expected.")`

