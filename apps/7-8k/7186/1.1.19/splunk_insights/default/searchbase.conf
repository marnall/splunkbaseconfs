quid = 052EB7E31EFE2F98634C5A63E9D1C4A2
description = <p><span style="font-size: 12px;"><strong>Definition</strong></span><br>The number of dashboard or page views in Splunk over a selected time frame, with each page view defined as the loading of a Splunk dashboard in a browser. <br><br></p>\
<p><span style="font-size: 12px;"><strong>The Value it Uncovers</strong></span><br>Tracking these numbers reveals key trends: an upward trend suggests increasing adoption, user satisfaction, and alignment with business objectives, whereas a downward trend may indicate decreasing adoption, user dissatisfaction, or misalignment with goals. Understanding these trends is crucial for continually enhancing the user experience and reinforcing Splunks value to customers. <br><br></p>\
<p><span style="font-size: 12px;"><strong>Recommended Time Period</strong></span><br>It is recommended to track this KPI <em>weekly</em>, <em>monthly</em>, <em>quarterly</em>, and <em>yearly</em> to gain a comprehensive view of Splunks utilization within the organization.</p>
search = `ssef_summary(ssef_internal_web_access_tracker)` type!=system\
| eval summary_id="Total_#_of_Page_Views_Export" \
| fields _time, label, name, type, app, view, spent_ms, bytes, num_page_loads, num_users, users_mv \
| bin _time span=1h \
| stats latest(*) as * by _time, label, type, app, view \
| bin _time span=1d \
| stats count(view) as kpi_value by _time  | where isnotnull(kpi_value) AND kpi_value!="" \
| eval customer_name = `ssef_customer_name` , kpi_name = "Total # of Page Views" , export_time = now() | eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(kpi_name), 1, 2) | rename _time as timechart_time | table timechart_time export_time customer_name kpi_name kpi_value severity_level | `ssef_handle_no_results(1,"The ssef_data_export summary job completed successfully without identifying any issues, and everything is operating as expected.")`

