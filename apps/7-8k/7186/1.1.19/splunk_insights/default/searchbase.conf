<li><strong>Normal:</strong> Search disk quota, search jobs quota, imported search jobs quota, or search disk quota is less than or equal to 1,000,0000.</li>\
</ul>
explanation = <p>This search consumes the Authorization Roles summary dataset and inspects effective role-level limits for search job quota and search disk quota, including imported values from inherited roles. It compares configured quotas against a defined limit threshold to identify misconfigurations or overly permissive settings that could enable excessive concurrency, disk usage, or workload imbalance. Excessively large quotas may bypass governance controls and contribute to search saturation, storage pressure, and operational instability.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_authorization_roles)`</code><br> - Retrieve summarized role configuration data from Insights summary storage.<br><b>02</b> <code>| fields ...</code><br> - Select relevant quota and imported quota configuration fields.<br><b>03</b> <code>| stats latest(...) by label grantable_roles</code><br> - Determine the most recent effective quota settings per role and instance label.<br><b>04</b> <code>| eval severity_level=case(...)</code><br> - Flag roles exceeding governance threshold limits.
solution = <p>This KPI helps identify overly permissive role quota configurations that may undermine workload governance or introduce operational risk.</p><p><b>Suggested Actions</b>: Review roles exceeding the defined threshold, validate business justification, align quotas with expected workload profiles, and ensure imported role inheritance does not unintentionally inflate effective limits.</p>
related_info = <ul><li><a href="https://community.splunk.com/t5/Security/Role-Quotas-and-Impact-on-System-Performance/m-p/402013" target="_blank">Splunk Answers - Impact of Role Quotas on System Performance</a></li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Security/Addandeditroleswithauthorizeconf" target="_blank">Splunk Docs - Configure Role Quotas</a></li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/configuration-file-reference/authorize.conf" target="_blank">Splunk Help: authorize.conf reference</a><br>Documentation for role configuration, inheritance, and quota settings.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/configuration-file-reference/limits.conf" target="_blank">Splunk Help: limits.conf reference</a><br>Reference for search job and disk quota configurations.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_authorization_roles)` \
| eval summary_id="ssef_ia4s_users_role_quota_settings" \
| fields _time,label,name,role,Splunk_Instance,title,srchTimeEarliest,imported_srchTimeEarliest,srchIndexesDefault,imported_srchIndexesDefault,srchIndexesAllowed,imported_srchIndexesAllowed,srchIndexesDisallowed,imported_srchIndexesDisallowed,cumulativeRTSrchJobsQuota,cumulativeSrchJobsQuota,defaultApp,deleteIndexesAllowed,federatedProviders,grantable_roles,imported_roles,imported_rtSrchJobsQuota,imported_srchDiskQuota,imported_srchFilter,imported_srchJobsQuota,imported_srchTimeWin,rtSrchJobsQuota,srchDiskQuota,srchFilter,srchJobsQuota,srchTimeWin,capabilities,imported_capabilities \
| stats latest(srchJobsQuota) as srchJobsQuota latest(srchDiskQuota) as srchDiskQuota latest(imported_srchJobsQuota) as imported_srchJobsQuota latest(imported_srchDiskQuota) as imported_srchDiskQuota latest(_time) as _time by label grantable_roles \
| eval limit=10000000 \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( srchDiskQuota>limit OR srchJobsQuota>limit OR imported_srchJobsQuota>limit OR imported_srchDiskQuota>limit, medium, true(), normal ) \
| table _time label grantable_roles srchDiskQuota imported_srchDiskQuota srchJobsQuota imported_srchJobsQuota limit severity_level \
| `ssef_handle_no_results(1,"The ssef_ia4s_users_role_quota_settings summary job completed successfully without identifying any issues, and everything is operating as expected.")`

