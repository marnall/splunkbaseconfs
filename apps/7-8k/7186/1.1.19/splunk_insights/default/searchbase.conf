<li><a href="https://community.splunk.com/t5/Splunk-Search/Why-does-this-search-return-no-results/td-p/486185" target="_blank">Splunk Community - Searches Returning No Results</a></li>\
<li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchBestPractices/Writingbettersearches" target="_blank">Splunk Docs - Best Practices for Search</a></li>\
<li><a href="https://community.splunk.com/t5/Splunk-Search/Why-does-my-search-return-no-results/td-p/123456" target="_blank">Splunk Answers - Why Search Returns No Results</a></li>\
</ul>
severity_normal_text = <br/><p>One or more searches identified that have not returned results in past 14 days.</p>
severity_low_text = <br/><p>One or more searches identified that have not returned results in past 14 days.</p>
severity_medium_text = <br/><p>One or more searches identified that have not returned results in past 14 days.</p>
severity_high_text = <br/><p>One or more searches identified that have not returned results in past 14 days.</p>
description = <p>This check looks for searches that continuously run and have not returned any results in the past 14 days.  These searches should be reviewed for relevance to determine if they are required.</p>\
<p><strong>Severity Levels:</strong></p>\
<ul><li><strong>High:</strong> Average run time is less than 900 seconds.</li>\
<li><strong>Medium:</strong> Average run time is less than 600 seconds.</li>\
<li><strong>Low:</strong> Average run time is less than 300 seconds.</li>\
<li><strong>Normal:</strong> Average run time is greater than 300 seconds.</li>\
</ul>
search = index=_internal sourcetype=scheduler result_count `ssef_host_excl` NOT app IN (`ssef_default_apps`) \
| eval summary_id="ssef_scma_search_searches_returning_no_results" \
| extract pairdelim=",", kvdelim="=", auto=f \
| `ssef_instance_info(host)` \
| stats max(result_count) AS max_result_count avg(run_time) AS avg_run_time_sec sum(run_time) AS sum_run_time_sec dc(host) AS dc_instance count AS execution_count latest(name) as name by label savedsearch_name, app \
| where max_result_count = 0 \
| join label savedsearch_name type=outer \
    [| search `ssef_summary(ssef_saved_searches)` is_scheduled=1 disabled=0 NOT app IN (splunk_monitoring_console,splunk_archiver) \
    | stats latest(dispatch_earliest_time) as dispatch_earliest_time latest(dispatch_latest_time) as dispatch_latest_time latest(cron_schedule) as cron_schedule latest(name) as name by label app author savedsearch_name ] \
| rex field=savedsearch_name mode=sed "s/=/<equals>/g" \
| eval avg_run_time_sec=round(avg_run_time_sec, 2), sum_run_time_sec=round(sum_run_time_sec, 2) \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( avg_run_time_sec >= 900, high, avg_run_time_sec >= 600, medium, avg_run_time_sec >= 300, low, true(), normal ) \
| table _time label name app savedsearch_name avg_run_time_sec cron_schedule dc_instance dispatch_earliest_time dispatch_latest_time execution_count max_result_count severity_level sum_run_time_sec \
| `ssef_handle_no_results(1,"The ssef_scma_search_searches_returning_no_results summary job completed successfully without identifying any issues, and everything is operating as expected.")`

