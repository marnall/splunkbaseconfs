date_updated = 2026-1-28 12:25:43
category = Splunk
sub_category = _internal
tags = Bundles,EFS,Performance,Summary,_internal
solution = <p>Helps identify and address large knowledge bundle sizes which can cause slower searches, higher network usage, and longer dispatch times.</p><p><b>Suggested Actions</b><br><b>1.</b> Review saved searches and dashboards for unnecessary knowledge object replication.<br><b>2.</b> Reduce the number of fields, macros, or lookups in use.<br><b>3.</b> Apply app-specific replication filters.<br><b>4.</b> Regularly monitor bundle sizes for abnormal growth.<br><b>5.</b> Engage Splunk support if optimization does not reduce sizes.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (hosts_with_large_bundle_sizes=0,1,hosts_with_large_bundle_sizes<=2,2,hosts_with_large_bundle_sizes<=5,3,hosts_with_large_bundle_sizes<=10,4,hosts_with_large_bundle_sizes>10,5)</code></pre><p>This SPL should be added before the final <code>| table</code> command to classify severity levels. <b>Threshold values should be tuned to your deployment scale</b> and operational requirements.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> No hosts with large bundles.</li><li><b>Low (Severity 2):</b> 1–2 hosts affected.</li><li><b>Medium (Severity 3):</b> 3–5 hosts affected.</li><li><b>High (Severity 4):</b> 6–10 hosts affected.</li><li><b>Critical (Severity 5):</b> More than 10 hosts affected.</li></ul>
dispatch_earliest_time = -7d@w1
dispatch_latest_time = @w6
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd source=*/metrics.log TERM(group=bundles_uploads) TERM(name=aggregate)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters _internal metrics log entries for bundle upload activity.<br><b>02</b> <code>| eval bundle_size_mb=round(average_baseline_bundle_bytes/1024/1024, 2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Converts raw byte values to MB with two decimal precision.<br><b>03</b> <code>| stats max(bundle_size_mb) as max_bundle_size_mb by host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Finds the largest observed bundle size per host.<br><b>04</b> <code>| where max_bundle_size_mb>750</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters to only hosts exceeding the size threshold.<br><b>05</b> <code>| stats count as hosts_with_large_bundle_sizes</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Counts affected hosts.<br><b>06</b> <code>| eval severity_level = case (hosts_with_large_bundle_sizes=0,1,hosts_with_large_bundle_sizes<=2,2,hosts_with_large_bundle_sizes<=5,3,hosts_with_large_bundle_sizes<=10,4,hosts_with_large_bundle_sizes>10,5)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assigns severity based on count of affected hosts.<br><b>07</b> <code>| table hosts_with_large_bundle_sizes severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Displays final results.</p>
explanation = <p>This search examines <b>_internal</b> metrics logs for bundle upload sizes across Splunk search peers. Knowledge bundles are replicated to search peers during job dispatch, and overly large bundles can impact <b>network throughput</b>, <b>disk usage</b>, and <b>search performance</b>.</p><p>By calculating the maximum observed bundle size in MB per host and flagging those exceeding a threshold (750MB in this case), it provides an actionable view into <b>potential bottlenecks</b> and <b>optimization opportunities</b>.</p><p>For junior Splunkers, this search highlights SPL use of <b>TERM()</b> for efficiency, <b>eval</b> for unit conversion, and <b>stats</b> for aggregation. It also reinforces why internal metrics are crucial for health monitoring in distributed environments.</p>
quid = A512BD6E2413F8390100A385CD72A3D0
updated_author = akhamis
severity_normal_text = <p>No hosts detected with bundle sizes over 750 MB; bundle replication is optimal.</p>
severity_low_text = <p>Few hosts with bundle sizes over 750 MB; minimal impact but review for optimization.</p>
severity_medium_text = <p>Several hosts with large bundle sizes; may cause slower bundle replication and increased resource usage.</p>
severity_high_text = <p>High number of hosts with large bundle sizes; bundle replication delays likely affecting search performance.</p>
severity_critical_text = <p>Widespread large bundle sizes across hosts; immediate action required to reduce bundle size and restore efficiency.</p>
description = <p>This search looks at all of the bundles that exist within the Splunk ecosystem over a business week & counts the number of hosts who contain egregious bundle sizes defined as over 750MB. Large bundle sizes provide context for searches & if they get too large, they can degrade the performance of all searches & have wide impact within the Splunk ecosystem. </p>
viz_options = { "count":100 }
search = index=_internal sourcetype=splunkd source=*/metrics.log TERM(group=bundles_uploads) TERM(name=aggregate) \
| eval summary_id="summary_hosts_with_large_bundles" \
| eval bundle_size_mb=round(average_baseline_bundle_bytes/1024/1024, 2) \
| stats max(bundle_size_mb) as max_bundle_size_mb values(event_message) as event_message by host \
| where max_bundle_size_mb>750 \
| stats count as hosts_with_large_bundle_sizes values(event_message) as event_message \
| eval event_message = mvindex(event_message,0,9) \
| eval severity_level = case (hosts_with_large_bundle_sizes=0,1,hosts_with_large_bundle_sizes<=2,2,hosts_with_large_bundle_sizes<=5,3,hosts_with_large_bundle_sizes<=10,4,hosts_with_large_bundle_sizes>10,5) \
| table hosts_with_large_bundle_sizes event_message severity_level \
| `ssef_handle_no_results(1,"The summary_hosts_with_large_bundles summary job completed successfully without identifying any issues, and everything is operating as expected.")`

