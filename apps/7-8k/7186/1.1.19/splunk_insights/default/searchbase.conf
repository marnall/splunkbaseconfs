explanation = <h3>High-Level Overview &amp; Purpose</h3><p>This KPI produces a timechart that trends the adoption and consistent usage of the organization's analytic capabilities. It provides three critical metrics for data strategy and value realization:</p><ol><li data-list="ordered"><span class="ql-ui"></span><code><strong>Total # of Analytic Capabilities</strong></code>: The total count of unique capabilities associated with all data sources present in the inventory each day.</li><li data-list="ordered"><span class="ql-ui"></span><code><strong># of Regularly Accessed Analytic Capabilities</strong></code>: The count of capabilities that are being actively used, based on user search behavior.</li><li data-list="ordered"><span class="ql-ui"></span><code><strong>% of Regularly Accessed Analytic Capabilities to Total</strong></code>: The percentage of available capabilities that are meeting the threshold for regular use.</li></ol><p>A capability is considered <strong>"regularly accessed"</strong> if its underlying sourcetypes have been queried by users on <strong>10% or more of the total active days</strong> within the selected time frame. This KPI provides a powerful, data-driven view into which data capabilities are providing consistent value versus those that are underutilized.</p><h3><br></h3><h3>Deeper Explanation: The Multi-Stage Logic</h3><p>This query is a sophisticated data pipeline that operates in several distinct phases to arrive at the final, accurate result. It is complex because it must correctly solve multiple challenges simultaneously: accurate timing, wildcard matching, multi-stage enrichment, and overall frequency calculation.</p><h4>Phase 1: Establish the Base Inventory</h4><p>The query begins by using the <code>ssef_summary(ssef_scma_indexing_data_source_inventory)</code> base search. This provides a complete, day-by-day list of every single sourcetype that exists in the environment, regardless of whether it has been searched or not. This <strong>unfiltered starting point</strong> is the most critical part of the query, as it ensures our "Total" calculation is comprehensive.</p><h4>Phase 2: Determine True Search Frequency</h4><p>This is the core of the "regularly accessed" logic.</p><ol><li data-list="bullet"><span class="ql-ui"></span><strong>The </strong><code><strong>join</strong></code><strong> Command:</strong> It uses a <code>left join</code> to connect the daily inventory list with the actual search activity logs from the <code>ssef_summary_index</code>. This is crucial for <strong>accurate timing</strong>, as it proves a search happened <em>on a specific day</em>. The join uses the "Key Normalization" technique we developed, allowing it to correctly match specific sourcetypes (e.g., <code>access_combined</code>) to the wildcard patterns users searched with (e.g., <code>access_com*</code>).</li><li data-list="bullet"><span class="ql-ui"></span><strong>The </strong><code><strong>eventstats</strong></code><strong> Commands:</strong> This is the "brain" of the frequency calculation.</li><li class="ql-indent-1" data-list="ordered"><span class="ql-ui"></span><code>eventstats dc(_time) as total_days_in_window</code>: This correctly counts the number of active days in the time window, making the calculation resilient to gaps in the data.</li><li class="ql-indent-1" data-list="ordered"><span class="ql-ui"></span><code>eventstats dc(eval(if(...))) as days_sourcetype_was_searched by inventory_sourcetype</code>: This is the most important step. For each sourcetype, it calculates its total number of search days across the <em>entire time window</em> and stamps that value onto every daily record for that sourcetype. This gives each event the overall context it needs for the final classification.</li></ol><h4>Phase 3: Multi-Stage Enrichment (The Capability Mapping)</h4><p>This section translates each sourcetype into its associated analytic capabilities.</p><ol><li data-list="bullet"><span class="ql-ui"></span><strong>The </strong><code><strong>lookup</strong></code><strong> and </strong><code><strong>mvexpand</strong></code><strong> Pattern:</strong> The query uses a chain of <code>lookup</code> and <code>mvexpand</code> commands. This is necessary because the relationship between data sources and capabilities is one-to-many (one sourcetype can support multiple capabilities). <code>mvexpand</code> is the only command that can correctly "unroll" these relationships while <strong>preserving the critical </strong><code><strong>search_coverage_percent</strong></code><strong> value</strong> for each new row it creates. A <code>stats</code> command would fail here because it would destroy that percentage value.</li></ol><h4>Phase 4: Final Aggregation and Calculation</h4><ol><li data-list="bullet"><span class="ql-ui"></span><strong>The </strong><code><strong>timechart</strong></code><strong> Command:</strong> This single, efficient command performs the final aggregation. It uses two distinct count (<code>dc()</code>) functions:</li><li class="ql-indent-1" data-list="ordered"><span class="ql-ui"></span><code>dc(Analytic_Capability)</code>: Counts all unique capabilities found each day.</li><li class="ql-indent-1" data-list="ordered"><span class="ql-ui"></span><code>dc(Active_Analytic_Capability)</code>: Uses a conditional <code>eval(if(...))</code> to count only the capabilities where the <code>search_coverage_percent</code> met the threshold. On days with no active capabilities, this correctly returns <code>0</code>.</li><li data-list="bullet"><span class="ql-ui"></span><strong>The Final </strong><code><strong>eval</strong></code><strong>:</strong> This is a simple post-processing step that takes the two columns generated by <code>timechart</code> and calculates the final percentage.</li></ol><h3><br></h3><h3>Why This Architecture is Correct and Defensible</h3><p>This query is complex for a reason. It is architecturally designed to be accurate and robust where simpler queries would fail.</p><ol><li data-list="bullet"><span class="ql-ui"></span><strong>It's Comprehensive:</strong> It starts with the full, unfiltered inventory, which is the only way to get an accurate "Total" count.</li><li data-list="bullet"><span class="ql-ui"></span><strong>It's Accurate:</strong> It uses a <code>join</code> to the audit logs for precise timing and <code>eventstats</code> to calculate a true frequency score over the entire time window.</li><li data-list="bullet"><span class="ql-ui"></span><strong>It's Robust:</strong> The <code>mvexpand</code> pattern correctly handles the complex one-to-many data model of your capabilities without losing critical contextual data.</li></ol><p>This query represents the definitive, best-practice solution for this advanced analytical requirement.</p>
