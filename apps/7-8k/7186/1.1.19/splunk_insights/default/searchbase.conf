[ssef_scma_search_real_time_searches]
search_name = Real Time Searches Detected
readonly = 1
target_component = Search & Visualization
version = 1.0.2
date_created = 2022-09-14
date_updated = 2024-5-9 18:12:4
category = Splunk
sub_category = Search
tags = SCMA,Search,Summary
dispatch_earliest_time = -1d@d
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
quid = 46B182A75C722923C4E7751AF7C19AF6
updated_author = khutchinson
severity_normal_text = <br/><p>No active real-time searches were found.</p>
severity_medium_text = <br/><p>Several active real-time searches have been detected, exceeding 5 instances. Please reconsider if real-time search is crucial for your scenario. Such searches are highly inefficient for your indexing layer and are widely regarded as inadvisable.</p>
severity_high_text = <br/><p>Several active real-time searches have been detected, exceeding 50 instances. Please reconsider if real-time search is crucial for your scenario. Such searches are highly inefficient for your indexing layer and are widely regarded as inadvisable.</p>
description = <p>This search identifies <b>scheduled real-time saved searches</b> currently enabled in your environment. It measures the <b>volume of real-time searches</b> and assigns a severity level based on count thresholds. Use it to detect governance risks and potential performance strain from continuous execution.</p><p> <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>\
<p><strong>Severity Levels:</strong> </p>\
<ul>\
<li><strong>Medium:</strong> > 10</li>\
<li><strong>Low:</strong> 1-9</li>\
<li><strong>Normal:</strong> 0</li>\
</ul>
explanation = <p>Real-time scheduled searches consume continuous compute resources and can significantly impact system concurrency and stability when deployed at scale. As environments mature, legacy real-time searches often persist without periodic review, increasing the risk of performance degradation. This search helps platform administrators and governance teams quantify how many active real-time searches exist and assess operational risk levels. By monitoring this metric, organizations can transition appropriate use cases to scheduled searches, reduce unnecessary load, and enforce governance standards aligned to capacity planning and workload management best practices.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_saved_searches)` is_scheduled=1 AND disabled=0 dispatch_earliest_time=rt* OR dispatch_latest_time=rt*</code><br> - Retrieves enabled scheduled saved searches configured for real-time execution from IS4S summary data.<br><b>02</b> <code>| eval summary_id="ssef_scma_search_real_time_searches"</code><br> - Assigns a summary identifier for tracking and reporting context.<br><b>03</b> <code>| stats latest(*) as * latest(_time) AS _time by label, app, sharing, author, savedsearch_name</code><br> - Collapses duplicate records while preserving the most recent configuration state per search.<br><b>04</b> <code>| stats dc(savedsearch_name) AS num_saved_searches latest(name) as name latest(_time) as _time by label</code><br> - Counts distinct real-time searches to determine environment-level exposure.<br><b>05</b> <code>| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_saved_searches >= 50, high, num_saved_searches >= 5, medium, true(), normal )</code><br> - Assigns severity thresholds based on total real-time search count.<br><b>06</b> <code>| table _time label name severity_level num_saved_searches</code><br> - Formats the final output for reporting and dashboard visualization.<br><b>07</b> <code>| `ssef_handle_no_results(1,"The ssef_scma_search_real_time_searches summary job completed successfully without identifying any issues, and everything is operating as expected.")`</code><br> - Returns a success message when no real-time searches are detected.</br>
solution = <p>This search identifies excessive use of <b>real-time scheduled searches</b>, which can degrade performance and reduce overall search concurrency.</p><p><b>Suggested Actions</b>Audit real-time searches to determine whether scheduled intervals can replace continuous execution; enforce governance policies restricting real-time usage to true monitoring needs; implement workload management controls; and educate authors on performance-aware scheduling practices.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Provides managed workload controls and elastic scaling to mitigate compute strain from real-time searches.</li><li><a href="https://www.splunk.com/en_us/training.html" target="_blank">Education: Splunk Training & Certification</a><br>Develop governance and performance optimization skills to reduce misuse of real-time searches.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services and Support (CX)</a><br>Engage experts to assess configuration governance, workload policies, and architectural scaling strategies.</li><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=real%20time%20saved%20searches" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps that enhance saved search auditing, governance visibility, and workload optimization.</li></ul></p>
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Search/Aboutrealtimesearches" target="_blank">About Real Time Searches</a></li><li><a href="https://docs.splunk.com/Documentation/SplunkCloud/latest/Service/SplunkCloudservice#Differences_between_Splunk_Cloud_Platform_and_Splunk_Enterprise" target="_blank">Cloud Services: Differences Between Splunk Cloud Platform and Splunk Enterprise</a></li><li><a href="https://help.splunk.com/en/search?q=real%20time%20search" target="_blank">Splunk Help: Real Time Search (provisionally validated)</a><br>Documentation explaining how real-time searches function and their performance implications.</li><li><a href="https://help.splunk.com/en/search?q=saved%20searches" target="_blank">Splunk Help: Saved Searches (provisionally validated)</a><br>Guidance on managing and scheduling saved searches responsibly.</li><li><a href="https://help.splunk.com/en/search?q=workload%20management" target="_blank">Splunk Help: Workload Management (provisionally validated)</a><br>Learn how to isolate and control resource consumption across search workloads.</li><li><a href="https://docs.splunk.com/Special:SplunkSearch/docs?q=real%20time%20search" target="_blank">Splunk Docs: SplunkSearch Results For Real Time Search (provisionally validated)</a><br>Search across official documentation for additional configuration guidance.</li><li><a href="https://lantern.splunk.com/Search?q=Real%20Time%20Search" target="_blank">Lantern: Real Time Search Guidance (provisionally validated)</a><br>Expert best practices for replacing real-time searches with efficient scheduling patterns.</li><li><a href="https://www.splunk.com/en_us/blog/2015/02/16/splunk-search-optimization-techniques.html" target="_blank">Splunk Blogs: Splunk Search Optimization Techniques</a><br>Practical strategies to reduce performance overhead caused by inefficient search patterns.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q="real%20time%20search"" target="_blank">Community: Real Time Search Discussions (provisionally validated)</a><br>Community discussions on real-time search behavior and operational tradeoffs.</li></ul>
viz_options = { "count":100 }
search = `ssef_summary(ssef_saved_searches)` is_scheduled=1 AND disabled=0 dispatch_earliest_time=rt* OR dispatch_latest_time=rt* \
| eval summary_id="ssef_scma_search_real_time_searches" \
| stats latest(*) as * latest(_time) AS _time by label, app, sharing, author, savedsearch_name \
| stats dc(savedsearch_name) AS num_saved_searches latest(name) as name latest(_time) as _time by label \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = case ( num_saved_searches >= 50, high, num_saved_searches >= 5, medium, true(), normal ) \
| table _time label name severity_level num_saved_searches \
| `ssef_handle_no_results(1,"The ssef_scma_search_real_time_searches summary job completed successfully without identifying any issues, and everything is operating as expected.")`

