dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>| ssef_summary(ssef_data_ui_views)</code><br> - Retrieves summarized metadata about all defined UI views and dashboards.<br><b>02</b> <code>| ssef_summary(ssef_internal_web_access_tracker)</code><br> - Pulls summarized user web access activity to determine which dashboards have been viewed.<br><b>03</b> <code>| set diff</code><br> - Compares defined dashboards against viewed dashboards to isolate those never accessed.<br>
explanation = <p>Unused dashboards represent hidden operational debt within Splunk environments, increasing maintenance overhead while providing no value. This insight helps platform owners, admins, and champions understand where content sprawl exists and where user adoption may be lagging. By identifying dashboards that have never been accessed, teams can retire, consolidate, or redesign content to better align with user needs. Over time, acting on this data improves overall platform usability, reduces cognitive load for users, and supports a cleaner, more intentional analytics experience.</p>
quid = E0BCD84755198D279CC20B2C7482F28D
updated_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Create-at-list-that-shows-unused-dashboard/m-p/398883">Splunk Community: Create a list that shows unused dashboards</a><p>This discussion provides insights into identifying dashboards that have not been accessed recently, helping understand their impact on user experience and customer value.</p></li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/How-can-I-create-a-query-to-find-dashboard-usage-and-top-used/m-p/364152">Splunk Community: How can I create a query to find dashboard usage and top used dashboards of all the dashboards in my environment?</a><p>This thread offers guidance on crafting queries to determine dashboard usage statistics, which can help identify underutilized dashboards.</p></li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-would-I-look-for-dashboards-alerts-not-in-use/m-p/648352">Splunk Community: How would I look for dashboards/alerts not in use?</a><p>This discussion explores methods to find unused dashboards or alerts in Splunk, aiding in understanding their impact on system performance and user engagement.</p></li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Ever-wonder-which-dashboards-are-being-used-and-what-users-are/m-p/262291">Splunk Community: Ever wonder which dashboards are being used and what users are viewing them?</a><p>This thread discusses how to track dashboard usage and user interactions, providing insights into which dashboards are underutilized.</p></li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-find-dashboards-not-in-use-by-the-amount-of-days/m-p/418629">Splunk Community: How to find dashboards not in use by the amount of days?</a><p>This discussion provides methods to identify dashboards that have not been used within a specified timeframe, helping assess their relevance and impact on user experience.</p></li><li><a href="https://rigorousthemes.com/blog/best-splunk-dashboard-examples/" target="_blank">14 Best Splunk Dashboard Examples</a><p>This article showcases 14 examples of effective Splunk dashboards, offering inspiration for creating clear and valuable visualizations.</p></li><li><a href="https://logit.io/blog/post/splunk-dashboard-examples/" target="_blank">The Top 15 Splunk Dashboard Examples</a><p>This post presents 15 top-performing Splunk dashboard examples, helping users learn how to design dashboards that deliver real insights.</p></li><li><a href="https://docs.splunk.com/Documentation/Splunk/9.3.2/DashStudio/ExHub" target="_blank">Splunk Dashboard Studio Examples Hub</a><p>This official Splunk resource provides a gallery of Dashboard Studio examples, demonstrating modern dashboarding capabilities.</p></li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/dashboard-design-visualization-choices-and-configurations-part-1.html" target="_blank">Dashboard Design: Visualization Choices and Configurations</a><p>This article offers best practices on choosing visualizations and configuring layouts for more effective Splunk dashboards.</p></li><li><a href="https://lantern.splunk.com/Security/Product_Tips/Enterprise_Security/Comparing_security_domain_dashboards_in_Enterprise_Security" target="_blank">Comparing Security Domain Dashboards in Enterprise Security</a><p>This guide compares dashboards in Splunk Enterprise Security, helping users select the right ones for security monitoring use cases.</p></li></ul>
description = <p>This search identifies <b>dashboards</b> that exist in Splunk but have <b>never been viewed</b> by end users. It compares UI view definitions against actual web access activity to surface <b>unused content</b>. <b>NOTICE:</b> "This search is designed to work with the Insights Suite for Splunk (IS4S) App. It relies on summary data generated by another search within a collection. If that data is unavailable, this search will not return any results."</p>
viz_options = { "count": 100 }
search = | set diff \
    [ search `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
    | rename view_name as view \
    | stats values(label) as label values(view_label) as view_label by app view \
    | eval view_label=if(isnull(view_label) OR view_label="", view, view_label) \
    | fields label app view view_label ] \
    [ search `ssef_summary(ssef_internal_web_access_tracker)` type!=system NOT app IN (`ssef_default_apps`) NOT view IN (`ssef_default_views`) \
    | stats count by app view \
    | fields app view ] \
| table view view_label app label \
| rename view as "Dashboard Title", view_label as "Dashboard Name", label as "Search Head(s)", app as App

[Dashboards Referencing Specific Indexes And Sourcetypes]
search_name = Dashboards Referencing Specific Indexes And Sourcetypes
readonly = 1
diagnostic_searches = ssef_data_ui_views
version = 2.0
date_created = 2023-10-06
category = Splunk
sub_category = Dashboards
tags = Dashboards,Indexes,KPIs,Sourcetypes
solution = <p>This search provides insights into dashboards that reference specific indexes and sourcetypes, helping teams ensure compliance and optimize data usage.</p><p><b>Suggested Actions</b><br><b>1.</b> Review dashboards referencing "WinEventLog" to identify potential inefficiencies or data policy violations.<br><b>2.</b> Optimize dashboards by consolidating searches or reusing base searches where possible.<br><b>3.</b> Investigate unapproved apps or views that may be referencing sensitive data.<br><b>4.</b> Monitor and update time ranges or auto-refresh delays to improve dashboard performance.<br><b>5.</b> Share findings with stakeholders to align on dashboard data usage strategies.</p><p><b>Recommended Alerts</b></p><p><b>Normal: </b> No action required if all dashboards use approved indexes and sourcetypes.</p><p><b>Low: </b> Notify if dashboards use unapproved indexes or sourcetypes but have minimal impact.</p><p><b>Medium: </b> Alert if specific indexes or sourcetypes are heavily referenced in dashboards.<br></p><p><b>High: </b> Escalate if sensitive data is referenced in unapproved dashboards.</p><p><b>Critical: </b> Trigger immediate action if dashboards reference restricted or unauthorized data sources.</p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>ssef_summary(ssef_data_ui_views)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieves dashboard metadata from Splunk UI views.<br><b>02</b> <code>NOT app IN</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Excludes default apps and views from the search.<br><b>03</b> <code>search="*WinEventLog*"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters dashboards containing "WinEventLog" in their search strings.<br><b>04</b> <code>foreach</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Splits panel fields for detailed inspection of references.<br><b>05</b> <code>stats</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates metadata for dashboards, views, and references.<br><b>06</b> <code>table</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Outputs a clean table summarizing dashboard usage of specific indexes and sourcetypes.<br>
explanation = <p>This search extracts information about dashboards that reference <b>specific indexes and sourcetypes</b>, particularly those containing "WinEventLog" in their search strings. It highlights the associated views, index, and sourcetype references, as well as configuration details such as time ranges and auto-refresh intervals.</p><p>- Uses <b>ssef_summary(ssef_data_ui_views)</b> to query dashboards and filter out default apps and views.<br>- Splits panel fields (e.g., search strings, base searches) for detailed analysis.<br>- Aggregates dashboard metadata, including labels, authors, and references to indexes and sourcetypes.<br>- Outputs a detailed table summarizing dashboard usage of specific data sources.</p><p>This analysis helps teams track data usage within dashboards, ensuring compliance with data policies and identifying opportunities for optimization.</p>
quid = C23478C45EA476E1971514BADF4807E1
search_author = Splunk Searchbase Assistant
related_info = <ul><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Knowledge/View" target="_blank">View Documentation</a><br>Details on managing Splunk dashboards and views.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/SearchReference/Stats" target="_blank">Stats Command Documentation</a><br>Learn how to aggregate dashboard metadata using stats.</li></ul>
description = <b>Identifies dashboards referencing specific indexes and sourcetypes</b>, with a focus on detecting usage of "WinEventLog."
search = `ssef_summary(ssef_data_ui_views)` `ssef_allowed_apps(app)` \
| foreach role, Splunk_Instance, acl_perms_*, *_reference, panel_title, time_range, auto_refresh_delay \
    [ eval <<FIELD>> = split('<<FIELD>>', "|") ] \
| foreach search BaseSearch \
    [ eval <<FIELD>> = split('<<FIELD>>', "#####") ] \
| stats `ssef_stats_rest_data_ui_views_fields` latest(newly_added) as newly_added by label app view_name \
| table label app author view_name view_label panel_title actions index_reference sourcetype_reference search BaseSearch *_reference time_range auto_refresh_delay

