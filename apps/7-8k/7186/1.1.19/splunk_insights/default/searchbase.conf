solution = <p>Previous Search:</p><div spellcheck="false" class="ql-code-block-container"><div class="ql-code-block">| `ssef_license_search_data` </div><div class="ql-code-block">| where License_Usage &gt; 0 </div><div class="ql-code-block">| rename Sourcetype as sourcetype </div><div class="ql-code-block">| lookup uce_custom_sourcetype_mapping sourcetype_name as sourcetype OUTPUT data_type </div><div class="ql-code-block">| lookup uce_sourcetype_mapping sourcetype_name as sourcetype OUTPUTNEW data_type </div><div class="ql-code-block">| stats max(num_searches) as num_searches by _time sourcetype data_type </div><div class="ql-code-block">| lookup uce_usecase_mapping data_type AS data_type OUTPUT use_case </div><div class="ql-code-block">| stats max(num_searches) as num_searches by _time sourcetype use_case </div><div class="ql-code-block">| lookup uce_usecase_mapping use_case AS use_case OUTPUT use_case_type </div><div class="ql-code-block">| stats max(num_searches) as num_searches by _time sourcetype use_case use_case_type </div><div class="ql-code-block">| eval Analytic_Use_Case = if( use_case_type IN("Analytic Use Case","Technical Use Case", "Hybrid Use Case"), use_case, null()) , Analytic_Capability = if( use_case_type IN("Analytic Capability","Technical Capability"), use_case, null()) </div><div class="ql-code-block">| bin _time span=1d </div><div class="ql-code-block">| addinfo </div><div class="ql-code-block">| eval num_days = ((relative_time(info_max_time, "@d") - relative_time(info_min_time, "@d")) / 86400) + 1 </div><div class="ql-code-block">| eventstats dc(_time) as num_active_days by sourcetype </div><div class="ql-code-block">| eval perc_active = round((num_active_days / num_days) * 100, 2) </div><div class="ql-code-block">| eval Active_Analytic_Capability = if((perc_active &gt;= `ssef_perc_active_threshold`) AND num_searches &gt; 0, Analytic_Capability, null() ) </div><div class="ql-code-block">| stats </div><div class="ql-code-block">    dc(Analytic_Capability) as Num_Analytic_Capabilities</div><div class="ql-code-block">    dc(Active_Analytic_Capability) as Num_Active_Analytic_Capabilities</div><div class="ql-code-block">    by _time </div><div class="ql-code-block">| eval Perc_of_Regularly_Accessed_Analytic_Capabilities_to_total = round((Num_Active_Analytic_Capabilities / Num_Analytic_Capabilities) * 100, 2) </div><div class="ql-code-block">| fillnull value=0 Num_Analytic_Capabilities, Num_Active_Analytic_Capabilities, Perc_of_Regularly_Accessed_Analytic_Capabilities_to_total </div><div class="ql-code-block">| fields _time Num_Analytic_Capabilities Num_Active_Analytic_Capabilities Perc_of_Regularly_Accessed_Analytic_Capabilities_to_total </div><div class="ql-code-block">| bin _time span=1d </div><div class="ql-code-block">| stats max(Num_Active_Analytic_Capabilities) as "# of Regularly Accessed Analytic Capabilities" by _time </div><div class="ql-code-block">``` | `ssef_delta_predict("# of Regularly Accessed Analytic Capabilities")`  ``` </div><div class="ql-code-block">| `ssef_no_data_post("# of Regularly Accessed Analytic Capabilities")`</div></div>
