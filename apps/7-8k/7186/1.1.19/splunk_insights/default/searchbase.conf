description = <p>Monitoring new Splunk user activity over the first 30 days helps identify engagement patterns that indicate successful adoption, such as frequent searches or dashboard use. Recognizing these behaviors early can highlight users likely to remain engaged, allowing for targeted support or training. Ensuring consistent usage during the initial period maximizes the chances that new users will continue to derive long-term value from the Splunk platform.</p>
explanation = <p>This search consumes the summarized account lifecycle KPI and normalizes events into daily buckets. It calculates the number of newly created user accounts per day, enabling visibility into provisioning activity trends and potential anomalies.</p>
execution_plan = <b>01</b> <code>`ssef_summary(ssef_ia4s_users_account_modifications)`</code><br> - Retrieve summarized account modification events from Insights summary storage.<br><b>02</b> <code>| bin span=1d _time | stats latest(*) ...</code><br> - Normalize into daily buckets and retain latest per-day context.<br><b>03</b> <code>| stats sum(eval(if(operation=="create",1,0)))</code><br> - Compute total daily new user creations.
solution = <p>Use this trend to validate that account provisioning aligns with expected administrative changes and IAM governance policies.</p>
default_viz = splunk.column
viz_options = { "stackMode":"stacked","seriesColors":["#ED0080","#F05A22","#F0D318","#00ABD6","#9400ED","#C83C10","#59C3AA","#EDA800","#ED00E3","#CFED00","#8098F6","#67AD50","#3200ED"],"legendDisplay":"top" }
search = `ssef_summary(ssef_audit_user_login_tracker)` NOT user IN (`ssef_default_users`, splunk-system-user) earliest=-30d \
    [ search `ssef_summary(ssef_ia4s_users_account_modifications)` operation="create" earliest=-30d \
    | stats count by dest_user \
    | rename dest_user as user \
    | fields user ] \
| eval sourcetype_reference = coalesce(sourcetype_reference,Sourcetype_Reference) \
| fields _time user app label name num_searches latest_logon latest_search total_search_time session search_type sourcetype_reference \
| bin _time span=1h \
| stats latest(*) as * by _time label app user \
| eval sourcetype_reference=split(sourcetype_reference, "|"), search_type=split(search_type, "|") \
```| eval sourcetype_reference = replace(sourcetype_reference, "[^A-Za-z0-9:_*-]", "") ```\
| stats dc(label) as num_search_heads values(search_type) as search_types dc(app) as num_apps_utilized sum(total_search_time) as total_search_time sum(num_searches) as num_searches dc(session) as num_logins dc(sourcetype_reference) as num_sourcetypes_searched by user \
| eval total_search_time_hr = round(total_search_time/3600,2) \
| table user num_searches total_search_time_hr total_search_time num_logins num_sourcetypes_searched num_search_heads search_types \
| sort - num_searches total_search_time \
| rename num_search_heads as "Distinct Search Heads" search_types as "Search Types" num_apps_utilized as "Distinct Apps Utilized" total_search_time_hr as "Total Search Time (hr)" num_searches as "Total Searches" num_logins as "Total Logins" num_sourcetypes_searched as "Distinct Sourcetypes Searched", total_search_time as "Total Search Time (Sec)"

