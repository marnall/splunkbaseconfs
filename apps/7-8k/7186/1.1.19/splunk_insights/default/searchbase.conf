description = <p>Identifying and ranking regularly used sourcetypes by resource usage is crucial for optimizing system performance and ensuring efficient use of infrastructure. Resource-heavy sourcetypes may provide valuable insights but could also strain the system if not managed properly.</p>
viz_options = { "count": 100 }
search = `ssef_regularly_accessed_sourcetypes` \
| where search_coverage_percent >= `ssef_perc_active_threshold` \
| join type=left searched_pattern \
    [| mstats fillnull_value=0 avg(spl.mlog.per_sourcetype_thruput.avg_age) as avg_event_age max(spl.mlog.per_sourcetype_thruput.max_age) as max_event_age sum(spl.mlog.per_sourcetype_thruput.kbps) as total_kbps sum(spl.mlog.per_sourcetype_thruput.ev) as total_events WHERE index=_metrics group=per_sourcetype_thruput NOT series IN (splunk*, audittrail, scheduler, stash, stash_new, mongod, kvstore, itsi_*, http_event_collector_metrics, search_telemetry, secure_gateway_app_internal_log, python_modular_input, python_upgrade_readiness_app) by series \
    | fillnull value=0 avg_event_age total_kbps max_event_age total_events \
    | where total_kbps > 1 \
    | eventstats sum(total_events) as overall_events sum(total_kbps) as overall_kbps \
    | eval relative_resource_score = ((total_events / overall_events) * 0.5) + ((total_kbps / overall_kbps) * 0.5) \
    | rename series as Sourcetype \
    | eval total_events=round(total_events) \
    | foreach total_kbps avg_event_age max_event_age \
        [ eval <<FIELD>> = round(<<FIELD>>, 2)] \
    | lookup ssef_effectively_referenced_sourcetypes sourcetype_name AS Sourcetype OUTPUT sourcetype_name AS searched_pattern \
    | mvexpand searched_pattern \
    | fields searched_pattern relative_resource_score total_events total_kbps avg_event_age max_event_age ] \
| stats values(Indexes) as Indexes max(*) as * by inventory_sourcetype \
| where relative_resource_score > 0 \
| sort - relative_resource_score \
| table inventory_sourcetype Indexes relative_resource_score total_events total_kbps avg_event_age max_event_age dc_host dc_source newly_added \
| rename total_events as "Total Events", total_kbps as "Total Throughput (KBps)", avg_event_age as "Average Event Age", max_event_age as "Maximum Event Age", relative_resource_score as "Relative Resource Score" , inventory_sourcetype as Sourcetype , dc_host as "# of Hosts" , dc_source as "# of Sources" , event_count as "# of Events" , newly_added as "Newly Added" , vendor as Vendor , product as Product

