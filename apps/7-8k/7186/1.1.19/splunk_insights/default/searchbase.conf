[ssef_introspection_search_telemetry]
search_name = Sourcetype Usage by Hour
readonly = 1
ssef_cron = hourly
target_component = Search & Visualization
version = 2.0
date_created = 2025-10-8 10:56:14
date_updated = 2026-2-8 11:4:30
category = Splunk
sub_category = Search Telemetry
tags = Search,Sourcetypes
solution = <p>This search provides a comprehensive view of sourcetype utilization across Splunk environments, aiding in performance monitoring and operational efficiency.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate sourcetypes with high event counts and assess if they meet business needs.<br><b>2.</b> Optimize sourcetype indexing strategies based on usage data.<br><b>3.</b> Set alerts for unusual spike patterns in event counts.<br><b>4.</b> Analyze search head performance for effective resource allocation.<br><b>5.</b> Regularly review findings to adapt to changing data usage patterns.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level = case (event_count>10000,"Critical",event_count>5000,"High",event_count>1000,"Medium",event_count>100,"Low",event_count>0,"Normal")</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <br/><b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload!</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> <i>No significant usage, potential low interest in the sourcetype.</i></li><li><b>Low (Severity 2):</b> <i>Moderate usage, monitor for potential increases.</i></li><li><b>Medium (Severity 3):</b> <i>Increased usage, suitable for further analysis.</i></li><li><b>High (Severity 4):</b> <i>High usage indicates key business function; monitor closely.</i></li><li><b>Critical (Severity 5):</b> <i>Excessive usage suggests immediate attention required; investigate potential errors or misuse.</i></li></ul>
dispatch_earliest_time = -2h@h
dispatch_latest_time = -1h@h
dispatch_context = splunk_insights
dispatch_context_force = 1
dispatch_context_uid = 7186
execution_plan = <b>01</b> <code>search `ssef_summary(ssef_introspection_search_telemetry)`</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Initiate the search by pulling in summary data relevant to search telemetry.<br><b>02</b> <code>| fields _time label app provenance savedsearch_name Sourcetype event_count severity_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Select the necessary fields for further analysis.<br><b>03</b> <code>| bin _time span=1h</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Break down the events into hourly segments for better visibility.<br><b>04</b> <code>| stats latest(event_count) as event_count by _time label app provenance savedsearch_name Sourcetype</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate the most recent event count for each sourcetype.<br><b>05</b> <code>| stats sum(event_count) as sum_event_count by Sourcetype</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate the total events for each sourcetype.<br><b>06</b> <code>| `ssef_large_string_abbr(sum_event_count,2)`</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Format the total event count for readability.<br><b>07</b> <code>| sort 50 - sum_event_count</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Sort to identify the most queried sourcetypes.<br><b>08</b> <code>| fields Sourcetype sum_event_count_norm</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Narrow down the output to essential fields.<br><b>09</b> <code>| rename sum_event_count_norm as "Total # of Events Retrieved"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Rename the field for clarity in reporting.<br>
explanation = <p>This search offers valuable insights into the <b>utilization patterns</b> of various sourcetypes across different search heads and applications in a Splunk environment. By analyzing the <b>event count</b> and assessing performance metrics, users can identify trends that inform optimization strategies and resource allocation. This is crucial for ensuring that Splunk infrastructure is used effectively and efficiently. Furthermore, for junior Splunkers, the implementation of <b>stats</b> commands emphasizes its role in data aggregation and reporting, while the use of <b>bin</b> helps manage time series data effectively.</p>
quid = 3F6FE00444B5E7939FE1E9BBFBAB3708
updated_author = akhamis
related_info = <ul><li><a href="https://community.splunk.com/t5/Knowledge-Base/Monitoring-Search-Requests/ta-p/450634" target="_blank">Splunk Community: Monitoring Search Requests</a><br>Best practices and insights on tracking search requests in Splunk.</li><li><a href="https://docs.splunk.com/Documentation/Splunk/latest/Admin/Shareperformancedata" target="_blank">Splunk Docs: Share Performance Data</a><br>Learn about Splunk telemetry and how it can enhance monitoring.</li></ul>
description = <p>This search provides an hourly breakdown of which sourcetypes are being queried by different Splunk search heads and apps, along with the total number of events scanned for each and a basic severity indicator, potentially for monitoring <b>search activity</b> and <b>performance</b> within a Splunk environment.</p>
viz_options = { "count":100 }
search = index=_introspection sourcetype=search_telemetry \
| eval summary_id="ssef_introspection_search_telemetry" \
| fields _time host desc.app desc.provenance desc.savedsearch_name \
| spath path=desc.sourcetypes output=sourcetype_map \
| where sourcetype_map!="{}" \
| rex field=sourcetype_map "(?<key_value_pairs>\"[^\"]+\":[0-9]+)" max_match=0 \
| rename desc.* as * \
| bin _time span=1h \
| `ssef_instance_info(host)` \
| fillnull value="" app provenance savedsearch_name \
| stats count by _time label app provenance savedsearch_name key_value_pairs \
| rex field=key_value_pairs "\"?(?<extracted_sourcetype>[^\"]+)\"?:(?<sourcetype_event_count>[0-9]+)" max_match=0 \
| where isnotnull(extracted_sourcetype) AND extracted_sourcetype!="" \
| stats sum(sourcetype_event_count) as event_count by _time label app provenance savedsearch_name extracted_sourcetype \
| rename extracted_sourcetype as Sourcetype \
| eval critical=5, high=4, medium=3, low=2, normal=1 , severity_level = if(isnotnull(_time), 1, 2) \
| table _time label app provenance savedsearch_name Sourcetype event_count severity_level \
| `ssef_handle_no_results(1,"The ssef_introspection_search_telemetry summary job completed successfully without identifying any issues, and everything is operating as expected.")`

[ssef_introspection_search_telemetry_post]
search_name = Sourcetype Usage by Hour Details
readonly = 1
diagnostic_searches = ssef_introspection_search_telemetry
version = 2.0
date_created = 2025-10-8 10:58:13
date_updated = 2026-2-8 11:4:10
