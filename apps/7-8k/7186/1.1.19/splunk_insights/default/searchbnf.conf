[ssef-command]
syntax       = ssef (checksgroup=<string>)? (jobs=<string>)? (adhoc=<string>)? (historical=<bool>)? (timeout=<integer>)? (task_id=<string>)? (time_from_searchbase=<bool>)?
shortdesc    = Run searchbase jobs...
description  = Run searchbase jobs. Runs either a checksgroup (a series of checks), jobs (a series of jobs), or adhoc (an individual search). \
               The historical parameter governs whether the output should write summary data from the results of the search \
               Times out after timeout, a task_id may be set and the time can be specified in the current search or taken from the searchbase specification.
example1     = | ssef jobs="ssef_splunk_instance_info,ssef_admin_eventtypes"
comment1     = Runs the provided jobs
example2     = | ssef checksgroup="ssef_checksgroup"
comment2     = Runs jobs in the checksgroup "ssef_checksgroup"
example3     = | ssef adhoc="ssef_splunk_instance_info" time_from_searchbase=1 historical=true
comment3     = Runs a single searchbase.conf search in the foreground, similar to the savesearch command and \
               will use time provided in searchbase.conf and save the results to a summary index
maintainer   = Splunk Field Innovation Engineering
usage        = public

