########## DataExport ##########
[dataexport-command]
syntax       = dataexport target_url=<string> username=<string> customer_name=<string> (local_verify=<string>)?
shortdesc    = Export data as JSON, compress to ZIP, and upload to a REST endpoint.
description  = \
    The `dataexport` command collects incoming events, converts them into JSON format, \
    compresses the JSON data into an in-memory ZIP file, and uploads the ZIP file to a specified remote REST API endpoint. \
    This command is primarily used for securely exporting data from Splunk to external systems. \
\
    The local_verify determines how local rest calls will be verified and may contain True, False, or a path to a string for a verification certificate.

example1     = | savedsearch <SAVEDSEARCH> | dataexport target_url="https://uploadsvc.splunk.com/api/v2" username="<USER>" customer_name="<NAME>"
comment1     = \
    Export data from a saved search to the specified REST API endpoint. Replace `<SAVEDSEARCH>`, `<USER>`, and `<NAME>` with actual values.
example2     = | savedsearch <SAVEDSEARCH> | dataexport target_url="https://uploadsvc.splunk.com/api/v2" username="<USER>" customer_name="<NAME>" local_verify="False"
comment2     = \
    Export data from a saved search to the specified REST API endpoint. Replace `<SAVEDSEARCH>`, `<USER>`, and `<NAME>` with actual values.


maintainer   = Splunk Field Innovation Engineering
usage        = public
########## DataExport ##########

