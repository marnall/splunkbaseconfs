[updatesearchbaseconf-command]
syntax       = updatesearchbaseconf (dryrun=<bool> | force=<bool>)
shortdesc    = Safely updates and reloads the searchbase.conf file from S3.
description  = \
    Downloads the "searchbase.conf" file from a fixed S3 location. \
    It compares a timestamp-based version in the format `# version = <YYYYMMDDHHMM>` in the S3 file against the local file to ensure updates are only applied if the remote version is newer. \
    \p\
    The command requires an explicit action (`dryrun` or `force`) to be specified to prevent accidental execution. After a successful update, it triggers a targeted configuration reload for the "conf-searchbase" context, avoiding a full Splunk refresh.
tags         = update, reload, refresh, config, s3, searchbase
related      = updatecsvfromexternal
example1     = | updatesearchbaseconf dryrun=true
comment1     = Checks the S3 version against the local version without making any changes. This is the recommended first step to verify an update is needed.
example2     = | updatesearchbaseconf dryrun=false
comment2     = Performs a safe update. The command will only proceed if the S3 version is newer than the local version.
example3     = | updatesearchbaseconf force=true
comment3     = Forces an update by bypassing the version check. Use this for emergency rollbacks or to overwrite a known-bad local file.
comment      = IMPORTANT: Running the command without any options will return an error. You must explicitly choose an action. This command requires the user's role to have the 'admin_all_objects' capability.
maintainer   = Splunk Field Innovation Engineering
usage        = public

