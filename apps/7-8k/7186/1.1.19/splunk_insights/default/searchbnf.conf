########## ScheduledExport ##########
[scheduledexport-command]
syntax       = scheduledexport (username=<string>)? (customer_name=<string>)? (local_verify=<string>)? (collection_filter=<string>)? (max_kpi_wait=<int>)? (debug=<string>)?
shortdesc    = Discover, run, and upload KPI searches as a ZIP archive.
description  = \
    The `scheduledexport` command discovers KPI searches from ssef and searchbase configuration, \
    runs each KPI search, collects the results, compresses them into a ZIP archive \
    (one JSON file per KPI), and uploads the ZIP to a remote REST API endpoint. \
    This command is self-contained and requires no piped input, making it suitable for scheduled execution. \
\
    The collection_filter option controls which ssef collection to discover KPIs from (default: ssef_cloud_collection). \
    The max_kpi_wait option sets the maximum seconds to wait for each KPI search to complete (default: 600). \
    The local_verify option determines how local REST calls will be verified and may contain True, False, or a path to a verification certificate. \
    The debug option enables verbose DEBUG logging when set to True (default: False).

example1     = | scheduledexport
comment1     = \
    Discover and export all KPI searches from the default ssef_cloud_collection.
example2     = | scheduledexport local_verify="False" collection_filter="ssef_cloud_collection"
comment2     = \
    Export KPI searches with SSL verification disabled for local REST calls, targeting a specific collection.


maintainer   = Splunk Field Innovation Engineering
usage        = public
########## ScheduledExport ##########
