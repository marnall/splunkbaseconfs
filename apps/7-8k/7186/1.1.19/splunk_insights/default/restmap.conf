
[eai:conf-ssef]     
capability.read=search
capability.write=search

[script:ai_insight_rest]
match = /aiinsight
script = ai_insight_rest.py
scripttype            = persist
handler               = application.AiInsightHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3

[script:check_version]
match = /checkversion
script = check_version.py
scripttype            = persist
handler               = application.CheckVersionHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3

[script:ai_rest]
match = /askai
script = ai_rest.py
scripttype            = persist
handler               = application.AiHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3


[script:collection_status]
match = /collectionstatus
script = collection_status.py
scripttype            = persist
handler               = application.CollectionStatusHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
python.version        = python3