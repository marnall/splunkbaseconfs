[install]
is_configured = 0

[preflight_check]
checks = preflight_for_cim_app,preflight_kvstore_service_check,preflight_license_usage_check,preflight_splunkd_check,preflight_splunk_resource_usage_check,preflight_audittrail_check,preflight_is4s_version_check,preflight_server_requirements_check,preflight_data_forwarding_check,preflight_monitoring_console_check,preflight_indexer_clustering_configuration_check,preflight_memory_tracker_check,preflight_csv_table_init,preflight_duplicates_check,preflight_is4s_server_is_stable,preflight_check_mc_role_conflict,preflight_instance_job_error_analysis,preflight_summary_data_availability_check

[limits]
max_concurrent_search = 3

[update]
skip = 0
remind =
version =

[whatsnew]
version = 
message = <dl style="margin:0;color:#0f1724;font-size:14px;">\
  <dt style="font-weight:700;margin-top:8px;">New</dt>\
  <dd style="margin:4px 0 0 18px;">\
    <ul style="margin:0;padding-left:18px;">\
      <li>Search Collection Builder: Single search now provides icon + drilldown by default.</li>\
      <li>Lantern Use Case Explorer: New summary data + metrics view update. <b>(Note: If previously activated, please deactivate/reactivate the collection to apply new data).</b></li>\
    </ul>\
  </dd>\
  <dt style="font-weight:700;margin-top:10px;">Improved</dt>\
  <dd style="margin:4px 0 0 18px;">\
    <ul style="margin:0;padding-left:18px;">\
      <li><b>UI/UX:</b> Presentation/Deck Builder icons/graphics print correctly, slides are reorderable, and layer controls are restored.</li>\
      <li><b>UI/UX:</b> Added table column tooltips and normalized headers; required fields in Collection Builder are now easier to set.</li>\
      <li><b>Docs & Training:</b> Added a glossary of terms and improved KPI descriptions in-app and in documentation.</li>\
    </ul>\
  </dd>\
  <dt style="font-weight:700;margin-top:10px;">Fixed</dt>\
  <dd style="margin:4px 0 0 18px;">\
    <ul style="margin:0;padding-left:18px;">\
      <li>Fixed error when clicking tabs in summary view.</li>\
      <li>Resolved multiple UCE view bugs related to bookmarking, UI, load performance, and metrics.</li>\
      <li>KPI bar customization UI now correctly displays names and visuals.</li>\
      <li>Presentation Builder: Delete, edit, and reorder slides functionality is now fully operational.</li>\
      <li>Macro/command fixes for ssef_dashboard_searches_v2 and help.</li>\
      <li>Summary dashboards now correctly honor custom visualization settings.</li>\
      <li>Dashboard panels no longer disappear upon time range changes.</li>\
      <li>KPI titles now accurately match their respective searches.</li>\
    </ul>\
  </dd>\
  <br>\
  To see the complete release notes, visit <a href="https://is4s.s3.us-east-1.amazonaws.com/docs/IS4S+Installation+and+User+Guide.pdf" target="_blank" rel="noopener">IS4S Release Notes</a>.\
  </dl>\