# View APT Falconer dashboards and detections
[capability::falconer_view]
disabled = 0

# Use Falconer context menus and pivots
[capability::falconer_context]
disabled = 0

# Create and modify Falconer signals
[capability::falconer_signal_write]
disabled = 0

# Administer Falconer configuration
[capability::falconer_admin]
disabled = 0

[capability::falconer_allowlist_approve]
disabled = 0

[role_falconer_viewer]
importRoles = user
falconer_view = enabled

[role_falconer_analyst]
importRoles = user
falconer_view         = enabled
falconer_context      = enabled
falconer_signal_write = enabled
edit_kvstore          = enabled

[role_falconer_admin]
importRoles = user
falconer_view         = enabled
falconer_context      = enabled
falconer_signal_write = enabled
falconer_admin        = enabled
falconer_allowlist_approve = enabled
edit_kvstore          = enabled
