[falconer_seed_contexts]
action.email.show_password = 1
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
disabled = 0
display.general.timeRangePicker.show = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = apt-falconer
request.ui_dispatch_view = search
search = | inputlookup falconer_context_actions.csv \
| eval enabled=tonumber(enabled), order=tonumber(order) \
| eval app_managed=1, user_modified=0 \
| eval app_version=coalesce(app_version, "$app_version$") \
| eval content_hash=md5(id."|".enabled."|".field."|".group."|".label."|".order."|".target."|".url."|".value_regex."|".view) \
| eval updated_time=now(), updated_by="apt-falconer" \
| eval created_time=coalesce(created_time, now()) \
| append [ | inputlookup falconer_contexts_lookup \
    | eval _existing=1 \
    | eval enabled=tonumber(enabled), order=tonumber(order) \
    | eval user_modified=tonumber(coalesce(user_modified,0)) \
    | eval app_managed=tonumber(coalesce(app_managed,0)) ] \
| eval _precedence=case(user_modified=1, 3, _existing=1, 2, true(), 1) \
| sort 0 id -_precedence -updated_time \
| dedup id \
| eval app_managed=coalesce(app_managed,1) \
| eval user_modified=coalesce(user_modified,0) \
| eval app_version=coalesce(app_version,"$app_version$") \
| eval content_hash=coalesce(content_hash, md5(id."|".enabled."|".field."|".group."|".label."|".order."|".target."|".url."|".value_regex."|".view)) \
| fields - _existing _precedence

[falconer_seed_contexts_rule2]
disabled = 0
enableSched = 0
cron_schedule =
request.ui_dispatch_app = apt-falconer
request.ui_dispatch_view = falconer_setup
search = | inputlookup falconer_context_actions.csv \
  | eval enabled=tonumber(enabled), order=tonumber(order) \
  | eval app_managed=1, user_modified=0 \
  | eval app_version=coalesce(app_version, "$app_version$") \
  | eval content_hash=md5(id."|".enabled."|".field."|".group."|".subgroup."|".label."|".order."|".target."|".url."|".value_regex."|".view) \
  | eval updated_time=now(), updated_by="apt-falconer" \
  | eval created_time=coalesce(created_time, now()) \
  | append [ | inputlookup falconer_contexts_lookup \
      | eval _existing=1 \
      | eval enabled=tonumber(enabled), order=tonumber(order) \
      | eval user_modified=tonumber(coalesce(user_modified,0)) \
      | eval app_managed=tonumber(coalesce(app_managed,0)) ] \
  | eval _precedence=case(user_modified=1, 3, _existing=1, 2, true(), 1) \
  | sort 0 id -_precedence -updated_time \
  | dedup id \
  | eval app_managed=coalesce(app_managed,1) \
  | eval user_modified=coalesce(user_modified,0) \
  | eval app_version=coalesce(app_version,"$app_version$") \
  | eval content_hash=coalesce(content_hash, md5(id."|".enabled."|".field."|".group."|".subgroup."|".label."|".order."|".target."|".url."|".value_regex."|".view)) \
  | fields - _existing _precedence \
  | outputlookup falconer_contexts_lookup

