request.ui_dispatch_app = apt-falconer
request.ui_dispatch_view = intel_detection_builder
description = Falconer-native IP intel matching. Disabled by default until setup macros are narrowed away from broad defaults.
search = search earliest=-20m@m latest=now (`zeek_index` OR `stream_index` OR `suricata_index` OR `sysmon_index` OR `win_index`) NOT index=_* \
