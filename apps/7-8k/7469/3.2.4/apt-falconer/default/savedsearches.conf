  | mvexpand _candidate \
  | rex field=_candidate "^(?<matched_field>[^=]+)=(?<matched_value>.*)$" \
  | lookup falconer_local_ip_intel ip as matched_value OUTPUT ip as matched_indicator description as intel_description source as intel_source threat_collection as intel_collection threat_group as threat_group confidence as intel_confidence weight as intel_weight \
  | where isnotnull(matched_indicator) \
  | eval indicator_type="ip", match_mode="falconer_native" \
  | stats count as event_count min(_time) as first_seen max(_time) as last_seen values(index) as matched_indexes values(sourcetype) as matched_sourcetypes values(host) as matched_hosts values(intel_source) as intel_source values(intel_collection) as intel_collection values(threat_group) as threat_group values(intel_description) as intel_description values(intel_confidence) as intel_confidence values(intel_weight) as intel_weight by indicator_type matched_indicator matched_field matched_value match_mode \
  | eval signal=matched_indicator, entity_type=indicator_type, entity_value=matched_indicator, signal_type="threat_intel", category="threat_intel", confidence=coalesce(mvindex(intel_confidence,0),"medium"), status="open", signal_source="falconer_intel_native", field=matched_field, value=matched_value, root_signal=1, hunt_id="intel-".md5(indicator_type."|".matched_indicator), signal_id=md5("falconer_intel|".indicator_type."|".matched_indicator."|".matched_field), title="Falconer Intel Match: ".matched_indicator, earliest=tostring(first_seen), latest=tostring(last_seen), description="Falconer-native scheduled intel match. Indicator=".matched_indicator."; Field=".matched_field."; Collection=".mvjoin(intel_collection,", ")."; Source=".mvjoin(intel_source,", ")."; Threat Group=".mvjoin(threat_group,", ")."; Event Count=".event_count."; Indexes=".mvjoin(matched_indexes,", ")."; Sourcetypes=".mvjoin(matched_sourcetypes,", ")."; Hosts=".mvjoin(matched_hosts,", "), created_time=now(), updated_time=now(), created_by="falconer_intel_match", updated_by="falconer_intel_match", app_managed=1, app_version="3.2.1", user_modified=0, content_hash=md5(signal_id."|".event_count."|".last_seen) \
  | appendpipe [ | stats count as signal_count dc(entity_value) as entity_count max(last_seen) as last_activity_time values(signal) as indicators values(intel_source) as sources by hunt_id | eval status="open", title="Intel Hunt: ".mvindex(indicators,0), description="Falconer-native intel matching observed ".signal_count." signal(s) from ".mvjoin(sources,", "), origin="falconer_intel_native", created_time=now(), updated_time=now(), created_by="falconer_intel_match", updated_by="falconer_intel_match", app_managed=1, app_version="3.2.1", user_modified=0, content_hash=md5(hunt_id."|".signal_count."|".last_activity_time), _new_hunt=1 | append [ | inputlookup falconer_hunts_lookup | eval _new_hunt=0 ] | eventstats max(eval(if(_new_hunt=0, created_time, null()))) as _existing_created_time max(eval(if(_new_hunt=0, user_modified, null()))) as _existing_user_modified by hunt_id | where NOT (_new_hunt=1 AND _existing_user_modified=1) | eval created_time=if(_new_hunt=1 AND isnotnull(_existing_created_time), _existing_created_time, created_time) | sort 0 hunt_id -_new_hunt -updated_time | dedup hunt_id | fields hunt_id status title description origin es_source_guid es_detection_name es_severity es_urgency es_link signal_count entity_count created_time created_by updated_time updated_by last_activity_time app_managed app_version content_hash user_modified | outputlookup falconer_hunts_lookup ] \
  | where isnotnull(signal_id) \
  | eval _new_signal=1 \
  | append [ | inputlookup falconer_signals_lookup | eval _new_signal=0 ] \
  | eventstats max(eval(if(_new_signal=0, created_time, null()))) as _existing_created_time max(eval(if(_new_signal=0, user_modified, null()))) as _existing_user_modified by signal_id \
  | where NOT (_new_signal=1 AND _existing_user_modified=1) \
  | eval created_time=if(_new_signal=1 AND isnotnull(_existing_created_time), _existing_created_time, created_time) \
  | sort 0 signal_id -_new_signal -updated_time \
