[falconer_seed_signal]
disabled = 0
icon_path = appIcon.png
is_custom = 1
label = Seed Falconer Hunt
description = Start or update a Falconer hunt from an Enterprise Security finding, preserving structured context and deduplicated investigation signals.
payload_format = json
param._cam = {"category": ["Information Tracking"], "task": ["create", "update"], "subject": ["splunk.event"], "technology": [{"vendor": "APT Falconer", "product": "APT Falconer", "version": ["3.2.4"]}], "supports_adhoc": true, "supports_cloud": true}
python.version = python3
python.required = 3.13

[falconer_send_notes_to_es]
disabled = 0
icon_path = appIcon.png
is_custom = 1
label = Falconer Send Notes to ES
description = Send Falconer hunt and story notes back to Enterprise Security Mission Control notes, with classic finding comments as a compatibility fallback.
payload_format = json
param._cam = {"category": ["Information Conveyance", "Information Tracking"], "task": ["create", "update"], "subject": ["splunk.investigation"], "technology": [{"vendor": "APT Falconer", "product": "APT Falconer", "version": ["3.2.4"]}], "supports_adhoc": true, "supports_cloud": true}
python.version = python3
python.required = 3.13
