
[admin:TA_armory]
match = /
members = TA_armory_settings, TA_armory_vulnerabilities

[admin_external:TA_armory_settings]
handlertype = python
python.version = python3
handlerfile = TA_armory_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true

[admin_external:TA_armory_vulnerabilities]
handlertype = python
python.version = python3
handlerfile = TA_armory_rh_vulnerabilities.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
