
[expose:TA_armory_settings]
pattern = TA_armory_settings
methods = POST, GET

[expose:TA_armory_settings_specified]
pattern = TA_armory_settings/*
methods = POST, GET, DELETE

[expose:TA_armory_vulnerabilities]
pattern = TA_armory_vulnerabilities
methods = POST, GET

[expose:TA_armory_vulnerabilities_specified]
pattern = TA_armory_vulnerabilities/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
