##Populating the Required lookups
[Generate OT Asset Lookup]
action.email.useNSSubject = 1
alert.track = 0
cron_schedule = */1 * * * *
description = This search runs daily and generates a list of assets in the last 30 days.  This list can then be exported and used in Enterprise Security and the OT Security Add-on for Splunk.  Note: to automatically use an outputlookup command can added to automatically update the lookup in ES.
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
display.events.fields = ["host","source","sourcetype","app","description","id","severity","severity_no","signature","signature_id","type","src","dest","severity_id"]
display.general.timeRangePicker.show = 0
display.general.type = statistics
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
enableSched = 1
display.page.search.mode = verbose
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = 	TA-honeywell-for-splunk
request.ui_dispatch_view = search
search = index=sf* sourcetype="sf:assets"\
| eval ip=if(ip="255.255.255.255", "", ip)\
| dedup ip\
| eval hw_join=((lower(nt_host)+":")+asset_id)\
| table  asset_id,asset_model,asset_status,asset_system,asset_type,asset_vendor,asset_version,asset_criticality,bunit,category,city,classification,country,dns,end_of_support,exposure,hw_join,ip,is_expected,lat,lon,location,mac,nt_host,owner,parent_asset_id,pci_domain,priority,product_details,requires_av,serial,should_timesync,should_update,site_id,vlan,zone\
| outputlookup ot_asset_lookup.csv

