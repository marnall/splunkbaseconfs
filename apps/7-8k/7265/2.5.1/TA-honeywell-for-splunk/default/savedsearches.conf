|stats count

[Honeywell Assets With Risk]
action.keyindicator = 1
action.keyindicator.error_message = Unable to load the search
action.keyindicator.group.0.name = security_posture
action.keyindicator.group.0.order = 7
action.keyindicator.related_searches = []
action.keyindicator.subtitle = Total Assets with risk
action.keyindicator.title = All Honeywell Assets With risk
action.keyindicator.value = count
cron_schedule = */6 * * * *
dispatch.earliest_time = 1
dispatch.latest_time = now
enableSched = true
search = index=sfindex sourcetype="sf:alert"\
|lookup ot_asset_lookup asset_id AS alert_ip OUTPUT ip AS assets \
| stats count by assets \
| where count >=1 \
|stats count
