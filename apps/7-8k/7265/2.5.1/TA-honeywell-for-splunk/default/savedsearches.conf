	| dedup ip\
	| eval asset_criticality=if(isnull(priority),"Unknown",priority)\
	| eval priority_join= if(isnull(asset_type),"",lower(asset_type))+":"+if(isnull(exposure),"",lower(exposure))+":"+if(isnull(location),"",lower(location))\
	| table  asset_type,exposure,location,asset_count,asset_criticality,priority_join\
	| outputlookup ot_asset_pri_matrix.csv
	
