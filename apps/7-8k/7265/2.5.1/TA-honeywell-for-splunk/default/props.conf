[source::...ta-honeywell-for-splunk*.log*]
sourcetype = tahoneywellforsplunk:log

[source::...ta_honeywell_for_splunk*.log*]
sourcetype = tahoneywellforsplunk:log

[sf:assets]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
NO_BINARY_CHECK = 1
DATETIME_CONFIG = CURRENT
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
EXTRACT-asset_id = ip\=(?<asset_id>.*?)\s
EVAL-asset_type = if(isnull(assetTypes),"Unknown",assetTypes)
EVAL-src_asset_type = if(isnull(assetTypes),"Unknown",assetTypes)
EXTRACT-host_name = hostname\=(?<host_name>.*?)\s
EVAL-nt_host = if(isnull(host_name),"na",host_name)
EVAL-category = "ot" + if(isnotnull(operatingSystem), "|" + operatingSystem, "")
EXTRACT-asset_criticality = criticality\=(?<asset_criticality>.*?)\s
EVAL-mac = if(isnull(mac),"None",mac)
EVAL-serial = if(sourcetype="sf:assets","",serial)
EXTRACT-vlan = vlanId\=(?<vlan>.*?)\s
EXTRACT-site_id = site\sid\=(?<site_id>.*?)\t
EVAL-bytes = totalBytes
EVAL-bunit = if(isnull(ou),"organization",ou)
EVAL-product_detalis = plcDetails
EVAL-asset_system = if(isnull(operatingSystem),"unknown",operatingSystem)
EXTRACT-model_number = 'model_number':\s'(?<model_number>\w+)'
EVAL-asset_model = if(isnull(model_number),"NA",model_number)
EVAL-asset_vendor = case(vendor="Siemens AG,","siemens", vendor="Hewlett Packard","hewlett-packard",isnull(vendor),"NA", true(), vendor)
EXTRACT-software_version = 'software_version':\s\'(?<software_version>.*?)'
EVAL-asset_version = if(isnull(software_version),"Unknown",software_version)
EVAL-country = if(isnull(country),"Unknown",country)
EVAL-zone = if(isnull(zone),"Unknown",zone)
EVAL-type = if(isnull(type) OR type="","asset",type)
EVAL-asset_status = if(isnull(asset_status),"Unknown",asset_status)
EXTRACT-priority = 'criticality':\s'(?<priority>\w+)'
EXTRACT-cve = cveProduct\=(?<cve>.*?)\t
EVAL-asset_name = ip

[sf:syslog]
SEDCMD-stripnull = s/\\x00//g
TRANSFORMS-routing = route_alert, default_to_audit

[sf:alert]
DATETIME_CONFIG = CURRENT
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1
EXTRACT-app = CEF:[ ]?\d+\|(?<app>\w+)\|
EXTRACT-body = details\=(?<body>.*?)\|
EXTRACT-description = details\=(?<description>.*?)\|
EXTRACT-signature_id-event_name-severity_id = \|(?<signature_id>\d+)\|(?<event_name>.*?)\|(?<severity_id>.*?)\|
EXTRACT-id = alert_seq\=(?<id>.*?)\|
EXTRACT-explanation = explanation\=(?<explanation>.*?)\|
EXTRACT-remediation = remediation\=(?<remediation>.*?)\|
EXTRACT-business_unit = site\=(?<business_unit>.*?)\|
EVAL-severity = case(severity_id == 0 OR severity_id == 1, "log",severity_id == 2 OR severity_id == 3, "informational",severity_id == 4 OR severity_id == 5, "low",severity_id == 6 OR severity_id == 7, "medium",severity_id == 8 OR severity_id == 9, "high",(severity_id == 10 OR severity_id > 10), "critical",severity_id == "", "unknown")
EVAL-signature = event_name
EVAL-title = event_name
EVAL-subject = event_name
EVAL-src_ip = src
EVAL-dst = dst\=(?<dst>.*?)\|
EVAL-dest_ip = replace(dst, "\\\\x00", "")
EXTRACT-src = alert_ip\=(?<src>.*?)\|
EXTRACT-vendor_region = site\=(?<vendor_region>.*?)\|
EVAL-type = if(isnull(type) OR type="","alert",type)
EXTRACT-vendor_account = :[\s]?\d+\|(?<vendor_account>.*?)\|
LOOKUP-asset_type = ot_asset_lookup ip AS alert_ip OUTPUT asset_type
LOOKUP-src_asset_type = ot_asset_lookup ip AS alert_ip OUTPUT asset_type AS src_asset_type
LOOKUP-src_asset_system = ot_asset_lookup ip AS alert_ip OUTPUT asset_system AS src_asset_system
EVAL-src_category = if(isnull(src_category) OR src_category="","ot",src_category)
EVAL-category = if(isnull(src_category) OR src_category="","ot",src_category)
EVAL-SF_status = if(isnull(status),"Unknown",status)
# EVAL-risk_object = if(src="None","",src)

[sf:cves]
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1
NO_BINARY_CHECK = 1
DATETIME_CONFIG = CURRENT
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N
EXTRACT-ip = ip\=(?<asset_id>.*?)\t
EXTRACT-mac = mac\=(?<mac_address>.*?)\t
EXTRACT-host_name = hostname\=(?<host_name>.*?)\t
EXTRACT-vendor = vendor\=(?<vendor>.*?)\t
EXTRACT-cve_id = cve_id\=(?<cve_id>.*?)\t
EXTRACT-details = details\=(?<details>.*?)\t
EXTRACT-date = published_on\=(?<date>.*?)\t
EXTRACT-cvss = cvss\=(?<cvss>.*?)\t
EXTRACT-status = status\=(?<status>.*?)\t
EXTRACT-kev_cve = kev_cve\=(?<kev_cve>.*?)\t
EXTRACT-match = match\=(?<match>.*?)\t
EXTRACT-site_id = site[_ ]id\=(?<siteid>\d+)(\t)?

[sf:audit]
DATETIME_CONFIG = CURRENT
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1
EXTRACT-app = CEF:[ ]?\d+\|(?<app>\w+)\|
EXTRACT-user-user_full_name-category-action-description-status = CEF:[^\|]*\|[^\|]*\|[^\|]*\|(?<user>[^|]+)\|(?<user_full_name>[^|]+)\|(?<category>[^|]+)\|(?<action>[^|]+)\|(?<description>[^|]+)\|(?<status>[^|]+)
