# sourcetype
[force_sourcetype_secui]
DEST_KEY = MetaData:Sourcetype
REGEX = \[(packet|raw)\]
FORMAT = sourcetype::secui:$1

## REPORT
## RAW
[secui_raw_extract]
DELIMS = "\t"
FIELDS = "logHeader","dateTime","hostname","epoch","type","x_1","protectionDomain","interface","segment","direction","vlanId","x_5","src_ip","dest_ip","src_port","dest_port","protocol","x_6","x_7","x_8","x_9","moduleType","eventId","eventName","actionOption","signatureType","category","x_10","severity_id","action","packetId"

## LOOKUP
[secui_severity_lookup]
filename = secui_severity_lookup.csv


## PACKET
[secui_packet_extract]
DELIMS = "\t"
FIELDS = "syslog_header","packet_id","packet_hash"

