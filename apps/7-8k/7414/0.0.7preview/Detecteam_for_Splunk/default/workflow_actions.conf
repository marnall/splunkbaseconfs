[Review correlation search settings]
display_location = both
fields = search_name
label = Review correlation search settings
link.method = get
link.target = blank
link.uri = /app/SplunkEnterpriseSecuritySuite/correlation_search_edit?search=$search_name$
type = link

[Review Detecteam scenario details]
display_location = both
fields = detecteam_scenario
label = Review Detecteam scenario details
search.app = Detecteam_for_Splunk
search.preserve_timerange = 0
search.search_string = | inputlookup scenarios_MITRE.csv | search uuid="$detecteam_scenario$"
search.target = blank
type = search

[List all correlation search by MITRE Technique]
display_location = both
fields = mitre_techniques
label = List all correlation search by MITRE Technique
search.app = Detecteam_for_Splunk
search.preserve_timerange = 1
search.search_string = | inputlookup correlationsearches_lookup | eval search_name=_key | lookup extract_technique_lookup annotations AS annotations OUTPUT extracted_techniques | eval mitre_techniques=if(isnotnull(extracted_techniques), split(extracted_techniques, "|"), "") | mvexpand mitre_techniques | search mitre_techniques=$mitre_techniques$
search.target = blank
type = search

[List all correlation search by Detecteam scenario]
display_location = both
fields = detecteam_scenario
label = List all correlation search by Detecteam scenario
search.app = Detecteam_for_Splunk
search.preserve_timerange = 1
search.search_string = | makeresults count=1  | eval detecteam_scenario="$detecteam_scenario$"  | lookup scenarios_MITRE.csv uuid as detecteam_scenario  | eval mitre_techniques=if(isnull(mitre_techniques), "No MITRE technique found for this scenario", mitre_techniques)  | stats count as event_count values(title) as title values(references) as references by detecteam_scenario mitre_techniques  | rex field=mitre_techniques mode=sed "s/\n/|/g"  | makemv delim="|" mitre_techniques  | mvexpand mitre_techniques  | eval observed="Yes"  | join type=outer mitre_techniques      [| inputlookup correlationsearches_lookup      | spathannotations      | eval search_name=_key      | lookup mitre_attack_lookup mitre_technique_id as annotations.mitre_attack OUTPUTNEW mitre_technique_id as mitre_techniques      | mvexpand mitre_techniques      | eventstats values(search_name) as all_available_search_by_mitre dc(search_name) as total_search_by_mitre by mitre_techniques      | fields mitre_techniques, search_name, all_available_search_by_mitre, total_search_by_mitre]  | eval total_search_by_mitre=if(isnull(total_search_by_mitre), "0", total_search_by_mitre)  | eval all_available_search_by_mitre=if(isnull(all_available_search_by_mitre), "No search is applicable for this technique", all_available_search_by_mitre)  | eval search_name=if(isnotnull(search_name), search_name, "No search is applicable for this technique")  | join type=outer search_name      [| rest splunk_server=local /servicesNS/-/-/configs/conf-savedsearches      | rename title as search_name action.notable as notable_enabled      | fields search_name, disabled, notable_enabled]  | join type=outer search_name      [ search `notable`      | eval triggered_search="1"      | stats count by search_name, triggered_search      | fields - count]  | eval triggered_search=if(isnull(triggered_search), "0", triggered_search)  | eval enabled=case(isnotnull(search_name) AND match(disabled, "1"), "Off",isnull(search_name) OR match(search_name, "No search is applicable for this technique"), "Not applicable", 1==1, "On")  | eval notable_enabled=case(isnull(search_name), "Not applicable", isnull(notable_enabled), "No", match(notable_enabled, "1"), "Yes", match(notable_enabled, "0"), "No")  | eventstats sum(triggered_search) as total_triggered_search_by_mitre by detecteam_scenario  | eval trigger_ratio=if(match(total_triggered_search_by_mitre, "0"), "0.00", round(total_triggered_search_by_mitre/total_search_by_mitre, 2))  | table detecteam_scenario, title, references, mitre_techniques, search_name, enabled, notable_enabled, observed, total_triggered_search_by_mitre, total_search_by_mitre, trigger_ratio, all_available_search_by_mitre
search.target = blank
type = search
