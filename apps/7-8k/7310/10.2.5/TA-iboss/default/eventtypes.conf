[iboss]
search = ( source=iboss OR sourcetype=iboss )

[iboss_audit_events]
search = sourcetype="iboss*" ( LOG_TYPE="AUDIT" OR LOG_TYPE="AGENT_REGISTRATION" OR LOG_SUB_TYPE="AGENT_REGISTRATION" )

[iboss_agent_registration]
search = sourcetype="iboss*" ( LOG_TYPE="AUDIT" OR LOG_TYPE="AGENT_REGISTRATION" OR LOG_SUB_TYPE="AGENT_REGISTRATION" OR ACTION="success" )

[iboss_authentication_events]
search = sourcetype="iboss*" ( ACTION="login" OR LOG_TYPE="AGENT_REGISTRATION" OR LOG_SUB_TYPE="AGENT_REGISTRATION" )

[iboss_ips_events]
search = sourcetype="iboss*" ( HOST="ibfirewall" OR IPS_LOG_ID="*" OR GENERATOR_ID="*" )

[iboss_dlp_events]
search = sourcetype="iboss*" LOG_SUB_TYPE="DLP"

[iboss_network_events]
search = sourcetype="iboss*" ( LOG_TYPE="WEB_LOG" OR url="http*" )

[iboss_dns_events]
search = sourcetype="iboss*" LOG_TYPE="DNS"

[iboss_web_events]
search = sourcetype="iboss*" LOG_TYPE="WEB_LOG"

[iboss_malware_events]
search = source="iboss*" ( MALWARE="1" AND ( MDE!="" OR MDE!="-" OR LOG_SUB_TYPE="MALWARE_CONTENT" ))

[iboss_malware_payloads]
search = sourcetype="iboss*" ( MALWARE="1" LOG_SUB_TYPE="MALWARE_CONTENT" AND ( MDE!="" OR MDE!="-" ))

[iboss_c2_events]
search = sourcetype="iboss*" ( CNC_FLAG="1" OR CNC_METADATA.ASSET_CNC_DETECTED="1" )

[iboss_c2_alerts]
search = sourcetype="iboss*" ( CNC_METADATA.ASSET_CNC_DETECTED="1" AND CNC_METADATA.ASSET_ACTION="Allowed" )