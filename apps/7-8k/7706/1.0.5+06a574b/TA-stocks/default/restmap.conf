[admin:TA-stocks_configuration]
match = /
members = TA-stocks_account, TA-stocks_settings

[admin:TA-stocks_inputs]
match = /
members = TA-stocks_alphavantage_daily, TA-stocks_tiingo_crypto_endofday, TA-stocks_tiingo_fx_current, TA-stocks_tiingo_iex_current, TA-stocks_tiingo_stock_endofday, TA-stocks_vanguard_graphql

[admin_external:TA-stocks_account]
