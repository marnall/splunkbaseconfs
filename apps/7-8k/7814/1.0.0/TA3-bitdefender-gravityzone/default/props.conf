[bitdefender:gz]
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Custom
description = Handles events from Bitdefender Gravityzone Cloud/Onpremise Security products family
DATETIME_CONFIG = CURRENT
pulldown_type = 1
TRUNCATE = 0
TRANSFORMS-gzva = extract_json_from_syslog
REPORT-general = bitdefender_gz-date, bitdefender_gz-module
REPORT-host-fields = bitdefender_gz-computer_id, bitdefender_gz-computer_ip, bitdefender_gz-hostname, bitdefender_gz-host_fqdn
REPORT-malware = bitdefender_gz-malware_type, bitdefender_gz-malware_name, bitdefender_gz-file_path, bitdefender_gz-file_hash
LOOKUP-malware_vendor_action = bitdefender_gz_action_lookup vendor_action OUTPUT action
# LOOKUP-eventcode = eventcode EventCode OUTPUTNEW EventDescription EventDescription AS signature

# ## CIM related processing
#FIELDALIAS-bitdefender_gz_vendor_action = final_status AS vendor_action
# FIELDALIAS-bitdefender_gz_category = malware_type AS category
# FIELDALIAS-bitdefender_gz_dest = computer_ip AS dest
# FIELDALIAS-bitdefender_gz_signature = malware_name AS signature
# EVAL-user = spath(_raw, "user.name")


## CIM mapping for Hyper Detect event

#FIELDALIAS-vendor_account = companyId AS vendor_account

## CIM mapping for sva event
# EVAL-status = case(product_update_available==1, "Available", product_reboot_required==1, "restart required")

## CIM mapping for modules event

## Eval statements

EVAL-vendor_product = case(isnotnull(product_type) AND (name=="Update Available"),product_type,isnotnull(installed_agent) AND name=="Exchange Malware Detected",installed_agent, 1=1,product_installed)
EVAL-user = case(isnotnull('user.name') AND (module=="aph" OR module=="application-control" OR module=="dp" OR module=="hd" OR module=="avc" OR module=="av" OR module=="uc" OR module=="ransomware-mitigation"), 'user.name',isnotnull(user_name) AND (name=="Invalid Exchange user credentials" OR module=="hvi" OR module=="exchange-user-credentials" OR name=="Storage Antimalware Event" OR name=="Login from new device" OR name=="Authentication audit" OR name=="Malware Outbreak" OR name="Network Incidents event"),user_name,isnotnull(username) AND (module=="hvi" OR module=="device-control"),username, module=="network-monitor" AND isnotnull('user.userName'), 'user.userName')
EVAL-dest = case(isnotnull(computer_fqdn) AND (module=="aph" OR module=="hd" OR module=="task-status" OR module=="hwid-change" OR module=="uninstall" OR module=="install" OR module=="supa-update-status" OR module=="exchange-malware" OR module=="application-control" OR module=="endpoint-moved-in" OR module=="endpoint-moved-out" OR module=="application-inventory" OR module=="arrakis-update-status" OR module=="avc" OR module=="hvi" OR module=="modules" OR module=="registration" OR module=="sva-load" OR module=="sva" OR module=="antiexploit" OR module=="network-monitor" OR name="Network Incidents event" OR module=="task-status" OR module=="uc" OR module=="troubleshooting-activity" OR module=="ransomware-mitigation" OR module=="new-incident" OR module=="av"), computer_fqdn, isnotnull(computer_name) AND (name=="Sandbox Analyzer Detection" OR module=="network-sandboxing"), computer_name,isnotnull(storage_name) AND (name="Invalid Exchange user credentials" OR name=="Storage Antimalware Event"), storage_name)
EVAL-category = case(isnotnull(aph_type) AND (module=="aph"), aph_type, isnotnull(exploit_type) AND (module=="avc"),exploit_type, isnotnull(target_type) AND (module=="dp"),target_type,isnotnull(attack_type) AND (module=="ransomware-mitigation"),attack_type, isnotnull(is_fileless_attack) AND (module=="hd") AND (is_fileless_attack=="true" OR is_fileless_attack==1),attack_type,isnotnull(malware_type) AND (module=="av" OR name=="Storage Antimalware Event"),malware_type,  isnotnull(threat_type) AND (name=="Sandbox Analyzer Detection"OR module=="network-sandboxing"),threat_type, isnotnull(detection_exploitTechnique) AND (name=="Sandbox Analyzer Detection" OR module=="antiexploit"),detection_exploitTechnique, isnotnull(detection_attackTechnique) AND (module=="network-monitor" OR name="Network Incidents event"),detection_attackTechnique, isnotnull(categories) AND (module=="uc"),categories, isnotnull(tostring('attack_types{}')) AND (module=="new-incident"),mvjoin('attack_types{}', ",") ,isnotnull('malware{}.malwareType') AND module=="exchange-malware", 'malware{}.malwareType')
EVAL-action = case(isnotnull(status) AND (module=="aph" OR module=="avc" OR module=="fw" OR module=="uc" OR name=="Storage Antimalware Event"),status, isnotnull(final_status) AND (module=="av" OR module=="hd"),final_status, isnotnull(overall_status) AND (module=="hvi"),overall_status, isnotnull(tostring(remediationActions)) AND (name=="network-sandboxing"),mvjoin('remediationActions{}',","),name=="Sandbox Analyzer Detection" AND isnotnull(tostring('file_info{}.remediation_action')),'file_info{}.remediation_action', isnotnull(detection_action) AND (module=="antiexploit"),detection_action,  isnotnull(actionTaken) AND (module=="network-monitor" OR name="Network Incidents event"),actionTaken, isnotnull(action_taken) AND (module=="network-monitor" OR name="Network Incidents event"),action_taken, isnotnull(action) AND (module=="device-control"),action,isnotnull(main_action) AND (module=="new-incident"),main_action ,isnotnull('malware{}.actionTaken') AND module=="exchange-malware",'malware{}.actionTaken') 
EVAL-status = case(isnotnull(status) AND (module=="arrakis-update-status" OR module=="supa-update-status"),status, product_update_available==1, "Available", product_reboot_required==1, "restart required", 1=1,status)
EVAL-signature = case(isnotnull(malware_name) AND (module=="av" OR module=="hd" OR module=="hvi" OR name=="Storage Antimalware Event" OR name=="Malware Outbreak"),malware_name, isnotnull(detection_name) AND (module=="network-monitor" OR name="Network Incidents event" OR module=="new-incident"),detection_name, isnotnull(available_version) AND (name=="Update Available"),available_version, product_update_available==1, "Available", product_reboot_required==1, "restart required" , isnotnull('malware{}.malwareName') AND module=="exchange-malware",'malware{}.malwareName')
EVAL-file_path= case(isnotnull(file_path) AND (module=="av" OR module=="hd" OR module=="hvi" OR module=="new-incident"),file_path, isnotnull(tostring('file_info{}.file_path')) AND (name=="Sandbox Analyzer Detection"),mvjoin('file_info{}.file_path', ","), module=="network-sandboxing" AND isnotnull(tostring('filePaths{}')),mvjoin('filePaths{}', ",") , isnotnull(application_path) AND (module=="uc"),application_path , name=="Storage Antimalware Event", malware_path)
EVAL-dvc = case(isnotnull(computer_fqdn) AND (module=="dp" OR module=="device-control"),computer_fqdn )
EVAL-recipient = mvjoin('recipients{}',",")
EVAL-app = case(isnotnull(protocol_id) AND (module=="fw"),protocol_id)
EVAL-src_ip = case(isnotnull(source_ip) AND (module=="network-monitor" OR name="Network Incidents event" OR module="new-incident"),source_ip)
EVAL-url = case(isnotnull(url) AND (module=="uc" OR module=="new-incident"),url)
EVAL-file_hash = case(isnotnull(file_hash_sha256) AND (module=="new-incident"),file_hash_sha256, name=="Storage Antimalware Event" AND isnotnull(malware_hash),malware_hash,1=1,hash)
EVAL-process_path = case(isnotnull(process_info_path) AND (module=="hd"),process_info_path, isnotnull(detection_path) AND (module=="antiexploit"),detection_path, isnotnull(exploit_path) AND (module=="avc"),exploit_path, 1=1, process_path)
EVAL-process_id = case(isnotnull(pid) AND (module=="hvi"),pid,isnotnull(process_pid) AND (module=="new-incident"),process_pid)
EVAL-incident = case(isnotnull(incident_id) AND (module=="new-incident"),incident_id)
EVAL-result_id = case(isnotnull(severity_score) AND (module=="new-incident"),severity_score)
EVAL-result = case(isnotnull(severity) AND (module=="new-incident"),severity)
EVAL-transport = case(isnotnull(protocol) AND (module=="new-incident"),protocol, isnotnull(port) AND (module=="new-incident"),port)
EVAL-user_name = case(isnotnull(username) AND (module=="new-incident"),username, 1=1, user_name)
EVAL-src_user = case(isnotnull(username) AND (module=="new-incident"),username)
EVAL-object = case(isnotnull(deviceName) AND (module=="device-control"),deviceName)
EVAL-object_category = case(isnotnull(deviceClass) AND (module=="device-control"),deviceClass)
EVAL-family = case(isnotnull(storage_type) AND (name=="Storage Antimalware Event"),storage_type)
EVAL-cpu_load_percent = case(isnotnull(cpuUsage) AND (module=="sva-load"),cpuUsage)
EVAL-mem_used = case(isnotnull(memoryUsage) AND (module=="sva-load"),memoryUsage)
EVAL-thruput = case(isnotnull(networkUsage) AND (module=="sva-load"),networkUsage)
EVAL-parent_process_id = case(isnotnull(parent_process_id) AND (module=="avc" OR module=="hd"),parent_process_id, isnotnull(parent_process) AND (module=="hvi"),parent_process, isnotnull(parent_process_pid) AND (module=="new-incident"),parent_process_pid )
EVAL-parent_process_path = case(isnotnull(parent_process_path) AND (module=="avc" OR module=="hd" OR module=="new-incident"),parent_process_path)
EVAL-vendor_account = case(isnotnull(companyId) AND (module=="adcloud" OR module=="hd" OR module=="fw" OR module=="exchange-user-credentials"),companyId)


