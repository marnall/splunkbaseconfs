[hp:syslog]
DATETIME_CONFIG=CURRENT
EXTRACT-hpbasefields=<(?P<priority>\d{1,})\>\s(?P<device_type>\w+)\:\s(?P<event_summary>[^\;^\r\n]+)
EXTRACT-hpdetailfield=<\d{1,}\>\s\w+\:\s.*\;\s(?P<event_detail>.*)
EXTRACT-hpsourceip=source_IP=\"(?P<source_IP>[^\"]+)\"
EXTRACT-hpdestip=destination_IP=\"(?P<destination_IP>[^\"]+)\"
EXTRACT-hpuser=user=\"(?P<user>[^\"]+)\"
EXTRACT-hpoutcome=outcome=(?P<outcome>[^\s]+)
MAX_TIMESTAMP_LOOKAHEAD=36
TRUNCATE=999999
TIME_FORMAT=%Y-%b-%d %I:%M %p (%Z%:z)
TIME_PREFIX=time\=\"
EVAL-app="HP Printer"
EVAL-vendor="HP"
EVAL-vendor_product="HP Printer"
EVAL-category="Printer"
EVAL-protocol="tcp"
EVAL-src=source_IP
EVAL-src_ip=source_IP
EVAL-src_user=user
EVAL-dest=coalesce(dest_IP,host)
EVAL-dest_ip=coalesce(dest_IP,host)
EVAL-signature=event_summary
EVAL-action=outcome