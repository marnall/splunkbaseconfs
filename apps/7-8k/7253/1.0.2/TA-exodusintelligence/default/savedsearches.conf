[Exodus: All Vulnerabilities]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = search
request.ui_dispatch_view = search
search = | inputlookup eve\
| eval temppublisheddate = 'value.published', \
tempmodifiedtime = 'value.cvemodified', \
Vendor = 'value.vendors', \
Product = 'value.products', \
Title = 'value.title', \
tempdesc = 'value.cvedescription', \
Identifiers = 'value.identifiers', \
"CVSS Score" = 'value.cvssscore', \
CPEs = substr('value.relevantcpeproducts',1,min(len('value.relevantcpeproducts'),300)), \
ZDIs = 'value.zdis', Description = substr('tempdesc',1,min(len('tempdesc'),200)), \
"Attack Vector" = 'value.attackvector', \
"CVSS Vector" = 'value.cvssvector', \
"Links" = 'value.externallinks.url' ```substr('value.externallinks.url',1,min(len('value.externallinks.url'),1675))```, \
CWE = 'value.cwe'\
| eval Published=strftime(strptime('temppublisheddate',"%Y-%m-%dT%H:%M:%S"),"%Y-%m-%d")\
| eval Updated=strftime(strptime('tempmodifiedtime',"%Y-%m-%dT%H:%M:%S.%6Q"),"%Y-%m-%d")\
| fillnull value="Vendor Unavailable" Vendor \
| fillnull value="Product Unavailable" Product \
| fillnull value="CPEs Unavailable" CPEs\
| fillnull value="CWE Unavailable" CWE\
| replace "" with "Title Unavailable" in Title \
| replace "n/a" with "Attack Vector Unavailable" in "Attack Vector"\
| sort 0 -"Published"\
| table Identifiers Published \
Updated \
Vendor \
Product \
Title \
"CVSS Score" \
"CVSS Vector" \
Description \
CPEs \
"Attack Vector" \
CWE \
Links

