
[Content Finder Update Dashboard Usage]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 0 * * * *
description = Find who has been using the dashboards and output to the summary index for use in the content finder dashboard
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
enableSched = 1
search = index=_internal sourcetype=splunkd_ui_access "\/data\/ui\/views\/*"\
| rex field=uri "data\\/ui\\/views\\/(?<dashboard>\w+)"\
| rex field=uri "servicesNS\/[a-zA-Z0-9._-]+\/(?<app>[a-zA-Z0-9._-]+)"\
| table _time user app dashboard\
| collect index=summary source=splunk-dashboard-usage
