[cyera:events]
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%Z
TIME_PREFIX = "date"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 30

[cyera:issues]
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = "updatedDate"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 30

[cyera:datastores]
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = "createdDate"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 30

[cyera:classifications]
KV_MODE = json

[cyera:audit]
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N%Z
TIME_PREFIX = "createdAt"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 30
FIELDALIAS-actor = email AS actor
FIELDALIAS-source_ip = ip AS source_ip
