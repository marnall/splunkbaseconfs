[Cyera_Login]
search = sourcetype="cyera:audit" (action="Login" OR action="SSO Login" OR action="login" OR action="sso_login")

[Cyera_Audit_Event]
search = sourcetype="cyera:audit"

[Cyera_Datastore_Logging_Disabled]
search = sourcetype="cyera:datastores" logging="Disabled"

[Cyera_Datastore_Public_Access]
search = sourcetype="cyera:datastores" (publicAccessibilityState="All Files Are Public" OR publicAccessibilityState="Has Public Endpoint" OR publicAccessibilityState="Allows Public Files")

[Cyera_Unmitigated_Risk_To_Sensitive_Data]
search = sourcetype="cyera:issues" riskStatus="Unmitigated" (severity="Critical" OR severity="High")

[Cyera_Issue_Open]
search = sourcetype="cyera:issues" status="Open"

[Cyera_Issue_All]
search = sourcetype="cyera:issues"

[Cyera_Data_Access_Event]
search = sourcetype="cyera:events"

[Cyera_Datastore_Inventory]
search = sourcetype="cyera:datastores"

[Cyera_Classification]
search = sourcetype="cyera:classifications"
