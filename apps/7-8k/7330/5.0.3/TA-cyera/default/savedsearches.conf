[Cyera - New Critical Issues]
description = Fires when new critical-severity issues are detected in Cyera data.
search = `cyera_index` sourcetype="cyera:issues" severity="Critical" status="Open" | dedup uid | table name datastoreName provider risk.riskType owner createdDate
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = 0 * * * *
is_scheduled = 1
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 4h
alert.suppress.fields = uid
counttype = number of events
relation = greater than
quantity = 0
action.email.sendresults = 1
action.email.inline = 1
action.email.subject = Cyera Alert: New Critical Issues Detected
disabled = 1

[Cyera - Stale Data Collection]
description = Fires when any Cyera sourcetype has not received new data in the last 4 hours, indicating a possible collection failure.
search = `cyera_index` sourcetype="cyera:*" | stats max(_time) as last_event by sourcetype | eval hours_ago=round((now()-last_event)/3600,1) | where hours_ago > 4 | eval last_event_time=strftime(last_event, "%Y-%m-%d %H:%M:%S") | table sourcetype hours_ago last_event_time
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 */4 * * *
is_scheduled = 1
enableSched = 1
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
action.email.sendresults = 1
action.email.inline = 1
action.email.subject = Cyera Alert: Stale Data Collection Detected
disabled = 1

[Cyera - Publicly Accessible Datastores]
description = Fires when datastores marked as publicly accessible are detected. These may represent a data exposure risk.
search = `cyera_index` sourcetype="cyera:datastores" (isPubliclyAccessible="true" OR isPubliclyAccessible=1) | dedup uid | table name type provider region sensitivity owner
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 6 * * *
is_scheduled = 1
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 24h
alert.suppress.fields = uid
counttype = number of events
relation = greater than
quantity = 0
action.email.sendresults = 1
action.email.inline = 1
action.email.subject = Cyera Alert: Publicly Accessible Datastores Found
disabled = 1

[Cyera - Unencrypted Sensitive Datastores]
description = Fires when sensitive or very-sensitive datastores are found without encryption enabled.
search = `cyera_index` sourcetype="cyera:datastores" (sensitivity="VerySensitive" OR sensitivity="Sensitive") (encryptionProperties.isEncrypted="false" OR encryptionProperties.isEncrypted=0) | dedup uid | table name type provider region sensitivity owner
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 6 * * *
is_scheduled = 1
enableSched = 1
alert.track = 1
alert.suppress = 1
alert.suppress.period = 24h
alert.suppress.fields = uid
counttype = number of events
relation = greater than
quantity = 0
action.email.sendresults = 1
action.email.inline = 1
action.email.subject = Cyera Alert: Unencrypted Sensitive Datastores Detected
disabled = 1

[Cyera - High Volume Security Events]
description = Fires when the number of security events in the past hour exceeds 500, which may indicate a burst of policy violations or active data exfiltration.
search = `cyera_index` sourcetype="cyera:events" | stats count | where count > 500
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = 15 * * * *
is_scheduled = 1
enableSched = 1
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
action.email.sendresults = 1
action.email.inline = 1
action.email.subject = Cyera Alert: High Volume of Security Events
disabled = 1

[Cyera - Unusual Login Activity]
description = Fires when a single user has more than 10 logins in one hour, which may indicate credential sharing or brute force activity.
search = `cyera_index` sourcetype="cyera:audit" (action="*logged in*" OR action="*Login*" OR action="*login*") | stats count by actor | where count > 10 | table actor count
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = 30 * * * *
is_scheduled = 1
enableSched = 1
alert.track = 1
counttype = number of events
relation = greater than
quantity = 0
action.email.sendresults = 1
action.email.inline = 1
action.email.subject = Cyera Alert: Unusual Login Activity Detected
disabled = 1
