[source::...ta-cyera*.log*]
sourcetype = tacyera:log

[source::...ta_cyera*.log*]
sourcetype = tacyera:log

[cyera:audit]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 1024
SHOULD_LINEMERGE = 0
TIME_PREFIX = "createdAt": "
category = Splunk App Add-on Builder
pulldown_type = 1

[cyera:classifications]
DATETIME_CONFIG = CURRENT
KV_MODE = json
SHOULD_LINEMERGE = 0
category = Splunk App Add-on Builder
pulldown_type = 1

[cyera:datastores]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 1024
SHOULD_LINEMERGE = 0
TIME_PREFIX = "createdDate": "
category = Splunk App Add-on Builder
pulldown_type = 1

[cyera:issues]
KV_MODE = json
MAX_TIMESTAMP_LOOKAHEAD = 1024
SHOULD_LINEMERGE = 0
TIME_PREFIX = "updatedDate": "
category = Splunk App Add-on Builder
pulldown_type = 1

[cyera:events]
KV_MODE = json
TIME_PREFIX = "date": "
category = Splunk App Add-on Builder
pulldown_type = 1
FIELDALIAS-cyera_event_type = "type" AS event_type
EVAL-event_category = case(match(type, "^Datastore.*Event$"), "Datastore", match(type, "^Classification.*Event$"), "Classification", match(type, "^.*Policy.*Event$"), "Policy", match(type, "^.*Issue.*Event$"), "Issue", match(type, "^.*Account.*Event$"), "Account", match(type, "^.*Deployment.*Event$"), "Deployment", match(type, "^.*Tag.*Event$"), "Tag", match(type, "^.*Itsm.*Event$"), "ITSM", match(type, "^.*M365.*Event$"), "M365", match(type, "^.*Report.*Event$"), "Report", match(type, "^.*Project.*Event$"), "Project", match(type, "^.*Email.*Event$"), "Email", match(type, "^.*Subscription.*Event$"), "Subscription", 1=1, "Other")

