[varonis-command]
syntax = varonis (command=(get_alerts|get_alerted_events|update_alert|threat_model))? (threat_model=<string>)? (status=("New"|"Under Investigation"|"Closed"))? (severity=(Low|Medium|High))? (alert_id=<string>)? (extra_fields=<string>)? (note=<string>)? (close_reason=("Other"|"True positive"|"Environment misconfiguration"|"Alert recently customized"|"Inaccurate alert logic"|"Authorized activity"|"Benign activity"))?
shortdesc = Generic command to interact with Varonis API
description = This command is used to interact with Varonis API. It can be used to get alerts, get alerted events, update alert status, and get threat models.
example1 = | varonis alert_id=8B5C59D3-CE2F-49CE-BF71-3037BEC53231 
comment1 = Get alert from Varonis
example2 = | varonis alert_id="AF1A5070-1A4C-4B89-A427-93846522EBE6|49CACFA9-8186-4CC9-B46F-017FE2621F8B"
comment2 = Get multiple alerts from Varonis
example3 = | varonis alert_id=AF1A5070-1A4C-4B89-A427-93846522EBE6 command=get_alerted_events
comment3 = Get alerted events from Varonis
example4 = | varonis alert_id=AF1A5070-1A4C-4B89-A427-93846522EBE6 command=update_alert note="Will be investigated later"
comment4 = Add note to alert
example5 = | varonis alert_id=AF1A5070-1A4C-4B89-A427-93846522EBE6 command=update_alert status="Under Investigation"
comment5 = Update alert status
example6 = | varonis alert_id=AF1A5070-1A4C-4B89-A427-93846522EBE6 command=update_alert status="Under Investigation" note="Investigation later"
comment6 = Update alert status and add note
example7 = | varonis alert_id=AF1A5070-1A4C-4B89-A427-93846522EBE6 command=update_alert status="Closed" close_reason="True positive"
comment7 = Close alert
example8 = | varonis command=threat_model
comment8 = Get list of threat detection policies
usage = public
tags = varonis

