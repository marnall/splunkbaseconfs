methods = POST, GET, DELETE

[expose:TA_mongo_audit_db_access_history]
pattern = TA_mongo_audit_db_access_history
methods = POST, GET

[expose:TA_mongo_audit_db_access_history_specified]
pattern = TA_mongo_audit_db_access_history/*
methods = POST, GET, DELETE

[expose:_splunkd_data]
pattern = data/*
methods = GET
