# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = 0
state = enabled
build = 3

[launcher]
author = Oodrive
version = 1.7.0
description = The Oodrive Workspace Tracking Add-on for Splunk allows you to fetch Oodrive application logs, specifically tracking events, directly through Splunk. By connecting to your Oodrive workspace, you'll be able to ingest functional logs into Splunk for real-time monitoring, security auditing, and deeper insights into your collaboration activities.

[ui]
is_visible = 1
label = Oodrive Workspace Tracking
docs_section_override = AddOns:released

[package]
id = TA-oodrive_logs_fetching

[triggers]
reload.addon_builder = simple
reload.ta_oodrive_logs_fetching_account = simple
reload.ta_oodrive_logs_fetching_settings = simple
reload.passwords = simple

