# [searchbnf.conf](http://docs.splunk.com/Documentation/Splunk/latest/Admin/Searchbnfconf)

[scanner-command]
syntax =  scanner (<scanner-options>)*
shortdesc = Scanner for Splunk, return events
description = Query the Scanner API to search object storage logs. Return the results as events.
usage = public
maintainer = Scanner, Inc.
comment1 = Search AWS CloudTrail logs for S3 GetObject events.
example1 = | scanner q="%ingest.source_type: 'aws:cloudtrail' and eventSource: s3.amazonaws.com and eventName: GetObject"
comment2 = Limit results to the first 100 events.
example2 = | scanner max_rows=100 q="eventName: GetObject"
comment3 = Use Scanner to compute stats aggregated by a field, and then turn the results into a stats table in Splunk.
example3 = | scanner q="eventSource: s3.amazonaws.com | stats count() as eventCount by eventName" | stats latest(eventCount) by eventName
category = generating
appears-in = 1.5
tags = scanner search

[scannertable-command]
syntax =  scannertable (<scanner-options>)*
shortdesc = Scanner for Splunk, return a table
description = Query the Scanner API to search object storage logs. Return the results as a table.
usage = public
maintainer = Scanner, Inc.
comment1 = Search AWS CloudTrail logs for S3 GetObject events.
example1 = | scannertable q="%ingest.source_type: 'aws:cloudtrail' and eventSource: s3.amazonaws.com and eventName: GetObject"
comment2 = Limit results to the first 100 events.
example2 = | scannertable max_rows=100 q="eventName: GetObject"
comment3 = Use Scanner to compute stats aggregated by a field, and then turn the results into a stats table in Splunk.
example3 = | scannertable q="eventSource: s3.amazonaws.com | stats count() as eventCount by eventName" | stats latest(eventCount) by eventName
category = generating
appears-in = 1.5
tags = scanner search

[scanner-options]
syntax = max_rows=<int> | q=<string>
