

[Threatmon - Set status]
actions = run
label = Threatmon: Set status
condition = sourcetype=threatmon:incident alarmCode=*
run.display = false
run.action = saved
run.attributeprefix = action.run.
action.run.savedsearch = | threatmonsetstatus alarm_id=$alarmCode$ status=$status$ api_url=https://external.threatmonit.io/api/threatmon/external/v1 api_key=$encrypted$
action.run.status = Open,In Progress,False Positive,Ignore,Resolved
action.run.status.label = Status
