[ccx_user_agent_extractions]
CLEAN_KEYS = 0
REGEX = Vendor=(?<Vendor>[^\"]+)\,\sApplication\=(?<Application>[^\,]+)\,\sVersion\=(?<Version>[^\,]+)\,\sBadge\=(?<Badge>[^\,]+)\,\sClientID\=(?<ClientID>[^\"]+)\"

[ccx_capture_file_name]
CLEAN_KEYS = 0
REGEX = \sc-url="(?:\w+:\/\/[^\/]+(?:\/\w+)+\/)(?<file_name>[^\.\/]*\.\w{3,4})"
