[tenable:ot:alerts]
DATETIME_CONFIG = CURRENT
TRUNCATE = 68000000
SHOULD_LINEMERGE = 0
category = Tenable

#https://docs.tenable.com/PDFs/OT-Security/Tenable_OT_Security_Syslog_Integration_Guide.pdf

REPORT-ccx_tenable_ot_auto_kv = ccx_tenable_ot_auto_kv
REPORT-ccx_tenable_ot_cef_field_header = ccx_tenable_ot_cef_field_header
REPORT-ccx_tenable_ot_extract_src = ccx_tenable_ot_extract_src
REPORT-ccx_tenable_ot_extract_system_asset_detail = ccx_tenable_ot_extract_system_asset_detail

EVAL-action = case(match(msg,"^Login.*") AND match(_raw,"^.*succeeded.*"),"success",match(msg,"^Login.*") AND match(_raw,"^.*failed.*"),"failure",match(msg,"^Asset edited.*") OR match(msg,"^Policy edited.*") OR (EventClass=="SYSTEM_LOG" AND (match(msg,"^.*add field.*") OR match(msg,"^.*server named.*edited"))),"modified",match(msg,"^Policy turned off.*") OR match(msg,"^Policy with id .*turned off") OR (((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143)) AND match(cs6,"^.*[S|s]top")),"stopped",(((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143)) AND match(cs6,"^.*[S|s]tart")),"started",match(msg,"^Exclusion for Policy.*created") OR match(msg,"^New user created.*"),"created",match(msg,"^Exclusion for Policy.*deleted"),"deleted",match(msg,"^IDS Engine ruleset update from file.*") OR match(msg,"^Nessus plugin set update from file.*"),"updated",match(msg,"^Policy turned on.*"),"started",match(EventClass,"^.*[D|d]ownload"),"downloaded",match(EventClass,"^.*[D|d]elete"),"deleted",match(EventClass,"^.*[U|u]pload"),"uploaded",(((EventClass_ID >=1 AND EventClass_ID <=94 ) OR (EventClass_ID >=126 AND EventClass_ID <=143)) AND match(EventClass,"^.*[D|d]isable")),"disabled",(((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143)) AND match(EventClass,"^.*[C|c]opy|.*[C|c]opied")),"copied",(((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143)) AND match(EventClass,"^.*[E|e]nable")),"enabled",(((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143)) AND match(EventClass,"^.*[U|u]nlock")),"unlocked",(((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143)) AND match(EventClass,"^.*[U|u]pdate")),"updated",(((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143)) AND match(EventClass,"^.*[M|m]odify|.*[M|m]odified")),"modified",(((EventClass_ID >=1 AND EventClass_ID <=94)) AND match(EventClass,"^.*[C|c]reate")),"created",EventClass_ID IN("98","99","109","113","118","119","120","121","122","125") OR ((EventClass_ID >=170 AND EventClass_ID <=174) AND match(_raw,"^.*success.*|.*not detect.*")),"allowed",((EventClass_ID >=170 AND EventClass_ID <=174) AND match(_raw,"^.*fail.*")),"blocked")
EVAL-category = if((EventClass IN("Intrusion Detection") OR EventClass_ID IN("98","99","109","113","118","119","120","121","122","125")) AND isnotnull('cs6') AND cs6!="Attacks - Various",'cs6','cat')  
EVAL-app = if(match(EventClass,"^.*Download") OR (EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143),replace(EventClass,"^(.*)\s+(Code|Hardware|Configuration).*","\1"),'vendor') 
EVAL-src =  if((EventClass_ID IN("123","96") OR (EventClass IN("SYSTEM_LOG") AND (match(msg,"^Login.*") OR match(msg,"^Asset edited. Asset name.*") OR match(msg,"^Sync.*succeed") OR match(msg,"^Asset.*hidden")))) AND isnull('src'),null(),coalesce('src','orig_src'))
EVAL-src_ip = if((EventClass_ID IN("123","96") OR (EventClass IN("SYSTEM_LOG") AND (match(msg,"^Login.*") OR match(msg,"^Asset edited. Asset name.*") OR match(msg,"^Sync.*succeed") OR match(msg,"^Asset.*hidden")))) AND isnull('src'),null(),coalesce('src','orig_src'))
EVAL-description = 'cs6'
EVAL-change_type = case(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*[P|p]olicy.*"),"policy",EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*rules.*"),"rule",EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*plugin.*"),"plugin",EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*user.*"),"AAA",(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*server.*")) OR EventClass_ID IN("8","9","114"),"configuration",EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*field.*"),"file",EventClass_ID IN("110","167","168","169"),"operational state",EventClass_ID IN("111"),"physical key",EventClass_ID IN("112"),"firmware")
EVAL-object =if(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^IDS Engine.*"),"ids engine",if(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^Nessus plugin.*"),"nessus plugin",if(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*for Policy.*"),replace(msg,"^Exclusion for\s+(.*)\s+(created|deleted|modified|updated)","\1"),if(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^Policy edited.*|Policy turned [on|off]"),replace(msg,"^(^Policy edited.|Policy turned off.|Policy turned on.)\s+(.*)","\2"),if(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^Policy with id.*"),replace(msg,"^(Policy with id\s+.*)\s+has.*","\1"),if(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*Username.*"),replace(msg,".*Username\:\s+(.*)","\1"),if(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*server named.*"),replace(msg,"(.*)\s+server named.*","\1"),if(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*add field.*|.*remove field.*|.*delete field.*|.*replace field.*"),replace(msg,".*field\s+(.*)\s+with.*","\1"),if(EventClass_ID IN("8","9","110","111","112"),"controller",if(EventClass_ID IN("167","168","169"),"PLC",if(EventClass_ID IN("114"),"port",if(((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143)),split('duser',","),null()))))))))))))
EVAL-object_attrs = if(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*"),'msg',if(((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143)),coalesce(if(isnotnull('duser'),'cs6'+" - "+'duser','cs6'),'cs6'),null()))
EVAL-object_category = case(EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*[P|p]olicy.*"),"policy",EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*rules.*"),"rule",EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*plugin.*"),"plugin",EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*user.*"),"AAA",EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*server.*") OR EventClass_ID IN("114"),"configuration",EventClass IN("SYSTEM_LOG") AND NOT match(msg,"^Login.*") AND match(msg,"^.*field.*"),"file",((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143) OR EventClass_ID IN("8","9","110","111","112")),"controller",EventClass_ID IN("167","168","169"),"PLC")
EVAL-body = 'cs6' 
EVAL-src_port = 'spt' 
EVAL-date = 'rt' 
EVAL-dest = if(match(msg,"^Login.*") OR (EventClass="SYSTEM_LOG" AND isnull('dst')),"tenable.ot",'dst') 
EVAL-dest_ip = 'dst' 
EVAL-dest_port = 'dpt' 
EVAL-dest_name = if((EventClass_ID >=1 AND EventClass_ID <=94) OR (EventClass_ID >=126 AND EventClass_ID <=143),split('duser',","),null())
EVAL-bytes_in = 'in' 
EVAL-status = if(isnotnull('outcome'),'outcome',if(match(_raw,"^.*[F|f]ail.*"),"failure","success"))
EVAL-reason = 'msg'
EVAL-src_mac = 'smac' 
EVAL-dest_mac = 'dmac'
EVAL-port = if(cs5Label="ports",split(cs5,","),null())
EVAL-ip = if(cs4Label="addresses",split(cs4,","),null())
EVAL-backplane_slot = if(cn2Label="bpslot",split(cn2,","),null())
EVAL-revision = if(cn1Label="revision",split(cn1,","),null())
EVAL-ids_type = if((EventClass IN("Intrusion Detection") OR EventClass_ID IN("98","99","109","113","118","119","120","121","122","125")),"application",null()) 
EVAL-type = case((EventClass_ID IN("96","95","123","124") OR (EventClass_ID >=144 AND EventClass_ID <=166)),"alert",(EventClass_ID IN("0","97","115","116","117") OR (EventClass_ID >=100 AND EventClass_ID <=108)),"alarm") 
EVAL-signature = if(EventClass IN("Intrusion Detection") OR (match(msg,"^Login.*") AND msg like("%failed%")),'msg',coalesce('cs6','cat'))
EVAL-signature_id = 'EventClass_ID'
EVAL-protocol = case(EventClass_ID IN("170","171"),"ftp",EventClass_ID IN("172","173","174"),"telnet",(EventClass_ID >=144 AND EventClass_ID <=166),"dnp3")
EVAL-transport = if(match(proto,"[T|t][C|c][P|p]|[U|u][D|d][P|p]|[I|i][C|c][M|m][P|p]"),lower('proto'),null()) 
EVAL-user = if(match(msg,"^Login.*"),replace(_raw,"^.*msg=Login.*\"(.*)\".*","\1"),coalesce('suser',split('duser',","))) 
EVAL-src_user = 'suser' 
EVAL-dvc = if(match(msg,"^Asset.*"),replace(_raw,"^.*msg=Asset\s+(.*)\s+was.*","\1"),coalesce('dvchost',"tenable.ot")) 
EVAL-importance_level = case(isnotnull(severity_id) AND severity_id >= 9, "Very-High", isnotnull(severity_id) AND severity_id >= 7 AND severity_id <= 8, "High", isnotnull(severity_id) AND severity_id >= 4 AND severity_id <= 6, "Medium", isnotnull(severity_id) AND severity_id >= 0 AND severity_id <= 3, "Low") 
EVAL-authentication_method = case(match(msg,"^Login.*") AND match(_raw,"^.*Login by local.*"),"local")

LOOKUP-ccx_tenable_ot_cim_severity = ccx_tenable_ot_cim_severity severity_id OUTPUTNEW severity

[tenable:io:vuln:was]

#https://www.tenable.com/plugins/was/families

EVAL-severity = if(isnotnull('finding.risk_factor'),case(match('finding.risk_factor',"Info.*|INFO.*|info.*"),"informational",match('finding.risk_factor',"Low|LOW|low"),"low",match('finding.risk_factor',"Medium|MEDIUM|medium"),"medium",match('finding.risk_factor',"High|HIGH|high"),"high",match('finding.risk_factor',"Critical|CRITICAL|critical"),"critical"),"unknwon") 
EVAL-dest = 'asset_name' 
EVAL-app = "Tenable WAS" 
EVAL-body = if('finding.family' IN("Authentication & Session","Web Applications","Data Exposure","General","Web Servers","Code Execution","File Inclusion"),tostring('finding.family')." - ".tostring('scan_name'),null()) 
EVAL-type = if('finding.family' IN("Authentication & Session","Web Applications","Data Exposure","General","Web Servers","Code Execution","File Inclusion"),"alert",null())
 