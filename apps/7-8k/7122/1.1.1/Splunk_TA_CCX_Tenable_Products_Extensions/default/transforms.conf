[ccx_tenable_ot_cef_field_header]
CLEAN_KEYS = 0
REGEX = CEF:\d+\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|([^|]*)\|(.*)
FORMAT = vendor::$1 product::$2 product_version::$3 EventClass_ID::$4 EventClass::$5 severity_id::$6 cef_extension::$7

[ccx_tenable_ot_auto_kv]
REGEX = (\w+)=(((?!\w+=).)*)(?= |$)
FORMAT = $1::$2
REPEAT_MATCH = true
MV_ADD = 0

[ccx_tenable_ot_extract_system_asset_detail]
CLEAN_KEYS = 0
REGEX = Asset\s+edited\.\s+Asset\s+name\:\s+(?<asset_name>.*)\,\s+Asset\s+ID\:\s+(?<asset_id>.*)
SOURCE_KEY = msg

[ccx_tenable_ot_extract_src]
CLEAN_KEYS = 0
FORMAT = orig_src::$1
REGEX = (\d+.\d+.\d+.\d+.)\s+CEF:\d+

[ccx_tenable_ot_cim_severity]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_tenable_ot_cim_severity.csv
