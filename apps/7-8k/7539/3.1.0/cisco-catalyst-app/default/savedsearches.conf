[cisco_catalyst_step_4_report_all]
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 0 0 * * *
enableSched = 1
dispatch.earliest_time = -1d
dispatch.latest_time = now
search = | savedsearch "cisco_catalyst_step_4_connections"\
| join macAddress type=left \
    [ savedsearch "cisco_catalyst_step_4_access_levels" ]\
| join macAddress type=left \
    [ savedsearch "cisco_catalyst_step_4_icam_attributes" ]\
| join macAddress type=left \
    [ savedsearch "cisco_catalyst_step_4_authentication_details" ]\
| table macAddress "C2C Last Auth" "C2C Auth Result" "C2C Authorization Source" "C2C Connection" "C2C Device Token" "C2C Primary Auth" "C2C Last Auth Access Assignment" dot1xEAPType dot1xEnabled dot1xAuthApplianceID wiredConnections wirelessConnections vpnConnections totalFullAccess totalRemediation totalUnknown icamLastAuthUser icamUserCA icamUserSubCA icamLastAuthDevice icamDeviceCA icamDeviceSubCA\
| fillnull value="N/A"\
| sort -num(totalFullAccess)\
| rename wiredConnections as "Wired Connections" wirelessConnections as "Wireless Connections" vpnConnections as "VPN Connections" totalFullAccess as "Total Full Access" totalRemediation as "Total Remediation" totalUnknown as "Total Unknown" icamLastAuthUser as "ICAM User" icamUserCA as "ICAM User CA" icamUserSubCA as "ICAM User Sub CA" icamLastAuthDevice as "ICAM Device" icamDeviceCA as "ICAM Device CA"

[cisco_catalyst_step_4_connections]
dispatch.earliest_time = -30d
dispatch.latest_time = now
search = `cisco_catalyst_app_index` sourcetype="cisco:ise:syslog" MESSAGE_CODE=3000\
| rex field=_raw "cisco-av-pair=mdm-tlv=device-mac=(?<vpnMac>[0-9A-Fa-f]{2}(-[0-9A-Fa-f]{2}){5})"\
| rename Calling_Station_ID as macAddress\
| eval macAddress = replace(upper(macAddress),"-",":")\
| eval vpnMac = replace(upper(vpnMac),"-",":")\
| eval macAddress = coalesce(vpnMac, macAddress)\
| eval macInEvent=if(match(macAddress, "[0-9A-F]{2}(:[0-9A-F]{2}){5}"), "true", "false")\
| where macInEvent="true"\
| chart count(NAS_Port_Type) over macAddress by NAS_Port_Type\
| rename Ethernet as wiredConnections, Virtual as vpnConnections, "Wireless - IEEE 802.11" as wirelessConnections\
| table macAddress wiredConnections wirelessConnections vpnConnections

[cisco_catalyst_step_4_access_levels]
dispatch.earliest_time = -30d
dispatch.latest_time = now
search = | tstats fillnull_value="N/A" `summariesonly` count from datamodel=Cisco_Catalyst_App where nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports AND Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ise_syslog_message_code="5200" by Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_calling_station_id Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_authorization_policy_matched_rule Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_total Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_total_full_access Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_total_remediation \
| rename Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_calling_station_id as macAddress Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_authorization_policy_matched_rule as AuthorizationPolicyMatchedRule Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_total as total Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_total_full_access as totalFullAccess Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_total_remediation as totalRemediation \
| eval macAddress = replace(upper(macAddress),"-",":") \
| eval macInEvent=if(match(macAddress, "[0-9A-F]{2}(:[0-9A-F]{2}){5}"), "true", "false") \
| where macInEvent="true" \
| chart count(AuthorizationPolicyMatchedRule) over macAddress by AuthorizationPolicyMatchedRule \
| addtotals fieldname=total \
| addtotals fieldname=totalFullAccess *Compliant* \
| addtotals fieldname=totalRemediation *Posture* \
| eval totalUnknown = total - totalFullAccess - totalRemediation \
| table macAddress totalFullAccess totalRemediation totalUnknown

[cisco_catalyst_step_4_icam_attributes]
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = -30d
dispatch.latest_time = now
search = `cisco_catalyst_app_index` sourcetype="cisco:ise:syslog" MESSAGE_CODE=5200 Protocol=Radius \
| dedup Calling_Station_ID\
| rename Calling_Station_ID as macAddress \
| eval macAddress = replace(upper(macAddress),"-",":")\
| eval icamUserCA = mvindex(Issuer___Common_Name, 0)\
| eval icamUserSubCA = mvindex(Issuer___Common_Name, 0,1)\
| eval icamUserName = mvindex(Subject___Common_Name, 0)\
| eval icamUserSerial = mvindex(Serial_Number, 0)\
| eval icamDeviceCA = if(mvfind(IsMachineAuthentication,"true")>0,mvindex(Issuer___Common_Name, 0), "N/A")\
| eval icamDeviceSubCA = if(mvfind(IsMachineAuthentication,"true")>0,mvindex(Issuer___Common_Name, 0), "N/A")\
| eval icamDeviceName = mvindex(Subject___Common_Name, 1)\
| eval icamDeviceSerial = mvindex(Serial_Number, 1)\
| eval icamLastAuthDevice = icamDeviceName + "--" + lower(icamDeviceSerial)\
| eval icamLastAuthUser = icamUserName + "--" + lower(icamUserSerial)\
| fillnull value=N/A\
| table macAddress icamDeviceCA icamDeviceSubCA icamLastAuthDevice icamUserCA icamUserSubCA icamLastAuthUser

[cisco_catalyst_step_4_authentication_details]
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = -7d
dispatch.latest_time = now
search = | tstats values(Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_cisco_av_pair) as cisco_av_pair values(Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_user_name) as "C2C Device Token" fillnull_value="N/A" `summariesonly` count from datamodel=Cisco_Catalyst_App where nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports AND ( Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ise_syslog_message_code="5200" OR Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ise_syslog_message_code="5400" ) AND Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ise_syslog_protocol="Radius" AND Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_calling_station_id=* by Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_calling_station_id Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_eap_tunnel Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_eap_authentication Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_authentication_method Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_radiusflow_type Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_authorization_policy_matched_rule Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ise_syslog_action Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_user_name Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ise_syslog_ise_servername _time \
| rename Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_calling_station_id as macAddress Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_eap_tunnel as EapTunnel Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_eap_authentication as EapAuthentication Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_authentication_method as authentication_method Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_radiusflow_type as RadiusFlowType Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_authorization_policy_matched_rule as AuthorizationPolicyMatchedRule Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ise_syslog_action as "C2C Auth Result" Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ise_syslog_ise_servername as dot1xAuthApplianceID \
| dedup macAddress \
| eval macAddress = replace(upper(macAddress),"-",":") \
| eval dot1xEnabled=if(cisco_av_pair=="method=dot1x","True","False") \
| eval isAuthZOnly=if(match(macAddress,"((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)(\.(?!$)|$)){4}"),"Authorize_Only","Undefined") \
| eval eapTunAuth = case(EapTunnel!="N/A" and EapAuthentication!="N/A", EapTunnel + " - " + EapAuthentication, EapAuthentication!="N/A", EapAuthentication) \
| eval dot1xEAPType = coalesce(eapTunAuth, EapAuthentication, "None") \
| eval "C2C Primary Auth" = coalesce(authentication_method, MESSAGE_CLASS) \
| eval "C2C Last Auth" = strftime(_time, "%Y-%m-%dT%H:%M:%S.%Q") \
| rex field=cisco_av_pair "AuthenticationIdentityStore=(?<authZStore>.*$)" \
| eval "C2C Connection" = coalesce(RadiusFlowType,isAuthZOnly) \
| eval "C2C Last Auth Access Assignment" = case(match(lower(AuthorizationPolicyMatchedRule),`cisco_catalyst_access_level_full`),"FullAccess", match(lower(AuthorizationPolicyMatchedRule),`cisco_catalyst_access_level_remediation`),"Remediation", match(lower(action),"failure"),"Denied", match(lower(RadiusFlowType),"mab"),"Limited") \
| rename authZStore as "C2C Authorization Source" \
| table macAddress "C2C Last Auth" "C2C Auth Result" "C2C Authorization Source" "C2C Connection" "C2C Device Token" "C2C Primary Auth" "C2C Last Auth Access Assignment" dot1xEAPType dot1xEnabled dot1xAuthApplianceID \
| eval sort_field=case("C2C Last Auth Access Assignment"=="FullAccess",1, "C2C Last Auth Access Assignment"=="Limited",2, "C2C Last Auth Access Assignment"=="Denied",3) | sort sort_field | fields - sort_field

