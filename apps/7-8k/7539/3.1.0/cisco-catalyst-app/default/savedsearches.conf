######################################################
#
# Lookup table builders
#
######################################################
[cisco_catalyst_location]
action.email.inline = 1
alert.suppress = 0
alert.track = 0
cron_schedule = 0 * * * *
description = Updates the cisco_catalyst_ise_location.csv lookup file
dispatch.earliest_time = -3d@d
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = | tstats fillnull_value="N/A" `summariesonly` count as "Count" from datamodel=Cisco_Catalyst_App where nodename IN (Cisco_Catalyst_Dataset.Cisco_Catalyst_Authentication_Events, Cisco_Catalyst_Dataset.Cisco_Catalyst_Device_Events) AND (Cisco_Catalyst_Dataset.Cisco_Catalyst_Authentication_Events.authentication_location="*" OR Cisco_Catalyst_Dataset.Cisco_Catalyst_Device_Events.device_location="*") by Cisco_Catalyst_Dataset.Cisco_Catalyst_Authentication_Events.authentication_location Cisco_Catalyst_Dataset.Cisco_Catalyst_Device_Events.device_location \
| eval Location=coalesce('Cisco_Catalyst_Dataset.Cisco_Catalyst_Authentication_Events.authentication_location', 'Cisco_Catalyst_Dataset.Cisco_Catalyst_Device_Events.device_location') \
| fields Location \
| append [ | inputlookup cisco_catalyst_ise_location.csv | fields Location ] \
| dedup Location \
| outputlookup cisco_catalyst_ise_location.csv

[cisco_catalyst_sdwan_netflow]
cron_schedule = 0 */24 * * *
description = To populate the lookup table with app and app_tag mapping
dispatch.earliest_time = -3d@d
dispatch.latest_time = now
display.page.search.mode = fast
enableSched = 1
run_on_startup = 1
search = | tstats `summariesonly` count from datamodel=Cisco_Catalyst_App by Cisco_Catalyst_Dataset.Cisco_Catalyst_Application_Usage.app_usage_app, Cisco_Catalyst_Dataset.Cisco_Catalyst_Application_Usage.app_usage_app_tag \
| rename Cisco_Catalyst_Dataset.Cisco_Catalyst_Application_Usage.app_usage_app as app, Cisco_Catalyst_Dataset.Cisco_Catalyst_Application_Usage.app_usage_app_tag as "app_tag" \
| fillnull value="unclassified" app \
| eval key=app_tag \
| outputlookup cisco_catalyst_sdwan_application_tag key_field=key append=true

[cisco_catalyst_sdwan_policy]
cron_schedule = 0 */24 * * *
description = Savedsearch to populate the lookup cisco_catalyst_sdwan_policy_mapping
dispatch.earliest_time = -3d@d
dispatch.latest_time = now
display.page.search.mode = fast
enableSched = 1
run_on_startup = 1
search = | tstats `summariesonly` count as "Count" from datamodel=Cisco_Catalyst_App where nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_Policy_Events Cisco_Catalyst_Dataset.Cisco_Catalyst_Policy_Events.policy_fw_policy != "00000000" by Cisco_Catalyst_Dataset.Cisco_Catalyst_Policy_Events.policy_fw_policy, Cisco_Catalyst_Dataset.Cisco_Catalyst_Policy_Events.policy_fw_policy_rule \
| rename Cisco_Catalyst_Dataset.Cisco_Catalyst_Policy_Events.policy_fw_policy as "policy", Cisco_Catalyst_Dataset.Cisco_Catalyst_Policy_Events.policy_fw_policy_rule as "policy_rule" \
| append \
    [| tstats `summariesonly` count as "Count" from datamodel=Cisco_Catalyst_App by Cisco_Catalyst_Dataset.Cisco_Catalyst_Policy_Events.policy_cisco_hsl_fw_class_id, Cisco_Catalyst_Dataset.Cisco_Catalyst_Policy_Events.policy_cisco_hsl_fw_class_name \
    | rename Cisco_Catalyst_Dataset.Cisco_Catalyst_Policy_Events.policy_cisco_hsl_fw_class_id as "policy", Cisco_Catalyst_Dataset.Cisco_Catalyst_Policy_Events.policy_cisco_hsl_fw_class_name as "policy_rule"] \
| eval key=policy \
| outputlookup cisco_catalyst_sdwan_policy_mapping key_field=key append=true

[cisco_catalyst_meraki_organization_mapping]
cron_schedule = 0 */24 * * *
description = Savedsearch to populate the lookup meraki_org_id_name_lookup
dispatch.earliest_time = -1d
dispatch.latest_time = now
display.page.search.mode = fast
enableSched = 1
run_on_startup = 1
search = | tstats fillnull_value="N/A" `summariesonly` count from datamodel=Cisco_Catalyst_App \
        where nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_Organization_Events \
        by Cisco_Catalyst_Dataset.Cisco_Catalyst_Organization_Events.organization_id, \
           Cisco_Catalyst_Dataset.Cisco_Catalyst_Organization_Events.organization_name \
    | rename Cisco_Catalyst_Dataset.Cisco_Catalyst_Organization_Events.organization_id as org_id, \
             Cisco_Catalyst_Dataset.Cisco_Catalyst_Organization_Events.organization_name as org_name \
    | table org_id,org_name \
    | outputlookup meraki_org_id_name_lookup.csv

[cisco_catalyst_meraki_devices_serial_mapping]
cron_schedule = 0 */24 * * *
description = Updates the cisco_catalyst_meraki_device_serial_mapping.csv lookup file
dispatch.earliest_time = -1mon
dispatch.latest_time = now
enableSched = 1
run_on_startup = true
search = | tstats `summariesonly` fillnull_value="N/A" count as Count \
    from datamodel=Cisco_Catalyst_App \
    where nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_Meraki_Device_Events \
    Cisco_Catalyst_Dataset.Cisco_Catalyst_Meraki_Device_Events.meraki_devices_product_type=sensor \
    by Cisco_Catalyst_Dataset.Cisco_Catalyst_Meraki_Device_Events.meraki_devices_serial \
    Cisco_Catalyst_Dataset.Cisco_Catalyst_Meraki_Device_Events.meraki_devices_name \
    Cisco_Catalyst_Dataset.Cisco_Catalyst_Meraki_Device_Events.meraki_devices_model \
| rename Cisco_Catalyst_Dataset.Cisco_Catalyst_Meraki_Device_Events.meraki_devices_serial as Serial \
    Cisco_Catalyst_Dataset.Cisco_Catalyst_Meraki_Device_Events.meraki_devices_name as Name \
    Cisco_Catalyst_Dataset.Cisco_Catalyst_Meraki_Device_Events.meraki_devices_model as Model \
| table Serial, Name, Model \
| dedup Serial \
| outputlookup cisco_catalyst_meraki_device_serial_mapping.csv \

[cisco_catalyst_all_macAddresses]
description = Gets all MAC Addresses from both ISE and Tenable Logs as starting point for MER
search = | tstats fillnull_value="N/A" `summariesonly` count from datamodel=Cisco_Catalyst_App where (nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports AND Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_macaddress!="") OR (nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable AND Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_macaddress!="") OR (nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports AND Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ise_syslog_message_code="5200") by Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_calling_station_id, Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_macaddress, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_macaddress\
| rename Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_macaddress as ise_mac Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_macaddress as tenable_mac Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_calling_station_id as ise_syslog_mac\
| eval macAddress = coalesce(if(ise_mac=="N/A", null(), ise_mac), if(tenable_mac=="N/A", null(), tenable_mac), if(ise_syslog_mac=="N/A", null(), ise_syslog_mac)) \
| eval macAddress = replace(upper(macAddress),"-",":") \
| dedup macAddress \
| table macAddress

[cisco_catalyst_ise_passed_authn_v3]
description = ISE Passed Authentications
search = | tstats fillnull_value="N/A" `summariesonly` earliest(_time) as _time, values(Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_user_name) as UserName from datamodel=Cisco_Catalyst_App where nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports AND Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ise_syslog_message_code="5200" earliest=-7d latest=now by Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_endpoint_macaddress, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_issuer, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_common_name, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_serial_number, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_subject_common_name, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_subject_alternative_name_other_name, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_ad_user_dns_domain, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_auth_method, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_network_device_name, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_nas_port_id, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_network_device_groups, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_location, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_cisco_av_pair \
| rename Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_cisco_av_pair as av_pair Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_endpoint_macaddress as endpoint_mac Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_issuer as Issuer Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_common_name as Issuer___Common_Name Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_serial_number as Serial_Number Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_subject_common_name as Subject___Common_Name Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_subject_alternative_name_other_name as Subject_Alternative_Name___Other_Name Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_ad_user_dns_domain as AD_User_DNS_Domain Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_auth_method as AuthenticationMethod Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_network_device_name as NetworkDeviceName Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_nas_port_id as NAS_Port_Id Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_network_device_groups as NetworkDeviceGroups Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Syslog_Events.ISE_Syslog_Analytics_Reports.ise_syslog_location as Location\
| rex field=av_pair "mdm-tlv=device-mac=(?<vpnmacAddress>([[:xdigit:]]{2}[:.-]?){5}[[:xdigit:]]{2})" \
| eval macAddress = coalesce(if(endpoint_mac=="N/A", null(), endpoint_mac), if(vpnmacAddress=="N/A", null(),vpnmacAddress)) \
| eval macAddress = replace(upper(macAddress), "-", ":") \
| dedup macAddress

[cisco_catalyst_ise_hardware_report_v1]
description = Cisco ISE Analytics Hardware Inventory Report
search = | tstats fillnull_value="N/A" `summariesonly` count from datamodel=Cisco_Catalyst_App where nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports earliest=-7d latest=now by Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_macaddress, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_memorysize, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_disk_total_size, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_disk_free_size, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_bios_manufacturer, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_bios_model, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_bios_serial_number, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_operating_system, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_cpu_number_of_processors, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_cpu_number_of_cores, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_cpu_uuid \
| rename Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_macaddress as macAddress, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_bios_manufacturer as ISEBiosVendor, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_bios_model as ISEBiosProduct, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_bios_serial_number as ISEBiosSerialNumber, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_operating_system as ISEosCompositeName, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_cpu_number_of_processors as ISENumInstalledCPU, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_cpu_number_of_cores as ISENumCpuCores, Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_cpu_uuid as ISEuuid Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_disk_free_size as disk_free_size Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_disk_total_size as disk_total_size Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Hardware_Reports.ise_hardware_reports_memorysize as memorysize\
| dedup macAddress \
| eval ISETotalPhysicalMemory = memorysize*1024 \
| eval ISEBootPartitionTotalSpace = round(disk_total_size, 0) . "G" \
| eval ISEBootPartitionFreeSpace = round(disk_free_size, 0) . "G" \
| table macAddress ISEuuid ISEBiosProduct ISEBiosSerialNumber ISEBiosVendor ISEBootPartitionFreeSpace ISEBootPartitionTotalSpace ISENumInstalledCPU ISENumCpuCores ISETotalPhysicalMemory

[cisco_catalyst_windows_os_details_v2]
description = OS details that are pulled from Tenable
search = | tstats fillnull_value="N/A" `summariesonly` count from datamodel=Cisco_Catalyst_App where nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable AND sourcetype="tenable:sc:vuln" AND `cisco_catalyst_windows_installed_plugin` earliest=-7d latest=now by Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_macaddress Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_plugin_text Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_dnsname Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_uuid \
| rename Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_macaddress as macAddress Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_plugin_text as pluginText Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_dnsname as dnsName Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_uuid as uuid Cisco_Catalyst_Dataset.Cisco_Catalyst_Tenable.tenable_lastSeen as lastSeen \
| rex field=pluginText "Version\s+:\s(?<osWinVersion>.*)\n" \
| rex field=pluginText "OS Name\s+:\s(?<osWinCompositeName>.*)\n" \
| rex field=pluginText "Vendor\s+:\s(?<osWinVendor>.*)\n" \
| rex field=pluginText "Edition\s+:\s(?<osWinEdition>.*)\n" \
| rex field=pluginText "Release\s+:\s(?<osWinMktVersion>.*)\n" \
| rex field=pluginText "Architecture\s+:\s(?<osWinArch>.*)\n" \
| rex field=pluginText "CPE\sv2.2\s+:\s(?<osWinPlatformName>.*)\n" \
| eval macAddress=upper(macAddress) \
| dedup macAddress \
| table macAddress dnsName uuid lastSeen osWinCompositeName osWinVersion osWinVendor osWinEdition osWinMktVersion osWinArch osWinPlatformName

