display.visualizations.singlevalue.unit = %
display.visualizations.type = singlevalue
enableSched = 1
request.ui_dispatch_view = search
search = `cisco_catalyst_app_index` sourcetype="cisco:ise:analytics:fullreport"  earliest=-60d latest=now\
| eval LogicalProfile = replace(LogicalProfile, "\'", "")\
| foreach * [eval "<<FIELD>>"=trim('<<FIELD>>', "'")]\
| makemv delim=", " LogicalProfile\
| eval LogicalProfile=mvdedup(LogicalProfile) \
| rename LogicalProfile as cybercomCategory, EndPointPolicy as deviceType, MACAddress as macAddress "Device Identifier" as record_id MFCInfoDeviceType as SystemModel MFCInfoHardwareManufacturer as SystemManufacturer\
| eval cybercomCategory = if(NOT match(cybercomCategory, `cisco_catalyst_CYBERCOM_Macro`), `cisco_catalyst_CYBERCOM_Unknown`, cybercomCategory)\
| dedup macAddress\
| eval catMatch = if(match(cybercomCategory, `cisco_catalyst_CYBERCOM_Macro`), 1, 0)\
| eval unkMatch = if(match(cybercomCategory, `cisco_catalyst_CYBERCOM_Unknown`), 1, 0)\
| stats sum(catMatch) as catMatchTotal sum(unkMatch) as unkMatchTotal\
| eval step1Metric2 = 100-((unkMatchTotal / catMatchTotal)*100)\
| eval score = case(\
    step1Metric2 >= 95, 10,\
    step1Metric2 >= 85, 5,\
    true(), 0\
)\
| table step1Metric2 score

