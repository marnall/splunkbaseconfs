[cisco_catalyst_profiler_summary_v4]
description = ISE Profiler Summary from ISE Analytics Reports
search = | tstats fillnull_value="N/A" `summariesonly` count from datamodel=Cisco_Catalyst_App where nodename=Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports earliest=-7d latest=now by Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_macaddress Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_logical_profile Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_first_collection Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_last_activity Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_endpoint_policy Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_device_identifier Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_mfc_info_devicetype Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_mfc_info_hardware_manufacturer Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_matched_policy \
| rename Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_macaddress as macAddress Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_logical_profile as cybercomCategory Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_first_collection as FirstCollection Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_last_activity as LastActivity Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_endpoint_policy as deviceType Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_device_identifier as record_id Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_mfc_info_devicetype as SystemModel Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_mfc_info_hardware_manufacturer as SystemManufacturer Cisco_Catalyst_Dataset.Cisco_Catalyst_ISE_Reports.ISE_Full_Reports.ise_full_reports_matched_policy as MatchedPolicy \
| eval cybercomCategory = replace(cybercomCategory, "\'", "") \
| eval iseFirstSeen = replace(FirstCollection, "\'", "") \
| eval iseLastSeen = replace(LastActivity, "\'", "") \
| foreach * \
    [ eval "<<FIELD>>"=trim('<<FIELD>>', "'")] \
| makemv delim=", " cybercomCategory \
| eval cybercomCategory=mvdedup(cybercomCategory) \
| eval cybercomCategory = if(NOT match(cybercomCategory, `cisco_catalyst_CYBERCOM_Macro`), `cisco_catalyst_CYBERCOM_Unknown`, cybercomCategory) \
| eval cybercomCategory = mvfilter(match(cybercomCategory, `cisco_catalyst_CYBERCOM_Macro`) OR match(cybercomCategory, `cisco_catalyst_CYBERCOM_Unknown`))\
| eval record_id = if(isnull(record_id) OR record_id="", "N/A", record_id) \
| eval SystemModel = if(isnull(SystemModel) OR SystemModel="", "N/A", SystemModel) \
| eval SystemManufacturer = if(isnull(SystemManufacturer) OR SystemManufacturer="", "N/A", SystemManufacturer) \
| dedup macAddress \
| table macAddress record_id cybercomCategory MatchedPolicy SystemManufacturer SystemModel iseFirstSeen iseLastSeen

