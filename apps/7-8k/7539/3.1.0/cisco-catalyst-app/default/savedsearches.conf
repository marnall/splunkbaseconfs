[cisco_catatlyst_implementation_step1_metric1]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 30 * * * *
dispatch.earliest_time = -7d@h
dispatch.latest_time = now
display.general.type = visualizations
display.page.search.mode = verbose
display.page.search.tab = visualizations
display.statistics.show = 0
display.visualizations.singlevalue.rangeColors = ["0x53a051","0x0877a6","0xf8be34","0xf1813f","0xdc4e41"]
display.visualizations.singlevalue.unit = %
display.visualizations.type = singlevalue
enableSched = 1
request.ui_dispatch_view = search
search = (`cisco_catalyst_app_index`) ((sourcetype="tenable:sc:*" macAddress!="") OR (sourcetype="cisco:ise:analytics:fullreport" MACAddress!="")) earliest=-60d latest=now\
| eval macAddress = coalesce(MACAddress,macAddress)\
| eval macAddress = replace(upper(macAddress),"-",":")\
| where _time >= relative_time(now(), "-2mon@day")\
| eval is_this_month = if(_time >= relative_time(now(), "@mon"), 1, 0)\
| dedup macAddress is_this_month\
| stats\
    count(eval(is_this_month=1)) as this_month\
    count(eval(is_this_month=0)) as previous_month\
| appendcols [ search `cisco_catalyst_app_index` MESSAGE_CODE=80014 earliest=-60d latest=now | rex max_match=0 field=_raw "(?<mac>(?:[0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2})" | eval macCount=mvcount(mac) | stats dc(mac) as purgedCount ]\
| eval\
    delta = this_month - previous_month,\
    percent_change = if(previous_month=0, null(), round( ( delta + purgedCount ) / previous_month * 100, 0))\
| eval score = case(\
    percent_change >= 5, 10,\
    percent_change < 5 AND percent_change >= -5, 5,\
    percent_change < -5, 0,\
    true(), 0\
)\
| table percent_change score

[cisco_catalyst_implementation_step1_metric2]
action.email.useNSSubject = 1
