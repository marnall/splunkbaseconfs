search = | union\
  [ search `cisco_catalyst_app_index` sourcetype="cisco:ise:syslog" MESSAGE_CODE=62004 earliest=-60d latest=now | dedup MacAddress PolicyName PostureRemediationStatus | table MacAddress PolicyName PostureRemediationStatus ]\
  [ search `cisco_catalyst_app_index` sourcetype="cisco:ise:syslog" MESSAGE_CODE IN("87000","87001") earliest=-60d latest=now | dedup MacAddress | table MacAddress PostureStatus ]\
| eval remediations = case(\
    match(PostureRemediationStatus, "Remediation execution was successful"), 1,\
    match(PostureRemediationStatus, "Remediation was not attempted"), 1,\
    match(PostureRemediationStatus, "Remediation failed"), 1,\
    true(), 0 )\
| eval posture = case(\
    match(PostureStatus, "NonCompliant"), 1,\
    true(), 0 )\
| eval macAddress=replace(MacAddress,"-",":") \
| stats sum(remediations) as remediations sum(posture) as posture by macAddress\
| eval inactiveRem = case(\
    posture = 1 AND remediations = 0, 1,\
    true(), 0 )\
| stats count(eval(inactiveRem="1")) AS inactiveDevices, count(eval(posture IN("0","1"))) AS totalDevices\
| eval step3Metric1 = (totalDevices / (totalDevices + inactiveDevices))*100\
| eval score = case(\
    step3Metric1 > 95, 20,\
    step3Metric1 > 85, 15,\
    step3Metric1 > 75, 10,\
    step3Metric1 > 50, 5,\
    true(), 0\
)\
| table step3Metric1 score

