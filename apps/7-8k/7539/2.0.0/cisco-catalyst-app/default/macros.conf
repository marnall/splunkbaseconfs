[cisco_catalyst_app_index]
definition = index IN ("main")
description = Definition for all indices where Cisco SDWAN, Cisco ISE, and Cisco DNAC data is stored
iseval = 0

[cisco_catalyst_app_sourcetypes]
definition = sourcetype IN ("cisco:ise*", "cisco:sdwan*", "cisco:dnac*", "stream:netflow", "cisco:cybervision:*")
description = Definition for all the sourcetypes of Cisco SDWAN, Cisco ISE, and Cisco DNAC
iseval = 0

[summariesonly]
description = Definition for the dashboard query to populate from summariesonly
definition = summariesonly=false
iseval = 0
