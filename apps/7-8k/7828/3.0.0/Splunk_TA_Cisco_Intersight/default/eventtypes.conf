[intersight_idx]
search = index=main

[alerts]
search = eventtype=intersight_idx sourcetype="cisco:intersight:alarms"
#tags =  alert

[performance_facilities]
search = eventtype=intersight_idx sourcetype="cisco:intersight:metrics" source IN ("fan", "host", "temperature")
#tags = performance, facilities

[performance_memory]
search = eventtype=intersight_idx sourcetype="cisco:intersight:metrics" source="memory"
#tags = performance, memory

[performance_network]
search = eventtype=intersight_idx sourcetype="cisco:intersight:metrics" source="network"
#tags = performance, network

[authentication]
search = eventtype=intersight_idx sourcetype="cisco:intersight:auditRecords" Event IN ("Login", "Logout")
#tags = authentication

[change]
search = eventtype=intersight_idx sourcetype="cisco:intersight:auditRecords" Event IN ("Created", "Modified", "Deleted", "Permission Change", "Permission Create")
#tags = change
