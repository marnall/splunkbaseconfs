[launcher]
version = 3.0.0
description = Imports data from Cisco Intersight (SaaS or On-Premise)
author = Cisco Systems, Inc

[id]
version = 3.0.0
name = Splunk_TA_Cisco_Intersight

[install]
build = 81
is_configured = false
state = enabled

[package]
id = Splunk_TA_Cisco_Intersight
check_for_updates = true

[ui]
label = Cisco Intersight Add-On for Splunk
is_visible = true

[triggers]
reload.splunk_ta_cisco_intersight_settings = simple
reload.splunk_ta_cisco_intersight_account = simple
