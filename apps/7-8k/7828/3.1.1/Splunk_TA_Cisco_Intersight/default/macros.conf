[cisco_intersight_index]
definition = index IN (main)
iseval = false

[cisco_intersight_summariesonly]
definition = summariesonly=false
iseval = false

[cisco_intersight_human_readable_bytes(1)]
args = bytes_field
definition = case(\
$bytes_field$ >= 1099511627776, round($bytes_field$/1024/1024/1024/1024, 2),\
$bytes_field$ >= 1073741824, round($bytes_field$/1024/1024/1024, 2),\
$bytes_field$ >= 1048576, round($bytes_field$/1024/1024, 2),\
$bytes_field$ >= 1024, round($bytes_field$/1024, 2),\
true(), $bytes_field$\
)
iseval = 0

[cisco_intersight_human_readable_unit(1)]
args = bytes_field
definition = case(\
$bytes_field$ >= 1099511627776, "TB",\
$bytes_field$ >= 1073741824, "GB",\
$bytes_field$ >= 1048576, "MB",\
$bytes_field$ >= 1024, "KB",\
true(), "B"\
)
iseval = 0

[cisco_intersight_bytes_to_given_unit(2)]
args = bytes_field,target_unit
definition = case(\
    lower("$target_unit$") == "tb", round($bytes_field$ / 1099511627776, 2),\
    lower("$target_unit$") == "gb", round($bytes_field$ / 1073741824, 2),\
    lower("$target_unit$") == "mb", round($bytes_field$ / 1048576, 2),\
    lower("$target_unit$") == "kb", round($bytes_field$ / 1024, 2),\
    true(), $bytes_field$\
)
iseval = 0

[convert_ipv4_num(1)]
args = field
definition = eval $field$_num=(tonumber(mvindex(split($field$, "."),0))*16777216) \
                + (tonumber(mvindex(split($field$, "."),1))*65536) \
                + (tonumber(mvindex(split($field$, "."),2))*256) \
                + tonumber(mvindex(split($field$, "."),3))
iseval = 0

[ipv6_to_num(1)]
args = field
definition = eval $field$_hex=replace($field$, ":", "") \
| eval $field$_hi=tonumber(substr($field$_hex,1,16),16) \
| eval $field$_lo=tonumber(substr($field$_hex,17,16),16) \
| eval $field$_num=$field$_hi . printf("%016d",$field$_lo) \
| fields - $field$_hex $field$_hi $field$_lo\

iseval = 0
