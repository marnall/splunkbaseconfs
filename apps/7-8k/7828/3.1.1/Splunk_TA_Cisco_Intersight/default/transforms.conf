[compute_model_gen_extract]
REGEX="Model": "(?<ModelSeries>\D*?)-?(?<ModelType>[A-Z]{0,4}\d{3,4}\w?)-(?<ModelGeneration>M\d)(?<ModelVariant>\w*)"

[compute_model_withoutgen_extract]
REGEX="Model": "(?<ModelSeries>\D*?)-?(?<ModelType>[A-Z]{0,4}\d{3,4}\w?)"

[fi_model_gen_extract]
REGEX="Model": "UCS-FI-6(?<ModelGeneration>\d).*"

[swtich_model_gen_extract]
REGEX="Model": "N9K-C.-(?<ModelGeneration>\wX)."

