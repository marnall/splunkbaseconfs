[checkintersightclientsexpiration-command]
syntax =  checkintersightclientsexpiration
description = This command checks whether the Client Id for any configured Cisco Intersight account is set to expire within the next 7 days. If an Client Id is nearing expiration, a notification is sent to the customer via Splunk UI.
shortdesc = Checks Client Id expiry for Cisco Intersight accounts and sends notifications via Splunk UI if nearing expiration.
example1 = | checkintersightclientsexpiration
comment1 = Traverses through all configured Cisco Intersight accounts and send notification on Splunk UI if any account's Client Id is set to expire within the next 7 days..
