# sourcetype
[force_sourcetype_icewarp]
DEST_KEY = MetaData:Sourcetype
REGEX = (smtp.antispam)
FORMAT = sourcetype::iwp:spam

# SPAM
[iwp_program_name]
REGEX = ^.*\s(.*)\.\[.*\]\:
FORMAT = program_name::$1

[iwp_src_ip]
REGEX = ^.*\]\:\s((?<![0-9])(?:(?:[0-1]?[0-9]{1,2}|2[0-4][0-9]|25[0-5])[.](?:[0-1]?[0-9]{1,2}|2[0-4][0-9]|25[0-5])[.](?:[0-1]?[0-9]{1,2}|2[0-4][0-9]|25[0-5])[.](?:[0-1]?[0-9]{1,2}|2[0-4][0-9]|25[0-5]))(?![0-9]))
FORMAT = src_ip::$1

# The user who reportedly sent this message.
# The user this message is intended for.
[iwp_email_sender_receiver]
REGEX = (?:.*?)(([a-zA-Z0-9-_.]+@[a-zA-Z0-9-_.]+))\S+.*?([a-zA-Z0-9-_.]+@[a-zA-Z0-9-_.]+)
FORMAT = sender::$1 sender_orig::$2 receiver::$3

[iwp_email_sender_bounce]
REGEX = ^.*\(\<(.*bounce.*)\>\)\S+
FORMAT = bounce_sender::$1

# The number of recipients this message was intended for # EG : 1,2,3
[iwp_number_of_receipent_intended_for]
REGEX = ^.*(\d) score
FORMAT = recipients_target::$1

# The spam score this message achieved.
[iwp_spam_score]
REGEX = ^.*(\b(?<![0-9A-Fa-f.])(?:[+-]?(?:0x)?(?:(?:[0-9A-Fa-f]+(?:\.[0-9A-Fa-f]*)?)|(?:\.[0-9A-Fa-f]+)))\b) reason
FORMAT = spam_score::$1

[iwp_reason_spamassassin]
REGEX = SpamAssassin\=(.[^:]+)
FORMAT = spam_assassin_score::$1

[iwp_reason_live]
REGEX = Live\=(\w+)
FORMAT = spam_live_reason::$1

[iwp_action]
REGEX = action (\w+)
FORMAT = action::$1
