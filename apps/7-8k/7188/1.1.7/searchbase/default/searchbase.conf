[list_all_es_correlation_searches]
search_name = Detailed Analysis of Enabled Correlation Searches
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Searching
solution = <p>Operational and business insights gained from this query include:</p> \
<p>1. Visibility into enabled correlation searches ensures proper usage and performance tuning.<br> \
2. Identification of misconfigurations or inefficient scheduling parameters.<br> \
3. Detailed field extractions, such as triggers and risk analysis, aid compliance checks.<br> \
4. Simplification and readability of saved search parameters improve audit workflows.<br> \
5. Insights into guided mode and real-time scheduling flags can inform decisions about optimizing alert management strategies.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Review fields like "Real-time Scheduling Enabled" to ensure efficient resource usage.<br> \
<b>2.</b> Analyze "Risk Analysis" fields to align with security and compliance objectives.<br> \
<b>3.</b> Utilize "Notable Events" configurations to validate operational triggers.<br> \
<b>4.</b> Cross-check extracted data models and datasets for debugging or optimization.<br> \
<b>5.</b> Regularly export and validate this report to maintain search and alert consistency.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest splunk_server=* count=0 /services/saved/searches</code><br>       - Gathers all saved search configurations from the Splunk REST endpoint.<br> \
	<b>02</b> <code>| where match('action.correlationsearch.enabled', "1|[Tt]|[Tt][Rr][Uu][Ee]")</code><br>       - Filters for searches explicitly enabled for correlation.<br> \
	<b>03</b> <code>| rex field=action.customsearchbuilder.spec "datamodel\\\\\":\s+\\\\\"(?<Data_Model>\w+)"</code><br>       - Extracts associated data model from the configuration.<br> \
	<b>04</b> <code>| rex field=action.customsearchbuilder.spec "object\\\\\":\s+\\\\\"(?<Dataset>\w+)"</code><br>       - Extracts the associated dataset.<br> \
	<b>05</b> <code>| rename action.correlationsearch.label as Search_Name ...</code><br>       - Renames long technical field names for easier readability.<br> \
	<b>06</b> <code>| eval Guided_Mode:Enabled = if(Guided_Mode == 1, "Yes", "No")</code><br>       - Categorizes whether guided mode is enabled.<br> \
	<b>07</b> <code>| eval Real-time_Scheduling_Enabled = if(realtime_schedule == 1, "Yes", "No")</code><br>       - Translates binary real-time scheduling flags into meaningful text.<br> \
	<b>08</b> <code>| table disabled, Search_Name, Rule_Name...</code><br>       - Structures the final output as a table with relevant fields.<br>
explanation = <p>This query enables Splunk administrators and analysts to efficiently audit and manage saved searches configured for correlation analysis. By utilizing the REST API, it accesses detailed configurations such as dataset, data models, scheduling, trigger conditions, throttling, notable events, and risk analysis parameters. These insights help with troubleshooting misconfigurations, enhancing the performance of searches, and validating adherence to operational standards.</p> \
	<p>The extracted fields are renamed for improved accessibility, and flags like "Guided Mode Enabled" and "Real-time Scheduling Enabled" are evaluated and enriched for easy interpretation. This query surfaces critical information to ensure searches are optimized and aligned with intended use cases, making it a powerful tool for maintaining the efficacy and reliability of saved searches.</p>
quid = BACC8E3269603F60B73765EC8590D629
search_author = akhamis
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-all-es-correlation-searches" target="_blank">https://gosplunk.com/list-all-es-correlation-searches</a></p>
description = <p>Summarizes <b>Detailed Analysis of Enabled Correlation Searches</b> using <code>| rest splunk_server=* count=0 /services/saved/searches</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest splunk_server=* count=0 /services/saved/searches\
	| where match('action.correlationsearch.enabled', "1|[Tt]|[Tt][Rr][Uu][Ee]")\
	| rex field=action.customsearchbuilder.spec "datamodel\\\\\":\s+\\\\\"(?<Data_Model>\w+)"\
	| rex field=action.customsearchbuilder.spec "object\\\\\":\s+\\\\\"(?<Dataset>\w+)"\
	| rename action.correlationsearch.label as Search_Name title as Rule_Name eai:acl.app as Application_Context request.ui_dispatch_app as UI_Dispatch_Context description as Description Data_Model as Guided_Mode:Data_Model Dataset as Guided_Mode:Dataset action.customsearchbuilder.enabled as Guided_Mode action.customsearchbuilder.spec as Guided_Mode:Search_Logic search as Search dispatch.earliest_time as Earliest_Time dispatch.latest_time as Latest_Time cron_schedule as Cron_Schedule schedule_window as Schedule_Window schedule_priority as Schedule_Priority alert_type as Trigger_Conditions:Trigger_Alert_When alert_comparator as Trigger_Conditions:Alert_Comparator alert_threshold as Trigger_Conditions:Alert_Threshold alert.suppress.period as Throttling:Window_Duration alert.suppress.fields as Throttling:Fields_To_Group_By action.notable.param.rule_title as Notable:Title action.notable.param.rule_description as Notable:Description action.notable.param.security_domain as Notable:Security_Domain action.notable.param.severity as Notable:Severity action.notable.param.default_owner as Notable:Default_Owner action.notable.param.default_status as Notable:Default_Status action.notable.param.drilldown_name as Notable:Drill-down_Name action.notable.param.drilldown_search as Notable:Drill-down_Search action.notable.param.drilldown_earliest_offset as Notable:Drill-down_Earliest_Offset action.notable.param.drilldown_latest_offset as Notable:drill-down_Latest_Offset action.notable.param.next_steps as Notable:Next_Steps action.risk.param._risk_score as Risk_Analysis:Risk_Score action.risk.param._risk_object as Risk_Analysis:Risk_Object_Field action.risk.param._risk_object_type as Risk_Analysis:Risk_Object_Type\
	| eval Guided_Mode:Enabled = if(Guided_Mode == 1, "Yes", "No")\
	| eval Real-time_Scheduling_Enabled = if(realtime_schedule == 1, "Yes", "No")\
	| table disabled Search_Name, Rule_Name, Application_Context, UI_Dispatch_Context, Description, Guided_Mode:Enabled, Guided_Mode:Data_Model, Guided_Mode:Dataset, Guided_Mode:Search_Logic, Search, Earliest_Time, Latest_Time, Cron_Schedule, Real-time_Scheduling_Enabled, Schedule_Window, Schedule_Priority, Trigger_Conditions:Trigger_Alert_When, Trigger_Conditions:Alert_Comparator, Trigger_Conditions:Alert_Threshold, Throttling:Window_Duration, Throttling:Fields_To_Group_By, Notable:Title, Notable:Description, Notable:Security_Domain, Notable:Severity, Notable:Default_Owner, Notable:Default_Status, Notable:Drill-down_Name, Notable:Drill-down_Search, Notable:Drill-down_Earliest_Offset, Notable:drill-down_Latest_Offset, Notable:Next_Steps, Risk_Analysis:Risk_Score, Risk_Analysis:Risk_Object_Field, Risk_Analysis:Risk_Object_Type

[list_all_fields_for_an_index_1]
search_name = Field Summary for Specific Index and Sourcetype
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,Indexes
solution = <p>By running this query, users gain a comprehensive overview of the fields within a specific dataset, enabling them to better understand the data structure and plan subsequent analysis effectively.</p><p><b>Suggested Actions</b><br><b>1.</b> Use the field summary insights to identify the fields most relevant to your analysis.<br><b>2.</b> Document the fields and their metadata for future querying and team sharing.<br><b>3.</b> Leverage identified fields to build tailored data extraction and visualization queries.<br><b>4.</b> Verify any anomalies or unexpected fields with data owners or SMEs.<br><b>5.</b> Incorporate field learnings into dashboards or auto-generated reports for ongoing monitoring.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specify the index and sourcetype to filter and retrieve relevant data.<br><b>02</b> <code>| fieldsummary</code><br>       - Use the <b>fieldsummary</b> command to generate a summary of all fields in the filtered data, including statistical information.<br><b>03</b> <code>| table field</code><br>       - Display the field names in a clean table format for easier readability.<br>
explanation = <p>This query is useful for gaining an overview of the <b>fields</b> available in a specific index and sourcetype. The search begins by filtering data from a designated index and sourcetype, ensuring relevant data retrieval. It then uses the <b>fieldsummary</b> command to provide detailed insights into all available fields, making it easier to understand the structure of the data. Finally, it utilizes the <b>table</b> command to present these field names in an easily readable tabular format. This search is particularly helpful for analysts and developers to explore data structures for effective visualization and querying strategies.</p>
quid = 3F641ACC65EA6532A9F83D0F2ABFE2C2
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-all-fields-for-an-index" target="_blank">https://gosplunk.com/list-all-fields-for-an-index</a></p><br><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/fieldsummary" target="_blank">Splunk Help: fieldsummary command</a><br>Official Splunk documentation for this topic.</p>
description = <p>This query retrieves a <b>summary</b> of all fields in the specified index and sourcetype and displays them in a table format. By providing a structured overview of field names, this search is <b>valuable</b> for understanding data organization and planning further analysis.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| fieldsummary\
	| table field

[list_all_fields_for_an_index_2]
search_name = Table View of All Fields in Specified Index and Sourcetype
version = 1.0.1
