tags = Forwarding
solution = <p>This query provides a snapshot of network issues related to SSL configurations identified through HTTP Listener Socket Errors. It assists network teams in quickly locating and fixing certificate-related problems, thereby ensuring smoother data operations.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate the listed ForwarderIP for improper SSL configurations.<br><b>2.</b> Confirm that the certificate paths are correctly set and certificates are valid.<br><b>3.</b> Coordinate with network teams to ensure DNS resolutions are correct.<br><b>4.</b> Consider establishing routine checks for log errors to preemptively catch potential SSL issues.<br><b>5.</b> Review related traffic on the affected listeners to ensure no data loss.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal source="/opt/splunk/var/log/splunk/splunkd.log" HttpListener "Socket error from "</code><br>       - Search for HTTP Listener Socket Errors in Splunk logs<br><b>02</b> <code>| rex "(?&lt;errorLog&gt;WARN\s+HttpListener\s.*?Socket error.*)"</code><br>       - Extract full error log lines<br><b>03</b> <code>| rex field=errorLog "WARN\s+HttpListener\s.*?Socket error from\s+(?&lt;ip&gt;[^ ]+)"</code><br>       - Extract IP addresses from error logs<br><b>04</b> <code>| lookup dnsLookup ip OUTPUT host as ForwarderInDNS</code><br>       - Resolve IP addresses to DNS hostnames<br><b>05</b> <code>| rename ip as ForwarderIP</code><br>       - Rename IP field for clarity in results<br><b>06</b> <code>| stats earliest(_time) AS EarliestSeen latest(_time) as LatestSeen count by ForwarderIP ForwarderInDNS errorLog</code><br>       - Compile statistics on error occurrences<br><b>07</b> <code>| convert timeformat="%Y/%m/%d - %H:%M:%S" ctime(EarliestSeen) | convert timeformat="%Y/%m/%d - %H:%M:%S" ctime(LatestSeen)</code><br>       - Convert timestamps to readable format<br><b>08</b> <code>| eval Comment="This error indicates a problem with certificate installation or path to certs configuration"</code><br>       - Annotate errors with potential causes<br><b>09</b> <code>| fields EarliestSeen LatestSeen ForwarderIP ForwarderInDNS errorLog Comment count</code><br>       - Select relevant fields for output<br><b>10</b> <code>| sort ForwarderInDNS</code><br>       - Sort results by DNS name for ease of analysis<br>
explanation = <p>This search extracts logs specifically related to <b>Socket errors</b> occurring at the HTTP Listener from Splunk's internal log files. By using regular expressions, it identifies and categorizes errors based on IP addresses, and resolves these to DNS names using a lookup. This offers network administrators visibility into potential SSL misconfigurations or certificate path errors, facilitating targeted troubleshooting. The statistics provided include the timing of first and last occurrences and the frequency of these errors to support prioritization.</p>
quid = 9E635CD19DFA923F69E1A132CFFEAE73
search_author = GoSplunk: wrangler2x
related_info = <p><a href="https://gosplunk.com/list-forwarders-generating-socket-errors-due-to-unkown-ssl-protocol" target="_blank">https://gosplunk.com/list-forwarders-generating-socket-errors-due-to-unkown-ssl-protocol</a></p>
description = <p>This search identifies <b>HTTP Listener Socket Errors</b> in Splunk, providing insights into potential issues with DNS and IP configurations. It helps in <b>troubleshooting</b> SSL-related errors, ensuring <b>reliable</b> data forwarding within the Splunk environment.</p>
search = index=_internal source="/opt/splunk/var/log/splunk/splunkd.log" HttpListener "Socket error from "\
	| rex "(?<errorLog>WARN\s+HttpListener\s.*?Socket error.*)"\
	| rex field=errorLog "WARN\s+HttpListener\s.*?Socket error from\s+(?<ip>[^ ]+)"\
	```| lookup dnsLookup ip OUTPUT host as ForwarderInDNS```\
	| rename ip as ForwarderIP\
	| stats earliest(_time) AS EarliestSeen latest(_time) as LatestSeen count by ForwarderIP ForwarderInDNS errorLog\
	| convert timeformat="%Y/%m/%d - %H:%M:%S" ctime(EarliestSeen)\
	| convert timeformat="%Y/%m/%d - %H:%M:%S" ctime(LatestSeen)\
	| eval Comment="This error indicates a problem with certificate installation or path to certs configuration"\
	| fields EarliestSeen LatestSeen ForwarderIP ForwarderInDNS errorLog Comment count\
	| sort ForwarderInDNS

[splunk_forwarder_hostname_mismatch]
search_name = Compare Actual Host with Logged Host in Phone Home Events
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Forwarding
solution = <p>By implementing this query, you gain visibility into hostname mismatches reported during phone home events of Splunk Universal Forwarders. These discrepancies can disrupt accurate data correlation, monitoring, and even security protocols.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate mismatches to determine whether they are caused by configuration errors or network issues.<br><b>2.</b> Assess the deployment configuration of affected forwarders to ensure consistency.<br><b>3.</b> Update DNS records or forwarder settings to remediate hostname mismatches.<br><b>4.</b> Use the <b>ip</b> and <b>fqdn</b> fields to trace the source of inconsistencies and validate connections.<br><b>5.</b> Monitor hostname compliance as part of ongoing operational governance.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| dedup event_message</code><br>       - Ensures only unique phone home events are analyzed to avoid duplicate processing.<br><b>02</b> <code>| rex "_(?<ip>\d+\.\d+\.\d+\.\d+)_8089_(?<fqdn>.{1,29})_(?<actualHost>.{1,15})_"</code><br>       - Extracts IP addresses, FQDN, and actual hostnames from event messages.<br><b>03</b> <code>| eval actualHost=lower(actualHost)</code><br>       - Normalizes the hostname for consistent comparison.<br><b>04</b> <code>| table host actualHost ip fqdn uri</code><br>       - Formats key fields into a tabular report.<br><b>05</b> <code>| where actualHost!=host</code><br>       - Filters results to show only cases of hostname mismatches.</p>
explanation = <p>The search analyzes phone home events by extracting key fields (e.g., <b>IP Address, Fully Qualified Domain Name (FQDN),</b> and <b>Actual Host</b>) using the <code>rex</code> command. After these fields are normalized and listed, the <code>where</code> clause checks for mismatches between <b>actualHost</b> and <b>host</b>. Such mismatches indicate potential misconfigurations or deceptive reporting in Splunk's logging behavior. This query provides key insights into the actual deployment state of Splunk Forwarders across your environment, making it critical for ensuring forwarder consistency and integrity.</p>
quid = D32533CBA95614BDFE62CF27289614CE
search_author = GoSplunk: splunk-pony
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/find-where-actual-hostnames-dont-match-the-host-from-the-universal-forwarder" target="_blank">https://gosplunk.com/find-where-actual-hostnames-dont-match-the-host-from-the-universal-forwarder</a></p>
description = <p>This search identifies discrepancies between the <b>logged hostname</b> (which Splunk Universal Forwarder reports) and the <b>actual hostname</b> (resolved through phone home events). It enables you to pinpoint cases where the hostname mismatch might affect operational tracking and troubleshooting.</p>
search = index=_internal *_8089_* event_message="Running phone uri=/services/broker/phonehome/connection_*"\
	| dedup event_message\
	| rex "_(?<ip>\d+\\.\d+\\.\d+\\.\d+)_8089_(?<fqdn>.{1,29})_(?<actualHost>.{1,15})_"\
	| eval actualHost=lower(actualHost)\
	| table host actualHost ip fqdn uri\
	| where actualHost!=host

[splunk_forwarder_not_sending_data_24hrs]
search_name = Identify Inactive Hosts and Sourcetypes Over 24 Hours
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Search
tags = Access,Forwarding
solution = <p>Operational insights gained from this query include visibility into inactive hosts and sourcetypes, helping administrators proactively address forwarding issues, track ingestion consistency, and ensure data completeness.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate inactive hosts for connectivity or configuration issues.<br><b>2.</b> Check sourcetype configurations to ensure they match expected data sources.<br><b>3.</b> Cross-reference the results with deployment configurations or monitoring tools to validate inactivity.<br><b>4.</b> Restart or reconfigure forwarders for hosts identified as inactive.<br><b>5.</b> Leverage these insights to refine alerting mechanisms for proactive issue detection in the future.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| makeresults</code><br>       - Generates an empty placeholder result to ensure the search runs properly.<br><b>02</b> <code>| append [ | metadata type=hosts | table * ]</code><br>       - Retrieves metadata about all indexed hosts and appends it to the results.<br><b>03</b> <code>| append [| metadata type=sourcetypes | table * ]</code><br>       - Retrieves metadata about all indexed sourcetypes and appends it to the results.<br><b>04</b> <code>| eval t = now() - lastTime</code><br>       - Calculates the time since the last event in seconds for each record.<br><b>05</b> <code>| where t > 86400</code><br>       - Filters out records where the time since the last event is less than or equal to 24 hours.<br><b>06</b> <code>| eval name = coalesce(host,sourcetype)</code><br>       - Combines the host and sourcetype fields into a single "name" field for clarity.<br><b>07</b> <code>| table name t lastTime totalCount type</code><br>       - Formats the output to focus on key fields for assessment.<br><b>08</b> <code>| rename t as "Seconds since Event"</code><br>       - Renames the calculated time field to make it more user-friendly.<br><b>09</b> <code>| convert ctime(lastTime) timeformat="%m/%d/%Y %H:%M:%S %z"</code><br>       - Converts the timestamp of the last event to a readable format.</p>
explanation = <p>The search uses the <b>metadata</b> command to collect information about hosts and sourcetypes in Splunk. It calculates the time elapsed since the last data was indexed for each host and sourcetype using the <b>eval</b> function. Any records where this time exceeds 24 hours are flagged. This process helps quickly pinpoint inactive sources, enabling administrators to resolve data flow gaps efficiently. The results are presented with details like host or sourcetype name, time since the last event, last event timestamp, and total count, providing clear visibility into inactive data sources.</p>
quid = 572D012E125D9E7A49FE947C8B3A4E56
search_author = GoSplunk: alacer.cogitatus
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-hosts-sourcetypes-not-sending-data-last-24-hours" target="_blank">https://gosplunk.com/list-hosts-sourcetypes-not-sending-data-last-24-hours</a></p>
description = <p>This search identifies hosts and sourcetypes that haven't sent data in the past 24 hours. This information is critical for identifying potential issues with data forwarding or ingestion processes.</p>
search = | makeresults\
	| append [\
	| metadata type=hosts\
	| table *]\
	| append [| metadata type=sourcetypes\
	| table *]\
	| eval t = now() - lastTime\
	| where t > 86400\
	| eval name = coalesce(host,sourcetype)\
	| table name t lastTime totalCount type\
	| rename t as "Seconds since Event"\
	| convert ctime(lastTime) timeformat="%m/%d/%Y %H:%M:%S %z"

[splunk_host_information]
search_name = Splunk Host Information
version = 2.x
date_created = 2025‑10‑20
category = Splunk
sub_category = _internal
tags = Detail,Host,Hutch,Role
solution = <p>This search offers a snapshot of all Splunk hosts in the environment, their assigned roles, GUIDs, and platform versions. It is helpful for identifying mismatches, verifying node roles in clusters, and ensuring version consistency across nodes.</p><p><b>Suggested Actions</b><br><b>1.</b> Review host role assignments to verify cluster node alignment.<br><b>2.</b> Look for version discrepancies and plan upgrade consistency.<br><b>3.</b> Map GUIDs for inventory, tracking, or asset‑management purposes.<br><b>4.</b> Alert or document any node whose role conflicts with expected architecture.<br><b>5.</b> Integrate this list into the monitoring console or configuration review process.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = ‑7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd component=ServerRoles role!=license_slave* role!=search_peer*</code><br>       - Filter internal logs for server role assignments excluding certain roles<br><b>02</b> <code>| rex field=role "(?<role>\S+)\."</code><br>       - Extract core role name from fully qualified value<br><b>03</b> <code>| dedup host role</code><br>       - Reduce to one record per host/role combination<br><b>04</b> <code>| join host [ | rest splunk_server=* /services/server/info | rename serverName AS host | fields host guid version ]</code><br>       - Retrieve server GUID and version via REST and correlate by host<br><b>05</b> <code>| rename server_role AS role | table host role guid version</code><br>       - Clean field names and present results in a table<br>
explanation = <p>The query begins with the <b>_internal</b> index, filtering for entries from the <b>sourcetype=splunkd</b> component with roles excluding “license_slave*” and “search_peer*”. A <b>rex</b> command extracts the simplified role value and <b>dedup</b> ensures one record per host/role. It then performs a <b>| rest</b> call to the <b>/services/server/info</b> endpoint to retrieve each node’s GUID and version via the <b>eai:acl</b> namespace. The results are merged via <b>join host</b> to correlate role metadata with server information, then the fields are renamed and arranged into a final table. This is valuable for platform teams managing cluster architecture, node roles, versions, and ensuring consistency across a distributed deployment.</p>
quid = 5ADCD73AA189B7AB6A213902A69CF715
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/rest" target="_blank">Splunk Docs: REST command reference</a><br>Details about using <b>| rest</b> for Splunk object metadata. </li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/troubleshoot-your-deployment" target="_blank">Splunk Docs: Determine which version of Splunk Enterprise you’re running</a><br>Provides techniques to query system version via REST. :contentReference[oaicite:0]{index=0}</li><li><a href="https://community.splunk.com/t5/Splunk-Search/List-all-Splunk-Servers-with-a-REST-search-command/m-p/506900" target="_blank">Splunk Community: List all Splunk Servers with a REST search command</a><br>User conversation about using <b>| rest /services/server/status</b> or related endpoints for inventory. :contentReference[oaicite:1]{index=1}</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/administer-splunk-enterprise-with-rest-apis" target="_blank">Splunk Docs: System endpoint descriptions</a><br>Details on REST endpoints such as /services/server/info and ACL context. :contentReference[oaicite:2]{index=2}</li></ul>
description = <p>This search retrieves and correlates host‑ and role‑based information for the Splunk platform, producing a table of each node’s role, GUID, and version details.</p>
search = index=_internal sourcetype=splunkd component=ServerRoles role!=license_slave* role!=search_peer* \
	| rex field=role "(?<role>\S+)\." \
	| dedup host role \
	| join host [ | rest splunk_server=* /services/server/info | rename serverName AS host | fields host guid version ] \
	| rename server_role AS role \
	| table host role guid version

[splunk_indexer_indexing_a_log_file_finished_1]
search_name = Sum of Throughput per Sourcetype in MB
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexes
solution = <p>This search enables monitoring of data ingestion rates for capacity planning and troubleshooting.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor sourcetypes with high throughput for optimization opportunities.<br><b>2.</b> Set baselines for expected throughput values.<br><b>3.</b> Create alerts for unexpected throughput changes.<br><b>4.</b> Use findings to plan index sizing and retention policies.<br><b>5.</b> Compare throughput trends over time for capacity planning.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal source="*metrics.log" group="per_sourcetype_thruput"</code><br>       - Query internal metrics logs for sourcetype throughput data.<br><b>02</b> <code>series="your_sourcetype_here"</code><br>       - Filter for a specific sourcetype (replace with actual name).<br><b>03</b> <code>| eval MB=kb/1024</code><br>       - Convert throughput from KB to MB for readability.<br><b>04</b> <code>| chart sum(MB)</code><br>       - Aggregate total throughput in megabytes.<br>
explanation = <p>This search queries the <b>metrics.log</b> file to extract throughput data for a specific sourcetype. By converting kilobytes to megabytes using <code>eval</code>, it provides a more readable metric for data ingestion rates. The <code>chart</code> command aggregates the total throughput, enabling administrators to monitor indexing performance and identify sourcetypes with high data volumes that may require optimization or dedicated resources.</p>
quid = 958E616AF92CDDB89C516361F6F19F50
search_author = GoSplunk: Suren
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/check-splunk-finished-indexing-log-file" target="_blank">https://gosplunk.com/check-splunk-finished-indexing-log-file</a></p>
description = <p>This search calculates the <b>sum</b> of throughput per sourcetype in MB, providing a clear view of data indexing patterns on your Splunk instance. It helps identify which sourcetypes are using more resources, aiding in optimizing resource allocation.</p>
search = index=_internal source="*metrics.log" group="per_sourcetype_thruput" series="your_sourcetype_here"\
	| eval MB=kb/1024\
	| chart sum(MB)

[splunk_indexer_indexing_a_log_file_finished_2]
