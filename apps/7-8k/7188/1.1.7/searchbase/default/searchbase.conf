[search_concurrency_max_realtime_searches]
search_name = Search Concurrency Max Real‑Time Searches
version = 2.x
date_created = 2025‑10‑20
category = Splunk
sub_category = _internal
tags = Concurrency,Detail,Hutch,Realtime
solution = <p>This search helps you identify time periods when the number of real‑time searches reached peaks, which may correlate with performance degradation, search head strain, or licensing pressures. Tracking this allows you to operationally tune real‑time search usage, allocate resources, and balance load across search heads.</p><p><b>Suggested Actions</b><br><b>1.</b> Review time intervals where “Max Real‑Time Searches” spikes significantly<br><b>2.</b> Correlate peaks with search head CPU/memory usage and user activity<br><b>3.</b> Determine if any scheduled or ad‑hoc real‑time searches are redundant or can be rescheduled<br><b>4.</b> Establish rate‑limiting or governance for highly frequent real‑time dashboards or searches<br><b>5.</b> Monitor this metric over time and set a baseline for what is ‘normal’ versus ‘excessive’ concurrency</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal host=acdc‑sec‑splk‑shcp2.cdc.gov source=*metrics.log group=search_concurrency "system total" NOT user=*</code><br>       - Retrieve metrics entries for search concurrency on the target host, excluding user‑initiated searches<br><b>02</b> <code>| timechart max(active_realtime_searches) AS "Max Real‑Time Searches"</code><br>       - Create a time series of the maximum real‑time searches across each time interval<br>
explanation = <p>The query scans <b>index=_internal</b> for entries in the <b>metrics.log</b> source with <b>group="search_concurrency"</b>, filtered to the specific host <b>acdc‑sec‑splk‑shcp2.cdc.gov</b>. It excludes events where <b>user=*</b> to focus on system‑initiated searches. The result is aggregated using <b>timechart max(active_realtime_searches)</b>, providing an overview of peak real‑time search loads over time. Tracking this metric is crucial as elevated concurrency in real‑time searches may lead to <b>resource contention</b>, degrade performance, and affect the overall search head operations.</p>
quid = 40ED4A929BD5DDE36B0B246919DDFB02
search_author = grdhg24
description = <p>Summarizes <b>Search Concurrency Max Real‑Time Searches</b> using <code>index="_internal" host=* source=*metrics.log group=search_concurrency "system total" NOT user=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_internal" host=* source=*metrics.log group=search_concurrency "system total" NOT user=* \
	| timechart max(active_realtime_searches) AS "Max Real‑Time Searches"

[search_duration_by_user]
search_name = Search Duration by User
version = 2.x
date_created = 2025-10-20
category = Splunk
sub_category = _internal
tags = Audit,Detail,Hutch,Search Duration
solution = <p>This search empowers platform teams to surface <b>long‑running</b> or <b>frequently executed</b> searches by user and search head, providing a meaningful view into <b>search workload distribution</b> and potential <b>optimization targets</b>.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify users with high median or 95th percentile run times to triage heavy search consumers<br><b>2.</b> Investigate specific search strings (via the 'search' field) that dominate runtime and evaluate whether they can be optimized or scheduled differently<br><b>3.</b> Flag and re‑schedule saved searches that run too often or too long under peak times<br><b>4.</b> Correlate runtime hot spots with host capacity, user role, and licensing impact to balance load and reduce resource contention<br><b>5.</b> Incorporate this search into recurring governance dashboards or alerting frameworks to proactively manage search efficiency</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_audit action=search (id=* OR search_id=*)</code><br>       - Pull audit records for searches where either id or search_id is present<br><b>02</b> <code>| eval search_id = if(isnull(search_id), id, search_id)</code><br>       - Normalize search_id field to always use search_id<br><b>03</b> <code>| replace '*' with * in search_id</code><br>       - Clean wildcards in search_id values for accurate parsing<br><b>04</b> <code>| rex "
explanation = <p>The query taps into the <b>_audit</b> index for <b>action=search</b> records, normalizes <b>search_id</b> field by handling ‘id’ aliasing, then extracts the actual <b>search</b> string via <b>rex</b>. It filters out internal scheduler jobs, converts runtime fields, and applies a two‑tier statistics aggregation: first grouped by <b>search_id host user</b>, then aggregated by <b>user host</b> to compute metrics like <b>median(total_run_time)</b>, <b>perc95(total_run_time)</b>, <b>sum(total_run_time)</b>, and <b>count</b>. This output supports <b>workload‑analysis</b>, <b>performance‑governance</b>, and <b>platform optimization</b>. For newer users, it illustrates the use of <b>eval</b>, <b>replace</b>, <b>rex</b>, <b>stats</b>, <b>fieldformat</b>, <b>rename</b>, and chaining of aggregations.</p>
quid = 55EE8DB3CAC281BAEFB9543A6564FEC0
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/security/cim/4.19.0/user/about-the-common-information-model" target="_blank">Splunk Docs: Splunk Audit Logs</a><br>Overview of audit log event fields and their meaning.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/What-is-this‑search‑startup‑time‑field‑in‑the‑audit‑index/m‑p/320077" target="_blank">Splunk Community: What is the search_startup_time field in _audit?</a><br>Explains the meaning of startup time and run time fields. :contentReference[oaicite:0]{index=0}</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How‑to‑get‑a‑report‑on‑time‑range‑windows‑from‑_audit‑logs/m‑p/500672" target="_blank">Splunk Community: How to get a report on time range windows from _audit logs</a><br>User discussion on extracting search windows and usage patterns from audit logs. :contentReference[oaicite:1]{index=1}</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Docs: Built‑In Optimization and tstats</a><br>Explains how runtime and other indexed fields can support efficient stats operations. :contentReference[oaicite:2]{index=2}</li></ul>
description = <p>This search summarizes user‑executed searches by calculating key metrics such as <b>median run time</b>, <b>95th percentile run time</b>, <b>total run time</b>, and <b>usage count</b> from audit logs.</p>
search = index=_audit action=search (id=* OR search_id=*) \
	| eval search_id = if(isnull(search_id), id, search_id) \
	| replace '*' with * in search_id \
	| rex "search='(?<search>.*?)', autojoin" \
	| search search_id!=scheduler_* \
	| convert num(total_run_time) \
	| rex "\,\s+user=(?<user>\S+)," \
	| eval user = if(user="n/a", null(), user) \
	| stats min(_time) as _time first(user) as user max(total_run_time) as total_run_time first(search) as search by search_id host \
	| search search=search* search!=*_internal* search!=*_audit* \
	| stats median(total_run_time) as "Median search time" perc95(total_run_time) as "95th Percentile search time" sum(total_run_time) as "Total search time" count as "Search count" max(_time) as "Last use" by user host \
	| fieldformat "Last use" = strftime('Last use', "%F %T.%Q %:z") \
	| rename host AS "Search Head" \
	| sort - "Median search time"

[search_for_all_errors_in_splunkd]
search_name = Error Log Analysis with Message Rate and Host Count
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Searching
solution = <p>This search provides critical visibility into Splunk infrastructure health by surfacing error patterns.</p><p><b>Suggested Actions</b><br><b>1.</b> Prioritize errors with high message rates for immediate investigation.<br><b>2.</b> Identify recurring error patterns across multiple hosts.<br><b>3.</b> Correlate error spikes with configuration changes or deployments.<br><b>4.</b> Create alerts for new error patterns or sudden increases in error rates.<br><b>5.</b> Document and track resolution of recurring errors to prevent future occurrences.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=_internal sourcetype=splunkd log_level=ERROR <br />- This line is searching for logs in the internal Splunk index where the source type is 'splunkd' and the log level is 'ERROR'.</ul><ul><b>02</b> | stats sparkline count dc(host) as hosts last(_raw) as last_raw_msg values(sourcetype) as sourcetype last(_time) as last_msg_time first(_time) as first_msg_time values(index) as index by punct <br />- This line is aggregating the logs by punctuation. It's counting the number of logs, the distinct count of hosts, and getting the last raw message, the source types, the last and first message times, and the indexes.</ul><ul><b>03</b> | eval delta=round((first_msg_time-last_msg_time),2) <br />- This line is calculating the time difference between the first and last message and rounding it to two decimal places.</ul><ul><b>04</b> | eval msg_per_sec=round((count/delta),2) <br />- This line is calculating the message rate per second and rounding it to two decimal places.</ul><ul><b>05</b> | convert ctime(last_msg_time) ctime(first_msg_time) <br />- This line is converting the time fields to a human-readable format.</ul><ul><b>06</b> | table last_raw_msg count hosts sparkline msg_per_sec sourcetype index first_msg_time last_msg_time delta <br />- This line is displaying the results in a table with the specified fields.</ul><ul><b>07</b> | sort -count <br />- This line is sorting the results by the count of logs in descending order.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor and troubleshoot Splunk itself. By focusing on error logs, it can help <b>identify</b> issues with the Splunk system, such as frequent errors, their sources, and their rate of occurrence. The sparkline, a mini graph, provides a visual representation of the error count over time, which can help in <b>identifying</b> patterns or spikes in errors.</div></div>
quid = F3ED03408DF619E58B7FCE1A9C5EE703
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/search-for-all-errors-in-splunkd" target="_blank">https://gosplunk.com/search-for-all-errors-in-splunkd</a></p>
description = <p>Summarizes <b>Error Log Analysis with Message Rate and Host Count</b> using <code>index=_internal sourcetype="splunkd" log_level="ERROR"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal sourcetype="splunkd" log_level="ERROR"\
	| stats sparkline count dc(host) as hosts last(_raw) as last_raw_msg values(sourcetype) as sourcetype last(_time) as last_msg_time first(_time) as first_msg_time values(index) as index by punct\
	| eval delta=round((first_msg_time-last_msg_time),2)\
	| eval msg_per_sec=round((count/delta),2)\
	| convert ctime(last_msg_time) ctime(first_msg_time)\
	| table last_raw_msg count hosts sparkline msg_per_sec sourcetype index first_msg_time last_msg_time delta\
	| sort -count

[search_for_disabled_ad_accounts_that_have_been_re-enabled]
search_name = Account Disable and Enable Activity in Last Hour
search_hidden = 0
category = Security
sub_category = Access
tags = Searching,SecOps
solution = <p>The search highlights potential misuse of privileges or signs of account compromise by showing instances of accounts being <b>disabled</b> and <b>re-enabled</b> rapidly. Such sequences are often indicative of unauthorized access or inappropriate administrative actions.</p><p>From an operational perspective, this search serves as both a <b>prevention tool</b> by flagging suspicious behaviors and an <b>audit mechanism</b> by providing visibility into user actions over accounts.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate accounts frequently toggled between enabled and disabled states.<br><b>2.</b> Review logs to understand who performed the actions and their intent.<br><b>3.</b> Cross-check occurrences with known maintenance or operational workflows.<br><b>4.</b> Implement stricter access controls for the accounts flagged.<br><b>5.</b> Configure alerts for similar patterns to enable prompt detection in the future.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" EventCode IN (4725,4722)</code><br>       - Retrieve all events referring to account disables (4725) and enables (4722) from the specified index and sourcetype.<br><b>02</b> <code>| eval account=mvindex(Account_Name,1)</code><br>       - Extract account names and create a dedicated field for tracking their activity.<br><b>03</b> <code>| stats values(_time) as times, earliest(EventCode) as firstEvent, latest(EventCode) as lastEvent...</code><br>       - Aggregate event details such as timestamps, actions, and accounts to show sequential relationships.<br><b>04</b> <code>| eval last_action_user=mvindex(lastAccounts,0), first_action_user=mvindex(firstAccounts,0)</code><br>       - Identify the users who disabled and re-enabled the accounts.<br><b>05</b> <code>| replace "4722" with "enabled" in firstEvent, lastEvent</code><br>       - Simplify event codes for easier readability by replacing numerical codes with descriptive text.<br><b>06</b> <code>| search account != "*\\$" AND firstEvent != "enabled" AND lastEvent != "disabled"</code><br>       - Filter unrelated or redundant events to ensure data relevance.<br><b>07</b> <code>| eval enabled_DT=mvindex(times,-1), disabled_DT=mvindex(times,-1-1)</code><br>       - Compute exact times for disabling and enabling actions.<br><b>08</b> <code>| where enabled_DT > relative_time(now(), "-1h@h")</code><br>       - Restrict results to accounts re-enabled within the last hour.<br><b>09</b> <code>| table first_action_user, account, last_action_user...</code><br>       - Provide organized output with essential fields.<br><b>10</b> <code>| rename ...</code><br>       - Assign user-friendly labels to columns for better interpretation.<br><b>11</b> <code>| convert ctime(...)</code><br>       - Convert timestamps to a readable format for reporting purposes.<br>
explanation = <p>This search tracks <b>suspicious behavior</b> or unusual patterns in account activity. EventCode 4725 indicates an account being disabled, while EventCode 4722 corresponds to the account being re-enabled. By using SPL commands, it isolates accounts showing both events and ensures that proper correlations—like disabling before enabling—are met. The query also restricts results to re-enabled accounts within the last hour, a common timeframe for investigating rapid response scenarios.</p><p><b>SPL breakdown:</b></p><p>- The `eval` command extracts and organizes critical fields like account names and timestamps.<br>- The `stats` command aggregates event details, enabling the detection of logical pairings like "disabled" followed by "enabled."<br>- Filtering ensures only valid transitions are processed (e.g., no accounts re-enabled before being disabled).<br>- Time conversions enhance report clarity, making it easier to interpret when suspicious actions occurred.</p><p>This search is particularly valuable to SecOps teams for identifying privilege escalation attempts or ensuring compliance with auditing requirements.</p>
quid = DA7179BCC8871F91D3E30026D538B09D
search_author = GoSplunk: kephalonomancy
related_info = <p><a href="https://gosplunk.com/search-for-disabled-ad-accounts-that-have-been-re-enabled" target="_blank">https://gosplunk.com/search-for-disabled-ad-accounts-that-have-been-re-enabled</a></p>
description = <p>Summarizes <b>Account Disable and Enable Activity in Last Hour</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" EventCode IN (4725,4722)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" EventCode IN (4725,4722)\
	| eval account=mvindex(Account_Name,1) ```separate out the account from the logs and create a field for it```\
	| stats values(_time) as times, earliest(EventCode) as firstEvent, latest(EventCode) as lastEvent, latest(Account_Name) as lastAccounts, earliest(Account_Name) as firstAccounts by account ```get the stats values of these fields and rename them for further manipulation```\
	| eval last_action_user=mvindex(lastAccounts,0), first_action_user=mvindex(firstAccounts, 0) ```separate out the accounts that did the disabling & re-enabling and create fields for them```\
	| replace "4722" with "enabled" in firstEvent, lastEvent\
	| replace "4725" with "disabled" in firstEvent, lastEvent\
	| search account != "*\\$" AND firstEvent != "enabled" AND lastEvent != "disabled"\
	| eval enabled_DT=mvindex(times,-1), disabled_DT=mvindex(times, -1-1) ```create fields to show when the affected account was disabled then re-enabled```\
	| where enabled_DT > relative_time(now(), "-1h@h") ```this determines what range to look for the re-enabling```\
	| table first_action_user, account, last_action_user, disabled_DT, enabled_DT\
	| rename first_action_user as "Disable Actioning Account", account as "Enabled Account", last_action_user as "Enable Actioning Account", disabled_DT as "DateTime Disabled", enabled_DT as "DateTime Enabled"\
	| convert ctime("DateTime Disabled"), ctime("DateTime Enabled") ```need to convert the time from Unix Epoch to standard time```

[search_for_duplicate_events_in_splunk]
search_name = Duplicate Raw Events Count and Details by Index and Sourcetype
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Indexing
tags = Access,Searching
solution = <p>This query uncovers duplicate raw events, providing insights into potential inefficiencies or misconfigurations in your logging system. By reviewing the counts and associated metadata (host, source, etc.), you can identify specific sources of duplication and address underlying issues.</p> \
<p><b>Suggested Actions</b><br><b>1.</b> Investigate the source system(s) or application(s) generating duplicate events.<br><b>2.</b> Review logging and forwarding configurations to ensure deduplication mechanisms are in place.<br><b>3.</b> Validate whether duplicate events are intentional, such as from HA-enabled systems.<br><b>4.</b> Optimize your Splunk ingestion pipeline to filter duplicates if they are unnecessary.<br><b>5.</b> Monitor the affected sourcetypes and indexes periodically to detect future duplication issues.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specify the index and sourcetype to narrow down the scope of the search. Replace placeholders with your actual index and sourcetype.<br><b>02</b> <code>| stats count values(host) values(source) values(sourcetype) values(index) by _raw</code><br>       - Group events by their raw data (_raw), count occurrences, and list unique values for host, source, sourcetype, and index.<br><b>03</b> <code>| WHERE count>1</code><br>       - Filter results to include only duplicate events where the count of occurrences is greater than 1.<br>
explanation = <p>This query identifies duplicate events in indexed data by grouping events based on their raw data (_raw). This process determines whether the same event has been logged multiple times, which might indicate potential issues like duplicates from multiple log sources or problems in event deduplication. By leveraging the <b>stats</b> command, it provides a detailed view with unique occurrences of host, source, sourcetype, and index for each duplicate.</p> \
	<p>For administrators and Splunk users, this query is invaluable in maintaining an efficient logging pipeline. It allows the identification and troubleshooting of misconfigurations or over-reporting issues from data sources. Additionally, the final <b>WHERE</b> clause ensures only actionable duplicates, with more than one instance, are presented.</p>
quid = 0F001B4AFA8370F990416FC96B1688DC
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/search-for-duplicate-events-in-splunk" target="_blank">https://gosplunk.com/search-for-duplicate-events-in-splunk</a></p>
description = <p>Summarizes <b>Duplicate Raw Events Count and Details by Index and Sourcetype</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| stats count values(host) values(source) values(sourcetype) values(index) by _raw\
	| WHERE count>1

[search_id_duration_audit]
