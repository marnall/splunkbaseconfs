solution = <p>This search provides <b>predictive traffic analysis</b> for capacity planning and network optimization.</p><p><b>Suggested Actions</b><br><b>1.</b> Compare predicted traffic with actual traffic to validate model accuracy.<br><b>2.</b> Use predictions for infrastructure capacity planning.<br><b>3.</b> Investigate significant deviations between expected and actual traffic.<br><b>4.</b> Set up alerts for traffic exceeding predicted thresholds.<br><b>5.</b> Share forecasts with operations teams for proactive resource allocation.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="*access*"</code><br>       - This line specifies the data source by filtering relevant access logs.<br><b>02</b> <code>| timechart count(bytes) as traffic</code><br>       - Aggregates data as a time chart counting the total bytes (traffic) in events.<br><b>03</b> <code>| streamstats sum(traffic) as total_traffic</code><br>       - Computes a running total of traffic, aiding in comprehensive data comprehension.<br><b>04</b> <code>| predict total_traffic as expected_traffic algorithm=LLT future_timespan=14</code><br>       - Predicts future traffic using the Local Linear Trend algorithm over a 14-day span.<br><b>05</b> <code>| fields total_traffic, expected_traffic</code><br>       - Ensures results remain focused on traffic trends by returning essential fields only.<br>
explanation = <p>This query is designed to <b>monitor</b> network traffic patterns and <b>predict</b> future traffic, making it highly valuable for <b>capacity planning</b> and identifying unusual traffic patterns. This predictive capability is crucial for preventing potential network issues and optimizing resource allocation. By using the <code>predict</code> command with the LLT algorithm, the search estimates future traffic trends with an emphasis on <b>forecast accuracy</b>. The command <code>timechart</code> provides a summarized view of the traffic over time, while <code>streamstats</code> calculates cumulative traffic, capturing the progressive data load. Using <b>fields</b> to limit results ensures focus on critical metrics.</p>
quid = 46B47571B1A0E9C3D8A332AD68C0BAE9
search_author = grdhg24
updated_author = khutchinson
description = <p>This query <b>analyzes</b> the total traffic in bytes over time and <b>predicts</b> future traffic for the next 14 days using the LLT (Local Linear Trend) algorithm. It <b>returns</b> both total and expected traffic, enabling users to anticipate network demands and strengthen capacity planning.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="*access*"\
	| timechart count(bytes) as traffic\
	| streamstats sum(traffic) as total_traffic\
	| predict total_traffic as expected_traffic algorithm=LLT future_timespan=14\
	| fields total_traffic, expected_traffic

