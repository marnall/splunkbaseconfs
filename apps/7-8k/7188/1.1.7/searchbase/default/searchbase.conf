execution_plan = <b>01</b> <code>| gentimes start=-1</code><br>       - Generate event times, creating a single event with the current time.<br><b>02</b> <code>| eval field1="pink,fluffy,unicorns"</code><br>       - Create the field 'field1' and assign the value 'pink,fluffy,unicorns'.<br><b>03</b> <code>| table field1</code><br>       - Generate a table containing the 'field1' values.<br><b>04</b> <code>| makemv field1 delim=","</code><br>       - Split 'field1' into multiple values using a comma as the delimiter.<br><b>05</b> <code>| eval field1_filtered=mvfilter(NOT match(field1,"pink") AND NOT match(field1,"fluffy"))</code><br>       - Filter out the values 'pink' and 'fluffy' from 'field1', creating a filtered multivalue field named 'field1_filtered'.<br>
explanation = <p>This query demonstrates how to manipulate multivalue fields by creating a single field, converting it to a multivalue field, and filtering out unwanted values. It is particularly useful when specific values need to be excluded from data analysis or visualization, ensuring cleaner and more targeted results.</p><p>The <code>| gentimes start=-1</code> command generates a single event to simulate data. The <code>| eval field1="pink,fluffy,unicorns"</code> step initializes the field 'field1' with sample data. <code>| makemv field1 delim=","</code> converts the string into a multivalue field, and <code>| eval field1_filtered=mvfilter(NOT match(field1,"pink") AND NOT match(field1,"fluffy"))</code> processes the multivalue field to remove unwanted entries, ensuring the output only includes relevant values.</p>
quid = 1448CE7A465E67F4EF9E25694C471938
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/remove-mulitple-values-from-a-multivalue-field" target="_blank">https://gosplunk.com/remove-mulitple-values-from-a-multivalue-field</a></p>
description = <p>Summarizes <b>Filtering Out 'Pink' and 'Fluffy' from Field1 Values</b> using <code>| gentimes start=-1</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | gentimes start=-1\
	| eval field1="pink,fluffy,unicorns"\
	| table field1\
	| makemv field1 delim=","\
	| eval field1_filtered=mvfilter(NOT match(field1,"pink") AND NOT match(field1,"fluffy"))

[remove_z_or_t_string_from_your_timestamp]
search_name = Display Non-System User Authentication Details with Timestamp
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This search provides <b>timestamp formatting</b> techniques for cleaner, human-readable dates.</p><p><b>Suggested Actions</b><br><b>1.</b> Use this technique for reporting and dashboards requiring formatted timestamps.<br><b>2.</b> Adjust strftime format strings for different date formats.<br><b>3.</b> Combine with stats for time-based aggregations.<br><b>4.</b> Document timestamp format conversions for consistency.<br><b>5.</b> Test format strings with sample data before deployment.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'rest' command is used to access the REST API endpoint '/services/authentication/current-context'. This retrieves the current authentication context.</ul><ul><b>02</b> The 'table' command is used to display the 'username', 'roles', and 'updated' fields in a tabular format.</ul><ul><b>03</b> The 'search' command is used to filter out the 'splunk-system-user' from the 'username' field.</ul><ul><b>04</b> The 'rex' command is used to extract the date and time from the 'updated' field into 'timestampA' and 'timestampB' respectively.</ul><ul><b>05</b> The 'eval' command is used to concatenate 'timestampA' and 'timestampB' into a single 'timestamp' field.</ul><ul><b>06</b> The 'eval' command is used again to convert the 'timestamp' field into a UNIX timestamp format.</ul><ul><b>07</b> The 'eval' command is used one more time to convert the UNIX timestamp into a human-readable format.</ul><ul><b>08</b> The 'fields' command is used to remove the 'timestampA' and 'timestampB' fields, leaving only the reformatted 'timestamp' field.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor user activity and changes in roles. It can help in auditing and tracking user behavior, especially in a security context. It can also be useful for troubleshooting issues related to user authentication and role changes.</div></div>
quid = E7F4EAD53C4316521D5977706B993C06
search_author = GoSplunk: sahr.lebbie
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/remove-z-t-string-timestamp" target="_blank">https://gosplunk.com/remove-z-t-string-timestamp</a></p>
description = <p>This query is <b>retrieving</b> the current authentication context, <b>extracting</b> the username, roles, and update time, <b>excluding</b> the system user, and then <b>reformatting</b> the timestamp.</p>
search = | rest /services/authentication/current-context\
	| table username roles updated\
	| search username!=splunk-system-user\
	| rex field=updated (?<timestampA>d{4}-d{2}-d+)T(?<timestampB>d+:d+:d+.d+)\
	| eval timestamp= timestampA + timestampB\
	| eval timestamp = strptime(timestamp, "%Y-%m-%d%H:%M:%S.%3N")\
	| eval timestamp=strftime(timestamp, "%c")\
	| fields – timestampA timestampB

