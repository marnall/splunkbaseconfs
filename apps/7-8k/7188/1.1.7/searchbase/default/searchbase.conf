	| sendemail to="youremail@youraddress.com"

[session_hijacking_reportalert_299]
search_name = Identify Multiple IP Addresses per Session
version = 1.0.2
date_updated = 2024-2-4 16:36:25
search_hidden = 0
category = Security
sub_category = Access
tags = Access,Alerts
solution = <p>This query enables detection of suspicious access patterns indicative of session hijacking or misconfigurations.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate the events associated with flagged JSESSIONIDs to understand why multiple IPs are present.<br><b>2.</b> Trace the origin and verify the legitimacy of client IPs.<br><b>3.</b> Check session configuration in systems to ensure IP checks and security measures are enforced.<br><b>4.</b> Alert system administrators and stakeholders of potential risks.<br><b>5.</b> Implement stricter session management policies, such as enforcing session IP consistency.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=access*</code><br>       - Specify the index and sourcetype, targeting access-related events.<br><b>02</b> <code>| transaction JSESSIONID</code><br>       - Group events into transactions using the JSESSIONID field.<br><b>03</b> <code>| where mvcount(clientip)>1</code><br>       - Filter for transactions with more than one client IP per session.<br><b>04</b> <code>| table clientip, JSESSIONID</code><br>       - Return a table of client IPs and corresponding JSESSIONIDs flagged for review.<br>
explanation = <p>This search is significant as it detects a key anomaly where a single session (JSESSIONID) is accessed from multiple IP addresses simultaneously or over time. This kind of activity often indicates possible <b>session hijacking</b>, malicious use, or even misconfigurations in how sessions are managed. By leveraging the <code>| transaction</code> command, the search groups events with the same JSESSIONID into transactions. The <code>| where mvcount(clientip)>1</code> clause filters the results to highlight suspicious behavior where multiple IP addresses are associated with a single JSESSIONID. Presenting the data in a <code>| table</code> format ensures it is digestible for analysts for further investigation or reporting.</p>
quid = 12DF912E842A2E8ED97AF349ABD39739
search_author = grdhg24
updated_author = akhamis
description = <p>Summarizes <b>Identify Multiple IP Addresses per Session</b> using <code>index="<<index>>" sourcetype="access*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="access*"\
	| transaction JSESSIONID \
	| where mvcount(clientip)>1 \
	| table clientip, JSESSIONID

[seven_days_over_one_day_185]
search_name = Comparison of Error Counts Between Today and Yesterday
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,SFU
solution = <p>This query provides clear insight into how the frequency of system errors changes between 'Yesterday' and 'Today' in 30-minute intervals. Such analysis can illuminate <b>significant differences</b> or <b>unexpected error patterns</b>, helping to proactively address system issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate periods with significant error spikes to find root causes.<br><b>2.</b> Prioritize errors that only occur today, as they could signify new issues.<br><b>3.</b> Correlate error data with any recent system or environment changes.<br><b>4.</b> Use findings to optimize processes or configurations to reduce errors.<br><b>5.</b> Set up alerts for unusual patterns identified in the analysis.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="&lt;&lt;index&gt;&gt;" sourcetype="&lt;&lt;sourcetype&gt;&gt;" error</code><br>       - Search for events containing the term 'error' in the specified index and sourcetype.<br><b>02</b> <code>eval Series="Yesterday"</code><br>       - Create a field called 'Series' and assign it the value 'Yesterday' for all returned events.<br><b>03</b> <code>eval _time = _time + 86400</code><br>       - Adjust the _time field by adding 86400 seconds (1 day) to the timestamp, effectively shifting events to 'Yesterday'.<br><b>04</b> <code>append [ search error | eval Series = "Today" ]</code><br>       - Append results from a subsearch for today's errors and assign the value 'Today' to the 'Series' field.<br><b>05</b> <code>timechart fixedrange=f span=30m count by Series</code><br>       - Generate a timechart with a 30-minute interval, counting errors for both 'Yesterday' and 'Today' based on the 'Series' field.<br>
explanation = <p>This query enables monitoring and comparison of error occurrences over two time periods: 'Yesterday' and 'Today'. It uses <b>eval</b> functions to create a new field, "Series", that differentiates between the two datasets, while adjusting the _time field for 'Yesterday' to align both datasets for comparison. The <b>append</b> command consolidates the data, and the <b>timechart</b> command visualizes error counts in 30-minute intervals for both periods. This query is valuable for spotting <b>trends</b> and diagnosing issues over time.</p>
quid = 746640862860C87EB3653760CE01CB31
search_author = grdhg24
updated_author = khutchinson
description = <p>This query is comparing the count of errors that occurred 'Yesterday' and 'Today' in 30-minute intervals. By analyzing this data, users can identify <b>patterns</b> in error frequency and <b>detect spikes</b>, enabling faster troubleshooting and <b>system optimization</b>.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>" error\
	| eval Series="Yesterday"\
	| eval _time = _time + 86400\
	| append [ search error\
	| eval Series = "Today" ]\
	| timechart fixedrange=f span=30m count by Series

[show_all_indexes_and_sourcetypes_via_rest]
