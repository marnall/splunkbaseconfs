dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The query starts by searching the specified index for events with the sourcetype 'vmware:perf:cpu' and source 'VMPerf:VirtualMachine'. The instance is set to 'aggregated'.</ul><ul><b>02</b> It then calculates the average CPU ready time (p_summation_cpu_ready_millisecond) for each VM (moid).</ul><ul><b>03</b> An evaluation is performed to determine if the average CPU ready time is high (greater than 500 milliseconds). If it is, the field 'is_high_sumready' is set to 'Yes', otherwise it is set to 'No'.</ul><ul><b>04</b> The fields 'moid', 'avg_p_summation_cpu_ready_millisecond', and 'is_high_sumready' are then displayed.</ul><ul><b>05</b> The query then appends results from a subsearch. This subsearch searches the same index for events with the sourcetype 'vmware:inv:hierarchy' and type 'VirtualMachine'. It removes duplicate 'moid' values and retrieves the 'moid' of the host ESXi server ('changeSet.runtime.host.moid').</ul><ul><b>06</b> The 'esxi_moid' values are then added to the main search results for each 'moid'.</ul><ul><b>07</b> The query then filters for VMs with high CPU ready time ('is_high_sumready' is 'Yes').</ul><ul><b>08</b> The results are then sorted in descending order of average CPU ready time.</ul><ul><b>09</b> Finally, the fields 'moid', 'esxi_moid', 'avg_p_summation_cpu_ready_millisecond', and 'is_high_sumready' are displayed.</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to <b>identify</b> VMs that are experiencing high CPU ready time, which could indicate CPU contention or other performance issues. By also retrieving the host ESXi server, it can help in identifying if there are specific servers that are hosting multiple VMs with high CPU ready time. </div></div>
quid = 45D96901C12ADEBB90F7A0FAA7F3AAD4
search_author = Splunk Portfolio Field Solutions
updated_author = khutchinson
description = <p>Summarizes <b>High CPU Ready Time for Virtual Machines in VMware</b> using <code>index="<<index>>" sourcetype="vmware:perf:cpu" source="VMPerf:VirtualMachine" instance=aggregated</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index="<<index>>" sourcetype="vmware:perf:cpu" source="VMPerf:VirtualMachine" instance=aggregated\
	| stats avg(p_summation_cpu_ready_millisecond) AS avg_p_summation_cpu_ready_millisecond BY moid\
	| eval is_high_sumready = if(avg_p_summation_cpu_ready_millisecond > 500, "Yes", "No")\
	| fields moid avg_p_summation_cpu_ready_millisecond is_high_sumready\
	| append      [ search index="<<index>>" sourcetype="vmware:inv:hierarchy" type=VirtualMachine\
	| dedup moid\
	| eval esxi_moid = 'changeSet.runtime.host.moid'\
	| table moid esxi_moid]\
	| eventstats values(esxi_moid) AS esxi_moid BY moid\
	| search is_high_sumready=”Yes”\
	| sort - avg_p_summation_cpu_ready_millisecond\
	| table moid esxi_moid avg_p_summation_cpu_ready_millisecond is_high_sumready

[visits_by_days_of_the_week_in_iis]
search_name = Top 7 Visited Days of the Week in IIS Logs
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,GoSplunk
solution = <p>Understanding traffic patterns by day of the week helps organizations optimize <b>server capacity</b> and plan <b>maintenance windows</b> during low-traffic periods.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify the busiest days and ensure adequate resources are available.<br><b>2.</b> Schedule maintenance activities during the lowest-traffic days.<br><b>3.</b> Use traffic patterns to inform marketing and content strategies.<br><b>4.</b> Monitor for unexpected changes in day-of-week patterns.<br><b>5.</b> Share findings with stakeholders to align business operations with traffic trends.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="iis"</code><br>       - The query starts by searching the specified index for events with the sourcetype 'iis'.<br><b>02</b> <code>| eval uppercase=upper(substr(date_wday,1,1)).substr(date_wday,2)</code><br>       - Uses the 'eval' function to create a new field 'uppercase' which is the day of the week with the first letter capitalized.<br><b>03</b> <code>| dedup JSESSIONID</code><br>       - The 'dedup' function is used to remove duplicate events based on the 'JSESSIONID' field, representing unique visits.<br><b>04</b> <code>| top limit=7 uppercase</code><br>       - The 'top' function is used to get the top 7 days with the most unique visits.<br><b>05</b> <code>| eval sort_field=case (uppercase=="Sunday",1, uppercase=="Monday",2, uppercase=="Tuesday",3, uppercase=="Wednesday",4, uppercase=="Thursday",5, uppercase=="Friday",6, uppercase=="Saturday",7)</code><br>       - Another 'eval' function is used to create a 'sort_field' which assigns a numerical value to each day of the week, allowing them to be sorted in the correct order.<br><b>06</b> <code>| sort + sort_field</code><br>       - The 'sort' function is used to sort the results based on the 'sort_field'.<br><b>07</b> <code>| fields - sort_field</code><br>       - The 'fields' function is used to remove the 'sort_field' from the results.<br><b>08</b> <code>| rename count as Visits | rename uppercase as "Day of the Week"</code><br>       - The 'rename' functions are used to rename the 'count' field to 'Visits' and the 'uppercase' field to 'Day of the Week', making the results easier to understand.<br>
explanation = <div class="diag-content-box"><div class="diag-content"><p>This query can be used to <b>understand</b> the traffic pattern on a website. It helps identify the busiest days of the week, which can be useful for planning server capacity or scheduling maintenance.</p></div></div>
quid = 7CC8FCAEB6D54DD58BB1FD1097915E0B
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/visits-by-days-of-the-week-in-iis" target="_blank">https://gosplunk.com/visits-by-days-of-the-week-in-iis</a></p>
description = <p>This query is <b>analyzing</b> IIS logs to determine the number of unique visits per day of the week, sorted in the order of the days of the week.</p>
search = index="<<index>>" sourcetype="iis"\
| eval uppercase=upper(substr(date_wday,1,1)).substr(date_wday,2)| dedup JSESSIONID\
| top limit=7 uppercase\
| eval sort_field=case (uppercase=="Sunday",1, uppercase=="Monday",2, uppercase=="Tuesday",3, uppercase=="Wednesday",4, uppercase=="Thursday",5, uppercase=="Friday",6, uppercase=="Saturday",7)\
| sort + sort_field\
| fields - sort_field\
| rename count as Visits\
| rename uppercase as "Day of the Week"

