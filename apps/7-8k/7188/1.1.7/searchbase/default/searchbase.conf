sub_category = Custom
tags = Access,SFU
solution = <p>This query provides a <b>side-by-side comparison</b> of error and failure counts over two consecutive days, allowing users to easily spot deviations or trends. Aligning the datasets via time adjustment aids efficient visualization, ensuring the data comparison is consistent and actionable.</p><p><b>Suggested Actions</b><br><b>1.</b> Review and identify spikes in error or failure counts within daily segments.<br><b>2.</b> Investigate system logs or alerts corresponding to unusual spikes for root cause analysis.<br><b>3.</b> Implement threshold alerting if consistent deviations from normal patterns emerge.<br><b>4.</b> Consider monitoring additional related events or entities to expand insights.<br><b>5.</b> Continuously validate and refine the query's specificity and scope based on evolving operational needs.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" error</code><br>       - Search for events containing the 'error' keyword in the specified index and sourcetype.<br><b>02</b> <code>eval Series="Yesterday"</code><br>       - Create a new field 'Series' and assign it the value 'Yesterday' to label this subset of data.<br><b>03</b> <code>eval _time = _time + 86400</code><br>       - Adjust the '_time' field by adding 86400 seconds (1 day) to shift 'Yesterday' data forward to align with today's timeline.<br><b>04</b> <code>append [ search tag=failure | eval Series="Today" ]</code><br>       - Append data from a subsearch focusing on events tagged as 'failure' and label them as 'Today'.<br><b>05</b> <code>timechart fixedrange=f span=30m count by Series</code><br>       - Generate a 30-minute interval timechart that counts the events for each 'Series' (Yesterday and Today) for comparison purposes.<br>
explanation = <p>This search is crucial for tracking <b>daily trends</b> in error and failure occurrence rates. It is particularly useful for identifying anomalies that could signify a deviation in system performance. The pipeline starts by retrieving events tagged with 'error' for yesterday, creates a <b>time-shifting transformation</b> to align it with today's data, and then appends events labeled with 'failure' for today. This dual-dataset alignment provides a straightforward means to <b>monitor shifts</b> over consecutive days. The <code>timechart</code> command visualizes these patterns, enabling operational teams to act proactively on detected spikes.</p>
quid = C182C566BB184A27AA7BD432068A291F
search_author = grdhg24
updated_author = khutchinson
related_info = <ul>\
	<li><a href="http://blogs.splunk.com/2012/02/19/compare-two-time-ranges-in-one-report/" target="_self">http://blogs.splunk.com/2012/02/19/compare-two-time-ranges-in-one-report/</a></li>\
	<li><a href="https://conf.splunk.com/files/2016/slides/time-after-time-comparing-time-ranges-in-splunk.pdf" target="_self">Time After Time: Comparing Time Ranges in Splunk</a></li>\
	</ul>
description = <p>Summarizes <b>Comparison of Error and Failure Counts Between Today and Yesterday</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" error</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" error\
	| eval Series="Yesterday"\
	| eval _time = _time + 86400\
	| append [ search tag=failure\
	| eval Series = "Today" ]\
	| timechart fixedrange=f span=30m count by Series

