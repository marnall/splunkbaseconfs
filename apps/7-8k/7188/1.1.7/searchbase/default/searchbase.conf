solution = <p>This query identifies <b>patterns of user interactions</b> with scheduled views over specific time periods. Such insights help organizations measure dashboard adoption and target optimization efforts.</p><p><b>Suggested Actions</b><br><b>1.</b> Review which users frequently access scheduled views and their behavior patterns.<br><b>2.</b> Analyze user engagement trends and identify peak usage periods to ensure resource availability.<br><b>3.</b> Correlate dashboard access data with business objectives to align resource allocation.<br><b>4.</b> Use the insights to optimize dashboard delivery schedules for better adoption and efficiency.<br><b>5.</b> Share insights with stakeholders to promote data-driven decision-making around dashboard usage.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd_ui_access "*scheduled/views*" file="*"</code><br>       - Filters Splunk UI access logs to retrieve scheduled views access events.<br><b>02</b> <code>| join type=left user [| rest /services/authentication/users splunk_server=* | table title email realname | rename title as user]</code><br>       - Enriches access logs by joining with user authentication details, providing additional context like realname and email.<br><b>03</b> <code>| eval realname=case (realname!="", realname,email!="",email,true(), user)</code><br>       - Assigns identifier priority as realname → email → user for clearer user attribution.<br><b>04</b> <code>| bin span=4h@h _time</code><br>       - Buckets events into 4-hour intervals for temporal aggregation.<br><b>05</b> <code>| stats count by _time realname</code><br>       - Counts user access per time interval for analysis.<br><b>06</b> <code>| timechart limit=40 span=4h@h sum(count) as visits by realname</code><br>       - Visualizes user access trends in 4-hour intervals, sorted by realname.<br><b>07</b> <code>| addtotals</code><br>       - Computes totals across rows for summary reporting.</p>
explanation = <p>The search gathers data from the _internal index, focusing on Splunk UI access related to scheduled views. It enriches the data by joining with user details using the | rest command to extract email, realname, or title. Using the <b>eval</b> function, it assigns a meaningful identifier to users based on priority (realname, email, user). The <b>bin</b> command buckets the time into 4-hour intervals, and the <b>stats</b> command counts access occurrences. Finally, <b>timechart</b> aggregates and visualizes the access trends by user, allowing operational and business stakeholders to monitor and act on usage patterns. The <b>addtotals</b> command provides a summary for better reporting.</p>
quid = D86A17D8F8EECB87A337E6175F91A76D
search_author = Splunk Portfolio Field Solutions
updated_author = akhamis
description = <p>Summarizes <b>User Scheduled View Access Count in 4-Hour Intervals</b> using <code>index=_internal sourcetype=splunkd_ui_access "*scheduled/views*" file="*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_internal sourcetype=splunkd_ui_access "*scheduled/views*" file="*" \
	| join type=left user \
	[| rest /services/authentication/users splunk_server=* \
	| table title email realname \
	| rename title as user] \
	| eval realname=case (realname!="", realname,email!="",email,true(), user) \
	| bin span=4h@h _time \
	| stats count by _time realname \
	| timechart limit=40 span=4h@h sum(count) as visits by realname \
	| addtotals

