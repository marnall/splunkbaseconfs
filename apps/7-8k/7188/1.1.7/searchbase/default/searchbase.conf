tags = Detail,Password,Suspicious
solution = <p>This SPL flags accounts with excessive password reset activity in Financial Services, enabling rapid detection of account takeover and credential attacks. <b>Suggested Actions</b></p><p><b>1.</b> Alert security teams to possible account compromise.<br><b>2.</b> Investigate affected accounts for fraud or abuse.<br><b>3.</b> Enhance authentication controls for high-risk users.<br><b>4.</b> Integrate results into compliance dashboards.<br><b>5.</b> Review password policies to reduce reset abuse in Financial Services environments.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="buttercup_ad" sourcetype="banking:logins"</code><br>       - Selects all login events in the Financial Services environment.<br><b>02</b> <code>| where _time >= relative_time(now(), "-24h@h") AND password_reset="true"</code><br>       - Filters for password resets in the last 24 hours.<br><b>03</b> <code>| stats count AS change_count earliest(_time) AS first_change latest(_time) AS last_change BY account_number</code><br>       - Aggregates reset counts and identifies first/last reset times per account.<br><b>04</b> <code>| where change_count > 5</code><br>       - Flags accounts with more than 5 resets.<br><b>05</b> <code>| eval first_change=strftime(first_change, "%Y-%m-%d %H:%M:%S"), last_change=strftime(last_change, "%Y-%m-%d %H:%M:%S")</code><br>       - Converts timestamps to readable format.<br><b>06</b> <code>| sort -last_change</code><br>       - Sorts by most recent reset.<br><b>07</b> <code>| table account_number, change_count, first_change, last_change</code><br>       - Outputs key fields for review.
explanation = <p>This search focuses on password resets across accounts, counting reset events in the last day. In the Financial Services sector, a sudden spike in password resets is often an indicator of <b>fraud attempts</b>, <b>phishing attacks</b>, or <b>automated abuse</b>. The SPL uses <b>where</b> for time filtering, <b>stats</b> for aggregation, <b>eval</b> for timestamp formatting, and <b>sort</b> to highlight the most recent activity. Security and compliance teams in the Financial Services industry leverage this pattern to catch early warning signs of credential attacks and automate incident escalation. Junior analysts learn the importance of temporal filtering, aggregation, and clear result formatting for actionable dashboards in financial environments.</p>
quid = E2E943E39CBAD01B3AE5B9A5ED9BF091
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_blank">Splunk Docs: stats command</a><br>How to aggregate and summarize data in Splunk.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Financial Services-focused credential and account security discussions.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Fraud_detection_with_login_activity_analysis" target="_blank">Lantern: Fraud detection with login activity analysis</a><br>Financial fraud detection strategies using login data.</li><li><a href="https://splunkbase.splunk.com/app/3435/" target="_blank">SplunkBase: Security Essentials</a><br>Prebuilt monitoring for financial account security.</li></ul>
description = <p>Summarizes <b>Detecting Rapid Credential Changes</b> using <code>index="*" sourcetype="*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="*" sourcetype="*"\
	| where _time >= relative_time(now(), "-24h@h") AND password_reset="true"\
	| stats count AS change_count earliest(_time) AS first_change latest(_time) AS last_change BY account_number\
	| where change_count > 5\
	| eval first_change=strftime(first_change, "%Y-%m-%d %H:%M:%S"), last_change=strftime(last_change, "%Y-%m-%d %H:%M:%S")\
	| sort -last_change\
	| table account_number, change_count, first_change, last_change

[detecting_rapid_mfa_failures_by_source_ip]
search_name = Detecting Rapid MFA Failures by Source IP
version = 1.0.2
