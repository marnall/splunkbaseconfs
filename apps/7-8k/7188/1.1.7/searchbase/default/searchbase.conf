execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security</code><br>       - This line specifies the data source, targeting the specified index and the 'WinEventLog:Security' source type.<br><b>02</b> <code>(EventCode=636 OR EventCode=632 OR EventCode=650 OR EventCode=655 OR EventCode=660 OR EventCode=665)</code><br>       - Filters events to include only those with the specified EventCodes.<br><b>03</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Creates a new field called 'Date', converting the event time into 'Year/Month/Day' format.<br><b>04</b> <code>| stats count by Date, Caller_User_Name, Target_Account_Name, host, Type</code><br>       - Provides statistical counts of events grouped by Date, Caller_User_Name, Target_Account_Name, host, and Type.<br>
explanation = <p>This query is designed to <b>monitor and analyze Windows security events</b> by identifying patterns or anomalies from EventCodes relevant to user group changes or access activities. It starts by specifying the <b>Windows Security</b> event log as the source and filters out specific EventCodes associated with changes, modifications, or group memberships. It formats timestamps into a readable format to support easier trend analysis, then groups and counts the results by multiple operational dimensions like <b>date</b>, <b>initiating user</b>, <b>target account</b>, <b>host</b>, and <b>event type</b>.</p><p>The query's focus on security allows administrators to detect sudden surges in activity that might indicate security incidents or unauthorized changes, offering a perspective vital for system monitoring and compliance efforts. It supports both real-time case handling and periodic reporting for better insights into security workflow anomalies.</p>
quid = BAE144770ABCF805ACE69360BF2FC2A8
related_info = <p><a href="https://gosplunk.com/changes-to-windows-user-groups-by-account" target="_blank">https://gosplunk.com/changes-to-windows-user-groups-by-account</a></p>
description = <p>Summarizes <b>Security Event Analysis by Date, User, Target Account, and Host</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=636 OR EventCode=632 OR EventCode=650 </code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query focuses on analyzing specific Windows Security Event Codes in a defined index, specifically targeting events indicative of changes or activities within the Windows security framework. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=636 OR EventCode=632 OR EventCode=650 OR EventCode=655 OR EventCode=660 OR EventCode=665)\
| eval Date=strftime(_time, "%Y/%m/%d")\
| stats count by Date, Caller_User_Name, Target_Account_Name, host, Type

[changes_to_windows_user_groups_by_account_2]
search_name = Windows Security Log: Group Membership Changes by Date and Account
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,Users
solution = <p>This query enhances the visibility of group membership changes, facilitating the identification of unauthorized or suspicious alterations in a Windows environment. Understanding these changes is critical for maintaining security and preventing misuse of privileges.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any unexpected changes to group memberships involving high-privilege accounts.<br><b>2.</b> Validate the source account making the changes to ensure it belongs to an authorized administrator.<br><b>3.</b> Correlate this data with login events to verify the context of the change.<br><b>4.</b> Conduct regular audits using this search to identify trends or repeated misuse.<br><b>5.</b> Adjust alerting mechanisms to notify on high-risk changes in real time.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security</code><br>       - This line specifies the data source, searching in the designated index for Windows Security Event Log data.<br><b>02</b> <code>(EventCode=4728 OR EventCode=4732 OR EventCode=4746 OR EventCode=4751 OR EventCode=4756 OR EventCode=4161 OR EventCode=4185)</code><br>       - Filters the data to include only events with specific Event Codes related to group membership changes.<br><b>03</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts the event timestamps into a more readable date format.<br><b>04</b> <code>| rex "Member:\s+\w+\s\w+:.*(?&lt;TargetAccount&gt;.*)"</code><br>       - Extracts the target account from each event using a regular expression.<br><b>05</b> <code>| rex "Account\sName:\s+(?&lt;SourceAccount&gt;.*)"</code><br>       - Extracts the source account from each event using a regular expression.<br><b>06</b> <code>| stats count by Date, TargetAccount, SourceAccount, Group_Name, host, Keywords</code><br>       - Aggregates and counts the events by date, target account, source account, group name, host, and keywords.<br><b>07</b> <code>| sort - Date</code><br>       - Sorts the results by date in descending order.<br><b>08</b> <code>| rename SourceAccount as "Administrator Account"</code><br>       - Renames the 'SourceAccount' field for clarity.<br><b>09</b> <code>| rename TargetAccount as "Target Account"</code><br>       - Renames the 'TargetAccount' field for clarity.<br>
explanation = <p>This query is essential for monitoring and auditing changes to group memberships in a Windows environment. By analyzing specific Windows Security Event Codes, it helps identify potentially unauthorized or suspicious changes, indicating a possible security breach or privilege misuse.</p><p>The search starts by filtering for event codes related to group membership changes and then extracts meaningful details like target accounts, source accounts, and group names. It uses <b>rex</b> to extract key details from event logs and <b>stats</b> to aggregate data for easier analysis by date and other relevant fields. Sorting results by date provides a chronological view, making it easier to trace and investigate changes over time.</p><p>This search offers valuable insights, granting security teams visibility into group membership changes, enabling proactive detection and auditing of privilege alterations.</p>
quid = 641D407589C1AABF1A122AAD61F04872
description = <p>Summarizes <b>Windows Security Log: Group Membership Changes by Date and Account</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4728 OR EventCode=4732 OR EventCode=47</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/get-started.html" target="_blank">Products: Entry point for getting started with Splunk products</a><br>Entry point for getting started with Splunk products.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4728 OR EventCode=4732 OR EventCode=4746 OR EventCode=4751 OR EventCode=4756 OR EventCode=4161 OR EventCode=4185)\
| eval Date=strftime(_time, "%Y/%m/%d")\
| rex "Member:\s+\w+\s\w+:.*(?<TargetAccount>.*)"\
| rex "Account\sName:\s+(?<SourceAccount>.*)"\
| stats count by Date, TargetAccount, SourceAccount, Group_Name, host, Keywords\
