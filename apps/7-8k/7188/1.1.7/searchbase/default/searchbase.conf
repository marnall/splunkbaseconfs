[pi_rm_search_head_discovery]
search_name = Resource Metrics Search Head Filter
version = 2.x
date_created = 2025-12-04
category = Splunk
sub_category = _internal
tags = Cluster,Search Heads,Topology
solution = <p>Populates the searchheads list for filtering resource metrics.</p><p><b>Suggested Actions</b><br><b>1.</b> Integrate dynamic target lists in resource monitoring searches.<br><b>2.</b> Utilize in deployments to track distributed search head assignments.<br><b>3.</b> Enable targeted monitoring without manual updates to server lists.<br><b>4.</b> Facilitate scalable configuration of monitoring tasks.<br><b>5.</b> Enhance operational efficiency and accuracy.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>| rest splunk_server=local /services/server/info</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Query local server info REST endpoint to retrieve server metadata and roles.<br><b>02</b> <code>| where "search_head" in(server_roles)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter to only servers that have the search_head role assigned.<br><b>03</b> <code>| table host | dedup host | sort host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extract hostname, remove duplicates, and sort alphabetically.<br><b>04</b> <code>| eval host="\""+host+"\""</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Wrap each hostname in double quotes for proper list formatting.<br><b>05</b> <code>| stats values(host) as hosts</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Collect all quoted hostnames into a multivalue field.<br><b>06</b> <code>| eval searchheads=mvjoin(hosts,",")</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Join the multivalue field into a comma-separated string.<br>
explanation = <p>This search dynamically discovers search heads in the Splunk deployment by querying the <b>/services/server/info</b> REST endpoint. It filters servers where <b>search_head</b> is present in the <b>server_roles</b> field, then formats the results as a quoted, comma-separated list suitable for use in other searches.</p><p>The search uses <b>dedup</b> and <b>sort</b> to ensure a clean, unique list of hosts. The <b>eval</b> command wraps each hostname in quotes, and <b>mvjoin</b> combines them into a single comma-separated string stored in the <b>searchheads</b> field.</p><p>This discovery mechanism enables other resource monitoring searches to dynamically target search head instances without hardcoding hostnames, making the solution portable across different Splunk deployments.</p>
