[daily_events_metadata]
search_name = Daily Events Metadata
version = 2.x
date_created = 2025-11-14
category = Splunk
sub_category = _internal
tags = Events,Inventory,Metadata
solution = <p>This metadata snapshot supports <b>daily auditing</b> of index data, surfacing total sources, sourcetypes, and hosts contributing to data ingestion.</p><p><b>Suggested Actions</b><br><b>1.</b> Track environment growth over time using trending dashboards.<br><b>2.</b> Investigate sudden changes in metadata diversity.<br><b>3.</b> Compare index counts against expected deployments.<br><b>4.</b> Alert on missing sources or hosts.<br><b>5.</b> Correlate sourcetype inflation with ingest spikes.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| tstats count as eventcount where index=* OR index=_* by host</code><br>       - Count events grouped by host.<br><b>02</b> <code>| stats dc(host) as hosts</code><br>       - Get distinct host count.<br><b>03</b> <code>| appendcols [| tstats count as eventcount where index=* OR index=_* by source | stats dc(source) as sources]</code><br>       - Count distinct sources and append.<br><b>04</b> <code>| appendcols [| tstats count as eventcount where index=* OR index=_* by sourcetype | stats dc(sourcetype) as sourcetypes]</code><br>       - Count distinct sourcetypes and append.<br><b>05</b> <code>| appendcols [| rest splunk_server=local servicesNS/-/-/data/indexes | stats dc(title) as indexes]</code><br>       - Count defined indexes from config.<br><b>06</b> <code>| eval _time=now()</code><br>       - Add current timestamp.<br><b>07</b> <code>| table _time hosts sources sourcetypes indexes</code><br>       - Format the final output.<br>
explanation = <p>By combining <code>tstats</code> and <code>rest</code>, this query extracts <b>metadata</b> about indexed data across multiple dimensions—<code>host</code>, <code>source</code>, <code>sourcetype</code>—as well as index definitions via the REST API. Each part of the SPL contributes a <code>dc()</code> (distinct count) metric. These are appended into a <b>single row</b> using <code>appendcols</code> and finalized with <code>eval _time=now()</code> to timestamp the record.</p><p>This approach helps Splunk admins get a <b>real-time snapshot</b> of indexed diversity and environment scale. Junior Splunkers can learn how to combine <b>statistical summarization</b> with configuration metadata using REST. It’s ideal for use in operational dashboards, capacity planning, and environment auditing.</p>
quid = 218BF1DFE0326D0365ED63CC88E02B34
search_author = vskoryk
description = <p>This search generates a <b>daily summary of key metadata dimensions</b> in your Splunk instance including hosts, sources, sourcetypes, and indexes. It consolidates <b>diverse data discovery</b> patterns into a single view using <b>tstats</b> and <b>REST</b> commands.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | tstats count as eventcount where index=* OR index=_* by host \
	| stats dc(host) as hosts \
	| appendcols [| tstats count as eventcount where index=* OR index=_* by source | stats dc(source) as sources] \
	| appendcols [| tstats count as eventcount where index=* OR index=_* by sourcetype | stats dc(sourcetype) as sourcetypes] \
	| appendcols [| rest splunk_server=local servicesNS/-/-/data/indexes | stats dc(title) as indexes] \
	| eval _time=now() \
	| table _time hosts sources sourcetypes indexes

[dashboard_analysis_2082]
search_name = Count of Scheduled Views Access by User Over Time
version = 2.0.1
date_updated = 2024-2-4 12:53:39
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Dashboards
solution = <p>This query provides actionable insights into the usage patterns of scheduled views in dashboards. It helps track adoption and access trends while enabling visibility over user behaviors in the Splunk environment.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify dashboards with high user engagement to prioritize updates or improvements.<br><b>2.</b> Monitor adoption trends to determine the effectiveness of training or enablement initiatives.<br><b>3.</b> Investigate periods with unexpectedly low or high activity for potential anomalies.<br><b>4.</b> Use user access patterns to inform capacity planning for dashboard resources.<br><b>5.</b> Share usage insights with stakeholders to align business and operational priorities.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd_ui_access "*scheduled/views*" file="*"</code><br>       - Filter events in the internal Splunk logs relevant to scheduled views access.<br><b>02</b> <code>| join type=left user [...]</code><br>       - Enrich data by joining user details from the REST endpoint for user authentication attributes.<br><b>03</b> <code>| eval realname=case (...)</code><br>       - Consolidate user attributes into a single field, prioritizing realname if available, followed by email or user ID.<br><b>04</b> <code>| bin span=4h@h _time</code><br>       - Group events into 4-hour time buckets for aggregation.<br><b>05</b> <code>| stats count by _time realname</code><br>       - Count occurrences per time bucket for each user.<br><b>06</b> <code>| timechart span=4h@h dc(realname) as users</code><br>       - Generate a timechart showing distinct user counts per 4-hour span over the selected period.<br>
explanation = <p>This search operates on the Splunk internal logs to identify the frequency of <b>scheduled view accesses by users.</b> The search leverages the <code>join</code> command to enrich the data with user details such as <b>name</b> and <b>email</b>. The <code>eval</code> function consolidates user-related attributes into a single field, <b>realname</b>, for consistency. Data is then grouped into four-hour increments using <code>bin</code>, allowing for a clear time-based analysis. Finally, the <code>stats</code> and <code>timechart</code> commands calculate the distinct count of users accessing scheduled views, presented over time. This search enables Splunk administrators to monitor user behavior and assess adoption trends involving scheduled views.</p>
quid = 2769DDC91350F91FEE80B6CA5EB91715
search_author = Splunk Portfolio Field Solutions
updated_author = akhamis
description = <p>This search identifies the <b>count of scheduled views</b> accessed by users over a specific time period and organizes it for clear visibility. It provides <b>insight into user behavior</b>, helping administrators understand the usage patterns for dashboards within their Splunk environment.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_internal sourcetype=splunkd_ui_access "*scheduled/views*" file="*" \
	| join type=left user \
	[| rest /services/authentication/users splunk_server=* \
	| table title email realname \
	| rename title as user] \
	| eval realname=case (realname!="", realname,email!="",email,true(), user) \
	| bin span=4h@h _time \
	| stats count by _time realname \
	| timechart span=4h@h dc(realname) as users

