[index_sourcetype_and_retention]
search_name = Index Sourcetype and Retention
version = 2.x
date_created = 2025-11-14
category = Splunk
sub_category = _internal
tags = Index,Retention,Sourcetype
solution = <p>This search helps teams ensure all indexes meet expected data retention policies and understand which sourcetypes are stored in each index.</p><p><b>Suggested Actions</b><br><b>1.</b> Compare configured retention to compliance targets.<br><b>2.</b> Monitor sourcetype distribution across indexes.<br><b>3.</b> Flag indexes with low retention for review.<br><b>4.</b> Ensure key sourcetypes are retained long enough for audits.<br><b>5.</b> Use as input to build a full data governance matrix.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| tstats values(sourcetype) AS sourcetype where index=* by index</code><br>       - Retrieve sourcetypes grouped by index using tstats.<br><b>02</b> <code>| mvexpand sourcetype</code><br>       - Normalize multivalue sourcetypes into separate rows.<br><b>03</b> <code>| rename index AS title</code><br>       - Prep index name for join.<br><b>04</b> <code>| join type=left title [| rest /services/data/indexes | eval retention=frozenTimePeriodInSecs/60/60/24 | stats min(retention) AS retention by title]</code><br>       - Join retention values from config metadata by index.<br><b>05</b> <code>| rename title AS Index</code><br>       - Final rename for output clarity.<br><b>06</b> <code>| table Index sourcetype retention</code><br>       - Present a clean, formatted view.<br><b>07</b> <code>| sort + Index</code><br>       - Sort alphabetically by index name.<br>
explanation = <p>The SPL begins with a <code>tstats</code> call to extract <code>sourcetypes</code> per <code>index</code>. These values are expanded with <code>mvexpand</code> to form a one-to-one map. It then joins this with the output of a <code>rest</code> query to <code>/services/data/indexes</code> that reveals frozenTimePeriodInSecs. This raw value is converted to days using division and summarized per index. The final table shows each index, associated sourcetype, and its effective retention.</p><p>This SPL is ideal for <b>data governance</b>, <b>compliance tracking</b>, and <b>lifecycle validation</b>. Junior Splunkers can learn how to enrich runtime data with static configuration using <code>join</code> and <code>REST</code> endpoints, and how to translate raw metadata fields for real-world insights.</p>
quid = 4A644ABA187AA6BCF049A98063E9F182
search_author = vskoryk
description = <p>This search displays a <b>map of indexes to their sourcetypes</b> and the associated <b>retention period</b> in days. It merges real-time data insights with configuration metadata for a unified retention inventory across Splunk deployments.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | tstats values(sourcetype) AS sourcetype where index=* by index \
	| mvexpand sourcetype \
	| rename index AS title \
	| join type=left title [| rest /services/data/indexes | eval retention=frozenTimePeriodInSecs/60/60/24 | stats min(retention) AS retention by title] \
	| rename title AS Index \
	| table Index sourcetype retention \
	| sort + Index

[index_storage_summary]
search_name = Index Storage Summary
version = 3.0.1
date_created = 2025-09-04
date_updated = 2025-10-16 15:28:13
category = Splunk
sub_category = _internal
tags = Capacity,Hutch,Indexing,Storage
solution = <p>Provides centralized insight into index storage metrics for cost visibility and capacity planning.</p><p><b>Suggested Actions</b><br><b>1.</b> Review top indexes by size weekly.<br><b>2.</b> Adjust retention policies based on size and event growth.<br><b>3.</b> Track storage normalization trends over time.<br><b>4.</b> Alert on unexpected spikes in index growth.<br><b>5.</b> Use as input for storage forecasting dashboards.</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case( \
grandTotalEventCount>=500000000,5, \
grandTotalEventCount>=250000000,4, \
grandTotalEventCount>=100000000,3, \
grandTotalEventCount>=10000000,2, \
1=1,1) </code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <br/><b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload! In some cases if the search "returns no results" but finishes without errors we will set the severity to "normal."</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> <i>Event count within expected range</i></li><li><b>Low (Severity 2):</b> <i>Moderate increase in event count</i></li><li><b>Medium (Severity 3):</b> <i>Substantial index growth</i></li><li><b>High (Severity 4):</b> <i>Potential for capacity threshold breach</i></li><li><b>Critical (Severity 5):</b> <i>Urgent action required; risk of disk space exhaustion</i></li></ul><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| rest /servicesNS/-/-/data/indexes count=0</code><br>       - Retrieve live index metadata including size and event counts.<br><b>02</b> <code>| fields title currentDBSizeMB totalEventCount</code><br>       - Keep only relevant fields for storage and count evaluation.<br><b>03</b> <code>| search title!="_*"</code><br>       - Exclude internal indexes.<br><b>04</b> <code>| stats sum(currentDBSizeMB) as totalDumMB , max(totalEventCount) as totalEventCount by title</code><br>       - Aggregate size and event count per index.<br><b>05</b> <code>| rename title as index</code><br>       - Rename for clarity.<br><b>06</b> <code>| stats count as no_of_indexes, sum(totalDumMB) as totalDumMB, sum(totalEventCount) as grandTotalEventCount</code><br>       - Summarize total number of indexes, size, and events.<br><b>07</b> <code>| eval _time = now()</code><br>       - Capture current timestamp.<br><b>08</b> <code>| bin _time span=1d</code><br>       - Align data to daily buckets.<br><b>09</b> <code>| eval _time = _time-1</code><br>       - Adjust to previous day for consistent daily collection.<br><b>10</b> <code>| eval totalDumBytes = totalDumMB*1024*1024</code><br>       - Convert MB to Bytes.<br><b>11</b> <code>| eval totalDumNorm=case(...)</code><br>       - Normalize bytes to readable format (B, KB, MB, etc.).<br><b>12</b> <code>| eval totalEventCountNorm=case(...)</code><br>       - Normalize event counts (K, M, B, T).<br><b>13</b> <code>| fields - totalDumBytes</code><br>       - Drop intermediate field.<br><b>14</b> <code>| collect `valueindex` name="dum"</code><br>       - Store output in summary index for historical analysis.<br>
explanation = <p>This search provides an at-a-glance view of index size and event volume across a Splunk deployment. It enables monitoring of <b>data retention trends</b>, <b>index-level growth</b>, and <b>storage efficiency</b> across the environment.</p><p>The search pulls live data from the index metadata endpoint and applies byte-to-human-readable normalization. It also evaluates total event volumes with formatting for dashboards and alerts. The final results are collected to a summary index using `collect`, which enables long-term tracking, forecasting, and comparative reporting.</p><p>Junior Splunkers benefit from exposure to REST-based data collection, byte math, normalization via <b>eval case</b>, and use of <b>bin</b> to align time buckets. This is a foundational pattern for creating KPIs and trends from internal metrics.</p>
quid = 896000BACB032A1AAF0A5BF9A9851BFB
search_author = Splunk Searchbase Metadata Gen.
updated_author = khutchinson
related_info = <ol><li data-list="bullet"><span class="ql-ui"></span><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/workload-management/workload-management-overview">Ask Us About Data Strategy!</a></li><li data-list="bullet"><span class="ql-ui"></span><a rel="noopener noreferrer" href="c">IT Essentials</a></li><li data-list="bullet"><span class="ql-ui"></span><a rel="noopener noreferrer" href="e">Inquire About On Demand Services</a></li><li data-list="bullet"><span class="ql-ui"></span><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/indexing/indexes-and-indexers/how-indexes-work">Splunk Docs: Indexes.conf</a></li><li data-list="bullet"><span class="ql-ui"></span>Details on index configuration, including volume limits and retention.</li><li data-list="bullet"><span class="ql-ui"></span><a rel="noopener noreferrer" href="https://lantern.splunk.com/Observability/Optimize/Splunk_Storage_Optimization">Lantern: Splunk Storage Optimization</a></li><li data-list="bullet"><span class="ql-ui"></span>Guidance on minimizing storage usage and improving retention strategies.</li><li data-list="bullet"><span class="ql-ui"></span><a rel="noopener noreferrer" href="https://community.splunk.com/t5/Getting-Data-In/What-determines-index-size/m-p/579946">Splunk Community: What Determines Index Size</a></li><li data-list="bullet"><span class="ql-ui"></span>User discussion and examples on index sizing factors.</li><li data-list="bullet"><span class="ql-ui"></span><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/workload-management/workload-management-overview">Splunk Docs: Workload Management Configurations</a></li><li data-list="bullet"><span class="ql-ui"></span>Optimize system behavior during heavy storage usage.</li><li data-list="bullet"><span class="ql-ui"></span><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/workload-management/workload-management-overview">I</a>nquire About On Demand Services</li></ol>
severity_normal_text = <p>Total event count is within standard operational thresholds.</p>
severity_low_text = <p>Index growth detected, but no immediate concern.</p>
severity_medium_text = <p>Noticeable increase in index volume; monitor for trend continuation.</p>
severity_high_text = <p>Significant storage growth could impact performance.</p>
severity_critical_text = <p>Critical storage threshold breached. Immediate response required.</p>
description = <p><b>Summarizes storage usage</b> across all indexes, including database size and event volume, with normalized output.</p>
search = | rest /servicesNS/-/-/data/indexes count=0 \
	| fields title currentDBSizeMB totalEventCount \
	| search title!="_*" \
	| stats sum(currentDBSizeMB) as totalDumMB , max(totalEventCount) as totalEventCount by title \
	| rename title as index \
	| stats count as no_of_indexes, sum(totalDumMB) as totalDumMB, sum(totalEventCount) as grandTotalEventCount \
	| eval _time = now() | bin _time span=1d | eval _time = _time-1 \
	| eval totalDumBytes=totalDumMB*1024*1024 \
	| eval totalDumNorm=case( \
	totalDumBytes>=(1024*1024*1024*1024*1024),round(totalDumBytes/(1024*1024*1024*1024*1024),1)."PB", \
	totalDumBytes>=(1024*1024*1024*1024),round(totalDumBytes/(1024*1024*1024*1024),1)."TB", \
	totalDumBytes>=(1024*1024*1024),round(totalDumBytes/(1024*1024*1024),1)."GB", \
	totalDumBytes>=(1024*1024),round(totalDumBytes/(1024*1024),1)."MB", \
	totalDumBytes>=1024,round(totalDumBytes/1024,1)."KB", \
	1=1,totalDumBytes."B") \
	| eval totalEventCountNorm=case( \
	grandTotalEventCount>(1000000000000) , round((grandTotalEventCount/1000000000000),1)."T",  \
	grandTotalEventCount>(1000000000) , round((grandTotalEventCount/1000000000),1)."B",  \
	grandTotalEventCount>(1000000) , round((grandTotalEventCount/1000000),1)."M", \
	grandTotalEventCount>(1000) , round((grandTotalEventCount/1000),1)."K",  \
	1=1, grandTotalEventCount) \
	| fields - totalDumBytes \

