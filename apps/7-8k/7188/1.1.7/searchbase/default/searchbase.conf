[savedsearch_result_distribution_and_host_variance]
search_name = Savedsearch Result Distribution And Host Variance
version = 2.x
date_created = 2025-05-18
category = Splunk
sub_category = _internal
tags = Scheduler
solution = Track saved searches running across multiple hosts with inconsistent results or long durations.<br><b>Suggested Actions</b><br><b>01</b> Tune long-duration searches for better performance.<br><b>02</b> Investigate searches with high host variance.<br><b>03</b> Ensure replication and scheduler load are balanced.<br><b>04</b> Deactivate stale or orphaned scheduled searches.<br><b>05</b> Monitor run-time trends for regression detection.<br><br><b>Recommended Alerts</b><br><b>01</b> Normal: < 30s avg run time<br><b>02</b> Low: 30–60s<br><b>03</b> Medium: 60–120s<br><b>04</b> High: 120–180s<br><b>05</b> Critical: > 180s<br><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services</a><br>Cisco Services.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="_internal" sourcetype="<<sourcetype>>" result_count ...</code><br> - Filters internal logs to extract scheduled search execution data.<br><b>02</b> <code>| extract ...</code><br> - Parses key-value pairs from the raw log events.<br><b>03</b> <code>| stats ... by savedsearch_name, app</code><br> - Aggregates metrics for each saved search.<br><b>04</b> <code>| makemv, eval host_count, where, sort ...</code><br> - Analyzes host diversity and filters for multi-host jobs.<br>
explanation = This search extracts scheduler data for all saved searches, measures execution metrics such as result count and run time, and evaluates variance in execution across hosts.<br>This is used to detect potential replication delays, inconsistent execution results, or optimization opportunities in multi-instance Splunk setups.
quid = 41BD5BEA9CC0693CDBBA2D323BD11DC1
search_author = sowings
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/administer/admin-manual/9.4/knowledge/savedsearches.conf">savedsearches.conf</a><br>Defines search behavior, scheduling, and tuning.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats">Stats Command</a><br>Used to aggregate run time and results.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Scheduler-result-count-across-hosts/m-p/395116">Scheduler Result Count</a><br>Cross-host comparison tips for savedsearches.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/makemv">makemv Command</a><br>Handles multivalue parsing for host lists.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/extract">extract Command</a><br>Splits key-value pairs inline from raw fields.</li><li><a href="https://lantern.splunk.com/Observability/Monitoring/Scheduled_search_troubleshooting">Scheduled Search Troubleshooting</a><br>Use case for scheduler tuning and host consistency.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eval">Eval Command</a><br>Used to calculate multivalue host metrics.</li></ul>
description = <p>Summarizes <b>Savedsearch Result Distribution And Host Variance</b> using <code>index="_internal" sourcetype="<<sourcetype>>" result_count host!=acdc-sec-splk-shcp*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="_internal" sourcetype="<<sourcetype>>" result_count host!=acdc-sec-splk-shcp* \
	| extract pairdelim="," kvdelim="=", auto=f \
	| stats avg(result_count) min(result_count) max(result_count), sparkline(avg(result_count)) AS result_sparkline avg(run_time) min(run_time) max(run_time) sum(run_time) values(host) AS hosts count AS execution_count by savedsearch_name, app \
	| rename savedsearch_name AS title \
	| makemv delim="," values(host) \
	| eval host_count=mvcount(hosts) \
	| makemv delim="," hosts \
	| where app!="TA-fire_brigade" AND host_count > 1 \
	| sort - "avg(run_time)"

