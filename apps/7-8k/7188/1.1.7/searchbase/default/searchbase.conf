execution_plan = <b>01</b> <code>index=<<index>> sourcetype=iis</code><br>       - Specify the IIS logs as the data source.<br><b>02</b> <code>| iplocation c_ip</code><br>       - Augment logs with geographic data based on client IPs.<br><b>03</b> <code>| top limit=5 Country</code><br>       - Identify the top 5 countries contributing traffic.<br><b>04</b> <code>| eval percent = round(percent,2) . " %"</code><br>       - Compute and format the percentage contribution of traffic.<br><b>05</b> <code>| rename count as Views | rename percent as Percent</code><br>       - Rename fields to improve clarity and readability.<br>
explanation = <p>This query evaluates traffic patterns extracted from IIS web server logs. The <b>iplocation</b> command enriches logs by attaching geographical details based on client IP addresses. Following this, the <b>top</b> command identifies the five most frequent traffic sources by country.</p><p>Calculated percentages provide a clear proportion of traffic each country generates, which might be useful for business analytics, capacity planning, or identifying unusual traffic patterns that could indicate security threats. The renaming of fields ensures the results are intuitive and business-ready.</p>
quid = F5B90E7BAF3014FFA20F09CEDE9FFD40
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/top-5-visiting-countries-in-iis" target="_blank">https://gosplunk.com/top-5-visiting-countries-in-iis</a></p>
description = <p>Summarizes <b>Top 5 Countries by IIS Log Views with Percentages</b> using <code>index="<<index>>" sourcetype="iis"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This search processes IIS logs to identify the top 5 countries driving traffic to your web server. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index="<<index>>" sourcetype="iis"\
	| iplocation c_ip\
	| top limit=5 Country\
	| eval percent = round(percent,2) . " %"\
	| rename count as Views\
	| rename percent as Percent

