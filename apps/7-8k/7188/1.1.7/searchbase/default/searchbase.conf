tags = CPU,Processes,Search Heads
solution = <p>This query provides a comprehensive breakdown of CPU usage at the search head level, helping teams optimize system performance and resource allocation across different workload categories.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor P90 CPU usage trends to pinpoint process categories requiring optimization.<br><b>2.</b> Use insights to justify scaling resources, whether adding hardware or rebalancing searches.<br><b>3.</b> Optimize resource-heavy processes by analyzing specific configurations or usage patterns.<br><b>4.</b> Educate junior engineers on categorizing workloads through SPL.<br><b>5.</b> Establish baseline CPU utilization for proactive monitoring and alerting scenarios.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index=_introspection sourcetype=splunk_resource_usage component=PerProcess</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Filter resource usage logs for search heads.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Standardize field names for better readability.<br><b>03</b> <code>| eval process_class = case(...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Categorize processes into meaningful groups such as search scheduling, KVStore, or Splunk Web.<br><b>04</b> <code>| bin _time span=10s</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Group events in 10-second intervals to align with time-series evaluation.<br><b>05</b> <code>| stats latest(normalized_pct_cpu) AS pct_cpu by pid, _time, process_class</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Calculate the latest CPU usage percentage by process per interval.<br><b>06</b> <code>| timechart span=1h p90(pct_cpu) AS "P90 CPU Usage" by process_class</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Generate hourly P90 CPU usage trends for each process class.</p>
explanation = <p>This search breaks down <b>CPU consumption</b> on search heads by process classification, revealing which types of workloads consume the most resources. It distinguishes processes like ad-hoc and scheduled searches, Splunk services (splunkd, KVStore, Splunk Web), and ancillary functions like indexing or scripted inputs.</p><p>Using metrics from the _introspection index, it calculates the P90 CPU usage for each process class across time intervals, identifying trends and performance bottlenecks. This is useful for diagnosing load imbalances, informing resource planning decisions, and improving the efficiency of search head operations.</p><p>The search also offers insights to assist junior engineers in understanding SPL logic, including field renaming, conditional evaluations with <b>case</b>, and statistical aggregation techniques like <b>stats</b> and <b>timechart</b>. These SPL principles demonstrate how to apply organized logic for business-critical monitoring.</p>
