solution = <p>By monitoring user-specific disk usage, this search ensures the Splunk environment functions smoothly and uninterrupted by disk-space issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor the top users from the output for high disk usage.<br><b>2.</b> Enforce disk quota limits for users consuming excessive space.<br><b>3.</b> Assist users with search optimization to reduce disk consumption.<br><b>4.</b> Proactively clean up old or unnecessary dispatch directories.<br><b>5.</b> Implement alerting based on high usage thresholds for ongoing monitoring and response.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>| rest splunk_server=local /services/search/jobs</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Queries the Splunk REST API to fetch details about running searches and related disk usage.<br><b>02</b> <code>| eval diskUsageMB=diskUsage/1024/1024</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Converts disk usage from bytes to megabytes for easier readability and analysis.<br><b>03</b> <code>| rename "eai:acl.owner" AS User</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Renames the field representing the user ID for clarity.<br><b>04</b> <code>| stats sum(diskUsageMB) AS "Disk Usage (MB)" by User</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates total disk usage in megabytes by individual users.</p>
explanation = <p>This search is designed to query the Splunk REST API to retrieve information about running searches, focusing on disk space consumed in the dispatch directories by each user. The collected disk consumption data is converted from bytes to megabytes for easier interpretation and aggregate analysis. By identifying users with high disk usage, administrators can take corrective actions, such as optimizing search queries, reallocating resources, or setting better quotas.</p><p>Critical in environments with limited resource availability, this query ensures equitable and effective distribution of disk resources, while teaching reusable SPL techniques like <b>REST endpoints</b>, <b>field renaming</b>, and <b>stats aggregation</b>. This enhances visibility into dispatch directory usage and supports proactive infrastructure and user guidance improvements.</p>
quid = 7E3F9D2B8A4C5E1F6D9B4A8E2F7C5D3A
search_author = Splunk Works
description = <p>Summarizes <b>Current Disk Usage By User</b> using <code>| rest splunk_server=local /services/search/jobs | eval diskUsageMB=diskUsage/1024/1024 | rename "eai:acl.owner" AS User</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/get-started.html" target="_blank">Products: Entry point for getting started with Splunk products</a><br>Entry point for getting started with Splunk products.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li></ul>
