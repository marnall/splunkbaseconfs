tags = Access,SFU
solution = <p>This search provides visibility into USB storage device removals, critical for identifying unauthorized or suspicious activity involving removable media.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate unexpected USB device removals to determine if any unauthorized devices were connected.<br><b>2.</b> Cross-reference with other logs (e.g., authentication or endpoint monitoring) to check for associated anomalies.<br><b>3.</b> Notify IT security teams if suspicious removal patterns are identified.<br><b>4.</b> Review removable storage policies and enforce through group policies or endpoint protection software.<br><b>5.</b> Implement additional monitoring to proactively detect unauthorized USB usage.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=WinRegistry key_path="HKLM\system\controlset*\enum\usbstor\\*" process_image="c:\Windows\system32\svchost.exe" registry_type=DeleteKey</code><br>       - Searches for events in the Windows registry associated with USB storage device deletions.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d %H:%M:%S")</code><br>       - Converts the event's timestamp into a readable date format.<br><b>03</b> <code>| rex "key_path.*usbstor\S(?<DeviceType>.*)&ven\S(?<Vendor>.*)&prod\S(?<Product>\S*)&rev\S"</code><br>       - Extracts device type, vendor, and product from registry path details for further analysis.<br><b>04</b> <code>| stats count by Date, host, Vendor, Product, DeviceType</code><br>       - Aggregates events by key identifiers such as host and device details.<br><b>05</b> <code>| fields - count</code><br>       - Removes redundant event count data for clarity.<br><b>06</b> <code>| sort -Date</code><br>       - Orders results chronologically by descending date values.<br>
explanation = <p>This search is configured to collect and analyze events related to USB storage device deletions from the Windows registry. By targeting the key path <code>HKLM\system\controlset*\enum\usbstor\\*</code> and filtering for event types corresponding to <b>DeleteKey</b>, the query isolates specific registry modifications indicative of device removal.</p><p>The commands emphasize operational relevance:</p><ul><li>The <code>rex</code> command parses detailed device attributes (type, vendor, product) from registry paths.</li><li>The <code>eval</code> command formats timestamps for readability under the <b>Date</b> field.</li><li><code>stats</code> and <code>fields</code> commands organize data to highlight incident details while excluding irrelevant information like raw counts.</li><li>The <code>sort</code> command ensures results are ordered chronologically, allowing for rapid identification of recent activities.</li></ul><p>This aids forensic investigations, assists compliance teams monitoring unauthorized device activities, and supports proactive IT oversight.</p>
quid = D7A027D4661404AA2519310F6BC7133E
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>USB Storage Device Deletion Events from Windows Registry</b> using <code>index="<<index>>" sourcetype=WinRegistry key_path="HKLM\system\controlset*\enum\usbstor\\*" process_image="c:\Windows\sy</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=WinRegistry key_path="HKLM\system\controlset*\enum\usbstor\\*" process_image="c:\Windows\system32\svchost.exe" registry_type=DeleteKey\
| eval Date=strftime(_time, "%Y/%m/%d %H:%M:%S")\
| rex "key_path.*usbstor\S(?<DeviceType>.*)&ven\S(?<Vendor>.*)&prod\S(?<Product>\S*)&rev\S"\
| stats count by Date, host, Vendor, Product, DeviceType  \
| fields  - count \
| sort  - Date

