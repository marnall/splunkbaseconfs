solution = <p>This search helps detect scheduler bottlenecks and informs capacity planning for real-time search use cases. It's particularly useful for teams managing dashboards or alerts that rely on persistent real-time views.</p><p><b>Suggested Actions</b><br><b>1.</b> Evaluate whether real-time searches can be converted to scheduled searches.<br><b>2.</b> Identify peak times for real-time load to balance usage.<br><b>3.</b> Adjust concurrency settings in limits.conf if needed.<br><b>4.</b> Investigate if search quotas are contributing to skipped jobs.<br><b>5.</b> Use with Workload Management to monitor real-time workloads separately.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal host=* source=*metrics.log group=search_concurrency "system total" NOT user=*</code><br>       - Retrieves non-user real-time concurrency stats from internal scheduler logs.<br><b>02</b> <code>| timechart max(active_realtime_searches) AS "Max Real-Time Searches"</code><br>       - Charts the maximum number of active real-time searches over time.<br>
explanation = <p>This search leverages <code>metrics.log</code> data to extract real-time scheduler concurrency for non-user-initiated system processes. It focuses on the <code>search_concurrency</code> group and filters on the “system total” value, removing user-specific data to better capture the platform-wide limits.</p><p>Admins can use this to track how many real-time searches are actively running at once, diagnose if limits are being approached, and plan for capacity expansion. It’s valuable in high-scale environments where real-time dashboards and alerts are heavily used.</p><p>For junior engineers, this example illustrates <b>timechart</b> with aggregation functions and how to target internal Splunk telemetry logs for platform diagnostics.</p>
quid = 1CF3D50AE01BA5CF4AE7FE46F447A47C
search_author = Splunk Searchbase Metadata Gen.
description = <p>Summarizes <b>Number of Users Who Can Run Real Time Searches</b> using <code>index="_internal" sourcetype="<<sourcetype>>" host="*" source="*metrics.log" group=search_concurrency "system total" NOT</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/get-started.html" target="_blank">Products: Entry point for getting started with Splunk products</a><br>Entry point for getting started with Splunk products.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li></ul>
search = index="_internal" sourcetype="<<sourcetype>>" host="*" source="*metrics.log" group=search_concurrency "system total" NOT user=* \
	| timechart max(active_realtime_searches) AS "Max Real-Time Searches"

