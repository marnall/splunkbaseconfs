explanation = <p>This search monitors the rate of disk I/O operations (IOPS) on search heads, tracking both read and write operations per second for each host. High IOPS can indicate <b>I/O contention</b> or storage performance limitations, even when <b>throughput (KB/s)</b> appears normal. This metric is particularly important for identifying <b>random I/O patterns</b> from knowledge bundle operations, <b>search artifact management</b>, or lookups that may benefit from faster storage.</p><p>It enables admins to pinpoint bottlenecks quickly, distinguish throughput-bound versus IOPS-bound disk performance issues, and optimize storage strategies accordingly. Additionally, the search demonstrates key SPL behaviors like <b>stats aggregation</b> and <b>timechart span</b> for trend visualization.</p>
