execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4624 Logon_Type IN (2,7,10,11) NOT user IN ("DWM-*", "UMFD-*")</code><br>       - This line filters Windows Security event logs for event code 4624 (successful logon events) and logon types 2, 7, 10, or 11, excluding system-level accounts (prefixes "DWM-" or "UMFD-") to focus on meaningful user activity.<br> <b>02</b> <code>| eval Workstation_Name=lower(Workstation_Name)</code><br>       - Converts the Workstation_Name field to lowercase for consistency and easier correlation.<br> <b>03</b> <code>| eval hammer=_time</code><br>       - Creates a new field 'hammer', duplicating the _time field to allow granular operations on time without modifying the actual time field.<br> <b>04</b> <code>| bucket span=12h hammer</code><br>       - Segments the events into 12-hour time intervals using the 'hammer' field to aggregate logon activity.<br> <b>05</b> <code>| stats values(Logon_Type) as "Logon Type" count sparkline by user host, hammer, Workstation_Name</code><br>       - Provides statistics on logon types, event counts, and a sparkline visualization by user, host, workstation, and 12-hour time block.<br> <b>06</b> <code>| rename hammer as "12 hour blocks" host as "Target Host" Workstation_Name as "Source Host"</code><br>       - Renames fields for better readability and clarity.<br> <b>07</b> <code>| convert ctime("12 hour blocks")</code><br>       - Converts the '12 hour blocks' field into a human-readable date-time format.<br> <b>08</b> <code>| sort - "12 hour blocks"</code><br>       - Sorts results in descending order of time blocks to show the latest activities first.<br>
explanation = <p>This search tracks user logon activity across Windows systems, focusing on successful attempts (EventCode 4624) through various logon methods. By grouping the logs into 12-hour blocks, users gain a clear view of patterns and anomalies in a manageable timeframe. Examples of anomalies include unexpected after-hours logins or repeated logins from unknown hosts.</p> \
	<p>Fields like <b>Workstation_Name</b> and <b>host</b> are normalized to lowercase for consistent display. The <b>bucket</b> command segments data for effective aggregation, and the <b>stats</b> command reveals critical activity metrics. These include a sparkline visualization to help administrators quickly detect trends. Renamed fields enhance clarity, and time blocks are converted to human-readable formats for accessibility.</p>
quid = 12024335ED83F9F3B7A042FC9DE6C12D
search_author = GoSplunk: SplunkNinja
description = <p>Summarizes <b>Security Logon Events Analysis in 12 Hour Blocks</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4624 Logon_Type IN (2,7,10,11) NOT user</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4624 Logon_Type IN (2,7,10,11) NOT user IN ("DWM-*", "UMFD-*")\
	| eval Workstation_Name=lower(Workstation_Name)\
	| eval hammer=_time\
	| bucket span=12h hammer\
	| stats values(Logon_Type) as "Logon Type" count sparkline by user host, hammer, Workstation_Name\
	| rename hammer as "12 hour blocks" host as "Target Host" Workstation_Name as "Source Host"\
	| convert ctime("12 hour blocks")\
	| sort - "12 hour blocks"

