[f5_bigip_brute_force_and_session_abuse_1]
search_name = F5 BigIP APM Session Analysis with Geo-Location and User Activity
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = Networking
tags = Access,GoSplunk
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The query starts by selecting data from a specific index and sourcetype, which is the F5 BIG-IP APM syslog. It then filters for logs that contain the phrase 'New session from client IP'.</ul><ul><b>02</b> It excludes internal IP addresses and any other specified source IP from the search.</ul><ul><b>03</b> The 'eval' functions are used to assign default values to the 'f5_bigip_host' and 'user' fields if they are null.</ul><ul><b>04</b> The 'iplocation' function is used to get the geographical location of the source IP address.</ul><ul><b>05</b> The 'rename' function is used to rename the 'Region' and 'Country' fields to 'region' and 'country' respectively.</ul><ul><b>06</b> The 'fillnull' function is used to replace any null values with an empty string.</ul><ul><b>07</b> The 'stats' function is used to aggregate the data by various fields such as time, session ID, source IP, host, server host, country, region, URL, datacenter location, and external IP.</ul><ul><b>08</b> The 'fields' function is used to remove the 'count' field from the results.</ul><ul><b>09</b> The 'join' functions are used to combine the results with additional data from the same index and sourcetype, based on the session ID.</ul><ul><b>10</b> The 'eventstats' functions are used to calculate the distinct count of various fields such as user, action, country, source IP, and session ID.</ul><ul><b>11</b> The 'bin' function is used to group the '_time' field into 5-minute intervals.</ul><ul><b>12</b> The 'where' function is used to filter the results to only include those where the user and action fields are not empty, and where the same user has multiple sessions from different IP addresses and countries.</ul><ul><b>13</b> Finally, the 'sort' function is used to sort the results by time, session ID, user, and action.</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to detect <b>potential security threats</b>. For example, if a user is logged in from multiple IP addresses or countries at the same time, it could indicate that the user's credentials have been compromised and are being used by an attacker. By identifying these anomalies, security teams can take <b>appropriate action</b> to mitigate the threat.</div></div>
quid = 909633DEF5F8E9FCBDD5248E304DD941
search_author = GoSplunk: riparino
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/f5-bigip-brute-force-and-session-abuse" target="_blank">https://gosplunk.com/f5-bigip-brute-force-and-session-abuse</a></p>
description = <p>Summarizes <b>F5 BigIP APM Session Analysis with Geo-Location and User Activity</b> using <code>index="<<index>>" sourcetype=f5:bigip:apm:syslog "New session from client IP"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query is used to analyze the logs from an F5 BIG-IP Access Policy Manager (APM) system. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
search = index="<<index>>" sourcetype=f5:bigip:apm:syslog "New session from client IP"\
| search (src!=10.0.0.0/8 AND src!=172.16.0.0/12 AND src!=192.168.0.0/16 AND src!=<Any excluded source IP>)\
| eval f5_bigip_"<rack/slot/dvc_naming>", f5_bigip_host)\
| eval user=upper(user)\
| iplocation src_ip\
| rename Region as region, Country as country\
| fillnull value=""\
| stats count by _time session_id src_ip f5_bigip_host f5_bigip_server_host country region url datacenter_location external_ip\
| fields - count\
| join type=left max=0 session_id[ searchindex="<<index>>" sourcetype=f5:bigip:apm:syslog "Username"\
| eval f5_bigip_"<rack/slot/dvc_naming>", f5_bigip_host)\
| stats count by _time session_id user f5_bigip_host f5_bigip_server_host url datacenter_location external_ip\
| fields - count]\
| join type=left max=0 session_id [ search index="<<index>>" sourcetype=f5:bigip:apm:syslog "Access policy result:"\
| fillnull value=""\
| stats count by _time session_id action logon_type\
| fields - count ]\
| join type=outer max=0 session_id, user[ search index="<<index>>" sourcetype=f5:bigip:apm:syslog "failed"\
| rex field=_raw "authentication with \'(?\s+)\'"\
| eval action="failure"\
| stats count by _time session_id user action ]\
| eval user=upper(user)\
| eventstats dc(user) as num_users dc(action) as flag by session_id\
| eventstats dc(country) as num_country dc(src_ip) as num_connections dc(session_id) as num_sessions by user\
| bin span=5m _time\
| fillnull value=""\
| stats values(country) as country values(src_ip) as src_ip values(region) as region values(f5_bigip_host) as f5_bigip_host values(f5_bigip_server_host) as f5_bigip_server_host values(url) as url values(external_ip) as external_ip count as event_count by _time session_id user action logon_type num_users num_country num_connections flag num_sessions datacenter_location\
| where user!="" AND action!="" AND (num_users>=2 AND num_connections>1 AND num_sessions>1 AND flag>1)\
| sort -_time, -session_id, -user, +action

