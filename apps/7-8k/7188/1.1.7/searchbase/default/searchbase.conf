execution_plan = <b>01</b> <code>search index=notable</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieves all notable events from the notable index.<br><b>02</b> <code>| stats count by source</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Tallies events grouped by "source" (the correlation search name).<br><b>03</b> <code>| sort by count desc</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Arranges correlated searches from highest to lowest count for prioritized review.<br>
explanation = <p>This search identifies which **correlation searches** are driving the generation of notable events by analyzing event aggregation by source (correlation search name). Understanding the count per source aids in identifying **high-frequency searches** that may require tuning—reducing potential **false positives** and assisting in prioritization of **investigation efforts** by security teams. Use of the **stats** command aggregates the distribution, while **sort by count desc** prioritizes examination by volume.</p><p>Highlighting active detection rules ensures that **critical detections**—ones pivotal to organizational threat landscapes—are performing as expected while providing the ability to flag low-priority searches generating trivial noise. Tools like **stats count**, and sorting are examples valuable for mastering **data aggregation** in Splunk.</p>
