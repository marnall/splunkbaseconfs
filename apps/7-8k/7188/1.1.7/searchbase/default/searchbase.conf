updated_author = khutchinson
description = <p>This query is searching for the most <b>frequently occurring</b> referrers in the specified index and sourcetype. This information is <b>valuable</b> for understanding traffic sources.</p> <p>It then returns the referrer and its corresponding percentage of total occurrences.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="access*"\
	| top referer\
	| fields referer percent

[top_sourcetypes_by_throughput]
search_name = Top Sourcetypes By Throughput
version = 2.x
date_created = 2025-05-19
category = Splunk
sub_category = _internal
tags = Throughput
solution = <p>This search illuminates top sourcetypes responsible for high ingestion volumes and supports key operational goals.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate top sourcetypes for high data volume trends.<br><b>2.</b> Align ingestion with license entitlements.<br><b>3.</b> Check if any sourcetypes are improperly configured or ingesting excessive logs.<br><b>4.</b> Review retention and parsing strategies.<br><b>5.</b> Report findings to platform and compliance teams.<br></p><p><b>Recommended Alerts</b><br><b>1.</b> sum(kb) > 500000 for any sourcetype.<br><b>2.</b> Any single sourcetype consuming over 50% of total ingestion.<br><b>3.</b> New sourcetype appears in top 5 unexpectedly.<br><b>4.</b> Rapid week-over-week increase in throughput.<br><b>5.</b> Ingestion spikes for known noisy sources.<br></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal ... group=per_sourcetype_thruput</code><br>       - Targets metrics log entries that measure sourcetype throughput.<br><b>02</b> <code>chart sum(kb) by series</code><br>       - Aggregates total KB per sourcetype.<br><b>03</b> <code>sort -sum(kb)</code><br>       - Sorts results from highest to lowest throughput.<br><b>04</b> <code>head 5</code><br>       - Limits output to the top 5 contributors.<br>
explanation = <p>This search queries Splunk's <b>_internal</b> index, focusing on `metrics.log` files that track per-sourcetype throughput within the last 24 hours. The search aggregates ingestion volume per sourcetype and ranks results by total KB processed.</p><p>For Splunk administrators, this visibility allows proactive management of data ingestion volumes and helps enforce license compliance. Sales engineers can use it to inform customers about efficient data scaling strategies. For junior Splunkers, the search demonstrates core aggregation and sorting capabilities within Splunk, transforming raw metrics data into actionable insights.</p><p>Dashboards built on this data can deliver continuous monitoring of ingestion trends, reduce the risk of license overages, and optimize system load.</p>
quid = 108D6E056A1634AE01ECC51ABBD2E2E2
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/what-data-is-in-the-internal-indexes" target="_blank">Metrics.log Overview</a><br>Learn about internal metrics captured by Splunk.</li><li><a href="https://lantern.splunk.com/Observability/Splunk_Platform/Monitoring/Ingestion_volume_analysis" target="_blank">Ingestion Volume Analysis</a><br>Best practices for monitoring and optimizing ingest.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/chart-sum-kb-by-series-vs-time/m-p/475653" target="_blank">Community: Charting Throughput</a><br>Example on plotting KB per sourcetype over time.</li><li><a href="https://conf.splunk.com/files/2019/slides/FN1043.pdf" target="_blank">Conf Talk: Sizing and Scaling</a><br>How to plan for growth and data surges in Splunk.</li></ul>
description = <p>Summarizes <b>Top Sourcetypes By Throughput</b> using <code>index=_internal (source=*/metrics.log* OR source=*\\metrics.log*) group=per_sourcetype_thruput</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal (source=*/metrics.log* OR source=*\\metrics.log*) group=per_sourcetype_thruput \
	| chart sum(kb) by series \
	| sort -sum(kb) \
	| head 5

[top_statuses_sparklines_58]
search_name = HTTP Status Code Count and Trend Analysis
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,SFU
solution = <p>This search delivers detailed visibility into HTTP status code activity, enabling quick identification of system health and user experience issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any unexpected spike in 4xx or 5xx status codes.<br><b>2.</b> Correlate status counts with system changes to identify potential causes.<br><b>3.</b> Use trends to optimize server configurations or address peak load issues.<br><b>4.</b> Communicate findings to relevant teams for operational improvements.<br><b>5.</b> Automate monitoring thresholds to alert on unusual activity or trend deviations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="*access*"</code><br>       - Searches the specified index, filtering logs matching sourcetypes containing 'access'. The '*' is a wildcard for broad matching.<br><b>02</b> <code>| stats count(status) as count sparkline(count) by status_description</code><br>       - Counts occurrences of each status code, generates a sparkline to visualize trends, and groups results by 'status_description'.<br><b>03</b> <code>| rename status_description as "http status code"</code><br>       - Renames the 'status_description' field for easier understanding of results.<br><b>04</b> <code>| sort - count</code><br>       - Sorts the HTTP status codes in descending order by their occurrence count.<br>
explanation = <p>This query provides insights into the HTTP status codes captured in server logs, which can be used to identify trends, anomalies, or unexpected patterns that indicate system issues. The <b>sparkline</b> helps visualize the trend of these counts over the selected time period, highlighting potential problems such as an uptick in 500-series error codes. Additionally, renaming the 'status_description' field to 'http status code' ensures better clarity in results, and sorting by count emphasizes the most frequent HTTP status codes in the data. This search enables users at both technical and managerial levels to quickly identify and respond to system health and operational issues.</p>
quid = AF6A6D5D7501FE01C62A9E95FDB1A626
search_author = grdhg24
updated_author = khutchinson
related_info = <p><a href="<https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats>" target="_blank"><https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats</a></p>
description = <p>This search counts the occurrences of each HTTP status code in logs, generates a sparkline to visualize the trend over time, renames 'status_description' to 'http status code' for clarity, and sorts the results in descending order of count.</p>
search = index="<<index>>" sourcetype="*access*"\
	| stats count(status) as count sparkline(count) by status_description\
	| rename status_description as "http status code"\
	| sort - count

[top_user_agent_163]
search_name = Top User Agents in Access Logs
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,Users
solution = <p>This query brings forth detailed insights into the <b>common user agents</b> interacting with your web server. This understanding can help track client-side technology trends and identify <b>unexpected or suspicious agents</b>.</p><p><b>Suggested Actions</b><br><b>1.</b> Regularly monitor the top user-agent trends to establish behavioral baselines.<br><b>2.</b> Investigate any unusual or uncommon user-agent strings that appear unexpectedly in the logs.<br><b>3.</b> Cross-reference findings with threat intelligence databases to identify potential malicious agents.<br><b>4.</b> Implement access control measures or filters to block known malicious user agents.<br><b>5.</b> Use insights for capacity planning to optimize services for the most commonly used client types.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/synthetic-monitoring.html" target="_blank">Products: Splunk Synthetic Monitoring</a><br>Splunk Synthetic Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Specifies the index containing the data.<br><b>02</b> <code>sourcetype="access*"</code><br>       - Filters events to include only those with sourcetypes matching 'access*', which captures web server access logs.<br><b>03</b> <code>| top useragent</code><br>       - Displays the most frequent user-agent strings, providing insights into the types of clients accessing the system.<br>
explanation = <p>This query focuses on analyzing user interaction with the system through access logs. The search begins by filtering the specified index for sourcetypes matching 'access*', which includes access log data captured from web servers. By using the <code>| top useragent</code> command, the search leverages Splunk’s native capability to rank the 'useragent' field by frequency of occurrence. This provides clear visibility into the types of clients (browsers, applications, bots) that interact with your system.</p> \
	<p>Operationally, this search aids in identifying trends, spotting abnormal activity through uncommon user agents, and establishing baselines for common client interactions. By monitoring this data, administrators and security teams can act promptly on irregularities.</p>
quid = 8389802575E986DBE61ECC95075A2C78
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Top User Agents in Access Logs</b> using <code>index="<<index>>" sourcetype="access*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/get-started.html" target="_blank">Products: Entry point for getting started with Splunk products</a><br>Entry point for getting started with Splunk products.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li></ul>
search = index="<<index>>" sourcetype="access*"\
	| top useragent

[top_users_162]
search_name = Top 10 Users by Access Frequency with Sparkline
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,Users
solution = <p>This query provides insights into the most active users and their activity patterns within the monitored time frame. By leveraging sparklines, you can visualize changes in user activity, enabling proactive monitoring and response.</p> \
	<p><b>Suggested Actions</b><br> \
	<b>1.</b> Investigate users with unusually high activity for potential misuse or unauthorized access.<br> \
	<b>2.</b> Use the sparkline trends to identify activity spikes that may require deeper analysis.<br> \
	<b>3.</b> Monitor these top contributors regularly to ensure consistent and expected behavior.<br> \
	<b>4.</b> Share findings with relevant teams (e.g., security or operations) for further action.<br> \
	<b>5.</b> Correlate results with other logs to build a clearer picture of user interactions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/synthetic-monitoring.html" target="_blank">Products: Splunk Synthetic Monitoring</a><br>Splunk Synthetic Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=access*</code><br>       - Specify the data source, focusing on events with sourcetype starting with 'access'.<br> \
	<b>02</b> <code>| stats sparkline count by username</code><br>       - Aggregate event counts for each user and create sparklines showing trends over time.<br> \
	<b>03</b> <code>| sort -count</code><br>       - Arrange the results in descending order by event count.<br> \
	<b>04</b> <code>| head 10</code><br>       - Limit the result to the top 10 users with the highest event volume.<br>
explanation = <p>This query surfaces the most active users, determined by event generation frequency. The inclusion of a sparkline visualization highlights time-based trends in user activity, which may indicate unusual patterns or peaks. This can help in identifying potential security risks, understanding user interactions, and diagnosing system issues.</p> \
	<p>The use of the <b>stats</b> command aggregates event counts per user and produces sparklines for a graphical representation of activity. Sorting ensures only the most active users are prioritized, while the <b>head</b> command limits the result set for better focus on top contributors.</p>
quid = 8B9AC19E5DE33B46CBC7D1665B92C9C5
