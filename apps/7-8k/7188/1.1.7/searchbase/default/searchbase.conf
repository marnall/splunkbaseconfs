execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'index' command specifies the index to search. In this case, the index is not specified and would need to be replaced with the actual index name.</ul><ul><b>02</b> The 'source' command specifies the source of the data, which is the Windows Security Event Log.</ul><ul><b>05</b> The 'eval' command creates a new field called 'Date' that contains the date of the event, formatted as YYYY/MM/DD.</ul><ul><b>06</b> The 'rex' command extracts the user account that failed to log in from the event details and stores it in a new field called 'uacct'.</ul><ul><b>07</b> The 'stats' command counts the number of attempts by date, user account, and host.</ul><ul><b>08</b> The 'rename' command renames the 'count' field to 'Attempts'.</ul><ul><b>09</b> The 'sort' command sorts the results in descending order by the number of attempts.}</ul><ul>EventCode=4625' filters the results to include only events with this code, which represents failed logon attempts.</ul><ul>Sub_Status=0xC0000064' further filters the results to include only events with this sub-status, which indicates that the user name does not exist.</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to <b>monitor and investigate suspicious activity</b> on a network. For example, a high number of failed logon attempts from a single user account or host could indicate a brute force attack. The specific sub-status code (0xC0000064) indicates that the user name does not exist, which could suggest that an attacker is trying to guess user names.</div></div>
quid = BBCD9915BBE8A6211101333EAE91230A
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/failed-authentication-to-non-existing-accounts" target="_blank">https://gosplunk.com/failed-authentication-to-non-existing-accounts</a></p>
description = <p>Summarizes <b>Failed Windows Logon Attempts by User and Date</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4625 Sub_Status=0xC0000064</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query identifies failed logon attempts (EventCode=4625) with a specific sub-status (0xC0000064) in the Windows Security Event Log . The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4625 Sub_Status=0xC0000064\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| rex "Which\sLogon\sFailed:\s+Security\sID:\s+\s.*\s+\w+\s\w+\s\s.(?<uacct>\s.*)"\
	| stats count by Date, uacct, host\
	| rename count as "Attempts"\
