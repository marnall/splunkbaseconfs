dispatch_latest_time = now
execution_plan = <b>1.</b> <b>index=(your_index) sourcetype="access_combined"</b><br>\
- Retrieve events from the specified index where sourcetype matches "access_combined". This filters the data to only web access logs relevant for concurrency analysis.<br>\
<b>2.</b> <b>| streamstats time_window=5m dc(clientip) as uniq_user</b><br>\
- Calculate distinct counts of client IPs over a rolling 5-minute window using streamstats. This measures concurrent unique users in near real-time, capturing short-term usage spikes.<br>\
<b>3.</b> <b>| timechart span=1h min(uniq_user) as "Minimum Concurrent Users" max(uniq_user) as "Maximum Concurrent Users" eval(round(avg(uniq_user),0)) as "Average Concurrent Users"</b><br>\
- Aggregate and visualize the hourly minimum, maximum, and rounded average of concurrent users. This produces a timechart for identifying trends and capacity patterns.
explanation = This search provides a comprehensive view of user concurrency by evaluating how many unique users are active simultaneously within rolling 5-minute windows and aggregates these into hourly snapshots for easier trend analysis.<br>\
By monitoring these metrics, operations teams can detect abnormal usage patterns, forecast load demands and correlate traffic trends with business activities like marketing campaigns or product launches.<br>\
Sudden spikes in maximum concurrent users might indicate viral traffic or bot activity, while persistent dips in minimum concurrency could reflect service accessibility issues or user drop-off.<br>\
This search forms a foundational metric for capacity planning, infrastructure scaling and user experience monitoring.
