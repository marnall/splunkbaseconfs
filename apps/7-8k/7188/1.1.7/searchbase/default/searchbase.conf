search_name = Host Activity Analysis: Recent Activity and Count Rangemap
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexing
solution = <p>This query offers <b>insightful monitoring</b> of host activity by displaying recent events and categorizing event counts into ranges. This helps identify normal activity versus potential issues, such as a sudden surge (indicative of anomalies) or minimal activity (signs of operational disruptions).</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts categorized under 'server' or 'high' for potential issues.<br><b>2.</b> Monitor trends over time to refine thresholds for activity ranges.<br><b>3.</b> Use findings to optimize system workload or address inconsistent behavior.<br><b>4.</b> Incorporate this search into dashboards for real-time visibility.<br><b>5.</b> Automate alerts for specific ranges to proactively address anomalies.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| metadata type=hosts index="<<index>>"</code><br>       - Retrieve metadata about hosts from the specified index.<br><b>02</b> <code>| eval diff=now()-recentTime</code><br>       - Calculate the time difference between the current time and the latest event time.<br><b>03</b> <code>| where diff < 600</code><br>       - Exclude events older than 10 minutes.<br><b>04</b> <code>| convert ctime(*Time)</code><br>       - Convert time fields to a human-readable format.<br><b>05</b> <code>| stats count</code><br>       - Calculate the total count of events.<br><b>06</b> <code>| rangemap field=count low=800-2000 elevated=100-799 high=50-99 server=0-49</code><br>       - Categorize event counts into predefined thresholds for easy interpretation.<br>
explanation = <p>This query is instrumental in providing a <b>real-time analysis</b> of host activity within the specified index. By calculating time differences and applying filters, it ensures that only <b>recent activity</b> is considered. The <code>| convert</code> command enhances readability by formatting time fields, while <code>| stats count</code> provides an overview of event volume. The <code>| rangemap</code> command categorizes event counts into actionable ranges (low, elevated, high, and server), making it easier to pinpoint <b>unusual activity</b> or potential <b>operational issues</b>. This search is useful for Splunk administrators aiming to maintain visibility into host activity trends and spot anomalies efficiently.</p>
quid = 046CEFA5D6F28034A0AB92DC56949539
search_author = Splunk
updated_author = khutchinson
related_info = <p><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/troubleshoot-your-deployment" target="_blank">https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/troubleshoot-your-deployment</a></p>
description = <p>Summarizes <b>Host Activity Analysis: Recent Activity and Count Rangemap</b> using <code>| metadata type=hosts index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | metadata type=hosts index="<<index>>"\
	| eval diff=now()-recentTime\
	| where diff < 600\
	| convert ctime(*Time)\
	| stats count\
	| rangemap field=count low=800-2000 elevated=100-799 high=50-99 server=0-49

