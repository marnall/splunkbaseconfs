search = index="<<index>>" sourcetype="access*" status>100 status<300\
	| timechart count BY status

[transforming_data_with_transpose]
search_name = Transforming Data With Transpose
version = 1.0.2
date_created = 2025-05-05 12:35:50
date_updated = 2025-7-2 15:3:29
category = Splunk
sub_category = _internal
tags = Ranspose,Transforming Data
solution = <p>By leveraging the <b>transpose</b> command, this query enables you to reorganize data for more actionable visual comparisons. This approach is essential for highlighting trends or anomalies across metrics and entities such as hosts, metrics, or systems.</p><p><b>Suggested Actions</b><br><b>1.</b> Use <b>stats</b> to aggregate meaningful metrics based on your use case.<br><b>2.</b> Apply <b>transpose</b> to rotate the dataset and create meaningful column headers.<br><b>3.</b> Review the output to ensure it meets your visualization goals.<br><b>4.</b> Adjust fields in the dataset to include any additional metrics or groupings.<br><b>5.</b> Use visualization tools to showcase insights efficiently and effectively.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>The <b>transpose</b> command is a powerful tool for reshaping your data in Splunk. It transforms the original dataset by rotating rows into column headers and column data into rows. This is particularly useful when you want to compare similar metrics across multiple entities like hosts. In this example, the table shows throughput metrics (e.g., *kbps) for each host. After applying <b>transpose</b>, the metrics are grouped together with hosts as the new column headers. The key arguments include:</p><ul><li><b>column_name:</b> Defines the name of the first column in the new table (default: "column").</li><li><b>header_field:</b> Specifies the field used to create new column headers. Default values are row numbers like "row 1," "row 2," etc.</li><li><b>include_empty:</b> Determines if empty cells should be included in the result (default: true).</li><li><b>int:</b> Limits the number of column headers (default: 5).</li></ul><p>Using this approach, analysts can shift focus from row-level data to column-level aggregation, enabling clear and actionable insights for visualizations and reporting.</p>
quid = F459025E4EF61481569ED62C4E87927E
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Transforming Data With Transpose</b> using <code>index=_internal component=Metrics group=thruput</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index=_internal component=Metrics group=thruput</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>stats sum(*kbps) as *kbps by host</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>03</b> <code>transpose 0 column_name=metric header_field=host</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br>
search = index=_internal component=Metrics group=thruput \
	| stats sum(*kbps) as *kbps by host \
	| transpose 0 column_name=metric header_field=host

[trasaction_vs_tstats]
search_name = Access Log Duration Analysis by Field
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,SFU
solution = <p>This query provides valuable insights into <b>event duration patterns</b> in your access logs, helping identify performance bottlenecks and unusual activity.</p><p><b>Suggested Actions</b><br><b>1.</b> Review fields with unusually long durations for potential performance issues.<br><b>2.</b> Investigate outliers in minimum or maximum durations that may indicate anomalies.<br><b>3.</b> Use average duration as a baseline for performance monitoring.<br><b>4.</b> Compare duration metrics over time to detect degradation trends.<br><b>5.</b> Set up alerts for durations exceeding acceptable thresholds.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'index=<<index>> sourcetype=access*' part is specifying the data source. It's looking at the specified index and any source types that start with 'access'.</ul><ul><b>02</b> The '| stats min(_time) AS earliest max(_time) AS latest by FIELD' part is calculating the earliest and latest times for each unique value of FIELD.</ul><ul><b>03</b> The '| eval duration=latest-earliest' part is calculating the duration of each event by subtracting the earliest time from the latest time.</ul><ul><b>04</b> The '| stats min(duration) max(duration) avg(duration)' part is calculating the minimum, maximum, and average durations.}</ul></ol></div></div>
explanation = <p>This query can be used to understand the duration of different events in the access logs. It can help identify any anomalies or outliers in the event durations, which could indicate potential issues or areas for optimization.</p>
quid = D52A6C4188C11EC80C2CA45A685638EF
search_author = grdhg24
updated_author = khutchinson
related_info = <p><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_self">https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats</a></p>
description = This query is calculating the minimum, maximum, and average duration of events grouped by a specific field in the access logs.
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| stats min(_time) AS earliest max(_time) AS latest by FIELD\
	| eval duration=latest-earliest\
	| stats min(duration) max(duration) avg(duration)

[truncation_issues]
search_name = Truncation Issues
date_created = 2024-1-5 17:5:38
date_updated = 2024-1-5 17:5:38
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Indexing
solution = <p>This query provides operational insight into Splunk's data ingestion process by detecting truncation issues caused by line-breaking configurations. It allows administrators to pinpoint sources or hosts contributing to data loss.</p><p><b>Suggested Actions</b><br><b>1.</b> Review "data_sourcetype" with the highest "actual" values exceeding limits to identify problematic sources.<br><b>2.</b> Adjust line-breaking settings for affected events in <code>props.conf</code> or revisit data source configurations.<br><b>3.</b> Use Splunk documentation linked in Related Info to ensure data quality standards.<br><b>4.</b> Monitor average and maximum metrics regularly to detect issues early and proactively mitigate.<br><b>5.</b> Engage with data owners to correct improperly formatted logs, reducing dependency on line-breaking edge cases.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd component=LineBreakingProcessor</code><br>       - Filters logs from the internal index for the LineBreakingProcessor component.<br><b>02</b> <code>| extract</code><br>       - Extracts standard key-value pairs for easier field analysis.<br><b>03</b> <code>| rex "limit\sof\s(?<limit>\S+).*>=\s(?<actual>\S+)"</code><br>       - Captures the "limit" and "actual" values related to line-breaking.<br><b>04</b> <code>| stats count avg(actual) max(actual) values(data_source) values(data_host) dc(data_source) dc(data_host) BY data_sourcetype, limit</code><br>       - Groups results by sourcetype and limit to calculate metrics and identify affected data sources.<br><b>05</b> <code>| eval avg(actual)=round('avg(actual)')</code><br>       - Rounds off the calculated average to simplify result analysis.<br><b>06</b> <code>| sort - count</code><br>       - Orders results by count in descending order for prioritization of sources with the most issues.<br><br>
explanation = <p>This search works by analyzing logs from the <b>LineBreakingProcessor</b> component in the internal index. Extracting fields like "limit" and "actual" helps to evaluate whether the actual line-breaking value exceeds the defined limit, a common indicator of truncation issues. The search then uses <b>stats</b> to group events by sourcetype, limit, and calculates metrics like averages and counts for in-depth analysis.</p><p>By monitoring the average and maximum 'actual' values for each sourcetype, you can pinpoint problematic sources or hosts where data truncation might occur, impacting the completeness and usability of your data.</p>
quid = E13087177CC2C52ACFD7456188FE1D22
search_author = khutchinson
updated_author = khutchinson
related_info = <p><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/troubleshoot-your-deployment" target="_self">Splunk Docs: Resolve Data Quality Issues</a><br><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/indexing/indexes-and-indexers/how-indexes-work" target="_self">Splunk Docs: Configure Event Line Breaking</a><br></p>
description = <p>The search identifies issues within the Splunk <b>line-breaking processor</b>, which handles event parsing during ingestion. It highlights potential <b>truncation and data quality problems</b> related to event line-breaking configurations, ensuring that all your data is properly indexed for analysis.</p>
search = index=_internal sourcetype=splunkd component=LineBreakingProcessor \
	| extract \
	| rex "limit\sof\s(?<limit>\S+).*>=\s(?<actual>\S+)" \
	| stats count avg(actual) max(actual) values(data_source) values(data_host) dc(data_source) dc(data_host) BY data_sourcetype, limit \
	| eval avg(actual)=round('avg(actual)') \
	| sort - count

