[bundle_replication_size_by_host]
search_name = Bundle Replication Size By Host
version = 2.x
date_created = 2025-05-18
category = Splunk
sub_category = _internal
tags = Splunkd
solution = <p>Helps uncover hosts generating large bundles which can delay replication across search head clusters.</p><p><b>Suggested Actions</b><br><b>01</b> Audit apps and lookups deployed to high-bundle hosts.<br><b>02</b> Break up or remove unneeded content from large bundles.<br><b>03</b> Monitor bundle sizes regularly to prevent cluster lag.<br><b>04</b> Review bundle replication settings in server.conf.<br><b>05</b> Correlate large bundles with sync errors or timeouts.</p><p><b>Recommended Alerts</b><br><b>01</b> Normal: max bundle < 25MB<br><b>02</b> Low: 25–50MB<br><b>03</b> Medium: 50–100MB<br><b>04</b> High: 100–150MB<br><b>05</b> Critical: > 150MB</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="_internal" sourcetype="<<sourcetype>>" component=DistributedBundleReplicationManager bundle_file_size=*</code><br>       - Targets bundle replication events from internal logs.<br><b>02</b> <code>| rex field=bundle_file_size "(?<bundle_size>\d+)"</code><br>       - Extracts numeric bundle size in bytes.<br><b>03</b> <code>| eval bundle_size_mb=bundle_size/1024</code><br>       - Converts bytes to megabytes.<br><b>04</b> <code>| stats count max(bundle_size_mb) by host</code><br>       - Aggregates total occurrences and max size per host.<br>
explanation = <p>This search analyzes the size of distributed search bundles by extracting the raw byte value from internal logs and converting it into megabytes. It then groups results by host and identifies the largest bundle size observed in the given window.</p><p>This is important for troubleshooting search head cluster sync delays or performance issues caused by oversized bundles.</p>
quid = 2993639493E18F9BCC508038985A8987
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/distributed-search/about-distributed-search">About Bundle Replication</a><br>Official docs on how bundle replication works.</li><li><a href="https://community.splunk.com/t5/Deployment-Architecture/Bundle-replication-size-issue/m-p/530593">Bundle Replication Size Issue</a><br>User discussion on optimizing bundle size.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/configuration/server.conf">server.conf Reference</a><br>Configuration options for managing bundle replication.</li><li><a href="https://lantern.splunk.com/Observability/Deployments/Cluster_replication_troubleshooting">Cluster Replication Troubleshooting</a><br>Splunk Lantern article on replication performance.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/distributed-search/troubleshoot-search-head-clustering">Troubleshoot SHC</a><br>Guide to identifying sync issues in search head clusters.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Avoid-large-bundle-creation/m-p/519847">Avoid Large Bundle Creation</a><br>Tips for minimizing unnecessary bundle growth.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/indexing/indexes-and-indexers/configure-the-replication-factor">Search Factor and Replication</a><br>Background on how search bundles impact clustering.</li></ul>
description = <p>Measures the maximum <b>bundle replication size</b> in MB by host from internal logs. This search helps identify hosts generating <b>large bundles</b>, allowing admins to detect and address potential delays in <b>search head cluster</b> replication. Monitoring this data ensures smoother operation and faster syncs.</p>
search = index="_internal" sourcetype="<<sourcetype>>" component=DistributedBundleReplicationManager bundle_file_size=* \
| rex field=bundle_file_size "(?<bundle_size>\d+)" \
| eval bundle_size_mb=bundle_size/1024 \
| stats count max(bundle_size_mb) by host

[calculate_event_data_sizes_180]
search_name = Internal Index Field Summary with Space Usage Analysis
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,SFU
solution = <p>Operational insight: This query helps identify fields in Splunk's internal logs that consume a substantial amount of storage, offering opportunities to optimize storage usage and boost performance.</p> <p><b>Suggested Actions</b><br><b>1.</b> Review fields with high 'SpaceMB' values to identify candidates for storage reduction.<br><b>2.</b> Optimize event ingestion by filtering or truncating unneeded fields.<br><b>3.</b> Adjust Splunk configurations to prioritize critical data for efficient indexing.<br><b>4.</b> Regularly check storage impact trends using this query.<br><b>5.</b> Integrate findings into broader data retention policies to maintain system efficiency.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
env_run = 2
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=_internal' is specifying the data source, which is the internal logs of Splunk.</ul><ul><b>02</b> fieldsummary' is generating a statistical summary of all fields in the data.</ul><ul><b>03</b> rex field=values max_match=100 value:(?<foo>[^]*),' is using a regular expression to extract field values.</ul><ul><b>04</b> mvexpand foo' is expanding multivalue fields into separate events.</ul><ul><b>05</b> eval foo_len=len(foo)' is calculating the length of each field value.</ul><ul><b>06</b> rex field=field ^(?!date|punct|host|hostip|index|linecount|source|sourcetype|timeendpos|timestartpos|splunk_server)(?<Field>.*)' is using a regular expression to exclude certain fields from the analysis.</ul><ul><b>07</b> stats max(foo_len) as Bytes values(foo) as Values by Field,count' is calculating the maximum length of the field values, the values themselves, and their count.</ul><ul><b>08</b> eval SpaceMB=(Bytes*count)/1024/1023' is calculating the space occupied by the field values in MB.</ul><ul><b>09</b> rename count as Count' is renaming the 'count' field to 'Count'.</ul><ul><b>10</b> table Field Bytes Count SpaceMB' is creating a table with the fields 'Field', 'Bytes', 'Count', and 'SpaceMB'.</ul><ul><b>11</b> sort -SpaceMB' is sorting the table in descending order of 'SpaceMB'.}</ul></ol></div></div>
explanation = <p>This query provides a comprehensive analysis of the <b>internal logs of Splunk</b>, focusing on the field values and their metrics. By extracting field values and calculating the length, distribution, and space consumption, it helps identify fields with significant storage impact. The use of regular expressions filters out unnecessary fields, targeting only those essential for analysis. The final result surfaces insights into the <b>space utilization</b> of fields, enabling better storage optimization and performance tuning for Splunk administrators.</p>
quid = EE9C13CF416FD70E81851D30175AB910
description = <p>Summarizes <b>Internal Index Field Summary with Space Usage Analysis</b> using <code>index=_internal</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_internal\
| fieldsummary\
| rex field=values max_match=100 "value\":\"(?<foo>[^\"]*)\","\
| mvexpand foo\
| eval foo_len=len(foo)\
| rex field=field "^(?!date|punct|host|hostip|index|linecount|source|sourcetype|timeendpos|timestartpos|splunk_server)(?<Field>.*)"\
| stats max(foo_len) as Bytes values(foo) as Values by Field,count\
| eval SpaceMB=(Bytes*count)/1024/1023\
| rename count as Count\
| table Field Bytes Count SpaceMB\
| sort -SpaceMB

