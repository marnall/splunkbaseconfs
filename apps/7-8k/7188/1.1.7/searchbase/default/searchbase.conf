related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_audit action=search sourcetype=audittrail | rex field=_raw "search_id=\'(?<search_id>[^\']*?)\'" | where NOT match(info, "^granted|^denied") | eval user = if(user="n/a", null(), user) | eval search_type = case( match(search_id, "^SummaryDirector_"), "summarization", match(savedsearch_name, "^_ACCELERATE_"), "acceleration", match(search_id, "^((rt_)?scheduler_|alertsmanager_)"), "scheduled", match(search_id, "\d{10}\.\d+(_[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12})?$"), "ad hoc", true()) | eval search_type=case( match(savedsearch_name,"search\d+") OR match(provenance, "^UI:[D,d]ashboard"), "dashboard", match(search_id,"^rt_"),"realtime", match(search_id,"^subsearch_"),"subsearch", true(),search_type) | eval search=if(isnull(savedsearch_name) OR savedsearch_name=="", search, savedsearch_name) | bin _time span=10s | stats dc(search_id) AS distinct_search_count by _time, search_type | timechart span=10s avg(distinct_search_count) as avg_search_concurrency by search_type

