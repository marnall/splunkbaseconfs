[case_statement_example]
search_name = Audit Search Completion Time and Event Count Statistics
version = 1.0.1
date_updated = 2024-2-4 13:27:5
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,SFU
solution = <p>By analyzing search completion times and categorizing them into time buckets, this query provides <b>operational insights</b> into Splunk's search performance. It highlights data that can expose slow-running searches or inefficiencies in data retrieval, which can directly impact system usability and response times.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate searches with long <b>execution times</b> to identify underlying factors like poorly optimized queries.<br><b>2.</b> Monitor trends in <b>time bucket-based performance</b> to assess improvements or regressions.<br><b>3.</b> Use event count statistics to discover heavily loaded or inefficient data sources.<br><b>4.</b> Analyze recurring issues in specific buckets for systemic problems.<br><b>5.</b> Optimize search performance in Splunk by addressing delays using these metrics as a baseline.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
env_run = 2
execution_plan = <b>01</b> <code>index=_audit action=search info=completed</code><br>       - Filters for completed search actions from _audit logs<br><b>02</b> <code>| eval search_et=if(search_et="N/A",0,search_et)</code><br>       - Replaces 'N/A' values in execution times with 0 for uniformity<br><b>03</b> <code>| eval search_et_diff = exec_time - search_et</code><br>       - Calculates time difference between execution and end time<br><b>04</b> <code>| eval search_et_diff = if(search_et_diff < 0,0,search_et_diff)</code><br>       - Ensures no negative values for calculated time differences<br><b>05</b> <code>| eval time_bucket = case(...)</code><br>       - Categorizes time differences into meaningful time buckets<br><b>06</b> <code>| stats count median(event_count) avg(event_count) median(total_run_time) avg(total_run_time) sum(total_run_time)</code><br>       - Computes statistics for event counts and run times per time bucket<br><b>07</b> <code>| sort time_bucket</code><br>       - Orders output by time bucket for clear analysis<br>
explanation = <p>This search identifies performance patterns for completed searches in Splunk, focusing on execution delays. By leveraging the <b>_audit</b> index, it detects timing mismatches between the execution time and end time of searches. Through <b>categorizing delays</b> into time buckets using the <code>case</code> function, operators can easily map performance distribution. For example, this approach highlights high-latency searches or unreasonably slow execution times while giving a summary of event counts and runtime statistics within each bucket. These insights are invaluable for performance tuning or downtime investigations.</p>
quid = 85D3DFB55BF0988A31FA85ED07729A68
description = <p>Summarizes <b>Audit Search Completion Time and Event Count Statistics</b> using <code>index=_audit action=search info=completed</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_audit action=search info=completed\
| eval search_et=if(search_et="N/A",0,search_et)\
| eval search_et_diff = exec_time - search_et\
| eval search_et_diff = if(search_et_diff < 0,0,search_et_diff)\
| eval time_bucket = case (\
		round((search_et_diff+1800)/3600,0)<10, "< 0" . round((search_et_diff+1800)/3600,0) . " hr(s)",\
		round((search_et_diff+1800)/3600,0) <= 25, "< " . round((search_et_diff+1800)/3600,0) . " hr(s)",\
		round((search_et_diff+3600*12)/(3600*24),0)<10, "< 0" . round((search_et_diff+3600*12)/(3600*24),0) . " days",\
		round((search_et_diff+3600*12)/(3600*24),0)<32, "< " . round((search_et_diff+3600*12)/(3600*24),0) . " days",\
		1 = 1,"> 1 month")\
| stats count median(event_count) avg(event_count) median(total_run_time) avg(total_run_time) sum(total_run_time) by time_bucket\
| sort time_bucket

