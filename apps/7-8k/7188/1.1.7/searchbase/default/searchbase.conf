sub_category = Servers
tags = Access,GoSplunk
solution = <p>This query provides detailed insights into network traffic trends on a per-host basis. By monitoring megabytes received over time, it helps identify <b>patterns of normal usage</b>, as well as <b>anomalies</b>, such as unexpected spikes potentially caused by security threats or misconfigured processes.</p> \
<p><b>Suggested Actions</b></p> \
<b>1.</b> Investigate hosts with sudden or unexpected spikes in network traffic.<br> \
<b>2.</b> Use the trends to plan for network capacity upgrades or redistribution of resources.<br> \
<b>3.</b> Monitor for prolonged periods of high traffic to pinpoint bandwidth-intensive applications or users.<br> \
<b>4.</b> Compare this data with CPU and memory usage metrics for a holistic view of resource utilization.<br> \
<b>5.</b> Automate alerts based on baseline deviations to ensure timely detection of network issues.<br><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> sourcetype="Perfmon:Network Interface" (counter="Bytes Received/sec")</code><br>       - Specifies the data source by filtering for a specific index and sourcetype. Focuses on the Bytes Received/sec counter for all hosts.<br> \
	<b>02</b> <code>| eval MB=(Value/1024/1024)</code><br>       - Converts the data from bytes to megabytes for easier interpretation.<br> \
	<b>03</b> <code>| timechart avg(MB) by host</code><br>       - Generates a time-series chart to visualize the average network bytes received per second for each host.<br>
explanation = <p>This query allows for the <b>monitoring of network traffic</b> across multiple hosts by leveraging performance data from the ‘Bytes Received/sec’ counter. By converting this data into megabytes and visualizing trends over time for each host, users can easily spot <b>anomalies</b>, such as sudden traffic spikes that may indicate security issues or resource bottlenecks. Additionally, this query is useful for <b>capacity planning</b>, enabling better resource allocation and ensuring network stability. The <code>eval</code> command simplifies unit conversion, while <code>timechart</code> provides a clear visualization of average traffic patterns, making it a powerful tool for operational and business decision-making.</p>
quid = 2CB04E07EE9DB4B2F8D54876CD47E1AA
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/network-traffic-received-in-megabytes-over-time" target="_blank">https://gosplunk.com/network-traffic-received-in-megabytes-over-time</a></p>
description = <p>Summarizes <b>Average Network Bytes Received per Second by Host</b> using <code>index="<<index>>" sourcetype="Perfmon:Network Interface" (counter="Bytes Received/sec")</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="Perfmon:Network Interface" (counter="Bytes Received/sec")\
| eval MB=(Value/1024/1024)\
| timechart avg(MB) by host

