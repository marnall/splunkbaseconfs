execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=520) (NOT User="LOCAL SERVICE") (NOT User="SYSTEM")</code><br>       - Extracts Windows Event Log data with EventCode 520, excluding logs generated by LOCAL SERVICE and SYSTEM users.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d %H:%M:%S")</code><br>       - Converts the timestamp into a human-readable format.<br><b>03</b> <code>| eval YourDate=Previous_Time</code><br>       - Sets up the 'Previous_Time' field to represent an earlier time.<br><b>04</b> <code>| eval epoch1=strptime(YourDate,"%H:%M:%S %p %m/%d/%Y")</code><br>       - Converts the formatted 'YourDate' into epoch time.<br><b>05</b> <code>| convert timeformat="%H:%M:%S %p %m/%d/%Y" mktime(YourDate) as oldtime</code><br>       - Creates the 'oldtime' field in a usable epoch format.<br><b>06</b> <code>| eval t=_time</code><br>       - Captures the current event time.<br><b>07</b> <code>| rename t as "eventtime"</code><br>       - Renames the timestamp field for clarity.<br><b>08</b> <code>| eval diff=round(((eventtime-oldtime)/60)/60,2)</code><br>       - Calculates the time difference in hours, rounded to two decimals.<br><b>09</b> <code>| where diff!=0</code><br>       - Excludes logs where no time difference is identified.<br><b>10</b> <code>| stats count by host, User, diff, Date</code><br>       - Aggregates events by key fields and provides event counts.<br><b>11</b> <code>| sort - Date</code><br>       - Sorts the results by date in descending order.<br><b>12</b> <code>| rename diff as "Hours Between New Time and Actual Time" | rename host as "Target Machine" | rename Date as "Date and Time"</code><br>       - Renames fields to provide semantic clarity.<br><b>13</b> <code>| fields - count</code><br>       - Removes the 'count' field from the output for better presentation.<br>
explanation = <p>This search identifies and analyzes suspicious changes to system time in Windows environments by leveraging EventCode 520 from Security Event Logs. Changes to system time can be an indicator of unauthorized activity, especially when initiated by non-system or non-local accounts.</p><p><b>Why this matters:</b> Detecting such changes is critical for ensuring the integrity of system logs, time-dependent operations, and overall security monitoring.</p><p>The SPL utilizes several transformations:</p><ul><li><b>Filtering:</b> Limits results to meaningful changes, removing entries generated by SYSTEM or LOCAL SERVICE accounts.</li><li><b>Field creation:</b> Produces fields like "Date," "eventtime," and "oldtime," providing a clearer understanding of when events occurred.</li><li><b>Time difference calculation:</b> Highlights discrepancies between logged and actual times, revealing unusual patterns or misuse.</li></ul><p>This search empowers security teams by offering visibility into potentially anomalous activities affecting system reliability.</p>
