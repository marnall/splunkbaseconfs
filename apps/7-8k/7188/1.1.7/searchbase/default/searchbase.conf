solution = <p>This query empowers systems administrators and security teams to efficiently monitor and audit user permissions within Splunk.</p><p><b>Suggested Actions</b><br><b>1.</b> Regularly review the roles and capabilities to ensure compliance with access policies.<br><b>2.</b> Identify and investigate users with excessive permissions to minimize security exposure.<br><b>3.</b> Use the output to make informed adjustments to user roles and default applications.<br><b>4.</b> Share findings with governance teams for alignment on access management strategies.<br><b>5.</b> Automate periodic execution of this query to maintain an up-to-date view of user access details.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/authentication/users</code><br>       - Access the REST API to fetch user-related data.<br><b>02</b> <code>| eval name=coalesce(realname, title)</code><br>       - Create a unified 'name' field combining real names and titles for clear user identification.<br><b>03</b> <code>| stats values(roles) as Role first(defaultApp) as "Landing App" count(capabilities) as "Number of Capabilities" by name</code><br>       - Aggregate user data to include roles, default applications, and capability counts per user, grouped by the unified 'name' field.<br>
explanation = <p>This query leverages the 'rest' command to access the REST API endpoint '/services/authentication/users', retrieving critical data about system users. The 'eval' function consolidates user details into a friendly field, 'name,' combining real names and titles. 'stats' aggregates data, creating a report with unique roles, default apps, and capability counts per user.<br><br>Operationally, this search brings value to security teams by providing insights into user roles and permissions, helping to proactively spot overprivileged accounts. Technically, it simplifies Splunk's user information for administrators by transforming and grouping it effectively, allowing better monitoring and control over access patterns. This query directly supports audits and compliance measures, ensuring user permissions align with organizational policies.</p>
quid = 831606D09EB3224C81C35468EEA05AF8
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/1115-2" target="_blank">https://gosplunk.com/1115-2</a></p>
description = <p>Summarizes <b>User Authentication Details with Roles, Landing App and Capabilities</b> using <code>| rest /services/authentication/users</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest /services/authentication/users\
	| eval name=coalesce(realname, title)\
	| stats values(roles) as Role first(defaultApp) as "Landing App" count(capabilities) as "Number of Capabilities" by name

[show_uptime_in_days]
search_name = Unix and WMI Uptime Analysis Sorted by System Up Time
search_hidden = 0
category = Infrastructure
sub_category = Custom
tags = GoSplunk
solution = <p>This query identifies systems with extended uptime, offering insights into potential stability, maintenance schedules, and system updates. The results enable proactive management of infrastructure to mitigate risks associated with extended runtimes.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate systems with extremely long uptimes for potential hardware or software updates.<br><b>2.</b> Ensure reboot policies are enforced consistently across infrastructure.<br><b>3.</b> Analyze trends in uptime to plan future maintenance windows effectively.<br><b>4.</b> Communicate findings to relevant teams to address any overlooked stability concerns.<br><b>5.</b> Document baselines for 'acceptable' uptime for better future monitoring.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=Unix:Uptime OR sourcetype="WMI:Uptime"</code><br>       - Search index for uptime events from Unix and WMI systems<br><b>02</b> <code>| dedup host</code><br>       - Deduplicate results by host, ensuring unique representation per system<br><b>03</b> <code>| eval DaysUp=round(SystemUpTime/86400,2) | eval Years=round(DaysUp/365,2) | eval Months=round(DaysUp/30,2)</code><br>       - Calculate system uptime in days, years, and months for easier analysis<br><b>04</b> <code>| search DaysUp > 1</code><br>       - Filter results to focus on systems with more than 1 day of uptime<br><b>05</b> <code>| table host DaysUp Years Months SystemUpTime</code><br>       - Create a table with selected fields for better visibility<br><b>06</b> <code>| sort - SystemUpTime</code><br>       - Sort results in descending order by uptime, highlighting systems with the longest runtimes<br>
explanation = <p>This search is highly useful for tracking the uptime of Unix and WMI systems. By identifying systems that have been running for unusually long periods without a reboot, it helps administrators spot potential performance degradation or overlooked reboot schedules. Key SPL commands include:</p><ul><li><b>dedup host</b>: Eliminates duplicate entries by selecting one event per host, ensuring a cleaner dataset.</li><li><b>eval</b>: Converts system uptime from seconds to more intuitive units—days, years, and months—for easier interpretation.</li><li><b>search DaysUp > 1</b>: Ensures results focus only on systems that have been operational for more than a day, prioritizing actionable data points.</li><li><b>table</b>: Outputs critical fields like host, uptime in days/years/months, and raw uptime for easy review.</li><li><b>sort - SystemUpTime</b>: Sorts results, highlighting systems with the longest uptimes at the top.</li></ul><p>This search provides key insights into infrastructure health and uptime trends.</p>
quid = 64C9FB889984F2D3BDB9B07E98B2B2AA
search_author = GoSplunk: manderso
related_info = <p><a href="https://gosplunk.com/show-uptime-days" target="_blank">https://gosplunk.com/show-uptime-days</a></p>
description = <p>Summarizes <b>Unix and WMI Uptime Analysis Sorted by System Up Time</b> using <code>index="<<index>>" sourcetype=Unix:Uptime OR sourcetype="WMI:Uptime"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=Unix:Uptime OR sourcetype="WMI:Uptime"\
| dedup host\
| eval DaysUp=round(SystemUpTime/86400,2)\
| eval Years=round(DaysUp/365,2)\
| eval Months=round(DaysUp/30,2)| search DaysUp > 1 \
| table host DaysUp Years Months SystemUpTime\
| sort - SystemUpTime\
|

[show_your_triggered_alerts]
search_name = Audit Alert Details with Remaining Time
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Alerts
solution = <p>This query provides <b>key insights</b> into fired alerts, allowing operational teams to prioritize their responses effectively. By filtering active alerts and presenting key details, it ensures critical issues can be addressed on time.</p> \
<p><b>Suggested Actions</b><br><b>1.</b> Regularly review alerts generated by critical applications to ensure no oversight.<br><b>2.</b> Leverage the "Severity" column to prioritize handling high-impact alerts.<br><b>3.</b> Use results for capacity planning by analyzing alert trends.<br><b>4.</b> Create dashboards with this query to provide real-time alert monitoring.<br><b>5.</b> Use the "Alert Time" data to retrospectively investigate incidents and improve processes.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_audit action=alert_fired ss_app=*</code><br>       - Search the _audit index for events where alerts have been fired from any application.<br> \
	<b>02</b> <code>| eval ttl=expiration-now()</code><br>       - Calculate the time left (ttl) by subtracting the current time from the alert expiration.<br> \
	<b>03</b> <code>| search ttl>0</code><br>       - Exclude alerts that have already expired.<br> \
	<b>04</b> <code>| convert ctime(trigger_time)</code><br>       - Convert the trigger time to a human-readable format.<br> \
	<b>05</b> <code>| table trigger_time ss_name severity</code><br>       - Tabulate details, showing the trigger time, alert name, and severity.<br> \
	<b>06</b> <code>| rename trigger_time as 'Alert Time' ss_name as 'Alert Name' severity as 'Severity'</code><br>       - Rename columns for better readability.<br>
explanation = <p>This search provides a mechanism to monitor <b>activated alerts</b> from the _audit index, relevant across any application using Splunk alerts. By employing the <code>eval</code> function, it calculates the <b>remaining time to expiry (ttl)</b> for each alert, which helps operations teams focus on active and timely responses.</p> \
	<p>The command <code>search ttl>0</code> efficiently discards expired alerts ensuring the results are concise and actionable. By using <code>convert ctime</code>, the search enables the display of <b>human-readable timestamps</b>, improving report clarity. Renaming columns like <b>"Alert Time"</b>, <b>"Alert Name"</b>, and <b>"Severity"</b> ensures the output is understandable at a glance, making it valuable for tracking and prioritizing alert resolutions.</p>
quid = 23E796FB7ED661A60EEAF4FFDA12EEDC
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/show-your-triggered-alerts" target="_blank">https://gosplunk.com/show-your-triggered-alerts</a></p>
description = <p>Summarizes <b>Audit Alert Details with Remaining Time</b> using <code>index=_audit action=alert_fired ss_app=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_audit action=alert_fired ss_app=*\
	| eval ttl=expiration-now()\
	| search ttl>0\
	| convert ctime(trigger_time)\
	| table trigger_time ss_name severity\
	| rename trigger_time as "Alert Time" ss_name as "Alert Name" severity as "Severity"

[shutdown_or_suspend_a_service_in_windows]
search_name = Count of Application Events by Date, Source and Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This query provides operational insight into <b>event occurrences</b> in Windows Application Event Logs. It highlights patterns and trends based on filtered events, helping administrators identify potential issues or anomalies such as application crashes or service interruptions.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts with unusually high or low event counts to identify anomalies.<br><b>2.</b> Cross-reference SourceName with known application logs for potential issues.<br><b>3.</b> Monitor for recurrence of specific event codes over time to detect patterns.<br><b>4.</b> Incorporate findings into automated alerting systems for proactive issue tracking.<br><b>5.</b> Archive results for regular trend analysis and historical comparison.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=*WinEventLog source=*WinEventLog:Application EventCode=108</code><br>       - Filters the data to include only Windows Application Event Logs with EventCode 108.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts the event's timestamp into a 'Year/Month/Day' format.<br><b>03</b> <code>| stats count by Date, SourceName, host</code><br>       - Aggregates the total count of events by Date, SourceName, and host.<br><b>04</b> <code>| sort - Date</code><br>       - Sorts the results in descending order by Date.<br><b>05</b> <code>| fields - count</code><br>       - Removes the 'count' field from the final output.<br>
explanation = <p>This search provides insights into specific <b>Windows Application Event Logs</b> (EventCode 108) over a 24-hour timeframe. By transforming the timestamp into a readable 'Year/Month/Day' format, the search makes event occurrences easier to understand and analyze. Using statistical aggregation, it counts events by Date, SourceName, and host, allowing users to identify trends and anomalies. Sorting results in descending order enables rapid access to the most recent events, while filtering ensures focus on critical data.</p>
quid = 21B7C8B659A384EF72EBB3A58A39371D
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/shutdown-or-suspend-a-service-in-windows" target="_blank">https://gosplunk.com/shutdown-or-suspend-a-service-in-windows</a></p>
description = <p>Summarizes <b>Count of Application Events by Date, Source and Host</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Application EventCode=108</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Application EventCode=108\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| stats count by Date, SourceName, host\
	| sort - Date\
	| fields - count

[simple_geoip_information_for_web_traffic]
search_name = Top 3 Visitor Nationalities and Their Percentages in IIS Logs
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,GoSplunk
solution = <p>This search offers actionable insights into web traffic distribution, helping stakeholders understand visitor demographics and regional impacts on their site. It allows monitoring traffic consistency and unearths patterns significant for operational decisions.</p> \
<p><b>Suggested Actions</b></p> \
<b>1.</b> Utilize results to tailor geographic-specific marketing strategies.<br> \
<b>2.</b> Investigate regions with less traffic for accessibility issues.<br> \
<b>3.</b> Align website language or content based on popular visitor origins.<br> \
<b>4.</b> Assess international engagement for global strategy planning.<br> \
<b>5.</b> Regularly monitor for shifts or new patterns in visitor geography.<br><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="iis"</code><br>       - Specify the IIS data source.<br> \
	<b>02</b> <code>| iplocation c_ip</code><br>       - Derive geographical locations from client IPs.<br> \
	<b>03</b> <code>| fillnull value="Unknown" Country</code><br>       - Replace null 'Country' values with 'Unknown.'<br> \
	<b>04</b> <code>| eval GeoLocation=case ...</code><br>       - Categorize locations into three visitor types.<br> \
	<b>05</b> <code>| top limit=3 GeoLocation</code><br>       - Identify the top 3 visitor categories.<br> \
	<b>06</b> <code>| eval percent = round(percent,2) . " %"</code><br>       - Round percentages and add a '%' symbol.<br> \
	<b>07</b> <code>| rename GeoLocation as "Visitor Nationality"</code><br>       - Rename 'GeoLocation' for clarity.<br> \
	<b>08</b> <code>| rename percent as Percent</code><br>       - Standardize field naming.<br> \
	<b>09</b> <code>| fields - count</code><br>       - Exclude the 'count' field from the final output.<br>
explanation = <p>This query provides detailed geographical insights into website traffic based on IIS logs. By leveraging the <b>iplocation</b> command, it identifies the origin of visitors using client IPs and categorizes them. The <b>fillnull</b> command ensures no critical data is missed by filling empty 'Country' values with 'Unknown.'</p> \
	<p>The query further uses <b>eval</b> with <b>case</b> logic to classify the geographical origins. This classification helps in understanding user demographics, which is valuable for website administration, targeted marketing efforts, and accessibility reviews. The <b>top</b> command helps identify the most common visitor categories, while the <b>percent</b> field is rounded and enhanced to provide a clear data presentation. Finally, fields like 'count' are excluded to simplify the output display for better readability.</p>
quid = C856ACD1889EB48FBE9813FF7B52CD6F
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/simple-geoip-information-web-traffic" target="_blank">https://gosplunk.com/simple-geoip-information-web-traffic</a></p>
description = <p>Summarizes <b>Top 3 Visitor Nationalities and Their Percentages in IIS Logs</b> using <code>index="<<index>>" sourcetype="iis"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="iis"\
	| iplocation c_ip\
	| fillnull value="Unknown" Country\
	| eval GeoLocation=case (Country="United States", "Views from the United States", Country="Unknown", "Views from Unknown Origins", Country!="United States" AND Country!="Unknown", "International Views")\
	| top limit=3 GeoLocation\
	| eval percent = round(percent,2) . " %"\
	| rename GeoLocation as "Visitor Nationality"\
	| rename percent as Percent\
	| fields - count

[simple_outlier_search]
search_name = Identify Users with Abnormal Failed Password Attempts
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,Searching
solution = <p>This query reveals users with unusual failed password attempts, enabling proactive analysis of possible human errors or attack vectors for compromised accounts.</p> \
	<p><b>Suggested Actions</b><br> \
	<b>1.</b> Investigate flagged accounts for any known legitimate reasons for repeated failed passwords.<br> \
	<b>2.</b> Contact users involved to validate suspicious activity and reinforce proper password practices.<br> \
	<b>3.</b> Monitor flagged accounts for potential compromising indicators, such as abnormal concurrent logins or IP geolocations.<br> \
	<b>4.</b> Strengthen account protections, including enforcing multi-factor authentication (MFA) if necessary.<br> \
	<b>5.</b> Increase logging and threshold alerts around flagged user accounts to catch early warning signs of continued brute force attempts.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" "Failed Password"</code><br>       - Filters events to retrieve only 'Failed Password' incidents within the specified time range.<br> \
	<b>02</b> <code>| stats count by user</code><br>       - Aggregates the number of such events per user.<br> \
	<b>03</b> <code>| eventstats avg(count) as avg_count stdev(count) as stdev_count</code><br>       - Computes average and standard deviation for per-user count metric to establish statistical baselines.<br> \
	<b>04</b> <code>| where count>(avg_count + 2*stdev_count)</code><br>       - Filters to isolate users falling significantly above the norm.<br> \
	<b>05</b> <code>| sort -count</code><br>       - Finalizes output by showing the most anomalous users first, ordered by the number of failed attempts.<br>
explanation = <p>This search is designed to flag users with abnormally high numbers of 'Failed Password' events. The first SPL line narrows down the dataset to relevant events matching 'Failed Password' in the designated index and sourcetype. Next, it counts events per user, which lays the foundation for each subsequent statistical operation.</p> \
	<p>The query leverages statistical calculations like <b>average</b> and <b>standard deviation</b> to identify outliers. Users whose failed password attempts are beyond two standard deviations from the mean are flagged for deeper investigation. Possible scenarios uncovered by this are (1) legitimate users struggling to remember new passwords or (2) malicious brute-force activity targeting specific accounts. Security professionals can prioritize these outliers for timely action, potentially mitigating access risks or cyber-attack vectors.</p>
quid = 776CFE4BFE9F0EF2EF98A19B9AE2DE1F
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Identify Users with Abnormal Failed Password Attempts</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" "Failed Password"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>" "Failed Password"\
| stats count by user\
| eventstats avg(count) as avg_count stdev(count) as stdev_count\
| where count>(avg_count + 2*stdev_count)\
| sort  -count

[single_value_compare_181]
search_name = Hourly Average Error Count by Source Type
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,SFU
solution = <p>Evaluating hourly error distribution can help optimize system performance and resilience by identifying critical periods that require attention.</p><p><b>Suggested Actions</b><br><b>1.</b> Validate that the specified index and sourcetype are correct to ensure the search covers the intended scope.<br><b>2.</b> Monitor hours with consistently high error averages and correlate with system logs for root cause analysis.<br><b>3.</b> Use the insights to schedule maintenance or optimize operations during high-risk periods.<br><b>4.</b> Compare average error counts across different days or weeks to spot trends or inconsistencies.<br><b>5.</b> Adapt monitoring and alert strategies based on the identified error peaks.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" error</code><br>       - Fetch all events matching the keyword 'error' from the defined index and sourcetype.<br><b>02</b> <code>| timechart span=1h count</code><br>       - Aggregate error events into hourly buckets and count occurrences per bucket.<br><b>03</b> <code>| eval Hour = strftime(_time,"%H")</code><br>       - Extract the hour from the event's timestamp for grouping error counts by hour.<br><b>04</b> <code>| stats avg(count) as AverageCount by Hour</code><br>       - Compute the average number of error events for each hour, yielding time-specific insights.<br>
explanation = <p>This query serves as a <b>key diagnostic tool</b> for monitoring errors and understanding their distribution over time. The first command filters for events containing the keyword 'error' in the specified index and sourcetype. The <code>timechart</code> command aggregates these results into hourly intervals, providing clear visibility into when errors occur. Using <code>eval Hour = strftime()</code>, the query isolates the hour of occurrence, making it easier to identify time-specific patterns. Finally, <code>stats avg(count)</code> computes the average occurrence of errors by hour, offering a comprehensive view of error trends. This approach helps technical teams to pinpoint operational anomalies and allocate resources to high-priority time windows.</p>
quid = 203399F0DB63A907ED345F310051DDA3
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Hourly Average Error Count by Source Type</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" error</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>" error\
	| timechart span=1h count\
	| eval Hour = strftime(_time,"%H")\
	| stats avg(count) as AverageCount by Hour

