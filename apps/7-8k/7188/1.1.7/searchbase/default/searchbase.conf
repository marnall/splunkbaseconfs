[pivoting_a_statistics_table]
search_name = Pivoting A Statistics Table
version = 1.0.2
date_created = 2025-05-05 12:33:15
date_updated = 2025-7-2 15:1:46
category = Threat Hunter's Cookbook
sub_category = Clustering
tags = Pivot,Table
solution = <p>This query provides operational value by highlighting parent-child process relationships across a Windows environment. The pivot table format simplifies deep dives into process behavior, making threat-hunting <b>faster</b> and more <b>effective</b>.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate parent processes with an unusually high number of child processes.<br><b>2.</b> Identify rare or unexpected process combinations for potential threats.<br><b>3.</b> Use the pivot table as a baseline for normal behavior comparisons.<br><b>4.</b> Pair findings with endpoint monitoring tools for validation.<br><b>5.</b> Integrate this data with alerts to automate anomaly detection.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4688</code><br>       - Filters for new process creation events from Windows Security logs.<br><b>02</b> <code>| stats count by Creator_Process_Name, New_Process_Name</code><br>       - Counts occurrences of each parent-child process relationship.<br><b>03</b> <code>| xyseries Creator_Process_Name, New_Process_Name, count</code><br>       - Pivots the data into a matrix showing process relationships.<br>
explanation = <p>The query processes new process creation events (EventCode=4688) from Windows Security logs. It uses Splunk's <b>stats</b> command to count occurrences of each combination of "Creator_Process_Name" and "New_Process_Name."</p><p>The <b>xyseries</b> command then transforms this data into a pivot table, where rows represent parent processes and columns represent their child processes. This matrix format simplifies analysis by allowing straightforward comparisons of process creation patterns.</p><p>Such a visualization is ideal for spotting irregular or unexpected behavior in process relationships, helping analysts investigate potential threats or anomalies. Additionally, pivot tables are essential for highlighting patterns and prioritizing further forensic analysis.</p>
quid = AE9012A5A130A8687678CBAF0B683012
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Pivoting A Statistics Table</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4688</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4688 \
	| stats count by Creator_Process_Name, New_Process_Name \
	| xyseries Creator_Process_Name, New_Process_Name, count

[port_scan_attack_by_juniper]
search_name = Juniper Firewall: Non-local Source with Over 1000 Unique Destination Ports
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = Networking
tags = Access,GoSplunk
solution = <p>This query provides crucial insights into potential reconnaissance and attack attempts originating from external sources targeting your infrastructure. </p><p><b>Suggested Actions</b><br><b>1.</b> Investigate flagged source IPs for malicious activities or prior incidents.<br><b>2.</b> Correlate detected events with threat intelligence feeds to verify if the source IP is in any known blocklist.<br><b>3.</b> Analyze destination systems for potential vulnerabilities that could be exploited.<br><b>4.</b> Implement temporary blocks or rate-limiting measures for offending source IPs.<br><b>5.</b> Review and harden perimeter defense mechanisms, including IDS/IPS configurations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="juniper:firewall" src!="192.168.*"</code><br>       - Filters for events from Juniper Firewall where the source is non-local.<br><b>02</b> <code>| bin _time span=5m</code><br>       - Groups events into 5-minute intervals.<br><b>03</b> <code>| stats dc(dest_port) as distinct_port by src,dest,_time</code><br>       - Calculates distinct count of destination ports accessed by each source-destination pair for each time interval.<br><b>04</b> <code>| where distinct_port >1000</code><br>       - Identifies only rows where the distinct port count exceeds 1000, revealing significant anomalies.<br><br>
explanation = <p>In network security, detecting atypical behavior such as many destination ports accessed by a single source indicates possible malicious activity. This search specifically highlights scenarios usually tied to <b>port scans, probing</b>, or unauthorized reconnaissance activities. The use of <code>dc(dest_port)</code> in combination with <code>bin</code> groups the events into 5-minute intervals, making it easier to pinpoint short-burst behaviors that evade detection in larger datasets. Applying a threshold (>1000 distinct ports) further narrows the focus to significant anomalies.</p>
quid = 6913E38CB8E291A72338EE5742D2A52C
search_author = GoSplunk: MaryamSaniee
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/port-scan-attack-by-juniper" target="_blank">https://gosplunk.com/port-scan-attack-by-juniper</a></p>
description = <p>Summarizes <b>Juniper Firewall: Non-local Source with Over 1000 Unique Destination Ports</b> using <code>index="<<index>>" sourcetype="juniper:firewall" src!="192.168.*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="juniper:firewall" src!="192.168.*"\
| bin _time span=5m\
| stats dc(dest_port) as distinct_port by src,dest,_time| where distinct_port >1000

[port_usage_for_opsec_sourcetype]
search_name = Count of Events by Port, Protocol, Destination, Service, Action, and Product
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Health
tags = Access,GoSplunk
solution = <p>This query provides actionable insights into network usage patterns and behaviors, making it easier to detect potential security threats and operational bottlenecks.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor fields like <b>action</b> and <b>dest_svc</b> for unexpected trends signaling potential issues.<br><b>2.</b> Investigate unusual traffic on specific <b>s_ports</b> to identify potential misconfigurations or malicious activity.<br><b>3.</b> Use <b>proto</b> observations to verify that protocol usage aligns with organizational standards.<br><b>4.</b> Assess <b>product</b> field data to ensure proper functioning of deployed solutions.<br><b>5.</b> Integrate findings into regular operational reviews and adjust configurations as needed.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Specifies the index to retrieve data. Replace "<<index>>" with the desired index name.<br><b>02</b> <code>sourcetype=opsec</code><br>       - Filters events to include only those with the specified sourcetype, focusing the query on OPSEC.<br><b>03</b> <code>|</code><br>       - Passes the filtered results to the next SPL command.<br><b>04</b> <code>stats count by s_port proto dest dest_svc action product</code><br>       - Groups and counts the events by key fields (source port, protocol, destination, etc.) to identify patterns and anomalies.<br>
explanation = <p>By analyzing traffic patterns, this search aids in understanding network behaviors. It uses the <b>stats</b> command to summarize and group data by critical network attributes such as <b>s_port</b>, <b>proto</b>, <b>dest</b>, <b>dest_svc</b>, <b>action</b>, and <b>product</b>. These groupings provide a detailed breakdown of traffic characteristics. For security teams, this breakdown is valuable for detecting anomalies like unusual port activity or unexpected protocol usage. For operational teams, it offers insights into service and product adoption, assisting in performance evaluation and troubleshooting potential bottlenecks.</p>
quid = C34164401CA4D415C57FE847CF2655B0
search_author = GoSplunk: pradeep577
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/port-usage-for-opsec-sourcetype" target="_blank">https://gosplunk.com/port-usage-for-opsec-sourcetype</a></p>
description = <p>Summarizes <b>Count of Events by Port, Protocol, Destination, Service, Action, and Product</b> using <code>index="<<index>>" sourcetype=opsec</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=opsec\
	| stats count by s_port proto dest dest_svc action product

[potential_suspicious_activity_in_windows]
search_name = Security Event Log Analysis for Suspicious Executable Activities
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This query provides <b>critical visibility</b> into potentially harmful executable activities in a Windows environment. By focusing on process creation events and filtering out system accounts, it enables targeted threat hunting and accelerated forensic analysis.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Investigate any appearance of known malicious executables, especially tools like "mimikatz.exe" or "powershell.exe".<br> \
<b>2.</b> Cross-reference results with known indicators of compromise (IOCs) in your threat intelligence feeds.<br> \
<b>3.</b> Escalate and mitigate detected threats by disabling affected accounts or terminating malicious processes.<br> \
<b>4.</b> Implement proactive monitoring for repeated suspicious activity.<br> \
<b>5.</b> Adjust detections or develop new correlations to identify additional behaviors indicative of compromise.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security EventCode=4688 NOT (Account_Name=*$)</code><br>       - Filter for process creation events (EventCode=4688) while excluding system accounts.<br><b>02</b> <code>(arp.exe OR at.exe ... OR winrm.* OR wusa.exe)</code><br>       - Detect execution of executables associated with malware, hacking tools, or system misuse.<br><b>03</b> <code>| eval Message=split(Message,".")</code><br>       - Split the message field at each period for increased clarity.<br><b>04</b> <code>| eval Short_Message=mvindex(Message,0)</code><br>       - Extract the first portion of the split message as a summary descriptor.<br><b>05</b> <code>| table _time, host, Account_Name, Process_Name, Process_ID,...</code><br>       - Compile essential event details for actionable intelligence and circumstantial analysis.<br>
explanation = <p>This search tracks the execution of processes in Windows environments by leveraging Security Event Logs with EventCode=4688. This code represents the creation of new processes, an activity often exploited during cyberattacks. By filtering out system accounts (Account_Name ending in $), the search refines results to highlight user-associated actions, enabling a more focused investigation.</p> \
	<p>The query specifically detects processes deemed suspicious or indicative of attacker behavior, such as "mimikatz.exe," "powershell.exe," or "winrm.*". These are commonly used in lateral movement, privilege escalation, or reconnaissance activities. Each message is split at periods (.) for better readability, and the table fields aggregate critical data. This allows security professionals to quickly identify not just what process was executed, but by whom, and with what intent (via command lines).</p> \
	<p><b>Key benefits:</b><ul><li>Highlights deviations or malicious usage patterns.</li><li>Provides detailed process-related information to narrow investigation scope.</li><li>Improves response time in detecting unauthorized or risky behaviors.</li></ul></p>
quid = DC1550D84DEB4F28D4D2A03F8AC1F3ED
search_author = GoSplunk: john117
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/potential-suspicious-activity-windows" target="_blank">https://gosplunk.com/potential-suspicious-activity-windows</a></p>
description = <p>Summarizes <b>Security Event Log Analysis for Suspicious Executable Activities</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4688 NOT (Account_Name=*$) (arp.exe OR </code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4688 NOT (Account_Name=*$) (arp.exe OR at.exe OR bcdedit.exe OR bcp.exe OR chcp.exe OR cmd.exe OR cscript.exe OR csvde OR dsquery.exe OR ipconfig.exe OR mimikatz.exe OR nbtstat.exe OR nc.exe OR netcat.exe OR netstat.exe OR nmap OR nslookup.exe OR netsh OR OSQL.exe OR ping.exe OR powershell.exe OR powercat.ps1 OR psexec.exe OR psexecsvc.exe OR psLoggedOn.exe OR procdump.exe OR qprocess.exe OR query.exe OR rar.exe OR reg.exe OR route.exe OR runas.exe OR rundll32 OR schtasks.exe OR sethc.exe OR sqlcmd.exe OR sc.exe OR ssh.exe OR sysprep.exe OR systeminfo.exe OR system32\\et.exe OR reg.exe OR tasklist.exe OR tracert.exe OR vssadmin.exe OR whoami.exe OR winrar.exe OR wscript.exe OR "winrm.*" OR "winrs.*" OR wmic.exe OR wsmprovhost.exe OR wusa.exe)\
	| eval Message=split(Message,".")\
	| eval Short_Message=mvindex(Message,0)\
	| table _time, host, Account_Name, Process_Name, Process_ID, Process_Command_Line, New_Process_Name, New_Process_ID, Creator_Process_ID, Short_Message

[predict_example_1]
search_name = Daily File Count and Prediction
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,SFU
solution = <p>Operational teams and analysts gain deeper <b>insight</b> into specific file trends through this query. The ability to project future behavior ensures proactive measures for load balancing or anomaly resolution.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor daily file counts for anomalies (e.g., unanticipated spikes or drops).<br><b>2.</b> Analyze anticipated trends to support resource scaling or workload distribution.<br><b>3.</b> Leverage this data for capacity planning.<br><b>4.</b> Correlate trends to upstream or downstream dependencies (e.g., ingestion pipelines or processing workloads).<br><b>5.</b> If anomalies are detected, investigate contributing factors and implement mitigating measures.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specify the data source by narrowing down to the desired index and sourcetype.<br><b>02</b> <code>| timechart span=1d count(file) as count</code><br>       - Aggregate file occurrences into daily buckets.<br><b>03</b> <code>| predict count</code><br>       - Use historical daily counts to forecast future trends.<br>
explanation = <p>This search serves dual purposes: first, to track historical activity related to specific files by measuring their daily occurrences; second, to leverage historical data for predicting future behavior using Splunk's <b>'predict'</b> function. Predictions can support <b>capacity planning</b> by anticipating file activity trends. From an operational standpoint, continuous monitoring can help identify anomalies, such as spikes or dips in file activity, providing opportunities for early intervention. The <code>| predict</code> function's regression logic forecasts what to expect. This could inform both technical teams and business stakeholders of abnormal data patterns and mitigate risks proactively.</p>
quid = 40B0388BB9B6D2052FB6C692AF97AF14
search_author = grdhg24
updated_author = khutchinson
description = <p>This query counts the number of occurrences of a specific file in a given index and sourcetype, plotting the results over time with daily granularity. It leverages the <b>'predict'</b> function to forecast future counts, enabling proactive identification of trends and potential issues.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| timechart span=1d count(file) as count\
	| predict count

[predict_example_2]
search_name = 1-Minute Timechart with Predictive Analysis on Event Count
version = 1.0.3
date_updated = 2023-12-18 13:57:13
search_hidden = 0
sub_category = Custom
tags = Access,SFU
solution = <p>This query enables proactive decision-making by creating forecasts of event counts. It provides visibility into future system usage trends, aiding in operational planning such as capacity scaling, alert threshold tuning, and resource allocation. The confidence intervals enhance trust in the predictions by highlighting possible variance.</p> <p><b>Suggested Actions</b><br><b>1.</b> Use this query to monitor trends in event counts and identify seasonal or recurring behaviors.<br><b>2.</b> Leverage forecasts to adjust resource allocation and improve system scalability during high-demand periods.<br><b>3.</b> Investigate spikes or anomalies highlighted within the forecasted results.<br><b>4.</b> Incorporate forecasted data into dashboards for better visibility and reporting.<br><b>5.</b> Use holdback data to validate or fine-tune the predictive model if discrepancies arise.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_force = 0
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - This step retrieves data from the specified index and sourcetype.<br> <b>02</b> <code>| timechart span=1m count AS foo</code><br>       - Aggregates the data into a time-based chart, using a 1-minute interval, and computes the event count as 'foo'.<br> <b>03</b> <code>| predict foo as fubar algorithm=LL upper90=high lower97=low future_timespan=10 holdback=20</code><br>       - Uses the predict command to forecast the 'foo' count. Key parameters:<br>         • <i>algorithm=LL</i>: Specifies the "Linear Least Squares" algorithm for prediction.<br>         • <i>upper90/high and lower97/low</i>: Establishes confidence intervals.<br>         • <i>future_timespan=10</i>: Projects the prediction 10 future timespans.<br>         • <i>holdback=20</i>: Omits the last 20 data points for testing accuracy.<br>
explanation = <p>This query is centered on predictive analytics and uses historical event counts to forecast future occurrences. The <b>timechart</b> command is used to aggregate and count events with a granularity of one minute. Subsequently, the <b>predict</b> command applies a statistical forecasting algorithm, offering predictive values as well as confidence intervals for enhanced reliability.</p> <p>By holding back the last 20 data periods from the input (using the <code>holdback=20</code> option), the predict command ensures that the forecast is evaluated based on a consistent dataset. The <code>future_timespan=10</code> indicates the forecast extends 10 periods into the future, with confidence intervals defined by <code>upper90</code> and <code>lower97</code>.</p> <p>This search delivers <b>actionable insights</b>, useful for anticipating system performance, preparing for load spikes, or spotting anomalous trends.</p>
quid = 0DF89620B915DF3FF5109931AE65AF2B
search_author = grdhg24
updated_author = khutchinson
related_info = <ul>\
	<li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-use-predict-command/m-p/372531" target="_self">How to use the predict command.</a></li>\
	<li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/predict" target="_self">About Time Series Forecasting</a></li>\
	</ul>
description = <p>Summarizes <b>1-Minute Timechart with Predictive Analysis on Event Count</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| timechart span="1m" count AS foo\
	| predict foo as fubar algorithm=LL upper90=high lower97=low future_timespan=10 holdback=20

[prediction_of_traffic_based_on_the_kalman_algorithm]
search_name = Predicted vs Actual Traffic Analysis for Access Logs
version = 1.0.1
