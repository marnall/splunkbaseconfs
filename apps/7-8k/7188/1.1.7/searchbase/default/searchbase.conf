[pi_sf_search_head_discovery]
search_name = SmartStore Dashboard Search Head Population
version = 2.x
date_created = 2025-12-04
category = Splunk
sub_category = _internal
tags = Cluster,Search Heads,Topology
solution = <p>This search is essential for dynamic, multi-instance Splunk deployments. By discovering active search heads automatically, it eliminates the need for outdated manual configurations.</p><p><b>Suggested Actions</b><br><b>1.</b> Use the output to populate tokens in dashboards that filter by search head.<br><b>2.</b> Validate environments topology accuracy dynamically by cross-referencing this data.<br><b>3.</b> Employ this query as a base for audits of search head roles and hostnames.<br><b>4.</b> Use formatted output for streamlined references in feature searches.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>| rest splunk_server=local /services/server/info</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Retrieves detailed server metadata and roles for the local deployment.<br><b>02</b> <code>| where "search_head" in(server_roles)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Filters the data to target servers functioning as search heads.<br><b>03</b> <code>| table host | dedup host | sort host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Organizes the gathered hostnames, ensuring unique values and ordering them alphabetically.<br><b>04</b> <code>| eval host="\""+host+"\""</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Formats each hostname with double quotes for future utility in composite queries.<br><b>05</b> <code>| stats values(host) as hosts</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Aggregates the clean list of hostnames into a multivalue field.<br><b>06</b> <code>| eval searchheads=mvjoin(hosts,",")</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Combines all hostnames into a single string, separated by commas, for use in subsequent searches.<br>
explanation = <p>This search dynamically discovers and identifies search heads within the current Splunk deployment by querying the <b>/services/server/info</b> REST endpoint. By filtering for entries where the <b>search_head</b> role appears in the <b>server_roles</b> field, it pinpoints these critical components of Splunk architecture. The use of <b>dedup</b> ensures no duplicate hostnames; <b>eval</b> enables formatting for further queries; and <b>mvjoin</b> compiles the hostnames into a neatly quoted, comma-separated list in the <b>searchheads</b> field.</p><p>This method creates adaptable and reusable searches, eliminating hardcoded hostnames while enhancing multi-instance workflows by dynamically populating search head information.</p>
quid = 3B91196DC9B3776355B2AB7D485E05AF
search_author = Splunk Works
description = <p>Discovers search heads in the Splunk environment by dynamically querying server roles to identify instances acting as search heads. This search provides a scalable solution for identifying search topology. It ensures efficiency and adaptability across varied environments.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | rest splunk_server=local /services/server/info | where "search_head" in(server_roles) | table host | dedup host | sort host | eval host="\""+host+"\"" | stats values(host) as hosts | eval searchheads=mvjoin(hosts,",")

[pi_sf_smartstore_bucket_speed]
search_name = Smartstore Bucket Speed Statistics
version = 2.x
date_created = 2025-12-04
category = Splunk
sub_category = _internal
tags = Buckets,Performance,Smartstore
solution = <p>This search offers critical metrics for SmartStore administrators to debug and optimize Splunk storage performance. By identifying download/upload speed anomalies or the inefficiencies of eviction operations, users gain actionable insights.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate network connectivity and bandwidth if speeds are consistently low.<br><b>2.</b> Check for potential throttling or access delays in remote storage.<br><b>3.</b> Evaluate cache sizing to minimize high eviction rates.<br><b>4.</b> Enhance monitoring for action-specific performance trends.<br><b>5.</b> Utilize these metrics to plan storage scaling or Splunk deployment adjustments.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>search index="_audit" (action="local_bucket_upload" OR action="remote_bucket_download" OR action="local_bucket_evict") info="completed"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve audit logs specific to SmartStore bucket operations (upload, download, evict)<br><b>02</b> <code>eval second = elapsed_ms/1000</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate elapsed time in seconds from milliseconds<br><b>03</b> <code>eval speed = kb/second/1024</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Compute transfer speed in MB/s<br><b>04</b> <code>stats p95(speed) as p95_speed, avg(speed) as avg_speed by action</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate statistics for 95th percentile and average speeds by action type<br>
explanation = <p>This search analyzes SmartStore performance by calculating transfer speeds (MB/s) for bucket uploads to remote storage, downloads from remote storage, and local evictions. It computes both 95th percentile and average speeds to measure I/O performance for these actions.</p><p>The search helps Splunk administrators pinpoint issues like <b>network congestion</b>, <b>slow storage responses</b>, or <b>misconfigured cache sizing</b>—all of which can degrade performance and impact indexing operations.</p><p>The <b>eval</b> command is used to compute intermediate fields such as elapsed seconds and transfer speeds, while <b>stats</b> aggregates the results by action. The search is designed for operational diagnostics and troubleshooting storage bottlenecks, contributing to better system performance visibility and improved decision-making with regards to scaling and optimization strategies.</p>
quid = 4B7E9F2D8A5C3E1F6D9B4A7E2F8C5D3A
search_author = Splunk Works
description = <p>Summarizes <b>Smartstore Bucket Speed Statistics</b> using <code>index=_audit (action=local_bucket_upload OR action=remote_bucket_download OR action=local_bucket_evict) info=completed |</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_audit (action=local_bucket_upload OR action=remote_bucket_download OR action=local_bucket_evict) info=completed | eval second = elapsed_ms/1000 | eval speed = kb/second/1024 | stats p95(speed) as p95_speed, avg(speed) as avg_speed by action

[pi_sf_smartstore_bucket_throughput]
search_name = SmartStore Bucket Throughput
version = 2.x
date_created = 2025-12-04
