tags = ATM,Detail,Fraud
solution = <p>This SPL identifies ATM withdrawals just below critical reporting thresholds, which may indicate potential structuring or evasion attempts. The results empower fraud and compliance teams to take timely action. <b>Suggested Actions</b></p><p>1. Review flagged transactions for structuring patterns.<br>2. Correlate these transactions with other high-value withdrawals linked to the same account.<br>3. Notify compliance or fraud investigation teams if suspicious activity is detected.<br>4. Integrate findings into monitoring dashboards to enhance transaction analysis.<br>5. Update withdrawal thresholds periodically to align with evolving regulatory or risk frameworks.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Identifies all ATM transactions from the relevant data inputs.<br><b>02</b> <code>| where amount>9800 AND amount<10000</code><br>      - Filters for withdrawal amounts within the near-threshold range.<br><b>03</b> <code>|table timestamp account_number transaction_type amount</code><br>      - Organizes the output into an easily readable format with key transaction information.<br><b>04</b> <code>|eval amount=tostring(round(amount, 2),"commas")</code><br>      - Rounds and formats the transaction amount as a comma-separated string for better readability in resulting dashboards and reports.
explanation = <p>This SPL captures ATM transactions falling within a critical threshold range, specifically between $9,800 and $10,000, a range often associated with structuring or deliberate evasion to avoid regulatory reporting limits. The search applies powerful filtering commands to isolate such transactions, outputs essential fields for rapid compliance review, and formats numeric fields to improve clarity. By leveraging this search, financial compliance and fraud detection teams can focus on high-risk accounts and uncover suspicious patterns. The inclusion of precision filters ensures fewer false positives, optimizing the workflow for analysts. The workflow also integrates well with advanced transaction monitoring systems, contributing to enhanced fraud detection and compliance visibility.</p>
quid = 9F8C6423070D7E764F1236D090E5B80A
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/table" target="_blank">Splunk Docs: table command</a><br>Formatting result output.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eval" target="_blank">Splunk Docs: eval command</a><br>Formatting and rounding numbers.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Structuring and threshold detection use cases.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Best practices for structuring detection.</li></ul>
description = <p>Summarizes <b>ATM Withdrawals Near Threshold</b> using <code>index="*" sourcetype="*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="*" sourcetype="*"\
| where amount>9800 AND amount<10000\
|table timestamp account_number transaction_type amount\
|eval amount=tostring(round(amount, 2),"commas")

[audit_for_search_best_practices]
search_name = Audit for Search Best Practices
version = 3.0.0
date_created = 2025-05-18
date_updated = 2025-5-18 13:42:48
category = Splunk
sub_category = _internal
tags = Timing
solution = <p>Use this audit to detect <b>search overruns</b> and correlate with <b>savedsearch tuning opportunities</b>.</p><p><b>Suggested Actions</b><br><b>01</b> Flag overrunning savedsearches to owners.<br><b>02</b> Review scheduling frequency in savedsearches.conf.<br><b>03</b> Optimize heavy searches with improved SPL.<br><b>04</b> Adjust time range or result limits.<br><b>05</b> Establish alerts for frequent overruns.</p><br><b>Recommended Alerts</b><br><b>01</b> Normal: run_time(sec) ≤ range2<br><b>02</b> Low: 1–2 searches where run_time(sec) > range2<br><b>03</b> Medium: 3–5 searches overran<br><b>04</b> High: 6–10 searches overran<br><b>05</b> Critical: > 10 searches overran<br><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="_audit" [| rest ...]</code><br>       - Pulls audit logs and aligns each search to its executing host.<br><b>02</b> <code>| rex field=apiStartTime ...</code><br>       - Extracts search start and end timestamps.<br><b>03</b> <code>| eval range, range2</code><br>       - Derives execution duration and expected range.<br><b>04</b> <code>| stats ...</code><br>       - Aggregates performance metrics by SID.<br><b>05</b> <code>| eval "Overran?"</code><br>       - Compares actual vs expected run time.<br><b>06</b> <code>| table, sort ...</code><br>       - Outputs analysis sorted by duration.<br>
explanation = This search audits user-initiated searches from the <b>_audit</b> index, calculating the <b>actual vs expected search duration</b> using API timestamps. It flags <b>long-running searches</b> and provides insight into execution patterns, helping administrators to <b>optimize savedsearch scheduling</b> and monitor performance.
quid = 132BF56E6A70C1F9A0871322EA666F72
search_author = Splunk Searchbase Metadata Gen.
updated_author = khutchinson
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/administer/admin-manual/9.4/security/security-and-compliance-audit-events">Audit Searches</a><br>Monitor and analyze search activity through the _audit index.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/administer/admin-manual/9.4/knowledge/savedsearches.conf">savedsearches.conf Reference</a><br>Adjust configuration and scheduling options.</li><li><a href="https://community.splunk.com/t5/Alerting/Track-slow-savedsearches/m-p/398571">Track Slow Searches</a><br>Community approach to savedsearch duration alerts.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/rex">rex Command</a><br>Documentation for extracting substrings with regex.</li><li><a href="https://lantern.splunk.com/Observability/Search/Search_performance_tuning">Search Tuning Guide</a><br>Optimize and improve search execution time.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eval">eval Command</a><br>Reference for custom calculations and comparisons.</li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Alerting-on-long-run-time-of-savedsearches/m-p/478827">Savedsearch Duration Alerts</a><br>Example SPL for runtime thresholds.</li></ul>
description = Analyzes <b>audit logs</b> to detect <b>saved searches</b> that <b>exceed expected run durations</b>.
search = index="_audit" [|rest /services/server/info splunk_server=local \
| fields host] action=search user=* user!=splunk-system-user search_id=* (info=granted OR info=completed) \
| rex field=apiStartTime "'(?<start_time>[^']+)'" \
| rex field=apiEndTime "'(?<end_time>[^']+)'" \
| rex "search\\=(?<search_string>.+),\\sautojoin" \
| eval range=if(start_time=="ZERO_TIME","All Time", tostring(strptime(end_time, "%a %b %d %H:%M:%S %Y") - strptime(start_time, "%a %b %d %H:%M:%S %Y"),"duration")) \
| eval range2=if(start_time=="ZERO_TIME","All Time", strptime(end_time, "%a %b %d %H:%M:%S %Y") - strptime(start_time, "%a %b %d %H:%M:%S %Y")) \
| stats max(event_count) AS event_count values(start_time) AS "Search Earliest" values(end_time) AS "Search Latest" count values(range) AS range values(range2) AS range2 values(search) AS Search values(user) AS User max(total_run_time) AS run_time(sec) by search_id savedsearch_name \
| convert ctime(*Time) ctime("Search Start") ctime("Search End") \
| where count>1 \
| rename search_id AS SID range AS "Search Range" \
| eval "Run Time"=tostring('run_time(sec)',"duration") \
| eval "Overran?"=if('run_time(sec)'>range2,"Overran its range!!!", "NO") \
| eval SID = trim(SID, "'") \
| table SID savedsearch_name event_count "Search Earliest" "Search Latest" "Search Range" Search User "run_time(sec)" "Overran?" "Run Time" \
| sort - "Run Time"

