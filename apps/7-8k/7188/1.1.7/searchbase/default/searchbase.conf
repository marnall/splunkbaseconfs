[credit_card_test_purchases]
search_name = Credit Card Test Purchases
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Credit,Detail,Fraud
solution = <p>This SPL flags accounts performing small then large credit card purchases in rapid succession. <b>Suggested Actions</b></p><p>1. Review flagged accounts for card testing or fraud.<br>2. Cross-reference with dispute or risk alerts.<br>3. Alert fraud or compliance teams.<br>4. Integrate with monitoring dashboards.<br>5. Refine thresholds as fraud patterns evolve.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Selects all credit card transaction events.<br><b>02</b> <code>| streamstats earliest(amount) AS first_amount latest(amount) AS last_amount earliest(_time) AS timestamp latest(_time) AS latest_time time_window=1m count(status) AS num_transactions by account_number</code><br>      - Tracks transaction amounts and counts in 1-minute windows.<br><b>03</b> <code>| where (((first_amount < 20) AND (last_amount > 3000)) AND (num_transactions >= 2))</code><br>      - Flags accounts showing test purchase behavior.<br><b>04</b> <code>| eval first_amount=tostring(round(first_amount,2),"commas"), last_amount=tostring(round(last_amount,2),"commas"), latest_time=strftime(latest_time,"%Y/%m/%d %H:%M:%S")</code><br>      - Formats key values for review.<br><b>05</b> <code>| table account_number, timestamp, latest_time, num_transactions, first_amount, last_amount</code><br>      - Outputs review fields.
explanation = <p>This SPL uses <b>streamstats</b> in a 1-minute window to detect accounts that start with a low-value purchase (less than $20) and quickly escalate to a high-value one (over $3,000), with at least two transactions in that period. It formats amounts and times for review. Such patterns are often associated with card testing or fraud attempts. This approach enables analysts and risk teams to spot and act on suspicious credit card usage early.</p>
quid = 266E8C9FCEF55465826B088F3057C60C
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/streamstats" target="_blank">Splunk Docs: streamstats command</a><br>Tracking value changes over time.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/table" target="_blank">Splunk Docs: table command</a><br>Formatting result output.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Credit card fraud and test purchase detection use cases.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Best practices for early fraud detection.</li></ul>
description = <p>Identifies accounts that make a small purchase followed by a large one within a minute, suggesting possible <b>credit card test purchases</b> or fraudulent behavior. Surfaces key transaction details and amounts for review.</p>
search = index="*" sourcetype="*"\
| streamstats earliest(amount) AS first_amount latest(amount) AS last_amount earliest(_time) AS timestamp latest(_time) AS latest_time time_window=1m count(status) AS num_transactions by account_number\
| where (((first_amount < 20) AND (last_amount > 3000)) AND (num_transactions >= 2))\
| eval first_amount=tostring(round(first_amount,2),"commas"), last_amount=tostring(round(last_amount,2),"commas"), latest_time=strftime(latest_time,"%Y/%m/%d %H:%M:%S")\
| table account_number, timestamp, latest_time, num_transactions, first_amount, last_amount

[critical_system_physical_memory_usage_323]
search_name = Hostwide Resource Usage: High Memory Utilization (>90%)
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,SFU
solution = <p>This query provides insights into instances of high memory usage by highlighting cases where utilization exceeds 90%. Such data is crucial for maintaining optimal system performance and planning capacity improvements.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate instances where memory usage exceeds 90% to identify the root cause.<br><b>2.</b> Evaluate application workloads and consider optimizing or redistributing tasks across servers.<br><b>3.</b> Assess physical memory configurations, ensuring adequacy for workload demands.<br><b>4.</b> Plan resource scaling or infrastructure changes based on trends in memory utilization.<br><b>5.</b> Set up alerts to notify the team when memory usage nears critical thresholds.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
env_run = 2
execution_plan = <b>01</b> <code>| rest splunk_server=** /services/server/status/resource-usage/hostwide</code><br>       - Accesses the Splunk REST API for hostwide resource usage details based on the specified server.<br><b>02</b> <code>| eval percentage=round(mem_used/mem,3)*100</code><br>       - Calculates and formats the percentage of memory used.<br><b>03</b> <code>| where percentage > 90</code><br>       - Filters results for instances where memory utilization is above 90%.<br><b>04</b> <code>| fields splunk_server, percentage, mem_used, mem</code><br>       - Limits the displayed columns to relevant fields.<br><b>05</b> <code>| rename splunk_server AS Instance, mem AS "Physical memory installed (MB)", percentage AS "Memory used (%)", mem_used AS "Memory used (MB)"</code><br>       - Renames columns for improved readability and usability.<br>
explanation = <p>This query leverages the 'rest' command to retrieve host-wide resource usage information through the Splunk REST API. By focusing on the 'mem_used' and 'mem' fields, it computes the memory utilization percentage using an <b>eval</b> function and applies a filter to extract only high-usage instances. The processing pipeline ensures that results are specific, actionable, and easy to understand with renamed, well-structured columns. This search is vital for identifying memory bottlenecks that could degrade performance or necessitate resource optimization. Infrastructure engineers and Splunk admins can proactively address potential scalability issues. The functionality also fits into broader performance monitoring plans, offering a methodical view of utilization trends.</p>
quid = 8C92A632F2C734E3C51D911F24FA9B3D
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Hostwide Resource Usage: High Memory Utilization (>90%)</b> using <code>| rest splunk_server=** /services/server/status/resource-usage/hostwide</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | rest splunk_server=** /services/server/status/resource-usage/hostwide\
| eval percentage=round(mem_used/mem,3)*100\
| where percentage > 90\
| fields splunk_server, percentage, mem_used, mem\
| rename splunk_server AS Instance, mem AS "Physical memory installed (MB)", percentage AS "Memory used (%)", mem_used AS "Memory used (MB)"

[crowdstrike_audit_event_correlation]
search_name = CrowdStrike Falcon Host Detection Details with Date and Assignment
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Network
tags = Access,GoSplunk
solution = <p>This search provides a consolidated view of true positive and non-true positive events, enabling better prioritization, faster incident response, and deeper incident understanding. Key entities like file paths, SHA256 hashes, and user assignments become accessible for investigation and human-readable through organized output formatting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the list of events for patterns in new states, assignments, and detection IDs.<br><b>2.</b> Validate the origin and legitimacy of flagged files based on associated MD5/SHA256 hash values.<br><b>3.</b> Use the detailed URL, file path, and destination information to scope potential impacts within the organization.<br><b>4.</b> Correlate results with external threat intelligence feeds for added context.<br><b>5.</b> Leverage findings to refine detection rules and improve triage accuracy for future incidents.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<"index">>" sourcetype="crowdstrike:falconhost:json" TERM(true_positive)</code><br>       - Query starts by filtering the CrowdStrike events with sourcetype "crowdstrike:falconhost:json" for events tagged as 'true_positive'.<br><b>02</b> <code>| eval keyjoin=mvzip('result.event.AuditKeyValues{}.Key{}','result.event.AuditKeyValues{}.ValueString{}')</code><br>       - Combines key-value pairs from the event's audit data into a single field for easier processing.<br><b>03</b> <code>| mvexpand keyjoin</code><br>       - Expands multi-value fields in 'keyjoin' to split into individual events.<br><b>04</b> <code>| rex field=keyjoin "^(?<key>[^,]+),(?<value>.*)$"</code><br>       - Extracts 'key' and 'value' components from the 'keyjoin' field.<br><b>05</b> <code>| eval {key} = value</code><br>       - Dynamically creates new fields using the extracted 'key' and assigns their corresponding 'value'.<br><b>06</b> <code>| stats values(new_state) as new_state, values(assigned_to) as assigned_to, values(detection_id) as detection_id by date</code><br>       - Aggregates fields 'new_state', 'assigned_to', and 'detection_id' grouped by 'date'.<br><b>07</b> <code>| join detection_id [ search index="<<"index">>"...</code><br>       - Merges the results with a secondary search containing data on non-true positive events.<br><b>08</b> <code>eval Date=strftime(date,"%m/%d/%y %H:%M:%S")</code><br>       - Formats the 'date' field to be more human-readable.<br><b>09</b> <code>| table ...</code><br>       - Organizes final fields into a structured table format.<br><b>10</b> <code>| rename ...</code><br>       - Renames output fields to improve readability of the results.<br>
explanation = <p>This search is a comprehensive query designed to assist security professionals in identifying and analyzing both true positive and non-true positive events associated with CrowdStrike Falcon hosts. It extracts meaningful key-value pairs from CrowdStrike's audit data for 'true_positive' events and correlates them with non-true positive details to present a holistic view of security incidents.</p><p>Using SPL commands such as <code>eval</code>, <code>mvexpand</code>, and <code>rex</code>, the query dynamically handles multi-value fields and assigns them as individual entries. Advanced aggregation with <code>| stats</code>, alongside the usage of <code>| join</code>, ensures data is appropriately combined from different subsets of events. This dual focus on true positive and other events allows analysts to identify potential threats, analyze various attributes (like file path, hash values, and assignments), and take informed action.</p><p>For junior Splunk users, key commands like <code>rex</code> offer deep field extraction capabilities, while <code>eval</code> dynamically creates fields based on extracted data, showcasing its value for enriching event details. Aggregating with <code>| stats</code> and structuring with <code>| table</code> are common patterns for clarity and insight delivery.</p>
quid = 139C2DA5CD853291DE40F7296BE24550
description = <p>TBD</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="crowdstrike:falconhost:json" TERM(true_positive)| eval keyjoin=mvzip('result.event.AuditKeyValues{}.Key{}','result.event.AuditKeyValues{}.ValueString{}')\
| mvexpand keyjoin\
| rex field=keyjoin "^(?<key>[^,]+),(?<value>.*)$"\
| eval {key} = value\
| stats values(new_state) as new_state, values(assigned_to) as assigned_to, values(detection_id) as detection_id, by date\
| join detection_id[ search index="<<index>>" sourcetype="crowdstrike:falconhost:json" NOT TERM(true_positive)\
| stats values(result.event.DetectId) as detection_id, values(result.dest) as result.dest, values(result.file_name) as file_name, values(result.file_path) as file_path, values(result.event.SHA256String) as SHA256,values(result.event.MD5String) as MD5, values(result.dest_nt_domain) as Domain, values(result.url) as URL by date]\
| dedup date, detection_id\
| eval Date=strftime(date,"%m/%d/%y %H:%M:%S")\
| table Date, new_state, assigned_to, detection_id, Domain, MD5, SHA256, URL, file_name, file_path, result.dest\
| rename new_state as "New State", assigned_to AS "Assigned To", detection_id AS "Detection ID", file_name AS "File Name", result.dest AS "Destination"

