tags = License,Usage,_internal,Details,DSA
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
dispatch_context = searchbase
dispatch_context_force = 0
search_origin = searchbase
search_author = Splunk Searchbase Assistant
description = <p>This search must be run on the <b>license</b> manager. This search analyzes <b>license usage</b> by <b>sourcetype</b>, host, and index using internal telemetry. It highlights how data volume contributes to overall <b>license consumption</b>. This is critical for capacity planning and cost governance.</p>
explanation = <p>This search gives platform administrators and capacity planners detailed visibility into what data is driving license usage. By breaking usage down by sourcetype, host, and index, teams can pinpoint inefficient sources, noisy inputs, or misconfigured data pipelines. The daily time binning supports trend analysis and early detection of abnormal growth. These insights enable informed decisions around data filtering, retention, routing, and optimization to control licensing impact.</p>
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.log type="Usage"</code><br> - Retrieves Splunk internal license usage events that track daily data volume ingestion.<br><b>02</b> <code>| eval h,s,idx normalization</code><br> - Normalizes missing host, source, and index values to ensure consistent aggregation.<br><b>03</b> <code>| bin _time span=1d</code><br> - Buckets license usage into daily intervals for trend and reporting analysis.<br><b>04</b> <code>| stats sum(b) as Bytes by dimensions</code><br> - Aggregates total bytes ingested by time, pool, sourcetype, host, and index.<br><b>05</b> <code>| rename and sort</code><br> - Improves readability and orders results to highlight highest-volume sourcetypes.<br>
solution = <p>This search provides a detailed breakdown of daily license consumption drivers.</p><p><b>Suggested Actions</b> Investigate high-volume sourcetypes and hosts, validate data necessity, apply filtering or routing where appropriate, and use trends to forecast license growth and inform capacity planning.</p><p><b>Recommended For You:</b><ul><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=license%20usage" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Find apps that help visualize, track, and forecast Splunk license consumption.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Help: License usage overview</a><br>Official documentation explaining how Splunk licensing and usage tracking works.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Docs: License usage searches</a><br>Search examples and patterns for analyzing license consumption.</li><li><a href="https://lantern.splunk.com/Search?q=License%20Usage" target="_blank">Lantern: License management best practices</a><br>Guidance on managing data ingestion and optimizing license usage.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q=%22license_usage.log%22" target="_blank">Community: license_usage.log analysis</a><br>Community discussions and examples for interpreting license usage logs.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Help: _internal index usage</a><br>Overview of Splunk internal data and how it supports monitoring and governance.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Docs: Capacity planning</a><br>Guidance on forecasting and managing Splunk platform growth.</li></ul>
search = index=_internal source="*license_usage.log" type="Usage" \
| eval h=if(len(h)=0 OR isnull(h),"(SQUASHED)",h) \
| eval s=if(len(s)=0 OR isnull(s),"(SQUASHED)",s) \
| eval idx=if(len(idx)=0 OR isnull(idx),"(UNKNOWN)",idx) \
| bin _time span=1d \
| stats sum(b) as Bytes by _time, pool, s, st, h, idx \
| rename s AS Source, st AS Sourcetype, h as Host, idx as Index \
| sort by Sourcetype, -Bytes

[estimated_daily_data_volume_by_sourcetype]
quid = A7C9E4B1D8F2C6E5A0B9D3F4E1C8A6B7
search_name = Estimated Daily Data Volume By Sourcetype
version = 2.0
date_created = 2026-02-09
search_hidden = 0
category = Splunk
sub_category = Ingest
tags = Ingestion,Capacity Planning,Details,DSA
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
dispatch_context = searchbase
dispatch_context_force = 0
search_origin = searchbase
search_author = Splunk Searchbase Assistant
description = <p>This search estimates <b>daily data volume</b> by <b>sourcetype</b> using sampled event sizes and host counts. It compares statistical estimates with <b>actual indexed usage</b>. This search must be run on the licensing manager. This supports ingestion forecasting and license planning.</p>
explanation = <p>This search is designed for platform administrators and capacity planners who need to understand how individual sourcetypes contribute to data growth. By sampling raw event sizes and applying statistical percentiles, it provides realistic estimates of daily ingestion volume without relying solely on license logs. The comparison with actual indexed usage helps validate assumptions and identify noisy or inefficient sourcetypes. These insights are valuable for onboarding decisions, filtering strategies, and long-term license and infrastructure planning.</p>
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br> - Samples raw events across all indexes and sourcetypes to measure individual event sizes.<br><b>02</b> <code>| stats percentile and count calculations</code><br> - Computes host counts, event counts, and size percentiles to model ingestion behavior per sourcetype.<br><b>03</b> <code>| eval estimated volume metrics</code><br> - Derives estimated daily MB and GB using both average and 90th percentile sizing models.<br><b>04</b> <code>| join license usage</code><br> - Enriches estimates with actual indexed volume from internal license usage logs for comparison.<br>
solution = <p>This search provides a practical estimation model for understanding and forecasting sourcetype-level ingestion volume.</p><p><b>Suggested Actions</b> Compare estimated and actual usage to identify oversized or inefficient sourcetypes, apply filtering or parsing optimizations, and use the results to guide onboarding decisions and license forecasting.</p><p><b>Recommended For You:</b><ul><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=ingestion%20volume" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps that help analyze ingestion patterns, license usage, and data growth trends.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/indexing/indexes-and-indexers/how-indexes-work" target="_blank">Splunk Help: Event sizing concepts</a><br>Documentation explaining how event size impacts indexing and license usage.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Docs: License usage analysis</a><br>Search patterns and examples for analyzing indexed data volume.</li><li><a href="https://lantern.splunk.com/Search?q=Data%20Ingestion" target="_blank">Lantern: Data ingestion best practices</a><br>Expert guidance on managing, filtering, and optimizing data ingestion.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q=%22event%20size%20ingestion%22" target="_blank">Community: Ingestion sizing discussions</a><br>Community examples and discussions around estimating and managing ingestion size.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Capacity planning</a><br>Guidance on forecasting Splunk growth and infrastructure needs.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Docs: Data volume monitoring</a><br>Reference searches for monitoring and estimating data volume.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>" \
| eval esize=len(_raw) \
| stats dc(host) AS Host_Count, count As Example_Count, p10(esize) AS ten_perc_bytes, avg(esize) AS avg_bytes, p90(esize) AS ninety_perc_bytes by sourcetype \
| eval cntfc=tonumber(Example_Count) \
| eval avg_bytes=round(avg_bytes, 0) \
| eval est_t_bytes_ninety=(ninety_perc_bytes*cntfc) \
| eval est_t_bytes_avg=(avg_bytes*cntfc) \
| eval est_t_gb_ninety=round((ninety_perc_bytes*cntfc)/1024/1024/1024,4) \
| eval est_t_gb_avg=round((avg_bytes*cntfc)/1024/1024/1024,4) \
| eval est_t_mb_ninety=round((ninety_perc_bytes*cntfc)/1024/1024,2) \
| eval est_t_mb_avg=round((avg_bytes*cntfc)/1024/1024,2) \
| eval Source_DataSet_Details="Total Events Sampled (".tostring(cntfc)."), Total Hosts Sampled (".tostring(Host_Count).")" \
| eval Average_Details="Average event byte size (".tostring(avg_bytes)."), Sum of Average bytes (".tostring(est_t_bytes_avg)."), Estimated Daily MB using Average (".tostring(est_t_mb_avg)."), Estimated Daily GB using Average (".tostring(est_t_gb_avg).")" \
| eval 90_Percent_Details="90 percent event byte size (".tostring(ninety_perc_bytes)."), Sum of 90 percent bytes (".tostring(est_t_bytes_ninety)."), Estimated Daily MB using 90 percent (".tostring(est_t_mb_ninety)."), Estimated Daily GB using 90 percent (".tostring(est_t_gb_ninety).")" \
| makemv delim="," Average_Details \
| makemv delim="," 90_Percent_Details \
| makemv delim="," Source_DataSet_Details \
| join sourcetype [ search index=_internal source="*license_usage.log" type=Usage st=* \
| stats sum(b) as sbytes by st \
| eval sgb=round(sbytes/1024/1024/1024,4) \
| eval smb=round(sbytes/1024/1024,2) \
| eval Actual_Indexed_Size="Total MB Indexed (".tostring(smb)."), Total GB Indexed (".tostring(sgb).")" \
| rename st as sourcetype \
| table sourcetype, Actual_Indexed_Size ] \
| makemv delim="," Actual_Indexed_Size \
| table sourcetype, Source_DataSet_Details, Average_Details, 90_Percent_Details, Actual_Indexed_Size

[avg_daily_source_volume_by_host]
quid = 2E9B7C4A1D6F5E8C3A0B9D4F7C6E8A
search_name = Avg Daily Source Volume By Host
version = 2.0
date_created = 2026-02-09
search_hidden = 0
category = Splunk
sub_category = _internal
tags = License,Usage,Capacity Planning,Details,DSA
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
dispatch_context = searchbase
dispatch_context_force = 0
search_origin = searchbase
search_author = Splunk Searchbase Assistant
description = <p>This search analyzes <b>average daily license usage</b> by <b>source</b> and normalizes it per <b>host</b>. It highlights which sources generate the most data on a per-host basis. This is critical for ingestion optimization and license governance.</p>
explanation = <p>This search helps platform administrators understand how individual data sources scale as hosts are added. By calculating average daily volume per source and then normalizing by the average host count, it reveals sources that are disproportionately noisy on a per-host basis. These insights are especially valuable when onboarding new systems, as they help predict incremental license impact. Over time, this analysis supports better filtering decisions, source rationalization, and more accurate capacity forecasting.</p>
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.log type=Usage</code><br> - Retrieves internal license usage telemetry that records indexed byte volume per source and host.<br><b>02</b> <code>| stats by source and day</code><br> - Aggregates daily indexed volume and distinct host counts per source.<br><b>03</b> <code>| stats averages</code><br> - Calculates average daily source volume and average host count across the time window.<br><b>04</b> <code>| eval per-host normalization</code><br> - Derives average daily source volume per host to expose high-noise sources.<br>
solution = <p>This search identifies data sources with high per-host ingestion impact.</p><p><b>Suggested Actions</b> Review sources with the highest per-host volume, validate data necessity, apply filtering or parsing optimizations, and use the results to forecast license impact when scaling host counts.</p><p><b>Recommended For You:</b><ul><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=license%20optimization" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Discover apps that help analyze license usage patterns and optimize data ingestion.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Help: License usage overview</a><br>Documentation describing how Splunk tracks and reports indexed data volume.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Docs: License usage analysis</a><br>Reference searches and patterns for breaking down license consumption.</li><li><a href="https://lantern.splunk.com/Search?q=License%20Management" target="_blank">Lantern: License management best practices</a><br>Expert guidance for managing ingestion growth and license compliance.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q=%22license_usage.log%22" target="_blank">Community: license_usage.log analysis</a><br>Community examples and discussions around analyzing license usage logs.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Capacity planning</a><br>Guidance on forecasting Splunk data growth and infrastructure needs.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/indexing/indexes-and-indexers/how-indexes-work" target="_blank">Splunk Docs: Data ingestion optimization</a><br>Search patterns and recommendations for optimizing data ingestion.</li></ul>
search = index=_internal type=Usage source="*license_usage.log" (idx=*) h!=DATA h!=CHANGE (h!="All_Hosts_Base") (s!="All_Sources_Base") \
| stats values(h) AS hostnames dc(h) AS host_count sum(b) AS host_volume by s date_mday \
| eval source_volume_MB=(host_volume/1024/1024) \
| fields - host_volume \
| stats avg(source_volume_MB) AS avg_source_volume_MB values(hostnames) AS hostnames by s \
| eval avg_source_volume_MB=round(avg_source_volume_MB,3) \
| appendcols [ search index=_internal type=Usage source="*license_usage.log" (idx=*) h!=DATA h!=CHANGE (h!="All_Hosts_Base") (s!="All_Sources_Base") \
| stats dc(h) AS host_count, sum(b) AS host_volume by s date_mday \
| stats avg(host_count) AS avg_host_count by s \
| eval avg_host_count=round(avg_host_count,2) ] \
| eval avg_host_source_volume_MB=round(avg_source_volume_MB/avg_host_count,3) \
| table s avg_host_count hostnames avg_source_volume_MB avg_host_source_volume_MB \
| sort - avg_host_source_volume_MB \
| rename s AS Source, h AS Host, hostnames AS "Host name(s)", host_volume_avg_MB AS "Host Volume Avg (MB)", avg_host_count AS "Avg Host Count", avg_source_volume_MB AS "Avg daily Source Volume (MB)", avg_host_source_volume_MB AS "Avg daily Source Volume by Host (MB)"

