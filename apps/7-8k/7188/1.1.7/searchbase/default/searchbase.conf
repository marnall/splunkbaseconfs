[detailed_user_activity]
search_name = Hourly User Search Activity and Frequency by Index
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Search
tags = Access,Users
solution = <p>This query generates actionable insights about user search patterns within Splunk. It provides an hourly breakdown for monitoring which users are running the most searches, their associated frequency (e.g., 'scheduled' vs. 'ad-hoc'), and which indexes are being accessed. These insights can guide Splunk administrators in optimizing resource usage and tackling overutilization or inefficiencies.</p> <p><b>Suggested Actions</b><br><b>1.</b> Analyze users with consistently high search volumes to determine if they are running unnecessary or resource-intensive searches.<br><b>2.</b> Identify heavily utilized indexes for better resource allocation or optimization planning.<br><b>3.</b> Verify whether 'ad-hoc' searches are justified or need training to use data consistently.<br><b>4.</b> Categorize and adjust scheduled tasks with high frequency.<br><b>5.</b> Use these insights as a baseline to improve capacity planning and identify potential misuse, if any.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_* search=* user=* user!=- user!=splunk-system-user</code><br>       - Search internal indexes for user search activity, excluding system users.<br><b>02</b> <code>| rex field=search ...</code><br>       - Extract index names from search strings (plain and URL-encoded forms).<br><b>03</b> <code>| eval frequency=...</code><br>       - Classify activity as scheduled vs ad-hoc from the log source.<br><b>04</b> <code>| bin _time span=1h | stats count by _time idx user frequency type search</code><br>       - Aggregate hourly search counts by user, index, and search type.<br>
explanation = <p>This query analyzes Splunk's internal logs to provide visibility into user search activity. By examining these logs, it surfaces details about the <b>frequency</b> and types of searches performed (e.g., ad-hoc vs. scheduled), the <b>indexes</b> accessed, and the <b>users</b> executing searches. Such insights enable administrators to track user engagement, monitor index utilization trends, and identify high-usage patterns. It also helps to distinguish between scheduled automation and spontaneous user queries for optimizing resource allocation.</p> <p>The SPL includes regex commands to extract indexes used (whether encoded or plain text), conditional logic (`eval`) for categorizing searches, and statistics aggregation (`stats`) for generating meaningful summaries. The use of binning (`bin`) ensures temporal grouping, yielding a per-hour breakdown of user actions.</p>
quid = FF1D9139A7F07F72E9B2EED66850692E
search_author = GoSplunk: tokenwander
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/detailed-user-activity" target="_blank">https://gosplunk.com/detailed-user-activity</a></p>
description = <p>Summarizes <b>Hourly User Search Activity and Frequency by Index</b> using <code>index=_* search=* user=* user!=- user!=splunk-system-user</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_* search=* user=* user!=- user!=splunk-system-user\
	| rex field=search max_match=0 "index\s*=[\s\"]*(?<idx1>.*?)[\\|\s\"\\)]"\
	| rex field=search max_match=0 "[\\+\\(|\\+]index\\%3D(?<idx2>.*?)[\\+|\\)\\+]"\
	| eval idx=if(isnull(idx1), idx2, idx1)\
	| eval frequency=if(source="/opt/splunk/var/log/splunk/splunkd_access.log", "scheduled", "ad-hoc")\
	| eval type=if(match(search, "summary*"), "summary", type1)\
	| eval idx=if(isnull(idx), "NONE", idx)\
	| eval end_type=if(frequency="ad-hoc", "ad-hoc", type)\
	| rename end_type as type\
	| table _time frequency type source user idx search\
	| bin _time span=1h\
	| stats count as count by _time idx user frequency type search

