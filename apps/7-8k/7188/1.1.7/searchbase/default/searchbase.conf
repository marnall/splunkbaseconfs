solution = <p>Employing the <b>boxplot</b> visualization enables clear differentiation between <b>normal</b> and <b>abnormal</b> URL lengths. This enhances analysts' ability to spot <b>threats</b> and informs their response strategy.</p><p><b>Suggested Actions</b><br><b>1.</b> Regularly review URL length distributions to establish baseline activity.<br><b>2.</b> Monitor for sudden changes in length distributions as they may indicate threats.<br><b>3.</b> Investigate outliers or anomalies to determine potential security risks.<br><b>4.</b> Adjust your hunting strategies based on observed distribution patterns.<br><b>5.</b> Utilize findings to refine alert thresholds and enhance threat detection capabilities.<br></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/xdr/index.html" target="_blank">Products: Cisco XDR</a><br>Cisco XDR.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="network" sourcetype="stream:http" | eval url_length = len(url)</code><br>       - Extract the length of each URL to quantify potential anomalies.<br><b>02</b> <code>fields url_length</code><br>       - Filter the data to focus on URL length, enabling a clear plot visualization.<br><b>03</b> <code>`boxplot`</code><br>       - Implement the boxplot macro to create a graphical representation capturing key statistics and outliers.<br>
explanation = <p><strong>Box plots</strong> graphically depict groups of numerical data through their quartiles, showing the minimum, lower quartile, median, upper quartile, and maximum. This visualization helps in identifying outliers by comparing values across different dimensions such as user accounts or hosts. In the context of web traffic logs, <strong>URL length</strong> can signify unusual behavior potentially associated with <b>malicious activity</b>. Utilizing the Splunk MLTK's <strong>boxplot</strong> macro, users can easily calculate and visualize these key statistics to inform baselining efforts, increasing their <b>operational efficiency</b> in detecting threats.</p>
quid = E9CB5BF574C3685B473D7EF999B9EDE7
search_author = Ryan Fetterman & Sydney Marrone
description = <p>Summarizes <b>Detecting URL Length Outliers with Box Plots in Web Traffic Logs</b> using <code>index="<<index>>" sourcetype=stream:http</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=stream:http \
| eval url_length = len(url) \
| fields url_length \
| `boxplot` ```Special Ingredients: The `boxplot` macro and the Box Plot visualization are bundled with the Splunk MLTK. You must be in the app to use this macro.```

[direct_and_referred_apache_web_traffic_1]
search_name = Daily Direct and Referred Traffic Analysis
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,GoSplunk
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=<<index>> sourcetype=access_combined <br />- This line is specifying the data source. It's pulling data from the specified index and the 'access_combined' sourcetype, which typically contains web access logs.</ul><ul><b>02</b> | eval Direct=if(referer=-, 1, 0) <br />- This line is creating a new field called 'Direct'. If the 'referer' field is '-', indicating the traffic was direct (i.e., the user typed the URL into their browser or used a bookmark), it sets 'Direct' to '1'. Otherwise, it sets 'Direct' to '0'.</ul><ul><b>03</b> | eval Referred=if(referer!=-, 1, 0) <br />- This line is creating another new field called 'Referred'. If the 'referer' field is not '-', indicating the traffic was referred (i.e., the user clicked a link from another site to get to the site), it sets 'Referred' to '1'. Otherwise, it sets 'Referred' to '0'.</ul><ul><b>04</b> | timechart span=1d sum(Direct) as Direct Traffic sum(Referred) as Referred Traffic <br />- This line is creating a timechart with a span of 1 day. It's summing up the 'Direct' and 'Referred' fields for each day and labeling them as 'Direct Traffic' and 'Referred Traffic', respectively.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to understand the sources of web traffic. It can help identify trends in direct and referred traffic over time, which can be useful for understanding user behavior, planning marketing strategies, or troubleshooting issues.</div></div>
quid = EAA2EDE2440B47EAD01556DCE5A8E06F
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/direct-and-referred-apache-web-traffic" target="_blank">https://gosplunk.com/direct-and-referred-apache-web-traffic</a></p>
description = <p>This query <b>analyzes</b> web traffic data, <b>categorizing</b> it into direct and referred traffic, and then <b>plots</b> it over time to provide <b>insights</b> into user behavior.</p>
solution = <p>This query analyzes web traffic data, categorizing it into direct and referred traffic, and then plots it over time to provide insights into user behavior. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index="<<index>>" sourcetype="access_combined"\
	| eval Direct=if(referer="-", "1", "0")\
	| eval Referred=if(referer!="-", "1", "0")\
	| timechart span=1d sum(Direct) as "Direct Traffic" sum(Referred) as "Referred Traffic"

