solution = <p>This search is indispensable for cluster architecture monitoring and optimization. It serves as a reliable tool for maintaining <b>operational efficiency</b> within Splunk environments.</p><p><b>Suggested Actions</b><br><b>1.</b> Review unique bucket metrics regularly to ensure optimal data distribution.<br><b>2.</b> Investigate disproportionate growth in bucket counts for over-indexing.<br><b>3.</b> Employ bucket merging when thresholds approach or storage becomes taxed.<br><b>4.</b> Leverage forecasts to guide infrastructure scaling timelines proactively.<br><b>5.</b> Monitor replication factors for compliance and availability settings.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>search index="_introspection" sourcetype="splunk_disk_objects"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Filters relevant events from introspection index with disk object data.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Renames fields for convenience and consistency.<br><b>03</b> <code>| stats latest(total_bucket_count), latest(warm_bucket_count), ... by name</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Aggregates bucket statistics by name for the selected period.<br><b>04</b> <code>| eval size_per_warm_bucket= ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Calculates additional statistics like size per bucket types.<br><b>05</b> <code>| stats sum(...) </code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Computes overall totals.<br><b>06</b> <code>| eval replication_factor = [...rest query]</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Retrieves replication factors dynamically.<br><b>07</b> <code>| eval buckets = round(bucket_count_all/...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Adjust and present relevant bucket counts user-readable format (in K or thousands).</br>
explanation = <p>This search delivers cluster-wide bucket inventory by aggregating <b>total</b>, <b>warm</b>, and <b>hot bucket</b> counts across all indexes and calculating unique bucket counts by factoring in the <b>cluster replication factor</b>.</p><p>In clustered environments, each bucket is replicated multiple times. By dividing by the replication factor, this search provides the actual, non-replicated unique bucket counts. This distinction is vital for accurate <b>storage capacity planning</b>, tracking actual <b>data growth rates</b>, and validating <b>cluster health</b>.</p><p>Moreover, excessive bucket counts can degrade Splunk’s <b>search performance</b>, so this search’s trending capability aids in forecasting required actions like bucket optimization (e.g., merging) or future <b>storage expansion</b>. For Splunk administrators, this insight is pivotal for maintaining efficient and scalable Splunk deployments.</p>
quid = 8A5F9E2D7B4C3E1F6D9A5B8F2E7C4D3A
search_author = Splunk Works
description = <p>Provides comprehensive bucket count statistics including <b>total</b>, <b>warm</b>, and <b>hot buckets</b> with replication factor consideration. Accurate bucket counts are critical for understanding <b>storage needs</b> and <b>cluster health</b>.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_introspection" sourcetype="splunk_disk_objects" component=indexes data.name=* data.total_bucket_count=* | rename data.* as * | rename bucket_dirs.* as * | rename home.* as * | stats latest(total_bucket_count) as total_bucket_count, latest(warm_bucket_count) as warm_bucket_count, latest(hot_bucket_count) as hot_bucket_count, latest(warm_bucket_size) as warm_bucket_size by name | eval size_per_warm_bucket=warm_bucket_size/warm_bucket_count | stats sum(total_bucket_count) AS bucket_count_all, sum(warm_bucket_count) AS warm_bucket_count, sum(hot_bucket_count) AS hot_bucket_count | eval buckets = round(bucket_count_all / 1000,2)."K" | eval warm_buckets = round(warm_bucket_count / 1000,2)."K" | eval hot_buckets = round(hot_bucket_count / 1000,2)."K" | eval replication_factor = [| rest splunk_server=local /services/cluster/config | return $replication_factor ] | eval unique_buckets = round(bucket_count_all / replication_factor,2) | eval unique_warm_buckets = round(warm_bucket_count / replication_factor,2) | eval unique_hot_buckets = round(hot_bucket_count / replication_factor,2) | fields buckets unique_buckets warm_buckets unique_warm_buckets hot_buckets unique_hot_buckets | rename buckets AS "Total Buckets", unique_buckets AS "Unique Buckets", warm_buckets AS "Total Warm Buckets", unique_warm_buckets AS "Unique Warm Buckets", hot_buckets AS "Total Hot Buckets", unique_hot_buckets AS "Unique Hot Buckets"

