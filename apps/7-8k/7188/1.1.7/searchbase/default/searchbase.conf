 transparent; color: rgb(208, 0, 208);">count</span><span style="background-color: transparent; color: rgb(71, 68, 68);"> </span><span style="background-color: transparent; color: rgb(246, 131, 32);">by</span><span style="background-color: transparent; color: rgb(71, 68, 68);"> </span><span style="background-color: transparent; color: rgb(0, 0, 0);">query ut_shannon</span></p><p><em style="background-color: transparent; color: rgb(0, 0, 0);">*Special Ingredient: the `ut_parse_extended` macro requires </em><em style="background-color: transparent; color: rgb(17, 85, 204);"><u><a rel="noopener noreferrer" href="https://splunkbase.splunk.com/app/2734">URL Toolbox</a></u></em><span style="background-color: transparent; color: rgb(0, 0, 0);">, </span><em style="background-color: transparent; color: rgb(0, 0, 0);">available on Splunkbase.</em></p><p>...(content truncated for brevity). To see all content download <a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">The Threat Hunter's Cookbook</a></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="http