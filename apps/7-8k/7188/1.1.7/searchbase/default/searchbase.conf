[overview_of_all_medium_to_critical_risks_for_win20xx_1]
search_name = Vulnerability Analysis for Windows Server 2012 with Severity Count
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Servers
tags = Access,GoSplunk
solution = <p>This search provides <b>comprehensive vulnerability analysis</b> for Windows Server 2012 systems, helping prioritize remediation efforts.</p><p><b>Suggested Actions</b><br><b>1.</b> Review high-severity vulnerabilities first for immediate remediation.<br><b>2.</b> Verify vulnerable systems are included in patch management schedules.<br><b>3.</b> Correlate with asset inventory to confirm coverage.<br><b>4.</b> Document remediation plans for each identified vulnerability.<br><b>5.</b> Schedule regular scans to track remediation progress.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> The query starts by specifying the sourcetype as 'tenable:sc:vuln' and the operating system as 'Microsoft Windows Server 2012'. This filters the data to only include vulnerabilities related to this specific system.<br><b>02</b> The 'table' command is used to format the output into a table with columns for ip, netbiosName, dnsName, severity name, plugin name, solution, and description. These details provide comprehensive information about each vulnerability.<br><b>03</b> The 'join' command is used to combine this data with another search. The type of join is 'inner', meaning only records that match in both searches will be included. The 'max=0' option ensures that all matching records are returned, not just the first one.<br><b>04</b> The second search specifies an index and the same sourcetype as before, but adds a filter for 'baseScore>3'. This means only vulnerabilities with a severity score greater than 3 are included in the final output.<br><b>05</b> The second 'table' command formats the output of the second search in the same way as the first.<br><b>06</b> The 'sort by' command is used to order the final output by severity name. This makes it easier to identify the most severe vulnerabilities.<br><b>07</b> Finally, the 'chart' command is used to create a visual representation of the data, showing the count of each severity type.
explanation = <p>This query is <b>valuable</b> for security analysts or system administrators who need to monitor and manage vulnerabilities in their Windows Server 2012 systems. It helps them identify the most severe vulnerabilities, understand their nature, and find solutions to <b>mitigate</b> them.</p>
quid = 9C8CB5073B64E286471B3789778C438B
search_author = GoSplunk: Ronald (Access42)
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/overview-medium-critical-risks-win20xx" target="_blank">https://gosplunk.com/overview-medium-critical-risks-win20xx</a></p>
description = <p>Summarizes <b>Vulnerability Analysis for Windows Server 2012 with Severity Count</b> using <code>sourcetype="tenable:sc:vuln" cpe:/o:microsoft:windows_server_2012</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = sourcetype="tenable:sc:vuln" cpe:/o:microsoft:windows_server_2012\
	| table ip, netbiosName, dnsName, severity.name, pluginName, solution, description\
	| join ip type=inner max=0 [ search index="<<index>>" sourcetype="tenable:sc:vuln" baseScore>3\
	| table ip, netbiosName, dnsName, severity.name, pluginName, solution, description ]\
	| sort by severity.name\
	| chart count by severity.name

