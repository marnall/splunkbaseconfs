solution = <p>This query provides operational visibility into audit data for completed searches with granular performance metrics like runtime and event counts. Use it to monitor search efficiency and identify search issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify searches with a high run time or bucket scan count for optimization.<br><b>2.</b> Review user or saved searches with suboptimal performance to improve query design.<br><b>3.</b> Monitor search trends over time to detect unusual spikes or drops in performance.<br><b>4.</b> Utilize insights to allocate system resources effectively.<br><b>5.</b> Share findings with stakeholders to ensure transparency and drive adoption of best practices.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index=_audit action=search info=completed search_id!=*rsa_scheduler_* search_id!=*subsearch* is_realtime=0</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve completed searches from the _audit index, excluding scheduler and subsearch searches.<br><b>02</b> <code>| stats latest(total_run_time) as total_run_time, latest(scan_count) as scan_count, latest(event_count) as event_count, latest(result_count) as result_count, latest(searched_buckets) as searched_buckets, latest(search_startup_time) as search_startup_time, latest(user) as user, latest(search) as search, latest(apiStartTime) as apiStartTime, latest(apiEndTime) as apiEndTime by savedsearch_name, _time, search_id</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate and compute performance metrics grouped by saved search name, time, and search ID.<br>
explanation = <p>This search focuses on the <b>_audit</b> index, used for tracking Splunk's internal processes and performance. By targeting completed searches (ignoring real-time searches and subsearches), it provides valuable insights into search performance, user behavior, and workload distribution. The inclusion of metrics like <b>total_run_time</b>, <b>event_count</b>, and <b>searched_buckets</b> helps users identify bottlenecks in query execution and areas for optimization.</p><p>The <b>stats</b> command is employed to aggregate key performance metrics by savedsearch_name, time, and search ID, enabling the identification of trends across saved searches. This capability is crucial for Splunk administrators and users aiming to enhance the efficiency and reliability of their search operations.</p><p>By leveraging this search, users can proactively address issues, such as inefficient searches or performance outliers, thus maintaining optimal system performance.</p>
