solution = <p>This search surfaces repeats, high‑volume, or time‑exceeding searches executed in your Splunk platform, helping admins and governance teams identify inefficient or anomalous activity. </p><p><b>Suggested Actions</b><br><b>1.</b> Review searches flagged as “Overran its range!!!” to understand root causes.<br><b>2.</b> Prioritize optimization or disablement of high‑volume searches driving excessive event_count or run_time.<br><b>3.</b> Identify users and savedsearch_names associated with repetitive executions and assign ownership review.<br><b>4.</b> Archive or consolidate redundant search jobs to reduce workload and improve platform stability.<br><b>5.</b> Incorporate this search into regular audit cadence and alert on “Overran?” status for proactive governance.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_audit [|rest /services/server/info splunk_server=local | fields host] action=search user=* user!=splunk-system-user search_id=* (info=granted OR info=completed)</code><br>       - Retrieves audit search events excluding system user to ensure transparency into human-initiated activities.<br><b>02</b> <code>| rex field=apiStartTime "'(?<start_time>[^']+)'”</code><br>       - Extracts the start timestamp of API-related search details.<br><b>03</b> <code>| rex field=apiEndTime "'(?<end_time>[^']+)'”</code><br>       - Extracts the end timestamp of API-related search details.<br><b>04</b> <code>| rex "search\=(?<search_string>.+)\,\sautojoin"</code><br>       - Gleans the actual search string logged in the API event.<br><b>05</b> <code>| eval range=if(start_time=="ZERO_TIME","All Time", tostring(strptime(end_time, "%a %b %d %H:%M:%S %Y") - strptime(start_time, "%a %b %d %H:%M:%S %Y"),"duration"))</code><br>       - Calculates the time range of each search or labels it "All Time" where applicable.<br><b>06</b> <code>| eval range2=if(start_time=="ZERO_TIME","All Time", strptime(end_time, "%a %b %d %H:%M:%S %Y") - strptime(start_time, "%a %b %d %H:%M:%S %Y"))</code><br>       - Verifies numeric range for precision in identifying anomalies.<br><b>07</b> <code>| stats max(event_count) AS event_count values(start_time) AS "Search Earliest" values(end_time) AS "Search Latest" count values(range) AS range values(range2) AS range2 values(search) AS Search values(user) AS User max(total_run_time) AS run_time(sec) by search_id savedsearch_name</code><br>       - Aggregates and calculates metrics for insightful auditing.<br><b>08</b> <code>| convert ctime(*Time) ctime("Search Start") ctime("Search End")</code><br>       - Converts timestamps to a readable format for better interpretation.<br><b>09</b> <code>| where count>1</code><br>       - Ensures focus on searches executed multiple times.<br><b>10</b> <code>| rename search_id AS SID range AS "Search Range"</code><br>       - Renames fields for clarity.<br><b>11</b> <code>| eval "Run Time"=tostring('run_time(sec)',"duration")</code><br>       - Reformats run times into a readable duration.<br><b>12</b> <code>| eval "Overran?"=if('run_time(sec)'>range2,"Overran its range!!!","NO")</code><br>       - Highlights searches with duration exceeding intended range.<br><b>13</b> <code>| eval SID = trim(SID, "'")</code><br>       - Removes unnecessary quotes for a clean output.<br><b>14</b> <code>| table SID savedsearch_name event_count "Search Earliest" "Search Latest" "Search Range" Search User "run_time(sec)" "Overran?" "Run Time"</code><br>       - Formats the final results into an actionable table.<br><b>15</b> <code>| sort - "Run Time"</code><br>       - Sorts the output by run duration for prioritization.</p>
explanation = <p>This SPL queries the <b>_audit</b> index for `action=search` events and joins metadata to determine actual run time versus the defined range. It uses <b>rex</b> to extract search start_time and end_time from API fields, calculates the <b>range2</b> in seconds, counts repeated runs (via <b>count>1</b>), and flags over‐runs where `<b>run_time(sec)</b>` exceeds `<b>range2</b>`. This search provides critical <b>transparency</b> into search execution patterns, especially repeated or anomalous queries, supporting governance efforts to manage impacts on resources. For less experienced Splunkers, this search builds understanding of <b>rex</b> for field extraction, <b>eval</b> for calculations, and <b>stats</b> for grouping data efficiently.</p>
quid = 508232F382E299D676EEBD95219421E5
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/security/cim/4.19.0/user/about-the-common-information-model" target="_blank">Splunk Docs: Splunk Audit Logs</a><br>Overview of audit data fields including info=granted/completed. </li><li><a href="https://community.splunk.com/t5/Splunk-Search/What-does-the-status-of-info-granted-mean-in-my-search/m‑p/225343" target="_blank">Splunk Community: Meaning of info=granted/completed</a><br>Community explanation of audit status values. </li><li><a href="https://community.splunk.com/t5/Splunk-Search/Get-user-s‑search‑history/m‑p/57744" target="_blank">Splunk Community: Get user’s search history</a><br>Guide on retrieving searches by user with count and runtime. </li><li><a href="https://splunk.com/blog/audit-logs" target="_blank">Splunk Blogs: Audit Logging – A Comprehensive Guide</a><br>High‑level overview of audit logs for security, compliance, and usage tracking. </li></ul>
description = <p>Summarizes <b>Search ID Duration Audit</b> using <code>index=_audit [|rest /services/server/info splunk_server=local | fields host] action=search user=* user!=splunk‑system‑us</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_audit [|rest /services/server/info splunk_server=local | fields host] action=search user=* user!=splunk‑system‑user search_id=* (info=granted OR info=completed) \
	| rex field=apiStartTime "'(?<start_time>[^']+)'” \
	| rex field=apiEndTime "'(?<end_time>[^']+)'” \
	| rex "search\=(?<search_string>.+)\,\sautojoin" \
	| eval range=if(start_time=="ZERO_TIME","All Time", tostring(strptime(end_time, "%a %b %d %H:%M:%S %Y") - strptime(start_time, "%a %b %d %H:%M:%S %Y"),"duration")) \
	| eval range2=if(start_time=="ZERO_TIME","All Time", strptime(end_time, "%a %b %d %H:%M:%S %Y") - strptime(start_time, "%a %b %d %H:%M:%S %Y")) \
	| stats max(event_count) AS event_count values(start_time) AS "Search Earliest" values(end_time) AS "Search Latest" count values(range) AS range values(range2) AS range2 values(search) AS Search values(user) AS User max(total_run_time) AS run_time(sec) by search_id savedsearch_name \
	| convert ctime(*Time) ctime("Search Start") ctime("Search End") \
	| where count>1 \
	| rename search_id AS SID range AS "Search Range" \
	| eval "Run Time"=tostring('run_time(sec)',"duration") \
	| eval "Overran?"=if('run_time(sec)'>range2,"Overran its range!!!","NO") \
	| eval SID = trim(SID, "'") \
	| table SID savedsearch_name event_count "Search Earliest" "Search Latest" "Search Range" Search User "run_time(sec)" "Overran?" "Run Time" \
	| sort - "Run Time"

[search_traffic_by_source_ip]
search_name = Network Traffic Analysis for Specific Source IP with Destination and Action Details
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Search
tags = Access,Searching
solution = <p>This search enables detailed analysis of network traffic from specific source IPs, aiding in security investigations and traffic monitoring.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify unusual destinations or high traffic volumes from the source IP.<br><b>2.</b> Correlate traffic patterns with known business activities.<br><b>3.</b> Investigate blocked actions to understand potential threats.<br><b>4.</b> Use destination country data to detect geographic anomalies.<br><b>5.</b> Create baseline reports for normal traffic patterns from critical hosts.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=<<index>> sourcetype=sourcetype <br />- This line is specifying the index and sourcetype where the data is being pulled from.</ul><ul><b>02</b> | datamodel Network_Traffic All_Traffic search <br />- This line is using the 'datamodel' command to search for all network traffic data.</ul><ul><b>03</b> | search All_Traffic.src_ip=10.x.x.x <br />- This line is filtering the data to only include entries where the source IP address is 10.x.x.x.</ul><ul><b>04</b> | stats count by All_Traffic.src_ip, All_Traffic.dest,All_Traffic.action, dstcountry <br />- This line is grouping the data by source IP, destination, action, and destination country, and counting the number of occurrences for each group.</ul><ul><b>05</b> | dedup All_Traffic.dest <br />- This line is removing any duplicate destination entries.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to analyze network traffic from a specific IP address. It can help identify patterns in the data, such as common destinations or actions, and can be used to detect anomalies or potential security threats.</div></div>
quid = C9C72BCB10E26972826BCF9BECDB9D8E
search_author = GoSplunk: pradeep577
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/search-traffic-by-source-ip" target="_blank">https://gosplunk.com/search-traffic-by-source-ip</a></p>
description = <p>Summarizes <b>Network Traffic Analysis for Specific Source IP with Destination and Action Details</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| datamodel Network_Traffic All_Traffic search\
	| search All_Traffic.src_ip=10.x.x.x\
	| stats count by All_Traffic.src_ip, All_Traffic.dest,All_Traffic.action, dstcountry\
	| dedup All_Traffic.dest

[searches_to_check_search_concurrency_for_historical]
search_name = Max Realtime Searches by Host Over Time
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexing
solution = <p>This query provides operational insights into the <b>performance and capacity utilization</b> of Splunk hosts by showcasing trends in realtime search concurrency.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify hosts approaching peak limits to evaluate thresholds and prevent overloading.<br><b>2.</b> Cross-reference search concurrency peaks with user activity or scheduled searches to pinpoint heavy workloads.<br><b>3.</b> Assess the need for resource reallocation or scaling based on observed load trends.<br><b>4.</b> Implement load balancing strategies for underutilized or overburdened hosts.<br><b>5.</b> Continuously monitor changes over time to ensure consistent performance and scalability.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal</code><br>       - Specifies the retrieval of operational metrics from Splunk's internal logs.<br><b>02</b> <code>source=*metrics.log</code><br>       - Targets specific metric logs within the internal index capturing detailed activity data.<br><b>03</b> <code>group=search_concurrency</code><br>       - Focuses the search on concurrency data grouped by its `search_concurrency` field.<br><b>04</b> <code>system total NOT user=*</code><br>       - Excludes user-specific data to focus on aggregate system performance.<br><b>05</b> <code>| timechart max(active_realtime_searches) by host</code><br>       - Generates a time-series chart highlighting the peak realtime searches broken down by host for visibility into utilization patterns.<br>
explanation = <p>This query is designed to monitor the operational load on Splunk’s hosts by analyzing the <b>maximum number of active realtime searches</b>. It uses the internal `_internal` index and metrics logs, focusing on the `search_concurrency` group and ignoring user-specific entries. The query provides valuable insights into resource utilization that can aid in identifying performance bottlenecks and opportunities for <b>load balancing</b>.</p><p>Key functions:<br>- The `<code>index=_internal</code>` targets Splunk's internal logs for operation metrics.<br>- `<code>source=*metrics.log group=search_concurrency</code>` filters for specific events that track concurrent search activity.<br>- `<code>timechart max(active_realtime_searches) by host</code>` creates a visualization, showing the peak number of active realtime searches across hosts, enabling trend analysis and host comparison.</p>
quid = F0E97A97697D8A44CB0074E491BCE631
search_author = GoSplunk: rsimmons
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/searches-to-check-search-concurrency-for-historical-or-real-time" target="_blank">https://gosplunk.com/searches-to-check-search-concurrency-for-historical-or-real-time</a></p>
description = <p>Summarizes <b>Max Realtime Searches by Host Over Time</b> using <code>index=_internal source=*metrics.log group=search_concurrency "system total" NOT user=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal source=*metrics.log group=search_concurrency "system total" NOT user=*\
	| timechart max(active_realtime_searches) by host

[searches_to_check_search_concurrency_for_real_time]
search_name = Max Active Historical Searches by Host Over Time
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexing
solution = <p>This search provides insights into how Splunk's resources are allocated by evaluating concurrent historical searches per host. Such data helps inform critical operational decisions around balancing workloads, addressing resource constraints, and improving system performance.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify hosts with consistently high concurrent searches to evaluate for potential scaling needs.<br><b>2.</b> Use outputs to optimize load balancing by redistributing search loads across less-busy hosts.<br><b>3.</b> Investigate any unexpected spikes in concurrency to ensure they align with expected activity.<br><b>4.</b> Incorporate findings into performance tuning for more stable search execution.<br><b>5.</b> Regularly monitor concurrency trends as part of routine capacity management.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal</code><br>       - Specifies data from Splunk's internal index, storing operational logs.<br><b>02</b> <code>source=*metrics.log</code><br>       - Focuses on metrics logs capturing operational statistics.<br><b>03</b> <code>group=search_concurrency</code><br>       - Filters entries related to search concurrency tracking.<br><b>04</b> <code>"system total" NOT user=*</code><br>       - Focuses solely on system-driven searches while excluding user-specific searches.<br><b>05</b> <code>| timechart max(active_hist_searches) by host</code><br>       - Constructs a time series graph showing the max concurrent historical searches per host.<br>
explanation = <p>This search provides <b>visibility into historical search concurrency</b>, which can help with capacity planning, load balancing, and overall operational efficiency. By examining the maximum concurrent search volume per host, administrators can identify potential resource contention or inefficiencies. The query relies on <code>source=*metrics.log</code> and targets entries where the <code>group</code> field is <code>search_concurrency</code>. The final <code>timechart</code> aggregates the <b>max(active_hist_searches)</b> over time, offering trends at the host level.</p>
quid = 701F71EB3DBA27AC02898BEA175DE254
search_author = GoSplunk: rsimmons
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/searches-to-check-search-concurrency-for-historical-or-real-time" target="_blank">https://gosplunk.com/searches-to-check-search-concurrency-for-historical-or-real-time</a></p>
description = <p>This query retrieves the <b>maximum number</b> of historical searches that were active concurrently, organized by host, from the internal Splunk <b>metrics</b> log.</p><p>It purposely excludes user-initiated searches, focusing solely on <b>system-driven activity</b>.</p>
search = index=_internal source=*metrics.log group=search_concurrency "system total" NOT user=*\
	| timechart max(active_hist_searches) by host

[security_access_granted_to_an_account]
search_name = Security Event Log: Modified Accounts with New Rights by Date
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,SFU
solution = <p>This search provides a detailed view of access modifications, enabling tracking of who granted what rights to which accounts and when. Administrators and security personnel can leverage this insight to monitor access governance and detect anomalies.</p><p><b>Suggested Actions</b><br><b>1.</b> Verify unusual account modifications to ensure they align with organizational policies.<br><b>2.</b> Investigate any unexpected or unauthorized access rights granted.<br><b>3.</b> Document modifications to maintain an audit trail for compliance purposes.<br><b>4.</b> Cross-check with HR or role-specific policies to ensure correct access assignments.<br><b>5.</b> Use findings to improve user-role matrices and reduce unnecessary access permissions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=621 Account_Modified!="%{*"</code><br>       - Filters events from the security logs where account modifications took place and excludes patterns matching "%{*".<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts the event timestamp into a readable "Year/Month/Day" format for reporting purposes.<br><b>03</b> <code>| stats count by User_Name, Account_Modified, Access_Granted, Date, action</code><br>       - Aggregates the event data by source account, modified account, granted rights, and action date for clarity.<br><b>04</b> <code>| rename User_Name as "Source Account"</code><br>       - Renames the "User_Name" field to improve column clarity for report readers.<br><b>05</b> <code>| rename Account_Modified as "Target Account"</code><br>       - Enhances readability by naming the field "Target Account," making it clear which accounts were affected.<br><b>06</b> <code>| rename Access_Granted as "New Rights Granted"</code><br>       - Adds user-friendly column headers for better understanding of modifications.</br>
explanation = <p>This search parses the Security Event Logs for events related to rights or permissions granted to accounts. It extracts relevant fields, such as the source account initiating the change, the target account modified, and the specific access rights granted. By grouping events by date and user, it provides an organized report for tracking and auditing changes. The <code>eval</code> command is used to format the timestamp into a human-readable date, ensuring consistent reporting. The <code>stats</code> command aggregates data by critical fields to summarize modifications effectively. The <code>rename</code> commands improve readability by assigning more descriptive names to columns.</p>
quid = 02F74C57A98F4536E0FD9993D45F1CE6
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Security Event Log: Modified Accounts with New Rights by Date</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=621 Account_Modified!="%{*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=621 Account_Modified!="%{*"\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| stats count by User_Name, Account_Modified, Access_Granted, Date, action\
	| rename User_Name as "Source Account"\
	| rename Account_Modified as "Target Account"\
	| rename Access_Granted as "New Rights Granted"

