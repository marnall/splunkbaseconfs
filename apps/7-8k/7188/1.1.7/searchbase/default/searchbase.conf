tags = Access,GoSplunk
solution = <p>This query provides organizations with a breakdown of new vulnerabilities detected from Qualys VM scans within the last 24 hours. It helps prioritize responses to security gaps based on their severity, ensuring urgent issues are addressed promptly.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the counts by severity to understand overall risk exposure.<br><b>2.</b> Focus on addressing critical and high-severity vulnerabilities first, as they pose the most significant risk.<br><b>3.</b> Validate remediation steps for each QID to ensure issues are resolved.<br><b>4.</b> Leverage these insights to refine vulnerability management strategies.<br><b>5.</b> Share findings with stakeholders to drive strategic decisions around security investments.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>eventtype="qualys_vm_detection_event" STATUS="NEW"</code><br>       - Filters for Qualys Virtual Machine events with new detections.<br><b>02</b> <code>| dedup QID</code><br>       - Removes duplicate entries by Qualys ID to ensure unique vulnerabilities are counted.<br><b>03</b> <code>| stats count by SEVERITY</code><br>       - Aggregates the count of unique new detections based on their severity levels.</p>
explanation = <p>The search uses the eventtype field to identify "qualys_vm_detection_event" logs specifically marked as "NEW" (status). It then removes duplicates based on the Qualys ID (QID), ensuring unique detections are counted, and aggregates the data by severity levels. The purpose is to highlight newly reported vulnerabilities that could potentially threaten the environment, helping security teams focus on their remediation efforts based on severity priorities. Security administrators and professionals can use this insight to prioritize patching schedules and mitigate threats effectively.</p>
quid = 89AC94E748941CE98B2AF516FAFA0A00
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/number-vulnerabilities-detected-qualys" target="_blank">https://gosplunk.com/number-vulnerabilities-detected-qualys</a></p>
description = <p>This search identifies the <b>number of new vulnerability detection events</b> from Qualys Virtual Machine scans, broken down by severity. It provides a <b>clear view</b> of new detections in the last 24 hours, offering key insights into <b>potential risks</b> in the environment and their severity levels.</p>
search = eventtype="qualys_vm_detection_event" STATUS="NEW"\
	| dedup QID\
	| stats count by SEVERITY

[number_of_wire_transfers_exceed_threshold]
search_name = Number of Wire Transfers Exceed Threshold
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Detail,Fraud,Wire
solution = <p>This SPL flags accounts with a high number of completed wire transfers in a short period. <b>Suggested Actions</b></p><p>1. Investigate flagged accounts for rapid or structured transfer activity.<br>2. Correlate with other risk and fraud alerts.<br>3. Alert compliance or operations teams.<br>4. Integrate with transfer monitoring dashboards.<br>5. Refine thresholds as risk patterns change.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Selects all wire transfer transactions.<br><b>02</b> <code>| where transaction_type="transfer"</code><br>      - Filters for transfer activity.<br><b>03</b> <code>| eval amount=tostring(round(amount, 2),"commas")</code><br>      - Formats transfer amounts.<br><b>04</b> <code>| streamstats time_window=1h count(eval(status="completed")) AS authorized_count list(account_number) AS account_number_list list(dest_account_number) AS dest_account_number_list list(amount) AS amount list(status) AS status list(_time) AS time BY account_number</code><br>      - Tracks transfer counts and aggregates fields by account in 1-hour windows.<br><b>05</b> <code>| where authorized_count >= 7</code><br>      - Flags accounts exceeding the threshold.<br><b>06</b> <code>| table src_ip dest_ip timestamp authorized_count</code><br>      - Outputs review fields.
explanation = <p>This SPL focuses on transfer transactions, formats amounts for reporting, and uses <b>streamstats</b> in a 1-hour window to count completed wire transfers and aggregate key fields per account. Accounts with at least 7 completed transfers in an hour are flagged for further review. This approach helps risk and compliance teams monitor for unusual or rapid transfer activity that may warrant escalation or deeper investigation.</p>
quid = E54F3195629FE7372477D320E3C14B66
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/streamstats" target="_blank">Splunk Docs: streamstats command</a><br>Rolling time window analysis.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/table" target="_blank">Splunk Docs: table command</a><br>Reviewing result output.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Wire transfer and high-volume monitoring.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Best practices for wire transfer risk.</li></ul>
description = <p>Flags accounts with <b>7 or more completed wire transfers</b> in a one-hour window, surfacing potentially suspicious or high-volume transfer activity for review. Supports rapid identification of accounts exceeding operational or compliance thresholds.</p>
search = index="*" sourcetype="*"\
	| where transaction_type="transfer"\
	|eval amount=tostring(round(amount, 2),"commas")\
	|streamstats time_window=1h count(eval(status="completed")) AS authorized_count list(account_number) AS account_number_list list(dest_account_number) AS dest_account_number_list list(amount) AS amount list(status) AS status list(_time) AS time BY account_number\
	|where authorized_count >= 7\
	|table src_ip dest_ip timestamp authorized_count

