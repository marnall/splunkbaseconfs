updated_author = khutchinson
description = <p>Summarizes <b>Windows Security Events Analysis with Account Details</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security src_nt_domain!="NT AUTHORITY" EventCode=4720 OR E</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security src_nt_domain!="NT AUTHORITY" EventCode=4720 OR EventCode=4726 OR EventCode=4738 OR EventCode=4767 OR EventCode=4781 OR EventCode=4727 OR EventCode=4730 OR EventCode=4731 OR EventCode=4734 OR EventCode=4735 OR EventCode=4737 OR EventCode=4744 OR EventCode=4745 OR EventCode=4748 OR EventCode=4749 OR EventCode=4750 OR EventCode=4753 OR EventCode=4754 OR EventCode=4755 OR EventCode=4758 OR EventCode=4759 OR EventCode=4760 OR EventCode=4763 OR EventCode=4764 OR EventCode=4728 OR EventCode=4729 OR EventCode=4732 OR EventCode=4733 OR EventCode=4746 OR EventCode=4747 OR EventCode=4751 OR EventCode=4752 OR EventCode=4756 OR EventCode=4757 OR EventCode=4761 OR EventCode=4762\
	| rex field=member_id "^\w+\W(?<ITS_Admin>\w*\s\w*\s\w*|\w+_\w+|\w*\s\w*|\w*)(\s\w+\W|\s)(?<Target_Account>.*\s)"\
	| eval Target_Account=if(Target_Account="NONE_MAPPED", trim(member_dn, ITS_Admin), Target_Account)\
	| table _time, EventCode, EventCodeDescription, src_nt_domain, ITS_Admin, Target_Account,src_nt_domain,msad_action,Group_Name\
	| sort EventCodeDescription,ITS_Admin, Target_Account\
	| rename ITS_Admin as "ITS Admin", src_nt_domain as "Source Domain"

[windows_suspicious_behavior_commen_events_1]
search_name = Security Event Analysis: Log Modifications, Account Changes, Logons, Privilege Escalations
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This search enables organizations to gain detailed insights into critical system and user behaviors, highlighting potential security risks such as unauthorized account modifications or privilege escalations. By summarizing and categorizing these events, the search provides operational clarity and actionable intelligence.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate high-frequency triggers, especially privilege escalations and audit log clearances, for potential malicious activity.<br><b>2.</b> Correlate security findings with other system logs to verify potential threats.<br><b>3.</b> Strengthen account security protocols for users involved in repeated failed logons.<br><b>4.</b> Implement monitoring and alerting for critical event codes flagged by this search.<br><b>5.</b> Review periodic summaries to track trends and verify compliance with security policies.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security user!=...</code><br>       - Filters Windows Security EventLogs for non-system accounts and relevant events.<br><b>02</b> <code>| eval Trigger=case(...)...</code><br>       - Maps event codes to specific security-related triggers, providing operational insights.<br><b>03</b> <code>| stats earliest() latest() values() sparkline by Trigger</code><br>       - Aggregates occurrences, providing details on affected users/hosts and trends.<br><b>04</b> <code>| sort - count</code><br>       - Sorts triggers by the number of occurrences to identify high-priority events.<br><b>05</b> <code>| convert ctime</code><br>       - Converts timestamps into a human-readable format for easier interpretation.<br>
explanation = <p>This search leverages the Windows EventLogs to uncover essential <b>security-related behaviors</b>, such as <b>log modifications, account changes, logons, and privilege escalations</b>. By analyzing specific event codes, it categorizes these events into actionable triggers, including "Audit Logs Modified," "Account Modification," and "Escalation of Privileges." The <code>eval</code> command maps each EventCode to a meaningful trigger, while the <code>stats</code> function aggregates and provides a concise summary of these behaviors, including when they first and last occurred, which users and hosts were involved, and a trendline overview. Finally, <code>convert</code> is used to provide human-readable timestamps, simplifying report readability. This analysis is pivotal for IT administrators, cybersecurity teams, and incident responders, keeping them informed of security incidents as they emerge.</p>
quid = CD597AE1CD4BE4C321A3D6FDB20422BC
search_author = GoSplunk: Go Splunk
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/search-common-eventcodes-eventids-for-suspicious-behavior" target="_blank">https://gosplunk.com/search-common-eventcodes-eventids-for-suspicious-behavior</a></p>
description = <p>Summarizes <b>Security Event Analysis: Log Modifications, Account Changes, Logons, Privilege Escalations</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security user!="DWM-*" user!="UMFD-*" user!=SYSTEM user!="</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security user!="DWM-*" user!="UMFD-*" user!=SYSTEM user!="LOCAL SERVICE" user!="NETWORK SERVICE" user!="*$" user!="ANONYMOUS LOGON" user!="IUSR"\
	| eval Trigger=case (EventCode=516, "Audit Logs Modified",EventCode=517, "Audit Logs Modified",EventCode=612, "Audit Logs Modified",EventCode=623, "Audit Logs Modified",EventCode=806, "Audit Logs Modified",EventCode=807, "Audit Logs Modified",EventCode=1101, "Audit Logs Modified",EventCode=1102, "Audit Logs Modified",EventCode=4612, "Audit Logs Modified",EventCode=4621, "Audit Logs Modified",EventCode=4694, "Audit Logs Modified",EventCode=4695, "Audit Logs Modified",EventCode=4715, "Audit Logs Modified",EventCode=4719, "Audit Logs Modified",EventCode=4817, "Audit Logs Modified",EventCode=4885, "Audit Logs Modified",EventCode=4902, "Audit Logs Modified",EventCode=4906, "Audit Logs Modified",EventCode=4907, "Audit Logs Modified",EventCode=4912, "Audit Logs Modified", EventCode=642, "Account Modification",EventCode=646, "Account Modification",EventCode=685, "Account Modification",EventCode=4738, "Account Modification",EventCode=4742, "Account Modification",EventCode=4781, "Account Modification", EventCode=1102, "Audit Logs Cleared/Deleted",EventCode=517, "Audit Logs Cleared/Deleted", EventCode=628, "Passwords Changed",EventCode=627, "Passwords Changed",EventCode=4723, "Passwords Changed",EventCode=4724, "Passwords Changed", EventCode=528, "Successful Logons",EventCode=540, "Successful Logons",EventCode=4624, "Successful Logons", EventCode=4625, "Failed Logons",EventCode=529, "Failed Logons",EventCode=530, "Failed Logons",EventCode=531, "Failed Logons",EventCode=532, "Failed Logons",EventCode=533, "Failed Logons",EventCode=534, "Failed Logons",EventCode=535, "Failed Logons",EventCode=536, "Failed Logons",EventCode=537, "Failed Logons",EventCode=539, "Failed Logons", EventCode=576, "Escalation of Privileges",EventCode=4672, "Escalation of Privileges",EventCode=577, "Escalation of Privileges",EventCode=4673, "Escalation of Privileges",EventCode=578, "Escalation of Privileges",EventCode=4674, "Escalation of Privileges")\
	| stats earliest(_time) as Initial_Occurrence latest(_time) as Latest_Occurrence values(user) as Users values(host) as Hosts count sparkline by Trigger\
	| sort - count\
	| convert ctime(Initial_Occurrence) ctime(Latest_Occurrence)

[windows_time_change_1]
search_name = Count of Non-Local, Non-System Security Events by User
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>Monitoring system time changes is critical for <b>security and compliance</b>, as unauthorized time modifications can indicate tampering with audit logs or other malicious activity.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate users with high counts of time change events for potential misuse.<br><b>2.</b> Correlate time changes with other security events to detect tampering attempts.<br><b>3.</b> Establish alerts for unauthorized time change patterns.<br><b>4.</b> Ensure time synchronization policies are enforced across systems.<br><b>5.</b> Review and strengthen access controls for system time modification privileges.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=*WinEventLog</code><br>       - Specifies the data source as Windows Security Event Logs. <br><b>02</b> <code>user!="*$"</code><br>       - Filters out system accounts ending with '$'.<br><b>03</b> <code>user!="LOCAL SERVICE"</code><br>       - Filters out events from the 'LOCAL SERVICE' user.<br><b>04</b> <code>EventCode=520</code><br>       - Focuses on events that represent system time changes.<br><b>05</b> <code>| stats count by user</code><br>       - Aggregates and counts events per user, allowing for identification of unusual patterns or activity.
explanation = <p>This query can be used to <b>track</b> and <b>analyze</b> the frequency of security events, specifically those with EventCode 520, which indicates system time changes in a Windows environment. By filtering out system and service accounts, the query focuses on human users, aiding in identifying <b>potential security threats</b> or unusual activities. This focus enables IT security teams to take timely actions against unauthorized changes or suspicious behaviors.</p>
quid = 6E8737595B79EB734B0ABB71987246CB
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/windows-time-change" target="_blank">https://gosplunk.com/windows-time-change</a></p>
description = <p>Summarizes <b>Count of Non-Local, Non-System Security Events by User</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security user!="*$" user!="LOCAL SERVICE" EventCode=520</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security user!="*$" user!="LOCAL SERVICE" EventCode=520\
	| stats count by user

[windows_time_change_2]
search_name = Count of Security Events (4616) by Non-Local Account Names
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This query helps identify users who have modified system time, which can indicate <b>tampering attempts</b> or <b>policy violations</b> that may affect audit trail integrity.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate accounts with unexpected time change events.<br><b>2.</b> Correlate with login and activity logs to identify suspicious patterns.<br><b>3.</b> Enforce policies restricting time change permissions to authorized personnel.<br><b>4.</b> Set up alerts for time modification events from non-administrative accounts.<br><b>5.</b> Review organizational time synchronization policies and ensure compliance.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>>' specifies the index where the data is being pulled from.</code><br>       - Describe purpose<br><b>02</b> <code>source=*WinEventLog:Security' specifies that the data source is Windows Security Event logs.</code><br>       - Describe purpose<br><b>03</b> <code>EventCode=4616' filters the events to only include those with EventCode 4616, which indicates a system time change.</code><br>       - Describe purpose<br><b>04</b> <code>Account_Name!=*$ Account_Name!=LOCAL SERVICE' excludes events triggered by system accounts, focusing on user accounts.</code><br>       - Describe purpose<br><b>05</b> <code>| stats count by Account_Name' counts the number of these events, grouped by the Account_Name, providing a summary of how many times each user account has changed the system time.</code><br>       - Describe purpose<br>
explanation = <p>This query <b>monitors and analyzes</b> changes in system time. The EventCode 4616 in Windows Security logs signifies a system time change. By excluding system accounts (those ending with '$' or named 'LOCAL SERVICE'), the query focuses on changes made by user accounts, which could indicate <b>unauthorized</b> or <b>suspicious</b> activity. This helps in identifying potential security threats or <b>policy violations</b>, ensuring <b>system integrity</b> is maintained.</p>
quid = 2675D5C10717E4B9A225E0316ED97A33
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/windows-time-change" target="_blank">https://gosplunk.com/windows-time-change</a></p>
description = <p>This query <b>tracks</b> system time changes in Windows Security Event logs with EventCode 4616. It <b>excludes</b> events triggered by system accounts like those ending in '$' or by 'LOCAL SERVICE', focusing on <b>user-driven</b> actions. This can help <b>identify</b> unauthorized or <b>suspicious</b> changes.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4616 Account_Name!="*$" Account_Name!="LOCAL SERVICE"\
	| stats count by Account_Name

[wire_transfers_from_multiple_client_ip_addresses]
search_name = Wire Transfers from Multiple Client IP Addresses
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Detail,Fraud,Wire
solution = <p>This SPL surfaces wire transfers from multiple client IPs for further review. <b>Suggested Actions</b></p><p><b>1.</b> Investigate flagged accounts for account sharing or compromise.<br><b>2.</b> Correlate with session, authentication, or fraud alerts.<br><b>3.</b> Alert security or compliance teams.<br><b>4.</b> Integrate findings with transfer and session dashboards.<br><b>5.</b> Refine monitoring thresholds as access patterns change.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Selects all banking transaction events.<br><b>02</b> <code>| where transaction_type="transfer"</code><br>      - Filters for transfer activity.<br><b>03</b> <code>| convert timeformat="%Y/%m/%d %H:%M:%S"</code><br>      - Ensures timestamp formatting.<br><b>04</b> <code>| eval amount=tostring(round(amount, 2), "commas")</code><br>      - Formats transfer amounts.<br><b>05</b> <code>| streamstats time_window=1m count(eval(status="completed")) AS authorized_count list(account_number) AS account_numbers_list list(dest_account_number) AS dest_account_numbers_list list(amount) AS amounts_list list(status) AS statuses_list list(timestamp) AS times_list values(src_ip) AS clientIPs dc(clientIPs) AS client_IP_count BY account_number</code><br>      - Tracks transfers and distinct IPs in rolling 1-minute windows.<br><b>06</b> <code>| table dest_ip, timestamp, client_IP_count, authorized_count</code><br>      - Outputs review fields.<br>
explanation = <p>This SPL focuses on transfer transactions, formats amounts, and uses <b>streamstats</b> to track the count of authorized (completed) transactions, account numbers, destination accounts, amounts, statuses, and timestamps within rolling 1-minute windows for each account. It calculates the distinct count of client IPs used and outputs key fields for review. Monitoring for multiple client IPs in short succession helps identify account misuse, session hijacking, or fraudulent transfer patterns.</p>
quid = E3A0EFA1D5FA5E90E7FE07F5446F34D5
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/streamstats" target="_blank">Splunk Docs: streamstats command</a><br>Tracking activity in rolling time windows.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/table" target="_blank">Splunk Docs: table command</a><br>Formatting results for review.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Account sharing and access anomaly detection.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Best practices for wire transfer monitoring.</li></ul>
description = <p>Flags wire transfers performed from multiple different client IP addresses within a short time window. Surfaces possible account sharing, compromise, or suspicious access patterns for review.</p>
search = index="*" sourcetype="*"\
	| where transaction_type="transfer"\
	| convert timeformat="%Y/%m/%d %H:%M:%S"\
	| eval amount=tostring(round(amount, 2), "commas")\
	| streamstats time_window=1m count(eval(status="completed")) AS authorized_count list(account_number) AS account_numbers_list list(dest_account_number) AS dest_account_numbers_list list(amount) AS amounts_list list(status) AS statuses_list list(timestamp) AS times_list values(src_ip) AS clientIPs dc(clientIPs) AS client_IP_count BY account_number\
	| table dest_ip, timestamp, client_IP_count, authorized_count

[wire_transfers_into_suspicious_or_banned_countries]
search_name = Wire Transfers into Suspicious or Banned Countries
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Detail,Fraud,Wire
solution = <p>This SPL identifies high-value wire transfers (over $10,000) sent to destinations flagged as high-risk or associated with banned countries. Such monitoring is essential for aligning with regulatory compliance, fraud prevention, and internal risk policies.</p><p><b>Suggested Actions</b><br><b>1.</b> Review flagged transfers for potential compliance or sanctions violations.<br><b>2.</b> Correlate results with other cross-border transaction alerts to gain broader insights.<br><b>3.</b> Notify compliance or fraud teams of recurring or suspicious patterns.<br><b>4.</b> Integrate findings into existing sanctions and high-risk dashboards.<br><b>5.</b> Periodically update the high-risk IP and country lists to ensure alignment with evolving threat landscapes.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Retrieves all events from the specified index and sourcetype.<br><b>02</b> <code>| where transaction_type="transfer"</code><br>      - Filters events to include only transactions marked as wire transfers.<br><b>03</b> <code>| eval high_risk_ip="false"</code><br>      - Initializes the high-risk IP flag for all records.<br><b>04</b> <code>| lookup high_risk_ips ip_address AS dest_ip OUTPUT high_risk_ip</code><br>      - Matches and flags transactions involving high-risk destination IPs.<br><b>05</b> <code>| where high_risk_ip="true" AND amount > 10000</code><br>      - Narrows results to include only large transfers ($10,000 and above) involving flagged IPs.<br><b>06</b> <code>| iplocation dest_ip</code><br>      - Adds geolocation details (e.g., country) for the destination IP.<br><b>07</b> <code>| rename Country AS destCountry</code><br>      - Standardizes the naming for the destination country field.<br><b>08</b> <code>| table timestamp, account_number, dest_account_number, amount, destCountry, dest_ip</code><br>      - Selects and formats key fields for the final table output.<br><b>09</b> <code>| eval amount=tostring(round(amount, 2),"commas")</code><br>      - Converts and rounds the transaction amount for human-readable formatting.
explanation = <p>This search focuses on identifying potentially suspicious or prohibited activities by targeting high-value international wire transfers involving flagged destination IPs, commonly tied to high-risk countries or sanctioned entities. The <b>transaction_type</b> ensures only wire transfers are considered, while the <b>lookup</b> command cross-references IP addresses against a pre-defined high-risk list. Transactions exceeding a monetary threshold of $10,000 are filtered further, ensuring focus on significant financial activities.</p><p>The <b>iplocation</b> command enriches the results with geolocation metadata, such as the destination country, which is vital for compliance and risk teams analyzing cross-border transactions. The final <b>table</b> command organizes and formats the data to make it actionable. This query is a powerful tool for financial institutions aiming to stay ahead of regulatory requirements and proactively mitigate fraud and risk exposures.</p>
quid = 30A97917DF09263F531FAEFCB0A7A23A
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/lookup" target="_blank">Splunk Docs: lookup command</a><br>Enriching with high-risk IP lists.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/iplocation" target="_blank">Splunk Docs: iplocation command</a><br>IP geolocation enrichment.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>International transfer compliance and risk topics.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Monitoring cross-border and wire transfer risk.</li></ul>
description = <p>Summarizes <b>Wire Transfers into Suspicious or Banned Countries</b> using <code>index="*" sourcetype="*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="*" sourcetype="*"\
	| where transaction_type="transfer"\
	|eval high_risk_ip="false"\
	|lookup high_risk_ips ip_address AS dest_ip OUTPUT high_risk_ip\
	|where high_risk_ip="true" AND amount > 10000\
	|iplocation dest_ip\
	|rename Country AS destCountry\
	|table timestamp, account_number, dest_account_number, amount, destCountry, dest_ip\
	|eval amount=tostring(round(amount, 2),"commas")

