[check_your_strftime_is_correct_in_the_props_conf]
search_name = Generate Results and Format Time
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,Indexing
solution = <p>This search validates strftime format strings before configuring them in props.conf.</p><p><b>Suggested Actions</b><br><b>1.</b> Modify the format string to match your data's timestamp format.<br><b>2.</b> Compare output with sample timestamps from your data.<br><b>3.</b> Once validated, apply the format to TIME_FORMAT in props.conf.<br><b>4.</b> Test with actual data to confirm parsing works correctly.<br><b>5.</b> Document the format string for future reference.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| makeresults</code><br>       - Generate a single result with the current timestamp.<br><b>02</b> <code>| eval TIME_FORMAT=strftime(_time,"%F,%T,%3N")</code><br>       - Format the timestamp using the specified strftime pattern to verify correct output.<br>
explanation = <p>The <code>makeresults</code> command generates a single event with the current timestamp. The <code>eval</code> command then uses <code>strftime</code> to format this timestamp according to the specified format string (<code>%F,%T,%3N</code>). This pattern outputs the date in ISO format, time in 24-hour format, and milliseconds. By testing format strings here, you can verify they work correctly before applying them in props.conf for timestamp parsing.</p>
quid = 964326DEA342E3A8B5C47A93A6F0BC34
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/check-your-strftime-is-correct-in-the-props-conf" target="_blank">https://gosplunk.com/check-your-strftime-is-correct-in-the-props-conf</a></p>
description = <p>Summarizes <b>Generate Results and Format Time</b> using <code>| makeresults</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | makeresults\
| eval TIME_FORMAT=strftime(_time,"%F,%T,%3N")

[clearing_of_windows_audit_logs_1]
search_name = Windows Security Log Clearing Events by User, Host, and Date
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,SFU
solution = <p>This query allows security teams to monitor and investigate log-clearing activities in Windows systems. Such insights provide an added layer of oversight to detect potential breaches or unauthorized activity aimed at covering tracks.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate frequent or unexpected log-clearing activities from specific accounts or hosts.<br><b>2.</b> Correlate incidents with known intrusion patterns or suspicious behavior.<br><b>3.</b> Verify whether accounts performing such actions have valid administrative permissions.<br><b>4.</b> Set additional alerts to monitor activity surrounding high-risk hosts or users.<br><b>5.</b> Conduct security training or enforcement for users and administrators.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" source=*WinEventLog:security (EventCode=1102 OR EventCode=517)</code><br>       - Searches for Windows security events specific to log clearing (EventCode 1102 or 517).<br><b>02</b> <code>eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Formats the time field into a date format (YYYY/MM/DD) for better readability.<br><b>03</b> <code>stats count by Client_User_Name, host, index, Date</code><br>       - Aggregates counts of log-clearing events, grouped by user, host, index, and date.<br><b>04</b> <code>sort - Date</code><br>       - Orders results to display the most recent events first.<br><b>05</b> <code>rename Client_User_Name as "Account Name"</code><br>       - Re-labels the field name for easier understanding by non-technical users.<br>
explanation = <p>When security logs are cleared, it may be a deliberate attempt to hide unauthorized activities. This search leverages Splunk's capabilities to process raw Windows events (specifically EventCodes 1102 or 517) and surface critical details like <b>User</b>, <b>Host</b>, and the <b>Date</b> when such actions occurred. The use of <code>strftime</code> converts the timestamp into a human-readable format for clarity, while <code>stats</code> organizes the data by user, host, index, and date. Sorting the results by date ensures the most recent log-clearing events are highlighted for rapid investigation. Finally, renaming "Client_User_Name" enhances interpretability for Splunk users.</p>
quid = 11162DCF90F97B6FF4A88D89CD828F53
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Windows Security Log Clearing Events by User, Host, and Date</b> using <code>index="<<index>>" source=*WinEventLog:security (EventCode=1102 OR EventCode=517)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" source=*WinEventLog:security (EventCode=1102 OR EventCode=517)\
| eval Date=strftime(_time, "%Y/%m/%d")\
| stats count by Client_User_Name, host, index, Date\
| sort - Date\
| rename Client_User_Name as "Account Name"

[client_session_depth_by_user_type]
search_name = Client Session Depth By User Type
version = 2.x
date_created = 2025-05-18
category = Web Server
sub_category = Session Analysis
tags = User type
solution = <p>This search offers critical insights into user engagement patterns, helping organizations measure and classify online behavior effectively.</p><p><b>Suggested Actions</b><br><b>1.</b> Compare 'Bounced' users to conversion activity for correlation.<br><b>2.</b> Focus retention campaigns on '2–5 pages' users to deepen interaction.<br><b>3.</b> Use 6–10+ page sessions to inform content or layout success.<br><b>4.</b> Optimize web performance for session types with higher counts.<br><b>5.</b> Alert on spikes in bounce rate sessions that exceed norms.<br><br><b>Recommended Alerts</b><br><b>1.</b> Normal: bounce sessions < 30%<br><b>2.</b> Low: 30–40%<br><b>3.</b> Medium: 40–50%<br><b>4.</b> High: 50–60%<br><b>5.</b> Critical: > 60% bounce rate<br></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/synthetic-monitoring.html" target="_blank">Products: Splunk Synthetic Monitoring</a><br>Splunk Synthetic Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Retrieves access logs from the specified index and sourcetype.<br><b>02</b> <code>| transaction clientip maxpause=1h keepevicted=t mvlist=t</code><br>       - Groups events into logical sessions based on client IP with a 1-hour gap tolerance.<br><b>03</b> <code>| eval user_type=case (...)</code><br>       - Dynamically categorizes sessions by event count into meaningful engagement levels.<br><b>04</b> <code>| top limit=5000 user_type</code><br>       - Displays the most frequent user engagement types across all sessions, sorted by frequency.</br>
explanation = <p>This query leverages the <b>transaction</b> command to group events per client IP into user sessions, accommodating pauses up to 1 hour between events. The sessions are classified into user engagement buckets such as ‘Bounced’ (1 page), ‘2–5 pages,’ and ‘6–10 pages.’ The <b>eval</b> command is used to assign these user_type labels dynamically based on event counts. Results are then ranked using the <b>top</b> command to identify the most prevalent engagement patterns. This search is instrumental in measuring customer engagement and facilitates targeted strategies for improving retention and user experience.</p>
quid = 9B9E13C8D01F638D5510A01680C35B2B
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/transaction">Transaction Command</a><br>Details on grouping events into logical sessions.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eval">Eval Command</a><br>Documentation for conditional logic and field evaluation.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Tracking-bounce-sessions-in-Splunk/m-p/285364">Tracking Bounce Sessions</a><br>Community tips on defining bounce logic in web sessions.</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Search/Session_analysis_using_transaction">Session Analysis via Transaction</a><br>Lantern article on using transaction to measure visits.</li><li><a href="https://community.splunk.com/t5/Getting-Data-In/Count-of-web-pages-accessed-in-session/m-p/349012">Count of Pages per Session</a><br>Technique to compute page depth by IP.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/using-transaction-for-analytics.html">Using Transaction for Analytics</a><br>Blog with step-by-step breakdown of session use cases.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/top">Top Command</a><br>Usage for ranking most frequent field values.</li></ul>
description = <p>Summarizes <b>Client Session Depth By User Type</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" \
| transaction clientip maxpause=1h keepevicted=t mvlist=t \
| eval user_type=case (eventcount=1,"Bounced", eventcount<=5, "2-5 pages", eventcount<=10, "6-10 pages") \
| top limit=5000 user_type

[comparing_one_set_of_results_over_previous_week_example]
search_name = Comparing One Set of Results Over Previous Week Example
version = 2.x
date_created = 2025-05-20
category = IT Operations
sub_category = Monitoring
tags = Timechart
solution = Allows rapid comparison of current error trends against yesterday’s baseline.<br><b>Suggested Actions</b><br><b>01</b> Investigate new error types or volumes that spike only today<br><b>02</b> Highlight regressions triggered by recent deployments<br><b>03</b> Identify business hours with rising instability<br><b>04</b> Correlate high intervals with application logs or metrics<br><b>05</b> Use in dashboards for near real-time visibility<br><br><b>Recommended Alerts</b><br><b>01</b> Intervals with 3x today's count over same yesterday slot<br><b>02</b> Any new failure types logged today<br><b>03</b> Gaps in yesterday’s data but high today may imply outages<br><b>04</b> Sudden rise to 500+ errors in one span<br><b>05</b> Flatline trends replaced by spikes today<br><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" earliest=-1d@d latest=@d</code><br>       - Load yesterday's error events from Splunk indexes<br><b>02</b> <code>eval Series="Yesterday"</code><br>       - Add label to differentiate yesterday's stream<br><b>03</b> <code>eval _time = _time + 86400</code><br>       - Shift timestamps forward by 1 day<br><b>04</b> <code>append [ search tag=failure earliest=@d latest=now | eval Series = "Today" ]</code><br>       - Retrieve today's failures and tag as "Today"<br><b>05</b> <code>timechart fixedrange=f span=30m count by Series</code><br>       - Display both streams in one time-based graph
explanation = <p>This search captures and compares <b>error event counts</b> between the current day and the previous day by aligning timestamps. Yesterday’s data is shifted 24 hours forward, enabling side-by-side visualization across identical time slices. This ensures temporal parity and more effective analysis.</p><p>By showing <b>trend shifts</b> and <b>baseline deviations</b>, this search supports operational effectiveness, helping teams monitor systemic failures or detect anomalies stemming from application updates, user behavior, infrastructure changes, or other factors.</p><p>Through the use of the <code>append</code> command, comparisons of distinct time ranges become seamless. The <code>timechart</code> command overlays the data streams to provide intuitive visualization. Evaluations like adjusting timestamps and series labeling further refine this search for clarity.</p>
quid = 7FB1DC5753E070A9DBA83B5807FD0833
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/append" target="_blank">append command</a><br>Joins results from separate search blocks across days.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eval" target="_blank">eval command</a><br>Used for time shifting and labeling streams for charting.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/timechart" target="_blank">timechart command</a><br>Charts split time series data for visual comparison.</li><li><a href="https://lantern.splunk.com/Observability/Use_Cases/Applications/Monitor_error_rates_over_time" target="_blank">Monitor Error Rates Over Time</a><br>Practical pattern to visualize and alert on error spikes.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Compare-current-day-s-events-to-previous-day-s-events/m-p/412137" target="_blank">Splunk Community Example</a><br>Walkthroughs on daily comparisons with SPL.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/search-command-overview" target="_blank">Search Command Overview</a><br>Details all core SPL operators including append and eval.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Search Tutorial</a><br>Interactive learning for time-series query building.</li></ul>
description = <p>Summarizes <b>Comparing One Set of Results Over Previous Week Example</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" earliest=-1d@d latest=@d</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" earliest=-1d@d latest=@d \
| eval Series="Yesterday" \
| eval _time = _time + 86400 \
| append [ search tag=failure earliest=@d latest=now \
| eval Series = "Today" ] \
| timechart fixedrange=f span=30m count by Series

