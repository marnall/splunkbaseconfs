execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4717</code><br>       - Targets Windows Security logs where changes in services are logged.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts the timestamp to a simplified date format for readability.<br><b>03</b> <code>| stats count by src_user, user, Access_Right, Date, Keywords</code><br>       - Aggregates and counts events by key fields to aid analysis.<br><b>04</b> <code>| rename src_user as "Source Account"</code><br>       - Renames fields for clarity.<br><b>05</b> <code>| rename user as "Target Account"</code><br>       - Renames fields for clarity.<br><b>06</b> <code>| rename Access_Right as "New Rights Granted"</code><br>       - Clarifies the renamed access fields.<br>
explanation = <p>This search allows for the real-time monitoring of changes to system services, which can be a critical aspect of maintaining security integrity. By focusing on <b>EventCode 4717</b>, the search pinpoints key activities tied to administrative changes. Using the <code>eval</code> function for timestamp formatting ensures clarity in reporting, while <code>stats</code> aggregates data to highlight patterns and anomalies. Renaming fields like 'src_user' and 'Access_Right' increases usability for analysts. The visibility provided by this data enables detection of potential vulnerabilities, malicious activities, or policy violations and aids in comprehensive forensic investigations.</p>
quid = E6F455D262F535D1963580C7804BC763
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/security-access-granted-to-an-account" target="_blank">https://gosplunk.com/security-access-granted-to-an-account</a></p>
description = <p>Summarizes <b>Security Event Log: User Access Rights Changes by Date</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4717</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4717\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| stats count by src_user, user, Access_Right, Date, Keywords\
	| rename src_user as "Source Account"\
	| rename user as "Target Account"\
	| rename Access_Right as "New Rights Granted"

[see_who_is_using_splunk_by_user_app_and_view]
search_name = User Web Access Statistics with Latest View Time
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Apps,Authentication
solution = <p>This query offers valuable <b>operational insights</b> into Splunk usage by identifying trends in user engagement, application activity, and popular views. This can help optimize resources, improve user experience, and determine training or support needs.</p> \
	<p><b>Suggested Actions</b><br><b>1.</b> Identify the most active users and investigate behavior patterns to replicate successful engagement.<br><b>2.</b> Assess application and view performance for potential optimization opportunities.<br><b>3.</b> Use insights to plan infrastructure scaling and capacity management.<br><b>4.</b> Communicate findings to stakeholders to highlight areas of strong adoption.<br><b>5.</b> Incorporate feedback from high-usage users to refine Splunk's configuration and dashboards.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunk_web_access method=GET status=200 user!=-</code><br>       - Search Splunk's internal index for successful GET requests where the user is not '-'.<br> \
	<b>02</b> <code>| stats count latest(_time) as ViewTime by user app view</code><br>       - Group results by user, app, and view, while calculating request counts and the latest view time.<br> \
	<b>03</b> <code>| sort -count</code><br>       - Sort results in descending order by count.<br> \
	<b>04</b> <code>| eventstats sum(count) as countByApp list(view) as view list(count) as count list(ViewTime) as ViewTime by user app</code><br>       - Summarize statistics for countByApp, views, and view times, organized by user and app.<br> \
	<b>05</b> <code>| convert timeformat="%a %m/%d/%Y %I:%M:%S %p" ctime(ViewTime)</code><br>       - Format the ViewTime as a human-readable timestamp.<br> \
	<b>06</b> <code>| dedup app</code><br>       - Remove duplicate entries for each app.<br> \
	<b>07</b> <code>| appendpipe [stats sum(count) as count by user | eval view = "Total Views"]</code><br>       - Append total view counts for each user.<br> \
	<b>08</b> <code>| sort + user -countByApp</code><br>       - Final sort to organize results by user and descending activity per app.<br>
explanation = <p>This search monitors and analyzes Splunk web access logs to provide insights into user activity. By leveraging the internal Splunk index and focusing on HTTP GET requests marked as successful (status=200), the search offers a comprehensive view of user interactions.</p> \
	<p>The commands used include:</p> \
	<p><b>1.</b> <code>stats count latest(_time) as ViewTime by user app view</code>: Captures a count of views and the latest interaction time for each user, app, and view.<br> \
	<b>2.</b> <code>eventstats</code>: Aggregates activity stats across applications and consolidates this data for richer insight.<br> \
	<b>3.</b> <code>convert timeformat=...</code>: Converts timestamps for better readability.<br> \
	<b>4.</b> <code>dedup app</code>: Eliminates per-application duplicate entries.<br> \
	<b>5.</b> <code>appendpipe</code>: Adds a summary row showing the total view count per user.<br> \
	<p>This search helps administrators and business owners understand <b>user engagement</b>, pinpoint high-interaction areas, and monitor application usage trends.</p>
quid = A3693A37F884B6AB812DEB48FBFC9082
search_author = GoSplunk: tnesavich
description = <p>Summarizes <b>User Web Access Statistics with Latest View Time</b> using <code>index=_internal sourcetype="splunk_web_access" method="GET" status="200" user!=-</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index=_internal sourcetype="splunk_web_access" method="GET" status="200" user!=-\
	| stats count latest(_time) as ViewTime by user app view\
	| sort -count\
	| eventstats sum(count) as countByApp list(view) as view list(count) as count list(ViewTime) as ViewTime by user app\
	| convert timeformat="%a %m/%d/%Y %I:%M:%S %p" ctime(ViewTime)\
	| dedup app\
	| appendpipe [stats sum(count) as count by user\
	| eval view = "Total Views"]\
	| sort + user -countByApp

