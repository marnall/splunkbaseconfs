[active_os_vuln_count_windows_qualys]
search_name = Count of Patchable Windows OS Vulnerabilities by Severity
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Threat Detection
tags = Access,GoSplunk
solution = <p>This search provides vital insights into the number of critical and high-severity vulnerabilities affecting Windows operating systems, emphasizing those that can be patched. By focusing on patchable vulnerabilities, security teams can efficiently allocate resources and time to reduce potential breach risks associated with unpatched systems. The summary also identifies trends in vulnerability occurrences, supporting strategic planning and response efforts.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the list of vulnerabilities with a focus on high and critical severity for immediate action.<br><b>2.</b> Cross-check vulnerabilities with existing patch management systems to ensure no duplications.<br><b>3.</b> Plan patch deployment during off-peak hours to minimize disruptions.<br><b>4.</b> Validate patches in a test environment before rolling out into production systems.<br><b>5.</b> Monitor post-patch system performance and security metrics to confirm remediation effectiveness.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>search index="<<index>>" HOSTVULN SEVERITY=3 OR 4 OR 5 TYPE="CONFIRMED"</code><br>       - Identifies confirmed vulnerabilities with critical severity levels.<br><b>02</b> <code>| dedup HOST_ID, QID</code><br>       - Removes duplicate entries to ensure each vulnerability is counted once.<br><b>03</b> <code>| search STATUS!="FIXED"</code><br>       - Filters out vulnerabilities that have already been addressed.<br><b>04</b> <code>| join QID [ search index="<<index>>" QID_INFO PATCHABLE=1]</code><br>       - Joins additional data on vulnerabilities that can be patched.<br><b>05</b> <code>| join HOST_ID [ search index="<<index>>" HOSTSUMMARY: OS="Windows*" NOT "Windows Server*"</code><br>       - Focuses the search on specific Windows OS versions excluding servers.<br><b>06</b> <code>| where cidrmatch("10.128.0.0/9", IP)</code><br>       - Filters host IPs belonging to a particular network range.<br><b>07</b> <code>| stats count(QID) as #_Vulns by OS</code><br>       - Produces a count of vulnerabilities split by operating system.<br><b>08</b> <code>| sort -#_Vulns</code><br>       - Orders the results to highlight the most affected systems.<br><b>09</b> <code>| addcoltotals #_Vulns</code><br>       - Adds a total count for all vulnerabilities.</p>
explanation = <p>This search is essential as it allows system administrators and security teams to gain a clear view of current vulnerabilities in Windows environments, enabling them to address them proactively. By categorizing and quantifying vulnerabilities, the search helps prioritize actions based on severity, ensuring that the most critical issues are addressed first. This diligence supports maintaining system integrity and aligning with security compliance standards. The use of commands such as <code>dedup</code> and <code>join</code> ensures unique vulnerability tracking, while <code>stats</code> offers a summarized view of risks.</p>
quid = E7FE509EC729440CB7100EFB7664AB57
search_author = GoSplunk: CattyWampus
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/qualys-active-os-vuln-count" target="_blank">https://gosplunk.com/qualys-active-os-vuln-count</a></p>
description = <p>Summarizes <b>Count of Patchable Windows OS Vulnerabilities by Severity</b> using <code>index="<<index>>" HOSTVULN SEVERITY=3 OR 4 OR 5 TYPE="CONFIRMED"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" HOSTVULN SEVERITY=3 OR 4 OR 5 TYPE="CONFIRMED"\
| dedup HOST_ID, QID\
| search STATUS!="FIXED"\
| join QID [ search index="<<index>>" QID_INFO PATCHABLE=1]\
| join HOST_ID [ search index="<<index>>" HOSTSUMMARY: OS="Windows*" NOT "Windows Server*"\
| where cidrmatch("10.128.0.0/9", IP) ]\
| stats count(QID) as #_Vulns by OS\
| sort -#_Vulns\
| addcoltotals #_Vulns

