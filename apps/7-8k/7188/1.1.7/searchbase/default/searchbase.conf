[adhoc_search_details_current_time]
search_name = Adhoc Search Details Current Time
version = 2.x
date_created = 2025-11-14
category = Splunk
sub_category = _internal
tags = Adhoc,Search,UI
solution = <p>This search allows Splunk admins to evaluate how users perform UI ad hoc searches across different apps. Understanding this behavior supports license planning and user education initiatives.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify heavy ad hoc users for training on efficient search practices.<br><b>2.</b> Monitor app-based search trends to detect under- or over-used apps.<br><b>3.</b> Visualize trends to forecast search load spikes.<br><b>4.</b> Audit users with excessive search volumes.<br><b>5.</b> Establish controls or guidance for resource-intensive search patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>(index=_introspection TERM(provenance)) "data.search_props.provenance"="UI:Search"</code><br>       - Isolate UI-originated ad hoc searches using introspection logs.<br><b>02</b> <code>| rename data.search_props.app as app, data.search_props.user as user</code><br>       - Extract and simplify nested field names.<br><b>03</b> <code>| stats count as adhoc_searches by app user</code><br>       - Aggregate search volumes per app and user.<br><b>04</b> <code>| eval _time=now()</code><br>       - Add a timestamp for correlation and dashboarding.<br>
explanation = <p>This search leverages the <code>_introspection</code> index and targets the field <code>data.search_props.provenance</code> with value <code>"UI:Search"</code> to isolate UI-initiated ad hoc searches. It then extracts the <code>app</code> and <code>user</code> via <code>rename</code> from nested fields and uses <code>stats</code> to count total ad hoc queries grouped by user and app. <code>eval _time=now()</code> provides a timestamp for real-time visualizations.</p><p>This is highly useful for <b>capacity planning</b>, <b>UX diagnostics</b>, and <b>license usage profiling</b>. Junior engineers can learn nested field referencing, data shaping using <code>stats</code>, and streamlining raw introspection data into insights. This query illustrates how metadata can be used to understand actual search workload dynamics.</p>
quid = 036B080F8B9ACC94010F8AD7A4963D1D
search_author = vskoryk
description = <p>This search tracks <b>ad hoc UI searches</b> initiated by users across different apps using introspection logs. It helps identify <b>search behavior patterns</b> and <b>ad hoc activity trends</b>, essential for performance management and user training.</p>
