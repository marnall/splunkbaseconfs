[group_source_ips_by_risk_score_and_event_count]
search_name = Group Source IPs by Risk Score and Event Count
version = 1.0.4
date_created = 2025-05-05 12:20:29
date_updated = 2025-7-2 15:0:7
category = Threat Hunter's Cookbook
sub_category = Clustering
tags = Categorical Grouping,Risk Score
solution = <p>This query produces a detailed segmentation of source IP addresses by risk and event behavior patterns. Using statistical measures and clustering, it clearly defines groups that stand out as either normal or anomalous.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate clusters with unusually high average risk scores to identify potential threats.<br><b>2.</b> Look into the standard deviation values to understand deviations in risk behavior.<br><b>3.</b> Monitor clusters with high event counts as they might indicate areas of intense activity.<br><b>4.</b> Use these observations to prioritize follow-up security investigations.<br><b>5.</b> Consider integrating cluster IDs into dashboards for continual anomaly tracking.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/firewalls/index.html" target="_blank">Products: Cisco Secure Firewall</a><br>Cisco Secure Firewall.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=risk</code><br>       - Narrow down the data to relevant events from the "risk" index<br><b>02</b> <code>| stats count as event_count, avg(risk_score) as avg_risk_score, stdev(risk_score) as stdev_risk_score by src_ip</code><br>       - Calculate data metrics for source IPs, such as event count, average risk score, and standard deviation<br><b>03</b> <code>| kmeans k=3 event_count avg_risk_score stdev_risk_score</code><br>       - Apply K-Means clustering algorithm to divide the data into three clusters based on the risk metrics<br><b>04</b> <code>| table src_ip, event_count, avg_risk_score, stdev_risk_score, CLUSTERNUM</code><br>       - Display a table containing clustered results with source IPs, risk metrics, and cluster IDs<br><b>05</b> <code>| rename event_count as x, avg_risk_score as y, stdev_risk_score as z, CLUSTERNUM as clusterId</code><br>       - Rename the fields for simpler representation and further processing<br>
explanation = <p>The <b>K-Means</b> algorithm partitions events into three clusters based on event frequency and risk score metrics. The clustering process uses <b>stats</b> to aggregate event counts, average risk scores, and standard deviations for each source IP. These statistical measures are critical for deriving comparative insights across multiple sources.</p><p>The <b>kmeans</b> function automatically segments the data into clusters based on these metrics, using centroids to assign similar sources together. This aids in detecting anomalies or unusual patterns, such as source IPs with high risk scores and event counts that differ significantly from the norm.</p>
quid = FA0348DDC8AE2DFB90CE6852D1C97582
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Group Source IPs by Risk Score and Event Count</b> using <code>index=risk</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=risk \
	| stats count as event_count, avg(risk_score) as avg_risk_score, stdev(risk_score) as stdev_risk_score by src_ip \
	| kmeans k=3 event_count avg_risk_score stdev_risk_score \
	| table src_ip, event_count, avg_risk_score, stdev_risk_score, CLUSTERNUM \
	| rename event_count as x, avg_risk_score as y, stdev_risk_score as z, CLUSTERNUM as clusterId

