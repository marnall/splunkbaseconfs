related_info = <ul><li><a href="https://help.splunk.com/en/splunk-it-service-intelligence/splunk-it-service-intelligence/reduce-time-to-insights/4.18/application-server-module/application-server-module-troubleshooting" target="_blank">Splunk Help: Application Server Module troubleshooting</a><br>Application Server Module troubleshooting.</li><li><a href="https://lantern.splunk.com/Data_Types/Alerts_data" target="_blank">Lantern: Alerts data</a><br>Alerts data.</li><li><a href="https://splunkbase.splunk.com/app/1841" target="_blank">Splunkbase: Splunk IT Service Intelligence</a><br>Splunk IT Service Intelligence.</li></ul>
search = tag=appserver \
tag=performance \
application_server="$application_server$" \
| search response_code = * \
| eval is_error_code=if(response_code>399 AND response_code<599,1,0) \
| stats count as total_count \
sum(is_error_code) as error_code_count \
by _time \
| eval error_pct = round((error_code_count/total_count*100),2) \
| timechart avg(error_pct) as error_pct \
| eventstats avg(error_pct) as average \
| eval _stats = "Average: ".round(average, 1)."%" \
| fields - average \
| search application_server="$application_server$"

