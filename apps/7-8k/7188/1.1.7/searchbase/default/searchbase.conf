solution = <p>Gaining insight into the <b>count of unique hosts</b> involved in Qualys VM detection events helps security teams assess how well the vulnerability scanning is covering their asset landscape.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the tally of unique hosts to ensure scanning covers expected assets.<br><b>2.</b> Compare results against asset inventory for discrepancies.<br><b>3.</b> Investigate potential network segments or assets not included in the scans.<br><b>4.</b> Adjust scanning schedules or techniques if required to improve coverage.<br><b>5.</b> Regularly audit this metric to maintain effective vulnerability management.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>eventtype="qualys_vm_detection_event"</code><br>       - Filters events to those specific to Qualys VM Detection.<br><b>02</b> <code>| fields host</code><br>       - Selects the host field for further analysis.<br><b>03</b> <code>| stats dc(host) as total_host</code><br>       - Counts unique hosts to determine the total scanned.</br>
explanation = <p>The search identifies the <b>number of distinct hosts</b> found in Qualys Virtual Machine (VM) Detection events, offering insights into the breadth of vulnerability assessments performed. Regularly monitoring this metric allows security teams to verify comprehensive coverage in vulnerability scanning activities. Each command in the search plays a role—<code>eventtype="qualys_vm_detection_event"</code> filters for relevant events, <code>fields host</code> extracts necessary information, and <code>stats dc(host)</code> calculates the distinct count, confirming the breadth of scanning activity.</p>
quid = 619983CB98BFA8638D2782E171223BA9
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/qualys-number-hosts-scanned" target="_blank">https://gosplunk.com/qualys-number-hosts-scanned</a></p>
description = <p>This search provides a <b>count</b> of <b>unique hosts</b> detected in Qualys VM Detection events over a specific time range. It is <b>valuable</b> for understanding the scope of assets assessed and ensuring that vulnerability management processes cover all intended areas. </p>
search = eventtype="qualys_vm_detection_event"\
	| fields host\
	| stats dc(host) as total_host

[number_of_hosts_the_root_account_was_detected_on_1]
search_name = Count of Unique Hosts with Root User Access
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,SFU
solution = <p>This search identifies the <b>extent of root account usage</b> across your Linux environment, helping detect potential security concerns.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts with unexpected root account activity.<br><b>2.</b> Verify if root access aligns with authorized maintenance windows.<br><b>3.</b> Implement sudo policies to reduce direct root usage.<br><b>4.</b> Set up alerts for root activity on critical production hosts.<br><b>5.</b> Correlate root access with change management records.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="linux_secure"</code><br>       - Specifies the index to search and filters events to 'linux_secure' sourcetype.<br><b>02</b> <code>| rex ".*:\d{2}\s(?<hostname>\S+)"</code><br>       - Extracts the hostname from event logs dynamically.<br><b>03</b> <code>| rex "\suser[^'](?<User>\S+\w+)"</code><br>       - Extracts the user information, specifically targeting formatted log lines.<br><b>04</b> <code>| search User="root"</code><br>       - Filters to include only logs generated by the 'root' user.<br><b>05</b> <code>| stats dc(hostname)</code><br>       - Counts the number of unique hosts where root activity has been detected.<br>
explanation = <p>This query helps monitor <b>root user activity</b> across different hosts. By identifying where and when the root user has logged in, this search enables detection of any <b>unusual activity</b> or <b>potential security breaches</b>. The inclusion of specific SPL commands, like <code>rex</code> to extract fields dynamically, ensures flexible analysis when capturing host and user data. Additionally, filtering for the 'root' user and counting distinct hostnames using <code>stats</code> allows you to pinpoint <b>security-critical</b> trends effectively.</p>
quid = 004E601B69434CADF65E13DCE77DD4A5
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Count of Unique Hosts with Root User Access</b> using <code>index="<<index>>" sourcetype=linux_secure</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index="<<index>>" sourcetype=linux_secure\
	| rex ".*:\d{2}\s(?<hostname>\S+)"\
	| rex "\suser[^'](?<User>\S+\w+)"\
	| search User="root"\
	| stats dc(hostname)

