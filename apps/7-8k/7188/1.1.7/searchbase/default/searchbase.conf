explanation = <p>This search operates over <b>metrics.log</b> file in the _internal index, specifically using group <code>per_sourcetype_thruput</code>. By summing the Kilobytes (converted into Megabytes) and calculating the average eps, it reveals the scale and performance of data indexing for each source type. Administrators and system operators can use this to identify uneven load distributions or performance bottlenecks. The <code>chart</code> command ensures the results are aggregated and presented in an organized format, highlighting key metrics per source type.</p>
quid = 9BB793F8452B8DFF9F4584E7C9BC97E2
search_author = GoSplunk: Suren
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/check-splunk-finished-indexing-log-file" target="_blank">https://gosplunk.com/check-splunk-finished-indexing-log-file</a></p>
description = <p>Summarizes <b>Metrics Log Throughput Analysis by Source Type</b> using <code>index=_internal source="*metrics.log" group="per_sourcetype_thruput"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
