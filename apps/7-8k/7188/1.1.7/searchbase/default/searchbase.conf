[rangemap_command_with_single_value_string]
search_name = Internal Splunk Source Type Severity Analysis
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This query provides a streamlined mechanism to monitor the severity and prioritization of Splunk's internal logs.</p> \
<p>Using the <b>rangemap</b> function along with sourcetype indexing ensures structured and consistent logging categorization.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Focus on investigating 'severe' events categorized by the search output.<br> \
<b>2.</b> Adjust severity thresholds in the rangemap function if business needs or priorities change.<br> \
<b>3.</b> Create alerts based on severe conditions to notify the operations team of any abnormalities.<br> \
<b>4.</b> Optimize log ingestion to ensure all 'splunkd_access' entries are being captured efficiently.<br> \
<b>5.</b> Consider enhancing the query to include additional sourcetypes or metrics for a broader analysis of the system health.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd OR sourcetype=splunkd_access</code><br>       - Searches the '_internal' index for logs with specific sourcetypes ('splunkd' or 'splunkd_access').<br> \
	<b>02</b> <code>| stats latest(sourcetype) as sourcetype</code><br>       - Retrieves the most recent log for each sourcetype and renames it as 'sourcetype'.<br> \
	<b>03</b> <code>| eval sourcetypeidx=case (sourcetype="splunkd",2,sourcetype="splunkd_access",1)</code><br>       - Assigns numerical values to each sourcetype for severity classification ('splunkd' is assigned 2, and 'splunkd_access' is assigned 1).<br> \
	<b>04</b> <code>| rangemap field=sourcetypeidx severe=0-1 low=2-4 default=low</code><br>       - Categorizes numerical values into severity levels like 'severe' or 'low' for risk analysis.<br>
explanation = <p>This query can be used to monitor the latest activities in the Splunk system itself. By assigning numerical values to each sourcetype and categorizing them into severity levels, it allows for easier identification and prioritization of potential issues. For example, 'splunkd' logs are assigned a higher value (2) and categorized as 'low' severity, while 'splunkd_access' logs are assigned a lower value (1) and categorized as 'severe'.</p> \
	<p>The <b>stats</b> command aggregates the latest events for each sourcetype. The <b>eval</b> statement assigns custom numerical values for categorization, and the <b>rangemap</b> command creates severity groupings based on these numerical values. This search is essential for monitoring critical Splunk log types and understanding their severity context.</p>
quid = C78E23C62705C2165E399BA80EB2A1A1
search_author = GoSplunk: Suren
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/rangemap-command-single-value-string" target="_blank">https://gosplunk.com/rangemap-command-single-value-string</a></p>
description = <p>Summarizes <b>Internal Splunk Source Type Severity Analysis</b> using <code>index=_internal sourcetype=splunkd OR sourcetype=splunkd_access</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal sourcetype=splunkd OR sourcetype=splunkd_access\
	| stats latest(sourcetype) as sourcetype\
	| eval sourcetypeidx=case (sourcetype="splunkd",2,sourcetype="splunkd_access",1)\
	| rangemap field=sourcetypeidx severe=0-1 low=2-4 default=low

[rare_punctuation_by_host]
search_name = Error and Failure Keyword Analysis with Punctuation and Count
version = 1.0.2
date_updated = 2023-12-18 14:28:9
search_hidden = 0
sub_category = Custom
tags = Access,SFU
solution = <p>This query provides insights into patterns of punctuation associated with <b>error-prone</b> or <b>critical events</b>. Understanding recurring punctuation patterns can inform <b>troubleshooting</b> efforts and highlight systemic or coding issues contributing to failures.</p> \
	<p><b>Suggested Actions</b><br><b>1.</b> Investigate events with a high frequency of specific 'smallpunct' values to uncover recurring error patterns.<br><b>2.</b> Use the example raw events as a starting point for deeper forensic investigation.<br><b>3.</b> Review error-handling logic or code sections tied to the observed patterns.<br><b>4.</b> Enhance monitoring policies to address detected anomalies proactively.<br><b>5.</b> Consider sharing findings with cross-functional teams to further mitigate risks.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" err* OR fail* OR crit* OR fatal* OR except*</code><br>       - Retrieve events from the specified index and sourcetype that include critical error-related keywords.<br><b>02</b> <code>| rex field=punct "(?<smallpunct>.{5})"</code><br>       - Extract the first five characters from the 'punct' field into a new field named 'smallpunct'.<br><b>03</b> <code>| eval smallpunct= "*" + smallpunct</code><br>       - Modify the 'smallpunct' field by prepending an asterisk to its value.<br><b>04</b> <code>| stats first(_raw) as example count by smallpunct</code><br>       - Calculate the count for each unique 'smallpunct' value while providing an example raw event.<br><b>05</b> <code>| sort -count</code><br>       - Rank the results in descending order by count to highlight the most frequent occurrences.<br><b>06</b> <code>| fields smallpunct,count,example</code><br>       - Display only the selected fields for succinct and relevant output.<br>
explanation = <p>This query identifies and analyzes <b>patterns</b> in error-related events using multiple SPL commands effectively. It begins by searching for events in a specified <b>index</b> and <b>sourcetype</b> that contain commonly used error keywords (e.g., error, failure). The extracted 'smallpunct' values help isolate critical punctuation patterns, which can be instrumental in <b>identifying recurring issues</b> or anomalies.</p> \
	<p>The use of <code>rex</code> allows for the dynamic extraction of fields based on patterns (e.g., capturing the first five characters of the 'punct' field). The <code>eval</code> function augments the extracted values by prepending an asterisk, providing an enhanced visual cue. Grouping and counting combinations are achieved with <code>stats count</code>, which summarizes key metrics for easier interpretation. The query concludes by sorting and field-filtering, ensuring the output remains <b>actionable</b> and focused.</p>
quid = A08481282B48F334D5A7601D08CD4187
search_author = Dmitri McKay
updated_author = khutchinson
description = <p>Summarizes <b>Error and Failure Keyword Analysis with Punctuation and Count</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" err* OR fail* OR crit* OR fatal* OR except*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>" err* OR fail* OR crit* OR fatal* OR except*\
	| rex field=punct "(?<smallpunct>.{5})"\
	| eval smallpunct= "*" + smallpunct\
	| stats first(_raw) as example count by smallpunct\
	| sort -count\
	| fields smallpunct,count,example

[raw_data_size_disk_compression_ratio]
search_name = Index Storage and Compression Analysis
search_hidden = 0
category = Splunk
sub_category = Indexing
tags = ITOps
solution = <p>By running this search, you can gauge the <b>efficiency</b> of data compression and storage in your Splunk deployment. A high compression ratio indicates effective storage use, while a low ratio may indicate potential areas for improvement. This helps to ensure storage optimization and cost efficiency.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor trends in compression ratio over time to identify changes in storage efficiency.<br><b>2.</b> Investigate indexes with unusually high or low compression ratios.<br><b>3.</b> Evaluate storage policies and configurations if compression efficiency is below expectations.<br><b>4.</b> Analyze which types of data consume the most storage resources.<br><b>5.</b> Review indexing configurations and consider rebalancing data distribution for optimal storage utilization.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| eventcount summarize=false index="<<index>>"</code><br>       - Counts events in all indexes without summarizing results.<br><b>02</b> <code>| dedup index</code><br>       - Removes duplicate index entries.<br><b>03</b> <code>| fields index</code><br>       - Selects the index field for further processing.<br><b>04</b> <code>| map maxsearches=100 
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
explanation = <p>This search is designed for analyzing the <b>data storage efficiency</b> in your Splunk environment. By calculating the raw data size, on-disk size, and compression ratio, it provides a clear view of how efficiently your data is stored. For example, lower-than-expected compression ratios may indicate data ingest anomalies or opportunities to review storage policies.</p><p>The search uses <code>eventcount</code> to count events across all indexes, ensuring that no summarized results are included. It leverages the <code>dbinspect</code> command with <code>map</code> to investigate each index individually. The <code>stats</code> function aggregates raw sizes, on-disk sizes, and event counts across all indexes, creating a single-pane view of storage use. Multiple <code>eval</code> functions are utilized to calculate percentages, round data, and format results with commas for readability, ensuring that the output is both accurate and user-friendly.</p>
quid = 4F7FC8FA655C74726AFE3BC264CB0BC9
search_author = Splunk Portfolio Field Solutions
description = <p>Summarizes <b>Index Storage and Compression Analysis</b> using <code>| eventcount summarize=false index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | eventcount summarize=false index="<<index>>"\
	| dedup index\
	| fields index\
	| map maxsearches=100 search="| dbinspect index="<<index>> \
	| fields rawSize, sizeOnDiskMB, eventCount\
	| table rawSize, sizeOnDiskMB, eventCount"\
	| stats sum(rawSize) AS rawTotal, sum(sizeOnDiskMB) AS diskTotalinMB, sum(eventCount) AS Total_Events\
	| eval rawTotalinMB=(rawTotal / 1024 / 1024)\
	| eval compression=(diskTotalinMB / rawTotalinMB * 100)\
	| eval Compression_Ratio=tostring(round((100 - compression),2)) + "%"\
	| eval Raw_Total_MB=tostring(round(rawTotalinMB,2),"commas")\
	| eval OnDisk_Total_MB=tostring(round(diskTotalinMB,4),"commas")\
	| eval Total_Events=tostring(Total_Events,"commas")\
	| table Total_Events, Raw_Total_MB, OnDisk_Total_MB, Compression_Ratio

