execution_plan = <b>01</b> <code>index=_introspection sourcetype=splunk_resource_usage component=PerProcess</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve introspection data specific to per-process resource usage.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Simplify field names for processing.<br><b>03</b> <code>| eval label = ... | eval provenance = ... | eval search_head = ...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Add descriptive fields for process provenance, classification, and workload pool.<br><b>04</b> <code>| eval process_class = case(...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Categorize processes based on their type and usage.<br><b>05</b> <code>| bin _time span=10s</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Group events into time intervals.<br><b>06</b> <code>| stats latest(...) by pid, _time, host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Compute the latest resource metrics grouped by process ID, time, and host.<br>
explanation = <p>This search investigates Splunk's <b>introspection data</b>, focusing on the 'PerProcess' component of the resource usage sourcetype within the _introspection index. It classifies processes into functional categories—like 'splunkd server,' 'KVStore,' 'Splunk Web,' etc.—based on predefined logic involving process names and associated attributes.</p><p>The classification enables granular insights, distinguishing between core Splunk components and specific search types (e.g., ad-hoc, scheduled, or data model acceleration). By tracking resource consumption at a per-process level over time, this search provides critical data for troubleshooting, capacity planning, and system optimization.</p><p>For Splunk administrators, this structured resource-awareness aids in defining performance bottlenecks, optimizing searches, troubleshooting indexing issues, and managing costs.</p>
quid = 3E7F9D2B8A4C5E1F6D9B4A7E3F8C2D5A
search_author = Splunk Works
description = <p>Summarizes <b>Process Metrics</b> using <code>index=_introspection sourcetype=splunk_resource_usage component=PerProcess | rename data.* as * | rename search_props.* </code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_introspection sourcetype=splunk_resource_usage component=PerProcess | rename data.* as * | rename search_props.* as * | eval label = if(isnotnull('label'), 'label', "") | eval provenance = if(isnotnull('provenance'), 'provenance', "unknown") | eval search_head = case(isnotnull('search_head') AND 'role' == "peer", 'search_head', isnull('search_head') AND 'role' == "head", "_self", isnull('search_head') AND 'role' == "peer", "_unknown") | eval workload_pool = if(isnotnull('workload_pool'), 'workload_pool', "UNDEFINED") | eval process_class = case( process=="splunk-optimize","index service", process=="sh" OR process=="ksh" OR process=="bash" OR like(process,"python%") OR process=="powershell","scripted input", process=="mongod", "KVStore") | eval process_class = case( process=="splunkd" AND (like(args,"-p %start%") OR like(args,"service") OR like(args,"%_internal_launch_under_systemd%")),"splunkd server", process=="splunkd" AND isnotnull(sid) AND type=="datamodel acceleration","datamodel acceleration", process=="splunkd" AND isnotnull(sid) AND type=="scheduled","scheduler searches", process=="splunkd" AND isnotnull(sid) AND type=="ad-hoc","ad-hoc searches", process=="splunkd" AND isnotnull(sid) AND type=="summary index","summary index", process=="splunkd" AND (like(args,"fsck%") OR like(args,"recover-metadata%") OR like(args,"cluster_thing")),"index service", process=="splunkd" AND args=="instrument-resource-usage", "scripted input", (like(process,"python%") AND like(args,"%/appserver/mrsparkle/root.py%")) OR like(process,"splunkweb"),"Splunk Web", isnotnull(process_class), process_class) | eval process_class = if(isnull(process_class),"other",process_class) | bin _time span=10s | stats latest(normalized_pct_cpu) AS pct_cpu latest(mem_used) AS mem_used latest(process_class) AS process_class by pid, _time, host

[pi_rm_realtime_searches_by_user]
