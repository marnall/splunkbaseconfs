description = <p>Summarizes <b>Identify Fields and Sample Values for Scoping Hunts</b> using <code>index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" \
	| fieldsummary maxvals=2

[identifying_high_volume_activity_by_finding_the_most_common_source_address]
search_name = Identifying High-Volume Activity By Finding The Most Common Source Address
