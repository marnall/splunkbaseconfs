execution_plan = <b>01</b> <code>eventtype="qualys_vm_detection_event"</code><br>       - Filters the data to include only Qualys VM detection events.<br><b>02</b> <code>dedup QID</code><br>       - Ensures each Qualys ID (QID) is counted only once by removing duplicate entries.<br><b>03</b> <code>stats count by SEVERITY</code><br>       - Counts the unique QIDs and organizes them by their severity levels.<br><br>
explanation = <p>The search uses the `eventtype="qualys_vm_detection_event"` to focus on VM detection events within Qualys data. It applies the `dedup` command to ensure only unique QIDs are considered, preventing duplicate events from skewing the count. The `stats count by SEVERITY` command then organizes these unique detections by their severity levels, providing a clear breakdown of the count per severity category. This information is vital for **security teams to focus their actions on critical and high-severity vulnerabilities**, improving efficiency in fixing vulnerabilities with significant risk.</p>
quid = 77696CBE1A672EC13E662B8D7C16EA14
