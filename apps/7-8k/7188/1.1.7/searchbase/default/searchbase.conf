[24_hours_over_30_days]
search_name = 24 Hour Error Count Comparison with Previous 90 Days
version = 1.0.2
date_updated = 2024-1-12 13:29:26
search_hidden = 0
sub_category = Custom
tags = Access,SFU
solution = <p>This query offers insights into error trends within the last 24 hours compared to historical benchmarks, enabling rapid anomaly detection.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate anomalies or surges in errors during specific hours.<br><b>2.</b> Cross-reference identified peaks with known system events or releases.<br><b>3.</b> Review historical p90 trends to understand baseline behavior.<br><b>4.</b> Apply insights to optimize alert thresholds and monitoring configurations.<br><b>5.</b> Use findings for incident retrospectives to improve system resilience.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_force = 0
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" error</code><br>       - Search for error events in the given index and sourcetype.<br><b>02</b> <code>| timechart span=1h count</code><br>       - Create a timechart with hourly intervals, counting error occurrences.<br><b>03</b> <code>| eval StartTime=relative_time(now(),"-24h@h")</code><br>       - Define the start time as 24 hours ago.<br><b>04</b> <code>| eval Series=if(_time>=StartTime,"TodaysCount","p90")</code><br>       - Categorize counts into current (TodaysCount) and historical (p90) series.<br><b>05</b> <code>| eval Hour = strftime(_time,"%H")</code><br>       - Extract the hour of the day from the timestamp.<br><b>06</b> <code>| chart p90(count) by Hour Series</code><br>       - Generate a percentile-based summary chart with hour-wise breakdown.<br><b>07</b> <code>| eval _time = _time + 86400</code><br>       - Shift timestamps forward by one day for easier comparisons.<br>
explanation = <p>This query is valuable for monitoring and analyzing error trends in systems. By focusing on error events over the past 24 hours and comparing them with historical 90th percentile benchmarks, anomalies or surges in error rates can be quickly detected. Key SPL functions include:</p><ul><li><b>timechart:</b> Aggregates data into an hourly time series, enabling a granular view of error counts.</li><li><b>eval:</b> Used to define dynamic time ranges and separate data into 'TodaysCount' and 'p90' series. Additionally, it adjusts timestamps for cross-day analysis.</li><li><b>chart:</b> Produces a visualization segmented by hour and series, highlighting deviations in error trends over time.</li></ul><p>This method aids administrators or engineers in swiftly identifying critical periods of operational instability and prioritizing decisions to address root causes.</p>
quid = CB8A08E077731B7409D1DB6BC8A69759
search_author = grdhg24
updated_author = khutchinson
related_info = <p><a href="https://lantern.splunk.com/" target="_blank">https://lantern.splunk.com/</a></p>
description = <p>Summarizes <b>24 Hour Error Count Comparison with Previous 90 Days</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" error</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" error\
| timechart span=1h count\
| eval StartTime=relative_time(now(),"-24h@h")\
| eval Series=if(_time>=StartTime,"TodaysCount","p90")\
| eval Hour = strftime(_time,"%H")\
| chart p90(count) by Hour Series\
| eval _time = _time + 86400

[account_delete_in_24hr]
search_name = Windows Security Log: Account Creation and Deletion Analysis
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,SFU
solution = <p>The query provides insights into user account activity over the past 24 hours, helping administrators quickly identify accounts that may have been suspiciously short-lived or potentially unauthorized. By monitoring these events, the organization can proactively secure its environment.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate accounts flagged as <b>Critical</b> to confirm legitimacy.<br><b>2.</b> Develop or update policies to address quick account deletions.<br><b>3.</b> Use results to enhance <b>access audits</b> and <b>security reporting</b>.<br><b>4.</b> Assess the need for additional monitoring of specific accounts.<br><b>5.</b> Report findings to relevant departments for further action.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_force = 0
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>search source="*WinEventLog:Security" (EventCode=4726 OR EventCode=4720)</code><br>       - Retrieves security logs related to account deletions and creations.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts the timestamp into a human-readable date format.<br><b>03</b> <code>| rex "Subject:\s+\w+\s\S+\s+\S+\s+\w+\s\w+:\s+(?<SourceAccount>\S+)"</code><br>       - Extracts the source account making changes using a regular expression.<br><b>04</b> <code>| eval SuspectAccount=coalesce(DeletedAccount,NewAccount)</code><br>       - Identifies suspect accounts by merging newly created and deleted accounts.<br><b>05</b> <code>| transaction SuspectAccount startswith="EventCode=4720" endswith="EventCode=4726"</code><br>       - Groups events to track the lifecycle of the suspect accounts.<br><b>06</b> <code>| eval duration=round(((duration/60)/60)/24, 2)</code><br>       - Calculates how long the account was active.<br><b>07</b> <code>| table Date, index, host, SourceAccount, SuspectAccount, duration, Age</code><br>       - Organizes the results into a readable table.</br>
explanation = <p>This search leverages key Windows Security Log events, specifically <b>EventCode=4720</b> for account creation and <b>EventCode=4726</b> for account deletion. It processes the logs to track each account's creation and subsequent deletion, providing a detailed timeline of account activities. By calculating the duration that an account was active, the search surfaces potentially suspicious activities that could indicate security incidents. The duration is classified into <b>Critical</b>, <b>Warning</b>, and <b>Normal</b> age categories to help prioritize investigation efforts. The use of <code>transaction</code> commands allows it to efficiently group related events, ensuring accurate tracking of account lifecycle.</p>
quid = 7E7C36133FA7C7BBF5A95DFE29F7F6E4
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Windows Security Log: Account Creation and Deletion Analysis</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4726 OR EventCode=4720)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4726 OR EventCode=4720)\
| eval Date=strftime(_time, "%Y/%m/%d")\
| rex "Subject:\s+\w+\s\S+\s+\S+\s+\w+\s\w+:\s+(?<SourceAccount>\S+)"\
| rex "Target\s\w+:\s+\w+\s\w+:\s+\S+\s+\w+\s\w+:\s+(?<DeletedAccount>\S+)"\
| rex "New\s\w+:\s+\w+\s\w+:\s+\S+\s+\w+\s\w+:\s+(?<NewAccount>\S+)"\
| eval SuspectAccount=coalesce(DeletedAccount,NewAccount)\
| transaction SuspectAccount startswith="EventCode=4720" endswith="EventCode=4726"\
| eval duration=round(((duration/60)/60)/24, 2)\
| eval Age=case (duration<=1, "Critical", duration>1 AND duration<=7, "Warning", duration>7, "Normal")\
| table Date, index, host, SourceAccount, SuspectAccount, duration, Age\
| rename duration as "Days Account was Active"\
| sort + "Days Account was Active"

