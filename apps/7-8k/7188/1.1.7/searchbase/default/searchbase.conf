solution = <p>This search provides insights into system audit policy changes, helping administrators detect and investigate potential security concerns, such as unauthorized account modifications or right removals.</p> <p><b>Suggested Actions</b><br> <b>1.</b> Review the list of accounts with removed rights and verify their legitimacy.<br> <b>2.</b> Investigate any accounts or changes that seem unusual or unauthorized to prevent potential security issues.<br> <b>3.</b> Correlate results with user activity logs to detect possible patterns of malicious actions.<br> <b>4.</b> Apply advanced filtering to isolate events from critical or high-privilege accounts.<br> <b>5.</b> Implement additional security controls or monitoring for seemingly targeted hosts or accounts.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/" target="_blank">Splunk Help: Splunk Help Documentation</a><br>Splunk Help Documentation.</li><li><a href="https://lantern.splunk.com/" target="_blank">Lantern: Splunk Lantern</a><br>Splunk Lantern.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li></ul>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4718)</code><br> - Search Windows Security Event logs for EventCode 4718, which signifies a change in the system audit policy. Replace <<index>> with your actual index name.<br> <b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br> - Create a new field "Date" to represent the event timestamp in a 'YYYY/MM/DD' format for grouping purposes.<br> <b>03</b> <code>| rex "Access\sRemoved:\s+Access\sRight:\s+(?<RightRemoved>\w+)"</code><br> - Extract the specific access right removed and store it in the 'RightRemoved' field using the regex.<br> <b>04</b> <code>| rex "Account\sModified:\s+\w+\s\s+\s+.*(?<AccountModified>.*)"</code><br> - Capture the modified account details from event logs and store them in the 'AccountModified' field via regex.<br> <b>05</b> <code>| stats count by Date, AccountModified, RightRemoved, host</code><br> - Summarize data by grouping each unique combination of date, account, right removed, and host, and count the occurrences.<br> <b>06</b> <code>| sort - Date</code><br> - Ensure that the results are displayed in descending order by date to prioritize the most recent changes.<br> <b>07</b> <code>| rename RightRemoved as "Rights Removed" | rename AccountModified as "Account Modified"</code><br> - Rename technical field names into more user-friendly names for better readability and reporting.<br>
explanation = <p>This search is designed to monitor changes in system audit policies by leveraging Windows Security Event logs with EventCode 4718, which is triggered when a system audit policy change occurs. By analyzing these events, the query uncovers which accounts had rights removed, offering insights into potential unauthorized or suspicious activities.</p> <p>Each SPL command in the pipeline contributes toward translating raw event log data into actionable insights. For instance, <b>rex</b> commands use regex patterns to extract key details from the event descriptions. The <b>stats</b> command organizes the data by grouping it into meaningful aggregates (e.g., date, account, host) for easier interpretation. By sorting and renaming fields, the search results are processed into a format that is both insightful and directly applicable in a security monitoring context.</p>
quid = C5B8530FB70614A3348FF9D2E5AD6ED9
description = <p>Summarizes <b>Security Event Log: Daily Count of Modified Accounts and Removed Rights</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4718)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4718)\
| eval Date=strftime(_time, "%Y/%m/%d")\
| rex "Access\sRemoved:\s+Access\sRight:\s+(?<RightRemoved>\w+)"\
| rex "Account\sModified:\s+\w+\s\s+\s+.*(?<AccountModified>.*)"\
| stats count by Date, AccountModified, RightRemoved, host\
| sort - Date\
| rename RightRemoved as "Rights Removed"\
| rename AccountModified as "Account Modified"

