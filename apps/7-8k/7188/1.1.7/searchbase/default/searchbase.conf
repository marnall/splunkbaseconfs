description = <p>Identifies <b>anomalous daily transaction counts</b> for each vendor and account in the Financial Services industry. This search highlights <b>outliers</b> that exceed normal transaction volumes, supporting <b>risk monitoring</b> and <b>fraud detection</b> for banking and financial operations.</p>
search = index="*" sourcetype="*"\
	| stats count AS daily_txn_count BY account_number, vendor, _time\
	| eventstats avg(daily_txn_count) AS avg_txn_count, stdev(daily_txn_count) AS stdev_txn_count BY account_number, vendor\
	| where daily_txn_count > (avg_txn_count + 3 * stdev_txn_count)\
	| sort -daily_txn_count\
	| table account_number, vendor, daily_txn_count, avg_txn_count, stdev_txn_count

