solution = <p>This search helps provide transparency into Splunk’s indexed data structure by mapping sourcetypes to their indexes, enhancing visibility and aiding in data validation efforts.</p><p><b>Suggested Actions</b><br><b>1.</b> Use the results to validate data ingestion processes.<br><b>2.</b> Ensure each sourcetype is correctly associated with the intended index.<br><b>3.</b> Identify any unexpected sourcetypes or data in indexes.<br><b>4.</b> Leverage the insights to optimize index and sourcetype management.<br><b>5.</b> Review and refine Splunk configurations based on the data structure findings.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/data/inputs/all</code><br>       - Retrieve all data inputs from the REST endpoint.<br><b>02</b> <code>| search index!=_*</code><br>       - Exclude internal indexes from the results.<br><b>03</b> <code>| stats values(sourcetype) by index</code><br>       - Group the unique sourcetypes by their corresponding indexes.<br>
explanation = <p>This search provides an overview of how Splunk data is organized by associating <b>sourcetypes</b> with their respective <b>indexes</b>. The use of the <code>| rest</code> command fetches all data inputs, enabling users to evaluate all indexed data systematically. Filtering out internal-only indexes ensures the results focus on user-relevant data. Finally, the <code>| stats values(sourcetype) by index</code> operation groups the sourcetypes associated with each index, making it easier to identify which index handles which data types.</p>
quid = 6E663768C7F223BB588EE023B9023301
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/show-all-indexes-and-sourcetypes-via-rest" target="_blank">https://gosplunk.com/show-all-indexes-and-sourcetypes-via-rest</a></p>
description = <p>Summarizes <b>List of Unique Sourcetypes by Index</b> using <code>| rest /services/data/inputs/all</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
