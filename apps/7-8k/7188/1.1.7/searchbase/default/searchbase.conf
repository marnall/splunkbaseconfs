explanation = <p>This search monitors user-initiated realtime searches by tracking their <b>scan rates</b> (events per second) and <b>resource consumption</b> (CPU and memory). Ad-hoc realtime searches are particularly concerning from a resource perspective because they are user-driven and may have overly broad time windows or insufficient filtering. By identifying realtime searches with high scan rates or excessive resource usage, administrators can proactively engage with users about more efficient search techniques, identify use cases where historical searches would be more appropriate, and prevent individual realtime searches from degrading overall search performance. This monitoring helps balance user exploration needs with system performance and stability.</p><p>For junior engineers, this search demonstrates how to use SPL commands such as <b>eval</b> for computed field extraction and <b>stats</b> for aggregating data over sessions. Insights into efficient search behaviors and resource optimization can be drawn.</p>
