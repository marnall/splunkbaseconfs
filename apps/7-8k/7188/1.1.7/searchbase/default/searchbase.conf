dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>| rest splunk_server=local /services/server/info</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Query local server info REST endpoint to retrieve server metadata and roles.<br><b>02</b> <code>| where "search_head" in(server_roles)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Filter to only servers that have the search_head role assigned.<br><b>03</b> <code>| table host | dedup host | sort host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Extract hostname, remove duplicates, and sort alphabetically.<br><b>04</b> <code>| eval host="\""+host+"\""</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Wrap each hostname in double quotes for proper list formatting.<br><b>05</b> <code>| stats values(host) as hosts</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Collect all quoted hostnames into a multivalue field.<br><b>06</b> <code>| eval searchheads=mvjoin(hosts,",")</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Join the multivalue field into a comma-separated string.
explanation = <p>This search dynamically discovers search heads in the Splunk deployment by querying the <b>/services/server/info</b> REST endpoint. It filters servers where <b>search_head</b> is present in the <b>server_roles</b> field, then formats the results as a quoted, comma-separated list suitable for use in other searches.</p><p>The search uses <b>dedup</b> and <b>sort</b> to ensure a clean, unique list of hosts. The <b>eval</b> command wraps each hostname in quotes, and <b>mvjoin</b> combines them into a single comma-separated string stored in the <b>searchheads</b> field.</p><p>This discovery mechanism enables other performance trend searches to dynamically target search head instances without hardcoding hostnames, making the solution portable across different Splunk deployments.</p>
quid = B368A3D6294BD7CD6BB2AF03D4D3C590
search_author = Splunk Works
description = <p>Summarizes <b>Performance Trends Search Head Token</b> using <code>| rest splunk_server=local /services/server/info | where "search_head" in(server_roles) | table host | dedup host | sort</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | rest splunk_server=local /services/server/info | where "search_head" in(server_roles) | table host | dedup host | sort host | eval host="\""+host+"\"" | stats values(host) as hosts | eval searchheads=mvjoin(hosts,",")

[pi_realtime_search_resource_usage]
