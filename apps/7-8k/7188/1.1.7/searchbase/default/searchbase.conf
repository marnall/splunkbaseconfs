tags = Outlier Detection,Rare Events
solution = <p>This query provides critical insights into user accounts with low login activity, potentially exposing unauthorized access attempts. By flagging these rare occurrences, security teams can prioritize which events need immediate review to maintain data integrity and system security.</p><p><b>Suggested Actions</b><br><b>1.</b> Review flagged user accounts for unusual access patterns.<br><b>2.</b> Investigate any unfamiliar login attempts associated with rare user accounts.<br><b>3.</b> Verify the legitimacy of the accounts and their activities.<br><b>4.</b> Implement additional security measures for identified vulnerabilities.<br><b>5.</b> Continuously update baselines to enhance detection capabilities.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Query the specified index for authentication or access events.<br><b>02</b> <code>| rare user</code><br>       - Identify the least common user values to surface rare login activity.<br>
explanation = <p>The Splunk command <b>rare</b> is used to uncover the least common values in a field, effectively highlighting anomalies or rare events in a dataset. This functionality is the inverse of <b>top</b>, allowing for targeted threat hunting by identifying accounts with minimal login activity, which could be indicative of compromised accounts or internal threats. This approach aids in <b>baselining</b> normal behavior patterns while developing searches to test specific hypotheses.</p>
