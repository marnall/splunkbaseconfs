execution_plan = <b>01</b> <code>| rest splunk_server=local /services/server/info</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Queries the local server info REST endpoint to retrieve metadata and server roles.<br><b>02</b> <code>| where "search_head" in(server_roles)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Filters for servers that include the <b>search_head</b> role.<br><b>03</b> <code>| table host | dedup host | sort host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Extracts the hostname, removes duplicates, and sorts the results alphabetically.<br><b>04</b> <code>| eval host="\""+host+"\""</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Wraps each hostname in double quotes for proper list formatting.<br><b>05</b> <code>| stats values(host) as hosts</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Gathers all quoted hostnames into a multivalue field.<br><b>06</b> <code>| eval searchheads=mvjoin(hosts,",")</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Combines the multivalue field into a comma-separated list, ensuring compatibility.</p>
explanation = <p>This search dynamically discovers search heads in the Splunk deployment by querying the <b>/services/server/info</b> REST endpoint. It filters servers where <b>search_head</b> is present in the <b>server_roles</b> field, then formats the results as a quoted, comma-separated list suitable for use in other searches.</p><p>The search uses <b>dedup</b> and <b>sort</b> to ensure a clean, unique list of hosts. The <b>eval</b> command wraps each hostname in quotes, and <b>mvjoin</b> combines them into a single comma-separated string stored in the <b>searchheads</b> field.</p><p>This discovery mechanism enables other search metric queries to dynamically target search head instances without hardcoding hostnames. This approach ensures scalability and portability across Splunk environments, allowing for adaptive operations when the topology changes.</p>
