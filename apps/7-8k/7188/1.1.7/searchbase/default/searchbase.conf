search = index="<<index>>" sourcetype="access*"\
	| timechart distinct_count(clientip) span=1h

[track_30_day_trending_of_re-opened_vulnerabilities_qualys]
search_name = Reopened Host Vulnerabilities in Windows OS (Non-Server) in CIDR 10.128.0.0/9
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Threat Detection
tags = Access,GoSplunk
solution = <p>This search provides visibility into recurring reopened vulnerabilities, enabling security teams to identify trends, root causes, and remediation bottlenecks within targeted environments.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate why vulnerabilities are being reopened—whether patches fail, revert, or compliance checks incorrectly flag systems.<br><b>2.</b> Correlate trends with other system and network activity to detect potential recurring incidents or misconfigurations.<br><b>3.</b> Coordinate patch management and validation efforts for specific vulnerabilities.<br><b>4.</b> Review network segmentation for systems falling within this CIDR for additional hardening, including firewalls or network restrictions.<br><b>5.</b> Regularly monitor vulnerability remediation states and integrate this data into broader risk management dashboards.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -30d@d
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" HOSTVULN earliest=-30d@d STATUS="RE-OPENED"\</code><br>       - Retrieves all reopened vulnerability instances from the HOSTVULN dataset.<br><b>02</b> <code>| dedup HOST_ID, QID sortby +_time\</code><br>       - Removes duplicate vulnerabilities for each host to ensure only the latest entry is retained.<br><b>03</b> <code>| join HOST_ID [ search index="<<index>>" HOSTSUMMARY OS="Windows*" NOT "Windows Server*"\</code><br>       - Matches host details from the HOSTSUMMARY dataset based on OS and CIDR criteria, ensuring focus on non-server Windows set in specific IPv4 range.<br><b>04</b> <code>| where cidrmatch("10.128.0.0/9", IP) ]\</code><br>       - Filters down merged datasets for hosts operating within the CIDR 10.128.0.0/9 network.<br><b>05</b> <code>| timechart span=1d count(QID) by SEVERITY</code><br>       - Generates a time-based chart showing daily trends for vulnerability counts grouped by SEVERITY.</p>
explanation = <p>This query is built to track and monitor the “RE-OPENED” state of vulnerabilities across Windows (non-server) systems identified by Qualys. It works by examining the HOSTVULN dataset for entries reopened in the past 30 days and joins it with host summaries to ensure OS and CIDR match criteria. The results are aggregated daily to help identify persistent vulnerabilities or trends over 30 days per SEVERITY levels. Tracking “re-opened” vulnerabilities is critical to assess the root cause, either due to incomplete patching, misconfigurations, or recurring exposure factors. The use of commands like <code>dedup</code> ensures data uniqueness per HOST_ID and QID combination, while <code>join</code> merges relevant host details based on the same ID. This helps investigate anomalies in specific subnets or organizational boundaries and spot trends leading to actionable security improvements.</p>
quid = 98EF1091029C3AC69549E1CD49F3E3DE
search_author = GoSplunk: CattyWampus
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/track-remediation-progress-os-qualys" target="_blank">https://gosplunk.com/track-remediation-progress-os-qualys</a></p>
description = <p>Summarizes <b>Reopened Host Vulnerabilities in Windows OS (Non-Server) in CIDR 10.128.0.0/9</b> using <code>index="<<index>>" HOSTVULN earliest=-30d@d STATUS="RE-OPENED"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" HOSTVULN earliest=-30d@d STATUS="RE-OPENED"\
	| dedup HOST_ID, QID sortby +_time\
	| join HOST_ID [ search index="<<index>>" HOSTSUMMARY OS="Windows*" NOT "Windows Server*"\
	| where cidrmatch("10.128.0.0/9", IP) ]\
	| timechart span=1d count(QID) by SEVERITY

[track_remediation_progress_by_linux_qualys]
search_name = Top 25 Fixed Linux Vulnerabilities by IP
version = 1.0.1
