[hits_by_host_without_internal_access_for_last_7_days_51]
search_name = Weekly Host Traffic Excluding 192* IP Range
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,SFU
solution = <p>This search offers a clear view of external host activities over the last 7 days, eliminating noise from internal traffic. This helps identify external trends, surges, or anomalies in web server access logs, ensuring the focus remains on relevant traffic data.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the timechart to detect any hosts with significantly higher or lower access counts.<br><b>2.</b> Investigate any unexpected spikes or trends in traffic from specific hosts.<br><b>3.</b> Correlate external IP activity with known operational events or campaigns.<br><b>4.</b> Use the data to optimize server configurations for external traffic.<br><b>5.</b> Filter additional non-relevant traffic patterns as necessary for refined insights.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Specifies the index where the data is being retrieved.<br><b>02</b> <code>sourcetype="access*"</code><br>       - Filters the data to include only access logs.<br><b>03</b> <code>earliest=-7d@d latest=now</code><br>       - Restricts the search to events from the last 7 days.<br><b>04</b> <code>clientip != 192*</code><br>       - Excludes events from internal IP ranges beginning with '192'.<br><b>05</b> <code>| timechart count by host</code><br>       - Generates a visualization of event counts grouped by host.<br>
explanation = <p>This query is designed to give insights into <b>external host activity</b> by excluding IP addresses starting with '192', typically internal addresses in RFC1918 private IP ranges. It starts by filtering the data from a specific index and sourcetype for the last 7 days. The exclusion ensures that only <b>relevant external traffic</b> is captured. Using the <code>| timechart count by host</code> command, the search delivers a visualization of <b>host-based access trends</b>, enabling the identification of anomalies like surges in traffic or specific host behaviors.</p>
quid = 73B33BF751D1A40574DD61BBF5E7A53E
