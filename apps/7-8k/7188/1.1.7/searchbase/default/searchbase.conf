description = <p>Summarizes <b>Realtime Searches by User</b> using <code>index=_internal source=*metrics.log group="search_concurrency" user=* | timechart sum(active_realtime_searches) as concu</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
