execution_plan = <b>01</b> <code>index=_internal</code><br>       - This specifies that the data is being pulled from the _internal index, which contains internal logs and metrics for Splunk itself.<br><b>02</b> <code>sourcetype=scheduler</code><br>       - This narrows down the data to only include events from the scheduler sourcetype, which includes information about scheduled searches.<br><b>03</b> <code>scheduled_time=* saved
explanation = <p>This query helps identify scheduled searches in the internal index that are running multiple times at the same scheduled time. It surfaces potential issues related to the scheduling system in Splunk or misconfigurations of saved searches. The index="_internal" provides a log of internal Splunk activities, while the sourcetype="scheduler" focuses specifically on events related to scheduled tasks. By using <b>| stats</b>, it groups the results by scheduled times and search names, while <b>| where count > 1</b> highlights cases where duplicate runs occur.</p><p>Such insights are critical for administrators to avoid unnecessary load or unexpected behavior caused by duplicate scheduled searches.</p>
quid = CC534B116595C4E29AE83F12316B2F01
search_author = GoSplunk: masdeeper
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/detect-scheduler-running-twice-search" target="_blank">https://gosplunk.com/detect-scheduler-running-twice-search</a></p>
description = <p>Summarizes <b>Duplicate Scheduled Searches in Internal Index</b> using <code>index=_internal sourcetype=scheduler scheduled_time=* saved savedsearch_name=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query identifies duplicate scheduled searches running at the same time in the internal index of Splunk. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services</a><br>Cisco Services.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index=_internal sourcetype=scheduler scheduled_time=* saved savedsearch_name=*\
	| stats count by scheduled_time, savedsearch_name\
	| where count > 1

