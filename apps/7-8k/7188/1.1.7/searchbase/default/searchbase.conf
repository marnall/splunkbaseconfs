[sorting_results_in_your_search]
search_name = Sorting Results In Your Search
version = 1.0.2
date_created = 2025-05-05 11:29:29
date_updated = 2025-7-2 14:47:58
category = Threat Hunter's Cookbook
sub_category = Sorting and Stacking
tags = Sorting Results,Time Ordering
solution = <p>Sorting provides immediate insights into event sequences, helping analysts prioritize recent activity. The descending order of the _time field ensures analysts can promptly assess the most current events.</p><p><b>Suggested Actions</b><br><b>1.</b> Regularly incorporate sorting to maintain chronological integrity in reports.<br><b>2.</b> Use sort limit wisely to manage event counts and avoid data truncation.<br><b>3.</b> Implement sorting in dashboard panels for better user experience.<br><b>4.</b> Train team members on flexible data ordering techniques.<br><b>5.</b> Integrate sorted outputs into automated alerts for timely responses.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Query the specified index for events.<br><b>02</b> <code>| sort - _time</code><br>       - Sort results in descending order by time, showing most recent events first. The minus (-) prefix indicates descending order.<br>
explanation = <p>The <b>sort command</b> reorders search results based on specified fields, critical for clarity in analysis. It facilitates a deeper understanding by organizing data in <b>ascending or descending</b> order, using a minus (-) for descending order. Leveraging this command allows analysts to manage voluminous data efficiently, while ensuring investigative precision and improved data presentation.</p>
quid = F0A1B2C3D4E5F6A7B8C9D0E1F2A3B4C5
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p><b>Organizing search results</b> is critical for <b>enhanced data analysis</b> and readability. This search applies sorting to arrange authentication events from the most recent to the oldest, highlighting <b>valuable</b> chronological patterns essential for investigations and reporting.</p>
search = index="<<index>>" \
	| sort - _time

[sorting_using_fieldformat]
search_name = Hourly Average Response Time and SLA Risk Level
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,SFU
solution = <p>This search provides SLA risk categorization with human-readable formatting for operational dashboards.</p><p><b>Suggested Actions</b><br><b>1.</b> Adjust time thresholds based on your specific SLA requirements.<br><b>2.</b> Create alerts for high-risk periods.<br><b>3.</b> Use in dashboards to provide at-a-glance performance status.<br><b>4.</b> Correlate risk levels with system changes or incidents.<br><b>5.</b> Generate regular reports for SLA compliance tracking.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> The query starts by specifying the index, sourcetype, and source of the data to be analyzed.<br> <b>02</b> It then uses the timechart command to create a time series chart with an hourly span, calculating the average time taken for requests during each hour.<br> <b>03</b> The eval command is used to create a new field called SLARisk, which categorizes the risk level based on the average time taken. If the average time taken is less than 600, the risk level is 1 (low). If it's between 600 and 900, the risk level is 2 (medium). Otherwise, the risk level is 3 (high).<br> <b>04</b> Another eval command is used to create a new field called 'SLA Number, for Illustration', which is just a copy of the SLARisk field.<br> <b>05</b> Finally, the fieldformat command is used to format the SLARisk field into a human-readable format. If the risk level is 1, it's formatted as 'Low'. If it's 2, it's formatted as 'Medium'. If it's 3, it's formatted as 'High'. If it's anything else, it's formatted as null.<br>
explanation = <p>This query can be used to monitor the performance of a web server or application. It helps to <b>identify</b> periods of <b>high load</b> or <b>slow response times</b>, which could indicate a problem with the server or application. The risk level categorization can be used to <b>prioritize</b> issues for investigation or remediation.</p>
quid = C9EB4CF07FE7C6D0D49D9EF707D6DB6E
search_author = grdhg24
updated_author = khutchinson
description = <p>This query is analyzing the <b>average</b> time taken for requests in an hourly span, categorizing the <b>risk level</b> based on the time taken, and then formatting the risk level into a <b>human-readable</b> format.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=access_combined source=*sample_access_logs.txt\
	| timechart span=1h avg(time_taken) as time_taken\
	| eval SLARisk = case (time_taken<600,1, time_taken < 900, 2, 1=1, 3)\
	| eval "SLA Number, for Illustration"=SLARisk\
	| fieldformat SLARisk = case (SLARisk=1,"Low", SLARisk = 2, "Medium", SLARisk = 3, "High", 1=1, null)

