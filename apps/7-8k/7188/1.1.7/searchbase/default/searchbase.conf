description = <p>This search identifies <b>high network latency</b> between source IPs and destination hosts across Cisco syslog and NetFlow data. It highlights connections where <b>maximum latency exceeds 200ms</b>, enabling rapid detection of performance degradation.</p>
explanation = <p>This search analyzes network telemetry from Cisco IOS syslog and NetFlow sources to calculate average and maximum latency between communicating endpoints. By filtering for connections exceeding 200 milliseconds, it isolates potentially degraded network paths that may impact application performance or user experience. Network engineers can use these results to prioritize troubleshooting, identify congestion or routing inefficiencies, and validate SLA adherence. Trending and correlating these high-latency connections with infrastructure changes, bandwidth saturation, or security inspection policies can improve capacity planning and maintain service reliability.</p>
execution_plan = <b>01</b> <code>index=network_logs sourcetype=cisco:ios:syslog OR sourcetype=netflow</code><br> - Retrieve network telemetry from Cisco syslog and NetFlow data sources.<br><b>02</b> <code>| stats avg(latency) as avg_latency, max(latency) as max_latency by src_ip, dest_host</code><br> - Aggregate average and peak latency by source and destination to quantify performance impact.<br><b>03</b> <code>| where max_latency > 200</code><br> - Filter for connections exceeding 200ms to isolate degraded network paths.<br><b>04</b> <code>| sort - max_latency</code><br> - Rank results to prioritize the most severe latency issues first.
solution = <p>This search surfaces <strong>network performance degradation</strong> by highlighting high-latency communication paths.</p><p><strong>Suggested Actions</strong></p><ol><li data-list="bullet"><span class="ql-ui"></span>Investigate top latency pairs for routing inefficiencies or bandwidth saturation.</li><li data-list="bullet"><span class="ql-ui"></span>Correlate results with recent infrastructure or firewall policy changes.</li><li data-list="bullet"><span class="ql-ui"></span>Validate QoS configurations for latency-sensitive applications.</li><li data-list="bullet"><span class="ql-ui"></span>Monitor recurring high-latency pairs to support capacity forecasting.</li></ol><p><strong>Recommended For You:</strong></p><ol><li data-list="bullet"><span class="ql-ui"></span><a href="https://splunkbase.splunk.com/app/5580" rel="noopener noreferrer">Products: Cisco Meraki</a></li><li data-list="bullet"><span class="ql-ui"></span>The Splunk Add-on for Cisco Meraki provides comprehensive network observability and security monitoring across your Meraki organizations.</li><li data-list="bullet"><span class="ql-ui"></span><a href="https://www.cisco.com/site/us/en/products/security/security-analytics/secure-network-analytics/index.html" rel="noopener noreferrer">Products: Cisco Secure Network Analytics</a></li><li data-list="bullet"><span class="ql-ui"></span>Advanced network visibility to analyze traffic patterns and performance anomalies.</li><li data-list="bullet"><span class="ql-ui"></span><a href="https://www.splunk.com/en_us/products/observability-cloud.html" rel="noopener noreferrer">Products: Splunk Observability Cloud</a></li><li data-list="bullet"><span class="ql-ui"></span>End-to-end infrastructure monitoring to detect and remediate performance bottlenecks.</li><li data-list="bullet"><span class="ql-ui"></span><a href="https://www.splunk.com/en_us/services.html" rel="noopener noreferrer">Services: Splunk Professional Services</a></li><li data-list="bullet"><span class="ql-ui"></span>Expert assistance for optimizing network telemetry ingestion and performance monitoring.</li><li data-list="bullet"><span class="ql-ui"></span><a href="https://splunkbase.splunk.com/apps?page=1&amp;keyword=network%20latency%20netflow%20performance" rel="noopener noreferrer">Splunk Apps: Other Recommended Apps</a></li><li data-list="bullet"><span class="ql-ui"></span>Discover apps for enhanced network monitoring and latency analytics.</li></ol>
related_info = <ol><li data-list="bullet"><span class="ql-ui"></span><a href="https://www.ciscolive.com/c/dam/r/ciscolive/emea/docs/2025/pdf/LTRMER-2330.pdf" rel="noopener noreferrer">Cisco Docs: Meraki + Splunk for Holistic End-User Experience Insights - Cisco Live</a></li><li data-list="bullet"><span class="ql-ui"></span>What is User Experience? Are Wireless, Wired, or Remote Clients able to join the network and perform optimally?.</li><li data-list="bullet"><span class="ql-ui"></span><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" rel="noopener noreferrer">Splunk Docs: stats Command Search</a></li><li data-list="bullet"><span class="ql-ui"></span>Reference for statistical aggregation functions used in this search.</li><li data-list="bullet"><span class="ql-ui"></span><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/where" rel="noopener noreferrer">Splunk Docs: where Command Search</a></li><li data-list="bullet"><span class="ql-ui"></span>Guidance for filtering results based on threshold conditions.</li><li data-list="bullet"><span class="ql-ui"></span><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/sort" rel="noopener noreferrer">Splunk Docs: sort Command Search</a></li><li data-list="bullet"><span class="ql-ui"></span>Documentation for ranking results to prioritize investigation.</li><li data-list="bullet"><span class="ql-ui"></span><a href="https://splunkbase.splunk.com/category/network_infrastructure/" rel="noopener noreferrer">Splunkbase: Network Infrastructure Category</a></li><li data-list="bullet"><span class="ql-ui"></span>Apps focused on monitoring routers, switches, and NetFlow telemetry.</li><li data-list="bullet"><span class="ql-ui"></span><a href="https://lantern.splunk.com/Search?q=network%20latency" rel="noopener noreferrer">Lantern: Network Latency Search</a></li><li data-list="bullet"><span class="ql-ui"></span>Operational guidance for investigating network performance issues.</li><li data-list="bullet"><span class="ql-ui"></span><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q=" rel="noopener noreferrer">Community: Network Latency Discussions</a></li><li data-list="bullet"><span class="ql-ui"></span>Community discussions on troubleshooting and optimizing network performance.</li></ol>
search = index=network_logs sourcetype=cisco:ios:syslog OR sourcetype=netflow \
| stats avg(latency) as avg_latency, max(latency) as max_latency by src_ip, dest_host \
| where max_latency > 200 \
| sort - max_latency
