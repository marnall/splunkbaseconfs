[find_ulimit_problems_327]
search_name = Splunk Server Ulimits and Severity Level Analysis
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,SFU
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
env_run = 2
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul>12-14: The 'fieldformat' commands are used to format the ulimits values, dividing them by their recommended values if they are greater than or equal to 0.</ul><ul>3-5: The 'eval' commands are used to check if the ulimits values are not null, if they are null, they are replaced with 'unavailable'.</ul><ul>6-8: The 'eval' commands with 'case' function are used to assign a severity level based on the ulimits values.</ul><ul><b>01</b> The 'rest' command retrieves system information from the local Splunk server.</ul><ul><b>02</b> The 'join' command combines the results from two rest commands, one fetching server info and the other fetching system info.</ul><ul><b>09</b> The 'eval' command with 'max' function assigns the maximum severity level among the three ulimits.</ul><ul><b>10</b> The 'fields' command retains only the required fields in the results.</ul><ul><b>11</b> The 'rename' command renames fields for better readability.</ul><ul><b>15</b> The 'fields' command with '-' option removes the '_timediff' field from the results.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query is <b>valuable</b> for monitoring system resources and identifying potential issues related to system limits. By assigning a severity level, it helps in prioritizing the issues that need immediate attention. <b>Monitoring</b> these aspects means system administrators can proactively manage and optimize the server performance, <b>preventing</b> bottlenecks.</div></div>
quid = 7E9B3DC954CBC24744F252E0DCC85902
search_author = grdhg24
updated_author = khutchinson
description = <p>This query is retrieving system information from the local Splunk server, specifically the ulimits for data segment size, open files, and user processes.</p> \
	<p>It then evaluates these values, assigns a severity level based on specific conditions, and formats the fields for better readability.</p>
solution = <p>This query is retrieving system information from the local Splunk server, specifically the ulimits for data segment size, open files, and user processes. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | rest splunk_server=* /services/server/info\
	| join type=outer splunk_server [rest splunk_server=* /services/server/sysinfo\
	| fields splunk_server ulimits.data_segment_size ulimits.open_files ulimits.user_processes]\
	| eval ulimits.data_segment_size = if(isnotnull('ulimits.data_segment_size'), 'ulimits.data_segment_size', "unavailable")\
	| eval ulimits.open_files = if(isnotnull('ulimits.open_files'), 'ulimits.open_files', "unavailable")\
	| eval ulimits.user_processes = if(isnotnull('ulimits.user_processes'), 'ulimits.user_processes', "unavailable")\
	| eval sev_segment_size = case ('ulimits.data_segment_size' == -1 OR 'ulimits.data_segment_size' >= 1073741824, 0, 'ulimits.data_segment_size' == "unavailable", -1, True(), 2)\
	| eval sev_open_files = case ('ulimits.open_files' == -1 OR 'ulimits.open_files' >= 8192, 0, 'ulimits.open_files' == "unavailable", -1, True(), 2)\
	| eval sev_user_processes = case ('ulimits.user_processes' == -1 OR 'ulimits.user_processes' >= 8192, 0, 'ulimits.user_processes' == "unavailable", -1, True(), 2)\
	| eval severity_level = max(sev_segment_size, sev_open_files, sev_user_processes)\
	| fields splunk_server ulimits.data_segment_size ulimits.open_files ulimits.user_processes severity_level\
	| rename splunk_server AS instance ulimits.data_segment_size AS "ulimits.data_segment_size (current / recommended)" ulimits.open_files AS "ulimits.open_files (current / recommended)" ulimits.user_processes AS "ulimits.user_processes (current / recommended)"\
	| fieldformat ulimits.data_segment_size (current / recommended) = if('ulimits.data_segment_size (current / recommended)' >= 0, 'ulimits.data_segment_size (current / recommended)'." / 1073741824", 'ulimits.data_segment_size (current / recommended)')\
	| fieldformat ulimits.open_files (current / recommended) = if('ulimits.open_files (current / recommended)' >= 0, 'ulimits.open_files (current / recommended)'." / 8192", 'ulimits.open_files (current / recommended)')\
	| fieldformat ulimits.user_processes (current / recommended) = if('ulimits.user_processes (current / recommended)' >= 0, 'ulimits.user_processes (current / recommended)'." / 8192", 'ulimits.user_processes (current / recommended)')\
	| fields - _timediff

