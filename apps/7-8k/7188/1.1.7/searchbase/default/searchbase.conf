explanation = <p>This comprehensive search combines audit log performance data with REST API configuration data to provide a complete picture of enabled scheduled searches. It analyzes actual execution performance (runtime statistics, scan counts, event counts) and correlates this with scheduling configuration (cron patterns, execution frequency). By parsing cron schedules to calculate minimum execution frequency, it reveals how often searches run and how their performance characteristics relate to their schedule. This analysis is invaluable for optimizing scheduled search timing, identifying searches that run too frequently, and understanding the relationship between search performance and concurrency impact.</p><p>For junior Splunk users, this search demonstrates the importance of correlating performance metrics with configuration data to enhance system efficiency and resource allocation. It uses <b>stats</b> for aggregating performance figures and <b>eval</b> functions for schedule interpretation, exemplifying best practices in SPL query development.</p>
