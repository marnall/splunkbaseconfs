sub_category = Access
tags = Access,Users
solution = <p>This query highlights the total count of <b>unique users</b> accessing a system through Linux secure event logs. Insights gained from this query can help security teams understand the scale of system use and detect unusual patterns, such as unexpected spikes or unauthorized accounts.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the list of unique users for any unfamiliar or unauthorized accounts.<br><b>2.</b> Investigate activity related to newly detected users.<br><b>3.</b> Use this data as part of regular compliance and auditing processes.<br><b>4.</b> Set up alerts for sudden increases in unique user counts, which may indicate suspicious activity.<br><b>5.</b> Combine this search with other security searches to build a comprehensive view of system usage.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=linux_secure</code><br>       - Specifies the target data source as the 'linux_secure' sourcetype for a given index.<br><b>02</b> <code>| rex "\suser[^'](?<User>\S+\w+)"</code><br>       - Applies a regular expression to extract user details and create a new field (<code>User</code>) from the log data.<br><b>03</b> <code>| stats dc(User)</code><br>       - Calculates the number of distinct users by aggregating the extracted <code>User</code> field.<br>
explanation = <p>This search provides valuable insights into user activity in Linux environments. By targeting the 'linux_secure' sourcetype, the query identifies unique users who have accessed the system within the specified timeframe. A concise <b>regular expression</b> extracts user identifiers from log data. Then, the <code>stats dc(User)</code> command provides the count of distinct users, aiding in <b>security audits</b>, detecting anomalies, and understanding overall user access behavior. This search is particularly useful for forensic analysis, compliance reporting, and proactive security monitoring.</p>
quid = 73A6819E1149362CBC9FFDCDA4EC349D
search_author = grdhg24
updated_author = khutchinson
description = <p>This query is designed to identify <b>unique users</b> in the 'linux_secure' sourcetype within the specified index over the last 24 hours. It extracts user information from log entries using a <b>regular expression</b> and calculates the distinct count of users to provide insights into <b>system access patterns</b>.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/get-started.html" target="_blank">Products: Entry point for getting started with Splunk products</a><br>Entry point for getting started with Splunk products.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li></ul>
search = index="<<index>>" sourcetype=linux_secure\
| rex "\suser[^'](?<User>\S+\w+)"\
| stats dc(User)

[counting_unique_enumeration_actions_per_user]
search_name = Counting Unique Enumeration Actions Per User
version = 1.0.3
date_created = 2025-05-12 10:39:00
date_updated = 2025-7-2 14:53:17
category = Threat Hunter's Cookbook
sub_category = Grouping
tags = Grouping,User Behavior
solution = <p>Operational insight gained from this query revolves around identifying potential enumeration attempts by users. Enumeration activity, if malicious, signals early stages of an attack, such as reconnaissance, making it crucial to act promptly and mitigate risks.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate users with unusually high enumeration activity to understand the purpose behind this behavior.<br><b>2.</b> Correlate findings with other security events, such as failed logins or privilege escalation attempts.<br><b>3.</b> Set up alerts for thresholds indicating abnormal enumeration counts.<br><b>4.</b> Implement enhanced monitoring for flagged users and their systems.<br><b>5.</b> Conduct training sessions for employees to mitigate accidental enumeration or insider threats.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Specifies the dataset to search within.<br><b>02</b> <code>| eventstats dc(enumerationActions) AS actionsCount by userName</code><br>       - Calculates the distinct count of enumeration actions for each user and stores it as <b>actionsCount</b> while maintaining the original event context.<br><b>03</b> <code>| sort -count</code><br>       - Orders the results in descending order based on the computed counts for visibility.</p>
explanation = <p>The search uses the <b>eventstats</b> command to calculate the distinct count (<b>dc</b>) of enumeration-related actions per user, captured in the field <b>enumerationActions</b>. This is followed by the <b>sort</b> command to prioritize users with the most enumeration activity. This process highlights users whose actions markedly deviate from the norm, serving as a signal for deeper investigation.</p><p>The query is valuable because enumeration is a typical precursor for privilege escalation or lateral movement. Identifying these actions early can aid in threat detection and mitigation.</p><p>The use of <b>eventstats</b> ensures that the distinct counts are computed while preserving the original dataset structure, which allows detailed analysis of context around individual events.</p>
quid = 4B1EA068100970716018FF55F11187FD
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Counting Unique Enumeration Actions Per User</b> using <code>index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" \
| eventstats dc(enumerationActions) AS actionsCount by userName \
| sort -count

[cpu_thresholds_warnings_and_risk_scoring]
search_name = CPU Load Analysis with Severity Levels
search_hidden = 0
category = Infrastructure
sub_category = Servers
tags = ITOps
solution = <p>This query provides actionable insights by categorizing CPU loads across hosts into severity levels. It helps stakeholders identify hosts under high stress, allocate resources effectively, and prioritize remediation where necessary.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts categorized as <b>Critical</b> and prioritize immediate remediation.<br><b>2.</b> Monitor <b>Warning</b> hosts to prevent potential performance degradation.<br><b>3.</b> Use insights from <b>Elevated</b> loads to optimize workloads or redistribute operations.<br><b>4.</b> Validate configuration and baseline operational levels for <b>Normal</b> hosts.<br><b>5.</b> Regularly review CPU load trends for capacity planning and proactive maintenance.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="Perfmon:CPU Load"</code><br>       - Specify the data source for the analysis, focusing on CPU load data.<br><b>02</b> <code>| bucket _time span=30m</code><br>       - Aggregate events into 30-minute time buckets for trend analysis.<br><b>03</b> <code>| eval Load=round(Value,2)</code><br>       - Standardize the CPU load values by rounding to two decimal places.<br><b>04</b> <code>| stats avg(Load) as AVGL by host, _time</code><br>       - Calculate the average CPU load per host and time bucket.<br><b>05</b> <code>| chart avg(AVGL) as AverageCPU by host</code><br>       - Aggregate and visualize the average CPU load for each host.<br><b>06</b> <code>| eval CPULoad=case (AverageCPU>90, "Critical", AverageCPU>=70 AND AverageCPU<=89, "Warning", AverageCPU>=40 AND AverageCPU<=69, "Elevated", AverageCPU<40, "Normal")</code><br>       - Assign CPU load levels based on severity thresholds (<b>Critical, Warning, Elevated, Normal</b>).<br><b>07</b> <code>| stats count by CPULoad</code><br>       - Count the occurrences of each CPU load category.<br><b>08</b> <code>| sort - count CPULoad</code><br>       - Present the results sorted by the frequency of each CPU load category.<br>
explanation = <p>This search provides a systematic approach to monitor CPU load on different hosts by utilizing Splunk's <b>bucket</b>, <b>eval</b>, and <b>stats</b> commands. By grouping data into 30-minute intervals, rounding metrics for consistency, and categorizing severity levels in a structured format, it allows administrators to quickly assess host performance. The use of the <code>case</code> function in the <b>eval</b> command ensures that CPU loads are classified into meaningful risk categories (<b>Critical, Warning, Elevated, Normal</b>), enabling more effective prioritization. The counting and sorting functions further highlight the distribution of these categories, offering a clear, actionable insight for operational teams.</p>
quid = 58832ED5C98054C7C08CB6D409FD5AF8
search_author = GoSplunk: SplunkNinja
related_info = <p><a href="https://gosplunk.com/cpu-thresholds-warnings-and-risk-scoring" target="_blank">https://gosplunk.com/cpu-thresholds-warnings-and-risk-scoring</a></p>
description = <p>Summarizes <b>CPU Load Analysis with Severity Levels</b> using <code>index="<<index>>" sourcetype="Perfmon:CPU Load"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="Perfmon:CPU Load"\
| bucket _time span=30m\
| eval Load=round(Value,2)\
| stats avg(Load) as AVGL by host, _time\
| chart avg(AVGL) as AverageCPU by host\
| eval "CPULoad"=case (AverageCPU>90, "Critical", AverageCPU>=70 AND AverageCPU<=89, "Warning", AverageCPU>=40 AND AverageCPU<=69, "Elevated", AverageCPU<40, "Normal")\
| stats count by CPULoad\
| sort - count CPULoad

