[detect_spikes_in_aws_login_attempts_using_time_based_visualization]
search_name = Detect Spikes in AWS Login Attempts Using Time-Based Visualization
version = 1.0.3
date_created = 2025-05-05 13:00:13
date_updated = 2025-7-2 15:15:45
category = Threat Hunter's Cookbook
sub_category = Exploratory Data Analysis and Visualization
tags = Login,Time-Based Analysis
solution = <p>This query identifies and visualizes spiking AWS login attempts with the use of time-based statistical analysis and inline sparklines. It provides a dynamic representation of login failures with counts greater than 15, assisting in detecting potential brute-force or unauthorized access activities. Visualization enhances the understanding of trends over time, making anomalies easier to spot in dashboards or reports.</p><p><b>Suggested Actions</b><br><b>1.</b> Add this query directly to a dashboard for real-time monitoring.<br><b>2.</b> Investigate specific users or event sources with suspicious login counts.<br><b>3.</b> Look for patterns or repeated spikes to identify brute force attempts.<br><b>4.</b> Enhance AWS environment security using multi-factor authentication.<br><b>5.</b> Share visualized reports with relevant stakeholders or incident response teams.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>This search leverages a combination of SPL commands to identify spikes in AWS Console login attempts:</p><p><b>Command Details:</b><br><b>| bucket _time span=1d</b> - Breaks events into 1-day intervals, enabling time-based aggregation.<br><b>| eval dateStamp=strftime(bucket,"%m/%d/%y")</b> - Converts the bucketed timestamp into a human-readable date format.<br><b>| stats count sparkline by dateStamp, eventName, userIdentity.userName errorMessage</b> - Aggregates events with counts and includes a mini visual (sparkline) to show trends inline.<br><b>| sort -count</b> - Sorts the results in descending order by count to highlight the most significant spikes first.<br><b>| search count >15</b> - Filters results to include only those with notable spikes (counts greater than 15).</p><p>The visualization of these statistics ensures easier identification of patterns or anomalies, enabling a quicker response to potential security events. Insights gained from these patterns are valuable for operational and security teams, offering both high-level overviews and actionable details.</p>
quid = C94ABCB4CD110AF7382DB1334D5D095B
search_author = Ryan Fetterman & Sydney Marrone
updated_author = khutchinson
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Detect Spikes in AWS Login Attempts Using Time-Based Visualization</b> using <code>index="<<index>>" sourcetype=aws:cloudtrail eventName=ConsoleLogin errorMessage="Failed Authentication" eventSource=sign</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=aws:cloudtrail eventName=ConsoleLogin errorMessage="Failed Authentication" eventSource=signin.amazonaws.com</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>bucket _time span=1d AS bucket</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>03</b> <code>eval dateStamp=strftime(bucket,"%m/%d/%y")</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>04</b> <code>stats count sparkline by dateStamp, eventName, userIdentity.userName errorMessage</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>05</b> <code>sort -count</code><br>       - Sort the results so the highest-priority rows appear first.<br><b>06</b> <code>search count >15</code><br>       - Search the target data and apply the base filters needed for this use case.<br>
search = index="<<index>>" sourcetype=aws:cloudtrail eventName=ConsoleLogin errorMessage="Failed Authentication" eventSource=signin.amazonaws.com\
| bucket _time span=1d AS bucket\
| eval dateStamp=strftime(bucket,"%m/%d/%y")\
| stats count sparkline by dateStamp, eventName, userIdentity.userName errorMessage\
| sort -count\
| search count >15

[detect_suspicious_process_launch_from_unusual_locations]
search_name = Detect Suspicious Process Launch from Unusual Locations
version = 1.0.5
date_created = 2025-05-12 14:07:25
date_updated = 2025-07-02 15:34:33
category = Threat Hunter's Cookbook
sub_category = Combined methods
tags = Process Relationships,Suspicious Launch
solution = <p>This query leverages the PSTree Splunk app to identify possible malicious activity by reconstructing process trees and focusing on unusual process launches from suspicious locations, like temp directories or startup folders that are often targeted by malware. Anomalies in process relationships and launches are flagged for deeper investigation.</p><p><b>Suggested Actions</b><br><b>1.</b> Verify the presence of the <code>PSTree</code> app in your Splunk instance for proper execution.<br><b>2.</b> Investigate the parent-child process relationships reconstructed by the query, paying close attention to processes launched from temp or startup folders.<br><b>3.</b> Cross-reference identified processes (like "Salaries.xls") with threat intelligence sources for known malware indicators.<br><b>4.</b> Analyze command-line parameters and timestamps for further context and identify unauthorized or unexpected activity.<br><b>5.</b> Incorporate this detection method into broader anomaly or threat-hunting routines to regularly monitor for unusual process launches.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p><a href="https://splunkbase.splunk.com/app/5721">PSTree</a> is a Splunk app designed to reconstruct process trees from Sysmon EventCode 1 logs, which document process creation events. In this query, <code>rex</code> commands extract process names and IDs from file paths to create "parent" and "child" fields, highlighting parent-child relationships within process trees. These relationships provide visibility into how suspected processes, including malware, are initiated in a system.</p><p>The query also generates a <code>detail</code> field containing timestamps and command-line arguments, aiding forensic analysis to pinpoint suspicious activity. By searching for keywords like "Salaries.xls" in process trees, analysts can quickly identify processes that likely originate from compromised or suspicious files.</p><p>This method is particularly valuable for identifying malware leveraging unconventional locations (e.g., temp folders, startup entries) to evade detection, assisting in the quick isolation and response to potential threats.</p>
quid = 65869DFECCFB0A183E8A06BF22497E2B
description = <p>Summarizes <b>Detect Suspicious Process Launch from Unusual Locations</b> using <code>index="<<index>>" sourcetype=XMLWinEventLog source="xmlwineventlog:microsoft-windows-sysmon/operational" EventCode=1 use</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=XMLWinEventLog source="xmlwineventlog:microsoft-windows-sysmon/operational" EventCode=1 user=user123</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>rex field=ParentImage "\x5c(?<ParentName>[^\x5c]+)$"</code><br>       - Extract structured fields from raw text with a regular expression.<br><b>03</b> <code>rex field=Image "\x5c(?<ProcessName>[^\x5c]+)$"</code><br>       - Extract structured fields from raw text with a regular expression.<br><b>04</b> <code>eval parent = ParentName." (".ParentProcessId.")"</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>05</b> <code>eval child = ProcessName." (".ProcessId.")"</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>06</b> <code>eval detail = strftime(_time,"%Y-%m-%d %H:%M:%S")." ".CommandLine</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>07</b> <code>pstree child = child parent = parent detail = detail spaces = 50</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>08</b> <code>search tree = *Salaries.xls*</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>09</b> <code>table tree ```Special Ingredient: This recipe requires the pstree app, available on Splunkbase.</code><br>       - Format the final output columns for review or dashboard use.<br>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index="<<index>>" sourcetype=XMLWinEventLog source="xmlwineventlog:microsoft-windows-sysmon/operational" EventCode=1 user=user123 \
	| rex field=ParentImage "\x5c(?<ParentName>[^\x5c]+)$" \
	| rex field=Image "\x5c(?<ProcessName>[^\x5c]+)$" \
	| eval parent = ParentName." (".ParentProcessId.")" \
	| eval child = ProcessName." (".ProcessId.")" \
	| eval detail = strftime(_time,"%Y-%m-%d %H:%M:%S")." ".CommandLine \
	| pstree child = child parent = parent detail = detail spaces = 50 \
	| search tree = *Salaries.xls* \
	| table tree ```Special Ingredient: This recipe requires the pstree app, available on Splunkbase.```

