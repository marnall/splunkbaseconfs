execution_plan = <b>01</b> <code>| rest /services/server/info</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Fetch server information and roles via Splunk's REST API.<br><b>02</b> <code>| where "indexer" in(server_roles)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter results to include only indexers based on server roles.<br><b>03</b> <code>| table host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extract and display the host field in a tabular format.<br><b>04</b> <code>| dedup host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Remove duplicate entries to ensure a unique list of indexers.<br><b>05</b> <code>| sort host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Sort the host names alphabetically for better readability.<br>
explanation = <p>This search is vital for environments with multiple Splunk indexers, as it allows administrators to identify all active indexers. The use of the <b>REST API endpoint</b>, combined with filtering on server roles and deduplication, ensures the output is precise and clutter-free.</p><p>Operationally, this information helps understand data flow, troubleshoot indexer availability, and manage load balancing across indexers. The <b>table</b> and <b>dedup</b> commands ensure a clean and unique host list, while <b>sort</b> makes the output easily readable.</p><p>For junior engineers, this search demonstrates using the <b>| rest</b> command to fetch configuration and metadata from Splunk's REST API. It also highlights effective post-query data refinement through unique (dedup) and tabular formatting techniques.</p>
