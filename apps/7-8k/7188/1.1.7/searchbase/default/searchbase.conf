tags = Access,SFU
solution = <p>This search provides a <b>deduplicated list</b> of short hostnames, simplifying host inventory management and identification.</p><p><b>Suggested Actions</b><br><b>1.</b> Use the short hostname list for simplified reporting and documentation.<br><b>2.</b> Compare results with expected host inventory for completeness.<br><b>3.</b> Identify hosts with naming inconsistencies for standardization.<br><b>4.</b> Export the list for use in other tools or dashboards.<br><b>5.</b> Correlate short hostnames with FQDNs for comprehensive host mapping.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>| metadata type=hosts</code><br>       - Fetch metadata about hosts.<br><b>02</b> <code>| rex field=host "(?<shortHost>[^.]+)$"</code><br>       - Extract short hostnames ending before a period (.).<br><b>03</b> <code>| rex field=host "(?<shortHost>[^.]+)\."</code><br>       - Apply regular expression logic to capture short hostnames followed by a period.<br><b>04</b> <code>| dedup shortHost</code><br>       - Eliminate duplicate entries, ensuring only unique short hostnames remain.<br><b>05</b> <code>| table shortHost</code><br>       - Organize extracted hostnames into a tabular format for improved readability.<br>
explanation = <p>This query is used to provide a list of <b>unique short host names</b> by analyzing Splunk metadata. The <code>| metadata type=hosts</code> command retrieves host-related metadata, while regular expressions extract hostnames stripped of their fully qualified domains. By deduplicating and tabulating results, it offers a concise and actionable dataset for use in reporting or deeper analysis. This is particularly valuable in environments with extensive infrastructures, where tracking individual hosts without redundancy is critical for resource management and operational clarity.</p>
quid = 3B58240F650C7C01A1DB6B8575296E57
search_author = Jeff Klumpp
updated_author = khutchinson
description = <p>This query is <b>extracting</b> the <b>short host names</b> from the metadata of hosts, <b>removing duplicates</b>, and displaying them in a table. It ensures a comprehensive view of unique hostnames in the environment, which can be crucial for operations and analysis.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | metadata type=hosts\
	| rex field=host "(?<shortHost>[^.]+)$"\
	| rex field=host "(?<shortHost>[^.]+)\."\
	| dedup shortHost\
	| table shortHost

