[top_five_sourcetypes_27]
search_name = Top 5 Sourcetypes by Throughput in Internal Metrics Log
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,SFU
solution = <p>This query offers a detailed view of the top-consuming source types based on throughput. By identifying which sources are ingesting the most data, administrators can better manage ingestion costs, detect potential overuse, and address performance bottlenecks.</p><p><b>Suggested Actions</b><br><b>1.</b> Use results to audit data ingestion policies and ensure they align with organizational needs.<br><b>2.</b> Investigate high-ingestion source types for potential duplication or inefficiencies.<br><b>3.</b> Adjust data retention or processing rules for underperforming or over-consuming source types.<br><b>4.</b> Verify if ingestion aligns with licensing limits to avoid unexpected penalties.<br><b>5.</b> Monitor trends over time to proactively allocate resources and forecast capacity needs.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
env_run = 2
execution_plan = <b>01</b> <code>index=_internal</code><br>       - Accesses data from the internal Splunk index, which contains system and operational logs.<br><b>02</b> <code>(source=*/metrics.log* OR source=*\metrics.log*)</code><br>       - Filters for records in the `metrics.log` source to focus on ingestion and performance metrics.<br><b>03</b> <code>group=per_sourcetype_thruput</code><br>       - Targets data grouped by source type throughput, aligning with ingestion metrics per source type.<br><b>04</b> <code>| chart sum(kb) by series</code><br>       - Aggregates the total kilobytes ingested for each source type, providing a clear visualization of resource use.<br><b>05</b> <code>| sort -sum(kb)</code><br>       - Sorts the results in descending order of data ingestion to highlight top consumers.<br><b>06</b> <code>| head 5</code><br>       - Restricts the output to the 5 source types with the highest throughput.<br>
explanation = <p>This query focuses on identifying the top 5 source types based on their data ingestion throughput, as recorded in Splunk’s internal logs. The internal metrics log contains <b>essential performance data</b>, and this search leverages it to understand ingestion behavior by grouping data by `per_sourcetype_thruput`. Commands like `chart` and `sort` help compute and organize throughput metrics, delivering <b>actionable insights</b> for system administrators. This facilitates tasks like <b>capacity planning, ingestion optimization</b>, and <b>troubleshooting</b>. Understanding which source types consume the most resources ensures effective allocation and monitoring.</p>
quid = 2B7A94A3029C02A89AE8A2CB84E07CF3
search_author = Splunk
updated_author = khutchinson
description = <p>This query retrieves the top 5 source types by <b>data throughput</b> from the internal Splunk logs. It provides <b>insights</b> into data ingestion patterns, highlighting which source types are consuming the most data. This is <b>valuable</b> for maintaining optimal performance and planning data capacity.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_internal (source=*/metrics.log* OR source=*\metrics.log*) group=per_sourcetype_thruput\
	| chart sum(kb) by series\
	| sort -sum(kb)\
	| head 5

