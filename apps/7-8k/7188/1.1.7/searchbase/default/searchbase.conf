execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=_internal sourcetype=splunk_web_access host=* user=* <br />- This line is searching the _internal index for events with the sourcetype 'splunk_web_access' from any host and by any user.</ul><ul><b>02</b> | rex field=uri_path .*/(?<title>[^/]*)$ <br />- This line is using a regular expression to extract the dashboard title from the uri_path field.</ul><ul><b>03</b> | join title[ | rest /servicesNS/-/-/data/ui/views splunk_server=* | search isDashboard=1 isVisible=1 | rename eai:acl.app as app | fields title app ] <br />- This line is joining the extracted title with data from the REST API. It is searching for visible dashboards on any Splunk server, renaming the 'eai:acl.app' field to 'app', and returning the fields 'title' and 'app'.</ul><ul><b>04</b> | rename title as dashboard <br />- This line is renaming the 'title' field to 'dashboard'.</ul><ul><b>05</b> | stats count by _time user dashboard app host <br />- This line is providing a count of dashboard accesses by time, user, dashboard, app, and host.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor user activity on Splunk web dashboards. It can help identify which dashboards are most frequently accessed, who is accessing them, and from which hosts. This information can be useful for understanding user behavior, identifying popular dashboards, and troubleshooting issues.</div></div>
quid = FBFEE8C0AB3AB4A236DE58D145CB0874
search_author = GoSplunk: john117
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/dashboard-and-app-views-by-user" target="_blank">https://gosplunk.com/dashboard-and-app-views-by-user</a></p>
description = <p>Summarizes <b>Count of Dashboard Access by User, App, and Host Over Time</b> using <code>index=_internal sourcetype=splunk_web_access user=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query analyzes user access to Splunk web dashboards, offering insight into user behavior and dashboard popularity . The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index=_internal sourcetype=splunk_web_access user=*\
	| rex field=uri_path ".*/(?<title>[^/]*)$"\
	| join title[\
	| rest /servicesNS/-/-/data/ui/views splunk_server=*\
	| search isDashboard=1 isVisible=1\
	| rename eai:acl.app as app\
	| fields title app ]\
	| rename title as dashboard\
	| stats count by _time user dashboard app host

