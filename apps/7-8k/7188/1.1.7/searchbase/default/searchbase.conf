explanation = <p>This search provides critical visibility into indexing pipeline health by calculating fill percentages for the four main processing queues (parsing, aggregation, typing, and indexing) and tracking their 90th percentile utilization over time. Queue saturation (approaching 100% fill) indicates bottlenecks in the indexing pipeline that can cause data indexing delays, forwarder blocking, or potential data loss.</p><p>By monitoring these queues, administrators can identify which stage of the pipeline is constraining throughput, adjust queue sizing or parallelization settings, optimize parsing configurations, or add indexer resources before performance degradation impacts data availability or search freshness.</p><p>The key components of the search involve monitoring groups and names, calculating and evaluating maximum and current utilization of each queue, and determining the percentile metrics over the selected time frame.</p>
