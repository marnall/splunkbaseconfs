solution = <p>This search provides visibility into <b>application deployment distribution</b> across forwarders, helping administrators verify deployment coverage and identify gaps.</p><p><b>Suggested Actions</b><br><b>1.</b> Verify all expected applications are deployed to the correct number of hosts.<br><b>2.</b> Investigate applications with unexpectedly low host counts.<br><b>3.</b> Compare results with expected deployment targets for compliance.<br><b>4.</b> Use output to plan deployment updates or expansions.<br><b>5.</b> Document application distribution for operational reference.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/deployment/server/clients splunk_server=*</code><br>       - Retrieve deployment client information<br><b>02</b> <code>| table hostname applications.*.serverclasses</code><br>       - Format data into a comprehensive table<br><b>03</b> <code>| untable hostname, applications, serverclass</code><br>       - Restructure for separate analysis<br><b>04</b> <code>| rex field=applications "applications\\.(?.+)\\.serverclasses"</code><br>       - Extract application names<br><b>05</b> <code>| stats dc(hostname) as hostname by apps</code><br>       - Count distinct hostnames for each application<br>
explanation = <p>This query is used to <b>monitor</b> the deployment of applications across different servers. It helps <b>identify</b> if any servers are not running the expected applications or if there are applications not deployed on the expected servers. The '<code>rest</code>' command makes a RESTful API call to fetch deployment client information. '<code>table</code>' formats this data, '<code>untable</code>' restructures it for further analysis, '<code>rex</code>' extracts application names, and '<code>stats</code>' counts distinct hostnames, indicating deployment counts.</p>
quid = F018DF71BA3569E5796E6E230ADFABC2
