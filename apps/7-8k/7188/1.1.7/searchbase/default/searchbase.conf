[data_feed_status_delay_by_over_30_minutes]
search_name = Severe Delay Status for Specific Sourcetypes in an Index
search_hidden = 0
category = Splunk
sub_category = _internal
tags = SFU
solution = <p>This query offers a <b>clear snapshot of data ingestion health</b>, pinpointing sourcetypes with severe delays and prioritizing remediation efforts for critical data sources.</p> <p><b>Suggested Actions</b><br> <b>1.</b> Investigate sourcetypes with severe delays to identify root causes, such as misconfigured inputs or log forwarding issues.<br> <b>2.</b> Verify connectivity and ingestion pipelines for problem-sourcetypes.<br> <b>3.</b> Cross-check against expected sourcetypes in the CSV to confirm coverage.<br> <b>4.</b> Supplement monitoring with alerts for repeated delays.<br> <b>5.</b> Address exclusion patterns to ensure no critical data is inadvertently ignored.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>| metadata type=sourcetypes index="<<index>>"</code><br>       - Retrieves metadata about sourcetypes in the specified index.<br> <b>02</b> <code>| search [ | inputlookup sta_all_sourcetypes.csv | fields sourcetype ]</code><br>       - Filters sourcetype results using a list from a CSV file.<br> <b>03</b> <code>| sort - totalCount</code><br>       - Sorts results by total event count in descending order.<br> <b>04</b> <code>| eval Delay=now()-recentTime</code><br>       - Calculates delay since the sourcetype was last indexed.<br> <b>05</b> <code>| rangemap default=severe field=Delay low=0-1800</code><br>       - Maps delays into ranges, marking over 30 minutes as severe.<br> <b>06</b> <code>| convert ctime(recentTime) AS "Last Indexed"</code><br>       - Converts timestamps into human-readable format.<br> <b>07</b> <code>| table range, sourcetype, "Last Indexed", Delay, totalCount</code><br>       - Structures the data into a table with selected fields.<br> <b>08</b> <code>| eval Delay=tostring(Delay,"duration")</code><br>       - Formats delay field into a readable duration.<br> <b>09</b> <code>| eval totalCount=tostring(totalCount, "commas")</code><br>       - Formats total event count into a readable format with commas.<br> <b>10</b> <code>| rename totalCount AS Events, range AS Status, sourcetype AS Sourcetype</code><br>       - Renames fields for improved readability.<br> <b>11</b> <code>| sort + "Last Indexed"</code><br>       - Orders results by the Last Indexed field in ascending order.<br> <b>12</b> <code>| where Status="severe" AND NOT match(Sourcetype, "-(\d+|too_small)$")</code><br>       - Filters results to show only severe statuses excluding certain sourcetypes.<br>
explanation = <p>This query serves a crucial role in <b>data ingestion monitoring</b> for Splunk deployments. By leveraging multiple SPL commands, it identifies sourcetypes with severe delays, offering operational insights into ingestion health. The query employs:</p> <ul> <li><code>| metadata</code> to retrieve sourcetype metadata in a specified index, providing an overview of data volumes and timestamps.</li> <li><code>| inputlookup</code> to filter relevant sourcetypes from those stored in an external CSV, ensuring focus on known and managed data types.</li> <li><code>| eval</code> and <code>| rangemap</code> to calculate delays and categorize them by severity, focusing attention on sourcetypes exceeding 30-minute thresholds.</li> <li>Additional commands—<code>| table, | rename, | sort, | where</code>—to present actionable insights, ensuring only sourcetypes with meaningful and severe delayed statuses are displayed.</li> </ul> <p>The query is especially <b>useful for identifying potential disruptions</b> in data pipelines, enabling Splunk administrators to take proactive measures to ensure data consistency and reliability.</p>
quid = D95ED74EC12C2E552ADE784681537C4C
search_author = Splunk
description = <p>Summarizes <b>Severe Delay Status for Specific Sourcetypes in an Index</b> using <code>| metadata type=sourcetypes index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = | metadata type=sourcetypes index="<<index>>"\
	| search\
	[\
	| inputlookup sta_all_sourcetypes.csv\
	| fields sourcetype ]\
	| sort - totalCount\
	| eval Delay=now()-recentTime\
	| rangemap default=severe field=Delay low=0-1800\
	| convert ctime(recentTime) AS "Last Indexed"\
	| table range, sourcetype, "Last Indexed", Delay, totalCount\
	| eval Delay=tostring(Delay,"duration")\
	| eval totalCount=tostring(totalCount, "commas")\
	| rename totalCount AS Events, range AS Status sourcetype AS Sourcetype\
	| sort + "Last Indexed"\
	| where Status="severe" AND NOT match(Sourcetype, "-(\d+|too_small)$")

