solution = <p>This search enables detailed analysis of the performance of saved searches, helping administrators identify inefficient searches, validate scheduling constraints, and optimize workload distributions.</p><p><b>Suggested Actions</b><br><b>1.</b> Use results to identify and optimize high-runtime searches.<br><b>2.</b> Validate searches are completing within allotted scheduling windows.<br><b>3.</b> Optimize searches with high resource consumption (scan count, event count, result count).<br><b>4.</b> Ensure efficient use of runtime windows to meet SLAs.<br><b>5.</b> Utilize this analysis as part of ongoing Splunk workload monitoring processes.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
