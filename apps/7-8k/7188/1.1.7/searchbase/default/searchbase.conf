solution = <p>This query gives an operational insight into the disk usage reported by Splunk’s internal logs on a per-server basis. It is pivotal for infrastructure planning and maintaining proper server health.</p><p><b>Suggested Actions</b><br><b>1.</b> Review servers with high disk usage and ensure they are optimized.<br><b>2.</b> Validate storage allocations and consider adjustments where necessary.<br><b>3.</b> Set up alerts for disk thresholds to identify anomalies early.<br><b>4.</b> Plan for storage expansion if trends indicate continuous growth.<br><b>5.</b> Regularly monitor this metric to maintain consistent server performance.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| dbinspect index=_internal</code><br>       - Inspects the <b>_internal</b> index to identify logging and metrics data<br><b>02</b> <code>| stats sum(sizeOnDiskMB) by splunk_server</code><br>       - Summarizes the total disk usage (in MB) for each <code>splunk_server</code> using the <code>stats sum</code> command<br>
explanation = <p>This query begins by inspecting the <b>_internal</b> index, which logs internal metrics and activities of Splunk, using the <code>| dbinspect</code> command. By summing the <code>sizeOnDiskMB</code> field grouped by <code>splunk_server</code>, it surfaces the total disk space used in megabytes by each server. This functionality is <b>valuable</b> for administrators to track and analyze disk consumption trends, identify servers with high utilization, and allocate resources efficiently. Understanding these metrics helps to prevent storage-related outages and optimize server performance.</p>
quid = 13BD4773F40864EC3FE08B9B6132C2C9
search_author = GoSplunk: LTRand
updated_author = khutchinson
description = <p>Summarizes <b>Sum of Disk Size by Splunk Server for Internal Index</b> using <code>| dbinspect index=_internal</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li></ul>
search = | dbinspect index=_internal\
	| stats sum(sizeOnDiskMB) by splunk_server

[disk_used_by_internal_index]
search_name = Disk Used by _internal Index
version = 2.x
date_created = 2025‑10‑20
category = Splunk
sub_category = _internal
tags = Detail,Hutch,License,Usage
solution = <p>This search gives you a <b>clear view</b> into which host is driving ingestion and what sourcetype is predominant in its usage — enabling you to <b>isolate heavy consumers</b>, prepare for licensing implications, and plan capacity or governance actions.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the identified top‑host and its GB usage—investigate what is being ingested and why.<br><b>2.</b> Examine the dominant sourcetype(s) joined in the second phase—check if they align with expected data onboarding or if unexpected sprawl is occurring.<br><b>3.</b> If usage is trending high on certain hosts/sourcetypes, evaluate whether data can be filtered, routed differently, or moved to a cheaper storage tier.<br><b>4.</b> Set up a scheduled report or dashboard using this search—and alert if any host exceeds a preset GB threshold or shows unusual sourcetype growth.<br><b>5.</b> Use findings to feed into license‑renewal discussions, budget planning, or ingestion throttling policies.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = ‑7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.log type=Usage | eval gb=b/1024/1024/1024</code><br>       - Pull raw license‑usage events and convert bytes into gigabytes<br><b>02</b> <code>| timechart span=1d sum(gb) as GB by host useother=false</code><br>       - Aggregate daily GB usage by host, suppressing “other” bucket to show explicit hosts<br><b>03</b> <code>| untable _time host gb</code><br>       - Flatten the table so that each row is _time, host, gb for join preparation<br><b>04</b> <code>| top limit=1 host</code><br>       - Identify the single host with the highest usage across the period<br><b>05</b> <code>| join time [ search index=_internal source=*license_usage.log type=Usage | eval gb=b/1024/1024/1024 | timechart span=1d sum(gb) as GB by sourcetype useother=false | untable _time sourcetype sum(GB) ]</code><br>       - Join in parallel sourcetype‑based usage to correlate what type of data is driving usage on that host<br>
explanation = <p>The SPL begins by querying <b>index=_internal source=*license_usage.log type=Usage</b> and converts bytes (<b>b</b>) into gigabytes (<b>gb</b>=b/1024/1024/1024). Using <b>timechart span=1d sum(gb) as GB by host</b> allows aggregation of daily volume per host, and then piece‑by‑piece the pipeline uses <b>untable</b> to flatten results and <b>top limit=1 host</b> to focus on the highest volume host. A join brings in a second aggregation by sourcetype (via <b>timechart span=1d sum(gb) as GB by sourcetype</b>) to correlate high‑volume hosts with dominant sourcetype consumption. This <b>level of detail</b> supports license governance, spotting heavy ingestion consumers, understanding license pool usage, and identifying split usage across hosts and data types. It also <b>teaches operators</b> how to use conversions, multi‑step aggregations, unpivoting (untable), and joining across different axes of analysis.</p>
quid = CE59FF5EEB9D18622EC54368DEE7A35C
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Docs: About the Splunk Enterprise license usage report view</a><br>Details how Splunk captures and reports ingest volumes per pool, host, source, sourcetype and index from license_usage.log. :contentReference[oaicite:0]{index=0}</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/data-management/monitor-your-deployment-about-the-monitoring-console" target="_blank">Splunk Docs: Indexing: License Usage</a><br>Documentation of how license usage data is integrated into Monitoring Console. :contentReference[oaicite:1]{index=1}</li><li><a href="https://community.splunk.com/t5/Knowledge‑Management/license‑usage‑log‑key/m‑p/494183" target="_blank">Splunk Community: license_usage.log key</a><br>User‑provided field definitions and extraction guidance for license_usage.log. :contentReference[oaicite:2]{index=2}</li><li><a href="https://community.splunk.com/t5/Monitoring‑Splunk/What‑is‑the‑best‑way‑to‑measure‑current‑license‑usage/m‑p/449894" target="_blank">Splunk Community: What is the best way to measure current license usage?</a><br>Discussion of ingest vs usage correlation and capturing license loads. :contentReference[oaicite:3]{index=3}</li></ul>
description = <p>This search analyses the daily ingestion volume in GB from the <b>license_usage.log</b>, splitting by host and sourcetype to identify which components of the environment are using the most license data.</p>
search = index=_internal source=*license_usage.log type=Usage \
	| eval gb=b/1024/1024/1024 \
	| timechart span=1d sum(gb) as GB by host useother=false \
	| untable _time host gb \
	| top limit=1 host \
	| join [ search index=_internal source=*license_usage.log type=Usage | eval gb=b/1024/1024/1024 | timechart span=1d sum(gb) as GB by sourcetype useother=false | untable _time sourcetype sum(GB) ]

