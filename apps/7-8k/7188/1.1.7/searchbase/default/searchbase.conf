dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index=_introspection sourcetype=splunk_resource_usage component=PerProcess</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Search in the introspection index for PerProcess resource data.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Simplify field names by removing 'data.' prefix for readability.<br><b>03</b> <code>| rename search_props.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Normalize field names by removing 'search_props.' prefix.<br><b>04</b> <code>| eval label, provenance, and search_head</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assign default values or categorize processes into meaningful roles to identify their function.<br><b>05</b> <code>| eval process_class</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Classify processes based on names, parameters, and observed behaviors, ensuring all activities map to pre-defined categories.<br><b>06</b> <code>| bin _time span=10s</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate time series data over 10-second intervals for resource metrics.<br><b>07</b> <code>| stats latest(normalized_pct_cpu) AS pct_cpu latest(mem_used) AS mem_used latest(process_class) AS process_class by pid, _time, host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Generate statistics for CPU usage, memory use, and classified process type per process ID and host to enable actionable insights.<br>
explanation = <p>The search is designed to monitor system processes' resource utilization in a Splunk environment. It renames fields for better readability, evaluates process labels and roles, and applies logic to classify processes into meaningful categories such as <b>index service</b>, <b>scripted input</b>, <b>KVStore</b>, and others identified by Splunk's internal architecture. It provides insights for resource planning, capacity considerations, and system debugging by displaying metrics like CPU percentage and memory usage over 10-second intervals.</p><p>The granular classifications allow administrators to understand workload behaviors, identify bottlenecks, and allocate resources effectively. Splunk Web, datamodel acceleration, and scheduled searches are among the process activities specifically delineated by this search logic, demonstrating how indexed metadata enriches operational visibility.</p><p>By integrating capabilities like <b>eval</b> for conditional logic, <b>stats</b> for capturing time-based aggregates, and intuitive process role analysis, junior engineers can learn how to construct efficient searches for production systems while gaining operational insights directly from Splunk's internal logs.</p>
quid = 1D46A1D8B8F12A4CCDBEAB56512E4EC5
search_author = Splunk Works
description = <p>This search classifies various Splunk processes, collects and reports resource usage information such as <b>CPU</b> and <b>memory usage</b>. It provides granular visibility into process-level data across resource indices such as _introspection, enabling performance monitoring and troubleshooting.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_introspection sourcetype=splunk_resource_usage component=PerProcess | rename data.* as * | rename search_props.* as * | eval label = if(isnotnull('label'), 'label', "") | eval provenance = if(isnotnull('provenance'), 'provenance', "unknown") | eval search_head = case(isnotnull('search_head') AND 'role' == "peer", 'search_head', isnull('search_head') AND 'role' == "head", "_self", isnull('search_head') AND 'role' == "peer", "_unknown") | eval workload_pool = if(isnotnull('workload_pool'), 'workload_pool', "UNDEFINED") | eval process_class = case( process=="splunk-optimize","index service", process=="sh" OR process=="ksh" OR process=="bash" OR like(process,"python%") OR process=="powershell","scripted input", process=="mongod", "KVStore") | eval process_class = case( process=="splunkd" AND (like(args,"-p %start%") OR like(args,"service") OR like(args,"%_internal_launch_under_systemd%")),"splunkd server", process=="splunkd" AND isnotnull(sid) AND type=="datamodel acceleration","datamodel acceleration", process=="splunkd" AND isnotnull(sid) AND type=="scheduled","scheduler searches", process=="splunkd" AND isnotnull(sid) AND type=="ad-hoc","ad-hoc searches", process=="splunkd" AND isnotnull(sid) AND type=="summary index","summary index", process=="splunkd" AND (like(args,"fsck%") OR like(args,"recover-metadata%") OR like(args,"cluster_thing")),"index service", process=="splunkd" AND args=="instrument-resource-usage", "scripted input", (like(process,"python%") AND like(args,"%/appserver/mrsparkle/root.py%")) OR like(process,"splunkweb"),"Splunk Web", isnotnull(process_class), process_class) | eval process_class = if(isnull(process_class),"other",process_class) | bin _time span=10s | stats latest(normalized_pct_cpu) AS pct_cpu latest(mem_used) AS mem_used latest(process_class) AS process_class by pid, _time, host

