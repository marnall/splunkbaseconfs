related_info = <ol><li data-list="bullet"><span class="ql-ui"></span><a rel="noopener noreferrer" href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html">Download the Threat Hunter's Cookbook</a></li><li data-list="bullet"><span class="ql-ui"></span>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</li></ol><p><br></p>
