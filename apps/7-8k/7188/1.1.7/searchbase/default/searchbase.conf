solution = <p>This query counts DNS events over the past seven days, grouping the results by host and time in one hour intervals. It then uses xyseries to pivot on the data, transforming the data so that each unique time value becomes a row, each host becomes a column, and then the count of events fills in the table, creating a time-series view DNS activity by host.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor the trend lines for consistent patterns or anomalies in DNS activity.<br><b>2.</b> Identify spikes in DNS event volume, which may indicate potential issues or attacks.<br><b>3.</b> Correlate DNS event data with other network metrics for a holistic view.<br><b>4.</b> Adjust network policies or configurations based on observed trends.<br><b>5.</b> Generate reports for stakeholders to provide insights on DNS health.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>The <b>xyseries</b> command is used to convert results into a tabular format suitable for graphing, effectively allowing analysts to visualize trends over time. The query aggregates DNS events for a granular analysis by hourly span, making it vital for tracking real-time changes and identifying irregular activities. Leveraging these results can support efforts in network traffic analysis and cybersecurity monitoring by showcasing where and when the most activity occurs.</p>
quid = EE544C4E291FCB96232EABF02F862F4A
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Visualize DNS Event Volume Over 7 Days</b> using <code>| tstats count where index="<<index>>" sourcetype=stream:dns earliest=-7d by _time, host, span=1h</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>| tstats count where index="<<index>>" sourcetype=stream:dns earliest=-7d by _time, host, span=1h</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>02</b> <code>xyseries _time, host, count</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br>
search = | tstats count where index="<<index>>" sourcetype=stream:dns earliest=-7d by _time, host, span=1h \
	| xyseries _time, host, count

