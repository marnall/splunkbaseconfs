description = <p>Summarizes <b>Average Network Interface Performance per Minute</b> using <code>index="<<index>>" sourcetype="Perfmon:Network Interface"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="Perfmon:Network Interface"\
