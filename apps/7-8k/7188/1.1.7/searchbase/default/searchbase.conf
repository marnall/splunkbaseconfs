[saved_search_scheduler_activity]
search_name = Scheduler Performance Analysis and Saved Search Details
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Jobs
solution = <p>This search enables administrators to optimize saved search performance and identify resource-intensive queries.</p><p><b>Suggested Actions</b><br><b>1.</b> Review searches with high average run times and optimize their SPL.<br><b>2.</b> Identify searches returning excessive result counts and add appropriate filters.<br><b>3.</b> Stagger cron schedules to prevent search concurrency issues.<br><b>4.</b> Disable or archive unused saved searches to free up resources.<br><b>5.</b> Monitor execution counts to ensure scheduled searches are running as expected.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services</a><br>Cisco Services.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The query starts by searching the _internal index for events with the sourcetype 'scheduler' and a field 'result_count'. This is where Splunk logs information about the execution of saved searches.</ul><ul><b>02</b> The 'extract' command is used to extract key-value pairs from the event data, using ',' as the pair delimiter and '=' as the key-value delimiter.</ul><ul><b>03</b> The 'stats' command is used to calculate various statistics on the result_count and run_time fields for each saved search, grouped by the savedsearch_name and app fields. It also counts the number of executions for each search and lists the hosts where the search was run.</ul><ul><b>04</b> The 'join' command is used to combine this data with information about the saved searches obtained from the Splunk REST API. This includes details such as the search query, owner, app, and schedule.</ul><ul><b>05</b> The 'rename' command is used to give more user-friendly names to some of the fields.</ul><ul><b>06</b> The 'makemv' command is used to split the hosts field into multiple values, using ',' as the delimiter.</ul><ul><b>07</b> The 'sort' command is used to sort the results by the average run time of the searches, in descending order.</ul><ul><b>08</b> Finally, the 'table' command is used to format the results as a table with the specified columns.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor the performance of saved searches in Splunk. It can help identify searches that are taking a long time to run or returning a large number of results, which could indicate a problem with the search or the data it is querying.</div></div>
quid = 2A1FF28BD7AF8C155BD4672A3FC1BAA8
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/saved-search-scheduler-activity" target="_blank">https://gosplunk.com/saved-search-scheduler-activity</a></p>
description = <p>This query is analyzing the performance of saved searches in Splunk.</p> \
<p>It provides statistics on the result count and run time of each saved search, as well as details about the search itself such as the owner, app, and schedule.</p>
search = index=_internal sourcetype=scheduler result_count\
| extract pairdelim=",", kvdelim="=", auto=f\
| stats avg(result_count) min(result_count) max(result_count), sparkline avg(run_time) min(run_time) max(run_time) sum(run_time) values(host) AS hosts count AS execution_count by savedsearch_name, app\
| join savedsearch_name type=outer [\
| rest /servicesNS/-/-/saved/searches\
| fields title eai:acl.owner cron_schedule dispatch.earliest_time dispatch.latest_time search\
| rename title AS savedsearch_name eai:acl.app AS App eai:acl.owner AS Owner cron_schedule AS "Cron Schedule" dispatch.earliest_time AS "Dispatch Earliest Time" dispatch.latest_time AS "Dispatch Latest Time"]\
| rename savedsearch_name AS "Saved Search Name" search AS "SPL Query" app AS App\
| makemv delim="," values(host)\
| sort - avg(run_time)\
| table "Saved Search Name", App, Owner, "SPL Query", "Dispatch Earliest Time" "Dispatch Latest Time" "Cron Schedule" hosts, execution_count, sparkline, *(result_count), sum(run_time) *(run_time)

