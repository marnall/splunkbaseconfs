sub_category = Access
tags = Access,Searching
solution = <p>This query offers a <b>comprehensive overview</b> of security events, enabling quick identification of potential threats within your Windows environment.</p><p><b>Suggested Actions</b></p><b>1.</b> Review high-frequency triggers to identify unusual activity patterns.<br><b>2.</b> Investigate specific event types for detailed incident analysis.<br><b>3.</b> Implement additional monitoring for critical events.<br><b>4.</b> Adjust system configurations based on prevalent security events.<br><b>5.</b> Regularly update event code mappings to incorporate new threats.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>search index="<<index>>" source=*WinEventLog:security User!=SYSTEM User!="LOCAL SERVICE" User!="NETWORK SERVICE"</code><br>       - Filter events to exclude system accounts to focus on relevant user activities.<br><b>02</b> <code>eval Trigger=case(...)</code><br>       - Assigns descriptive names to events based on event codes, making analysis easier.<br><b>03</b> <code>stats count by Trigger</code><br>       - Counts the occurrences of each event type, providing an overview of security-related activities.<br><b>04</b> <code>sort - count</code><br>       - Sorts the event types in descending order to highlight the most frequent activity types.</p>
explanation = <p>This search monitors and categorizes Windows Security events based on event codes, which are crucial for identifying system activities. It utilizes the <b>eval</b> command to map specific event codes to descriptive trigger names (e.g., "Audit Logs Modified", "Account Modification") using <code>case</code> logic. This aids security teams in <b>quickly</b> spotting potential threats and understanding the types of activities occurring, which is crucial for maintaining <b>system integrity</b> and <b>security</b>.</p>
