search_author = Splunk Works
description = <p><b>Analyzes</b> search concurrency by type within your Splunk instance, including scheduled, ad-hoc, dashboard, realtime, acceleration, and summarization searches. Understanding search concurrency is vital for optimizing system performance and managing workload efficiently.</p>
