execution_plan = <b>01</b> <code>index=<<index>> sourcetype=linux_secure</code><br>       - This line specifies the data source by filtering to a particular sourcetype (`linux_secure`) that contains system authentication logs.<br><b>02</b> <code>| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s\s+\s(?gdm-\w+)\s:\s"</code><br>       - The `rex` command uses a regex pattern to extract the session type information.<br><b>03</b> <code>| search session=gdm-password</code><br>       - Filters results to include only events where the session relates to `gdm-password`, typically associated with graphical login attempts.<br><b>04</b> <code>| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s(?\s+)\s.+\sgdm-password:auth\s:\s(?\w+\s\w+);\s.+user=(?\s+)"</code><br>       - Another `rex` command extracts data about the authentication status and corresponding username utilizing regex.<br><b>05</b> <code>| search authstatus="authentication failure"</code><br>       - Narrows down logs to only include failed authentication attempts.<br><b>06</b> <code>| stats count by username</code><br>       - Summarizes the data by counting failed attempts for each username.<br><b>07</b> <code>| sort - count</code><br>       - Sorts the results in descending order of failed login counts to highlight users with the highest numbers of failures.<br>
explanation = <p>This search identifies and surfaces failed login attempts in Linux environments recorded in the `linux_secure` sourcetype.</p><p>The workflow begins by targeting the relevant data source, then applies string extraction and filtering to isolate failed graphical login sessions (`gdm-password`). By analyzing the `authstatus` field, only failed authentication events are included.</p><p>Finally, the search uses statistical aggregation to present the frequency of failed login attempts per user, sorted in descending order. Identifying users with high failure rates aids in uncovering potential <b>security incidents</b> or misconfigurations.</p><p>The commands and techniques used (like `rex` and `search`) are essential for refining and focusing on specific patterns that indicate >authentication failures, ensuring critical insights are not missed.</p>
quid = 1A117999F89EB5577087E4FDD8758F63
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
description = <p>Summarizes <b>Count of Failed Linux Secure Authentication Attempts by User</b> using <code>index="<<index>>" sourcetype=linux_secure</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
