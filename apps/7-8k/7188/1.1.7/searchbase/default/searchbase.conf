execution_plan = <b>01</b> <code>| rest splunk_server=local /services/server/info</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Query local server info REST endpoint to retrieve server metadata and roles.<br><b>02</b> <code>| where "search_head" in(server_roles)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter to only servers that have the search_head role assigned.<br><b>03</b> <code>| table host | dedup host | sort host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extract hostname, remove duplicates, and sort alphabetically.<br><b>04</b> <code>| eval host="\""+host+"\""</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Wrap each hostname in double quotes for proper list formatting.<br><b>05</b> <code>| stats values(host) as hosts</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Collect all quoted hostnames into a multivalue field.<br><b>06</b> <code>| eval searchheads=mvjoin(hosts,",")</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Join the multivalue field into a comma-separated string.
explanation = <p>This search dynamically discovers search heads in the Splunk deployment by querying the <b>/services/server/info</b> REST endpoint. It filters servers where <b>search_head</b> is present in the <b>server_roles</b> field, then formats the results as a quoted, comma-separated list suitable for use in other searches.</p><p>The search uses <b>dedup</b> and <b>sort</b> to ensure a clean, unique list of hosts. The <b>eval</b> command wraps each hostname in quotes, and <b>mvjoin</b> combines them into a single comma-separated string stored in the <b>searchheads</b> field. This ensures standardized output formatting.</p><p>This discovery mechanism enables other concurrency detail searches to dynamically target search head instances without hardcoding hostnames, making the solution portable across different Splunk deployments. It also enhances clarity in monitoring and troubleshooting scenarios by providing a dynamic and up-to-date inventory of involved search heads in various Splunk setups.</p>
quid = B680767B173C437CFE6A0F6780657CAF
search_author = Splunk Works
description = <p>Discovers search heads in the environment by querying server roles. This search enables dynamic target discovery for later analytical workflows. It prevents hardcoding of hostnames, ensuring better portability and usability.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | rest splunk_server=local /services/server/info | where "search_head" in(server_roles) | table host | dedup host | sort host | eval host="\""+host+"\"" | stats values(host) as hosts | eval searchheads=mvjoin(hosts,",")

[pi_scd_total_scheduled_executions]
search_name = Total Scheduled Executions
version = 2.x
date_created = 2025-12-04
category = Splunk
sub_category = _internal
tags = Count,Executions,Scheduled
solution = <p>Provides visibility into the total volume of scheduled search executions, enabling administrators to assess overall workload and identify potential capacity issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor execution counts to detect unusual spikes in scheduled search activity.<br><b>2.</b> Review high-frequency searches for optimization opportunities.<br><b>3.</b> Balance scheduled search distribution to avoid peak-time congestion.<br><b>4.</b> Use execution totals to inform capacity planning decisions.<br><b>5.</b> Correlate execution counts with system performance metrics to identify bottlenecks.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index=_internal status=success</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Query internal Splunk logs to retrieve successful search execution records.<br><b>02</b> <code>| stats count, sum(run_time) as total_run_time by savedsearch_name app</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate execution count and total runtime per saved search and app.<br><b>03</b> <code>| sort total_run_time desc</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Sort by total runtime to prioritize searches by resource consumption.<br><b>04</b> <code>| streamstats sum(...) as other_total, report_total, CS_total, dma_total by savedsearch_name</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Categorize and sum execution counts based on naming patterns for DMA, Correlation Searches, reports, and others.<br><b>05</b> <code>| stats sum(count) as "Total Searches"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Summarize the total number of scheduled search executions across all categories.
explanation = <p>This search provides a detailed breakdown and aggregate tally of execution counts for Scheduled Searches. It does so by categorizing the Scheduled Searches into accelerated, regular or those related to Data Model Acceleration (DMA). It uses <b>eval</b> to calculate category-specific execution counts and leverages <b>stats</b> for summarizing aggregate totals. High counts for specific categories might indicate misconfigured schedule frequencies impacting resource allocations. Over time, this insight helps improve scheduled workload management, and aligns execution patterns with operational priorities.</p><p>For junior analysts, this approach teaches powerful applications of <b>streamstats</b> and <b>eval-conditional-matching</b> chaining and how those structures draw on basic statistical building blocks to scale cross-category heavy workloads.</p>
quid = 8F2E9D4B7A5C3E1F6D9B4A8E2F7C5D3B
search_author = Splunk Works
description = <p>Counts the total number of scheduled search executions, excluding ad-hoc searches. This data offers an overview of workload distribution amongst scheduled searches during the defined period, helping diagnose potential resource bottlenecks in heavy-use environments.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_internal status=success | stats count, sum(run_time) as total_run_time by savedsearch_name app | sort total_run_time desc | streamstats sum(eval(if(not match(savedsearch_name, "- Rule|_ACCELERATE_DM_") and NOT match(savedsearch_name, "^_ACCELERATE_"), count, 0))) as other_total sum(eval(if(match(savedsearch_name, "^_ACCELERATE") AND NOT match(savedsearch_name, "_ACCELERATE_DM_") and NOT match(savedsearch_name, "- Rule$"), count, 0))) as report_total sum(eval(if(match(savedsearch_name, "- Rule"), count, 0))) as CS_total sum(eval(if(match(savedsearch_name, "_ACCELERATE_DM_"), count, 0))) as dma_total by savedsearch_name | stats sum(count) as "Total Searches"

