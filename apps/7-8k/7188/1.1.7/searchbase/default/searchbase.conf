[user_attempts_to_modify_internal]
search_name = User Attempts to Modify Internal
version = 2.x
date_created = 2025‑10‑20
category = Splunk
sub_category = _internal
tags = Audit,Detail,Hutch,User Modification
solution = <p>This search surfaces which users are making account edits to other users, the frequency of their actions, and the status (success/fail) of those changes. <b>Suggested Actions</b><br><b>1.</b> Review users with high modification counts to determine if activity aligns with approved roles or workflows.<br><b>2.</b> Investigate any modification with “Failure” or unexpected “Success Status” to identify potential privilege abuse or misconfiguration.<br><b>3.</b> Correlate the “Modified Account” field with role assignments or recent account creation/change‑requests for audit trails.<br><b>4.</b> Include this search in periodic access‑review routines and output to compliance dashboards or distributed change‑management logs.<br><b>5.</b> Consider setting an alert for when cross‑account user modifications exceed a defined threshold or occur outside business hours.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = ‑7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_audit sourcetype=audittrail action=edit_user</code><br>       - Retrieve audit records where a user change was made<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Convert timestamp to a readable date format<br><b>03</b> <code>| where user!=object</code><br>       - Exclude modifications where the user modifies their own account (self‑edit) to isolate cross‑account changes<br><b>04</b> <code>| stats count by user, info, object, Date</code><br>       - Aggregate the number of modification events grouped by modifier user, status, target account, and date<br><b>05</b> <code>| rename user as "Authenticated User" info as "Success Status" object as "Modified Account"</code><br>       - Rename fields to business‑friendly labels<br><b>06</b> <code>| sort - count</code><br>       - Sort by descending count to surface most frequent modification events<br>
explanation = <p>The SPL leverages <b>index=_audit</b> with <b>sourcetype=audittrail</b> and <b>action=edit_user</b>. It uses <b>eval</b> to format the <b>_time</b> into a human‑readable <b>Date</b>. The <b>where user!=object</b> clause filters out self‑edits to focus on cross‑account modifications. It then aggregates via <b>stats count by user, info, object, Date</b>, which profiles each modifier (user) by the target account (object), the result (info), and the date. Field renaming enhances clarity. This type of search is crucial for security operations, compliance auditing and change‑governance efforts—highlighting configuration changes that may bypass documented workflows. For newer Splunk users, this search shows use of <b>eval</b>, <b>strftime</b>, <b>where</b> filtering, <b>stats</b> aggregation, and field renaming to normalize results.</p>
quid = BCBB7F1B1598249E42499AF992E1A51F
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/security/security-and-compliance-audit-events" target="_blank">Splunk Docs: Audit Splunk activity</a><br>Detail on how Splunk records login/search/configuration changes in the _audit index.</li><li><a href="https://community.splunk.com/t5/Security/Monitor‑Role‑Changes‑in‑Audit‑Trail/m‑p/352937" target="_blank">Splunk Community: Monitor Role Changes in Audit Trail</a><br>Community discussion on capturing edits to user accounts and roles via audittrail. ([community.splunk.com](https://community.splunk.com/t5/Security/Monitor-Role-Changes-in-Audit-Trail/m-p/352937?utm_source=chatgpt.com))</li><li><a href="https://community.splunk.com/t5/Splunk‑Search/Internal‑Splunk‑User‑Modifications/m‑p/506900" target="_blank">Splunk Community: Internal Splunk User Modifications</a><br>User example query capturing edit_user events: index=_audit sourcetype=audittrail action=edit_user … ([community.splunk.com](https://community.splunk.com/t5/Splunk-Search/Internal-Splunk-User-Modifications/m-p/506900?utm_source=chatgpt.com))</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_blank">Splunk Docs: stats command reference</a><br>Explanation of using stats for counting and grouping fields.</li></ul>
description = <p>This search identifies attempts by authenticated users to modify other accounts (where the user is not the object of the modification) in the audittrail, providing visibility into internal account changes and potential misuse.</p>
search = index=_audit sourcetype=audittrail action=edit_user \
	| eval Date=strftime(_time, "%Y/%m/%d") \
	| where user!=object \
	| stats count by user, info, object, Date \
	| rename user as "Authenticated User" info as "Success Status" object as "Modified Account" \
	| sort - count

[user_demographics_by_region_chloropleth_60]
search_name = Geographical Distribution of Access by Country
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,Users
solution = <p>By running this search, you obtain a clear visualization of how user activity is geographically distributed. Such insights are crucial for monitoring global traffic patterns and detecting potential anomalies.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor for unexpected spikes in access events from specific regions to detect potential misuse or increased interest.<br><b>2.</b> Cross-reference traffic patterns with marketing or operational campaigns to assess effectiveness.<br><b>3.</b> Use findings to tailor regional strategies, such as language-specific content or localized marketing.<br><b>4.</b> Investigate access anomalies that may indicate cyber threats or irregular behavior.<br><b>5.</b> Share visualizations with stakeholders to highlight geographic performance trends.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/synthetic-monitoring.html" target="_blank">Products: Splunk Synthetic Monitoring</a><br>Splunk Synthetic Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=*access*</code><br>       - Specifies the data source; filters for records containing 'access' in the sourcetype.<br><b>02</b> <code>| iplocation clientip</code><br>       - Determines the geographical location of each client IP address.<br><b>03</b> <code>| stats count by Country</code><br>       - Aggregates the number of access events per country.<br><b>04</b> <code>| geom geo_countries featureIdField=Country</code><br>       - Maps the access counts to corresponding countries for visualization.<br>
explanation = <p>This search identifies and visualizes the <b>geographical distribution of access events</b>. By leveraging the <code>iplocation</code> command, the query determines the geographical location of client IPs, offering insights into where your users are coming from. The <code>stats count by Country</code> command aggregates access counts per country, providing a detailed breakdown of user locations. Finally, <code>geom geo_countries</code> maps these counts to specific countries, enabling a clear and actionable visualization of your global traffic patterns. This can help in recognizing <b>regional activity spikes</b>, <b>potential anomalies</b>, or verifying <b>market penetration</b>.</p>
quid = ADCC93A8BBFD0E576FF3EB41CAF6F670
search_author = grdhg24
updated_author = khutchinson
related_info = <p><a href="<https://www.splunk.com/blog/2017/04/25/mapping-with-splunk.html>" target="_blank"><https://www.splunk.com/blog/2017/04/25/mapping-with-splunk.html</a></p>
description = <p>This query is used to count the number of <b>access events</b> by country based on the client IP address.</p> \
	<p>It then maps these counts to their respective countries using a <b>geographical feature</b>, providing clear visibility into access distribution.</p>
search = index="<<index>>" sourcetype="*access*"\
	| iplocation clientip\
	| stats count by Country\
	| geom geo_countries featureIdField="Country"

[user_logon_logoff_and_duration]
search_name = User Session Duration and Authentication Events Analysis
search_hidden = 0
category = Security
sub_category = Access
tags = Authentication,Users
solution = <p>This search delivers <b>key insights</b> into <b>user activity trends</b> and <b>system security monitoring</b>. By analyzing logon/logoff events and session durations, administrators can pinpoint abnormal behaviors like <b>unusually long sessions</b>, <b>failed login attempts</b>, or <b>irregular access patterns</b>.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Review sessions lasting significantly longer than average to identify potential misuse or forgotten logouts.<br> \
<b>2.</b> Investigate frequent login attempts from specific accounts or hosts to detect brute force activities.<br> \
<b>3.</b> Use logon types to map out access pathways for improved access control.<br> \
<b>4.</b> Share suspicious patterns with your security team or SIEM for proactive monitoring.<br> \
<b>5.</b> Refine the query further to filter by time ranges or specific user groups for tailored insights.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security</code><br>       - Searches for events in Windows Security Logs.<br> \
	<b>02</b> <code>action=success Logon_Type=2 (EventCode=4624 OR EventCode=4634 OR ...)</code><br>       - Filters for successful interactive logons and specific event types.<br> \
	<b>03</b> <code>user!="anonymous logon" user!="DWM-*" ...</code><br>       - Excludes irrelevant or system accounts from the search.<br> \
	<b>04</b> <code>| convert timeformat="%a %B %d %Y" ctime(_time) AS Date</code><br>       - Converts timestamps into a readable format titled 'Date'.<br> \
	<b>05</b> <code>| streamstats earliest(_time) AS login, latest(_time) AS logout by Date, host</code><br>       - Identifies start and end times of sessions by host/date.<br> \
	<b>06</b> <code>| eval session_duration=logout-login</code><br>       - Calculates session duration in seconds.<br> \
	<b>07</b> <code>| eval h=floor(session_duration/3600)</code> ...<br>       - Breaks duration into hours and minutes for user-friendly reporting.<br> \
	<b>08</b> <code>| stats count AS auth_event_count, earliest(login) ... by Date, host, user</code><br>       - Aggregates authentication metrics and calculates session metrics per user/host/date.<br>
explanation = <p>This query can be used for <b>auditing</b> and <b>monitoring</b> user activities on Windows systems. It identifies <b>unusual login patterns</b>, detects <b>excessive login attempts</b>, and reviews session duration to uncover <b>potential security issues</b>.</p><p>The query uses several critical SPL commands:</p> \
	<ul><li>The <code>convert</code> command translates timestamps into human-readable formats, making it easier to identify activity trends by date and time.</li> \
	<li>The <code>streamstats</code> command calculates the earliest (login) and latest (logout) timestamps for sessions by date and host, ensuring session tracking accuracy.</li> \
	<li><code>eval</code> functions compute session duration by subtracting login from logout times and format the results into hours/minutes for clarity.</li> \
	<li>The final <code>stats</code> aggregation provides key metrics like authentication event counts, session durations, and login/logout times for each user/host/date combination.</li></ul> \
	<p>These insights are critical for administrators aiming to maintain <b>system security</b> and visibility into user activity.</p>
quid = 8510704F712EE1CE0BAEB352042F1D0D
search_author = GoSplunk: kme723
related_info = <p><a href="https://gosplunk.com/user-logon-logoff-and-duration" target="_blank">https://gosplunk.com/user-logon-logoff-and-duration</a></p>
description = <p>This query tracks <b>user login</b> and <b>logout events</b> from Windows security logs.</p> \
	<p>It calculates the <b>session duration</b> and provides a count of <b>authentication events</b> for each user, host, and date.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security action=success Logon_Type=2 (EventCode=4624 OR EventCode=4634 OR EventCode=4779 OR EventCode=4800 OR EventCode=4801 OR EventCode=4802 OR EventCode=4803 OR EventCode=4804 ) user!="anonymous logon" user!="DWM-*" user!="UMFD-*" user!=SYSTEM user!=*$ (Logon_Type=2 OR Logon_Type=7 OR Logon_Type=10)\
	| convert timeformat="%a %B %d %Y" ctime(_time) AS Date\
	| streamstats earliest(_time) AS login, latest(_time) AS logout by Date, host\
	| eval session_duration=logout-login\
	| eval h=floor(session_duration/3600)\
	| eval m=floor((session_duration-(h*3600))/60)\
	| eval SessionDuration=h."h ".m."m "\
	| convert timeformat=" %m/%d/%y - %I:%M %P" ctime(login) AS login\
	| convert timeformat=" %m/%d/%y - %I:%M %P" ctime(logout) AS logout\
	| stats count AS auth_event_count, earliest(login) as login, max(SessionDuration) AS sesion_duration, latest(logout) as logout, values(Logon_Type) AS logon_types by Date, host, user

[user_logon_session_duration_1]
search_name = User Session Analysis with Duration and Logon Type
search_hidden = 0
category = Security
sub_category = Access
tags = Authentication,Users
solution = <p>This query delivers a detailed understanding of user access on critical systems, highlighting potential anomalies such as unusually long or irregular logons.</p><p>By surfacing user session data aligned with logon types and durations, organizations can enhance their awareness of access behavior and strengthen their security monitoring practices.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the table for unusually long or suspicious logon sessions.<br><b>2.</b> Investigate logon events during non-working hours for potential unauthorized activity.<br><b>3.</b> Correlate findings with other security logs to verify authenticity.<br><b>4.</b> Set up alerts for prolonged sessions or high-frequency logons.<br><b>5.</b> Use insights to optimize access policies and improve system monitoring.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>search index="<<index>>" source=*WinEventLog:Security</code><br>       - Filter the Windows Security Event Log for required EventCodes and Logon_Types.<br><b>02</b> <code>eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Format the timestamp into a readable date format.<br><b>03</b> <code>eval LogonType=case(...)</code><br>       - Translate numeric Logon_Type values into human-readable categories.<br><b>04</b> <code>transaction host User startswith=EventCode=528 endswith=EventCode=538</code><br>       - Combine logon and logoff events into single transactions grouped by host and user.<br><b>05</b> <code>where duration > 5</code><br>       - Exclude short sessions to maintain data relevance.<br><b>06</b> <code>eval duration = duration/60</code><br>       - Calculate session duration in minutes.<br><b>07</b> <code>eval duration=round(duration,2)</code><br>       - Round session duration to two decimal places for clarity.<br><b>08</b> <code>table host, User, LogonType, duration, Date</code><br>       - Display relevant details in an organized table format.<br><b>09</b> <code>rename duration as "Session Duration in Minutes"</code><br>       - Rename the duration column for better understanding.<br><b>10</b> <code>sort - date</code><br>       - Arrange the results in descending order by date.<br>
explanation = <p>This query offers an insightful breakdown of user activity by analyzing Windows Security Event Log data.</p><p>Initially, it identifies <b>EventCodes</b> for successful logon (528) and logoff (538), along with filtering for specific <b>Logon_Type</b> values (2 for local console access and 10 for remote desktop). Using the 'transaction' command, it links these events by host and user to form a <b>continuous session</b>, beginning with a logon and concluding with a logoff.</p><p>Further steps refine the data by filtering sessions lasting less than five seconds, calculating and rounding durations, and presenting the information in a clearly structured table highlighting session details. A concluding sort ensures visibility into <b>recent activity trends</b> for faster operational or security review.</p>
quid = 8D296DFB5BA287BF33B1A87E22C17EBE
search_author = GoSplunk: SplunkNinja
related_info = <p><a href="https://gosplunk.com/user-logon-session-duration" target="_blank">https://gosplunk.com/user-logon-session-duration</a></p>
description = <p>Summarizes <b>User Session Analysis with Duration and Logon Type</b> using <code>index="<<index>>" source=*WinEventLog:Security (EventCode=528 OR EventCode=538) (Logon_Type=2 OR Logon_Type=10)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" source=*WinEventLog:Security (EventCode=528 OR EventCode=538) (Logon_Type=2 OR Logon_Type=10)\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| eval LogonType=case (Logon_Type="2", "Local Console Access", Logon_Type="10", "Remote Desktop via Terminal Services")\
	| transaction host User startswith=EventCode=528 endswith=EventCode=538\
	| where duration > 5\
	| eval duration = duration/60\
	| eval duration=round(duration,2)\
	| table host, User, LogonType, duration, Date\
	| rename duration as "Session Duration in Minutes"\
	| sort - date

[users_accessing_multiple_atms_simultaneously]
search_name = Users Accessing Multiple ATMs Simultaneously
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = ATM,Detail,Fraud
solution = <p>This SPL flags accounts performing ATM withdrawals from multiple locations in rapid succession. <b>Suggested Actions</b></p><p>1. Review flagged accounts for card sharing or compromise.<br>2. Correlate with other ATM or account alerts.<br>3. Alert fraud teams for possible rapid ATM risk.<br>4. Integrate with ATM security dashboards.<br>5. Adjust time windows as fraud patterns evolve.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Selects all ATM withdrawal transactions.<br><b>02</b> <code>| streamstats time_window=1m dc(location) AS dc list(amount) AS amount list(location) AS location earliest(_time) AS epoch latest(_time) AS latest_epoch BY account_number</code><br>      - Calculates location/amount lists and time bounds in 1-minute windows.<br><b>03</b> <code>| where dc > 1</code><br>      - Flags accounts accessing more than one ATM location in a minute.<br><b>04</b> <code>| eval first_time=if(isnull(epoch), "N/A", strftime(epoch, "%m/%d/%y %H:%M:%S"))</code><br>      - Formats the earliest timestamp.<br><b>05</b> <code>| eval last_time=if(isnull(latest_epoch), "N/A", strftime(latest_epoch, "%m/%d/%y %H:%M:%S"))</code><br>      - Formats the latest timestamp.<br><b>06</b> <code>| table account_number, amount, transaction_type, location, first_time, last_time</code><br>      - Outputs summary fields for review.
explanation = <p>This SPL uses <b>streamstats</b> to track the distinct count of ATM locations and withdrawal amounts per account in rolling 1-minute windows. Accounts with a distinct count above 1 are flagged as accessing multiple locations nearly simultaneously. The query converts event times to readable fields and outputs summarized activity for investigation. This technique is effective for detecting possible account compromise, card sharing, or advanced ATM fraud patterns.</p>
quid = 56810231F76F357A330FC2827A6BC2AC
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/streamstats" target="_blank">Splunk Docs: streamstats command</a><br>Rolling statistics and distinct count calculations.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/table" target="_blank">Splunk Docs: table command</a><br>Formatting output for review.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>ATM and account anomaly monitoring use cases.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Best practices for ATM fraud detection.</li></ul>
description = <p>Identifies accounts performing ATM withdrawals from multiple locations within the same minute window, which may indicate card sharing or suspicious activity. Surfaces account activity with more than one location accessed in a short time span for further review.</p>
search = index="*" sourcetype="*" transaction_type=withdrawal\
	| streamstats time_window=1m dc(location) AS dc list(amount) AS amount list(location) AS location earliest(_time) AS epoch latest(_time) AS latest_epoch BY account_number\
	| where dc > 1\
	| eval first_time=if(isnull(epoch), "N/A", strftime(epoch, "%m/%d/%y %H:%M:%S"))\
	| eval last_time=if(isnull(latest_epoch), "N/A", strftime(latest_epoch, "%m/%d/%y %H:%M:%S"))\
	| table account_number, amount, transaction_type, location, first_time, last_time

[users_by_search_time]
search_name = Users by Search Time
version = 2.x
date_created = 2025-11-05
category = Splunk
sub_category = _audit
tags = Audit,Performance,Users
solution = <p>This search identifies ad-hoc search behavior trends by user, offering a powerful view into usage hotspots and outliers. It helps prioritize education, automation, and tuning of Splunk queries across teams.</p><p><b>Suggested Actions</b><br><b>1.</b> Review top users by median search time.<br><b>2.</b> Coach users with consistent high-latency queries.<br><b>3.</b> Promote scheduled searches to replace heavy ad-hoc usage.<br><b>4.</b> Detect misuse of SPL on large time spans.<br><b>5.</b> Correlate user behavior with system performance incidents.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_audit action=search (id=* OR search_id=*)</code><br>       - Retrieves audit events for executed searches.<br><b>02</b> <code>| eval search_id = if(isnull(search_id), id, search_id)</code><br>       - Normalizes search ID format.<br><b>03</b> <code>| replace '*' with * in search_id</code><br>       - Cleans wildcards for accurate matching.<br><b>04</b> <code>| rex "
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li><li><a href="https://www.splunk.com/en_us/get-started.html" target="_blank">Products: Entry point for getting started with Splunk products</a><br>Entry point for getting started with Splunk products.</li><li><a href="https://www.splunk.com/en_us/get-started/enterprise.html" target="_blank">Products: Getting started guide for Splunk Enterprise</a><br>Getting started guide for Splunk Enterprise.</li></ul>
explanation = <p>This search focuses on extracting and analyzing ad-hoc user searches from the <code>_audit</code> index. By handling both <code>id</code> and <code>search_id</code> formats, it standardizes search tracking. It excludes scheduled searches and internal search patterns, filters out noise, and focuses on <b>user-generated, resource-intensive SPL</b>.</p><p>Metrics like median and 95th percentile search time per user and host identify search behavior patterns and allow targeting of optimizations. For junior engineers, this teaches <b>conditional field logic</b>, <b>stats aggregation</b>, and how to normalize logs for cross-format consistency.</p>
quid = 5D9CEF54CA6DB56ECFD59DBC35BF759F
search_author = grdhg24
description = <p><b>Profiles user-initiated ad-hoc searches</b> across all search heads to analyze frequency, volume, and performance. This search helps admins understand <b>who is running the most expensive searches</b> and which users may benefit from SPL coaching or scheduled query migration.</p>
search = index="_audit" action=search (id=* OR search_id=*) \
	| eval search_id = if(isnull(search_id), id, search_id) \
	| replace '*' with * in search_id \
	| rex "search='(?<search>.*?)', autojoin" \
	| search search_id!=scheduler_* \
	| convert num(total_run_time) \
	| rex "\,\s+user=(?<user>\S+)," \
	| eval user = if(user="n/a", null(), user) \
	| stats min(_time) as _time first(user) as user max(total_run_time) as total_run_time first(search) as search by search_id host \
	| search search=search* search!=*_internal* search!=*_audit* \
	| stats median(total_run_time) as "Median search time" perc95(total_run_time) as "95th Percentile search time" sum(total_run_time) as "Total search time" count as "Search count" max(_time) as "Last use" by user host \
	| fieldformat "Last use" = strftime('Last use', "%F %T.%Q %:z") \
	| rename host AS "Search Head" \
	| sort - "Median search time"

[users_running_realtime_searches]
search_name = Users Running Real‑Time Searches
version = 2.x
date_created = 2025‑10‑20
category = Splunk
sub_category = Performance
tags = Concurrency,Detail,Hutch,Realtime
solution = <p>This search helps you identify time periods when the number of real‑time searches reached peaks, which may correlate with performance degradation, search head strain, or licensing pressures. Tracking this allows you to operationally tune real‑time search usage, allocate resources, and balance load across search heads.</p><p><b>Suggested Actions</b><br><b>1.</b> Review time intervals where “Max Real‑Time Searches” spikes significantly<br><b>2.</b> Correlate peaks with search head CPU/memory usage and user activity<br><b>3.</b> Determine if any scheduled or ad‑hoc real‑time searches are redundant or can be rescheduled<br><b>4.</b> Establish rate‑limiting or governance for highly frequent real‑time dashboards or searches<br><b>5.</b> Monitor this metric over time and set a baseline for what is ‘normal’ versus ‘excessive’ concurrency</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal host=acdc‑sec‑splk‑shcp2.cdc.gov source=*metrics.log group=search_concurrency "system total" NOT user=*</code><br>       - Retrieve metrics entries for search concurrency on the target host, excluding user‑initiated searches<br><b>02</b> <code>| timechart max(active_realtime_searches) AS "Max Real‑Time Searches"</code><br>       - Create a time series of the maximum real‑time searches over each interval<br>
explanation = <p>The query scans <b>index=_internal</b> for entries in the <b>metrics.log</b> source with <b>group="search_concurrency"</b>, filtered to the specific host <b>acdc‑sec‑splk‑shcp2.cdc.gov</b>. It excludes events where <b>user=*</b> to focus on system‑initiated searches. By aggregating results with the <b>timechart max(active_realtime_searches)</b> command, this search highlights the <b>peak real‑time search load</b> for each time interval. This is critical to understanding how real-time searches may affect resource allocation, search head performance, and system stability. Addressing high concurrency ensures consistent performance and avoids resource saturation that could disrupt operations.</p>
quid = F69ABAAFF18D177E83FCBFC7BBF15FFF
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/what-data-is-in-the-internal-indexes" target="_blank">Splunk Docs: About metrics.log</a><br>Explains what metrics.log is and how metrics groups like search_concurrency are recorded.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-search-how-many-concurrent-searches-adhoc-report-summary-etc/m-p/244223" target="_blank">Splunk Community: How to search how many concurrent searches (adhoc/report/summary)</a><br>Community solution referencing the active_realtime_searches field in search_concurrency.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/timechart" target="_blank">Splunk Docs: timechart command reference</a><br>Describes the timechart command used to analyze temporal metrics.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Does-anyone-know-what-the-metric-quot-active-searches-quot-in/m-p/121242" target="_blank">Splunk Community: Interpreting active_searches in logs</a><br>Provides context around monitoring active searches using metrics and log data.</li></ul>
description = <p>Summarizes <b>Users Running Real‑Time Searches</b> using <code>index="_internal" host=acdc‑sec‑splk‑shcp2.cdc.gov source=*metrics.log group=search_concurrency "system total" NOT user=</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="_internal" host=acdc‑sec‑splk‑shcp2.cdc.gov source=*metrics.log group=search_concurrency "system total" NOT user=* \
	| timechart max(active_realtime_searches) AS "Max Real‑Time Searches"

[using_built_in_anomaly_detection]
search_name = Using Built-In Anomaly Detection
version = 1.0.3
date_created = 2025-05-12 14:07:54
date_updated = 2025-7-2 14:56:16
category = Threat Hunter's Cookbook
sub_category = Forecasting and anomaly detection
tags = Anomaly Detection,Forecasting
solution = <p><b>Operational Insight:</b> This search leverages Splunk's built-in statistical tools to help analysts detect unusual login patterns, especially valuable for identifying potential threat actors or unexpected user behavior. It highlights logins that significantly deviate from the norm either via probabilistic anomaly detection or manually set thresholds using the IQR method.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate user activity flagged as anomalous, focusing on deviations from typical login behavior.<br><b>2.</b> Cross-reference flagged events with historical data to assess whether they relate to potential security events.<br><b>3.</b> Adjust thresholds or methods to fine-tune anomaly detection based on operational needs.<br><b>4.</b> Incorporate findings into broader threat hunting frameworks to refine detection schemes.<br><b>5.</b> Apply the learnings to monitor other critical accounts or broader user bases.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>The <b>anomalydetection</b> command utilizes built-in statistical models to identify outliers in data. These outliers are events or values that statistically depart from expected behavior, flagged based on probability calculations. The command can operate in various modes, such as histogram analysis, Z-Score, or IQR-based methods, allowing flexibility in detecting anomalies.</p><p>For instance, the SPL highlights time-based anomalies in Windows Security logs (EventCode=4624, a successful logon event). By integrating the <b>timechart</b> command, login activities are aggregated into 1-hour spans, facilitating temporal analysis of abnormal login attempts. The probability-based <b>anomalydetection</b> command is then used to detect significant deviations.</p><p>Alternatively, the query allows users to apply manual thresholds for defining outlier behavior using methods like the Interquartile Range (IQR). The combination of <b>eventstats</b>, <b>eval</b>, and logical checks enables precise customization of thresholds and control over factors leading to anomaly classification.</p><p>Such searches help threat hunters proactively identify indicators of compromise, unauthorized access attempts, or unexpected system usage, providing immediate insights into underlying adverse activities.</p>
quid = 7FF900CC5E35E213646F62DB6D4CB080
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook-style structure. The cookbook provides novel contributions to threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Using Built-In Anomaly Detection</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4624 Account_Name=buttercup</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4624 Account_Name=buttercup</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>timechart span=1h count</code><br>       - Summarize the selected metric over time for trend analysis.<br><b>03</b> <code>anomalydetection</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>04</b> <code>eventstats avg("_time") as avg stdev("_time") as stdev</code><br>       - Compute summary statistics and add them back to each matching event.<br><b>05</b> <code>eval lowerBound=(avg-stdev*exact(2)), upperBound=(avg+stdev*exact(2))</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>06</b> <code>eval isOutlier=if('_time' < lowerBound OR '_time' > upperBound, 1, 0)</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>07</b> <code>table _time, isOutlier, body</code><br>       - Format the final output columns for review or dashboard use.<br>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4624 Account_Name=buttercup \
	| timechart span=1h count \
	| anomalydetection \
	``` OR index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4624 \
	| eventstats avg("_time") as avg stdev("_time") as stdev \
	| eval lowerBound=(avg-stdev*exact(2)), upperBound=(avg+stdev*exact(2)) \
	| eval isOutlier=if('_time' < lowerBound OR '_time' > upperBound, 1, 0) \
	| table _time, isOutlier, body```

[using_eval_to_tag_network_traffic_as_internal_or_external]
search_name = Using Eval to Tag Network Traffic as Internal or External
version = 1.0.2
date_created = 2025-05-05 11:15:12
date_updated = 2025-7-2 14:42:1
category = Threat Hunter's Cookbook
sub_category = Searching and Filtering
tags = Dynamic Field Generation,Network Traffic
solution = <p>By using this search, you can gain insights into network traffic patterns, enabling more effective security management and incident response.</p><p><b>Suggested Actions</b><br><b>1.</b> Review traffic classified as 'external' to identify potential threats.<br><b>2.</b> Use the results to refine security policies and improve firewall rules.<br><b>3.</b> Monitor changes in 'internal' versus 'external' traffic over time.<br><b>4.</b> Correlate with other data sources to enhance situational awareness.<br><b>5.</b> Generate reports for stakeholders to show network security posture.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>The <b>eval</b> command is used to compute the value of an expression and assign it to a new or existing field. It's versatile, supporting arithmetic, string, and conditional operations. In this specific search, we use <code>cidr_match</code> to determine if the source IP falls within the internal network range (10.0.0.0/8). The outcome—either 'internal' or 'external'—is assigned to the <code>source_zone</code> field, helping to differentiate traffic for further analysis. This technique benefits security analysts by making it easier to apply rules or alerts to specific traffic types.</p>
quid = 7801D7D7A5C12FE4FB3B81DAD2D9DA07
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Using Eval to Tag Network Traffic as Internal or External</b> using <code>index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>eval source_zone=if(cidrmatch("10.0.0.0/8", src_ip), "internal", "external")</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br>
search = index="<<index>>" \
	| eval source_zone=if(cidrmatch("10.0.0.0/8", src_ip), "internal", "external")

