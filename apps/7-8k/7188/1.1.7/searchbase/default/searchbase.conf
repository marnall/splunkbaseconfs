| search "cron_schedule"="*/*"| table title,cron_schedule,author

[retention_period_in_days_per_index]
search_name = Index Retention Period in Days
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexes
solution = <p>This search provides visibility into <b>data retention configurations</b>, helping manage storage and ensure compliance.</p><p><b>Suggested Actions</b><br><b>1.</b> Review retention periods against compliance requirements.<br><b>2.</b> Identify indexes with excessive or insufficient retention.<br><b>3.</b> Plan storage capacity based on retention settings.<br><b>4.</b> Document retention policies for audit purposes.<br><b>5.</b> Coordinate with stakeholders on retention period adjustments.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest splunk_server=* /services/data/indexes</code><br>       - Use the REST API to retrieve information about all indexes from all Splunk servers.<br><b>02</b> <code>| join type=outer title</code><br>       - Join the data from the previous command with the data from the next command, based on the 'title' field. All records from both data sets are included, even if they don't match.<br><b>03</b> <code>[ | rest splunk_server=* /services/data/indexes-extended]</code><br>       - Retrieve extended information about all the indexes. This data is joined with the previous command's data.<br><b>04</b> <code>| eval retentionInDays=frozenTimePeriodInSecs/86400</code><br>       - Create 'retentionInDays' by dividing 'frozenTimePeriodInSecs' by 86400 (seconds in a day), converting the retention period from seconds to days.<br><b>05</b> <code>| table title retentionInDays</code><br>       - Display a table with 'title' and 'retentionInDays'.<br>
explanation = <p>This query is useful for understanding the configuration of your Splunk environment, specifically the retention periods of your indexes. This can help in <b>managing storage</b> and <b>ensuring compliance</b> with data retention policies. By converting retention periods to days, the query provides a clear and actionable overview of your data storage strategy.</p>
quid = 242B89B49F3A2FDA7847AE63FC6ABDDD
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/retention-period-in-days-per-index" target="_blank">https://gosplunk.com/retention-period-in-days-per-index</a></p>
description = <p>This query is <b>retrieving</b> information about all the indexes in the Splunk environment, including their retention periods in days. It provides <b>valuable insights</b> for managing storage and ensuring data is retained for the necessary amount of time for compliance or analysis purposes.</p>
search = | rest splunk_server=* /services/data/indexes\
	| join type=outer title [\
	| rest splunk_server=* /services/data/indexes-extended]\
	| eval retentionInDays=frozenTimePeriodInSecs/86400\
	| table title retentionInDays

[return_rare_value_url_field]
search_name = Rarely Accessed URLs in a Specific Index and Sourcetype
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,SFU
solution = <p>This search identifies <b>rarely accessed URLs</b>, which may indicate suspicious activity or infrequently used resources.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate rare URLs for potential security threats.<br><b>2.</b> Review for signs of reconnaissance or probing activity.<br><b>3.</b> Identify unused pages for potential cleanup.<br><b>4.</b> Correlate with user activity for context.<br><b>5.</b> Set up alerts for access to known-sensitive rare URLs.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" access*</code><br>       - Searches for logs in the specified index and sourcetype containing 'access'.<br><b>02</b> <code>| fields url</code><br>       - Extracts the 'url' field from the logs.<br><b>03</b> <code>| rare url</code><br>       - Returns the least frequently occurring URLs, highlighting rare access.</b><br>
explanation = <p>This query helps in identifying <b>rare</b> or infrequent access to specific URLs, which can indicate unusual activity or potential security threats. By focusing on the 'access' entries in the logs, it targets areas that might require further investigation. The usage of the <code>rare</code> command highlights rarely accessed URLs, making it easier for security teams to prioritize their actions.</p>
quid = 5A4952284B9FE37FBFA0AA4ACB11FDB7
search_author = grdhg24
