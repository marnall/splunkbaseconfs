[queries_executed_in_dbconnect]
search_name = Audit Trail: User Database Connection and Query Actions
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This search offers a detailed perspective on database activity within Splunk. By observing user behaviors and queries, it helps in reinforcing <b>system security</b>, optimizing <b>resource utilization</b>, and detecting <b>performance bottlenecks</b>.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate unusual or unexpected users executing database queries.<br><b>2.</b> Audit complex or resource-heavy queries to ensure system performance is not degraded.<br><b>3.</b> Reassess permissions of users generating questionable queries.<br><b>4.</b> Use decoded query data for further troubleshooting or optimization.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_audit sourcetype=audittrail action="db_connect_execute_query"</code><br>       - This line searches the _audit index for events where the sourcetype is 'audittrail' and the action is 'db_connect_execute_query'.<br><b>02</b> <code>| rex "user=(?<user>\s+),\s"</code><br>       - Extracts the user from the event data using a regular expression.<br><b>03</b> <code>| rex mode=sed "s/%20/ /g"</code><br>       - Decodes URL-encoded spaces (%20) into their original form.<br><b>04</b> <code>| rex mode=sed "s/%5D/]/g"</code><br>       - Replaces %5D with the closing bracket (]).<br><b>05</b> <code>| rex mode=sed "s/%5B/[/g"</code><br>       - Replaces %5B with the opening bracket ([).<br><b>06</b> <code>| rex mode=sed "s/%3D/=/g"</code><br>       - Decodes equal signs (%3D) back to their original form.<br><b>07</b> <code>| rex mode=sed "s/%0A/ /g"</code><br>       - Replaces newlines (%0A) with spaces.<br><b>08</b> <code>| rex mode=sed "s/%2C/,/g"</code><br>       - Decodes commas (%2C).<br><b>09</b> <code>| rex mode=sed "s/%2F/\\//g"</code><br>       - Replaces %2F with forward slashes (/).<br><b>10</b> <code>| rex mode=sed "s/%22/\"/g"</code><br>       - Decodes quotation marks (%22) back to their original form.<br><b>11</b> <code>| rex "\sREST:\s\\/db_connect\\/query\\/.+SELECT(?<DB_Query>.+)].\w\s\w]"</code><br>       - Extracts the database query from the event data.<br><b>12</b> <code>| table timestamp user DB_Query</code><br>       - Displays the timestamp, user, and database query in a table format.<br>
explanation = <p>This query provides an <b>auditing mechanism</b> to track database activity in real-time. By identifying <b>who</b> is executing queries, <b>what</b> the queries are, and <b>when</b> they occur, it enables the analysis of behaviors such as potentially malicious activities or system misuse. Additionally, the data can help troubleshoot system performance by correlating heavy usage periods with query execution.</p><p>The regular expressions (<code>rex</code>) and URL-decoding steps standardize and clean the event data for easier interpretation, ensuring the extracted details like user IDs and query text are human-readable. The final step organizes the extracted metadata into a clear, actionable table for further analysis.</p>
quid = B6C7D8E9F0A1B2C3D4E5F6A7B8C9D0E1
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/queries-executed-dbconnect" target="_blank">https://gosplunk.com/queries-executed-dbconnect</a></p>
description = <p>Summarizes <b>Audit Trail: User Database Connection and Query Actions</b> using <code>index=_audit sourcetype=audittrail action="db_connect_execute_query"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_audit sourcetype=audittrail action="db_connect_execute_query"\
	| rex "user=(?<user>\s+),\s"\
	| rex mode=sed "s/%20/ /g"\
	| rex mode=sed "s/%5D/]/g"\
	| rex mode=sed "s/%5B/[/g"\
	| rex mode=sed "s/%3D/=/g"\
	| rex mode=sed "s/%0A/ /g"\
	| rex mode=sed "s/%2C/,/g"\
	| rex mode=sed "s/%2F/\\//g"\
	| rex mode=sed "s/%22/\"/g"\
	| rex "\sREST:\s\\/db_connect\\/query\\/.+SELECT(?<DB_Query>.+)].\w\s\w]"\
	| table timestamp user DB_Query

[query_for_when_powershell_execution_policy_is_set_to_bypass]
search_name = PowerShell Execution Policy Registry Changes
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = Servers
tags = Access,GoSplunk
solution = <p>This search monitors <b>PowerShell execution policy changes</b>, which can indicate potential security risks or policy violations.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any changes to the execution policy that were not authorized.<br><b>2.</b> Alert on execution policy changes to 'Bypass' or 'Unrestricted'.<br><b>3.</b> Correlate with user activity to identify who made the changes.<br><b>4.</b> Review organizational policies regarding PowerShell execution settings.<br><b>5.</b> Consider implementing group policies to enforce execution policy settings.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'index=<<index>>' part specifies the index where the data is being pulled from.</ul><ul>key_path=HKLMsoftwaremicrosoftpowershell1shellidsmicrosoft.powershellexecutionpolicy' further filters the data to only include events related to the specified registry key path.</ul><ul>sourcetype=WinRegistry' filters the data to only include Windows Registry events.</ul><ul>| rename host as Host, registry_type as Action, registry_value_data as Registry Value, registry_value_name as Registry Value Name' renames the fields in the table for better readability.}</ul><ul>| table _time, host, registry_type, registry_value_data, registry_value_name' creates a table with the specified fields.</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor changes in the PowerShell execution policy on Windows hosts. This could be useful for security monitoring, as changes to the execution policy could indicate malicious activity.</div></div>
quid = 86CC2F08BC13EF582AB62577FA42F370
search_author = GoSplunk: rsanchez
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/query-for-when-powershell-execution-policy-is-set-to-bypass" target="_blank">https://gosplunk.com/query-for-when-powershell-execution-policy-is-set-to-bypass</a></p>
description = <p>This query <b>identifies</b> specific Windows Registry key paths related to the PowerShell execution policy.</p> \
	<p>It then produces a table showing the <b>event time</b>, host, registry type, registry value data, and registry value name. Additionally, it <b>enhances readability</b> by renaming some fields.</p>
search = index="<<index>>" sourcetype=WinRegistry key_path="HKLM\\software\\\microsoft\\\powershell\\\1\\shellids\\\microsoft.powershell\\\executionpolicy"\
	| table _time, host, registry_type, registry_value_data, registry_value_name\
	| rename host as Host, registry_type as Action, registry_value_data as "Registry Value", registry_value_name as "Registry Value Name"

[quickly_list_available_sourcetypes_and_their_fields]
