[extracting_ip_matching_for_targeted_analysis]
search_name = Extracting IP Matching for Targeted Analysis
version = 1.0.2
date_created = 2025-05-05
date_updated = 2025-07-02
category = Threat Hunter's Cookbook
sub_category = Searching and Filtering
tags = TERM Function,Wildcard Matching
solution = <p>This query provides operational insight by allowing analysts to quickly identify events that match a specific IP pattern or subnet. This capability is essential for identifying anomalies, potential threats, and malicious activities.</p><p><b>Suggested Actions</b><br><b>1.</b> Use this query to monitor specific IP subnets regularly for unauthorized access.<br><b>2.</b> Combine this search with additional filters to refine results further for known anomalies.<br><b>3.</b> Save and schedule alerts based on important matches.<br><b>4.</b> Extend this technique to efficiently search other fields in your environment.<br><b>5.</b> Incorporate results into broader threat hunting dashboards for centralized monitoring.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Limits the search to the specified index.<br><b>02</b> <code>TERM("10.9.165.")</code><br>       - Searches for events where the exact string "10.9.165." appears, treating the pattern as a single term for accuracy.<br>
explanation = <p>This search primarily focuses on efficiently and precisely matching IP addresses or subnets in event data with the help of the TERM function. The TERM directive treats input string patterns like "10.9.165.*" as a single term, which ensures that the periods are not interpreted as delimiters. Additionally, it avoids tokenized searches that may yield unrelated results. This is highly beneficial for analysts who need exact matches for critical fields like source or destination IP addresses. For example, a TERM search for "10.9.165." limits results to events containing this subnet structure and improves query performance. Leveraging TERM helps save valuable time during threat investigation and ensures greater reliability in filtering IP-specific activity.</p>
quid = 46ACE2677CE34496D92B8F3FBCC193A9
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Extracting IP Matching for Targeted Analysis</b> using <code>index="<<index>>" TERM("10.9.165.")</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" TERM("10.9.165.")

[extracting_json_for_clean_analysis]
search_name = Extracting JSON for Clean Analysis
version = 1.0.3
date_created = 2025-05-12 14:09:07
date_updated = 2025-7-2 14:26:8
category = Threat Hunter's Cookbook
sub_category = Searching and Filtering
tags = JSON,Pattern Matching
solution = <p>This search enables you to identify and cleanly parse nested <b>JSON</b> fields, facilitating improved threat analysis, compliance checks, and operational monitoring in Splunk. Parsing JSON with commands like <b>fromjson</b> removes the manual burden of interpreting complex structures, helping you focus on actionable insights.</p><p><b>Suggested Actions</b><br><b>1.</b> Ensure the JSON structures targeted by this search are properly indexed and time-aligned.<br><b>2.</b> Adapt the spath path to match specific parent-level fields relevant to your analysis.<br><b>3.</b> Validate the split and parsed fields to confirm data consistency.<br><b>4.</b> Use the clean fields to create focused dashboards or alerts specific to compliance or security needs.<br><b>5.</b> Leverage insights gained from clean JSON data for proactive decision-making in security group configurations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=aws:config (source=*ConfigSnapshot* OR source=*ConfigHistory*) _index_earliest=-48h earliest=0 asset_type=*EC2* TERM(arn:aws:ec2:us-east-2:xxxxx:security-group/sg-xxxxx)</code><br>       - Use a targeted filter to narrow down AWS Config data relevant to EC2 security groups, ensuring faster search times and focused results.<br><b>02</b> <code>| spath path=configuration.ipPermissionsEgress{} output=foo</code><br>       - Extract data from the specified JSON path into a new field named "foo."<br><b>03</b> <code>| table index foo</code><br>       - Display the extracted data in a tabular format to confirm its integrity.<br><b>04</b> <code>| mvexpand foo</code><br>       - Expand the multi-value field "foo" into multiple events to simplify downstream processing.<br><b>05</b> <code>| fromjson foo</code><br>       - Parse the JSON string in field "foo" into simple fields for ease of use.<br><b>06</b> <code>| fields - foo</code><br>       - Drop the intermediate "foo" field to declutter the search results.<br>
explanation = <p>This search focuses on processing <b>JSON</b> data often encountered in sources such as AWS Config. These JSON structures sometimes contain deeply nested or multi-value fields, which can complicate filtering and representation. For example, AWS security group configurations often appear as lists of dictionaries. Common missteps include using <b>mvexpand</b> incorrectly, leading to disjointed field associations. By employing <b>spath</b>, the search pinpoints JSON paths to extract the desired elements, and <b>fromjson</b> automatically parses key-value pairs into individual Splunk fields. This reduces errors, facilitates easier filtering, and prepares the data for meaningful threat-hunting and compliance monitoring activities.</p>
quid = 08573B810262D9FA55F1DA6EFEF641A7
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Extracting JSON for Clean Analysis</b> using <code>index="<<index>>" sourcetype=aws:config (source=*ConfigSnapshot* OR source=*ConfigHistory*) _index_earliest=-48h earlies</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=aws:config (source=*ConfigSnapshot* OR source=*ConfigHistory*) _index_earliest=-48h earliest=0 asset_type=*EC2* TERM(arn:aws:ec2:us-east-2:xxxxx:security-group/sg-xxxxx) \
	| spath path=configuration.ipPermissionsEgress{} output=foo \
	| table index foo \
	| mvexpand foo \
	| fromjson foo \
	| fields - foo

[extracting_strings_to_filter_specific_network_range]
