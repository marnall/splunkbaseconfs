execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> | tstats values(sourcetype) as Sourcetype latest(_time) as Time groupby index <br />- This line is using the 'tstats' command to retrieve the values of 'sourcetype' and the latest '_time' for each 'index'. The 'tstats' command is a statistical command that operates on indexed fields and is faster than the 'stats' command. 'Sourcetype' and 'Time' are the new fields created to hold these values.</ul><ul><b>02</b> | convert ctime(Time) <br />- This line is converting the 'Time' field from epoch format to a human-readable format using the 'convert ctime' command. The 'ctime' function converts epoch time to string format.}</ul></ol></div></div>
