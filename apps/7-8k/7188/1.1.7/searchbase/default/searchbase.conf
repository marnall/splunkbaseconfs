execution_plan = <b>01</b> <code>index=<<index>> sourcetype=Perfmon:Free Disk Space</code><br>       - This line is specifying the data source. It's looking at the specified index and the sourcetype 'Perfmon:Free Disk Space'.<br><b>02</b> <code>| bucket _time span=1d</code><br>       - This line is grouping the events into buckets based on the time they occurred. Each bucket represents one day.<br><b>03</b> <code>| eval gigabytes=(Value/1024)</code><br>       - This line is creating a new field called 'gigabytes' which is the value of the 'Value' field divided by 1024. This is converting the disk space from megabytes to gigabytes.<br><b>04</b> <code>| stats avg(gigabytes) by _time</code><br>       - This line is calculating the average value of the 'gigabytes' field for each time bucket. This gives the average free disk space for each day.<br>
explanation = <p>This query provides insights into the <b>average daily free disk space</b> on a Windows box. By leveraging the Perfmon:Free Disk Space sourcetype, it calculates daily averages after grouping the data into day-long buckets and converting the data to gigabytes for consistency in measurement. This analysis is particularly useful for monitoring <b>disk usage trends</b>, identifying potential <b>capacity issues</b>, and proactively addressing <b>unusual spikes</b> or <b>drops in available space</b>. For capacity planning, this query helps to forecast disk utilization and make informed decisions about storage expansion.</p>
