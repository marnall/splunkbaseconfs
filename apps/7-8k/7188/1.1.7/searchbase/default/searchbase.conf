[splunkd_cloud_restarts_triggered_by_config_file_changes_during_app_installations2]
search_name = Splunkd Cloud Restarts Triggered by Config File Changes During App Installations
version = 1.0.2
date_created = 2024-5-6 13:30:48
date_updated = 2024-5-6 13:32:27
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Restarts
solution = <p>This query provides insights into the stability and performance of Splunk Cloud during app installations by revealing the frequency and duration of restarts related to configuration changes. Keeping track of these events ensures efficient resource utilization and prevents extended downtimes.</p><p><b>Suggested Actions</b><br><b>1.</b> Review installation processes that trigger frequent or lengthy restarts.<br><b>2.</b> Consider optimizing or staggering app deployments to prevent simultaneous restarts.<br><b>3.</b> Analyze total elapsed times to identify any unusual patterns indicating issues.<br><b>4.</b> Set alerts for events with unusually long shutdown or startup times to initiate troubleshooting.<br><b>5.</b> Regularly check for new updates or patches that might address configuration-related restart issues.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd (component=ServerConfig AND event_message="*My GUID is*") OR (component=Shutdown AND event_message="*Shutdown complete*")</code><br>       - This pulls logs related to server configuration and shutdown events from internal logs.<br><b>02</b> <code>| fields _time host component event_message name</code><br>       - Filter essential fields to streamline output processing.<br><b>03</b> <code>| rex field=_raw "Shutdown complete in\s+(?<shutdown_time_sec>\d+.\d+)"</code><br>       - Extracts shutdown duration from raw logs.<br><b>04</b> <code>| eval startup_time = if(match(event_message, "My GUID is"), _time, null()), shutdown_time = if(match(event_message, "Shutdown complete"), _time, null())</code><br>       - Calculates timestamps for start and shutdown events.<br><b>05</b> <code>| stats count latest(_time) as _time latest(shutdown_time_sec) as shutdown_time_sec values(*) as * latest(startup_time) as startup_time latest(shutdown_time) as shutdown_time by host component event_message</code><br>       - Consolidates the timestamps and shutdown duration per host.<br><b>06</b> <code>| eventstats latest(shutdown_time) as shutdown_time latest(startup_time) as startup_time by host</code><br>       - Propagates the latest start and shutdown times to related events.<br><b>07</b> <code>| eval elapsed_time_sec = startup_time-shutdown_time</code><br>       - Computes the elapsed time between shutdown and restart.<br><b>08</b> <code>| stats values(*) as * latest(_time) as _time by host</code><br>       - Aggregates and updates the records by host.<br><b>09</b> <code>| eventstats sum(elapsed_time_sec) as elapsed_time_sec_total</code><br>       - Sums the total elapsed time across all events.<br><b>10</b> <code>| table _time host shutdown_time_sec elapsed_time_sec elapsed_time_sec_total</code><br>       - Formats the output into a table with key metrics.</p>
explanation = <p>The search examines the Splunk internal logs to find events related to Splunkd Cloud restarts triggered during app installations. It focuses on the 'ServerConfig' component to identify when a restart has been completed and calculates the time taken. This is important for maintaining operational efficiency and avoiding unnecessary downtime.</p>
quid = 6F81DE159CE40E7CAEBC98B054FA4BB4
search_author = akhamis
updated_author = akhamis
description = <p>Summarizes <b>Splunkd Cloud Restarts Triggered by Config File Changes During App Installations</b> using <code>index=_internal sourcetype=splunkd (component=ServerConfig AND event_message="*My GUID is*") OR (component=Shutdown AND </code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://community.splunk.com/" target="_blank">Splunk Docs: community</a><br>community.</li><li><a href="https://community.splunk.com/t5/Splunk-Answers/ct-p/en-us-splunk-answers" target="_blank">Splunk Docs: Splunk Answers</a><br>Splunk Answers.</li></ul>
search = index=_internal sourcetype=splunkd (component=ServerConfig AND event_message="*My GUID is*") OR (component=Shutdown AND event_message="*Shutdown complete*") \
	| fields _time host component event_message name \
	| rex field=_raw "Shutdown complete in\s+(?<shutdown_time_sec>\d+.\d+)" \
	| eval startup_time = if(match(event_message, "My GUID is"), _time, null()) , shutdown_time = if(match(event_message, "Shutdown complete"), _time, null()) \
	| stats count latest(_time) as _time latest(shutdown_time_sec) as shutdown_time_sec values(*) as * latest(startup_time) as startup_time latest(shutdown_time) as shutdown_time by host component event_message \
	| eventstats latest(shutdown_time) as shutdown_time latest(startup_time) as startup_time by host \
	| eval elapsed_time_sec = startup_time-shutdown_time \
	| stats values(*) as * latest(_time) as _time by host \
	| eventstats sum(elapsed_time_sec) as elapsed_time_sec_total \
	| table _time host shutdown_time_sec elapsed_time_sec elapsed_time_sec_total

[splunkd_error_volume_by_log_pattern]
search_name = Splunkd Error Volume By Log Pattern
version = 2.x
date_created = 2025-05-18
category = Splunk
sub_category = _internal
tags = Splunkd
solution = <p>Use this pattern view to identify <b>frequent error messages</b> across hosts and track <b>error trends</b> to inform remediation. By analyzing log patterns and volumes, teams can determine whether specific issues are confined to one system or propagate across the environment.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate top patterns with the highest count to identify widespread issues.<br><b>2.</b> Check host spread for error propagation across instances.<br><b>3.</b> Correlate findings with recent application or system changes for contextual insights.<br><b>4.</b> Use delta timing and frequency spikes to detect recurring issues.<br><b>5.</b> Suppress or resolve commonly occurring known benign errors to reduce noise in logs.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="_internal" sourcetype="splunkd" log_level="ERROR"</code><br>       - Filters logs for Splunk internal data with ERROR-level severity.<br><b>02</b> <code>| stats sparkline count dc(host) as hosts last(_raw) as last_raw_msg values(sourcetype) as sourcetype last(_time) as last_msg_time first(_time) as first_msg_time values(index) as index by punct</code><br>       - Groups errors by structural patterns, counts occurrences, and gathers metadata.<br><b>03</b> <code>| eval delta=round((first_msg_time-last_msg_time),2)</code><br>       - Calculates the time range during which errors occurred.<br><b>04</b> <code>| eval msg_per_sec=round((count/delta),2)</code><br>       - Measures the rate of errors over time to highlight frequency.<br><b>05</b> <code>| convert ctime(last_msg_time) ctime(first_msg_time)</code><br>       - Converts timestamps into readable formats.<br><b>06</b> <code>| table last_raw_msg count hosts sparkline msg_per_sec sourcetype index first_msg_time last_msg_time delta</code><br>       - Structures the search output for ease of analysis.<br><b>07</b> <code>| sort -count</code><br>       - Orders results by the count of errors to prioritize issues.</p>
explanation = <p>This search focuses on analyzing the <b>ERROR-level messages</b> in the <b>splunkd</b> logs by utilizing the <b>punct</b> field to collapse messages with similar structures into single patterns. It calculates the <b>occurrence rate of errors</b>, determines their host spread, and provides a temporal view of when errors occurred. Key SPL elements like <code>stats</code> allow structured grouping, and <code>eval</code> calculates error deltas and per-second rates, aiding operations teams in focusing on prevalent or growing issues. This kind of log normalization is essential for spotting trends, pinpointing root causes, and assessing the broader operational impact across the Splunk deployment.</p>
quid = 04297967ECA85E1120A182A228AED5DA
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/what-data-is-in-the-internal-indexes">About splunkd.log</a><br>Understand splunkd logging behavior and format.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats">stats Command</a><br>Used to count and analyze grouped events.</li><li><a href="https://lantern.splunk.com/Platform/Troubleshooting/Investigate_error_log_patterns">Error Pattern Investigation</a><br>Splunk Lantern example using `punct` field.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-identify-top-log-messages-by-pattern/m-p/329334">Group Logs By Pattern</a><br>Community use case using `punct` field.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/convert">convert Command</a><br>For time format transformation.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eval">eval Command</a><br>For calculating error frequency and time windows.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/fieldsummary">Punct Field</a><br>Explanation of how punct supports message normalization.</li></ul>
description = <p>Summarizes <b>Splunkd error logs</b> by message pattern using <b>punctuation normalization</b>. This highlights <b>frequent error types</b> and showcases patterns of failures across hosts, enabling users to identify <b>high-impact issues</b> and recurring errors for better remediation strategies.</p>
search = index="_internal" sourcetype="<<sourcetype>>" log_level="ERROR" \
	| stats sparkline count dc(host) as hosts last(_raw) as last_raw_msg values(sourcetype) as sourcetype last(_time) as last_msg_time first(_time) as first_msg_time values(index) as index by punct \
	| eval delta=round((first_msg_time-last_msg_time),2) \
	| eval msg_per_sec=round((count/delta),2) \
	| convert ctime(last_msg_time) ctime(first_msg_time) \
	| table last_raw_msg count hosts sparkline msg_per_sec sourcetype index first_msg_time last_msg_time delta \
	| sort -count

[splunkjs_manager_9370_76]
search_name = Local Server Search Concurrency Count
version = 1.0.1
date_updated = 2024-2-4 13:23:10
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Other
solution = <p>This search provides insight into search head capacity utilization.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor concurrency levels over time to establish baselines.<br><b>2.</b> Set alerts for when concurrency exceeds recommended thresholds.<br><b>3.</b> Identify peak usage times for capacity planning.<br><b>4.</b> Optimize or schedule resource-intensive searches during off-peak hours.<br><b>5.</b> Consider load balancing if specific servers show consistently high concurrency.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
env_run = 2
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> Retrieve the resource usage of Splunk processes from the '/services/server/status/resource-usage/splunk-processes' endpoint on the local server.</ul><ul><b>02</b> Group the results by 'splunk_server'.</ul><ul><b>03</b> Calculate the distinct count of 'search_props.sid' as 'search_concurrency' for each 'splunk_server'.</ul><ul><b>04</b> Keep only the 'splunk_server' and 'search_concurrency' fields in the output.}</ul></ol></div></div>
explanation = <p>This search uses the <code>rest</code> command to query Splunk's internal REST API endpoint for process resource usage. By counting distinct search IDs (<code>search_props.sid</code>) per server, it calculates how many concurrent searches are running. This is valuable for <b>capacity planning</b>, identifying servers under heavy load, and troubleshooting performance issues. High concurrency counts may indicate the need for additional search head resources or search optimization.</p>
quid = 19F6039CCF63DAE2F959229BB797A665
search_author = Splunk Portfolio Field Solutions
updated_author = akhamis
description = <p>This query retrieves the <b>resource usage</b> of Splunk processes on the <b>local server</b> and calculates the <b>search concurrency</b> for each Splunk server.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | rest "/services/server/status/resource-usage/splunk-processes" splunk_server=* \
	| stats dc(search_props.sid) as search_concurrency by splunk_server \
	| fields + splunk_server, search_concurrency

