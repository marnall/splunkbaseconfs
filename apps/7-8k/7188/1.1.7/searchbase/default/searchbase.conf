description = <p>This search identifies SMB shares with unprivileged access vulnerabilities as detected by Tenable&rsquo;s scanning tool. By extracting <b>IP address</b>, <b>DNS Name</b>, and details of <b>shares enabled</b>, it provides actionable data for security teams to mitigate risks related to exposed file shares.</p>
search = index="<<index>>" sourcetype="tenable:sc:vuln" pluginID=42411\
	| table ip dnsName pluginText\
