dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (Logon_Type=2 OR Logon_Type=7 OR Logon_Type=10) (EventCode=528 OR EventCode=540 OR EventCode=4624)</code><br>       - Filters successful logon events using specific EventCodes and Logon Types.<br><b>02</b> <code>| timechart count(EventCode) as count</code><br>       - Visualizes the count of these events over time to track trends.<br><b>03</b> <code>| eventstats avg(count) as Average</code><br>       - Calculates the average logon count across the dataset.<br><b>04</b> <code>| eval average=round(average,0)</code><br>       - Rounds off the average count for simplicity in analysis.<br><b>05</b> <code>| rename count as "Successful Logons"</code><br>       - Provides a more intuitive label for the resulting chart.</p>
explanation = <p>This search counts the number of successful Windows logons by filtering on relevant EventCodes (528, 540, 4624) and Logon Types (2, 7, 10). It utilizes commands such as <code>timechart</code> to plot trends over time, <code>eventstats</code> to calculate the average logon count, and <code>eval</code> to round off the average for easier interpretation. Administrators can use this to monitor baselines and identify significant deviations, providing actionable insights into user activity patterns and potential security impacts.</p>
