[verify_windows_updates_have_been_applied]
search_name = System Event Log Analysis by Date, Host and KB Size
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,Apps
solution = <p>Analyze the frequency and distribution of EventCode 19 logs, which could indicate specific Windows system behaviors or anomalies in updates.</p><p><b>Suggested Actions</b><br><b>1.</b> Review counts by date, host, and KB to identify spikes or unusual trends.<br><b>2.</b> Investigate hosts with an unexpectedly high count of EventCode 19 logs.<br><b>3.</b> Use KB values to correlate logs with specific updates or system actions.<br><b>4.</b> Cross-reference with patch management tools to verify update states.<br><b>5.</b> Adjust monitoring thresholds to flag anomalous EventCode patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/ai-in-security.html" target="_blank">Products: Splunk AI Security</a><br>Splunk AI Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:System EventCode=19</code><br>       - This line sets the data source (index) and filters logs to include Windows System Event Logs with EventCode 19.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts the event timestamp into a human-readable date format (Year/Month/Day).<br><b>03</b> <code>| rex "\WKB(?<KB>\d+)\W"</code><br>       - Uses a regular expression to extract the KB value from the event message.<br><b>04</b> <code>| stats count by Date, host, KB</code><br>       - Groups and counts the number of events by date, host, and KB to summarize the results.<br>
explanation = <p>This search helps to monitor and analyze specific system events (EventCode 19) on <b>Windows systems</b>. By focusing on EventCode 19 and extracting <b>KB details</b> from event messages, it enables identification of patterns, such as abnormal activity or fluctuations in event data. The use of <code>strftime</code> converts timestamps into a human-readable <b>Year/Month/Day</b> format, making date analysis intuitive. The <code>rex</code> command extracts KB values to add depth to the analysis, while <code>stats count</code> aggregates the occurrences by date, machine, and KB to summarize the data effectively. It is particularly useful for system administrators troubleshooting update behaviors or anomalies in event logs.</p>
quid = 118ED544FAB8F1EC601C63E15134E244
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/verify-windows-updates-have-been-applied" target="_blank">https://gosplunk.com/verify-windows-updates-have-been-applied</a></p>
description = <p>This query searches for <b>Windows System Event Logs</b> where the EventCode equals 19.</p><p>It then extracts the <b>date</b> from the event timestamp and the <b>kilobytes (KB)</b> from the event message. This data is grouped by <b>date</b>, <b>host</b>, and <b>KB</b>, providing insights into event distribution over time and across systems.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:System EventCode=19\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| rex "\WKB(?<KB>.\d+)\W"\
	| stats count by Date, host, KB

