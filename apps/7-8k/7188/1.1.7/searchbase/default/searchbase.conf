solution = <p>Effective monitoring and optimization of SmartStore cache efficiency specifically for ES correlation searches.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify correlation searches with consistently low cache hit ratios.<br><b>2.</b> Adjust cache size or policies to improve locality for frequently accessed buckets.<br><b>3.</b> Optimize time ranges of correlation searches to improve the likelihood of cached bucket hits.<br><b>4.</b> Adjust scheduling of searches to align with cache retention periods.<br><b>5.</b> Regularly monitor trends to maintain optimal cache performance and identify new areas for optimization.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/endpoint-security/secure-endpoint/index.html" target="_blank">Products: Cisco Secure Endpoint</a><br>Cisco Secure Endpoint.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index="_audit" info=completed action=search saved
explanation = <p>This search analyzes SmartStore cache efficiency by calculating the percentage of bucket cache hits versus misses during correlation search execution. A high cache hit ratio indicates <b>efficient</b> search queries utilizing cached data, whereas low hit ratios highlight frequent access to remote buckets, negatively affecting search performance. Key insights include identifying underperforming searches, optimizing time ranges, and proactively adjusting cache sizes to improve efficiency.</p><p>By capturing trends over time for the 10 most active correlation searches, this query provides both operational and strategic value to security administrators, helping them optimize <b>cache locality</b>, <b>retention policies</b>, and alignment with access patterns. Junior engineers learn the importance of extracting critical metrics from logs, using <b>eval</b> for calculated fields, and employing <b>timechart</b> to visualize trends.</p>
quid = 7E3F9D2B8A4C5E1F6D9B4A8E2F7C5D3A
search_author = Splunk Works
description = <p>Summarizes <b>SmartStore Cache Hit Ratio ES</b> using <code>index="_audit" info=completed action=search saved savedsearch_name=*Rule | rename invocations_command_search_index_bucke</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/get-started/enterprise.html" target="_blank">Products: Getting started guide for Splunk Enterprise</a><br>Getting started guide for Splunk Enterprise.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li></ul>
search = index="_audit" info=completed action=search saved savedsearch_name=*Rule | rename invocations_command_search_index_bucketcache_hit as hit, invocations_command_search_index_bucketcache_miss as miss | eval hit_ratio=if(hit=0,0,hit/(hit+miss+1)*100) | timechart span=1h avg(hit_ratio) by savedsearch_name useother=f limit=10

