[percentage_of_skipped_searches]
search_name = Scheduler Task Status Analysis and Percentage Calculation
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Searching
solution = <p>This search offers actionable insights for maintaining Splunk's scheduled tasks. Regularly monitoring skipped tasks enables better management of <b>system reliability</b> and <b>performance consistency</b>.</p> \
<p><b>Suggested Actions</b><br><b>1.</b> Investigate tasks classified with 'severe' skipped rates to identify delays or failures.<br><b>2.</b> Validate the scheduling configurations of heavily skipped tasks.<br><b>3.</b> Check system performance indicators such as CPU or memory during peak scheduled task periods.<br><b>4.</b> Audit user-created saved searches to optimize their frequency or resource utilization.<br><b>5.</b> Communicate findings with relevant stakeholders to streamline task execution efficiency.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal sourcetype=scheduler</code><br>       - Specifies the data source: scheduler logs in the <b>_internal</b> index.<br><b>02</b> <code>| stats count as total, count(eval(status="skipped")) as skipped</code><br>       - Calculates the <b>total number of tasks</b> and those marked as 'skipped'.<br><b>03</b> <code>| eval pct=round(skipped/total * 100, 0)</code><br>       - Computes the <b>percentage</b> of skipped tasks.<br><b>04</b> <code>| rangemap field=pct low=0-10, elevated=10-20 severe=20-100</code><br>       - Categorizes percentages into meaningful <b>severity ranges</b>: low, elevated, and severe.<br><b>05</b> <code>| eval pct = pct . "%"</code><br>       - Appends a percentage symbol to the computed `pct` value for clarity.<br><b>06</b> <code>| fields pct, range</code><br>       - Limits output to view only the <b>percentage</b> and its corresponding <b>severity range</b>.<br>
explanation = <p>This search is used to monitor the <b>health of scheduled tasks</b> in a Splunk environment. By identifying the <b>percentage of tasks being skipped</b>, administrators can <b>proactively diagnose</b> issues related to task scheduling or <b>system performance bottlenecks</b>.</p> \
	<p>The SPL uses the `<b>stats</b>` command to calculate metrics, evaluates the <b>percentage of skipped tasks</b> using an `eval` expression, and classifies results into <b>severity ranges</b> (low, elevated, severe) using the `<b>rangemap</b>` command. This targeted categorization helps to quickly focus attention on anomalies that might indicate performance issues or misconfigurations in the scheduler.</p>
quid = CACD75136701B0BC9011B95B94CA9B96
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/percentage-of-skipped-searches" target="_blank">https://gosplunk.com/percentage-of-skipped-searches</a></p>
description = <p>Summarizes <b>Scheduler Task Status Analysis and Percentage Calculation</b> using <code>index=_internal sourcetype=scheduler</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal sourcetype=scheduler\
	| stats count as total, count(eval(status="skipped")) as skipped\
	| eval pct=round(skipped/total * 100, 0)\
	| rangemap field=pct low=0-10, elevated=10-20 severe=20-100\
	| eval pct = pct . "%"\
	| fields pct, range

[pi_audit_search_metrics]
search_name = Completed Search Performance Metrics
version = 2.x
