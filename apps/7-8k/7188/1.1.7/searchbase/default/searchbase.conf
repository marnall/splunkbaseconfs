category = Threat Hunter's Cookbook
sub_category = Sorting and Stacking
tags = Anomaly Detection,Top Results
solution = <p>This query provides <b>insight into high-volume network traffic patterns</b> by pinpointing the source IPs contributing most to network activity. The findings can be used for security monitoring, anomaly detection, and trend analysis.</p><p><b>Suggested Actions:</b><br><b>1.</b> Investigate whether high counts of activity from certain IPs are legitimate usage or unauthorized actions.<br><b>2.</b> Cross-reference frequent IPs with known internal or external asset lists.<br><b>3.</b> Review firewall and other monitoring logs for connections associated with these IPs.<br><b>4.</b> Assess frequency patterns over different periods to detect shifts in activity trends.<br><b>5.</b> Collaborate with relevant teams to categorize and document normal versus abnormal behaviors linked to specific IPs.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Query the specified index for network traffic data.<br><b>02</b> <code>| top src_ip</code><br>       - Calculate and display the most frequently occurring source IP addresses sorted by count.<br>
explanation = <p><b>Operational Context:</b> This search leverages the <code>top</code> command to efficiently highlight the most frequent values found in the source IP address field within the dataset. The <code>top</code> command is extremely useful for identifying outliers, patterns, or consistent actors in network activity data.</p><p>In this search, <code>src_ip</code> refers to source IP addresses observed within the Splunk index. The <code>top</code> command surfaces the most frequently occurring IPs, sorted by count, enabling researchers and analysts to quickly focus their attention on the most impacting actors or possible anomalies present in data streams.</p>
