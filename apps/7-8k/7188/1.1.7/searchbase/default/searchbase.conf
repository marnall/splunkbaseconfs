solution = <p>This search provides visibility into file access events, crucial for monitoring and identifying security incidents in a Windows environment. It distinguishes between normal and suspicious file access behaviors, emphasizing non-system accounts for a more focused security scope.</p> \
<p><b>Suggested Actions</b><br><b>1.</b> Review results for unexpected file access patterns or anomalies in account activity.<br><b>2.</b> Investigate any unknown or suspicious processes accessing critical files.<br><b>3.</b> Correlate with other related security logs (e.g., login events) for a broader context.<br><b>4.</b> Implement additional logging or monitoring for high-risk users or systems.<br><b>5.</b> Take immediate action to mitigate identified risks, such as adjusting file permissions or disabling compromised accounts.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4656 Object_Type=File (Security_ID!="NT AUTHORITY*") (Security_ID!="S-*")</code><br>       - Search Windows Security Event Logs for file object access events (EventCode 4656), excluding system-level accounts ('NT AUTHORITY' and 'S-*').<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Format the timestamp of each event into 'Year/Month/Day' format for better temporal visibility.<br><b>03</b> <code>| stats count by Date, Account_Name, Process_Name, Keywords, host</code><br>       - Aggregate and count the events by Date, user account name, process name, access keywords, and host to identify patterns and anomalies.<br>
explanation = <p>This query is critical for monitoring file access events in a Windows environment. It leverages Windows Security EventCode 4656 to track access attempts to file objects. By excluding system-level Security IDs ('NT AUTHORITY' and 'S-*'), it ensures the focus remains on activity involving user accounts, which are more likely to reflect malicious intent or misuse of privileges.</p> \
	<p>The query uses <b>eval</b> to convert the event timestamp into a 'Year/Month/Day' format, improving temporal analysis. Finally, <b>stats</b> aggregates the data by key fields, providing granularity to understand the context of file access events, such as the involved user, process, keywords, and host. This aids in identifying unusual patterns, such as unexpected access by specific users or processes, enabling informed responses to potential security incidents.</p>
quid = A51B8F16C5078C9DAEE59B0219CA8B51
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/windows-file-access-attempts" target="_blank">https://gosplunk.com/windows-file-access-attempts</a></p>
description = <p>Summarizes <b>Daily File Access Events by User, Process, and Host</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4656 Object_Type=File (Security_ID!="NT</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4656 Object_Type=File (Security_ID!="NT AUTHORITY*") (Security_ID!="S-*")\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| stats count by Date, Account_Name, Process_Name, Keywords, host

