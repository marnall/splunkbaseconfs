explanation = <p>This search analyzes Splunk's PerProcess introspection data to provide visibility into resource consumption by <b>CPU</b> and <b>memory</b> metrics. It separates data between search heads and indexers and offers granular information about savedsearch execution. Through stats and eval functions, it calculates the latest metrics per category (e.g., <b>savedsearch name</b>, <b>process type</b>).</p><p>Use cases include identifying bottlenecks, resource hogging, and optimization, improving not only infrastructure efficiency but reliability for end-user operational insights. Technical Splunkers will also appreciate field extraction, data aggregation methodologies, and how roles like "peer" and "head" relate to architecture.</p>
