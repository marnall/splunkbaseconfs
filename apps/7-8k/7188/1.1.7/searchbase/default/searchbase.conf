```| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s(?\s+)\s.+\sgdm-password:auth\s:\s(?\w+\s\w+);\s.+user=(?\s+)" ```\
| search authstatus="authentication failure"\
| stats count by username\
