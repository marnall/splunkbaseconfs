execution_plan = <b>01</b> <code>index=_internal</code><br>       - This line is specifying the index to search. The _internal index contains Splunk's internal logs.<br><b>02</b> <code>sourcetype=scheduler</code><br>       - This line is filtering the results to only include events from the scheduler sourcetype, which includes information about scheduled searches.<br><b>03</b> <code>saved
explanation = <p>This query can be used to <b>identify</b> any scheduled searches that are <b>not running</b> as expected. If a search is frequently being skipped, it could indicate a <b>problem</b> with the search itself or with the system resources available to run the search. By grouping the results by the reason the search was skipped, it can help <b>identify common issues</b> and <b>potential solutions</b>.</p>
quid = 937DBA27887DC9545B0593B9B92D8EC9
search_author = GoSplunk: masdeeper
related_info = <p><a href="https://gosplunk.com/list-skipped-searches-name-reason" target="_blank">https://gosplunk.com/list-skipped-searches-name-reason</a></p>
description = <p>This query is looking for scheduled searches that were <b>skipped</b> in the internal Splunk logs. It then counts the number of times each search was skipped and groups them by the name of the saved search and the reason it was skipped.</p>
search = index=_internal sourcetype=scheduler saved savedsearch_name=* status=skipped\
	| stats count by savedsearch_name reason

[listing_incident_review_and_the_closing_comments]
search_name = Audit Incident Review Status and Comments
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This search provides visibility into <b>incident review status and comments</b>, supporting incident management and compliance tracking.</p><p><b>Suggested Actions</b><br><b>1.</b> Review closed incidents to verify proper resolution documentation.<br><b>2.</b> Investigate incidents stuck in 'Not assigned' status.<br><b>3.</b> Track incident processing times to identify bottlenecks.<br><b>4.</b> Use closing comments to improve incident response procedures.<br><b>5.</b> Generate reports for stakeholder visibility into incident handling.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'index=_audit' specifies the index from which the data is being retrieved. In this case, it's the '_audit' index.</ul><ul>sourcetype=incident_review' filters the data to only include events of the 'incident_review' sourcetype.</ul><ul>| dedup Closing Comment' removes any duplicate 'Closing Comment' fields, ensuring each unique comment is only represented once.}</ul><ul>| eval Status=if(Status=5,Closed,if(Status=2,In Progress,Not assigned))' evaluates the 'Status' field. If the status is '5', it changes it to 'Closed'. If the status is '2', it changes it to 'In Progress'. Any other status is changed to 'Not assigned'.</ul><ul>| rename rule_name as Notable Event comment as Closing Comment status as Status' renames the fields for better readability.</ul><ul>| table rule_name comment status' creates a table with the fields 'rule_name', 'comment', and 'status'.</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query is useful for <b>incident management</b> and tracking. It helps to understand the status of different incidents, their associated rules, and any comments made during the incident review process. By deduplicating the closing comments, it ensures that each unique comment is only represented once, providing a <b>clearer view</b> of the incident review process.</div></div>
quid = A42E6F5CF297B3D18DEC0DF3977830C8
search_author = GoSplunk: Opeyemi Olatunji
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/listing-incident-review-and-the-closing-comments" target="_blank">https://gosplunk.com/listing-incident-review-and-the-closing-comments</a></p>
description = <p>This query is <b>retrieving incident review data</b>, specifically the rule name, comment, and status.</p> <p>It then renames these fields for clarity, evaluates the status field to provide more understandable status descriptions, and removes any duplicate closing comments.</p>
search = index=_audit sourcetype="incident_review"\
	| table rule_name comment status\
	| rename rule_name as "Notable Event" comment as "Closing Comment" status as Status\
	| eval Status=if(Status=5,"Closed",if(Status=2,"In Progress","Not assigned"))\
	| dedup "Closing Comment"

[log_level_errors_in_splunk]
search_name = Internal Splunkd Error Pattern Analysis
version = 2.x
date_created = 2025-10-20
category = Splunk
sub_category = _internal
tags = Detail,Diagnostics,Error,Hutch,Internal
solution = <p>This search helps prioritize frequent or potentially critical internal Splunk errors based on their shape, frequency, and affected hosts.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the most frequent error message shapes<br><b>2.</b> Identify hosts contributing to recurring errors<br><b>3.</b> Investigate time spans and bursts using delta and sparkline<br><b>4.</b> Use msg_per_sec to monitor for anomalous error rates<br><b>5.</b> Map common punct patterns to known error types for faster triage</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal sourcetype="splunkd" log_level="ERROR"</code><br>       - Retrieves ERROR events from Splunk's internal logs<br><b>02</b> <code>stats sparkline count dc(host) as hosts last(_raw) as last_raw_msg values(sourcetype) as sourcetype last(_time) as last_msg_time first(_time) as first_msg_time values(index) as index by punct</code><br>       - Aggregates logs by punctuation signature and calculates host and message stats<br><b>03</b> <code>eval delta=round((first_msg_time - last_msg_time), 2)</code><br>       - Measures time span of the events<br><b>04</b> <code>eval msg_per_sec=round((count / delta), 2)</code><br>       - Computes message frequency per second<br><b>05</b> <code>convert ctime(last_msg_time) ctime(first_msg_time)</code><br>       - Converts timestamps to human-readable format<br><b>06</b> <code>table last_raw_msg count hosts sparkline msg_per_sec sourcetype index first_msg_time last_msg_time delta</code><br>       - Selects relevant fields for review<br><b>07</b> <code>sort - count</code><br>       - Sorts rows by error count descending<br>
explanation = <p>This search focuses on internal Splunk errors by querying the <b>splunkd</b> sourcetype in the <b>_internal</b> index. It groups events by punctuation structure using the <b>punct</b> field — a technique to detect repeating log signatures without relying on full message text. Key metrics like <b>count</b>, <b>msg_per_sec</b>, and <b>delta</b> show the event volume, frequency, and time distribution. <b>sparkline</b> is used to track error trends over time, and <b>convert</b> formats timestamps for readability. This is valuable for operations teams monitoring Splunk health and debugging internal issues. For junior users, it demonstrates useful SPL strategies like statistical aggregation, time math, and field formatting.</p>
quid = 62C9004464110B6ED9B18ADE13B30AC4
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/what-data-is-in-the-internal-indexes" target="_blank">Splunk Docs: Troubleshoot inputs with metrics.log</a><br>Guide to using metrics.log for diagnostic and indexing throughput reviews.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/about-license-violations" target="_blank">Splunk Docs: About license violations</a><br>Explains how _internal index searches are still allowed during license violation conditions.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/troubleshoot/9.4/splunk-enterprise-log-files/what-splunk-software-logs-about-itself" target="_blank">Splunk Help: What Splunk software logs about itself</a><br>Details which log files map to the _internal index and how to interpret them.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/indexing/indexes-and-indexers/how-indexes-work" target="_blank">Splunk Docs: About managing indexes</a><br>Includes information on the internal indexes (_internal, _audit) and their role in Splunk operations.</li></ul>
description = <p>This search identifies <b>ERROR-level internal logs</b> grouped by punctuation pattern to uncover frequent or anomalous internal Splunk errors. It visualizes activity density, message count, and error spread across hosts.</p>
search = index="_internal" sourcetype="splunkd" log_level="ERROR" \
	| stats sparkline count dc(host) as hosts last(_raw) as last_raw_msg values(sourcetype) as sourcetype last(_time) as last_msg_time first(_time) as first_msg_time values(index) as index by punct \
	| eval delta=round((first_msg_time - last_msg_time), 2) \
	| eval msg_per_sec=round((count / delta), 2) \
	| convert ctime(last_msg_time) ctime(first_msg_time) \
	| table last_raw_msg count hosts sparkline msg_per_sec sourcetype index first_msg_time last_msg_time delta \
	| sort - count

[logon_types_within_a_windows_environment_with_logon_count]
search_name = Top 15 Windows Security Logon Types with Percentages
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This search offers a consolidated view of the most frequent logon types in your system, allowing you to identify trends in access methods. Such visibility is critical for spotting suspicious or anomalous logon behavior, particularly for sensitive systems and accounts.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor for unexpected spikes in certain logon types, such as Remote Desktop or Service Account usage.<br><b>2.</b> Investigate logon types that deviate from normal patterns to detect potential security incidents.<br><b>3.</b> Leverage this data for compliance reporting and audit trails.<br><b>4.</b> Establish alerting thresholds for critical access methods.<br><b>5.</b> Periodically review the role and activity of Service Accounts to ensure proper usage and permissions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security</code><br>       - Access Windows Security logs within the specified index to identify logon types.<br><b>02</b> <code>| eval LogonType=case(...)</code><br>       - Translate numeric Logon_Type codes into user-friendly descriptions using a case statement.<br><b>03</b> <code>| top limit=15 LogonType</code><br>       - Determine the top 15 most common logon types and their frequencies.<br><b>04</b> <code>| eval percent = round(percent,2) . " %"</code><br>       - Calculate and format the percentage representation for clarity.<br>
explanation = <p>This search leverages the `WinEventLog` sourcetype within the Windows Security event log to categorize logon types into meaningful labels like <b>Local Console Access</b>, <b>Remote Desktop</b>, and <b>Service Account</b>. The `eval` function is used to map `Logon_Type` codes to human-readable labels via a `case` statement, improving interpretability for analysts. The <code>| top</code> command then identifies the most frequent logon types, and percentages are calculated to provide proportional insights into the distribution of these activities.</p>
quid = 5B76FF82E30EA53DCF47FF72EF2AAB63
search_author = GoSplunk: Go Splunk
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/logon-types-within-a-windows-environment-with-logon-count" target="_blank">https://gosplunk.com/logon-types-within-a-windows-environment-with-logon-count</a></p>
description = <p>Summarizes <b>Top 15 Windows Security Logon Types with Percentages</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security \
	| eval LogonType=case (Logon_Type="2", "Local Console Access", Logon_Type="3", "Accessing Network Folders or Files", Logon_Type="4", "Scheduled Task, Batch File, or Script", Logon_Type="5", "Service Account", Logon_Type="7", "Local Console Unlock", Logon_Type="8", "Network User Logon", Logon_Type="9", "Program launched with RunAs using /netonly switch", Logon_Type="10", "Remote Desktop via Terminal Services", Logon_Type="11", "Mobile Access or Network Domain Connection Resumed")\
	| top limit=15 LogonType\
	| eval percent = round(percent,2) . " %"

[logs_dropped_due_to_timestamp_issues]
search_name = Logs Dropped Due to Timestamp Issues
date_created = 2024-1-4 9:47:49
date_updated = 2024-1-4 9:47:49
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Data Hygiene,Timestamp
solution = <p>This query provides insights into timestamp parsing problems that may result in log data being dropped. It enables early detection and proactive resolution of timezone or format-related misconfigurations, which are critical for maintaining data consistency and ensuring all logs are properly indexed.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the dropped log events and identify patterns or sources experiencing timestamp issues.<br><b>2.</b> Validate the timezone settings and timestamp formats of the affected log sources.<br><b>3.</b> Adjust or correct timestamp extraction settings in the Splunk configuration (e.g., props.conf or transforms.conf).<br><b>4.</b> Monitor the performance for subsequent logs after changes to ensure issues are resolved.<br><b>5.</b> Document the findings and share with stakeholders to improve log source configurations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd DateParserVerbose</code><br>       - Focuses on logs where Splunk reports timestamp parsing issues.<br><b>02</b> <code>"too far away from the previous event's time" OR "outside of the acceptable time window"</code><br>       - Matches specific log message patterns indicating dropped events due to timestamp errors.<br><b>03</b> <code>| timechart count as Events</code><br>       - Aggregates and visualizes the count of such dropped log events over time.</p>
explanation = <p>Issues with Splunk's timestamp recognition can lead to loss of valuable data and inconsistencies in indexing. This search scans the Splunk internal logs (<code>index=_internal</code>, <code>sourcetype=splunkd DateParserVerbose</code>) to identify whether events have been dropped due to timestamp problems. The search lines check for specific log messages—"too far away from the previous event's time" or "outside of the acceptable time window"—indicating problematic log timestamps. By transforming results with <code>timechart count as Events</code>, it visually aggregates the count of dropped events over a timeline, enabling a clearer understanding of the frequency and trends in these parsing issues over the last 24 hours.</p>
quid = 95D765579DEDCEADE2AC515B90D44057
search_author = V Skoryk
updated_author = khutchinson
related_info = <p><a href="https://community.splunk.com/t5/Getting-Data-In/Does-Splunk-log-falling-back-to-automatic-timestamp-extraction/m-p/468552" target="_self">Does Splunk log falling back to automatic timestamp extraction?</a><br>						</p>
description = <p>Summarizes <b>Logs Dropped Due to Timestamp Issues</b> using <code>index=_internal sourcetype=splunkd DateParserVerbose</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal sourcetype=splunkd DateParserVerbose \
	"too far away from the previous event's time" OR \
	"outside of the acceptable time window" \
	| timechart count as Events

[look_for_search_best_practices]
search_name = Look for Search Best Practices
version = 2.x
date_created = 2025-11-05
category = Splunk
sub_category = _internal
tags = Audit,Search,_internal
solution = <p>This audit reveals which saved or ad-hoc searches consistently overrun their intended time range. It supports tuning search SPL, identifying heavy jobs, and promoting best practices for scheduled searches.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate searches that frequently overrun.<br><b>2.</b> Tune SPL to reduce time range or event count.<br><b>3.</b> Educate users on optimizing search filters.<br><b>4.</b> Review scheduling intervals and execution concurrency.<br><b>5.</b> Use Search Job Inspector to compare expected vs. actual run duration.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_audit [|rest /services/server/info splunk_server=local | fields host] action=search user=* user!=splunk-system-user search_id=* (info=granted OR info=completed)</code><br>       - Filters audit logs for real user search executions.<br><b>02</b> <code>| rex field=apiStartTime "'(?<start_time>[^']+)'"</code><br>       - Extracts start time from API log field.<br><b>03</b> <code>| rex field=apiEndTime "'(?<end_time>[^']+)'"</code><br>       - Extracts end time.<br><b>04</b> <code>| rex "search\=(?<search_string>.+)\,\sautojoin"</code><br>       - Extracts raw SPL for each search run.<br><b>05</b> <code>| eval range=..., range2=...</code><br>       - Computes search time span and actual duration.<br><b>06</b> <code>| stats max(event_count)... by search_id savedsearch_name</code><br>       - Aggregates statistics per search.<br><b>07</b> <code>| convert ... | where count>1 | rename ...</code><br>       - Filters and formats data for readability.<br><b>08</b> <code>| eval ..., | table ..., | sort - "Run Time"</code><br>       - Enhances output with runtime checks and final table.</br>
explanation = <p>This search operates over the <code>_audit</code> index and uses <code>rest</code> to obtain server context before filtering for user search activity (excluding Splunk system users). It extracts start and end times from raw API fields and computes the range of each search. By comparing intended and actual durations, it flags searches that overran.</p><p>For operational teams, this insight helps identify poorly tuned searches, excessive time range queries, or inefficient saved searches. It can guide search optimization, reduce resource usage, and increase user satisfaction. For junior engineers, this query shows how to use <b>rex</b> for field extraction, <b>eval</b> for enrichment and time math, and <b>stats</b> for aggregations across search IDs.</p>
quid = 141228CDB6E467C0B1056AA7317CBD25
description = <p>Summarizes <b>Look for Search Best Practices</b> using <code>index="_audit" [|rest /services/server/info splunk_server=local | fields host] action=search user=* user!=splunk-system-</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_audit" [|rest /services/server/info splunk_server=local | fields host] action=search user=* user!=splunk-system-user search_id=* (info=granted OR info=completed) \
	| rex field=apiStartTime "'(?<start_time>[^']+)'" \
	| rex field=apiEndTime "'(?<end_time>[^']+)'" \
	| rex "search\=(?<search_string>.+)\,\sautojoin" \
	| eval range=if(start_time=="ZERO_TIME","All Time", tostring(strptime(end_time, "%a %b %d %H:%M:%S %Y") - strptime(start_time, "%a %b %d %H:%M:%S %Y"),"duration")) \
	| eval range2=if(start_time=="ZERO_TIME","All Time", strptime(end_time, "%a %b %d %H:%M:%S %Y") - strptime(start_time, "%a %b %d %H:%M:%S %Y")) \
	| stats max(event_count) AS event_count values(start_time) AS "Search Earliest" values(end_time) AS "Search Latest" count values(range) AS range values(range2) AS range2 values(search) AS Search values(user) AS User max(total_run_time) AS run_time(sec) by search_id savedsearch_name \
	| convert ctime(*Time) ctime("Search Start") ctime("Search End") \
	| where count>1 \
	| rename search_id AS SID range AS "Search Range" \
	| eval "Run Time"=tostring('run_time(sec)',"duration") \
	| eval "Overran?"=if('run_time(sec)'>range2,"Overran its range!!!", "NO") \
	| eval SID = trim(SID, "'") \
	| table SID savedsearch_name event_count "Search Earliest" "Search Latest" "Search Range" Search User "run_time(sec)" "Overran?" "Run Time" \
	| sort - "Run Time"

[low_disk_space_alert_for_windows_servers_1]
search_name = Windows Host Disk Space Analysis with Less than 10% Free
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Servers
tags = Access,Alerts
solution = <p>This query provides a clear overview of Windows servers at risk due to low disk space, ensuring efficient resource management and preventing potential outages or slowdowns caused by full drives.</p> \
	<p><b>Suggested Actions</b><br><b>1.</b> Investigate drives with <b>less than 10% free space</b> to identify the cause of the storage usage.<br><b>2.</b> Initiate clean-up tasks, such as removing redundant files or archiving logs, to free up space.<br><b>3.</b> Increase the allocated disk size for critical drives if cleaning up is not practicable.<br><b>4.</b> Set up <b>automated monitoring</b> to continuously track storage utilization and trigger alerts when thresholds are breached.<br><b>5.</b> Evaluate storage usage trends to project future requirements and preemptively scale resources if needed.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" eventtype=hostmon_windows Type=Disk FileSystem="*" DriveType="*"</code><br> \
	- Search within the specified index and sourcetype for disk-related events on Windows hosts, setting initial filters.<br><b>02</b> <code>| dedup host, Name</code><br> \
	- Remove duplicate entries based on host and drive names to ensure single records per drive.<br><b>03</b> <code>| eval FreeSpacePct=round(FreeSpaceKB/TotalSpaceKB*100)</code><br> \
	- Calculate the percentage of free disk space.<br><b>04</b> <code>| eval TotalSpaceGB=round(TotalSpaceKB/1024/1024)</code><br> \
	<code>| eval FreeSpaceGB=round(FreeSpaceKB/1024/1024)</code><br> \
	- Convert measurements from KB to GB for human-readable units.<br><b>05</b> <code>| search FreeSpacePct<10 TotalSpaceGB="*"</code><br> \
	- Filter results to include only drives with critically low free space (<10%).<br><b>06</b> <code>| dedup host, Name, DriveType, TotalSpaceGB, FreeSpaceGB, FreeSpacePct</code><br> \
	- Eliminate any remaining duplicate records based on multiple fields to ensure accurate output.<br><b>07</b> <code>| table host, Name, DriveType, TotalSpaceGB, FreeSpaceGB, FreeSpacePct</code><br> \
	- Tabulate results, focusing on key fields for easy review.<br><b>08</b> <code>| sort FreeSpacePct</code><br> \
	- Sort the output by available disk space percentage in ascending order, highlighting the most critical entries.
explanation = <p>This query is crucial for <b>proactively monitoring</b> disk usage on Windows servers. By identifying drives with less than <b>10% free space</b>, administrators can mitigate potential risks such as performance degradation, service disruptions, or even complete failures caused by insufficient disk space.</p> \
	<p>Key operations include:</p> \
	<ul><li>The <b>'dedup'</b> command removes redundant data, ensuring that only the latest status of each drive is analyzed.</li> \
	<li>The <b>'eval'</b> commands compute relevant numerical metrics, such as the percentage of free space and conversions from kilobytes (KB) to gigabytes (GB) for easy readability.</li> \
	<li>The query filters drives where available space is critically low (<10%) and organizes results into a manageable table, sorted by the percentage of free space, allowing quick identification of priorities.</li> \
	<p>Overall, this search empowers IT teams to maintain system <b>reliability</b> and <b>prevent disruptions</b> through early intervention.</p>
quid = 41DF5D383CEB63232CFEAC2EEBC5A791
search_author = Splunk Portfolio Field Solutions
updated_author = khutchinson
description = <p>This query is searching for Windows hosts with disk drives that have less than 10% free space.</p> \
	<p>It provides a table sorted by the percentage of free space, showing the host name, drive name, drive type, total space in GB, free space in GB, and the percentage of free space.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>" eventtype=hostmon_windows Type=Disk FileSystem="*" DriveType="*"\
	| dedup host, Name\
	| eval FreeSpacePct=round(FreeSpaceKB/TotalSpaceKB*100)\
	| eval TotalSpaceGB=round(TotalSpaceKB/1024/1024)\
	| eval FreeSpaceGB=round(FreeSpaceKB/1024/1024)\
	| search FreeSpacePct<10 TotalSpaceGB="*"\
	| dedup host, Name, DriveType, TotalSpaceGB, FreeSpaceGB, FreeSpacePct\
	| table host, Name, DriveType, TotalSpaceGB, FreeSpaceGB, FreeSpacePct\
	| sort FreeSpacePct

