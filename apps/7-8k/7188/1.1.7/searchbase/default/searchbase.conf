related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/sparkline">Sparkline Command</a><br>How to add sparklines to aggregated results in Splunk.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Generate-HTTP-status-summary-using-stats/m-p/322151">HTTP Status Summary</a><br>Examples on summarizing status codes with stats.</li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Sparklines-in-Splunk-Tables/m-p/213217">Sparklines in Tables</a><br>Adding mini-charts into Splunk dashboards.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Summarize-HTTP-statuses-by-time/m-p/400153">Summarizing HTTP Status by Time</a><br>Visualization help for status code trends.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats">Stats Command</a><br>Usage of stats to count and group fields.</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Search/Vizualizations/Trending_HTTP_status_codes">Trending HTTP Status Codes</a><br>Lantern use-case on web performance tracking.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/visualize-data/create-dashboards-and-reports">Splunk Table Visualizations</a><br>Formatting and customizing tabular data.</li></ul>
description = <p>Summarizes <b>HTTP Status Distribution With Sparkline</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" \
	| stats count(status) as count sparkline(count) by status \
	| rename status as "http status code" \
	| sort - count

[http_traffic_prediction_streamstats_total_bytes]
search_name = HTTP Traffic Prediction Streamstats Total Bytes
version = 2.x
date_created = 2025-05-18
category = IT Operations
sub_category = Forecasting
tags = Web traffic
solution = <p>This predictive model helps teams plan bandwidth, capacity, and load balancing for future spikes or dips.</p><p><b>Suggested Actions</b><br><b>01</b> Evaluate if predicted increases require infrastructure scaling.<br><b>02</b> Monitor for anomalies where actual traffic diverges from forecast.<br><b>03</b> Inform budgeting for network resources based on projected load.<br><b>04</b> Correlate forecast with external events or campaigns.<br><b>05</b> Adjust alert thresholds based on future trends.</p><p><b>Recommended Alerts</b><br><b>01</b> Normal: Forecast deviation < 5%<br><b>02</b> Low: Deviation between 5–10%<br><b>03</b> Medium: Deviation between 10–20%<br><b>04</b> High: Deviation between 20–30%<br><b>05</b> Critical: Deviation > 30%</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Targets the defined Splunk index.<br><b>02</b> <code> sourcetype="access"</code><br>       - Filters to access-related sourcetypes.<br><b>03</b> <code>| timechart count(bytes) as traffic</code><br>       - Builds a time-based count of bytes as traffic data.<br><b>04</b> <code>| streamstats sum(traffic) as total_traffic</code><br>       - Generates a cumulative traffic trend over time.<br><b>05</b> <code>| predict total_traffic as expected_traffic algorithm=LLT future_timespan=14</code><br>       - Forecasts future traffic based on past patterns using LLT model.<br>
explanation = <p>This search aggregates raw traffic data (bytes) into a time series, calculates cumulative traffic over time using <b>streamstats</b>, and then applies the <b>LLT (Local Linear Trend)</b> algorithm to forecast total traffic for the next 14 time units. Forecasting traffic trends proactively supports infrastructure planning and performance optimization.</p><p>Using <code>streamstats</code>, the query creates a cumulative total, providing clear insights into incremental growth over time. The <code>predict</code> command applies predictive analytics, leveraging machine learning for traffic forecasting. This allows teams to evaluate future web traffic trends, scale resources efficiently, and align organizational efforts to expected growth.</p>
quid = DDD751E3C0F3C2CE9A428E15AF39B6A2
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/predict">Predict Command Documentation</a><br>Official usage and parameters for time series prediction.</li><li><a href="https://community.splunk.com/t5/Getting-Data-In/Forecasting-web-traffic-using-predict/m-p/513729">Forecasting Web Traffic</a><br>User use-case for applying predict to web data.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/streamstats">Streamstats Documentation</a><br>Explains cumulative functions across events.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/forecasting-with-splunk-predict.html">Forecasting with Splunk Predict</a><br>Tips and real-world examples for predict usage.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Timechart-and-predict-to-forecast-log-data/m-p/576002">Timechart and Predict</a><br>Help combining timechart with forecast functions.</li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Predicting-future-events/m-p/413149">Predicting Future Events</a><br>Visual dashboard techniques for predict output.</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Search/Manipulating_data/Advanced_searches/Forecasting_and_trending_with_predict">Forecasting with Predict</a><br>Splunk Lantern guide to predictive analytics.</li></ul>
description = <p>Summarizes <b>HTTP Traffic Prediction Streamstats Total Bytes</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" \
	| timechart count(bytes) as traffic \
	| streamstats sum(traffic) as total_traffic \
	| predict total_traffic as expected_traffic algorithm=LLT future_timespan=14

[hunt_for_spoofed_domains_using_levenshtein_distance]
search_name = Hunt for Spoofed Domains Using Levenshtein Distance
version = 1.0.5
date_created = 2025-05-05 13:26:44
date_updated = 2025-7-2 15:35:13
category = Threat Hunter's Cookbook
sub_category = Combined methods
tags = Levenshtein,Spoofing
solution = <p>This search uncovers spoofed or homoglyph domains that mimic trusted domains to deceive users. By focusing on domains with a Levenshtein distance of less than 3, you can proactively identify potential phishing attacks and malicious actors targeting your organization.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate flagged domains for potential email-based threats.<br><b>2.</b> Block suspicious domains at your email gateway to prevent further delivery.<br><b>3.</b> Educate users on recognizing homoglyph and spoofing risks.<br><b>4.</b> Review and regularly update the list of trusted domains.<br><b>5.</b> Implement real-time monitoring to identify and address new spoofing efforts promptly.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" mail from</code><br>       - Extracts emails and initiates the dataset.<br><b>02</b> <code>| stats count by Sender</code><br>       - Aggregates data by sender and calculates counts.<br><b>03</b> <code>| rex field=Sender "@(?<domain_detected>.*)"</code><br>       - Extracts the domain from each sender's email.<br><b>04</b> <code>| stats sum(count) as count by domain_detected</code><br>       - Totals message counts per domain.<br><b>05</b> <code>| where domain_detected != "mycompany.com"</code><br>       - Filters out internal traffic from "mycompany.com".<br><b>06</b> <code>| eval list = "mozilla"</code><br>       - Establishes the baseline or comparative domain list.<br><b>07</b> <code>| `ut_parse_extended(domain_detected, list)`</code><br>       - Parses and aligns detected domains against the trusted list.<br><b>08</b> <code>| eval company_domain = "mycompany.com"</code><br>       - Explicitly sets the trusted domain for calculation.<br><b>09</b> <code>| `ut_levenshtein(ut_domain, company_domain)`</code><br>       - Calculates Levenshtein distance, identifying near matches.<br><b>10</b> <code>| eval ut_levenshtein = min(ut_levenshtein)</code><br>       - Selects the minimum distance for flagging.<br><b>11</b> <code>| where ut_levenshtein < 3</code><br>       - Flags domains with a Levenshtein distance below the threshold.</p>
explanation = <p>Levenshtein distance is a metric that measures the minimum number of edits (insertions, deletions, or substitutions) needed to change one string into another. This search is applied to identify domain names resembling trusted domains, a common tactic in phishing or homoglyph attacks. The query parses incoming email addresses, extracts detected domains, and calculates their similarity to trusted domains using an evaluation process. By focusing on domains with a Levenshtein distance less than 3, this search highlights domains that are dangerously similar and likely malicious. Understanding how this metric works ensures <b>precise</b> and <b>timely</b> threat hunting.</p>
quid = 9BA7C80FBB982690217A7A77D954E379
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Hunt for Spoofed Domains Using Levenshtein Distance</b> using <code>index="<<index>>" mail from</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" mail from \
	| stats count by Sender \
	| rex field=Sender "\@(?<domain_detected>.*)" \
	| stats sum(count) as count by domain_detected \
	| where domain_detected != "mycompany.com" \
	| eval list = "mozilla" \
	| `ut_parse_extended(domain_detected, list)` \
	| eval company_domain = "mycompany.com" \
	| `ut_levenshtein(ut_domain, company_domain)` \
	| eval ut_levenshtein = min(ut_levenshtein) \
	| where ut_levenshtein < 3

[hunting_long_command_line_entries_with_field_length_evaluation]
search_name = Hunting Long Command Line Entries with Field Length Evaluation
version = 1.0.2
date_created = 2025-05-05 11:19:01
date_updated = 2025-7-2 14:43:16
category = Threat Hunter's Cookbook
sub_category = Searching and Filtering
tags = Command Line,Dynamic Field Generation
solution = </strong></p><p><span style="color: rgb(0, 0, 0); background-color: transparent;">This query examines the Windows </span><u style="color: rgb(17, 85, 204); background-color: transparent;"><a rel="noopener noreferrer" href="https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon">Sysmon</a></u><span style="color: rgb(0, 0, 0); background-color: transparent;"> dataset for events containing the CommandLine field. It calculates the length of the CommandLine using the len function, storing the result in a new field called lenCL. It then filters for events where lenCL exceeds 1000 characters and displays the results in a table, sorting them in descending order by lenCL.</span></p><p>...(content truncated for brevity). To see all content download <a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">The Threat Hunter's Cookbook</a></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=XmlWinEventLog source=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational CommandLine=*</code><br>       - Filter Sysmon events from the specified index where CommandLine field exists.<br><b>02</b> <code>| eval lenCL=len(CommandLine)</code><br>       - Calculate the length of each CommandLine and store in lenCL field.<br><b>03</b> <code>| where lenCL>1000</code><br>       - Filter to only include command lines exceeding 1000 characters.<br><b>04</b> <code>| table _time CommandLine ProcessId ParentProcessId ParentCommandLine lenCL</code><br>       - Display relevant fields in a table format.<br><b>05</b> <code>| sort - lenCL</code><br>       - Sort results by command line length in descending order.<br>
explanation = <p><strong style="background-color: transparent; color: rgb(17, 85, 204);"><u><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eval">len</a></u></strong><span style="background-color: transparent; color: rgb(0, 0, 0);">, used within </span><span style="background-color: transparent; color: rgb(38, 98, 253);">eval</span><span style="background-color: transparent; color: rgb(0, 0, 0);">, calculates the length of a string or number of characters in a field. It's often used to validate data lengths or for quality checks.</span></p><p><span style="background-color: transparent; color: rgb(0, 0, 0);">The eval command is incredibly versatile, and can compute bitwise functions, cryptographic functions, or evaluate other characteristics of text – </span><span style="background-color: rgb(255, 153, 0); color: rgb(0, 0, 0);">be sure to </span><u style="background-color: rgb(255, 153, 0); color: rgb(17, 85, 204);"><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/commonevalfunctions">check the docs</a></u><span style="background-color: rgb(255, 153, 0); color: rgb(0, 0, 0);"> and </span><u style="background-color: rgb(255, 153, 0); color: rgb(17, 85, 204);"><a rel="noopener noreferrer" href="https://www.splunk.com/en_us/pdfs/solution-guide/splunk-quick-reference-guide.pdf">quick reference guide</a></u><span style="background-color: rgb(255, 153, 0); color: rgb(0, 0, 0);"> for more uses!</span></p>
quid = 84927CA8D9D418334DC78C44482BF614
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>You are <b>hunting</b> for <b>exceptionally-long</b> command line entries.</p>
search = index="<<index>>" sourcetype=XmlWinEventLog source=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational CommandLine=* \
	| eval lenCL=len(CommandLine) \
	| where lenCL>1000 \
	| table _time CommandLine ProcessId ParentProcessId ParentCommandLine lenCL \
	| sort - lenCL

