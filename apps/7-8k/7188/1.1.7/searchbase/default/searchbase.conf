tags = Buckets,SmartStore,Throughput
solution = <p>The search supports operational dashboards tracking <b>SmartStore throughput trends</b> by bucket operation type. This is critical for performance optimization.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify cache-heavy usage trends and adjust configurations accordingly.<br><b>2.</b> Review cache ID trends to validate load distribution frequency.<br><b>3.</b> Drill-down on sudden spikes in specific actions (like downloads) to discover and resolve underlying issues.<br><b>4.</b> Compare transfer ratios for read-write equilibrium.<br><b>5.</b> Plan capacity growth based on operation-specific historical patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index=_audit (action=local_bucket_upload OR action=remote_bucket_download OR action=local_bucket_evict OR action=remote_bucket_remove) info=completed</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter relevant SmartStore bucket actions from _audit index.<br><b>02</b> <code>| bin span=1h _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Group events by 1-hour intervals for meaningful throughput trending.<br><b>03</b> <code>| stats sum(kb) as kb by action, cache_id, _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate total transferred KB by action type, cache ID, and time bucket.<br>
explanation = <p>This search monitors <b>SmartStore</b> data movement by aggregating the total volume of data transferred in bucket operations (uploads to remote storage, downloads to cache, evictions from cache, and removals from remote storage) over hourly intervals.</p><p>By tracking throughput trends separately by operation type and cache ID, administrators can identify periods of heavy <b>SmartStore activity</b>, validate that cache sizing is optimal for search patterns, detect unusual spikes in downloads indicating <b>cache thrashing</b>, and understand the balance between remote storage writes and reads. This ensures administrators can accurately forecast future workload demands and troubleshoot anomalous patterns that may degrade performance.</p><p>The search leverages <b>bin</b> to group events over time intervals and <b>stats</b> to aggregate and analyze throughput by action type and cache ID, producing insightful KPIs for SmartStore configurations. Juniors can learn practical skills in time-based aggregation and action-driven KPIs that enhance operational insights.</p>
