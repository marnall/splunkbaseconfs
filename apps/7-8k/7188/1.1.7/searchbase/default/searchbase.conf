version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Search
tags = Access,Indexes
solution = <p>This query provides actionable insights into the health and efficiency of Splunk's indexing environment, spotlighting issues like storage utilization, event distribution, and data retention trends.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor index sizes to preempt disk space shortages and allocate additional resources as necessary.<br><b>2.</b> Track event count trends to identify potential data ingestion anomalies.<br><b>3.</b> Review earliest and latest event fields to ensure data is ingested and searchable within expected time frames.<br><b>4.</b> Validate retention policies by comparing retention duration against organizational compliance requirements.<br><b>5.</b> Regularly schedule this query and set up alerts for anomalies in index metadata.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| dbinspect</code><br>       - The <b>'dbinspect'</b> command generates detailed information about the indexes, such as size, event counts, earliest events, and latest events. It directly outputs details of Splunk's data storage.<br><br>
explanation = <p>This search is optimized for Splunk administrators who need to understand the state and health of their indexes. The <b>'dbinspect'</b> command generates detailed metrics, such as index name, total size, event counts, and the earliest and latest events. These insights can reveal issues like <b>data ingestion delays</b>, <b>unexpected storage growth</b>, or <b>data retention policy adherence</b>. By monitoring these metrics, admins can pre-emptively address data growth, troubleshoot ingestion, and ensure compliance with organizational storage policies.</p>
quid = 94DA87D7F7C80AF7581DA2F595ED47DA
search_author = Splunk
updated_author = khutchinson
description = <p>Summarizes <b>Inspect Database Indexes and Metadata</b> using <code>| dbinspect</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | dbinspect

[get_information_from_all_indexes]
search_name = Get Information from All Indexes
version = 2.x
date_created = 2025-05-18
category = Splunk
sub_category = _internal
tags = Rest
solution = <p>Use to verify <b>indexing policies</b> such as <b>frozenTimePeriodInSecs</b> and <b>maxDataSize</b> across apps.</p><p><b>Suggested Actions</b><br><b>01</b> Identify indexes with missing retention settings.<br><b>02</b> Audit for unused or misnamed indexes.<br><b>03</b> Compare hot/cold/thawed path configurations.<br><b>04</b> Validate sharing and app ownership scopes.<br><b>05</b> Correlate index sizes with ingestion volumes.<br><br><b>Recommended Alerts</b><br><b>01</b> Normal: All key fields populated<br><b>02</b> Low: 1–2 fields blank per index<br><b>03</b> Medium: 3–5 blank fields<br><b>04</b> High: 6–8 fields missing<br><b>05</b> Critical: ≥ 9 fields missing or inconsistent<br><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| rest /configs/conf-indexes</code><br>       - Gets raw index configurations.<br><b>02</b> <code>| foreach *</code><br>       - Normalizes blank values.<br><b>03</b> <code>| join app</code><br>       - Adds readable app labels.<br><b>04</b> <code>| eval app_label = ...</code><br>       - Fallback to app name if label missing.<br>
explanation = This search extracts <b>index-level settings</b> from <b>conf-indexes</b> via REST, standardizes null fields with dashes, and joins with local <b>app labels</b> for readability. By auditing <b>retention policies</b>, <b>hot bucket limits</b>, and <b>indexing structure</b> at the app level, it ensures compliance and optimizes storage configurations.
quid = 0E1127E82B2E5A8943F0FF0493660B5F
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/indexing/indexes-and-indexers/how-indexes-work">indexes.conf Documentation</a><br>Full explanation of each index parameter.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/administer-splunk-enterprise-with-rest-apis">REST API - conf-indexes</a><br>Use the REST API to manage index settings.</li><li><a href="https://lantern.splunk.com/Platform/Data_Management/Managing_index_retention">Managing Index Retention</a><br>Lantern article on controlling retention lifecycle.</li><li><a href="https://community.splunk.com/t5/Administration/Audit-index-settings-across-apps/m-p/452739">Audit Index Settings</a><br>Splunk community discussion on index audits.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview">Apps and App Management</a><br>Understand app-level config hierarchy.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/foreach">foreach Command Reference</a><br>Used for bulk field operations.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/join">join Command</a><br>Enables combination of config and app data.</li></ul>
description = Displays <b>index configuration settings</b> per app using the <b>REST API</b>.
search = | rest splunk_server=local /servicesNS/-/-/configs/conf-indexes \
	| rename eai:appName as app eai:acl.sharing as sharing \
	| table app sharing author title homePath coldPath thawedPath frozenTimePeriodInSecs maxDataSize maxHotBuckets maxTotalDataSizeMB \
	| foreach * [eval FIELD = if(len(FIELD)>0, 'FIELD', "-")] \
	| join app type=left [| rest splunk_server=local /servicesNS/-/-/apps/local \
	| rename title as app label as app_label \
	| table app app_label] \
	| eval app_label = if(isnotnull(app_label), app_label, app)

[get_kv_store_metrics]
search_name = KVStore Collection Statistics by App and Collection
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This search ensures enhanced visibility into KV Store performance by uncovering critical statistics such as object counts and storage allocations. With this level of analytic insight, Splunk administrators can make informed decisions to optimize storage, manage resources, and understand application-level data usage patterns.</p><p><b>Suggested Actions</b><br><b>1.</b> Examine large collections and evaluate their necessity; remove or archive unused data to optimize performance.<br><b>2.</b> Monitor the acceleration size to ensure indices are not overly consuming storage.<br><b>3.</b> Use the object counts within collections for capacity planning and budgeting for storage needs.<br><b>4.</b> Identify the most active or problematic applications causing storage bloat.<br><b>5.</b> Schedule routine checks to continuously track and manage growth in collection sizes.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/server/introspection/kvstore/collectionstats</code><br>       - Accesses the REST endpoint to retrieve KV Store collection statistics.<br><b>02</b> <code>| mvexpand data</code><br>       - Expands the 'data' field to create individual rows for each collection statistics.<br><b>03</b> <code>| spath input=data</code><br>       - Extracts fields from the JSON-encoded 'data'.<br><b>04</b> <code>| rex field=ns "(?&lt;App&gt;.*)\\.(?&lt;Collection&gt;.*)"</code><br>       - Extracts application ('App') and collection ('Collection') names from the 'ns' field.<br><b>05</b> <code>| eval dbsize=round(size/1024/1024, 2)</code><br>       - Converts database size from bytes to megabytes and rounds to two decimals.<br><b>06</b> <code>| eval indexsize=round(totalIndexSize/1024/1024, 2)</code><br>       - Converts index size from bytes to megabytes and rounds to two decimals.<br><b>07</b> <code>| stats first(count) AS "Number of Objects" first(nindexes) AS Accelerations first(indexsize) AS "Acceleration Size (MB)" first(dbsize) AS "Collection Size (MB)" by App, Collection</code><br>       - Aggregates and calculates the first values of required metrics for each 'App' and 'Collection'.<br>
explanation = <p>This query is useful for monitoring and managing the KV Store. It provides detailed insights into the number of objects within each collection, the size of the database in megabytes, and the size of the indexed data. By analyzing these metrics, administrators can identify large collections that may need optimization, monitor storage usage trends, and foresee potential scalability challenges. The command flow ensures extraction and transformation of data from the KV Store introspection endpoint, highlighting operational and capacity-based metrics critical for system health.</p>
quid = C400C186F2425E48796A8DABD579706F
search_author = GoSplunk: ccloutier
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/get-kv-store-metrics" target="_blank">https://gosplunk.com/get-kv-store-metrics</a></p>
description = <p>This query is retrieving statistics about the KV Store collections, including the number of objects, accelerations, acceleration size, and collection size for each application and collection.</p>
search = | rest /services/server/introspection/kvstore/collectionstats\
	| mvexpand data\
	| spath input=data\
	| rex field=ns "(?<App>.*)\\.(?<Collection>.*)"\
	| eval dbsize=round(size/1024/1024, 2)\
	| eval indexsize=round(totalIndexSize/1024/1024, 2)\
	| stats first(count) AS "Number of Objects" first(nindexes) AS Accelerations first(indexsize) AS "Acceleration Size (MB)" first(dbsize) AS "Collection Size (MB)" by App, Collection

[get_list_of_concurrent_users_on_a_specific_server]
search_name = Windows Security Logon Events Analysis with Frequency Count
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,Users
solution = <p>This query helps security teams track and analyze user logon patterns in Windows Security logs, enabling them to identify unusual activity that might indicate a potential security threat.</p> \
<p><b>Suggested Actions</b><br><b>1.</b> Investigate accounts with a high count of logon events within a short time frame.<br> \
<b>2.</b> Cross-reference identified accounts with other system logs to detect anomalies.<br> \
<b>3.</b> Implement additional security controls or monitoring for suspicious accounts.<br> \
<b>4.</b> Use the time-bucketed activity to inform forensic investigations into specific hosts.<br> \
<b>5.</b> Enhance alerting thresholds or operational protocols to address high-frequency logon patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products.html" target="_blank">Products: Splunk Products (overview)</a><br>Splunk Products (overview).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4624 (Logon_Type=10 OR Logon_Type=2)</code><br>       - Retrieves successful logon events from the Windows Security Event Log with specific logon types (Interactive or RemoteInteractive).<br> \
	<b>02</b> <code>| bucket span=30m _time</code><br>       - Groups events into 30-minute time intervals for better pattern recognition.<br> \
	<b>03</b> <code>| eval Date=strftime(_time, "%Y/%m/%d %H:%M:%S")</code><br>       - Formats the event time into a human-readable string.<br> \
	<b>04</b> <code>| rex "New\sLogon:\s*Security\sID:\s+\s*\s+Account\sName:\s+(?<ACCT>\s+)"</code><br>       - Extracts the account name from the event details using a regular expression.<br> \
	<b>05</b> <code>| stats count by ACCT, _time, host</code><br>       - Counts logon events per account, time interval, and host.<br> \
	<b>06</b> <code>| where count>1</code><br>       - Filters out single occurrences to highlight more significant patterns.<br> \
	<b>07</b> <code>| sort - count</code><br>       - Sorts results by count in descending order to prioritize high-activity accounts.<br>
explanation = <p>This search provides a method to monitor and analyze Windows Security logon events. By analyzing EventCode 4624, which tracks successful logons, and filtering for Logon_Type 10 (RemoteInteractive) or 2 (Interactive), you can pinpoint specific types of access activity.</p> \
	<p>Grouping events into 30-minute buckets enhances visibility into user activity during brief intervals, which is useful for detecting potential anomalies. Extracting account names (via <b>rex</b>) and counting logon events helps correlate activity to specific users and hosts, allowing teams to identify patterns or anomalies, such as concurrent logons or unusual frequency that may indicate a <b>security issue</b>. Filtering low-frequency activity ensures the focus stays on <b>high-impact anomalies</b>.</p>
quid = F2A3B4C5D6E7F8A9B0C1D2E3F4A5B6C7
search_author = GoSplunk: rupya1983
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/get-list-concurrent-users-specific-server" target="_blank">https://gosplunk.com/get-list-concurrent-users-specific-server</a></p>
description = <p>Summarizes <b>Windows Security Logon Events Analysis with Frequency Count</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4624 (Logon_Type=10 OR Logon_Type=2)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4624 (Logon_Type=10 OR Logon_Type=2)\
	| bucket span=30m _time\
	| eval Date=strftime(_time, "%Y/%m/%d %H:%M:%S")\
	| rex "New\sLogon:\s*Security\sID:\s+\s*\s+Account\sName:\s+(?<ACCT>\s+)"\
	| stats count by ACCT, _time, host\
	| where count>1\
	| sort - count

