solution = <p>This search analyzes index distribution for informed license and storage management.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify indexes consuming significant license quotas.<br><b>2.</b> Allocate licenses efficiently to critical-index needs.<br><b>3.</b> Prioritize optimizations for high-volume indexes.<br><b>4.</b> Use insights to plan capacity growth.<br><b>5.</b> Discuss governance based on disproportionate index usages.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index=_internal sourcetype="*license_usage.log*" </code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Searches the internal index for license usage logs.<br><b>02</b> <code>stats latest(b) as b by idx</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates the latest license usage data grouped by index.<br><b>03</b> <code>stats sum(eval(b/1024/1024/1024)) AS volume_gb by idx</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Converts bytes to GB and calculates total volume by index.<br><b>04</b> <code>eventstats sum(volume_gb) as total_volume</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates total ingestion volume across all indexes.<br><b>05</b> <code>eval pect=round((volume_gb/total_volume)*100,2)."%"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Derives the percentage contribution for each index.<br><b>06</b> <code>table idx volume_gb pect | sort -pect</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Displays the results in a tabular format sorted by percentage.</p>
explanation = <p>This search provides strategic visibility into license consumption by calculating total volume in GB for each index and determining its percentage contribution to overall ingestion. This percentage-based analysis enables license allocation decisions, helps identify indexes that may require dedicated license pools, supports discussions about data value versus cost, and facilitates capacity planning conversations with stakeholders.</p><p>Understanding that certain indexes consume disproportionate license capacity allows administrators to implement appropriate governance, optimize high-volume indexes, or justify additional license purchases based on business-critical data requirements.</p><p>The SPL commands leverage <b>stats</b> to aggregate total usage, <b>eventstats</b> for total volume calculations across result rows, and <b>eval</b> to derive percentage contributions, emphasizing how Splunk's pipeline transforms raw fields into actionable insights.</p>
quid = 1F8D5E9B4A7C2E1F6D9B5A8F3E7C4D2A
search_author = Splunk Works
description = <p>Provides detailed statistics on index volume with percentage breakdown. This search helps Splunk administrators gain complete insights into license usage by identifying the volume contribution of each index.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_internal source="*license_usage.log*" type=Usage | stats latest(b) as b by idx | stats sum(eval(b/1024/1024/1024)) AS volume_gb by idx | eventstats sum(volume_gb) as total_volume | eval pect=round((volume_gb/total_volume)*100,2)."%" | table idx volume_gb pect | sort -pect

