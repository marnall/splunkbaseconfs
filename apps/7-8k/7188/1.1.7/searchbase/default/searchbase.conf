[condition_as_percentage_cart_conversion]
search_name = GET Requests Conversion Rate: Page Views to Purchases
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,SFU
solution = <p>This query provides key insights into how effectively your website converts views into purchases, a critical metric for digital marketing and sales optimization. By analyzing the conversion rate, teams can identify strengths and areas for improvement in customer interaction and engagement.</p> <p><b>Suggested Actions</b><br> <b>1.</b> Review trends in conversion rates over time to identify changes in user behavior.<br> <b>2.</b> Investigate pages with high views but low purchase rates to identify potential issues with content or usability.<br> <b>3.</b> Utilize the insights to optimize website layout, navigation, or calls-to-action for better user experience.<br> <b>4.</b> Conduct A/B testing on key landing pages to boost conversion rates.<br> <b>5.</b> Collaborate with marketing teams to align campaigns with high-converting pages and products.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=*access* method=GET</code><br>       - Specify the data source, filtering for access logs where the HTTP method is GET.<br> <b>02</b> <code>| stats count AS Page_Views, count(eval(action="purchase")) AS Actual_Purchases</code><br>       - Summarize the data to calculate the total <b>page views</b> and <b>actual purchases</b>.<br> <b>03</b> <code>| eval "Conversion %" = ((Actual_Purchases * 100) / Page_Views)</code><br>       - Calculate the conversion rate, capturing how effectively page views convert into customer purchases.<br> <b>04</b> <code>| rename Page_Views as Views, Actual_Purchases as Purchases</code><br>       - Simplify field names for clarity in reports and dashboards.<br>
explanation = <p>This query is valuable for analyzing user behavior on a website by measuring the <b>effectiveness</b> of the website in converting visitors into customers. By identifying the percentage of <b>page views</b> that result in a <b>purchase</b>, this search aids in improving <b>sales performance</b>, understanding <b>visitor behavior</b>, and optimizing <b>web traffic strategies</b>.</p> <p>The query first filters the data to include only GET requests from access logs and calculates necessary metrics such as <b>total views</b> and <b>total purchases</b>. The <code>stats</code> command provides a tailored summary, and the <code>eval</code> function computes the percentage conversion rate, a critical KPI for web analytics. The final <code>rename</code> command ensures that fields are user-friendly for reporting and interpretation.</p>
quid = 0B7C1F36943A13656C543CC689C7C1C1
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>GET Requests Conversion Rate: Page Views to Purchases</b> using <code>index="<<index>>" sourcetype="*access*" method=GET</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="*access*" method=GET\
| stats count AS Page_Views, count(eval(action="purchase")) AS Actual_Purchases\
| eval "Conversion %" =((Actual_Purchases*100)/Page_Views)\
| rename Page_Views as Views Actual_Purchases as Purchases

