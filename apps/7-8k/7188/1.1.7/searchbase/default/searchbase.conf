solution = <p>This query offers key <b>visibility</b> into security audit failures, helping to detect patterns and anomalies. Key insights include identifying misconfigured accounts, pinpointing compromised hosts, and tracking security trends over time.</p> \
	<p><b>Suggested Actions</b><br><b>1.</b> Investigate accounts with a high volume of failures to identify unauthorized access attempts.<br><b>2.</b> Review hosts showing repeated failed audits for potential misconfigurations or signs of compromise.<br><b>3.</b> Use the data to refine user training and improve password policies.<br><b>4.</b> Correlate results with other logs to identify broader attack patterns.<br><b>5.</b> Evaluate and address failed audits to comply with organizational or regulatory security requirements.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4723 Keywords="Audit Failure"</code><br>       - Filters events to include only Windows Security Event Log entries with EventCode 4723 (failed audit events).<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Creates a new field "Date" in the format "YYYY/MM/DD" to standardize event timestamps.<br><b>03</b> <code>| rex "Target\sAccount:\s+Security\sID:.*\\\(?<account>\S+)"</code><br>       - Extracts the account field using a regular expression for use in analysis.<br><b>04</b> <code>| stats count by Date, account, host</code><br>       - Counts occurrences grouped by Date, account, and host to highlight problematic entities.<br><b>05</b> <code>| sort - Date</code><br>       - Sorts results in descending order by Date for logical viewing and prioritization.<br>
explanation = <p>This search is critical for monitoring and investigating <b>security incidents</b>.</p> \
	<p>By identifying accounts frequently associated with <b>failed audit events</b> and pinpointing the hosts where these events occur, administrators can uncover <b>potential security threats</b> and <b>vulnerabilities</b>. The search uses the `index` and `source` commands to filter the dataset for Windows Security Event Log entries. The `eval` command formats the event date for consistency, while `rex` extracts account details using a <b>regular expression</b>. Aggregating data with `stats` and sorting it using `sort` ensures that results are easy to analyze.</p>
quid = 5A17AE743B59F9120AF9FB018A599D1D
search_author = grdhg24
updated_author = khutchinson
description = <p>This query searches for <b>failed audit events</b> (EventCode 4723) in the Windows Security Event Log.</p> \
	<p>It extracts the date, account, and host associated with each event, counts the <b>occurrences</b> for each combination of these fields, and sorts the results in descending order by date.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4723 Keywords="Audit Failure"\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| rex "Target\sAccount:\s+Security\sID:.*\\\(?<account>\S+)"\
	| stats count by Date, account, host\
	| sort - Date

