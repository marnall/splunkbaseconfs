description = <p>Summarizes <b>WP-Admin Access Analysis by Location and IP</b> using <code>index="<<index>>" sourcetype="access_combined" uri="/wp-admin/admin-ajax.php?_fs_blog_admin=*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="access_combined" uri="/wp-admin/admin-ajax.php?_fs_blog_admin=*"\
