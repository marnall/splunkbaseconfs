solution = <p>This query identifies users approaching or exceeding their realtime search concurrency limits, which is especially crucial for maintaining system stability and controlling resource usage.</p><p><b>Suggested Actions</b><br><b>1.</b> Notify users who consistently exceed limits to educate them about best practices for search execution.<br><b>2.</b> Use data to justify implementing system-wide or group-based realtime search limits.<br><b>3.</b> Monitor repeatedly flagged users for potential misuse or inefficient query habits.<br><b>4.</b> Incorporate insights into user training materials regarding search optimization.<br><b>5.</b> Adjust concurrency limits if trends indicate a consistent undersupply of realtime search capacity.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
