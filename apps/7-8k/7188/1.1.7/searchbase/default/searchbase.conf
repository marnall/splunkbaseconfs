description = <p>Summarizes <b>SmartStore Bucket Operations</b> using <code>index=_audit (action=local_bucket_upload OR action=remote_bucket_download OR action=local_bucket_evict) info=completed |</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
