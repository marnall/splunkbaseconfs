solution = <p>This search enables monitoring and auditing of access rights changes in Windows environments.</p><p><b>Suggested Actions</b><br><b>1.</b> Verify rights removals against approved change requests.<br><b>2.</b> Investigate unexpected changes to user access rights.<br><b>3.</b> Set up alerts for changes to high-privilege accounts.<br><b>4.</b> Review patterns to identify potential privilege escalation attempts.<br><b>5.</b> Maintain audit trail for compliance requirements.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security EventCode=4718</code><br>       - Specifies the data source, filtering for Security logs with EventCode 4718, indicating a change in user access rights.<br><b>02</b> <code>eval Date=strftime(_time, %Y/%m/%d)</code><br>       - Converts the event timestamp to a more readable format.<br><b>03</b> <code>stats count by src_user, user, Access_Right, Date, Keywords</code><br>       - Counts occurrences by source user, target user, access right, date, and keywords.<br><b>04</b> <code>rename src_user as "Source Account"</code><br>       - Enhances readability by renaming fields.<br><b>05</b> <code>rename user as "Target Account"</code><br>       - Enhances readability by renaming fields.<br><b>06</b> <code>rename Access_Right as "Rights Removed"</code><br>       - Enhances readability by renaming fields.<br>
explanation = <p>This query is used to <b>monitor</b> changes in user access rights in a Windows environment. It helps <b>identify</b> unauthorized or suspicious changes, which could indicate a security breach or misuse of privileges. The query utilizes various Splunk functions: <b>index</b> and <b>source</b> filter the specific event logs; <b>eval</b> converts timestamp for readability; <b>stats</b> aggregates event counts, and <b>rename</b> improves field clarity for users.</p>
quid = 99D93FD57B2089A0697CE414B21CFACC
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/system-security-access-removed-from-account" target="_blank">https://gosplunk.com/system-security-access-removed-from-account</a></p>
description = <p>Summarizes <b>Security Event Log: Rights Removed from User Accounts by Date</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4718</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4718\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| stats count by src_user, user, Access_Right, Date, Keywords\
	| rename src_user as "Source Account"\
	| rename user as "Target Account"\
	| rename Access_Right as "Rights Removed"

