sub_category = Access
tags = Access,GoSplunk
solution = <p>This query offers <b>valuable insights</b> into system restart behaviors, assisting administrators in identifying hosts with unexpected or prolonged restart durations, which may signal potential <b>operational issues</b> such as hardware problems, misconfigurations, or other inefficiencies.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Investigate systems exhibiting excessive or frequent restart durations for possible hardware issues or software incompatibilities.<br> \
<b>2.</b> Monitor restart trends over time to pinpoint recurring issues or identify patterns.<br> \
<b>3.</b> Cross-reference restart times with maintenance activities or update schedules for correlation.<br> \
<b>4.</b> Ensure affected systems are running the latest patches and updates.<br> \
<b>5.</b> Review and optimize system configuration to reduce unnecessary restarts or lengthy boot times.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=*WinEventLog source=*WinEventLog:System (EventCode=6005 OR EventCode=6006)</code><br>       - Specify the data source as Windows System Event Logs, filtered to include only system startup (6005) and shutdown (6006) events.<br> \
	<b>02</b> <code>| transaction host startswith="EventCode=6006" endswith="EventCode=6005"</code><br>       - Create transactions for each host, grouping sequential shutdown and startup events.<br> \
	<b>03</b> <code>| eval restart_duration=tostring(duration,"duration")</code><br>       - Calculate the duration of each transaction (time between shutdown and startup), converting it to a string format.<br> \
	<b>04</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Convert the event timestamps into a readable date format.<br> \
	<b>05</b> <code>| where duration > 480</code><br>       - Filter out transactions where the duration is equal to or less than 480 seconds.<br> \
	<b>06</b> <code>| table host index Date restart_duration</code><br>       - Organize the output into a table featuring host, index, date, and restart duration.<br> \
	<b>07</b> <code>| sort - Date</code><br>       - Sort the table by date in descending order.<br> \
	<b>08</b> <code>| rename restart_duration as "Restart Duration"</code><br>       - Rename the "restart_duration" column for improved readability.<br>
explanation = <p>This query leverages <b>Windows System Event Logs</b> to monitor and analyze restart times for systems managed within your Splunk instance. EventCode 6006 identifies shutdown events, while EventCode 6005 indicates startup events. By creating transactions per host where these events occur consecutively, the query calculates the time elapsed between them (restart duration).</p> \
	<p>The search applies a filter to include only durations exceeding 480 seconds, providing a focused dataset of potentially significant events or anomalies. The results are sorted by date for easier chronological analysis. This information can be used to pinpoint systems with excessive restart times, which may indicate <b>underlying performance or configuration issues.</b></p>
quid = 69D7A155B5E44D728F1C122AD27A1953
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/windows-power-off-duration" target="_blank">https://gosplunk.com/windows-power-off-duration</a></p>
description = <p>Summarizes <b>Windows System Restart Duration Analysis</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:System (EventCode=6005 OR EventCode=6006)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:System (EventCode=6005 OR EventCode=6006)\
	| transaction host startswith="EventCode=6006" endswith="EventCode=6005"\
	| eval restart_duration=tostring(duration,"duration")\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| where duration > 480\
	| table host index Date restart_duration\
	| sort - Date\
	| rename restart_duration as "Restart Duration"

[windows_security_daily_domain_activities]
search_name = Windows Security Events Analysis with Account Details
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>By using this search, you achieve a comprehensive understanding of administrative activities that impact Windows domain security. Critical insights, such as who initiated changes and what accounts were affected, enhance organizational awareness and facilitate proactive defense against potential threats.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any unexpected or unauthorized changes in user accounts or group memberships.<br><b>2.</b> Enable continuous monitoring of domain activity, leveraging this search to capture anomalies.<br><b>3.</b> Cross-check with user access policies to ensure compliance.<br><b>4.</b> Share insights from this search during audits to demonstrate robust security oversight.<br><b>5.</b> Refine alerting mechanisms to flag specific events of high concern.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security</code><br>       - This line specifies the index and source of the data to be searched.<br><b>02</b> <code>src_nt_domain!=NT AUTHORITY</code><br>       - Filters out events originating from the 'NT AUTHORITY' domain.<br><b>03</b> <code>EventCode=4720 OR EventCode=4726 OR ...</code><br>       - Targets specific Event Codes relevant to user and group management activities.<br><b>04</b> <code>| rex field=member_id ...</code><br>       - Extracts ITS Admin and Target Account from the 'member_id' field using a regular expression.<br><b>05</b> <code>| eval Target_Account=if(...)</code><br>       - Evaluates the 'Target Account'. If 'NONE_MAPPED', it's replaced with a trimmed value from 'member_dn'; otherwise, it remains unchanged.<br><b>06</b> <code>| table _time, EventCode, ...</code><br>       - Constructs a table with the specified fields.<br><b>07</b> <code>| sort EventCodeDescription,ITS_Admin, Target_Account</code><br>       - Orders the table by Event Code Description, ITS Admin, and Target Account.<br><b>08</b> <code>| rename ITS_Admin as ITS Admin, src_nt_domain as Source Domain</code><br>       - Renames fields for readability ('ITS_Admin' as 'ITS Admin', 'src_nt_domain' as 'Source Domain').
explanation = <p>This search shines a spotlight on Windows Security Event Codes associated with user and group management activities. By filtering out irrelevant domains such as 'NT AUTHORITY' and focusing on critical Event Codes like account creation, deletion, and group membership changes, it provides a clear lens into administrative actions within the domain.</p><p>The search employs a <b>rex</b> command to extract 'ITS Admin' and 'Target Account' data from the 'member_id' field, enabling users to identify who initiated changes and which accounts were involved. The <b>eval</b> command intelligently handles cases where a 'Target Account' appears as 'NONE_MAPPED', defaulting to relevant administrative identifiers for accurate audit trails.</p><p>This analysis culminates in a structured table, neatly ordered and categorized, making it an indispensable tool for auditing, compliance, and identifying <b>unauthorized</b> or <b>suspicious activities</b>.</p>
quid = 19C8A72CFAD6046B57C763CE0CEDA916
