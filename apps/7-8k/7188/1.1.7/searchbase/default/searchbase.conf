execution_plan = <b>01</b> <code>index=<<index>> sourcetype=iis</code><br>       - This line specifies the data source, targeting the designated index with the 'iis' sourcetype.<br> <b>02</b> <code>| stats range(_time) as duration by JSESSIONID</code><br>       - Calculates the session duration by determining the range of <code>_time</code> values for each <code>JSESSIONID</code>.<br> <b>03</b> <code>| stats avg(duration) as AVG</code><br>       - Computes the average session duration across all identified sessions.<br> <b>04</b> <code>| fieldformat AVG=tostring(AVG,"duration")</code><br>       - Converts the average duration to a string format for clearer representation.<br> <b>05</b> <code>| eval AVG=round(AVG, 0)</code><br>       - Rounds the average duration to the nearest whole number for simplicity.<br>
