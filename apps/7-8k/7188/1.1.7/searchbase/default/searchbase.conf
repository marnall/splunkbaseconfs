[escalation_of_privileges_via_su_in_linux]
search_name = Linux Secure Log: Daily Root Access Attempts by User and Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This search provides insight into <b>privilege escalation activity</b> in Linux environments by monitoring the <b>'su'</b> command usage.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Review all identified occurrences of root access in the summarized results.<br> \
<b>2.</b> Investigate any suspicious or unexpected accounts with escalated privileges.<br> \
<b>3.</b> Cross-reference with user access policies and permissions to identify anomalies.<br> \
<b>4.</b> Take remedial action against unauthorized root access.<br> \
<b>5.</b> Incorporate findings into long-term security audits to refine privilege policies.<br></p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=linux_secure source="/var/log/*" "su: ("</code><br>       - Targets Linux secure logs to locate instances of the <b>'su' command</b>.<br> \
	<b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts raw event timestamps to a more <b>human-readable date format</b>.<br> \
	<b>03</b> <code>| rex ".*:\d{2}\s(?<hostname>\s+)"</code><br>       - Extracts the <b>hostname</b> value from the log entries for analysis.<br> \
	<b>04</b> <code>| rex "su:\s\sto\sroot\s\s(?<SU>\s+)"</code><br>       - Pulls data on <b>accounts escalating privileges to root</b> from log entries.<br> \
	<b>05</b> <code>| stats count by Date, hostname, SU</code><br>       - Summarizes the data by grouping occurrences by <b>date, hostname, and SU</b>.<br> \
	<b>06</b> <code>| rename count as "Occurrences"</code><br>       - Renames <b>count</b> to <b>Occurrences</b> for improved readability.<br> \
	<b>07</b> <code>| rename SU as "Account with Escalated Privileges"</code><br>       - Renames the extracted <b>SU</b> field for enhanced clarity.<br> \
	<b>08</b> <code>| sort - Date</code><br>       - Orders results by <b>date in descending order</b> for prioritized review.<br>
explanation = <p>This search leverages secure log data to uncover the <b>'su'</b> command usage. By extracting fields like <b>date</b>, <b>hostname</b>, and the <b>account</b> escalating to root privileges, it helps monitor privilege usage and uncover potential <b>unauthorized or excessive root account activity</b>. This is vital for security audits and identifying suspicious patterns.</p> \
	<p>The SPL uses <code>eval</code> to reformat the date for readability and <code>rex</code> commands to extract critical fields like <b>hostname</b> and the account employing root access. Finally, the <code>stats</code> command tallies occurrences by date, hostname, and account, providing actionable summaries for audit purposes.</p>
quid = 21F200A4C70957DB4EF13597E22D29E4
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/escalation-of-privileges-via-su-in-linux" target="_blank">https://gosplunk.com/escalation-of-privileges-via-su-in-linux</a></p>
description = <p>Summarizes <b>Linux Secure Log: Daily Root Access Attempts by User and Host</b> using <code>index="<<index>>" sourcetype=linux_secure source="/var/log/*" "su: ("</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=linux_secure source="/var/log/*" "su: ("\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| rex ".*:\d{2}\s(?<hostname>\s+)"\
	| rex "su:\s\sto\sroot\s\s(?<SU>\s+)"\
	| stats count by Date, hostname, SU\
	| rename count as "Occurrences"\
	| rename SU as "Account with Escalated Privileges"\
	| sort - Date

