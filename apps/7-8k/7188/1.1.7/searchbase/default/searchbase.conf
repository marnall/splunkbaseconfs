[pi_average_search_concurrency]
search_name = Search Concurrency Workload Analysis
version = 2.x
date_created = 2025-12-01
category = Splunk
sub_category = Search
tags = Concurrency,Performance,Workload
solution = <p>Analyzing the average search concurrency provides actionable insights into resource usage and helps optimize search scheduling, allowing Splunk admins to maintain a resilient and responsive environment.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor concurrency levels to identify peak search times.<br><b>2.</b> Optimize resource allocation based on identified patterns.<br><b>3.</b> Schedule intensive searches during off-peak times.<br><b>4.</b> Review concurrency data to adjust search head capacity and improve performance.<br><b>5.</b> Use findings to guide system expansion or reconfiguration decisions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>eval sid = 'data.search_props.sid'</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extracts SID for further analysis.<br><b>02</b> <code>bin _time span=10s</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Segments data into 10-second intervals.<br><b>03</b> <code>stats dc(sid) AS distinct_search_count by _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Computes distinct search count per interval.<br><b>04</b> <code>timechart span=10s avg(distinct_search_count) as avg_search_concurrency</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Generates average concurrency over time.<br><b>05</b> <code>eval avg_search_concurrency = round(avg_search_concurrency, 2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Rounds the results for readability.<br>
explanation = <p>This search focuses on collecting and averaging the number of <b>distinct concurrent searches</b> every 10 seconds over a one-hour period. It leverages data from the Splunk Introspection logs where search occurrences are persistently monitored. The purpose is to uncover periods of peak demand and adjust strategies accordingly. This insight is vital for optimizing resource allocation, improving search performance, and reducing potential bottlenecks.</p><p>Through the use of SPL commands—<b>eval</b> for calculating fields, <b>bin</b> for time segmentation, and <b>timechart</b> for temporal data analysis—the search provides structured and insightful data, making it perfect for analysis by Splunk admins and operational teams.</p><p>This approach serves as an educational point for junior Splunk engineers: it demonstrates efficient data handling, careful structuring of search pipelines, and the practical application of statistical functions to extract valuable insights from large datasets.</p>
quid = 10FCDF34B9A7C90C361B9585CAB06173
search_author = Splunk Works
description = <p>Summarizes <b>Search Concurrency Workload Analysis</b> using <code>index="_introspection" sourcetype="splunk_resource_usage" component=PerProcess data.search_props.role=head data.search_p</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_introspection" sourcetype="splunk_resource_usage" component=PerProcess data.search_props.role=head data.search_props.sid::* | eval sid = 'data.search_props.sid' | bin _time span=10s | stats dc(sid) AS distinct_search_count by _time | timechart span=10s avg(distinct_search_count) as avg_search_concurrency | eval avg_search_concurrency = round(avg_search_concurrency, 2)

[pi_bucket_statistics]
search_name = Bucket Statistics
version = 2.x
date_created = 2025-12-01
category = Splunk
sub_category = Storage
tags = Buckets,Performance,Storage
solution = <p>Gain operational insight into the efficiency of Splunk indexing through bucket statistics.</p><p><b>Suggested Actions</b><br><b>1.</b> Review total bucket counts for over-indexing issues.<br><b>2.</b> Investigate average bucket sizes for anomalies in expected storage use.<br><b>3.</b> Evaluate warm bucket data to optimize resource allocation.<br><b>4.</b> Use insights for forecasting storage needs and scaling infrastructure.<br><b>5.</b> Implement data retention strategies based on findings to improve performance.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index="_introspection" sourcetype="splunk_disk_objects" component=indexes data.name=* data.total_bucket_count=* | rename data.* as * | rename bucket_dirs.* as * | rename home.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - This step retrieves introspection data on indexing performance and normalizes field names for easier processing.<br><b>02</b> <code>stats latest(total_bucket_count) as total_bucket_count, latest(warm_bucket_count) as warm_bucket_count, latest(hot_bucket_count) as hot_bucket_count, latest(warm_bucket_size) as warm_bucket_size by name, host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates the latest bucket data per index and host.<br><b>03</b> <code>eval size_per_warm_bucket=warm_bucket_size/warm_bucket_count</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates the average size per warm bucket for further insights.<br><b>04</b> <code>stats sum(total_bucket_count) AS total_buckets, sum(warm_bucket_count) AS warm_buckets, sum(hot_bucket_count) AS hot_buckets, avg(size_per_warm_bucket) as avg_bucket_size</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Provides cumulative statistics and averages essential for performance analysis.<br>
explanation = <p>This search provides visibility into Splunk's indexing performance by focusing on bucket statistics. It helps identify potential performance bottlenecks by examining the distribution and size of hot, warm, and total buckets. By calculating these metrics, users can understand storage utilization and efficiency related to index management.</p><p>The <b>stats</b> command aggregates counts and sizes for introspection metrics, revealing patterns in bucket deployment across indexes. With the help of <b>eval</b>, it calculates the average size per warm bucket, which is crucial for overseeing data retention policy compliance and storage efficiency.</p><p>For newer Splunk users, this search showcases fundamental SPL techniques such as statistical aggregation and field calculation. These methods are essential for detailed reporting and provide foundational skills for more advanced analysis.</p>
quid = 2F91C150E2FEC01D7FDB8F164A1E3E8E
search_author = Splunk Works
description = <p>Summarizes <b>Bucket Statistics</b> using <code>index="_introspection" sourcetype="splunk_disk_objects" component=indexes data.name=* data.total_bucket_count=* | rename</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_introspection" sourcetype="splunk_disk_objects" component=indexes data.name=* data.total_bucket_count=* | rename data.* as * | rename bucket_dirs.* as * | rename home.* as * | stats latest(total_bucket_count) as total_bucket_count, latest(warm_bucket_count) as warm_bucket_count, latest(hot_bucket_count) as hot_bucket_count, latest(warm_bucket_size) as warm_bucket_size by name, host | eval size_per_warm_bucket=warm_bucket_size/warm_bucket_count | stats sum(total_bucket_count) AS total_buckets, sum(warm_bucket_count) AS warm_buckets, sum(hot_bucket_count) AS hot_buckets, avg(size_per_warm_bucket) as avg_bucket_size

