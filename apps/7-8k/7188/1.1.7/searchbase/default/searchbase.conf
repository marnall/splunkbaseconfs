[outlier_credit_card_spending_by_category]
search_name = Outlier Credit Card Spending by Category
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Credit,Detail,Fraud
solution = <p>This SPL flags high-value credit card purchases in new or unusual categories for further review. <b>Suggested Actions</b></p><p>1. Investigate flagged transactions for fraud or misuse.<br>2. Correlate with customer and vendor profiles.<br>3. Alert compliance or risk teams.<br>4. Integrate with cardholder monitoring dashboards.<br>5. Refine category lists as spending evolves.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Selects all credit card transactions.<br><b>02</b> <code>| lookup vendor_categories vendor OUTPUT categories</code><br>      - Enriches with vendor categories.<br><b>03</b> <code>| streamstats window=1 list(category) AS category BY account_number</code><br>      - Tracks categories per account.<br><b>04</b> <code>| where (amount > 1000)</code><br>      - Filters high-value transactions.<br><b>05</b> <code>| makemv delim="|" categories</code><br>      - Converts categories to multi-value.<br><b>06</b> <code>| eval match=if(match(categories,category),1,0)</code><br>      - Flags if the category is usual for the account.<br><b>07</b> <code>| where (match == 0)</code><br>      - Filters to outlier categories.<br><b>08</b> <code>| eval amount=tostring(round(amount,2),"commas")</code><br>      - Formats the amount.<br><b>09</b> <code>| table account_number, timestamp, amount, categories, category, status</code><br>      - Outputs review fields.
explanation = <p>This SPL uses a <b>lookup</b> to enrich transactions with known vendor categories, tracks categories seen per account using <b>streamstats</b>, and flags high-value transactions in categories not previously associated with the account. <b>makemv</b> and <b>eval match</b> identify and filter out familiar categories, focusing review on unusual or new spending types. The SPL demonstrates lookup enrichment, multi-value handling, and outlier detection for credit card monitoring.</p>
quid = 422154FA078CE9B6C137A935D700986F
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/lookup" target="_blank">Splunk Docs: lookup command</a><br>Vendor enrichment and category mapping.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/streamstats" target="_blank">Splunk Docs: streamstats command</a><br>Tracking category sequences per account.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Card outlier and unusual transaction topics.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Cardholder monitoring and category anomaly guidance.</li></ul>
description = <p>Highlights credit card transactions over $1,000 where the transaction category is not in the cardholder's usual vendor categories. Surfaces spending outliers for review and monitoring.</p>
search = index="*" sourcetype="*"\
	| lookup vendor_categories vendor OUTPUT categories\
	| streamstats window=1 list(category) AS category BY account_number\
	| where (amount > 1000)\
	| makemv delim="|" categories\
	| eval match=if(match(categories,category),1,0)\
	| where (match == 0)\
	| eval amount=tostring(round(amount,2),"commas")\
	| table account_number, timestamp, amount, categories, category, status

