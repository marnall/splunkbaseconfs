[pi_smartstore_bucket_operations]
search_name = SmartStore Bucket Operations
version = 2.x
date_created = 2025-12-01
category = Splunk
sub_category = _internal
tags = Bucket,Performance,SmartStore
solution = <p>This query provides operational insights into **SmartStore performance metrics** highlighting upload, download, and eviction speeds. Use this data to detect system bottlenecks, diagnose performance issues, or validate configuration changes impacting SmartStore operations.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any action with a significantly lower **average speed** compared to expectations.<br><b>2.</b> Analyze the **95th percentile speed** to identify top-performing scenarios and align those patterns to broader operations.<br><b>3.</b> Use insights from slow operations to adjust resource allocations or optimize configurations within SmartStore.<br><b>4.</b> Set performance alerts for unexpected dips in operational speeds.<br><b>5.</b> Regularly benchmark these metrics after system updates or configuration changes to ensure continued optimization.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index=_audit (action=local_bucket_upload OR action=remote_bucket_download OR action=local_bucket_evict) info=completed</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters logs related to completed SmartStore bucket operations such as uploads, downloads, and evictions.<br><b>02</b> <code>| eval second = elapsed_ms/1000</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Converts elapsed time from milliseconds to seconds for a more human-readable metric.<br><b>03</b> <code>| eval speed = kb/second/1024</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates speed of operations in MB/s by converting kilobytes per second to megabytes per second.<br><b>04</b> <code>| stats p95(speed) as p95_speed, avg(speed) as avg_speed by action</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates the 95th percentile and average speed for each operation type, grouped by action.<br>
explanation = <p>SmartStore is a Splunk capability that improves storage and cost management for indexed data. Monitoring SmartStore operations like **bucket uploads**, **downloads**, and **evictions** is crucial to understand system performance, identify **bottlenecks**, and ensure efficient **resource utilization**. This search helps to assess how quickly bucket operations are performed by calculating the **95th percentile speed** (`p95(speed)`) and **average speed** (`avg(speed)`) in MB/s for each action.</p><p>The **eval** command is used for unit conversions, translating elapsed milliseconds to seconds and kilobytes per second to megabytes per second. The **stats** command aggregates performance metrics by operation type, enabling trends or anomalies across different bucket actions to be highlighted. Together, these steps provide actionable insights for administrators to troubleshoot performance issues, optimize resource allocation, or adjust system tuning for operations needing improvement.</p><p>For junior Splunkers, this search is a great example of **event filtering**, **data transformation**, and **performance analysis** using foundational SPL commands like `eval` and `stats`.</p>
