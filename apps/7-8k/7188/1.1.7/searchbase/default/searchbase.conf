solution = <p><b>Operational or business insight</b>: Remediate search head performance issues caused by storage IOPS contention.</p><p><b>Suggested Actions</b><br><b>1.</b> Analyze high IOPS trends for specific hosts.<br><b>2.</b> Review storage configurations to ensure appropriate speed and nature of storage (e.g., SSDs).<br><b>3.</b> Optimize Splunk configurations for knowledge bundle deployments.<br><b>4.</b> Enable indexing-based workload monitoring.<br><b>5.</b> Implement faster disks or Layered storage where required.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
