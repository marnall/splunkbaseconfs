tags = Access,Indexing
solution = <p>This query provides a <b>complete inventory</b> of all indexes in your Splunk environment, essential for data governance and operational visibility.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the list to ensure all expected indexes exist.<br><b>2.</b> Identify any unexpected or unauthorized indexes for investigation.<br><b>3.</b> Use the output to document your index structure for compliance or auditing.<br><b>4.</b> Compare results over time to track index creation or deletion.<br><b>5.</b> Share the index inventory with stakeholders for capacity planning discussions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/data/indexes</code><br>       - The <b>'rest'</b> command is used to access Splunk's REST API. In this case, it accesses the endpoint <b>'/services/data/indexes'</b>, which provides <b>detailed information</b> about all indexes in the Splunk environment.<br><b>02</b> <code>| fields title</code><br>       - The <b>'fields'</b> command specifies which fields to include in the results. This ensures the search retrieves only relevant fields, improving readability. Here, only the <b>'title'</b> field is retained, which holds the name of each index.<br><b>03</b> <code>| rename title AS index</code><br>       - The <b>'rename'</b> command changes field names for clarity. In this case, it renames <b>'title'</b> to the more descriptive term <b>'index'</b>, enhancing the comprehensibility of results.<br>
explanation = <p>This search is essential for identifying all indexes in the Splunk environment. It is tailored for administrators and users who need insights into where data resides, simplifying data auditing or troubleshooting. By leveraging Splunk's <b>REST API</b>, the search provides an accurate list of available indexes, ensuring <b>visibility into the data storage structure</b>. Commands like <b>'fields'</b> and <b>'rename'</b> refine the dataset for convenience. The output enables better resource management and informed decision-making within the Splunk ecosystem by pinpointing data locations effectively.</p>
quid = 51A60C3C5173D6B6C3EBBD3C8ED98BB4
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-all-your-existing-indexes-or-check-if-index-exists" target="_blank">https://gosplunk.com/list-all-your-existing-indexes-or-check-if-index-exists</a></p>
description = <p>This search retrieves the <b>names of all indexes</b> in the Splunk environment. It is valuable for <b>gaining visibility</b> into the data storage architecture, assisting in resource management or troubleshooting indexing-related concerns.</p>
search = | rest /services/data/indexes\
	| fields title\
	| rename title AS index

[list_deployment_apps_and_serverclass]
search_name = List of Deployment Applications and Their Server Classes
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Apps
solution = <p>This query provides an insightful summary of the deployment applications and their server classes in your Splunk environment.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Use this data to verify that all deployment applications are appropriately mapped to their server classes.<br> \
<b>2.</b> Identify any inconsistencies or missing assignments in deployment applications.<br> \
<b>3.</b> Leverage the line numbers for referencing specific entries during analysis or discussions.<br> \
<b>4.</b> Regularly monitor the deployment server setup to ensure that configurations align with organizational policies.<br> \
<b>5.</b> Share the streamlined output with stakeholders for higher-level insights into deployment server usage and organization.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/synthetic-monitoring.html" target="_blank">Products: Splunk Synthetic Monitoring</a><br>Splunk Synthetic Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /servicesNS/nobody/system/deployment/server/applications/</code><br>       - Accesses the REST API endpoint to retrieve detailed information about deployment applications from the deployment server.<br> \
	<b>02</b> <code>| search title=*</code><br>       - Filters results to include only deployment applications that have titles.<br> \
	<b>03</b> <code>| rename title as DeploymentApplication, serverclasses as serverClass</code><br>       - Renames fields for improved readability, making the output easier to understand.<br> \
	<b>04</b> <code>| eval line=1</code><br>       - Creates a new field 'line' initialized to 1 for tagging rows with line numbers.<br> \
	<b>05</b> <code>| accum line</code><br>       - Generates sequential line numbers by accumulating the 'line' field's value.<br> \
	<b>06</b> <code>| fields line DeploymentApplication serverClass</code><br>       - Filters the output to display only the most important fields: 'line', 'DeploymentApplication', and 'serverClass'.<br>
explanation = <p>This search is designed to give Splunk administrators a clear overview of deployment applications and the server classes they belong to. Using the <b>rest</b> command, the search accesses the REST API to fetch deployment server data.</p> \
	<p>Key steps include renaming fields for better clarity and usability, assigning line numbers for sequential ordering, and selecting only the most important fields for output. This search is particularly useful for troubleshooting deployment issues, ensuring setup consistency, and planning configuration changes or upgrades.</p>
quid = 4167FEB22459EFE2A52D370CA6B60AC4
search_author = GoSplunk: wrangler2x
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-deployment-apps-and-the-associated-serverclass" target="_blank">https://gosplunk.com/list-deployment-apps-and-the-associated-serverclass</a></p>
description = <p>Summarizes <b>List of Deployment Applications and Their Server Classes</b> using <code>| rest /servicesNS/nobody/system/deployment/server/applications/</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest /servicesNS/nobody/system/deployment/server/applications/\
	| search title =*\
	| rename title as DeploymentApplication, serverclasses as serverClass\
	| eval line=1\
	| accum line\
	| fields line DeploymentApplication serverClass

[list_deployment_client]
search_name = Latest Deployment Client Report Time and Server Name by Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This query provides critical insights into <b>deployment client activity</b> in a Splunk environment. By identifying the latest interaction time and associated servers for each host, administrators can diagnose discrepancies, track activity trends, and ensure operational consistency.</p> \
<p><b>Suggested Actions:</b></p> \
<b>1.</b> Review the 'LatestReportTime' field to identify inactive or non-reporting deployment clients.<br> \
<b>2.</b> Investigate hosts with outdated report times to determine any connection or configuration issues.<br> \
<b>3.</b> Use 'Server_Name' data to verify server-client relationships and configurations.<br> \
<b>4.</b> Ensure logs are consistently indexed and troubleshoot any gaps or delays in reporting.<br> \
<b>5.</b> Regularly schedule and monitor this query for proactive maintenance of deployment clients.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd deployment_client</code><br>       - Specifies the data source, focusing on internal Splunk logs containing deployment client events.<br> \
	<b>02</b> <code>| stats latest(_time) as LatestReportTime values(server_name) as Server_Name by host</code><br>       - Aggregates the latest report time and collects server names grouped by each host.<br> \
	<b>03</b> <code>| convert ctime(LatestReportTime)</code><br>       - Converts the timestamp to a human-readable format.<br> \
	<b>04</b> <code>| rename host as Host</code><br>       - Renames the 'host' field to 'Host' for better readability.<br> \
	<b>05</b> <code>| fields + Host Server_Name LatestReportTime</code><br>       - Filters the results to display only relevant fields.<br>
explanation = <p>This search facilitates <b>monitoring</b> and <b>troubleshooting</b> deployment client activities in a Splunk environment. By leveraging the internal Splunk logs, it identifies when deployment clients last reported to servers and which servers are interacting with each host. The search structure:</p> \
	<p>* The initial search filters logs from the "_internal" index with the "splunkd" sourcetype, focusing on deployment client events.<br> \
	<p>This search is valuable for understanding client-server connections, diagnosing communication delays, or ensuring all deployment clients are reporting as expected.</p>
quid = 4B1A09BCA7D1C4A92EADAB64EFD1DFD7
search_author = GoSplunk: Opeyemi Olatunji
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-deployment-client" target="_blank">https://gosplunk.com/list-deployment-client</a></p>
description = <p>Summarizes <b>Latest Deployment Client Report Time and Server Name by Host</b> using <code>index=_internal sourcetype=splunkd "deployment_client"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal sourcetype=splunkd "deployment_client"\
	| stats latest(_time) as LatestReportTime values(server_name) as Server_Name by host\
	| convert ctime(LatestReportTime)\
	| rename host as Host| fields + Host Server_Name LatestReportTime

[list_inputs_using_rest]
search_name = Display All Data Inputs with Start and End Times
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This query provides an <b>overview of all Splunk data inputs</b>, including detailed start and end times, their associated metadata, and other parameters crucial for auditing and ensuring operational consistency. For administrators, this data offers a complete audit trail of input behaviors and aids in quickly resolving potential issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the displayed metadata to identify inactive or misconfigured data inputs.<br><b>2.</b> Investigate any inputs with unexpectedly long processing times or irregularities.<br><b>3.</b> Use the information to optimize configuration and scheduling of data inputs.<br><b>4.</b> Cross-check with ingestion metrics to ensure data continuity.<br><b>5.</b> Document and resolve any discrepancies to maintain system reliability.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/data/inputs/all</code><br>       - Retrieves metadata about all data inputs available in Splunk.<br><b>02</b> <code>| convert ctime(starttime) AS "Start Time"</code><br>       - Converts epoch "starttime" into a human-readable format labeled as "Start Time".<br><b>03</b> <code>| convert ctime(endtime) AS "End Time"</code><br>       - Converts epoch "endtime" into a human-readable format labeled as "End Time".<br><b>04</b> <code>| table index interval source sourcetype title updated starttime endtime "Start Time" "End Time"</code><br>       - Displays relevant fields in a tabular format for easy interpretation.<br>
explanation = <p>This query is crucial for <b>monitoring and auditing</b> Splunk's data inputs, offering insights into their performance and status over time. By leveraging the REST API endpoint <code>| rest /services/data/inputs/all</code>, it retrieves data input metadata, which is subsequently processed for readability. Commands like <code>convert ctime(starttime)</code> and <code>convert ctime(endtime)</code> ensure epoch timestamps are converted into human-readable formats labeled as "Start Time" and "End Time". The <code>table</code> command organizes this rich metadata, making it easier to identify issues like inactive inputs or unusually long processing durations. This information benefits administrators by helping them rapidly troubleshoot and optimize data ingestion workflows.</p>
quid = AD805B42CA4AD6CF4617511D85F2E0E2
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-inputs-using-rest" target="_blank">https://gosplunk.com/list-inputs-using-rest</a></p>
description = <p>Summarizes <b>Display All Data Inputs with Start and End Times</b> using <code>| rest /services/data/inputs/all</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest /services/data/inputs/all\
	| convert ctime(starttime) AS "Start Time"\
	| convert ctime(endtime) AS "End Time"\
	| table index interval source sourcetype title updated starttime endtime "Start Time" "End Time"

[list_ips_that_had_successful_and_failed_ssh_attempts_98]
search_name = SSH Login Attempts: Success vs Failure by IP Address
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,SFU
solution = <p>This query provides actionable insights for tracking SSH activity anomalies. It detects brute force patterns through repeated failed attempts and flags unexpected IP successes as potential breaches.</p>\
	<p><b>Suggested Actions</b><br>\
	<b>1.</b> Investigate IPs with suspicious login activities, especially with mixed results (success/failure).<br>\
	<b>2.</b> Block or apply stricter access rules to IPs exhibiting brute force characteristics.<br>\
	<b>3.</b> Cross-check flagged usernames for unusual behavior or access privileges.<br>\
	<b>4.</b> Enable multifactor authentication for accounts with sensitive access.<br>\
	<b>5.</b> Review and strengthen password policies across systems.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="*secure" process=sshd "password for"</code><br>       - Filters SSHD password-based login attempts from the logs.<br>\
	<b>02</b> <code>| rex field=_raw "(?Accepted|Failed) password for (?\w+) from (?[0-9A-Fa-f:\.]+)"</code><br>       - Extracts fields: result (Accepted/Failed), username, and IP address.<br>\
	<b>03</b> <code>| eval success=if(result=="Failed",0,1)</code><br>       - Assigns each event a success metric (1=successful, 0=failed).<br>\
	<b>04</b> <code>| stats count as total,sum(success) as success by ipaddr</code><br>       - Aggregates total and successful login counts by IP address.<br>\
	<b>05</b> <code>| where total!=success AND success!=0</code><br>       - Filters out IPs with no anomalies or purely unsuccessful attempts.<br>
explanation = <p>This search provides insights into potential security concerns by analyzing password-based SSH login attempts. Large volumes of failed attempts from a single source could signal a brute force attack, while successful attempts from unusual IP addresses might indicate unauthorized access. Key components include:</p>\
	<p><b>1.</b> Using the `rex` command to extract critical data (e.g., Accepted/Failed attempts, username, and source IP) for precise mapping.<br>\
	<b>2.</b> The `eval` command creates a success metric—assigning `0` to failures and `1` to successes—for trend analysis.<br>\
	<b>3.</b> The `stats` function aggregates data by IP address, providing a breakdown of attempts and success counts for investigation. This ensures a consistent focus on operational anomalies.<br>\
	<b>4.</b> Filtering with `where` ensures only meaningful outliers are included, such as IPs with mixed results or non-zero success counts.<br></p>\
	<p>Ultimately, this query empowers admins to proactively monitor suspicious login activities and enhance authentication security.</p>
quid = 3028D2AFF9888EC4DE16879C108B3247
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>SSH Login Attempts: Success vs Failure by IP Address</b> using <code>index="<<index>>" sourcetype="*secure" process=sshd "password for"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="*secure" process=sshd "password for"\
```| rex field=_raw "(?Accepted|Failed) password for (?\w+) from (?[0-9A-Fa-f:\.]+)" ```\
| eval success=if(result=="Failed",0,1)\
| stats count as total,sum(success) as success by ipaddr\
| where total!=success AND success!=0

