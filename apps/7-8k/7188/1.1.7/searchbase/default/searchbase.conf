description = <p>Summarizes <b>Count of Error Logs by Host Excluding Splunk Server</b> using <code>index=_internal sourcetype="splunkd" log_level="ERROR" host!=splunk_server</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal sourcetype="splunkd" log_level="ERROR" host!=splunk_server\
