[indexes_in_splunk]
search_name = Index Status and Retention Period Analysis
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Indexes
solution = <p>This search provides a comprehensive inventory of Splunk indexes with their status and retention policies, supporting governance and capacity planning efforts.</p><p><b>Suggested Actions</b><br><b>1.</b> Review disabled indexes to determine if they should be re-enabled or removed.<br><b>2.</b> Validate retention periods align with organizational data retention policies.<br><b>3.</b> Ensure index descriptions are up-to-date in the lookup file.<br><b>4.</b> Use findings to document index configurations for compliance audits.<br><b>5.</b> Identify indexes with unusually long or short retention for review.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'rest' command is used to access the REST API endpoint '/services/data/indexes', which provides information about the indexes in Splunk.</ul><ul><b>02</b> The 'rename' command is used to rename the 'title' field to 'index'.</ul><ul><b>03</b> The 'search' command is used to exclude certain system indexes from the results.</ul><ul><b>04</b> The 'sort' command is used to sort the results by the 'index' field.</ul><ul><b>05</b> The 'streamstats' command is used to assign a row number to each result.</ul><ul><b>06</b> The 'eval' command is used to create a new field 'State' that indicates whether each index is enabled or disabled.</ul><ul><b>07</b> Another 'eval' command is used to calculate the retention period in days for each index.</ul><ul><b>08</b> The 'lookup' command is used to add a description to each index from a CSV file.</ul><ul><b>09</b> The 'fields' command is used to specify which fields should be included in the final results.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query is useful for <b>auditing</b> purposes. It provides a comprehensive overview of the indexes in the Splunk environment, including their state (enabled or disabled), retention period, and a description. This can help administrators <b>understand</b> the current state of their indexes and make <b>informed decisions</b> about index management.</div></div>
quid = 04B54663999B3060CF046CA23E40847B
search_author = GoSplunk: wrangler2x
description = <p>Summarizes <b>Index Status and Retention Period Analysis</b> using <code>| rest /services/data/indexes</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = | rest /services/data/indexes\
	| rename title as index\
	| search NOT index=_* NOT index="<<index>>" NOT index="<<index>>" NOT index="<<index>>"\
	| sort index\
	| streamstats count as Row\
	| eval State=case (disabled==0, “Enabled”, disabled==1, “Disabled <<===")\
	| eval "Retention Days"=frozenTimePeriodInSecs/86400\
	```| lookup indexdescriptions.csv index OUTPUTNEW description```\
	| fields Row index State description "Retention Days"

[indexes_size_and_eps]
search_name = License Usage and Event Stats by Index
version = 1.0.1
date_updated = 2024-2-4 12:43:50
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexes
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.log idx=z*</code><br>       - Searches the internal index `license_usage.log` source for indexes starting with 'z'.<br><b>02</b> <code>| fields b idx _time</code><br>       - Selects the fields `b`, `idx`, and `_time` for further calculations and filtering.<br><b>03</b> <code>| eval GB=b/1024/1024/1024, index="<<index>>"</code><br>       - Converts bytes to gigabytes and renames the 'idx' field to maintain semantic consistency.<br><b>04</b> <code>| stats sum(GB) as "Volume GB" by index</code><br>       - Aggregates the total volume in GB for each index.<br><b>05</b> <code>| append extendtimerange=t [...]</code><br>       - Adds event statistics such as event count and aggregation metrics over 1-second intervals using `tstats`.<br><b>06</b> <code>| stats min(count) AS "min EPS", ... perc95(count) AS "perc95 EPS" by index</code><br>       - Computes key statistics like minimum, maximum, average, and percentile event rate for each index.<br><b>07</b> <code>| append extendtimerange=t [...]</code><br>       - Adds statistics calculated specifically for working hours (8AM to 7PM).<br><b>08</b> <code>| stats min(count) AS "min EPS WH", ... by index</code><br>       - Calculates event rate statistics focused on a business-relevant timeframe.<br><b>09</b> <code>| stats first(*) as * by index</code><br>       - Consolidates the first values of relevant fields for each index.<br><b>10</b> <code>| eval "avg EPS" = round(...)</code><br>       - Rounds statistical results to improve readability, ensuring clarity for stakeholders.<br><b>11</b> <code>| table index, "Volume GB", ...</code><br>       - Finalizes the output in a tabular format showcasing key metrics like volume, event rate, and size per event.<br>
explanation = <p>This query is critical for monitoring Splunk license usage and understanding event activity. It analyzes the volume of indexed data in gigabytes (<b>GB</b>), calculates event statistics such as Events Per Second (<b>EPS</b>), and evaluates event size in both GB and bytes. By isolating specific statistics during working hours (8AM–7PM), it provides insights into peak data ingestion times, helping Splunk administrators optimize resource allocation and plan future capacity.</p> \
	<p>The use of <code>| tstats</code> ensures efficient handling of summarized data, ideal for license audit environments. The query not only examines baseline ingestion but also evaluates usage inconsistencies or spikes through percentile metrics (e.g., <b>P95 EPS</b>), offering administrators actionable insights for licensing compliance or forecasting.</p>
quid = 9CAF297E00B5B2A96D3B6CCC9B1A09DD
search_author = GoSplunk: alasta
updated_author = akhamis
related_info = <p><a href="https://gosplunk.com/indexes-size-and-eps" target="_blank">https://gosplunk.com/indexes-size-and-eps</a></p>
description = <p>Summarizes <b>License Usage and Event Stats by Index</b> using <code>index=_internal source=*license_usage.log idx=z*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query analyzes Splunk's license usage for indexes starting with 'z'. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
search = index=_internal source=*license_usage.log idx=z*\
	| fields b idx _time\
	| eval GB=b/1024/1024/1024, index="<<index>>"\
	| stats sum(GB) as "Volume GB" by index\
	| append extendtimerange=t [\
	| tstats summariesonly=t count where index="<<index>>" by _time index span=1s\
	| stats min(count) AS "min EPS", avg(count) AS "avg EPS", max(count) AS "max EPS", sum(count) AS "sum evts", perc95(count) AS "perc95 EPS" by index]\
	| append extendtimerange=t [\
	| tstats summariesonly=t count where index="<<index>>" by _time index span=1s\
	| eval date_hour=strftime(_time, "%H")\
	| search date_hour>7 AND date_hour<19\
	| stats min(count) AS "min EPS WH", avg(count) AS "avg EPS WH", max(count) AS "max EPS WH", perc95(count) AS "perc95 EPS WH" by index]\
	| stats first(*) as * by index\
	| eval "avg EPS" = round ( 'avg EPS', 2), "perc95 EPS" = round ('perc95 EPS',2), "Volume GB" = round ('Volume GB',2) , "avg EPS WH" = round ( 'avg EPS WH', 2), "perc95 EPS WH" = round ('perc95 EPS WH',2), "sizeGB by evt"=('Volume GB'/'sum evts'), "sizeB by evt"=(('Volume GB'/'sum evts')*1024*1024*1024)\
	| table index, "Volume GB","sum evts","sizeGB by evt","sizeB by evt", "min EPS", "min EPS WH", "avg EPS","avg EPS WH", "perc95 EPS","perc95 EPS WH", "max EPS", "max EPS WH"

[ingest_license_utilization]
search_name = Ingest License Utilization
version = 2.x
date_created = 2025-05-20
category = Splunk
sub_category = _internal
tags = Usage
solution = <p>This search yields critical insights into Splunk license utilization, enabling proactive monitoring and forecasting. It helps engineering and operations teams align resource usage with licensing limits, minimize risks of violation, and create financial predictability.</p><p><b>Suggested Actions</b><br><b>01</b> Review projected usage curve weekly.<br><b>02</b> Alert if usage is forecast to exceed license cap.<br><b>03</b> Notify finance or ops teams when trending above 85% capacity.<br><b>04</b> Tune high-volume sourcetypes contributing to growth.<br><b>05</b> Adjust data retention or filtering to reduce ingest.<br><br><b>Recommended Alerts</b><br><b>01</b> GB_Expected > license cap<br><b>02</b> GB_Used > 90% of daily threshold<br><b>03</b> Rapid increase in daily ingest > 20% day-over-day<br><b>04</b> Forecasted total exceeds current license in < 7 days<br><b>05</b> Multiple peaks in GBytes with no seasonality pattern<br></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.log type=Usage</code><br>     - Reads license usage data from internal logs.<br><b>02</b> <code>eval GB = b/1024/1024/1024</code><br>     - Converts byte counts into gigabyte metrics for better readability and analysis.<br><b>03</b> <code>timechart sum(GB)</code><br>     - Aggregates and visualizes total license usage over time.<br><b>04</b> <code>streamstats sum()</code><br>     - Tracks cumulative usage to identify trends.<br><b>05</b> <code>predict GB_Used</code><br>     - Leverages LLT algorithm to forecast future license usage trends over a 14-day window.<br>
explanation = <p>This search monitors <b>license consumption</b> over time using data from <b>license_usage.log</b> in the <b>_internal</b> index. It converts byte usage to <b>gigabytes</b>, applies <b>streamstats</b> to accumulate the total used, and then uses <b>predict</b> to forecast usage for the next 14 days using the <b>LLT (local linear trend)</b> algorithm.</p><p>For engineers, this provides a proactive look at licensing trends and can highlight when a deployment is at risk of exceeding allocated ingestion. It supports <b>capacity planning</b> and budgeting decisions based on historical usage patterns. For junior practitioners, the search offers exposure to commands like <b>eval</b> for unit conversion, <b>timechart</b> for time-based aggregation, and <b>predict</b> for forecasting trends.</p>
quid = 8A26DED1EB375A8E28544F5CB428EC62
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">About License Usage</a><br>Understand how license usage is tracked in Splunk.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/predict" target="_blank">Predict Command Reference</a><br>Learn to forecast fields using different statistical models.</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Monitoring/Forecasting_license_usage" target="_blank">Forecasting License Usage</a><br>Lantern guidance on predicting ingest growth.</li><li><a href="https://conf.splunk.com/files/2020/slides/FN1784.pdf" target="_blank">Conf Talk: Capacity Planning with Predict</a><br>Field-proven tips on building forecast dashboards in Splunk.</li></ul>
description = <p>Summarizes <b>Ingest License Utilization</b> using <code>index=_internal source=*license_usage.log type=Usage</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal source=*license_usage.log type=Usage \
	| eval GB = b/1024/1024/1024 \
	| timechart sum(GB) as GBytes \
	| streamstats sum(GBytes) as GB_Used \
	| predict GB_Used as GB_Expected algorithm=LLT future_timespan=14 \
	| fields – Gbytes

