description = <p>This query <b>counts the number of events</b> occurring every second in a specified index and sourcetype. It provides <b>real-time visibility</b> into event frequency and helps identify <b>spikes or declines</b> in activity that could indicate system issues or trends.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| bucket _time span=1s\
	| stats count by _time

[events_sent_to_null_que_internal_logs]
search_name = Internal Metrics Log Analysis with CPU Usage and Hits
search_hidden = 0
category = Splunk
sub_category = _internal
tags = GoSplunk
solution = <p>Gain insights into the performance of the nullqueue processor in Splunk's internal pipeline by using this query. It allows administrators to identify inefficiencies and optimize the performance of Splunk operations by focusing on key metrics such as CPU usage and execution counts.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor for high CPU usage and investigate potential reasons for spikes.<br><b>2.</b> Analyze execution count trends to identify abnormal processor behavior.<br><b>3.</b> Review cumulative hits to detect high data throughput in the nullqueue.<br><b>4.</b> Use insights to optimize pipeline configurations and processing loads.<br><b>5.</b> Schedule periodic reviews of this query's outputs to maintain consistent performance.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal</code><br>       - Pulls metrics data from Splunk's internal logs.<br><b>02</b> <code>component=metrics processor=nullqueue group=pipeline sourcetype=splunkd</code><br>       - Focuses on entries from the nullqueue processor in the Splunk pipeline.<br><b>03</b> <code>| table _time log_level name processor cpu_seconds executes, cumulative_hits</code><br>       - Formats the retrieved metrics into a table view, showing fields like time, log level, processor activity, CPU seconds, execution counts, and cumulative hits.<br>
explanation = <p>This search filters metrics from the <b>internal Splunk logs</b>, specifically by isolating activity related to the nullqueue processor. The data includes CPU usage, execution counts, and cumulative hits, which are crucial for diagnosing performance issues or anomalies within the Splunk pipeline. For instance, a high CPU time or a significant number of executions could indicate a processing bottleneck or inefficiency. The use of specific filters like <code>component=metrics</code> and <code>processor=nullqueue</code> ensures that only relevant log data is returned, enabling administrators and engineers to take precise corrective actions. This search is particularly valuable for monitoring internal Splunk workflows and improving pipeline efficiency.</p>
quid = ED2FD57011B1D9A0EA6D369D24ECF688
search_author = GoSplunk: john117
related_info = <p><a href="https://gosplunk.com/events-sent-null-que-internal-logs" target="_blank">https://gosplunk.com/events-sent-null-que-internal-logs</a></p>
description = <p>Summarizes <b>Internal Metrics Log Analysis with CPU Usage and Hits</b> using <code>index=_internal component=metrics processor=nullqueue group=pipeline sourcetype=splunkd</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal component=metrics processor=nullqueue group=pipeline sourcetype=splunkd\
	| table _time log_level name processor cpu_seconds executes, cumulative_hits

[every_index_explicitly_granted_to_a_role]
search_name = List of Roles and Their Allowed Non-Wildcard Indexes
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexes
solution = <p>By running this query, Splunk administrators can gain accurate insight into the indexes that roles have explicit access to. This ensures that <b>access controls are structured</b> and follow defined permissions, focusing on <b>security and compliance</b>.</p><p><b>Suggested Actions</b><br><b>1.</b> Review results for any unintended granting of permissions to sensitive indexes.<br><b>2.</b> Cross-check roles with wildcard exclusions to validate against compliance policies.<br><b>3.</b> Align findings with organizational access control standards.<br><b>4.</b> Notify stakeholders about critical or unexpected access permissions.<br><b>5.</b> Adjust or revoke access where discrepancies are identified to minimize security risks.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /servicesNS/-/-/authorization/roles count=0 splunk_server=*</code><br>       - Query REST API endpoint for role definitions<br> <b>02</b> <code>| fields title,srchIndexesAllowed</code><br>       - Keep only role titles and allowed indexes<br> <b>03</b> <code>| rename srchIndexesAllowed as index title as role</code><br>       - Rename fields for clarity<br> <b>04</b> <code>| mvexpand index</code><br>       - Expand multi-value fields into separate rows for each index<br> <b>05</b> <code>| where NOT match(index,".*\\*.*")</code><br>       - Exclude entries with wildcard indexes<br>
explanation = <p>This search allows administrators to <b>audit user roles and index permissions</b> within their Splunk environment. By querying the user roles and the indexes explicitly granted to them, it enables the identification of <b>specific area access granted to roles</b>. The use of the <code>rest</code> command ensures that the search pulls accurate and live data about the roles. Additionally, the exclusion of wildcard indexes ensures that only precise, explicitly-granted permissions are analyzed. This is useful for securing data access and <b>maintaining compliance</b> with access control policies.</p>
quid = 8A646D49C43C3E94D52628E2BB81EF97
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/every-index-explicitly-granted-to-a-role" target="_blank">https://gosplunk.com/every-index-explicitly-granted-to-a-role</a></p>
description = <p>This query <b>retrieves</b> all the roles and their corresponding allowed indexes from the local Splunk server. It focuses on providing a <b>detailed view</b> of specific index permissions by <b>excluding any wildcard-based permissions</b> from the results.</p>
search = | rest /servicesNS/-/-/authorization/roles count=0 splunk_server=*\
	| fields title,srchIndexesAllowed\
	| rename srchIndexesAllowed as index title as role\
	| mvexpand index\
	| where NOT match(index,".*\\*.*")

[excessive_number_of_credit_card_transactions_in_a_short_period]
search_name = Excessive Number of Credit Card Transactions in a Short Period
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Credit,Detail,Fraud
solution = <p>This SPL flags accounts with an excessive number of credit card transactions in a short period for review. <b>Suggested Actions</b></p><p>1. Investigate flagged accounts for fraud or misuse.<br>2. Cross-reference with other risk and fraud alerts.<br>3. Alert compliance or fraud teams.<br>4. Integrate findings into monitoring dashboards.<br>5. Refine thresholds as transaction patterns change.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Selects all credit card transaction events.<br><b>02</b> <code>| streamstats earliest(_time) AS timestamp latest(_time) AS latest_time time_window=1m count(status) AS num_transactions BY account_number</code><br>      - Tracks transaction counts in one-minute windows.<br><b>03</b> <code>| where (num_transactions >= 10)</code><br>      - Flags accounts with excessive rapid transactions.<br><b>04</b> <code>| eval latest_time=strftime(latest_time,"%Y-%m-%d %H:%M:%S")</code><br>      - Formats the latest time.<br><b>05</b> <code>| dedup account_number</code><br>      - Removes duplicate account results.<br><b>06</b> <code>| table account_number, timestamp, latest_time, num_transactions, category</code><br>      - Outputs the review table.
explanation = <p>This SPL uses <b>streamstats</b> to track the count of credit card transactions by account in rolling one-minute intervals. Accounts meeting or exceeding 10 transactions in this window are flagged, with times formatted for clarity and deduplication applied for unique accounts. The query outputs all relevant details for review and escalation. This approach enables analysts to quickly identify rapid-fire card usage, a potential sign of fraud, bot activity, or card testing.</p>
quid = 04A167B6991192D043512B25A1CE8175
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/streamstats" target="_blank">Splunk Docs: streamstats command</a><br>Tracking rapid transaction statistics.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/dedup" target="_blank">Splunk Docs: dedup command</a><br>Ensuring unique account results.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Rapid card transaction and fraud detection use cases.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Best practices for card misuse detection.</li></ul>
description = <p>Flags accounts performing <b>10 or more credit card transactions</b> within a one-minute window, indicating potential rapid-fire activity or misuse. Surfaces accounts and transaction details for review.</p>
search = index="*" sourcetype="*"\
	| streamstats earliest(_time) AS timestamp latest(_time) AS latest_time time_window=1m count(status) AS num_transactions BY account_number\
	| where (num_transactions >= 10)\
	| eval latest_time=strftime(latest_time,"%Y-%m-%d %H:%M:%S")\
	| dedup account_number\
	| table account_number, timestamp, latest_time, num_transactions, category

[extract_dns_queries_from_netscaler_syslog]
search_name = Citrix Netscaler Syslog DNS Activity Report
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = Virtualization
tags = Access,GoSplunk
solution = <p>This query enables the monitoring and analysis of <b>DNS activity</b> from Citrix Netscaler syslog data. It provides a detailed view of specific network actions through extracted fields, aiding in operational troubleshooting or security investigations.</p> <p><b>Suggested Actions</b><br><b>1.</b> Review extracted DNS queries for unusual patterns or anomalous behavior.<br><b>2.</b> Investigate unknown or suspicious source IPs for potential security threats.<br><b>3.</b> Correlate DNS activity with other logs for comprehensive security analysis.<br><b>4.</b> Set up alerts for identified critical patterns, such as high-frequency DNS requests.<br><b>5.</b> Use these inputs to update DNS rules or enhance threat detection mechanisms.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="citrix:netscaler:syslog" DNS</code><br>       - This part specifies the index and sourcetype, filtering for Citrix Netscaler syslog data containing 'DNS'.<br> <b>02</b> <code>| regex "^\s+(?P<date>[^:]+):(?P<time>[^ ]+)(?:[^:\]*:){3}(?P<source_ip>[^#]+)(?:[^/\]*/){8}\d+#(?P<dns>(?#)[_a-zA-Z0-9.-]+)(\\.\\/)"</code><br>       - Uses regex to extract specific fields (date, time, source IP, and DNS) from the raw log data.<br> <b>03</b> <code>| table time, date, source_ip, dns</code><br>       - Formats the results into a tabular view with the specified columns.<br>
explanation = <p>This query analyzes <b>Citrix Netscaler syslog data</b> by extracting relevant fields such as <b>date</b>, <b>time</b>, <b>source IP</b>, and <b>DNS</b>. This data can help identify potential <b>anomalies</b> or trends, such as unusual DNS queries or suspicious source IP addresses.</p> <p>Using the <code>regex</code> command, specific fields are captured from raw logs based on a defined pattern. This ensures that only the required data is extracted efficiently. The <code>table</code> command then organizes the results for easier analysis and reporting, making it suitable for troubleshooting <b>network issues</b> or investigating <b>security incidents</b>.</p> <p>This search is valuable for <b>network administrators</b> and <b>security analysts</b>, offering actionable insights into DNS activity within Citrix Netscaler environments.</p>
quid = 71702479DA29E6B1739724366BC42158
search_author = GoSplunk: Ronald (Access42)
updated_author = khutchinson
description = <p>Summarizes <b>Citrix Netscaler Syslog DNS Activity Report</b> using <code>index="<<index>>" sourcetype="citrix:netscaler:syslog" DNS</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="citrix:netscaler:syslog" DNS\
	| regex "^\s+(?P<date>[^:]+):(?P<time>[^ ]+)(?:[^:\]*:){3}(?P<source_ip>[^#]+)(?:[^/\]*/){8}\d+#(?P<dns>(?#)[_a-zA-Z0-9.-]+)(\\.\\/)"\
	| table time, date, source_ip, dns

