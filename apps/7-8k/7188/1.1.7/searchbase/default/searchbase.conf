solution = <p>The query delivers valuable operational insights by summarizing search concurrency across time periods. It reveals peak demand times, resource bottlenecks, or potential inefficiencies in search scheduling policies, offering actionable data for capacity planning, performance optimization, and scaling efforts.</p><p><b>Suggested Actions</b><br><b>1.</b> Review peak concurrency trends to identify busy periods.<br><b>2.</b> Tune system resources or search schedules to handle 90th percentile concurrency effectively.<br><b>3.</b> Monitor average and minimum concurrency levels for underutilization.<br><b>4.</b> Use the results to assess if search head pooling or additional search capacity is required.<br><b>5.</b> Share findings with relevant stakeholders to coordinate search optimization strategies.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>search index="_introspection" source="*/resource_usage.log" sourcetype=splunk_resource_usage data.search_props.sid=*</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter introspection logs to focus on resource usage for searches with associated `sid` values.<br><b>02</b> <code>| eval sid = 'data.search_props.sid'</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extract the search ID (sid) for further analysis.<br><b>03</b> <code>| bin _time span=10s</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Group events into 10-second intervals for time-series aggregation.<br><b>04</b> <code>| stats dc(sid) AS distinct_search_count by _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate the count of distinct `sid` values (unique searches) for each time interval.<br><b>05</b> <code>| timechart span=1m max(distinct_search_count) as "Maximum Concurrency", p90(distinct_search_count) as "90th Percentile Concurrency", avg(distinct_search_count) as "Average Concurrency", min(distinct_search_count) as "Minimum Concurrency"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate and visualize concurrency metrics over 1-minute intervals.<br>
explanation = <p>This search delves into the **introspection logs** generated by Splunk, focusing on the `resource_usage.log` to analyze search activity. By extracting the `data.search_props.sid` field, it identifies the unique search instances running during discrete periods. Using a time binning technique paired with statistical functions, it calculates metrics like **maximum search concurrency**, **90th percentile concurrency**, and average concurrency within each time window.</p><p>The search's value is multi-faceted. It empowers administrators to monitor **resource utilization**, identify periods of peak demand, and optimize search scheduling. This is particularly beneficial during scaling exercises or capacity reviews, ensuring high performance and reliability.</p><p>Key SPL functions used include **eval** for field enrichment, **bin** for time grouping, **stats** for aggregation, and **timechart** for visualizing trends over uniform time periods. This query exemplifies efficient summarization and visualization workflows for monitoring operational health.</p>
quid = 5896D56C628390FC671A0E1C17DB0C51
search_author = Splunk Works
description = <p>Summarizes <b>Search Concurrency Trend Visualization</b> using <code>index="_introspection" source="*/resource_usage.log" sourcetype=splunk_resource_usage data.search_props.sid=* | eval sid</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_introspection" source="*/resource_usage.log" sourcetype=splunk_resource_usage data.search_props.sid=* | eval sid = 'data.search_props.sid' | bin _time span=10s | stats dc(sid) AS distinct_search_count by _time | timechart span=1m max(distinct_search_count) as "Maximum Concurrency", p90(distinct_search_count) as "90th Percentile Concurrency", avg(distinct_search_count) as "Average Concurrency", min(distinct_search_count) as "Minimum Concurrency"

