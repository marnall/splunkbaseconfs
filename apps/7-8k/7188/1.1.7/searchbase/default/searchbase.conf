[reviewing_field_values_by_group]
search_name = Reviewing Field Values by Group
version = 1.0.2
date_created = 2025-05-05 11:40:26
date_updated = 2025-7-2 14:52:12
category = Threat Hunter's Cookbook
sub_category = Grouping
tags = Fields,Grouping
solution = <p>This query delivers operational clarity about user activities and their contexts in Microsoft Azure AD. By grouping activities by actor, analysts can identify interactions, anomalies, or threats efficiently.</p><p><b>Suggested Actions</b><br><b>1.</b> Use this search to assess user activity trends or patterns.<br><b>2.</b> Investigate anomalies in grouped data for potential security threats.<br><b>3.</b> Feed grouped insights into advanced detection mechanisms.<br><b>4.</b> Enhance access control policies based on activity insights.<br><b>5.</b> Share findings with your team to refine monitoring and response protocols.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="ms:aad:audit" activity=*user*</code><br>       - Filters Azure AD audit logs for user-related activities.<br><b>02</b> <code>| stats values(activityOperationType) values(targets{}.userPrincipalName) count by actor.userPrincipalName</code><br>       - Groups activities by actor, showing operation types and affected users.<br>
explanation = <p>This search is crucial for analyzing Microsoft Azure AD activities with a focus on understanding value distributions and associations per user group. The command <code>| stats values(activityOperationType) values(targets{}.userPrincipalName) count by actor.userPrincipalName</code> groups data by the "actor.userPrincipalName" field, showcasing all associated operation types and affected user principals as distinct values. This approach provides meaningful insights into user activities, making it easier to detect patterns or anomalies. The <code>stats</code> function is well-suited for aggregation and offers efficient grouping, making it essential for operational analysis. This search is particularly beneficial for cybersecurity professionals monitoring and analyzing activity within Azure AD setups.</p>
quid = 592DF9162A2A6537FF7350CF43F11B6C
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Reviewing Field Values by Group</b> using <code>index="<<index>>" sourcetype="ms:aad:audit" activity=*user*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="ms:aad:audit" activity=*user* \
	| stats values(activityOperationType) values(targets{}.userPrincipalName) count by actor.userPrincipalName

[rex_in_the_search_bar]
search_name = Extracting 'aaa' Field from Raw Data in Specific Index and Sourcetype
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,Searching
solution = <p>This query extracts the 'aaa' field from raw event data, increasing the granularity and utility of the dataset for further analysis.</p><p><b>Suggested Actions</b><br><b>1.</b> Visualize the 'aaa' field using charts or tables to recognize trends.<br><b>2.</b> Create alerts based on patterns in the extracted 'aaa' field, ensuring rapid response to significant changes.<br><b>3.</b> Validate the extracted field to confirm regex accuracy and event relevance.<br><b>4.</b> Incorporate this query into scheduled reports for constant monitoring.<br><b>5.</b> Use the extracted 'aaa' field in correlation searches to derive deeper operational insights.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Defines the data scope by specifying the index and sourcetype to search.<br><b>02</b> <code>| rex field=_raw ",\d\d\d\s(?&lt;aaa&gt;[^\s]+)"</code><br>       - Uses the rex command to extract a specific pattern embedded in the _raw field. Captures a sequence following a comma, three digits, and a space into a new field named 'aaa'.<br><br>
explanation = <p>This query can be used to extract specific <b>patterns</b> from the <b>raw data of events.</b> This is especially valuable in scenarios where the data of interest is embedded within a larger string and is not easily accessible. By extracting the data into a separate field (in this case, the 'aaa' field), it becomes easier to <b>analyze and visualize</b> in downstream processes.</p> \
	<p>The <b>rex</b> command is applied to the _raw field using the regex pattern <code>,\d\d\d\s(?&lt;aaa&gt;[^\s]+)</code>. This pattern identifies events containing a comma, followed by three digits, a space, and then extracts the subsequent non-space text. The 'aaa' field can then be utilized for analysis or dashboard visualizations, improving the organization of data and enabling granular insights.</p>
quid = AE7DBC8A0B7DD242FEFE633DE08E85AF
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Extracting 'aaa' Field from Raw Data in Specific Index and Sourcetype</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| rex field=_raw "\,\d\d\d\s(?<aaa>[^\s]+)"

