[splunk_user_permissions]
search_name = Splunk User Permissions
version = 2.x
date_created = 2025‑10‑20
category = Splunk
sub_category = _internal
tags = Detail,Hutch,Roles,Users
solution = <p>This search delivers a comprehensive view of user‑to‑role‑to‑index access, helping administration teams validate permissions, detect excessive access, and meet compliance requirements. <b>Suggested Actions</b><br><b>1.</b> Review users whose roles include broad index access (srchIndexesAllowed=*) for potential privilege reduction.<br><b>2.</b> Identify roles listed in <b>srchIndexesAllowed</b> that are not aligned to business‑need or security policy and adjust accordingly.<br><b>3.</b> Monitor users whose email or title fields are missing and assign ownership or review status.<br><b>4.</b> Schedule this report as part of your periodic access review cycle and export to governance dashboards.<br><b>5.</b> For new users or roles, compare access values and ensure onboarding workflows include index‑access validation.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = ‑7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| rest /services/authentication/users</code><br>       - Retrieve all user objects including roles<br><b>02</b> <code>| mvexpand roles</code><br>       - Expand each user’s roles into separate rows for clearer mapping<br><b>03</b> <code>| table realname, title, roles, email</code><br>       - Select user identity and role information<br><b>04</b> <code>| join roles [ rest /services/authorization/roles | rename title as roles | search srchIndexesAllowed=* | table roles srchIndexesAllowed ]</code><br>       - Join role definitions filtered for those allowed to search indexes with user‑role mapping to show index access per user<br>
explanation = <p>The query starts with <b>| rest /services/authentication/users</b> to retrieve user objects, then uses <b>mvexpand roles</b> to explode each user’s role assignments. It tabulates <b>realname</b>, <b>title</b>, <b>roles</b>, and <b>email</b>. A <b>| join roles</b> is then performed against <b>| rest /services/authorization/roles</b>, filtered to roles with <b>srchIndexesAllowed=*</b>, which returns the <b>roles</b> and allowed indexes (<b>srchIndexesAllowed</b>). By combining these datasets, the search surfaces which users have access to which indexes based on their roles. This is critical for governance, ensuring that permissions match policy and that no overly privileged users exist. It also serves as a learning tool: newer Splunkers will gain experience with REST endpoints, field expansion, and joins for access‑control reporting.</p>
quid = 7A4AB4DE7095DCB3F1BFEDB5BBB6C14A
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/rest" target="_blank">Splunk Docs: REST command reference</a><br>Details on how the | rest command retrieves Splunk object metadata.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/security/about-users-and-roles" target="_blank">Splunk Docs: Define roles on the Splunk platform with capabilities</a><br>Explanation of roles, capabilities and how they translate to access controls. :contentReference[oaicite:0]{index=0}</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/security/about-users-and-roles" target="_blank">Splunk Docs: About user authentication</a><br>Overview of user, role, and authentication scheme setups. :contentReference[oaicite:1]{index=1}</li><li><a href="https://community.splunk.com/t5/Splunk‑Search/Manage‑groups‑and‑roles‑using‑REST‑API/m‑p/586527" target="_blank">Splunk Community: Manage groups and roles using REST API</a><br>Community discussion on using REST endpoints to view and manage roles. :contentReference[oaicite:2]{index=2}</li></ul>
description = <p>This search provides a detailed mapping of users to their roles and the indexes those roles are allowed to search in, enabling visibility into permissions and access configuration across the Splunk environment.</p>
search = | rest /services/authentication/users \
	| mvexpand roles \
	| table realname, title, roles, email \
	| join roles [ rest /services/authorization/roles | rename title as roles | search srchIndexesAllowed=* | table roles srchIndexesAllowed ]

[splunk_user_search_activity]
search_name = Splunk User Search Activity
version = 2.x
date_created = 2025‑10‑20
category = Splunk
sub_category = _internal
tags = Audit,Detail,Hutch,Search Duration
solution = <p>This search gives meaningful insights into search activity across users and hosts—highlighting heavy search jobs, frequent executors, and peak usage times. <b>Suggested Actions</b><br><b>1.</b> Identify users with unusually high total search runtimes to prioritise optimisation.<br><b>2.</b> Investigate specific search strings that repeatedly consume large runtime and consider scheduling or rewriting them.<br><b>3.</b> Monitor hosts with high search load to balance search head capacity and mitigate performance bottlenecks.<br><b>4.</b> Use the summary data to inform capacity planning and search governance policy for your Splunk environment.<br><b>5.</b> Schedule this search on a cadence and integrate it into your administrative dashboard or alert workflow for proactive monitoring.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = ‑7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_audit splunk_server=local action=search (id=* OR search_id=*)</code><br>       - Retrieve audit records for searches executed on the local Splunk server<br><b>02</b> <code>| eval search_id = if(isnull(search_id), id, search_id)</code><br>       - Normalize the search_id field to consistently use search_id<br><b>03</b> <code>| replace '*' with * in search_id</code><br>       - Clean wildcard characters in search_id values<br><b>04</b> <code>| rex "
explanation = <p>The SPL begins by querying <b>index=_audit</b> with <b>action=search</b> and normalises the <b>search_id</b> value using <b>eval</b>. It also cleans wildcard characters and extracts the search string using <b>rex</b>. The query excludes scheduler jobs and converts <b>total_run_time</b> into numeric format. The results are then grouped by <b>search_id</b> and <b>host</b>, applying <b>stats</b> to compute metrics such as minimum timestamp (_time), first user, maximum run time, and the search string. A further grouping by <b>user</b> and <b>host</b> is applied using <b>chart</b> to summarise total run time, count of searches, and latest use time. This search is particularly useful for operations and governance teams auditing search workloads, user behaviours, and platform performance. Junior Splunkers will learn how to use <b>eval</b>, <b>rex</b>, <b>stats</b>, and <b>chart</b> commands to aggregate audit events effectively.</p>
quid = BAD9BF78C5D7248898FF0A5AD700605F
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/security/cim/4.19.0/user/about-the-common-information-model" target="_blank">Splunk Docs: Splunk Audit Logs dataset</a><br>Reference on audit index fields including total_run_time. :contentReference[oaicite:0]{index=0}</li><li><a href="https://community.splunk.com/t5/Splunk-Search/What-is-the-difference-between-run_time-and-total_run_time/m-p/647473" target="_blank">Splunk Community: What is the difference between run_time and total_run_time?</a><br>Clarifies meaning of total_run_time in audit logs. :contentReference[oaicite:1]{index=1}</li><li><a href="https://community.splunk.com/t5/Splunk-Search/identify-which-user-is-doing-longest-searches/m-p/458911" target="_blank">Splunk Community: Identify which user is doing longest searches</a><br>User example of summarising search runtime via _audit. :contentReference[oaicite:2]{index=2}</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-get-a-report-on-time‑range‑windows‑from‑audit‑logs/m‑p/500672" target="_blank">Splunk Community: How to get a report on time‑range windows from _audit logs</a><br>Higher‑level discussion on evaluating search windows and runtime. :contentReference[oaicite:3]{index=3}</li></ul>
description = <p>This search summarises user search activity by aggregating runtime and usage patterns from the <b>_audit</b> index, enabling visibility into who is running searches, how often, and how long they take.</p>
search = index=_audit splunk_server=local action=search (id=* OR search_id=*) \
	| eval search_id = if(isnull(search_id), id, search_id) \
	| replace '*' with * in search_id \
	| rex "search='search\s(?<search>.*?)',\sautojoin" \
	| search search_id!=scheduler_* \
	| convert num(total_run_time) \
	| eval user = if(user="n/a", null(), user) \
	| stats min(_time) as _time first(user) as user max(total_run_time) as total_run_time first(search) as search by search_id \
	| search search!=*_internal* search!=*_audit* \
	| chart sum(total_run_time) as "Total search time" count as "Search count" max(_time) as "Last use" by user host \
	| fieldformat "Last use" = strftime('Last use', "%F %T.%Q")

[splunk_web_console_permissions_granted_to_non_existent_roles]
search_name = List of User Permissions Excluding Global and Role-Based Permissions
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,SFU
solution = <p>This query provides a <b>crucial</b> check on the alignment of user permissions with existing roles, ensuring that no orphaned permissions pose a security threat.</p><p><b>Suggested Actions</b><br><b>1.</b> Audit these permissions for necessity.<br><b>2.</b> Verify the proper configuration of roles.<br><b>3.</b> Reassign or remove permissions as appropriate.<br><b>4.</b> Implement regular checks to maintain security posture.<br><b>5.</b> Engage with security teams to assess findings.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
env_run = 2
execution_plan = <b>01</b> <code>| rest /servicesNS/-/-/admin/directory count=0 splunk_server=*</code><br>       - Retrieves ACL data from all directories.<br><b>02</b> <code>| fields eai:acl.app, eai:acl.owner, eai:acl.perms.*, eai:acl.sharing, eai:location, title</code><br>       - Filters for relevant ACL fields.<br><b>03</b> <code>| eval perms=mvappend('eai:acl.perms.read','eai:acl.perms.write')</code><br>       - Appends read and write permissions into a single field.<br><b>04</b> <code>| fields - eai:acl.perms.*</code><br>       - Removes individual ACL permissions fields post-aggregation.<br><b>05</b> <code>| mvexpand perms</code><br>       - Expands multivalue 'perms' into individual rows for analysis.<br><b>06</b> <code>| where perms!="*" AND NOT [ | rest /servicesNS/-/-/authorization/roles count=0 splunk_server=* | fields title | rename title as perms]</code><br>       - Filters permissions not matching any roles, avoiding global assignments.</p>
explanation = <p>The search leverages the <b>REST API</b> to query Splunk's internal directory and authorization roles. The pipeline initially gathers all access control list (ACL) permissions from Splunk's directories and contrasts these against existing roles to identify discrepancies. By identifying user permissions not tied to any specific role, this search aids in <b>strengthening</b> security by pinpointing potential access vulnerabilities. Admins can use this information to audit their systems, ensuring that permission assignments are both <b>intentional</b> and valid.</p>
quid = 8F6C52BCB720EAC8FF92FCB12DA8A768
search_author = grdhg24
updated_author = khutchinson
description = <p>This search identifies a <b>list</b> of user permissions that are not associated with any known roles, effectively <b>highlighting</b> configurations that could be problematic. It focuses on <b>uncovering</b> assigned permissions that might lead to <b>security risks</b> due to misconfigured role associations.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | rest /servicesNS/-/-/admin/directory count=0 splunk_server=*\
	| fields eai:acl.app, eai:acl.owner, eai:acl.perms.*, eai:acl.sharing, eai:location, title\
	| eval perms=mvappend('eai:acl.perms.read','eai:acl.perms.write')\
	| fields - eai:acl.perms.*\
	| mvexpand perms\
	| where perms!="*" AND NOT\
	[\
	| rest /servicesNS/-/-/authorization/roles count=0 splunk_server=*\
	| fields title\
	| rename title as perms\
	]

[splunk_web_console_user_logons]
search_name = Successful User Authentications with Timestamp
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Users
solution = <p>This search provides visibility into Splunk Web Console authentication activity.</p><p><b>Suggested Actions</b><br><b>1.</b> Review login patterns for unusual activity or off-hours access.<br><b>2.</b> Cross-reference with expected user list to identify unauthorized access.<br><b>3.</b> Create alerts for logins from unexpected accounts.<br><b>4.</b> Use as baseline for user activity auditing.<br><b>5.</b> Export results periodically for compliance reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/synthetic-monitoring.html" target="_blank">Products: Splunk Synthetic Monitoring</a><br>Splunk Synthetic Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_audit tag=authentication info=succeeded</code><br>       - Query the audit index for successful authentication events.<br><b>02</b> <code>| dedup user</code><br>       - Remove duplicate entries to show each user only once.<br><b>03</b> <code>| table user timestamp</code><br>       - Display user and timestamp fields in tabular format.<br>
explanation = <p>This search queries the <code>_audit</code> index, which contains authentication and authorization events. By filtering for <code>tag=authentication</code> and <code>info=succeeded</code>, it captures only successful login attempts. The <code>dedup</code> command ensures each user appears only once, providing a unique list of authenticated users. This is essential for <b>security auditing</b>, identifying active users, and verifying access patterns.</p>
