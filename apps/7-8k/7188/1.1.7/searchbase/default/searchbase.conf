solution = <p>This search provides visibility into <b>security event distribution</b> across Linux hosts, helping administrators identify active or problematic systems.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts with unusually high event counts for potential security issues.<br><b>2.</b> Identify hosts with unexpectedly low counts for potential data collection problems.<br><b>3.</b> Compare results over time to detect changes in activity patterns.<br><b>4.</b> Use output to prioritize security reviews for high-activity hosts.<br><b>5.</b> Correlate findings with other security data for comprehensive threat assessment.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=linux_secure</code><br>       - This line specifies the index and sourcetype to search in. The index is a placeholder and should be replaced with the actual index name. The sourcetype 'linux_secure' indicates that we are looking at Linux security logs.<br><b>02</b> <code>| rex .*:\d{2}\s(?<hostname>\S+)</code><br>       - This line uses the 'rex' command to extract the hostname from each event. The regular expression looks for a pattern that ends with a colon followed by two digits and a space, then captures the next sequence of non-space characters as the hostname.<br><b>03</b> <code>| stats count by hostname</code><br>       - This line uses the 'stats' command to count the number of occurrences of each hostname, resulting in a table with each unique hostname and the number of times it appears in the events.<br>
explanation = <p>This query <b>analyzes</b> security logs from <b>Linux systems</b> to identify the <b>number of events</b> associated with each hostname. It helps in pinpointing <b>unusual activity</b> or trends by capturing the <b>frequency</b> of occurrences for each hostname.</p>
quid = 262201D2A5CD109C5B17BB1EACDD2C16
search_author = grdhg24
updated_author = khutchinson
description = <p>This query searches for events in a specific index with a sourcetype of 'linux_secure'. It extracts the hostname from each event using a regular expression and counts the number of occurrences for each hostname.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=linux_secure\
	| rex ".*:\d{2}\s(?<hostname>\S+)"\
	| stats count by hostname

