	| rename "ip" as "IP address"

[pass_the_hash_detection]
search_name = Failed and Successful NTLM Logon Events Excluding Anonymous and Domain
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = Servers
tags = Access,GoSplunk
solution = <p>This query provides operational insight into identifying potentially unauthorized access attempts leveraging NTLM credentials. It filters out benign logon activity, offering a focused view of anomalous events that could signify malicious actions such as Pass The Hash attacks or scaled brute-force attempts.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the identified events to determine if suspicious access attempts are noted.<br><b>2.</b> Investigate the source machines and accounts involved with flagged logons.<br><b>3.</b> Examine correlated events (e.g., lateral movement, excessive login attempts) around flagged activity.<br><b>4.</b> Implement stronger access policies or multifactor authentication (MFA) for critical systems.<br><b>5.</b> Use toolsets or scripts to monitor and alert on anomalous NTLM usage patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specify the data source by defining the Splunk index and sourcetype.<br><b>02</b> <code>( EventCode=4624 Logon_Type=3 ) OR ( EventCode=4625 Logon_Type=3 )</code><br>       - Match events for either successful (4624) or failed (4625) network logons (Logon Type 3).<br><b>03</b> <code>Authentication_Package="NTLM"</code><br>       - Filter only events where NTLM authentication was used.<br><b>04</b> <code>NOT Account_Domain=YOURDOMAIN NOT Account_Name="ANONYMOUS LOGON"</code><br>       - Exclude logon events from YOURDOMAIN or ANONYMOUS LOGON, focusing analysis on less typical and more suspicious activity.<br>
explanation = <p>This search focuses on analyzing network logon events for failed or successful logon attempts using Event Codes 4624 (successful) and 4625 (failed) where the Logon Type is 3 (network logon). By targeting NTLM authentication (Authentication_Package=NTLM) and excluding legitimate sources such as YOURDOMAIN and ANONYMOUS LOGON, it filters out typical logons to highlight potential unauthorized activity. NTLM authentication logs are commonly scrutinized in scenarios like investigating Pass The Hash attacks, where credentials may be misused. This search supports security analysts in quickly identifying unusual network behaviors and bolstering incident detection capabilities.</p>
quid = F3CB4150184D1AE7F4645052475F2050
search_author = GoSplunk: srilankanmonkey
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/pass-hash-detection" target="_blank">https://gosplunk.com/pass-hash-detection</a></p>
description = <p>Summarizes <b>Failed and Successful NTLM Logon Events Excluding Anonymous and Domain</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" ( EventCode=4624 Logon_Type=3 ) OR ( EventCode=4625 Logon_Type=3 ) Authent</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" ( EventCode=4624 Logon_Type=3 ) OR ( EventCode=4625 Logon_Type=3 ) Authentication_Package="NTLM" NOT Account_Domain=YOURDOMAIN NOT Account_Name="ANONYMOUS LOGON"

