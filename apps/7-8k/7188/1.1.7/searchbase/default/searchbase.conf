solution = <p>For a more detailed look at future prediction methods, check out the <strong>Forecasting and Anomaly Detection</strong> section. Assuming we have already trained a forecasting model, we can evaluate the fit and accuracy of our output (logon_data.csv), via:</p> <p>| inputlookup logon_data.csv</p> <p>| eval prediction_error = abs(LogonsFromTheFuture - predicted_LogonsFromTheFuture)</p> <p>| trendline linear(LogonsFromTheFuture) as trendline</p> <p>| table LogonsFromTheFuture, predicted_LogonsFromTheFuture, trendline, prediction_error</p> <p>The <strong>scatter plot</strong> (“Scatter Line Chart” pictured below) is a critical aide to help you visualize and interpret the relationship between two numerical values.</p> <p>...(content truncated for brevity). To see all content download <a rel="noopener noreferrer" href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html">The Threat Hunter's Cookbook</a></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/xdr/index.html" target="_blank">Products: Cisco XDR</a><br>Cisco XDR.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p><strong><u><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/visualize-data/create-dashboards-and-reports">Scatter plots</a></u></strong> are a graphical technique used to analyze the relationship of two numeric variables. You can fit a linear regression to demonstrate the relationship making it easier to identify an outlier, or evaluate the performance of your predictions.</p> <p class="ql-align-center"><img width="817" height="501" src="https://lh7-rt.googleusercontent.com/docsz/AD_4nXdVaYMg1G9UaS_-0KH7U7LD0o4rmSTo-rfBy5HJix5xJ1ZWnHAs1yn7abJT2xg6YFZ8FYHgA7vrlNOFYslW4WyN1axxRStlv0fi7T5sXuxzFAQ8fer-PlrbKLsKZZg4cETYWcE?key=-nFc5BJT-QWE1le8yl0anLgt"></p> <p class="ql-align-center"><em>Scatter Line Chart Evaluating the Performance of a Linear Regressor</em></p>
quid = 4F50CC27CD032A25A3EE6A1BD9E6FE0C
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ol><li data-list="bullet"><a rel="noopener noreferrer" href="https://docs.google.com/document/d/1sfg1vbj5iDTBc8Bs2ZTdmso13YtUi_9L3bsRHM2XKDM/edit?disco=AAABi1fLRdg">Additional Documentation</a></li><li data-list="bullet"><a rel="noopener noreferrer" href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html">Download the Threat Hunter's Cookbook</a></li><li data-list="bullet">The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</li></ol>
description = <p><strong>Problem</strong></p><p>You want to develop and evaluate the accuracy of a predictive model that forecasts a trend in your data. Specifically, you need to compare the actual values of ‘future logons’ with the predicted values to assess how well the model performs.</p>
execution_plan = <b>01</b> <code>| inputlookup logon_data.csv</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>02</b> <code>eval prediction_error = abs(LogonsFromTheFuture - predicted_LogonsFromTheFuture)</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>03</b> <code>trendline linear(LogonsFromTheFuture) as trendline</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>04</b> <code>table LogonsFromTheFuture, predicted_LogonsFromTheFuture, trendline, prediction_error ```The scatter plot (“Scatter Line Chart” pictured below) is a critical aide to help you visualize and interpret the relationship between two numerical values.</code><br>       - Format the final output columns for review or dashboard use.<br>
search = | inputlookup logon_data.csv \
| eval prediction_error = abs(LogonsFromTheFuture - predicted_LogonsFromTheFuture) \
| trendline linear(LogonsFromTheFuture) as trendline \
| table LogonsFromTheFuture, predicted_LogonsFromTheFuture, trendline, prediction_error ```The scatter plot (“Scatter Line Chart” pictured below) is a critical aide to help you visualize and interpret the relationship between two numerical values.```

