description = <p>Summarizes <b>Isolating Rare Events And Values</b> using <code>index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" \
	| rare user

[itsi_import_objects_windows_automatic_entity_discovery]
search_name = Host System Information and Role Classification
version = 1.0.1
date_updated = 2024-2-4 12:38:20
search_hidden = 0
category = Security
sub_category = Servers
tags = Access,ITSI
solution = <p>This search provides automated Windows entity discovery for ITSI, classifying hosts by their roles and consolidating system information for service monitoring.</p><p><b>Suggested Actions</b><br><b>1.</b> Use results to populate ITSI entity lookups automatically.<br><b>2.</b> Review role classifications for accuracy and completeness.<br><b>3.</b> Add additional role matching patterns as needed for your environment.<br><b>4.</b> Schedule regular runs to keep entity information current.<br><b>5.</b> Correlate with other data sources to enrich host context.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/it-service-intelligence.html" target="_blank">Products: Splunk IT Service Intelligence (ITSI)</a><br>Splunk IT Service Intelligence (ITSI).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=WinHostMon</code><br>       - Query Windows host monitoring data.<br><b>02</b> <code>| append [ search ... sourcetype="Perfmon:sqlserver:databases" ]</code><br>       - Append SQL Server database instance information.<br><b>03</b> <code>| append [ search ... sourcetype=ms:iis:auto ]</code><br>       - Append IIS web server information.<br><b>04</b> <code>| eval role = case(...)</code><br>       - Classify host roles based on service DisplayNames.<br><b>05</b> <code>| stats ... by host</code><br>       - Aggregate all host attributes for entity discovery.<br>
explanation = <p>This search aggregates Windows host monitoring data with SQL Server and IIS web server information to build a comprehensive host inventory. The <code>case</code> and <code>match</code> functions evaluate service DisplayNames to assign role classifications such as Domain Controller, SQL Server, Web Server, and various application roles. The final stats aggregation consolidates all attributes by host for ITSI entity discovery.</p>
quid = 61C22C12EA47E97A5F513B755F4B5E3C
search_author = Splunk Portfolio Field Solutions
updated_author = akhamis
description = <p>This search collects and classifies <b>host system information</b> and <b>determines roles</b> for systems running Windows. By evaluating services and applications, it provides insights into the functions and responsibilities assigned to each host.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=WinHostMon\
	| append\
	[ search(index="<<index>>" sourcetype="Perfmon:sqlserver:databases" NOT instance IN (_Total,manager,model,tempdb,msdb))\
	| rename instance as sql_instance\
	| fields host sql_instance]\
	| append\
	[ search(index="<<index>>" sourcetype=ms:iis:auto web_server=*)\
	| rex field=source "LogFiles\\(?<iis_site>.*?)\"\
	| eval iis_site=upper(iis_site), web_server=upper(web_server)\
	| fields host web_server iis_site ]\
	| eval itsi_role="operating_system_host"\
	| eval role = case (\
	DisplayName="Active Directory Domain Services", mvappend(role,"Domain_Controller"),\
	match(DisplayName, "^Citrix Desktop Service"), mvappend(role,"Citrix Desktop"),\
	match(DisplayName, "^Citrix Broker Service"), mvappend(role,"Citrix Broker"),\
	match(DisplayName, "^ColdFusion"), mvappend(role,"ColdFusion"),\
	match(DisplayName, "^Ambra"), mvappend(role,"Ambra"),\
	match(DisplayName, "^Adobe"), mvappend(role,"Adobe"),\
	match(DisplayName, "^GE VP"), mvappend(role,"GE"),\
	match(DisplayName, "^Check Point"), mvappend(role,"CheckPoint"),\
	match(DisplayName, "^Kiwi"), mvappend(role,"Kiwi"),\
	match(DisplayName, "^Mirth"), mvappend(role,"Mirth"),\
	match(DisplayName, "^MySQL"), mvappend(role,"MySQL"),\
	match(DisplayName, "^Nalpeiron"), mvappend(role,"Nalpeiron"),\
	match(DisplayName, "^NetBackup"), mvappend(role,"NetBackup"),\
	match(DisplayName, "^NextGen"), mvappend(role,"NextGen"),\
	match(DisplayName, "^Nuance"), mvappend(role,"Nuance"),\
	match(DisplayName, "^Nutanix"), mvappend(role,"Nutanix"),\
	match(DisplayName, "^OpenDNS"), mvappend(role,"OpenDNS"),\
	match(DisplayName, "^QLogic"), mvappend(role,"QLogic"),\
	match(DisplayName, "^SQL Server"), mvappend(role,"SQL_Server"),\
	match(DisplayName, "^SolarWinds"), mvappend(role,"SolarWinds"),\
	match(DisplayName, "^SonicWall"), mvappend(role,"SonicWall"),\
	match(DisplayName, "^postgresql"), mvappend(role,"PostgreSQL"),\
	match(DisplayName, "^Acronis"), mvappend(role,"Acronis"),\
	isnotnull(web_server), "Web_Server"\
	)\
	| eval | stats latest(family) as family, latest(version) as version, latest(vendor_product) as vendor_product, latest(itsi_role) as itsi_role, latest(cpu_cores) as cpu_cores, latest(mem) as memory, latest(cpu_architecture) as cpu_architecture latest(Manufacturer) as manufacturer latest(Model) as model values(role) as role values(sql_instance) as sql_instance values(web_server) as web_server values(iis_site) as iis_site by host\
	| eval memory=round(memory)\
	| fields host, family, version, vendor_product, role, itsi_role, cpu_cores, memory, cpu_architecture, manufacturer, model, sql_instance, web_server, iis_site

[last_time_a_forwarder_checked_in]
search_name = TCP Connections Metrics with Connection Type and Last Received Time
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexing
solution = <p>This query provides Splunk administrators with a <b>comprehensive overview</b> of forwarder activity, enabling them to pinpoint failing, outdated, or excessively active systems. By summarizing critical connection metrics, admins can proactively manage forwarder operations and ensure optimal Splunk data flows.</p> \
<p><b>Suggested Actions</b><br><b>1.</b> Investigate forwarders with connection delays or missing activity.<br><b>2.</b> Upgrade forwarders using outdated versions.<br><b>3.</b> Analyze high ingestion rates and adjust limits where necessary.<br><b>4.</b> Set up monitoring alerts based on last received timestamps.<br><b>5.</b> Communicate findings with stakeholders to ensure prompt remediation.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal source="*metrics.lo*" group=tcpin_connections NOT eventType=*</code><br>       - Searches for forwarder metrics from the internal index, filtering out irrelevant events.<br> \
	<b>02</b> <code>| eval sourceHost=if(isnull(hostname), sourceHost,hostname)</code><br>       - Ensures the 'sourceHost' field is populated with the hostname or sourceHost value.<br> \
	<b>03</b> <code>| eval connectionType=case (fwdType=="uf","universal forwarder", ...)</code><br>       - Assigns readable connection types based on forwarder metadata.<br> \
	<b>04</b> <code>| eval build=if(isnull(build),"n/a",build)</code><br>       - Handles potential null values for attributes like build, version, OS, and arch.<br> \
	<b>05</b> <code>| eval lastReceived = case (kb>0, _time)</code><br>       - Captures the timestamp of events where data is actively received.<br>\
	<b>06</b> <code>| eval event_count= tcp_eps * seconds</code><br>       - Calculates the number of events based on events per second and an assumed time span.<br>\
	<b>07</b> <code>| bin _time span=10m</code><br>       - Groups results into 10-minute time intervals for finer granularity.<br>\
	<b>08</b> <code>| stats ..., sum(kb) as kbTotal ... by sourceHost _time</code><br>       - Summarizes key statistics for each host and time interval.<br> \
	<b>09</b> <code>| stats ... by sourceHost</code><br>       - Aggregates summary statistics across all time intervals per host.<br> \
	<b>10</b> <code>| eval LastReceived=strftime(lastReceived, "%Y/%m/%d %H:%M:%S")</code><br>       - Formats the 'lastReceived' timestamp into a readable string format.<br> \
	<b>11</b> <code>| fields sourceHost, connectionType, LastReceived</code><br>       - Retains only key fields for output clarity.<br> \
	<b>12</b> <code>| sort + LastReceived</code><br>       - Sorts results by the last received timestamp in ascending order.<br>
explanation = <p>This query helps Splunk administrators by identifying key metrics and statuses for forwarders. It utilizes dynamic field evaluations to categorize forwarder types (universal, lightweight, heavy, etc.) and accounts for fields that might contain null values, assigning them defaults where necessary. The search employs <b>bin</b> commands for precise time interval groupings and uses <b>stats</b> calculations to generate important data summaries like event counts, received data totals, and last connection timestamps.</p> \
	<p>Administratively, this search is critical for spotting operational issues: outdated forwarders, excessive ingestion rates, or failing forwarders. By isolating key metrics like LastReceived, it concentrates on <b>visibility into operational health</b> and enables proactive troubleshooting.</p>
quid = EBD29C8E537A670779B13948CBB15381
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/last-time-a-forwarder-checked-in" target="_blank">https://gosplunk.com/last-time-a-forwarder-checked-in</a></p>
description = <p>This search is designed to <b>monitor the status</b> of Splunk forwarders. It provides <b>critical insights</b> about connection types, versions, last connection times, and received data volume for each forwarder. Use this query to ensure <b>forwarder health and data ingestion consistency</b>.</p>
search = index=_internal source="*metrics.lo*" group=tcpin_connections NOT eventType=*\
	| eval sourceHost=if(isnull(hostname), sourceHost,hostname)\
	| eval connectionType=case (fwdType=="uf","universal forwarder", fwdType=="lwf", "lightweight forwarder",fwdType=="full", "heavy forwarder", connectionType=="cooked" or connectionType=="cookedSSL","Splunk forwarder", connectionType=="raw" or connectionType=="rawSSL","legacy forwarder")\
	| eval build=if(isnull(build),"n/a",build)\
	| eval version=if(isnull(version),"pre 4.2",version)\
	| eval os=if(isnull(os),"n/a",os)\
	| eval arch=if(isnull(arch),"n/a",arch)\
	| eval lastReceived = case (kb>0, _time)\
	| eval seconds=30\
	| eval event_count= tcp_eps * seconds\
	| bin _time span=10m\
	| stats first(connectionType) as connectionType first(version) as version max(_time) as lastConnected max(lastReceived) as lastReceived sum(kb) as kbTotal sum(event_count) as events sum(seconds) as secs by sourceHost _time\
	| stats first(connectionType) as connectionType first(version) as version max(lastConnected) as lastConnected max(lastReceived) as lastReceived by sourceHost\
	| eval LastReceived=strftime(lastReceived, "%Y/%m/%d %H:%M:%S")\
	| fields sourceHost, connectionType, LastReceived\
	| sort + LastReceived

[license_pool_utilization]
search_name = License Pool Utilization
version = 1.0.1
date_created = 2024-1-5 16:16:11
date_updated = 2024-2-4 12:43:50
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Licensing
solution = <p>This search provides Splunk administrators with a <b>real-time view</b> of license pool consumption, enabling proactive management and avoiding license overages.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor pools approaching capacity thresholds and reallocate as needed.<br><b>2.</b> Investigate pools with unexpectedly high utilization.<br><b>3.</b> Use results to justify license upgrades or optimizations.<br><b>4.</b> Create alerts for pools exceeding defined percentage thresholds.<br><b>5.</b> Document pool usage trends for capacity planning discussions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.log type=Usage earliest=-0h@d latest=now splunk_server=* pool=*</code><br>       - Searches the internal index for license usage logs from the current day.<br><b>02</b> <code>eval KB=round(b/1024) | eval MB=round(KB/1024,2) | eval GB=round(MB/1024,2) | eval TB=round(GB/1024,2)</code><br>       - Converts byte values to KB, MB, GB, and TB for readability.<br><b>03</b> <code>stats sum(MB) as TotalUsed, sum(b) as TotalBytesUsed by pool, poolsz</code><br>       - Aggregates total usage per pool in megabytes and bytes.<br><b>04</b> <code>eval perc = tostring(round(TotalBytesUsed/poolsz*100,4))."%"</code><br>       - Calculates percentage of pool capacity utilized.<br><b>05</b> <code>table "License Pool" "Pool Size" "Total Used" "Percent Used"</code><br>       - Outputs the final formatted table.
explanation = <p>This search queries <b>license_usage.log</b> from the internal index to retrieve license pool utilization data. It calculates total bytes used per pool and computes the <b>percentage of utilized capacity</b> by dividing total bytes by pool size. The <code>eval</code> commands convert raw byte values into human-readable megabytes, and the results are formatted as a table displaying license pool name, pool size, total used, and percentage used.</p>
quid = 9305FCF27EB2C4F923C4628D5B912F30
search_author = khutchinson
updated_author = akhamis
related_info = <p><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/about-license-pools" target="_self">Splexicon: Pool</a></p>
description = <p>Summarizes <b>License Pool Utilization</b> using <code>index=_internal source=*license_usage.log type=Usage earliest=-0h@d latest=now splunk_server=* pool=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal source=*license_usage.log type=Usage earliest=-0h@d latest=now splunk_server=* pool=*\
	| eval KB=round(b/1024) | eval MB=round(KB/1024,2) | eval GB=round(MB/1024,2) | eval TB=round(GB/1024,2)\
	| stats sum(MB) as TotalUsed, sum(b) as TotalBytesUsed by pool, poolsz\
	| eval perc = tostring(round(TotalBytesUsed/poolsz*100,4))."%"\
	| eval poolsz = case ("MB"="TB", poolsz/1024/1024/1024/1024, "MB"="GB", poolsz/1024/1024/1024, "MB"="MB", poolsz/1024/1024, "MB"="KB", poolsz/1024)\
	| eval poolsz =tostring(poolsz)." MB"\
	| eval TotalUsed = tostring(TotalUsed)." MB"\
	| rename pool as "License Pool", pools as "Pool Size", TotalUsed as "Total Used", perc as "Percent Used" | table "License Pool" "Pool Size" "Total Used" "Percent Used"

[license_usage_by_index_top_10]
search_name = License Usage by Index - Top 10
version = 1.0.1
date_created = 2024-1-5 16:39:55
date_updated = 2024-2-4 12:43:50
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Licensing
solution = <p>By using this query, Splunk admins can gain clear visibility into the <b>largest consumers</b> of license resources, providing the data needed for proactive planning and efficient usage.</p><p><b>Suggested Actions</b></p><b>1.</b> Investigate the top-consuming indexes to understand their data composition.<br><b>2.</b> Consider setting retention policies or index constraints for high-usage contributors.<br><b>3.</b> Monitor trends over time to identify potential growth patterns.<br><b>4.</b> Use output to plan for license upgrades if consumption approaches license limits.<br><b>5.</b> Evaluate indexing practices to optimize resource usage and costs.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>splunk_server=* pool=* index="_internal" source=*license_usage.log type=Usage</code><br>       - Filters for relevant license usage logs within the internal index.<br><b>02</b> <code>eval KB=round(b/1024)</code><br>       - Converts byte values into kilobytes for easier interpretation.<br><b>03</b> <code>eval MB=round(KB/1024,2)</code><br>       - Converts kilobytes to megabytes, rounded to two decimal places.<br><b>04</b> <code>eval GB=round(MB/1024,2)</code><br>       - Converts megabytes to gigabytes for higher-level overviews.<br><b>05</b> <code>eval TB=round(GB/1024,2)</code><br>       - Converts gigabytes to terabytes for very large datasets.<br><b>06</b> <code>chart sum(MB) as Total by idx</code><br>       - Aggregates and organizes total license usage for each index in megabytes.<br><b>07</b> <code>sort -Total</code><br>       - Sorts indexes in descending order of total license usage.<br><b>08</b> <code>head 10</code><br>       - Returns the top 10 indexes by license usage.</br><br>
explanation = <p>This search leverages Splunk's internal license logs to calculate and display the top indexes by total license usage over the past 24 hours. Each step of the SPL refines the raw data:</p><ul><li>The <code>eval</code> commands calculate data sizes in KB, MB, GB, and TB to provide meaningful units of measurement for large-scale consumption.</li><li>The <code>chart</code> command aggregates the total license usage in MB for each index.</li><li>The <code>sort</code> and <code>head</code> commands ensure that only the top 10 indexes are surfaced, allowing admins to focus on the most significant contributors to usage.</li></ul><p>Operationally, this search is integral for tracking license usage, diagnosing potential overages, and pinpointing indexes that may require optimization.</p>
quid = 549DD8375546C0618F0C3FA9B1CB44D7
search_author = khutchinson
updated_author = akhamis
related_info = <p><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/data-management/monitor-your-deployment-about-the-monitoring-console" target="_self">Indexing: License Usage</a></p>
description = <p>Summarizes <b>License Usage by Index - Top 10</b> using <code>splunk_server=* pool=* index="_internal" source=*license_usage.log type=Usage</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = splunk_server=* pool=* index="_internal" source=*license_usage.log type=Usage \
	| eval KB=round(b/1024) \
	| eval MB=round(KB/1024,2) \
	| eval GB=round(MB/1024,2) \
	| eval TB=round(GB/1024,2) \
	| chart sum(MB) as Total by idx \
	| sort -Total \
	| head 10

[license_usage_by_pool_per_hour_for_last_24_hours]
search_name = Hourly License Usage in GB by Pool
version = 1.0.1
date_updated = 2024-2-4 12:43:50
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Licensing
solution = <p>This search provides hourly visibility into <b>license pool consumption</b>, enabling administrators to identify peak usage times and manage license allocation effectively.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify peak usage hours and correlate with business activities.<br><b>2.</b> Monitor pools with consistently high consumption for optimization.<br><b>3.</b> Use hourly breakdowns to forecast daily usage patterns.<br><b>4.</b> Create dashboards to visualize license consumption trends.<br><b>5.</b> Set alerts for unusual spikes in hourly consumption.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=_internal source=*license_usage.log* type=Usage <br />- This line is specifying the data source. It's looking at the internal index of Splunk, specifically at the license usage logs.</ul><ul><b>02</b> bucket _time span=1h <br />- This line is bucketing the data into 1-hour time spans.</ul><ul><b>03</b> | stats sum(b) as bytes by _time, pool <br />- This line is summarizing the data. It sums up the bytes of data for each time bucket and pool.</ul><ul><b>04</b> | eval GB = round(bytes/1024/1024/1024,5) <br />- This line converts the bytes into gigabytes for easier reading. It's rounding the result to 5 decimal places.</ul><ul><b>05</b> | fields _time pool GB <br />- This line specifies the fields to display in the results. It shows the time, pool, and the data usage in gigabytes.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to <b>monitor</b> the license usage of Splunk. It helps in understanding how much data is being indexed by Splunk in different pools over time. This can be useful for <b>capacity planning</b> and ensuring that the Splunk license is not being overused.</div></div>
quid = 36FC34D320E2A61886F7A89992DF4CAE
search_author = GoSplunk: xoff00
updated_author = akhamis
related_info = <p><a href="https://gosplunk.com/license-usage-pool-per-hour-last-24-hours" target="_blank">https://gosplunk.com/license-usage-pool-per-hour-last-24-hours</a></p>
description = <p>This query retrieves and summarizes Splunk's <b>license usage</b> data in gigabytes (GB) from the internal index. It organizes the data by time and pool, offering <b>valuable insights</b> into data indexing volumes and helping ensure that the <b>license is not overused</b>.</p>
search = index=_internal source=*license_usage.log* type=Usage bucket _time span=1h\
	| stats sum(b) as bytes by _time, pool\
	| eval GB = round(bytes/1024/1024/1024,5)\
	| fields _time pool GB

[license_usage_by_sourcetypes]
search_name = Internal License Usage Statistics by Source Type in Megabytes
version = 1.0.1
date_updated = 2024-2-4 12:43:50
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Licensing
solution = <p>This search provides crucial insights into how data usage is distributed across different source types within your Splunk environment. By identifying high-use source types, teams can allocate resources more effectively and ensure that license consumption remains within thresholds.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the source types consuming the most data and evaluate their importance to operations.<br><b>2.</b> Optimize configurations for high-consuming source types to reduce unnecessary data ingestion.<br><b>3.</b> Establish thresholds or quotas for source type usage where applicable to manage consumption.<br><b>4.</b> Conduct periodic reviews of license usage trends to identify unusual spikes or patterns.<br><b>5.</b> Use the insights obtained to forecast future license and data ingestion needs.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.lo* type=Usage</code><br>       - Specifies internal index data, focusing on license usage statistics.<br><b>02</b> <code>stats sum(b) as bytes by st</code><br>       - Sums up the total bytes for each source type.<br><b>03</b> <code>eval Megabytes=bytes/1048576</code><br>       - Converts bytes to megabytes for easier comprehension.<br><b>04</b> <code>eval Megabytes=round(Megabytes,2)</code><br>       - Rounds the megabyte values to two decimals for better presentation.<br><b>05</b> <code>fieldformat Megabytes=tostring(Megabytes,"commas")</code><br>       - Formats the megabyte values with commas for improved readability.<br><b>06</b> <code>rename st as sourcetype</code><br>       - Renames the 'st' field to 'sourcetype' for clarity.<br><b>07</b> <code>fields - bytes</code><br>       - Removes the original 'bytes' field to declutter the output.<br><b>08</b> <code>sort - Megabytes</code><br>       - Sorts the results in descending order by megabytes to highlight the largest data consumers.</p>
explanation = <p>This query retrieves and analyzes internal license usage data to determine which source types consume the most megabytes. Key steps include calculating total data usage (in bytes) per source type, converting bytes to megabytes for better readability, and applying additional formatting for ease of interpretation. Understanding which source types utilize large amounts of data helps teams with <b>capacity planning</b>, identifying <b>high data consumers</b>, and optimizing allocation to prevent overuse.</p>
quid = E7F8A9B0C1D2E3F4A5B6C7D8E9F0A1B2
search_author = GoSplunk: SplunkNinja
updated_author = akhamis
related_info = <p><a href="https://gosplunk.com/license-usage-by-sourcetype" target="_blank">https://gosplunk.com/license-usage-by-sourcetype</a></p>
description = <p>Summarizes <b>Internal License Usage Statistics by Source Type in Megabytes</b> using <code>index=_internal source="*license_usage.lo*" type=Usage</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal source="*license_usage.lo*" type=Usage\
	| stats sum(b) as bytes by st\
	| eval Megabytes=bytes/1048576\
	| eval Megabytes=round(Megabytes,2)\
	| fieldformat Megabytes=tostring(Megabytes,"commas")\
	| rename st as sourcetype\
	| fields - bytes\
	| sort - Megabytes

[license_usage_data_cube]
search_name = License Usage Data Cube
version = 2.x
date_created = 2025‑10‑20
category = Splunk
sub_category = _internal
tags = Detail,Hutch,License,Usage
solution = <p>This daily data cube allows you to slice and dice license ingestion by pool, source, sourcetype, host, and index—supporting capacity planning, anomaly detection, and license budgeting.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor daily byte totals by sourcetype and index to identify growth‑spikes.<br><b>2.</b> Surface hosts or sources marked “(SQUASHED)” and investigate their contribution to usage blind spots.<br><b>3.</b> Correlate high‑volume pools with license tier or violations to drive remediation.<br><b>4.</b> Use this output as input for dashboards or lookup tables to track trends over time.<br><b>5.</b> Schedule this search and enable acceleration if this becomes a recurring data foundation for your license management workflows.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = ‑7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.log type="Usage"</code><br>       - Search license usage log for usage type events<br><b>02</b> <code>| eval h=if(len(h)=0 OR isnull(h),"(SQUASHED)",h)</code><br>       - Normalize blank or squashed host field<br><b>03</b> <code>| eval s=if(len(s)=0 OR isnull(s),"(SQUASHED)",s)</code><br>       - Normalize blank or squashed source field<br><b>04</b> <code>| eval idx=if(len(idx)=0 OR isnull(idx),"(UNKNOWN)",idx)</code><br>       - Normalize missing index field value<br><b>05</b> <code>| bin _time span=1d</code><br>       - Bucket events into daily intervals for summarization<br><b>06</b> <code>| stats sum(b) as b by _time, pool, s, st, h, idx</code><br>       - Compute total bytes consumed per dimension per day<br>
explanation = <p>The query targets <b>index=_internal</b> and <b>source=*license_usage.log</b> with <b>type="Usage"</b>, gathering raw byte counts (field <b>b</b>) attributed to license pools, sources (s), sourcetypes (st), hosts (h) and indexes (idx). The <b>eval</b> commands normalize squashed or missing values for h, s, and idx, replacing them with “(SQUASHED)” or “(UNKNOWN)” as needed. A <b>bin span=1d</b> buckets events per day, then <b>stats sum(b) by _time, pool, s, st, h, idx</b> aggregates daily usage. This enables operations and licensing teams to perform usage breakdowns by dimension, spot high‑volume consumers, and improve license compliance. For junior Splunkers, it demonstrates good usage of <b>eval</b>, field normalization, time‑bucketing, and aggregation with <b>stats</b>.</p>
quid = 15BB360EE7AD90B3B422932511FCD613
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Docs: About the Splunk Enterprise license usage report view</a><br>Overview of daily license usage and fields like pool, index and how squashing works. :contentReference[oaicite:0]{index=0}</li><li><a href="https://community.splunk.com/t5/Knowledge‑Management/license‑usage‑log‑key/m‑p/494183" target="_blank">Splunk Community: license_usage.log key</a><br>Field definitions for type=Usage events including h, s, idx and pool. :contentReference[oaicite:1]{index=1}</li><li><a href="https://community.splunk.com/t5/Getting‑Data‑In/Why‑are‑some‑keys‑in‑license‑usage‑log‑empty/m‑p/372616" target="_blank">Splunk Community: Why are some keys in license_usage.log empty?</a><br>Explains squashing behavior and why h or s may be blank. :contentReference[oaicite:2]{index=2}</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/data-management/monitor-your-deployment-about-the-monitoring-console" target="_blank">Splunk Docs: Indexing: License Usage</a><br>Details about how Monitoring Console renders license usage for indexers. :contentReference[oaicite:3]{index=3}</li></ul>
description = <p>This search consolidates daily license usage data across pools, hosts, sources, sourcetypes, and indexes by summarizing the <b>license_usage.log</b> entries. It provides a multidimensional view of ingestion volume for governance and capacity‑planning.</p>
search = index=_internal source=*license_usage.log type="Usage" \
	| eval h=if(len(h)=0 OR isnull(h),"(SQUASHED)",h) \
	| eval s=if(len(s)=0 OR isnull(s),"(SQUASHED)",s) \
	| eval idx=if(len(idx)=0 OR isnull(idx),"(UNKNOWN)",idx) \
	| bin _time span=1d \
	| stats sum(b) as b by _time, pool, s, st, h, idx

[license_usage_prediction]
search_name = Predict Daily Average License Usage in Gigabytes
version = 1.0.1
date_updated = 2024-2-4 12:43:50
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Licensing
solution = <p>By predicting license usage trends, this search empowers Splunk administrators to <b>proactively manage</b> license capacity and avoid potential overages or compliance issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Review predicted trends to anticipate capacity needs.<br><b>2.</b> Compare predicted values with actual usage to validate forecast accuracy.<br><b>3.</b> Use predictions to justify license procurement or optimization decisions.<br><b>4.</b> Set up alerts when predicted usage approaches license limits.<br><b>5.</b> Document trends for stakeholder reporting and budget planning.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.lo* type=Usage</code><br>       - This line specifies the data source. It looks in the internal index for logs that match the source pattern “*license_usage.lo*” and are of the type “Usage”.<br> <b>02</b> <code>| eval GB=round(b/1024/1024/1024, 2)</code><br>       - This line creates a new field called “GB”, which represents the size of the data in gigabytes. It takes the “b” field (size in bytes), divides it by 1024 three times to convert it to gigabytes, and rounds it to two decimal places.<br> <b>03</b> <code>| timechart span=1d avg(GB) as Gigabytes</code><br>       - This command generates a timechart grouped by daily intervals, calculating the average daily usage in gigabytes and storing it under the “Gigabytes” field.<br> <b>04</b> <code>| predict Gigabytes</code><br>       - Here, the “predict” command forecasts future usage trends based on the “Gigabytes” field.<br>
explanation = <p>This search monitors license usage within Splunk by extracting relevant data from the internal logs. By converting usage into gigabytes and visualizing trends through timecharts, it provides clear metrics of how licenses are utilized.</p> \
	<p>Employing the <b>predict</b> command enables foresight into probable future usage, helping administrators with <b>capacity planning</b> and identifying potential usage anomalies. This ensures consistent performance and operational efficiency while preemptively addressing licensing requirements.</p> \
	<p>The specific commands like <b>eval</b> enhance interpretability by creating meaningful metrics (like GB), and <b>timechart</b> aggregates data concisely for impactful visualization. With such actionable insights, teams can optimize resource allocation and budgetary planning effectively.</p>
quid = DDD1796456BB3CAB668166FC0143E270
related_info = <p><a href="https://gosplunk.com/license-usage-prediction" target="_blank">https://gosplunk.com/license-usage-prediction</a></p>
description = <p>Summarizes <b>Predict Daily Average License Usage in Gigabytes</b> using <code>index=_internal source="*license_usage.lo*" type=Usage</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal source="*license_usage.lo*" type=Usage\
	| eval GB=round(b/1024/1024/1024, 2)\
	| timechart span=1d avg(GB) as Gigabytes\
	| predict Gigabytes

[linux_cron_job_information]
search_name = Cron Job Completion Count by Date, Hostname, and Info
version = 1.0.1
date_updated = 2024-2-4 13:2:14
search_hidden = 0
category = Splunk
sub_category = Jobs
tags = Access,Jobs
solution = <p>This search provides visibility into <b>cron job execution patterns</b> across Linux hosts, enabling administrators to monitor scheduled task health and identify anomalies.</p><p><b>Suggested Actions</b><br><b>1.</b> Review cron job completion counts for unexpected drops or spikes.<br><b>2.</b> Investigate hosts with missing or inconsistent cron job activity.<br><b>3.</b> Correlate cron job failures with system or application issues.<br><b>4.</b> Document expected cron job schedules and compare with actual execution.<br><b>5.</b> Set up alerts for critical cron jobs that fail to execute on schedule.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services</a><br>Cisco Services.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="cron"</code><br>       - Specifies the index and sourcetype of cron logs to search.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts the _time field to a human-readable date format.<br><b>03</b> <code>| rex ".*:\d{2}\s(?<hostname>\s+)"</code><br>       - Extracts the hostname from the log entries.<br><b>04</b> <code>| rex "]:\sfinished(?<Info>.*)"</code><br>       - Extracts the completion information about cron jobs from the logs.<br><b>05</b> <code>| stats count by Date, hostname, Info</code><br>       - Counts occurrences of unique combinations of date, hostname, and job completion info.<br>
explanation = <p>This query can be used to <b>monitor</b> the execution of cron jobs on different hosts. It helps identify any <b>anomalies</b> or issues, such as jobs running unexpectedly or failing. By <b>grouping data</b> by date, hostname, and completion information, it offers a <b>clear breakdown</b> of cron job activity, supporting trend analysis and operational visibility. The use of specific SPL functions like <code>strftime</code> ensures human-readable formatting, while <code>rex</code> commands extract meaningful details, enabling focused analysis.</p>
quid = 3F76E3C23A50289AB7B8EBDF5737EAE8
search_author = GoSplunk: SplunkNinja
updated_author = akhamis
related_info = <p><a href="https://gosplunk.com/linux-cron-job-information" target="_blank">https://gosplunk.com/linux-cron-job-information</a></p>
description = <p>This query is searching for cron job logs in a specified index.</p> \
	<p>It extracts the date, hostname, and information about the completion of the cron jobs, and then provides a count of these grouped by date, hostname, and the completion information.</p>
search = index="<<index>>" sourcetype="cron"\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| rex ".*:\d{2}\s(?<hostname>\s+)"\
	| rex "]:\sfinished(?<Info>.*)"\
	| stats count by Date, hostname, Info

[linux_logons_failed_110]
search_name = Count of Failed GDM Password Authentications by User Over Time
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,SFU
solution = <p>This query enables the security team to proactively identify unusual spikes or trends in failed GDM password authentications, which could signify potential attacks or user issues. Timely awareness of these activities can help in mitigating risks and hardening security measures.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate accounts with the highest number of failed attempts for potential compromise.<br><b>2.</b> Audit user authentication configurations to identify misconfigurations or vulnerabilities.<br><b>3.</b> Review system logs for additional indicators of malicious activity.<br><b>4.</b> Implement adaptive authentication controls if trends suggest brute force attacks.<br><b>5.</b> Notify affected users and enforce best practices, such as strong passwords or multi-factor authentication.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=linux_secure</code><br>       - Retrieves logs from the Linux secure index.<br><b>02</b> <code>| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s\S+\s(?<session>gdm-\w+)\S:\s"</code><br>       - Extracts the session type (e.g., gdm-password) from the log messages.<br><b>03</b> <code>| search session=gdm-password</code><br>       - Filters for only "gdm-password" session log entries.<br><b>04</b> <code>| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s(?<hostname>\S+)\s.+\Sgdm-password:auth\S:\s(?<authstatus>\w+\s\w+);\s.+user=(?<username>\S+)"</code><br>       - Parses the authentication status (e.g., "authentication failure") and associated username.<br><b>05</b> <code>| search authstatus="authentication failure"</code><br>       - Filters results to include only failed authentication attempts.<br><b>06</b> <code>| timechart count(username)</code><br>       - Aggregates counts of failed authentications by user over time and visualizes this information as a timechart.<br>
explanation = <p>Failed GDM authentications can indicate brute force attacks, misconfigured accounts, or legitimate user issues. This search works by extracting relevant fields, such as session type and authentication status, from Linux secure logs. The search focuses on "gdm-password" sessions and counts failed attempts over time, offering an intuitive visualization for tracking authentication anomalies. By highlighting authentication failure counts, security engineers can monitor and investigate abnormal patterns or trends that might signal an ongoing attack.</p>
quid = 8A6DB89679B84B0F367966376921A11B
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Count of Failed GDM Password Authentications by User Over Time</b> using <code>index="<<index>>" sourcetype=linux_secure</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index="<<index>>" sourcetype=linux_secure\
	| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s\S+\s(?<session>gdm-\w+)\S:\s"\
	| search session=gdm-password\
	| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s(?<hostname>\S+)\s.+\Sgdm-password:auth\S:\s(?<authstatus>\w+\s\w+);\s.+user=(?<username>\S+)"\
	| search authstatus="authentication failure"\
	| timechart count(username)

[linux_logons_successful_109]
