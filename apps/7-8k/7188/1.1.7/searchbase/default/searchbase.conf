| timechart span=1h count\
| eval StartTime=relative_time(now(),"-24h@h")\
| eval Series=if(_time>=StartTime,"TodaysCount","AverageCount")\
| eval Hour = strftime(_time,"%H")\
| chart avg(count) by Hour Series

[baseline_and_identify_new_domain_traffic]
search_name = Baseline and Identify New Domain Traffic
version = 1.0.2
date_created = 2025-05-05 11:11:01
date_updated = 2025-7-2 14:40:2
category = Threat Hunter's Cookbook
sub_category = Searching and Filtering
tags = Search Optimization,Web Traffic
solution = <p>This query enhances web traffic visibility and contributes to proactive threat detection by surfacing newly observed domains. As your domain baseline grows over time, the query's accuracy improves. Its findings support targeted investigations, ensuring swift identification and mitigation of potential threats in your network.</p><p><b>Suggested Actions</b><br><b>1.</b> Deploy the Splunk URL Toolbox App and confirm operational readiness of the <code>`ut_parse_extended`</code> macro.<br><b>2.</b> Execute the baseline creation search to populate the historical lookup ("previously_seen_domains.csv").<br><b>3.</b> Regularly run this query to identify and monitor new domains entering your network traffic.<br><b>4.</b> Adjust time ranges or visualization parameters as needed to refine hunting results.<br><b>5.</b> Investigate any flagged new domains for potential security risks or anomalies.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>This hunting query is designed to surface domains observed for the first time in the past 24 hours by comparing current web traffic against a previously created domain lookup file. The search begins by generating a baseline of domains from web traffic, stored in "previously_seen_domains.csv". Over time, this lookup evolves to provide a more comprehensive dataset for domain comparison. The query utilizes the <code>| `ut_parse_extended`</code> macro from the URL Toolbox App and statistical operations such as <code>stats</code> to aggregate and analyze domain data.</p><p>The use of <code>convert ctime()</code> ensures better readability of timestamps, making event details more accessible in reports or dashboards. Administrators and analysts can tailor query parameters, such as <b>time ranges</b>, to align with specific investigative needs, making it a flexible tool for tracking network-based anomalies and enhancing security posture.</p>
quid = D035200C2067931C24351AE486CAAEE8
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Baseline and Identify New Domain Traffic</b> using <code>index="<<index>>" tag=web url="*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>" tag=web url="*"</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>eval list="mozilla"</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>03</b> <code>`ut_parse_extended(url,list)</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>04</b> <code>stats earliest(_time) as earliest latest(_time) as latest by ut_domain</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>05</b> <code>outputlookup previously_seen_domains.csv</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>06</b> <code>tstats count from datamodel=Web by Web.url _time</code><br>       - Use accelerated statistical summaries for efficient aggregation.<br><b>07</b> <code>rename "Web.url" as "uri"</code><br>       - Rename fields to make the results easier to read.<br><b>08</b> <code>eval list="mozilla"</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>09</b> <code>`ut_parse_extended(uri,list)</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>10</b> <code>stats earliest(_time) as earliest latest(_time) as latest by ut_domain</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>11</b> <code>inputlookup append=t previously_seen_domains.csv</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>12</b> <code>stats min(earliest) as earliest max(latest) as latest by ut_domain</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>13</b> <code>outputlookup previously_seen_domains.csv</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>14</b> <code>eval isOutlier=if(earliest >= relative_time(now(), "-1d@d"), 1, 0)</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>15</b> <code>convert ctime(earliest) ctime(latest)</code><br>       - Convert field values into a more useful display or analysis format.<br><b>16</b> <code>where isOutlier=1</code><br>       - Filter the results to the records that match the final conditions.<br>
search = | tstats count from datamodel=Web by Web.url _time \
| rename "Web.url" as "uri" \
| eval list="mozilla" \
| `ut_parse_extended(uri,list)` \
| stats earliest(_time) as earliest latest(_time) as latest by ut_domain \
| inputlookup append=t previously_seen_domains.csv \
| stats min(earliest) as earliest max(latest) as latest by ut_domain \
| outputlookup previously_seen_domains.csv \
| eval isOutlier=if(earliest >= relative_time(now(), "-1d@d"), 1, 0) \
| convert ctime(earliest) ctime(latest) \
| where isOutlier=1

[baseline_detect_first_time_egress_comms]
search_name = Baseline and Detect First-Time Egress Comms from Internal Servers
version = 1.0.5
date_created = 2025-06-02 16:25:04
date_updated = 2025-07-02 15:23:04
category = Splunk
sub_category = _internal
tags = Baseline,Internal Servers
solution = <p>This search provides <b>critical visibility</b> into outbound traffic patterns, ensuring organizations can rapidly detect and respond to unusual or unauthorized communications from their internal servers. By establishing a dynamic baseline of historical traffic, the search effectively distinguishes benign behavior from anomalies.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate flagged anomalies to discern legitimate new connections vs. potential security threats.<br><b>2.</b> Review internal server configurations and intended traffic destinations for potential misconfigurations.<br><b>3.</b> Compare flagged events against known threat intelligence to identify malicious activity.<br><b>4.</b> Update firewall rules to block suspicious or unauthorized external communications.<br><b>5.</b> Use findings to educate IT and security teams on emerging risks and improve egress monitoring procedures.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| tstats summariesonly=false allow_old_summaries=true ...</code><br>       - Filters network traffic data to identify egress communications not matching internal categories.<br><b>02</b> <code>| lookup egress_src_dest_tracker.csv ...</code><br>       - Compares observed traffic against the baseline lookup file to identify first-time connections.<br><b>03</b> <code>| appendpipe [ ... ]</code><br>       - Maintains and updates the baseline by adding new observations ensuring future comparisons are comprehensive.<br><b>04</b> <code>| eval isOutlier=if ...</code><br>       - Flags data as an anomaly if no historical match is found within the baseline.<br><b>05</b> <code>| where isOutlier=1 ...</code><br>       - Filters events to display only those flagged as first-time observed communications.<br><br>
explanation = <p>The purpose of this search is to identify first-time outbound communications from internal servers to external destinations, which could indicate suspicious or unauthorized activity such as data exfiltration. By leveraging a lookup file (<code>egress_src_dest_tracker.csv</code>), the search maintains a historical baseline of source and destination IP pairs. Whenever a new source-to-destination pair is observed that does not exist in the baseline, it is flagged as an anomaly. This approach uses several techniques:</p><p>- <b>| tstats</b>: Extracts summarized network traffic data aligned to the specified constraints (source category, destination IP ranges).<br>- <b>| lookup</b>: Matches current data against existing historical baselines.<br>- <b>| eval</b>: Determines whether the observed communication is a new, potential anomaly.<br>- <b>| outputlookup</b>: Updates the lookup file to ensure the baseline remains current and accurate.<br>- <b>| stats</b> and <b>| eventstats</b>: Aggregates and compares earliest and latest timestamps for both historical and current data, enhancing anomaly detection accuracy.</p><p>By enabling frequent updates and refined monitoring, this process supports real-time threat detection while minimizing false positives.</p>
quid = ECF7511CE3CF181B68F150D0F723AA3C
search_author = Ryan Fetterman & Sydney Marrone
updated_author = khutchinson
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Baseline and Detect First-Time Egress Comms from Internal Servers</b> using <code>| tstats summariesonly=false allow_old_summaries=true earliest(_time) as earliest latest(_time) as latest values(All_Tra</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | tstats summariesonly=false allow_old_summaries=true earliest(_time) as earliest latest(_time) as latest values(All_Traffic.action) as action values(All_Traffic.app) as app values(All_Traffic.dest_ip) as dest_ip values(All_Traffic.dest_port) as dest_port values(sourcetype) as sourcetype count from datamodel=Network_Traffic where (NOT (All_Traffic.dest_category="internal" OR All_Traffic.dest_ip=10.0.0.0/8 OR All_Traffic.dest_ip=172.16.0.0/12 OR All_Traffic.dest_ip=192.168.0.0/16 OR All_Traffic.dest_ip=100.64.0.0/10)) by All_Traffic.src_ip All_Traffic.dest_ip \
| rename "All_Traffic.*" as * \
| lookup egress_src_dest_tracker.csv dest_ip src_ip OUTPUT earliest AS previous_earliest latest AS previous_latest \
| eval earliest=min(earliest, previous_earliest), latest=max(latest, previous_latest) \
| fields - previous_* \
| appendpipe \
    [ | fields src_ip dest_ip latest earliest \
    | stats min(earliest) as earliest max(latest) as latest by src_ip, dest_ip \
    | inputlookup append=t egress_src_dest_tracker.csv \
    | stats min(earliest) as earliest max(latest) as latest by src_ip, dest_ip \
    | outputlookup egress_src_dest_tracker.csv ] \
| eventstats max(latest) as maxlatest \
| eval comparisonTime="-1h@h" \
| eval isOutlier=if(earliest >= relative_time(maxlatest, comparisonTime), 1, 0) \
| convert timeformat="%Y-%m-%dT%H:%M:%S" ctime(earliest),ctime(latest) ,ctime(maxlatest) \
| where isOutlier=1

[baselining_dashboard]
search_name = 10-Minute Interval Count Comparison: Current, Last Week, Last Month
version = 2.0.2
date_updated = 2024-2-4 16:38:37
search_hidden = 0
category = Splunk
sub_category = _internal
tags = _internal,Events,Experimental
solution = <p>This search enables users to gain a <b>clear understanding</b> of how event counts fluctuate over time, offering insights into recent and historical activity within 10-minute intervals. This can inform proactive decision-making about potential spikes or lulls in activity.</p><p><b>Suggested Actions</b><br><b>1.</b> Use the results to monitor and investigate unusual spikes or drops in event counts.<br><b>2.</b> Identify patterns of recurring activity and their frequency over time.<br><b>3.</b> Utilize the comparison data for performance tuning or capacity planning.<br><b>4.</b> Set up alerts for deviations from expected values, based on historical trends.<br><b>5.</b> Share these insights with relevant teams to improve overall system performance and drive strategic discussions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specify the index and sourcetype from which event data is retrieved.<br><b>02</b> <code>| timechart span=10m count as Current</code><br>       - Generate a timechart with a 10-minute span that calculates the current count of events.<br><b>03</b> <code>| appendcols [search index="<<index>>" | timechart span=10m count as "-1 Month"]</code><br>       - Append a column to the timechart, reflecting the event count from one month ago.<br><b>04</b> <code>| appendcols [search index="<<index>>" | timechart span=10m count as "-1 Week"]</code><br>       - Add another column to the timechart, showing the event count from one week ago.<br>
explanation = <p>This query compares the current event count against event counts from the same intervals one week ago and one month ago. By appending these datasets, users can identify <b>patterns</b>, <b>anomalies</b>, or <b>spikes</b> in event trends over different time horizons. This query is valuable for tasks such as <b>capacity planning</b>, <b>performance monitoring</b>, and identifying <b>short-term and long-term changes</b>. The use of 'timechart' ensures event counts are bucketed into consistent 10-minute intervals, while 'appendcols' combines multiple sets of results into a single output for seamless analysis.</p>
quid = ECD44FEA99B173601BFFF9C15F24B191
search_author = GoSplunk: SplunkMasterFlex
temp_replace_of = account_enabled_in_windows_1
updated_author = akhamis
related_info = <p><a href="https://gosplunk.com/baselining-dashboard/" target="_self">https://gosplunk.com/baselining-dashboard/</a></p>
description = <p>This query generates a timechart with a 10-minute span, displaying the <b>current event count</b>. It appends two additional columns showing the <b>event count trends</b> from one month ago and one week ago, providing a <b>comprehensive view of event count behavior</b> over time.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
| timechart span=10m count as Current\
| appendcols [ search index="<<index>>"\
| timechart span=10m count as "-1 Month"]\
| appendcols [ search index="<<index>>"\
| timechart span=10m count as "-1 Week"]

[basic_binary_conversion_for_ipv4_mask_1]
search_name = Top 100 GeoIP Ranges with CIDR Notation
search_hidden = 0
sub_category = Custom
tags = GoSplunk
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| inputlookup geoip</code><br>       - This command loads the geoip lookup table.<br><b>02</b> <code>| head 100</code><br>       - Limits the results to the first 100 entries.<br><b>03</b> <code>| eval mask_int=end_ip_int-start_ip_int</code><br>       - Calculates the difference between the end and start IP addresses.<br><b>04</b> <code>| eval mask_bin=replace(...)</code><br>       - Converts the calculated difference to its binary representation.<br><b>05</b> <code>| eval mask_bin=ltrim(tostring(mask_bin),"0")</code><br>       - Removes leading zeros from the binary value.<br><b>06</b> <code>| eval mask_cidr=32-length(mask_bin)</code><br>       - Computes the CIDR notation based on the length of the binary mask.<br><b>07</b> <code>| eval cidr=start_ip_oct . "/" . mask_cidr</code><br>       - Combines the start IP address with the CIDR mask to form the CIDR block.<br><b>08</b> <code>| table start_ip_oct, end_ip_oct, cidr</code><br>       - Creates a table of the start IP address, end IP address, and CIDR block.<br>
explanation = <p>This query calculates CIDR notation for IP ranges within the geoip lookup table by utilizing start and end IP values. Applying binary conversion to the difference between these values, the query determines the appropriate CIDR mask length. This approach helps users efficiently visualize and manage their IP address allocations.</p><p><b>Relevance:</b> Network administrators and analysts often need to summarize complex IP address ranges to simplify routing, improve network segmentation, and support security configurations. This query aids in these tasks by presenting IP ranges in CIDR format, which is both intuitive and widely used in the industry.</p>
quid = DB9AD5F05F3BDB99AE9D6B53A4AE9486
related_info = <p><a href="https://gosplunk.com/basic-binary-conversion-ipv4-mask" target="_blank">https://gosplunk.com/basic-binary-conversion-ipv4-mask</a></p>
description = <p>Summarizes <b>Top 100 GeoIP Ranges with CIDR Notation</b> using <code>| inputlookup geoip</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query converts IP ranges in the geoip lookup table into CIDR notation for efficient analysis and better visualization of network data. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
search = | inputlookup geoip\
| head 100\
| eval mask_int=end_ip_int-start_ip_int\
| eval mask_bin=replace(replace(replace(replace(replace(replace(replace(replace(replace(replace(replace(replace(replace(replace(replace(replace(substr(tostring(mask_int, "hex"), 3), "0", "0000"), "1", "0001"), "2", "0010"), "3", "0011"), "4", "0100"), "5", "0101"), "6", "0110"), "7", "0111"), "8", "1000"), "9", "1001"), "A", "1010"), "B", "1011"), "C", "1100"), "D", "1101"), "E", "1110"), "F", "1111")\
| eval mask_bin=ltrim(tostring(mask_bin),"0")\
| eval mask_cidr=32-length(mask_bin)\
| eval cidr=start_ip_oct . "/" . mask_cidr\
| table start_ip_oct, end_ip_oct, cidr

