description = <p>Summarizes <b>Visualizing Distributions of User Agent Lengths in Proxy Logs</b> using <code>index="<<index>>" user_agent=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>" user_agent=*</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>bin "http_user_agent_length" bins=100</code><br>       - Bucket values into fixed intervals for comparison.<br><b>03</b> <code>stats count by "http_user_agent_length"</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br>
search = index="<<index>>" user_agent=* \
	| bin "http_user_agent_length" bins=100 \
	| stats count by "http_user_agent_length"

