sub_category = Traffic
tags = Access,SFU
solution = <p>This search provides visibility into <b>device distribution</b> among web users, helping optimize user experience and detect anomalies.</p><p><b>Suggested Actions</b><br><b>1.</b> Use insights to prioritize mobile or desktop optimization.<br><b>2.</b> Investigate unusual device patterns for potential security concerns.<br><b>3.</b> Track device trends over time for strategic planning.<br><b>4.</b> Compare device usage with marketing campaign targets.<br><b>5.</b> Set up alerts for sudden shifts in device distribution.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=<<index>> sourcetype=*access* <br />- This line is specifying the data source. It's looking in the specified index for data with a sourcetype that includes 'access'.</ul><ul><b>02</b> | dedup useragent <br />- This line is removing duplicate user agents, so each user agent is only counted once.</ul><ul><b>03</b> | eval device=useragent <br />- This line is creating a new field called 'device' that is a copy of the 'useragent' field.</ul><ul><b>04</b> | replace *Windows* with Windows, *Macintosh* with Apple, *Android* with Android, *iPhone* with iPhone, *iPad* with iPad in device <br />- This line is categorizing the 'device' field. It's replacing any value that includes 'Windows' with 'Windows', 'Macintosh' with 'Apple', etc.</ul><ul><b>05</b> | top limit=5 useother=t device <br />- This line is returning the top 5 most common values in the 'device' field. The 'useother=t' option means that all other values will be grouped together under 'other'.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to understand the distribution of device types among users. This can be useful for understanding user behavior, optimizing user experience for the most common device types, or identifying unusual patterns that may indicate a security threat.</div></div>
quid = 4590DB1F4945338BDC5EE29E91B4EDBF
search_author = grdhg24
updated_author = khutchinson
description = This query is searching for unique user agents from access logs, categorizing them into device types, and then returning the top 5 most common device types.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="*access*"\
| dedup useragent\
| eval device=useragent\
| replace *Windows* with Windows, *Macintosh* with Apple, *Android* with Android, *iPhone* with iPhone, *iPad* with iPad in device\
| top limit=5 useother=t device

[reports_owned_by_admin_users_and_writable_by_others]
search_name = List of Non-Admin Write Access to Saved Searches with Links
version = 2.x
date_created = YYYY-MM-DD
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Authentication,Users
solution = <p>This search identifies <b>saved searches with non-admin write access</b>, helping audit security and compliance.</p><p><b>Suggested Actions</b><br><b>1.</b> Review searches with excessive write permissions.<br><b>2.</b> Update permissions to follow least-privilege principles.<br><b>3.</b> Document permission changes for audit trails.<br><b>4.</b> Schedule regular permission audits.<br><b>5.</b> Alert on new searches with broad write access.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest</code><br>       - The 'rest' command is used to access the Splunk REST API and retrieve information about saved searches.<br><b>02</b> <code>| where</code><br>       - The 'where' command is used to filter the results to only include searches created by admin users or the 'nobody' user.<br><b>03</b> <code>| rename</code><br>       - The 'rename' command is used to rename certain fields for readability.<br><b>04</b> <code>| table</code><br>       - The 'table' command is used to format the results into a table with specified fields.<br><b>05</b> <code>| mvexpand</code><br>       - The 'mvexpand' command is used to expand multi-value fields into separate events.<br><b>06</b> <code>| where</code><br>       - Another 'where' command is used to filter out events where the 'write_roles' field is empty or 'admin'.<br><b>07</b> <code>| mvcombine</code><br>       - The 'mvcombine' command is used to combine multi-value fields into a single field.<br><b>08</b> <code>| eval</code><br>       - The 'eval' command is used to create a new field 'search_name_for_link' based on the 'savedsearch_name' field.<br><b>09</b> <code>| rex</code><br>       - The 'rex' command is used to replace certain characters in the 'search_name_for_link' field with URL-encoded equivalents.<br><b>10</b> <code>| eval</code><br>       - Another 'eval' command is used to create a 'link' field, which is a URL to the saved search in the Splunk manager.<br><b>11</b> <code>| fields</code><br>       - The 'fields' command is used to remove certain fields from the results.<br><br>
explanation = <p>This query can be used to manage and <b>review</b> saved searches in a Splunk environment. It can help administrators understand who has created saved searches, what <b>permissions</b> are associated with those searches, and provide a direct link to the search in the Splunk manager. This can be <b>useful</b> for auditing, troubleshooting, or general management of saved searches.</p>
quid = 6951F165C88E879724C028A7FBAE7982
search_author = GoSplunk: eugenek
related_info = <p><a href="https://gosplunk.com/reports-owned-by-admin-users-and-writable-by-others" target="_blank">https://gosplunk.com/reports-owned-by-admin-users-and-writable-by-others</a></p>
description = <p>This query is <b>retrieving</b> information about saved searches in Splunk, specifically those created by <b>admin</b> users or the 'nobody' user. It then renames and formats certain fields for readability and creates a link to each saved search in the Splunk manager directory.</p>
search = | rest /servicesNS/-/-/saved/searches splunk_server=*\
	| where [| rest /services/authentication/users splunk_server=*\
	| search roles="admin"\
	| fields title\
	| rename title as author] OR author="nobody"\
	| rename title AS savedsearch_name, eai:acl.app as app, eai:acl.perms.write as write_roles\
	| table author write_roles splunk_server app savedsearch_name splunk_server\
	| mvexpand write_roles\
	| where NOT write_roles IN("","admin")\
	| mvcombine write_roles

[rest_api_response_time]
search_name = Internal Splunkd Access Log Analysis with Response Time
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This search monitors <b>REST API response times</b>, helping identify performance bottlenecks in Splunk operations.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate slow API calls causing performance issues.<br><b>2.</b> Monitor response time trends over time.<br><b>3.</b> Correlate slow responses with system load metrics.<br><b>4.</b> Optimize frequently-used API endpoints.<br><b>5.</b> Set up alerts for response times exceeding thresholds.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'index=_internal' specifies that the data is being retrieved from the internal index, which contains Splunk's own log data.</ul><ul><b>03</b> The 'rex' command is used to extract fields from the log entries using regular expressions. The first 'rex' command extracts the response time from each log entry.</ul><ul><b>04</b> The second 'rex' command extracts the REST URI from each log entry.</ul><ul><b>05</b> The 'table' command is used to display the extracted fields (_time, REST_uri, Response_Time) in a table.}</ul><ul>sourcetype=splunkd_access source=*splunkd_access.log' filters the data to only include entries from the splunkd_access.log file.</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to <b>monitor</b> the performance of the Splunk server by tracking the response times of REST API calls. It can help <b>identify</b> slow API calls that may be impacting the performance of the server.</div></div>
quid = DF3A165F886FE3039A9034FB56AA238E
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/rest-api-response-time" target="_blank">https://gosplunk.com/rest-api-response-time</a></p>
description = <p>This query is <b>extracting</b> the response time and REST URI from the splunkd_access.log and displaying them in a table along with the timestamp.</p>
search = index=_internal sourcetype=splunkd_access source=*splunkd_access.log\
	| rex "- - - (?P<Response_Time>.*)"\
	| rex "\"(?<REST_uri>[^\"]+)"\
	| table _time, REST_uri, Response_Time

[rest_api_table_all_splunk_user_email_addresses]
search_name = List of Unique Email Addresses of Authenticated Users
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Users
solution = <p>This search provides a <b>list of user email addresses</b> for communication and compliance purposes.</p><p><b>Suggested Actions</b><br><b>1.</b> Use for sending system announcements to all users.<br><b>2.</b> Verify all users have valid email addresses configured.<br><b>3.</b> Cross-reference with HR records for accuracy.<br><b>4.</b> Export for compliance audits.<br><b>5.</b> Schedule regular reports for user management.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/authentication/users</code><br>       - Retrieves user authentication data from the Splunk REST API.<br><b>02</b> <code>| search email!=""</code><br>       - Filters to only include users with email addresses defined.<br><b>03</b> <code>| dedup email</code><br>       - Removes duplicate email entries.<br><b>04</b> <code>| stats count by email</code><br>       - Groups and counts by email address.<br><b>05</b> <code>| mvcombine delim=";" email</code><br>       - Combines email addresses into a semicolon-separated list.<br>
explanation = <p>This search uses the REST API to retrieve user information from Splunk's authentication service. By filtering for users with email addresses and deduplicating, it provides a clean list of unique email contacts. This is useful for <b>communication</b>, <b>compliance audits</b>, and <b>user management</b> activities.</p>
quid = 8E87B4536A00A8212C4D3F8AC8D4C35C
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/rest-api-table-all-splunk-user-email-addresses" target="_blank">https://gosplunk.com/rest-api-table-all-splunk-user-email-addresses</a></p>
description = <p>This search retrieves a <b>list</b> of <b>unique</b> email addresses of authenticated users in your Splunk environment. It is <b>valuable</b> for identifying users with access to your system and ensuring compliance with access policies.</p>
search = | rest /services/authentication/users\
	| search email!=""\
	| dedup email\
	| stats count by email\
	| mvcombine delim=";" email\
	| nomv email\
	| fields - count\
	| rename email as "Email Addresses"

