sub_category = _internal
tags = Access,GoSplunk
solution = <p>This search identifies <b>frequently triggered alerts</b>, helping administrators optimize alert configurations and reduce noise.</p><p><b>Suggested Actions</b><br><b>1.</b> Review searches with high trigger counts for optimization opportunities.<br><b>2.</b> Investigate alerts that may be generating excessive notifications.<br><b>3.</b> Adjust alert thresholds or conditions to reduce false positives.<br><b>4.</b> Document alert performance for stakeholder reporting.<br><b>5.</b> Consider consolidating or disabling low-value alerts.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'rest' command is used to access the Splunk REST API. In this case, it's retrieving information about saved searches.</ul><ul><b>02</b> The 'table' command is used to create a table with the specified fields.</ul><ul><b>03</b> The 'search' command is used to filter the results to only include those with an 'alert_type' of 'always'.</ul><ul><b>04</b> The 'fillnull' command is used to replace any null values in the 'triggered_alert_count' field with 0.</ul><ul><b>05</b> The 'sort' command is used to sort the results by the 'triggered_alert_count' field in descending order.</ul><ul><b>06</b> The 'rex' command is used to extract a portion of the 'search' field using a regular expression. The 'max_match' option is set to 100, meaning it will extract up to 100 matches.</ul><ul><b>07</b> The 'rename' command is used to rename the extracted field to 'search'.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to <b>monitor</b> and <b>analyze</b> the performance of saved searches in Splunk. It can help identify which searches are triggering alerts most frequently, which can be useful for identifying potential issues or areas of interest in the data.</div></div>
quid = BCD973BD94B543971C3679B6B346AD8B
search_author = GoSplunk: Opeyemi Olatunji
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-reports-and-wrap-the-text" target="_blank">https://gosplunk.com/list-reports-and-wrap-the-text</a></p>
description = <p>Summarizes <b>Frequent Always-Alerted Searches Analysis</b> using <code>| rest /servicesNS/-/-/saved/searches</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest /servicesNS/-/-/saved/searches\
	| table search title description alert_type "alert.expires" "alert.suppress" "alert.suppress.fields"\
	| search alert_type="always"| fillnull value=0 triggered_alert_count| sort "triggered_alert_count" desc| rex max_match=100 field="search" "(?<split__regex>.{0,100}(?:\s|$)|.{100})"\
	| rename split__regex as search

