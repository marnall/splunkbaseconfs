category = Threat Hunter's Cookbook
sub_category = Sorting and Stacking
tags = Search-Time Analytics,Streamstats
solution = <p>This search identifies IP addresses that have triggered multiple multifactor authentication (MFA) failures within a short time frame. It provides visibility into potential malicious attempts to bypass authentication mechanisms, enabling security teams to take action promptly.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the source IPs identified in the results.<br><b>2.</b> Cross-check the associated users for abnormal login attempts.<br><b>3.</b> Investigate any IPs with unusually high counts for suspicious activity.<br><b>4.</b> Consider blocking or filtering the identified IPs in your ingress controls.<br><b>5.</b> Enhance monitoring policies to detect similar activities in the future.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>This search leverages the <b>streamstats</b> command to track the count of failed MFA attempts by <b>src_ip</b> and <b>user</b> over time. The use of <b>streamstats</b> ensures that statistics are generated as events are observed, allowing real-time monitoring. The <b>where</b> clause filters for IPs with more than five failures, signaling potential security concerns. Finally, <b>stats</b> aggregates the results to display the unique users linked to each flagged IP. This approach highlights suspicious behavior effectively and facilitates targeted investigations.</p>
quid = 96FF96A74033AA28228100E230F3F44D
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>This search helps you identify source IPs responsible for multiple multifactor authentication (MFA) failures in a brief period. Highlighting such patterns improves your ability to detect potential brute-force attacks or misconfigurations that might compromise security.</p>
execution_plan = <b>01</b> <code>index="<<index>>" eventType=mfa action=failed</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>streamstats count by src_ip user</code><br>       - Calculate running values based on event order.<br><b>03</b> <code>where count > 5</code><br>       - Filter the results to the records that match the final conditions.<br><b>04</b> <code>stats values(user) by src_ip</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br>
search = index="<<index>>" eventType=mfa action=failed \
	| streamstats count by src_ip user \
	| where count > 5 \
	| stats values(user) by src_ip

[detecting_suspicious_domains_using_lookup_exclusion]
search_name = Detecting Suspicious Domains Using Lookup Exclusion
version = 1.0.3
date_created = 2025-05-05 12:30:30
date_updated = 2025-7-2 14:33:19
category = Threat Hunter's Cookbook
sub_category = Searching and Filtering
tags = Indicator Lookup,Suspicious Domains
solution = <p>This query provides visibility into potentially malicious domain activity by systematically excluding events tied to trusted domains. It helps security teams hone in on suspicious activity, improving incident response and strategic planning.</p><p><b>Suggested Actions</b><br><b>1.</b> Review and update the <code>known_good_domains.csv</code> regularly to reflect the current trusted entities.<br><b>2.</b> Investigate sources with higher counts of <b>unknown domains</b> for potential compromise.<br><b>3.</b> Use this search as part of a broader <b>network monitoring strategy</b> to catch emergent threats.<br><b>4.</b> Integrate findings with other threat intelligence feeds for comprehensive correlation.<br><b>5.</b> Share insights with teams to bolster cybersecurity strategies and defensive postures.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" \</code><br>       - Begin by searching your specific index to gather all relevant firewall data.<br><b>02</b> <code>lookup known_good_domains.csv domain AS domain OUTPUT is_good \</code><br>       - Utilize the lookup command to map each domain in the logs against a whitelist of known good domains.<br><b>03</b> <code>where isnull(is_good) \</code><br>       - Filter out entries marked with an “is_good” value as null, isolating unknown domains.<br><b>04</b> <code>stats count by src</code><br>       - Aggregate the occurrences of suspicious domains by their source, helping identify potentially compromised assets.<br>
explanation = <p>This search utilizes Splunk’s <b>lookup functionality</b> to filter network events against a whitelist of trusted domains from the CSV file, <code>known_good_domains.csv</code>. The lookup command performs a match, using the domain field to correlate with entries in the CSV, marking matched entries with an <code>is_good</code> flag. Events where the <code>is_good</code> flag is absent are flagged as potentially suspicious, emphasizing their relevance in threat detection. By employing <code>stats</code> to group occurrences by source, the search aids in pinpointing nodes with suspect activity, enhancing network monitoring and incident response capabilities</p>
quid = 5A6061546E4F619525F9A15F58816CEA
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Detecting Suspicious Domains Using Lookup Exclusion</b> using <code>index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" \
	| lookup known_good_domains.csv domain AS domain OUTPUT is_good \
	| where isnull(is_good) \
	| stats count by src

[detecting_unusual_transactions]
search_name = Detecting Unusual Transactions
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Anomaly,Detail,Fraud
solution = <p>This SPL highlights anomalous financial transactions, supporting <b>fraud detection</b> and <b>risk monitoring</b> in the Financial Services industry. <b>Suggested Actions</b></p><p>1. Investigate flagged transactions for fraud or compliance violations.<br>2. Correlate with customer and payee profiles.<br>3. Alert risk teams to significant outliers.<br>4. Integrate with transaction monitoring and AML solutions.<br>5. Review and refine detection thresholds for changing financial patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="buttercup_federal" sourcetype="banking:transactions" status="completed"</code><br>      - Selects all completed transactions in the Financial Services industry.<br><b>02</b> <code>| stats avg(amount) AS avg_amount, stdev(amount) AS stdev_amount, count AS total_transactions, dc(vendor) AS unique_payees, values(vendor) AS known_payees, values(dest_city) AS known_locations BY account_number</code><br>      - Aggregates statistics and known entities per account.<br><b>03</b> <code>| join type=left account_number [ search index="buttercup_federal" sourcetype="banking:transactions" earliest=-24h@h | fields account_number, amount, transaction_type, vendor, dest_city, device_info, timestamp, dest_ip ]</code><br>      - Joins recent transactions for comparison.<br><b>04</b> <code>| eval amount_deviation = (amount - avg_amount) / stdev_amount</code><br>      - Calculates deviation from account norm.<br><b>05</b> <code>| eval is_high_amount = if(amount > (avg_amount + 3 * stdev_amount), 1, 0)</code><br>      - Flags high outliers.<br><b>06</b> <code>| eval is_low_amount = if(amount < (avg_amount - 3 * stdev_amount), 1, 0)</code><br>      - Flags low outliers.<br><b>07</b> <code>| eval known_payees_str = mvjoin(known_payees, ",")</code><br>      - Prepares payees for string comparison.<br><b>08</b> <code>| eval known_locations_str = mvjoin(known_locations, ",")</code><br>      - Prepares locations for string comparison.<br><b>09</b> <code>| eval is_new_payee = if(match(known_payees_str, vendor), 0, 1)</code><br>      - Flags new payees.<br><b>10</b> <code>| eval is_new_location = if(match(known_locations_str, dest_city), 0, 1)</code><br>      - Flags new locations.<br><b>11</b> <code>| eval transaction_count = total_transactions</code><br>      - Alias for clarity.<br><b>12</b> <code>| where is_high_amount=1 OR is_low_amount=1 OR is_new_payee=1 OR is_new_location=1</code><br>      - Filters for anomalies.<br><b>13</b> <code>| eval avg_amt = round(avg_amount, 2)</code><br>      - Rounds averages.<br><b>14</b> <code>| eval stddev_amt = round(stdev_amount,2)</code><br>      - Rounds standard deviation.<br><b>15</b> <code>| eval amt_dev = round(amount_deviation,2)</code><br>      - Rounds deviation.<br><b>16</b> <code>| table account_number, amount, avg_amt, stddev_amt, amt_dev, is_high_amount, is_low_amount, vendor, is_new_payee, dest_city, is_new_location, timestamp, dest_ip, device_info</code><br>      - Formats output.<br><b>17</b> <code>| sort -amount</code><br>      - Sorts by amount.
explanation = <p>This SPL analyzes completed transactions to calculate average and standard deviation of transaction amounts per account, tracks unique payees and destinations, and checks for new or anomalous activity. In the Financial Services sector, this method is essential for <b>fraud detection</b>, <b>AML compliance</b>, and <b>risk scoring</b>. By flagging significant deviations, new payees, and locations, the search enables financial security teams to react quickly to suspicious or high-risk behavior. Junior analysts learn the importance of aggregation, normalization, string operations, and anomaly filtering to protect financial assets and meet regulatory obligations.</p>
quid = 300900FF97C164DFB72A21C69BF68E88
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_blank">Splunk Docs: stats command</a><br>How to aggregate and summarize transaction data in Splunk.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Discussions on financial anomaly detection and AML.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Practical fraud detection guidance for Financial Services teams.</li><li><a href="https://splunkbase.splunk.com/app/3435/" target="_blank">SplunkBase: Security Essentials</a><br>Prebuilt anomaly and fraud monitoring for Financial Services.</li></ul>
description = <p>Summarizes <b>Detecting Unusual Transactions</b> using <code>index="*" sourcetype="*" status="completed"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="*" sourcetype="*" status="completed"\
	| stats avg(amount) AS avg_amount, stdev(amount) AS stdev_amount, count AS total_transactions, dc(vendor) AS unique_payees, values(vendor) AS known_payees, values(dest_city) AS known_locations BY account_number\
	| join type=left account_number \
	[ search index="*" sourcetype="*" earliest=-24h@h | fields account_number, amount, transaction_type, vendor, dest_city, device_info, timestamp, dest_ip ]\
	| eval amount_deviation = (amount - avg_amount) / stdev_amount\
	| eval is_high_amount = if(amount > (avg_amount + 3 * stdev_amount), 1, 0)\
	| eval is_low_amount = if(amount < (avg_amount - 3 * stdev_amount), 1, 0)\
	| eval known_payees_str = mvjoin(known_payees, ",")\
	| eval known_locations_str = mvjoin(known_locations, ",")\
	| eval is_new_payee = if(match(known_payees_str, vendor), 0, 1)\
	| eval is_new_location = if(match(known_locations_str, dest_city), 0, 1)\
	| eval transaction_count = total_transactions\
	| where is_high_amount=1 OR is_low_amount=1 OR is_new_payee=1 OR is_new_location=1\
	| eval avg_amt = round(avg_amount, 2)\
	| eval stddev_amt = round(stdev_amount,2)\
	| eval amt_dev = round(amount_deviation,2)\
	| table account_number, amount, avg_amt, stddev_amt, amt_dev, is_high_amount, is_low_amount, vendor, is_new_payee, dest_city, is_new_location, timestamp, dest_ip, device_info\
	| sort -amount

[detecting_url_length_outliers_with_box_plots_in_web_traffic_logs]
search_name = Detecting URL Length Outliers with Box Plots in Web Traffic Logs
