search_author = Splunk Works
description = <p>Summarizes <b>Search Head Resources</b> using <code>index="_introspection" sourcetype=splunk_resource_usage component IN (Hostwide, IOStats) | rename data.* as * | eval cpu</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
