execution_plan = <b>01</b> <code>index=_introspection sourcetype=splunk_resource_usage</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Identifies primary data source for introspection metrics<br><b>02</b> <code>| eval sid = 'data.search_props.sid'</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Extracts search ID for unique identification<br><b>03</b> <code>| bin _time span=10s</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Groups data into 10-second intervals<br><b>04</b> <code>| stats dc(sid) AS distinct_search_count by _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Captures distinct search counts for each interval<br><b>05</b> <code>| timechart span=10s avg(distinct_search_count) AS avg_search_concurrency</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Displays average search concurrency<br><b>06</b> <code>| eval avg_search_concurrency = round(avg_search_concurrency, 2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Standardizes the field for readability<br><b>07</b> <code>| streamstats current=false last(avg_search_concurrency) AS prev_average</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Tracks and compares with the previous average<br><b>08</b> <code>| eval "change in average" = if(isnull(prev_average), 0, avg_search_concurrency - prev_average)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Computes change in concurrency trends<br><b>09</b> <code>| table _time "change in average"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Summarizes key insights in a tabular format<br>
explanation = <p>This search delivers clear insights into the rate of change in search concurrency patterns to highlight potential trends or anomalies. By leveraging Splunks <b>_introspection index</b>, it ensures you get a real-time understanding of search concurrency. It uses <b>eval</b> to handle precise calculations, <b>streamstats</b> for historical context, and <b>timechart</b> for trending analysis.</p><p>Operationally, this search is particularly valuable in anticipating future capacity needs, troubleshooting unexpected search behavior, and understanding the impact of changes to searches or user load on the platform. Splunk admins can use this to handle alerts for spikes and dips in concurrency.</p><p>Beyond this, the use of <b>streamstats</b> and <b>timechart</b> aids junior engineers in learning how to trend and correlate time-series data for anomaly detection and reporting. The added focus on evaluating change-block transitions provides deep diagnostics.</p>
quid = 1F8D5E9B4A7C2E1F6D9B5A8F3E7C4D2A
search_author = Splunk Works
description = <p>Summarizes <b>Concurrency Change Trend</b> using <code>index=_introspection sourcetype=splunk_resource_usage component=PerProcess data.search_props.role=head data.search_props</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_introspection sourcetype=splunk_resource_usage component=PerProcess data.search_props.role=head data.search_props.sid::* | eval sid = 'data.search_props.sid' | bin _time span=10s | stats dc(sid) AS distinct_search_count by _time | timechart span=10s avg(distinct_search_count) as avg_search_concurrency | eval avg_search_concurrency = round(avg_search_concurrency, 2) | streamstats current=f last(avg_search_concurrency) as prev_average | eval "change in average" = if(isnull(prev_average), 0, avg_search_concurrency - prev_average) | table _time "change in average"

