solution = <p>This search provides visibility into Splunk indexing pipeline health by monitoring queue sizes.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor for sustained high queue sizes indicating bottlenecks.<br><b>2.</b> Set alerts when queue sizes exceed normal thresholds.<br><b>3.</b> Correlate queue spikes with data ingestion patterns.<br><b>4.</b> Use findings to optimize indexer parallelization settings.<br><b>5.</b> Plan capacity upgrades based on queue size trends.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=_internal source=*metrics.log group=queue <br />- This line is specifying the data source. It's looking at the internal Splunk logs, specifically the 'metrics.log' file, and filtering for entries related to the 'queue' group.</ul><ul><b>02</b> (name=parsingqueue OR name=indexqueue OR name=typingqueue OR name=aggqueue) <br />- This line is further filtering the data. It's only looking at entries where the 'name' field is either 'parsingqueue', 'indexqueue', 'typingqueue', or 'aggqueue'.</ul><ul><b>03</b> | timechart avg(current_size) by name <br />- This line is creating a timechart. It's calculating the average 'current_size' of each queue (as specified by the 'name' field) over time.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to <b>monitor</b> the performance of different queues in Splunk. By tracking the average size of these queues over time, you can identify any potential bottlenecks or performance issues. For example, if the 'indexqueue' is consistently larger than the others, it may indicate that your indexing process is <b>slower</b> than your data ingestion rate.</div></div>
quid = A2E7604CC113B852798A22FC43B74A58
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/show-indexing-queue-sizes" target="_blank">https://gosplunk.com/show-indexing-queue-sizes</a></p>
description = <p>Summarizes <b>Average Size of Selected Queues Over Time</b> using <code>index=_internal source=*metrics.log group=queue (name=parsingqueue OR name=indexqueue OR name=typingqueue OR name=aggque</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal source=*metrics.log group=queue (name=parsingqueue OR name=indexqueue OR name=typingqueue OR name=aggqueue)\
	| timechart avg(current_size) by name

[show_searches_with_details_who_when_what]
