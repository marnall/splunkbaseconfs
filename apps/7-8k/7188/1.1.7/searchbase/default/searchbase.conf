[identifying_unusual_login_behavoir]
search_name = Identifying Unusual Login Behavoir
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Banking,Detail,Fraud
solution = <p>This SPL surfaces anomalous banking logins, supporting <b>fraud detection</b> and rapid response in Financial Services. <b>Suggested Actions</b></p><p>1. Alert on high-risk financial account activity.<br>2. Cross-reference new logins with industry threat intelligence.<br>3. Review flagged financial logins for fraud.<br>4. Integrate with financial compliance workflows.<br>5. Update normalization as patterns change in the Financial Services sector.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="buttercup_ad" sourcetype="banking:logins"</code><br>      - Selects banking login events within the Financial Services industry.<br><b>02</b> <code>| stats values(location) AS known_locations values(device) AS known_devices BY account_number</code><br>      - Compiles historical login locations/devices per financial account.<br><b>03</b> <code>| join type=left account_number [ search index="buttercup_ad" sourcetype="banking:logins" earliest=@d | fields account_number location device timestamp ip ]</code><br>      - Joins to today's login attempts.<br><b>04</b> <code>| eval location=trim(lower(location)), device=trim(lower(device))</code><br>      - Normalizes location/device fields.<br><b>05</b> <code>| eval known_locations=mvmap(known_locations, trim(lower(x)))</code><br>      - Normalizes historical location values.<br><b>06</b> <code>| eval known_devices=mvmap(known_devices, trim(lower(x)))</code><br>      - Normalizes historical device values.<br><b>07</b> <code>| eval is_new_location=if(isnull(known_locations) OR mvfind(known_locations, location) == -1, 1, 0)</code><br>      - Detects new login location.<br><b>08</b> <code>| eval is_new_device=if(isnull(known_devices) OR mvfind(known_devices, device) == -1, 1, 0)</code><br>      - Detects new login device.<br><b>09</b> <code>| where is_new_location=1 OR is_new_device=1</code><br>      - Filters for new/unknown login sources.<br><b>10</b> <code>| table account_number, location, device, timestamp, ip</code><br>      - Output for financial review or dashboard.
explanation = <p>This search compares each financial account's current login location and device with historic values, flagging logins from <b>new locations or devices</b>. For the Financial Services industry, this supports <b>fraud detection</b>, suspicious access investigations, and industry regulatory reporting. The SPL uses <b>stats</b> to construct historical context, <b>join</b> and a subsearch for current activity, and <b>eval</b> for normalization and anomaly detection. This enables security and compliance teams in Financial Services to respond to threats, comply with regulations, and strengthen risk controls. For junior analysts in the industry, this SPL demonstrates stateful comparisons, multi-value logic, and filtering focused on Financial Services risk.</p>
quid = 8FFA27402C7551D482DAF2E2E690835B
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_blank">Splunk Docs: stats command</a><br>How to aggregate and summarize data in Splunk.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Fraud detection and financial security use cases in Splunk.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Fraud_detection_with_login_activity_analysis" target="_blank">Lantern: Fraud detection with login activity analysis</a><br>Login anomaly detection for Financial Services teams.</li><li><a href="https://splunkbase.splunk.com/app/3435/" target="_blank">SplunkBase: Security Essentials</a><br>Prebuilt fraud detection and monitoring for Financial Services.</li></ul>
description = <p>Summarizes <b>Identifying Unusual Login Behavoir</b> using <code>index="buttercup_ad" sourcetype="banking:logins"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="buttercup_ad" sourcetype="banking:logins"\
	| stats values(location) AS known_locations values(device) AS known_devices BY account_number\
	| join type=left account_number \
	[ search index="buttercup_ad" sourcetype="banking:logins" earliest=@d | fields account_number location device timestamp ip ]\
	| eval location=trim(lower(location)), device=trim(lower(device))\
	| eval known_locations=mvmap(known_locations, trim(lower(x)))\
	| eval known_devices=mvmap(known_devices, trim(lower(x)))\
	| eval is_new_location=if(isnull(known_locations) OR mvfind(known_locations, location) == -1, 1, 0)\
	| eval is_new_device=if(isnull(known_devices) OR mvfind(known_devices, device) == -1, 1, 0)\
	| where is_new_location=1 OR is_new_device=1\
	| table account_number, location, device, timestamp, ip

[iis_404_errors]
search_name = Count of 404 Errors Over Time in IIS Logs
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,GoSplunk
solution = <p>This search provides visibility into 404 error trends on your IIS web server, helping identify broken resources or potential security probing.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate spikes in 404 errors to identify broken links or missing resources.<br><b>2.</b> Review URI patterns in 404 requests to detect potential reconnaissance activity.<br><b>3.</b> Fix broken links or implement redirects for moved resources.<br><b>4.</b> Monitor trends over time to ensure website functionality remains optimal.<br><b>5.</b> Consider alerting on sudden increases in 404 errors as a potential security indicator.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="ms:iis:default" status=404</code><br>       - Filter IIS logs for events with HTTP status code 404 (Not Found).<br><b>02</b> <code>| timechart count</code><br>       - Aggregate 404 error counts over time for trend visualization.<br>
explanation = <p>This search filters IIS logs to identify HTTP 404 status codes, which indicate that requested resources were not found. The <code>timechart</code> command aggregates these events over time, providing visibility into patterns of failed requests. Tracking 404 errors helps identify broken links, misconfigured URLs, or potential reconnaissance activity by attackers probing for vulnerabilities.</p>
quid = 0D17021BAE5CCA016E1167D6BF31859A
search_author = GoSplunk: Ronald (Access42)
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/iis-404-errors" target="_blank">https://gosplunk.com/iis-404-errors</a></p>
description = <p>This search identifies the <b>frequency</b> of <b>404 errors</b> within IIS logs over time. Monitoring these errors is <b>essential</b> for understanding failed resource access attempts and ensures website <b>functionality</b>.</p>
search = index="<<index>>" sourcetype="ms:iis:default" status=404\
	| timechart count

[iis_indicators_of_directory_traversal_rfi_and_lfi]
search_name = IIS Logs: Non-JS Requests with Suspicious URI Queries
version = 2.x
date_created = 2023-10-05
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = GoSplunk
solution = <p>By running this query, you gain insights into suspicious web traffic that could signify security threats such as directory traversal or file inclusion attacks targeting your IIS environment. Identifying and responding to such patterns helps mitigate risks of unauthorized data access or code execution.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the identified suspicious requests to confirm potential threats.<br><b>2.</b> Cross-check client IP addresses against threat intelligence or blocklists to determine malicious intent.<br><b>3.</b> Validate whether affected URIs lead to unauthorized actions on the server.<br><b>4.</b> Strengthen input validation and URL filtering mechanisms to prevent further exploit attempts.<br><b>5.</b> Investigate any patterns indicating systematic attempts and consider blocking sources or adjusting firewall rules for enhanced security.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="ms:iis:default"</code><br>       - Filters logs from the specified IIS sources.<br><b>02</b> <code>NOT ("cookie.js" OR "script.js")</code><br>       - Excludes typical JavaScript-related requests to avoid noise in results.<br><b>03</b> <code>(referer="-" OR referer="")</code><br>       - Focuses on requests with missing 'referer' fields (potential indirect connection attempts).<br><b>04</b> <code>(uri_query="*passwd*" OR uri_query="*cmd*" OR uri_query="*%00*" OR uri_query="*.txt*")</code><br>       - Filters for suspicious URI patterns often used in exploit attempts.<br><b>05</b> <code>| table _time, clientip, status, uri_query</code><br>       - Tabulates results for analysis, listing date/time, client IPs, status codes, and query strings.</p>
explanation = <p>This search leverages IIS logs to identify requests that could signify <b>potential security threats</b>. It highlights URIs with patterns commonly associated with attacks such as <b>directory traversal</b> (e.g., searching for sensitive files like password files), <b>remote file inclusion</b> (e.g., attempts to execute remote scripts), and <b>local file inclusion</b> (e.g., accessing local resources via vulnerabilities). By excluding JavaScript-related traffic (like cookie.js or script.js), this search narrows its focus to examine potentially more suspicious query strings found in requests where the 'referer' field is missing or empty. This analysis aids in uncovering overlooked patterns that may signify compromised endpoints, unauthenticated exploitation, or otherwise malicious activity targeting the web server environment.</p>
quid = CC60E0F4E99085F7620163DE0D8D8CA2
search_author = GoSplunk: Ronald (Access42)
related_info = <p><a href="https://gosplunk.com/iis-indicators-directory-traversal-rfi-lfi" target="_blank">https://gosplunk.com/iis-indicators-directory-traversal-rfi-lfi</a></p>
description = <p>Summarizes <b>IIS Logs: Non-JS Requests with Suspicious URI Queries</b> using <code>index="<<index>>" sourcetype="ms:iis:default"NOT ("cookie.js" OR "script.js") AND (referer="-" OR referer="") AND (uri_q</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="ms:iis:default"NOT ("cookie.js" OR "script.js") AND (referer="-" OR referer="") AND (uri_query="*passwd*" OR uri_query="*cmd*" OR uri_query="*%00*" OR uri_query="*.txt*") \
	| table _time, clientip, status, uri_query

[iis_response_time_avg]
search_name = Average Response Time for IIS URL
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,GoSplunk
solution = <p>By visualizing and analyzing average URL response times on your IIS server, you can achieve proactive server monitoring. This insight enables you to identify and resolve performance issues like slow-loading pages or server overload.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify URLs with the highest average response times for optimization.<br><b>2.</b> Configure dynamic alerts for response time thresholds to catch anomalies early.<br><b>3.</b> Analyze long-term trends to assess the impact of changes to server configurations.<br><b>4.</b> Evaluate server load balancing or scaling strategies where needed.<br><b>5.</b> Regularly monitor other related performance metrics to ensure consistent upkeep.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=iis (insertIISurl)</code><br>       - Retrieve IIS server logs for the given index and focus on a specific URL or pattern.<br><b>02</b> <code>| eval time_taken = time_taken/1000</code><br>       - Convert the response time field from milliseconds to seconds by dividing by 1000.<br><b>03</b> <code>| stats avg(time_taken) AS "Average Response Time"</code><br>       - Calculate the average value of the converted response time field for effective performance analysis.<br>
explanation = <p>This search is essential for web server administrators or IT operations teams who need an understanding of IIS server performance. The query searches IIS logs to extract response times for specific URLs. The <code>eval</code> command converts raw 'time_taken' values from milliseconds to seconds, enhancing readability. Subsequently, the <code>stats avg</code> command calculates the average response time, providing a concise metric of server responsiveness.</p>
quid = 6930BCCBAC1615CB750854D82AE4F0D8
search_author = GoSplunk: kharris
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/iis-response-time" target="_blank">https://gosplunk.com/iis-response-time</a></p>
description = <p>This query analyzes IIS server logs to monitor the <b>performance</b> of server-hosted URLs. By calculating the average response time, it helps to uncover potential <b>performance bottlenecks</b> or areas requiring optimization. This approach ensures proactive <b>performance management</b> of IIS servers.</p>
search = index="<<index>>" sourcetype=iis (insertIISurl)\
	| eval time_taken = time_taken/1000\
	| stats avg(time_taken) AS "Average Response Time"

