category = Splunk
sub_category = _internal
tags = Access,Apps
solution = <p>This search provides a detailed inventory of enabled non-core apps within Splunk, facilitating asset maintenance and optimization.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Use the table to review non-core apps and identify candidates for updates or removal.<br> \
<b>2.</b> Cross-reference app versions with vendor documentation to ensure compatibility with your Splunk environment.<br> \
<b>3.</b> Investigate unused or rarely used apps to optimize resource allocation.<br> \
<b>4.</b> Regularly export the inventory for reporting and compliance purposes.<br> \
<b>5.</b> Update or disable identified apps via the Splunk Web interface or automation tools as necessary.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/apps/local</code><br>       - Pulls data on all installed apps from the <code>/services/apps/local</code> endpoint.<br> \
	<b>02</b> <code>| search disabled=0 core=0</code><br>       - Filters for apps that are both enabled (<code>disabled=0</code>) and non-core (<code>core=0</code>).<br> \
	<b>03</b> <code>| table label title version</code><br>       - Formats the final output into a user-friendly table showing the app label, title, and version.<br>
explanation = <p>By using the <b>REST</b> command, this search communicates with the <code>/services/apps/local</code> endpoint to pull details on all installed apps. A filter is applied to include only <b>enabled</b> apps (<code>
disabled=0</code>) that are not classified as <b>core Splunk apps</b> (<code>core=0</code>). These core apps come preinstalled, so they are excluded to concentrate on non-core solutions added by users or third parties.</p> \
	<p>The culminating step organizes the results in a table format, displaying the <b>label</b>, <b>title</b>, and <b>version</b> of each app, allowing administrators to make informed decisions about app maintenance, updates, or removals. This approach encourages Splunk environment optimization, reduces unnecessary resource consumption, and strengthens app lifecycle management.</p>
quid = 99AE94151D8D0C7088A7356FE9EF50B7
search_author = GoSplunk: ccloutier
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-of-installed-non-core-applications" target="_blank">https://gosplunk.com/list-of-installed-non-core-applications</a></p>
description = <p>Summarizes <b>List of Enabled Non-Core Apps with Details</b> using <code>| rest /services/apps/local</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest /services/apps/local\
