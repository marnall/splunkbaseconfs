solution = <p>This search serves as a **core utility** for monitoring search head performance metrics. Operational teams can use the outputs to build dashboards tracking resource usage, set alerts for potential bottlenecks, and plan scaling or rebalancing activities based on observed trends.</p><p><b>Suggested Actions</b><br><b>1.</b> Create dashboards visualizing host-specific CPU, memory, and disk I/O trends.<br><b>2.</b> Use alerts to notify admins when resource usage exceeds thresholds.<br><b>3.</b> Compare metrics across different search heads to identify underperforming nodes.<br><b>4.</b> Overlay resource metrics with search activity to analyze correlation between system load and user actions.<br><b>5.</b> Prepare insights for capacity planning and scaling decisions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index="_introspection" sourcetype=splunk_resource_usage component IN (Hostwide, IOStats)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Fetches resource usage metrics from the Splunk introspection index for Hostwide and IOStats components.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Simplifies internal field names by removing "data." prefix for better readability.<br><b>03</b> <code>| eval cpu=cpu_system_pct+cpu_user_pct</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates total CPU usage as the sum of system and user CPU percentages.<br><b>04</b> <code>| stats latest(cpu) as cpu latest(mem_used) as mem_used latest(reads_kb_ps) as reads_kb_ps latest(writes_kb_ps) as writes_kb_ps latest(reads_ps) as reads_ps latest(writes_ps) as writes_ps by _time host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates metrics (CPU, memory, and disk I/O) by host and time for visualization and analysis.<br>
explanation = <p>This search leverages introspection data (index=_introspection) to retrieve **resource utilization** from search heads. It renames internal fields for clarity and calculates total CPU usage by adding system and user CPU percentages. The search applies **statistical aggregation** to generate up-to-date metrics for **CPU**, **memory**, and **disk I/O** (e.g., read/write throughput).</p><p>The value lies in its ability to consistently monitor and uncover resource bottlenecks or irregularities, empowering administrators to take proactive measures for resource scaling and optimization. It also provides a foundational template for creating higher-level operational dashboards and alerts.</p><p>For less experienced Splunkers, this query demonstrates the importance of resource introspection in performance monitoring and highlights best practices: **renaming for readability**, **eval for enrichment**, and **stats** for efficient aggregation over time.</p>
