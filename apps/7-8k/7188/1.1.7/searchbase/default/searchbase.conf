execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="iis" (NOT date_wday=saturday) (NOT date_wday=sunday)</code><br>       - This step filters IIS logs, excluding weekends (Saturday and Sunday), to focus on weekday web activity.<br><b>02</b> <code>| stats count(JSESSIONID) as Value</code><br>       - Counts the occurrences of the 'JSESSIONID' field, representing total sessions, and labels this count as "Value".<br><b>03</b> <code>| eval Metric="Total Hits on Weekdays"</code><br>       - Labels the total session count (Value) as 'Total Hits on Weekdays'.<br><b>04</b> <code>| append[ search sourcetype="iis" (NOT date_wday=saturday) (NOT date_wday=sunday) | stats dc(JSESSIONID) as Value | eval Metric="Total Visits on Weekdays"]</code><br>       - Adds another result set where 'Value' reflects distinct visits (unique JSESSIONIDs), labeled as 'Total Visits on Weekdays'.<br><b>05</b> <code>| append[ search sourcetype="iis" (NOT date_wday=saturday) (NOT date_wday=sunday) JSESSIONID=* | stats dc(JSESSIONID) as count by date_wday | stats avg(count) as Value by date_wday | eval Value=round(Value) | top limit=1 Value | eval Metric = "Average Number of Visits per day on Weekdays"]</code><br>       - Calculates the average number of unique visits per weekday, selecting the highest value, and labels it 'Average Number of Visits per day on Weekdays'.<br><b>06</b> <code>| append[ search sourcetype="iis" (NOT date_wday=saturday) (NOT date_wday=sunday) JSESSIONID=* | stats count(JSESSIONID) as count by date_wday | stats avg(count) as Value by date_wday | eval Value=round(Value) | top limit=1 Value | eval Metric = "Average Number of Hits per day on Weekdays"]</code><br>       - Computes the average number of hits per weekday, selecting the highest value, and labels it as 'Average Number of Hits per day on Weekdays'.<br><b>07</b> <code>| fieldformat Value=tostring(Value,"commas")</code><br>       - Converts the 'Value' field to a formatted string with commas for better readability.<br><b>08</b> <code>| fields - count, percent</code><br>       - Removes unnecessary fields 'count' and 'percent'.<br><b>09</b> <code>| fields Metric, Value</code><br>       - Ensures only the relevant fields, 'Metric' and 'Value', are included in the final output.<br>
explanation = <p>Understanding web traffic patterns during weekdays is <b>fundamental</b> for effective capacity and resource planning. This search offers <b>actionable insights</b> into total hits, unique visits, and their averages. By excluding weekends, it ensures the analysis focuses on business-relevant activity. Each SPL component is tailored to process IIS logs to derive meaningful metrics:</p> \
	<p><b>| stats count(JSESSIONID)</b> provides a sum of sessions, acting as a proxy for total traffic.<br><b>| stats dc(JSESSIONID)</b> calculates unique sessions, offering a view into discrete visitor metrics.<br><b>Append</b> functions consolidate multiple layers of analysis into a single result set for convenience.<br>The rounding and formatting commands improve data readability and usability for decision-making.</p>
quid = D6F4201267C2562434A369DB1DB477C2
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
description = <p>Summarizes <b>Weekday Website Traffic Analysis</b> using <code>index="<<index>>" sourcetype="iis" (NOT date_wday=saturday) (NOT date_wday=sunday)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="iis" (NOT date_wday=saturday) (NOT date_wday=sunday)\
	| stats count(JSESSIONID) as Value\
	| eval Metric="Total Hits on Weekdays"\
	| append[ search sourcetype="iis" (NOT date_wday=saturday) (NOT date_wday=sunday)\
	| stats dc(JSESSIONID) as Value\
	| eval Metric="Total Visits on Weekdays"]\
	| append[ search sourcetype="iis" (NOT date_wday=saturday) (NOT date_wday=sunday) JSESSIONID=*\
	| stats dc(JSESSIONID) as count by date_wday\
	| stats avg(count) as Value by date_wday\
	| eval Value=round(Value)\
	| top limit=1 Value\
	| eval Metric = "Average Number of Visits per day on Weekdays"]\
	| append[ search sourcetype="iis" (NOT date_wday=saturday) (NOT date_wday=sunday) JSESSIONID=*\
	| stats count(JSESSIONID) as count by date_wday\
	| stats avg(count) as Value by date_wday\
	| eval Value=round(Value)\
	| top limit=1 Value\
	| eval Metric = "Average Number of Hits per day on Weekdays"]\
	| fieldformat Value=tostring(Value,"commas")\
	| fields - count, percent\
	| fields Metric, Value

