execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security</code><br>       - Searches Windows Security Event Log entries in the selected index.<br><b>02</b> <code>(Logon_Type=2 OR Logon_Type=7 OR Logon_Type=10)</code><br>       - Filters results to events with specific logon types like interactive, unlock, or remote interactive.<br><b>03</b> <code>(EventCode=4625 OR EventCode=529 OR EventCode=530 OR EventCode=531 OR EventCode=532 OR EventCode=533 OR EventCode=534 OR EventCode=535 OR EventCode=536 OR EventCode=537 OR EventCode=539)</code><br>       - Targets event codes corresponding to various types of failed logons.<br><b>04</b> <code>| timechart count(EventCode) as count</code><br>       - Charts the count of failed logon events over time.<br><b>05</b> <code>| eventstats avg(count) as Average</code><br>       - Calculates and appends the average count to provide benchmarks.<br><b>06</b> <code>| eval average=round(average,0)</code><br>       - Rounds the calculated average to the nearest integer for readability.<br><b>07</b> <code>| rename count as "Failed Logons"</code><br>       - Renames the event count field for improved clarity in the output.<br>
explanation = <p>This search establishes visibility into failed logon attempts by leveraging event data from the Windows Security Event Log. It identifies specific event codes associated with failed logons and filters for relevant logon types, such as interactive, unlock, and remote interactive sessions.</p><p>The SPL uses commands like <code>timechart</code> to create a time-based visualization of occurrences. The <code>eventstats</code> command computes the average number of failures for context, and <code>eval</code> ensures that averages are displayed clearly by rounding them. The <code>rename</code> command enhances the output's clarity by renaming the count field to 'Failed Logons'.</p><p>This query is critical for identifying unusual spikes in failed logon attempts, which might indicate an active attack or credential misuse, and aids investigations into systemic or user-specific authentication issues.</p>
