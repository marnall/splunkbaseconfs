execution_plan = <b>01</b> <code>index="_introspection" sourcetype=splunk_resource_usage component IN (Hostwide, IOStats)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- This step narrows the search to specific components in the introspection logs.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Renames data fields for easier handling and analysis.<br><b>03</b> <code>| eval cpu=cpu_system_pct+cpu_user_pct</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Combines system and user CPU percentages to calculate the total CPU usage.<br><b>04</b> <code>| stats latest(cpu) as cpu latest(mem_used) as mem_used latest(reads_kb_ps) as reads_kb_ps latest(writes_kb_ps) as writes_kb_ps latest(reads_ps) as reads_ps latest(writes_ps) as writes_ps by _time host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Aggregates the latest metrics for resource usage by time and host.<br>
explanation = <p>This base search gathers comprehensive resource utilization data from indexers by analyzing introspection logs for hostwide metrics and I/O statistics. It computes total CPU usage by adding values from system and user components, tracks memory consumption, and monitors disk I/O performance such as read/write throughput rates and operation counts. These metrics offer insights into how well resources are allocated and enable the identification of potential bottlenecks in the indexing tier.</p><p>The insights derived from this search enable efficient capacity planning by providing a clear picture of resource utilization patterns over time. In addition, it helps optimize the indexing infrastructure, ensuring that it operates seamlessly under varying workloads.</p><p>Junior Splunk engineers can learn how to integrate resource usage fields using <b>rename</b> and calculate derived metrics with <b>eval</b>. They can also appreciate the use of <b>stats latest</b> for capturing the most up-to-date metrics by host.</p>
