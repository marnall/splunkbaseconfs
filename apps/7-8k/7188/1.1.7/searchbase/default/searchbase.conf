execution_plan = <b>01</b> <code>| rest /services/data/transforms/managed_lookups</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Uses REST API to retrieve metadata about managed lookup files in Splunk.<br><b>02</b> <code>| search filename=*asset* OR filename=*identities*</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters data to include only asset and identity-specific lookups.<br><b>03</b> <code>| fields filename,splunk_server,count,size,description</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extracts relevant fields to display key metadata for lookup health monitoring.<br>
explanation = <p>This search provides visibility into Enterprise Security asset and identity lookup configurations by querying the REST API for managed lookup files containing asset or identity data. These lookups are critical for ES context enrichment, threat intelligence, and risk scoring. By displaying file counts, sizes, and descriptions, administrators can monitor lookup population health, identify unexpectedly small or empty lookups that may indicate collection issues, detect large lookups that may impact search performance, and verify that asset and identity data is being properly maintained across all search heads in the cluster.</p><p>For Splunk engineers, this search highlights the usage of the <b>REST API</b> for querying metadata, focusing on fields like <b>filename</b> (to filter assets and identity-specific lookups), <b>splunk_server</b> (to ensure cluster-wide monitoring), and <b>count</b> and <b>size</b> (to gauge health metrics). By leveraging REST commands, analysts can extend this methodology to other Splunk configurations and metadata insights, such as saved searches or knowledge objects.</p>
