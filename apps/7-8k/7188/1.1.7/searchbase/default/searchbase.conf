execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=<<index>>' - This specifies the index from which the data is being retrieved. The actual index name would replace 'index'.</ul><ul><b>02</b> sourcetype=apache:access' - This specifies that the data should come from the 'apache:access' sourcetype. This sourcetype typically contains Apache web server access logs.</ul><ul><b>03</b> http_method=POST' - This is looking for events where the HTTP method is POST. POST is a request method supported by HTTP used by the client to submit a block of data to be processed to a specified resource.</ul><ul><b>04</b> request=*{ :;};* OR request=*/bin/*' - This is looking for requests that either contain the pattern '*{ :;};*' or the pattern '*/bin/*'. These patterns are often associated with malicious activity.}</ul></ol></div></div>
