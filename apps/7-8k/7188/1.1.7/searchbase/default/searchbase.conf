category = Splunk
sub_category = _internal
tags = Search Optimization,Suspicious Traffic
solution = <p>Analyzing outbound traffic on port 1337 can help identify potential exfiltration activity. It's critical to process data across all network logs efficiently to ensure no unusual activity is missed, given its implications on network <b>security</b>.</p><p><b>Suggested Actions</b><br><b>1.</b> Regularly monitor results for unexpected spikes in traffic volume.<br><b>2.</b> Correlate findings with other indicators of compromise.<br><b>3.</b> Review firewall rules to ensure port 1337 is appropriately managed.<br><b>4.</b> Investigate identified IPs for unauthorized access.<br><b>5.</b> Utilize the Threat Hunter's Cookbook for advanced threat detection methodologies.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>The use of <b>tstats</b> simplifies the process of querying indexed fields and leveraging existing data models, making it efficient for large-scale data analysis. The <b>summariesonly</b> parameter restricts the search to summary indexing, which accelerates data retrieval tasks. By aiming at specific network traffic attributes, such as <b>dest_port</b>, this search assists in rapidly pinpointing suspicious outbound connections, essential for rigorous threat detection.</p>
quid = 77450A66B5ADD611F90AF5F3FDEEBA5E
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Detecting Outbound Traffic on Port 1337 Across Network Logs</b> using <code>| tstats count summariesonly=true from datamodel=Network_Traffic</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>| tstats count summariesonly=true from datamodel=Network_Traffic</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>02</b> <code>sort - count</code><br>       - Sort the results so the highest-priority rows appear first.<br>
search = | tstats count summariesonly=true from datamodel=Network_Traffic \
	where All_Traffic.dest_port=1337 \
	by All_Traffic.src_ip All_Traffic.dest_ip \
	| sort - count

