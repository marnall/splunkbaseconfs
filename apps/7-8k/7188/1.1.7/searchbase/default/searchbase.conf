[utilizing_tstats_for_page_views_within_apache_web_logs]
search_name = Monthly View Count for Access Combined Sourcetype
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This query provides visibility into <b>monthly web traffic trends</b>, enabling administrators to understand usage patterns and plan for resource scaling.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor monthly views to identify peak traffic periods and seasonal trends.<br><b>2.</b> Use insights to optimize server capacity and content delivery.<br><b>3.</b> Correlate traffic changes with marketing campaigns or site updates.<br><b>4.</b> Set baselines for normal traffic to detect anomalies.<br><b>5.</b> Share traffic metrics with stakeholders for business planning and reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| tstats count as hits</code><br>       - Using the <b>tstats</b> function, this command counts the number of events and names that count "hits".<br><b>02</b> <code>where index="&lt;&lt;index&gt;&gt;" sourcetype="access_combined"</code><br>       - Filters the data to a specific index and sourcetype "access_combined".<br><b>03</b> <code>by _time</code><br>       - Groups the results by the timestamp field.<br><b>04</b> <code>| timechart span=1month sum(hits) as Views</code><br>       - Creates a timechart with a 1-month span and sums the hits, labeling the result as "Views".<br>
explanation = <p>This query uses the powerful <b>tstats</b> function to deliver fast and efficient data queries. It counts the number of hits within a predefined index with the sourcetype "access_combined", enabling organizations to track usage patterns. By grouping results with the <code>by _time</code> clause and visualizing with <b>timechart</b>, admins and analysts can identify long-term trends, such as monthly peaks and dips in web traffic.</p><p>The methods employed in the SPL ensure that the query runs efficiently, taking advantage of summary data when available to accelerate performance. Understanding these trends can help drive decisions around content optimization, server scaling, or targeted user engagement campaigns.</p>
quid = C34BF605BBB1EB7441EAC3260D9B2FD8
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/utilizing-tstats-for-page-views-within-apache-web-logs" target="_blank">https://gosplunk.com/utilizing-tstats-for-page-views-within-apache-web-logs</a></p>
description = <p><b>Count the number of hits</b> in a specified index with the sourcetype <b>'access_combined'</b>. This search groups hits by time and creates a monthly timechart, summing hits to represent <b>view counts</b>. The results can reveal usage spikes, traffic trends, and user behavior over time.</p>
search = | tstats summariesonly=t count as hits where index="<<index>>" sourcetype="access_combined" by _time\
	| timechart span=1month sum(hits) as Views

