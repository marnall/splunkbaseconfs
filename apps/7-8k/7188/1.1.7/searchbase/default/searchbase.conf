[extract_searches_from_splunk_search_jobs_through_rest]
search_name = Extract Searches from Splunk Search Jobs Through Rest
date_created = 2024-1-28 13:30:51
date_updated = 2024-1-28 13:30:51
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Searching
solution = <p>This search provides visibility into Splunk search job activity and health.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify long-running or failed searches for optimization.<br><b>2.</b> Monitor disk usage to prevent storage issues.<br><b>3.</b> Track search patterns by user and app for governance.<br><b>4.</b> Create alerts for zombie or stuck searches.<br><b>5.</b> Use findings to optimize search head performance.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services</a><br>Cisco Services.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
env_run = 2
execution_plan = <b>01</b> <code>| rest /servicesNS/-/-/search/jobs splunk_server=*</code><br>       - Query the REST API for all search jobs across servers.<br><b>02</b> <code>| rename eai:acl.* AS * ...</code><br>       - Normalize field names for easier analysis.<br><b>03</b> <code>| eval provenance = case(...)</code><br>       - Categorize search origin (scheduler, subsearch, REST, etc.).<br><b>04</b> <code>| eval status = case(...)</code><br>       - Determine human-readable status from dispatch state.<br><b>05</b> <code>| rex ... | dedup | search | table</code><br>       - Clean messages, remove duplicates, and format output.<br>
explanation = <p>This search uses the REST API to query active and recent search jobs across all Splunk servers. It normalizes field names for easier analysis, categorizes searches by provenance (scheduler, subsearch, REST, etc.), and determines their current status. The <code>rex</code> commands clean up error messages, and <code>dedup</code> removes duplicate optimized searches to provide a clear view of search activity.</p>
quid = FDD7A6152E1383E5ED7A79F576C71E22
search_author = akhamis
updated_author = akhamis
description = <p>This search <b>extracts</b> detailed information about search activities within Splunk using the <b>REST API</b>. It is designed to provide insights into how searches are <b>executed</b> and <b>managed</b>, helping users understand operational trends and <b>issues</b> related to search jobs.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = | rest /servicesNS/-/-/search/jobs splunk_server=* \
	| rename eai:acl.* AS * \
	| rename eai:* AS * \
	| rename request.* AS request_*, runtime.* AS runtime_*, messages.* AS *_messages, searchEarliestTime AS search_et, searchLatestTime AS search_lt, runDuration AS total_run_time, *Count AS *_count, owner AS user, label AS savedsearch_name, search* AS * \
	| eval savedsearch_name = if(isnotnull(savedSearchLabel) AND savedSearchLabel!="" , savedsearch_name, null()) \
	| eval provenance = case ( match(sid,"subsearch_scheduler"), "subsearch_scheduler", isnotnull(savedsearch_name) OR match(sid,"_scheduler_"), "scheduler", match(sid,"subsearch_nested"), "subsearch_nested", match(sid,"subsearch_"), "subsearch", match(sid,"\d{10}\.\d{5}") AND isnull('request_provenance') ,"REST:Search", true(), provenance) \
	| eval status = case ( match(error_messages, "cancelled"), "Cancelled", isFinalized = "1", "Finalized", isZombie = "1", "Zombie", dispatchState = "RUNNING", "Running", dispatchState = "PARSING", "Parsing", dispatchState = "DONE", "Completed", dispatchState = "PAUSED", "Paused", dispatchState = "QUEUED", "Queued", dispatchState = "FAILED", "Failed", dispatchState = "FINALIZING", "Finalizing", true(), Upper(dispatchState)) \
	| rex field=error_messages mode=sed "s/\[.*\]\s+//g" \
	| rex field=fatal_messages mode=sed "s/\[.*\]\s+//g" \
	| rex field=error_messages mode=sed "s/^The limit has been reached for log messages in info.*//g" \
	| dedup optimizedSearch \
	| search app="*" provenance="*" savedsearch_name="*" \
	| table splunk_server provenance request_provenance app user savedsearch_name diskUsage status

[extract_sql_insert_params]
search_name = MySQL Insert Query Analysis with Timechart
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Middleware
sub_category = Database Server
tags = Access,SFU
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'index=<<index>> sourcetype=stream:mysql* query=insert into*' part is specifying the data source. It's looking in the specified index for events with a sourcetype of 'stream:mysql*' and a query field that starts with 'insert into'.</ul><ul><b>02</b> The 'rex insert into S* ((?<aaa>[^)]+)) values ((?<bbb>[^)]+))' command is using a regular expression to extract the column names (aaa) and values (bbb) from the insert statements.</ul><ul><b>03</b> The 'rex mode=sed field=bbb s///g' command is removing any escaped quotes from the values.</ul><ul><b>04</b> The 'makemv aaa delim=, | makemv bbb delim=,' commands are splitting the column names and values into multivalue fields, using a comma as the delimiter.</ul><ul><b>05</b> The 'eval a_kvfield = mvzip(aaa, bbb)' command is creating a new field that pairs each column name with its corresponding value.</ul><ul><b>06</b> The 'extract jam_kv_extract' command is extracting fields from the a_kvfield field.</ul><ul><b>07</b> The 'timechart span=1s per_second(m_value) by m_name' command is creating a timechart that shows the number of insertions per second for each column.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to <b>monitor</b> the rate of data insertion into a MySQL database. It can help identify periods of <b>high activity</b>, which might indicate a problem or an opportunity for optimization.</div></div>
quid = ACCAC272E4FC2D4C1237D9F976DD6993
search_author = grdhg24
updated_author = khutchinson
description = <p>This query is <b>looking</b> for MySQL <b>insert queries</b> in the specified index.</p> \
	<p>It <b>extracts the column names and values</b> from the insert statements, <b>removes any escaped quotes</b> from the values, and then creates a timechart showing the number of insertions per second for each column.</p>
solution = <p>This query is looking for MySQL insert queries in the specified index. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>"\
	sourcetype=stream:mysql* query="insert into*"\
	| rex "insert into \S* \((?<aaa>[^)]+)\) values \((?<bbb>[^)]+)\)"\
	| rex mode=sed field=bbb "s/\\\\"//g"\
	| makemv aaa delim=","\
	| makemv bbb delim=","\
	| eval a_kvfield = mvzip(aaa, bbb)\
	| extract jam_kv_extract\
	| timechart span=1s per_second(m_value) by m_name

