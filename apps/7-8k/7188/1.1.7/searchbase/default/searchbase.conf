related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Detect Unencrypted Passwords via Passwd Field Extraction</b> using <code>index="<<index>>" sourcetype=stream:http</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=stream:http</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>rex field=form_data "passwd=(?<pass>\[^&+)"</code><br>       - Extract structured fields from raw text with a regular expression.<br>
search = index="<<index>>" sourcetype=stream:http \
| rex field=form_data "passwd=(?<pass>\[^&+)"

[detect_username_guessing_brute_force_attacks]
search_name = Windows Security Event Analysis: Multiple Failed Logins
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = Servers
tags = Access,Users
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=windows EventCode=4625 OR EventCode=4624</code><br>       - The search begins by targeting Windows events specific to login attempts, focusing on both failed (EventCode 4625) and successful (EventCode 4624) logins.<br><b>02</b> <code>| bin _time span=5m as minute</code><br>       - This segments the data into 5-minute intervals for temporal analysis.<br><b>03</b> <code>| rex "Security ID:\s*\w*\s*\w*\s*Account Name:\s*(?<username>.*)\s*Account Domain:"</code><br>       - Utilizes a regular expression to extract the username from the event details.<br><b>04</b> <code>| stats count(Keywords) as Attempts, count(eval(match(Keywords,"Audit Failure"))) as Failed, count(eval(match(Keywords,"Audit Success"))) as Success by minute username</code><br>       - Aggregates login attempts, categorizing them into total attempts, failures, and successes per user within each time bin.<br><b>05</b> <code>| where Failed>=4</code><br>       - Filters for bins with at least 4 failed login attempts, highlighting potential brute force activity.<br><b>06</b> <code>| stats dc(username) as Total by minute</code><br>       - Calculates the distinct count of usernames attempting logins in each time bin.<br><b>07</b> <code>| where Total>5</code><br>       - Further filters results to show only time bins where at least 6 distinct users attempted to log in.<br><br>
explanation = <p>This query detects <b>potential security threats</b> by analyzing Windows login events. It highlights patterns of repeated login failures that may represent <b>brute force attacks</b>. By organizing the data by user and time, it surfaces trends indicating unauthorized access attempts.<br><br>Technical Breakdown:<br>- <code>bin</code>: Groups events into manageable time slices.<br>- <code>rex</code>: Extracts specific fields like username for focused analysis.<br>- <code>stats</code>: Calculates aggregates to quantify login attempts and status categories (success vs. failure), allowing for comparative analysis.<br>- <code>dc</code>: Ensures insights around unique user activity, adding a layer of scrutiny.</p>
quid = 78438A8C1CBDE7DB982671AF31F26B17
search_author = GoSplunk: DaveyBoy
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/detect-username-guessing-brute-force-attacks" target="_blank">https://gosplunk.com/detect-username-guessing-brute-force-attacks</a></p>
description = <p>Summarizes <b>Windows Security Event Analysis: Multiple Failed Logins</b> using <code>index="<<index>>" sourcetype=windows EventCode=4625 OR EventCode=4624</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query monitors successful and failed login attempts on Windows systems, grouping attempts by user and time and identifying cases with more than 4 failures per user in a 5-minute window. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/synthetic-monitoring.html" target="_blank">Products: Splunk Synthetic Monitoring</a><br>Splunk Synthetic Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index="<<index>>" sourcetype=windows EventCode=4625 OR EventCode=4624\
	| bin _time span=5m as minute\
	| rex "Security ID:\s*\w*\s*\w*\s*Account Name:\s*(?<username>.*)\s*Account Domain:"\
	| stats count(Keywords) as Attempts, count(eval(match(Keywords,"Audit Failure"))) as Failed, count(eval(match(Keywords,"Audit Success"))) as Success by minute username\
	| where Failed>=4\
	| stats dc(username) as Total by minute\
	| where Total>5

[detecting_brute_force_logins]
search_name = Detecting Brute Force Logins
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Bruteforce,Detail,Fraud
solution = <p>This SPL flags accounts with multiple failed followed by successful transfers, signaling brute force or repeated attempts. <b>Suggested Actions</b></p><p>1. Investigate flagged accounts for credential or authorization brute force.<br>2. Correlate with login and session activity.<br>3. Alert risk or fraud teams.<br>4. Integrate with brute force detection dashboards.<br>5. Refine thresholds as attack patterns evolve.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Selects all banking transfer transactions.<br><b>02</b> <code>| where transaction_type="transfer"</code><br>      - Filters for transfer activity.<br><b>03</b> <code>| convert timeformat="%Y/%m/%d %H:%M:%S" ctime(epoch) AS c_time</code><br>      - Formats timestamps.<br><b>04</b> <code>| streamstats time_window=1h count(eval(status="failed")) AS denied_count count(eval(status="completed")) AS "authorized_count" latest(status) AS latest_action BY account_number,dest_account_number</code><br>      - Tracks denied and authorized transfer counts per account pair.<br><b>05</b> <code>| where denied_count >=5 and authorized_count >=1 and latest_action="completed"</code><br>      - Flags brute force followed by success.<br><b>06</b> <code>| table timestamp, account_number, dest_account_number, amount, denied_count, authorized_count</code><br>      - Outputs review fields.<br><b>07</b> <code>| eval amount=tostring(round(amount, 2),"commas")</code><br>      - Formats the amount.
explanation = <p>This SPL focuses on transfer transactions, formats times and amounts, and uses <b>streamstats</b> in a 1-hour window to count failed and authorized transfers and capture the latest action for each account and destination. Accounts with at least 5 failed attempts and one completed transfer are flagged for review. The query outputs key details for monitoring, risk, or fraud analysis.</p>
quid = 0B8BA44F68FBD2BCA86BCDC3A943DBA5
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/streamstats" target="_blank">Splunk Docs: streamstats command</a><br>Tracking failed and successful attempts in time windows.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/table" target="_blank">Splunk Docs: table command</a><br>Formatting results for review.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Brute force and repeated attempt detection.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Best practices for transaction brute force monitoring.</li></ul>
description = <p>Summarizes <b>Detecting Brute Force Logins</b> using <code>index="*" sourcetype="*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="*" sourcetype="*"\
	| where transaction_type="transfer"\
	|convert timeformat="%Y/%m/%d %H:%M:%S" ctime(epoch) AS c_time\
	|streamstats time_window=1h count(eval(status="failed")) AS denied_count count(eval(status="completed")) AS "authorized_count" latest(status) AS latest_action BY account_number,dest_account_number\
	|where denied_count >=5 and authorized_count >=1 and latest_action="completed"\
	|table timestamp, account_number, dest_account_number, amount, denied_count, authorized_count\
	|eval amount=tostring(round(amount, 2),"commas")

[detecting_first_time_users_connecting_to_a_new_domain]
search_name = Detecting First-Time Users Connecting to a New Domain
version = 1.0.6
date_created = 2025-05-12 10:38:10
