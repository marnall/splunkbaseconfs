[identify_data_exfiltration_via_random_dns_subdomain_activity]
search_name = Identify Data Exfiltration via Random DNS Subdomain Activity
version = 1.0.4
date_created = 2025-05-05 13:24:42
date_updated = 2025-7-2 15:36:36
category = Threat Hunter's Cookbook
sub_category = Combined methods
tags = DNS,Subdomain Analysis
solution = <p>Detecting abnormal DNS activity can significantly bolster your organization’s security posture, as attackers often leverage DNS for covert data exfiltration. This search pinpoints abuse patterns, enabling incident responders to act swiftly against malicious domains.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any domains flagged by this search for signs of malicious activity.<br><b>2.</b> Correlate flagged domains with external threat intelligence feeds to identify known indicators of compromise.<br><b>3.</b> Monitor network traffic associated with highlighted domains for additional anomalies.<br><b>4.</b> If malicious intent is confirmed, block suspicious domains at the DNS server level.<br><b>5.</b> Refine detection thresholds based on ongoing observations and emerging threat patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>This search uses a series of SPL commands and macros to uncover DNS subdomain patterns indicative of potential data exfiltration attempts. The <b>`ut_parse(query)`</b> macro parses DNS queries to extract subdomains, while <b>`ut_shannon(ut_subdomain)`</b> measures entropy, helping to detect randomness or irregularity in subdomains. An <code>eval</code> function calculates the length of each subdomain for further statistical analysis. Using <b>stats</b>, the search aggregates data per domain, calculating averages and deviations for both entropy and subdomain lengths. Finally, specific thresholds are applied (<code>avg_sha > 3</code>, <code>avg_sublen > 20</code>, and <code>stdev_sublen < 2</code>) to highlight potential abuse. This technique provides actionable insights into detecting DNS-based exfiltration attempts.</p>
quid = 8625B9362BBA8E0B2B2FE178DB32E41F
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Identify Data Exfiltration via Random DNS Subdomain Activity</b> using <code>index="<<index>>" sourcetype=stream:dns</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=stream:dns</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>`ut_parse(query)</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>03</b> <code>`ut_shannon(ut_subdomain)</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>04</b> <code>eval sublen=len(ut_subdomain)</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>05</b> <code>stats count avg(ut_shannon) as avg_sha avg(sublen) as avg_sublen stdev(sublen) as stdev_sublen by ut_domain</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>06</b> <code>search avg_sha > 3 avg_sublen > 20 stdev_sublen < 2</code><br>       - Search the target data and apply the base filters needed for this use case.<br>
search = index="<<index>>" sourcetype=stream:dns \
	| `ut_parse(query)` \
	| `ut_shannon(ut_subdomain)` \
	| eval sublen=len(ut_subdomain) \
	| stats count avg(ut_shannon) as avg_sha avg(sublen) as avg_sublen stdev(sublen) as stdev_sublen by ut_domain \
	| search avg_sha > 3 avg_sublen > 20 stdev_sublen < 2

[identify_fields_and_sample_values_for_scoping_hunts]
search_name = Identify Fields and Sample Values for Scoping Hunts
