solution = <p>This SPL highlights credit card accounts with outlier spending after inactivity.</p><p><b>Suggested Actions</b></p><p>1. Review flagged accounts for fraud or misuse.<br>2. Correlate with other account activity or alerts.<br>3. Alert compliance or risk teams.<br>4. Integrate with monitoring dashboards.<br>5. Refine inactivity or value thresholds as patterns change.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Selects all credit card transactions.<br><b>02</b> <code>| stats sum(amount) AS total_spent first(_time) AS timestamp first(previous_tx_date) AS previous_date BY account_number</code><br>      - Aggregates spend and key dates per account.<br><b>03</b> <code>| where (('timestamp' > relative_time(strptime(previous_date,"%m/%d/%Y %H:%M:%S"),"+6mon")) AND (total_spent > 3000))</code><br>      - Flags long-inactive, high-spending accounts.<br><b>04</b> <code>| eval total_spent=tostring(round(total_spent,2),"commas")</code><br>      - Formats the total spend.
explanation = <p>This SPL aggregates total spend and key dates for each account, then filters for accounts where the first transaction timestamp is more than six months after the previous transaction and total spending exceeds $3,000. It formats the total spend for clarity. This method helps identify accounts with <b>unusual</b> or sudden spending surges after long inactivity—potential indicators of <b>fraud</b> or account misuse. The SPL demonstrates the use of <b>stats</b> for aggregation, <b>where</b> for temporal and value-based filtering, and <b>eval</b> for formatting.</p>
quid = 9E40D6583576415A62BF24D989C1A114
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_blank">Splunk Docs: stats command</a><br>Aggregating and summarizing transaction data.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/where" target="_blank">Splunk Docs: where command</a><br>Filtering based on time and value.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Credit card outlier detection topics.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Outlier spending and inactivity monitoring.</li></ul>
description = <p>Flags credit card accounts with total spending above $3,000 and a current transaction at least six months after the last previous transaction. Surfaces outlier spending patterns for <b>review</b> and <b>monitoring</b>.</p>
search = index="*" sourcetype="*"\
	| stats sum(amount) AS total_spent first(_time) AS timestamp first(previous_tx_date) AS previous_date BY account_number\
	| where (('timestamp' > relative_time(strptime(previous_date,"%m/%d/%Y %H:%M:%S"),"+6mon")) AND (total_spent > 3000))\
	| eval total_spent=tostring(round(total_spent,2),"commas")

