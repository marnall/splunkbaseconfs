search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/weekend-user-activity" target="_blank">https://gosplunk.com/weekend-user-activity</a></p>
description = <p>Summarizes <b>Weekend Security Events Count by Account and Day</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (date_wday=saturday OR date_wday=sunday)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (date_wday=saturday OR date_wday=sunday)\
	| stats count by Account_Name, date_wday

