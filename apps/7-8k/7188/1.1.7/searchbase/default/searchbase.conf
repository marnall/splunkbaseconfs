search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| eval file_length=len(file) \
	| where file_length < 4

[usb_and_removable_media_detection]
search_name = USB Device Registry Creation Events by Date, Host, Vendor, and Product
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = Servers
tags = Access,GoSplunk
solution = <p>Monitoring <b>USB device activity</b> through Windows Registry events is critical for detecting unauthorized data transfers and potential security breaches.</p><p><b>Suggested Actions</b><br><b>1.</b> Review detected USB devices to ensure they are authorized for use on your network.<br><b>2.</b> Investigate any unknown or suspicious device vendors or products.<br><b>3.</b> Establish policies for USB device usage and monitor for violations.<br><b>4.</b> Correlate USB activity with user login events for accountability.<br><b>5.</b> Consider implementing device control solutions to restrict unauthorized USB access.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'index=<<index>> sourcetype=WinRegistry' part specifies the data source and type. It's looking for data from the specified index where the source type is 'WinRegistry'.</ul><ul>eval Date=strftime(_time, %Y/%m/%d %H:%M:%S)' is converting the event timestamp into a more readable format.</ul><ul>fields - count' is removing the count field from the results.</ul><ul>key_path=HKLMsystemcontrolset*enumusbstor* registry_type=CreateKey' is filtering the data to only include CreateKey events related to USB storage devices in the Windows Registry.</ul><ul>rex key_path.*usbstorS(?<DeviceType>.*)&venS(?<Vendor>.*)&prodS(?<Product>S*)&revS' is using regular expressions to extract the device type, vendor, and product information from the key path.</ul><ul>sort - Date' is sorting the results in descending order by date.}</ul><ul>stats count by Date, host, Vendor, Product, DeviceType' is counting the number of occurrences for each combination of date, host, vendor, product, and device type.</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor and investigate the usage of USB storage devices on a network. It can help identify unauthorized or suspicious device usage, which could indicate a potential security threat.</div></div>
quid = CE0CE19F861C78FAF1DAAC29D956F81D
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/usb-and-removable-media-detection" target="_blank">https://gosplunk.com/usb-and-removable-media-detection</a></p>
description = <p>This query is searching for Windows Registry CreateKey events related to USB storage devices.</p> \
	<p>It extracts the date, host, vendor, product, and device type information from these events, counts the number of occurrences, and then sorts the results in descending order by date.</p>
search = index="<<index>>" sourcetype=WinRegistry key_path="HKLM\\system\\\controlset*\\\enum\\\usbstor\\\\*" registry_type=CreateKey\
	| eval Date=strftime(_time, "%Y/%m/%d %H:%M:%S")\
	| rex "key_path.*usbstor\s(?<DeviceType>.*)&ven\s(?<Vendor>.*)&prod\s(?<Product>\s*)&rev\s"\
	| stats count by Date, host, Vendor, Product, DeviceType\
	| fields - count\
	| sort - Date

[use_rest_to_gather_index_info]
search_name = Index Data Overview with Event Count and Frozen Time
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexes
solution = <p>This query offers <b>key operational insights</b> into Splunk's index utilization and health. By translating technical metrics into a digestible format, it empowers administrators to take data-driven actions to optimize storage and performance.</p> \
	<p><b>Suggested Actions</b><br><b>1.</b> Regularly monitor frozen time period thresholds to ensure retention policies align with organizational compliance standards.<br><b>2.</b> Use current database size metrics to predict and plan for future storage requirements before reaching capacity.<br><b>3.</b> Analyze total event counts to detect anomalies or trends in data ingestion rates.<br><b>4.</b> Evaluate minTime and maxTime to verify that indexes are accurately capturing the intended data timeframes.<br><b>5.</b> Investigate and address any indexes showing disproportionate or unexpected usage patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/data/indexes</code><br>       - Accesses index-related information using the Splunk REST API endpoint.<br><b>02</b> <code>| eval currentDBSizeMB=tostring(currentDBSizeMB, "commas")</code><br>       - Enhances readability of the current database size by converting it to a string format with commas.<br><b>03</b> <code>| eval totalEventCount=tostring(totalEventCount, "commas")</code><br>       - Converts event count data into a user-friendly string format with commas.<br><b>04</b> <code>| eval frozenTimePeriodInHours=(frozenTimePeriodInSecs/60/60)</code><br>       - Calculates the frozen time period in hours for better clarity on data retention configurations.<br><b>05</b> <code>| table title splunk_server currentDBSizeMB frozenTimePeriodInHours maxTime minTime totalEventCount</code><br>       - Presents data in an easily interpretable tabular format for quick assessment of index health.<br>
explanation = <p>This search leverages the 'rest' command to query the Splunk REST API endpoint for index data information, providing visibility into key metrics like database size, event counts, and frozen time thresholds. The query employs the 'tostring' function through multiple 'eval' commands to convert large numerical values into comma-separated strings for easier readability. Additionally, it calculates the frozen time period in hours (from seconds) to enhance interpretability.</p> \
	<p>The final step formats the data into a structured table, making it easy to compare storage utilization, event activity, and timeline boundaries across indices. This is especially valuable for space management, compliance checks, and ensuring critical Splunk performance thresholds aren't breached. Data displayed includes title, Splunk server, database size, frozen time (in hours), the earliest and latest index timestamps, and total events.</p>
quid = D97DDC46FD63408D4B187C1C94079335
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
description = <p>Summarizes <b>Index Data Overview with Event Count and Frozen Time</b> using <code>| rest /services/data/indexes</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | rest /services/data/indexes\
	| eval currentDBSizeMB=tostring(currentDBSizeMB, "commas")\
	| eval totalEventCount=tostring(totalEventCount, "commas")\
	| eval frozenTimePeriodInHours=(frozenTimePeriodInSecs/60/60)\
	| table title splunk_server currentDBSizeMB frozenTimePeriodInHours maxTime minTime totalEventCount

[use_tstats_to_find_hosts_no_longer_sending_data_1]
search_name = Latest Data Ingestion Time Exceeding One Hour by Index, Sourcetype, Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This query is vital for ensuring <b>continuous data flow</b> into Splunk by identifying and addressing inactive data sources.</p> \
<p><b>Suggested Actions</b><br><b>1.</b> Investigate inactive data sources or hosts identified in the results.<br> \
<b>2.</b> Check corresponding logs or endpoint configurations for errors preventing data ingestion.<br> \
<b>3.</b> Confirm network connectivity and Splunk forwarder health for affected data sources.<br> \
<b>4.</b> Review index capacity and ensure no system bottlenecks are blocking data flow.<br> \
<b>5.</b> Set up alerts or dashboards for ongoing monitoring of data sources to prevent future issues.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| tstats summariesonly=t latest(_time) as lt by index, sourcetype, host</code><br>       - Extracts the latest event time for each <b>index, sourcetype,</b> and <b>host</b>.<br> \
	<b>02</b> <code>| eval NOW=now()</code><br>       - Creates a field <b>NOW</b> to capture the current time.<br> \
	<b>03</b> <code>| eval difftime=NOW-lt</code><br>       - Calculates the <b>difference</b> in seconds between now and the latest event time.<br> \
	<b>04</b> <code>| where difftime>=3600</code><br>       - Filters to show <b>inactive hosts/sources</b> where the difference exceeds 3600 seconds.<br>
explanation = <p>This query provides <b>actionable insights</b> into your Splunk environment's data ingestion pipeline, helping to detect <b>inactive data sources</b>. By checking the time when data was last received for each <b>index, sourcetype,</b> and <b>host</b>, you can pinpoint hosts or data streams that may be <b>failing to send data</b>. This is useful for identifying potential <b>ingestion failures</b> impacting operational data.</p> \
	<p>The query uses:</p> \
	<ul><li><b>tstats</b>: For <b>efficiently</b> retrieving latest event statistics by index, sourcetype, and host.</li> \
	<li><b>eval</b>: To create a <b>current timestamp</b> field (`NOW`) and calculate the <b>time difference</b> (`difftime`).</li> \
	<li><b>where</b>: To filter results where no event data has been ingested for over <b>3600 seconds</b> (1 hour).</li></ul>
quid = 66B5F57F776CBEC1D35201407D981E60
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/use-tstats-to-find-hosts-no-longer-sending-data" target="_blank">https://gosplunk.com/use-tstats-to-find-hosts-no-longer-sending-data</a></p><br><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/tstats" target="_blank">Splunk Help: tstats command</a><br>Official Splunk documentation for this topic.</p>
description = <p>This query identifies the <b>latest event time</b> for each combination of <b>index, sourcetype,</b> and <b>host</b>.</p> \
	<p>It calculates the time difference between <b>now</b> and the latest event time, then filters to show only data sources that have been inactive for over <b>one hour</b>.</p>
search = | tstats summariesonly=t latest(_time) as lt by index, sourcetype, host\
	| eval NOW=now()\
	| eval difftime=NOW-lt\
	| where difftime>=3600

[use_tstats_to_find_hosts_no_longer_sending_data_2]
search_name = Latest Data Ingestion Time Analysis by Index, Sourcetype, and Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This query enables effective monitoring of <b>data ingestion freshness</b> by categorizing hosts and sourcetypes based on how recently they have sent data. This helps maintain visibility into data pipeline health.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate sources categorized as 'Greater than 1 Week' for potential data pipeline issues.<br><b>2.</b> Review hosts in the '1-7 Days' category to determine if they are expected to be inactive.<br><b>3.</b> Use this data to establish baselines for expected data ingestion frequencies.<br><b>4.</b> Set up alerts for hosts or sourcetypes that move into longer time ranges.<br><b>5.</b> Correlate findings with infrastructure changes or maintenance windows.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| tstats summariesonly=t latest(_time) as lt by index, sourcetype, host</code><br>       - Retrieves the latest timestamp of events for each combination of index, sourcetype, and host.<br><b>02</b> <code>| eval NOW=now()</code><br>       - Computes the current time and assigns it to the 'NOW' field.<br><b>03</b> <code>| eval difftime=NOW-lt</code><br>       - Calculates the difference between the current time and the latest event time, storing it in 'difftime'.<br><b>04</b> <code>| rangemap field=difftime "0 - 60 Min"=0-3600 "1 - 24 Hours"=3601-86400 "1-7 Days"=86401-604800 default="Greater than 1 Week"</code><br>       - Categorizes the 'difftime' field into specified time ranges to identify the freshness of data ingestion.<br>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to <b>monitor</b> data ingestion in real time. It can help identify if there are any delays or issues with data ingestion from specific sources, as it provides a breakdown of the time since the last event for each source. The 'tstats' command efficiently pulls the latest event time, and the 'eval' command computes <b>time differences</b>, while 'rangemap' categorizes these differences into predefined <b>time ranges</b> for easier analysis.</div></div>
quid = E0D4236D547BCB3E0BC14F8E28DB6574
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/use-tstats-to-find-hosts-no-longer-sending-data" target="_blank">https://gosplunk.com/use-tstats-to-find-hosts-no-longer-sending-data</a></p><br><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/tstats" target="_blank">Splunk Help: tstats command</a><br>Official Splunk documentation for this topic.</p>
description = <p>Summarizes <b>Latest Data Ingestion Time Analysis by Index, Sourcetype, and Host</b> using <code>| tstats summariesonly=t latest(_time) as lt by index, sourcetype, host</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | tstats summariesonly=t latest(_time) as lt by index, sourcetype, host\
	| eval NOW=now()\
	| eval difftime=NOW-lt\
	| rangemap field=difftime "0 - 60 Min"=0-3600 "1 - 24 Hours"=3601-86400 "1-7 Days"=86401-604800 default="Greater than 1 Week"

[use_tstats_to_find_hosts_no_longer_sending_data_3]
search_name = Latest Event Time Difference from Now by Index, Sourcetype, and Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This query provides essential visibility into <b>data source activity</b>, enabling proactive identification of hosts or sourcetypes that have stopped sending data.</p><p><b>Suggested Actions</b><br><b>1.</b> Review hosts with large time differences to identify potential ingestion failures.<br><b>2.</b> Check forwarder health and connectivity for hosts not sending data.<br><b>3.</b> Verify that expected data sources are active and properly configured.<br><b>4.</b> Use this search to build monitoring dashboards for data pipeline health.<br><b>5.</b> Set up alerts for hosts exceeding acceptable data latency thresholds.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| tstats summariesonly=t latest(_time) as lt by index, sourcetype, host</code><br>       - The 'tstats' command retrieves statistical data from indexed data. Here, it fetches the latest event time ('lt') grouped by index, sourcetype, and host.<br><b>02</b> <code>| eval NOW=now()</code><br>       - The 'eval' command creates a new field called 'NOW', representing the current epoch time.<br><b>03</b> <code>| eval difftime=NOW-lt</code><br>       - Another 'eval' command computes the time difference ('difftime') between the current time ('NOW') and the latest event timestamp ('lt').<br>
explanation = <p>This query is designed to monitor <b>data ingestion</b> in near real-time by evaluating the latest event time for each unique combination of index, sourcetype, and host. By calculating the time difference between the current epoch time and the last observed event, administrators can identify <b>delays</b> or issues in data flow.</p><p>The query extensively uses the <b>tstats</b> command, which is optimized for retrieving statistical metadata efficiently from indexed data, making it resource-friendly. The <b>eval</b> function is used to compute and derive meaningful insights, such as identifying which hosts or sourcetypes have stopped forwarding events.</p><p>Operationally, this search supports proactive troubleshooting and helps maintain the <b>health and uptime</b> of your Splunk environment by quickly pinpointing problematic data sources. Engineers and administrators can respond to gaps in indexing promptly, ensuring optimal system performance and visibility.</p>
quid = E9A2E068657FEC8C3D5CA92CBCEBA219
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/use-tstats-to-find-hosts-no-longer-sending-data" target="_blank">https://gosplunk.com/use-tstats-to-find-hosts-no-longer-sending-data</a></p><br><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/tstats" target="_blank">Splunk Help: tstats command</a><br>Official Splunk documentation for this topic.</p>
description = <p>This query identifies the <b>latest event time</b> for combinations of index, sourcetype, and host, and calculates the difference between the current time and the latest event time. This provides valuable insight into <b>data ingestion activity</b> and helps pinpoint sources that may have stopped sending data.</p>
search = | tstats summariesonly=t latest(_time) as lt by index, sourcetype, host\
	| eval NOW=now()\
	| eval difftime=NOW-lt

[user_agent_browser_details_information_for_iis]
search_name = IIS Log Analysis: Unique Sessions by Browser, Crawler, and Mobile Device
search_hidden = 0
