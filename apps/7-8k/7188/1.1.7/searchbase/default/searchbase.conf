search_name = Datamodel Acceleration Summary with Job Details
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'rest' command is used to access Splunk's REST API and retrieve information about data model summarization.</ul><ul><b>02</b> The 'eval' command is used to create new fields 'key' and 'datamodel' by replacing certain patterns in the 'title' and 'summary.id' fields.</ul><ul><b>03</b> The 'join' command is used to combine the results with information about data models retrieved from another REST API endpoint.</ul><ul><b>04</b> The 'table' command is used to select and order the fields to be displayed in the results.</ul><ul><b>05</b> The 'rename' commands are used to change the names of certain fields for clarity.</ul><ul><b>06</b> The 'sort' command is used to order the results by the 'datamodel' field.</ul><ul><b>07</b> The 'fields' command is used to add certain fields to the results.</ul><ul><b>08</b> Another 'join' command is used to combine the results with information about search jobs retrieved from another REST API endpoint.</ul><ul><b>09</b> Another 'eval' command is used to calculate and format certain fields such as size, retention period, completion percentage, and run duration.</ul><ul><b>10</b> Another 'sort' command is used to order the results by the 'datamodel' field.</ul><ul><b>11</b> The final 'table' command is used to select and order the fields to be displayed in the results.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query is useful for <b>monitoring</b> and <b>troubleshooting</b> data model acceleration in Splunk. It can help identify issues such as long run times, large sizes, or errors that may be impacting the <b>performance</b> of data model acceleration.</div></div>
quid = 37054BE6627285BDB0BA867F12355274
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/data-model-acceleration-details" target="_blank">https://gosplunk.com/data-model-acceleration-details</a></p>
description = <p>This query is retrieving and formatting <b>information</b> about data model acceleration in Splunk. It provides <b>details</b> such as the data model name, application, cron schedule, retention period, earliest and latest time, completion status, size, run duration, and any errors.</p>
solution = <p>This query is retrieving and formatting information about data model acceleration in Splunk. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
search = | rest /services/admin/summarization by_tstats=t splunk_server=* count=0\
	| eval key=replace(title,(("tstats:DM_".'eai:acl.app')."_"),""), datamodel=replace('summary.id',(("DM_".'eai:acl.app')."_"),"")\
	| join type=left key\
	[\
	| rest /services/data/models splunk_server=* count=0\
	| table title, "acceleration.cron_schedule", "eai:digest"\
	| rename title as key\
	| rename "acceleration.cron_schedule" as cron]\
	| table datamodel, "eai:acl.app", "summary.access_time", "summary.is_inprogress", "summary.size", "summary.latest_time", "summary.complete", "summary.buckets_size", "summary.buckets", cron, "summary.last_error", "summary.time_range", "summary.id", "summary.mod_time", "eai:digest", "summary.earliest_time", "summary.last_sid", "summary.access_count"\
	| rename "summary.id" as summary_id, "summary.time_range" as retention, "summary.earliest_time" as earliest, "summary.latest_time" as latest, "eai:digest" as digest\
	| rename "summary.*" as "*", "eai:acl.*" as "*"\
	| sort datamodel\
	| rename access_count as "Datamodel_Acceleration.access_count", access_time as "Datamodel_Acceleration.access_time", app as "Datamodel_Acceleration.app", buckets as "Datamodel_Acceleration.buckets", buckets_size as "Datamodel_Acceleration.buckets_size", cron as "Datamodel_Acceleration.cron", complete as "Datamodel_Acceleration.complete", datamodel as "Datamodel_Acceleration.datamodel", digest as "Datamodel_Acceleration.digest", earliest as "Datamodel_Acceleration.earliest", is_inprogress as "Datamodel_Acceleration.is_inprogress", last_error as "Datamodel_Acceleration.last_error", last_sid as "Datamodel_Acceleration.last_sid", latest as "Datamodel_Acceleration.latest", mod_time as "Datamodel_Acceleration.mod_time", retention as "Datamodel_Acceleration.retention", size as "Datamodel_Acceleration.size", summary_id as "Datamodel_Acceleration.summary_id"\
	| fields + "Datamodel_Acceleration.access_count", "Datamodel_Acceleration.access_time", "Datamodel_Acceleration.app", "Datamodel_Acceleration.buckets", "Datamodel_Acceleration.buckets_size", "Datamodel_Acceleration.cron", "Datamodel_Acceleration.complete", "Datamodel_Acceleration.datamodel", "Datamodel_Acceleration.digest", "Datamodel_Acceleration.earliest", "Datamodel_Acceleration.is_inprogress", "Datamodel_Acceleration.last_error", "Datamodel_Acceleration.last_sid", "Datamodel_Acceleration.latest", "Datamodel_Acceleration.mod_time", "Datamodel_Acceleration.retention", "Datamodel_Acceleration.size", "Datamodel_Acceleration.summary_id"\
	| rename "Datamodel_Acceleration.*" as "*"\
	| join type=outer last_sid\
	[\
	| rest splunk_server=* count=0 /services/search/jobs reportSearch=summarize*\
	| rename sid as last_sid\
	| fields + last_sid, runDuration]\
	| eval "size(MB)"=round((size / 1048576),1), "retention(days)"=if((retention == 0),"unlimited",round((retention / 86400),1)), "complete(%)"=round((complete * 100),1), "runDuration(s)"=round(runDuration,1)\
	| sort 100 + datamodel\
	| table datamodel, app, cron, "retention(days)", earliest, latest, is_inprogress, "complete(%)", "size(MB)", "runDuration(s)", last_error

[datamodel_search_performance]
search_name = Max Run Time of Accelerated Saved Searches in 5 Minute Intervals
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Data Models
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal sourcetype=scheduler component=SavedSplunker ACCELERATE NOT skipped run_time=*</code><br>       - This line searches the _internal index for events with the sourcetype of scheduler and the component of SavedSplunker. It identifies events where accelerations are not skipped and captures instances with a run_time field.<br><b>02</b> <code>| rex field=savedsearch_id "ACCELERATE_(?:[A-F0-9\-]{36}_)?(?<acceleration>.*?)_ACCELERATE"</code><br>       - This line uses a regular expression to extract the name of the acceleration from the savedsearch_id field.<br><b>03</b> <code>| timechart span=5m max(run_time) AS run_time by acceleration</code><br>       - This line creates a timechart with a span of 5 minutes. It displays the maximum run time for each acceleration across the specified time interval.<br>
explanation = <p>This query is designed to monitor the performance of accelerated saved searches in Splunk by evaluating their maximum run time within 5-minute intervals. By focusing on events in the _internal index with the sourcetype of <b>scheduler</b> and the component <b>SavedSplunker</b>, this search identifies specific accelerations and their performance characteristics. It specifically captures events where accelerations are not skipped, ensuring valid performance data is analyzed.</p><p>The regular expression in the <code>rex</code> command is used to extract the name of the acceleration, enabling clearer interpretation and visualization. Finally, the <code>timechart</code> command aggregates the maximum run time per acceleration, allowing users to pinpoint accelerations that exhibit prolonged execution times, which could signal underlying performance inefficiencies.</p><p>Operational insights derived from this search assist Splunk administrators in diagnosing and resolving performance bottlenecks associated with saved search accelerations. By regular monitoring, stakeholders can ensure optimal system resource utilization and reduce the likelihood of performance-related disruptions.</p>
quid = C1710DCD7F64DD433A394B4BF8E9B82C
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/datamodel-search-performance" target="_blank">https://gosplunk.com/datamodel-search-performance</a></p>
description = <p>Summarizes <b>Max Run Time of Accelerated Saved Searches in 5 Minute Intervals</b> using <code>index=_internal sourcetype=scheduler component=SavedSplunker ACCELERATE NOT skipped run_time=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query identifies and monitors the performance of accelerated saved searches in Splunk by calculating their maximum run time over 5-minute intervals. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
search = index=_internal sourcetype=scheduler component=SavedSplunker ACCELERATE NOT skipped run_time=*\
| rex field=savedsearch_id "ACCELERATE_(?:[A-F0-9\\-]{36}_)?(?<acceleration>.*?)_ACCELERATE"\
| timechart span=5m max(run_time) AS run_time by acceleration

