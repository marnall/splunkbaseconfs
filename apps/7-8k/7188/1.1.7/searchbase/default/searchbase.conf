search_name = Failed Login Attempts Analysis in 5 Minute Blocks
search_hidden = 0
category = Security
sub_category = Access
tags = GoSplunk,SecOps
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security</code><br>       - Specify source of data as Windows Security Event Log within defined index<br><b>02</b> <code>EventCode=4625</code><br>       - Filter for events representing failed login attempts<br><b>03</b> <code>eval Workstation_Name=lower(Workstation_Name)</code><br>       - Normalize the workstation name to lowercase for consistency<br><b>04</b> <code>eval host=lower(host)</code><br>       - Normalize the host field to lowercase<br><b>05</b> <code>eval hammer=_time</code><br>       - Assign event timestamp to new field 'hammer'<br><b>06</b> <code>bucket span=5m hammer</code><br>       - Categorize events into 5-minute intervals<br><b>07</b> <code>stats count sparkline by user host, hammer, Workstation_Name</code><br>       - Count events and generate sparkline for combination of user, host, and workstation<br><b>08</b> <code>rename hammer as "5 minute blocks", host as "Target Host", Workstation_Name as "Source Host"</code><br>       - Rename fields for clarity<br><b>09</b> <code>convert ctime("5 minute blocks")</code><br>       - Convert time format to human-readable<br>
explanation = <p>This query is crucial for maintaining the integrity of a Windows environment by spotting frequent failed logon attempts, which are potential indicators of security <b>breaches</b> like brute force attacks. The SPL leverages commands such as <code>eval</code> to normalize fields to lowercase, the <code>bucket</code> command to group events into 5-minute time blocks, and <code>stats count sparkline</code> to provide a visual representation of failed attempts over time. Such analyses enable IT administrators to quickly identify problematic sources and targets for further investigation.</p>
quid = D80BD0CEBED03984EFCAE7367FD48FF5
search_author = GoSplunk: SplunkNinja
related_info = <p><a href="https://gosplunk.com/failed-logon-attempts-windows" target="_blank">https://gosplunk.com/failed-logon-attempts-windows</a></p><br><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/search" target="_blank">Splunk Help: Search command reference</a><br>Official Splunk documentation for this topic.</p>
description = <p>Summarizes <b>Failed Login Attempts Analysis in 5 Minute Blocks</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4625</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query is designed to detect failed logon attempts (EventCode=4625) reported in Windows Security Event Logs. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4625 \
	| eval Workstation_Name=lower(Workstation_Name)\
	| eval host=lower(host) \
	| eval hammer=_time \
	| bucket span=5m hammer \
	| stats count sparkline by user host, hammer, Workstation_Name\
	| rename hammer as "5 minute blocks" host as "Target Host" Workstation_Name as "Source Host"\
	| convert ctime("5 minute blocks")

