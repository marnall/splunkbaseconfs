[number_of_accounts_created_in_a_windows_environment]
search_name = Windows Security Log: New Account Creation Count and Gauge
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The query starts by specifying the index and the source of the data, which is the Windows Security Event Log.</ul><ul><b>02</b> It then filters the events to only include those with an EventCode of 624 or 4720, which correspond to the creation of a new account.</ul><ul><b>03</b> The 'eval' function is used to create a new field called 'NewAccount', which is set to 'New Account Created' for these events.</ul><ul><b>04</b> The 'stats' command is then used to count the number of these 'NewAccount' events.</ul><ul><b>05</b> Finally, the 'gauge' command is used to present these counts as a gauge chart, with specified ranges of 1 to 5, 5 to 15, and 15 to 25.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to <b>monitor</b> the creation of new accounts in a Windows environment. This could be <b>valuable for security purposes</b>, to detect any unusual or unauthorized account creation activity. It filters for EventCodes 624 and 4720, indicating new account creations, and aggregates this data to provide easy-to-read visual indicators.</div></div>
quid = 7827093D9AFB8594CCD69F7D66C50C1E
search_author = GoSplunk: Go Splunk
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/number-of-accounts-created-in-a-windows-environment" target="_blank">https://gosplunk.com/number-of-accounts-created-in-a-windows-environment</a></p>
description = <p>This query is searching for events in the <b>Windows Security Event Log</b> where a <b>new account</b> has been created. It then counts the number of these events and presents them as a <b>gauge chart</b> to provide insights into account creation activities.</p>
solution = <p>This query is searching for events in the Windows Security Event Log where a new account has been created. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=624 OR EventCode=4720)\
	| eval NewAccount=case (EventCode=624, "New Account Created", EventCode=4720, "New Account Created")\
	| stats count(NewAccount) as creation\
	| gauge creation 1 5 15 25

[number_of_hosts_associated_with_a_serverclass]
search_name = Count of Hosts per Application in Deployment Server
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This search provides visibility into <b>deployment distribution</b> across your Splunk infrastructure, helping verify configurations and identify gaps.</p><p><b>Suggested Actions</b><br><b>1.</b> Verify all expected hosts are receiving correct applications.<br><b>2.</b> Investigate hosts with missing deployments.<br><b>3.</b> Review serverclass configurations for underperforming deployments.<br><b>4.</b> Monitor for changes in deployment count over time.<br><b>5.</b> Use results to audit deployment server health and configuration consistency.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/deployment/server/clients splunk_server=*</code><br>       - Accesses the REST API endpoint to retrieve deployment client information.<br><b>02</b> <code>| table hostname applications.*.serverclasses</code><br>       - Formats the information into a table with hostname and server classes.<br><b>03</b> <code>| untable hostname applications</code><br>       - Converts the table into a format usable with the rex command.<br><b>04</b> <code>| rex field=applications "applications\\.(?<apps>.+)\\.serverclasses"</code><br>       - Extracts application names from the applications field.<br><b>05</b> <code>| stats dc(hostname) as hostname by apps</code><br>       - Counts distinct hostnames for each application to determine deployments.<br>
explanation = <p>This query can be used to monitor the <b>deployment</b> of applications across different hosts. It <b>ensures visibility</b> of the distribution of applications, identifying hosts that are missing certain applications or applications not deployed to any hosts.</p>
quid = 7DF82C96462B2BD8F159AE4245ACC119
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/number-of-hosts-associated-with-a-serverclass" target="_blank">https://gosplunk.com/number-of-hosts-associated-with-a-serverclass</a></p>
description = <p>This query <b>retrieves</b> information about the deployment clients from the local Splunk server and <b>formats</b> the data into a table with the hostname and server classes for each application. It also counts the <b>distinct hostnames</b> for each application, helping to monitor deployment statuses.</p>
search = | rest /services/deployment/server/clients splunk_server=*\
	| table hostname applications.*.serverclasses\
	| untable hostname applications\
	| rex field=applications "applications\\.(?<apps>.+)\\.serverclasses"\
	| stats dc(hostname) as hostname by apps

[number_of_hosts_scanned_qualys]
search_name = Count of Unique Hosts in Qualys VM Detection Events
version = 1.0.1
