execution_plan = <b>01</b> <code>index="_introspection" source="*/resource_usage.log" sourcetype=splunk_resource_usage</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Query introspection logs to focus on resource usage.<br><b>02</b> <code>| eval sid = 'data.search_props.sid'</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Extract unique search identifiers (SIDs) for tracking active searches.<br><b>03</b> <code>| bin _time span=10s</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Group events into 10-second intervals to capture concurrency snapshots.<br><b>04</b> <code>| stats dc(sid) AS distinct_search_count by _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Calculate distinct search count during each time bin.<br><b>05</b> <code>| bin _time span=1h</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Consolidate data into hourly windows for statistical analysis.<br><b>06</b> <code>| stats max(distinct_search_count) as "Maximum Concurrency", p90(distinct_search_count) as "90th Percentile Concurrency", avg(distinct_search_count) as "Average Concurrency", min(distinct_search_count) as "Minimum Concurrency" by _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Derive comprehensive statistics for administrator decision-making.<br>
explanation = <p>This search measures actual search concurrency by sampling the number of distinct active searches every 10 seconds using introspection data. The captured data provides deeper visibility into when and how often search processes compete for resources.</p><p>Statistical values such as <b>maximum</b> and <b>90th percentile</b> are leveraged to assess load against predetermined concurrency limits (e.g., max_searches_per_cpu). These metrics illuminate periods that may necessitate adjustments in search management configurations or hardware scaling decisions.</p><p>By evaluating average and minimum values, administrators can identify opportunities to optimize slack-time usage or evaluate whether system resources are underutilized. For junior engineers, this example demonstrates the use of introspection data for monitoring and advanced aggregation techniques like <b>stats dc</b>, <b>bin</b>, and <b>p90</b>.</p>
quid = D7823286715DBF62ECC0CDE11BB6AD52
search_author = Splunk Works
description = <p>Calculates search concurrency statistics including <b>maximum</b>, <b>90th percentile</b>, <b>average</b>, and <b>minimum</b>. Provides a detailed understanding of active search overlaps to assist in capacity planning and performance adjustments.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_introspection" source="*/resource_usage.log" sourcetype=splunk_resource_usage data.search_props.sid=* | eval sid = 'data.search_props.sid' | bin _time span=10s | stats dc(sid) AS distinct_search_count by _time | bin _time span=1h | stats max(distinct_search_count) as "Maximum Concurrency", p90(distinct_search_count) as "90th Percentile Concurrency", avg(distinct_search_count) as "Average Concurrency", min(distinct_search_count) as "Minimum Concurrency" by _time limit=50

