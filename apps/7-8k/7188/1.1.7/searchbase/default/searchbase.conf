execution_plan = <b>01</b> <code>index=_internal source="*/metrics.log"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Queries metrics.log to count distinct hosts reporting metrics<br><b>02</b> <code>| bin _time span=31s</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Bins events by 31 seconds to catch brief outages<br><b>03</b> <code>| stats dc(host) as upservers by _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates distinct hosts reporting in each time bin<br><b>04</b> <code>| timechart span=1h min(upservers) as "Up Servers"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Creates timechart of minimum running servers over time intervals<br>
explanation = <p>This search provides deeper **visibility** into search head **cluster availability** by monitoring the count of search heads actively reporting metrics over time. It uses a 31-second bin with minimum aggregation to **detect even brief outages**, providing a continuous availability metric.</p><p>Drops in the server count may indicate search head **failures**, **network issues**, or planned maintenance. This visibility is critical for maintaining **SLA compliance**, detecting cluster degradation, and triggering alerts when availability falls below acceptable thresholds.</p>
