	| stats count by Relative_Target_Name, user, _time, status\
	| rename _time as Day\
	| convert ctime(Day)

[successful_linux_logons_by_username]
search_name = Count of Successful GDM Password Authentications by User
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = OS
tags = Access,Users
solution = <p>This query delivers <b>actionable insights</b> on Linux system authentication activity by analyzing successful "gdm-password" logins. These insights help detect and preempt security risks, such as compromised user accounts or unauthorized access attempts.</p><p><b>Suggested Actions</b></p><p><b>1.</b> Monitor users with unusually high login counts to assess potential misuse.<br><b>2.</b> Cross-reference identified logins with known work periods or IP geolocations.<br><b>3.</b> Confirm whether administrative users are following security protocols.<br><b>4.</b> Investigate accounts with excessive logins for signs of compromised credentials.<br><b>5.</b> Implement additional logging or security measures, like multi-factor authentication, for users with frequent logins.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=linux_secure</code><br>       - The search begins by targeting the Linux authentication logs in the specified index and sourcetype.<br><b>02</b> <code>| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s\s+\s(?<session>gdm-\w+)\s:\s"</code><br>       - Extracts the session type (e.g., "gdm-password") from log entries using a regular expression.<br><b>03</b> <code>| search session=gdm-password</code><br>       - Filters the logs to only include sessions with the "gdm-password" designation.<br><b>04</b> <code>| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s(?<hostname>\s+)\s.+\sgdm-password:auth\s:\s(?<authstatus>\w+\s\w+);\s.+user=(?<username>\s+)"</code><br>       - Extracts hostname, authentication status, and username fields from the logs.<br><b>05</b> <code>| search authstatus="authentication success"</code><br>       - Narrows the results further to only include logs where the authentication attempt was successful.<br><b>06</b> <code>| stats count by username</code><br>       - Aggregates the data by counting successful login attempts for each user.</p>
explanation = <p>This search tracks <b>user authentication</b> activity on Linux systems by analyzing "gdm-password" session logs within the specified index and sourcetype. It employs <b>regular expressions</b> to extract session information, hostname, authentication success status, and username details. The use of <b>stats</b> provides insight into login frequency for each user. This search is particularly helpful for identifying <b>unusual login patterns</b>, such as excessive successful attempts by a single user, which could indicate malicious activity or compromised credentials. Additionally, this search aids administrators in verifying system usage trends and ensuring compliance with access policies.</p>
quid = 2CAB468BCFC8019FB544D1EAB68265C5
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/successful-linux-logons-username" target="_blank">https://gosplunk.com/successful-linux-logons-username</a></p>
description = <p>Summarizes <b>Count of Successful GDM Password Authentications by User</b> using <code>index="<<index>>" sourcetype=linux_secure</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=linux_secure\
	| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s\s+\s(?<session>gdm-\w+)\s:\s"\
	| search session=gdm-password\
	| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s(?<hostname>\s+)\s.+\sgdm-password:auth\s:\s(?<authstatus>\w+\s\w+);\s.+user=(?<username>\s+)"\
	| search authstatus="authentication success"\
	| stats count by username

[successful_login_to_osx]
search_name = OSX Secure User Authentication Count by User, Host, and Date
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Endpoint
tags = Access,GoSplunk
solution = <p>This query provides operational insights into macOS user authentication patterns by surfacing the volume of authentication events per user, host, and date.</p> <p><b>Suggested Actions</b><br><b>1.</b> Investigate users or hosts with an unusually high number of authentication attempts.<br><b>2.</b> Correlate findings with known business operations to verify legitimacy.<br><b>3.</b> Review logs for suspicious patterns such as repeated failed attempts or rapid logins.<br><b>4.</b> Consult security policies if anomalous authentication activity is detected.<br><b>5.</b> Implement preventive measures or an alerting mechanism for large deviations in login activity.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=osx_secure</code><br>       - Specifies the data source, filtering for macOS authentication logs.<br> <b>02</b> <code>| rex “authinternal\sauthenticated\suser\s(?<USER>\s+)”</code><br>       - Extracts the username from logs using a regular expression.<br> <b>03</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts the event timestamp (_time) into a human-readable date format.<br> <b>04</b> <code>| stats count by USER, host, Date</code><br>       - Aggregates the count of logs per combination of user, host, and date.<br> <b>05</b> <code>| sort - count</code><br>       - Sorts the results in descending order to prioritize the most frequent log entries.<br>
explanation = <p>This query helps monitor user authentication activity on macOS systems for different hosts and dates by analyzing <b>osx_secure</b> logs. It uses a regular expression to extract the usernames, converts timestamps into a readable format, and aggregates log counts per user, host, and date. Sorting by count highlights users or hosts with the highest activity, which can aid in identifying anomalous behavior possibly indicative of <b>security events</b> or <b>misuse</b>. This insight is valuable for monitoring and responding to access-related incidents.</p>
quid = D0ABBEA0BD5F27731B3190D3832F1116
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/successful-login-to-osx" target="_blank">https://gosplunk.com/successful-login-to-osx</a></p>
description = <p>This query extracts <b>user authentication</b> data from <b>osx_secure</b> logs, calculates the count of logs per user, host, and date, and sorts the results in descending order based on count. This allows monitoring of authentication activity to identify potential <b>anomalies</b> or <b>security threats</b>.</p>
search = index="<<index>>" sourcetype=osx_secure\
	| rex “authinternal\sauthenticated\suser\s(?<USER>\s+)”\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| stats count by USER, host, Date\
	| sort - count

