[show_cron_frequency_and_scheduling_of_all_scheduled_searches]
search_name = Scheduled Saved Searches with Minimum Frequency and App Details
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Jobs
solution = <p>This query provides insights into how frequently searches are scheduled, potentially revealing inefficiencies or opportunities for staggered task execution to better manage server resources.</p><p><b>Suggested Actions</b><br><b>1.</b> Analyze the minimum frequency data to identify high-impact schedules.<br><b>2.</b> Adjust search frequencies to distribute load evenly across time.<br><b>3.</b> Examine apps with high-frequency schedules for potential optimization.<br><b>4.</b> Schedule searches during low-traffic periods to reduce system load.<br><b>5.</b> Review and disable any unnecessary or redundant scheduled searches.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services</a><br>Cisco Services.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest splunk_server=* "/servicesNS/-/-/saved/searches/" 
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor and manage scheduled tasks in Splunk. It helps in understanding the frequency of different tasks and can be used to optimize the scheduling of tasks to avoid system overload. <p>The query utilizes commands such as 'rest' to gather information from the Splunk server, 'search' to filter scheduled and active searches, and 'eval' to break down the cron schedule into its components. This allows administrators to make informed decisions about <b>task management</b> and <b>resource allocation</b>.</p></div></div>
quid = 19375471A3CAB3F5243F39E172832675
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/show-cron-frequency-and-scheduling-of-all-scheduled-searches" target="_blank">https://gosplunk.com/show-cron-frequency-and-scheduling-of-all-scheduled-searches</a></p>
description = <p>Summarizes <b>Scheduled Saved Searches with Minimum Frequency and App Details</b> using <code>| rest splunk_server=* "/servicesNS/-/-/saved/searches/"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest splunk_server=* "/servicesNS/-/-/saved/searches/" 
disabled=0"\
	| fields title, cron_schedule, eai:acl.app\
	| rename title as savedsearch_name\
	| eval pieces=split(cron_schedule, " ")\
	| eval c_min=mvindex(pieces, 0), c_h=mvindex(pieces, 1), c_d=mvindex(pieces, 2), c_mday=mvindex(pieces, 3), c_wday=mvindex(pieces, 4)\
	| eval c_min_div=if(match(c_min, "/"), replace(c_min, "^.*/(\d+)$", "\1"), null())\
	| eval c_mins=if(match(c_min, ","), split(c_min, ","), null())\
	| eval c_min_div=if(isnotnull(c_mins), abs(tonumber(mvindex(c_mins, 1)) - tonumber(mvindex(c_mins, 0))), c_min_div)\
	| eval c_hs=if(match(c_h, ","), split(c_h, ","), null())\
	| eval c_h_div=case (match(c_h, "/"), replace(c_h, "^.*/(\d+)$", "\1"), isnotnull(c_hs), abs(tonumber(mvindex(c_hs, 1)) - tonumber(mvindex(c_hs, 0))), 1=1, null())\
	| eval c_wdays=if(match(c_wday, ","), split(c_wday, ","), null())\
	| eval c_wday_div=case (match(c_wday, "/"), replace(c_wday, "^.*/(\d+)$", "\1"), isnotnull(c_wdays), abs(tonumber(mvindex(c_wdays, 1)) - tonumber(mvindex(c_wdays, 0))), 1=1, null())\
	| eval i_m=case (c_d < 29, 86400 * 28, c_d = 31, 86400 * 31, 1=1, null())\
	| eval i_h=case (isnotnull(c_h_div), c_h_div * 3600, c_h = "*", null(), match(c_h, "^\d+$"), 86400)\
	| eval i_min=case (isnotnull(c_min_div), c_min_div * 60, c_min = "*", 60, match(c_min, "^\d+$"), 3600)\
	| eval i_wk=case (isnotnull(c_wday_div), c_wday_div * 86400, c_wday = "*", null(), match(c_wday, "^\d+$"), 604800)\
	| eval cron_minimum_freq=case (isnotnull(i_m), i_m, isnotnull(i_wk) AND isnotnull(c_min_div), i_min, isnotnull(i_wk) AND isnull(c_min_div), i_wk, isnotnull(i_h), i_h, 1=1, min(i_min))\
	| fields - c_d c_h c_hs c_h_div c_mday c_min c_min_div c_mins c_wday c_wdays c_wday_div pieces i_m i_min i_h i_wk\
	| fields savedsearch_name cron_minimum_freq cron_schedule eai:acl.app

[show_how_much_disk_space_is_used_by_internal]
search_name = Top Daily Host and Source Type by License Usage
version = 1.0.1
date_updated = 2024-02-04 12:43:50
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Performance
solution = <p>The search provides insight into which hosts or source types are consuming the most licenses, facilitating better resource management and cost control.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the hosts and source types utilizing the most licenses.<br><b>2.</b> Investigate if optimization or resource reduction is feasible.<br><b>3.</b> Consider balancing load between hosts to lower individual usage peaks.<br><b>4.</b> Use findings to forecast future license requirements.<br><b>5.</b> Implement policies to mitigate excessive usage where necessary.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.log type=Usage | eval gb=b/1024/1024/1024</code><br>       - Collects license usage data and converts bytes to gigabytes for a standard unit of measurement.<br><b>02</b> <code>| timechart span=1d sum(gb) as GB by host useother=false</code><br>       - Organizes the data daily, summing gigabytes attributed to each host without 'Other' categories for specificity.<br><b>03</b> <code>| untable _time host gb | top limit=1 host</code><br>       - Transforms the timechart data and highlights the host with the highest usage.<br><b>04</b> <code>| join time [ search index=_internal source=*license_usage.log type=Usage | eval gb=b/1024/1024/1024 | timechart span=1d sum(gb) as GB by sourcetype useother=false | untable _time sourcetype sum(GB)]</code><br>       - Extracts and joins top source type usage data, allowing a comprehensive understanding of resource consumption.</p>
explanation = <p>On a <b>technical level</b>, this search extracts data from the internal Splunk index, specifically focusing on license usage logs. By calculating the gigabyte consumption over a daily span and displaying the most significant entity, it helps in monitoring resource-intensive hosts and source types. This is <b>critical</b> for Splunk administrators aiming to manage and optimize licensing costs effectively. The use of timechart, eval, and join commands provides a <b>granular look</b> at your data, making this search essential for cost-reduction strategies.</p>
quid = F480344A3664EC1B687A81408B0FC161
search_author = GoSplunk: ItsJohnLocke
updated_author = akhamis
related_info = <p><a href="https://gosplunk.com/show-how-much-disk-space-is-used-by-_internal" target="_blank">https://gosplunk.com/show-how-much-disk-space-is-used-by-_internal</a></p>
description = <p>This search identifies the <b>top daily hosts</b> and <b>source types</b> based on license usage over a 24-hour period. It allows you to pinpoint which entities are consuming the most resources, offering an <b>insightful view</b> into your license utilization.</p>
search = index=_internal source=*license_usage.log type=Usage\
	| eval gb=b/1024/1024/1024\
	| timechart span=1d sum(gb) as GB by host useother=false\
	| untable _time host gb\
	| top limit=1 host\
	| join time [ search index=_internal source=*license_usage.log type=Usage\
	| eval gb=b/1024/1024/1024\
	| timechart span=1d sum(gb) as GB by sourcetype useother=false\
	| untable _time sourcteype sum(GB)]

