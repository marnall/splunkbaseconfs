execution_plan = <b>01</b> <code>The query starts by specifying the index and sourcetype to search in, which are the Windows security event logs.</code><br>       - It ensures the search focuses on the correct data source.<br><b>02</b> <code>It then filters for events with EventCode 4625, which represents failed logon attempts.</code><br>       - This identifies events of interest related to security incidents.<br><b>03</b> <code>The query further filters for events with specific sub-status codes, which can provide more information about the reason for the logon failure.</code><br>       - Provides detailed context on each failure incident.<br><b>04</b> <code>It excludes events with a NULL Security ID or a wildcard Account Name, which are likely not relevant for this analysis.</code><br>       - Focus on meaningful and accurate data.<br><b>05</b> <code>The query uses the eval function to format the event timestamp into a more readable date format.</code><br>       - Enhances clarity of date data.<br><b>06</b> <code>It uses the rex command to extract the target account name from the event details.</code><br>       - Isolates critical information about users attempting to log in.<br><b>07</b> <code>The query again uses the eval function to format the event timestamp, this time for use in the subsequent stats command.</code><br>       - Prepares data for statistical analysis.<br><b>08</b> <code>It groups the events by date, target account, host, and keywords, and counts the number of events in each group.</code><br>       - Facilitates detecting patterns and volume of failed attempts.<br><b>09</b> <code>Finally, it renames the fields for clarity in the output.</code><br>       - Improves report readability and understanding.</div>
explanation = <p>This query can be used to <b>monitor</b> and <b>analyze</b> failed logon attempts in a Windows environment. It can help identify potential <b>security threats</b>, such as brute force attacks or unauthorized access attempts, by highlighting <b>unusual patterns</b> of failed logon attempts.</p>
quid = 3467F93D27D8C58875B7E80FBFA88E39
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Failed Windows Logon Attempts by Date, Account, Host, and Status</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4625 (Sub_Status="0xc0000072" OR Sub_St</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query is searching for failed Windows security logon events (EventCode 4625) with specific sub-status codes, which are indicative of potential security risks. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4625 (Sub_Status="0xc0000072" OR Sub_Status="0xC0000072") Security_ID!="NULL SID" Account_Name!="*$"\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| rex "Which\sLogon\sFailed:\s+\S+\s\S+\s+\S+\s+Account\sName:\s+(?<facct>\S+)"\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| stats count by Date, facct, host, Keywords\
	| rename facct as "Target Account" host as Host Keywords as Status count as Count

