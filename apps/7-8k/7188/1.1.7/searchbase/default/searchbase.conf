[bucket_count_by_state_over_index]
search_name = Chart of Bucket Count by State for Each Index
version = 1.0.1
date_updated = 2024-2-4 13:27:5
search_hidden = 0
category = Splunk
sub_category = Indexing
tags = Access,Indexing
solution = <p>This query provides insights into the distribution of buckets across different states ('hot', 'warm', etc.), enabling proactive assessment of index health and Splunk storage infrastructure.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate indexes with an excessive count of 'hot/warm' buckets to ensure data ingestion processes are functioning properly.<br><b>2.</b> Ensure storage resources are sufficient to handle bucket state transitions.<br><b>3.</b> Evaluate bucket retention and rollover policies for potential adjustments.<br><b>4.</b> Review Splunk indexer performance metrics to identify areas for hardware optimization.<br><b>5.</b> Use historical trends from this chart to inform capacity planning and scaling decisions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| dbinspect index="<<index>>"</code><br>       - This command inspects the specified index in Splunk and provides detailed information about the buckets within it, including their state (hot, warm, cold, or frozen).<br><b>02</b> <code>| eval state=case (state=="warm" OR state=="hot","hot/warm",1=1,state)</code><br>       - Evaluates the state of the data. If the state is 'hot' or 'warm', it is labeled as 'hot/warm'; otherwise, the original state is retained.<br><b>03</b> <code>| chart dc(bucketId) over index by state</code><br>       - Creates a chart showing the distinct count of bucket IDs over the index by their state, which visually represents the number of buckets in each state for the specified index.<br>
explanation = <p>This query is designed to analyze and monitor the health of your Splunk indexes. By evaluating bucket states, it helps identify potential issues, such as an excessive number of 'hot' or 'warm' buckets, which might suggest problems with data ingestion or storage resources. This function is particularly relevant for system administrators and data engineers tasked with maintaining the performance and operational stability of a Splunk environment.</p>
quid = 0011F8DF72C03130F93BB9C108BDE0AA
search_author = GoSplunk: Azeemering
updated_author = akhamis
related_info = <p><a href="https://gosplunk.com/bucket-count-by-state-over-index" target="_blank">https://gosplunk.com/bucket-count-by-state-over-index</a></p>
description = <p>Summarizes <b>Chart of Bucket Count by State for Each Index</b> using <code>| dbinspect index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | dbinspect index="<<index>>"\
| eval state=case (state=="warm" OR state=="hot","hot/warm",1=1, state)\
| chart dc(bucketId) over index by state

[build_license_usage_by_group]
search_name = Daily License Usage and Average by Index and Source Type
version = 1.0.1
date_updated = 2024-2-4 12:43:50
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Licensing
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The query starts by searching the _internal index and the license_usage.log source for events of type 'Usage'.</ul><ul><b>02</b> It then creates two new fields, 'indexname' and 'sourcetypename', based on the 'idx' and 'st' fields in the data.</ul><ul><b>03</b> The '_time' field is binned into 1 day intervals.</ul><ul><b>04</b> The 'poolsz' and 'b' fields are aggregated by '_time', 'pool', 'indexname', and 'sourcetypename'.</ul><ul><b>05</b> The 'b' field is converted to GB and the 'poolsz' field is also converted to GB.</ul><ul><b>06</b> The '_time', 'indexname', 'sourcetypename', 'GB', and 'pool' fields are selected for further processing.</ul><ul><b>07</b> The 'day' field is created based on the '_time' field.</ul><ul><b>08</b> The 'yesterday' field is created based on the current time.</ul><ul><b>09</b> The 'time' field is created based on the '_time' field.</ul><ul><b>10</b> The 'isyesterday' field is created based on whether 'yesterday' equals 'time'.</ul><ul><b>11</b> The 'Yesterday' field is created based on whether 'isyesterday' equals 'true'.</ul><ul><b>12</b> The 'pool', 'Yesterday', and 'Average' fields are aggregated by 'indexname' and 'sourcetypename'.</ul><ul><b>13</b> The 'pool', 'sourcetypename', 'Yesterday', and 'Average' fields are aggregated by 'indexname'.</ul><ul><b>14</b> The query then joins this data with a customer lookup table based on 'indexname'.</ul><ul><b>15</b> The query then joins this data with the current database size for each index based on 'indexname'.</ul><ul><b>16</b> The 'group', 'indexname', 'Yesterday', 'Average', and 'currentDBSizeMB' fields are selected for further processing.</ul><ul><b>17</b> The results are sorted by the sum of 'Yesterday'.</ul><ul><b>18</b> The results are output to a csv file.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor and manage Splunk license usage. It can help identify which indexes and source types are consuming the most license volume and can assist in capacity planning and cost management. It can also be used to track usage trends over time and identify any unusual spikes in usage that might indicate a problem.</div></div>
quid = 4E2458F07FDFBA4B56AF40B0ED60C216
search_author = GoSplunk: manderso
updated_author = akhamis
related_info = <p><a href="https://gosplunk.com/build-license-usage-by-group" target="_blank">https://gosplunk.com/build-license-usage-by-group</a></p>
description = <p>Summarizes <b>Daily License Usage and Average by Index and Source Type</b> using <code>index=_internal source=*license_usage.log type="Usage"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query analyzes the license usage in Splunk. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
search = index=_internal source=*license_usage.log type="Usage"\
| eval indexname = if(len(idx)=0 OR isnull(idx),"(UNKNOWN)",idx)\
| eval sourcetypename = st\
| bin _time span=1d\
| stats values(poolsz) as poolsz sum(b) as b by _time, pool, indexname, sourcetypename\
| eval GB=(b/1024/1024/1024)\
| eval pool=(poolsz/1024/1024/1024)\
| fields _time, indexname, sourcetypename, GB, pool\
| eval day=strftime(_time,"%a")\
| eval yesterday=tostring(strftime(relative_time(now(),"-d@d"),"%Y-%m-%d"))\
| eval time=tostring(strftime(_time,"%Y-%m-%d"))\
| eval isyesterday=if(yesterday==time,"true","is_average")\
| eval Yesterday=if(isyesterday="true",GB,0)\
| stats values(pool) as pool sum(Yesterday) as Yesterday avg(GB) as Average by indexname, sourcetypename\
| stats values(pool) as pool list(sourcetypename) sum(Yesterday) sum(Average) by indexname\
| join indexname [\
| inputlookup customers.csv\
| rename idx AS indexname\
| fields group indexname]\
| join indexname [\
| rest /services/data/indexes search="totalEventCount!=0"\
| stats sum(currentDBSizeMB) AS currentDBSizeMB by title\
| rename title AS indexname\
| fields indexname currentDBSizeMB]\
| fields group indexname sum(Yesterday) sum(Average) currentDBSizeMB\
| sort - sum(Yesterday)\
| outputlookup size_license_group_usage.csv

