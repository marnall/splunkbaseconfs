solution = <p>This search surfaces potential cleanup candidates among dashboards or views—either never accessed or dormant for significant time. It empowers governance initiatives and resource optimization.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify view objects older than 21 days without access<br><b>2.</b> Validate whether each view remains business‑relevant<br><b>3.</b> Archive, disable, or consolidate stale views<br><b>4.</b> Track dashboard usage trends and scheduling impact on index load<br><b>5.</b> Assign ownership reviews for identified inactive views</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = ‑7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| rest splunk_server=local /servicesNS/-/-/data/ui/views</code><br>       - Retrieve list of UI view objects from Splunk Web endpoint<br><b>02</b> <code>| stats count values(eai:acl.sharing) values(eai:acl.owner) AS owner by title, eai:acl.app</code><br>       - Aggregate metadata by title and app, count instances, capture sharing and owner details<br><b>03</b> <code>| rename eai:acl.app AS app | eval last_view_time_days_ago=-1 | eval last_view_time_days_ago_pretty="no views in last 30 days"</code><br>       - Initialize fields for dashboards with no view records found<br><b>04</b> <code>| join type=outer title app [ search index="_internal" sourcetype=splunk_web_access GET app earliest=-30d@d | rex "GET /[^/]+/app/(?<app>[^/ ?]+)/(?<title>[^\/\?\s]+)" | search app=* AND title=* AND user=* AND user!="-" | stats latest(_time) AS last_view_time latest(user) AS last_user by app, title | eval last_view_time_days_ago=round(abs(now()-last_view_time),0) | eval last_view_time_days_ago_pretty=tostring(last_view_time_days_ago, "duration") | convert ctime(last_view_time) ]</code><br>       - Join UI metadata with web access logs to compute the last view time per dashboard or view object<br><b>05</b> <code>| where last_view_time_days_ago > (60*60*24*21) OR last_view_time_days_ago=-1</code><br>       - Filter for views that haven’t been accessed in over 21 days or never accessed</br>
explanation = <p>This query first uses the <b>| rest</b> command to retrieve UI view metadata (title, app, ACL owner) from Splunk Web endpoints. It then uses <b>| stats</b> to count permissions and owners for each view object. The search joins with internal web access logs (via <b>index="_internal" sourcetype="splunk_web_access"</b>) to determine when each view was last accessed and by whom. Calculating fields like <b>last_view_time_days_ago</b> provides visibility into dormant or unused dashboards. These insights guide cleanup efforts, helping improve governance and reduce unnecessary resource consumption.<p>
quid = A90C52899DDAF376BF7AF60C593A402D
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/rest" target="_blank">Splunk Docs: REST command reference</a><br>Details about using | rest for Splunk object metadata.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Dashboard-views-by-user-using-REST-index-internal/m-p/243561" target="_blank">Splunk Community: Dashboard views by user using REST & index</a><br>Community discussion on querying dashboard view usage via REST and internal logs.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_blank">Splunk Docs: stats command reference</a><br>Overview of using stats for aggregation in SPL.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/troubleshooting/what-data-is-in-the-internal-indexes" target="_blank">Splunk Docs: About the internal logs</a><br>Information on how Splunk logs access and usage in indexes like _internal.</li></ul>
description = <p>This search identifies dashboard or view objects in Splunk that have not been accessed recently, helping detect potential unused assets and reduce search load.</p>
search = | rest splunk_server=local /servicesNS/-/-/data/ui/views \
	| stats count values(eai:acl.sharing) values(eai:acl.owner) AS owner by title, eai:acl.app \
	| rename eai:acl.app AS app \
	| eval last_view_time_days_ago=-1 \
	| eval last_view_time_days_ago_pretty="no views in last 30 days" \
	| join type=outer title app [ search index="_internal" sourcetype=splunk_web_access GET app earliest=-30d@d \
	| rex "GET /[^/]+/app/(?<app>[^/ ?]+)/(?<title>[^\/\?\s]+)" \
	| search app=* AND title=* AND user=* AND user!="-" \
	| stats latest(_time) AS last_view_time latest(user) AS last_user by app, title \
	| eval last_view_time_days_ago=round(abs(now()-last_view_time),0) \
	| eval last_view_time_days_ago_pretty=tostring(last_view_time_days_ago, "duration") \
	| convert ctime(last_view_time) ] \
	| where last_view_time_days_ago > (60*60*24*21) OR last_view_time_days_ago=-1

