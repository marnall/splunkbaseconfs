search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Forwarding
solution = <p>This query is essential for tracking the <b>versions</b> and <b>last-seen activity</b> of hosts in your Splunk setup, aiding in identifying outdated instances and inactive systems.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the output to identify hosts running unsupported or old software versions.<br><b>2.</b> Use <code>last_seen_hours</code> to identify inactive hosts and investigate if they require attention.<br><b>3.</b> Standardize configurations across hosts with inconsistent operating systems or architectures.<br><b>4.</b> Plan a phased approach to upgrade older versions to ensure compliance.<br><b>5.</b> Investigate and address connectivity issues for hosts that haven't been seen in a long period.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd group=tcpin_connections version=* os=* arch=* build=* hostname=* source=*metrics.log</code><br>       - Search internal metrics for forwarder connection metadata.<br><b>02</b> <code>| stats latest(version) as version, latest(arch) as arch, latest(os) as os, latest(build) as build by hostname</code><br>       - Summarize latest version details per host.<br><b>03</b> <code>| join hostname [| metadata type=hosts index=&lt;&lt;index&gt;&gt; | eval last_seen_hours=(now()-lastTime)/60/60 | table host, last_seen_hours | rex field=host "(?&lt;hostname&gt;[^\\.]+)" | fields - host ]</code><br>       - Join last-seen metadata for each host.<br>
explanation = <p>This query offers valuable insights into the configuration and status of Splunk hosts. By utilizing the <code>_internal</code> index and <code>metrics.log</code> events, it identifies specific metadata like the Splunk software version, architecture, OS, and build for each host. Joining this information with data from the <code>metadata</code> command reveals when hosts were last seen. This operation highlights hosts that may require updates, attention due to inactivity, or have inconsistent environments. Fields like <code>last_seen_hours</code> quantify the time since a host was last active, enabling administrators to address potential gaps in their infrastructure effectively.</p>
quid = 2CCB552B5751208336E212313AEAD800
search_author = GoSplunk: jaracan
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/universal-forwarder-splunk-versions" target="_blank">https://gosplunk.com/universal-forwarder-splunk-versions</a></p>
description = <p>Summarizes <b>Latest Splunk Version, Architecture, OS, Build by Host and Last Seen</b> using <code>index=_internal sourcetype=splunkd group=tcpin_connections version=* os=* arch=* build=* hostname=* source=*metrics.log</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal sourcetype=splunkd group=tcpin_connections version=* os=* arch=* build=* hostname=* source=*metrics.log\
	| stats latest(version) as version,latest(arch) as arch,latest(os) as os,latest(build) as build by hostname\
	| join hostname [\
	| metadata type=hosts index="<<index>>"\
	| eval last_seen_hours=(now()-lastTime)/60/60\
	| table host, last_seen_hours\
	| rex field=host "(?<hostname>[^\.]+)"\
	| fields - host ]

[universal_forwarder_throughput_limit_hit_count]
search_name = Internal Data Throughput Rate and Trend by Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Forwarding
solution = <p>This query provides operational insights into host-level data throughput trends in your Splunk environment. By categorizing and tracking throughput by hosts, it identifies high-activity hosts that might indicate bottlenecks or misconfigurations. Reviewing these trends ensures optimal forwarding operations and highlights opportunities to enhance performance.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts with throughput exceeding acceptable thresholds to identify potential issues.<br><b>2.</b> Validate configurations on hosts with low or unexpected throughput for consistency.<br><b>3.</b> Review hardware or network conditions impacting high-throughput hosts.<br><b>4.</b> Set alerts for anomalies in throughput patterns for proactive monitoring.<br><b>5.</b> Use trends to forecast data growth and plan for capacity adjustments.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd "current data throughput"</code><br>       - Searches internal logs for throughput-related events.<br><b>02</b> <code>| rex "Current data throughput \\((?<kb>\s+)"</code><br>       - Extracts throughput values into the "kb" field using regex.<br><b>03</b> <code>| eval rate=case (kb < 500, "256", kb > 499 AND kb < 520, "512", kb > 520 AND kb < 770 ,"768", kb>771 AND kb<1210, "1024", 1=1, ">1024")</code><br>       - Categorizes throughput values into ranges.<br><b>04</b> <code>| stats count as Count sparkline as Trend by host, rate</code><br>       - Aggregates counts and trends grouped by host and rate.<br><b>05</b> <code>| where Count > 4</code><br>       - Filters out insignificant data points.<br><b>06</b> <code>| rename host as "Host" rate as "Throughput rate(kb)" count as "Hit Count"</code><br>       - Renames fields for better readability.<br><b>07</b> <code>| sort -"Throughput rate(kb)",-Count</code><br>       - Sorts results prioritizing the highest throughput and counts.<br>
explanation = <p>This search monitors <b>data throughput</b> across hosts to determine trends and patterns. By querying Splunk's internal logs (index="_internal", sourcetype="splunkd"), it targets events related to "current data throughput." A regular expression function (<code>rex</code>) extracts throughput values into a "kb" field. The <code>eval rate=case()</code> categorizes these values into defined ranges: under 500kb, 500-520kb, etc. Next, the <code>stats</code> pipeline aggregates counts and generates a sparkline trend by host and rate. Filtering (<code>where Count > 4</code>) eliminates noise, focusing on relevant data. Renaming (<code>rename host as "Host"</code>) improves readability for consumers. Sorting ensures critical hosts with high throughput rates are displayed at the top. This search is valuable for detecting potential bottlenecks, understanding resource utilization, and maintaining a stable Splunk environment.</p>
quid = C72AB4E190E2B29C7D8C5C247C4A3845
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/universal-forwarder-throughput-limit-hit-count" target="_blank">https://gosplunk.com/universal-forwarder-throughput-limit-hit-count</a></p>
description = <p>Summarizes <b>Internal Data Throughput Rate and Trend by Host</b> using <code>index=_internal sourcetype=splunkd "current data throughput"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal sourcetype=splunkd "current data throughput"\
	| rex "Current data throughput \\((?<kb>\s+)"\
	| eval rate=case (kb < 500, "256", kb > 499 AND kb < 520, "512", kb > 520 AND kb < 770 ,"768", kb>771 AND kb<1210, "1024", 1=1, ">1024")\
	| stats count as Count sparkline as Trend by host, rate\
	| where Count > 4\
	| rename host as "Host" rate as "Throughput rate(kb)" count as "Hit Count"\
	| sort -"Throughput rate(kb)",-Count

[universal_forwarder_throughput_statistics]
search_name = Splunk Forwarder Connection Metrics and Classification
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Forwarding
solution = <p>This query offers a comprehensive overview of TCP connection metrics, helping identify underperforming or high-traffic hosts and ensuring efficient data flow across Splunk forwarders.</p> <p><b>Suggested Actions</b><br> <b>1.</b> Investigate hosts classified as "Special" for any issues or optimization opportunities.<br> <b>2.</b> Monitor forwarder types for consistent data distribution and balance workloads if necessary.<br> <b>3.</b> Use version analysis to ensure all forwarders are running supported and optimized Splunk versions.<br> <b>4.</b> Track trends in peak and average data transfer rates to identify anomalies.<br> <b>5.</b> Document findings and share results with stakeholders to drive performance improvements.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal source=*metrics.log group=tcpin_connections splunk_server=*</code><br>       - Filters internal metrics for TCP connection logs.<br> <b>02</b> <code>| eval sourceHost=hostname</code><br>       - Ensures hostname is captured; uses sourceHost if hostname is null.<br> <b>03</b> <code>| search host!="(ALL)"</code><br>       - Excludes invalid or default host values ("(ALL)").<br> <b>04</b> <code>| eval connectionType=case(...)</code><br>       - Categorizes forwarders into types based on fwdType and connectionType.<br> <b>05</b> <code>| eval Ver=if(isnull(version),"pre 4.2",version)</code><br>       - Assigns version as "pre 4.2" if the version field is null.<br> <b>06</b> <code>| fields connectionType sourceIp host kb tcp_eps tcp_KBps splunk_server Ver</code><br>       - Specifies fields to be included in calculations.<br> <b>07</b> <code>| stats ... by connectionType sourceIp host Ver</code><br>       - Computes metrics like min, max, and avg transfer rates grouped by key fields.<br> <b>08</b> <code>| dedup host</code><br>       - Eliminates duplicate log entries based on host.<br> <b>09</b> <code>| eval sum_mb=round(sum_kb/1024,0)</code><br>       - Converts total data volume from KB to MB.<br> <b>10</b> <code>| eval avg_tcp_KBps=round(avg_tcp_KBps,0)</code><br>       - Rounds average TCP KBps for readability.<br> <b>11</b> <code>| eval class=case(...)</code><br>       - Categorizes hosts based on average TCP KBps into "Standard", "Better", and "Special" classes.<br> <b>12</b> <code>| convert ctime(*time)</code><br>       - Converts time fields to a human-readable format.<br> <b>13</b> <code>| rename ...</code><br>       - Renames fields for clarity in the final output.<br> <b>14</b> <code>| sort - "Peak Kbps"</code><br>       - Sorts results by descending peak data transfer rates.<br>
explanation = <p>This query is valuable for monitoring the <b>performance</b> of different Splunk <b>hosts</b> and <b>forwarders</b>. By analyzing connection metrics, it can identify underperforming hosts, high data transfer rates, and potential bottlenecks that may indicate <b>operational issues</b>. The query categorizes forwarders into types (e.g., universal, lightweight, heavy, etc.) and provides insights into how data is <b>distributed</b>. By leveraging this information, Splunk administrators can <b>optimize</b> resource allocation and ensure uniform data flow across the environment.</p>
quid = 19081B1A0BA92B4FF69FF474E1A0C732
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/universal-forwarder-throughput-statistics" target="_blank">https://gosplunk.com/universal-forwarder-throughput-statistics</a></p>
description = <p>Summarizes <b>Splunk Forwarder Connection Metrics and Classification</b> using <code>index=_internal source=*metrics.log group=tcpin_connections splunk_server=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal source=*metrics.log group=tcpin_connections splunk_server=*\
	| eval sourceHost=hostname \
	| search host!="(ALL)"\
	| eval connectionType=case (fwdType=="uf","univ fwder", fwdType=="lwf", "lightwt fwder",fwdType=="full", "heavy fwder", connectionType=="cooked" or connectionType=="cookedSSL","Splunk fwder", connectionType=="raw" or connectionType=="rawSSL","legacy fwder")\
	| eval Ver=if(isnull(version),"pre 4.2",version)\
	| fields connectionType sourceIp host kb tcp_eps tcp_KBps splunk_server Ver\
	| stats min(_time) as first_time, max(_time) as last_time, max(tcp_KBps) as max_tcp_KBps, avg(tcp_KBps) as avg_tcp_KBps, avg(tcp_eps) as avg_tcp_eps, sum(kb) as sum_kb by connectionType sourceIp host Ver\
	| dedup host\
	| eval sum_mb = round(sum_kb/1024,0)\
	| fields - sum_kb\
	| eval avg_tcp_KBps = round(avg_tcp_KBps,0)\
	| eval max_tcp_KBps = round(max_tcp_KBps,0)\
	| eval class=case (avg_tcp_KBps>0 AND avg_tcp_KBps<=128, "Standard Hosts",avg_tcp_KBps>128 AND avg_tcp_KBps<=256, "Better Hosts",avg_tcp_KBps>256, "Special Hosts")\
	| convert ctime(*time)\
	| rename first_time as "First seen", last_time as "Last seen", avg_tcp_KBps as "AVG KB/s", avg_tcp_eps as "AVG Events/s per 30 seconds", sum_mb as "Total MB", max_tcp_KBps as "Peak Kbps" connectionType AS "Forwarder Type" sourceIp as "Source IP" host AS "Host" Ver As "Splunk Version"\
	| sort - "Peak Kbps"

[unused_splunk_dashboards_last_30_days]
search_name = Unused Splunk Dashboards Last 30 Days
version = 3.0.0
date_created = 2025-05-18
date_updated = 2025-5-20 10:48:25
category = Splunk
sub_category = _internal
tags = Splunk web access
solution = <p>Surface dashboards that are no longer accessed to reduce visual clutter and improve search performance.</p><p><b>Suggested Actions</b><br><b>01.</b> Alert owners of unused dashboards for validation or retirement.<br><b>02.</b> Archive or disable dashboards inactive for >30 days.<br><b>03.</b> Consolidate stale dashboards into maintained ones.<br><b>04.</b> Create tags or annotations for historical dashboards.<br><b>05.</b> Re-run this audit quarterly to maintain hygiene.</p><br><p><b>Recommended Alerts</b><br><b>01.</b> Normal: < 10 unused dashboards<br><b>02.</b> Low: 10–25 unused dashboards<br><b>03.</b> Medium: 25–50 unused dashboards<br><b>04.</b> High: 50–100 unused dashboards<br><b>05.</b> Critical: > 100 unused dashboards</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| rest /servicesNS/-/-/data/ui/views</code><br>       - Retrieves metadata about all dashboards across apps and users.<br><b>02</b> <code>| stats ... by title, eai:acl.app</code><br>       - Aggregates ownership and sharing details for each dashboard.<br><b>03</b> <code>| eval ...</code><br>       - Creates default values for dashboards not accessed.<br><b>04</b> <code>| join ... [ search index="_internal" sourcetype="<<sourcetype>>" ... ]</code><br>       - Matches dashboard metadata with web access logs by app/title.<br><b>05</b> <code>| stats latest(_time), latest(user)</code><br>       - Determines the last access time and the user who accessed it.<br><b>06</b> <code>| where ...</code><br>       - Filters dashboards with no views or inactive beyond 21 days.<br>
explanation = <p>This search collects metadata for all dashboards using the <code>| rest</code> command and matches it with usage data from Splunk's internal web access logs. Dashboards are flagged as "unused" if they haven't been accessed in over 21 days or have no recorded access. The <code>| join</code> command integrates dashboard metadata with activity logs, ensuring a full view of usage patterns. Using functions like <code>eval</code> and <code>stats</code>, the query calculates the time since last access and formats the data for readability. This process allows Splunk administrators and business owners to identify low-use or abandoned dashboards quickly for optimal management.</p>
quid = 5D5FB6381A59B6A608A72822AE8EF2D6
search_author = grdhg24
updated_author = khutchinson
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/administer-splunk-enterprise-with-rest-apis">REST API: data/ui/views</a><br>Describes the REST endpoint used to list all dashboards.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Detect-unused-dashboards-via-web-access/m-p/578115">Detect Unused Dashboards</a><br>Discussion on identifying unused dashboards using internal logs.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/join">Join Command</a><br>Combines metadata with usage logs for correlation.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/convert">Convert Command</a><br>Formats last accessed time into readable string.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eval">Eval Command</a><br>Creates derived fields like days since last view.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/rex">Rex Command</a><br>Extracts app and dashboard names from access URIs.</li><li><a href="https://lantern.splunk.com/Observability/Search_and_alerting/Auditing_dashboard_usage">Auditing Dashboard Usage</a><br>Splunk Lantern example to detect dashboard activity gaps.</li></ul>
description = <p>Summarizes <b>Unused Splunk Dashboards Last 30 Days</b> using <code>| rest splunk_server=local /servicesNS/-/-/data/ui/views</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest splunk_server=local /servicesNS/-/-/data/ui/views \
	| stats count values(eai:acl.sharing) AS sharing values(eai:acl.owner) AS owner by title, eai:acl.app \
	| rename eai:acl.app AS app \
	| eval last_view_time_days_ago = -1 \
	| eval last_view_time_days_ago_pretty = "No views in last 30 days" \
	| join type=outer title app \
	[ search index=_internal sourcetype=* "GET /" earliest=-30d@d \
	| rex field=_raw "GET /[^/]+/app/(?<app>[^/ ?]+)/(?<title>[^/\?\s]+)" \
	| search app=* title=* user=* user!="-"\
	| stats latest(_time) AS last_view_time latest(user) AS last_user by app, title \
	| eval last_view_time_days_ago=round((now() - last_view_time), 0) \
	| eval last_view_time_days_ago_pretty=tostring(last_view_time_days_ago, "duration") \
	| convert ctime(last_view_time) ] \
	| where last_view_time_days_ago > 60*60*24*21 OR last_view_time_days_ago=-1

[unusual_outbound_dns_activity]
search_name = DNS Query Length Count Sorted by Client IP
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,SFU
solution = <p>This query facilitates the detection of potential DNS security issues by identifying anomalies in query lengths grouped by client IP address.</p><p><b>Suggested Actions</b><br><b>1.</b> Review client IPs with unusually long DNS query lengths for anomalies.<br><b>2.</b> Investigate patterns and payloads in the queries to rule out malicious DNS tunneling.<br><b>3.</b> Correlate suspicious DNS activity with other network logs for holistic insights.<br><b>4.</b> Implement access restrictions or block DNS queries from flagged client IPs, as necessary.<br><b>5.</b> Adjust monitoring thresholds for query lengths to maintain proactive detection of future threats.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=dns</code><br>       - Start by searching for DNS logs within a specified index.<br><b>02</b> <code>| eval Length=len(query)</code><br>       - Calculate the length of each DNS query and create a new field called 'Length'.<br><b>03</b> <code>| stats count(clientip) by Length</code><br>       - Group the logs by query length and count occurrences for each client IP.<br><b>04</b> <code>| sort – Length</code><br>       - Sort results in descending order based on query length for easier analysis.<br>
explanation = <p>This search performs a focused analysis on DNS logs to pinpoint anomalous DNS queries. By calculating query lengths and analyzing them against client IPs, this approach uncovers patterns that standard DNS analysis might overlook. Unusual DNS query lengths can often be an indication of <b>covert communication</b> or <b>suspicious activity</b> like data exfiltration via DNS tunneling. The search utilizes key Splunk functions like <code>eval</code> to compute new metrics (query length) and <code>stats</code> to group and summarize data, making it an effective tool for security monitoring and forensic investigation.</p>
quid = D640AB373E4DDDA48BA6D37292F57A08
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>DNS Query Length Count Sorted by Client IP</b> using <code>index="<<index>>" sourcetype=dns #(dns) Make sure that this/these sourcetype/s exist or edit to make search valid.</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=dns #(dns) Make sure that this/these sourcetype/s exist or edit to make search valid.\
	| eval Length=len(query)\
	| stats count(clientip) by Length #(clientip)\
	| sort – Length

[unusualshort_file_names]
