[pi_rm_search_head_cpu_p90]
search_name = Search Head CPU P90
version = 2.x
date_created = 2025-12-04
category = Performance Monitoring
sub_category = Server
tags = CPU,Search Heads,Statistics
solution = <p>This search provides a comprehensive overview of CPU <b>performance</b> for search heads, enabling operators to identify <b>capacity constraints</b> and make informed decisions about scaling resources.</p><p><b>Suggested Actions</b><br><b>1.</b> Review p90 CPU usage to assess high-end performance.<br><b>2.</b> Compare against historical data to spot trends.<br><b>3.</b> Set thresholds for alerting if p90 exceeds expected limits.<br><b>4.</b> Use data to forecast future resource needs.<br><b>5.</b> Consider optimizing search head configurations to improve efficiency.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index="_introspection" sourcetype="splunk_resource_usage" component IN (Hostwide, IOStats)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter by components that reflect resource usage<br><b>02</b> <code>rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Simplifies field names for easier handling<br><b>03</b> <code>eval cpu=cpu_system_pct+cpu_user_pct</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Computes total CPU percentage<br><b>04</b> <code>stats latest(cpu) as cpu by host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieves the most recent CPU usage per host<br><b>05</b> <code>stats p90(cpu) as cpu_p90, avg(cpu) as cpu_avg, max(cpu) as cpu_max</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates p90, average, and max CPU usage</p>
explanation = <p>This search offers an <b>analytical</b> view of search head CPU performance by calculating the 90th percentile, average, and maximum <b>CPU utilization</b>. The p90 metric filters out extreme outliers, providing a realistic view of resource demands during peak load. These statistics help establish <b>performance baselines</b>, identify capacity constraints, and support decisions about scaling the search tier.</p><p>For junior engineers, this query demonstrates the use of <b>eval</b> for calculating CPU, and <b>stats</b> for aggregating performance metrics across multiple hosts. It serves as a model for structured search logic, highlighting how statistical analysis can guide resource allocation.</p>
quid = 8F2E9D4B7A5C3E1F6D9B4A8E2F7C5D3B
search_author = Splunk Works
description = <p>This search <b>calculates</b> the 90th percentile of CPU usage for <b>search heads</b>. It provides insights into CPU <b>performance</b> with a focus on <b>high-end</b> usage metrics.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_introspection" sourcetype=splunk_resource_usage component IN (Hostwide, IOStats) | rename data.* as * | eval cpu=cpu_system_pct+cpu_user_pct | stats latest(cpu) as cpu by host | stats p90(cpu) as cpu_p90, avg(cpu) as cpu_avg, max(cpu) as cpu_max

