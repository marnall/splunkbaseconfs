dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index=_internal status=success</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Search in the internal Splunk logs for successful search executions.<br><b>02</b> <code>| stats count, sum(run_time) AS total_run_time BY savedsearch_name app</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate metrics like count and total runtime per search.<br><b>03</b> <code>| sort total_run_time DESC</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Sort by total runtime to prioritize searches by resource usage.<br><b>04</b> <code>| foreach "*" [eval ...]</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Normalize numeric fields to round values and maintain clarity.<br><b>05</b> <code>| streamstats SUM(...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Dynamically categorize and sum searches based on their naming conventions.<br><b>06</b> <code>| stats SUM(...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Summarize search counts across categories like DMA, CS, etc.<br><b>07</b> <code>| eval Total = dma_total + CS_total + report_total + other_total</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Compute the consolidated total of unique scheduled searches.<br><b>08</b> <code>| table Total</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Present the total scheduled searches in a simple, clear table format.<br>
explanation = <p>This search analyzes the **internal Splunk logs** to inventory active unique scheduled searches by type: **DMA**, **Correlation Searches**, **Reports**, and **Other**. It calculates the total number of distinct searches, excluding ad-hoc workload, to quantify the impact of scheduled searches on system performance. Such insights are **crucial for governance**, enabling Splunk administrators to manage workload complexity, eliminate redundant searches, and optimize system scalability.</p><p>Breaking the searches into categories helps to monitor which types of workloads consume the most resources and their execution efficiency by aggregating runtime totals. Junior engineers can understand the production significance of **stats** and **foreach** commands for aggregation and operational visibility.</p>
quid = 2E8F9D4B7A5C3E1F6D9B4A8E2F7C5D3A
search_author = Splunk Works
description = <p>Summarizes <b>Count Unique Scheduled Searches</b> using <code>index=_internal status=success | stats count, sum(run_time) as total_run_time by savedsearch_name app | sort total_run_t</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_internal status=success | stats count, sum(run_time) as total_run_time by savedsearch_name app | sort total_run_time desc | foreach "*" [ eval <<FIELD>>=if(isnum('<<FIELD>>'), round('<<FIELD>>',2), '<<FIELD>>')] | streamstats sum(eval(if(not match(savedsearch_name, "- Rule|_ACCELERATE_DM_") and NOT match(savedsearch_name, "^_ACCELERATE_"), 1, 0))) as other_total sum(eval(if(match(savedsearch_name, "^_ACCELERATE") AND NOT match(savedsearch_name, "_ACCELERATE_DM_") and NOT match(savedsearch_name, "- Rule$"), 1, 0))) as report_total sum(eval(if(match(savedsearch_name, "- Rule"), 1, 0))) as CS_total sum(eval(if(match(savedsearch_name, "_ACCELERATE_DM_"), 1, 0))) as dma_total by savedsearch_name | stats sum(*_total) as *_total | eval Total = dma_total + CS_total + report_total + other_total | table Total

