search_author = grdhg24
updated_author = khutchinson
description = <p>This query <b>analyzes</b> HTTP status codes to determine the number of <b>successful</b> vs <b>error</b> responses in web server logs. It enables teams to <b>monitor</b> server health and <b>identify</b> issues quickly through visualized data.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="*access*"\
| chart count(eval(like(status,"2%"))) AS Success, count(eval(like(status,"4%") OR like(status,"5%"))) AS Error by status

[apache_access_logs_status_code_reporting_2]
search_name = Chart of Successful and Error HTTP Status Codes
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,GoSplunk
solution = <p>Monitoring HTTP status codes helps proactively identify and resolve server issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Track trends in error codes to detect emerging problems.<br><b>2.</b> Correlate high error rates with deployments or infrastructure changes.<br><b>3.</b> Set thresholds for alerting on error rate increases.<br><b>4.</b> Use insights to improve application reliability.<br><b>5.</b> Share findings with development and operations teams.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=access_combined</code><br>       - This line specifies the data source, focusing on the ‘access_combined’ sourcetype typically used for web access logs.<br><b>02</b> <code>| chart count(eval(like(status,"2%"))) AS Success</code><br>       - Calculates the count of successful HTTP status codes (starting with 2) and labels them 'Success'.<br><b>03</b> <code>count(eval(like(status,"4%") OR like(status,"5%"))) AS Error by status</code><br>       - Counts HTTP error status codes (starting with 4 or 5), labels them 'Error', and groups results by status codes.<br>
explanation = <p>This query is intended for monitoring the operational health of a web server. By splitting HTTP status codes into 'Success' and 'Error' categories (based on their starting digits), it provides a clear view of server responses. Successful requests indicate normal operations, while errors may signify problems such as client-side issues (status codes starting with 4) or server-side issues (status codes starting with 5). This distinction helps web admins proactively address issues.</p>
quid = 6C3017974A82AC18B7674515C9F97D17
search_author = GoSplunk: Suren
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/apache-access_logs-status-code-reporting" target="_blank">https://gosplunk.com/apache-access_logs-status-code-reporting</a></p><br><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Get started with Search</a><br>Official Splunk documentation for this topic.</p>
description = <p>This search charts HTTP status codes to distinguish between <b>successful</b> and <b>error</b> responses in web access logs. By analyzing counts of 'Success' (2xx codes) and 'Error' (4xx and 5xx codes), it provides an operational insight to monitor server health and performance.</p>
search = index="<<index>>" sourcetype=*access*\
| chart count(eval(like(status,"2%"))) AS Success, count(eval(like(status,"4%") OR like(status,"5%"))) AS Error by status

