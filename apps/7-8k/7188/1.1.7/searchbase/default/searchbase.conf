related_info = <p><a href="https://gosplunk.com/get-sourcetype-and-index-info-via-tstats" target="_blank">https://gosplunk.com/get-sourcetype-and-index-info-via-tstats</a></p>
description = <p>This query is <b>retrieving</b> the latest event time and the associated sourcetype for each index in the Splunk environment. It then <b>converts</b> the latest event time from epoch format to a human-readable format.</p>
solution = <p>This query is retrieving the latest event time and the associated sourcetype for each index in the Splunk environment. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
search = | tstats summariesonly=t values(sourcetype) as Sourcetype latest(_time) as Time groupby index\
	| convert ctime(Time)

[get_splunk_directory_and_version_via_nix_ta]
search_name = Get Splunk Directory and Version via NIX TA
date_created = 2024-4-5 12:19:51
date_updated = 2024-4-5 12:19:51
search_hidden = 0
category = Splunk
sub_category = Servers
tags = Assets
solution = <p>This search provides visibility into the deployment of Splunk by identifying the directories and versions of Splunk instances running on Unix/Linux hosts. The results can help verify compliance with version standards, diagnose version-related issues, or pinpoint misconfigurations that may impact operations.</p><p><b>Suggested Actions</b><br><b>1.</b> Verify that retrieved Splunk versions align with the expected and supported versions in your environment.<br><b>2.</b> Check the extracted directory paths for consistency and adherence to organizational installation guidelines.<br><b>3.</b> Use discrepancies in version or directory data as a starting point for deeper investigation into nonstandard configurations.<br><b>4.</b> Share the enriched report with relevant stakeholders to ensure alignment and transparency regarding Splunk deployments.<br><b>5.</b> Take corrective action for any detected anomalies by reconfiguring or updating affected Splunk installations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=ps process="*127.0.0.1*"</code><br>       - Filter for ps sourcetype data specific to processes related to the local Splunk instance.<br><b>02</b> <code>| rex field=process "(?<splunk_version>\d+$)"</code><br>       - Extract the numeric Splunk version from the process string.<br><b>03</b> <code>| rex field=process "\/opt/(?<splunk_dir>\w+)"</code><br>       - Extract the directory name of the Splunk installation from the process field.<br><b>04</b> <code>| stats count by host splunk_dir splunk_version</code><br>       - Summarize the count of occurrences of each unique combination of host, directory, and version.<br>
explanation = <p>This search addresses the operational need to extract Splunk directory and version information on Unix/Linux systems. By processing data from the <b>ps sourcetype</b>, it ensures that Splunk administrators can confirm correct installations and detect anomalies in Splunk's deployment setup. The <code>| rex</code> commands extract relevant details such as the directory path and version number from the process metadata, enabling structured reporting. This provides a clear operational insight to validate that the Splunk systems are configured properly and running the expected versions, which is crucial for maintaining a consistent and predictable environment.</p>
quid = 506778E7E9C41D5F1736E74D3E619EF5
search_author = akhamis
updated_author = akhamis
related_info = <p><a href="https://splunkbase.splunk.com/app/833/" target="_blank">Splunk Add-on for Unix and Linux</a></p>
description = <p>Summarizes <b>Get Splunk Directory and Version via NIX TA</b> using <code>index="<<index>>" sourcetype=ps process="*127.0.0.1*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=ps process="*127.0.0.1*"\
	| rex field=process "(?<splunk_version>\d+$)" \
	| rex field=process "\/opt/(?<splunk_dir>\w+)" \
	| stats count by host splunk_dir splunk_version

[get_unexpected_shutdown_date_with_downtime_duration]
search_name = Windows System Unexpected Shutdown Analysis
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>The query provides <b>invaluable insights</b> into system outages, facilitating targeted investigations into root causes and frequent shutdown patterns. By analyzing this data, administrators can better focus on improving system uptime and organizational productivity.</p><p><b>Suggested Actions</b><br><b>1.</b> Examine systems with the most frequent unexpected shutdowns for hardware and software issues.<br><b>2.</b> Trace downtime patterns to narrow down possible causative events before or during outages.<br><b>3.</b> Investigate recent configurations or updates leading up to shutdowns to rule out incompatibilities.<br><b>4.</b> Monitor other EventCodes and performance indicators for correlations with shutdown events.<br><b>5.</b> Consider implementing power management or redundancy mechanisms for physical hosts experiencing power-related outages.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" source="*WinEventLog:System" EventCode=6008 "unexpected"</code><br>       - Filters the Windows System Event Log for events with EventCode 6008 indicating unexpected shutdowns.<br><b>02</b> <code>| rex "shutdown\s+at\s+(?<time>.*)\s+on\s+[^\d]?(?<month>\d+)\\/[^\d]?(?<day>\d+)\\/[^\d]?(?<year>\d+)\s+was"</code><br>       - Extracts shutdown time, month, day, and year from the event's description using a regular expression.<br><b>03</b> <code>| eval shutdownTime = strptime(year."-".month."-".day." ".time,"%Y-%m-%d %M:%H:%S %p")</code><br>       - Converts the extracted shutdown time into a Splunk-native timestamp format.<br><b>04</b> <code>| eval downTimeDays = round((_time-shutdownTime)/86400,2)</code><br>       - Calculates the downtime in days by comparing the current time to the shutdown time.<br><b>05</b> <code>| eval shutdownTime = strftime(shutdownTime,"%c")</code><br>       - Converts the shutdown time timestamp into a human-readable format.<br><b>06</b> <code>| table _time, host, shutdownTime, downTimeDays</code><br>       - Outputs the results as a table showing the event time, hostname, shutdown time, and downtime duration.<br>
explanation = <p>This query detects and analyzes <b>unexpected shutdown events</b> in Windows systems by referring to specific EventCode (6008). It extracts critical details like <b>shutdown time</b> and <b>downtime duration</b>, calculates the impact interval, and outputs easy-to-read results in table format. The SPL leverages <code>rex</code> for precise time extractions and <code>eval</code> for calculations and formatting.</p> <p>This search helps system administrators monitor and identify <b>frequent instability incidents</b> across hosts, which could point to <b>hardware malfunctions</b>, <b>software crashes</b>, or environmental factors like <b>power issues</b>. By focusing on these events, organizations can prioritize troubleshooting and enhance system reliability with proactive interventions.</p>
quid = 3065E11D1F8E3E068194E9EA7F2AE672
search_author = GoSplunk: dstaulcu
updated_author = khutchinson
description = <p>Summarizes <b>Windows System Unexpected Shutdown Analysis</b> using <code>index="<<index>>" source="*WinEventLog:System" EventCode=6008 "unexpected"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" source="*WinEventLog:System" EventCode=6008 "unexpected"\
	| rex "shutdown\s+at\s+(?<time>.*)\s+on\s+[^\d]?(?<month>\d+)\\/[^\d]?(?<day>\d+)\\/[^\d]?(?<year>\d+)\s+was"\
	| eval shutdownTime = strptime(year."-".month."-".day." ".time,"%Y-%m-%d %M:%H:%S %p")\
	| eval downTimeDays = round((_time-shutdownTime)/86400,2)\
	| eval shutdownTime = strftime(shutdownTime,"%c")\
	| table _time, host, shutdownTime, downTimeDays

[gets_vs_posts_46]
search_name = Chart of GET and POST Requests in Access Logs
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,SFU
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="access*"</code><br>       - Retrieve events from the designated index and sourcetypes aligned with access logs.<br><b>02</b> <code>| chart count(eval(method="GET")) AS GET,count(eval(method="POST")) AS POST</code><br>       - Generate a chart with distinct counts for GET and POST HTTP requests to compare traffic and discern usage patterns.<br>
explanation = <p>This query examines events in web server logs to count the frequency of HTTP methods, specifically <b>GET</b> and <b>POST</b>. The initial Splunk search locates relevant logs within the specified index and sourcetypes starting with 'access'. Subsequent charting counts and labels the number of GET and POST method calls separately. This is crucial for operations teams to monitor <b>request volumes</b>, spot trends, and assess traffic behavior—such as spikes in POST requests, which could signify <b>unusual activity</b> or <b>security incidents</b>.</p>
