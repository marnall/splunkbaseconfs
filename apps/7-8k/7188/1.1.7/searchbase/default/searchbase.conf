[anomalous_events_by_sourcetype_detected_with_unexpectedness]
search_name = Anomalous Events By Sourcetype Detected With Unexpectedness
version = 3.0.0
date_created = 2025-05-15
date_updated = 2025-5-21 11:33:39
category = IT Operations
sub_category = Anomaly Detection
tags = Unexpectedness
solution = <p>This search identifies anomalous or statistically unexpected patterns in your log events, helping operators focus attention on <b>deviations</b> from normal behavior. Leveraging these <b>insights</b> can assist in prioritizing investigation efforts, especially in cases where traditional error detection might miss subtle anomalies.</p><p><b>Suggested Actions</b><br><b>01</b> Review events labeled as anomalous and validate if they indicate real incidents or false positives.<br><b>02</b> Investigate high-frequency anomalous patterns to assess if they correlate with ongoing incidents or application misbehavior.<br><b>03</b> Evaluate sourcetypes showing frequent anomalies and determine if tuning thresholds or patterns is necessary.<br><b>04</b> Set up alerts if sustained anomalies surpass expected baselines, signaling potential service degradation.<br><b>05</b> Document and classify known benign anomalies to improve detection accuracy and reduce noise.</p><p><b>Recommended Alerts</b><br><b>01</b> Normal: unexpectedness < 0.03 consistently over a 24-hour period indicates healthy system behavior.<br><b>02</b> Low: unexpectedness between 0.03 and 0.05 occurring intermittently over 6 hours suggests minor deviations but within tolerance.<br><b>03</b> Medium: unexpectedness between 0.05 and 0.08 persisting over 3 hours in specific sourcetypes warrants proactive review.<br><b>04</b> High: unexpectedness >= 0.08 with more than 50% of events flagged as anomalous over a 1-hour period indicates escalating issues.<br><b>05</b> Critical: unexpectedness >= 0.1 sustained over 30 minutes or sudden spikes in key sourcetypes indicate probable service disruptions or severe incidents requiring immediate attention.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index = (your index) sourcetype = (your sourcetype) (crit* OR fail* OR fatal OR except* OR err* OR status > 500) NOT success* OR NOT INFO OR NOT WARN</code><br> - Searches for critical, failure, fatal, exception, or error events while excluding successes, INFO, and WARN level events.<br><b>02</b> <code>| anomalies threshold=0.03 labelonly=true by sourcetype</code><br> - Applies the anomalies command to detect statistically unexpected events with a threshold of 0.03, grouped by sourcetype.<br><b>03</b> <code>| search sourcetype = (your sourcetype)</code><br> - Refines the results to only include events from the specified sourcetype.<br><b>04</b> <code>| eval threshold=0.03</code><br> - Adds a static field threshold set to 0.03 for use in comparison.<br><b>05</b> <code>| eval score=if(unexpectedness>=threshold, "anomalous", "boring")</code><br> - Classifies events based on whether the unexpectedness score meets or exceeds the threshold, labeling them as anomalous or boring.<br>
explanation = <p>This search focuses on identifying log entries that indicate critical <b>failures</b> or <b>errors</b> by pattern matching and applying the anomalies command with a threshold of 0.03. It labels events based on their <b>unexpectedness</b> score to flag them as anomalous or boring for further investigation.</p>
quid = 5A4EEAA8D02B62F1C8D6F39A55B60D60
search_author = grdhg24
updated_author = khutchinson
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/anomalies">anomalies command documentation</a><br>Official Splunk documentation for the anomalies command, describing parameters and use cases.</li><li><a href="https://lantern.splunk.com/Security/Detection_and_Analysis/Anomaly_detection_in_logs">Anomaly Detection in Logs</a><br>Best practices and examples for using anomaly detection in Splunk log data.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eval">eval command documentation</a><br>Reference guide for the eval command including conditional logic and data manipulation.</li><li><a href="https://community.splunk.com/">Splunk Community</a><br>Forums, discussions, and troubleshooting help from the Splunk user community.</li><li><a href="https://splunkbase.splunk.com/app/3088/">Machine Learning Toolkit App on Splunkbase</a><br>App providing additional machine learning commands and models, including anomaly detection helpers.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search">Detect anomalies in your data</a><br>Splunk documentation tutorial for detecting anomalies using built-in commands.</li><li><a href="https://conf.splunk.com/">Splunk .conf Session Archive</a><br>Access past sessions on anomaly detection and log analysis from Splunk .conf events.</li></ul>
description = <p>Detects <b>anomalous</b> events in a given sourcetype using Splunk's anomalies command and evaluates unexpectedness against a defined <b>threshold</b>.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" (crit* OR fail* OR fatal OR except* OR err* OR status > 500) NOT success* OR NOT INFO OR NOT WARN \
| anomalies threshold=0.03 labelonly=true by sourcetype \
| search sourcetype="<<sourcetype>>" \
| eval threshold=0.03 \
| eval score=if(unexpectedness>=threshold, "anomalous", "boring")

