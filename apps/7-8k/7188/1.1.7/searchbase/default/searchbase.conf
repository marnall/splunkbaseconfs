	| stats avg(KB) by _time

[new_service_installation_on_windows]
search_name = Windows Security Event Log: Service Creation or Deletion Count by Date, Host, and Status
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>Monitoring service installation in a Windows environment is critical for detecting unauthorized configuration changes and ensuring adherence to IT security policies. This search helps identify instances of service creation and deletion, allowing quick action to address any anomalies.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Investigate any unauthorized service installations or deletions, particularly on high-value or critical hosts.<br> \
<b>2.</b> Correlate service changes with known patching or deployment activities to validate their legitimacy.<br> \
<b>3.</b> Configure alerts for recurring unusual patterns or unauthorized installations.<br> \
<b>4.</b> Review user accounts associated with service changes to confirm expected behavior.<br> \
<b>5.</b> Update IT operations policies to mitigate risks around service management and ensure proper SOC visibility.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security (EventCode=4697 OR EventCode=601)</code><br>       - This line is specifying the data source (Windows Security Event Log) and the event codes to search for (4697 or 601), which represent service installation events.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - This line is converting the event timestamp into a 'Year/Month/Day' format and assigning it to a new field called 'Date'.<br><b>03</b> <code>| eval Status=coalesce(Keywords,Type)</code><br>       - This line is creating a new field called 'Status' and assigning it the value of 'Keywords' or 'Type', whichever is available.<br><b>04</b> <code>| stats count by Date, Service_Name, Service_File_Name, Service_Account, host, Status</code><br>       - This line is aggregating the data and providing a count of these events, grouped by Date, Service Name, Service File Name, Service Account, Host, and Status.<br>
explanation = <p>This query can be used to <b>monitor and audit</b> service installation events in a Windows environment. It highlights potential security issues by surfacing any <b>unauthorized or suspicious installations</b> of new services that could indicate a <b>potential security breach</b> or non-compliance with IT policies.</p> \
	<p>On a technical note, the search starts by filtering the relevant Windows Security Event Log data and focuses on event codes <b>4697</b> and <b>601</b> which pertain to service installation activities. It uses <code>| eval</code> commands for field manipulations—converting timestamps into readable formats and assigning alternative values to a field called 'Status' for better categorization. Finally, the <code>| stats</code> command consolidates the results, providing a clean and structured view of the events grouped by the meaningful dimensions.</p>
quid = 1032A966BD25162E0291141163430827
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/new-service-installation-on-windows" target="_blank">https://gosplunk.com/new-service-installation-on-windows</a></p>
description = <p>Summarizes <b>Windows Security Event Log: Service Creation or Deletion Count by Date, Host, and Status</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4697 OR EventCode=601)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4697 OR EventCode=601)\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| eval Status=coalesce(Keywords,Type)\
	| stats count by Date, Service_Name, Service_File_Name, Service_Account, host, Status

[new_vulnerabilities_detected_since_last_scan_qualys]
