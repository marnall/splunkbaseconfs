solution = <p>This search provides <b>minute-by-minute network usage analysis</b>, enabling detailed performance monitoring and issue detection.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify time periods with abnormal network activity.<br><b>2.</b> Correlate network spikes with application or user activity.<br><b>3.</b> Use patterns for baseline establishment and anomaly detection.<br><b>4.</b> Investigate consistent high-usage periods for optimization opportunities.<br><b>5.</b> Set up alerts for sustained high network utilization.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=Perfmon:Network Interface</code><br>       - Specifies the data source as performance monitoring data for network interfaces.<br><b>02</b> <code>| bucket _time span=1m</code><br>       - Buckets data into 1-minute intervals, allowing for granular time-based analysis.<br><b>03</b> <code>| eval KB=(Value/1024)</code><br>       - Converts the 'Value' from bytes to kilobytes for easier interpretation.<br><b>04</b> <code>| stats avg(KB) by _time</code><br>       - Calculates the average kilobytes per minute, summarizing the network usage.<br>
explanation = <p>This query can be used to <b>monitor</b> network performance over time. By evaluating performance data in 1-minute intervals, it can help identify patterns or anomalies in network usage, which could indicate <b>issues</b> such as network congestion, high bandwidth usage, or potential <b>security threats</b>. This insight is particularly <b>valuable</b> for network administrators aiming to maintain optimal network performance and security.</p>
quid = 797107B3FFA5763668BE7CEC9403793E
search_author = GoSplunk: SplunkNinja
