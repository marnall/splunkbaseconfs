solution = <p>This search provides comprehensive network activity analysis for specific IP addresses, combining device information with geolocation data for security investigations.</p><p><b>Suggested Actions</b><br><b>1.</b> Review user network activity patterns for anomalies or suspicious behavior.<br><b>2.</b> Investigate high packet counts that may indicate data exfiltration.<br><b>3.</b> Verify geographic locations match expected user locations.<br><b>4.</b> Cross-reference MAC addresses with known device inventories.<br><b>5.</b> Document findings for incident response or compliance reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'index' and 'sourcetype' specify where the data is coming from.</ul><ul><b>02</b> The IP address is specified for the search.</ul><ul><b>03</b> The 'rex' command is used to extract the MAC ID and OS from the 'cisco_av_pair' field.</ul><ul><b>04</b> The 'rex' command is also used to extract the IP from the '_raw' field.</ul><ul><b>05</b> The 'iplocation' command adds geographical information to the IP.</ul><ul><b>06</b> The 'stats' command calculates the sum of input and output packets.</ul><ul><b>07</b> The results are grouped by several fields including time, user name, protocol, MAC ID, OS, and geographical information.</ul><ul><b>08</b> The 'rename' command is used to rename some fields for clarity.</ul><ul><b>09</b> The 'convert' command changes the time field to a more readable format.</ul><ul><b>10</b> The 'fields' command selects specific fields to display in the results.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor network traffic for a specific IP address. It can help identify patterns or anomalies in the data, such as unusually high packet counts, which could indicate a potential security threat. It can also provide useful information about the device and user associated with the IP, as well as their geographical location.</div></div>
quid = 69B47818980C54338915464DDD55BF92
search_author = GoSplunk: Opeyemi Olatunji
related_info = <p><a href="https://gosplunk.com/investigate-by-mac-ip-all-vpn-authentications-through-cisco_ise" target="_blank">https://gosplunk.com/investigate-by-mac-ip-all-vpn-authentications-through-cisco_ise</a></p>
description = <p>Summarizes <b>User Network Activity Analysis with Geolocation and OS Info</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" "<your IP>"| rex field="cisco_av_pair" "mdm-tlv=device-mac=(?<MAC_ID>\w+-\</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" "<your IP>"| rex field="cisco_av_pair" "mdm-tlv=device-mac=(?<MAC_ID>\w+-\w+-\w+-\w+-\w+-\w+)"\
	| rex field="cisco_av_pair" "mdm-tlv=device-platform=(?<OS>\w+)"\
	| rex field=_raw "(?<IP><IP regex>)"\
	| iplocation IP| stats c sum(Acct_Input_Packets) as Packets_In sum(Acct_Output_Packets) as Packets_Out by _time User_Name Framed_Protocol src_mac City Country Region IP MAC_ID OS Acct_Status_Type| rename _time as Time RequestLatency as LoadTime Acct_Status_Type as Status ```IP as <your choice>```\
	| convert ctime(Time)| fields + Time User_Name MAC_ID OS "SourceIP - DestIP" City Country Region Framed_Protocol Status Packets_Out Packets_In

[investigating_suspicious_process_executions_across_windows_endpoints]
search_name = Investigating Suspicious Process Executions Across Windows Endpoints
version = 1.0.4
date_created = 2025-05-05 11:04:00
date_updated = 2025-7-2 14:34:37
category = Threat Hunter's Cookbook
sub_category = Searching and Filtering
tags = Search Optimization,Windows Endpoints
solution = <p><span style="color: rgb(0, 0, 0); background-color: transparent;">Search the Processes dataset within the `</span><u style="color: rgb(17, 85, 204); background-color: transparent;"><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/security/cim/4.19.0/user/about-the-common-information-model">Endpoint` data model</a></u><span style="color: rgb(0, 0, 0); background-color: transparent;">, looking for events where the process name is either powershell.exe, wmic.exe, or cmd.exe. The search counts the occurrences of each of these processes by host and then groups the results by host and process name.</span></p><p>...(content truncated for brevity). To see all content download <a rel="noopener noreferrer" href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html">The Threat Hunter's Cookbook</a></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| datamodel Endpoint Processes search</code><br>       - Query the Endpoint data model for Processes dataset.<br><b>02</b> <code>| search Processes.process_name IN ("powershell.exe", "wmic.exe", "cmd.exe")</code><br>       - Filter for suspicious process names commonly used in attacks.<br><b>03</b> <code>| stats count by host, Processes.process_name</code><br>       - Count occurrences grouped by host and process name.<br>
explanation = <p><strong style="background-color: transparent; color: rgb(17, 85, 204);"><u><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/datamodel">datamodel</a></u></strong><span style="background-color: transparent; color: rgb(0, 0, 0);"> interacts with Splunk's existing </span><u style="background-color: transparent; color: rgb(17, 85, 204);"><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/knowledge-management/about-data-models">data models</a></u><span style="background-color: transparent; color: rgb(0, 0, 0);">, enabling efficient searches and analytics across large datasets by pre-defining schema and relationships.</span></p><p><br></p><p><span style="background-color: transparent; color: rgb(0, 0, 0);">| </span><span style="background-color: transparent; color: rgb(38, 98, 253);">datamodel</span><span style="background-color: transparent; color: rgb(0, 0, 0);"> [data_model_name] [<dataset name>] [<data model search mode>] [</span><span style="background-color: transparent; color: rgb(101, 167, 55);">strict_fields</span><span style="background-color: transparent; color: rgb(0, 0, 0);">=<bool>] [</span><span style="background-color: transparent; color: rgb(101, 167, 55);">allow_old_summaries</span><span style="background-color: transparent; color: rgb(0, 0, 0);">=<bool>] [</span><span style="background-color: transparent; color: rgb(101, 167, 55);">summariesonly</span><span style="background-color: transparent; color: rgb(0, 0, 0);">=<bool>]</span></p><p><br></p><p><span style="background-color: transparent; color: rgb(0, 0, 0);">Note: Search optimization can be further enhanced by </span><u style="background-color: transparent; color: rgb(17, 85, 204);"><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/knowledge-management/accelerate-data-models">accelerating your data models</a></u><span style="background-color: transparent; color: rgb(0, 0, 0);"> and  interacting with your data through </span><strong style="background-color: transparent; color: rgb(17, 85, 204);"><u><a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/tstats">tstats</a></u></strong><span style="background-color: transparent; color: rgb(0, 0, 0);">!</span></p>
quid = AB94D87CCF1537971CC21DB5E147B34F
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p><b>Problem: </b></p><p>You need to <b>investigate</b> suspicious process executions across your Windows endpoints but process data is spread across multiple sources. </p>
search = | datamodel Endpoint Processes search \
	| search Processes.process_name IN ("powershell.exe", "wmic.exe", "cmd.exe") \
	| stats count by host, Processes.process_name

[ips_traffic_increase_1]
search_name = Network IDS Attacks Outlier Detection in Last 10 Minutes
search_hidden = 0
category = Security
sub_category = Health
tags = GoSplunk
solution = <p>This search provides <b>actionable security intelligence</b> by identifying destinations experiencing spikes in IDS activity that deviate significantly from baseline patterns. Such anomalies could signify an active attack or a system fault requiring immediate attention.</p><p><b>Suggested Actions</b><br><b>1.</b> Verify flagged destinations for legitimate activity in logs.<br><b>2.</b> Contact affected users or teams to confirm non-malicious activity.<br><b>3.</b> Investigate traffic patterns and network behavior prior to anomaly detection.<br><b>4.</b> Assess and patch potentially vulnerable systems targeting flagged destinations.<br><b>5.</b> Review IDS configuration and data model mapping to ensure accuracy.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/firewalls/index.html" target="_blank">Products: Cisco Secure Firewall</a><br>Cisco Secure Firewall.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>search sourcetype="<<sourcetype>>"</code><br>       - Identify IDS data relevant to network attacks.<br><b>02</b> <code>| tstats ... datamodel=Intrusion_Detection.IDS_Attacks where IDS_Attacks.ids_type="network"</code><br>       - Extract IDS attack data specific to network events from the data model.<br><b>03</b> <code>| stats count by IDS_Attacks.dest,_time</code><br>       - Aggregate IDS attack counts by destination and time in 10-minute intervals.<br><b>04</b> <code>| eval threshold=relative_time(now(),"-10m")</code><br>       - Create a variable calculating the current system time minus 10 minutes, setting the calculation threshold.<br><b>05</b> <code>| stats ... as latest</code><br>       - Determine the count of IDS attacks in the most recent 10-minute period.<br><b>06</b> <code>| stats avg ..., stdev ... as stdev</code><br>       - Compute the average and standard deviation of IDS attack counts before the threshold.<br><b>07</b> <code>| eval outlier=if(latest > avg + (3 * stdev), "yes", "no")</code><br>       - Identify destinations with IDS attack counts exceeding the threshold as outliers.<br><b>08</b> <code>| search outlier="yes"</code><br>       - Filter results to highlight only flagged outliers.<br>
explanation = <p>This query leverages Splunk's tstats command to efficiently extract IDS attack data from the Intrusion_Detection.IDS_Attacks data model, focusing only on network-related events. The counts are grouped by destination and calculated within 10-minute intervals. By computing the average and standard deviation for attack counts prior to a defined threshold, the query pinpoints destinations with unusually high activity (more than three standard deviations above average). Outliers might indicate critical security events such as network attack attempts or a misconfigured IDS, enabling security teams to respond quickly to potential threats and incidents. <b>Technical Insight:</b> The use of eval functions allows dynamic thresholds to adapt to time-based comparisons, while the stats aggregations summarize and isolate anomalies effectively.</p>
quid = 72DAFB047E882589370C628F6E4D42BA
search_author = GoSplunk: SplunkMasterFlex
related_info = <p><a href="https://gosplunk.com/ips-traffic-increase" target="_blank">https://gosplunk.com/ips-traffic-increase</a></p>
description = <p>Summarizes <b>Network IDS Attacks Outlier Detection in Last 10 Minutes</b> using <code>sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = sourcetype="<<sourcetype>>"\
| `tstats` count from datamodel=Intrusion_Detection.IDS_Attacks where IDS_Attacks.ids_type="network" by IDS_Attacks.dest,_time span=10m\
| stats count by IDS_Attacks.dest,_time\
| eval threshold=relative_time(now(),"-10m")\
| stats max(eval(if(_time>=threshold, count null()))) as latest\
| stats avg(eval(if(_time<threshold, count null()))) as avg\
| stats stdev(eval(if(_time<threshold, count null()))) as stdev by IDS_Attacks.dest\
| eval outlier=if((latest>(avg+(3*stdev))), "yes", "no")\
| search outlier="yes"

[isolating_rare_events_and_values]
search_name = Isolating Rare Events And Values
version = 1.0.5
date_created = 2025-05-05 11:02:09
date_updated = 2025-7-2 14:46:55
category = Threat Hunter's Cookbook
