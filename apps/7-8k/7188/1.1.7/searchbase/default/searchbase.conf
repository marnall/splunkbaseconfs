dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index="_internal" source="*metrics.log" group="search_concurrency" user=*</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve data from <b>metrics.log</b> file that tracks search concurrency behavior filtered for the group that pertains to realtime search counts.<br><b>02</b> <code>| timechart sum(active_realtime_searches) as concurrent_searches by user</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates and shows active realtime search usage by user over time.<br><br>
explanation = <p>This search monitors concurrent realtime search counts by user by analyzing metric data from the <b>_internal</b> index and focuses on the "search_concurrency" group for realtime searches. Realtime searches consume significantly more resources compared to historical searches, which makes defining and enforcing limits vital for system performance and stability.</p><p>Users who often exceed these limits can be identified with the output of this query, enabling teams to prioritize education or enforce search behavior rules. This also helps with capacity planning and ensuring fair resource utilization among all users. By leveraging fields such as <b>active_realtime_searches</b> and using a timechart to display trends over time, teams get actionable insights into user-specific behaviors and overall system health.</p><p>Data from this search empowers administrators to reinforce appropriate usage patterns, adjust limits as needed, and align resource policies with operational priorities.</p>
