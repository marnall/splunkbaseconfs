[groundspeed_violation_improbable_access]
search_name = Detecting User's Unusual Network Activity Based on Speed and Location
search_hidden = 0
category = Infrastructure
sub_category = Networking
tags = GoSplunk,SecOps
solution = <p>This query helps identify unusual or potentially fraudulent user activity by calculating whether a user has traveled an <b>implausible distance</b> in a short timeframe, using login data enriched with geographical details. This can uncover compromised accounts or malicious access attempts.</p> \
<p><b>Suggested Actions</b><br><b>1.</b> Investigate flagged events for signs of account compromise or unauthorized use.<br><b>2.</b> Confirm suspicious logins with the user to validate access.<br><b>3.</b> Utilize Multi-Factor Authentication (MFA) to add an additional layer of security for vulnerable accounts.<br><b>4.</b> Continuously monitor such activity for emerging trends and patterns.<br><b>5.</b> Use the calculated metrics to notify security personnel in real-time, enabling swift response.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Searches the specified index for events of the relevant sourcetype.<br> \
	<b>02</b> <code>| eventstats dc(src) as src_count by user</code><br>       - Counts distinct source IP addresses (src) per user.<br> \
	<b>03</b> <code>| search src_count>1</code><br>       - Filters for users with more than one distinct source IP address.<br> \
	<b>04</b> <code>| sort 0 + _time</code><br>       - Sorts events in ascending order based on time.<br> \
	<b>05</b> <code>| iplocation src</code><br>       - Retrieves geographical location (latitude and longitude) of each source IP address.<br> \
	<b>06</b> <code>| where isnotnull(lat) AND isnotnull(lon)</code><br>       - Filters events where latitude and longitude are not null.<br> \
	<b>07</b> <code>| streamstats window=2 earliest(lat) as prev_lat, ... by user</code><br>       - Computes a windowed set of previous event data for distance and speed calculations.<br> \
	<b>08</b> <code>| where (src != prev_src)</code><br>       - Filters events where the source IP has changed between consecutive logins.<br> \
	<b>09</b> <code>| eval distance= ... speed= ...</code><br>       - Calculates geographical distance and speed (mph) of travel between consecutive login events.<br> \
	<b>10</b> <code>| where (speed > 500)</code><br>       - Flags events where calculated travel speed exceeds 500 mph.<br> \
	<b>11</b> <code>| eval prev_time= ...</code><br>       - Formats previous event time for better readability.<br> \
	<b>12</b> <code>| table user, src, ...</code><br>       - Displays final output fields in a clean and structured format.<br>
explanation = <p>This query can be instrumental in cybersecurity, particularly in monitoring for <b>potential account compromises</b>. It focuses on identifying cases where a user's account is accessed from <b>disparate geographical locations</b> within a short span of time, which could signify unauthorized or malicious access. </p> \
	<p>The query uses a combination of data enrichment (via the <code>iplocation</code> command to derive geographical details of source IPs), field calculations (geographical distance and speed between logins), and conditional filtering (flagging anomalous speeds) to identify improbable access. For example, the <code>eventstats</code> command determines the count of distinct source IPs per user, offering a quick heuristic for irregular patterns. The speed calculation leverages trigonometric functions to compute distance, adding rigor to the detection process.</p> \
	<p>Detecting high-speed travel based on login events at disparate latitudes and longitudes offers a unique way to spot anomalies in real-time, thereby enhancing <b>security monitoring</b> capabilities for network administrators and security operation teams.</p>
quid = 85B08A477AB37B76790219BEFAACE273
search_author = GoSplunk: riparino
related_info = <p><a href="https://gosplunk.com/groundspeed-violation-improbable-access" target="_blank">https://gosplunk.com/groundspeed-violation-improbable-access</a></p>
description = <p>Summarizes <b>Detecting User's Unusual Network Activity Based on Speed and Location</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" (typically network)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" (typically network)\
| eventstats dc(src) as src_count by user\
| search src_count>1\
| sort 0 + _time\
| iplocation src\
| where isnotnull(lat) AND isnotnull(lon)\
| streamstats window=2 earliest(lat) as prev_lat, earliest(lon) as prev_lon, earliest(_time) as prev_time, earliest(src) as prev_src, earliest(City) as prev_city, earliest(Country) as prev_country, earliest(app) as prev_app by user\
| where (src != prev_src)\
| eval lat1_r=((lat * 3.14159265358) / 180), lat2_r=((prev_lat * 3.14159265358) / 180), delta=(((prev_lon - lon) * 3.14159265358) / 180), distance=(3959 * acos(((sin(lat1_r) * sin(lat2_r)) + ((cos(lat1_r) * cos(lat2_r)) * cos(delta))))), distance=round(distance,2)\
| fields - lat1_r, lat2_r, long1_r, long2_r, delta\
| eval time_diff=if(((_time - prev_time) == 0),1,(_time - prev_time)), speed=round(((distance * 3600) / time_diff),2) \
| where (speed > 500)\
| eval prev_time=strftime(prev_time,"%Y-%m-%d %H:%M:%S")\
| table user, src, _time, City, Country, app, prev_src, prev_time, prev_city, prev_country, prev_app, distance, speed

