description = <p>Summarizes <b>Indexer CPU Utilization</b> using <code>index=_introspection source="/opt/splunk/var/log/introspection/resource_usage.log" component=Hostwide</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
