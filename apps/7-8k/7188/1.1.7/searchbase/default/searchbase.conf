execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (Relative_Target_Name!="\\\""" Relative_Target_Name!="*.ini") user!="*$"</code><br>       - Filters Windows Event Logs for non-system user actions on non-INI files.<br><b>02</b> <code>| bucket span=1d _time</code><br>       - Groups events into daily intervals.<br><b>03</b> <code>| stats count by Relative_Target_Name, user, _time, status</code><br>       - Aggregates the daily events, counting occurrences by key attributes.<br><b>04</b> <code>| rename _time as Day</code><br>       - Renames the time field to 'Day' for clarity.<br><b>05</b> <code>| convert ctime(Day)</code><br>       - Converts the 'Day' field into a more readable date format.<br>
explanation = <p>This search is aimed at analyzing Windows Event Logs to uncover conditions tied to specific user actions and file access instances. By filtering out less-relevant data, such as events involving system accounts or .ini files, it narrows focus to impactful user behavior and file access patterns. The <code>bucket</code> command groups events into daily intervals, facilitating trend analysis or anomaly detection. The <code>stats</code> command aggregates these events, showing their distribution by target name, user, time, and event status.</p> \
	<p>This approach supports <b>security audits</b> by providing an actionable overview of access patterns, helping analysts pinpoint unusual activities or inconsistencies, like unauthorized file interactions or non-standard user actions. The transformation of the <code>_time</code> field to 'Day' enhances readability, making the output immediately useful for reports.</p>
quid = FEC523E63A60B9BFA34E6D1FDCBD3A68
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/successful-file-access-attempts-and-filename-accessed" target="_blank">https://gosplunk.com/successful-file-access-attempts-and-filename-accessed</a></p>
description = <p>Summarizes <b>Daily Count of Non-System User Actions on Non-INI Files</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (Relative_Target_Name!="\\\""" Relative_Target_Na</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (Relative_Target_Name!="\\\""" Relative_Target_Name!="*.ini") user!="*$"\
