execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=linux_secure</code><br>       - Define the data source by specifying the index and sourcetype.<br><b>02</b> <code>| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s\S+\s(?<session>gdm-\w+)\S:\s"</code><br>       - Extract the 'session' field to filter GDM-related events.<br><b>03</b> <code>| search session=gdm-password</code><br>       - Focus on GDM password authentication sessions.<br><b>04</b> <code>| rex "\w{3}\s\d{1,2}\s\d{2}:\d{2}:\d{2}\s(?<hostname>\S+)\s.+\Sgdm-password:auth\S:\s(?<authstatus>\w+\s\w+);\s.+user=(?<username>\S+)"</code><br>       - Parse log details to extract 'hostname', 'authstatus', and 'username'.<br><b>05</b> <code>| search authstatus="authentication success"</code><br>       - Filter only successful authentication events.<br><b>06</b> <code>| timechart count(username)</code><br>       - Aggregate the count of successful authentications per user over time.</p>
explanation = <p>This search extracts and analyzes log data from the Linux GDM authentication system, focusing on successful password-based logins. By leveraging <b>regular expressions (rex)</b>, it parses key fields such as <code>session</code>, <code>hostname</code>, and <code>username</code>, isolating events with the status <b>"authentication success"</b>. This provides administrators with granular visibility into <b>user-level login patterns</b> and aids in identifying potential trends or anomalies in access behavior. The final <code>timechart</code> command aggregates successful authentications by username, organized in a time-based series for clear analysis.</p>
quid = BCCDCDFCB24735E2BA2B84888AE47DC5
search_author = grdhg24
updated_author = khutchinson
description = <p>This search provides a count of <b>successful GDM password authentications</b> occurring over time, broken down by username. It highlights <b>user-level authentication trends</b> in Linux systems, offering <b>valuable insights</b> for monitoring access attempts.</p>
