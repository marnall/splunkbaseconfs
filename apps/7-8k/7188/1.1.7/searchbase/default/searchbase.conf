| eval cidr=start_ip_oct . "/" . mask_cidr\
| table start_ip_oct, end_ip_oct, cidr

[blocked_firewall_scanning_activity_with_indicator_if_source_has_been_allowed]
search_name = Blocked External IP Traffic Analysis and Allowed Traffic Check
search_hidden = 0
category = Infrastructure
sub_category = Networking
tags = GoSplunk,SecOps
solution = <p>By running this query, analysts can identify and correlate <b>malicious blocked activity</b> with the likelihood of those same sources having allowed access. This offers critical insights into the behavior and interactions of non-local IPs with the firewall, enabling a focused review of policies and configurations to minimize risk exposure.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate source IPs with multiple blocked attempts and their geographic origins for potential threat indicators.<br><b>2.</b> Review firewall policies to ensure that no unintended permissions allow malicious traffic.<br><b>3.</b> Cross-validate allowed traffic sources with threat intelligence sources for legitimacy.<br><b>4.</b> Tighten suspicious port scanning and traffic rules to block malicious activities more effectively.<br><b>5.</b> Set up monitoring alerts for trends in blocked traffic and escalation patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/firewalls/index.html" target="_blank">Products: Cisco Secure Firewall</a><br>Cisco Secure Firewall.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="opnsense:filterlog" action=block src_ip!=192.168.0.0/16</code><br>       - Start by filtering OPNsense logs for blocked traffic from non-local IPs.<br><b>02</b> <code>| iplocation src_ip</code><br>       - Enrich the data with geographic details about each source IP.<br><b>03</b> <code>| fillnull value=null Country</code><br>       - Replace null values in the "Country" field with "null" for clarity.<br><b>04</b> <code>| stats count by src_ip dest_port Country</code><br>       - Aggregate blocked attempts by source IP, destination port, and country to detect patterns.<br><b>05</b> <code>| eval dest_port_bar="".count." attempts on port "+dest_port</code><br>       - Create a descriptive string summarizing port-specific attempts.<br><b>06</b> <code>| stats list(dest_port_bar) as "Ports" dc(dest_port) as "Number of Ports scanned" sum(count) as Total by src_ip Country</code><br>       - Summarize data further into total attempts, distinct destination ports, and port-specific attempt details.<br><b>07</b> <code>| sort - "Number of Ports scanned"</code><br>       - Organize results to prioritize IPs scanning multiple ports.<br><b>08</b> <code>| join src_ip type=left [search index="<<index>>" sourcetype="opnsense:filterlog" action=pass src_ip!=192.168.0.0/16 ...]</code><br>       - Use a sub-search to find allowed traffic from the same source IPs, and join the results.<br><b>09</b> <code>| eval Allowed_Traffic=if(in(action, "pass"),"Yes","No")</code><br>       - Add a field indicating whether traffic from a source IP was allowed ("Yes") or not ("No").<br><b>10</b> <code>| table Allowed_Traffic src_ip</code><br>       - Display the source IP and whether it has any allowed traffic.<br><b>11</b> <code>| fillnull value=No Allowed_Traffic</code><br>       - Replace null values in "Allowed_Traffic" with "No" for clarity.<br>
explanation = <p>This search uncovers potential <b>security threats</b> by analyzing blocked traffic and identifying source IPs that attempt to scan multiple ports. These activities often signify malicious intent, such as a port-scanning attack. The search leverages the `iplocation` command to add geographical context, helping the analyst assess the distribution of threats based on their origin. Additionally, the second part of the search cross-references blocked IPs with allowed traffic logs, creating insights into whether these potentially blocklisted sources have managed to send legitimate traffic. Identifying such events is crucial for evaluating the <b>efficacy of firewall rules</b> and detecting possible misconfigurations or compromises.</p>
quid = 1B77DE2973E3372D4191439DBD343F5D
search_author = GoSplunk: thall
related_info = <p><a href="https://gosplunk.com/blocked-firewall-scanning-activity-with-indicator-if-source-has-been-allowed" target="_blank">https://gosplunk.com/blocked-firewall-scanning-activity-with-indicator-if-source-has-been-allowed</a></p>
description = <p>Summarizes <b>Blocked External IP Traffic Analysis and Allowed Traffic Check</b> using <code>index="<<index>>" sourcetype="opnsense:filterlog" action=block src_ip!=192.168.0.0/16</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="opnsense:filterlog" action=block src_ip!=192.168.0.0/16\
| iplocation src_ip\
| fillnull value=null Country\
| stats count by src_ip dest_port Country\
| eval dest_port_bar="".count." attempts on port "+dest_port\
| stats list(dest_port_bar) as "Ports" dc(dest_port) as "Number of Ports scanned" sum(count) as Total by src_ip Country\
| sort - "Number of Ports scanned"\
| join src_ip type=left [\
| search index="<<index>>" sourcetype="opnsense:filterlog" action=pass src_ip!=192.168.0.0/16\
| eval Allowed_Traffic=if(in(action, "pass"),"Yes","No")\
| table Allowed_Traffic src_ip]\
| fillnull value=No Allowed_Traffic

[bounce_rate]
search_name = User Behavior Analysis Based on Page Visits
version = 1.0.3
date_updated = 2023-12-18 18:44:21
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,SFU
solution = <p>This query provides web teams with <b>operational insights</b> into user engagement patterns. By analyzing session data, it highlights areas of user interaction and drop-off, which are vital for improving website performance and user satisfaction.</p> <p><b>Suggested Actions</b><br> <b>1.</b> Use the results to identify areas of the website with low user engagement and apply improvements.<br> <b>2.</b> Focus content refinement on popular user categories to retain high engagement.<br> <b>3.</b> Investigate causes of low engagement in "Bounced" sessions and address them.<br> <b>4.</b> Optimize navigation and design elements for users falling into the "2-5 pages" category.<br> <b>5.</b> Collaborate with marketing to develop targeted campaigns for high-engagement user groups.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="access*"</code><br>       - Specifies the data source from the index and filters events with sourcetype starting with "access".<br> <b>02</b> <code>| transaction clientip maxpause=1h keepevicted=t mvlist=t</code><br>       - Groups events by 'clientip' to form user sessions. Ensures even incomplete sessions are included for comprehensive analysis.<br> <b>03</b> <code>| eval user_type=case(eventcount=1,"Bounced", eventcount<=5,"2-5 pages", eventcount<=10,"6-10 pages")</code><br>       - Categorizes users by the number of page views in a session, reflecting varying levels of engagement.<br> <b>04</b> <code>| top limit=5000 user_type</code><br>       - Provides the top 5000 most frequent user behavior categories, aiding in trend identification.<br>
explanation = <p>This search serves as a tool for understanding user engagement on a website through web access logs. By grouping events into transactions, it determines the level of user interaction based on the number of pages visited in a session. The steps include:</p> <p><b>Transaction Command:</b> Groups events by 'clientip' with a session window of 1 hour to define user sessions. The `keepevicted` parameter ensures that incomplete sessions are included, and `mvlist` retains multivalue fields for more detailed analysis.</p> <p><b>Eval Command:</b> Classifies users into categories based on their page view counts, which reflects their level of engagement—e.g., a "Bounced" user denotes minimal engagement, while a "6-10 pages" user shows a higher degree of interaction.</p> <p><b>Top Command:</b> Lists the most frequent user behavior categories up to 5000 results, making it easy to identify common engagement patterns, useful for optimizing content and user experience strategies.</p> <p>This query is <b>critical</b> for web administrators and marketing teams aiming to enhance website design, improve user experience, and boost user retention.</p>
quid = 4D7AD8C2B6CAC6F07074F0E731F4B892
search_author = grdhg24
updated_author = khutchinson
related_info = <ul> <li><a href="https://www.youtube.com/watch?v=_3yDDzKddwQ" target="_self">Splunk Fundamentals: Web Server Data</a></li> <li><a href="https://lantern.splunk.com/Splunk_Platform/UCE/Technology%2C_Communications%2C_and_Media/Managing_web_server_performance/Web_access_and_web_error_log_correlation" target="_self">Web Access and Web Error Log Correlation (Lantern)</a></li> <li><a href="https://www.splunk.com/en_us/products/observability.html" target="_self">Splunk Observability Solutions</a></li> </ul>
description = <p>Summarizes <b>User Behavior Analysis Based on Page Visits</b> using <code>index="<<index>>" sourcetype="access*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="access*"\
| transaction clientip maxpause=1h keepevicted=t mvlist=t\
| eval user_type=case (eventcount=1,"Bounced", eventcount<=5, "2-5 pages", eventcount<=10, "6-10 pages")\
| top limit=5000 user_type

