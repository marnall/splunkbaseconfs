execution_plan = <b>01</b> <code>index=_audit action=search info=completed search_id!=*rsa_scheduler_* search_id!=*subsearch* is_realtime=0</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter for relevant searches in the audit index excluding subsearches and realtime execution.<br> <b>02</b> <code>| stats latest(total_run_time) as total_run_time, latest(scan_count) as scan_count, latest(event_count) as event_count, latest(result_count) as result_count by savedsearch_name, search_id</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Gather the latest metrics per saved search.<br> <b>03</b> <code>| search saved
explanation = <p>This search extracts and aggregates specific performance metrics for ES correlation searches that end in "- Rule." The metrics include execution success counts, total runtime, and runtime percentiles (min, avg, p90, max), alongside scanning efficiency indicators like processed event and result counts. This information is crucial for Splunk administrators looking to maintain a performant and efficient ES environment. By identifying searches with excessive total runtime or event processing, administrators can prioritize optimization efforts. The explicit segmenting of performance metrics aids in pinpointing bottlenecks or anomalies over the recent data retention window (<b>-7d@d</b> through <b>now</b>).</p><p>Additionally, this search empowers junior Splunkers to understand advanced SPL constructs like <b>stats</b> for aggregation, <b>eval</b> for numerical rounding, and <b>fillnull</b> for handling missing data fields, providing a foundational structure for building impactful Splunk use cases.</p><p>In effect, this query enables visibility into operational efficacy, highlighting areas that necessitate configuration updates or resource reallocation, ensuring long-term stability and optimal response timing for critical correlation rules.</p>
quid = 4E7D8A4F3B8C9E2A1F6D5C8B7A9E3F1C
search_author = Splunk Works
description = <p>Summarizes <b>Correlation Search Performance Details</b> using <code>index=_audit action=search info=completed search_id!=*rsa_scheduler_* search_id!=*subsearch* is_realtime=0 | stats lates</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li><li><a href="https://www.splunk.com/en_us/get-started/enterprise.html" target="_blank">Products: Getting started guide for Splunk Enterprise</a><br>Getting started guide for Splunk Enterprise.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li></ul>
search = index=_audit action=search info=completed search_id!=*rsa_scheduler_* search_id!=*subsearch* is_realtime=0 | stats latest(total_run_time) as total_run_time, latest(scan_count) as scan_count, latest(event_count) as event_count, latest(result_count) as result_count by savedsearch_name, search_id | search savedsearch_name="*- Rule" | fillnull value=0 | stats count as success_count, sum(total_run_time) as total_run_time, min(total_run_time) as min_run_time, avg(total_run_time) as avg_run_time, p90(total_run_time) as p90_run_time, max(total_run_time) as max_run_time, avg(scan_count) as avg_scan_count, avg(event_count) as avg_event_count, avg(result_count) as avg_result_count by savedsearch_name | eval "Total Runtime"=round(total_run_time,2) | eval "Minimum Runtime"=round(min_run_time,2) | eval "Average Runtime"=round(avg_run_time,2) | eval "p90 Runtime"=round(p90_run_time,2) | eval "Maximum Runtime"=round(max_run_time, 2) | eval "Average Scan Count"=round(avg_scan_count,2) | eval "Average Event Count"=round(avg_event_count,2) | eval "Average Result Count"=round(avg_result_count,2) | rename success_count as "Success Count" | table savedsearch_name "Total Runtime" "Minimum Runtime" "Average Runtime" "p90 Runtime" "Maximum Runtime" "Average Scan Count" "Average Event Count" "Average Result Count" "Success Count" | sort -"Total Runtime"

[pi_sm_correlation_search_resource_usage]
search_name = Correlation Search Resource Usage
version = 2.x
date_created = 2025-12-04
category = Performance Monitoring
sub_category = Server
tags = CPU,Correlation Search,Memory
solution = <p>This search identifies resource-intensive correlation searches, making it easier to optimize rule configurations for Enterprise Security deployment, reduce system overhead, and maintain operational stability.</p><p><b>Suggested Actions</b></p><p><b>1.</b> Analyze resource-heavy correlation searches for optimization opportunities.<br><b>2.</b> Investigate and minimize lookup and statistical computation complexity in highlighted searches.<br><b>3.</b> Adjust the frequency or time range of resource-intensive searches.<br><b>4.</b> Consider hardware or scaling adjustments if required.<br><b>5.</b> Collaborate with system design teams to align resource allocation with search workload requirements.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index=_introspection component=PerProcess</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Fetches process metrics from the introspection index for real-time resource usage analysis.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Simplifies field names by renaming for better readability.<br><b>03</b> <code>| eval saved
explanation = <p>This search analyzes resource consumption patterns for Enterprise Security correlation searches by separating CPU and memory usage between indexer-tier and search head-tier processing. Correlation searches often involve <b>complex joins</b>, <b>statistical operations</b>, and <b>lookups</b> that can consume significant resources on both tiers.</p><p>By tracking average CPU percentage and maximum memory usage per correlation search, security administrators can identify resource-intensive rules requiring optimization. The results provide insight into the distribution of <b>processing load</b> across the search architecture and help inform decisions on resource allocation for the correlation search engine.</p><p>High resource consumption may indicate opportunities for search optimization, lookup reduction, or time range adjustments. This search is valuable for ensuring that resources are utilized effectively and containable within expected thresholds for enhanced operational stability.</p><p>The search demonstrates key SPL practices, teaching the importance of <b>data normalization</b>, <b>conditional logic</b> with eval, and using <b>stats</b> for aggregation to efficiently monitor and optimize system performance.</p>
quid = 1B6E9F4D2A8C5E3F7D9A4B8E2F7C5D3A
search_author = Splunk Works
description = <p>Summarizes <b>Correlation Search Resource Usage</b> using <code>index=_introspection component=PerProcess | rename data.* as * | rename search_props.* as * | eval savedsearch_name=if(i</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_introspection component=PerProcess | rename data.* as * | rename search_props.* as * | eval savedsearch_name=if(isnull(label),"",label) | eval idx_cpu = if(role=="peer", pct_cpu,0) | eval idx_memory = if(role=="peer", mem_used,0) | eval sh_cpu = if(role=="head", pct_cpu,0) | eval sh_memory = if(role=="head", mem_used,0) | stats latest(idx_cpu) as idx_cpu, latest(sh_cpu) as sh_cpu, latest(idx_memory) as idx_memory, latest(sh_memory) as sh_memory by savedsearch_name, process_type, type | search process_type="search" | search type="scheduled" | search savedsearch_name="*- Rule" | stats avg(idx_cpu) as avg_idx_cpu, avg(sh_cpu) as avg_sh_cpu, max(idx_memory) as max_idx_memory, max(sh_memory) as max_sh_memory by savedsearch_name | fillnull value=0 | eval avg_idx_cpu=round(avg_idx_cpu,2)."%" | eval avg_sh_cpu=round(avg_sh_cpu,2)."%" | eval max_idx_memory=round(max_idx_memory,2) | eval max_sh_memory=round(max_sh_memory,2) | sort -avg_idx_cpu

