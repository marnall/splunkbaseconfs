search_name = Windows Security Log: Console Lock Duration by User and Date
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,SFU
solution = <p>This query enables IT administrators and security teams to analyze console lock activity on Windows machines. By identifying periods of inactivity, potential security lapses, or inefficient resource usage can be addressed.</p><p><b>Suggested Actions</b><br><b>1.</b> Review anomalous lock durations for any unexpected inactivity patterns.<br><b>2.</b> Investigate accounts or hosts with unusually long lock periods.<br><b>3.</b> Use insights to identify opportunities for improving system utilization.<br><b>4.</b> Correlate lock durations with other security or operational metrics for comprehensive analysis.<br><b>5.</b> Incorporate this data into regular security audits and reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security (EventCode=4800 OR EventCode=4801)</code><br>       - Filters Windows Security log events to only include the start and end of console lock actions.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts the event’s timestamp to a user-friendly date format for better readability.<br><b>03</b> <code>| transaction host Account_Name startswith=EventCode=4800 endswith=EventCode=4801</code><br>       - Groups the events by host and account, calculating the total console lock duration.<br><b>04</b> <code>| eval duration = duration/60</code><br>       - Converts the lock duration from seconds to minutes.<br><b>05</b> <code>| eval duration=round(duration,2)</code><br>       - Rounds the duration to two decimal points for precision.<br><b>06</b> <code>| table host, Account_Name, duration, Date</code><br>       - Outputs the results in a table with meaningful columns for analysis.<br><b>07</b> <code>| rename duration as "Console Lock Duration in Minutes"</code><br>       - Renames the duration column to make it more descriptive.<br><b>08</b> <code>| sort - date</code><br>       - Sorts the results by date in descending order to prioritize recent events.<br>
explanation = <p>This search provides insights into user activity on Windows machines by calculating the duration of console locks. It uses event codes 4800 (lock start) and 4801 (lock end), combining them through a transaction command to determine the total time of inactivity. The duration is then converted from seconds to minutes, rounded for clarity, and presented in a structured table format. Administrators can utilize this query for auditing purposes, detecting potential security risks, and identifying inefficient use of resources. It effectively supports monitoring and compliance for IT operations.</p>
quid = E7C233480F8F123D21A58CCFEDF3F0F5
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Windows Security Log: Console Lock Duration by User and Date</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4800 OR EventCode=4801)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=4800 OR EventCode=4801)\
| eval Date=strftime(_time, "%Y/%m/%d")\
| transaction host Account_Name startswith=EventCode=4800 endswith=EventCode=4801\
| eval duration = duration/60\
| eval duration=round(duration,2)\
| table host, Account_Name, duration, Date\
| rename duration as "Console Lock Duration in Minutes"\
| sort - date

