[list_of_legitimate_account_names_in_windows]
search_name = Windows Security Logon Events Count by User Account
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This search enables system administrators and security teams to monitor access patterns and detect anomalies in Windows logon behavior. Elevated logon activity for certain accounts could flag potential security risks, such as brute force attacks or compromised credentials.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate accounts with unusually high logon counts for potential brute force attempts.<br><b>2.</b> Validate the legitimacy of high-frequency user activity to ensure compliance.<br><b>3.</b> Correlate findings with other security logs to identify suspicious events or patterns.<br><b>4.</b> Implement multi-factor authentication for accounts to mitigate unauthorized access.<br><b>5.</b> Review user permissions to enforce the principle of least privilege.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:security</code><br>       - This line specifies the data source, searching the designated index for logs from the Windows Security Event Log.<br><b>02</b> <code>(Logon_Type=2 OR Logon_Type=7 OR Logon_Type=10) (EventCode=528 OR EventCode=540 OR EventCode=4624)</code><br>       - This filters the security log for events corresponding to specific logon types and event codes relevant to logon activities.<br><b>03</b> <code>| rex "New\sLogon:\s+.*\s+Account\sName:\s+(?<UserName>\s+)"</code><br>       - This extracts usernames from the logon event data using a regular expression.<br><b>04</b> <code>| eval Account=coalesce(User_Name,UserName)</code><br>       - Combines or selects between two username fields into a unified `Account` field.<br><b>05</b> <code>| stats count by Account</code><br>       - Counts the occurrences of each unique `Account` value to tally logon events per user.<br><b>06</b> <code>| sort - count</code><br>       - Sorts the results in descending order based on the frequency of logon events.<br>
explanation = <p>This search provides visibility into user activity on a Windows system by analyzing specific security log events. It focuses on critical logon types (2, 7, 10) and event codes (528, 540, 4624), which correspond to interactive, unlock, and remote logon types. These logon types are vital for auditing access to resources and detecting potential anomalies.</p><p>Using a <b>regular expression</b>, the search extracts account names from the log events. The <b>eval</b> command then standardizes the username field to improve accuracy. Subsequently, these accounts are counted to highlight user activity volumes. Sorting the results by counts helps identify active or suspicious accounts, enabling administrators to detect unusual patterns that could signal threats, such as brute force attempts.</p>
quid = EC8AA4A5928E9D697C6495E1E4F7175A
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
description = <p>Summarizes <b>Windows Security Logon Events Count by User Account</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (Logon_Type=2 OR Logon_Type=7 OR Logon_Type=10) (</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (Logon_Type=2 OR Logon_Type=7 OR Logon_Type=10) (EventCode=528 OR EventCode=540 OR EventCode=4624)\
	| rex "New\sLogon:\s+.*\s+Account\sName:\s+(?<UserName>\s+)"\
	| eval Account=coalesce(User_Name,UserName)\
	| stats count by Account\
	| sort - count

