[top_10_most_vulnerable_systems_tenable]
search_name = Top 10 Vulnerable Hosts with BaseScore > 3 in Tenable Data
search_hidden = 0
category = Security
sub_category = Threat Detection
tags = GoSplunk,SecOps
solution = <p>This query provides an essential list of the most vulnerable systems based on Tenable's vulnerability scoring, helping prioritize resources toward addressing the most significant threats in the environment.</p><p><b>Suggested Actions</b><br><b>1.</b> Validate the systems identified in the results and cross-reference with your asset inventory.<br><b>2.</b> Begin remediation efforts for the highest-risk systems.<br><b>3.</b> Work with relevant teams to apply patches and updates for documented vulnerabilities.<br><b>4.</b> Monitor these systems for repeated vulnerabilities to identify process gaps.<br><b>5.</b> Use the enriched hostname data to communicate effectively with asset owners.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="tenable:sc:vuln" baseScore > 3</code><br>       - Narrow the dataset to only vulnerabilities with a Base Score > 3 from Tenable's data.<br><b>02</b> <code>| dedup cve ip</code><br>       - Remove duplicate entries for unique CVE-IP pairs to prevent over-representing issues.<br><b>03</b> <code>| stats count by ip, riskFactor</code><br>       - Aggregate and count occurrences of vulnerabilities by IP address and risk factor.<br><b>04</b> <code>| sort 10 -count</code><br>       - Identify the top 10 systems with the highest vulnerability counts.<br><b>05</b> <code>| lookup dnslookup clientip as ip</code><br>       - Enrich the data by mapping IP addresses to hostnames for easier identification.<br><b>06</b> <code>| chart sum(count) by clienthost</code><br>       - Consolidate and visualize the total vulnerability count by hostname, facilitating quick risk assessment.</p>
explanation = <p>This search taps into the Tenable vulnerability data to uncover hosts affected by vulnerabilities with a Base Score greater than 3, a critical threshold indicative of moderate to high risk. The <code>dedup</code> command ensures that duplicate events (based on the IP and CVE) are evaluated only once, avoiding skewed results. By leveraging the <code>stats</code> command, it aggregates vulnerabilities by host and risk factor, giving visibility into which systems are repeatedly vulnerable and why. Sorting the results and using a charted visualization makes it easy to assess trends and focus on remediation efforts for hosts with the highest count of vulnerabilities.</p><p>This calculated approach provides actionable intelligence to improve your security posture and operational efficiency in managing vulnerabilities.</p>
quid = E6130402F9034CA1E96051D47134956E
search_author = GoSplunk: Ronald (Access42)
related_info = <p><a href="https://gosplunk.com/top-10-vulnerable-systems-tenable" target="_blank">https://gosplunk.com/top-10-vulnerable-systems-tenable</a></p>
description = <p>Summarizes <b>Top 10 Vulnerable Hosts with BaseScore > 3 in Tenable Data</b> using <code>index="<<index>>" sourcetype="tenable:sc:vuln" baseScore > 3</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="tenable:sc:vuln" baseScore > 3\
| dedup cve ip\
| stats count by ip, riskFactor\
| sort 10-count\
```| lookup dnslookup clientip as ip```\
| chart sum(count) by clienthost

[top_10_vulnerabilities_by_severity_qualys]
search_name = Unfixed High Severity Windows Vulnerabilities in Specific IP Range
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Threat Detection
tags = Access,GoSplunk
solution = <p>This query highlights where security teams need to focus their efforts to address <b>critical vulnerabilities</b> on high-risk Windows systems within the corporate network. The inclusion of patchable vulnerabilities ensures that recommended actions are both feasible and impactful.</p> <p><b>Suggested Actions</b><br><b>1.</b> Review the list of vulnerabilities from this search output and prioritize remediation starting with the highest-severity issues.<br><b>2.</b> Cross-check patchable vulnerabilities with your patch management solution to confirm patch availability.<br><b>3.</b> Coordinate with system and network teams to expedite patch deployment for the identified vulnerabilities.<br><b>4.</b> Monitor the remediation status of affected hosts to ensure that vulnerabilities are resolved.<br><b>5.</b> Align findings with your overarching vulnerability management plan and compliance requirements.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>sourcetype="qualys_vm_detection" HOSTVULN SEVERITY=3 OR 4 OR 5 TYPE="CONFIRMED"</code><br>       - Filters the source data for vulnerabilities with a severity level of 3–5 that are confirmed.<br><b>02</b> <code>| dedup HOST_ID, QID</code><br>       - Removes duplicate host-vulnerability entries to improve data accuracy.<br><b>03</b> <code>| search STATUS!="FIXED"</code><br>       - Excludes any vulnerabilities that have already been resolved.<br><b>04</b> <code>| join QID [ search sourcetype=qualys_knowledgebase PATCHABLE=1 ]</code><br>       - Enriches the data by joining with the Qualys knowledge base to include only patchable vulnerabilities.<br><b>05</b> <code>| eval Published=strftime(strptime(PUBLISHED_DATETIME, "%Y-%m-%d"), "%m/%d/%Y")</code><br>       - Formats the vulnerability publication date for readability.<br><b>06</b> <code>| join HOST_ID [ search sourcetype="qualys_vm_detection" HOSTSUMMARY OS="Windows*" NOT "Windows Server*" | where cidrmatch("10.128.0.0/9", IP) ]</code><br>       - Filters the data to include only Windows (non-server) hosts within the specified CIDR range.<br><b>07</b> <code>| stats count(HOST_ID) as #_Hosts by QID, Published, TITLE, SEVERITY</code><br>       - Aggregates the data to show the number of affected hosts by each vulnerability.<br><b>08</b> <code>| sort -SEVERITY, 10 -#_Hosts</code><br>       - Sorts the results by severity and then by the number of affected hosts, limiting output to the top 10 vulnerabilities.<br>
explanation = <p>This query is essential for security operations teams aiming to address <b>high-severity vulnerabilities</b> affecting critical Windows systems within a defined IP range. By using Qualys VM detection data, it filters the list for confirmed vulnerabilities of severity level 3, 4, or 5 that are not fixed, ensuring administrators focus on the most urgent issues first. The search cross-references the Qualys knowledge base to validate whether vulnerabilities are patchable, adding an extra layer of specificity to remediation efforts.</p> <p>The pipeline isolates the OS as Windows and excludes Windows Server, narrowing results to vulnerable hosts within the specified CIDR range (10.128.0.0/9). By calculating the number of hosts affected by each QID and by presenting detailed vulnerability metadata (published date and title), the search provides a clear, actionable overview for making patching and vulnerability management decisions.</p>
quid = 698176C15012B9B6DA4CF0CF819E7274
search_author = GoSplunk: CattyWampus
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/qualys-top-10-vulnerabilities-severity" target="_blank">https://gosplunk.com/qualys-top-10-vulnerabilities-severity</a></p>
description = <p>Summarizes <b>Unfixed High Severity Windows Vulnerabilities in Specific IP Range</b> using <code>sourcetype="qualys_vm_detection" HOSTVULN SEVERITY=3 OR 4 OR 5 TYPE="CONFIRMED"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = sourcetype="qualys_vm_detection" HOSTVULN SEVERITY=3 OR 4 OR 5 TYPE="CONFIRMED"\
	| dedup HOST_ID, QID\
	| search STATUS!="FIXED"\
	| join QID [ search sourcetype=qualys_knowledgebase PATCHABLE=1 ]\
	| eval Published=strftime(strptime(PUBLISHED_DATETIME, "%Y-%m-%d"), "%m/%d/%Y")\
	| join HOST_ID [ search sourcetype="qualys_vm_detection" HOSTSUMMARY OS="Windows*" NOT "Windows Server*"\
	| where cidrmatch("10.128.0.0/9", IP)  ]\
	| stats count(HOST_ID) as #_Hosts by QID, Published, TITLE, SEVERITY\
	| sort  -SEVERITY, 10 -#_Hosts

