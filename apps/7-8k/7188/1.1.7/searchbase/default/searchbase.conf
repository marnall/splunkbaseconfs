dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specify the dataset by selecting the required index and sourcetype.<br><b>02</b> <code>| bucket _time span=1s</code><br>       - Group events into granular one-second buckets based on timestamp.<br><b>03</b> <code>| stats count by _time</code><br>       - Count the total number of events in each one-second interval.<br>
explanation = <p>This search begins by specifying the data source through the <code>index</code> and <code>sourcetype</code>. The <code>bucket</code> command groups events into one-second intervals based on the <b>_time</b> field, ensuring higher granularity. Finally, <code>stats count by _time</code> calculates the total number of events for each time interval, which is useful for understanding event trends.</p><p>This query is valuable for monitoring system performance, identifying potential issues such as <b>event ingest delays</b>, or analyzing high-frequency event bursts that may correlate with operational challenges.</p>
