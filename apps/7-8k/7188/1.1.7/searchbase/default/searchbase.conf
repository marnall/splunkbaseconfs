[find_success_login_after_10_failures_with_streamstats]
search_name = Authentication Success After More Than 10 Failures
version = 1.0.2
date_updated = 2024-2-4 16:35:42
search_hidden = 0
category = Security
sub_category = Account Compromise
tags = Access,GoSplunk
solution = <p>This search detects potential brute force attacks that resulted in successful account compromise.</p><p><b>Suggested Actions</b><br><b>1.</b> Immediately investigate flagged accounts for unauthorized access.<br><b>2.</b> Force password reset for compromised accounts.<br><b>3.</b> Review source IPs for known malicious activity.<br><b>4.</b> Implement rate limiting or account lockout policies.<br><b>5.</b> Enable multi-factor authentication to prevent future attacks.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li><li><a href="https://www.splunk.com/en_us/blog/site-map.html" target="_blank">Products: Blog posts focused on the Splunk platform and architecture</a><br>Blog posts focused on the Splunk platform and architecture.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| from datamodel:Authentication.Authentication</code><br>       - This line pulls data from the Authentication data model.<br><b>02</b> <code>| search action=failure or action=success</code><br>       - Filters for events where the action is either a failure or success.<br><b>03</b> <code>| reverse</code><br>       - Reverses the order of events so the most recent ones are first.<br><b>04</b> <code>| streamstats window=0 current=true reset_after=(action=success) count as failure_count by src</code><br>       - Calculates a running count of failures per source, resetting after a success.<br><b>05</b> <code>| where action=success and failure_count > 10</code><br>       - Filters to show only successful logins preceded by more than 10 failed attempts.<br>
explanation = <p>This search leverages the <code>streamstats</code> command to track sequential authentication events and identify successful logins that were preceded by more than 10 failed attempts. The <code>reset_after</code> parameter resets the failure count after each successful login, making it possible to detect brute force patterns. By using the Authentication data model, this search works across various authentication data sources in a normalized way.</p>
quid = 7983E529C5F48990F815CDF2DC162FC5
search_author = GoSplunk: iv.shamanow
updated_author = akhamis
related_info = <p><a href="https://gosplunk.com/find-success-login-after-10-failures-with-streamstats" target="_blank">https://gosplunk.com/find-success-login-after-10-failures-with-streamstats</a></p>
description = <p>Summarizes <b>Authentication Success After More Than 10 Failures</b> using <code>| from datamodel:"Authentication"."Authentication"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | from datamodel:"Authentication"."Authentication"\
	| search action=failure or action=success\
	| reverse\
	| streamstats window=0 current=true reset_after="(action=\"success\")" count as failure_count by src\
	| where action="success" and failure_count > 10

