[find_unused_dashboards]
search_name = Dashboard Usage Analysis: Last Accessed and Days Since
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Dashboards
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /servicesNS/-/-/data/ui/views splunk_server=*</code><br>       - Retrieves information from all Splunk servers about views (including dashboards).<br><b>02</b> <code>| search isDashboard=1</code><br>       - Filters the results to include only dashboards.<br><b>03</b> <code>| rename eai:acl.app as app</code><br>       - Renames the field to represent the app's name.<br><b>04</b> <code>| fields title app</code><br>       - Keeps only the title and app fields in the results.<br><b>05</b> <code>| join type=left title [subsearch]</code><br>       - Joins with web access logs to gather access information.<br><b>06</b> <code>| rex field=uri_path ".*/(?<title>[^/]*)$"</code><br>       - Extracts the dashboard title from the URI path.<br><b>07</b> <code>| stats latest(_time) as Time latest(user) as user by title</code><br>       - Calculates the latest access time and user.<br><b>08</b> <code>| where isnotnull(Time)</code><br>       - Filters to include only accessed dashboards.<br><b>09</b> <code>| eval Now=now()</code><br>       - Captures the current timestamp.<br><b>10</b> <code>| eval "Days since last accessed"=round((Now-Time)/86400,2)</code><br>       - Calculates days since last access.<br><b>11</b> <code>| sort - "Days since last accessed"</code><br>       - Sorts dashboards by days since last accessed.<br><b>12</b> <code>| convert ctime(Time)</code><br>       - Converts time to a readable format.<br><b>13</b> <code>| fields - Now</code><br>       - Removes the 'Now' field from results.<br>
explanation = <p>This query can be used to identify unused or rarely used dashboards. By identifying these dashboards, an organization can <b>clean up</b> their Splunk environment, making it easier to manage and potentially improving performance. It can also help identify users who are accessing dashboards they shouldn't be, which could indicate a security issue.</p>
quid = ACEAF3FBDAD73F060F1733C0528126FD
search_author = GoSplunk: Azeemering
updated_author = khutchinson
description = <p>Summarizes <b>Dashboard Usage Analysis: Last Accessed and Days Since</b> using <code>| rest /servicesNS/-/-/data/ui/views splunk_server=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query retrieves information about all dashboards in Splunk, including their titles, the apps they belong to, the last time they were accessed, and the user who last accessed them. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = | rest /servicesNS/-/-/data/ui/views splunk_server=*\
	| search isDashboard=1\
	| rename eai:acl.app as app\
	| fields title app\
	| join type=left title [\
	| search index=_internal sourcetype=splunk_web_access user=*\
	| rex field=uri_path ".*/(?<title>[^/]*)$"\
	| stats latest(_time) as Time latest(user) as user by title]\
	| where isnotnull(Time)\
	| eval Now=now()\
	| eval "Days since last accessed"=round((Now-Time)/86400,2)\
	| sort - "Days since last accessed"\
	| convert ctime(Time)\
	| fields - Now

[fishies_fun_query_and_easter_egg]
search_name = Fish Animation Generator with Error Handling
search_hidden = 0
category = Splunk
sub_category = Search
tags = GoSplunk
solution = <p>This query provides a hands-on exploration of Splunk's functions, particularly useful for string manipulations, error handling, and creative experimentation. By chaining commands, it demonstrates how to construct visually intriguing or dynamically computed outputs.</p> \
<p><b>Suggested Actions</b><br><b>1.</b> Use this query to familiarize yourself with functions like <b>mvappend</b>, <b>mvexpand</b>, and <b>substr</b>.<br><b>2.</b> Experiment with modifying the 'fish' string and observe how results change.<br><b>3.</b> Introduce additional checks or conditions for error handling to make the query more robust.<br><b>4.</b> Explore the impact of different offsets or other mathematical transformations.<br><b>5.</b> Share your findings with the community to inspire creative use cases.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_* OR index="<<index>>"</code><br> \
	- Searches across all indexes, both internal and non-internal.<br> \
	<b>02</b> <code>| head 1</code><br> \
	- Limits the results to the first event.<br> \
	<b>03</b> <code>| eval fish="><((*>"</code><br> \
	- Creates a new field called 'fish' and assigns it a string representing a fish.<br> \
	<b>04</b> <code>| eval fishies=mvappend(fish,fish)</code><br> \
	- Starts creating a multivalue field by duplicating 'fish'.<br> \
	<b>05</b> <code>| eval fishies=mvappend(fishies,fishies)</code>, repeated<br> \
	- Continues duplicating the 'fish' string exponentially.<br> \
	<b>06</b> <code>| mvexpand spawnify</code><br> \
	- Expands the multivalue field 'spawnify' into separate events.<br> \
	<b>07</b> <code>| eval fishies=mvjoin(fishies," ")</code><br> \
	- Joins the 'fishies' strings with a space into one string.<br> \
	<b>08</b> <code>| streamstats count as offset</code><br> \
	- Counts the events and stores the count as 'offset'.<br> \
	<b>09</b> <code>| eval offset=(offset*3) % 7</code><br> \
	- Applies a mathematical formula to calculate an offset value.<br> \
	<b>10</b> <code>| addinfo</code><br> \
	- Adds metadata about the search to the results.<br> \
	<b>11</b> <code>| eval make_swim=round(info_max_time-info_search_time)</code><br> \
	- Calculates the time difference to animate the fish.<br> \
	<b>12</b> <code>| eval fishies=substr(fishies,(10*16)-(make_swim-offset+10),100+offset)</code><br> \
	- Extracts a substring of 'fishies' based on calculated offsets.<br> \
	<b>13</b> <code>| fields fishies</code><br> \
	- Retains only the 'fishies' field.<br> \
	<b>14</b> <code>| streamstats count</code><br> \
	- Counts events again to evaluate their position.<br> \
	<b>15</b> <code>| eval fishies=if(count==16,"FATAL ERROR: you have unleashed an army of fish.",fishies)</code><br> \
	- Checks for count conditions to trigger an error or proceed.<br> \
	<b>16</b> <code>| rename fishies as _raw</code><br> \
	- Renames the 'fishies' field to '_raw' for final output.<br> \
	<b>17</b> <code>| fields - _time</code><br> \
	- Excludes the '_time' field from the output.<br> \
	<b>18</b> <code>| eval _raw=substr(_raw,0,100)</code><br> \
	- Extracts the first 100 characters of the '_raw' field.<br>
explanation = <p>This query demonstrates how various Splunk functions can be chained together in creative ways to achieve a fun, experimental goal. The search uses several commands such as <b>eval</b> for string manipulation, <b>mvappend</b> and <b>mvexpand</b> for handling multivalue fields, <b>streamstats</b> for tracking offsets, and <b>substr</b> for substring extraction.</p> \
	<p>This search could be used to explore the functionality and behavior of these Splunk commands in a playful context, enhancing understanding of their utility. Moreover, it features error handling by checking whether the string manipulation count reaches 16 and, if so, returning a predefined error message. This teaches the importance of incorporating safeguards into queries.</p>
quid = E2EFA1D587B36BEA09BC927E8E72E8BF
search_author = GoSplunk: SplunkNinja
related_info = <p><a href="https://gosplunk.com/fishies-fun-query-and-easter-egg" target="_blank">https://gosplunk.com/fishies-fun-query-and-easter-egg</a></p>
description = <p>Summarizes <b>Fish Animation Generator with Error Handling</b> using <code>index=_* OR index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_* OR index="<<index>>"\
	| head 1\
	| eval fish="><((*>"\
	| eval fishies=mvappend(fish,fish)\
	| eval fishies=mvappend(fishies,fishies)\
	| eval fishies=mvappend(fishies,fishies)\
	| eval fishies=mvappend(fishies,fishies)\
	| eval spawnify=fishies\
	| mvexpand spawnify\
	| eval fishies=mvjoin(fishies," ")\
	| streamstats count as offset\
	| eval offset=(offset*3) % 7\
	| addinfo\
	| eval make_swim=round(info_max_time-info_search_time)\
	| eval fishies=substr(fishies,(10*16)-(make_swim-offset+10),100+offset)\
	| fields fishies\
	| streamstats count\
	| eval fishies=if(count==16,"FATAL ERROR: you have unleashed an army of fish.",fishies)\
	| fields fishies\
	| rename fishies as _raw\
	| fields - _time\
	| eval _raw=substr(_raw,0,100)

[fit_anomaly_detection_model_using_mltk_on_smb_traffic]
search_name = Fit Anomaly Detection Model Using MLTK on SMB Traffic
version = 1.0.4
date_created = 2025-05-12 14:08:18
date_updated = 2025-7-2 14:57:16
category = Splunk
sub_category = _internal
tags = Anomaly Detection,SMB Traffic
solution = <p>Implementing this search allows you to gain insights into anomalies in your network's SMB traffic and draws attention to unusual data transfer patterns that could signify potential security threats.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the identified outliers for potential security incidents.<br><b>2.</b> Adjust the model's threshold to fine-tune anomaly detection sensitivity.<br><b>3.</b> Investigate any identified spikes in SMB traffic to assess if they’re related to legitimate activities.<br><b>4.</b> Use insights from the model to bolster network monitoring strategies.<br><b>5.</b> Regularly update the model with fresh traffic data to maintain accuracy.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>The use of the <b>DensityFunction</b> command in the SPL allows creation of a model that aligns with regular SMB traffic patterns, adjusting dynamically to different network environments. SMB traffic often features in file sharing and remote access, which makes anomaly detection crucial for identifying potential threats like unauthorized lateral network movement or vulnerability scanning. The model's sensitivity to outliers can be calibrated, helping to balance between false positives and missed detections. This flexibility is essential for cybersecurity operations to effectively monitor and manage network health.</p>
quid = A3C4C30BFDD0BE284EC3D7761992E211
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Fit Anomaly Detection Model Using MLTK on SMB Traffic</b> using <code>| tstats summariesonly=false allow_old_summaries=true count from datamodel=Network_Traffic where All_Traffic.dest_port=1</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>| tstats summariesonly=false allow_old_summaries=true count from datamodel=Network_Traffic where All_Traffic.dest_port=139 OR All_Traffic.dest_port=445 OR All_Traffic.app=smb by _time span=10m, All_Traffic.src</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>02</b> <code>eval HourOfDay=strftime(_time, "%H")</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>03</b> <code>eval DayOfWeek=strftime(_time, "%A")</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>04</b> <code>rename "All_Traffic.*" as *</code><br>       - Rename fields to make the results easier to read.<br><b>05</b> <code>fit DensityFunction count by "HourOfDay,DayOfWeek" into smb_pdfmodel</code><br>       - Train or apply a machine learning model to the selected data.<br><b>06</b> <code>tstats summariesonly=false allow_old_summaries=true count values(All_Traffic.dest_ip) as dest values(All_Traffic.dest_port) as port from datamodel=Network_Traffic where All_Traffic.dest_port=139 OR All_Traffic.dest_port=445 OR All_Traffic.app=smb by _time span=1h, All_Traffic.src</code><br>       - Use accelerated statistical summaries for efficient aggregation.<br><b>07</b> <code>eval HourOfDay=strftime(_time, "%H")</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>08</b> <code>eval DayOfWeek=strftime(_time, "%A")</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>09</b> <code>rename "All_Traffic.*" as *</code><br>       - Rename fields to make the results easier to read.<br><b>10</b> <code>apply smb_pdfmodel threshold=0.001</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>11</b> <code>rename "IsOutlier(count)" as isOutlier</code><br>       - Rename fields to make the results easier to read.<br><b>12</b> <code>search isOutlier > 0</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>13</b> <code>sort - count</code><br>       - Sort the results so the highest-priority rows appear first.<br><b>14</b> <code>table _time src dest port count</code><br>       - Format the final output columns for review or dashboard use.<br>
search = | tstats summariesonly=false allow_old_summaries=true count from datamodel=Network_Traffic where All_Traffic.dest_port=139 OR All_Traffic.dest_port=445 OR All_Traffic.app=smb by _time span=10m, All_Traffic.src \
	| eval HourOfDay=strftime(_time, "%H") \
	| eval DayOfWeek=strftime(_time, "%A") \
	| rename "All_Traffic.*" as * \
	| fit DensityFunction count by "HourOfDay,DayOfWeek" into smb_pdfmodel \
	| tstats summariesonly=false allow_old_summaries=true count values(All_Traffic.dest_ip) as dest values(All_Traffic.dest_port) as port from datamodel=Network_Traffic where All_Traffic.dest_port=139 OR All_Traffic.dest_port=445 OR All_Traffic.app=smb by _time span=1h, All_Traffic.src \
	| eval HourOfDay=strftime(_time, "%H") \
	| eval DayOfWeek=strftime(_time, "%A") \
	| rename "All_Traffic.*" as * \
	| apply smb_pdfmodel threshold=0.001 \
	| rename "IsOutlier(count)" as isOutlier \
	| search isOutlier > 0 \
	| sort - count \
	| table _time src dest port count

[forwarder_tcp_connections_info]
search_name = Splunk Forwarder Connection and Data Transfer Metrics
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Forwarding
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The query starts by specifying the index and sourcetype, and filtering for sources that match '*metrics.lo*' and have the group 'tcpin_connections' and the component 'Metrics'.</ul><ul><b>02</b> It then uses the eval function to create several new fields. If the hostname field is null, it sets the sourceHost field to the value of the sourceHost field, otherwise it sets it to the value of the hostname field. It does similar operations for the connectionType, version, guid, os, and arch fields.</ul><ul><b>03</b> It then selects the fields it needs for the output.</ul><ul><b>04</b> It uses the eval function again to create the lastReceived and lastConnected fields, which represent the last time data was received from each forwarder and the last time each forwarder connected, respectively.</ul><ul><b>05</b> It then uses the stats function to calculate several statistics for each forwarder, grouped by the sourceHost and guid fields.</ul><ul><b>06</b> It uses the addinfo function to add information about the time range of the search.</ul><ul><b>07</b> It uses the eval function again to create the status field, which indicates whether each forwarder is missing, quiet, or active.</ul><ul><b>08</b> It then selects the fields it needs for the output and renames several of them.</ul><ul><b>09</b> It uses the fieldformat function to format the 'Last Connected' and 'Last Data Received' fields as dates.</ul><ul><b>10</b> Finally, it sorts the results by the Forwarder field.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query is <b>useful</b> for monitoring the health and <b>status</b> of Splunk forwarders. It can help <b>identify</b> issues with forwarders, such as if they are not sending data or if they are sending data at a slower rate than expected. It can also provide <b>useful</b> information for troubleshooting issues with forwarders.</div></div>
quid = 60CC17171C26FA886677844ED20B4376
search_author = GoSplunk: thall
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/forwarder-tcp-connections-info" target="_blank">https://gosplunk.com/forwarder-tcp-connections-info</a></p>
description = <p>Summarizes <b>Splunk Forwarder Connection and Data Transfer Metrics</b> using <code>index=_internal sourcetype="splunkd" source="*metrics.lo*" group=tcpin_connections component=Metrics</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query is used to monitor the status of Splunk forwarders. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
search = index=_internal sourcetype="splunkd" source="*metrics.lo*" group=tcpin_connections component=Metrics\
	| eval sourceHost=if(isnull(hostname), sourceHost,hostname)\
	| eval connectionType=case (fwdType=="uf","universal forwarder", fwdType=="lwf", "lightweight forwarder",fwdType=="full", "heavy forwarder", connectionType=="cooked" or connectionType=="cookedSSL","Splunk forwarder", connectionType=="raw" or connectionType=="rawSSL","legacy forwarder")\
	| eval version=if(isnull(version),"pre 4.2",version)\
	| eval guid=if(isnull(guid),sourceHost,guid)\
	| eval os=if(isnull(os),"n/a",os)\
	| eval arch=if(isnull(arch),"n/a",arch)\
	| fields connectionType sourceIp sourceHost splunk_server version os arch kb guid ssl tcp_KBps\
	| eval lastReceived = case (kb>0, _time)\
	| eval lastConnected=max(_time)\
	| stats first(sourceIp) as sourceIp first(connectionType) as connectionType max(version) as version first(os) as os first(arch) as arch max(lastConnected) as lastConnected max(lastReceived) as lastReceived sparkline(avg(tcp_KBps)) as "KB/s" avg(tcp_KBps) as "Avg_KB/s" by sourceHost guid ssl\
	| addinfo\
	| eval status=if(lastConnected<(info_max_time-900),"missing",if(mystatus="quiet","quiet","active"))\
	| fields sourceHost sourceIp version connectionType os arch lastConnected lastReceived KB/s Avg_KB/s status ssl\
	| rename sourceHost as Forwarder version as "Splunk Version" connectionType as "Forwarder Type" os as "Platform" status as "Current Status" lastConnected as "Last Connected" lastReceived as "Last Data Received"\
	| fieldformat "Last Connected"=strftime('Last Connected', "%D %H:%M:%S %p")\
	| fieldformat "Last Data Received"=strftime('Last Data Received', "%D %H:%M:%S %p")\
	| sort Forwarder

[free_disk_space_for_each_drive_letter]
search_name = Perfmon Free Disk Space in GB Sorted by Host and Drive
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = Servers
tags = Access,Performance
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The query starts by specifying the index and sourcetype from where the data is to be retrieved.</ul><ul><b>02</b> It then filters the data to exclude instances that match 'HarddiskVolume*' and '_Total'.</ul><ul><b>03</b> The 'eval' function is used to create a new field 'FreeSpace' by dividing the 'Value' field by 1024, converting the free space from megabytes to gigabytes.</ul><ul><b>04</b> Another 'eval' function is used to convert the 'FreeSpace' field to a string with commas for easier reading.</ul><ul><b>05</b> The 'table' function is used to display the 'host', 'instance', and 'GB' fields in a table format.</ul><ul><b>06</b> The 'sort' function is used to sort the table by 'host' and 'instance'.</ul><ul><b>07</b> Finally, the 'rename' function is used to rename the 'instance' field to 'Drive Letter' and the 'GB' field to 'GigaBytes Free' for better understanding of the table.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to <b>monitor</b> the free disk space on different hosts and drives. It can help in <b>identifying</b> drives that are running low on space and <b>prevent</b> potential issues related to <b>insufficient</b> disk space.</div></div>
quid = 09A855BF7AFEE2DCA4351BF0189F0B3A
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/free-disk-space-for-each-drive-letter" target="_blank">https://gosplunk.com/free-disk-space-for-each-drive-letter</a></p>
description = <p>This query is <b>retrieving</b> the <b>free disk space</b> in <b>gigabytes</b> from a specific index and sourcetype. It <b>excludes</b> certain instances, <b>converts</b> the value to gigabytes, and presents the data in a <b>sorted</b> table format.</p>
solution = <p>This query is retrieving the free disk space in gigabytes from a specific index and sourcetype. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index="<<index>>" sourcetype="Perfmon:Free Disk Space" counter="Free Megabytes" (instance!="HarddiskVolume*") (instance!=_Total)\
	| eval FreeSpace=(Value/1024)\
	| eval GB=tostring(FreeSpace,"commas")\
	| table host instance GB\
	| sort + host instance\
	| rename instance as "Drive Letter" GB as "GigaBytes Free"

[gauge_of_windows_failed_logons]
search_name = Failed Windows Security Logon Events Count and Gauge
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This query provides insights into possible security vulnerabilities by analyzing patterns of failed logon attempts. Administrators can use the gauge visualization to gauge an immediate understanding of whether failed logons are within acceptable thresholds or indicative of a targeted attack.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate user accounts reporting high failed logon counts for signs of brute force attacks.<br><b>2.</b> Validate EventCodes 4625, 529–539 to better understand the root causes of failure.<br><b>3.</b> Correlate findings with system and network logs to determine potential attack vectors.<br><b>4.</b> Implement account lockout policies to mitigate automated login attempts.<br><b>5.</b> Regularly review threshold values in the gauge chart to ensure optimal tuning for your environment.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security</code><br>       - Specifies the data source, searching within the provided index and focusing on the Windows Security Event Log.<br><b>02</b> <code>EventCode=4625 OR (EventCode=529 OR EventCode=530 OR EventCode=531 OR EventCode=532 OR EventCode=533 OR EventCode=534 OR EventCode=535 OR EventCode=536 OR EventCode=537 OR EventCode=539) (Logon_Type=*)</code><br>       - Filters for events that match specific failed logon EventCode identifiers and all logon types.<br><b>03</b> <code>| stats count(user) as Failed_Logon</code><br>       - Counts the failed logon attempts per user and stores the result in the "Failed_Logon" field.<br><b>04</b> <code>| gauge Failed_Logon 1 25 50 150</code><br>       - Visualizes the failed logon counts as a gauge with predefined thresholds, revealing insight into the trend and severity.<br>
explanation = <p>This query enables monitoring of failed logon attempts within a network's Windows environment. By searching for specific event codes related to failed logons, it provides visibility into potential security risks. The <code>| stats</code> command groups data by user and counts the failed attempts under the "Failed_Logon" field, offering a user-focused view of activity. The <code>| gauge</code> function is utilized to create a visual scale based on thresholds (1, 25, 50, and 150) that represent levels of concern, aiding in swift threat detection for security use cases.</p>
quid = 4DC50A91C349A55A21CEF447CF93D866
search_author = GoSplunk: Go Splunk
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/gauge-of-windows-failed-logons" target="_blank">https://gosplunk.com/gauge-of-windows-failed-logons</a></p>
description = <p>Summarizes <b>Failed Windows Security Logon Events Count and Gauge</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security ("EventCode=4625") OR ("EventCode=529" OR "EventC</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security ("EventCode=4625") OR ("EventCode=529" OR "EventCode=530" OR "EventCode=531" OR "EventCode=532" OR "EventCode=533" OR "EventCode=534" OR "EventCode=535" OR "EventCode=536" OR "EventCode=537" OR "EventCode=539") (Logon_Type=*)\
	| stats count(user) as Failed_Logon\
	| gauge Failed_Logon 1 25 50 150

[gauge_of_windows_successful_logons]
search_name = Windows Security Logon Success Count Gauge
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>Understanding and visualizing <b>logon patterns</b> provides insights into user behaviors and potential security threats on the system.</p> \
<p><b>Suggested Actions</b><br><b>1.</b> Investigate users with unusually high or low login activity to verify their legitimacy.<br><b>2.</b> Cross-reference logon timings with official working hours to detect suspicious activity.<br><b>3.</b> Review security settings to ensure compliance and minimize vulnerabilities.<br><b>4.</b> Incorporate the gauge into dashboards for continuous monitoring.<br><b>5.</b> Notify and escalate any detected anomalous user behavior to the cybersecurity team promptly.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=528 OR EventCode=540 OR EventCode=4624)</code><br>       - Specify the index and filter events to focus on Windows Security logon events based on their event codes.<br>\
	<b>02</b> <code>| stats count(user) as Success_Logon</code><br>       - Aggregate data and calculate the number of successful logons for each user.<br>\
	<b>03</b> <code>| gauge Success_Logon 1 1000</code><br>       - Create a gauge visualization representing the count of successful logons, with values ranging between 1 and 1000.<br>
explanation = <p>This query helps monitor and track user activity on the system by highlighting <b>patterns of successful logons</b>. The search begins with the Windows Event Log for security-related events and specifically filters by the event codes 528, 540, and 4624, which correspond to successful logon events.</p> \
	<p>By aggregating these events and counting occurrences per user, this search provides a gauge to promptly identify anomalies, such as <b>overactive logon behaviors</b> or unusual accounts showing activity. This is useful for detecting potential security threats, misuse, or validating legitimate activities across the system.</p>
quid = 8C1228C6AB61827091A682B36F2473B0
search_author = GoSplunk: Go Splunk
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/gauge-of-windows-successful-logons" target="_blank">https://gosplunk.com/gauge-of-windows-successful-logons</a></p>
description = <p>This query identifies <b>successful logon events</b> in the Windows Event Log and counts the number of times each user has logged on.</p> \
	<p>It further creates a <b>gauge visualization</b> to analyze the frequency of logons across users.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=528 OR EventCode=540 OR EventCode=4624)\
	| stats count(user) as Success_Logon\
	| gauge Success_Logon 1 1000

