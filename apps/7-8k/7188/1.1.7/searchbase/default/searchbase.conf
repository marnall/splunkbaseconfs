sub_category = _internal
tags = Access,Searching
solution = <p>This query offers <b>insight</b> into search activities, helping maintain <b>awareness</b> on how Splunk resources are being utilized by different users. Admins can leverage this to cross-check against user roles or dispersed search intensity within their teams.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor regular and irregular user search patterns.<br><b>2.</b> Cross-validate search activities with user roles to ensure appropriateness.<br><b>3.</b> Establish alerts for suspicious search patterns or indexes/sourcetypes accessed.<br><b>4.</b> Evaluate effectiveness of user role definitions in terms of search capabilities.<br><b>5.</b> Review compliance with search policies periodically and adjust as needed.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_audit action=search sourcetype=audittrail search_id=* NOT (user=splunk-system-user) search!="typeahead*"</code><br>       - This line filters the audit index for search-related actions performed by users other than the system user, excluding typeahead-based searches for relevance.<br><b>02</b> <code>rex "search\\=\\\'(search|\\s+)\\s(?P<search>[\\s\\s]+?(?=\\\\\\'))"</code><br>       - Performs a regular expression to extract the search query details from the logs for evaluation purposes.<br><b>03</b> <code>rex field=search "sourcetype\\s*=\\s*\\\"*(?<SourcetypeUsed>[^\\s\\\"]+)"</code><br>       - Extracts the sourcetype used in the search to identify data sources involved.<br><b>04</b> <code>rex field=search "index\\s*=\\s*\\\"*(?<IndexUsed>[^\\s\\\"]+)"</code><br>       - Retrieves the index information from the extracted search data.<br><b>05</b> <code>stats latest(_time) as Latest by user search SourcetypeUsed IndexUsed</code><br>       - Aggregates the most recent search activity for each user by search details.<br><b>06</b> <code>convert ctime(Latest)</code><br>       - Converts the timestamp of the latest search to a human-readable format.<br>
explanation = <p>The search extracts events from the <b>audit log</b> related to user search activities, specifically excluding systems-generated searches and autocomplete suggestions. By analyzing the audit source type, it captures fields for <b>user identification</b>, <b>sourcetype</b>, and <b>index</b> involved in each search command. This detailed breakdown assists in <b>observing user behavior trends</b> and ensuring the searches are in adherence to the organizational policies, offering <b>real-time visibility</b> into search activities.</p>
quid = 17A4F14C67FCD1C1752E667DA24A5F1B
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/show-searches-with-details-who-when-what" target="_blank">https://gosplunk.com/show-searches-with-details-who-when-what</a></p>
description = <p>Summarizes <b>Audit Log Analysis of User Searches, Indices, and Sourcetypes</b> using <code>index=_audit action=search sourcetype=audittrail search_id=* NOT (user=splunk-system-user) search!="typeahead*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_audit action=search sourcetype=audittrail search_id=* NOT (user=splunk-system-user) search!="typeahead*"\
	| rex "search\\=\\\'(search|\s+)\s(?P<search>[\s\s]+?(?=\\\'))"\
	| rex field=search "sourcetype\s*=\s*\"*(?<SourcetypeUsed>[^\s\"]+)"\
	| rex field=search "index\s*=\s*\"*(?<IndexUsed>[^\s\"]+)"\
	| stats latest(_time) as Latest by user search SourcetypeUsed IndexUsed\
	| convert ctime(Latest)

