[create_a_timechart_of_average_cpu_seconds_by_host]
search_name = Average CPU Seconds by Host with Outliers
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,Performance
solution = <p>This search provides visibility into average CPU usage trends while flagging unusual spikes or dips that require attention. This allows administrators to <b>proactively address potential system issues</b> before they lead to larger problems.</p><p><b>Suggested Actions</b><br><b>1.</b> Review flagged outliers to identify patterns or causes of irregularities.<br><b>2.</b> Investigate hosts that show frequent or severe CPU usage anomalies.<br><b>3.</b> Correlate flagged events with related logs or metrics.<br><b>4.</b> Evaluate workloads or processes contributing to high CPU usage trends.<br><b>5.</b> Adjust resource allocations or initiate maintenance for overburdened hosts.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specify the data source, including the target index and sourcetype.<br><b>02</b> <code>| timechart avg(cpu_seconds) by host</code><br>       - Create a timechart showing the average CPU usage for each host.<br><b>03</b> <code>| outlier action=tf</code><br>       - Detect outlier data points and tag them (true/false) as anomalies.<br>
explanation = <p>This search outputs a timechart that visualizes the <b>average CPU utilization</b> across hosts. By leveraging the `outlier` command, the query pinpoints any anomalies in CPU usage, which could signal <b>irregular activities</b> such as resource misallocation, performance bottlenecks, or even potential security concerns.</p><p>The `timechart avg(cpu_seconds) by host` command groups and calculates the average CPU seconds per host over time, while `outlier action=tf` identifies data points that deviate from the norm, marking them as true/false for quick detection.</p>
quid = AB23F6BE3B902E7577BA87FC255D3C04
