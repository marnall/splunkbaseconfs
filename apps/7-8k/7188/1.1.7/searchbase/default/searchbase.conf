[correlation_rule_list_generate_notable]
search_name = List of Active, Scheduled, Notable Saved Searches
search_hidden = 0
category = Splunk
sub_category = _internal
tags = GoSplunk
solution = <p>This query helps security teams and Splunk administrators identify and manage active notable events efficiently. By providing visibility into the scheduling, severity, and context of notable events, it supports proactive monitoring and ensures critical alerts are properly configured and operational. The list also aids in troubleshooting alert delivery and missing notifications.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the list to confirm the active correlation rules accurately reflect your monitoring priorities.<br><b>2.</b> Validate the cron schedules to ensure timely delivery of notable events.<br><b>3.</b> Check the severity levels and descriptions to ensure they align with your organization's risk management policies.<br><b>4.</b> Take note of any missing "next steps" and update the details as required.<br><b>5.</b> Regularly revisit this search to maintain an up-to-date inventory of notable saved searches in your Splunk environment.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest splunk_server=* count=0 /services/saved/searches</code><br>       - Retrieves saved search configurations from Splunk's REST API.<br><b>02</b> <code>| search action.notable="1" is_scheduled="1" 
explanation = <p>This search utilizes the <code>| rest</code> command to extract details about configured saved searches directly from Splunk's REST endpoints. The results are filtered to include only those saved searches marked as "notable" (action.notable="1"), actively scheduled (is_scheduled="1"), and not disabled (
disabled="0"). These criteria ensure only active and relevant correlation rules are included.</p><p>The search results contain key details such as the rule title, associated security domain, rule descriptions, scheduling information, and severity levels. This enables Splunk admins to quickly assess the scope and operational significance of their notable events and make adjustments as needed to optimize monitoring and alerting strategies.</p>
quid = FFB739E3618FF0E8607CED3E31E30473
search_author = GoSplunk: Rbecwar
related_info = <p><a href="https://gosplunk.com/list-of-all-enabled-correlation-rules-that-generate-a-notable" target="_blank">https://gosplunk.com/list-of-all-enabled-correlation-rules-that-generate-a-notable</a></p>
description = <p>Summarizes <b>List of Active, Scheduled, Notable Saved Searches</b> using <code>| rest splunk_server=* count=0 /services/saved/searches</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest splunk_server=* count=0 /services/saved/searches\
| search action.notable="1" is_scheduled="1" disabled="0" \
| table title action.notable.param.security_domain description search cron_schedule actions action.email.to action.notable.param.severity alert.suppress.fields alert.suppress.period action.notable.param.next_steps action.notable.param.rule_description action.risk.param._risk_score

[correlation_search_audit_search]
search_name = Correlation Search Activity and Modification Tracker
search_hidden = 0
category = Splunk
sub_category = Search
tags = Health,Searching
solution = <p>The insights gained from this query allow Splunk administrators to maintain a clear overview of correlation and notable searches. Administrators can track their usage, pinpoint underused or high-frequency searches, and monitor any configuration updates over time. This improves Splunk's operational efficiency and ensures that saved searches are both effective and relevant to current business needs.</p> <p><b>Suggested Actions</b><br><b>1.</b> Investigate saved searches with high trigger frequencies for potential optimization opportunities.<br> <b>2.</b> Act on searches that have been disabled or rarely used to improve resource allocation.<br> <b>3.</b> Follow up on searches modified by users to verify changes and prevent misconfiguration.<br> <b>4.</b> Use the notable count to assess the relevance and contribution of correlation searches to broader security goals.<br> <b>5.</b> Maintain and audit correlationsearches_lookup to ensure accurate metadata and configurations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| multisearch[...]</code><br>       - Combine multiple searches into one seamless result set.<br> <b>02</b> <code>search index=_internal [...]</code><br>       - Audit saved searches by capturing modification events.<br> <b>03</b> <code>| regex</code><br>       - Refine results by URI field patterns.<br> <b>04</b> <code>| rex</code><br>       - Extract encoded search titles.<br> <b>05</b> <code>| eval</code><br>       - Decode search names and format modification timestamps.<br> <b>06</b> <code>| fields, rename</code><br>       - Select and rename output fields for clarity.<br> <b>07</b> <code>search index="<<index>>"</code><br>       - Analyze notable events in correlation to searches.<br> <b>08</b> <code>| append</code><br>       - Supplement main search data with REST API metadata.<br> <b>09</b> <code>| rest splunk_server=*</code><br>       - Extract correlation and notable search metadata.<br> <b>10</b> <code>| stats, eval</code><br>       - Aggregate and enhance the final data with metrics like notable count.<br> <b>11</b> <code>| table</code><br>       - Finalize results for visibility and usability.<br>
explanation = <p>This query is essential for auditing and monitoring Splunk saved searches, particularly correlation searches associated with Enterprise Security. By analyzing saved searches, this search enables users to track their modification history, usage patterns, and operational status. This is achieved through multisearch, which combines three searches:</p> <ul><li>The first search audits saved searches by detecting POST requests to relevant endpoints, extracting and decoding information such as the search title and author.</li> <li>The second search consolidates notable events from the relevant index, making it easier to track suppression or activity trends.</li> <li>The third search utilizes the REST API to fetch metadata about correlation and notable searches, identifying their enabled status and rule configurations.</li></ul> <p>The query also aggregates this information to provide a comprehensive view of saved search activity by combining fields like last modified time, notable count, trigger frequency, and modifications to enable accurate visibility into their use and effectiveness.</p>
quid = 09D576EBB63049A0F888337256C70B89
search_author = GoSplunk: Azeemering
related_info = <p><a href="https://gosplunk.com/correlation-search-audit-search" target="_blank">https://gosplunk.com/correlation-search-audit-search</a></p>
description = <p>Summarizes <b>Correlation Search Activity and Modification Tracker</b> using <code>| multisearch[ search index=_internal sourcetype=splunkd_ui_access splunkd servicesNS saved searches method=POST</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | multisearch[ search index=_internal sourcetype=splunkd_ui_access splunkd servicesNS saved searches method=POST\
| regex uri="/[^/]*/splunkd/__raw/servicesNS/[^/]*/[^/]*/saved/searches/[^/ ]*$"\
| rex field=uri "/[^/]*/splunkd/__raw/servicesNS/[^/]*/[^/]*/saved/searches/(?<search_encoded>[^/\\? ]*)"\
| eval Title=urldecode(search_encoded)\
| rename user as "Last Modified By"\
| eval "Last Modified Time"=strftime(_time,"%b %d, %I:%M %p")\
| fields Title "Last Modified By" "Last Modified Time"][ search index="<<index>>"\
| search eventtype!=notable_suppression*\
| rename search_name as Title\
| eval isNotable = 1\
| fields isNotable Title\
| fields - _raw]\
| append[\
| rest splunk_server=* count=0 /servicesNS/-/SplunkEnterpriseSecuritySuite/saved/searches\
| where match('action.correlationsearch', "1|[Tt]|[Tt][Rr][Uu][Ee]") OR match('action.notable', "1|[Tt]|[Tt][Rr][Uu][Ee]")\
| where disabled=0\
| eval Enabled=if(disabled=0,"Yes","No")\
| rename action.correlationsearch.enabled as enabled, action.notable.param.rule_description as Description, title as Title , author as Author\
| fields Title Enabled Author]\
| stats values(*) as * sum(isNotable) as notableCount by Title\
| eval "Triggered in past 30 days"=if(notableCount>0,notableCount,"No")\
| search Author=*\
| streamstats count as Number\
| table Number Title "Rule Name" Enabled Author "Last Modified By" "Last Modified Time" "Triggered in past 30 days"

[count_all_events_for_1_or_multiple_indexes_1]
search_name = Daily Event Count by Index
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Indexes
solution = <p>Operational insights gained from this query include tracking daily event volume trends, identifying ingestion disruptions, and pinpointing indexing anomalies. Real-time awareness of event patterns supports data consistency and operational reliability.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any irregular spikes or drops in daily event volumes.<br><b>2.</b> Monitor indexes prone to high variability for early signs of ingestion errors.<br><b>3.</b> Use results to forecast data storage needs and licensing projections.<br><b>4.</b> Correlate index activity with system events, audits, or maintenance windows.<br><b>5.</b> Set up alerts to notify on significant deviations from historical event patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| tstats summariesonly=t count</code><br>       - Perform a high-level event count across indexed fields using the efficient <b>tstats</b> command.<br><b>02</b> <code>where index=<<index>></code><br>       - Filter the data to only show events from the specified index, ensuring targeted monitoring.<br><b>03</b> <code>by span=1d _time index</code><br>       - Group the results by day (<b>span=1d</b>) and categorize counts per index, enabling daily trend analysis.<br>
explanation = <p>This query uses the <b>'tstats'</b> command, which efficiently provides statistical information from indexed fields. By focusing on daily event volumes per index, it enables effective monitoring of ingestion consistency and system activity levels. Key functions include:</p> <ul> <li><b>'tstats count'</b>: High-performance statistical command calculates the number of events.</li> <li><b>'where index=<<index>>'</b>: Filters results to only include events from the specified index.</li> <li><b>'by span=1d _time index'</b>: Groups data by day using <b>span=1d</b> and categorizes results by index, leveraging the <b>_time</b> field for precise timestamp-based grouping.</li> </ul> <p>Monitoring event counts is essential for maintaining healthy system operations, detecting data ingestion issues, and ensuring accurate event logging for operational visibility.</p>
quid = E34BFC9588DDF7B5907A2D4F4D5E8C36
search_author = GoSplunk: sedi
related_info = <p><a href="https://gosplunk.com/count-all-events-for-1-or-multiple-indexes" target="_blank">https://gosplunk.com/count-all-events-for-1-or-multiple-indexes</a></p>
description = <p>Summarizes <b>Daily Event Count by Index</b> using <code>| tstats summariesonly=t count where index="<<index>>" by span=1d _time index</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | tstats summariesonly=t count where index="<<index>>" by span=1d _time index

