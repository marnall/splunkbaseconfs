execution_plan = <b>01</b> <code>index=_internal sourcetype=splunk_web_access user=admin</code><br>       - Filter Splunk's internal web access logs for events involving the 'admin' user.<br><b>02</b> <code>| rex field=uri_path "(\/[^\/ ]*)?\/app\/(?<myapp>[^\/ ]*)\/(?<myview>[^\/ ?]*)"</code><br>       - Extract app and view names from the URI path using a regular expression.<br><b>03</b> <code>| eval myview = if(myview="@go","savedsearch",myview)</code><br>       - Standardize view names by replacing '@go' with 'savedsearch'.<br><b>04</b> <code>| eval app_and_view = myapp . "/" . myview</code><br>       - Build a combined field for app and view names separated by a forward slash.<br><b>05</b> <code>| stats values(app_and_view) list(app_and_view) earliest(app_and_view) first(app_and_view)</code><br>       - Generate statistics showing distinct values, list of values, earliest access, and first access for app/view combinations.<br>
explanation = <p>This query tracks and audits the usage of various apps and views accessed by the admin user as recorded in Splunk's internal web access logs. By extracting app and view names from the URI path, this search provides granular insights into admin usage patterns. For example, replacing '@go' with 'savedsearch' standardizes uncommon view values, while combining app and view names facilitates easier analysis. Finally, the `stats` command generates a comprehensive summary, making it easier to audit app/view interactions, determine frequently accessed views, and assess access sequences. These insights are crucial for auditing, enhancing user experience, and optimizing interface layouts.</p>
quid = 2D41F38EBC34168069EF38DA5B9E0AC0
search_author = grdhg24
updated_author = akhamis
description = <p>Summarizes <b>Admin User Web Access Stats by App and View</b> using <code>index=_internal sourcetype=splunk_web_access user=admin</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_internal sourcetype=splunk_web_access user=admin\
	| rex field=uri_path "(\/[^\/ ]*)?\/app\/(?<myapp>[^\/ ]*)\/(?<myview>[^\/ \?]*)"\
	| eval myview = if(myview="@go","savedsearch",myview)\
	| eval app_and_view = myapp . "/" . myview\
	| stats values(app_and_view) list(app_and_view) earliest(app_and_view) first(app_and_view)

[sto_sizing_calc_1]
search_name = Average Search Concurrency Calculation
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Search
tags = Access,Concurrency
solution = <p>Identifying concurrency levels helps balance search loads and ensure system performance remains <b>optimal</b>.</p> \
	<p><b>Suggested Actions</b><br><b>1.</b> Review concurrency trends to spot peak system usage periods.<br><b>2.</b> Adjust search schedules to distribute load more evenly during off-peak times.<br><b>3.</b> Optimize searches identified as resource-intensive or time-consuming.<br><b>4.</b> Leverage findings to plan system resource expansion if concurrency consistently exceeds acceptable levels.<br><b>5.</b> Use the results to reinforce search governance policies across teams, promoting efficient resource utilization.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" TERM(action=search) TERM(info=completed) TERM(search_id=*)</code><br>       - Searches the <b>_audit index</b> for completed searches with valid search IDs.<br><b>02</b> <code>| stats avg(total_run_time) AS avg_runtime, dc(search_id) AS search_count</code><br>       - Calculates the average runtime and distinct count of search IDs.<br><b>03</b> <code>| eval total_time = search_count * avg_runtime</code><br>       - Computes the total time spent across searches.<br><b>04</b> <code>| eval concurrency = total_time / 86400</code><br>       - Derives the concurrency by normalizing total time to a daily timeframe.<br><b>05</b> <code>| chart avg(concurrency) as "Average Search Concurrency"</code><br>       - Visualizes the average concurrency as a chart.<br>
explanation = <p>This query is critical for monitoring and optimizing Splunk search performance. By analyzing completed searches in the <b>_audit index</b>, it surfaces insights into the average search runtime, the total number of completed searches, and overall concurrency levels.</p> \
	<p>It leverages key SPL components—<code>stats</code> to compute summary metrics, <code>eval</code> for calculations, and <code>chart</code> to visualize output. Examining concurrency trends helps detect <b>performance bottlenecks</b> and supports scaling decisions. Administrators can use this query to identify potential issues such as excessive search concurrency or extended runtimes, which may contribute to a <b>degradation in system performance</b>.</p>
quid = 0395DDE02728ADEC5DBC1677CCFB5BAF
search_author = twest
updated_author = khutchinson
description = <p>Summarizes <b>Average Search Concurrency Calculation</b> using <code>index="<<index>>" TERM(action=search) TERM(info=completed) TERM(search_id=*)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" TERM(action=search) TERM(info=completed) TERM(search_id=*)\
	| stats avg(total_run_time) AS avg_runtime, dc(search_id) AS search_count\
	| eval total_time = search_count * avg_runtime\
	| eval concurrency = total_time / 86400\
	| chart avg(concurrency) as "Average Search Concurrency"

[sto_sizing_calc_3]
search_name = Daily Volume Calculation in GB from Metrics Log
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Metrics
solution = <p>This query provides <b>visibility</b> into the daily data throughput in a Splunk deployment, aiding capacity management and troubleshooting tasks.</p><p><b>Suggested Actions</b><br><b>1.</b> Use this query to identify unusual spikes in daily data ingestion, which may indicate system anomalies or security issues.<br><b>2.</b> Regularly review the trends to adjust indexer configurations for optimal performance.<br><b>3.</b> Leverage insights to improve licensing strategies and plan for potential capacity upgrades.<br><b>4.</b> Cross-check spikes or anomalies with recent changes in data sources or indexing policies.<br><b>5.</b> Share daily or weekly ingestion trends with relevant stakeholders to assist in operational planning.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal source=*/metrics.log component=Metrics TERM(group=per_index_thruput)</code><br>       - Filters internal metrics.log for per-index throughput data.<br><b>02</b> <code>| eval gb=kb/1024/1024</code><br>       - Converts the throughput data from kilobytes to gigabytes.<br><b>03</b> <code>| stats sum(gb) as Volume Per Day</code><br>       - Aggregates the total data volume processed per day into gigabytes.<br>
explanation = <p>This query provides a detailed view of daily data ingestion via Splunk's internal `metrics.log`. By focusing on the `group=per_index_thruput` component and converting kilobytes to gigabytes, it enables teams to monitor <b>activity patterns</b> and detect discrepancies. Sudden spikes in data usage could signal <b>anomalous activity</b>, incorrect indexing, or potential capacity issues. Understanding these patterns supports better resource allocation and optimization of indexing practices.</p>
quid = 8DBA753E8D4167B28EBBD9B7B8289433
search_author = twest
updated_author = khutchinson
description = <p>This query calculates the total volume of data processed daily, expressed in gigabytes, using the internal metrics log of Splunk. It provides <b>critical insights</b> into data throughput trends within the Splunk environment, enabling monitoring for <b>operational consistency</b> and spotting potential issues.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_internal source="*/metrics.log" component=Metrics TERM(group=per_index_thruput)\
	| eval gb=kb/1024/1024\
	| stats sum(gb) as "Volume Per Day"

[storage_calculator]
search_name = storage_calculator
date_created = 2023-10-4 9:47:4
date_updated = 2023-10-12 16:18:38
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Capacity Planning
solution = <p>This query empowers Splunk administrators with actionable insights into storage utilization and retention efficiency, enabling informed decisions for capacity planning and environment maintenance.</p> <p><b>Suggested Actions</b><br> <b>1.</b> Review the "Current Utilization of Index Size (%)" column to identify indexes nearing their configured capacity.<br> <b>2.</b> Compare "Configured Retention (Days)" against "Current Retention (Days)" to validate compliance with retention policies.<br> <b>3.</b> Use the "Disk Required to Meet Retention (MB)" and "Actual Disk Splunk Will Use (MB)" metrics to anticipate future storage needs.<br> <b>4.</b> Investigate indexes with low compression rates to improve storage efficiency.<br> <b>5.</b> Plan for expansions or optimizations by utilizing "Total Configured Index Size" and "Total Disk Required to Meet Retention" summaries.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| dbinspect index=* </code><br>       - Gathers storage statistics like size on disk and raw size, split by index and Splunk server.<br> <b>02</b> <code>| eval ... convert ... </code><br>       - Calculates days of data retention and formats epoch times into readable dates.<br> <b>03</b> <code>| join type=outer ... </code><br>       - Correlates storage metrics with recent license usage data from _internal logs and averages these metrics by index and Splunk server.<br> <b>04</b> <code>| join ... rest /services/admin/indexes </code><br>       - Fetches configuration details of indexes, including max size and frozen time period.<br> <b>05</b> <code>| eval ... </code><br>       - Computes and refines storage requirements considering compression rates, license usage trends, and retention policies.<br> <b>06</b> <code>| table ... stats sum() </code><br>       - Produces a summary table consolidating current, configured, and required storage for indexes across all servers.</p>
explanation = <p>Efficient storage management is critical in Splunk deployments to ensure an optimal balance between retention policies and storage utilization. This search leverages the <code>| dbinspect</code> command to compute storage metrics across indexes and correlates with license usage logs from <code>_internal</code>, and storage configurations fetched via the <code>| rest</code>. The output helps admins proactively plan for capacity upgrades, manage data retention efficiently, and avoid storage bottlenecks. It also calculates the compression rate and daily license utilization trends, providing precise insights into storage performance.</p>
quid = F5F357E780DF1270CFD4D94C5E8E2C6C
search_author = Splunk Portfolio Field Solutions
description = <p>Summarizes <b>storage_calculator</b> using <code>| dbinspect index=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = | dbinspect index=* \
	| stats sum(sizeOnDiskMB) as TotalSizeOnDiskMB, sum(rawSize) as TotalRawSize, min(startEpoch) as startEpochDate, max(endEpoch) as endEpochDate by splunk_server, index \
	| eval DaysOfData=round((endEpochDate-startEpochDate)/86400) \
	| convert ctime(startEpochDate), ctime(endEpochDate) \
	| eval TotalSizeOnDiskMB=round(TotalSizeOnDiskMB) \
	| eval TotalRawSizeMB=round(TotalRawSize/1024/1024) \
	| eval CompressionRate=round(TotalSizeOnDiskMB/TotalRawSizeMB,2) \
	| fields - startEpochDate endEpochDate TotalRawSize \
	| join type=outer index splunk_server \
	[ search earliest=-3d@d latest=-0d@d index=_internal source=*license_usage.log type=Usage \
	| eval KB=round(b/1024) \
	| eval MB=round(KB/1024,2) \
	| eval GB=round(MB/1024,2) \
	| eval TB=round(GB/1024,2) \
	| bin _time span=1d \
	| stats sum(MB) as Total by idx _time splunk_server \
	| stats avg(Total) as AvgLicenseMBPerDayThisServer by idx splunk_server \
	| eval AvgLicenseMBPerDayThisServer=round(AvgLicenseMBPerDayThisServer) \
	| eventstats sum(AvgLicenseMBPerDayThisServer) as TotalLicenseMBPerDayThisIndex by idx \
	| eval TotalLicenseMBPerDayThisIndex=round(TotalLicenseMBPerDayThisIndex) \
	| rename idx as index] \
	| fillnull value=0 \
	| join index, splunk_server \
	[| rest /services/admin/indexes \
	| table title maxTotalDataSizeMB frozenTimePeriodInSecs splunk_server \
	| eval frozenTimePeriodInDays=frozenTimePeriodInSecs/86400 \
	| rename title as index \
	| table index maxTotalDataSizeMB frozenTimePeriodInDays splunk_server] \
	| eval MBReqtoMeetRetention=AvgLicenseMBPerDayThisServer*frozenTimePeriodInDays*CompressionRate \
	| eval GBReqtoMeetRetention=round(MBReqtoMeetRetention/1024 ,2) \
	| eval ActualMBRequired=case (MBReqtoMeetRetention>maxTotalDataSizeMB, maxTotalDataSizeMB, MBReqtoMeetRetention<maxTotalDataSizeMB, MBReqtoMeetRetention) \
	| eval ActualGBRequired=round(ActualMBRequired/1024,2) \
	| rename maxTotalDataSizeMB as ConfiguredIndexSizeMB, TotalRawSizeMB as CurrentRawSizeMB, TotalSizeOnDiskMB as CurrentSizeOnDiskMB, DaysOfData as CurrentDaysRetention, frozenTimePeriodInDays as ConfiguredDaysRetention \
	| table index splunk_server, AvgLicenseMBPerDayThisServer, TotalLicenseMBPerDayThisIndex, ConfiguredIndexSizeMB, ConfiguredDaysRetention, CurrentDaysRetention, CurrentRawSizeMB, CurrentSizeOnDiskMB, CompressionRate, AvgLicenseMBPerDayThisServer, MBReqtoMeetRetention, ActualMBRequired \
	| eventstats sum(CurrentSizeOnDiskMB) as TotalCurrentIndexSizeOnDiskMB, sum(ConfiguredIndexSizeMB) as TotalIndexConfiguredSizeMB, sum(MBReqtoMeetRetention) as TotalIndexMBReqtoMeetRetention by index \
	| eval TotalIndexCurrentStorageUtilPerc=round((CurrentSizeOnDiskMB/ConfiguredIndexSizeMB)*100,2) \
	| fillnull value=0 \
	| table index, splunk_server, AvgLicenseMBPerDayThisServer, TotalLicenseMBPerDayThisIndex, ConfiguredIndexSizeMB, ConfiguredDaysRetention, CurrentDaysRetention, TotalIndexCurrentStorageUtilPerc, CurrentRawSizeMB, CurrentSizeOnDiskMB, CompressionRate, AvgLicenseMBPerDayThisServer, MBReqtoMeetRetention, ActualMBRequired, TotalCurrentIndexSizeOnDiskMB, TotalIndexConfiguredSizeMB, TotalIndexMBReqtoMeetRetention \
	| search splunk_server="*" index="*" \
	| rename index as Index, splunk_server as "Splunk Server", ConfiguredIndexSizeMB as "Configured Index Size (MB)", ConfiguredDaysRetention as "Configured Retention (Days)", CurrentDaysRetention as "Current Retention (Days)", TotalIndexCurrentStorageUtilPerc as "Current Utilization of Index Size (%)", CurrentRawSizeMB as "Current Raw Index Size on Disk (MB)", CurrentSizeOnDiskMB as "Current Actual Index Size on Disk (MB)", CompressionRate as "Compression Rate", AvgLicenseMBPerDayThisServer as "Avg License Utilization per Day (MB)", TotalLicenseMBPerDayThisIndex as "Total License Utilization per Day (Across All Indexers) (MB)", MBReqtoMeetRetention as "Disk Required to Meet Retention (MB)", ActualMBRequired as "Actual Disk Splunk Will Use (MB)", TotalCurrentIndexSizeOnDiskMB as "Total Index Size on Disk (Across All Indexers) (MB)", TotalIndexConfiguredSizeMB as "Total Configured Index Size (Across All Indexers) (MB)", TotalIndexMBReqtoMeetRetention as "Total Disk Required to Meet Retention (Across All Indexers) (MB)", TotalAvgRawMBPerDay as "Total Raw Ingest per Day (Across All Indexers) (MB)"

[streamstats_example]
search_name = Top 5 Events Sorted By Time With Sum Of Bytes By Client IP
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,SFU
solution = <p>This search highlights traffic data for the top contributing clients by event count, with chronological sorting and byte aggregation per client IP.</p><p><b>Suggested Actions</b><br><b>1.</b> Review clients with unusually high bytes usage to identify anomalies.<br><b>2.</b> Investigate specific client IPs with unexpected trends in data usage.<br><b>3.</b> Correlate results with additional data sources for contextual understanding.<br><b>4.</b> Use insights for capacity planning and optimizing data transfer costs.<br><b>5.</b> Set alerts to monitor thresholds for bytes usage and identify issues in real-time.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specify the index and sourcetype for events.<br><b>02</b> <code>| head 5</code><br>       - Limit the results to the first 5 events.<br><b>03</b> <code>| sort _time</code><br>       - Sort results by the event timestamp (`_time`).<br><b>04</b> <code>| streamstats sum(bytes) as ASimpleSumOfBytes by clientip</code><br>       - Calculate a running total of the `bytes` field for each unique `clientip` and store it in 'ASimpleSumOfBytes'.<br>
explanation = <p>This query can be used to <b>monitor network traffic</b>. It helps identify <b>usage trends</b> for different clients over time, which is valuable for uncovering potential issues such as <b>data leaks</b> or <b>unusually high usage</b>. Each command plays a critical role, from filtering and sorting to calculating running totals.<br><b>Key commands explained:</b><br>- The initial `| head 5` limits the events to the top 5 based on the input data.<br>- Sorting by `_time` ensures events are displayed chronologically.<br>- The `| streamstats` command computes a running total of the `bytes` field for each unique `clientip`, granting visibility into traffic trends at the client level over time.</p>
quid = 62B6865EBEB5B5CF54EF81E31DC36710
search_author = grdhg24
updated_author = khutchinson
related_info = <p><a href="http://blogs.splunk.com/2014/04/01/search-command-stats-eventstats-and-streamstats-2/sourcetype=access_combined*" target="_blank">http://blogs.splunk.com/2014/04/01/search-command-stats-eventstats-and-streamstats-2/sourcetype=access_combined*</a></p>
description = <p>This query is retrieving the top 5 events from the specified index and sourcetype, sorting them by time, and then calculating a running total of the 'bytes' field for each unique 'clientip'.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| head 5\
	| sort _time\
	| streamstats sum(bytes) as ASimpleSumOfBytes by clientip

[successful_file_access_attempts_and_filename_accessed_1]
