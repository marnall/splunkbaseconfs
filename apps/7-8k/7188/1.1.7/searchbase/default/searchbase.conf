execution_plan = <b>01</b> <code>| rest /services/server/info</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Queries the Splunk REST API for server information<br><b>02</b> <code>| where "indexer" in(server_roles)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters results for servers that have the indexer role<br><b>03</b> <code>| table host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Formats results to show only host field<br><b>04</b> <code>| dedup host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Removes duplicate host entries<br><b>05</b> <code>| sort host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Sorts hostnames alphabetically<br><b>06</b> <code>| eval host="\""+host+"\""</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Formats hostnames as quoted strings<br><b>07</b> <code>| stats values(host) as hosts</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Consolidates all host values into a single list<br><b>08</b> <code>| eval indexers=mvjoin(hosts,",")</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Joins hostname list into a comma-separated string<br><b>09</b> <code>| table indexers</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Finalizes output to show the indexers field only<br>
