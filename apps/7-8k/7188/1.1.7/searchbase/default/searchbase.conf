execution_plan = <b>01</b> <code>index=_audit action=search info=completed</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Query the audit index for completed searches on search heads.<br><b>02</b> <code>search_id!=*rsa_scheduler_*</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Exclude RSA Scheduler-related searches.<br><b>03</b> <code>search_id!=*subsearch*</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Exclude subsearches to focus on primary searches.<br><b>04</b> <code>is_realtime=0</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Exclude real-time searches.<br><b>05</b> <code>stats latest(total_run_time) as total_run_time by savedsearch_name, _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate runtime metrics by saved search name for trending analysis.<br>
explanation = <p>This search analyzes audit log data to track search performance over time by capturing total runtime for each search execution. It excludes subsearches and real-time searches to focus on primary user-initiated and scheduled searches. By aggregating runtime metrics by saved search name and time, it enables trending analysis to identify searches that are becoming slower, detect performance degradation patterns, and support capacity planning decisions based on historical search workload patterns.</p><p>Overall, the search's design helps operations teams maintain efficient use of Splunk resources and provides foresight into potential search performance issues that could affect timely data insights.</p>
