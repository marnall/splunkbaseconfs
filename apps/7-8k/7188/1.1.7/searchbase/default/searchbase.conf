sub_category = Threat Detection
tags = Access,GoSplunk
solution = <p>This search offers a **comprehensive breakdown** of vulnerability detection levels to help prioritize remediation efforts.</p><p><b>Suggested Actions</b><br><b>1.</b> Focus immediate resources on remediating critical vulnerabilities.<br><b>2.</b> Address high and medium severity vulnerabilities based on your organization's risk tolerance.<br><b>3.</b> Regularly review low-severity vulnerabilities for potential prioritization.<br><b>4.</b> Investigate any unclassified or unexpected results in SEVERITY data.<br><b>5.</b> Use the recommended link for guidance on integrating Qualys with Splunk to enrich further analysis.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
