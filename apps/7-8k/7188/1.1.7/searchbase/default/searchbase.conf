description = <p>Summarizes <b>SSH Login Attempts Count by Network Type Over Time</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" "sshd" AND "Accepted password"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
explanation = <p>This search extracts successful SSH password authentication events and categorizes source IP addresses into internal or external network segments using CIDR matching. Security teams can use this to monitor exposure from external networks, detect abnormal access spikes, and identify potential credential misuse. Infrastructure administrators gain insight into whether expected access patterns align with internal network boundaries and segmentation policies. By trending login activity over time, organizations can identify emerging risk patterns, validate access controls, and strengthen authentication governance.</p>
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" "sshd" AND "Accepted password"</code><br> - Filter for successful SSH authentication events to isolate security-relevant activity.<br><b>02</b> <code>| rex ...</code><br> - Extract hostname, username, source IP, and source port from raw SSH log entries.<br><b>03</b> <code>| eval network=case(...)</code><br> - Classify source IP addresses as Internal or External using CIDR-based segmentation logic.<br><b>04</b> <code>| timechart count(username) by network</code><br> - Trend login volume over time to compare internal and external authentication activity.
solution = <p>This search enables visibility into <b>SSH authentication exposure</b> by separating internal from external login activity.</p><p><b>Suggested Actions</b></p><ul><li>Investigate spikes in external login activity for potential compromise or brute-force success.</li><li>Correlate external access with firewall and IDS telemetry.</li><li>Consider enforcing key-based authentication and MFA for SSH access.</li><li>Validate internal network CIDR ranges remain accurate and segmented.</li></ul><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/rex" target="_blank">Splunk Docs: rex Command Search</a><br>Reference for using regular expression field extraction.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/where" target="_blank">Splunk Docs: cidrmatch Function Search</a><br>Documentation for classifying IP ranges using CIDR logic.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/timechart" target="_blank">Splunk Docs: timechart Command Search</a><br>Guidance for building time-series authentication visualizations.</li><li><a href="https://splunkbase.splunk.com/category/security_compliance/" target="_blank">Splunkbase: Security & Compliance Category</a><br>Security-focused apps for monitoring and compliance use cases.</li><li><a href="https://lantern.splunk.com/Search?q=ssh%20authentication" target="_blank">Lantern: SSH Authentication Search</a><br>Operational guidance related to monitoring authentication patterns.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q="sshd%20authentication"" target="_blank">Community: SSHD Authentication Discussions</a><br>Community search results for SSH monitoring strategies.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>" "sshd" AND "Accepted password"\
| rex "[a-zA-z]{3}\s\d+\s\d+:\d+:\d+\s[a-zA-Z0-9-.]*\s[a-zA-z]{3}\s\d+\s\d+:\d+:\d+\s(?<hostname>.*)\ssshd\\[\d+\\]:\sAccepted\spassword\sfor\s(?<username>.*)\sfrom\s(?<sourceip>.*)\sport\s(?<sourceport>.*)\sssh2"\
| eval network=case (cidrmatch("192.168.0.0/24", sourceip),"Internal", cidrmatch("10.10.0.0/16",sourceip),"Internal", cidrmatch("192.168.20.0/24",sourceip),"Internal", 1=1,"External")\
| timechart count(username) by network

