dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>search index="_introspection" sourcetype=splunk_resource_usage...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Gathers raw resource data related to search components.<br><b>02</b> <code>| eval sid...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Defines relevant fields such as <b>sid</b>, <b>cpu</b>, and <b>memory_used</b> for subsequent processing.<br><b>03</b> <code>| stats...</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Computes <b>latest statistics</b> on resource usage metrics for trend analysis and reporting.<br>
explanation = <p>This search tracks the <b>resource consumption</b> of searches running in real-time across Splunk instances. It distinguishes between scheduled and ad-hoc searches, which aids in capacity planning and load balancing across Splunk infrastructure.</p><p>Key techniques include <b>eval</b> to calculate CPU and memory metrics as well as scan rates, and <b>stats</b> to summarize these metrics for review. This approach empowers Splunk administrators to troubleshoot and optimize search performance efficiently.</p><p>For junior Splunkers, understanding the impact of real-time searches on system resources underscores the importance of effectively managing system load, ensuring user queries do not degrade system performance.</p>
quid = 1D48079CB9A1E6707B798B376BDDC8B8
search_author = Splunk Works
description = <p>Summarizes <b>Realtime Search CPU and Memory Consumption</b> using <code>index="_introspection" sourcetype=splunk_resource_usage component=PerProcess data.search_props.role=head (data.search_pr</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_introspection" sourcetype=splunk_resource_usage component=PerProcess data.search_props.role=head (data.search_props.provenance=scheduler OR data.search_props.type=ad-hoc) data.search_props.sid::* (data.search_props.mode=RT OR data.search_props.mode="RT indexed") | eval sid = 'data.search_props.sid' | eval label='data.search_props.label' | eval pct_cpu = 'data.pct_cpu' | eval memory_used = 'data.mem_used' | eval scan_count = 'data.search_props.scan_count' | eval elapsed = 'data.elapsed' | eval scan_count_per_sec = scan_count/elapsed | eval mode = 'data.search_props.mode' | eval user = 'data.search_props.user' | eval provenance = 'data.search_props.provenance' | eval type = 'data.search_props.type' | stats latest(scan_count_per_sec) as scan_count_per_sec, latest(pct_cpu) as avg_cpu, latest(memory_used) as avg_memory_used, latest(mode) as mode, latest(user) as user by label, sid, provenance, type

[pi_resource_usage_with_io]
search_name = Resource Usage with IO
version = 2.x
date_created = 2025-12-01
category = Splunk
sub_category = Health
tags = Monitoring,Performance,Resources
solution = <p>This query enables operations and systems teams to monitor and act on resource utilization efficiently, helping to identify bottlenecks or overloaded systems.</p><p><b>Suggested Actions</b><br><b>1.</b> Set up alerts for high CPU, memory, or I/O usage.<br><b>2.</b> Automate scaling decisions or schedules based on detected trends.<br><b>3.</b> Optimize underperforming systems by analyzing disk I/O or memory usage.<br><b>4.</b> Enhance resource allocation policies for Splunk Indexers and forwarders.<br><b>5.</b> Integrate this search with reporting dashboards to visualize trends over time.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index="_introspection" sourcetype="splunk_resource_usage" component IN (Hostwide, IOStats)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Identify resource utilization data from the _introspection index and filter for Hostwide and IOStats components.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Rename fields prefixed with "data." for easier readability and access.<br><b>03</b> <code>| eval cpu=cpu_system_pct+cpu_user_pct</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Combine system and user CPU percentages into a single field.<br><b>04</b> <code>| stats latest(cpu) as cpu latest(mem_used) as mem_used latest(reads_kb_ps) as reads_kb_ps latest(writes_kb_ps) as writes_kb_ps latest(reads_ps) as reads_ps latest(writes_ps) as writes_ps by _time host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate the latest resource metrics for each host and timestamp, simplifying monitoring and analysis.<br>
explanation = <p>This query pulls raw resource usage data from the <b>_introspection</b> index, specifically from components concerned with <b>hostwide resource usage</b> and <b>disk I/O statistics</b>. It simplifies the dataset by renaming fields, calculating a cumulative CPU usage metric, and summarizing the latest statistics for CPU, memory usage, and disk read/write activity. This provides insights into trends and alerts around high resource consumption.</p><p>For example, operations teams can use these metrics to identify high workloads on specific hosts potentially causing performance degradation. The <b>eval</b> function simplifies data calculations, while <b>stats</b> efficiently aggregates the key metrics for analysis and reporting.</p><p>For early-career Splunk users, the search provides an example of essential SPL commands such as <b>rename</b>, <b>eval</b>, and <b>stats</b>, which are foundational for any analytics use case in Splunk. Understanding this query's modularity enhances operational effectiveness by promoting reusable components and field normalization techniques.</p>
quid = 942A6D3A7C633A5FD52B05014F11A74F
search_author = Splunk Works
description = <p>This search collects key performance metrics for CPU, memory, and disk I/O statistics across hosts. It focuses on identifying usage patterns and high consumption resources, providing a clear view of resource utilization in environments running Splunk.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_introspection" sourcetype="splunk_resource_usage" component IN (Hostwide, IOStats) | rename data.* as * | eval cpu=cpu_system_pct+cpu_user_pct | stats latest(cpu) as cpu latest(mem_used) as mem_used latest(reads_kb_ps) as reads_kb_ps latest(writes_kb_ps) as writes_kb_ps latest(reads_ps) as reads_ps latest(writes_ps) as writes_ps by _time host

[pi_rm_disk_usage_by_user]
search_name = Current Disk Usage By User
