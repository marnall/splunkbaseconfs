execution_plan = <b>01</b> <code>| sort _time</code><br>       - Sorts the events in ascending order based on their occurrence time.<br> <b>02</b> <code>| streamstats current=f global=f window=1 last(_time) as last_ts</code><br>       - Tracks the timestamp of the prior event for each event in the dataset.<br> <b>03</b> <code>| eval time_since_last = _time - last_ts</code><br>       - Calculates the elapsed time between consecutive events.<br> <b>04</b> <code>| fieldformat time_since_last = tostring(time_since_last, "duration")</code><br>       - Converts the calculated time interval into a readable duration format.<br>
explanation = <p>This query analyzes the time intervals between consecutive events, helping to uncover trends or unusual patterns in event timing. The search sorts events chronologically, computes the timestamp of the prior event, and determines the interval using <code>streamstats</code>. The calculated difference is then formatted into a user-friendly duration using the <code>fieldformat</code> command, making it easier to interpret. This search is particularly useful for detecting irregularities like delays or anomalies in systems where timing consistency is critical.</p>
