execution_plan = <b>01</b> <code>| rest /services/server/info</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieves server information from the Splunk REST API.<br><b>02</b> <code>| where "indexer" in(server_roles)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters servers by their designated role as 'indexers'.<br><b>03</b> <code>| table host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Extracts the host field containing the indexer hostnames.<br><b>04</b> <code>| dedup host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Removes duplicate host entries.<br><b>05</b> <code>| sort host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Sorts the hostnames in alphabetical order.<br><b>06</b> <code>| eval host="\\""+host+"\\""</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Formats the hostnames for output.<br><b>07</b> <code>| stats values(host) as hosts</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates unique hostnames into a single multi-value field.<br><b>08</b> <code>| eval indexers=mvjoin(hosts,",")</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Combines all hostnames into a comma-separated string.<br><b>09</b> <code>| table indexers</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Displays the final list of indexers.</p>
explanation = <p>By querying the Splunk REST API, this search uncovers indexer instances and their corresponding roles within the Splunk deployment. Understanding the indexer topology is critical for validating indexing health, load distribution, and identifying potential ingestion bottlenecks. Additionally, the search uses the <b>| rest</b> command for retrieving REST API data, <b>| where</b> for role-specific filtering, and <b>| eval</b> for data transformation. These techniques showcase Splunk's ability to combine infrastructure insight with dynamic query building.</p><p>From an operational perspective, the query helps monitor and analyze indexer-specific metrics. It acts as a foundational component for targeted diagnostics and troubleshooting, ultimately enabling more accurate resource utilization and improved system performance. Junior engineers benefit from learning how to use REST API calls, manipulating field values, and leveraging foundational SPL commands like <b>stats</b>, <b>table</b>, and <b>dedup</b>.</p>
