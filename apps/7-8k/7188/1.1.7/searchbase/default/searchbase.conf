[detect_first_time_user_agent_strings_contacting_one_domain]
search_name = Detect First-Time User-Agent Strings Contacting One Domain
version = 1.0.5
date_created = 2025-05-12 10:28:19
date_updated = 2025-07-02 15:21:38
category = Threat Hunter's Cookbook
sub_category = Combined methods
tags = Suspicious Domains,User Agent
solution = <p>The query provides visibility into potentially suspicious new connections by tracking previously unseen user-agent strings. This capability is <b>valuable</b> for identifying possible phishing or malware attempts. Adjust baselines to reduce <b>false positives</b> as new legitimate user-agents are detected.</p><p><b>Suggested Actions</b><br><b>1.</b> Review flagged user-agent strings for suspicious behavior.<br><b>2.</b> Investigate associated domains for threats.<br><b>3.</b> Update baselines as needed to reduce false positives.<br><b>4.</b> Monitor changes in user-agent behaviors to detect evolving threats.<br><b>5.</b> Collaborate with threat intelligence teams to validate findings.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" (http_user_agent="*" http_user_agent!="" http_user_agent!="-") (dest=* OR url=* OR request=*) earliest="-30d"</code><br>       - Establish baseline by collecting user-agent interactions<br><b>02</b> <code>| eval urlfield=coalesce(url, request, domain, dest)</code><br>       - Coalesce URLs and destinations<br><b>03</b> <code>| `ut_parse_extended(urlfield,list)`</code><br>       - Parse URL fields<br><b>04</b> <code>| stats earliest(_time) as earliest, latest(_time) as latest, count as request_count, dc(domain) as domain_count by http_user_agent</code><br>       - Generate statistics per user-agent<br><b>05</b> <code>| outputlookup useragent_domain_tracker.csv</code><br>       - Save baseline data for future comparison<br>
explanation = <p>Attackers often use custom or unusual user-agent strings when attempting to bypass traditional detection approaches. A new user-agent string connecting to a single domain may indicate a phishing attempt, malware communication, or another suspicious interaction.</p><p>Legitimate user-agent strings usually connect to multiple domains as part of normal browsing or API usage. A new user-agent string that only connects to a single domain within a specified time window could be a sign of Command and Control (C2) traffic, where the attacker is using a unique user-agent for communication with a specific domain under their control.</p><p>During the first run, legitimate new user-agents (e.g., newly deployed applications or updated browsers) may flag as outliers. These cases should be reviewed and added to the baseline as necessary to minimize false positives over time.</p>
quid = 82FCCA5A6A703127DB0CEDB4C8FE754D
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Detect First-Time User-Agent Strings Contacting One Domain</b> using <code>index="<<index>>" (http_user_agent="*" http_user_agent!="" http_user_agent!="-") (dest=* OR url=* OR request=*) earliest</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" (http_user_agent="*" http_user_agent!="" http_user_agent!="-") (dest=* OR url=* OR request=*) earliest="-30d" \
| eval urlfield=coalesce(url, request, domain,dest) \
| eval list="*" \
| `ut_parse_extended(urlfield,list)` \
| eval domain=ut_domain \
| fields - ut_* list \
| stats earliest(_time) as earliest latest(_time) as latest, count AS request_count, dc(domain) AS domain_count by http_user_agent \
| where latest > relative_time(now(), "-30d") \
| outputlookup useragent_domain_tracker.csv Detection search index="<<index>>" (http_user_agent="*" http_user_agent!="" http_user_agent!="-") (dest=* OR url=* OR request=*) earliest="-1h" \
| eval urlfield=coalesce(url, request, domain,dest) \
| eval list="*" \
| `ut_parse_extended(urlfield,list)` \
| eval domain=ut_domain \
| fields - ut_* list \
| where domain!="None" \
| stats earliest(_time) as earliest latest(_time) as latest, count AS request_count, dc(domain) AS domain_count, values(src) AS src, values(user) AS user, values(dest) AS dest, values(source) AS source, values(sourcetype) AS sourcetype, values(index) AS index by http_user_agent \
| inputlookup append=t useragent_domain_tracker.csv \
| stats min(earliest) as earliest max(latest) as latest, sum(request_count) AS request_count, sum(domain_count) AS domain_count, values(src) AS src, values(user) AS user, values(dest) AS dest, values(source) AS source, values(sourcetype) AS sourcetype, values(index) AS index by http_user_agent \
| where latest > relative_time(now(), "-30d") \
| outputlookup useragent_domain_tracker.csv \
| eval maxlatest=now() \
| eval isOutlier=if(earliest >= relative_time(maxlatest, "-1h") AND (domain_count=1), 1, 0) \
| where isOutlier=1 \
| convert timeformat="%Y-%m-%dT%H:%M:%S" ctime(earliest), ctime(latest), ctime(maxlatest)

