solution = <p>This query provides visibility into system <b>load averages</b> across hosts, helping identify resource bottlenecks and performance issues before they impact operations.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor hosts with consistently high load averages for capacity planning needs.<br><b>2.</b> Investigate sudden spikes in load averages to identify root causes.<br><b>3.</b> Compare 1-minute, 5-minute, and 15-minute averages to understand load trends.<br><b>4.</b> Set up alerts for load averages exceeding acceptable thresholds.<br><b>5.</b> Use historical data to plan for scaling or optimization efforts.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=top_header</code><br>       - Specifies the data source with the target index and sourcetype.<br><b>02</b> <code>| timechart span=1m values(load_1minavg) values(load_5minavg) values(load_15minavg) by host</code><br>       - Creates a timechart of 1-minute, 5-minute, and 15-minute load averages, grouped by host, to visualize trends and anomalies over time.<br>
explanation = <p>This query provides a detailed time-based view of host resource usage by capturing load averages over 1-minute, 5-minute, and 15-minute intervals. The <code>| timechart</code> command organizes this data into an easy-to-read visualization, enabling effective monitoring and trend analysis. High load averages can indicate a need for performance tuning or resource scaling, while anomalies could point to potential issues.</p>
quid = EF628101781B0405AEEE4B565BE4B017
search_author = GoSplunk: manderso
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/top-header-cpu-memory-status" target="_blank">https://gosplunk.com/top-header-cpu-memory-status</a></p>
description = <p>Summarizes <b>1, 5, 15 Minute Load Averages Timechart by Host</b> using <code>index="<<index>>" sourcetype=top_header</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=top_header \
	| timechart span=1m values(load_1minavg) values(load_5minavg) values(load_15minavg) by host

[top_header_cpu_memory_status_3]
search_name = Memory Usage Percentage Gauge by Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = Servers
tags = Access,Performance
solution = <p>By analyzing the percentage of memory usage for each host, this search offers <b>detailed operational insights</b> into resource utilization, enabling proactive management of server infrastructure. Efficient memory monitoring ensures that hosts are running within acceptable parameters, reducing the risk of crashes or slowdowns caused by excessive memory usage.</p> <p><b>Suggested Actions</b><br> <b>1.</b> Set thresholds to identify memory utilization extremes (e.g., above 80%).<br> <b>2.</b> Investigate specific hosts with persistently high memory usage and assess running processes.<br> <b>3.</b> Scale hardware resources or optimize workloads for affected hosts where necessary.<br> <b>4.</b> Schedule routine monitoring to identify long-term trends in memory usage.<br> <b>5.</b> Configure alerts based on memory usage thresholds using the provided search.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=top_header</code><br>       - Searches the specified index for events with the sourcetype 'top_header'.<br> <b>02</b> <code>| eval percentUsed=mem_used/mem_total*100</code><br>       - Calculates the percentage of memory used for each host by dividing 'mem_used' by 'mem_total' and multiplying the result by 100. The calculated value is stored as 'percentUsed'.<br> <b>03</b> <code>| gauge percentUsed by host</code><br>       - Generates a gauge chart visualizing the 'percentUsed' field for each host, spotlighting memory consumption patterns.<br>
explanation = <p>This search monitors the memory usage across multiple hosts, calculating the memory usage percentage by dividing the 'mem_used' field value by the 'mem_total' field value, then multiplying it by 100 to determine the usage proportion. Hosts using excessive memory can signify potential risk areas that require <b>immediate optimization</b>. Visualizing the data in a gauge chart ensures reporting clarity, making it easy for system administrators to focus on problematic hosts swiftly.</p>
quid = 5C29FF916FE7A7BCD8A68B8097C9F5D0
search_author = GoSplunk: manderso
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/top-header-cpu-memory-status" target="_blank">https://gosplunk.com/top-header-cpu-memory-status</a></p>
description = <p>Summarizes <b>Memory Usage Percentage Gauge by Host</b> using <code>index="<<index>>" sourcetype=top_header | eval percentUsed=mem_used/mem_total*100</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=top_header | eval percentUsed=mem_used/mem_total*100\
	| gauge percentUsed by host

[top_offending_ssh_failure_by_source_ip]
search_name = Failed Login Attempts by IP, City, and Country
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Infrastructure
sub_category = Servers
tags = Access,GoSplunk
solution = <p>This query delivers operational insights into the sources of failed SSH login attempts. By identifying frequent offenders and associating them with geographical data, admins can better understand the threat landscape.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate high-failure IPs for potential brute force attacks.<br><b>2.</b> Block or honeypot commonly attacking IPs.<br><b>3.</b> Strengthen SSH credential policies (e.g., 2FA, key-based access).<br><b>4.</b> Review access patterns from uncommon geographic regions.<br><b>5.</b> Use findings to refine intrusion detection and prevention systems.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>" "Failed password for " NOT "Failed password for invalid"</code><br>       - Filters events for failed password attempts excluding invalid users<br><b>02</b> <code>| rex "Failed\spassword\sfor\s(?<username>.*)\sfrom\s(?<source_ip>\d+.\d+.\d+.\d+)\sport\s(?<port>\d+)\s(?<protocol>.*)"</code><br>       - Extracts username, source IP, port, and protocol details<br><b>03</b> <code>| stats count(source_ip) as "Failed Attempts" by source_ip</code><br>       - Aggregates the count of failed attempts by each source IP<br><b>04</b> <code>| iplocation source_ip</code><br>       - Adds geographical location for each source IP<br><b>05</b> <code>| sort - "Failed Attempts"</code><br>       - Sorts the IPs by the count of attempts, in descending order<br><b>06</b> <code>| table source_ip,"Failed Attempts",City,Country</code><br>       - Displays results with relevant fields in a table<br>
explanation = <p>This search provides critical insights for monitoring and mitigating security risks related to SSH login attempts. By identifying and counting failed login attempts from various IPs, it helps detect patterns of <b>brute force attacks</b> or other malicious activities. The use of <code>rex</code> extracts key information from logs, while <code>stats</code> aggregates the counts. Adding location data via <code>iplocation</code> enhances situational awareness by revealing if attacks originate from unexpected regions. Sorting by frequency addresses the most significant threats promptly, and the table format simplifies communication of findings to relevant stakeholders.</p>
quid = E7F8A9B0C1D2E3F4A5B6C7D8E9F0A1BD
search_author = GoSplunk: DaveyBoy
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/top-offending-ssh-failure-by-source-ip" target="_blank">https://gosplunk.com/top-offending-ssh-failure-by-source-ip</a></p>
description = <p>Summarizes <b>Failed Login Attempts by IP, City, and Country</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" "Failed password for " NOT "Failed password for invalid"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" "Failed password for " NOT "Failed password for invalid"\
	| rex "Failed\spassword\sfor\s(?<username>.*)\sfrom\s(?<source_ip>\d+.\d+.\d+.\d+)\sport\s(?<port>\d+)\s(?<protocol>.*)"\
	| stats count(source_ip) as "Failed Attempts" by source_ip\
	| iplocation source_ip\
	| sort - "Failed Attempts"\
	| table source_ip,"Failed Attempts",City,Country

[top_pages_by_bad_http_status_for_last_7_days_55]
search_name = Weekly Report: Unique IPs and Total Count by URI and Status (300+)
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,SFU
solution = <p>This query helps identify <b>problematic URIs and HTTP status codes</b> by tracking unique client IPs and request volumes over a 7-day period. This insight is critical for maintaining web server health and security.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate URIs with high counts of 4xx or 5xx status codes for potential issues.<br><b>2.</b> Monitor for unusual spikes in unique IPs that may indicate DDoS attacks.<br><b>3.</b> Review 3xx redirects to ensure they are intentional and properly configured.<br><b>4.</b> Correlate findings with application logs to identify root causes of errors.<br><b>5.</b> Set up alerts for abnormal increases in error status codes.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=access* earliest = -7d@d latest = now status>=300</code><br>       - This line specifies the index to search in, the sourcetype to look for (in this case, any type that starts with 'access'), the time range to search within (the last 7 days), and a condition that the status code must be 300 or higher.<br><b>02</b> <code>| stats dc(clientip) as unique ips count as total count by uri, status</code><br>       - This line uses the 'stats' command to calculate the distinct count (dc) of client IPs (renamed as 'unique ips') and the total count of events (renamed as 'total count'), grouped by URI and status code.<br>
explanation = <p>This query can be used to <b>identify</b> potential issues with specific URIs and status codes. For instance, if a particular URI has a <b>high number</b> of 500 status codes, it might indicate a server error. Similarly, a <b>large volume</b> of unique IPs could signal a distributed denial of service (DDoS) attack. Understanding these patterns allows administrators and engineers to take proactive measures to maintain system reliability and integrity.</p>
quid = E6C1F9A9BD925C457690A696D1B38A7B
search_author = grdhg24
updated_author = khutchinson
description = <p>This query is <b>searching</b> for all access logs in a specific index from the last 7 days where the status code is 300 or higher.</p> \
	<p>It then provides a <b>count</b> of unique client IPs and total count for each combination of URI and status code.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="access*" earliest = -7d@d latest = now status>=300\
	| stats dc(clientip) as "unique ips" count as "total count" by uri, status

