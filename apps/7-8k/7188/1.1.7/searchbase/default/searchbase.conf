category = Threat Hunter's Cookbook
sub_category = Combined methods
tags = DNS,Users
solution = <p>This detection first extracts and maintains a baseline list of all domains accessed in the environment. The data source would typically include proxy logs, DNS logs or endpoint logs with outbound HTTP or DNS traffic.</p><p><b>Baseline generation search</b> (only needs to run once)</p><p>(index="<<index>>" OR index=dns) (user="*" user!="" user!="-" dest=* dest!="" dest!="-")elatest > o(- domen, "-30d") p><p><em>*Special Ingredient: the `ut_parse_extended` macro requires <u><a rel="noopener noreferrer" href="https://splunkbase.splunk.com/app/2734">URL Toolbox</a></u>, available on Splunkbase.</em></p><p>...(content truncated for brevity). To see all content download <a rel="noopener noreferrer" href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html">The Threat Hunter's Cookbook</a></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>This type of activity could be indicative of a spear phishing campaign, malware distribution, C2 communication, or a variety of other threats. By using <a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/appendpipe"><b>appendpipe</b></a> with <a rel="noopener noreferrer" href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/outputlookup"><b>outputlookup</b></a>, we can strip away fields that don’t need to be saved in the baseline. This reduces the size and cardinality of the baseline significantly. Continuing with ‘| where a=b’ closes off the branch for the search so we don’t get duplicate events for the output. We have set a baseline max age of 30 days.</p>
quid = E127E88B1281DEDF4E4F9B83839A1B20
search_author = Ryan Fetterman & Sydney Marrone
updated_author = khutchinson
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p><b>Problem</b></p><p>You want to create a baseline, and identify when multiple first-time users connect to a new domain.</p>
execution_plan = <b>01</b> <code>index="<<index>>" (user="*" user!="" user!="-" dest=* dest!="" dest!="-") earliest="-30d"</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>eval list="*"</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>03</b> <code>`ut_parse_extended(url,list)</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>04</b> <code>eval domain=ut_domain</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>05</b> <code>fields - ut_* list</code><br>       - Keep only the fields needed for the next step or the final output.<br><b>06</b> <code>stats earliest(_time) as earliest latest(_time) as latest, count as request_count by domain</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>07</b> <code>where latest > relative_time(now(), "-30d")</code><br>       - Filter the results to the records that match the final conditions.<br><b>08</b> <code>outputlookup user_domain_tracker.csv</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>09</b> <code>eval urlfield=coalesce(url, request, domain,dest)</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>10</b> <code>eval list="*"</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>11</b> <code>`ut_parse_extended(urlfield,list)</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>12</b> <code>eval domain=ut_domain</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>13</b> <code>fields - ut_* list</code><br>       - Keep only the fields needed for the next step or the final output.<br><b>14</b> <code>where domain!="None"</code><br>       - Filter the results to the records that match the final conditions.<br><b>15</b> <code>stats earliest(_time) as earliest latest(_time) as latest, values(src) AS src, values(dest) AS dest, values(source) AS source, values(sourcetype) AS sourcetype, values(index) AS index, values(user) AS user by domain</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>16</b> <code>inputlookup append=t user_domain_tracker.csv</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>17</b> <code>stats min(earliest) as earliest max(latest) as latest, values(src) AS src, values(dest) AS dest, values(source) AS source, values(sourcetype) AS sourcetype, values(index) AS index, values(user) AS user by domain</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>18</b> <code>appendpipe [| fields domain earliest latest</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>19</b> <code>stats min(earliest) as earliest max(latest) as latest by domain</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>20</b> <code>where latest > relative_time(now(), "-30d")</code><br>       - Filter the results to the records that match the final conditions.<br><b>21</b> <code>outputlookup user_domain_tracker.csv</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>22</b> <code>where a=b ]</code><br>       - Filter the results to the records that match the final conditions.<br><b>23</b> <code>eval maxlatest=now()</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>24</b> <code>eval isOutlier=if(earliest >= relative_time(maxlatest, "-1h"), 1, 0)</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>25</b> <code>where isOutlier=1</code><br>       - Filter the results to the records that match the final conditions.<br><b>26</b> <code>eventstats dc(user) AS users_for_domain BY domain</code><br>       - Compute summary statistics and add them back to each matching event.<br><b>27</b> <code>eval isOutlier=if(users_for_domain>1, 1, 0)</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>28</b> <code>where isOutlier=1</code><br>       - Filter the results to the records that match the final conditions.<br><b>29</b> <code>convert timeformat="%Y-%m-%dT%H:%M:%S" ctime(earliest), ctime(latest), ctime(maxlatest)</code><br>       - Convert field values into a more useful display or analysis format.<br><b>30</b> <code>fields - src user</code><br>       - Keep only the fields needed for the next step or the final output.<br>
search = index="<<index>>" (user="*" user!="" user!="-" dest=* dest!="" dest!="-") earliest="-30d" \
	| eval list="*" \
	| `ut_parse_extended(url,list)` \
	| eval domain=ut_domain \
	| fields - ut_* list \
	| stats earliest(_time) as earliest latest(_time) as latest, count as request_count by domain \
	| where latest > relative_time(now(), "-30d") \
	| outputlookup user_domain_tracker.csv \
	| eval urlfield=coalesce(url, request, domain,dest) \
	| eval list="*" \
	| `ut_parse_extended(urlfield,list)` \
	| eval domain=ut_domain \
	| fields - ut_* list \
	| where domain!="None" \
	| stats earliest(_time) as earliest latest(_time) as latest, values(src) AS src, values(dest) AS dest, values(source) AS source, values(sourcetype) AS sourcetype, values(index) AS index, values(user) AS user by domain \
	| inputlookup append=t user_domain_tracker.csv \
	| stats min(earliest) as earliest max(latest) as latest, values(src) AS src, values(dest) AS dest, values(source) AS source, values(sourcetype) AS sourcetype, values(index) AS index, values(user) AS user by domain \
	| appendpipe \
	[| fields domain earliest latest \
	| stats min(earliest) as earliest max(latest) as latest by domain \
	| where latest > relative_time(now(), "-30d") \
	| outputlookup user_domain_tracker.csv \
	| where a=b ] \
	| eval maxlatest=now() \
	| eval isOutlier=if(earliest >= relative_time(maxlatest, "-1h"), 1, 0) \
	| where isOutlier=1 \
	| eventstats dc(user) AS users_for_domain BY domain \
	| eval isOutlier=if(users_for_domain>1, 1, 0) \
	| where isOutlier=1 \
	| convert timeformat="%Y-%m-%dT%H:%M:%S" ctime(earliest), ctime(latest), ctime(maxlatest) \
	| fields - src user

[detecting_outbound_traffic_on_port_1337_across_network_logs]
search_name = Detecting Outbound Traffic on Port 1337 Across Network Logs
version = 1.0.3
