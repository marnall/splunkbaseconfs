tags = Access,GoSplunk,ITOps
solution = <p>Real-time memory monitoring helps identify performance bottlenecks and prevent system failures.</p><p><b>Suggested Actions</b><br><b>1.</b> Alert when available memory falls below critical levels.<br><b>2.</b> Investigate processes consuming excessive memory.<br><b>3.</b> Correlate memory usage with application performance issues.<br><b>4.</b> Plan capacity upgrades based on usage patterns.<br><b>5.</b> Monitor for memory leaks in applications.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=Perfmon:Available Memory</code><br>       - Specifies the data source by looking within the designated index for data of the 'Perfmon:Available Memory' sourcetype.<br><b>02</b> <code>bucket _time span=1m</code><br>       - Groups events into one-minute intervals based on their timestamps.<br><b>03</b> <code>eval gigabytes=(((Value/1024)/1024)/1024)</code><br>       - Converts the memory value from bytes to gigabytes.<br><b>04</b> <code>eval GB=round(gigabytes, 25)</code><br>       - Rounds the gigabyte value to two decimal places for precision.<br><b>05</b> <code>gauge GB</code><br>       - Displays the rounded gigabyte value through a gauge visualization.<br>
explanation = <p>This query tracks the <b>available memory</b> in a Windows environment and converts it into gigabytes for greater readability and analysis. By leveraging the 'Perfmon:Available Memory' sourcetype, it effectively identifies memory trends over one-minute intervals.</p><p>Using the <b>bucket</b> command to group events ensures data consistency and helps to monitor memory usage patterns in real-time. The <b>eval</b> function facilitates the conversion of the memory value from bytes to gigabytes, offering a comprehensible view of data for IT operations teams or administrators. The final visualization through the <b>gauge</b> command enables an intuitive representation of memory utilization, highlighting potential issues for proactive intervention.</p>
quid = E08D0B0A12F4CFA73A33A0D59D7C1BE7
related_info = <p><a href="https://gosplunk.com/available-memory-within-perfmon" target="_blank">https://gosplunk.com/available-memory-within-perfmon</a></p>
description = <p>This search monitors <b>available memory</b> on Windows systems by converting performance monitoring data to gigabytes and grouping metrics on a <b>1-minute interval</b> basis. It displays the processed results in a <b>gauge visualization</b>, enabling quick identification of memory trends or issues.</p>
search = index="<<index>>" sourcetype="Perfmon:Available Memory"\
| bucket _time span=1m\
| eval gigabytes=(((Value/1024)/1024)/1024)\
| eval GB=round(gigabytes, 25)\
| gauge GB

