category = Splunk
sub_category = _internal
tags = Access,Indexes
solution = <p>This query provides <b>critical visibility</b> into the systems currently in <b>maintenance mode</b>. By leveraging this search, administrators can ensure that planned downtime or necessary updates happen without disrupting operations, while also maintaining awareness of affected infrastructure.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Cross-check the results to confirm whether the hosts are expected to be in maintenance mode.<br> \
<b>2.</b> Investigate the reason for maintenance mode if unexpected events are observed.<br> \
<b>3.</b> Use the identified hosts to correlate with other monitoring systems and ensure no unintended impacts.<br> \
<b>4.</b> Share the output with relevant teams for better coordination during system maintenance.<br> \
<b>5.</b> Schedule and monitor post-maintenance processes for the affected hosts to return them to operational status.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd reason="Maintenance mode*"</code><br>       - Filters events from the internal index with a sourcetype of splunkd and where the reason indicates maintenance mode.<br> \
	<b>02</b> <code>| dedup host</code><br>       - Removes duplicate events for each host, retaining the most recent event per host.<br> \
	<b>03</b> <code>| eval maintenance_mode_enabled=if(reason="Maintenance mode started", "true", "false")</code><br>       - Creates a new field to indicate whether maintenance mode is currently enabled, based on the reason.<br> \
	<b>04</b> <code>| where maintenance_mode_enabled="true"</code><br>       - Filters the results to include only hosts where maintenance mode is currently enabled.<br> \
	<b>05</b> <code>| table _time, host, reason, maintenance_mode_enabled</code><br>       - Displays the results in a structured table format for easy interpretation.<br>
explanation = <p>This query is useful for <b>system administrators</b> to monitor and manage <b>maintenance mode</b> across their systems. By focusing on events where 'maintenance mode' was enabled, administrators can quickly ascertain which hosts are affected, the specific reasons for it, and the corresponding timestamps.</p> \
	<p>The query leverages <b>dedup</b> to ensure only the latest events per host are considered, preventing data redundancy. It utilizes <code>eval</code> to create a conditional field (<b>maintenance_mode_enabled</b>) for a clearer classification. Additionally, the <code>table</code> command ensures a well-structured output for intuitive interpretation and reporting. This search is essential for maintaining <b>visibility</b> into ongoing host operations where downtime or updates might be occurring.</p>
quid = 8ECC3786CDC0D589C5B6B3C1A371047D
search_author = GoSplunk: pjcordes
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/detect-indexers-in-maintenance-mode" target="_blank">https://gosplunk.com/detect-indexers-in-maintenance-mode</a></p>
description = <p>This query is used to identify the hosts where <b>maintenance mode</b> has been enabled.</p> \
	<p>It returns a table with the <b>time of the event</b>, the <b>host name</b>, the <b>reason</b> for the event, and whether <b>maintenance mode</b> is enabled.</p>
search = index=_internal sourcetype=splunkd reason="Maintenance mode*"\
	| dedup host\
	| eval maintenance_mode_enabled=if(reason="Maintenance mode started", "true", "false")\
	| where maintenance_mode_enabled="true"\
	| table _time, host, reason, maintenance_mode_enabled

[detect_lateral_movement_with_transaction_based_login_grouping]
search_name = Detect Lateral Movement with Transaction-Based Login Grouping
version = 1.0.2
date_created = 2025-05-05 11:52:21
date_updated = 2025-07-02 14:54:57
category = Threat Hunter's Cookbook
sub_category = Grouping
tags = Grouping,Transaction
solution = <p>This query uses the <b>transaction</b> command to group events for each user, focusing on sequences of <b>failed login</b> attempts followed by a <b>successful</b> one within a 10-second window, with no more than 5 seconds between events. It then filters for sequences with more than 3 events and displays the results in a table.</p><p>The <b>transaction</b> command is ideal here because it allows setting constraints like maxspan and maxpause to capture only short bursts of login activity.</p><p>To see all content download <a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">The Threat Hunter's Cookbook</a></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>The <b>transaction</b> command allows you to group together related events that share a common field or fields and occur within a specified time window. It's especially useful for tracking a sequence of related events across different logs or event types.</p><p><b>| transaction</b> [<field-list>] [name=<transaction-name>] [<txn_definition-options>...] [<memcontrol-options>...] [<rendering-options>...]</p>
quid = F23590448553F8C5600D1C38469E5ABE
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>This search tracks <b>login attempts</b> that occur close together across different systems by the same user, which could indicate <b>lateral movement</b>. It leverages the <b>transaction</b> command to group and analyze these events efficiently, providing insights into potential security threats.</p>
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=login (action="failure" OR action="success")</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>transaction user maxspan=10s maxpause=5s startswith=(action="failure") endswith=(action="success")</code><br>       - Group related events into transactions so duration or sequence can be analyzed.<br><b>03</b> <code>search eventcount > 3</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>04</b> <code>table _time user host eventcount duration</code><br>       - Format the final output columns for review or dashboard use.<br>
search = index="<<index>>" sourcetype=login (action="failure" OR action="success") \
	| transaction user maxspan=10s maxpause=5s startswith=(action="failure") endswith=(action="success") \
	| search eventcount > 3 \
	| table _time user host eventcount duration

[detect_scheduler_running_twice_a_search]
search_name = Duplicate Scheduled Searches in Internal Index
