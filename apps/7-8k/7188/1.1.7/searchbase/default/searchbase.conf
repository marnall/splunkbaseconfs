[grouping_categorical_fields_to_detect_suspicious_traffic]
search_name = Grouping Categorical Fields to Detect Suspicious Traffic
version = 1.0.2
date_created = 2025-05-05 12:03:41
date_updated = 2025-7-2 14:58:26
category = Threat Hunter's Cookbook
sub_category = Clustering
tags = Categorical Grouping,User Agent
solution = <p>Clusters similar user_agent strings from firewall events based on a 90% similarity threshold (t=0.9). This value means user agents need to be 90% similar to be grouped in the same cluster. Then it provides a summary of the source and destination IPs, user agent, assigned cluster label (cluster_label), and the event count for each cluster (cluster_count).</p><p><b>Suggested Actions</b><br><b>1.</b> Review the identified clusters to quickly determine patterns of user_agent activity that deviate from the norm.<br><b>2.</b> Investigate any anomalies or unexpected cluster labels for potential malicious behavior.<br><b>3.</b> Refine search thresholds or parameters to calibrate output precision across larger or smaller datasets.<br><b>4.</b> Archive and compare cluster insights over time to detect evolving threat signatures.<br><b>5.</b> Leverage correlated fields like src_ip and dest_ip for enriching downstream investigations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>The <b>cluster</b> command is pivotal for identifying patterns, categorizing data, and uncovering anomalies. It groups events into clusters based on field values, making it a powerful categorization tool for large datasets. In this use case, it applies a similarity threshold (<b>t=0.9</b>) on user_agent strings, ensuring sufficient similarity before clustering them together. This provides meaningful clusters that summarize repetitive or patterned traffic behaviors.</p><p>The <b>fields</b> command ensures that only relevant fields like src_ip, dest_ip, and user_agent remain in the processing pipeline. This optimizes search performance by reducing unnecessary data handling while focusing on the critical dimensions of network traffic.</p><p>By aggregating clustered information with <b>table</b>, the search provides an easily interpretable format that correlates IPs and user_agent strings to their respective cluster labels and occurrence counts. This structured output enables rapid analysis and response.</p>
quid = 14CD1C80E59279F641A4809FB43D4035
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Grouping Categorical Fields to Detect Suspicious Traffic</b> using <code>index="<<index>>" user_agent=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>" user_agent=*</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>fields src_ip dest_ip user_agent</code><br>       - Keep only the fields needed for the next step or the final output.<br><b>03</b> <code>cluster t=0.9 showcount=true field=user_agent labelonly=true</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br><b>04</b> <code>table src_ip dest_ip user_agent cluster_label cluster_count</code><br>       - Format the final output columns for review or dashboard use.<br>
search = index="<<index>>" user_agent=* \
	| fields src_ip dest_ip user_agent \
	| cluster t=0.9 showcount=true field=user_agent labelonly=true \
	| table src_ip dest_ip user_agent cluster_label cluster_count

[high_risk_transaction_detection]
search_name = High Risk Transaction Detection
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Detail,Fraud,Risk
solution = <p>This SPL identifies high-value, high-risk transactions for Financial Services, supporting AML and fraud detection efforts. <b>Suggested Actions</b></p><p>1. Alert risk and compliance teams for review.<br>2. Investigate flagged transactions for regulatory reporting.<br>3. Correlate with customer profiles and risk histories.<br>4. Integrate results with AML monitoring systems.<br>5. Refine risk lists and thresholds as patterns change in Financial Services.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="buttercup_federal" status="completed" earliest=-24h@h</code><br>      - Selects completed transactions from the last 24 hours.<br><b>02</b> <code>| lookup high_risk_countries country AS dest_country OUTPUT country AS destination_high_risk</code><br>      - Flags high-risk destination countries.<br><b>03</b> <code>| lookup high_risk_ips ip_address AS dest_ip OUTPUT ip_address AS high_risk_ip</code><br>      - Flags high-risk destination IPs.<br><b>04</b> <code>| eval source_high_risk_indicator = if(isnotnull(source_high_risk), 1, 0), destination_high_risk_indicator = if(isnotnull(destination_high_risk), 1, 0), high_risk_ip_indicator = if(isnotnull(high_risk_ip), 1, 0)</code><br>      - Creates binary indicators for each risk factor.<br><b>05</b> <code>| where isnotnull(source_high_risk) OR isnotnull(destination_high_risk) OR isnotnull(high_risk_ip)</code><br>      - Filters to transactions with risk indicators.<br><b>06</b> <code>| eval multi_factor_flag = if(amount > 10000, 1, 0)</code><br>      - Flags high-value transactions.<br><b>07</b> <code>| where multi_factor_flag=1</code><br>      - Focuses on high-value risk events.<br><b>08</b> <code>| eval high_risk_indicator = case(destination_high_risk_indicator=1, "Destination Country", high_risk_ip_indicator=1, "High-Risk IP", source_high_risk_indicator=1, "Source Country", 1=1, "None")</code><br>      - Classifies risk source.<br><b>09</b> <code>| sort -amount</code><br>      - Sorts by transaction value.<br><b>10</b> <code>| table _time, account_number, transaction_id, amount, transaction_type, vendor, source_country, dest_country, high_risk_indicator, dest_ip, device_info</code><br>      - Formats output for review.<br><br>
explanation = <p>This SPL uses lookups to match transaction destinations and IPs against high-risk lists, flags transactions based on amount and risk indicators, and surfaces those requiring further investigation. In the Financial Services sector, this approach is crucial for <b>AML compliance</b>, <b>fraud prevention</b>, and regulatory reporting. The SPL demonstrates use of <b>lookup</b>, <b>eval</b>, and <b>case</b> to enrich and classify transactions, empowering security teams to monitor and triage risk events. Junior analysts gain skills in advanced filtering, enrichment, and indicator-based detection for financial workflows.</p>
quid = E7C7185C7524183E640004BA6A66448A
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/lookup" target="_blank">Splunk Docs: lookup command</a><br>How to enrich events with external high-risk lists.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eval" target="_blank">Splunk Docs: eval command</a><br>Field calculations and risk logic in Splunk.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Financial Services and AML monitoring use cases.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Practical AML and fraud detection guidance.</li></ul>
description = <p>Detects <b>high-risk financial transactions</b> by correlating with high-risk countries and IP addresses. Highlights <b>transactions above $10,000</b> involving risk indicators, supporting compliance, risk management, and anti-money laundering (AML) in banking and Financial Services.</p>
search = index="*" status="completed" earliest=-24h@h\
	| lookup high_risk_countries country AS dest_country OUTPUT country AS destination_high_risk\
	| lookup high_risk_ips ip_address AS dest_ip OUTPUT ip_address AS high_risk_ip\
	| eval source_high_risk_indicator = if(isnotnull(source_high_risk), 1, 0), destination_high_risk_indicator = if(isnotnull(destination_high_risk), 1, 0), high_risk_ip_indicator = if(isnotnull(high_risk_ip), 1, 0)\
	| where isnotnull(source_high_risk) OR isnotnull(destination_high_risk) OR isnotnull(high_risk_ip)\
	| eval multi_factor_flag = if(amount > 10000, 1, 0)\
	| where multi_factor_flag=1\
	| eval high_risk_indicator = case(destination_high_risk_indicator=1, "Destination Country", high_risk_ip_indicator=1, "High-Risk IP", source_high_risk_indicator=1, "Source Country", 1=1, "None")\
	| sort -amount\
	| table _time, account_number, transaction_id, amount, transaction_type, vendor, source_country, dest_country, high_risk_indicator, dest_ip, device_info

[high_severity_vulnerabilities_qualys]
search_name = Percentage of High Severity Qualys VM Detection Events
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Threat Detection
tags = Access,GoSplunk
solution = <p>This query equips security teams with actionable intelligence on the percentage of high-severity vulnerabilities detected by Qualys, enabling them to focus resources on the most critical risks.</p><p><b>Suggested Actions</b><br><b>1.</b> Regularly monitor the percentage to identify spikes or trends in high-severity vulnerabilities.<br><b>2.</b> Cross-check results with a remediation plan to ensure timely resolution of critical issues.<br><b>3.</b> Correlate insights with additional threat intelligence to understand potential attack vectors.<br><b>4.</b> Automate alerts or dashboards to enhance visibility and reduce manual effort.<br><b>5.</b> Leverage this data to demonstrate compliance and risk reduction for audits.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>eventtype="qualys_vm_detection_event"</code><br>       - Filters events to only include Qualys VM detection events.<br><b>02</b> <code>eval Success= if(SEVERITY >3,1,0)</code><br>       - Generates a new field "Success" with a value of 1 for high-severity events (SEVERITY > 3), and 0 otherwise.<br><b>03</b> <code>stats count as total sum(Success) as success</code><br>       - Aggregates the total number of events and the sum of high-severity events.<br><b>04</b> <code>eval Per_high=(success/total)*100</code><br>       - Calculates the percentage of high-severity Qualys VM detection events out of the total events.</p>
explanation = <p>This search evaluates the "SEVERITY" field retrieved from Qualys VM detection events and identifies cases where the severity is greater than 3, categorizing them as successful detections. The total count of high-severity detections is then divided by the overall count to produce a percentage value. This metric helps security teams prioritize and track detection trends for high-severity vulnerabilities.</p>
quid = A9D9B39281C8EDC208989850D669AADB
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/high-severity-vulnerabilities-qualys" target="_blank">https://gosplunk.com/high-severity-vulnerabilities-qualys</a></p>
description = <p>This search calculates the <b>percentage</b> of high-severity events detected by Qualys VM. It provides insight into the <b>proportion</b> of vulnerabilities with severity levels greater than 3, allowing security teams to focus on <b>critical threats.</b></p>
search = eventtype="qualys_vm_detection_event"\
	| eval Success= if(SEVERITY >3,1,0)| stats count as total sum(Success) as success| eval Per_high=(success/total)*100

