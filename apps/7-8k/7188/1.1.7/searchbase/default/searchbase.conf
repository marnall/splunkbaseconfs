execution_plan = <b>01</b> <code>index=_internal sourcetype="splunk_web_access" method="GET" status="200"</code><br>       - Filters logs for successful GET requests from Splunk Web access logs.<br><b>02</b> <code>stats count as count by user, view</code><br>       - Groups and counts accesses by user and view type.<br><b>03</b> <code>appendpipe [stats sum(count) as count by user | eval view = "Total Views"]</code><br>       - Appends a summary of total views for each user.<br><b>04</b> <code>sort + user</code><br>       - Sorts the output alphabetically by user for readability.<br>
explanation = <p>This search is tailored to capture and analyze activity from Splunk's <b>internal logs</b>, specifically the `splunk_web_access` sourcetype. By isolating <b>GET requests</b> with a status of 200, it ensures focus on <b>successful interactions</b>. It uses the <code>stats</code> command to group data by user and view, allowing per-user tracking. An <code>appendpipe</code> is utilized to calculate <b>cumulative totals</b>, enabling easy comparison of individual versus overall activity. This holistic view helps admins monitor usage consistency or identify gaps in engagement.</p>
quid = 62168A23DB01B0EA903514CCA9BAAEFF
search_author = GoSplunk: tokenwander
related_info = <p><a href="https://gosplunk.com/whos-using-splunk" target="_blank">https://gosplunk.com/whos-using-splunk</a></p>
description = <p>Summarizes <b>User Activity: GET Requests and Total Views on Splunk Web Access</b> using <code>index=_internal sourcetype="splunk_web_access" method="GET" status="200"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_internal sourcetype="splunk_web_access" method="GET" status="200"\
	| stats count as count by user, view\
	| appendpipe [stats sum(count) as count by user\
	| eval view = "Total Views"]\
	| sort + user

[wildcard_matching_for_browser_traffic]
search_name = Wildcard Matching for Browser Traffic Analysis
version = 1.0.3
date_created = 2025-05-05 10:57:38
date_updated = 2025-7-2 14:31:10
category = Threat Hunter's Cookbook
sub_category = Searching and Filtering
tags = Web Traffic,Wildcard Matching
solution = <p>This search yields insights into browser usage trends, essential for understanding web traffic patterns and optimizing user experiences. Categorizing traffic by browser type can support incident investigation, anomaly detection, and tailored web service delivery.</p><p><b>Suggested Actions</b><br><b>1.</b> Analyze browser distribution to identify trends or shifts in user behavior.<br><b>2.</b> Investigate spikes in "Other" browsers to ensure no suspicious activity is occurring.<br><b>3.</b> Optimize website compatibility and performance for dominant browsers based on the results.<br><b>4.</b> Use this search as a baseline for developing metrics around browser-based segmentation.<br><b>5.</b> Collaborate with web developers and marketing teams to enhance browser-specific functionalities.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>The query uses the <b>eval</b> command with the <b>case</b> function to assign a browser category to each web session. The <b>like</b> function is employed to match patterns in the <b>user_agent</b> field for Chrome and Firefox browsers. If no match is found, other browsers are grouped under a default "Other" category. This method ensures <b>comprehensive categorization</b> of traffic, enabling consistent analysis across large datasets. Splunk's <b>conditional</b> evaluation capabilities make it easy to handle complex user agent strings, which can often vary significantly. This streamlined approach is valuable for promoting <b>data-driven decision-making</b> and proactive web optimization.</p>
quid = 48F6511C956CDFD13054865D9F5E0856
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Wildcard Matching for Browser Traffic Analysis</b> using <code>| eval browser_type=case(</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>| eval browser_type=case(</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br>
search = | eval browser_type=case(\
	like(user_agent, "%Chrome%"), "Chrome", \
	like(user_agent, "%Firefox%"), "Firefox", \
	1==1, "Other")

[wildcard_matching_for_strings_with_common_prefixes]
search_name = Wildcard Matching for Strings with Common Prefixes
version = 1.0.4
date_created = 2025-6-30 15:43:47
date_updated = 2025-7-2 14:27:49
category = Threat Hunter's Cookbook
sub_category = Searching and Filtering
tags = Strings,Wildcard Matching
solution = <p>Filter events where the username starts with “admin” by using the like function with the % character as a wildcard to match any characters that follow. The like function supports SQL-style pattern matching with special characters like % for multiple characters and _ for single characters. It offers more control compared to a simple * wildcard.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| where like(username, "%admin_")</code><br>       - Filters the dataset to include records where the "username" field meets the specified wildcard pattern.<br><b>02</b> <code>| output</code><br>       - Displays the results after applying the filter for further analysis and investigation.<br>
explanation = <p>The <b>like</b> function in Splunk enables SQL-pattern matching capabilities, making it a powerful tool when you need to identify events where field values adhere to a certain prefix or similar string pattern. This is particularly valuable when examining usernames, such as identifying all administrative accounts whose names start with "admin." The use of the <b>% wildcard</b> allows matching of any characters that follow the defined prefix, while the <b>_ wildcard</b> matches exactly one character. By using <code>like(username, "%admin_")</code>, the search filters for usernames containing the "admin" prefix, followed by any single character, ensuring efficient customization of results for anomaly detection. From an operational perspective, this enables analysts to identify and triage suspicious administrative activity and enforce more granular threat-monitoring.</p>
quid = F15BF05C526AEE0442EB1ACA460C2A65
search_author = Ryan Fetterman & Sydney Marrone
updated_author = akhamis
related_info = <ol><li data-list="bullet"><span class="ql-ui"></span><a rel="noopener noreferrer" href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html">Download the Threat Hunter's Cookbook</a></li><li data-list="bullet"><span class="ql-ui"></span>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</li></ol>
description = <p>Summarizes <b>Wildcard Matching for Strings with Common Prefixes</b> using <code>host="host1337"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = host="host1337" \
	| where like(username, "%admin_")

