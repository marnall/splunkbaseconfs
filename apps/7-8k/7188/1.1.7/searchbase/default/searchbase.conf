search = | tstats summariesonly=t dc(host) as num_hosts count as num_events where index="<<index>>" AND sourcetype="Perfmon:Process" by splunk_server sourcetype \
| table splunk_server num_hosts num_events

[report_on_indexes_and_sourcetypes_with_no_data_coming_in]
search_name = Host Communication Analysis: Time Since Last Event and Average
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexes
solution = <p>By analyzing the time elapsed since the last event per host, this report reveals potential gaps in host communication, which may point to data flow disruptions. It also highlights hosts with consistently high inactivity periods, allowing for directed troubleshooting.</p><p><b>Suggested Actions</b><br><b>1.</b> Focus on hosts tagged as "Critical" and investigate the reasons for extended inactivity.<br><b>2.</b> Monitor hosts with "Elevated" thresholds to preemptively address potential issues.<br><b>3.</b> Verify network and host configuration settings to ensure proper data transmission.<br><b>4.</b> Employ operational checks or logging to closely scrutinize affected hosts.<br><b>5.</b> Reassess data pipeline settings to optimize event ingestion.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| tstats summariesonly=t latest(_time) as Latest by host sourcetype index</code><br>       - Retrieves the most recent event timestamp per host, sourcetype, and index for efficiency.<br><b>02</b> <code>| eval current=now()</code><br>       - Captures the current system time to calculate inactivity.<br><b>03</b> <code>| eval Minimum_Age=round(((current-Latest)/60)/60,2)</code><br>       - Computes the duration since the last event for each host in hours, rounded to two decimals.<br><b>04</b> <code>| rangemap field=Minimum_Age default=Critical Normal=0-0.5 Elevated=0.5-2 Warning=2-4</code><br>       - Classifies each duration into severity levels for immediate attention.<br><b>05</b> <code>| stats values(stIDX) as "Index -- Sourcetype" list(Latest) as "Latest Event" list(Minimum_Age) as Minimum_Age list(range) as Threshold by host</code><br>       - Aggregates and formats results to show key data points per host.<br><b>06</b> <code>| convert ctime("Latest Event")</code><br>       - Converts epoch time to human-readable date for easier analysis.<br><b>07</b> <code>| eventstats avg(Minimum_Age) as average by host</code><br>       - Computes the average no-communication time per host.<br><b>08</b> <code>| eval average=round(average,2)</code><br>       - Rounds the average to two decimals for clarity.<br><b>09</b> <code>| sort - average</code><br>       - Sorts hosts by average no-communication time in descending order.<br><b>10</b> <code>| rename Minimum_Age as "Hours Since Last Communication" average as "Average Time in Hours Since Last Communication"</code><br>       - Renames fields for improved context and readability in the final output.<br>
explanation = <p>The search utilizes <code>| tstats</code> to efficiently calculate the <b>latest event time</b> for each host, sourcetype, and index. It evaluates the <b>current time</b> against these timestamps to determine inactivity periods in hours. The <code>| rangemap</code> function classifies the time delay into predefined categories, helping prioritize hosts for inspection. Finally, it calculates the average time of no communication per host to identify recurring patterns. This <b>enhances</b> operational capabilities by focusing on areas where data arrival has slowed or ceased, <b>enabling</b> proactive investigation and <b>remediation</b>.</p>
quid = 773D7B08013AF21E8BDBD0F154A9F49F
search_author = Splunk Portfolio Field Solutions
updated_author = khutchinson
description = <p>This report <b>analyzes</b> host communication by identifying the <b>time</b> since the last event received and calculates the average time span without activity.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = | tstats summariesonly=t latest(_time) as Latest by host sourcetype index\
	| eval current=now()\
	| eval Minimum_Age=round(((current-Latest)/60)/60,2)\
	| rangemap field=Minimum_Age default=Critical Normal=0-0.5 Elevated=0.5-2 Warning=2-4\
	| eval stIDX=tostring(index) + " -- " + tostring(sourcetype)\
	| stats values(stIDX) as "Index -- Sourcetype" list(Latest) as "Latest Event" list(Minimum_Age) as Minimum_Age list(range) as Threshold by host\
	| convert ctime("Latest Event")\
	| eventstats avg(Minimum_Age) as average by host\
	| eval average=round(average,2)\
	| sort - average\
	| rename Minimum_Age as "Hours Since Last Communication" average as "Average Time in Hours Since Last Communication"

[reports_on_most_used_devices_platforms_96]
search_name = Top 5 Unique User Agents by Device Type
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
