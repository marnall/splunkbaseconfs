solution = <p>This search offers operational insights into search head disk I/O performance over time. By monitoring throughput trends, storage inefficiencies or contention issues can be readily identified and addressed.</p><p><b>Suggested Actions</b><br><b>1.</b> Use this search to benchmark the current I/O performance of your search heads.<br><b>2.</b> Identify hosts where I/O bottlenecks may be impacting query performance.<br><b>3.</b> Correlate throughput deviations with specific time windows or deployment activities.<br><b>4.</b> Justify SSD storage upgrades if disk performance metrics breach acceptable thresholds.<br><b>5.</b> Perform proactive load distribution or reallocate workloads if multiple concurrent searches are creating disk contention.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index="_introspection" sourcetype=splunk_resource_usage component IN (Hostwide, IOStats)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Retrieves resource usage data specific to disk IO statistics for splunk processes.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Normalizes field naming to directly expose metrics like reads/writes in KB per second for easier computation.<br><b>03</b> <code>| stats latest(reads_kb_ps) as reads_kb_ps, latest(writes_kb_ps) as writes_kb_ps by _time, host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Aggregates the latest disk reads and writes for every host within the selected time window for actionable insights.<br><b>04</b> <code>| timechart span=1h avg(reads_kb_ps) as reads avg(writes_kb_ps) as writes by host limit=0</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Visualizes disk read/write throughput trends over time for each host to identify bottlenecks or usage patterns.<br><br>
explanation = <p>This search provides an operational view into disk I/O performance on search heads by breaking down **read/write throughput** in kilobytes per second for each host. Information about average throughput trends over time aids in identifying potential storage bottlenecks affecting overall **search execution speeds** or **capacity constraints**. For instance, disk contention from searches accessing large datasets or Knowledge Objects can be identified and mitigated through this visibility. Specific use cases include justifying upgrades like SSDs for directories such as `dispatch`, and understanding the **impact of concurrent load** placed on the storage subsystem.</p><p>For junior engineers, the query demonstrates foundational practices such as **renaming fields** for easier usability, leveraging **stats** commands for collapsing field values into meaningful aggregations, and the **timechart** command’s ability to trend events across time intervals—important tools for storage and system performance analysis.</p><p>Overall, this query represents a robust data-to-insight pipeline for disk throughput analysis, pivotal for maintaining a performant search experience within Splunk environments.</p>
quid = 3B7E9F4D2A8C5E1F6B9D4A7E3F8C2B5D
search_author = Splunk Works
description = <p>Summarizes <b>Search Head Disk IO KBPS</b> using <code>index="_introspection" sourcetype=splunk_resource_usage component IN (Hostwide, IOStats) | rename data.* as * | stats la</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
