solution = <p>This search provides <b>real-time visibility</b> into failed logon attempts, helping to uncover potential security threats, user mistakes, or misconfigurations in authentication policies. Spikes or trends in failed logins may point to malicious activities like brute force attacks.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate spikes in failed logon attempts to identify potential attackers or compromised accounts.<br><b>2.</b> Correlate data with successful logon attempts for the same time window to detect suspicious patterns.<br><b>3.</b> Review the accounts and hosts experiencing repeated failed logons to check for misconfigurations or unauthorized access attempts.<br><b>4.</b> Enhance authentication measures, such as enabling multifactor authentication (MFA) or implementing stricter account lockout policies.<br><b>5.</b> Use this as a basis for building dashboards or alerts to monitor authentication-related activity over time.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
