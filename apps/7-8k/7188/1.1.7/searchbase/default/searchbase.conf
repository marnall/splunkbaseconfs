execution_plan = <b>01</b> <code>index=<<index>></code><br>       - This specifies the index where the data is being pulled from.<br><b>02</b> <code>sourcetype=*WinEventLog</code><br>       - This filters the data to only include Windows Event Logs.<br><b>03</b> <code>EventCode=5140</code><br>       - This filters the data to only include logs with the EventCode 5140, which indicates a network share object was accessed.<br><b>04</b> <code>user!=*$</code><br>       - This excludes entries where the user field contains a dollar sign ($), which is often used in system accounts.<br><b>05</b> <code>Share_Path=*</code><br>       - This includes all entries, regardless of the Share_Path field.<br><b>06</b> <code>| stats count by Share_Path, user, host, _time</code><br>       - This groups the results by Share_Path, user, host, and _time, and counts the number of entries for each group.<br><b>07</b> <code>| sort - user</code><br>       - This sorts the results in descending order by the user field.<br>
explanation = <p>This query helps monitor network share access events, providing insights into <b>user activity</b> and potential <b>unusual patterns</b>. By filtering for EventCode 5140 (network share access), the search identifies access logs for key resources. Excluding entries with a dollar sign ($) removes irrelevant system account data, ensuring the dataset focuses on actionable metrics.</p><p>This query is valuable for tracking access to sensitive data, identifying unauthorized attempts, or analyzing activity trends over time. Security teams can leverage the output to detect potential breaches, investigate suspicious activity, or audit shared resource usage. The use of <b>stats</b> summarizes data meaningfully by user, host, and time, while <b>sort</b> organizes results for clarity and quick insights.</p>
quid = EFAF145D73055B98E29B4B77DBFB986F
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/successful-file-access-attempts-and-filename-accessed" target="_blank">https://gosplunk.com/successful-file-access-attempts-and-filename-accessed</a></p>
description = <p>Summarizes <b>Count of Access to Shared Paths by User, Host, and Time</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=5140 user!="*$" Share_Path="*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=5140 user!="*$" Share_Path="*"\
