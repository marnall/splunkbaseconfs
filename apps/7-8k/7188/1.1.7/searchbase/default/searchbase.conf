dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The query starts by specifying the index and sourcetype to search in.</ul><ul><b>02</b> It then filters for events where the destination IP is within your company's IP range and the transport protocol is either UDP or TCP.</ul><ul><b>03</b> For UDP, it looks for events where the source port is one of a specific set and the source and destination ports are not the same.</ul><ul><b>04</b> For TCP, it looks for events where the source port is 80 and the destination port is not 80.</ul><ul><b>05</b> The query then bins the events by time, with a span of 5 minutes.</ul><ul><b>06</b> It selects the fields 'src_port', 'dest', and 'src' to include in the results.</ul><ul><b>07</b> It calculates the count of events, the distinct count of source IPs ('src_count'), and the distinct count of destination IPs ('dest_count') for each source port and time bin.</ul><ul><b>08</b> It calculates a 'First_Factor' as the ratio of 'src_count' to 'dest_count'. This is used to identify reflected attacks, which typically have a high ratio.</ul><ul><b>09</b> It calculates a 'Final_Factor' as the sum of 'First_Factor' and the count of replies. This is another indicator of a reflected attack.</ul><ul><b>10</b> It filters for events where 'Final_Factor' is greater than 1200, indicating a potential attack.</ul><ul><b>11</b> It generates a message for each potential attack, including the count of replies, the number of distinct sources, the source port, and the number of servers affected.</ul><ul><b>12</b> It includes only the 'msg' field in the final results.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query is used to monitor network traffic for signs of a reflected DDoS attack. These attacks can severely impact network performance and availability, so early detection is crucial to mitigate damage.</div></div>
quid = 906B77A0CE6ED41C9E5DEA120ECFF565
search_author = GoSplunk: MaryamSaniee
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/reflected-ddos-attack" target="_blank">https://gosplunk.com/reflected-ddos-attack</a></p>
description = <p>Summarizes <b>Detecting Reflected DDoS Attacks Based on Port and IP</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" ``` dest=(your company IP range, for example: 184.192.0.0/16 ``` transport</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" ``` dest=(your company IP range, for example: 184.192.0.0/16 ``` transport="udp" AND src_port IN(123,1900,0,53,5353,27015,19,20800,161,389,111,137,27005,520,6881,751,11211,1434,27960,17) AND src_port!=dest_port OR (transport="tcp" AND src_port=80 AND dest_port!=80) \
	| bin _time span=5m \
	| fields src_port,dest,src \
	| stats count,dc(src) as src_count , dc(dest) as dest_count by src_port,_time \
	| eval First_Factor=src_count/dest_count ```in reflected attacks this ratio is to high!```\
	| eval Final_Factor=First_Factor+count ```the count of replies is another important factor```\
	| search Final_Factor>1200 \
	| eval msg="Reflected DDoS Attack has been detected. "."count:".count." from ".src_count. " distict sources with same src_port:".src_port." on ". dest_count. " servers" \
	| fields msg

[regex_extraction_for_wordpress_version_from_apache_logs]
search_name = Monthly Count of WordPress Versions in Access Logs
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,GoSplunk
solution = <p>This search provides visibility into <b>WordPress version distribution</b>, helping identify outdated or vulnerable installations.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify and prioritize updates for outdated WordPress versions.<br><b>2.</b> Monitor adoption rates of new releases.<br><b>3.</b> Investigate hosts running known vulnerable versions.<br><b>4.</b> Set up alerts for detection of critical vulnerable versions.<br><b>5.</b> Use trends to plan update campaigns and minimize security risks.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=access_combined</code><br>       - Specifies the data source, focusing on the specified index and 'access_combined' sourcetype.<br><b>02</b> <code>| rex "WordPress/(?P<WP_version>.+?(?=;))"</code><br>       - Uses the <b>rex</b> command to extract WordPress versions from the logs. The regular expression identifies the "WordPress/" pattern followed by any characters up to the semicolon (;), storing this data as the 'WP_version' field.<br><b>03</b> <code>| where isnotnull(WP_version)</code><br>       - Filters out logs without a WordPress version, ensuring only relevant logs are processed.<br><b>04</b> <code>| timechart span=1month count by WP_version limit=0 useother=0</code><br>       - Creates a monthly timechart showing counts per WordPress version. Arguments like <b>limit=0</b> remove series limits, and <b>useother=0</b> avoids grouping series into an "other" category.<br>
explanation = <p>This query assists in tracking WordPress version usage over time. By extracting and analyzing versions from logs, users can identify <b>outdated versions</b> potentially vulnerable to security threats. It also provides visibility into the <b>adoption rates</b> of new WordPress releases, helping administrators ensure their environments are up to date. The SPL relies on a regular expression to pinpoint WordPress strings in log data, eliminating nulls, and consolidating results into a clear monthly trend view.</p>
quid = F52684E7784FA7E1A61D1331D2AAA889
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/regex-extraction-for-wordpress-version-from-apache-logs" target="_blank">https://gosplunk.com/regex-extraction-for-wordpress-version-from-apache-logs</a></p>
description = <p>This query <b>analyzes WordPress versions</b> by extracting version details from logs via regex, excluding irrelevant data, and visualizing their usage trends as a monthly timechart. It helps spotlight <b>vulnerable versions</b> and track the <b>adoption pace</b> of newer releases.</p>
search = index="<<index>>" sourcetype="access_combined"\
	| rex "\"WordPress\\/(?P<WP_version>.+?(?=;))"\
	| where isnotnull(WP_version)\
	| timechart span=1month count by WP_version limit=0 useother=0

[remediation_tracking_trend_qualys]
search_name = Qualys VM Detection Event Status and Fixed Percentage
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Threat Detection
tags = Access,GoSplunk
solution = <p>This query enables security professionals to <b>track remediation trends</b> and measure progress in addressing vulnerabilities detected by Qualys VM. Additionally, it calculates the proportion of vulnerabilities marked as "Fixed," which is critical for compliance and operational reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the "Fixed Percentage" regularly to monitor remediation performance.<br><b>2.</b> Identify trends in detection statuses and address recurring issues.<br><b>3.</b> Work with remediation teams to focus efforts on statuses with low completion rates.<br><b>4.</b> Compare "Fixed Percentage" metrics over time to assess improvements.<br><b>5.</b> Integrate this view into dashboards or alerting systems for ongoing visibility.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>search eventtype="qualys_vm_detection_event"</code><br>       - Retrieve all Qualys VM detection events.<br><b>02</b> <code>| stats count as eachCount</code><br>       - Aggregate the total number of events.<br><b>03</b> <code>| eval STATUS="Total"</code><br>       - Assign "Total" as the status for the overall event count.<br><b>04</b> <code>| table STATUS eachCount</code><br>       - Tabulate the overall event count.<br><b>05</b> <code>| append [<nested search>]</code><br>       - Include the breakdown of events by STATUS and compute remediation metrics like fixed percentages.<br>
explanation = <p>The search analyzes event data ingested from Qualys VM Detection logs to produce <b>meaningful insights</b> into remediation performance. It identifies the total count of detection events, calculates a "Fixed Percentage," and outputs a concise status overview. The use of <code>stats</code> provides aggregation, and <code>eval</code> is employed to calculate the rate of fixed detections versus the total. This helps security teams measure how effectively vulnerabilities are being addressed and fixed.</p><p>Field summaries: <b>eachCount</b> represents the detection count for all or specific statuses. <b>fixedPerc</b> computes the fixed rate by dividing fixed event counts by the total, then multiplying by 100 for a percentage format.</p>
quid = 2F92AC51AD9F88A14B33048FDF402C06
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="<https://gosplunk.com/remediation-tracking-trend-qualys>" target="_blank"><https://gosplunk.com/remediation-tracking-trend-qualys</a></p>
description = <p>Summarizes <b>Qualys VM Detection Event Status and Fixed Percentage</b> using <code>eventtype="qualys_vm_detection_event"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = eventtype="qualys_vm_detection_event"\
	| stats count as eachCount\
	| eval STATUS="Total"\
	| table STATUS eachCount\
	| append [| search eventtype="qualys_vm_detection_event"\
	| stats count as eachCount by STATUS\
	| eventstats sum(eachCount) as total\
	| eval fixedPerc = ((eachCount/total)*100)\
	| search STATUS=FIXED\
	| table STATUS eachCount ]

