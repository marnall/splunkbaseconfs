	| search visible = 1

[splunk_apps_added_to_an_instance]
search_name = List of Applications Installed on Each Client Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Apps
solution = <p>This search helps ensure proper application deployment across all hosts under a Splunk deployment server, highlighting discrepancies or outliers for action. The output enables administrators to identify hosts lacking expected applications or facing deployment issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Review hosts missing expected applications and confirm their deployment status.<br><b>2.</b> Investigate client hosts showing abnormal states or values.<br><b>3.</b> Cross-reference application data with deployment server logs for troubleshooting.<br><b>4.</b> Plan remediation steps for identified inconsistencies in distribution.<br><b>5.</b> Use results to refine or enhance application deployment configurations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/deployment/server/clients splunk_server=*</code><br>       - Fetches details about clients managed by the Splunk deployment server.<br><b>02</b> <code>| table hostname applications*.stateOnClient</code><br>       - Extracts client hostnames and application state data to create a table format.<br><b>03</b> <code>| untable hostname applications value</code><br>       - Normalizes the table, creating columns for hostname, applications, and values.<br><b>04</b> <code>| eval applications=replace(applications,"applications\\.(\w+)\\.stateOnClient","\1")</code><br>       - Extracts application names with a regex pattern for better clarity.<br><b>05</b> <code>| stats values(applications) as applications by hostname</code><br>       - Groups and consolidates application names by each hostname.<br><br>
explanation = <p>This search is instrumental for monitoring and managing application deployments within a Splunk instance. The use of the <code>rest</code> command fetches critical deployment data for all clients configured with a deployment server. Following this, the <code>table</code> command structures the data to be more interpretable, focusing on client-host-specific details. The <code>untable</code> command further reformats this view into a normalized table compatible with downstream commands. The <code>eval</code> function applies pattern extraction to isolate application names, removing unnecessary verbiage. Finally, the <code>stats</code> command aggregates and consolidates application names by hostname, offering a clean summary of installed applications. These steps collectively enhance the administrator’s ability to monitor application consistency and address deployment irregularities quickly.</p>
quid = CED913B5C6EE5579117E39C22EA31C3D
search_author = GoSplunk: marksplunker
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/splunk-apps-added-to-an-instance" target="_blank">https://gosplunk.com/splunk-apps-added-to-an-instance</a></p>
description = <p>Summarizes <b>List of Applications Installed on Each Client Host</b> using <code>| rest /services/deployment/server/clients splunk_server=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest /services/deployment/server/clients splunk_server=*\
	| table hostname applications*.stateOnClient\
	| untable hostname applications value\
	| eval applications=replace(applications,"applications\\.(\w+)\\.stateOnClient","\1")\
	| stats values(applications) as applications by hostname

[splunk_cim_assist]
search_name = Categorizing Events Based on Tags and Actions
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Search
tags = Access,GoSplunk
solution = <p>This search provides CIM datamodel mapping analysis for data normalization and compliance validation.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify data sources not mapping to expected datamodels.<br><b>2.</b> Validate tag assignments for proper CIM compliance.<br><b>3.</b> Use findings to improve data normalization coverage.<br><b>4.</b> Create documentation of datamodel mappings for governance.<br><b>5.</b> Monitor for changes in datamodel distributions over time.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The query starts by specifying the index and sourcetype from where the data is being fetched.</ul><ul><b>02</b> The 'fields' command is used to specify the fields that are to be included in the search results.</ul><ul><b>03</b> Multiple 'eval' commands are used to create a new field 'datamodel' based on various conditions. These conditions are based on the values of the 'tag', 'action', 'user', and 'object_category' fields.</ul><ul><b>04</b> The 'rex' command is used to extract the 'index' and 'datamodel' from the 'datamodel' field created in the previous steps.</ul><ul><b>05</b> The 'makemv' command is used to split the 'datamodel' field into multiple values based on the delimiter '.'.</ul><ul><b>06</b> The 'stats' command is used to provide a statistical summary of the 'index' field for each 'datamodel'. This gives a count of the number of occurrences of each index for each datamodel.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to understand the distribution of data across different datamodels. It can help in identifying the <b>sources</b> contributing to each datamodel and can be useful in <b>data auditing</b>, <b>data management</b>, and ensuring <b>data quality</b>.</div></div>
quid = A9EA192CF44F964C150D455ED772261E
search_author = GoSplunk: Lyxx
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/splunk-cim-assist" target="_blank">https://gosplunk.com/splunk-cim-assist</a></p>
description = <p>This query is used to <b>categorize</b> data based on tags and other conditions.</p> \
	<p>It creates a new field 'datamodel' based on these conditions and then extracts the index and datamodel from this field. Finally, it provides a <b>statistical summary</b> of the indexes for each datamodel.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| fields index, tag, user, action, object_category\
	| eval datamodel = if(tag="alert", index."."."alert", datamodel)\
	| eval datamodel = if(tag="listening" AND tag="port", index."."."application_state_deprecated"."."."endpoint", datamodel)\
	| eval datamodel = if(tag="process" AND tag="report", index."."."application_state_deprecated"."."."endpoint", datamodel)\
	| eval datamodel = if(tag="service" AND tag="report", index."."."application_state_deprecated"."."."endpoint", datamodel)\
	| eval datamodel = if(tag="authentication" AND action!="success" AND user!="*$", index."."."authentication", datamodel)\
	| eval datamodel = if(tag="certificate", index."."."certificates", datamodel)\
	| eval datamodel = if(tag="change" AND NOT (object_category=file OR object_category=directory OR object_category=registry), index."."."change"."."."change_analysis_deprecated", datamodel)\
	| eval datamodel = if(tag="dlp" AND tag="incident", index."."."data_loss_prevention", datamodel)\
	| eval datamodel = if(tag="database", index."."."database", datamodel)\
	| eval datamodel = if(tag="email", index."."."email", datamodel)\
	| eval datamodel = if(tag="endpoint" AND tag="filesystem", index."."."endpoint", datamodel)\
	| eval datamodel = if(tag="endpoint" AND tag="registry", index."."."endpoint", datamodel)\
	| eval datamodel = if(tag="track_event_signatures" AND (signature="*" OR signature_id="*"), index."."."event_signatures", datamodel)\
	| eval datamodel = if(tag="messaging", index."."."interprocess_messaging", datamodel)\
	| eval datamodel = if(tag="ids" AND tag="attack", index."."."intrusion_detection", datamodel)\
	| eval datamodel = if(tag="inventory" AND (tag="cpu" OR tag="memory" OR tag="network" OR tag="storage" OR (tag="system" AND tag="version") OR tag="user" OR tag="virtual"), index."."."inventory", datamodel)\
	| eval datamodel = if(tag="jvm", index."."."jvm", datamodel)\
	| eval datamodel = if(tag="malware" AND tag="attack", index."."."malware", datamodel)\
	| eval datamodel = if(tag="network" AND tag="resolution" AND tag="dns", index."."."network_resolution_dns", datamodel)\
	| eval datamodel = if(tag="network" AND tag="session", index."."."network_sessions", datamodel)\
	| eval datamodel = if(tag="network" AND tag="communicate", index."."."network_traffic", datamodel)\
	| eval datamodel = if(tag="performance" AND (tag="cpu" OR tag="facilities" OR tag="memory" OR tag="storage" OR tag="network" OR (tag="os" AND ((tag="time" AND tag="synchronize") OR tag="uptime"))), index."."."performance", datamodel)\
	| eval datamodel = if(tag="ticketing", index."."."ticket_managment", datamodel)\
	| eval datamodel = if(tag="update" AND tag="status", index."."."updates", datamodel)\
	| eval datamodel = if(tag="vulnerability" AND tag="report", index."."."vulnerabilities", datamodel)\
	| eval datamodel = if(tag="web", index."."."web", datamodel)\
	| rex field=datamodel "(?<index>[^\\\\.]+)\\.(?<datamodel>.*)"\
	| makemv delim="." datamodel\
	| stats values(index) as index by datamodel

