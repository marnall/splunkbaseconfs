search_name = Top 5 Browsers Used, Deduplicated by User Agent
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,Availability,Bundle,GoSplunk,SecOps
solution = <p>Gaining browser-specific analytics assists in understanding user activity dynamics and can also inform platform-compatible development and testing priorities.</p><p><b>Suggested Actions</b><br><b>1.</b> Regularly assess browser usage trends to ensure preemptive fixes for browser-specific issues.<br><b>2.</b> Allocate resources for additional quality assurance testing on top browsers.<br><b>3.</b> Identify which browser adopters face limitations and mitigate accordingly.<br><b>4.</b> Optimize websites, especially UI/UX interfaces, for dominant browsers.<br><b>5.</b> Generate weekly reports to observe longitudinal browser usage fluctuations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> source=/var/log/httpd/access_log</code><br>       - Identifies the data source being the specified index and access logs.<br><b>02</b> <code>| dedup useragent</code><br>       - Removes duplicate user agent entries for accuracy.<br><b>03</b> <code>| eval browser=useragent</code><br>       - Maps user agent values into a new field called 'browser'.<br><b>04</b> <code>| replace *Firefox* with Firefox, *Chrome* with Chrome, *MSIE* with "Internet Explorer", *Version*Safari* with Safari, *Opera* with Opera, *rv:11.0* with "Internet Explorer" in browser</code><br>       - Simplifies browser names into readable labels.<br><b>05</b> <code>| top limit=5 useother=t browser</code><br>       - Displays the top 5 browser types with the rest grouped under "other”.<br>
explanation = <p>This query provides an analysis of a web server's access logs to identify the distribution of browsers used by visitors. By deduplicating user agent strings and mapping them to clear browser names, it offers concise insights into browser dominance across users. Web developers and teams can use this information to ensure their application or website is optimized for these browsers.</p>
quid = B56CB270D5BEDE3212C637605E3240A5
search_author = GoSplunk: Suren
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/apache-access_logs-status-code-reporting" target="_blank">https://gosplunk.com/apache-access_logs-status-code-reporting</a></p><br><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Get started with Search</a><br>Official Splunk documentation for this topic.</p>
description = <p>This query analyzes web server access logs to reveal the top 5 browsers used by site visitors. It provides <b>valuable insights</b> into user interaction with the site and helps web developers optimize for browser-specific <b>compatibility</b> and <b>performance</b>.</p>
search = index="<<index>>" source="/var/log/httpd/access_log"\
| dedup useragent\
| eval browser=useragent\
| replace *Firefox* with Firefox, *Chrome* with Chrome, *MSIE* with "Internet Explorer", *Version*Safari* with Safari, *Opera* with Opera, *rv:11.0* with "Internet Explorer" in browser\
| top limit=5 useother=t browser

[apache_high_level_visitor_info_1]
search_name = Visitor Analytics: IP, Country, Visit Duration, Data Usage
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,Availability,Bundle,GoSplunk
solution = <p>This search provides vital insights into website traffic and visitor metrics. These analytics can guide both operational tuning and strategic planning to enhance user engagement and optimize web services.</p><p><b>Suggested Actions</b><br><b>1.</b> Use the insights on visitor origins to tailor content or marketing efforts to high-traffic countries.<br><b>2.</b> Analyze visit duration and views to identify popular landing pages that drive engagement.<br><b>3.</b> Utilize bandwidth consumption metrics (MB field) to improve content delivery networks (CDNs) or hosting efficiency.<br><b>4.</b> Examine bounce rates by comparing total views to first and last visit times.<br><b>5.</b> Filter by specific time ranges or countries to investigate abnormal traffic patterns or security concerns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/synthetic-monitoring.html" target="_blank">Products: Splunk Synthetic Monitoring</a><br>Splunk Synthetic Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=&lt;&lt;index&gt;&gt; sourcetype=access_combined</code><br>       - Specify the index and sourcetype from which to retrieve data. Replace `<<index>>` with the appropriate value.<br><b>02</b> <code>(referer_domain!="https://gosplunk.com" AND referer_domain!="http://gosplunk.com")</code><br>       - Filter out entries from specific domains for clearer analytics.<br><b>03</b> <code>| iplocation clientip</code><br>       - Derive geographical information using visitor IPs.<br><b>04</b> <code>| stats first(_time) as First_Visit latest(_time) as Last_Visit sum(eval(round(bytes/1024/1024,2))) as MB first(Country) as Country count as Views first(referer_domain) as Referer_Domain first(uri) as Landing_Page by clientip</code><br>       - Compute granular statistics per client IP including visit times, volume of data, and country.<br><b>05</b> <code>| eval diff_time_days=round((Last_Visit-First_Visit)/60/60/24, 6)</code><br>       - Calculate the duration in days between the first and last visit.<br><b>06</b> <code>| convert ctime(First_Visit) ctime(Last_Visit)</code><br>       - Format visit times from epoch to human-readable strings.<br><b>07</b> <code>| fields clientip Country First_Visit Last_Visit diff_time_days MB Views Referer_Domain Landing_Page</code><br>       - Specify output fields for final presentation.<br><b>08</b> <code>| fillnull value=0</code><br>       - Replace any null values in output with "0".<br>
explanation = <p>This query extracts and organizes key visitor metrics from web access logs to provide actionable insights into user behavior on the website. The search identifies visitor geolocation, tracks unique users over time, calculates bandwidth consumption, and details their interactions with specific site content.</p><p>By employing commands like <code>| iplocation</code> to map IPs to countries and <code>| stats</code> for aggregating visits and data consumption, admins can gain a more granular and accurate view of site usage patterns. Filtering out known referring domains ensures that analytics exclude internal or irrelevant test traffic.</p><p>Metrics such as <b>data transfer, page views, and visit frequency</b> can help administrators understand content engagement, identify top-performing pages, and optimize digital assets. Additionally, conversion of epoch timestamps to human-readable format provides clear reporting of temporal data.</p>
quid = 65D1F30BEC6638830544EBF7FB554417
description = <p>Summarizes <b>Visitor Analytics: IP, Country, Visit Duration, Data Usage</b> using <code>index="<<index>>" sourcetype=access_combined (referer_domain!="https://gosplunk.com" AND referer_domain!="http://gosplun</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=access_combined (referer_domain!="https://gosplunk.com" AND referer_domain!="http://gosplunk.com")\
| iplocation clientip\
| stats first(_time) as First_Visit latest(_time) as Last_Visit sum(eval(round(bytes/1024/1024,2))) as MB first(Country) as Country count as Views first(referer_domain) as Referer_Domain first(uri) as Landing_Page by clientip\
| eval diff_time_days=round((Last_Visit-First_Visit)/60/60/24, 6)\
| convert ctime(First_Visit) ctime(Last_Visit)\
| fields clientip Country First_Visit Last_Visit diff_time_days MB Views Referer_Domain Landing_Page\
| fillnull value="0"

[app_access_by_user]
search_name = App Access By User
version = 2.x
date_created = 2025-11-14
category = Splunk
sub_category = _internal
tags = Access,App,Internal,UI
solution = <p>This search provides visibility into how users interact with Splunk apps via the UI, allowing tracking of behavior and detecting misconfigurations or low-usage apps.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify unused or rarely used apps.<br><b>2.</b> Monitor access by user roles to detect anomalies.<br><b>3.</b> Create a dashboard tracking app access trends over time.<br><b>4.</b> Alert on unexpected namespace-user pairings.<br><b>5.</b> Audit admin access across key apps.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="_internal" source="/opt/splunk/var/log/splunk/splunkd_ui_access.log"</code><br>       - Access Splunk internal UI access logs.<br><b>02</b> <code>| where namespace!="null"</code><br>       - Filter out entries without a valid namespace.<br><b>03</b> <code>| stats count as access_count by namespace user</code><br>       - Aggregate the number of accesses per app and user.<br><b>04</b> <code>| rename namespace as title</code><br>       - Rename namespace to title for output formatting.<br><b>05</b> <code>| eval _time=now()</code><br>       - Add current time for dashboard correlation.<br>
explanation = <p>This search extracts user interaction data from Splunk's <code>splunkd_ui_access.log</code>, focusing specifically on valid namespace interactions. It filters out null values using the <code>where</code> command and aggregates UI access by <code>namespace</code> and <code>user</code>. The renamed field <code>title</code> supports presentation needs or dashboard integration. The <code>eval _time=now()</code> function assigns a timestamp to allow time-based processing.</p><p>This is useful for <b>audit trails</b>, <b>adoption analysis</b>, and <b>operational oversight</b>. For newer Splunk users, this example illustrates filtering with <code>where</code>, summarization with <code>stats</code>, field normalization with <code>rename</code>, and enrichment with <code>eval</code>. These are essential SPL building blocks for scalable queries and clean dashboards.</p><p>This query is an example of how to extract meaningful app usage insights from raw log data using simple, modular SPL techniques.</p>
quid = 24D86539179AF275FE632A15426ED602
search_author = vskoryk
description = <p>Summarizes <b>App Access By User</b> using <code>index="_internal" sourcetype="<<sourcetype>>" source="/opt/splunk/var/log/splunk/splunkd_ui_access.log"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index="_internal" sourcetype="<<sourcetype>>" source="/opt/splunk/var/log/splunk/splunkd_ui_access.log" \
| where namespace!="null" \
| stats count as access_count by namespace user \
| rename namespace as title \
| eval _time=now()

[apps_deployed_from_deployment_server]
search_name = Count and Latest Installation Time of Deployed Apps by Host
version = 1.0.1
date_updated = 2023-11-21 11:46:44
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Apps,Deployment
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_internal</code><br>       - This specifies that Splunk should look in the <b>_internal</b> index for events.<br><b>02</b> <code>sourcetype=splunkd</code><br>       - This filters the events to only include those where the <b>sourcetype</b> is 'splunkd'.<br><b>03</b> <code>component=DeployedApplication installing</code><br>       - This further filters the events to only include those where the <b>component</b> is 'DeployedApplication installing'.<br><b>04</b> <code>| stats count latest(_time) AS latest_time by host app</code><br>       - This groups the events by <b>host</b> and <b>app</b>, and for each group, it counts the number of events and finds the latest event time.<br><b>05</b> <code>| convert ctime(latest_time)</code><br>       - This converts the latest event time from a Unix timestamp to a human-readable format.<br>
explanation = <p>This query is designed to provide visibility into the deployment status of applications in a Splunk environment. By querying the <b>_internal</b> index, it ensures that system-level deployment events are captured. The sourcetype <b>'splunkd'</b> identifies Splunk internal logs, while the <b>component</b> filter further pinpoints the relevant deployment activities.</p><p>Using <code>| stats</code>, the query groups the results by <b>host</b> and <b>app</b>, providing both an aggregated count of deployment events and the latest timestamp for each deployment. The <code>| convert ctime</code> function enhances readability by transforming the timestamp into a standard date-time format. This functionality delivers insights critical for tracking deployment timelines, verifying successful distribution, and identifying any issues at the host or application level.</p>
quid = 2598359B1CCBF9A78CCB5D6D9B68502F
related_info = <p><a href="https://gosplunk.com/apps-deployed-from-deployment-server" target="_blank">https://gosplunk.com/apps-deployed-from-deployment-server</a></p>
description = <p>Summarizes <b>Count and Latest Installation Time of Deployed Apps by Host</b> using <code>index=_internal sourcetype=splunkd component=DeployedApplication installing</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query tracks application deployment events in a Splunk environment, focusing on the _internal index and filtering for 'splunkd' logs with the specific component 'DeployedApplication installing' . The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/synthetic-monitoring.html" target="_blank">Products: Splunk Synthetic Monitoring</a><br>Splunk Synthetic Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index=_internal sourcetype=splunkd component=DeployedApplication installing\
| stats count latest(_time) AS latest_time by host app\
| convert ctime(latest_time)

[atm_users_unusual_location]
search_name = ATM Users Unusual Location
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = ATM,Detail,Fraud
solution = <p>This SPL flags ATM users operating at unusual locations for further investigation. <b>Suggested Actions</b></p><p>1. Review flagged accounts for suspicious travel or card sharing.<br>2. Correlate with other ATM alerts or account activity.<br>3. Alert fraud operations as needed.<br>4. Integrate with ATM monitoring dashboards.<br>5. Refine analysis for changing ATM usage patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*"</code><br>      - Selects all ATM transaction events.<br><b>02</b> <code>| stats count by account_number location</code><br>      - Counts transactions per account and location.<br><b>03</b> <code>| eventstats mode(location) as UsualLocation by account_number</code><br>      - Determines the most frequent location per account.<br><b>04</b> <code>| where location != UsualLocation</code><br>      - Flags non-usual locations.<br><b>05</b> <code>| table account_number location UsualLocation</code><br>      - Formats output.<br><b>06</b> <code>| head 5</code><br>      - Limits results to top five.
explanation = <p>This SPL counts ATM transactions by account and location, then uses <b>eventstats</b> to determine the most common location for each account. It filters for transactions at locations different from that usual location, surfaces these anomalies, and shows the top five accounts for easy review. This approach supports fraud monitoring, travel analysis, or operational anomaly detection and demonstrates event-level aggregation and comparison techniques.</p>
quid = CDF9190115C3A423DB8402BBA69CC594
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/eventstats" target="_blank">Splunk Docs: eventstats command</a><br>Calculating the mode (most common value) per group.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_blank">Splunk Docs: stats command</a><br>Event and transaction aggregation.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Monitoring ATM and location anomalies.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>ATM fraud and anomaly detection best practices.</li></ul>
description = <p>Flags ATM accounts using locations that differ from their usual (most frequent) ATM location. Helps surface potentially suspicious or out-of-pattern ATM usage for review.</p>
search = index="*"\
| stats count by account_number location\
| eventstats mode(location) as UsualLocation by account_number\
| where location != UsualLocation\
| table account_number location UsualLocation\
| head 5

[atm_users_with_high_transaction_frequency]
search_name = ATM Users with High Transaction Frequency
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = ATM,Detail,Fraud
solution = <p>This SPL flags accounts with rapid ATM usage for further review. <b>Suggested Actions</b></p><p>1. Investigate flagged accounts for automated withdrawal or abuse.<br>2. Cross-reference with fraud alerts or ATM risk patterns.<br>3. Alert operations or fraud teams as needed.<br>4. Integrate with ATM monitoring dashboards.<br>5. Tune thresholds based on evolving ATM usage trends.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" </code><br>      - Selects all ATM transactions.<br><b>02</b> <code>| bucket _time span=5m</code><br>      - Buckets events into 5-minute intervals.<br><b>03</b> <code>| stats count as TransactionCount by account_number _time</code><br>      - Counts transactions per account in each window.<br><b>04</b> <code>| where TransactionCount > 15</code><br>      - Flags high-frequency activity.<br><b>05</b> <code>| table _time account_number TransactionCount</code><br>      - Outputs key fields for review.
explanation = <p>This SPL uses <b>bucket</b> to group ATM transactions into 5-minute windows, aggregates counts per account and time with <b>stats</b>, and filters for accounts with more than 15 transactions in any window. Such behavior may indicate automated withdrawals, fraud, or misuse. This approach enables analysts to quickly focus on accounts exhibiting unusual ATM activity. The SPL demonstrates effective use of time bucketing, aggregation, and threshold-based filtering for monitoring ATM channels.</p>
quid = 3E495604AD7CDFEA8E6CBF58C705C6D0
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/bucket" target="_blank">Splunk Docs: bucket command</a><br>How to group events by time in Splunk.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_blank">Splunk Docs: stats command</a><br>Aggregating transaction data.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>High-frequency transaction monitoring use cases.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Guidance for detecting suspicious ATM activity.</li></ul>
description = <p>Identifies ATM users with <b>high transaction frequency</b> by flagging accounts that perform more than 15 transactions within any 5-minute interval. This helps surface potentially suspicious or automated ATM usage for further investigation and oversight.</p>
search = index="*"\
| bucket _time span=5m\
| stats count as TransactionCount by account_number _time\
| where TransactionCount > 15\
| table _time account_number TransactionCount

[atm_withdrawal_testing]
search_name = ATM Withdrawal Testing
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = ATM,Detail,Fraud
solution = <p>This SPL flags ATM withdrawal testing behavior for further investigation. <b>Suggested Actions</b></p><p>1. Review flagged accounts and locations for potential ATM fraud.<br>2. Correlate with other risk or fraud alerts.<br>3. Alert fraud prevention teams as needed.<br>4. Integrate findings into ATM monitoring dashboards.<br>5. Refine thresholds as ATM withdrawal patterns evolve.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Selects all ATM withdrawal transactions.<br><b>02</b> <code>|streamstats count time_window=1m min(amount) AS min max(amount) AS max BY account_number,location</code><br>      - Calculates rolling counts and min/max withdrawals.<br><b>03</b> <code>|where count>1 and min<100 and max>6000</code><br>      - Flags suspicious withdrawal patterns.<br><b>04</b> <code>|table timestamp account_number transaction_type min max location count</code><br>      - Formats output.<br><b>05</b> <code>|dedup account_number, location</code><br>      - Ensures unique findings.<br><b>06</b> <code>|eval min=tostring(round(min, 2),"commas")</code><br>      - Formats minimum value.<br><b>07</b> <code>|eval max=tostring(round(max, 2),"commas")</code><br>      - Formats maximum value.
explanation = <p>This SPL uses <b>streamstats</b> to track withdrawal counts and min/max amounts over rolling 1-minute windows for each account and location. It filters for instances where the minimum withdrawal is less than 100 and the maximum exceeds 6000 within the same window—an indicator of withdrawal testing or probing ATM limits. <b>dedup</b> ensures unique account-location pairs, and <b>eval</b> formats values for reporting. This method enables rapid detection of ATM fraud patterns and provides actionable insights for Financial Services security teams.</p>
quid = 06B427952EC6AB618E14D07F1B85ED66
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/streamstats" target="_blank">Splunk Docs: streamstats command</a><br>How to calculate rolling statistics in Splunk.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/dedup" target="_blank">Splunk Docs: dedup command</a><br>Removing duplicate results.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>ATM fraud and risk use cases.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Guidance for ATM fraud detection.</li></ul>
description = <p>Detects patterns of <b>ATM withdrawal testing</b> by identifying accounts making both small and large withdrawals (less than 100 and greater than 6000) within short time windows. This surfaces accounts and locations potentially involved in suspicious ATM activity or fraud.</p>
search = index="*" sourcetype="*" transaction_type=withdrawal\
|streamstats count time_window=1m min(amount) AS min max(amount) AS max BY account_number,location\
|where count>1 and min<100 and max>6000\
|table timestamp account_number transaction_type min max location count\
|dedup account_number, location\
|eval min=tostring(round(min, 2),"commas")\
|eval max=tostring(round(max, 2),"commas")

[atm_withdrawals_near_threshold]
search_name = ATM Withdrawals Near Threshold
version = 2.x
