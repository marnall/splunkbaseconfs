[modification_to_file_permissions_in_windows_1]
search_name = Count of Non-Standard Security Modifications by Date, User, Process, and Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,SFU
solution = <p>This query provides valuable insights into potential security risks by detecting and grouping non-standard modifications to permissions on Windows objects. <b>Operational advantages include:</b> identifying anomalous behavior, reducing noise in event logs, and facilitating targeted threat investigations.</p> \
	<p><b>Suggested Actions</b><br> \
	<b>1.</b> Review modification events flagged by the query to identify any unauthorized access changes.<br> \
	<b>2.</b> Cross-check flagged events with existing IT security policies or user permissions to detect violations.<br> \
	<b>3.</b> Investigate frequent or recurring modifications by the same user or process for potential misconfigurations.<br> \
	<b>4.</b> Leverage the grouped insights to update or strengthen access-related policies and configurations.<br> \
	<b>5.</b> Set up alerts based on patterns identified in search results to automate future notifications.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security EventCode=4670 (Security_ID!=NT AUTHORITY*) (Security_ID!=S-*)</code><br>       - Filters for permission changes in the Windows Security EventLog while removing noise from 'NT AUTHORITY' and 'S-*' Security IDs.<br> \
	<b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Formats the event timestamp into a 'YYYY/MM/DD' format and saves it as 'Date'.<br> \
	<b>03</b> <code>| stats count by Date, Account_Name, Process_Name, Keywords, host</code><br>       - Calculates the event count grouped by Date, Account Name, Process Name, Keywords, and host to aid in trend analysis.<br> \
	<b>04</b> <code>| sort - Date</code><br>       - Sorts results in descending order by Date, ensuring the most recent data is first.<br>
explanation = <p>This search targets Windows Event Logs (EventCode 4670) to detect permission modifications on objects, which could be indicative of unauthorized changes. Filtering out entries with 'NT AUTHORITY' and 'S-*' Security IDs reduces non-critical data, allowing analysts to focus on key events.</p> \
	<p>The SPL steps include converting the event timestamp into a standardized 'YYYY/MM/DD' format for consistency and easier comparison. Grouping data by Date, Account Name, Process Name, Keywords, and host assists in uncovering patterns, such as recurring modification attempts by a certain user or process. Sorting by Date ensures that the most recent events are presented first, supporting timely decision-making and remediation. This query is valuable for monitoring and identifying potential abnormalities in access permissions within a Windows environment.</p>
quid = 57B364677974E849E867708288776167
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Count of Non-Standard Security Modifications by Date, User, Process, and Host</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4670 (Security_ID!="NT AUTHORITY*") (Se</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4670 (Security_ID!="NT AUTHORITY*") (Security_ID!="S-*")\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| stats count by Date, Account_Name, Process_Name, Keywords, host\
	| sort - Date

[monitor_file_shares_being_accessed_in_windows]
search_name = Monitoring Unauthorized Access to Shared Drives
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This query identifies unauthorized or unusual access patterns to critical shared drives in your Windows environment. It ensures visibility into who accessed sensitive data, from where, and how often, enabling proactive security monitoring.</p> <p><b>Suggested Actions</b><br><b>1.</b> Investigate accounts accessing restricted or sensitive shares like C$, D$, or U$.<br><b>2.</b> Verify any anomalous source IPs for potential compromise or unusual access routes.<br><b>3.</b> Corroborate access timestamps with business operations to validate legitimacy.<br><b>4.</b> Audit account permissions for flagged users and tighten policies if necessary.<br><b>5.</b> Continuously monitor these metrics to baseline normal activity and detect anomalies.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products.html" target="_blank">Products: Splunk Products (overview)</a><br>Splunk Products (overview).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> source=*WinEventLog:Security EventCode=5140</code><br>       - Specifies the Windows Security logs and EventCode 5140 to capture share access events.<br><b>02</b> <code>(Share_Name="*\\\C$" OR Share_Name="*D$" OR Share_Name="*E$" OR Share_Name="*F$" OR Share_Name="*U$") NOT Source_Address="::1"</code><br>       - Filters to examine specific shares and excludes local connections.<br><b>03</b> <code>| eval Destination_Sys1=trim(host,"1")</code><br>       - Removes trailing "1" from system hostnames for normalization.<br><b>04</b> <code>| eval Destination_Sys2=trim(host,"2")</code><br>       - Removes trailing "2" from system hostnames for normalization.<br><b>05</b> <code>| eval Dest_Sys1=lower(Destination_Sys1)</code><br>       - Converts trimmed hostnames to lowercase.<br><b>06</b> <code>| eval Dest_Sys2=lower(Destination_Sys2)</code><br>       - Converts additional trimmed hostnames to lowercase.<br><b>07</b> <code>| rename host AS Destination</code><br>       - Renames 'host' field to 'Destination' for clarity.<br><b>08</b> <code>| rename Account_Domain AS Domain</code><br>       - Renames 'Account_Domain' to 'Domain' for easy readability.<br><b>09</b> <code>| where Account_Name!=Dest_Sys1</code><br>       - Filters out cases where account and destination match.<br><b>10</b> <code>| where Account_Name!=Dest_Sys2</code><br>       - Applies the same filtering rule to additional normalized hostname.<br><b>11</b> <code>| stats count values(Domain) AS Domain, values(Source_Address) AS Source_IP, values(Destination) AS Destination, dc(Destination) AS Dest_Count, values(Share_Name) AS Share_Name, values(Share_Path) AS Share_Path by Account_Name</code><br>       - Aggregates key metrics (e.g., domain, source IP, destinations, and share information) by account name for analysis.<br>
explanation = <p>This query monitors access to shared network drives by analyzing Windows Security Event 5140 logs. It helps identify unusual or unauthorized access by focusing on critical shares (e.g., C$, D$, etc.) while excluding local actions, improving data relevance. </p><p>The SPL processes involve trimming and standardizing host names to lowercase, renaming fields for improved clarity, and excluding events where the account name matches system destinations. The aggregation step provides actionable metrics by group, including unique domains and source IPs per user, enriching operational intelligence.</p>
quid = 0B5C5C7A249252E1819E60AD425B13E7
search_author = GoSplunk: john117
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/monitor-file-shares-accessed-windows" target="_blank">https://gosplunk.com/monitor-file-shares-accessed-windows</a></p>
description = <p>Summarizes <b>Monitoring Unauthorized Access to Shared Drives</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=5140 (Share_Name="*\\\C$" OR Share_Name</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=5140 (Share_Name="*\\\C$" OR Share_Name="*D$" OR Share_Name="*E$" OR Share_Name="*F$" OR Share_Name="*U$") NOT Source_Address="::1"\
| eval Destination_Sys1=trim(host,"1")\
| eval Destination_Sys2=trim(host,"2")\
| eval Dest_Sys1=lower(Destination_Sys1)\
| eval Dest_Sys2=lower(Destination_Sys2)\
| rename host AS Destination\
| rename Account_Domain AS Domain\
| where Account_Name!=Dest_Sys1\
| where Account_Name!=Dest_Sys2\
| stats count values(Domain) AS Domain, values(Source_Address) AS Source_IP, values(Destination) AS Destination, dc(Destination) AS Dest_Count, values(Share_Name) AS Share_Name, values(Share_Path) AS Share_Path by Account_Name

[monitor_for_service_changes_in_windows]
search_name = System Event Log Analysis Excluding Specific Service
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This search identifies <b>new service installations</b> on Windows systems, helping detect potential malicious activity or unauthorized changes.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate unexpected service installations for potential threats.<br><b>2.</b> Verify service accounts used for new services are authorized.<br><b>3.</b> Correlate with other security events for context.<br><b>4.</b> Create alerts for service installations from non-standard accounts.<br><b>5.</b> Document legitimate service installations for baseline comparison.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products.html" target="_blank">Products: Splunk Products (overview)</a><br>Splunk Products (overview).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| The 'index' and 'sourcetype' specify the data source, in this case, a specific index and Windows System Event Logs.</code><br>       - Retrieves data from specified index and sourcetype.<br><b>02</b> <code>| EventCode=7045</code><br>       - Filters the events to only those with an EventCode of 7045, which indicates a new service creation event.<br><b>03</b> <code>| NOT (Service_Name=mgmt_service)</code><br>       - Excludes routine management service creation events from results.<br><b>04</b> <code>| eval Message=split(Message,".")</code><br>       - Splits the Message field at each period, creating a multi-value field.<br><b>05</b> <code>| eval Short_Message=mvindex(Message,0)</code><br>       - Extracts and creates a brief summary of the event.<br><b>06</b> <code>| table _time host Service_Name, Service_Type, Service_Start_Type, Service_Account, Short_Message</code><br>       - Displays a structured table of selected fields for quick review.</p>
explanation = <p>This query can be used to <b>monitor</b> the creation of new services on Windows systems, which could be an <b>indicator</b> of malicious activity. By <b>excluding</b> the 'mgmt_service', it filters out routine management service creation events, focusing on potentially suspicious activity. The Short_Message field provides a <b>brief</b> summary of the event, making it easier to quickly <b>review</b> the events.</p>
quid = AD3D9A4FCC1068445E7B62AA26D7E42C
search_author = GoSplunk: john117
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/monitor-service-changes-windows" target="_blank">https://gosplunk.com/monitor-service-changes-windows</a></p>
description = <p>Summarizes <b>System Event Log Analysis Excluding Specific Service</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:System EventCode=7045 NOT (Service_Name=mgmt_service)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:System EventCode=7045 NOT (Service_Name=mgmt_service)\
	| eval Message=split(Message,".")\
	| eval Short_Message=mvindex(Message,0)\
	| table _time host Service_Name, Service_Type, Service_Start_Type, Service_Account, Short_Message

[more_than_a_day_between_events]
search_name = Calculate and Display Events Exceeding 24 Hours Since Last Occurrence
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,SFU
solution = <p>This search identifies <b>data gaps</b> exceeding 24 hours, helping detect data collection issues or system downtime.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate identified gaps for root cause.<br><b>2.</b> Verify data collection systems were operational during gaps.<br><b>3.</b> Document expected gaps (maintenance windows) to reduce false positives.<br><b>4.</b> Set up proactive monitoring for data ingestion continuity.<br><b>5.</b> Use findings to improve data collection reliability.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specify data source location<br><b>02</b> <code>| sort _time</code><br>       - Sort events by timestamp<br><b>03</b> <code>| streamstats current=f global=f window=1 last(_time) as last_ts</code><br>       - Compute the timestamp difference between consecutive events<br><b>04</b> <code>| eval time_since_last = _time - last_ts</code><br>       - Calculate time elapsed between events<br><b>05</b> <code>| fieldformat time_since_last = tostring(time_since_last, "duration")</code><br>       - Format the elapsed time into a readable duration<br><b>06</b> <code>| where time_since_last > 60*60*24</code><br>       - Filter for events with gaps exceeding 24 hours<br>
explanation = <p>This query can be used to identify <b>gaps</b> in data or periods of <b>inactivity</b>. If there are long periods of time between consecutive events, this could indicate a problem with data collection or a lack of activity. The SPL leverages key functions: <b>| sort</b> to organize events chronologically, <b>| streamstats</b> to calculate inter-event timing, and <b>| eval</b> to compute time differences. The <b>fieldformat</b> command ensures readability by formatting time as a human-friendly duration. This is crucial for understanding <b>timing patterns</b> and quickly addressing any anomalies or operational disruptions.</p>
quid = D3D449B041B0F1596AFB3FFB40E7109E
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Calculate and Display Events Exceeding 24 Hours Since Last Occurrence</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| sort _time\
	| streamstats current=f global=f window=1 last(_time) as last_ts\
	| eval time_since_last = _time - last_ts\
	| fieldformat time_since_last = tostring(time_since_last, "duration")\
	| where time_since_last > 60*60*24

