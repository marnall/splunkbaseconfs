[splunk_data_source_assessment]
search_name = Splunk Data Source Assessment
version = 2.x
date_created = 2025-11-05
category = Splunk
sub_category = _internal
tags = Hutch,Ingestion,License,Sourcetype
solution = <p>This search enables teams to assess and understand their data ingestion profiles across sources. By examining ingestion volumes, host participation, and sourcetype spread, it offers actionable insights for <b>cost management</b>, <b>scaling strategies</b>, and <b>governance</b>. App ownership enrichment reinforces accountability and operation sustainability.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify sourcetypes with significant MB/day ingestion rates that may require optimization.<br><b>2.</b> Correlate ingestion trends with business priorities to refine data pipelines.<br><b>3.</b> Reduce verbosity or eliminate sources contributing unnecessary ingestion.<br><b>4.</b> Examine host distribution across sourcetypes to detect and resolve load balancing issues.<br><b>5.</b> Use app ownership context for better governance and enhanced communication with application teams.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.log TERM(type=Usage) earliest=-7d@d latest=@d</code><br>       - Searches the license usage logs for data from the last 7 days, filtered specifically for usage types.<br><b>02</b> <code>| fields idx, b, st, h, _time, date_wday</code><br>       - Focuses on key fields required for meaningful statistics and calculations.<br><b>03</b> <code>| eval h=if(len(h)=0 OR isnull(h),'(SQUASHED)',h)</code><br>       - Normalizes missing or null host values to maintain clean and consistent data.<br><b>04</b> <code>| bin _time span=1d</code><br>       - Groups the events into daily intervals for time-based aggregation.<br><b>05</b> <code>| stats sum(b) AS b, dc(h) AS h by st idx _time</code><br>       - Calculates total ingestion volume and distinct host count per sourcetype, index, and day.<br><b>06</b> <code>| stats avg(b) as avg_b, avg(h) AS Host_Count_per_Day by idx st</code><br>       - Derives average daily results for ingestion and host participation by sourcetype and index.<br><b>07</b> <code>| eval Avg_MB_per_Day=round(avg_b/1024/1024,2)</code><br>       - Converts the average byte volume to MB for operational clarity.<br><b>08</b> <code>| join ... [ | rest /services/saved/sourcetypes ... ]</code><br>       - Enriches data with app ownership extracted from Splunk's REST API, providing lineage and accountability.<br><b>09</b> <code>| table ... | sort Sourcetype</code><br>       - Displays the final organized table, sorted by sourcetype for readability.<br>
explanation = <p>This search is built around analyzing Splunk ingestion patterns using the <code>license_usage.log</code> source. Key metrics like average daily ingestion (MB/GB), host count, and ingestion per host are calculated to identify ingestion-heavy sources and frame governance decisions. The use of <code>eval</code> ensures clean normalization and precise value derivation per sourcetype.</p><p>By incorporating REST API data for app context, the search aligns ingestion with app ownership, empowering administrators to hold teams accountable for usage patterns. Steps like bucketing with <code>| bin</code>, hostname handling via <code>len()</code> checks, and multi-stage aggregation with <code>stats</code> provide crucial skills for junior Splunk users.</p>
quid = 3EAAFE483CBAB888D70942F6ADC42DBF
search_author = grdhg24
description = <p>Summarizes <b>Splunk Data Source Assessment</b> using <code>index="_internal" source="*license_usage.log" TERM(type=Usage) earliest=-7d@d latest=@d</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="_internal" source="*license_usage.log" TERM(type=Usage) earliest=-7d@d latest=@d \
	| fields idx, b, st, h, _time, date_wday \
	| eval h=if(len(h)=0 OR isnull(h),'(SQUASHED)',h) \
	| bin _time span=1d \
	| stats sum(b) AS b, dc(h) AS h by st idx _time \
	| stats avg(b) as avg_b, avg(h) AS Host_Count_per_Day by idx st \
	| eval Avg_MB_per_Day=round(avg_b/1024/1024,2) \
	| eval Avg_GB_per_Day=round(avg_b/1024/1024/1024,2) \
	| eval Avg_MB_per_Host=round(Avg_MB_per_Day/Host_Count_per_Day,2) \
	| eval Host_Count_per_Day=round(Host_Count_per_Day,0) \
	| rename st AS Sourcetype \
	| join type=left Sourcetype [ \
	| rest /services/saved/sourcetypes \
	| rename title AS Sourcetype, eai:acl.app as app \
	| table Sourcetype, app \
	] \
	| table idx, app, Sourcetype, Avg_MB_per_Day, Avg_GB_per_Day, Host_Count_per_Day, Avg_MB_per_Host \
	| sort Sourcetype

