[suspicious_transaction_patterns]
search_name = Suspicious Transaction Patterns
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Detail,Fraud,Suspicious
solution = <p>This SPL flags accounts with multiple suspicious transaction indicators for further review. <b>Suggested Actions</b></p><p>1. Investigate flagged accounts for fraud or structuring.<br>2. Escalate accounts with high suspicious scores.<br>3. Correlate with other alerts and risk profiles.<br>4. Integrate with compliance case management.<br>5. Refine thresholds and watch lists as needed.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" status="completed" earliest=-24h@h</code><br>      - Selects all completed transactions in the last day.<br><b>02</b> <code>| lookup high_risk_countries country AS dest_country OUTPUT country AS high_risk_destination_country</code><br>      - Flags high-risk destination countries.<br><b>03</b> <code>| lookup high_risk_ips ip_address AS dest_ip OUTPUT ip_address AS high_risk_ip</code><br>      - Flags high-risk destination IPs.<br><b>04</b> <code>| lookup known_vendor vendor OUTPUT vendor AS matched_known_vendor</code><br>      - Matches vendors against known safe list.<br><b>05</b> <code>| lookup high_risk_accounts accounts AS account_number OUTPUT high_risk_accounts</code><br>      - Flags high-risk accounts.<br><b>06</b> <code>| stats count AS txn_count, sum(amount) AS total_amount, avg(amount) AS avg_txn_amount, stdev(amount) AS stdev_txn_amount, dc(vendor) AS unique_vendors, dc(ip_address) AS unique_ips by account_number</code><br>      - Aggregates transaction metrics per account.<br><b>07</b> <code>| join type=inner account_number [ search index="*" status="completed" earliest=-24h@h | stats count AS recent_txn_count, sum(amount) AS recent_total_amount BY account_number ]</code><br>      - Joins recent transaction stats.<br><b>08</b> <code>| eval txn_amount_threshold = coalesce(avg_txn_amount + 3 * stdev_txn_amount, recent_total_amount)</code><br>      - Calculates dynamic amount threshold.<br><b>09</b> <code>| eval structuring_flag = if(total_amount > 10000 AND avg_txn_amount < 500, 1, 0)</code><br>      - Flags structuring patterns.<br><b>10</b> <code>| eval rapid_succession_flag = if(recent_txn_count > 20, 1, 0)</code><br>      - Flags rapid transaction activity.<br><b>11</b> <code>| eval high_value_flag = if(total_amount > txn_amount_threshold, 1, 0)</code><br>      - Flags high-value anomalies.<br><b>12</b> <code>| eval new_vendor_flag = if(unique_vendors > 10, 1, 0)</code><br>      - Flags new vendor diversity.<br><b>13</b> <code>| eval high_risk_vendor_flag = if(isnull(matched_known_vendor), 1, 0)</code><br>      - Flags unknown vendors.<br><b>14</b> <code>| eval high_risk_country_flag = if(isnotnull(high_risk_destination_country), 1, 0)</code><br>      - Flags high-risk countries.<br><b>15</b> <code>| eval suspicious_score = structuring_flag + rapid_succession_flag + high_value_flag + new_vendor_flag + high_risk_vendor_flag + high_risk_country_flag</code><br>      - Sums risk indicators.<br><b>16</b> <code>| where suspicious_score >= 2</code><br>      - Filters for multi-flagged accounts.<br><b>17</b> <code>| sort -suspicious_score, -total_amount</code><br>      - Sorts by score and amount.<br><b>18</b> <code>| table account_number, txn_count, total_amount, recent_txn_count, recent_total_amount, suspicious_score, structuring_flag, rapid_succession_flag, high_value_flag, new_vendor_flag, high_risk_vendor_flag, high_risk_country_flag</code><br>      - Tabular output for review.
explanation = <p>This SPL uses multiple lookups to enrich transaction data with high-risk countries, IPs, vendors, and accounts. It aggregates transaction statistics and applies a series of flags for structuring, rapid succession, high value, new vendors, and risk indicators. The suspicion score summarizes these risk factors. Filtering for scores ≥2 helps prioritize accounts requiring the most attention in financial oversight, risk, or fraud teams. The approach demonstrates multi-dimensional risk analysis, aggregation, and lookup enrichment.</p>
quid = 4BC5E43A4260BB484D50D2FCC5357653
search_author = Splunk Searchbase Metadata Gen.
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/lookup" target="_blank">Splunk Docs: lookup command</a><br>How to enrich events with high-risk lists.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_blank">Splunk Docs: stats command</a><br>Aggregating and summarizing transaction data.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Fraud detection and suspicious pattern use cases.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Guidance for detecting suspicious activity.</li></ul>
description = <p>Detects <b>suspicious transaction patterns</b> by analyzing transaction volume, values, vendor diversity, rapid activity, and matches against high-risk lists. Flags accounts with multiple indicators of potentially suspicious behavior for further investigation and compliance review.</p>
search = index="*" status="completed" earliest=-24h@h\
	| lookup high_risk_countries country AS dest_country OUTPUT country AS high_risk_destination_country\
	| lookup high_risk_ips ip_address AS dest_ip OUTPUT ip_address AS high_risk_ip\
	| lookup known_vendor vendor OUTPUT vendor AS matched_known_vendor\
	| lookup high_risk_accounts accounts AS account_number OUTPUT high_risk_accounts\
	| stats count AS txn_count, sum(amount) AS total_amount, avg(amount) AS avg_txn_amount, stdev(amount) AS stdev_txn_amount, dc(vendor) AS unique_vendors, dc(ip_address) AS unique_ips by account_number\
	| join type=inner account_number \
	[ search index="*" status="completed" earliest=-24h@h | stats count AS recent_txn_count, sum(amount) AS recent_total_amount BY account_number ]\
	| eval txn_amount_threshold = coalesce(avg_txn_amount + 3 * stdev_txn_amount, recent_total_amount)\
	| eval structuring_flag = if(total_amount > 10000 AND avg_txn_amount < 500, 1, 0)\
	| eval rapid_succession_flag = if(recent_txn_count > 20, 1, 0)\
	| eval high_value_flag = if(total_amount > txn_amount_threshold, 1, 0)\
	| eval new_vendor_flag = if(unique_vendors > 10, 1, 0)\
	| eval high_risk_vendor_flag = if(isnull(matched_known_vendor), 1, 0)\
	| eval high_risk_country_flag = if(isnotnull(high_risk_destination_country), 1, 0)\
	| eval suspicious_score = structuring_flag + rapid_succession_flag + high_value_flag + new_vendor_flag + high_risk_vendor_flag + high_risk_country_flag\
	| where suspicious_score >= 2\
	| sort -suspicious_score, -total_amount\
	| table account_number, txn_count, total_amount, recent_txn_count, recent_total_amount, suspicious_score, structuring_flag, rapid_succession_flag, high_value_flag, new_vendor_flag, high_risk_vendor_flag, high_risk_country_flag

[system_security_access_removed_from_account_1]
search_name = Security Event Log: Modified Accounts and Removed Access Rights
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>This search helps identify and investigate account modification events for security auditing.</p><p><b>Suggested Actions</b><br><b>1.</b> Review access removals for legitimacy with change management records.<br><b>2.</b> Investigate modifications made outside of normal change windows.<br><b>3.</b> Create alerts for modifications to privileged accounts.<br><b>4.</b> Correlate with other security events to detect insider threats.<br><b>5.</b> Document findings for compliance and audit purposes.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=622 Account_Modified!="%{*"</code><br>       - Focuses on Windows Security Event logs filtering for EventCode 622, which involves account modifications<br><b>02</b> <code>eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts timestamp into a human-readable date format<br><b>03</b> <code>stats count by User_Name, Account_Modified, Access_Removed, Date, action</code><br>       - Aggregates events by relevant fields to highlight modifications<br><b>04</b> <code>rename User_Name as "Source Account"</code><br>       - Makes field names more comprehensible<br><b>05</b> <code>rename Account_Modified as "Target Account"</code><br>       - Continues enhancing naming clarity<br><b>06</b> <code>rename Access_Removed as "Rights Removed"</code><br>       - Finalizes field name comprehensibility<br>
explanation = <p>This query is instrumental in monitoring and ensuring the security of user accounts within a Windows environment. It focuses on capturing changes that involve <b>modifications</b> to accounts, particularly those where <b>access rights are removed</b>. Such changes can be indicative of unauthorized actions or potential security threats.</p> \
	<p>The use of the <code>stats</code> command allows the consolidation of relevant data by <b>User Name</b>, <b>Account Modified</b>, and <b>Access Removed</b>, providing a comprehensive view of account changes. Renaming fields enhances the clarity of reports, making the information more accessible and understandable for security teams.</p>
quid = D252B90A864D18B7BFE564960C3C1AB6
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/system-security-access-removed-from-account" target="_blank">https://gosplunk.com/system-security-access-removed-from-account</a></p>
description = <p>Summarizes <b>Security Event Log: Modified Accounts and Removed Access Rights</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=622 Account_Modified!="%{*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=622 Account_Modified!="%{*"\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| stats count by User_Name, Account_Modified, Access_Removed, Date, action\
	| rename User_Name as "Source Account"\
	| rename Account_Modified as "Target Account"\
	| rename Access_Removed as "Rights Removed"

