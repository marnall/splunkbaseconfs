execution_plan = <b>01</b> <code>index="_introspection" sourcetype="splunk_resource_usage" component IN (Hostwide, IOStats)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Targets the internal index and resource usage sourcetype limited to relevant host-wide and I/O statistics.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Renames the fields within the data sub-object for easier processing and readability.<br><b>03</b> <code>| stats latest(reads_kb_ps) as reads_kb_ps, latest(writes_kb_ps) as writes_kb_ps by _time, host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates the most recent read and write KB/s metrics grouped by time and host.<br><b>04</b> <code>| timechart span=1h avg(reads_kb_ps) as reads avg(writes_kb_ps) as writes by host limit=0</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Converts the aggregated data into a timechart over hourly intervals to visualize averaged metrics per host.<br>
explanation = <p>This search offers insights into the health of storage systems that underpin Splunk indexers. By monitoring key metrics like <b>reads_kb_ps</b> and <b>writes_kb_ps</b>, administrators can preemptively spot <b>potential bottlenecks</b>, assess whether disk systems can sustain ingestion demands, and consider investments in upgrades or optimizations (e.g., implementing SmartStore).</p><p>Accessing these metrics provides operators with a lens into indexer storage behavior. For example, spikes in write throughput might indicate peak logging or ingestion events, while severely low read/write rates might flag under-utilization or issues in storage hardware.</p><p>By systematically applying <b>stats</b> and <b>timechart</b>, this search builds an easy-to-follow aggregated trend view, offering an accessible way for less experienced users to interpret storage performance metrics effectively.</p>
