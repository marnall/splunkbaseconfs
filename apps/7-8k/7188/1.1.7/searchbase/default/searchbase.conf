description = <p>Summarizes <b>Identifying Randomized Domains Using Subdomain Entropy</b> using <code>| `ut_parse(query)` | lookup FP_entropy_domains domain AS ut_domain | search NOT FP_entropy=* | `ut_shannon(ut_domain)` </code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
