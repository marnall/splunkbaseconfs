execution_plan = <b>01</b> <code>index=<<index>> sourcetype=access*</code><br>       - This step specifies the data source. It looks for events in the specified index with a sourcetype that starts with 'access'.<br><b>02</b> <code>| top referer</code><br>       - This step uses the 'top' function to find the most common 'referer' values in the data. The 'referer' field typically contains the URL of the page that linked to the website or application.<br><b>03</b> <code>| fields referer percent</code><br>       - This step specifies which fields to return in the results, namely the 'referer' field and the 'percent' field, which shows the percentage of total occurrences for each referrer.<br>
