[table_with_xyseries]
search_name = Hourly Average Action Time with Standard Deviation
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,SFU
solution = <p>This search identifies <b>performance outliers</b> in user actions over time, helping pinpoint <b>inefficiencies</b> or <b>bottlenecks</b> in the system.</p> \
	<p>By visualizing how many standard deviations (sigmas) average action times deviate from the overall average, teams can focus on anomalies. Such insights ensure targeted troubleshooting efforts, improving system performance and user experience.</p> \
	<p><b>Suggested Actions</b><br><b>1.</b> Investigate actions showing high sigma values to identify root causes.<br> \
	<b>2.</b> Validate whether anomalies are periodic or tied to specific system events.<br> \
	<b>3.</b> Adjust system configurations or workflows causing excessive delays.<br> \
	<b>4.</b> Add monitoring alerts for actions frequently crossing threshold sigmas.<br> \
	<b>5.</b> Reexamine resource allocation to improve response rates for critical actions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=access_combined source=*sample_access_logs.txt</code><br>       - Selects specific data from the index, sourcetype, and source.<br> \
	<b>02</b> <code>bucket _time span=1h</code><br>       - Buckets data by the _time field into hourly segments, preparing for aggregation.<br> \
	<b>03</b> <code>stats avg(time_taken) as avg_time_taken by action _time</code><br>       - Calculates the hourly average time taken per action.<br> \
	<b>04</b> <code>eventstats avg(avg_time_taken) as avg_of_avg_is_often_bad_math stdev(avg_time_taken) as stdev by action</code><br>       - Computes the overall average and standard deviation from the hourly averages, grouped by action.<br> \
	<b>05</b> <code>eval sigmas = abs(avg_time_taken - avg_of_avg_is_often_bad_math) / stdev</code><br>       - Determines how far each action's hourly average deviates (in sigmas) from the overall average.<br> \
	<b>06</b> <code>xyseries _time action sigmas</code><br>       - Converts the dataset into a format suitable for time series visualization.<br>
explanation = <p>This query can be used to identify <b>actions</b> that are taking significantly longer than usual. By calculating the number of <b>standard deviations (sigmas)</b> each action's average time taken is from the overall average, it highlights <b>performance outliers</b>.</p> \
	<p>This capability is valuable for resolving <b>bottlenecks</b> or identifying potential <b>system issues</b>. The bucket command structures the data across hourly segments for clear comparison. The <code>stats</code> command calculates the average time per action per hour. The <code>eventstats</code> command computes the overall trends alongside the standard deviation per action, giving both a micro and macro perspective. Finally, the <code>xyseries</code> command reshapes the data for a time series chart, simplifying analysis and visualization of anomalies.</p>
quid = 3ADC6C3CD2CC750E5CB0DA9D708C6CD0
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Hourly Average Action Time with Standard Deviation</b> using <code>index="<<index>>" sourcetype=access_combined source=*sample_access_logs.txt</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=access_combined source=*sample_access_logs.txt\
	| bucket _time span=1h\
	| stats avg(time_taken) as avg_time_taken by action _time\
	| eventstats avg(avg_time_taken) as avg_of_avg_is_often_bad_math stdev(avg_time_taken) as stdev by action\
	| eval sigmas = abs(avg_time_taken - avg_of_avg_is_often_bad_math) / stdev\
	| xyseries _time action sigmas

