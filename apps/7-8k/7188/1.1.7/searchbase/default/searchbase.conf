description = <p>This query <b>retrieves</b> information about saved searches in Splunk that are <b>scheduled</b> to run on a cron schedule. It returns a table with the title of the search, the cron schedule, and the author of the search, providing <b>insight</b> into search management and scheduling in your environment.</p>
