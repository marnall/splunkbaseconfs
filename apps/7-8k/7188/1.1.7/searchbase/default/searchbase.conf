tags = Access,GoSplunk
solution = <p>This search provides a clear overview of remediation progress for Linux environments by listing the top 25 IPs with the most fixed vulnerabilities. It allows security teams to monitor and validate their vulnerability patching efforts effectively.</p><p><b>Suggested Actions</b><br><b>1.</b> Verify that systems listed in the results align with remediation goals.<br><b>2.</b> Investigate any outliers or hosts with unexpectedly high counts.<br><b>3.</b> Share findings with the vulnerability management team to confirm accuracy.<br><b>4.</b> Use results to track trends over time and report on remediation effectiveness.<br><b>5.</b> Ensure future scans and data cover additional systems to maintain comprehensive visibility.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>eventtype="qualys_vm_detection_event" STATUS="FIXED"</code><br>       - Filters events to include only Qualys VM detection logs marked as "FIXED".<br><b>02</b> <code>| regex OS="^((?!\/).)*Linux((?!\/).)*$"</code><br>       - Ensures results pertain to Linux systems by applying a regex to filter out records containing forward slashes.<br><b>03</b> <code>| dedup QID IP</code><br>       - Removes duplicate entries of QID and IP pairings to ensure uniqueness.<br><b>04</b> <code>| stats count by IP</code><br>       - Aggregates and counts records by IP address to highlight the volume of fixed vulnerabilities for each.<br><b>05</b> <code>| sort -count | head 25</code><br>       - Orders the results by descending count and extracts the top 25 IP addresses with the most fixes.<br>
explanation = <p>By pinpointing the <b>IP addresses</b> with fixed vulnerabilities, this search highlights remediation progress on Linux hosts. It relies on Qualys VM detections with a status of "FIXED" and matches events where the operating system contains "Linux" but excludes entries with forward slashes. The <code>dedup</code> command eliminates duplicate pairings of QID and IP, ensuring only unique entries are analyzed. The <code>stats</code> command tallies the occurrences of each IP with fixed vulnerabilities, providing a clear count of remediated instances. Finally, the results are sorted by count and restricted to the top 25 entries. This information is valuable for tracking overall vulnerability management effectiveness in Linux environments.</p>
quid = 589C63A8E5BE2ED0A30679284DBD687A
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/track-remediation-progress-os-qualys" target="_blank">https://gosplunk.com/track-remediation-progress-os-qualys</a></p>
description = <p>This search identifies the <b>top 25 fixed Linux vulnerabilities</b> by IP address. It focuses on entries from Qualys that have a '<b>FIXED</b>' status and are specific to Linux systems. The data helps security teams monitor and verify vulnerability remediation efforts across their Linux infrastructure.</p>
search = eventtype="qualys_vm_detection_event" STATUS="FIXED"\
	| regex OS="^((?!\/).)*Linux((?!\/).)*$"\
	| dedup QID IP\
	| stats count by IP\
	| sort -count\
	| head 25

