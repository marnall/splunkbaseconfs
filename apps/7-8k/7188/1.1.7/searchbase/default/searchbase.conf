tags = Access,SFU
solution = <p>This search identifies <b>rapid successive connections</b> to hosts, which may indicate malware beaconing or automated attack patterns.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts with high-frequency connection patterns.<br><b>2.</b> Correlate findings with known malware indicators.<br><b>3.</b> Block or quarantine suspicious source IPs.<br><b>4.</b> Review endpoint security logs for affected hosts.<br><b>5.</b> Update detection rules based on observed patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>The 'index' and 'sourcetype' are specifying the data sources.</code><br>       - Specify data sources<br><b>02</b> <code>convert mktime(_time) as epoch</code><br>       - Convert the _time field to epoch time<br><b>03</b> <code>sort 0 uri_host,client_ip,epoch</code><br>       - Sort the data by uri_host, client_ip, and epoch time in ascending order<br><b>04</b> <code>delta epoch as epoch_delta</code><br>       - Calculate the time difference between consecutive events<br><b>05</b> <code>search epoch_delta>0 epoch_delta<30</code><br>       - Filter out events with a time difference greater than 0 and less than 30 seconds<br><b>06</b> <code>chart count over epoch_delta by uri_host</code><br>       - Create a chart that counts the number of events over the time difference grouped by uri_host<br>
explanation = <p>This query can be used to <b>analyze</b> the frequency of events happening within a short time frame (less than 30 seconds) for each host. It helps identify patterns or anomalies in the data, such as a sudden increase in the number of events for a particular host, which could indicate a potential issue or threat.</p>
quid = E61ABF3A29A79CA93C765890F6ED950B
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Count of Events by URI Host within 30 Seconds Interval</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| convert mktime(_time) as epoch\
	| sort 0 uri_host,client_ip,epoch\
	| delta epoch as epoch_delta\
	| search epoch_delta>0 epoch_delta<30\
	| chart count over epoch_delta by uri_host

[mapping_aws_access_key_usage_by_source_ip_location]
search_name = Mapping AWS Access Key Usage by Source IP Location
version = 1.0.4
