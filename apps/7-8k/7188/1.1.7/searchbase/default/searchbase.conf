tags = Access,SFU
solution = <p>This query provides a <b>clear overview</b> of server response trends, highlighting potential areas for <b>improvement</b>. Understanding these trends allows for better maintenance and <b>optimization</b> of resources.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the pattern of status codes to assess server performance.<br><b>2.</b> Investigate high error rate periods to determine root causes.<br><b>3.</b> Implement corrective measures to reduce error occurrences.<br><b>4.</b> Set up alerts for significant deviations in status code patterns.<br><b>5.</b> Regularly monitor these metrics to maintain optimal server health.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=*access*</code><br>       - Specify index and sourcetype for data extraction. The index is user-defined, and the sourcetype targets logs containing 'access'.<br><b>02</b> <code>| chart count(eval(like(status,"2%"))) AS Success</code><br>       - Count HTTP status codes beginning with '2' (successful) and label as 'Success'.<br><b>03</b> <code>count(eval(like(status,"4%") OR like(status,"5%"))) AS Error by status</code><br>       - Count and label status codes starting with '4' or '5' as 'Error', categorizing results by status.</br>
explanation = <p>This query <b>monitors</b> the health of a web server or application by tracking successful and error HTTP status codes. By identifying a <b>high volume</b> of error codes, users can <b>proactively</b> address potential issues impacting server <b>reliability</b> or performance. It <b>leverages</b> 'chart' and 'eval' to distinguish between status codes, providing valuable metrics for server upkeep.</p>
