solution = <p>This search delivers <b>actionable insights</b> for monitoring and securing networks against unauthorized access from regions outside typical operational zones. The exclusion of major Germanic countries (Germany, Austria, or Switzerland) ensures that the focus remains on uncommon or anomalous activities.</p> \
	<p><b>Suggested Actions</b></p> \
	<b>1.</b> Investigate the identified IPs to verify whether the traffic from unexpected regions is legitimate.<br> \
	<b>2.</b> Cross-check events against known baseline patterns to pinpoint unusual activities.<br> \
	<b>3.</b> Use the GeoIP data to tighten access controls and improve geographical filtering in security policies.<br> \
	<b>4.</b> Regularly review and enhance firewall rules based on flagged anomaly regions.<br> \
	<b>5.</b> Share insights with security teams to address potential unauthorized use cases proactively.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specifies the search's index and sourcetype where events are pulled from.<br> \
	<b>02</b> <code>| geoip clientip as clientip</code><br>       - Utilizes the GeoIP function to extract and correlate client IPs with geographical data.<br> \
	<b>03</b> <code>| table _time clientip client_country</code><br>       - Presents the data in a structured table showing event time, IPs, and client countries.<br> \
	<b>04</b> <code>| where client_country NOT ("Germany" OR "Austria" OR "Switzerland")</code><br>       - Filters out client countries of Germany, Austria, and Switzerland, focusing the results on exterior events.<br>
explanation = <p>This query is tailored for analyzing geographical patterns and anomalies in client IP addresses. It is highly useful for organizations that operate exclusively in Germany, Austria, and Switzerland, helping to identify unauthorized access or suspicious activities from non-Germanic countries. By using the <code>geoip</code> function, it maps client IP addresses to geographical data, enabling <b>precision insights</b> into source locations.</p> \
	<p>The transformation to a table format provides a <b>clear and concise visualization</b> of pertinent details like the time of the event and its origin. The <code>where</code> clause effectively filters noise by excluding expected regional traffic, making anomalies and unauthorized activities stand out for investigation.</p>
quid = F217C8EEA7F3EAE76FB06DCC76EA9759
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Non-Germanic Countries GeoIP Analysis</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li></ul>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| geoip clientip as clientip\
	| table _time clientip client_country\
	| where client_country NOT ("Germany" OR "Austria" OR "Switzerland")

