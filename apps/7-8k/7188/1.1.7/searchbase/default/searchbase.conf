solution = <p>This search enables deep visibility into CPU usage trends on search heads, identifying both performance bottlenecks and periods of high resource demand. It is particularly useful for operational adjustments, resource planning, and early detection of performance degradation.</p><p><b>Suggested Actions</b><br><b>1.</b> Set up scheduled alerts for CPU trends that exceed acceptable thresholds.<br><b>2.</b> Monitor trends to plan maintenance windows during low-utilization periods.<br><b>3.</b> Investigate CPU spikes by correlating data with search activity using other Splunk dashboards.<br><b>4.</b> Track gradual performance degradation and scale resources if necessary.<br><b>5.</b> Use insights to optimize search scheduling and hardware allocation.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index="_introspection" sourcetype=splunk_resource_usage component IN (Hostwide, IOStats)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieve CPU resource usage data specific to search head activities.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Standardizes field names for easier referencing and manipulation.<br><b>03</b> <code>| eval cpu=cpu_system_pct+cpu_user_pct</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Combine CPU system and user percentages into a single metric.<br><b>04</b> <code>| stats latest(cpu) as cpu by _time, host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate the latest CPU data points by host and time.<br><b>05</b> <code>| timechart span=1h p90(cpu) as cpu_usage by host limit=0</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Produce an hourly trend chart of p90 CPU usage for each host for analysis.<br>
explanation = <p>This search visualizes CPU utilization trends on search heads by calculating the <b>90th percentile</b> of CPU usage for each host over hourly intervals. By providing a clear view of p90 CPU over time, it reveals <b>performance bottlenecks</b>, identifies periods of high resource demand, and helps correlate CPU spikes with <b>search activity</b> or other events.</p><p>The search enables users to understand daily/weekly usage patterns, strategically plan maintenance windows during periods of low utilization, and monitor for gradual performance degradation that could signal the need for intervention. Junior engineers can learn critical aspects of resource monitoring, percentile calculations, and <b>timechart aggregation</b>, which are essential for effective Splunk administration.</p><p>Incorporating p90 metrics ensures that rare peak values are accounted for without skewing results, helping teams to make data-driven decisions for performance tuning and hardware scaling.</p>
