execution_plan = <b>01</b> <code>index=_audit (action=local_bucket_upload OR action=remote_bucket_download OR action=local_bucket_evict OR action=remote_bucket_remove) info=completed</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters SmartStore operations based on specified actions.<br><b>02</b> <code>bin span=1h _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Bins events into hourly span intervals.<br><b>03</b> <code>stats sum(kb) as kb by action, cache_id, _time</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates total KB by action type over time.<br><b>04</b> <code>search cache_id="*bid|*"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Isolates regular bucket activity by filtering cache IDs.<br><b>05</b> <code>timechart span=1h sum(kb) as throughput_KB by action</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Visualizes hourly throughput trends for each action.</br>
explanation = <p>This search specifically targets regular bucket SmartStore operations by filtering bucket cache IDs and trending data transfer volumes over time for uploads, downloads, evictions, and removals. By focusing on regular bucket activity and excluding data model acceleration summaries, administrators can understand the <b>throughput patterns</b> of SmartStore driven by search activity and retention policies.</p><p>Spikes in <b>download activity</b> may indicate cache sizing issues or changes in search patterns, while consistent upload activity shows the natural aging of data from hot/warm to remote storage.</p><p>For junior engineers, understanding this search will demonstrate the use of <b>stats</b> for aggregation and the importance of filtering specific bucket operations.</p>
