description = <p>This query is searching for all events in the specified index and sourcetype, and then creating a table with all fields from these events.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| table *

[list_all_fields_for_an_index_3]
search_name = List All Fieldnames in a Specific Index and Sourcetype
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,Indexes
solution = <p>This query simplifies data discovery by providing all field names in a specific dataset, helping Splunk users understand and work effectively with their data. It supports identifying fields critical for reports or dashboards.</p><p><b>Suggested Actions</b><br><b>1.</b> Run this query to obtain a comprehensive list of all fields.<br><b>2.</b> Validate the fieldnames against data requirements for any planned reports or dashboards.<br><b>3.</b> Use the results to identify actionable insights or required data cleaning.<br><b>4.</b> Share field information with team members for collaborative tasks.<br><b>5.</b> Bookmark this query for quick access during setup or onboarding stages.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Specifies the index and sourcetype to target specific data.<br><b>02</b> <code>| stats values(*) AS *</code><br>       - Extracts all unique field names and values from the dataset.<br><b>03</b> <code>| transpose</code><br>       - Rearranges the data so rows become columns and vice versa for readability.<br><b>04</b> <code>| table column</code><br>       - Focuses on the 'column' field containing field names.<br><b>05</b> <code>| rename column AS Fieldnames</code><br>       - Renames the column for clarity, making its purpose explicit.<br>
explanation = <p>This query is designed to provide a list of all field names within a specific index and sourcetype. By doing so, it offers visibility into the data structure—an essential step for tasks like report building, data validation, and discovering attributes for dashboards or alerts. The search starts by narrowing data to a targeted index and sourcetype and then retrieves all fields using the <code>stats values(*)</code> command. The <code>transpose</code> command rearranges rows and columns for better readability, followed by <code>table column</code> to select the 'column' field and finally, renaming it to 'Fieldnames' for clarity. This streamlined process ensures an intuitive output for field discovery.</p>
quid = FEEE7579AA21E84FF9731118354BE493
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-all-fields-for-an-index" target="_blank">https://gosplunk.com/list-all-fields-for-an-index</a></p><br><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/fieldsummary" target="_blank">Splunk Help: fieldsummary command</a><br>Official Splunk documentation for this topic.</p>
description = <p>Summarizes <b>List All Fieldnames in a Specific Index and Sourcetype</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| stats values(*) AS *\
	| transpose\
	| table column\
	| rename column AS Fieldnames

[list_all_fields_for_an_index_4]
search_name = Count of Unique Values per Field in Specified Index and Sourcetype
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
sub_category = Custom
tags = Access,Indexes
solution = <p>By counting distinct values per field, this query helps users understand <b>data cardinality</b> and identify fields with unusually high or low variation, which can indicate data quality issues or interesting patterns.</p><p><b>Suggested Actions</b><br><b>1.</b> Analyze fields with high distinct counts for potential normalization issues.<br><b>2.</b> Investigate fields with unexpectedly low counts for missing data.<br><b>3.</b> Use cardinality insights to optimize search performance and indexing.<br><b>4.</b> Document field distributions for data governance purposes.<br><b>5.</b> Compare results over time to detect data drift or ingestion changes.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=<<index>> sourcetype=sourcetype <br />- This line is specifying the data source, i.e., the index and sourcetype from where the data is to be fetched.</ul><ul><b>02</b> | stats dc() as * <br />- This line is calculating the distinct count (dc) of all fields (*) in the data.</ul><ul><b>03</b> | transpose <br />- This line is transposing the results, i.e., converting rows into columns and vice versa. This makes it easier to view and analyze the distinct count of each field.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to get a quick overview of the unique values in each field of the data. It can help in understanding the data distribution and identifying any anomalies or patterns.</div></div>
quid = C465642639ED49B0B598BAF640F3E06B
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-all-fields-for-an-index" target="_blank">https://gosplunk.com/list-all-fields-for-an-index</a></p><br><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/fieldsummary" target="_blank">Splunk Help: fieldsummary command</a><br>Official Splunk documentation for this topic.</p>
description = <p>This query is <b>counting</b> the distinct occurrences of all fields in the specified index and sourcetype, and then <b>transposing</b> the results. This is <b>valuable</b> as it provides a quick overview of data distribution and helps in <b>identifying</b> potential anomalies or patterns within your data.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| stats dc() as *\
	| transpose

[list_all_hosts_associated_with_all_indexes]
search_name = List of Unique Hosts by Index
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexes
solution = <p>This search provides visibility into <b>host-to-index relationships</b>, helping administrators verify data sources and troubleshoot ingestion issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Verify all expected hosts are contributing data to their designated indexes.<br><b>2.</b> Investigate hosts missing from expected indexes for ingestion issues.<br><b>3.</b> Identify unexpected hosts contributing data for security or compliance review.<br><b>4.</b> Use results to document data source mappings for operational documentation.<br><b>5.</b> Set up monitoring for host count changes to detect data ingestion anomalies.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| tstats summariesonly=t values(host)</code><br>       - Retrieves a statistical summary of unique host values.<br><b>02</b> <code>where index="<<index>>"</code><br>       - Filters results to include events from the specified index.<br><b>03</b> <code>by index</code><br>       - Groups the output by index, offering clarity about which hosts contribute data to each index.<br>
explanation = <p>This search utilizes the <b>tstats</b> command to fetch unique host data efficiently via statistical summaries. By specifying <code>index</code>, this search filters data to relevant indices of interest. Grouping by <code>index</code> ensures visibility into data segregation among indices. This search provides operational insight for troubleshooting host-specific issues or verifying data completeness from key sources.</p>
quid = 305D0412F3943418B84A81066E2C22D8
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-hosts-associated-indexes" target="_blank">https://gosplunk.com/list-hosts-associated-indexes</a></p>
description = <p>This query retrieves all unique <b>host</b> values from a specified <b>index</b>. It helps Splunk users identify which hosts are contributing data to each index. This can be valuable for uncovering missing or unexpected data sources and ensuring proper data ingestion.</p>
search = | tstats summariesonly=t values(host) where index="<<index>>" by index

[list_all_splunk_users_associated_roles_1]
search_name = List of User Roles in Authentication Services
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Users
solution = <p>This query provides an effective auditing tool for user permissions in Splunk. By identifying roles assigned to each user, it enhances the visibility of access control and facilitates role management.</p><p><b>Suggested Actions</b><br><b>1.</b> Review all user-to-role mappings to ensure accuracy.<br><b>2.</b> Identify and address any users with incorrect or unnecessary roles.<br><b>3.</b> Periodically run this search to maintain up-to-date awareness of role assignments.<br><b>4.</b> Compare results against access policies to ensure compliance with company standards.<br><b>5.</b> Use output to communicate potential risks to the broader IT/Infosec teams, if applicable.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/authentication/users</code><br>       - Makes a RESTful API call to collect user and roles data.<br><b>02</b> <code>| stats values(roles) as Roles by user</code><br>       - Aggregates roles for each user and creates a table of user-to-role mappings.<br>
explanation = <p>This query uses the <b>| rest</b> command to call the <b>/services/authentication/users</b> endpoint, which fetches data about all users in the Splunk system. The <b>| stats</b> function is then used to aggregate this data by listing all unique roles associated with each user in the field 'Roles'. This helps Splunk admins validate role assignments, pinpoint potential issues, and maintain appropriate access controls by auditing user permissions.</p>
quid = A9B0C1D2E3F4A5B6C7D8E9F0A1B2C3D4
search_author = GoSplunk: john117
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-all-splunk-users-associated-roles" target="_blank">https://gosplunk.com/list-all-splunk-users-associated-roles</a></p>
description = <p>This query retrieves the roles assigned to each user in the Splunk system. By capturing user roles, this search provides insight into user permissions and role assignments, helping administrators ensure <b>security</b> and <b>compliance</b> within the Splunk environment.</p>
search = | rest /services/authentication/users\
	| stats values(roles) as Roles by user

