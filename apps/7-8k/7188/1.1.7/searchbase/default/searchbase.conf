solution = <p>Provides a detailed inventory of active unique scheduled searches and classifies them into categories, enabling administrators to assess and optimize the scheduled search environment.</p><p><b>Suggested Actions</b><br><b>1.</b> Examine categories with high search counts and runtime.<br><b>2.</b> Prune or consolidate unnecessary and duplicate searches to reduce system load.<br><b>3.</b> Collaborate with stakeholders to adjust search schedules for optimized performance.<br><b>4.</b> Monitor the impact of scheduled search removal on data insights.<br><b>5.</b> Regularly revisit and refresh search inventory to align with business needs.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
