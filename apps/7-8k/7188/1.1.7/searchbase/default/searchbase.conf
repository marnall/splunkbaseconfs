solution = <p>This query shows a map of geographic locations based on the IP address where an AWS long-term access key was used, providing critical insights into potential <b>abnormal access patterns</b>.</p><p><b>Suggested Actions</b><br><b>1.</b> Review geographic anomalies for unauthorized access.<br><b>2.</b> Consider cross-referencing with known locations.<br><b>3.</b> Use findings to update access policies.<br><b>4.</b> Set up alerts for geographic inconsistencies.<br><b>5.</b> Regularly update the threat model based on insights.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products.html" target="_blank">Products: Splunk Products (overview)</a><br>Splunk Products (overview).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" userIdentity.type=IAMUser userIdentity.accessKeyId=AKIAxxxxxxxxxxx</code><br>       - Searches for IAM user events with a specific access key ID.<br><b>02</b> <code>| stats count by sourceIPAddress</code><br>       - Counts events grouped by source IP address.<br><b>03</b> <code>| iplocation sourceIPAddress</code><br>       - Enriches results with geographic location data based on IP.<br><b>04</b> <code>| geostats latfield=lat longfield=lon count by City</code><br>       - Visualizes data on a map aggregated by city location.<br>
explanation = <p>The <b>iplocation</b> command enriches the data by adding geographic information (such as latitude, longitude, and city) based on the sourceIPAddress. The <b>geostats</b> command then aggregates and visualizes this geographic data, allowing you to see event counts distributed by city, leveraging the latitude and longitude fields extracted by iplocation. This <b>enables security teams</b> to determine if AWS access keys are used from unexpected locations, potentially indicating key misuse or other <b>security concerns</b>.</p>
quid = 48E99F408558248F315B1521C6923A1D
search_author = Ryan Fetterman & Sydney Marrone
updated_author = khutchinson
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>This search provides a <b>visualization</b> of the geographic distribution of AWS access key usage based on source IPs, helping to <b>identify anomalies</b>. It is <b>valuable</b> for threat detection by showcasing unusual geographical patterns tied to AWS long-term access keys in use.</p>
search = index="<<index>>" userIdentity.type=IAMUser userIdentity.accessKeyId=AKIAxxxxxxxxxxx \
	| stats count by sourceIPAddress \
	| iplocation sourceIPAddress \
	| geostats latfield=lat longfield=lon count by City

[max_real_time_searches_internal]
search_name = Max Real Time Searches Internal
version = 2.x
date_created = 2025-05-18
category = Splunk
sub_category = _internal
tags = Realtime search
solution = <p>This query <b>helps</b> identify spikes in real-time search usage that may cause performance issues or resource contention.</p><p><b>Suggested Actions</b><br><b>1.</b> Increase search concurrency limits if peaks are sustainable and expected.<br><b>2.</b> Tune dashboards or alerts that over-utilize real-time searches.<br><b>3.</b> Notify users to optimize or consolidate real-time use cases.<br><b>4.</b> Validate if real-time searches are business-critical.<br><b>5.</b> Enable search head pooling if saturation is regular.</p><p><b>Recommended Alerts</b><br><b>1.</b> Normal: max <= 3 concurrent<br><b>2.</b> Low: 4–6 concurrent<br><b>3.</b> Medium: 7–10 concurrent<br><b>4.</b> High: 11–15 concurrent<br><b>5.</b> Critical: > 15 concurrent</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="_internal" source=*metrics.log group=search_concurrency "system total" NOT user=*</code><br> - Filters internal metrics logs for total search concurrency data excluding anonymous/system users.<br><b>02</b> <code>| timechart max(active_realtime_searches) AS "Max Real-Time Searches"</code><br> - Builds a time-based chart of peak concurrent real-time search executions.<br>
explanation = <p>This query targets Splunk’s <b>internal metrics</b> log to measure search concurrency, specifically focusing on real-time search load. It filters for “system total” concurrency excluding system-level users, and uses a timechart to visualize the highest concurrent real-time searches across the timeframe. This functionality is <b>useful</b> for identifying system strain or tuning concurrency settings in Splunk deployments. For example, the timechart command is utilized to create a temporal visualization of peak loads, enabling informed decision-making regarding concurrency settings.</p>
quid = 8C8C396B64C866B814AA4BE23BD494F1
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/troubleshoot-your-deployment">Monitoring Splunk Performance</a><br>Best practices for interpreting internal metrics logs.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/workload-management/workload-management-overview">Search Concurrency Limits</a><br>Documentation on tuning concurrency configurations.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Track-realtime-search-activity/m-p/398997">Track Real-Time Search Activity</a><br>User discussion on logging real-time search loads.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/configuration/limits.conf">limits.conf reference</a><br>Defines concurrency-related configuration parameters.</li><li><a href="https://lantern.splunk.com/Splunk_Platform/Performance/Understanding_search_concurrency">Understanding Search Concurrency</a><br>Lantern article explaining search concurrency basics.</li><li><a href="https://community.splunk.com/t5/Getting-Data-In/Visualizing-search-load-over-time/m-p/501789">Visualizing Search Load Over Time</a><br>Tips for building historical concurrency dashboards.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/troubleshoot-splunk-search-performance.html">Troubleshooting Search Performance</a><br>General optimization tips including concurrency analysis.</li></ul>
description = <p>Summarizes <b>Max Real Time Searches Internal</b> using <code>index="_internal" source=*metrics.log group=search_concurrency "system total" NOT user=*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="_internal" source=*metrics.log group=search_concurrency "system total" NOT user=* \
	| timechart max(active_realtime_searches) AS "Max Real-Time Searches"

[measure_delay_between_timestamps_example]
search_name = Internal Log Processing Delay Analysis by Host
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,SFU
solution = <p>By running this query, Splunk administrators and engineers can understand <b>indexing performance</b> across hosts.</p> \
	<p>With insights into the delay between indexing and event timestamps, potential bottlenecks or performance issues can be pinpointed <b>quickly</b> and addressed. This enhances the <b>availability</b> and <b>searchability</b> of logs.</p> \
	<p><b>Suggested Actions</b><br><b>1.</b> Monitor for consistently high maximum delays across hosts and investigate indexing processes.<br><b>2.</b> Identify top hosts with high average delays for targeted performance analysis.<br><b>3.</b> Review Splunk's underlying infrastructure to ensure it meets indexing demands.<br><b>4.</b> Benchmark these metrics during normal operation to indicate acceptable thresholds.<br><b>5.</b> Automate alerts for unusually high delay spikes to proactively mitigate issues.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
env_run = 2
execution_plan = <b>01</b> <code>index=_internal source=*splunkd.log*</code><br>       - Specifies the data source, focusing on Splunk's internal logs.<br> \
	<b>02</b> <code>| eval delay_sec=_indextime-_time</code><br>       - Calculates the delay in seconds between the index time (_indextime) and the event time (_time).<br> \
	<b>03</b> <code>| timechart min(delay_sec) avg(delay_sec) max(delay_sec) by host</code><br>       - Generates a timechart illustrating the minimum, average, and maximum delay for each host.<br>
explanation = <p>This query can be used to monitor the <b>indexing latency</b> in a Splunk environment. High indexing latency can indicate <b>performance issues</b> with the indexing process, which could lead to <b>delays in data availability</b> for searching.</p> \
	<p>By monitoring the indexing latency, administrators can identify and address these issues <b>proactively</b>. The query evaluates delay by subtracting the event time (_time) from the index time (_indextime) and visualizes key delay metrics—minimum, average, and maximum—for each host over time.</p>
quid = BE4BC1E47DD3958497CE7CC99A5476FB
search_author = grdhg24
updated_author = khutchinson
description = <p>This query is analyzing the <b>delay</b> in seconds between the <b>index time</b> and the <b>event time</b> in the internal Splunk logs.</p> \
	<p>It then creates a timechart showing the minimum, average, and maximum delay in seconds for each host.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_internal source=*splunkd.log*\
	| eval delay_sec=_indextime-_time\
	| timechart min(delay_sec) avg(delay_sec) max(delay_sec) by host

[median_duration_of_a_session_within_an_iis_web_environment]
search_name = Median Session Duration In Iis Logs
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,GoSplunk
solution = <p>This search provides insight into <b>typical user session durations</b>, helping optimize web application performance and user experience.</p><p><b>Suggested Actions</b><br><b>1.</b> Compare median session duration against business expectations.<br><b>2.</b> Investigate unexpectedly short sessions for potential issues.<br><b>3.</b> Monitor trends over time to detect changes in user behavior.<br><b>4.</b> Use insights to optimize session timeout configurations.<br><b>5.</b> Correlate with other metrics for comprehensive user experience analysis.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=iis</code><br>       - This line specifies the data source, filtering logs by the 'iis' sourcetype.<br><b>02</b> <code>| stats range(_time) as duration by JSESSIONID</code><br>       - Calculates the duration of each session by finding the time range for each unique 'JSESSIONID'.<br><b>03</b> <code>| stats median(duration) as AVD</code><br>       - Finds the median session duration to summarize typical user behavior.<br><b>04</b> <code>| fieldformat AVD=tostring(AVD,duration)</code><br>       - Formats the 'AVD' field as a string in a readable 'duration' format.<br><b>05</b> <code>| eval AVD=round(AVD, 0)</code><br>       - Rounds the median session duration to the nearest whole number for simplicity in reporting.<br>
explanation = <p>This query is used to <b>understand</b> the typical duration of sessions in an application. This metric is <b>valuable</b> for identifying <b>issues</b> with session management, optimizing resource allocation, or understanding user behavior. The calculation of the <b>median</b> session duration helps in identifying typical user activity without being skewed by outliers. The usage of commands like <code>stats range</code>, <code>stats median</code>, and <code>fieldformat</code> provide <b>clarity</b> and <b>precision</b> in analysis.</p>
quid = 62F726D0CEDEC584934284FA2AEC6E0E
search_author = GoSplunk: Go Splunk
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/median-duration-of-a-session-within-an-iis-web-environment" target="_blank">https://gosplunk.com/median-duration-of-a-session-within-an-iis-web-environment</a></p>
description = <p>This query <b>calculates</b> the median duration of sessions identified by 'JSESSIONID' from the IIS logs in the specified index. The session duration is then <b>formatted</b> as a string and <b>rounded</b> to the nearest whole number, providing a <b>concise</b> metric of user session times.</p>
search = index="<<index>>" sourcetype="iis"\
	| stats range(_time) as duration by JSESSIONID\
	| stats median(duration) as AVD\
	| fieldformat AVD=tostring(AVD,"duration")\
	| eval AVD=round(AVD, 0)

[memory_usage_per_splunk_process_class]
search_name = Median Resource Usage by Process Class Over Time
search_hidden = 0
category = Splunk
sub_category = Search
tags = GoSplunk,ITOps
solution = <p>This search provides visibility into <b>process-level resource consumption</b>, enabling administrators to optimize Splunk performance and resource allocation.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify process classes consuming excessive resources.<br><b>2.</b> Optimize or scale resource-intensive processes.<br><b>3.</b> Monitor trends over time to detect resource consumption changes.<br><b>4.</b> Use insights for capacity planning and infrastructure sizing.<br><b>5.</b> Set up alerts for unusual resource usage patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The query starts by searching the _introspection index for events with the sourcetype 'splunk_resource_usage' and the component 'PerProcess'. This index contains internal metrics about the Splunk system.</ul><ul><b>02</b> It then creates several new fields using the eval function. These fields include 'process', 'args', 'sid', 'elapsed', 'mem_used', 'mem', 'pct_memory', 'app', 'type', 'mode', 'user', 'role', and 'process_class'. These fields are extracted from the 'data' field in the original events.</ul><ul><b>03</b> The 'process_class' field is then redefined several times using the case function. This field is used to categorize the processes into different classes based on their names and arguments.</ul><ul><b>04</b> If the 'process_class' field is still null after all the case statements, it is set to 'other' using the if function.</ul><ul><b>05</b> The query then groups the events by 'data.pid' and '_time', and calculates the latest 'data.mem_used' and 'process_class' for each group. This removes any duplicate events for the same process at the same time.</ul><ul><b>06</b> The events are then grouped by '_time' and 'process_class', and the sum of 'resource_usage_dedup' is calculated for each group. This gives the total resource usage for each process class at each time.</ul><ul><b>07</b> Finally, the query uses the timechart function to plot the median resource usage for each process class over time. The minspan parameter is set to 10 seconds, which means that the time axis is divided into 10-second intervals.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor the resource usage of different processes in a Splunk environment. It can help identify processes that are consuming excessive resources and may need to be optimized or scaled.</div></div>
quid = 07D4D37CBE6ABDF7DE87065DB6B9BD66
search_author = GoSplunk: Azeemering
related_info = <p><a href="https://gosplunk.com/memory-usage-mb-per-splunk-process-class" target="_blank">https://gosplunk.com/memory-usage-mb-per-splunk-process-class</a></p>
description = <p>Summarizes <b>Median Resource Usage by Process Class Over Time</b> using <code>index=_introspection sourcetype=splunk_resource_usage component=PerProcess</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index=_introspection sourcetype=splunk_resource_usage component=PerProcess \
	| eval process = 'data.process'\
	| eval args = 'data.args'\
	| eval sid = 'data.search_props.sid'\
	| eval elapsed = 'data.elapsed'\
	| eval mem_used = 'data.mem_used'\
	| eval mem = 'data.mem'\
	| eval pct_memory = 'data.pct_memory'\
	| eval app = 'data.search_props.app'\
	| eval type = 'data.search_props.type'\
	| eval mode = 'data.search_props.mode'\
	| eval user = 'data.search_props.user'\
	| eval role = 'data.search_props.role'\
	| eval process_class = case ( process=="splunk-optimize","index service", process=="sh" OR process=="ksh" OR process=="bash" OR like(process,"python%") OR process=="powershell","scripted input", process=="mongod", "KVStore")\
	| eval process_class = case ( process=="splunkd" AND (like(args,"-p %start%") OR like(args,"service")),"splunkd server", process=="splunkd" AND isnotnull(sid),"search", process=="splunkd" AND (like(args,"fsck%") OR like(args,"recover-metadata%") OR like(args,"cluster_thing")),"index service", process=="splunkd" AND args=="instrument-resource-usage", "scripted input", (like(process,"python%") AND like(args,"%/appserver/mrsparkle/root.py%")) OR like(process,"splunkweb"),"Splunk Web", isnotnull(process_class), process_class)\
	| eval process_class = if(isnull(process_class),"other",process_class)\
	| stats latest(data.mem_used) AS resource_usage_dedup latest(process_class) AS process_class by data.pid, _time\
	| stats sum(resource_usage_dedup) AS resource_usage by _time, process_class\
	| timechart minspan=10s median(resource_usage) AS "Resource Usage" by process_class

[merging_by_common_field_to_correlate_events_across_sources]
search_name = Merging by Common Field to Correlate Events Across Sources
version = 1.0.2
date_created = 2025-05-05 11:45:08
date_updated = 2025-7-2 14:54:5
category = Threat Hunter's Cookbook
sub_category = Grouping
tags = Fields,Join
solution = <p>This query provides a critical method for identifying and investigating potentially suspicious user activities, specifically rapid access to sensitive files after login. This can support deeper analysis, incident response efforts, and security investigations.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate user behaviors flagged in the results for unauthorized activity.<br><b>2.</b> Review access logs to ensure compliance with security policies.<br><b>3.</b> Correlate flagged events with other datasets (e.g., email activity, endpoint logs) for deeper context.<br><b>4.</b> Enhance user monitoring policies or implement more granular access controls as required.<br><b>5.</b> Use findings from this analysis to improve threat detection rules or educate the Security Operations team on emerging patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=login | table user, _time, src_ip | rename _time as login_time</code><br>       - Retrieves login events and extracts user, time, and source IP.<br><b>02</b> <code>| join user [ search index="<<index>>" sourcetype=file_access sensitive_file="*" | table user, _time, file_path | rename _time as access_time ]</code><br>       - Joins login data with file access events on the user field.<br><b>03</b> <code>| eval time_diff = access_time - login_time</code><br>       - Calculates the time difference between login and file access.<br><b>04</b> <code>| where time_diff >= 0 AND time_diff <= 600</code><br>       - Filters for file access within 10 minutes of login.<br><b>05</b> <code>| table user, src_ip, login_time, access_time, file_path</code><br>       - Displays the correlated events in a table format.<br>
explanation = <p>This search focuses on combining datasets using Splunk's <b>join</b> command. The main dataset includes login activities, while the subsearch comprises file access logs. By using a user identifier as the joining key, the query ensures that only users who appear in both datasets are analyzed. The <b>eval</b> command calculates the time difference between login and file access, while the <b>where</b> clause filters for cases where access occurred within 10 minutes (600 seconds).</p><p>Key commands and their benefits:</p><ul><li><b>join:</b> Combines the datasets, ensuring accurate, correlated results.</li><li><b>eval:</b> Calculates time differences, crucial for identifying suspicious activities.</li><li><b>where:</b> Filters results to retain events meeting specific conditions, enhancing relevance.</li></ul><p>By mastering these commands, analysts can identify tightly correlated activities across disparate data sources, enabling advanced threat hunting and anomaly detection.</p>
quid = DF92A49F1DE06653E1B95CD33FD2AD0F
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Merging by Common Field to Correlate Events Across Sources</b> using <code>index="<<index>>" sourcetype=login</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=login \
	| table user, _time, src_ip \
	| rename _time as login_time \
	| join user [ \
	search index="<<index>>" sourcetype=file_access sensitive_file="*" \
	| table user, _time, file_path \
	| rename _time as access_time ] \
	| eval time_diff = access_time - login_time \
	| where time_diff >= 0 AND time_diff <= 600 \
	| table user, src_ip, login_time, access_time, file_path

[metadata_host_activity_rangemap]
search_name = Metadata Host Activity Rangemap
version = 2.x
date_created = 2025-05-19
category = Splunk
sub_category = _internal
tags = Rangemap
solution = <p>This search provides a snapshot of host activity within the last 10 minutes, categorizing the number of active hosts into defined ranges. This helps in quickly assessing the current load and identifying any unusual activity patterns.</p><p><b>Suggested Actions</b><br><b>01</b> Investigate hosts with unusually low activity to ensure they are functioning correctly.<br><b>02</b> Analyze trends over time to identify patterns in host activity.<br><b>03</b> Set up alerts for sudden drops or spikes in host activity.<br><b>04</b> Correlate with other metrics to assess overall system health.<br><b>05</b> Document and review changes in host behavior for future reference.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| metadata type=hosts index="<<index>>"</code><br>     - Retrieves metadata about hosts from the specified index.<br><b>02</b> <code>| eval diff=now()-recentTime</code><br>     - Calculates the time difference between now and the last event time for each host.<br><b>03</b> <code>| where diff < 600</code><br>     - Filters for hosts with activity in the last 10 minutes.<br><b>04</b> <code>| convert ctime(*Time)</code><br>     - Converts time fields to a human-readable format.<br><b>05</b> <code>| stats count</code><br>     - Counts the number of active hosts.<br><b>06</b> <code>| rangemap field=count low=800-2000 elevated=100-799 high=50-99 server=0-49</code><br>     - Categorizes the count into defined ranges for analysis.
explanation = <p>This search utilizes the <code>metadata</code> command to retrieve information about hosts from a specified index. By calculating the difference between the current time and the <code>recentTime</code> field, it filters for hosts that have been active within the last 10 minutes. The <code>convert</code> command formats time fields for readability. The <code>stats</code> command counts the number of active hosts, and <code>rangemap</code> categorizes the count into predefined ranges: low, elevated, high, and server.</p><p>For engineers, this provides a <b>quick overview</b> of host activity, helping identify potential issues or anomalies in host behavior. For junior engineers or enthusiasts, it demonstrates the use of metadata for monitoring and how to apply conditional logic to <b>categorize data effectively</b>.</p>
quid = 1A99F2290D5F734A8F5801E71E877106
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/metadata" target="_blank">metadata - Splunk Documentation</a><br>Official documentation for the metadata command, detailing its usage and options.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-do-you-use-the-rangemap-and-metadata-commands-in-Splunk/m-p/305415" target="_blank">How do you use the rangemap and metadata commands in Splunk?</a><br>Community discussion on effectively using rangemap and metadata commands.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Splunk-Hosts-metadata-correlation-with-index/m-p/129848" target="_blank">Splunk Hosts metadata correlation with index</a><br>Insights on correlating host metadata with specific indexes.</li></ul>
description = <p><b>Monitors</b> active hosts within the last 10 minutes using metadata and <b>categorizes</b> them based on event count.</p>
search = | metadata type=hosts index="<<index>>" \
	| eval diff=now()-recentTime \
	| where diff < 600 \
	| convert ctime(*Time) \
	| stats count \
	| rangemap field=count low=800-2000 elevated=100-799 high=50-99 server=0-49

