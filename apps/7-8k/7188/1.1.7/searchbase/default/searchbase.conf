solution = <p>This search provides administrators with an on-demand manifest of apps that are available for users to interact with in the Splunk UI.</p><p><b>Suggested Actions</b><br><b>1.</b> Cross-reference with user roles to verify appropriate access.<br><b>2.</b> Identify and document unused visible apps.<br><b>3.</b> Periodically review for app sprawl or shadow deployments.<br><b>4.</b> Validate visibility during app install or upgrade workflows.<br><b>5.</b> Use as input for app inventory compliance reports.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h@h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| rest splunk_server=local /servicesNS/-/-/apps/local</code><br>       - Query the REST API to get metadata for all local apps.<br><b>02</b> <code>| search visible = 1</code><br>       - Filter out apps that are not visible in the UI.<br>
explanation = <p>This search executes a <code>rest</code> command against the <code>/servicesNS/-/-/apps/local</code> endpoint to retrieve metadata about apps installed on the local Splunk instance. The <code>search visible=1</code> clause filters out hidden apps, so the final result set includes only those apps that appear in the Splunk UI. This is valuable for <b>admin audits</b>, <b>troubleshooting app visibility</b>, and <b>inventory validation</b>.</p><p>For junior users, the search highlights how to use the <code>rest</code> command to extract internal configuration data and apply filtering logic post-query. This SPL is lean, readable, and ideal for embedding in dashboards or automated app audit jobs.</p>
quid = 2E5648E26D99C9B99FB99E2FDA8E067C
search_author = vskoryk
description = <p>This search returns a <b>list of installed Splunk apps</b> that are currently <b>visible</b> in the user interface. It uses the REST API to extract metadata about each local app, offering a fast, UI-independent method to audit app availability.</p>
