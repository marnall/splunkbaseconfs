search = index=_audit action=search info=completed search_id!=*rsa_scheduler_* search_id!=*subsearch* is_realtime=0 | stats latest(total_run_time) as total_run_time, latest(scan_count) as scan_count, latest(event_count) as event_count, latest(result_count) as result_count, latest(search) as search by search_id | search search!="" | fillnull value=0 | stats count as success_count, sum(total_run_time) as total_run_time, min(total_run_time) as min_run_time, avg(total_run_time) as avg_run_time, p90(total_run_time) as p90_run_time, max(total_run_time) as max_run_time, avg(scan_count) as avg_scan_count, avg(event_count) as avg_event_count, avg(result_count) as avg_result_count by search | eval "Total Runtime"=round(total_run_time,2) | eval "Minimum Runtime"=round(min_run_time,2) | eval "Average Runtime"=round(avg_run_time,2) | eval "p90 Runtime"=round(p90_run_time,2) | eval "Maximum Runtime"=round(max_run_time, 2) | eval "Average Scan Count"=round(avg_scan_count,2) | eval "Average Event Count"=round(avg_event_count,2) | eval "Average Result Count"=round(avg_result_count,2) | rename success_count as "Success Count" | table search "Total Runtime" "Minimum Runtime" "Average Runtime" "p90 Runtime" "Maximum Runtime" "Average Scan Count" "Average Event Count" "Average Result Count" "Success Count" | sort -"Total Runtime" | eval 

