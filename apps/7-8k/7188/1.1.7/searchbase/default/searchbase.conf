dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=access_combined uri=/wp-admin/admin-ajax.php?_fs_blog_admin=*</code><br>       - Filter logs to isolate WordPress admin activity.<br><b>02</b> <code>| iplocation clientip</code><br>       - Resolve geographical details for each client IP.<br><b>03</b> <code>| stats sparkline latest(_time) as Latest_Date count(status) as count values(status) by uri, Country, Region, City, clientip</code><br>       - Calculate statistics and group data by URI, geographical details, and client IP.<br><b>04</b> <code>| convert ctime(Latest_Date)</code><br>       - Convert the latest access timestamp into a human-readable format.<br><b>05</b> <code>| sort - count</code><br>       - Sort results descending by the most frequent access counts.<br>
explanation = <p>This query focuses on monitoring WordPress admin access logs to provide insights into access trends and behavior. By leveraging functions like <code>iplocation</code>, the search pinpoints the geographical details of users accessing the admin area. The <code>stats</code> command organizes the data efficiently by URI, country, IP, and more, making it easy to spot anomalies, such as concentrated access from unexpected locations. Converting epoch time to a human-readable format ensures admins can quickly interpret the latest access timestamps, and sorting by count highlights the most-accessed entries for priority analysis.</p>
quid = 356DDDC4D337496A0F11AC65C8B6C927
