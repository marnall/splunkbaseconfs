solution = <p>This search provides operational visibility into the utilization of critical Splunk queues (parsing, aggregation, typing, indexing). It ensures proactive management of potential queue bottlenecks and data flow consistency, optimizing system performance.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor for sustained high fill percentages that may indicate saturation problems.<br><b>2.</b> Allocate additional resources or adjust configurations to alleviate bottlenecks.<br><b>3.</b> Correlate queue performance metrics with ingestion throughput and indexing delays.<br><b>4.</b> Use timechart insights to forecast potential future performance limitations.<br><b>5.</b> Regularly review logs for anomalies or trends in queue behaviors.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index="_internal" source="*/metrics.log*" (group=queue)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Retrieves metrics log data for queue-related groups from the _internal index.<br><b>02</b> <code>search (name=parsingqueue OR name=aggqueue OR name=typingqueue OR name=indexqueue)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters for specific queue names: parsingqueue, aggqueue, typingqueue, and indexqueue.<br><b>03</b> <code>eval name=case(...)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Assigns descriptive labels for queue names to improve readability.<br><b>04</b> <code>eval max=if(isnotnull(max_size_kb),max_size_kb,max_size)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Determines the maximum queue size by considering available fields.<br><b>05</b> <code>eval curr=if(isnotnull(current_size_kb),current_size_kb,current_size)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Determines the current queue size.<br><b>06</b> <code>eval fill_perc=round((curr/max)*100,2)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculates the fill percentage of the queue based on current and max sizes.<br><b>07</b> <code>timechart span=1m p90(fill_perc) by name useother=false limit=15</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Visualizes the 90th percentile of queue fill percentages for each queue over 1-minute intervals.<br>
explanation = <p>This search provides performance insights on internal Splunk queues responsible for indexing and data flow. By leveraging metrics from the _internal index, it evaluates utilization percentages for various queues such as parsing, aggregation, typing, and indexing, assessing trends and thresholds that affect data ingestion.</p><p>The search employs critical SPL functions such as <b>eval</b> for deriving fields like `fill_perc`, <b>case</b> for label mapping, and <b>timechart</b> for time-based visualization of percentile data. By focusing on current queue states, administrators gain valuable insights into queue saturation, operational delays, and performance bottlenecks.</p><p>Understanding this data aids Splunk administrators in ensuring efficient data pipeline performance, preventing data loss, and optimizing resource allocation. For junior Splunkers, this search showcases best practices in performance monitoring using Splunk's internal metrics.</p>
quid = 010C493E592C97FC1D308FA123FF0CFD
search_author = Splunk Works
description = <p>Summarizes <b>Indexing Pipeline Queue Fill Percentage</b> using <code>index="_internal" source="*/metrics.log*" (group=queue) | search (name=parsingqueue OR name=aggqueue OR name=typingqueue</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index="_internal" source="*/metrics.log*" (group=queue) | search (name=parsingqueue OR name=aggqueue OR name=typingqueue OR name=indexqueue) | eval name=case(name=="aggqueue","2 - Aggregation Queue",name=="indexqueue","4 - Indexing Queue",name=="parsingqueue","1 - Parsing Queue",name=="typingqueue","3 - Typing Queue") | eval max=if(isnotnull(max_size_kb),max_size_kb,max_size) | eval curr=if(isnotnull(current_size_kb),current_size_kb,current_size) | eval fill_perc=round((curr/max)*100,2) | timechart span=1m p90(fill_perc) by name useother=false limit=15

