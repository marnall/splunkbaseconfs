execution_plan = <b>01</b> <code>index="_internal" source="*/metrics.log*" (group=per_sourcetype_thruput OR group=queue)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Begin by searching in the internal index for relevant metrics logs.<br><b>02</b> <code>eval series=if(isnull(series),"",series)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Ensure series field is non-null for accurate processing.<br><b>03</b> <code>eval name=if(isnull(name),"",name)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Ensure name field is non-null for clarity.<br><b>04</b> <code>stats latest(ingest_pipe) as ingest_pipe, latest(kb) as kb, latest(ev) as ev by group, series</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate the latest ingest pipe metrics.<br><b>05</b> <code>search group="per_sourcetype_thruput"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filter results to include only sourcetype throughput data.<br><b>06</b> <code>eval ingest_pipe = if(isnotnull(ingest_pipe), ingest_pipe, "none")</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Categorize undefined ingest_pipe values as "none".<br><b>07</b> <code>search ingest_pipe=*</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Ensure only records with defined ingest pipes are analyzed.<br><b>08</b> <code>fillnull value=NULL</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Fill null values to prepare for evaluation.<br><b>09</b> <code>eval gb=kb/1024/1024</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Convert kilobytes to gigabytes for analysis.<br><b>10</b> <code>stats sum(gb) AS gb, sum(ev) AS events by series</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Summarize GBs and event counts by sourcetype.<br><b>11</b> <code>eventstats sum(gb) as total_gb</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Calculate the total GB across all sourcetypes.<br><b>12</b> <code>eval gb_pct=round((gb/total_gb)*100,2)."%"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Determine percentage contribution by GB.<br><b>13</b> <code>sort -gb_pct</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Order results by descending percentage.<br><b>14</b> <code>fields - total_gb</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Remove the total_gb field from the final display.</code><br><br>
explanation = <p>This search delivers comprehensive sourcetype analysis by calculating both data volume in GB and event counts for each sourcetype, then computing each sourcetype's percentage contribution to total ingestion volume. This percentage-based view enables data-driven decisions about which sourcetypes to optimize, as a small number of sourcetypes often account for the majority of ingestion volume (the 80/20 rule). By identifying sourcetypes consuming disproportionate license capacity relative to their business value, administrators can prioritize filtering, sampling, or collection optimization efforts to maximize the efficiency of license utilization and storage resources.</p>
