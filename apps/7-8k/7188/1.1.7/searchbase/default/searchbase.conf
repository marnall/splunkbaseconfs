dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=<<index>> source=*access.log user!=- */app/* (host=your_sh_host) <br />- This line specifies the data source, focusing on access logs where the <b>user</b> is not null and the path contains '/app/'. It filters logs from a specific host.</ul><ul><b>02</b> | rex field=referer /en-US/app/(?<app>[^/]+)/(?<dashboard>[^?/s]+) <br />- This line utilizes a regular expression to extract the <b>application</b> and <b>dashboard</b> names from the 'referer' field.</ul><ul><b>03</b> | top 10 dashboard <br />- This line returns the top 10 most frequently occurring dashboards.</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to identify the most frequently accessed <b>dashboards</b> in your Splunk environment. This insight is valuable for understanding <b>user behavior</b>, identifying <b>popular dashboards</b>, and optimizing resource allocation.</div></div>
quid = A7BF1EFD7463C2AD5BD63EEA07BC6C94
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/top-10-accessed-dashboards" target="_blank">https://gosplunk.com/top-10-accessed-dashboards</a></p>
description = <p>Summarizes <b>Top 10 Dashboards Accessed in App from Access Logs</b> using <code>index="<<index>>" source=*access.log user!="-" */app/*</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" source=*access.log user!="-" */app/* \
	| rex field=referer "/en-US/app/(?<app>[^/]+)/(?<dashboard>[^?/\s]+)"\
	| top 10 dashboard

