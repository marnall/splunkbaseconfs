[identifying_high_volume_activity_from_top_talkers_to_external_hosts]
search_name = Identifying High-Volume Activity from Top Talkers to External Hosts
version = 1.0.3
date_created = 2025-05-05 11:21:39
date_updated = 2025-7-2 14:44:41
category = Threat Hunter's Cookbook
sub_category = Sorting and Stacking
tags = Anomaly Detection,High-Volume Activity
solution = <p>This search identifies external hosts that are receiving a disproportionately high amount of data from top internal talkers. Such activity might indicate potential data exfiltration or anomalous behavior that warrants further investigation. By surfacing these high-volume interactions, security teams can pinpoint possible threats and prioritize action.</p><p><b>Suggested Actions</b><br><b>1.</b> Immediately investigate top external destinations for legitimacy.<br><b>2.</b> Verify internal source systems against baseline behavior.<br><b>3.</b> Cross-check source and destination IPs against threat intelligence databases.<br><b>4.</b> Apply temporary network blocks to suspect destinations (if applicable).<br><b>5.</b> Implement monitoring and alerting for unusual byte patterns in similar traffic.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="<<index>>" src=192.168.225.* NOT (dest=192.168.* OR dest=10.* OR dest=8.8.4.4 OR dest=8.8.8.8 OR dest=224.*)</code><br>       - Filter traffic from internal subnet 192.168.225.* excluding internal and known-safe destinations.<br><b>02</b> <code>| stats sum(bytes_in) as total_bytes_in sum(bytes_out) as total_bytes_out by src dest</code><br>       - Calculate total bytes transferred in and out, grouped by source and destination IPs.<br><b>03</b> <code>| table src dest total_bytes_in total_bytes_out</code><br>       - Display the relevant fields in tabular format.<br><b>04</b> <code>| sort – total_bytes_out</code><br>       - Sort results by outgoing bytes in descending order to prioritize high-volume destinations.<br>
explanation = <p>This search identifies top talkers from an internal subnet (192.168.225.*) to external hosts, excluding common internal and known-safe destination ranges (192.168.*, 10.*, 8.8.4.4, 8.8.8.8, 224.*). The exclusion ensures the focus remains on potentially suspicious activity outside the organization's range.</p><p>The <b>| stats</b> command calculates the total bytes exchanged (<b>sum(bytes_in)</b> and <b>sum(bytes_out)</b>), grouped by source and destination IPs (<b>by src dest</b>). This aggregation enables quick assessment of the volume of activity directed towards external entities.</p><p>Narrowing the results further, <b>| table</b> restricts output to the most relevant fields (<b>src, dest, total_bytes_in, total_bytes_out</b>), and <b>| sort</b> ensures we see destinations with the highest outgoing data volumes at the top. The result is a clear prioritization of hosts needing immediate scrutiny.</p>
quid = 079F6BED21F5658C345DE398D5143F39
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Identifying High-Volume Activity from Top Talkers to External Hosts</b> using <code>index="<<index>>" src=192.168.225.* NOT (dest=192.168.* OR dest=10.* OR dest=8.8.4.4 OR dest=8.8.8.8 OR dest=224.*)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" src=192.168.225.* NOT (dest=192.168.* OR dest=10.* OR dest=8.8.4.4 OR dest=8.8.8.8 OR dest=224.*) \
| stats sum(bytes_in) as total_bytes_in sum(bytes_out) as total_bytes_out by src dest \
| table src dest total_bytes_in total_bytes_out \
| sort – total_bytes_out

[identifying_high_volumes_of_transactions]
search_name = Identifying High Volumes of Transactions
version = 2.x
date_created = 2025-10-24
date_updated = 2025-10-24
category = Industry
sub_category = Financial Services
tags = Detail,Fraud,Transactions,Volume
solution = <p>This SPL surfaces accounts with abnormally high hourly transaction volumes in Financial Services, supporting monitoring and fraud detection. <b>Suggested Actions</b></p><p>1. Investigate accounts with persistent high-frequency transactions.<br>2. Correlate with other financial activity and risk indicators.<br>3. Integrate with AML and fraud detection systems.<br>4. Automate alerts for operational outliers.<br>5. Adjust thresholds for evolving Financial Services industry patterns.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index="*" sourcetype="*"</code><br>      - Selects transaction data for Financial Services analysis.<br><b>02</b> <code>| bin _time span=1h</code><br>      - Buckets events into hourly intervals.<br><b>03</b> <code>| stats count AS txn_count_hour, sum(amount) AS total_amount_hour BY account_number, _time</code><br>      - Calculates hourly transaction counts and sums per account.<br><b>04</b> <code>| stats sum(txn_count_hour) AS total_txn_count, avg(txn_count_hour) AS avg_txn_count_per_hour, stdev(txn_count_hour) AS stdev_txn_count_per_hour BY account_number</code><br>      - Aggregates stats across all hours for each account.<br><b>05</b> <code>| where total_txn_count > 10 AND avg_txn_count_per_hour > 5</code><br>      - Filters for high-activity accounts.<br><b>06</b> <code>| table account_number, total_txn_count, avg_txn_count_per_hour, stdev_txn_count_per_hour</code><br>      - Displays core metrics for Financial Services review.
explanation = <p>This SPL bins transactions into hourly buckets, calculates the count and sum per account and hour, and then aggregates these metrics to measure overall activity and variability. In the Financial Services sector, this type of temporal aggregation is critical for <b>fraud detection</b>, <b>operational monitoring</b>, and <b>anti-money laundering (AML)</b> compliance. By filtering for accounts with consistently high transaction rates, Financial Services teams can quickly identify and investigate abnormal or high-risk patterns. Junior analysts learn how to use <b>bin</b> for time bucketing, <b>stats</b> for grouped analytics, and <b>where</b> for threshold filtering in financial data workflows.</p>
quid = FF88C80085FD9895753207D6B1893C6E
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/bin" target="_blank">Splunk Docs: bin command</a><br>How to group events by time in Splunk.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/stats" target="_blank">Splunk Docs: stats command</a><br>Aggregating and summarizing financial transaction data.</li><li><a href="https://community.splunk.com/t5/Security/ct-p/Security" target="_blank">Splunk Community: Security</a><br>Financial Services use cases for transaction monitoring and AML.</li><li><a href="https://lantern.splunk.com/Security/Use_Cases/Fraud/Detecting_fraud_in_financial_transactions" target="_blank">Lantern: Detecting fraud in financial transactions</a><br>Practical guidance for financial transaction anomaly detection.</li></ul>
description = <p>Analyzes <b>hourly transaction volumes</b> per account in the Financial Services industry to highlight accounts with <b>high frequency activity</b>. This search supports the identification of <b>potential risk</b>, unusual financial patterns, or operational outliers in banking and Financial Services environments.</p>
search = index="*" sourcetype="*"\
	| bin _time span=1h\
	| stats count AS txn_count_hour, sum(amount) AS total_amount_hour BY account_number, _time\
	| stats sum(txn_count_hour) AS total_txn_count, avg(txn_count_hour) AS avg_txn_count_per_hour, stdev(txn_count_hour) AS stdev_txn_count_per_hour BY account_number\
	| where total_txn_count > 10 AND avg_txn_count_per_hour > 5\
	| table account_number, total_txn_count, avg_txn_count_per_hour, stdev_txn_count_per_hour

[identifying_hosts_missing_reports_in_the_last_24_hours]
search_name = Identifying Hosts Missing Reports in the Last 24 Hours
version = 1.0.2
date_created = 2025-05-05 12:43:30
date_updated = 2025-7-2 15:7:33
category = Splunk
sub_category = _internal
tags = Data Source Exploration,Missing
solution = <p>Operational insight gained from this query includes identifying hosts that have stopped reporting, which may signal issues like system failures, network connectivity problems, or intentional host removal. Understanding these reporting gaps helps IT teams proactively address host-level issues.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate the identified hosts to confirm if reporting issues are legitimate.<br><b>2.</b> Assess network or configuration issues preventing selected hosts from reporting.<br><b>3.</b> Validate whether missing reports are expected due to host decommissioning.<br><b>4.</b> Correlate results with other data sources to establish the root cause.<br><b>5.</b> Escalate unresolved issues to the appropriate teams or document lessons learned for continuous monitoring improvements.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| metadata type=hosts</code><br>       - Retrieve metadata about all hosts in the Splunk environment.<br><b>02</b> <code>| eval "Last Seen" = now() - recentTime</code><br>       - Calculate the time elapsed since each host was last seen.<br><b>03</b> <code>| where "Last Seen" > "86400"</code><br>       - Filter to hosts that haven't reported in the last 24 hours (86400 seconds).<br><b>04</b> <code>| rename totalCount as count firstTime as "First Event" lastTime as "Last Event" recentTime as "Last Update"</code><br>       - Rename fields for clarity.<br><b>05</b> <code>| fieldformat</code><br>       - Format timestamps for readability.<br><b>06</b> <code>| eval "Minutes Behind" = round('Last Seen'/60, 2)</code><br>       - Calculate minutes since last report.<br><b>07</b> <code>| eval "Hours Behind" = round('Last Seen'/3600, 2)</code><br>       - Calculate hours since last report.<br><b>08</b> <code>| table host, "First Event", "Last Event", "Last Update", "Hours Behind", "Minutes Behind"</code><br>       - Display results in a formatted table.<br><b>09</b> <code>| sort -"Minutes Behind"</code><br>       - Sort by longest time since last report.<br>
explanation = <p>This search helps in identifying hosts that might be experiencing issues or are inactive for troubleshooting or further investigation. The <b>| metadata</b> command is used to gather critical metadata about Splunk hosts, including the first time and last time a host was observed, as well as the total event count. The search evaluates the time since each host was last updated using the <b>eval</b> function.</p><p>The <b>| where</b> command applies a filter to verify if a host has not reported in the last 24 hours by comparing the calculated "Last Seen" value against a threshold of 86,400 seconds (1 day). The search reformats key timestamps using <b>fieldformat</b> to make them more human-readable and calculates metrics like "Minutes Behind" and "Hours Behind" to understand reporting gaps in granular terms. Finally, the results are organized in an easy-to-read table, sorted by the longest time since the last update, allowing users to prioritize actions based on severity.</p>
quid = 70F276D519CFDA1BB0827A85270DF2EB
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Identifying Hosts Missing Reports in the Last 24 Hours</b> using <code>| metadata type=hosts</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | metadata type=hosts \
	| eval "Last Seen" = now() - recentTime \
	| where "Last Seen" > “86400” \
	| rename totalCount as count firstTime as "First Event" lastTime as "Last Event" recentTime as "Last Update" \
	| fieldformat "First Event" = strftime('First Event', "%c") \
	| fieldformat "Last Event" = strftime('Last Event', "%c") \
	| fieldformat "Last Update" = strftime('Last Update', "%c") \
	| eval "Minutes Behind" = round('Last Seen'/60, 2) \
	| eval "Hours Behind" = round('Last Seen'/3600, 2) \
	| table host, "First Event", "Last Event", "Last Update", "Hours Behind", "Minutes Behind" \
	| sort -"Minutes Behind"

[identifying_hosts_not_sending_data_for_more_than_6_hours]
search_name = Identify Inactive Data Sources in Last 6 Hours
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| tstats summariesonly=t latest(_time) as latest where index!="*_" by host index sourcetype</code><br>       - Utilizes the <b>tstats</b> command to retrieve the latest data update times from fields grouped by host, index, and sourcetype, explicitly excluding any indexes prefixed with an underscore.<br><b>02</b> <code>| eval recent = if(latest > relative_time(now(),"-360m"),"1","0"), LastReceiptTime = strftime(latest,"%c")</code><br>       - Defines a new field 'recent' with "1" for sources updated in the last 6 hours; converts timestamps to a human-readable format for display.<br><b>03</b> <code>| where recent=0</code><br>       - Filters to show only data sources that have not been updated in the last 6 hours by retaining those marked as 'recent=0'.<br><b>04</b> <code>| sort LastReceiptTime</code><br>       - Orders the results by their last receipt time for easier review.<br><b>05</b> <code>| eval age=now()-latest</code><br>       - Computes the <b>age</b> of data in seconds from the current time.<br><b>06</b> <code>| eval age=round((age/60/60),1)</code><br>       - Converts age to hours and rounds to one decimal place.<br><b>07</b> <code>| eval age=age."hour"</code><br>       - Appends the unit "hour" for clarity in the age field.<br><b>08</b> <code>| fields - recent latest</code><br>       - Excludes the intermediate 'recent' and 'latest' fields from the final output to make results cleaner.<br>
explanation = <p>The purpose of this query is to <b>identify data sources</b> that have not sent data for the last 6 hours, which could be an indication of issues or malfunctions in those sources. It enables users to proactively monitor and address problems, ensuring <b>data reliability</b> and system health. The <code>tstats</code> command efficiently retrieves the latest data timestamps, filtering out non-production indexes using <code>where index!="*_".</code> The <code>eval</code> function processes and converts these timestamps into a user-friendly, actionable format by calculating data age in hours and appending "hour" for readability.</p><p>The query primarily focuses on surfacing sources with irregular or stalled data updates. While the sorted results help users easily identify the most delayed sources, the final output simplifies visibility by removing unnecessary intermediary fields.</p>
quid = AB0699D11980E7E0C89106C10C4390B8
search_author = GoSplunk: vr2312
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/identifying-hosts-not-sending-data-for-more-than-6-hours" target="_blank">https://gosplunk.com/identifying-hosts-not-sending-data-for-more-than-6-hours</a></p>
description = <p>Summarizes <b>Identify Inactive Data Sources in Last 6 Hours</b> using <code>| tstats summariesonly=t latest(_time) as latest where index!="*_" by host index sourcetype</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
solution = <p>This query detects data sources that haven't sent updates within the last 6 hours, enabling better monitoring and faster resolutions for affected sources. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
search = | tstats summariesonly=t latest(_time) as latest where index!="*_" by host index sourcetype\
	| eval recent = if(latest > relative_time(now(),"-360m"),"1","0"), LastReceiptTime = strftime(latest,"%c")\
	| where recent=0\
	| sort LastReceiptTime\
	| eval age=now()-latest\
	| eval age=round((age/60/60),1)\
	| eval age=age."hour"\
	| fields - recent latest

