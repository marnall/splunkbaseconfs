tags = Access,SFU
solution = <p>This query allows detection of potential security risks such as rapid assignment and removal of sensitive user rights, which may indicate misuse or unauthorized changes.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor for recurring trends of specific rights being granted and removed frequently.<br><b>2.</b> Verify that rights changes align with internal policy or authorized change requests.<br><b>3.</b> Investigate user accounts or systems with unusually short times between rights assignment and removal.<br><b>4.</b> Set alerts around critical rights (e.g., admin privileges) to identify misuse or anomalies in real-time.<br><b>5.</b> Use findings to update security policies or improve audit mechanisms to prevent unauthorized actions.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=608 OR EventCode=609)\</code><br>       - Filters Windows Security logs for relevant EventCodes (608: rights assigned, 609: rights removed).<br><b>02</b> <code>| rex "User\sRight\sAssigned..."</code><br>       - Extracts details about rights assignment and removal events.<br><b>03</b> <code>| eval Rights=coalesce(RightGranted,RightRemoved)</code><br>       - Combines mutually exclusive fields to capture the rights being changed.<br><b>04</b> <code>| transaction Rights user startswith="Assigned" endswith="Removed"</code><br>       - Groups related events into a transaction per user right to measure time elapsed between actions.<br><b>05</b> <code>| eval duration = duration/60...</code><br>       - Converts duration into minutes and formats relevant fields for easier interpretation and further analysis.<br>
explanation = <p>This search monitors EventCodes 608 and 609 from Windows Security logs, which record the assignment and removal of user rights respectively. It parses event messages to extract the rights assigned or removed, evaluates the timing of these activities, and calculates the <b>minutes between these actions</b> to help identify trends or suspicious behavior. This insight can be valuable for security admins in analyzing authorization changes and ensuring they align with policy.</p>
quid = E317DBFBBE8D6D7A39978E5EBB825CF8
search_author = grdhg24
updated_author = khutchinson
description = <p>This search identifies and calculates the <b>duration</b> between when specific user rights are assigned and subsequently removed in the Windows security log. It helps track <b>rights assignment and removal patterns</b> that may indicate <b>anomalous activity</b>.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=608 OR EventCode=609)\
```| rex "Message=User\sRight\sAssigned:\s+User\sRight:\s+(?\w+)" ```\
```| rex "Message=User\sRight\sRemoved:\s+User\sRight:\s+(?\w+)" ```\
| eval Rights=coalesce(RightGranted,RightRemoved)\
| eval status=case (EventCode=608, "New Rights Granted by:", EventCode=609, "Rights Removed by:")\
| transaction Rights user startswith="Assigned" endswith="Removed"\
| where duration > 0\
| eval duration = duration/60\
| eval n=round(duration,2)\
| eval Date=strftime(_time, "%Y/%m/%d")\
| table Date, host, status, User, user, Rights, n\
| rename User as "Source Account"\
| rename user as "Target Account"\
| rename n as "Minutes between Rights Granted Then Removed"\
| sort - date

[time_lag]
search_name = Average, Minimum, and Maximum Lag Time by Index, Host, and Sourcetype
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Search
tags = Access,SFU
solution = <p>The insights from this query can help Splunk admin teams troubleshoot indexing delays effectively and prioritize resolving slow ingestion pipelines or infrastructure bottlenecks. Identifying high-latency sourcetype or host patterns allows focused attention on system configurations causing delays.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Review the hosts/sourcetypes with the highest lag and validate Splunk Forwarder configurations.<br> \
<b>2.</b> Check the system performance of indexers handling the affected data to identify resource contention.<br> \
<b>3.</b> Validate timestamp extractions and assess if time zone mismatches are causing improper lag calculations.<br> \
<b>4.</b> Optimize ingestion pipelines by reviewing data throughput policies and limits.<br> \
<b>5.</b> Use these metrics to establish data SLAs and monitor trends for long-term visibility over indexing health.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Identifies the dataset and categories within Splunk where the data is being analyzed.<br> \
	<b>02</b> <code>| eval time=_time</code><br>       - Creates a new field (<b>time</b>) representing the event timestamp.<br> \
	<b>03</b> <code>| eval itime=_indextime</code><br>       - Creates a new field (<b>itime</b>) reflecting the index timestamp.<br> \
	<b>04</b> <code>| eval lag=(itime - time)/60</code><br>       - Calculates lag in minutes as the difference between index time and event time, rounded to minute granularity.<br> \
	<b>05</b> <code>| stats avg(lag), min(lag), max(lag) by index host sourcetype</code><br>       - Aggregates lag metrics (average, minimum, maximum) and groups them by Splunk dimensions: index, host, and sourcetype for a detailed view of latency patterns.<br>
explanation = <p>This search helps monitor and troubleshoot indexing delays in Splunk by measuring the difference between event time and index time. The calculated lag metrics indicate if event ingestion is happening promptly or is experiencing delays, which could impact <b>real-time operational efficiency</b> or <b>alert generation</b>.</p> \
	<p>The search constructs fields dynamically through <code>eval</code> commands to separate event times and indexing times, then calculates the lag as a derived field. Using <code>stats</code>, the search aggregates this lag, presenting averages, minimums, and maximums to give a quantitative view of the delays for each index, host, and sourcetype combination. These metrics are particularly relevant for Splunk administrators managing large data pipelines or attempting to comply with <b>SLA performance expectations</b>.</p>
quid = 9515F3800B100FDC39ECCF439D34596B
search_author = Splunk
updated_author = khutchinson
related_info = <p><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/troubleshoot-your-deployment" target="_blank">https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/troubleshoot-your-deployment</a></p>
description = <p>Summarizes <b>Average, Minimum, and Maximum Lag Time by Index, Host, and Sourcetype</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>"\
	| eval time=_time\
	| eval itime=_indextime\
	| eval lag=(itime - time)/60\
	| stats avg(lag), min(lag), max(lag) by index host sourcetype

[time_offset_on_splunk_servers]
search_name = Server Info: Time Offset and Last Update Time
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This query provides valuable insight into Splunk server synchronization and update tracking. By regularly monitoring the offset and last update times, administrators can maintain a robust and up-to-date environment.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate servers with significant offset values to evaluate clock synchronization issues.<br><b>2.</b> Verify that all servers are configured to update regularly, reducing the risk of outdated information.<br><b>3.</b> Use this query as a routine check in Splunk environments to preempt configuration drift.<br><b>4.</b> Compare offset values with network time synchronization logs for root cause analysis.<br><b>5.</b> Escalate any server showing persistent discrepancies for deeper inspection, as it may indicate broader infrastructure issues.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <b>01</b> <code>| rest /services/server/info</code><br>       - Pulls detailed information about Splunk servers from the REST API<br><b>02</b> <code>| eval updated_t=round(strptime(updated, "%Y-%m-%dT%H:%M:%S%z"), 2)</code><br>       - Converts the 'updated' field from a string to a rounded timestamp<br><b>03</b> <code>| eval delta=now()-updated_t</code><br>       - Calculates the time difference between now and the last update<br><b>04</b> <code>| table serverName, updated, delta</code><br>       - Displays key fields like server name, update time, and time offset<br><b>05</b> <code>| convert ctime(updated_t)</code><br>       - Formats the updated timestamp into human-readable format<br><b>06</b> <code>| rename updated as "Local Time on Server on Request" delta as "Offset - Time in Seconds"</code><br>       - Renames fields for better readability<br>
explanation = <p>This query is valuable for monitoring server updates, especially in extensive Splunk environments. By pulling details from the <code>rest /services/server/info</code> endpoint, it tracks server time accuracy and update intervals. The <code>eval</code> commands transform raw timestamp information into meaningful insights, such as identifying servers with excessive time discrepancies. This can help administrators mitigate issues like <b>outdated software</b> or potential <b>sync vulnerabilities</b>.</p>
quid = 3D8CC5D84547FC325744A480798F46A0
search_author = GoSplunk: john117
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/time-offset-splunk-servers" target="_blank">https://gosplunk.com/time-offset-splunk-servers</a></p>
description = <p>This search retrieves server information and calculates the <b>time difference</b> between the current time and the last update time. It then presents this data in an intuitive <b>table format</b>, providing key details like server name, last update timestamp, and the offset in seconds.</p>
search = | rest /services/server/info\
	| eval updated_t=round(strptime(updated, "%Y-%m-%dT%H:%M:%S%z"), 2)\
	| eval delta=now()-updated_t\
	| table serverName, updated, delta\
	| convert ctime(updated_t)\
	| rename updated as "Local Time on Server on Request" delta as "Offset - Time in Seconds"

