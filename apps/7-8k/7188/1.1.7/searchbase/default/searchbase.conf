description = <p>Summarizes <b>Splunkd Logging By Component</b> using <code>index="_internal" sourcetype="splunkd" | stats count as counts by _time, host, log_level, event_message, component</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
