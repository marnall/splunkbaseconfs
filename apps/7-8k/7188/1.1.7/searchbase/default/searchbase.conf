sub_category = Access
tags = Access,GoSplunk
solution = <p>By running this query, security teams gain insight into the active lifespans of user accounts, revealing potentially risky activity trends. For example, accounts that appear and disappear rapidly ('Critical' category) may indicate fraudulent or unauthorized activity. Similarly, unusually short activity durations can signal compliance gaps or bad practices, such as untracked provisioning/deprovisioning.</p><p><b>Suggested Actions</b><br><b>1.</b> Immediately investigate accounts flagged as 'Critical'.<br><b>2.</b> Validate whether 'Warning'-flagged accounts align with expected user lifecycle processes.<br><b>3.</b> Work with HR/IT to ensure proper account provisioning and deprovisioning protocols are followed.<br><b>4.</b> Audit and refine automation or policies governing account deactivation events.<br><b>5.</b> Continue monitoring the account activity data for recurring discrepancies or emerging trends.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=630 OR EventCode=624)</code><br>       - The query starts by searching for events in the specified index and source 'WinEventLog:Security'.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Converts the event timestamp to a readable format ('Year/Month/Day').<br><b>03</b> <code>| transaction Target_Account_Name startswith="EventCode=624" endswith="EventCode=630"</code><br>       - Groups events by 'Target_Account_Name' into one logical transaction, starting with account creation (EventCode=624) and ending with account deletion (EventCode=630).<br><b>04</b> <code>| eval duration=round(((duration/60)/60)/24, 2)</code><br>       - Calculates the time (in days) between creation and deletion of the user account, rounded to two decimal places.<br><b>05</b> <code>| eval Age=case (duration<=1, "Critical", duration>1 AND duration<=7, "Warning", duration>7, "Normal")</code><br>       - Categorizes accounts' active duration into three severity levels: Critical (≤1 day), Warning (1–7 days), Normal (>7 days).<br><b>06</b> <code>| table Date, index, host, Caller_User_Name, Target_Account_Name, duration, Age</code><br>       - Displays relevant fields in a clear tabular format.<br><b>07</b> <code>| rename duration as "Days Account was Active"</code><br>       - Renames the 'duration' field for better clarity.<br><b>08</b> <code>| sort - Date</code><br>       - Sorts the results by date in descending order.
explanation = <p>This query provides visibility into user account activity in a Windows environment by analyzing EventCodes 630 (account deletion) and 624 (account creation) from the Windows Security log. These events are grouped into logical transactions per account name to measure how long an account remains active. By converting timestamps into human-readable formats and categorizing account activity duration into 'Critical', 'Warning', or 'Normal', the query surfaces potentially unusual patterns, such as accounts that are active for very short durations—which might indicate suspicious or misconfigured activities. Security engineers can leverage these insights to investigate anomalies and proactively address security risks.</p>
quid = 9AD5903A73DC5C5776856045F947F88D
description = <p>Summarizes <b>Windows Security Log: User Account Active Duration Analysis</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=630 OR EventCode=624)</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security (EventCode=630 OR EventCode=624)\
| eval Date=strftime(_time, "%Y/%m/%d")\
| transaction Target_Account_Name startswith="EventCode=624" endswith="EventCode=630"\
| eval duration=round(((duration/60)/60)/24, 2)\
| eval Age=case (duration<=1, "Critical", duration>1 AND duration<=7, "Warning", duration>7, "Normal")\
| table Date, index, host, Caller_User_Name, Target_Account_Name, duration, Age\
| rename duration as "Days Account was Active"\
| sort - Date

