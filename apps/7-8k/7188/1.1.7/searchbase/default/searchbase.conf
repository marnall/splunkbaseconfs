tags = Runtime,Scheduled,Statistics
solution = <p>The search provides visibility into the resource consumption of scheduled searches, enabling the optimization of system performance and the balancing of search execution across the environment. Constructively, this data identifies searches requiring tuning for better efficiency and concurrency.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate the top resource-consuming searches to assess the complexity of their SPL.<br><b>2.</b> Optimize scheduling intervals to distribute load and reduce peak concurrency.<br><b>3.</b> Establish baseline metrics for resource usage to track improvements.<br><b>4.</b> Provide insights to platform administrators for better resource planning.<br><b>5.</b> Incorporate the findings into system tuning reports, identifying outliers for deeper analysis.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index=_internal status=success</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Query the _internal index to retrieve successful execution logs.<br><b>02</b> <code>| stats count, sum(run_time) as total_run_time by savedsearch_name app</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregate count of search executions and their total runtime, grouping by `savedsearch_name` and `app` fields.<br><b>03</b> <code>| sort total_run_time desc</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Sort results by total runtime in descending order to highlight the searches that consume the most resources.<br><b>04</b> <code>| foreach "*" [ eval <<FIELD>>=if(isnum('<<FIELD>>'), round('<<FIELD>>',2), '<<FIELD>>') ]</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Normalize numeric fields for readable output by rounding to two decimal places.</p>
explanation = <p>This search is a diagnostic tool for managing scheduled search performance in Splunk. By leveraging the internal _internal logs, it identifies how frequently each saved search is executed and the total runtime required for those searches. Aggregating these metrics allows administrators to pinpoint searches that consume excessive resources, contributing to heightened concurrency and performance strain.</p><p>Sorting by **total runtime** lets administrators prioritize their optimization work, targeting the searches with the largest resource consumption footprint. For junior engineers, this process demonstrates the utility of combining **Splunks internal metadata** with **stats**, **sort**, and **eval commands** to derive actionable insights. Furthermore, it introduces the concept of performance monitoring and the critical balancing of system resources for effective Splunk operations.</p>
