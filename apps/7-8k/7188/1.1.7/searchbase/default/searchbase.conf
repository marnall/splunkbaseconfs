[unintended_windows_shutdowns]
search_name = System Unexpected Shutdown Events Sorted by Date
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,GoSplunk
solution = <p>Monitoring and analyzing unexpected shutdown events provides immense value by granting insight into system stability and potential operational vulnerabilities. This search caters to proactive issue identification across Windows environments.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate the listed hosts to identify root causes of shutdowns.<br><b>2.</b> Correlate shutdown events with other system logs to determine potential triggers or patterns.<br><b>3.</b> Assess infrastructure readiness for redundancy or resilience improvements to minimize future downtime.<br><b>4.</b> Compile identified shutdown patterns into a report for system health reviews or compliance audits.<br><b>5.</b> Implement automated monitoring or alerting based on this query to ensure timely awareness of unplanned system events.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:System EventCode=6008</code><br>       - Isolate relevant Windows system logs where EventCode 6008 indicates improper shutdowns.<br><b>02</b> <code>| eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Convert raw timestamp into a clear, user-friendly YYYY/MM/DD date format.<br><b>03</b> <code>| table Date host, index, Message</code><br>       - Display results in a tabular format including key details such as date, host, and message.<br><b>04</b> <code>| sort - Date</code><br>       - Sort events in descending date order to make the most recent records easier to focus on.<br>
explanation = <p>This query focuses on identifying occurrences of unexpected system shutdowns on Windows machines. The event code 6008 is specifically triggered when a system does not shut down cleanly. By retrieving and sorting these events, this search helps uncover trends or patterns in unplanned downtime. The commands used in this search ensure that the results are formatted and presented in a way that makes review and investigation straightforward:</p><ul><li><b>index="&lt;&lt;index&gt;&gt;" sourcetype=*WinEventLog source=*WinEventLog:System EventCode=6008</b>: This narrows search results to include relevant Windows system logs with EventCode 6008, isolating unexpected shutdowns.</li><li><b>| eval Date=strftime(_time, "%Y/%m/%d")</b>: Converts the raw timestamp (_time) into a human-readable date format (YYYY/MM/DD), making it easier to comprehend and identify patterns.</li><li><b>| table Date host, index, Message</b>: Organizes the output into a table, ensuring that each event’s key details—date, host, index, and message—are clearly visible.</li><li><b>| sort - Date</b>: Arranges records in reverse chronological order to prioritize the most recent shutdown events for immediate review.</li></ul><p>This provides value for system administrators needing to diagnose or correlate unexpected shutdown instances across distributed Windows infrastructure.</p>
quid = 6FC7D70AECF4FF74FC10F0FB87359E36
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/unintended-windows-shutdowns" target="_blank">https://gosplunk.com/unintended-windows-shutdowns</a></p>
description = <p>Summarizes <b>System Unexpected Shutdown Events Sorted by Date</b> using <code>index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:System EventCode=6008</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:System EventCode=6008\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| table Date host, index, Message\
	| sort - Date

