search_name = Geographical Distribution of Unique Client IPs by Country
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,SFU
solution = <p>This query provides operational insights by mapping the global distribution of user traffic. Such visualizations enhance understanding of access patterns, facilitating decisions on resource allocation, security measures, and user engagement strategies.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the map for unusual traffic spikes in specific countries and investigate their origins.<br><b>2.</b> Use this data to focus security measures in regions with anomalous access patterns.<br><b>3.</b> Identify high-traffic regions to prioritize for targeted marketing or localized content delivery.<br><b>4.</b> Compare results over time to track geographical trends in user engagement.<br><b>5.</b> Cross-check the findings with other security and business intelligence data for comprehensive analysis.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=*access*</code><br>       - Specifies the data source, pulling logs from the designated index and filtering for sourcetypes containing 'access'.<br><b>02</b> <code>| iplocation clientip</code><br>       - Adds geolocation information (e.g., country) to each event by mapping client IP addresses.<br><b>03</b> <code>| stats dc(clientip) by Country</code><br>       - Calculates distinct counts of client IPs per country, summarizing unique visitor data.<br><b>04</b> <code>| geom geo_countries featureIdField=Country</code><br>       - Maps the unique visitor counts onto a geographical map, visualizing country-based access patterns.<br>
explanation = <p>This search uses multiple Splunk commands to uncover the geographical distribution of unique visitors accessing a service. The <b>iplocation</b> command maps client IPs to their respective countries, enabling geo-based analysis. Then, the <b>stats</b> command calculates the distinct count of client IPs grouped by country, which reflects the unique visitors per country. Finally, the <b>geom</b> command overlays this data onto a visual map, using the 'Country' field to match data to map regions. This visualization helps track geographic access patterns and can highlight unusual spikes in access from specific regions, potentially indicating security concerns or opportunities for market expansion.</p>
quid = D9B426D1ED012994A76EB29793346114
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Geographical Distribution of Unique Client IPs by Country</b> using <code>index="<<index>>" sourcetype="*access*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index="<<index>>" sourcetype="*access*"\
	| iplocation clientip\
	| stats dc(clientip) by Country\
	| geom geo_countries featureIdField="Country"

