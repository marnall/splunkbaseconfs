solution = <p>This search provides visibility into <b>deployment client handshake activity</b>, helping administrators monitor forwarder communication health.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts with unusually high or low handshake counts.<br><b>2.</b> Identify hosts with no handshakes for potential connectivity issues.<br><b>3.</b> Compare handshake patterns over time to detect anomalies.<br><b>4.</b> Use results to troubleshoot deployment client configuration problems.<br><b>5.</b> Set up alerts for hosts that stop performing handshakes.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=_internal' - This is specifying the index from which the data is being pulled. The '_internal' index contains internal logs and metrics for Splunk itself.</ul><ul><b>02</b> sourcetype=splunkd' - This is filtering the data to only include events where the sourcetype is 'splunkd', which are Splunk daemon logs.</ul><ul><b>03</b> component=DC*' - This is further filtering the data to only include events where the component starts with 'DC'.</ul><ul><b>04</b> Handshake' - This is searching for events that contain the word 'Handshake'.</ul><ul><b>05</b> | stats count by host' - This is grouping the events by 'host' and counting the number of events for each host.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor the number of handshakes happening in the system. It can help identify if there are any hosts with unusually high or low number of handshakes, which could indicate potential issues with network connectivity or system performance.</div></div>
quid = 1858B0A3E9F5166DBE7F1A2A10B2A7A7
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/list-of-forwarders-that-are-deployment-clients" target="_blank">https://gosplunk.com/list-of-forwarders-that-are-deployment-clients</a></p>
description = <p>This query is <b>counting</b> the number of handshakes by host from the <b>internal Splunk logs</b> where the component starts with 'DC'. This is <b>valuable</b> for monitoring network connectivity issues or potential system performance problems, as it highlights hosts with unusual handshake counts.</p>
search = index=_internal sourcetype=splunkd component=DC* Handshake\
	| stats count by host

