solution = <p>Complex logic can be built using combinations of field-value pairs and boolean logic. For example:</p><p><br></p><ol><li data-list="bullet"><span class="ql-ui"></span>Filter out trusted DNS sources: <code>NOT query IN (wpad*, isatap*, *.windows.com, *live.com)</code></li><li data-list="bullet"><span class="ql-ui"></span>Detect potential exfiltration: <code>dest_domain != "trustedcompany.com" AND bytes_out > 1000000 AND response_time >= 5000 AND url_category != "internal" AND status_code = 200 AND bytes_in <= 50000 AND http_method == "POST"</code></li></ol><p>...(content truncated for brevity). To see all content download <a rel="noopener noreferrer" href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html">The Threat Hunter's Cookbook</a></p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p><b>Operators can be combined to create complex logic</b>, including the ability to use parentheses to group how logic is evaluated. For example: <code>index="<<index>>" (sourcetype=firewall OR sourcetype=proxy) AND (action=blocked OR action=denied)</code> ensures that filtering and logical grouping happen as intended. <b>!=</b> implies the field exists but does not equal the given value, while <b>NOT</b> will match events where the field is absent or different. Use <a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/search-syntax-fundamentals" target="_blank"><u>logical operators</u></a> and <a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/search-syntax-fundamentals" target="_blank"><u>relational operators</u></a> to control evaluation and filtering logic.</p>
quid = 68F2BA34AA697F89116DE1C96ACE7479
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://docs.google.com/document/d/1sfg1vbj5iDTBc8Bs2ZTdmso13YtUi_9L3bsRHM2XKDM/edit?disco=AAABi1fLRL4" target="_blank">Supporting Cookbook Documentation</a></li><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Filtering Logic to Detect Suspicious Conditions</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - Search the target data and apply the base filters needed for this use case.<br>
search = index="<<index>>" sourcetype="<<sourcetype>>" \
	dest_domain != "trustedcompany.com" AND \
	bytes_out > 1000000 AND \
	response_time >= 5000 AND \
	url_category != "internal" AND \
	status_code = 200 AND \
	bytes_in <= 50000 AND \
	http_method == "POST"

