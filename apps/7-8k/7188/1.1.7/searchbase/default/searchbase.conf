execution_plan = <b>01</b> <code>index=_internal sourcetype=splunkd</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters data from Splunk's internal log index and splunkd sourcetype to focus on search heads' operation-related logs.<br><b>02</b> <code>| stats count(log_level) as counts by log_level, host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates log count per severity (log_level) by each Splunk search head (host).<br><b>03</b> <code>| chart sum(counts) as counts by log_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Consolidates total counts of each log level across all search heads using a chart.<br><b>04</b> <code>| transpose header_field=log_level</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Formats the data to have log severity as columns.<br><b>05</b> <code>| eval column="" | rename column as "Log Type"</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Sets column name for displaying log types.<br><b>06</b> <code>| table "Log Type",DEBUG,INFO,NOTICE,WARN,ERROR,CRIT,ALERT,FATAL,EMERG</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Finalizes table format with appropriate rearranged headers for easy visualization.<br>
