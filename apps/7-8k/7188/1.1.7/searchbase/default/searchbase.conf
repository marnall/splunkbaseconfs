execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'index=<<index>> sourcetype=dns (message_type=RESPONSE OR message_type=TXT)' part is specifying the data source, which is a specific index, and the type of data we're interested in, which is DNS data. It's also filtering the data to only include DNS response or TXT messages.</ul><ul><b>02</b> The '| rex field=query (?<subdomain>.*?)..*' part is using a regular expression to extract the subdomain from the query field.</ul><ul><b>03</b> The '| regex subdomain=^(([A-Za-z0-9+/]{4})+)$|^([A-Za-z0-9+/]{4})+(([A-Za-z0-9+/]{2}[AEIMQUYcgkosw048]=)|([A-Za-z0-9+/][AQgw]==)).*$' part is filtering the data to only include subdomains that match a specific regular expression.</ul><ul><b>04</b> The '| stats count by subdomain' part is counting the number of occurrences for each subdomain.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content"><p>This query effectively analyzes DNS traffic to help identify potential <b>security threats</b>. The regular expression filters subdomains that follow a particular pattern, which could suggest <b>malicious activity</b>. Counting occurrences aids in spotting frequently queried subdomains, potentially signaling a <b>targeted attack</b> or a <b>misconfigured system</b>.</p></div></div>
quid = ADBDC53558C538D92A1619A4A05D7EA4
search_author = GoSplunk: Azeemering
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/dns-search-for-encoded-data" target="_blank">https://gosplunk.com/dns-search-for-encoded-data</a></p>
description = <p>This query searches for DNS response or TXT messages within a specified index, extracts subdomains from the query field, and evaluates them against a specific regular expression. It ultimately counts occurrences for each subdomain to identify potential <b>security vulnerabilities</b>.</p>
solution = <p>This query searches for DNS response or TXT messages within a specified index, extracts subdomains from the query field, and evaluates them against a specific regular expression. The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
search = index="<<index>>" sourcetype="dns" (message_type=RESPONSE OR message_type=TXT)\
	| rex field=query "(?<subdomain>.*?)\\..*"\
	| regex subdomain="^(([A-Za-z0-9+/]{4})+)$|^([A-Za-z0-9+/]{4})+(([A-Za-z0-9+/]{2}[AEIMQUYcgkosw048]=)|([A-Za-z0-9+/][AQgw]==)).*$"\
	| stats count by subdomain

[error_percentage_by_country_over_time]
search_name = Error Percentage By Country Over Time
version = 2.x
date_created = 2025-05-18
category = Web Server
sub_category = Monitoring
tags = Timechart
solution = <p>This search identifies regions with the highest share of server-side HTTP errors. Prioritizing these locations can improve reliability and user experience.</p><p><b>Suggested Actions</b><br><b>01</b> Review infrastructure serving high-error regions for issues.<br><b>02</b> Check for recent deployments or changes affecting those geographies.<br><b>03</b> Correlate spikes with application logs.<br><b>04</b> Set up enhanced monitoring for top error-producing countries.<br><b>05</b> Alert when a single country crosses a defined threshold.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=<<index>></code><br>       - Fetches the relevant events from the index.<br><b>02</b> <code>| stats count by status_code clientip uri_path</code><br>       - Aggregates counts of HTTP statuses, client IPs, and paths.<br><b>03</b> <code>| where status_code>=500</code><br>       - Filters events to count server-side HTTP error codes (5xx).<br><b>04</b> <code>| lookup geoip clientip OUTPUT country</code><br>       - Enriches data by resolving the client IP to its respective country.<br><b>05</b> <code>| timechart span=1h sum(count) as error_count by country</code><br>       - Visualizes how error counts are distributed by country across time, in hourly intervals.<br><b>06</b> <code>| eventstats sum(error_count) as total_errors</code><br>       - Calculates the total sum of errors across all countries.<br><b>07</b> <code>| eval error_percentage=round((error_count/total_errors)*100,2)</code><br>       - Converts each country's error count into a percentage of the total.<br><b>08</b> <code>| sort - error_percentage</code><br>       - Displays the results sorted by descending percentage of errors.</p>
explanation = <p>This search isolates server-side HTTP 5xx errors by filtering events with status codes >= 500, maps client IPs to countries utilizing GeoIP data enrichment, and calculates the percentage of errors from each region. The hourly timechart visualizes the trends in error distributions, aiding in spotting regions consistently experiencing high failure rates. Businesses can make better data-informed decisions by using this search to prioritize locations with operational issues.</p>
quid = 6EFB91A28552491DC55DD293D8597E5D
search_author = grdhg24
related_info = <ul><li><a href="https://community.splunk.com/t5/Security/Timechart-percent-count-of-http-status-code/m-p/532268">Timechart percent count of HTTP status code</a><br>Discussion on creating timecharts showing percentage of HTTP status codes.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-do-I-display-percentage-of-500-errors-on-a-per-URI-basis/m-p/15789">Display percentage of 500 errors on a per-URI basis</a><br>Exploration of calculating error percentages for specific URIs.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-create-a-time-chart-of-HTTP-error-codes-as-a-percentage/m-p/256722">Create a time chart of HTTP error codes as a percentage</a><br>Guidance on visualizing HTTP error codes over time as percentages.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/https-error-percentage/m-p/690401">HTTPS error percentage</a><br>Discussion on calculating and interpreting HTTPS error percentages.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/When-calculating-a-percentage-of-status-codes-with-the-timechart/m-p/387841">Calculating percentage of status codes with timechart</a><br>Insights into accurately computing status code percentages over time.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/Query-to-display-if-500-error-http-status-count-is-more-then-30/m-p/578275">Display if 500 error HTTP status count exceeds 30%</a><br>Methodology for alerting when 500 errors surpass a threshold.</li><li><a href="https://community.splunk.com/t5/Splunk-Search/How-to-display-a-timechart-that-gets-the-percent-of-failures/m-p/551369">Display a timechart showing percent of failures</a><br>Approach to visualizing failure percentages over time.</li></ul>
description = <p>Summarizes <b>Error Percentage By Country Over Time</b> using <code>index="<<index>>"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" \
	| stats count by status_code clientip uri_path \
	| where status_code>=500 \
	| lookup geoip clientip OUTPUT country \
	| timechart span=1h sum(count) as error_count by country \
	| eventstats sum(error_count) as total_errors \
	| eval error_percentage=round((error_count/total_errors)*100,2) \
	| sort - error_percentage

[error_rate_by_punct]
search_name = Error Rate By Punct
version = 2.x
date_created = 2025-10-20
category = Splunk
sub_category = _internal
tags = Error,Hutch,Internal,Performance
solution = <p>This search reveals the most frequent ERROR-level patterns in internal logs, helping identify stability risks and monitor splunkd component behavior.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate high-frequency error patterns<br><b>2.</b> Map log punctuation to error messages for pattern insights<br><b>3.</b> Review host distribution to find noisy instances<br><b>4.</b> Use message rate to determine spike intervals<br><b>5.</b> Consider alerting on sudden msg/sec spikes</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(msg_per_sec < 0.5, "normal", msg_per_sec < 2, "low", msg_per_sec < 5, "medium", msg_per_sec < 10, "high", msg_per_sec >= 10, "critical")</code></pre><p>This SPL should be added as the final command in your search pipeline to assign severity levels for alerting or dashboard visualization. <br/><b>Threshold values should be calibrated to your specific usage patterns</b>; the provided alert levels serve as a starting point for tuning based on your environment and workload! In some cases if the search "returns no results" but finishes without errors we will set the severity to "normal.</p><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> Error rate < 0.5 per second</li><li><b>Low (Severity 2):</b> 0.5 to < 2 errors per second</li><li><b>Medium (Severity 3):</b> 2 to < 5 errors per second</li><li><b>High (Severity 4):</b> 5 to < 10 errors per second</li><li><b>Critical (Severity 5):</b> ≥ 10 errors per second</li></ul><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>search index=_internal sourcetype="splunkd" log_level="ERROR"</code><br>       - Finds internal error logs<br><b>02</b> <code>stats sparkline count dc(host) as hosts last(_raw) as last_raw_msg values(sourcetype) as sourcetype last(_time) as last_msg_time first(_time) as first_msg_time values(index) as index by punct</code><br>       - Aggregates stats by log punctuation pattern<br><b>03</b> <code>eval delta=round((first_msg_time - last_msg_time), 2)</code><br>       - Calculates time span<br><b>04</b> <code>eval msg_per_sec=round((count / delta), 2)</code><br>       - Computes error rate<br><b>05</b> <code>convert ctime(last_msg_time) ctime(first_msg_time)</code><br>       - Formats timestamps<br><b>06</b> <code>table last_raw_msg count hosts sparkline msg_per_sec sourcetype index first_msg_time last_msg_time delta</code><br>       - Displays essential fields<br><b>07</b> <code>sort - count</code><br>       - Sorts by event count descending<br>
explanation = <p>This query targets <b>splunkd</b> logs with <b>ERROR</b> severity and categorizes them by punctuation pattern, surfacing common log patterns for rapid triage. The analysis includes host count, message rate, and timing to provide a broad operational context.</p><p>By using <b>stats</b> and <b>eval</b>, it helps teams spot noisy components or repetitive error patterns. <b>convert</b> translates epoch to human-readable format, enhancing usability. This is particularly useful for operations teams monitoring Splunk health and error volumes.</p><p>Junior engineers can learn about using <b>stats sparkline</b> for visual density tracking, <b>delta computation</b> for rate analysis, and applying <b>first/last logic</b> to trace event timelines.</p>
quid = 0B36E6AEDF20DC0B9D8992798E4502A1
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/troubleshooting/what-data-is-in-the-internal-indexes" target="_blank">Splunk Docs: About the internal logs</a><br>Details Splunk's internal logs including splunkd and indexing.</li><li><a href="https://community.splunk.com/t5/Monitoring-Splunk/bd-p/monitoring" target="_blank">Splunk Community: Monitoring Splunk</a><br>Discussions on internal Splunk monitoring techniques.</li><li><a href="https://lantern.splunk.com/Observability/Monitoring/Splunk_Observability_Solutions" target="_blank">Lantern: Splunk Observability Solutions</a><br>Observability use cases and solutions built on Splunk.</li><li><a href="https://splunkbase.splunk.com/app/4252/" target="_blank">Splunkbase: Splunk Health Check App</a><br>App to monitor Splunk instance health including internal logs.</li></ul>
severity_normal_text = <p>Low-frequency error messages — no operational concern.</p>
severity_low_text = <p>Minimal error rate — monitor for rising trends.</p>
severity_medium_text = <p>Moderate error rate — warrants review of impacted components.</p>
severity_high_text = <p>Elevated error volume — investigate for system health issues.</p>
severity_critical_text = <p>Critical error rates — immediate action required to prevent system failure.</p>
description = <p>This search identifies <b>error-level logs</b> in Splunk's internal components by analyzing patterns in punctuation. It shows frequency, time delta, and source distribution of these events.</p>
search = index="_internal" sourcetype="splunkd" log_level="ERROR" \
	| stats sparkline count dc(host) as hosts last(_raw) as last_raw_msg values(sourcetype) as sourcetype last(_time) as last_msg_time first(_time) as first_msg_time values(index) as index by punct \
	| eval delta=round((first_msg_time - last_msg_time), 2) \
	| eval msg_per_sec=round((count / delta), 2) \
	| convert ctime(last_msg_time) ctime(first_msg_time) \
	| table last_raw_msg count hosts sparkline msg_per_sec sourcetype index first_msg_time last_msg_time delta \
	| sort - count \
	| eval severity_level=case(msg_per_sec < 0.5, "normal", msg_per_sec < 2, "low", msg_per_sec < 5, "medium", msg_per_sec < 10, "high", msg_per_sec >= 10, "critical")

