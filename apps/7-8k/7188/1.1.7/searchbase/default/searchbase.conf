related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/administer-splunk-enterprise-with-rest-apis">REST API: admin/savedsearch</a><br>Reference for querying scheduled searches via REST.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/administer/admin-manual/9.4/knowledge/savedsearches.conf">savedsearches.conf</a><br>Configuration guide for scheduled searches.</li><li><a href="https://community.splunk.com/t5/Dashboards-Visualizations/Show-frequency-of-scheduled-searches/m-p/570267">Frequency of Scheduled Searches</a><br>Example visualizations of scheduled activity.</li><li><a href="https://lantern.splunk.com/Observability/Monitoring/Scheduled_search_management">Scheduled Search Monitoring</a><br>Lantern guide for tracking savedsearch activity.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/mvexpand">mvexpand Command</a><br>Splits multivalue fields for analysis.</li><li><a href="https://community.splunk.com/t5/Reporting/Sort-scheduled-savedsearches-by-cron/m-p/472527">Sort by Cron</a><br>Strategies to align cron activity with load windows.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/scheduled-search-best-practices.html">Scheduled Search Best Practices</a><br>Blog covering optimal configurations.</li></ul>
description = <p>Summarizes <b>Scheduled Search Count By Cron And App</b> using <code>| rest splunk_server=* /servicesNS/-/-/admin/savedsearch/ earliest_time=-0s@s latest_time=+2d@d</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | rest splunk_server=* /servicesNS/-/-/admin/savedsearch/ earliest_time=-0s@s latest_time=+2d@d 
disabled=0" \
	| table splunk_server eai:acl.app eai:acl.owner cron_schedule title scheduled_times \
	| mvexpand scheduled_times \
	| rename scheduled_times as _time eai:acl.app as app eai:acl.owner as user title as search \
	| stats count(search) as count by search cron_schedule app \
	| sort 20 -count

[scheduler_activity_instance_7]
search_name = Historical Search Properties and Resource Usage Analysis
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = Jobs
tags = Access,Jobs
solution = <p>This query contributes to better system management and optimization by identifying performance and resource utilization trends of historical searches. Administrators can leverage the results to make informed decisions around resource management and workload distribution.</p><p><b>Suggested Actions</b><br><b>1.</b> Analyze resource-intensive searches and determine if optimization is possible.<br><b>2.</b> Investigate users, apps, or reports that frequently consume high resources.<br><b>3.</b> Use the results to improve scheduling practices for batch or historical searches.<br><b>4.</b> Monitor trends in resource usage over time to predict future capacity needs.<br><b>5.</b> Adjust system configurations to mitigate bottlenecks and enhance efficiency.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services</a><br>Cisco Services.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>where 'search_props.mode'=="historical batch" OR 'search_props.mode'=="historical"</code><br>       - Filters for historical searches specifically in batch or historical mode.<br><b>02</b> <code>| fields search_props.name, search_props.app, search_props.user, search_props.type, search_props.mode, search_props.role, mem_used, pct_cpu, elapsed, search_props.sid</code><br>       - Selects relevant fields for analysis, such as search name, app, user, and resource usage metrics.<br><b>03</b> <code>| eval mem_used = round(mem_used, 0)</code><br>       - Rounds memory usage to the nearest whole MB.<br><b>04</b> <code>| eval pct_cpu = round(pct_cpu, 0)</code><br>       - Rounds CPU usage percentage to an integer value.<br><b>05</b> <code>| eval elapsed = round(elapsed, 0)</code><br>       - Rounds elapsed time to the nearest whole second.<br><b>06</b> <code>| rename</code><br>       - Renames fields for improved readability and understanding, such as 'search_props.name' to "Scheduled Report Name".<br><br>
explanation = <p>This query provides <b>insights</b> into the resource usage and performance of historical searches within Splunk. By identifying <b>resource-intensive searches</b>, it aids in understanding how much <b>CPU</b> and <b>memory</b> were consumed and how long each search took to execute. This data is <b>critical</b> for optimizing system performance and improving <b>resource allocation</b>. It offers visibility into how system resources are engaged, helping administrators identify potential bottlenecks or inefficiencies in historical search execution.</p>
quid = 360F787CF0F7483EEEC4F36E28F1ABFA
search_author = twest
updated_author = khutchinson
description = <p>This query filters for <b>historical batch</b> or <b>historical</b> modes in the 'search_props' data source. It selects specific fields, rounds the values of 'mem_used', 'pct_cpu', and 'elapsed' to the nearest whole number, and renames the fields for better readability.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = where 'search_props.mode'=="historical batch" OR 'search_props.mode'=="historical"\
	| fields search_props.name, search_props.app, search_props.user, search_props.type, search_props.mode, search_props.role, mem_used, pct_cpu, elapsed, search_props.sid\
	| eval mem_used = round(mem_used, 0)\
	| eval pct_cpu = round(pct_cpu, 0)\
	| eval elapsed = round(elapsed, 0)\
	| rename search_props.name as "Scheduled Report Name", search_props.app as App, search_props.user as User, search_props.type as Type, search_props.mode as Mode, search_props.role as Role, mem_used as "Memory Used (MB)", pct_cpu as "CPU Usage (%)", elapsed as "Time Spent (sec)", search_props.sid as "SID"

[scheduler_activity_timechart]
search_name = Scheduler Activity Timechart
version = 2.x
date_created = 2025-10-20
category = Splunk
sub_category = _internal
tags = Hutch,KPI,Scheduler,Timechart
solution = <p>This KPI allows teams to understand and visualize the behavior of scheduled searches: the ratio of those that started versus those skipped. A rising skipped count may indicate performance issues, concurrency limits being reached, or scheduler congestion.</p><p><b>Suggested Actions</b><br><b>1.</b> Monitor zero or low start counts and increasing skipped counts<br><b>2.</b> Investigate which saved searches were skipped and why<br><b>3.</b> Adjust scheduling, cron timing, or concurrency limits to smooth load<br><b>4.</b> Use this timechart as a dashboard widget for operational visibility<br><b>5.</b> Correlate skipped spikes with scheduler performance or cluster resource issues</p><p><b>Recommended Alerts</b></p><pre><code>| eval severity_level=case(Skipped/Started < 0.05, "normal", Skipped/Started < 0.10, "low", Skipped/Started < 0.20, "medium", Skipped/Started < 0.30, "high", Skipped/Started >= 0.30, "critical")</code></pre><p><b>Evaluation Logic:</b></p><ul><li><b>Normal (Severity 1):</b> <i>Skipped/Started ratio < 5%</i></li><li><b>Low (Severity 2):</b> <i>Skipped/Started ratio < 10%</i></li><li><b>Medium (Severity 3):</b> <i>Skipped/Started ratio < 20%</i></li><li><b>High (Severity 4):</b> <i>Skipped/Started ratio < 30%</i></li><li><b>Critical (Severity 5):</b> <i>Skipped/Started ratio ≥ 30%</i></li></ul><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.cisco.com/site/us/en/services/index.html" target="_blank">Services: Cisco Services</a><br>Cisco Services.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_internal source=*metrics.log group=searchscheduler</code><br>       - Retrieves scheduler group metrics from metrics.log<br><b>02</b> <code>| timechart partial=false span=10m sum(dispatched) AS Started sum(skipped) AS Skipped</code><br>       - Aggregates started and skipped counts every 10 minutes<br><br>
explanation = <p>The query extracts data from <b>index=_internal</b>, specifically using <b>source=*metrics.log</b> and filtering by <b>group=searchscheduler</b>. These fields provide detailed information about Splunk's scheduling activities, including the count of jobs that were <b>dispatched</b> (successfully started) and those that were <b>skipped</b> (unable to start, often due to resource limitations). The time-charted intervals (<b>span=10m</b>) allow a temporal view to detect patterns, such as recurrent scheduler congestion or spikes in skipped jobs. For junior engineers, this SPL highlights the importance of understanding and parsing internal metrics logs to monitor platform health. Timecharting here provides a clear, actionable visualization for assessing scheduler reliability and stability over time.</p>
quid = 9E19CC5C2B9511858CA918B85D067598
search_author = grdhg24
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/data-management/monitor-your-deployment-about-the-monitoring-console" target="_blank">Splunk Docs: Scheduler Activity</a><br>Overview of the search scheduler dashboard and scheduling behavior.</li><li><a href="https://community.splunk.com/t5/Monitoring-Splunk/Where-is-the-documentation-defining-the-search-scheduler-log/m-p/580270" target="_blank">Splunk Community: Search scheduler.log & metrics.log field details</a><br>Discussion about search scheduling metrics, including skipped/dispatched counts. :contentReference[oaicite:0]{index=0}</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/troubleshooting/what-data-is-in-the-internal-indexes" target="_blank">Splunk Docs: What Splunk software logs about itself</a><br>Insights into internal log sources including metrics.log and scheduler behaviors.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/timechart" target="_blank">Splunk Docs: timechart command reference</a><br>Guide to usage of timechart for temporal aggregations in Splunk searches.</li></ul>
severity_normal_text = <p>Scheduled search start rate is healthy.</p>
severity_low_text = <p>Minor scheduling delays: review skipped jobs.</p>
severity_medium_text = <p>Noticeable scheduling inefficiency: investigate scheduling load.</p>
severity_high_text = <p>High skipped count: scheduling bottleneck likely.</p>
severity_critical_text = <p>Critical issue: too many scheduled searches are being skipped — urgent action required.</p>
description = <p>Summarizes <b>Scheduler Activity Timechart</b> using <code>index="_internal" source=*metrics.log group=searchscheduler</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="_internal" source=*metrics.log group=searchscheduler \
	| timechart partial=false span=10m sum(dispatched) AS Started sum(skipped) AS Skipped

[search_all_traffic_by_src_action_creates_table]
search_name = Allowed Non-Private IP Traffic by Country
version = 1.0.1
date_updated = 2023-12-14 15:29:29
search_hidden = 0
category = Infrastructure
sub_category = Networking
tags = Network,Searching
solution = <p>This search helps identify external network traffic patterns and potential security concerns from non-private IP addresses.</p><p><b>Suggested Actions</b><br><b>1.</b> Review traffic from unexpected countries and investigate anomalies.<br><b>2.</b> Create watchlists for high-risk geographic regions.<br><b>3.</b> Monitor bytes_out and packets_out for data exfiltration indicators.<br><b>4.</b> Correlate findings with threat intelligence feeds.<br><b>5.</b> Establish baseline traffic patterns for comparison and alerting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=<<index>> sourcetype=sourcetype <br />- This line is specifying the index and sourcetype to pull the data from.</ul><ul><b>02</b> src!=10.0.0.0/8 AND src!=192.168.0.0/12 AND src!=192.168.0.0/16 <br />- This line is filtering out private IP addresses.</ul><ul><b>03</b> action=allowed <br />- This line is filtering for logs where the action was allowed.</ul><ul><b>04</b> | iplocation src <br />- This line is using the iplocation function to geolocate the source IP addresses.</ul><ul><b>05</b> | search Country=* <br />- This line is filtering out any results where the country is not known.</ul><ul><b>06</b> | table Country, src, action, bytes_out, packets_out <br />- This line is creating a table with the country, source IP, action, bytes out, and packets out.</ul><ul><b>07</b> | dedup src <br />- This line is removing any duplicate source IP addresses.</ul><ul><b>08</b> | sort Country <br />- This line is sorting the results by country.}</ul></ol></div></div>
explanation = <p>This query can be used to identify potential security threats or unusual network traffic patterns. By excluding private IP ranges and focusing on allowed actions, it can help identify potential external threats that have been permitted through the firewall. The geolocation and tabulation of data can assist in visualizing the data and identifying patterns or anomalies.</p>
quid = D95EEC5681238098154A4594DF1C622A
search_author = GoSplunk: pocketaces
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/search-all-traffic-by-src-action-creates-table" target="_self">https://gosplunk.com/search-all-traffic-by-src-action-creates-table</a></p>
description = <p>Summarizes <b>Allowed Non-Private IP Traffic by Country</b> using <code>index="<<index>>" sourcetype="<<sourcetype>>" src!=10.0.0.0/8 AND src!=192.168.0.0/12 AND src!=192.168.0.0/16 action="al</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="<<sourcetype>>" src!=10.0.0.0/8 AND src!=192.168.0.0/12 AND src!=192.168.0.0/16 action="allowed"\
	| iplocation src\
	| search Country=*\
	| table Country, src, action, bytes_out, packets_out\
	| dedup src\
	| sort Country

[search_common_event_codes]
search_name = Windows Security Event Analysis by Event Type
version = 2.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
