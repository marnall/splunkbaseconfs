explanation = <p>This search analyzes DMA resource consumption separately for indexer-side and search head-side processing by extracting <b>CPU</b> and <b>memory metrics</b> from process-level introspection data. Data model acceleration searches execute on both processing tiers, and understanding the resource split helps administrators identify <b>bottlenecks</b> and optimize acceleration configurations.</p><p>For example, high indexer CPU usage may indicate the need for more indexer resources or narrower acceleration time ranges, while high search head memory usage may suggest excessive result set sizes requiring summary tuning. This tier-separated resource visibility enables targeted capacity planning and performance optimization for acceleration workloads.</p>
