tags = CPU,Indexers,Processes
solution = <p>This search helps Splunk administrators identify <b>which process types consume the most CPU</b> on indexers. Armed with this data, they can make informed decisions to optimize resource usage, adjust search schedules, and fine-tune configurations to enhance performance and efficiency.</p><p><b>Suggested Actions</b><br><b>1.</b> Review processes with high p90 CPU usage and evaluate their necessity.<br><b>2.</b> Optimize data model acceleration schedules during non-peak usage times.<br><b>3.</b> Balance search workloads across indexer tiers to minimize contention.<br><b>4.</b> Investigate high usage by "other" process classes and identify opportunities for process refinement.<br><b>5.</b> Utilize insights to plan hardware upgrades or reallocation of resources for future scalability.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://meraki.cisco.com/products" target="_blank">Products: Cisco Meraki</a><br>Cisco Meraki.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>search index=_introspection sourcetype=splunk_resource_usage component=PerProcess</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Filters introspection data for process metrics associated with the indexer.<br><b>02</b> <code>| rename data.* as * | rename search_props.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Renames fields for simplicity in downstream processing.<br><b>03</b> <code>| eval process_class = case(...) </code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Categorizes processes by function, such as "index service," "data model acceleration," and "Splunk Web."<br><b>04</b> <code>| bin _time span=10s</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aligns events to 10-second intervals for granular analysis.<br><b>05</b> <code>| stats latest(normalized_pct_cpu) AS pct_cpu by pid, _time, process_class</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Aggregates normalized CPU usage data for active processes over time.<br><b>06</b> <code>| timechart span=1h p90(pct_cpu) AS "P90 CPU Usage" by process_class</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; - Generates per-hour p90 CPU utilization statistics categorized by process class.</p>
explanation = <p>This search breaks down <b>CPU consumption</b> by process classification, allowing users to pinpoint <b>CPU-intensive operations</b>. The classification covers processes such as <b>splunk-optimize</b> (index service), <b>splunkd</b> (data model accelerations and searches), and various scripted inputs. By calculating the <b>90th percentile (p90) CPU usage</b>, decision-makers gain actionable insight into workload distribution and resource optimization across the indexer tier. For example, high CPU usage by <b>scheduled searches</b> could prompt adjustments to scheduling to avoid contention with other processes.</p><p>From a technical perspective, this search demonstrates practical applications of <b>field renaming</b>, <b>process categorization</b> using conditional evaluation via <code>eval</code> and <code>case</code>, and summarization via <code>timechart</code> and <code>stats</code>. By providing these insights, users can optimize both indexing operations and overall pipeline performance.</p>
quid = 7A3F9E2B8D4C1F6E5B9A7D3F2C8E4B1D
search_author = Splunk Works
description = <p>Summarizes <b>Indexer Process CPU</b> using <code>index=_introspection sourcetype=splunk_resource_usage component=PerProcess | rename data.* as * | rename search_props.* </code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li></ul>
search = index=_introspection sourcetype=splunk_resource_usage component=PerProcess | rename data.* as * | rename search_props.* as * | eval process_class = case( process=="splunk-optimize","index service", process=="sh" OR process=="ksh" OR process=="bash" OR like(process,"python%") OR process=="powershell","scripted input", process=="mongod", "KVStore", process=="splunkd" AND (like(args,"-p %start%") OR like(args,"service") OR like(args,"%_internal_launch_under_systemd%")),"splunkd server", process=="splunkd" AND isnotnull(sid) AND type=="datamodel acceleration","datamodel acceleration", process=="splunkd" AND isnotnull(sid) AND type=="scheduled","scheduler searches", process=="splunkd" AND isnotnull(sid) AND type=="ad-hoc","ad-hoc searches", process=="splunkd" AND isnotnull(sid) AND type=="summary index","summary index", process=="splunkd" AND (like(args,"fsck%") OR like(args,"recover-metadata%") OR like(args,"cluster_thing")),"index service", process=="splunkd" AND args=="instrument-resource-usage", "scripted input", (like(process,"python%") AND like(args,"%/appserver/mrsparkle/root.py%")) OR like(process,"splunkweb"),"Splunk Web", 1=1,"other") | bin _time span=10s | stats latest(normalized_pct_cpu) AS pct_cpu by pid, _time, process_class | timechart span=1h p90(pct_cpu) AS "P90 CPU Usage" by process_class

