search_hidden = 0
sub_category = Custom
tags = Access,Indexes
solution = <p>This query provides a <b>complete view</b> of all data fields and values within a specific dataset, enabling thorough data exploration and validation.</p><p><b>Suggested Actions</b><br><b>1.</b> Use the results to understand the full scope of available data.<br><b>2.</b> Identify missing or unexpected field values for data quality checks.<br><b>3.</b> Export the table for documentation or team collaboration.<br><b>4.</b> Filter specific fields for more targeted analysis.<br><b>5.</b> Leverage insights to design dashboards or reports based on available data.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="<<sourcetype>>"</code><br>       - This line specifies the index and sourcetype to search in. Replace "index" and "sourcetype" with your actual index and sourcetype names.<br><b>02</b> <code>| table *</code><br>       - This line creates a table with all fields from the events found in the specified index and sourcetype. The "*" is a wildcard representing all fields.<br>
explanation = <p>This query is useful when you want to see all the data available in a specific index and sourcetype. It can help you understand the structure of your data, identify any missing or unexpected fields, and spot any anomalies or patterns.</p>
quid = 5EDC6A36AD382234B3D4F0293D088F06
search_author = GoSplunk: Azeemering
updated_author = khutchinson
