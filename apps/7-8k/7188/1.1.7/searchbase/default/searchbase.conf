search = index="<<index>>" sourcetype="access*"\
	| timechart dc(clientip) AS unique_visitors by host

[universal_forwarder_splunk_versions]
search_name = Latest Splunk Version, Architecture, OS, Build by Host and Last Seen
version = 1.0.1
