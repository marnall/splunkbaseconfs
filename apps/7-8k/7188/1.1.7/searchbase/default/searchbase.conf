[show_all_successful_splunk_configuration_changes_by_user]
search_name = Audit Log: Granted Edit Actions with Modified Objects
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Users
solution = <p>This search provides <b>key insights</b> into Splunk configuration changes, helping admins maintain <b>visibility</b> and ensuring accountability for modifications. Reviewing this data regularly can uncover <b>unusual activity</b> or operational trends affecting system integrity.</p> \
<p><b>Suggested Actions</b></p> \
<b>1.</b> Review the 'modified_by' field to identify users responsible for changes.<br> \
<b>2.</b> Verify that the 'modified_object' entries align with organizational access policies.<br> \
<b>3.</b> Investigate any unexpected or unauthorized modifications discovered.<br> \
<b>4.</b> Implement stricter controls if irregularities persist.<br> \
<b>5.</b> Utilize results for auditing and compliance documentation.<br><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=_audit action=edit* info=granted operation!=list host= object=*</code><br>       - Search the audit index for events related to 'edit' actions that were granted, excluding operations marked as 'list', and capture events with populated host and object fields.<br> \
	<b>02</b> <code>| transaction action user operation host maxspan=30s</code><br>       - Group relevant events into transactions where fields like action, user, and host match, ensuring they occur within 30 seconds of each other.<br> \
	<b>03</b> <code>| stats values(action) as action values(object) as modified_object by _time,operation,user,host</code><br>       - Summarize the transactions, extracting unique values of actions and objects while grouping by operation, user, host, and time.<br> \
	<b>04</b> <code>| rename user as modified_by</code><br>       - Rename the 'user' field to 'modified_by' for enhanced clarity in interpreting the output.<br> \
	<b>05</b> <code>| table _time action modified_object modified_by</code><br>       - Present the final results as a well-structured table showing the time, actions performed, the modified objects, and user responsible.<br>
explanation = <p>This query enables <b>real-time monitoring</b> of user activity regarding configuration changes within Splunk. By focusing on <b>edit actions</b> in the audit logs, it identifies <b>who</b> made the changes, <b>what</b> changes were made, and the <b>time</b> of these modifications. This information is essential for auditing, detecting unusual activity, and troubleshooting.</p> \
	<p>The search begins by extracting relevant events from the _audit index, then groups events into <b>transactions</b> based on common fields like user and host. The use of <code>stats</code> organizes this grouped information by unique actions and objects. Finally, with renamed fields and table formatting, it enhances clarity and utility for stakeholders.</p>
quid = 62ABFB15600A7A235290D51B67F825F3
search_author = GoSplunk: sedi
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/show-all-successful-splunk-configuration-changes-by-user" target="_blank">https://gosplunk.com/show-all-successful-splunk-configuration-changes-by-user</a></p>
description = <p>This query is looking for <b>successful edit actions</b> in the audit logs, groups them into transactions based on certain fields, and then provides <b>statistics</b> on these transactions.</p> \
	<p>It then renames a field for clarity and displays the results in a <b>concise, organized table</b>.</p>
search = index=_audit action=edit* info=granted operation!=list object=*\
	| transaction action user operation host maxspan=30s\
	| stats values(action) as action values(object) as modified_object by _time,operation,user,host\
	| rename user as modified_by\
	| table _time action modified_object modified_by

