dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_audit [|rest /services/server/info splunk_server=local | fields host] action=search user=* user!=splunk-system-user search_id=* (info=granted OR info=completed)</code><br> - Filters audit logs for user-initiated searches, excluding system users.<br><b>02</b> <code>| rex field=apiStartTime ...</code><br> - Extracts start and end times from the API fields.<br><b>03</b> <code>| eval range=...</code><br> - Calculates the duration of each search.<br><b>04</b> <code>| stats ... by search_id savedsearch_name</code><br> - Aggregates search metrics by search ID and saved search name.<br><b>05</b> <code>| eval "Overran?"=...</code><br> - Determines if the search exceeded its expected duration.<br><b>06</b> <code>| table ...</code><br> - Formats the final output for analysis.<br>
explanation = <p>This search examines the <b>_audit</b> index to analyze search execution logs, focusing on start and end times to compute their durations. It detects if searches exceeded their expected runtimes. By identifying these overruns, it provides opportunities for refining search scheduling, improving resource allocation, and ensuring optimal performance.<br><br>This search employs multiple key functions:</p><ul><li><b>rex</b>: Extracts values for start and end times from search initiation logs using regular expressions.</li><li><b>eval</b>: Computes runtime durations and flags cases where searches exceed their intended ranges.</li><li><b>stats</b>: Aggregates search execution metrics by <b>search_id</b> and <b>savedsearch_name</b>, providing comprehensive insights.</li><li><b>where</b>: Filters out datasets with low relevance (<b>count <= 1</b>).</li></ul><p>Administrators can leverage this analysis to maintain system efficiency, ensuring user searches align with expected durations, improving operational efficacy, and reducing bottlenecks.</p>
quid = 9029623DD974EE2E31DE4F314BCE8331
description = <p>Analyzes audit logs to identify searches that exceeded their expected runtime, providing actionable insights to improve performance and resource utilization. This helps ensure <b>efficient search execution</b> and prevents <b>performance bottlenecks</b> in Splunk deployments.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
search = index=_audit [|rest /services/server/info splunk_server=local \
| fields host] action=search user=* user!=splunk-system-user search_id=* (info=granted OR info=completed) \
| rex field=apiStartTime "'(?<start_time>[^']+)' " \
| rex field=apiEndTime "'(?<end_time>[^']+)' " \
| rex "search\=(?<search_string>.+),\sautojoin" \
| eval range=if(start_time=="ZERO_TIME","All Time", tostring(strptime(end_time, "%a %b %d %H:%M:%S %Y") - strptime(start_time, "%a %b %d %H:%M:%S %Y"),"duration")) \
| eval range2=if(start_time=="ZERO_TIME","All Time", strptime(end_time, "%a %b %d %H:%M:%S %Y") - strptime(start_time, "%a %b %d %H:%M:%S %Y")) \
| stats max(event_count) AS event_count values(start_time) AS "Search Earliest" values(end_time) AS "Search Latest" count values(range) AS range values(range2) AS range2 values(search) AS Search values(user) AS User max(total_run_time) AS run_time(sec) by search_id savedsearch_name \
| convert ctime(*Time) ctime("Search Start") ctime("Search End") \
| where count>1 \
| rename search_id AS SID range AS "Search Range" \
| eval "Run Time"=tostring('run_time(sec)',"duration") \
| eval "Overran?"=if('run_time(sec)'>range2,"Overran its range!!!", "NO") \
| eval SID = trim(SID, "'") \
| table SID savedsearch_name event_count "Search Earliest" "Search Latest" "Search Range" Search User "run_time(sec)" "Overran?" "Run Time" \
| sort - "Run Time"

[audit_search_runtime_analysis]
search_name = Audit Search Runtime Analysis
version = 2.x
date_created = 2025-05-19
category = Splunk
sub_category = _internal
tags = Searches
solution = Regularly monitor expensive ad hoc searches to identify inefficient SPL patterns or heavy dashboard panels.<br><b>Suggested Actions</b><br><b>01</b> Alert when median runtime exceeds 5 seconds.<br><b>02</b> Flag users with more than 20 total searches per day.<br><b>03</b> Detect search heads where 95th percentile time > 10 seconds.<br><b>04</b> Optimize frequent searches with high cumulative runtime.<br><b>05</b> Audit users consistently using wildcard searches.<br><br><b>Recommended Alerts</b><br><b>01</b> median(total_run_time) > 5<br><b>02</b> perc95(total_run_time) > 10<br><b>03</b> sum(total_run_time) > 300<br><b>04</b> count > 20<br><b>05</b> search matches wildcards frequently<br><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>index=_audit action=search (id=* OR search_id=*)</code><br>       - Searches the audit log for all search invocations.<br><b>02</b> <code>eval search_id = if(isnull(search_id), id, search_id)</code><br>       - Normalizes missing search_id fields using id.<br><b>03</b> <code>rex and replace</code><br>       - Extracts the search string and sanitizes wildcard expressions.<br><b>04</b> <code>search search_id!=scheduler_*</code><br>       - Filters out scheduled searches.<br><b>05</b> <code>convert, rex, eval</code><br>       - Parses user attribution from logs.<br><b>06</b> <code>stats by search_id host</code><br>       - Collapses by unique search with relevant fields.<br><b>07</b> <code>filter search fields</code><br>       - Focuses on non-internal queries.<br><b>08</b> <code>stats by user host</code><br>       - Aggregates runtime statistics.<br><b>09</b> <code>rename/sort</code><br>       - Formats the display and prioritizes long runtimes.<br>
explanation = <p>This query inspects the <b>_audit</b> index for all search-related actions, capturing run times and user attribution. It filters out scheduled and internal searches to focus on interactive or user-generated searches. The result provides <b>median</b> and <b>95th percentile</b> runtime stats per user/host, which is useful for <b>performance tuning</b> and search hygiene analysis.</p>
quid = 4FE03CD1444F630860A89ED389E0AF6E
description = <p><b>Analyzes search runtime</b> across the <b>_audit</b> index to detect expensive or inefficient queries by user and host. This analysis is <b>critical</b> for optimizing search performance and understanding user behavior. It <b>highlights</b> heavy searches that may affect system resources.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index=_audit action=search (id=* OR search_id=*) \
| eval search_id = if(isnull(search_id), id, search_id) \
| replace '*' with * in search_id \
| rex "search='(?<search>.*?)', autojoin" \
| search search_id!=scheduler_* \
| convert num(total_run_time) \
| rex "\\,\\s+user=(?<user>\\S+)," \
| eval user = if(user="n/a", null(), user) \
| stats min(_time) as _time first(user) as user max(total_run_time) as total_run_time first(search) as search by search_id host \
| search search=search* search!=*_internal* search!=*_audit* \
| stats median(total_run_time) as "Median search time" perc95(total_run_time) as "95th Percentile search time" sum(total_run_time) as "Total search time" count as "Search count" max(_time) as "Last use" by user host \
| fieldformat "Last use" = strftime('Last use', "%F %T.%Q %:z") \
| rename host AS "Search Head" \
| sort - "Median search time"

