solution = <p>Populates the searchheads token for filtering metrics by search head cluster membership, enabling dynamic discovery and targeting for Splunk search head-oriented analytics.</p><p><b>Suggested Actions</b><br><b>1.</b> Validate cluster memberships using the resulting token.<br><b>2.</b> Use the dynamic list to feed into other performance metrics or workload searches.<br><b>3.</b> Ensure REST endpoint permissions for secure execution.<br><b>4.</b> Use in Splunk alerting to track search head cluster changes.<br><b>5.</b> Share the methodology as a building block for portable Splunk configurations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
