search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Windows Security Event Analysis by Event Type</b> using <code>index="<<index>>" source=*WinEventLog:security User!=SYSTEM User!="LOCAL SERVICE" User!="NETWORK SERVICE"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
