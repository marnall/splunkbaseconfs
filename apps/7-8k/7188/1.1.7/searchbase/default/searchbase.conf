[sparkline_by_client_ip_47]
search_name = Client IP Access Frequency with Sparkline
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,SFU
solution = <p>This query provides <b>valuable visibility</b> into client IP activity trends and volume by identifying the most active IPs accessing your environment.</p> \
	<p><b>Suggested Actions</b><br><b>1.</b> Use the sparkline to identify frequent access patterns or anomalies for specific IPs.<br><b>2.</b> Investigate any IPs with unusually high log counts to check for potential issues or security risks.<br><b>3.</b> Correlate with other data sources to identify whether these access patterns are legitimate or suspicious.<br><b>4.</b> Implement rate-limiting controls or blocking rules if specific IPs are determined to be malicious.<br><b>5.</b> Regularly monitor these trends to track ongoing activity and respond to changes promptly.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>"</code><br>       - Specify the index where the access log data resides.<br> \
	<b>02</b> <code>sourcetype="*access*"</code><br>       - Filter to include only events with sourcetype containing 'access'.<br> \
	<b>03</b> <code>| stats sparkline count by clientip</code><br>       - Aggregate data by client IP, create a sparkline for each IP, and count the logs.<br> \
	<b>04</b> <code>| sort -count</code><br>       - Sort results in descending order by log count.<br>
explanation = <p>This search helps identify client IPs with the highest number of access events. Such insights are critical for monitoring and analyzing <b>traffic patterns</b> or identifying potential <b>security threats</b>, such as IPs generating unusually high access counts.</p> \
	<p>The query uses the <code>stats sparkline</code> command to provide a compact visual overview of access trends for each IP, enabling quick pattern recognition. By filtering data with <code>sourcetype=*access*</code>, it ensures precision in log categorization, focusing specifically on access logs. The descending sort by count reveals the top client IPs by activity volume, which could assist in proactive monitoring and response strategies.</p>
quid = 27C0C75499D2001989566361C5B6E3D9
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Client IP Access Frequency with Sparkline</b> using <code>index="<<index>>" sourcetype="*access*"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/blog/tips-and-tricks/what-are-splunk-apps-and-add-ons.html" target="_blank">Products: Overview of Splunk apps and add-ons and how they are used</a><br>Overview of Splunk apps and add-ons and how they are used.</li><li><a href="https://www.splunk.com/en_us/blog/learn/what-splunk-does.html" target="_blank">Products: Overview of what Splunk does and common use cases</a><br>Overview of what Splunk does and common use cases.</li></ul>
