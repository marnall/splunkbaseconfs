[host_not_sending_logs_for_x_days]
search_name = Count and Age of Events by Host, Sourcetype, and Index
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,GoSplunk
solution = <p>This search highlights hosts that may have stopped sending logs, allowing administrators to pinpoint potential data ingestion or indexer connectivity issues. By focusing on aged event data, it helps maintain Splunk's operational visibility.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate the identified hosts to confirm if they are still operational.<br><b>2.</b> Check forwarder configurations and ensure connectivity to the Splunk indexer.<br><b>3.</b> Evaluate the source systems' health and verify logs are being generated as expected.<br><b>4.</b> Review Splunk pipeline queues for bottlenecks affecting data ingestion.<br><b>5.</b> Set up alerts to proactively monitor log transmission activity in the future.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>| tstats summariesonly=t count as countAtToday latest(_time) as lastTime where index!="*_" by host sourcetype index</code><br>       - Retrieve event counts and most recent event times grouped by host, sourcetype, and index, excluding internal Splunk indexes.<br><b>02</b> <code>| eval age=now()-lastTime</code><br>       - Calculate the age of the last event in seconds by subtracting its timestamp from the current time.<br><b>03</b> <code>| sort age d</code><br>       - Sort results by event age, placing the oldest data at the top.<br><b>04</b> <code>| fieldformat lastTime=strftime(lastTime,"%Y/%m/%d %H:%M:%S")</code><br>       - Format the last event timestamp as a user-friendly date and time string.<br><b>05</b> <code>| eval age=round((age/60/60),1)</code><br>       - Convert event age from seconds to hours, rounding to one decimal place for precision.<br><b>06</b> <code>| search age>=48</code><br>       - Filter results to include only events older than 48 hours.<br><b>07</b> <code>| eval age=age."hour"</code><br>       - Append the string 'hour' to the calculated age for better readability.<br><b>08</b> <code>| dedup host</code><br>       - Remove duplicate entries to ensure each host appears only once in the output.<br>
explanation = <p>This search leverages the Splunk <code>tstats</code> command for efficient event counting and retrieves the latest event time for each host, sourcetype, and index. By excluding indexes starting with an underscore, it focuses on logs relevant to operational monitoring.</p> <p>The <code>eval</code> command calculates the age of the latest event (in seconds) from the current time, which is then converted to hours for readability. Sorting results in descending order by age highlights hosts with older event data, making it easier to spot issues. The inclusion of <code>fieldformat</code> ensures the last event timestamp is human-readable. Filtering results for events older than 48 hours isolates potential problem areas, helping administrators identify and investigate hosts with <b>log-inactivity trends</b>. Deduplication ensures that only unique hosts are listed in the output.</p>
quid = EC77296FBCDA3D85626F31554F152DCC
search_author = GoSplunk: pradeep577
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/host-not-sending-logs-for-x-days" target="_blank">https://gosplunk.com/host-not-sending-logs-for-x-days</a></p>
description = <p>Summarizes <b>Count and Age of Events by Host, Sourcetype, and Index</b> using <code>| tstats summariesonly=t count as countAtToday latest(_time) as lastTime where index!="*_" by host sourcetype index</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = | tstats summariesonly=t count as countAtToday latest(_time) as lastTime where index!="*_" by host sourcetype index\
	| eval age=now()-lastTime\
	| sort age d\
	| fieldformat lastTime=strftime(lastTime,"%Y/%m/%d %H:%M:%S")\
	| eval age=round((age/60/60),1)\
	| search age>=48\
	| eval age=age."hour"\
	| dedup host

