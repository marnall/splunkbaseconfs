[pi_rm_indexer_cpu_p90]
search_name = Indexer CPU P90
version = 2.x
date_created = 2025-12-04
category = Performance Monitoring
sub_category = Server
tags = CPU,Indexers,Statistics
solution = <p>The search generates actionable insights into indexer CPU usage patterns, helping system administrators ensure optimal performance by monitoring and planning for resource usage effectively.</p><p><b>Suggested Actions</b><br><b>1.</b> Use the p90 metric to assess typical high-load scenarios and determine resource adequacy.<br><b>2.</b> Monitor CPU usage trends over time for anomalies that require further investigation.<br><b>3.</b> Leverage these insights for informed capacity planning to maintain ingestion performance levels.<br><b>4.</b> Use maximum and average metrics to model expected load and balance resources.<br><b>5.</b> Consider additional hardware scaling when sustained high p90 values approach capacity thresholds.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://meraki.cisco.com/products" target="_blank">Products: Cisco Meraki</a><br>Cisco Meraki.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -7d@d
dispatch_latest_time = now
dispatch_context = performance-insight-app
dispatch_context_force = 1
dispatch_context_uid = 5549
execution_plan = <b>01</b> <code>index="_introspection" sourcetype=splunk_resource_usage component IN (Hostwide, IOStats)</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Filters for introspection data related to Splunk resource usage.<br><b>02</b> <code>| rename data.* as *</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Simplifies field names for easier referencing.<br><b>03</b> <code>| eval cpu=cpu_system_pct+cpu_user_pct</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Creates a calculated field for total CPU usage.<br><b>04</b> <code>| stats latest(cpu) as cpu by host</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Summarizes the latest CPU usage for each indexer host.<br><b>05</b> <code>| stats p90(cpu) as cpu_p90, avg(cpu) as cpu_avg, max(cpu) as cpu_max</code><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- Aggregates CPU statistics (90th percentile, average, and maximum).</p>
explanation = <p>This search computes statistical CPU performance metrics for Splunk indexers, focusing on the 90th percentile CPU usage (p90) while also analyzing average and maximum usage. By capturing the p90 metric, this search helps detect sustained high-load scenarios without overreacting to outliers or spikes. The statistics gathered assist in performance tuning, capacity planning, and identifying when to scale out indexer resources to accommodate growing data ingestion needs.</p><p>It processes raw system-level metrics collected from the "_introspection" index to produce actionable insights for operational teams. Key SPL commands used here—like <b>stats</b> for aggregation—set a foundational best practice for analyzing log and telemetry data within the context of indexer-tier operations.</p>
