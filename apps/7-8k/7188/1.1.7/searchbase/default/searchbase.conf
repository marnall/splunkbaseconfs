tags = Access,SFU
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> index=<<index>> sourcetype=sourcetype' - This part of the query is specifying the index and sourcetype to search in. Replace 'index' and 'sourcetype' with your specific index and sourcetype.</ul><ul><b>02</b> | extract pairdelim=|;, kvdelim==:, auto=f' - This is the 'extract' command. 'pairdelim' is specifying the delimiters that separate each field-value pair, in this case '|;' and 'kvdelim' is specifying the delimiters that separate the field from the value, in this case '=:' . 'auto=f' is telling Splunk not to automatically extract fields, but to only extract the fields specified by the delimiters.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query is <b>valuable</b> when you have events that contain field-value pairs that are not automatically extracted by Splunk. By specifying the delimiters, you can ensure that the correct fields and values are extracted from your events. This can help you to better <b>analyze</b> and <b>understand</b> your data.</div></div>
