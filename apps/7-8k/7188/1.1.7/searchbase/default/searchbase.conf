sub_category = Access
tags = Access,GoSplunk
solution = <p>This search helps detect potentially malicious system time modifications.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate any non-zero time differences for unauthorized changes.<br><b>2.</b> Correlate with NTP synchronization logs to exclude legitimate updates.<br><b>3.</b> Create alerts for significant time modifications outside of expected patterns.<br><b>4.</b> Document incidents for forensic analysis and compliance.<br><b>5.</b> Review affected systems for potential compromise indicators.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>search line</code><br>       - The 'index' and 'source' specify where the data is coming from, targeting Windows Security Event logs.<br><b>02</b> <code>EventCode=4616</code><br>       - Filters for events with this specific code, representing system time changes.<br><b>03</b> <code>NOT Account_Name</code><br>       - Excludes events from specified accounts, focusing on suspicious changes.<br><b>04</b> <code>eval Date</code><br>       - Formats the event time as a date and time string.<br><b>05</b> <code>eval oldtime</code><br>       - Converts the previous time from a string to a timestamp.<br><b>06</b> <code>eval t=_time</code> & <code>rename t as eventtime</code><br>       - Establishes the event time.<br><b>07</b> <code>eval diff</code><br>       - Calculates the time difference between the event time and the old time.<br><b>08</b> <code>where diff!=0</code><br>       - Filters out events where there was no time difference.<br><b>09</b> <code>stats</code><br>       - Counts the number of events for each combination of host, account name, difference, and date.<br><b>10</b> <code>sort - Date</code>:<br>       - Organizes results by date in descending order.<br><b>11</b> <code>rename commands</code><br>       - Clarifies field names for better understanding.<br>
explanation = <p>This search is used to <b>monitor</b> changes in system time, an activity which can indicate potential security incidents. By <b>excluding</b> certain accounts, the focus is on potentially suspicious activity. The calculation of time differences <b>highlights</b> patterns or anomalies in system time changes, providing logical insights into security events.</p>
quid = 95AA346E9CF8CCABB532527E3880C478
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/system-time-modifications-in-windows" target="_blank">https://gosplunk.com/system-time-modifications-in-windows</a></p>
description = <p>This query <b>identifies</b> Windows Security Event logs with an EventCode of 4616, excluding events from certain accounts. It <b>calculates</b> the time difference between the event time and the previous time, providing a <b>count</b> of these events sorted by date.</p>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=4616 (NOT Account_Name="*$") (NOT Account_Name="LOCAL SERVICE")\
	| eval Date=strftime(_time, "%Y/%m/%d %H:%M:%S")\
	| eval oldtime = strptime(replace(Previous_Time, "\D", ""), "%Y%m%d%H%M%S%9N")\
	| eval t=_time\
	| rename t as "eventtime"\
	| eval diff=round(((eventtime-oldtime)/60)/60,2)\
	| where diff!=0\
	| stats count by host, Account_Name, diff, Date\
	| sort - Date\
	| rename diff as "Hours Between New Time and Actual Time"\
	| rename Account_Name as "Source Account"\
	| rename host as "Target Machine"| rename Date as "Date and Time"\
	| fields - count

