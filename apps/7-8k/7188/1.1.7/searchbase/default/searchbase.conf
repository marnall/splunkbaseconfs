[advanced_analysis_to_detect_potential_c2_beaconing_activity_in_dns_data]
search_name = Advanced Analysis to Detect Potential C2 Beaconing Activity in DNS Data
version = 1.0.3
date_created = 2025-05-05 13:02:26
date_updated = 2025-7-2 15:17:37
category = Threat Hunter's Cookbook
sub_category = Combined methods
tags = C2 Beaconing,DNS
solution = <p>Searching for clients that show a low variance in time between connections may indicate hosts are contacting C2 infrastructure on a predetermined time slot, e.g., every thirty seconds or every five minutes.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate the identified queries for known malicious patterns.<br><b>2.</b> Cross-reference against threat intelligence feeds.<br><b>3.</b> Monitor networks for similar activity.<br><b>4.</b> Implement blocking or mitigation strategies for identified C2 domains or IPs.<br><b>5.</b> Consider additional layers of anomaly detection to strengthen security posture.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>This solution aims to detect potential Command and Control (C2) beaconing activity by identifying DNS queries that exhibit a consistent time pattern. Using the <b>streamstats</b> command, it calculates the time gap between consecutive DNS queries for each unique query value. The <b>stats</b> command is then applied to compute the average time (AverageBeaconTime) and the variance in time (VarianceBeaconTime) between these queries.</p><p>By filtering results to include only those with a low variance (VarianceBeaconTime < 60) and a sufficient number of occurrences (count > 2), this query helps pinpoint queries that are made at regular intervals—potential indicators of automated C2 communication.</p>
quid = 008A9383213591227CAD09D64610BE41
search_author = Ryan Fetterman & Sydney Marrone
updated_author = khutchinson
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook-style structure. It provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. It includes tips-and-tricks for each method, and real-world implementation examples.</p></li></ul>
description = <p><b>Detect potential</b> Command and Control (C2) <b>beaconing activity</b> within DNS data by analyzing the time intervals between queries. This search <b>identifies</b> suspicious patterns that may indicate automated or scheduled communications, <b>valuable</b> for identifying potential threats.</p>
execution_plan = <b>01</b> <code>index="<<index>>" tag=dns message_type="QUERY"</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>fields _time, query</code><br>       - Keep only the fields needed for the next step or the final output.<br><b>03</b> <code>streamstats current=f last(_time) as last_time by query</code><br>       - Calculate running values based on event order.<br><b>04</b> <code>eval gap=last_time - _time</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>05</b> <code>stats count avg(gap) AS AverageBeaconTime var(gap) AS VarianceBeaconTime BY query</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>06</b> <code>eval AverageBeaconTime=round(AverageBeaconTime,3), VarianceBeaconTime=round(VarianceBeaconTime,3)</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>07</b> <code>sort -count</code><br>       - Sort the results so the highest-priority rows appear first.<br><b>08</b> <code>where VarianceBeaconTime < 60 AND count > 2 AND AverageBeaconTime>1.000</code><br>       - Filter the results to the records that match the final conditions.<br><b>09</b> <code>table query VarianceBeaconTime count AverageBeaconTime</code><br>       - Format the final output columns for review or dashboard use.<br>
search = index="<<index>>" tag=dns message_type="QUERY" \
| fields _time, query \
| streamstats current=f last(_time) as last_time by query \
| eval gap=last_time - _time \
| stats count avg(gap) AS AverageBeaconTime var(gap) AS VarianceBeaconTime BY query \
| eval AverageBeaconTime=round(AverageBeaconTime,3), VarianceBeaconTime=round(VarianceBeaconTime,3) \
| sort -count \
| where VarianceBeaconTime < 60 AND count > 2 AND AverageBeaconTime>1.000 \
| table query VarianceBeaconTime count AverageBeaconTime

[all_indexes_not_explicitly_granted_to_a_role]
search_name = List of Active, Non-internal, Writable Indexes without Assigned Roles
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Access,Indexes
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
env_run = 2
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'rest' command is used to access the REST API endpoint '/servicesNS/-/-/data/indexes' to retrieve information about all indexes. The 'count=0' parameter is used to return all results.</ul><ul><b>02</b> The 'stats' command is used to calculate the maximum values of the 'isInternal', 'disabled', and 'isReadOnly' fields for each index (represented by 'title').</ul><ul><b>03</b> The 'fillnull' command is used to replace any null values in the results with zeros.</ul><ul><b>04</b> The 'where' command is used to filter the results to only include indexes that are not internal, not disabled, and not read-only.</ul><ul><b>05</b> The 'fields' command is used to keep only the 'title' field in the results.</ul><ul><b>06</b> The 'rename' command is used to rename the 'title' field to 'index'.</ul><ul><b>07</b> The 'join' command is used to combine the results with data from another REST API endpoint '/servicesNS/-/-/authorization/roles'. The 'type=left' parameter is used to keep all records from the original results and only include matching records from the second dataset.</ul><ul><b>08</b> The 'fields' command is used to keep only the 'title' and 'srchIndexesAllowed' fields from the second dataset. The 'rename' command is used to rename these fields to 'role' and 'index', respectively.</ul><ul><b>09</b> The 'mvexpand' command is used to split multi-value fields into separate records.</ul><ul><b>10</b> The 'where' command is used to filter out records where the 'index' field contains a wildcard character.</ul><ul><b>11</b> The 'search' command is used to filter out records where the 'role' field exists.</ul><ul><b>12</b> The 'fields' command is used to keep only the 'index' field in the final results.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to identify indexes that may not be properly configured or utilized. If an index is not associated with any roles, it may indicate that the data in the index is not being accessed or used. Similarly, indexes that are not internal, not disabled, and not read-only are typically expected to be in active use. If they are not, it may indicate a configuration issue or a need for data cleanup.</div></div>
quid = B25F6496E9E1626B6DE20F127723C968
search_author = GoSplunk: ItsJohnLocke
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/all-indexes-not-explicitly-granted-to-a-role" target="_blank">https://gosplunk.com/all-indexes-not-explicitly-granted-to-a-role</a></p>
description = <p>This query retrieves a list of indexes that are <b>not internal</b>, <b>not disabled</b>, <b>not read-only</b>, and do not have any <b>roles explicitly assigned</b>. It is designed to identify indexes that may need additional review to ensure proper permission configurations and operational usage.</p>
solution = <p>This query retrieves a list of indexes that are not internal , not disabled , not read-only , and do not have any roles explicitly assigned . The results can be used to prioritize investigation, validate expected behavior, and guide follow-up remediation or reporting.</p><p><b>Suggested Actions</b><br><b>1.</b> Review the highest-signal results first and confirm whether the pattern is expected.<br><b>2.</b> Correlate the findings with related hosts, users, systems, or sourcetypes.<br><b>3.</b> Compare the output with recent baselines to determine whether the behavior is new or recurring.<br><b>4.</b> Adjust filters, thresholds, or enrichment sources if the results need tuning.<br><b>5.</b> Use the output to drive follow-up investigation, alerting, or operational reporting.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
search = | rest /servicesNS/-/-/data/indexes count=0\
| stats max(isInternal) as internal, max(disabled) as disabled, max(isReadOnly) as readonly by title\
| fillnull\
| where internal=0 AND disabled=0 AND readonly=0\
| fields title\
| rename title as index\
| join index type=left [ rest /servicesNS/-/-/authorization/roles count=0 splunk_server=*\
| fields title,srchIndexesAllowed\
| rename srchIndexesAllowed as index title as role\
| mvexpand index\
| where NOT match(index,".*\\*.*") ]\
| search NOT role=*\
| fields index

[analyze_dns_query_volume_and_packet_size_for_exfiltration]
search_name = Analyze DNS Query Volume and Packet Size for Exfiltration
version = 1.0.3
date_created = 2025-05-05 13:04:33
date_updated = 2025-7-2 15:18:21
category = Threat Hunter's Cookbook
sub_category = Combined methods
tags = DNS,Packet Size
solution = <p>Unusually large DNS queries may indicate that data is being encoded and sent out through DNS requests. This query expands multi-value query fields, calculates their lengths, and aggregates them by source and query length to pinpoint suspicious activity. Key SPL features like <code>mvexpand</code> and <code>stats</code> streamline the detection of potential exfiltration events.</p><p><b>Suggested Actions</b><br><b>1.</b> Identify the source systems (src) responsible for high query volumes and lengths.<br><b>2.</b> Investigate the context of the suspicious DNS traffic through packet capture or logs.<br><b>3.</b> Review the encoding scheme of these DNS queries to assess the likelihood of data exfiltration.<br><b>4.</b> Patch or limit DNS resolver configurations to mitigate misuse.<br><b>5.</b> Increase monitoring of flagged systems for additional indications of malicious behavior.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
explanation = <p>This search is crucial for detecting potential DNS-based threats, such as exfiltration attempts where data is hidden in DNS query payloads. By leveraging the <code>mvexpand</code> command, the search expands multi-value fields of DNS queries and measures their length using <code>len(query)</code>. Aggregating this data with <code>stats</code> enables the identification of outliers in query size and frequency. The use of <code>head</code> focuses attention on the most suspicious activity, streamlining an analyst's workflow. Identifying these anomalies provides evidence to characterize possible data exfiltration paths and supports swift remediation measures.</p>
quid = B40FE196D6936AD6A50DEA6E91FBD720
search_author = Ryan Fetterman & Sydney Marrone
updated_author = khutchinson
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Analyze DNS Query Volume and Packet Size for Exfiltration</b> using <code>index="<<index>>" tag=dns message_type="QUERY"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
execution_plan = <b>01</b> <code>index="<<index>>" tag=dns message_type="QUERY"</code><br>       - Search the target data and apply the base filters needed for this use case.<br><b>02</b> <code>mvexpand query</code><br>       - Expand multivalue fields into separate events for downstream processing.<br><b>03</b> <code>eval queryLength=len(query)</code><br>       - Calculate derived fields used by later filters, scoring, or presentation steps.<br><b>04</b> <code>stats last(query) as sample count by queryLength, src</code><br>       - Aggregate the events into summary metrics for the fields in scope.<br><b>05</b> <code>sort -queryLength, count</code><br>       - Sort the results so the highest-priority rows appear first.<br><b>06</b> <code>table src queryLength count</code><br>       - Format the final output columns for review or dashboard use.<br><b>07</b> <code>head 1000</code><br>       - Apply the next SPL transformation needed to reach the final result set.<br>
search = index="<<index>>" tag=dns message_type="QUERY"\
| mvexpand query \
| eval queryLength=len(query) \
| stats last(query) as sample count by queryLength, src \
| sort -queryLength, count \
| table src queryLength count \
| head 1000

