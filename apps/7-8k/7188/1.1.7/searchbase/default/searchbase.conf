solution = <p>The results of this query highlight <b>access attempts</b> to file objects from Windows Security logs and make it easier to detect unusual activity over a 24-hour period.</p><p><b>Suggested Actions:</b><br><b>1.</b> Investigate users with uncommon or unexpected access to critical files.<br><b>2.</b> Cross-reference the hosts and timeframes of access with organizational working hours or other benchmarks.<br><b>3.</b> Monitor trends for repeated unauthorized patterns from specific users or hosts.<br><b>4.</b> Deploy alerts to flag access events from high-risk users or hosts in real time.<br><b>5.</b> Update access controls and review group policies to ensure least privilege principles are adhered to where discrepancies occur.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="*WinEventLog" source="*WinEventLog:Security" EventCode=560 Object_Type=File</code><br>       - Extract relevant security log events related to file object access.<br><b>02</b> <code>eval Date=strftime(_time, "%Y/%m/%d")</code><br>       - Format the event timestamp for easier grouping by date.<br><b>03</b> <code>eval UserName=coalesce(Primary_User_Name, Client_User_Name)</code><br>       - Identify the responsible user by combining available user fields.<br><b>04</b> <code>search UserName!="*$" AND UserName!="NETWORK SERVICE"</code><br>       - Exclude irrelevant or system-level user accounts to focus on actionable data.<br><b>05</b> <code>stats count by Date, Image_File_Name, UserName, Type, host</code><br>       - Aggregate event details to show summarized access per user, date, and host.<br><b>06</b> <code>sort - Date</code><br>       - Sort results by date in descending order.</br>
explanation = <p>By leveraging the events generated in Windows Security logs for access attempts (EventCode=560 for file objects), this search extracts the <b>UserName</b> (using the Primary or Client user fields), the <b>host</b>, and the accessed <b>file object type</b>. It uses <code>stats</code> to summarize events by <b>date</b>, <b>file name</b>, <b>user</b>, <b>type</b>, and <b>host</b>, ensuring clear visibility into patterns of file access activity.</p><p>This is useful for system administrators and security teams to monitor for any unexpected access events, such as files being accessed by unusual users/hosts or during anomalous timeframes. Including essential context like the <b>Date</b> and <b>host</b> makes this highly actionable for forensic investigations.</p>
quid = DB7FCE69449F7164E4931CC6DBAA2F72
search_author = grdhg24
updated_author = khutchinson
description = <p>This search provides insights into <b>security-related file access events</b> by user, date, and host from Windows Security logs. It helps in identifying <b>unauthorized access attempts</b> or anomalous behavior by tracking access patterns and investigating misuses or potential breaches.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index="<<index>>" sourcetype=*WinEventLog source=*WinEventLog:Security EventCode=560 Object_Type=File\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| eval UserName=coalesce(Primary_User_Name, Client_User_Name)\
	| search UserName!="*$" AND UserName!="NETWORK SERVICE"\
	| stats count by Date, Image_File_Name, UserName, Type, host\
	| sort - Date

