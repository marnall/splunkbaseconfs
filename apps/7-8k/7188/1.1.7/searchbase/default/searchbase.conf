dispatch_context_force = 0
search_author = Splunk Searchbase Assistant
description = <p>This search calculates <b>average daily license usage</b> by <b>sourcetype</b> over the last week. This search must be run on the license manager. It normalizes usage by <b>host count</b> to show per-host impact. This helps identify noisy sourcetypes.</p>
explanation = <p>This search is valuable for administrators managing license consumption and ingestion growth. By averaging daily indexed volume over multiple days, it smooths out spikes and highlights consistent usage patterns. Normalizing by host count reveals sourcetypes that generate disproportionately high data per host, which can indicate misconfiguration or overly verbose logging. These insights support better onboarding decisions, filtering strategies, and more accurate license forecasting.</p>
execution_plan = <b>01</b> <code>index=_internal source=*license_usage.log type=Usage</code><br> - Pulls internal license usage telemetry that records indexed byte volume per sourcetype and host.<br><b>02</b> <code>| bin _time span=1d</code><br> - Buckets usage into daily intervals to support averaging across days.<br><b>03</b> <code>| stats average calculations</code><br> - Computes average daily volume and average host count per sourcetype.<br><b>04</b> <code>| eval per-host metrics</code><br> - Derives per-host daily averages to expose high-ingestion sourcetypes.<br>
solution = <p>This search provides a clear view of average daily license consumption by sourcetype and host.</p><p><b>Suggested Actions</b> Focus on sourcetypes with high per-host averages, review logging verbosity, apply filtering or parsing optimizations, and use the results to guide ingestion and license planning.</p><p><b>Recommended For You:</b><ul><li><a href="https://splunkbase.splunk.com/apps?page=1&keyword=license%20usage" target="_blank">Splunk Apps: Other Recommended Apps</a><br>Explore apps that help visualize and optimize Splunk license consumption.</li></ul></p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Help: License usage overview</a><br>Official documentation explaining how Splunk tracks indexed data volume.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/license-usage-report-view/troubleshoot-the-license-usage-report-view" target="_blank">Splunk Docs: License usage by sourcetype</a><br>Examples and patterns for breaking down license usage by data type.</li><li><a href="https://lantern.splunk.com/Search?q=License%20Management" target="_blank">Lantern: License management best practices</a><br>Guidance for managing ingestion growth and license compliance.</li><li><a href="https://community.splunk.com/t5/forums/searchpage/tab/message?q=%22license_usage.log%22" target="_blank">Community: license_usage.log analysis</a><br>Community discussions and examples for analyzing license usage logs.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Capacity planning</a><br>Guidance on forecasting Splunk data growth.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/indexing/indexes-and-indexers/how-indexes-work" target="_blank">Splunk Docs: Data ingestion optimization</a><br>Search patterns and recommendations for reducing ingestion volume.</li></ul>
search = index=_internal source="*license_usage.log" type="Usage" earliest=-7d@d latest=@d \
| fields b, st, h, _time, date_wday \
| eval h=if(len(h)=0 OR isnull(h),"(SQUASHED)",h) \
| bin _time span=1d \
| stats sum(b) AS b, dc(h) AS h by st date_wday \
| stats avg(b) as avg_b, avg(h) AS Host_Count_per_Day by st \
| eval Avg_MB_per_Day=round(avg_b/1024/1024,2) \
| eval Avg_GB_per_Day=round(avg_b/1024/1024/1024,2) \
| eval Avg_MB_per_Host=round(Avg_MB_per_Day/Host_Count_per_Day,2) \
| eval Host_Count_per_Day=round(Host_Count_per_Day,0) \
| rename st AS Sourcetype \
| table Sourcetype, Avg_MB_per_Day, Avg_GB_per_Day, Host_Count_per_Day, Avg_MB_per_Host \
| sort Sourcetype

