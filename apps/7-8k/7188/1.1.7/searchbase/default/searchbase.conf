explanation = <p>This search analyzes the performance characteristics of user-initiated ad-hoc searches by aggregating detailed execution statistics grouped by the actual search string rather than saved search name.</p><p>By calculating success count, runtime distribution, and data processing metrics for each unique ad-hoc search pattern, administrators can identify frequently-run exploratory searches that would benefit from conversion to saved searches, detect inefficient search patterns that should be addressed through user training, and understand the typical resource consumption of interactive search activity.</p><p>The truncation of long search strings ensures readability while maintaining sufficient detail for pattern recognition.</p>
