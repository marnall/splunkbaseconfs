[repeated_unsuccessful_logon_attempts_in_linux_116]
search_name = Failed Linux Logon Attempts with Alert Levels by User and Date
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Security
sub_category = Access
tags = Access,SFU
solution = <p>This search identifies <b>failed login attempts</b> and categorizes them by severity, enabling proactive security monitoring.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate accounts with Critical or Warning alert levels.<br><b>2.</b> Correlate with authentication logs for context.<br><b>3.</b> Review source IPs for known malicious activity.<br><b>4.</b> Implement account lockout policies if not already in place.<br><b>5.</b> Set up alerts for high failure counts.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.cisco.com/site/us/en/products/security/secure-access/index.html" target="_blank">Products: Cisco Secure Access</a><br>Cisco Secure Access.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.splunk.com/en_us/products/enterprise-security-essentials.html" target="_blank">Products: Splunk Enterprise Security (ES)</a><br>Splunk Enterprise Security (ES).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = spgt_searchfu
dispatch_context_uid = 3648
execution_plan = <div class="diag-content-box"><div class="diag-content"><ol><ul><b>01</b> The 'index' and 'sourcetype' specify where the data is coming from. In this case, it's a specific index and the 'linux_secure' sourcetype, which contains secure logs from a Linux system.</ul><ul><b>02</b> The 'eval' function is used to convert the timestamp (_time) into a more readable format (YYYY/MM/DD).</ul><ul><b>03</b> The first 'rex' command extracts the hostname from each event.</ul><ul><b>04</b> The second 'rex' command extracts the status (success or failure) of the gdm authentication.</ul><ul><b>05</b> The third 'rex' command extracts the username.</ul><ul><b>06</b> The 'search' command filters for events where the status is 'failure'.</ul><ul><b>07</b> The 'stats' command counts the number of failures by date, user, and hostname.</ul><ul><b>08</b> The 'eval' command assigns an alert level based on the number of failures.</ul><ul><b>09</b> The 'sort' command sorts the results by the number of failures, in descending order.</ul><ul><b>10</b> The 'rename' commands rename the 'fails' field to 'Failed Logon Attempts' and the 'User' field to 'Account in Question' for clarity.}</ul></ol></div></div>
explanation = <div class="diag-content-box"><div class="diag-content">This query can be used to monitor for failed login attempts on a Linux system. It can help identify potential security threats, such as brute force attacks or unauthorized access attempts. By assigning an alert level, it can help prioritize incidents for investigation.</div></div>
quid = CB3FBFF01AB46F5D63BE2DEC45EDF88B
search_author = grdhg24
updated_author = khutchinson
description = <p>Summarizes <b>Failed Linux Logon Attempts with Alert Levels by User and Date</b> using <code>index="<<index>>" sourcetype=linux_secure</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
related_info = <ul><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/search-commands/abstract" target="_blank">Splunk Help: Overview of SPL search commands and categories</a><br>Overview of SPL search commands and categories.</li><li><a href="https://www.splunk.com/en_us/blog/learn/splunk-cheat-sheet-query-spl-regex-commands.html" target="_blank">Products: SPL cheat sheet covering queries, regex, and common commands</a><br>SPL cheat sheet covering queries, regex, and common commands.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/get-started/search-tutorial/9.3/part-2-uploading-the-tutorial-data/upload-the-tutorial-data" target="_blank">Splunk Help: Tutorial on uploading data into Splunk for search practice</a><br>Tutorial on uploading data into Splunk for search practice.</li></ul>
search = index="<<index>>" sourcetype=linux_secure\
	| eval Date=strftime(_time, "%Y/%m/%d")\
	| rex ".*:\d{2}\s(?<hostname>\S+)"\
	| rex "gdm\S+\sauthentication\s(?<status>\w+)"\
	| rex "\suser[^'](?<User>\S+\w+)"\
	| search status=failure\
	| stats count as fails by Date, User, hostname\
	| eval "Alert Level"=case (fails>=50, "Critical", fails<50 AND fails>=20, "Warning", fails<20, "Normal")\
	| sort - fails\
	| rename fails as "Failed Logon Attempts"\
	| rename User as "Account in Question"

[report_data_distribution_by_indexer_cluster_and_sourcetype]
search_name = Performance Monitor Process Events Count by Server and Host
version = 2.0.1
date_updated = 2024-2-4 13:29:30
search_hidden = 0
category = Splunk
sub_category = _internal
tags = Clustering,Indexes
solution = <p>This query allows users to monitor and analyze event distribution across Splunk indexers and hosts, ensuring that key performance metrics are easily visible and actionable.</p><p><b>Suggested Actions</b><br><b>1.</b> Investigate hosts with disproportionately high or low event counts compared to the average.<br><b>2.</b> Check indexer performance for clusters with an uneven distribution of event volume.<br><b>3.</b> Ensure that hosts sending no or limited data are not experiencing connectivity or configuration issues.<br><b>4.</b> Validate that the event count aligns with expected ingestion rates for the specified sourcetype.<br><b>5.</b> Use these insights to optimize load balancing and ingestion configurations.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/administer/admin-manual/9.4/welcome-to-splunk-enterprise-administration/meet-splunk-apps/app-deployment-overview" target="_blank">Splunk Help: Overview of deploying apps across Splunk environments</a><br>Overview of deploying apps across Splunk environments.</li><li><a href="https://www.splunk.com/en_us/solutions/data-optimization.html" target="_blank">Products: Splunk Data Optimization</a><br>Splunk Data Optimization.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>| tstats summariesonly=t dc(host) as num_hosts count as num_events where index="<<index>>" AND sourcetype="Perfmon:Process" by splunk_server sourcetype</code><br>       - Retrieve the distinct count of 'host' as 'num_hosts' and the total count of events as 'num_events' from the specified index and sourcetype, grouped by 'splunk_server' and 'sourcetype'.<br><b>02</b> <code>| table splunk_server num_hosts num_events</code><br>       - Display the 'splunk_server', 'num_hosts', and 'num_events' in a concise tabular format for easier analysis.<br><br>
explanation = <p>This search uses the <b>tstats</b> command with the <b>summariesonly</b> parameter to efficiently retrieve the distinct count of hosts ('num_hosts') and total event counts ('num_events') directly from accelerated data models, ensuring optimal search performance. By grouping the results based on 'splunk_server' and 'sourcetype', this search provides insights into how events are distributed across the indexer cluster. This is invaluable for identifying overloaded servers or hosts not sending data as expected. The final <b>table</b> format ensures the results are presented in an accessible, analyzable layout.</p>
quid = F4E00834346AB039EA6C40FBD042DE80
