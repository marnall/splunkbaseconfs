[top_users_by_failed_login_attempts_with_event_details]
search_name = Top Users by Failed Login Attempts with Event Details
version = 1.0.2
date_created = 2025-05-05 11:35:51
date_updated = 2025-7-2 14:49:19
category = Threat Hunter's Cookbook
sub_category = Sorting and Stacking
tags = Search-Time Analytics,Sorting Results
solution = <p>This query delivers clear insight into failed login trends, helping security analysts quickly identify user accounts with suspicious activity. The combination of aggregate statistics and raw event details ensures both an overview and a detailed understanding of each failed login, supporting precise incident response.</p><p><b>Suggested Actions</b><br><b>1.</b> Prioritize investigation of user accounts with the most failed login attempts.<br><b>2.</b> Cross-reference with other security alerts to identify potentially compromised accounts.<br><b>3.</b> Review host and timestamp details to detect patterns or anomalies.<br><b>4.</b> Use Splunk dashboards or alerts to monitor failed login trends in real time.<br><b>5.</b> Implement account lockout or other security controls where needed to prevent brute force attacks.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/splunk-cloud-platform.html" target="_blank">Products: Splunk Cloud Platform</a><br>Splunk Cloud Platform.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
execution_plan = <b>01</b> <code>search index="<<index>>" sourcetype=authentication status="failure"</code><br>       - Retrieves failed login attempt events from the specified index.<br><b>02</b> <code>| eventstats count AS total_failed_attempts by user</code><br>       - Calculates total failed login attempts for each user and appends this information, maintaining individual event visibility.<br><b>03</b> <code>| table _time user host status total_failed_attempts</code><br>       - Displays essential fields including event timestamps and the aggregated count.<br><b>04</b> <code>| sort - total_failed_attempts</code><br>       - Sorts the results to prioritize users with the highest number of failed login attempts.<br>
explanation = <p>This search is designed to highlight user accounts generating the most failed login attempts while preserving individual event details for thorough investigation. By using the <code>| eventstats</code> command, it calculates the total number of failed attempts per user and appends this total as a new field, <code>total_failed_attempts</code>, alongside the raw event data. This ensures that analysts can analyze trends without losing visibility into the originating events, such as timestamps, host information, and other contextual details.</p><p>Using <code>| sort</code>, the results are ordered by the <b>highest total_failed_attempts</b>, enabling analysts to prioritize investigations efficiently. Retaining original event details allows for targeted actions, like reviewing specific login attempts or cross-referencing with other anomalies observed in the system.</p>
quid = A9482BA3203366E11D94B5DF14D6F6D8
search_author = Ryan Fetterman & Sydney Marrone
related_info = <ul><li><a href="https://www.splunk.com/en_us/form/threat-hunters-cookbook.html" target="_blank">Download the Threat Hunter's Cookbook</a><p>The Threat Hunter’s Cookbook establishes a complete repertoire of data analysis methods for analysts to learn – taught in an easy-to-follow, cookbook style structure. The cookbook provides novel contributions to the discipline of threat hunting by organizing and defining core analysis methods like sorting, stacking, clustering, and grouping. Within each section, you’ll find detailed descriptions and tips-and-tricks for each method, guidance on how to consider and select the right approach, and real-world implementation examples to get you cooking with Splunk. Later sections introduce more advanced topics, like time-series analysis, applying machine learning techniques, pre-processing data for visualization, combining recipes, and implementing useful Splunk add-ons for cybersecurity data.</p></li></ul>
description = <p>Summarizes <b>Top Users by Failed Login Attempts with Event Details</b> using <code>index="<<index>>" sourcetype=authentication status="failure"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=authentication status="failure" \
	| eventstats count AS total_failed_attempts by user \
	| table _time user host status total_failed_attempts \
	| sort - total_failed_attempts

[top_visited_pages_in_iis_web_logs]
search_name = Top 20 Unique IIS Session IDs by Referrer Page with Visit Percentages
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,GoSplunk
solution = <p>This search highlights the most visited pages on an IIS server, enabling web administrators to monitor traffic trends and user engagement. By correlating this data with specific referrer URLs, administrators can interpret the impact of external links, optimize high-traffic pages, and identify underperforming sections.</p><p><b>Suggested Actions</b><br><b>1.</b> Focus optimization efforts on top-performing pages to retain user engagement.<br><b>2.</b> Investigate sources for top referrers to maintain or enhance traffic.<br><b>3.</b> Use visit percentages to allocate content resources accordingly.<br><b>4.</b> Verify navigational paths on underperforming pages for improvement.<br><b>5.</b> Regularly monitor changes in the top-visited list to adjust strategies as needed.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/log-observer-connect.html" target="_blank">Products: Splunk Log Observer Connect</a><br>Splunk Log Observer Connect.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype="iis" cs_Referer!="-"</code><br>       - Search for IIS events with a 'cs_Referer' field that is not empty.<br><b>02</b> <code>| dedup 20 JSESSIONID</code><br>       - Limit results to the first 20 unique 'JSESSIONID' values.<br><b>03</b> <code>| top limit=21 cs_Referer</code><br>       - Identify the top 21 most frequent 'cs_Referer' values.<br><b>04</b> <code>| addtotals col=t labelfield=change_name label=Total</code><br>       - Add a 'Total' field to calculate the cumulative visit count for each page.<br><b>05</b> <code>| fields - Total</code><br>       - Exclude the 'Total' field from the results.<br><b>06</b> <code>| eval percent = round(percent,2) . " %"</code><br>       - Calculate and format the percentage of total visits for each page.<br><b>07</b> <code>| rename count as Visits</code><br>       - Rename 'count' to 'Visits' for better clarity.<br><b>08</b> <code>| rename percent as "% Visits"</code><br>       - Rename 'percent' to '% Visits' for readability.<br><b>09</b> <code>| rename change_name as "Subtotal for rows 1-20"</code><br>       - Change the 'change_name' field to 'Subtotal for rows 1-20' for summary purposes.<br><b>10</b> <code>| fields cs_Referer, "Subtotal for rows 1-20", Visits, "% Visits"</code><br>       - Retain only key fields for the final output.<br><b>11</b> <code>| sort - Visits</code><br>       - Order results in descending order by 'Visits.'<br><b>12</b> <code>| rename cs_Referer to Page</code><br>       - Rename 'cs_Referer' to 'Page' for an intuitive label.<br>
explanation = <p>This search identifies user interaction on an IIS server by analyzing web requests with referrer information. By leveraging fields like 'cs_Referer' and 'JSESSIONID,' it helps determine the most visited pages and calculates their share of total visits. The deduplication, aggregation, and calculation steps contribute to actionable insights for understanding website popularity and user preferences.</p>
quid = D5C58E83356A539D48DD1D870664D20A
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/top-visited-pages-in-iis-web-logs" target="_blank">https://gosplunk.com/top-visited-pages-in-iis-web-logs</a></p>
description = <p>Summarizes <b>Top 20 Unique IIS Session IDs by Referrer Page with Visit Percentages</b> using <code>index="<<index>>" sourcetype="iis" cs_Referer!="-"</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype="iis" cs_Referer!="-"\
| dedup 20 JSESSIONID\
| top limit=21 cs_Referer\
| addtotals col=t labelfield=change_name label=Total\
| fields - Total\
| eval percent = round(percent,2) . " %"\
| rename count as Visits\
| rename percent as "% Visits"\
| rename change_name as "Subtotal for rows 1-20"\
| fields cs_Referer, "Subtotal for rows 1-20", Visits, "% Visits"\
| sort - Visits| rename cs_Referer to Page

[total_hits_on_least_active_day_in_iis]
search_name = Least Active Day Hits Count in IIS Logs
version = 1.0.1
date_updated = 2023-12-13 8:17:20
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Access,GoSplunk
solution = <p>Identifying the least active day from IIS logs provides administrators with a <b>clear perspective</b> of low-traffic periods, which can be planned for activities like <b>system maintenance</b> or resource optimization. Such insights enhance efficiency and minimize impact on user experience.</p><p><b>Suggested Actions</b><br><b>1.</b> Verify the low-activity period aligns with expected trends, such as weekends or holidays.<br><b>2.</b> Schedule server maintenance or updates during low-usage windows to reduce disruption.<br><b>3.</b> Investigate potential underlying reasons for periods of low traffic, ensuring no issues are overlooked.<br><b>4.</b> Monitor for anomalies such as extended low activity, indicating possible configurations or user engagement problems.<br><b>5.</b> Use these findings to benchmark future server activity trends.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products/infrastructure-monitoring.html" target="_blank">Products: Splunk Infrastructure Monitoring</a><br>Splunk Infrastructure Monitoring.</li><li><a href="https://lantern.splunk.com/Get_Started_with_Splunk_Software/Getting_started_with_Splunk_Enterprise_Security" target="_blank">Lantern: Getting Started with Splunk Enterprise Security</a><br>Getting Started with Splunk Enterprise Security.</li><li><a href="https://www.cisco.com/site/us/en/products/networking/software/internet-cloud-intelligence/index.html" target="_blank">Products: Cisco ThousandEyes</a><br>Cisco ThousandEyes.</li><li><a href="https://help.splunk.com/en/splunk-enterprise/spl-search-reference/9.4/introduction/welcome-to-the-search-reference" target="_blank">Splunk Help: Introduction to the Splunk Search Reference documentation</a><br>Introduction to the Splunk Search Reference documentation.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index=<<index>> sourcetype=iis</code><br>       - Specifies the data source for the analysis, targeting events from IIS logs.<br><b>02</b> <code>| rare limit=1 date_mday</code><br>       - Identifies the least common (quietest) day based on event counts, returning one result due to <code>limit=1</code>.<br><b>03</b> <code>| rename count as Value</code><br>       - Renames the raw event count field to 'Value' for improved output clarity.<br><b>04</b> <code>| fieldformat Value=tostring(Value,"commas")</code><br>       - Formats the event count (Value) with commas to enhance readability.<br><b>05</b> <code>| eval Metric="Number of hits on least active date"</code><br>       - Adds a descriptive 'Metric' field to clearly define what the Value represents.<br><b>06</b> <code>| fields - date_mday, count, percent</code><br>       - Removes unneeded fields (date details, raw counts, percentages) that are not part of the final output.<br><b>07</b> <code>| fields Metric, Value</code><br>       - Retains only the key fields in the final table for concise and meaningful output.<br>
explanation = <p>This search enables administrators to pinpoint the day with the fewest requests on an IIS server. By focusing on rare events in the 'date_mday' field, the query emphasizes low-activity periods, which are crucial for planning maintenance tasks or analyzing server usage trends. Techniques include renaming fields like 'count' to 'Value' to improve output clarity and using <code>tostring()</code> for human-readable number formatting. Fields irrelevant to the final analysis are removed to streamline the output.</p>
quid = F38B1D536772EF1DEA8FB6221AD81F79
search_author = GoSplunk: SplunkNinja
updated_author = khutchinson
related_info = <p><a href="https://gosplunk.com/total-hits-on-least-active-day-in-iis" target="_blank">https://gosplunk.com/total-hits-on-least-active-day-in-iis</a></p>
description = <p>This query identifies the least active day in terms of hits on an IIS server, providing <b>valuable insights</b> into periods of low activity. The output is formatted for <b>readability</b>, making it easier to interpret the data and spot trends.</p>
search = index="<<index>>" sourcetype="iis"\
	| rare limit=1 date_mday\
	| rename count as Value\
	| fieldformat Value=tostring(Value,"commas")\
	| eval Metric="Number of hits on least active date"\
	| fields - date_mday, count, percent\
	| fields Metric, Value

