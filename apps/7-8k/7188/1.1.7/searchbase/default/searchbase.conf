solution = <p>Analyzing IIS logs with this query provides insights into browser distribution, crawler activity, and mobile device traffic. This information informs key decisions on optimizing for popular browsers, addressing crawler activity, and improving mobile user interfaces.</p><p><b>Suggested Actions</b><br><b>1.</b> Review popular browser and version trends to ensure compatibility and performance.<br><b>2.</b> Monitor the proportion of crawler traffic for insights into search indexing activity.<br><b>3.</b> Use the device distribution analysis to refine mobile site optimization.<br><b>4.</b> Address unusual spikes in crawler activity to mitigate potential bot-driven attacks.<br><b>5.</b> Leverage insights to align future development with user behaviors.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products.html" target="_blank">Products: Splunk Products (overview)</a><br>Splunk Products (overview).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=iis</code><br>       - Targets log data from IIS servers.<br><b>02</b> <code>| dedup JSESSIONID</code><br>       - Ensures uniqueness by filtering duplicate sessions.<br><b>03</b> <code>| eval http_user_agent=urldecode(cs_User_Agent)</code><br>       - Decodes user agent strings for human-readable analysis.<br><b>04</b> <code>| lookup browscap_lookup_express http_user_agent OUTPUT ua_parent ua_crawler ua_ismobiledevice</code><br>       - Enriches data by mapping user agent strings to browser and device details.<br><b>05</b> <code>| rename ua_parent as Browser Name and Version ua_crawler as Crawler ua_ismobiledevice as Mobile Device</code><br>       - Clarifies field names for user-friendly results.<br><b>06</b> <code>| stats count by ua_parent ua_crawler ua_ismobiledevice</code><br>       - Aggregates session counts by browser, crawler, and device info.<br>
explanation = <p>This query provides operational insights by analyzing IIS logs and identifying session patterns. Specifically, it details the distribution of user sessions based on browser types and versions, highlights the proportion of crawlers (such as search engine bots), and determines the extent of mobile device usage among visitors. These findings can be used to improve SEO strategies, optimize performance for frequently used browsers or devices, and streamline mobile experiences. The use of the <code>lookup</code> command leverages the browscap data to enrich user agent information, while the <code>eval</code> command decodes relevant fields. Grouping and counting via <code>stats</code> provides a clear summary of usage across dimensions.</p>
quid = 97F12E7149FCC0A69E798233ED8B629B
search_author = GoSplunk: SplunkNinja
related_info = <p><a href="https://gosplunk.com/user-agent-browser-details-information-for-iis" target="_blank">https://gosplunk.com/user-agent-browser-details-information-for-iis</a></p>
description = <p>Summarizes <b>IIS Log Analysis: Unique Sessions by Browser, Crawler, and Mobile Device</b> using <code>index="<<index>>" sourcetype=iis</code>. It helps teams review patterns quickly and decide where follow-up is needed.</p>
search = index="<<index>>" sourcetype=iis\
| dedup JSESSIONID\
| eval http_user_agent=urldecode(cs_User_Agent)\
```| lookup browscap_lookup_express http_user_agent OUTPUT ua_parent ua_crawler ua_ismobiledevice\```

[user_agent_operating_system_info_for_web_traffic]
search_name = Count of Unique Sessions by Operating System
search_hidden = 0
category = Web Server
sub_category = Traffic
tags = Authentication,Users
solution = <p>This search provides actionable intelligence on operating system distributions among website visitors, enabling teams to focus on optimizing and supporting the most utilized platforms.</p> \
<p><b>Suggested Actions</b><br> \
<b>1.</b> Evaluate the data to determine which operating systems dominate your website traffic.<br> \
<b>2.</b> Cross-reference the distributions with known user personas or audience demographics.<br> \
<b>3.</b> Prioritize testing and feature optimizations for high-usage operating systems.<br> \
<b>4.</b> Identify uncommon or obsolete systems for potential deprecation of support.<br> \
<b>5.</b> Incorporate findings into capacity planning and forecasting for different device/OS types.</p><p><b>Recommended For You:</b><ul><li><a href="https://www.splunk.com/en_us/products.html" target="_blank">Products: Splunk Products (overview)</a><br>Splunk Products (overview).</li><li><a href="https://help.splunk.com/en/splunk-enterprise/search/search-manual/9.4/search-overview/get-started-with-search" target="_blank">Splunk Help: Introductory guide to searching in Splunk</a><br>Introductory guide to searching in Splunk.</li><li><a href="https://www.cisco.com/site/us/en/products/security/duo/index.html" target="_blank">Products: Cisco Duo</a><br>Cisco Duo.</li><li><a href="https://www.splunk.com/en_us/customer-success/support-programs.html" target="_blank">Splunk Docs: Splunk Customer Support</a><br>Splunk Customer Support.</li></ul></p>
dispatch_earliest_time = -24h
dispatch_latest_time = now
dispatch_context = GoSplunk
execution_plan = <b>01</b> <code>index="<<index>>" sourcetype=iis</code><br> \
	- Specify IIS logs in the target index.<br> \
	<b>02</b> <code>dedup JSESSIONID</code><br> \
	- Remove duplicate rows based on unique session identifiers (JSESSIONID field).<br> \
	<b>03</b> <code>eval http_user_agent=urldecode(cs_User_Agent)</code><br> \
	- Convert encoded user agent strings into readable formats.<br> \
	<b>04</b> <code>lookup browscap_lookup_express http_user_agent OUTPUT ua_platform_description</code><br> \
	- Perform a lookup that maps user agent strings to descriptive operating system details.<br> \
	<b>05</b> <code>stats count by ua_platform_description</code><br> \
	- Count occurrences of each operating system.<br> \
	<b>06</b> <code>sort - count</code><br> \
	- Sort results in descending order of frequency, displaying the most-used OS at the top.<br>
explanation = <p>Understanding the operating system distribution among users can provide valuable insights for optimizing performance, troubleshooting issues, and deciding on platform support policies. This query leverages IIS logs and performs transformations to surface meaningful data:</p><br> \
	<p>- **Deduplication**: Ensures unique session tracking by eliminating duplicate JSESSIONID entries.<br> \
	- **User-Agent Decoding**: Extracts meaningful OS information from encoded user agent strings.<br> \
	- **Lookup Process**: Enriches the data by using a `browscap` lookup to resolve user agent details into OS descriptions.<br> \
	- **Statistical Analysis**: Summarizes the count by OS, enabling data-driven decisions on operational focus areas.<br> \
	This SPR query is designed for website traffic analysis within IIS environments, focusing on actionable insights from reliable session data.</p>
