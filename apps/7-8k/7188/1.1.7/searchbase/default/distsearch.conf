
[replicationBlacklist]
# Splunk < 9.0
sb_lookup_01 = ...searchbase/lookups/sb_*
sb_default_lookups = ...searchbase/lookups/*.csv.default
sb_server_conf = ...searchbase/default/server.conf
sb_bin = ...searchbase/bin...
sb_lib = ...searchbase/lib...
sb_pycache = ...searchbase/.../__pycache__/*
sb_js = ...searchbase/appserver/...

[replicationDenylist]
# Splunk 9.0+
sb_lookup_01 = ...searchbase/lookups/sb_*
sb_default_lookups = ...searchbase/lookups/*.csv.default
sb_server_conf = ...searchbase/default/server.conf
sb_bin = ...searchbase/bin...
sb_lib = ...searchbase/lib...
sb_pycache = ...searchbase/.../__pycache__/*
sb_js = ...searchbase/appserver/...
