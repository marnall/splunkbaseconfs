video = Admin Pilot for Splunk for Splunk Setup Screen|fvU-uNh1huY
description = <p>Welcome to the Admin Pilot for Splunk (AP4S)</p>\
<p>The Admin Pilot for Splunk (AP4S) tracks every aspect of the Splunk environment including:</p>\
<ul><li>User Login/Usage Tracking</li>\
<li>Knowledge Object Tracking (Dashboards, Macros, Eventtypes, Lookups, etc)</li>\
<li>Index License Usage Tracking</li>\
<li>Index Size Tracking</li>\
<li>Resource consumption (Real, SVC)</li>\
<li>Search performance</li>\
<li>KV store health</li>\
<li>Data source analysis</li></ul>
requirements =
compatibility = <ul><li>Splunk Enterprise</li>\
<li>Platform Version: 9.1, 9.0, 8.2, 8.1, 8.0</li>\
<li>CIM Version: 5.X, 4.X</li></ul>
contributors = Jim Donn, Tomas Chase, Dave Carmack, Atef Kouki, Kristofer Hutchinson, AK Khamis
details = <p><b>Prerequisites:</b></p>\
<h4>Cloud & On-Prem:</h4>\
<p>Please install the following Apps on the same Cloud Search Head or Search Head Cluster you are intending to install and use Admin Pilot for Splunk:</p>\
<ol><li>Splunk App for Lookup File Editing</li>\
<li>Splunk Machine Learning Toolkit</li></ol>\
<p>Please note that you must install the Python for Scientific Computing Add-on before installing the Machine Learning Toolkit. Please download and install the appropriate version here:</p>\
<ul><li>Mac: https://splunkbase.splunk.com/app/2881/</li>\
</li>Linux 64-bit: https://splunkbase.splunk.com/app/2882/</li>\
</li>Windows 64-bit: https://splunkbase.splunk.com/app/2883/</li></ul>\
<h4>On-Prem:</h4>\
<ul><li>The On-Prem Monitoring Console must be able to:\
<ol><li>Search all production indexer clusters (customer may have more than one).</li>\
<li>Configured to monitor all search heads (all stand alone and search head cluster members)</li>\
<li>Configured to monitor all heavy forwarders (optional) - These should be configured as the Indexer role to ensure that index pipeline queues are visible. Note: You can deploy the Admin Pilot for Splunk for DS & HF to the DS’s & HFs.</li>\
<li>Any Splunk Enterprise instance in the customer environment should ideally be configured to show in the Monitoring Console</li></ol></li></ul>\
<h4>Installation</h4>\
<ul><li><b>Cloud:</b>\
<ul><li>Install the Admin Pilot for Splunk on the search head cluster and all standalone search heads.</li></ul></li>\
<li><b>On-Prem:</b>\
<ul><li>Installation should be done on a dedicated Search Head for the entire enterprise.</li></ul></li></ul>\
<p>Customers should have existing Monitoring Console in place and configured, if not, configure a standalone search head as a Splunk Monitoring Console according to best practices and then proceed by configuring the dedicated Admin Pilot for Splunk SH.</p>\
<h4>Admin Pilot for Splunk Index Creation:</h4>\
<ul><li><b>Cloud:</b>\
<ol><li>Login to any search head or search head cluster and create a new index:</li>\
<li>Index name: ap4s_summary</li>\
<li>Searchable Time: 400 Days</li>\
<li>Additional Storage: None</li></ol></li>\
<li><b>On-Prem:</b>\
<ol><li>Login to the cluster manager and create a new index:</li>\
<li>Index name: ap4s_summary</li>\
<li>Searchable Time: 400 Days</li></ol>\
<ul><li>Note for On-Prem customers:</li></ul></li></ul>\
<p>If you have multiple Splunk environments that are separated physically and have its own dedicated Splunk Monitoring Console, Splunk Cluster Manager etc.., you can create a dedicated index for each using this example:</p>\
<ul><li>Env1: ap4s_summary_env1</li>\
<li>Env2: ap4s_summary_env2</li>\
This will keep the data isolated at first and on the Admin Pilot for Splunk enterprise Search Head, all of the data from all of the summary indexes will be combined.</li></ul>\
<p>Please be sure to use the naming convention in Appendix C - Monitoring Console Custom Groups Naming Convention</p>\
<h4>Admin Pilot for Splunk Data Collection Configuration</h4>\
<ul><li>Got to https://splunkbase.splunk.com/app/6489 and watch this video: https://youtu.be/fvU-uNh1huY also, scroll to find the Admin Pilot for Splunk for Splunk Setup Screen screenshot.</li></ul>\
<p>Restore the Admin Pilot for Splunk 101 KV Store Database</p>\
<ul><li>watch this video: https://youtu.be/fvU-uNh1huY</li></ul>\
<h4>Setup the App identities</h4>\
<ul><li>Launch AP4S Setup and click on the Admin Pilot for Splunk Custom Identities Gen Job hyperlink.</li>\
<li>The template job called splunk_identities_custom_kv_store_lookup_gen you can use to map your identity fields to Admin Pilot for Splunk identities to help us expose how the various LOBs/SubLOBs, departments etc.. are using Splunk.</li>\
<li>The Most critical fields are: identity, emp_name, emp_type, emp_status, emp_title, emp_dep, emp_lob1, emp_city, emp_region1 & emp_country.</li></ul>

