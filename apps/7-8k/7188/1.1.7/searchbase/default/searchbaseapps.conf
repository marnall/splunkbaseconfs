video = Splunk App for Chargeback: App Walkthrough (Part 1)|-AhiQEcbds0,Splunk App for Chargeback: Mapping Business Hierarchy (Part 2)|xG7iHuc9log,Splunk App for Chargeback: Platform Optimization (Part 3)|rG6YOF3RW-Y
description = <p>Welcome to the Splunk App for Chargeback</p>\
<p>The Splunk App for Chargeback helps customers understand Splunk Virtual Compute (SVC) usage by business unit & department and uses the same exact SVC usage information provided in the customers stack Cloud Monitoring Console (CMC) App.</p>
details = <p><b>IMPORTANT NOTES:</b>\</p>\
<ol><li> The document is now part of the app located in the home dashboard.</li>\
<li> Please try installing the App on your own instead of requesting it to be installed for a better experience.  Simply browse for more Apps, search for chargeback and then click on Install next to the Splunk App for Chargeback.  See the document in the home page.</li>\
<li> Please watch the above videos to learn how to configure the app on your own.</li></ol>\
<b>Description</b>\
<p>Splunk App for Chargeback provides an easy-to-use experience to analyze how internal business units are leveraging Splunk.  The App provides the framework necessary for Chargeback and/or Showback use cases for:</p>\
<ol><li>. Splunk Virtual Compute (SVC)</li>\
<li> Dynamic Data: Active Searchable (DDAS)</li>\
<li> Dynamic Data: Active Archive (DDAA)</li>\
<li> Dynamic Data: Self-Storage (DDSS)</li>\
<li> SmartStore</li></ol>\
<b>The app provide the following functionally to all Splunk Cloud customers:</b>\
<ul><li> Framework for customers to build their own Chargeback and/or Showback models</li>\
<li> Means to determine how many SVCs are allocated to various business units, departments, and users in those departments [Accounting].</li>\
<li> Means to automatically determine how Splunk Cloud stack resources are being used by the various business units [Utilization].</li>\
<li> Ability to drill-down and break down the usage starting at the highest level in the business all the way down to the user level</li>\
<li> Ability to forecast SVC usage for the entire organization and by business unit using Splunk Machine Learning</li>\
<li> Accurately maintained up-to-date list of identities along with corresponding Business Unit & Department information by way of indexing the data from a source like DB Connect or Active Directory</li></ul>\
<b>ODS Support</b>\
<ul><li>You can open an ODS request under task Install/Configure App or TA/Add-On in the support portal (https://www.splunk.com/pdfs/professional-services/splunk-ondemand-services-portal.pdf). Select after choosing Pick your Product = Splunk Core - Enterprise/Splunk Cloud. Enter under the subject/description that you need help configuring the Splunk App for Chargeback specifically.</li></ul>
requirements =
compatibility = <ul><li>Splunk Enterprise</li>\
<li>Platform Version: 9.1, 9.0, 8.2, 8.1</li>\
<li>CIM Version: 5.X</li></ul>
contributors = Tomas Chase, Dave Carmack, Atef Kouki, Kristofer Hutchinson, AK Khamis, Jim Donn

