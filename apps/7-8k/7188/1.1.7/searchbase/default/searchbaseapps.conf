description = <p>Welcome to the Splunk Cloud Migration Assessment App</p>\
<p>This app is designed for existing Splunk customers interested in migrating to Splunk Cloud, our Software as a Service (SaaS) solution. The app will assess your current Splunk Enterprise deployment that is running on-premises or in a bring your own license (BYOL) model and provide guidance for your migration to Splunk Cloud.</p>\
<br />\
<p>The high-level assessment captured by this app will also provide data points to help our Sales Engineering and PS Teams scope your migration efforts, implement best practices, and prioritize your migration success. For more detailed information on the compatibility of your apps, use the Analysis Of SplunkBase Apps for Splunk.</p>\
<br />\
<p><b>Note:</b></p>\
<p>This App is self-documenting and will guide you through the experience. Be sure to follow the in-App guidance. The calculations in this app are meant to be directional and for educational purposes only. Results are not guaranteed.</p>\
<br />\
<p><b>Installation:</b></p>\
<p>This app can only evaluate the data that available in the search results. Therefore, this App should be installed on the Splunk Monitoring Console (MC). The MC should have access to all Splunk servers in your environment. This App is compatible with all versions of Splunk 6.5.x and above.</p>\
<br />\
<p><b>Quick & Dirty:</b></p>\
<p>Sometimes it is hard to get an App installed, or you might want to do some covert investigations. To initiate these discussions with your Splunk Account team, run the following search from your Monitoring Console (MC) and save the results. It is not nearly a complete assessment, but if we can only get the results from one search, this is it:</p>\
details = <ul><li>Introduction of Rapid Application Deployer (RAD) Beta\
<ul><li>Bulk migration of validated private applications</li>\
<li>Bulk migration of supported SplunkBase applications (With selectable version)</li>\
<li>Migration of local configurations and dashboards</li>\
<li>Migration of local configuration for core apps (e.g., search)</li>\
<li>ACL migration</li>\
</ul></li><li>Introduction of ACS Helper Beta : A simple UI in front of ACS services :\
<li>List, Delete Applications for a Splunk Cloud Stack</li>\
<li>Configure IP allow list</li>\
<li>Configure outbound ports</li>\
<li>Manage Indexes</li>\
<li>Manage HTTP Event Collector (HEC) tokens</li>\
<li>View maintenance windows</li>\
<li>Manage restarts</li></ul></li></ul>
requirements =
compatibility = <ul><li>Splunk Enterprise</li>\
<li>Platform Version: 10.0, 9.3, 9.2, 9.1, 9.0, 8.2, 8.1, 8.0, 7.3, 7.2, 7.1, 7.0</li>\
<li>CIM Version: 6.X, 5.X, 4.X, 3.X</li></ul>
contributors = Splunk Field Solutions Development team.

