[cache]
# Maximum number of metric-space index objects to retain per persistent Python worker
# (LRU eviction when exceeded). Lower on memory-constrained search heads if needed.
# Changes are picked up on the next REST request after the file is updated
# (e.g. via `splunk reload search_similarity` or a deploy). No splunkd restart
# is required.
max_index_cache_entries = 1000
