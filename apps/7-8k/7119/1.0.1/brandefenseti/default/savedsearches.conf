
[Brandefense - Domain Lookup Update]
action.analyzeioc.param.verbose = 0
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */30 * * * *
dispatch.earliest_time = -4h@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
enableSched = 1
request.ui_dispatch_view = search
search = `bdef_threats` type=domain \
| eval date= substr(last_seen, 1,10)\
| strcat module " - " category description \
| rename data as domain \
| inputlookup append=t brandefense_threat_domain \
| dedup domain \
| `bdef_threat_excludes` \
| table date, description, domain \
| outputlookup brandefense_threat_domain

[Brandefense - Hash Lookup Update]
action.analyzeioc.param.verbose = 0
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */30 * * * *
dispatch.earliest_time = -4h@m
dispatch.latest_time = now
enableSched = 1
search = `bdef_threats` type=hash_* \
| eval date= substr(last_seen, 1,10)\
| rename data as file_hash \
| fillnull value="Malware" extras.Listingreason \
| strcat data_source_type " - " extras.Listingreason description \
| inputlookup append=t brandefense_threat_hash \
| dedup file_hash \
| `bdef_threat_excludes` \
| table date,description,file_hash \
| outputlookup brandefense_threat_hash

