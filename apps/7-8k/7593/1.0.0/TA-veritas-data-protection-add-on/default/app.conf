# this add-on is powered by splunk Add-on builder
[install]
state_change_requires_restart = false
is_configured = false
state = enabled
build = 1

[launcher]
author = Veritas Technologies LLC
version = 1.0.0
description = This addon will provide easy way to integrate with Splunk server for managing and monitoring NetBackup/Alta view servers audit logs or events. It uses existing public APIs and push the fetched records into Splunk index periodically as per interval configured in the addon.

[ui]
is_visible = 1
label = Veritas Data Protection Add on
docs_section_override = AddOns:released

[package]
id = TA-veritas-data-protection-add-on

[triggers]
reload.addon_builder = simple
reload.ta_veritas_data_protection_add_on_account = simple
reload.ta_veritas_data_protection_add_on_settings = simple
reload.passwords = simple