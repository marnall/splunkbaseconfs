[Cortex XSOAR Incidents Synch - by update time - Lookup Gen]
action.email.useNSSubject = 1
action.keyindicator.invert = 0
action.makestreams.param.verbose = 0
action.nbtstat.param.verbose = 0
action.notable.param.verbose = 0
action.nslookup.param.verbose = 0
action.ping.param.verbose = 0
action.risk.forceCsvResults = 1
action.risk.param.verbose = 0
action.send2uba.param.verbose = 0
action.threat_add.param.verbose = 0
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 15 * * * *
description = Synchronize Cortex XSOAR Incidents with the cortex_xsoar_incidents KV-Store Lookup. Synch is done by modified time.
display.general.timeRangePicker.show = 0
enableSched = 1
search = | `xsoar_incidents(24h)`\
| eval _time = strptime(substr(created, 1, 19), "%Y-%m-%dT%H:%M:%S")\
| eval _key = id\
| outputlookup append=true key_field=_key cortex_xsoar_incidents