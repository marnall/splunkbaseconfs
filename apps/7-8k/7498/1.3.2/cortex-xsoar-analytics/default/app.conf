#
# Splunk app configuration file
#
[id]
name = cortex-xsoar-analytics
version = 1.3.2

[launcher]
author = Tudor Pascaru
description = The Cortex XSOAR Analytics Add-On for Splunk enables automatic ingestion of incidents from Cortex XSOAR into Splunk, specifically designed to enhance real-time reporting capabilities. It allows the creation of customizable dashboards and detailed reports, providing greater visibility into incident trends and metrics. This integration helps security teams manage incidents efficiently and make informed decisions based on comprehensive, up-to-date data.
version = 1.3.2

[package]
id = cortex-xsoar-analytics

[install]
is_configured = false

[ui]
is_visible = 1
label = Cortex XSOAR Analytics App for Splunk
setup_view = setup_page_dashboard

[triggers]
reload.cortex-xsoar-analytics = simple
