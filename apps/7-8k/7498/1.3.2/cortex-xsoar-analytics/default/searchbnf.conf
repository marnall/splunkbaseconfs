[xsoarsearch-command]
syntax = | xsoarsearch --created_earliest <string> --created_latest <string> --modified_earliest <string> --modified_latest <string> --query <string> --exclude_fields <string>
shortdesc = Command allows you to search for incidents in Cortex XSOAR directly from Splunk.\
              created_earliest -> Earliest creation time. Default: 24 hours.\
              created_latest -> Latest creation time. Default: 0 seconds.\
              modified_earliest -> Earliest modified time (Relative time is converted in UTC for SOAR Query).\
              modified_latest -> Latest modified time (Relative time is converted in UTC for SOAR Query).\
              query -> Cortex XSOAR query.  If it's not specified, it will be by default ''.\
              exclude_fields -> Fields to be excluded from output, in comma separated form. Labels will be always excluded.
description = Command allows you to search for incidents in Cortex XSOAR directly from Splunk.\
              created_earliest -> Earliest creation time. Default: 24 hours.\
              created_latest -> Latest creation time. Default: 0 seconds.\
              modified_earliest -> Earliest modified time.\
              modified_latest -> Latest modified time.\
              query -> Cortex XSOAR query.  If it's not specified, it will be by default ''.\
              exclude_fields -> Fields to be excluded from output, in comma separated form. Labels will be always excluded.
usage = public
example1 = | xsoarsearch --created_earliest 360day --created_latest 5min --modified_earliest 24h --modified_latest 1s --query status:Active --exclude_fields "labels,incidentduration"
comment1 = --exclude_fields will always exclude Cortex XSOAR context labels