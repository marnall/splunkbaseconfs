# Splunk Add-on for Cisco ISE Transforms.
# Splunkbase App: https://splunkbase.splunk.com/app/1915
[cisco-ise-extract-raw-message]
REGEX = (?:(?:\d+\s(\d+)\s(NOTICE|WARN|INFO|DEBUG|ERROR|FATAL))|(?:CISE_Alarm\s*\[?([^:\]]+)\]?\:\s([^:]+)\s*:)|(?:\d{10}\s\d\s\d)(?:.+?(?=\d+\s(?:NOTICE|WARN|INFO|DEBUG|ERROR|FATAL))(\d+)\s(\w+))?)\s+(.+)
FORMAT = MESSAGE_CODE::$1 x_status::$2 alarm_type::$3 alarm_description::$4 MESSAGE_CODE::$5 x_status::$6 raw_msg::$7

[cisco-ise-raw-message]
SOURCE_KEY = raw_msg
REGEX = (?:(?:(?:Response|OperationMessageText)\s*=\s*.+?})|(?:([^=:,;]+)\s*[=:]\s*"?([^{]*?(?=[;,]\s*[\w\-\\._\&\/\(\)\s]+[=:]|$|,$|"))[,;]?))
FORMAT = $1::$2
MV_ADD=true

[cisco-ise-operation-message-text]
SOURCE_KEY = raw_msg
REGEX = (OperationMessageText|Response)\s*=\s*(.+?})
FORMAT = $1::$2
MV_ADD=true

[cisco-ise-operation-counters]
REGEX = OperationCounters=Counter=([^:]+):([^,]+)
FORMAT = $1::$2

[cisco-ise-open-ssl-err-msg]
REGEX = \s*OpenSSLErrorMessage\s*=\s*(?<OpenSSLErrorMessage>[^,]+)

[cisco-ise-called-station-id]
REGEX = Called-Station-ID=\s*(?:(?<dest_mac>[a-fA-F\d\:\-]+)|(?<dest_ip>\d+\.\d+\.\d+\.\d+))[,:;]

[cisco-ise-calling-station-id]
REGEX = Calling-Station-ID=\s*(?:(?<src_mac>[a-fA-F\d\:\-]+)|(?<src_ip>\d+\.\d+\.\d+\.\d+))[,:;]

[cisco-ise-type]
REGEX = (?<server_type>CSCOacs|CISE)_(?<log_type>[^\s\[]+)

[cisco-ise-servername]
REGEX = \s(?<ise_servername>\S+?)\s*CISE_(?!Alarm)

[cisco-ise-action-failure-for-auth]
REGEX = ([Aa]uthentication\s+(?:\w+\s){1,6}failed|[Aa]uthentication[\s-][Ff]ailed|[Aa]uthorization[\s-][Dd]enied|[Aa]uthentication[\s-][Rr]ejected|[Cc]an't[\s-][Ff]ind[\s-][Aa]uthentication|[Cc]redentials[\s-][Rr]ejected|[Aa]uthentication:[Dd]ropping|[Ll]ogin[\s-][Ww]arning|[Ll]ogin[\s-][Ff]ailed|[Ff]ailed [Aa]uthentication)
FORMAT = action::failure vendor_action::$1

[cisco-ise-action-success-for-auth]
REGEX = ([Aa]uthorization[\s-][Ss]ucceeded|[Aa]uthentication[\s-][Ss]ucceeded|[Aa]uthorization[\s-][Pp]ermitted|[Aa]uthentication[\s-][Ss]uccessful|[Ll]ogin[\s-][Pp]ermitted|[Aa]uthentication[\s-][Pp]assed|[Pp]assed[\s-][Aa]uthentication)
FORMAT = action::success vendor_action::$1

[cisco-ise-vendor-action-for-auth]
REGEX = [Aa]uthentication[\s-]([Ss]ucceeded)|[Aa]uthorization[\s-]([Pp]ermitted)|[Aa]uthentication[\s-]([Ss]uccessful)|[Ll]ogin[\s-]([Pp]ermitted)|authentication[\s-]([Pp]assed)|([Pp]assed)[\s-][Aa]uthentication|[Aa]uthentication[\s-]([Ff]ailed)|[Aa]uthorization[\s-]([Dd]enied)|[Aa]uthentication[\s-]([Rr]ejected)|[Cc]an't[\s-]([Ff]ind)[\s-][Aa]uthentication|[Cc]redentials[\s-]([Rr]ejected)|[Aa]uthentication:([Dd]ropping)|[Ll]ogin[\s-]([Ww]arning)|[Ll]ogin[\s-]([Ff]ailed)|([Ff]ailed) [Aa]uthentication
FORMAT = cisco_ise_vendor_action::$1 cisco_ise_vendor_action::$2 cisco_ise_vendor_action::$3 cisco_ise_vendor_action::$4 cisco_ise_vendor_action::$5 cisco_ise_vendor_action::$6 cisco_ise_vendor_action::$7 cisco_ise_vendor_action::$8 cisco_ise_vendor_action::$9 cisco_ise_vendor_action::$10 cisco_ise_vendor_action::$11 cisco_ise_vendor_action::$12 cisco_ise_vendor_action::$13 cisco_ise_vendor_action::$14 cisco_ise_vendor_action::$15

[cisco-ise-action-blocked]
REGEX=([Cc]onnection[\s-]denied|[Dd]eny[\s-][Ii]nbound|[Dd]eny|Unable[\s-]to[\s-]Pre-allocate|[Dd]enied\s[tcp|udp|icmp]+|[Dd]iscarded|[Aa]ccess[\s-][Dd]enied|[Dd]ropped|[Dd]ropping)
FORMAT = vendor_action::$1

[cisco-ise-action-allowed]
REGEX = ([Bb]uilt|[Pp]ermitted|[Ww]hitelist|[Pp]re-allocated|[Rr]ebuilt)
FORMAT = vendor_action::$1

[cisco-ise-action-unknown]
REGEX = ([Rr]edirected|[Ll]imit[\s-][Ee]xceeded)
FORMAT = vendor_action::$1

[cisco-ise-tunnel-private-group-id]
REGEX = \sTunnel-Private-Group-ID=(\((?<Tunnel_Private_Group_ID_tagged>\S+)\)\s)?(?<Tunnel_Private_Group_ID>\S+)(,|;)
MV_ADD = true

[cisco-ise-message-catalog-lookup]
filename = cisco_ise_message_catalog_420.csv

[cisco-ise-change-lookup]
filename = cisco_ise_change_message_code_420.csv

[cisco-ise-service-lookup]
filename = cisco_ise_service.csv

[cisco-ise-sourcetype]
DEST_KEY = MetaData:Sourcetype
REGEX = (?:CSCOacs|CISE)_
FORMAT = sourcetype::cisco:ise:syslog

[sourcetype_sdwan_system_logs]
DEST_KEY = MetaData:Sourcetype
REGEX = .*
FORMAT = sourcetype::cisco:sdwan:system:logs

[cisco-ise-service-58001]
REGEX = (?<service_id>58001)(?:.*)OperationMessageText\s*=(.*?)(?=[Ss]tarted)
FORMAT = service_id::$1 service::$2

[cisco-ise-wifi-connect]
SOURCE_KEY = Connect_Info
REGEX = CONNECT\s+(?P<bandwidth>[\d\.]+)(?:.*?)Mbps(?:.*?)(?P<wifi_type>[\w\d\.]+)(?:.*?)RSSI:\s*(?P<rssi>\d+)(?:.*?)Channel:\s*(?P<channel>\d+)

[cisco-ise-host]
SOURCE_KEY = _raw
REGEX = Class=CACS:[^:]+:(?P<ise_host>[^:/\s]+)

[cisco-ise-security-group-tag]
SOURCE_KEY = _raw
REGEX = cisco-av-pair=cts:security-group-tag=(?<security_group_tag>\d{4})

[cisco_ise_field_action]
REGEX  = \baction\s*=\s*"([^"]*)"|\baction\s*=\s*([^\;\,]*)\s*
FORMAT = cisco_ise_action::$1 cisco_ise_action::$2

[cisco-ise-traffic-ports-hosts]
REGEX = (?:61025.*?)OperationMessageText=\s*\d+\s*Connection\s*requested\s*(?:(?<src_ip>[\d\.]+)|(?<src_host>[^\(]+))\((?<src_port>\d+)\)\s*-\s*(?:(?<dest_ip>[\d\.]+)|(?<dest_host>[^\(]+))\((?<dest_port>\d+)\)

[cisco-ise-traffic-fields-61025-created-connection]
REGEX = (?:61025.*?)OperationMessageText=Connection\s*created\s*from\s*(?:(?<src_ip>[\d\.]+)|(?<src_host>[^\(]+))\:(?<src_port>\d+)\s*to\s*(?:(?<dest_ip>[\d\.]+)|(?<dest_host>[^\(]+))\:(?<dest_port>\d+)


# CCX Add-On for Splunk Transform.
[ccx_cisco_ise_x_app]
CLEAN_KEYS = 0
REGEX = cisco-av-pair\=AuthenticationIdentityStore\=(?<x_app>WesTrac_AD)\,

[cisco-ise-message-catalog-2024-lookup]
filename = cisco_ise_message_catalog_2024.csv


# Cisco Catalyst SD-WAN Add-on for Splunk Transforms.
# Splunkbase App: https://splunkbase.splunk.com/app/6656.
[set_sourcetype_with_only_type]
DEST_KEY = MetaData:Sourcetype
REGEX = \d{1,2}\s\d{1,2}:\d{1,2}:\d{1,2}.\d{1,3}:\s%(.\S+):
FORMAT = sourcetype::cisco:sdwan:$1

[set_sourcetype_with_type_and_subtype]
DEST_KEY = MetaData:Sourcetype
REGEX = \d{1,2}\s\d{1,2}:\d{1,2}:\d{1,2}.\d{1,3}:\s%(.\S+):.*TS:\d+\s%([^:]+)
FORMAT = sourcetype::cisco:sdwan:$1$2

[sourcetype_sess_audit_trail_start]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-6-SESS_AUDIT_TRAIL_START:
FORMAT = sourcetype::cisco:sdwan:session:audit:trail:start

[sourcetype_sess_audit_trail]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-6-SESS_AUDIT_TRAIL:
FORMAT = sourcetype::cisco:sdwan:session:audit:trail

[sourcetype_unblock_host]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-4-UNBLOCK_HOST:
FORMAT = sourcetype::cisco:sdwan:unblock:host

[sourcetype_block_host]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-2-BLOCK_HOST:
FORMAT = sourcetype::cisco:sdwan:block:host

[sourcetype_host_tcp_alert_on]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-4-HOST_TCP_ALERT_ON:
FORMAT = sourcetype::cisco:sdwan:host:tcp:alert:on

[sourcetype_alert_on]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-4-ALERT_ON:
FORMAT = sourcetype::cisco:sdwan:alert:on

[sourcetype_alert_off]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-4-ALERT_OFF:
FORMAT = sourcetype::cisco:sdwan:alert:off

[sourcetype_sessions_maximum]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-4-SESSIONS_MAXIMUM:
FORMAT = sourcetype::cisco:sdwan:sessions:maximum

[sourcetype_pass_pkt]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-6-PASS_PKT:
FORMAT = sourcetype::cisco:sdwan:pass:pkt

[sourcetype_drop_pkt]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-6-DROP_PKT:
FORMAT = sourcetype::cisco:sdwan:drop:pkt

[sourcetype_log_summary]
DEST_KEY = MetaData:Sourcetype
REGEX = %FW-6-LOG_SUMMARY:
FORMAT = sourcetype::cisco:sdwan:log:summary

[sourcetype_platform_error]
DEST_KEY = MetaData:Sourcetype
REGEX = %SMART_LIC-2-PLATFORM_ERROR:
FORMAT = sourcetype::cisco:sdwan:smart:lic:platform:error

[sourcetype_write_fail]
DEST_KEY = MetaData:Sourcetype
REGEX = %DMI-3-CLI_ENGINE_WRITE_FAIL:
FORMAT = sourcetype::cisco:sdwan:dmi:cli:engine:write:fail

[sourcetype_utd_logs]
DEST_KEY = MetaData:Sourcetype
REGEX = \[\*\*\].*\[\*\*\].*\[\*\*\].*->
FORMAT = sourcetype::cisco:sdwan:utd:logs

[utd_key_value_fields_with_brackets]
REGEX = \s\[([^\[\]:]*):\s([^\]]*)\]
FORMAT = $1::$2

[utd_key_value_fields]
REGEX = [\s|\{]([\w.:\/]+):\s(.*?(?=(?:\s[\w.:\[\]\/\|]+:|$)))
FORMAT = $1::$2

[cisco_sdwan_sgacl_sourcetype]
DEST_KEY = MetaData:Sourcetype
REGEX = (?:%RBM-6-SGACLHIT):
FORMAT = sourcetype::cisco:sgacl:logs

[cisco_sdwan_audit_sourcetype]
DEST_KEY = MetaData:Sourcetype
REGEX = (?:vManage java)
FORMAT = sourcetype::cisco:sdwan:audit:logs

[cisco_sdwan_acl_sourcetype]
DEST_KEY = MetaData:Sourcetype
REGEX = (?:inbound-acl)
FORMAT = sourcetype::cisco:sdwan:acl:logs

[audit_key_value_fields]
REGEX = (?:([^=:,;]+)\s*[=:]\s*"?([^{]*?(?=[;,]\s*[\w\-\\._\&\/\(\)\s]+[=:]|$|,$|"))[,;]?)
FORMAT = $1::$2

[audit_audit_details_fields]
REGEX = (?<audit_details>"auditdetails":\s*\[([^\]]+)\])

[acl_key_value_fields]
REGEX = [\s|\{]([\w.:\-\/]+):\s(.*?(?=(?:\s[\w.:\-\[\]\/\|\s\,]+:|$)))
FORMAT = $1::$2

[acl_device_ip_address]
REGEX = \S{3}\s+\d{1,2}\s+\S+\s+(?<acl_device_ip_address>[0-9]{1,3}(?:\.[0-9]{1,3}){3})

[sgacl_key_value_fields]
REGEX = (?<=\s|^)([\w-]+)\s*=\s*'([^']+)'(?=\s|$)
FORMAT = $1::$2

