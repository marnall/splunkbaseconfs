[whatchanged-command]
syntax = whatchanged <old_blob> <new_blob>
shortdesc = Identify what fields are different between <old_blob> and <new_blob>
description = Identify what fields are different between <old_blob> and <new_blob>. Blobs are multivalues formatted as "key:value". The fields has_changed and modified_fields are outputted.
usage = public
example1 = whatchanged old_blob new_blob

