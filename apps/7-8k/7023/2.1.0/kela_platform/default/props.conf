
[kela:monitor]
EVAL-body = "KELA Alert of type " . case(kela_type="hacking_discussions","Hacking Discussions", kela_type="instant_messaging", "Instant Messaging", kela_type="leaked_credentials", "Leaked Credentials", kela_type="network_vulnerabilities", "Network Vulnerabilities", kela_type="credit_cards", "Credit Cards", kela_type="botnets", "Compromised Accounts", 1=1, "Special") . " | Severity: " . case(kela_severity=1, "Low", kela_severity=2, "Medium", kela_severity=3, "High", kela_severity=4, "Critical")
EVAL-description = "KELA Alert of type " . case(kela_type="hacking_discussions","Hacking Discussions", kela_type="instant_messaging", "Instant Messaging", kela_type="leaked_credentials", "Leaked Credentials", kela_type="network_vulnerabilities", "Network Vulnerabilities", kela_type="credit_cards", "Credit Cards", kela_type="botnets", "Compromised Accounts", 1=1, "Special") . " | Severity: " . case(kela_severity=1, "Low", kela_severity=2, "Medium", kela_severity=3, "High", kela_severity=4, "Critical")
EVAL-kela_type_name = case(kela_type="hacking_discussions","Hacking Discussions", kela_type="instant_messaging", "Instant Messaging", kela_type="leaked_credentials", "Leaked Credentials", kela_type="network_vulnerabilities", "Network Vulnerabilities", kela_type="credit_cards", "Credit Cards", kela_type="botnets", "Compromised Accounts")
EVAL-severity = case(kela_severity=1, "low", kela_severity=2, "medium", kela_severity=3, "high", kela_severity=4, "critical")
EVAL-signature = case(kela_type="leaked_credentials", "KELA have found credentials info regarding " . email . case(kela_source!="", " from " . kela_source, kela_source="", ""), kela_type="network_vulnerabilities", "KELA have found vulnerabillity info for ". case(port!="","port: ". port . " " , 1=1,"") . case(service!="", "(".service.") ", 1=1,"") . case(technology!="", "tech: " . technology, 1=1 ,""), kela_type="botnets", "KELA have found compromised account from " . resource, kela_type="credit_cards", "Kela have found a credit card of bin " . bin, kela_type="hacking_discussions", "KELA have found hacking discussion from " . kela_source,  kela_type="instant_messaging", "KELA have founc instant messaging from " . chat_name, 1=1, "KELA have found a cyber event")
EVAL-vendor_severity = case(kela_severity=1, "Low", kela_severity=2, "Medium", kela_severity=3, "High", kela_severity=4, "Critical")
FIELDALIAS-hostname = hostname AS dest
FIELDALIAS-severity_id = kela_severity AS severity_id
FIELDALIAS-vendor_account = kela_monitor_id AS vendor_account
FIELDALIAS-comments = title AS comments
FIELDALIAS-ticket_id = kela_id AS ticket_id
FIELDALIAS-user = username AS user
FIELDALIAS-dest_port = port AS dest_port
FIELDALIAS-dest_ip = ip AS dest_ip
FIELDALIAS-src_ip = kela_bot_ip AS src_ip
FIELDALIAS-cve = cve AS cve_details

# EVAL-action= "allowed"
# EVAL-app = "unknown"


