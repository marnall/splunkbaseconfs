[querykql-command]
syntax = querykql creds=<account> service=<service> query=<kql> [workspace_id=<workspace-id>] [app_id=<application-id>] [endpoint=<host>] [token_resource=<resource>] [timespan=<timespan>] [result_table=<index-or-name>] [timeout=<seconds>] [max_retries=<count>] [max_rows=<count>] [set_time=<bool>]
shortdesc = Run a KQL query against Azure Log Analytics, Application Insights, or Microsoft Defender Advanced Hunting and return rows as Splunk results.
description = The querykql command reads Azure client credentials from this app's configured accounts. Use service=defender with only creds, service, and query. Use service=log_analytics with workspace_id=<workspace-id>. Use service=app_insights with app_id=<application-id>. Optional endpoint and token_resource are advanced overrides; normally the endpoint comes from the stored account.
usage = public
example1 = | querykql creds=Azure_creds service=log_analytics workspace_id=00000000-0000-0000-0000-000000000000 query="Heartbeat | take 10"
example2 = | querykql creds=Azure_creds service=app_insights app_id=00000000-0000-0000-0000-000000000000 query="requests | take 10"
example3 = | querykql creds=Azure_creds service=defender query="DeviceEvents | take 10"
