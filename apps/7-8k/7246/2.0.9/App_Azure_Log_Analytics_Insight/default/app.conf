[install]
state_change_requires_restart = false
is_configured = false
state = enabled
build = 15

[launcher]
author = Kranthi Kanapala
version = 2.0.9
description = It allows users to easily ingest and analyze log data from Azure Log Analytics, AppInsight and MDE in their Splunk environment. It provides a seamless integration between Splunk and Azure Log Analytics , AppInsight and MDE, enabling users to gain insights, perform advanced analytics, and leverage Splunk's robust search and visualization capabilities on log data collected from Azure resources.

[id]
name = App_Azure_Log_Analytics_Insight
version = 2.0.9

[ui]
is_visible = 1
label = Azure KQL Bridge for Splunk
docs_section_override = AddOns:released
supported_themes = dark, light

[package]
id = App_Azure_Log_Analytics_Insight

[triggers]
reload.app_azure_log_analytics_insight_account = simple
reload.app_azure_log_analytics_insight_settings = simple
reload.passwords = simple
