###############################################################
# ENRICH INTERNAL LOGS OF AZURE LOG ANALYTICS INSIGHT ADDON.  #
###############################################################

[azure:kql:addon]
KV_MODE = json
SHOULD_LINEMERGE = false
category = IT Operations and SIEM
pulldown_type = 1
LINE_BREAKER = ([\r\n]+)
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true

EVAL-Addon_Name = "Azure Log Analytics-Insight Addon for Splunk"

############################################################
# EXTRACTIONS TO ENRICH KQL APP MESSEGING LOGS             #
############################################################

[azure:kql:Interprocessing]

KV_MODE = json
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TIME_PREFIX = \"TimeGenerated\"\:\s\"

EVAL-vendor = "Microsoft"
EVAL-product = "Azure SQL"
EVAL-vendor_product = "Microsoft Azure SQL"

############################################################
# EXTRACTIONS TO ENRICH KQL Authentication LOG             #
############################################################

[azure:kql:auth]

KV_MODE = json
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TIME_PREFIX = \"TimeGenerated\"\:\s\"

FIELDALIAS-dest = LogicalServerName_s AS dest
FIELDALIAS-signature = action_name_s AS signature
FIELDALIAS-signature_id = action_id_s AS signature_id
FIELDALIAS-src = client_ip_s AS src
FIELDALIAS-user = server_principal_name_s AS user

EVAL-action = case(action_name_s=="DATABASE AUTHENTICATION SUCCEEDED", "success", action_name_s=="DATABASE AUTHENTICATION FAILED", "failure")
EVAL-authentication_method = "Password"
EVAL-authentication_service = "Database Authentication Service"
EVAL-vendor_product = "Microsoft Azure SQL"
EVAL-vendor = "Microsoft"
EVAL-product = "Azure SQL"

############################################################
# EXTRACTIONS TO ENRICH KQL Change LOG                     #
############################################################

[azure:kql:change]

KV_MODE = json
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TIME_PREFIX = \"TimeGenerated\"\:\s\"

FIELDALIAS-command = statement_s AS command
FIELDALIAS-dest = host_name_s AS dest
FIELDALIAS-dvc = host_name_s AS dvc
FIELDALIAS-object = database_name_s AS object
FIELDALIAS-object_id = object_id_d AS object_id
FIELDALIAS-object_path = ResourceId AS object_path
FIELDALIAS-result = action_name_s AS result
FIELDALIAS-src = client_ip_s AS src
FIELDALIAS-user = server_principal_name_s AS user
FIELDALIAS-protocol = application_name_s AS protocol

EXTRACT-object_attrs = RESOURCEGROUPS\/(?<object_attrs>.+)\/PROVIDERS

EVAL-result_id = case(succeeded_s="true",1,succeeded_s="false",0)
EVAL-change_type = "database Structural Level"
EVAL-status = case(succeeded_s="true","success",succeeded_s="false","failure")
EVAL-vendor_product = "Microsoft Azure SQL"
EVAL-object_category = "SQL Database"

############################################################
# EXTRACTIONS TO ENRICH KQL WEB LOG                        #
############################################################

[azure:kql:web]

KV_MODE = json
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TIME_PREFIX = \"TimeGenerated\"\:\s\"

EXTRACT-group_name = "_ResourceId\":\s+\"(?:[^\/]*\/){4}(?<group_name>[^\/]+)

FIELDALIAS-src = CIp AS src
FIELDALIAS-bytes_in = CsBytes AS bytes_in
FIELDALIAS-http_method = CsMethod AS http_method
FIELDALIAS-uri_query = CsUriQuery AS uri_query
FIELDALIAS-uri_path = CsUriStem AS uri_path
FIELDALIAS-http_user_agent = UserAgent AS http_user_agent
FIELDALIAS-user = CsUsername AS user
FIELDALIAS-dest = CsHost AS dest_ip, CsHost AS dest, CsHost AS dvc
FIELDALIAS-bytes_out = ScBytes AS bytes_out
FIELDALIAS-status = ScStatus AS status
FIELDALIAS-response_time = TimeTaken AS response_time
FIELDALIAS-duration = TimeTaken AS duration
FIELDALIAS-cookie = Cookie AS cookie
FIELDALIAS-http_referrer = Referer AS http_referrer
FIELDALIAS-dest_port = SPort AS dest_port
FIELDALIAS-url_domain = CsHost AS url_domain
FIELDALIAS-category = Category AS category

EVAL-http_referrer_domain = mvindex(split(mvindex(split(Referer,"//"), 1),"/"),0)
EVAL-vendor = "Microsoft"
EVAL-product = "Azure SQL"
EVAL-vendor_product = "Microsoft Azure SQL"
EVAL-http_user_agent_length = len(http_user_agent)
EVAL-bytes = (bytes_in + bytes_out)
EVAL-url_length = len(if((isnotnull(case(match(cs_version, "^HTTPS\/\S*"), "https", match(cs_version, "^HTTP\/\S*"), "http")) AND isnotnull(s_ip) AND isnotnull(SPort) AND isnotnull(CsUriStem) ), (case(match(cs_version, "^HTTPS\/\S*"), "https", match(cs_version, "^HTTP\/\S*"), "http")) . "://" . s_ip . ":" . SPort . CsUriStem . if(isnull(CsUriQuery) OR (CsUriQuery =="-"), "", "?" + CsUriQuery), ""))
EVAL-http_referer_hostname = replace(replace(replace(http_referer_domain, "http(s|):\/\/", ""), "^(www|m|uk|r|l|tpc|lm)\.+", ""), "(\.{1}[a-zA-Z]+)", "")
EVAL-url = if(SPort=="443", "https", "http") + "://" + CsHost + CsUriStem +"?"+ CsUriQuery
EVAL-action = case(match(status, "^[2]\d\d"), "allowed", match(status, "^[3]\d\d"), "redirected", match(status, "^[1]\d\d"), "informational", match(status, "^[4]\d\d"), "client error", match(status, "^[5]\d\d"), "server error", 1=1, "blocked")

############################################################
# EXTRACTIONS TO ENRICH KQL APP CHANGE LOG                 #
############################################################

[azure:kql:appchange]

KV_MODE = json
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TIME_PREFIX = \"TimeGenerated\"\:\s\"

EVAL-action = case(match(OperationNameValue,".*(write|Write|WRITE).*"),"created", match(OperationNameValue,".*(list|List|LIST).*"),"read", match(OperationNameValue,".*(regenerate|Regenerate|REGENERATE).*"),"updated", match(OperationNameValue,".*(delete|Delete|DELETE).*"),"deleted", match(OperationNameValue,".*(action|Action|ACTION).*"),"read")
EVAL-status = if(match(ActivityStatusValue,"Fail*"),"failure","success")
EVAL-vendor_product = "Microsoft Azure"
EVAL-protocol = "HTTP"
EVAL-Resource = case(isnull(Resource),"check authorization value",isnotnull(Resource),Resource)
EVAL-dest = case(isnull(Resource),"check authorization value",isnotnull(Resource),Resource)
EVAL-result = case(ActivityStatusValue=="Success", "success", ActivityStatusValue=="Succeeded", "success",ActivityStatusValue=="Start", "start", ActivityStatusValue=="Started", "start",ActivityStatusValue=="Failure", "failed", ActivityStatusValue=="Failed", "failed",ActivityStatusValue=="Accepted", "accept", ActivityStatusValue=="Accept", "accept")
EVAL-object = lower(object)

EXTRACT-user = \"Caller\":\s\"(?<user>[^@]*)(@.*.com)?\",\s\"TenantId\"
EXTRACT-object = \"_ResourceId\":\s\".*\/(?<object>[[:alnum:]]*)\"
EXTRACT-object_category = \"_ResourceId\":\s\"\/.*\/(?<object_category>.*)\/[[:alnum:]]*

FIELDALIAS-object_path = "ResourceId" AS object_path
FIELDALIAS-src = "CallerIpAddress" AS src
FIELDALIAS-command = "OperationNameValue" AS command
FIELDALIAS-change_type = CategoryValue AS change_type
FIELDALIAS-dvc = "Resource" AS dvc
FIELDALIAS-result_id = eventDataId AS result_id

############################################################
# EXTRACTIONS TO ENRICH KQL APP Web LOGS - Azure FrontDoor #
############################################################

[azure:kql:web:frontdoor]
KV_MODE = json
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true
LINE_BREAKER = ([\r\n]+)
MAX_TIMESTAMP_LOOKAHEAD = 80
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TIME_PREFIX = \"TimeGenerated\"\:\s\"

EXTRACT-group_name = "_ResourceId\":\s+\"(?:[^\/]*\/){4}(?<group_name>[^\/]+)

FIELDALIAS-cookie = Cookie AS cookie

EVAL-vendor = "Microsoft"
EVAL-product = "Azure SQL"
EVAL-vendor_product = "Microsoft Azure SQL"
EVAL-action = case(match(status, "^[2]\d\d"), "allowed", match(status, "^[3]\d\d"), "redirected", match(status, "^[1]\d\d"), "informational", match(status, "^[4]\d\d"), "client error", match(status, "^[5]\d\d"), "server error", 1=1, "blocked")
