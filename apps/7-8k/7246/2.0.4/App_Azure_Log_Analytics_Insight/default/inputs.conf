[mde]
index = default
start_by_shell = false
python.version = python3
sourcetype = azure:kql:mde
interval = 30

[azure_kql]
index = default
start_by_shell = false
python.version = python3
sourcetype = azure:kql:addon
interval = 30
azure_service = log_analytics

[monitor://$SPLUNK_HOME/var/log/splunk/azure_log_analytics_insight.log]
disabled = false
index = _internal
sourcetype = azure:kql:addon
source = azure_kql_bridge_for_splunk

[monitor://$SPLUNK_HOME/var/log/splunk/app_microsoft_defender.log]
disabled = false
index = _internal
sourcetype = azure:kql:addon
source = azure_kql_bridge_for_splunk