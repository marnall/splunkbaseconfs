[source::...TA-crowdstrike-falcon-filevantage*.log*]
sourcetype = tacrowdstrikefalconfilevantage:log

[source::...TA_crowdstrike_falcon_filevantage*.log*]
sourcetype = tacrowdstrikefalconfilevantage:log

[source::...TA_crowdstrike_filevantage*.log*]
sourcetype = tacrowdstrikefalconfilevantage:log

[tacrowdstrikefalconfilevantage:log]
TRUNCATE = 0

[crowdstrike:filevantage:json]
KV_MODE = json
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
ANNOTATE_PUNCT = false
NO_BINARY_CHECK = true
TRUNCATE = 0
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%Z
TIME_PREFIX = "Timestamp_value"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 35
category = security
pulldown_type = 1

# CIM Field Aliases - Endpoint.Filesystem
FIELDALIAS-dest_for_filevantage = host.name AS dest
FIELDALIAS-file_path_for_filevantage = filepath AS file_path
FIELDALIAS-file_name_for_filevantage = filename AS file_name
FIELDALIAS-user_for_filevantage = user_name AS user

# CIM Field Aliases - Change
FIELDALIAS-object_for_filevantage = filename AS object
FIELDALIAS-object_path_for_filevantage = filepath AS object_path
FIELDALIAS-object_id_for_filevantage = id AS object_id
FIELDALIAS-command_for_filevantage = command_line AS command
FIELDALIAS-dvc_for_filevantage = host.name AS dvc

# CIM Calculated Fields
EVAL-action = case(match(action_type,"(?i)creat"),"created",match(action_type,"(?i)modif|(?i)write|(?i)content"),"modified",match(action_type,"(?i)delet|(?i)remov"),"deleted",match(action_type,"(?i)permiss|(?i)acl|(?i)owner"),"acl_modified",match(action_type,"(?i)read|(?i)access"),"read",1=1,lower(action_type))
EVAL-change_type = "filesystem"
EVAL-object_category = if(match(action_type,"(?i)director"),"directory","file")
EVAL-status = "success"
EVAL-vendor_product = "CrowdStrike Falcon FileVantage"