[spur_feed]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
TIME_PREFIX = "feed_date":"
TIME_FORMAT = %Y%m%d
MAX_TIMESTAMP_LOOKAHEAD = 8
NO_BINARY_CHECK = true
category = Network & Security
pulldown_type = true
description = Spur threat-intelligence feed (anonymous / anonymous-residential / realtime)
TRANSFORMS-spur_indexed_fields = spur_ip_to_indexed_field, spur_feed_type_to_indexed_field, spur_infrastructure_to_indexed_field, spur_tunnel_operator_to_indexed_field, spur_anonymous_tunnel_operator_anon_first, spur_anonymous_tunnel_operator_op_first
