[spur_enrich_ip]
type = search
display_location = field_menu
fields = src_ip, src, clientip, dest_ip, ip, ipaddress, src_addr, source_ip, dst_ip
label = Enrich $@field_name$ with Spur Context API
search.search_string = | spurcontextapigen ip="$@field_value$"
search.app = spur-enrichment-for-splunk
search.view = search
search.target = blank

[spur_locate_ip]
type = search
display_location = field_menu
fields = src_ip, src, clientip, dest_ip, ip, ipaddress, src_addr, source_ip, dst_ip
label = Locate $@field_name$ with Spur IP Geo
search.search_string = | makeresults | eval ip="$@field_value$" | spuriplocation ip_field=ip
search.app = spur-enrichment-for-splunk
search.view = search
search.target = blank
