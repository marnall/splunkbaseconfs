[script:spur_context_lookup]
match          = /spur_context_lookup
script         = spur_context_lookup.py
scripttype     = persist
handler        = spur_context_lookup.SpurContextLookup
passSession    = true
passSystemAuth = true
python.version = python3
output_modes   = json

[script:spur_mmdb_refresh]
match          = /spur_mmdb_refresh
script         = spur_mmdb_refresh.py
scripttype     = persist
handler        = spur_mmdb_refresh.SpurMmdbRefresh
passSession    = true
passSystemAuth = true
python.version = python3
output_modes   = json
