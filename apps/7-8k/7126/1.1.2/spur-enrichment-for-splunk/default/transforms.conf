[spur_ip_to_indexed_field]
REGEX = "ip"\s*:\s*"([^"]+)"
FORMAT = ip::$1
WRITE_META = true

[spur_feed_type_to_indexed_field]
REGEX = "feed_type"\s*:\s*"([^"]+)"
FORMAT = feed_type::$1
WRITE_META = true

[spur_infrastructure_to_indexed_field]
REGEX = "infrastructure"\s*:\s*"([^"]+)"
FORMAT = infrastructure::$1
WRITE_META = true

# Matches every "operator" value across all tunnel objects in the event.
# REPEAT_MATCH keeps scanning after each match so we get a multi-valued
# indexed field when an event has multiple tunnels.
[spur_tunnel_operator_to_indexed_field]
REGEX = "operator"\s*:\s*"([^"]+)"
FORMAT = tunnel_operator::$1
WRITE_META = true
REPEAT_MATCH = true

# Captures "operator" values only from tunnel objects whose "anonymous"
# flag is true. The Spur feed emits tunnel keys in insertion order, which
# is not stable across API revisions, so we handle both possible orderings
# with two transforms. [^}]*? keeps each match bounded to a single tunnel
# dict.
[spur_anonymous_tunnel_operator_anon_first]
REGEX = "anonymous"\s*:\s*true[^}]*?"operator"\s*:\s*"([^"]+)"
FORMAT = anonymous_tunnel_operator::$1
WRITE_META = true
REPEAT_MATCH = true

[spur_anonymous_tunnel_operator_op_first]
REGEX = "operator"\s*:\s*"([^"]+)"[^}]*?"anonymous"\s*:\s*true
FORMAT = anonymous_tunnel_operator::$1
WRITE_META = true
REPEAT_MATCH = true
