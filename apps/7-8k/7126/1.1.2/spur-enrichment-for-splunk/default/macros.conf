[spur_index]
definition = index=spur
iseval = 0
description = Index where Spur feed events are stored. Defaults to `spur`; edit this macro (Settings -> Advanced search -> Search macros) if your deployment uses a different index name.

[spur_enrich(1)]
args = ip_field
definition = spurcontextapi ip_field="$ip_field$"
iseval = 0
description = Enrich events with Spur Context API data. Usage: `spur_enrich(clientip)`

[spur_anonymous]
definition = spur_tunnels_anonymous="True"
iseval = 0
description = Filter enriched events to those with at least one tunnel flagged as anonymous by Spur. Do not use spur_infrastructure for this -- anonymity is a per-tunnel boolean, not an infrastructure category.
