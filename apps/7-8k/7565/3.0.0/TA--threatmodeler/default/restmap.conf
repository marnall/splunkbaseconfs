[admin:TA__threatmodeler_configuration]
match = /
members = TA__threatmodeler_account, TA__threatmodeler_settings

[admin:TA__threatmodeler_inputs]
match = /
members = TA__threatmodeler_threatmodeler_audit_logs

[admin_external:TA__threatmodeler_account]
handlertype = python
python.version = python3
handlerfile = TA__threatmodeler_rh_account.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
python.required = 3.13

[admin_external:TA__threatmodeler_settings]
handlertype = python
python.version = python3
handlerfile = TA__threatmodeler_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true
python.required = 3.13

[admin_external:TA__threatmodeler_threatmodeler_audit_logs]
handlertype = python
python.version = python3
handlerfile = TA__threatmodeler_rh_threatmodeler_audit_logs.py
handleractions = edit, list, remove, create
handlerpersistentmode = true
python.required = 3.13
