
[ccx_oracle_cloud_extraction]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \\\"([^\\]+)\\\"\:\s+\\\"([^\\]+)\\\"

[ccx_oracle_cloud_eventname_lookup]
batch_index_query = 0
case_sensitive_match = 1
filename = ccx_oracle_cloud_eventname_lookup.csv

[ccx_oracle_cloud_extraction_2]
