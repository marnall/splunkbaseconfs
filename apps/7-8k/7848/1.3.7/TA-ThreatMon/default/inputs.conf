# ThreatMon Modular Input - Default Configuration
# CRITICAL: Use "interval" for scheduling, NOT "polling_interval"
# The interval value will be read from ta-threatmon.conf (setup page)
[threatmon_ioc_feed://default]
python.version = python3
interval = 600
disabled = false
index = threat_intel
sourcetype = threatmon:ioc
start_by_shell = false

