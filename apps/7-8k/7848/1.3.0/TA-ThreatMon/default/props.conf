[threatmon:ioc]
# Field extractions for ThreatMon IOC events
SHOULD_LINEMERGE = false
MAX_TIMESTAMP_LOOKAHEAD = 32
TIME_PREFIX = "timestamp":\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%fZ
TZ = UTC
KV_MODE = json
TRUNCATE = 10000

# Extract specific fields
EXTRACT-id = "id":\s*"(?<id>[^"]+)"
EXTRACT-confidence = "confidence":\s*(?<confidence>\d+)
EXTRACT-value = "value":\s*"(?<value>[^"]+)"
EXTRACT-labels = "labels":\s*"(?<labels>[^"]+)"
EXTRACT-pattern = "pattern":\s*"(?<pattern>[^"]+)"
EXTRACT-created = "created":\s*"(?<created>[^"]+)"
EXTRACT-modified = "modified":\s*"(?<modified>[^"]+)"

# Field aliases for easier searching
FIELDALIAS-ioc_value = value AS ioc_value
FIELDALIAS-ioc_confidence = confidence AS ioc_confidence
FIELDALIAS-ioc_type = type AS ioc_type
FIELDALIAS-ioc_labels = labels AS ioc_labels

# Automatic field discovery
AUTO_KV_JSON = true

category = Threat Intelligence
description = ThreatMon IOC feed data

[threatmon:scripts]
DATETIME_CONFIG = CURRENT
SHOULD_LINEMERGE = false
category = Application
description = ThreatMon script logs 