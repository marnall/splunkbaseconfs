[threatmon_iocs]
definition = index=threat_intel sourcetype=threatmon:ioc
iseval = 0

[threatmon_stats]
definition = index=threat_intel sourcetype=threatmon:stats
iseval = 0

[threatmon_high_confidence]
definition = index=threat_intel sourcetype=threatmon:ioc | where confidence > 85
iseval = 0

[threatmon_ioc_lookup]
definition = | lookup threatmon_ioc_kv_lookup value as $field$ OUTPUTNEW id,type,pattern,confidence,created,modified
iseval = 0 