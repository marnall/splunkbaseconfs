[Custom Maintenance Remove Deleted]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */5 * * * *
description = Checks for maintenance schedules that have been deleted and updates the calendar
disabled = 1
display.general.timeRangePicker.show = 0
enableSched = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | inputlookup operative_maintenance_log where _key=*key | eval hostkey=_key | eval key=_key | join type=outer hostkey [ | inputlookup ITSI_custom_schedule_master | eval date=now() | fillnull value=10000000000 edate | where edate>date | eval hostkey=if(type="service",host+"key",upper(host)+"key") | fields host hostkey ] | fields - hostkey | eval maintenance_object_key=if(isnull(host),"Schedule Deleted",maintenance_object_key) | outputlookup append=true operative_maintenance_log

[Custom Maintenance End - 24 x 7]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = */5 * * * *
description = Checks for maintenance schedules that are set to run 24 x 7 and has entities that are disabled
display.general.timeRangePicker.show = 0
enableSched = 1
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | inputlookup ITSI_custom_schedule_master where alltime="Y" enabled="N" \
| eval maintenance_object_key=if(type="host",upper(host),host), hostkey=maintenance_object_key."key", calendar_origin="6063f2bc42994f30457929d5", maintenance_object_type=if(type="host","entity","service"), start_time=1617163200, end_time=2147385600\
| join type=outer hostkey \
    [| inputlookup operative_maintenance_log \
    | eval hostkey=_key \
    | table hostkey ] \
| eval _key=hostkey, maintenance_object_key=hostkey\
| table _key maintenance_object_key maintenance_object_type calendar_origin start_time end_time \
| dedup maintenance_object_key\
| outputlookup append=true operative_maintenance_log

[Custom Maintenance ITSI Entity Lookup]
cron_schedule = */5 * * * *
disabled = 1
dispatch.earliest_time = -5m@m
search = | rest splunk_server=local /servicesNS/nobody/SA-ITOA/itoa_interface/entity report_as=text\
| eval value=spath(value,"{}")\
| mvexpand value\
| eval maintenance_object_key=spath(value, "_key"),host=spath(value, "title")\
| fields host maintenance_object_key\
| eval host=upper(host)\
| append \
    [| rest splunk_server=local /servicesNS/nobody/SA-ITOA/itoa_interface/service report_as=text\
| eval value=spath(value,"{}")\
| mvexpand value\
| eval maintenance_object_key=spath(value, "_key"),host=spath(value, "_key")\
| fields host maintenance_object_key ]\
| outputlookup itsi_entity_output.csv

[Custom Maintenance End - Standard Weekday]
ction.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 56 * * * *
description = Check for the end of standard weekly schedules
display.general.timeRangePicker.show = 0
enableSched = 1
disabled = 1
dispatch.earliest_time = -15m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
request.ui_dispatch_view = search
search = | inputlookup ITSI_custom_schedule_master where span="N" enabled="*Y*" alltime="N"\
| eval offset_hours=\
    [| makeresults\
| eval nowutc=strptime(strftime(now(),"%m/%d/%Y %H:%M:%S UTC"),"%m/%d/%Y %H:%M:%S %Z")\
| eval result = nowutc - _time\
| eval offset_hours=round(result/60/60,0)\
| eval offset_sec=round(offset_hours*3600,0)\
| eval nowtime=nowutc+offset\
| eval times=strftime(nowtime,"%H")\
| fields offset_hours\
| return $offset_hours]\
| eval start=start+offset_hours,end=end+offset_hours\
| eval start=case(start=0,24,start=-1,23,start=-2,22,start=-3,21,start=-4,20,start=-5,19,start=-6,18,start=-7,17,start=-8,16,start=-9,15,start=-10,14,start=-11,13,start=-12 OR start=36,12,start=25,1,start=26,2,start=27,3,start=28,4,start=29,5,start=30,6,start=31,7,start=32,8,start=33,9,start=34,10,start=35,11,1==1,start)\
| eval end=case(end=0,24,end=-1,23,end=-2,22,end=-3,21,end=-4,20,end=-5,19,end=-6,18,end=-7,17,end=-8,16,end=-9,15,end=-10,14,end=-11,13,end=-12 OR end=36,12,end=25,1,end=26,2,end=27,3,end=28,4,end=29,5,end=30,6,end=31,7,end=32,8,end=33,9,end=34,10,end=35,11,1==1,end)\
| fillnull value=1 sdate \
| fillnull value=10000000000 edate \
| eval hour=ltrim(strftime(now()+900,"%H"),"0"), day=strftime(now(),"%a"), month=strftime(now(),"%b"), date=now(), maintenance_object_key=if(type="host",upper(host),host), hostkey=maintenance_object_key."key", calendar_origin="6063f2bc42994f30457929d5", maintenance_object_type="entity", start_time=1617163200, end_time=2147385600 \
| eval hour=if(hour=00,24,hour) \
| makemv delim="," days \
| mvexpand days\
| where sdate<date AND edate>=date AND end=hour AND days=day \
| join hostkey \
    [| inputlookup operative_maintenance_log \
    | eval hostkey=_key \
    | table hostkey ] \
| eval _key=hostkey, maintenance_object_key=hostkey\
| table _key maintenance_object_key maintenance_object_type calendar_origin start_time end_time \
| dedup maintenance_object_key \
| outputlookup append=true operative_maintenance_log

