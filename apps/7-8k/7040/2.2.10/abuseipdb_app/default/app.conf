#
# Splunk app configuration file
#

[launcher]
author = AbuseIPDB
description = App to enrich Splunk with data from the AbuseIPDB APIv2, with the check, reports, report, check-block, and blacklist endpoints. 
version = 2.2.10

[author=AbuseIPDB]
email = splunk@abuseipdb.com
company = AbuseIPDB

[id]
name = abuseipdb_app
version = 2.2.10

[package]
id = abuseipdb_app
check_for_updates = true
show_upgrade_notification = true

[install]
is_configured = false
state_change_requires_restart = true
state = enabled
build = 7
install_source_checksum = 

[ui]
is_visible = 1
label = AbuseIPDB App
setup_view = Core_Setup

[triggers]
reload.abuseipdb_blacklist_coll = simple
reload.abuseipdb_control_coll = simple
reload.abuseipdb_app_options = simple