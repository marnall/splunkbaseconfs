[abuseipdb_blacklist_lookup]
external_type = kvstore
collection = abuseipdb_blacklist_coll
case_sensitive_match = true
fields_list = ip, countryCode, abuseConfidenceScore, lastReportedAt

[abuseipdb_control_lookup]
external_type = kvstore
collection = abuseipdb_control_coll
case_sensitive_match = true
fields_list = _key, value