[abuseipdbcheck-command]
syntax = abuseipdbcheck ip=(<ip_address> | <field>) (<abuseipdbcheck-options>)*
description = Checks the given IP address against the AbuseIPDB database. IP is required.\
'maxAgeInDays' is the number of days in the past, from today, to check for malicious reports (default: 30).\
'verbose' is a flag to include reports in the output (default: not set).
shortdesc = Checks the given IP address against the AbuseIPDB database. IP is required.
example1 = ...|abuseipdbcheck ip=127.0.0.1 age=30 verbose=1
comment1 = Checks loopback IP address for malicious reports in the last 30 days and includes verbose reports with output.
usage = public

[abuseipdbcheck-options]
syntax = maxAgeInDays=<number> | verbose=<number>

[abuseipdbreports-command]
syntax = abuseipdbreports ip=(<ip_address> | <field>) (<abuseipdbreports-options>)*
description = Returns the AbuseIPDB reports for the given IP address. IP is required.\
'maxAgeInDays' is the number of days in the past, from today, to check for malicious reports (default: 30).\
'numReports' is the number of reports to return (default: 1000).
shortdesc = Returns the AbuseIPDB reports for the given IP address. IP is required.
example1 = ...|abuseipdbreports ip=127.0.0.1 numReports=300
comment1 = Returns the reports for the loopback address with a maximum age of 30 days and a maximum of 300 reports.
usage = public

[abuseipdbreports-options]
syntax = maxAgeInDays=<number> | numReports=<number>

[abuseipdbreport-command]
syntax = abuseipdbreport ip=<ip_address> categories=<string> (<abuseipdbreport-options>)*
description = Submits a report for the given IP address to the AbuseIPDB database. IP and categories are required.\
'categories' is a comma separated list of categories to report (required).\
'comment' is a comment to include with the report (default: no comment).\
'timestamp' is the timestamp of the report (default: current timestamp if not given).
shortdesc = Submits a report for the given IP address to the AbuseIPDB database. IP and categories are required.
example1 = ...|abuseipdbreport ip=127.0.0.1 categories="15,22"
comment1 = Submits a report for the loopback IP address with the categories 'Hacking' and 'SSH abuse' and the current timestamp.
usage = public

[abuseipdbreport-options]
syntax = comment=<string> | timestamp=<timestamp>

[abuseipdbblacklist-command]
syntax = abuseipdbblacklist (<abuseipdbblacklist-options>)*
description = Returns the current AbuseIPDB blacklist.\
'confidenceMinimum' is the minimum confidence score for the blacklist (default: 100).\
'limit' is the maximum number of results to return (default: 10000).\
'onlyCountries' is a comma-separated list of countries to include in the blacklist (default: all countries).\
'exceptCountries' is a comma-separated list of countries to exclude from the blacklist (default: no countries).\
'ipVersion' is the IP version to return (default: 4,6 mixed).
shortdesc = Returns the current AbuseIPDB blacklist.
example1 = ...|abuseipdbblacklist confidenceMinimum=90 exceptCountries="US"
comment1 = Returns the current AbuseIPDB blacklist with a confidence minimum of 90 and excludes all IP addresses from the United States.
usage = public

[abuseipdbblacklist-options]
syntax = confidenceMinimum=<number> | limit=<number> | onlyCountries=<string> | exceptCountries=<string> | ipVersion=<string>

[abuseipdbcheckblock-command]
syntax = abuseipdbcheckblock network=(<network> | <field>) (<abuseipdbcheckblock-options>)*
description = Checks the given network subnet against the AbuseIPDB database. network is required.\
'maxAgeInDays' is the number of days in the past, from today, to check for malicious IPs in the given subnet (default: 30).
shortdesc = Checks the given network subnet against the AbuseIPDB database. network is required.
example1 = ...|abuseipdbcheckblock ip=127.0.0.0/30
comment1 = Checks IP addresses from 127.0.0.0 to 127.0.0.3 inclusive for malicious reports in the last 30 days.
usage = public

[abuseipdbaccount-command]
syntax = abuseipdbaccount
description = Returns information about the given account.
usage = public