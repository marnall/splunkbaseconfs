[exec_states]
# Example: https://docs.google.com/spreadsheets/d/1Ed2Lh0UH4q_roW6TX2-_mT_NG7MQfXsyq5gema2IEoc/edit#gid=1573158593
enforceTypes = true
replicate = false

# Time the task was created
field.created = string
field.modified = string
field.dispatched_time = string

# Job name
field.job_name = string

# The assessment_id is the unique identifier for the task/assessment group and its name
field.assessment_id = string
field.assessment_name = string
field.assessment_type = string

# Search ID from savedsearches.conf
field.saved_search_id = string

# Custom variables for search
field.variables = string

# The index to store search results
field.summary_index = string

# The search version is the version of the search that was run
field.search_query = string
field.search_version = string

# Dashboard id
field.dashboard_id = string

# How is this task scheduled?  cron, now, future
field.schedule_type = string
field.schedule_value = string

# Dispatched search id
field.search_sid = string
field.job_state = string
field.disabled = string
field.archived = string

# Selected assessment type metrics
field.selected_area = string
field.selected_vrp = string

# Security
field.encrypt_export = string
field.password = string

[sat_internal]
enforceTypes = true
replicate = false

# To enable mapping to exec_states record
field.assessment_id = string
field.dashboard_id = string

# Identifiers
field.event_time = string
field.event_type = string
field.event_id = string

# Content
field.event_label = string
field.event_value = string

# Drilldown
field.link_app = string


