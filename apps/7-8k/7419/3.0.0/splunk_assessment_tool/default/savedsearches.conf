| makemv role delim="|"\
| mvexpand role\
| join type=left role \
    [| rest /services/authorization/roles \
    | rename title as role \
    | table role srchDiskQuota srchJobsQuota]\
| where isnotnull(srchDiskQuota) OR isnotnull(srchJobsQuota)\
