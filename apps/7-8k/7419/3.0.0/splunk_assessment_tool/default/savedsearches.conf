| where written_mb_user > max_srchDiskQuota_mb*0.80 OR distinct_search_count > max_srchJobsQuota*0.8\
| timechart span=1d dc(user) as users_exceeding_disk_quota_limit\
| stats avg(users_exceeding_disk_quota_limit) as RuKpi23\
| appendcols [|makeresults | eval efsDate=strftime(relative_time(now(), "@w1"), "%Y-%m-%d")]\
