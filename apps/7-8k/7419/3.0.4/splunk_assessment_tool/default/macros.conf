[sim_time_format(1)]
args = time
definition = eval $time$ = strftime($time$, "%m/%d/%Y %H:%M:%S %z")

[sim_get_forwarder_tcpin]
definition = `sim_set_index_internal` sourcetype=splunkd TERM(group=tcpin_connections) TERM("cooked") OR TERM("cookedSSL") (hostname!=`sim_hostname_url`)  fwdType!="edge"

[sim_convert_runtime(1)]
args = runtime
definition = case( \
round($runtime$ / (3600*24) - 0.5) > 0, round($runtime$ / (3600*24) - 0.5)."d ".round(($runtime$ % (3600*24)) / 3600 - 0.5)."h ".round(($runtime$ % 3600) / 60 - 0.5)."min ".round($runtime$ % 60, 2)."s", \
round(($runtime$ % (3600*24)) / 3600 - 0.5) > 0, round(($runtime$ % (3600*24)) / 3600 - 0.5)."h ".round(($runtime$ % 3600) / 60 - 0.5)."min ".round($runtime$ % 60, 2)."s", \
round(($runtime$ % 3600) / 60 - 0.5) > 0, round(($runtime$ % 3600) / 60 - 0.5)."min ".round($runtime$ % 60, 2)."s", \
1 = 1, round($runtime$ % 60, 2)."s" \
)

[sim_audit_get_searches_for_groups(1)]
args = search_group
definition = `sim_set_index_audit` action=search sourcetype=audittrail \
| where NOT match(info, "^granted|^denied") \
| eval user = if(user="n/a", null(), user) \
| `sim_audit_get_search_type` \
| eval search=if(isnull(savedsearch_name) OR savedsearch_name=="", search, savedsearch_name)

[sim_audit_get_search_type]
definition = eval search_type = case( \
    match(search_id, "^SummaryDirector_"), "summarization", \
    match(savedsearch_name, "^_ACCELERATE_"), "acceleration",\
    match(search_id, "^((rt_)?scheduler_|alertsmanager_)"), "scheduled", \
    match(search_id, "\d{10}\.\d+(_[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12})?$"), "ad hoc", \
    savedsearch_name="","ad hoc", \
    true(), "other") \
| eval search_type=case( \
    match(savedsearch_name,"search\d+") OR match(provenance, "^UI:[D,d]ashboard"), "dashboard", \
    match(search_id,"^rt_"),"realtime", \
    match(search_id,"^subsearch_"),"subsearch", \
    true(),search_type)
iseval = 0

[sim_exclude_internal_sourcetypes(1)]
args = sourcetype
definition = NOT $sourcetype$ IN(splunkd, splunkd_*, splunk_*, mongod, kvstore, http_event_collector_metrics,\
    saproxy, saingestion, sc4mc, mc_apps, mc_utils*, mc_provisioning, mc_tim, mc_es_soar, mc_ESValues*,\
    mc_authz_util*, mc_create_ingest_soar_tokens*, mc_create_soar*, mc_data_migration_task*, mc_default_uf_config_setup*,\
    mc_events_command, mc_feature_flags_api_handler*, mc_generic_models, mc_heartbeat_handler*, mc_im_*,\
    mc_incidents*, mc_init_index_rest_handler*, mc_internal_proxy_handler*, mc_KnowledgeData*, mc_kv_store_retention*,\
    mc_parse_im_indicators_files*, mc_PersistentRestServer*, mc_retrieve_im_indicators*, mc_send_*, mc_setup_*, \
    mc_soar_*, mc_user_preferences_handler*, mc_xapi_proxy*)

[sim_set_indexer]
definition = (`sim_indexer_host` OR `sim_si_host`)

[sim_set_search_head]
definition = (`sim_search_head_host` OR `sim_si_host`)

[sim_licensing_summary_no_split]
definition = timechart span=1d sum(b) AS "volume" fixedrange=false | eval GB=round(volume/pow(2,30),3)

[sim_set_license_manager]
definition = (host=`sim_hostname_url` NOT `sim_search_head_host`) 

[sim_licensing_usage_base]
definition = `sim_set_index_internal` `sim_set_license_manager` source=*license_usage.log* type="Usage" \
| eval h=if(len(h)=0 OR isnull(h),"(SQUASHED)",h) \
| eval s=if(len(s)=0 OR isnull(s),"(SQUASHED)",s) \
| eval idx=if(len(idx)=0 OR isnull(idx),"(UNKNOWN)",idx) \
| eval scenarios=if(len(scenarios)=0 OR isnull(scenarios), "standard", scenarios) \
| eval scenarios=scenarios." ingestion"

[sim_exclude_internal_monitoring_user]
definition = NOT user IN(cmon_user,internal_observability)


[sim_licensing_summary_base]
definition = `sim_set_index_telemetry` `sim_set_license_manager` source=*license_usage_summary.log* TERM("type=RolloverSummary") \
| rex field=_raw "^(?<timestring>\d\d-\d\d-\d{4}\s\d\d:\d\d:\d\d.\d{3}\s\+\d{4})" \
| eval _time=strptime(timestring,"%m-%d-%Y %H:%M:%S.%N%z") \
| `sim_offset_utc_mins_relative_time(-1440)` \
| eval _time=relative_time(_time, rel_time) \
| bin _time span=1d \
| stats latest(b) AS b by slave, pool, _time

[sim_offset_utc_mins_relative_time(1)]
args = offset_mins
definition = eval z=strftime(now(),"%z") \
| eval m=substr(z,-2) \
| eval h=substr(z,2,2) \
| eval mzone=if(z != 0, ((h*60)+m)*(z/abs(z)), 0) \
| eval min_to_utc=$offset_mins$-mzone \
| eval rel_time=min_to_utc."m"

[sim_set_wlm]
args = selected_host_scope
definition = `sim_set_index_internal` sourcetype=wlm_*

[sim_all_search_status]
definition = status="completed" OR status="success" OR status="skipped" OR status="continued" OR status="deferred"

[sim_savedsearch_dedup]
definition = fillnull value="no_sid_yet" sid | eval tuple=savedsearch_name . ";" . tostring(round(relative_time(scheduled_time, "@m"), 0)).":::".sid.status | dedup tuple


[sim_forwarder_eosl(1)]
args=fwd_version
definition= eval \
        fwd_7_3_eos=relative_time(strptime("22-Oct-2021", "%d-%b-%Y"), "+1d@d"), \
        fwd_8_0_eos=relative_time(strptime("22-Oct-2021", "%d-%b-%Y"), "+1d@d"), \
        fwd_8_1_eos=relative_time(strptime("19-Apr-2023", "%d-%b-%Y"), "+1d@d"), \
        fwd_8_2_eos=relative_time(strptime("30-Sep-2023", "%d-%b-%Y"), "+1d@d"), \
        fwd_9_0_eos=relative_time(strptime("14-Jun-2024", "%d-%b-%Y"), "+1d@d"), \
        fwd_9_1_eos=relative_time(strptime("28-Jun-2025", "%d-%b-%Y"), "+1d@d"), \
        fwd_9_2_eos=relative_time(strptime("31-Jan-2026", "%d-%b-%Y"), "+1d@d"), \
        fwd_9_3_eos=relative_time(strptime("24-Jul-2026", "%d-%b-%Y"), "+1d@d"), \
        fwd_default_eos=relative_time(strptime("01-Jan-1971", "%d-%b-%Y"), "+1d@d") \
        | eval expTimestamp = case( \
            match($fwd_version$, "^7\.3"), fwd_7_3_eos, \
            match($fwd_version$, "^8\.0"), fwd_8_0_eos, \
            match($fwd_version$, "^8\.1"), fwd_8_1_eos, \
            match($fwd_version$, "^8\.2"), fwd_8_2_eos, \
            match($fwd_version$, "^9\.0"), fwd_9_0_eos, \
            match($fwd_version$, "^9\.1"), fwd_9_1_eos, \
            match($fwd_version$, "^9\.2"), fwd_9_2_eos, \
            match($fwd_version$, "^9\.3"), fwd_9_3_eos, \
            1==1, fwd_default_eos) \
        | fields - fwd_*_eos

[sim_get_local_stack]
definition= rest /services/server/info splunk_server=local \
  | fields splunk_server \
  | rex field=splunk_server "^[^.]+[.](?<stack>[^.]+)"

[sim_filter_stack(1)]
args=local_stack
definition= rex field=host "^[^.]+[.](?<event_stack>[^.]+)" | where event_stack="$local_stack$"

[sim_filter_host(1)]
args = stack_name
definition = (host="*.$stack_name$.*" host=`sim_hostname_url`)

[sim_stack_license_svc(1)]
args = local_stack
definition = index=summary source="splunk-svc" \
| `sim_filter_stack($local_stack$)` \
| stats max(stack_license_svc) as stack_license_svc
