| rex mode=sed field=$arg1$ "s/(\W|^)bad|no(\W|$)/❌/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)false(\W|$)/⛔/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)stop(\W|$)/🛑/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)greenx(\W|$)/❎/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)thumbsup(\W|$)/👍/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)thumbsdown(\W|$)/👎/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)fire(\W|$)/🔥/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)smile(\W|$)/😀/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)warning(\W|$)/⚠/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)information(\W|$)/ℹ/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)blue(\W|$)/🔵/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)yellow(\W|$)/🟡/g" \
| rex mode=sed field=$arg1$ "s/(\W|^)red(\W|$)/🔴/g" \
