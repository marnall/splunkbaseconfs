###############################################
# Used for Search Performance / Scheduled Search / Dashboard Assessment
# IF THE GREAT HUNT IS INSTALLED: Follow the steps below
#  1 - Disable the savedsearch sat_search_hunter in the CORE/CLOUD content pack 
#  2 - Edit this macro use the output from The Great Hunt
#      Macro definition should be     index=summary sourcetype=search_hunter_v2
###############################################
[sat_summary_search_stats]
args = 
definition =  index=`sat_summary_index` source=sat_search_hunter app!=splunk_istrumentation app!=splunk_archiver app!=splunk_rapid_diag
iseval = 0 

[sat_groups(1)]
args = arg1
definition = join type=outer $arg1$ \
    [| inputlookup dmc_assets \
    | eval splunk_server=host\
    | mvcombine search_group \
    | rex field=search_group "dmc_searchheadclustergroup_(?<shcluster_label>.*)" \
    | rex field=search_group "dmc_indexerclustergroup_(?<cluster_label>.*)" \
    | eval server_group=case(NOT isnull(shcluster_label) AND match(search_group,"search_head") AND NOT match(search_group,"shc_deployer"),"shc:".shcluster_label,NOT isnull(cluster_label) AND match(search_group,"dmc_group_indexer"),"idxc:".cluster_label,true(),host) \
    | table $arg1$ server_group ] \
| eval server_group=if(isnull(server_group),$arg1$,server_group)
iseval = 0

[sat_groups(2)]
args = arg1,arg2
definition = join type=outer $arg1$ \
    [| inputlookup dmc_assets \
| eval splunk_server=host \
| mvcombine search_group \
| rex field=search_group "dmc_searchheadclustergroup_(?<shcluster_label>.*)" \
| rex field=search_group "dmc_indexerclustergroup_(?<cluster_label>.*)" \
| eval server_group=case(NOT isnull(shcluster_label) AND match(search_group,"search_head") AND NOT match(search_group,"shc_deployer"),"shc:".shcluster_label,NOT isnull(cluster_label) AND match(search_group,"dmc_group_indexer"),"idxc:".cluster_label,true(),host) \
| rex field=search_group "dmc_group_(?<sat_group>.*)" \
| table $arg1$ server_group sat_group] \
| eval server_group=if(isnull(server_group),$arg1$,server_group) \
| search sat_group="*$arg2$*"
iseval = 0

[sat_cloudgroups(1)]
args = arg1
definition = join type=outer $arg1$ [ search index=_introspection component=Hostwide earliest=-1m \
| rex field=splunk_server "\.(?<stack>.*?)\.(?<domain>.*)" \
| eval splunk_server=host\
| eval server_group=case(match(stack,dns_alt_name),stack,match($arg1$,"^c0m1"),"c0m1",match($arg1$,"^si"),"single instance",match($arg1$,"^idm"),lookup_label,match($arg1$,"^idx"),"indexer",match($arg1$,"^soar"),"soar",match($arg1$,"^sh"),dns_alt_name) \
| table server_group  $arg1$ ]
iseval = 0

