[sat_firstcsv(1)]
args = list
definition = "\"".tostring(mvindex(split("$list$",","),0))."\""
iseval = 1

[sat_diff(2)]
args = lhs,rhs
definition = tostring($lhs$-$rhs$)
errormsg = Both arguments to sat_diff must be numeric
iseval = 1
validation = isnum(lhs) AND isnum(rhs)

[mv_trim(2)]
args = field,count
definition = foreach $field$ [ eval "<<FIELD>>"=if(mvcount('<<FIELD>>')>$count$,mvappend(mvindex('<<FIELD>>',0,`sat_diff($count$,1)`),"and ".(mvcount('<<FIELD>>')-$count$ )." more..."),'<<FIELD>>')]
iseval = 0
validation = isnum(count)
errormsg = Second argument must be numeric

[char_width(2)]
args = field,num
definition = foreach $field$ [eval "<<FIELD>>"=mvmap('<<FIELD>>',if(len('<<FIELD>>') > $num$,substr('<<FIELD>>',0,`sat_diff($num$,3)`) + "...",'<<FIELD>>')) ]
iseval = 0
validation = isnum(num)
errormsg = Second argument must be numeric

[rest_get_lookup(2)]
args = lookup,server
definition = rest splunk_server=`sat_firstcsv("$server$")` /services/search/v1/jobs/export \
    search="| inputlookup $lookup$\
    | rename * as tmp_*, _* as tmp__* \
    | foreach tmp_* \
        [eval \"<<FIELD>>\" = replace(replace(replace(replace(mvjoin(coalesce('<<FIELD>>',\"@@NULL@@\"),\"@@MVField@@\"),\",\",\"@@Comma@@\"),\"\\n\",\"@@NewLine@@\"),\"\\r\",\"@@CarriageReturn@@\"),\"\\\"\",\"@@DoubleQuote@@\") ]\
    " output_mode=csv\
| fields value \
| makemv tokenizer="([^\n]+)" value \
| eval header=mvindex(value,0), value=mvindex(value,1,mvcount(value)) \
| makemv tokenizer="(\"[^\"]+\"|[^,]+)" header \
| mvexpand value \
| makemv tokenizer="(\"[^\"]+\"|[^,]+)" value \
| eval tuple=mvzip(header,value,"#####") \
| fields tuple \
| eval primarykey=md5(tostring(tuple)) \
| mvexpand tuple \
| rex field=tuple "^(?P<field>.*)#{5}(?P<value>.*)$" \
| eval field=trim(field,"\""), value=if(value=="NULL","",trim(value,"\"")) \
| fields primarykey field value \
| eval {field}=value \
| fields - name, field, value \
| stats values(*) as * by primarykey \
| fields - primarykey \
| foreach tmp_* \
    [ eval "<<FIELD>>" = case('<<FIELD>>'!="@@NULL@@", split(replace(replace(replace(replace('<<FIELD>>' ,"@@Comma@@",","), "@@NewLine@@", "\
"), "@@CarriageReturn@@", ""), "@@DoubleQuote@@", "\""),"@@MVField@@")) ] \
| rename tmp_* AS * \
| fieldformat _time=if(isint(_time),strftime(_time, "%s"),_time)
iseval = 0

[sat_bytes(1)]
args = bytes
definition = case(\
$bytes$ >= pow(1024,4)*0.76, tostring(round($bytes$/pow(1024,4),2))." TiB",\
$bytes$ >= pow(1024,3)*0.76, tostring(round($bytes$/pow(1024,3),2))." GiB",\
$bytes$ >= pow(1024,2)*0.76, tostring(round($bytes$/pow(1024,2),2))." MiB",\
$bytes$ >= pow(1024,1)*0.76, tostring(round($bytes$/pow(1024,1),2))." KiB",\
true(),tostring($bytes$)." B")
iseval = 0

[emoji(1)]
