[host_to(1)]
args = arg1
definition = join type=outer host \
    [ search index=_introspection component=Hostwide earliest=-1m \
    | rex field=splunk_server "\.(?<stack>.*?)\.(?<domain>.*)" \
    | eval role=case(match(stack,dns_alt_name),stack,match(host,"^c0m1.*splunkcloud"),"c0m1",match(host,"^si.*splunkcloud"),"single instance",match(host,"^idm.*splunkcloud"),"idm",match(host,"^idx.*splunkcloud"),"indexer",match(host,"^soar.*splunkcloud"),"soar",match(host,"^sh.*splunkcloud"),dns_alt_name,true(),host) \
    | eval fqdn=case(match(role,stack) AND match(host,"^sh.*splunkcloud"),stack.".".domain,match(host,"^sh.*splunkcloud"),role."-".stack.".".domain,NOT isnull(role),role,true(),host) \
    | table host $arg1$ ]
iseval = 0

[extract_search]
args = 
definition = | rex mode=sed field=_raw "s/\n//g" \
| eval _raw=if(match(_raw,"\w$"),_raw."', is_federated_search",_raw) \
| rex field=_raw "\ssearch='(search )?(?<search>.*?)(', (incomplete_bucket_maps|is_federated_search)?|$)" 
iseval = 0 

[sat_internal_capture(7)]
args = assessment_id,dashboard_id,event_type,event_id,event_label,event_value,link_app
definition =  makeresults \
| rename _time as event_time \
| eval assessment_id = trim(replace("$assessment_id$","^[\n\r]","")),  \
       dashboard_id = trim(replace("$dashboard_id$","^[\n\r]","")),  \
       event_type = trim(replace("$event_type$","^[\n\r]","")),  \
       event_id = trim(replace("$event_id$","^[\n\r]","")),  \
       event_label = trim(replace("$event_label$","^[\n\r]","")),  \
       event_value = trim(replace("$event_value$","^[\n\r]","")),  \
       link_app = trim(replace("$link_app$","^[\n\r]",""))  \
| outputlookup append=t sat_internal
iseval = 0 

[sat_view_timestamp]
args = 
definition =  rest splunk_server=local /servicesNS/-/-/apps/local/splunk_assessment_tool f=version | eval time = strftime(now(),"%Y-%m-%d %H:%M:%S %Z") . " | Splunk Assessment Tool (" . version . ")" | fields time
