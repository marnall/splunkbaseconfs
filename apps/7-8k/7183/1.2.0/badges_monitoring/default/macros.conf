[calculate_status(1)]
args = expires_at_date
definition = eval diff=round((strptime(expires_at_date,"%Y-%m-%d")-now())/86400,0) | eval status=if(diff<0, "Expired", if(diff<100, "Renew", "Valid"))
iseval = 0

[get_wallet(1)]
args = userid
definition = eval wallet=case(\
platform="credly","https://www.credly.com/users/".userid."/badges",\
platform="accredible","https://www.credential.net/profile/".userid."/wallet",\
platform="microsoft","https://learn.microsoft.com/en-us/users/<username>/transcript/".userid\
)
iseval = 0
