[badges:credly]
DATETIME_CONFIG = CURRENT
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Custom
pulldown_type = 1
FIELDALIAS-name = badge_template.name as name
EVAL-badge_url = "https://www.credly.com/badges/".id
EVAL-platform = "credly"
EXTRACT-issuer = "issued by (?P<issuer>[^\"]+)"
LOOKUP-priority = priority id OUTPUT priority

[badges:accredible]
DATETIME_CONFIG = CURRENT
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Custom
pulldown_type = 1
FIELDALIAS-issued_at_date = issued_on as issued_at_date
FIELDALIAS-expires_at_date = expired_on as expires_at_date
FIELDALIAS-issuer = issuer.name as issuer
FIELDALIAS-badge_url = url as badge_url
EVAL-platform = "accredible"
LOOKUP-priority = priority id OUTPUT priority

[badges:microsoft]
DATETIME_CONFIG = CURRENT
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Custom
pulldown_type = 1
FIELDALIAS-id = certificationNumber as id
EVAL-issued_at_date = strftime(strptime(dateEarned."+0000","%FT%T.%6N%:z"), "%Y-%m-%d")
EVAL-expires_at_date = strftime(strptime(expiration."+0000","%FT%T.%6N%:z"), "%Y-%m-%d")
EVAL-platform = "microsoft"
EVAL-issuer = "Microsoft"
EVAL-badge_url = "https://learn.microsoft.com/en-us/users/".username."/transcript/".userid
LOOKUP-priority = priority id OUTPUT priority
