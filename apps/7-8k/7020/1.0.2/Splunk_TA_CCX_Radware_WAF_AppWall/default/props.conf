
[radware:appwall]
DATETIME_CONFIG = 
BREAK_ONLY_BEFORE_DATE = 
SHOULD_LINEMERGE = false
disabled = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1

EVAL-Threatcategory =  replace(Threatcategory, "\"", "")
EVAL-action =  case(isnull(Attackname) AND match(_raw, "Failed login") AND match(_raw, "user") AND match(body, "Failed"), "failure", IsPassive=="True", "allowed", IsPassive=="False", "blocked")
EVAL-app =  if(isnotnull(app), "Radware:" + 'app', "Radware")
EVAL-category =  if(isnotnull(Attackname), Attackname, null())
EVAL-dvc =  if('Host'=="<Any Host>", 'ServerName', 'Host')
EVAL-file_name =  replace(file_name, "/", "")
EVAL-file_path =  if(isnotnull(Attackname), URI, null())
EVAL-http_referrer =  if(isnotnull(Attackname), url, null())
EVAL-ids_type =  if(isnotnull(Attackname), "application", null())
EVAL-protocol =  if(isnotnull(Attackname), replace(protocol, "(?<protocol>[`;]+)", ""), null())
EVAL-referrer =  if(isnotnull(Attackname), url, null())
EVAL-severity =  case((isnull(Attackname) AND (match(body,"Failed login") AND NOT match(body, "user")) OR match(body, "timeout") AND type=="alert"), "informational", isnotnull(Attackname), lower(Priority))
EVAL-signature =  case(isnotnull(Attackname), Attackname, isnull(Attackname) AND match(_raw,"Failed login") AND NOT match(_raw,"user") OR match(_raw,"timeout"), body, 1==1, null())
EVAL-site =  if('WebApp'==0, null(), 'WebApp')
EVAL-src =  if(isnotnull(src), src, SourceIP)
EVAL-src_ip =  if(isnotnull(src), src, SourceIP)
EVAL-src_port =  if(isnotnull(Attackname),SourcePort, null())
EVAL-type =  case(type=="NOTICE", "alert", type=="INFO", "event", type=="WARNING", "warning", type=="ALERT", "alert", type=="ERROR", "unknown", 1==1, null())
EVAL-uri_path =  if(URI="" OR URI="/",null(),'URI')
EVAL-user =  case(isnotnull(user),user, WebUser=="N/A", null(), WebUser!="N/A", WebUser, 1==1, null())
EVAL-vendor_product =  if(isnotnull(Attackname), "Radware Web Application Firewall", null())

REPORT-ccx_radware_waf_alert = ccx_radware_waf_alert
REPORT-ccx_radware_waf_authentication = ccx_radware_waf_authentication
REPORT-ccx_radware_waf_certificate = ccx_radware_waf_certificate
REPORT-ccx_radware_waf_description_authentication_role = ccx_radware_waf_description_authentication_role
REPORT-ccx_radware_waf_description_http_user_agent =  ccx_radware_waf_description_http_user_agent
REPORT-ccx_radware_waf_description_ids =  ccx_radware_waf_description_ids
REPORT-ccx_radware_waf_description_method = ccx_radware_waf_description_method
REPORT-ccx_radware_waf_description_status = ccx_radware_waf_description_status
REPORT-ccx_radware_waf_description_url = ccx_radware_waf_description_url
REPORT-ccx_radware_waf_dlp = ccx_radware_waf_dlp
REPORT-ccx_radware_waf_file_name = ccx_radware_waf_file_name
REPORT-ccx_radware_waf_ids_kv = ccx_radware_waf_ids_kv
REPORT-ccx_radware_waf_logout = ccx_radware_waf_logout
REPORT-ccx_radware_waf_websec = ccx_radware_waf_websec

[rdwr:accesslogs]
DATETIME_CONFIG = 
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Custom
pulldown_type = 1

FIELDALIAS-dest_port = "X-RDWR-PORT-MM" AS dest_port
FIELDALIAS-http_content_type = "Content-Type" AS http_content_type
FIELDALIAS-http_referrer = referer AS http_referrer

EVAL-action = case(((name IN ("Invalid TCP Flags", "L4 Source or Dest Port Zero")) OR isnotnull('title')) AND 'action'=="Blocked", "blocked", ((name IN ("Invalid TCP Flags", "L4 Source or Dest Port Zero")) OR isnotnull('title')) AND NOT 'action'=="Blocked" AND isnotnull('action'), "allowed", (name IN ("Invalid TCP Flags", "L4 Source or Dest Port Zero")), "blocked", 'action'=="Blocked", "blocked", 'action'=="Modified", "modified", isnull('action') AND like('title', "%Detected%"), "allowed", isnull('action') AND NOT like('title', "%Detected%"), "blocked", 1==1, 'action')
EVAL-category = coalesce('violationCategory', 'title', 'name')
EVAL-dest = coalesce('sourceIP', 'X-RDWR-IP', 'externalIp')
EVAL-dest_ip = coalesce('sourceIP', 'X-RDWR-IP', 'externalIp')
EVAL-http_method = if('method'=="N/A", replace('request', "(GET|PUT|POST|DELETE|HEAD|OPTIONS|CONNECT|TRACE)(?:.*\n.*)*", "\1"), 'method')
EVAL-http_referrer_domain = replace(referer,"\w+:\/\/([^\/]+).*","\1")
EVAL-http_user_agent = if('paramName'=="User-Agent", 'paramValue', coalesce('User-Agent', 'User-agent', 'user-agent'))
EVAL-http_user_agent_length = len(if('paramName'=="User-Agent", 'paramValue', coalesce('User-Agent', 'User-agent', 'user-agent')))
EVAL-ids_type = if((name IN ("Invalid TCP Flags", "L4 Source or Dest Port Zero")) OR isnotnull('title'), "application", null())
EVAL-severity = lower(severity)
EVAL-signature = coalesce('violationType', 'title','name')
EVAL-src = coalesce('sourceIp', 'destinationIp')
EVAL-src_ip = coalesce('sourceIp', 'destinationIp')
EVAL-src_port = coalesce('sourcePort','destinationPort')
EVAL-transport = if('dest_port'=="443", "tcp", null())
EVAL-uri_query = if(like(uri,"%?%"), replace(uri,"[^\?]+(\?.+)","\1"), null())
EVAL-url = if(isnull('url'), 'Host' + 'request_uri', 'url')
EVAL-url_domain = replace(if(isnull('url'), 'Host' + 'request_uri', 'url'), "(?:\w+:\/\/)?([^\/]+).*","\1")
EVAL-url_length = len(if(isnull('url'), 'Host' + 'request_uri', 'url'))
EVAL-user = if('user'=="N/A", null(), 'user')
EVAL-vendor_product = "Radware:WAF:AppWall"

REPORT-ccx_radware_waf_appwall_extraction = ccx_radware_waf_appwall_extraction
REPORT-ccx_radware_waf_appwall_extraction2 = ccx_radware_waf_appwall_extraction2
REPORT-ccx_radware_waf_appwall_file_extraction = ccx_radware_waf_appwall_file_extraction
REPORT-ccx_radware_waf_appwall_request_uri = ccx_radware_waf_appwall_request_uri
