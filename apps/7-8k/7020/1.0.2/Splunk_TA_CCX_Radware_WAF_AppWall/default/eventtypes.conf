
[ccx_radware_waf_alert]
search =  sourcetype="radware:appwall" NOT Attackname=* ("Failed login" NOT "user") OR "timeout" OR "Certificate"
# tags = alert

[ccx_radware_waf_authentication]
search =  sourcetype="radware:appwall" NOT Attackname=* "Failed login" "user"

[ccx_radware_waf_intrusion_detection]
search =  sourcetype="radware:appwall" Attackname=* OR msg_id="3000-0150"

[ccx_radware_waf_login]
search =  sourcetype="radware:appwall" NOT Attackname=* NOT "Failed login" "login" "admin"

[ccx_radware_waf_logout]
search =  sourcetype="radware:appwall" NOT Attackname=* "logout"

[ccx_radware_waf_web]
search =  sourcetype="radware:appwall" url="*"
# tags = web

[ccx_radware_waf_websec]
search =  sourcetype="radware:appwall" NOT Attackname=* "websec"
# tags = alert


[ccx_radware_waf_appwall_ids]
search = sourcetype="rdwr:accesslogs" (name IN ("Invalid TCP Flags", "L4 Source or Dest Port Zero")) OR title="*"
# tags = ids attack

[ccx_radware_waf_appwall_network_traffic]
search = sourcetype="rdwr:accesslogs" http_method="*" AND NOT (eventtype="ccx_radware_waf_appwall_ids" OR eventtype="ccx_radware_waf_appwall_web" OR url="*" )	
# tags = communicate network

[ccx_radware_waf_appwall_web]
search = sourcetype="rdwr:accesslogs" url="*" AND NOT eventtype="ccx_radware_waf_appwall_ids"
# tags = web