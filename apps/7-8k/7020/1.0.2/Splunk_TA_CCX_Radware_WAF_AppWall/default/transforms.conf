
[ccx_radware_waf_alert]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \w+\s(?<type>\w+)\s{1,2}(?<app>\w+)\s<\w+>+\:\s(?<body>.+\s(?<src>(?:[\d]{1,3}\.){3}[\d]{1,3})\.?.+)

[ccx_radware_waf_authentication]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \w+\s(?<type>\w+)\s{1,3}(?<app>\w+)\s<\w+>:\s(?<body>.+\s\.?(?<src>(?:\d{1,3}\.){3}\d{1,3}).+user\s(?<user>\w+))

[ccx_radware_waf_certificate]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \w+\s(?<type>\w+)\s{1,2}(?<app>\w+)\s<\w+>:\s(?<body>.+\s\.?.+)

[ccx_radware_waf_description_authentication_role]
CLEAN_KEYS = 0
REGEX = Description\=\".+Authenticated\sas\sRole\:\s(?<authentication_role>[^\,]+)

[ccx_radware_waf_description_http_user_agent]
CLEAN_KEYS = 0
REGEX = Description\=\"User\sAgent\:\s(?<http_user_agent>[^\)]+\))\s

[ccx_radware_waf_description_ids]
CLEAN_KEYS = 0
REGEX = (?:Description=\"\s?(?:Method\:\s(?<http_method>\w+)?)?.+(?:No\s)?Src\sP?p?age\:\s(?<url>http\S+)?.+Authenticated\sas\sRole\:(?<authentication_role>[^,]+))

[ccx_radware_waf_description_method]
CLEAN_KEYS = 0
REGEX = Description\=\"Method\:\s(?<http_method>\w+)

[ccx_radware_waf_description_status]
CLEAN_KEYS = 0
REGEX = Description\=\"HTTP\sStatus\scode\:\s(?<status>\d+)\s

[ccx_radware_waf_description_url]
CLEAN_KEYS = 0
REGEX = Description=".+Src\sP?p?age\:\s(?<url>http[^\s]+)\s

[ccx_radware_waf_dlp]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \w+\s(?<type>\w+)\s{1,3}(?<app>\w+)\s<\w+>:\s(?<body>.+\s\.?(?<src>(?:\d{1,3}\.){3}\d{1,3}).+)

[ccx_radware_waf_file_name]
CLEAN_KEYS = 0
REGEX = URI=\"\/\"|URI=.*[\/](?<file_name>\S+\.\w{2,4})\"

[ccx_radware_waf_ids_kv]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = ([^ =]+)=\"?((?<!\")[^ \"]+|(?<=\")[^\"]+)\"?

[ccx_radware_waf_logout]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \w+\s(?<type>\w+)\s{1,2}(?<app>\w+)\s<\w+>+\:\s(?<body>(?<user>\S+)\(admin\).+\s(?<src>(?:[\d]{1,3}\.){3}[\d]{1,3})\.?.+)

[ccx_radware_waf_websec]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \w+\s(?<type>\w+)\s{1,3}(?<app>\w+)\s<\w+>:\s(?<body>.+\s\.?.+)


[ccx_radware_waf_appwall_extraction]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = \b(?:^([^\:]+)\:\s([^\n]+))

[ccx_radware_waf_appwall_extraction2]
CLEAN_KEYS = 0
FORMAT = $1::$2
REGEX = (?:(\w+)\=\"([^\"]+)?\"?)

[ccx_radware_waf_appwall_file_extraction]
CLEAN_KEYS = 0
REGEX = appPath\=\"(?<file_path>\/[^\"]+\/(?<file_name>\w+\.\w{2,4}))?\"

[ccx_radware_waf_appwall_request_uri]
CLEAN_KEYS = 0
REGEX = ^\w+\s+(?<request_uri>\S+)\s+.+$
SOURCE_KEY = request
