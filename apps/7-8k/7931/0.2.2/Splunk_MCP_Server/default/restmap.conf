[script:mcp_script]
match = /mcp
script = mcp_server.py
handler = mcp_server.MCPRestHandler
python.version = python3
requireAuthentication = true
output_modes = json
capability = mcp_tool_execute
scripttype = persist
passSystemAuth = true
passSession = true
passHttpHeaders = true
passPayload = true

[script:mcp_health]
match = /mcp_health
script = mcp_server.py
handler = mcp_server.MCPRestHandler
python.version = python3
requireAuthentication = true
passSystemAuth = true
output_modes = json
scripttype = persist
passPayload = true
