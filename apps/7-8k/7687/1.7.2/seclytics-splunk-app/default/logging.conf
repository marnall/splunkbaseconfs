#
# The format and semantics of this file are described in this article at Python.org:
#
#     [Configuration file format](https://docs.python.org/2/library/logging.config.html#configuration-file-format)
#
[loggers]
keys = root, splunklib, GetAugurDataCommand, FeedbackCommand, AugurStatusCommand

[logger_root]
# Default: WARNING
level = WARNING
# Default: stderr
handlers = stderr

[logger_splunklib]
qualname = splunklib
# Default: WARNING
level = NOTSET
# Default: stderr
handlers = splunklib
# Default: 1
propagate = 0

[logger_GetAugurDataCommand]
qualname = GetAugurDataCommand
level = DEBUG
handlers = app
propagate = 0

[logger_FeedbackCommand]
qualname = FeedbackCommand
level = DEBUG
handlers = app
propagate = 0

[logger_AugurStatusCommand]
qualname = AugurStatusCommand 
level = DEBUG
handlers = app
propagate = 0

[handlers]
# See [logging.handlers](https://docs.python.org/2/library/logging.handlers.html)
keys = app, splunklib, stderr

[handler_app]
# Select this handler to log events to seclytics_app.log
class = logging.handlers.RotatingFileHandler
level = NOTSET
args = ('seclytics_app.log', 'a', 52428800, 9, 'utf-8', True)
formatter = seclytics_app 

[handler_splunklib]
# Select this handler to log events to splunklib.log
class = logging.handlers.RotatingFileHandler
args = ('splunklib.log', 'a', 52428800, 9, 'utf-8', True)
level = NOTSET
formatter = seclytics_app 

[handler_stderr]
# Select this handler to log events to stderr which splunkd redirects to the associated job's search.log file
class = logging.StreamHandler
level = NOTSET
args = (sys.stderr,)
formatter = seclytics_app 

[formatters]
keys = seclytics_app 

[formatter_seclytics_app]
format = %(asctime)s, Level=%(levelname)s, Pid=%(process)s, Logger=%(name)s, File=%(filename)s, Line=%(lineno)s, %(message)s
