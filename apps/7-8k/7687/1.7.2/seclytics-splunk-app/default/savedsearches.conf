[augur_network_traffic_prediction_matches]
alert.track=0
request.ui_dispatch_app=seclytics-splunk-app
request.ui_dispatch_view=predictions
search=`mac_cim_network_traffic_predictions`
dispatch.earliest_time=-15m
dispatch.latest_time=now
enableSched=1
cron_schedule=*/15 * * * *

[augur_endpoint_ioc_matches]
alert.track=0
request.ui_dispatch_app=seclytics-splunk-app
request.ui_dispatch_view=predictions
search=`mac_cim_endpoint`
dispatch.earliest_time=-15m
dispatch.latest_time=now
enableSched=1
cron_schedule=*/15 * * * *

[augur_update_prediction_lookups]
alert.track=0
run_on_startup=true
request.ui_dispatch_app=seclytics-splunk-app
request.ui_dispatch_view=predictions
search=| getaugurdata bulk_name=cidr_predictions.csv | outputlookup augurPredictionLookup
enableSched=1
cron_schedule=0 */1 * * * 

