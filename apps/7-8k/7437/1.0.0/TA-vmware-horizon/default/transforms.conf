[vdm_audit]
DEST_KEY = MetaData:Sourcetype
REGEX = \>\s\[Audit]\s
FORMAT = sourcetype::vm:hzn:vdm:audit

[vdm_desktop_tracker]
DEST_KEY = MetaData:Sourcetype
REGEX = \>\s\[DesktopTracker]\s
FORMAT = sourcetype::vm:hzn:vdm:desktop:tracker

[vmh_category]
REGEX = \>\s\[(?<category>.*?)\]

[vmh_severity]
REGEX = (?<severity>(INFO|WARN|ERROR|DEBUG))

[vmh_user]
REGEX = USER:(?<domain>[^\\]+)\\(?<user>[^\s]+?);

[vmh_syslog_user]
REGEX = UserDisplayName\=\"(?<domain>[^\\]+)\\\\(?<user>[^\s]+?)\"

