description = IPs older than specified time will be deleted from `team_cymru_indicators_details_ip` and `team_cymru_matched_indicators_ip` lookups.
disabled = 1
dispatch.earliest_time = -30d
dispatch.latest_time = now
enableSched = 1
search = | inputlookup team_cymru_indicators_details_ip \
| eval event_time=strptime(timestamp, "%Y-%m-%dT%H:%M:%S.%3f") \
| eval value=md5(ip) \
| join type=left value \
    [| inputlookup team_cymru_matched_indicators_ip \
    | addinfo \
    | where lastMatchTime > info_min_time \
    | eval value=md5(ip) \
    | fillnull value="-" correlationIndices \
    | fields _key count, ip, lastMatchTime, correlationIndices, value \
    | outputlookup team_cymru_matched_indicators_ip \
    | table value lastMatchTime] \
| addinfo \
| where event_time > info_min_time OR lastMatchTime!="" \
| table _key, timestamp, identity, summary, open_ports, pdns, fingerprints, x509, whois, ip, start_date, end_date \
| outputlookup team_cymru_indicators_details_ip

