[update_team_cymru_foundation_ip_indicator_master_lookup]
cron_schedule = */30 * * * *
description = Update Foundation IP Indicators from index to team_cymru_indicators_foundation_ip
dispatch.earliest_time = -40m
dispatch.latest_time = now
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = TeamCymruScoutAppForSplunk
request.ui_dispatch_view = search
search = `team_cymru_indicator_indices` sourcetype="*team_cymru_foundation_ip" | dedup ip | rex field=_raw "(?<as_info>\"as_info\".*?), (?<insights>\"insights\".*?), (?<tags>\"tags\".*)\}" | eval as_info="{"+as_info+"}", insights="{"+insights+"}", tags="{"+tags+"}", timestamp=strftime(_time, "%Y-%m-%dT%H:%M:%S.%6N"), _key=md5(ip) | table _key, timestamp, as_info, insights, tags, ip, country_code | outputlookup team_cymru_indicators_foundation_ip key_field=_key append=true

[update_team_cymru_details_ip_indicator_master_lookup]
cron_schedule = */30 * * * *
description = Update Details IP Indicators from index to team_cymru_indicators_details_ip
dispatch.earliest_time = -40m
dispatch.latest_time = now
enableSched = 1
realtime_schedule = 0
request.ui_dispatch_app = TeamCymruScoutAppForSplunk
request.ui_dispatch_view = search
search = `team_cymru_indicator_indices` sourcetype="*team_cymru_details_ip" \
| dedup ip \
| spath output=identity path="identity"\
| spath output=whois path="whois"\
| spath output=summary path="summary"\
| spath output=open_ports path="open_ports"\
| spath output=pdns path="pdns"\
| spath output=fingerprints path="fingerprints"\
| spath output=x509 path="x509"\
| eval quot="\"", colon=":"\
| eval timestamp=strftime(_time, "%Y-%m-%dT%H:%M:%S.%6N"), _key=md5(ip) \
| eval identity="{"+ quot + "identity" + quot + colon + identity + "}"\
| eval whois="{"+ quot + "whois" + quot + colon + whois + "}"\
| eval summary="{"+ quot + "summary" + quot + colon + summary + "}"\
| eval open_ports="{"+ quot + "open_ports" + quot + colon + open_ports + "}"\
| eval pdns="{"+ quot + "pdns" + quot + colon + pdns + "}"\
| eval fingerprints="{"+ quot + "fingerprints" + quot + colon + fingerprints + "}"\
| eval x509="{"+ quot + "x509" + quot + colon + x509 + "}"\
| table _key, timestamp, identity, summary, whois, ip, start_date, end_date, open_ports, pdns, fingerprints, x509\
| outputlookup team_cymru_indicators_details_ip key_field=_key append=true

