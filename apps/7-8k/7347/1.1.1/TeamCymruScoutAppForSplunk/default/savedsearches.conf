[Delete Older Domains from `team_cymru_matched_indicators_domain` and `team_cymru_indicators_details_domain`]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
cron_schedule = 0 0 * * *
description = Domains older than specified time will be deleted from `team_cymru_indicators_details_domain` and `team_cymru_matched_indicators_domain` lookups.
disabled = 1
dispatch.earliest_time = -30d
dispatch.latest_time = now
enableSched = 1
search = | inputlookup team_cymru_indicators_details_domain \
| eval event_time=strptime(timestamp, "%Y-%m-%dT%H:%M:%S.%3f") \
| eval value=md5(domain) \
| join type=left value \
    [| inputlookup team_cymru_matched_indicators_domain \
    | addinfo \
    | where lastMatchTime > info_min_time \
    | eval value=md5(domain) \
    | fillnull value="-" correlationIndices \
    | fields _key count, domain, lastMatchTime, correlationIndices, value \
    | outputlookup team_cymru_matched_indicators_domain \
    | table value lastMatchTime] \
| addinfo \
| where event_time > info_min_time OR lastMatchTime!="" \
| table _key, as_info, domain, end_date, ip, start_date, summary, tags, country_codes, timestamp \
| outputlookup team_cymru_indicators_details_domain

[Delete Older IPs from `team_cymru_matched_indicators_ip` and `team_cymru_indicators_details_ip`]
