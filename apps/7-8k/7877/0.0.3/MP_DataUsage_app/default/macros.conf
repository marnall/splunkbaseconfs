
[lower_confidence(3)]
args = conf_list, low_num, prefix
definition = | eval $conf_list$=split(mvjoin($conf_list$,"@@@"),"@@@")\
| foreach mode=multivalue $conf_list$  [| eval tmp=split(<<ITEM>>,"|"),  conf_low=mvappend(conf_low,ifnull(conf_low, "$prefix$".mvjoin(mvindex(tmp,0,1),"|")."|". (tonumber(mvindex(tmp,2))-$low_num$)."|".mvjoin(mvindex(tmp,3,-1),"|"))) ] \
| eval tmp=split($conf_list$,"|"), conf_low=ifnull(conf_low,\
"$prefix$".mvjoin(mvindex(tmp,0,1),"|")."|".\
(tonumber(mvindex(tmp,2))-$low_num$)."|".mvjoin(mvindex(tmp,3,-1),"|"))\
| fields - tmp
iseval = 0


[get_macros(2)]
args = query, lk_prefix
definition = | rex field=$query$ max_match=0 "(\(|\s|^|\|)*`(?<macros>[^\`]*)\`" \
| foreach macros mode=multivalue \
    [| eval macros_titles=mvappend(macros_titles, if(<<ITEM>> like "%)", mvindex(split(<<ITEM>>,"("),0)."(".mvcount(split(mvindex(split(<<ITEM>>,"("),-1),",")).")",<<ITEM>>)) ] \
| eval macros_titles=ifnull(macros_titles, if(macros like "%)", mvindex(split(macros,"("),0)."(".mvcount(split(mvindex(split(macros,"("),-1),",")).")",macros)) \
| eval macros_titles=mvdedup(macros_titles) \
| lookup $lk_prefix$macros.csv macros_titles outputnew definition \
| eval definition=split(mvjoin(definition, "@@@"),"@@@") \
| eval $query$=mvappend($query$, definition) \
| fields - definition macros_titles macro_indexes macros
iseval = 0

[get_idx_st_confidence(3)]
args = query, prefix, lk_prefix
definition = | rex field=$query$ max_match=0 "(\(|\s|^|\[)index\s*=\s*(?P<index>[^(\s/\||\)|\])]+)" \
| rex field=$query$ max_match=0 "(\(|\s|^|\[)sourcetype\s*=\s*(?P<sourcetype> [^(\s/\||\)|\])]+)" \
| eval index=mvdedup(trim(index,"\"")), sourcetype=mvdedup(trim(sourcetype,"\"")) \
| lookup $lk_prefix$sourcetypes_to_index.csv sourcetype as sourcetype output possible_indexes as possible_index \
| eval possible_index=split(mvjoin(possible_index,"@@@"),"@@@") \
| foreach possible_index mode=multivalue \
    [| eval conf_possidx=mvappend(conf_possidx,"$prefix$|BASE_ST|80|".<<ITEM>>) ] \
| eval conf_possidx=ifnull(conf_possidx, "$prefix$|BASE_ST|80|".possible_index) \
| foreach index mode=multivalue \
    [| eval conf_idx=mvappend(conf_idx,"$prefix$|BASE|95|".<<ITEM>>) ] \
| eval conf_idx=ifnull(conf_idx, "$prefix$|BASE|95|".index) \
| eval confidence=mvdedup(mvappend(confidence,conf_idx, conf_possidx)) \
| fields - conf_idx, conf_possidx possible_index
iseval = 0
