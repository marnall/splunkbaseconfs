[gem:alerts]
EVAL-app = "Gem"
EVAL-type = "alert"
EVAL-severity = case(severity IN ("1", "2", "3"), "Low", severity IN ("4", "5", "6", "7"), "Medium", severity IN ("8", "9", "10"), "High")
FIELDALIAS-gem_json_alias_1 = metadata.main_entity.metadata.region AS vendor_region
FIELDALIAS-gem_json_alias_2 = metadata.main_entity.type AS src_type
FIELDALIAS-gem_json_alias_3 = metadata.main_entity.id AS src
FIELDALIAS-gem_json_alias_4 = description AS description
FIELDALIAS-gem_json_alias_5 = account.name AS vendor_account
FIELDALIAS-gem_json_alias_6 = metadata.secondary_entities{0}.id AS dest
FIELDALIAS-gem_json_alias_7 = metadata.secondary_entities{0}.type AS dest_type
FIELDALIAS-gem_json_alias_8 = id AS id
FIELDALIAS-gem_json_alias_9 = metadata.mitre_technique_id AS mitre_technique_id
FIELDALIAS-gem_json_alias_10 = severity AS severity_id
FIELDALIAS-gem_json_alias_11 = title AS signature
FIELDALIAS-gem_json_alias_12 = metadata.ttp_id AS signature_id
