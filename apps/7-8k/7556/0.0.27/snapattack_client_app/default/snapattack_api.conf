[SETTINGS]
URL = https://app.snapattack.com
SEND_STATS = true
SEND_LOG = true
# Maximum timeout in seconds before a job is cancelled. A job may be configured lower but not higher. Default 900 (15m)
MAX_SEARCH_TIME_SEC = 900
# Maximum size in MB before a job is cancelled. A job may be configured lower but not higher. Default 500MB
JOB_SIZE_LIMIT_MB = 500
# Maximum results returned by each query. A job may be configured lower but not higher. Default 5000
MAX_RESULTS = 5000

[RANK]
TEMP_FILE_DIR = /tmp/snapattack
# Maximum number of concurrent searches allowed by a job. A job may be configured lower but not higher. Default 5
MAX_CONCURRENT_SEARCHES = 5
# Maximum lookback time (in Seconds) for a job query. A job may be configured lower but not higher. 0 permits All Time searches.
MAX_REACHBACK_SEC = 0

[PROXY]
HTTP_URL =
HTTPS_URL =