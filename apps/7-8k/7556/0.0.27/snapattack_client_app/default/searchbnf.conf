[syncanalytics-command]
syntax = SYNCANALYTICS
alias =
shortdesc = Retrieves deployed detections from the SnapAttack API.
description = \
    This command retrieves all applicable deployed from SnapAttack and adds them to savedsearches.conf. Analytics that \
    are no longer marked as deployed will be deleted. The search results are indexed to the configured summary index.
category = generating
appears-in = 1.5
maintainer = SnapAttack
usage = public
tags = snapattack_client_app

[submitanalytichits-command]
syntax = SUBMITANALYTICHITS
alias =
shortdesc = Retrieves analytic hits from summary index and submits to the SnapAttack API.
description = \
    This command retrieves analytic hits from the summary index since the last submission and uploads to the SnapAttack API
category = generating
appears-in = 1.5
maintainer = SnapAttack
usage = public
tags = snapattack_client_app

[jobscheduler-command]
syntax = jobscheduler
alias =
shortdesc = Retrieves and schedules analytic search jobs from SnapAttack API.
description = \
    This command retrieves and schedules analytic search jobs from SnapAttack API
category = generating
appears-in = 1.5
maintainer = SnapAttack
usage = public
tags = snapattack_client_app

[jobrunner-command]
syntax = jobrunner
alias =
shortdesc = Dispatches search for scheduled analytic search jobs from SnapAttack API.
description = \
    This command dispatches search for scheduled analytic search jobs from SnapAttack API
category = generating
appears-in = 1.5
maintainer = SnapAttack
usage = public
tags = snapattack_client_app
