[Sync Deployed Detections]
display.general.enablePreview = 0
enableSched = 1
cron_schedule = */15 * * * *
search = | syncanalytics

[Submit Detection Hits]
display.general.enablePreview = 0
enableSched = 1
cron_schedule = */15 * * * *
search = | submitanalytichits

[SnapAttack Job Scheduler]
display.general.enablePreview = 0
enableSched = 1
cron_schedule = */1 * * * *
search = | jobscheduler

[SnapAttack Job Runner]
display.general.enablePreview = 0
enableSched = 0
search = | jobrunner guid="$args.guid$" type="$args.type$"

[Job Runner - Event Count]
dispatch.earliest_time = 0
request.ui_dispatch_app = snapattack_client_app
request.ui_dispatch_view = search
search = | tstats count where `sa_base_index_filter` $args.additional_filter$

[Job Runner - Host Count]
dispatch.earliest_time = 0
request.ui_dispatch_app = snapattack_client_app
request.ui_dispatch_view = search
search = | tstats distinct_count(host) as count where `sa_base_index_filter`

[Job Runner - Item Status]
dispatch.earliest_time = 0
request.ui_dispatch_app = snapattack_client_app
request.ui_dispatch_view = search
search = | inputlookup snapattack_job_item where snapattack_job_guid="$args.guid$"

[Job Runner - Final Status]
dispatch.earliest_time = 0
request.ui_dispatch_app = snapattack_client_app
request.ui_dispatch_view = search
search = | inputlookup snapattack_job_item where snapattack_job_guid="$args.guid$" \
| eval completed=if(status="Success", 1, 0)  \
| eval error=if(status="Failed", guid.": ".status_detail, null()) \
| stats count as dispatch_count, sum(completed) as dispatch_completed, values(error) as dispatch_errors \
| fillnull dispatch_count, dispatch_completed

[Detection Hits]
dispatch.earliest_time = 0
request.ui_dispatch_app = snapattack_client_app
request.ui_dispatch_view = search
search = index=`sa_results_summary_index` \
| rename raw as _raw \
| rename _indextime as indextime \
| eval snapattack_unique_event_identifier = coalesce(snapattack_unique_event_identifier, sha256(_raw)) \
| dedup snapattack_analytic_guid snapattack_unique_event_identifier \
$args.fields_filter$ \
| table _time, *