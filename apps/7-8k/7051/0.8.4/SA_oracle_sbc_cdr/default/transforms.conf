[oracle_cdr_call_id]
REGEX = ^[123],[^,]+,\d+,\"?([^,"]+)?\"?,\"?([^,"]+)?\"?,\"?([^,"]+)?\"?,\"?([^,"]+)?\"?,\"?([^,"]+)?\"?,\"?([^,"]+)?\"?,\"?([^\<,]*<sip:([^@\>]+)@[^,]+|([^,]+))?\"?,\"?([^\<,]*<sip:([^@\>]+)@[^,]+|([^,]+))?\"?
FORMAT = call_id::$1 ingress_call_id::$2 egress_call_id::$3 session_protocol_type::$4 session_forked_call_id::$5 generic_id::$6 calling_station_id::$7 callingPartyNumber::$8 calledPartyNumber::$11
WRITE_META = true



# NOTE... sometimes the SIP accounting_call_id values have only 5, 6, or 7 bytes in the
# first group instead of 8.   Some research indicates that of the ones that have all 8, they
# NEVER end in 0. So the working assumption is that this is someone's failure to properly zeropad.
[oracle_sbc_outgoing_call_reference_id]
SOURCE_KEY = accounting_call_id
REGEX =  ^([a-fA-F0-9]{5,8})-([a-fA-F0-9]{8})-([a-fA-F0-9]{8})-([a-fA-F0-9]{8})
FORMAT = outgoing_call_reference_id::$1 outgoing_call_reference_id2::$2 outgoing_call_reference_id3::$3

[oracle_sbc_incoming_call_reference_id]
SOURCE_KEY = accounting_call_id
REGEX =  ^([a-fA-F0-9]{5,8})-([a-fA-F0-9]{8})-([a-fA-F0-9]{8})-([a-fA-F0-9]{8})
FORMAT = incoming_call_reference_id::$1 incoming_call_reference_id2::$2 incoming_call_reference_id3::$3



