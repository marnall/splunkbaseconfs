#
# Splunk app configuration file
#
[ui]
is_visible = 0
label = Supporting App for Oracle SBC CDR

[launcher]
author = Sideview, LLC
description = This is a Supporting app designed to be deployed alongside Sideview's commercial "Cisco CDR Reporting and Analytics" app.  It provides the Splunk configuration to ingest the CDR data from Oracle SBC and Oracle Session Router correctly. Additionally it contains various pieces of Splunk configuration and logic that are used by Cisco CDR Reporting and Analytics, to make the Oracle SBC CDR work within its user interfaces.
version = 0.7.0


[id]
version = 0.7.0
name = SA_oracle_sbc_cdr


[install]
build = 30

[package]
id = SA_oracle_sbc_cdr

[shclustering]
deployer_lookups_push_mode = always_preserve


[triggers]
reload.sideview_data_types = access_endpoints /admin/conf-sideview_data_types
