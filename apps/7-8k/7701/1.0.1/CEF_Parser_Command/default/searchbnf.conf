[cefparser-command]
syntax = cefparser field=<field-name-which-contains-cef-formatted-data>
shortdesc = Parse CEF data from any field in the event to generate fields in the results
description = Parse CEF data from any field in the event to generate fields in the results. \
Must specify field parameter which defaults to _raw field.
