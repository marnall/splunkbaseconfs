[Search - Salesforce User Account Details - Lookup Gen]
alert.track = 0
cron_schedule = */10 * * * *
description = (User ID - User Name) lookup_sfdc_usernames kvlookup gen.
dispatch.earliest_time = -20m@m
dispatch.latest_time = now
enableSched = 1
search = index="*" eventtype=sfdc_user IsActive=true \
| sort 0 - _time \
| dedup Id \
| rename Id as UserId \
| fields + UserId,FirstName,City,Country,IsActive,LastLoginDate,LastName,MobilePhone,Name,PostalCode,State,Username,UserRoleId,UserType,Email,CompanyName,ProfileId,Profile.PermissionsApiEnabled,Profile.PermissionsModifyAllData,Profile.PermissionsViewSetup \
| fields - _* \
| rename Profile.PermissionsApiEnabled as Profile:PermissionsApiEnabled, Profile.PermissionsModifyAllData as Profile:PermissionsModifyAllData, Profile.PermissionsViewSetup as Profile:PermissionsViewSetup \
| eval USER_ID=substr(UserId, 1, len(UserId)-3)\
| inputlookup append=t lookup_sfdc_usernames\
| stats count by UserId, FirstName, City, Country, IsActive, LastLoginDate, LastName, MobilePhone, Name, PostalCode, State, Username, UserRoleId, UserType, Email, CompanyName, ProfileId, Profile:PermissionsApiEnabled, Profile:PermissionsModifyAllData, Profile:PermissionsViewSetup, USER_ID\
| fields - count \
| outputlookup lookup_sfdc_usernames
disabled = 1

[Search - CCX Salesforce User Account Update - Lookup Gen]
alert.track = 0
cron_schedule = */6 * * * *
description = (User ID - Email - support setupaudittrail ) ccx_lookup_sfdc_usernames csv file
dispatch.earliest_time = -20m@m
dispatch.latest_time = now
enableSched = 1
search = | inputlookup lookup_sfdc_usernames\
| table UserId,FirstName,LastName,Name,Username,UserType,Email,USER_ID\
| stats count by UserId,FirstName,LastName,Name,Username,UserType,Email,USER_ID\
| fields - count\
| outputlookup ccx_lookup_sfdc_usernames
disabled = 1
