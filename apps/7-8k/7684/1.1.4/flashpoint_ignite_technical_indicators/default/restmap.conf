[script:flashpoint_hunts_handler]
match = flashpoint/hunts$
script = rest_handlers/flashpoint_hunts_handler.py
scripttype = persist
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth	      = true
python.version        = python3

