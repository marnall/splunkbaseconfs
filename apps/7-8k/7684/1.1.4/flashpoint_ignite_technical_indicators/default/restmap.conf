[script:flashpoint_indexes_handler]
# Match on flashpoint/indexes, flashpoint/indexes/*/sourcetypes, and flashpoint/indexes/*/fields
match = ^flashpoint/indexes(/[^/]+/sourcetypes|/[^/]+/fields)?$
script = rest_handlers/flashpoint_indexes_handler.py
scripttype = persist
requireAuthentication = true
