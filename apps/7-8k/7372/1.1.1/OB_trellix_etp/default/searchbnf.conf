[etpemailtrace-command]
syntax = etpemailtrace <etpemailtrace-options>*
shortdesc = Get email trace data.
description = Returns a list of messages that include specified message attributes that are accessible in the ETP portal. Note this app fetch max 10000 emails.
usage = public
tags = etp
example1 = | etpemailtrace subject=card at_verdict=fail from_accepted_dt=2022-04-20T00:00:00 to_email=co.jp | spath input=_raw

[etpemailtrace-options]
syntax = subject=<str> | at_verdict=<fail or Pass> | from_accepted_dt=<datetime> | to_accepted_dt=<datetime> | to_email=<str> | from_email=<str> | last_modified_datetime=<datetime>


[etpalert-command]
syntax = etpalert <etpalert-options>*
shortdesc = Get alert summaries. 
description = Gets a list of advanced threat alerts in summary format. Note this app fetch max 10000 emails. email_status is accepted, deleted, delivered, dropped, dropped oob, permanent failure, quarantined, rejected, temporary failure, scanned or scan bypassed
usage = public
tags = etp
example1 = | etpalert from_last_modified_on=2022-04-20T00:00:00 email_status="dropped" | spath input=_raw

[etpalert-options]
syntax = from_last_modified_on=<datetime> | email_status=<str> | legacy_id=<int> | etp_message_id=<str>


[etpmsgfile-command]
syntax = etpmsgfile <etpmsgfile-options>*
shortdesc = Get a mail file.
description = Retrieves the email file in plain text format for the given message ID. 
usage = public
tags = etp
example1 = | makeresults | etpmsgfile legacy_id=1234567 from_last_modified_on="2022-04-04T00:00:00"
example2 = | makeresults | etpmsgfile etp_message_id=xxxxxx
example3 = | makeresults | eval legacy_id=1234567 | etpmsgfile 
example4 = | makeresults | eval etp_message_id="xxxxxx"| etpmsgfile 

[etpmsgfile-options]
syntax = legacy_id=<int> | etp_message_id=<str> | from_last_modified_on=<datetime>
