[Clean Old KV Store Data]
search = | inputlookup criminalip_results | where timestamp > relative_time(now(), "-1d") | outputlookup criminalip_results
dispatch.earliest_time = -1d
dispatch.latest_time = now
cron_schedule = 0 0 * * *
enableSched = 1
alert.track = 0

[Monitor KV Store Usage]
search = | inputlookup criminalip_results | stats count AS entry_count, min(update_time) AS oldest_entry, max(update_time) AS latest_entry
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
