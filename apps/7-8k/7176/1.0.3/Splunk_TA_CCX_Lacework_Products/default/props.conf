[lacework:alerts]
KV_MODE = json
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
category = Structured
description = CCX Custom Lacework
disabled = false
pulldown_type = true
TRUNCATE = 450000

TRANSFORMS-set_lacework_alerts_sourcetype = set_lacework_alerts

[ccx:lacework:alerts]
KV_MODE = json
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
category = Structured
description = CCX Custom Lacework
disabled = false
pulldown_type = true
TRUNCATE = 450000

EXTRACT-ccx_lacework_extraction_external_ip = .*\"EVENT_NAME\"\:\"New internal connection\".*having\s+IP\s+(?<external_ip>.*[\d+\.\d+\.\d+\.d+])\s+at

###################################
#https://docs.lacework.net/console/alert-categories
###################################

EVAL-action = if(match(_raw,".*login was not successful.*"),"failure",if(match(_raw,".*login was successful.*"),"success",if(match(_raw,".*(B|b)lock.*"),"blocked","allowed"))) 
EVAL-category = 'DERIVED_FIELDS.CATEGORY' 
EVAL-logtype = 'DERIVED_FIELDS.CATEGORY' 
EVAL-log_subtype = 'DERIVED_FIELDS.SUBCATEGORY' 
EVAL-signature = coalesce('EVENT_NAME','EVENT_DETAILS.data{}.ENTITY_MAP.API{}.API','EVENT_DETAILS.data{}.ENTITY_MAP.RulesTriggered{}.RULE_DESCRIPTION') 
EVAL-dest = coalesce('EVENT_DETAILS.data{}.ENTITY_MAP.Machine{}.EXTERNAL_IP_ADDRESS','EVENT_DETAILS.data{}.ENTITY_MAP.IpAddress{}.IP_ADDRESS','EVENT_DETAILS.data{}.ENTITY_MAP.API{}.SERVICE','external_ip','EVENT_DETAILS.data{}.ENTITY_MAP.DnsName{}.HOSTNAME','EVENT_DETAILS.data{}.ENTITY_MAP.API{}.SERVICE') 
EVAL-dest_port = coalesce(mvdedup('EVENT_DETAILS.data{}.ENTITY_MAP.IpAddress{}.PORT_LIST{}'),mvdedup('EVENT_DETAILS.data{}.ENTITY_MAP.DnsName{}.PORT_LIST{}')) 
EVAL-file_name = 'EVENT_DETAILS.data{}.ENTITY_MAP.Application{}.APPLICATION' 
EVAL-file_path = mvdedup('EVENT_DETAILS.data{}.ENTITY_MAP.FileExePath{}.EXE_PATH')
EVAL-file_hash = 'EVENT_DETAILS.data{}.ENTITY_MAP.FileExePath{}.LAST_FILEDATA_HASH'
EVAL-cpu = 'EVENT_DETAILS.data{}.ENTITY_MAP.Machine{}.CPU_PERCENTAGE' 
EVAL-dest_ip = coalesce('EVENT_DETAILS.data{}.ENTITY_MAP.Machine{}.EXTERNAL_IP_ADDRESS',mvdedup('EVENT_DETAILS.data{}.ENTITY_MAP.IpAddress{}.IP_ADDRESS'),'external_ip') 
EVAL-dvc = 'EVENT_DETAILS.data{}.ENTITY_MAP.Machine{}.HOSTNAME' 
EVAL-src = coalesce('EVENT_DETAILS.data{}.ENTITY_MAP.Machine{}.INTERNAL_IP_ADDR','EVENT_DETAILS.data{}.ENTITY_MAP.SourceIpAddress{}.CLOUDTRAIL_IP_ADDRESS','EVENT_DETAILS.data{}.ENTITY_MAP.Process{}.HOSTNAME','EVENT_DETAILS.data{}.ENTITY_MAP.Machine{}.INSTANCE_NAME') 
EVAL-command = 'EVENT_DETAILS.data{}.ENTITY_MAP.Process{}.CMDLINE' 
EVAL-severity = case(SEVERITY_STR=="Info","informational",1=1,lower('SEVERITY_STR')) 
EVAL-severity_id = 'SEVERITY' 
EVAL-rule = 'EVENT_DETAILS.data{}.ENTITY_MAP.RulesTriggered{}.RULE_TITLE' 
EVAL-src_ip = coalesce('EVENT_DETAILS.data{}.ENTITY_MAP.Machine{}.INTERNAL_IP_ADDR','EVENT_DETAILS.data{}.ENTITY_MAP.SourceIpAddress{}.CLOUDTRAIL_IP_ADDRESS') 
EVAL-user = coalesce(mvdedup('EVENT_DETAILS.data{}.ENTITY_MAP.User{}.USERNAME'),mvdedup('EVENT_DETAILS.data{}.ENTITY_MAP.CT_User{}.USERNAME')) 
EVAL-description = 'SUMMARY' 
EVAL-body = 'SUMMARY' 
EVAL-bytes_out = 'EVENT_DETAILS.data{}.ENTITY_MAP.IpAddress{}.TOTAL_OUT_BYTES' 
EVAL-bytes_in = 'EVENT_DETAILS.data{}.ENTITY_MAP.IpAddress{}.TOTAL_IN_BYTES' 
EVAL-bytes = 'EVENT_DETAILS.data{}.ENTITY_MAP.IpAddress{}.TOTAL_OUT_BYTES' + 'EVENT_DETAILS.data{}.ENTITY_MAP.IpAddress{}.TOTAL_IN_BYTES' 
EVAL-vendor_product = "Lacework:Lacework"
EVAL-vendor_account = 'LW_ACCOUNT'
EVAL-id = 'EVENT_ID' 
EVAL-transport = case(match(SUMMARY,".*T|tC|cP|p.*"),"tcp",match(SUMMARY,".*U|uD|dP|p.*"),"udp",match(SUMMARY,".*I|iC|cM|mP|p.*"),"icmp") 
EVAL-ids_type = if('DERIVED_FIELDS.CATEGORY'="Anomaly" AND ('DERIVED_FIELDS.SUBCATEGORY' IN("Application","Cloud Activity","Machine") OR ('DERIVED_FIELDS.SUBCATEGORY' IN("User") AND NOT EVENT_NAME IN("User launched new binary","New user"))) OR logtype="Composite","application",null())
EVAL-type = if(('DERIVED_FIELDS.CATEGORY'="Anomaly" AND 'DERIVED_FIELDS.SUBCATEGORY' IN("Cloud Activity","Machine","User")) OR ('DERIVED_FIELDS.CATEGORY'="Policy" AND 'DERIVED_FIELDS.SUBCATEGORY' IN("Cloud Activity","Compliance","File","Registry") AND NOT EVENT_TYPE IN("FailedConsoleLogin")),"alert",null())
EVAL-app = if(('DERIVED_FIELDS.CATEGORY'="Anomaly" AND 'DERIVED_FIELDS.SUBCATEGORY' IN("Cloud Activity","Machine","User")) OR ('DERIVED_FIELDS.CATEGORY'="Policy" AND 'DERIVED_FIELDS.SUBCATEGORY' IN("Cloud Activity","Compliance","File","Registry") AND NOT EVENT_TYPE IN("FailedConsoleLogin")),"Lacework",if('DERIVED_FIELDS.CATEGORY'="Policy" AND 'DERIVED_FIELDS.SUBCATEGORY' IN("Cloud Activity") AND EVENT_TYPE IN("FailedConsoleLogin"),'EVENT_DETAILS.data{}.ENTITY_MAP.API{}.SERVICE',null()))
EVAL-vendor_region = 'EVENT_DETAILS.data{}.ENTITY_MAP.Region{}.REGION'
EVAL-reason = if('DERIVED_FIELDS.CATEGORY'="Policy" AND 'DERIVED_FIELDS.SUBCATEGORY' IN("Cloud Activity") AND EVENT_TYPE IN("FailedConsoleLogin"),'SUMMARY',null())
