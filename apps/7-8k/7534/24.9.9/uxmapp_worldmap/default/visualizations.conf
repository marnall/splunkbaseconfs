#
# Declare shared visualizations
#

[worldmap]
label = UXM World Map
description = Display multiple metrics on the world map.
default_height = 600
search_fragment = | inputlookup apdex_test_data_w_countries.csv | stats count as requests, avg(apdex) as apdex, avg(avg_response_time) as avg_response_time, perc95(apdex) as percentile_95 by country
