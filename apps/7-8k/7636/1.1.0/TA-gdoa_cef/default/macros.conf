[ami_company_domains]
definition = eval domains=mvappend("google.com", "youtube.com", "facebook.com", "baidu.com", "wikipedia.com", "qq.com", "taobao.com", "tmail.com", "yahoo.com", "amazon.com", "instagram.com")
iseval = 0

[normalize_mac_address(1)]
args = mac
definition = eval $mac$=lower(case(match($mac$, "^\w{12}$"), rtrim(replace($mac$, "^(\w{2})", "\1:"), ":"), 1==1, replace($mac$, "\-|\.|\s", ":")))

[default_index]
definition = index=main
iseval = 0

